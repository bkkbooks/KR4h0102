front:
  text: 皇明文衡卷之九十五
  hash: sha256:7fc13d6424a69137cda0b248d264d042ad387334eb730387a931c65e6fa5854e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_095-1a}
body:
  text: 哀誄哀志士辭末濂竒雋之士無世不生特時人弗識之或識之而弗能用或用之而弗能盡其才所以聲光不流於當時事業不白於後世予竊悲之庚寅之夏因覽元好問所錄金之諸儒自辛愿而下凡五人見其氣節剛方言論磊落實所謂奇雋之士者也雖其行事或末能無過終非齷齪陳腐懨懨不振者所可冀其萬一然恨其有志而不能遂也因掇其大畧隷於各人之下又從而哀之以辭辛愿敬之福昌八年二十五始知讀書音義有不通者捜訪百至必通而後已由是慱極群書且善於文辭尤以是非黒白自任毎讀人詩必爲探源委發凡例解絡脉審音節辨淸濁權輕重片善不掩微纇必指如老吏㫁獄文峻網密絲毛不相貸雖招人怒罵不恤也性踈宕不脩威儀貴人延客愿麻衣草屨足脛赤露坦然於其間劇談豪飮旁若無人家甚貧衆雛嗷嗷張口待哺素負高氣又不能從俗俯仰其枯槁憔悴流離頓踣一假詩以鳴雖百沮之餘其耿耿自信者不少變元光初李獻能元好問在孟津愿徃見之獻能爲設美饌愿放筴歎曰平生飽食有數毎見吾二弟必得嘉食明日道路中又當與老饑相抗去矣㑹有一日辛老子僵仆柳泉韓城之間以天地爲棺㨯日月爲含禭孤狸亦可螻蟻亦可耳聞者悲之辭曰天生爾才胡不以騁麻衣如墨下不掩脛下不掩脛不過寒我我食無所我生其可水豈無藻山豈無薇苟非吾有我敢采之市魁屠伯彼豈無食我腹雖虚我腰肯折抱節而終我則奚憾烏鳶螻蟻上下何辨爾貧固甚爾守則多不義而富其如爾何李汾字長源平晉人曠逹不覊好以竒節自許避亂入關闗中無一人敢與相軒輕者元光末用薦書得從事史館從事職名謂之書冩特鈔書小史耳汾素高亢不肯一世乃今以斗食故人以府史畜之殊不自聊館中諸人又多新進小生史家凡例或未能盡知就其所長有不滿汾一笑故刋脩之際汾在傍則蓄縮慘沮握筆不能下汾正襟危坐誦左丘明司馬遷文數百言音吐甚洪暢誦畢顧四坐曰看秉筆諸人積不平乃以嫚罵官長訟于有司證左相半踰年不能决右丞師中遣東曹掾置酒和解之㝷入關驅馬來京師日以馬價佐歡道逢怨家則畫地大數而去會恒山公武仙在鄧汾徃說之署行尚書省講議官旣而叅知政事思烈與仙相異同懼汾言論遂害之汾孝友廉介過人者甚多寜寒餓而死終不作寒乞聲向人又善為詩淸壯磊落有幽并豪俠忼慨之氣人以是稱焉辭曰奎星光光今何其昏大河東流遑恤無人金匱石室藏我册書豈伊群兒所堪穢之我言弗信弗信從汝丘明雖鬼其文不死旣不我嘉覆謂我僭我視我觚有淚如霰黃霧四塞黑白誰分彩鳳無華山貍有文悠悠蒼天曷其有常自古莫不然爾又何傷劉昻霄字景玄一字委房陵川人聦敏絶人或戲取市家日曆鱗雜米䀋者令讀之一過無脫遺者故其學無所不窺六經百氏外世譜官制與兵家成敗為最詳為人細瘦似不能勝衣好横策兀坐掉頭吟諷幅巾奮袖談辭如雲四筵聳聽噤不得語遇其飲酒眼花耳熱後其鋒愈不可當不知去古談士為遠近餘子不論也嘗用門資叙調慶陽軍器庫使不就諸公方薦試宏辭未幾卒辭曰陋儒拘拘以簡為常目視環堵不知有四方狂瀾旣倒誰復逥之氣蓋一世獨爾能之上自黃虞下迨五季一隙必燭何有幽邃或觸其機談辭如雲誰非男子有舌無聲我豈誇多我豈鬪靡一物不知吾儒所恥獨立千古上遡寥絶爾身雖窮爾名豈滅雷淵字希顔别字季黙渾源人崇慶二年進士授涇州錄事不赴改東平府錄事以勞績遥領東阿縣令東平河朔重兵處也驕將悍卒不可制淵出入軍中偃然不為屈不數月家有淵畫像雖大將亦不敢以書生遇之調徐州觀察判官召爲荆王府文學兼記室叅軍轉應奉翰林文字同知制誥兼史院編修官拜監察御史廵行河南搒掠贓吏風采凜凜蔡下一兵與權貴人有連時以藥毒民家馬牛以小直脅取之淵捕得數以前後罪杖殺之老㓜聚觀萬口稱快然亦坐是失官㝷用宰相侯莘卿薦除太學博士再遷應奉終于翰林修撰累官太中大夫先是正大間北兵突入倒廻谷勢甚張平章芮公逆擊之突騎退走塡壓溪谷中不可勝筭諸將議不定釋之勿追淵請急殱之主兵者不能用後聞北兵狼狽而西馬多不暇入銜始悔不從淵言淵學甚博文甚奇為人軀幹雄偉髯張口哆顔渥丹眼如望洋遇不平則疾惡之氣見於顔間或嚼齒大罵不休雖痛自摧折卒亦不能變也食兼三四人飲至數斗不亂生平慕孔融田疇陳元龍之為人雖其文章號一代不數人在淵仍為餘事耳淵之友高廷玉李純甫亦以奇節自負人號之為三傑云辭曰爾心之勁爾氣之剛嫉惡如仇不問暴强將指出廵靣冷如鐡霜簡所加邪蒿卽折才豈止斯兵筭又長眼見千里孰曰不明志不獲伸多士短氣其書徒存九原能起埃風四來式脂式韋有髯如㦸妾婦之為我俗之昏誰復繼君茫茫九州敢謂無人雷琯字伯威坊州人志英邁博學能文以薦書從事史館調八作司使初幷州李汾與琯同在館中以高蹇得罪琯徃送之信陵攜酒酹魏公子墳握手痛飲後去客陽夏以鞭擊酒壷作楚聲歌自言去國十年甲兵滿天地短衣匹馬來自西北將起楚漢間竒才劍客與游而不可得當是時金巳遷汴大河以東北盡山東西抵關輔大軍長驅徙少壯數萬人殺之居庸關外自黃河洛陽三門析津至丕之源雀鎭凡二千餘里潼關一帶西南邊山大小關隘亦一千餘里各分地界統以總帥夜則傳令坐守冬則燃草敲冰兼以關輔大饑秦民死者相枕藉琯皆悲之作商歌十章冩其情曰秦予父母國也而一至此乎竟淚下不能食乃出竒策白宰相宰相不能聽琯去不知所之辭曰北風泱泱海水為竭俯窺神京不隔一髪舉鞭擊壷歌聲愈苦來自西北短衣匹馬我淚旣盡以血繼之天門九重曾莫聞知孰秉國鈞我將自薦反謂我狂斥去如箭商顏有芝曄曄甤甤可以葆神可以樂饑長徃不返誰甘幽深赤日在天庻明我心商節婦誄胡翰商先生淵之妻以兵而死于義吾友平仲旣爲之傳而景濂又哀之以辭皜皜乎白於天下淵也不死其妻矣天下之大義億兆人之所同也而於眇女子見之君子從而與之曰節婦列其事而不原其心則余不可以無言矣節婦之心何心也得之於天而人不與力焉良心也良心也者在臣爲忠在子爲孝在婦爲貞而臣也子也婦也發於其心之所不能已者所謂義也故忠可教孝可訓貞可勸而不能必其果於行唯其不可必奮而爲之所以行吾義也故君有不得於臣父有不得於子夫有不得於婦而非教之所能爲也百乗不足以爲貴萬鍾不足以爲富一日不足以爲短千歲不足以爲長而於名非有所計也以教爲可成名爲可榮此君子之論也天下之事出於議儗者患不能致果利害之際一髪不容不幸而動焉其心二矣故天下之士砥志礪行臨事而摧衂者多矣而名節之美著於尺籍編伍之人出於人之所不虞又其著者則窈窕婉孌閨闥之秀而確乎其不可奪毅乎其不可回若節婦者是也方事之殷軍士之所利者貨寳耳女婦耳一旦奄至于邑而淵之家骨肉不暇顧爲節婦者逃則不脫止則汙辱遂溺而死固其所也於死而得其死義也自靖而巳自靖也者心之所安也節婦亦得其心之所安而巳兵興以來吾鄉類是者徃徃有之呉履之妻死於自溺賈誠之妻死於自溺姜氏之女死於自刎童氏之婦死於自刎張氏之妻若女俱死於自刎此余所知者一日之間死者數人何其烈哉呉之妻謝賈之妻宋猶曰儒者於家有所聞習之有素也若姜氏童氏皆里巷富人非素有聞而積習者猶曰冨人知所貴重可也若張氏者家不過編伍業不過牧圉一旦聞難其妻死之其二女死之其㓜方笄又刃而死一家死者四人焉吾以是知天理之在人心不可泯彛倫之在天下不可易無貴富貧賤等耳生不愛其身死孰計其名無所爲而爲之者也自夫人之沒今二十年矣唯宋氏謝氏嘗有列其事而見於紀載者他固寥寥然矣余於是取之附著於此其居不同鄉其生不同族其死義之心一也天下之爲人臣爲人子爲士君子者誰獨無是心其可徒歆動於節婦之風哉余雅辱交於淵故著明其義爲誄以泄其哀思焉節婦名眞張氏與淵皆􅌘縣人誄曰有猗者蘭兮繁霜其倅之有瑳者瑞兮烈火其熭之雖則熭之彼則遂之固天也卑之師山鄭先生哀詞汪仲魯師山鄭先生名玉字子美隱居講學善爲古文或以黃犢駕小車人或笑之識者奇之甞構精舍于里之師山其堂曰三樂踞岡爲軒曰極高明集諸朋游討論春秋筆削之旨爲之註釋曰春秋闕疑至正甲午朝廷用大臣薦遣使以翰林待制召先生起而拜命柬書就道道中疾作遂還山適大軍駐吾新安遭謗捕入郡不屈而死卒以節義顯名列史傳仲魯辱知愛者毎過山下仰睇群峯遺趾如昔草樹凄迷豈勝悲慨抽辭哀些敬酹一觴其辭曰遡練溪之寒瀬兮睇師山之崇崇仰三樂堂之遺址兮森莾莾之荒叢念昔松篁茂鬱兮奐堂構之方新友朋紛其來集兮濟冠佩之如雲繄先生之剛直兮懼師道之莫立也申義利之辨兮謂聖賢可企而及也春秋述而闕疑兮易經傳而有成釣岑山之深峻兮牧西疇而偶耕方遊息而玩樂兮遹四海之霆驚詔條降九重兮徴待制于翰林宜弭亂之有策兮闡治教於來今曷半途而遽疾兮返乎吾故鄉豈終不能以有逹兮孰若遂初心之遁藏慨浮雲之萬變兮亶不可測也名匪為身累兮義之歸乃吾責也情沉鬱而靡申兮蔽而莫之白也從容就死兮吾心安而理得也吁嗟先生旣徃兮節義昭猶日星名存史冊而不亡兮粤千古而彌馨徘徊玆山兮揉草木之群榮酹淸觴而灑涕兮惻林鳥之悲鳴夏尚之太史哀辭有序蘇伯衡我師克燕抜其知名士赴南京旣而其類軰復官王朝木史夏君獨以老病乞歸且歸㑹遣使分道搜訪元史乃强君如江廣君辭不得命乃行行至畨禺以疾卒二年冬十月十二日則卒之歲月也君名以忠字尚之世家袁州宋孝成㳟后父族也曾祖自得鄉貢進士受業番易陳克齋先生先生師徽國朱公其所緝問答語錄世傳焉自君以上皆世其學君蚤有譽于鄉年四十餘始用襲封衍聖公克堅薦授孔顔孟三氏子孫儒學正危公素之治田雄霸辟君以為副轉惠州教授改涿州照磨丙申秋燕都開設流寓科君入就試中其科擢翰林國史院編脩官調國子助教遷太史院都事方君田雄霸時伯衡北遊得一見君道上不聞問垂一紀比相見南京情誼之篤乃若乆要者間甞語伯衡曰吾自分老死于燕不復上先人丘墓去家時少子正年甫十二荐更喪亂家毋又死無誰爲教恒恐其失學隕先緒今名在俘籍不能卽死誠可愧然聖恩寛大旦夕且得歸守塋域教子讀書以終吾餘年可謂不幸之幸哉抑吾平生好爲詩多至千百篇兵後片楮無復存今雖耄矣歸訪故老於山椒水澨追惟疇昔江山人物睠焉若夫悲思感慨托聲詩以寄吾志亦安能已乎行當錄以遺子子爲我序之則我盛年之作雖不得齒猗那淸廟之什而吾衰莫之詞或者得與麥秀黍離竝傳焉嗟乎言猶在耳而君竟死矣此其有足使人傷悼也夫此其有足使人傷悼也夫乃爲楚歌以哀之辭曰嗚呼夫子之好脩兮胡遭時之棘艱飄風忽其烈烈兮白日薄乎西山服南冠之峩峩兮旅膚敏以南遷包羞而競進兮旣非余心之所安歛退而自放兮又縶維而莫余捐奉赫赫之明命兮備使价於炎方凌大江之浩淼兮道怱經夫故郷萍之川兮湯湯袁之山兮蒼蒼山川宛其如昨兮何世故之不常問遺民於舊墟兮慨星辰與木霜思少留而弗獲兮遂悠悠以南行歷大庾之嶔崎兮泝隴水之砅砰萑與莾其蓊薈兮羅蜮穴而臊腥神惝恍以內傷兮氣飲赩以外嬰曾日用之幾何兮竟䰟釋而蛻形嗟夙志之莫申兮卽長夜之㝠冥亂曰芝為蓋兮槿為輔仍子陽兮羅浮層城慌兮阻以脩不死之藥兮矧可求羌胡為兮海之陬颺轟轟兮為霾為雩叢薄黯黲兮有蛇兩頭海之陬兮不可以乆留䰟歸來兮無離郵晞汝髪兮臥龍洲洲之上兮鬱松楸䰟不來歸兮使我心憂弔唐應舉文迮雨先丹崖而死濠兮余不知其萬一後衆人而弔丹崖兮慨予懷其孔衋咸瞀亂以自底于亡兮鮮斯人之靡忒心正直而守經兮寄耝耰於豪墨旣謫佃于瞿相兮敢外耕以為食擯長裾而短服兮雜野處之恒農寒雨泣濇肌皺兮炎風扇毒而乾中悲天命之困窮兮萃多屯於厥躬韋柔不能以覬免兮胡剛儇之可容彼貪婪而獲戾兮不自靦其憧憧餘賄賕於胠篋兮傭彊予而猶豐顧吾室若縣罄兮瀕百死抑何愆祿固不充於區釡兮旤乃深於九淵笯祥鸞而就瘦兮肆跛鼈之跚跚思古人若或有之兮豈今兹之惟然幸不汚於掩骼兮子函骨而南還庻惰事之旣衰兮又將萃其遺編抑丹崖其不死兮文幾絶而復傳孰幽明之道阻兮諒斯言之不可宣哀唐衢辭有序王逹唐衢韓公退之同時人也性耿介落落有大志不妄與人交人亦莫知其所負衢於學發憤研究不少自廢然累舉不中人咸笑之衢則不以為意也衢能詩詩多悲思激烈而感創讀之使人慨然有動於中衢徃徃見人文章有傷激者必大哭涕泗滂沱而弗能巳毎與人言論旣別發聲一號音韻嗚切聞者莫不為之酸鼻人皆以衢善哭而不知其所以哭也獨退之識其人贈以詩曰虎有瓜兮牛有角虎可摶兮牛可觸奈何君獨抱竒材手把鋤犁餓空谷當今天子急賢良匭函朝出開明光胡不上書自薦逹坐令四海如虞唐退之之意詎非以衢之才逈出一世而反不建乎瑣瑣者邪樂天亦有詩曰賈誼哭時事阮籍悲路岐唐生今亦哭異代而同悲而樂天以誼之才方衢矣舊史附衢於退之傳後新史則又削之何君子之命薄者有若是之不偶哉吁有人負奇材如賈誼當世旣莫知之後世又莫知之不旣深可悲乎俾無退之樂天則天地間空生此材矣是以君子貴成人焉天游道者讀退之樂天二詩深嘆衢之不偶作哀辭於千載之下炷香盃酒酹衢於千載之上仰天大慟衢其知邪凄風西來吾知衢不能不知我心也辭曰蘭生於幽谷兮為衆穢之所翳玉産於崐㟠兮以碔砆為同類匪良玉之靡良兮寡不能敵衆嫭之聮勢衆勢之聮兮固巳密比而難攻此芳馨之潤㓗兮幸不掩於匠目之與春風衢乎衢乎爾材雖竒兮何造物之靡通但千載之下識衢之弘闊兮頼樂天之與韓公世之媕婀䜛嫉擠人於極地者讀二公之詩兮烏知其不額泚而心懜弔國使王翰林文張紞皇明建號之五年洪武壬子群雄耆定光嶽混合乃睠西南獨阻漸𬒳詔翰林待制臣禕為正使徃諭之時雲南元之庻孽梁王與漠北逋王聲勢相倚旣聞命依違不决越明年冬有使自漠北來待制公遂遇害又八年辛酉大兵南下踰年壬戌雲南平平之日紞備員政閫至則詢公之遺事知梁王禮貎公曁没後棺斂言與喻的斤合且知梁王柄臣逹理麻特加愛重距難前兩月匿公於春登楊氏庇之盡力比北使刼以危言始不克救及蓋棺時土人用浮圖法輿至地藏寺北漏澤園或曰小南門外祝之以火舊謂瘞大佛寺後者非是今再閱十有五年爲歳之丙子第二子紳仲縉來訪公殯思欲見之夢寐驗以血肉而陵谷巳非蹤跡無以致其情􅈤乃至就盡之所撫地長號載其諱字位望以歸紞弔于次仲縉泣且言曰紳在襁褓先子巳去家後有書自普定來以續大事記爲囑乃此行絶筆悁悁在心竟不得接其影響痛哉天乎夫何不孝至於此極也紞謹以禮慰之曰先王之制卽遠而至於墓送終之事盡矣故致孝者不于其體魄而享于廟廟之有主神之宅也今子迎神以返於義爲得况青春受謝白日昭只公之魂魄必有巳散而未盡者及此時而昭之宜其感而遂通不遠伊邇子又何恨仲縉因以公之家乗見示且請更有所言竊惟公以文名擅海内早歳薄遊迄無所遇此非才之不足也頋其内介而外方者有以齟齬焉其道難進其節不苟非養之有素者不能如此是以一旦渉異境蹈危機奮不頋身聞命卽行與頋婢子語不能休者異矣當其鑿空而徃䟦渉畏途猶拳拳焉以續大事記爲念夫大事記乃尚論古人贒否得失之言也書法精審炳炳知丹然則公之自處又豈有不審者哉故或人雖加蔽匿而義不苟免卒慷慨就死蓋公之致身委命不在於臨難之時而其平日固已判然於胸中矣嗟乎事之不偶乃期運之未至或機會之難合君子固有幸不幸焉若遽以成敗爲優劣則蘇屬國有媿於陸賈顔魯公與終軍不可同年而語矣其可哉紞卽弔祭遂申之以文曰訪前脩之遺烈兮在西南之天涯路澷澷其脩阻兮魂杳杳其曷追羅蕙有與桂醑兮集衆美以為儀藉芳馨以比德兮庻英爽之在兹公之貞潔世所信兮琢白璧爲肺腑濯江漢而暴秋陽兮肯自涴乎塵土製雲霧以爲錦兮又重之以黻黼擥星辰以耀芒兮宇宙軒豁其在手頋食焉而弗避兮斯大義之所存載使以馳騁兮徃振䇿兮南雲嗟期運之未至兮遇豺虎之狺狺彼徒知瓜牙之可以逞惡兮又安知天命之維新人固有一死兮死固各以其仁惜芝蘭之見兮終腐朽於荆榛委蟬蛻而不頋兮挾浮雲而上征駕雷車以飄忽兮引翕赫之霓旌逐飛廉而東鶩兮歷倒影以憑陵過蒼梧之曠漭兮謁重華而是正愛傳說之有託兮亦徘徊於箕尾望故鄉而掩涕兮予豈能獨眤夫山鬼吁嗟歸來兮公不可以乆留悵猿吟與鶴飛兮兩浩蕩而難儔將速返于故居兮寜爾字之深幽有子有孫善繼而善述兮長致享于春秋自述誄王偁王偁字孟揚其先東阿人宋寳元康定用兵西方士有沒于元昊者王氏遂爲西方人元有天下其地最後附賜姓唐兀氏高祖王父某從下江淮授武德將軍總管鎭廬州曾祖王父某祖王父某相繼襲爵改上千戸沒俱塟大蜀山下先府君某當愴攘以材用薦者調民職廬州路治中歷江西福建行省郎中至階朝列大夫潮州路總管當時稱廉吏第一人所涖政績卓異字惠小民攘剔豪右禮贒士植綱紀民奉以祠元運改旺度時不可為浮海去之道閩閩父老遮留退居永福山中為黄冠服者十年朝廷聘之恥爲二姓臣遂目引决嗚呼是時偁生方六齡家觳然壁立太夫人守節自誓艱阻備嘗手䟽先君之蹟與古今豪傑大略教之外王父姓劉氏諱某由宣文閣博士出僉閩憲再召入爲秘書丞沒王事贈嘉議大夫福建行省叅知政事其學淹貫靡不究博古好雅翰墨之妙絶當世偁不及見之閩先正聞過齋呉公學行醇偉爲士林望與先君交誼相與也先君沒時屬儞夫子教之第未弱冠夫子沒倀倀罔依歸頼外王父遺圖書手澤多杜門自研濿少多病負第者三年莫臻其至弱冠入庠序與陳君從範游陳蚤入閩過夫子室獲其指授懇懇汰其瑕礫示以瑜瑾一旦如發蔀矣洪武庚午賔興歳領薦方去海濵觀光上國會試禮部不利例入國子處縉雲朱先生館下日求齊曾士與談訪其遺風及四方之賢者而私淑之上表陳情乞終養高皇帝憫之南歸越震澤徘徊呉㑹間不敢留趍侍湯藥膝下始冀收其實而從範巳物故閩故老亦凋剥殆盡四睇毗落無可與語晚得晉昌林誌相與論學假以柯範抗顔為多暇則窮幽極深徜徉物表趣豁如也未幾太夫人捐館舍嗚呼居喪不敢渝禮旣合先君塋廬墓下者六年永樂𥘉元以推轂者至京師待命黄閣因自陳願處學校勵人材不允授從事郎史官翰林檢討進講經筵以文字供職時錢塘王洪擅詞垣與同官一見過相推重勑脩大典萃內外儒臣及四方韋布士毋慮數千人濫竽總裁之列大將軍英公覆征交阯辟居幕下於是泛洞庭浮沅湘歷九疑弔蒼梧徴兵南海旣而窮象桂道五管觀師于日南九眞之交時有賛勴大將軍待以爲揖客歸仍守其舊官先娶鄭氏新安人前名御史濳之孫女先卒再娶薛氏閩故族孝養于姑貞淑內得其亮生男一人振女子某一人其次男拱女子某一人側室李氏出也此族系出處之槩少銳志於有為毅乎思凖古以馭今而用弗以施學雖服群聖獵百家窮幽明亟於聞道而質淪憃杌遇登高弔古慨然發其悲壯愉樂一寓於文若詩而辭愧土苴其爲人則似䪥而容似傲而㭟家貧而心樂身困而處𥙿然疾惡太過遇權貴不能俛眉下之任情以直不能骩以徇人成功此其見短於世也見人善不啻若巳有之雖匹夫間未嘗不竭以盡與人交內外莫敢攜此則自以爲長焉若夫倇以爲終身之憾者齓失所怙哭吾父幾不能生粗知學而哭吾師如哭吾之父焉未幾哭吾友如哭吾之師比得祿而太夫人不逮養有子教之未立荷兩朝之恩而莫一舉報嗚呼况兹身繫縲絏西山東陵淆而未分孤臣之號庻女之慟南音之戚梁岼之章孰爲發之日者以支幹推定人禍福生死謂吾年日皆庚迪干丙歳在閼逄麗于鶉火其弗延矣嗚呼其果然邪孟子曰桎梏死者非正命也晝夜之理吾曷念之因述其系而極之以呼天之辭用自誄俾後之爲烏鳶爲螻蟻在陽侯在囘祿或返其遺骸或招其魂魄或藏其衣冠庻令有考者憫其志而哀之焉辭曰手槩觀夫古之人怙材者恒困於弗施志大者唯顚頓之屢躋嗚呼孟揚矧爾乏古之才而尚其志焉得不竒於時而諉於戾爾負而君爾負而親嗚呼誰其白之悠悠蒼天皇明文衡卷之九十五
