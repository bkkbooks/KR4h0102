body:
  text: 雜著牛李維州事胡廣洪容齋謂維州之事當時議者謂德𥙿賢於僧孺以今觀之則僧孺為得司馬溫公斷之以義利兩人曲直始分按吐蕃頑獷狡暴世為唐患屢盟屢叛非德之可懷信之可結維州之事竊有議焉自淸水劫盟兵臨近鎮上下震驚德宗欲出幸以避之自是用兵經費歲無虛日國計匱乏故德宗問李泌以復府兵之䇿泌對以屯田積榖致富強之術德宗喜泌曰未也臣能不用中國之兵使吐蕃自困德宗曰計將安出泌不對大意欲結回紇大食雲南與共圗吐蕃令吐蕃多備以牽制之知德宗素恨回紇故不對恐並沮屯田之議不行自吐蕃寇西川韋臯與東蠻兩林蠻連兵禦之屢捷屢勝吐蕃奔應西川南詔之不暇而寇河隴之迹漸稀此正與泌計相合至憲宗時雖嘗出寇亦鮮獲利穆宗長慶元年吐蕃寇靑塞堡鹽州刺史李文悅擊却之秋九月吐蕃遣其禮部尚書論訥羅來求盟以大理卿劉元鼎為會盟使入吐蕃與盟二年六月會盟之使未還即復來寇靈武寇鹽州自此不見再盟文宗太和五年九月吐蕃維州副使悉怛謀請降盡率其衆奔成都李德𥙿遣行維州刺史虞藏儉將兵入據其城具狀且言欲遣生羌燒十三橋搗西戎腹心可洗久恥事下尚書省集議皆請如德𥙿䇿獨牛僧孺曰吐蕃之境四靣各萬里失一維州未能損其勢比來修好約罷戍兵中國禦戎守信為上彼若來責曰何事失信養馬蔚茹川上平涼阪萬騎綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為况天子乎文宗以為然還其城執悉怛謀歸之吐蕃盡誅之於境上由此觀之則僧孺之謀誠過矣且維州本唐故地廣德元年陷入吐蕃韋臯屢攻取之而不能得悉怛謀一旦舉以還唐其來降之日又在吐蕃敗盟之後何失信之有僧孺乃以私憾沮德𥙿之功故繆以往日吐蕃入長安之迹恐愒天子使祖宗故地不復德𥙿成功不遂悉怛謀枉死負冤於無窮朱子於綱目特書曰吐蕃將悉怛謀以維州來降蓋深惜之也牛李是非如此其著溫公之言直牛而曲李者其意蓋有所為宋神宗在位喜於論兵冨鄭公嘗云願陛下二十年不可道著用兵二字溫公之意即鄭公之意也當西夏部將嵬名山欲以橫山之衆取李諒祚以降詔邊臣招納其衆公上疏極論以為名山之衆未必能制諒祚幸而勝之減一諒祚生一諒祚何利之有神宗不聽遣种諤發兵迎之取綏州費用六十萬西方用兵蓋自此始矣後城永樂夏人來爭喪師數十萬神宗臨朝大慟於是公言始驗公平生惟以和戎為念及得疾猶嘆曰四患未除吾死不瞑目矣其一以西戎之議未決折蕳與吕公著曰邉計以和戎為便然則牛李之論公云云者欲假此以抑要功生事之人矯當侍之弊不然牛李之事曲直甚明公何為曲李而直牛乎維州之論當以朱子綱目與致堂之説為當季布止伐胸奴單于嘗為書嫚吕后后怒召諸將議之上將軍樊噲曰臣願得十萬衆橫行胸奴中諸將皆阿吕后以噲言為然獨季布曰樊噲可斬也夫以髙帝兵三十餘萬困於平城噲時亦在其中今噲奈何以十萬衆橫行胸奴中靣謾且秦以事胡陳勝等起今創痍未瘳噲又靣諛欲搖動天下是時殿上皆恐太后臨朝遂不復議擊胸奴事布老將也故知用兵之利害使其亦如諸將之阿諛順旨則必騷動天下因布一言而止其為利慱哉史稱布為賢將其或以此歟武帝時王恢建馬邑之議韓安國屢難其不可使武帝然安國之論則邊釁無由而起衛霍無功之可紀後亦必無輪臺之悔矣劉給事唐代宗永秦元年㒒固懷恩訜回紇吐蕃雜入寇下詔親征魚朝恩欲奉代宗幸河中以避吐蕃恐羣臣議論不一百官入朝朝恩從禁軍操白創宣言曰吐蕃數犯郊畿車駕欲幸河中何如公卿皆錯愕不知所對有劉給事者獨出班抗聲曰敕使反耶今屯軍如雲不戮力扜寇而遽欲脅天子棄宗廟而去非反而何朝恩驚沮而退事遂寢劉給事當倉卒之項而能抗辭以折權幸使之驚沮真大丈夫哉視當時之公卿閉口錯愕者誠可羞也惜乎史失其名不知為誰千古之恨楊雄曰齊魯有大臣二人而史失其名箋杜詩者謂黃四娘者獨何人哉因此以託不朽世間幸不幸類如此劉給事言存而名泯其幸歟不幸歟陳平用陸賈之謀陳平輔髙祖定天下六出竒計無一不效及諸吕擅權欲危劉氏平燕居深念計無所出及見陸賈問䇿賈令與太尉深相結為畫吕氏數事平用其計乃以五百金為絳侯夀厚具樂飲太尉太尉亦報如之兩人同心協謀卒成滅吕安劉之功者賈之謀也平豈智於前而眛於後乎當事機未決或思慮過當而反惑乎平當危疑之際不自用而取人之長以成事功此所以為賢也平嘗順后之旨以王諸吕豈亦賈䇿使平陽以計紿之得以成吾謀乎不然平之深念專在滅吕其肯以髙祖之業輕以許人乎使平真阿吕后者賈必知之又安肯為平畫計乎張湯杜周有後語曰仁者必有後張湯杜周俱為酷吏然皆有良子爵位尊顯繼世立朝漢之元勳儒林之後乃有不如其故何哉班孟埾謂湯推賢揚善固宜有後者周之迹絶無一行之可舉其有後又何也史載湯決大獄欲傳古義乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑必奏先為上分别其原上所是受而著讞法廷尉挈令揚主之明湯用儒者議疑法豈於是而有隂惠及人者乎其有後者蓋由於此周無一善之可𫐠但上以其盡力無私若然亦宜有後矣世疑湯周不當有後而皆有後故采托其美而論之所可見者如此而已不然湯之子安世周之子延年見其父行之繆修德礪行為漢名臣足以蓋其父之惡安世之子延夀廷年之子欽又能世濟其美後之繼隆或不係於湯周而本於此歟張騫張騫貪一身之利為漢使月氏經大夏復事西南夷通烏孫鑿空西域啓武帝窮兵之欲者實騫之通也班固於其贊略無一語及之但云禹本紀言河出崑崙崑崙髙二千五百餘里日月所相避隱為光明也自張騫使太夏之後窮河原惡睹所謂崑崙者乎斯言於騫何有哉豈責其逺使詳於卭竹杖蜀布而遺於其大者乎抑豈不責騫而為漢諱乎不然騫不足貴耳公孫弘節儉汲黯謂公孫弘位在三公奉祿甚多然為布𬒳此詐也以本傳觀之弘常稱人主病不廣大人臣病不節儉又其身食一肉脫粟飯其躬行節儉蓋亦素性然也年八十終于相位漢之公卿多由奢縱取敗有如弘之節儉必能保其富貴弘之行亦可以厲俗故元始中修功臣後下詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫弘者位在宰相封侯而為布𬒳脫粟之飯奉祿以給故人賔客無有所餘可謂減於制度而率下篤俗者也與內富厚而外為詭服以釣虛譽者殊科夫表德章義所以率世厲俗聖王之制也其賜弘後子孫之次見為適者爵關內侯此又可見漢之重節儉而薄奢靡故特表章弘以敦厲風俗厥後若唐尊失身以仕王莾封侯貴重位歷公卿衣敝履空以瓦器飮食𬒳虛偽名其亦與弘異矣何足道哉東坡祖黃生説東坡武王非聖人之説蓋本於漢儒黃生黃生曰湯武非受命乃殺也轅固曰不然夫桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂桀紂之民弗為使而歸湯武湯武不得已而立非受命而何黃生曰冠雖敝必加于首履雖新必貫於足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫主有失行臣不正言其過以尊天子反因過而誅之代立南靣非殺而何故東坡曰武王非聖人也孔子蓋罪湯武歷稱堯舜禹有不足於湯武也又云孟軻始亂之曰吾聞誅獨夫紂未聞弒君也自是學者以湯武為聖人之正皆孔氏之罪人也斯言竊為未當論語於篇終歷敘堯舜禹以及湯武孔子何嘗不稱湯武觀易革之彖曰湯武革命順乎天而應乎人孔子何嘗不足於湯武所謂順天應人者豈虛言乎又謂武王伐紂誅其君夷其社稷諸侯必有不悅者故封武庚以慰之有不得已焉耳此蓋戰國相傾之術曾謂武王而為之乎當牧野之誓諸侯不期而會者八百天下固已叛紂歸武王矣雖賢如三仁知殷之必淪喪紂之必亡亦末如之何也已矣苟使天命未改人心不去雖封百武庚又何足以慰悅殷之故家遺民哉封武庚者蓋武王公天下之心非為私也湯武之迹孔孟言之盡矣不待辨而明第東坡之論如此恐後來學者惑於其言故略舉其概以破其説黃生不師孔孟而立異論東坡何為而師其説歟或曰東坡假此以彰荀彧之美甚曹操之惡以武王為非聖人則曹操其鬼魊矣雖然曹操何足論以彧身為漢臣為操畫謀以贊其業及篡奪之形已著方詭異論以自釋其自殺也宜矣何足取哉易卦周易爻辭凡吉凶悔吝皆戒占者人能反求諸己則其應驗有如影響第占者以吉為在己凶為在人往往不應則歸神於蓍龜誤矣昔漢武帝伐胸奴易之卦得太過爻在九五其繇曰枮楊生華象曰枯楊生華何可久也太卜謂胸奴破不久也皆以為吉乃遣二師將軍李廣利伐胸奴軍敗而降武帝歸咎於卦兆反繆當是時使太卜能云所兆在巳阻武帝不遣二師則必無喪師降將之恥而卦為可徵矣噫蓍龜斷之明矣而用之者失其意往往如斯唐太宗征髙麗唐太宗𥘉征髙麗諌議大夫禇遂良曰陛下指麾則中原淸晏顧盻則四夷讋服威望大矣今乃渡河逺征小夷若指期克捷猶可也萬一蹉跌傷損威望更興忿兵則安危難測矣及上欲自征遂良復上疏以為天下譬猶一身兩京心腹也州縣四肢也四夷身外之物也髙麗罪大誠當致討但命二三猛將將四五萬衆伏陛下威靈取之如反掌耳今太子新立年尚幼稚自餘藩屛陛下所知一旦棄金湯之全踰遼海之險以天下之君輕行逺舉皆愚臣之所甚憂也上不聽時羣臣多諌征髙麗者尉遲敬德亦上言陛下親征遼東太子在定州長安洛陽心腹空虛恐有玄感之變且邊隅小夷不足以勤萬乘願遣偏師征之指期可殄上不從及後出師無功乃深悔歎曰魏徴若在不使我有是行也命使祀徴復立所仆碑觀遂良敬德之諌如此太宗苟能聽之未必不善又何必魏徴之言是思乎竊謂使魏徴若在太宗亦必不能從其言方遂良初諌時李世績即曰間者薛延陀入寇陛下欲發兵窮討魏徴諌而止使至今為患嚮用陛下之䇿北鄙安矣上曰然此誠徴之失朕尋悔之而不欲言以是知徴雖在太宗必不從其言也范氏謂帝知過能悔此其所以為賢使果為悔過賞遂良敬德之言何必更思魏徴所以為此説者帝於徴報之薄矣中心豈無慚忸故借此以樹仆碑撫其妻子耳豈真思其言乎若帝真有悔心自當斬然決絶於東征之念矣何故連年不已啓房玄齡臨終之諌與徐充容閨闥之疏乎由此觀之曷有悔過之實積釁蓄忿久而不解至于髙宗纍歲用師方始平之然小夷雖衰而中國之經費亦不可勝計矣何足補哉或曰太宗之思魏徴玄宗之思九齡事異而情同曰是不然玄宗之思九齡蓋出乎中情太宗之思魏徴蓋矯情耳蕭何聽計漢三年漢王與項羽相距京索間上數使使勞苦丞相何鮑生謂何曰今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大悅五年陳豨反上自將至邯鄲而韓信謀反關中吕后用何計誅信上聞使使拜丞相為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨弔謂何曰禍自此始矣上暴露於外而君守於內非被矢石之難而益君封置衛者以淮隂新友於中有疑君心夫置衛衛君非以寵君也願君讓封勿受悉以家私財佐軍何從其計上説其秋黥布反上自將擊之數使使問相國何為曰為上在軍拊循勉百姓悉所有佐軍如陳豨時客又説何曰君滅族不久矣夫君位為相國功弟一不可復加然君初入關本得百姓心十餘年矣皆附君尚復孳孳得民和上所謂數問君畏君傾動關中今君胡不多買田地賤貫貮以自汙上心必安於是何從其計上乃大説按何處危疑之地岌岌乎殆哉賴鮑生召平之言易危為安易疑為信不然則何之禍可立而待矣使韓淮隂有此二客則必不至於夷滅惜乎獻計以斬鍾離昧與夫蒯生三分天下之計皆不及此然則二客者亦豪士哉韓信為將韓信擊魏問酈生魏得無用周叔為大將軍曰柏直也信曰竪子耳遂進兵擊魏虜魏王豹定河東觀此則知信之善為將矣何也夫兵力不患不敵惟患將之與吾敵也兵法曰凡戰之要必先占其將而察其才因形用權則不勞而功舉信知柏直為將始輕其無能遂進兵成功使魏當時用周叔為大將則信必不敢輕進又必思所以敵之縱能破魏亦必費力不至若此之易周叔雖不見其事迹蓋必能將也雖然信雖輕柏直猶用疑兵設伏以計襲破之其肯真易柏直為竪子徑前而與之摶鬪乎始而問將繼而用計終而破敵成功審彼審己而後動及其破趙窺知趙王成安君不用廣武君之䇿乃敢引兵遂下使成安君能用廣武君之䇿則信必不敢輕度井陘之險又安能有泜水之勝乎觀其戰勝攻取鮮不用計此之所以為善將也後之人舉知信之為善將而不知求其所以為善將之道往往不能如信之必勝而多取敗也記徐元張旺史整紹興十九年冬完顔亮戕其主亶明年營都燕山二十九年又治汴京漸謀南侵三十年春東海民徐元張旺史整共起義師以帛書求援於宋宋守盟約不敢報元等嬰城半年虜師水陸夾攻破之誅戮極其慘酷亮由是益疑宋得中原心決䇿入寇起蕃漢兵二十七萬傔人不預焉倣唐制分二十七軍明年自將巡洛至汝遣髙景山王全來求釁此周益公文集所載而宋史紀不見陳桱通鑑續編載金東海民張旺作亂使徐文率舟師平之常慨宋失中原忠義之士嬰城固守力竭城陷並遭屠戮者何限如徐元張旺史整之徒志本為宋乃不能救又不得一書干史以見其起義之忠而乃書曰金民作亂使千古之下負冤受抑何由獲伸桱之書法大抵若此有不可憑要當以益公所記為定因表著其事以雪元輩之柱雀餳宋杜鎬博學有識為翰林侍讀學士時都城外有墳莊一日若甘露降布林木子姪輩驚喜白于鎬鎬味之傪然不懌子弟啓諸鎬曰此非甘露乃雀餳大非佳兆吾門其衰矣踰年鎬薨繼有八喪廣謂甘露者至和之所感召此為上瑞若人家有之矣亦雀餳之類耳東坡與李方叔詩記胡儼宋元祐中蘇東坡知貢舉屬意李方叔令其子叔黨持一簡與方叔值方叔出僕受簡置几上偶章惇子持援來訪取簡竊視乃劉向優於楊雄論二篇援兄弟徑持去坡亦入院李方叔不知也既而就試果出此題二章倣坡意為之援遂中第一人持第十人坡𥘉意第一人必方叔及揭榜乃章也徒為之悵然方叔毋嘆曰蘇公知貢舉吾兒下第命也坡既出院以詩寄李有云平生浪説古戰場過眼空迷日五色蓋亦解嘲云耳其詩真迹今在南昌李士廉家與徐鉉書稿及張即之手帖共為一卷字畫皆可愛也米黃書記昔潘谷病目謁黃山谷山谷以囊墨詰之谷初探一囊摸索曰今不可得也問之曰此承晏軟劑也又探一囊曰此谷二十年前作今亦不能為矣山谷曰得無假鬼神邪谷曰非也熟之而已山谷遂書以贈谷字徑三寸餘筆皆戰掣法至今三百餘年光采尚燁然照人及米元章海嶽菴四詠其字亦太書險徑飄逸尤為竒絶皆在友人胡思中家誠可寶也虞文靖公知人元史虞文靖公傳載馬伯庸欲薦光州人龔伯璲邀公署薦章公以其小材不可且言其人必不能終伯庸甚不樂及公以草詔事退歸伯庸實倡導之也後龔敗果如公言人服其明智今又嘗聞熊伯幾先生言初危太朴以文學徴起聲名橎于朝野士君子皆想望其風采諸門人問於文靖公曰太朴事業當何如公曰太朴入京之後其辭多誇事業非所敢知復曰必求其人其余闕乎時闕名未甚著門人曰何以知之公曰集於闕文字見之後闕竟以忠義顯乃知前輩觀人自有定鑒虞揭詩記虞文靖公嘗作范德機詩序有云當時中州人士謂淸江范德機浦城楊仲弘豫章揭曼領及集四人詩為四家且以唐臨晉帖喻范百戰健兒喻楊三日新婦喻揭而集為漢庭老吏序出適揭公歸省墓見之大不悅遂往臨川訪虞公既相見言及茲事且曰徯斯與公京師二十年未嘗蒙公一言及斯何别後乃爾虞公曰誠有之非集之言中州人士之言也非惟中州人士為然亦天下之通論也揭公咈然遂即席辭别虞公堅留不得竟駕小車而還既别去數日揭公乃以天曆年間祕閣開四詩寄虞公中有夸章分署隔窗紗學士詩成每自誇之句蓋為虞公發也公得詩謂諸門人曰揭公此作甚佳然才力竭巳就以所寄詩題其後答云今日新婦老矣後因送人有寄揭公云故人不肯宿山家夜半驅車踏月華寄語旁人休大笑詩成端的向誰誇未幾揭公趣召至都竟以疾卒此得之陳維新云維新豫章才子也薩天錫詩記元薩天錫嘗有詩送欣笑隱住龍翔寺其詩云東南隱者人不識一日才名動九重地濕厭聞天竺雨月明來聽景陽鐘衲衣香暖留春麝石鉢雲寒卧夜龍何日相從陪杖屨秋風江上採芙容虞學士見之謂曰詩固好但聞聽字意重耳薩當時自負能詩意虞以先輩故少之云爾後至南臺見馬伯庸論詩因誦前作馬亦如虞公所云欲改之二人搆思數日竟不獲未幾薩以事至臨川謁虞公席間首及前事虞公曰歲久不復記憶請再誦之薩誦之公曰此易事唐人詩有云林下老僧來看雨宜改作地濕厭看天竺雨音調更差勝薩大服而去此得之熊伯幾先生云鐡柱詩記豫章鐡柱宫井中鐡柱相傳為晉許旌陽鎮蛟之柱歷代名賢多有題詠熊朋來詩曰九牧失貢金司空不行水蛟龍弄波濤魑魅入城市吁嗟清談晉萬事謾不理遂令千載人稽首旌陽子正言反應辭簡意高虞學士詩曰老龍無意弄新波化作鳧翁倚柱歌點石神方寧復得沉沙遺戟不堪磨汾隂鼎鼐千年出海底珊瑚百尺過誰在蓬萊期劫外下騎黃鵠一摩挲此詩初出人皆未喻其旨公曰此柱未敢必為旌陽之物故詩意皆設疑辭以問之先伯父嘗云鐡柱詩甚多獨熊虞二公之詩超於衆作譙樓盡角三弄記儼幼聞諸伯父虞部府君曰世之鼓樓曰譙樓者謂門上為髙樓以望也盡角之曲有三弄乃曹子建所撰其初弄曰為君難為臣亦難難又難次弄曰創業難守成亦難難又難三弄曰起家難保家亦難難又難今角音之嗚嗚者皆難字之曵聲耳所以使人昏曉之間燕息之際聞之有所警發也至唐節度使辭日賜雙旌雙節行則建節立六纛入境州縣立節樓迎以鼓角今州郡有樓以置鼓角必會府而後可非受方靣之任而置鼓角皆僭也寫韻軒滕王閣望湖亭詩記諸才子侍虞公宿寫韻軒道士因出卷子求題公賦二律其一云翩翩仙子藥王山明月高樓遂不還天外修眉塵鏡掩窗中遺墨夜燈間雪深黃竹歸無所雨暗蒼梧淚更班何啻浮雲相契合窅然餘迹謾人間其二曰仙人本自好樓居深下重簾寫韻書江上數峯千仞表硯中微露九秋餘下方鍾鼓塵𥘉靜絶世文章事不虛最愛夜涼天闕近綺窗留得玉蟾蜍題卑辛好禮諸人問曰西江登眺之所據江山之勝無踰於滕王閣望湖亭二處公不知其幾過皆不留題何也公曰諸公曽見東坡及僧晦幾詩否皆曰見公曰請與諸公誦之晦幾滕王閣詩云檻外長江去不回檻前楊柳後人栽當時唯有西山在曽見滕王歌舞來其第一句長江去不回往事不可問矣第二句檻前楊柳亦是後人所栽第三句第四句謂當時曽見滕王歌舞者唯有西山在耳含無限之意寓無窮之感東坡望湖亭詩云黑雲堆墨未遮山白雨跳珠亂入船驀地風來忽吹散望湖亭下水連天隂陽變化關機開闔於頃刻之間且氣雄語壯所謂吞雲夢者八九二詩皆不可及是以不曽有題明日公與諸人登滕王閣即席賦律詩若干首及一絶句余幼時能誦之今但記其三律與絶句耳其一曰高閣城頭戶牖開江中照見碧崔嵬文章誰復三王後雲氣長從五老來畫角數聲南斗落白鹽萬斛北風回洲南先有蛟龍窟怪得詩成急雨催其二曰天寒江閣立蒼茫百尺闌干送夕陽歲久魚龍非故物春深蛺蝶是何王帆檣星斗通南極車蓋風雲擁豫章燈火夜歸湖上雨隔鄰呼酒説干將其三曰危樓百尺倚闌干滿目青山不厭看空翠逺凝江樹小落霞飛送酒杯乾千年劍氣侵牛斗半夜天香下廣寒我欲乘鸞朝帝闕五雲深處是長安絶句云豫章城上滕王閣不見鳴鑾佩玉聲惟有當時簾外月夜深依舊照江城昔人云詩不可苟作觀公之意可見矣此得之吳用中云上下四方記洪容齋云上下四方不可窮竟正雖莊列釋氏之寓言曼衍不能説也列子商湯問於夏革曰上下八方有極盡乎革曰不知也湯固問革曰無則無極有則有盡朕何以知之然無極之外復無無極無盡之中復無無盡無極復無無極無盡復無無盡朕是以知其無極無盡也而不見其有極有盡也焉知天地之表不有大天地者乎大集經風住何處曰風住虛空又問虛空為何所住答曰虛空住於至處又問至處復何所住答言至處何所住者不可宣説何以故逺離一切諸處所故一切諸處所所不攝故非數非稱故是故至處無有住處容齋以為二家之説止於如此而已余嘗觀程子邵子問答有天何依曰依乎地地何附曰附乎天天地何依附曰天地自相依附又朱子門人有問六合之外當時何物先生曰人生天地間且只理會天地間事此語最善彼釋氏又有所謂水輪風輪之類亦幻語爾元二辨後漢鄧隲傳隲拜大將軍時遭元二之災章懷注云元二即元元也古書字重者多於上字下作小二字以取便爾洪容齋隨筆中乃引王充論衡恢國篇曰今上嗣位元二之間嘉德布流為證謂元二為元年二年也遂自述在史館修欽宗紀贊曰遭靖康元二之禍實本諸此余考漢書文紀有元元之民師古曰元元善意也又光紀有下為元元所歸注謂黎庶猶言喁喁論衡元二之間亦是謂嘉德布流於元元之間容齋偶未詳耳而趙明誠謂元元語殊不可讀何也杜詩阿咸辨杜子美杜位宅守歲詩首句云守歲阿咸家注者云咸一作戎乃晉王戎昔阮籍與戎父渾為友嘗謂渾曰共卿語不如與阿戎談黃鶴謂杜位乃公之從弟不應用父子事善本作阿咸東坡與子由詩云頭上銀幡笑阿咸又云欲喚阿咸來守歲林烏櫪馬鬪喧譁正用公此詩也余嘗觀南史齊主思逺小字阿戎王晏之從弟也淸介有識鑒隆昌之事嘗規切晏及晏貴盛與思逺兄徴曰隆昌之際阿戎勸我自裁若如阿戎言豈得有今日徴曰果如阿戎言尚未晚也晏大怒後果及禍子美詩用阿戎蓋出於此注者不考遂定為阿咸豈不知阮咸籍之姪亦與兄弟之事不相當而東坡於子由偶誤用爾何必據以為證邪又嘗於內閣見子美親書贈衛八處士詩字甚怪偉驚呼熱中腸作嗚呼熱中腸然則杜詩謂善本而其中之誤者豈止阿咸而已哉皇明文衡卷之五十五
