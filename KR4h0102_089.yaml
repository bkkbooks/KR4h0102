front:
  text: 皇明文衡卷之八十九
  hash: sha256:14b3ed2d43a19c9fbc9a217acbcbc5688606c40d94310f9eeec105dd6369993d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_089-1a}
body:
  text: 墓誌銘漫士高先生墓銘林誌永樂二十有一年二月三十日翰林典籍漫士高先生廷禮卒于南京之官舍年七十有四其子熟還襯以葬于長樂縣崇丘里之半占山使致韓府長史楊曜宗狀來北京俾某為詞將以刻焉先生愽學能文尤雄於詩雖談笑奮筆而精思力摹莫及蓋詩始漢魏作者至唐號為極盛宋失之理趣元滯於學識而不知由悟以入自襄城楊士弘始編唐音正始遺響然知之者尚鮮閩三山林膳部鴻獨倡鳴唐詩其徒黄玄周玄繼之以聞先生與皆山王恭起長樂頡頏齊名至今閩中推詩人五人而殘膏䞉馥沾漑者多黃終于校官周顯行曹員外郞先生與皆山竝以詩遇今上初二人自布衣召入翰林皆山卽除典籍卒先生爲待詔九年始陞典籍平生賦咏流傳海内有藁曰嘯臺集曰木天淸氣集母慮千餘篇其選唐詩品彚九十卷拾遺十卷議者服其精博能書工畫時稱三絶書得漢隷筆法畫原於米南宫父子出入啇高間方壺子畫妙貞一初識先生稱賞不寘曰異時當爲名家在翰苑二十年四方求詩畫者爭致金帛脩餼歳常優於祿入神瑩氣融襟懷高簡善飮酒喜談謔與人無賢愚新故盎然如一素彊無病晩得風眩疾歲輙發無甚苦一日與故人飮極懽夜分乃寐旦忽眩作弗能言卒考諱駒淸才不覊蚤世謚皎白居士妣陳氏宋樞宻使洽之孫先生事母孝謹年五十七方貴未幾而母没娶陳氏先卒葬得佳兆虚右壽藏三十四年乃合塟三子曰熊曰熟曰然五孫曰箕曰唐曰黙曰堅曰莆城先生諱棅字彦恢仕名廷禮漫士其號也實宋尚書張鎭之後曾祖麟以出莅高氏祀復無于取猶子隆爲後遂從高姓是爲先生之祖系曰吳航山川蜿蟺抉輿是生偉人間氣之符嘯風嘘雲山含川嚅乾文坤象隨厥吐舒金石鏘鳴琚珩拱趨他人戞戞已獨于于上追杜李高岑爲徒畫船烟埃石經玄圃精聚神交􅸵無今古三絶何資一官而旅春夢芸臺晚心棋墅龍門其居樓曰翫宇落月綺裘淸風玉塵鴻儀㝠㝠蝣羽楚楚其神天游而蛻兹土國子愽士羅先生墓誌銘周叙國子博士雪菴羅先生致事家居之十有三年年八十二卒卒後十有四年其從子脩齡以義民謝恩至京師乃持刑部郞中致事朱君邦紳之狀屬文誌諸幽且曰曩少師東里楊公歸榮故鄕時先生嗣子世文嘗造謁乞銘公諾之未暇也玆來公方在病前諾恐不敢遂願以爲請叙惟先生文學足以淑後進德行足以表當世出處進退之節足以追配古人高年宿望邈焉寡儔宜得如少師者執筆頋叙敢當斯寄辭焉而脩齡之屬益堅憶永樂初元侍學家君大學時先生官學録家君官學正同官同舍相處幾五年家君恒前輩事之叙亦獲承敎焉六舘中求如先生者不二三人也蓋知之深莫叙若矣於是忘其鄙陋序次之曰先生諱恢字師程姓羅氏世爲吉之永豐人以族望於鄕郡曰湖西宋末武岡敎授開禮勤王死難丞相文公制服爲文祭哭之事載史傳其六世祖也曾祖廷植祖建徳父伯禹俱業儒世其家先生自㓜頴敏五歲失恃旣丱力學居父喪哀毀骨立襄事唯謹事兄如父敬愛篤至鄉里化之洪武癸酉領撫之崇仁儒學司訓聘嚴師弟子禮勤於化導凡經造就者悉得爲聞人嘗上䟽言孔子廟庭從祀當以道學論當時有若優於宰予論語記有若言行者四皆有禆於世教記宰予者亦四皆見責於聖人宜以有若居十哲位次而宰予居兩廡公伯寮沮壞聖門不宜從祀蘧伯玉孔子之故人行年六十而化今居兩廡六十位次之下未當宜例陞啓聖王廟䟽奏不報其持論正大多類此秩滿膺薦入史舘與纂脩太祖高皇帝實録竣事賜白金文綺陞國子學録師範端嚴道德益高前後相繼受業者千餘人永樂𥘉太宗文皇帝幸太學受襲衣之賜滿考遷愽士又六載以年七十陳乞致事時車駕廵幸北京仁廟在東宫監國朝臣致事者率未得請為遣使上聞得旨俞允時論高之司業吳公嘗游先生門率六舘寮屬諸生數千人祖送之觀者塡道時人莫不爲先生榮旣歸謝絶城府迹曰與宗戚故人優游山水觴詠之適而詩書之訓考索之勤未嘗少廢間與族弟某掇拾先世遺文曁族譜考訂脩輯梓刻以傳於家事澹然弗顧也先生德性忠厚儀矩端莊望者敬畏孝於奉先遇忌辰時祀輙感愴泣下誠於接物於人無踈戚長㓜言行表裏如一一日忽召子孫語之曰吾今日覺神不守舎吾其將逝乎時天𥘉曙令啓戸視之有頃而終平生遺槀有居田録冩心稿歸田録藏千家其養氣之功蓋如此其生以元至正庚寅二月一日没今宣德辛亥十一月廿三日以没之歲十二月某日葬撫之樂安四十二都大塘拗祔先兆也母王氏繼母劉氏知溧水縣劉鈍菴之女俱有賢德配蘇氏内行克備先十年卒子一人世文孫男三人轅輗䡄孫女一人曾孫男九人時暁㫰曛昕昪暟昇旵玄孫一人瓘銘曰顯允羅氏代有聞人粤宋季世武岡益振興師勤王復其鄕縣烈烈忠精之死不變猗歟先生武岡裔孫再振厥華有德有言起敎黌宮登薦舘閣羣材彚興直筆輝焯亦有奏䟽聖門示評言雖弗試大義孔明遷秩成均十年乃調赫赫文名翼翼師表仕豈論達道高者稀年至乞身超然其㱕豈無㱕者壽考能幾先生家居黃髪兒齒優游泉石八十二年令德考終淸風穆然嗟予小子敢當銘誌庻幾後來有考其世故資政大夫靖江相府右相李公墓誌銘陳璉公諱質字文彬號樵雲姓李氏其先開封祥符人在宋季有仕于德慶者因家焉公生頴悟有大志蚤知嗜學經史子集無不讀讀輙記憶旣長遭元季多故與時落落不合遂家居不出日與弟文昭放情山水以詩酒自娛居無何中原優攘嶺海多事公起搆義兵捍鄕里及德慶路䧟士民遑遑無所依戴推公入守之日夜浚城隍繕甲兵扼險要以遏他冦由是一路頼之以寕時㨿鄕邑者多刻剝殘忍公嘗戒麾下非遇敵母妄殺或執敵人來獻率給衣粮縱之家雖富饒急於賑施三族與鄕里流寓之貧者咸有所仰以故一時名士如建安張智茶陵劉三吾江右伯顔子中羊城孫仲行王彥舉皆聞風來㱕及大明皇帝定鼎金陵遣師南討洪武戊申四月平章廖公永忠叅政朱公亮祖總師至公遂散麾下全城㱕附總兵遣使入奏上嘉公忠誠召至慰劳再三賚予優渥就擢中書断事越明年己酉轉都督府㫁事階奉訓大夫皆能執法丞相都督咸敬憚之五年壬子授刑部侍卽階中順大夫尋陞本部尚書階嘉議大夫尤愼於刑獄盡哀憐之情致淑問之頌寛猛適中爲上所知日益親幸時開行省於浙江上念厥地素重號稱難治宜簡廷臣有德望才噐者徃綏之卽拜公浙江行省叅知政事階中奉大夫是年秋九月也下車首以承流宣化爲己任振紀綱正風俗勸農桑興學校舉遺賢卹民隱知無不爲爲無不力居三年惠流兩浙厥績以懋聲聞于上天子念公老召還致政于京師嘗入見賜坐便殿訪以時政得失直言無隱上益重之八年乙卯冬十月復起爲靖相府右相階資政大夫有勑奨諭甚至公益思竭誠以盡輔導之職嘗入覲因奏乞㱕省先隴上可其請王親揮翰賦詩以賜復命藩憲元僚與府中官屬宴餞漓江之滸人莫不以爲荣後王坐事去國公随終焉公羙風儀性孝友治家有法接人以城雖極顯融情素冲淡暮年尢工於詩有樵雲集若干卷生於元延祐丙辰三月十一日卒於洪武庚申閏五月某日初權厝金陵聚寳山後某年某月某日歸葬鄕之淸秀里布山之原祖廣孫累贈嘉議大夫禮部尚書父熈春累贈中奉大夫浙江行中書省叅知政事祖妣孔氏贈淑人妣林氏贈夫人公凡三娶先梁氏次石氏俱贈夫人汪氏封夫人弟文昭學識優長隱德弗耀子四人曰恒曰震曰復曰頥皆知學好禮惟震有詩名孫男四人公瑾公瑜公瓛公玖女三人梁仕貞梁明理嚴公敏其壻也孫女二人次第公之行實來速銘者卽震也於戲自元綱解紐海宇兵爭乗時奮者莫不剝下自封樹威肆毒少知推一毫為利人事公能仁其族屬以及於衆視彼之暴豈直相萬哉及一時與公全城來歸者鮮克有終惟公踐歴中外官至卿相忠義著朝廷聲名滿天下勲垂竹帛德在人心五福備膺子孫蕃衍非先世積善之深公存心之厚何以臻於是耶銘曰嶷嶷李公世爲粤人積善旣乆鬱而未伸族大而蕃實自公始值元鼎沸保障鄕里公之庇民如室斯宇公之好賢誠出肺腑聖明御曆威讋四夷公散其徒全城來歸帝嘉厥誠錫以祿秩㝷陞秋官克殫忠赤後叅大政于浙之中威德交孚聲聞上聦致仕于朝出于寵渥時有敷陳多所裨益逮居相國有諤其言直雖不容此志則完之身云亾之德弗替慶流綿綿式延後裔清秀之里布山之阡勒銘貞石垂羙萬年明故榮禄大夫少保户部尚書兼武英殿大學士謚文簡黃公墓誌銘陳敬宗榮禄大夫少保戸部尚書兼武英殿大學士黃公旣致政壽八十有三以正綂十四年六月三日終于正寢其仲子中書舍人采奉翰林修撰周公旋所述事狀致書於予而以墓銘相屬敬宗門生也安敢以不敏辭按狀公諱淮字宗豫別號介菴溫之永嘉人其先世諱衮者仕宋御史檢法歷世皆有文學之官至諱通者公之祖也通生性字思恭公之父也元季方國珍據于溫思恭懼玷偽官遂遁跡不出退號静菴妣王氏公自㓜卽有經世之志年十二鄕學師命賦荷花十四充邑庠弟子員臬司官命賦挑燈杖詩語皆出奇驚人於凡經史性理之學儕軰罕能及者遂中洪武丁丑進士二甲除中書舎人勤愼周宻於職務無所不舉歲壬午太宗文皇帝入正大統首蒙召見訪以大政深稱意㫖卽命入翰林凡侍朝特命解公縉與公立于御榻之左以備顧問上以萬機叢脞日御奉天門左室毎夕召公語至夜分上或就寢則賜坐榻前論議機宻雖同列不得與聞已而命居内閣專掌制勑又選胡公廣楊公士奇楊公榮金公㓜孜胡公儼與之同事是年秋陞公編脩繼陞侍讀永樂改元之明年甲申二月㑹試天下士上命解公與公為主考得曽棨等四百七十二人徹棘入覲上以得才之多為之甚喜上欲立東宮宻預問公公曰立嫡以長萬世王法上意遂决三月冊立皇太子命公爲左春坊左庻子兼侍讀賜袍笏寵眷日隆丁亥陞右春坊大學士仍兼侍讀進講東宫啓沃良多復勑兼輔導皇太孫戊子上巡狩命公及尚書兼詹事蹇義金忠諭德楊士奇留守諭之曰朕留汝四人居守猶唐太宗簡輔弼監國必付房玄齡卿等其識朕意已丑春車駕啓行明年庚寅車駕親征胡虜適長沙妖人李法良作亂皇太子命豊城侯李彬率兵勦捕而漢王設疑沮之皇太子以問公公曰豐城老将必能成功兵貴神速宜亟遣以掩其不備旣而法良就擒一如公言公以疾在告皇太子命内臣問安復遣院判蔣用文視醫手書畧曰卿其勉進藥食早獲康安以慰予懷是年秋聖駕還京皇太子遣公迎駕下滁州謁見上喜與語良乆壬辰誥封公父奉政大夫右春坊大學士母妻皆封宜人癸巳車駕再巡狩公留守如故時漢王濳蓄奪嫡之志忌公獨深日夜窺伺間隙流言監國之過公遂不免一滯十年處困中惟日賦詩以自遣形於詩者無非引咎責躬之言名曰省愆集又卽人情變態之機寓之於言名曰自省錄甲辰仁宗皇帝嗣位遷公通政使兼武英殿大學士仍領内閣事辭不允丁太夫人憂乞守制不許特命乗傳奔喪洪熈改元陞少保戸部尚書兼武英殿大學士階榮祿大夫復辭不允命三俸兼攴力辭尚書俸許之賜勑褒嘉上手增誥文二語曰勿謂崇高而難入勿謂有所從違而或怠蓋切於求助也曾祖祖贈皆如其官妣贈皆夫人父封如其官母封太夫人妻夫人是夏上不豫時皇太子徃南京省謁孝陵遣使召還旣而宫車晏駕羣情洶洶公及少傅二楊公佐鄭襄二王監國憂劳至於嘔血及皇太子還京卽位大事始定宣德改元八月漢庻人反上率師親征以公多病留佐鄭襄二王監國公夙夜在公至班師方㱕私第疾益甚命太醫院使徐叔拱胗視病少瘥卽上䟽乞骸骨不許固請始令㱕田養疾賜楮鏹萬貫陛辭加賜萬貫于時公之尊府静菴先生壽八十有九公年餘六旬恪供子職弥謹弗懈先生没上遣禮官賜祭命有司以一品禮葬旣襄事公拜恩闕下上寵留累月賜遊西苑命公侯伯師傅尚書學士十一人陪焉仍召公之子采從行公乗肩輿登萬歳山賜宴山之麓翌日獻詩以謝上大悅比辭宴餞于太液池親灑宸翰製詩送之給路費賜金織紗衣一襲且諭之曰明年朕生日卿其復來明年如期入覲上寵眷宴錫之禮有加於初九月辭還又明年上崩今太上皇嗣位公入朝進香上嘉念舊臣寵賚優厚留月餘辭歸公在永樂𥘉知無不言言無不聽嘗有告黨逆者公言於上曰洪武末年已有勑禁革不宜復舉從之而大獄遂息靖難師後吏部例以南人官北土不効順者奏編行伍公曰近有勑㫖征討官與舊官事同一體若復追罪南人與勑㫖相背上卽罷之虜酋阿魯台旣納欵欲收女眞吐畨諸部聽其約束請朝廷刻誓詞于金錠集諸部長磨酒飲之以盟公曰胡人狼子野心使各自為心則力易制若倂為一則力大難制矣此舉實其奸謀也上顧左右曰黃淮如立高岡無遠不見爾等如立平地所見惟目前耳西域大寳法王𥘉至京上欲刻玉印賜之以璞示公公曰朝廷賜諸畨制勑所用不過勑命廣運二寳今此璞大於二寳夷人將謂法王尊於朝廷也上甚嘉之至於命讞疑獄而疑獄無冤命議鈔法而鈔法無弊其識見尤為人所不及嘗讀廷試卷於上前同列有不直者公必正色直之不少隨順於是人有目公為太認眞者公亦不少變也及謝病歸田里杜門却物不接世故者二十餘年所著文有介菴集歸田稿藏于家配夫人楊氏淑德懿行儀于閨閫側室李氏子男三長棐次采卽中書舍人次槃女一在室孫男五珣瑜㻞珪璨孫女五曾孫男一訃聞賜謚文簡命禮官祭者九有司賻塟如制以年月日窆于邑之德政鄕大羅山之原從先兆也爲之銘惟周三公視古百揆公不獨立三孤以貳爰副爕調益弘化理維寅維亮公寔職此皇躬是保百辟攸式寵顧雖隆小心翼翼視草玉堂高文大冊六經黃麻有典有則獻替宻勿日于帝側定䇿安邦宣慶布德廟堂柱石薦紳蓍龜維鹽維梅鼎鼐是資列聖眷倚心膂股肱功在社稷福及蒼生掛冠廿年乗化奄忽生榮死哀無間存没大羅之山鬱乎佳城勒銘閉幽百世其寧故沐夫人方氏墓誌銘夫人諱某字某姓方氏世家台之黃巖叔祖國珍仕元金紫光禄大夫浙江等處行中書省左丞相太尉衢國公父復𥘉由忠翊校尉知黃巖州事歷陞榮禄大夫浙江等處行中書省平章政事推恩贈其高祖宙曾祖震亨皆越國公高祖妣潘氏曾祖妣周氏皆越國夫人祖國馨蔡國公祖妣陳氏與榮禄之室鮑氏並蔡國夫人鮑生夫人聦慧孝順甚為父母所鍾愛年十九為國朝黔寧昭靖王側室夫人生長名族又獲承接大家心益弘明事王與主壼耿夫人恪謹柔順終始不失上下禮節處一家尊卑間謙恭溫和靡不順適生子昻有文武才能為右軍都督府右都督翊賛其兄黔國公藩鎭雲南積有勞勩故朝廷賢其子之才持賜誥命封為夫人夫人愈益恭謹無纎毫自矜之色凡在閨閫莫不益重夫人之賢亨年八十有二正統四年正月二十五日以壽終子男一卽昂孫男五僖俊佐仲佑孫女三長適成國公朱勇次適右府右都督陳玫曾孫二璘瓛曽孫女一夫人旣終昻在雲南昻之異母弟駙馬都尉昕夫人期服子也率僖等奏襄太事惟謹十以是年閏二月二十三日祔葬于江寧縣長㤗北鄉觀音山元王墓側銘曰婉婉淑姿穆穆今儀胤慶顯宗勲閥攸歸爰副主壼左賛右翊敬嗣徽音克恊懿德督府有子出靖南邦恩及本源封誥煌煌副笄六珈寳鈿珠壁服玆命服寵光赫奕旣壽且貴五福具臻勒銘閟幽於昭千春道㑹林君剛伯墓誌銘吳訥嗚呼自周哀道廢民散之後異端雜說紛焉競起迨漢晉而降則唯老佛之徒爲盛老氏本周柱下史未嘗毀形㓕姓世之儒生因或寄迹其中如唐魏文貞公玄成鄴侯李公長源率能不遠而復建功當世後之君子所以稱爲振古人豪也歟其或抱負材噐拘其法而弗能出若吾鄉林君剛伯者可不爲之深惜也哉剛伯林姓名復剛伯其字也上世居福之長樂高祖松洲宋末宦游常熟遂家焉曾祖諱近思祖諱脩德皆任元州學學職父諱大同號範軒國朝任開封府儒學訓導生三男子而剛伯居長甫成童五經四子皆成誦弗忘年十七出教陸氏龔氏家塾篝燈自課夜分始就枕時範軒患耳瞶母氏亦衰病適邑中始建僧道官淸溪道士尚守謙領道會職謂其徒曰吾敎際時休明然匪資於儒則何自而興哉遂延剛伯以儒書訓其徒孫張仁靜等剛伯樂其閒靜可以棲身養親乃請父母欲託身其教父母許焉淸溪聞而喜曰吾教得是人必興吾當身仕之遂録為弟子改名復眞給祠部牒為道士時剛伯年已二十有四矣永樂中舉至京脩勸善書永樂大典繼往龍虎山校正道書嗣四十三代張眞人宇𥘉曁其弟四十四代宇清推其學為教中第一號曰弘文輔教高士永樂九年選任道㑹復取赴北京脩道藏經以老疾辭歸宣德壬子秋得肺氣疾瀕卒呼其弟長子宗授以所作詩文十卷囑付後事且命求舊交計嗣先生作行狀詣予乞銘旣卒宗遣价奉狀來謁嗚呼予少與剛伯生同里曩範軒致政家居予恒持所業求正退卽與剛伯講求古今述作之懿去年以書求較正乃翁範軒文集豈意今年遽聞其死乎嗚呼剛伯所學多有過人者使其弗汨于彼教其能亢厥宗以増輝此道也必矣惜乎此之失而為彼之得予寜不為之深惜也哉昔者昌黎韓子序贈衡山廖道士稱其魁奇多藝因致惓惓憫惜之情廬陵歐陽少師亦嘗為故人明因太師記其始終言行于塔是則予於剛伯之墓寜忍弗銘也耶剛伯生元至正乙巳没于宣德七年某月某日享年六十有八是年某月某日窆虞山隂銘曰此其失乎而彼其得乎而吁嗟其可惜乎而明故曉菴法師塔銘錢溥師諱善啓字東白號曉菴俗姓楊氏蘇之長洲人五世祖慶宋發遣常州主管學事贈􅏅朝奉卽家吳之支硎山値兵徙北郭父永年性好善稱楊佛子母陸氏師甫能言通佛典父母異之命入無量壽院禮永茂院主為浮圖旣長屏迹龍山窮日夜力于經史百氏不輟聲譽隱然月起少師姚公廣孝善世洽公南洲皆噐重之而典記於洽公者甚乆永樂元年薦主蘇之永定寺六年主松江延慶寺逾年擢本府僧綱司副都綱尋應召纂脩永樂大典預校大藏經賜金織袈裟衣一襲時三殿災詔求直言師上䟽陳利病不報内交沈少卿民望王侍講希範王賛善汝玉陳檢討嗣初益深造詣而與璧菴完公輩還有江行倡和詩一卷與甫里趙公宗文酬倡尤多歲遇牡丹開時必盛集題賞錢唐瞿公宗吉雄於詞賦嘗用一韻徃復幾百首而詞鋒益銳海内皆傳焉正統八年十一月八日卒距洪武三年十一月十五日世壽七十五僧臘六十以其示寂之歲十二月二十三日弟子慶暲等與其姪旻昇奉柩歸葬千舊隠之龍山遵治命也旣葬且二十年而薄於塔銘尚未之作者志蓋有待乎叨居侍從之列利澤不加于民空言無𥙷于世則亦負師期望乆矣玆使交還獲訪墓于龍山下見其塔銘尚虚以待之則溥亦何待而不言哉夫以交之深者知必至也言之夥者情必厚也昔宣德間大理卿胡公槩巡撫東吳威聲大振而於師獨加敬禮時溥方冠欲應鄕舉謁公師忽見而喜之遂入白于公得預鄉舉然溥亦始聆論議察其動止毅然一儒者由是徃還日就欵洽數日不見必折簡招之簡類歐語作字有帖意見必肅衣焚香啜茗坐語移時去則且談且送雖草草禮亦不廢或閉户發篋出古人眞蹟對閱評品如論宋仲溫陳文東二先生書宋筆正鋒陳或偏鋒故宋優于陳吳中稱高楊張徐爲近代四傑然季迪衆作皆得體如律倣劉長卿選兼韋應物皆人所不到宜其爲最文則喜柳宗元遇有作必朗誦數篇得其意趣然後下筆而詩則宗季迪也然皆不務蹈襲以爲奇至論儒釋之辯曰且各爲其教又曰東魯垂道西竺見性皆莫先於厚本故雖離父母而養生送死率從厚與兄弟極友愛撫諸姪教養兼至而交四方宿儒名緇必以誠未嘗見懈體惰容然非其人亦未嘗一與之交此韓子謂墨名而儒行王文正謂此失之而彼得焉宜爲法門之僅有吾人之願交也而况溥也荷師期待旣乆不亦知之至而情之厚哉倘以餘齒無負于斯世則亦無負於所知矣姑書此以與其徒慶暲等刻石于墓而且系以銘曰唐有師暢曰喜文辭末有惠勤亦號能詩暢由韓子儒行以彰勤藉蘇公得附歐陽顧今東白有學有德旁邃詩文兼此二釋豈無韓蘇俾世有聞我何人也敢預斯文龍山之陽齊闉之北寂焉淵焉于此埋玉奔走㡬年始遂弔謁有言莫酬庻未其碣皇明文衡卷之八十九
