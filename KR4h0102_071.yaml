front:
  text: 皇明文衡卷之七十一
  hash: sha256:50647fe07f2f405142a09433133cd48ff76c563ca43d33484d1034b78af3c684
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_071-1a}
body:
  text: 神道碑元故嘉議大夫禮部尚書致仕贈資善大夫江浙等處行中書省左丞上護軍追封譙國郡公謚文節汪先生神道碑銘宋濂濂奉敕總修元史凡忠義循吏之事天下郡縣悉上送官而宛陵汪先生獨闕旣而先生族子克寛與纂修始以其門人汪文炳所摭事狀相示濂旣命史官刪削立傳克寛以爲史乃一代成書其法當略墓文乃私所撰其紀宜詳復致其孫德垕之言請濂揭銘于隧上嗚呼先生之德之盛海內孰不知而所讞錢珍之獄泰定實錄中甞言之其可不備載以昭示方來乎先生諱澤民字叔志按汪氏其先新安歙縣人自唐以來爲官族五季之初兵馬使都虞侯道安始自歙遷婺源之還珠里又歷八世至宋天禧巳未進士秘書丞贈光祿以卿震生慶曆癸未進七都官員外郎贈中順大夫宗顏都官生皇祐壬辰進士左奉議郎知漢陽縣贈少傅榖又自婺源遷饒州德興之龍溪少傅生贈通奉大夫槃崇寜癸未進士正議大夫端明殿學士藻藻以文學政事爲時名臣通奉生紹聖丁丑進士朝散大夫江西轉運使愷知合肥縣贈中散大夫慥又自德興遷宣州之宣城子孫遂爲宣城人中散生紹興庚辰進士通判隆慶府鴻舉鴻舉之弟脩舉則先生高祖也曾祖諱宰臣贈朝奉郎祖諱夢雷淳祐辛丑進士累官知靖州元贈翰林直學士亞中大夫輕車都尉追封新安郡侯父諱鼎新用父䕃補將仕郞元贈嘉議大夫工部尚書上輕車都尉追封新安郡侯工部之兄鼎亨景定壬戌進士管池州大軍酒庫然自少卿至先生奕世科名蟬聮不絶先生自幼融通經史亦銳然思繼承之會科目之法行遂領延祐甲寅江浙鄕薦上南宫不利有司用恩例署寧國路儒學正曁再舉遂擢戊午進士第授岳州路同知平江州事階承事郞時先生之母譙國郡夫人王氏春秋巳高先生以平江道遠不可迎養上書承相府乞降一二階就銓鄰州不報竟奉太夫人之官州有徤民曰張以利餌長吏持其隂私使不敢問遂視閭井民若蟣虱頥指氣使輙奔走不暇稍迕其意卽繫送于官人懼呼爲張雷公先生曰弗治我民將無生卽發其姦屛諸四夷不使與良民齒李氏有兄弟者三素豐於貲季弟未有子而沒其婦傷季之夭也誓終身不再適孟仲利其財數設計撼之婦堅不動乃嗾亡賴男子誣以姦私婦不禁搒掠自引伏先生見其色有冤間行廉察之悉得其情白而出焉轉承務郎南安路總管府推官戍將朶兒赤䟦扈自用搤有司之掔俾不得詘信其婣家王某爲郡府史籍其威尤鴟張無忌擅箠大庾縣令縣令訴諸府同官懼戍將之威相視以目無人發一辭先生毅然捕王下獄㑹監察御史行郡戍將厚賂御史召先生於庭詰其獄狀聲色俱厲先生徐曰王之姦路人所知也御史欲屈法邪御史慚夜半馳馬去王卒伏罪居亡何戍將以贓敗部使者知其故檄先生椎讞杖罪之廣州歲侵民大饑疫癘洊臻死亡相枕藉其毒氣所薫蒸鮮有能生者江西行中書属先生行振荒之政先生絶無所畏懾命大姓發廩以哺尫􅌡其病癘方熾者召毉注善藥親走其廬給之滑者數萬先生曁從者亦無他虞將還送者讙曰我父母也奈何去之馬擁不能前潮州判官錢珍挑推官梁楫妻劉氏不從誣楫冐糴官中米殺之獄中事連海北廉訪副使劉安仁逮繫者二百人中書移問者凡六各懷顧忌事終不白先生讞之獄立具時珍飲藥死詔戮其屍安仁坐受珍賂除名時朝廷遣奉使宣撫江西聞先生名命廵南安章貢二郡事得專决聲績尤著擢承直郎信州路總管府推官丁內艱不赴服除遷平江路總管推官階承德郎𥘉浮屠甲與隣僧乙有隙乆不相周旋衆約其輸平乙因邀甲飲酒至醉遂寢其室甲弟子沈安素苦甲鞭笞且期速紹其業幸甲宿干讐夜持刀往殺之明日訴諸縣乙虐於考訊輙誣服獄上先生閱其刀有鐵工氏名召工驗焉曰此沈安刀也逮安一訊卽承脫乙械械之嘉定地瀕海朱管二姓爲姦利海中致貲鉅萬及以他事敗上下受其賂莫敢捕獄乆不决先生與總管道童公適至徑縳以來竟籍其家及徵其帳曆備列省憲郡邑受賂之數唯先生及總管名下疏曰不受陞奉議大夫知濟寧路之兗州兼管本州諸軍奥魯勸農事磁陽負郭之縣也孔子廟學乆不建先生以風敎所繫買地作之殿堂門廡及齋序之属無不具飭襲封兗聖公職止三品先生以宣尼之冑不可以弗崇上疏請増其秩廷議韙之奏陞品爲第二錫以銀章居一年政化大行絃誦之聲周達乎西東圜扉之間可設爵羅嘉禾生於縣郊瑞麥孕於洸水君子謂其有漢循吏之風焉廉訪使者行部將壓境還曰汪兗州在吾可無往矣至正癸未詔修遼金宋三史拜先生朝列大夫國子司業俾分修兵志及宋理宗本紀史成有上尊束帛之賜已而除集賢直學士太中大夫未數月亟上納祿之請以嘉議大夫禮部尚書致其事先生旣歸僦屋以居門生弟子援洛中諸賢故事為築室宛水之濵先生日督諸孫讀書以自娛不知其貧歲壬辰蘄黃紅巾彭黨相搆亂其餘孽自徽㓂宣州江東部使者道童問䇿於先生先生語以收人心振士氣築城浚濠儲糧簡卒凡數十事宼再至再擊退乙未夏六月長鎗叛帥瑣南班程述等挾兵渡江欲犯宣城城中兵不滿數百或勸先生去之民曰先生忠孝人也天必相之當相與守城若果去之吾属亦隨之爾部使者不八沙周伯琦二公復申民言以爲請先生曰昔江萬里寓番陽大將軍逼城衆皆走散猶坐守以爲民望况宣民離合視吾去留吾何忍棄父母之邦乎時軍費不給加以嚴刑弗之集先生從容一言獲鈔一萬錠米三千斛民心翕然欲為固守計屢戰輙屢勝八月丁丑江浙行省参政吉居奇兒遣兵來援城內恃援至戍守頗懈是夜三鼓長鎗軍攀堞上城遂䧟戊寅僞萬户丁堅使前鋒葛義執先生逼降不屈遂遇害將死罵猶不絶口瑣南班等雅敬先生名為具冠衾葬于某山之原得夀八十又三事上于朝贈資善大夫江浙等處行中書省左丞上護軍追封譙郡公下太常定謚曰文節云先生娶戴氏累封譙郡夫人先八年卒子男二人用敬以子貴封敦武校尉常州路宜興州判官用和國子生辟充侍儀司舎人不赴兄弟痛憤不食相繼卒女一人適劉士禮孫男五人德宣以門資補官敦武校尉善盈庫副使德為國子生曲阜宣聖林廟司樂徳崇癸巳鄕貢進士湖州路徳淸縣學敎諭徳正徳進孫女一人適吳愈曽孫男五人禧源傳源鳳源書源淸源先生軀榦脩聳高凖踈髯風裁峻如也其爲學本諸六經眞知實踐無一事不本於道義其奉親也丁工部公之憂則三年獨處於外弗御酒肉毎遇諱日悲慟不自勝至老不変事母夫人則板輿方舟迎侍之官熈熈承顏唯恐少違其意婺源三大墓爲強家所侵辨理于有司经四十年必復之乃巳其事君也一飯不敢忘懐保小民甚如赤子革弊除姦有知殆無不爲然於律巳則玉潔冰淸毫髮之私又無自而入故其至也民戀受之其去也民墓思之至有爲生立祠者甞重構美章亭於兗賊至不忍焚之且曰此汪公遺澤也嗚呼不知先生何以能致於斯哉由其立心之正不爲勢利所誘䆁術之精不為不義所屈忠孝大節所以暴白於天下揆古無譲於今無媿可謂不負於科目者矣先生為文不事絺章繪句而義理自足詩亦淸婉有魏晉風尤以善書名家單削片牘人咸藏猪利切置也為榮所著書有巢深燕山宛陵三藁傳之於學者當賔興之歲江南三行省屢聘先生司其文衡士論尤服其精允至今人道之不忘也夫自壬辰之亂四方瓦解其能執節不回者往往於學士大夫見之如余闕之死於舒李黼之死於江泰不花之死於台尤號傑然者也有如先生無城郭封疆之守或保身於山澤君子亦未必深議之先生不以仕止為間孜孜汲汲思衛斯民於危亡之際遂及於難非事君無二心者能之乎使人人皆先生若國家其有敗亡之禍乎悲夫系之以銘曰仁皇建科璽書四布濟濟多士雲集用赴猗歟汪公薦舉於鄕對揚大廷乃第奉常筮仕遐邦不遑將母上䟽廟堂願從近授孝聲載昭如水東馳公聞曰噫吾分之宜鋤强擊貪鷹隼横鶩去之弗亟我民之蠧舋爲理官爲獄立平起彼朽骨化而爲生魯有名邦待公爲政瑞麥嘉禾發爲祥應䇿書載登金匱啓封袞斧之寄有詔倚公尋敎成均六舘咸悅復直集賢進班邇列公曰止哉吾懸我車秩宗之加以華其歸拄笏看山宛水之涘遘時艱屯四郊多壘抿之蚩蚩非公疇依公苟我留執戟以隨一鼓作氣爭相奮躍刈宼如麻血汙秋鍔孰援我兵夜柝不嗚彼乗吾懈遂無堅城毒霧四塞殺戮以逞執公使降白刃磨頸嚼齒大罵我實王官咄哉賊奴敢正之干公雖遇害之死弗屈孤忠凛然皦如出日事聞中朝當宁嗟嘆節惠易名恩寵有加所貴君子行爲民望薄俗瀾奔障之東向生孝於親死忠於君凡百髦士視公爲人元國子祭酒孔公神道碑堯舜禹湯文武及孔子德皆聖人惟孔子不得位而功最盛天於恒人有一善且昌其後昆况徳充天地功施萬世而身不食其報者乎堯舜禹湯文武皆王天下故子孫受其祉有限孔子無位故餘慶遺澤𬒳其孫子者無窮自斯民之生未有若孔子之德而無位者也亦未有若孔子之傳世乆遠而襲爲封君者也嗚呼天之報聖人其在兹乎公諱充堅字璟夫世家魯之曲阜孔子五十五代孫也曾祖曰之厚贈某大夫濟寧路總管輕車都尉祖曰浣累贈通議大夫禮部尚書上輕車都尉皆追封魯郡侯父曰思晦嘉議大夫襲封衍聖公累贈通奉大夫河南江北等處行中書省叅知政事護車追封魯郡公謚文肅曾祖妣女直氏祖妣李氏妣張氏皆追封魯郡夫人公少廓達通敏日誦千餘言始冠游學成均通春秋左傳文肅公薨襲封衍聖公階嘉議大夫元重紀至元五年上䟽請修飾廟像順帝可其奏賜山東曆日錢之半給其費命監察御史族人思立持楮幣二萬五千緡勒碑以紀成績至正六年中書謂公爵與階不稱奏陞之制授中奉大夫易銅章以銀十五年平章政事達世帖木爾薦公明習禮學徵為同知太常禮儀院事以子希學襲公爵是年冬帝親郊公攝太常使盛服儋然登降有容觀者稱其達禮御史大夫雪雪言公才宜近侍左右拜中臺治書侍御史公辭帰明年拜山東道肅政廉訪使旣受詔復辭會山東兵亂公率家人北行次藳城丞相賀太平奏召公為集賢直學士希學為秘書郎遣使者卽藳城起之公至燕都劇盗毛貴犯畿甸且逼廷議棄燕遷闗中公曰天子當與社稷宗廟俱為存亡烏可弃而他之今勤王之兵頗衆與之决戰盜可平也如公言盜果敗去十九年遷禮部尚書知貢舉四方士避亂多集郡邑公請設流寓科以取之是年冬擢陜西行臺侍御史李思齊及察罕帖木兒二軍爭秦隴相攻朝廷不能制陜西行省丞相帖里帖木爾納思齊降將命張弼禦之公及中丞袁渙諍曰不可二軍不敢舉兵犯奉元豈其力不足哉特以無名耳今納其叛將而出兵禦之是引乕使噬也丞相不從渙亦被劾去公怒曰謀之不善亂且至矣遂自劾而帰月徐二軍及張弼戰于鹿臺奉元果䧟一十二年除國子祭酒帝埸上尊太子書大成殿額以賜公以世亂不樂居位竟謝病歸闕里營别業城南以居後起公爲集賢學士資善大夫不就復以公爲山東㢘訪使卒不起二十八年天兵取中原皇上手詔趣公入覲待以賔禮而不名賜以廩祿不煩以職郊祀必致膰肉撫勞甚至洪武三年春以疾告遣中使存問疾篤詔還公于家給驛以行賜白金百兩文綺八端他錢物稱是三月廿八日次下邳新安驛薨于舟中夀五十有五希學奉喪歸以六月十三日塟于孔林去孔子墓若干歩公寛厚樂易事親有禮遇族黨有恩與人交不爲掩覆計度一以誠信豐下美髯容止甚都順帝以福人稱之公娶張氏濟寧路摠管子仁女封魯郡太夫人丈夫子九人長卽希學次希說希範希進希麒希鳳希順希尹皆元國子生希贇其季也女二人適某某孫男九人曰訥曰証曰某曰某曰某曰某曰某曰某曰某女五人希學今資善大夫襲封衍聖公毎歲朝正于京師上寵錫之甚厚以袁渙狀來請曰先公沒今十年而墓道之石無文以刻恐休德不聞於來世人其謂何濂甞獲識公且與希學善雖老矣其忍不銘銘曰天命大聖爲萬世師廓幽昭濳雨施日輝功加堯舜位則不有斂其遺澤以昌厥後歷年二千有興有亡五十餘世封君相望自侯而公愈遠彌貴桓圭袞衣肅將祀事惟公紹家敦大且文人曰休哉聖師之孫入爲秩宗左禮右樂格爲幽明上下允若亂兵趨燕宗社震騫君臣合謀棄而西遷公曰不然君死社稷以正伐亂勝不以力王師焞焞如虎如貔盜遁難夷公實啓之關陜之間將驕胥噬彼謀不臧以水止潰公謂元戎世方興亂無失厥防以速其叛言臧不從不臧是爲禍將迨身云何弗歸璽書迎拜俾掌邦敎大訓宏謨敷聖之道土宇日隳位其可居退脩于家琴瑟詩書皇明御極取聖爲則陟降帝庭禮儀有翼生享其榮死篤其承云誰致然聖澤休明惟聖之澤如山如川有址有源以永厥傳繼聖惟賢守位惟德昭績垂聲後嗣是式大明故中順大夫禮部侍郎曾公神道碑銘有序治古之時非惟道德純一而政敎脩明至於文學之彥亦精贍宏博足以爲經濟之用蓋自童丱之始習四經之文畫以歲月期於默記又推之於遷固范曄諸書豈直覽之其默記如經基本旣正而後徧觀歷代之史察其得失稽其異同會其綱紀知識益且至矣而又參於秦漢以來之子書古今譔定之集錄探幽索微使無遁情於是道德性命之奥以至天文地理禮樂兵刑封建郊禩職官選舉學校財用貢賦戸口征役之属無所不詣其極或廟堂之上有所建議必旁引曲證以白其疑不翅指諸掌之易也自貢舉法行學者知以摘經擬題爲志其所最切者唯四子一經之箋是鑚是窺餘則澷不加省與之交談兩目瞪然視舌本强不能對嗚呼一物不知儒者所恥孰謂如是之學其能有以濟世哉此濂銘亡友曾公之墓憤激于中而復繼之永嘅也公諱魯字得之曾其氏也孔門弟子郕公五十七代孫其居新淦吉陽里者巳乆世裔之傳與夫轉徙之詳昔以著於公之先墓兹不重載會大父兼善宋贈大理評事祖天麒宋宣敎郎軍器監主簿父順元韶州路儒學敎授妣劉氏公年七歲能暗誦九經一字弗遺奉禮郎簡君正理欲以神童舉于朝其父力止之及齒稍長取三史日記之尋及其餘數千年間國體治亂人材忠倿制度沿革咸能言之有叩之者如山川出雲層見疊敷杳莫察其端倪公殊不以爲足所藏子集動至數百家各攬其精而掇其華聞有僻書隱牒不憚道里之遠必購得之旣得必篝燈讀之達且不寐發爲辭章龎蔚炳朗毅然有不可奪之氣廬陵劉提舉岳申與之語連日夜不休嘆曰不意後生中能至於斯也其將以文嗚乎杜內翰鄕之丈人行也公負笈從之游益充㧨其所未至寤疑辯感惟日不足遂以博極羣書稱于時公猶謂未要於至道述長書一通謁虞文靖公集於臨川虞公大悅曰昔程子與張敬夫年十六七卽有志聖賢之道子能如是復何讓古人公年蓋十九矣由是益濳心濂洛關閩之學分别義理密如𧖟絲牛毛而尤愛吴文正公徴之書吳公亦居臨川其著書滿家無大無小公一一訪獲之玩繹未甞釋手乆之充然有得盤桓林泉以道自娛若將終身焉至正壬辰天下大亂州縣所在繹騷公召里諸豪集徤兒持兵以保障乎一方仍椎牛釃酒開陳逆順禍福言甚剴切衆皆聳耳而聽卒無敢犯非義者人號曰君子鄕入國朝有詔纂修元史勒成一代之典遣使者起公于家公賛决部居𥙷苴罅漏者不一而足其功爲最多史成上坐端門召諸史臣有白金束帛之賜公居其首焉公將乞身還山㑹朝廷開局編類禮書輿論以老成之士無踰於公者共堅留之議禮之家有如聚訟自古難定於一公當羣言沸騰之中楊言曰某禮宜據某書則是從某說則非有不服者爭相辯詰公歷舉傳記答之各心醉而去俄遷入儀曹為祠部主事階承事郞時洪武二年十二月也常忠武王薨高麗正遣使來祭公索其文觀之使者靳不與公不可使者不得巳出之外則襲以金龍黄帕內則不書洪武之號公責之曰龍帕固疑誤用若納貢稱藩而不奉正朔君臣之義果安在耶使者頓首謝過皆命易去之乃巳安南來貢主客曹巳受其表将入見公取其副覽之其王乃陳叔明公曰前王陳日熞爾今驟更各必有以也亟白尚書詰之使者不敢諱蓋日熞為叔明所逼而死遂篡其位中心懷愳故託脩貢以覘朝廷之意上批之曰島夷何狡獪如此却其貢不受五年二月上問丞相曰曽魯在禮部今何職耶對曰不過主事爾卽日超六階拜中順大夫禮部侍郞公以順字犯父諱辞就朝請下階吏部以國法有定不之許倭夷入宼戍將毎捕獲之上憫其無知命儒臣草詔歸其俘公之所譔有中國一視同仁之語上悅曰頃觀陶凱文巳起人意今魯復如此文運庶其昌乎凱禮部尚書也八月奉旨考京畿鄕試入院之後忽吐血一升公猶力疾閱卷不息自是遂奄奄不振九月膏露降鐘山羣臣咸見諸咏歌公獨譔賦以進十月上将郊祀出宿齊宫命取諸作使侍臣更番誦之至公獨曰此曾魯作邪援據旣精鋪敘有法豈新進之可驟至哉十又一月疾愈篤上章乞骸骨甚至中書以聞上惻然許之十又二月辛卯歸舟至南昌公謂次子圭曰吾命只明日不能至家矣然吾以一介羣布之士受國寵恩位躋法從又得守正而斃死復何憾所憾者不見二孫之成立也卽趣具觚翰爲書戒之壬辰次石政潭果歛袵而逝距家纔兩驛爾丙申至故居丁酉具棺斂擇地於縣南屛山之陽以六年某月某甲子袝塟九世祖高安府君之塋從治命也公蓄德熈和人近之者溫如春風不見忿戾之色然其人則山澤之癯身退然若不勝衣未甞有所矯飾其處家也事親克孝父喪哀毀致疾踰年而後能起已而二兄諸姪相繼捐舘公抆淚經紀凶事三年間塟十餘喪且撫存其孤惸惟恐或失其所生平輕財仗義喜周人之急四方賔客日登其門公倒屣迎之了無倦容甞一試江西鄕闈有司寘諸乙榜人爲不平而公亦澹如也其出仕精白一心有知無不爲凡典禮渉於制度者必經公損益而後定雖古者吏牘之繁簡署字之上下人所不能知公獨稽諸書以爲决公誠所謂濟世之學者非邪公属文不喜留藳其徒雖有所輯録猶未成書其自箸書有六一居士集正訛南豐類藳辯誤藏于家他咸未脫藁當公修元史時濂實爲總裁及入南宮又有僚友之好故相知號爲最深共坐官舎更析互辨毎至夜分嘆末學之空虚傷古道之寥落又復相視辴然一芺嚴陵徐尊生甞有言曰南京有博學之士二人一以舌爲筆一以筆爲舌其意蓋指公與濂鳴呼尊生過矣濂也何人而敢上儷於公哉雖然公未甞欲棄濂也相期他日幸㱕休必胥會焉共成一書庶可藉手以見前賢公今不可作矣故因銘墓之文而屡興懷於治古之時也世之讀者必将深感焉公讀書之室曰守約齋學者遂稱為守約先生享年五十四歲娶聶氏先二十年卒公再不納配一榻蕭然如山林枯槁之士人難之子男二人長墊今來請銘者次卽圭出為仲兄後女一人應眞適劉奉孫二人正龍夢龍銘曰氣化糾纒人文昭宣萬類斯甄兮天設地施一偶一奇形聲相資兮載藉􅌭紛六藝攸尊各闢其門兮枝分葉敷散為千塗溷其精觕兮彌綸大邦文物采章有變有常兮不生碩儒孰軋其樞孰苞其腴兮玉笥之陽神珠吐芒莫自翳藏兮大明麗天束帛戔戔蒐羅俊賢兮袞褒鉞誅寓於筞書輿論所孚兮儀曹之升議禮稽經日維烝烝兮黼黻帝猷上窺殷周功在刪修兮所積之訦所發之深開陽闔隂兮正笏垂紳其色誾誾邦之老臣兮媚學蹮躚其中枵然何翅霄淵兮天胡降喪一鑑之亡四國之傷兮其神上征化為列星寒光晶熒兮下射屛山馬鬛桓桓名在不刋兮皇明文衡卷之七十一
