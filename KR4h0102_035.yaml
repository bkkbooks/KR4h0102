front:
  text: 皇明文衡卷之三十五
  hash: sha256:f0606ccc899e0142d9697e8c9de1d8e90973f9cf26658a965d635863cef59d7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_035-1a}
body:
  text: 記重修河南程氏三先生墓祠記楊榮凡先賢所當祀而祀之禮也立祠於墓以祀者禮從義起者也祠久而僨僨而興者常也常則不書而書者大復故也河洛於天地之中扶輿清淑之所鍾賢哲之生自昔林林而盛矣然莫盛於宋程氏父子三先生者程氏世居嵩之陸渾三先生卒俱葬洛陽縣之府店保遺墓至今具存墓側有祠後人以為享嘗之所歷歲滋久荐罹兵燹向之隆者夷壯者敝茂菅宿莾一視蕩然誠當道者所宜究心也錢塘周鑑自郎署出參藩政歷是邦覩之慨然即有志於興復第縻於職務弗果宣德辛亥春皇上圖弘化理重惟古昔聖賢之道乃頒明詔凡天下郡縣有先聖先賢祠墓在者所司宜以時修葺毋就于廢鑑祗承德意樂以斯事自任遂以其秋行郡道經嵩邑抵程氏故居得其十六代孫曰子中者與同詣墓所剃去荒穢辨正方位先捐已俸為倡河南守郯城李驥及屬邑令佐亦以其俸助之遂召工計資凡所需之物則取於近邑所宜産戒以期輸集無敢緩者以是年某月日之吉興工工能材良需用咸足於某月日告成垣墉棟宇皆復舊規封築堅厚樹植繁密凡所供設之器莫不畢具以某月日立開國公神主於祠之中以明道伊川二先生侑食依故制也復子中家俾守祠事遂率郡屬祗奠焉奠巳諗于衆曰惟是三先生之墓自宋至今餘三百載其間興廢者幾漫不可知顧念吾徒誦其遺言服其遺訓用底有位茲得奉明詔以周旋執事於故丘之間幸爾訖事要不可無書雖墓間之石著當時銘表在無庸重述而祠之興作歲月不有志之將何以示後衆皆曰然鑑比以公務來北京屬禮部郎中兼翰林侍書蔣暉請豫記其事豫惟道統之傳自吾夫子繼堯舜禹湯文武周公之後集其大成而不得位以行於天下遂私淑於其徒然在當時惟顔氏曾氏之傳獨得其宗及曾氏之再傳而子思三傳而孟子孟子沒其道無傳寥寥千百載間不絶如線逮宋之興文運斯振而明道伊川二先生出孟氏之傳乃續而其學之所自實本濂溪周元公茂叔方元公司理南安時開國攝通守事知其賢深與友善因遣二先生從學卒能以其道倡天下傳於後世人至于今賴之是二先生之功當不在孟子下也宋李臨卭魏華父氏拳拳以二先生易名為請遂定諡伯曰純公叔曰正公皆得從祀先聖廟廷此天下之通祀也天下通祀則墓祠不立可也而墓又有祠蓋墓祠則猶廟祭一家之私祀也通祀以道統之傳惟二先生得與其列私祀則推其所自出而開國公擇師教子之賢是不可泯也揆之於禮殆亦弗畔矣夫然則祠之廢興歲月其志之也宜嘉鑑之能知所重因其請謹為之記書畫船記黃淮陸乘車輿牛馬水乘舟古之制也余自筮仕以來承乏兩制四十餘年旦入禁垣侍帷幄薄暮還署間嘗一使齊魯以故乘輿馬之日多而乘舟之日蓋少也頃因謝病還故里頻年入覲沂江入淮以逹千會通非舟不可行居鄉屏處先隴往來湖山間必以舟從事與在職時事多相左亦其勢然也吾鄉湖中之舟甚逼仄編竹為篷且易損竊嘗病之今年棐槃二子以余齒高力衰舟輕劣不足以濟顛更造新舟頗寬廣板上覆以蔽風雨牖兩傍以便觀覽與客同泛可布十餘席中設小榻獨往可以備燕息後闢行廚可以供茗飮為余慮甚周亦人子之至情也昔米元章名其行舸曰書畫船至今以為美談余與元章無能為役然儒者出入必以書畫俱假名自况無乃不可乎嘗讀歐陽文忠公畫舫齋記始則追思謫宦遠涉觸蛟鼉冒波濤寢驚而夢愕終則羡夫逃世江湖之上者順風恬波傲然枕席一日千里自顧有所未暇余也既免蛟鼉波濤之危又無順風千里之遠天宇登妍徜徉乎近境岸草汀花前迎後擁足以恱吾日漁唱棹歌交響互答足以充吾耳耳目各有所適氣舒神暢其樂陶然於是絃琴賦詩以發其趣或與賔朋布奕傳觴賡酬笑謔視彼傲然枕席孰優孰劣向非得請而歸乘輿䇿馬追逐公卿之後榮則榮矣然非病夫所宜何有於樂哉是皆上之賜也上之恩猶天然言語文字豈能盡述姑記所及用以自慶云爾蕭山魏氏祠堂記古者家廟之制大夫三廟二壇適士以下各有差等庶士庶人無廟祭於寢享止考妣而巳後世廟制非有命不得立是不獨庶士庶人之無廟也夫禮緣乎人情而起之以義所以報本反始者也喪服上至高祖而享有所不及豈孝子慈孫之意哉於是司馬文正公河南程夫子相繼詳定始以高曾祖禰祭於影堂紫陽朱夫子又略加損益為祠堂之制著於家禮而後孝子慈孫始得有以致其情也國朝列其書於性理大全為萬世不刋之典其嘉惠斯人之意盛矣哉吏部侍即魏驥仲房其先光州固始人五世祖文昌宋江淮制置司制幹扈蹕至臨安遂家焉高祖有聲元常德路判官曾祖應臨平務副使祖毅廣東鹽課司提舉父伯雅洪武𥘉仕至寶鈔提舉司都􅐭以子貴纍贈吏部考功員外郎叔父希哲上高知縣再徙蕭山驥實其子嗣伯父都監公後於序次為宗嫡爰即其所居構祠堂若干楹祀高曾祖禰位次儀度一依家禮又别為一室設二龕一奉自固始遷錢塘遷蕭山之祖倣祭先祖之義立春及忌日出其主祭於正寢易世不遷使子孫知世業所從來馳書徴文為記余惟家廟廢而祠堂作經三大儒而制始定緣情以審義因義以起禮厚而不失為僣驥於四代之外增祀始遷之祖此又情之至義之盡報本反始之道備矣雖然禮有本有文規制儀等禮之文也誠敬禮之本也祖宗之於子孫一氣之流通誠有不存則氣暴忘驕心神飛越與祖宗精爽判然不相關乃欲備儀文行虛禮感應於俄頃難矣哉驥嘗為太常博士升亞卿存誠事神講之明行之習其於祀先也宜無間然矣詩曰孝子不匱永錫爾類子子孫孫盍思纘承於無窮焉松江府濟農倉記胡儼民者國之木農所以養民也昔厲山氏之子曰農能殖榖後世人名耕者為農農本濟民今曰濟農何也民農一耳食者民而耕者農四民之業食者衆而耕者貧耕者貧不有以濟之則民何由得其養哉為政者孰不欲濟農然得其道者鮮得其道而農獲其濟者今吾於吳松之為政者見之矣松之為郡所統者華亭上海二縣其地不過二百里而田賦百二十餘萬石視他郡為特重每歲春夏農之貧者必舉債而後能力作幸而有秋則先償私貸然後及公賦公私既輸而農則貧矣農貧復假貸或鬻子女或棄本業日殫月削積貧至困如火銷膏不獲其所者可勝言哉保定趙侯豫來為郡守深以為憂適工部侍郎廬陵周公忱巡撫至郡趙侯白其事周公默識之然郡無宿積愛莫能施宣德七年秋東吳歲稔會朝廷命下平糴勸分以備賑恤於是周公乃與趙侯協謀而力行之得米六萬石分貯於華亭上海名其倉曰濟農明年歲侵松江飢民二十餘萬計口者五十萬餘乃盡發所儲以賑之民乃獲濟周公復思廣為之備乃下令瀕水立場凡輸賦者民自發運不入里胥之手視舊所輸減三之一公又與趙侯謀同郡歲徴北京將帥祿俸轉輸南京給之計其所費每米六斗致一石彼能受於南京獨不可受於此乎若來此給之便且以省費之米儲濟農倉農可無憂矣趙侯曰善非公莫能為也遂言于朝而松江得省米十五萬石并以各場之贏及平糴所貯凡二十一萬餘石公曰是不獨濟農凡運輸有損負者及築隄防而力役者亦借給之民不失所矣是冬朝京師以其事咨戶部户部以聞如其請下松江廣二縣之倉以貯焉其帳籍出納則擇官之廉能與其民之賢者掌之每春夏之交施散以時斂必以冬而足凡其條約皆公所畫可謂勤恤民隱經綸變通與民宜之者也踰二年郡又旱大發農倉以賑貸而民不知飢乃相率詣趙侯請曰吾民往時歲豐猶窘衣食者迫於債負也今遇凶荒得免飢阻不至流殍此實周公之惠我公協贊之力也苟得文字載之貞石以傳世示後則二公之良法美意吾民永有賴焉趙侯於是屬前翰林編修郡人楊珙寓書以耆民杜宗桓所𫐠本末請為之記噫余昔以文事仕於其土者于今四十九年矣於其父兄子弟固不能忘情而侍郎周公又余故人重以趙侯之請豈得無言也哉周官大司徒掌荒政十有二其一曰散利散利貸種也洪範八政總之曰農曰農厚生也農倉之設豈非貸種厚生之遺意乎其與常平義倉同一養民而尤切者也故曰積貯者天下之大命而君子為政以恤民為報國二公之事皆可書余故史官也用著其實以告來者承恩堂記楊溥皇上嗣登大寶嘉念蒼生期底雍熙圖任老成人彌綸治化少師吏部尚書蹇公實為之冠宣德七年秋詔有司若曰豫有輔臣粵自先朝偉著德望暨于今啓沃居多豫于庶政咨焉豫于庶官審焉克允克諧實惟其人欲新厥居以稱豫優禮之意其繪圖以進有司明日以圖進弗稱又明日更為圖進弗稱上乃自規畫授有司乃卜地於都城東南厥位維陽厥土維剛揀材於肆厥木維良厥石維貞陶瓦維堅乃卜日之吉鳩工並作裒高以平築虛以實引繩縮版以垣厥周乃建厥堂翼之以室乃闢厥路重之以門甓之甃之塗之沐之不踰月告成祀先有廟禮賔有館庖有厨汲有并有庫有廄以儲以牧輪奐咸美百用具備復命大臣燕飮以落之肴核酒醴咸出大官公謂翰林學士楊溥曰昔晉獻文子成室諸大夫發焉當時善頌善禱者見稱於君子子何以語我溥不敢以不敏辭乃酌而祝曰惟天佑國家乃實以賢哲簡卑平格復錫以壽若周之畢公䇿名文武之世相成王相康王永光周室公歷四朝進位師保享高年輔聖天子丕隆太平之運溥於斯為國家賀又酌而祝曰明盛之世惠歸之德君子享多福而民咸樂其樂是以錫馬蕃庶晝日三接乃惟康侯溥於斯為天下蒼生賀又酌而祝曰福善之報惟有德於民者為盛古昔名臣輔君致治實功允德孚逹神明身𬒳光榮澤流子孫與國同久詩曰維其有之是以似之溥於斯為公賀公酌而復曰聖天子之恩篤不敢忘子亦可謂善頌者矣謹名其堂曰承恩堂請書此以為記清白軒記梁潛雲南按察僉事茹良玉取漢太尉楊震所以遺其子孫者名其軒曰清白良玉世本於晉陽人自元末客蜀之巴縣久不能歸遂家焉其地在巴渝之間今重慶府屬邑也重慶昔者為明氏僭竊之都也巴蜀之水至於此而合下為三峽千餘里而後出夷陵其壯且險天下莫之過也豫嘗道經其地覽其山川因訪其遺老蓋太祖皇帝之定四方也最後乃取蜀方其用兵時一自漢中入取成都一自夷陵攻瞿塘成都既潰瞿塘亦披靡不支遂直搗重慶明氏君臣既繫頸出降而兵馬糧餉府藏之貨財逺近屬邑悉封上于有司其地未盡煩兵戈故其民至今號為富完其學者習於禮義才克而氣完仕於時往往致通顯者此豈獨其山川之高深致然也亦其安集富完之餘遭逢太平之盛加以詩書之涵養而流風遺俗之未泯者因得薰其化而致顯融於時其材之成有自來也哉良玉蔚然有今學者之文詞而介然以古君子淸拔之操自勵觀其所以名軒而想其意氣之偉出豈不賢矣哉而豈獨如是而止也定其志而不遷克其所守而不可奪則見之於事業者固將燁然照耀其山川無窮也則其所謂清白者又何以異乎昔之人所云邪豫自去蜀以來京師往還兩都忽忽幾二十年志氣之衰耗甚矣然猶常時想望其山川而思見其士之志節蓋其去之巳久而與之按者益少聞良玉之介且潔而又居乎風紀之任足以行乎其志其可愛也夫其可尚也夫良玉以求豫記因為本其山川習俗之故以記其軒藍溪書屋記鄒緝古之為士者其始皆學於家而後進而用於國故三代之世家有孰黨有庠術有序國有學其至於國學則其材巳成而非黨庠術序之所事者矣其於學也凡詩書禮樂之教非徒誦其文通其辭習其升降俯仰之容識其鏗鏘綴兆之節而已所以和其心志正其容體盡格物致知之功以極夫盡性至命之妙大而窮天地該古今微而起居食息一動一靜莫不有則是以非僻之于慢易之氣無自而入焉古之學者蓋如此所以為不可及也後之學者則異於是矣誦習其文辭而或不能精察夫義理考識其名物而或不見於實用則所謂詩書禮樂者亦徒惟其虛文而巳矣又其甚者講習之不聞而惟口耳之是務涉其流而不窮其源採其華而不究其實載籍雖具目不常睹而曰吾儒者吾儒者此豈不過哉其所以不及於古人良以此也夫士學而不如古而欲求夫材之大成不亦難矣哉此豫所以常為之深慨也新淦饒章俊民居於藍溪之上讀書為學鋭然有志巳而為邑稅諸生以其成業入貢于太學乃藏書於家而命之曰藍溪書屋又恐其久而忘之也來求余文以為記豫惟俊民少學于家力勤其業既以窺探六籍之文遂及于成而進之太學其所得者不少矣因其所巳得而不敢忘其所自取其遺書藏之以俟其後人其志之所存心之所在異於人也亦遠矣豫既慨夫古今為學之得失以為士習之卑陋無以自進於高明而不能如古人之所成阜然特見於世也故因俊民之求豫之文而并書以記之俾夫來者之或有所警發於斯焉清足軒記陳繼荆石上人生秀朗少有出塵志長剃髮而從藴庵禪師求佛道甚力所居無長物惟設熏爐茶具經函席凡庭下植竹百餘竿涼隂幢幢虛籟淙淙風回露晞蒼雪飄拂衣𬒮上人方定起笑歌其問俯仰宇宙視其久遠而若一瞬息廓然其中無一物之染著不知身之處埃壒乎而與羣有之相汨汨也因名其居之軒曰清足豫過而問之大雄氏之教以身世皆為幻其謂幻者幻所有為上人何勤於有為而樂乎幼也且清者潔也足者無慊之謂也潔其心而無慊於中斯清足也何假乎名潔其行而無慊於德斯清足也何章乎有潔其居而無慊於適斯清足也何託乎寓假乎名章乎有託乎寓者詭於幻而幻之上人欲幻於是之為乎將偶於是而之為乎上人曰子之言理固有吾之所求者然吾之謂清足者以水本清穢汙濁之其濁之者非水之性也水失其性水而不足為水矣人性亦然性無不善欲纍刻之其善斯不全善之不全性失之矣人失其性人而不足為人也人性不失猶水之清清斯足其性矣吾之名吾軒者豈樂幻而為哉將以警吾內而不囿於幻也所為求吾為者必自有為始吾故以是為之余聞而善之意上人讀吾書知性之喻而不膠於其徒之説故録為記以歸之噫人性之善上人果識其用也歟諸葛武侯祠記王直南陽都城西有阜隆然而起曰卧龍岡漢諸葛武侯嘗居於此舊郎其地建祠以祀焉元至大中河南行省平章政事何瑋行部謁祠下病其庳乃下有司充廣之又即祠之東建書院以設官養士事聞朝廷名書院曰諸葛書院祠曰武侯之祠世移歲久書院蕪廢祠雖幸存然亦日就頽毀前之為郡者莫克任之洪熙元年五月太守陳君正倫始至往謁焉周視祠宇蕭然破壞采椽敗席不除風雨退而嘆曰侯之德業在天下當百世祀之况其所居之地乎今祠如此何足以揭虔妥靈乃於農隙伐材命工撤而新之冬十月成正堂四楹其餘方次第營之未就而當朝賀來京師明年春二月還郡適同知張永推官司憲南陽縣令李桓圭後先繼至相與協力圖其事未幾兩廡皆成繚以周垣前為大門以時啓閉而祠堂之制始克大備堂之中塑武侯像凡其器用則南陽衛南陽中謢衛具焉正倫既告祀以落其成又歲以八月二十八日率郡縣僚屬奉少牢致祭拜跽有位薦奠有所進退周旋克中儀度郡之人士皆欣然稱嘆曰陳公為此其可謂尚德之君子矣然不為之記則何以示後人俾維持之永勿壞於是桓圭以書來京師請豫記豫謂先王之道以明倫為本周衰王者之迹熄至於秦極矣漢興學者乃復得聞先王之説至於光武明帝其道庶幾明矣士之出於其時者秉禮義循名節綱常之際截乎不可紊也降及靈獻大盜繼起建安以來曹氏最為雄盛逞其詐力以誘脅天下豪傑之士莫不折而從之其所圖為者無非僭竊暴悖之事豈復知有綱常之道哉逮華歆之計遂李伏之説行而三綱絶矣當是時莫有非之者雖吳國多賢亦委曲順從之不暇是天下之人皆淪於逆理亂常之歸獨武侯奮起圖復漢室殺然以誅曹為心出師二表正名定分凛􅏮乎王者之師使天下之人曉然知曹氏為賊綱常之道賴以不泯後之君子因是而正誼明道以扶世立教則侯之功大矣豈特與勞定國死勤事禦大災捍大患者比歟雖百世祀之可也且嘗遊處乎此神之所顧懷民之所尚慕焄蒿悽愴如或見之則嚴祀之以示教焉蓋宜矣然今之為郡縣者於有司之事部使者之所督責尚勉勉焉有未至若先聖之祀學校之政亦有怠而廢者其能崇先賢以儀後進如此誠鮮矣而正倫能之非誠所謂尚德者哉則凡政教之所當務者其從容優裕可知矣正倫廬陵人由進士為監察御史以恭儉慎靜知名宜其所立有過人者故為文俾刻諸石使後之人有考而繼之也重修范文正公忠烈廟記正統八年十一月蘇州府重修范文正公忠烈廟成其十一世孫都察院照磨子易具事始末屬直為之記蓋公蘇人也曾祖徐國公祖唐國公考周國公皆葬蘇之天平山公嘗請於朝改天平山白雲庵為白雲禪寺世度僧守焉作祠於寺之右以奉祀事至公之子孫又作祠於是祠之南以祀公然忠烈之名未有也宋自元昊反西鄙騷動師出無功乃命公經略公選將練兵築城寨墾屯田據其要害示以形勢招徠屬羌恩信大洽決䇿取橫山復靈武元昊勢屈乃請降西人仰公之德服公之化皆為公置生祠公薨相與哭於祠下者纍日不絶宣和間宇文虛中為慶帥言公忠於朝廷其功烈顯於西土至今猶廟祀益虔然廟未有額徽宗命以忠烈名之且為題其榜凡廟之在西者皆易以新名然蘇猶未有也紹興以來西土皆陷忠烈之廟越在異邦蘇之守令與其士大夫謀曰蘇公故郡也而天平山則公祠墳在焉公之精神必往來乎此乃更作新廟揭忠烈之榜於廟門由是蘇始有忠烈廟每歲上巳郡縣長吏率其屬致祭廟壞元至正乙酉嗣孫邦瑞士貴復新之末世兵亂燬焉踰八十年未有能復之者至是工部侍即廬陵周公忱巡撫至于蘇而監察御史劉君甄劉君仕昌鄭君顒皆以事蒞焉郡守李侯從智來會政事之暇語及兹廟因相與嘆曰公之德業著于當時傳于天下後世不繫乎廟之有無也然表先正以儀來今使後生小子得瞻其廟貌想其精忠偉烈而興企慕之心則廟亦不可無也乃各出資俾吳縣令永嘉葉錫圖其成錫毅然以身任之殫心盡力規畫處置凡鄰邑之令佐皆以資來助市良材命衆工為堂前後各三間以奉公及三世先公像東西廂如其數以藏祭器而齋宿寓焉壯麗嚴整有加於昔中作石橋橋南左右為碑亭前作大門榜曰勑賜范文正公忠烈廟經始於是年九月九日閲兩月而廟成直聞之士之能任天下之重者必以天下為心心之欣戚主乎人而不私於已是以天下為心者也以天下為心則人庶其有濟矣初公未顯時巳欲任天下之重嘗曰士當先天下之憂而憂後天下之樂而樂夫憂人之憂而欲免其憂使人皆樂然後與之同其樂此豈小丈夫然哉孟子曰禹思天下有溺者猶已溺之稷思天下有飢者猶已飢之公之心猶是也故其德業之盛不愧乎古人豈特著於西土也哉嗚呼士不以天下之重自任者多矣不以天下之重自任則其所存所行一主於為巳人之利害不少槩於其心而又悻悻然自以為得功烈之卑無足怪也而所以為士者果當如是邪然則公之孫與邦之人士及四方之來者拜公之廟慕公之功業必當師公之心充之以仁義而力行之於公其殆庶幾乎故為之記而道子之所聞使刻諸石以告焉凡以資來助者其姓氏皆載之碑隂皇明文衡卷之三十五
