body:
  text: 䟦恭題豳風圖後宋濂臣濂侍經扵靑宫者十有餘年凡所藏圖書頗獲見之中有趙魏公孟頫所畫豳風前書七月之詩而以圖繼其後皇太子覽而善之謂圖乃方帙恐其開闔之繁當中折處丹靑易致損壞命工裝褫作卷軸以傳悠乆屢下令俾臣題其末臣聞之七月一詩序者謂周公陳王業以告成王故備志稼穡之艱難自于耜而舉趾自播穀而滌塲以至上入執宮功莫不纖悉備具而功女𧖟績之勤繼焉嗚呼國以民爲本也而民之至苦莫甚扵農有國家者宜思憫之安之宋之儒臣眞德秀有見扵斯嘗請于朝欲繪農夫功女勞勩之狀揭之宫掖布之戚里使六宫嬪御外家近屬知衣食之所自來盛矣其用心也恭惟皇太子殿下天賦懿德仁孝温文而尤留意扵農事毎扵禁中藝植麥禾以觀其成則其憫小民勤勞固不待周公之告而後知然而此心易發而難持自古賢君恒存敬畏至以朽索馭六馬譬之願殿下之心朝夕如覽圖時則四海乂安無一夫而不被其澤盛德大業必將度越成王無疑矣臣年雖耄日切望之因推德秀之意備書篇終以竭犬馬之誠云恭䟦御製詩後臣聞自古人君有盛德大業者其積慮深長而詒謀悠乆必日與文學法從之臣論道而經邦當情意洽孚之時或相與賡歌或褒以詩章或燕之内殿君臣之間實同魚水非直以爲觀美所以禮賢俊示寵恩而昭四方也有如唐之文皇宋之太宗其事書之簡編者可以見之矣皇明紀號洪武之八年秋八月甲午皇上覽川流之不息水容澄爽油然有感于宸衷陋尹程秋水賦言不契道乃親更為之賦成召禁林羣臣觀之且曰卿等亦各撰賦以進臣率同列研精覃思鋪叙成章詣東皇閣次第投獻上皆親覽焉復寘品評於其間巳而賜坐勅太官進天厨奇珍內臣行觴觴巳上顧臣曰卿何不盡飲臣出跽奏曰臣荷陛下聖慈賜臣以醇酎敢不如詔第臣年衰邁恐不勝桮酌志不攝氣或愆於禮度無以上承寵光爾上曰卿如試之臣卽席而飲將徹上復顧臣曰卿更宜釂一觴臣再起固辭上曰一觴豈解醉人乎卒飲之臣舉觴至口端又復瑟縮者三上笑曰男子何不慷慨爲臣對曰天威咫尺間不敢重有所瀆勉強一吸至盡上大悅臣顔面变頳頓覺精神遐漂若行浮雲中上復笑曰卿宜自述一詩朕亦爲卿賦醉歌二奉御捧黄綾案進上揮翰如飛須臾成楚辭一章臣旣醉下筆傾欹字不成行列甫綴五韻上遽召臣至命編修官臣又重書以遺臣遂諭臣曰卿藏之以示子孫非惟見朕寵愛卿亦可見一時君臣道台共樂太平之盛也臣行五拜禮叩首以謝上更勑給事中臣善等賦醉學士歌云臣旣退竊自念曰臣本越西布衣粗籍父師明訓弗墜箕裘之業而巳一旦遭際聖明遣使聘起之踐歷淸華地躋禁近無一朝不覲日月之光如此者凡十又七年叨冒恩榮夐絶前比所幸犬馬之力未衰誓將竭奔走之勞以圖報稱今天寵屢加雲翰之章照臨下土臣竊自靖度何足以堪之雖然傳有之泰山不讓土壤故能成其大河海不擇細流故能就其深王者不却衆庶故能明其德洪惟皇上尊賢下士講求黄虞治道度越於唐宋遠甚雖以臣之至愚亦昭被非常之殊渥六合之廣其有抱藝懷才者孰不思踴躍奮厲以揚扵王庭哉臣按南有嘉魚之詩有曰君子有酒嘉賔式燕以樂序者謂太平之君子至誠樂與賢者共之也皇上恩寵之便蕃抑過之矣又按天保之詩有曰罄無不宜受天百祿降爾遐福惟日不足序者謂臣能歸美以報其上臣雖無所猷爲願持此頌禱扵無窮哉古者侈君之命勒諸鼎彛藏諸宗廟嗣世相傳以至扵永乆臣敢竊授斯義礲玉爲軸裝褫成卷什襲珍藏以顯示來裔給事中臣善等應制諸詩附錄其後而賢士大夫聞風慕豔而有作者又别見左方云題司馬公手帖右司馬縕公與范忠宣書一通藏楚郡龍雲從家雲從間請題其後濓聞哲宗初立崇慶太后同聽政起公知陳州過闕留爲門下侍郞忠宣亦從慶州召還爲右諌議大夫俄遷給事中此書正此時所遣其殆元豐乙丑之冬或元祐丙寅之春乎夫公自熈寧辛亥居洛再任留司御史臺四任提舉崇福宫至是始司政柄故書中有閒居十五年之言公年蓋巳六十有七新法方盛行小人附和者衆公度不可止遂絶口不言事故又有更求一任散宫守候七十郎如禮致事之言當是時章惇蔡確黃履邢恕等蛇蟠蚓結牢不可解公新自外至孑然獨立故又有如一黄葉在列風中幾何而不危墜之言公之志爲可悲矣然公與忠宣素相知其居洛日忠宣方丐罷齊州之政判西京留臺乃同爲眞率㑹則其志同道合固非一日之故熈寧之法又皆共怒其爲害而其設施或不同者忠宣則欲去其太甚公則欲鋤剗而絶其本根雖書有隨時示諭勿復形迹之謂二賢之見猝有未易合者豈天未欲平治天下故使之然歟公遣此書後僅及數月且觀化㝠㝠之中忠宣繼公爲左僕射務以博大開上心忠篤革士風四海方翹首望治曾未幾何頴昌之命亦遽下矣不亦重可悲夫閱此帖者當知治亂之機所繫初不可以尋常簡牘視之也題王羲之眞蹟後昔年危內翰太樸出示野鳬帖且云別有喜色帖在江右出自丞相周益公家傳授次第一一有據須谿劉會孟評之謂如蘭亭褁鮓尤爲佳絶濂恨未之見近豫章人士來求墓文忽持此帖爲贄須谿題識宛然居後因驚喜曰此殆太樸所言者徧示中朝善書者咸定爲眞蹟無疑或取唐臨者比之神氣夐然不侔鄱陽劉彦昺最號精鑑法書日閱此而不厭狂欲起舞眞僞之辯固自有異哉須谿所書名中藏三代人物字僞署者輙易别謾拜及之題淵明小像卷後右龍眠居士所畫淵明小像卷鉅公名人題賛於後發揮其出處者甚備固不必寘辭扵其間有謂淵明恥事二姓在晉所作皆顕年號入宋之詩惟書甲子則惑扵傳記之說而其事有不得不辯者矣今淵明之集具在其詩題甲子者始扵庚子而迄於丙辰凡十有七年皆晉安帝時所作初不聞題隆安元興義熈之號若九日閒居詩有空視時運傾之句擬古第九章有忽値山河改之語雖未敢定扵何年必宋受晉襌之後所作不知何故反不書以甲子邪其說蓋起扵沈約宋書之誤而李延壽著南史五臣註文選皆因之雖有識如黄廷堅秦觀李燾眞德秀亦踵其謬而弗之察獨蕭統撰本傳謂淵明以曾祖晉世宰輔恥復屈身後代見宋王業漸隆不復肯仕朱元晦述通鑑綱目遂本其說書曰晉徵士陶潛卒可謂得其實矣嗚呼淵明之清節其亦待書甲子而後始見邪姑叅先儒之論而附著扵左方云朱文公書虞帝廟樂歌䟦胡翰桂林有虞帝廟在虞山之下皇潭之上宋淳熈初張宣公典郡因而新之朱文公記于石樂歌二章則其所係之辭也九年文公過常山書贈吕子約子約成公母弟也時佐治于衢故人傾蓋酒酣意適灑然見之翰墨間宋以來二百年矣蓋王氏之先得之淸江時氏而時氏得之吕氏者魯公之孫葯至今寳藏唯謹余㓜讀金吉父濓洛風雅卽熟是辭今復扵王氏見公遺墨惟帝有虞氏德侔覆載雖古先記禮者不足以知之唯公歌詠之間抑揚曲折辭不費而意已獨至矣世之纂述者宜表而出之以備公續騷之辭豈在鞠歌行下哉劉養浩鐃歌鼔吹曲後䟦右皇明鐃歌鼔吹曲十有二篇烏傷鎦剛之所作也剛受學於前翰林學士潛谿宋先生先生愽學能古文辭嘗叙𫐠宋太祖太宗功業之盛爲宋鐃歌傳誦縉紳間以爲度越姜䕫可追比唐柳子厚今剛此歌篇次體製皆承子厚之舊而才氣横發音節鏗鍧則得之潛谿又將追躡其武而駸駸其前矣昔濳谿在前元時去宋頗遠其言宋事皆徵諸史傳所載若剛也生際聖朝躬涉干戈之亂登于大猷故凡天運神斷指授諸將掃除羣雄合天下而爲一者非若史傳所聞十年之間皆剛與余所親見也顧余老矣無以模寫萬一扵是得剛所作令童子誦之而余聽之洸洸乎如在短簫鐃鼔間不知其爲衰颯也范賢良帖後范公茂明世家香谿當宋中葉衣冠而仕者彬彬一門之內公舉制科不就而此書則遺其姪元問者蓋元卿以下輩也余觀元卿類次公集知其平日所守純一篤實不以朝廷之利祿爲可慕公卿之薦引爲可階其扵聖賢之學如飢渴焉嘗曰學者覺也心且不存何覺之有又曰上智之學德性是尊無視無聽昭然者存其言超然自得不但心箴爲可取也乾道以前乃有斯人乎豈非特立有志之士哉昔陳巖肖稱公危坐一室敗幃故器人所不堪而神宇泰然終日與之對無一言及世間事今卽其心畫言論之存者想其人扵二百年之上爲何如也君子扵此其亦可以興起也夫童中洲和陶詩後䟦陶徴士之高節非晉宋人比也讀其詩者未嘗不悠然想見其蕭散冲澹之趣故世慕之如韋應物之擬作蘇子曕之和篇徃徃不絶余意欲與之角顧縻扵世之塵鞅敝於末習之襞積未能脫去今中洲是集何其駸駸逼人若是哉蓋兼取二家而寤寐乎柴桑栗里之間者可謂好之篤而思之精矣其有不合扵古者乎抑古之比興非以能言爲妙以不能不言者之爲妙也此所謂發乎情也太音在天地流𬒳萬物前者唱于後者唱喁果孰使之中洲之發乎情者亦將若是乎雖尚友千載可也葛天氏之民歟無懷氏之民歟其尚爲我𥙷諸牛尾之歌吾固將擊壤而和之矣獨不知聽之者其誰哉書劉禹疇行考傳後劉基世之所謂浮屠者果何道而能使人信奉之若是哉人情莫不好安樂而惡憂患故惴之必扵其所恒懼誘之必扵其所恒願然後不待驅而自赴浮屠氏設爲禍福之說其亦巧扵致人與夫四海之衆林林也而無不爲其所致何哉彼固非止惑愚昩而巳也人情無不愛其親親殁矣哀痛之情未寘而謂冥冥之中欲加以罪孰不惕然而動於其心哉間有疑焉則羣咻之若目見其死者拘扵囹圄受箠撻而望敕者故中材之人莫不波馳而蟻附雖有篤行守道之親則亦文致其罪以告哀于土偶木俑之前彼固自以爲孝而不知其爲大不孝豈不哀哉且彼謂戕物者必償其死故有牛馬羊豕蛇虺之獄謂天下之蠢動者舉不可殺也今夫虎豹鷹鸇摶擊蜚走以食日不知其幾何而獨無罪也哉人之殺物有獄矣虎豹食人而無獄何其重禽獸而輕人也彼又謂婦人之育子者必有大罪故兒女子尤篤信其說以致恩于其母吾不知司是獄者誰歟人必有母將舍其母而獄人之母與將幷與其母而獄之與獄其母不孝舍其母而獄人之母不公不孝不公俱不可以令二者必一居焉將見羣起而攻之矣雖有獄誰與治之宰天地者帝也彼則謂有佛焉至論佛之所爲呴呴嫗嫗若老婦然有呼而求救不論是非雖窮凶極惡無不引手援之使有罪者勿懐刑是以情破法也夫法出扵帝而佛破之是自獲罪于天也吾知其無是事也昭昭矣以劉子之賢其不爲所惑無足恠者吾獨悲夫天下之爲劉子者不多也故又爲之言以寤夫知愛其親而不知道者書善最堂卷後武林陳舜中以善最名其堂介其友富君子明求予言夫立言以明道而求言于人者將以正已之所學言可以苟乎哉所謂善最者蓋本扵東漢東平王王之言天下之格言也人以是而服膺焉聖賢之爲道不外是矣然善之云不過槩而言之求諸實踐必有其方不可徒云云而巳也今夫世俗之人類以善自名也觀其行而不掩道之不明也乆矣夫善未易擇也恭與謟相隣訐與直相似小諒賊信小慧賊智小剛賊勇小不忍賊仁故有非禮之禮非義之義疑似之間禽跖分焉可不慎哉是故擇焉而不得其中道焉而不知其窮古之人有爲之者楊墨是也知焉而不能蹈好焉而不能用取其名不必其實古之人有爲之者郭公是也若人之心未嘗不自謂巳能善也而卒扵不善爲善之名豈易當哉且題扁之設起扵何人乎盤之銘几杖之書朝夕警省淬厲以成其德非衒外以爲觀也今之揭于軒摽于楣大書以示扵人者其果有志于自警乎抑將從事於詠歌以爲娱也屈子曰善不由外來名不可以虚作也古之有衞武公者抑抑之戒陳于庭而􅐶聖之名垂于後若是故詠歌乃有益也嗚呼詩不如抑人不如衞武公則求者爲徒求言者爲妄言矣題劉商觀奕圗右昔人臨唐劉商觀奕圖其曰李伯時臨茅君彦勒蘇先生識蓋皆假設之云而其描寫模刻實俱妙絶不必問其眞作扵何人也王生以采薪入山父母妻子侍之以食見奕者而躭觀之至于爛其斧柯豈所謂力本者哉比歸而親戚鄕黨咸非其舊可悼也已一夫一婦不獲自盡伊尹恥之以戯迷愚人使之老無所依其果有是事耶神仙亦未仁矣題王右軍蘭亭帖王右軍抱濟世之才而不用觀其與桓温戒謝萬之語可以知其人矣放浪山水抑豈其本心哉臨文感痛良有以也而獨以能書稱扵後世悲夫書代祀馬援頌後王禕初王君廉使安南奉上旨就齎白金若干兩具牲牢代祀馬援扵横州之烏蠻灘至則覩其廟貌頽壊因斥餘金俾有司繕脩之功畢始藏事蓋以遂事爲之也廉還白于廷臣或謂非上本旨格不敢聞乃洪武四年二月十三日丁卯上御大本堂大師韓國公及禮部太常翰林諸臣咸在焉廉因秦對之頃具言脩援廟事上曰援當時殺戮羣蠻過當故蠻俗今猶不共其𣏌耳爲之脩廟良是也扵是廷臣乃韙之謂廉善爲使云大事記後記東萊先生吕成公躬任斯道之重諸經旣皆有所論著而於史學尤長其用古䇿書遺法作大事記誠史家之大法也當時朱文公蓋深服之謂自有史䇿以來無如此書之奇者𥘉公爲是書務存古意故其與解題各自爲書今用春秋經傳相附之例以解題附見于各條之下雖云非公之本意而庶幾習其讀者獲便於觀覽間竊以臆見復加蒐輯而補其一二不韙之罪則固所不敢逃也書鄭子美文集後鄭子美先生所爲文余十年前甞得其漢唐諸論頗病其體制徃徃或出扵繩墨心未之好也今年復獲其師山集盡讀之觀其操議持論務辯道理談名義蓋汲汲焉以扶植世教自見心歎服之扵是乃愧向之知先生之不能深也雖然以文求先生非知先生者欲論先生當自其平生大節而觀之初先生隱居于郷教人接物一體扵風義至正中宰臣以名聞詔拜翰林待制兼有上尊名幣之賜先生疾當世方奔競成習將有以抑之則抗䟽控辭其言曰臣問學之淺深他人不能知臣實自知之所謂吾斯之未能信豈敢貪冒恩榮以自欺其心酒與幣天下所以奉陛下陛下得以私與人臣不敢辭名與器祖宗所以遺陛下使與天下之賢者共之陛下不得私與人臣不敢受䟽聞朝廷不之強也居無何而千戈起徽城䧟焉城守者將要致之使爲用先生厲色拒之曰吾豈事二姓者邪因被拘囚郡中詘辱者乆而志不少變親戚朋友擕具餉之則從容爲之盡歡且告以必死狀其妻聞之使語之曰君茍死吾其相從地下矣先生謂曰若果從吾死吾其無憾矣明日衣冠北向再拜自縊而卒嗚呼先生扵出處死生之際其大節表表如此而世之以文求先生者豈足以盡先生乎况求之以文者不觀其所以自見而徒徇夫言辭之末其尤淺知先生矣唐司空表聖韓致元所爲辭章凡近纎靡無足多者而其處進退存亡能不夫其正節義所在君子蓋深許之其所爲不朽者有在彼而不在此也予懼夫人讀先生之文者如予向者之所病故竊志之以爲告世有知言者其必謂予能知人也哉先生名玉字子羙徽州人皇明文衡卷之四十五
