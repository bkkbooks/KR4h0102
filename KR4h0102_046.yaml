front:
  text: 皇明文衡卷之四十六
  hash: sha256:7442490952b7a1e38ce7a38a92d4a7809dba2efe759dd8614ecdd09894f0e654
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_046-1a}
body:
  text: 題跋跋東坡尺牘後趙汸宋禮部尚書贈太師東坡蘇公忠義貫日月名聲塞宇宙蓋千載一人也妙齡登高科思以文學經濟如賈太傅陸宣公中歲偃蹇不偶留心佛乘交友禪伯如白樂天柳子厚晚節播遷嶺海遂欲隂學長年超然遐舉如安期生梅子真此公乎生學術三變見於手筆書疏者具有本末也若夫文章妙天下特其餘事傳周易尚書解論語亦博洽之及爾要非志氣所存然公嘗有曰膠西多古君子使蓋公真往來其間軾何足以見之與答陸子厚書所論黃高人之意適同噫內聖外王之道不明而豪傑之士不能忘情於方外者如此然則世人所求於公者殆其粃粳土苴耳至正巳丑秋過倪氏黟川寓居敬書此于其所觀東坡尺牘後書所編李文公集篇目後李文公集十有八卷凡百四篇江浙行省參政趙郡蘇公所藏本某既從公傳寫復總其篇目如上始汸見歐陽公論文每稱韓李其讀幽懷賦恨不得與之同時上下其議論而老泉蘇公亦謂李文其味黯然以深其光油然以幽自是每欲求其集觀之不可得所得者文苑英華中數篇而巳既又見豫章黃公謂皇祖實録文如女有正色又子朱子論復性書雖病減情之旨出於釋氏而亦善其有如此思慮益以不覩全集為憾至是乃請於公而得之甚慰也公名翶字習之中進士第元和間為史館修撰疏言既以武功定海內當革敝事復高祖太宗舊制用文德興太平不然恐大功之後逸欲易生因條上正本六事憲宗不能用後遷禮部郎中面折宰相李逢吉過失移病去雅好推轂賢士韓文公嘗書與之云於賢者汲汲惟公與不材爾其復書以為韓公雖好士惟其有文章兼附已者無所愛惜或不能然則不肯薦拔與巳不同又嘗以書責裴晉公居相位道不行忍耻內愧不能引退其於師友及知巳厚者骨鯁無諱忌如此則視逢吉輩何所憚而唐史乃言由不得顯仕怫鬱無所發面斥逢吉既斥之又自懼而去其言抵捂非事實甚明昔人謂韓公於學莫如文章於德莫如好直而習之文行庶幾似焉則以韓諡名而韓李並稱可無愧矣參政公將刻梓以廣其傳於學者故汸竊著其為人大略且非排史氏之妄以明歐陽公為知言云讀貨殖傳貨殖傳當與平凖書參看平凖書是飢人臣橫斂以佐人主之欲貨殖傳是飢人主好貨使四方皆變其舊俗趨利書首言漢興接秦之弊高祖重本抑末輕徭薄賦故文景之世國家無事百姓給足府庫充實人人自愛而重犯法後面序武帝事節節與前相反至贊論始推唐虞三代以來而舉戰國秦皇功利之禍為證則武帝不能法祖宗之仁厚而蹈始皇之覆轍不待譏議而可見學者先讀此贊而後讀其書使先後相承則太史公之意瞭然矣若貨殖傳乃此書之注腳而未有察其意者蓋傳中所謂當世賢人則書中所斥不軌逐利之民也傳中所序陶朱公白圭輩妙於治生即書中三人言利事析秋毫之比也傳言鄙人牧長窮鄉寡婦禮抗萬乘名顯天下宣曲任民以田畜高而人主重之即書中言卜式以家財助縣官天子尊顯之以風百姓意尤著矣蓋見始皇武帝皆以好大喜功國用不足而後眷眷於此等人也傳中歷舉四方百貨所出行賈所在甚詳即書中置大農諸官盡籠天下之利貴賣賤買所以天子無算之用皆出於此傳中言千乘之侯尚猶患貧即書中屢言稅賦竭縣官大空是也傳中言廊廟巖宄軍士任俠攻剽女姬遊間吏士等皆為財利所以深誚當世好貨之俗無貴賤也末言當國者必以竒勝而又歷數好事惡業賤行辱處之能致富即書中所謂不益賦而天下用饒亦此類矣循此傳之意深陋為天下國家者不當下行啇賈之事蓋是當時親覩言利之人誤國害民如封禪書中所謂究觀方士相官之意云者故言之深切至此後人但謂子長陷於刑法無財可贖故發憤作貨殖傳豈為知太史哉雖然遷之言亦激矣豫獨謂其書明白諄復如是千百年來讀者猶未能深悉其意况夫六藝之古遠淵奧而傳注家自謂盡得經旨可乎讀鄭虔傳徐一夔按鄭虔傳鄭相如告虔曰天寶十三年逆臣僣亂當汙偽官願守忠節相如言時開元三十年也及安祿山反虔果陷賊中祿山署虔水部郎中虔念其言稱疾求攝市令事平議罪虔得減死論貶台州司户夫為臣死忠理之常也虔以相如豫告故不受偽署不然則受之邪讖緯之學聖賢所不道宋景文撰唐書敘事嚴簡而泛及符讖雜説非以為訓也以著虔之不知自守爾覽者無惑焉書宋學士所書陳思禮孝事後豫讀學士宋公所書陳思禮孝事未嘗不嘆思禮至行人所不能及者陳氏四明儒家思禮甫七歲其父不幸蚤世母夫人石氏誓不他天以鞠育之夫人又以思禮陳氏獨子教之甚嚴思禮亦克承母志力學唯謹暨弱冠石夫人與之議婚巳而夫人殁思禮創巨痛深奮欲隨母死賴親戚朋友力慰解之乃止年二十四親戚朋友勸之娶思禮掩耳不答衆迫之曰娶妻以為養也吾親既殁何以娶為親戚朋友據義責之不得巳從之及期合卺危坐誦蓼莪之篇凡七晝夜不輟哀動人人嗚呼遠則易忘人之常情也思禮不忘其親如是可謂至矣人有恆言孝衰於妻子以思禮觀之豈其然哉思禮又嘗作堂為時饗之所顏曰如在及以貢至京師入太學為上舍生宋公及御史中丞劉公鄂省參政陶公凡朝之大夫士咸愛重之為歌詠論著甚悉豫因托學士所書孝事有合於近古所謂卓行君子所為者表而出之云歐陽公書王彥章事古人為文非徒然也蓋必有為而作宋至慶曆蓋巳四十年不用兵矣一旦趙元昊叛兵聚西陲歷四五年而攻守之計不決歐陽公獨持用奇取勝之議朝廷不以為然而邉將多失機會公以梁將王彥章之善於用奇也故於其事獨惓惓焉彥章姓王氏鄆州壽張人號王鐡槍事梁至宣義軍節度使梁晉交爭河上之戰凡數百合彥章戰輒勝至於德勝之戰尤竒末帝時小人假疑用事忌彥章功名唐兵攻兖州故與羸卒遂至於敗見執於唐死之歐陽公著五代史既列彥革於死節傳而加感憤歎息其後在河北又得其家傳并畫像以家傳輔舊史之略以畫像損壞重加輔緝且為著畫像記至於德勝之戰傳既書之畫像記復申言之不厭於復其所以然蓋致其希慕不可及之意而警發當時用兵者之不尚奇也議者以謂古之良將多矣歐陽公何獨惓惓於彥章其意蓋不足於公也夫公不舉古之良將而獨舉彥章非謂古之良將不善用奇也蓋舉近則人易知所謂殷監不遠在夏后之世是也若謂彥章事梁為亂賊之黨而以其死為徒知食焉不避其難之為義則尤大非且自古亂賊莫甚於漢之莽操梁雖倔起乘唐衰而取之視莽操尤當末減且楊雄嘗事莽矣荀彧嘗事操矣彥章起自卒伍素不知書尚得而咎之哉彥章之事梁政如舅以嬖妾為妻為之婦者何敢不以為姑乎苟其説行非特不知歐陽公之意有在且不知五季之世死節之臣為不多見使彥章之忠義不曰于天下後世無以為人臣勸因著于篇題唐仲友輔傳朱右於呼世故有誑人以理之所有君子或昧焉語曰不逆詐不億不信豫讀唐仲友輔傳而竊有感焉𥘉仲友以乾道七年守台時朱熹提舉浙東常平仲友發粟賑飢抑姦拊弱創中津浮梁以濟艱涉民至今賴之永康陳亮以縱橫之術與仲友不相能然亦未嘗信程朱氏學也亮揆無以抑仲友乃設詭計若為歆豔性學者朱子遂信之行部過其家乘間為飛言中仲友高文虎為通判復以舊怨傾之嫉惡之心君子為多於是朱子力擯劾仲友至六上章廷議終不決元修宋史謂仲友為朱子所斥乃不載之簡䇿是或非朱子意歟春秋據事直書善惡自見今史官宋濂為補此傳有旨哉唐李泌傳贊贊曰豫觀唐人材出處從容有三代王佐器唯李泌陸贄而巳泌自贊復兩京功成身去代宗再徴權臣間忌浮湛外任德宗以春宮之知委心聽用泌亦竭智盡忠展布政體謀慮計畫洞燭物情故治效聿著述其安馬燧取懷光相李勉保韓滉單騎以來抱暉設伏以擒叛卒開三門運路屯關中荒田國用日充邊鎮欇伏其績章章可紀至於辨太子冤則曰天子以四海為家宰相當豫帝贈白起則曰國將興聽於人帝言有命則曰君相造命不可言命其言又足徴者唐傳乃謂其隨時俯仰無足可稱取媚以求其位豈信史哉因采舊聞參諸記録别著泌博以表見之使善不沒實為後世鑑若趣尚太清未免惑於隱怪亦其質之未純者與跋宋平金露布文梁寅右平金露布文一通宋忠翊郎荆湖制置司屬官程君之所撰也夫宋之平金義舉也故為露布者其理順其辭正而子孫寶藏之者足以為忠義之勸或曰其時之士論以為當金人之肆毒讐冝復也而不能復及與金和矣則讐不必復也而反欲復之是烏得為義舉哉余以為不然夫和非義也後反之則為義矣且宋之安危不係於金之和不和元既興則與金和以拒元固危也不與和而助元以滅之亦危也其危一也則寧徇於義故曰滅金義舉也程君名萬家饒之樂平寶藏是文者君之五世孫椿字元齡湯仲謀握奇衍義跋唐肅右握奇衍義一卷大梁湯仲謀所作也八陳之説始於握奇而推衍於孔明今魚復壘石即風后法也但諸家所解奇正之説不一或以天地風雲為正龍虎烏蛇為奇或以八陳各有奇正或以八陳為正遊兵為奇或以天地為旗風雲為幡龍虎烏蛇為陳之別或以四正四奇為定陳而配八卦之位是皆末悟握竒之意者也湯君學博而識明研究覃思得其旨趣故撰為衍義以示同志大意以奇正相半不可以天地為合風雲龍虎烏蛇為分而曰天衡地軸自可當八陳之半又曰孔明所衍果出握奇分乎其言皆引而不發愚嘗竊求其意孔明八陳正合握奇但握奇隊數與壘石不同握奇一隊當壘石二隊如天衡重列在握奇則八隊在壘石則十六隊地軸單列在握奇則六隊在壘石則十二隊以此而推曰天衝地衝曰風曰雲無不吻合則孔明所推衍出於握奇必矣天地風雲隊數既總為六十四矣則龍虎烏蛇果何在哉蓋天軸地衡定而不變此所以為正也天地前衝變則為虎天地後衝變則為龍風變為蛇雲變為烏此所以為奇也故陳勢雖八其實為四經曰四為正四為奇曰天有衡地有軸前後有衝風附於天雲附於地未言龍虎烏蛇也即曰總為八陳及曰聽音望麾以出四奇乃曰天地之前衝為虎􅛺風為蛇蟠天地之後衝為飛龍雲為烏翔則龍虎烏蛇實出於天地風雲而非別有四陳也非定而不變者為正動而有變者為奇乎由是知湯君所謂天衡地軸自可當其半者意實在此持夫作者之自明耳若其疑孔明之推演則又曰以八數觀之意亦出於握奇亦明壘石即風后法矣愚何幸因湯君是編而有進焉敢識此於卷末跋山谷墨迹右黃文節公書韓昌黎桃源行一首蓋崇寧六年十月筆也按公元年罷知太平州管勾洪州玉隆觀以嘗忤趙丞相挺之為轉運判官陳舉承風旨劾公所作荆州承天觀塔記有幸災謗國意遂除名編管宜州三年由鄂過洞庭潭衡永桂三年五月始至貶所云十月十八日則公至宜州巳半載明年九月公物故僅一載耳嗚呼公以六十之年橫至貶斥郡守從而厄之至不容居關城中其困苦至矣然觀其跋李資深書有云子城僦舍上雨傍風無所蓋障人將不堪其憂余自念家本農桑使不從進士則田中廬舍亦當如是又何不堪其憂邪公之樂天知命不以得失蒂芥于中者如此故能以文墨自娛而書法至老益臻其妙也宜州無佳筆公每以三錢市雞毛筆作字此𥿄亦果用雞毛筆則公書之妙又不可及巳公嘗自言元祐中與子瞻穆父飯寶𣑽僧舍作草書數𥿄子瞻賞之再三穆父無一言但云恐未見藏真真迹耳余心竊不平及至黔中得藏真自序諦視數日恍然自得落筆便覺超異然後知穆父之言不誣則公書法自黔中以後即追蹤懷素不待至宜州也雖然公之所以名當時傳後世者夫豈止於書哉第因其書想其人有以繫百年之思耳書唐李鄴侯傳後謝肅右唐李鄴侯傳二卷天台朱君伯賢之所修也伯賢先君子約齋先生於元政漸弛將亂之際每令誦習鄴侯家傳此其心之所存為何如然當世終不能用先生先生殁餘三十年板蕩極矣而君之袖簡猶存顧以其文漫誕間加筆削辭簡而義該使鄴侯輔唐中興勳業赫赫于目前者其以約齋之故也歟昔張魏公佐宋南渡猶諸葛忠武侯之相乎漢也盡瘁出師規復中原功雖不成而志則甚偉故其子敬夫為修武侯傳焉今君汲汲焉以鄴侯之家傳是修則亦聞其風而興起者乎夫魏公行武侯之志者也約齋存鄴侯之心者也然鄴侯之出也天未厭唐諸將俲忠故其復兩京也易武侯之出也漢運既去羣雄角力故其還舊都也難非其才智不相及之謂也或曰迹魏公之行事固似武侯矣以約齋而視鄴侯曾何勳業之可並稱邪曰嘻是殆以隱顯而論夫士者也亦安知約齋非方隱之鄴侯鄴侯非巳顯之約齋乎故欲知約齋之心者觀於鄴侯之傳則得矣而二傳之修皆以子而寓乎其父經世之心志焉豈徒然哉豈徒然哉題宋仲珩歸省卷後張孟兼豫友宋仲珩執丈太史公之仲子也性敏學博自少工書法侍太史於京師會建奉天殿禁中有詔徴書額時豫備官儀曹即以仲珩名聞俾謹書之而尚書楊公以進既稱旨遂問其父子之賢巳而仲珩𬒳勑草古詩若干首上覽之稱譽有加焉皇太子暨晉王亦知仲珩之能書時出雜篇章令寫之於戲以仲珩之妙年擅當代書之名上徹天聽玉音之所獎豫其為榮遇可謂千載一日猶祥麟威鳯出際盛時莫不爭先快覩榮名美爵祿見寵𬒳于身蓋無疑矣今仲珩奉太史公命歸省丘墓中朝士大夫咸賦詩送之前御史中丞劉公為序其篇端豫既賦詩復書此卷末與之識别庶幾鄉邦俊彥有見者尚當以仲珩而加勉哉書清宴閣宴記後蘇伯衡洪武庚戌秋高麗國王遣其陪臣刑部侍郎金柱來朝獻柱頗知文墨折節從朝之名公遊間出此記以相示自言其八世祖緣所作也以其時考之實宋重和之七年時淵聖在御日久狃於宴安荒于盤樂嘗宴宰輔蔡京王黼等于宣和殿而京作曲宴記流傳四方以為盛美是以高麗聞而慕之清宴有宴而緣為之記也則知上行下效其捷如此况中國之為君臣者以道德仁義化成天下表儀萬方則遐方之觀感慕效又當何如哉且蠻夷僻陋之邦而其文學侍從之臣紀事陳義之善有若緣者代之詞臣蓋不能無愧焉而有宋文治之懿作養之盛人材之衆言語之工無內外逺近之間於此亦可以見矣是以録之題鄭宣撫墓志後伯衡竊聞公宣撫川陜節制諸將嚴甚吳璘而下每入謁必先庭參然後入就坐一日璘除少保來謝語主閽吏欲講鈞敵之禮吏以白公公厲聲曰少保官雖高猶都統制耳倘變常禮是廢軍容少保若欲反則可取吾頭去庭參之禮不可廢也璘皇恐聽命時諸將咸陽憚而隂忌之始見公擢自溫州通判不數年登禁近以資政殿大學士帥蜀意公秦檜之黨也雖忌而莫敢出聲後見公遇事輒與檜抗知非其黨也乃譛之檜言其有跋扈狀檜入其言謀于王㬇㬇以為不若選一宗室有風力者往制之因薦趙德夫於是創四川總制財賦以命德夫德夫至坤維辟朝公武幹辦公事且屬其物色公隂事公武起久廢又引公所逐使臣魏彥忠者相與盡力擠之遂興大獄而公竟謫封州以殁於戲正人之不能獨立從古則然豈獨公乎且公帥蜀八年欲加之罪何患無詞而况諸將忌之於外宰相銜之於內迎合徂伺於前後左右者又其仇人此固司馬溫公所謂獨一黃葉之在風中也雖欲無危其可得乎偶觀墓志文輒疏所傳聞于後以輔其略亦以見羣枉害正其勢蛇蟠蟻結牢不可破如此可畏也跋陳子上書於戲重其身愛其妻子不能忘其墳墓去其鄉里人之情也而至違鄉里捐墳墓棄妻子而置身於艱險之地則以所重者甚於身所愛者甚於妻子所不可忘者甚於墳墓所不可去者甚於鄉里也身非不重也而有重於身者焉妻子非不愛也而有愛於妻子者焉墳墓非能忘也而有不可忘於墳墓者焉鄉里非能去也而有不可去於鄉里者焉夫安得不舍彼而取此哉然非識輕重之人烏乎能之吾讀陳子上貽謝復元書未嘗不歎其於輕重也明於取舍也審而又悲其適丁斯時也使子上不丁乎斯時則固重其所重愛其所愛不忘其所不能忘不去其所不可去若尋常矣於戲子上何其不幸也邪子上余友也同薦于鄉同試于禮部後一再見于四明而遂永訣矣曩在京師從揭兵部伯防得其所著子上埋銘讀之而高其行而偉其志今讀此二書愈益信其行之高其志之偉雖去之二十年餘而生氣猶凛凛焉於戲子上真賢乎哉錢用壬傅豫敬趙時泰唐元嘉皆子上同年進士也彼惟重所重而不重其所不可不重愛所愛而不愛其所不可不愛不忘所不能忘而忘其所不可忘不去所不能去而去其所不可去卒之身首異處妻子戮辱墳墓無主而為鄉里羞然則子上之不幸固未若彼四人之不幸也子上雖客死山東然喪葬以禮墳墓妻子皆無恙而鄉里與有榮耀然則子上豈真不幸也邪甚矣輕重之當明而取舍之當審也雖然向微復元子上安能決去而其墳墓妻子亦安能保全是故子上之遂其去志而墳墓妻子之獲保無他虞者以復元能委曲調護之也於戲復元真子上友哉復元亦賢矣哉跋眉庵記後高啓右嘉陵楊君眉庵記謂眉無用於人之身故取以自號夫女之美者衆嫉其蛾眉士之賢者人慕其眉宇而不及口鼻耳目則眉豈輕於衆體哉蓋衆體皆有用眉安於其上雖無有為之事而實瞻望之所趨焉其有類乎君子者矣世方以僕僕為忠察察為智安重而為國之望者則以為無用楊君亦有感於是歟讀之為之太息題王氏述訓後方希古師弟子之教不立世之學者一變而為陳相再變而為逄蒙由蒙而變不至於羿之為不止也其漸豈不可畏哉豫過梁宋間覩河洛之俗可駭焉至汜水見河南按察僉事王侯履道所為述訓歷紀成童時所從之師以致不忘之意其情辭忠厚有足感人者嗚呼薄夫惡子觀乎此其尚知所愧耻而感慕也哉皇明文衡卷之四十六
