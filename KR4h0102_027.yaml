front:
  text: 皇明文衡卷之二十七
  hash: sha256:72783c831da0560739e6774ba246329d04c23b08358f0ff326476ee6689bcc75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_027-1a}
body:
  text: 書與貝川先生書洪武三十二年十二月河州作解縉縉薫沐拜書貝川大人先生閣下違逺誨言荐將十稔天涯闊異感念奚云縉率易狂愚動遭謗毁無所避忌數上封事萬言有分封勢重輔導體輕萬一不幸有厲長呉濞之虞那哈木來歸之時欽承顧問宜待之有禮疑則勿任任則勿疑稍忤機權其徒必二此類非一後皆億中封事留中又嘗爲王國用草諫書言韓國公事爲詹徽所嫉欲中以危法又爲夏長文作劾袁泰書泰衘恨至深見常切齒但以不爲屈膝之故竟致排誣累迹深文之語皆非律令所該伏蒙聖恩數對便殿中之以慰諭重之以鏹錫許以十年著𫐠冠帶來廷元史舛誤承命改修及踵成宋書刪定經禮凡例皆以留中奉親之暇杜門纂𫐠漸有次序荐將八載賔天之訃忽聞痛切之誠欲絶向非先帝之明縉亦無有今日是以毋喪在殯未遑安厝家君以九十之年倚門望思皆不暇戀兾一瞻山陵隕淚九土何圖罣悮蒙恩遠行楊粤之人不堪寒苦復多疾病俯仰奔趍與吏卒爲伍低回伏事誠不堪忍晝夜涕泣恒懼有不測之憂進不能盡忠千國退不得盡孝于親不忠不孝負平生學問之心抱萬古不窮之痛爲天下笑爲先生長者之羞是以數鳴哀感兾皇天后土之鑒臨得還京師復見天顔少陳情悃或遂南歸父子相見卽走也更生之日臨書不勝感切願望之至奉陳貳卿書黃福五月二十一日莫叅政至二十四日潘知府至二十八日陶指揮又至惟陶有批示莫潘到時問至再三極知鈞候淸吉可慰而潘續云曽有幕府之鸞緘巳葬神投之魚腹竟不知二楮先生所載云何旣不得瞻手澤之光華又不得聞心聲之淸切使人疑其所謂益其所思雖藩宇之左瀘水之東亦無以釋懸懸之懷也風伯不仁可恨也哉區區前巳有書乏便未發與發而沉者無異然慮其事深切于懷且莫邃運糧黔公出哨若謂無人不信也翁挺來降阮彦出見雖彼勢衰懼我威大若不得焚輿櫬亦難以奏凱歌演又之衆服者以有大軍在也一旦班師難常按堵不特此也各营士卒造舟楫辦戰器遠征近哨暑行瘴宿饑祼相仍疾病相藉不可謂不劳矣巳附夷民打船板納稅糧當差役垂髫戴白不得息肩加以盗刼縱橫衣食窘迫不可謂不疲矣軍劳民疲財殫師老守此而失彼得西而遺東而尚畏首畏尾左遮右護噤無一語以逹九重是猶掩耳偷鈴諱疾忌醫也不知仁人君子深謀遠慮長治乆安果如是也不乎言自小子而行在閤下誠不以愚言為迂而以力行為任請益以兵相地屯守養我士卒寛我民力堅城垣利器械廣其屯田實其倉廩兵閑食足民安化行則桑土牖戸之事備居重馭輕之計得誠如是也戰勝攻取無適不然彼區區之賊獲與不獲降與不降又何足爲重輕哉人甞有言耕當問奴織當問婢閤下與元戎胸中自有許多韜畧固不待人紛拏論也但慮及斯自不容巳此論之外示及造船合藥幷取食物一一如命另有單陳不同干聽今竝以先具未發之書倂上要當合而觀之恃舊布忱故敢率爾事機之暇亦可於戎閫處從容言之如其迂闊當卽付之千頃之陂母啓人議可也西風鴻便亦宜寄聲卽今盛暑尚冀調理奉總兵官英國公書交阯平定以來八年之内民已三變而兵亦三加矣原其所自皆由惡本未盡除守兵不足用故也黎氏雖除而簡定存簡定雖去而季擴在今季擴旣擒帥鎔景異之徒又以悉在網羅而無溺者似爲無事矣然馭之有道則可以漸安守之無法不免再變何者陳元揝乃季擴昆弟也今雖遠遁視之若小可他日焉知不能爲簡定季擴之續乎僞官頭目今雖降附待之爲至厚焉知他日不能爲阮帥景異之亂乎今成功之將在此全盛之兵在此吾忝爲守官不於此時此際言其所以而共議守備之䇿以圖長乆之治而乃亦曰安南從此無事矣是謂自欺也欺人也若忍於自欺苟且偷安似爲得計然當言不言何以辭君子公論之譏若曰欺人依違取媚噤無一語直至事壞而始上瀆宸聦則亦無以免朝廷法度之議慮至于斯言何容巳謹將鄙見逐一條陳尚冀采擇幸寛狂妄一本處地方前者賊未就擒蒙調三總戎大軍到來征守猶必三年之乆而始克清大憝今交阯都司衛所原守官軍見在旣少而演又新平順化地方又闊迢迢千里無一兵守而止以土兵者若謂覊縻干一時則可若謂長治乆安則未之信也三總戎若留一鎭守猶爲庻幾倘皆振旅而歸恐俘獻未至京闕而警報巳徹聖聦矣乞蚤圖之一交阯原留守兵九衞一所七分之數通該四萬七千餘人在全盛之時而猶不能禦侮以致煩兵屢舉今事故之數四去其三以如此險遠之地反反之民而以舊日所遺一分之兵守之實未見其可也必須添置軍衞𥙷完空伍庻免後艱今將合設衛所去處開列于後演乂一帶黃江上下太平等處海口譚舍江銳江魯江鹹子関廣威大堂等處靖安州萬寜等處太原府官良等處鎭夷関等處海潮希江等處一市橋所南有鎮夷北有昌江而本所居中且近實爲虚設如將本所移置芹站以控禦鎭夷関本関止令土兵守之如此則鎭夷隘留有相應之利衛所官軍免輪守之患一歸化石廩関上通雲南臨安下貫嘉興三帶水陸數百里寥寥無一城守萬一有警仰之於誰莫若於臨安衞摘撥二所官軍於臨安府垜集三所民兵立一衛於歸化州如潼関澤州犬牙相制之例以控制上下地方便益一丘温坡壘隘留三衞所原垜廣西土兵近年以來官不得人逃亡之數十去七八其一二分在役者率皆老㓜貧弱代身有名無實是致盜常竊發路毎不通如於廣西調一都指揮仍領原調官軍於丘温鎭守就行總督前項衞所土兵更選土官之能事者管之嚴禁不許雇倩代役務要正身將帶當房家小常川在役如此庻便一廣西田州府去本處鎭夷關不遠彼處兵强弩利諒山一帶夷人畏之卽今田州府知府爲事發随韓總兵立功如將本人改授武職令選本府民兵三五千名親領於鎭夷關立衞控制不但服夷情抑且通道路一靖安州萬寧等縣近接雲屯海口幷連廣東欽州地方最爲險要如將欽州千戸所添軍立衞或撥彼處衛所官軍或垜彼處附近有司民兵以充其數内摘一所於萬寧等處設立以控靖安地方以通廣東水路便益一本處土兵首賊未就擒時急於用人許將各處人民聽從土官自行招集而有司官謹於奉命無敢有違有徇情取占親戚者有挾讐捉去耆正吏卒者有全縣之民俱被占取者亦有一家父子兄弟各自充兵及單丁貧窘自充一兵者後雖委都布司官淸理而土官紛紛言少又不准除歸併因循苟且至于今日今随征者月乆不歸家業狼籍屯田者糧徴不足荆楚連綿是致逃亡今已過半若不從新整理必至法廢事壞難救其失必須再令都司布政司官嚴督府州縣官將原集土兵幷官下影占家人田奴盡行取勘見數汰其老㓜單弱者當民差選其富實丁多者爲兵役先議合用若于衞所應垜若干土兵然後照數垜集總小甲千百長選管如例毎兵須以三丁共之官不許遝以庸才兵不許雜以穴濫選集旣定卽分地方以近就近置立城堡或四六或中半各專屯守不許亂差有警不拘其管軍官伴當亦如舊例就於所管土兵内定數撥用仍造花名貫址文冊三司各收一本照證按察司仍常委官點閘不許廢弛如此庻便一各處僞官頭目及先曾授官後又從逆今招出降此等反仄之徒宜爲區處或量與官爵或分給田地使之得所以終餘年不可置于閑散懷抑鬰抱不平以貽後患與行在戸部諸公書周忱㐲聞治民之道在於禁惰游以一其志勸耕稼以敦其業蓋惰游禁則土著固而避勞就逸者無所容耕稼勸則農業崇而棄本逐末者不得縱由是賦役可均而國用可足苟或不然則戸口耗而賦役不可得而均地利削而國用不可得而給先王制六鄉六遂之法以維持其民而均其土地者正爲此也邇者皇上念天下人民有因饑窘逃移者累降勑旨設撫民之官頒寛恤之條令天下郡邑招而撫之諸公頒布奉行克謹無怠天下之民感戴聖恩扶老携㓜競返桑梓惟獨蘇松之民尚有遠年竄匿未盡復其原額而田地至今尚有荒蕪者豈優恤猶未至乎凡招回復業之民旣蒙蠲其稅糧復其徭役室廬食用之乏者官與賑給牛具種子之缺者官與借貸朝廷之恩至矣尽矣如此而猶不復業者亦必有其說焉蓋蘇松之逃民其始也皆因艱窘不得巳而逋逃及其後也見流寓者之勝於土著故相扇成風接踵而去不復再懷鄉土四民之中農民尤甚何以言之天下之農民固勞矣而蘇松之民比於天下其勞又加倍焉天下之農民固貧矣而蘇松之農民比於天下其貧又加甚焉天下之民常懷土而重遷蘇松之民則常輕其鄉而樂於轉徙天下之民出其鄉則無所容其身蘇松之民出其鄉則足以售其巧忱嘗歷詢其弊蓋有七焉何謂七弊一曰大戸苞䕃二曰豪匠冒合三曰船居浮蕩四曰軍囚牽引五曰屯營隱占六曰隣境蔽匿七曰僧道招誘其所謂大戸苞䕃者豪勢富貴之家或以私債準折人丁男或以威力强奪人子息或全家傭作或分房托居賜之姓而目爲義男者有之更其名而命爲僕隸者有之凡此之人旣得爲其役屬不復更其糧差甘心倚附莫敢誰何由是豪家之役屬日增而南畝之農夫日以減矣其所謂豪匠冒合者蘇松人匠叢聚兩京鄉里之逃避糧差者往往携其家眷相依同住或創造房居或開張鋪店冒作義男女壻代與領牌上工在南亰者應天府不知其名在北亰者順天府亦無其籍粉壁題監局之名木牌稱高手之作一户當匠而冒合數戸者有之一人上工而隱蔽數人者有之兵馬司不敢問左右隣不復疑由是豪匠之生計日盛而南畝之農民日以衰矣其所謂船居浮蕩者蘇松乃五湖三泖積水之鄉海洋海套無有浮涯載舟者莫知蹤跡近年以來又因各處關隘廢弛流移之人挈家于舟以買賣辦課爲名冒給隣境文引及河泊所由帖徃來於南北二亰湖廣河南淮安等處停泊脫免糧差長子老孫不識鄉里暖衣飽食陶然無憂鄉都之里甲無處根尋外處之廵司不復詰問由是船居之丁口日蕃而南畝之農夫日以削矣其所謂軍囚牽引者蘇松奇技工巧者多所至之處屠沽販賣莫不能之故其爲事之人充軍於中外衛所者輙誘鄉里貧民爲之餘丁擺站於各處河岸者又招鄉里之小戸爲之使喚作富戸於北亰者一家有數處之開張爲民種田於河間等處者一人有數丁之子姪且如淮安二衞蘇州充軍者不過數名今者塡街塞巷開鋪買賣皆軍人之家屬矣儀眞一驛蘇州擺站者不過數家今者連甍接棟造樓居住者皆囚人之戸丁矣官府不問其來歴里胥莫究其所從由是軍囚之生計日成而南畝之農夫日以消矣其所謂屯營隱占者太倉鎭海金山等衛青村南匯呉淞江等所棊列於蘇松之境皆爲邊海城池官旗犯罪例不調伍因有所恃特肆豪强遂使避役姦氓轉相依附或入屯堡而爲之佈種或入軍營而給其使令或竄名而冒頂軍伍或更姓而假作餘丁遺下糧差負累鄉里爲有司者常欲挨究矣文書數數行移衞所堅然不答爲里甲者常欲根尋矣足跡稍稍及門巳遭官旗之毒手由是屯營之藏聚日多而南畝之農夫日以耗矣其所謂隣境蔽匿者近年有司多不得人教導無方禁令廢弛遂使蚩蚩之民流移轉徙居東鄉而藏於西鄉者有焉在彼縣而匿於此縣者有焉畏糧重者必就無糧之鄉畏差勤者必投無差之處舍瘠土而就膏腴者有之營新居而棄舊業者有之倐往倐來無有定志官府之勾攝者因越境而有所不行鄉村之譏察者毎容情而有所不問由是隣境之客戸日衆而南畝之農夫日以寡矣其所謂僧道招誘者天下之寺觀莫盛於蘇松故蘇松之僧道彌滿於四海有名器者因保舉而爲住持初出家者因遊方而稱掛搭名山巨刹在處有之故其鄉里游惰之民率皆相依而爲之執役眉目淸俊者稱爲行童年紀强壯者名爲善友假服緇黃僞持錫鉢或合伴而脩建齋醮或沿街而化縁財物南北二亰及各處鎭市如此等軰莫非蘇松之人以一人住持而爲之服役者常有數十人以一人出家而與之幇閑者常有三五軰由是僧道之徒侣日廣而南畝之農夫日以狹矣凡此七者特舉其大畧而天下郡縣此弊俱無縱使有之亦未必有如是之甚此等之人善作巧僞變亂板圖戸口則揑他故而脫漏田糧則挾他名而詭報惰游巳乆安肯復歸田里從事耕稼況其缺乏稅額累累如配見在之戸其中頗有智能者見其得計亦思舎畎畝棄耒耜而效其所爲惟愚騃無用之人方肯始終從事於農業然坐受其弊亦豈無避免之心乎凡天下之事不可有一人之僥倖苟有一人僥倖而獲免則必有一人不幸而受其弊蘇松僥倖之民如此其多則不幸而受其弊者從可知矣是宜土著之農夫日減月除而無有厎止矣忱嘗以太倉一城之戸口考之洪武年間見丁授田十六畝二十四年黃冊原該六十七里八千九百八十六戸今宣德七年造冊止有一十里一千五百六十九戸覈實又止有見戸七百三十八戸其餘又皆逃絶虚報之數戸雖耗而原授之田俱在夫以七百三十八戸而當洪武年間八千九百八十六戸之稅糧欲望其輸納足備而不逃去其可得乎竊恐數歳之後見戸皆去而漸至於無徴矣是皆惰遊不禁耕稼不勸故姦民得以避勞就逸棄本逐末如前之所云者誠宜立法以檢制之撫民之官固未易以招之也愚以駑鈍之才濫叨重寄晝夜勞心莫知所措伏望該部列位卿相與在朝公卿大臣詳加講究明白奏請將蘇松等府逃移人戸不拘通例别立一法以淸理而檢制之庻幾戸口可增田畝可闢稅糧可完忱事出激切不覺覼縷之至惟冀詳察而恕其狂妄幸甚
