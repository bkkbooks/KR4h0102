body:
  text: 論論孫甫薦富弼代晏殊事晏姝罷相諌官孫甫薦富弼代之仁宗怒曰進用宰相人主之任臣下不宜有所指陳事在慶曆四年王叔英於乎弼有宰相之才天下知之甫薦之誠當矣為帝者如果有心於用弼宜曰吾意正在斯人卿可謂能為天下得人矣如此君臣之間豈不為相得哉今帝乃不出此而反有怒於甫蓋其意不在於弼爾使其意果在於弼豈不欣然從之而何怒於甫邪昔堯之相舜以師錫舜之相禹以僉言未聞進用宰相為人主獨任事也且古人有言曰薦賢受上賞况薦大臣以當太任者乎如甫者宜受上賞而反怒之此帝之大失也帝之意豈不以謂宰相之職乃人臣之極任其登用之恩當自已出殊不知薦之在人而用之在我其恩又曷嘗不自巳出乎傳曰大夫能薦人於諸侯不能使諸侯與之大夫諸侯能薦人於天子不能使天子與之諸侯蓋獻替之職固在人臣而用捨之權常在人主果何嫌於恩不出於巳也哉雖然為人君者要當以公天下為心惟在於為天下得人而巳又何必欲其恩之出於巳其恩之盡出於已者乃好利自私者之所為豈賢君之事哉惜乎以仁宗之賢而猶昧於此哉余懼後世有沮郤忠臣為國薦賢而藉帝之言以為口實者故特著論非之以為人主之戒高帝吕后論梁潛或者謂高帝寬仁愛人乃獨於吕后以色衰而弛愛夫託交貧賤起身艱苦一旦冨貴之余乃踈棄之獨不念前日楚軍之間道哉高帝無乃少恩也梁子曰不然夫高帝之知人何如其明也與吕后處者幾年矣后之為人獨不知之邪彼固一婦人也而其雄猜傑黠有猛士之肝腸高帝於是乎有以知吕后之心矣夫畜老人猶憚殺曽謂國家之勳臣取而族滅之無遺噍類若罝中兔然未嘗有難色后也何其忍人哉夫殺諸將非高帝之心也后也蒯徹教信以反貫高反形巳具高帝猶釋之而肯果於殺韓彭邪韓彭雖夷滅而昔日感遇之際士為知已死者英態豪氣猶在目睫間也高帝中夜思之豈不一動心哉吕后是可忍也孰不可忍也高帝所以薄吕后者不能形於言而痛在其中矣不然盧綰舊日里閈恩猶不減乃謂至親而獨少恩哉夫觀人者不於其所厚而於其所薄高帝於其所薄者如此矣豈得薄其所厚哉吕后忍於韓彭者如此矣豈得厚於劉氏哉豺狼得嗜則喋血搖尾以恣叨苟無所得則瓜膚拏毳以致猛諸將巳盡其禍尋及劉氏矣故殺韓彭而諸將懼族諸將而劉氏懼高帝亦豈與陳平謀及此哉聞樊噲黨吕氏立命斬之用平之謀高帝至是非特為劉氏憂亦且為平勃憂也高帝目才瞑肉猶未寒后也曽無一髮之戚即謀族殺諸將今日鴆如意明日斷戚姬今曰鴆齊王肥明日殺趙王友至於無所忌憚立他人子為帝又殺之而又立焉忍人哉后也一至此極也當是時漢巳亡矣吁高帝豈不知毒流至此哉説者謂良乎之教高帝往往忍小以就大晉獻之驪姬秦皇之扶蘇高帝審之久矣然獨恨高帝之明有所未盡者焉懲其近而不懲其逺商之亡以妲已周之亡以褒姒高帝曷不懲此邪嫡妾之分亂於前而正家之約昧於後於是拳拳然屬周勃以安劉置周昌以重趙所謂滔天之勢巳成乃欲以一手障之吁何益哉劉仁軌梁潛少府監裴舒為唐高宗造鏡殿上與太子太傅劉仁軌觀之仁軌驚趨下殿走上問其故曰天無二日民無二王適見壁間有數天子不祥孰甚焉上劇令剔去愚意仁軌此言未當也夫人臣之戒君或婉其辭而意有所在孔子所謂巽言之者也或峻其辭而無所隱孔子所謂法言之者也仁軌此言其法言之邪其巽言之邪夫曰壁間有數天子不祥孰甚焉者有似乎巽言之矣高宗嗣守天位而武后制其政柄是武后亦一天子矣李義府恣意慘酷天下之人知畏季貓而不知有朝廷是義府又一天子矣至於武三思為周公威福之柄文窺取之焉則三思又一天子矣政出多門不祥孰甚而仁軌此言非此意而高宗亦不此悟也然則既不為巽言曷不為直言也哉納約自牖因其明而投之仁軌此時宜進言曰以銅為鏡不若以古為鏡以古為鏡不若以賢為鏡書云人無於水鑑當於人鑑詩曰殷鑒不遠在夏后之世隋之焬帝淫刑黷武沈湎冒色忠言不用小人朋進盜賊旁午自度不免乃持鑑照曰好頭頸不知為何人持去此煬帝以銅為鑑而不以古為鑑也太宗皇帝艱難以定天下身致太平樂聞直諌好用善謀皇后順正不預外事常曰以銅為鏡可正衣冠以人為鏡可知得失此太宗以人為鏡不以銅為鏡也陛下誠能以焬帝為戒以太宗為法則社稷之福生民之幸矣且殿廷之上豈照鏡之所姦邪之情豈懸鏡可得陛下以心為鏡勿昏以欲勿蔽以私湛然虛明可照萬事臣伏願陛下曷去彼而取此哉不知出此乃以鏡之影為不祥謬矣論曹參王直漢曹參代蕭何為相國而後世稱賢相豫疑之古者大臣之相國也必思為國建長久之業於道所當為者夙夜盡心不敢少怠焉而况輔新造之國乎周公相成王用文武之道治天下有不合者夜以繼日而思之及其得也又坐以待旦而行之其勤也至矣當時之臣莫有過於周公者而周公方吐哺握髮以受其言故能興道立教維持周室至八百年之久此豈苟且偷惰者所能哉蕭何佐高帝定天下聞其次律令矣他未之聞也曹參代之守何之約束日飮醇酒不事事士大夫欲有論諌亦飮以醇酒使醉不得言嗚呼其亦異乎周公之所為矣何素不知學其相高帝於夫治天下之道未有所立也就使有所立尤當敬守而慎行之以維持於遠天下之大豈酣酗者所能治邪何之律令豈古聖人所用以治天下者邪而參守之自以為足後世亦從而賢之豫不知何説也且田制經籍學士大夫皆廢滅於秦是教養斯民之道皆缺也易解之彖曰無所往其來復吉謂天下之難既解則當復先王之道當參之時天下巳定七八年時非無賢也參雖武夫苟能親賢納善夙夜以此為務為漢家萬世計則庶幾周公之業而遠賢拒諌沈湎于酒至酣歌與吏相呼此書所謂巫風卿士足以喪其家者而參居之不疑蓋武夫俗吏之故態非宰相所宜然也宰相百僚之表也使百僚皆慕效焉則天下當何如哉豫意當時天下之所以安者蓋民苦秦虐久矣而幸漢之寬故恬然自安於下非有道以維持之也然則參雖能清淨不優要亦苟且偷惰之謂耳周公之罪人也大臣之義當以周公為正宋論八劉定之以寇凖為樞密副使時旱蝗帝召近臣問得失凖為樞密直學士對曰洪範天人之際應若影響大旱之證蓋刑有所不平帝怒起入宫復召凖問狀凖請召二府大臣同對言頃鄭吉犯贓少伏誅參知政事王沔弟淮贓十萬杖復官帝切責沔而以準為可大任故有是命當是時前代刑法慘毒之風始漸消泯然太祖命大辟諸州不得專決其輕典固恣肆自若也而頃者田錫建議謂按獄官至以鐡為枷蓋法外擊斷大率類此而朝廷丞弼尚復任意操縱如準所對則何以廣仁恕之化擴治平之效乎計其民冤莫訴所在猶多而天意垂戒信不虛矣抑君相違缺此外豈更無可指而準不能無諱特本諸洪範傳所謂棄法律則火不炎上於罰常暘者為説乎夫洪範以為人君能建皇極則貌言視聽思得其理而雨暘燠寒風時若不能建皇極則貌言視聽思失其理而雨暘燠寒風恆若然得與得俱失與失並貌果恭而言罕有不從視果明而聽罕有不聰也體不獨至咎不單見時雨則必無恆暘恆燠則必無時寒也特就其事言之則各以類感就其徴言之則各以類屬云爾譬諸學者之於經謂溫厚本乎詩教設使學乎易書禮樂而亦溫厚謂非其所得不可也醫者之於疾謂寒疾本乎隂淫設使遇於風雨晦明而亦寒疾謂非其所致不可也故禹乎九年之水非但以貌恭作肅湯弭七年之旱非但以言從作乂周末之無寒歲豈惟視不明而豫秦亡之無燠年豈惟聽不聰而急乎至於聖之無不通配乎風之無不在然屑屑焉以反風起禾為周成王所思之聖鷁飛石隕為宋襄公所思之蒙前日之不鳴條為何事之巳睿今日之不應律為何理之未睿亦膠固不可為訓也但明乎經意則於五事無不當修於五徴無不當察於以趣得而去失違咎而求休茍徒泥班范牽合之説非惟昧禹箕授受之旨殆將使居建極之地者謂吾有是得也而休徴之應非其類有是失也而咎徴之應非其類因以疑天命而怠人事矣援經陳謨之臣其可不深考乎帝問翰林學士王安石以唐太宗何如曰陛下當法堯舜何以唐太宗為哉帝深納之尋以為參知政事行新法安石為神宗變法大取民財與力而用之也在於兵兵之所用至於破遼而志願畢矣取民財之法曰靑苗春貸而秋償之收息十二秋又貸而春償之亦收息十二歲再收息則名為十二其實十四也名為貸償其實無故歲取民財也曰免役凡民出力以役於官者皆無出力而但輸錢官自以錢雇民應役名為均役而其實欲自操其雇錢之奇嬴也夫民孰皆不貸償而自足哉私貸償焉治世之所不免今也禁其貸償而官與之貸償以利其息錢之入民孰皆不雇募而自役哉私雇募焉亦治世之所不禁今也免其自役而官與之雇募以利其雇錢之餘即此二端言之其他取民財之法無遺巧矣而又編保伍以練兵則民自為兵而養兵之費不以煩官是曰保甲編保伍以養馬則馬皆在民而養馬之費不以煩官是曰保馬豈不謂古者寓兵於農也然今既有保甲矣而待餔之兵何嘗為之廢亦豈不謂漢嘗栝民馬今使民養無害也然民既增保馬之勞而他勞何嘗為之損是其取民力幾於竭矣民財與力悉歸於我自以為我非用之於土木非用之於狗馬聲色非用之於仙佛欲用之於兵而復漢唐之故疆無不可也然畏遼之大故將於遼必先於夏又先於群小夷狄自小至大嘗試以圖之安石君臣相與深謀密議而悉掃異巳者之論無非此心也於是主韶試於熙河章惇試於湖北熊本試於瀘夷郭逵試於交趾皆能略有所得而試於夏則馴至於徐僖之死得不償其失彼遼者不待其試而先來求地安石低徊躊蹰為欲取之必與之之説卒遣韓縝割與七百里之地無得而有失焉若獵者罝狐兔刺鹿豕而辟易於虎失其所操以歸蓋安石之技窮而神宗漸以沮悔矣然所援引共事之人固在也踵其故智以用於哲徽之時互起迭進以至賢路盡壅民命僅存之秋適值遼有釁躍然攻之以卒安石之所圖而遽以國斃焉故前宋之亡本於安石為神宗謀破遼而已向使其不謀破遼則不用兵不用兵則不大取民財與力不大取民財與力則何至俾群小為之交攫互噬於天下也抑遂其始謀亦不過如唐太宗擒頡利可汗然太宗用魏徴先以養民為務而兵自強安石先弊其民不及魏徴矣乃動以堯舜周公藉口其誣矣哉觀文殿學士太子少師致仕歐陽修卒于頴詔求其所作五代史以進神宗置司馬光於散地而俾其修資治通鑑自為之序棄歐陽修於未老之年而及其卒也乃求其所作五代史其意以修與光但能撰述也經國實用非其所能也吾自有安石也何其量人之薄哉厥後光起而究其用於元祐之初修之不究其用君子蓋惜之然所尤惜者修亦有以取之也何也惟恐其不究於用而有意於究是乃用之所以不究也濮議是也當濮議之始也韓琦輩雖與修同在政府而知經學古豈如修秉義懷直豈踰修哉修苟以濮王為不當別議尊崇琦等必不或異矣英宗雖欲顧其私親何自啓口哉自此議發於政府而羣言交攻惟修之歸咎謂其昔也贊仁宗以立為後之子而今也導英宗以忘所後之父背先帝而諛嗣君薄大統而厚本生於禮經為不合於直道為不純而修遂無辭其責焉豈非修久參大政當輔相位略萌覬覦之心稍為迎合之計以致此乎故曰惟恐其不究於用而有意於究是乃用之所以不究也及其作五代史於晉出帝謂所生父敬儒為皇伯柴世宗謂所生父守禮為元舅皆反覆辨詰二主之非欲以表證其前日濮議之為是然近於欲蓋而彌彰矣修之學繼唐韓愈而與之並皆宗經而修論述尤多愈惟論語數章皆纂史而修筆削尤嚴愈惟順宗一録皆衛聖道於湮微塞絶之餘皆闢異端於羣趨衆附之際始焉學者莫能抑揚之也至其後惟愈從祀孔廟而修以濮議為巨璧之纎瑕良幹之寸朽焉不然其全美豈可及哉幾微功名富貴之念一動而用以之不究美以之不全是以君子無慕乎其外者懼纍乎其內無冀乎其未得者懼喪乎其所巳能也若乃光則免乎此矣所以然者光之學以誠為主自不妄語入故也罷崇政殿説書程頥頥在經筵為翰林學士蘇軾所嫉頥門人賈易朱光庭攻軾軾所厚孔文仲顧臨詆頥章疏交進頥以是罷久之軾亦罷是時有洛黨蜀黨朔黨之分洛黨頥為首蜀黨軾為首朔黨劉摯梁燾玉巖叟為首其輔之者甚多漢之衰也李膺范滂等合為一黨在位者惡之惡之者非賢而在黨中者賢唐之衰也李德𥙿牛僧孺等分為二黨以相傾奪於富貴之塗李優牛劣而考其歸皆不足謂之賢宋之將衰也其初亦分為二黨熙豐作新法王安石為魁元祐掊擊新法司馬光為魁光之黨賢而安石之黨非賢及光歿而其同黨又自分為三朔黨洛黨蜀黨徐考其故朔之所以得黨名者劉摯等所居之地相同而交遊親密所守之職相近而議論協洽自為黨而不與他黨相攻擊若乃洛黨之以頥為首者頥進講則欲坐見哲宗戲折柳枝則曰方春發生不可無故摧折賀罷而往弔則拘於歌哭同日如此之類見嫉於人以致為其所攻擊而頥未嘗報復也門人代為之報復是以有黨之名爾若乃蜀黨之以軾為首則異於是軾少年登制科一也髙才雄文二也兄弟同為美官三也於古人所謂三不幸者全而有之矣謂宜謙抑以避人之尊巳廣大以容人之異巳猶恐不及也而見頥為學者所宗忿然嫉之豈欲使當時之士不尊頥而惟巳之尊不異已而惟頥之異乎夫聖人之道大矣宰我子貢善為説辭若軾是也冉閔顔淵善言德行若頥是也譬之入山而採玉入海而探珠各有所得俱足為寶可相羡而不可相嫉也嫉心生於中而排斥之迹形於外甚至上疏云臣深嫉程頥之姦不假以辭色此何為者哉然則軾有心於立黨而自為之首以合羣助而攻擊人也譬於兵家朔黨自守之兵也洛黨應敵之兵也蜀黨侵鄰之兵也其不韙有在矣夫不賢者之不容賢者固其所也賢者自不相容則猶兄與弟相鬩而為必破之家心與肺相尅而為必死之疾矣若軾與頥孰不皆以為賢而不容頥者軾也使能其心休休焉其如有容焉則豈不可以居宰物之地哉帝諷道籙院言朕乃上帝元子在天為神霄玉清王長生大帝君憫中華𬒳金狄之教􅈤請於上帝下降人世為人主令天下歸于正道於是羣臣與道籙院上章册帝為教主道君皇帝時帝方寵信溫州道士林靈素靈素言劉貴妃即九華玉真安妃蔡京即左元仙伯王黼即文華吏已即書罰仙吏禇慧皆從帝自天降生者也帝賞賚靈素無算賜號通真逹靈先生升溫州為應道軍令僧尼改學道作千道會靈素據高坐講經士庶入殿聽講帝設幄坐于其側所言鄙俗雜以嘲詼用資媟笑莫有君臣之禮後靈素與道士王允誠爭寵毒殺允誠益自恣遇皇太子弗斂避太子以為言斥還死于故里一佛本夷狄之人而其徒謂佛之身體面貌皆若金色徽宗所謂中華被金狄之教者指佛教而言也然其言可謂妖矣未幾女真起自夷狄建號大金蕩覆中華斯言若為之先兆也唐僖宗紀年為廣明是時黃巢初起曰唐去君而存黃以為廣此黃當代唐之徴後之論者謂天託昏主以告亡于世徽宗之言豈不類此夫老氏之教資於淸淨慈儉以為本者是而棄其綱紀刑政不以為用者非漢文帝於其不以為用者用焉而於其資以為本者資焉當是時也干戈創殘者以之完復衣食窘乏者以之完足司馬晉於其資以為本者不資之而於其不以為用者不用之當是時也顛冥於麯蘖聲色而天常失紛擾於胡羯戎羌而人紀紊蓋漢之治由從老氏之是者而違其非者也晉之亂由從老氏之非者而違其是者也然淸淨慈儉最人所難非高世之主不能惟漢文帝能之於是世之依託老氏者變而言修丹煉藥又其後變而言經籙齋醮亦自託於老氏每變愈下無非以誑惑人主而叨其寵祿焉爾漢武帝唐憲宗皆中材之主也於修丹煉藥之言惑焉徽宗者下愚之主也經籙齋醮之是務設幄坐于林靈素之側聽其嘲詼媟笑之言而自號為教主道君皇帝此何異於沐猴而冠者哉謂之教而不言何教以見此教之外無他教謂之道而不言何道以見此道之外無他道巳能主此教君此道而天下之能事畢矣昔日為神霄玉淸王長生大帝君於天今日為教主道君皇帝於宋何其尊也以此欺愚眩衆不自知他日將為昏德公於金而不勝其卑辱矣可勝嘆哉徽宗專信老梁武專信釋其後皆殞身亡國或謂其所廢而不信者為之祟也然周天元復老釋教於昔人既毀之餘並致崇信亦殞身亡國此又何故也君子曰無他國將興聽於人國將亡聽於神老釋之神既惑其心而惟是之聽則人理之當修為而不修為者多矣而况於奉其神養其徒竭生民之膏血積山填海不足侔其費也亡殞之至也復何難哉康王構即帝位于應天府康王前嘗為質于金營而宋使姚平仲劫營金疑其非親王且嘗與較射而連發中的意其將家子因郤還之洎宋復遣王奉使講解而為民所遮止因此得脫而遂繼宋統蓋天留之也使其在圍城中則與諸王並俘以北矣昔者周漢宗室皆分封於宇內非獨資之如泰山磐石得以固其存不幸而亡矣死灰復然猶得以續其統又不幸而統絶矣苗裔蔓衍猶得以保其姓周東遷而晉以強宗為霸主紏合諸侯為周輿衛至于戰國而燕韓魏居七雄之三以祀姬姓之祖禰秦虎視東周不敢吞者數百年自載籍以來未有若周之長所謂固其存者也漢懲吳濞楚戊之強而犯上盡封各國支庶以裂其壤至于哀平之際宗室載屬籍者十二萬人莫不據士民之上有王公之勢莾既盜漢而光武兄弟呼于南陽此十二萬人者近遠響應故東京之復舊物易於反掌靈獻之末表琮焉璋猶能啒強荆益以資昭烈之興所謂續其統者也唐宋則不然其宗室皆聚居於京師故朱溫篡唐而德王等九人一日同沈于九曲池濮王等數百人一夜同坑于龍興寺女貞取宋而惟康王以出使孟后以𬒳廢二人得脫其舉宗北遷卒見屠于完顔亮無一人幸免蓋無以保其姓矣夫聚居之也樂其易防制此利之小者而其後有大害觀於唐宋可見矣分封之也惡其難約束此害之小者而其後有大利觀於周漢可見矣蘇子瞻諸人言封建之害胡明仲諸人言封建之利各有其説而未嘗言其大利害見於萬丗之後如此然則有天下者為其子孫計可以無疑於此矣抑宋統之幸不絶而天留康王以續之何也曰汴宋二百年矣仁如慶曆元祐之日多不仁如熙豐崇宣之日少其不仁也民怨之而其仁也民憐之其怨之也足以亡而其憐之也足以不絶民之心即天之意也善得天者得於民而巳矣善得民者以其仁而巳矣朱熹卒熹之學後丗論者謂為集諸儒之大成夫小成者有所缺而不全有所偏而不中集之而後為大成也熹於生乎其前之諸儒若周之精程之正固非有待於熹而後能全其所或缺中其所或偏至於康節之高明而稍未即乎實橫渠之弘毅而猶未至乎熟乃若待乎熹有以實其所未實熟其所未熟者然亦不可謂彼缺而此全彼偏而此中由是言之熹於生乎其前之諸儒未嘗集其大成至於生乎其時之諸儒則能集其大成何也熹之時諸儒為言人人不同言度數者蔡元定父子之於地理樂律有指歸矣熹與之上下其論而吻合焉言述作者周必大諸人燁乎以所長著稱也熹作徒與之講評賡酬可相伯仲而文考昌黎之異賦明靈均之衷詩開陶韋之門使來者不迷其塗焉於施諸用者辭受進退不屈其節告君必以格致誠正而不小其道臨民幹方鋤姦救患之不遺其力視當時浙學之志事功者陳同父輩反過之也於求諸史者未嘗若吕祖謙之專而綱目繼春秋功過吕矣吕與張敬夫輔翼熹以共究遺經不幸短丗而熹歲寒松柏為斯道之梁棟又過張矣惟陸象山兄弟始與熹異論而熹卒兼其所長以為已有豫嘗考之熹與項平父書云子靜專尊德性而熹平日所論道問學為多是以彼之學者多持守可觀而看義理不詳熹自覺於義理不敢亂説而緊要為巳多不得力今當反身用力去短集長庶幾不墮一邉爾又與吕祖謙書云子靜好處自不可掩覆可敬服也祭子壽文云兄乃枉車而來教相與極論而無猜自是以還道合志同又曰惟兄德之尤粹儼中正而無邪至其降心以從善又豈有一毫驕吝之私邪然則所謂熹集諸儒之大成者度數也述作也事功也史也經也道問學也尊德性也其塗如此也蔡也周也陳也吕也張也陸也諸儒之趨於其塗如此也而熹據其會以要之殊塗而同歸於已焉所謂集諸儒之大成者此之謂也或曰陸之於朱論者謂猶冰不可與炭同器若子之云則猶塤鳴箎應可以奏於宫懸之間而備韶濩之一音乎曰然曾哲之狂子路之勇原憲之狷公西赤之容端木賜之辨皆見集於孔子而不見黜者也朱之與陸以其所言而觀之曷嘗終見黜哉謂其終見黜者未嘗考其所言者也亦已甚矣詔經筵進講朱熹治鑑綱目宋時諸帝之不廢講學蓋漢唐所未能及者故其時悖德虐政不若漢唐叔季之尤甚漢唐有篡弒之臣而宋無之有賊民崛起幾危社稷如張角黃巢者而宋無之皆由於上之人未嘗悖虐尤甚以激之也講學之效豈可誣哉所謂未嘗悖虐尤甚者若真宗之天書雖不以諫而中止然其後天書以殉于􅎚宫英宗追崇所生諍者盈廷則為之屈意中止矣神哲以來改更法度正人邪黨迭為勝負亦紛然也然有竄逐而無刀鋸南渡以後和議作而語恢復者𬒳排斥偽學禁而師關洛者入罪藉然斥之而益奮罪之而愈勵者亦由其無死禍以加諸人而人之改行易節者終少也其未嘗悖虐尤甚於此可見豈非講學而有見于前代覆車之轍乎治鑑網目者人主有志于講學則不可以不之觀而前代覆車之轍無不於此乎在也或者謂治鑑綱目雖歷涉司馬溫公朱文公兩大賢之筆削而成然賢而已爾非出於聖也史而已爾難侔於經也人主亦留心於聖人所作之經而足矣於賢人所述之史未之及焉以未有害也是不然尚書者紀傳史之出聖筆者也春秋者編年史之出聖筆者也溫公取尚書以後之紀傳史約之以為編年治鑑而文公倣春秋大書以為之綱三傳分注以為之目是則治鑑綱目者尚書春秋之子孫而尚書春秋者治鑑綱目之祖父也祖父子孫二氣之相傳聖經賢史一理之相續孰云其未之及焉似未有害也哉為此説者是猶告人以千萬里逺之覆轍而不告人以一二里近之覆轍也其顛踣不愈速乎殷民叛周論周洪謨或問武王之伐商也書曰前徒倒戈攻其後以比是言王者無敵也又曰篚厥玄黃昭我周王是言人心悅服也夫何天下甫定武王既崩而四國殷民扇亂不巳雖化訓三紀之久而間之猶艱故先儒謂大誥康詰酒詰梓材召誥洛詰多士多方八篇皆為殷人不服周而作又謂方殷之虐人如在膏火中歸周如流不暇念先王之德及天下稍定人自膏火中出郎念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也由是觀之則所謂倒戈執篚于弔伐之日者不幾于虛文乎聖人以至仁伐至不仁何其人心之不易服哉南皋子曰是蓋不然向之倒戈而不敵執篚而來迎者非商之臣也乃紂所虐害之蒸民也所播棄之犁老也其後不服周而念商者非商之民也乃紂所比昵之罪人也所崇信之姦回也何以明之書曰乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于啇邑又曰為天下逋逃主萃淵藪則商臣之黨紂虐民者皆天下之姦回罪人不可謂不衆也故孟子謂武王驅飛廉于海隅而戮之滅國者五十而朱子以為皆黨紂虐民者也然滅之云者豈噍類無遺哉不過殱其渠魁而餘孽之猶存者不知幾千萬人誅之不可勝誅也既不之誅而子弟念其父兄之死臣僕念其國統之絶者憤怨不巳故乘三監之隙而脅其民以叛也今夫盜跖一呼聚黨數百猶能麋人之國其故何哉脅之而巳矣豈有紂黨之在淵藪者猶衆而不能脅四國之民以叛哉故多士曰豫大降爾四國民命多方曰我惟大降爾四國民命皆謂商民為所脅者衆故寬宥之而不加誅也雖以四國民命為言而曰商王士曰爾殷多士曰殷侯尹民曰胥伯小大多正則實告殷臣而非告殷民也至于畢命曰毖殷頑民亦指殷之餘孽而言故下文言世祿之家鮮克由禮兹殷庶士席寵惟舊則極數殷士之惡而無一語以及殷民也數千載之下讀者不得其意乃謂殷民既怨殷而歸周又叛周而思殷且或謂周之頑民乃殷之忠臣夫殷之臣孰有忠於微子箕子而叛周者非微子箕子乃紂子武庚及其餘黨耳使誠以為叛周者非紂餘黨乃前日塗炭之民則聖人伐暴救民之意終無以白於天下後世而亂臣賊子得以藉口矣豫故為詳辨之皇明文衡卷之十一
