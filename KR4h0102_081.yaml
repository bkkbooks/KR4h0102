front:
  text: 皇明文衡卷之八十一
  hash: sha256:dfb0a5950e840dab7faee802bfe8d89bd73639f02e0000b489d393de058808e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_081-1a}
body:
  text: 碑浡泥國恭順王墓碑胡廣永樂六年秋八月乙未浡泥國王麻那惹加那乃來朝率其妻子弟妹親戚陪臣凡百五十餘人至闕下上表貢方物上御奉天殿受其獻退卽奉天門召與語象通其言曰僻壤臣妾誕被聖化思覩淸光靡知忌畏輙敢塵瀆又曰天以覆我地以載我天子以乂寧我我長我㓜處有安居食有和味衣有宜服利用備器以資其生強不敢凌弱衆不敢欺寡非天子孰使之然也天子功德曁于我者同乎天地然天地仰而見跼而履惟天子邈而難見是故誠有所不通僻陋臣妾不憚險遠浮詣闕下以達其誠上曰嘻惟天惟皇考付予以天下子養民天與皇考視民同仁予其承天與皇考付卑之重惟恐弗堪弗若汝言則又頓首曰自天子改元之初載臣國屢豐和山川之藴珍寳者霅然而呈草木之不華者靃然而實異禽蹌鳴而走獸率舞也臣國之老曰中國聖人德敎流溢于玆臣土雖遠京師然爲天子氓故矜奮而來覲上嘉其誠優待禮隆錫予甚厚初賜妟于華蓋殿旣連宴于奉天門毎宴則命公夫人宴其妻子內舘罷宴勑大官厚具獻食日命大臣一人待于所舍中貴人專接伴盛其班張豐其廩餼入朝班次上公寵屋至矣踰月王忽感疾上命醫賜善藥調治遣中貴人勞問旦暮相繼日命大臣視王疾差劇聞小瘳喜見顔色王疾篤語其妻以下曰我疾貽天子憂念脫有大故命也我僻處荒徼幸入朝覩天子聲光卽死無憾死又體魄託葬中華不爲夷鬼所憾者受天子深恩生不能報死誠有負指其子曰我卽不起其以兒入拜謝天子誓世世毋忘天子恩若等克如我志瞑目無憾矣十月乙亥朔王卒得年二十有八上甚悼之輟正朝三日勑有司治喪具厚䘏典賜謚曰恭順遣使諭祭又遣使撫慰其妻子王之妻拜使者曰乃下臣祚薄弗克負荷天子深恩不能終事且没有遺命以世世毋忘天子恩克守其言則死猶不死矣王之妻之言亦可謂賢也巳是月庚寅以禮葬王于安德門外之石子岡勑爲文誌其壙王父曰麻那惹沙那旺沙母曰刺失八的妻曰他係邪子一人曰遐旺甫四歳女二人以遐旺襲王爵賜以冠服玉帶儀仗鞍馬服物器皿及金銀錦綺錢幣甚厚賜王妻以命服珠冠白金錦綺錢幣諸物其餘賜各有差官王之弟施里難那那惹施里微喏那沙那那萬喏邪三人俾輔遐旺詔有司立祠于王墓窴守墳者三戸勑建碑祠下命臣廣製刻文臣廣仰惟皇上綏寧宇內荗揚天徳溥博周徧凡日月照臨之地皆心恱誠歸惟恐或後奉琛秉䞇之國綴集于庭歳以萬數浡泥王去中國累數萬里一旦舉妻孥弟妹親戚陪臣浮鉅海來朝不以爲難叩陛陳辭忠誠溢發其心堅確有如金石至其臨終之言尤惓惓屬其下以不忘天子恩聖德漸漬感動扵人心其深如此扵乎盛哉惟王賢逹聰明忠順之節始終一致宜其身被寵榮澤延後嗣用紀其實聲爲銘詩昭示無極以彰王之所以受恩深厚者由其誠也銘曰大明御天臣妾萬方孰不來享孰不來王倚歟浡泥邈處炎徼感化來歸風騰雲趭曰婦曰子弟妹陪臣秩秩稽顙趨抃甡甡跽曰天子作我父母我生我樂天子之祜戴天履地疇此幪帲翹首大明遹來獻誠天子曰吁予統宇內綏爾于寧惟德罔逮王拜稽首萬嵗歡呼服德懷仁春育海濡國有山川匿其寳物靈發其藏不愛而出荏苒草木惟葉蓁蓁煌煌者華有實其蕡異禽和音鳴拂其羽走獸麌麌亦蹌以舞國黄耇曰聖化所漸臣國雖逷臣心仰瞻天子嘉悅待以異禮宴勞錫賚有厚而旨云胡朞月疾忽及之奄然而喪復悼而悲臨終之言謂其遘痻死有弗忘天子深恩扵乎賢王卓特超逸西南諸蕃靡堪王匹生者誠欵没有謚銘爵于王胤世世其承有墳如堂有祠翼翼以妥王靈其永無斁王雖不歸王聞孔彰天子恩隆萬世有光故亞中大夫寧國府知府陳公之碑楊士竒公諱灌字同故廬陵城此吟谿里儒家祖以章父天經皆以學行重鄉里公生數歲而孤事母孝時巳卓卓有鉅人志讀書一目數行而頴悟絶人族長老器之爲延師敎之師不能應所求徃徃引去然益自砥礪嚮進旣冠睹元綱曰壞私憂世且亂去習兵法環所居皆良田築爲塲圃而樹木焉人初莫測其意數年木鬱然行列而四方㓂盜蜂起遂募義勇以保障一鄉曰屯聚士馬而號令指麾扵其間隱然一良將其敎練有方撫綏有道人人爲用時江西諸郡多䧟扵㓂環其鄉數十里獨頼以安者七年然志在保境而非有所圖利也陳友諒旣據江西其將熊天瑞者強禮致公與俱至九江公睹陳氏不足有爲也去之甲辰春太祖高皇帝克武昌公因弘文舘學士羅復仁詣軍門上謁高皇帝與語奇之留帳下數曰公力陳救亂安民之說悉見聽納遂擢湖廣行中書省左右司員外郞是冬入朝改中書省左司都事遂陞郞中明年陞大都督府經歷大將軍徐達北征以公賛軍事旣克泰州留公督築城之役不旬曰竣事朝廷遣使勞之命總制眞州軍事丙午春除寧國府知府階亞中大夫下車首詢民隱爲興利除害增修先聖廟建學禮致師儒以敎俊秀士習一新建祀典祠壇及驛館百廢皆舉爲條格革兼幷之俗覈欺隠之籍朝廷取其戸帖一事行之天下宣城民田瀕江化城等十六玗故堤峻薄遇衝决則水傷禾稼壞道路歲以爲患公親爲䂓畫築堤廣厚加舊數倍又伐巨石作水門以時蓄泄民至于今頼之宣歙二水暴溢平地猝數丈民危懼計無岀走致巫覡禱神水勢益甚公曰巫覡焉知事神躬禱于敬亭山神水患遂息所轄宣城諸邑踵元季之弊歲民租無入官廩率書虚籍公至有發其事者扵是典司者皆忷忷懼得罪公私念此特循故弊弗華耳非始造奸也颺言扵衆曰吾以某月某日行視邑廩蓋俾得爲計及期邑廩皆實而弊亦革有強盜四十八人以刼舟麥當死獄已具公聽其辭曰此愚民因舟漂抵岸而挻引取之非素有合謀安得四十八人悉同法府佐幕初皆難之後卒如公議坐先取者一人餘從减論公風采凝峻訟者至庭片語之下情僞莫遁故人咸畏服而其爲治務寛厚崇禮敎鮮失所之民三年政化行焉旣得代當去百姓耆老壯少皆有戀戀不忍之意代者山東鞠騰霄素負才不讓觀公所設施嘆曰吾徒當守而勿失也是年夏奉命督軍餉詣北平民胥悅趨事又明年還京師省臺達官相知者爭欲薦扵朝公皆力辭遂謁告歸省先墓割田三頃建祠堂作義塾以訓宗戚子弟居無何被召至京師未命卒扵旅次洪武四年某月日也享年四十有七秉淸介之行重義輕利族姻鄉䣊匱乏有急竝赴濟助間遇朋舊憂患狼狽倒囊周之雖屢不厭非才行兼有者歟子男三廓卓坦孫男三誠謹謙皆稱公之後坦尤忠信務義公没將六十年坦介越府長史周君忱求書公平生于石余扵公同郡知慕公乆遂考長史所爲公傳及以聞諸鄉之君子者叙次之而系以詩曰猗嗟陳侯瑰瑋踔絶才邁羣倫識亦閎達越在童冠鉅志嶷嶷有書有劔萬衆奚敵罹時孔棘衆懷兢兢奮庇其郷屹如堅城孱弱盜名掉臂去之天之所興稽顙來歸軍門之言敷臣之忠惟聖聰明日照海容簡其才猷以賛政府匪直裨文亦旣輔武宣城名邦寔帝之畿嘉其愷悌以寄􅑱婺稙之黍稷薅其稂莠民曰陳侯汝予父母仁以爲育義以爲敎民曰陳侯汝時杜召遺惠在民永思無斁遺澤在嗣世率于德徛嗟陳侯惟吉之英吉世有人視此刻銘梁用之墓碣銘永樂十五年車駕廵狩北京仁宗皇帝在春宫監國南京凡南方庶務惟文武除拜四夷朝獻邊警調發上請行在若祭祀賞罸一切之務有司具成式啓聞施行事竟則所司具本末奏達而巳上旣有疾兩京距隔數千里支庶萌異志者內結嬖倖飭詐爲間一二䜛人助扵外扵是禁近臣侍監國者惴惴苟活朝暮間頼上明聖終保全無事小人之計不能行然其意不巳也會南京有陳千戸者擅取民財事覺令旨謫交阯數日念其軍功貸之召還有言扵上曰上所謫罪人皇太子曲宥之矣遂殺陳千戸事連賛善梁濳司諫周冕旣逮至上親問之濳等具實對上顧翰林學士楊榮等曰事固無預濳他日又諭禮部尚書吕震曰事亦豈得由濳然猶未悉陳千戸非岀上命謫之也兩人者皆未釋有毁冕者數言其佻薄放恣不可用遂倂濳皆死非命十六年九月十七日也士君子聞濳死皆嗟惋悼惜又相與岀資收殯之文明門外其妻時隨在北京慟夫非命哀毁不食數日亦死明年其家始啓殯歸而合葬扵泰和縣某郷某源梁氏其先家長沙唐有進士曰震徙荆南又七世曰勝用仕南唐爲徵事郎徙今泰和又十世贈知吉州曰逢吉二子皆仕宋伯君崇累官起居舍人兵部員外郞直史館知鳳翔府仲君傑累官同知黃州府入爲翰林院編修官君崇五世孫蕃景定三年進士太常博士知宣州改撫州生才可才可生彦卿彦卿生不移娶陳氏元潮州儒學敎授以道之孫生男子二人長卽濳次混濳字用之自㓜好學警敏嶷然有鉅人志嘗受經扵鄉先生王子啓及舅氏陳仲述入則浸漬不移先生之敎父子兄弟討論切劘無虚曰故所得率出其同輩用之甫弱冠其文章論議巳馳騁頡頏諸先輩洪武丙子選鄉試明年授四川蒼谿縣學訓導蒼谿僻遠過使客終歳無幾人而山水可適其學者前此未嘗遇明師用之樂得其地旦暮坐講席開諭辯析必盡其說諸生皆忻忻有嚮進意稍暇獨行淸流茂樹間吟咏自得又明年用薦除廣東四會知縣授承事郞推誠愛民剗宿弊崇寛政臨之以平易導之以禮讓致勤撫字稍暇輙就學舍親授業諸生歲餘民咸悅服而爭訟息學校興流徙來歸以累千計縣有瀧橋河世傳吏有廉平之政卽河水淸自用之至訖其去河水澄㓗可鑑又明年改陽江又改陽春治之一如所以治四會者而陽春猺獠環處稍不得所欲卽獸怒跳蹶不可制用之待之如子而不拘扵法亦皆盡誠事縣令如父敬恭命令唯恐不及所歷之處將去人皆遮道留之不得至有流涕者永樂元年召修太祖皇帝實錄書成陞翰林修撰授承務郞賜白金五十兩織金衣一襲文幣四表裏五年命以本官兼右春坊右賛善進儒林郞時修永樂大典召至四方儒學老成充纂修及繕寫之士幾三千人人衆事殷特命太子少師姚廣孝禮部尚書鄭賜總之巳而賜卒命禮部翰林院就本院推舉才學服衆者代賜遂舉用之用之方公明决莅事有程而惰慢放肆者有不樂之相與誣其過扵土召問具對云云上曰梁濳言是遂抵造誣者罪扵時以文事裨益皇太子尤爲所重上幸北京驛召赴行在八年南還十一年復扈從北京十三年考禮部會試十四年南還明年復北狩將發親擇侍從監國之臣時翰林獨留學士傷士奇特詔尚書夏原吉吕震方賔舉一人副之遂以命用之其在皇太子前累累進善言皆見嘉納而寵以賜賚是年考應天府鄉試蓋明年及扵禍矣嗚呼用之闓爽弘毅耿介自執其智足以燭幾其德足以及物其才足以興理其自任之重不肯下古人凡士君子哀而惜之夫豈以私用之也哉用之之學通諸經尤長扵詩易自十五六巳用意周程朱張之書壯而益探其微爲文章馳騁司馬子長韓退之蘇子瞻亦間出莊騷爲奇務去陳言出新意古詩高處逼晉宋所著有史論若干篇碑傳記序銘頌賛迷若干篇五七言古近體詩若干篇皆可傳後與人交藹然有相輔之義人有過面誚之不爲依阿取容及其能改懽好如初焉用之死時年五十有三娶楊氏子男四果楘楫榆皆知務學果楘皆舉鄉貢未升二女長嫁袁俊次嫁進士劉凖孫男幾某某皆秀朗可望造物者殆以是報之歟梁楊世婚姻家余長用之一歲少學同業壯而仕扵朝同官知用之孰有深扵余哉故其葬也宜余銘而余銘之亦豈出乎其私哉銘曰楩楠之蒼蒼可車可梁靈芝之煌煌瑞世之章曷其舉之又中毀之夫毁于琢曷全于璞理有瞢瞢爲善罔祐顔短跖長從古則有從古則有善者徒傷尚有傳者其永不亡前朝列大夫交阯布政司右叅議解公墓碣銘嗚呼此解公大紳之墓葬二十有二年矣其友楊士奇始克序而銘之序曰解氏姬姓其先居鴈門唐同州刺史琬之孫隱爲蘄州司户叅軍始家廬陵之同水鄕叅軍六世孫盛遷吉水邑中世有科第至諱夢斗宋太學上舍生諱應辰元高安縣學敎諭生諱子元舉進士授安福州判官兵亂守節死生開先號筠澗娶高氏進士若鳳之子公之父母也公諱縉字大紳自㓜頴悟絶人五歲父敎之書應口成誦七歲賦詩有者成語十歲日誦數千言終身不忘十三盡讀四書諸經貫穿其義理老長不能難也而文思溢發十八舉江西鄉試中第一洪武廿一年會試禮部中第七廷試讀卷者以所對䇿論過高仰置第三甲時兄綸及女弟之夫黄金華同登第太祖高皇帝喜其一家三人出仕授綸禮部祠祭主事公與金華皆中書庶吉士日侍左右甚見愛重間暇數召兩人論議考其所學一日諭公曰爾試舉今施政所宜直述以聞退卽具奏大槩言陛下得國之正非唐宋所及取天下扵羣盜救生民扵塗炭徐定燕都市不易肆而女寵外戚寺人藩鎮之患消融底定皆處之有法矣不邇聲色不殖貨利不爲逰畋皆遠過漢唐宋之君而無愧三代聖王矣惟願喜怒一聽扵天理而推誠任使不以察爲明又言陛下拳拳扵畏天畏鬼神治民治強暴然畏民者畏天之本治心者治民之本又言令不必數改數改則民疑刑不宜大繁太繁則民玩法司近有朋姦罔上倚法爲姦二條下人殆難惜手足矣又言御覽之書宜集唐虞夏商周孔及濂洛關閩之言隨事類别以備勸戒又言六經殘缺莫甚禮樂宜正禮經及訪求審樂之儒作樂書又言祀天宜復掃地之䂓尊祖宜備七廟之制大常非可以肄俗樂又言僧道之壯者宜黜之使復人倫經呪之妄者悉火之以杜誑惑斷瑜伽之敎禁符式之科絶鬼巫破淫祀以底善治又言進人當擇賢否授職當量重輕今大誥有不爲君用之罪則仕者不復擇矣又言古者鄉隣善惡必記今雖設申明旌善二亭而無黨庠鄉學之敎互知之法雖嚴訓告之方未備宜取古人治家睦隣之法若古藍田吕氏鄕約及今義門鄭氏家範布之天下世臣大族率先以勸旌之復之爲民表率而致治不難矣又言易曰王公設險以守其國重門擊柝以待暴客而近世狃扵宴安墮城池銷鋒鏑諱言兵事以爲天下巳治一旦或有不測之虞何以爲備宜勑有司以時整葺寛之歲月守以里胥額設弓手課之射敎民以農隙兼習兵且乞設武舉以收英才又言宜廣鄉校前代多有書院有學田有貢士莊宜修復以敎養賢士又言極刑之禁慮有遺才給配婦人恐傷節義旣奏上嘉其識正公素與兵部尚書沈溍不合溍奏公入部堂索皂隷語嬉慢非禮上慮公優閒怠逸卽除江西道監察御史蓋以繁劇玉成之也時都御史袁泰怙勢家人橫恣諸道御史欲紏之無敢執筆爲章者公揮筆立就歷舉其過章上雖曲宥泰而一時多其直上又慮公少􅉼養将爲衆所傾召其父至諭曰才之生甚難而大器者晚成其以而子歸益進其學又諭公曰朕扵爾義則君臣恩同父子其歸益盡心扵古人後十年來朝朕大用爾遂侍父歸公天分高又感上大恩歸益自勵而造詣深矣數歳高皇帝上賔公趨赴臨權臣忌公者謂赴臨非詔㫖遂謫河州歳餘權臣黜召還以爲翰林待詔大宗皇帝入嗣大位首索公旣見置諸左右深信任之時朝廷詔勑與凡大制作咸岀公手毎預宻議寵賚加厚陞侍讀數月陞侍讀學士奉訓大夫上初與武臣丘福等二三人議建儲文臣惟金忠預皆靖難時股肱也武臣咸請立皇第二子高煦謂其有扈從功上不聽福等叩首請不巳終不聽遂召公預議事定然秘未發明年冊仁宗皇帝爲皇太子封高煦爲漢王進公翰林學士兼右春坊大學士奉議大夫又明年福等所初議頗泄扵外高煦素不樂公言扵上曰藩府之舊無泄者其縉泄之遂出公爲廣西布政司右叅議授朝列大夫又以李至剛言公怨望政交阯八年入奏事時車駕還高煦言解縉瞰上遠出覲儲君徑歸無人臣禮遂徵下獄後三年以病死獄中素所交㳺出資歛之外兄高建春歸其柩葬之高氏公死後家徙邊仁宗皇帝臨御特赦還而官其從子禎期爲中書舍人公仕前後不十歲爲庶吉士再歲御史未滿歲爲學士四歲兩賛外藩皆席未暖初修高皇帝實錄及永樂大典皆爲總裁考會試者一讀廷試卷者二聲名在天下籍甚敦孝友重義輕利遇人憂患疾苦輙隱扵心苟可用力盡意爲之篤扵故舊及名賢世家之後喜引㧞士類或誚其汎愛者終不爲變襟宇闊畧不屑意細故而表裏洞達絶崖岸雖野夫稺子皆樂親之求文與書者日輻輳率與之無厭倦意或言有不當與者笑曰雨露豈擇地而施哉且人孰不可與進者不畏疆禦承運庫官張興恃寵而横嘗笞擊人扵左順門下公過之叱興御座在此敢爾違犯禮法乎興雖忿公然不敢應一語遽俛首歛退同官治職事或有失悞公在上前率引爲巳過明於知人太宗嘗與論羣臣御筆書蹇義等十人名命各䟽于下十人者皆上所信任政事之臣亦多扵公善而具以實對扵義曰其資厚重而中無定見扵夏原吉曰有德有量而不遠小人扵劉雋曰雖有才幹不知顧義扵鄭賜曰可爲君子頗短扵才扵李至剛曰誕而附勢雖才不端扵黃福曰秉心易直確有執守扵陳瑛曰刻扵用法好惡頗端扵宋禮曰戅直而苛人怨不恤扵陳洽曰䟽通警敏亦不失正扵方賔曰簿書之才駔儈之心旣奏上以授仁宗曰李至剛朕洞燭之矣餘徐驗之仁宗因問公建文所用諸人對曰此皆洪武中人才徃事不足論巳遂問尹昌隆王汝玉對曰昌隆君子而量不弘汝玉文翰不易得所惜者市心耳後十餘年仁宗出其所奏十人者示士奇且諭之曰人率謂縉狂士縉非狂士向所論皆定見也公之文雄勁奇古新意疊岀叙事高處逼司馬子長韓退之詩豪宕豐贍似李杜其敎學者恒曰寧爲有瑕玉勿作無瑕石書小楷精絶行草皆佳其卒以永樂十三年正月十三日春秋四十有七配徐有賢德子男二禎應卒扵徙所次禎亮孫男女各二太宗皇帝初召翰林七人入內閣其三出廬陵公與胡公光大及士奇也三人相與厚而相知深今獨士奇在胡公墓上之石士奇書之公墓石未有書其可不書銘曰千里之足越國過都或一蹷之不虞楩楠百尋其寸之螙寜見揭扵匠輸郁乎紛紛五采承日競瞻望以忻快何泯没之遄疾干將地下其神不死尚有光華天漢之涘
