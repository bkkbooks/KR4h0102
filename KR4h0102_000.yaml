front:
  text: 皇明文衡序文之來尚矣而後世詞華之習蠧之故近有為道學之談者曰必去而文然後可以入道夫文載道之噐也惟作者有精粗故論道有純駁使於其精純者取之粗駁者去之則文固不害於
  hash: sha256:6138cb8e4c4db27c511e2df607c31d342e6662d37f919ea3a1147c5128e80068
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_000-1a}
body:
  text: 道矣而必以焚楮絶笔為道豈非惡稗而并剪其未惡莠而并揠其苗者哉漢唐宋之文皆有編纂精粗相雜我朝汛掃積弊文軌大同作者繼繼有人而散出不紀無以成一代之言走因取諸大家之梓行者仍加愽采得若干卷其間妄有所擇悉以前說為凖以類相次郁乎粲然可以備史氏之収録清廟之詠歌著述者之考證繕冩成帙以俟後人或曰朱子嘗譏文自文而道自道者其語甚力然則近世道學之談未易非也子之是舉無乃勞乎走曰不然考朱子之云盖為蘇氏之文駁故耳至于楚詞韓文註釋校訂不遺餘力則我先正固嘗以文為意矣必如子說則是釋家不立文字之教走豈敢以為是乎賜進士及第嘉議大夫太常寺卿兼翰林院侍講學士兼修國史玉牒經筵官新安程敏政序皇明文衡目録上卷之一代言檄諭中原檄宋濂詔封諸王詔王禕定嶽鎭海瀆名號詔開科舉詔免租稅詔封安南國王詔封占城國王詔封髙麗國王詔招諭擴廓帖水兒詔諭安南國詔宋濂制常遇春追封制王禕封靖西王制蘇伯衡梅思禮授大都督府副使制誥皇外考妣追封誥王禕趙德勝追封誥方國眞除廣西右丞誥楊曄除中書左丞誥汪廣洋除中書右丞誥呉琳除吏部尚書誥杭琪除戸部尚書誥魏觀除太常卿誥髙安除給事中誥王文除侍儀使誥張祐除司天少監誥朱允升除翰林侍講學士誥陶安安統除兵部尚書誥宋濓王居仁除山西叅政誥潘雄祖除飛熊衛指揮誥蘇伯衡王弼授驍騎衛同知指揮誥冊懿祖恒皇帝謚冊文蘇伯衡懿祖恒皇后謚冊文遣祭文祭古帝王陵墓文宋濂祭高麗國山川文王禕擬祭元幼主文錢甦卷之二賦奉制㯢蟠桃核賦宋濂少梅賦胡翰弔泰不華元帥賦劉基伐寄生賦葯房賦王禕南歸賦梁寅底柱賦唐肅大韶賦貝瓊石經賦廣寒宮賦汪仲魯弔虞城賦王翰閒田賦離譛賦楊士奇閔志賦黃淮述夢賦胡儼北京賦李時勉方竹軒賦金寔赤石潭賦周敘黃河賦薛瑄卷之三二騷思􅍇人詞宋濂孤憤詞琴邊秋興圖詞詹同弔董生文胡翰憫貞淑文懷龍門詞劉基九歎九首招逰子詞王禕弔伍子胥詞高啓雲林詞蘇伯衡題抱琴聽泉圖缺補刻于後劉崧弔茂陵文方希古退菴詞楊士奇辭劒圖詞胡儼冰雪軒詞王直弔余靑陽李江州文周敘竹坡詞劉定之卷之四樂府大明鐃歌鼓吹曲十二首王紳擬祭告天地樂章十三首梁寅擬朝㑹樂章十二首王景擬朝㑹樂章二十六首顧祿補雩壇祝舞歌詞宋濂廣漢儺詞銅井迎送龍詞唐肅迎日詞孫炎代祀濟瀆樂章十八首岳正平胡鐃歌鼓吹曲楊士奇代祀漢光武皇帝詞劉定之琴操三十三飛泉操宋濂琴操二首思沂操胡翰風雷引在陳操劉基古琴操二首王禕廣琴操十首朱右望歸操高啓之荆操唐肅負米操缺袁愷前旌操王達後旌操卷之五表箋乙巳年賀千秋節表朱模代翰林院勸進表蘇伯衡國子學賀登極表代翰林院賀登極表代中書省賀平杭湖秀越表代秦王府官謝表進大明律表宋濂進元史表謝恩表劉基封建諸王賀東宮箋高啓謝恩表缺董倫進千家姓表吳沈進太祖實錄表解縉賀平交阯表黃福進五經四書性理大全書表胡廣親征胡虜回銮百官賀表楊士奇兩朝實錄成上表經筵謝表廵狩及平胡回銮百官賀表駕幸文淵閣謝表楊榮幸太學謝表胡儼箋缺進實錄表王直賀新殿成表謝幸太學表缺李時勉釋罪後謝恩表陳循進實録表缺劉定之卷之六十七奏議二十七大庖西上封事解縉代論韓國公冤事狀論事例䟽缺周論考較錢糧封事鄭士利萬言書葉居升奉天殿災上䟽鄒緝請回銮南京䟽缺呂震卷之七奏議陳問安啓楊士奇請開經筵䟽議吳文正公從祀建言缺劉球直言安國事缺鍾同止親征䟽缺王直正統十四年啓䟽周敘論城守䟽程信中興固本疏叅不當與虜講和奏缺于謙卷之八奏議登極建言劉定之虜情題本議劉靜修薛文淸從祀陳言修德弭災章綸應詔求言缺廖莊論輔養君德缺李賢國本䟽二缺姚夔陵廟疏缺彭時卷之九議二孔子廟堂議宋濂七出議王褘論四十二衡運論胡翰正紀論尚賢論井牧論愼習論皇𥘉論迂論九首王㢘禋于六宗武王伐紂宗廟略孔子隳三都鄆灌龜隂田魯鄭易田金縢非古書周六服朝見論李綱固守京師之非養生論梁寅物初論朱右卞和論唐粛分野論蘇伯衡卷之十論樊噲論高啓李泌論民政論方希古明敎論啓惑論鬻拳論樂毅論丙吉論東漢論崔寔論卷之十一論論孫甫薦富弼事王叔英高帝呂后論梁濳劉仁軌論論曹參王直宋論八劉定之以寇準爲樞宻副使帝問翰林學士王安石觀文殿學士歐陽修卒罷崇政殿說書程頥帝諷道籙院云云康王構云云朱熹卒詔經筵進講綱目殷民叛周論周洪謨卷之十二說十天說上下劉基雷說上下鑚燧說宋濂猿說雜說二首王禕染說蘇伯衡默齋說䑕說胡儼泣麟圖說金寔物形說李賢卷之十三解釋附儒解王褘豢龍解朱右中星解貝瓊釋統三首方希古辯十祿命辯宋濓孔子生卒歲月辯犠尊辯胡翰卷之十四辯洛書辯王禕詩辯王紳夷齊辯王直辯戾缺曹端卷之十五辯桂林志辯疑三事陳璉周正辯周洪謨璽辯劉定之卷十六原五文原宋濂畫原原諌王禕原治梁寅原命王叔英卷之十七箴二十五磨兠堅箴宋濂續丹扆箴王禕官箴三劉基誠敬謙謹四箴貝瓊家人箴十五首方希古却兼味箴王紳銘十八蒼雲軒銘宋濂五沙輪漏銘婺溪石研銘三奇石後銘怡顔齋銘胡翰漢榱題研銘卷之十八銘玉兎泉銘劉基奎上人耘杖銘器物銘二十首王禕理齋銘朱允升菜薖六銘唐肅羅經銘王景世直堂銘楊榮石磬銘胡儼忠孝堂銘王直鐘銘公勤堂銘馬愉石鍾山銘楊守陳卷之十九頌詩附平江漢頌宋濂膏露頌嘉瓜頌鳳陽府新鑄大鐘頌瑞麥頌劉