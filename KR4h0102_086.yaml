front:
  text: 皇明文衡卷之八十六
  hash: sha256:11659a9c28ebc20a84b9ba8e2b620682b736b57a2b6626ee01679bf6e956a938
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_086-1a}
body:
  text: 墓誌銘故奉議大夫浙江提刑按察僉事劉公墓誌銘胡廣國𥘉廬陵諸君子仕於朝其聲光炳耀卓然爲時所稱譽者無慮數十人而劉公季道其一也公以明經𬒳薦𥘉拜起居注遇事知無不言竭盡誠悃首發御史大夫陳寜奸深爲上所信重嘗隨駕幸中都度清流關上賦詩命百官和公獨先就有治定不教生縱逸功成猶遣歷間關之句上覽之曰有安不忘危之意賜白金二十兩綵段二端未幾拜浙江提刑按察僉事决積歲治獄六百餘起有牽於文繫者平反尤多民以無冤咸嗟服之此其卓然有聲稱者竟爲陳所衘傳致其死時洪武六年月日得年四十有九公諱宜正季道其字其先沛人唐末自沛官袁五季之亂由袁徙吉居永豐㶚溪曾祖諱某兩領宋漕舉授新淦縣丞祖諱某恒山縣令父諱竒相元至治癸亥領鄊薦爲東湖書院山長吉安路儒學正撫州路儒學教授母張氏公居㓜頴敏過諸兄八歲隨父居東湖讀書聲琅琅聞于外賔客徃來應對閑習人多譽之九歳喪毋哭泣逾哀十三喪父居喪毀瘠不勝始事鄊先生劉惠心繼從山泉解先生二先生咸異之時郡守開堂試公年十八就試中高等獲綵綺二旣而持所學試于有司再不利有得其文讀之曰如此而見擯斥命也季道奚辱公曰吾學未至耳非有司病吾元季天下繹騷其友梁某爲福建招討託致其母扶持兵革間岀艱難致其母子相見某拜公曰微公其孰能致吾母終身不敢忘德嘗與姻戚居逆旅忽得疾公親爲調藥餌旣死公抱之而哭解衣葬之所遺金悉以歸其子兄弟四人長皆先没惟仲兄存公迎至家養之比其没葬祭皆盡其情無子以次子爲其後公娶邑曾氏賢而有婦行自公没惟以教子爲事子三人長曰忠次曰朂㓜曰肅字子欽子欽登永樂二年甲科爲名進士入翰林爲庻吉士其文學爲儕軰所推讓女一人適某孫男九人女二人距公没三十餘年將卜葬于某山之原子欽始以狀來請銘謹按狀而銘之銘曰嗚呼劉公挺然之英政事文章焯有時稱發奸之言揚于大廷巨蠧一聞膽落魄驚諷辭戒逸治定功成至誠有動錫賚寵榮載歷風紀激濁揚清事有失頗公執其平伸抑理枉獄無歎聲奸臣衘公頃不忘情傳致公死惡害公生生有不没死則公寧公天旣定彼奸曷勝以磔以裂天子聖明公憾旣釋烈日薄冰彼奸鬼蜮公猶列星有燁其芒南極長庚伊彼鬼蜮稔其穢腥有北豺虎以莫不憎公有令子式克繼承以昌家學甲科聿登庻或在兹報公㝠㝠有封如堂以妥公靈爰伐貞石鑱不朽銘百世之下斯文是徴羅公曚叟墓誌銘我太祖高皇帝乗運龍興文武智謀之士四方雲集各獻其能芟薙暴横肇建洪業僞漢逞兇殱于鄱陽其子理濳歸武昌上不欲窮兵乃遣儒生棹三寸舌以說之廬陵羅復仁承命徃說說下完城不費一矢雖其口舌之功而實本於太祖不殺之仁有以致之也復仁質直遇事敢言以是功授弘文舘學士後賜休致于家其從子養蒙好言語持辯論侃侃無所避人謂有其從父風而文學或過之羅氏代有其人養䝉諱以明養蒙其字自號曰曚叟㓜知慕學家貧母鬻簪珥以教之七歳善聲對十二三能為辭賦及冠爲童子師常得肉味輙先以奉親所得一毫不自私元末兵亂値太父母及父三䘮竭力盡䘮葬不以貧窶廢禮一曰假舘新淦忽心動亟回家時母遘疾甚危卽禱天請以身代母竟死更二日復甦謂曰適有神人告我云更與汝壽五齡人皆謂公孝誠所感母後果五年而没母没哀痛幾絶終喪如一日自是遇歲時祭奠必泣下沾襟鄕人見者莫不稱歎故公之行有以服人雖冦盗聞公言皆感愧不復爲攘竊國初有勉公仕者公曰我逢聖朝為太平之民謳歌由野以樂治化教子課孫以報覆育之仁吾老矣無能為矣今天子卽位改元永樂其中子汝敬領鄕薦明年上春官登進士第入翰林爲庶吉士陞修撰皆公之教也汝敬嘗迎公來就飬公時猶康强朝上于奉天門見皇太子于文華殿特加問勞命大官賜膳人皆榮之巳而辭歸詞林士大夫多爲詩歌餞送于都門外觀者咸嘖嘖加羨公歸鄕惟日賦詩歌頌太平間以書勉其子惟盡忠孝年已八十六耳目聰明飲食無異平時一旦翛然而逝永樂壬辰十一月卄三日也生故元㤗定丁卯月日曽祖德茂元瑞州學正祖仲哲父時中俱慱學有文章母蕭氏配蕭氏再娶李氏俱先殁子男七人曰忍曰德曰盈曰恭曰肅卽汝敬曰仁臨江郡學訓導忍徳先卒盈爲復仁後孫男若干人孫女若干人曽孫男某曽孫女若干人以某年月日塟于鄕某山之原汝敬以右春坊右諭德兼翰林侍講金公㓜孜所述行狀泣請予銘予生也後嘗忝與公有文字之交且辱相知詎可以辭况公平生學問橾履出處大槩表表可稱至其事親誠孝感動神明此猶可書謹按其實而銘之銘曰羅氏之先始出錢塘有衍其支乃迂豫章奕葉盧陵復蕃吉水桃林之墟蔚蔚嶷嶷科第相望寳祐迄今有瞱高曾襲其簮纓猗歟曚叟式承家學以孝事親質神無怍士服儒紳八十六年鶴髪重顔飄然若仙逍遥林壑優游卒歲他人天爵公獨良貴公今逝矣以反其眞九原不作永閟斯文王竹亭先生墓誌銘楊士奇國朝混一之𥘉天下耆儒碩師徃徃多在徴詔數下或進而階顕融佐化理或退而信廉節成後進皆卓然有益於世也是時泰和王竹亭及其弟子啓兩先生正學篤行高風直節表表乎大江之西洪武二年子啓先生首舉明經爲監察御史明年竹亭先生以說書徴旣至上書論事更授福建􅐭運副使以老得辭子啓先生後陞廣西按察僉事又擢知崇慶州政治赫赫巳而罷歸時竹亭先生春秋六十餘子啓先生亦㡬六十伯仲恭愛隆然居必一堂出必鴈行長身玉立儼乎端恪巍冠褒衣䄡䄡甚偉蓋望之如神人無不肅然起敬畏者至其接人色莊氣溫雍容怡如語簡理盡無不樂就之焉竹亭先生諱沂字子與竹亭其別號㓜讀孟子卽知辯於義利稍長刻厲學問甞從元進士楊升雲彭復初治周易造其室奥自六經至於周程朱張之書靡不深究及子史百氏咸旁通愽考蓋於天人之微聖賢之藴往古治亂成敗之故蓄之富察之審言之的而履之確也嘗一試有司不合卽不復出教授於其鄕而所交游往還皆當世名人元季江西叅政全普庵撒里守贛州禮遇先生辟爲行省照磨又承制授吉安路治中俱不受逮皇明龍興洪武三年廣東行省聘考貢士試是年侍御史吳去疾言泰和王沂經學操行宜在侍近遂徴爲說書至未幾而歸益以成就後進爲務從學者愈衆傾竭底裏隨其材而篤之而皆有成先生資識高明内貞外和氣度弘偉規範自然安成進士劉雲章嘗賛之曰淵乎玄酒之在尊凛乎大阿之未出匣嚼乎其清而挹之弗竭薫乎其和而卽之弗可狎又曰使及門孔氏則風雩之詠歸端章甫之禮樂固將進退綽然而特視其所合蓋確論也先生孝友篤至歲時塟祭循古禮燕處必嚴未嘗啓口及人過失有文集若干卷承㫖宋公濂爲之序詩若干卷襄城楊伯謙序之洪武十六年某月某日卒年六十有七王氏世有德義其先岀晉司徒導之後由金陵来徙至宋戸部侍郞贊顯于仁宗朝事載郡志又若于世至圭爲榮王府賔客與周文忠楊文節皆善學者稱虹溪先生虹溪若干世至性夫性夫子以道元李韓公復嘗薦之以親老辭二子先生兄弟也先生娶陳氏繼李氏皆有賢徳子男一伯貞舉明經累官瓊州知府女一嫁嚴玄齡孫男二信直直舉進士爲翰林修撰曾孫男八女三先生初塟于秋鄕大徑之原至是瓊州公丁李夫人憂改塟先主新山之原使直属士奇銘墓士奇蓋生晚不足究知萬一然念鄕人老長識先生者盡矣當時門人親受教者亦多不在將使後之學者有志平先進其何所考法也且士奇於王氏重世好又少嘗侍教先生兄弟及瓊州公矣故不敢辭不敏不銘謹述其所知大槩而為銘曰奕奕王山澄江洋洋猗歟先生邦人之望江山出雲雨于下土君子之道有畜不施道之傳矣執不為材佐理于隆濟濟偕來世其逺矣後來何師猗歟先生曷究予思故少師吏部尚書贈特進光祿大夫太師謚忠定蹇公墓誌銘宣德十年正月十有五日少師吏部尚書蹇公薨于位先四日以疾聞上遣大監范弘以醫來視賜鈔萬緡明日范大監以衆醫偕來又明日疾革范復來問所欲言對曰陛下初嗣大寳義獨寡祐不能效分寸裡益然區區犬馬之誠所望於聖明者惟敬守洪武成憲始終不渝耳言已而絶訃聞上深悼歎属時國有大事悉停諸祀特賜鈔萬緡敕工部治喪塟贈公特進光祿大夫太師謚忠定遣某官某賜祭而官其長子英英等奉親歸塟有日求余為銘余與公同朝三十有五年而事仁宗皇帝自登儲至大位始終皆陪公公國家老成人所以啓益士奇蓋多不敢辭蹇氏世家重慶之巴縣宋以來多顯仕自公高曾而下始隱居不出曾祖繼祖妣牟氏祖均壽妣雍氏考源斌妣胡氏繼羅氏以公貴贈曾祖祖考皆榮禄大夫少師吏部尚書曾祖妣祖妣妣皆夫人公諱義字宜之生而𡵨嶷長端重不好弄而嗜學弗懈始從里社師中書左丞􅎋哲時爲郡守一見異之引充郡學弟子員語其師曰是兒將來遠到非吾所及當成就之而公不煩程督日益有進洪武甲子中四川鄕試明年中禮部㑹試廷試賜同進士出身擢中書舍人授徴事郞見重太祖高皇帝毎前奏事率稱㫖而數見獎賚𥘉名瑢一日奏事畢問汝蹇叔之後乎親灑宸翰書義字賜之以易舊名時丁羅夫人憂賜道里費且命馳驛歸蓋特恩云服闋仍舊職滿三載吏部奏當調特命終九載朝夕左右凡機宻文字必以付公而小心敬甚乆而愈篤建文中陞吏部右侍郞授嘉議大夫太宗文皇帝入正大綂轉左侍郞數月陞吏部尚書授資善大夫時政令制度有非洪武之舊者詔悉復之公從容爲上言損益貴適時宜間舉數事陳說本末文皇帝以公忠實悉從其言小人有譛公不忘建文者頼上聖明不聽有除官不得善地訴公不公者上皆斥之永樂二年冊仁宗皇帝爲皇太子命公爲詹事時師傅皆以勲臣兼之而輔導責任文臣詹事蓋元僚也上欲有諭皇太子率諭詹事徃導意公亦委曲周悉皇太子尤愛重公所言靡不信用滿三載陞資政大夫十年車駕廵狩北京命皇太子監國中外庶務惟諸王及遠夷有奏請詣行在餘悉啓聞處分公熟於典故達於政體孜孜無倦不動聲色而事頼以濟賜誥以其官秩封贈三代滿九載賜敕有秉心正直及淳良篤實禆益國家之褒數奉命兼禮部事雖職務塡委處之𥙿如十七年丁父喪歸上及皇太子皆遣官賜祭皇太子贈賵尤厚有詔起復公詣北京謝上慰勞再三賜鈔干緡遣中官護送歸南京明年從皇太子朝北京遂命公廵撫直隷應天等府州問兵民休戚及文武吏之賢否而升黜之公謂國家多事之際悉以法繩吏人將不勝特黜其太甚者數人餘多見寛假而兵民利弊當興革者具奏行之仁宗皇帝初嗣位一切政議預者三四人而公居首進少保兼吏部尚書二俸俱支賜冠服象笏及玉帶二遂進少傅及進少師賜師傳之臣銀章各一其文曰繩愆紏繆公首𬒳賜上諭之曰朕有過舉卿卽具䟽用此封識進來蓋望公等匡直也繼賜誥授榮祿大夫封贈三代及妻於公數人誥詞上特増曰勿謂崇高而難入勿謂有所從違而或怠所以望公等者甚切也又念公侍從監國舊勞特製蹇忠貞印賜之而賜敕有以善翊君勞心焦思二十餘年夷險一節之褒時修太宗皇帝實錄命公監修宣宗皇帝嗣位一切政議属公數人如仁考之初繼奉命監修仁宗皇帝實錄書成賜白金文綺鞍馬扈從征庻人高煦還寵賚尤厚復從巡邊旣還以公年老不欲煩以有司之務賜敕曰卿事祖宗積效勤誠朕嗣統以來尤資賛輔夙夜在念圖善始終盖以卿春秋高尚典劇司優老待賢禮非攸當况師保之重寅亮爲職不煩庻政乃副倚毗可輟吏部之務朝夕在朕左右相與討論至理共寧邦家其專精神審思慮益致嘉猷用稱眷倚老成之意繼賜銀章一其文曰忠厚寛弘蓋以褒德云賜新第於文明門内寵録㳺加吏部言公歷少師九載降敕褒諭仍賜宴禮部是歲生旦賜鈔萬緍廐馬一匹命上嗣大位之日賜白金文綺是夕齊宿於公得疾越五日竟不起享年七十有三公爲人沈深質實和厚簡靜內有孝友之行事君有誠處人有量無所拂逆未嘗輕渉一語傷物至於議法亦不苟爲包含必歸中正歷事五朝凡五十年所履坦坦無一日顚躓之憂退朝之暇手不釋卷貴而能謙富而能約上前所言未嘗退以語人蓋天下有隂𬒳其利者矣士奇嘗竊論之魯簡肅之忠實不欺李文正之不爲傷人害物張忠定之不嗜玩好傳獻簡之遇人以誠范忠丈之不設城府公蓋兼有之矣元配劉氏繼張氏皆封夫人子男四長英次芳次芸次荃英荃皆尚寳司丞荃先卒女二長適馬駿次適李成孫男四霖震霑露女一公之塟以薨之歲某月日墓在巴縣某鄕某原先塋之次銘曰節乎蜀山浩乎蜀川孕精毓靈挺生偉人溫中穆外履夷蹈素皇明麗天奮躍自下在帝左右秉恭與誠掌帝之制播告四方進貳天官遂職冡宰簡用俊良徃興至理帝命游隆俾輔聖儲陳厥謀謨聖罔弗俞四紀在廷三翼升御肅肅師臣秉王之度一念惟仁永矢不渝寅畏小心保終猶𥘉隂利逮人人則罔覺惟帝昭明褒詔有數嗚呼忠定維國老成曷不憗遺翼我聖明生榮死哀死且不朽昭徳刋辭永告爾後故少師工部尚書兼謹身殿大學七贈特進光禄大夫左柱國太師謚文敏楊公墓誌銘正綂五年二月十八日少師工部尚書兼謹身殿大學士建安揚公奉勑歸展先墓旣畢事卜日啓行病作衆曰曷俟少間公曰君命不敢稽也挾醫以行至臨安武林驛病加遂不起是年七月二十也守臣治棺歛旣馳奏皇上嗟悼輟視朝一日贈特進光祿大夫左柱國太師賜謚文敏遣禮部尚書胡濚莅祭遣中使護喪還塟其鄕命有司治墳公先世見余譔其大父墓碑曾大父伯遜大父逹卿父伯成皆贈榮禄大夫少傅工部尚書兼謹身殿大學士曾太母黃大母謝繼阮母劉皆贈夫人公𥘉名子榮字勉仁自學諸生鄕試選第一㑹試第三廷對擢第二甲賜進士出身入翰林爲編修太宗皇帝入正大綂更其名榮𥘉建内閣簡翰林之臣七人其中專典宻務七人者解縉胡廣王淮胡儼金㓜孜公及士奇也公齒最少最警敏一日晚上岀右順門召内閣諸臣獨公一人在出江西三司奏章示之言吉安鄕民之嘯聚者巳悉復業蓋朝廷𥘉有聞卽遣行人許子謨齎敕撫諭子謨行將一月又遣都督韓觀率兵繼之如撫諭不下卽加兵及是奏至上諭公曰觀不至不下其降敕褒觀公讀奏訖對曰計發奏之日觀尚在中道未足褒從之自是益重公時四方之事方􅎋七人者旦夕侍左右承顧問受㫖退治職務且兼稽古纂述之事不虚寸晷上時歩至閣中親閱其勞且視其所治咸稱㫖時公尤勤勵遂皆進官公進修撰數月復進侍講明年改元永樂秋公請告歸省又明年春七人皆賜二品金織衣且勞之曰天下事咸朕與若等同計非若六卿之分理也無幾簡翰林之臣十數人兼春坊官任輔導公兼右春坊諭德授奉訓大夫日分直進講經史四年春公得寒疾命中官以御醫來視賜藥物五年奉命往甘肅同總兵議邊務察視守備還奏稱㫖六年夏䘮父給傳歸旣塟遂命起復是年冬喪母公奏歸守制時巳下詔廵守北京不許七年春内閣胡公及公金公奉命扈從北京甘肅總兵何福奏降虜脫脫不花等率部來歸命公徃同福處置還奏上恱遂奉命持節徃亦集乃之地封福爲寧遠侯八年春車駕北征本雅失里公三人仍扈從至驢駒河命公先齎敕還報皇太子復還北京冬扈從還南京九年春奏奔母喪遣中使護送旣還皇太子命公侍諸皇孫學且命公曰嚴則有成公盡心不怠重修高皇帝實錄命胡廣胡儼黃淮及公爲總裁十年二月賜誥命幷追贈父母妻冬甘肅守帥西寧侯宋琥奏叛冦老的罕逃居赤斤蒙古衞將爲邊患時豐城侯李彬鎭陜西遂敕彬率師勦之且命公徃與彬計度十二月還奏餉道險阻今沍寒人疲馬瘠不可行且小醜不足以煩王師遂敕彬旋師無幾叛者復歸十一年春從狩北京十二年三月從征瓦刺時皇長孫侍行上命胡金及公三人凡行營有暇卽與講析理義開其聰明尚寳司官闕命公兼之旣還敕翰林修性理五經四書大全公三人皆爲總裁十四年陞翰林學士仍兼庻子扈從南歸十五年春復扈從廵北京十六年夏進高廟實錄賜宴賚胡公没公掌翰林院事益見親密一時廷臣狎恩多縱忌公抗直發其私適太學闕祭酒衆共舉公實欲踈之上不聽公遂密言十弊指斥五府六部都察院章留中不下十七年進文淵閣大學士仍兼翰林學士授奉政大夫十八年扈從北征秋還京冬將西征親藩奏建文中江西所垜集民兵可徴用出奏示公公對云陛下命復民業二十年矣今復徴非信上曰朕意固如此遂寢三殿災公偕金公陳便宜十數事皆見施行重賢愛民或䧟非辜必援之尚書夏原吉以兵饟不給坐繫吕震言其柔姦侍讀李時勉嘗論事亦有言其賣直者皆激上怒公悉委曲爲之辯解二十一年秋復扈從西征駐蹕萬全一切軍務悉付公掌寧陽侯陳懋奏番王也先士干來歸命公徃議定降歸奏稱㫖卄二年復從北征中道軍餉不繼上聞之命公與金公總計其數遂如二公言遣使諭虜釋其弗臣之罪下令班師浙江三司奏處州之麗水福建之政和山冦刼掠請敕兩都司合兵討之公言愚民爲有司所苦岀不得巳兵出卽良民先𬒳害願遣一敕使撫諭之不足煩兵上從之卒如公言無事一日上從容坐帳殿諭公二人曰東宫監國乆熟政務此歸悉付以天下事吾惟優游莫年二公共對曰皇太子孝友仁厚天下屬心允稱陛下付託上恱師次榆木川上不豫旣上賔凡沐浴襲奠飯含棺歛一切之禮悉岀二公衆遂推公先馳歸報旣至同尚書蹇公等議喪禮遂議卽位禮仁宗皇帝嗣位進公太常寺卿授嘉議大夫仍兼兩職學士逾月進太子少傅授資善大夫兼謹身殿大學士山陵事􅎋太監孟繼極言公盡心喪事上嘉歎卽陞公工部尚書仍兼前二職賜敕褒諭三俸俱支尚書一俸全給米洪熈元年賜誥贈三代考妣無幾上命範白金為方寸印四枚其文曰繩愆糾繆以賜師傅公與金公同受其一皆期之直言匡輔修文皇帝實錄公預總裁仁廟上賔時皇太子監國南京遺詔召嗣位公往迎於德州旣還命公同有司相陵地宣宗皇帝嗣位修仁廟實錄仍預總裁高煦反在廷多懐二心惟文臣三四人勸上親征公其首也遂扈從討平之師還特受駢蕃之賜馬騏激變交阯黎利聚衆抗王師總帥孱弱不支輙與利和且為利請立陳氏後遂以師還奏至上以示文武大臣皆勸發兵擊利上不聽竟偃兵息民公預力焉是年八月車駕廵邊至遵化聞虜逼塞下以道陿師難竝進上率鐵騎數千先馳擊之文臣獨公從旣還陞少傅進榮祿大夫仍兼尚書大學士三俸俱支辭大學士俸進兩朝實錄賜宴賚又範白金為圖書刻方直剛正四字以賜公數月上念先朝老臣蹇義等四人皆春秋高竝賜敕褒諭命輟職務朝夕左右侍論議公預焉賜玉帶加有御製詩畫之賜公滿三載吏部以聞賜敕有忠言讜論禆益為多之褒賜宴禮部遂賜少傳誥進封三代後兩扈從廵邊皆至洗馬林而還宣廟上賔公復偕有司相陵地皇上嗣位公與同官三人恊志合力以効禆益賜賚特厚修宣廟實錄皆為總栽書成進公光祿大夫柱國少師兼尚書大學士如故賜玉帶時上日勤聖學命公同知經筵事五年謁告省墓賜敕褒諭加厚賚給傳遣中官護送旣還京道薨春秋七十公仕於朝四十年皆居淸宻考鄕試者一讀廷試卷九爲人闓䟽果毅遇事當爲奮前不疑於論古人必欲出新見不肯茍同議辟率歸寛恕勤職事盛寒暑及小疾未嘗少怠於四方裔邊徼事及邊將勇怯智愚靡不通知故忖量事勢率預中內篤孝友睦婣之行家故豐𥙿且有厚祿能濟窮恤患無問踈戚喜賔客善交際雖貴盛無崖岸貴賤小大皆歸心焉故聞其没也咸有嗟咨悼惜之意所著文章有黙菴集雲山小藳靜軒藳退思集北征記訓子編藏于家元配劉贈夫人繼劉封夫人皆里處士仲穆之女子男六恭讓錫賜貴芳貴通女七兵部主事雷濳詹􅣱陳順德蘇潤其壻也餘在室孫男十二奏儼倫俊儉佶儆佐倧偉伷儀女七曽孫女一皆在室士奇與公同僚三十有九年同事四聖今内閣舊臣惟吾兩人未能退公又溘先余逝公之塟其子属少保楊公書墓上之石余銘諸幽嗚呼凡今能文士大夫感公之德述公之行雖有之矣若交之乆知之深言之信者余兩人其庶幾可無愧也銘曰桓桓文敏通才愽識遭際聖明光奮于績承明延閣著作之庭以翺以翔舒華振英北裔西陲從狩萬里職典者文亦兼知武羌虜脑臆帥坦弱强重瞳屢顧敷奏惟明晩陟三孤貳公弘化恪恭朝夕敢或遑暇帝懷敷仁鞠躬承之民懷被福黾勉成之志存寛惠行在果斷嘉謀讜議褒書有煥予告南旋曾幾何時上下延竚而計奄來越昔內閣七人同事荏苒三紀我銘其四公壽考終哀榮寵光於乎文敏殁也不亡
