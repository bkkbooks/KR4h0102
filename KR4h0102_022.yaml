body:
  text: 七志釋寄胡徴君仲申宋濂華容孝廉與廣平文學遇于神明之臺孝廉問曰豫締子交巳越二紀其貌固狎其志則未之聞也子能為我揚推古今而釋之乎文學曰走也不敏長自巖穴鶴毳編𥜗土芝緼食動趾踉蹡發辭􅟌吃忽挾緗縹去歷都邑見者大噱指為木刻錯愕周章無地寄迹獨孝廉暖我以溫顔前我以重席迪我以三古之芳猷期我以九能之至域拜孝廉之貺厚矣孝廉有問敢對以臆寓形霄壤不翅蠛蠓時幻歲遷電滅鳥空唯極所適其樂則鴻出遊大澤才騫氣雄鼻尖出火耳後生風金張前驅許史後從牽黃臂蒼箙矢韔弓仰落雙雕俯扼長熊毛血旁灑塵坌四封入據邃館廷實惟供罍尊旁午豆爼衡從肉腴含春酎暈移童器周八音律合六同部分立坐筵布西東緑華白台南威紫衝靨輔竒牙瓌質姣容歌喉撼塵舞袖翩龍其有事固日新而弗足也竊有志焉孝廉能許之乎孝廉曰欲敗度縱敗禮古人所戒子豈宜蹈之願聞其他文學曰班生投毫令名煌耀終童請纓其齒甚少不有熖熖孰濳其爝非勒銘於燕然必建標於粵徼軒冕以之蟬聮紳笏以之嫽嫽衛霍擁軫樊陳執纛公子掃門王孫媚竈霜露係乎吹墟豫奪視其愠笑其鋭也若孟勞之出魯襓其重也如天球之鎮周廟天下學士揮汗為雨聮𬒮成帷莫不仰遺光而企末照其視處環堵厄藜藿擊壷而越吟倚柱而吳嘯卑卑南陽之耕落落滋泉之釣口心共語影形相弔不亦大有徑庭乎孝廉曰功高者身危位隆者名喪此衆人之所嗜而君子之所愼也文學曰神封靈壤作鎮下方會稽衡華沂岱嶽常霍及醫閭分布九疆捴三條於中區限兩戒於外邦他若滄漲蕩浮靑瀚混茫包天褁地循環相通叶湯其間怪偉靡可數詳天孫嶽長水伯瀆宗叶莊昴宿寶符之貴玄龜靑鯉之章金篋玉策之探日月圭璧之藏或隱而晦或露而彰走將簡徒御戒樓航濯足於咸池晞髮於搏桑豁氛埃於人瑕發忠信於天光蒼水之使稷丘之君庶一間之勺鼎湖而想遺弓履河洛而思聖勳也孝廉曰山川形勝固足以廓子耳目昌子文辭然非至焉子毋徒取則於太史遷也更請大之文學曰去聖逾遠學術紛披控名責實禮度是師上下有敘隆殺異宜苛察繳繞弗失絲釐貴儉兼愛上賢右鬼采椽不斫型簋唯土嗇然自守與孔齊軌權事制宜詭行遁辭移隂轉陽入神出奇變化闔闢千目莫窺秉要執本立為經制法無常形事無成勢洞究羣情為萬物主儀節或愆峻刑弼之肅如晨霜犯者裂肌仲鞅非到挾之以馳因彼天時以施教令若儀若象測度以定紀綱載明是謂大順食天所寓邦本所資山澤平地相厥攸宜八政之首著于經彞揣摩國紀宣明帝治或合或兼本末畢具凡有猷為罔越憲制若是喧豗泣猋訊雷震撼乎西極充斥乎九垓渢渢乎海水起立而應龍天飛也戔戔乎五兵雜陳而神授握機也芒芒乎曠野萬里而列井布棊也走欲遍索其説而試之不識可乎孝廉曰夫子沒而微言絶諸子百氏人人殊未有能一之者也文學曰戡定惟武亦國之程其書漫衍四類是繩隂陽權謀伎巧勢形其目昈列翻翻􅌭􅌭九宫八門六甲五神軍軌兵鈐星式雷經金雞玉狗風角鳥情制器尚精動合神機胄鎧羅陳戈戟交施渠答距堙鶩冥扶胥象車雀杏行馬飛鳬武衡大櫓歡耳長殳雲火萬炬渾脫全軀䇿全器良其用益張營察六形旗按五方天地定位風雲流行龍虎騰趠鳥蛇翼驤正正奇奇巍巍堂堂赫赫赩赩稜稜璜璜以守則固以擊則揚或追北於函谷或喋血於太行或徇地於臨災或陷堅於昆陽是亦英雄之壯觀也走竊樂之不知飢渴之在巳也孝廉曰兵者不祥之器聖人不得巳而用之子服儒衣談儒書又焉用爾為文學曰粵厥軒轅遊心太𥘉上超鴻沆下入渺瀰有竊其餘亦神其軀文賔履生師皇馬醫主柱丹砂騎鳴龍師木羊葛由神泉鹿皮折足山圖赭衣服閭女丸素書赤斧碧雞朱璜瘕脫玄俗質虗心存沖寥迹亦佹奇五性既絶九患亦除三階有嚴七變無虧身升紫宫位紀琳書隂隆伏骨目炯四規執東象之玉文契九赤之班符御躋虗之龍襪服太極之麟芝入火不爇入水不濡入石不閡入木不拘雲臥天行神濳靈飛是蓋與天為徒又不特致治於無為也當闢我石室寢我世機服我胎息殺我蟲尸洗伐我毛髓銷解我膚肌覩銅狄而摩挲約令威而來歸不知能成其志否乎孝廉曰聖人不師仙使其可為則周孔為之矣文學曰荒荒遺文或偽或真學徒巧辨或正或舛先出者堙後出者存何老生怨尤而異師是嗔藏之名山編簡乃完何傳授有緒而魚魯或殘汲冡一啓蟲書再覩何怪言放紛而弗齊于古緯候相傳內學是尊何列國寶書而盡閲其文僭辭竊義聾俗簧世日新月巧動莫之制衡錯㰚瑩方州部家何立言艱深而莫究津涯始生終通生育及資何其象不一而數皆九為原熒丱冡名性氣體何圖指佹殊而重摹迭疑觸類而言何莫非此沾沾動喙徙見其鄙走將鉤其厖鴻掠其纎微懸空明之金鑑俾無遁於妍媸能若是是亦足矣孝廉曰此粗近之然殢於傳注童習白紛若華蟬死生其間亦奚益哉文學曰孟軻氏沒世乏真儒師師萌庶倀倀奚歸孰廓我矇孰砭我愚群言孔多契真者誰欲操腐艦以泛具區欲絡盲象以駕鼓車縱有智巧寧不殆而嗚呼噫􅐵一何寥乎九聖之神於昭於天九聖之心存之於文文何昭乎嗚呼噫􅐵薋葹盈室何有芳蓀繁星爛宵孰知朝暾寧不使我怡怡而愮愮乎帝降民衷德與天一胡不自貴葩藻是溺顛倒首足淆混白黑棄其瓚槃寶厥瓦鬲拊膺自傷淚血交積誓劀宿穢以剗末習駕舂陵以為舟鼓關洛而為楫張武夷以為帆期洙泗之可涉夙興夜寐偟偟業業凛然如上帝之在目睫若是何如孝廉曰此僕素昔之所宄心者也幸與子同之於是執手降臺相視而笑笑已繼之以歌曰真儒不生世隂隂兮擲埴索塗愈幽深兮炯其靈根無古今兮超彼九玄離濁氛兮攀淵追騫乘赤麟兮文之興喪資以身兮任重道遠何時而止兮朝斯夕斯相期於殁齒兮文訓王禕華川王生學文於豫章黃太史公三年而不得其要倀倀焉食而不知其味皇皇焉寢而不安其居望望焉如有求而不獲也太史公一日進生而訓之曰子之學文有年于兹志則勤矣吾聞天地之間有至文焉子豈嘗知之乎夫雲漢昭回日星宣朗煙霞卷舒風霆鼓蕩者天文之所以暢山嶽錯峙江河流行鳥獸蕃衍草木茂榮者地文之所以成天地之文不能以自私誕賦於人人則受之故聖賢者出以及瓌人畯士相繼代作莫不大肆於厥辭蓋自孔氏以來兹道大闡家修人勵致力於斯其間鞠明究曛疲弊歲月刓精竭思耗費簡劄者紛趨而競馳孰不欲爭裂綺繡平攀日月高視萬物之表雄峙百代之下卓然而有為然而躑躅而不進骩骳而不振思窮力蹙吞志而沒者往往而是而能登名文章之籙者其實無幾則所謂至文者固夫人所罕知是故文有大體文有要理執其理則可以折衷乎群言據其體則可以剸裁乎衆製然必用之以才主之以氣才以為之先驅氣以為之內衛推而致之一本於道無雜而無蔽惟能有是則統宗會元出神入天惟其意之所欲言而言之靡不如其意斯其為文之至乎凡吾之説子豈嘗知之苟知之其試以語我生曰文之為物貴適時好粲然相接合喜投樂有如正始不完文氣遂偏俗尚化遷而排偶之習興焉四屬六比駢諧儷聮抽黃對白調朱施鉛五采相宣八音相便握摛穠纎啽哢寒暄豐腴醲酣眩麗媚妍珠璣溢緘膾灸滿篇凡慶函與賀牘咸纍幅而疊畨王公之門下逮閭閻彝儀縟典往來交際率奉之以周旋又如大雅既逺詩歌日變玉臺西崑其流也漸支為詞曲爭嫩競艷字分重輕句協長短浮聲切響清濁和間羽振宫濳商流徴泛笙簧觸手錦繪迷盻風月留連鶯花凌亂振妙韻於沉冥託葩辭於清婉性情因之而暢宣光景因之而呈獻好會暌離歡欣悲歎莫不假是以託情固無間於貴賤也若是者其為文何如太史公曰古語變而四六古聲變而詞曲文之弊也甚矣請置勿道為言其他生曰命卿選士之法廢而科舉乃興以文取士設為範程漢有射䇿唐有明經復有詩賦建宋日益增經衍為義而三篇以明賦本於律而八韻以成咸各專其科各精其能其義則意融旨切言粹辭達枝語蔓引叢論英發剗聖祕而立辨斡天機而生説其賦則句錬字戞音核韻軋藻秀春擷花艷晴掇校妍醜於錙銖品抑揚於毫髮他若宏辭制舉大科別設文法靡不該文格罔弗列又必學稱博極才號閎傑乃能攻其業凡習於斯者皆賈勇詞場角雄藝闥不厲兵而白戰爭奪弧而先拔若工若拙三年是力若勝若劣一日而決及其中文衡入文彀則遂圍棘聲徹榜金名揭上賢書於天府承洪恩於帝闕乃躋膴仕乃展遐轍若卿若相鮮不由兹而出矣上以此而求賢士以此而致身文之用世信不可誣也歟太史公曰科舉之文趨時好以取世資特干祿營寵之具耳學古之君子耻言之生曰文之古者登諸金石記志頌銘具有成式或鍾鼎是勒或琬琰是刻或鐫于麗牲懸繂之碑或鑱在封嶽磨崖之壁莫不炫耀崇勳烜焯茂德載丕丕之嘉猷紀赫赫之休績然皆一筆之力九鼎可扛一字之價千金是直爾其宏粵之思雅健之姿瑰瑋之辭攟托馬班凌厲蔡陳蹂躪韓柳玉采金聲焜焜煌煌鍧鍧鏘鏘衮章繡紋炳炳焞焞􅌭􅌭紜紜詭然而蛟龍翔蔚然而虎鳳昻翕然而律吕張正音諧韺變態類雲霆徑氣排甲兵沈冥以之而開寨幽閟以之而著宣逖遠以之而綿延然非儒林宗匠藝營宿將道德為世之模楷名位為國之儀望堂堂焉章章焉擅鴻筆攬魁柄稱文章之大家者孰當仁而不讓宜其嫓美古昔傳信今後照四裔以無倫垂千載而不朽此其為文也不幾於古乎太史公曰文至於是謂之古宜也雖然其為用殆不止是巳生曰朝廷之上有巨文焉典謨誓誥制册令詔藹為王言渙為大號而帝王之制作存焉灝灝噩噩渾渾洋洋凌厲蓬孛揮霍奮楊或溫潤而精粹或宏偉而秀雄或嚴肅而簡重或衍𥙿而深長經緯天地槖籥隂陽黼黻萬化轇轕三光封職則氣含隂雨之潤授官則義炳重離之明勑戒則吐星漢之華治戒則揚遊雷之轟肆赦則垂滋於春露明罰則示烈於秋霜一字之褒沛漏泉於下地一言之感𬒳挾纊於黎蒸朝出九重暮行四方如風動而草偃如山鳴而谷應奮迅乎宇外旁薄乎域中鼓舞乎夷夏陶鎔乎帝皇文章之用蓋與造化而侔功矣若是何如太史公曰易曰王言如絲其出如綸詩曰辭之輯矣民之協矣辭之繹矣民之莫矣文之為用誠莫盛於此矣姑舍是豈無復有可聞者乎生曰文之難者莫難於史故良史之才古今或無皇道帝德王略霸圖運祚興衰治道隆汚將相卿士武烈文謨賢智忠孝凶慝姦諛天文五行地理河渠禮樂兵刑食貨賦租選舉職官冕服車輿蠻夷戎狄遐方異區恍惚詭變俗怪習殊凡一代之本末皆載乎史故曰史者一代之成書是故事以實之辭以給之法以立之例以律之作史之要必備乎此然非其能足以通古今之體明足以周萬事之理智足以究難知之意文足以發難顯之義者曽烏得以稱良史蓋自紀表志傳之制馬遷創始班固繼作綱領昭昭條理鑿鑿三代而下史才如二子者可謂特起拔出雋偉超卓後之為者世仍代襲率莫外乎其矩論者以謂遷固之書其與善也隱而彰其懲惡也直而寬其賤夷也簡而明其防僣也微而嚴是皆合乎聖人之旨意而非庸史之敢干及乎范曄陳壽之流則遂肆意妄纂曲筆濫箋曖昧其本旨而義駁以偏破碎其大體而辭謭以纎况乎曄壽之不若者則又卑陋而無足觀矣故史所以明乎治天下之道而為之者亦必天下之才然後勝其任兹其所為難乎太史公曰噫史之為文誠難乎其盡美矣文而為史誠極天下之任矣抑吾聞之文有二有紀事之文有載道之文史者紀事之文於道則未也生曰聖人既沒道術為天下裂諸子者出各設户分門立言以為文是故管夷吾氏以霸略為文鄧祈門以兩可辨説為文老𥅆氏以秉要執本持謙處卑為文列禦冦氏以黃老淸淨無為為文墨翟氏以貴儉兼愛上賢明鬼非命上同為文公孫龍氏以堅白名實為文莊周氏以通天地之統序萬物之性達死生之變為文愼到氏以刑名之學為文申不害氏韓非氏復流於深刻之文尹文氏又合黃老刑名為文鬼谷氏以捭闔為文蘇秦氏張儀氏因肆為縱橫之文孫武氏吳起氏以軍形兵勢圖國料敵為文荀卿氏楊雄氏則以明先聖之學為文淮南氏則以總統道德仁義而蹈虛守靜出入經道為文凡若此者殆不可遽數也雖其文人人殊而其於道未始不有明焉譬猶水火相滅亦以相生和敬相反亦以相成易所謂天下一致而百慮同歸而殊塗者言本於一揆而巳文以載道其此之謂乎太史公曰諸子之文皆以明夫道固也然而各引一端各據一偏未嘗窺夫道之大全人奮其私智家尚其私談支離頗僻馳騁鑿穿道之大義益以乖大體益以殘矣此固學術之弊而道之所以不傳也生曰聖人之文厥有六經易以顯隂陽詩以道性情書以紀政事之實春秋以示賞罰之明禮以謹節文之上下樂以著氣運之虧盈凡聖賢傳心之要帝王經世之具所以建天衷奠民極立天下之大本成天下之大法者皆於是乎有徴斯蓋羣聖之淵源九流之權衡百王之憲度萬世之凖繩猶之天焉則昭雲漢而揭日星布煙霞而鼓風霆猶之地焉則山嶽峙而江河行鳥獸蕃而草木榮故聖人者參天地以為文而六經配天地以為名自書契以來載籍以往悉莫與之京斯其為文不亦可以為載道之稱也乎太史公囅然而驚喟然而歎曰盡之矣其蔑有加矣此固載道之器而聖人之至文矣嗟乎世之學者無志乎文則巳苟有志焉舍是無以議為矣是故本之詩以求其恆本之易以求其變本之書以求其質本之春秋以求其斷本之樂以求其通本之禮以求其辨夫如是則六經之文為我之文而吾之文一本於道矣故曰經者載道之文文之至者也後聖復作其蔑以加之矣今子知及乎此則於文也其進孰禦焉特在加之意而巳矣生於是再拜謝曰謹受教敢不拳拳服膺是則是效以無忝夫子之訓告巢雲對貝瓊淮南蘇恆屋于千仞之崖危乎孤鶴之託一枝而雲氣出入乎户牗與野馬絪縕不絶遂號巢雲而處其中凡若干年人莫得見之者有東吳生涉江而過焉恆方據稿梧讀老子書因介而進曰甚矣子之好古也自上棟下宇之作以辟風雨寒暑人固別乎鳥獸巳謂之巢者假也又謂之巢雲者益假也吾嘗病世之假不知好古之士亦必假之物而為名則彼之困於假者奚病也抑顯晦之迹既殊而憂樂之情懸絶吾請與子論之可乎且以觀吾子之所擇也曰可曰通都之中左回大川右屬群山宛宛下赴鬱鬱龍蟠甲第是營繚以崇垣椓之約之如跂如騫文窗洞開朱栱鈎連盤盤囷囷仰不見天以居以寢其居孔安不火冬熾無氷夏寒其視巢雲為何如對曰楊子有言曰高明之家鬼瞰其室不能節之以制而侈靡相傾此漢之田蚡梁兾卒蹈大禍曾不及覆茨之為貴也吾惡為哉曰下隰高原我圃我樊輦石其間可遊可觀鑿而成窪壘而成塜錯落星布嵌巖雲滃或背而崩或環而拱虎豹縱橫駝馬交踵神侔擘華勢方斷隴境與心謀物以機動異卉駢生修條上竦回飈激芳紅褰翠涌其視巢雲為何如對曰金谷既虛而二十四友為禽宜來者之所戒復忍襲其轍乎曰高臺九層上切星辰俯見百里極乎八垠洞庭為池浩浩沄沄鳬鷖往來候鴈千羣霜降之秋雷奮之春以宣其壅以泄其煩朝挹羲和夕賔結鄰其視巢雲為何如對曰古者國有時臺以望氛祲察其豐凶若章華姑蘇恆勞民為之而勢危纍棊者君子不豫也矧其下者罄千金以奉一巳樂之所在患必隨之曰鳳吹參差柱促絃張乍抑乍揚移宫變商楚腰衛頰二八分行曲按回波鸞停鵠翔楊蛾聮娟吐氣蘭芳良夜何其厭厭未央絶纓繼歡炳燭傳觴其視巢雲為何如對曰孔子曰鄭衛之音比於慢矣吾自吳之越自越之楚而息於此耳莊生之天籟發蘇門之嘯歌顧不愈乎世俗之好以喪吾真邪曰結友金張連姻衛霍車馬相過氣熾熏灼恥事占畢擊丸六􅡺遨遊狹邪宿留平樂百金一擲割鮮野酌杯觀五湖垤視四嶽其視巢雲為何如對曰鄙哉貴遊子弟席奕葉之寵矜其驕豪荒淫無度故積之百年之久而墮於一旦不亦悲夫曰入黃閣趨𬗋垣理萬民總百官令出如流勢尊如山門列霜戟堂垂曲旃魚鑰𥘉啓鶴蓋雲團左右之人衣襲綺紈祥周三族國延子孫流光百代比德前人其視巢雲豈不有間乎對曰以非常之才處非常之任者吾潔知校能奚趐鵬鷃之相萬又可以妄覬之邪苟居其位必不克矣曰然則與雲卷舒一壑一丘擷秀汲淸委化而休非幾於潔身亂倫之流歟對曰生覩於彼而不覩乎此蓋知其一而不知其二也雲之為物囿於天地而有時不足囿也藏於山澤而有時不足藏也泛溢如濤洶乎其不可排也回旋如雪泯乎其不可執也蔽乎內外為吾之藩籬也彌乎六合為吾之帷幄也其變不一吾之玩也若狎而昵吾之友也茫茫然莫知其所止油油然莫測其所如也於是拉弘景招太白小匡廬卑少室逍遙倘佯以永朝夕視彼壯麗之居非吾之所安間曠之囿非吾之所適馳騁非吾之所事聲伎非吾之所惑而一時赫赫遠近承風未若終吾天年而守其寂寂也東吳生恍焉若失乃為之歎曰吾子可謂不屈於天下之物而特假以見其志則凡世之沉溺者惡覩物之過乎前其猶太空之雲乎遂録其對却巧文王達昔柳儀曹曽製乞巧文千載之下有鐵崖亦常擬之矣余讀二先生之文感而作却巧文井窺管見其敢追踵前賢哉姑自釋其抱耳歲惟壬辰七月之七王子濳居訌訌弗懌適冷風颯然月綻雲拆桐籟薦秋露花凝夕有一嬋娟歘蒞吾席析析步搖灔灧繁飾睨王子而言曰吾天女之孫也職司天巧式利下民禱吾者泰背吾者屯趨吾者富違吾者貧吾久聞子多戇少文吾實恤子來濟子身汝或不憚吾悉汝陳王子竦肩斂踵覷覷忞忞似夢非夢謂神非神蒲伏而言曰臣固拙矣敢不願聞天孫整裾端坐憮然曰噫人生兩間孰弗兾通今子弗克巧進自貽醜窮不師詭遇秪業􅌹攻未塗噂􅊱龎言滋豐技夸鬼馘計逞狙公鳥翼蛇驤蜂聚蟻同託根巍柯名曰宛童俾不曲合焉致斯崇路欺握雉祝天祛蟲陽縱隂戢內傾外融懀陋欣嫭人心攸同聾俗簧世譎行迂蹤季子繇是而貴曲逆由是而封子不聞歟矧乎妙奪工倕紆行曲施能若是者庸無不宜前邀後障左繩右規笑涴薇露戲焚玉蕤錦心繡腹侮書嫚詩啓喙成訟轉趾徴疵豫豫奪奪是是非非顛倒縱橫起滅提槌倚天拔地斷蛟剸犀藻葩綴縟陟降驅馳氣劘屈子目短相如諸侯見構豪族爭儲壼譽可喜一毀可悲致顯若彼汝奚不為今子􅟌吃赭顔沉吟支頥窮鄉僻地運日以奇我今告汝汝應締思汝不改轍焉能救而夫騏驥捕鼠弗逮狂狸吾將錫子語穽助子嘲機納子之黠驅子之癡詎不偉哉王子曰臣聞駑馬安步麒麟局躅各有攸得奚慰奚恧良玉渾然烏事刻琢馬安善宦倪寬撲學寧為拙傷毋為巧諑岐殊術異彼此相角沾沾求容栩栩強語手擎足旋神辱志沮我嗟其人汨此靈府命栖險竿躬罣遊弩蒿目蓬心臣實不取天孫噱然笑曰井蛙不見東海蟪蛄不知春秋弗識宜樞弗察芳猷方柄圎鑿事恆弗投毀方瓦合懵不知謀耳與目敵心與身讎么麼之技自矜寡儔汝不思變吾實汝羞汝今綘宫弗懲玉堂弗憂攻苦敷淡尫如楚囚匪徒恥之吾實悲之也匪徒悲之吾實悼之也王子又蒲伏而謝曰天孫之心固仁矣啓臣之智固備矣然強哭者雖疾不哀強歡者雖笑不妍生龜脫筒顧非自然危鶴斷脛乃違厥天機械藏心神德不全夫巧者言拙者默巧者勞拙者逸巧者賊拙者德巧者凶拙者吉此先正之格言敢弗服膺而警惕於是天孫砉然冥逝茫無所得出門視之但見繁星麗天萬里一碧翰墨林七更有序金實翰墨林者永嘉謝君廷循圖書之府也君以和粹謹飭𬒳眷遇得美名於縉紳間籍甚性嗜清玩畜之頗富嘗名其齋曰米家船少傅東里楊先生士奇易以今名而記之豫乃為作七更極其辨以進於道意劣辭庸視古之作者固未免有捧心之誚要之發乎情止乎禮義庶幾而不差者也覺非先生久客闤闠心厭喧囂怔忪堙鬱思若無聊安得絶境於焉消搖滌濯煩襟以永今朝聞永嘉主人有翰墨之林曵杖彳亍若履空谷足音跫然主人出速不言心喻眄睞以目升自賔階少敘寒燠主人曰噫走也是林不資于地匪穹于岑無松之盛非柏之森駢羅圖書錯置瑟琴棐几萬籖上下古今文房百玩觸手可尋少安無躁願陳至音於是拂几正席焚沉爇蕙緩宮急羽高卑以序巍巍洋洋無不如意長淸短淸猗蘭飛佩五曲九引纚纚可繼先生曰美矣哉太古之聲也然鍾期既亡伯牙絶響筝笛之耳未能得其惝恍毋勞爾為也主人曰唐虞至聖子不得與記物設教啓其聾瞽以局必方象地之則以道必正神明其德有白有黑曰隂與陽互陳錯舉雲漢其章防危輔罅料敵審已負不可僨勝不可恃兩雄相值乃見勍敵龍蛇成陳虎豹堅壁雖曰小數有至理焉無所用心為之亦賢先生曰君子不操勝心毋作機事此孤山處士所以鄙之也願聞其他主人曰書契初成鳥迹茫昧科蚪再變乃有分隸斯邈之下鍾王軼出唐臨晉帖如蹈一律狂僧顛史草聖入神蘇黃米蔡各自絶倫真迹間存初刻咸在點畫使轉折旋向背明窗淨几目玩心醉誠一快也先生曰儒者於書固最近事然一好著亦能喪志吾未暇焉主人曰五色作繢肇自姚姒後世因之畫事由始晉唐以降好尚蜂起顧吳荆關董郭王李入神造妙區别品第耽嗜成癖千金莫以芳播淸流貴動丹扆適情遊藝動合玄理宣和繤録寶鑑有史似不可少也先生曰君子寓意於物而不可留意於物此先賢所以恐其泥也敢請大之主人曰陶寫性靈妙在得句物情人境動合天趣模擬之精推𫾣之至畫或忘餐宵恆失寐窮極彌工思愈異神驚鬼泣造物所忌我思古人高不可企先生曰風雅遼闊正聲微茫競趨靡麗大檏日亡安得擊壤以反渾厖主人曰經緯天地轇轕後先用與政通體隨世遷秦漢鳩深齊梁骳韓公倡唐衰弊特起歐蘇曾王鳴宋之盛及今賴之矩矱由正今之作者秀出如雲昭回河漢炳耀星辰鈞天合奏鸞鳳和鳴山輝玉藴淵媚珠呈走將漱其芳潤咀其華英寤寐于兹林之下不知歲月之虛盈也若是如何先生曰近之矣而猶未也文以載道匪惟辭工上師聖人吾將子從主人憮然曰命之矣聖人之言世謂之經囊括宇宙含煦生靈未暇細論略陳其名易備隂陽造化以明書言政事治功乃成感發懲創詩本性情無序不和禮樂由興春秋撥亂王法權衡學庸論孟規矩凖繩猶如菽粟布帛之征一息不繼民不得生浮文勝質奚利攸行走將膏吾車秣吾馬由伊洛以遡洙泗而履吾夫子之庭不知其不可也先生離席而立降階俯首請先群經旁藝居後以翰墨林為道淵藪皇明文衡卷之二十二
