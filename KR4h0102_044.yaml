front:
  text: 皇明文衡卷之四十四
  hash: sha256:65fcaee7098fb816775b102d399c82bf8e157fcead8818c907df122ccb6e4b79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_044-1a}
body:
  text: 序送陳知縣之任常山序王英古之君子能謹於行一念之民惟在於修身勵志力學敦本而於事之違於義者毫髮不為其行如此豈特人所敬愛而天必厚之俾其榮盛而豐顯也今之人與古人則異焉姑以余所見者言之與余同時同遊同筆硯者其人負竒氣俊爽而超越者固多矣然其間恃才而矜鄙吝而諂澆薄而狡者一時競相效習以善訟為得計趨公門取利為能事而於問學則漠然略不加意彼皆沉抑無聞觀其行而獲報如此所謂天道福善禍淫豈不信哉陳祖紹烈余同里也其父祖皆敦實務德紹烈充庠校弟子質厚而性敏心坦而氣和探索經史孜孜不懈所謂矜諂縱怠好訟趨利則朱嘗有之永樂中貢太學益持謙勤六館之士咸推讓之至是以歷政大司寇著聲於時擢浙江常山知縣銅章墨綬燁然光華人皆羡之嗟夫紹烈之所以至此者非天厚其報歟人之立身能致其謹而不自流蕩為物所溺而虧其守者必能企仰古之君子循其道不以窮逹顯晦而易其操則庶幾其可矣紹烈既以其行之篤受職為大縣其往也必持巳守正善其政以惠其民終始不渝則行益謹而名位必顯其獲報也必大一邑云乎哉豫老矣叨祿巳三十餘年無補於時惟謹守其分竊思往者有所慨嘆而嘉紹烈之為人故為道之以贈行且以示鄉人焉送周學士赴南京詩聖天子在御之二年春開經筵簡儒臣學行之優者進講經史自少傅楊公士奇而下凡十有五人而翰林侍讀周君功敘其一也功敘所陳説皆嘉言正論多所啓沃其賢簡在聖衷久矣比言事者謂南京六部法司正佐官多未備上是其言以監察御史齊韶為刑部侍郎大理丞廖莊為少卿又以功敘為侍講學士俱馳傳往南京三人皆上所簡擢也惟學士清華之秩非他官可比職在典詞命論思獻替朝夕侍上左右於功敘固宜矣然南京翰林久未置學士以屬官權署位卑望輕人皆易視之上所以特命功敘輟經帷之講授學士之職以為詞林之重也其任豈不專於他官乎功敘行端而學邃文章之作典則宏奧足以鳴國家之盛南京縉紳大夫莫不以為具瞻而知學士之重如是哉永樂初豫以選入翰林與今吏部尚書王公行儉同官至學士同拜侍郎同功敘侍經幄而豫以迂疏不能與時俯仰為人所嫉忌出理部政禮文事煩勞勤朝夕安得如功敘受恩命之榮為詞垣之長乎既深有所歎羡而又竊思之功敘之尊先大夫𡵨鳳先生明經博古自邑校官纍升慱士紀善終職方員外先生教士有師範諫王有針戒為職方多有所建明聲望卓然功敘之學得於家訓而官至學士焉蓋善繼先生之志也豫辱交於先生與功敘遊非一日其行也不可無言而行人司正尹昌待詔鄒循徴能言者賦詩為贈屬豫為序知功敘莫豫若也遂書以為諸作之引東里續集序李時勉少師兵部尚書兼華蓋殿大學士東里楊先生未仕時遊湖湘與楚府教授吳由翁為莫逆交􅒘翁鄉前輩嘗為豫言先生慱學而育智端敏而寬厚識達事體不矜巳傲物為文章獨追古作者後來當必鳴世而其才德可大任豫聞而識之其後往往得先生文讀之愈深企慕欲一相見不可得及忝進士被選入翰林而先生巳居禁近參掌機務尋常少得見獨一見歡如平生其所以教愛之意甚厚出入翰林三十餘年見先生言語動靜與其所行事公平廣大寬和而有則其心專在於國家未嘗有一毫私已圖至於臨大政決大疑衆皆爭論紛紜先生獨無言久之徐為一言衆莫不懾服至有輿論不一須上聞者既以聞卒從先生言其在上前遇事盡言不計利害每辨論人賢否及解釋人過失一出於公不以恩讎為重輕取舍至於獻可替否有旋乾轉坤之力然未嘗與人言韓子云入以告其君出不使人知者大臣宰相之事於先生見之先生以其餘力發為文辭渾涵溫潤謹嚴而淨密如精金粹玉自足以見重於世夫文章之見重於世以其人也苟非其人雖美而傳反以為病矣楊雄柳子厚王安石文非不美也人或因是而訾之由其所行悖焉耳董仲舒諸葛孔明陸贄范希文之流讀其書思其人恨不生其時聽其論議以求其益則其文章之存與日月爭光可也誰得而議焉先生之志行固無異乎四君者而仕宦四十餘年歷事四朝其功在國家德在生民所謂先天下之憂而憂後天下之樂而樂者庶乎其無所愧焉其文章之足以垂世而傳遠者豈偶然之故哉先生病在床以其續文藁授豫曰其為我序之以付孺子藏於家豫文未成而先生沒嗚呼先生其可死也耶國家柱石後進儀刑一日不見其感念之情慟悼之意豈獨豫一人哉思其遊處思其笑語聲音容貌宛然在目其何能以序其文也耶然先生治命不可違遂抆淚而序之如此先生字士竒東里其别號也贈陜西按察使王君千之赴官序錢習禮朝廷簡賢以任官固皆欲宣昭化理惠安黎元以成天下之治然內外百司各專職守不敢出位遂其志而達其所欲為惟在內各道監察御史在外諸按察司任天子耳目之寄事無巨細知之得以言之言之得以行之而無出位之嫌故士君子效用於世者多樂居其位而行其志焉束鹿王君千之以四川道監察御史用大臣薦特授陜西按察使命下之明日屬丁家艱懇求去官以居喪不賜允許俾歸襄大事以至京出璽書而諭遣之一時僚友相與要言以為贈蓋君自少有美材刻志務學挾其文朋試於主司聲動場屋占名居群士之右及對制䇿褎然高第同升之士多以為莫能及超拜御史沈毅淸苦雖貴勢不敢撓之以私理民之訟簡蔽閲實悉其聰明致其忠愛未嘗倚法以求情增詞以成罪郵罰皆麗于事號稱明允是君決科為名進士居官為材御史固宜出入禁闥侍近廷陛謇謇諤諤揚憲軌警官邪為邦國司直之臣夫何一旦輟文右之班膺臬司之寄而出補外任哉蓋陜西壤地闊大政務浩煩而牒訴填委非竒材偉器聞望夙著者不足以表正諸司而震肅一方君其往踐是任豫知風采揚厲威聲赫然郡縣邊鄙之吏民蕃夷聚落之少長莫不歡然以歆羡帖然而懾服相與稱臺憲激揚以舉其職國家任使之得其人斯無負皇上委寄之德意而公卿大臣實以是而屬望於君矣因贈以序而致其勉焉贈太學生石大用詩序陳敬宗太學生石大用薊州豐順縣人自邑庠登太學有年處六館諸生間恂恂謹飭惟強力植志務學不少自衒故自祭酒司業以下皆不甚知其為人正統甲子夏祭酒李先生坐困首木於大學三日不解炎暑蒸鬱先生耄昏不能勝大用蹙然號於衆曰師猶父也父師罹難而弟子奚忍坐視大用察衆志不與己合乃退去閉户疏奏懇請自代先生亟遣人止之弗聽同輩亦沮之大用奮然作色言朋友急難詩歌􅜇鴒况師乎亦弗聽竟挾所奏走謁銀臺銀臺難之且懼之以法大用曰生以義死亦以義何懼之有銀臺知其不可抑遏遂以其請聞于上蒙並釋之於是在廷文武縉紳莫不嘆息曰此前代之所僅有而近世之所絶無者也爭欲求識其靣豫聞唐德宗貞元十四年國子司業陽城坐送薛約貶道州刺史太學生何蕃季償王魯卿李讜等二百人頓首闕下請留城守闕數日為吏遮抑不得上蕃等皆涕泣餞送立石紀德集賢正字柳宗元致書蕃等賀之以為昔李膺嵇康時太學諸生叩闕執訴㒒謂訖千百年不可復見乃在今日今大用卓卓如此豫亦謂自蕃後訖千年不可復見乃在今日也以蕃等伏闕數日卒不得通與大用誠意悃愊能感動天聽排釋難困於時刻之頃則其賢似有過古之人也夫師固不與於五倫而五倫弗得弗明故於三事之道均焉凡天下之為師為弟子莫不知有是道也而謂訖千百年不可復見者蓋以師之為教無實德弟子之為學無實心上下名分依稀典故而巳而於三事之道視之為虛器焉固無怪其不可復見也先生秉仁迪義凡所以施教於太學無非實德大學生恆三千人而陶鑄醇懿涵煦粹美者甚衆大用至是發其所積奮勇不顧利害惟義是蹈此固出於大用之素稟然亦先生訓迪漸漬之極致然也先生之於陽公大用之於蕃等皆可無愧而凡天下之為師弟子者豈不亦有聞風而興起者哉是歲大用以書經顯擢京闈鄉試高等説者咸以為積善理或然矣是用播諸歌詠以為後世名教勸詩曰有偉石生義激于衷陳厥悃愊徹聽宸聰帝曰釋茲復厥章服用顯名教維新化育簪纓貂璫爰及儒紳合詞贊頌卓哉斯人棫朴菁莪多士攸同翹楚錯薪頴脫奏功惟初倡議衆且望望爰播頌聲能弗泚顙三事道均云胡弗尊兹焉弗篤慚負聖門師道岌圯延平植之陶煦醇懿明效在兹左右高徒前後國士衆人之中大用崛起山有巨材群木蔽之貢珍明堂公輸忸怩天佑善類靡德弗報顯擢高科斯文有耀昌黎紀傳集賢致書我作詩歌永揚令譽送許太守還任河間序曾鶴齡士於宦途早歷艱關險阻而後底于平夷者其智慮益明其事體益熟其於建勳立業易得致也臨邑許君彥剛永樂間擢禮科給事中巳而調兵工二科最後又升户科左給事中宣德五年𬒳舉出為太平太守積二歲丁艱還服闋復授守河間今年春則自河間而來考績書最得命還任工部主事趙與君同鄉合所知求文贈行惟贈者增益之義也計君仕宦所歷靡所不習練尚奚贈為雖然豫嘗知君不能為君默也方太宗臨御時朝廷紀綱法度樞機範圍悉目六科出納甚嚴且密毫髮不敢有違違則譴咎立至矣君歷諸科積十有餘年恪動自守未嘗以措其身於有過之地及往太平官則高矣美矣而其地在蠻鄉瘴土山水險惡氣候不時南士習居猶可北方往者十往九不得還其夷風又殊未易化服君獨更兩寒暑休休然得其民夷心而後來還於戲此非天俾君老練其才而用之於今日耶河間在畿內去京師不遠風土既善民俗亦號易理苟有能者施以其政鮮不翕然稱治而况君乎况君為之巳有勞效乎或者曰豐年則易治歉歲則難為所在皆然也許君今還河間雖善理如嚮者水何噫是豈知言者哉昔堯有九年之水其臣勤而撫之奏庶艱食者禹暨稷也天下卒大治以今君之河間雖昔人可庶幾焉何勳業之不可身致哉君去豫見君能拯民之溺而置之祍席之上矣送四川按察使陳公之所治序林志十年春豫會試禮部時東莞陳公以知滁陽軍兼楊州府太守入為同考官豫忝厠名多士之列因獲拜焉而識公知楊與滁治行第一有詔增秩賜金及振鐸桂林升教國子生文章德行之大槩體用蓋彬彬然比承乏詞垣載筆兩京往來道路間公在滁察登耗以均徭役剔姦蠧以扶善淑明學校緩刑罰大者數事而滁人借留愛敬若父母未嘗不歎曰真儒治效固當爾耶歲在癸卯猥承上命司文衡京闈則公適考滿來京登剡幣聘相與同寅校文圍棘聮房語次欵洽則知其純正之學精明之識正大簡易之守穆如淸風盎如醇醪炙之者宜隨深淺而皆鬯况如豫素懷景仰之私哉今年春公以三最登銓升為四川按察使朝列曰公忠信人也宅心平易廓無畦畛不以喜怒為好惡其與人色無假借失牧守徑情以行而惠愛在中然則以任風紀豈必皎皎諤諤方稱所以激揚者乎政宜以治滁者推而行之耳豫聞麟儀儀鳳師師未嘗鷙獰是尚也而飛者走者莫不為之先後蓋士有德威明德而其畏明之效特異豈非公有焉方今升平日久吏稱其職民樂其業朝廷近遣巡撫之使風厲海宇而旌别淑慝玉石巳粲如爾然則司一道風紀得賢憲使如公以振翕之者四川之人抑何幸哉公至是行從事之舊咸來徴文豫荷識公之陳而喜其大用也故為敘之送職方郎中王君赴任序金實守令之譽出於私愛狎眤者固不足信見於賢士大夫之稱許宜若可信矣然君子好揚人之善而諱稱人之惡故猶有不足徴者然則如之何而可亦惟閭閻之細民田野之鄙夫窮鄉蔀屋之婦人小子心不留毁譽言不知觸諱感悅而歸之斯可信矣此古之觀風者所以採民謠而識循吏知教化用是道也豫友王韋菴永樂中為深澤令在縣且二十餘年示民以教化字之如子婚配其男女長養以其子民實愛戴之如父母嘗坐擅發官廩賑民逮於理得輸役以贖民驅牛車二百輛代之役彌月而竟迎令還治歌舞填道又嘗遘疾幾危民倣徨奔走以香燃膞禱于神謁醫救療之無不至疾間則刲羊豕巷歌醉飽以自慶其得民若此類者不可殫紀去縣之日民托其善政為歌謡言雖不能成章而意以獨至後為東朝官營居室於長安西門其民有不逺數百里操畚鍤負磚瓦來趨其事者數十人不浹旬而成此豫所目見者也及出為松江同知首奏免逋租數十萬理冤獄活無辜民以千數劬力於民隱如居深澤時細民恱而歸之亦如深澤之民每由公事至旁郡求直者纍纍然相屬於道至擁其舟不得行豫適與君邂逅於檇李又嘗目見之若是以觀君之所為其得譽於人非惟不出於私愛狎眤者之口而見稱於賢士大夫之文章亦非過情矣直不知視古之循吏又何如邪內艱服除來朝京師大司馬王公素知其賢言於上以為職方郎中我國家太平六七十年內外軍政雖有成法然歷年既久消長不齊中間牽合填輔寧無蔽欺紛紏之弊皇上所以究心於此分遣大臣循行四方清理之正欲辨別其是非真偽以為取舍庶使軍之部伍有稽而民之版圖不亂其法甚良而密而職方實蒞其事三二年間枉抑赴訴者聽聽於司馬門經時閲歲有不得命而不免於飢凍死亡者矣今大司馬既委君以此任君當為知巳者用則將忘巳之利害以別白其是非使枉者直抑者申無告者依依有所賴亦如深澤松江之民則君之才之德為大臣之所薦聞為天子之所舉用可無負矣豈不毅然大丈夫哉愼毋致人曰功名不及於居守令時則甚不可也太學生陳瓛君之姻友也以郡人之意來徴言豫辱與君有僚宷之好故因瓛之請而致忠告焉君名源字啓澤漳之龍巖人登甲申進士第慱學善屬文韋菴其別號云送徐拱辰膺薦上京師序子使􅃮雕開仕對曰吾斯之未能信子説子路使子羔為費宯子曰賊夫人之子夫開不肯自信其巳能而聖人説之子路強人所未能而聖人惡之聖人之欲人務實也如此哉且學古入官古之道也既學矣尚不肯仕况不學乎為政之道布在方䇿有小大緩急之序有施為節目之詳體段具在章章可考必讀而後知講而後明其造詣也真其存養也熟事物之來隨而應之無雞事矣不學之人既不窮理何由應事譬之操舟者無楫雖有技力且無所施其克有濟乎而世復有讀書數千百卷操觚吐詞出入經史頃刻萬言而不知止及分職授事牽制掣肘無一字可用鄙夫俗吏從事筐笈簿書者得資是以籍口曰是儒者也是讀書能文章者也噫世謂儒者大言無實莫適於用正坐此等輩爾豈聖人所謂有用之儒哉徐君拱辰質美嗜學為文章務明理以達於用議論識見度越人意表確乎有用之才也家貧以經術教授鄉里取給養母淡然無仕進心朝廷下詔求賢當路者以聞拱辰不知也逮部符下拱辰蹙然曰讀書求道茫然如捕風自治且未能何以治人是舉非知我者直癘我爾或曰有位者似君苦不多見君言復爾他人若之何哉適丁內艱未果行甫服闋促檄三四至乃行行之日邑庠士友素善拱辰以豫處其師友間來徴言豫謂拱辰懷可仕之才而志如􅃮雕開之未信負多學之美而慮有子羔之失讀聖人書若是可謂能務實矣是行也人民社稷之寄近在朝夕方將展布四能以行其有用之學斷不為大言無實之儒牽制掣肘以貽鄙夫俗吏之訾詆也較然白矣送致仕訓導彭先生序周敘聖天子嗣登寶位𥘉廬陵北山彭大雅先生以布衣詣闕上書陳八事幾萬言一皆本諸堯舜之道越十有一年又以所著兩京賦進極鋪張混一之盛申創業守成之規上嘉之特賜冠帶俾為致仕訓導歸老于家并給寶楮以行於戲朝廷優老尚賢之心與先生之所謂遭逢可謂盛矣先生兩至京師人多阻之今之來也其家庭骨肉尤不欲而先生浩然之志益壯嘗過豫白其故豫曰先生年已七十不遠六千餘里跋涉風濤之險以來無他求也若堅阻之其抑鬱之心曷由紓乎况聖明在上崇文弘化先生殆將有遇也茲蒙恩異縉紳士大夫莫不為之喜余則序以送之曰惟彭氏吾廬陵大家唐宋逮今代有聞人先生平生服勤道義孝親有終身之慕教子篤詩書之訓交友朋待姻戚極往還始終之誠慱學強記為文章粲然衮衮不竭中歲遭家多難遂不及仕而其愛君忠國之念雖居山林如在朝市故既老猶惓惓而不厭也則夫今日官賞之榮豈偶然之故哉古者士大夫依致恆處閭孰以為子弟師聖諭所云得不欲褒寵之俾作鄉里之範哉雖然余尤為之幸者令子承方􅈾薦登仕途盡報稱之心所以為先生之榮者將不止北也先生歸乎哉北山之靈免夫移文矣贈吳先生還家序李賢道在天下無物不有無時不然必有聖賢者出乃能明而行之苟無聖賢道固自若也為聖賢者豈有他哉能不􅍝於是道而巳若夫衆人則聽其自􅍝不著不察惟學者能知斯道之倣佛然擇之弗精執之弗固失之多而得之寡所謂獲十一於千百者也豈惟後世為然雖聖門髙第顔曾之外未見復有純者寥寥千載逮宋之興有周程張朱者出焉於斯道也始能大明而允蹈之然聖賢之生世不常有殆無異於祥麟威鳳之稀蹤也今去數賢又若是其久矣間有一二豪傑之士頗欲振作其間然於斯道之全體終有憾焉嗚呼艱哉若崇仁吳與弼先生蓋有志於斯道者也豫承乏吏部時凡有自撫來者必詢先生之動履造詣何如卒亦未有知其詳者嘗致書以伸景慕之私既而纍年訖無消息意其引避者宜然不復計念後有出於其門及遊宦其地者交章論薦竟深造自得之樂願留以自輔而不可得也告別之際逰其門者乞豫言以贈嗟夫豫言烏足以軒輊先生哉健羡之餘有不能巳焉耳是為序世德堂序義惠劉侯繼祖之孫祠祭署祀丞雄者持世德堂卷謁豫曰雄之婦翁兵部尚書兼翰林學士苗先生也先生致仕家居題四言詩一章於卷以惠雄有勉承世德之句故摘以名堂欲常目在之以景前人之德而自勉也惟大君子賜之一言豫聞義惠侯世居鳳陽昔太祖高皇帝微時侯以鄉曲之舊嘗助其不給已而復與善地葬帝之考妣則今皇陵是也帝得天下之後念侯之恩侯巳亡矣特贈為義惠侯賜侯夫妻誥命具道其事復官其子以報之蓋劉氏世德自侯始侯之子英為祠祭署丞孫鏞繼之曾孫謹復繼為奉祀京復繼為祀丞率皆淳雅端謹樂善循理而世德不替焉今雖繼為祀丞乃以世德名堂可謂有其實矣雖然侯之濟人其諸異乎人之濟人者與人之濟人所濟者不過尋常之流耳尚獲顯報于身于子孫若侯之所濟者非常之人當時賴侯之濟不至窘迫一旦出而治世天下之民咸𬒳其澤君子推本未有不大侯之功德者故曰侯之濟人其諸異乎人之濟人也然則侯有功德於國家如此所以慶流後裔一門五世咸修其德簮組相承嫓美于時豈偶然哉吾知劉氏之澤未艾也詩云子子孫孫勿替引之其劉氏之謂歟送大參程君赴任山東序簫鎡給事中黃門職也方今禁近之最清且要者莫踰焉蓋非獨封駁章疏而巳政治之利病生民之休戚天下國家之大計至若人材之進退錢穀之出入刑名軍務之便不便皆得以條陳之或有大姦慝則相率論列于廷聖天子往往虛心聽納而當時仕于朝者亦皆知其為公論所在莫不望而泯其非僻之心其為清且要蓋如此也豫不皆相接獨素所厚者二人焉其一崑山葉君盛其一休寧程君信也程君長吏科葉君長兵科二君皆磊落奇偉有所見未嘗不言有所言未嘗不盡必求稱其職而後巳一時士論多歸之頃豫教國子國子散地也豫又寡交際在朝雖異時常所往來者非有事不至二君乃數辱過豫豫於是不獨歎二君之盡職且高二君之義以謂不可得也至是皆以薦有參政之命程君得山東葉君得山西豫方資二君以自慰而二君遽棄豫去心甚惜之而或者過豫為非是以謂方今明天子宵旰求賢以充庶位尤以方靣為重二君皆簡在帝心者今日之命所謂選擇而使之者也夫山東西京師股肱郡也而二君所理皆邊備誠國家之所急二君既平日切切以為言其得不一動其心為上理之邪致功業之隆膺廟堂之擢端在茲行也子奚遽戚戚其去哉豫有愧乎其言蓋豫所惜者私情也或者之云公義也不敢以私情妨公義故於程君行諸同寅請文為贈因不辭而次第其所聞者以覆之會試録序薛瑄今皇上膺天命光復寶祚紀元之春適當會試之期天下士領薦書而至者蓋三千餘人禮部左侍郎臣幹等以考試官請上命臣瑄臣原往蒞其事同考官臣溥臣賢臣泰臣正臣佖臣恂臣世資臣節臣淳臣鏞監試御史臣烈臣鑬暨百執事罔不夙夜袛承凡三試得文之中程式者若干名并擇其文之尢粹者彚而成録臣切惟為治莫先於得賢養士必本於正學而正學者復其固有之性而巳性復則明體適用大而負經濟之任細而釐百司之務焉往而不得其當哉故三代小大之學養士之法皆以復性為本其得賢致治之效蓋可考矣漢唐以來正學緒微養士不本於復性往往溺於雜學術數記誦詞章之習體有不明用有不周雖或有傑出之才亦不過隨所學以就功名而巳其視三代之賢才為何如哉至宋道學諸君子出其論養士之法始皆本於復性雖其説不得盡行於當時而實有待於盛世洪惟天眷皇明列聖相繼太建學校愼選師儒其養士之法必以三代孔孟程朱復性之説為本是以九十餘年薄海內外文教隆洽士習粹然一出於天理民彛之正而雜學術數記誦詞章之習剗刮消磨無復前季之陋雖曰科目以文章取士然必根於義理能發明性之體用者始預選列類非詞章無本者之可擬也故其得賢致治之效足以追隆前古今諸士子荷朝廷正學教養之恩既以有本之文得在選列行見對於大廷益當以明體適用自勵隨所器使以忠乎國以愛乎民以贊助皇明重熙纍洽之治於無窮俾正學得賢之效有光於前有垂於後顧不偉歟文山詩史序劉定之豫少時得宋丞相信國文公指南集讀之然聞公在幽囚中有集杜句詩未見也及官詞林始見而録得之詩皆古體五言四句凡二百首分為四卷首述其國次述其身次述其友次述其家而終以寫本心嘆世道者莫如何於人勝天夷猾夏而有待於天勝人夏變夷之必有日也卷目皆公所自分其先公而後私盡已以聽天於此亦可以見而俗本或混之今皆為復其初集首有總序又有小序散于章首其後又有跋尾序跋中有缺文者指元之君臣宋之叛逆缺而不書使知者以意屬讀今皆補之而為曰字者不沒公初意也不書紀年者陶靖節削永初之意也姓某履善甫者指南集中所謂范睢變張祿越蠡改陶朱之意也而其事之難有甚於指南之時焉者矣小序之末多曰哀哉者公所以傷其國之亡憫其忠臣義士之同盡慟其家族之殉國而自處其身於死豈待南向再拜引頸受刃之際而後有決志哉嗚呼孔子不以仁許人而獨以許殷之三臣孤竹之二子余以為若公者文山之隱京口之脫去而不汙矣伯顔拘於江艦弘範縶於海舟世祖維於燕獄囚而不屈矣仰藥於庚嶺絶粒於鄉郡已而殞首於燕市死而不悔矣兼微箕比干之心而為心者其在公乎若乃是詩之作而豈徒哉麥秀黍離之歌作於其國已亡之後而其身可以不死也懷沙抱石之辭作於其身臨絶之際而其國猶未至於亡也身且死矣國巳亡矣於是乎有首陽采薇之歌燕獄集杜之作所謂求仁得仁而奚怨者也合伯夷叔齊之言而為言者其不在是詩乎以是心也為是詩也公其可謂仁矣仁者天地之元氣古今之人極其在上為日月之明風霆之壯其在下為江河之所以長流山嶽之所以常鎮其混然在中為君臣民物之所賴以長治久安而在宋之未世為公之本心在公之死也為是詩有讀而不衋傷者余以為非仁人也公同時有曰吳郡張子善者亦嘗集杜句述公始終大槩而疏其事于下方以證之今內相安成彭公純道得其本以示豫遂録以附公詩之後合而題之曰文山詩史取公序中語也公之宗孫廷珮欲鋟梓以廣其傳乃序以歸之廷珮又嘗承其父志修祠堂以祀公可謂賢後裔云省菴集序錢溥中山劉禹錫曰八音與政通塞文章與時髙下旨哉斯言蓋即孟氏所謂誦其詩讀其書不知其人可乎又論其世之意也夫言之精者為文而文成音者詩也苟詩書工矣而行不副設錦覆阱而已爾豈有德之言乎行或副矣而立言無補於政教輪轅飾而弗庸而巳爾豈用世之材乎故論人必論其當世行事之迹則政之通塞時之高下見矣然則君子不可巳於言而亦不可易其言也如是夫廣信郡守山陽金君宗潤少負材雋即肆力於古學為士林所推重既長歌鹿鳴入太學取四方豪傑士而友之益大有造詣知蘄州預修史于內閣又得天下諸儒碩讐校之而氣益充材益贍焉升守廣信豫使交南過其境見其田野闢風雨時旄倪熙熙然而樂得其所問之則曰有賢守也然金君亦以豫同史事之雅出郊遠迓至其館亟持所輯詩文若干卷以其所自號名之曰省菴集者乞豫評之其詩沖和簡亮詞工而體備文則務陳言是去而雄偉整肅成一家言噫觀其言雖越百世尚可知其政况今目擊而親見哉雖然此特施于一郡之治而己其處將愈極則言愈高而政愈達使人仰慕觀感於千百載之上蓋不待論其世而知其人矣故序送曹尚書復任序劉儼士夫貴涵養者涵養之久則德性堅定知慮精純言行操履正大篤實出而居大位任大事豈惟不動心哉且有執而不變也今之涵養於官莫如翰林優遊文翰之埸沉酣詩書之府所聞者聖賢之言所習者聖賢之行於凡錢穀簿書之事機械變詐之巧一無所動於中而其養純矣故前後自翰林出者率非尋常可及冡宰六卿之長而百司庶府所由銓衡者也位之尊任之重莫加焉而今南北兩京凡三人皆出翰林泰和王公自翰林學士句容曹公自翰林編修鹽山王公自翰林庶吉士三公者皆表然以德行文章政事為大臣稱首時與共事者數人多以故謝事去而三公獨巋然信乎當大任能不動心而有執不變者也或曰曹公在天官最久於銓衡事最習且善掌部事于南京似若未究其用者豫曰官莫難於獨任事莫難於獨斷今南京事必決而後驛聞非曹公之賢且能而又習也欲定可否而決於一人吾恐事成於下而人弗服事聞於上而君弗孚其何以膺銓衡之重而成兩京之治哉且古之大臣所以成贊襄之功為德為民耳為民者貴乎達其情也公家句容去南京才數舍故老舊交相接而詢焉因以得利病而興革之不猶愈於上下之情邈然不相通乎然則今之獨用於南京者乃所以為他日大用之地也公以三載考績朝京師復任侍御諸公為求言豫因慨涵養同於公而其材其用若相懸焉故特頌公之美亦以自咎云送程御史歸省詩序正己以正人凡有位于列皆然也况以一身綱紀乎百司振肅乎郡縣而又係乎人材風化之本原而可不帥之以正乎彼以鷙猛擊搏為威使人心膽戰掉不敢一出言一舉足為非妄事而曰我能正乎人吾恐其特一時畏威強服之耳退將聚而咻之其故習自若也謂之能正人可乎孔子曰其身正不令而行其身不正雖令不從蓋謂是爾監察御史寧國程公嘗奉命提督北京畿內學校之政曰以風憲督學政威克愛則人不親愛克威則人易狎其可以化導之者身先之耳於是端表儀以帥之推所得以教之嚴條約以整齊之有不率者然後刑以威之未幾化服翕然且尤以教之興廢係師儒之賢否又旁求儒碩以補訓導之缺由是學政大修人材輩出天下督學政者公為稱首一日朝廷詔大臣議勸賞而或徇私者公曰御史豈直督學政哉天下事知無不言今若此使緘默以容如廢公議何乃連章核其人皆伏罪權貴為斂手昔人謂臺憲生風蓋自是始一見也時論快而難之及是九載考最吏部例當升公曰吾之所以教人率人者忠與孝也祖宗墳墓在寧國不拜祭者已數十年今不歸祭掃遂使得大官如虧於孝何乃兩上章始得請以行時論益快而難之嗟夫學校所以成人之善而能使人化於善抗章所以論人之過而能使人受以為過是非正己者不能也至其奏績當升官在他人將汲汲欲得之有不得則乞哀昏夜遲留數年不一歸其鄉而公獨超然去彼取此是又見其養之素純守之素定孰輕孰重灼見於心胸凡正己以正人者一自其中發之而非徇外為人者之比若程公者其殆楊雄氏所謂大器者歟豫與公交最故知最深故於其行也既合公素所遊者十人分韻賦詩贈之且述公言與行之有足為世重者為之序云素王紀事序商輅素王紀事一帙首世系次小像又次降誕之祥生質之異又次之歷代封諡而備録制誥之文古今廟祀而詳具禮樂之數與夫群賢配從年譜履歷闕里山川靡不悉載而以紫陽楊奐所述東逰記終焉宣聖出處大略見於此書蓋開封太守西蜀黃璿公瑾之所輯録嚴郡通守太原傅汝楫之所校正者也汝楫將鋟梓以傳屬豫為序竊惟天生夫子使之繼往聖而開來學其道備於學庸語孟之四書其功著於易書詩禮樂春秋之六經是蓋學者之所共知若乃當時出處之詳後來追崇之盛散見於傳記與時王之載籍學者或有所未知此紀事之所為有便於觀覽也歟學者先求之是書知夫子之為夫子又進而求之四書六經而知夫子之所以為夫子則庶幾無愧於為夫子之徒不然是猶終日戴天而不知天之高履地而不知地之厚其不為妄庸之歸也幾希矣豫不敏僣序此以為同志之士最幸相與勉之劉忠愍公文集序彭時自昔學聖賢之學者先道德而後文辭蓋文辭藝也道德實也篤其實而藝者書之必有以輔世明教然後為為文之至實不足而工於言言雖工非至文也彼無其實而強言者竊竊然以靡麗為能以艱澀怪僻為右務悅人之耳目而無一言幾乎道是不惟無輔於世且有害焉奚足以為文哉以是觀之其文傳不傳槩可見矣吾安成贈翰林學士諡忠愍劉公諱球字求樂世為簪纓望族自少力學博極羣書存心制行率由正道以春秋舉永樂辛丑進士拜儀曹主事居官廉勤積學不怠遂膺薦入侍英皇經筵預修宣廟實録書成進翰林侍講其在翰林雖以文學為職而忠君愛國憫民憂世之志尤惓惓焉嘗疏十事規切時政忤權姦下獄直詞徑氣之死不屈天下聞而壯之不踰數年言益驗事益彰聞朝廷嘉其忠乃有贈諡祠祀之典此公始終之槩也迹公平生志於道德者乎而于修辭亦苦心極力期與古之工文者並蓋無所不用其誠者也觀其應世之文有典有則粹然一出乎正皆足以扶世道而重名教謂非有德之言可乎其視古人豈多讓哉公沒後二十有八年其子廣東參政鉞浙江副使釪相與類集公文鋟梓以傳屬時序之時於公為後進鄙言何足以重公然公亦何待豫言以為重惟公文步趨聖賢之途根本道德之實嚴整雅潔無一浮靡怪誕語若此者自足以取重於世加之死于忠諫其精神耿耿乎天地間凌厲山嶽蕩摩日月與寒暑俱運而無窮其所以增重斯文者有在人將視為商敦周鼎而寶重之雖微豫言可必傳于世無疑也魯穆叔論死而不朽先立德次立言於戲公之不朽其在是矣况有二肖子益克振勵功名為之後哉二子俱第進士入翰林為庶吉士纍轉至今職名位方進而未巳皆有光於家學者也因其請辭不獲命敬書此于篇端庶觀者有考焉蒲山牧唱集序彭時蒲山牧唱者蒲圻魏公自名其詩集之辭也公名觀字杞山號梅初生丁元衰晦迹蒲圻山中吟詠以自樂入國朝仕且顯矣猶不忘隱居時事故自名其詩以牧唱而繫之蒲山云曾孫銘將刻諸梓屬豫序豫聞人生感於物而後有言言之成文而有音節者為詩詩足以宣人情之欣戚體物理之隱微極古今事變之得失而格有高下詞有淸新古雅富麗平淡之殊皆係乎其人之所養與所學何如也學博而養正詩有不工者哉吾聞公之隱蒲山也遭世艱虞不忘講習其學博通五經諸史以元季非可仕之時故不仕我太祖高皇帝下武昌聞其名而聘之既至授平江州學正纍遷至翰林侍讀學士侍皇太子及秦晉楚諸王授經遷國子祭酒與詹公同宋公濂俱乞歸既行復召還上親御奉天門賜宴倡和以為樂後奉命治蘇州豪民之不法者陷於誣以死既而上悟抵誣者罪復以禮遣柩歸葬武昌特賜諭祭諸王亦致祭焉觀上之所以寵待隆厚終始而不替則其賢槩可知巳况能進退以禮不以富貴利達繫其心非素有涵養其能然邪夫所養所學如此故其發於詩也用事工體物切意思深婉而格調高古足以儷盛唐而追風雅至於應制諸作壯麗和平尤足以嗚國家之盛其可必傳於世無疑矣矧有賢孫曾為之惓惓表章如銘者邪銘家學有傳初任户部主事坐纍乃外輔楊州府通判以廉謹稱其顯揚先德將有在於詩集之外者因併書于篇首以為之徴云奉使安南詩序葉盛天順五年安南國王黎濬為其庶兄琮所弒既而濬弟灝與國人共殺琮以聞明年上特命翰林侍讀學士錢公禮科給事中大梁王君充正副使往册灝嗣為安南國王使命在行道出二廣二廣之士大夫作奉使安南詩卷贈其行請為之序夫安南古交趾南夷地也我太宗文皇帝以義取之宣宗章皇帝以仁豫之義立而威以行仁敷而德以洽所謂前聖後聖同一揆也比年安南壤地連二廣者聞有諽訐之風文移紛擾相屬不絶近數年恭謹自將往事不一敢萌動國人有攘珠合浦上降旨詔責之即首伏請罪蓋列聖相承仁漸義摩之久化成之效理勢則然况重以皇上神謨廟算馭夷柔遠之得其道邪乃者廣寇作孽上遣將臣佩征夷將軍印視師平寇而文告之辭旁達邉上聞安南使人偵諸境得印文歸轉相流訛以為王師將有事于彼舉國震疊踰月而始定蓋印即文皇弔伐時物故耳噫安南誠畏威矣而豈皇上光昭先烈一視同仁之意哉今錢公以文學位望當妙選主君以侍從之良副是行吾知海濵酋長當恩命之自天其將以昔者畏威之憂移而為今日懷德之喜奔走俯伏聽受命令使事之有成也必矣於是既書此為序復為四言一首用申告之其辭曰維帝之仁興絶繼世禁亂誅暴斯帝之義維義所加仁則在是嗟爾南人勿怠勿忘勿為玁狁勿為鬼方爾惟虞苪暨爾越裳使車闐闐恩言是宣交人感慰抃舞而前專對之餘為我謝焉大學要略序洪寬大學要略一書元魯齋許先生直説以教人也夫天生蒸民固莫不付之以性而弗能使之皆有以知其所固有而全之固不能無待於教也古之聖人若伏羲神農黃帝堯舜禹湯文武首出庶物作之君師於是人生八歲而教之以小學之方十五而教之以大學之要而大學小學之教蓋巳立矣逮吾夫子之聖繼群聖之統以教詔於天下而人有所啓迪以復厥初則大學小學之教又彌著矣曾子述之作為傳義以發其趣朱子因之集為章句以釋其意由是大學所以教人之法彰彰明甚無以加焉學者由章句而遡其傳義由傳義以明夫聖經若披雲霧而覩靑天翦荆棘而循大路坦然由之而造乎大道之要蓋有不知其然而然者矣爰及胡元聖道淪湮魯齋先生居司成之重任尋道學之墜緒歷覽聖經旁通傳注撮其大要不工文詞直説大學教人之方以開示後之學者其言約而達微而臧雖庸人孺子皆有以知這便是明明德新民之説這便是止於至善之謂這便是格致誠正之方這便是修齊治平之理然後古者大學教人之道聖經賢傳之旨莫不煥然融會洞然昭灼夫豈復有餘藴哉是書也傳之雖久而未盛行逮我皇明文教誕興河南憲臣臨海陳先生奉勑提督學校停驂之初首搜儒書得其故本乃沉濳考訂更互演繹輔其闕略發其微義每歷一所輒召校官集諸生立館下出以示之日令講誦親加訓迪凡環􅓺宮而觀聽者亦無不釋然有悟於心充然自得其理寬叨領郡寄學校所當先也於是謀於同寅桐江聞孟剛京口陶茂各捐俸鋟梓以廣其傳嗚呼聖人之道著於經猶化工之妙著於物雖曰簡易易知然非魯齋直説以教人則微詞奧義孰有以得其理而復其性者哉若是篇者不惟有輔於化民成俗之意而實有功於聖門也大矣寬於是忘其固陋敘其嵗月於刋
