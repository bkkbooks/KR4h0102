front:
  text: 皇明文衡卷之三
  hash: sha256:b57410a43ce2bf1c828e983cd64c9865cfbc53f978179adb9a1234f6333e04fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_003-1a}
body:
  text: 騷思􅍇人辭宋濂吾鄕吕成公實接中原文獻之傳公殁始餘百年而其學殆絶濂竊病之然公之所學弗畔於孔子之道者也欲學孔子當必自公始此生乎公之鄕者所宜深省也嗟夫公骨雖朽公所著之書猶存古之君子有曠百世而相感者况與公相去又如此之甚近乎聞而知之蓋必有其人矣托物引類作思􅍇人辭辭曰惟􅍇人之愔嫕兮賦姱質於自然脩蛾規而凝黛兮曼目轉以成􅗻妥鬒髪而如雲兮靨輔巧以承權纎腰秀頸若鮮卑兮容都曼面體便姢寳璐縈而右繞兮袿徽嫷以半偏懸明月以綴佩兮錯木難而傅冠向瑶臺而㣲歩兮意瞻靜以貞閒宓妃之倫折芳馨以相遺兮復溶與乎江干勢翩翩其褰舉兮若㳺龍之在淵胡人間不可以乆留兮遂凌厲乎高寒馮道紀以爲御兮鍊天和而爲飱徑駈馭於陽隂兮時上下乎星辰款予生之何晚兮不一覿於芳儀念姱嫭之鮮雙兮遡廻飈而曾思欿愁悴而委惰兮氣涫以如炊道苟可以遻之兮視萬里猶門墀登嶇嶔而騁望兮正晨旭之蒼凉氛曀豁而闓朗兮莾山川之縱横樹輪盤糾而柴􅫧兮薠艸藿靡以相望豐狐思羣而永嗥兮文鷮慕類以徐翔企精爽之不徠兮空雲龍之將將蹇侘傺而望絶兮燿靈䀜其西蔵降崇丘而臨曠野兮循故轍以東歸向䦨楯而徙倚兮境外嬰而愁内滋新蟾皎以出天兮想纎美之曲眉繁星爛而成文兮懐繡帔之陸離蒼灝霩落而無滓兮思玉體之弗緇拂蘭䄂而起歩兮復經緯乎空庭苦鴻鴈之廱廱兮厭羽蠱之薨薨撼户以悲側兮惕瞀容而弗自勝轉曲牖而入堂壇兮牉獨坐對乎華鐙鐙影徭曵如鳥􅎶兮象中心之靡寧寒龎狺狺而競吠兮耳恍聞於跫音疾倒屣以啓關兮飈鬪葉於枯岑縹綿綿而莫抒兮托幽寄於瑶琴琴聲咽而思深兮類孤䳄之鳴隂更家嗼以將䦨兮斗杓旋而向東舒枕衾而就榻兮期夢寐以潜通精氣注以弗釋兮橋有物而衡中息纚纚以方㣲兮䰟翕翕而上征造旬始而謁太儀兮群靈􅌭其若樷氛旄溶以随猋兮鳯旍沛而嬰空馭象車而秉虬節兮鞭列缺以斥豐隆豹纛熊幡聿皇以奮兮繆流紆譎鬰以相蒙左撝右衛動以綳彋兮倐胂倩浰雲滃而雷舂回穴幡纚汨以芔歙兮吸嚊潚率謂以蒙鴻穆眇眇以前邁兮翩衯衯而弗止莾㝠㝠以無垠兮勢皇皇而迤靡超氛埃而淑郵兮竟按轡乎朱陵長麗舉躅以向日兮有赫戲之華文揚芒熛以上焱兮粲重離之丹門炫赤玉之寳章兮列八龍之威神歘東趨於蒼極兮青琱紛其竝迎羣神衎衎以方饗兮奏靈和之鳳笙四酎芬而味歆兮暈玉色而帶頳楫素威以升皓宫兮盻四極之浮浮辱收顧余而破顔兮錫鏤瓊之華鉤謂貞白以自守兮合左契於伊周折寒門而燭元㝠兮朔颸颯以吹裘有夫玄巾而檈甲兮握靈它以爲驅重隂沍而未啓兮肅玄氛之幽幽四方非不可居兮悵所思之莫余都馳兩轂如飛丸兮文滔滔而遐逝靈氛告余以吉故兮子何爲兮獨悲苦彼中天之有居兮隔人世之風雨吾將導子之一至兮庻弗愆於恒素怊忽荒以從之兮駕剛飈以徑度䀜光炎之炘炘兮綝纚鬰怏而不可正視琱甍􅊮楹屹以上起兮瀏濫弘惝雲譎而波詭連卷欐佹杳以軋芴兮崴魁㓜眇矗以高峙中洞房之沕穆兮乃􅍇人之攸居使曼姬爲予通訊兮儼再拜乎堂垂忽朱扉之洞開兮移玉趾之委蛇珠明玉潔不足以爲喻兮光照耀乎東西吐芳辭以若蘭兮意勤勤而告余曰皇降靈兮昭質弗沫毋染爾穢兮昧厥施紉葯𥜗兮曳菃斾結蕙纕兮張椒幃勺桂槳兮嚥蓀糜索胡繩兮畦掲車集衆芳以遠蒸兮羗郁郁而斐斐余俯首而敬聽兮書鞶紳以自規海色動而報曙兮陶去幽而開寤雖嘉辭之盈耳兮邈若人其何處遂捫膺以沈思兮顝獨處而繚戾也誠因言以㑹心兮將神交於千載也亘天地而無初終兮惟我民之秉彛道弘敷於上下兮必有人而繫之徃者固不可作兮幸方冊之昭如日叅驗於厥躬兮若靣命而耳提跛鼈之媻姍兮固難齊於六驥能孳孳而弗怠兮亦千里之可至余雖質䪥而力單兮敢不沾沾而奮厲帶鈎矩而佩衡兮撤蔀蒙而祛罻期有形以必踐兮始俯仰而無媿縱不得􅍇人以與之游兮又何異同功而竝世予旣爲此辭嘗録一通寄王子充子充蓋有志同予學呂者書以識之庸俟異日各考其學之成也孤憤辭宋濂中州人士有無罪而被廢斥者識與不識咸冤之濂因本其志爲署孤憤之辭使世之用法不愼者讀焉其或知所懼也夫辭曰哀予生之匪淑兮耿鬰紆其誰語恐此心之難白兮假㣲詞以自吐曩有志乎學古兮指前脩以作則非秋蘭奚敢糿兮非申椒吾焉食仗所履之正直兮謂無施而不可悲世塗之嶮巇兮􅘈獨中兹危禍胡萋斐之小文兮竟成之於貝錦剛指方以爲圓兮揆人情爲已甚伊翩翩之公子兮余素得而友之握手以示肺肝兮若㫁金而弗疑何中心之多變兮一旋踵而弗子識旣擠予於坑穽兮復彎弓而下石汝靣目之無怍兮曾何謀之弗深縱禍予其曷傷兮吾懼戕汝之良心覩日月之光昭兮聞雷霆之隱耽予固不足畏兮汝寧不畏于天天道㣲而難索兮斯焉足以責汝彼黃鳥之嚶嚶兮猶求友而弗止將七尺之美軀兮乃一禽之不如予固約結而罔措兮又爲汝而歔欷嗟受命之蹇􅿟兮豈獨汝之爲尤蛟龍鬪於深淵兮寧無損於鰌䱔汝雖不我䧟兮予安徃而迯囚唯飲泣而無所訴兮傷予罪之不當蒼天之至明兮獨不鑑我之幽枉叶於良切皎皎之白璧兮僉訾其爲燕石也纎纎之素縞兮反謂其如玄漆也欲力詆以深文兮其奚患於無辭咎繇之不吾出兮眼有淚而誰知誓剖心以自明兮念父母之所遺苟自經於溝瀆兮慮君子之見嗤夜漫漫而不旦兮悲風颯其四來秋蟲響於空堦兮似助予之悲哀六合之至廣兮寘一身而無所魂怳怳若有忘兮雖生存而如死昔公冶之所遭兮夫何有於不仁在縲絏而非罪兮亦魯叟之所稱果自反而弗疚兮縱遇辱其如榮浮雲過而日潔兮春冰釋而水淸外累不足以爲愳兮愳吾德之未明意欣欣以超絶兮振冠纓而起行取瑶琴以彈之兮有和衎之新聲樂天命以自度兮究年歲而不再更題王子充琴邊秋興圖辭詹同風泠泠兮木落山盤盤兮雲隂吾將鼓兮秋水誰能識兮此心弔董生文胡翰余自京師南歸次于直沽泝流而逹于衡漳過陵州故廣川地也或曰漢江都相董仲舒墓在焉爲文弔之其辭曰出國門以南邁兮渉衡漳而濟舟波流渾其若河兮道旣阻而且脩臨廣川之故墟兮曰夫子之首丘望原隰以懷思兮悵欲去而夷猶嗟王風之不競兮人各騖其私智道術裂而民散兮世巳乆而莫制燕趙固多奇士兮僅有取其忼慨非天降大雅兮繄孰爲之表礪聖垂法於春秋兮志雖微而可卽士明經以致用兮義非后而不食徴天人以爲言兮明灾異之在群引君致之當道兮情眷眷於陫側嘉堯舜而樂三代兮得一士而不能用茍不用其亦巳兮國無人而曷重黯質直而見憚兮弘飾詐而取寵用舎倒而莫察兮邪正溷而彌冗騂不中夫犧牲兮執鸞刀而薦犂登䙝味以實瓉兮瀝黃流而注玆竸刓方以爲員兮攦榘矱而去之徒操末以齊本兮引繩墨而止之下皇皇而靡所聘兮上訑訑以爲得孰好賢如緇衣兮孰惡惡如巷伯古固難於知人兮詎多欲而不惑庸俟時之見察兮庻師言之允一謂伊尹無以加兮雖管晏弗之全探淵源其尚眇兮又豈㳺夏之儔類何一低而一昻兮㮣未量乎夫子之志曰正誼而明道兮不計功而謀利皦内頋而如斯兮揆王佐亦奚異俾詭遇以獲禽兮固吾心之所羞比柳下之三黜兮由直道以事人百里之飯牛兮豈汚辱而忘身道有時而詘兮亦有時而伸諒天命之未違兮獨奈何乎生民憫貞淑文胡翰何斯世之昧昧兮耿獨抱兹貞淑曰降命之自天兮固眇軀之所服肇兩儀於厥初兮恒正位而竝育矧夫人之伉儷兮豈云䟽而異族昔結髪以承歡兮將偕老以爲期忽惡笄之在首兮遂中道而棄之惟國有大事兮莫大於征伐之師旣北靣以奉命兮願委質以驅馳冒白刅以爭先兮懼不得其所死苟死弗慊于素兮又安足以痛毁相女婦之從夫兮醮一齊而不再力莫拯君之阽危兮雖獨生其何待孫神之戍夏兮陳迎翣而捐軀高叡之䘮趙兮秦瞑目而與俱卓怒行其威敎兮皇甫係而猶詬李㫁臂於逆旅兮負凝骸以貽後諒風猷之一致兮曠年歳而不可衊襲芳菲以糿蘭兮又佩之以雙玦仰三辰之在天兮心炯焉其昭晰卽所安而自得兮吾竊哀丈夫之非烈懷龍門辭劉基有美一人兮美且都靑霞爲衣兮白雲爲裾被秋蘭兮佩珣玕泰和與逰兮中黃與居瞻望弗及兮芳歲其徂山高水深兮道阻且紆安得羽翼兮致我與俱有美一人兮美且仁自我不見兮不知幾春仰玄穹兮盻參辰爲合爲離兮誰識其因靑㝠無階兮江海無津安得羽翼兮致我與隣有美一人兮在山中蒼眉靑鬚兮玉雪其容飲沆瀣兮食紫虹澡石泉兮灑松風邀初平兮從赤松超逍遥樂兮無窮安得羽翼兮致我與同九嘆九首秋風起兮夕露漙浮雲沈隂兮白日晝寒木葉落兮水泉乾孤鴈鳴兮悽以酸攬余轡兮悵盤桓野蕭條兮行路難豺狼驕兮狐兎頑蘭蕙死兮荆棘蕃我欲奮飛兮無羽翰援雅琴兮發哀彈絃㫁絶兮涕汍瀾我髪種種兮颯如其稀我心倀倀兮忽若有遺過吾不能改兮德吾不能知徃者不可悔兮來者不可期進無益于世兮退將安歸嗚呼巳矣兮吾寜不悲天有田兮不可以耕山有龜兮不可以知咎徴刈蒿以爲梁兮削菌以居楹匠石却走兮工垂拊膺登高望遠兮觀四瀛水東流兮日西傾般紛紛兮各有營我獨展轉兮從夜逹明風飄飄兮揚塵野寂寞兮無人舟何爲兮山阿車何爲兮水濵北望楚兮東望秦倒江河兮亂星辰天門窈窕兮重九闉願有言兮遠莫陳虎豹颬兮爲喜爲瞋横流涕兮瞻蒼旻心馮噫兮不能伸麋有角兮龍有鱗空山寂寥兮吾誰與隣江無舟兮河無梁隰有荆棘兮而無稻梁鷹化鳩兮雀變隼狸爲貙兮龍爲蚓睠長顧兮情紆軫九疑高兮禹穴幽梧桐枯兮鳳不留山木慘慘兮呌鵂鶹鵠飛兮無所投雲杳杳兮雨悠悠孰懷情兮知此愁虎厭肉兮騶虞苦饑獺升堂兮麒麟受羈黃彛薦滫兮章甫承綦箾韶屏棄兮絃筦兠離指玉以爲石兮削方以爲規天不可問兮神不可咨繄彼之是兮而此之非有樗在林兮有櫟在馗蓍龜孔昭兮勿遠余思今夕何夕兮天宇淸歩逍遥兮仰觀列星河漢皎兮北斗横悲風發兮候䖝鳴林鳥起兮沙鴇驚長夜寥寥兮何人哭聲愴怳恨兮不忍聽回身入房兮涙沾纓蛟虬偃蹇兮豺虎獰弧無弦兮車說其衡知不可慮兮誰女令蹇淹留兮難爲情履霜思裘兮燠則棄之臨河號舟兮濟而置之不綱胡魚兮不弋胡鵠翦薙𣏌梓兮索灌莾以取木捕猫乳䑕兮僉以爲仁吠狗宵警兮行者怒瞋彃鸞飬梟莫知其咎斵冰以承宫兮曷云能乆長太息兮有所思林木勤兮巢鳥悲山有藿兮園有葵心懷君兮君不知秋天泬㵳兮百草黃蟪蛄悲吟兮朝榮有芳屣履起兮獨徬徨心悠悠兮懷故鄕原有粟兮隰有禾桂花紅兮蘭紫芽凉風動兮松栢馨流潦落兮水泉淸𬞞可茹兮秫可酒集鄕里兮㑹親友坐白石兮䕃蒼筠翫明月兮思古人魚歸淵兮狐首丘終余生兮安所求招逰子辭王禕吾宗兄存誠甫名其齋居曰遠逰昔者屈原放逐之餘眇觀宇宙欲制錬形魂排風御氣浮逰八極後天而終以盡反復無窮之世變故遠逰之歌所爲而作今存誠之有取於遠逰也豈猶原之志歟予因反其意爲辭以招之庻幾其不騖於虚遠而爲吾聖賢之歸然宋玉景差大小招務爲譎怪之談荒淫夸豔之語今亦無取焉辭曰遠逰雖樂兮樂不可極只子兮來歸無東無西無南無北只東方弱水舟輙覆溺只西方流沙車不可歷只北方太漠絶人跡只南方炎荒路險以棘只顧瞻四方蹙蹙歷所適只遠道雖樂將焉止息只子兮來歸反吾故居只居爾之居復爾𥘉只仁以爲宅邃且虚只以禮爲門義爲塗只大中爲室至和爲厨只八珍竒味道之腴只文章燦爛錦繡敷只盛徳光華𬒳厥軀只慈儉是實謹蓄儲只御以矩彠乗恕輿只子居其中樂有餘只瞻前無隣後無虞只天君㤗然靜以舒只聖賢與處天爲徒只洞視八荒眇一區只坐閱千古猶斯須只子母遠逰苦驅馳只子兮來歸反故居只弔伍子胥辭高啓覧勾吳之故墟兮灌莾鬰其籠蓯館娃廢而爲沼兮巋伍胥之遺宫奚千祀而勿毁兮繄若人之死忠昔窮逋而渡江兮奮孤跡於羈旅旣入郢而雪耻兮又棲越而攘侮使彼呉之強大兮非夫子而孰爲何夫差之自喜兮遽忽戒而荒娯陳昌言之悃欵兮寔不忍視國之佔危衆以子爲回信兮肆䜛辭之詆欺夫豈不能全身遠適以自庇兮顧先王之舊徳卒待隕而何言兮恨終不能寤君之嬖惑載鴟夷兮浮逰魂惸惸兮在中流江神念子兮哀憤鼓洪濤於高秋嗟君子之出輔兮孰不願爲伊皐使言從而志行兮致雍熈之陶陶何齟齬而多患兮惟重華之不可以屢遭鄂侯諍而就醢兮龍逢諌而見屠蓋自古而有之兮匪夫子獨罹乎此辜身雖殁而義安兮又舎是將焉索彼循黙而苟容兮寜獲免乎泚額想子猶念夫故都兮或乗雲而來歸顧荆棘之多露兮應攬涕而歔𣢾余亦何爲而感慨兮懼直道之墜也聊陳詞而表烈兮亦邦人之志也雲林辭并序蘇伯衡常人之情未有不好繁華而厭澹泊者也入山林而唯恐不深適江湖而唯恐不遠非抗志幽夐寄懷夷曠者孰能之六一居士曰錢塘四方之所聚百貨之所交物盛人衆爲一都㑹而又兼有山水之美以資富貴之娱吾祖東坡先生以爲吴興山水清遠其民足於魚稻蒲蓮之利寡求而無所爭賔客非有事於其地者不至焉是二邦固皆東南勝處而呉興之境寛閒寂寞豈比錢塘之鉅麗雄富哉崔彦暉氏錢塘人也顧去之而之吴興營别業一區名之曰雲林小隱於是乎僑焉此其以澹泊爲樂而不奪於繁華之習爲何如彦暉非抗志幽夐者歟寄懷夷曠者歟夫以端木賜之賢又有仲尼爲之依歸其於道德之足貴紛華聲利之不足尚固宜曉然若薰蕕不待辨而孰去孰取也然交戰于胸中猶且有所不免况彦暉當問學之士徇於外物而競於邪侈之際乃能决於去就如此豈直異乎尋常之人而巳使克推是志以學道其於去卑陋而趨高明也何難哉此余不識彦暉而信其賢因張尚禮之請本其情爲賦雲林辭曰眷吾父母之邦兮廼趙宋之故都旣美麗又富盛兮實東南之奥區衆人胥此焉止息兮吾獨曷爲而去諸此富貴者所娛情兮雖信美不可以居矧吾舎之湫隘兮直闤闠而臨通衢車塵滃若溽霧兮紛冉冉將浼予苟徘徊而不去兮幾何不爲逐臭之夫瞻彼樂郊兮震澤之墟俯苕霅之漣漪兮仰毗并之欎紆前谽谺之絶壑兮後蒼莾之平蕪阡陌縱横以棊寘兮聚落交錯若畫圖審靣勢兮搆吾廬梁桂檀兮柱杉櫧不雕不琢兮不丹靑以塗擥薜荔以帲幪兮苔蘚繡乎階除列陵阜以爲垣兮因澗谷而成渠長松鉅竹兮森扶踈烟條霧葉兮蔚蔽虧夭矯繚糾兮若蒼龍之垂胡棽麗披離兮若翠幄之流蘇積雨之後日出之初山氣澤氣孰吹孰嘘排我簷楹羃我綺䟽栖我几席襲我琴書始膚寸其來㑹兮旋波濤之卷舒乍奔騰以翕霍兮儵充塞而模糊何變化之奄忽兮茫洋莫辨乎四隅幻萬象以一色兮覆六合而有餘中長風之迅烈兮遂消液於須臾砉掃㓕而無蹤兮杳不知其所如但見山青靑而林蒼蒼兮掩映湛湛乎之太虚吾危坐而睇眄兮增感慨以長吁曰寳莫寳兮貝玉金珠貴莫貴兮爵位名譽等浮雲之不可把翫兮喟嘆先聖其豈我誣胡彼昏之不覺兮爭貿貿以犇趨况人壽之百歲兮猶過隙之白駒縱得之亦何補兮徒自黙而自劬吾於世兮復何需屑逐隊兮競馳驅聊歛退而從吾所好兮放浪肆恣於水澨山砠幸麋鹿之我狎兮喜鷗鳥之不我虞春草藂茂春華敷岩紅澗緑張氍毹幽泉發竇疾以徐髣髴㑹朝鏘珩琚娱耳悅目樂不可言兮世間埃壒何濡濡時招玄眞子膾却赤鯉魚相就東老舊酒壚旣醉渉江弄芙蕖歌曰澤有荷渚有蒲荷爲衣蒲爲𦵔衣且食兮保我軀滯志釋兮煩慮祛逍遥委蛇兮又何必訪偓佺於蓬壷弔茂陵文方希古祗明祀而言旋兮指槐里以西征停䇿憇于道旁兮覩高丘之峥嶸卽故老而訊之兮惟漢武皇之茂陵整冠裳而疾趋兮蹐遺廟以屏營淒風起于叢棘兮鼪鼯嘯于幽塋慨雄心之靡託兮悲曼志之無成惟君皇之御極兮遘炎靈之方熾陋堯禹爲未足遵兮卑祖武而弗肯繼内瘠民以自殖兮外震威乎遐裔騁車轍于八荒兮候神人于海澨建千門與萬戸兮殫土木之奢麗希軒轅之騰化兮永傲晲乎斯世何盛業之易墮兮洪謨鬰而難宣雖暫弱于戎胡兮生民疲弊而不痊奇禍機于巫蠱兮妃胤丁毒而㗸䆓諒逞心于屠㓕兮抑天道之致然闢土疆之宏廓兮曾玄宫之莫固赫兵革之繁庻兮委守衛于草露城闕之崇敞兮求㫁礎而無所後宫之韶治兮僅或傳其塚墓像祈連以旌武兮想壯魄之巳腐嗚呼哀哉形必有盡兮孰不有亡匪君皇之獨然兮尚奚爲隠惻而廻遑惟祈生之巳甚兮或妖誑而過望謂長年而卒老死兮斯足垂戒于昬荒明固有所不逹兮智固有所短偉才畧之英邁兮哲與愚其相半頼表聖而黙出邪兮兼善悔而能㫁雖人恫而財竭兮終克免乎危亂悼徃者之無知兮尚來者之可諌感盛衰之相襲兮仰昊天而永歎退菴辭楊士奇芝橑兮桂户山阿兮水澨雲鱗鱗兮石磊磊交松蘿兮延薜荔華芬芳兮襲予春之蘭兮秋之蕙羗何爲兮獨徃舒蕭散兮洩洩念盛衰兮有時盍滿盈兮豫戒撫年歲兮將晏日斯征兮月斯邁紛駸駸兮忘歸余何爲兮靡止攬吾轡兮旋軫返吾車兮舊里恬澹兮以休全之兮終始懷夫子兮高風邈游心兮千載辭劒圖辭胡嚴貫弓兮執矢望昭關兮東馳思公子兮弗諼孰閔余兮渴飢旦暮兮以趨江之流兮淸且漣漪彼遑遑兮求索渺浩蕩兮何之纍纍兮遺孤心之悲兮莫予知風蕭蕭兮江日黃蘼蕪緑兮杜蘅芳野閴寂兮無人怳四顧兮彷徨桂檝兮松舟儵汎汎兮中流檻余兮旣濟欲報兮焉酬寳劒兮陸離爰解贈兮莫我留執圭兮弗有頋百金兮何求江上兮丈人義重兮山丘撫新圖兮增慨寄遐思兮千秋氷雪軒辭右春坊右諭德兼翰林侍講金公㓜孜以氷雪名其軒君子有以知其素矣而或者弗察也故予爲賦焉余旣好此奇服兮爰昭昭以自持厲潔淸之端操兮將古人以爲期廓壅蔽之黤黯兮披汙穢而去之歲冉冉而易遒兮唯昭質其未沬際嘉時之晟明兮乗靑雲而上征凌天路以翶翔兮軼埃壒而抗旌朝吾遊夫淸都兮夕余憇乎扶桑鑿瓊枝以爲食兮吸沆瀣以爲漿秉余心之貞慤兮肆忞忞其曷巳雖所處之固然兮亦率余之素履匪善吾弗好兮匪德吾弗庸保厥美以上下兮曁予心之所同何時俗之多偭兮紛馳騁以自强汨汶汶而莫知止兮乃謂予爲匪臧曰悶悶與昏昏兮孰萬物之我先斯伯陽之爲道兮夫子仍嘆其賢何明哲以多智兮亦營營於土田後千祀而猶顯兮羌孰得而舎旃磽磽易缺兮皦皦易汙塊獨守以爲姱兮何不改乎此度衆欣欣以周容兮何吾與之寡也中伻伻以自信兮豈若是而舎也猗前聖之遐遠兮渺茫茫其何之余將就而問之兮質予行之所宜精専専而內凝兮神剡剡而外揚俄惝悅以流從兮忽超乎余有行駟玉虬以前導兮彼白虎爲後驅邅吾道夫不周兮造顓頊之所居飄風蕩而吹衣兮玄雲翳其承宇氷峩峩以凝沍兮雪紛紛而交下烱皓曜以相射兮清氣迫而襲余晃然令予開朗兮神蕭爽而情舒命玄㝠以導予兮謂余言之纚纚曰太素之淳懿兮斯爲物之所始嗟人之生兮禀其淑靈理粹而純兮氣厚而淸湛旦旦而弗亡兮豈庻類之可群彼其謂子之不然兮夫豈守玄之子雲殷湯之博大兮乃銘器而諄諄去舊染之垢汚兮圖皎然而日新孔聖之大成兮曰吾涅而不淄皜皜其不可尚兮赫秋陽而暴之相矩矱之在玆兮信舎是其焉求俗幽昧以眩惑兮吾於彼其何郵駕余輈以回轉兮倐臨睨夫舊居謹余轡而正䇿兮意揚揚以自虞積雪以爲堚兮斵氷以為宇余固處此而不遷兮庻有勺於此世重曰結予心之耿耿兮增予思之悠悠淸白以爲服兮憑徃則而信脩道曼曼其超遠兮予曷日而忘之弔余靑陽李江州詞周敘元鼎兮沸颺典常紊兮不綱撫長劒兮横視屹江淮兮保障金戈兮鐡馬時不利兮摧傷寧甘心兮一死濺頸血兮淸塘孤忠兮大節挺勁草兮秋霜正學兮雄詞掞雲漢兮天彰赫靑編兮偉烈配巡遠兮睢陽煥昭昭兮日月永千古兮爭光右余靑陽凝遥睇兮江州屹孤城兮上流弔英魂兮何在慨元政兮不脩政不脩兮佚游偉郡侯兮良籌訓兵兮繕甲擁猛士兮貔貅羣兇張兮授絶天不祚兮奚尤臨大節兮不奪凛勁氣兮横秋匡廬兮峩峩渺太江兮悠悠君令名兮同永增余心兮頓憂右李江州竹坡辭寄金川蕭樂善劉定之莾落木兮蕭森風不止兮葉琤琤夕陽没兮廻光見逺岫兮何千層我之懷兮旣悲况所思兮繫之竹坡兮何所吹秋籟兮參差美人兮在其下文蔥舊兮懷幽雅䕃清隂兮以憇握琅玕兮盈把歲云暮兮霜霰寒君不來兮行路難浮雲東征兮不可攀倐變化兮成素鸞就君之竹兮棲縹緲永今夕兮以盤桓皇明文衡卷之三
