front:
  text: 皇眀文衡卷之四十九
  hash: sha256:bb9860ba6adb4578ff565a5fd3500460ac6e80005c11282838a660afdc6fa825
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_049-1a}
body:
  text: 題跋題貢師泰送謝原功序後陳敬宗此貢泰甫為户部尚書漕粟閩海時送謝原功文也元至正十九年張士誠僭據平江原功博學負氣慨然欲白丞相以獻偃兵息民之謀又欲薦名有司入對大廷一吐胸中之奇以圗國家大利而皆無所遇焉乃獲以文學遇知泰甫執經海上日相與講明論辨至於赤靣汗背必當於理而後止此有以見泰甫能忘其勢原功能忘人之勢而得古人交際之心者矣泰甫以文學知名當時此文纍千餘言滔滔汨汨如長江大河不可窺其涯涘又必能以理為之主且欲原功察時變愼出處不可降志辱身以就富貴至引伊尹太公不輕自用與夫操瑟齊門以為之戒又以見泰甫於原功去留之際一本乎道義而非苟焉者也可謂忠厚之至矣史稱泰甫喜接引後進不問識不識即加推轂觀此亦豈不深知泰甫者哉原功名肅號密菴上虞人今其孫澤為刑部郎中淸謹自持克光先德又以見仁人者必有後矣題米芾遺墨右米芾大行書幾二百字前後所書似出兩手亦云恐非一時筆也然亦各臻其妙未可異而觀之有宋書法名家以蘇黃米蔡並稱觀此則名不虛得矣芾字元章𥘉居襄陽至芾徙於吳以毋侍宣仁舊恩歷官至禮部員外郎崇寧間除書畫兩學博士博文尚古偉岸不羈當時名流評其文則清雄絶俗氣則邁往凌雲字則超妙入神或又議其字神鋒太峻有如強弩射人而仲由未見孔子時風氣也夫文以理為主必氣以充之然後振勵而不薾字以規矩為主必氣以馭之然後豪邁而不萎元章素負豪邁之氣者其書似其為人亦其宜而妄生異議者君子有所不取焉監察御史雷復持以求豫題故為書此以俟識者鑒之題晦菴先生書簡墨迹卷後昔南軒張先生謂王荆公書皆如大忙中寫不知公安得有許忙事晦菴朱先生謂韓魏公書雖與親戚卑幼亦皆端嚴謹重未嘗一筆行草勢此與荆公之急迫正相反某於是竊有警焉今觀此書雖若略不經意而端嚴謹重具存法度之中其詞又皆謙虛溫潤無非道義之所發乃知先生雖巳造大賢之域亦有資於警察涵養之功也先生上承列聖道統之傳雖一書劄猶足以師法後學况其大者哉駙馬都尉趙公出是以示豫故書此以識景仰之意書龎彥珙所藏黃山谷帖錢習禮此山谷黃大史所書茶賦今中書舍人龎君明敘仲子彥珙之所藏也太史在宋時以文學行誼卓絶當時追配古人使其書未工尚當為人所愛重况極其妙而為一時稱賞哉但紫陽朱夫子謂書學莫盛於唐人各以其所長自見而魏晉之楷法遂廢至宋名勝相傳不過以唐人為法至於黃米欹傾側媚狂怪怒張乃不若朱鴻臚喻工部超然遠覽追迹鍾元常於千載之上意獨有所不滿焉細玩此帖溫然端重似莊人雅士正色立朝殊無前態當時其用意之筆豈可槩觀例論哉宜為後世之所寶藏也豫素不􅈺於書敬志其左以俟識者云書顏魯公爭座帖顏魯公剛直之姿見於正楷英發之氣著於行草今觀與右㒒射郭公論魚開府坐次帖藁所稱右㒒射蓋郭英乂也魚開府即朝恩也英乂代宗永泰元年三月與裴冕同拜命於集賢殿為右㒒射唐世以中官為觀軍容使自魚朝恩始朝恩為軍容實自監英乂為陜西軍始意與朝恩共事久情好舊故菩提寺行香位次當尋襲為常魯公退而貽書反覆論辨力斥其非無少容貸當時朝恩怗寵驕肆觀其冒居成均大司成之位升座講易鼎覆餗以譏宰相元載則可以知其為大璫之至桀黠者矣魯公鋭然申朝廷禮秩以折其僭且以盛滿戒英乂者甚至使英乂佩服其言豈有他日崔旰之禍乎史稱魯公當肅宗至德初國事方草昧為御史大夫即能正百官次序如平世以此帖徴之庶幾想見其風采也祿山叛河北二十四郡多潰降唯公以平原最先出師挫其鋒致玄宗驚歎以為朕不識真卿何如人而能辦此唐之中興四方義舉自公倡之世傳顔書却厲氣端人正士之手澤豈不信然哉書鄒浩傳後周忱豫嘗奉詔纂集歷代名臣奏議得宋右正言鄒浩諫立劉后疏反覆幾二千言讀之使人毛髮森悚又見當時有陽翟田畫監京城門見浩因言得罪告之曰使志完隱默官京師遇寒疾不汗五日死矣豈獨嶺海之間能死人哉及浩之南遷人莫敢顧而宗正寺主簿王回獨斂交遊錢為治裝且慰安其困事覺下詔獄御史詰之即自服曰實曾與謀不敢欺也是三人者在當時相友善皆以氣節自許距今巳三百餘年聞其危言讜論凛然若有生氣其忠肝義膽且與日月爭光可也浩之裔孫今為常山主薄出史傳示豫因書田王二人之言以附于後使觀者知浩為忠臣而畫回在當時為益友也跋宋高宗手詔金實大理少卿會稽吕公家藏宋高宗親書手詔一通蓋起其上世忠穆公頥浩都督潮湘八州軍事時書也吕公謂豫曰吾家寶藏先世所得宸翰迄今且十世洪武間宦江右書帙散逸因而失之夢寐不忘者二十載今吏部郎中盱江鄭君購得之民間以卑升乃裼以緗素表以蜀錦韜以丹櫝名公薦紳各有題識將以傳之子孫惟思陵翰墨妙絶當世今人見其石刻尚知寶愛况先世所得真迹寶之當何如邪世人有癖耽玩好者見人古書名畫輒起覬覦或以計取或以勢奪必欲得之不顧義之可否者往往有之鄭君於此必求其子孫而歸之使不失先公之宗器而傳家之文獻足徴忠厚之心過人遠矣故獨表而出之若夫忠穆公匡國事業與當時用事者之是非則有縉紳大手筆論著矣何敢復贅跋時苗留犢圗陳璉時苗留犢事後世有以詭激之事譏之者有以徼世之病而與之者衆議紛然靡有所定逮元有以其事聞于世祖世祖曰彼在官得子亦肯留否斯言一出苗之心衆之議始判然矣壽春守武昌王君廷傑初宰宜山秩滿將入覲或以留犢圖贈之後陟是任論者謂斯圖為之兆或謂出處有定分事之來會有適與之同豫則謂不然廷傑才識過人所至有聲爵祿之來有不得而辭奚待徴諸物而後知邪此圖筆力精妙雖非李龍眠真迹亦自可重也題襄城伯弋獵圖林志右近畫弋獵圗前而發蹤指者一人後而以鷹犬俟命者二人其三人執矛挾弓矢狀若聽要束而趨者雙鬟三人待於後如相偶語者其中一人為尊貴者衣冠似晉宋人物而其氣奕奕然頥指左右似無當使令者一女奴短髮被肩從之而顧臂鷹者若聽其言然不知其所出也豫意其為梁曺景宗之事乎景宗少善弋獵其樂至於鼻尖出火耳後生風令人忘生逮其貴也恥坐車張㡢如悒悒之婦人此其習痼何如哉後以位崇折節頗悔所為不免時從女侍縱觀以適意焉耳夫弋獵之好有耽之終身而不巳者故雖程伯子蚤志道學亦喜弋獵及見周元公自云此好巳絶而元公獨易其言未幾果動心於射兔者况於景宗輩乎然景宗之悔以其貴也非如伯子之學以克巳者也然其鍾離樹迹隱然為國長城光華賦詩文士為之屈服豫乃知豪傑之士不為則巳為之固異夫人也哉此圗之作意亦有謂矣或曰是為虞針也好田好女之詔古者羅氏職焉故畫工合而圗之其中而立者乃惕然於㒒夫之告致鹿之詔乎餘不能必其是非也姑兩存之續讀書録跋薛瑄往年因讀張子心中有所開即便劄記不思則還塞之矣之言遂于讀書心中有所開時隨即劄記有一條一二句者有一條三五句者有一條數十句者積二十餘年乃成一集名曰讀書録蓋以備不思還塞如張子所云者近年又於讀書時日記所得者積久復成一集名曰讀書續録但有得即録不覺重復者多欲皆刪去而意謂既亦以備不思還塞則辭雖重復亦可為屢省之助云跋蘭亭遺事圗後周敘右唐蕭翼詣辨才求王右軍蘭亭真迹圖者吳興錢舜舉所畫並題今刑部郎中許君某之所藏也蘭亭蓋右軍得意之書歷世流傳以為至寶辨才尤寶愛而祕之太宗政事之暇留心翰墨酷嗜右軍法書而尤慕蘭亭求之不獲卒使翼以詭道致焉其用心之勤何如哉豫嘗謂辨才以衰老之年祕惜此書不懼禍患切身且既沒之後將必付他人而有之其可謂愚矣而太宗以英明之主巳用計得之臨終猶囑其子以從葬昭陵其愚不亦甚焉善乎歐陽子記菱溪石有曰好奇之士聞此石者可一賞而足何必取而去也哉豫故書此于卷末以為玩物者之勸讀活民書李賢豫觀董氏所集救荒活民書其用心仁矣哉凡為君為臣者不可無此書而為守為令者捨是無所用其心矣奈何世之人見人文集雖無益於世者必汲汲然刻梓以傳視此反不挂意蓋不知當務之為急者也程子云一命之士苟存心於愛物於人必有所濟當時若見此書未必不擊節嘆賞也讀包公奏議豫讀包公奏議乃知宋仁宗之賢三代以下絶無而僅有者其所以容受直言蓋其天性之美𥘉非出於勉強好名如唐太宗者嗟夫天下未嘗無包公也苐以仁宗為難遇耳包公奏議仁宗賜之也天下之士為諌職者果遇仁宗則其奏議未必下包公也若曰有仁宗為君而無包公之奏議尚何諫職之為乎讀大雅劉定之大雅嵩髙蒸民之二詩相聮皆尹吉甫所作皆八章章八句嵩高首章曰維嶽降神生甫及申維申及甫維周之翰申者宣王之舅申伯甫者宣王之相大保兼冢宰仲山甫二人左右宣王如烏之有羽翰於左右以翼其身故吉甫作詩美二人而於嵩髙首章總言之自嵩高苐二章至苐八章専美申伯無一章不曰申伯凡曰申伯者十有七乃結之曰吉甫作誦其詩孔碩其凨肆好以贈申伯自丞民苐一章至苐八章專美仲山甫凡曰仲山甫者十有二乃結之曰吉甫作誦穆如清凨仲山甫永懷以慰其心至唐吕和叔贊房玄齡杜如晦二人前篇專美房後篇専美杜於杜篇之未曰萬有千古永稱房杜如周申甫以總結之蓋吉甫之美申甫以二詩也先總言而後分結和叔之美房杜以二贊也先分言而後總結皆無不可也和叔希吉甫而變化之者也今詩傳於嵩高首章總言申甫處不以甫為仲山甫而别求其人以甫為穆王時甫侯作吕刑者又以為作吕刑者之子孫仕於宣王時可謂失之矣華谷嚴坦叔謂申但王舅甫乃王相申非甫之比言申而引甫者借甫以大申爾其言尤為有旨讀汲冡書周洪謨汲冡周書文體淺露詞意踈迂無百篇渾厚沉雄氣象劉向謂是周時誓誥號令孔子刪録之餘愚則以為文武之道未墜於地賢者識其大者不賢者識其小者蓋周東遷之後史官隨王室以東而西土逸民私為此書以識周先王之事固非常時左右史之所記者也其最害理者如武王伐商之日紂既自燔武王乃射之而擊以輕吕斬以黃鉞縣諸太白之旗二女既縊王又射之而擊以輕吕斬以玄鉞縣諸小白之旗又以先馘入燎于周廟夫商之於周非丗讎也武王奉行天罰為民除暴其前徒有倒戈之勢其士女有玄黃之迎而其君又巳自燔矣乃擊其尸梟其首以燎于廟雖伍員報讎於楚不如是之慘也而謂武王為之乎昔司馬遷之作周紀不取秦誓武成之言而乃有取乎其説亦可謂陋矣孟子於武成惟取二三䇿耳使其見此則將何如取之哉又王會篇言成周之會四夷貢獻異物甚多夫西旅貢􅋙未為奇也而召公猶以為非所當受今乃殫四表八荒珍怪之産畢集於庭而是時召公猶在乃無一言以及之乎至於篇末又謂成湯命伊尹為四方獻令使夷戎蠻貊悉以方物致貢此何理也學者以其先秦古書而備觀覽可也若取之以實先王之事則不可也皇眀文衡卷之四十九
