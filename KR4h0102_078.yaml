front:
  text: 皇明文衡卷之七十八
  hash: sha256:7de2617b021dc34643d22e92afe744b6b1dcced72fb58213bd1beb215a761e15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_078-1a}
body:
  text: 神道碑兵部尚書贈榮祿大夫少保兼尚書鄺公神道碑王直兵部尚書鄺公既卒之明年皇帝悼念不巳詔特贈少保兼兵部尚書進階榮祿大夫而官其子儀為主事儀奉公衣冠以歸將以某年某月某日葬于某里之原而述公之行請文以刻諸墓道嗚呼公故人也其可辭公諱野字孟質别號朴齋郴之宜章人曾祖某祖某皆有學行而不仕父子輔為學官縣令名重當時及公貴祖父皆贈兵部左侍郎妣李氏王氏皆贈淑人公早喪母祖母李撫育之見其不凡最鍾愛曰是子能大吾門公孝友勤儉出於天性而撫弟妹尤篤其於學問不待程勸選為邑庠生而泰和王敬先為訓導循循善教公亦勉勉善學學成取進士遂入都察院理刑獄以廉平得名永樂癸巳拜監察御史時車駕在北京有言南京鈔法阻滯命公往察之衆謂將起大獄公往擒市豪一二以歸奏曰市人聞令皆震懼今鈔法巳通矣上頷之而罷倭寇犯遼東公往按問戍守之失律者凡百餘人皆應死公為開陳其可矜狀甚明上然而宥之山海關吏卒邀阻行人以取財亡逃之人則受賕縱之去弊積滋甚公廉得之歸至關悉擒治抵罪弊為之省丙申北京營造執役之人纍巨萬上念有病者命醫與善藥又慮其奉行不謹命公察視之公躬履其地令潔其穢汚而時其藥食由是病者多不死戊戌石州人有詣闕告變者曰州民與陜人羣聚千餘謀不軌上擢公為陜西按察副使往理其事果實即以官軍勦戮毋貽民患賜之楮幣給驛而遣之公至察其誣乃反獄亡命妄言冀脫死即具以聞上命止弗問而誅其造誣者宣德巳酉陜右飢華亭宜川尤甚公私廩皆竭公巡歷其地憂之乃移旁縣粟賑焉羸病不能興者命官府煮粥食之民以全活庚戌至納淠憂歸道聞父喪哀愈甚每號痛輒欲絶其治喪一用古禮其祭亦如之服除拜應天尹輦轂之下賦急役繁公一以養民為務事無大小苟可以興利去害無不用其心至於市征田稅皆酌其平豪猾不得為輕重賔興之歲公設科取士厚其禮而峻其防得人為多且樽節其費以待會試故事集而民不擾視異時蓋省十三四歲大熟麥有兩岐者民歸德於公公拒弗受正統改元進拜兵部左侍郎時西鄙有警尚書王公往視師公獨任其事上嘉其才荆湘民多隸戎伍公家亦與焉至是特除其籍以示寵巳未京師淫雨壞官民廬舍公奏曰此隂氣為沴兵隂也皆臣等不職所致乞罷歸田里上慰勉之師征麓川公舉蔣貴可任卒有功衆人以為知人天下軍衛總小旗當代者於例必就試京師有道遠無資不能來者終身不得代公請各於都司試之人以為便時有言欲變易軍伍使南北之人各適其土性下羣議衆依違其問公曰此舊制不可紊稍有變易將不勝其弊咎將誰歸卒不動嘗自念曰治軍吾職也當為國家惜其力養其鋭氣以備不虞故凡軍家利病有當興革者必為上言之多見信從已巳邉報虜入寇上命治軍旅而權姦獨主親征不與外廷議及詔下大臣皆以為不可即上章請留不聽公從行出關屢奏言虜犬豕不宜屈至尊惟指麾諸將足以成功不聽權姦惡其數言事欲踈之勑公與戶部尚書王佐隨老營至懷安墜馬幾殆從者請少留懷安就醫藥公曰天子在前吾為大臣豈可託疾求自便力疾而往至雲中車駕回鑾然行止疾徐惟權姦所命至宣府虜寇踵至公深以為憂再上章請疾驅入關而嚴兵為殿皆不報最後公詣行殿申前請權姦怒曰汝腐儒安知兵事再妄言必死公抗言曰我為社稷生靈而言何得以死懼我權姦愈怒叱左右扶出公與王公相對泣帳中明曰次土木營中無水士馬皆飢渴虜四靣集矢下如雨衆奮欲戰又為權姦所沮須臾師覆公遇害蓋八月十五日也生於洪武乙丑某月某日年六十五娶吳氏有賢行子男一即儀女一嫁同里士人歐陽瑄孫男三琦琳珍公學博行莊仕宦四十年風裁凛然見重於士大夫威行惠施近悅遠懷服仁蹈義至老不衰此其平生大節也權姦誤國而卒陷焉豈獨公之不幸哉嗚呼銘曰允毅鄺公逢時之隆學古入官荐躋顯庸執法在朝為名御史再升外臺其行愈偉京尹堂堂百郡所瞻惟少司馬戎律有嚴遂陟夏卿君子所重噫其逝矣云誰不慟人道之大曰義與仁仁義不違何愧於天刻文墓碑負以龜趾永永不亡庶其在此禮部右侍郎諡文肅錢公神道碑公諱幹字習禮吳越武肅王鏐之後𥘉吳越歸宋子孫皆顯仕其為吉州防禦使曰惟濟子昕遂家廬陵三傳至貴和徙吉水諸源為望族曾祖以吉祖立志父好德母赤岸陳氏皆以德義重鄉里公生而喜學父母兄弟皆鍾愛凡所師友者見其文敏而思深且多出腹藁莫不奇其才從學南昌訓導顔子明而卒業於翰林修撰張伯潁永樂六年江西鄉試第一明年會試中第十時車駕幸北京廷試不果由是從容京師間縱觀聖朝政化之美聲明文物之盛四方萬國謳歌朝覲之會同而才益進九年廷試取進士入翰林為庶吉士尋升檢討參史職甲辰會試命公為同考八月仁宗皇帝即位一新庶政升翰林侍讀與知制誥洪熙元年賜勑褒贈父母及封其妻勑同修太宗皇帝實録仁宗皇帝升遐宣宗皇帝正大位勑修仁宗實録公亦與焉時有詔許焚黃公承命以往丙午促召還京偕太子少保金幼孜等入見命完修實録二年春闈則命公為同考官三年戊申元夕賜文武近臣觀燈萬歲山賜宴公及文臣賦詩以進賜之鈔四年八月應天府鄉試奏請考官命公為之十二月朔是日霜寒甚上命光祿賜在廷文臣羊酒以禦寒曰皇祖考在位每旦常有賜今朕多事忘之汝勿忘五年兩朝實録成賜金織襲衣銀幣考禮部會試升翰林侍讀學士蒙給誥命贈父以已官母與妻皆贈宜人痛寵命之不主及也哭之過哀七年駕過史館有作並賦招隱之歌以示近臣蓋是時天氣淸明聖心悅豫懷賢覽古悠然天趣之高發見於吟詠於此蓋可見也八月考北京鄉試十年乙卯春宣宗皇帝晏駕今皇帝即位二月上宣宗尊號賜白金秋九月詔修宣宗實録十二月賜文綺丙辰正月改元正統大臣建議開經筵詔可其奏公與為講官三月上臨軒䇿士公讀卷勞以羊酒賜宴于禮部戊午四月進宣宗實録上御奉天門慰勞甚至賜白金文綺織金衣襲升翰林學士賜宴于禮部八月應天府鄉試命公為考試官四年充廷試讀卷官六年考北京鄉試七年壬戌為行婚禮賜紗衣紗帽金相香帶等物九年甲子三月大新國學成上祇謁先聖躬行釋奠禮幸彝倫堂命祭酒司業以書易進講從臣坐聽公與其列七月公上章乞致仕弗允且降勑諭天下憲臣及縣令有難其任察舉以聞公舉所知而人以為當十年乙丑禮部春試上復命為考官三月進五倫書蒙賞賚冬十月欽升禮部右侍郎公以老病懇辭弗獲諭使就職朝廷稽古右文事多由禮部公夙夜祇栗惟恐有弗稱上又命兼署吏部公益謹畏不自寧求去益切詔許之公卿大夫餞送出都門皆有詩公獨取歸去來辭長歌以自快人莫不以為榮而喜聖德之厚也公孝友忠信篤於倫誼厚生送死君子稱之至姻戚故舊亦無悖於理者在位三十餘年以文章議論為士類所敬樂於教人學者亦樂從之遊典文衡者八讀卷者二佳時暇日擇勝往遊長篇短章發於歌咏以揚太平之盛美及老而歸頥老之堂子孫侍教者十五年凡所著述論思聮為大卷有應制集詞垣藁詞垣續藁歸田藁藏于家後世傳焉天順四年九月嬰疾五年四月益甚五月二十二日終于正寢春秋八十有九訃聞上為之嗟悼命禮部賜祭工部為治祠墳諡曰文肅配王氏繼娶曾氏皆有賢行子二長鸞停先卒次鳳躍習舉子業女一人孫男某曾孫男某初公之歸即欲為安樂窩得地于其里洲背山而營焉至是鳳躍以其親戚高僉憲所述行狀請於豫曰先考文行公知之且交最久神道之碑非公孰宜為豫老且病不得辭乃勉副其意詩曰洲背之山有崔者墳是誰所營武肅令孫惟此令孫克勤帝載由唐而興日廣且大歸于有宋以德以仁衣冠相傳有土有民天祚忠孝賢者相繼維時能來繄公是視公之遊此旌斾于于山靈來瞻風卷雲舒植木有本矖水有源公之本源人其式旃公每來歸子孫翼翼誦詩讀書有永無斁惟公世家海內所聞政事文章亦煥其羣我與為友式篤于義九十而終尚利後嗣公官三品神道有碑我作銘詩百世之詒奉天靖難推誠宣力武臣特進榮祿大夫柱國太保寧陽侯追封濬國公諡武靖陳公神道碑銘李賢永樂初靖難功臣不下數十人然克享祿位於悠久者鮮矣惟太保寧陽候陳公歷事五朝出藩入衛凡六十餘年而以令終嗚呼盛哉公諱懋字舜卿鳳陽夀州人髙祖萬曾祖福三祖大一俱追封涇國公妣皆涇國夫人父亨從太祖高皇帝定天下以功升都指揮使洪武三十二年從太宗文皇帝靖內難復以功進都督同知卒贈奉天靖難推誠宣力武臣特進榮祿大夫柱國追封涇國公諡襄敏母韓氏涇國夫人襄敏公三子長恭嗣為都督同知次忠府軍前衛指揮使季即公也器宇宏遠識見超卓尤負膽氣工騎射年弱冠即從父領兵為前行凡壩上廣昌蔚州大同白溝濟南之戰與父同功又禦敵于單橋藁城西寨東平固鎮小河戰尤力纍升右都督永樂初論功行賞進封奉天翊衛宣力武臣特進榮祿大夫桂國寧陽伯食祿一千石子孫丗襲賜誥劵賚豫甚厚六年受詔佩征西將軍印總兵鎮守寧夏賜寶鏹白粲牛羊以為戒嚴之費公至鎮號令一新凡胡人降附者親撫綏之務得其歡心乃巳七年選精兵自將大敗虜于境外由是殘孽遠遁邉塵為之一淸揵聞加封奉天靖難推誠宣力武臣特進榮祿大夫柱國寧陽侯食祿一千三百石子孫世襲復賜誥劵及貂蟬冠服錦綺寶鏹八年春上親征北虜公將左掖兵十一年冬還鎮十二年春上復親征公仍將左軍俘馘甚衆明年還鎮十四年夏有報虜酋馬哈术死者公未之信曰是欲懈我邊備也即申飭諸將固守已而虜衆果來見有備而退二十年春上復北征公率所部兵以從還京賜玉帶金綺龍衣且聞公有女賢淑禮聘入宫册封麗妃尋命歸寧父母賚豫駢蕃當世無與為北二十一年詔公統陜西寧夏甘肅三鎮兵出勦叛虜公率衆直抵賀蘭山搗其巢穴盡收其酋長也先土干部落及其牛馬駝羊數萬凱還上大悅寵賚有加二十二年復隨上北征師還以公為殿至京遂領前軍都督府事仁宗皇帝登極以公勛戚有勞加太保復官其長子昭為勛衛宣宗皇帝臨御待公尤厚樂安州之平公領京營兵衛上有功還有金帛人口之賜二年復鎮寧夏三年春奏徙靈州城以便防守四年春得玄白二兔以進上賜璽書奬諭兼有玉帶龍衣馬圖之賚六年還京十年命佩平羌將軍印移鎮甘肅正統改元今上皇帝嗣位念公勛戚之舊召還奉朝請十三年冬福建民鄧茂七作亂偽稱閩王勢甚猖獗上曰此賊非老將不能平特命公率師往討之至浙江有欲分兵先守海口者公曰如此是絶其主路則為死寇矣不從明年春師次建寧有欲屠沙尤二縣者公曰如此則益堅賊心矣乃下令諭之俾各復業能斬賊首者官賞與王師同於是降者日衆公曰賊勢巳孤無能為也乃五路進兵一鼓而收之凱還賞勞加等命領中軍都督府事尋兼領宗人府事景泰中加太子太師天順改元皇帝復位恩遇益隆固辭宫師許之六年春忽得疾踰秋不能起上言臣老死不足恨惟陛下以生民為念任賢用能以圖太平之治則國家幸甚上覽之惻然曰看卿所奏足見忠誠宜尚加調治以副朕懷久之醫藥弗效遂薨時天順癸未七月十六日也距生洪武巳未二月九曰享年八十有五訃聞上震悼輟視朝一日追封濬國公諡曰武請遣官諭祭加賻及營葬事東宫及諸王亦各致祭公偉觀修髯語音洪亮胸懷磊落敬禮文士雖位極人臣未嘗妄自尊大而南征北伐口不言功當為中興名將稱首配嚴氏封寧陽侯夫人早卒子男六人長即昭次曰福寧俱早卒次曰晟為勛衛次曰潤次曰瑛次曰昻女五人長適應城伯孫傑次即恭順榮穆麗妃次適東勝右衛指揮使張昭次適府軍左衛指揮使張輪次適都督同知馬良潤等卜以是歲某月某日與嚴夫人合葬子都城西香山之原銘曰壽有陳宗父子傑特涇公濬公後先開國文皇靖難孰多勛勞涇公輔之首秉節旄奮武桓桓所向披靡大事垂成星殞于壘濬公承之以篤世忠鼓勇前馳涇公是同躍馬揮戈到處蹀血乃伯乃侯成此茂烈金符虎節屢鎮邊陲于征于狩無遠不隨閩寇劻勷東南震恐濬公征之遂輯其衆巍巍勛戚歷事五朝龍衣玉帶惟帝之褒夀嘏既純允顯六紀容與承平宿將無幾煌煌愍册賁此令終生死哀榮孰如濬公西山嵯峨佳城在側史臣勒銘千載輝赫恭順侯追封涼國公諡忠壯吳公神道碑銘天順辛巳逆賊曹欽謀為不軌濳俟七月二日早朝入內為亂恭順侯吳公先於是夜一鼓聞之即與其弟廣義伯琮約總兵懷寧伯孫鏜走詣長安門告變於是禁門不啓賊計遂窮舉火燒禁門公等率兵勦殺奮不顧身賊雖誅滅公巳捐軀矣嗚呼先機告變公之忠也殺賊喪元公之勇也然則逆賊之敗豈非公之功乎皇上聞公之殁哀悼殊深輟視朝一日追封涼國公諡忠壯凡祕器諭祭賵儀之類悉從厚典復命有司為營冢壙以安葬之蓋痛念勛戚之臣為社稷而死故報功之典倍蓰尋常也既而琮詣豫泣且告曰先兄不幸殁於鋒鏑兹欲立石墓前以白於世非先生之文不可辭弗獲按通政司參議趙君昻之狀公諱瑾字廷璋其先西涼人祖諱允誠永樂中纍以戰功封恭順伯父諱克忠嗣伯爵洪熙初以戚里恩進封恭順侯正統甲子以征虜功加太子太保已巳秋禦寇北邊力戰而死追封邠國公諡壯勇母楊氏封邠國夫人叔父克勤官至左軍都督府左都督亦同兄殁于陳追封遵化伯諡僖敏公生而英鋭襟度爽闓親賢好善未嘗以門第驕人以故搢紳士大夫樂與之遊相與議論古今講説道義而公頗能識其旨趣尤間武藝精騎射方其父叔禦虜之際公亦在陳中發矢射虜洎父叔矢盡而亡公始就執其酋長念公忠義之後釋之乃還京遂嗣父爵天順改元皇上復位公以勛戚隨侍應對稱旨自是日備顧問賚豫甚厚尋命理左軍都督府事公益感激夙夜效勤一旦遭變委身則其允蹈忠義視乃父乃叔為無愧矣公生於永樂癸已十二月一日享年四十有九配李氏故會寧伯之女有淑行封侯夫人生子男二長曰鑑次曰鏞次曰錫女一適指揮使劉玉琮嗣廣義伯遵化公之子卜以是年八月某日葬公於順天府房山縣之新莊從先兆也銘曰世祿之家忠義無幾有若吳門展也無比彼美忠壯虎視耽耽遵化之姪邠公之男忠以捐軀壯以禦侮相繼如歸光照中土飭終追榮惟帝之恩匪帝之私惟以報勛閴矣泉宫西山之麓祕器旅陳穹碑載陸仁者有後公則成仁銘以貞之何千萬春禮部尚書致仕贈大保諡忠安胡公神道碑銘我朝名公巨卿聰明特逹者多矣若器識宏遠福夀隆長惟武進胡公一人鳴呼休哉公諱濙字源潔别號潔菴其先淮安宿遷人有諱藩者仕劉宋為太子左衛將軍遷豫章數傳至諱者仕唐為侍御史子常州刺史瓊生持因家于常遂為武進人持四世孫曰宿仕宋為樞密副使宿十一世孫曰中立為常州制置中立生昭公之高祖也曾祖庸仕元為江浙儒學提舉祖禎為常州路醫學録考宗仁隱居不仕皆以公貴贈光祿大夫少傅兼太子太師禮部尚書曾祖妣章氏祖妣徐氏妣李氏皆贈一品夫人公生而髮白彌月方黑母夢一僧持花以遺之覺而生公居數日有僧至家索觀公見僧即笑僧曰此吾師天池高僧後身也命我求見以笑為志果然聞者咸驚異之公自幼端重不好嬉戲弱冠入邑庠洪武中領鄉薦登庚辰進士第授兵科給事中尋遷右給事中公勤識大體士林譽之太宗文皇帝入正大統公供職如舊永樂改元秋以奏對稱旨升戶科都給事中丁亥上察近侍中惟公忠實可託遂命公巡遊天下以訪異人為名實察人心向背時御製性理大全為善隂騭孝順事實書成俾公以此勸勵天下以故雖窮鄉下邑軌迹無不到在湖廣間最久丙申秋還朝丁內艱乞終制不允尋進禮部左侍郎明年往巡江浙諸州授嘉議大夫癸卯復自均襄還朝時車駕親征北虜駐蹕宣府公馳謁行在所上臥不出聞公至喜而起且慰勞之曰卿驅馳良苦賜坐與語凡所歷山川道里郡邑豐嗇民情休戚以至所聞所見保國安民之事悉為陳説上欣然納之向所疑慮者至是皆釋比退漏下四鼓先是仁宗皇帝為太子監國時有飛語上聞文廟屬公往察之公至以所見七事皆誠敬孝謹密疏以聞上覽之大悅自是不復疑仁宗嗣位特賜誥命授正議大夫資治尹已而聞公曾有密疏疑之乃轉太子賔客兼國子祭酒之官南京未幾閲章奏見公所上密疏深嘉其忠方議重用之而龍馭上賔矣宣宗皇帝即位復禮部左侍郎兼職如故洪熙乙巳冬公自南京來朝上素重公及入見顧問良久即留任行在禮部事宣德改元春進尚書是歲秋漢王謀叛事覺公贊上親征事平公受賞賚甚厚復給叛者家屬四人丁未賜誥命授資善大夫復賜近第一區於長安右門外給閽者二人戊申上嘉公忠勤特賜銀章四其二曰文恭世家曰淸和恭靜蓋嘉羡褒美之也尋以公生辰賜宴於其第秋八月公扈從巡邊至會州而還巳酉命兼詹事府事夏五月復扈從北巡時常民有豪橫者既抵于法悉以田宅賜公辛亥命兼行在戶部事聖節御製詩一章賜公及蹇忠定楊文貞文敏三公且曰朕茂膺天眷惟爾四人贊翼之功因賜宴盡醉而罷新建禮部成命光祿設宴勛戚公卿皆往賀公公以為盛事立石廳事之右倚任益隆每燕見上虛心問曰卿有何言得其章奏即施行之時有芝産于公署人以為公和氣所召今上皇帝踐祚亦惟圖任舊人待公尤厚凡軍國重務皆與聞加授資德大夫正治上卿每考績必有賚豫甲子以年至七十上章乞致仕上以公精力未衰慰勉留之巳巳上親征北虜命公留守京師秋八月進太子太傅階榮祿大夫景泰初賜誥命辛未春公因災異數見乞放免以回天意不許尋進少傅壬申兼太子太師二俸兼支公固辭一俸癸酉復賜誥命進階光祿太夫自後每歲引年乞歸皆不許丙子復因災變乞賜罷黜亦不許時公年八十二忽疾作艱於步履明年皇上復位公喜不自勝扶疾入朝而筋力不可強矣遂乞謝事且辭師傳二職上方重用耆舊憫其老皆從之陛辭賜白金寶鏹金織襲衣給驛舟以歸復賜璽書有卿宅心允臧處事惟愼雖經變故無改厥常之諭歸之日鄉人老稚聚觀者以億萬計公陳所受賜於堂感激泣下遣冡子長寧詣闕申謝上念公歷事纍朝遂官長寧為錦衣衛世襲鎮撫俾歸終養公之弟克恭克寧克誠時年皆七十餘蒼顔白髮燕樂於一堂遂扁曰壽愷優遊桑梓者七年疾復作召諸子前曰爾輩圖報國恩勿墜家聲遂瞑目而逝天順七年八月八日也享年八十有九終之夕常州守卓天錫夢公來辭巳而聞終大以為異訃聞上為之震悼贈太保諡忠安遣官諭祭於其家復令有司營葬事恩榮始終世莫與比公為人平易寬和廉靜寡欲自奉淡薄起居有常居官敬愼一毫不苟歷事列聖無纎毫過舉蔚然為一代名臣立朝幾六十年薦拔士類甚多十知春闈貢舉天下之士盡出其門平居未嘗疾言遽色雖庸夫孺子亦知其為長者暇則手不釋卷喜為詩文晚年譽望益尊其酬應愈劇曾不厭倦所著有芝軒集若于卷又嘗輯録醫藥經驗者曰衛生易簡方經進又有律身規鑑俱行于世公配范氏早卒纍贈夫人繼張氏纍封夫人子男四人長曰谼即長寧居母喪廬墓有司聞于朝旌其門曰孝子次曰􅳚以武舉得官沒於王事次曰豅錦衣衛指揮僉事次曰女三人長贅林玘次適成國公朱儀次適陽武侯薛琮孫男一人曽孫男一人銘曰大明盛時有臣胡公從容其間以篤其忠始為夕郎乃教胄子輿論攸歸多士咸喜作賔春宮遂長春官列聖倚之四海乂安國之老成進位師傅溫恭維人翊我皇度公在朝廷六十春秋祿位優遊莫之匹休公身雖亡中有不死懿行崇功昭彼信史皇恤耆英曠典是承隧道有碑儒臣刻銘吏部尚書致仕贈太保諡文端王公神道碑銘公諱直字行儉别號抑菴系出琅琊晉太傅導之後也導輔東晉遂家金陵後數世有崇文者仕唐為吉州刺史因家吉州又數世孫贄仕宋為戶部侍郎徙居泰和代有顯人曾祖以道祖子興隱居不仕父伯貞仕國朝為肇慶知府俱以公貴纍贈少傅兼太子太師吏部尚書妣皆贈一品夫人公早喪母而父以事去賴祖母李夫人撫育自幼端重異於常兒家貧力薄刻苦讀書永樂改元遂領鄉薦明年登進士第時太宗皇帝篤意古學詔選進士曾棨等二十八人為翰林庶吉士俾讀中祕書冀成遠大之器公在選中感激奮志不數年文辭追古作者上以公卓越諸士召入內閣凡機密之政屬執筆焉尋授翰林修撰車駕巡幸北京仁宗為皇太子監國留務之重選任尤嚴時翰林則留黃淮楊士奇與公三人輔導公夙夜勤愼不懈中外咸倚重之及再幸北京公在扈從遂與修太祖實録未成以憂去服闋仍入翰林升侍讀仁宗即位進侍讀學士宣宗為皇太子愼選宮僚首升公右春坊右庶子仍兼侍讀學土凡經筵講義及文武群臣誥勑皆以屬公又兼記注至於聖政聖訓之當書者皆録之以備纂述進階奉議大夫宣宗即位與修兩朝實録成進詹事府少詹事仍兼侍讀學士有白金彩幣襲衣寶鏹之賚進階中順大夫今上嗣位詔修先朝實録以公總裁書成進禮部左侍郎仍兼學士賞賚如前久之以禮部缺人命公出涖部事宗伯胡公大喜闔部之政悉付之公處之𥙿然若素習者吏部尚書郭璡去位詔以公代之命下士類皆悅進階資善大夫歷再歲有無賴不得志者以選撥事嫁禍於公給舍御史交章論列乃直公誣加授資德夫夫正治上卿正統巳巳秋北虜犯邊車駕欲親征公獨以為不可率廷臣上疏止之不獲特命公留守京師加太子太保兼吏部尚書尋進階榮祿大夫景泰𥘉進少傅壬申兼太子太師進階光祿大夫公纍疏求退不允天順改元皇上復位圖任舊人公艱於步履不能朝謁懇乞休致並辭師傅二職詔特許之賜以璽書有忠淸之操簡于朕懷之語復出白金文綺寶鏹賜之給驛舟以歸公方靣修髯器宇宏偉望之若神仙中人天性嚴重寡言笑居家儼然及至接人和氣可掬學富才敏詩文淸緻四方求者接踵屢典春闈文衡得人最盛在翰林三十餘年恭勤不怠如一曰與王文安公齊名時稱二王又以居第在東稱東王先生士類莫不拭目海內想聞其風采及位冡宰益加廉愼時方靣官罷廷臣薦舉專屬吏部公益留意人才委任部屬凡御史出巡歸者必令報其高下以備拔用自是四方多號得人奔競之風為之一息居第隘陋曾不屑意一切世味安於淡薄朝廷重公之德每優禮之免其朝謁及退休居家杜門不出曰課諸孫讀書而巳所著有抑菴集若干卷行于世天順六年九月二十三日以疾終于正寢享年八十有四訃聞上為之悼惜特贈太保諡文端遣官諭祭于其家復令有司營葬事公配陳氏纍封一品夫人先公二年卒子男四人長曰䆅翰林檢討居母憂以卒次曰稹次曰穆次曰秱女三人長適梁相次適蕭稹次適袁傑孫男十人曾孫男七人稹等卜以天順七年正月六日葬于邑之信實鄉高坪之原乃以公所為墓志示賢請銘其神道賢從公遊最久公未嘗待以屬吏又引之同升平生之知未有過於公者謹次第其事而系之以銘銘曰國之明昌繫彼才賢有一挺生繄豈偶然侃侃王公天賦其秀有聲燁然大江之右鑾坡鳯閣容與翶翔惟學之昌惟譽之芳遂秉鈞衡不倚不忒百司庶府位稱其德位稱其德又我蒸民列聖汝嘉保傳師臣公之旋歸既祿且壽國藉蓍龜士仰山斗公之云亡軫我聖衷節惠二名錫命三公有美京榮無然愧怍銘在豐碑元老之墓皇明文衡卷之七十八
