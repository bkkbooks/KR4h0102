front:
  text: 皇明文衡卷之七十三
  hash: sha256:d412a30bc82acbff452483c8fbe6d47a54d977c016d00e62a52c92082bc5423d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_073-1a}
body:
  text: 神道碑大明勑賜故開國輔運推誠宣力武臣特進榮祿大夫右柱國衞國公追封寧河王謚武順鄧公神道碑朱夢炎洪武十年冬十有一月初九日開國輔運推誠宣力武臣特進榮祿大夫右柱國衞國公鄧愈自河州召還至壽春以疾薨訃聞上哭之哀爲輟朝三日詔追封寧河王謚武順其月十九日柩車至三山門車駕臨奠且親視其塟地而舊塋在鳯臺鄉者㣣隘弗稱上乃遍覽傍近岡阜擇於城南西山之原寛平爽塏敕有司營建墓兆仍命遷王母夫人及弟哻之喪同塟焉凡喪事所須皆官給之恩至渥也上猶念其功不巳召臣夢炎等於廷諭之曰愈事朕二十二年東征西討勸勞至甚歷鎭八州有功無過爾其撰文刻之石以昭不朽臣謹按公牘所載賜名愈泗州虹縣人三世弗仕以王貴曾祖父大公贈資善大夫中書右丞追封臨淮伯曾祖母孟氏追封臨淮伯夫人祖父大公贈榮祿大夫中書平章政事柱國追封南陽侯祖母戚氏追封南陽侯夫人父諱順興贈特進榮祿大夫大都督府右都督右柱國追封衞國公母張氏追封衞國公夫人王生而魁偉幼有大志勇力過人元季壬辰天下雲擾王父衞國公起兵于鄉遂戌臨濠與元兵戰死之王兄友隆代領其衆未幾友隆病卒衆推王領軍事年方十六王出戰必挺身破敵軍中咸服其勇歲乙未上駐師滁陽王自盰眙率所部來附充管軍總管其年夏六月從渡大江克采石取太平継而元將蠻子海牙以舟師扼采石陳也先合兵數萬逼城下上親督兵禦之調王與魏國公以奇兵出其後大破之生擒陳也先丙申三月定金陵㧞溧水破鎭江王皆與有功陞元帥出守廣德冬十有一月長鎗謝元帥率衆來宼王出城奮擊俘其總管武世榮及軍士一千餘人丁酉三月轉行樞密院判移戌宣州七月領兵取休寧績溪乗勝克徽州元將敗走十月浙江苗楊元帥率衆十餘萬來攻城時徽州新附城郭未完守禦之器未備王激厲將士明立賞罰與越國公胡大海等分門竝出奮兵力戰大敗其衆生擒部將胡辛等一百五十八人賊衆奔潰婺源元汪同僉領兵來降戊戌正月擊破鐵木兒不花元帥寨斬首五百餘級追至婺源東門擒殺鐵木兒不花獲士卒三千餘人遂克婺源三月取嚴州四月攻淳安縣賊帥金子珍敗走獲馬一百餘匹降其頭目軍士三千餘人遷同僉樞密院事五月浙江茜楊復率衆屯徽州烏龍嶺拒却之九月轉僉書行樞密院事巳亥正月領兵略浙江臨安大敗張宼於閑林寨庚子七月鄱陽院判于光右丞余椿擊走僞漢部將辛同知取饒州遂以其城來附有旨命主徃鎭之饒城彭彛湖而僞漢王陳友諒尚據江州数遣舟師來攻城王斂兵東門外與余椿丁光等連營以拒之屡殱其衆賊兵遂退辛丑正月除江南行省叅政仍兼僉書行樞密院事總制各翼軍馬饒之境內弄兵者尚懷疑阻王摧誠結納橅以恩信於是左丞吳宏等皆請降八月領兵襲浮梁僞叅政侯邦佐棄城遁八月取樂平擊敗蕭總管五千餘衆擒萬戸彭壽等六十八人饒境悉定進取江西十月駐兵於臨川之平塘時鄧克明據撫州遣使通欵而實無獻城之志王知其情卷甲夜趨比旦入城克明單騎遁翌日遣人以分省印來獻王號令嚴肅秋毫無犯江右之民室家相慶爭持牛酒迎勞王悉却而不受是時上親討僞漢主陳友諒於江州友諒敗走遂下江西命王以歩兵來會車駕至南昌有旨授王江西行省叅知政事留鎭之時壬寅正月四日也癸卯夏四月陳友諒悉國內之兵圍江西江水暴漲宼舟直抵城下王與諸將恊謀固守屢挫其鋒賊勢大沮相持者凡三月會上親率援兵至湖口友諒懼而退大戰康郞山友諒竟死甲辰三月新淦土豪鄧靑叛以卒二萬人據永豐王調兵破之擒首賊胡理問劉右丞五十一人八月從開平王平臨江之沙坑麻嶺十洞諸山寨合兵圍贑州降之南安南雄韶州皆送欵乙巳正月進江西右丞加湖廣行省平章岀鎭襄陽西抵巴蜀北控河洛烽火相望新附之民未有定志王撫而鎭之民懷其惠軍忘其勞遐邇悅服吳元年十月擢拜御史大夫洪武元年命大將軍經略中原而以王爲征戌將軍征取江淮未取州郡三月攻唐州克之又取南陽生擒蔡國公史克新等二十七員軍士一千五百人馬一百五十匹七月克随州右丞王誠降九月進取洪山老馬劉寨夜四皷斬關而入擒殺甚衆冬十有一月率兵討蜀河莾張獲之金商均房之境悉定三年命王爲征虜左副將軍平隴右大敗王保保于定西招諭河州土蕃諸酋元帥何鎻南普花兒只汪來等皆納印請降於是河州以西朶甘烏思藏等部來歸者甚衆冬十有二月定功行賞特封衛國公食祿三千石賜以鐵劵五年命王爲征南將軍討灃州等處溪洞蠻夷平之九年吐蕃所部州城邀沮烏思藏使者掠其輜重有旨命王爲征西將軍徃討之十月王與副將分所將兵爲三倂力齊入覆其巢穴窮追至崑崙山斬首不可勝計獲馬牛羊一十餘萬上嘉其功遣使召還未至薨王以元後至元丁丑二月十五日生享年四十有一兄弟三人長卽友隆弟哻仕至羽林衛指揮僉事先王五年卒夫人曹氏側室王氏徐氏子男五人長鎭羽林衛鎭撫次銘次鐸次銓次太平奴皆庶出女四人長女夫人曹氏出也爲秦宫妃次適河南護衛指揮周巗餘尚幼孫女一人王之塟也以是年十有二月二日丙午惟王器量宏偉而沉毅簡重謙㳟愼密而奉公守法臨大敵而不懼有大功而不矜又能禮賢下士寛惠愛人廣德宣州徽嚴饒撫南昌襄陽八州之民至今猶懷其德事毋夫人能致其孝撫弟㓜孤能致其愛蓋不獨將略之雄兼有君子之行冝乎爲國元勳光輔帝業而膺上眷之隆者也謹再拜稽首而爲之銘曰聖皇受命地闢天開掃淸六合鼓舞群材惟武順王雲龍風虎杖䇿來從誓以身許飛渡大江奮戈前驅斧堅摧鋒何敵不除一舉姑熟再舉建業颷馳電掣百戰百捷玉節飛雲金戈凛霜有赫其威徃征群方乃輯浙東乃撫江右大閫煌煌厲我城守孰謂狂堅而敢馮陵自速厥辜江漢底平帝用有嘉平章湖廣駐節荆南爰資開蕩化仇而恩循暴而柔以德輔刑澤及八州武功告成四海一統爵以上公受天之寵烈烈征西極討窮追殱彼大戎張我皇威召還有期中道而逝九重痛悼三軍隕涕念王之忠開拓建功念王之德無忝始終何以報之王封是錫袞衣綉裳光賁泉宅西山之原墓門有石視此刻銘永錫無極大明開國輔運推誠宣力武臣榮祿大夫柱國同知大都督府事江隂侯追封江國公謚襄烈吳公神道碑銘吳伯宗洪武十四年十一月二十六日開國輔運推誠宣力武臣榮祿大夫柱國同知大都督府事江隂侯吳公以疾薨于青州十二月訃聞皇上爲之憫悼輟朝三日詔所司定贈謚加贈特進光祿大夫上柱國中軍都督追封江國公謚曰襄烈遣使者迎匶以歸洪武十五年二月丙子賜塟鍾山之隂上念其功不已命詞臣撰文勤諸豊碑以垂不朽伯宗職居翰林屬當執筆謹敘而銘之公諱良姓吳氏鳯陽定遠人初名國興後賜今名氣岸雄偉性質剛直與弟禎俱以勇力稱元未群雄竝起海內鼎沸皇上以聰明神武仗大義奮起布衣公兄弟委身相從服勤左右上深器焉甲午秋從上取滁州乙未春從克和陽常爲先驅戰皆有功六月從渡大江與元兵戰於采石抜其營乗勝克姑孰尋下溧水溧陽丙申從定建康戰功爲多又從今大將軍太傳魏國公徐公達克鎭江下常州屢著功勤歷陞軍職丁酉下江隂命公以指揮使領兵鎭守時僞吳張士誠據姑蘇跨有淮東浙右地大物衆兵食冨强實江南一勍敵而江隂正當東南要衝喉襟之地士誠又多變詐動以金帛啗誘將士公行上諭之曰彼以其詐我以吾誠爾爲邊將愼守封疆約東士卒毋外交毋納逋迯毋逐小利毋與爭鋒惟保境安民而巳公奉命惟謹繕城池遠斥堠利器械嚴部伍士卒無敢迯亡無敢出境生事者敵亦畏公之威不敢侵犯數年上親將兵下江西克湖廣平僞漢陳友諒大軍屢出而無東顧之憂者以公之扞蔽也丁未大軍克姑蘇士誠靣縳上以姑蘇承士誠割據之餘力戰乃服必得剛毅有智略者鎭其地遂以命公公至奉宣皇上盛德紀律嚴明號令整肅軍民輯睦咸得奠安洪武三年天下大定論功行賞以公有守江隂之功封爵爲江隂侯食禄二千五百石賜以鐵劵子孫世襲恩至渥也廣西右江諸州僻處炎徼去中國遠數千里前古號爲要荒乍臣乍叛唐宋以來羈縻而巳元都北方相去益遠姑息尤甚夷俗狃於仇殺數侵盗邊境五年春命公將兵討之公率兵深入䟦履崇山踐歷險阻剪除荆棘衝冒瘴霧勤勞特甚數月盡平其地俘獲不可勝計自是溪洞夷獠畏威懷德革心向化輸租賦奉法令同內地焉先是上稽古制建親王爲盤石藩屏齊王受封靑州命公營建王府宮殿社稷公經營區畫部署軍卒竝手偕作功成而民不知勞公留靑州二載得疾而薨亨年五十有八公自起身行伍至爲將帥受封爵始終一致有功無過故其薨也上深惜之恩禮有加焉公存時以公貴推恩三代曾祖三七府君贈鎭國將軍僉大都督府事護軍追封穎上縣子妣周氏追封頴上縣子夫人祖千一府君贈驃騎將軍都指揮使護軍追封延陵伯妣劉氏追封延陵伯夫人考似龍府君贈榮禄大夫同知大都督府事柱國追封渤海侯妣葉氏追封渤海侯夫人配高氏封江隂侯夫人子男二人長曰高神䇿衞試指揮使次曰壽安女三人在室公弟禎亦以勲封靖海侯追封海國公先公三年薨嗚呼古今豪傑之士際風雲之會攀龍附鳯竭忠勤樹勳烈以名世者多矣未有如公兄弟同遇聖朝同立大勳同膺高爵輝映赫奕若斯之盛者也是宜勒諸貞石以光前古傳後世而垂無窮豈止照耀泉壤而巳哉銘曰天啓洪運大明肇興豪傑率從霧擁雲蒸桓桓吳公剛毅英烈異才間岀萬人之傑天戈義旗飛渡大江爭先鼔勇敵莫敢當旣定金陵亦下京口公俱在行厥績多有江隂崇墉東南要衝屹若砥柱維公之功姑蘇新附命公綏靖紀律嚴明大小從令炎荒僻遠命公徂征歷代羈縻慕義來庭功成汗馬名載竹帛兄弟二人竝著開國河山賜誓列侯䟽封慶延後嗣與國無窮生榮死哀富貴終始進爵上公錫謚具美鍾山之隂有碑穹然勒銘紀功何千萬年皇明開國輔運推誠宣力武臣榮祿大夫柱國西平侯追封黔寧主謚眧請沐公神道碑王景皇明以神武定四方混一區宇懋德禔祉東漸西被罔有內外時則有若貔虎之士翊運之臣汛掃爬梳用能咸和天休以集大命草昧之初各奏爾功歸于有德也至于內託肺腑而建丕績者則成于天地涵育之功也是以一舉而開閩關大業闢矣再奮而運斗樞大政立矣三厲而西略自西徂南大統一矣翊亮之功昭兹甚明此皇上之所以始終垂眷大有造于黔寧也王諱英字某姓沐氏鳯陽定遠人元季天下難作王在童稚喪所怙鞠于母氏母氏復物故時皇上龍飛鳯陽徃拜于門上奇而育之賜國姓旣長機敏過人數從征伐終日侍側無戯色亦無惰容弘量孝㳟出于天性上益奇之滋欲試以事壬寅授帳前都尉出鎭鎭江焯有聲績甲辰除廣武衞親軍指揮使軍府肅然㝷加昭勇大將軍廣武衞指揮使軍府益律戊申春正月上卽皇帝位改元洪武旣定鼎命王從征福建擒元平章陳友定三月復王姓鎭建寧三郡三年陞鎭國將軍僉大都督府事四年陞榮祿大夫同知大都督府時天下兵樞交壅治出聲生稱上意旨中宫尤屬望焉九年乗傳繇陜右抵熈河布德澤康遠人事有不便更張以聞明年副寧河王總大兵征蕃部西渡黃河略川藏耀兵崑崙轉戰千里俘虜萬計班師論功封西平侯開國輔運推誠宣力武臣階仍舊榮禄大夫勳柱國食祿二千五百石賜鐵劵又明年八月拜征西將軍將兵征西蕃降元萬戸乞失加三副使舒朶兒只阿烏都兒人卒二萬雜畜二十餘萬是行平朶甘納隣七站地數千里十三年以陜西兵征和林元國公脫火赤等略以集乃渡黄河回賀蘭渉流沙偵騎報去穹廬五十里王分爲四翼自以驍勇衝其中堅衘枚夜薄其營生擒脫火赤知院愛足全部皆降明年領軍從大將軍出右北口襲公主山長寨平四郡過驢駒河虜知院李宣還京副征南將軍統兵征雲南繇辰沅岀羅鬼攻普定下之攻普安又下之轉戰而前元梁王把匝刺瓦爾密以司徒平章達理麻軍曲靖會大霧咫尺不辨壓白石江兩軍相望征南欲濟王曰我軍遠來利在速戰然衆未集不若以計破之乃陳兵陽若渡者遣奇兵從上流濟草山出其陣後爲疑兵元軍見之陣動王麾軍泅水渡元軍亦卻陳我師旣成列鎧仗鮮明彼皆奪氣遂大戰自旦至晡蹀血震蕩王從鐵騎撞之岀而復入生擒達理麻于淖元兵遂大潰僵尸相屬乗勝蹙之勢若拉朽梁王棄城走死之收其金寳撫乂其民列衛布守諸郡皆納欵唯大理不下王率兵攻之叚世據龍尾關關險王分一軍夜從間道登點蒼山襲其背黎明王䇿馬亂流攻關關不守至城前後受敵擒世㧞其城會川永昌皆平間使下車里下𬗟不浹十辰雲南底平夏王與征南分兵東平烏蠻餘寇諸部謂王師東下復叛夷兵二十餘萬圍雲南四十餘日王以鐵師萬人馳捄之虜聞㧞營夜遁時曲請永昌皆失守王次第復平之事聞詔征南班師王留鎭焉二十一年春平摩沙勒斬首千餘級三月思倫發以三十萬宼定邊東川廣西徃徃遙應之王率軍三萬禦之期日合戰至期分軍爲三蠻以象乗高撞我右軍右軍少却王下令曰却者斬左軍與之鏖中軍右軍夾攻之聲震山谷蠻酋刀斯郞斃于象蠻師大奔斬首無筭俘萬餘人盡獲其軍實思倫發遂降秋七月東川平冬十月廣西平誅者滿矣情俘五千餘明年平越叛阿資冬朝京師錫宴奉天殿賜金銀楮幣繒綵以萬計尋還鎭上慰曰爾在雲南朕無南顧憂二十四年阿資復叛王親撃之阿資僅免有詔命王還鎭以僉都督何某爲平羗將軍代統其兵討之阿資來降秋遣使招八伯八伯來貢八月錫七田明年夏六月某日王立㕔事忽仆于地侍者扶入曰我中風不能起受皇上厚恩不能報矣遂薨時年四十又八軍民罷市巷哭訃聞上哭之慟輟朝制文遣禮部徃祭命其子椿以喪歸塟發軍護送所至百司祭于道十月戊午王喪至自雲南上遣中使徃祭明日追封黔寧王謚昭靖賜塟于江寧長泰鄉觀音山時某年某月某日也勑百官郊送比塟上諭祭者三皇太孫親王遣祭者再部府諸司祭者一曾祖考某祖考某父某竝追封黔寧王曾祖妣某氏祖妣某氏妣某氏竝追封黔寧王夫人明年塑像功臣廟敕太常祀以太牢凡塟費皆給所司不煩其家雲南民夷請立廟守臣以聞制曰可𥘉娶馮氏故追封頴國公國用之女先王卒追封黔寧王夫入再娶耿氏故贈長興侯某之女子男五人曰椿馮夫人出也上賜以名由後軍都督僉事襲爵西平侯今鎭雲南孝友忠勤民夷悅附以兵梟越叛阿資威震諸夷可謂能繼王之志矣曰某耿夫人出也僉後軍都督府事曰昌曰景曰昻側室出也女四人孫女二人夫天地之道尚孝而右忠帝王之政褒徳而顯功王在鎭之二年中宫皇后薨水漿不入口三日斬衰哀臨終喪三年皇太子薨䘮毁逾禮因以成疾孝足稱矣初莅督府以大學有正心之要綱目得春秋之旨太極圖明天人之道出師陳情表著忠孝之寳終身披誦不輟家事治而事上必本于忠勤在鎭之曰侍衛不過数十人德可徴矣其馭軍也敵攻無堅城守必飭從征討則效忠献謀搴旗斬將及爲戎首則神機横發出竒制勝功出漏刻有古良將風功可尚矣其爲理也弘毅寛𥙿招納賢士長駕遠馭恩威兼下墾田至五十七萬畝而軍實充連歳用師小大戰數十而軍士豫附思可見矣嗟乎忠孝昭于身天下仰其光功德著于時天下𬒳其澤王之事上有子道焉有臣道焉上之撫王有君道焉有父道焉非他人爲君臣者竝也生榮死哀可謂宜矣銘曰聖皇啓運受命自天王氣浮淮有開必先曁曁將臣天挺神武鼓盪風雲闔闢寰宇五神闡珎挺生異人依光日月下上星辰風雲景從發迹海邦遂荒其區遂搤其吭沈沈樞府我寵居之秩秩皇猷我儀圖之載敷恩澤西渉渭源載敡國威西上崑崙賀蘭之墟流沙之阻兵不頓刃霆驅星昈茫茫井絡氣交神州載淸載夷投鞭断流式遏王誅自爾南夷日月出矣爝火何施天兵一麾仆山摧壑封其鯨鯢以示大僇額額其城大纛高牙萬方攸同六合一家布德㢮威一紀是釐曶爽闇昧莫不惠來皇帝曰咨予嘉乃績黄金大帶龜判琮璧鈞天無人陟帝左右帝曰嘻哉朕心曷究追王黔寕錫兆京畿以享以祀以介繁禧推尊王爵上及三世澤逮漏泉無幽不届子孫繩繩世有封爵允忠允孝以永天祿觀山之原神道有門刻銘貞石以勒殊勲皇明文衡卷之七十三
