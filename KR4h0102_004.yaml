front:
  text: 皇明文衡卷之四
  hash: sha256:4eb0c50e601275f7b5b9c7ce2d44ca2d6964929907022851bbc1e0f3709fd780
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_004-1a}
body:
  text: 樂章琴操擬大明鐃歌鼓吹曲十二首并序王紳臣幸生明時獲際雍熙之治世職儒業而臣文叨竊祿位愧無以黼黻皇猷伏覩太祖皇帝手提三尺取胡元平僣亂以肇造區夏所以雪近代之耻其功誠不在湯武下可無所述以見于咏歌以𬒳于音樂乎爰取漢魏以來所載鐃歌鼓吹詞效其體為十二篇以紀豐功偉烈曰大明鐃歌鼓吹曲以上雖其言蕪陋不足以鋪張萬一或者命將出師之時用之軍旅行陳之間亦可以知祖宗締造之艱難與佐命元勛之勞烈臣不勝惶愧之至元季亂極四海兵興太祖皇帝起淮泗平僣亂正大統為神龍躍第一神龍躍奮滄溟耀光彩揚滅靈沛厥澤蘇羣生德所𬒳枯者榮著仁譽藹義聲一戎衣天下平混華夷俱來庭歲僅周武功成考厥績如日升萬斯年昭大明右神龍躍二十句句三字蠻子海牙以舟師扼采石王師與戰克之為殪奔鯨第二鯨之奔勢甚張率醜類橫大江礪厥創比厥航聮伍為什黠且狂皇旅奮義旗揚兵所指氷沃湯衝其要扼其吭有弗若者嬰以鋩鯨既殪授我疆天兵赫赫從此光右殪奔鯨二十句十七句句三字三句句四字元將據建業天兵擊之為開洪基第三江之表惟建康負天塹勢莫強彼昏不知肆譸張恃其險干天常皇震怒整戎行義旗一指虜馘亡授我首啓我疆大業巳建洪祚昌右開洪基十六句十三句句三字三句句四字陳友諒據豫章太祖親征之大戰鄱陽湖友諒死降其衆為平江漢第四江漢湯湯厥惟豫章醜虜慿之以恣冦攘屢涉我疆以跳以踉天眷有明命我哲皇爰整其旅以扼其吭戈矛洸洸旗旐煌煌部伍行行艂艭將將鏖戰大呼雷轟電楊虜酋既斃虜衆亦降凱歌以還漠義旗所指摧山震嶽君臣稽顙若崩厥角舉族逺遁不待誅縳既屋其社寰宇淸廓伊誰之力惟皇先覺石平胡邦十六句句四字方谷珍自元末跋扈東海命將征之舉族來歸為波海平第七元政既不綱萬國兵搶攘梟雄利草昧突起溟海傍名號僣相加狼貪狠如羊大舶連百艘雲濤相擊撞蕞爾鰍鱣窟自擬蛟龍藏天兵渡東浙疾若列缺光投戈載妻子逃匿海中決尋復係厥頸來詣轅門降震雷既輯聲朝暾出扶桑帖爾波不興浩劫塵不揚殘民沐文化宛若鄒魯邦右海波平二十二句句五字陳友定據全閩出師執之為拓閩境第八真主起淮泗沛澤加無垠陳氏逞顛猘烽火連七閩自恃險且遠偃蹇不我臣天兵忽爾加奮擊速且神執訊仍獲醜困彼涸轍鱗凱旋獻俘馘磔裂徇頑嚚海堧遂淸靜千里無纎塵群民樂蕃息煦煦涵陽春右拓閩境十六句句五字張師道李思齊據關中天兵平之皆入職方為定關陜第九元德昏政棼棼氓戚憔籲于旻情上格命明君二竪無職方狺梗我化據中原王師下加猶不循雄兵烈烈車噋噋鐡山且碎虜曷存禠爾魄奪爾魂殱厥渠魁弔厥民關陜平蕩無妖氛右定關陜二十二句十六句句三字六句句四字元社既屋苗裔猶存大兵再加窮極北漠而胡遂滅為蕩胡穴第十元民有天下腥饘我中原垂髮裂冠冕士效咿嚘言聖人受天命遠續星王傳手提三尺劒起自淮泗堧削平諸僣亂胡遂竄然屏迹雖甚邈天討不可延窮追及沙漠巢穴無復全卓哉皇業勳上雪唐宋冤右蕩胡穴十六句句五字明玉珍據全蜀僣大號師出討之舉國來降為闢川蜀第十一夏明氏據全蜀僣大號保西隩恃其險遠弗臣伏我師征之兼水陸扼厥吻搗厥腹以杖擊地駭神速焚爾櫬受爾玉待爾不死恩尤篤陶至和𬒳淸穆五十四洲歸化育右開川蜀二十句十五句句三字五句句四字元屬梁王保雲南招諭不降師出征之梁王死六詔平為斫苞枿第十二巨木既蠧根本繇傾爰有敷枿猶假息以生皇曰肆哉毋讟我兵俾其自歸庶不戕我氓屢遣使命諭以至誠蠢茲弗靈恣其頑冥皇赫斯怒爰整旅以行熊羆百萬如雷如霆摧朽拉枯烈烈轟轟虜酋既殱㸑𤏡悉平遐邇歸化四海由以寧右斫苞枿二十二句十八句句四字四句句五字擬祭告天地樂章凡十三梁寅禮局中承詔分撰郊社宗廟樂章故有此作其音調乖戾雖不可𬒳之管弦然出於上命不敢棄其草謹録藏之迎神天道大矣物繇以生地道廣矣物因以成惟鴻恩是資惟禋祀是明神之格兮瞻􅌭紛其並迎奠玉幣奠以嘉玉栗而溫兮薦以重幣燁其文兮庶鑒兹哉斯禮之存兮奉牲既虔我祀既具我牲角貴繭栗心之誠有苾其芬于豆于登五音會合和而平上帝酌獻仰明明瞻巍巍如事父栗以夔物莫稱德曷報之酌用陶匏斯其宜地祇酌獻勢廣厚德含弘五行具百物生承天之施功之成何以報貺醑惟馨上帝亞獻父事惟天格神以心赫赫在上洋洋若臨樂既具止有鏘其音酌言再之庶明明之降歆地祇亞獻母事惟地物無不載九榖既登百貨是賴罔敢煩而瀆罔敢忽而怠昭兹嘉貺沛兮未有艾上帝終獻禮行匪懈祀事孔明瑶席菲菲華鐙煌煌豐我粢盛潔我豆觴隂陽之和邦家之昌地祀終獻六府孔修生我兆民富媪之功陸海之珍洞洞屬屬清醑以陳所佑維德禎祥其臻分獻鸞輿下臨從百神金支秀華耀五雲壇峨峨靈欣欣位以序列享明禋徹爼禮嚴厥初尤愼乎終徹以示敬儀雍雍嘒嘒管簫五音從望燎瘞在繅早維玉在篚維幣禮從厥初乃燎乃瘞疑屹立以曕匪終怠送神神飇若馳矞零上翔蒼龍並騰車以行顧兹瑶壇兮尚有榮光擬朝會樂章凡十二首王景天命有德之舞嘉禾進堪輿寧叶氣蒸萬彚茁嘉禾生祥飇瑞露凝光精一莖九穗有三登田畯駿奔進天廷薦宗廟將德馨時和歲豐樂太平乃知天子在樹德雲龍風虎開休禎野繭成瑞道昌至治明萬化滋植盈八荒猗歟野𧖟集我條桑載生載成以玄以黃以登于明堂至和磅礴黼黻文章繅為五采絲上輔虞舜裳騶虞獻騶虞至周服至仁表天造飢不食生畜行不踐生草聖皇御宸極德澤𬒳枯稿林邑神聖初召南風化首邁遐躅前無偶啓貞符垂沐久神龜呈箕疇演洛之靈玄龜出聖之徴皇孝理表八紘役五神䇿六丁㣧五總符十朋介金石利永貞天子九九八十一萬嵗夀與天齊并黃河清黃河清七百里水精宫下見底聖人在位天心合并六合澄清萬國文明捐雜佩兮蒲津遺玉玦兮龍門川后跽而陳辭兮錫蕃釐于聖君四夷來天子踐祚宏拓皇謨義聲翕沓隂肅陽噓東欵扶桑西徼余喜浣海祝栗統為一家繩牽索引咸傳于都莫不震懾天休涵濡狉狉以拱宸樞王帛匪頒王會有圖萬歲千秋協我貞符明德新民之舞黃河澄清聖人召和黃流獻奇澄波清且漣漪噴薄龍門震蕩坤倪萬雷呿張光燭化機上下一碧機動天隨天啓聖神河水為淸天啓聖神治化底成聖德天齊造化降精聖德天齊心與道凝萬國一統聖聖相承嘉禾同頴祥開函宇地出嘉禾端倪叶應大瑞是荷同頴異畒瑞協周家以濯仁風以昭泰和惟皇忠厚𬒳草木𢡟昭大道同變化是知聖心能致和上與天運同亨嘉慶雲成彩德動天鑒慶雲呈祥紛為華蓋燁為天章郁郁芬芬靉靉茫茫映日烜彩隨風飛揚昭回麗河漢覆燾彌下方神聖楊清芬溥暢融天光龍馬來廷天之駟龍之媒産大宛徴渥窪追流星籋天街汗流赤心九垓歷閭闔觀玉臺西風十二間爭稱龍馬來蹴踏五雲暖神光夜昭回詄蕩蕩天門開井露降祥和氣叶井露凝陋寶瓷軼金莖厭厭浥浥穰穰熒熒而於粲其英如餳如飴如珠如脂不隨日以晞天子神聖與天合德至和攸繹以濡天液天子聖仁與天同甄至和氤氲以播靈芬瑞應之彰有苾其芬於萬斯年受天之慶四夷咸賔聖皇御天治化攸甄文武並用其幾孔神極日月之所照莫不獻贄而效珍普天率土悉妾悉臣環拱址辰以沐至仁德懋𬒳乎曶爽聲教暨乎八夤陋漢唐之用師侈成周之王會其道斯何王者無外擬朝會樂章凡二十六首顧祿升座樂奏泰安之曲金門洞開寶座尊崇煌煌龍衮穆穆聖容俯臨萬國髙拱九重臣民稱賀玉帛來同公卿人門樂奏治安之曲萬乘天臨干官景從濟濟卿士秩秩王公簉班鴛鷺接武夔龍同心協德永效公忠上夀樂奏夀安之曲天眷聖皇應運開基尊臨大寶撫有華夷武功底定文德弘施微臣曷報仰稱夀巵君親之重實為臣綱至尊至敬著在天常仙韶按曲玉醴浮觴載伸華祝萬夀安康舉酒樂奏嘉禾之曲有美嘉禾勃如雲興一莖九穗異畝同榮至和所召盛德之徴厲諸郊廟用慶豐登樂奏卿雲之曲天上垂象著于卿雲九苞鳳彩五色龍文迎風郁麗映日絪緼有徴斯應實惟聖君樂奏紫蓋之曲聖人受命紫蓋呈祥亭亭錦覆燁燁霞張天中屹立雲際飛揚眷兹靈祐國祚隆長樂奏􅊮旗之曲在昔征伐旗纛為先仰惟聖朝著象于天􅊮竿對峙赤羽文鸞克敵之應萬方歸焉樂奏神芝之曲后祗效德神芝挺生曄曄三秀濯濯九莖紫㽔絢彩緑葉敷榮願著聲歌播于大廷武功之舞聖主承天運臨濠樹義旗萬方思灑日一劍奮興時采石方收捷金陵即駐師神機安可測建此萬年基大命歸真主群心屬至尊神功參造化英略定乾坤永洽雍熙治弘惟曠蕩恩華夷俱奉貢冠帶入天門六成江漢親征日風雲睿算中六師方奮武孤冦已潛蹤矢石飛星急樓船烈火攻興王天已祚次第靖群雄萬乘龍飛始東吳尚陸梁天兵將問罪驕虜敢稱王負固三時久終成一戰降山河畿甸接表裏壯金湯陜右遺梟獍山東據虎狼神威方逺及小醜孰能當飲馬黃河上觀兵華嶽傍來蘇人望切載道獻壷漿王師若時雨隨地霈恩波東浙爭歸欵南閩已戢戈山川回正氣田野起謳歌一洗兵塵淨群生樂泰和巴蜀雖云險區區在一隅偏方寧自守逆竪謾狂圖正類蛙藏井真成虎負嵎神兵飛渡入俄報定成都大將承王命長驅向北征揮戈淸朔土按轡入燕城圖籍登天府車書混玉京從容歸奏捷萬姓共歡迎文德之舞一統皇圖大三陽泰運開王侯鳴珮入蠻貊獻珠來瑞靄騰金闕祥雲護五階太平人物盛鼓舞樂春臺雞鳴欲曙天冠蓋集群賢拜舞瞻龍座歡愈侍御筵玉杯傳法醖仙樂奏宫懸願祝君王夀齊稱億萬年六成五彩昡晴虹神都王氣鍾石城嚴踞虎鍾阜鬱蟠龍宫闕天光近金湯地勢雄四方均貢賦萬國敬來同皇朝崇祀典聖主每齋心天地嚴昭格神祗肅降臨牲牢歆大享金石奏淸音三獻精誠至端知錫福深創業知非易圖安念守成帝心常簡注皇業在經營修德承天意推誠軫物情一人恢大業萬國仰升平盛典稽前古皇心協至公建諸安國本裂土錫王封玉册加殊禮金支衍大宗群臣無以贊三祝但呼嵩宵旰思賢切旁求滿四方山林登隱逸朝野慶明良際遇風雲會曕依日月光同心匡盛治竹帛永流芳中國聖人興羣方仰大明海波俱帖息年榖屢豐登玉帛來諸國梯航貢上京臣民咸舞蹈萬歲賀朝廷還宫洪惟聖主端冕凝旒髙躋舜禹逺邁殷周功成治定禮備樂修受天之祜萬歲千秋輔雩壇祝舞歌辭宋濂周官有司巫掌群巫之政令若國大旱則師巫而舞雩漢法夏不雨祀竈毋舉土功更火浚井暴釡于壇杵臼于術為四通之壇於邑南門外方七尺植赤繒七其神蚩尤祭之赤雄雞七玄酒具淸酒搏脯祝齊三日服赤衣拜跪陳祝辭以丙丁日為赤火龍一長七丈又為小龍六長三丈於南方皆南向壯者七人皆齊三日服赤衣而舞之司空嗇夫亦齊三日服赤衣而立之鑿社而通之閭外之溝取五蝦蟇錯置社之中池方七尺深一尺酒脯祭齋衣赤陳祝如初取三歲雄雞猳豬燔之四通神宇令民闔里南門開里北門幸得雨報以豚一酒鹽黍財足以茅為席然周制久廢典午以降漢法亦不行而祝辭尤闕歲丙申夏旱羣巫雩于山川之神豫既書其事授之復輔其辭使巫歌舞焉於泰鴻冒下民動以化時屈伸熚朱鳥萬物甄亢則害陽畢蠁耿曜振霈充盈神心暢樂茫良四宇綏萬國洋洽大康慶昭膺廣漢難辭宋濂難古禮也周人三時皆行之春冬之季難難隂氣也仲秋之月難難陽氣也蓋二氣或佚厲將乘之為災故難以止焉其制命方相氏帥百隸索室毆疫以逐之又磔牲以禳四方之神漢襲周制而其儀加詳選中黃門子弟百二十人為侲子赤幘皂製執鼗方相黃金四日蒙熊皮玄衣朱裳執戈揚盾十二獸有衣毛骨中黃門行之冗從僕射將之以逐惡鬼於禁中夜漏上水朝臣會侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乘輿御前殿黃門令奏曰侲子請備逐疫於是中黃門倡侲子和其辭凡八十言繼作方相與十二獸儛歡呼遍前後省者三持炬火送疫出端門門外騎士以次傳火棄雒水中自漢至今朝廷之難雖廢而民間猶有存者先臘一日巷萌社隸飾鬼神貌御五色龍虎文衣巡門擊鼓而難之豫惡其言鄙褻因疏古者用難之意復廣漢辭使習焉其辭曰陽隂乘化左右而行日歷昴畢得積尸大陵其氣勃芒更涉虛危墳墓西司鬼官攸房厲附強隂而降于釁殃咨爾十二神宣其威良焱突劒亢胇胃食虎甲作食􅓇雄伯食魅騰簡食不祥攪諸食咎伯竒食夢祖明強梁共食磔死寄生委隨食觀錯斷食臣刳其腎腸窮奇騰根同享於蠱母使害傷咨爾十二神煆爾戎兵出􅛍四方吮厲之􅎺以代酒漿解厲之肌以充糗糧絲厲之腱織以為衣裳斥除慝隂暢回明陽乾坤載清物㮊民卬惟爾神之功神或不蘉上帝是明急急如律令銅井迎送龍辭唐肅伐鼓兮吹簫迎我龍兮山椒龍之都兮何所泉淵淵兮石為戶扣龍車兮乞靈龍不出兮我心若酲我心若酲兮龍寧弗聞我扣龍兮龍恤風旋波兮龍出龍之出兮福豫變旱燒兮為澍龍為澍兮我弗飢返山椒兮雲旗風冷然兮龍之歸迎日辭鳳炙兮麟脯瑶席兮桂爼樂萬舞兮如雲吹笙竽兮龍二女旌子子兮載以輿六蒼虬兮歷天衢雲霈霈兮夜未艾執長轡兮久相待平胡鐃歌鼓吹辭有序楊士竒臣聞兵者聖人所以衛民之具也故為天下國家者不可一二日而忘武備易曰除戎器戒不虞書曰克詰戎兵至若征伐搜狩具見於詩禮春秋皆聖人重武事也洪惟我國家肇膺天命武以靖亂文以經邦列聖相承其道一揆陛下嗣承大統恢弘化理海內海外日月所照臨之地其人皆攄誠效順祗奉方物朝獻闕下惟朔漠殘虜叛服不常屢冦邊陲擾我黎庶乃今歲之秋田榖登場三農畢務皇上因田獵以閲武龍旌所嚮于畿東郊而東北塞垣不遠伊邇遂戒六御親飭邊防車駕􅊩薊州之石門邊報胡虜入冦巳迫塞下上曰天厭其惡俾來就斃乎將士皆踴躍思奮上曰兵貴神速朕以鐵騎先馳赴之當令迅雷不及掩耳爾將士以次徐來即日上率鐡騎三千出喜峯關翼日與胡虜遇虜駭愕出不意謂神兵自天而下也上麾鐡騎為左右翼前包虜陳飛矢如雨虜狼狽死者甚衆餘率褁創退走上以鐡騎數百繞出虜後盡擭之遂斬其酋渠而生縶其衆虜無一迹得遁者遂命將士搗虜巢穴而悉收其部落族屬及所畜聚駝馬牛羊輜重以纍萬計關塞以北羶腥之區蕩然一淸臨邊之氓遂以安枕無虞臣惟皇上聖志宵旰孜孜篤在安民車駕之初出也因農隙以講武事因所歷以飭邊防非有意殺伐也而天絶醜虜將受其命於聖明故使之豺豕跳踉而天戈一麾瞬息之頃灰滅澌盡此皆本於皇上愛民之仁得天助佑而明斷天縱英武神奮遂建廓淸之大功蓋近代帝王所鮮有也臣嘗考見古昔盛時帝王建武功者皆有鐃歌鼓吹樂辭𬒳之絃歌用示永逺臣忝執筆從屬車後目睹聖武神功之盛不能自默謹倣漢唐篇數撰鐃歌鼓吹曲辭十二篇庶幾宣著盛美於無窮焉謹録上進伏惟􅐶覽秋榖既成農事告畢車駕因田獵以飾邊防為田獵第一皇聖仁恤元元勤宵旰保厥安皓氣肅零露溥田榖成農乃間駕六御獮于原飊蕩氛景凝春導旗常翼旟幡衛弓矢從羽于鑾雍雍鼓闐闐行郊畿歷山川遊豫時兆庶歡右田獵之曲二十二句車駕及石門驛邊城奏虜入冦遂定親征為邊奏第二嚴警蹕先皇輅坦坦砥如薊之路東石門狹以阻士鷹揚奮飛度有來匭函奏龍御謂胡犬羊呈邊侮皇曰噫嘻胡曷恃而來自投于隕天俾之天所俾豫敢稽斫厥渠縳厥徒胡之殱其在斯右邊奏之曲二十二句車駕出喜峰關道狹而險將士奮勇以從忘其勞焉為度關第三度關山履巑岏狹以峻十步九屯旅肅肅氣桓桓淩奔崖越飛湍斂旄鉞包旌干潛鋒韜鍔捷羽翰龍御所歷祥景暄虎豹遠遁迹隂霧披以散但望殺氣逺塞垣虜冥昧尚恣凶殘皇威一震奮擊下九天右度關之曲二十二句車駕出關一戰殄虜悉戮其酋渠生縶其徒為皇武第四皇武揚奮自天智以勇機捷神左麾右斥鐡騎奔棬如電掃呼霆震裭虜魄攝虜魂摧虜陳蕩虜群蹂躝泥滓揮埃氛燎毛斧枿歘巳塵停龍劒息虎賁霽天威怡天顔右皇武之曲二十句分命將士索虜巢穴用竟天討為天討第五麾將校窮幽僻搗巢窟歷山澤索種類搜部落逐聲影躡蹤迹驅孳畜舉聚積囊包席捲垂萬億氛翳蕩羶腥滌隂山淸瀚海碧曠澄明漠之北萬斯年神武績右天討之曲二十句凶憝既淸遂撫安邊氓為安邊第六斬蛟鰐禽犬彘疆埸靖寧聖不忘備修防禦申警戒咨爾邉之氓我綏我懷祛爾害災康爾危爾勤爾生罔畏疑力爾田桑去爾寒與飢爾老爾安爾幼爾慈疇爾厲辟以治疇爾厲豫在茲右安邊之曲二十句武功既成詔告中外為武成第七皇仁威靖疆圉皇聖志布昭于下渙德音周率土維時蒸民受天之付與圖保厥付勤旦與暮有其毒之敢康弗赴斫之縶之匪豫志究武敬天之付亦承厥佑助猗皇仁承天祐右武成之曲十八句邊圉既寧下令班師為班師第八氛塵息邊徼清武功建皇心寧鐃簫作凱奏興六龍御八鸞鳴祥飊翼輦慶雲承旌傳警修途班師上京大明行天川嶽光榮太和融鬯萬物遂成美洋洋騰頌聲右班師之曲十八句車駕旋京行獻俘禮為獻俘第九維大寶承于祖考維下民祖考後保克時永保維皇聖孝維皇聖仁惠保暨濵徼彼狂以擾肆用劉勦䤋與俘祗告清廟剪稂與莠榖用秀好維祖考之制欽率允蹈皇神武往有耀右獻俘之曲十八句既旋勞賚將率為將勞率第十皇振旅皇明堂賚將率以勞以享奏常武歌杖杜皇曰爾來豫股肱心膂維時武功俾民遂保豈維子克奮汝良豫輔咸拜稽首維皇神武聖謨斷自天康時兆庶右勞率之曲十六句武功既昭丕隆德化為隆德第十一皇統御政化明威服德懷洽萬邦傾誠來歸筐篚相望蠢彼孽虜性豺狼獨反側靡常窺間伺隙為冦攘皇震怒神武揚天戈振一掃澄淸蕩蕩寰宇如砥平􅐤弓戢矢韜五兵尚飭干邊防嚴禦備式永寧坐黼扆弘化綱煥禮樂齊虞唐右隆德之曲二十二句海宇泰和天下欣戴咸祝聖明萬萬歲夀為聖夀第十二皇震威皇仁宣溥四表霈八埏日月所照臨雨露無私偏咸足飽與溫禮讓弗愆泰和世堯舜恩國家隆盛海宇安天子御丹扆萬億年福廣大齊乾坤右聖夀之曲十六句代祀漢光武皇帝辭劉定之漢光武皇帝享國餘三十年垂統過二百年祀典越千數百年而弗替何其盛哉竊嘗以為武功文治帝者之所難兼自漢諸帝言之武無競於高祖而以在位日淺故不暇給於文文莫懿於太宗而以繼醴守成故無所事於武兼之者帝也至其量時度力閉關却質置孝武之功於度量之外明慎政體總攬權綱包孝宣之治於範圍之內帝之所就出乎漢諸帝之右有若此者則其盛也不亦宜乎惟聖天子重登大寶祭告于帝而臣實來供事爰述其概而繫以辭曰木蒼蒼兮山風妥玉體兮充宫皇靈兮如在亘古今兮曷窮杳南巡兮舂陵舊鄉過故都兮洛之陽復北返兮至茲稅龍駕兮徜徉鑑芳潔兮禋祀飄何往兮瑶空無際夜闌兮天漢橫炯參旗兮斜曳皇應侍兮上帝之所永錫福兮聖世琴操飛泉操宋濂浦陽玄麓山有飛泉濂與鄭原先生數觀之造飛泉操鼓之琴書諸崖石其辭曰飛泉兮瀏瀏洗耳固非兮誰飮我牛覆謂我汚兮移彼上流具人之形兮奈何忘人之憂琴操二首客有吏於海東者以能擊貪暴聞然終用是受誣嘔血死豫友胡徴君為著哀辭一通豫讀之甚悲竊取其意作哀海東傷姪女二操使善琴者彈而和之客之鬼或有知則其鬱鬱之氣庶幾少伸矣乎辭曰我哀東海而思之苦彼何人斯猛噬如虎我不擊之我民之憂縱不我與覆以我為仇蒼天雖高冤其有極非血之嘔曷明心赤泱泱大風沉沉寒泉舍旃舍􅏧我尚何言右哀海東有姪者女顔如舜英詆我以醜我其何傷眩白為黑古亦多有自尤不遑敢誰之咎黃鵠飛來其音誾誾我心苟安何戚弗欣天上地下命也奈何命也奈何焉知其他右傷姪女思沂操胡翰曾氏有居越者眷焉不忘曽之舊鄉余以聖賢之道不下帶而存也作思沂操以廣其志云沂之水兮泱泱曷不歸兮以浣我裳我思兮孔長沂之水兮湜湜曷不歸兮以沐我德我思兮心惻沂可思兮亦可泝豫鼓而舞兮喟吾之與兮風雷引烈烈兮轟轟為飈兮為霆迅發兮震驚薄太虛兮下上聲謂天懠兮孔仁孰司柄兮赫厥靈民無愕兮載寧威既揚兮沛澤零在陳操劉基彼山有揚兮彼隰有栩彼路斯何兮孔棘且阻玄雲杳冥兮不日以雨重華寂寥兮誰與晤語茫茫九州兮孰為豫所龜蒙無人兮駕豫歸處古琴操王禕春秋時晉大夫有從事于外而不得飬其母者作皇天操皇天至仁冒下土兮林林總總各獲其所兮我獨何為不得以飬其母兮育我鞠我亦巳太苦兮飬之弗時我何為者兮自我徂征離此膝下兮有食孰以食疾痛其孰摩撫兮我之念母心焉如縷兮母之念子亦豈寧處兮皇天之毒我其終我祜兮右皇天操凡十韻戰國時楚臣有忠其君而𬒳竄逐者作江漢操江漢滔滔曰注于東只豈惟江漢百川朝宗只臣之事君所盡者忠只臣忠之盡見謂為狂只我君聖明如日正中只豈弗臣察其或未遑只抑臣實有罪盍反諸躬只自今以往矢益竭衷只臣雖身逺臣心上通只臣心之通君終臣容只謂臣不信江漢其同只右江漢操凡十一韻廣琴操十首拜序朱右操者操也君子操守有常雖窮厄猶不失其操也其音節固古詩騷辭之體然詩以興騷以怨操以操作廣琴操廣云者題義因韓子之舊也將歸操孔子之趙聞殺鳴犢作河之深兮誰將厲之河之淺兮誰將揭之河洋洋兮不我濟之竭澤以漁兮蛟龍辟之覆巢夭胎兮鳯凰去之夫人有知兮豫實類之九州博大兮將豫遂之猗蘭操孔子傷不逢時作習習谷風以隂以雨巖穴幽阻誰其晤語猗蘭之芳燁燁其光不我佩服昊天孔明子如好修維我之求子如不好於我何郵龜山操孔子以季桓子受女樂諌不從望龜山而作維龜有山造𥘉鴻𪷟自龜之東淮夷來從膏澤既施草木實多周公上天奈龜山何越裳操周公作天之聰兮聵聵其音天之明兮窅窅其深天之仁兮實臨下民文王在上兮於穆不巳浩浩其天兮時眻時雨越裳來臣兮萬物斯覩拘幽操文王羑里作羑之隂兮罘罘羑之室兮幽幽嗟室之人兮為死為囚匪維伊愆兮實我之郵日月有明兮容光弗留岐山操周公為大王作自邰有家干夏之先克承弗怠瓜􅚩綿綿開我邠宇衍我宗禋嗟狄之人敢乘以姦彼岨矣岐將遂于遷既有我土母戕我民履霜操尹伯竒無罪為後母譛而見逐自傷作驅車驅車車行無遲兒在中野父寧不悲驅車驅車車行無違兒當有母孰使貌飢天生衆民罔不同仁風雨霜露實活我人民生有知以順天賦雉朝飛操牧犢子七十無妻見雉雙飛感之而作雉于飛山之陲孤雄啄羣雌隨雉于飛音下上隂陽和鳴聲惕胡我人朝出薪入無家徂歲年别鵠操商陵穆子娶妻五年無子父母欲其改娶其妻聞之中夜悲嘯穆子感之而作黃鵠雙飛朝隨暮歸山川悠邈不女乖離今當乖違且復徘徊女啄女飲毋使女悲殘形操曾子夢見一狸不見其首作狸維獸不見其首我夢之形吉凶曷究式協于占載觀其繇曰修爾躬自天之佑望歸操髙啓哀周復子死於虎而作兒旦而出于山之麓兮兒夕不歸在虎之腹兮我往無所榛蒙蘢𬒳谷兮嗟爾耽耽弗食我豕犢兮穴亦有子胡寧使我獨兮
