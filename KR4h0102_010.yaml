body:
  text: 論樊噲高啓樊噲武夫也嘗携劒摧鋒從沛公以藝災墾害人所壯之者不過以其能脫戲下之急爾余竊以噲有可賢者焉初沛公之入咸陽也見秦之宫室帷帳寶貨婦女欲留居之因噲之諫遂遷屯霸上不然則逸欲遽生蹈亡秦之覆轍何以慰父老之心起范增之畏而解項籍之怒乎恐漢之為漢未可知也史言當時諸將皆爭取金帛財物蕭何獨先入收丞相府圖籍藏之觀噲之能諫上則其不為是可知矣及高帝既老嘗有疾惡見人詔戶者無得入羣臣何雖為相亦莫知為計也噲排闥而入見上獨枕一宦者卧因流涕以片言悟之其憂深慮遠有可為大臣者矣豈絳灌等比邪而或者乃以帝嘗欲殺噲恐百歲後從吕氏叛也嗟夫噲起屠狗以至封侯亦足矣况其賢如是乎且帝素少恩又何有於一噲論者誠刻矣哉李泌甚矣小人之凶人國也天下之至親篤愛出於天性而不可以言間計奪者莫父子若也然其變往往有至於殺其子而不疑弒其父而不顧者何哉小人間使之也沙丘之禍成於李兊湖城之恨發於江充若潘乙楊素之流又不可以悉數蓋小人懷傾險之情挾姦亂之術居人父子間投隙抵罅常幸其有事以茍一時之富貴故必以利蠱人子以害脅人父挾讐所親而嫉所愛一為所惑則父不得為慈父子不得為孝子夫父不慈而子不孝則人道滅矣豈有人道滅而可以為國乎此小人之所以必去而勿用也嘗觀之於唐太宗賢也而承乾不能全其生玄宗明也而子瑛不克盡其死至於肅宗之昏孱德宗之猜忌而太子卒得以不動者果誰之力哉一李泌而巳耳當是時倓有功也而李輔國嫉之誦無過也而張延賞搆之二子蓋岌岌矣賴泌居其間左右彌縫上下歡悅纍數千言皆出於至誠盡忠之意委曲剴到悽惋惻怛有足以感人者故聽之讒疑之迹廓然而雲消渙然而氷釋既悔且悟不覺其泣下之霑襟也乃知天性之良有終非小人之所能掩者特患無君子以發之耳茍皆得泌則天下豈有相弒殺之禍哉昔曹公以丁儀之譛亦欲廢其子問於賈詡詡不對公問其故詡曰屬有可思故未即對耳公曰何思詡曰思袁本初劉景廾父子也公大笑而罷蓋曹公智者也故雖聞他人之事而有悟有不待於辭之畢若二君者亦嘗親厄於其身親觀於其目矣然至於此非泌之忠反覆善諫則猶未必其國本之不搖也然則君無曹公之智臣無李泌之忠而小人是信則雖父子猶不能自保可不慎哉民政論方希古治天下者固不可勞天下之民以自奉也然不能使天下之民知道而易使亦豈足為治乎當昔之未有君臣也民頑然猶鹿豕猿猱餒則食飽則奔迸跳躑而不可制欲駲之且不能况使之乎聖人者出知其散漫放恣無所統屬非久安之道也於是制上下之分定尊卑之禮俾賤事貴不肖聽乎賢由胥史以至於大夫公卿由子男以至於公侯各敬其所宜敬而各事其所宜事居乎上者猶未以為足也復制治民之法使五家為比二十五家為閭百家為族五族為黨萬二千五百家為鄉以屬司徒五家為鄰五鄰為里里四為鄼四鄼為鄙鄙五為縣縣五為遂以屬乎遂人聯之以五兩卒伍師軍以知其數習之以師田飮射祭祀讀法以一其心書其善以作其氣罰其惡以折其驕六畜車輦旗鼓兵器之稽可按籍而知老壯弱少可任與否不必問其民而具上有所興作朝出一言而暮巳集進之則前退之則郤其民常知恭順忠愛事上為當然不敢少有忿怨避縮之意三代之時非不役民也而未嘗有一民敢發不遜之言豈其威力足以制之哉其法素備其教素明民皆知道而易使故也戰國之君不知先王之用心務為易簡之術以為不必如先王之煩密過慮亦可以為治斥絶遺典而私心自為既巳失矣而秦又並燒除刮絶之不復有為治之法徒任刑罰以劫黔首譬之去悍馬之羈靮而臨以鋒創彼有蹄齧騰躍而走耳安能以可生之身蹈必死之禍哉故斯民至於秦而後興亂後世亡人之國者大率皆民也其禍實自秦始秦之民即三代之民也在三代之時則尊君而附上當秦之時則驁狼凶戻視其君如仇讎豈民之過哉無法以維之無教以淑之而不知道故也二家之童其一自幼教之以拜跪順悌其一恣其詈言誶語而不禁他日犯上而賊倫者必自幼不教之人其知教者必不至於有過也治天下者未嘗願天下之不治而不修致治之法猶願無死而不食也故亂之由非一端莫甚於治民無法治民之法既定世有叛將亡卒挾姦而肇釁縶而至殺之易易耳亂亡所以相踵者無賴者為之倡好亂之民皆起而從之也使斯民皆知君臣之義或有狂夫怪民出乎其間衆縳而告于司冦何亂之能成兹欲復井田行周禮如先王之時固難也獨不可稍取先王之意為之法乎今之役民雖不能歲止於三日亦未至於勵民也終歲休于家縣官役之以數日之事已若為所不當為發憤懷怨而就道甚者或逃匿而不從上之威令方行而民巳如此設而威令有所不行何望其從上之命乎此治民無法教民無道而不知君臣之義使然也為人父者未必皆無過舉然子不敢逆其命者以父子之倫不可悖也人君之政豈能皆合乎人心苟不知君臣之義少不慊所欲則攘袂而起其危亦甚矣烏可以為不急而不務哉欲民易使莫若倣鄰里鄼鄙比閭族黨之制執其中而用之為之正若長者月申之以讀法開之以士訓春秋合之以祭祀和之以飮酒導其忠順之道罰其不率令者遇有徴發以趨事為先者為上而厚賞以勸之以訕訐敗類者為下而屏黜以愧之上之人又能躬行以成俗立學校以明教則民可漸化矣然必制民之産使之無死亡之憂然後可苟驅不能自存之民從吾之令雖堯舜之仁周公之智有所不能况三化之舊法乎故民易治也在乎治之有法決之可行也在乎養之有道明教天下非無才也聚數萬人養之十餘年而未見有一人可稱者養之無其漸而教之無其法也古之善育才者豈能益人以藝分人以知哉養之之具素備能使人以不成才為病不若人為耻各思勉為君子而不可止也故其自少時居於閭族而閭胥族師不責之以敬敏任恤則之以孝弟姻睦雖未有學其本固巳美矣及其漸升于大學求之六德以觀其內試之六藝以觀其外行完而德備藝成而器良然後措之於用其詳且慎也蓋如此後之所望以為才者執子弟於販鬻之區芻牧之場被之以衣冠而納之於郡邑之學終歲期月大學有徴焉則又納之於太學計其所習未知拜跪之節興俯之容而巳肆有爵祿之心大學舉而教之者又不越乎誦詩業文挾弓矢角膂力恆人之淺事歷時未人有司有求焉則以應之卿大夫之位有缺焉則以為之為之者既不自知其不可而命之者亦不責之以其所學於是學者以習恆人之淺事昌竊祿位為得計莫不相勉為恆人而自謂不必修君子之事也太學之所聚郡邑之所教咸有苟且之心無賴之行冀其才之成奚可致哉夫國之立學所以養才必不期其至此也為學者雖無志於道德亦不必自望為恆人也而卒不能有成者無他用之速而教之踈也古之六德智仁聖之事顏閔之所不能及六藝禮樂之度數即文孟子之所不能詳射御之工杜預羊祐之所不能兼書數之法君子猶有所未習今欲責學者皆法古人而盡備之宜其未易為也然不法古人而惟弓矢膂力是效誦書業文是為亦未見才之可成矣然則何由而設教乎蓋聖人之取人德不求其全而取其不違乎道藝不求其備而貴乎能致其精唐虞以九德待士而有三德者亦俾為大夫有六德者亦俾為邦君聖人豈不欲得全德之人而用之哉以為求人大全則天下無全才不若因德命官之為無失也皋陶未必能逹禮益稷未必能知樂而皋陶益稷所為之事伯夷后夔宜亦有所未能然而數子為之各稱其位而成名于後世以其精而不以其備也人惟行可以自力苦才與藝則有能不能欲強而通之非惟不得其所不能且將並其所能者而失之故善立教者亦必本之以六行餘則因其質而設其科人有剛毅而重厚者有慈良而順愛者有踈遠而明斷者有強識而通敏者有沉勇而有威者有多力而任武者此六人者使曲徇衆人所能必不能堪茍因其所有而教之於成才也奚難剛毅重厚者必可以任天下之大事則因而教之博通古昔之政教問知海內之得失觀其損益折衷以驗其為弗使色厲而偽者得參之則大臣之儲也慈良順愛者必可以治民則因而教之平賦施惠之方賑災恤患之道辨邪察獄之事理俗興化之要弗使柔佞而詐者得參之則牧伯之儲也強識而通敏者則文學典禮之臣之儲也沉勇而有威多力而任武則將帥之選疆埸之所恃也各以其所當習為者教之而皆不使近似可悅之人得與則所用無非才而所為無僨事矣此太學之政也而為師者非極才德之美不可也大學推其法行之於郡縣俾亦以六科為凖郡縣之取弟子貟也問其宗族鄉黨皆言其篤行而好學則取之而復其家田百畝入太學則倍復仕而有政則皆復學于郡縣者與郡祀與燕會禮異之使殊於恆人縣每科四人二歲各升一人于郡郡每科十人三歲各升三人于太學太學每科百人為率以應上所任用郡縣既升而闕則即充之廩之也宜厚教之也宜詳試之也宜嚴用之也宜當知人之學之可任也則不怠於自修知各因其才而用之也則必謹於自立而天下之異才咸思有為於世矣為治者不患乎無才而患乎聚天下之才而不能教用天下之才而不能擇教之而能成其德用之而能不遺其器則才豈可勝用哉胡貊之富人聚馬盈谷而得一善馬善御者執鞭䇿指揮而區别之一日馬之致千里者以百計而盈谷之畜無棄者御非能假馬以力而易其性也能别其高下而不失其性則善馬出矣為治者能不失人之性豈特不患乎無才天下亦安所患哉啓惑天地之生物有變有常儒者舉其常以示人而不語其變非不語其變也恐人惟變之求而流於怪妄則將棄其常而趨怪故存之而不言後世釋氏之徒出意欲使天下信巳而愚舉世之人於是棄事之常者不言而惟取其怪變之説附飾其故以警動衆庶其意以為此理之祕傳者人不及知而我始發之遇一物之異常輒張大而徴驗之欲稽其故則荒幻而無由欲棄其説則似是而可喜凡民之愚者皆信而尊之奉其術過於儒者之道而不悟此真可悲也夫運行乎天地之間而生萬物者非二氣五行乎二氣五行精粗粹雜不同而受之者亦異自草木言之草木之形不能無别也自鳥獸言之鳥獸之形不能無別也自人言之人之形不能無不相似也非二氣五行有心於異而為之雖二氣五行亦莫知其何為而各異也故人而具人之形者常也其或具人之形而不能以全或雜物之形而異常可怪此氣之變而然所謂非常者也非有他故而然也今佛氏之言以為輪回之事見無目者曰此其宿世嘗得某罪而然耳見罅唇掀鼻俯膂直躬者曰此其宿世有過而然耳見其形或類於禽獸則曰此其宿世為鳥獸而然耳不特言之又為之書不特書之又謂地下設為官府以主之詭證曲陳若有可信而終不可詰此怪妄之甚者也天地亦大矣其氣運行無窮道行其中亦無窮物之生亦綿綿不息今其言云然是天地之資有限而其氣有盡故必假既死之物以為再生之根尚烏足以為天地哉譬之炊黍火然於下氣騰于上纍晝夜而不息非以已騰之氣復歸于甑而為始發之氣也茍人與物之魂魄輪轉而不窮則造物者不亦勞且煩乎非特事決不然亦理之必無者也且生物者天地也其動靜之機惟天地能知之雖二氣五行設於天地者不知之也使佛氏者即天地則可今其身亦與人無異何以獨知而獨言之乎多見其好怪而謬妄也今有二人其一人嘗逰萬里之外而談其所見則人信之茍其身亦與我俱處乎此而肆意妄言則喪心狂惑人耳雖鄙夫小子亦知其妄且誕佛氏務為無稽之論正類乎此而人皆溺而信之豈皆不若鄙夫小子之知乎何其迷而不知悟也悲夫鬻拳鬻拳以兵諌楚文王而自刑左氏稱之為愛君余謂不然君臣之際固有常道矣賢者之事君不為違道之行以危身不為難繼之事以駭世順其常不徼異名守其職使後可法如斯而巳不敢僥幸以圖志之必逹事之必成也故君有過舉則積誠以諌三諫而不從則避其位而去之安可臨之以兵脅之以威而劫其君哉語之而不聽則讋懼之咄吒之俾不敢肆此制嬰兒之術耳烏有北面事君而以嬰兒視之哉先王立為上下尊卑之分俾為臣者嚴守之而不敢僣所以杜亂也馬之在原野三尺牧𥪡鞭之而無罪及加羈靮而入君之間雖國之貴臣不敢視其齒而蹴其芻豈誠重馬哉尊其為君之所御也齒馬蹴芻細故也先王所以嚴為之禁者其慮天下深矣况以兵劫其君者乎或謂君為非義則將危社稷大臣以安社稷為心行權以格君宜若無罪焉是豈得為權哉事固有可以行權者矣然賢者猶難之若君臣父子之分天下之大經也父暴而違道子烏可行權而誶父乎舜聖人也瞽瞍頑夫也舜視其父之惡夔夔然順之不敢見於色設於詞舜豈不欲格父哉盡子之道而使父化乃所以格父也紂之暴可謂甚矣箕子紂之戚微子紂之兄二子皆賢人也至親且賢事暴君而不敢失人臣之禮或屈而為奴或待其亡而去之二子豈不知社稷重於君乎終不忍劫其君者知君臣之大經重於社稷也鬻拳之君雖有過非紂之甚煮拳為臣非若二子之親且賢乃忍劫其君而不顧蓋激於小忠而不知大義者也焉得為愛君乎君子之豫奪人將以法戒於後世不可苟也劫君而謂之曰愛君將使姦臣亂賊欲行篡弒之事者皆挾愛君之名以自文其禍後世可勝道哉然固左氏啓之也樂毅燕昭王師築宫師事郭隗樂毅自魏往拜為亞卿後伐齊封為昌國君樂毅不拔二城夏侯太𥘉以為庶幾乎湯武蘇子瞻以為行王道之過余曰鄙哉二子之言也天下豈有行王道而不興者乎觀人之賢否當先觀其所為之事求其事而不得當求其用心之邪正湯武所以伐人之國其心曷嘗有利天下之意乎不忍斯民之困於塗炭挾大義而拯救之使取錙銖之非義殺一介之不辜雖奉海內之籍而歸之湯武不肯正目而視也其心顯然著於天地之間故拔一城取一國他國之民惟恐其來之不速翹足舉首而望之此其為王者之師也使湯武之心少出乎利匹夫匹婦將持耰鋤而逐之矣何以為湯武哉彼樂毅之師豈出於救民行義乎哉特報讎圖利之舉耳下齊之國都不能施仁敷惠以慰齊父子兄弟之心而遷其重器寶貨於燕齊之民固巳怨毅入骨髓矣幸而破七十餘城畏其兵威力屈而服之耳非心願為燕之臣也及兵威既振所不下者莒與即墨毅之心以為在吾腹中可一指顧而取之矣其心巳肆其氣巳怠士卒之鋭巳銼而二城之怨方堅齊民之心方奮用堅奮之人而禦怠肆巳銼之讎毅雖百萬之師固不能拔二城矣非可拔而姑存之俟其自服也亦非愛其民而不以兵屠之也誠使毅有愛民之心據千里之地而行仁政秦楚可朝四夷可服况蕞爾之二城哉湯武以一國征諸國則人靡有不服毅以二國征二小邑且猶叛之謂毅為行王道可乎湯武以義而毅以利成敗之效所以異也蘇子乃謂王道不可以小用小用之則亡王道特患乎人之不行耳小用之則小治大用之則大治猶之菽粟之療飢小食之則不死恆食之則充實奚可謂菽粟不可少食而寧噉粳核之為愈乎大初曲士不足論獨惜蘇子之易於言也丙吉君子之於天下盡人事而後徴天道天道至微而難知也人事至著而易為也捨易為而求難知則為不知先其微而後其著則為失序堯舜禹益相告戒之辭詳矣傳道則曰藝中用人則曰九德治民則曰六府三事至論天道則曆象授時之外未嘗有片言焉三聖賢之於天道豈有所未逹哉棄所宜為而求之恍惚詭誕之域者固聖賢之所不取也宰相之職上有以格君下有以足民使賢才列乎位教化行乎時風俗美於天下倫理正而禮樂興中國之尊而夷狄服生之倫各遂其性而無乖戾鬪爭則可為盡職矣不必􅃮􅃮然探其所難知以為觀美也能盡其職雖日月失明寒暑不節無害其為治職有未盡使天地位而萬物育亦安所益於民乎漢史稱丙吉不問死傷而詰牛喘以為知大體此非君子之言民不知道至於相殺傷於都市之內政教不振而俗隳壞其為變亦甚矣豈非宰相所當憂乎舍此不問而恐隂陽不和何其迂且妄也子路問事鬼神子曰未能事人焉能事鬼不先盡事人之道而事鬼且不可况不務人物之性而徴不易知之天道烏在其能為相乎且宣帝時俗之弊非特相殺傷而巳一歲中子弟弒父兄妻妾弒其夫者二百二十餘人幾不可以為國吉不能佐其主以仁義使革風易俗陷斯民於禽獸而惟一牛之問謂之知所緩急不可也漢儒之學泥於術數而不知道其流至於蔽而不通愚而信怪雖可稱如吉者猶溺焉而不以為異况不足稱者乎天下猶人身然風俗血氣也災祥肥瘠也戕刺其體膚而不問見瘠者而問之人必以為惑矣察於細而忽於巨惑莫大焉而以為知大體可乎然則洪範之説皆不足信歟非然也庶徴九疇之一也必以人事為之本盡人事而後徴天道者吾之所知也信災祥而遺人事者漢儒之謬洪範之蠧也非君子之道也東漢天下之患固不可逆料而預防之也吾計禁乎此後世之患出乎彼吾謀杜其西後世之患生乎東禍亂之端神藏而鬼伏常發於人所不疑之地而起於世所倚賴之人雖知者何由而盡備哉然古人善慮國家者每事揆其始而考其終喜其成而憂其敗四海之事千載之業綜包參核於吾之胸中而定他日為患之大小緩急推其得失而為之僃使禍害之發不至於亂亡則庶乎可以盡吾心焉耳固非迷塞消沮能使之久而無患也武王周公之初定天下其心豈不知封建之弊必至於并吞削弱而不振也哉然恐易此道而更為異法未必若封建之可以安且久也故且勉而為此使治之有道者可以無亂失其道者亦不亟至於亡不敢過為矯激難守之法以為將來患也乘舟而渡水時有覆溺者人終不以一溺而廢舟駕馬行遠或有躓跌之失人終不以一跌而不駕在乎輔其罅漏不完之處習其馳騁疾徐之節使愼之而巳前漢王莾之篡在乎元成失道上無明主下無正臣故莾得恃太后之勢而行篡竊之計非以三公輔相委任之權太重而然也光武過懲其弊而力矯之不任三公以事而政歸于臺閣其後遂成宦寺之禍而漢以此亡光武以為莾之得成其篡者權太重耳今吾奪其柄則其害可除矣孰知宦寺之禍反有甚於輔相者乎此不熟究其大小緩急之故也夫莾之篡以母后臨朝外戚預政而致然豈委任太專之罪哉光武能著為令典藏之宗廟俾後嗣有幼君在位當選厚德大賢之士為三公以輔之而不許母后外戚臨朝預政則其害可以息矣不此之思而惟罷三公之制宦寺之興始於此矣蓋宦寺恆以傳閨閣之命受襁褓之寄而妄作威福苟外有良輔以持其柄內無母后為之依怙雖曹節王甫充溢乎宫闥亦何患哉可疾者不疑而疑輔相末路之弊也遂使三公除拜皆以賂遺宦者而得雖欲免乎亡亦難矣王公之位古所謂共天職治天民者也苟擇當世之賢才而置諸位撫手而責其成功可也專橫之禍何自而致哉事變亦衆矣然不察之以至明推之以至公處之以至當徇斯須之細故而輕於變更惜哉光武之鋭於求治而未逹乎大體也崔實昔者觀孔子之書見其於子貢仲由之徒善於説辭必深折而重抑之明足以億事未為有過也而傷其多言以仕為學未為違道也而惡其口給而近佞心常以為惑奚孔子不貴於言若是邪及觀戰國之際天下之士皆棄道德仁義而不修以口舌磨切世主而覬勢竊柄大者亡人之國小者自殺其身又甚焉者著為邪説以為後世害紛然出乎斯道之外流於刻薄荒鄙誣民敗俗之歸而不自知也然後喟然歎曰此孔子所以聖乎其預知之矣凡亂之生必有所始也芻靈之弊必至於以人殉葬象著之弊必至於瑶臺璚室孔子之教人以勿易於言而周卒以口舌縱橫之辨而亡夫言豈可竒哉快意於一言或足以禍萬世發憤立一事或可以禍異時矯當時之失不求古今之變而輕於持論非知道者也彼崔實者獨何人哉憤時君之柔暗則論柔暗之失可也遽為邪説不顧理之是非而謂凡為治者必以嚴而治以寬而亂此豈理也耶周秦之效夫人之所能識也實不察乎此而亟稱宣帝之賢夫宣帝漢室基亂之主苛以為明忍以為斷督責以為能當斯世也斯民競知其可畏而不知其所可愛於是高惠文景之澤竭矣譬猶服金石恣聲色之人其外雖若未衰而其中之虛壞已甚至於元帝繼之稍失其術則漢因以衰非元帝之罪也實輕信而不知道敢為異論而不顧其無稽至誣文帝以嚴致平何惑妄之甚哉漢之久而亡者文帝之功也且使宣帝處文帝之時是生一秦也宣帝固非秦比也率其所為行於甫定之世則其異於秦者幾希而豈能治哉治道固有本末先之以政教而後刑罰者秦漢以下皆是也文帝能參之恭儉忠厚之化故治其餘則守法而巳故未旋踵即不免於危漢室至於光武猶再榮之木其膏澤將盡矣明章能扶植培壅之僅至小康孝安以降漸衰而亂固其理也自非仁賢若文帝承之猶恐其不救而實欲濟之以嚴刑峻法此欲救將萎之木而斷其根鄙哉愚儒好高之論也仲長統乃從而稱之此其知與實何異哉自孔子之末學者不明道而阿世韓非之愚至以堯舜為土水而以刑罰為膏梁所聞者卑而所習者陋無怪其為此言也漢之諸儒惟賈誼董相及王吉為庶幾如實與統時人所推為大儒而其論至於與韓無異於乎其所從來遠矣豈特實之罪哉皇明文衡卷之十
