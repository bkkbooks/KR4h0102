body:
  text: 敘重刻文衡後歲乙酉豫總學政按徽郡取視篁墩先生文衡板刻半脫落膚質平漫不可讀携至京屬應天府學教授范震校正重入梓越五月震去代今教授李文會來校督又三月餘梓人工完序曰文豈易哉蓄渟釀富本乎氣􅔿濳浤逸存乎人肆之英精組圭倫訓係之治矢洽音德卓執軌物弗之敢渝成乎教故積以流者氣也弗久弗昌乘以發者人也弗際弗盛弗昌厥盛文弗關之化理以成世教文奚尚乎是故先後天之象設混茫之首開也謨典誥訓虞夏商周之元良也詩書禮樂裔埀至今不廢化理之自文教之樞也左之浮公穀之誣春秋戰國之隂賊激烈後世不并經訓又可推也嗚呼文豈易哉夫昔宋南鼎偏中原割裂胡元虜運天日廢湮三光五嶽之氣孕和葆秀昌發固待我明也聖祖首出洗刷振飾列聖紹休豐培厚衍是宜諸公肆之乎文即今讀之我有憲天之制禮無姦神人分無瀆我有範世之典以剸以裁以匡以表倡敘民則戎夏各正其方經國有規而我明之蕃宣嶽牧朝享報聘言動書史以承大小以列卑貴綱維弗之紊度齊民有具而我率之一道德同風俗惠兹中土光復舊物文至此而豈徒哉駿迅以充氣雋旨以同味規則沉以毅體裁典且蔚渢渢乎洋洋乎涵理而妙得也諸公履開國之運當作育之初侈一代之制鳴其盛以肇文規信休矣哉先生篁墩輯惠後學意不淵乎邇來百六十年文莫盛今日弊亦極矣修詞者叛常失也詭注意者荒馳失也宕取徴者弗稽失也淫誣敘譬者罔類失也強愎飾易淺者失之澀其文怪以怒事深刻者失之和其文拘以削六失生文日病矣甚若奇愁孤憤沈幽悲慨識世者有隱憂焉漓大雅之醇疵至和之美嗚呼弊亦極矣夫豐水有培久之弗渝朴棫正盛出也無窮右文翊治膚奏中興新兹成刻諸公俱可讀也豈無學古而得乎是故殷盤周鼎古可掩今太羹玄酒識者自別嘉靖丁亥首秋之吉淮康盧煥識
