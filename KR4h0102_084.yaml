front:
  text: 皇明文衡卷之八十四
  hash: sha256:3e7cd71da1e1c0f5baf431202f95ffd32f558e5f6e5c314df42a8fbc8cf09405
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_084-1a}
body:
  text: 墓志銘翰林應奉唐君墓志銘蘇伯衡翰林應奉唐君處敬年四十有四以病卒于濠之瞿相山其孤之淳奉骨歸越祔于山隂縣承務鄉赤土山先塋之次而為狀授使者將圖其不朽於伯衡昔歐陽子深慨夫文之復古者難得其人又謂學者文章見用于世鮮矣况得施於朝廷而又遭人主致治之時乎君之文可謂無愧於古矣亦既遭逢盛際而用之朝廷矣然未究其用以一眚之故至廢為耕民而困頓以死其文章迄不得施諸典册遂使一代之詔令不能追還三代之盛是雖曰有命抑豈獨君之不幸歟故於其死也凡知之者無不為之悲而至今論者猶為進退人材者惜焉伯衡知君特深安可使君賫志地下而無一言以白之君諱肅處敬其字也自號丹崖居士世為杭之新城人君之父始遷居越故今為越之山隂人曾祖文源祖榮貴父應麟毋汪氏君生有異質敏而克勤幼從先生王萊山授毛氏詩比長兼通諸經旁及子史隂陽醫卜書數之學無不研究資為古文簡潔而雅奧律詩步驟盛唐樂府古詩上薄漢魏場屋之文持其餘事尤工篆楷深得筆意至正壬寅君充賦江浙中其選以道梗不得上春官省臣便宜授杭州路黃岡書院山長轉嘉興路儒學正皇朝取浙西例起赴南京君以父憂東還洪武三年春用近臣薦召至京師纂修禮樂書其夏擢應奉翰林文字承事即其秋科舉法行預考南京貢士有織文之賜其冬扈從東宫拜英陵有襲衣之賜年夏以疾失朝參例免官歸鄉後例謫佃于濠則癸丑之秋而君以是秋至瞿相山卒於甲寅十二月六日而歸祔以乙卯七月二十四日娶汪氏子男一之淳也強學能文克世其家女一人早卒孫女二人尚幼所為文十卷藏于家庶其不朽者在是伯衡無以加之矣銘曰世所須而或乏駑駘以之駕馭材適用而不急騏驥不免棄置故君之文足以華國而其身竟死於氓隸非人之能不能亦丗之貴不貴也悲夫故元中奉大夫江浙等處行中書省參知政事周公墓志銘至正乙未閔括之冦蔓延平陽且兩歲矣民之黠者跳踉以相附和弱者不能自立於是四境之內胥而為盜耆十六七浙東道宣慰使恩寧普來鎮溫求可屬任者僉薦公可宣慰問所以可者僉曰公以門功輔海口場鹽司令龍江書院邇其治所久廢無能葺公初至謁先聖立勸竈戶新之柱悉易以石不半歲告成亭民項德兄弟積為民患以賂結權勢前後場官少忤之輒遭反噬公竟發其姦罪論如法海口之俗歲正月千百為曹聚東郊擲石謂之禳祈傷攴體不恤有司痛繩以法莫能禁其來久矣公懸榜約束之無一人犯者其俗遂革甫二年得羡鹽四千引以此知其可也宣慰曰即周司令邪我習聞其人便宜命公攝行平陽州事而浙省左丞鐡里帖木兒至自台先是公以副元帥吳世顯政乖其方任用非人變在旦暮毒且及民詣左丞言狀請豫為計不旋踵而陳安國弒世顯其所任治兵于平陽瑞安者亦戕子賊悉如公言左丞由是器公倚公討賊安民給以糧五百石勉令就職人皆以兵食不足沮公無行公曰父母之邦也受命立行隨以所給糧賑飢民曰事無急此不然皆盜也時平陽惟江南鄊阻江為塹鄉民自相團結賊不敢入境公以五月至江南屯白沙禮致大家使輸軍儲設法募丁壯為兵而訓練焉民既用命軍實具而兵日衆或請出師公不許人謂公怯公曰以新集之兵擊數年之冦茍不持重萬一失利損威重莫甚焉後將何以成功在兵書致人不致於人冦至擊之未晚八月劇冦李師金翁瑞突入黃浦江公勒兵渡江迎敵賊大潰斬其馘百餘而生擒數十人兵士請乘利深入公不應俄大閧公堅坐不動徐自定取其首謀者斬以殉而申明紀律遂移屯徑川冦來薄我三合而三捷復遣輕兵衝其後賊駭亂獲其酋金安三吳邦大邦大素健鬪衆之所恃至是獲之賊奪氣追北數十里殺獲甚衆獻俘于左丞仍以計誘致李師金翁瑞及他酋數十皆戮之而散其火伍歸農獨西溪冦恃括冦不下且請決戰紏括冦數萬直搗徑川公曰賊輕我矣今日必殄之部署其衆而下令曰勿擅動聞鼓聲則進望其白旗下多精鋭命士引弓齊發仆其執旗者鼓而進賊不能攴自相蹂躪聲言勿殺我當投降許之張中卿者即趨而前俯伏公撫而遣之還諭衆曰周知州知爾從賊出於迫脅不爾誅降無不宥不者擊尓盡乃已仲卿又盛稱公誠信人人喜曰有生意矣爭棄仗來降上功行省升浙東道副元帥總制平陽瑞安丙申正月別冦葛兆出掠走之獲酋金龍十明年又出襲我覆之獲酋吳天雷等遂命弟誠德分兵擊下瑞安諸寨而歸其民黃宗雲等之辟居平陽者進兵會括分院兵夾攻寇之抄平陽者破其窟穴惟吳悌五遁之福寧王賢五所括分院以誠意德功聞于康里丞相授忠顯校尉同知平陽州事兼行軍鎮撫尋引兵趨象原以逼王賢五方置營而吳悌五領衆奄至誠德奮當其衝突吳悌五中矢其下負以走因其亂剃之僵尸數里未幾購得吳悌五併三恢酋鄭子敬送于閩省誅之經略使在閩遣從事官工部貟外郎曾堅分御賜酒勞之承制擢公行樞密院判官自是平陽之人安於耕鑿以供租稅矣公曰外攘之功粗立其益嚴內治之修乎壁於州南五里而鎮焉革蠧弊平訟獄布寬政行義役與民休息浚河渠若干里深丈有二尺廣倍之築海隄若干丈廣二丈崇半之又興土木之功官署孔子廟學東嶽行宫城隍祠廣福宫悉復其舊內而布教條外而修職貢使者咸出其途迎來送往禮無或遺雖廩無餘粟庚子夏聞京師旱遣弟紹德漕運糧二萬五千石上供天子嘉之賜龍衣一襲及上尊酒真授行樞密院判官階奉議大夫而官誠德以昭信校尉溫州路總管判官紹德敦武校尉同知平陽州事麾下士錫命有差當是時方國珍姪明善以樞判制溫公不為之下而明善忮公屢軋以舟師公屢却之然自念彼不有朝廷况有鄰州乎且彼據三郡而吾以區區一州與之抗終非萬全之計進父老語以故欲委地去聽民自為去就父老曰方虎狼也公於我等數年安全之一旦以遺虎狼忍乎公若終惠我等幸與之修睦公用父老言遣弟明德往謁拘留不遣辛丑夏遣都事張君錫漕貢如初天子益嘉之進朝列大夫同僉行樞密院事降分院印明善舟人在直沽者欲奪印不克壬寅春遂以三千餘舟列營平陽瑞安公四靣受敵激諸軍以忠義人皆感奮屢挫其鋒又遣沒人斷其矴纜乃解去追獲舟二百會集賢院都事興童持詔來勞公乃遣都事蕭天瑞從詔使入貢謝恩且進地圖表言國珍侵軼乞注代天子覽表為下詔讓國珍仍有龍衣御酒之賜超拜中奉大夫江浙等處行中書省參知政事刻分省印使佩之以承德即行樞密判官官誠德國珍𬒳詔大怒調台慶溫之兵來攻相持閲六月隂啖公帳下林淳以厚利使為應三郡兵攻其外淳應於內九月平陽陷執公及誠德紹德以去誠德慢罵明善遂遇害刳其皮焉至死罵不絶口紹德則縋以石而沉諸海送公國珍國珍甚禮公好語公曰省臺貴臣皆聽吾命公獨敢我抗豪傑士哉自今與公釋憾其仍為參政我所公曰我與爾有不共國之仇而與爾共事乎然國珍終不敢害公越三年王師取台慶公與國珍例遣赴南京後公以誠意伯劉基言得放還田里洪武辛亥大臣行邊者復遣赴南京其秋八月壬寅卒于南京享年六十有六後十月壻顧克敏歸其柩平陽以甲寅十二月甲辰葬於睦嶺之原公諱嗣德字宗道姓周氏平陽人宋江隂軍節度推官元贈中順大夫淮東道宣慰副使上騎都尉追封永嘉郡伯汝臨之曽孫元纍贈太中大夫河南路總管輕車都尉追封永嘉郡侯雷轟之孫元太中大夫同知浙東道宣慰使司副都元帥致仕贈同僉太常禮儀院事輕車都尉追封汝南郡侯諡康惠應奎之子也曾祖妣張氏追封永嘉郡君祖妣翁氏妣遊氏並封永嘉郡夫人妻顧氏封永嘉郡夫人次陳氏其壻永嘉陳聰奉事狀求伯衡銘其墓昔我先君以江浙省左右司都事佐戎于栝公無月不通問伯衡不敢以不知公為辭乃為敘而銘之銘曰元運將終並海之邦自租自稅大憝氏方海邦之民亦孔之痗頭箕會斂擢筋盬髓眷兹平陽干方咫尺虐𦦨炎炎何以不及文武周公厥猶克壯天矜于民俾作保障公未至止豈無州牧鄰冦撗行曾莫敢逐凡厥士女東竄西匿寢食不遑矧暇耕織公既至止奮其戎兵招降討逆內謐外寧凡厥士女有室有家爾藝黍稷我種桑麻相時倉廪枵然空虛謂公蹶蹶公則舒舒征從其薄刑用其輕追還舊觀百廢具興先聖之居明神之廬出治之所棟宇渠渠憂彼水旱為民之病以畚以鍤河渠攸濬虞彼潮汐為民之患乃疆乃理作之畔岸維民休戚係公存亡公構閔凶孰不痛傷昆山蒼蒼不崩不墜公功巍巍克類克對我采民謡勒碑墓道無曰不顯終古有耀故元溫州路同知平陽州事孔公墓志銘至正末方國珍據台慶溫用名士以收人心凡士居其地者不為所用則為所禍而其於公也不得而用之亦不得而禍之四方之士聞而莫不高其風國𥘉胡仲淵以王府參軍鎮括將進公于朝而先之以書幣公返其書幣謂使者曰使孔暘一出足為天下重雖強顔從參軍後亦不辭不然何益况吾父年垂九十不可頃刻去左右參軍奈何欲使之胥為不忠孝人邪仲淵愧其言而止洪武元年按察僉事趙壽將使指求賢浙東得公於溫以應詔公終辭不起士益以是高之公神明之胄起家為名進士仕州縣為良吏師學為儒宗當世尊而仰之不在彼而在此也公自幼篤志於學警悟強記絶人而諸經史百氏之書罔不該貫取元統乙亥鄉薦溫之士以春秋貢者自公始方上春官而科舉廢南歸以衍聖公思晦舉署永嘉書院山長未上而科詔復下至正元年再薦于鄉登二年進士第擢衢州路録事階將仕即九年轉從仕郎處州路慶元縣尹代歸以二親年高絶口不言仕進十九年中書參政普顔不花公內臺治書李公國鳳經略江南得便宜除拜承制授公溫州路同知平陽州事使得便飬公奉檄欣然而起其為録事於衢也下車適大旱以郡守命禱徐偃王祠下未復命而雨如注莫不驚異民汪明之兄弟爭家財吏展轉求賂數歲不決公問汪曰兄弟親孰與吏汪對曰兄弟同産吏途人爾公曰弊同産以資途人汝何不思之甚邪其兄弟立感悟叩頭曰不敢復煩官府矣廉訪僉事寶寶公行部蒞衢委以難決之獄凡所平反無不服其明允遂以最聞朝廷遣使分道宣撫過衢得公治狀甚禮遇之其為令於慶元也會分憲余公闕以括賦役不均舉行核實各縣皆擇人往董之惟慶元就以屬公乃令民以田畝多寡自占即不實罪及鄰保立法周而用法嚴民自占無敢不以實賦以田制役以賦定富者幸免貧下重困之患遂除余公自為書遣吏勞以公堂酒學宫在縣西大溪之北公始視事進謁阻水不得前聞舊有詠歸橋直神力院左廢且數十年即經營興復之六月而成其修七百尺其廣三十尺覆以屋為間四十有九來往者便之壬辰歲侵縣西鄙小民六十餘人稱貸於富民弗從強委劑而發其廪以去富民忿之訴公以為強劫公惻然曰彼艱食冀活性命乃爾情亦可矜矣今以其活性命者戕其性命吾不忍為也若何獨忍乎富民愧謝而退閩冦犯縣境公能以義兵擊退之民賴以安急於仕者率縳平民徼賞典公曰軍功與民命孰重輒解其縳而縱之平陽鄉邑也時行樞密院判官周嗣德行州事公不矯以為異不比以為同事無大小一栽以法雖族姻不少假借之君子稱其識大體為平陽三歲丁毋恭人憂解官明年州人以版圖上干職方公與陳子上者慨然有浮海之志顧父判府公在堂子上入閩公羈孤無儔却掃一室名曰潔庵情有所觸俯仰書空而巳後三年而判府公捐館公年六十三而執喪哀毀又十六年公以疾不起洪武壬戌七月二十七日也得年七十有九臨終謂諸子曰吾今而後有以下見曾大父于地矣蓋公之曾大父曰景行宋大學內舍生度宗幸學循故事官先聖子孫賜同進士出身授慶元府學教授升從政即主管禮兵部架閣文字宋亡不復仕是以云架閣之子曰士璘元永嘉縣學教諭後以子貴贈從仕即曲阜縣尹曲阜之子曰㞥用翰林鄭公陶孫薦歷永新州學正龍溪書院山長江州路儒學教授湖口縣主簿慶元會稽兩縣尹以承務郎松江府判官致仕公其嫡也諱暘字子升生於大德甲辰正月十九日毋恭人許氏湖廣儒學提舉淡齋先生善勝之女娶王氏封恭人以大德丙午三月十一日生以洪武巳卯十二月三日卒葬縣西之肇奧子男五人謜説詳訓王出也志側室陳出也詳訓早亡女三人皆已行而卒孫男四人宏寏邃瑩女七人長適林與方次適項愈餘未行平生所為詩文總十二卷曰潔菴集藏于家謜等卜以十六年癸亥十一月十日合葬于肇奧屬其門人蒙隂縣主簿林與直為狀來請銘伯衡晚陋不足以知公竊窺公當運去物改之後不降其志而得明哲保身之道善於用晦而不失出處去就之義可謂無愧古之仁人矣論次而顯銘之百世之下寧不尚有觀感而興起者乎銘曰恂恂孔公宣聖之孫道深皇王學貫天人宏中肆外而鳴以文乃旅俊造乃充國賓乃綰章綬有社有民敏於為政一本於仁世運俄否歸伏海濱大明受命萬國維新求賢有詔使者在門引疾堅卧耳若不聞所執者節匪潔其身優遊令終允矣全臣肇奧之原巋然丘墳勒銘于石千載弗諼魏夫人宋氏墓志銘高啓蘇州守江夏魏公以其先大夫人行述授渤海高啓曰吾妣棄吾二十有二年矣遭時多故權厝先塋之左今始得地於吾里黃岡湖東某山之原將以某年某月某日而葬子為我志而銘之公昔掌國史啓嘗為其屬今又居公之野辱以先銘是屬不敢當然亦不敢辭也按夫人姓宋氏武昌蒲圻人宋彈壓官諱時慜之孫女諱某號俊齋之女同邑隱君子碧崖魏先生諱雲瑞之妻也夫人生而潁異七歲能誦曲禮內則曹大家女訓十歲共女事無闕既長歸先生先生故名家世儒履行高潔夫人相之稱賢配焉居母姑之喪皆過哀疏食終三年待內外親族無異意先生嘗逰齊安遇疾卒於邸有子三人法孫巳孫虎孫初聞訃將遣法孫迎喪或曰江多蛟龍性惡尸以柩渡虞有變宜焚骨歸也夫人哭喻法孫曰是將陷吾母子於太戾也爾忍而父為灰燼乎亟往母有憚而父善人神必相之矣迄渡風浪帖然喪既還或又曰柩入家弗利夫人曰此固吾夫宅也舍之使何適哉茍有弗利當萃未亡人之身未亡人得從夫于地下足矣即惟正堂奉安旦夕哭臨逮葬毀瘁幾不能為生嘗謂諸子曰不幸門戶凋落汝父汝伯相繼殁若曹尚誰賴哉宜力學善自立大汝家以慰老人之望母從里中兒嬉也子皆承教惟謹先生庶母羅氏性素嚴號難事夫人始終奉承有順無忤疾則侍粥藥殁則營喪葬皆必誠焉已孫既娶久未有㣧夫人曰吾老矣獨不得一抱孫也禱于先夢紫衣人種栗舍垣下告曰此萌也為他日興植汝門之本覺旦語巳孫曰汝有子祥也既而果生男夫人喜曰神不我誣遂以栗名嘗得眩疾既間曰吾度不能久處人間矣命舁柩堂下沐之曰吾藏身此中無隙則佳耳又命新婦取衣衾當斂者縣之椸餘悉散諸親愛除夕家人進椒酒夫人起居尚無恙元旦坐堂上親戚為夀畢曰我明日逝矣為我謝某謝某翌日沐浴更衣坐呼已孫等謂曰吾年七十六夀亦足矣死自吾順汝曹勿號慟亂我聽使我得好去也語巳遂殂實元至正十年正月二十日也法孫蚤世虎孫仕元為嶽州路儒學正乎江州楊柳灣茶司提領亦先卒巳孫今名觀即公也仕國朝歷太常卿翰林學士國子祭酒至今官嗚呼夫人貞孝慈睦其賢卓著如此固非几婦人所及至於聽言之惑臨終不亂則又士君子識義理者或有所未能而夫人能之豈非難哉雖生不及見子之貴以享其榮飬然死而子能以儒學際聖朝爵三品當得褒贈之命象首錦櫜以光賁於窀穸又能追述懿行以圖不朽則夫人何憾焉銘曰維君子嬪貞以禔身能教其孤為今名臣卒既有年始歸斯阡時虞未遑豈曰緩焉乃刻銘章載揚幽光永固以安夫人之藏長山先生胡公墓銘吳沉金華文獻邦異時碩儒魁彥踵武迭興或以道德鳴或以文章顯或以氣節著聲稱當時名載簡册若乃接前修之緒為後來之倡則長山先生胡公其人也先生諱翰字仲申世金華人在宋有諱漢者以學行聞於鄉號南岡處士先生曾大父也大父諱伯起父諱英仕元為太平路總管府照磨兼架閣事蒞政有績先生幼聰睿甫七歲志氣即與群兒異一日於道中拾鏹若干緡不敢去坐候遺者至而還之歸告母夫人何氏夫人奇之益督以學既長侍架閣君宦遊蘭溪從禮部吳公學公一見即期以遠器繼從吳先生於浦陽慱覽經史靡所不究又登文懿許公門南北士在講下者皆願與交復以所著文進之文獻黃公待制柳公二公稱贊不容口翰撰張公於文最少所許可見先生之文無異辭也是時文治方興輦轂之下英俊雲集先生遊焉見其人而誦其文者莫不稱嘆有勸之仕輒謝之遂過廣川弔董生謁曲阜拜孔子墓而歸先生於當世名公卿多所交接惟武威余公闕宣城貢公師泰號知巳遭時多虞四方兵起避地南華山中著書自樂大明開天皇上駐兵金陵招羅賢才遣使聘先生會有以金華民籍田出兵者先生從容進曰金華民素儒不習軍旅籍以為兵徒費廩粟耳上可其奏即罷之授衢州教授洪武乙酉奉旨纂修元史入局撰英宗睿宗實録及拜住丞相等傳凡若干卷賜白金文幣以歸素嗜山水晚歲愛北山泉石佳勝卜居三洞之上竹林之源幅巾短杖徜徉終日或乘興入城府訪故舊則留連數日先生生元丁未十一月初三日卒於洪武十四年正月十日年七十有五娶謝氏蚤世再娶衛氏皆無子以姪溥為後衛氏先卒先生葬之靈源市阜後二年合葬焉所著有春秋集義有文曰胡仲子集詩曰長山先生集先生既沒其門人徐恆狀其行致其猶子濬之與其孤之請俾余志其墓先生稟髙明卓絶之資為精敏宏慱之學得於心而證於人稽于今而質于古為文章簡潔淸峻不作則巳作則必高出於人性嚴毅寡酬應未嘗輕有所毀譽暮年請文者踵門不茍隨也曹國李公在大臣中號尊賢下士於先生待以殊禮每欲以先生名逹上前知先生老病不強也聞先生卒嗟嘆久之沉之生也後先生十有七年先生不鄙而友之比年來數奉談笑相知為深敘先生之行而銘之宜有不得而辭者矣况門人弟子千里有請乎銘曰嗚呼先生文之雄也山川孕靈秀所鍾也沉浸經籍包羅古今至和含中大振厥音五行麗天芒寒色正朱絃在廟肅然其聽先生之學豈止於斯命之不逹竟老而衰學傳於人言垂於世生宇宙中何怍何愧金華蒼蒼靈源泱泱先生之名與之俱長故福建儒學副提舉王公墓志銘貝瓊宋之南文獻故家多萃於四明而世其學者有王公叔載焉蓋自厚齋尚書倡學者以考亭朱子之説一時從之而變故今粹然皆出於正無陸氏偏駁之弊而叔載又能守之不失嘗讀臨濠教諭鄭真所著遂𥘉老人傳其言行鑿鑿可考遂𥘉者叔載所自號也然不獲一試以終遠近悼之既葬之明年其子升謀立石墓道而以文詞顯于今而信于後者莫若國子助教貝瓊仍授狀并書於使者來中都為請曰惟是不肖孤方斬焉在衰絰中不得匍匐走謁館下惟先生哀而銘之庶先人死且不朽而尚書公亦有光焉余辭不獲遂次第而為銘按狀公諱厚字叔載姓王氏其先琅琊人至宋徙居開封高祖安道保信軍承宣使靖康之變扈從南渡始家于鄞曾祖撝吏部即中崇政殿説書祖應麟中寶祐博學宏詞科歷事三朝官至翰林學士禮部尚書號厚齋父昌世承務即人皆稱承奉公黃文憲公為志其墓曾祖妣某氏祖妣舒氏戴氏皆贈頭人毋楊氏公幼而知學八歲能賦詩讀書日記數百言十歲已竟論孟詩書禮記并閲尚書深寧集習經義詞賦操筆立就鄉先生王僉判叔和趙太杜孟何戴教授表元聞而異之因就見焉元延祐初科制行改治詩經初李國博元白授詩於舒文靖公璘王與舒李世親盡得其源委久益充積博洽凡性命治道禮樂法制及臺閣典故世胄譜諜鄉里多咨問之袁文清公桷目翰林居里第輒問所學對曰近於濂洛關輔建安西蜀諸書稍已通習惟讀書記衍義正宗意有所得以其明潔縝密有成法易知而可守也因言世之學者稍涉朱子數書輒詆淳熙諸老與朱子同時其言論雖不盡合而博聞實踐為所推許今人耳目所不及乃藉口理學以文寡陋高談闊視漸成虛誕之風先生宜懲其弊以新士習文淸著四明志命公分撰二考且言子家世太史亦嘗究心否曰經與史同出異名古有編年司馬氏為記傳隋志始稱正史非古也作史必曰三長年代協體統之會人物萃品題之歸敘事貴詳不為繁修詞有要不為簡彼諛聞寡見雜出衆手舛訛遺漏欲以傳信久遠豈不難乎因歷舉纍代高下得夫甚備文淸大喜復閲其文作而嘆曰先師之道兹不墜矣嘗為郡庠訓導演説名理辨析疑難諸生帨服往時博士朔望講義就章立題卒一篇而止公病其拘取四書五經關世教者為之直説抑揚反復聞者竦然嘗三試不偶即棄去舉子業用詞學十二體為古文本之三代兩漢博以唐宋諸家屬詞有法絶去雕巧然時之知者蓋寡矣浙東廉訪司副使曾某署郡直學公辭都司牟應龍謂之曰先儒謂錢榖亦為已之學也乃就職塗田砂岸先侵於豪民者悉陳而復之盈考宣尉司板授象山教諭考核田租侵漁者不復逞調浦江教諭踰月即去官歸奉母時朝廷遣大臣李國鳳經略江南以便宜用遺逸有司以公名上即署衢州路教授而中書復用外臣薦除卲武路教授福建分省又升為儒學副提舉皆不起既老嘗語人曰天地生人之初吾不得而知也可知者理而巳理之在人初非不善克遂其初斯足矣乃號遂初老人云尚書富於著述玉海最為詳洽未脫藁而失後復得之中多闕誤公考究編次請于閫帥鋟梓并他書十二種以傳袁文淸公所撰四明志或有讒于僉事苦思丁將毀其板公白太守王元恭曰袁公中朝名臣書法高古不可毀也元恭特書以進僉事驚悔命與舊志並行公為成續志若干卷鄉飮酒禮久廢太守用程先生端禮言屬公與鄭先生覺民考訂一遵儀禮用賔興歲行之以經費不足而田為吉祥寺僧所據白諸有司僧以田歸我歲入遂充其禮浸盛觀者謂紹興以來昉見於此而先王之教猶存也公天性質直人有過則靣折至發赤品別人之賢否不以勢位高下為輕重不以待遇厚薄為是非送死厚於奉生恤小篤於事大報德甚於念惡勇退急於趨進晚年益以詩酒自娛客至論宋季事亹亹不倦且及至正史官詮次弗當欲為釐正尤極論奉化陳桱續通鑑前後之失有遂初藳三十卷藏子家戒其子升隲曰承家不在名位而在不失身敬身不在外貌表襮而在母自欺讀書當貫古今處世必審進退其有同流合汙以為通矯時干譽以為高患得患失以終其身者此吾所深惡非所望於汝也大明洪武九年丙辰三月十日卒享年七十有七妻史氏系出相家與公合德先公卒子二人長升次隲隲為弟寧孫後寧孫通春秋詩二經蚤卒無子遺命與同葬女一適戎某孫男一初孫以是年四月十四日葬千鄞縣先瑩之右與史氏合兆嗚呼四明之學惟尚書之廣博精深論者謂兼東萊西山二家之長非袁楊所能及而公克繼其傳雖不見之所施足以垂後無疑也故特掇其大槩而事之具于傳者可略銘曰王氏之先世居琅琊再徙于鄞繇儒起家逮尚書公耀其尤彩所蓄之富浩乎淵海昭昭大中或為異同倡而正之畔者斯從偉哉叔載克紹于後遺編佚藳既習而守人亦有言惟祖惟孫不襲以爵道實惟尊紛紛黃小得失寧辨本棄末務內忘外鍵三年象山遠近是咨大夫有友學者有師時既不偶宜退奚久日逰以嬉託意詩酒慨彼里豪貪縱鴟張盈必易覆煙消雨茫惟吾遂𥘉𥘉豈不善年踰七帙雖晦益顯鬱鬱堂封在彼高原式衍餘慶以利後昆皇明文衡卷之八十四
