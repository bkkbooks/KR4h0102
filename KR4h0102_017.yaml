  text: 皇明文衡卷之十七
  hash: sha256:257d0e3a1495b20129e3ab10e8a939c7e462ee56b4bc087162d98e1ad9afbb05
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_017-1a}
body:
  text: 箴銘磨兠堅箴宋濂昔李侍郞敦立嘗掲磨兠堅三字於坐㬂磨兠堅者古之慎言人也其善於自防者哉爲著箴曰磨兠堅慎勿言口爲禍門昔人之云磨兠堅人各有心山髙海深磨兠堅髙不知極深不可測磨兠堅言出諸口禍随其後磨兠堅鍾鼓之聲因扣而鳴磨兠堅不扣而鳴必駭衆聽磨兠堅唯口之則守之以黙守之以黙是曰玄徳磨兠堅磨兠堅慎勿言續丹扆箴王禕官箴王闕古之誼也唐李衛公獻丹扆六箴于其君立意措辭分章指事忠愛之道藹然可觀其殆有所諷刺而救君於失得箴諌之誼者矣然其言之猶乏剴切君子病焉禕不自揆因掇衛公之餘㫖取夫善可爲訓惡可爲戒而人臣所難言者極言之作續丹扆六箴天運不息昏昕有恒有恒伊何宵終則明人君體天夙興在廷宵向終矣君胡不興宵終不明天運乃愆宵終不興君斯違天珮玉晏鳴荒淫用宣鷄鳴而起大舜稱賢右宵衣箴維衮與冕君服堂堂以朝以祭視瞻所宗玉衣示侈商祚以亡估服稱妖漢室乃傾一服之華若未過靡孰知禍殃鮮不職此皇王所戒不物不軌三服罷官著羙惇史右正服箴爲天下君職在飬民匪以天下徒奉一人取民有制壤奠式陳貢獻無藝䘮亂之因淫聲治色使君聾瞽竒物異品竟亦何𥙷却蛤焚裘爲事非鉅儉德著聞齊風堯禹右罷獻箴臣言劘君如批逆鱗大誅小斥何益於臣臣豈求益凡以益君君弗臣聴匪愚則昏從若轉圜是謂能改一事十諌庶無後悔聖維堯舜芻堯猶采拒諌遂非不敗奚待右納誨箴人心不同有如其面面則易知心實難見心之姦邪隂運潜變審之察之貴在能㫁秦斯豈訐唐𣏌非䛕欺君誤國面是心殊此而弗辨家國淪胥知人則哲欽哉聖謨右辨邪箴春秋謹始大易知㡬思患預防必防其微莾卒篡漢貂終危齊惟微弗防遂至噬臍不觀堅氷其𥘉履霜滔天之水實忠濫觴惡過無小雖小勿将積之乆矣社覆宗亡右防微箴官箴上劉基維天生民㒩㒩蚩蚩有欲㒺制迺豹廼螭爰立之君載作之師式養式教毋汨秉彛嗟爾司牧代君撫綏君祿我食君令我施邦本弗固庻事咸墮受寄匪輶敢不肅祗治民奚先字之以慈有頑弗迪警之以威振惰奨勤拯艱息疲疾病顛連我扶我持禁暴戢姦損􅑿益虧如農植苗蚤夜孜孜澇䟽旱漑無容稗秕如良執輿順以導之無俾旋濘疆䇿以馳慈匪予愛帝命溥時威匪予憎國有恒䂓弱不可陵愚不可欺剛不可畏媚不可随無取我便寘人于危無避我謗見義不爲天鍳孔昭民各有思惠之斯懷推之乃離譽不可驕器惡滿欹謗不可怒退省吾私人有恒言視民如兒無反厥好以暴予知是用作箴敢告執羈官箴中在昔隆古分封國都付之以民俾飬勿瘏上下恊心各保乃區明庻考績昭哉範模秦廢聖制代德以狙刀筆之權始歸吏胥弄法舞文聾癡瞽愚流波至今一任簿書行立公庭如鴈如鳬我欲是求我利是趋摩揣官情以逞覬覦官惟好貨我甘以苴官惟好名我逢以䛕官惟畏嫌我疑以汙官惟好惰我淫以娯官惟好猜惑以多途官惟好威道以掊語黙有爲俯仰有湏覘容察辭助忿乗愉法度盈口奸邪滿軀蠱智迷昧欺庸䧟迂俾奸作惡以紫爲朱未獲官心嫗嫗儒儒亦既獲止如登天衢傲兀民士憑凌里閭惡積禍來官與之俱人有恒言遇吏如奴堅防固隄猶恐或窬矧曰聴之百姓何辜是用作箴敢告僕夫官箴下無謂余明人莫能昧離婁善察不識其背無謂予能人莫敢欺校人烹魚子産弗知立事惟公燭詐惟誠小節勿固小慧勿行無矜我㢘守所當爲無沽我名以生衆疑何以簡訟决之使通何以弭貪慎檢乃躬去䜛斥佞遠吏近民待人以寛律巳以勤無咎人弗信忱至斯孚無患人不聞惟徳不孤德以進善威以挫姦德不可偏威不可煩無謂彼富我必極之無謂彼貧我必直之持心如衡以理爲平無爲避嫌以縱無情人有恒言爲臣不易是用作箴敢告有位吾友㑹稽楼文淵常持誠敬謙謹四字誠敬所以存乎心謙謹所以施之事也因作箴以貽之貝瓊昔熊渠子夜行道逢伏虎引弓射之没鏃飲羽金石之堅惟誠可通矧乎有知何遠弗從故事神則必假治人則必化嗟時益偷毎設機而尚詐是知治心之要在乎不欺茍内外如一吾又何爲右誠箴知伯五賢寔禍之基藍臺一㑹戯康子而侮叚規卒爲韓魏禽遂貽千載之譏是以古人必敬爲主苟忽乎秋毫所䘮奚𥙷亦有冀缺夫婦如賔遂舉於隴畒以佐晋君得失之㣲榮辱之大一出一入勉哉無懈右敬箴凌人者恒爲人尤下人者恒寡吾仇故善有不可争勞有不可伐䖏於朝則國和處於室則家帨噫盈必招損惟卑益尊大易之言守而勿諼右謙箴陟彼太行羊腸九折防其衘轡遵其軌轍既及乎坦途乃騁而馳車僨馬驚吾傷亦宜嗚呼禍恒㐲於至微必致謹其所事匪險之爲虞無虞吾焉可恃爰作斯箴永爲人規式戒其怠長樂公是師右謹箴家人箴十五首方希古論治者常大天下而小一家然政行乎天下者世未甞乏而教洽乎家人者自昔以爲難豈小者固難而大者反易哉盖骨肉之間恩勝而禮不行勢近而法莫舉自非有德而躬化發言制行有以信服乎人則其難誠有甚於治民者是以聖人之道必察乎物理誠其念慮以正其心然後推之脩身身旣脩矣然後推之齊家家旣可齊而不優於爲國與天下者無有也故家人者君子之所盡心而治天下之凖也安可忽哉余病乎德無以刑乎家然念古之人自修有箴戒之義因爲箴以攻已缺且與有志者共勉焉正倫人有常倫而汝不循斯爲匪人天使之然後汝舍旃斯爲悖天天乎汝棄人乎汝異曷不思邪天以汝爲人而忍自絶為禽獸之㱕邪重祀身烏乎生祖考之遺汝哺汝歠祖考之資此而可忘孰不可爲尚嚴享祀式敬且時謹禮縱肆怠忽人喜其佚孰知佚者禍所自出率禮無愆人苦其難孰知難者所以爲安嗟時之人惟佚之務尊卑無節上下失度謂禮爲偽謂敬不足行悖理越倫卒取禍刑遜讓之性天實錫汝汝手汝足能俯興拜跽曷爲自賊恣傲不恭人或不汝誅天寧汝容彼有國與民無禮猶敗矧予眇㣲奚時弗戒由道在已豈誠難邪敬兹天秩以保室家務學無學之人謂學爲可後苟爲不學流爲禽獸吾之所受上帝之衷學以明之與天地通堯舜之仁顔孟之智聖賢盛徳學焉則至夫學可以爲聖賢侔天地而不學不免與禽獸同㱕鳥可不擇所之乎噫篤行位不若人愧耻以求行不合道恬不加修汝徳之凉僥倖髙位秪爲賤辱疇汝之貴孝弟乎家義讓乎鄕使汝無位誰不汝臧古人之學修巳而巳未至聖賢終身不止是以其道碩大光明化行邦國萬世作程汝曷弗效易自滿足無以過人人寧汝服及今尚少不勇於爲迨其將老雖悔何追自省言恒患不䏻信行恒患不䏻善學恒患不䏻正慮恒患不䏻逺改過患不䏻勇臨事患不䏻辨制義患乎巽懦御人患乎剛褊汝之所患豈持此耶夫焉可以不勉絶私厚巳薄人固爲自私厚人薄已亦匪其宜大公之道物我同視循道而行安有彼此親而宜惡愛之爲偏踈而有善我何惡焉愛惡無他一裁以義加以絲毫則爲人僞天之恒理各有當然孰䏻無私忘已順天崇畏有所畏者其家必齊無所畏者必怠而睽嚴厥父兄相率以聴小大秪肅靡敢驕橫於道爲順順足致和始若難䏻其羙實多人各自賢縱私殖利不一其心禍敗立至君子崇畏畏心畏天畏已有過畏人之言所畏者多故卒安肆小人不然終履憂畏汝今奚擇以保其身無謂無傷䧟于小人懲忿人言相忤遽愠以怒汝之怒人彼寧不惡惡䏻興禍怒實招之當忿之發冝忍以思彼言誠當雖忤爲益忤我何傷適見其直言而不當乃彼之狂狂而能容我道之光君子之怒審乎義理不深責人以厚䖏已故無怨惡身名不墮輕忿易忤小人之爲人之所慕實在君子考其所由君子鮮矣言出乎汝烏可自違以道制欲毋縱汝私戒惰惟古之人旣爲聖賢猶不敢息嗟今之人安於卑陋自以爲德舒舒其學肆肆其行日月邁矣将何成名昔有未至人閔汝少壮不自強忽其旣耄嗚呼進乎止乎天實望汝云何而忍無聞以没齒乎審聴聴言之法平心易氣既䆒其詳當察其意善也吾從否也舎之勿輕於信勿逆於疑近習小夫閨閤嬖女爲䜛爲佞類不足取不幸聴之爲患實深宜力拒絶杜其邪心世之昬庸多惑乎此人告以善反謂非是家國之亡匪天伊人尚審尔聴以正厥身謹習引卑趋髙歲月劬勞習乎汙下不日而化惟重惟黙守身之則惟詐惟佻致患之招嗟嗟小人以患爲羙側媚傾邪矯飾誕詭告以禮義謂人已欺安於不善莫覺其非彼之不善爲徒孔多懼其化汝不慎如何擇術古之爲家者汲汲於禮義禮義可求而得守之無不利也今之爲家者汲汲於財利財利求未必得而有之不足恃也舎可得而不求求其不足恃者而以不得爲憂咄嗟乎若人吾於汝也奚尤慮遠無先已私而後天下之慮無重外物而忘天爵之貴無以耳目之娱而爲心腹之蠧無茍一時之安而招終身之累難保而易縱者情也難完而易毀者名也貧賤而不可無者莭之貞也冨貴而不可有者意氣之盈也慎言義所當出黙也爲失非所宜言言也爲愆愆失奚自不學所致二者孰得寧過於黙聖於鄕黨言若不能作法萬年世守爲經多言違道適貽身害不忍須臾爲禍爲敗莫大之惡一語可成小忿弗思罪如丘陵造怨興戎招尤速咎孰爲之端鮮不自口是以吉人必寡其辭捷給便佞鄙夫之爲汝今欲言先質乎理於理或乖慎勿啓齒當言則發無縱誕詭匪善曷陳匪義曷謀善言取辱則非汝羞却兼味箴王紳昔范文正公至晚必思平日所爲事與所奉者直則瞑目鼾睡或有不及必竟夕踧踖不寧其自持之功若此故能成其徳業心切慕之而未能効也且慮歲月迅邁志氣無成而悔尤日益以至故凡於食頃遇兼味務峻却之此雖非古人之所用心亦庶乎節忍之一端因箴以自警人身之奉惟適於中侈約得冝何儉何豐萬錢下筯三韭自給於巳無禆於道無益行或不臧與物無異取物以奉是食其類冝受其飬矯情飾愆棄禮弗居是曰逆天我心思之彼此交媿志業未就奚𥙷於世念兹道體弗飬或傷飬而失中天必我殃故凡食頃却其兼味以節五慾以安吾義且懼志懈厥德不凝庸述斯箴以爲心銘銘蒼雲軒銘有叙宋濂世皆稱嚴子陵不屈光武以爲髙士之問學固求所以行之耳茍得賢君事之而行所志君子之所樂也况光武素知子陵哉子陵之不以隠爲髙也審矣其隱盖有所爲爾人之志意材量明者能燭之於事爲之先子陵光武少相友善使光武能任人可爲盡力子陵何所苦而不出既出而决去哉盖光武察寮自用其後宰輔多不以禮退子陵預知其如此故决然避去而不疑以全故舊之義此子陵所以爲髙也苟徒以隱爲髙孰不可爲子陵哉子陵裔孫居餘姚者曰宗道取范文正公祠堂記蒼雲語名軒余恐其昧乎出䖏之義也告之故系以銘銘曰維士爲學志大行于時孰肯樂隱屈而弗爲卓哉子陵識時之㡬㡬不可以出甘耕釣以嬉此爲百世之師苟時可行而飾隱以欺是棄其天而失時宜嗟吾子陵志豈在斯爾宜則之勿執固以違視時推移如雲在山何滯歛與施或不盈握或雨四垂庻乎于道之歸五輪沙漏銘沙漏之制貯細沙於池而注於斗凡運五輪焉其初輪軸長二尺有三寸圍寸有五分衡奠之軸端有輪輪圍尺有二寸八分上環十六斗斗廣八分深如之軸抄傳六齒沙傾斗運其齒鈎二輪旋之二輪之軸長尺圍如初從奠之輪之圍尺有五寸輪齒三十六軸抄亦傳六齒鈎三輪旋之三輪之圍軸若齒與二輪同其如初軸杪亦傅六齒鈎四輪旋之四輪如三輪唯奠與二輪同輪杪亦傳六齒鈎中輪旋之中輪如四輪餘輪側旋中輪獨平旋軸崇尺有六寸其杪不設齒挺然上出貫於測景盤盤列十二時分刻盈百斵木爲日形承以雲麗於軸中五輪犬牙相入次第運益遲中輪日行􅐻一周雲脚至處則知爲何時何刻也餘輪各有楹附度中輪則否輪與沙池皆蔵几腹􅐻露几面旁刻黄衣童子二一擊鼓一鳴鉦亦運衍沙使之沙之進退則日一視焉此其大略也𥘉灤陽水善氷雖㸑鼎沃湯不能爲漏新安詹君希元乃抽其精思以沙代之漏成人以爲古未當聞較之郭守敬七實燈漏鍾鼓應時而自鳴者殆将無媿乎浦陽鄭君永與希元㳺京師因知其詳歸而製之請余銘銘曰挈壷建漏測以水用沙易之自詹始水澤腹堅沙弗止一日一周與天似鄭君繼之制益美請惜分隂視斯晷婺溪石研銘歙之有研自唐開元中葉礪始礪獵師也因逐獸發之後爲南唐元宗所賞愛名遂與端石齊其地在長城里之龍尾山山一名羅紋其下乃芙蓉溪研溪産者號爲尤長濂甞獲其一腹有刻文云李少㣲造少㣲元宗時硯官也制作絶工緻可寳巳銘曰外雖黒内則白馬生角兮性乃易三竒石後銘有序三竒石後銘爲呉士朱孟辨作孟辨獲石聚寳山間製爲山玄膚玉芝朶㫁雲角三名其友王䝉先生圖而銘之銘䆳甚至不容繼孟辨強余述之信乎珠玉在側覺我形穢也其詞曰山玄膚割紫㽔星霣魄石抱腴蒼水使者珮失琚山鬼環守目睢盱内蔵一升白龍酥飡之凌霄躡雙鳬奮迅八極遊淸都山玄膚玉爲徒玉芝朶自天墮暈翠霞裁猗儺煆以九陽真􅐓火有聲泓噌玉之瑳不學三秀脆而夥韓終欲攓意仍叵靑鳥傳信以需我玉芝朶靑嫷嫷㫁雲角鬼斧琢秀􅏢􅏢文斮斮霓旌難攀泝寥廓手析祥氛㢙一握尚帶蛟龍氣旁魄神毋變幻資槖籥上衝牛斗香如濯㫁雲角鎮書幄怡顔齋銘胡翰衢之超化寺昔紫陽朱子東莱吕子嘗寓焉寺故有雲山閣有怡顔亭兵興以來悉癈爲郡城漫不復識矣惟朱子所書亭扁石刻余於祝仲文家見之仲文有吏能退居委巷誦習猶諸生也遂名其齋曰怡顔以余嘗事二子之學來徴言乃爲之銘曰萬物芸芸孰怡尓顔人之感忽日㝷乎前苟物於物與物俱遷不物於物宅心孔淵内欲不萌外不能千以一觀萬參彼兩間流峙動静匪山則川飛躍下上匪魚則鳶春木既榮冬卉亦妍化育流行精頥具宣乾確坤隤形附象懸凡厥有生靡不可觀皆吾之與靡不可歡惟不梏于私乃樂其天漢榱題研銘有漢榱題其篆曰長樂未央髙帝時陶旊物也僧用中作硯金華胡翰銘曰天垂範地合質圜覆九重遺者一于以用之懿文德漢鼎可移兹不泐皇明文衡卷之十七
