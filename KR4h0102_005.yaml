front:
  text: 皇明文衡卷之五
  hash: sha256:951675a03c271e6c793911424bc3c62a860d0349bdae29268de5df95c264ffcf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_005-1a}
body:
  text: 表箋乙巳年賀千秋節表未模五百年有王者興適當今日千萬歲願聖人壽茂對曷辰天地協祥臣民交慶中賀繼天立極斂福錫民應禱而生彌誕神光之室乘時而起肇基王氣之都是皆天眷之所隆夫豈人謀之可致故十載克成乎大業而四方益闡於丕圖江漢既巳朝宗閩廣固宜職貢餘浙正須秉麾而順邊淮豈待仗鉞而從蓋將北定乎中原抑宜入承乎正統一人有慶萬福攸同某等逺牧虎藩遙瞻象魏莫克對紫宸而拜益深拘舟悃之誠航海梯山重譯悉圖於王會普天率土三呼咸比於華封代翰林院勸進表蘇伯衡伏以纘百王之正統莫大乎宅尊得萬國之歡心宜先於建極蓋惟體元而居正斯足應天而順人是以高帝開基甫四載而即位于汜水世祖興復僅一年而踐祚于鄗南雖遠略之不遑而丕稱之是講義有攸當道在隨時中謝欽惟躬膺曆數之歸德合乾坤之大玄符顓握江左首平黃鉞再麾潯陽遄定僣偽兼收於漢孽提封奄奠於樊襄來享來庭南交廣西隴蜀于壃于理左濠泗右河淮含齒食毛者咸懷傒戴阻兵恃險者悉就誅擒推聖人兼愛之心委上將專征之任義旗所指羣帥之內附肩摩仁聞所孚連城之欵降踵至蓋師出以律而民遂其生斯不戰而屈人故大悅而歸巳今則士誠梟首於闕下會稽通籍於域中弓矢永櫜輿啚載闢此皆二儀協贊以申保佑之休百神效靈以開混一之運豐功盛烈之著揆諸二帝則巳多大寶鴻名之膺質諸兩漢則巳晚是雖聖明謙讓之節夫豈幽顯仰望之情臣念眷命不可久違軀歌難以固拒輒陳愚懇冒瀆宸嚴伏望仰體天心俯從人欲特頒明詔俾擇良辰講其禮而正其名以其德而居其位則郊廟社稷萬靈永有所主華夏蠻貊億載得以承事國子學賀登極表寶曆在躬應千齡之上聖瑶圖啓運得百姓之歡心臨御云初謳歌為盛中賀欽惟聰明天縱剛健日新仗尺劔以定羣雄道符漢祖歷一紀而成大業功邁唐宗陶匏繭栗以蕆祀而上帝時歆詩書禮樂以造士而下民祗若風行雷動敷治象於多方春育海涵播仁聲於庶類仰正統之誕紹知景命之永延凡在生成罔不慶賴臣等獲觀巨典幸際昌期車同軌書同文行同倫致治恭陳於善頌黨有庠術有序國有學敷言願贊於成能代翰林院賀登極表皇穹垂佑誕錫貞符哲后挺生丕承正統華夷永賴臣庶均歡中賀欽惟匹馬渡江六龍御極大明建國八綖咸囿於照臨洪武紀元九域同歸於戡定於昭駿烈有赫鴻猷臣等仰沐恩波叨居翰苑雲從龍風從虎幸逢千載之昌期河出圖洛出書願啓萬年之文運代中書省賀平杭湖秀越表伏以近悅遠來率土歸聖人之德南征壯伐無敵為王者之師適瞻齊斧之特班遄見捷書之洊至羣情胥慶一統維期中賀臣聞高帝開基載興齊楚之役太宗啓運復加充竇之誅夫欲和衆而安民則必兼弱而攻昧事非得巳兵不留行兹蓋伏遇皇帝陛下智勇自天聰明冠世廓淸區宇畨禺衣𬒳乎恩光循撫遐荒僰道上供其方物顧兹浙右尚阻華風爰致斯赫之威用副傒蘇之望收海陽以遏其衝要定秦郵以搗其腹心濠梁泗水舉若摧枯臨淮壽春取如拾芥計益窮而負固地逾蹙而偷生宸慮彌切於解懸戎車遂勤於再駕勢成椅角人效智能引領義旗親黨之投戈恐後允懷仁聞謀臣之稽顙爭先苕霅首平吳松繼下齒錢唐於郡縣登會稽於版圖崑山傳檄而從距牙斯拔擕李攄誠而附蕃屛悉空叛將就磔於藁街禁旅環攻其外郭兹雖天眷實出廟謨殱厥渠魁佇看虞之不臘維其士女幸覩堯之授時臣等叨列星垣獲觀露布煙火萬里式歌神武之功干羽兩階永底文明之治代秦王府官謝表伏以誕膺景命開車書一統之基衆建懿親為宗社萬年之計兹肇開於土宇遂董正於宫寮中謝臣歷觀夏商以及周漢方其授茅土於子弟孰不任忠良為股肱蓋凡前後左右之人罔非吉士則得修齊平治之術斯為令王今神聖之膺圖仰皇王而取則方立經陳紀之始為宗子維城之規况秦國四封奄有關內而形勢百二在其域中府署之開傅相之設固將藩屏帝室豈惟保佑王躬宜得重臣以申器使臣等經文緯武才不及於曹參博古通今學有慙於賈誼夫何僥幸乃辱甄收此蓋伏遇覆載等乎乾坤將曲成於庶物高明齊乎日月靡求備於一人斯朽鈍之微蹤亦叨塵於華選臣敢不虔恭夙夜苟非唐堯虞舜之道焉敢陳秪遹訓謨罔俾河間東平之賢專其美進大明律表宋濂臣聞天生蒸民不能無欲欲動情勝詭偽日滋強暴縱其侵陵柔儒無以自立故聖人者出因時制治設刑憲以為之防欲使惡者知懼而善者獲寧傅所謂獄者萬民之命所以禁暴止邪養育羣生者也譬諸禾黍必刈稂莠而後苗始茂方於白粲必去砂礫而後食可餐苟梗化敗俗之徒不有以誅之雖堯舜不能以為治夫自軒轅以來代有刑官而五刑之法漸著其詳弗可復知逮魏文侯師於李悝始采諸國刑典造法經六篇漢蕭何加以三篇通號九章曹魏劉劭又衍漢律為十八篇晉賈充又參魏律為二十篇唐長孫無忌等又取漢魏晉三家擇可行者定為十二篇大槩皆以九章為宗歷代之律至於唐亦可謂集厥大成矣洪惟皇帝陛下受億兆君師之命登大寶位保乂臣民孳孳弗怠其訓迪羣臣諄復數千言惟恐其有犯慈愛仁厚之意每見於言外是大舜惟刑之恤之義也矜憫愚民無知陷于罪戾法司奏讞輒惻然弗寧多所寬宥是神禹見辜而泣之心也唯貪墨之吏承踵元弊不異白粲中之砂礫禾黍中之稂莠也乃不得巳假峻法以繩之是以臨御以來屢詔大臣更定新律至五六而弗倦者凡欲生斯民也今又特敕刑部尚書劉惟謙重會衆律以協厥中而近代比例之繁姦吏可資為出入者咸痛革之每一篇成輒繕書上奏揭於西廡之壁親御翰墨為之裁定由是仰見陛下仁民愛物之心與虞夏帝王同一哀矜也易曰山上有火旅君子以明愼用刑而不留獄言獄不可不謹也書曰刑期于無刑言辟以止辟而民自不敢犯也陛下聖慮淵深上稽天理下揆人情成此百代之凖繩實有易書之奧旨行見好生之德洽于民心凡日月所照霜露所墜有血氣者莫不上承神化改過遷善而悉臻雍熙之治矣何其盛哉臣惟謙以洪武六年冬十一月受詔明年二月書成篇目一凖之於唐曰名例曰衛禁曰職制曰戶婚曰廄庫曰擅興曰賊盜曰鬪訟曰詐偽曰雜律曰捕亡曰斷獄采用巳頒舊律二百八十八條續律百二十八條舊令改律三十六條因事制律三十一條掇唐律以輔遺一百二十三條合六百有六分為三十卷其間或損或益或仍其舊務合重輕之宜云謹俯伏闕廷投進奉表以聞臣等誠惶誠懼稽首頓首謹言洪武七年月日具官臣等上表進元史表伏以紀一代以為書史法相沿於遷固考前王之成憲周家有監於夏殷蓋因巳往之廢興堪作將來之法戒惟元氏之有國本朔漠以造家用兵戈以爭強並部落者十世逐水草以為食擅雄長於一隅逮至成吉思之時大會斡難河之上始尊位號漸定教條既近取於乃蠻復遠攻於回紇渡黃河以蹴西夏踰居庸以瞰中原太宗繼之而金源為墟世祖承之而宋籙遂訖立經陳紀用夏變夷肆宏遠之規模成混一之基業爰及成仁之主見稱願治之君唯祖訓之式遵思孫謀之是遺自兹以降聿號隆平豐亨豫大之言鼓倡於天曆之世離析渙奔之禍馴致於至正之朝嬖幸蠱惑於中權姦蒙蔽於外漢網秪因於疏闊周綱遽至於陵遲風憲皆為不捕之貓將士盡成反噬之犬由是羣雄角逐九域瓜分風波徒沸於重𬈑海嶽竟歸於真主中謝欽惟皇帝陛下奉天承運濟世安民建萬世之丕圖紹百王之正統大明出而爝火息率土生輝迅雷鳴而衆響微鴻音斯播載念盛衰之故即推忠厚之仁僉言實既亡而名亦隨亡獨謂國可滅而史不當滅特詔遺逸之士欲求護論之公文詞勿至於艱深事迹務令於明白茍善惡瞭然在目庶勸懲有益於人此皆天語之丁寧愈見聖心之廣大於是命翰林學士臣宋濂待制臣王禕儒士臣汪克寬臣胡翰臣宋禧臣陶凱臣陳基臣趙塤臣曾魯臣趙汸臣張文海臣徐尊生臣黃箎臣傳恕臣王錡臣傅著臣謝徽臣高啓分科修纂故上自太祖下迄寧宗靡不網羅嚴加搜采恐玩時而愒日每繼晷以焚膏故於五六月之間成此十三朝之史况往牒舛訛之已甚而他書參考之無慿雖竭忠勤難逃踈漏若自元統已後則其載籍無存巳遣使而旁求俟續編而上進愧其才識之有限弗稱三長兼以紀述之未周殊無寸補臣濂忝司鈞軸幸覩成書信傳信而疑傳疑僅克編摩於歲月筆則筆而削則削敢言褒貶於春秋仰塵乙夜之觀期作千秋之鑑所撰元史紀三十八卷志五十三卷表六卷傳六十二卷目録二卷通計一百三十萬六千五百餘字謹繕寫成百二十册隨表上進以聞謝恩表劉基伏以出草萊而遇真主受榮寵而歸故鄉此人人之所願欲而不可得者也中謝欽惟皇帝陛下以聖神文武之姿提一旅之衆龍興淮甸掃除羣雄不數年間遂定中原奄有四海神謨廟斷悉出聖衷舜禹以來未之有也臣基一介愚庸生長南裔踈拙無似其能識主於未發之先者亦猶巢鵲之知太歲園葵之企太陽以管窺天偶見於此非臣之知有過於人也至於仰觀乾象言或有驗者是乃天以大命授之陛下若有鬼神隂誘臣衷開導使言非臣念慮所能及也聖德廣大不遺葑菲遠法唐虞功疑惟重之典錫臣以封爵錫臣以食祿俾臣回還故鄉受榮寵以終其天年臣竊自揆何修而膺此犬馬微忱惟增愧懼已於洪武四年二月初四日到家謹遣長男臣璉捧表詣闕拜謝聖恩臣基無任激切屏營之至謹奉表稱謝以聞封建親王賀東宫箋高啓監國撫軍久繫兆民之望建邦作輔大頒同姓之封隆典式修輿情均慶恭惟皇太子殿下地居震長道合乾剛孝奉兩宫每問安於曉寢友懷諸弟共講學於春坊既膺主鬯之崇復舉分茅之盛本支茂衍宗社奠安某等忝預台司敢伸賀悃河如帶山如礪永存萬世之傳日重光月重輪敬上千秋之祝進千家姓表吳沉臣沉等言臣聞古者天子建德因生賜姓胙土命氏此姓氏所由興也三代以前有姓以別婚姻氏以辨貴賤所由來尚矣三代以後姓氏寖廣推原其始有以帝王名號為氏者有以王父字為氏者有以所生之土為氏者有以官有以爵及諡為氏者有以所封之國若邑若鄉若亭為氏者有以技以物為氏者故往往姓同而氏則分年代既遠族類益繁於是以氏為姓而索之族矣歷漢唐宋元生齒之盛華夷之混又有以部落為姓者有因功賜姓者有因過因事因刑改姓者有避諱避仇避難避嫌改姓者有慕前賢名字冒姓者有音訛及音同文異或文同音異轉姓者有省文省言轉姓者其區分類别不可勝紀前代雖有氏族志等書流行于世類皆搜羅未盡互有詳略識者病之恭惟皇帝陛下誕膺天命混一區宇車書萬里薄海內外遐陬僻壤咸沾沐聖化安土樂生黎庶阜蕃又非前代之比臣等謹稽諸史牒質之圖籍旁搜博訪類萃成編約為韻語凡為姓一千九百六十有八名曰千家姓繕寫呈上極慚膚淺未能悉備萬幾之睱得賜覽觀刋布四方以便初學習讀天下之人有以知聖朝土地廣大人民衆盛恩德深厚而思各保其族於悠久以同躋仁夀之鄉也洪武十四年五月朔日翰林編修臣吳沉典籍臣劉仲質臣吳伯宗等誠惶誠恐稽首頓首謹言進寶録表解縉奉天輔運推誠宣力武臣特進光祿大夫左柱國太子太師曹國公監修國史都總裁官臣李景隆等誠惶誠恐頓首上言聖人受命啓萬世之鴻基史氏纂書示百王之大法是故堯舜之事載之典謨文武之政布在方册俾文獻之足徴實古今之通議矧創業垂統者皆在於貽謀而繼志述事者敢忘於紀載鋪張極盛之閎休揚厲無窮之偉績歷選前聞之作允為逹孝之規欽惟大明太祖聖神文武欽明啓運俊德成功統天大孝高皇帝應千年之景運集羣聖之大成天命眷顧之隆起徒步不階於尺土人心嚮服之誠未三年巳定於京都龍飛雲從而華夏蠻貊罔不率俾日照月臨而山川鬼神莫不攸寧有過化存神之妙有綏來動和之應英傑不期而會遐邇不令而從盡收當世之賢才大拯生民於水火羣雄歸命者不戮一夫元主遁荒而禮遣其嗣四方幅員之廣亘古所無中國先王之典悉復其舊守帝王心法之言明聖賢道學之統罷黜百氏彌綸六經範圍造化曲成萬物天休滋至而兢業貫乎始終諸福畢臻而謙抑純乎表裏在位之久三十餘年升遐之日萬方哀悼比於近古邈然罕儔漢高年不登於中壽光武運僅紹於中興唐髙祖因隋之資宋太祖承周之業元世祖席纍世之威皆未有若斯之盛也欽惟孝慈昭憲至仁文德承天順聖高皇后天生聖善克相肇基則徽德邁於嬪妃開創功超於胥宇夙聞文定之祥允叶坤元之吉螽斯有百男之應鳲鳩均衆子之恩保合承天之慶簡能造化之仁歷考古后妃蓋莫盛於周室然摯有誕聖之祥而無輔運之迹邑薑有輔運之迹而無誕聖之祥矧皆起邦君式克承世緒降及近世皆非等倫若夫同起布衣化家為國正位中宫十有五年家邦承式天下歸仁誕育聖躬萬世永賴自古以來未之有也欽惟皇帝陛下合體乾坤重華日月煥帝堯之文章纘武王之繼述孝事太祖有見而知之之實廣詢當世得聞而知之之詳發蘭臺記注之書而徴以藩邸之副紬金縢石室之祕又考於世家之藏爰當嗣位之初首頒修史之詔命臣景隆忠誠伯臣茹瑺翰林學士臣解縉總裁翰林學士臣王景禮部尚書臣李至剛侍讀臣胡靖臣曾日章臣玉灌臣胡儼侍講臣鄒緝臣楊榮臣金幼孜臣楊士奇修撰臣李貫臣吳溥編修臣楊溥臣鄭好義檢討臣王洪博士臣張伯頴臣王汝玉典籍臣沈度臣潘畿待詔臣王延齡給事中臣朱絃吏部郎中臣徐旭禮部郎中臣胡遠户部主事臣端孝思太常博士臣錢仲益國子博士臣金玉鉉助教臣王逹行人臣蔣驥僉事臣知府臣劉辰知州臣鄒濟知縣臣王褒臣楊覯臣梁潛臣趙季通臣沈瑜教諭臣劉宗平臣解榮訓導臣羅思程臣傳貴淸晉府伴讀臣蘇伯厚靖江府教授臣張顯儒士臣端禮臣楊孟力臣朱逄吉臣莫士安纂修慎選多士賜宴便蕃即開館于禁中屢翻閲于機暇以百人之多歷期年之久惟盡校讐之力實無黼黻之能巍巍道冠於百王蕩蕩功超於千古是知禮樂征伐之自出必有訓古之文雲霞花卉之生色不勞繪畫之工開王府而見璠璵惟自慶其希遇仰青天而瞻象緯又奚罄於名言皆據事而直書不假一辭之贊美但纘次以成編永示萬年之大訓謹撰述大明太祖聖神文武欽明啓運俊德成功統天大孝高皇帝實録一百八十三卷繕寫成一百六十五册謹伏闕上進臣景隆等無任瞻天仰聖慚懼屏營之至謹奉表以聞永樂元年六月十五日奉天輔運推誠宣力武臣特進光祿大夫左柱國太子太師曹國公監修國史都總裁官臣李景隆誠隍誠恐稽首頓首謹進賀交址平定表黃福天地以生物為心四時順序聖人以安民為德一視同仁干戈櫜戢而海宇淸平禮樂修明而神人歡慶恭惟皇帝陛下與天同運如日方中齊虞舜之文明重華協帝邁周武之功烈廣大如天顧德威之所加惟遐邇之咸服聲為律而身為度車同軌而書同文夫何交址之炎荒敢外中華之聲教爰稽厥土實古頑夷在漢唐僅能羈縻至宋元尤為叛服逮乎黎醜仍踵弊風負井蛙之見而自尊致涸魚之禍而莫悔奈何簡定之餘孽復效前尤繼而季擴之狡童再循覆轍逞狐鼠之威而蹂踐疆域恣蛇虺之毒而吞噬邦人邊塵瀰漫蟻聚蜂屯之是覩田里蕭索雞鳴犬吠之不聞衋傷造物之心憤激神人之怒皇上每垂戒諭屢擴至仁彼乃愈肆跳梁恣為不道爰興睿算用命偏師天戈一指而蟻穴盡空風帆再舉而鯨濤頓息渠魁既殄遺孽悉除共惟拯救之勤式慰徯蘇之望班師振旅喜文德之誕敷行賞錫封覩武功之載戢郡邑有守令以懷保衛所有士馬以隄防千年草莾之區變為禾黍之地纍世雕題之衆化為衣冠之民衣食足以養生絃歌足以易俗輿圖舊物于以光復山川精彩于以發舒賦列九州不止金人之貢化均萬里遠踰銅柱之功氛祲廓淸雨暘時若實由懋先之盛德冠古之隆功致今日之太平雪前代之遺恨也臣顧慚微賤幸遇聖明垂憫愚蒙有罪特加寬宥位階卿輔受恩實荷深洪始詔開百粵之新藩遂令掌二司之重寄拜命惟謹懼德弗堪易俗移風勉承流而宣化彰善疸惡誓激濁以楊清遠慕皋夔之良尚隆唐虞之治然遐􅑍之地雖異而感報之心悉同凡霑雨露之民室家相慶獲際風雲之士冠冕增輝咸欲覩照臨之淸光于以謝生成之大德臣心感激未能率領以來朝天闕遙深徒切仰瞻而下拜敢效華封之三祝恭祈聖壽於萬年進五經四書性理大全表胡廣伏以六經之道昭如日星經緯乎天地貫徹乎古今放之則彌六合卷之則退藏於密用之於身而身修行之於家而家齊推之於國而國治施之於天下而天下平蓋世必窮經而後道明未有舍經而能治理者也是以聖王垂憲必資道以開人賢哲肇基必稽古以作範故伏羲則河圖而演畫大禹因洛書而錫疇孔子刪詩書修春秋寓一王之法周公陳王業制禮樂弘百世之規况乎精一執中之傳尤重丁寧告戒之旨如斯顯迹昭然可觀自王道既衰異説蜂起燔烈秦火之餘穿鑿漢儒之弊其間存者不絶如絲莫能究其旨歸一切趨於苟且夤緣故習鮮克正之於乎聖人之道不行而百世無善治聖人之學不傳而千載無真儒遂令往轍之難尋益發前修之永嘆夫否必有泰晦必有明繇夫濂洛關閩之學興而後堯舜禹湯之道著悉掃蓁蕪之蔽大開正學之宗不幸屢厄狂言既揚復抑又因循數百年之間卒莫能會其説于一蓋必有待於今日者矣天啓聖明誕膺景運我太祖高皇帝天縱之聖以武功定天下以文教興太平首建學校頒賜書籍作養人材茂隆政治四海外內翕然同風欽惟皇帝陛下文武聖神聰明睿知纘承大統紹述鴻勳成功盛德雖三皇而無以加事業文章與二儀而同其大治已至而猶以為未至功巳成而猶以為未成體道謙沖逰心高遠乃者渙啓宸斷修輯六經恢拓道統之源流大振斯文之委靡發揮幽賾鉤纂精玄博采先儒之格言以為前聖之輔翼合衆塗於一軌會萬理於一原地負海涵天清日曒以是而興教化以是而正人心使夫已斷不續之墜緒復屬而復聯巳晦不明之藴微復彰而復著肇建自古所無之制作纘𫐠自古所無之事功非惟備覽於經筵實欲頒布於天下俾人皆由於正路而學不惑於他岐家孔孟而户程朱必獲真儒之用佩道德而服仁義咸趨聖域之歸頓回大古之淳風一洗相沿之陋習煥然極備猗歟盛哉竊嘗觀之周衰道廢汲汲皇皇以斯道維持世教者惟師儒君子而巳未有大有為之君能倡明六經之道紹承先聖之統如今日者此皇帝陛下所以卓冠百王超軼千古者也臣廣等一介書生粗知章句大學賢關渾未造其閫奧圓冠方屨固慚列於章縫幸逢熙洽之時謬忝校劘之任每受成於指教亦何假於施為樂覩就編豈勝歡慶與天下而同惠於萬古而有光尊所聞行所知求不負於教育正其誼明其道期輔報於升平無任瞻天仰聖激切屛營之至謹奉表隨進以聞親征胡虜回鑾百官賀表楊士奇欽奉敕書五月十三日大駕親率六師掃蕩胡冦撫輯降附沙漠永清誠宗社生民太平之慶謹奉表稱賀者臣某等誠歡誠抃稽首頓首上言伏以帝王之治統育於萬方仁義之師無敵於天下博施洪恩而濟衆駿揚神武以除殘廓靖北陲奠安中夏臣民歡抃海宇淸寧恭惟皇帝陛下廣大高明剛健中正惟萬物之得所溥一視而同仁舞干羽于兩階昭郁郁禮文之盛執玉帛者萬國致源源朝覲之來獨茲窮北之孽胡蠢焉自外於皇化拒招懷之綸命遏撫諭之使軺數犯邊疆肆虐黎庶蓋恣行而罔畏略無悔罪之情不得巳而用征誠為保民之計植黍稷豈留於稂莠育鸞鷟必剪於梟鴟萬乘親行運神謀於霄漢六師奮發掃氛翳於遐荒加烈火於鴻毛震迅雷於蟲户凶渠盡馘恩命覃宣撫綏殘弊之氓敷布融熙之澤春榮秋肅皆本乾元之仁日彩星華煥麗天旋之景湔雪前王之讐耻肇開永世之升平臣等欣候凱旋恭攄賀臆仰皇明於六合如日方中祝聖壽於萬年與天同久兩朝實録成史館上表楊士竒伏聞上有堯舜禹湯文武之君斯有典謨訓誥誓命之紀當時所録萬世攸師自漢以來暨于唐宋皆建史官專職紀𫐠我國家奉天啓運聖聖相承大經大法明于上善政善教𬒳于下萬方一統海宇淸寧洪武以前神功聖德史氏所記具有成書欽惟太宗體天弘道髙明廣運聖武神功純仁至孝文皇帝剛健中正廣大欽明體天之心行天之道勵精為理躬儉愛人再奠邦家中興鴻業文治光昭於日月武烈弘靖於華夷大略雄材茂功偉績規模弘遠卓冠百王欽惟仁宗敬天體道純誠至德弘文欽武章聖逹孝昭皇帝孝友英明寬仁恭儉敬天法祖制治保邦明目逹聰周詢民隱時使薄斂博施濟人撫盈成之運廣文明之化丕新政紀覃敷德澤期月之內天下歸仁二聖升遐雲車益遠萬姓哀慕海宇同情恭惟皇帝陛下文武聖神聰明􅌖智纘承大寶君國子民推廣至仁繼志述事歌九功之惟敘得萬國之歡心上念祖宗功德之隆同符天地覆載之大宜宣昭於簡册垂儀範於帝王宣德元年五月敕修兩朝實録命臣輔臣義臣原吉監修臣士竒臣榮臣幼孜臣山臣英臣漙總裁臣棨臣英臣直臣述臣時勉臣習禮臣學夔臣循臣從善臣驥臣鶴齡臣洪臣永清臣敘臣曰恭臣敬臣翰臣雅臣翥臣繼臣中臣叔剛臣文奎臣節臣錫臣蕚纂修發左右史臣之所記閲中外官府之所上兼考章疏參之見聞編載事功必備著其本末纂述謨訓必致謹於精微關制度者雖細不遺切幾務者雖明必審於紀敘聖神之道德如繪畫造化之功能擬諸形容誠難髣佛乃若附録臣下必在究明是非訖五年正月恭成太宗文皇帝實録百三十卷仁宗昭皇帝實録十卷合百有四十卷謹繕寫上進伏念臣輔等智識淺陋學術空踈曠歲月而久稽亦討論之惟謹方諸良史深愧乏三長之稱監于先朝庶少資萬幾之暇經筵謝表知經筵事太師英國公臣輔同知經筵事少傳兵部尚書兼華蓋殿大學士臣士竒少傅工部尚書兼謹身殿大學士臣榮禮部尚書兼翰林院學士臣溥兼經筵官詹事府少詹事兼翰林院侍讀學士臣直少詹事兼翰林院侍講學士臣英翰林院侍讀學士臣時勉臣習禮侍講學士臣循侍讀臣衷侍講臣榖修撰臣愈臣鼐等兹者恭遇經筵肇啓聖學維新講讀侍臣咸膺恩澤謹奉表稱謝者臣輔等誠歡誠忭稽首頓首上言伏以天淸地寧昭聖皇之統御時康道泰美文治之隆興日月光華中外欣悅恭惟皇帝陛下聰明􅌖智廣大寬仁尊尊親親崇兩宮之至飬推恩布德得四海之歡心是以三光全而寒暑平五榖熟而人民育益勤稽古之學益弘飬正之功謂易書詩禮春秋之文皆堯舜禹湯文武之道萬幾有暇恆親御於經筵多聞是求肆詳延於儒雅用資啓沃用致進修上以承帝王心法之傳下以錫臣民皇極之福光祖宗之洪業擴海宇之隆平臣輔等猥以庸才咸叨榮命荷絲綸之飭勵繼宴錫之駢蕃於緝熙單厥心允協周成之德念終始典于學敬陳商説之篇巡狩及平胡回鑾旨官賀表伏以巡狩省方舉帝王之盛典回鑾振蹕煥功德之大成八表淸寧萬方欣戴恭惟皇帝陛下聰明􅌖知廣大寬仁奉天勤民秉聖誠之純一繼志述事溥德化於雍熙尚惟親歷於撫綏肆用肇稱於巡省兩京弘建瞻日馭之輝煌萬乘吉行霈天恩之洋溢聖仁篤近而舉遠神武除暴以安民天討用彰奮風雷於瀚海皇威所至廓氛翳於隂山神靈煥發於嘉祥孽虜莫逃於遺類盡雪漢晉唐宋之耻永隆國家宗社之基六師咸奏於凱歌四海遍騰於歡頌雲承翠輦回龍御於九重星拱紫宸上天顔之萬壽臣某等忝班朝列喜切遭逢聖治神功仰昭明之如日瑶圖寶曆祝悠久以齊天駕幸文淵閣謝表楊榮臣楊榮等兹者欽蒙聖駕臨幸文淵閣周視臣等寓直之所特頒恩命增益室宇兼賜飮饌器用周悉備至聖恩廣大感戴惟深謹上表稱謝者臣等誠歡誠抃稽首首上言伏以日月光華當大聖龍興之運車書混一正文明天啓之時鑾御幸臨儒紳遭遇恭惟皇帝陛下聖神天錫剛健日新典章法度之弘修功成理定華夏蠻貊之率俾近恱逺來萬幾餘間怡神稽古六龍捧御寵顧延英上深軫於天心俯垂矜於寒士廣其室宇遂涼燠之攸宜給以饔飱兼什器之咸備凡百所用靡一弗周同乾坤覆載之恩踰父母生成之賜是皆皇上聖仁廣大明􅌖照臨溥德澤於萬方施由侍從昭禮文於千載髙出古今所以致海宇之雍熙所以隆皇圖於永久臣等深慙末學幸際明時𬒳沐恩榮匪名言之可罄䇿勵駑鈍豈報效之敢忘端秉寅誠恭陳申謝龍翔鳳翥瞻五彩於中天春育海涵祝萬年之聖壽駕幸太學謝恩表胡儼國子監祭酒臣胡儼永樂四年三月初一日欽蒙駕幸太學謹奉表稱謝者臣儼等誠歡誠忭稽首頓首上言伏以明德建中立百王之大法崇儒重道闡千載之宏規綸音渙發乎九重士氣聿增於六館歡均朝野慶洽天人恭惟皇帝陛下濬哲溫恭剛健中正仁義同於堯舜功烈邁於禹湯闕里詩書敬仰先師之如在寰區聲教啓迪後學於無窮式崇舊章肇稱殷禮鑾輿幸臨於璧水縉紳圜集於橋門惟君惟師以教以食衣冠之美籩豆之序秩秩乎有容鼓鐘之音絃誦之聲洋洋乎盈耳自唐虞三代以來未有盛於今日者也臣儼等忝職成均叨承寵遇敷言是訓永依日月之光華造士登崇願效涓塵之輔報無任瞻天仰聖激切屏營之至謹奉表稱謝以聞進實録表王直臣聞自昔帝王有大德以及於萬民則必有信史以傳於千古是故堯舜之道載諸典謨文武之政布在方册漢唐而下皆有成書欽惟宣宗尊諡章皇帝剛健中正廣大髙明纘祖宗之鴻圖隆慈聖之至養修六府而備三事親九族以和萬邦好生之德允洽於民心育物之仁實協乎天道有戡暴除亂之武有經天緯地之文聲教宣昭禮樂明備華夏蠻貊罔不率俾山川鬼神莫不底寧大略雄才豐功偉烈輝映前代儀範後來奄龍御之上升切臣民之哀慕恭惟皇帝陛下聰明􅐶智文武聖神尊祖敬宗繼志述事上念先皇之德業必著簡册以流傳爰敕儒臣纂修實録啓蘭臺之所載紬金匱之所藏徴諸官府之文書參以耳目之聞見大經大法備究於精微善政善教致詳於本末言足為訓雖簡必書事之可師雖繁必録造化生成之妙固莫罄於名言日月照臨之明亦豈容於繪畫至若臣下之附載勉盡是非之至公恭成宣宗章皇帝實録一百一十五卷寶訓十二卷及目録凡例合一百二十九册謹繕寫上進臣等愧膚淺之無庸屬編摩之甫就傳于來世永昭道德之光率是嘉猷茂衍太平之慶賀新殿成表伏以北京建極開萬方會同之都南靣嚮明受一統華夷之貢宜規模之宏逺聳遐邇之觀瞻率土騰歡普天稱慶恭惟皇帝陛下剛健中正睿知聰明丕承列聖熙景運於太平茂育羣生暢淳風之清穆惟尊祖敬宗之大在繼志述事之能顧朝廷當備於崇嚴而宫殿必資於營搆秪循舊典式闡鴻猷兆姓子來咸自樂以效其用庶邦星拱皆不勞而觀厥成巍巍麗紫微之髙翼翼表宸京之壯續靈臺之贊詠誠儷美於周文紹總章之逹聰實比隆於虞舜仁恩溥博德化宣昭廣宅中圖治之謨恢保大定功之備本支繁衍宗社奠安臣欣遇盛時恭陳善頌仰皇明於八表如日之升祝聖壽於萬年與天同久釋罪後謝恩表陳循臣陳循謹奏為謝恩事臣仰蒙皇上天地之大日月之明垂光於覆盆無幽不燭回瀾於逝水無逺弗追拯念褒加哀矜憫恤臣不勝感戴之至理合謝恩臣循誠惶誠恐稽首頓首百拜謹言恭惟皇上一德同乾坤之廣大咸覆載於萬万重華合日月之貞明普照臨於八表如臣草茅之賤質亦蒙江海之深恩向𬒳陷於落井下石之讐人遂謫以屯田備邊之戍卒斯須難保顛沛靡寧戰戰驚心惶惶度日萬幸仰賴天與皇上深恩厚德庇佑臣身處患難於四五年間臨萬死而得一生受艱苦於數千里外度危災而存殘喘兹蓋伏遇皇上聰明聖智寬𥙿溫恭如日方中極廣大高明之盛與天同久盡財成輔相之功作之君作之師追配乎堯舜禹湯文武明其誼明其道務契乎易書詩禮春秋得萬國之歡心臻一統之盛治明見萬里之外尤嚴照於覆盆仁敷九域之中重發生於枯木孳孳養賢以及萬民之心切切愛人必先四窮之意雖愚臣薄命負尋章摘句之庸材荷聖主深仁除執鋭𬒳堅之重役恩命播傳於千里士庶欣聞歡聲振動於一家妻孥舞蹈幽壑春生於腐草廢爐暖發於寒灰縶鳥出籠復遂山林之素性涸魚得水獲逃鼎爼之橫災親恩豈能及乎君恩再造實不下於洪造雖百口粉身碎骨涓埃莫輔於河山縱九泉祕魄藏魂頃刻難忘於德澤恨筋力日衰於老病不能效犬馬以驅馳奈忠誠長激於心肝期永同葵藿之歸向竭一誠而祝望頌萬美以揄揚匪愚陋之私情誠華夷之通願敬天法祖聖明巳超冠於百王納善用賢皇上實允符於二帝制治保邦之有道承先𥙿後以無虞是以三光全而寒暑時溥致百榖熟而民人育江河海嶽重重鞏固於四方子孫曾玄聖聖繼承於萬代得其位得其祿興隆逺紹於皇圖長如地長如天永久上同於聖夀臣謹齋沐昧死具表謝恩以聞皇明文衡卷之五
