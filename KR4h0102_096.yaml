front:
  text: 皇明文衡卷之九十六
  hash: sha256:95d2d2903e8e2a9f27fd8a268944877def7bb76ac9b00040932e92a0038a674f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_096-1a}
body:
  text: 哀誄彭百鍊哀辭有序楊士竒宣德五年上憫江西之民困於姦吏豪民漁敓無厭也用璽書遣使巡視除凶去弊以安善良使者以朝廷所建設縣之老人周悉民隱所至事必咨之而惟其言之聽不疑然是時老人非皆出於推擇善不善相半不善者把持譁訐為能事其善者亦且斂手避之而縣長吏鮮不受制於是姦豪吏民聞使者來惴惴懼旦夕且死暮夜走跽老人投重賄哀叩求活既內賄曰吾庇汝汝謹母忘我而凡所對使者言某是某非非盡出於公矣蓋所在皆然使者至泰和留旬浹治事竟將行矣時監察御史彭百錬侍親家居親喪有事於外適暮風雨大作馳騎過快閣下使者侍坐閣上倉卒不及下避徑馳去使者遙望見之遣問知百錬也明旦使者去之萬安龍泉還止廬陵會有按察司官來聞使者言百錬馳馬不下遂趍泰和召縣之衆老人索百錬居鄉所作愆過咸對無之至再三衆老人對如𥘉惟一老於百錬素有憾貌𣣔有言乃悉出衆老之無言者而留𣣔言者導之言遂掇拾其嘗買妾及田四事而其最妾者謂挾制縣官放免百夫長溫彥琮得白金三十兩遂令書狀乃復進衆老之無言者出狀而掩其前之半以後半空𥿄俾聮書姓名為據蓋衆老驚未知狀所言何事也按察司官遂今衆老以夜伺百錬而執之然猶未有固必意密戒云如其他出即止勿執亦勿泄言適百錬治喪事出外一二老人欲得按察司官意躬率百餘人夜走數十里外蹤迹掩執之百鍊平素負氣義侃侃憫窮嫉邪遇事直發靡所顧避雖退處鄉䣊不變以是滋召怨其居鄉時朝廷造海舟令民夫採桅木泰和當出三百夫以富民三人充百夫長率行傅著巳定縣時惟丞治事孱弱不能制下姦人及吏胥謀茍利盜出縣帖復追鄉二百八十人皆為百夫長期一人得白金十數兩免之於是六鄉歡然大擾溫彥琮者百錬姻家素窶甚預焉計無措走告百錬百錬入縣庭索其牘閲之其所追二百八十人不具按檢乃言於丞丞實未嘗知也遂悉罷二百八十人不追擾者以定皆德百錬而姦人邪計不行愈益側目之矣百錬既𬒳執至庭下得覩老人所具事狀曰果如老人言宜有告者今既無告者請及老人靣對就死不恨不聽遂械繫送詣使者轉送京師凡使者所送詣京師非死罪皆發戍遠邊獨百錬適遇寬恤之令得內米贖罪罷其御史而命吏部改授官未及以疾卒百錬由進士為御史其文學皆有所自得非尋常之為進士者可及其仕必欲行所學不肯媕婀玩愒其所歷兩淮江浙廣東皆有政績見於其人稱道思慕未巳也而間居無事乃遭罹若此豈其命歟然而獨霑寬恤之令將改授官矣無幾竟卒信其命乎自百鍊被執泰和之人無貴賤賢愚來京師道其事者凡數十人如出一口故卒之日京師搢紳君子皆傷悼枉之古之人有言蓋棺論定百錬庶幾可以無愧楊氏於百錬纍世姻婭雖百錬為人素於余不相合然不合者一人之私也所謂傷悼枉之者衆人之公也君子不以私廢公故為述其得罪之由為哀辭使其家刻諸墓蓋曰屈於前尚可信於後也其行之見於墓銘者此不復出哀辭曰百里之民有耆有耄用其惇厚率民于道亦資正言裨輔邑里逝者何臧來者而否邑有視聽蔽其明聰衡從肆厲為下斧斨貍以牧雛狼以牧豚誰實使之於乎匪仁誰實聽之漫不加省惡者脫罟善者墜穽直者鮮忿邪者衆説柔者以全剛者以折嗟世之人莫非命焉憎愛廢舉彼胡能然惟命之然成是邂逅譽毁得喪奚彼之詬嗟嗟百鍊命也奈何宵人之怡君子之嗟蔣隱溪挽辭三首顧瞻兮堂前卷帷幕兮藉蘭荃陳淸醑兮載肥鮮韻悲管兮切哀絃凄風激兮櫺軒雲黯黲兮靈來旋恍如睹於形色兮儼若聆夫笑與言言可聆兮意不傳悵思公兮臨几筵北風凜凜兮天雨霜木葉脫落兮百草黃翩銘旌兮辭高堂登靈車兮秀沖岡蒿里歌兮哀以傷玄室一閟兮夜甚長魂渺渺兮何方螺山崔崔兮螺川湯湯靑原與白鷺兮鬱相望悵思公兮遊故鄉玉珮兮瓊琚霓衣兮霞𥚑秉元化兮握靈樞列缺從兮豐隆趍倐隂而陽兮忽卷而舒睨視濁世兮如子渠飄然乘風兮凌太虛參王喬與韓終兮列仙為徒遊紫微兮帝之都悵思公兮邈天衢楚林王先生哀辭有序楊溥豫遊鄉校時湖湘間有若三吾劉先生南賔陳先生以碩學雅德顯名當時及豫出仕皆物故矣每以不及見為憾今觀楚林王先生行迹乃知其與二先生為同輩重有感焉先生子愷僉廣西憲司事憲僉之館甥工部虞衡郎中程鑑皆以廉能名詩書之澤尚存而先輩不可作矣為辭以哀之辭曰楚山高兮湘水長仰浮嵐兮俯流光可樏兮可航懷高人兮長往獨惆悵而悲傷繄占畢於鉛槧兮將求志於所獨也出膺民社兮亦非大賢之路也𬗟惟前修孰不欲為伊兮為周抑有命兮何求嗟彼昧者由顯而河兮較其所獲孰為優兮望瀟湘兮延佇挹馨香兮蘭浦諒天道之可徵兮尚有觀於先生兮楊處士哀辭有序胡儼處士諱美字子將姓楊氏元太和州文學諱榮之子翰林待制諱景行之孫贈富州尹騎都尉弘農郡伯諱復圭之曾孫其先系出華隂漢太尉震後為廬陵人處士幼頴敏讀書為文超於行輩善事重闈以孝稱處昆弟克盡友愛其最難能者蹈危履險以葬其叔父雖盜賊凶愚亦感其誠意求之古人不槩見處士之德善如此然卒遭喪亂蚤世不克竟其所施誠可哀也既卒之四十有四年其遺孤左春坊左諭德兼翰林侍講士奇懼濳德弗耀乃以劉禮所撰行述來徵言余惟有德者必有後而後嗣之賢亦必本其先觀於諭德可以知處士矣故為之辭曰若有人兮好修承華胄兮西州抱德美兮襲淳烋王韞櫝兮不售華綵衣兮䋔䋔親余愛兮樂孔休鹿之鳴兮崇丘嗟子襟兮我求漸摩兮息遊繄我心兮悠悠迎安輿兮山之陬攀桂枝兮聊淹留何狡童兮黠偷逞不軌兮競戈矛倐豕突兮怒擩肆毒噬兮仲叟有昊兮莫投淚浪浪兮曷能收既不余兮閔憂反縶余兮見讐鷹忽變兮為祝鳩幸余鑒兮慺慺斂遺骸兮裳裘閉重泉兮林之菆擷芳兮採莍奉朝夕兮綢繆慨同氣兮拘浮捐余珮兮是酬念復路兮回輈野闃寂兮將誰儔對農人兮事鋤耰徒悵望兮西疇歲苒苒兮不我優悲鶗鴂兮鳴鵂鶹哀人生兮迫遒修短數兮抑又何尤獨令德兮詒謀鍾厥㣧兮遺庥慶澤衍兮聲光流天之報施兮孰云其幽吳先生哀辭有序梁濳吳先生字孟勤吉之安城人豫自幼聞先生名甚熟及來史館始獲拜先生焉先生雖老色夷氣暢善道古今事終日不倦時方纂集太祖高皇帝神功聖德簡牘浩繁事有弗得其端者或以質之先生先生手按其書口誦其語出其端緒節目若引瓢而注之聽者如目睹其事蓋先生識見高明非徒能記臆也其於英豪偉傑之士心志謀略設施後先亦自然符合於乎使先生用於時措之事業當何如也然先生方慕古之廉士其自視甚高不求阿色於時由是遂與世抹榝終身負此自困不改也其為文章簡質而溫潤操筆立成若不甚經意者既成讀之雖苦思力搆者不過是也史書成得蒙恩賚授河南開封府學教授蓋聖上意以是可優老先生孰意先生遂去此長逝不返邪方去時翰林群公合交遊之士以相餞莫不舉觴相屬謂先生復來固將動色以相候曾幾何時而盍簪牽袂之歡遂為扼腕傷神之痛於乎悲夫賦之深而未竟其施世固有如先生者豈非命邪先生長子善存謀返葬而未果今翰林學士解公巳為銘其墓余因悲之以辭曰崇岡兮峩峩春將暮兮水增波蘼蕪緑兮桃始花悵獨望兮天之涯君不復來兮豫恫而嗟學之茂兮弘暢承先啓後兮伊誰弗諒彼連駟兮充逵獨方輪兮焉之彼插羽兮薨薨獨戢翼兮噤不以鳴名之光兮行之塞人弗施兮於巳焉汨古則然兮今奚惑汴之濵兮河之阻洪濤湯湯兮不可以度羌獨滯此兮不還雲橫天兮地漫漫使我悲兮憂萬端酌清酤兮盈樽陳嘉殽兮藉以蓀神來歆兮不可以同吉之水兮孔幽上有叢木兮枝相樛君不懷兮故丘秋霜兮被野曠茫茫兮宿莾君曷寧兮故宇大明故左春坊左贊善贈太子少保諡文肅徐公誄辭有序金實洪武壬午歲實始來京師天台徐先生好古時方為太學博士與從父傅霖翁同官甚相好故實得亟見先生引接良厚永樂二年仁宗立為皇太子妙簡輔導之官先生由太學入為春坊司直實時沗以翰林官屬進講經筵獲與先生朝夕同事既而又獲同僚實嘗視先生為父行而先生謝弗居遇之益親後實以母憂去官巳亥歲復來京師值先生病巳篤聞實至強起衣冠二子掖之坐出酒饌享實亹亹談别後事爽然若無疾者且曰老夫却粒巳期月日唯飲醇酒一爵今日見吾友當倍之復再舉爵一飲而命二子為實引滿數行既醉辭去將趨行在先生送之及階執實手謂曰吾亦當考績計不能北上幸為我謝故人前途宜自重吾與子訣矣因嗚咽泣下實亦不能仰視明日登舟而先生竟卒時十月二十一日也仁宗在東宫深悼痛之自製文一再遣官諭祭且將裒其遺文梓以傳甲辰秋即皇帝位首詔贈先生太子少保諡文肅建祠墓下勑有司春秋有事復四家丁役以奉祠事嗚呼先生以純粹博雅之學徑正修潔之行和而不可同謙而不可踰所謂有德有言者矣雖不及柄用以大其施而當儲君育德之日能以聖賢治心修身之道引翼取信卒光身後之名奚負所學哉先生之仲子衍受辟為邑校官奉少傳東里先生所撰墓志示實捧而讀之九京莫起益增感慕乃述其行為辭以誄之曰天台之山上應列星俯挹渤澥高杭青冥扶輿孕秀夫子是承稚齡卓爾弗詖弗傾𥘉遊郡庠具曰老成論為秀士首詔賔興實華彪炳六館蜚英繁曜麗空忽見夜明萬葩鬪豔徑松獨貞司成嚴厲衆莫敢攖學徒千數畏若雷霆惴惴揖拜栗蹈矩繩夫子來覿煥若釋冰開顏霽威如酗解酲實由德孚孰曰意迎錫符分教士有軌程範鎔來秀若冶剖鉶太學三年虀鹽味經濟濟多士于于在庭悉屏糟粕浥以醇淸儲皇育德簡卑至精瓊琚玉珮峩冠彯纓引翼惟正啓沃惟誠旁塞多岐示之中行言出則俞有歌斯𢋫明良值遇宜作股肱胡不愸遺溘焉遐征哀訃上聞痛悼奚勝諄復賵遺終莫罄情逮于踐祚褒贈首膺秩崇師保諡錫嘉名尊軼三者榮重五更享祠聿建封域載營麗牲有碑玄堂有銘樹之松檟雜以楸柳歲時有事帝命使令牲肥酒香盞斚豆登薦祼興俯有赫厥靈玄液下滋幽光上升𥙿其孫子以及後生嗚呼夫子孰與抗衡疇昔好言遼邈九京光風霽月想見儀刑爰述衆美寄之哀聲有不知者庶幾可徴裴侍郎哀辭王直公裴氏諱璉字汝器監利人初遊學郡庠年甚少巳嶷然如巨人長者久之升太學擢知劒州三年升浙江按察僉事改江西坐纍謫興州太宗在位召為北京道監察御史升河南按察副使又以纍得其巢穴以計擒之而請釋其餘上初遣公謂還當大用而用事者嫉公絀其謀間踈之不召見而罷其為侍郎尤侃侃自信敬恭朝夕有大臣之體在劒昜時興學養士至親為講説賞勤而勸惰諸生多賴以成流風餘澤今尚有存者蓋公之志敻然出儕輩故所至有立豫之知者如此豫所未知者計亦偉特猶是也平生淸約自持不苟取妄求仕四十餘年如一日雖纍遭譴謫皆非以私過得之故每斥輒復晚節優遊以榮名終享有盛福此好德之驗也豫為諸生時巳獲瞻風采其後同朝又充深知公嗚呼今不復見矣則安能巳於情哉作哀辭繄公之生兮秀所鍾儼玉立兮偉儀容才既美兮學則通氣浩然兮縮以充懷竒寶兮慶遭逢有民社兮奮厥庸興惠利得其巢穴以計擒之而請釋其餘上初遣公謂還當大用而用事者嫉公絀其謀間踈之不召見而罷其為侍郎尤侃侃自信敬恭朝夕有大臣之體在劒昜時興學養士至親為講説賞勤而勸惰諸生多賴以成流風餘澤今尚有存者蓋公之志敻然出儕輩故所至有立豫之知者如此豫所未知者計亦偉特猶是也平生淸約自持不苟取妄求仕四十餘年如一日雖纍遭譴謫皆非以私過得之故每斥輒復晚節優遊以榮名終享有盛福此好德之驗也豫為諸生時巳獲膽風采其後同朝又充深知公嗚呼今不復見矣則安能巳於情哉作哀辭繄公之生兮秀所鍾儼玉立兮偉儀容才既美兮學則通氣浩然兮縮以充懷竒寶兮慶遭逢有民社兮奮厥庸興惠利兮蘇困窮建學校兮師文翁持憲紀兮楊淸風矯一鶚兮橫太空植善柔兮除姦凶履巉巗兮窺崆巄殄冦難兮銷兵戎陪鶴駕兮熙事功搖玉珮兮鏘玲壠副六卿兮位愈隆勤夙夜兮甚嚴恭涪之治兮安𧖟農嬉白叟兮歌黃童飼林淸秩兮恩所封煥勑命兮回鸞龍優遊以老兮當時雍頌詩作兮聲渢渢奄一去兮白雲中混希夷兮超鴻濛望不及兮心沖沖帷疇昔兮抗高蹤事聖主兮暨三宗柔淸德兮將無同善其始兮愼其終宜壽考兮齊喬松胡不愸遺兮天夢夢彼狪兮愚且蒙乃悠久兮昌而半欲往問兮安所從蹇徘徊兮發哀恫思公不見兮奈何乎公弔陳先生文王英豫嘗至番易自浮梁山中道經德興父老言前令陳公孟藻德政為卓魯民受其惠惜去而亡矣後之為縣者皆貪刻苛猛豫聞而悲之是時公殁久矣豫與公之子敬宗登進士同官于朝又得備考公之行誼追悼往昔為文以遺番人俾永其思其辭曰余浮番以遠征兮歷先生之故治遺老泣而告余兮嗟後時巳十祀心悵恍以永懷兮宵耿耿而不寐顧惟此而倣徨兮嗟若先生豹隱幽壑兮虬濳重𬈑處困而亨兮藏晦以明志熙恬愈兮其蘊則宏望之興周兮説逢于殷處此下邑兮不驟以進綰章與綬兮佩仁履信彼狡之氓兮欺則弗忍澆者既敦兮鶩者益遠嗟哉其此去兮卒莫我返鴟梟翶翔兮鷹鸇利吻張呀互赫兮爭饞肆忿囂嘵而群處兮既飫且吐登稂莠以為饋兮毁棄黍稌衆離嗷嗷兮疚餒待哺夫豈不懷先生兮如失父母故世之所惜兮謂先生內實無疚而其所悼兮曰年未中壽材宜棟梁兮胡乃橐朽車可任遠兮輪折而覆道才可以經濟兮施則未究顏天而冉疾兮人孰其詬彼或幸其災兮何疾美而夸醜惟尼父之興歎兮曰善人吾弗覯余故撫膺而深喟兮獨揮涕以隱憂已矣乎先生不可見諒逹人其大觀兮處順而知變視有形而終化兮理固宜然彼崆洞與玄圃兮杳而莫攀彭聃之矯矯兮今安在焉惟死有所不泯兮斯乃為貴黔婁終窶兮柳下惠之薄仕宓子賤之有譽兮仲卿之有嘉惠既在古以為然兮豈今世之能違故余祛衆惑之慘戚兮以申先生之思睇列星於冥漢兮雲霧滃而神馳巫減為余致處兮招遺靈而來歸奠桂酒與椒漿兮重慨想於昔時中鬱抑而坎坎兮乃斐然而陳辭庶百世之下兮惟先生之是思哀劉兩溪辭有序周敘余以使命道湘川悲屈賈之懷忠齎志以殁用效其人之聲各為辭弔之使歸便道過家上冡瞻望安成有懷故人劉兩溪欲絮酒致奠迫於王程不能得停雲延佇沾灑者久之兩溪之事視屈尤深足悲者時當承平主上㭟勤與民休息第蔽於權幸政務乖張災異數見兩溪侍講經筵感激奮發因事指陳光明正大遂忤權幸設他事下之獄黨惡者順旨栲掠體無完膚梃然無一異詞唯呼天自明越數日竟就斧極刑秉屈三閭之精忠罹顔常山之荼毒於乎慘哉兩溪平生孝友篤至於朋友急信義教人盡誠懇居常侃侃以古人自期安成春秋之學自李行簡先生後紹而大之者兩溪也其在經筵每遇撰進講章非堯舜三王之道不陳至於麟經尊王黜霸內夏外夷之辨尤深致意真得講臣體使不遭酷禍所成就可量乎哉於乎悲夫兩溪余平生同志友也情見乎辭有不能巳用寫哀些三章向風焚以招之且鋒藳祕而藏諸篋笥他日兩家子孫得而閲讀之庶知兩溪之忠與余之悲兩溪諱球字求樂一字廷振兩溪者其弟子尊稱之詞世家安成茨溪後徙家之葛溪余則周姓敘其名功敘其字石溪其號也辭曰曕雲山兮安成西懷故人兮我心惋悽虎豹晝號兮鴟梟夜啼隂風悲慘兮毒霧冥迷欲往招之兮睇艱險而無蹊天茫茫兮至道睽名昭昭兮日月齊於乎歔欷兮懷哉兩溪瞻雲山兮薊城北懷故人兮我心哀惻天門晝關兮虎衛厄塞蛇虺縱橫兮夔龍斂迹欲訴帝之無由兮道邅回而屏息魂恍恍兮渺何極淚淋淋兮氣填臆懷哉兩溪兮冤誰與白瞻雲山兮湘水幽𬗟懷古之人兮我心增憂古人今人兮我何尤攄忠滅身兮異世同猷哀莫哀兮沈清流慘莫慘兮魄野投死生一視兮如彼浮漚千秋萬古兮屈劉匹休大傅安國孫恭憲公誄劉定之維昔太公生周邑薑婦文嬪武孕成啓康受封于齊今幾千祀維安國公復起齊地篤生聖后配我宣宗以毋皇上乃登三公維公之德以敬為主曾蘊丹書厥名乃取維公之爵自伯而侯進號大邦寵祿優優維公之壽踰八望九玉蟬金貂輝映白首壽爵及德與太公同亦葬于京靈旐不東內相期頥後昆繩蟄五子十孫殆過吕伋皇家萬年誰與齊休曰伯叔舅異姓元侯皇明文衡卷之九十六
