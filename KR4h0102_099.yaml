front:
  text: 皇明文衡卷之九十九
  hash: sha256:2202bb04997277d78dddf12f45ed5eb357999f7650f167d13ee47a6af64f2376
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_099-1a}
body:
  text: 補缺抱琴聽泉圖劉崧吁嗟乎空山抱余琴以來歸兮吾將以彈山之窪兮石之湍我其聽之兮以寫猗蘭按金徽兮作復止風泠泠兮觸宫徵泉之流兮雲中漱鳴至兮聲淙淙忽幽咽以下愴兮匪絲匪桐啼秋猿之嫋嫋兮下南飛之雙鴻山中之人兮不可遇余徘徊兮中路九疑蔚兮隔烟霧我思南風兮噫其遲暮代祀海濟紀成樂章岳正迎神金節晃兮􅌭繙翥翠華揺兮葳㽔舉驂沆瀣兮駕甸始屏翳驅兮豐隆駛鞭雷霆兮叱風雨逆惟怒兮惠惟喜香芬茀兮景悽靡羗洋洋兮如誶語神兮神兮斯戾止禮神鼓鍾奏兮鏜鏜簫管揚兮琅琅帛有玄兮玉有璜羗煜煜兮爛盈箱黍稷芬兮有苾其芳簠簋飾兮厥文孔章肅玄端兮斂衣裳儼誠敬兮靡不將神兮神兮假有光初獻爵初獻兮誠巳萃鼻絶嚏兮志不悖衣冠肅兮容體懿昭對越兮凝念慮答元功兮靡自媚眎明鍳兮嚮予意時雨暘兮醞和氣蓊穰穰兮育羣類神兮神兮民所庇亞獻爵再獻兮誠正精虚室白兮靈府澄震雷迅兮神靡驚七鬯安兮端不傾犧尊圭瓉兮兩楹大羔玄酒湛且明民與嘉貺國與禎千古萬古恒不攖神兮神兮予爾盟終獻爵終獻兮誠彌篤神安娛兮光耀燭宥災靑兮降釐祿柄予奪兮挶禍福失恒道兮殃品物陵爲波兮川爲陸稼不登兮人不育苦墊溺兮慉怨讟神兮神兮爾之辱承釐膳膏芬兮酎酒馧罍尊彞爼羅􅌭紛明禋傑制全夲文旣醉旣飽神載忻嘉貺蕃釐乃爾分惕息受命如有聞錫爾民人錫爾君八方維時百榖蕡上方下方覃厥仁樂神擁靈姬兮侍玄女蠵吹笙兮鼉擊鼓長鯨淸歌老蛟舞河伯行酒御龍脯百神效順恩湛溥嘘爲淸風噀爲雨風雨維時澤下土神兮神兮樂何許終國家兮萬萬古送神飊輪輾兮雲爲衢羽葆張兮蜺化旗雷公蹕道婢雨師電毋舉燎驅封夷千騎萬騎魚龍隨山爲裂兮川爲移去矣直與玄㝠期神不厭斁民允禧年年歳歳春秋祠大濟詩降神大行之西兮王屋之東危巔宻岫兮實神所宫發爲沇兮注爲滎注流顯伏勢愈雄出雲致雨灌濟功千秋萬歲兮報祀同迎神隂風颼颼寒景流神之來兮驂兩虬蠙珠結佩琅玕鏉湘靈作儐原胥儔先驅欲至妖氛收䕫魖斂迹魍魎愁禮神招揺轉兮夜未央庭燎舉兮天有光象在陛兮登歌在堂庶羞盈爼兮醍酒盈觴神兮神兮爾惟甞玉帛煌煌誠所將初獻神兮至止御法宮縞衣玄裳蟠兩龍元精耿兮貫白虹休徴應兮來淸風駿奔走兮嚴百工爵一奠兮誠始通亞獻綵雲宻幬流蘇敷錦裀重匝鸚鵡鋪明靈妥兮懽且娛慰我民兮錫以符和氣甘霖無地無爵再獻兮誠巳孚終獻馮蠵鼓舞忻且抃蜿蜒嬉逰隱復見羣靈百恠歘變幻神載歆兮示昭鍳福我君兮壽無算爵終獻兮誠靡間承釐天子壽考民物休降祥祉兮該九州導神和氣迎神麻虎拜稽首誠愈修神兮神兮良厥猷作神羞兮予爾訧樂神吹管兮鳴簫鼓鐘兮伐鼛都盧漫衍騰神鰲玄㝠起舞黔雷跳神載懽兮何所昭休嘉砰隱妖祥消送神膏鳳輦兮秣龍馬蜺旌羽蓋紛布野赭鞭鞭山山爲赭金戈指天天亦撦九垓八埏恣上下雲飛飛兮神去也李忠定公祠記柯濳邵武郡學東故有宋建炎丞相李忠定公祠淳熈中教授徐元德建晦菴朱夫子爲之記其後遷改不常以至於廢迨我朝正統巳未郡守徐述復建於舊址吏部尚書王文端公爲之記成化戊子詔有司歳春秋享祀蓋因教授張君濟之請而郡守盛君同知王君琳通判劉君貫遵承惟謹又訪其後之秀頴者進爲學生且盡復其家族之人以稱德意旣而盛君又欲新公祠致仕郁憲郡人陳公泊郡學師生請以學傍佛舍曰化城院者改爲之提學僉憲㳺公亦慫慂其成方課始事而盛君以朝覲去及歸更任延平遂不果庚寅之秋廵撫都憲滕公蒞兹郡謁拜公祠舉公忠義風勵諸生諭郡守馮君孜封埴李氏墳墓且進其後於學者數人諸生因白向者改祠之事滕公卽詣化城院見屋宇猶完整不假修治遂撤去佛像奉遷公之神主於其中祼奠妥侑如法郡之人士來觀咸欣躍以爲宜馮君謂兹盛舉不可無傳乃走書致滕公之意屬濳記其事濳惟李公學行純正負天下之重望以一身去就爲國家之安危其忠義誠切見於奏議而措諸行事者已震耀一時雖庸人孺子猶能誦其勲名欲跂見之而不可得又有朱王之文實在于壁其出處始終載之詳矣濳復何言顧惟古今人物如公者蓋不多見當時小人側目讒言蠭起使公屢遭竄斥不得盡用其才於世而宋業卒至偏安於一隅重可嘅已夫䜛邪之能壞人國也如此有天下者所宜深戒覆轍之虞信任忠賢以爲長治乆安之計不使讒言得以間之而委質事人者當勵公所爲不以讒間之言變易其節以至於失身而忘君此濳之所以欲見於言也况兹改祠非特表崇忠良為可紀而廬佛舎不惑於異端因舊貫不費乎民力皆世之為政者所不䏻及也遂具書之俾刻于石以示來者且以寓潜景慕先哲之心云叅不當與虜講和奏議于謙兵部為陳言邊務事該鎮守大同叅将都督僉事許貴奏查得正綂十四年十二月内節該欽奉詔書内一欵朝廷求言本欲聞善道知警戒凡四方災異事干國體者所在官司即時聞奏欽此欽遵臣照得大同三路自舊歲七月以來至今逹賊不時攻圍四散槍掠臣守西路地方又係緊関衝要賊行四通道路節次浸犯攻圍臣領所部官軍相機截殺追赶累次奏報外切見邊城軍民趂空樵採柴草搶割田禾度日不爲經常之事卽目正當農種之時雖令各人照舊耕種但聞邉墩不時舉放砲火人心驚恐自不安生况今逹賊聚集人馬衆大少者五七千多者一二萬整陣入境攻圍各城在邊軍民人䓁不敢出城樵採收割又無經營各衞倉厫舊歲民間該納秋夏粮料草束爲因路阻運送不前見在邊儲官軍馬匹按月支給有减無增再照西路五衞馬隊原有官軍四千九百二十員名先於乾沔䓁處與賊對敵陣亡中半囬衞見在者又有𬒳傷旗軍告令弟男替代俱係未經操習戦陣之人舊役慣戦馬軍十無三四又况見在馬匹止有二千一百餘匹中間多有新例借勸收買兒騾小馬不堪騎戦十有二三比與原舊馬數缺少二千八百餘匹及照本年二月内臣差千戸張鑑𬋩領無馬官軍一百八十一員名前去墳嶺墩設伏有賊到墩攻圍未戦之時內有逹賊三人通曉漢話呌稱我一箇是女直同知一箇是浮石叅謀一箇是哈宻指揮我耒近墩打話你毎聴着要講和着𬋩你毎的大頭目奏將去連夜差使臣來我毎便囬去你若不耒講和我每三班人馬輪流打攪你不得種田等因已行具本奏報外今賊聚衆復入境內攪攘軍民不得耕種切慮四月以後青草茂盛倘若賊势衆大就於腹内駐劄趂草牧馬城門關閉人不得樵採馬不得牧放欲便興師戦闘尤須量巳料賊設若寡不敵衆如之奈何臣一介鹵夫昧於戦守誤䝉聖㤙濫叨今職晝夜懷憂不能𥙷报伏望皇上憐憫在边軍民乞敕在廷内外文武大臣将前項打話賊人要行講和情由從長計議便利上䇿分免聖主之憂臣之愚見莫若遣使賫敕與賊假以和好爲詞暫示休兵照舊修飭墩隘廣積边儲練習士卒飽飬馬匹宻定討伐之計若賊仍復逆天背理侵犯边城我旣有俻以逸待劳守边將官運謀出竒統率銳士奮力復仇務在一皷而擒之必矣具本該通政使司官奏奉聖㫖兵部知道欽此抄出到部查得先該福建道問刑監生練網題稱在廷文武群臣中間有以主和議為詞卽是奸臣就乞誅之勿留誤國䓁因莭該奉欽依他說的是欽此續該迤北走囬軍餘陳旺䓁說稱要差内使一人通事五十人去迎太上皇䓁因本部叅係重務乞㑹多官計議莭該題奉欽依虜情譎詐不必㑹官計議欽此欽遵今都督僉事許貴又奏要與賊講和暫示休兵待人馬強壯宻定計伐之計一莭切詳賊首也先違天悖徳負義忘息自逞梟獍之雄烏合犬羊之衆旣侵犯邊境而拘晋上皇復入冦京畿而震驚陵廟其爲仇恨庸可勝言且以和議一事論之當去年秋冬之間正虜勢方張之際朝廷亦甞遣都指揮李鐸指揮岳謙䓁賫執金繒徃使虜庭賄賂纔入於窮庐虜騎巳至於関口繼遣少卿王榮通政王復又徃虜營不見上皇鵉輿而還虜衆知我戦守有俻㝷皆望風遁去朝廷灼見虜情譎詐和不足恃以故絶使不通徃還惟勅邊將修武俻勵人心固守城池相機戦守今許貴又奏和議之說臣䓁竊惟今日之事理與勢皆不可和何者中國與冦有不共戴天之讐和則背君父而忘大義此理有所不可和也又醜虜貪而多詐萬一和議旣行而彼有無厭之求非分之望從之則不可違之則速變此勢有所不可和也苟以爲虜強難制姑從和以緩其兵臣䓁請質之前代宋真宗澶淵之役契丹之衆累𬒳我兵摧阻旣盟之後朝廷尚歲輸銀絹三十萬兩疋迨及季世徽欽北狩中國名将如張韓劉岳之徒屡敗金師及奸臣秦檜一主和議朝廷旣割境土以與之又輸歲幣以賄之甚則不得已降去尊號其爲含垢忍耻屈巳從和固無所不至卒之人心觧體國勢陵夷無救成敗而後已楥古證今和議之不足恃也明矣爲今之計莫若選将練兵飬威畜銳賊若來侵則相機而勦殺賊若遠遁不貪利以窮追萬一虜冦罪惡稔盈鬼啓其衷復有大舉入冦之謀則我兵操習有素加以將帥思舊臣䓁當盡死効力以圖勦㓕以雪國耻必不出犬羊之下其或皇天厭亂列聖有靈黠虜自知數冦不利變惡爲善遣使入貢則示以善意量與賞賜遣囬亦不柜絶而巳若欲朝廷先遣使臣徃彼通好則示彼以弱而啓其輕侮之心萬萬不可此則方今之要務而臣䓁之愚見止於如此也及照許貴叨居重任保障邊方不能銳意㓕賊却乃倡爲和議畏縮之跡旣明忠義之心何在合將本官明正典刑以謝天下以戒将來縁係陳言事理又係俻邊將官合無姑記其罪差人馳驛賫文切責許貴令其整飾邊務橾練軍馬作興士氣固守地方必期㓕賊以贖前罪如仍退縮誤事治以重罪仍通差人賫文前去遼東宣府大同陜西䓁邊及永平山海居庸白羊𬗋荆倒馬䓁関口總兵鎮守䓁項内外官員令其整搠人馬固守地方如遇賊冦來攻務要相機行事毋得聴信哄誘因而失誤機務仍通行在京五軍三千神機䓁营総督總兵䓁官嚴加訓練官軍諭以忠義大節使之感激思奮以圖成功不許茍且因循致誤大計縁奉欽依兵部知道事理具題景泰元年四月十九日奉聖㫖是欽此㝷醉翁亭記陳循徃時嘗讀醉翁亭記以謂如滁信可逰而樂也心竊慕之永樂丙申始以俻員翰林得扈從還南京南京扵滁最近而滁又爲兩京徃来所由陸地扵是竊有覬覦一造之意然而未敢必歲之庚子三月壬辰始得因職事偕朝士數人者徃逰焉既至值公稍睱因問所謂醉翁亭䖏扵滁人與滁之賓客者或告或否然皆少其蕪廢求導致之莫有能者余度越宿當還以爲不得遂所志矣爲之悵然終日明旦介行有語太僕丞楊文逹以余志者楊欣然喜即率從事載酒殽具鞍馬扵余数人以徃自豊山下馳六七里而止棄馬登山未十數歩而獲少平楊曰此即亭遺址也廣僅容亭瓦礫猶存四面而觀皆山還𣣔無路亭所負山之石壁刻醉翁亭三篆字其大如十傍文許又刻二賢堂三隷字大視篆書半之皆無書人氏名草木䝉翳芟治而後可觀意亭既廢後人刻之以識其䖏或非當時書也所謂二賢者未考圖記意其一謂醉翁其一必継翁者莫知謂誰或曰王元之張文定曾文昭張天覺皆為滁守者豈其一在此耶盖去其時乆矣豊樂醒心在州東南一二百歩之近滁人老長尚尤罕有知其䖏者况扵此耶豈余不及乆留固有知者而詢之未周耶亦知與否係乎其人之好尚何如也凢記之所有而存者山泉禽鳥四時朝暮之景滁人之逰與凢人力所不能移者耳亦可感矣扵是芟茅席地擷野蔌酌釀泉相與放情其上以庻幾如醉翁之逰而樂者焉既而又從數騎西南馳六七里入瑯瑘山山愈深草木泉石愈幽路傍有石數十端方而巨亂置草間盖遺物也石壁時見字刻漸入佳境之類極而數峯髙絶下有松竹數萬雜樹交䕃仰不見日所謂林壑尤羙者也中有一蹊介然以險不可以騎繫馬松下而止上有屋數百柱髙卑曲折一因崖麓之勢屋壁繚垣之石多為残碑断刻片僅數字不可属讀其地盖山之僧智僊所居曰瑯瑘寺者也有僧壽八十餘布𫀆素履不出戸二十餘年既無意扵世矣而其應客甚㳟若有求扵人者問其名不應相值既坐竒花異草交映前後幽篁野鳥舉目皆是諠呼摩曵之聲不絶扵耳楊乃舉酒更酌而樂賓益歡焉酒酣既去而數人者有中書舎人錢塘王直太常博士豊城丁鉉行人永豊袁賀王丁二君謂余扵醉翁郡人後進者扵是行不可以無記遂記之贈汪翁仲魯得告還鄉序洪武十有九年三月朏上御奉天門勅中使傳宣召春坊賛善臣鎦三吾司直郎臣汪仲魯旣至賜坐語次上顧臣仲魯謂曰若知所以見召意乎對曰未之知也上曰日昨仲魯不甞以老病故請告還婺源期秋載来朕可其請有不湏辝别之㫖巳迺思之若䓁先隂有限言帰有期仲魯喘嗽爲病誠劇然恒見得此疾者徃徃夀考矧若龎眉有壽之徴若之心事朕深知之孔子不云鄉人之善者好之其不善者惡之若多讀書何理不窮苐心素善其善者固好之其不善者亦不惡之斯爲未能全其好善之心也朕今許若還鄉毋庸再來矣所戒者近侍之帰若郡邑官執須來見當戒門以絶不則之于柬俾僮軰示之曰仲魯幸䝉聖㤙予告還鄉里宜殿門謝客輸租應役則有常制矣其敢以是自速厥戾如是可考終􅒛矣臣三吾臣仲魯同叩首謝曰聖上愛人以徳適兹聖訓愛臣以徳是欲臣䓁全其晚節者也敢不欽佩以矢無負上心仲魯得請後謂其寅契三吾曰吾與若親聆聖訓請孚筆之于簡帰寘座右三吾承命唯謹盖聞古之臣子䝉予病告有矣未聞因告病遂許之㱕田者也許乞骸骨有矣未聞并欲全其晚節者也惟皇上優礼儒臣眷注無巳故與其予以病告盍若俾之遂帰而永享安榮與其許乞骸骨盍若俾全名節而不爲罔之生是皆臣子所欲言而不敢言知規以全其身之爲貴而不知規以全其名節之尤爲貴者幸哉仲魯一請告而兩得誠千載之逢也昔宋張魏公退閑零陵杜門謝客邑丞楊誠齋以弟子礼謁公南軒爲之介紹數月乃得見古之朝臣退閑其待時官若此今吾仲魯以近侍言帰聖訓戒其謝絶有司又若此仲魯不必遠師魏公唯恪遵聖訓毋忘焉豈惟名節克完子孫亦職有利哉瓊署諸賢謂僕所書聖謨也宜識之首柬能言者各継聲其後云益陽重新州治記益陽為潭属州西南接溪洞之境壬辰海内兵燹洞獠焚掠州邑人民散亡盗刼恒徃來人且相食治所為丘墟瘡痍予遺依山谷結聚以自保者十餘年迩帰于陳氏始有州官之設然民皆隷軍籍惟将帥命有司但徴其田賦之入而已甲辰陳氏戦敗以亡環荆湘之地悉帰于呉王洞獠皆順服市不昜肆民不昜業官復舊制山壘墮而軍民分咸相安於無事之域矣明年二月故侯以徴召起金華來知州事下車之日邑井皆草萊縁郛外數千里行無人煙侯召父老宣布國家威徳撫綏旋集旦夕不倦情惻可信孚捶楚弗加民從其令携抶襁褓以還邑里于茅乘屋簷宇相接顧瞻官署不可以不治也乃身倡其民葺完政事堂題曰承宣因舊名也又爲後堂五間名曰端本昭鍳戒也前爲門屋三間戒石有亭軍需有􅋻賔幕吏廡以次完具務崇儉素不華飾也凢爲屋皆取舊廢宅材瓦爲之故功爲易就不過煩也墉築四周皷警晨夕更㵼時刻無爽踰也或曰州爲五品官署出號令以作新人民非高麗不聳瞻如何侯曰然吾州民寡力竭如是亦足矣事省則民力寛况當耕耨之時其可乆役乎然而民亦知侯矜恤乎巳咸奔超而忘其勞侯字宗元昔在盛年講習經史爲文章應進士舉旣而辟爲浙東憲府掾在職三年聲譽以著又遂退䖏山林讀書談道義感懷作詩怡然康樂若無意於利逹者一旦起爲益陽乗積年兵燹之餘散亡廢遺㡬不可振未三月而政舉事集如此况乎休飬生息漸漸以嵗月靡急乎近功之来細利之規治化行而邦本固則何古人之不可及哉然則侯之才識足以有爲可知矣州判舒君質直和遜䔍力輔成不爲矯異侯方與圖新庙學崇主皇宣聖王之教以訓育其民事皆可書州治再新嵗月不可以無述故要余為之記余不得辝仁山書院記文水北流十五里故惰吉州治山水逥合洲渚碁布江中舟行東上五里東山吉陽峰挺立如植圭璧又如神人曵𥚑負劔而冠切雲也峰下有山方廣左斜銳側立右横平如兩兀望之布置相横縱畫宛然仁字也故名曰仁山其下劉氏世居其劉君惠庭本太史文莭公族來蘇劉氏毎有建書院㳤來斈之志延至時和曾先生成巳子貞二藍先生伯兄經綸先生相繼為學者師曾先生以老病見退處杜門不復接人事成巳去終學官子貞爲都御史其著述翰墨猶有存者讀之可爲一記甞徃視伯兄遇夏日方永列廣座長林中引澗水汨汨道几席下秋月丹桂香十餘里冬時梅花盛開松晴雪吹堕簷間或横經論道煎茶賦詩取酒共酌不知日之夕也暇則出左右臨眺仁山下三峰突起當山頂大石林立五色錯雜毎日𥘉出霞相映或雨霽􅊜光相射粲芙蓉也又多石龕向東南下半䫈寺樓殿基址相締搆泉流出池清徹可愛竹子𬗋荆異花卉循山趾而北西爲官道邉稷樹退露山池上枝幹偃蹇葉茂如大羽盖惠庭壘石爲座其下賔客来樹下風四面來崇䑓廣榭不與易也不幸惠庭捐舘子兄弟皆出仕子齡亦爲家事所累各慨嘆扵風塵歲月之荏苒而仁山之勝固在也子齡来京師欣然請於予曰吾於先人書舍之前搆屋数楹以爲賔客之舘左右爲軒窓聚古今圖書以待來學者其前泉爲池雜植花卉錯間竹石以爲燕休之適而吾子亦知有父子矣幸兹太平之暇君與胡君皆早得謝事以休于家時復追思舊逰與後進之士講道著書徃来於此以㳤其人亦庶負於兹山先人之志可少成於地下子齡或亦得聞其緒餘亦少償君不孝之罪亦吾子之所不棄也盍爲記之且請扁掲於其楣與胡君合辝而復之子齡曰吾志也扁之曰仁山書舍以俟來予復帰郷與胡君光大數人者來逰復對床語逹旦不寐継又從觧空寺歩深林中東山絶頂由仁山以帰時時與子齡約未常不欣然赴之也未㡬而余去胡君又皆出而仕又数年於此矣䟦歐陽文忠公墨蹟歐陽文忠公晚歲好習書意有所至輙形紙墨若今趙郡蘇公所蔵二帖是也宋翰林學士㤙礼頗不及唐然天下國家事無不得言則言語侍從論思献納之職未甞廢文忠猶以禁職不當外同百司欲漸修故事盖君子居其官則思盡其道如此使如太史公所謂文史星暦主上尊禮不如公孫丞相者其肯一朝居乎且公在政和間為職事言可也治平𥘉入政府熈寕𥙷外矣猶紀録閱視眷眷不忘欲廣其君之見聞而引之當道者夫豈以遠近親踈而有二哉時王荆公方得政識者謂都俞之間有楽子無知之意盖與文忠用心正相反則尽排衆議獨運化樞以致於敗乃翁事亦可恠哉送萬元信知江淮序唐仲人才之在天下未甞一日無也當其世治英雄隱於草莾白晝坐睡介胄而生蟣蝨焉及乎憒亂勇者逞其力智者献其謀進退遲速其有成筭𥘉非臨事擬議取驗於頃刻間也龍鳯二年大丞相綂兵下江南萬公元信在行陣中矯矯以智力稱明年開行省公以刀筆筐篋賛㐮省事丞相賢之又明年樞宻行院遷置興安丞相以非公不可則使之與簽院鄧公上下其論丞相益賢之賜織金紋綺一端今年江淮知府缺治状丞相秩三品俾公徃踐其任練日趣装予偕厖眉父老并山澤之夫提携偻傴素不識城市者数百人擁馬首執别酒予颺言於衆曰若知公之爲政乎軍旅劻勷昜於暴横公嚴之以律令申之以威武生擒死殺曲當其罪由是軍中吐舌相戒不敢犯令公知晨門西南鄰盗壓境凢出入異號以杜奸細毎遇亢旱齋祓掲䖍用祈響應民有不平侃侃控愬必假顔色盡攄底裏如夏稅徴絲非其土産公為轉聞行省得折米為便官𪠘修飭重建大成殿兩廡下至衣甲鮮明砲矢積蓄未容殚述也父老拜公乃下馬拜嗚呼丞相用人之秋文武彬彬棆才授職可謂無愧矣公先省而後院移所以治省者治院求内而不治可乎今先院而後郡移所以治院者治郡求外而不治可乎於此益歎丞相知人之明而公之克膺是選也公廉潔自将尤長於詩予獲登龍門有一日之雅於其去也故不得叙其端云
