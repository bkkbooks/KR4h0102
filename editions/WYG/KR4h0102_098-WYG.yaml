body:
  text: 明文衡巻九十八明程敏政編字説李都尉字辭宋濂皇上即位之九年以順德公主下嫁于太師李韓公之子駙馬都尉祺初祺小字為總至是詔曰其易以美名翰林諸臣乃定今名以進且字之曰子祺既而子祺請曰祺之名實定於先生祺於先生少嘗受業有師弟子義將何以教之余惟一代之興必有元勲厚德之人出於其間始則佐帷幄決勝負終則坐廟堂而贊治化成大功而享榮名為國家之柱石係天下之重輕若漢之蕭酇侯宋之趙韓王皆若是矣至於連姻帝室若今太師則未之有也今太師極人臣之尊為上公之貴而都尉子祺獨能好學慎行敦厚下人發為篇章動有意趣是可謂富貴而好禮又難能也祺之為義為祥為吉子祺固有以致之矣為字實宜雖然尚父有云敬勝怠者吉此守位之事也敢以為勉焉辭曰氣合運凝天地載清君聖臣明以階治平惟臣謂誰實時元老運籌建畧致天之討四方既帖乃戢干戈執政廟堂如漢蕭何匪惟執政胙以大國丹書金券俾首百辟爵則崇矣職則太師左右天子以鎮四裔四裔既安君臣交歡上降下承煥乎榮觀彬彬都尉大寵是膺太師之子天子之甥際此風雲依被日月侃侃都尉不自矜伐文駟錦衣其儀孔都出入金門不敢笑譁躚躚公子交趨競諾都尉臨之屹如山嶽斯時之人以恩為祥祥則既多惟敬乃將都尉之名曰祺是命何以承之告爾克敬庶民不敬且潰乃家况兹世臣不敬謂何凡人有身咸有嗜欲敬以攝之形莊氣肅自身而推孝親尊君動無弗敬乃有譽聞敬勝者吉古有𢎞訓敬以承祺萬福咸順爾克敬矣罔弗盛矣爾之祺矣罔爾違矣太師之勛山崇川長敬哉勿忘以繼耿光馮擇善都督字辭自昔帝王啓迹之地天必儲精聚靈使英雄謀畧之士生乎其間以備其驅䇿而佐其設施及大業既定爵號之隆冠于當世褒寵之澤流于子孫若漢唐之豐沛晉陽君臣同休蓋蔚乎其盛矣今上皇帝龍飛江淮光啓神祚于時文武才俊鷹揚虎躍或秉鉞出征或執筆帷幄率多江淮之人論功剖符公國侯郡者以數十計若郢國馮公其一也郢公定逺人初從上為帳前總制親軍都指揮使立功草昧時不幸早卒及上即位追爵為公命其子誠侍青宫執業讀書及誠既冠三擢遂僉大都督府事而誠之季父初襲郢公職累建大勲亦啓封宋國一門二公誠又位在樞府敏事慎職為上信任天下榮之誠獨篤好問學能為詩章以嘗受學于予間來請曰誠之字曰擇善未達其義願有以教之乃為之辭曰江淮之間真主生焉乘風附雲實惟英賢侃侃郢公熊虎之姿大劍良弓指揮義師孰與其才不賦以夀騏驥萬里僨于中道夀雖不延有弟克膺有子克承以𢎞厥聲烈烈宋公為郢公弟惟都督誠又克為子為他人子名實易稱保國承家厥惟難能上則大君下有衆庶茍弗以誠曷克宅位惟誠之德貫通于天何感弗應何鬱弗宣天以至誠庶物乃育三光無愆四序靡瀆茍或不誠宜暑而寒人其怨嗟嵗功斯癏况我伊人不誠其可矧爾世臣爵祿是荷爾或不誠民胥爾尤誠而無擇為僻為謬古訓孔多維人攸踐我將曷從惟擇其善惟忠與孝則允蹈之維悖維惡絶而弗為蹈之匪艱服以悠久木升川增山立海受既擇衆善乃立爾誠乃保厥家乃篤鴻慶以之事君為臣之良以之立身為邦之光匪光于邦丕爾先人郢公有子聖主有臣王宗器字辭王生璉字宗器其先太原人今家濟南之長山器局沉凝而學問精密洪武五年以易舉進士山東名列第三既上南宮未試皇上召見便殿親命題賦詩詩成稱㫖擢史館編修賜以冠服選入禁中文華堂肄業詔翰林老臣為師同時而進者凡十又七人車駕時臨策勵之且取其文品評其優劣日命光祿寺給饍羞酒漿每當食青宫暨親王迭為之主而璉等侍飯於左右冬夏賜衣各一襲復有白金弓矢鞍馬之頒蓋不一而足近又使璉攝御史廉察河南迨歸奏對益稱㫖上説謂近臣曰文華堂諸生如璉等者皆朕異日將相才也其期望之重如此璉嘗從予學故來以字辭為請余因序璉遭逢之盛於首而著命名制字之義於辭璉能聽之必上不負於國恩下不負於所學矣辭曰宗廟之器貴重實殊夏有四璉殷用六瑚周云八簋異名同符其貴斯何珠玉為飾其重斯何盛以黍稷嚴奉明禋人鬼是格惟端木氏才堪上卿文章外見以言語稱汝器見許載諸聖經今生既長局度純亮發為辭章大河奔放器字璉名父師所望出逢盛治講學禁中天日照臨以煦以融以達其衷用廓其䝉學之茂矣川之流矣材之秀矣木之脩矣蚤夜孜孜唯道求矣豸冠巍峩廵行洛河貪夫夜逃良士嘯歌君子之為君子之多學無止功勿畫斯善辟諸行塗足不留踐百里至千所見逾逺志安於近行局一偏笙罔為鏞豆難充籩規模卑狹世則病旃德藏于身動無不被厥用能周由體斯具生尚朂焉庶幾不器嚴氏子字辭胡翰男子冠而字禮也未冠而字者禮之變也父母欲其蚤知而夙成也嚴侯之四子皆㓜旣字而告之又請於余意猶古也古者字有辭禮變而辭不可廢也乃為之辭曰鼎也和不和無以調吾味其失也戾恭也敬不敬無以直吾内其失也偽雄也權不權無以行吾義其失也蔽溥也周不周無以廣吾惠其失也比惟周也得仁之用權也持義之制敬也存禮之本和也適樂之趣仁義禮樂斯罔不備告爾余言暨爾父之志尚篤于爾躬母徒善其名字也彭士隼冠字祝辭梁寅彭聲之先生之令子曰凖於其冠也賓友字之曰士隼余謂先生以名賢之裔負大雅之望有子既冠家學克傳士之志願無大於是無先於是余託好有執友之義乃為之祝辭以朂之曰維月之令維日之吉頍然首服宜莊宜一棄乃㓜志服厥嚴戒為賢為能稽古毋怠惟前脩是追惟舊業是繼隼之性稱猛厲進於善在勇決隼之姿誇精悍忌闇怯貴明斷隼之揚務㨗速審翔止慎搏逐嗟乎善為人子服勞無弛善為人弟敬長匪懈善為人臣惟忠惟勤善為人少徐行而後敬遵爾過庭之聞夫是之謂成人之道哉金子權字解蘇伯衡人之情萬殊事之出萬變可之中而有不可焉者不可之中而有可焉者則何以處之曰揆之以權而已矣君子以權揆事也猶其以權稱物也今夫物斤斤而累之自一鈞至十鈞至百鈞至千鈞至萬鈞推而上之其累之也愈多則其所累者愈重斤斤而析之由萬鈞為千鈞為百鈞為十鈞為一鈞推而下之其析之也愈衆則其所析者愈輕輕重之變錯出吾之前其不齊亦已甚矣惟有衡而衡有刻也此為銖焉此為兩焉此為斤焉此為鈞焉此為石焉而又有權焉權乃衡所待以平者也推移前却以從乎刻以極其變是以高者不可抑而低也下者不可揚而昂也重者不得以為輕也輕者不得以為重也莫不適其情而莫之或欺亦莫之敢爭也古之所謂君子者當變故之糾紛而審乎可不可之計而取舎向背不失其宜者亦權而已矣天畀我以心而使我以之制事也蓋有自然之權焉是故不可一日而廢也娶必告也而大舜之娶則不告親為不善者不入也而佛肸之召孔子則欲往管叔也蔡叔也霍叔也皆附武庚也而周公則或誅或不誅齊也衞也宋也皆以金餽也而孟子則或受或不受夫聖賢之權固有所在也而常情豈識哉故夫事有非常吾之所以應之者雖不守常而於常道未始或戾焉不惟不戾且克有濟焉夫是之謂權權也者臨事之宜處變之用也夫無權者猶知為之衡而不知為之權以從乎刻者也其何以極輕重之變而使之平乎故君子之學莫大乎權莫難乎權夫惟智足以窮理仁足以盡性者可與權可與權故卒然臨之以大變不可得而亂也故大任可得而當也故大事可得而屬也故大議可得而決也故大難可得而平也然則權可以一日而無之乎因字思義而日進於學而深造乎道而謹執乎義遇事之變而昧臨事之宜則吾弗之信於戲朂哉趙彦殊字序方希古孟子謂伯夷隘栁下惠不恭其離乎大中一也然求其近似者與其不恭也寧隘乎君子之處世不徇物以為同不詭俗以為異辟諸飲食裘葛適乎宜不違乎道而已一乎同其弊必至於枉已一乎異其弊必至於駭世不期於同異而無詭徇之失者其惟君子乎天下皆趨於利吾獨志乎義天下皆趨於邪吾獨志乎正非吾求異於當時也將同乎古固不得茍同乎今也聖賢吾同之不賢者吾異之非吾求異於人也務道之同不得無少異也同於不可不同而異於不可不異皆順於道而無所容心焉則人以為宜然而莫敢以為非矣易曰君子以同而異其謂是邪浦江趙生其名曰同或字之曰志其父謂未足以盡其義也請更之予更之曰殊而謂之曰今世之所少者非同也其患在乎茍同而不知異茍同而不知異智者流於迎合而多詐愚者陷於阿曲而近鄙欲世之大治安可得哉生之質可謂美矣而又飾之以文翼之以禮豈將同於當世云乎哉必亦務古之同而不同乎俗務道之同而不恤人之好惡斯可也漢之時若汲長孺可謂異俗之士矣若胡伯始可謂同世之士矣伯始近於惠長孺近於夷伯始不若長孺之近於道也生學古嗜道方以大中為歸夷與惠安足效哉同於所當同而不茍同異於所當異而不茍異生之所宜為也執其一而不合乎道非君子之事也同年劉君易字序曾鶴齡父名友字古之道也字弗當於義弗諧於韻友之過也知其過而不與之正則吾徒之過與嚮者之友均矣一日公退之暇修撰尹君鳳岐陳君叔剛孫君曰恭主事洪君宗器坐予家閲文字中有謂禮部主事劉球求樂者尹君笑曰求樂之樂當讀為音樂之樂乎抑益者三樂之樂乎樂而不淫之樂乎將安所適從予曰吾樂之樂耳尹君又奮袂箕踞曰名既謂球則球何求於樂樂當求球是於義弗當矣且三聲皆可讀是於韻弗諧矣不為易之何待陳洪二君相顧曰試商之易之當何以以咨孫君孫君退遜久之乃曰球音屬石石之精華者為玉故或以玉代石鄒孟氏曰玉振之也者終條理之事是也今九成之樂奏於天廷而以玉振之具有顯徵宜易以廷振庶與其名相成焉尹君曰然坐客皆曰然明日以言於館閣遽有應聲者曰劉君年幾知命矣亦丈人行矣惡用易為已而衆共籌之皆曰人生上夀百嵗計劉君未及其半誠易之則後進起敬於稱謂之際為日甚長何可因循哉易有之不逺復元祗悔易之為宜以告劉君君曰竊懼未稱耳誠以見呼敢不唯唯予退復思之劉君䇿上第列職春官又舉入經筵兼太史所厯皆禮樂之地非球之廷振而何夫豈吾徒得願望之而然邪從而易焉則天下之士不謂吾徒為諛因序而請劉君易之謂凡相稱謂者悉之蹇義宜之名字説周宗傳洪武丁卯春三月七日上宴侍臣于奉天門臣宗傳與焉宴罷侍右時臣瑢適以内艱來聞且言曰臣蜀人祖蹇氏曾大父繼祖㓜失怙恃鞠于外舅李遂姓焉臣㓜䝉恩補郡學生時已復蹇姓今忝登科第仕列侍從而籍猶䝉其姓非所以崇本枝而重所自出之意敢昧死以請上惻然憫之顧臣宗傳曰斯豈蹇叔之後乎惟蜀自昔多豪傑士朕當名之因御丹書義字賜之以易瑢名并錫楮幣五十緡復念瞿唐肆漲猝未易達俾乘傳而歸臣義頓首叩頭無任感激於是臣宗傳退與翰林臣顯臣福南及中書臣允恭字之曰宜之而臣宗傳復語之曰皇上懸爵賞以待天下士士之受賞者有以矣而宸翰之寵者無幾人今義躬承厚賞又重以御書錫名而期待之至若此義雖憂歸可不日事䇿勵以圖報於他日乎天章爛然雲漢昭回義尚寶藏之思光紹前哲而有以遺後之人哉楊導叔簡字序王直少傅西昌揚公冠其仲子導而字之曰叔簡予忝為賓則既以命之矣叔簡又請其義於予乃告之曰導者擇也簡者分别之謂學莫大於擇善顔子之所以為賢亦曰擇善而已謂之擇則固有所分别矣子之尊公以是命子豈欲假借以稱道也哉其望子至矣夫人之生莫不有是善然不能純是善者氣禀拘之也是故君子必當審其所以發善者由之不善者改焉天下之事莫不有其理然不能純乎理者物欲害之也是故君子必謹其所趨是者從之不是者違焉内擇諸心外擇諸事分别嚴而取舎正人倫日用之間必皆盡善斯可謂之君子而朋友者君子進善之資也蓋擇之或未精行之或未當非朋友匡正之益而欲不悖於道難矣然而有損友焉逢迎附和以陷於邪僻不可不擇也子讀書以明善擇善以飭身又求益友自輔而不怠以止焉則子之為君子也誠無愧矣傳曰顔何人哉希之則是子必勉之叔簡拜曰先生之教是也導敢不勉予嘉其志而願其成因書以為贈李璋士欽冠記劉定之李璋今少保冢宰華蓋殿大學士南陽先生長子先生卜以天順甲申仲夏末旬甲戌日為之冠戒予為賓予辭遣价以書至予復書如所戒至期詣先生所居賜第翰林王修譔大詔相予為贊尹編修正言侍先生為儐大夫士來與於禮者以序列堂及庭所行遵家禮其不敢同者巾帽衣帶絛靴㕘用今制然始加取其服之可任事再加取其服之可接黨友三加取其服之可見君上親長則未嘗非古禮彌尊之意也儀禮用周時器服家禮用宋時器服今用今時器服於周公朱子豈異意也哉其祝辭始加曰維皇初載肇用吉禮加爾元服棄爾㓜志順爾成德以介景福再加曰維月南離維日之甲乃申爾服謹爾威儀淑慎爾學以繼世科承父之志三加曰予忝儒林奉爾親戒咸加爾服兄弟具在朝紳來集期爾眉夀隆名顯爵為時之珍受天之慶醮曰㫖酒既清嘉薦令芳拜受祭之以定爾祥承天之禄俾熾而昌夀考不忘字冠者曰禮儀既備令月吉日昭告爾字爰字孔嘉曰士欽爾其永受保之以揚芳聲于聖世亦於古辭不盡同者如古辭云以嵗之正今固非正月也朱子云賓或别作辭命以字意亦可然則豈必用古辭哉今按璋以赤玉刻半圭形為鬯瓚之柄臣從君事神之所執也書曰大保秉璋以酢詩曰濟濟辟王左右奉璋禮曰大宗伯執璋瓚亞祼夫以臣從君事神而敢有不敬乎欽古訓為敬今則惟於敬天子謂之欽期璋他日用其敬於郊廟朝廷以修臣職故字以士欽也既冠士欽之又明日丙子予記其顛末以授士欽使時觀省則士欽所答予云璋雖不敏敢不夙夜祗奉者庶果能踐言矣豈不遂為先生之才子昭代之良臣哉明文衡巻九十八
