body:
  text: 明文衡巻八十一明程敏政編碑浡泥國恭順王墓碑胡廣永樂六年秋八月乙未浡泥國王麻那惹加那乃來朝率其妻子弟妹親戚陪臣凡百五十餘人至闕下上表貢方物上御奉天殿受其獻退即奉天門召與語象通其言曰僻壤臣妾誕被聖化思覩清光靡知忌畏輒敢塵瀆又曰天以覆我地以載我天子以乂寜我我長我幼處有安居食有和味衣有宜服利用備器以資其生強不敢陵弱衆不敢欺寡非天子孰使之然也天子功徳暨于我者同乎天地然天地仰而見跼而履惟天子邈而難見是故誠有所不通僻陋臣妾不憚險遠浮詣闕下以達其誠上曰嘻惟天惟皇考付予以天下子養民天與皇考視民同仁予其承天與皇考付畀之重惟恐弗堪弗若汝言則又頓首曰自天子改元之初載臣國屢豐和山川之藴珍寳者霅然而呈草木之不華者􅓂然而實異禽蹌鳴而走獸率舞也臣國之老曰中國聖人徳教流溢于茲臣土雖遠京師然為天子氓故矜奮而來覲上嘉其誠優待禮隆錫予甚厚初賜宴于華葢殿既連宴于奉天門毎宴則命公夫人宴其妻于内館罷宴勅大官厚具獻食日命大臣一人待于所舎中貴人専接伴盛其班張豐其廩餼入朝班次上公寵渥至矣踰月王忽感疾上命醫賜善藥調治遣中貴人勞問旦暮相繼日命大臣視王疾差劇聞小瘳喜見顔色王疾篤語其妻以下曰我疾貽天子憂念脱有大故命也我僻處荒徼幸入朝覩天子聲光即死無憾死又體魄託葬中華固當戀此所憾者受天子深恩生不能報死誠有負指其子曰我即不起其以兒入拜謝天子誓世世毋忘天子恩若等克如我志瞑目無憾矣十月乙亥朔王卒得年二十有八上甚悼之輟正朝三日勅有司治喪具厚䘏典賜諡曰恭順遣使諭祭又遣使撫慰其妻子王之妻拜使者曰乃下臣祚薄弗克負荷天子深恩不能終事且沒有遺命以世世毋忘天子恩克守其言則死猶不死矣王之妻之言亦可謂賢也已是月庚寅以禮葬王于安徳門外之石子岡勅為文誌其壙王父曰麻那惹沙那旺沙母曰剌失八的妻曰他係邪子一人曰遐旺甫四嵗女二人以遐旺襲王爵賜以冠服玉帶儀仗鞍馬服物器皿及金銀錦綺錢幣甚厚賜王妻以命服珠冠白金錦綺錢幣諸物其餘賜各有差官王之弟施里難那那惹施里微喏那沙那那萬喏邪三人俾輔遐旺詔有司立祠于王墓寘守墳者三户勅建碑祠下命臣廣製刻文臣廣仰惟皇上綏寜宇内茂揚天徳溥博周徧凡日月照臨之地皆心恱誠歸惟恐或後奉琛秉贄之國綴集于庭嵗以萬數浡泥王去中國累數萬里一旦舉妻孥弟妹親戚陪臣浮鉅海來朝不以為難叩陛陳辭忠誠溢發其心堅確有如金石至其臨終之言尤惓惓屬其下以不忘天子恩聖徳漸漬感動於人心其深如此於乎盛哉惟王賢達聰明忠順之節始終一致宜其身被寵榮澤延後嗣用紀其實聲為銘詩昭示無極以彰王之所以受恩深厚者由其誠也銘曰大明御天臣妾萬方孰不來享孰不來王猗歟浡泥邈處炎徼感化來歸風騰雲趭曰婦曰子弟妹陪臣秩秩稽顙趨抃甡甡跽曰天子作我父母我生我樂天子之祜戴天履地疇此幪帡翹首大明遹來獻誠天子曰吁予統宇内綏爾于寜惟徳㒺逮王拜稽首萬嵗歡呼服徳懐仁春育海濡國有山川匿其寳物靈發其藏不愛而出荏苒草木惟葉蓁蓁煌煌者華有實其蕡異禽和音鳴拂其羽走獸麌麌亦蹌以舞國黄耉曰聖化所漸臣國雖逷臣心仰瞻天子嘉悦待以異禮宴勞錫賚有厚而㫖云胡期月疾忽及之奄然而喪復悼而悲臨終之言謂其遘痻死有弗忘天子深恩於乎賢王卓特超逸西南諸蕃靡堪王匹生者誠欵沒有諡銘爵于王嗣世世其承有墳如堂有祠翼翼以妥王靈其永無斁王雖不歸王聞孔彰天子恩隆萬世有光故亞中大夫寜國府知府陳公之碑楊士竒公諱灌字同故廬陵城北吟谿里儒家祖以章父天經皆以學行重鄉里公生數嵗而孤事母孝時巳卓卓有鉅人志讀書一目數行而穎悟絶人族長老器之為延師敎之師不能應所求往往引去然益自砥礪嚮進既冠睹元綱日壊私憂世且亂去習兵法環所居皆良田築為塲圃而樹木焉人初莫測其意數年木鬱然行列而四方冦盜蜂起遂募義勇以保障一鄉日屯聚士馬而號令指麾於其間隠然一良將其敎練有方撫綏有道人人為用時江西諸郡多陷於冦環其鄉數十里獨頼以安者七年然志在保境而非有所圖利也陳友諒既據江西其將熊天瑞者強禮致公與俱至九江公睹陳氏不足有為也去之甲辰春太祖髙皇帝克武昌公因𢎞文館學士羅復仁詣軍門上謁髙皇帝與語竒之留帳下數日公力陳救亂安民之說悉見聽納遂擢湖廣行中書省左右司員外郎是冬入朝改中書省左司都事遂陞郎中明年陞大都督府經厯大將軍徐達北征以公贊軍事既克泰州留公督築城之役不旬日竣事朝廷遣使勞之命總制真州軍事丙午春除寜國府知府階亞中大夫下車首詢民隠為興利除害増修先聖廟建學禮致師儒以敎俊秀士習一新建祀典祠壇及驛館百廢皆舉為條格革兼並之俗覈欺隠之籍朝廷取其戸帖一事行之天下宣城民田瀕江化城等十六圩故堤峻薄遇衝決則水傷禾稼壊道路嵗以為患公親為規畫築堤廣厚加舊數倍又伐巨石作水門以時蓄泄民至于今賴之宣歙二水暴溢平地猝數丈民危懼計無出走致巫覡禱神水勢益甚公曰巫覡焉知事神躬禱于敬亭山神水患遂息所轄宣城諸邑踵元季之弊嵗民租無入官廩率書虚籍公至有發其事者於是典司者皆忷忷懼得罪公私念此特循故弊弗革耳非始造奸也颺言於衆曰吾以某月某日行視邑廩葢俾得為計及期邑廩皆實而弊亦革有強盜四十八人以刼舟麥當死獄巳具公聽其辭曰此愚民因舟漂抵岸而挻引取之非素有合謀安得四十八人悉同法府佐幕初皆難之後卒如公議坐先取者一人餘從減論公風采凝峻訟者至庭片語之下情偽莫遁故人咸畏服而其為治務寛厚崇禮敎鮮失所之民三年政化行焉既得代當去百姓耆老壯少皆有戀戀不忍之意代者山東鞠騰霄素負才不讓觀公所設施嘆曰吾徒當守而勿失也是年夏奉命督軍餉詣北平民胥悅趨事又明年還京師省臺達官相知者爭欲薦於朝公皆力辭遂謁告歸省先墓割田三頃建祠堂作義塾以訓宗戚子弟居無何被召至京師未命卒於旅次洪武四年某月日也享年四十有七秉清介之行重義輕利族姻鄉䣊匱乏有急並赴濟助間遇朋舊憂患狼狽倒囊周之雖屢不厭非才行兼有者歟子男三廓卓坦孫男三誠謹謙皆稱公之後坦尤忠信務義公沒將六十年坦介越府長史周君忱求書公平生于石余於公同郡知慕公乆遂考長史所為公傳及以聞諸鄉之君子者叙次之而系以銘曰猗嗟陳侯瑰瑋踔絶才邁羣倫識亦閎達越在童冠鉅志嶷嶷有書有劔萬衆奚敵罹時孔棘衆懐兢兢奮庇其鄉屹如堅城孱弱盜名掉臂去之天之所興稽顙來歸軍門之言敷臣之忠惟聖聰明日照海容簡其才猷以贊政府匪直裨文亦既輔武宣城名邦實帝之畿嘉其愷悌以寄􅑱嫠植之黍稷薅其稂莠民曰陳侯汝予父母仁以為育義以為敎民曰陳侯汝時杜召遺惠在民永思無斁遺澤在嗣世率于徳猗嗟陳侯惟吉之英吉世有人視此刻銘梁用之墓碣銘永樂十五年車駕廵狩北京仁宗皇帝在春宫監國南京凡南方庻務惟文武除拜四夷朝獻邉警調發上請行在若祭祀賞罰一切之務有司具成式啓聞施行事竟則所司具本末奏達而巳上既有疾兩京距隔數千里支庻萌異志者内結嬖倖飾詐為間一二讒人助於外於是禁近臣侍監國者惴惴茍活朝暮間賴上明聖終保全無事小人之計不能行然其意不已也㑹南京有陳千户者擅取民財事覺令㫖謫交趾數日念其軍功貸之召還有言於上曰上所謫罪人皇太子曲宥之矣遂殺陳千戸事連贊善梁潛司諫周冕既逮至上親問之潛等具實對上顧翰林學士楊榮等曰事固無預潛他日又諭禮部尚書吕宸曰事亦豈得由潛然猶未悉陳千戸非出上命謫之也兩人者皆未釋有毁冕者數言其佻薄放恣不可用遂並潛皆死非命十六年九月十七日也士君子聞潛死皆嗟惋悼惜又相與出資收殯之文明門外其妻時隨在北京慟夫非命哀毁不食數日亦死明年其家始啓殯歸而合葬於泰和縣某鄉某原梁氏其先家長沙唐有進士曰震徙荆南又七世曰勝用仕南唐為徴事郎徙今泰和又十世贈知吉州曰逢吉二子皆仕宋伯君崇累官起居舎人兵部員外郎直史館知鳯翔府仲君傑累官同知黄州府入為翰林院編修官君崇五世孫蕃景定三年進士太常博士知宣州改撫州生才可才可生彦卿彦卿生不移娶陳氏元潮州儒學教授以道之孫生男子二人長即潛次混潛字用之自幼好學警敏嶷然有鉅人志嘗受經於鄉先生王子啓及舅氏陳仲述入則浸漬不移先生之敎父子兄弟討論切劘無虚日故所得率出其同輩用之甫弱冠其文章論議巳馳騁頡頏諸先輩洪武丙子選鄉試明年授四川蒼谿縣學訓導蒼谿僻遠過使客終嵗無㡬人而山水可適其學者前此未嘗遇明師用之樂得其地旦暮坐講席開諭辯析必盡其說諸生皆忻忻有嚮進意稍暇獨行清流茂樹間吟咏自得又明年用薦除廣東四㑹知縣授承事郎推誠愛民剗宿弊崇寛政臨之以平易導之以禮讓致勤撫字稍暇輒就學舎親授業諸生嵗餘民咸悦服而爭訟息學校興流徙來歸以累千計縣有瀧橋河世傳吏有亷平之政即河水清自用之至訖其去河水澄潔可鑑又明年改陽江又改陽春治之一如所以治四㑹者而陽春猺獠環處稍不得所欲即獸怒跳蹶不可制用之待之如子而不拘於法亦皆盡誠事縣令如父敬恭命令唯恐不及所厯之處將去人皆遮道留之不得至有流涕者永樂元年召修太祖皇帝實録書成陞翰林修撰授承務郎賜白金五十兩織金衣一襲文幣四表裏五年命以本官兼右春坊右贊善進儒林郎時修永樂大典召至四方儒學老成充纂修及繕寫之士㡬三千人人衆事殷特命太子少師姚廣孝禮部尚書鄭賜總之巳而賜卒命禮部翰林院就本院推舉才學服衆者代賜遂舉用之用之方公明決莅事有程而惰慢放肆者胥不樂之相與誣其過於上召問具對云云上曰梁潛言是遂抵造誣者罪於時以文事裨益皇太子尤為所重上幸北京驛召赴行在八年南還十一年復扈從北京十三年考禮部㑹試十四年南還明年復北狩將發親擇侍從監國之臣時翰林獨留學士楊士竒特詔尚書夏原吉吕震方賔舉一人副之遂以命用之其在皇太子前累累進善言皆見嘉納而寵以賜賚是年考應天府鄉試葢明年及於禍矣嗚呼用之闓爽宏毅耿介自執其智足以燭㡬其徳足以及物其才足以興理其自任之重不肯下古人凡士君子哀而惜之夫豈以私用之也哉用之之學通諸經尤長於詩易自十五六巳用意周程朱張之書壯而益探其微為文章馳騁司馬子長韓退之蘇子瞻亦間出莊騷為竒務去陳言出新意古詩髙處逼晉宋所著有史論若干篇碑傳記序銘頌贊述若干篇五七言古近體詩若干篇皆可傳後與人交藹然有相輔之義人有過面誚之不為依阿取容及其能改懽好如初焉用之死時年五十有三娶楊氏子男四果楘楫榆皆知務學果楘皆舉鄉貢未升二女長嫁袁俊次嫁進士劉凖孫男㡬某某皆秀朗可望造物者殆以是報之歟梁楊世婚姻家余長用之一嵗少學同業壯而仕於朝同官知用之孰有深於余哉故其葬也宜余銘而余銘之亦豈出乎其私哉銘曰楩楠之蒼蒼可車可梁靈芝之煌煌瑞世之章曷其舉之又中毁之夫毁于琢曷全于璞理有瞢瞢為善罔祐顔短跖長從古則有從古則有善者徒傷尚有傳者其永不亡前朝列大夫交趾布政司右參議解公墓碣銘嗚呼此解公大紳之墓葬二十有二年矣其友楊士竒始克序而銘之序曰解氏姬姓其先居鴈門唐同州刺史琬之孫隠為蘄州司户參軍始家廬陵之同水鄉參軍六世孫盛遷吉水邑中世有科第至諱夢斗宋太學上舎生諱應辰元髙安縣學敎諭生諱子元舉進士授安福州判官兵亂守節死生開先號筠澗娶髙氏進士若鳯之子公之父母也公諱縉字大紳自幼穎悟絶人五嵗父敎之書應口成誦七嵗賦詩有老成語十嵗日誦數千言終身不忘十三盡讀四書諸經貫穿其義理老長不能難也而文思溢發十八舉江西鄉試中第一洪武廿一年㑹試禮部中第七廷試讀巻者以所對䇿論過髙抑置第三甲時兄綸及女弟之夫黄金華同登第太祖髙皇帝喜其一家三人出仕授綸禮部祠祭主事公與金華皆中書庻吉士日侍左右甚見愛重閒暇數召兩人論議考其所學一日諭公曰爾試舉今施政所宜直述以聞退即具奏大概言陛下得國之正非唐宋所及取天下於羣盜救生民於塗炭徐定燕都市不易肆而女寵外戚寺人藩鎮之患消融底定皆處之有法矣不邇聲色不殖貨利不為逰畋皆逺過漢唐宋之君而無愧三代聖王矣惟願喜怒一聽於天理而推誠任使不以察為明又言陛下拳拳於畏天畏鬼神治民治強暴然畏民者畏天之本治心者治民之本又言令不必數改數改則民疑刑不宜太繁太繁則民玩法司近有朋姦㒺上倚法為姦二條下人殆難措手足矣又言御覽之書宜集唐虞夏商周孔及濓洛關閩之言隨事類别以備勸戒又言六經殘缺莫甚禮樂宜正禮經及訪求審樂之儒作樂書又言祀天宜復掃地之規尊祖宜備七廟之制太常非可以肄俗樂又言僧道之壯者宜黜之使復人倫經呪之妄者悉火之以杜誑惑斷瑜伽之敎禁符式之科絶鬼巫破淫祀以底善治又言進人當擇賢否授職當量重輕今大誥有不為君用之罪則仕者不復擇矣又言古者鄉隣善惡必記今雖設申明旌善二亭而無黨庠鄉學之敎互知之法雖嚴訓告之方未備宜取古人治家睦隣之法若古藍田吕氏鄉約及今義門鄭氏家範布之天下世臣大族率先以勸旌之復之為民表率而致治不難矣又言易曰王公設險以守其國重門擊柝以待暴客而近世狃於宴安墮城池銷鋒鏑諱言兵事以為天下已治一旦或有不測之虞何以為備宜勅有司以時整葺寛之嵗月守以里胥額設弓手課之射敎民以農隙兼習兵且乞設武舉以收英才又言宜廣鄉校前代多有書院有學田有貢士莊宜修復以敎養賢士又言極刑之禁慮有遺才給配婦人恐傷節義既奏上嘉其識正公素與兵部尚書沈溍不合溍奏公入部堂索皂𨽻語嬉慢非禮上慮公優閒怠逸即除江西道監察御史葢以繁劇玉成之也時都御史袁泰怙勢家人横恣諸道御史欲糾之無敢執筆為章者公揮筆立就厯舉其過章上雖曲宥泰而一時多其直上又慮公少涵養將為衆所傾召其父至諭曰才之生甚難而大器者晚成其以而子歸益進其學又諭公曰朕於爾義則君臣恩同父子其歸益盡心於古人後十年來朝朕大用爾遂侍父歸公天分髙又感上大恩歸益自勵而造詣深矣數嵗髙皇帝上賔公趨赴臨權臣忌公者謂赴臨非詔㫖遂謫河州嵗餘權臣黜召還以為翰林待詔太宗皇帝入嗣大位首索公既見置諸左右深信任之時朝廷詔勅與凡大制作咸出公手毎預密議寵賚加厚陞侍讀數月陞侍讀學士奉訓大夫上初與武臣邱福等二三人議建儲文臣惟金忠預皆靖難時股肱也武臣咸請立皇第二子髙煦謂其有扈從功上不聽福等叩首請不巳終不聽遂召公預議事定然秘未發明年册仁宗皇帝為皇太子封髙煦為漢王進公翰林學士兼右春坊大學士奉議大夫又明年福等所初議頗泄於外髙煦素不樂公言於上曰藩府之舊無泄者其縉泄之遂出公為廣西布政司右參議授朝列大夫又以李至剛言公怨望改交阯八年入奏事時車駕還髙煦言解縉瞰上遠出覲儲君徑歸無人臣禮遂徴下獄後三年以病死獄中素所交逰出資斂之外兄髙建春歸其柩葬之髙氏公死後家徙邉仁宗皇帝臨御特赦還而官其從子禎期為中書舎人公仕前後不十嵗為庻吉士再嵗御史未滿嵗為學士四嵗兩贊外藩皆席未暖初修髙皇帝實録及永樂大典皆為總裁考㑹試者一讀廷試巻者二聲名在天下藉甚敦孝友重義輕利遇人憂患疾苦輒隠於心茍可用力盡意為之篤於故舊及名賢世家之後喜引㧞士類或誚其汎愛者終不為變襟宇濶略不屑意細故而表裏洞達絶崖岸雖野夫穉子皆樂親之求文與書者日輻輳率與之無厭倦意或言有不當與者笑曰雨露豈擇地而施哉且人孰不可與進者不畏彊禦承運庫官張興恃寵而横嘗笞擊人於左順門下公過之叱興御座在此敢爾違犯禮法乎興雖忿公然不敢應一語遽俛首斂退同官治職事或有失悞公在上前率引為已過明於知人太宗嘗與論羣臣御筆書蹇義等十人名命各疏于下十人者皆上所信任政事之臣亦多與公善而具以實對於義曰其資厚重而中無定見於夏原吉曰有徳有量而不遠小人於劉雋曰雖有才幹不知顧義於鄭賜曰可為君子頗短於才於李至剛曰誕而附勢雖才不端於黄福曰秉心易直確有執守於陳瑛曰刻於用法好惡頗端於宋禮曰戅直而苛人怨不恤於陳洽曰疏通警敏亦不失正於方賔曰簿書之才駔儈之心既奏上以授仁宗曰李至剛朕洞燭之矣餘徐驗之仁宗因問公建文所用諸人對曰此皆洪武中人才徃事不足論巳遂問尹昌隆王汝玉對曰昌隆君子而量不宏汝玉文翰不易得所惜者市心耳後十餘年仁宗出其所奏十人者示士竒且諭之曰人率謂縉狂士縉非狂士向所論皆定見也公之文雄勁竒古新意疊出叙事髙處逼司馬子長韓退之詩豪宕豐贍似李杜其敎學者恒曰寜為有瑕玉勿作無瑕石書小楷精絶行草皆佳其卒以永樂十三年正月十三日春秋四十有七配徐有賢徳子男二禎應卒於徙所次禎亮孫男女各二太宗皇帝初召翰林七人入内閣其三出廬陵公與胡公光大及士竒也三人相與厚而相知深今獨士竒在胡公墓上之石士竒書之公墓石未有書其可不書銘曰千里之足越國過都或一蹶之不虞楩楠百尋其寸之螙寜見揭於匠輸郁乎紛紛五采承日競瞻望以忻快何泯沒之遄疾干將地下其神不死尚有光華天漢之涘
