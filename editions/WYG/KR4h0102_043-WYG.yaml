body:
  text: 明文衡巻四十三明程敏政編序送陳司業詩序楊榮宣徳六年秋九月國子司業陳敬宗光世以考績來北京上俾之復職凡與光世厚者皆作詩送之而以序屬予蓋光世初為翰林庶吉士以文行知名縉紳間永樂中修高廟實錄慎擇賢者而任之光世與焉未㡬凡庶吉士皆授刑部主事光世復徴入史館書成改翰林侍講及修太宗仁宗實錄光世復與其間會國子監缺司業而難其選遂以光世徃焉或謂光世誠賢於人然既侍講久矣其名實烝然有聞於上下今去為司業無乃左乎光世聞之蹴然曰司業天下學者之所取法也誠宜徳望優重者為之顧乃命敬宗將夙夜勉焉以圖稱尤恐弗及而何左之敢云既莅職日進諸生講聖人之道而正已以率之諸生大化服而光世之譽益大顯予嘗謂國家建學於天下以造士皆使學聖人之道也然其師之所見與弟子之所禀不能皆粹也故其成就有不能盡然者及升之太學譬之集衆材於班郢之門而大加繩削焉使小大長短皆中法度然後以之構厦無不適其宜者茍規矩凖繩有未至而欲羣材皆適於用而不爽焉難矣祭酒司業之任蓋何如其重也光世既優於是矣今歸而復加意焉國家得賢之多致治之盛人將於太學乎頌也予與光世處三十年矣誼不容辭故為序如此杏園雅集圖後序正統二年丁巳春三月朔適休暇之晨館閣諸公過予因延於所居之杏園永嘉謝君庭循旅寓伊邇亦適來㑹時春景澄明惠風和暢花卉競秀芳香襲人觴酌序行琴詠間作羣情蕭散衎然以樂謝君精繪事遂用著色寫同會諸公及當時景物倚石屏而坐者三人其左少傅廬陵楊公其右為榮左之次少詹事㤗和王公傍杏花而坐者三人其中大宗伯南郡楊公左少詹事臨川王公右侍讀學士文江錢公徐行後至者四人前左庶子吉水周公次侍讀學士安成李公又次侍講學士㤗和陳公最後至者謝君其官錦衣衛千户而十人者皆衣冠偉然華髪交映又有執事及傍侍童子九人治飲饌傔從五人而景物趣韻曲臻於妙廬陵公喜題曰杏園雅集既序其端復與諸公賦詠成什乃屬予識其後仰惟國家列聖相承圖惟治化以貽永久吾輩忝與侍從涵濡深恩蓋有年矣今聖天子嗣位海内宴安民物康阜而近職朔朢休沭聿循舊章予數人者得遂其所適是皆皇上之賜圖其事以紀太平之盛蓋亦宜也昔唐之香山九老宋之洛社十二耆英俱以年徳高邁致政閒居得優游詩酒之樂後世圖之以為美談彼固成於退休之餘此則出於任職之暇其適同而其迹殊也然考其實爵位履歴非同出一時聨事一司今予輩年望雖未敢擬昔人而膺宻勿之寄同官禁署意氣相孚追視昔人殆不譲矣後之人安知不又有羨於今日者哉雖然感上恩而圖報稱因宴樂而戒怠荒予雖老尚願從諸公之後而加勉焉省愆集序黄淮惟我太宗文皇帝涖阼之初誕興文治規致太平慎簡儒臣設内閣以處之俾職論思典内外制叅預機要而臣淮猥以末學忝與列焉永樂己丑車駕廵狩北京今上皇帝居春宫監國臣淮偕二三輔臣承朝命俾侍左右癸巳再廵狩亦如之受命兢惕不遑夙夜誓竭駑鈍圖惟報稱然而質素愚戇以故處事乖方有不副上意㫖者明年秋逮詣北京自分當被顯辟乃復䝉恩矜恤但寘之獄俾自省過一何幸也在獄踰十年懲艾之餘他無所事凡觸於目而感於心者一皆形於詩甲辰秋伏遇今上皇帝即位覃恩肆赦臣淮獲全喘息復從諸大夫後退食之暇紬繹腹藁得詩賦辭曲合若干篇彚次成帙名之曰省愆集志不忘也嗚呼先儒論詩以為窮而後工近古以來若李白杜甫桞子厚劉禹錫諸名公其述作皆盛於困頓鬰抑之餘至今膾炙人口淮也才不逮古人處困日久而囹圄禁且嚴目不覩編簡手不親筆札口不接賔客之談舊學日益耗落氣愈昏而趣愈卑志愈窮而辭愈拙深可愧也然而篇什所載或追想平昔見聞以鋪張朝廷盛美或懷恩戀闕以致願報之私或顧望咨嗟以興庭闈之念至於逢時遇景遣興怡神一皆出於至情蓋亦不可廢也是用藏之巾笥以貽子孫俾覧者知予處困之大畧工拙云乎哉徐蘇傳序胡儼徐蘇傳者所以傳徐孺子蘇雲卿之事也徐蘇本傳列漢書載宋史者儒者見焉閭巷之間寡聞也今二傳編錄博採羣書校之本傳特為詳備或者曰自漢以來懷徳秉志高世獨行之士蓋多有之傳者獨錄徐蘇何也曰出吾郡也曰若然雲卿廣漢士亦得稱吾郡出邪曰雲卿聞孺子之風而來在當時非無韜棲隠約之地顧乃區區於東湖雲水之間彼蓋以孺子之流風未泯也樂於此而居於此固有不得而外之者曰豫章先賢可以陶世範俗者豈獨徐蘇哉曰得時而駕行道以濟物者固巳表見於當時垂休於後世矣若二子亦非果於忘世者適漢衰宋微不可有為故退然自守以終其身此其操行足以激勵貪鄙聞其風者頑夫廉而懦夫有立志矣况士君子生於其鄉論世尚友可不知其人已乎欲知其人不得其事可乎得其事隠而不彰尤不可也此傳之所以廣又増錄其詩文既廣而増錄矣又刋以傳焉若是者皆君子之用心也傳之者棲碧李氏也刋之者李貞士廉也錄之者王遜之也序以冠其端郡人胡儼也送諭徳周公隨侍之南京序楊溥聖天子嗣登寳位明年改元洪熈諭廷臣若曰惟祖宗大徳鴻業啓佑備至垂裕無窮太祖高皇帝龍飛淮甸定鼎金陵太宗文皇帝肇建兩京垂統萬世予嗣大歴服仰遵成憲鳯陽皇陵金陵孝陵皇業所基朕寤寐不敢忘謹遣皇太子致祭爾文武羣臣暨宫僚簡俾以從廷臣奉詔惟謹於是左春坊左諭徳兼翰林侍讀周公崇述實在是行翰林羣公賦詩祖餞徴予序惟天啓聖明開太平之運士君子千載一遇儲君天下國家大本其官屬自古擇人惟其時斯道以行惟其人斯克翊於善皇上丕隆孝思肇行盛典資賢俊輔導元良屬望尤深儒者平居以致君澤民為心恒患乎弗遇而崇述遭際如此端躬正諭以副聖天子簡俾為吾儒増重其在是行乎昔司馬子長足跡半天下遂以文章名世若夫馳騁中原歴覧兩京仰二聖開創守成規模大畧擴充啓沃其所成就固不徒文章而已詩曰有馮有翼又曰以引以翼予於崇述有望焉送劉汝弼序正統元年春聖天子維新政化慎簡賢良用資勵翼重惟方岳大臣以旬宣為職尤貴得人乃詔廷臣三品以上各舉所知少傅兼兵部尚書華蓋殿大學士廬陵楊公以翰林侍講劉君汝弼應詔擢授廣東右布政使朝之大夫士咸謂汝弼克宜是任少傅公之薦足以副朝廷盛意於其行同門楊溥偕諸鄉友仕於京師者餞之都門之外酌之酒而告之曰汝弼以名進士入翰林為史官為講臣歴事四朝其才猷抱負毎見於論議文字間而今乃得措諸行事翰林以論思備顧問為職業未嘗試以有司之務或者遂謂吾儒徒持文墨未閑政事今朝廷重念蒼生自翰林出典方岳自汝弼始夫方岳有連帥有司憲相頡頏有守令百執事為之屬以從事所見或不能同事或失於緩急先後必有以包涵之使之從容歸於善然後為得體汝弼之量足以勝之也仁人君子為國牧民一夫失所則吾之辜顧惟一方之廣智慮或不周耳目有不逮求免於責不亦難乎而其要在擇守令汝弼之明足以别之也予於汝弼之行使天下之人知吾儒施設有出尋常萬萬者矣汝弼曰某不敏敢不黽勉以副朝廷委任以求稱知己為斯文之光於是酌以為别靜學齋序梁潛予在禁林七年得交游之士二人焉烏江蔣君用文姑蘇趙君友同也二人者忠信慈厚而皆跡於醫皆為上御醫方纂修永樂大典編古方經二人者又總裁其事遂得朝夕徃還久之蔣君去侍青宫予亦兼官春坊進與蔣君接跡而竝趨退而與趙君有校讐講益之雅相得益宻然不知二人造詣修飭於道者何道而能然也意其質性自然一日過蔣君見其名齋曰靜學然後知其所以進徳者在此也嗚呼靜者徳之基也先儒以為養得至靜之極則自然包括宇宙終始古今濂溪周子上承孔孟之緒其示學者亦惟在於主靜夫中所謂靜者非靜而不動之謂也無欲則靜靜之中而動理具焉故雖古今之逺宇宙之大千變萬化之無窮説之於吾心者不見其有餘也由是以御天下之至動而不見其擾理天下之至繁而不見其棼所謂淵黙而雷奮者動之中靜之理所以行也靜體而動用靜存而動行此誠意正心之事而蔣君達此其過人也宜哉諸葛武侯謂才須學而學須靜者周子之言非有取乎彼然吾觀蔣君之賢益有徴乎其言也蔣君與人處洞豁不為深隠人人愛悦之獨趙君澹然恬漠雖於醫亦不屑然二人者中情甚相似皆善文辭皆有得於靜者因讀諸公所為靜學齋詩喜而為之序既以貺蔣君又書以質之趙君也中秋宴集詩序士君子當四方無事朝廷清明交游盛而志氣同進無諱忌之嫌退有講學之益如此亦足以樂矣固不在乎嘉時勝集樽酌淋漓而後樂其樂也然而樂之於心者無因見也必有暢其志氣發其歡欣形之詠歌使當時讀之者皆為之擊節羡慕傳之來世思見其盛而有後時不及之歎則雖盃酒殷勤卒然相遭固亦一時之盛也於是永樂七年中秋之夕翰林學士胡公合同院之士㑹於北京城南公宇之後於時涼露既䧏清飈悠然明月方升而酒行樂甚公乃命分韻賦詩凡若干首諷其和平要妙之音有以知夫遭逢至治之樂諗其勁正高邁之氣有以明夫培埴養育之功是皆平時蓄之於中隨所感而發之於此也豈非盛哉其或因事寓思有物外無窮之情興起感發為萬世不盡之慮者亦足以見君子之心也因為之序以明夫君子㑹合之美誠朝廷亨嘉之際而凡是作非泛然辭語之細也逰長春宫遺址詩序長春宫在北京城西南十里金故城中白雲觀之西也元方士邱真人者與其徒嘗居於此當是時琳宫祕宇儗於王者今其宫既毁獨其遺址之存據平陸巍然以高登而覧之猶足以盡夫都邑之勝蓋其東則都城臺闕府庫之壯榮光佳氣輝然燭乎天表其南則曠然原陸而薊門高邱之間荒臺遺沼之可見者皆昔者遼與金所嘗經營其間者也其西則西山之崖雄峻㧞出而蒼翠紺碧之色隠然烟霞之中其北則連山崔巍雄闗壯峙凡仕於朝與居於城中者蓋嘗知惟閒暇登覧於此而後得之也是時皇上親御六師於隂山大漠之北故凡居守侍從之臣皆優游無事遂相與逰焉既周覧而樂之因又以知夫國郡之壯且險誠天府之固也蓋都城西北諸山皆起自太行綿亘屬於居庸出榆關碣石至遼以東而後止豈天之所以限中外而壯偉觀者固在此邪然自五代至宋三四百年之間皆干戈擾攘其中故其地勢之險若有不足恃者及元之興又百年然後聖明受命攘除而剷削之其民既安養生息熈然以樂夫太平之治而上方振耀神武於窮荒萬里之外嗚呼其為生民社稷久逺之慮者蓋深矣詩曰之綱之紀燕及朋友又曰不懈于位民之攸塈此言人君能振作綱紀勤勞於其上而臣民頼之以安也由是觀之今吾二三人得以恬然嬉逰於此者其誰之力邪誠使在夫五代亂離之際雖欲側足其間以竊窺夫山川城郭之壯其又可得邪夫士君子歡娛盛美之事多在於太平之日而能託之歌詠則有以傳之永久况元之諸賢若虞公邵菴袁公伯長皆嘗臨眺而賦詠焉因以其所分韻蓬萊山在何處為韻各賦六首同時而賦者翰林侍講鄒君仲熈曽君之棨修撰王君時彦王君行儉刑部主事周君恂如其一人則予也六人之作見於辭者各不同而其志氣則皆可謂盛矣既相與錄而藏之因為之序後之人得而讀之尚能想見夫今日之盛也哉送景山張先生赴京序王紳予讀歐陽文忠公榮鄉亭記知昔蜀之郡縣胥吏不喜儒士毎見輙為其毁辱搆陷以故人不樂業儒亦不急於仕祿甚有志者不過習訓詁歌詩以自養而巳未嘗不歎其習俗之鄙陋而士氣之委靡也士生其時處其鄉能㧞擢奮勵以自見者其亦得十一於千百哉今去其時未久餘風遺習豈無存者顧在作興之方與自立之志何如耳臨卭景山甫張先生蜀産也自其少時慷慨有立志習詩書六藝之文即圖為世用後罹元季兵興浮沉里閈以保全性命者五十年國朝文運開始日以求賢為務遂應有司之辟入成都為司訓居職九載所教弟子多所成就邑人稱之迄今考滿將赴天官覈績而景山甫之顛髪亦已種種矣或謂景山甫習蜀土之俗近納祿之年且負錮疾必將乞骸骨而歸故鄉曝茅簷凉竹簟以樂夫崦嵫之境設使之任職臺閣寄牧州郡必非其志矣予謂不然昔馬周以晚年而見遇汲黯以多病而卧治况當盛明之時為士者孰不欲竭心展力以希尺寸之功而圖芳於竹帛尚何有習俗之移人乎吾知景山甫且將推其所有以自効庶㡬不負平昔之志異日年益高而業益成致政以歸指某邱某水之舊遊盤桓桑梓以保夫天年使人稱其生為鄉文人没為鄉先生則豈非景山甫之志願哉予與景山甫遊且相知故本其心為言以贈之而并廣或人之所見送鄭叔貞序洪武丁巳先師太史宋公致政家居於羅山紳始弱冠以契家子獲執汛掃役於公門公不鄙汲引而誨之每賔客散後列弟子坐松濤室下歴數古今作者必曰吾於交友所見惟爾父一人而門人輩獨希直而已希直即今侍講正學方先生也紳時騃稚未知所云而識者知公之言為至論後二年公卒於蜀先生東歸天台旋出教授漢中今天子即位首召入翰林而名益著聞天下是時登先生之門者雖甚衆有若鄭君叔貞者先生里中子也資稟清粹力學好古為文辭如春空層雲變態百出如秋江長濤𣺌漫無窮非其才氣之贍固不至此然叔貞雖不事表襮而其聲譽已藹乎縉紳間今年叔貞侍先生入京居數月念定省之職久曠惄然興懷促裝將還故里紳方以召命至相與周旋者信宿將别因為言曰夫天下之物成之難者器必大器之大者用必博萬斛之舟非尋丈之材一日之功所能為惟夫材良功就而成器也則必以之駕於長江巨海之上驚飈複浪之中而利濟之功大矣君子之為學豈異是哉是故極天下之書無不讀盡天下之理無不明藴諸躬者極其備養諸内者極其充於是以之齊家則家齊以之治國而國治以之平天下而天下平其設施布置豈庸人俗子所能窺測哉昔范文正公修學於泰山已有當世之志及出而用皆能行其志者以其得之有素也今叔貞之志可謂美矣其學可謂成矣况今聖天子側席求賢以鋪張盛大之治所以行其學者豈有遺於叔貞哉兹行也吾願叔貞益擴其所已能力其所未至使先生以太史公之稱先生者稱叔貞則叔貞經濟之施蓋未晚也紳也雖愚安敢不以文正為勉送皇甫訓導序鄒緝永樂十二年春太原府之徐溝縣學訓導皇甫秉徳以北京行部尚書朱公聘之為考官其秋至部將入而受事而車駕適自北伐還行部以在京例考試官須上請於是予與曽君子啓實被命朱公因以員額為限凡所聘取六人例減以就額考試官二人改為同考官而秉徳與上蔡學教諭程某改為内外受巻官八月戊申入院丙寅撤棘秉徳將辭歸乃謂予曰吾始以聘命來今不得受事而歸將何以解徐溝邑人之惑乎願得一言而歸庶㡬可以藉予之口也予聞而心慚無以復於秉徳也則告之曰先生之學誠優矣其徳誠厚矣然而時有不偶也故雖受聘幣而來而卒不克受事而歸於其心誠若有不能釋然者然古之人亦嘗有若此者矣不獨先生為然也在漢之時公孫𢎞為其鄉推舉對策不合竟免歸公孫既不以為病而鄉之人亦不以是少公孫其後再推而對策則第一元之時吳文正公伯清以大臣薦為國子監丞及至京師而其處巳有先之者文正公亦竟自罷歸而未嘗以之介於心夫事茍無愧於已則夫榮辱得失之際亦何足加損於我哉且通塞有時進退有義君子所守之道蓋如此此獨行部失制變從宜之道耳士君子不能不為先生惜而先生所以自處宜順適乎時而不以是介於心可也於是秉徳欣然而釋曰先生之言然請書之吾將持以解夫邑之人送何給事中序陳繼仁宗昭皇帝之為治也欽順天心敷章文徳禮任師保恩信洽於天下天下之民樂生而趨善者翕然興起帝念所以致若是者實由繼承先徳而本乎二帝三王之道也乃設𢎞文閣於禁宻之地命太常卿兼翰林學士楊公𢎞濟侍講王公汝嘉居之備供顧問又擢給事中何澄本清編修楊敬行簡俾接二公之武又起繼於草野之中入與共事繼獨愚陋無以仰副聖望然蹇蹇之心誠不敢不以二帝三王之道而進說也皇上嗣位治隆舊章務先史事其在𢎞文閣者皆領事翰林而楊公預執朝政宣徳元年本清援例歸新城謁祭先隴而展其誠孝飲餞以詩送之者皆翰林名卿於乎本清亦可謂榮矣以本清生故家習禮佩義克崇清白之行仕年已久聲績張著老至而為近臣日與魁豪雄傑振竒炫異敷彩於文辭以飭朝廷禮樂文物之盛輝耀百世者又可謂不負其所學矣因其歸故序而送之晦庵詩抄序吳訥五言古詩實繼國風雅頌之後若蘇李之天成曹劉之自得以至陶靖節之高風逸韻蓋卓卓乎不可尚焉三謝以䧏正風日靡唐興沈宋變為近體至陳伯玉始力復古作迨李杜後出詩道大興而作者日盛矣然於其間求夫音節雅暢辭意渾融足以繼絶響而闖淵明之閫域者惟韋應物栁子厚為然爾自時厥後日以律法相高議論相尚而詩道日晦焉宋室南遷晦庵朱子以天挺豪傑之才上繼聖賢之學文辭雖其餘事間嘗讀大全集觀其五言古體冲逺古澹實宗風雅而出入漢魏陶韋之間至其齋居感興之作則又於韻語之中盡發天人之藴以開示學者是豈漢晉詩人之所可及哉然集中編載衆體混出且巻帙浩瀚獲見者鮮暇日因手抄五言古體始於擬古終於感興諸詩得二百首寘於家塾以教子弟蓋欲使知詩章之學亦先儒之所不廢沉濳之久庶因有以得其歸宿云女教續編序王直女徳之隆汙家之興廢繫焉教之不可不豫也晦庵先生小學之書取古昔聖賢嘉言善行以為立教之本其訓女子亦備矣有元之時相臺許獻臣又蒐獵經史取其可以示法者作女教之書凡為女為婦為妻為母之道悉具吳文正公謂可與小學之書竝傳其用心亦至矣然予聞之易曰君子多識前言徃行以畜其徳夫謂之君子則必有師友之資問學之益而尤貴多識則孤陋寡聞不足以成徳可知矣况乎閨門之奥内言不出外言不入而欲廣其見聞増益其智識使徳立行修非資於書不能也公務之暇稍覧載籍錄前二書之所未錄者得若干條㑹粹成篇客或謂予曰女子以柔順為徳而以剛暴為戒彼庸奴其夫拂逆其舅姑鬬狠於其里閭此之謂悖人理速天誅而不可與居者也今子取坤文言以剛方訓之無乃過乎予曰坤乾之對萬物之母也女子之徳不取法於坤而奚取柔順者體之正剛方者用之發安常處變之道在是矣剛則其守固而不可屈撓方則其志定而不可移易然後柔順之體全夫強戾不生於心乖忤不及於物羞畏隠忍未嘗厲色疾言可謂柔順矣然或巽懦委靡人得而制之依阿茍且之間蓋有失其身敗其家者則剛方之徳非女子之所當務者乎彼之所為剛惡也予之所用為訓者剛善也向善悖惡智者固能擇焉且人受天地之氣以生剛柔健順皆具矣以是為訓亦因其所固有者而導之耳予言奚過哉客不能難遂書以弁其首贈李先生十題巻序正統十二年國子祭酒李先生以老病乞致事上惜其去不許者數矣最後言益切乃許之公卿以下至於逢掖士皆歎曰先生文行為學者師法久矣今致事去使倀然無所依於先生則為榮於諸士子則為可惜閭巷火伍之中則曰是能深知我而有志於恤我者也今則去矣太學諸生服先生之教而䝉其徳五六年來敬愛如父母自初有疾皆奔走治醫藥及少間則動色相慶至是無可奈何猶相與言於上曰祭酒李某感皇上嘉惠學者之意小大之才多所造就蓋前此未有今以老病乞致仕臣等尚願少留之不可退則取其事為十題命良工繪圖求諸名賢各識一言以為贈上亦眷顧之不衰詔兵部為具舟陛辭之日賜鈔一千貫命光祿具酒饌餞之及行達官顯人多先出崇文門外以序别太學師生用彩幣製旗帳各為文辭頌先生之徳教諸坊樂工槌大鼓雜以金石絲竹之音喧然前導送者凡二千餘人逺近觀者塞路一時行旅至不得徃來商賈為之廢業莫不嘖嘖稱美以為榮至有為泣下者漢之疏廣唐之楊巨源不能過於今七八十年之間亦未見其比先生獲乎上下如此其美之鉅細可知矣雖然此豈特為先生榮哉他日良史書之後千百年有讀之者足以見今日尚賢之美是所以為邦家之光也嗚呼盛哉予與先生仕同年荷四聖之徳大矣忝竊非分方資輔益以逭負乗之譏而遽舎之去予何恃以立哉欲不戚然以悲可得邪詩曰毋金玉爾音而有遐心予終有望於先生也諸生以十題屬予言故為序而道之明文衡巻四十三
