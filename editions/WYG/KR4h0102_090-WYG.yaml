body:
  text: 明文衡巻九十明程敏政編墓誌銘行人羅君墓誌銘劉儼正統十四年秋敵入侵逼宣府城告急者日數至太上皇帝時在御親率六軍往拒之分官扈從而行人司則司正尹君昌行人羅君如墉濱行約同行於尹君所凡四人尹於予居相比羅君過予曰適與妻子别諭曰從駕出征危事也非使命時比萬一不幸我必死以報國我死其抱吾二子徴狀元劉先生編修陳先生文以著吾不朽予驚拒之曰何為出此言也君笑曰一得之愚及敗績報至予往問其家道臨别之言如出一口予乃痛哭曰如墉必死無歸矣其臨别之言可信也明日尹君先自軍前遣歸其僕至於行裝中得詩凡十八首皆與如墉及刑部員外某相倡和其詩大率傷奸臣擅權軍無紀律惟以不虧臣節相勉期予讀之竟痛哭曰如墉必死無歸矣觀是詩可知也其後同行四人三有詩者果不還予以是知土木之役有弃義而逃者有雖知義而迫於不得巳者有如吾如墉素定於死其於所謂從容就義者幾矣及是朝廷旌其義詔其子鑑入太學以俟擢用鑑來徴銘於予此如墉之志也言猶在耳予敢辭乎如墉字本崇别號竹峰世家廬陵之印岡高祖中正元瀘州同知曾祖伯剛元鄉貢士祖彦偲父惟最皆績學有聞公自少頴異初從安慶司訓母舅王來旬讀禮記垂成乃歎曰詩吾世業也可自吾絶耶遂學究兩經鄉大家交聘為子弟師太守四明陳公聞而召之見試以長江萬里圖賦君援筆立成累千言皆新奇有深意公奇之以為邑庠生予時於陳公所見是賦已心識而敬服矣正統七年君由鄉貢與予同以文辭登進士第除行人司行人由是日親且厚間從出使歸必過予道其道途所過古聖賢祠墓遺跡處或祭以文或歌以詩亹亹不厭且論所至藩臬郡縣官賢否歷歷如指諸掌後驗其人成敗果然蓋君若温然和易而其中剛介明白人不得而欺故所至人皆敬而畏之平生孝於親友於兄弟於朋友急其難雖禍患有所不避其文章辯博暢達喜往復然皆有法度而宿於理其材贍故求無不應者卒之日年四十有六兩娶皆郭氏子男三人長即鑑次某俱繼室出某遺腹生也諸孤以某年月日立木主塟公于某山之原於乎民生於三事之如一惟其所在則致死焉君能致其死無愧為人臣矣銘曰忠魂義氣與造物遊隨寓而安奚必首丘亦有歸時兹為幽宅人感其義過焉必式奉天翊衞推誠宣力守正文臣特進光禄大夫柱國靖逺伯追封靖逺侯諡忠毅王公墓誌銘彭時公諱驥字尚德姓王氏其先本太原人自秦漢以來為將相者踵接蟬聯族逺而分世次莫可考後有宦遊雲中者因家宣寧即公所自出也曾祖守道克世儒業祖思宗仕元保定高陽尹父成以宦家子留居于束鹿呂村里入國朝遂占籍焉成以讀書力農為務里鉅族程子晉見而賢之妻以愛女是為公之母夫人也公生而岐嶷警敏年十三遊邑庠刻志問學日記數千言識者咸以逺大期之永樂丙戌登進士第拜兵科給事中剛正敢言嘗奉命出鎮山西奏蠲徐溝鹽池虧課二十餘萬民困以蘇尋陞山西按察副使理寃獄戢姦盜風紀振肅入為順天府尹弛張得宜畿内稱治宣德丁未陞行在兵部右侍郎越九載遷尚書練達兵政得大臣體正統丁巳阿勒台多爾濟巴勒數侵邊甘凉數州驚擾尤甚朝廷患之命公西巡許以便宜行事公至稽閱邊備知守將法弛而令不嚴歎曰如此而欲敵無侵凌難矣翊日集衆轅門詢平日畏敵而不畏將者得都指揮安敬即斬以徇曰自今畏縮者視此一軍震慄失色因簡閱戍兵以甘州戍兵冗濫乃定為去留使相更代於是兵得休息民減轉輸之勞敵嘗入莊浪公遣兵授以方略使擊敗之敵乃引去及公還敵復窺邊公馳赴甘肅遣副將蔣貴率精騎出擊戒曰勉之去而不能成功無相見也貴感奮追敗敵衆於石城兒泉公計強勢猖獗不一大揃刈無以示威既諜知敵部落所在復以貴為先鋒襲之自率驍騎與都督任禮等分道而出刻期夾攻轉戰二千餘里俘男女二千餘口敵帥走死西陲以寧捷聞上遣中貴勞以金幣命兼大理寺卿支二俸明年還京辛酉雲南麓川宣慰思任發叛亂擾邊命公總督諸軍征之陛辭賜金兜鍪細鎧弓矢蟒龍緋袍以寵其行公至雲南方盛暑衆謂進兵非宜公曰賊毒吾民行可緩乎敢言不進者斬遂部分諸軍以進至金齒分為三道徑抵上江上江者賊砦所在也夾攻三日不下㑹天大風公命縱火焚柵因督衆乘勢力戰斬首五萬餘級賊敗走保險為拒公益麾兵深入破連環七砦于沙木籠山又破象陣于馬鞍山之隂死者十萬餘賊首潛遁乃振旅而還先是維摩州賊韋郎羅僭稱廣新王命公還師勦之至是公還雲南計曰此不足血吾刃當以謀破之乃遣偏師抵其境聲言王尚書大軍至矣賊黨聞而潰韋賊計窮遁安南傳檄追之安南懼斬其首并妻子來獻廣南與富州接境二土官交惡十餘年公諭以禍福兩讎乃釋凱還上遣官迎勞數百里外廷見宴賜甚厚特封靖逺伯食禄一千二百石號推誠宣力武臣階特進榮禄大夫勲柱國賜誥劵追封三代如其爵未幾聞麓賊思任發羈于緬甸復以督軍往取之既至緬人懷詐黨惡而不遣公縱兵攻緬緬破而麓賊遁去俘其妻子象馬而還加禄三百石是年秋西巡寧夏甘凉申飭邊備訓練士卒其於守戰攻擊俱有方法敵聞風畏避不敢近塞戊辰春賊黨思機發復據孟養跳梁公復督兵往征兵抵金沙江賊柵西岸以拒公作浮梁渡兵一皷破之賊退立三柵自保公督戰益急不日而三柵拔賊黨殱焉西南自是悉平有苖䖝富者偽稱剗平王别將屢征失利命公掛平蠻將軍印總兵致討卒檻送䖝富京師餘黨悉降公還詔增禄百石令世其爵景泰初以南京根本重地委公守備公嚴立禁條宿弊一清不便者撼以流言乃解機務就閒天順元年春上復臨朝召公便殿慰諭以勲舊命兼兵部尚書不數月軍政脩明賜金織蟒龍衣二襲尋以年邁請解部事從之特免常朝賜誥加奉天翊衛推誠宣力守正文臣特進光禄大夫勲爵世襲如舊而寵遇益加隆焉天順四年五月十一日終于正寢享年八十有三訃聞上嗟悼輟視朝一日追封靖逺侯諡忠毅公初娶張氏子二人曰玉曰瑢俱早卒繼娶劉氏子二人長曰瑺應襲次曰珩勲衞義子曰祥以征南功授錦衣衞指揮僉事孫男三人女四人諸子扶匶歸束鹿以是年八月初八日塟于邑之平原祖塋禮也公天資沉毅識量宏偉有文武長才遇事剛果剸繁治劇不以為難行師征討用法嚴明而料敵制勝雖老於軍旅者有不及故所至輙能成功及其晚節保身全名守以謙虛而忠愛之心始終如一誠一代之偉人也然所禀尤異年雖高邁精力踰於少壯疾且亟神尤不亂遺言托冢宰王公狀行而以墓銘屬時時謭材穉筆曷足使公不朽公既有命庸可固辭銘曰天佑皇明輔以忠良脩文立武咸展厥長於惟王公挺生冀土河嶽孕靈才兼文武早遊藝苑被服書詩乃登黃甲給事瑣闈流譽蜚英踐􅆒中外爰陟司馬式儀有位雍容殿陛正笏垂紳手提樞軸潛斡化鈞視師三邊程勇戒怯兵將力齊敵聞震疊其有狼噬輙獮以兵馘强俘弱西北用寧蠢爾蠻方敢為民毒帝命師征惟公總督建牙秉鉞令一而嚴兵威逺震如火斯炎挫銳摧堅勢同拉朽止弗窮追懷以仁厚彼昏不知伺間竊發公而再往根株悉拔和風甘雨妖曀廓清西南萬里同我太平惟帝念功官賞是懋列爵疏封寵延先後入文出武邈乎無倫名昭宇宙允為元臣天不憖遺而遽不起山頽梁傾朝野哀止爰稽德烈著于幽堂於千百世赫其有光興化知府致仕岳君墓誌銘葉盛英宗皇帝既復辟宥密之臣累出親擢其第六人則吾友燕山岳君正也君固奇士而王吏部忠肅公又嘗亟稱其賢上雅重之君亦自幸魚水之遭凡所陳請所撰述所對答竭盡忠藎多稱旨一日湯序言變異以占法進云姦臣未盡之故上以問君君叩首曰姦臣未聞求之將人人自危況序術疎淺宜不足信上恱時石曹二猾勢方張君虞其將來必不靖因極言於上前且退而面開導之使為保全計二猾雖陽喏好辭中實銜之蓋未幾君之禍作矣上猶惜君甚止出為欽州同知既又追及逮繫責戍甘肅之鎮夷二猾尋踵敗上惻然有思曰岳正言是也召還將復有所用而龍馭上升矣成化初君居母憂服闋御史有言當亟召用君以勸忠詔仍元職吏部言當調南京有旨其勿調命充經筵講官纂修先朝實録適兵部清黃官闋部院大臣㑹薦君遂以成化元年四月俾知興化府以行君在官生財惠民民始譁而終服號賢守有司者或不知禮君君迺有歸志歲己丑來朝請致仕家居越三載為成化八年九月十一日疾卒得年五十五公卿以下皆往弔哭莫不嗟悼曰岳先生亡矣君字季方别號蒙泉畿内漷縣人曾祖德甫祖思明父興懷逺將軍輕車都尉府軍前衞指揮同知母太淑人劉氏君少年已能學有名二十一領鄉薦卒業大學正統戊辰㑹試同考誤寘落巻中侍講杜寧獨驚其文言於高文義公以為此吾輩中人遂占首選廷試第三名授翰林編脩景泰三年陞右春坊賛善兼編脩天順初元改修撰是年六月被命入内閣叅預機務及其得罪去僅一月耳君偉貌美髯言論灑灑動循矩度居家孝弟交朋友有始終之誼平生性剛而志高抱負經濟不輕屈下人有古豪傑之風石曹事或迂議之且以未信為言直應之曰何得以諫官處我我道當如是其篤於自信如此人有不可意事雖權貴人當言即言之無宿藏而人不之察以故愛君者雖多卒不能勝夫嫉君者之屢也配宋氏孺人側室周氏王氏子男二增堂皆夭女六長許嫁而卒巳嫁者壻朱昱生員李經翰林編修李東陽餘未行君之學精博旁熟莊騷至方外度數諸書無所不窺所著經解務出新意多儒先所未發惟深衣纂誤成書文章有類愽藁若干巻書法晉唐可名家於乎才美如君即特置華要先皇帝之明也中間蹇連坎坷有若不堪處者然觀君今日之金緋在躬考終牖下自非先皇帝今上皇帝之明且仁則雖欲得此難矣若是者在君其亦可以無憾哉以卒之年十月七日塟祖塋之側君之兄端府軍千戸祥哀君無子率其猶子培均坪坦墉長號嚮予乞銘予為作銘慰答之亦以慰君於地下焉爾銘曰古有李白其人亡嗣亦有柳州擯斥以死其名之長弗繫乎此大明故資德大夫正治上卿南京致仕兵部尚書兼大理寺卿贈太子少保諡襄毅程公墓誌銘劉珝成化己亥秋九月二十有七日南京致仕兵部尚書兼大理寺卿休寧程公卒于正寢有司以訃聞詔贈太子少保諡襄毅遣官諭祭營塟朝紳咸曰公一代人豪而今已矣可惜雖然朝廷于其生加以穹秩于其休褒以璽書于其沒優以䘏典且有象賢之子昌大其業是公雖死猶不死可謂無遺憾矣既而其子敏政慟謂予曰先生交先君子三十餘年僕又曾聆先生一日之教兹墓中誌銘敢以為託乃誌曰公諱信字彦實世居徽之休寧其先聞臣大儒載在簡冊可考高祖諱社元至正末用薦者起為承奉班都知不赴曾祖諱吉輔兩世妣皆呉氏祖諱杜壽國朝洪武中謫居河間考諱晟俱以公貴贈兵部尚書兼大理卿祖妣江氏妣張氏俱贈夫人公以易經中正統辛酉順天府鄉試明年第進士授吏科給事中己巳英廟北征公偕廷臣上疏諫止不報巳而師潰土木敵遂南侵京師戒嚴命公守西城上言五事曰新號令以振軍威募勇敢以備警急召勤王以遏南侵設武備以防内變養銳氣以備戰守皆見采納敵將也先自西山一帶進薄都城都督孫鏜禦之失利乞領衆入城公堅持不可躬督諸軍自城上以火鎗礟石鼓譟為鏜援敵引去景泰紀元命公充副使持節冊封華陽王妃凡王府有餽遺悉却之歸陞左給事中辛未九月英廟還自迤北居南宮公復上中興固本十事曰敬天求賢納諫謹災節用詳刑選將練兵尚儉隆師而敬天一事則當時天象屢變請景泰帝隆孝友之實以答天心之仁愛聞者壯之壬申陞山東右叅政總理遼東邊餉巡撫都御史奏倉官吏卒盜糧石以上者死乃造新斛視舊加二寸付公公立碎而火之曰使彼真盜死不足䘏今故加此斛置人於死地豈情也哉遼卒至今能道其事會以憂去轉四川分巡所至問民疾苦松潘賊人作亂公偕侍郎羅綺進攻破其黑虎諸寨天順丁丑英廟復辟公奉表入賀時方録景泰間上言之人遂留公為太僕卿遼東巡撫缺員陞公都察院左僉都御史賜勅以行守將海寧伯董興姻聯曹欽公一切裁之以正又造戰車創義倉行贖罪法設月輪簿凡百號令一新建州部落董山潛結朝鮮公使土官佟成授以成算往廉之得朝鮮授董山中樞院使制書以還公疏曰乘其未發急遣二使問之可伐其謀朝廷乃命一給事往朝鮮一錦衣譯者往建州二人初不肯承出制書示之咸相顧愕然各貢馬謝罪邊人孛來聚衆欲入寇公自率師廵邊營于境外者凡三月得風濕之疾自此始都指揮夏霖事多不法與董興相結納僉事胡鼎按其罪四十公以狀聞詔中官及錦衣郭指揮逮霖而籍之不意中途受賂乃奏虛實相半都御史寇深因併劾公輕聽胡僉事言調南京太僕少卿刑部缺堂上官廷臣言非公不可召陞右侍郎尋以憂還河間今上皇帝即位起復公于兵部又轉左侍郎成化丁亥四川貴州山都掌蠻據大壩山箐之險叛服不常陞公尚書提督軍務與襄城伯李瑾統番漢兵討之公至永寧自督大軍入金鵝池又分四路兵期㑹于大壩將士依公方略用神銃勁弩攻賊賊不能支連破二千餘寨獲銅皷數十斬首五千級生擒二千餘賊復走入深洞公命軍士以土石窒其門以兵圍之月餘賊死洞中臭聞十餘里又隂察九姓土獠之附于賊者還師撲之未及載都掌悉平又布置衙門邊事以定凱旋進兼大理卿有白金綵幣襲衣之賜前此公營大壩凡兩月滛雨不時瘴癘荐興舊恙復作至是四上疏請老俱不允辛卯春上以雨雪不降求言公上言兵事可更張者四兵弊可申理者五詔下所司執政者難之未幾三邊有事悉如公所料南京缺叅賛機務大臣廷臣交章薦公為宜上允所請公至南京適彗出軒轅乃與六卿合議復上言興利除害三十餘事多見諸行他若汰貪縱循舊典可書者尚多在南京叅贊已四載復疏乞休上重違公志賜勑還鄉有疾若去體其勿久安于家之語明年公還休寧里第又四年謝世距其生則永樂丁酉閏五月十六日得壽六十有三塟邑東南南山之原配林氏累封夫人子男三長即敏政成化丙戌進士及第授翰林編脩累陞左春坊諭德學行為時所嘉次敏德太學生次敏行邑庠生早卒女一許聘忠義前衞指揮子凌雲漢孫男三壎圻塏女三俱幼嗚呼公儀觀魁偉性資剛果六籍百子無不涉獵為詩文略不經意而雄渾可傳事親孝少時嘗力耕以養居憂廬墓側有芝産之瑞教子弟嚴而有方待内外親族恩義兼盡遇故人子矜恤振㧞惟恐不及凡百玩物一不以挂目為諫官知無不言言必達大體而嫉惡太甚佐兩藩及法司必以敬正輔長官不隱忍坐視以為賢掌兩京兵政及征伐俱有成績又能任怨南京守臣或欲預錢榖詞訟公曰守備機務所以謹非常若此乃有司之事也斷不可預論者以為得體征川貴時詔以便宜之權付公公自發兵至凱旋不爵一人不殺一人同事者以為言公曰刑賞人主之大柄懼閫外事不集而假之人若幸而事集又竊弄之豈人臣之道也論者又曰此古名臣之心名臣之言可以為後世法若今敏政輩進進未已能昌大其業安知天之報公不在此邪晚號晴洲釣者有晴洲集若干藏于家銘曰於惟襄毅晉臣之系宋儒之裔豪傑其才剛大其氣於昭襄毅科第高登禄位馴致兵刑聿司留後是寄果哉襄毅衆方棼棼我獨易易不數言間能決大議偉哉襄毅車轍所至吾民獲利威震蠻貊名揚當世無憂襄毅文事武備有人承繼誕昌前烈引而弗替無憾襄毅善始令終聖恩特異歸于南山垂休千祀
