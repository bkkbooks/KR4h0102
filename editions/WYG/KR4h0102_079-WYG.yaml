body:
  text: 明文衡巻七十九明程敏政編神道碑榮禄大夫太子太保吏部尚書贈特進光禄大夫太保諡忠肅王公神道碑彭時公諱翺字九臯姓王氏其先世家欒州自公之父避元季兵亂徙居滄州之鹽山故今為鹽山人公生有異徴氣清質秀甫十歲能讀書父即勉以仕進克自勤勵學遂有成永樂乙未登陳循榜進士第二甲第一名改庶吉士甲辰授大理寺左持正因詿誤左遷行人宣徳丙午用廬陵楊文貞薦陞行在山東道監察御史當是時任風紀者多事矯激惟公謹重逹大體上下賢之乙邜陞都察院右僉都御史正統丙辰奉勑鎮守江西政不苛刻吏民畏愛未幾徃浙江除土豪理鹽法能聲大著己未四川松潘畨賊為患命将徃征以公叅贊軍務公欲懐以恩信有來降者即以所賜白金寳楮易牛酒犒之畨酋商巴感悦率生畨來歸受約束者一十八寨邊境以寧辛酉出鎮陜西飭兵備壬戌徃遼東提督軍務時遼東守将屢失機朝廷以為特簡任公且授以便宜之權公至守将以下庭參公詰責玩冦失機故将斬之得其再三哀請乃已於是官軍咸股慄莫敢不用命逾月躬出巡邊治障塞嚴斥候仍簡閲戍卒更老弱賑貧窮配鰥寡俾成室家人人感激其治訴訟專行贖罪法雖人命亦然曰償命無益死者之家而財或足以濟其用故行之不疑有指揮孫璟者因漏闗鞭戍卒至死其妻女哭之相繼死他卒被鞭者訴璟殺一家三人公判曰甲死以罪妻女死於夫非殺也其令璟償葬埋費璟後為将有名非公優容不及此癸亥陞左副都御史丁夘率師出境破敵有功陞右都御史己巳陞左都御史是年秋敵長額森分衆侵廣寧公下令堅壁清野以困之彼乃遁去公在遼東十數年勤訓練廣儲蓄食足兵强為諸邊最其㧞用将校如施聚焦禮輩皆以勇畧知名亦非他邊所有也綏懐東方諸國恩威兩盡徃來朝貢者無不惕威而感徳景泰壬申召理都察院事尋加太子太保㑹廣東西賊冦擾攘兩鎮将官互相觀望不即捕朝廷命公總督兩廣軍務公至推誠撫諭蠻夷向化者多思恩知府岑瑛土官也屢有勞效或疑其反側公令瑛領兵屯桂林聽調人言乃息其他土官有争職者公度勢量情予奪得宜人心帖服癸酉少傅王文端公以清徳雅望居吏部年且老矣朝廷思得剛明果斷者以濟之乃召公還命以太子太保兼吏部尚書士夫以得人相慶乙亥公年踰七十乞致仕不允已而乞歸展省又不允命有司為公起第于縣郭西蓋以慰安其心也公掌銓衡孑孑持公道進退人才必察其實而於抑僥倖杜請託尤嚴選法為之一清天順丁丑英宗復位罷舊宫僚公上疏乞致仕南陽李文逹公言於上曰王翺㢘謹老成吏部非此人不可乃不聽其去任用益篤已而文逹被讒黜公力言其淳實可用以故文逹復被寵任焉當是時上眷遇公加隆特官其子國子生竚為錦衣衛副千户而賞賚以金玉束帶錦繡衣服銀幣玩器等物歲無虚月屢召與近臣同逰西苑南城及扈從獵近郊燕賜優渥一時擢用廷臣惟公言聽有出他人薦者亦必待公而後决也每召見便殿訪問從容呼以老王而不名其見敬禮如此辛巳秋加太子少保甲申今上嗣位賜銀五十兩鈔五千緡是冬命遇雨雪免朝叅乙酉春復加太子太保公年雖髙精力如少壮人然無歲不引年致仕皆䝉優詞褒答勉留不果行丁亥公有疾上命中貴挾御醫徃視并致白粲上尊之賜七月疾益篤其請益懇切上不得已允之居數日遣中貴齎賜勑諭并金織衣一襲銀三十兩鈔三千緡時已不能就道至十一月六日卒於京邸距其生洪武甲子二月十二日享年八十有四上聞訃嗟悼贈特進光禄大夫太保諡忠肅遣官諭祭營墳給驛送還其鄉以卒之明年五月初二日葬於帽架圈之原曽祖進昌祖大老父得林俱贈榮禄大夫太子太保吏部尚書曽祖妣徐祖妣劉妣張俱夫人配宋氏先公二十三年卒累贈夫人次張氏亦先卒子男一即竚也女一適河南參政賈傑孫男二長田次疄國子生女二曽孫男女二公天資仁厚操履端方居官涖政謹繩墨蹈規矩一毫不茍且其待人外若毅而中實寛和好惡所加善者悦而惡者不怨論事語簡而質是是非非確乎其不可易持已亷潔無私而自奉甚儉薄自初仕勤勞於外與晚處廟堂皆然未嘗以壮年異其心蓋年愈髙而志愈勤守愈約忠君愛國之誠愈篤而不懈真厚徳君子也跡其所以享盛福榮名無愧於古之大臣者其在此歟大宗伯姚公状公行詳且實矣公子竚欲刻石置於神道請予文之予素敬重公茍可以焯徳信後義奚容辭惜乎文不足以既其實也銘曰有美王氏世居於灤積善秉義隠處是安避兵鹽山遂定厥家再傳而顕揭徳振華其振伊何自公特起降誕之詳虹光兆異乃勵儒業乃第科名洊歴顯位駿望鏗鍧公出四方憲度清肅弊革利興兵民攸服其在中朝恪秉銓衡賢才彚進治道乃成公何能然惟徳之進惟公惟亷惟勤惟慎公以接物繩直準平廉以律己玉潔氷清勤以涖事夜寐夙興慎以存心晨惕夕兢祗事五朝始終若一為國元老為士矜式官躋一品壽踰八旬推今較古如公幾人公今徃矣疇不嗟悼匪私於公惟徳是好渤海故郡髙墳峩峩於乎忠肅千載不磨姚文敏公神道碑惟姚氏系出有虞其先家汴梁宋南渡徙居桐廬世傳詩禮多知名士而未甚貴顯貴顯自公始公諱䕫字大章損菴其别號也生一歲而孤性資頴異克志於學十三遊邑庠博通經史為文雄徤有竒氣正統戊午以春秋舉浙江鄉試第一㑹試辭乙榜入太學祭酒李公時勉司業趙公婉一見器重之少保楊公溥聞名且遣子壻從學而公不自滿復遊劉忠愍公之門請益士大夫莫不髙其志壬戌㑹試中第一與從弟龍俱登進士人榮耀焉癸亥擢吏科給事中首以修徳舉賢選風憲立謚法等八事為言多見採納甲子夏旱奉命祀北鎮雨應期至丙寅持節冊封晉府徐溝等王未還而母夫人卒公以不及奉湯藥為恨號慟幾絶葬祭一以禮己巳服闋復舊任是秋英廟北狩國勢危疑大臣勸進郕王議未决詢諸六科公曰社稷大計為大臣者當任之而詢諸小官何邪事乃定十月敵騎攻京城禁兵出戰未大㨗公請遣勑召邊将楊洪等領勁騎入援敵聞一夕遁去景泰庚午廷臣薦公才堪大任陞南京刑部右侍郎振舉廢墜刑獄以清壬申改南京禮部奉使雲南考察官吏癸酉還朝留任禮部丁丑正月景泰不豫尚書胡公濙在告公强之出率文武羣臣問安且請復立皇太子正位東宫疏成未上而英廟已從石亨等請出復位矣亨因挾私弄權軒輊大臣而進退之調公南京刑部已而有言公才者英廟悟驛召至京轉禮部左侍郎賜二品服戊寅調吏部時王公翺為冡宰選用人才資公為多癸未遷禮部尚書先是典禮者未愜人望公任之奏對從容儀度閒雅英廟喜曰禮官真得人矣甲申今上嗣位公贊襄太禮中節合宜首開經筵命公侍列有白金文綺寳楮之賜乙酉成化紀元上畊籍田幸大學悉從公請而行禮成宴賜有加公嘗云輔政當謹諸始丙戌秋率羣臣上封事有思艱難崇節儉謹名爵戒逸欲之言上欣然嘉納勉諭甚至丁亥正月賜金織麒麟文綺戊子復率羣臣上疏言皇上春秋鼎盛而震位尚虚宜均愛六宫以繁子嗣服食言動宜悉遵祖宗舊制言激切有感動意是秋慈懿皇太后崩卜異葬内閣執不可公率羣臣覆奏詞嚴而義正於是合葬祔廟之禮以成公在禮部所知貢舉僥倖止㤙凡遇災異必引咎辭職疏上輒蒙慰留復乃乞祭先塋上曰卿老成當朝夕輔朕未可言私於是衆知朝廷倚重公者至矣尋轉吏部尚書實己丑六月也公釐正銓法務愜輿論品藻人物必得其情至於方靣轉遷亦必以序有欲撓之者卒不變辛夘秋通前秩滿九載加太子少保遣中官賜羊酒寳楮以示奨勞是冬彗出軒轅公上疏反覆諷諌冀有感悟壬辰南方大風雨水溢公疏言自前歲彗星示變以來四方漸覺多故自古禍亂常起於災傷饑饉之餘毋謂天道姑息有象無應只圖因循便安於目前也因再上疏乞歸田不允憂形於色疾遂作上命太醫朝夕軫視仍遣中官賜羊酒米􅂼臨問比卒上震悼賜賻鈔萬緡遣禮部尚書鄒幹諭祭贈榮禄大夫少保諡文敏命工部造墳兵部具舟歸其喪所以賁終之典厚矣公丰神秀朗氣度宏偉言論侃侃逹大體居官涖政精敏踰人抜擢人才無間新故有以嫌疑騰謗者公不與辯亦不為之變節隠然如泰山喬嶽不可動揺立朝三十餘年憂國憫民恒存念慮事有可為必勇為之惟恐已後人先每廷議大政大事正色昌言人皆悦服一時大臣詞氣慷慨才識髙邁未有出公右者識者謂公可屬大事如周勃善應變成務如姚崇世以為知言公所為文豪宕富贍似其為人所存䖃矗堆稿一十巻其四書本經義學者式之公生永樂甲午十二月十七日卒成化癸巳二月九日享年六十曾祖鼎祖伯華父惟善有隠徳以公貴始贈父徴仕郎吏科給事中後累贈父及祖俱資政大夫禮部尚書祖妣楊妣申屠累贈夫人配王氏内助賢能累封夫人子男三璧甲申進士兵部郎中璽國子生瑩女四一適鄉貢士吳春先卒一適國子生陸埈餘未行其長男女四人俱王出㓜者俱側室金出孫男三敏敬敔女二璧扶柩南還以卒之明年閠六月二十五日葬於邑金牛山之原立石神道來徴予文予以疾固辭而請益堅顧予與公同朝乆相知為最深自公之逝予悼惜尤至豈可終無一言以副孝子之心哉乃為采摭誌状序次如右繫之銘曰山川間氣生名賢才髙意廣氣浩然讀書下筆文湧泉科名屢占多士先拜官禁近拱御筵羽儀燦爛孤鳯騫時乎景泰天順間兩京三品㸔屢遷雲龍風虎㑹當年文昌髙朗凌台躔仰輔天皇司化權四方英俊歸陶甄公於是時任調元溜深負重如山淵忠言讜論累百篇致君欲過堯舜前心勤事左思歸田終情未遂殊憂煎翻然長徃不少延六十甲子纔周天四海蒼生嗟棄捐百身莫贖有淚漣我皇聞訃誠哀憐贈官賜諡恩禮全英靈歸葬桐江堧金牛山色開雲煙隧碑巍峩澤且堅神龜贔屭螭盤旋焯徳有辭可細鐫芳名耿耿百世傳侍郎葉文荘公神道碑公諱盛字與中姓葉世為呉郡崑山人五世祖秀實惇重好義元季有暴僧聚徒事焚刼為鄉里害秀實即圖上其事於官捕斬之時稱為葉義士曽祖茂林妣朱氏祖明贈通議大夫吏部右侍郎妣郭氏贈淑人考春封兵科都給事中贈山西右叅政加贈通議大夫吏部右侍郎前母湯母陳俱贈淑人繼母沈封太淑人公天資頴異自少博學强記下筆驚人同邑知名士張和見其所業文曰此其志不可量因勸游邑庠遂駸駸有成矣正統十年舉進士授兵科給事中毅然以言責自任十四年英宗北狩郕王監國公率同列劾将臣扈從者失律敗事請誅夷之以謝天下然後選将練兵以復不共戴天之讐興師問罪以雪乘輿播越之恥如此則大綱以正大義以明而聖駕之旋軫可期矣聞者壯之九月監國即位頒賞廷臣公以時艱辭不許十月京城戒嚴公請罷内府軍匠悉遣征操及敵騎近城又請令有司熟糧料以給戰士遣散卒迎取軍器於天津以張外援四三日間凡七八疏悉合機宜敵既退公言賞功罰罪治天下要務今日之賞罰既行他日之勸懲攸繫賞罰明信則人人力於事功耻無不雪讐無不復矣今効勞如孫鏜死事如謝澤韓青皆當賞以示勸其他守闗不嚴赴難不力者皆當罰以示懲從之十一月陞都給事中時邊境未寧大臣有奏留邊将守京師者公言今日之事邊闗為急徃者獨石馬營不棄則六師何以䧟土木紫荆白羊不破則敵騎何以薄都城即此而觀邊闗不固則京師雖守不過僅保九門無事而已其如陵寝何其如郊廟壇壝何其如田里之民荼毒何宜急遣固守宣府居庸為便已而河南陳州流民煽動命公徃視公即兼程以進除貪虐賑饑寒威惠並行民用安輯景泰元年春還復上言京城為天下根本而八府旱蝗相仍加以邉疆侵擾民不聊生乞議寛恤俾安生理不然臣不能不為社稷憂也八月北方送駕還京将入闗矣有隠名具帖言迎復事者大臣見之顧忌不敢舉公曰此野人無情之言逹於上感動必矣或沮以匿名書公不顧具疏言之有㫖令尚書胡濙封進帖雖留中而正論有不冺焉是冬公以四方邊塞為患不已上疏請令中外文武要職各陳安邊濟時之䇿二年六月天象示異公又條陳弭災防患十二事以上及聞禁中頗事遊畋又請舉行祖廟午朝故事公當多事之秋遇事輒形於疏每疏不下百千言而大要則以扶忠直抑姦佞恤生民禦外患為主其有禆於時政為多三年遷山西布政司右叅政監督宣府糧餉尋命恊贊獨石等處軍務先是獨石馬營八城遇兵失守殘毁未復公列其利害可興革者為八條以進次第罷行之八城既復乃立社學以教子弟置醫藥以濟疾病立義塚以瘞死亡設暖鋪以便行旅均􅂼圃以給将士制度品式纎悉備具而又請官銀五千兩買牛千餘頭摘戍卒不任戰者俾事耕稼歲課餘糧於官凡軍中買馬除器勞功恤貧諸費皆於是乎取給自是邊人歡洽歲亦屢登有嘉禾同穎之祥七年冬以外艱去八城之人如失父母連章乞留而公固辭不可天順二年英宗皇帝嘉其能驛召至京靣加奨諭尋擢都察院右僉都御史廵撫兩廣公乞終制不允至廣興利革弊尤盡厥心舊例廣冬鹽課不出境歲乆鹽積商困徃徃賂守闗津者越過廣西市利公以為聽之則法壊而利歸於商禁之則商滯而利歸於闗津乃請許鹽商計鹽多寡入米餉邊而後出境於是公私兩利焉時廣西流賊多入廣東為害而兩廣守将頡頏自異是以討賊不成功公請革兩廣正将立總鎮於梧州居中調度則賊可平矣衆韙其䇿而不果行公不得已請益兵英宗乃命都督顔彪率兵赴之公與彪恊議破賊砦八百所擒斬數萬人而還或又以殺降謗之而不知實積年反復之賊也天順八年今上嗣位陞公左僉都御史巡撫宣府修復官牛官田之法墾田益廣積糧益多以其餘歲易補戰馬千八百餘匹其屯堡廢缺者力修築之不數月完七百餘所兵民始雖怨之既而恃以無恐乃欣戴焉在宣府屢有建白且請行養老之令於邊褒恤已徃賢臣為方來勸上嘉納之成化三年陞禮部右侍郎五年改任吏部是冬持節封瀋府稷山王六年畿内大饑命公巡視真定保定二府賑恤貧困綏輯流亡既還復命賑濟京民之饑者全活甚衆八年敵人出没河套為西邊患有言増兵守險者有言大舉搜套驅出河外沿河築城堡抵東勝徙民耕守其中者公受命徃議方畧奏言搜河套復東勝此皆事勢所難不敢妄議惟増兵守險可為逺圖宜令守臣剷削邊墻増築城堡收新軍以實邊選土兵以助守此不但可責近效而亦足為長便也上是其言九年轉左侍郎公自入佐部政每議禮用人從容贊决其間僚長敬信司屬悦服焉至若事非部分而闗當時利害繫生民休戚者遇諸卿必相辨正因而助益者不少一日坐後堂署事忽疾作不能言輿歸西第而卒實甲午三月八日也享年五十五上聞深悼惜之賜賻鈔三千緡諡為文荘遣官諭祭營葬以明年二月十七日葬於邑之積善鄉湓瀆之原公為人温雅簡重崇道誼尚名節言動思跂古人居家惇孝友涖官清慎勤恪設施不茍與僚友論事不激不隨而言色自若其取人先行檢而後才藝然存心寛厚終不及人之過惡所寓門無雜客公退手不釋巻考古辨疑殆忘寝食而於世俗聲色財利之好澹然不以經心平生為文師歐陽而功業自期於韓范以范公為鄉先正尤景慕焉惜乎大用未究而卒所著詩文奏議總若干巻藏於家公凡再娶先金氏贈淑人繼耿氏刑部尚書耿清惠公之女封淑人子男一晨補國子生娶副使張和女女三人一適貢士虞臣一許夏景澄一尚㓜公之卒也晨不在側冡宰尹公旻率僚屬經紀其喪事既又状公行畀晨晨奉以徴予文且曰先父雅愛先生言幸勿辭而公内弟司業耿君裕又申其意以請因摭状言著其概系之銘曰古稱才難今世尚然彼長此短用各一偏優於政矣其文叵傳文或工矣政譽弗宣逹觀於世百靡一全而公兼之寧不為賢惟公學問有本有原公之操履金石其堅清文逹識自視無前檢身約已猶恐或愆敡厯中外逾三十年忠君愛民心實勤拳言惟婉切用適方圓惠浹于民威行于邊緬懐鄉衮我其隨肩謀謨事業期著後先何志之逺而去之遄位不滿徳繫命于天墓門有碑徳烈是鐫於乎文荘百世不諼明文衡巻七十九欽定四庫全書明文衡卷
