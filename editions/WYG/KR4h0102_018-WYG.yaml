body:
  text: 明文衡巻十八明程敏政編銘玉兔泉銘并序劉基自古有以勢軋天下箝人口使和已者鮮不由細微以及大此姦人之素能也故髙之馬莽之祥瑞惟其言而莫之違然後大詐行而大欲得矣秦檜之事宋髙宗也以岳將軍之武之忠且排搆之殺其身以及其子反以為功而宋之君臣莫不從其指則亦何求而不得哉玉兔之泉以清美為建業城中第一豈昔顯而今湮者檜實知之耶或有善察土脈工穿井之術者密以語檜而神之以白兔耶則皆不可知也夫檜之罔民設詐豈下於髙莽哉白兔之是非無關天下之大事是故賢人君子忽之而莫與較於是乎鄙夫諂子遂探其意而夸之以為佞是蓋不足辯也金華張孟兼憫泉之芳潔為姦人所汚而銘以雪其寃愛物之良心也予亦悲之為之作後玉兔泉銘銘曰嗚呼泉乎夫何辜為檜所汚世無吳隠之孰昭其誣嗚呼泉乎尼父大聖猶言其主瘠環與癰疽白兔之傳夫何傷於爾歟檜死為蛆泉潔自如我作銘詩衆惑斯祛嗚呼泉乎終古弗渝奎上人耘杖銘奎上人得古藤以為杖而置鋤焉將以兩其用也名之曰耘杖而劉基為之銘曰罾可以取魚而不可以縶鴽帶可以繫襦而不可以貫珠孰眇其癯而多乃需既予老是扶又薉莽之除畀康勿趄以弗迷厥塗杖乎杖乎歳月逝夫子也予俱器物銘并序王禕古之君子於凡御服之物日用所接者皆著銘焉名其器而因之以自警則進德修業之功無乎弗在矣大學所載湯之盤銘大戴記及金匱隂謀所載武王器械諸銘是也余因竊取古義即凡器物各為之銘非敢貽於博雅之君子蓋庶幾動作之間私致其警焉爾合之得五十首今録二十首冠銘爾形之端故居吾元吾德茍或愆曷居人之先佩銘動中規矩鳴中律吕庶其為予輔履銘義之趨信之踐毋蹈非毋臨險枕銘體木而圓于以警吾昏體石而方于以安吾常席銘我身之逸兮藉爾以為偃也我心之直兮匪爾之可巻也衾銘舉而施之庇乎一體茍能推之覆幬乎遐邇帳銘起處毋溷乎而褻不可徇乎而隠顯公順乎而獨不可慎乎而笥銘非義勿納非禮勿發椸銘布帛大素其尚親附也錦繡􅀈􅀈如之何弗拒也鼎銘鉉有金玉享受福矣或折爾足覆公餗矣鏡銘貎之妍醜爾則辨其外心之淑慝爾曷鑒其内櫛銘髪之亂也可以理之政之棼也曷以治之尺銘百分之積乃成乎尺尺而復累吾不知其止學之為功固如是印銘質金相文玉章德之臧名乃長觚銘以此書文常思明以此書事常思平以此書獄常思生以此書財常思輕琴銘情性之正以防其淫造化之妙以鉤其深嗚呼聖人吾不得而見之矣欲知舜文王周公孔子者微乎斯音曷以得其心匱銘虚其中厥有容維能容乆則充榻銘坐如尸敬以持有弗莊者人所非屏銘心不可蔽可蔽者目天不可蔽可蔽者人劍銘水斬蛟鱷陸剸象犀盍少忍之以全物軀理齋銘朱升理者天理之謂也兩間之物象凡其自然生成者莫不各有文理在焉交互者謂之文條達者謂之理理之緻者莫如玉故理之為字从玉而里聲易曰仰以觀於天文俯以察於地理星之經緯日月道之出入凡在天者莫非交互之文川牝山牡三條兩戒凡在地者莫非條達之理理緻者莫如玉製字者既从玉以為理之字矣玉之外物理之緻者又莫如木果之栗者故稱玉者曰温潤而栗然書曰寛而栗記曰温而理寛也温也宜若為渾然者故繼之曰栗曰理以足其義知此則知理之字本義矣然則古先民之謂理皆即物而指其條達者以示人如所謂文理密察足以有别所謂依乎天理批大郤導大窽者非超乎物而言也自吾夫子之賛易也有曰窮理盡性以至於命而後之言性理者宗焉夷考夫子之言而求其㫖蓋以為理出於性性原於命聖人作易其蓍數卦爻之用由渾然而疏通之則和順於道德而理於義由粲然者而本原之則窮理盡性以至於命所謂理者未嘗以為在性之前者也程子之言性曰性即理也朱子以性之仁為愛之理義為宜之理禮智為恭别之理夫愛也宜也恭也别也四者因用而後見而其本則出於性譬諸草木其枝柯不一也循而視其理則皆出於其根是故善言性者因其愛宜恭别之用不同而窮其理之本諸中者則泝流而源見其派焉而不混也於是因其用之愛而窮其理之本乎性者則謂仁因其用之宜而窮其理之本乎性者則謂之義是仁義禮智信者因愛宜恭别之理而立名者也以朱子愛宜恭别之理之訓而讀程子性即理也之言則庶乎其可通矣理云理云渾淪渙漫之云乎哉吾宗有仲兄者淮海之英也名珍而字理且以理名其齋是得字義之本非常情常辭也謹述字義為之齋銘以為理也者不在於字亦不在於齋而在於心也銘曰元化黙運流行不巳物象肖之渾然之中有文有理理者條達亘乎終始有疏有密有曲有直而無交叕物理惟玉其緻無比理之為字所以从玉諧聲以里窮理盡性説卦有言以理言性有條不紊惟程朱子萬物之理皆備於已彌綸參賛民生日用咸有統紀原始要終明彼取此應事接物行其所知舉而措耳猗歟吾宗天資玉美既珍其名理以為字齋顔亦爾人見吾宗温然佳士服其夷曠挹其和萃仰其儀軌未必知其學優而仕事至物來徹上徹下條理如是我作銘詩其直如矢稽首齋名洗心聖言秋月寒水菜薖六器銘唐肅余子治圃越城南屋其中曰菜薖榘軒先生既銘之唐肅復銘其器六以余子之治圃也其蓺菜也必以鋤銘其鋤曰墾而植本斯立培而垕蘖斯茂衡深淺毋爾茍既蓺矣其灌之也必以甕銘其甕曰泉之容伊徳之充泉之吐伊澤之溥其繘勿羸其挈勿隳勿事乎桔橰之機既灌矣而草害焉薅之必以刃銘其刃曰惡草之滋資女以翦夷弗翦而夷則茅塞其蹊草去矣菜豐矣采之必以筐銘其筐曰掇其美毋以下體斂其實勿滿而溢虚而受之乃其徳左之右之慎爾執采而得之芼之必以釡薦之必以盤銘其釡曰溉于斯烹于斯我有㫖畜甘如飴彼鼎食者殆而銘其盤曰脂弗我汚兮羶弗我慕兮惟味道之助兮銘已余子曰噫子善銘我器切於物奥於理其足為吾儆乎請書之菜薖以繼榘軒之作於是乎書羅經銘王景羅經指南車之轍也其法以磁針定其子午子午正而二十四位皆正噫化機若是之可握歟為之銘曰混而茫規洪龎奠𤣥黄天崑崙廓八握孰用宣我無為司南離學坤維役萬靈斡曜星為民正大化元聖治原翼蟬聯忒其恒馮翼懵杳冥冥法其施亂是釐静應之唯其然握坤乾於萬年石磬銘并序胡儼余在雲間友人王以東遺余石磬色黝而質堅形制曲折皆出自然非人力所為左長於右右不及左者寸餘云其父嘗得之泗州合磬山中叩之其聲泠然以管諧聲律中姑洗角每清夜鼓琴之餘時以小角椎戛擊音韻清逺儼若神明之臨燕休之際其亦存誠之一助也乃為之銘曰泗濵之山孕𤣥璞曲折自然匪礱琢審音諧律姑洗角聖云逺兮襄不作遺音泠泠度寥廓忠孝堂銘王直國家之興必有豪傑卓越之才達乎忠孝之大節者以翼昌運纉世功然後能享髙爵重禄以傳于子孫而延之乆逺若太師英國張公其人也公之尊府河間忠武王昔事太宗皇帝于潛邸掌䕶衛兵其姿度雄爽知畧超邁而武勇絶人最為上所親任及靖難兵起上每授以成算戰勝攻取無難者諸將皆敬讓之時公亦提兵從王王嘗語公曰吾受上恩思輔成大業以報殊遇爾當戮力一心庶幾如吾志古人以事君不忠涖官不敬戰陳無勇為非孝爾能盡忠乃所以為孝也公頓首受教奬率所部摧鋒陷陣所向有功未幾王薨太宗皇帝素竒公召而慰勉之俾以其兵自效曰爾毋忘爾父之志公感上之德與先王之教益自奮勵卒成大勲凡上有所命南征北伐無不盡其心竒畧偉績載之信史功名冨貴無出其右者迨事四聖小心寅畏前後四十年如一日公既受顯爵位師臣王亦膺隆命配享太廟此忠孝之報也暨修先朝實録公再為監修今上皇帝緝熙聖學公實知經筵事敬恭朝夕從容進退凛乎儒者氣象嘗謂直曰先王以忠孝為訓吾既奉以周旋不敢失墜雖幸而有立然今老矣惟列聖之大德不敢忘於心而亦敢忘先王之舊訓乎因揭以名堂將終勉之且使吾子孫登斯堂者亦思所以繼吾志日夜勉焉盡心於其職庶無負於國而亦不辱其先子宜為我銘直聞之忠孝臣子之大節天理之當然也誠能盡其道則必享福禄之榮而子孫保之昔者召穆公能嗣其祖康公之業有功於周宣王錫之圭瓉秬鬯以祀其先祖又錫之山川土田以傳其子孫詩人歌之至今誦焉公嗣先王勲烈著於國家顯榮褒大實有累朝之錫命誠無讓於穆公而尤惓惓以忠孝自勉且以勉其後之人國有億萬年之慶張氏之福亦豈有窮哉乃為之銘曰天生斯民賦厥衷為子必孝為臣忠惟師英公德兼崇卓立宛有前賢風桓桓先王才且雄捧日直上扶桑東奄然馭氣超鴻濛祗率遺訓纘武功披雲卷霧開晦䝉九霄奮躍攀飛龍宣威蠻貊靡不通明明列聖眷遇隆仁漸義洽恩豐彤紀勲旂常銘鼎鐘王亦顯祀升閟宫周家召虎庶其同孜孜夙夜懷謙沖掲以銘堂圖始終勗爾後嗣躡令蹤事君奉先益致恭國家萬年福無窮鐘銘鐘之作官府以謹朝夕浮屠老子之宫以嚴祀而近世富室多置焉何居予既作祠堂以祀祖考諸子取嚴奉之意亦請置鐘予則兼取謹朝夕之義欲以警昏惰故弗拒因推祖考示教子孫之心而為銘曰有鐘在縣聲聞于天祠事則甚䖍然惟德是先進修之功夙夜當惓惓若沈酣麯糵之毒恣肆於袵席之安雖殷殷闐闐而聴之藐然迷天理之途溺人欲之淵昏惰而弗悛既不可謂孝亦豈曰能賢則神將厭之而何福之有焉嗟爾子孫警惕弗愆勉而有以百世之傳公勤堂銘馬愉刑部侍郎楊侯彦謐采褒嘉語名其堂曰公勤蓋欲視警以求乎不負也間以求言故為銘以相之銘曰善事服衆匪公弗得樹勲立業匪勤不克克己循理公孰與儔無倦匪懈勤孰與侔是以君子務其在已人爵既修天爵自至有偉楊侯公勤名堂副以吾力褒自綸章書成滅私易勉不息積善有慶惠迪乃吉昔聞其語今見斯人駸駸夙夜造何可倫石鐘山銘有序楊守陳彭蠡之口有山名石鐘尚矣後魏酈元以為下臨深潭微風鼓浪水石相搏響若洪鐘也而唐李渤非之謂如其說則瀕流庶峯皆可貫以斯名蓋潭際雙石叩而聆之南聲函胡北音清越是石鐘也而宋蘇軾非之謂石之鏗然有聲者所在皆是何獨此以鐘名蓋山下皆石穴微波入之聲噌吰如鐘鼓中流大石空中多竅與風水吞吐有窽坎鏜鞳之聲嘗親察而得其實故是酈矣而周必大又謂上鐘石髙四尺下鐘石濶餘丈叩之皆響若鐘磬他石則否復是李焉余謂波間衆竅其豐山之自鳴者乎潭際雙石其宋左師之每擊者乎是皆可謂鐘也然瀕流庶峯其下響若鐘者蓋鮮石之髙大而叩之函胡清越如兩鐘石者亦安得所在皆是且山之以物象名者若石鼓文筆之類亦豈必為天下獨然後名哉昉名山者其舟而察諸波間邪果屐而叩諸潭際邪抑若大寧之山嘗有巨石狀如大鏞而今已為波淪之九鼎火焚之崑玉邪是皆不可知者事不目見耳聞而可臆斷其有無蘇之戒也前四人皆目見耳聞而言猶不能定於一余固不敢臆斷顧區區一山名何損益於天下亦無足深辨者聞之故老我太祖髙皇帝伐偽漢陳友諒時駐師湖口嘗登是山既而大捷友諒殪焉時羣敵惟友諒最彊難克肆勞六飛躬駕後戡四方皆指授將帥勢為破竹然則湖口之㨗實天下之基也方登山時廟算先定聖謨孔神髙陟逺覽之頃固已空七澤而奄八荒矣抑或山靈水伯變草木為甲兵驅龍魚為蹕警以張皇威助聖武邪凡山川獲一賢貴登臨以名於世皆可謂幸是山迺䝉玉趾親臨龍顔寵顧一岑一壑至今猶有輝耀何幸尚焉古之人睹河洛則思禹功往在元季微我太祖民其殱矣今四海内外百年之間庶職恬逸萬民乂和雖羣動庶植猶勝於亂世之烝黎者皆太祖戡定輯寧之勞而列聖紹述喣嫗之澤也凡登是山者左顧彭蠡右瞻金陵江漢之心其可已哉兵部正郎王尚忠嘗讀書于山之佛閣間屬余言故為之銘俾鑱諸崖石用告來者舍其細而懷其大云銘曰楚有巨浸漫五百里曰鄱陽湖蓋古彭蠡陽鳥攸居禹貢肇紀其委之窮或扼其衝有山特起㠎嶫穹窿水經載之其名石鐘往在元季有梟横厲江漢之間雲擾麻沸崇岡震驚汔可小愒天命聖武舟師徂征矛㦸百萬飈馳霆鍧烈火西耀煌煌赤城彼衂而逋扼之湖口迺躋兩鐘以望九有鸞旗前登羽衛擁後猿麋羣迓魚媵鳥將雲霞增耀木石焜煌天覽電矚已空荆湘玉輅方降㨗音沸騰矢激冦殪厥衆角崩或者草木奮為甲兵四方羣敵兹戰惟劇一鼓殱之餘何庸力席卷萬邦拯其焚溺永康兆民垂億萬世峻德穹勲惟天其至謂山蓋髙曷足與儷山有巨石舊銘禹功苔蝕蘚剥有光流虹相古勲業亦銘鼎鐘於皇聖明式配神禹宜偕厥銘以耀終古厲我臣民無忘烈祖明文衡巻十八
