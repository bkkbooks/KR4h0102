body:
  text: 明文衡巻四十二明程敏政編序送稽古劉先生還鄊序朱善江西士之好古者莫盛于廬陵廬陵士之好古者莫盛于劉君劉君授徒南昌弟子從之逰者皆稱曰稽古先生劉君從而受之亦自稱曰稽古焉洪武丙辰冬十有一月君束書将歸廬陵来告别且曰人之以稽古稱我者未足為稽古也吾子以稽古許我斯誠稽古矣予曰吾所謂稽古有三說焉不知子将稽古人之心乎稽古人之迹乎抑稽古人之文乎如稽古人之心則堯舜禹之精一執中湯武之建中建極孔門之一貫忠恕果能端居深念而彼此意㑹焉則古人之心法在是矣如稽古人之迹則堯之平陽舜之箕山禹之㑹稽湯之景亳文武之豐鎬下及齊晉之㑹盟燕趙之攻圍楚漢之戰争鄒魯諸儒之講習必将如太史公之周覽遐觀而後聖賢揖遜之雍容征伐之奮揚廵狩㑹朝之嚴肅英雄豪傑之喑啞叱咤嬉笑慢罵皆必有故老遺黎能道之者然而先生老矣予懼其不能徧厯也如稽古人之文則四聖之易四代之書齊魯韓毛之詩髙堂大小戴之禮公穀賈董之春秋下逮荘騷子史靡不捜羅可謂閎且肆矣若乃蒼頡之鳥跡岐陽之石鼓孔壁之科斗湯之盤周之卣龔伯之敦衛孔悝之鼎銘岱山鄒嶧岣嶁浯谿之石刻凡漢魏以来之桓碑彛器古文篆籕分𨽻諸家之字畫幽而窮崖絶谷之隠淪外而僻壌遐陬之遺逸皆古今之竒寳華夏之偉觀然非如歐陽子心誠好之力又足以致之則亦未能遽集也吾子其将何稽劉君于是慨然曰求諸外者逺而難求諸内者近而易吾請從其易者書曰稽古人之徳又曰稽謀自天在天之理即在人之徳也稽諸古而於徳有所徴稽諸天而于理無所咈庶㡬其可以俯仰上下而無愧矣予曰斯言得之矣于劉君之行也謹述斯語以為贈送滁守周伯器秩滿序陳川余甞論民牧之要有三者焉一不得其要則位不稱政不美名且隳而民告病矣訹于上官也懾于貴近也堕于吏術也士君子有志當世受民社之寄聲望足以被主知則不訹也權智足以聳民聴則不懾也材智足以破宿奸則不堕也不訹于上官則實材得以自見不懾于貴近則實威得以自施不堕于吏術則實恵得以自洽所以聲實竝隆位徳俱至上交下感而衆戴之矣然其至非真積力行有自強不息之功者不能爾也洪武乙卯天子軫念羣黎尤重民選命中書大臣録天下州縣之長績之著者第升之其治最者處以劇要三月詔擢萊蕪令周伯器守滁州盖陟典也滁州在唐宋時為名邦出守皆清望有履業之臣往往入為名公卿致位宰輔者踵相望若李徳裕歐陽修邦之人至今以為談慕我皇帝有天下滁為潛邸大兵是集大業是基輦轂是遵為國家西北門户視亰畿諸郡為最劇守是州者非宿望舊徳簡在帝心者不以輕畀也州土著多勲舊著功烈分茅土者公至初視事曰天子以三尺法治天下滁為亰畿大郡逺邇所觀望茍不先謹有法如下民何且法自上始我知有法不知有他也于是均徭役一法制酌輕重之權而次第以行或挾貴要以枉干者公持之愈力毫髪不少貸衆環視噤不出一辭弭然以滁州舊𨽻中書事皆符下輒奉行或有不可者封上之後分𨽻鳯陽府臣以他州下視吏得以毛舉細微事以撼之公氣不為動與之開陳端倪論辯不為少撓事兩上之上以是直公一府遂屈由是終公之政吏不敢撓以私州當通道事噂沓簿書期㑹取速一時吏多庸傲玩不恭前政以為常公燭其奸欺繩束愈加庶事皆上出惟謹奉行不敢後以故手不得髙下民病以伸公寡欲自約退食則爐薫清坐蕭然一室俯以思曰政有所闕乎事有所未緒乎民有所未安乎旦旦以自省力行不少怠盖公之政智不訹乎上强不懾于貴明不堕于吏其要豈易焉而已哉自強不息之功三年政成将入覲陳其績之實行且有日民遮道願留不忍其去竊相謂曰我公之名在帝心我公之政在民心今且行其為名公卿致位宰輔也必矣其不使歐李專美前古幸為我邦人榮余忝與公同政悉公之材之兼人政之洽人惠之感人威之服人其聲實之美位徳之稱冝其華耀千古為無愧也敢書民牧之要為天下司牧者告潛谿續文粹序樓璉可名之功衆人知之難名之功君子知之至於不見其功而天下隂受其利者此非聖賢之徒不能知也周之積累舊矣由太王傳數世以及于武王用八百諸侯之助而始克商夫豈一人之徳一日之功也哉而孟子歸諸太公伯夷二老以為二老者天下之父也天下之父既歸之其子安往信是言也則武王之武可不用而周徒以致人望而王孟子之言不㡬于過乎然事固有立乎此而應乎彼者山嶽出雲而霖雨被四海人以為霖雨之澤也而不知本于山嶽之助賢人鉅儒之於國家不必有赫然之功而其及物常在乎事為之外謂天下果興于斯人衆人未必知而信之然欲天下之安定非斯人亦莫之能也髙祖之於子房世祖之於卓茂搴旗斬将不與焉而尊禮在羣臣之上盖其道徳可以馴暴革姦智謀可以開惑定事言論風采信于人而傳于世也乆矣吾從而尊禮之則其所化服豈特若事功之淺乎當元之衰國朝之始興也地大兵強據名號以雄視中國者十餘人皆莫能得士太祖髙皇帝定都金陵獨能聘致太史金華公而賔禮之公始見上上問以取天下大計公以不殺對上甚喜俾授太子經每詢以治道公未甞不以仁義為言是時羣雄多嗜殺好貨獨上御軍有法命将征討戒以勿殺所至民歡樂之識者已謂天下不足平及海内平定上方稽古以新一代之耳目正彛倫復衣冠制禮樂立學校凡先王之典多講行之而太史公實與其事在翰林為學士中甞為國子司業晚為承㫖先後二十年以道徳輔導皇太子聖徳寛大仁明而天下歸心愛戴稱頌洋洋者公之功居多海外殊絶罕至之國朝貢之使接于國門至必問公起居安否購公文集以歸日本至摹刻傳誦于其境内而近則朝廷逺而窮山陋邑婦人穉子皆知公為盛徳君子聞其名見其文未有不咨嗟敬愛者公修身于戸庭之間而姓字播于千萬里之外蠻方異域皆知尊慕之使中國之美傳于無極其功盖大矣而當時之人未必能名其為功此公所以為盛與公之為學博而知要其徳粹然與世無競而端介之氣充飬有道不為利害所移盖仁人長者之風不見於世久矣乃于公而見之天之遺斯世不亦厚乎惜夫世未獲盡被公之澤而公遽以疾終後十餘年皇太子亦薨于東宫天下哀痛焉今上既追崇皇考為孝康皇帝廟號興宗念先皇舊學之臣悲公之不可作以近臣薦召公之孫懌復官之於翰林凡興宗皇帝所欲行而未遂天下所願欲而未得者皇上皆舉而行之於是善譽洽于萬姓而公之文愈為人所愛重璉蚤從公逰辱公見知竊甞歎天下知愛公文而不能盡得其意且不能盡觀也以為公昔無恙時甞擇舊文為文粹以傳矣因復與同門友浦陽鄭楷叔度等取自仕國朝以来所作復選録為十巻名曰續文粹以傳于學者嗚呼斯文也公之所為雖可以傳世而不足以盡公之為人也後有賢者考論國朝之所由興而追惟興宗徳業之盛以詠歌今日之治于無窮太史公之功庶㡬可白于後世乎公諱濓字景濓金華人國史有傳送左叅議胡公之官江西序王景洪武三十五年冬皇上勅翰林儒臣修太祖髙皇帝實録慎選在位之士與纂修事而李公至剛以右通政来胡公以道以禮部郎中来王公孟陽以儒士又繼来三人皆浙江人何浙江之多士也未㡬至剛陞禮部尚書仍領史事明年夏六月書成上厚賚銀幣錫以重爵以道陞江西左叅議孟陽超授禮部主事尚書公謂予曰吾三人以鄉井之舊同列史館至驩也而以道獨駕部鳯翔于西江之上願一言以識别予曰今之布政司古之州牧也舜分天下為十二州州有牧故曰内有百揆四岳外有州牧侯伯是也然其職則維持侯伯以聮絡天下之勢以恪王度事至簡也今叅議布政之亞也位第四職四品贊襄一司之事至重也然上有使有叅政政不已出也然判與議必自已始已以為是叅政曰非是已以為不然叅政曰然為使者必執其兩端而定之若叅政曰然使曰不然叅政曰非是使以為是則已亦得執其中而用之則叅議之職不輕而重也亦明矣然其議必本之以時制叅之以舊章不屑屑泥古而不背于古上以宣皇風下以合民情平平蕩蕩歸于皇極而已若曰各持已見務為矛盾以私害公事不立矣非朝廷設官之意也以道無是也以道為部郎中且四年其同列皆坐剪斥以道翹翹然不染其難則以道之忠貞正大可見矣且皇上之所以命近臣而出任方面者重宣徳音使内外相聮屬也况江西宻邇都邑治化尤所當先也以重臣宣徳澤民易從也輔成太平之治在此行矣尚懋之哉是為序贈醫士潘徐二君序王達今年夏友人雷起潛之子曰豫疾求鄊里之精于醫者得一人焉曰潘克仁氏克仁治未二日而他適又求鄉里之精于醫者得一人焉曰徐士恒氏士恒造起潛所未二日而克仁又至二人者㑹不相嫌忌而啓藥且相與講明其得疾之由與夫去疾之法用何藥而可用何藥而不可二人者㤀其所負挾而一以拯人為念故雷氏子彌數日而愈矣起潛曰是可無所報乎于是走泮宫徴余文以為贈嗚呼天下之人非不衆且多也其間專事而妬賢者亦不為少矣小人專事妬賢者固冝讀古人之書而懷小人之忌者亦豈少哉自淳朴之氣散往往以智力相雄長甲曰可乙曰不可甲曰善乙曰不善昧其良心汩於私意㤀其已之短而嫉人之長安有相資成美謙遜長厚若潘徐二公者哉古人有言曰厚者不毁人以自益仁者不危人以要名吾于二公見之異日風俗之厚又安知不自二公始乎克仁専確有守且通于儒故録此以遺之俾往来觀者得以警于心焉送鄭先生之昌國訓導序鍾士懋天下難處之事多矣惟處貧為甚難天下處貧之人衆矣惟處之以正為尤難處貧而能處之以正非讀書行道者無能焉讀書行道而能處貧以正斯可以為人師矣吾鄉自趙宋以来素稱文物衣冠之邦俊人秀士班班輩出不幸與時不偶而􅃵藜茹糗者不為不多有如本忠鄭先生之甚貧者乎甚貧如其人者亦有之矣其或不堪于清苦而出入小徳之門者不能無之是以如其人之甚貧而處之以正者確乎難其人哉先生予同里人也治尚書能賦詩工字畫好古博雅矻矻焉年四十矣雖魚釜塵甑畧不曽有干求錙銖非所當得之心蕭然一室學徒數十人惟清坐講授皜皜乎髙風勁節無有少虧缺也今年秋明州府有新太守廼能聽人道其甚賢且甚貧也繇是訪之為屬縣昌國學訓導書幣来猶偃蹇不起朋友交勸之始就焉於乎師道之不立也久矣士大夫窮經覈史貫穿百氏論道理辯古今說政事瀾翻其舌無少凝滯操觚弄翰為文章絢如雲錦以之居臯比廸来學綽綽乎其有餘裕然而往往不免失其重者何也以其計功謀利之心而任以正誼明道之責譬猶建樛屈之木而為測景之表欲其逺近淺深度數之不忒也胡得焉傳曰不仁者不可以乆處約先生之處貧也不為不久守身也不為不正吾屈指于鄊里讀書行道之人有斯人矣廼今居訓𨗳之職表率諸生使諸生于靈臺之地㓗清其本原夜氣之存凝澂其思慮晝事之接澡雪其汚染他日掇巍科躋膴仕者皆有冰蘗之譽而能誅鋤天下貪婪之徒豈不曰其師之堅苦有所甄陶而然哉予未耄願及見之贈楊布政序胡廣永樂三年秋七月初吉皇上命刑科都給事中西安楊某為陜西布政使受命之明日入謝且以本貫辭弗許将行其寮友鄧某王某合士大夫為詩以餞之而以序屬予予觀皇上之用材随其大小而器使之所以任某者以公天下為心固不以鄉里而為嫌也某之材誠為可用将無所施而不可在皇上既信之而無所嫌在某獨何嫌而辭之哉辭非所當辭矣所貴乎君子者徳修于已而信于人不出乎閨門跬歩之間而感動乎鄊黨州閭之外其機如影響仕不仕均是道而已某之居鄊也孝弟忠信有以稱于人昆弟鄊黨既賢之今之為政有不必言語教詔而信從者矧夫生民之利病孰便而孰否孰得而孰失皆甞審察之其必能興其利而去其害如飢之食渇之飲真知灼見而無過舉矣此其所以任某也茍非行其情而戾乎公論則人孰得而加損哉某盖不如是也因其言論抗直敷答稱㫖故有今之命矣予知其所行将必有異於是因書此為序以贈贈給事中周讓重使古刺序聖天子徳洽仁浹覆載之内靡不從化窮荒極域自古聲教所不被者遣一介之使持咫尺之書以諭之莫不奔走承順稽首来庭吁夫豈威力所能為哉所謂日月所照霜露所墜凡有血氣者莫不尊親盖盛徳感動之㡬有如此夫古刺在百夷之外萬餘里其名載籍未之前聞也給事中濡須周讓甞奉命使百夷聞古刺名且知其人素慕聖化而欲朝中國者無以為之先使歸以聞天子嘉之遂命讓以往由滇池入百夷厯猿猴所家蛇虺所都魑魅所宅踰數月然後至至則其酋率其類驅象馳馬具舟艦供張張旗伐鼓陳兵出迎于道咸喜愕以手加額曰使者從天而下也于其國中設新亭館以居讓等即遣使從他使者至亰師報謝留讓居嵗餘日勞燕甚至今年夏遣使同讓備方物来貢且請臣寘吏天子錫以冠帯印章授以古刺宣慰使賚予有加復命讓再往将行来索予言為贈予惟使者之職其任匪輕非負剛毅之操拳勇之才通變之智不足以當是任夫無剛毅則必至于怯懦無拳勇則必至于折辱無通變則必至于膠固必全是三者而後可為使也今讓以單車從數十人往返數萬里重數譯使於禽駭獸縱之夷以宣布恩命發言慨慷忠奮激烈遇有無状氣不少慴能使逺夷知朝廷之尊是以口舌為干戚其與昔之發卒治道者異矣傳曰使於四方不辱君命可謂士矣讓盖有焉是行也予知自古刺之外有聞風而来者則必由于讓也贈醫士陳名道序楊士竒江漢間其俗尚巫有疾不事醫唯走巫求禱焉徼幸以治載醪牲實篚造謝巫之庭唯恐後即不治不咎巫必自反曰我之弗䖍不敢懷纎毫怨憝且慮復有求也間有知巫之妄而從事于醫又罕遭乎良焉素不明隂陽表裏脈治之說而稱醫之師醫之師其治或投數十劑不效而又増劇者故雖什伯中復有一二精其術人弗信之矣江夏宋惟憲其弟病且殆凡與惟憲闗忻戚者皆強之禱巫惟憲不應方愽求為醫之良者有進陳名道既至診而藥之旬浹遂瘳惟憲謁文謝焉夫醫聖人之教也聖人憂民傷於寒暑飢飽勞慾有至乎夭死故為醫之教使得保終乎天年者也巫者古以事神非有盜神之號以欺人也今盜神之號以欺人人亦安其欺雖百死不悔於乎先王之治天下有假于鬼神時日卜筮以疑衆者一拘殺于司㓂巫所為疑不既甚矣乎故巫不誅醫不行民得保終乎天年者幸也然使今之信醫者皆惟憲為醫者皆名道巫不足誅也而一惟憲一名道巫其可勝矣乎吾喜名道有成又重歎乎聖人之教也於是乎言送陳叔振序余居京師二十餘年四方賢大夫士之在朝者皆得識之其尤賢者得相往還而樂也臨安故宋之都㑹其山水秀麗鍾於人多俊爽明達適當世之用然溺于其俗率務外忽内逐物徇時者或流而不返飭行與文者或矯以自髙而求夫和厚端介志乎内不役乎外盖不多見焉陳鏞叔振舉進士為庶吉士在南京翰林與余處六年殆所謂和厚端介不矜不屈者非臨安之特出乎既與余先後来北京余調春坊叔振亦擢禮部主事而閒暇輒復過余盖有志乎其内也今叔振調南京禮部相去益逺相與之樂益疏矣夫君子之于學也不以窮達壮老而茍有怠意今南京諸司職務視往年千百之什一而載籍所萃四方莫加焉誠以其餘閒探索義理之正以究聖賢之用心卓然而行之将來所至豈特出于一鄊哉鄒孟氏曰尚論古之人古之人以叔振之資與志無不可至勉哉叔振豐城有史志静余甞相與者而違闊乆矣今于叔振為同官其亦為致區區之意送李永定經厯序永定吉水李明達先生冢子也余往年客武昌永定從先生在焉先生長余四十年忘年與余交厚時余兩人皆假館授徒永定治奉飬之資無日不相見也先生長身修髯飄拂可數面潔白如玉雪氣韵磊落有行義讀書不泥章句興有所適竟日㤀返甞愛余作樂府古辭遇有作取酒觴余向余歌相樂也後先生入竟陵永定以才舉授宣州衛經厯明年永定遣迎先生先生還過武昌訪余時仲秋之夕明月東出余數人者共浮小舟具酒殽出夏口亂流至禹王廟下飲酒既醉舎舟登大别山四顧下憇秋興亭至郎官湖而還復酌酒大歡各賦詩弔古且寓離别之意先生三復其詩愴然既而曰人生聚散風絮相值耳何足道也明日别去又三年先生没矣嗚呼惜哉余至今未甞忘先生而不可見矣見永定猶見先生也永定初在宣州有能名後以詿誤黜上既正大統凡用人制法一遵髙皇帝舊章永定復還宣州求言為贈夫經厯之任子為之有素亦在致其明而已公無不明亷無不公修諸在已可也在已修無所往而不冝况於衛之經厯者乎遂書以贈别而今昔存没之感有不知余中之浩然者矣送李永懐歸東平序永樂十九年冬士竒侍儲君自南亰入朝道出彭城以北屬嵗飢民男女老弱纍纍道傍拾草實以食而滕與鄒尤甚儲君憫焉不忍民之及于此也遽命山東布政使暨郡縣長吏計口而賑貸之侍從之臣亦皆動念矜惻且竊憾其長吏不以豫聞也既度濟寧入東平之境視其民皆充然意氣和悦如無所不足者而老者數百人鬚髪如雪冠方巾褒衣而長裾濟濟焉夾道東西聚立候展祗謁之禮從臣見者皆驚喜駐馬就而問之此邦嵗庶幾有収乎曰然州其有賢守乎曰然輒舉手加額言曰皆上之賜也又問州守氏名及其鄊郡曰前守楊公今之守李公皆出廬陵而併舉其冝民之政聞者既皆為東平喜又喜其民之言達于禮也尚書夏公顧謂士竒曰廬陵固多賢此兩人者亦識之否乎士竒曰前守名瑒字季琛家吉水于士竒同宗盖宋忠臣建康通判諡忠襄之後為州縣二十年率有善政今守名湘字永懐士竒同里人其父子兄弟慈孝友愛而力于生業未甞以非義取皆鄊人所重者衆嘖嘖稱嘆曰古之官人者必推本其行其有以夫抵暮余獨過訪永懷唯一童子守舍家具蕭然是夜宿州學其博士弟子亦皆娓娓道二守之賢時驛路所經東平屬邑其南汶上有史知州其北東阿有貝知縣皆以亷潔寛厚得其民心故盡東平之境不見有不遂之民者而自是所過郡邑所見其民則未甞不嘆東平之僅有也明年永懷以例代去其後朝廷遣使廵撫天下問民所疾苦東平之民羣訴於使者乞還李知州使者以聞命還之盖東平自永懐去至是更三嵗厯兩知州矣民心之好惡豈有他哉撫之不當其道不惬其意則欲去之如古謝詢之為吴縣者盖人情所同也如撫之當其道愜其意其去也欲留之而不能如鄧攸之為吴郡者亦人情所同也其賢不肖相去豈直倍蓰什伯哉永懐之賢亦攸之徒歟其所施諸東平者余及親見之故其復任也序以為贈亦以勵其終云賜逰西苑詩序宣徳八年四月二十有六日上以在廷文武之臣日勤職事不遑暇逸特勅公侯伯師傳六卿文學侍從㳺觀西苑以息勞暢倦於是成國公臣勇豐城侯臣賢新建伯臣玉少師臣義少傅臣士竒臣榮尚書臣進臣濙臣中侍郎臣驥少詹事臣英臣直侍讀學士臣時勉臣習禮拜命以行時少保臣淮来自退休承命偕行凡十有五人又勅中官導自西安門入聴乘輿馬及太液池而歩太監臣誠奉宣聖㫖令徧厯周覽從容勿亟於是誠導之循太液之東而南行觀新作之圎殿返而觀改作之清暑殿臣誠為臣勇等言二殿皆皇上奉侍皇太后宴逰之所也臣勇等仰瞻殿庭周廡䂓制髙明繕作精宻凡所以供奉之具潔清鮮好靡不悉備俯而思惟皇上之聖孝皇太后之盛福皆古今鮮有遂拜稽歡呼萬嵗乃降而登萬嵗山至廣寒殿而仁智介福延和三殿及瀛洲方壺玉虹金露之亭咸得徧造是日天宇澄明纖塵不作引而四望山川之壮麗草木之芳華飛走潛躍之各随其性萬象畢陳胸次豁然心曠神怡百慮皆凈信天造之佳境而人生之甚適也已而中官傳奉上命賜黄封之酒御厨之珍令咸醉而歸又拜受命方爵數行時久未雨忽雲隂東來㣲雨霑席倉庚如簧和鳴不已衆益以喜相與引滿勸酬盡醉而出臣聞一張一弛文武之道皇上統四海之廣撫兆姓之衆一日二日萬㡬則以閒暇㳺焉息焉且奉天倫之樂于兹誠冝又俯矜左右執事之勤亦俾之預有今日之適恩甚盛也於是羣臣欣幸遭遇賦詩者若干人詩總若干首臣士竒預侍宴閒于兹屢矣是以謹序于巻端云明文衡巻四十二
