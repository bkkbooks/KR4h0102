body:
  text: 明文衡巻二十五明程敏政編書擬答吕相絶秦書宋濓昔我嬴秦實長西戎獻公不我鄙夷以伯姬歸我穆公穆公不敢忘獻公薨國内不靖羣公子出奔穆公懼大國社稷之隕㑹齊人納惠公于晉惠公許以河外列城五東盡虢畧南及華山内及解梁城言猶在耳乃卽背之㑹晉荐饑來乞糴於我諸大夫惡惠公二三其徳也欲乗饑伐之穆公則曰其君是惡其民何罪於是乎輸粟于晉自雍及絳相繼不絶未幾秦亦饑穆公又曰晉君其能恤我民矣乎遣使之晉惠公弗念穆公之施絶而弗與穆公不得已有韓原之師相從惠公而西雖然豈敢以至卽改館饋七牢焉使歸于國及晉再饑穆公又餼之粟惠公薨懐公遣師軍于廬柳威靈所加孰不畏之我穆公忘已之弱使公子縶如晉師天誘其𠂻退軍于郇文公遂入曲沃朝于武宫呂卻畏偪將焚公宫以圖不􅁤穆公知之乃潜㑹文公于王城誘而殺之文公即位來逆夫人嬴氏穆公以晉國大臣未附俾三千人衞之以歸㣲我穆公惠文之能有國未可知也則是我有大勲于晉豈惟諸侯知之皇天后土實與聞焉文公當不忘我舊徳戮力同心以輔王室子帯之亂天王出居于鄭使左鄢父來告難亦使簡師父以告于晉我穆公左執鞭弭右屬櫜鞬親帥師屯于河上以遲文公文公恐我分其績也乃辭我師而下納王于成周殺太叔于隰城而獨受陽樊温原攅茅之田我穆公不敢言文公自是信宣於諸侯虞夏商周之裔莫不震疊相率而朝于晉非為秦也文公又以諸侯方睦欲脩舊怨于鄭穆公畏文公之威不能自寕急出師軍汜南鄭伯恐使燭之武來言曰君甞為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之穆公聞其言而愳結盟而還文公薨襄公即位穆公有事于鄭未甞以一矢犯晉疆場襄公蔑棄我穆公以墨衰即戎敗我于殽殄殱我卒徒係累我三帥我穆公亦不唯晉之怨乃自悔過誓告於羣臣然猶願徼靈於惠文以終事襄公襄公不察我之誠又帥宋陳鄭三國之師取汪及彭衙國中之人怒曰晉不報徳則已乃日事干戈是欲滕薛我也將悉敝賦以待于郊亦冀晉人遣一介行李之來修復舊好襄公唯力是恃又伐我圍邧新城襄公薨穆公亦即世晉人以國家之難欲立長君使先蔑士㑹如秦逆公子雍我康公唯穆公之事是傚多帥徒衞以納之晉人遽食前言而立靈公又敗我於令狐自時厥後又取我少梁又戰我于河曲康公薨共公即位靈公亦悔于厥心欲求成于我又不明言以侵崇急我我共公惡其詭道弗敢與成靈公薨景公即位景公不務撫綏秦民又廹我于輔氏景公薨君嗣厥位寡人謂二三大夫曰我兩國匪以玉帛相見而以興戎寡人之耻也盍行成乎君亦降心相從㑹于令狐而盟于河之東西口血未乾又使郤錡乞師于魯欲以伐我且以蔓辭以文致我罪寡人聞之困獸猶鬬况國乎君既有意督􅂈矣寡人亦何愛一國士卒不與君周旋左右乎君若惠顧前好唯令狐之盟是申是尋亦唯命鍜乃戈矛備乃弓矢俾兩君相見于野亦唯命寡人敢帥西方之諸侯俯伏以聽唯執事其進退之荅章秀才論詩書宋濓濂白秀才足下承書知學詩弗􅌒且疑厯代詩人皆不相師旁引曲證亹亹數百言自以為確乎弗㧞之論濓竊以謂世之善論詩者其有出於足下乎雖然不敢從也濓非能詩者自漢魏以至于今諸家之什不可謂不攻習也薦紳先生之前亦不可謂不磨切也揆於足下之論容或有未盡者請以所聞質之可乎三百篇勿論已姑以漢言之蘓子卿李少卿非作者之首乎觀二子之所著紆曲凄惋實宗國風與楚人之辭二子既沒繼者絶少下逮建安黄初曹子建父子起而振之劉公幹王仲宣力從而輔翼之正始之間嵇阮又疊作詩道於是乎大盛然皆師少卿而馳騁於風雅者也自時厥後正音衰㣲至太康復中興陸士衡兄弟則倣子建潘安仁張茂先張景陽則學仲宣左太冲張季鷹則法公幹獨陶元亮天分之高其先雖出於太冲景陽究其所自得直超建安而上之高情逺韻殆猶大羮充鉶不綴鹽醯而至味自存者也元嘉以還三謝顔鮑為之首三謝亦本子建而雜叅於郭景純延之則祖士衡明逺則效景陽而氣骨淵然駸駸有西漢風餘或傷於刻鏤而乏雄渾之氣較之太康則有間矣永明而下抑又甚焉沈休文拘於聲韻王元長局於􅄶廹江文通過於摹擬隂子堅渉於淺易何仲言流於𤨏碎至於徐孝穆庾子山一以婉麗為宗詩之變極矣然而諸人雖或逺式子建越石近宗靈運𤣥暉方之元嘉則又有不逮者焉唐初承陳隋之弊多尊徐庾遂致頽靡不振張子夀蘓廷碩張道濟相繼而興各以風雅為師而盧昇之王子安務欲凌跨三謝劉希夷王昌齡沈雲卿宋少連亦欲蹴駕江薛固無不可者奈何溺於乆習終不能改其舊甚至以律法相髙益有四聲八病之嫌矣唯陳伯玉痛懲其弊專師漢魏而友景純淵明可謂挺然不羣之士復古之功於是為大開元天寳中杜子美復繼出上薄風雅下該沈宋才奪蘓李氣呑曹劉掩顔謝之孤高雜徐庾之流麗真所謂集大成者而諸作皆廢矣並時而作有李太白宗風騷及建安七子其格極高其變化若神龍之不可覊有王摩詰依倣淵明雖運詞清雅而萎弱少風骨有韋應物祖襲靈運能一寄穠鮮於簡淡之中淵明以來蓋一人而已他如岑參高逹夫劉長卿孟浩然元次山之屬咸以興寄相高取法建安至於大厯之際錢郎逺師沈宋而苖崔盧耿吉李諸家亦皆本伯玉而宗黄初詩道於是為最盛韓柳􅁸於元和之間韓初效建安晚自成家勢若掀雷抉電撐决于天地之垠栁斟酌陶謝之中而措詞俊逸清妍應物而下亦一人而已元白近于輕俗王張過于浮麗要皆同師于古樂府賈浪仙獨變入僻以矯豔于元白劉夢得步驟少陵而氣韻不足杜牧之沉涵靈運而句意尚竒孟東野陰祖沈謝而流于蹇澀盧仝則又自出新意而涉于怪詭至于李長吉温飛卿李商隱段成式専誇靡曼雖人人各有所師而詩之變又極矣比之大厯尚有所不逮况厠之開元哉過此以往若朱慶餘項予遷李文山鄭守愚杜彦之吳子華輩則又駁乎不足議也宋初襲晚唐五季之弊天聖以來晏同叔錢希聖劉子儀楊大年數人亦思有以革之第皆師于義山全乖古雅之風迨王元之以邁世之豪俯就繩尺以樂天為法歐陽永叔痛矯西崑以退之為宗蘇子美梅聖俞介乎其間梅之覃思精微學孟東野蘇之筆力横絶宗杜子美亦頗號為詩道中興至若王禹玉之踵徽之盛公量之祖應物石延年之效牧之王介甫之原三謝雖不絶似皆甞得其髣髴者元祐之間蘇黄挺出雖曰共師李杜而競以已意相髙而諸作又廢矣自此以後詩人迭起或波瀾富而句律疎或煅煉精而情性逺大抵不出於二家觀於蘇門四學士及江西宗派諸詩盖可見矣陳去非雖晚出乃能因崔徳符而歸宿於少陵有不為流俗之所移易馴至隆興乾道之時尤延之之清婉楊廷秀之深刻范至能之宏麗陸務觀之敷腴亦皆有可觀者然終不離天聖元祐之故步去盛唐為益逺下至蕭趙二氏氣局荒頽而音節促廹則其變又極矣由此觀之詩之格力崇卑固若隨世而變遷然謂其皆不相師可乎第所謂相師者或有異焉其上焉者師其意辭固不似而氣象無不同其下焉者師其辭辭則似矣求其精神之所寓固未甞近也然惟深於比興者乃能察知之爾雖然為詩當自名家然後可傳於不朽若體規畫圓凖方作矩終為人之臣僕尚烏得謂之詩哉何者詩乃吟咏性情之具而所謂風雅頌者皆出扵吾之一心特因事感觸而成非智力之所能増損也古之人其初雖有所沿襲末復自成一家言又豈規規然必扵相師者㢤嗚呼此未易為初學道也近來學者類多自髙操觚未能成章輙闊視前古為無物且揚言曰曹劉李杜蘇黄諸作雖佳不必師吾即師師吾心耳故其所作往往猖狂無倫以揚沙走石為豪而不復知有純和冲粹之音可勝嘆哉可勝嘆哉濓非能詩者因足下之言姑畧誦所聞如此唯足下裁擇焉不宣濓白與許門諸友論宗法胡翰僕不佞獲與諸君講以文之好雖不可謂之知言然未嘗不槩于心也比見有以宗法為問者景翰答之甚辨頋僕有不能釋焉者數事夫大宗小宗之法其廢也乆矣記大傳嘗載其説曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也説者謂别子為公子若始來在此國者後世以為祖繼别者謂别子之世嫡也兄弟尊之謂之小宗繼髙祖者亦小宗也又曰有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也説者謂公子為先君之子今君兄弟又曰公子有宗道公子之公為其士大夫之庶者宗其士大夫之嫡者公子之宗道也説者以公子不得宗君君命適昆弟為之宗使之宗之是公子之宗道也至於國之卿大夫有不出於公族者盖未甞及也而士庶人之事則文畧無所見故後世之言宗法者止於卿大夫之有采地者以禮㫁之也然禮固未甞言士庶人無宗也且使大夫或有廢而為士庶人者其宗法亦將隨而廢乎抑否乎使士庶人有升而為卿大夫者則於法宜得立宗矣而族之適子有宗之之道乎抑自為後世之宗乎曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家是所謂宗子者其卿大夫之世適乎其有非卿大夫之世適而士之世適者其兄弟為卿大夫遂以適士為宗子可乎孔子曰宗子為殤而死庶子弗為後也或大宗之世適有絶其後者族人可繼以為後乎抑亦弗為後乎茍不為後則大宗廢矣大宗既廢則族人皆五世則遷之宗也其於疏屬終不能合而為一則所謂尊祖者得無有未盡乎百世不遷之宗其死也族人為之服齊衰三月其母妻之死也亦然五世則遷之宗其死也當服者為之大功九月其母妻之死也何獨無服乎後世宗法不行宋儒往往欲立小宗之法今士庶人之家祭祀有用宗子法者亦合於禮之意乎抑以古卿大夫之事而今士庶人行之得無僣乎朱子之述家禮固欲同志之士熟講而勉行也其於祭祀之禮未嘗不嚴於主人主婦之位則固寓宗子之法矣不然則亦有可處置者乎太宰以九兩係邦國之民曰宗以同族得民其所謂得民者豈止於今記禮者之言乎將猶有可推者乎此皆所未喻也諸君講學之日乆矣茍不鄙而卒見教焉則幸矣答徐大年書趙汸鄭村良遇後毎恨相見之晚簮盍孔艱慨思晤言惟重瞻系當卧疾敝鄉時適有鄭氏便人匆匆不能具書急取黄先生行狀封寄左右凡書所欲言者何以如此不作書非有意也庚子春夏留星源山中友朋自歙至者言嘗見足下所寄書而忘却取來自是凡屬數軰求之至今年春乃始得見三復不能去手莊生曰逃空谷者聞人足音跫然而喜矣况於稽經者禮如面諭者乎幸甚幸甚鄭康成三禘五帝六天緯書之説豈特足下疑之自王肅以來莫不疑之而近代如陳陸葉林諸公其攻擊亦不遺餘力矣竊甞䆒觀諸名家論著於經㫖似猶有未盡者於禮意似猶有弗類者此先生所以不能已於言也雖然去古逺矣豈易言哉汸嘗歎王子雍有高才好著書文與典午氏為婚姻勢望赫然茍非高明博洽真有據依安能議其所短而孫仲然獨取聖證論駁而擇之其所辯證必有可觀陳史既復不作志其書復不傳千載而下無所鏡考可惜哉是以先生行狀中凡諸經疑義皆畧存梗槩良以此也其於厯代聚訟之説雖千百一二而本源制作悉已包涵懼觀者忽而弗思爾今足下乃能反求經傳具示所疑豈非區區所望於同志者乎幸甚幸甚揚子雲曰衆言淆亂折諸聖禮家異同之説其來逺矣茍不反求於經將安所折衷乎謹按周禮述舊聞以答來貺足下其察焉經曰祀天曰祀天神曰祀昊天上帝曰禋祀昊天上帝曰旅上帝曰大旅上帝曰享上帝曰類上帝曰類造上帝曰祀五帝曰禋祀五帝皆因官屬職掌器物司存言之然其間尊卑逺近親疏隆殺異同分合有序有倫聖經簡奥無費辭非後世文字比也蓋典瑞言祀天旅上帝祀地旅四望旅四朢别言既非祀地則旅上帝别言非祀天明矣大宗伯國有大故則旅上帝及四望亦以上帝對四望言而小宗伯兆五帝於四郊四望四類亦如之始以五帝對四望言五帝即上帝明矣旅者會而祭之之名上帝非一帝也猶四望非一方矣大宗伯禮天地四方皆有牲幣各放其器之色而詩曰來方禋祀以其騂黑四方之神即五帝也故曰禋祀而得與天地通稱六器日月星辰四朢不與焉大宗伯以禋祀實柴槱燎祀神之在天者以血祭霾沈疈辜祭神之在地者禋者升煙以祭之名三祀皆積柴實牲體玉帛燎而升煙以報陽也自非天神之尊者不能言禋祀明矣大司樂祀四望祭山川各有樂而五帝樂無文以其皆天神同六變之樂也又豈但與昊天上帝同禋祀同祭服而已哉雖然五帝之非人帝可無疑矣其總言上帝與専言祀天者豈無别乎其祭曰旅曰享曰類曰類造其事曰天子將出曰帥旬曰國有大故以及曰祈穀與大司樂冬日至祀天神於圜丘夏日至祭地示於方澤孔子謂之大郊者其於尊卑逺近親䟽隆殺之節亦辨而詳矣若來書所謂天與帝為一惟兼言分言有異則經中神號祭名禮物徒異同而已矣先王制為一代大典豈為是辭費以來後世之紛紛乎大宗伯禮四方主作六玉言小宗伯兆五帝主建神位言足下謂大小各從其類决五帝為人帝非經㫖也夫五行之神為五帝而大皡之屬配焉亦云帝此孔子問諸老聃而告季康子者也公羊子曰自内出者無匹不行自外至者無主不止此郊之所以尚配也今將迎氣於郊而廢其所配者主其配者大皥以降雖有功徳亦人鬼也人鬼豈能司天時而布五氣者乎陳詳道楊復齋之言曰天有五行四時則有五帝帝者氣之主也果以五人帝為主帝則人帝之前其無司四時者乎朱子文謂凡説上帝者總昊天上帝與五帝言之意與陳氏同諸公雖不主康成至此亦不能異也足下豈弗考乎王制祭天地之牛角繭栗宗廟之牛角握此天神人鬼之别也國語曰郊禘之牛角繭栗謂郊為禘而牲無異文此所謂禘非人鬼之祭矣又曰凡禘郊祖宗報五者國之祀典也加之以社稷山川三辰五行而别不言祭天地則韋昭註禘為圜丘不誣也祭法以禘郊祖宗對舉言之與國語同則四者皆大祭而事體相似可知其四代配食之帝一以先後為次則四大祭者輕重必有差矣王氏謂禘者宗廟之殷祭而郊為圜丘祀天以其序言則先廟而後郊廟言人鬼而郊不及天神以其實言是重祖以配天而輕所自出之帝惟廟享也又謂祖宗乃二廟不遷之名是禘郊以祭言祖宗以廟言也太廟之不遷又非世室比顓頊之於夏契之於商其廟視周文武世室亦可同倫乎二世室一曰祖一曰宗可乎此毋論禮意如何古人制言有序名物以類必不如是之舛駁弗倫也六天之神隂主化育著為星象下應人事北辰中居御極而五帝隨天運轉以㪚精布氣於四時與開闢之初五天之精感為帝王之祖皆非有得於化原有見於古初者信不足以及之然中垣太微昭布森列不可誣也况周人立悶宫以祭姜嫄大司樂享先妣序於先祖之上則南郊祀感生帝何必異乎緯書焚於隋河圖洛書至宋始大顯使無陳邵二公亦妖妄之類耳學者初不見全書往往望風詆排先生嘗為恐尚有如圖書蓍䇿之數在其中可謂惡而知其善者矣孫仲然逺矣安得起陳林諸君子而質之然先生論宗廟之禘與鄭氏三禘亦不茍同行狀中可見其謂成王以殷禮祀周公因詩言白牡以辯明堂位之誣也足下廼取何休氏周公生有王禮之云誣斯甚矣魯郊非禮春秋所書非一端但非成王賜之耳其謂魯禘文王於周廟者因魯有文王廟而辨於周公廟禘文王之僣也嚳無廟主藏於稷廟也魯既有文王廟安可虚而不祭但為藏主之所乎明堂位文夸典不至矣上言配帝于郊配以后稷下言以禘禮祀周公於大廟自車服旌旗以至樂舞廟飭皆天子也而獨不敢言上及文王吾家伯循欲推王禮以説魯禘其論起於唐未而不兼羣廟之説子程子蘓子由陳祥道諸公皆無取焉足下謂之古今通論可乎向來嘗感楊信齋譏鄭康成讀祭法不熟杜佑讀大傳不熟杜氏主康成而兼存王肅未知讀書生熟如何然康成所得有在祭法外者雖信齋未可忽也王肅親注家語而自廢五天帝之説茍無卓然之見讀書雖熟猶不足恃而况不熟者乎學乎後世而傲視古人如此毎為讀儀禮通解君子惜之此先生教人所以貴乎致思也足下如有意斯事則聖經賢傳與諸名家成書厯代史志具在區區廢忘乆矣何足辱下問乎春秋二百四十二年内外之説註脚已具右方六經補註為人借去一時無他本可奉寄當俟後便圖然此書頗難㸔汸遊江湖間嘗出以示人鮮有好者金華黄公與夏先生尤不悦以其多引而不發也其論五經大㫖皆已檃括入行狀頗以平日耳聞綴而輯之庶幾将來君子得以考觀其尚有能成先生之志者乎自遭亂離此事姑置而又以蚤衰乆病雖嘗竊有撰録未能脱槀其尚克廣先生之學使有傳乎雖然所謂學足以明聖人之心志在以六經明晦為已任者先生所望於當世君子學者而未見其人也惟足下勉之則所以大肆其力於遺經者必有上逹日新之功非俗學所敢知矣書辭已繁不復他及又未知何時可逹左右臨楮馳神不宣與宋景濓初夏已熱伏惟講授優暇尊候動止多福前月中承王總制處傳至所與陶伯仁書捧領忻懌汸今春凖擬一訪陶公屢傷風寒腠理不實恐途中又増外證累其本病一向畏怯竟未曽往謹藏襲尊翰以為後期也春秋屬辭鋟梓近畢工敬奉一部求校正前軰文字板行後刋修者多矣幸勿謂已刻之書而吝於指摭也不肖自少即患體羸心弱拙於記且不耐勞説是書毎舉一例必干渉全經全傳而近年以來阨於疾病既倦檢閲尤憚思索是以因循歲月未能脱稾所望於鄉先生以校正之助者有二人汪徳輔妙年以此經發解嘗著胡傳纂䟽出入五十餘家老於春秋者也朱允升素留意經學且嘗同見黄先生得其著書大意亦嘗集諸家説為春秋傳近者汪公學者抄屬辭諸小序去乃畧無所可否比相見索觀盡數葉寘書笑云義例交錯易使人昏蓋平日不作如此討論也朱先生初見舊作集傳序文即云春秋之説定於此矣然辭從主人及日月之法始皆未能信後見屬辭乃手鈔一部㸃抹甚精脱誤處亦時竄定然而所慮者明經之士未必人人脗合如此公則不但無可否而已也是以深有望於先生焉其纂述大意别幅求教印可一言弁子書首雖荷不拒然必詳賜考證視其書果足以讐其意志然後可以著筆或有未是且容證定耳昔止齋作後傳自謂身後之書今汸乃親見刻梓蓋有其説劉道原通鑑外紀成時病眼病瘡不寐不食因思李𢎞基用心過苦積年疾病而藥石不繼盧升之手足攣廢者五悲而沉潁水述其説篇末以自哀今僕寢瘵與昔人同而負債則異何則黄先生壯年合得郡文學輙棄去之一家饑寒不恤而自任以經學復古之功於六經多自得之説而書未及成小子之㓜也父兄亦以科第期之既而自知孱弱如此定非應世之具甫冠則舍時文如九江繼以多病故血氣當剛而反弱摧頽疲茶食少心煩未嘗有一日之歡惟於春秋疑義忽有所悟則胷中暫若豁然而已今者謝天之靈幸成其書而衰瘁益甚萬一㪚逸不傳則是師生兩世虚用苦心徒廢人事方來學者以之為戒無復有堅困窮而盡力於遺經者矣先生其尚鍳之劉公伯温先生不敢别拜書恐煩省賜得一言同賜是正幸甚王庸道還過敝縣知子充有書而山中鮮人出入不曽得候領書却奉字然禀不此殊矣曷勝有罪不宣
