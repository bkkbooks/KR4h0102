body:
  text: 明文衡巻五十九明程敏政撰傳攖寜生傳朱右攖寜生出滑伯後名壽字伯仁世為許襄城大家元初祖父官江南自許徙儀真而壽生焉性警敏習儒書於韓說先生日記千餘言操筆為文辭有思致尤長於樂府京口王居中客醫儀真治方脈術有時名夀數往叩之居中曰醫祖黄帝岐伯其言佚不傳世傳者唯素問難經子其習之乎夀遂受之既終巻乃進請其師曰素問為說備矣篇次無緒不無錯簡愚將分藏象經度脈候病態攝生論治色脈鍼刺隂陽標本運氣彚萃凡十二類鈔而讀之難經又本素問靈樞之㫖設難釋義其間榮衛部位藏府脈法與夫經絡腧穴辨之博矣而闕誤或多愚將本其㫖義注而讀之何如居中曰甚矣子之善學也善哉子學之得其道也予守師説者子識卓理融契悟前訓子過我矣他日以醫名世其子也耶自是壽學日進益叅考張仲景劉守真李明之三家而大同之攄其所得投之所向莫不中肯綮既又傳鍼法於東平髙洞陽得其開闔流注方圓補瀉之道又究夫十二經走㑹屬絡流輸交别之要至若隂陽維蹻衝帶六脈雖皆有繫屬而唯督任二經則苞乎腹背而有専穴諸經滿而溢者此則受之宜與十二經並論乃取内經骨空諸論及靈樞本輸篇所述經脈著十四經發揮三巻疏其本㫖釋其名義通考隧穴六百四十有七而施治功以盡醫之神祕他如讀傷寒論鈔診家樞要痔瘻篇及聚諸書本草為醫韻皆有功後學故其行有治驗所至人争延致以得攖寜生診視一決生死為無憾生無問貧富皆往治報不報弗較也遂知名吴椘間在淮南曰滑壽在吴曰伯仁氏在鄞越曰攖寜生云生年七十餘顔容如童行歩輕㨗飲酒無􅄸人有請雖祁寒暑雨弗憚世多徳之其治法往往竒中人間能言之故記者頗多其徒日采表著者成編以傳其在儀真御史中丞巴沁亦家焉其内人病艱於小溲中滿喘渴中丞公亦頗知醫投以瞿麥梔苓諸滑利藥而閟益甚召夀候其脈三部皆弦而濇夀曰經云膀胱者州都之官津液藏焉氣化則能出矣所謂水出髙源者也膻中之氣不化則水液不行病因於氣徒行水無益也法當治上焦乃製朱雀湯倍以枳桔煎用長流水一飲而溲再飲氣平數服病已端君寳母六十餘亦病小溲閟若淋状小腹脹口吻渇邀夀診其脈沉且澀曰此病在下焦血分隂火盛而水不足法當治血血與水同血有形而氣無形有形之疾當以有形法治之即以東垣家滋腎丸服之而瘉三寶廉使仲子之妻台哈布哈尚書妹也病滯下晝夜五七十起後重下廹且娠九月衆醫率為清暑散滯痛苦尤甚夀至診視曰須下去滯衆以娠不肯夀曰素問有云有故無損亦無損也動即正産乃以消滯導氣丸藥進之得順利再進滯去繼以清暑利溲苦堅之劑病瘉而果孕不動足月乃産童氏婦年三十每經水将来三五日前臍下㽲痛如刀刺状寒熟交作下如黑豆汁既而水行因之無妊招夀診視之兩尺脈沉澀欲絶餘部皆弦急曰此由下焦寒溼邪氣搏於衝任衝為血海任主胞胎為婦人血室故經事将来邪與血争作㽲痛寒氣生濁下如豆汁宜治下焦遂以辛散苦温理血藥為劑令先經期十日服之凡三次而邪去經調是年有孕丘仲山女纔八嵗病傷食煎煿内閟悶口乾唇舌燥黒腹痛不可忍或以剛燥丸藥利之而痛閟益甚壽遂以牽牛大黄清快藥為丸以伏其燥利而瘉天寜寺僧病發譫妄視人皆為鬼壽診其脈纍纍如薏苡子且喘且搏曰此得之陽明胃實素問云陽明主肉其經血氣並盛甚則棄衣升髙踰垣妄罵夀以三化湯三四下復進以火劑乃脱然如故馬萬户妻體肥而氣盛自以無子嘗多服煖宫藥積久火甚迫血上行為衂衂必數升餘面赤脈燥疾神怳怳如癡醫者猶以治上盛下虛丹劑鎮墜之壽曰經云上者下之今血勢俱盛溢而上行法當下導奈何實實耶即與桃仁承氣湯三四下積瘀既去繼服既濟湯二十劑而瘉楊子縣吏陳某當臘月鼻衂至正月凡十三日始定其脈實而數治法與前證同盖馬婦過服剛劑陳過食煎炙飲醇酒皆積熱所致也鄧千户二婢子七八月間同患滯下壽至診視一婢脈鼓急大熱喘悶曰此必死一婢脈洪大而虛軟微熱而小便利曰此可治即下之已而調以苦温苦堅之劑果一死一愈張佛兒暑月患中滿泄㵼小便赤四肢疲困不欲舉自汗微熱口渴且素羸瘠衆醫以虛勞將峻補之邀壽至診視六脈虛微曰此東垣所謂夏月中暑飲食勞倦法宜服清暑益氣湯投三劑而病如失記其在儀真時所治若是什無一二焉至正間趙璉守杭州以同里知壽具邀之與俱過嘉興汪澤民病怔忡善忘口澹舌燥多汗四肢疲軟發熱小便白而濁衆醫以内傷不足擬進茸附趙彦博争之未決因招伯仁至視其脈虛大而數曰是由思慮過度厥陽之火為患耳夫君火以名相火以位相火代君火行事者也相火一擾能為百病况厥陽乎百端之起皆自心生越人云憂愁思慮則傷心汪君平生志大心高所謀不遂抑鬱積乆致内傷也然抱薪救火望安奚能遂命服東垣補中益氣湯朱砂安神丸空心則進小坎離丸月餘彦博抵書云汪之疾瘳矣尹安卿妻妊五月病咳痰氣逆惡寒咽膈不利不嗜食者浹旬招伯仁診視其脈浮弦形體清羸伯仁曰此上受風寒也越人云形寒飲冷則傷肺投以辛温劑與之致津液開腠理散風寒而𠻳自安矣既之錢塘館郡守第時出治病即瘉屬縣有不能治之證皆來就伯仁臨安沈君彰者病自汗如雨不少止面赤身熱口燥心煩輿來杭城舎客樓盛暑中帷幕周密自云至虛亡陽服术附藥已數劑伯仁診其脈虛而洪數視其舌上胎黄曰前藥誤矣輕病重治醫者死之素問云必先歲氣無伐天和术附之熱其可輕用以犯時令耶又云脈虛身熱得之傷暑暑家本多汗加以剛劑脈洪數則汗益甚悉令撤幕開牕初亦難之少頃漸覺清爽為製黄連人參白虎等湯三進而汗止大半諸證亦稍解既而兼以既濟湯渴則用氷水調天水散服七日而病悉去後遍身發瘍疹更服防風通聖散乃已其同縣陳元善病氣發則臍下築築漸上至心下嘔涌痛懣手足冷喉中淫淫而痒眉本疼痠目不欲視頭不欲舉神昏昏欲睡而不寐惡食氣睪九控引小便數而欠年未三十尫瘠若衰耄人劣劣不自持伯仁視其脈沉弦而澀曰是得之憂鬱憤怒寒溼風雨乘之為肝疝也屬在厥陰故當脈所過處皆病焉厥陰肝也張從正云諸疝皆屬肝素問云肝欲散亟以辛散之遂取吳茱萸佐以姜桂及治氣引經藥兼製回練等丸每十日一温利之三月而病瘉俞彦良亦臨安人病嘔血或滿桮或盈盆盎且二三年其人平昔嗜市利不憚作勞中氣因之侵損伯仁視之且先與八寶散一二日服黄芩芍藥湯少有動作即急進犀角地黄湯加桃仁大黄稍間服抑氣寧神散有痰用礞石丸其始脈芤大後脈漸平三日而瘉彦良遂以此法治他人皆驗宋可與妾暑月身冷自汗口乾煩燥欲臥泥水中伯仁診其脈浮而數沉之豁然虛散曰素問云脈至而從按之不鼓諸陽皆然此為陰盛隔陽得之飲食生冷坐臥風露煎真武湯冷飲之一進汗止再進煩燥去三進平復如初杭妓有患心疾狂歌痛哭裸裎妄罵問之則瞪視黙黙其父母固邀伯仁診視脈沉堅而結曰得之憂憤沉鬱食與痰交積胸中涌之皆積痰裹血復與火劑清上膈數日如故既而左丞楊諤勒哲統苖兵守江浙民頗不安居會故舊陳性中王叔雨招乃挈家渡浙江往來鄞越居虞姚間最乆人皆稱之曰攖寧生初叔雨寓錢塘病傷寒他醫至皆以為痓證當進附子持論未決其弟熈𤾉謁攖寧生曰舎兄病亟唯幾生忍坐視不救乎至切其脈兩手俱沉實而滑四末覺微清以燈燭之徧體皆赤斑舌上胎黒而燥如芒刺身大熱神恍惚多譫妄語攖寧生曰此始以表不得解邪氣入裏裏熱極甚若投附必死乃以小柴胡劑益以知母石膏飲之終夕二進次日以大承氣湯下之調治兼旬乃安比來上虞熈𤾉館於魏氏一日乘盛暑肩輿入邑途中吐血數口亟還則吐甚胸鉅痛體熱頭眩病且殆或以為勞心焦思所致與茯苓補心湯生至診其脈洪而滑曰是大醉飽胃血壅遏為暑迫上行先與犀角地黄湯繼以桃仁承氣湯去瘀血宿積後治暑即安陸用和病惡寒發熱頭體微痛苦嘔下泄五日矣其親亦知醫以小柴胡湯治之不解招攖寧生診視脈弦而遲曰是在陰當温之為製真武湯其親争之强與人參竹葉湯進即泄甚脈且陷弱始亟以前劑服之連進四五劑乃效人始服攖寧生之賢於人逺矣余子元病惡寒戰慄持捉不定兩手背冷汗浸淫雖厚衣熾火不能解攖寧生即與真武湯凡用附六枚一日病者忽出人怪之病者曰吾不惡寒即無事矣或以問攖寧生生曰其脈兩手皆沉微餘無表裏症此盖其體虛受寒亡陽之極也初皮表氣隧為寒邪壅遏陽不得伸而然也是故血隧熱壅須用硝黄氣隧寒壅須用桂附陰陽之用不同者無形有形之異也魏士圭妻徐病寒為疝自臍下上至心皆脹滿攻痛而脇痛尤甚嘔吐煩懣不進飲食攖寧生視之脈兩手沉結不調曰此由寒在下焦宜亟攻其下無攻其上為灸章門氣海中脘服𤣥胡桂椒佐以蘹木諸香茯苓青皮等十日一服温利丸藥聚而散之也士圭守其法治之果效王宗祥之父年老病臍腹㽲痛其里醫為温中散寒率無驗宗祥固邀攖寧生往視脈兩尺搏堅而沉曰此大寒由外入也寒喜中下因為疝治宜在下加沉降之劑引入下焦數服尋瘉陳伯英病肺氣焦滿攖寧生視之曰病得之多欲善飲且殫營慮中積痰涎外受風邪發即喘渴痰咳不能自安為製清肺泄滿降火潤燥苦辛等劑服之既安衆詰之曰是出何方書名何散飲生應之曰是為混沌湯聞者皆大笑曰混沌湯有用也潘子庸得感冒症已汗而愈數日復大發熱惡寒頭痛眩暈嘔吐卻食煩滿咳而多汗攖寧生診之脈兩手三部皆浮而𦂳曰在仲景法勞復證浮以汗解沉以下解今脈浮𦂳且證在表當汗衆以虛憊難之且圖温補生曰法當如是為作麻黄葛根湯三進更汗旋調數日乃瘉時淮南丞相方公分省四明聞攖寧生名禮致見之館穀畱城中一日公壻戴穎仲以使事往奉化雪中且進冷食病内外傷惡寒頭痛腹心痛而嘔診之脈沉且𦂳時伏而不見曰在法下利清穀當急救裏清便自調當急救表今所患内傷冷飲食外受寒沴清便自調救表裏急以桂枝湯力微遂為變法與四逆湯服之晬時服附子一兩明日則脈在肌肉唯𦂳自若外症已去内傷獨存乃以丸藥下去宿食後調中氣數日即安方惟益患消渴衆醫以為腎虛水竭陽不能上升合附子大丸服之既服渴甚舊有目疾兼作其人素豐肥因是頓痩損倉皇中召攖寧生視之生曰陰陽之道相為損益水不足則濟以水火不足則濟以火未聞水不足而以火濟之不焦則枯乃令屏去前藥更寒劑下之蕩去火毒繼以苦寒清潤之製竟月乃平復適方明禮寵姬新産受寒四肢逆冷脈沉弱亟令取向所製附子大丸三四粒餌之立效生曰不得於彼而得於此盖用有不同耳丘彦材平居苦胷中痞滿憒憒若怔忡狀頭目昏痛欲吐不吐忽忽善忘時一臂偏痺召攖寧生視之當關以上脈溜而滑按之沉而有力攖寧生曰積飲滯痰横於胷膈盖得之厚味醇酒肥膩煎炙蓄熱而生溼溼聚而痰涎宿飲皆上甚也王氷云上甚不已吐而奪之法當吐俟春日開明如法治之以物撩咽中須㬰大吐異色頑痰如膠飴者三四升一二日更吐之三四次則胸中洞爽平復矣龍君澤分院餘姚其室張暑月中病經事沉滯身寒熱自汗咳𠻳有痰體痩悴腹臍刺痛招攖寧生至診視脈弦數六至有餘生曰此二陽病也素問云二陽之病發心脾女子得之則不月二陽陽明也陽明為金為燥化今其所以不月者因其所遭也陽明本為燥金適遭於暑暑火也以火鑠金則愈燥矣血者水類金為化源宜月事沉滯不來也他醫方為製歸茸桂附丸以温經而未進生曰夫血得寒則止得温則行得熱則搏搏則燥復加燥劑血益乾則病必甚亟令却之更以當歸柴胡飲子為之清陽㵼火流溼潤燥三五進而經事通餘病皆除龍君曰微生幾為人所誤矣宋無逸餘姚大儒也病瘧瘠損饘粥難下咽六十餘日殆甚攖寧生聞而往視之脈數兩關上尤弦疾乆體瘠而神則完生曰是積熱居脾且滯於食飲法當下衆疑而難之藥再進而疾去其半復製甘露飲柴胡白虎等劑浹旬而起如故後四嵗無逸客昌國病頭面腫赤妨於飲食或進以薑附攖寧生為製劑清上散火而瘉無逸曰嚮得清涼藥以濟危急否則誤於剛劑矣徳之不忘嘗以語人云夏思忠病胸膈脹痛心怔忡嘔逆煩懣不食情思惘惘不暫安目􅍃􅍃無所睹攖寧生視之六脈皆結澀不調無復參伍甚怪之既徐而察之其人機深憂思太過加之脾胃内傷積為痰涎鬱於上膈然也素問云思則氣結又云陰氣者静則神藏躁則消亡飲食自倍腸胃乃傷其是之謂乎為製祛順丸服之旋復平和思忠曰吾疾諸治罔效始以為天下無藥兹服生祛順丸乃知天下有藥矣金丙病韓自行邀攖寧生往視之脈數而散體寒熱咳血痰生曰此二陽病也在法不治當以夏月死至立夏果死自行愀然曰攖寧生能知死必能知人生矣乎方徳明七月内病發熱盛令其服小柴胡湯必二十六劑乃瘉如其言服之未盡二劑則升發太過多汗亡陽惡寒甚肉瞤筋惕乃固請攖寧生視脈微欲無即以真武湯進七八服稍有緒更服附子七八枚然後瘉夏子韶妻始病瘧當六七月他醫以為脾寒胃弱乆服桂附後瘧雖退而積火燔熾致消穀善饑日數十飯猶不足終日端坐如常人第目昏不能視足弱不能履腰胯困軟肌肉虛肥至初冬子韶謁攖寧生往候脈洪大而虛濡曰此痿症也長夏過服熱藥所致盖夏令溼當權剛劑太過火溼俱甚肺熱葉焦故兩足痿易而不為用也東垣有長夏溼熱成痿之法當以此治之食日益減目漸能視至冬末忽自起下榻行步如故其姪夏仲儒因拘畱赴海積恐怖心常惕惕如畏人捕之狀攖寧生視之脈豁豁然虛大而浮體熱多汗曰此病得之從高墜下驚仆擊搏畱滯惡血皆從中風論終歸厥陰此海藏之説也盖厥陰多血其化風木然也有形當從血論無形當從風論今仲儒之疾是走無形也從風家治之兼為化痰散結佐以鐵粉朱砂丸良瘉鄭高卿母倪病瘧寒熱嘔涌中滿而痛下痢不食年五十餘殊困頓他醫為清脾氣理中腕不效邀攖寧生視脈沉而遲生曰是積暑與食伏痰在中當下之或曰人疲倦若是且下痢不食烏可下方擬進參附生曰脈雖沉遲按之有力雖痢而後重下迫不下則積不能去病必不已其母弟倪仲權獨是之乃以消滯丸藥微得通利即少快明日復加數服之宿積腸垢盡去向午即思食旋以薑橘參苓淡滲和平飲子調之旬餘乃復王敬仲母病反胃每隔夜食飲至明日中昃皆出不消化他醫以暖胃之藥悉試之罔效敬中詣攖寧生言且固請往視脈在肌肉之下甚微而弱生揆衆醫用藥無逺於病何至不效心歉然未決一日讀東垣書謂吐有三證氣積寒也上焦吐者從於氣中焦從於積下焦從於寒其脈沉而遲朝食莫吐莫食朝吐小溲利大便秘為下焦吐也法當通其秘温其寒氣復以中焦藥和之生得此説而喜起嘆曰其合於王母之證歟但王母大便不秘遂再往視專治下焦散寒以茱萸茴香為君丁桂半夏為佐服至二三十劑而飲食晏然生曰經不云乎寒淫所勝平以辛熱其是之謂歟俞徳明嘗病傷寒經汗下病既去而人虛背獨惡寒脈微細如線湯熨不應攖寧生乃以理申湯劑加姜桂藿附大作服外以蓽撥良薑吳榝桂椒諸品大辛熱為末和薑糊為膏厚傳滿背以紙覆之稍乾即易如是半月竟平復不寒矣此尤治法之變者也顧機仲病傷寒後勞復發熱自汗經七日或以為病後勞將復補之攖寧生曰不然勞復為病脈浮以汗解奚補為以小柴胡湯三進再汗而瘉胡茂林子婦魏仲彬妹也新産二日惡路不行臍腹痛頭疼身寒熱當隆冬時衆醫皆以為感寒温以大附益大熱手足搐搦語譫目攛仲彬固邀生往診脈弦而洪數面赤目閉語喃喃不可辨舌黒如􅀈燥無津潤胸腹按之不勝手葢燥劑搏其血内熱而風生血蓄而為痛也生曰此産後熱入血室因而生風即先為清熱降火治風凉血兩服頗爽繼以琥珀牛黄等稍解人事後以張從正三和散行血破瘀三四服惡露大下如初時産已十日矣於是諸證悉平方明禮内人盛暑病洞泄厥逆惡寒胃腕當心而痛自腹引脇轉為滯下嘔噦不食人以中暑霍亂療之益劇攖寧生診其脈三部俱㣲短沉弱不應呼吸曰此陰寒極矣不亟温之則無生理内經雖曰用熱逺熱又曰有假其氣則無禁也於是以薑附温劑三四進間以丹藥脈稍有力厥逆漸退更服薑附七日衆證悉去遂以丸藥除其滯下而臟腑自安矣生之活人率類此然頗有不盡述者生嘗語其徒曰予在儀真時聞友人王徳全言江西有醫士曰黄子厚為術精詣其治往往出人意表有富家子年十七八病徧體肌肉拆裂召子厚治子厚偕門生四五輩往診視各以所見陳論皆未當子厚乃屏人詰病者曰童㓜時曽近女色犯天真乎曰當十三四曽近之已子厚曰得其說矣禇澄云精未通而御女則四體有不滿之處後日有難狀之疾在法為不可療後果惡汁淋漉痛楚而死又鄰郡一富翁病泄㵼彌年禮致子厚診療浹旬莫效子厚曰予未得其説求歸一日讀易至乾卦天行健朱子有曰天之氣運轉不息故閣得地在中間如人㺯椀珠只運動不住故在空中不墜少有息則墜矣因悟向者富翁之病乃氣不能舉為下脱也又作字持水滴吸水初以大指按滴上竅則水滿筒放其按則水下流無餘乃豁然悟曰吾可治翁證矣即治裝往翁家驚喜至即為治艾灸百㑹穴未及四十創泄㵼良巳因教以前灸即愈子厚在至治天厯間術甚行虞文靖公嘗有贈醫士黄子厚詩云史右曰予幼喜業醫遇醫士輒近之覩其治往往誤藥死若以試其術然予懼陰殺人而莫之罪必不逭於天刑遂棄不復習襄城攖寧生壽能活人反掌間而竒驗若此時人為之語曰世以人試術生以術活人其相去奚啻千萬予聞盧扁曰聞病之陽論得其陰聞病之陰論得其陽倉意曰吾以脈法治之而瘉生其有得於二子者歟唐珏傳張孟兼唐珏字玉潛會稽人也少孤能力學以明經教授鄉里子弟而養其母至元戊寅西僧嘉木揚喇勒智利宋􅓖宫金玉故為妖言惑主聴發之珏獨懷痛忿乃貨家具行資得白金若干為酒食陰召諸惡少享於家衆皆驚駭前請曰平日且不敢見今召我飲食過禮不審欲何為雖死不避珏因泣數行下謂之曰爾輩皆宋人吾不忍陵寢之暴露已造石函六刻紀年一字為號自思陵以下欲随號收殯之衆皆諾中一人曰此固義事也然今無有知者恐萬一事露禍不測不得終志奈何珏曰吾已籌之矣要當易以他骨焉衆如珏言夜往收貯遺骸瘞蘭亭山後上種冬青樹為識約明日復來會岀金帛為人人壽戒勿泄也僧又易宋内為諸浮圖乃裒陵骨襍馬牛枯骼築白塔號曰鎮南以為陵骨良已鎮而不知真之他存也亡何汴人袁俊為越治中招珏為子師間問曰吾聞越有唐姓葬宋諸陵骨豈君耶坐有指珏者俊大竒之手加額曰先生義士哉豫讓不及也竊聞高義之日乆矣不意得與先生處因詢珏以故甚貧俊亟為買田宅居之先是珏臥病一夕夢吏持文來召曰帝召君速之行至見宫闕邃麗一人冕旒中坐旁一人延上殿又數黄衣進揖珏曰賴收遺骸無以報俄曰第報良田二頃有妻孥以養乃復揖及闕翻然而覺亦莫省謂何已而會俊料理事如夢中始悟夢中見也有謝翺者文丞相客也與珏友善嘗感珏事為作冬青樹引語甚悽苦時讀者莫不灑泣翺字臯羽閩人亦竒士傳者曰余讀晉世家知趙氏有後矣非程嬰公孫杵臼而莫存其孤今十七廟不食而暴骸之難獨珏能瘞之甚義乎哉嗚呼珏一布衣爾盖其義視程公孫何媿哉千載而下有國士之風者非珏誰歟吾所以傳之毋亦使其無傳焉鄭烈婦傳宋濓烈婦姓石氏金華人諱勝字文素敏慧而勤柔順而婉嫁為浦江義門鄭洪妻鄭氏以禮法齊家石氏奉尊能敬事夫盡禮處衆以和上下咸悦而安之洪性聰敏受業太史宋公通尚書要旨識見明達臨事機變國朝開基建業今曹國李公分鎮嚴陵辟洪參謀軍事陳善效忠甚見禮重乆之用薦者入朝為引禮郎轉江西行省照磨有能聲秩滿改内藏庫提㸃未幾同官有坐法者以辭累洪竟死於獄石氏從處官寓悲號痛哭若不欲生吏議當配石氏仰天慟曰生為鄭氏婦死則為其鬼耳吾夫已亡豈使汙其身以玷旌門乎遂絶粒不食鄰媪强以糜粥不聴如是者八日求其死而弗得引繩自絶公卿朝士聞者皆稱為烈婦事聞皇上嘉歎曰此真義門婦矣濓承乏國史既登載其事復著為家傳而歸之鄭氏云史官曰余居金華熟聞鄭氏孝義之著禮法之盛今觀石氏操行皎如白日可謂難能者矣雖其染濡家訓亦天性然也稱為烈婦不亦宜哉使其守志不堅茍幸以偷生其於旌門寧不有玷乎今䝉玉音之嘉美公卿之稱譽則其門益有光矣庸表而出之以勵風俗云豐本傳唐肅豐本盖古仙人也一號乆眎先生相傳伊耆氏之世磵居學道得不死術後出仕於周其為醢人屬與昌氏菁氏茆氏共掌俎豆凡祭祀燕饗王及后世子之内羞咸取給焉故周公天官書列其職戴氏禮記載其名豳七月詩亦歌其仲春薦廟事周亡不知所之或云隠畦町間與農圃者伍人多怪之或執而髠其首或戕其支體尋復生完衆始知先生為仙人也漢時與處士郭林宗友林宗館於家客至輒命與同食晉衞尉石崇豪侈擅一世知先生賢咄嗟召之先生亦不拒往就然䇿崇必敗曰不去將累我我固不憂為彼累也遂逸去南齊侍中庾杲之家貧好清士每延先生共飯人皆曰庾郎得豐本為不貧矣唐隠者衛賔與拾遺杜甫善甫嘗過賔宿先生亦冒雨至相與酣飲甚適甫有詩美之載甫集中先生貌蒼古緑髪白趾常被翠羽衣所棲止人望之恒有氣鬱葱然即之咀嚼其言論有至味令人灑然忘俗壽莫知其幾也今游會稽巖壑中時時過山人韓氏亭上吟翁鍊士多見之者云野史氏曰列仙傳不載豐本失矣其所載亦未有壽如豐本至今尚存者莊生言古之大椿以八千嵗為一春物且壽若是矧仙乎豐本仕於周間出於漢晉齊唐所與皆有徳者獨齊奴否耳然左慈見曹孟徳頗類盖和光同塵玩世不羈仙之常也今在越不之他獨之韓氏韓亦郭庾杜衞之流歟明文衡巻五十九
