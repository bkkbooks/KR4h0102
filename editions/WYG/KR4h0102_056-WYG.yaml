body:
  text: 明文衡巻五十六明程敏政編雜著文章辨體序題呉訥古歌謡辭按西山輯文章正宗凡古文辭之載于經聖人所嘗刪述者不敢錄獨采書傳所載康衢擊壤歌之類列于古詩之前且曰出于經者可信傳記所載者未必當時所作其好古傳疑之意至矣今謹遵其意仍以康衢童謠為首終于茍卿成相彚寘卷端以俟考質古賦按賦者古詩之流漢藝文志曰古者諸侯卿大夫交接隣國必稱詩以喻意春秋之後聘問歌咏不行於列國而賢士失志之賦作矣大儒荀卿及楚臣屈原離讒憂國皆作賦以風其後宋玉唐勒枚乗司馬相如揚子雲競為侈麗閎衍之辭而風諭之義没矣近世祝氏著古賦辨體因本漢志之言而斷之曰屈子離騷即古賦也古詩之義若荀卿成相是也然其所載則以離騷為首而荀詩勿錄尚論世次屈在荀後而成相亦非賦體故今特取成相附古歌謡後而仍載楚辭于古賦之首蓋欲學賦者必以是為先也宋景文公有云離騷為辭賦祖後人為之如至方不能加矩至圓不能過規信哉古樂府易曰先王作樂崇徳殷薦之上帝以配祖考成周盛時大司樂以黄帝堯舜夏商六代之樂報祀天地百神若宗廟之祭神既下降則奏九徳之歌九韶之舞蓋以六代之樂皆聖人之徒所制故悉存之而不廢也迨秦焚滅典籍禮樂崩壤漢興高帝自制三侯之章而房中之樂則令唐山夫人造為歌辭史記云高祖過沛詩三侯之章令小兒歌之高祖崩令沛得以四時歌舞宗廟孝惠文景無所增更於樂府習常肄舊而巳至班固漢書則曰漢興樂家有制氏但能紀其鏗鏘而不能言其義高祖時叔孫通制宗廟樂迎神奏嘉至入廟奏永至乾豆上奏登歌再終下奏休成天子就酒東廂坐定奏安世然徒有其名而亡其辭所載不過武帝郊祀十九章而已後儒遂以樂府之名起於武帝殊不知孝惠二年已命夏侯寛為樂府令豈武帝始為新聲不用舊辭也迨東漢明帝遂分樂為四品一曰大予樂郊廟上陵用之二曰雅頌樂辟雍享射用之三曰黄門鼓吹樂天子宴羣臣用之四曰短簫鐃歌樂軍中用之其説雖載方冊而其制亦復不傳魏晉已降世變日下所作樂歌率皆夸靡虚誕無復先王之意下至陳隋則淫哇鄙褻舉無足觀矣自時厥後唯唐宋享國最久故其辭亦多純雅南渡後夾漈鄭氏著通志樂畧以為古之達禮有三一曰燕二曰享三曰祀所謂吉凶軍賓嘉皆主此三者仲尼所刪之詩凡宴享祀之時用以歌之漢樂府之作以繼三代因列鐃歌與三侯以下于篇亦無其辭後太原郭茂倩輯樂府百巻繇漢迄五代蒐輯無遺金華吳立夫謂其紛亂哤雜厭人視聴雖浮淫鄙倍不敢芟夷何哉近豫章左克明復編古樂府十巻斷自陳隋而止中若後魏楊白花等淫鄙之辭亦復收載是亦未得盡善也今考五禮以郊廟歌辭為先愷樂燕饗歌辭次之蓋以其切於世用足為制作家之助至若古今琴操與夫相和等曲亦附于後以俟好古君子之所考訂焉其或有題無辭或辭雖存而為莊人雅士之所厭聞者兹亦不錄古詩詩大序曰詩者志之所之也詩有六義曰風曰雅曰頌曰賦曰比曰興三百篇尚矣以漢魏言之蘇李曹劉實為之首晉宋以下世道日變而詩道亦從而變矣晦庵朱子嘗答鞏仲至有曰古今詩凡三變自漢魏以上為一等自晉宋間顏謝以後下及唐初為一等自沈宋以後定著律詩下及今日又為一等然自唐初以前為詩者固有高下而法猶未變至律詩出而後詩之與法始皆大變無復古人之風矣嘗欲抄取經史韻語下及文選漢魏古辭以盡郭景純陶淵明之作自為一編而附三百篇楚辭之後以為詩之根本凖則又於其下二等之中擇其近於古者各為一編以為羽翼輿衛其不合者則悉去之不使接於耳目入於胷次要使方寸之中無一字世俗言語意思則其為詩不期於高逺而自高逺矣厥後西山編文章正宗劉氏輯風雅翼悉本朱子之意而去取詳畧則有不同者焉是編所收率以二家為主近代之有合作者亦取載焉歌行之作别錄于後蓋歌行放情長言其句語格調與古詩亦有不同者矣律詩雜體具載外集嗚呼學詩之法子朱子之言至矣盡矣有志者勉夫歌行昔人論歌辭有有聲有辭者若郊廟樂章及鐃歌等曲是也有有辭無聲者若後人之所述作未必盡被於金石也夫自周衰採詩之官廢漢魏之世歌詠雜興故本其命篇之義曰篇因其立辭之意曰辭體如行書曰行述事本末曰引悲如蛩螿曰吟委曲盡情曰曲放情長言曰歌言通俚俗曰謡感而發言曰歎憤而不怒曰怨雖其立名不同然皆六義之餘也唐世詩人共推李杜太白則多模擬古題少陵則即事名篇無復倚傍厥後元微之以後人沿襲古題倡和重複深以少陵為是故今是編凡擬古者皆附樂府本題之内若即事為題無所模擬者則自漢魏以降迄于近代取其辭義之弗過於淫傷者錄載云諭告按西山云周官大祝作六辭以通上下親疎逺近曰辭曰命曰誥曰㑹曰禱曰誄皆王言也大祝以下掌為之辭則所謂代言者也以書考之若湯誥甘誓微子之命之類是也此皆聖人筆之為經不當與後世文辭同錄今獨取春秋内外傳所載周天子諭告諸侯之辭及列國應對之語附焉又按東萊有曰文章從容委曲而意獨至惟左氏所載當時君臣之言為然蓋繇聖人餘澤未逺涵養自别故其辭氣不迫如此非後世專學語言者所可得而比焉璽書按應劭曰璽信也古者尊卑共之左傳魯襄公在楚季武子使公冶問璽書至秦漢臣下始避其稱漢初有三璽天子書用璽以封故曰璽書文帝元年嘗賜南越趙佗璽書佗愧感頓首稱臣納貢至今讀史者未嘗不三復書辭以欽仰帝徳於無窮也夫制詔璽書皆曰王言然書之文尤覺陳義委曲命辭懇到者蓋書中能盡褒勸警飭之意也故今特取前代璽書載于詔令之前讀者其必有以得之批答按玉海唐學士初入院試制詔批答共三篇蓋批答與詔異詔則宣達上意批答則采臣下章疏之意而答之也文鑑輯批答詔敕各為一類可見矣唐史載太宗之答劉洎謂出自手筆今觀辭意誠然至若宋昭陵之答富弼等則皆詞臣之撰進者也讀者其尚考諸詔按三代王言見於書者有三曰誥曰誓曰命至秦改之曰詔厯代因之然唯兩漢詔辭深厚爾雅尚為近古至偶儷之作興而去古逺矣東萊云近代詔書或用散文或用四六散文以深純温厚為本四六須下語渾全不可尚新竒華巧而失大體是編今以漢詔居前附以唐宋諸詔庸備二體西山有云王言之體當以書之誥誓命為祖而參以兩漢詔冊信哉冊按漢書天子所下之書有四一曰䇿書注曰䇿者編簡也其制長二尺短者半之篆書起維年月日以命諸侯王公若三公以罪免亦賜䇿則用一尺木而𨽻書之又按唐百官志曰王言有七一曰冊書立皇后皇太子封諸王則用之説文云冊者符命也諸侯進受於王象其札一長一短中有二編之形當作冊古文作笧蓋冊䇿二字通用至唐宋後不用竹簡以金玉為冊故專謂之冊也若其文辭體制則相祖述云制誥按周官大祝六辭二曰命三曰誥考之於書命者以之命官若畢命冏命是也誥則以之播誥四方若大誥洛誥是也漢承秦制有曰䇿書以封拜諸侯王公有曰制書用載制度之文若其命官則各賜印綬而無命書也迨乎唐世王言之體曰制者大賞罰大除授用之曰發敕者授六品以下官用之即所謂告身也宋承唐制其曰制者以拜三公三省等職辭必四六以便宣讀于廷誥則或用散文以其直告某官也西山云制誥皆王言貴乎典雅温潤用字不可深僻造語不可尖新文武宗室各得其宜斯為善矣制䇿按説文䇿者謀也凡錄政化得失顯而問之謂之對䇿考之於史實始漢之晁錯錯遇文帝恭謙好問之主不能明目張膽以答所問惜哉唯董仲舒學識醇正又遇孝武初政清明䇿之再三故克罄竭所藴帝因是罷黜百家專崇孔氏以表章六經厥功茂焉迨宋蘇軾之答仁宗制䇿亦克輸忠陳義婉切懇到君子有取焉表按韻書表明也標著事緒使之明白以告乎上也三代以前謂之敷奏秦改為表漢因之竊嘗攷之漢晉皆尚散文蓋用陳達情事若孔明前後出師李令伯陳情之類是也唐宋以後多尚四六其用則有慶賀有辭免有陳謝有進書有貢物所用既殊則其辭亦各異焉西山云表中眼目全在破題要見盡題意又忌太露貼題目處須字字精確且如進實錄不可移於日錄若汎濫不切可以移用便不為工矣大抵表文以簡潔精緻為先用事忌深僻造語忌纎巧鋪敘忌繁冗是編所錄一以時代為先後讀者詳之則體製亦有以得之露布按通典云元魏攻戰克㨗欲天下聞知乃書帛建於漆竿上名為露布此其始也攷諸文章緣起則曰漢賈洪為馬超伐曹操作露布及世説又載桓温北征令袁宏倚馬撰露布是則魏晉以來有之矣文心雕龍又云露布者蓋露板不封布諸視聴近世帥臣奏㨗蓋本於此然今考之魏晉之文俱無傳本唐宋雖有傳者然其命辭全用四六蓋與當時表文無異今故錄附表後以備一體西山云露布貴奮發雄壯少粗無害觀者詳之論諫古者諫無專官自公卿大夫以至百工技藝皆得進諫隆古盛時君臣同徳其都俞吁咈見於語言問答之際者考之書可見西山以為聖賢大訓不當與後之文辭同錄今謹取其所載春秋内外傳諫爭論説之言著之于首其兩漢以下諸臣進説有可以為法戒者間亦采之以附于後奏疏按唐虞禹皋陳謨之後至商伊尹周姬公遂有伊訓無逸等篇此文辭告君之始也漢高惠時未聞有以書陳事者迨乎孝文開廣言路於是賈山獻至言賈誼上政事疏自時厥後進言者日衆或曰上疏或曰上書或曰奏劄或曰奏狀慮有宣泄則囊封以進謂曰封事考之史可見昔人云君臣相遇雖一語有餘上下未孚雖千萬言奚補為臣子者惟當罄其忠愛之誠而已議周書曰議事以制政乃不迷眉山蘇氏釋之曰先王人法竝任而任人為多故臨事而議是則國之大事合衆議而定之者尚矣今采漢唐宋諸臣所上議狀次于奏疏以備一體若儒先私議其有闗於政理者問亦取之而附於中云彈文按漢書注云羣臣上奏若罪法按劾公府送御史臺卿校送謁者臺是則按劾之名其來久矣梁昭明輯文選特立其名曰彈事若文粹文鑑則載奏疏之中而巳迨後王尚書應麟有曰奏以明允誠篤為本若彈文則必理有典憲辭有風軌使氣流墨中聲動簡外斯稱絶席之雄也是則奏疏彈文其辭氣亦異焉檄按釋文檄軍書也春秋時祭公謀父稱文告之辭即檄之本始至戰國張儀為檄告楚相其名始著劉勰云凡檄之大體或述此休明或敘彼苛虐指天時審人事筭强弱角權勢故植義颺辭務在剛健挿羽以示迅不可使辭緩露板以宣衆不可使義隠大抵唐以前不用四六故辭直義顯昔人謂檄以散文為得體信乎箴按許氏説文箴誡也商書盤庚曰無或敢伏小人之攸箴蓋箴者規誡之辭若箴之療疾故以為名古有夏商二箴見于尚書大傳解呂氏春秋而殘缺不全獨周太史辛甲命百官官箴王闕而虞氏掌獵為虞箴其辭備載左傳後之作者蓋本於此東萊云凡作箴須用官箴王闕之意箴末須依虞箴獸臣司原敢告僕夫之類大抵箴銘賛頌雖或均用韻語而體不同箴是規諷之文須有警誡切劘之意銘按銘者名也名其器物以自警也漢藝文志稱道家有皇帝銘六篇然亡其辭獨大學所載成湯盤銘九字發明日新之義甚切迨周武王則凡几席觴豆之屬無不勒銘致警厥後又有稱述先人之徳善勞烈為銘者如春秋時孔悝鼎銘是也又有以山川宫室門闗為銘者漢班孟堅之燕然山則旌征伐之功晉張孟陽之劔閣則戒殊俗之僭叛其取義各不同也傳曰作器能銘可以為大夫陸士衡云銘貴愽約而温潤斯得之矣頌詩大序曰詩有六義六曰頌頌者美盛徳之形容以告神明者也嘗考莊子天運篇稱黄帝張咸池之樂猋氏為頌斯蓋寓言爾故頌之名實出於詩若商之那周之清廟諸什皆以告神為頌體之至至如魯頌之駉駜等篇則當時用以祝頌僖公為頌之變故胡氏有曰後世文人獻頌特效魯頌而已文心雕龍云頌須鋪張揚厲而以典雅豐縟為貴敷寫似賦而不入華侈之區敬慎如銘而異乎規諌之域諒哉賛按賛者賛美之辭文章緣起曰漢司馬相如作荆軻賛世巳不傳厥後班孟堅漢史以論為賛至范蔚宗更以韻語唐建中中試進士以箴論表賛代詩賦而無頌題迨後復置愽學宏詞科則賛頌二題皆出矣西山云賛頌體式相似貴乎贍麗宏肆而有雍容俯仰頓挫起伏之態乃為佳作大抵賛有二體若作散文當祖班氏史評若作韻語當宗東方朔畫像賛金樓子有云班固願學尚云賛頌相似信然七體昭明輯文選其文體有曰七者蓋載枚乗七發繼以曹子建七啓張景陽七命而巳容齋隨筆云枚生七發創意造端麗㫖腴辭固為可喜後之繼者如傅毅七激張衡七辯崔駰七依馬融七廣曹植七啓王粲七釋張協七命陸機七徴之類規倣太切了無新意及唐栁子厚作晉問雖用其體而超然别立機杼漢晉之間沿襲之弊一洗矣竊嘗考對偶句語六經所不廢七體雖專尚駢儷然辭意變化與全篇四六不同自栁子後作者未聞迨元袁伯長之七觀洪武宋王二老之志釋文訓其富麗固無讓于前人至其論議又豈七發之可比問對問對體者載昔人一時問答之辭或設客難以著其意者也文選所錄宋玉之於楚王相如之於蜀父老是所謂問對之辭至若答客難解嘲賔戲等作則皆設辭以自慰者焉洪氏景盧云東方朔答客難自是文中傑出揚雄擬為解嘲尚有馳騁自得之妙至於班固之賔戲張衡之應問則屋下架屋章摹句寫讀之令人可厭迨韓退之進學解出則所謂青出於藍而青於藍矣書按昔臣僚敷奏朋舊徃復皆總曰書近世臣僚上言名為表奏惟朋舊之間則曰書而已蓋論議知識人豈能同茍不具之於書則安得盡其委曲之意哉戰國兩漢間若樂生若司馬子長若劉歆諸書敷陳明白辯難懇到誠可以為脩辭之助至若唐之韓栁宋之程朱張呂凡其所與知舊門人答問之言率多本乎進脩之實讀者誠能熟復以反之於身則其所得又豈止乎文辭而已記金石例云記者記事之文也西山曰記以善敘事為主禹貢顧命乃記之祖後人作記未免雜以議論陳后山亦曰退之作記記其事耳今之記乃論也竊嘗考之記之名始於戴記學記等篇記之文文選弗載後之作者固以韓退之畫記栁子厚遊山諸記為體之正然觀韓之燕喜亭記亦微載議論於中至栁之記新堂鐵爐步則議論之辭多矣迨至歐蘇而後始有專以論議為記者宜乎后山諸老以是為言也大抵記者蓋所以備不忘如記營建當記月日之久近工費之多少主佐之姓名敘事之後畧作議論以結之此為正體至若范文正公之記嚴祠歐陽文忠公之記晝錦堂蘇東坡之記山房藏書張文潛之記進學齋晦翁之作婺源書閣記雖專尚議論然其言足以垂世而立教弗害其為體之變焉序爾雅云序緒也序之體始於詩之大序首言六義次言風雅之變又次言二南王化之自其言次第有序故謂之序也東萊云凡序文籍當序作者之意如贈送燕集等作又當隨事以序其實大抵序事之文以次第其語善序事理為上近世應用唯贈送為盛當須取法昌黎則庻得古人贈言之義而無枉已徇人之失也論按韻書論者議也梁昭明文選所載論有二體一曰史論乃史臣於傳末作論議以斷其人之善惡若司馬遷之論項籍商鞅是也二曰論則學士大夫議論古今時世人物或評經史之言正其訛謬如賈生之論秦過江統之議徙戎栁子厚之論守道守官是也唐宋取士用以出題然求其辭精義粹卓然名世者亦惟韓歐為然劉勰云聖哲彝訓曰經述經敘理曰論故凡陳政則與傳注叅體辯史則與賛評齊行銓文則與序引共紀信夫説解按説者釋也述也解釋義理而以己意述之也説之名起自吾夫子之説卦厥後漢許愼著説文蓋亦祖述其名而為之辭也魏晉六朝文載文選而無其體獨陸機文賦備論作文之義有曰説煒􅂱而譎誑是豈知言者哉至昌黎韓子憫斯文日弊作師説抗顔為學者師迨栁子厚及宋室諸大老出因各即事即理而為之説以曉當世以開悟後學繇是六朝陋習一洗而無餘矣盧學士云説須自出已意横説竪説以抑揚詳贍為上若夫解者亦以講釋解剝為義其與説亦無大相逺焉辯昔孟子答公孫丑問好辯曰予豈好辯哉予不得巳也中間厯敘古今治亂相尋之故凡八節所以深明聖人與已不能自巳之意終而又曰豈好辯哉予不得已也蓋非獨理明義精而字法句法章法亦足為作文楷式迨唐韓昌黎作諱辯栁子厚辯桐葉封弟識者謂其文斆孟子信矣大抵辯須有不得已而辯之意茍非有闗世教有益後學雖工亦奚以為原按書韻原者本也一説推原也義始大易原始要終之訓若文體謂之原者先儒謂始於昌黎之五原蓋推其本原之義以示人也黄山谷嘗曰文章必謹布置每見學者多告以原道命意曲折石守道亦云吏部原道原人等作諸子以來未有也後之作者蓋亦取法於是誡按韻書誡者警勅之辭文章緣起曰漢杜篤作女誡辭已弗傳昭明文選亦無其體今特取先正誡子孫及警世之語可為法誡者錄之題䟦按蒼崖金石例云䟦者隨題以賛語於後前有序引當掇其有闗大體者以表章之須明白簡嚴不可墮人窠臼予嘗即其言考之漢晉諸集題䟦不載至唐韓栁始有讀某書及讀某文題其後之名迨宋歐曾而後始有䟦語然其辭意亦無大相逺也故文鑑文類總編之曰題䟦而巳近世疎齋盧公又云䟦取古詩狼䟦其胡之義狼行則前躐其胡故䟦語不可太多多則冗尾語宜峭㧞使不可加若然則䟦比題與書尤貴乎簡峭也庸書以俟考訂云雜著雜著者何輯諸儒先所著之雜文也文而謂之雜者何或評議古今或詳論政教隨所著立名而無一定之體也文之有體者既各隨體裒集其所錄弗盡者則總歸之雜著也著雖雜然必擇理之弗雜者則錄焉蓋作文必以理為之主也若夫掛一漏萬尚有俟博雅君子傳太史公創史記列傳蓋以載一人之事而為體亦多不同迨前後兩漢書三國晉唐諸史則第相祖襲而已厥後世之學士大夫或値忠孝才徳之事慮其湮没弗白或事雖微而卓然可為法戒者因為立傳而垂于世此小傳家傳外傳之例也西山云史遷作孟荀傳不正言二子而旁及諸子此體之變可以為法步里客談又云范史黄憲傳蓋無事蹟直以語言模寫其形容體段此為最妙繇是觀之傳之行迹固繫其人至於辭之善否則又繫之於作者也若退之毛穎傳迂齋謂以文滑稽而又變體之變者乎行狀按行狀者門生故舊狀死者行業上于史官或求銘誌於作者之辭也文章緣起云始自漢丞相倉曹傅朝幹作楊原伯行狀然徒有其名而亡其辭蕭氏文選唯載任彦昇所作齊竟陵王行狀而辭多矯誕識者病之今采韓栁所作載為楷式云諡法周禮大史喪事考焉小喪賜諡疏云小喪卿大夫也卿大夫諡君親制之使大史徃賜之至遣之日小史徃為讀之又按禮記曰㓜名冠字五十以伯仲死諡周道也是則賜諡之制實始於周崇文總目載周公諡法一巻又有春秋諡法廣諡等書然皆漢魏以來儒者取古人諡號増輯而為之宋仁宗朝眉山蘇洵嘗奉詔編定乃取世傳周公諡法以下諸書定為三巻總一百六十八諡至孝宗淳熈中夾漈鄭樵復本蘇氏書増損定為上中下三等通二百一十諡為書以進大抵諡者所以表其實行故必由君上所賜善惡莫之能揜然在學者亦不可不知其説故今特載周公諡法于編蓋以諸家之説皆祖於此若夫鄭氏之論亦多有可取者今亦錄附于後諡議按諡法云諡者行之迹大行受大名細行受小名白虎通曰人行始終不能若一故據其終始明别善惡所以勸人為善而戒人為惡也繇是觀之則諡之所繫豈不重歟漢晉而下凡公卿大夫賜諡必下太常定議博士乃詢察其善惡賢否著為諡議以上于朝若晉秦秀之議何曽賈充唐獨孤及之議苖俊卿宋鄧忠臣之議歐陽永叔是也當時雖或未能盡從其言然千百載之下讀其辭者莫不油然興起其好惡之心嗚呼是其所繫豈不甚重乎哉至若近世名儒隠士之没門人朋舊又有私諡易名之議云碑按儀禮士􅽰禮入門當碑揖又禮記祭義云牲入麗于碑賈氏注云宫廟皆有碑以識日影以知早晚説文注又云古宗廟立碑繫牲後人因於上紀功徳是則宫室之碑所以識日影而宗廟則以繫牲也秦漢以來始謂刻石曰碑其蓋始於李斯嶧山之刻耳文選載郭有道等墓碑而王簡栖頭陀寺碑亦厠其間至文鑑則凡祠廟等碑與神道墓碑各為一類今亦依其例云墓碑墓碣墓表墓誌墓記埋銘按檀弓曰季康子之母死公肩假曰公室視豐碑注云豐碑以木為之形如石碑樹於槨前後穿中為鹿盧繞之繂用以下棺事祖廣記曰古者葬有豐碑以窆秦漢以來死有功業則刻于上稍改用石晉宋間始有神道碑之稱蓋地理家以東南為神道因立碑其地而名耳又按墓碣近世五品以下所用文與碑同墓表則有官無官皆可其辭則多敘其學行徳履墓誌則直述世系嵗月名字爵里用防陵谷遷改埋銘墓記與墓誌同而墓記則無銘辭耳古今作者惟昌黎最高行文敘事面目首尾不再蹈襲凡碑碣表於外者文則稍詳誌銘埋於壙者文則嚴謹其書法則唯書其學行大節小善寸長則皆弗錄觀其所作可見近世至有將墓誌亦刻墓前斯失之矣大抵碑銘所以論列徳善功烈雖銘之義稱美弗稱惡以盡其孝子慈孫之心然無其美而稱者謂之誣有其美而弗稱者謂之蔽誣與蔽君子弗由也誄辭哀辭按周禮大祝作六辭以通上下親疎逺近六曰誄魯哀公十六年四月孔子卒公誄之曰昊天不弔不憖遺一老俾屏予一人以在位煢煢余在疚嗚呼哀哉尼父此即所謂誄辭也鄭氏注云誄者累也累列生時行迹讀之以作諡此唯有辭而無諡蓋唯累其美行示已傷悼之情爾後世有誄辭而無諡者蓋本於此又按文章緣起載漢武帝公孫𢎞誄然無其辭唯文選錄曹子建之誄王仲宣潘安仁之誄楊仲武蓋皆述其世系行業而寓哀傷之意厥後韓退之之於歐陽詹栁子厚之於吕温則或曰誄辭或曰哀辭而名不同迨宋曾南豐東坡諸老所作則總謂之哀辭大抵誄則多敘世業故今率倣魏晉以四言為句哀辭則寓傷悼之情而有長短句及楚體不同焉祭文古者祀享史有冊祝載其所以祀之之意考之經可見若文選所載謝惠連之祭古冢王僧逹之祭顔延年則亦不過敘其所祭及悼惜之情而已迨後韓栁歐蘇與夫宋世道學諸君子或因水旱而禱于神或因喪葬而祭親舊真情實意溢出言辭之表誠學者所當取法大抵禱神以悔過遷善為主祭故舊以道逹情意為尚若夫諛辭蔓説固弗足以動神而亦君子所厭聴也連珠按晉傅𤣥曰連珠興於漢章帝之世班固賈逵亦嘗受詔作之蔡邕張華又嘗廣焉攷之文選止載陸士衡五十首而曰演連珠言演舊義以廣之也大抵連珠之文穿貫事理如珠在貫其辭麗其言約不直指事情必假物陳義以逹其㫖有合古詩風興之義其體則四六對偶而有韻自士衡後作者蓋鮮洪武初宋王二閣老有作亦如士衡之數今各錄十餘篇寘于外集之首以著四六對偶之所始判按唐制凡選人入選其選之之法有四一曰身體貎豐偉二曰言言辭辯正三曰書楷法遒美四曰判文理優長四事皆可取則先徳行徳均以才才均以勞得者為留不得者放蓋凡進士登第及諸科出身皆以此銓擇若陸宣公既登進士又以書判㧞萃補渭南尉是也宋代選人試判三道若二道全通一道稍次而文翰俱優為上一道全通而二道稍次為中三道全次而文翰紕繆為下其上者加階超資中者依資以敘下者殿一選如晦翁登第後銓試入中等始授同安主簿是已元世不用其制我國朝設科第一場有判語以律條為題其文亦用四六而簡當為貴今錄以備一體律賦律賦起於六朝而盛於唐宋凡取士以之命題每篇限以八韻而成要在音律諧協對偶精切為工迨元氏場屋更用古賦繇是學者弗習今錄一二以備其體律詩律詩始於唐而其盛亦莫過於唐考之唐初作者蓋鮮中唐以後若李太白韋應物猶尚古多律少至杜子美王摩詰則古律相半迨元和而降則近體盛而古作微矣大抵律詩拘於定體固弗若古體之高逺然對偶音律亦文辭之不可廢者故學之者當以子美為宗其命辭用事聮對聲律須取温厚和平不失六義之正者為矜式若換句抝體粗豪險怪者斯皆律體之變非學者所先也楊仲𢎞云凡作唐律起處要平直承處要舂容轉處要變化結處要淵永上下要相連首尾要相應最忌俗意俗字俗語俗韻嘗用功二十年始有所得嗚呼其可易而視之哉排律楊伯謙云唐初五言排律雖多然徃徃不純至中唐始盛若七言則作者絶少大抵排律若句鍊字鍛工巧易能唯抒情陳意全篇貫徹不失倫次者為難故山谷嘗云老杜贈韋左丞相詩前輩錄為壓巻蓋其布置最為得體如官府甲第㕔堂房室各有定處不相淆亂也絶句楊伯謙曰五言絶句盛唐初變六朝子夜體六言則王摩詰始效顧陸作七言唐初尚少中唐漸盛又按詩法源流云絶句者截句也後兩句對者是截律詩前四句前兩句對者是截後四句皆對者是截中四句皆不對者是截前後各兩句故唐人稱絶句為律詩觀李漢編昌黎集凡絶句皆收入律詩内是也周伯弜又云絶句以第三句為主須以實事寓意則轉換有力而涵蓄無盡焉聨句按聨句始著于陶靖節集而盛於退之東野攷其體有人作四句相合成篇若靖節集中所載是也又有人作一聨若子美與李尚書之芳及其甥字文彧聨句是也後有先出一句次者對之就出一句前人復對之相繼成章則昌黎東野城南之作是也其要在于對偶精切辭意均敵若出一手乃為相稱山谷嘗云退之與孟郊意氣相入故能雜然成篇後人少聨句者盖由筆力難相追爾雜體昔栁栁州讀退之毛穎傳有曰善戲謔兮不為虐兮學者終日討説習復則罷憊而廢亂故有息焉游焉之説譬諸飲食既薦味之至者而竒異苦鹹酸辛之物雖蜇吻裂鼻縮舌澁齒而咸有篤好之者獨文異乎予於是而知雜體之詩盖類是也然其為體雖各不同今總謂之雜者以其終非詩體之正焉近代詞曲按歌曲源流云自古音樂廢後鄭衛靡漫之聲雜然並出至唐開元天寳中薰染成俗于時才士始依樂工按拍之聲被之以辭其句之長短各随曲而度於是古昔聲依永之理愈失矣又按致堂胡先生曰近世歌曲以曲盡人情而得名故文章豪放之士鮮不寓意於此隨亦自掃其跡曰此謔浪遊戲而已唐人為之者衆至栁耆卿乃掩衆製而盡其妙篤好者以為不可復加及眉山蘇氏出一洗綺羅香澤之態擺脱綢繆宛轉之度使人登髙望逺舉首髙歌而逸懐浩氣超乎塵垢之表竊嘗思之凡文辭之有韻者皆可歌也苐時有升降故言有雅俗調有古今爾昔在童稚時獲侍先生長者見其酒酣興發多依腔填詞以歌之歌畢顧謂幼稚者曰此宋代慢詞也當時大儒皆所不廢今間見草堂詩餘自元世套數諸曲盛行斯音日微矣迨予既長奔播南北鄉邑前輩零落殆盡所謂填詞慢調者今無復聞矣庸輯唐宋以下辭意近于古雅者附諸外集之後竹枝楊栁亦不棄焉好古之士于此亦可以觀世變之不一云雜志十條劉定之蘇子瞻宋仁英以前用差役而民不擾王安石用雇役民始擾矣司馬君實廢雇用差雖蘇子瞻亦喋喋不已豈稍欲中立于荆温兩間兾免後患邪觀其為哲宗言臣私憂神宗勵精之政漸至隳壊理財疎而備邊弛故撰䇿問欲以感動聖意子瞻之情殆可見也然其後恵儋之貶罪子瞻全助温而不貸其畧䕶荆昔者之言徒為向背亦何益哉子瞻作君實神道碑深美其誠盖自覺不如也蘇子由蘇子由使遼歸為哲宗言遼主𢎞基以與我和好為喜年貌可六十步履輕健飲啗不衰享國尚當有年我可以無虞其君臣事佛國俗化之此彼之巨蠧足為我喜也𢎞基孫延禧當嗣位然骨氣凡弱視瞻不正恐非彼福其意亦嚮慕和好而我不足恃矣其後𢎞基守和好又十餘年而殂延禧亦不背盟然遼國遂亡于延禧則子由之言信矣容貌辭氣乃徳之符非特得其身之遐促而并得其國之興替仲由盆成括之死見知于孔孟邾子髙仰魯侯卑俯兆其死亡見知于子貢聖賢原自有觀人之法也子由殆聞于是而然歟抑使可覘國則非其人者不足使佛能蠧國而厯世之莫悟也何哉李清臣李清臣見宣仁聖烈后既崩哲宗入羣小之言意欲紹述熙豐之法而是時小人屏黜在外者其勢亦將轉而復起元祐諸賢凜凜乎覆壓及之矣若此者清臣之所喜也清臣平日于操切禽制以作法抑揚軒輊以立勢所優為也故嘗發而為法原勢原之文翫其辭氣真小人之言也夫為治者先徳而後法上理而下勢今乃切切於法與勢之為言則其所藴可知矣蘇易簡蘇易簡内直宋太宗謂曰君臣千載遇易簡應聲曰忠孝一生心可謂的對今上在春宮時習對李賢取是日早所進讀孟子全句君子逺庖廚五字請對頃之對云聖人登寳位覆對云學士上瀛洲尤見睿思之妙徐敬業徐敬業與駱賔王兵敗賔王亡命為僧徃來杭州靈隠寺宋之問至寺夜吟鷲嶺欝岧嶤龍宮鎻寂寥乆無下韻賔王隔壁朗吟以終篇之問大駭質明求見則遁矣敬業亦脱去為僧于衡山黄巢既敗依張全義為僧于洛陽嘗繪巳像題詩云記得當年草上飛鐵衣脱盡着僧衣天津橋上無人識獨倚欄干看落暉人見像識其為巢蓋古今若此脱身者多矣史豈盡得其實哉王介甫王介甫詩云周公恐懼流言日王莽謙恭下士時假使當時身便死終身眞偽有誰知其意謂已嘗辭館職出於眞異已者若司馬君實辭樞副范景仁辭翰長出於偽為莽之徒也然不知蘇子瞻又嘗謂介甫為莽之徒共詩曰漢家殊未識經綸入手功名事業新百尺穿成連夜井千金購得解飛人譏其汲汲妄作也嗚呼數他人之髭鬢鬚髯而不見已睫者其介甫之謂哉韓退之韓退之自言口不絶吟於六義之文手不停披於百家之編貪多務得繼晷窮年其勤至矣而李翶謂退之下筆時他人疾書之寫誦之不是過也其敏亦至矣蓋其取之也勤故其出之也敏後之學者束書不觀逰談無根乃欲刻燭畢韻舉步成章彷彿古人豈不難哉李杜韓栁以詩言杜比跡於李以文言栁差肩於韓而以人言則杜韓陽淑李栁隂慝如氷炭異冷熱薫蕕殊芳臭矣子羙當安史作難時徒步從肅宗其詩拳拳於君臣之義太白於其時從永王璘欲乗危割據江表叛棄宗社作猛虎行云旍旌繽紛兩河道戰鼓驚山欲傾倒一輸一失闗下兵朝降夕叛幽薊城頗似楚漢時翻覆無定止張良未遇韓信貧劉項存亡在兩臣其辭意視祿山思明反噬其主比於劉項敵國相爭尚安知君臣之大倫歟微之謂太白不能窺子美藩籬况其堂奥得之矣退之懐忠事主闢邪宗聖固有本原其稱子厚謂斥不乆其文必不能傳於後如今無疑蓋惟稱其文而巳其阿附伾文胡致堂謂忌憲宗在儲位有更易秘謀未及為而敗後又託河問淫婦無卒者以詆憲宗得免於大戮為幸由是言之文雖美而若斯過惡固非可湔滌者也朱文公楚辭載子厚謫居時懲咎賦取其有自悔之言噫既悔已又詆主則亦非真悔也奚足録哉天極天有北南極如𤓰果有前後蔕尖天分十二宮如𤓰果分十二瓣其近極處度狹而當天腰處度闊如𤓰果之瓣其近蔕尖者狹而當腰者寛也天之頂心當嵩高山下陽城而地之頂心為崑崙參差不相對者天地間東南暑熱西北寒凉地在寒凉方者堅凝高峙而在署熱方者融液坍塌故東南多水合東南多水西北多山處均平論則地仍以嵩高山下陽城為中但取最高頂心處則崑崙為中也日輪日輪大月輪較小日道近天在外月道近人在内故日食既時四面猶有光溢出可見月輪小不能盡掩日輪也日月合朔時月常在内未有日在内者故月食日也日月相朢則日食月者月雖資日光以圓於朢時然微相參差則光圓恰相衝射則日反食之如㸃燈者正當爐炭炎熾之尖所衝射則燈反不然矣此厯所謂暗虛言月為日所暗而非日之實體暗之乃日之虛衝爾蓋二曜各有所行之道如二人各行水陸之塗朔朢則一人由陸者在橋上一人由水者在橋下稍相先後亦不食適相對當乃食矣日行道周天如循環月行道亦周天如循環兩環相撘有兩交處一處謂之天首一處謂之天尾天尾為計天首為羅至於木火土金水五星不由日道亦不由月道各自有道木星八十三年而七周天與日合者七十六火星七十九年而四十二周天與日合者三十七土星五十九年而二周天與日合者五十七金水二星雖隨日一年一周天然金星八年而合於日者五水星四十六年而合於日者一百四十五其遲速離合以宰萬類之生成司千代之起伏俯視人寰奚異夫甕蚋褌蝨之聚散緣嚙也奈何欲以私意仰干之哉孛生于月月之行遲速有常度最遲之處即孛也故謂之月孛孛六十二年而七周天炁生於閏二十八年十閏而炁行一周天炁孛皆有度數無光象故與羅計同謂之四餘幷七政為十一曜也明文衡巻五十六欽定四庫全書明文衡卷
