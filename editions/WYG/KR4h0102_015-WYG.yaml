body:
  text: 明文衡巻十四欽定四庫全書明文衡巻十五明程敏政編辨桂林志辯疑三事陳璉大凡事之有疑者不可以不辯茍辯之而不折以理則所疑終不能釋桂林俗傳可疑者非一今特舉其著者而辯之餘可類推也予聞桂林屬邑有周文王太伯孟母漢髙祖張良韓信等廟莫究所以及觀建武志邕州亦有髙祖祠云馬伏波征蠻酋長請降願朝漢天子於是立髙帝祠以祭之又父老相傳云宋胡穎守潭専毁淫祠惟前代帝王及忠臣烈士祠不毁後穎轉官廣西鄉人聞風皆以淫祠易以帝王名臣之號倖免一時相傳至今遂不能改以其所言近理彼溺於淫祀者尚當省哉右淫祠洪武戊寅冬璉偕桂林府照磨臨洮馬可俊如京師舟下清湘數十里有沉香名潭潭在石崖下有枯木横置崖上相傳沉香言有神物呵護人不敢取取則致禍予既蓄疑未得其實因停舟崖前命可俊射之疊發數矢偶落其一片拾而視之甚輕紋理如桂木爇之則不香始知其為偽也桂林大墟下石崖上有一木亦云沉香後為人竊去皆此類也去沉香潭不逺有一石函謂諸葛武侯藏兵書於石崖上殊不知武侯平生出師未嘗至此又其所著書盛傳於世人莫不知其肯為詭秘之事哉此特好事者為之耳璉既辯沉香之偽因及此以釋世人之惑右偽香桂城伏波山下有一洞名還珠相傳前代有一漁者由洞口行數百步深入漸明朗見一物狀如犬瞑目而睡前有一珠甚光瑩因急懐歸官府尋知之意其為異物亟命還之漁人復至故所此物睡猶未醒故世傳為還珠洞或云漢馬伏波征交趾囘載薏苡珠經此因得名至今未有定論然宋人題此洞有云凛凛威聲震百蠻肯將稇載溷溪山無人為起文淵問端的珠還薏苡還以此觀之伏波之事無疑彼漁人之説涉於怪誕奚足信哉右還珠洞周正辯周洪謨或問南臯子曰唐虞夏后皆以建寅為嵗首今之厯是也周人以建子為嵗首是以子月為正月乎曰歲首云者言改元始於此月是以此月為正朔非以此月為正月也曰正朔正月有以異乎曰正之為言端也端之為言始也正朔者十二朔之首史官紀年之所始也正月者十二月之首厯官紀年之所始也或曰正者長也正朔之為第一朔正月之為第一月猶長子之為第一子也故皆可謂之歲首前乎商之建丑也書曰惟元祀十有二月是商之正朔以十二月為嵗首而非以十二月為正月也後乎秦之建亥也史謂秦既并天下始改年朝賀皆自十月朔故曰元年冬十月是秦之正朔以十月為嵗首而非以十月為正月也由是推之則周人之建子者以十一月為歲首而不以十一月為正月也後世儒者不得其義故有紛紛不決之論漢孔安國鄭康成則謂周人改時與月宋程伊川胡安國則謂周人改月而不改時獨九峯蔡氏謂不改時亦不改月至於元儒吳仲迂陳定宇張敷言史伯璿吳淵穎汪克寛輩則又逺宗漢儒之謬而力詆蔡氏之説謂以言書則為可從以言春秋則不可從於乎四時之序千萬古不可易而乃紛更錯亂以冬為春以春為夏以夏為秋以秋為冬位隨序遷名與實悖雖庸夫騃子且知其不可而謂聖人平秩四時奉天道以為政者乃如是乎予懼學者惑其言未有不誣聖經以亂先王之法者矣故以易書詩周禮春秋論語孟子及汲冢周書史記漢書可以證諸儒論辯之失者叅考而詳列於左云易易臨卦辭至於八月有凶程子謂八月者陽生之八月陽始生於復自復至遯凡八月自建子至建未也朱子本義亦從其説又云恐文王作卦辭時只用周正紀之按漢書武王克商之後始改周正况文王三分天下有其二以服事殷則文王固未嘗改正朔也善乎隆山李氏曰一陽復十一月至已為乾則陽極隂生一隂姤五月二隂遯六月三隂否七月四隂觀八月方建丑月卦為臨二陽浸長逼四隂當此之時陽勢方盛至於八月建酉卦為觀四隂浸長逼二陽則臨二陽至觀危矣故曰至於八月有凶所謂至於八月有凶者言之於臨則當自臨數而不當自復數以觀次臨則當數至觀而不當數至遯臨觀乃隂陽反對消長之常理文王於臨以八月有凶為戒其義甚著豈可外引遯卦謂周八月哉然則文王奉商正者也而此所謂八月乃夏正八月則商周之不改時與月者觀於此亦可見矣書三正之説始於夏書怠棄三正之文傳謂觀此則子丑之建唐虞以前當已有之愚則以為唐虞以前固不可考伊尹謂商革夏正汲冢周書亦謂湯改正朔以建丑之月為正則改正自商始也董仲舒謂舜承堯改正朔此則謬妄觀堯老而舜攝也書曰正月上日受終於文祖舜老而禹攝也又曰正月朔旦受命於神宗則舜始終用堯之正朔也明矣至於禹承舜亦以建寅為正未聞其迭建子丑三正並用也則子丑之正固非當時之制有扈氏何為而怠棄之乎蓋三正必有所指意如三極三綱之類非後世之所謂三正也泰誓曰惟十有三年春大㑹於孟津武成曰惟一月壬辰旁死魄戊午師逾孟津蔡氏以為孟春建寅之月是矣漢孔氏以一月為建子之月而泰誓又繫之以春故遂以子月為春是謂周人改時與月可謂謬矣班固作前漢志亦因其説以武王伐紂為建子之月而又引伶州鳩言武王伐紂之日歳在鶉火月在天駟日在析木辰在斗柄星在天黿近世汪氏謂以唐厯遡而上之日月星宿無一不合是皆惑於子為歲首之義耳要之武王伐紂不在子月又何必揆以子月之星象而實其所無之事哉曰何以知武王伐紂之不在子月耶曰周未改時與月也曰何以明之曰於周詩周禮而見之也周人作詩其論隂陽寒暑皆合乎四時之序周公作禮其陳法制禁令皆順乎四時之宜此皆昭如日月而不可掩者後儒不信聖人之經而信傳記之説亦獨何哉又如金縢曰秋大熟未穫必酉戍之月然後可謂大熟如仲夏季夏為秋何以謂之大熟乎穆王命君牙曰若蹈虎尾涉於春冰必孟春東風解凍然後冰不可涉如仲冬季冬為春則何冰之不可涉乎是周之不改時與月者觀於書為可見矣詩豳風之詩説者皆謂豳乃夏之列國故周公述先公豳俗之事必以夏正為言殊不知厯數之紀三代一轍何必謂周公以夏時述夏事也借使豳風為然則何故他詩之言時月者亦皆從夏正乎且堯時仲夏日在鶉火大火昏中至周公時嵗差既多則六月日在鶉火大火昏中七月日在鶉首而昏中大火已西流至未矣故周公據目前所見而曰七月流火使以夏時追述夏事則又何不驗以夏時之星象而據當時之星象以言哉至於下章云十月改嵗言時至冬嵗事將改亦猶堯典稱冬為朔易之義或曰以正朔之始於子終於亥者為改歲非謂改十一月為正月也曰流火曰改歲是周公即當時之星象正朔以告成王使之易曉豈以夏時而述夏事哉東萊吕氏不察其説而謂三正通於民俗尚矣周特舉而迭用之耳朱子亦謂周歴夏商其未有天下之時固用夏商正朔然其國僻逺無純臣之義又自有私記其時月者故三正皆嘗迭用是謂周之先公私有紀候之法故云十月改嵗然既以十月為改歲則又何以云二之日為卒嵗乎是其一篇之中自相矛盾而不可通矣元張敷言因其説又謂周之月數皆改必其朝覲聘問頒厯授時凡筆之史冊者則用時王正朔其民俗嵗時相與話言則皆以寅月起數史伯通又因其説謂詩詠歌之詞所言以寅月起數者即所謂民俗歲時相與話言者也是不知周禮朝覲之類皆從夏正而詩人之詠歌者未必皆民俗之言如出車之勞還帥臣工之戒農官是果民俗之言乎且三代三正之建各新一代之制在上者不可紛更迭用而惑生民之耳目在下者不可徇私立法而違時王之制度子思子生於周末猶謂今天下車同軌書同文以見制度之歸於一也豈有三代盛時而使民家異政人異法者哉或又謂一之日二之日者是以子月起數殊不知一之日者一陽之日二之日者二陽之日三之日者三陽之日四之日者四陽之日是以六陽先後之序數日而非數月也變月言日者以文之順爾是豈以子月起數而私立紀候之法哉然而詩之與夏正合者不止於豳風而已出車之詩云春日遲遲卉木萋萋則夏正之春也如仲冬季冬為春何以見草木之榮乎四月之詩云秋日淒淒百卉具腓則夏正之秋也如仲夏季夏為秋何以見草木之瘁乎曰四月維夏如子月起數則當云二月維夏也曰六月徂暑如子月起數則當云四月徂暑也小明之詩云二月初吉載離寒暑乃大夫西征之日也其後作詩則曰昔我往矣日月方奥如以十二月為二月何以謂日月之燠乎此周之不改時與月者觀於詩為可見矣周禮新安汪氏謂周禮凡言正月指子月歲終指丑月正嵗指寅月州長正月屬民讀法正歲讀法如初言初則正月居先可知矣若以寅月為正月不當又有正嵗也陋哉言乎如周既以子月為正月則明年之亥月方為嵗終也何遽以次月之建丑者為嵗終哉既以寅月為正歲則子月方讀法而寅月又何遽讀法如初哉蓋正月指寅月言歳終指亥月言正嵗指新嵗言周禮每以正月歲終正嵗為序蓋正月既舉其事歳終則㑹其成而來歲復舉之如初故州長於正月屬民讀法嵗終㑹其政令正嵗讀法如初言來嵗之正月又讀法如今歲之正月不曰正月而曰正歲以上文正月為嫌故别而言之猶俗云新正之嵗也又冢宰以正月懸治象之法於象魏而小宰嵗終則令羣吏致事正嵗則帥治官之屬觀治象是冢宰之懸治象者言於今嵗之正月而小宰之帥屬觀者言於來歲之正月彼此互文以見毎年冢宰懸治象小宰帥屬觀者皆在正月也况冢宰懸治象者浹日斂之則不過旬日而即斂之矣如汪氏之説則子月冢宰懸治象又何待至寅月而後小宰帥屬往觀哉不特是耳如周改時與月則凡周禮所載如山虞之仲冬斬陽木者乃在九月仲夏斬隂木者乃在三月而失隂陽之義矣馮相氏之冬夏致日者非冬至夏至春秋致月者非春分秋分而失日月之次矣大司馬之春蒐夏苖秋獮冬狩者取非其時不亦暴殄天物乎雍氏之春令為阱擭溝瀆秋令塞阱杜擭者動非其宜不亦反失民利乎至於凌人十有二月斬冰與詩言二之日伐冰者如合符節是皆周公所作燦然昭白不待辯而明者也若以十二月為十月則又何冰之可斬乎是周之不改時與月者觀於禮為可見矣春秋春秋春王正月之書程子謂周正月非春也假天時以立義胡氏謂建子非春也以夏時冠周月朱子亦謂周人改月而天時不可改春秋月數乃魯史之舊文而四時之序則孔子之㣲意是三子者皆謂周人改月而不改時意如十一月為正月而時則仍為仲冬十二月為二月而時則仍為季冬正月為三月而時則仍為孟春然以今年之十一月為正月而繫之仲冬繼以明年之十月為十二月而繫之孟冬以月論時則時之孟仲失其倫以時論月則月之始終紊其序豈聖人平秩四時之義哉若然則周詩所稱寒暑之節皆失其度周禮所載法制之事皆違其時矣魯用周正朔者也周之詩禮魯之春秋皆周正朔之所在又皆孔子之刪定筆削者其制何得而異哉可堂吳氏謂周人不特改月而又改時以齊其年春秋所書之春即夏之仲冬正月即夏之十一月此則襲漢儒之謬而不足辯者也新安汪氏亦謂魯史名以春秋則似原書曰春正月是周厯已改子丑月為春又謂周以子月為嵗首而春秋以寅月為正月毎年截子丑月事移在前一年若然則春秋之所謂正月者乃魯史之三月而二百四十二年之事皆非當時之月日矣聖人豈為之哉蓋周之正朔以子月為首而厯數仍以寅月為首商不改夏之厯數周不改商之厯數魯不改周之厯數春秋不改魯之厯數但魯史紀年必始於冬十一月所以遵周正朔也春秋紀年則始於春王正月所以垂法後世也是春秋之於魯史未嘗改其時月但其編年所始之月為不同耳曰魯既用周正朔則魯公即位皆當以正朔行之而在十一月何乃書於正月乎曰按周禮朝覲㑹同巡守祭享凡國之大事皆從夏正初不始於正朔之月書載四月成王崩而旬日之後康王即位亦不用夫正朔之月則魯公即位豈必以正朔行之乎故春秋公即位書於正月者七書於六月者一各據其事以書也曰若從夏正則災異之紀多所不合如隠九年三月癸酉大雨震電庚辰大雨雪若以三月為建辰之月則大雨震電何足以為異乎曰不然左傳大雨霖以震又云雨三日以往為霖蓋建辰之月雷電固所宜有而雷雨交作已皆三日故經以震電繫於大雨之下以見其非常過度固可為異而雨雪之大尤可為異故春秋書之以記異也安在其不為異乎亦若後世晉泰始六年六月大雨河洛並溢流四千餘家安知春秋之書大雨者亦必不類乎此也曰三月之大雨雪者固為異矣而桓八年冬十月雨雪僖十年冬大雨雪者何足以為異乎僖二十九年秋大雨雹者固為異矣而昭三年冬大雨雹四年正月大雨雹者何足以為異乎曰桓八年冬十月雨雪此或有缺文恐雨雪上當有大字如僖十年冬大雨雪也蓋雨雪雖當其期而太多過度則亦為異故書曰大猶洪範所謂極備凶也安得不為異乎亦若後世漢元狩元年冬十二月大雨雪民多凍死安知春秋之書大雨雪者亦必不類乎此也至於雹者隂陽和則為霜雪雨露不和則為雹雹且大焉則雖冬且為異况秋與春安得不為異乎亦若後世漢元封三年十二月雹大如馬頭安知春秋之書大雨雹者亦必不類乎此也曰桓十四年春正月無冰成元年二月無冰又十六年正月雨木冰襄二十八年春無冰若以夏正言之則何以皆書於春而不書於冬乎故汪氏謂茍以發冰而知無冰則當常以二月而不有正月矣若曰或藏冰無冰而書無或發冰無冰而書無抑何紀事之錯亂哉曰不然周人以十二月鑿冰正月納冰二月發冰今正月無冰若以為十一月則十一月無之而十二月有焉亦又何害是十一月之無冰者固不足書也要之正月無冰者言藏冰之月無冰可藏則冬之無冰者可知矣二月無冰者仲春獻羔開冰先薦寢廟今當廟薦而無冰焉則凡以後之祭無冰者可知矣不言凌隂廟薦之無冰而但曰無冰者聖人諱之此正春秋因事而書以垂鑒戒之法也何乃謂紀事之錯亂哉襄二十八年春無冰者亦猶正月二月之無冰也至於正月雨木冰孔氏謂仲冬時猶有雨雨着樹為冰記寒甚之過其節度殊不知魯地仲冬極寒有雪無雨使雨而成冰亦不為過何足為異必孟春之月三陽開泰而猶雨木冰故書之以記異亦猶後世魏黄初六年正月雨木冰而郡賊起安知春秋之書雨木冰者亦必不類乎此也若以正月為十一月則正月無冰者既謂仲冬當冰而無冰矣正月雨木冰者又謂仲冬不當冰而冰無乃若汪氏之所謂紀事錯亂乎曰莊七年秋大水無麥苗説者謂五月麥熟苗秀大水漂盡若以為七月則何有麥苗耶曰四月麥秋至則已刈麥至五月則刈已盡經言秋無麥苖言七月大水苗既為水所漂固無可望而麥之刈未久又皆已盡故曰無麥苗亦猶二十八年冬書曰大無麥禾也曰定元年十月殞霜殺菽何以書乎曰諸災異皆可通惟此為不可通恐有缺文誤字如君氏郭公之類秦火之餘漢𨽻之後安保其傳録之無訛也曰陳定宇謂春蒐夏苗秋獮冬狩四時田獵定名也桓四年春狩于郎哀十四年春西狩獲麟此所謂春非冬而何定十三年夏大蒐于比蒲昭十一年五月大蒐于比蒲此所謂夏非春而何曰否陳氏但引其所可通者而不敢引其所不可通者春秋書狩者四書蒐者五桓四年春狩于郎哀十四年春西狩既以為冬矣則僖二十八年冬天王狩于河陽莊四年冬狩于禚者又當皆為秋也是冬狩之果有定名乎昭十一年五月蒐于比蒲定十三年夏蒐于比蒲既以為春矣則昭八年秋蒐于紅二十二年春蒐于昌間定十四年秋蒐于比蒲者又當為夏與冬也是春蒐之果有定名乎其不足為證也明矣曰汪氏謂左傳僖五年正月日南至禮記正月日至陳定宇引晉卜偃及漢陳寵傳之説張敷言引絳縣老人之語其言皆彰彰然也豈不足徵乎曰易書詩周禮皆可信矣諸儒乃捨之而反信左氏漢儒之説左氏漢儒不得聖人作經之義未有不妄意増改而附㑹穿鑿者矣果何足徵之有哉是周之不改時與月者觀春秋為可見矣論語孟子論語曽晳曰暮春者春服既成浴乎沂風乎舞雩詠而歸此其為建辰之月和煦之時者審矣如以為建寅之月則何以浴沂而風舞雩之下乎孟子言七八月之間旱朱子以為夏五六月十一月徒杠成十二月輿梁成又以為九月十月意謂申酉之月禾稻將熟不須雨澤而子丑之月寒氣已過始成杠梁則太遲也愚竊以為七八月之間云者是謂孟秋仲秋交代之際也禾稻之熟南方早而北方遲然而南方孟秋仲秋之際旱暵為災則雨澤亦不可缺况北土乎是七八月之間者不必指為五六月之間也至於十一月徒杠成十二月輿梁成者蓋主溱洧言溱洧皆在大河之南其寒不如北土之甚九月未可成徒杠十月未可成輿梁况當九月築塲十月穫稻之候不可妨農必田功畢然後為之至十一月而徒杠已成十二月而輿梁已成非謂至是月而始為之也曰然則合是數説則周厯之紀皆夏時矣而夫子又何必告顔子以行夏之時哉曰商周厯數雖與夏同而正朔則與夏異夫子告顔子者不以厯數言以正朔言也意謂為邦者必改正朔以易制度商周之正朔厯數分而為二揆之於理固有未順惟夏之正朔厯數合而為一以三統言之則為人以四時言之則為春以十二月言之則為正月揆之於理則無不順故舉之以為萬世為邦者法也汲冢周書汲冢書云夏數得天百王所同其在商湯順天革命改正朔亦越我周王致伐於商改正異械以垂三統至於敬授民時巡守祭享猶自夏焉又曰維四年孟夏王初祈禱於宗廟乃嘗麥於太祖按晉狼曋所引周志之言見於此書則此書乃春秋以前之人所作其言雖不合於經而其謂周人改正朔不改月數及孟夏嘗麥則與五經所載周之時月亦無不合也史記漢書或曰史記秦漢以亥為正其紀年必先書冬十月而後書餘月則寅月起數秦漢未之改也而西漢書注文穎乃謂秦以十月為正月顔師古亦謂漢紀年先書冬十月繼書春正月者此皆太初正厯之後記事者追改之非當時本稱也以十月為嵗首即謂十月為正月今之正月乃當時之四月耳而近世呉淵穎亦取其説且謂蔡氏以嬴秦視三代然則秦漢之正果改月乎果不改月乎曰史記言秦并天下始改年朝賀皆自十月朔曷嘗以十月為正月哉如以十月為正月則十一月為二月十二月為三月矣而始皇二十九年登之罘刻石其詞曰時在仲春陽和方起與詩所謂二月初吉日月方奥同意夫十一月寒沍之極㣲陽初生和氣未動吕氏月令所謂隂陽爭者也果可以為陽和之起乎必孟春東風解凍仲春日月方燠然後可云是秦之二月不為十一月明矣三十一年十二月更名臘月嘉平是秦之三月不為十二月明矣漢仍秦正未之有改至武帝太初始改從夏正若以為漢人作漢紀而追改之則何故亦兼秦紀而改之乎是秦漢之不改月者審矣文穎師古之言皆謬妄者也呉淵穎反取其説而詆蔡氏以嬴秦視三代誤矣璽辯劉定之咸陽縣民段義於河南鄉修舍得古玉印文曰受命於天既壽永昌上之詔蔡京等辯驗以為秦璽遂命曰天授傳國受命寶改年號為元符秦始皇以藍田玉製璽六面正方螭紐李斯譔文以魚鳥篆刻之子嬰降時獻漢祖漢諸帝常佩之故霍光廢昌邑王賀持其手解脱其璽組王莽簒位元后初不肯與後乃出投諸地螭角㣲玷董卓之亂帝辯出走失璽孫堅得於城南甄官井中袁術拘堅妻得以稱帝術死璽仍歸漢傳魏𨽻刻肩際曰大魏受漢傳國之璽魏傳晉晉懐帝失位璽歸劉聰聰死傳曜石勒殺曜取璽冉閔簒石氏置璽于鄴閔死國亂其子求救於晉謝尚尚遣兵入鄴助守因紿得璽懐以歸尚送還晉方其未還也劉石之徒以璽不在晉謂晉帝為白板天子晉蓋恥之然則晉之謂紿得璽意者以解此恥也惡足盡信哉不旋踵鄴為慕容燕所取璽或者實在燕矣謂在燕則燕為苻堅所併而堅見虜於姚萇萇從堅求璽堅罵之曰五胡次序無汝羌名璽已送晉不可得也卒拒之以死蓋堅未嘗以送晉而璽於此乎亡矣謂晉果紿得之於鄴則傳宋齊梁而侯景取之景敗其侍中趙思賢棄之草間奔廣陵告郭元建取送髙齊齊亡歸宇文周周傳隋隋煬帝死宇文化及取之化及死竇建徳取之建徳見擒其妻曹氏奉以歸唐唐傳朱梁朱梁亡歸于後唐然後唐之未取朱梁也自云得璽於魏州僧僧得於黄巢亂唐之時而莊宗用以建大號則所取於朱梁之璽與所取於魏州僧之璽又未知孰為秦之故物也抑卒同歸于後唐矣後唐廢帝從珂與璽俱焚繼之者石晉晉出帝重貴降遼太宗徳光徳光以其所獻璽非真詰之重貴對以昔璽既焚今璽先帝所為羣臣共知蓋自有秦璽以來其間得喪存毁真贋之故難盡究詰而至於重貴降遼之日秦璽之燬于火也已灼然著於人人口耳自是以後有天下者不託以為言矣哲宗蔡京乃能復得之於咸陽豈堅之所瘞藏至此而始出乎非也是又作天書之故智也天書號年為祥符秦璽號年為元符既紹述其乃考神宗之法又紹述其乃髙考真宗之符不亦異哉堯舜禹之傳國其言著於書曰惟精惟一允執厥中言為國之道也秦始皇之傳國其言著於璽曰受命於天既壽永昌言享國之福也志於其道者福從之志於其福者福未必從之假令哲宗所得信為秦璽而其短世絶傳何有于受天命而壽昌哉信元后所謂亡國不祥璽爾其後徽宗以哲宗所得者為未足而復製二璽其一龜紐六寸文曰承天福延萬億永無極謂之鎮國寶其一于闐大玉二尺許文曰範圍天地幽賛神明保合太和萬壽無疆謂之定命寶與哲宗所得曰受命寶者為三已而悉為金人所俘以去前此金人以遼取石晉意其得秦璽於獲遼主延禧之日責而徵之延禧訴以兵敗失於桑乾河及既得於宋自謂愜所欲而義宗守緒死于蔡州幽蘭軒又為煨燼然則哲宗之所得縱使真為秦璽元人亦不得取之矣詭妄之臣乃猶以之藉口欺世基禍黷武亦獨何哉詩曰投畀豺虎豺虎不食投畀有北有北不受投畀有昊言歸諸天庻乎禍端永絶也其亦無如之何而為此言哉其此璽之謂哉明文衡卷十五
