body:
  text: 明文衡巻七十三明程敏政編神道碑大明勅賜故開國輔運推誠宣力武臣特進榮祿大夫右柱國衞國公追封寧河王諡武順鄧公神道碑朱夢炎洪武十年冬十有一月初九日開國輔運推誠宣力武臣特進榮祿大夫右柱國衞國公鄧愈自河州召還至夀春以疾薨訃聞上哭之哀為輟朝三日詔追封寧河王諡武順其月十九日柩車至三山門車駕臨奠且親視其葬地而舊塋在鳳臺鄉者狹隘弗稱上乃遍覽傍近岡阜擇於城南西山之原寛平爽塏勅有司營建墓兆仍命遷王母夫人及弟冔之喪同葬焉凡喪事所須皆官給之恩至渥也上猶念其功不已召臣夢炎等於廷諭之曰愈事朕二十二年東征西討勤勞至甚厯鎮八州有功無過爾其撰文刻之石以昭不朽臣謹按公牘所載賜名愈泗州虹縣人三世弗仕以王貴曾祖父大公贈資善大夫中書右丞追封臨淮伯曾祖母孟氏追封臨淮伯夫人祖父大公贈榮祿大夫中書平章政事柱國追封南陽侯祖母戚氏追封南陽侯夫人父諱順興贈特進榮祿大夫大都督府右都督右柱國追封衞國公母張氏追封衞國公夫人王生而魁偉幼有大志勇力過人元季壬辰天下雲擾王父衞國公起兵於鄉遂戍臨濠與元兵戰死之王兄友隆代領其衆未幾友隆病卒衆推王領軍事年方十六王出戰必挺身破敵軍中咸服其勇嵗乙未上駐師滁陽王自盱眙率所部來附充管軍總管其年夏六月從渡大江克采石取太平繼而元將曼濟哈雅以舟師扼采石陳額森合兵數萬逼城下上親督兵禦之調王與魏國公以奇兵出其後大破之生擒陳額森丙申三月定金陵拔溧水破鎮江王皆與有功陞元帥出守廣徳冬十有一月長鎗謝元帥率衆來冦王出城奮擊俘其總管武世榮及軍士一千餘人丁酉三月轉行樞密院判移戌宣州七月領兵取休寧績溪乘勝克徽州元將敗走十月淅江苗楊元帥率衆十餘萬來攻城時徽州新附城郭未完守禦之器未備王激厲將士明立賞罰與越國公胡大海等分門竝出奮兵力戰大敗其衆生擒部將胡辛等一百五十八人賊衆奔潰婺源元汪同僉領兵來降戊戌正月擊破特穆爾布哈元帥寨斬首五百餘級追至婺源東門擒殺特穆爾布哈獲士卒三千餘人遂克婺源三月取嚴州四月攻淳安縣賊帥金子珍敗走獲馬一百餘匹降其頭目軍士三千餘人遷同僉樞密院事五月浙江苗楊復率衆屯徽州烏龍嶺拒却之九月轉僉書行樞密院事已亥正月領兵略浙江臨安大敗張冦於閑林寨庚子七月鄱陽院判于光右丞余椿擊走偽漢部將辛同知取饒州遂以其城來附有㫖命王往鎮之饒城彭蠡湖而偽漢主陳友諒尚據江州數遣舟師來攻城王斂兵東門外與余椿于光等連營以拒之屢殱其衆賊兵遂退辛丑正月除江南行省叅政仍兼僉書行樞密院事總制各翼軍馬饒之境内弄兵者尚懷疑阻王推誠結納撫以恩信於是左丞吳宏等皆請降八月領兵襲浮梁偽叅政侯邦佐棄城遁八月取樂平擊敗蕭總管五千餘衆擒萬户彭夀等六十八人饒境悉定進取江西十月駐兵於臨川之平塘時鄧克明據撫州遣使通欵而實無獻城之志王知其情卷甲夜趨比旦入城克明單騎遁翌日遣人以分省印來獻王號令嚴肅秋毫無犯江右之民室家相慶爭持牛酒迎勞王悉却而不受是時上親討偽漢主陳友諒於江州友諒敗走遂下江西命王以步兵來㑹車駕至南昌有㫖授王江西行省叅知政事留鎮之時壬寅正月四日也癸卯夏四月陳友諒悉國内之兵圍江西江水暴漲㓂舟直抵城下王與諸將恊謀固守屢挫其鋒賊勢大沮相持者凡三月㑹上親率援兵至湖口友諒懼而退大戰康郎山友諒竟死甲辰三月新淦土豪鄧青叛以卒二萬人據永豐王調兵破之擒首賊胡理問劉右丞五十一人八月從開平王平臨江之沙坑麻嶺十洞諸山寨合兵圍贑州降之南安南雄韶州皆送欵乙已正月進江西右丞加湖廣行省平章出鎮襄陽西抵巴蜀北控河洛烽火相望新附之民未有定志王撫而鎮之民懷其惠軍忘其勞遐邇悦服吳元年十月擢拜御史大夫洪武元年命大將軍經略中原而以王為征戎將軍征取江淮未取州郡三月攻唐州克之又取南陽生擒蔡國公史克新等二十七員軍士一千五百人馬一百五十匹七月克隨州右丞王誠降九月進取洪山老馬劉寨夜四鼓斬闗而入擒殺甚衆冬十有一月率兵討蜀河莾張獲之金商均房之境悉定三年命王為征北左副將軍平隴右大敗王保保于定西招諭河州土蕃諸部元帥何索諾木布哈鄂爾濟汪來等皆納印請降於是河州以西朶甘烏斯藏等部來歸者甚衆冬十有二月定功行賞特封衞國公食祿三千石賜以鐵劵五年命王為征南將軍討灃州等處溪洞蠻夷平之九年吐蕃所部州城邀沮烏斯藏使者掠其輜重有㫖命王為征西將軍往討之十月王與副將分所將兵為三併力齊入覆其巢穴窮追至崑崙山斬首不可勝計獲馬牛羊一十餘萬上嘉其功遣使召還未至薨王以元後至元丁丑二月十五日生享年四十有一兄弟三人長即友隆弟冔仕至羽林衞指揮僉事先王五年卒夫人曹氏側室王氏徐氏子男五人長鎮羽林衞鎮撫次銘次鐸次銓次太平奴皆庶出女四人長女夫人曹氏出也為秦宫妃次適河南護衞指揮周巖餘尚㓜孫女一人王之葬也以是年十有二月二日丙午惟王器量宏偉而沉毅簡重謙恭慎密而奉公守法臨大敵而不懼有大功而不矜又能禮賢下士寛恵愛人廣徳宣州徽嚴饒撫南昌襄陽八州之民至今猶懷其徳事母夫人能致其孝撫弟㓜孤能致其愛葢不獨將略之雄兼有君子之行宜乎為國元勲光輔帝業而膺寵眷之隆者也謹再拜稽首而為之銘曰有明受命地闢天開掃清六合鼓舞羣材惟武順王雲龍風虎仗策來從誓以身許飛渡大江奮戈前驅斧堅摧鋒何敵不除一舉姑孰再舉建業飈馳電掣百戰百㨗玉節飛雲金戈凛霜有赫其威往征羣方乃輯浙東乃撫江右大閫煌煌厲我城守孰謂狂豎而敢馮陵自速厥辜江漢底平帝用有嘉平章湖廣駐節荆南爰資開蕩化仇而恩循暴而柔以徳輔刑澤及八州武功告成四海一統爵以上公受天之寵烈烈征西極討窮追殱彼大戎張我皇威召還有期中道而逝九重痛悼三軍隕涕念王之忠開拓建功念王之徳無忝始終何以報之王封是錫衮衣繡裳光賁泉宅西山之原墓門有石視此刻銘永錫無極大明開國輔運推誠宣力武臣榮祿大夫柱國同知大都督府事江隂侯追封江國公諡襄烈吳公神道碑銘呉伯宗洪武十四年十一月二十六日開國輔運推誠宣力武臣榮祿大夫柱國同知大都督府事江陰侯吳公以疾薨于青州十二月訃聞皇上為之憫悼輟朝三日詔所司定贈諡加贈特進光祿大夫上柱國中軍都督追封江國公諡曰襄烈遣使者迎匶以歸洪武十五年二月丙子賜塟鍾山之陰上念其功不已命詞臣撰文勒諸豐碑以垂不朽伯宗職居翰林屬當執筆謹叙而銘之公諱良姓吳氏鳳陽定逺人初名國興後賜今名氣岸雄偉性質剛直與弟禎俱以勇力稱元末羣雄竝起海内鼎沸皇上以聰明神武仗大義奮起布衣公兄弟委身相從服勤左右上深器焉甲午秋從上取滁州乙未春從克和陽常為先驅戰皆有功六月從渡大江與元兵戰於采石拔其營乘勝克姑孰尋下溧水溧陽丙申從定建康戰功為多又從今大將軍太傅魏國公徐公達克鎮江下常州屢著功勤厯陞軍職丁酉下江陰命公以指揮使領兵鎮守時偽吳張士誠據姑蘇跨有淮東浙右地大物衆兵食富强實江南一勍敵而江陰正當東南要衝喉襟之地士誠又多變詐動以金帛啗誘將士公行上諭之曰彼以其詐我以吾誠爾為邊將慎守封疆約束士卒毋外交毋納逋逃毋逐小利毋與爭鋒惟保境安民而已公奉命惟謹繕城池遠斥堠利器械嚴部伍士卒無敢逃亡無敢出境生事者敵亦畏公之威不敢侵犯數年上親將兵下江西克湖廣平偽漢陳友諒大軍屢出而無東顧之憂者以公之扞蔽也丁未大軍克姑蘇士誠面縛上以姑蘇承士誠割據之餘力戰乃服必得剛毅有智略者鎮其地遂以命公公至奉宣皇上盛徳紀律嚴明號令整肅軍民輯睦咸得奠安洪武三年天下大定論功行賞以公有守江陰之功封爵為江陰侯食祿二千五百石賜以鐵劵子孫世襲恩至渥也廣西右江諸州僻處炎徼去中國逺數千里前古號為要荒乍臣乍叛唐宋以來羈縻而已元都北方相去益逺姑息尤甚其俗狃於仇殺數侵盜邊境五年春命公將兵討之公率兵深入跋履崇山踐厯險阻剪除荆棘衝冒瘴霧勤勞特甚數月盡平其地俘獲不可勝計自是溪洞夷獠畏威懷徳革心向化輸租賦奉法令同内地焉先是上稽古制建親王為盤石藩屏齊王受封青州命公營建王府宫殿社稷公經營區畫部署軍卒竝手偕作功成而民不知勞公留青州二載得疾而薨享年五十有八公自起身行伍至為將帥受封爵始終一致有功無過故其薨也上深惜之恩禮有加焉公存時以公貴推恩三代曾祖三七府君贈鎮國將軍僉大都督府事護軍追封潁上縣子妣周氏追封頴上縣子夫人祖千一府君贈驃騎將軍都指揮使護軍追封延陵伯妣劉氏追封延陵伯夫人考似龍府君贈榮祿大夫同知大都督府事柱國追封渤海侯妣葉氏追封渤海侯夫人配高氏封江陰侯夫人子男二人長曰高神䇿衞試指揮使次曰夀安女三人在室公弟禎亦以勲封靖海侯追封海國公先公三年薨嗚呼古今豪傑之士際風雲之㑹攀龍附鳳竭忠勤樹勲烈以名世者多矣未有如公兄弟同遇聖朝同立大勲同膺高爵輝映赫奕若斯之盛者也是宜勒諸貞石以光前古傳後世而垂無窮豈止照耀泉壤而已哉銘曰天啓洪運大明肇興豪傑率從霧擁雲蒸桓桓吳公剛毅英烈異才間出萬人之傑天戈義旗飛渡大江爭先鼓勇敵莫敢當既定金陵亦下京口公俱在行厥績多有江陰崇墉東南要衝屹若砥柱維公之功姑蘇新附命公綏靖紀律嚴明大小從令炎荒僻逺命公徂征厯代羈縻慕義來庭功成汗馬名載竹帛兄弟二人竝著開國河山賜誓列侯疏封慶延後嗣與國無窮生榮死哀富貴終始進爵上公錫諡具美鍾山之陰有碑穹然勒銘紀功何千萬年皇明開國輔運推誠宣力武臣榮祿大夫柱國西平侯追封黔寧王諡昭靖沐公神道碑王景皇明以神武定四方混一區宇懋徳禔祉東漸西被罔有内外時則有若貔虎之士翊運之臣汛掃爬梳用能咸和天休以集大命草昧之初各奏爾功歸于有徳也至于内託肺腑而建丕績者則成于天地涵育之功也是以一舉而開閩闗大業闢矣再奮而運斗樞大政立矣三厲而西略自西徂南大統一矣翊亮之功昭兹甚明此皇上之所以始終垂眷大有造于黔寧也王諱英字某姓沐氏鳳陽定逺人元季天下難作王在童稚喪所怙鞠于母氏母氏復物故時皇上龍飛鳳陽往拜于門上奇而育之賜國姓既長機敏過人數從征伐終日侍側無戯色亦無惰容𢎞量孝恭出于天性上益奇之滋欲試以事壬寅授帳前都尉出鎮鎮江焯有聲績甲辰除廣武衞親軍指揮使軍府肅然尋加昭勇大將軍廣武衞指揮使軍府益律戊申春正月上即皇帝位改元洪武既定鼎命王從征福建擒元平章陳友定三月復王姓鎮建寧三郡三年陞鎮國將軍僉大都督府事四年陞榮祿大夫同知大都督府時天下兵樞交壅治出聲生稱上意㫖中宫尤屬望焉九年乘傳繇陜右抵熙河布徳澤康逺人事有不便更張以聞明年副寧河王總大兵征蕃部西渡黄河略川藏耀兵崑崙轉戰千里俘虜萬計班師論功封西平侯開國輔運推誠宣力武臣階仍舊榮祿大夫勲柱國食祿二千五百石賜鐵劵又明年八月拜征西將軍將兵征西蕃降元萬戸且實勒戩及副使松多爾濟鄂温都爾人卒二萬雜畜二十餘萬是行平朶甘納琳七站地數千里十三年以陜西兵征和林元國公托和齊等略額齊訥渡黄河回賀蘭涉流沙偵騎報去穹廬五十里王分為四翼自以驍勇衝其中堅銜枚夜薄其營生擒托和齊知院阿珠全部皆降明年領軍從大將軍出古北口襲公主山長寨平四郡過驢駒河擄知院李宣還京副征南將軍統兵征雲南繇辰沅出羅鬼攻普定下之攻普安又下之轉戰而前元梁王巴咱爾斡爾密以司徒平章達爾瑪軍曲靖㑹大霧咫尺不辨壓白石江兩軍相望征南欲濟王曰我軍逺來利在速戰然衆未集不若以計破之乃陳兵陽若渡者遣奇兵從上流濟草山出其陣後為疑兵元軍見之震動王麾軍泅水渡元軍亦卻陳我師既成列鎧仗鮮明彼皆奪氣遂大戰自旦至晡蹀血震蕩王從鐵騎撞之出而復入生擒達爾瑪于淖元兵遂大潰僵尸相屬乘勝蹙之勢若拉朽梁王棄城走死之收其金寳撫又其民列衞布守諸郡皆納欵唯大理不下王率兵攻之段世據龍尾闗闗險王分一軍夜從間道登㸃蒼山襲其背黎明王䇿馬亂流攻闗闗不守至城前後受敵擒世拔其城㑹川永昌皆平間使下車里下緬不浹十辰雲南底平夏王與征南分兵東平烏蠻餘㓂諸部謂王師東下復叛夷兵二十餘萬圍雲南四十餘日王以鐵師萬人馳捄之虜聞拔營夜遁時曲靖永昌皆失守王次第復平之事聞詔征南班師王留鎮焉二十一年春平摩沙勒斬首千餘級三月思倫發以三十萬㓂定邊東川廣西往往遥應之王率軍三萬禦之期日合戰至期分軍為三蠻以象乘高撞我右軍右軍少却王下令曰却者斬左軍與之鏖中軍右軍夾攻之聲震山谷蠻酋刀斯郎斃于象蠻師大奔斬首無筭俘萬餘人盡獲其軍實思倫發遂降秋七月東川平冬十月廣西平誅者滿矣情俘五千餘明年平越叛阿資冬朝京師錫宴奉天殿賜金銀楮幣繒綵以萬計尋還鎮上慰曰爾在雲南朕無南顧憂二十四年阿資復叛王親擊之阿資僅免有詔命王還鎮以僉都督何某為平羌將軍代統其兵討之阿資來降秋遣使招八伯八伯來貢八月錫土田明年夏六月某日王立㕔事忽仆于地侍者扶入曰我中風不能起受皇上厚恩不能報矣遂薨時年四十又八軍民罷市巷哭訃聞上哭之慟輟朝制文遣禮部往祭命其子椿以喪歸葬發軍護送所至百司祭于道十月戊午王喪至自雲南上遣中使往祭明日追封黔寧王諡昭靖賜葬于江寧長泰鄉觀音山時某年某月某日也勅百官郊送比葬上諭祭者三皇太孫親王遣祭者再部府諸司祭者一曾祖考某祖考某父某竝追封黔寧王曾祖妣某氏祖妣某氏妣某氏竝追封黔寧王夫人明年塑像功臣廟敕太常祀以太牢凡葬費皆給所司不煩其家雲南民夷請立廟守臣以聞制曰可初娶馮氏故追封潁國公國用之女先王卒追封黔寧王夫入再娶耿氏故贈長興侯某之女子男五人曰椿馮夫人出也上賜以名由後軍都督僉事襲爵西平侯今鎮雲南孝友忠勤民夷悦附以兵梟越叛阿資威震諸夷可謂能繼王之志矣曰某耿夫人出也僉後軍都督府事曰昌曰景曰昻側室出也女四人孫女二人夫天地之道尚孝而右忠帝王之政褒徳而顯功王在鎮之二年中宫皇后薨水漿不入口三日斬衰哀臨終喪三年皇太子薨喪毁逾禮因以成疾孝足稱矣初莅督府以大學有正心之要綱目得春秋之㫖太極圖明天人之道出師陳情表著忠孝之實終身披誦不輟家事治而事上必本于忠勤在鎮之日侍衞不過數十人徳可徴矣其馭軍也敵攻無堅城守必飭從征討則效忠獻謀搴旗斬將及為戎首則神機横發出奇制勝功出漏刻有古良將風功可尚矣其為理也𢎞毅寛裕招納賢士長駕逺馭恩威兼下墾田至五十七萬畆而軍實充連嵗用師小大戰數十而軍士豫附忠可見矣嗟乎忠孝昭于身天下仰其光功徳著于時天下被其澤王之事上有子道焉有臣道焉上之撫王有君道焉有父道焉非他人為君臣者竝也生榮死哀可謂宜矣銘曰聖皇啓運受命自天王氣浮淮有開必先暨暨將臣天挺神武鼓盪風雲闔闢寰宇五神闡珎挺生異人依光日月下上星辰風雲景從發迹海邦遂荒其區遂搤其吭沈沈樞府我寵居之秩秩皇猷我儀圖之載敷恩澤西涉渭源載敡國威西上崑崙賀蘭之墟流沙之阻兵不頓刃霆驅星昈茫茫井絡氣交神州載清載夷投鞭斷流式遏王誅自爾南夷日月出矣爝火何施天兵一麾仆山摧壑封其鯨鯢以示大僇頟頟其城大纛高牙萬方攸同六合一家布徳㢮威一紀是釐曶爽闇昧莫不恵來皇帝曰咨予嘉乃績黄金大帶龜判琮璧鈞天無人陟帝左右帝曰嘻哉朕心曷究追王黔寧錫兆京畿以享以祀以介繁禧推尊王爵上及三世澤逮漏泉無幽不届子孫繩繩世有封爵允忠允孝以永天祿觀山之原神道有門刻銘貞石以勒殊勲明文衡巻七十三
