body:
  text: 明文衡巻九十六明程敏政編哀辭彭百鍊哀辭有序楊士竒宣德五年上憫江西之民困於奸吏豪民漁敓無厭也用璽書遣使廵視除兇去弊以安善良使者以朝廷所建設縣之老人周悉民隱所至事必咨之而惟其言之聽不疑然是時老人非皆出於推擇善不善相半不善者把持譁訐為能事其善者亦且斂手避之而縣長吏鮮不受制於是奸豪吏民聞使者來惴惴懼旦夕且死暮夜走跽老人投重賄哀叩求活既納賄曰吾庇汝汝謹毋忘我而凡所對使者言某是某非非盡出於公矣蓋所在皆然使者至泰和留浹旬治事竟將行矣時監察御史彭百鍊侍親家居親喪有事於外適暮風雨大作馳騎過快閣下使者侍坐閣上倉卒不及下避徑馳去使者遥望見之遣問知百鍊也明旦使者去之萬安龍泉還止廬陵㑹有按察使官來問使者言百鍊馳馬不下遂趨泰和召縣之衆老人索百鍊居鄉所作愆過咸對無之至再三衆老人對如初惟一老於百錬素有憾貎欲有言乃悉出衆老之無言者而留欲言者導之言遂掇拾其嘗買妾及田四事而其最妄者謂挾制縣官放免百夫長溫彦琮得白金三十兩遂令書狀乃復進衆老之無言者出狀而掩其前之半以後半空紙俾聮書姓名為據蓋衆老實未知狀所言何事也按察司官遂令衆老以夜伺百鍊而執之然猶未有固必意密戒云如其他出即止勿執亦勿泄言適百鍊治喪事出外一二老人欲得按察司官意躬率百餘人夜走數十里外蹤跡掩執之百鍊平素負氣義侃侃憫窮嫉邪遇事直發靡所顧避雖退處鄉䣊不變以是滋召怨其居鄉時朝廷造海舟令民夫探桅木泰和當出三百夫以富民三人充百夫長率行傅著已定縣時惟丞治事孱弱不能制下奸人及吏胥謀茍利盗出縣帖復追鄉二百八十人皆為百夫長期一人得白金十數兩免之於是六鄉讙然大擾溫彦琮者百鍊姻家素窶甚預焉計無措走告百鍊百鍊入縣庭索其牘閲之其所追二百八十人不具按檢乃言於丞丞實未嘗知也遂悉罷二百八十人不追擾者以定皆德百鍊而奸人邪計不行愈益側目之矣百鍊既被執至庭下得覩老人所具事狀曰果如老人言宜有告者今既無告者請及老人面對就死不恨不聽遂械繫送詣使者轉送京師凡使者所送詣京師非死罪皆發戍逺邊獨百鍊適遇寛恤之令得納米贖罪罷其御史而命吏部改授官未及以疾卒百鍊由進士為御史其文學皆有所自得非尋常之為進士者可及其仕必欲行所學不肯媕婀翫愒其所歴兩淮江浙廣東皆有政績見於其人稱道思慕未已也而閒居無事乃遭罹若此豈其命歟然而獨霑寛恤之令將改授官矣無幾竟卒信其命乎自百鍊被執泰和之人無貴賤賢愚來京師道其事者凡數十人如出一口故卒之日京師縉紳君子皆傷悼枉之古之人有言蓋棺論定百鍊庶幾可以無愧楊氏於百鍊累世姻婭雖百鍊為人素於余不相合然不合者一人之私也所謂傷悼枉之者衆人之公也君子不以私廢公故為述其得罪之由為哀辭使其家刻諸墓蓋曰屈於前尚可信於後也其行之見於墓銘者此不復出哀辭曰百里之民有耆有耄用其惇厚率民于道亦資正言禆輔邑里逝者何臧來者而否邑有視聽蔽其明聰衡從肆厲為下斧斨貍以牧雛狼以牧豚誰實使之於乎匪仁誰實聽之漫不加省惡者脫罟善者墜穽直者共忿邪者衆説柔者以全剛者以折嗟世之人莫非命焉憎愛廢舉彼胡能然惟命之然成是邂逅譽毁得喪奚彼之詬嗟嗟百鍊命也奈何宵人之怡君子之嗟蔣隱溪輓辭三首顧瞻兮堂前巻帷幕兮藉蘭荃陳清醑兮載肥鮮韻悲管兮切哀絃凄風激兮櫺軒雲黯黲兮靈來旋恍如睹於形色兮儼若聆夫笑與言言可聆兮意不傳悵思公兮臨几筵北風凛凛兮天雨霜木葉脱落兮百草黄翩銘旌兮辭髙堂登靈車兮秀冲岡蒿里歌兮哀以傷𤣥室一閟兮夜甚長魂渺渺兮何方螺山崔崔兮螺川湯湯青原與白鷺兮鬱相望悵思公兮遊故鄉玉珮兮瓊琚霓衣兮霞裾秉元化兮握靈樞列缺從兮豐隆趨倐隂而陽兮忽巻而舒睨視濁世兮如汙渠飄然乘風兮凌太虛參王喬與韓終兮列仙為徒遊紫微兮帝之都悵思公兮邈天衢楚林王先生哀辭有序楊溥予遊鄉校時湖湘間有若三吾劉先生南賓陳先生以碩學雅德顯名當時及予出仕皆物故矣每以不及見為憾今觀楚林王先生行跡乃知其與二先生為同輩重有感焉先生子愷僉廣西憲司事憲僉之館甥工部虞衡郎中程鑑皆以廉能名詩書之澤尚存而先輩不可作矣為辭以哀之辭曰楚山髙兮湘水長仰浮嵐兮俯流光可樏兮可航懷髙人兮長往獨惆悵而悲傷繄佔畢於鉛槧兮將求志於所獨也出膺民社兮亦非大賢之路也緬惟前脩孰不欲為伊兮為周抑有命兮何求嗟彼昧者由顯而河兮較其所獲孰為優兮望瀟湘兮延佇挹馨香兮蘭浦諒天道之可徵兮尚有觀於先生兮楊處士哀辭有序胡儼處士諱美字子將姓楊氏元太和州文學諱榮之子翰林待制諱景行之孫贈富州尹騎都尉𢎞農郡伯諱復圭之曾孫其先系出華隂漢太尉震後為廬陵人處士㓜頴敏讀書為文超於行輩善事重闈以孝稱處昆弟克盡友愛其最難能者蹈危履險以𦵏其叔父雖盗賊兇愚亦感其誠意求之古人不槩見處士之德善如此然卒遭喪亂蚤世不克竟其所施誠可哀也既卒之四十有四年其遺孤左春坊左諭德兼翰林侍講士竒懼潛德弗耀乃以劉禮所譔行述來徵言余惟有德者必有後而後嗣之賢亦必本其先觀於諭德可以知處士矣故為之辭曰若有人兮好修承華胄兮西州抱德美兮襲淳烋玉韞櫝兮不售華綵衣兮紑紑親余愛兮樂孔休鹿之鳴兮崇邱嗟子衿兮我求漸摩兮息游繄我心兮悠悠迎安輿兮山之陬攀桂枝兮聊淹留何狡童兮黠偷逞不軌兮競戈矛倐豕突兮怒獳肆毒噬兮仲叟有昊兮莫投淚浪浪兮曷能収既不余兮閔憂反縶余兮見讐鷹忽變兮為祝鳩幸余鑒兮慺慺斂遺骸兮裳裘閉重泉兮林之菆擷芳兮採莍奉朝夕兮綢繆嘅同氣兮拘俘捐余佩兮是醻念復路兮囘輈野闃寂兮將誰儔對農人兮事鋤耰徒悵望兮西疇歳苒苒兮不我優悲鶗鴂兮鳴鵂鶹哀人生兮迫遒脩短數兮抑又何尤獨令德兮詒謀鍾厥嗣兮遺庥慶澤衍兮聲光流天之報施兮孰云其幽呉先生哀辭有序梁潛呉先生孟勤吉之安城人人予自㓜聞先生名甚熟及來史館始獲拜先生焉先生雖老色夷氣暢善道古今事終日不倦時方纂集太祖髙皇帝神功聖德簡牘浩繁事有弗得其端者或以質之先生先生手按其書口誦其語出其端緒節目若引瓢而注之聽者如目睹其事蓋先生識見高明非徒能記憶也其於英豪偉傑之士心志謀畧設施後先亦自然符合嗚呼使先生用於時措之事業當何如也然先生方慕古之廉士其自視甚髙不求阿色於時由是遂與世抹摋終身負此自困不改也其為文章簡質而溫潤操筆立成若不甚經意者既成讀之雖苦思力搆者不過是也史書成得䝉恩賚授河南開封府學教授蓋聖上意以是可優老先生孰意先生遂去此長逝不返邪方去時翰林羣公合交遊之士以相餞莫不舉觴相屬謂先生復來固將動色以相候曾幾何時而盍簪牽袂之歡遂為扼腕傷神之痛於乎悲夫賦之深而未竟其施世固有如先生者豈非命邪先生長子善存謀返𦵏而未果今翰林學士解公已為銘其墓余因悲之以辭曰崇岡兮峩峩春將暮兮水增波蘼蕪綠兮桃始花悵獨望兮天之涯君不復來兮予恫而嗟學之茂兮𢎞暢承先啓後兮伊誰弗諒彼連駟兮充逵獨方輪兮焉之彼挿羽兮薨薨獨戢翼兮噤不以鳴名之光兮行之塞人弗施兮於已焉汩古則然兮今奚惑汴之濱兮河之阻洪濤湯湯兮不可以度羗獨滯此兮不還雲横天兮地漫漫使我悲兮憂萬端酌清酤兮盈樽陳嘉殽兮藉以蓀神來歆兮不可以同吉之水兮孔幽上有叢木兮枝相樛君不懷兮故邱秋霜兮被野曠茫茫兮宿莽君曷寧兮故宇大明故左春坊左贊善贈太子少保諡文肅徐公誄辭有序金寔洪武壬午嵗寔始來京師天台徐先生好古時方為太學博士與從父傅霖翁同官甚相好故寔得亟見先生引接良厚永樂二年仁宗立為皇太子妙簡輔導之官先生由太學入為春坊司直寔時沗以翰林官屬進講經筵獲與先生朝夕同事既而又獲同僚寔嘗視先生為父行而先生謝弗居遇之益親後寔以母憂去官己亥嵗復來京師值先生病已篤聞寔至强起衣冠二子掖之坐出酒饌享寔亹亹談别後事爽然若無疾者且曰老夫却粒已期月日唯飲醇酒一爵今日見吾友當倍之復再舉爵一飲而命二子為寔引滿數行既醉辭去將趨行在先生送之及階執寔手謂曰吾亦當考績計不能北上幸為我謝故人前途宜自重吾與子訣矣因嗚咽泣下寔亦不能仰視明日登舟而先生竟卒時十月二十一日也仁宗在東宮深悼痛之自製文一再遣官諭祭且將裒其遺文梓以傳甲辰秋即皇帝位首詔贈先生太子少保諡文肅建祠墓下勑有司春秋有事復四家丁役以奉祠事嗚呼先生以純粹博雅之學勁正脩潔之行和而不可同謙而不可踰所謂有德有言者矣雖不及柄用以大其施而當儲君毓德之日能以聖賢治心脩身之道引翼取信卒光身後之名奚負所學哉先生之仲子衍受辟為邑校官奉少傅東里先生所譔墓誌示寔捧而讀之九京莫起益增感慕乃述其行為辭以誄之曰天台之山上應列星俯挹渤澥高抗青㝠扶輿孕秀夫子是承稺齡卓爾弗詖弗傾初游郡庠具曰老成論為秀士首詔賓興實華彪炳六館蜚英繁曜麗空忽見夜明萬葩鬬􅃩勁松獨貞司成嚴厲衆莫敢攖學徒千數畏若雷霆惴惴揖拜慄蹈矩繩夫子來覿渙若釋冰開顔霽威如酗解酲實由德孚孰曰意迎錫符分校士有軌程範鎔來秀若冶剖鉶太學三年虀鹽味經濟濟多士于于在庭悉屏糟粕浥以醇清儲皇毓德簡畀至精瓊琚玉佩峩冠彯纓引翼惟正啓沃惟誠旁塞多岐示之中行言出則俞有歌斯賡明良值遇宜作股肱胡不憖遺溘焉遐征哀訃上聞痛悼奚勝諄復賻遺終莫罄情迨于踐祚褒贈首膺秩崇師保諡錫嘉名尊軼三老榮重五更享祠聿建封域載營麗牲有碑𤣥堂有名樹之松檟雜以楸檉嵗時有事帝命使令牲肥酒香醆斚豆登薦祼興頫有赫厥靈𤣥液下滋幽光上升裕其孫子以及後生嗚呼夫子孰與抗衡疇昔好言遼邈九京光風霽月想見儀刑爰述衆美寄之哀聲有不知者庶幾可徵裴侍郎哀辭王直公裴氏諱璉字汝器監利人初游學郡庠年甚少已嶷然如巨人長者久之升太學擢知劍州三年陞浙江按察僉事改江西坐累謫興州太宗在位召為北京道監察御史陞河南按察副使又以累謫武清復被薦為廣東道御史仁宗在東宮雅知之擢春坊中允改大理評事又改刑部主事坐事降易州同知洪熙初圖任舊臣陞工部侍郎改北京行部又坐事去知涪州子綸為翰林編修得推恩及其親公遂棄知州就封以翰林編修文林郎致仕宣德十年三月十三日以疾卒于家年七十二公天資俊爽負竒氣眉目明秀議論英發率嘗傾一座其才敏過人當義而行無顧忌初在劒州州産茶民衣食之而為有勢者所擾公奏請禁止至今民頼其利為僉事在江西鉏惡佑善所至吏畏而民愛之其於賢者維持成就如所親及為御史彈劾不避權勢河南皂軍山冦發公受命往察之還上討捕方畧冦遂平階州賊王金剛奴等僭名號聚衆八千餘人勢悍甚又命公往公得其巢穴以計擒之而請釋其餘上初遣公謂還當大用而用事者嫉公絀其謀間踈之不召見而罷其為侍郎尤侃侃自信敬㳟朝夕有大臣之體在劒昜時興學養士至親為講説賞勤而勸惰諸生多賴以成流風餘澤今尚有存者蓋公之志夐然出儕輩故所至有立予之知者如此予所未知者計亦偉特猶是也平之庶知兩溪之忠與余之悲兩溪諱球字求樂一字廷振兩溪者其弟子尊稱之詞世家安成茨溪後徙家之葛溪余則周姓叙其名功叙其字石溪其號也辭曰瞻雲山兮安成西懷故人兮我心惋悽虎豹晝號兮鴟梟夜啼隂風悲慘兮毒霧㝠迷欲往招之兮睇艱險而無蹊天茫茫兮至道暌名昭昭兮日月齊於乎歔欷兮懷哉兩溪瞻雲山兮薊城北懷故人兮我心哀惻天門晝闗兮虎衞阨塞蛇虺縱横兮䕫龍斂迹欲訴帝之無由兮道邅迴而屏息魂恍恍兮渺何極淚淋淋兮氣填臆懷哉兩溪兮寃誰與白瞻雲山兮湘水幽緬懷古之人兮我心增憂古人今人兮我何尤攄忠滅身兮異世同猷哀莫哀兮沈清流慘莫慘兮魄野投死生一視兮如彼浮漚千秋萬古兮屈劉匹休太傅安國孫㳟憲公誄劉定之維昔太公生周邑姜婦文嬪武孕成啓康受封于齊今幾千禩維安國公復起齊地篤生聖后配我宣宗以母皇上迺登三公維公之德以敬為主曾藴丹書厥名迺取維公之爵自伯而侯進號大邦寵祿優優維公之夀踰八望九玉蟬金貂輝映白首夀爵及德與太公同亦𦵏于京靈旐不東内相期頤後昆繩蟄五子十孫殆過呂伋皇家萬年誰與齊休曰伯叔舅異姓元侯明文衡巻九十六
