body:
  text: 明文衡巻九十二明程敏政編墓表貞義處士鄭府君墓表樓璉金華之浦江有孝義門曰鄭氏鄭氏有好學篤義之君子曰處士諱洧字仲宗其言慤而信其行和而謹少受業于太史潛溪公劬躬勩志痛自繩斲籠鷄卧榻之側聞鷄初號輒危坐誦讀至夜二皷不休由是盡通貫聖賢經訓尤精於朱氏論議根據仁義下筆為文有竒俊語一時老儒多嘆譽之其家合族以食男女數百人處士事尊長待昆弟御卑幼壹以誠篤恭順為本上下莫不宜之洪武十九年詔天下度田繪疆畛為圖命太學生涖其役太學生有以賄敗者蔓連大家多坐死處士兄濓時主家政名連于牒當就逮京師處士老其兄奮曰吾家以義名吾先曽祖弟昆坐誣罪争先死維揚獄吾兄老矣吾可不代兄而使之就吏乎遂詣理自誣服死金陵其喪歸不惟其家哭之哀而鄉人靡不哀之不特識之者為之涕泣凡聞鄭氏事者靡不悼其不幸也處士曽祖諱徳璋宋青田縣尉昆弟相代死者也祖諱文轟父諱鉅母周氏配張氏有淑徳賢行子男二人櫟柏女二人孫男五人􅀈烝耿煔烐曽孫男一人瑄處士卒於十九年七月八日年五十有三以明年七月七日葬于白麟溪北二里潘坂之原鄉人私諡曰貞義柏有有文學與余皆師潛溪公處士遇余最厚柏以伯父左春坊左庶子濟所録狀來請銘誼不敢辭乃為表其墓曰孟子謂以法死者非正命亦視其所為何如耳使獲罪於義理而抵法如孟子之言可也倘所為合乎義而遭逢事變隕身于難得命之正也孰加焉故比干之死於君申生之死於父童汪踦之死於國孔子皆取之茍不由義而負恥含垢以全其生縱登上壽歿牖下君子視之猶狐䑕之斃腐曷足謂之正命乎若處士者以身代兄死于仁義其所全者大矣其於天之所畀可謂無負矣壽雖不長名則永存為善之報寜不在其子孫哉黄灣馬公墓表徐一夔黄灣馬公之既歿也其孤葬于其鄉菩提山長生嶺之原後十有二年值大朝更化徙郡縣巨姓居于中州馬氏亦徙居潁上又十有二年其孤自潁奉其母以還歿於濠上之舟中含哀茹毒裹遺骸而南與公合葬既襄事匍匐走見余泣且言曰我先人有潛徳不肖孤以奔播故不得請銘于當世立言君子以貽不朽今著作家為東南所推重者在先生矧不肖孤又辱有一日之雅寜靳而不為之執筆乎余記張氏陷吴門之嵗避地黄灣時馬公捐世未乆其孤嘗闢館以處我而使其子與姪於余授經余以亂故為三年留故知公為悉於義不得辭乃本其世系與其行實之尤章章者為之表公諱振字廷舉其先汴人從宋南遷居今海寜縣之黄灣譜牒散失莫能考其傳序大父以行稱是為萬十宣教父諱君玉習知鹽筴事元至元間仕為西路鹽司典史母鄭氏盛年而寡守志不易以撫遺孤馬氏世業鬻海藉羣鹵丁以事淋熬屬嵗大侵羣鹵丁散去其母盡鬻簪珥以活之公於經史頗通大意幼游鄉校以父喪未卒業而歸事母至孝色順辭婉迎承母意以理家政其後家日以裕不厚自封殖郷黨親戚有不能自存者皆周給之性度寛厚與人交不置町畦亦頗尚氣里有出已右者則折之以義使自媿伏平生不惑於邪説里人有疾輒赴詭祠吹簫擊皷刲羊釃酒曰以祛菑公曰此正所謂非其鬼而祭之諂也絶而不為浙俗信佛多貲之家莫不争施財以華飾其居曰以種福公曰彼惑於因果輪迴之説故至是施財於生前而收福於死後理無是也家雖餘饒不以一錢尺帛施僧惟篤於教事毎語其子曰吾觀諸孫多秀發宜擇良先生教之曰讀書知禮義可以持家可以發身將屬纊其子請遺訓又以為言故其子奉命惟謹雖在衰絰亟築館為設教之地故長史朱君右過之嘗本其意而名之曰詒教可以見其為人矣公之殁以元至正十有六年二月某日得年六十有一葬以某年十月某日配朱氏孝順慈儉為婦為母皆盡其道其歿也年八十有四而袝葬之日則大明洪武之十有六年正月某日也子男四長繼周次維周以督海運功元授杭州路總管府判官次用周出繼弟同知嘉興路總管府事某後次臣周後公十二年卒女二長適沈某次適董某孫男二人曰絅曰秩皆明經舉進士絅蚤亡秩今為潁上縣儒學訓導孫女七人曽孫十人女五人嗚呼自夫鬼之説盛於荆楚而江以南莫不媚鬼自夫佛之教行於中國而浙以西事佛為甚至於家塾黨庠之制既廢富而不知教不獨遐陬僻壤為然雖鄒魯之邦亦或有之夫人茍有材力命與時逢能使其家轉約為裕亦易易耳求其有卓然之見不媚鬼不事佛而鰓鰓然以教為事如馬公者蓋亦鮮見余以其事可以範俗是用掲之于墓朱處士墓表朱亷士有不階一命而功被乎鄉里力可以報怨而反施徳于仇人若朱處士文髙者可謂長者矣文髙一名崈世居金華之永康其地曰金成宋之初亡元兵之入括蒼者道出金華而永康正當其衝暴民乘間嘯聚剽掠處士與從兄平高糾率鄉民利兵嚴警以自捍衛閭井賴以安全大姓陳氏以武斷鄉曲莫敢與校平高獨與抗立不相下由是有隙平髙既歿陳氏挾舊怨以危禍中處士幾至不測有徳處士者知其寃狀以告縉雲陶翁翁力救之事以故得釋元既混一海内陳之弟有怨於兄詣官發其隂事陳敗其親戚僕從皆當從坐有司檄處士捕之處士不念舊事止械陳于官而為之言俾用自首例盡釋其從坐者所活百餘人時民方新附軍帥史弼署處士防禦鎮撫令搜捕反者利賞與者多縛獻平民處士憫其無辜悉縱遣之全活甚衆人益稱為長者嗚呼世有遭睚眦之辱輒深蓄不忘及其可報報之不遺餘力此其人視處士何如哉處士之先出於漢槐里令雲槐里七世孫汎嘗為東陽太守後移守臨海其孫埴復守東陽始自平陵來居東陽東陽今為金華金華之朱氏皆其後也始居金成者曰昌昌孫元吉是為處士之曽祖祖智父彦實皆不仕處士自幼孝謹宗婣鄉里咸稱其有敦睦之行以某年某月某日卒享年若干娶劉氏子男二人如璲如登孫男三人捨巳昶錢法曽孫男五人源祐宛寔宗寔好讀書有名士林某年某月某日葬于義和鄉松坡之原浦江義門鄭彬朱氏婿也以何之權所作處士行狀為之求文以表其墓嗟夫人有一行之善不及登載簡冊其事寖乆遂致湮滅無傳者多矣是故君子恐一善之不聞茍有聞焉亟為稱述以顯著其事不沒人之善也余故序次處士之行而表之以辭曰身居其位民社所繫遭時之艱所宜捍衛有若處士沉跡畎疆乃能奮身以保其鄉被兇加陷幾至不測在死而生豈伊人力及彼敗亡孰不擠之乃憫其黨活之險危功施鄉里徳以償怨兼兹二美古亦罕見自古為善福禄之根天之所報不必其身松石之原表辭在石後有顯者無昧先徳故元翰林侍講學士陳公墓表蘇伯衡在昔元至正己丑盜發海上又明年汝潁繼變不五六年淮東西江左右湖南北罔不煽亂如海中漚前者未滅而後者復起土崩之患危在朝夕其君臣當夙夜惕勵憂勤殫竭心膂撥亂而反之正若救焚拯溺之不暇乃誕相與般樂淫荒視宴安之日尤有甚者畧不以攘除事置思慮蓋懷奸怙寵專權稔惡蠱惑帝至于此則圖嚕特穆爾也公於時官文學憤激于衷憂形于色率御史善材抗疏彈擊不少顧忌萬一帝心感悟焉使帝因公之言力誅奸臣以謝天下反昔所為圖彌菑變猶可以登中興之功救須㬰之運奈何奸臣甫竄而遽用顧譴公非宜言而欲殺之由是衆正解體盜賊横行兵交闕下擁衆觀望者相隨屬㝢縣割裂生民塗炭大明問罪之師至通州帝遂棄宗廟遁而社稷墟矣是雖運祚之有所終厯數之有所歸抑豈不以疏法家拂士忽忠言至計也哉嗟夫亡國之主未有不以奸邪為賢而以忠讜為狂者也亦未有柄用非人以言為諱而國能存者也故公伯祖宋相宜中景定初以攻丁大全而編管建昌軍公以劾圖嚕特穆爾而幾見殺丞相之言不用後二十餘年而宋社以屋公之言不用後十餘年而元社以屋書曰與亂同事罔不亡信矣夫丞相也公也生與阨㑹何其絶相佀也豈非不幸與然身躓而名隨之初非不幸也而况元亡公分致死以殉國雖掣之肘而其心則與乃祖行軍司馬死汾水闗同諒也一門之内百嵗之間風烈相終始所謂世篤忠貞者哉嗚呼公姓陳氏諱達字元達温之永嘉人家婺之蘭溪自司馬始髙祖彦宋累贈少傅元贈中奉大夫秘書郎䕶軍追封永嘉郡侯諡安惠曽祖永春宋累贈少師元贈集賢學士資徳大夫上䕶軍追封永嘉郡侯諡恭禧祖自中即司馬元贈銀青光禄大夫大司徒上柱國追封温國公諡康順考諱萍元銀青光禄大夫大司徒宣政院使兼延慶院使領吐蕃宣慰使髙祖妣王氏曽祖妣楊氏竝封永嘉郡夫人祖妣楊氏封温國太夫人妣江氏封温國夫人而公沈氏出也三嵗而孤伯母陳留郡夫人江氏鞠育之長大年十五徴入宿衛二十學書於平章喀喇公庫庫待制杜公本學詩於張徵君天雨馬教授伯誠三十書名與喀喇公上下欽安殿成在廷善筆札者咸書榜上進獨用公所進者至正壬辰擢端本堂司經尋轉正字又遷文學立朝慕汲黯之為人事無大小言必剴切皇太子禮貌之不徒以其善書也劾圖嚕特穆爾實丁酉冬賴太子苦諌得不殺遂辭所居官明年遵海南歸永嘉即墓下以居從進士陳髙授尚書周易語及時事輒流涕於邑既而帝見亂甚始思公顧其兄大都留守阿穆爾克問公安在對曰病卧故里即日以徴事郎同僉太常禮儀院事召不拜又召拜集賢直學士亞中大夫兼太子贊善最後召以翰林侍講學士資徳大夫知制誥同修國史同知經筵事後兩召皆有御衣上尊之賜而公終巳不赴其言曰吾嘗見病者不早使醫師治之及在膏肓始召醫從事雖扁鵲亦走而巳今國事如此豈臣子之所忍見然賢如先丞相處輔弼之地猶不能存宋於垂亡况吾之才職以論思獨能存元於垂亡乎王師克温公自沈淵軍士出之引佩刀自裁軍士奪之乃斷髮示無用猶安置濠州後遇赦任便居住乃還蘭溪病風痺且三年矣聞有薦之于朝者遂却藥不御而卒公生以元之至治壬戌七月一日卒以洪武乙夘十月六日葬蘭溪縣甘棠鄉門村原以壬戌十月二十日娶江氏封永嘉郡夫人子男五曰智曰聦曰常曰定曰醜女三一適永嘉鮑行一適黄巖鮑丑一許嫁蘭溪楊􅀈孫男二震彰今翰林吳君况嘗銘公墓矣而聰謂伯衡不可無一言白公之志伯衡惟君子所貴大節為先公所樹立豈不偉哉乃若既貴且富而孜孜問學施徳於人而不自以為恩人即或負之而亦不以為恨他人未易能也在公何難焉出入兩宫待遇之隆賜予之渥他人不可致也何足為公榮雖其字畫一代不數人亦公餘事耳以故不備述而獨書其闗於國者表諸神道其辭不殺蓋以公言不用於當時為可惜公行無愧於先祖為可貴庶有國者以懲而事君者以勸云系以辭曰火之初爇未至烈烈升斗之水沃可以滅及其燎原煙焰漲天雖竭江河烏能捄旃國歩方艱不用公言國歩孔棘乃召公還有䇿莫施還也何禆不榮以禄乃分之宜國破城亡誓欲捐軀不獲直遂天歟人歟死雖不果義則無愧世其家者庶其在是國子博士王仲縉墓表王汝玉仲縉諱紳姓王氏其先太原人也初遷祖彦超為周鳳翔節度使始由㑹稽徙居金華之義烏今王氏遂為義烏人十三世祖固從安定胡先生遊登宋皇祐五年進士第得官恩陽令其後子孫皆業儒躋膴仕詳著王氏家乘考褘字子充以文行重海内與潛溪宋先生齊名大明初擢儒臺校理厯官起居注出佐南康臨漳二郡後朝廷開館修元史召為總裁官尋擢翰林待制使雲南仗節死時仲縉甫十三年聰明過人落筆為文沛然不可禦鞠于伯氏綬事母夫人何氏盡孝及卒哀毁踰禮未幾綬亦沒仲縉獨綜理生産作業㷀㷀憂患中而傑然負奇志視世務瑣瑣無足動其中暇日益取經史百氏言窮其浩愽㑹其旨歸曲而暢之觸而引之縱橫磅礴出入上下務探擷其精美乃巳潛溪先生一見即器之曰吾友王待制其有後乎一時俊傑多自服不逮蜀王尊賢下士聞之馳書幣聘致待以客禮仲縉痛先待制死節蠻徼遺骼未返丘隴白其情事王悼憫之給道里費以行至雲南訪求不獲遂即死所奠祭仰天號慟幾絶過者為之泣下霑襟述滇陽慟哭記以著志既還王慰勞備至蜀人無貴賤咸知敬愛居無何有以仲縉名行薦者徴諸天官授國子愽士諸生方翕然嚮慕而仲縉不幸卒焉實洪武庚辰十二月丙午也享年四十有一明年三月壬申子稌奉柩歸葬象鼻岡之原娶丁氏曹氏生四子長穆次即稌次稔次稚仲縉平生無他嗜好惟喜為文章有繼志齋集三十巻藏于家昔勝國之季海㝢割裂光嶽氣分不完學者所習肄委靡極矣待制公以豪傑挺邁之姿力矯時弊追古道而反之倡為雄偉閎大之辭際皇朝龍興之運俾天下後生晚進有志斯文者讀之若披雲翳而覩青天不知心目開朗也及持節使絶域慷慨徇義視死如歸遂使倔強蠻獠凜然知中國威風氣燄之可畏迨王師南征勢若破竹而六詔數千里咸入版圗公實有功焉僉謂天之佑相盛徳不在其身必在其後人仲縉年富力強學篤而行修其來者殆未艾異日必能繼厥先緒成一家言以黼藻皇猷鳴國家太平之盛夫何未及中壽而遽奪其生焉葬之五年王汝玉氏悲待制公不昌其嗣仲縉之不遂其志而表其墓曰天之於人賦以才者或不賦之以壽豈二者不得而兼有邪抑亦抱魁梧之才者能漏造化之機先事物之兆非特為人所忌嫉鬼神亦將忌嫉之邪夫亦天下之事有不期而相值耶若仲縉之才之壽其必居一於此矣余不得而知也待制公爽靈在天地間與日月争光而乃靳嗇其報竟何為哉竟何為哉然稌也績學能文王氏之澤庶幾在是明文衡巻九十二
