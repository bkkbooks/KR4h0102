body:
  text: 明文衡巻五十明程敏政編雜著燕書宋濓𤣥黄之間事變無垠辯士設喻以風以陳質往舊開今新作燕書四十首晉侯將伐楚楚子甚懼召六卿訊之曰楚國雖小自若敖蚡冒至於武文威稜氣燄懾彼諸姬今晉君不道乃謀兵入我是蔑寡人而死二三子也寡人耄矣不復親帥三軍以逆堅乃城郭以遲晉人不亦可乎王孫由于對曰然易有之王公設險以守其國非險國孰與守盍圖諸雖然城郭有時而墮楚國之南有方城焉其東有漢水焉晉人雖衆將焉用之雖然山川之阻亦可踰也若使舅犯守郢先軫保鄖叔􅆄禦雲中荀偃扼直轅誰能侮予雖然此猶以力言也齊民毒吾賦乆若綏之以仁馭之以寛繩之以禮則封内之民徳君以死守矣雖然是保民也非保國也楚子曰何謂保國王孫由于曰君務上尊天王下睦四隣分昭于上勢定于下上下有序疇敢搆兵是保國也楚子曰善於是遣公子結如京師左司馬戍聘於齊魯諸大國晉侯聞之謂諸大夫曰楚國方尊王睦鄰而以兵入其境不祥遂退師君子曰甚哉分之大也分為天則定乃靡亂何有兵禍哉易不云乎六二之吉順以則也失則凶矣燕與齊方睦齊人以燕不虞其入也將侵之武安君聞之走告燕文公曰齊將不利於我公宜謀之文公曰寡人所畏晉楚大國爾齊何能為武安君曰不然也臣嘗至豚澤豚澤之人養蜀雞有文而赤翁有羣鶵周周嗚忽晨風過其上雞遽翼諸鶵晨風不得捕去已而有烏來與鶵同啄雞視之兄弟也與之下上甚馴烏忽銜其鶵飛去雞仰視悵然似悔為其所賣也夫巫峽之險不能覆舟而覆於平流羊腸之曲不能仆車而仆於劇驂此無他福生於所畏禍起於所忽也文公曰子誠過慮哉不聽未幾齊果攻燕取十城君子曰蜂蠆且有毒況上國乎燕文為不知矣齊路寢壞桓公欲新之召工師翰具材工師翰伐巨木於營丘山中若樞若檆若魄旄若豫章無疵取而泛之河蔽流而下工師翰麾衆徒操剞劂斵之運繩尺剫之閤閤然槖槖然聲達乎臨淄之郊越五月路寢成桓公環視之東阿之楹有用樗者桓公讓工師翰曰樗散木也膚理不密瀋液弗固嗅之腥爪之不知所窮為柣為棖且不可況為負任器耶工師翰對曰臣之作斯寢也嘉木以為桯文磶以薦址畫藻以奠井堅堊以厚墉陶甓以飾黝臣竊以為盡善矣雖東阿之楹缺以一樗足之不虞君之見讓也桓公曰寢之鞏者在杗廇承杗者在桴藉桴唯楹耳一楹蠧則寢隳奈何不讓工師翰曰臣聞國猶寢也一楹蠧則無寢若衆壬進尚可有國乎桓公曰不可也工師翰曰君既知不可何為察其小而遺其大也桓公曰不知也工師翰曰臣請為君言之擅執國柄者有雍巫焉成内食之姦者有夷鼓初焉長君之欲者有寺人貂焉外惡諸侯而凶徳弗革者有開方焉是衆楹皆蠧矣路寢能獨存耶桓公悟曰敬諾於是解四子政而召管敬仲任之齊國大治君子曰工執藝事以諫忠矣斷而行之者非勇歟宜其上下相親伯業底定書曰從諫弗咈桓公有焉易曰納約自牖工師翰近之矣楚莊蹻過商丘之墟聞司馬鴻氏之妻嬰美而豔殺司鴻氏攘之未幾又將室衛人之白閭白閭宜衛人不從引錐自刺左右奪錐免蹻怒欲梟衛人白閭曰衛人厚我若此勿以妾故傷衛人也泣而往白閭得幸久竟忘衛人恩已請曰衛人女弟罃容顔姱嫭肌膚若琢玉善為陽阿七盤之舞翩翻如龍旋見者欲死君强委禽焉可妻也蹻從之罃至蹻絶憐愛罃終不自懌嬰則日媚蹻作狐狗熊蹻或一破顔輒出驕人曰主君贈我以笑矣主君面目有光唇如渥丹齒如齊貝音中黄鐘其美丈夫哉悔相從不夙也雖然今幸得侍巾櫛者殆天畀我寵乎言已手足皆亂無主白閭尤善媚其驕人比嬰有過無不及焉已而蹻専罃白閭甚恚往詬罃曰而溷彘耳遽忘徳吾乎不然何専我主君也嬰繼詈尤力罃起避之白閭與嬰逐噪不已罃問嬰曰而昔有良人乎無也曰有曰今何在曰人殺之矣曰孰殺之曰主君也曰然則主君而讎也而弗能報反爭一旦之寵不亦傎乎嬰不能答白閭遽曰妾夫子固在也罃曰而夫子固在而心儻未死曾記泣别時言乎白閭抱罃大慟嬰與罃亦泣下不能仰視君子曰大俠起南海中殺人肝為脯妻其女婦事與莊蹻正同南海之人無縛之者反北面事之爭權而矜寵已焉哉天實為之謂之何哉頓國之大夫權聞黄帝與蚩尤戰製角以象龍嗚樂之刳桐而髹錮焉畫為龍文日習焉其音鬱紆而迴旋優優焉廱廱焉可聽若能通乎𤣥潛者大夫吹向南山之湫以感龍湫中三足能聞角鳴意人將醢已呀然號林木皆動大夫大驚謂真龍吟也走謂公之竒曰真龍之鳴業業如靈鼔前後相續宛潭不能休吾向學者殆非也請改而習諸如何公之竒曰子所聞者能也非龍也龍之鳴人鮮能聞子之角固偽也今子又以能為龍益偽矣舍偽而學偽奚擇焉君子曰世之法孔子斷斷兮自謂得其宗者若真龍出鳴則駭矣鄭伯卒庶孽奪正公子五爭及厲公自櫟入國將盡劉諸公族懸劍于國門且下令曰敢爭者斬子俞彌方病聞之嘆曰是何亡國之政也乃令左右扶見公未至公遙呼曰大夫力疾而見寡君非欲嘗國門劍乎聲色俱厲子俞彌陽驚曰何謂也公語之故子俞彌曰君能如此過文王逺矣臣頓首賀且不暇況敢爭乎公解顔曰寡君焉能過文王也曰臣言不悖君實過之公曰大夫言何易也雖然幸卒言之子俞彌曰君之過文王者無他威勝也公悅前子俞彌問曰文王初伐犬戎次伐密須次伐耆䢴次伐崇侯虎而作豐邑於岐徙都之其威盛矣大夫乃謂寡君勝之其故何邪子俞彌曰文王之威能行於天下而獨不行於周宗故其孫子之蕃兄弟之國者十有五人姬姓之國者四十人此無他親親也今君欲兵之非威勝文王乎公艴然見乎色曰大夫言固善如儀亹之黨何子俞彌曰鄭之公族盡二人黨耶君奈何殲之臣所居之南有山曰陽都之山甚深羣熊萃焉熊性惡血偶度絶壑棘刺脅血見若濡縷熊亟爪之血愈滋爪之不已膚成坎原原如泉湧熊不能禁剜去其膚而血弗息竟擢腎腸以死鄭之公族猶一體也今因公子五爭不問小大盡劉無乃與前事類耶公矍然失聲曰吾過矣吾過矣遂下城門之劍寘諸公族不論君子曰鄭厲公之愎諫誰能犯焉子俞彌反覆言之而公弗格者以順入以正出也内經曰寒因寒用熱因熱用其始則同其終則異於戲豈特醫師之為然哉蔡人有列宗子泓性好潔惡人口過人與語遙答之且答且唾人進寸則退尺以避沐浴必十更湯收溼不以巾遡風乾之掘坎為匽而軒其上下疏河水隨慁隨流欲行人道汲井泉前後濯大雪不廢妻因病寒死然好嗅女婦足紈足紈若行縢纏三周而覆湧泉善垢或解之其臭逆鼻人不噦即吐子泓獨樂之驕人曰是何欝金之腴也婆律之潤也椒蘭之郁也寘諸袖中飯不甘嗅之神度弗爽嗅之怒不舒懣不釋也又從而嗅之瀕死召其子曰吾死矣粢盛薌合不爾求也嘉薦普淖弗汝覬也能時致足紈於柩前孝莫大焉蔡大夫聞而笑之君子曰古語有之大潔者必有大汚其子泓之謂乎魯之老父相與謀造狐白之裘紉之以密箴縁之以畫純佩之以長褑熨之以榆火擇彤笥承之趨魯君之庭而致辭曰吾儕小人得有闔廬以蔽風雨非君賜與出作入息而鼓腹酣歌者非君賜與男播於疇婦饁于郊以遂其生者非君賜與吾聞上徳不報於人為無禮於徳為諐義不祥莫大焉請以是為王體之共謹再拜以獻魯君曰寡人聞之君猶本也民猶支也君所以庇民如本之養支也爾二三老父之無衣宜於寡人乎是給今倒行而逆施之無乃不可乎敢辭二三老父又相與謀曰是服之不華無以彰君之徳也盍更諸於是以錦為衣繡以五色龍章鞶以朱絲襮以華黼有文爛如也又復趨魯君之庭而致辭曰臣等不佞長於蒿萊之野未嘗受教於君子不知以禮事君夫因物以合矩矩謂之章縁文以顯義義謂之範君有至徳而惟皮革之物是供非合顯之意謹更之惟君圖焉公曰魯國雖小尚敢私一裘乎禮若可受絁布惟盈如其不然五采奚益敢固辭二三老父又相與謀曰吾君誠賢君其不受者非有他也不欲重煩吾民我等當愛之以徳可也又進而致辭曰君之中心臣等幸已知之有君無臣世謂亂國臣不敢以䙝服汚于執事願以仁義為衣道徳為領忠信為紳亷知為縁使君服之長有兹魯國先公社稷永有攸賴不亦可乎公曰寡人敢不承敎君子曰魯之老父何其善愛君哉其氣和其詞婉以周其情懇愿而有依魯君應之若黄鍾大吕絃歌干揚洋洋乎相宣泠泠乎相應也君臣如此魯欲不治得乎禮曰無體之禮上下和同此之謂也腹擊至趙趙苦成常與之出游指山河曰畛畛乎有截也指民物曰棼棼乎衆多也指兵府曰矛㦸犀利也指内藏曰玉帛充牣也大夫上國也寧有匹于是乎腹擊曰敝邑索甚安能及此然有一說焉為君陳之可乎曰可曰南海之濱有昭支昷者居蛟汭之丘汭不産牛有繩犝來者大如獒其角繭爾栗爾昭支昷怖曰是何物也其友伯昏氏告曰此謂犝牛易稱童牛之牿是也昭支昷曰吾見貌牛者形咫尺耳其大有若斯乎懇其人購以歸驕其比鄰矜其輿皂自以無敵也他日甯宣子過焉謂之曰是未足為大也高涼之山有牛曰􅵈其項黄其尾𤣥其色類乎犈其重三百餘斤子盍致之昭支昷復往購以歸又自以為無敵也他日爰子􅎶過焉謂之曰是未足為大也空賓之林有牛曰旄赤鬛垂髀紺氂蔽膝體長而多力其肉重六百斤子盍致之昭支昷復往購以歸又自以為無敵也他日倨無膝過焉謂之曰是未足為大也巴峽之中有牛曰犘其毛拳然其睛煜然其角觺然其肉重一千斤子盍致之昭支昷復往購以歸又自以為無敵也他日梁都之舟過焉謂之曰是未足為大也合浦之間有牛曰犎項肉上葵龍胡下綏迅行如飛其肉重二千斤子盍致之昭支昷復往購以歸且詫人曰如此尚有可敵者邪津津焉悅囂囂然自溢也他日公孫伯光過之昭支昷出牛讎之公孫伯光曰是猶未足為大也岷峨之谷有牛曰犩鏤盪以為頂鵠象以為跟雕璧以為眥填脂以為凥其肉重七千斤子盍致之昭支昷惑曰有是哉雖然且將驗之迨至果如伯光言因嘆曰使人不我告我終矜犝牛大於天下牛也趙之河山民物府藏較之胡沈固為大國也比之齊晉則不及矣齊晉比趙固為大國也較之秦楚則雄强不如之矣君勿自足自足則驕驕則輕輕則殘民以逞國欲治得乎苦成常舌本强不能對君子曰人自狹者其不可哉齊景公懲奢而好儉諸大夫復日浸乎淫靡然懼景公之知矯情事焉每入朝駕羸馬樸車以從衣惡甚冠纓殆欲絶也景公謂其誠也憐焉召羣臣曰寡人使子囊帶賜爾等錦衣一襲及鞞琫容刀各一以為身章爾等毋過儉也皆對曰臣等藉君威靈得從大夫之後食雖弗鑿不我餒也衣雖弗華未嘗冽也願君久有此土俾萬世子孫食君之儉傳曰儉徳之共也共則一和儉則從康從康則豫一和則輯唯君圖之景公恱一日出游㑹諸大夫饗于鹿門入而觀焉其車則澤而煥也其馬則矯而騰也其服食器用則豐明精腴也景公以其紿已大怒曰叱嗟而吾臣也敢爾乎盡收而戮之君子曰書云作偽心勞日拙其齊大夫之謂乎秦昭王即位之三年中外士多去昭王患之謂陽山君曰寡人遇士不為不至矣先飢而餔之未凍而裘之寡人何負於士士之相視如弁髦將維縶之耶益離其心欲任其所之邪則去者日多矣弗禁國將空奈何陽山君曰君何患焉夫王孫非重甗不棲非山實不食非族林不懸聞人聲則逸弋人餌而罞之詔而馴之命之舂人立而下上其手命之水負壺出汲命作兠離桑林之舞則冠帶踉蹡而起夫王孫類夫人者猶可也至於甝虪則噬人之物昂首則百獸讋掉尾則林木震嘯咆則陰飈四發非惟不敢近矧敢狎獵人羉而縛之習而安之相與作角觝之戲跨項編須或翻出蹯下無所不至甝虪亦靈獸猶可也至於伯趙禽中微者爾技人引而羅之擾而柔之摶土為人獸神鬼面而空其中衣與皮如之令其為鬼則冐鬼面服鬼衣以出跳踉偃仆如畫至於人獸神皆然伯趙雖微猶禽屬也至於蚍蜉則蟲之至微者也形大於粟其目鼻入微不可見眩人以彘肪誘而致之集於乾壺𤣥與黄異貯序而教之布髹几於庭置二壺其上振鼓三初則𤣥黄皆出再則各成列奮首搖鬛相向三則紛紜交不可辨聞鉦聲各退入壺不亂夫王孫甝虪獸也伯趙禽也蚍蜉蟲也皆口不能言冥頑不靈其可服而制之者奠心志寧嗜欲故也況士靈於萬物者乎且士者國必資以成治者也昔我先君繆公西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉遂成伯業臣竊聞之先君嘗語羣臣曰林繁則衆禽來棲海寛則大魚來遊寡人之待士亦以寛故劒舄乃麏至耳今王之馭下如束溼晝不得寧夜不得息來者如入囊有入無得出者臣亦將去之况他人乎王若以誠待士縱其去來不問士若不至當磔臣以示不悔也昭王曰善鄰國聞之士之來歸者千餘人君子曰君子懷材抱藝孰不欲自見哉特患遇之非其道故避去爾禮云舉賢而容衆毁方而瓦合言寛裕也君子亦何心哉齊頃公欲賦民一丘出車一乘不從者死袁婁宰泣曰敝邑之賦急矣四丘一乗尚弗支也況倍三乎吾寧死爾不忍死民也弗奉令公使使者讓宰且召與使者俱宰至見公頓首請曰臣無罪盧蒲就魁在側斥曰汝惡得無罪立國養民古也瘠民肥國今也胡不朘民膏血以媚公爾罪一也公既棄民汝反欲愛民使諸侯不敢侵伐爾罪二也通國之宰皆徇公欲爾獨以正自匡而欲死之爾罪三也汝惡得無罪公笑而釋之君子曰古者諫有五有正諫有降諫有忠諫有戅諫有諷諫若盧蒲就魁之言其殆諷諫也歟韓帥師伐魏入舞陽魏人避之韓將公仲曰夫魏易搖之國也今弗鬬蓋弱我矣再帥師進必下一二城公叔曰不然魏國雖小許鄢在其南西河路其北長城界其西淮潁出其東是所謂險阻國也今無故我弱蓋有伏甲焉譬猶越人穽䑕鼠好夜竊粟越人寘粟於盎恣䑕齧不顧鼠呼羣類入焉必飫而後反越人乃易粟以水浮糠覈水上而鼠不知也逮夜復呼羣次第入咸溺死魏以舞陽餌我是寘粟於盎也無乃不可乎弗聽未幾伏甲四起韓師殲焉公仲僅以身免君子曰公叔可謂智士哉所謂智者察見隠微無所遁其情爾魏人無故而棄舞陽豈能弱哉蓋誘我也公仲遽信之何耶老子曰將欲取之必固與之其魏人之謂矣晉欒氏世為晉卿以財名至欒雩益務侈靡狗馬聲色無不好藉之舉火者百姓無規之者媚惑唯恐不亟求獒西旅訪神馬渥洼徵樂姬燕趙出則行馬擁犬還則吹竹彈絲為長夜飲酒酣連臂踏歌曰北邙之陰白楊悲止今我不樂日月馳止巻髪衰止飲酒沱止我心和止無日不然蓋藏皆空而為樂不厭雩覺召所嬖謂曰吾樂已太康家力不向單乎輒紿之曰魚鴈滿藪澤羊牛溢郊坰金帛珠玉充積庫藏何謂單乎雩復恱雩妻蓼媛罵曰蟯蛕所藉以生者在人腸胃中也噆其血膋日夜不止人因病厲死人死則蟯蛕亦槁矣爾曹藉吾家舉火旦旦蠱而伐之我家亡汝家得獨存乎衆畏蓼言以計去之嬖亂益甚雩以貧死百餘家皆散為丐君子曰山之陽有桑焉蟲穴之晝夜齧弗止桑瀋液乾而悴蟲亦無生者蠱其欒氏之客歟使戒蓼言亦何至於丐哀哉楚有鬬子般者貌肅而言莊言則必稱先王國人皆以為修潔人也一日飲薳啓疆家而沈尹夀師祁犂在焉師祁犂與沈尹壽語語近䙝鬬子般怒曰若等陷女蠱若渠略出入穢壤雖鬼見亦唾也尚敢颺言爼豆間乎衆皆色沮言未既一豔姬過門鬬子般起更衣忽見夫握刃趨甚疾衆隨之觀則所追者正鬬子般也初鬬子般通於姬姬知飲薳啓疆家過而目招之鬬子般將尾而私焉不虞良人見也沈尹壽拊膺嘆曰天下寧復有是耶天下寧復有是耶薳啓疆尤之曰子何見之晚也昔紀候好狙使狙師教焉狙師脫土肖人貌飾之冠九山之冠衣結霞之衣躡文鸞之履升降周旋人也拜立坐跽人也狙師度可用進紀侯紀侯觀之樂舉觴觴焉狙飲已竟跳擲裂冠裳遁去蓋狙假人貌飾形也其心狙也因物則遷子何怪於鬬子般哉今之世假稱先王以文姦言者衣袂相屬也子何怪鬬子般哉君子曰天之高也日月之昭也星辰之逺也步天之家咸得測焉獨人心之變堯舜有難知者觀鬬子般之事可為寒心矣齊西王須善賈海出入扶南林邑頓遜羣蠻中貿遷諸寳若毒冒頗黎火齊馬腦之類白光燦燦然遇東風覆舟附斷桅浮沉久之幸薄岸被溼行夷陰山中山幽不見日常若雨將壓地西王須自分必死尋巖竇絶氣庶遺胔不為烏鳶飯未入猩猩自竇中岀反覆視意若憐之者取戎叔雹葖委萎諸物指之食西王須方餒甘之竇右有小洞棲新毳厚尺餘甚温讓西王須猩猩獨卧于外大寒不自恤語言雖殊朝夕嗢咿作聲似慰解狀如是者一年不懈忽有餘皇度山下猩猩急挾西王須岀送之登及登則其友也猩猩猶遥望不忍去西王須因謂其友曰吾聞猩血可染􅖯經百年不蔫是獸也腯刺之可得斗許盍升岸捕之其友大罵曰彼獸而人汝則人而獸也不殺何為囊石加頸沉之海君子曰負恩悖義人弗戮鬼斯戮之矣西王須之見殺也宜哉雖然西王須固可殺猶施於異類也類同者亦有之豈惟類同而同氣者亦或有之奈之何哉天王之法尚在吾當執刑書以往玉戭生與三烏叢臣朋玉戭生曰吾儕宜自厲異時立朝勢人之門足毋陟也三烏叢臣曰此余切齒腐心者盍誓諸玉戭生喜乃㰱血誓曰二人同心毋循利毋訹有位毋附厥憸壬而移其行有違此盟明神殛之居亡何共仕于晉玉戭生復申前誓三烏叢臣曰言猶在耳何敢忘也時趙宣子得君諸大夫日奔走其庭三烏叢臣既悔復恐玉戭生知之又不得不往也雞初鳴即去候宣子入門有危坐東榮者舉火照之則玉戭生也各慙而退君子曰二子貧賤時其盟誠良及登禄仕遽變其初志何耶利害戰于中位勢怵於外故也士君子養於山林而壞於朝廷昔人之嘆其有感哉武安君說六國從親以孤秦秦恵王患之使犀首期齊魏與共伐趙以敗從約趙肅侯使使臣說齊魏之君曰臣之東鄰有長瀦君其妻終葵夫人妬虐其侍姬長瀦君苦之長瀦君之友六人家有如夫人者三和而不爭長瀦君泣而訴焉六人者各遣其妻載饔餼以食夫人且解之曰人所貴於婦者能樂其夫子爾長瀦君年將耄矣宜安之今因帷薄之故以傷其心可不可乎夫人答曰妾不佞不知明訓不能奉夫子致辱玉趾賁于兹敝廬有命敢不敬從然竊有辭焉長瀦君實耄子且㓜未能勝洒掃所恃以無恐者長瀦君存耳茍一旦溘先朝露吾屬將操瓢丐於道路長瀦君精神幾何寳之愛之唯妾爾侍姬唯欲是從長瀦君若死其目豈有淚耶肉未及寒已思移他家矣妾雖愚寧復計帷薄事乎六人之妻各歸逐其如夫人者今六國合從將以擯秦秦遣衡人一訹從約頓解而惟秦之令是從不亦難哉且說士之口是非紛亂唯其所命皆傅理善惑大王不可不察也齊魏之君皆曰善於是遣使至諸國從約復成君子曰七國之君甚矣無識也隨辯士之舌以為東西辯士升國勢降矣故當時謂無士為無國傳曰眩白為黑倒上為下其士之謂歟鬷夷子謂魏力叔牟曰越山之中多䝉頌玃父而牛尾貍亦産焉狸膋與肉間錯味㫖甚當林實秋肥狸日飫之其毛澤澤狸自料為人所忌穴山為宫樹石為栅聚籜為墉晝伏夜動無隟可尋者獵師嗾犬蹤跡之毁栅壞墉而煙其宫狸不能煙也閉目冒火出犬隨斃之力叔牟曰狸何罪哉鬷夷子曰狸何罪哉利其肉之膬也高國氏以富見禍人以為無辜殊不知從已召也高國氏亦牛尾狸哉君子曰匹夫無罪懷璧其罪信矣楚放宜咎者善為鸇學未三月皆馴縱之揚則揚呼之降則降指鶖鶬鳧鵠使之擊則擊無不如志西鄰有終利之伊爭能宜咎欲學之求鸇於太隂山使調鷹奴囚之七月有鶬過焉命鸇搏之鶬驚墜鸇亦墜對立煔枝上招之矯矯然逝矣餘者瘦死過半終利之伊甚慚往餂宜咎曰子何術而使鸇馴也宜咎曰吾亦何術哉予初得之也冠之以籠冒束之以絛鏇嚴之以鼓鼙承之以鞲養振之以鑾和使其目無邪視神無外馳時其飢也和水肉以炙之亷其饜也咽羽毛以洩之於是其天者全不知有人人亦鸇也故命擊則擊命止則止今子畜之以人不以禽乖戾其性情動揺其筋骸逆亂其血膋紊傷其羽翮不適其飽飢神既不完天者皆喪矣又烏能如人志哉唯恐其不縱也縱則颺去爾吾亦何術哉所用與子異耳終利之伊再拜曰吾因問調鸇而得馭將之術也君子曰豈惟馭將哉治民亦猶是爾楚將伐魯取其地召諸大夫問焉辟閭巫臣曰可神子魚曰不可楚子病之請言其故辟閭巫臣曰魯公失政季氏得民公伐之弗勝次于陽州齊侯唁公于野井而不能討魯之臣子枕戈待旦莫敢發者畏季氏威也君將求逞諸侯而儌福周公之廟奈何不伐臣故曰可神子魚曰周室東遷列國失序若聲罪加之以兵何君不可攻何國不可伐楚之視魯猶齊晉之視楚也魯可伐也楚能免焉臣故曰不可辟閭巫臣曰魯棄周禮唯弱强是視當齊肇霸衣裳之㑹九兵車之㑹四魯鮮不與聞晉文率諸侯㑹于温以臣召君不可以訓亦僕僕而往不遑寧處其蔑我楚國則曰是蓽路藍縷之邦可與行典禮乎楚國之民含怒日久非特君也康王即世魯公雖與二三大夫辱臨楚郊實怵於勢非中誠也不伐何以示逺臣故曰可神子魚曰周公相王室尹天下於周為睦分魯公以大路大旂夏后之璜封父之繁弱殷民六族使帥其宗輯其分族將其醜類以法則周公用即命于周其徳至今未泯也夫修惠以懷人人誰弗親逞威以上人人何能輯今以魯不我與而兵之以示逺其無乃非徳惠也乎臣故曰不可辟閭巫臣曰受姓定封孰非懿親諸姬存者其可數也哉明徳之弗崇則弗足以存且臣聞之立徳敷政立義和民徳天之明也義地之制也君人者則天之明法地之制以洽和民人古之道也今魯之公室弱民罹荼毒若入烈火無所避之棄而不伐不亦左乎臣故曰可神子魚曰王靈雖微天下共主楚國固强終人臣也以君伐臣是謂布義以臣伐臣是謂悖政四海弗靖職此之由君若以師宿于魯境東諸侯告于天王使一介之使以讓君曰魯也弱諸臣竊畔之致使其君越在草莽不能事宗廟諸姬竊憂之君為大國不唯其難之靖而土地是圖或為執事羞天王命我諸姬亦既有辭當以公徒三萬與君周旋於龜䝉之墟君其圖焉不知君將何辭以對也臣故曰不可辟閭巫臣曰天王崩王室亂劉子單子以王猛居于皇自救且不及況能綏我魯乎五侯九伯桓公實征之以臣伐臣非一朝夕今楚之伯與齊代興我若討魯之罪東諸侯震疊不暇其能有辭乎臣故曰可神子魚曰魯之為國宻邇於齊又甥舅也王室固多難魯之君子或藉齊餘威以安靖之楚師進焉諸姬必忿將為楚患是無故勤諸侯也如或還也勞師千里縻厥糗糧觸冒風露何益於國臣故曰不可楚子曰巫臣之言良欲帥師東聞齊侯取鄆居昭公乃止君子曰春秋大夫類多能言而麗乎理者何其寡也季氐逐君諸侯莫不聞楚能告天王致討桓文之功可繼也神子魚乃力遏之巫臣不務出此乃淩蔑我王室惓惓以威逺為言二者胥失也楚之為楚其不競也宜哉宋襄公繼伯將與楚子會于盂以乘車往而不設兵備通國人皆憂之莫敢言昆吾之叟曰君安則臣寧君設有難宋社且不血食吾屬將焉寘諸請昧死言焉俟宋襄公岀歌而過之曰有虓者貔其毛栩栩冠弁而揖吾不知死所密宻者阹鱗鱗者矛仡仡者夫始可貔與居貔乎貔乎良足畏乎君何之乎襄王怪之召而問焉昆吾之叟對曰聞君將與楚子㑹有諸曰然曰聞君武備弗之戒有諸曰然曰禮務從時政在體要佩玉鏘鏘不可薪於山何戈與祋不可酹於廟其理然也今楚人貔而冠者也君欲以文徳合之其術迂矣君之蒞政動法文王使文王遇貔亦使勇士操㦸逐之未必朝服與之揖也襄公曰人皆相率約君以禮子奈何欲興戎乎壇坫之間玉帛交錯而使甲士厠之人其謂我何不聽往與楚子㑹楚子以兵車至執襄公君子曰宋襄公為萬世笑者以膠柱而鼔瑟也膠柱而鼔瑟且不可況往㑹强國而不知變乎鄭人有愛妾魚者計無從得魚或汕或涔或設餌笱之列三盆庭中且實水焉得魚即生之魚新脫罔罟之苦憊甚浮白而噞喁踰旦鬛尾始搖鄭人掬而觀之曰鱗得無傷乎未幾糝䵂而食復掬而觀之曰腹將不厭乎人曰魚以江為命今處以一勺之水日玩弄之而曰我愛魚我愛魚魚不腐者寡矣不聼未三日魚皆鱗敗以死鄭人始悔不用或人之言君子曰民猶魚也今之治民者皆鄭人也哉楚萬臧語不更先生曰鼩之在田也彈丸欲擊盧犬欲磔山狸欲啖鼩苦之其黠者乃往依稷焉稷社之配也世謂之稷䑕人不敢圖意而之野巢也烏鳶啄其鷇鷞鳩殘其軀伯趙敓其室亦不能一朝居意而近人而家於宫則舒然安矣夫物尚有知人或失所依何邪不更先生曰若是余將焉依萬藏曰仁義汝稷也禮樂汝宫也人依乎仁義禮樂其孰曰不然不更先生泠然而悟君子曰人之智豈不物若哉物之専人則擾而離也詩云依彼平林有集維鷮鷮非平林固不集也人孰不智哉楚共王有照乗之珠愛之甚函以金檢命左右負以隨時岀翫之游於雲夢之澤失焉共王不恱下令國中曰有獲吾珠者予以萬家之邑楚國臣無小大咸索珠簡茅淘土鬨鬨者三月竟不得更數年繁陽之子牧犢於澤有氣青熒起菅中視之珠也櫝以獻共王不食言乃賜之邑君子曰仲尼既沒珠之失二千年矣求者非一世一人而弗獲之一旦乃入牧犢者之手可以人賤忽其珠哉衛靈公問治國之要於蘧伯玉曰寡人之國不為小矣乆而不治欲帥虎士以禦四封何如蘧伯玉曰可也非其要也遣使致聘以修鄰好何如曰可也非其要也曰慎簡百僚母曠厥官何如曰可也非其要也曰杜閼女謁勿使行政何如曰可也非其要也曰斥擯姦回崇厥正士何如曰可也非其要也曰儉徳是共屏棄淫侈何如曰可也非其要也曰懷保小民夙夜匪懈畏之如天敬之如神綏之若子何如曰斯其至矣有民斯有國有國斯有君民者君之天也君之則君舍之則獨夫耳可不畏哉公曰善哉言乎君子曰蘧伯玉之言其有激哉君者主民民之從君猶水朝宗振古然也而曰民為君之天何耶雖然天之生民使君主之不使虐之虐之非君也是則君為民立民亦重矣哉趙成陽堪其宫火欲滅之無階可升使其子朒假於奔水氏朒盛冠服委蛇而往既見奔水氏三揖而後升堂黙坐西楹間奔水氏命儐者設筵薦脯醢觴朒朒起執爵啐酒且酢主人觴已奔水氏曰夫子辱臨敝廬必有命我者敢問朒方白曰天降禍於我家鬱攸是崇虐焰方熾欲縁高沃之肘弗加翼徒望宫而號聞子有階可登盍乞我奔水氏頓足曰子何其迂也子何其迂也飯山逢彪必吐哺而逃濯溪見鰐必棄履而走宫火已焰乃子揖讓時耶急舁階從之至則宫已燼矣君子曰迂儒僨事往往類此是何可勝道人以經濟自負臨事之際或不知急緩以至覆亡亦何其謬哉中山君嬖梁其生生蹇産而椎鄙盡國中無過者唯中山君宜之一朝不見輒若有所失語大夫㫋曰梁其生其智人哉何為能安我也大夫㫋曰心成憐白髮𤣥情弗怡艷色媸從古然也中山君曰何哉大夫㫋曰君聞癸北子翏之為人乎子翏慎妃耦十年不遂恒鬱鬱離居曲逆有醜女眇在左目疹瘢如叢珠且黑而羸曲逆人過而不睨醜女怒去從師學擊筑彈坎篌三年精其技又善為北里之舞以惑人子翏一見大悅致厚幣聘以歸字曰𤣥姬朝筑焉暮坎篌焉嬖之甚子翏稍岀游歸必熟視其面無不妍者反笑世人多一目云其友宛爰都憐之為致趙女光豔皦皦照人世謂閭須白台不能似之子翏逐岀曰何物醜類敢儕吾𤣥姬所謂𤣥姬其君之智人歟中山君笑曰大夫言過矣君子曰中山君之蔽一至是乎妍媸最易辨且不可況其他乎世道既汚以佞為賢以正直為憸邪者皆是也尚何暇中山君之笑哉尚何暇中山君之笑哉宋大心鉤與公玉乗無庸伯仇同居於乗丘大心鈎學内聖外王之道淫淫而洽於心公玉乗迂之曰子之道古也不宜於今是翠黄擒鼠也千不得一焉乃舍去學假仁定霸之術三年而足之無庸伯仇又尤之曰子病大心鉤善矣子道亦未為得是使韓盧捕䑕百而一中焉予所業則異於是公玉乗曰何術也曰捭闔之術也儀秦之舌申韓之法軫到之略也放之一邑則一邑服放之一國則一國凖放之天下則天下從是使䝉貴襲䑕也十不失一焉大心鉤公玉乘疑之相與說于秦王大心鉤進曰王道如春煦嫗兆民無跡可窺均囿至仁王假臣以三十年鴻化覃於邇遐矣王曰子之言美矣惟黄虞能致之爾寡人不能伺也曰公玉乘言公玉乘進曰揣摩地勢明王之制義融於人已蝕其利王假臣以十年伯業可定矣王曰子之言良矣惟桓文能行之爾寡人不能學也無庸伯仇見二人所對不合於是不待王見問目如明星風雷隠隠起舌間利害粲如也言已且繼曰願王假臣五月之久四海諸侯皆懼膝行而來朝矣王大恱曰此寡人夙夜不敢忘者也即命為上大夫與聞國政公玉乘去之齊不遇又之宋之衛無客之者晉人聞而召之亦為大夫大心鉤轍環諸侯皆不售老死乗丘一如無庸伯仇之言君子曰羽籥干戚之舞不可施鄭衛之邦亦猶子女優雜之戲不可陳齊魯之俗大心鉤欲行先王之道於春秋之世難矣哉晉定公好以位驕人揚食我諫曰東海有巨魚名王鮪焉不知其大多少赤幟曳曳見龕赭間則其鬛也王鮪出入海中鼔浪歕沫腥風蓋翛翛然云逢鮂鰼鰹􅀈必吞日以十千計不能饜岀游黑水洋海舶聚洋中者萬王鮪一噴皆沒不見其從雄行海間孰敢何問之者泝潮上羅刹江潮退膠焉矗若長陵江濵之人以為真陵也涉之當足處或戰大駭斫甲而視王鮪也肌之乃架棧而臠割之載數百艘烏鳶蔽體羣啄之各飫夫王鮪之在海也其勢為何如一失其勢欲為小鱦且不可得位其可恃哉定公曰寡人已知之矣予姑就舍君子曰徳稱其位者恒下人反是則驕是何也徳則虚不徳則盈虚則能容盈則覆理也傳曰君子以虚受人又曰日中則昃可不信夫齊侯再伐山戎賔胥無問曰聞君將有事山戎然乎非歟公曰然何如曰以臣觀之可伐者五不可伐者一公驚曰何謂也曰謀夫孔多可伐者一也矛㦸銛利旛幟精明可伐者二也既禀充牣餫饟弗絕無仰於鄰可伐者三也卒乘輯睦隊伍成列不戰則已戰無不克可伐者四也大而陳蔡宋衛小而邾鄧杞薛皆與國也奔號承令匍匐恐後可伐者五也以此言之止君勿行者惑也臣竊有私焉夫山戎蕞爾之邦也使誠有罪君亦既伐之矣奈何再乎為土地耶海濱千里君悉有之何愛僻逺之野以廣君土疆為民人耶衣冠劍舄充斥君之境土何愛魋結卉裳之俗以亂我邊陲為一戰可以定伯耶君已帖陳服鄭親魯而攘楚矣何假乎山戎今再帥師徒使斯民肝腦潤草莽枯胔暴原野耳夫爭地以戰殘民以逞非仁君也非仁君不足以霸諸侯此不可伐一也齊侯曰大夫言固善山戎屢悖寡人奈何賔胥無曰熊羆豺虎並家於山蛟鼉魚鼈俱穴於淵九夷百蠻均宅於仁君務仁徳之修獨不能容一山戎乎容之則來庭伐之則叛去力不勝徳故也君請改圖焉齊侯曰大夫之言善止君子曰桓公賢君哉不然何聞義則服如此也南文子任衛國之政察見淵魚人莫不畏之一旦忽若狂易者以足衣為巾以冠纓苴履以食豆而羮簞百物靡不反者衛君深憂之親枉駕文子之閭問曰先生病耶曰臣非敢病也曰先生非病何反悖若是邪曰臣非敢反悖也效尤也曰何謂效尤曰今國中法制不定上下無章驍暴者字民孱夫操弓矢岀鬬是簞受羮而豆盛食也貴戚之卿混乎輿臺是履苴冠纓也髠鉗之倫升於上士是巾足衣也舉國反易而無一人悟者君顧獨憂臣乎即實病亦一身爾如國何衛君曰目能察白黑而不見其睫心能識壯耄而不覺其形自蔽之患也請為先生更諸君子曰南文子託疾以悟衛君美矣衛君聞之即有心目之喻亦易悟也哉詩曰鶴鳴于九臯聲聞于天此之謂也漁者庶其亷與婦競絶數月不通於越入楚兵大掠各西東匿死生不相恤人諍庶其亷盍聚諸輒謝去一日漁于海獲甲蟲曰鱟雌雄相負雖風濤不解庶其亷悔曰是物也人或不如可乎歸召婦與居禮之終身君子曰陰陽合而大化彰寒暑正而歲功成夫婦和而家政理天道也亦人道也俗降世汙有反目至死弗覿者不亦悲夫視庶其亷之能悔抑又賢矣秦有尊盧沙者善誇談居之不疑秦人笑之尊盧沙曰勿予笑也吾將說楚以王國之術翩翩然南迨至楚境上闗吏縶之尊盧沙曰慎毋縶我我來為楚王師闗吏送諸朝大夫寘館之問曰先生不鄙夷敝邑不逺千里將康我楚邦承顔色日淺未敢敷布腹心他不敢有請姑聞師楚之意何如尊盧沙怒曰是非子所知大夫不得其情進於上卿瑕瑕客之問之如大夫尊盧沙愈怒欲辭去瑕恐獲罪於王亟言之王趣見未至使者四三往及見長揖不拜呼楚王謂曰楚國東有呉越西有秦北有齊與晉皆虎視不瞑臣近道出晉郊聞晉約諸侯圖楚刑白牲列珠盤玉敦㰱血以盟曰不禍楚國無相見也且投璧祭河欲渡王尚得奠枕而寢耶楚王起問計尊盧沙指天曰使尊盧沙為卿楚不强者有如日王曰然敢問何先尊盧沙曰是不可以空言白也王曰然即命為卿居三月無異者已而晉侯帥諸侯之師至王恐甚召尊盧沙卻之尊盧沙瞠目視不對迫之言乃曰晉師鋭甚為王上計莫若割地與之平耳王怒囚之三年劓而縱之尊盧沙謂人曰吾今而後知夸談足以賈禍終身不言欲言捫鼻即止君子曰戰國之時士多大言無當蓋往往藉是以媒利禄尊盧沙亦其一人也使晉兵不即至或可少售其妄未久輒敗亦不幸矣哉厯考往事矯虚以誑人未有令後者也然則尊盧沙之劓非不幸也宜也宋有白冥子旂耕於渠蒢之野得石焉圓而晢肉且倍好上有蒲穀文子旂熟視之曰質如截肪澤而有章其璧也哉孚尹旁達亷而不劌其璧也哉無功而家大寳者禍當獻諸朝於是沐浴冠帶言於周王曰臣渠蒢之賤夫也偶挈耒耜以耕竊不自意地不愛寳獲嘉璧焉臣不敢私聞王將有事上帝方明六玉闕其一焉敢獻諸下執事王使大夫窽受璧薦諸玉尹玉尹曰噫是珉也卻還之子旂抱石嘆曰吾聞有道之朝是與非别白繡裳雖華不翦以補冠太阿雖銳不委以割牲今强謂璧為珉可不可乎楚丘丈人過而視之曰子旂其幸矣哉子旂怒曰何幸也曰卞和以玉獻尚遭刖況爾薦珉者乎子旂終不悟君子曰士以真材􅃷且猶不可假才能自致與嗚呼世不特一子旂也越人甲父史與公石師交甲父史能計而弗決公石師善決而計疏各合其長事無留行人兩而一心也因語相侵離去政輒敗密須奮泣諫二人曰君不聞海蟲有水母乎水母無目資蝦以行蝦亦資水母食兩不能無也水母姑寘之又不聞有瑣􅖜乎腹藏蟹饑則蟹岀求食歸則瑣􅖜飽否乃死蟹失所巢亦兩不能無也瑣􅖜姑寘之又不聞夏屋有蟨䑕乎與卭卭駏驉比為卭卭駏驉齧甘草即有難卭卭駏驉負而走亦兩不能無也蟨䑕姑寘之又不聞西域有共命之鳥乎枳首一體性多妬飢則爭啄一俟其瞑餐毒草害之及下嗌皆斃亦兩不能無也是皆山海蟲爾不足怪雖人亦有之北方有比肩之民迭食而迭望失一則死亦兩不能無也今二人甚類之其所異者彼以形此以事爾奈何離去奈何離去二人相顧曰微奮言吾等將愈敗驩焉如初君子曰十二官各有所司必相資以成體況尺有所短寸有所長何可自用密須奮可謂善諷矣猗于臯聞尾勺氏畜豹善捕獸以雙白璧易之且肆筵召所與游者飲岀豹于庭而譝其能於是治金為繩繫之文羅日割牲啖之居亡何有碩䑕過宇下急解豹斃之豹視䑕若不見猗于臯怒詈之他日又有䑕過焉猗于臯復縱之豹遇䑕如初猗于臯怒鞭之豹輒嘷猗于臯愈鞭之易以縲絏寘之牛羊棧中日餔以糟豹喪欲泣猗于臯之友安綦子他聞之誚曰吾聞巨闕雖利補履不如利錐錦綺雖麗供靧不如尺布文豹雖鷙禽䑕不如狸狌子何愚也曷不用狸搦䑕而縱豹捕獸哉猗于臯說如其言未幾狸捕䑕且盡豹獲麞鹿麃兔以歸無算者君子曰獸固善捕亦各有所能至於用人乃違其才何邪楚多鶉善格如膠弗之解大夫黎嗜之偶使韓遂挾以行左右言於韓君君恱之令國中羅鶉與格皆不勝君以韓無鶉愧之無鉤大夫曰夫鶉海内所有也而韓獨無乎然而能格與否在所擇焉爾今衣褐而班文鶉也翁鱗而尾隹鶉也刀喙而㦸距鶉也鶉則鶉矣求能格者幾何雖然此不足道也國中圓冠方屨堯行舜趨者皆士也能與君排難解紛者復幾何能否在君不在物也君說擇善鶉與黎格卒大勝韓因此而得擇士之法君子曰古語有云羊質而虎皮見草恱見豹戰士鮮不類之然豈無真虎哉亦患人君不能用耳楚帥師伐晉晉人恐嚴甲兵以待楚入河陽退師未幾又入如是者三晉侯疑朝羣臣問焉伯瑕對曰楚誘我也急宜敺弗敺必深入存亡不可期晉侯曰子計疎矣伯瑕恚曰君如弗納臣言臣終不能俘隨君請先去之晉侯斥之問步毅步毅對曰楚非昔楚矣執政衆乖内嬖日盛曳綺縠而副玉珈者後宫千人旦謳莫酣惟日不足焉能及我問士渥濁士渥濁對曰毅言固當亦知其一未知其二者也楚西有秦難東諸侯則齊鄭魯衛枕戈待隙獨吾國有新喪未暇攻彼虞我兵起五國必應之故先動相制耳不足慮也問范匄匄對曰如二大夫言問韓起韓起大笑絶纓晉侯變色曰大夫笑寡人乎起對曰老臣何敢笑君實笑鴈奴不知也晉侯曰何謂也曰具區之澤白鴈聚焉夜必擇栖恐人弋已也設鴈奴環巡之人至則鳴羣鴈藉是以瞑澤人熟其故􅅡火照之鴈奴戛然鳴澤人遽沉其火羣鴈皆驚起視之無物也如斯者四三羣鴈以奴紿已共啄之未幾澤人執火前鴈奴不敢鳴羣鴈方寐一網無遺者今楚師進退三執火之謂也君何不少察之乎晉侯曰爭人不當如是哉於是大嚴守備楚子聞之曰勿謂晉無人不敢侵君子曰晉侯其善謀哉集衆人之慮必有一長者及韓起獻計楚人知悉其情遂退師詩云先民有言詢於芻蕘況士乎宋剔成君自高視羣臣皆下有諌者輒拒曰爾欲上我邪毋不已也指所佩劍曰懼此乎皆怖汗而退欲造九成臺於雍丘之郊恐羣臣言戒門者毋納士納則死北殷子且謂門者曰吾將見吾君門者沮之子且堅欲入且曰吾事君十年豈不知君君所甚惡者諫耳吾不諫則已何沮也曰子既不諫欲入何為曰吾善為雞戯將以恱君也門者入白剔成君君召至子且鼓肱為翼膠膠而長鳴鳴已急趨出氣甚暢君怪之趨使還問曰子人耳乃效雞鳴何也曰臣尊雞甚故效之耳何故尊之曰臣以堯舜之知或不如也曰是何言歟是何言歟寡人聞非聖人者無法況方之異類乎曰臣焉敢非聖人竊有疑也道蔽天地者堯徳極萬世者舜皆古聖人也今謂其知不雞若者誠過乎激然風雨晦㝠能司晨不愆度者堯舜能之乎曰不能也曰堯舜雖大聖司晨必以雞乎曰固也曰君如知此奈何盡下羣臣無若雞者乎君喜曰羣臣無言及兹者今乃始聞之寡人有過子宜力諌也曰君令臣諌臣不敢隠今賦急民單環四封皆强敵夙夜憂勤且懼不免況事游觀乎曰寡人不敢也曰君曰不敢而造九成之臺何也剔成君即日罷其役君子曰日之行晝天下無不照月之行夜萬國無不明然日月之光有所不及者一燈之微足補其功此蓋子且雞喻之說也余為燕書四十篇蓋取郢人誤書舉燭之義讀者好之謂有秦漢風余獨愧汗弗止者何也自嬰憂患以來神情銷沮見於觚翰之中氣苶而辭荒惡在其能秦漢也不猶優孟之似孫叔敖哉顔率求鼎難秦興師臨周而求九鼎周王患之以告顔率顔率曰大王勿憂也臣請正大義以卻其軍率乃詣秦君長揖言曰周之與秦勢雖若敵國其分則君臣也率聞君伐臣則有之矣自非弑逆未聞以臣伐君也不知君之興師而涉邦畿也何故天子謹使使臣問諸左右秦君曰無他異也寡人竊聞九鼎四海之厚寳也誠願得一觀焉然恐周之執事不察敝國之情乃盛陳師衛以備不虞耳寡人人臣也豈敢稱亂率曰率意君忘其為人臣也今幸勿忘甚善率嘗適蔡蔡人有事其主者其主有龍淵之劍蔡人操刃與㦸逐而奪之或諫曰此汝主也汝何得乃爾獨弗畏不義之名乎蔡人曰吾見龍淵不見主也彼由不見主故肆行而無忌憚今君知為人臣而興師求九鼎焉何也君不聞齊晉之事乎齊地方千里帶甲數十萬天王嘗賜太公履東至於海西至于河南至于穆陵北至于無棣五侯九伯皆得専征迨桓公之興平宋折鄭帖服荆楚威行諸侯天下莫强焉尚􅍁以尊周為事未嘗敢求九鼎也晉地亦方千里帶甲亦數十萬掎以太行之高起以首陽之雄迤以黄河之深靡以大陸之廣所謂表裏山河之固晉實有之文公藉累世之盛侵曹伐衛大戰于城濮而楚師敗績列國畏威無敢不從然猶一曰尊王室二曰尊王室亦不敢求九鼎也今君欲行霸術不思法桓文而首惟不軌是圖率恐諸侯有以議君也且君有不義者三以臣帥兵而刼天子不義一也鼎乃先王重器而敢睥睨之不義二也肆虎狼之威志在丘墟宗廟不義三也六國怨秦之虐旦夜共謀洹水之上恨無其名以興師設知君有爾韓必遣三將軍岀宜陽趙魏與韓唇齒之邦必注强弓蹠勁弩助之燕雖稍弱勢不能以獨寧四國合一精兵當不下三百餘萬齊為山東大國亦必驅其兵西向崤函楚見諸侯並起其雄吞之志益暴又必急趨擣武闗君雖有百二之險舉六豹而噉一牛不至血肉狼藉不止也率竊為君危之夫鼎者又以昭夫徳也茍無其徳雖得之必亡之昔夏之盛也貢金九牧鑄鼎象物百物而為之備使民知神姦用能恊于上下以承天休桀有昏徳鼎遷于商商紂暴虐鼎遷于周周徳雖衰天命未改君尚可力求之邪楚莊之强君之所聞也因伐陸渾之戎遂來問鼎之重輕王孫滿一言卻之輒俛首莫敢吐氣者豈力有不足哉誠畏負不義之名也君世有功於天王今其所為可不如蠻荆之長乎為君之計莫若告于衆曰寡人不敏昧厥君臣大分帥爾有衆欲觀鼎于周周之大夫弗以寡人為不榖肫肫然喻之寡人雖至愚亦已藏之中心矣爾衆宜解甲韜戈從寡人寡人幸至於廟當舉觶自罰復告于太史書之以旌寡人之過君能如此則改過不吝之成湯又見於今日也君徳孰加焉秦君聞之赧然謝顔率曰子之言良是也即日罷兵西還鼎周鼎也故借周天子立論為說者曰秦師求鼎之事雖急使率以是大義折之秦縱暴必能退師初不待陳臣思將兵以救之也既不能然復以八十一萬人􅞮鼎誑齊率真小人哉嗚呼大義不明久矣豈獨率一人之為然哉嗚呼大義不明久矣書穆陵遺骼初至元二十一年甲申僧嗣占妙高上言欲毁宋會稽諸陵江南總攝嘉木楊喇勒智與丞相僧格相表裏為姦明年乙酉正月奏請如三僧言發寳器以諸帝遺骨建浮屠塔於杭之故宫截理宗頂以為飲器大明洪武元年戊申正月戊午皇帝御劄丞相宣國公李善長遣工部主事谷秉毅移北平大都督府及守臣呉勉索飲器於西僧汝納監藏深惠詔付應天府守臣夏思忠以四月癸酉瘞諸南門高座寺之西北明年已酉六月庚辰上覽浙江行省進宋諸陵圖遂命藏諸舊穴嗚呼上之徳可謂至矣哉諭頑陶尚書中立為余言臨海林甲一門皆疫死甲獨治喪暨甲沒無人藏其屍家犬奔號里巷若狂已而羣犬翕集銜甲衣曳至西郊跑土成坎埋焉坎淺不能容又復曳岀如是者四三始壅土覆之而去新昌黄琛甫有牝犬為邏卒所食棄骨屏處其子銜之瘞諸野予聞撫髀太息每舉諭諸人人輒笑予誕且謂古無是事昔譙縣崔仲文畜犬㑹稽石和以丁奴易之不從和殺仲文奪其犬犬齧和守仲文屍爪浮土掩之尋牽和衣訴官和伏誅此晉義熙中事也冀州石𤣥度犬母育一子愛之甚𤣥度烹子啖之母候骨投地斂寘一窟移塟於桑間旦夕向桑嘷逾月乃止此宋元徽中事也謂古無是事者過矣夫犬能禦盜齚姦解難報恩傳記所載者然也又寧止此二事乎人苦不自厚物理有可徵者亦弗之信反指予為誕予故書此示之人心尚存其亦有所感夫書客言二事天台李某遇盜官為購捕之有刀鑷工出簪珥粥諸市市魁執送官工具言私於下東隣女得之官逮女問狀女戰栗不能言工曰爾毋佯愳為也爾左乳有瘢可驗官覆之信然女恚自剄死死三月始得真盜初女童子時常用工薙髪故知女瘢工怨女嫁時不償其勞陷之黄巖少年嘗游於愽徒一日飲市上市人攜虚篋與愽不勝馳而去少年慚其紿已躡至大澤中杖之仆地有一翁挾子過焉意其病厥也扶還其家未至而氣絶市人家縛翁父子赴官子哀慟不伏翁謂子曰兒毋用苦吾老矣自度在世無幾願易兒也子聞之輒陳殺市人狀甚悉官用縱翁歸翁念兒寃也自經死為說者曰漢張釋之為廷尉天下無寃民嗚呼今之從政者其釋之也哉明文衡巻五十
