body:
  text: 明文衡巻六十三明程敏政編碑大明勅建太學碑宋訥洪武十四年夏上詔羣臣曰王者受命武功文徳相繼成治定天下以武治不以武也其崇文乎顧兹成均地隘而陋何以振文教朕相基於雞鳴山下高爽平逺豈天協朕心若藏此地俟興一代學乎羣臣稽首曰皇上聖神斯文福也乃以天子學制授諸冬官冬官臣恭奉明詔夙夜匪懈楩楠豫樟來積如阜鑿山載石輿土築基梓人效藝以宏其制又遣金吾前衞親軍指揮譚格督其工凡堂有七彛倫所以㑹講率性修道誠心正義崇志廣業則諸生肄業所也㑹饌有堂庖廚有室井覆有亭物貯以庫餼廩蔬園重門繚垣回廊儲書兩堂之間東西有館助教正録居焉東偏列室鱗次諸生處焉廟在學東亢以增基大成有門七十二賢有廡凡為楹八百一十有竒壯麗咸稱自經始以來大駕臨役者不一夫子而下像不土繪祀以神主數百年積習乃革明年五月冬官奏廟學成十有一日天子遣使祀先師以太牢禮畢胄子及民之俊秀登堂受業學之禮制備矣十又七日上躬臨廟禮行酌獻再拜而退乃達學學官率諸生進拜堂下博士臣龔斆執經祭酒臣呉顒講經既畢萬乗是還此千載曠儀講而行之斯文增重矣六月一日上又賜勅文重諭胄子禁制防遏之法訓迪誘掖之意無不至焉越一日帝御奉天門詔臣訥文之于石臣拜手稽首不敢以不文辭承命遂述興造始末為之言曰孔子之道垂憲萬世帝王之興首建太學蓋學所以扶天理淑人心也皇極由之而建大化由之而運世道由之而清風化本原國家政務未有舍此而先者或有未備則無以維三綱五常之具示作人重道之心聖天子位居君師續道統于堯舜禹湯文武建學定規高出前古凡我登堂養正游藝之士斯言斯誦相勉相誨無負教養則正人端士叢出而為國家楨榦作聖子神孫之業萬世而無窮者當自今始顧臣膚陋敢不對揚帝命式昭盛代之典文也拜手稽首而獻頌曰於惟聖皇臣伏萬方乗時經綸武偃文揚儲慶發祥載整乾綱乃相學基雞鳴山陽平逺高爽非麓非岡式輝京邑隠若天藏考制定規聖度曷量乃授工曹孰敢怠遑工師用勸效技允臧有廟有廡有廊有堂鱗比而重龍起而翔登用儒臣教化昭彰佩服鏘鏘絃誦洋洋正學有傳師道有常萬乗來臨爼豆生光千載禮儀一代典章躬親講道超軼百王聖製昭宣啓迪激昂寵及青衿垂範流芳材育化崇殷序周庠立極作則逺紹虞唐徳進英豪業修俊良股肱朝廷都俞巖廊以𢎞文化慶祚靈長願佑皇圖萬世無疆勅建歴代帝王廟碑兩儀判而人極立大統建而君道明粤自上古神聖繼作代天理物以開萬世太平之治故天地以之而位四時以之而序萬物以之而育大經大本以之而立盛徳相繼傳至于今欽惟聖天子受天明命肇修人紀以建民極纘皇帝王之正統衍億萬年之洪基稽古定制作廟京邑以祀歴代帝王重一統也相舊廟地介乎通衢䙝而弗嚴洪武二十一年秋始命改作於欽天山陽越明年己巳夏五月三日工部尚書臣秦逵奏成功請文劖石詔臣訥為之記臣忝職胄監懼不敢辭謹拜手稽首而言曰帝王功徳於昭于天宜有清廟以宅神展敬歴世以來祀典斯闕三皇五帝祭於肆類僅見于周而堯舜禹湯發迹肇基及所經歴之地或有祠焉遣使致祭後世有之至於合廟京國歲修享禮古未之聞皇上定鼎江左治功既成神人洽和禮樂明備凡廟祀之瀆禮不經諂神非法者一切去之正名定統肇自三皇繼以五帝曰三王曰兩漢曰唐曰宋曰元受命代興或禪或繼功相比徳相侔列像于庭金玉其相衮冕焜煌聚精㑹神咸宅于兹每歲春秋二仲諏日誓士上御宸極制命大臣齋明承事籩豆静嘉粢盛豐潔告充告碩神格洋洋所以推惟本始式昭曠典者至矣三年則命官奉香幣詣陵寝具儀物以時致享又以昭聖顯靈而示不忘也嗚呼天生民而立之君所以靖亂也康濟天下阜成兆民而登之仁夀之域者皆以奉若天道而已是故前乎三代之官天下者天也後乎三代之家天下者亦天也皇帝王之繼作漢唐宋之迭興以至于元皆能混一寰宇紹正大統以承天休而為民極右之序之不亦宜乎秦晉及隋視其功徳不能無愧故黜而不與是可見皇上敦名實重理道崇徳報功大公至正之心眞足以度越百王垂憲來世永永無斁謹為之銘曰惟皇作極克配天地丕昭盛化以正大位皇道而皇帝道而帝歴夏商周三王迭繼熈熈皥皡同底于治於赫漢祖寛而有制光武奮興炎靈用熾唐興晉陽遂有神器太宗重光力行仁義明明有宋其徳克類暨于元氏而亦用乂豐功茂徳後先輝賁翼翼新宫有恤而閟貌像既嚴皇靈斯莅享祀苾芬儀文孔備陟降在庭神之攸暨祚我皇明以克永世追封徐王廟碑陶凱洪武四年夏六月丙申皇帝御皇宫門召禮部尚書臣陶凱諭之曰皇后父徐王馬氏世為宿州人家閔子郷新豐里王本民家素質朴以兄弟齒序人稱之曰馬某王少壯時膂力過人沉毅寡言笑重然諾而性剛強疾惡見有為不義者視之若仇讐然或少忤其意輒肆毆擊雖至死無所畏憚郷人莫敢犯當元政失馭天下將亂王以忿爭殺人恐逮於法移家定遠及天下大亂乃挈皇后母避兵他所而以皇后託定遠郭氏俾育為己女後郭氏首難自為元帥收徕民兵朕亦為部下士遂以皇后為朕之配既定天下即皇帝位皇后正位中宫封皇后父為徐王母鄭氏為徐王夫人以他無繼嗣因立廟于太廟之東歲時奉祭然稽諸典禮古無其義於是即王所居郷里闢地於塋封之南作新廟奉安神主每歲以春秋仲月俾有司祇奉祠事爾宜述其梗概刻諸堅珉用垂不朽臣凱既受明命竊惟人受天地之氣以生其得氣之厚而不薄者性必剛勇果毅然有不得志於當時而澤及於其後者必顯融光大此理勢之自然也今王有所抱負而無以發舒故常存疾惡之心其憤怒所洩即以加諸人蓋亦豪傑之士哉使遭逄盛際必能出將入相垂名簡冊而乃生不逄辰至身殁之後以皇后父而得追崇王爵作廟故郷使山川改觀井里增輝又豈非一出於天乎臣凱謹拜手稽首而為之銘曰維此徐方代生異人乗時啓運蔚為王臣惟王之生質性過厚不逄昌時深居畎畝王奮厥怒孔武有力摧強折奸以輔彛則當元之季天下擾攘挈家避地東南其行英雄陸沉豪傑未起抱恨重泉吁其已矣山川炳靈遺徳所鍾篤生聖女正位中宫皇帝仁聖為天下父皇后孝慈為天下母太姒嗣任則百斯男聖子神孫何千萬年川原膴膴新廟奕奕與國同光永世無斁歙縣孔子廟碑宋濓歙漢縣也初屬丹陽自呉晉而下雖屢更為郡若州而縣仍舊名不廢其地為東越奥區號多佳山黟川如龍前行偃蹇不受羈紫陽問政二山又矗起東南勢若翔鳯鳯凰飛布紫金諸峯又騰翥于後先而黄山又直西北竒巒之不可名者凡三十六丹崖翠岑分割陽隂而吐和降精於無窮故士之生其問者或以氣節著或以道藝名時有其人近代尤稱多士立言著書動足名家是固因山川之靈攸鍾其沈涵陶育之者非立學之所致歟初學在縣治之東淳祐庚戌郡守謝堂始建至大庚戌縣尹宋節至正甲申縣丞葉琛皆葺而新之壬辰兵起而歙為鬬爭之塲官廬民舍焚􅅡無遺而學亦廢矣澹烟荒照榛荆蔽途而狐兔或暮出衝人識者為之傍徨太息如是者十年辛丑之夏張侯齊來為縣慨然歎曰歙為徽國文公父母之邦道徳之化衣被天下雖時丁尚武而其郷學可乆廢乎遂請于大府而經營之㑹故基已更構紫陽書院遂於書院之東立表考宜剪刈穢荒别畚新土充其虧窪高爽塏疏有踰其舊中峙正寢象厥正配黼坐朱几嚴事有容旁圖從祀於兩廡間外敞正門列以畫㦸法庭端潔墄平宻鞏欄楯翼遮術道直修外為都墉樹以三門上應靈星榮光昭煥廟左别築論堂直齋以處講師暨弟子員不嗇不侈無諐彛憲經始於秋九月考成於明年壬寅之秋八月侯帥儒師行釋奠禮牲幣有飭庭燎伊煌罇爼維旅法齊苾芬神來顧歆如在左右觀者歎慕至於詠蹈僉謂侯之嘉惠吾民者深不可無以貽永久於是教諭江君材奉幣請文刻諸麗牲之碑惟先王之制自諸子以至公卿大夫士之子使之修徳學道春合諸學秋合諸射以攷其藝而進退之是文事武備均出于學也所以興師必受成而行及其還也則釋奠于學而以訊馘告曷嘗析為二哉自世道既衰不復獲沾先王之澤之盛人徒見提旛鼓而簡車徒者乃指為武殊不知制勝兩楹折衝千里而有所謂詩書之帥也侯於下車之初能汲汲建學於用武之日可謂知斯道矣歙之人士尚當竱心一力惇於明體適用之學平居之時則談爼豆而攻遺經一遇四郊有警則撡戈上馬以收獻馘之功使議者咸曰是生文公之邦而無忝山川之靈者庶幾不負建學之意不然豈予之所敢知哉侯字仲賢齊其名也某郡人以行中書掾擢為令招徠懐集民驩趨之遂成市落縣廨驛舍皆新作之而尤急於農功築吕堨及良干范阮二埭歲以有秋其善政蓋不一而足當時相其成者則丞胡拱辰主簿王某及江君云臨濠費氏先塋碑皇帝登大位之三年覩四方之既平嘉諸將之勲烈乃十一月丙申大封功臣為公侯錫以鐵券俾傳諸子孫於是臨濠費侯自僉大都督府事進開國輔運推誠宣力武臣榮禄大夫柱國平凉侯既而復謂賢豪之生基徳累仁必繇于其先乃推榮其三世侯之曾大父五一府君贈驃騎將軍都指揮使護軍追封靈壁縣子大父六三府君贈鎮國將軍僉大都督府事護軍追封江夏伯顯考七五府君贈榮禄大夫同知大都督府事柱國追封平凉侯曾祖妣李氏祖妣及妣兩何氏皆從其夫爵邑為夫人命書既下侯用牲醴詣五河告祭于先塋榮光赫然照燭泉壌山雲宰木飛揚􅂱奕皆有異氣自是歲時奉祀惟恭侯間謂余曰吾世齒恒氓至于吾躬遭時遇主奮自戎行奉命克敵或專或禆凡十八年始于淮江中於閩浙至於定中原舉關陜皆與諸將之列取城邑以數十計其艱且勤亦至矣藉聖主之徳念録微勞爵為列侯名載冊書人臣之榮無所與比顧豈吾材之能致哉實我祖考遺休餘澤之所及也惟我祖考皆有厚徳為郷邦所稱宏址深源誕啓厥後恩數之加允稱不虚兹欲歌頌先徳敷揚聖恩樹石墓道俾後嗣知所自出非子孰宜余嘗待罪國史撰次功臣勞烈知侯為人仁勇有智畧事上御下以忠以誠今又弗忘其先以顯著遺徳為事可謂知所先後善為臣子者矣侯名聚字士英其詩曰帝乗六龍起江淮東濠泗之間為漢沛豐維時費侯貙吼虎雄壯馬長矛為帝股肱既定泗濵遂剗靈壁維滁及和一舉而踣孰謂大江可限南北萬馬飛渡不以羽翼巍巍建業扼江而城既入其郛帝庸作京廣徳既綏遂平長興軍聲轟轟四方震驚蠢彼偽吳假息于蘇愚弗量能自干天誅將命以行以翦以刳獲其大醜歸寘質鈇帝徳如日愈乆而晰孰倚冰雪以詫弗㧞何閩何浙何勍何劣如朽之折如藩之撤閩浙既清載征中原巨壘連營望風而奔或奔或降追刖其根中原卒平萬方來臻帝嘉治平曰誰之功鐵券丹書錫爵命邦矯矯費侯平凉是封豈惟其身榮迨祖宗侯有峻爵上推於父維祖甚仁伯于江夏江夏之先靈壁是子旁及其嬪咸有爵土費侯曰咨小子無良祖考之休積厚而昌既有土田又蕃牛羊維曰薦奠以致孝享大豋如几牲碩酒㫖費侯涖祀陳豆奠斚擊鼓駭駭焚幣煒煒費侯克孝祖考咸喜濠民謂侯勇不失身委質聖君為社稷臣濠民謂侯貴不遺親玉佩貂冠為賢孝孫四海既同爵勲既崇曷以承之維孝與忠忠以于朝孝以于家繼徳無愆茀禄是荷惠州何氏先祠碑英傑之士立大功而享爵位者非其先基仁累善何能自致哉然其先有徳而子孫不知報祀者有矣知報祀其祖而棄蔑其祖之子孫者有矣是皆不達禮義之弊也山東行中書省參政何公其篤於禮義者乎公名眞字邦佐世居廣之東筦至公始遷惠州祖諱發藻元贈中奉大夫廣東道宣慰使都元帥護國軍追封廬江郡公父諱叔賢贈資善大夫江浙等處行中書省左丞上護軍追封廬江郡公祖妣鄒氏母葉氏皆封廬江郡夫人公祖暨父世有濳徳郷稱善士公生八年而喪父母夫人守志不奪慈鞠嚴教少偉然有志當元至正中中原兵起廣民王成亦構亂公為小官即請而討之巳而解惠州之圍逐叛將黄常復惠州會賊陷廣州公以兵復之由惠州府判五遷為江西等處行中書省左丞階資善大夫分省治廣公弟迪以從征功擢中奉大夫廣東道宣慰使都元帥兼僉樞宻院事遂推恩封其二代後合福建江西為一省改拜公資徳大夫江西福建行中書省左丞仍治廣州歲乙巳九月賊挾廉訪司副使廣寜等叛圍廣公禦之踰十月部將與賊通絶糧道公出避城陷丁未五月復克之明年制授公榮禄大夫自左丞陞右丞未拜而皇明兵平江西詔至諭公公舉廣東之籍以降上嘉公保民順命之績授中奉大夫江西等處行中書省參知政事洪武庚戌移山東行省越七年以老致其政初公追思顯融之盛由於先世既於東莞率族人建祠寘田以祀羣祖復與弟迪謀悉以其先所遺田儲租入以祭其禰公猶未慊於心乃以惠州城西之私第為義祠斥所有私田百餘頃為義田世俾宗子主祀事恐族人不知學也有塾以教之恐其羞服或乏也有粟帛歲賑之嫁娶喪塟有以助之疾病疲癃有以養之懼其乆而失其意也為書以訓之俾嗣弗壊而來請銘嗚呼先王所以親民善俗之道遠矣賢人志士欲推之於世而勢有所不能欲退而惠一族化一郷而力有所不逮者有之至於勢足以為而不為力可以至而不至者亦有之此所以越數十世而事曾不一二見也惟公奮自韋布夷盜保民輯寜南服致位尊顯卒能識機效順戢斂干戈為民請命使嶺南之民不易市肆又能推本反始孝于祖宗惠及族人所踐所言允可為法其於富貴可謂不茍處矣視彼恃險而賊民私厥身而忘其所自者其賢豈不多哉是宜紀行載勲著之樂石以為後嗣式其銘曰維昔至正徳否亂生海沸山崩靡人不兵頟頟粤南在嶺之外猖䜿嘯呼民罹其害何公曰嗟我民何辜告于大藩請行天誅乃戈乃殳乃糗乃糧大斾脩斨人莫敢當叛將肆凶賊我守邦鞭門疾呼䑕拱以降曷以褒功躋于左轄巨鉞良弓左旄右節豈惟其身錫爾祖考峻爵崇勲以顯忠孝祖考榮矣子弟孔多寳帯銀章威儀甚都邦人聚觀拜伏稽首按轡徐驅詢其耆老耆老有言大哉公勲元衰不君公其我臣公曰吁哉我志已定待彼有徳為汝請命赫赫大明洸洸仁聲震于南荒勢無全城公束干戈載封版籍錦韜龍函獻于京國帝嘉厥功不勞我師錫燕彤庭重瞳屢回大江之西岱宗之東禄食十年執政廟堂寅畏恭勤髯鬢盡白詔優老臣勿勞以職公歎謂人我徳何為祖考之惠幸以弗隳豐湖之西有第奕奕𤣥楹文牖既蠲且侐亦有土田被隰包原重穋荐年歲登百千我第以祠我田以祀祖考之休敢恤吾嗣池有㳺魚圃有嘉蔬以醢以葅丹荔清酤刲豕擊羊來烝來嘗孫子咸臻有雝鴈行或授以罍或奠以斚登降肅然莫敢叱咤數具禮全陳几布筵孰為弟昆孰為子孫公曰族人亦孔之夥揆本追原咸由於祖祖病在指四體靡寜奈何一身曽莫胥矜爾餒爾寒我有粟帛爾昩弗通我學爾迪爾有災害我則戚之或有燕喜則慶樂之我有爵禄我祖之故不私吾身𢎞祖之祜豈無鄙夫爵禄是荷惟家之肥遑恤其他維公克仁仁以保民惟公克孝尊祖睦親嗟爾後人惟公是師繼承無忘公有訓辭上虞縣重修柯韓二牐碑上虞有湖名夏蓋延袤一百餘里縣東北衆水經上妃白馬二陂匯于湖釃為三十六渠支分絡聯以達于田凡溉一十三萬晦有畸渠之下流建二石牐視時溢乾而畜洩之歲恒無凶者近代農官失政畚土成塍取給一朝不旋踵而圯傍縣亡賴男子當旱暵時又夜半決防以去然湖竝于海鹵水或乗潮入善禍稼舊嘗造隄捍其衝潮汐齧蝕至是亦暴潰民憧憧告病矣乃洪武辛亥冬臨淮唐侯鐸自殿中侍御史出守㑹稽上虞㑹稽屬縣人士羣走白侯侯愀然弗寜行海上視決隄與民共約度田以㑹粟因口以賦庸鑿石為隄自蓮花池至纂風合萬有三千尺始與故石為隄屬侯斬牲饗海神已登民謂曰隄幸成二牐無難者㑹侯召入為卿奉常遂命僚屬集事其柯家牐廣二十有四尺深如廣之數而贏其一先築土樹橜櫛比星攢度乆且不壊方敷以石兩翼四隅咸斂甃如法中峙石楹左右皆有副鍥坎陷版以為縱閉復隨土形崇庳疏級為五以㵼水上架石梁以便行者橜以章計者九百八十有五灰以斛量者三百六十有四石以丈數者七百三十有八匠以日考者一千三百其韓家牐廣減前牐之半深比廣倍之石楹唯二級道則减其一仍冠以石梁餘皆同其工物視前匠損四百石損五百灰損六十八橜損二百八十五始事於甲寅秋七月訖工於冬十有二月此其大凡也有道浮屠雷峯凈昱乃具事狀介太史氏朱君右徵濓文記其成予聞成周之時稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮㵼水其為法甚備其為利至乆也然而溝澮之屬所可考者其深廣自四尺至八尺或至於尋仞各二先王豈不知害地而廢稼以為不若是則水性失其常溢則有溺患乾則禾將菑矣古制不可復見有能設瀦防以惠民者得不謂之賢哉昔者曾文定公之為齊州州城西北有湖疏為水門遇流潦暴集則取荆葦為蔽納土於門以防外水之入公為易之以石其深八十尺廣三十尺視水高下而閉縱之而禁障宣通皆得其節人無後虞今唐侯之為牐也其事與之頗相類世言古今人不能相及果足信之歟是可書已相其成者通判府事吳敬知縣張翼營度督視不憚勞勩者主簿史文郁也司其岀内則邑大姓徐某余某法宜牽聯得書海隄别自有記兹可畧云系之以詩曰維夏蓋湖百川所瀦在彼海邦其一釃為通渠行水委蛇溉稻與秔其二制水有牐因時闢闔其法孔臧其三農政斯缺惡壤為堨水失厥防其四侃侃唐侯爰諮爰諏中心䀌傷其五曰是弗修民焉有秋敢視為常其六乃登宷屬乃謀乃告乃輯其長其七畮㑹其粟工來以族筮日奏功其八琢石于山樹橜于灣以楗以梁其九決塞有關既堅且完若首有肮其十昔何怒突今乃順則弗隳我疆其十一行彼赤日清流潏潏黄茂芁芁其十二食維民天非稼無年民用卒爽其十三伊誰我憐五馬翩翩朱衣葱珩其十四成周之制有溝有遂經畫維良其十五古法寖廢河渠興利其效則章其十六漢吏曰循惠乎烝民唯此之蘉其十七矧乎鉅津比枕海濵澤被五鄉其十八侯治之棘行厖心惻不翅父兄其十九越石可泐越川可竭侯功勿忘其二十明文衡巻六十三
