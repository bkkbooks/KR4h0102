body:
  text: 明文衡巻九十九明程敏政編補缺抱琴聽泉圖劉崧吁嗟乎空山抱余琴以來歸兮吾將以彈山之窪兮石之湍我其聽之兮以寫猗蘭按金徽兮作復止風泠泠兮觸宫徵泉之流兮雲中潄鳴玉兮聲淙淙忽幽咽以下愴兮匪絲匪桐啼秋猿之嫋嫋兮下南飛之雙鴻山中之人兮不可遇余徘徊兮中路九疑蔚兮隔烟霧我思南風兮噫其遲暮代祀海濟紀成樂章岳正迎神金節晃兮繽繙翥翠華揺兮葳蕤舉驂沆瀣兮駕甸始屛翳驅兮豐隆駛鞭雷霆兮叱風雨逆惟怒兮惠惟喜香芬茀兮景悽靡羌洋洋兮如誶語神兮神兮斯戾止禮神鼓鐘奏兮鏜鏜簫管揚兮琅琅帛有𤣥兮玉有璜羌煜煜兮爛盈箱黍稷芬兮有苾其芳簠簋飾兮厥文孔章肅𤣥端兮斂衣裳儼誠敬兮靡不將神兮神兮假有光初獻爵初獻兮誠已萃鼻絶嚏兮志不悖衣冠肅兮容體懿昭對越兮凝念慮答元功兮靡自媚眎明鑒兮嚮予意時雨暘兮醞和氣蓊穰穰兮育羣類神兮神兮民所庇亞獻爵再獻兮誠正精虚室白兮靈府澄震雷迅兮神靡驚七鬯安兮端不傾犧尊圭瓚兮兩楹太羮𤣥酒湛且明民與嘉貺國與禎千古萬古恒不攖神兮神兮予爾盟終獻爵終獻兮誠彌篤神安娯兮光耀燭宥災𤯝兮降釐祿柄予奪兮挶禍福失恒道兮殃品物陵為波兮川為陸稼不登兮人不育苦墊溺兮慉怨讟神兮神兮爾之辱承釐膳膏芬兮酎酒馧罍尊彜俎羅繽紛明禋傑制全本文既醉既飽神載忻嘉貺蕃釐乃爾分惕息受命如有聞錫爾民人錫爾君八方維時百穀蕡上方下方覃厥仁樂神擁靈姬兮侍𤣥女蠵吹笙兮鼉擊鼔長鯨清歌老蛟舞河伯行酒御龍脯百神效順恩湛溥嘘為清風噀為雨風雨維時澤下土神兮神兮樂何許終國家兮萬萬古送神飊輪輾兮雲為衢羽葆張兮蜺化旗雷公蹕道婢雨師電母舉燎驅封姨千騎萬騎魚龍隨山為裂兮川為移去矣直與𤣥㝠期神不厭斁民允禧年年嵗嵗春秋祠大濟詩降神大行之西兮王屋之東危巔密岫兮實神所宫發為沇兮注為滎注流顯伏勢愈雄出雲致雨灌濟功千秋萬嵗兮報祀同迎神隂風颼颼寒景流神之來兮驂兩虬蠙珠結佩琅玕鎪湘靈作儐原胥儔先驅欲至妖氛收䕫魖斂迹魍魎愁禮神招揺轉兮夜未央庭燎舉兮天有光象在陛兮登歌在堂庶羞盈俎兮醍酒盈觴神兮神兮爾惟嘗玉帛煌煌誠所將初獻神兮至止御法宫縞衣𤣥裳蟠兩龍元精耿兮貫白虹休徵應兮來清風駿奔走兮嚴百工爵一奠兮誠始通亞獻綵雲密幬流蘇敷錦裀重匝鸚鵡鋪明靈妥兮懽且娯慰我民兮錫以符和氣甘霖無地無爵再獻兮誠已孚終獻馮蠵鼓舞忻且抃蜿蜒嬉遊隱復見羣靈百怪歘變幻神載歆兮示昭鑒福我君兮夀無算爵終獻兮誠靡間承釐天子夀考民物休降祥祉兮該九州導神和氣迎神庥虎拜稽首誠愈修神兮神兮良厥猷作神羞兮予爾訧樂神吹管兮鳴簫鼔鐘兮伐鼛都盧漫衍騰神鼇𤣥㝠起舞黔雷跳神載懽兮何所昭休嘉砰隱妖祥消送神膏鳳輦兮秣龍馬蜺旌羽蓋紛布野赭鞭鞭山山為赭金戈指天天亦撦九垓八埏恣上下雲飛飛兮神去也李忠定公祠記何濳邵武郡學東故有宋建炎丞相李忠定公祠淳熙中教授徐元德建晦菴朱夫子為之記其後遷改不常以至於廢迨我朝正統己未郡守徐述復建於舊址吏部尚書王文端公為之記成化戊子詔有司嵗春秋享祀蓋因教授張君濟之請而郡守盛君同知王君琳通判劉君貫遵承惟謹又訪其後之秀穎者進為學生且盡復其家族之人以稱德意既而盛君又欲新公祠致仕都憲郡人陳公洎郡學師生請以學傍佛舎曰化城院者改為之提學僉憲游公亦慫慂其成方課始事而盛君以朝覲去及歸更任延平遂不果庚寅之秋巡撫都憲滕公蒞兹郡謁拜公祠舉公忠義風勵諸生諭郡守馮君孜封埴李氏墳墓且進其後於學者數人諸生因白向者改祠之事滕公即詣化城院見屋宇猶完整不假修治遂撤去佛像奉遷公之神主於其中祼奠妥侑如法郡之人士來觀咸欣躍以為宜馮君謂兹盛舉不可無傳乃走書致滕公之意屬潛記其事潛惟李公學行純正負天下之重望以一身去就為國家之安危其忠義誠切見於奏議而措諸行事者已震耀一時雖庸人孺子猶能誦其勲名欲跂見之而不可得又有朱王之文實在于壁其出處始終載之詳矣潛復何言顧惟古今人物如公者蓋不多見當時小人側目讒言蠭起使公屢遭竄斥不得盡用其才於世而宋業卒至偏安於一隅重可嘅己夫讒邪之能壞人國也如此有天下者所宜深戒覆轍之虞信任忠賢以為長治久安之計不使讒言得以間之而委質事人者當勵公所為不以讒間之言變易其節以至於失身而忘君此潛之所以欲見於言也况兹改祠非特表崇忠良為可紀而廬佛舎不惑於異端因舊貫不費乎民力皆世之為政者所不能及也遂具書之俾刻于石以示來者且以寓潛景慕先哲之心題孔氏所藏先世誥後宋濓宋制差則出勅除則給誥誥有奬勵之言而勅但書所授職事而已然誥則用綾其所識印章文臣則吏部武臣則兵部王公命婦則司封加勲則司勲及元豐官制行四選悉用吏部而兵部唯施之於藩官若差勅則書以白紙而用中書門下印印之今觀金部郎中孔毅父所受誥猶可以考見當時故事也然而多厯年所兵燹屢更而子孫得以保守不墜其亦君子之澤也哉金部九世孫善夫裝潢成巻求題於濂濂之所欲陳者雲林先生危公巳備筆之矣謾略著其說而附氏名于左方云尋醉翁亭記陳循往時嘗讀醉翁亭記以謂如滁信可遊而樂也心竊慕之永樂丙申始以備員翰林得扈從還南京南京於滁最近而滁又為兩京往來所由陸地於是竊有覬覦一造之意然而未敢必嵗之庚子三月壬辰始得因職事偕朝士數人者往遊焉既至值公稍暇因問所謂醉翁亭處於滁人與滁之賓客者或告或否然皆少其蕪廢求導致之莫有能者余度越宿當還以為不得遂所志矣為之悵然終日明旦介行有語太僕丞楊文達以余志者楊欣然喜即率從事載酒殽具鞍馬偕余數人以往自豐山下馳六七里而止棄馬登山未十數歩而獲少平楊曰此即亭遺址也廣僅容亭瓦礫猶存四面而觀皆山環欲無路亭所負山之石壁刻醉翁亭三篆字其大如斗傍丈許又刻二賢堂三𨽻字大視篆書半之皆無書人氏名草木䝉翳芟治而後可觀意亭既廢後人刻之以識其處或非當時書也所謂二賢者未考圖記意其一謂醉翁其一必繼翁者莫知謂誰或曰王元之張文定曾文昭張天爵皆為滁守者豈其一在此耶蓋去其時久矣豐樂醒心在州東南一二百歩之近滁人老長尚且罕有知其處者况於此耶豈余不及久留固有知者而詢之未周耶亦知與否係乎其人之好尚何如也凡記之所有而存者山泉禽鳥四時朝暮之景滁人之遊與凡人力所不能移者耳亦可感矣於是芟茅席地擷野蔌酌釀泉相與放情其上以庶幾如醉翁之遊而樂者焉既而又從數騎西南馳六七里入瑯琊山山愈深草木泉石愈幽路傍有石數十端方而巨亂置草間蓋遺物也石壁時見字刻漸入佳境之類極而數峯髙絶下有松竹數萬雜樹交䕃仰不見日所謂林壑尤美者也中有一蹊介然以險不可以騎繫馬松下而止上有屋數百柱髙卑曲折一因崖麓之勢屋壁繚垣之石多為殘碑斷刻片僅數字不可屬讀其地蓋山之僧智僊所居曰瑯琊寺者也有僧夀八十餘布袍素履不出户二十餘年既無意於世矣而其應客甚恭若有求於人者問其名不應相值既坐竒花異草交映前後幽篁野鳥舉目皆是諠呼摩戛之聲不絶於耳楊乃舉酒更酌而樂賓益歡焉酒酣既去而數人者有中書舎人錢塘王直太常博士豐城卞鉉行人永豐袁賀王丁二君謂余於醉翁郡人後進者於是行不可以無記遂記之贈汪翁仲魯得告還鄉序劉三吾洪武十有九年三月朏上御奉天門勅中使傳宣召春坊贊善臣劉三吾司直郎臣汪仲魯既至賜坐語次上顧臣仲魯謂曰若知所以見召意乎對曰未之知也上曰昨日仲魯嘗以其老病故請告還婺源期秋載來朕可其請有不須辭别之㫖已廼思之若等光隂有限言歸有期仲魯喘嗽為病誠劇然恒見得此疾者往往夀考矧若龎眉有夀之徵若之心事朕深知之孔子不云鄉人之善者好之其不善者惡之若多讀書何理不窮第心素善其善者固好之其不善者亦不惡之斯為未能全其好善之心也朕今許若還鄉毋庸再來矣所戒者近侍之歸若郡邑官執刺來見當戒門以絶不則書于柬俾僮輩示之曰仲魯幸䝉聖恩予告還鄉里宜杜門謝客輸租應役則有常制矣其敢以是自速厥戾如是可考終命矣臣三吾臣仲魯同叩首謝曰聖人愛人以德適兹聖訓愛臣以德是欲臣等全其晚節者也敢不欽佩以矢無負上心仲魯得請後謂其寅契三吾曰吾與若親聆聖訓請子筆之于簡歸寘座右三吾承命唯謹蓋聞古之臣子䝉予病告有矣未聞因告病遂許之歸田者也許乞骸骨有矣未聞并欲全其晚節者也惟皇上優禮儒臣眷注無已故與其予以病告盍若俾之遂歸而永享安榮與其許乞骸骨盍若俾全名節而不為罔之生是皆臣子所欲言而不敢言知規以全其身之為貴而不知規以全其名節之尤為貴者幸哉仲魯一請告而兩得誠千載之逢也昔宋張魏公退閒零陵杜門謝客邑丞楊誠齋以弟子禮謁公南軒為之介紹數月乃得見古之朝臣退閒待時官若此此今吾仲魯以近侍言歸聖訓戒其謝絶有司又若此仲魯不必逺師魏公唯恪遵聖訓毋忘焉豈惟名節克完子孫亦職有利哉瓊署諸賢謂僕所書聖謨也宜識之首柬能言者各繼聲其後云益陽重新州治記闕名益陽為潭屬州西南接溪洞之境壬辰海内兵燹洞獠焚掠州邑人民散亡盜刼恒往來人且相食治所為丘墟瘡痍孑遺依山谷結聚以自保者十餘年邇歸于陳氏始有州官之設然民皆𨽻軍籍惟將帥命有司但徵其田賦之入而已甲辰陳氏戰敗以亡環荆湘之地悉歸于呉王洞獠皆順服市不易肆民不易業官復舊制山壘隳而軍民分咸相安於無事之域矣明年二月故侯以徵召起金華來知州事下車之日邑井皆草萊緣郛外數十里行無人煙侯召父老宣布國家威德撫綏旋集旦夕不倦情惻可信孚捶楚弗加民從其令攜扶襁褓以還邑里于茅乘屋簷宇相接顧瞻官署不可以不治也乃身倡其民葺完政事堂題曰承宣因舊名也又為後堂五間名曰端本昭鑒戒也前為門屋三間戒石有亭軍需有庫賓幕吏廡以次完具務崇儉素不華飾也凡為屋皆取舊廢宅材瓦為之故功為易就不過煩也墉築四周皷警晨夕更㵼時刻無爽踰也或曰州為五品官署出號令以作新人民非髙麗不聳瞻如何侯曰然吾州民寡力竭如是亦足矣事省則民力寛况當耕耨之時其可久役乎然而民亦知侯矜恤乎已咸奔趨而忘其勞侯字宗元昔在盛年講習經史為文章應進士舉既而辟為浙東憲府掾在職三年聲譽以著又遂退處山林讀書談道義感懷作詩怡然康樂若無意於利達者一旦起為益陽乘積年兵燹之餘散亡廢遺幾不可振未三月而政舉事集如此况乎休養生息漸摩以嵗月靡急乎近功之來細利之規治化行而邦本固則何古之人不可及哉然則侯之才識足以有為可知矣州判舒君質直和遜篤力輔成不為矯異侯方與圖新廟學崇尚宣聖聖王之教以訓育其民事皆可書州治再新嵗月不可以無述故要余為之記余不得辭仁山書院記闕名文江北流十五里故隋吉州治山水廻合洲渚碁布江中舟行東上五里東山吉陽峯挺立如植圭璧又如神人曳裾負劍而冠切雲也峯下有山方廣左斜銳側立右横平如兩兀望之布置相横縱畫宛然仁字也故名曰仁山其下劉氏世居其劉君惠庭本太史文節公族人也劉氏每廑建書院淑來學之志延至時和曾先生成已子貞二藍先生伯兄經綸先生相繼為學者師曾先生以老病見退處杜門不復接人事成已去終學官子貞為都御史其著述翰墨猶有存者讀之可為一記嘗往視伯兄遇夏日方永列廣座長林中引澗水汩汩道几席下秋月丹桂香十餘里冬時梅花盛開松上晴雪吹墮簷間或横經論道煎茶賦詩取酒共酌不知日之夕也暇則出左右臨眺仁山下三峯突起當山頂大石林立五色錯雜毎日初出霞相映或雨霽溼光相射粲芙蓉也又多石龕向東南下半嶺寺樓殿基址相締構泉流出池清澈可愛竹子紫荆異花卉循山趾而北西為官道道邊椶樹覆山池上枝幹偃蹇葉茂如大羽蓋惠庭壘石為座其下賓客來樹下風四面來崇臺廣榭不與易也不幸惠庭捐館予兄弟皆出仕子齡亦為家事所累各嘅嘆於風塵嵗月之荏苒而仁山之勝固在也子齡來京師欣然請於予曰吾於先人書舎之前構屋數楹以為賓客之館左右為軒窻聚古今圖書以待來學者其前引泉為池雜植花卉錯間竹石以為燕休之適而吾子亦知吾父子矣幸兹太平之暇君與胡君皆早得謝事以休于家時復追思舊遊與後進之士講道著書往來於此以淑其人亦庶無負於兹山先人之志可少成於地下子齡或亦得聞其緒餘亦少償吾不孝之罪亦吾子之所不棄也盍為記之且請扁揭於其楣與胡君合辭而復之子齡曰吾志也扁之曰仁山書舎云其後予復歸鄉與胡君光大數人者來遊復對床語達旦不寐繼又從解空寺歩深林中東山絶頂由仁山以歸時時與子齡約未嘗不欣然赴之也未幾而余去胡君又皆出而仕又數年於此矣䟦歐陽文忠公墨蹟闕名歐陽文忠公晚嵗好習書意有所至輒形紙墨若今趙郡蘇公所藏二帖是也宋翰林學士恩禮頗不及唐然天下國家事無不得言則言語侍從論思獻納之職未嘗廢文忠猶以禁職不當外同百司欲漸修故事蓋君子居其官則思盡其道如此使如太史公所謂文史星厯主上尊禮不如公孫丞相者其肯一朝居乎且公在政和間為職事言可也治平初入政府熙寧補外矣猶紀錄閲視眷眷不忘欲廣其君之見聞而引之當道者夫豈以逺近親疎而有二哉時王荆公方得政識者謂都俞之間有樂子無知之意蓋與文忠用心正相反則盡排衆議獨運化樞以致於敗乃翁事亦可怪哉送萬元信知江淮序唐仲人才之在天下未嘗一日無也當其世治英雄隱於草莽白晝坐睡介胄而生蟣蝨焉及乎潰亂勇者逞其力智者獻其謀進退遲速具有成筭初非臨事擬議取驗於頃刻間也龍鳳二年大丞相綂兵下江南萬公元信在行陣中矯矯以智力稱明年開行省公以刀筆筐篋贊襄省事丞相賢之又明年樞密行院遷置興安丞相以非公不可則使之與簽院鄧公上下其論丞相益賢之賜織金文綺一端今年江淮知府缺治狀丞相秩三品俾公往踐其任練日趨裝予偕龎眉父老并山澤之夫提攜僂傴素不識城市者數百人擁馬首執别酒予颺言於衆曰若知公之為政乎軍旅劻勷易於暴横公嚴之以律令申之以威武生擒死殺曲當其罪由是軍中吐舌相戒不敢犯令公知晨門西南鄰盜壓境凡出入異號以杜奸細每遇亢旱齋祓揭䖍用祈響應民有不平侃侃控愬必假顔色盡攄底裏如夏稅徵絲非其土産公為轉聞行省得折米為便官廨修飭重建大成殿兩廡下至衣甲鮮明砲矢積蓄未容殫述也父老拜公乃下馬拜嗚呼丞相用人之秋文武彬彬掄才授職可謂無愧矣公先省而後院移所以治省者治院求内而不治可乎今先院而後郡移所以治院者治郡求外而不治可乎於此益歎丞相知人之明而公之克膺是選也公廉潔自將尤長於詩予獲登龍門有一日之雅於其去也故不辭叙其端云
