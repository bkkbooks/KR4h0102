body:
  text: 明文衡巻六十五明程敏政編碑漢三老董公碑有序徐一䕫予讀太史公書至三老董公説漢之事作而言曰三老董公其秦漢間有道而隠者乎不然何其言之符機際㑹而粹然一出於仁義道徳也公之説漢髙祖也其言曰順徳者昌逆徳者亡兵出無名事故不成名其為賊敵乃可服又曰仁不以勇義不以力至哉言乎不意文獻斲喪之後兵戈搶攘之日有此人也蓋方是時項羽放弑義帝公以此説髙帝討之時髙帝左右稱讀書如酈生不及此稱文學如叔孫通不及此稱智術如張良陳平不及此而公獨及之意者公在草野㝠思天下之故項强而暴劉弱而仁莫有急於此者以故發憤為髙帝陳之不疑也公之始末史闕之即其言想其人必秦漢間有道而隠者惜乎漢用其言而遺其人也爰叙而銘之銘曰秦政不綱義旗四舉紛紛藉藉孰為義主緬彼有道鴻飛㝠㝠不聞其聲矧見其形猗嗟董公時止時作懐寳在躬不迷而覺劉弱項强公有深憂討逆致順公有逺猷一言之出萬鈞不㧞仆項興劉此機之發維此董公其執不猗維兹之言允也其時公言既用公迹愈邈推公之藴可興禮樂漢雖公遺公言不􅈥公言不􅈥大道之維漢紀信碑有序予讀太史公書至紀信以身代死之事作而言曰信之忠誠一至是乎且信倔起之徒也當其事漢項羽圍滎陽漢危甚王時欲存有降而已降則漢事去信遂自為王降羽王因得脱羽燒殺信吾意是時漢事未定如信者不過茍相依乗以饕富貴而忠誠若此何可得哉漢王既定天下嘗斬丁公以勸忠矣而於信獨無贈典及太史公紀載刺客如荆軻聶政為之列傳説客如蘇秦張儀為之列傳刑名如韓非申不害貨殖如卓王孫陶朱猗頓為之列傳至於殺身成仁如紀信者乃獨不為之列傳遂使信之大忠不白於天下後世而臨危顧身者踵相接也爰敘而銘之銘曰黄金可銷白石可磨将軍之志之死靡他一念之精如霆之發視刃不銛視火不烈滎陽之圍漢累卵危委八尺軀全一帝基死生之故夫豈易與興亡之决在此一舉捐軀徇國有若斯人緬想先烈莫之與倫齊王蠋碑有序予讀太史公書至齊王蠋不屈之事作而言曰為臣死忠臣人律令也士不與焉蠋嘗諌齊王不從退耕于野未嘗居齊之位食齊之祿則齊之士也一旦燕人破齊走王而七十餘城俱下守城之臣非不多也不逃即降爾未聞一人為齊死者當是時湣王已死蠋猶區區為齊守畫燕人使謂蠋曰燕人髙子之義将以子為将封子萬家否且屠邑蠋謝曰忠臣不事二君烈女不更二夫經其頸於樹枝自奮絶脰而死攷其事與伯夷相類蓋伯夷孤竹君之子讓國而逃非有位者武王伐紂天下是之伯夷非焉殷既滅矣而猶恥食周粟猶蠋志也伯夷之事幸而見稱於孔子其道光明王蠋不幸不逢孔子太史公僅附於田單傳尾而稱説者鮮爰敘而銘之銘曰猗歟先生國之楨士之特也志弗随以貞矢金石也衆反顧以生行不惑也執義之兵返仁宅也固然獨行匪矯激也休有烈聲軋亂賊也我揭其英髪上直也商巫咸祠碑張孟兼惟書曰在太戊巫咸乂我王家又曰在祖乙時則有若巫賢巫賢巫咸子也則巫咸父子世為商輔相矣而巫咸尤見諸子百氏書夏邑有山曰巫咸頂志以巫咸隠於是為名頂故有巫咸祠惟遺甓焉而莫知其所始山麓有廟尋廢蓋宋崇寜間邑大旱禱巫咸而雨請于國賜封王號見斷刻云洪武八年冬縣令閻育等即其頂作新祠而以巫賢侑惟巫咸古賢臣也生而為治功在王室歿而為神澤及後世矧能出雲為風雨而民以望歲者望之其可謂靈也矣是宜食享其土不誣乃為作迎享送神詩使敬祀之而亦以記其成焉詩曰巫山兮巉巉神隠兮中巖神去兮千古盍睠兮我土神化兮為雨風雲兮上下吁我民兮匪神何怙山雲兮浮浮神宅兮山之幽神降兮我留於薦兮我羞我享兮以雩匪鐘鼓兮為娛吁願我民兮不渝神享兮何之風雨兮其馳神我兮不違我望兮以思吁樂年歲兮惟神自兹梅長者祠堂碑方希古天地至和之氣時得之而為春日得之而為煦風得之而為薫皆所以長養萬物其化至宻而其用至醇其在天徳也則為元其在人徳也則為仁為至善之徳為惇厚之化為無言之敎備其理者在唐虞為八元在周為仁人在漢始稱長者其取義以為能長育人材先躬行而尚本質有長盛昌大之道故善治天下者必貴之漢之大臣惟塞侯張歐皆以長者稱因其行而求之若曹懿侯之清凈寜謐萬石君之父子謙謹不譁丙丞相之居徳不伐要皆長者之選長者之為用迂而不曲緩而不滯寛大忠厚得聖人之度人主能用之者其國必興後嗣必䝉其利非若才智之士淺而易窮也彼孑孑然而露其智術任之以事聲威錯出非不可喜然刻薄少恩行法無餘意而慮民無隠情喜之者未終而厭苦之者衆矣若商鞅之於秦王猛之於苻氏曾未旋踵而大亂作豈其才智之不足歟長厚之道㣲而人不懐其徳也故天下可以無才能之人不可以無長者不幸而乏才能焉事不過於廢弛不幸而無忠厚之長者其誰恃而不亡乎長者之用粱肉也才智之効藥石也吾以所聞所見推之國有忠厚之治者後必不衰家之久存而不墜者必長者之子孫台之寜海有梅氏考之圗譜昔有韓盛字昌圗者仕晉為章安令擢南昌别駕知晉将亡即是邑而隠焉常誦佛書既而有靈鳥降其所居之側若諦聴者歲餘始知郡縣以為鳳集上其事宋文帝聞而下詔褒之上表稱謝曰此殆覺陛下之徳耳臣何與焉帝咨嗟稱為長者仍命郡縣闢其所居舍為丹邱寺云今八百餘年矣其子孫衆多為邑巨家而寺亦不廢宋淳祐中諸孫之學佛者良阜建重閣像而事之歴年雖久而未有記其事者夫以劉宋立國未數十年而宗社為墟長者之傳今千載而猶未艾此其所為之可稱豈特一言之善哉宋文帝知其為長者而不知長者之為用國之不夀也固宜而長者之澤至於子孫而益著矣天之於善人其所施甚逺矣祠而奉之非特寓夫尊祖之思使聞長者之風者却去浮薄而趨忠厚豈不足為天下之勸乎然則長者雖不獲如塞侯等之有益於當時而其遺澤之所及未始不同也乃為詩以系之詩曰中世取士貴乎才智巧偽如雲非國之利無言而化不為而成長者之功沛然難名漢祀四百將相多有匪任長者其何能久如山之常如地之容不震不騰涵以雨風或乖于時世不能以澤鍾厥家千載祚祉有晉之衰攘於簒臣先生恥之髙蹈海濵行修于身閭里咸化靈鳥降祥自天来下璽書旌門惟徳是嘉曰匪于躬邦家之華有而弗居天下儀式錫之嘉名江海動色上下百世作者㡬君其誰于今尚有子孫列堂森森衣冠奕葉孰能祐之長者之澤為善無位所係則長若惟尊崇卒取危亡有嚴祠官浮屠攸宅歲時蒸嘗子孫千百輔徳于天為善惟人載其淳風民俗是敦闗帝廟碑古之享天下萬世祀者必有盛徳大烈被乎人人其或功蓋一時名震一國祀事止於其鄉而不能及乎逺惟漢将闗公雲長用兵荆蜀間國統未復以身死之至今千餘載窮荒逺裔小民稚子皆知尊其名畏其威懐其烈而不忘是孰致然哉蓋天地之妙萬物者神也神之為之者氣也是氣也得其靈竒盛著則為偉人當其生乎時揮霍宇宙頓挫萬類叱電噫風雄視乎舉世故發為忠義之業巍巍赫赫與日月並明與隂陽同用不幸其施未竟鬱抑以没其炳朗靈變者不與衆人俱泯則復為明神無所不之固其理也人多謂公特武夫之勇非有損益於世此非知公之心者當公之時勢莫完於曹操力莫强於孫權昭烈敗亡之餘削弱為特甚操欲誘公為已用毅然不從權欲為子請婚罵辱其使如狗彘左右昭烈誓復漢室此其忠義之氣固足以服天下豈特一世之雄哉使公不死與孔明戮力孔明治内公治其外漢賊可誅孫氏可虜而髙祖之天下可復矣然則公之存豈惟蜀人賴之海内實賴之無成而卒非惟蜀人痛之凡嘗為漢民者皆宜為之悼惜也感之深思之久事其在天之神以致尊慕之心而不廢豈非出於天理民彛之正也哉寜海故有祠廟邑人䖍奉如公尚存咸願紀徳刻之牲石俾永世無惑詞曰炎光中滅寰宇分奸雄鉅猾胥噉吞穢腥上聞帝為顰大統重畀髙皇孫勅令神人下天閽虬髯虎眉面赤璊寳刀白馬提三軍驅斬羣盗如狐豚扼荆取益聲勢振東吳喘恐睨且蹲中原萬里殺氣昬意欲掃蕩無留痕厭世倐忽棄厥勲神靈在天􅂱若暾奉帝之命施威恩旌善誅惡康黎元孫曹兇虐罪不原羈鬼號呼遭割焚孰若我公久愈尊海内廟祀莫敢諼春秋薦獻羅庭門酒芳牲碩簫鼓喧神乗飛龍雲駢軒萬騎扈從持旌旛来如飈馳去星奔惠民以實不以言嗟哉我民慎潔䖍懋徳致福無由愆徳涼媚瀆神不餐至理甚昭千古存明神行世同乾坤勅建元衞國忠肅公廟碑劉三吾洪武二十一年夏五月皇上御奉天門召翰林學士臣劉三吾謂曰朕曩命工曹鼎新百神祠于欽天山之陽在元季有南臺大夫福夀効忠以死宜仝庿是方今本部尚書秦逵奏庿巳告完碑已礱就請文鑱之以夀永久臣三吾職在紀載敢不欽承上命謹按大夫諱福夀唐古氏幼倜儻有大志知讀書既長入備環衛積勞授長寜寺少卿累官至同知樞宻院事當元至正辛卯潁川兵起事聞時其君方清暑上京廷議欲馹奏以俟命公持不可謂比得請還事将無及矣即親部分将士調往討之然後以聞順帝嘉其處置明年改授宗正府伊克扎爾固齊以江淮警急尋除淮南行省平章政事至則濠泗巳失公日益圗備禦而上游兵勢方熾乃嚴程築石頭斷江面且戰且守坐固人心㑹集慶告急拜公江南行臺御史大夫臺治孤危所仗湖廣平章阿勒呼木一軍為聲援而部下皆苗兵翻肆暴掠阿勒呼木者旋亦見殺退軍于杏花村髙郵廬和等州相繼失守内乏糧儲外無兵援公料簡民丁壮者為兵富者出粟嬰孤城自守丙申春三月天兵至臺軍屢戰弗利度不能支盡閉諸城門惟開東門通出入未㡬城䧟官民四潰公獨據胡牀坐鳳凰臺下指麾左右若将有為或勸之遁去厲聲叱曰吾臺端重臣城存則生城破則死尚安往遂死其所郡達嚕噶齊塔納達實不忍棄去亦死焉皇上素聞公名命軍中物色以死聞嘉歎久之賜棺槥歛塟如禮其朝聞之褒贈金紫光祿大夫江淛行省左丞相上柱國追封衛國公諡忠肅嗚呼公為不負臣節矣竊嘗慨歎自元叔世奸臣擅權其内藩将失律其外天下幅裂日底于亡公河西人也當臺城孤危于不可為之旹厲不可辱之節比天命有歸所志弗遂則慨然捐軀以死曾無難色非胷中有定見者其能然乎眎彼平日門閥自髙華楚自将坐則議論風生前無古人至此則皆歛裳宵逝忠節無聞其于公賢不肖何如也欽惟皇上得臺城首表大夫之死得安慶復表余闕之死皆俾廟食以厲臣節皇上是心周武王封比干墓之心惟大夫庿故在城南土門岡市鬨間非官民揭䖍所故今徙是方與諸神聫祠庿庭廡門輪奐一新繚以垣牆樹之杉竹是使公之忠槩與欽天山同其嶻嶪公為不徒死矣為人臣者登公之庿拜公之位得不有所觀感而興起乎繫以詩曰侃侃衛公仗厥孤忠守此江東天兵聿臨弔伐是心久旱而霖元有藎臣見道之真如公罕倫盡瘁致身各為其君豈顧堯臣堯仁如天表以墓阡廟以揭䖍惟闤闠中往来憧憧感動宸𠂻欽天山陽厥土燥剛造祠是方聫諸庿庭煥其丹青公此妥靈享祠山巔與國緜延億萬斯年明文衡巻六十五
