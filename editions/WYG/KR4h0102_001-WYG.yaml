front:
  text: 朕荷天地百神之靈祖宗之福起自布衣囏難創業惟時將帥用命遂致十有六年混壹四海功成治定以應正統考諸古昔帝王既有天下子居嫡長者必正位儲貳若其衆子則皆分茅胙土封以王爵盖明長㓜之分固内外之勢者朕今有子十人前嵗已立長子標為皇太子爰以今嵗四月初七日封第二子樉為秦王第三子棡為晉王第四子棣為燕王第五子橚為吴王第六子楨為楚王第七子榑為齊王第八子梓為潭王第九子杞為趙王第十子檀為魯王姪孫守謙為靖江王皆授以冊寳設置相傅官屬凡諸禮典已有定制於戯衆建藩輔所以廣磐石之安大封土疆所以眷親支之厚古今通誼朕何敢私尚賴中外臣隣相與維持弼成政化故兹昭示咸使聞知
