body:
  text: 明文衡卷二十七欽定四庫全書明文衡巻二十八明程敏政編書奉王冡宰書周叙太保冡宰抑菴大人先生閣下叙惟吾吉自有宋逮今賢才軰出為世道之重鄕邦之光者九賢也由兹以降匪無其人而俊偉光明卓然著稱為無瑕之玉無疵纇之珠者殆亦鮮見焉敘扵永樂宣德間嘗仰望少師東里先生可當之然迹其舉措究其㡳裏工夫公論不容掩也竊自計之堂堂名郡際今聖明大一統之時豈無復有歐陽子胡澹菴周平園楊誠齋文信公其人者出邪為之徘徊歎息翹佇思慕者乆矣兹乃扵大人先生而見之得非吾吉賢才之運國家飬士之效之所鍾㦲非特叙與吾郡之士動喜天下士大夫亦莫不為之更慶而交賀也伏惟先生處在屯之際翼戴今皇帝嗣大統處大事濟大難其時其事視諸前軰又甚難者竊謂膺天下之重任必當心天下之大憂成天下之大計而後可以有濟其要無他在扵用君子逺小人而已若兩存之譬如持衡之勢此重則彼輕彼輕則此重難並行不悖也蓋小人易進難退君子未有不為所擠者當兹維新之始主上内外惟先生是倚得不毅然任其責而無少有回顧之慮乎使少有回顧非惟朝廷大事難濟扵夫所謂為世道之重鄕邦之光者亦難望其全矣叙閒中窺察其人若今某公某及某公某公若君子也其已同朝者宜傾竭倚注之彼在逺在家者宜即日叠驛召以來之與之朝夕圗惟同心同德以處大事濟大難幸甚逺小人之道宜徐為之謀強壯者俾膺重鎮扵一方年老者許彈劾致仕扵其家餘未有顯著之迹藴堪用之才者存之彼自相發奮洗濯琢磨為君子之歸矣其他内外防微之政宜與三四君子因人所建白不動聲色以漸處之可也得非謹始執要之一㡬邪易曰知㡬其神乎書曰有終于始又曰惟克果斷乃罔後艱竊思我朝當三楊先生輔政之初一㡬也不深思熟慮身任其責惟陽歛隂施掩人耳目雖曰自保其實誤國故致今嵗七月之禍此時先生與諸君子輔政之初又一㡬也宜鍳覆轍為宗社生靈永逺之謀開天下後世太平之治俾歐陽子周平園之事業復見今日顧不偉㦲失今不圗恐異日噬臍之悔莫及矣豈得即能效張子房之從赤松子裴晉公之營緑野堂之時伏願先生斷斷若􅇻之伊傅宋之韓范以天下為已任為心毋徒諉曰尚有某有某而不敢自専為辭若然史臣軰將執彤管磨崖石以紀勒先生之大勲垂示無窮之不暇則天下之大憂大計可收厥效矣叙賴朝廷之恩先生惠以一介書生官至學士榮矣叨居南京秩清務簡樂矣此外無繊毫求進之心况冒膺宋史之修倘不即死成此一事竊名穹壤間他富貴皆無所望第學識淺陋不足以當耳所念者國家安則臣民皆安叙軰亦或可偷生畢其素志今嵗以來因朝廷屢有更張事不敢避禍亦屢有所陳無非為求天下之安故也未審朝議以為可采否自是以徃亦不復敢瀆告一語矣伏乞先生垂仁誘掖曲全之感徳感徳叙兩嵗患脾疾今秋復作兼以左身風痺未知可逭生否恃平昔從㳺門墻兼辱教愛故不得不有言然前此未嘗敢一奉問也兹因論拯時急務不免覼縷干冒崇嚴恕納不宣答國子監丞閻禹錫李賢昨得足下手書反復披閱足見才識髙逺出扵尋常萬萬比嘗痛恨自巳立志不堅無所成就不免虛過一生得見足下篤志進學如此亦為幸矣故以書相勉且道理無窮雖古之聖賢亦未敢自以為足足下謂扵道半明半暗未得打成一片而受用雖云謙辭蓋亦自知之明有益求長進之意在扵不言之表矣但謂向上一節無誰與講是以舌本乆強教無所施詳味其言則向上一節惟足下自知更無一人可講可教者夫向上一節豈易知而天下之士豈易輕邪雖周程張朱造道之深何嘗自謂獨知向上一節遂為天下之士不可與講而教無所施也况在巳扵向上一節或未能盡知而教人之具或未必無缺遽謂不可與講而無所施毋乃忽扵自察乎且既自以為半明半暗是模範未備扵巳而謂教無所施可乎既自以為教無所施是師道已足乎已又何親炙扵人而賴其資乎所引韓退之云莫為之前雖美而不彰莫為之後雖盛而不傳自為不敢如此且退之與于襄陽書有所于求故發此相須之言以挟制之期扵必聽豈聖賢道德之言邪况扵此書前後篤志進學之意亦不相類而足下引用其中誠所末喻夫以足下致書盡禮如此豈可輙扵辭語之間洗垢索瘢誠愛足下之深務期造扵醇正之地故耳幸勿以為狂耄而鄙外也及觀佳作數篇辭意髙古可喜但為文貴條暢只看晦菴草蘆之文如行雲流水理明意到初無險礙讀之令人快然扵心二儒詩文累牘可謂多言矣扵道不惟無害而且有所發明更望足下取法焉與安南國王書七錢􅄎一委廣西南寜府差官齎至本國界欽差襲封正使翰林院侍讀學士錢溥副使禮科給事中王豫㑹同欽差司禮監太監柴昇奉御張榮端肅致書扵攝安南國王竊惟善處世者貴逹經權之道而善知人者在察誠偽之幾使知經常可守而不逹權時之宜膠柱鼔瑟之人爾焉望世之能處哉人多欺偽之弊而已無先見之明坐井觀天而巳爾尚何人之能知㦲此天下不能無是事也竊欲為王言之王實始封安南國王之孫傳父及兄至王盖四世矣况王材足以靖亂賢足以得國禮請天朝名正而言順可謂適經而與權一誠而無偽者而何待扵言為㦲今王發政施仁之始正百官承式之時使往事之未明恐後疑之復啓故言之不能以自已也初黎氏得國于陳我朝廷念陳日煃率先歸附世貢不絶忍視其子孫滅亡而不顧㦲一舉俘獲以為内屬且俟其子孫之可復者奈訖無可復之人而王祖又為國人所依附遂俯順其封以奠我南服傳及三世好同一家豈意琮賊以庶簒嫡昧死來求且曰游湖自溺意在不弔其忘君之心見矣朝廷速命信使徃封冀朝發而夕至其國詢及溺死之故則琮必難為言曰君其問諸水濵也歸言于朝豈無偏師及境以一正其罪邪使將及境琮已就討且告訃請封之使來即遣行人往祭而猶恐復有如琮之請者乃遣錦衣使者偕廣西廵按御史及鎮守三司官私于境上而知王為第四子母子皆賢禮所當立然後命溥等為使以錫封焉則我朝所以保黎氏而惟恐立非其正者豈下扵保陳氏㦲凡遣使至京翺翔萬里聴其所往懋易有無入市不變如子扵父母家任便取適而巳豈有宻切偽爲之計㦲此皆王之所知也又聞太祖髙皇帝平定之初安南首至而朝鮮稍後且不誠聖諭切責之曰汝所恃者一海爾汝能恃之我亦能渡之遂格心向化表于東土㡬百年矣頃與女直等國有僭越志諸國來聞使行人私焉頗得其跡遣給事中張寧賫詔徃問王即蒲伏叩地至不能起且責之封人而已不知聞安南累侵占城故臣言及此哈宻越在流沙萬里外實西域諸畨之門户其王為下所弑母老子㓜勢亦殆矣母太妃來聞遣通事沙廷玉率其類數十人徃立其子得元惡十有八人太妃曰此天朝所得宜即天刑遂檻赴京師以正其罪安南連嵗簒奪未嘗請正天討故臣使聞之則我朝扵四方萬國抑強扶弱植顛起仆使之各寧土宇而同享富貴于無不覆載之中實父母其心天地其量而日月其照臨也較之安南臣伏南陲謹守禮法而聲教之外不煩于我一使者宜保其後待其使有加于諸國也而何我使初入則言語不交主僕星散迂渉峻嶺迫邇兵械使人撼頓抑塞而不安如待以暴客然者其果出扵誠乎既至而待之則自徐侍郎等來以東西向坐邊行人等來以南北向坐至黄卿等來則書往復數畨辯至七日而始定為竝南向坐然則何為是不同乎豈顛倒我豪傑而使之為間乎抑禮始粗備至是而將定乎願明以告我也元史載世祖詔安南曰來奏有一家之言今聞納喇丹云彼多回鶻禁約不扣交談果如是言一家之禮有如是邪其後俗終不變卒至兵連禍結而國僅存幸入我朝而始靖豈更化又百年而習俗終未變邪傳曰魯不棄周禮未可動也又曰晉未可媮也其朝多君子季札聘魯見舞簫韶而嘆盛徳孔子見郯子得聞官制而曰天子失官學在四夷是皆以禮樂制度維持其國於周室傾危之時罔以内外而有間也况我朝之扵安南一惟禮文相與而各極事大字小之誠而何獨不誠扵待使邪或者居先王之左右者好是狡偽以為功也故扵王初即政而言之溥等叨天子侍從密勿之臣加以太監等又帷幄寵臣故特簡命與之偕來王亦知非往使比矣果能改而待之以誠否乎王宜速令使者出境相候擇定吉日并迎接開讀宴㑹坐向等儀注來勿事退讓以勤徃復務酌古而凖今之宜革薄而從忠之厚將於是乎觀禮毋徒誚曰未見顔色而言謂之瞽也溥等肅奉二回儀注欽差襲封正使翰林院侍讀學士錢溥副使禮科給事中王豫㑹同欽差司禮監太監柴昇奉御張榮端肅致書扵攝安南國王惟安南素稱文物邦其畏天事大之誠固無所不至而獨扵待使之禮尚有所不一者故溥等奉聖天子恩命觸萬里炎熱而來方抵南寜即馳書扵王願聞所以不一之故庶將事之際有恪而無疑也比入闗二日王遣阮善來曰不敢回書惟見教王之意厚矣然鍾未有不扣而自鳴者故諭善以復曰王其無書决難定禮且使聞諸執政者曰國於是時當開心見誠勉圗中道以成吉禮不宜往復論辯使王心不安為此言者譬人之受病誤餌其藥則病雜矣後之醫者不發其源而救之將何以臻效故善回甫五日果以王書來始知所以不一者禮雖無據言則可信是受病之源已見而求療之心亦篤矣然猶持二端而未一者尚恐投劑之復誤乎噫是未暇與深辯也今夫禮者所以辯上下而定民志也辯以明其分之不一定則恊其志于克一大抵一則誠二則雜書曰徳惟一動罔不吉徳二三動罔不凶此之謂也兹欲合二三而一之蓋有祖宗之定制在定制者何大明集禮一書我太祖議禮以一天下者也其間載安南宴坐與夫頒詔儀注甚詳何王之先君不此之求而惟以洪武禮制詔行司府者言之宜有以來竝坐向南之説也雖然昌歜薄味也而周公辭之為無徳不敢以當備物之享繁纓小物也而孔子惜之謂名器不可以假人古之謹禮扵微也如此而况我祖宗定制布在方冊昭如日月而敢昧之以貪殊禮况今頒詔授封領勅之禮竝行謹按集禮所載而參以禮制及古禮之可行者共為儀注六條王其嚴命有司行之豈惟有以新子之國亦克永世而無愆矣幸毋惑扵故老之談曰吾先君未之行也而忽焉溥等肅奉三論禮不行欽差襲封正使翰林院侍讀學士錢溥副使禮科給事中王豫㑹同欽差司禮監太監柴昇奉御張榮端肅致書扵攝安南國王前書回云宴坐之禮前軰講定至黄卿始為不足法劉行人能不改其舊此皆無據之言而可以服吾軰乎可以服天下後世乎宜黄卿執之為是也僕等想王之為此言者技止乎此故不復與辯而直以古今大禮相與講而行之蓋以洪武禮制所載皆詔行有司而未及蕃國大明集禮所載有詔行蕃國而未及封拜故酌古準今而成此使其昧此而一以禮制竝坐向南執之則王亦何辭以辯而僕存此心其如國之山川鬼神何王不復察此又欲易國卿之禮如殿坐之儀則已自王之矣何必請命九重之上而勞人萬里之外㦲若曰王命未宣而未敢遽相勞則天下豈有不飲食而行事者蓋與王初見又在禮不在物也噫惟天不可以偽欺惟人不可以偽感王其察焉若夫漢語國音竝用兩不相疑何失之有冕服之制以俟奏請而行可也誠欲相見請改書以從溥等謹覆四再論禮欽差襲封正使翰林院侍讀學士錢溥副使禮科給事中王豫㑹同欽差司禮監太監柴昇奉御張榮端肅書致攝安南國王竊以出郊迎勞之禮當盡賔主南北之説者公館非殿也冠服猶卿非王也是宜執禮度扵分内溢慰論扵言表然後導迎恩命宣揚國都東西宴㑹以如儀彼此交驩而成禮豈不隆一代之美談彰一時之盛事㦲是皆發乎至情合乎中道可以坦然由之而無疑者而王獨不此之信謂天命不足畏而可以坐致之謂天使不足敬而可以王禮忽之將猶楚子受玉而惰成子受脤不敬之歸矣豈知魯公如晉悼出國都以接之向戌來魯襄盟于劉以待之而皆不以為過者哉今王天資髙邁學問淵篤禮足以行已和足以得衆宜有出境待人之謙而無惰與不敬之失矣然猶致是之紛紛未决者毋乃異論以惑之乎繼今當召自宫中府中以及街衢奔走遊説之徒而問曰天使駐節扵近郊有日矣當以卿禮接之乎抑以王禮加之乎彼必無貴無賤無長無㓜無逺無近咸應之曰宜以卿禮接之王得封而後可然後遣一介來曰王悟矣敢犒于執事則僕等何辭之有亦何煩異論之有兹承阮堵阮廷羙來詢動止遂布此以聞惟王勉自處焉溥等謹復五辭送禮物欽差襲封正使翰林院侍讀學士錢溥副使禮科給事中王豫端肅書復安南國王伏自寓館以來王之牢醴餼廪日盈扵始而謙撝敬慎不替扵終行人何以臻此瀕行又辱贐遺感愧何量然嘗聞之宋人或得玉獻之子罕子罕勿受獻玉者曰以示玉人玉人以為寳也故敢來獻子罕曰爾以玉為寳我以不貪為寳若以與我皆喪寳也不若人有其寳兹者奉徳音揚清光惟恐弗職以忝恩命若受之豈惟失寳抑速戾兹甚矣古人有曰事大在共其時命字小在恤其所無王之事大雖國所無亦克惟命是共矣此未之能恤也而况厚贐之復加哉用此敢辭不宣溥等同拜六辭送私贈欽差襲封正使翰林院侍讀學士錢溥副使禮科給事中王豫端肅致書于安南國王昨者迎恩亭上荷王執盃眷戀之深送舟凝竚之乆斯情何以云喻又况贈賄之辭未畢而納善之禮復加舟次之拒已絶而馳逺之使即來此將物以表其情也殊不知物盡則情亦盡矣曷若泯其物而使斯情恒懸懸于中哉關山迢遞日逺日深瞻仰無由豈勝慨念不宣溥等肅奉七再辭私贈欽差襲封正使翰林院侍讀學士錢溥副使禮科給事中王豫端肅致書於安南國王奉違以來䝉遣近臣黎𢎞毓阮堵等伴宿二人學行周洽寔王所任使親信之臣不可以一日離者特徹以祖送至於浹辰之久幾乎千里之逺而不恤是固敬事朝廷以及行人之禮然而加厚斯文之情亦有在矣孰意行頃復出所辭納善之金以溷我行李則王所以愛之者又何若是其凉哉夫禮無加貨事無二成古之使者甞謹於此矣用是返璧幸無見譴非此二人不能盡其情也乗此清風欲歸去而南望青㝠不過一輪明月共照此心而已溥等肅奉與王大理同節論文書劉定之隂德三積之序殆非司馬君實之言考於本集無之昔者孟子謂今之人脩天爵以要人爵董子謂仁人正誼不謀利明道不計功以其所脩所正所明者雖是而其要之謀之計之者其心非也若君實云積隂徳以為子孫長久之計則亦今之人而非仁人矣司馬君實者孟子輿董仲舒之徒也而為此言尚安得從二子之後以至今立於孔子之廡乎君實之相其主以改新法也人懼之以禍則曰天若祚宋必無此事病且殆猶曰死生命也為之益力夫改新法而不避後患豈有積隂徳而欲圖後福也哉故愚謂此非君實之言也今人以此言為出於君實者取信於趙子昻所書子昻要為不足以知君實者其畫人馬竹梅工書能詩盖王摩詰李伯時之流當其存日見輕於姚燧良有以也且多寫老釋二氏之書其自稱曰三教弟子何足以知君實哉本其以宋宗室立宋之朝宋亡而臣元大節已失故自放於詩酒書畫之域後之君子不於其言行取信焉可也明文衡卷二十八
