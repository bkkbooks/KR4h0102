body:
  text: 明文衡巻四十明程敏政編序心學圗說後序蘇伯衡金華坦谿之上有隠君子曰鄭君彦淵宋川陜制置忠愍公之六世孫也始余得其葬書注釋讀之固意彦淵儒者乃今讀其心學圗說信彦淵之為儒者無疑矣夫堯舜禹之相授受也曰人心惟危道心惟㣲惟精惟一允執厥中萬世正學於是乎出焉商周繼之其間聖賢焉不學而亦焉有外此以學者哉逮乎周衰聖人不作異端竝起其所以為學者大抵非帝王之學漢興羣儒掇拾遺經於秦火之餘往往溺於訓詁而不知反求諸心則既失矣後千數百年濓洛諸大儒出當宋世相與倡明聖學而論著焉子貢之徒所不得聞于仲尼者昭然若掲日月天下學士始知不知道不可以言學不明心不足以為學夫何積習既久雖有豪傑之材亦皆篤信先儒之成言是誦莫肯以精力自致而今為甚譬如侏儒之觀塲人抵掌亦抵掌人揶揄亦揶揄其目耳猶無見也其心况有得乎則其失愈逺矣夫千古帝王之學固因濓洛諸大儒而復明至于天地事物之倫理性命道徳之精㣲諸大儒又豈敢自謂其言盡矣傋矣後之學者無所容心無所容喙也乎哉此彦淵之書所以作也彦淵優㳺事外於凡聖經賢傳旁及釋老之書靡所不覧而未甞阿以為同㝠思而黙體深造而自得得其說直欲逾濓洛渉洙泗窺先天之秘推其用心可謂勞矣非儒者而能與于斯乎惜夫是書出於三百年之下而諸大儒莫之知而莫之取也倘令彦淵與諸大儒竝時而生從而就正焉其有不傳信乎而顧使余得而讀之豈知言哉唐許𦙍宗國醫也而不欲著書以為脈之候幽而難明吾意所解口不能宣得吾之所言而不得吾所不言則於脈有不能明而且妄投藥矣於戲醫家之說萬一失之其禍止于傷人吾儒家之說萬一失之其禍遂至于亂世然則儒者著書視毉者著書豈不愈難乎故余平生為學不敢篤信成言亦不敢輕出臆說觀彦淵之超詣獨得多所發揮寕無慨然者乎圗與說所不能盡者彦淵尚終有以教我哉送歐陽公輔序故大司徒楚國歐陽文公起自休致拜翰長之明年伯衡舉進士至燕因得拜公于崇政里第退復得與公之孫公輔逰公輔生長伯衡一年聰敏未之或先朝夕綜理家政裁答書疏賔禮門客閒則讀書為文不遑頃刻自逸伯衡見之未嘗不羨且愧也别公輔南歸未㡬而兵興出處之不知且十有六年國家底定燕冀公輔来南復相見乃知公輔積官至中書左司都事而于當世之故益熟矣甞與之論元社之所以屋雖天命而致之豈不由人乎哉天厯元統以来海内無事士大夫安富貴而養功名職于郡縣者以将迎為要以依違為賢以漁獵為務而司憲度者亦皆保其禄位顧其妻子類欲樹私恩為自完之計其低徊澀縮茍且嵗月不以是是非非為意者則號識大體而尤見重上下相䝉政以賄成馴至至正間變起意外而遂莫之支焉然則其亡也天邪人邪必有以辨之矣於戲公輔真知言哉今年春公輔采史家事自北平山東還而陜西按察僉事之命下且行欲得一言為贈伯衡竊謂君子之為國也猶醫師之治病也今夫貌之瘠肥氣之虚實病之深淺凡為醫者舉知之而不能療療之而不能已則由其不知病之所在與夫治失其方藥之不得其良也有醫師焉切脈而灼知其病治之有方投之良藥固不待煎洗割解而愈矣曽謂為國而異是乎聖天子起民間混一四海慨然思革前代之弊於是簡㧞人材分布郡邑而寘諸風憲則其尤者也而吾公輔與焉公輔侍文公自蚤嵗所接識皆朝之耉老成人所聞皆康時之略所學乃聖賢之道而又養之以嵗月習之以世故迹其言論譬諸醫師盖不惟素蓄良方善藥抑亦知病之所在矣雖以之為國無難也而况一道乎書曰商俗靡靡利口惟賢餘風未殄公其念哉夫畢公保釐東郊殷之為周久矣而其言且如此矧今秦雍内附未久也則向之吏習庸詎知不有存焉者乎申明徳意作新之伯衡於公輔有望焉送晉王相汪君序聖天子統一函夏圖惟治道念夫為國之藩屏在乎衆建親王爰以夏四月乙丑九子一孫同日封為王授之冊寳錫之車服胙之土田復簡朝之重臣為之保傅親御便殿面諭而臨遣之俾之先往繕城郭樹府寺傋儀衛董官聮施政教以待諸王出閤而龍舒汪君實拜晉王相昔三王之於世子莫不旁求碩士為之師為之傅為之保而道以徳義輔以政事保其身體漢氏以来因之凡諸侯王例寘傅相其位秩差後三師而禮貌之隆責任之重則鈞一焉矧今晉王所賜履表裏山河乃堯之故都叔虞之舊封韓趙魏之全壤地大且要保王躬而制外閫不有重臣則何以哉汪君負倜儻傑出之資夙承訓於家庭又甞師武威余公其奥學雄文宏材逺畧卓乎非流輩所可及上之渡江也首被知遇出入左右敡厯中外惟其所用而聲實以著譬則萬石之鐘大叩之大鳴焉小叩之小鳴焉今繇二千石擢拜是官眷注尤非昔比矣漢光武以張佚不難於正朕故用佚為子傅唐太宗謂李績不遺于李密故託績以孤幼帝者為子擇相類如此汪君之使河南也被留久之而卒完節来歸其在中臺也數犯天威陛陳讜論可屬晉王豈復有過于君者哉則君所輔𨗳視佚與績之所輔𨗳者雖有本支之異而上之所以用君者與光武太宗之取佚與績盖千載同符也已鞠躬盡瘁啓沃彌綸以光孝友之行以拓維城之功以追河間東平之賢使晉邸綽為令王保有社稷與國同休永永無疆上無負聖天子建親王之至計擇保傅之盛心固大夫士之所望而亦君之所優為者哉君且行朝士之能詩者式歌以餞而屬余叙之於是乎述葯房居士集序祝廷心傳曰見其禮而知其政聞其樂而知其徳後世之禮樂不足徴矣因其文章而考其所遇盖亦可以觀當世之變也乎士之生也以萬事所集之身而行乎是非得䘮禍福之途自非離世絶俗不接乎事與居乎至盛有道之世焉能使憂勞悲憤不介于其中有以觸乎中矣焉能使怨懟咨嘆不形乎其言夫以三代之際道術政教莫此為盛也賢士君子莫此為多也然考乎風雅之所録和平愉樂之音不能勝乎憂戚頌羙稱譽之辭不能當乎疾刺而况數千載之下時殊而事逺者乎漢唐與宋傳國各三四百年而其全盛無虞居其三之一士之幸而遇其盛者盖甚衆至觀其論述猶或有艱窮無聊畏罪罹謗之歎盖世治矣而家或不寧身遂矣而或不獲行其志叅差而不齊者固其理也歟則何怪夫言語文章之難乎出于正也元氏之全有中國者九十有二年不以政柄屬諸士而亦不以法度誅之故士之仕者茍循理自守則可以致名位而無患禍然以父母妻子所託之身而不免與事接或任違其能叢以細故而繩以吏責亦烏能脫然無累於其心哉若浦江鄭先生仲舒之所遇盖世之所至少者也先生之家既聚族而居事養撫育服食之須有常司冠昏賔祭繇役之事有常主自為學之外一不以入其心而出仕於朝厯翰林經筵太學太常或為其屬或掌其教日從世之名人大儒雍容講說而未甞預簿書錢榖之煩及乎運衰而社易奉身而歸為老成人享甘脆華美之養嵗時從賔客兄弟嬉遨燕眺子姓左右數十人無適而不可於是屬文賦詩以述其樂余與先生逰從其從子叔度得其所著葯房居士集而讀之其言皆恬愉順適廣大和厚無所望乎外無所激乎中若不聞乎世之憂患者不平感憤之言無毫髪見于其間噫是何其幸乎世之有志于斯文者或奪於事變而不得盡其才或滯於寡聞而無以開其趣故至狹隘淺陋而不足傳也因先生之所遇以求其文因文之所稱以論其世是豈特一人之言也哉是豈特今世之所鮮也哉金華城川十詠詩序童冀金華漢長山邑也連山環抱郡城其西中㫁如玦浙水出焉浙源發東白山繇烏傷西下經郡城南合華谿水為雙谿又北折東騖而入于江其山則北走嚴陵南極閩嶠東逾天台委迤以達海上之諸峯焉故自六朝以來號為山水名郡余生長是邦足迹所逮者北之羣山若金盆紫巖者以十數金盆盖晉王初平牧羊地也紫巖則齊劉峻讀書石室存焉又其西為金華洞天南工名山所厯亦以十數惟永康諸峯尤為峻峭而巖靈石室則心所願逰而未遂者也洪武丙辰冬沗徴至京明年而職教全湘泝大江西上五千里凡吴楚名勝若九華匡廬之勝秀彭蠡洞庭之險與夫岳陽黄鶴之偉觀可以動盪心目者固亦多矣而猶以為未屬厭也盖全湘距舂陵不三百里舜之九疑在焉雖旦夕心所鄉往迄弗如志及再道衡陽距南嶽一舍而近亦弗獲寓目焉将造物者靳而不畀人乎良由是身匏繫故也暨來霅川覧天目之竒峭覩震澤之浩汗及嚮所經厯者視吾故山若有加焉雖美而非吾土昔人所以興歎也今同郡朱世庸不逺數百里走介吴中持其所居城川十詠徴余序引城川去予居纔數舍宻邇石室固平昔所願逰者也所謂十詠若華釜之峯棲霞之洞已多厯年所其他若亭若軒若齋居若樓觀則創自朱氏也使徒有是境而乏軒亭之勝或淪於閒曠有是室而非其境亦烏足以辱髙人名士之篇詠哉聞朱氏之居其地今數世矣其所以克専其勝者必有其道矣昔之金谷華林午橋平泉其樓觀之偉花石之夥視朱氏奚翅什伯倍蓰也然而數十年間鞠為茂草雖欲彷像其遺跡而不可得惟唐王摩詰輞川别業逮今猶可想見誠以篇詠猶傳故也朱氏之志其在斯乎雖然是境之勝固藉人言以傳其所以克世有其勝者則賴乎後之人有以持守之也朱氏之處此其必有道矣余髪種種旦夕得告東還或杖䇿一来克攬竒勝償其目力所未逮者亦足以酬素志矣嗟乎故山百里猶荏苒半世弗克一造其境則夫數千里外所謂九疑衡岳計終不可得而見矣然獲歸老故山逍遥林壑以優㳺卒嵗所得不既厚乎失之東隅収之桑榆尚㡬焉送朱先生赴京考禮序謝肅自三代禮樂蕩滅于秦至漢代秦而帝去先王未遐冝可以復其禮樂而為治于天下矣然髙帝不學而佐非真儒故其為治不能復禮樂於三代殆亦叔孫通之責哉方叔孫通説帝之起朝儀也帝曰度吾所能行者為之不過謂定君臣之位而已固未及乎先王之禮樂以達于天下者也而叔孫通遂以興禮樂為名廣徴魯諸生是以有兩生不肯行曰禮樂積徳百年而後可興至哉乎其言之當也夫徳先王所以化天下之本而禮樂其具也有其具無其本固不可也而髙帝寛仁長者其豈無本乎曰固矣然漢承秦變古之後以古變秦其唯三代之禮樂乎沿三代之禮而教民以中襲三代之樂而教民以和使中和之氣充塞天地則萬物不疵而王道成矣王道成然後損益三代以作漢之禮樂則漢其三代矣乎是或兩生之所藴也惜乎叔孫通學不足以與此不能終致兩生乃率諸生暨帝左右去三代之難采先秦之易以雜就其尊君抑臣之儀綿蕝而習之及帝既行曩之醉呼㧞劒者莫不震肅而帝亦起皇帝為貴之歎則叔孫通亦可謂達時之務矣然使四百年之漢遂以為禮樂止于如是而治化卒無以及乎先王者叔孫通之責也此異時賈誼仲舒王吉劉向之徒所為發憤而増歎豈獨今日兩生之不肯行邪是故無兩生天下萬世無禮樂無叔孫通則漢亦無君臣之儀而漢儀固不足以當先王之禮樂也後世君相之圖治者其可不知夫學乎今皇帝緝熈聖學治倣先王混一初元命中書暨翰林太常率諸儒定擬三禮明年再命集議禮樂又明年徧徴在野道徳文章之士相與攷訂之将以成一代之制也而吾鄊朱伯賢先生實在徴焉先生生東南㳺西北遭時多故歸隠山林飯疏飲水益力於學以學之為王者事也故其論道徳必歸之于三代之選其論文章必歸之于三代之英則今也應徴其能不援三代禮樂以為國朝之治具乎雖然兩生不肯為漢行先生肯為國朝起是國朝之徳之盛軼于漢而叔孫通之學不足以齒今之侍從大臣也先生盍亦攄兩生之所藴使三代禮樂不得復于漢者而復於今日焉則賈誼仲舒王吉劉向之徒将不復發憤増歎于異時矣非先王其孰能與于此哉告行之日書以為贈娥江送别圗序溧陽達公貫道丞越之上虞秩既滿将朝京師邑人士相與送之娥江之滸公欲登舟輟挽止之咸咨嗟感歎不忍為别於是公起指江以語于衆曰昔吾絶江而東懼弗能佐理以沗朝廷寵命賴是父兄能教子弟能率三年無一事累我我得西渡江趣道千里以覲于天子何幸之深毋為不忍余别也衆闔辭以復于公曰自本朝有天下以来官于吾邑者不猛以厲民則寛以怠事不激以為亷則察以為智是皆不知從政往往不免故未有一人得赴中書以考厥績者考績中書當自公始公無彼數者之失有古遺愛之風哉吾等是以於公之别不忍也乃再拜别公公登舟送者佇立水濵舟既行猶注目不少瞬而公亦慿柁樓顧望踟蹰于時天霽潮平四山如洗木葉飛摵摵凉飈舉之與翔鳥泳魚相下上于中流使人别情紛擾益不能自忍也好事者繪焉題曰娥江送别圗将以寄公屬序于余余謂送公之别不于他所而于娥江也何故盖娥者曹氏女也其父旴善水以迎伍君為濤所溺娥已死援出父屍事載漢史後世慕之故以名其江然伍君之忠曹女之孝臣子大節也公甞以教邑人士今公之去邑人士必臨江以送者非徒不忘公教亦以願公克全大節也若乃區區不忍為别烏足重為公道哉姑併書于圗末而能言者又繫以詩庶乎公之有以觀省也送徐先生歸嚴陵序高啓嚴陵徐先生大年甞被召至京師與修元史書成上進詔擇纂修之士官之先生以老乞還甚力㑹春官議修五禮為一代之典乃復奏留之未㡬其書又成先生固申前請大臣知其志不欲強煩以事乃命有司具禮傳送以歸其鄊都之大夫士相與祖餞幙府門外有言者曰先生之學冝傋顧問先生之文冝掌綸綍先生之經術操履冝在成均為學者師今皆不可得顧令以布衣老於家歸雖先生之志然豈不為司人物之柄者惜哉余進而解之曰皇上始踐大寳首下詔徴賢又責郡國以嵗計貢士欲與共圗治平甚盛舉也故待賈山澤者羣然簉庭如水赴海而隠者之廬殆空矣朝廷待以庶秩猶梓人用材鉅細畢取豈獨於先生有遺哉盖先王之為政莫先於順人情亦莫先於厚民俗力有所不任者不廹之使必為義有所可許者必與之使有遂所以人之出處皆得而亷恥之風作矣今先生以齒髪非壮厭載馳之勞戀考槃之樂抗辭引歸上之人不違其請者盖将縱之山林使其鳥飛魚泳於至化之中以明吾天子之仁又将以風厲海内使皆崇退讓而息躁競也順人情而厚民俗實在於是故寧失一士之用而不惜以其所得者大也不然先生豈茍去之徒而大臣豈棄材之士哉况先生之歸也必能著書立言以淑諸人詠歌賦詩以揚聖澤則又非潔身獨往而無所補者也尚何疑哉吾又聞漢祖中興嚴光不屈後世莫不髙之今先生之鄊即光之鄉也甞逰其耕釣之處山髙水長想瞻遺風必有邈契乎千載之上者矣今之歸其無負于夙昔之志哉若余遭逄明時不能禆益萬一懐恩茍禄而不去於先生盖有愧焉矣於是言者是之請書貽先生以識别贈錢文則序韓文公詩有曰我生之初月宿南斗蘇文忠公謂公身坐磨蠍宫也而已命亦居是宫故平生毁譽頗相似焉夫磨蠍即星紀之次而斗宿所躔也星家者說身命舍是者多以文顯以二公觀之其信然乎余後生晚學景仰二公於數百載之上盖無能為役而命亦舍磨蠍又與文忠皆生丙子是幸而偶與之同也二公之名雖重當世而遭逢排擯謗毁幾不自容仕雖甞顯于朝而貶陽山謫潮州竄逐於羅浮儋耳之間踰嶺渡海冒氛霧而伍蠻蜃其窮亦甚矣顧余庸庸雖不能致盛譽亦不為排謗者所及况遭逄聖明沗職禁署䝉恩賜還無投荒之憂是幸而不與之同也然二公之文章徳業赫然照映千古而余早罹艱虞中事奔走學不加修文無可采将泯焉為衆人之歸是不幸而不能與之同也噫命之所舍既同則冝無不同而何相去若是之遼哉盖窮達得䘮由乎命智愚賢否存乎人存乎人者可為由乎命者不可必世之人常以不可必者責於命而不以可為者責諸已所以多自恕而倖得也若二公者其道同其文學同故毁譽窮達有不必其同而自同則余之不能與之同者盖有在也而豈命之罪哉山陽錢文則能推星以言人之禍福無不竒中士大夫多稱道之将逰湖海徴余言為贈因書所以自警者貽之且使遇夫自恕而倖得者告焉文則讀書好修善鼓琴斯術其餘事云明文衡巻四十
