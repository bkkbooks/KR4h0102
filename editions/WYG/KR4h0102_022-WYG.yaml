body:
  text: 明文衡巻二十二明程敏政編七志釋寄胡徴君仲申宋濓華容孝亷與廣平文學遇于神明之臺孝亷問曰予締子交巳越二紀其貎固狎其志則未之聞也子能為我揚搉古今而釋之乎文學曰走也不敏長自巖穴鶴毳編􅃭土芝緼食動趾踉蹡發辭􅟌吃忽挾緗縹去厯都邑見者大噱指為木刻錯愕周章無地寄迹獨孝亷煖我以温顔前我以重席迪我以三古之芳猷期我以九能之至域拜孝亷之貺厚矣孝亷有問敢對以臆寓形霄壤不翅蠛蠓時幻歳遷電滅鳥空唯極所適其樂則鴻出游大澤才鶱氣雄鼻尖出火耳後生風金張前驅許史後從牽黄臂蒼箙矢韔弓仰落雙鵰俯搤長熊毛血旁灑塵坌四封入據邃館廷實惟供罍尊旁午豆爼衡從肉腴含春酎暈移童器周八音律合六同部分立坐筵布西東緑華白台南威紫衝靨輔竒牙瓌質姣容歌喉撼塵舞袖翩龍其有事固日新而弗足也竊有志焉孝廉能許之乎孝廉曰欲敗度縱敗禮古人所戒子豈宜蹈之願聞其他文學曰班生投毫令名煌煌終童請纓其齒甚少不有焰焰孰潜其爝非勒銘於燕然必建標於粤徼軒冕以之蟬聨紳笏以之嫽嫽衛霍擁軫樊陳執纛公子掃門王孫媚竈霜露係乎吹嘘予奪視其愠笑其鋭也若孟勞之出魯襓其重也如天球之鎮周廟天下學士揮汗為雨聨袂成帷莫不仰遺光而企末照其視處環堵厄藜藿擊壺而越吟倚柱而吳嘯卑卑南陽之畊落落滋泉之釣口心共語影形相弔不亦大有徑庭乎孝廉曰功髙者身危位隆者名喪此衆人之所嗜而君子之所慎也文學曰神封靈壤作鎮下方㑹稽衡華沂岱嶽常霍及醫閭分布九疆總三條於中區限兩戒於外邦他若滄漲蕩浮青翰混茫包天裹地循環相通叶湯其間怪偉靡可數詳天孫嶽長水伯瀆宗叶莊昴宿寳符之貴𤣥龜青鯉之章金篋玉策之探日月珪璧之藏或隠而晦或露而彰走將簡徒御戒樓航濯足於咸池晞髪於扶桑豁氛埃於人瑕發忠信於天光蒼水之使稷丘之君庻一問之勺鼎湖而想遺弓履河洛而思聖勲也孝廉曰山川形勝固足以廓子耳目昌子文辭然非至焉子毋徒取則於太史遷也更請大之文學曰去聖逾遠學術紛披控名責實禮度是師上下有叙隆殺異宜苛察繳繞弗失絲釐貴儉兼愛上賢右鬼采椽不斵型簋唯土嗇然自守與孔齊􅁤權事制宜詭行遁辭移隂轉陽入神出竒變化闔闢千目莫窺秉要執本立為經制法無常形事無成勢洞究羣情為萬物主儀節或愆峻刑弼之肅如晨霜犯者裂肌仲鞅非到挾之以馳因彼天時以施教令若儀若象測度以定紀綱載明是謂大順食天所寓邦本所資山澤平地相厥攸宜八政之首著于經彛揣摩國紀宣明帝治或合或兼本末畢具凡有猷為罔越憲制若是喧豗駭猋迅雷震撼乎四極充斥乎九垓渢渢乎海水起立而應龍天飛也戔戔乎五兵雜陳而神授握機也芒芒乎曠野萬里而列井布棊也走欲徧索其説而試之不識可乎孝廉曰夫子沒而㣲言絶諸子百氏人人殊未有能一之者也文學曰戡定惟武亦國之程其書漫衍四類是繩隂陽權謀伎巧勢形其目昈列繙繙繽繽九宫八門六甲五神軍軌兵鈐星式雷經金鷄玉狗風角鳥情制器尚精動合神機胄鎧羅陳戈㦸交施渠答距堙䳱㝠扶胥象車雀杏行馬飛鳬武衡大櫓驩耳長殳雲火萬炬渾脱全軀䇿全器良其用益張營察六形旗按五方天地定位風雲流行龍虎騰趠鳥蛇翼驤正正竒竒巍巍堂堂赫赫赩赩稜稜璜璜以守則固以擊則揚或追北於函谷或喋血於太行或徇地於臨菑或陷堅於昆陽是亦英雄之壯觀也走竊樂之不知饑渴之在已也孝廉曰兵者不祥之器聖人不得已而用之子服儒衣談儒書又焉用爾為文學曰粤厥軒轅游心太初上超鴻沆下入渺瀰有竊其餘亦神其軀文賓履生師皇馬醫玉柱丹砂騎鳴龍師木羊葛由神泉鹿皮折足山圖赭衣服閭女丸素書赤斧碧鷄朱璜瘕脱𤣥俗質虚心存冲寥跡亦佹竒五性既絶九患亦除三階有嚴七變無虧身升紫宫位紀琳書隂隆伏骨目炯四規執東象之玉文契九赤之班符御躋虚之龍韈服太極之麟芝入火不􅅡入水不濡入石不閡入木不拘雲臥天行神濳靈飛是盖與天為徒又不特致治於無為也當闢我石室寢我世機服我胎息殺我蟲尸洗伐我毛髄銷觧我膚肌覩銅狄而摩挲約令威而來歸不知能成其志否乎孝廉曰聖人不師仙使其可為則周孔為之矣文學曰荒荒遺文或偽或真學徒巧辨或正或舛先出者堙後出者存何老生怨尤而異師是嗔藏之名山編簡乃完何傳授有緒而魚魯或殘汲冢一啓蟲書再覩何怪言放紛而弗齊于古緯候相傳内學是尊何列國寳書而盡閲其文僭辭竊義聾俗簧世日新月巧動莫之制衡錯㰚瑩方州部家何立言艱深而莫究津涯始生終通生育及資何其象不一而數皆九為原熒丱冢名性氣體何圖指佹殊而重摹迭擬觸類而言何莫非此沾沾動喙徒見其鄙走將鉤其龎鴻掠其纎㣲懸空明之金鑑俾無遁於妍媸能若是是亦足矣孝廉曰此粗近之然殢於傳註童習白紛若華蟬死生其間亦奚益哉文學曰孟軻氏沒世乏真儒師師萌庻倀倀奚歸孰廓我矇孰砭我愚羣言孔多契真者誰欲操腐艦以泛具區欲絡盲象以駕鼓車縱有智巧寜不殆而嗚呼噫􅐵一何寥乎九聖之神於昭于天九聖之心存之於文又何昭乎嗚呼噫􅐵薋葹盈室何有芳蓀繁星爛宵孰知朝暾寜不使我怡怡而愮愮乎帝降民𠂻徳與天一胡不自貴葩藻是溺顛倒首足淆混白黒棄其瓚槃寳厥瓦鬲拊膺自傷淚血交積誓劀宿穢以剗末習駕舂陵以為舟鼓關洛而為檝張武夷以為颿期洙泗之可渉夙興夜寐偟偟業業凛然如上帝之在目睫若是何如孝廉曰此僕素昔之所究心者也幸與子同之於是執手降臺相視而笑笑已繼之以歌曰真儒不生世隂隂兮㰅埴索塗愈幽深兮炯其靈根無古今兮超彼九𤣥離濁氣兮攀淵追騫乗赤麟兮文之興喪資以身兮任重道遠何時而止兮朝斯夕斯相期於殁齒兮文訓王禕華川王生學文於豫章黄太史公三年而不得其要倀倀焉食而不知其味皇皇焉寢而不安其居望望焉如有求而不獲也太史公一日進生而訓之曰子之學文有年于茲志則勤矣吾聞天地之間有至文焉子豈嘗知之乎夫雲漢昭回日星宣朗煙霞巻舒風霆鼓蕩者天文之所以暢山嶽錯峙江河流行鳥獸蕃衍草木茂榮者地文之所以成天地之文不能以自私誕賦於人人則受之故聖賢者出以及瓌人畯士相繼代作莫不大肆於厥辭盖自孔氏以來茲道大闡家修人勵致力於斯其間鞠明究曛疲弊歲月刓精竭思耗費簡劄者紛趨而競馳孰不欲爭裂綺繡平攀日月髙視萬物之表雄峙百代之下卓然而有為然而躑躅而不進骩骳而不振思窮力蹙吞志而没者徃徃而是而能登名文章之籙者其實無㡬則所謂至文者固夫人所罕知是故文有大體文有要理執其理則可以折𠂻乎羣言據其體則可以剸裁乎衆製然必用之以才主之以氣才以為之先驅氣以為之内衞推而致之一本於道無雜而無蔽惟能有是則統宗㑹元出神入天惟其意之所欲言而言之靡不如其意斯其為文之至乎凡吾之説子豈嘗知之茍知之其試以語我生曰文之為物貴適時好粲然相接合喜投樂有如正始不完文氣遂偏俗尚化遷而排偶之習興焉四屬六比駢諧儷聨抽黄對白調朱施鉛五采相宣八音相便握摛穠纎啽哢寒暄豐腴醲酣眩麗媚妍珠璣溢緘膾炙滿篇凡慶函與賀牘咸累幅而疊畨王公之門下逮閭閻彛儀縟典往來交際率奉之以周旋又如大雅既逺詩歌日變玉臺西崑其流也漸支為詞曲爭嫩競艶字分重輕句恊長短浮聲切響清濁和間羽振宫濳啇流徴泛笙簧觸手錦繪迷盼風月留連鸎花淩亂振妙韻於沉𡨕託葩辭於清婉性情因之而暢宣光景因之而呈獻好㑹暌離歡忻悲歎莫不假是以託情固無間於貴賤也若是者其為文何如太史公曰古語變而四六古聲變而詞曲文之弊也甚矣請置勿道為言其他生曰命卿選士之法廢而科舉乃興以文取士設為範程漢有射䇿唐有明經復有詩賦逮宋日益増經衍為義而三篇以明賦本於律而八韻以成咸各專其科各精其能其義則意融㫖切言粹辭逹枝語蔓引叢論英發剗聖秘而立辨幹天機而生説其賦則句錬字戞音覈韻軋藻秀春擷花艶晴掇校妍醜於錙銖品抑揚於毫髪他若宏辭制舉大科别設文法靡不該文格罔弗列文必學稱愽極才號閎傑乃能攻其業凡習於斯者皆賈勇詞塲角雄藝闥不厲兵而白戰爭奪弧而先㧞若工若拙三年是力若勝若劣一日而决及其中文衡入文彀則遂圍棘聲徹榜金名掲上賢書於天府承洪恩於帝闕乃躋膴仕乃展遐轍若卿若相鮮不由兹而出矣上以此而求賢士以此而致身文之用世信不可誣也歟太史公曰科舉之文趨時好以取世資特干禄營寵之具耳學古之君子恥言之生曰文之古者登諸金石記誌頌銘具有成式或鐘鼎是勒或琬琰是刻或鐫于麗牲懸繂之碑或鑱在封嶽磨崖之壁莫不炫燿崇勲烜焯茂徳載丕丕之嘉猷紀赫赫之休績雖皆一筆之力九鼎可扛一字之價千金是直爾其宏奥之思雅健之姿瑰瑋之辭攟摭馬班凌厲蔡陳蹂躪韓桞玉采金聲焜焜煌煌鍧鍧鏘鏘衮章繡紋炳炳焞焞繽繽紜紜詭然而蛟龍翔蔚然而虎鳯昂翕然而律吕張正音諧䪫韺變體類雲霆勁氣排甲兵沈㝠以之而開豁幽閟以之而著宣逖逺以之而綿延然非儒林宗匠藝營宿將道徳為世之模楷名位為國之儀望堂堂焉章章焉擅鴻筆攬魁柄稱文章之大家者孰當仁而不讓宜其嫓美古昔傳信今後照四裔以無倫垂千載而不朽此其為文也不幾於古乎太史公曰文至於是謂之古宜也雖然其為用殆不止是已生曰朝廷之上有巨文焉典謨誓誥制冊令詔藹為王言渙為大號而帝王之制作存焉灝灝噩噩渾渾洋洋凌厲蓬孛揮霍奮揚或溫潤而精粹或宏偉而秀雄或嚴肅而簡重或衍裕而深長經緯天地槖籥隂陽黼黻萬化轇轕三光封職則氣含隂雨之潤授官則義炳重離之明敕戒則吐星漢之華治戎則揚游雷之轟肆赦則垂滋於春露明罰則示烈於秋霜一字之褒沛漏泉於下地一言之感被挾纊於黎蒸朝出九重暮行四方如風動而草偃如山鳴而谷應奮迅乎㝢外旁薄乎域中鼓舞乎華夏陶鎔乎帝皇文章之用盖與造化而侔功矣若是何如太史公曰易曰王言如絲其出如綸詩曰辭之輯矣民之洽矣辭之懌矣民之莫矣文之為用誠莫盛於此矣姑舍是豈無復有可聞者乎生曰文之難者莫難於史故良史之才古今或無皇道帝徳王畧霸圖運祚興衰治道隆汚將相卿士武烈文謨賢智忠孝兇慝姦諛天文五行地理河渠禮樂兵刑食貨賦租選舉職官冕服車輿雕題鑿齒遐方異區恍惚詭變俗怪習殊凡一代之本末皆載乎史故曰史者一代之成書是故事以實之辭以給之法以立之例以律之作史之要必備乎此然非其能足以通古今之體明足以周萬事之理智足以究難知之意文足以發難顯之義者曾烏得以稱良史盖自紀表志傳之制馬遷創始班固繼作綱領昭昭條理鑿鑿三代而下史才如二子者可謂特起㧞出俊偉超卓後之為者世仍代襲率莫外乎其榘矱論者以為遷固之書其與善也隠而彰其懲惡也直而寛其樹義也簡而明其防僣也微而嚴是皆合乎聖人之㫖意而非庸史之敢干及乎蔚宗承祚之流則遂肆意妄纂曲筆濫箋曖昧其本㫖而義駁以偏破碎其大體而辭謭以纎况乎范陳之不若者則又卑陋而無足觀矣故史所以明乎治天下之道而為之者亦必天下之才然後勝其任兹其所為難乎太史公曰噫史之為文誠難乎其盡美矣文而為史誠極天下之任矣抑吾聞之文有二有紀事之文有載道之文史者紀事之文於道則未也生曰聖人既歿道術為天下裂諸子者出各設户分門立言以為文是故管夷吾氏以霸畧為文鄧析門以兩可辨説為文老聃氏以秉要執本持謙處卑為文列禦㓂氏以黄老清浄無為為文墨翟氏以貴儉兼愛上賢明鬼非命上同為文公孫龍氏以堅白名實為文莊周氏以通天地之統序萬物之性逹死生之變為文慎到氏以刑名之學為文申不害氏韓非氏復流於深刻之文尹文氏又合黄老刑名為文鬼谷氏以捭闔為文蘇秦氏張儀氏因肆為縱横之文孫武氏吳起氏以軍形兵勢圖國料敵為文荀卿氏揚雄氏則以明先聖之學為文淮南氏則以總統道徳仁義而蹈虚守静出入經道為文凡若此者殆不可遽數也雖其文人人殊而其於道未始不有明焉譬猶水火相滅亦以相生和敬相反亦以相成易所謂天下一致而百慮同歸而殊塗者言本於一揆而已文以載道其此之謂乎太史公曰諸子之文皆以明夫道固也然而各引一端各據一偏未甞窺夫道之大全人奮其私智家尚其私談支離頗僻馳騁鑿穿道之大義益以乖大體益以殘矣此固學術之弊而道之所以不傳也生曰聖人之文厥有六經易以顯隂陽詩以道性情書以紀政事之實春秋以示賞罰之明禮以謹節文之上下樂以著氣運之虧盈凡聖賢傳心之要帝王經世之具所以建天𠂻奠民極立天下之大本成天下之大法者皆於是乎有徴斯盖羣聖之淵源九流之權衡百王之憲度萬世之凖繩猶之天也則昭雲漢而掲日星布烟霞而鼓風霆猶之地焉則山嶽峙而江河行鳥獸蕃而草木榮故聖人者叅天地以為文而六經配天地以為名自書契以來載籍以往悉莫與之京斯其為文不亦可以為載道之稱也乎太史公囅然而驚喟然而嘆曰盡之矣其蔑有加矣此固載道之器而聖人之至文矣嗟乎世之學者無志乎文則已茍有志焉舍是無以議為矣是故本之詩以求其恒本之易以求其變本之書以求其質本之春秋以求其斷本之樂以求其通本之禮以求其辨夫如是則六經之文為我之文而吾之文一本於道矣故曰經者載道之文文之至者也後聖復作其蔑以加之矣今子知及乎此則於文也其進孰禦焉特在加之意而已矣生於是再拜謝曰謹受教敢不拳拳服膺是則是效以無忝夫子之訓告巢雲對貝瓊淮南蘇恒屋于千仭之厓危乎孤鶴之託一枝而雲氣出入乎户牖與野馬絪緼不絶遂號巢雲而處其中凡若干年人莫得見之者有東吳生涉江而過焉恒方據槁梧讀老子書因介而進曰甚矣子之好古也自上棟下宇之作以辟風雨寒暑人固别乎鳥獸已謂之巢者假也又謂之巢雲者益假也吾甞病世之假不知好古之士亦必假之物而為名則彼之困於假者奚病也抑顯晦之跡既殊而憂樂之情懸絶吾請與子論之可乎且以觀吾子之所擇也曰可曰通都之中左回大川右屬羣山宛宛下赴鬱鬱龍蟠甲第是營繚以崇垣椓之約之如跂如騫文窻洞開朱栱鈎連盤盤囷囷仰不見天以居以寢其居孔安不火冬熾無氷夏寒其視巢雲為何如對曰揚子有言曰髙明之家鬼瞰其室不能節之以制而侈靡相傾此漢之田蚡梁冀卒蹈大禍曾不及覆茨之為貴也吾惡為哉曰下隰髙原我圃我樊輦石其間可游可觀鑿而成窪壘而成塚錯落星布嵌巖雲滃或背而崩或環而拱虎豹縱横駝馬交踵神侔擘華勢方斷隴境與心謀物以機動異卉駢生脩條上竦回飈激芳紅褰翠湧其視巢雲為何如對曰金谷既虚而二十四友為禽宜來者之所戒復忍襲其轍乎曰髙臺九層上切星辰俯見百里極乎八垠洞庭為池浩浩沄沄鳬鷖往來候鴈千羣霜降之秋雷奮之春以宣其壅以泄其煩朝挹羲和夕賓結隣其視巢雲為何如對曰古者國有時臺以望氛祲察其豐凶若章華姑蘇恒勞民為之而勢危累棊者君子不予也矧其下者罄千金以奉一已樂之所在患必隨之曰鳳吹參差柱促絃張乍抑乍揚移宫變商楚腰衛頰二八分行曲按回波鸞停鵠翔揚蛾聯娟吐氣蘭芳良夜何其厭厭未央絶纓繼懽炳燭傳觴其視巢雲為何如對曰孔子曰鄭衛之音比於慢矣吾自吳之越自越而楚而息於此耳莊生之天籟發蘇門之嘯歌顧不愈乎世俗之好以喪吾真邪曰結友金張連姻衛霍車馬相過氣熾熏灼恥事佔畢擊丸六􅡺遨遊狹邪宿留平樂百金一擲割鮮野酌杯觀五湖垤視四嶽其視巢雲為何如對曰鄙哉貴㳺子弟席奕葉之寵矜其驕豪荒淫無度故積之百年之久而墮於一旦不亦悲夫曰入黄閣趨紫垣理萬民總百官令出如流勢尊如山門列霜㦸堂垂曲旃魚鑰初啟鶴盖雲團左右之人衣襲綺紈禄周三族國延子孫流光百代比徳前人其視巢雲豈不有間乎對曰以非常之才處非常之任者吾絜知校能奚翅鵬鷃之相萬又可以妄覬之邪茍居其位必不克矣曰然則與雲巻舒一壑一邱擷秀汲清委化而休非幾於㓗身亂倫之流歟對曰生覩於彼而不覩乎此盖知其一而不知其二也雲之為物囿于天地而有時不足囿也藏於山澤而有時不足藏也汎溢如濤洶乎其不可排也回旋如雪冺乎其不可執也蔽乎内外為吾之藩籬也彌乎六合為吾之帷幄也其變不一吾之玩也若狎而昵吾之友也茫茫然莫知其所止油油然莫測其所如也於是拉𢎞景招太白小􅋌廬卑少室逍遥徜徉以永朝夕視彼壯麗之居非吾之所安閒曠之囿非吾之所適馳騁非吾之所事聲伎非吾之所惑而一時赫赫逺近承風未若終吾天年而守其寂寂也東吳生恍焉若失迺為之歎曰吾子可謂不屈於天下之物而特假以見其志則凡世之沉溺者惡覩物之過乎前其猶太空之雲乎遂録其對却巧文王達昔桞儀曹曾製乞巧文千載之下有鐡厓亦常擬之矣余讀二先生之文感而作却巧文井窺管見其敢追踵前賢哉姑自釋其抱耳嵗惟壬辰七月之七王子濳居訌訌弗懌適冷風颯然月綻雲拆桐籟薦秋露花凝夕有一嬋娟歘莅吾席析析步揺灔灔繁飾睨王子而言曰吾天女之孫也職司天巧式利下民禱吾者泰背吾者屯趨吾者富違吾者貧吾久聞子多戇少文吾實恤子來濟子身汝或不憚吾悉汝陳王子竦然歛踵覷覷忞忞似夢非夢謂神非神蒲伏而言曰臣固拙矣敢不願聞天孫整裾端坐憮然曰噫人生兩間孰弗冀通今子弗克巧進自貽醜窮不師詭遇祗業專攻末塗噂沓厖言滋豐技夸鬼蜮計逞狙公鳥翼蛇驤蜂聚蟻同託根巍柯名曰宛童俾不曲合焉致斯崇路欺握雉祝天祛蟲陽縱隂戢内傾外融憎陋忻嫭人心攸同聾俗簧世譎行迂蹤季子繇是而貴曲逆由是而封子不聞歟矧乎妙奪工倕紆行曲施能若是者庸無不宜前邀後障左繩右規笑涴薇露戲焚玉蕤錦心繡腹侮書嫚詩啟喙成訟轉趾徴疵予予奪奪是是非非顛倒縱横起滅提搥倚天拔地斷蛟剸犀藻葩綴縟陟降驅馳氣劘屈子目短相如諸侯見構豪族争儲壹譽可喜壹毁可悲致顯若彼汝奚不為今子􅟌吃赭顔沉吟支頥窮鄉僻地運日以竒我今告汝汝應諦思汝不改轍焉能救而夫騏驥捕䑕弗逮狂狸吾將錫子語穽助子嘲機納子之黠驅子之癡詎不偉哉王子曰臣聞駑馬安步麒麟跼躅各有攸得奚􅇺奚恧良玉渾然烏事刻琢馬安善宦倪寛樸學寧為拙傷毋為巧諑岐塗術異彼此相角沾沾求容栩栩强語手擎足旋神辱志沮我嗟其人汩此靈府命栖險竿躬罣㳺弩蒿目蓬心臣實不取天孫噱然笑曰井蛙不見東海蟪蛄不知春秋弗識宜樞弗察芳猷方枘圓鑿事恒弗投毁方瓦合懵不知謀耳與目敵心與身讐么麽之技自矜寡儔汝不思變吾實汝羞汝今絳宫弗懲玉堂弗憂攻苦敷澹尫如楚囚匪徒恥之吾實悲之也匪徒悲之吾實悼之也王子又蒲伏而謝曰天孫之心固仁矣啟臣之智固備矣然强哭者雖疾不哀强歡者雖笑不妍生龜脱筩顧非自然危鶴斷脛乃違厥天機械藏心神徳不全夫巧者言拙者黙巧者勞拙者逸巧者賊拙者徳巧者凶拙者吉此先正之格言敢弗服膺而警惕於是天孫砉然㝠逝茫無所得出門視之但見繁星麗天萬里一碧翰墨林七更有序金寔翰墨林者永嘉謝君廷循圖書之府也君以和粹謹飭被眷遇得美名於縉紳間藉甚性嗜清玩畜之頗富甞名其齋曰米家船少傅東里楊先生士竒易以今名而記之予乃為作七更極其辨以進於道意劣辭庸視古之作者固未免有捧心之誚要之發乎情止乎禮義庶幾而不差者也覺非先生乆客闤闠心厭喧囂怔忪堙鬱思若無聊安得絶境於焉逍遥滌濯煩襟以永今朝聞永嘉主人有翰墨之林曳杖彳亍若履空谷足音跫然主人出速不言心喻盼睞以目升自賓階少叙寒燠主人曰噫走也是林不資一地匪穹于岑無松之盛非栢之森駢羅圖書錯置瑟琴棐几萬籖上下古今文房百玩觸手可尋少安無躁願陳至音於是拂几正席焚沉􅅡蕙緩宫急羽髙卑以序巍巍洋洋無不如意長清短清猗蘭飛佩五曲九引纚纚可繼先生曰美矣哉太古之聲也然鍾期既亡伯牙絶響筝篴之耳未能得其惝恍毋勞爾為也主人曰唐虞至聖孑不得與記物設教啟其聾瞽以局必方象地之則以道必正神明其徳有白有黒曰隂與陽互陳錯舉雲漢其章防危補罅料敵審已負不可僨勝不可恃兩雄相值乃見勍敵龍蛇成陣虎豹堅壁雖曰小數有至理焉無所用心為之亦賢先生曰君子不操勝心毋作機事此孤山處士所以鄙之也願聞其他主人曰書契初成鳥跡茫昩科蚪再變乃有分𨽻斯邈之下鍾王軼出唐臨晉帖如蹈一律狂僧顛史草聖入神蘇黄米蔡各自絶倫真跡間存初刻咸在㸃畫使轉折旋向背明窻浄几目玩心醉誠一快也先生曰儒者於書固最近事然一好著亦能喪志吾未暇焉主人曰五色作繢肇自姚姒後世因之畫事由始晉唐以降好尚蠭起顧吳荆關董郭王李入神造妙區别品第耽嗜成僻千金莫以芳播清流貴動丹扆適情㳺藝動合𤣥理宣和纂録寳鑑有史似不可少也先生曰君子寓意於物而不可留意於物此先賢所以恐其泥也敢請大之主人曰陶寫性靈妙在得句物情人境動合天趣模擬之精推敲之至晝或忘餐宵恒失寐窮極彌工思靈愈異神驚鬼泣造物所忌我思古人髙不可企先生曰風雅遼闊正聲㣲茫競趨靡麗大樸日亡安得擊壤以反渾厖主人曰經緯天地轇轕後先用與政通體隨世遷秦漢雄深齊梁􅀈骳韓公倡唐衰弊特起歐蘇曾王鳴宋之盛及今頼之矩矱由正今之作者秀出如雲昭回河漢炳燿星辰鈞天合奏鸞鳳和鳴山輝玉藴淵媚珠呈走將潄其芳潤咀其英華寤寐于兹林之下不知嵗月之虚盈也若是如何先生曰近之矣而猶未也文以載道匪惟辭工上師聖人吾將子從主人憮然曰命之矣聖人之言世謂之經囊括宇宙含煦生靈未暇細論畧陳其名易備隂陽造化以明書言政事治功乃成感發懲創詩本性情無序不和禮樂由興春秋撥亂王法權衡學庸論孟規矩凖繩猶如菽粟布帛之征一息不繼民不得生浮文勝質奚利攸行走將膏吾車秣吾馬由伊洛以遡洙泗而履吾夫子之庭不知其不可也先生離席而立降階頫首請先羣經旁藝居後以翰墨林為道淵藪明文衡巻二十二
