body:
  text: 明文衡巻九十九欽定四庫全書明文衡巻一百明程敏政編補缺補缺送程憲僉序唐仲予家世學詩每誦皇皇者華知君遣乎使臣之為君使者各盡其道也後世君臣未盡其道上下之情不通所以胥失之矣合淝程公以儒起家初皇上龍興潛淵渡河以宅帝位公用言者薦遂為中書省都事謇諤有骨鯁風時國公開省南服英譽洋溢貸以自助擢為執法諌議官朝夕匡弼不肯少褫之六年特授提刑按察司僉事明年行郡興安值干戈劻勷之秋與民更始不棘不阿不忍擿之以事暇日謁夫子廟過紫陽精舎瞻仰文公久之予方以紫陽祠吏告老從容語曰學校之興書聲不聞虚文耳嗚呼劉項交戰魯猶絃歌不絶故曰曲阜聖人之教也况今紫陽即魯之曲阜也學校廢子衿作豈無倚席不講之羞世之俗儒世之俗吏但欲華爾宮以規俎豆之地殆未知為教者可勝慨哉公字嘉貞瑰文傑句卓卓儒者也予序論古今遣使之道以為公瀆亦欲上下之情通詩凡若干首於是唐仲推其意序之送楊尚書序徐有貞景泰二年冬十二月詔以禮部尚書楊公彦謐為南京刑部尚書行有日主事孫曰讓以其行為請予與公交為忘形甚久又幸為同寅誼不可辭公明敏有才識時務多幹局始以進士為主事為郎中為侍郎皆在刑部所厯皆未久皆以軍功遷秩其進取固銳然於公之勞勩實足以當之也比一二載間福建冦作而江西為鄰壤遂命公往保釐之卒用底寧用是召還陞禮部尚書居嵗餘有大臣言南京固根本地而六部都察院多缺正員不足以鎮之上可其奏事下廷臣論薦而廷議謂公在刑部久練習法比大司寇之缺非公不可遂聞于上是以有今日之命也或曰朝廷方資公以典邦禮和神人治上下顧乃今輟此而置彼可乎予曰民協于中者司寇之職也而保障南京者朝廷付託之深意也茍徒以明刑為公之職業而遺付託之重是不知命公之意也公之是往其寄不既重矣乎其可不思所以副皇上之任使乎是為贈故承直郎太常寺丞柳莊袁先生墓誌銘姚廣孝永樂八年嵗在庚寅十二月初五日承直郎太常寺丞栁莊袁先生卒于家訃至京明年辛夘正月二十二日其子中書舎人忠徹奏聞上為之哀悼賜鈔六百錠營葬事遣中貴官祭于其家二十四日忠徹傳奉勅㫖命臣廣孝撰先生墓誌臣謹奉命按賜進士出身吏部員外郎臣陳宗問行狀先生諱珙字廷玉姓袁氏系出南昌世多聞人宋南渡有諱子誠者知臨安府兼大宗正司丞扈蹕至鄞遂家焉其孫鏞以進士死忠於德祐間曾祖諱景安登進士第祖諱衍隱德弗耀考士元文林郎翰林國史檢閲官博學能文器量恢廓性明果義有所不可則奮力正之故鄉閭以中直稱初衍無子以弟澤民承後澤民仲子士元謂弟無繼兄之義白於有司奉澤民歸宗而已為衍子俾得倫序不紊自號南村先生實德祐忠臣之嫡孫也生子四人曰珙曰珪曰瑛曰璟珙即先生也先生性剛毅直方不泛交於人安貧養志粹乎有道之士也當勝國之季勵精儒業九流百氏之書靡不渉究然時與願違遂游厯湖海間遇異僧别古崖於補怛洛伽山一見而竒之因授以相人之訣期先生後必以術顯先生決人貴賤夀夭禍福休咎如指諸掌凡求占者必先察其心志聽其語言次觀其形氣然後斷之以吉凶規之以忠義雖達官貴人遇之不以禮則拂袖而去豈以勢利能動其心哉聖朝啓運天下和平先生乃歸鄞城之西聿新其先業所居前後皆樹以栁扁曰栁莊鄉之人皆稱為栁莊先生洪武間上在濳邸聞先生名遣使以幣禮聘焉先生既拜受即沐浴戒行李而起及見上大悅先生於是肅恭而前凝神佇思面對聖容俯仰左右一目而盡得矣先生再拜稽首而言曰聖上太平天子也龍形而鳳姿天廣地闊日麗中天重瞳龍髯二肘若肉印之狀龍行虎歩聲如鐘實乃蒼生真主太平天子也但年交四十髯鬚長過於臍即登寶位時上雖聽其說而未全信居無何先生辭還故里錫賚殊厚洪武三十五年壬午六月十七日上誕膺天籙嗣登大寶發政施仁萬幾之暇因感先生昔言之驗若左右券無毫髪遺失於是敕遣内侍驛召至京拜太常寺丞授承直郎待以特禮賜冠服鞍馬文綺鈔錠及居第在京以便其老上廵狩北方己丑冬十月尋有㫖召至行在先生即日就道東殿特念其衰老非霜露所堪於是賜貂裘安車而敦遣焉既入覲奬諭有加已而得請展省先塋復敕驛置歸其鄉恩至渥也及先生卒上賜鈔以營葬事遣中貴官祭于其家復敕臣撰墓誌先生感荷聖恩始終榮顯自古所無有先生卒時年七十有六先生平日篤于孝友天性然也親疾革則焚香籲天減已之年以益親夀疾果差人以為孝感所致暨失怙恃哀毁過禮先生時厄於貧窶衣衾棺槨為之必竭其力由是禮無不備宗族之貧乏者恒嗇已用以賑之弟妹之孤嫠者咸推恩以撫之有嫁娶之不能者出財力以相成之先生與鄉黨也正而不羣處妻子也嚴而有禮交朋舊也以信義而不阿䘏患難也救之惟恐不及人有以役當徙而委之金百鎰不相聞者餘十年及其歸以金還之封識如故友人以事殁于逮者莫之能贖先生收厝以歸其母先生臨利害一以理勝畧無顧忌趨避其忠義正大如此先生好為歌詩與客燕飲酒酣擊缶仰天豪吟人以為康節先生也先生知命之終屬纊之日怡然如常溘爾而去故鄉閭父老及所交游者罔不悲嘆公卿大夫士走哭奠祭者踵相接亍道先生娶倪氏有婦德子男五人長忠敉先卒次忠敏淳而勤於家事次忠教遊藝校庠賫志而殁次忠徹性資穎悟善承家學由鴻臚寺序班陞尚寶司丞今調中書舎人嘗扈從北廵上尤寵厚也次忠􅛴又勤于學女一適慈溪士人潘惟聰孫男七人應䮾應駺應驪應駒應騊應驥應駿孫女三人皆幼忠徹奔喪歸以是年三月二十四日扶柩至桃源楊山人隩葬于先隴之左嗚呼先生為人剛方中正學純行端綽有古君子之遺風於是皇上見知特加禮遇豈惟其技術之精妙而致然爾昔袁天綱父子事唐太宗名著方䇿以為希世之有今觀先生與其子忠徹際遇聖天子始終恩寵莫大之榮顯豈天綱父子可能跂及者哉先生平日相人之竒驗九靈山人戴良傳備詳兹不復繫銘曰袁氏之系出于南昌世多聞人積德其滂臨安來鄞乃為故鄉鏞死于節德祐忠良文林學古器量恢𢎞挺生先生資性剛方不泛其交克紹厥芳渉究經史吟詠詩章縱逸弗羣雄豪是長不事其家遊厯海邦歘逢異僧竒其目明因以授彼相人之方術日以精名日以張課子畊讀號曰栁莊暨于昌朝際遇聖皇優寵異等官拜太常子職中書橋梓揚揚既貴且富日覲清光髙年賜歸以夀以康豈期無疾終于蘭堂遣官置奠賜賚盈箱子嗣孫承尚有餘慶葬于桃源先隴之傍勒文蒼堅終古不忘重修胡文定公書院記彭時崇安為建寧望縣武夷先生胡文定公之故居在焉宋乾道中已祠先生于學而文定公書院則自元至正辛卯縣尹彭庭堅始書院在今四隅里之興賢坊其制右為禮殿奉宣聖及四子侍坐像左為祠肖先生像居中而以先生子從籍溪致堂茆堂五峰四君子配焉祠之後有堂前有重門翼以廊廡名其外門曰文定公書院蓋以表崇先賢且欲以待來學也其意美矣然嵗久滋敝近雖有修葺之者而棟宇傾摧凛焉欲壓天順八年秋八月建寧太守劉公行縣至崇安因入謁焉憮然有感乃捐已俸率鄉貢士暨文國子生藍璣輩各助資庀材新之而命大使王仲董其事易朽除腐飾漫漶以鮮潔規制雖仍乎舊而煥然一新觀者為之起敬以是年十月始事越三月而告成成之明年夏太守考績至京語余以其故且屬記焉竊聞崇安自名縣以來忠臣賢士之生多矣然道學之傳惟胡氏為盛泝其淵源實自先生始蓋先生資稟絶異早聞伊洛微言於游楊謝三君子而以講明踐履於家成其子從俱為大儒遂啓新安朱氏東萊呂氏南軒張氏之傳而道學益盛以顯至其平生著述皆有闗名教而發明春秋之功為尤大蓋春秋孔子之親筆聖人經世之志在焉非若他經可以訓詁通自左氏公穀以來傳注之行無慮百家文舛辭僻卒無定説聖人之宏綱大㫖往往鬱而不明致使王安石詆以為斷爛朝報直廢棄之不列於學官庸非聖經以衆説晦而安石無獨見之明故耶先生自壯年即巳服膺是經心領神悟獨得聖人之精微當宋南渡時執經進講深見奬重及承詔作傳乃參考百家一折衷之以至理推闡微辭發明奥義其於扶三綱敘九法抑邪説正人心與夫尊王賤霸崇君抑臣之意尤惓惓焉自是春秋之大義復明矣於戲周東遷而春秋作宋南渡而傳義明先聖後賢千古一心豈斯文之興固自有其時歟鄉使安石幸而生先生之後得聞其説將崇信是經之不暇而何敢詆棄之耶惟其不幸出於先生之前不能超衆説以有見是以得罪於聖人取譏於後世也然則先生之於是經誠可謂繼往聖於既絶開來學於無窮其衞道息邪之功於是為大矣我朝推崇先生列諸從祀誠萬世之公論而崇安乃先生鄉邑矧可無專祠以起後人之景仰也哉此太守所為盡心於書院而不敢後也繼今學者仰而瞻其容俯而讀其書一惟其道德言論是式是循庶幾進德脩業卓有成效然後無負於太守表章風勵之意太守名鉞字仗德世家安成為贈學士忠愍公之子浙江憲副釪之兄父子兄弟相繼以春秋第進士而太守為政尤汲汲於重名節表風俗亦其學有所本且知所自云
