body:
  text: 明文衡巻十七明程敏政編箴銘磨兠堅箴宋濂昔李侍郎敦立嘗掲磨兠堅三字於坐隅磨兠堅者古之慎言人也其善於自防者哉為著箴曰磨兠堅慎勿言口為禍門昔人之云磨兠堅人各有心山髙海深磨兠堅髙不知極深不可測磨兠堅言出諸口禍隨其後磨兠堅鐘鼓之聲因扣而鳴磨兠堅不扣而鳴必駭衆聴磨兠堅唯口之則守之以黙守之以黙是曰𤣥德磨兠堅磨兠堅慎勿言續丹扆箴王禕官箴王闕古之誼也唐李衛公獻丹扆六箴於其君立意措辭分章指事忠愛之道藹然可觀其殆有所諷刺而救君於失得箴諫之誼者矣然其言之猶乏剴切君子病焉禕不自揆因掇衛公之餘㫖取夫善可為訓惡可為戒而人臣所難言者極言之作續丹扆六箴天運不息昏昕有恒有恒伊何宵終則明人君體天夙興在廷宵向終矣君胡不興宵終不明天運乃愆宵終不興君斯違天珮玉晏鳴荒淫用宣鷄鳴而起大舜稱賢右宵衣箴維衮與冕君服堂堂以朝以祭視瞻所宗玉衣示侈商祚以亡估服稱妖漢室乃傾一服之華若未過靡孰知禍殃鮮不職此皇王所戒不物不軌三服罷官著美惇史右正服箴為天下君職在養民匪以天下徒奉一人取民有制壤奠式陳貢獻無藝喪亂之因淫聲冶色使君聾瞽竒物異品竟亦何補却蛤焚裘為事非鉅儉德著聞齊風堯禹右罷獻箴臣言劘君如批逆鱗大誅小斥何益於臣臣豈求益凡以益君君弗臣聴匪愚則昏從若轉圜是謂能改一事十諫庶無後悔聖維堯舜芻蕘猶采拒諫遂非不敗奚待右納誨箴人心不同有如其面面則易知心實難見心之姦邪隂運潛變審之察之貴在能斷秦斯豈訐唐杞非䛕欺君誤國面是心殊此而弗辨家國淪胥知人則哲欽哉聖謨右辨邪箴春秋謹始大易知幾思患預防必防其微莽卒簒漢貂終危齊惟微弗防遂至噬臍不觀堅氷其初履霜滔天之水實由濫觴惡過無小雖小勿將積之乆矣社覆宗亡右防微箴官箴上劉基維天生民㒩㒩蚩蚩有欲罔制迺豹迺螭爰立之君載作之師式養式教毋汩秉彛嗟爾司牧代君撫綏君禄我食君令我施邦本弗固庶事咸隳受寄匪輶敢不肅祗治民奚先字之以慈有頑弗迪警之以威振惰奬勤拯艱息疲疾病顛連我扶我持禁暴戢姦損贏益虧如農植苗蚤夜孜孜澇疏旱溉無容稗秕如良執輿順以導之無俾旋濘彊策以馳慈匪予愛帝命溥時威匪予憎國有恒規弱不可陵愚不可欺剛不可畏媚不可隨無取我便置人於危無避我謗見義不為天鑒孔昭民各有思惠之斯懷推之乃離譽不可驕器惡滿欹謗不可怒退省吾私人有恒言視民如兒無反厥好以暴予知是用作箴敢告執羈官箴中在昔隆古分封國都付之以民俾養勿瘏上下恊心各保乃區明庶考績昭哉範模秦廢聖制代德以狙刀筆之權始歸吏胥弄法舞文聾癡瞽愚流波至今一任簿書行立公庭如鴈如鳬我欲是求我利是趨摩揣官情以逞覬覦官惟好貨我甘以苴官惟好名我逢以諛官惟畏嫌我疑以汙官惟好惰我淫以娛官惟好猜惑以多途官惟好威道以掊􅀈語黙有為俯仰有須覘容察辭助忿乘愉法度盈口奸邪滿軀蠱智迷昧欺庸陷迂俾奸作惡以紫為朱未獲官心嫗嫗儒儒亦既獲止如登天衢傲兀民士憑淩里閭惡積禍來官與之俱人有恒言遇吏如奴堅防固隄猶恐或窬矧曰聴之百姓何辜是用作箴敢告僕夫官箴下無謂余明人莫能昧離婁善察不識其背無謂予能人莫敢欺校人烹魚子産弗知立事惟公燭詐惟誠小節勿固小慧勿行無矜我亷守所當為無沽我名以生衆疑何以簡訟決之使通何以弭貪慎檢乃躬去讒斥佞逺吏近民待人以寛律已以勤無咎人弗信忱至斯孚無患人不聞惟德不孤德以進善威以挫姦德不可偏威不可煩無謂彼富我必極之無謂彼貧我必直之持心如衡以理為平無為避嫌以縱無情人有恒言為臣不易是用作箴敢告有位吾友會稽樓文淵常持誠敬謙謹四字誠敬所以存乎心謙謹所以施之事也因作箴以貽之貝瓊昔熊渠子夜行道逢伏虎引弓射之沒鏃飲羽金石之堅惟誠可通矧乎有知何逺弗從故事神則必假治人則必化嗟時益偷毎設機而尚詐是知治心之要在乎不欺茍内外如一吾又何為右誠箴知伯五賢實禍之基藍臺一會戯康子而侮段規卒為韓魏禽遂貽千載之譏是以古人必敬為主茍忽乎秋毫所喪奚補亦有冀缺夫婦如賔遂舉於隴畆以佐晉君得失之微榮辱之大一出一入勉哉無懈右敬箴淩人者恒為人尤下人者恒寡吾仇故善有不可爭勞有不可伐處於朝則國和處於室則家悅噫盈必招損惟卑益尊大易之言守而勿諼右謙箴陟彼太行羊腸九折防其銜轡遵其軌轍既及乎坦途乃騁而馳車僨馬驚吾傷亦宜嗚呼禍恒伏於至微必致謹其所事匪險之為虞無虞吾焉可恃爰作斯箴永為人規式戒其怠長樂公是師右謹箴家人箴十五首方希古論治者常大天下而小一家然政行乎天下者世未嘗乏而教洽乎家人者自昔以為難豈小者固難而大者反易哉蓋骨肉之間恩勝而禮不行勢近而法莫舉自非有德而躬化發言制行有以信服乎人則其難誠有甚於治民者是以聖人之道必察乎物理誠其念慮以正其心然後推之脩身身既脩矣然後推之齊家家既可齊而不優於為國與天下者無有也故家人者君子之所盡心而治天下之凖也安可忽哉余病乎德無以刑乎家然念古之人自修有箴戒之義因為箴以攻已缺且與有志者共勉焉正倫人有常倫而汝不循斯為匪人天使之然而汝舍旃斯為悖天天乎汝棄人乎汝異曷不思邪天以汝為人而忍自絶為禽獸之歸邪重祀身烏乎生祖考之遺汝哺汝歠祖考之資此而可忘孰不可為尚嚴享祀式敬且時謹禮縱肆怠忽人喜其佚孰知佚者禍所自出率禮無愆人苦其難孰知難者所以為安嗟時之人惟佚之務尊卑無節上下失度謂禮為偽謂敬不足行悖理越倫卒取禍刑遜讓之性天實錫汝汝手汝足能俯興拜跪曷為自賊恣傲不恭人或不汝誅天寧汝容彼有國與民無禮猶敗矧予眇微奚時弗戒由道在已豈誠難邪敬兹天秩以保室家務學無學之人謂學為可後茍為不學流為禽獸吾之所受上帝之衷學以明之與天地通堯舜之仁顔孟之智聖賢盛德學焉則至夫學可以為聖賢侔天地而不學不免與禽獸同歸烏可不擇所之乎噫篤行位不若人愧恥以求行不合道恬不加修汝德之凉僥倖髙位秪為賤辱疇汝之貴孝弟乎家義讓乎鄉使汝無位誰不汝臧古人之學修己而己未至聖賢終身不止是以其道碩大光明化行邦國萬世作程汝曷弗效易自滿足無以過人人寧汝服及今尚少不勇於為迨其將老雖悔何追自省言恒患不能信行恒患不能善學恒患不能正慮恒患不能逺改過患不能勇臨事患不能辨制義患乎巽懦御人患乎剛褊汝之所患豈特此耶夫焉可以不勉絶私厚已薄人固為自私厚人薄已亦匪其宜大公之道物我同視循道而行安有彼此親而宜惡愛之為偏疎而有善我何惡焉愛惡無他一裁以義加以絲毫則為人偽天之恒理各有當然孰能無私忘已順天崇畏有所畏者其家必齊無所畏者必怠而睽嚴厥父兄相率以聽小大祗肅靡敢驕横於道為順順足致和始若難能其美實多人各自賢縱私殖利不一其心禍敗立至君子崇畏畏心畏天畏已有過畏人之言所畏者多故卒安肆小人不然終履憂畏汝今奚擇以保其身無謂無傷陷于小人懲忿人言相忤遽愠以怒汝之怒人彼寧不惡惡能興禍怒實招之當忿之發宜忍以思彼言誠當雖忤為益忤我何傷適見其直言而不當乃彼之狂狂而能容我道之光君子之怒審乎義理不深責人以厚處已故無怨惡身名不隳輕忿易忤小人之為人之所慕實在君子考其所由君子鮮矣言出乎汝烏可自為以道制欲毋縱汝私戒惰惟古之人既為聖賢猶不敢息嗟今之人安於卑陋自以為德舒舒其學肆肆其行日月邁矣將何成名昔有未至人閔汝少壯不自强忽其既耄嗚呼進乎止乎天實望汝云何而忍無聞以沒齒乎審聴聴言之法平心易氣既究其詳當察其意善也吾從否也舍之勿輕於信勿逆於疑近習小夫閨閤嬖女為讒為佞類不足取不幸聴之為患實深宜力拒絶杜其邪心世之昬庸多惑乎此人告以善反謂非是家國之亡匪天伊人尚審爾聴以正厥身謹習引卑趨髙歲月劬勞習乎汙下不日而化惟重惟黙守身之則惟詐惟佻致患之招嗟嗟小人以患為美側媚傾邪矯飾誕詭告以禮義謂人已欺安於不善莫覺其非彼之不善為徒孔多懼其化汝不慎如何擇術古之為家者汲汲於禮義禮義可求而得守之無不利也今之為家者汲汲於財利財利求未必得而有之不足恃也舍可得而不求求其不足恃者而以不得為憂咄嗟乎若人吾於汝也奚尤慮逺無先已私而後天下之慮無重外物而忘天爵之貴無以耳目之娛而為心腹之蠧無茍一時之安而招終身之累難保而易縱者情也難完而易毁者名也貧賤而不可無者節之貞也富貴而不可有者意氣之盈也慎言義所當出黙也為失非所宜言言也為愆愆失奚自不學所致二者孰得寧過於黙聖於鄉黨言若不能作法萬年世守為經多言違道適貽身害不忍須臾為禍為敗莫大之惡一語可成小忿弗思罪如丘陵造怨興戎招尤速咎孰為之端鮮不自口是以吉人必寡其辭㨗給便佞鄙夫之為汝今欲言先質乎理於理或乖慎勿啟齒當言則發無縱誕詭匪善曷陳匪義曷謀善言取辱則非汝羞却兼味箴王紳昔范文正公至晚必思平日所為事與所奉者直則瞑目鼾睡或有不及必竟夕踧踖不寧其自持之功若此故能成其德業心切慕之而未能效也且慮歲月迅邁志氣無成而悔尤日益以至故凡於食頃遇兼味務峻却之此雖非古人之所用心亦庶乎節忍之一端因箴以自警人身之奉惟適於中侈約得宜何儉何豐萬錢下筯三韭自給於已無禆於道無益行或不臧與物無異取物以奉是食其類宜受其養矯情飾愆棄禮弗居是曰逆天我心思之彼此交媿志業未就奚補於世念兹遺體弗養或傷養而失中天必我殃故凡食頃却其兼味以節吾慾以安吾義且懼志懈厥德不凝庸述斯箴以為心銘銘蒼雲軒銘有序宋濓世皆稱嚴子陵不屈光武以為髙士之問學固求所以行之耳茍得賢君事之而行所志君子之所樂也况光武素知子陵哉子陵之不以隠為髙也審矣其隠蓋有所為爾人之志意材量明者能燭之於事為之先子陵光武少相友善使光武能任人可為盡力子陵何所苦而不出既出而決去哉蓋光武察察自用其後宰輔多不以禮退子陵預知其如此故決然避去而不疑以全故舊之義此子陵所以為髙也茍徒以隠為髙孰不可為子陵哉子陵裔孫居餘姚者曰宗道取范文正公祠堂記蒼雲語名軒余恐其昧乎出處之義也告之故系以銘銘曰維士為學志大行於時孰肯樂隠屈而弗為卓哉子陵識時之幾幾不可以出甘耕釣以嬉此為百世之師茍時可行而飾隠以欺是棄其天而失時宜嗟吾子陵志豈在斯爾宜則之勿執固以違視時推移如雲在山何滯斂與施或不盈握或雨四垂庶乎于道之歸五輪沙漏銘沙漏之制貯細沙於池而注於斗凡運五輪焉其初輪軸長二尺有三寸圍寸有五分衡奠之軸端有輪輪圍尺有二寸八分上環十六斗斗廣八分深如之軸杪傅六齒沙傾斗運其齒鉤二輪旋之二輪之軸長尺圍如初從奠之輪之圍尺有五寸輪齒三十六軸杪亦傅六齒鉤三輪旋之三輪之圍軸若齒與二輪同其如初軸杪亦傅六齒鉤四輪旋之四輪如三輪唯奠與二輪同輪杪亦傅六齒鉤中輪旋之中輪如四輪餘輪側旋中輪獨平旋軸崇尺有六寸其杪不設齒挺然上出貫於測景盤盤列十二時分刻盈百斵木為日形承以雲麗於軸中五輪犬牙相入次第運益遲中輪日行盤一周雲脚至處則知為何時何刻也餘輪各有楹附度中輪則否輪與沙池皆藏几腹盤露几面旁刻黄衣童子二一擊鼓一鳴鉦亦運衍沙使之沙之進退則日一視焉此其大略也初灤陽水善氷雖爨鼎沃湯不能為漏新安詹君希元乃抽其精思以沙代之漏成人以為古未嘗聞較之郭守敬七寶燈漏鐘鼔應時而自鳴者殆將無媿乎浦陽鄭君永與希元游京師因知其詳歸而製之請余銘銘曰挈壺建漏測以水用沙易之自詹始水澤腹堅沙弗止一日一周與天似鄭君繼之制益美請惜分隂視斯晷婺溪石研銘歙之有硏自唐開元中葉礪始礪獵師也因逐獸發之後為南唐元宗所賞愛名遂與端石齊其地在長城里之龍尾山山一名羅紋其下乃芙蓉溪研溪産者號為尤良濓嘗獲其一腹有刻文云李少微造少微元宗時硯官也制作絶工緻可寳已銘曰外雖黑内則白馬生角兮性乃易三竒石後銘有序三竒石後銘為吳士朱孟辨作孟辨獲石聚寳山間製為山𤣥膚玉芝朶斷雲角三名其友王䝉先生圖而銘之銘邃甚至不容繼孟辨强余述之信乎珠玉在側覺我形穢也其詞曰山𤣥膚割紫㽔星霣魄石抱腴蒼水使者珮失琚山鬼環守目睢盱内藏一升白龍酥餐之淩霄躡雙鳬奮迅八極遊清都山𤣥膚玉為徒玉芝朶自天墮暈翠霞裁猗儺煅以九陽真澒火有聲泓噌玉之瑳不學三秀脆而夥韓終欲攓意仍叵青鳥傳信以需我玉芝朶青嫷嫷斷雲角鬼斧琢秀稜稜文斮斮霓旌難攀泝寥廓手折祥氛㢙一握尚帶蛟龍氣旁魄神母變幻資槖籥上衝牛斗香如濯斷雲角鎮書幄怡顔齋銘胡翰衢之超化寺昔紫陽朱子東萊吕子嘗寓焉寺故有雲山閣有怡顔亭兵興以來悉廢為郡城漫不復識矣惟朱子所書亭扁石刻余於祝仲文家見之仲文有吏能退居委巷誦習猶諸生也遂名其齋曰怡顔以余嘗事二子之學來徵言乃為之銘曰萬物芸芸孰怡爾顔人之感忽日尋乎前茍物於物與物俱遷不物於物宅心孔淵内欲不萌外不能干以一觀萬參彼兩間流峙動靜匪山則川飛躍下上匪魚則鳶春木既榮冬卉亦妍化育流行精頥具宣乾確坤隤形附象懸凡厥有生靡不可觀皆吾之與靡不可歡惟不梏于私乃樂其天漢榱題研銘有漢榱題其篆曰長樂未央髙帝時陶旊物也僧用中作硯金華胡翰銘曰天垂範地合質圜覆九重遺者一于以用之懿文德漢鼎可移兹不泐明文衡巻十七
