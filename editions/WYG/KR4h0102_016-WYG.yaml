body:
  text: 明文衡巻十六明程敏政編原文原宋濓余諱人以文詞相命丈夫七尺之軀其所學者獨文乎哉雖然予之所謂文者乃堯舜文王孔子之文非流俗之文也學之固宜浦江鄭楷楷之弟栢嘗從余學已知以道為文因作文原二篇以貽之其上篇曰人文之顯始於何時實肇於庖犧之世庖犧仰觀俯察畫竒偶以象隂陽變而通之生生不窮遂成天地自然之文非惟至道含括無遺而其制器尚象亦非文不能成如垂衣裳而治取諸乾坤上棟下宇而取諸大壯書契之造而取諸夬舟楫牛馬之利而取諸渙隨杵臼棺槨之制而取諸小過大過重門擊柝以取諸豫弧矢之用以取諸睽何莫非燦然之文自是推而行之天衷民彛之敘禮樂刑政之施師旅征伐之法井牧州里之辨動作食息之儀復皆則而象之故凡有關民用及一切彌綸範圍之具悉囿乎文非文之外别有其他也然而事為既著無以紀載之則不能以行逺始託諸辭翰以昭其文略舉一二言之禹敷土隨山刋木奠髙山大川既成功矣然後筆之為禹貢之文周制聘覲燕享餽食昏喪諸禮其升降揖讓之節既行之矣然後筆之為儀禮之文孔子居鄉黨容色言動之間從容中道門人弟子既習見之矣然後筆之為鄉黨之文其他格言大訓亦莫不言必有其實而後文隨之初未嘗以徒言為也譬猶聆衆樂於洞庭之野而後知音聲之抑揚綴兆之舒疾也習大射於矍相之圃而後見觀者如堵牆序㸃之揚觶也茍踰度而臆決之終不近也昔者游夏以文學名謂觀其會通而酌其損益之宜而已非專指乎辭翰之文也嗚呼吾之所謂文者天生之地載之聖人宣之本建則其末治體著則其用彰斯所謂乘隂陽之大化正三綱而齊六紀者也亘宇宙之始終類萬物而周八極者也嗚呼非知經天緯地之文者惡足以語此其下篇曰為文必在養氣氣與天地同茍能充之則可配序三靈管攝萬彚不然則一介之小夫爾君子所以攻内不攻外圖大不圗小也力可以舉鼎人之所難也而烏獲能之君子不貴之者以其局乎小也智可以搏虎人之所難也而馮婦能之君子不貴之者以其騖乎外也氣得其養無所不周無所不極也攬而為文無所不參無所不包也九天之屬其髙不可窺八柱之列其厚不可測吾文之量得之魂燬魄淵運行不息基地萬熒纏次弗紊吾文之燄得之崑崙𤣥圃之崇清層城九重之嚴邃吾文之峻得之南桂北瀚東瀛西溟杳渺而無際函負而不極魚龍生焉波濤興焉吾文之深得之雷霆鼔舞之風雲翕張之雨露潤澤之鬼神恍惚曾莫窮其端倪吾文之變化得之上下之間自色自形羽而飛足而奔潛而泳植而茂若洪若纎若高若卑不可以數計吾文之隨物賦形得之嗚呼斯文也聖人得之則傳之萬世為經賢者得之則放諸四海而準輔相天地而不過昭明日月而不忒調燮四時而無愆此豈非文之至者乎天道湮微文氣日削騖乎外而不攻其内局乎小而不圖其大此無他四瑕八㝠九蠧有以累之也何謂四瑕雅鄭不分之謂荒本末不比之謂斷筋骸不束之謂緩㫖趨不超之謂凡是四者賊文之形也何謂八冥訐者將以賊夫誠撱者將以蝕夫圓庸者將以溷夫竒瘠者將以勝夫腴觕者將以亂夫精碎者將以害夫完陋者將以革夫博昧者將以損夫明是八者傷文之膏髓也何謂九蠧滑其真散其神糅其氛徇其私滅其智麗其弊違其天昧其幾爽其貞是九者死文之心也有一於此則心受死而文喪矣春葩秋卉之爭麗也鴟號林而蛩吟砌也水湧蹄涔而火炫螢尾也衣被土偶而不能視聴也蠛蠓死生於甕盎不知四海之大六合之廣也斯皆不知養氣之故也嗚呼人能養氣則情深而文明氣盛而化神當與天地同功也與天地同功而其智卒歸之一介小夫不亦可悲哉予既作文原上下篇言雖大而非誇惟智者然後能擇焉去古逺矣世之論文者有二曰載道曰紀事紀事之文當本之司馬遷班固而載道之文舍六籍吾將焉從雖然六籍者本與根也遷固者枝與葉也此固近代唐子西之論而予之所見則有異於是也六籍之外當以孟子為宗韓子次之歐陽子又次之此則國之通衢無荆榛之塞無蛇虎之禍可以直趨聖賢之大道去此則曲狹僻徑耳犖确邪蹊耳胡可行哉予竊怪世之為文者不為不多騁新竒者鉤摘隠伏變更庸常甚至不可句讀且曰不詰屈聱牙非古文也樂陳腐者一假塲屋委靡之文紛紛龎雜不見端緒且曰不淺易清順非古文也予皆不知其何説大抵為文者欲其辭達而道明耳吾道既明何問其餘哉雖然道未易明也惟能知言養氣始為得之予復悲世之為文者不知其故頗能操觚遣辭毅然以文章家自居所以益摧落而不自振也今以二三子所學日進於道聊一言之畫原史皇與蒼頡皆古聖人也蒼頡造書史皇制畫書與畫非異道也其初一致也天地初開萬物化生自色自形總總林林莫得而名也雖天地亦不知其所以名也有聖人者出正名萬物髙者謂何卑者謂何動者謂何植者謂何然後可得而知之也於是上而日月風霆雨露霜雪之形下而河海山嶽草木鳥獸之著中而人事離合物理盈虚之分神而變之化而宜之固已達民用而盡物情然而非書則無紀載非畫則無彰施斯二者其亦殊途而同歸乎吾故曰書與畫非異道也其初一致也且書以代結繩功信偉矣至於辨章服之有制畫衣冠以示警飭車輅之等威表旟旐之後先所以彌綸其治具匡贊其政原者又烏可以廢之哉畫繪之事統於冬官而春官外史專掌書令其意可見矣况六書首之以象形象形乃繪事之權輿形不能盡象而後諧之以聲聲不能盡諧而後會之以意意不能以盡會而後指之以事事不能以盡指而後轉注假借之法興焉書者所以濟畫之不足者也使畫可盡則無事乎書矣吾故曰書與畫非異道也其初一致也古之善繪者或畫詩或圖孝經或貌爾雅或像論語暨春秋或著易象皆附經而行猶未失其初也下逮漢魏晉梁之間講學之有圖問禮之有圖烈女仁智之有圖致使圖史並傳助名教而翼羣倫亦有可觀者焉世道日降人心寖不古若往往溺志於車馬士女之華怡神於花鳥蟲魚之麗游情於山林水石之幽而古之意益衰矣是故顧陸以來是一變也閻吳之後又一變也至於關李范三家者出又一變也譬之學書者古籀篆𨽻之茫昧而唯俗書之姿媚者是耽是玩豈其初意之使然哉雖然非有卓然拔俗之姿亦未易言此也南徐徐君景暘工書史善吟古今詩信為才大夫也旁通繪事有士韻而無俗姿一時賢公卿皆與之游名稱藉甚有薦於朝者景暘以母老不仕予尤愛景暘者於其别去故作畫原以贈焉嗚呼易有之聖人有以見天下之賾而擬諸形容象其物宜是故謂之象然象之事又有包乎隂陽之妙理者誠可謂至重矣景暘其亦知所重乎哉原諫王禕人君之職莫急於納諫人臣之職莫先於進諌納諫難矣而進諫為尤難進諫之道有二曰諷諫曰直諫諷諌固難而直諫又難也是故引義託物從容開譬不動聲色而其說已行悟主意於片言置君德於無過者諷諫之謂也危言切論銜鯁骨批逆鱗正色而不阿犯顔而不忌必究其說乃已雖殺身而不顧者直諫之謂也禮上諷諫而下直諫豈不以謂諷諫以悟主將君臣兩全其美名直諫以匡君則君或至於遂非臣或至於蹈禍是君䝉拒諫之惡而臣獲盡忠之害也故曰人君之納諫為難而人臣之進諫尤難進諫之道諷諫固難而直諫又難也雖然為人臣而事明君諷諫直諫蓋無施不可不足為難也茍事暗主而用直諫則鮮有不及其身而况於諷諫其將若之何於是二者之諫均為難矣嗚呼唐虞三代逺矣近而論之漢唐之世號能納諫者莫文帝太宗為盛矣文帝寛仁盡下羣臣雖切諫常假借納用之若馮唐之論頗牧張釋之之論嗇夫所謂諷諫也及賈誼論時事則流涕痛哭袁盎引卻慎夫人坐指人彘為說所謂直諫也而文帝皆容受之太宗英明能斷從諫如流導臣下而使之言如魏徵之言昭陵王珪之論廬江所謂諷諫也及徵疏十漸極陳時政得失祖孝孫謂陛下負臣臣不負陛下所謂直諫也而太宗靡不優納焉是則以直諫諷諫施之賢君固無乎不可也若夫蕭望之張猛京房言石顯於元帝王章言王鳯於成帝王嘉鄭崇言董賢於哀帝李膺陳蕃范滂之徒言閹宦於靈帝長孫無忌禇遂良上官儀言武氏於高宗張柬之輩言韋氏於中宗孟昭圖言田令孜於僖宗然皆不免於殺身是事暗君固無事於諷諫而因直諫以陷禍亦理之所必至矣嗚呼知無不諫而諫之以直者人臣之分也傷於直而蹈禍不測使其君䝉拒諫之惡而已獲盡忠之害者非人臣之得已也自古無道之君其過行非一端也而莫甚於拒諫言而殺諫臣拒一諫言殺一諫臣其事若未害也而家國之敗亡輒不旋踵殆如燭照而龜卜不亦深可戒哉和陽王先生夙有大志負氣節而敢言者也今擢居諫諍之職士大夫咸曰先生遇明主諷諫直諫將無施而不可矣金華王禕辱與先生游因原夫諫之所為難者為文以贈之嗚呼言其所為難則其所以不難者固有望於先生也夫原治梁寅昔之君臨天下而名以時異者曰皇帝王霸皇之世制作之未有無為而民化者也帝之世昉有制作而民猶易於化者也王之世制作之大備化天下而曲盡其道者也霸之世任情制作以知術而馭天下者也君子之論治者曰帝世不可及矣三代之治後世決可復不法三代以為治者皆茍道也嗚呼斯言者誠不易之論也自成周而下主與臣之論王霸者紛紛然而異或曰宜遵王或曰宜從霸或曰宜雜用王霸遵於王其圖之也順而易其為效也大而乆從於霸其圖之也逆而難其為效也小而近在人主所尚何如爾若曰雜用王霸王何可以雜雜即霸而已矣夫帝之不可及而王可及何也風氣之益殊猶時之春而為夏夏而為秋秋而為冬也人心之滋偽猶蓬茨之居易而為斷礱丹雘也樸渾之器易而為雕鏤金玉也聖哲之君不常出猶山之為童而木之百尋十圍者罕見也土之壤變而榖之一莖九穗者稀有也此帝世之所以不可及也若三代之君其以戰攻而創業與後世同也賴左右匡賛之臣與後世同也孜孜於禮樂刑政之施與後世同也繼嗣之君或賢或不賢其不賢者得人以輔之則治不得人則亂且亡與後世同也其異於後世者彼興王之君佐命之臣所好所趨理之公也所惡所背欲之私也王與霸之判如金之異於錫玉之異於石然王道可以學而至學而至則治亦可及矣若曰雜於霸則理欲之辨即邪正之辨也悖於理則流於欲矣戾於正則歸於邪矣或曰遵於王而業不就治不遂者若之何曰王道之當務如饑之於粱肉食之則其腹必充其體必肥彼食而不充不肥者抱疾之人爾舍粱肉之美而謂他物可充且肥者口之爽而失其味之正者爾彼圖王而不成非王之不可圖圖之而失其道者也故行仁義而敗者徐偃也用周官之法而亡者王莽也慕古車戰之法而喪師者房琯也因周官之說而行新法以亂天下者王安石也其若是者由泥古之迹非古之道也使徐偃而守侯度何以敗王莽而徇臣義何以亡房琯而出師以律何以凶王安石而用正不用邪何以亂故人之疾而癯非粱肉之害之也治之慕古而亂且亡非王道之誤之也或曰後世亦有用霸而治且乆者漢唐是也曰漢之乆以風俗之近古而又多賢明之主也唐之乆以太宗安民功大而治法之備也若其治之不及三代則亦霸之敝爾然則必王道之用刑無藉於嚴乎兵無藉於强乎曰王者之刑非不欲嚴也其有所嚴也則亦有所寛也寛也者仁之施也嚴也者義之斷也王者之兵非不欲强也其時而强也則亦時而弱也弱也者仁之術也强也者義之形也刑之以仁為寛以義為嚴故梁武之慈悲不殺非仁之寛也漢武之峻法密網非義之嚴也兵之以仁為弱以義為强故宋高宗之乞和金人非仁之弱也隋煬之逺征高麗非義之强也且世主之敝刑或誤於申韓兵或局於孫吳申韓之刑以慘礉為嚴孫吳之兵以變詐為强是皆戾於仁義者為人臣者若之何以是而進之其君也善乎孟軻氏之言曰行仁政而王莫之能禦也又曰仁者無敵君子有不戰戰必勝矣嗚呼稽之六經折之孔子以論天下之治莫如孟軻氏而或乃以為迂則凡學孔子者孰非迂也王道者必若何而無敝乎曰本之以二南之化輔之以周官之法君相修於上百職勤於下因乎時之宜順乎民之心公以滅其私實以稱其名其於復三代之治猶乗輕車趨夷途其至於所至也亦宜矣原命一首贈楊文忠别王叔英人之生或貴或賤或富或貧或夀或夭其貴之等則有為公為侯為卿大夫為士者焉其賤之等則有為農為工為商賈為奴𨽻者焉其富之等則有百金千金萬金以至於貨利無算者焉其貧之等則有無一歲之蓄一月之蓄一朝之蓄者焉其夀之等則有五六十年七八十年九十百年者焉其夭之等則有四三十年二一十年與不滿十年及一歲者焉是其故何哉蓋有命焉非人之所能為也命者何人受天地之氣以生者也夫貴者得乎氣之崇高者也賤者得乎氣之卑下者也富者得乎氣之豐潤者也貧者得乎氣之枯瘠者也夀者得乎氣之悠長者也夭者得乎氣之短速者也其間又有等級之不齊者隨其所得之氣有多寡也是故貴者不可使之賤貧者不可使之富夀者不可奪之夭固有始出奴𨽻而終受侯封生飫粱肉而沒無飯含出入鋒刃而老死衾帷者豈其智力所能及哉故孔子稱死生有命富貴在天至論富則曰富若可求雖執鞭之役吾亦為之由是觀之豈非命歟古之君子知其然是故為其分之當為而不以利害死生易其節不失其心無愧於人不求福而福在其中故其生則無愧於為人而身有餘榮沒則無愧於為神而子孫䝉其福後之君子其明乎此者蓋鮮矣是故於其分之當為者漫不知省而於利害死生之際則巧為趨避無所不騁其私徒違其心而傷於物終亦必及其身而後已故其生有餘恥而沒有餘殃甚可歎也余嘗與友人楊文忠論而悲之文忠始由縣學生升太學上舍嘗入試文淵閣其文冠多士及出為永福丞以亷能有聲譽復還鄉里囊橐蕭然居憂三載力耕以自給未嘗妄求於人豈非可謂知命君子歟今其服闋往覲京師將復有職任之寄余欲其無變於初志益務其當為也故以所嘗為議論之言作原命一篇以贈其行亦因以自勗焉洪武二十有二年九月乙巳著明文衡巻十六
