body:
  text: 明文衡巻九十四明程敏政編墓表靜菴徐先生墓表黄淮先生諱垢字宗實以字行姓徐氏其先東海郯人宋南渡後有諱千一者為黄巖令其子榮祖遂占籍為黄巖人先生之曾祖也祖諱已元以子貴贈承事郎行樞密院斷事官經厯父諱存翁仕元為江浙等處行樞密院都事母車氏贈宜人先生兄弟三人而先生居長天資頴悟勤敏好學仲弟宗茂學博才㨗昆弟自相師友人稱為二難幾冠聞永嘉彭公庭堅承徽國文公正傳講學鄉校先生躡屩負笈從之游深有所領悟遂贅居永嘉以便力學年漸富而學益充負才尚氣有經綸天下之志慕范文正公之為人恒誦先天下之憂而憂行天下之樂而樂之語拊几昌言曰必如是而后可以言仕矣居無何元運告終弗克以展其素藴於是韜光養晦設塾授徒若將終身焉淮童丱時受業于先生之門先生剛毅嚴正約教條為學規若官府號令賞罰勤怠悉當其情諸生咸知振勵洪武壬戌先生應聘共論治道時淮年纔十六亦叨選入邑庠充弟子員有司以禮敦遣先生赴闕數被顧問敷奏剴切灼中時宜太祖髙皇帝深喜得人敕銓曹任司風紀先生以草茅愚賤辭除銅陵簿復請歸迎母就養重忤上㫖謫輸役淮隂驛郡邑校官聞先生至爭出迎除館延致為賓師多所造就會朝廷選駙馬都尉功臣子胡觀在選中慮其失教為擇師而難其人爰命起公比授館教法嚴明如在鄉塾時觀受教惟謹旣冠入府成禮畢毎當講授中使援他府例設駙馬位于堂中北牖下南面而置師席於西階上東面先生憮然曰師嚴道尊道尊然後民知敬學豈以我一布衣而詘師道哉輙手引駙馬位使下然後為説書旣而明日復然先生乃為書貽之責以三事大義及富貴驕人之説觀泣下媿謝執弟子禮愈恭畧綺紈之習尚儒雅之風太祖深喜之召見奬論再三由是德譽日益彰著洪武末荐登仕版初任蘓州府通判用薦陞兵部右侍郎兩持使節罷而復起轉尚寶司丞其判蘇州也奏發粟二十萬以活饑民當春暴水齧隄為患廵行郊野相視原隰大興治水之役採訪使以為妨農且勞民沮之先生上言他役可以妨農止水不退則田不可耕妨農莫甚焉况今規令有田之家量多寡募貧人出力而饑者得所資正所謂以佚道使民曷為勞民哉屬邑有節婦王氏郡乘載其事元末旌表未及行先生請旌之禮部以前朝事不允先生上言封比干墓非前朝事乎至今以為盛典朝議謂其知大體皆從之其入為侍郎也首陳十事指切時要凡會廷臣决疑議先生是是非非有所見厯言之不徇私不黨同一揆於義以故多有矛盾者其出而奉使也在兩淮多所建明政舉而民安之海州有節婦侍小花年十六許嫁而夫亡歸夫家成䘮持服養姑送終剪髪自誓守節不二採訪使上其事所司以其年未五十不合例先生上言曰隨事處中始為合義守文執一豈曰得宜厥婦旣能哭夫於筮嫁之初又能剪髪於𦵏姑之後雖剜目截耳亦無以加自當與立志卓異同科豈與守節尋常比例廷論韙其言下郡邑旌之比使兩浙以嫉惡太過被劾怡然去職其為尚寶也年漸老而力漸衰伏遇太宗文皇帝入繼大統優待老臣遂上疏乞骸骨許之歸家杜門謝客課子孫閲耕稼逍遙林泉之下冀盡餘齡以遂考終而已越二載臬司鞫囚獄詞牽連逮至京得疾卒于旅邸垂絶侃然之氣不少貶是為正月二十二日也距生之年元至正甲申享夀六十有二冡子鏞扶櫬歸𦵏于岱石山之原配潘氏繼室林氏俱永嘉士族子男三鏞銑鐶皆側室出也女一適同里金眘水南徵士道源之孫也先生平昔交游皆四方知名士或同事於試院或邂逅於旅寓或談笑歡洽於尊爼間慷慨豁逹肝膽相照酣歌激烈分韻賦詩竟日忘倦訃音逺聞傷之者至號慟頓足歎息士林之寥落也嗚呼剛直嚴正人之美德也先生以之立大節陳大義致位通顯收令譽於當時其亦不幸由之以貽嫉召釁終至於垂老客死于外其得其失何相去之遼絶耶蓋其得也由乎已道之所有也其失也係乎人莫之致而致也莫之致而致又何尤焉淮也侍鉛槧之日淺違善誘之日深弗克咨叩以卒所業然而師生之分没齒而不忘爰摭行業之顯著者表諸墓道以慰遐思且以昭示後人俾有所觀感云先妣呉孺人墓版文陳繼先妣孺人姓呉氏諱靜貞家為廬江名門世以易經為家學主試外藩科選者累世官貴金紫前後幾十人居同爨食外内幾百人孝弟雍睦若漢萬石君家家埓素封産田連絡數州頃集四千餘賑窮乏䘏鰥寡給贍流亡義聲為當時稱最元貞間詔旌表之大父某蘄黄二州教授世父元舉交州同知再遷禮部侍郎父元正早卒兄進學國初監察御史母張氏孺人生法從家耳目濡染皆洽軌範孝友仁恕若出天性也好經史探閲逹奥義雅善琴能賦詩尤精巧文繡㓜而及筓庖厨之所未嘗有其跡侍婢數十人未嘗見慢嬉惰容嵗大疫家死者過半乃徒姑蘇止松陵故家名門交致行媒請為婚其姑之夫之父潘純子素曰衆莫如陳氏故相國之後風儀著聲子秀㧞而賢也遂歸我先君我先君早孤立已憲度受於祖妣碩人碩人宋相江文忠公之孫執禮嚴密事為必求整時誦我祖考懋於學則道明安於欲則心晦之言孺人聞之三復致深意其事碩人無毫髪不悅其志碩人稱之曰吾婦真名門女也有姑三人將歸孺人相先君治其事鉅細咸集不使動碩人心禮行送之及門曰教有名言毋忽是從先君少負重名四方賢俊求納交者過之座無虚席日為酒張筵飲之孺人執其勞怡怡如也先君勇為義窮急困悴者歸之倒囊不足則孺人出妝資副之嵗不知其幾也先君志行髙潔其期待已必欲倫於古之魁偉之人仕為經厯濟南無一不義之物奉口體及卒惟有所閲之書二萬餘巻篋笥無所實也遺孤繼才生十月三女長者嵗九碩人年老孺人在少艾姻族嗟無為謀孺人曰吾命衰薄䘮夫蹇迍集已然觀古傳史載列貞婦保孤嗣宗其道烈烈者正吾今日之志吾幸有姑庇依忍安孱弱而墜先緒也即謝膏沐絶容飾衣粗食糲宵晝紡績不知有寒暑操銘荷鎛與奴共力畦圃孺人曰吾姑素享華整食飲不茍易一旦失子變味其將不堪毎具食羞列柔嘉碩人甘之孺人意始愜也孺人形勞日甚或勸曰女大贅婿扶家孺人曰未就木畏禮勿犯家固不恤也繼稍長孺人教讀孝經教讀小學論孟教讀詩傳日講發其義教為詩教操縵治音年十二遣從故老碩德道逺以麥粉作餌俾擷之俟饑暮歸課所業煢煢孤燈母子相依倐不知夜之過半也教三女立行長適范文正公宗孫昭次有歸歿次適貢元劉政政與昭皆早逝二女秉志光振風節碩人年九十四而終初孺人䘮我先君哭之有時若敬姜哭碩人哀慟踰節日遂成疾孺人端凝慧逹臨事有明斷始先君在濟南孺人與俱國令初新民俗未變郡長迂懦大將出師臨境需用百出先君晝夜應事孺人禆助籌畫不失機宜先君處之裕如政令章著也孺人持已待人忠敬醇一毎祭祀必繫養供俎實齋沐承事翼翼盡誠孝雖年老終嵗未嘗近外庭姻戚若不與交游者然吉凶賵遺而禮厚獨先也繼配簮纓故家金氏女孺人臨教甚恩採摭經傳為女範者數十條授之俾習為規撫教諸孫尤篤曰痛若翁不及見汝曹成也孺人之德宗姻法之鄉黨化之郡縣以聞敕御史旌之永樂二十一年孺人享年八十有一十月十一日卒明年十月二十日𦵏呉縣薦福山之茶塢孫男五人宗配陸氏寛配施氏宏配王氏宣配郭氏完少女一人歸謝璜曾孫男傳儀仁女二人其與婚者皆名族嗚呼我先妣孺人之殁也繼魄隕心䘮不能自生痛念大德昭播當世無文示後以告子孫不孝之罪深酷也忍死以述聞見者勒諸堅珉而翰林侍讀沈公題曰皇明節婦呉孺人之墓嗚呼痛哉嗚呼痛哉王氏二良墓表梁潛義烏王氏兄弟二人長叔盛次叔雍皆有美行而不得其夀以卒卒又皆在京師旣返𦵏其弟以予嘗與其父愽士君善也以其所自為狀及銘走書京師求表其墓且曰二兄有老母髪種種然有子皆㓜弱今其墓纍纍並𦵏一原上過者無不流涕為王氏悲哀此二人幸先生辱貺一言非直以著不朽庶幾老母弱子望之以攄其哀也予悲二子有可哀者按其狀叔盛諱某自少讀書頴悟絶人旣長機敏好謀畫慨然有逺志然與人交恭謹退下恂恂然人遇之非禮弗較也應門禦侮公私百端酧接謹密鮮有敗事故起家至多貲甲於鄉閭卒年三十八叔雍諱某氣和色夷通敏秀朗讀書日數千百言經史百家無不究覽擇友而交遇勝已者必思與之齊乃已常一至成均就其從叔博士君學見者莫不愛敬卒年三十一二人之志雖少異而敬身接物皆同至於事母盡其孝處兄弟盡其愛又二人天性然也於乎二人同出於王氏同不得夀以卒卒之時又同蓋永樂二年夏春間相先後十日耳夫古今才不多見况並出一門世所謂機雲二惠者二子於此豈異乎哉昔人有所謂三良者予於二子亦謂之二良乎是可為王氏痛也王氏自五代時有節度使諱彦超者由會稽徙金華之義烏遂為義烏望族元石硤書院山長諱炎澤者其髙祖也曾祖良常山儒學教諭祖裕考綸皆隱德弗耀國朝官至翰林待制兼修元史總裁諱禕者則其從祖也夫上以承其先者二子之志為無忝矣則於夀夭又何足較哉書以碣之以徵夫來者彭氏義阡表王直彭氏義阡者𦵏彭氏之死於義者也當元之季豪傑起椎埋剽竊之徒亦相扇為亂龍泉羅邦其一也彭氏居邑之雩溪世為仕族于時有文逺者英偉有才畧卓然為一鄉之望嵗辛卯賊勢浸盛官軍不能制乃散財發粟集義兵以保鄉里賊頗畏之壬辰江西行省叅政泌布阿咱爾開分省于贛命張萬戶守龍泉許辟署從事張辟文逺為䕶民廵檢叅其軍領民兵守北門賊引衆及城下張與文逺屢出戰不勝因閉城堅守以待救癸巳春城中食盡且無援張夜率衆棄城去文逺殿舟至螺灘賊追及合戰衆饑困不能支勢且北文逺使從弟大逺馳騎請兵于吉以圖興復率敢死士大呼奮矟入賊中欲刺邦不得殺數人賊亦攢槊向之文逺創重遂被擒大逺走告吉安總管為移檄泰和同知楊某使以兵復龍泉兵至境大逺為前鋒踰章村河渉南洲河會風雨大作河水暴漲兵大半不得渡賊以衆蹴之遂擒文逺兄弟同日死於賊是年三月十一日也賊旣得志憤彭氏倡義圖已其兄弟子姪有先在軍中或竄伏田里者皆捕而殺之自文逺而下凡十九人又婦女二人我太祖髙皇帝旣受天命削除僭亂以興太平彭氏族屬之存者休養生息今七八十年日以繁盛蓋詩書禮義之澤未艾也然其老長閒居族坐相與談向時事未嘗不慨嘆文逺兄弟之英風義烈且深念夫死於其難者之無辜而皆不能歸𦵏或無以嗣其後蓋䀌然傷之嶷文逺之再從曾孫項城令仲恭甫之賢子也聞諸長老而有慨於其心乃即雩溪大塘口之原開兆域營冡壙倣禮各為木主以宣德三年七月望日招其魂而𦵏焉又以項城命置近田九畝以供嵗時祭祀曰死者有知庶幾能安於此而無所恨矣嗚呼䘮亂以來姦宄縱恣善柔多隕於非命有能奮勵以討賊而舎生取義如文逺兄弟者誠少矣雖曰有之其宗族兄弟有能興哀於旣久之後而為之歸使祭奠有所如嶷者亦少矣然則彭氏其誠能篤於義哉是皆可表也嶷來京師因其姊婿督府經厯項斐求予言欲為之書使歸而刻諸石凡𦵏者之名諱次第則備載于碑隂劉子欽墓表錢習禮景泰甲戌十月十有八日予友劉公子欽以疾卒于家明年乙亥正月八日其孤本祔公于金牛臺先塋之次旣求郡守張侯瑄為銘以納諸壙中復奉事狀踵門謁予文以表于墓上狀稱劉氏先世本沛人唐末有諱崇者仕于袁州刺史樂其風土因家焉後自袁徙吉州之永豐㶚上又自㶚上徙吉水之常海故今為吉水人公諱敬字以行曽祖考學翁仕元為恒山知縣祖考竒登至治癸亥進士考季道國朝以薦起為起居注遷淛江按察僉事廉介有聲母曾氏昆弟三人皆傳家學公獨資禀超邁志於用世自少嗜學研覃經傳頟頟不少休落筆為文動有思致儕輩推服郡守朱仲智聞其名舉補郡學生月試季考以及上官合試羣士第其文名往往出人右大見奬異聲稱出等夷益刻苦自勵永樂癸未以書經中江西鄉試第一明年甲申禮部會試第二廷試登曾棨榜進士第時所取四百七十三人太宗文皇帝命近臣㧞其尤異者二十八人公在選中賜名庶吉士俾入文淵閣日讀中秘書以增益其學食於大官月給膏燭費燕閒之頃上親臨問時舉僻書疑事以驗其學激勵而期待之者甚至朝野之人竦然謂上作新人材以大興文治士君子曠世竒遇交口歆豔不置公與同升之士人人感奮夙夜淬勵以圖報稱時母夫人在堂無恙迎至祿養于京鄉人榮之母殁奉柩歸襄大事執䘮盡禮除服入翰林預修永樂大典上慎刑辟以重惜民命乃簡授刑部福建清吏司主事折獄多所平反被其理者自以不寃亡何累坐謫戍廣西南丹困阨中處之裕如無幾微隕穫之態人用髙之仁宗昭皇帝嗣位命廷臣凡經術之士謫居戎伍者舉任教官棨時為翰林學士以公應詔起為臨江新淦縣學訓導教有師法生徒多所造就厯考福建湖廣應天鄉試去取精當物論帖然無譁嵗滿力請致仕以歸卜居於郡城之西命其燕休之堂曰密庵人因以為別號逺近學者聞之欵門而問業者麇至公之教人因其材質以訓廸之始終無怠意人故樂受其教若工部尚書文襄周公忱翰林侍講學士周叙太常少卿鄭雍言國子助教羅伯初廣西按察僉事劉長吾皆出其門其他名薦書職教事者不可遽數常時足跡未嘗入公府惟事干政體及表賢厲俗即入言之守貳皆見聽用晚而文思不衰四方有來求者應之不倦人遂所欲而去曠逹之懐老而不改其度故舊及門尊酒相歡意豁如也卒前一日出應賓客笑語如平時是夕漏下四鼔奄然而逝生以洪武戊申十月四日夀八十有八元配曾氏繼配羅氏王氏張氏皆踐婦職以順承公志子男一人本也女二人以妻曾希益周啓孫男三人女三人皆㓜於乎予與公生同邑學同志少而往還相好壯而相繼登朝老而先後謝事以歸慨念江鄉耆舊凋落殆盡思欲追往時會聚之樂邈不可得冀天於予二人者少假以年得從公於青原白鷺間嘯傲林壑共佚其老豈意公先棄我而逝哀豈能忘於情哉天之降材於人必將使之見於用世以逹其志夫何公制於命材弗克施而志有未就佑善之天其不可必若此哀豈能忘於情哉且生而不大顯於時殁而無傳於後其何以為為善者之勸用列述公之材志學行俾刻諸冡上之石非惟慰公於地下永昭示於後之人焉祝先生墓表周叙括蒼祝先生旣卒之二十年其門人鎮江儒學訓導潘君華具行實造叙求表諸墓今刑部侍郎薛君希璉前為監察御史時亦數以為言蓋皆以其仲子濠之請也叙永樂甲午先生主試秋闈所取士且素與先君子職方府君厚善其謝事而歸也叙嘗率諸門生交游祖送之今不復作矣追感疇昔不能忘情則墓上之文何敢辭按狀先生諱金字廷心姓祝氏括蒼麗水人居官橋里世有衣纓曾祖某祖亮元處州路經厯父彦方安陸同知先生資性淳厚㓜不妄語九嵗通小學論孟書甫志學盡讀諸經旁及子史年十八不逺三百里師事太史金華宋先生景濂逾四朞學成始歸宋太史甚嘉與之洪武甲寅同知翁與郡守臨安郁公斌偕坐累謫役鳳陽先生即從故里擕資裝往代勞役明年疫癘大作死者相枕藉郁無他子弟侍側疾革托以身後事既殁先生為經紀歸其骨于家已而同知翁亦遘疾先生日奉湯藥夜則稽顙籲天洒泣悲哀求以身代翁瀕危數四時盛暑衆莫不勸預治䘮具逮夜將半翁忽大呼曰金何在於是絶而復甦人皆謂先生孝誠所格已而翁遇寛恤恩復任遂引年致仕既歸感末疾弗能起先生遍求名醫乃調膳饈侍寢左右衣不解帶者七載如一日父殁哀毁逾禮母夫人懼其傷生越四日强之食乃啜粥治䘮不用浮屠𦵏祭一遵朱子家禮寢苫塊三年哭泣之聲如初喪其奉母夫人也備極甘㫖之養母殁哀戚之情一如失怙凡親平生所嗜終身不忍食遇忌辰必先期齋沐致祭畢哭慟不食者終日其至孝蓋天性云處兄弟極友愛仲氏嘗求異居室廬田園從所擇畧無難色鄉有豪横恒假虚詞肆誣構者先生正言反覆導喻之其人卒化服郡邑兩舉孝亷不就築室白溪山中自號蒙山處士有終焉之志久之與仲俱被徵仲氏應詔授秦府紀善先生以疾固辭嵗己卯郡守劉仲廉邑令周又𤣥屢造謁其門强先生分教麗水邑庠不獲已乃就至則周令特為構樓一區處之環樓植竹萬竿乃更其號曰萬竹山人端居講堂嚴矩度勤誨訓解惑析疑隆冬盛暑弗解由是人才輩出盛於昔時數年調江浦教諭邑居大江之北學舎至壞漏不可居先生脩葺廢墜教育之方視麗水益加永樂辛丑滿考乞致仕從之先生學問該洽操端識明每賓興之嵗藩方爭聘為考試官所歴四川河南江西福建皆稱得人而江西尤盛平生教學者以持敬為主雖謝事家居筋力漸衰晨必冠帯詣家廟肅揖一月之朔望必造先塋拜掃鄉黨宗戚相過者未嘗以耄疾辭所著詩文有聆癡等集若干巻皆温淳雅正類其為人其生以元至正乙酉四月二十三日卒於永樂癸卯二月二十九日享年七十有九卒之嵗十二月庚辰𦵏鄉之良山祔祖塋也配包氏元封上黨郡侯岐山之女有婦德先君十年卒子男三人漢濠淵孫男六東楠柴芬椲桐曾孫男六端淡璧烋二㓜未名於乎孝百行之本敬德之聚也先生學行卓卓皆足為世儀範孰非事親之孝持身之敬之所推乎其學信有源委哉且潘君之屬予言也惓惓至十數往返不厭其篤於師若此亦足以知先生之教矣是皆在所當書者遂次第之如右俾歸遺其子刻之以識永久焉奉直大夫尚寶司少卿袁公墓表李賢士生天地間有遭遇明時而不得見用於世者有見用於世而不得見知於君者有見知於君而無才術以顯其名者有名雖顯而不能保全始終福夀俱隆者今之君子兼而有之者吾於尚寶袁公見之嗚呼休哉公諱忠徹别號靜思前人世居南昌至七世祖于誠仕宋累官刑部尚書南渡時扈蹕家於鄞六世祖芳為吉州泰和令髙祖鏞咸淳進士為宋死節曾祖澤民養道不仕祖士元為元翰林國史院檢閲官父珙國朝太常寺丞贈中順大夫太常寺少卿母倪氏封恭人公自㓜頴敏神氣異常讀書强記童丱時已能詩文凡名士鉅儒一見知為大器太常君精於風鑑公得其傳文廟在潛邸時聞太常君名以書幣召之公隨侍文廟見公論相大喜賞賚甚厚尋許歸家未幾髙廟崩建文嗣位信任非人猜忌宗室文廟不安因有靖難志召公問之對曰天命有在誰能禦之奉命纂人象大成書以獻賚予有加壬午夏文廟入正大統首遣使召公父子至官其父太常丞且曰忠徹臨事有斷制所言多驗特授鴻臚序班賞賚殊厚公入謝曰陛下當畏天脩德偃武崇文率由舊章振肅綱紀撙節財用明慎賞罰禮貎大臣黜陟臧否用臻太平之治並賜嘉納尋知公在戎籍即令兵部蠲之又嘗勉公進學公以務冗對遂陞尚寶司丞且曰此職有暇可親詩書公退而感激不怠庚申改中書舎人己丑春營北京公扈從既至日與大議復遣中使召太常君至父子相隨出入禁庭尋密遣公乘傳看楚王子重瞳公還奏無他異庚寅春以公父高年優賚遣還公扈從北征既還上屏左右從容密問大臣優劣之狀武臣邱福朱能張輔李逺陳懋栁升薛祿文臣姚廣孝夏原吉蹇義金忠呉中呂震李慶方賓公一一論斷以對上曰卿所識鍳正合朕意是嵗冬太常君卒賻𦵏加厚公奔喪𦵏畢詔起復之癸巳春扈從至北京甲午春復扈征衛喇特乙未夏上謂公曰東宮不聞教子對曰臣聞古者不親教子宜選文學老成之人以輔導之責其成遂選儒臣儀智陳山等日侍講讀丙申春秩滿復尚寶司丞特加賞賚戊戌春召公至便殿示以進陞之意公固辭以父未有贈官即日召吏部贈其父官賜誥命公益感勵進相書機要丙子陞尚寶司少卿恩典稠疊莫與為比壬寅春扈從北征公言利出東路上不從洎還軍在東者果大獲復觀將兵者得利已而㨗至毎從征所言無不驗者仁廟登極待之尤厚賜誥命尋賜還家燎黄省視宣廟嗣位召至京宣德改元丁内艱不獲奔喪詔以從子代還襄事一日見上容色曰宗室人有謀上之意七日内果有報漢王反狀者公扈從往征之既還受賚彌厚甲寅春得展祭之請乙卯春今上嗣位公入朝己未夏懇乞致政既得請南歸傾朝縉紳祖餞都門外公之術竒驗於文廟者不能盡述若公效忠讜論則人不及知者甚多如終大孝之情而慎密機事論養賢之實而贍其取給乞賜孔氏玉軸之誥歴言遣使取寶之非議武職宜准終喪諌服藥勿信方士如此之類皆有人所難者休官居閒二十餘年忽遘疾顧其子曰死生常理吾何憾惟信誠忠厚可以立身汝宜勉之屏藥端坐而終公生于洪武丙辰十一月七日卒于天順戊寅三月三日夀八十有三娶邉氏累封宜人先公二年卒子男二長應麟早殁次應驤鴻臚寺序班女七長適泰寧侯子陳鏞次適都轉鹽運使金逹次適光祿寺卿子井醴次適寧波衞指揮萬全次適行人司副金亮次適昌國衞指揮武銛次適王逈孫男女各二應驤將以某年某月某日與宜人合𦵏于前嶴山之側前期奉狀以治命來請表其墓公為人慷慨有大志不隨流俗正論毅然不以利害少沮與人交洞見肺腑不立町畦見人患難惻然力援傾囊不惜理有不直者面折不少借其致政也聞朝廷出令之善用人之當則躍然而喜有不便於民者必憂形於色此其為人豈特風鑒一事可稱道哉所著鳳池吟槀符䑓外集若干巻明文衡巻九十四
