body:
  text: 明文衡卷二十九明程敏政編記閱江樓記宋濂金陵為帝王之州自六朝迄于南唐類皆偏據一方無以應山川之王氣逮我皇帝定鼎于茲始足以當之由是聲教所暨罔閒朔南存神穆清與天同體雖一豫一遊亦可為天下後世法京城之西北有獅子山自盧龍蜿蜒而来長江如虹貫蟠遶其下上以其地雄勝詔建樓於巔與民同遊觀之樂遂錫嘉名為閱江云登覽之頃萬象森列千載之秘一旦軒露豈非天造地設以俟大一統之君而開千萬世之偉觀者歟當風日清美法駕幸臨升其崇椒凭䦨遙矚必悠然而動遐思見江漢之朝宗諸侯之述職城池之髙深闗阨之嚴固必曰此朕櫛風沐雨戰勝攻取之所致也中夏之廣益思有以保之見波濤之浩蕩風㠶之下上蕃舶接跡而来廷蠻琛聨肩而入貢必曰此朕徳綏威服覃及内外之所及也四裔之逺益思有以柔之見兩岸之間四郊之上耕人有炙膚皸足之煩農女有捋桑行饁之勤必曰此朕拔諸水火而登于衽席者也萬方之民益思有以安之觸類而推不一而足臣知斯樓之建皇上所以發舒精神因物興感無不寓其致治之思奚止閱夫長江而已哉彼臨春結綺非不華矣齊雲落星非不髙矣不過樂管絃之淫響藏燕趙之豔姬一旋踵間而感慨係之臣不知其為何説也雖然長江發源岷山委蛇七千餘里而始入海白涌碧翻六朝之時往往倚之為天塹今則南北一家視為安流無所事乎戰争矣然則果誰之力歟逢掖之士有登斯樓而閱斯江者當思聖徳如天蕩蕩難名與神禹疏鑿之功同一罔極忠君報上之心其有不油然而興邪臣不敏奉㫖撰記故上推宵旰圖治之切者勒諸貞珉他若留連光景之辭皆畧而不陳懼䙝也琅琊遊記洪武八年十有一月壬子皇上以皇太子暨諸王久處宫掖無以發舒精神命西幸中都沿道校獵以講武事濂實奉詔扈從十有二月戊午次滁州驛濓進啓曰臣聞琅琊山在州西南十里晉元帝潛龍之地帝嘗封琅琊王山因以名頗聞秀麗偉拔為淮東竒觀願一遊焉而未能也敢請皇太子驩然可之即約四長史同行秦王府則林伯恭晉王府則朱伯賢楚王府則朱伯清靖江王府則趙伯友遂自驛西南出過平臯約三里所望豐山盤互雄偉出琅琊諸峯上唐梁載言十道志又云豐亭山山上有漢髙祖祠又有飲馬池世俗妄傳漢髙祖曾飲馬于此國朝以山麓為畜牧之塲別鑿池飲馬仍揭以舊名居人指云山下有幽谷地形低窪四面皆山其中有紫微泉宋歐陽公修所發泉上十餘步即豐樂亭直豐樂之東數百步至山椒即醒心亭由亭曲轉而西入天寧寺今皆廢唯凉烟白草而已濂聞其語為悵然者久之山東南有栢子潭潭在深谷底延袤畝餘色正深黒即歐陽公賽龍處上有五龍君祠皇上初龍飛屯兵于滁㑹旱暵親挾雕弓注矢於潭者三約二日雨如期果大雨及御寶厯為作欄楯䕶潭且新其廟廟側有時若亭濂坐亭上問潭側雙燕洞及其南白鴿洞以肆窮覽人無知者乃止復西行約三里許有泉瀉出於兩山之間分流而下曰釀泉潺湲清澈可鑑毛髪傍岸有亭曰漸入佳境今亦廢唯四大字勒崖石間淳熙中郡守張商卿等題名尚存沿溪而上過薛老橋入醉翁亭亭久廢名人石刻頗夥兵後焚煉為堊殆盡亭後四賢堂亦廢亭側有玻瓈泉又名六一泉石闌覆之闌下壓以巨石中疏一竅通泉徑可五六寸手掬飲之温是日天隂雪花翩翩而飄伯清倡曰雪作矣不還將何為濂遊興方濃掉頭去弗顧其步若飛厯石徑一里所至回馬嶺伯友追而至伯清繼之伯友曰二客足力弱不能從矣二客伯賢伯恭也其謂回馬者建炎冦盜充斥郡守向子伋因山為寨植東西三門西曰太平東乃回馬也嶺之東有醴泉又其東南有栲栳山山之南有桃花洞又南有丫頭山山之下有熙陽洞皆未暇往蛇行磬折黄茅白葦間莽不知所之宋熙寧初僧崇定獲佛舍利六百壘石為四十九塔於道隅纍纍如貫珠塔雖廢幸有遺址可憑徑行無疑其路若窮又復軒豁葢峯回路轉九鎖而至開化禪院院在琅琊山最深處惜乎山皆童而無蔚然深秀之趣唐大厯中刺史李幼卿與僧法深同建此院即張文定公方平寫三生經處三門外有觀音泉入院皆瓦礫之區唯構屋三楹間中施佛像僧紹寧出速坐方定龍興院僧徳學同太子賛善孟益秦王伴讀趙鐄吳王伴讀王驥楚王伴讀陳子晟聞濂入山咸来㑹晟云太子正字桂彦良憇六一泉上亦足弱不能進恐隨二客歸矣寧具飯飯客飯已寧引觀庶子泉泉出山罅中乃㓜卿所發李陽氷所篆銘銘已亡張億書三字碑亦斷裂卧泉下石崖上多諸儒題名陷為一方鐫勒其中自皇祐淳熙乾道以来皆有之字㦯篆㦯隸㦯楷㦯可辨㦯不可辨山之東西在在皆然不特此泉也泉之南有白龍泉禱雨多驗童行堂下有明月溪稍南有吳道子畫觀音及須菩提像刻石壁上傍鐫淮東部使者八八舜臣琅琊山記頗不合文體為之破顔一笑又稍南有華嚴池由明月而上入歸雲洞訪千佛塔遺址過石屏路俯窺大厯井井亦㓜卿所鑿沿山腰陟磨陀嶺逺望大江如練鍾阜若小青螺在游氣㝠茫中嶺下有琅琊洞洞廣兩室中有一穴深不測名人題識無異庶子泉懼日夕復不暇往焉自㓜卿博求勝跡鑿石引泉以為溪左右建上下坊作禪室琴臺後人頗繼其風山中之亭幾二十所而日觀望月為尤勝今荆榛彌望雖遺跡亦無從求之可歎哉夫亭臺廢興乃物理之常奚足深嘅所可嘅者世間竒山川如琅琊者何限第以處於偏州下邑無名勝士若㓜卿者黼黻之故潛伏而無聞焉爾且㓜卿固能使琅琊聞于一方自非歐陽公之文安足以達於天下㦯謂文辭無闗於世果定論邪然公以道徳師表一世故人樂誦其文不然文雖工未必能久傳也傳不傳亦不足深論獨念當元季繹騷竄伏荒土朝不能謀夕今得以厠跡朝班出陪帝子巡幸而琅琊之勝遂獲窮探豈非聖徳廣被廓清海㝢之所致邪非惟濂等獲沾化育生成之恩而山中一泉一石亦免震驚之患是宜播之聲歌以侈上賜遊觀云乎哉因取醉翁亭記中語風霜交潔水落石出字為韻各賦一詩授主僧紹廣刻諸山石云遊荆塗二山記濂既遊琅琊山起行至池河驛適郵卒遞内使監公牒至及開緘中藏濠梁古跡一巻宸翰親題其外令濂搜訪與青宫言之濂因啓曰臨濠古跡唯塗荆二山最著圖經塗山在昔鍾離縣西九十五里荆山亦在縣西八十三里二山本相聨屬而淮水繞荆山之背神禹鑿開使水流二山間其疏鑿之蹤故在人思其功迄今弗能忘青宫曰至中都當往遊焉余將渡淮狩于王莊先生宜泝流而上届今懐逺縣以俟濂奉教行以洪武乙夘冬十一月乙巳發舟庚午日曛始泊縣西門而青宫已駐蹕於門東五里矣辛未濂上謁青宫下令以壬申遊二山濂至期約懐逺文學掾王景彰宿舟中黎明櫂舟至塗山足曳杖入山山傍廢址舊皆民廬前度石梁復斗折而北累石為墉多藝椒之園行可三里餘視大磬石青綠間錯頽然欹足坐諦視之乾蘚交封之耳聞有草生石上髙一尺其花可玩不假土力人取懸檐間呼為石蓮華復行四里所巖石犖确挿起道左危傾欲飛墜復二里所微徑入灌莽抵巖罅貯泉一泓味甚甘覆以茆茨曰聖水亭取水以禜雨多驗復一里餘至山巔禹廟在焉廟已毁唯頽垣破礎存游目四顧長淮西来渦河北匯而夀春臨濠宿州之境皆在冥茫昏杳中緬想南北戰争屯戍處為慨者久之山之下聚落甚盛廟史云名禹㑹林乃禹㑹諸侯之地廬舍之比如櫛移踵入廟廟前杏樹一章大可蔽二牛二栢參差左右樹東寘小甕杏柯之水時津津滴其中廟史云當晨霧四集水愈多其来如泉可代井石碣二一大書有夏皇祖之廟六字下方刻宋慶元初州守劉仲光自造禱雨記一亦記禱雨事皇甫斌紹熙庚戍来為郡命鍾離尉丁夫榮作石未泐文尚可讀復從廟西循石坡而下鉅石危立如人形遙望之一嫗儼然也相傳為啓毋石廟史云居人毎刲羊豕祭之至以粉黛飾其貌聞之不覺失笑山岰舊有僧房今廢久俟鶴駕不来忽使者至云扈從士馬多無橋可以渡河青宫不復至矣言未既但見旌旗如錦繡搖曳上荆山矣濂亦下麓入鯀廟見所題碑神號鄙俚棄而不睨出讀祖無擇所賦歌京口孫臨為書碑葢無擇謫守夀春過此而作也復北經縣治折而東行約三里所至荆山梁魏交鬬時就山築堰以灌夀春其遺跡猶班班可見復行三十步崖厂如屋側身而入石平如牀座可坐人號為卞和洞自西上復一里所過避雨石石斜倚可避雨故名復六十步至産玉坂竒石駢立𤣥質而白縁粲如雪西有玉池榛荆迷路不可尋景彰欲導至青峯庵足倦遂止時青宫已獵逺郊濂因登舟先還中都云惟二山見諸載記者其說多乖舛以塗山言之春秋左氏傳云禹㑹諸侯於塗山杜預注云在夀春縣東北說者云今濠州是也國語史記則又云禹㑹諸侯於㑹稽故㑹稽亦有塗山吳越春秋亦以塗山在㑹稽又兼載塗山之歌應劭云塗山在永興北說者云今㑹稽蕭山縣是也是二說已不能歸於一致矣至於蘇鶚演義又云塗山有四一㑹稽二渝州三濠州四當塗然其處皆有禹跡㦯者遂謂禹之治水固當徧厯宇内而㑹諸侯實在㑹稽之塗山栁子厚塗山銘蘇子瞻子由塗山詩指在濠州者皆非是濂之存疑未決者一也以荆山言之荆山楚山也楚之先王熊繹僻在荆山篳路藍縷以處草莽傳至成王始盛又七傳至昭王始遷都郢昭王有言曰自古先王受封望不過江漢河非所獲罪則楚之封疆可知郢即今江陵其地有荆山一名景山荆故楚號也有之誠宜世則謂在濠州濠州古鍾離子國與夀春密邇楚自昭王之後又厯十一傳至考烈王始徙都夀春韓非子所載卞和獻玉事乃在厲武文三王之際昭王上接武王已越十世當三王時鍾離何嘗屬楚而强謂卞和至此山邪新序又謂抱玉而泣在共王之時雜記又謂在懐王及其子平王之時平王乃昭王之父下距懐王九世共王上至武王亦六世何至顛倒錯亂如是邪濂之存疑未決者二也大抵山川遺跡非本諸經史者多不可信葛洪丹井與郭景純之墓在在有之縦以髙世之智將何自辨其真偽邪必欲可信塗山當稽之左氏以夀春為正荆山當證諸史傳以江陵為正有謂塗山氏乃故國名禹曽娶其女者別是一說與此殊不相涉也濂耄矣諸書遺忘欲盡所記憶者未必無舛訛輒縁紀逰因掛漏書之以發同遊者一笑同遊者葢太子正字桂彦良晉府長史朱伯清吳府伴讀王致逺及景彰云後一月某日記宋九賢遺像記濂溪周子顔玉潔額以下漸廣至顴而微收然頤下豐腴修目末微聳鬚疏朗㣲長頰上稍有髯三山帽後有帶紫衣褒袖縁以皂白内服緣如之白裳無縁舄赤色袖而立清明髙逺不可測其端倪程子色微蒼甚瑩貌長微有顴眉目清峻氣象粹夷髯四垂過領袍土黄色無縁内服領以白皂緇帽簷髙白履和氣充浹望之崇深伊川程子貌勁實顴㣲收色黄而澹目有稜角髯白而稍短在頰者尤短而翩翩若飛動帽袍與履咸如明道儼而立剛方莊重凜然不可犯康節邵子色微紫廣顙身頎然有顴特然其下癯骨爽而神清鬚長過領内服皂領帽有翼圍之袍緇履如伊川聳肩低袖手立而睨視坦而莊和而能恭横渠張子面圓目以下微滿而後收色黄鬚少短微濃衣帽類康節履亦如之髙拱正立氣質剛毅徳盛而貌嚴温國公司馬子色黄貌癯目峻凖直鬚疎而微長半白在耳下者亦半垂耳輪闊微向面幅巾深衣大帶加組方履黒質白絇繶純綨前微下而張拱指露袪外有至誠一徳不以富貴動其心之意晦庵朱子貌長而豐色紅潤髪白者半目小而秀末修類魚尾望之若英特而温煦之氣可掬鬚少而疎亦强半白鼻與兩顴微齄齄微紅右列黒子七如北斗狀五大二小六在眉目傍一在顴外一在唇下鬚側耳微聳毫生竅前冠緇布冠巾以紗御上衣下裳皆白以皂縁之裳則否束緇帶躡方履履如温公拱手立舒而能恭南軒張子姿貌恢偉眉目聳秀白而潤豐下少鬚神采􅀈然椰冠紗巾道服青皂縁繫以縚履白坦然明白使人望而敬之東莱吕子形貌豐偉顔色温粹眉厚而秀髭淺而有衣道服皂緣冠幅巾躡皂履望之似嚴毅就之如入春風中金華宋濂曰天生九賢葢將以明斯道也今九京不可作矣濂寤寐思之而無以寄其遐情輒因世傳家廟像影叅以諸家所載作九賢遺像記時而觀之則夫道徳沖和之容儼然於心目之間至欲執鞭從之有不可得於戲九賢亦夫人哉新雨山房記諸暨為紹興屬邑與婺鄰國初得婺時伐偽吳張氏相持未決兵守諸暨界上張氏恃諸暨為藩籬乘間出兵侵掠两軍屠戮無虛時故諸暨被兵特甚崇甍巨室焚為瓦礫灰燼竹樹花石伐斵為樓櫓戈砲樵薪之用民懲其害多徙避深山大谷間棄故址而不居過者傷之今國家平定已十餘年生民各安其業吾意其中必有修飾室廬以復盛時之觀者而未之見今年邑士方伯修為余稱其友張君仁傑居諸暨北門之外故宅昔已燬及兵清事息始闢址夷穢創屋十餘楹旁植修竹數百四時之花環藝左右琴床酒爐詩畫之具咸列于室仁傑未亂時嘗有祿養至今郡縣屢辟之輒辭不赴以文墨自娛甚適號其室曰新雨山房願得余記之一室之廢興為事甚微然可以占世之治亂人之勞佚非徒然也方兵革之殷人有子女金帛懼不能保雖有居室寧有完葺而知其安乎糗粱芻茭之需叫號徴逮者填于門雖有花木之美詩酒之娛孰能樂之乎今仁傑獲俯仰一室以察時物之變窮性情之安果誰使然也非上之人撥亂致治之功耶自古極治之時賢且能者運於上隴畆之民相安於下而不知其所由然飫飽歌呼秩然成文成周盛時之詩是也安知今不若古之時耶仁傑其試為之余他日南歸駕小車過北門求有竹之家而問焉仁傑尚歌以發我余當鼔缶而和焉五洩山水志五洩山在婺杭越三州境上北距富春南據勾吳東接浦陽其山水最號竒峭齊謝𤣥卿嘗以採藥深入其中而宋刁景純吳處厚亦頗游焉自西坑嶺入過遇龍橋北行二十步始入西潭前横一溪水甚寒履之如氷由溪而前徑小潭傍有怪石突起類大甕斜覆乃捫石而登一失足輒墜又行二里所地稍夷曠怪石四瞰峯巒環列獻狀其紋縈縈然類神工鬼斧所雕刻者山多猴遊人或恐之撒石亂下如雨又前行半里所泉自石竇中出瀏瀏作聲若琴若笙竽泉西流匯為小窪瑩澈泓澂毫髪不隠鯈魚數尾洋洋往来如行琉璃瓶中見人至潛去窪左大樹離立極怪偉倒影入水中如畫又前行五十步大石閼道相傳有岩角肖鷹喙忽夜大雷雨喙崩下聲聞二十里又行三十步榛篠成林翠光浮映衣袂成碧色山蟲崖虺奔遶後先瞬目失所在至此則氣象隂幽絶不類人世如升蓬嶠坐水晶宫生平烟火氣消盡又自山腰縁葛而前竹籜覆地厚動足輒仆又過十步許抵小潭小潭上曰西潭流水傾沬成白簾濶可七八尺冉冉下注滑而無聲兩傍石崖峭立苔蝕蘚暈時有水珠毿毿滴下嵗旱鄉民禱龍於此遇禱泉或湧取蜥蜴入瓶盂中持以歸多驗自遇龍橋至此約可五六里皆蛇盤磬折路行若窮又復軒敞其中勝致難得具述㦯言潭上有石河從石河至三臺塔人跡罕至莫詳也尋他路而出斜迤而東過香爐峯峭拔上有石類香爐故名香爐北有峯圓而童名鉢盂峯或曰肖東甌鴈蕩又名鴈蕩峯過鴈蕩而南時有白雲覆於谷者曰雪峯屹然人立者名玉女峯嶄嶄勢欲柱天者名天柱峯其他諸峯星聨肺附登名圖籍者葢七十有二焉復從崖東折度畧彴橋趨三學士院院唐靈黙禪師道塲師嘗降龍於此遺跡尚存由院北深入又百餘步至東潭潭上飛瀑可二十丈瀑怒暴倒擊崖竅中若運萬斛雪從天擲下白光閃閃奪人目睛至潭底輒復逆上有聲如輥雷人笑語咫尺不能辨猶聞甕中聲居人云毎天風一號四山林木震撼欲折黒雲下罩杳不知昏曉嵗旱禱龍者其多驗如西潭復北折而西泝潭之源登響鐵嶺度紫閬山村人多舍篁葦間有平皋數百畆可耕溉傍沿石河又行一里所地名石鼔足頓之鼕鼕嗚越十步至第一潭潭如井睨之正黒投以小石鏘若佩環又越十餘步至第二潭圓如錡釡面廣而底敞大水驅亂石聚其内迨滿復洩去潭下石壁百餘尺險不可寘足從其右懸藤墜下至第三潭潭甚深以線縋之下不見底其形方狹而長天向隂常有雲氣從中起疑有蛟龍潛其下人恒以幽悄為病第四潭咸不敢往㦯以綯圍腰繫巨杙俯崖而瞰潭左右皆楓木其形大槩如第二潭而廣袤倍之側有晉劉龍子墓相傳龍子嘗釣于潭得驪珠吞之化龍飛去後人為壘石作塚㦯云龍子之母塟焉世逺不可辨又其下至第五潭即東潭因其水五級故名之為洩云噫造物之委形山水者其竒峭有是哉尚節亭記劉基古人植卉木而有取義焉者豈徒為玩好而已故蘭取其芳諼草取其忘憂蓮取其出汙而不染不特卉木也佩以玉環以象坐右之器以欹㦯以之比徳而自勵㦯以之懲志而自警進徳修業於是乎有禆焉㑹稽黄中立好植竹取其節也故為亭竹間而名之曰尚節之亭以為讀書游藝之所澹乎無營乎外之心也予觀而喜之夫竹之為物柔體而虚中婉婉焉而不為風雨摧折者以其有節也至于涉寒暑䝉霜雪而柯不改葉不易色蒼蒼而不變有似乎臨大節而不可奪之君子信乎有諸中形於外為能踐其形也然則以節言竹復何以尚之哉世衰道微能以節立身者鮮矣中立抱材未用而早以節立志是誠有大過人者吾又安得不喜之哉夫節之時義大易備矣無庸外而求也草木之節實枝葉之所生氣之所聚筋脈所湊故得其中和則暢茂條達而為美植反之則為瞞為液為癭腫為樛屈而以害其生矣是故春夏秋冬之分至謂之節節者隂陽寒暑轉移之機也人道有變其節乃見其節也者人之所難處也於是乎有中焉故讓國大節也在泰伯則是在季子則非守死大節也在子思則宜在曽子則過必有義焉不可膠也擇之不精處之不當則不為暢茂條達而為瞞液癭腫樛屈矣不亦逺哉傳曰行前定則不困平居而講之他日處之裕如也然則中立之取諸竹以名其亭而又與吾徒遊豈茍然哉畏所記胡翰常山邑丞劉彦英嘗自溧水辟地抵吾婺數過從論學及領邑事又數於衢郡見之間語余曰吾於世無所取長自家庭子弟從師受學長而服官政隨牒四方恒若弗勝也弗逮也人以吾為畏焉吾念之固然計吾得者以畏也失者亦未必非畏也因名其室曰畏所願乞記於下執事余謝不敏今年聞余病且免歸其請益固迺作而言曰君子處天下之至約而不戚服天下之至賤而不愧履天下之至險遇天下之至變而不駭且亂中立而不倚内省而不疚惡乎畏也茍得志雖富且貴焉當大任於廟堂之上決大議於人主之前一言定國不變色而利澤加於民若舉而措之惡乎畏也吾聞之天體物而不遺人物之生日用之間莫非天命之流行念慮有一不誠焉言動有一非禮焉雖至隠至微也而人偽㕘之天命㡬乎息矣操舍之頃存亡之幾也敬怠之萌吉凶之辨也今君之畏詎不以是乎則吾知之矣以是而畏之唐虞三代之聖人猶兢兢業業孜孜慄慄翼翼亹亹不能一朝夕寧也書曰迪畏蹈而畏之也又曰寅畏敬而畏之也又曰抑畏謙而畏之也皆所以畏天也詩曰胡不相畏小人無所忌憚不知天者也不知天者不當為而為之知天者不當為而不為當為而不敢不為之故其畏也非恇怯也非委靡也又非有操切之者昊天曰旦與爾游衍昊天曰明與爾出王君子知之故無不畏仲尼著其三其致一也余與劉君皆學仲尼之學者而余恇怯委靡恒患不振竊觀於劉君方兵興時脫身危亡疾疫之中奉其母夫人以行厯數嵗而返于鄉閭髙年無恙不失人子之道一弟二子自為師友不廢義方之訓雖仕宦非其志也邑人親之官事不嚴而集其立心行已加於余矣在易之乾以惕無咎在震以恐致福君何失乎以君懐恐惕之心求免於戾則非也天下有任重道逺而賁育不與焉者吾於君之名室寧不重有警云青霞洞天游記道家所謂青霞洞天者世名爛柯山即晉王質觀奕棋處在今信安之興賢里余客信頗久非有吏事恒願游以乏同志不果今年夏六月七日龍泉章公三益求按郡乃㑹諸生出城南門輿行十里至武坪又數里渡沙步溪又出入篁篠中十餘里抵山之麓有寺曰寶巖觀曰仙集棟宇皆已剥陊日午熱甚道士具茗列坐久之湫隘猶民家耳道士除道遂循觀右拾級而上飛梁横亘通趾頂皆石蜷如蝃蝀其下劃然可居得地如坻者東西深百餘尺廣半之巨木蔽空公與諸生皆集飄風汎木葉虚徐漫衍後先不絶涼滿襟袖如坐碧雲蒼雪間求昔人之遺刻唐宋以来陸庶錢顗徐霖游鈞諸名輩往往可識其他漫漶雖欲識之不可得然惟庶碑最古侍者行酒數行已余與客吳思道旁絲石磴登山之脊出所坐梁石上四顧皆林阜溪流蛇行野中東南諸峯矗立蒼翠晻靄則紫微也最後公亦挾一童登之復坐縱談問道士故梅巖精舍所在莫有知者日且暮悵然有懐質與余皆東陽人書石曰閼逢執徐之嵗有晉樵者之里人胡翰入山與客六人共飲未醉輒去翰記香溪仁惠廟禱雨記洪武十有一年夏六月不雨環郡之邑厥田髙者釁拆下者剛燥陂澤既竭原泉不通稼日就槁農民告病郡邑修禱祀之禮籲天叩神㦯應㦯否而旱熯如故洎秋七月不雨農民告病益急從政者患之蘭溪距郡五十里其邑旱不為灾踰邑而西又二十五里為香溪入其疆則其澤之竭者演而注其土之焦者淖而沃田間芃芃皆美稼也余為愕且喜問諸父老皆曰先是固旱矣農告病矣賴吾司征之長吉安劉君思忠而免於歉乃六月己丑君率父老禱千里之偃王廟合百神而享之明日丙寅入蟠山禱于天津廟廟故有大神曰澤潤曰澤沛葢司龍者也迎而致之及途而雨越三日戊辰又大雨猶未洽也七月癸酉君露跣道上禱之益䖍明日甲戌神應之以雨越三日戊寅又大雨吾稼仰之以足靡不就實是則神之賜也君之貺也吾民戴之毎食恨不尸而祝焉余聞而愈愕劉君非有民社者曷為而及是哉既而過友人之門陳如圭氏吳徳璋氏皆曰誠如父老言然不唯寧是往年禱雨脫我於藴隆之毒亦惟君慺慺以將事吾懼無以報之則著為咏歌之辭而今又重䝉徳焉其感而應也灼有攸徴矣向使吾二人言之人孰信之使吾鄉人言之雖信而未必深也今先生幸辱臨兹土而寓目焉咨及下走走不敢隠懼余言不足以侈君之貺不於先生圖之而孰圖之先生茍不鄙夷得託諸文字庶其傳信矣乎余謝而退他日童良仲至郡則具其事以請春秋譏不閔雨而著喜雨善其有志於民也今郡邑猶古侯伯之國從政者孰不有志於民寧風旱逆時雨凡禮之所當為者悉致力焉而猶莫能致其所難必劉君一司征耳其職不過榷貨財督稅課取諸商賈之類與郡邑有民社者異矣顧不忍農人之無稼殫厥心而拯之天亦輒應之豈有他哉宇宙分事即吾分事昔江西陸子嘗有是言君固習聞之矣況其近者一視同仁而無間可也天之仁愛吾民恒欲厚其生不幸而丁斯之旱豈使之無孑遺哉故一夫致其格一鄉遂其育積誠之至則天心順成之矣余取鄉人之言論著君之美以見喜雨者能閔雨也不臨民而有志於民尤所善也此春秋之義是宜書之以告来者開先寺觀瀑布記王禕廬山南北瀑布以十數獨開先寺所見者最勝開先瀑布有二其一曰馬尾泉其一在馬尾泉東出自雙劍香爐兩峯間為尤勝㦯曰瀑水之源昔人未有窮之者㦯曰水出山絶頂衝激入深澗西入康王谷為水簾東出香爐峯則為瀑布也十一月十八日日南至余約郡守吕侯肩輿十數里至開先主僧志一作丈室未成邀坐茅屋中乃訪潄玉亭却至龍潭石峽口由寺至亭可二百步由亭至峽口僅數十步葢自逺觀之瀑布出自兩峰間如瀉天半由近而觀則二瀑下注匯為重潭潭水出石峽乃為溪循山足東流以入於彭蠡當峽口仰望但見水從潭中出巖谷回互二瀑所從来不可復見矣峽石上刻青玉峽及第一山字大二尺米芾書也石間多題名石粗字畫淺初不可悉辨命左右掬水沃之字乃見大率宋南渡後人其人無聞者居多可識者纔十二三因慨君子惟植節砥行乃可不朽茍不出此雖託名岩石未乆人不識也又從石壁間讀淳熙中郡守禱雨神龍示現事一公為余言嵗春夏交大雨後瀑水盛潭遽溢積葉墜梗皆蕩滌去不留謂之龍洗潭㦯嵗旱人来取水潭中禱龍神輒有應至今常然回坐亭阯上亭廢已乆亭下池亦為石所堙初寺僧作石霤接潭上引水至寺中給庖湢又鑿石作此池即蘇長公賦詩處也徑八九尺霤水從潭上来流入池乃從池中復入霤以去而石霤廢亦十五六予命一公葺之一辭力弗贍也明年三月廿六日雨初霽郡中又無事復約吳侯及通判羅從道幕賓徐君弼姬執中星子令葛俊徳游焉比抵寺諸公皆先詣一公余獨徑往潭下坐石上瀑水方怒瀉奔騰盪激聲震如萬雷令人心怖神悸股戰栗不休頃焉諸君至見余獨坐又顔色變皆拍手呼大笑然水聲􅐓洞呼笑聲亦不聞也寺僧云龍適洗潭矣於是一公丈室已完又作竹筧接石霤引水過階除下清駛極可愛余命取水煮新茗一公謂近從後巖下得泉一窪以煮茗味比瀑水乃倍佳試之果然暮乃回六月十日余被召將赴京念人世行止不可必萬一有他累則清游不復得因與郡人段謙曹元同泛過落星湖約得路之半舍舟以行一公與光應知余来逺出迎乃與二僧攜手行至招隠橋坐橋上橋在寺前五十步潭水為溪所經也其西東松杉楓杞蒼翠色掩映從樹底望鶴鳴諸峯髙出樹杪僅尺許隠然如畫圖中見又從樹隙見巖腰采薪人衣白大如栗初疑此白石耳有頃漸移動乃知是人也橋下流水觸石㶁㶁鳴塵慮俗想蕩滌殆盡久之不能去乃造一公所眎余其所賦詩又出楞伽經使予讀讀盡巻頗悟微㫖一二應公者戒行清峻略涉書史年且老不欲他走一公邀留與同處郡中亂後無讀書人可與語余因數與往来一公請予詣潭下是時久不雨瀑布流且絶余指筧中水謂曰此水一耳何必復往也是夕宿寺中夜半雨大作比曉余未起應扣門告曰瀑布流如故矣盍亟起觀之余欣然攬衣起倚䦨睇視良乆日初出紅光徑照香爐諸峯上諸峯紫靄猶未斂光景恍惚可玩不可言也應因誦李太白觀瀑詩又誦笑隠題太白觀瀑圖詩余笑曰安知今日無太白邪胡可謂古今人不相及也比午乃還一公間為余言開先者舊傳梁昭明太子之所棲隠南唐元宗在潛邸亦嘗讀書於此招隠橋其所造也後歸踐尊位乃即此造寺故以開先名有丫巖和尚者實開山宋以來住山者皆名徳寺前有松每株大數十圍佛印元禪師手所植近時南楚越公乃盡伐以建寺見者惜之而寺今亦為刼灰矣豈非數乎一之居此所願圖復其舊而適此大法陵遲有志未遂幸丈室茍完聊安餘息而已公尚丐我一言以記之吾之願耳余諾之未果為也游白鹿洞記余到郡已數月欲至白鹿洞甚渴左右為余言往時荆棘塞路不可往頃因伐大木往者衆路乃始通然路上虎縱横茍欲往非多擁騶從不可用是欲行輒復止㑹行省傳檄郡府取大木余因挾星子令及都昌主簿彭能領丁夫與同往去郡北行十五里至羅漢寺路分兩岐由東入棲賢谷西則至白鹿洞也比至兩山勢回合當其合處澗水出焉過澗逾小嶺嶺有缺若闗門然入闗路循澗北並山轉澗南皆良田也約二三里乃至書院遺址正當五老峯下書院燬已十五年樹生瓦礫間大且數圍前有石橋曰濯纓其左又有石橋曰枕流過枕流則從列女廟登北岡岡上有大杉木六七百年物也有司今盡伐為御殿物矣於是書院所存者獨此二橋從卒指殿堂齋廬及風泉雲壑樓故處以告甚厯厯慨想昔日規制不可見惟聞山鳥相呼鳴山谷間餘韵悠揚恍類絃歌聲㦯云從此右折東南逾重岡行二三里乃至所謂白鹿洞却從洞後復右折陟嶺乃可到尋真觀望水簾也不果往徘徊久之而還按白鹿洞唐李渤讀書處也南唐昇元中始即其地為學給田以食其徒所謂廬山國學也宋初天下未有學惟有四書院睢陽石皷岳麓及白鹿洞也太平興國二年嘗賜白鹿洞九經當時學者數百人至崇寧末乃盡廢及淳熙七年考亭朱文公為郡始斥其舊而大之又定為學規示學者来學者益衆而白鹿洞之盛出他書院右自後守其成規二百年如一日也而隳廢今乃如此余亦無如之何也余嘗恠世之為佛老氏之學者其宫室一廢壊輒修舉之不旋踵豈佛老氏之學能盛於儒者哉葢為其徒者有勤行之意堅持之操能必其成故也至於世儒習聖人之道常骫骳不自振不能以有為而聖人之道顧因委棄鬱塞而不得行嗚呼此其弊也非一日之積矣余於是葢重歎之也自建昌州還經行廬山下記八月余自京還九月以事行郡境二日泛左蠡揚瀾至都昌縣四日由都昌出彭蠡過飄搖沙宿蘆潭三日至建昌州七日回至蘆潭北風作逆風不可行八日復至建昌九日舍舟取陸而還是日宿徳安縣十日發徳安西北行三十里至廬山下訪湯泉湯泉在路南距山阯不半里甃石為池者五南一池極熱手不可探北四池水稍温人往往入其中浴然皆作硫黄臭余舊聞凡湯泉下必有硫黄惟驪山者乃是礬也礬毒石本草云性熱入水水不氷蠺食而肥䑕食而死也又數里過醉石觀陶靖節故居其地栗里也地屬星子縣而星子在晉為彭澤縣觀已廢惟有大石亘澗中石上隠然有人卧形相傳靖節醉即卧此石上也按史靖節為彭澤令督郵行縣吏白當束帶見之靖節不肯折腰小兒遂解官賦歸去来辭而歸義熙三年也是嵗劉裕實殺劉仲文將移晉祚陶氏世為晉臣義不事二姓故託為之辭以去若將以微罪行耳梁昭明謂恥復屈身異代要為得其心夫豈以一督郵為此悻悻乎靖節既歸益放情於酒人知其樂於酒而固莫窺其所以然也㦯云觀南諸山即其詩所謂悠然見南山者也其旁居民多陶姓云是靖節後又數里為簡寂觀觀亦不存簡寂者陸脩静諡慧逺法師之結白蓮社也同社者十八人陶靖節陸修静皆與焉逺公居東林在廬山北靖節修静嘗訪之東林之近有虎溪逺誓不過溪㦯過溪虎輒鳴及送二人不覺過虎溪皆大笑世故相傳為三笑圖㦯曰慧逺卒於晉義熙十二年丙辰年八十三修静殁於宋元徽五年丙辰年七十二丙辰相去六十載推而上之修静生義熙四年丁未慧逺亡時修静纔十嵗爾至宋元嘉末修静始来廬山時逺公亡且三十餘年矣安取所謂三笑乎㦯曰晉蓋有兩修静也自蘇長公作三笑圖賛而黄太史以此三人實之蒲傳正劉巨濟晁無咎之流皆有所述陳舜俞廬山記其說亦與太史同此其是非固未決者也又循山下西北行未至郡治二十里為歸宗寺在金輪峯下山勢方凝然忽石峯從山腰拔起如卓筆髙與山齊峯頂有設利塔俗呼為耶舍塔釋氏書云佛滅度後所遺設利八萬四千散在人世龍宫皆貯以金瓶寶篋建塔藏焉東晉時耶舍尊者自西域奉設利来八萬四千之一也於此建塔塔髙若干尺範鐵為之外包以石峯峭峻鐵石重人力不可施皆運神通力致之俗故呼為耶舍塔耶舍亦與逺公社嘗舉如意無言以示逺逺不悟即拂衣去是時禪學未入中國而兆則已此見矣耶舍之去逕上紫霄峯紫霄又在金輪東也寺相傳為右軍故宅有池水色黒曰墨池羲之之所洗墨也羲之嘗慕張芝臨池學書池水盡黒此為其故蹟豈信然邪今臨川郡城東有墨池南豐曽氏為記葢深疑之以謂方羲之之不可强以仕而嘗極東方出滄海以娱意於山水間豈其徜徉肆恣而又嘗自休於此邪余謂以彼之可疑則此之不足信非邪宋元豐間真淨文禪師住歸宗時濂溪周先生自南康歸老九江上黄太史以書勸先生與之游甚力以故先生數數至歸宗因結青松社若以踵白蓮社者又名寺左之溪曰鸞溪以儗虎溪其事為釋氏所傳世皆謂先生實傳聖賢千載不傳之統豈其有取於佛氏之徒而願從之㳺甚者又謂濂溪之學受於夀岩佛者此又厚誣吾先哲者也余以為不然大賢君子於其道既有得矣於其形迹未嘗以為累也況先生之髙致如光風霽月初無凝滯固奚必深辯之邪及淳熙中應菴華禪師繼主歸宗朱夫子時為郡亦嘗與之㳺華公葢臨濟正傳於大慧為適孫歸宗雖非巨刹以屢為名僧所居號天下歸宗今寺亦廢故基為樹所䝉蔽不可入予徘徊鸞溪上甚久日已暮遂復行數里宿開先寺明日乃還㳺棲賢院觀三峽橋記五老峯於廬山為西面即郡治北望峯如屏障蔽其後違郡治北行二十里轉五老東入巖谷中棲賢寺在焉余舊讀蘇次公棲賢寺僧堂記云棲賢谷中多大石岌嶪相向水行石間其聲如雷霆如千乗車行者振掉不能自持雖三峽之險不過也故其橋曰三峽度橋而東依山循水水平如白練横觸巨石匯為大車輪流轉洶湧窮水之變寺據其上游右倚石壁左俯流水石壁之趾僧堂在焉狂峯怪石翔舞於簷上毎大風雨至堂中之人疑將壓焉問于習廬山者曰雖兹山之勝棲賢葢以一二數矣又聞蘇長公云廬山竒勝處不可勝紀獨開先漱玉亭棲賢三峽橋為二勝棲賢寺於是廢已久殘僧數輩皆出居田間左蠡有僧曰惟賢頗通世間法余謀於府僚俾之住棲賢賢曰俟吾結屋山中完公當来游也七月望賢使来告曰屋幸完可游矣明日即偕吕侯暨葛君往時暑甚輿夫暍屢從道傍石坎中掬水飲至谷口日卓午矣未至橋十許步石巖下觀陸羽泉乃至橋上從橋上俯視澗底亡慮百千尺㦯云以瓶貯水五升許從瓶嘴中出水縷縷下注瓶竭水乃著澗底欲試之不果又云橋魯班造葢謂堅緻壯竒惟般乃能造耳非謂真造於般也距橋北十許丈有大石方整狀如棺横亘澗底相傳嘗有孽蛟從谷中出水怒湧勢將壊橋時主僧有道行叱神挽此石扼之蛟退橋得不壊過橋北轉行百許步澗水至是匯為深潭有龍蟄焉蘇長公詩所謂玉淵神龍近即指此也又相傳昔寺僧嘗浸甑潭上俄失所在後有人從湖南来云甑從洞庭湖上出甑上有棲賢字可驗故知此潭下通湖南也此其言皆誑誕不足信已乃徑造賢公新屋下法堂故趾也至是五老峯乃嶻然左出寺顧在峯後日方熾忽雲從谷中起俄頃雨已至有風南来雨復旋散日光穿雲斜照峰上巖谷石溼芒采相射宛然金芙蓉也賢公留余宿約明日謁赤眼禪師塔塔距寺北行又十許里巖谷深絶處也棲賢寺實禪師所創道場余辭與葛令先歸而吕侯乃獨留賢請余重書蘇次公僧堂記余謝不善書又欲余和長公詩余謝不工詩則題游山嵗月氏名遺之以附昔賢故事按次公以元豐三年夏六月来游時謫官往髙安而長公至此則七年六月時自黄移汝送子邁赴饒之徳興尉云明文衡巻二十九
