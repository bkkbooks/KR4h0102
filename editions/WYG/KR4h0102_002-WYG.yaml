body:
  text: 明文衡巻二明程敏政編賦奉制撰蟠桃核賦有序宋濂洪武乙卯夏五月丁丑上御端門召翰林詞臣出示巨桃半核葢元内庫所藏物也其長五寸廣四寸七分前刻西王母賜漢武桃及宣和殿十字塗以金中繪龜鶴雲氣之象後鐫庚子年甲申月丁酉日記其字如前之數亦以金飾之所謂庚子實宣和二年字頗疑祐陵所書既奉㫖撰賦垂誡方來臣濂謹按王母獻桃事詳見張華博物志第八巻史補類華言桃七枚大如彈丸遺帝五自食其二以今桃觀之且十倍于彈丸則其實之如斗可知矣豈華出於傳聞而想像載之歟抑其言足信而後之好事者假託傅㑹之歟不然漢武内傳所謂桃如鳬卵形圓而色青者又果何如歟復按蔡京所記尚方有王母蟠桃核頗鉅京嘗相祐陵其見與今相符事當可徵然則傳志所載誠有不可信者歟臣敢忘其固陋撰賦一篇俯伏丹陛以獻初則極其形容終則一歸於正其詞曰炎漢六葉實惟武皇闡坤符握乾綱祀汾陰建竹宫叶仁獸在郊赤芝薦房西海獻續弦之膠弱水來燕卵之香慶諸福之畢集思騎龍于帝鄉幸靈桃之入口傳僊種于下方想其瑤階露寒彤庭秋迥銀燭未掩畫屏斜映啟承華之祕殿盼瑤池而神騁忽王母兮遙臨託青鳥以傳命鬱佳氣之蔥蘢覿芳姿之妍靚於是玳席初延霞觴屢傳蘭辭吐兮襲人縹袂舉兮高騫紫雲之輜軿暫駐九微之燈火猶然乃啟錦幪乃濯翠籩乃出桃實獻于帝前味甘醇而如醴色含腴以不乾鸞刀割蜜神液流泉上滋華池身輕欲仙將懐核而種之斸上林之寒烟王母微笑塵世易遷儻花實之並見嵗屢閲于三千唯紫府之列眞視滄海於桑田彼窺烏牖之小兒尚奚測夫幽𤣥斯核也匪鑄而成非陶而凝藉五行之亭毒資六氣以流形鄙瓠犀之脆薄並玉質之堅貞爪之不入叩則有聲知何年之中析存半璧之晶熒俯貼金盤巢蓮之龜藏六仰承玉露常滿之桮弗傾鋭首聳兮尖岑豐下橢吐火切狹長也兮墜星衆皺蹙背文之籀一窪暈面色之赬荷盤欲展蚌甲未扄藏仁之跡猶在含肌之罅如生函肉好之隱約圍合線之交層龜鶴軒翥兮顯象寳章絢爛兮金明鳯卣鸞彛同藏眞於天府星形月魄挾灝氣於蓬瀛嗟夫自昔僊靈惚恍難慿出無入有變幻莫停橘類盎兮巴園棗如𤓰兮漢庭恣燕齊之方士騁詭辨之奔騰瞻雲路之咫尺恨凡骨之難登以雄才之蓋世甘昏溺而不醒至若建章月淡甘泉風泠銅莖中峙僊掌高擎望飊輪兮不來徒馳情於窈㝠苦白日之易短兮竟莫制於頽齡核雖存而人則逝兮悲秋風於茂陵矧宣和之繼軌兮慕鼎湖之龍升託青華之帝子設神霄之𤣥稱何殷鑒之不逺踵覆轍其相仍天啓皇明眞人龍興順堪輿之大化調隂陽之至精道德行兮即龍虎之丹顯忠信昭兮勝鉛汞之功𢎞以九州為仁夀之域儕兆民於喬松之朋神機流浹太和薫蒸指佞人兮草生屈軼齊氣朔兮階秀堯蓂視區區之遺核初何繫乎重輕此所以革徃古之荒唐法唐虞以作程也誶曰桃有核兮大逾掌歴千齡兮多惚恍嘅靈僊兮勞夢思誰見崑丘兮紫芝長眞人出兮海㝢寧禮樂為冠兮仁義作纓簫韶九成兮鳯凰鳴青鳥不敢徠兮幻說清千秋萬歳兮永長生竊記徽宗夲紀宣和元年己亥二月庚辰改元遂易宣和殿為保和殿至四年壬寅夏四月丙午詔録三館書置宣和殿及太清樓秘閣始重稱宣和今核上之字刻于二年庚子之甲申月乃不書保和而猶襲宣和之名此固不可不疑况丁酉日屬庚子歳癸未月之終今復𨽻之於甲申月之首尤有不可得而致詰者頗意此核非漢武時物字亦非宋祐陵所書雜書所載海外之國多大桃雖不可盡信或者得其遺核特依倣而託之者歟然濓年已邁舊學皆廢忘未必其言之足徴也姑書之於此以俟後之君子云少梅賦胡翰少梅者以其抽毫象物託意於梅而命之也余為之賦則屈子所謂置以為像者云夫何一嘉植兮忽肖儀而孰主解余衣以盤薄兮馳余思乎瑶之圃若有人兮獨立乎千古冰為䰟兮玉雪其度澹遺世以消揺兮負姱節而不可㧞恍頩然而一見兮若經年之逺别散縞衣於空明兮駕蜚龍以超忽情惝怳以揺曵兮氣漫汗而揮霍歘雲蒸而飈厲兮紛又繼之雨雹撫陽關與喬如兮齊造化於一指驚建木之既椔兮眷瑶華其何異靚㛹娟而淩波兮浩綽約乎崇阿向北風而含韵兮承南服之沖和春渺𣺌兮何其望美人兮天一涯折芳馨兮延佇將以遺兮所思大化不停兮細入無垠高下散殊兮其機孔神服貞白以自嘉兮今胡為此滋垢也豈隨時而變化兮懼夫人之逐臭也豫章不辨兮樗中繩墨棄厥箘簵兮矢蓬以為直憫衆芳之蕪穢兮天肅殺以戒寒竊獨揆其中情兮豈云異夫荃蘭何靈均之好脩兮結珮纕而弗睇吾將斂而就實兮和商鼎以進帝嗚呼朂哉兮保兹令美世莫諒其眞兮尚識其似弔台哈布哈元帥賦劉基世有作忠以致怨兮曽不知其故然懐先生之耿介兮遭時命之可憐上廱蔽而不昭兮下貪婪而不貞權不能以自制兮謀不能以獨成進欲陳而無階兮退欲徃而無路忠沉沉而不白兮心揺揺而不固縶乗黄服鼓車兮驂蹇驢以曵之罥猛虎于籠檻兮狐狸羣而制之衆刻木之枉直兮信讒邪之流言倒裳以為衣兮湼素以為𤣥前宕㝠令指途兮驅離婁使從之敎養由以彎弧兮繫其肘而引之吁嗟先生兮何逢時之不辰生不能遂其心兮死又抑而不伸姦何為而可長兮忠何為而可尤尸比干而奬惡來兮白日為之昧幽重曰嗚呼哀哉吾安歸乎猰㺄升堂兮騶虞以為妖殪鳯凰而斮麒麟兮縻梁肉以飬梟吠狗遭烹兮捕猫蒙􅊽雄雞晨鳴兮衆以為罪忠固不求人知兮於先生其何傷國有忠而不知兮喟皇天之不祥亂曰莽莽崇丘間無人兮天高聽遐疏不得親兮松栢摧折荆棘長兮苦干菉葹充佩纕兮浮雲雌蜺紛縱横兮上下阻隔幽不能明兮嗟若先生卒罹殃兮姦邪矯枉歸罪愆兮臯陶不作誰與平兮跖犬噬由理則然兮麒麟豺狼不同羣兮自古有之吾又何嗟乎伐寄生賦有序余山居樹羣木嘉果駢植人事錯迕斤斧不脩野鳥棲息糞其上茁異類日夕滋長舊夲就悴余覩而悲之乃募趫㨗腰斧鑿升其顛剜條剔根聚其遺而燔之於是老榦挺立新荑濯如若瘡瘍脫身大姦去國斧鉞之時用大矣哉作伐寄生賦天生五材兮資土而成汝獨何為兮附麗以生疣贅蛭嘬兮枝牽蔓縈瘠人以肥已兮偷以長榮狀似小人之竊據兮謂城社之可憑觀其陰不庇物材匪中器華不羞于几筵實不諧于五味來鳥烏之哤䀨集蟲豸以刺蚝果被之而實萎卉蒙之而本悴壇杏無所容其芬芳甘棠曷能成其蔽芾亶無庸而有害矧眶睫之可置爾乃建修竿升木末運斤生風以翦以伐脱纏牽于喬竦落纖蕤之騷屑剜蘚膚以除根斆去毒而刮骨于是巨蠧既夷新荑載蕃迎春而碧葉雲滃望秋而碩果星繁信知斧鉞之神用寧能裕蠱以生患也邪嗟夫農植嘉糓惡草是芟物猶如此人何以堪獨不聞三桓競爽魯君如寄田氏厚施姜陳易位大賈入秦伯翳以亡園謀既售芊化為黄蠧憑木以槁木姦憑國以盜國鬼居肓而人殞梟寄巢而母食堅冰戒乎履霜羸豕防其躅躑諒前轍之昭昭何人心之自惑故曰非其種者鋤而去之信斯言之可則葯房賦王褘浦陽鄭仲舒讀書之室曰葯房友人王褘為之賦葢美其好尚之修潔又以寓吾思慕之意云辭曰夫何美人之練要兮謇好修以為常既昭質之弗虧兮又姱節之孔彰爰託物以自表兮曰清修之是將滋幽蘭而樹蕙兮蘭為佩而蕙為纕搴薜茘以為衣兮集芙蓉以為裳既所服之孔修兮粲芬芬其文章所處欲其芳華兮又申之以葯房何斯房之結構兮獨以葯而為之薦芳馨之菲菲兮絢繁飾以陸離文杏煥以成梁兮琢辛夷而為楣橑木蘭之差差兮梲文藻其紛披繚疏牖以杜衡兮扈素壁以江離桂樹鬱其當軒兮陰團團而成帷敶百草為庭實兮肆把玩乎瓊枝襲芸編以總總兮縆空桑之朱絲餐繁英與落蕋兮飲沆瀣以自怡澹逍遙以容與兮聊棲遲而偃仰撫榮華之未艾兮睠兹葯以自况維葯之澤兮所以示昭質之匪飾也維葯之馨兮所以表姱節之不忒也朝夕處乎斯房兮信修潔之不忘茍所好之絶俗兮人不知其何傷方世俗之溷濁兮糅薫蕕而莫質蕭艾蔽乎中野兮菉葹薆其盈室彼惡榝果何物兮亦雜然而充幃衆舎是而尚非兮孰于芳其能祗何美人之耿介兮乃獨為此度也夫豈傲世以自異兮亦惟好修之故也委厥美以自棄兮固非其心之所安也使矯名而無實兮又胡若是拳拳也顧予生之侘傺兮曽靡求乎安處塊獨守此敝廬兮蓬蒿紛其環堵雖凝塵之滿席兮情晏然猶沖豫外物一無所徇兮曰惟徳之為馨冀和順之中積兮致英華之外形徒潔白以自表兮媿非予之所能既好尚有不同兮又孰揆予之中情幸美人之嬋娟兮夙與予其目成欲相仍乎斯房兮恐莫堅乎芳盟命靈氛為予筳篿兮靈氛告予以吉占曰外好雖不同兮實中情之可堅聞斯語以邑鬱兮恐佳期之遲暮思美人而未見兮悵盤桓而延竚將何物以結言兮恨衆芳之巳萎采芳洲之杜若兮聊遺予之所思願相從而相羊兮終歳晏以為期慮誓言之未固兮結微情以成詞南歸賦梁寅感陽春之方殷兮發孤旅之遐思出都門以曠望兮具舟楫而南歸廼廻瞻於帝居兮薄中天之虹霓像紫宮以嶕嶢兮貫黄道以逶迤壯麒麟之兀兀兮聳天禄之巍巍吾固樂金門之髙歩兮願叅白虎之羣議顧年邁而力罷兮廼形瘵而心怠麋鹿藏於深林兮鳯鸞集夫熈世審物情之既異兮君子盍量其才器虞德隆兮三禮明漢業建兮朝儀興煌煌乎大明之盛典兮爰稽式而告成延搢紳以博諏兮蒐巖穴而旁徴慙齊竽之濫列兮愧趙鐸之希聲承賜金之渥恩兮荷錫服之殊榮詔許歸而佚老兮循初服以紓情朝發櫂於龍灣兮夕余憇夫采石歴曲洲之坡陀兮臨廣隰之洳澤雨浪浪而驟響兮雲黕黕而凝色神魚驤其頒首兮旋鴻馳其迅翼嗟吾行之猶滯兮望匡廬而不迫昔余之棲壑兮固安夫寥闃也犯波濤以徃還兮今何為而役役也吕望之漁釣兮樹興王之績也寗戚之飯牛兮竟以相國也吾誠不及古之人兮寧守夫窮獨之節也金以利而為劍兮木以直而為楹在冶忌夫踴躍兮在山焉能以自呈賢願進而效用兮愚思退而全名或違道以干譽兮寧身困而心亨謂斯言之匪忱兮指江水以為正亂曰楚山磝磝雲溶溶兮返吾故廬不悲不逢兮羞彼齪齪釋忡忡兮涵泳聖澤希淳風兮懐空谷之賢兮賦白駒而從之底柱賦唐肅按底柱在冀州大河中流禹導河自積石至于龍門南至于華隂又東至于底柱然後至孟津逾洛汭而復北折焉蓋河自龍門既決以來奔騰迅快勢不可遏至是而齟齬之乃分為四流貫于三門之下然後力殺而行緩故酈氏水經謂底柱與龍門皆禹所疏鑿也昔蘇子瞻賦灩澦堆以為蜀江㑹百水而至于䕫瀰漫溔瀚横放大野而峽之小大曾不其什一茍無是堆則瞿唐之險當不啻此予謂底柱之功亦有類於灩澦者故述而賦之賦曰黄河之流西來數千里兮貫長城而南馳激龍門之險阨兮霆奔電馳氣洶湧而莫支歴華隂而徑趨兮乃折流而東下勢若萬騎銜枚而疾走兮將悉鋒盡銳鏖戰於平野何底柱之崔巍崒嵂兮獨凝立乎中流儼一夫之當關兮强兵悍卒睥睨退縮不敢運其戈矛惟崈伯子之敷土兮導洚洞而平之鑿兹山以疏洩兮剖三門之嶔巇然後洪波巨浪齟齬而不騁兮分流析派間度以逶迤指孟津而逾洛汭兮遂東極于大邳茍非是以中梗兮曷以殺天呉水伯之淫威予嘗駕方舟而逺求古蹟兮誓將豁心胸於浩蕩過黄老之神祠兮遡蝦石之泱瀁睇連天之修楹兮干雲霄而直上濁波汩汩包其下兮顯神功於俯仰使昔懐襄之莫救兮滙四海為一區上巢下窟之赤子兮殆皆戢以為魚覽斯險而嘅嘆兮雖天造而地設微𤣥聖之大智兮孰能成夫萬世之烈彼蜀江之灩澦兮羌地勢之所同誦金聲於瞻叟兮信物理安危之所從噫吁􅐵世道降兮風移而俗媮頽波汗漫兮忘剛而茹柔魚蝦鼓舞兮蛟龍鬰愁豈無吾人之底柱兮障百川之横流大韶賦幷序貝瓊傳曰堯作大章舜作大韶韶繼也言舜能繼紹堯之德也周禮曰大韶禹樂名也言禹能大堯舜之德也前乎舜者堯非不繼嚳也後乎堯者禹非不繼舜也特於舜言繼者法成乎堯也在嚳之時法猶未成堯雖繼之而可繼之事未備舜恊于帝在舜之時功為已協禹雖繼之不足為難矣則可繼之善善繼之功唯舜獨也是韶為舜之樂無疑季札觀樂見舞箾韶者曰德至矣盛矣如天之無不覆幬如地之無不持載雖甚盛德蔑以加矣後孔子學之於齊三月不知肉味曰不圖為樂之至於斯也蓋知樂之盡善盡美莫過於韶宜當時之感召丹朱在位羣后德讓祖考來格鳥獸蹌蹌鳯凰來儀也然非舜之德致和於上䕫之樂召和於下何以臻此哉故述而為賦不徒極其聲音之美而且本之舜之德云賦曰有東吳公子北走齊魯之疆觀于嶧山而見孔林之主人焉主人曰公子之逰也亦將有所睹乎曰無也生於震澤三泖之上僻陋寡聞竊慕禮樂之事而六律七均之制嘗䆒心乆矣願有請於大人先生焉主人曰嘻吳㑹東南之天府而天下之善音萃焉然公子猶有所未足者豈將厭澹泊而說鏗鏘乎必將挾陳娥攜趙女擪鵾絃考鼉鼓若是以為樂乎公子懣然不悅曰霓裳之曲唐之所以播越也廣陵之散晉之所以分裂也固不足言矣若此者又淫蕩之樂無異紂之靡靡以亡其國者豈君子之所樂乎願聞其他主人曰七德之歌七德之舞太宗之肇王業也亦嘗聞之乎曰伯者之事子孫無所法焉曰漢祖蹴嬴龍飛沛中置酒層臺悲歌大風造基四百光啓西東若是何如公子曰猶有伯心之存也駁而未純然亦一世之雄乎請言其上主人曰抑聞武之六成乎武之濟河而西也馬散弗乗牛散弗服倒載干戈包以虎皮天下知其寢兵不用也爰作武以象功焉鼔以戒衆乆然後戰也長歌連延起其慕也發揚蹈厲時不可失也故一成北出再成滅商三成自北而南四成南國是疆五成分左右以居周召六成復始而為天下王振鐸夾舞秉戈鷹揚若是何如公子曰其容美矣此武事也未盡善也請言其上主人曰其惟舜之大韶乎當夫六府治三事和叙九功形九歌嶧陽之桐可以琢琴瑟焉雲夣之篠可以竅管籥焉泗濵之石可以礱而為磬焉荆山之金可以範而為鏞焉八音既具而大體短脰之屬有力而不能走者以之為鐘簴焉小體騫腹聲清而逺聞者以之為磬簴焉其作也控以合之其終也揭以止之洪者鏗而充清者磬而介悽切而不流泛濫而可㑹當夫朝廷之燕享宗廟之祭祀於是而奏焉升歌在上匏竹在下代作間奏秩秩有序或擊或戛或拊或搏清亮而髙逺象乎天之渾淪廣厚而含容象乎地之磅礴一變一通兮四時之終始一散一潤兮風雨之回合是時也熈熈然八荒一春皡皡乎洪荒太朴格三苗於洞庭丹朱賔而有恪俯而聆之純如辛甘之相濟皦如有倫而莫敓詘如斷玉之復續繹如驪珠之碎落飛流合而萬壑雷轉清風生而天籟交作吟九囦之老龍唳九臯之𤣥鶴既么妙而悠揚亦和平而澹泊無急微以感其憂無嘽諧以感其樂其動於物也容何為而肅若神何為而來思獸何為而舞於土階鳯何為而翔於茅茨明協乎大章博儗乎咸池所以保無窮之治以示安而不忘乎危也悼六龍之南巡歴蒼梧而上九疑阿母之玉琯猶在湘靈之錦瑟空悲悵遺聲之寂寂呌有虞兮逺而然而齊之有韶陳亡而流於兹也海外之有韶聖人之化播於蠻夷也宜季札觀之而知德仲尼學之而忘味彼武之六極於隂特著其武功此韶之九極於陽實昭其文治也公子以為何如公子廼避席而謝曰至矣盡矣不可以有加矣主人曰未也請授以九德之歌其一洪流横曰𤣥黄判風氣開洪流横民乃灾五行汩帝為哀禹治之啓始孩決九川平九垓百榖生田毎每其二洪流殺曰洪流殺兮民灾既除山有鳥獸兮川有魚爰可食兮可居胥樂且歌兮毋忘厥初其三三苖格曰惟聖亶聰撫有九圍蠢蠢三苗險阻是依出師于南奮我帝威我師既還苗亦來歸其四四凶黜曰德與刑兮國之經四凶斥焉八元在庭帝無為四海寧其五正德之歌曰惟天降命物必有則民之瞢瞢胡乃自賊五敎不行彝倫攸斁聖人龍飛四方之極其六利用之歌曰水既平兮别九州下為隰兮高為丘徒則軒兮渉則舟以羨濟乏兮百貨流財孔阜兮樂且無憂其七厚生之歌曰下民孔艱兮遭墊溺寒我衣兮飢我食我無民違兮父母職其八鳯凰來儀曰堯不德兮舜不辭授以天下萬物治寒暑無易風雨時簫韶九奏朱鳯儀其九萬世賴曰天覆地載高廣莫測孰叅賛是俾衣而食帝治天下如埏如埴萬世頼之安知其力公子曰嗚呼禮廢樂崩幾千秋矣而始聞主人之宏論乃復為之歌曰雅南巳亡兮流盪曷正觱栗雷怒兮空桑無聲緑綺不陳兮薦檀槽與􅌙箏妖倡為妍兮嘯鸞鵠而啼燕鶯孰䆒夫大韶之盡善盡美兮實嫓夫六英六莖後千載之聖人兮集厥大成安得聞九奏於清都兮御天風而上征石經賦并序貝瓊五經載道之器也秦燒詩書經燬而道自若也漢求壊爛之餘書禮樂巳殘缺十九惟易以卜筮存詩以絃歌存春秋以口授存而俗儒章句之徒傅㑹穿鑿使五經大義不明於天下不亦悲夫靈帝熹平四年議郎蔡邕與堂谿典楊賜馬日磾張馴韓説單颺等求定六經文字詔許之邕乃書丹于石命工刻之立于太學門外時四方摹者日以千計然未知道之所存也特以邕之書耳洎唐文宗時高重為國子祭酒與鄭覃復刋定九經于石嗚呼漢唐石經已風摧雨剥於數百年之乆與岐陽之鼔嶧山之碑同一榛莽巳因推衍其凡以為之賦云賦曰繄聖作而明述兮尼父集夫大成歴四海其遑遑兮威鳯瘖而不鳴吁嗟時之終否兮託空言以載道世莫知余奚恤兮閱萬世其杲杲嬴既暴而不德兮舉六籍而火之薄先王之仁義兮尚法律而為治悲租龍之鮑腥兮阬亦湮而無烟易幸存於卜筮兮詩亦肄於筦絃春秋閟而不出兮禮樂佚而不全科斗螙於壁中兮光白虹之射天嬴遂僨而劉王兮家六合而寧謐乃偃革而為軒兮掇壊爛於十一洎六葉而遘武兮炳大明之當中黜百家之肴亂兮一道術而異同易科斗而為𨽻兮復家藏而人誦道固不可泯兮亦何待夫汗牛而充棟時既降而道晦兮經尋滅而莫收割申勸之或舛兮衆咸失於校讐屬熹平之四祀兮帝孝靈之當宁正俗儒之穿鑿兮偉中郎之博古辨魯魚與亥豕兮刻南山之堅珉巍乎四十有六兮樹翼翼之成均鈎鐵畫之屈强兮妙骨氣之洞達非餓𨽻之羸形兮非寒巖之枯枿非醉草之欹斜兮非劍舞之渾脱初崩雲之恍恍兮粲列宿之離離鸞振翼以夭矯兮樹交枝以參差鷙鳥􅑷以乍飛兮羣鵞逰而戲海彼鶴頭與隼尾兮曽何足以為態㨗奔泉之渴驥兮縱入草之驚蛇勢或埒於墜石兮體已悟於畫沙觀者紛其堵立兮車連連其日至豈八法之是尚兮幸經存而不墜陋石鼓之苔剥兮鄙漆書之土瘞觀竒陽而偶隂兮窮太極於有無感堯湯之禪放兮求厥中於典謨何二南之和平兮悲雅變而闕如儀三千與三百兮伊朝夕之攸執何曲折而精微兮謹一出而一入嗟聖人之憂世兮徒感麟而掩泣二百四十二年之筆削兮善既勸而奸戢還大權于天王兮亦綱常之攸立夫何經之徒存兮昧古訓之時式痛賣官而列肆兮盛後宫之傾國奄豎黨以盤錯兮又孰恤乎社稷九州裂而無統兮黎庻化而為豺經雖鐫而何補兮政與道而相􅆾逮有唐之文宗兮乃繼漢而有作礱巨石之嶄嶄兮列廣庭之落落吁回首其幾何兮悉風摧而雨剥文斷缺而莫辨兮委荆棘之漠漠吾恐為沉犀於蜀門兮同刻鯨於昆池曾不若慶雲與松風兮託艮岳而效竒又焉得紀功千載兮擬岣嶁之禹碑誶曰已焉哉石經泐兮剡藤出書連車兮布萬國撫遺墨兮相得失道之存兮昭白日廣寒宮賦汪仲魯按唐逸史異聞録所載明皇逰廣寒宫事語多不同然皆怪誕不經之辭也惟廣寒宫之所以得名則有可推者蓋日陽精也主乎離月隂精也位乎坎日月運行而寒暑生焉則是月也者以其配坎生寒而得名也歟世言嫦娥居之者豈亦以隂柔為陽剛之配故有是説猶乾父坤母之義也歟故託為素娥之辭作廣寒宫賦夫何素娥之嬋娟兮爰託身於廣寒質團團而外融兮心熒熒而内安念兹宮獨𢎞敞兮匪刻桷與丹楹瓦青雲而上覆兮棟虹蜺而中横靈星外峙兮泰階前平井木東植兮兊金鏤甍爛璧奎以交映兮垣墉周乎列星豈工師之巧思兮惟太一之𤣥精虛豁洞逹兮晃朗穹窿照耀無方兮髙明有容規天以為度兮環海以為疆炯素肌之􅂱􅂱兮播下土而流光羌獨處此中宮兮感四時之代序含柔姿藴靈德兮朝晦藏而宵睹朒朓警而朏魄充兮識盈虛之有數驚爽籟之潛發兮向清飈以延佇露方瀼瀼呈白兮霜又凄其盈宇盼圓靈既雪凝兮顧柔祗復冰積甚冷光以無眠兮含翠輝而欲滴何黙黙而靡言兮悼羣類之生生粤陽明之和煦兮匪隂静其焉成志專專而靡他兮物巳遂而居貞豈宮居而孤歎兮不貎飾而情更憕長位兹北坎兮配離麗之明明彼兔蟾與桂樹兮固無取乎此也杵玉臼之𤣥霜兮孰謂長生而不死也羿妃竊藥上逃兮既怪謬而匪經唐皇託以夜逰兮誕惟欺夫童㝠倘極一理於天人兮信吾廣寒之有徴辭曰日月運行寒暑生兮一寒一暑歳功成兮配日惟月秉隂靈兮厥靈伊何匹妃惟貞兮父乾母坤柔順以承兮位坎處中厥宮實名兮内守不渝藴𤣥之精兮洞濟六合德耀斯宏兮嚴凛姿容夜煜秋凝兮猗歟廣寒懸象著明兮弔虞城賦王翰春秋僖公二年書虞師晉師滅下陽五年書晉人執虞公以貪賄為首惡亡德不與滅也自有宇宙來黷貨而無厭背親而棄義挾勢以陵人者無不取其滅亡者也予典教平陸親履故墟徬徨而不能去悼荀息之詐諼傷宮之竒之忠諫百里奚之明見也賦以弔之辭曰繄虞郭肇封兮實皇姫之同宗桓莊之懿親兮匪執道之不恭彼詭諸之蠶食兮魏耿霍以從庸實以啗虞兮其狙尤羞也舉下陽之有言兮南鄙之仇也襲虞而刧君兮盜賊之尤也虞公而棄民兮惟鬼神之是託冒賄以迷惑兮曽不恤而顧噱杜忠諌而不省兮且媚強以擠弱奉玉馬而俘獻兮未聞媵秦而錯愕井伯仇而黙黙兮惛懜之靡也宮之竒欵實兮知國之不可倚也五羖先事而逺逝兮禍不可得而止也貪貨而樂亡兮寧死而不知與強而滅人兮適足以自夷𤣥聖誅徃兮為來者監兹亂曰流潦淫兮舊道改深隍平兮故城壊索顛軨而不知其處兮悵郭門之安在鳥獸悲兮斜日墜穢草滿兮溝塗横潰悼古以攄辭兮弔西風於一酹閒田賦條山之陽黄河之傍灌莽極目獸駭鳥翔畎􅀈縱横以逺際溝塗陂陁以衍長經界宛其未改廬井巳不可得而詳問平髙之耆老乃知古虞君之故邦及芮伯爭而未決質成於文王者也嗚呼姬周之造跡自后稷之建邦公劉之啓土古公著撫民之庸王季號勤王之祖至翼翼之文王得奔奏禦侮之賢輔三天下而有二猶臣服商受而遵王之所也傷漢儒之鄙陋議圖䜟以厚誣以虞芮質成而被化為周始稱王而受符以區區之陋邦覩至德於須臾來四十國之臣妾如父召而子俞文王之受命固定于虞芮之質成若尊號改元斯盛德之所必無也嗚呼天有昭昭之明無諄諄之敎視其命之去就在人心之惡好茍處時而得中何必丹書朱雀而為符告也眺荒原之茫茫撫徃事而增悼追淳風之不反傷衰世之末造誦綿詩而永嘆為執筆以三呌離譖賦楊士竒余讀揭文安公所為幽憂賦為其友辨謗累數百言既恐不能白於前又恐不能信於後揭文安公眞盛德哉今之被謗類是者未聞有一人如文安公者為之辨古今相去豈逺邪非其知之者寡歟為賦以解之離譖毁之横發兮志沈鬰而弗宣指厥行為淫僻兮余憤惋以代言惟弱操其好脩兮穆員冠而履方被赬霞以為衣兮攬素霓以為裳援古人之髙駕兮將馳騁乎雲之路豈發軔猶未遥兮遽捐矩而改錯襲仁智以自重兮乃承謗而逢尤肆腥膻其酷烈兮又何有乎杜蘅與江蘺相梧桐之挺特兮鳯凰翽而來止既鄙薄又不潔兮謂伯夷之所以紛讒口之嫉妬兮羌惟聽而不味也固衆人所一情兮謂夫人亦不異也彼自好猶弗珍兮實譖人乎奚疑曰忠貞不可忱兮何貪婪而又不惑言倡一而和百兮明智孰諒其允臧告曾參且殺人兮毌猶忡惕而惶惶傷白黒之混一兮竟莫察乎其故旦怳怳以亘暮兮夕營營以連曙重曰世夢夢既不顯兮又曷冤結而煩情上白日何皎皎兮庻幾猶鍳乎中誠槩發辭其不衷兮揆於余又何有愆言申申以騁媚兮終不䆒而寤旃昔人有明訓兮止謗曰無校曠來日其悠逺兮庻秒忽兮猶覺閔志賦黄淮閔予生之多故兮羌不知其所從肆遐搜而隱索兮究微末之始終繄髫年之向茂兮即有志於聞道呻佔畢而事鉛槧兮夫既從吾之所好奮侯頖而躋璧雍兮謂青雲平歩而可登探蟾窟以擢桂兮翼黄鵠而驂鯤鵬振璚琚于天衢兮與䕫龍而接武集鳯池而上玉堂兮曾衮職之莫補仰繼明之垂照兮荷眷遇於日隆賚予紛其駢蕃兮實千載之竒逢誓輸忱而瀝膽兮覬圖報於涓滴嗟夙志之未酬兮遽速釁而罹辟懐兢惕而内省兮豈持操之靡常也何弗良于行兮致顛躓之我戕也駕指南而之河朔兮遐不虞其所届結蘭茝以泛溟渤兮亦㒺知其攸濟聞德音之煥頒兮咸鼓腹而興歌溉涸鮒之枯竭兮猶未沐乎恩波意休復之有方兮契我龜而燋之招巫咸使考卜兮或開予而導之謂陽舒隂慘兮皆至仁之流形彼困心衡慮兮庸玉汝於有成亮食兆之告吉兮亦昭昭其孔彰也時賢哲之遺訓兮將何脩而允臧也重曰孰始而張繄帝力兮孰後而遏自貽戚兮處困而亨致命以為則兮噫嘻小子庻其無斁兮述夢賦胡儼登髙樓之崔嵬兮軼氛埃於層霄天宇廓其洞虚兮際空明於泬寥綺窻朱綴紛玲瓏兮風肅肅而下飄覩眞人於玉臺兮乘彩鳯而逍遥披太霞而進謁兮蹙然閔余之瘠磽啓靈文而欲授兮顧塵昏之未銷既食余以麟脯兮又飲之以醇醪琴高鼓以清瑟兮飛瓊汎其雲璈邀王喬而宿之兮吹參差於鳯匏何處子之綽約兮姱脩眉而峨翠翹肅斂容而不敢訊兮歘淩風而高超余惝怳莫知所之兮王子導余以逰遨挾光景以淩厲兮薄星辰而上朝撫扶桑之東枝兮擥若木之髙標駭神鼇之贔屭兮天吳出而舞潮方逰鯤之擊水兮儵鵬翼而扶揺振余袂於千仭兮晞余髮乎陽喬升崑崙而餐玉英兮𣺌瑶水之蕩潏金堂闃其無人兮悲蟠桃之不實駕青虬而高馳兮過方諸而一息珠宮貝闕嵳峩兮䕃玉樹而蕭瑟接飛僊之冉冉兮嘅弱流之無極盧生去而不返兮海若誇於河伯陋夸父之不知止兮哀愚公之又惑召荼壘於度索兮截雄虺之九首擲封狐於萬里兮顧䕫魈乎何有命庚辰於淮涘兮紲支祁於龜山猰㺄殪于青丘兮檮杌逐乎荆蠻豺虎深藏而遁跡兮蛟螭匿蟠乎重淵攬余轡以儃佪兮飄然遊乎瑶之圃歩春臺以夷猶兮覩鈞天之萬舞幸余逢此休嘉兮内欣欣而和煦羌回車以復路兮順凱風而曾舉山窅窅而雲㝠㝠兮佳木秀而承宇紛紅蘭於廣術兮喜芳菲其襲予怳然乎歸來兮惟覺時之寢處寄遐思於寥廓兮玩孤芳而容與北京賦李時勉惟皇明之受天命也我太祖皇帝首仗義師以平暴亂豪傑景從聲振江漢削除僭竊拯民塗炭定鼎金陵撫綏萬邦乃睠兹土實雄朔方倣成周之卜洛欲竝建而未遑逮我聖上繼明重光握乾御極一遵舊章仁聲洋溢乎遐邇恩澤汪濊於八荒既致治於太平遵皇衢以省方仰先志之未遂度𢎞規以作京羌經營之伊始徧諸夏其懽騰曰惟北都在冀之域右挾太行左據碣石背疊險兮重關面平原兮廣澤宗恒嶽其巍巍鎮醫閭而奕奕冠九州之形勝實為天府之國是以軒轅邑之以分州唐堯階之以為帝擴神化以宜民大勲德之光被鬰王氣之所鍾于今兹而有待也於是仰瞻析木俯測地靈龜筮兆吉天人叶應神祇獻珍而山石自出河嶽效靈而神木自行民子來兮相續期不日而功成爾乃懸水樹臬識景表營方位既正髙下既平羣力畢舉百功竝興建不拔之丕址拓萬雉之金城引天泉於西阜環湯池而鏡清九衢百廛之通達連甍邃宇之縱横顧壯麗其若此非燕逸而娛情蓋所以強幹而弱枝居重以御輕展皇儀而朝諸侯遵先軌而布仁政者也若乃四郊砥平皇道正直視萬國之環拱適居中而建極其南則萬流宗海平林蔽天攬邯鄲鉅鹿之廣衍貤平疇沃野之綿延溏淤恒衛經其野濡磁淶桑匯其前界以大陸廣阿之𢎞壤阨以大茂井陘之連山包絡趙魏襟帯齊魯膏腴之地綿亘三千餘里而極于黄河伊潁之川其水陸之所産卓犖繁盛蓋莫得而計焉其北則疊嶂􅐑峗層巒蔽虧長城矗乎雲表百泉湧乎山隈壯天關而設險守一夫而莫開偉左盤而右顧宛鳯舞而龍飛實磅礴而鬱積粤擁衛於邦畿包狼山上谷之阻據野狐獨石之危掩祖山木葉之離立連白登紫塞之逶迤控遐荒而極乎洮河之北鎮朔漠而逾乎瀚海之湄莫不傾心向化畏威懐徳相率而來歸其東則潞河通漕控引江淮肥洳灣淶灌注縈迴連峯片石之隘首陽崆峒之厓玉田白璧神仙璚臺超無終而越金山跨遼瀋而逾鴨緑至於暘谷日出之涯固巳遐哉邈乎而莫不在乎綏懐環以大海衆水所歸洪濤巨浪洶湧崔嵬蓋不知其幾千萬里而蠻商番舶帆檣隱天上下不絶而徃來又有蓬瀛方壺鳯麟聚窟十洲三島靈異非一流精之闕瓊華之室墉城岧嶤金臺岑嵂紫氣丹青景雲曯日靈圄偓佺安期羨門之倫相與游從乎其間出入隱見而慌惚瞻帝京其伊邇庻可見其驂鸞駕鶴之髣髴其西則崇山鬱翠髙挹泰岱北接居庸南首河内竒峯擁關龍門阻隘玉泉垂虹青烟浮黛上嶻􅑖兮倚空下蟠據而際海其麓則有渾河湯湯西湖泱泱鹽溝琉璃桑乾廣陽雪波泛湧灝溔汪洋一瀉千里㑹流帝郷又有上林禁苑種植畜牧連郊踰畿縁丘彌谷澤渚川匯若太湖瀛海渺瀰而相屬其中則有竒花珍果嘉樹甘木禽獸魚鼈豐殖繁育颮颮籍籍不可得而盡録固可以因農隙而校田獵選車徒以講武事乃遵國風稽王制詔期門簡將帥乘玉輅擁翠蓋出天關而雷轟轢芳郊而雲㑹非所以揚兵示武娯樂騁意蓋將取不姙而除苗害狩無擇而順殺氣謹大易之用於三驅之時驗騶虞之仁於一發之際水衡虞人之容與武夫壯士之奮厲皆知夫仁者之為勇而以投石超距之足鄙亦何必殄夷禽獸割鮮野食而以俛仰極樂之為貴也若夫其宮室之制則損益乎黄帝合宮之宜式遵乎太祖貽謀之良居高以臨下背隂而面陽奉天淩霄以磊砢謹身鎮極而崢嶸華蓋穹崇以造天儼特處乎中央上倣象夫天體之圎下效法乎坤德之方兩觀對峙以嶽立五門高矗乎昊蒼飛閣屼以奠乎四表瓊樓嵬以立于兩旁廟社竝列左右相當東崇文華重國家之大本西翊武英嚴齋居而存誠肜庭玉砌璧檻華廊飛簷下啄叢楹髙驤闢閶闔其蕩蕩儼帝居于將將玉户粲華星之炯晃璇題納明月而輝煌寳珠焜燿於天闕金龍夭矯於虹梁藻井煥發綺牕玲瓏建瓴聨絡複道廻衝軼霄漢以上出俯日月而盪胸五色炫映金碧晶熒浮輝揚耀霞彩雲紅其後則奉先之殿仁夀之宮乾清坤寧眇麗穹窿掖庭椒房閨闥閎通其前則郊建圓丘合祭天地山川壇壝恭肅明祀至於五軍庻府之司六卿百僚之位嚴署宇之齊設比館舎而竝置列大明之東西割文武而制異至於京尹赤縣之治所王侯貴戚之邸第辟廱成均育賢之地守羽林而掌佽飛者至九十而有四衛莫不井列而棊布各雄壯而偉麗其巖廊之上則有臯䕫稷契之倫元凱俊乂之軰相與賡虞廷之歌談羲農之際罄補衮之能懐忠貞之志考禮文於大備賛聲樂之盡美是以朝無缺政德敎漸暨薄海内外均陶至治幸其有作聿來趨事成此大功忘其劬勩人和既極休徴滋至慶雲瑞靄之覆于闕庭素鳥𤣥兔之獻于丹陛醴泉屢出甘露數墜麒麟騶虞之珍馴獅天馬之類紛紜雜遝莫能殫記于以見天眷之益隆而聖德之純備者也於是正月上日工既訖工爰告成於天地肆紹美於祖宗清心凝慮齋沐肅雍粢盛既潔牲牷既豐芬郁郁以旁達靈繽繽其來降錫嘉貺之穰穰介景福於帝躬將順應於昌期趾盛美於無窮乃服衮冕御帝座開九重之深宮受萬邦之朝賀内侯甸而要荒外殊方而異俗胥近恱而逺來紛鼓舞而匍匐方物溢以充庭奓絢燦而駭矚率蹈舞於階墀效華封之三祝爾乃浹和㑹昭景鑠鏗鯨鐘奏雅樂詔光禄以開筵合百辟而燕樂饌珍玉兮芳馨罍瓊漿以斟酌聨貂蟬兮夾陛雜蠻貊之荒服莫不酣暢而飽德咸頌歌而踴躍越填城而溢郛藹歡聲於寥廓斯可以嫓太古之無為慶華胥而蹈栗陸顧皇上之謙抑視至治為未足於是降徳音播嘉惠省刑罰薄賦税汰冗濁旌亷吏舉賢才擢俊乂發倉廪賑貧匱尊髙年而禮有德慎防禦而脩武備貴爵重賞以厲亷恥厚徃薄來以馭㝢内盖欲使人知所本士知所勵四方萬國無一民之失所窮陬僻壤無一物之不遂舉陶於春風和煦之中而樂於雍熈泰和之治此蓋堯舜兢業之心文王敬止之意所以紹鴻業繼先志益宏逺而有偉故不勞而甚易冠絶乎前古垂休於後世固可必聖子之與神孫益昌盛而無替小臣微陋忝職文字願賦帝都之盛槩揚國美於萬禩復為之歌曰煌煌帝都兮逾鎬豐阻山帶河兮壯以雄天開日明兮王氣所鍾穹隆造天兮惟帝之宮廓氛祲兮開溟濛鎮海甸兮宣皇風王道平平兮四方來同願皇圖之鞏固歴萬世兮無窮方竹軒賦金實秋孟之夕覺非道人寓宿於主人之軒見植竹焉外方中堅峭然觚稜扣之如石有聲硜硜予怪其不類衆竹戲若有評后皇植物各畀以形洪纎肥瘠莫殫其名毫忽無僭若冶剖型爾竹之産為類實繁寄哀瀟湘託興淇園嶧陽之材聲叶鳴鳯箘簵之堅荆揚效貢黄岡如椽用代陶瓦篲篠樷生束之盈把由衙雞脛般腸射同蘇麻篔簹笆箄龍鍾體柔為􅚠節促為􅀢刃毒為篻依木為弓毳毛為狗扶老為笻名雖萬變莫不示圓於外而抱虚於中故能文理縝宻而節槩疏通迎刃而解落籜以從桃笙籧笛織翠生風䌫維砥柱力綰艨艟干旄孑孑旌旗蔽空彤管煒煒横出詞鋒簫韶九奏至和攸同他如器使惟適所逢皆所以弼成人用而翼賛天工者也爾之為質外方内塞肌不柔順性復挺特櫽栝莫施何堪組織豈非才不適用而名浮其實乎言既而去逡巡就睡夢一𤣥叟頎然而長雙眉入鬢氅衣無裳頭角峭厲棖立木僵歴階而進出聲琅琅凡今之人喜圎惡方頃聞誚譏顧不敢當予非舎圎而不居蓋亦天賦之有常矧夫方圓不侔自昔為訒豨膏棘軸不能獨運鑿枘異投終底于吝黯直見疏𢎞詐乃近正論天人江都逺擯恢諧詭竒金馬日進固知鬻圎以遂私不若執方而自信也且物生而才罕即安處雕礲斵削自致困苦樗櫟臃腫斧斤莫尋桐杉赬野枳棘成林天嗇我才實非我仇以才莫全我獲實優方將勵吾之方堅吾之塞保天之全資地之力長我兒孫同居夀域邀凉月於江上疏泠風於座席有愛我者過從成癖敲門竟造不辨主客札瘥奚生逍遥甚適彼以才而效用於世者自視於予未知孰得而孰失也予驚而寤萬籟俱寂明月入戸凉在巾舄惟見此君挺然于庭粉垣鑄影一塵不驚脩柯滴露鏘然成聲予乃爽然如失惕然而惺乃歌曰圎以智行兮方以義守智或有窮兮義則可乆以虛而通兮以實而塞通或潰決兮惟塞乃格才應時用兮拙為世捐用則精弊兮捐則神全竹兮竹兮予將謂汝為方兮而不識汝之大圓赤石潭賦周敘正統九年甲子之秋七月既朢予以使命便道還京宗親故友餞送于赤石宦游萍梗出處難諶慨然有懐遂作斯賦其辭曰沿文江之横浦至赤石之澄潭水萬頃以凝碧山四合而染藍信乎其乾坤所融峙而仁智所樂耽也觀其崖石磊砢㟁谷谽谺爛如原火燦若朝霞入𤣥淵而莫測渺滄波其無涯當夫春江方漲駭浪驚濤洶湧激撞金山鐵壁不足以侔其壯洎其秋潦已渟天容月色空曠虛明盝舒鏡展不足以擬其清則斯潭之所以得名為可徴矣若乃眺乎其北則三凹屛列諸峰陣屯大宛旋凱而龍馬交驟昆陽戰敗而虎兕羣奔溯乎其西則近接鷹湖遥連錦峰白沙翠竹之掩映烟村雲樹之鬱葱慨鄉衮勝逰之舊躅念先親遺直之英風至於東則澧溪金港之交流釣臺鼇山之錯峙能不感夫金宋構兵炎鼎遷播而鳯艦龍舟亦嘗至於此乎南則虹橋緑野佛刹仙臺藹林泉之幽翳聳劍石之崔嵬騷人墨客固多留憇真僊杳㝠寧復有浮空而徃來者乎盖其為地也豁故能合數百里之大觀其為景也竒得不起千萬年之遐想此古今過從者之同賞也而余猶獨有所悵惘昔余之少而處也從宗族父兄省丘隴於兹潭之山隂奠春露之藻蘋撫秋風之宰樹殆德澤綿而嗣守固也顧瞻潭濵之他隴樵兒牧豎躑躅於孟嘗之墓豈非富貴而改其素乎逮余之長而仕也幾舟楫徃還於斯潭之水滸把離觴之汲汲趨王事之皇皇中抱丹而鬢毛蒼矣反羨其旁居人釣叟熈皥於無懐之鄉又何身世之忘豈非貧賤而任其常者乎烏兔跳丸彭殤一軌歎榮瘁之浮漚悲老壯之逝水擊流光而歌之曰潭之波兮悠悠去故鄉兮􅄼可留潭之石兮峨峨惟令名兮不可磨俯水際兮馮夷仰天畔兮嫦娥倡莫余和兮奈術何黄河賦薛瑄吾觀黄河之渾渾兮乃元氣之萃烝濬洪源于西極兮注天派於滄瀛貫后土之龎博兮沓𤣥溝之晶明過積石而左轉兮龍門呀而峻傾薄太華而東騖兮撼砥柱之崢嶸入大陸而北徙兮迷不辨夫九河之故形經兩海而紀衆流兮擅浮沉之濯靈覧頽波而懐明德兮又何莫非姒氏所經營登崐崘而俯視兮固彷彿其初迹馭髙風而騁望兮遂周游其曲直何末流之混濁兮始清澂而湜湜羌澹灧而徐趨兮勢沄沄而自得觸險石以鬭暴兮詫雷轟而轂擊天宇擴其沆漭兮渺上下之𤣥黄霧雨霪霪而滃集兮混邃古之洪荒微風蕩拂而渙散兮天機組織其文章頽猋浩而洶湧兮百怪垂涎而簸揚腥雲濁浪以盪汩兮恍惚顛倒夫舟航靈曜升而赫照兮乘正色於中央望舒在御而下臨兮列宿涵泳其光芒若乃震乗符以行令兮百谷淫淫其凍釋山澤沮洳以上氣兮增滉瀁之洋溢魚龍乗濤以變化兮杳莫測其所極祝融載節以南届兮雷雨奮達以霶霈潢支流而股合兮百川奔而來㑹木輪囷而漂拔兮蔽雲日而淘汰狂瀾洶而囓岸兮塊土焉塞夫衝潰霜戒嚴而木脫兮少昊執矩以司秋洲渚緬邈而石出兮始殺湍而安流霰雪紛其四集兮顓頊乘坎以奮神大塊噫氣而摩軋兮流凘下而龍鱗層氷横絶而山委兮河伯驅石以梁津羌險夷而明晦兮變朝暮與四時飈風起而衝木兮蟒怪駭其難推覩圓方之一氣兮恒來徃而宻移昔尼父之歎逝兮跨百世而罕知顧川流之有本兮與中古以為期啟龍圖而翫六一兮悞主宰之所為喟余心之未純兮感道妙之如斯聊誦言以自明兮庻晝夜之靡虧明文衡巻二
