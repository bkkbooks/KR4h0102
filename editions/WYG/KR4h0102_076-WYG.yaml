body:
  text: 明文衡巻七十六明程敏政編神道碑故文淵閣大學士兼左春坊大學士贈榮祿大夫少師禮部尚書諡文穆胡公神道碑銘楊士奇太宗皇帝御天下二十有三年文武之臣各展其才能達諸事功若竭誠効力始終不渝者其身雖沒所以寵眷之率有進而不衰其文臣遭遇之盛者文淵閣大學士兼左春坊大學士胡公尤著者也公初以進士第一為翰林修撰階承直郎又明年太宗皇帝入正大統陞侍講踰月改侍讀進承徳郎永樂二年陞右春坊右庶子階奉議大夫仍兼侍讀四年進翰林學士兼左春坊大學士階奉政大夫進文淵閣大學士仍兼左春坊大學士又三年得疾且劇上數命大醫集衆醫之良者往視日遣中使問疾既卒上悼嘆不已命工部具棺禮部賜祭者再贈資善大夫禮部尚書諡文穆國朝文臣有謚自太子少師姚公廣孝與公始也又命官給舟還其喪命有司治祠墳時仁宗皇帝監國南京公之喪過焉遣官臨祭賜賻甚厚塟畢其子入謝官其長子穜為翰林檢討仁宗既嗣位追念公舊人加贈榮祿大夫少師禮部尚書遣官諭祭且厚賜其家公遭逢二聖恩備始終何其愈久而愈盛也公居官敬慎在上前承顧問應對必盡誠必據理而忠厚為本未嘗及人過失事於奉㫖制勑視草即有所見必具可否以聞多見采納所撰進文字上知出公筆輒稱善所奏對語及所治機務退未嘗出口雖親厚不敢私涉有問葢自守之嚴有素事太宗皇帝十有七年凡巡幸北京親征北邊翰林率公與楊公勉仁金公㓜孜在扈從信任甚篤禮部郎中周訥建請封禪羣臣亦多言此太平盛事上皆不聽時獨公之言與上意合既退作封禪頌奏之丁母憂召還上問百姓安否對曰安但郡縣窮治姦惡外親為民厲遽詔罷之其兼春坊也小心盡誠多所裨益故尤為儲君所厚而沈靜謙約以滿為戒未嘗干人以私人亦無敢以私干之兩考京畿鄉試四為廷試讀巻官鑒别公明奉勑修高皇帝實錄及五經四書性理大全書皆為總裁志於扶植名教奬掖善類果於義事於利不茍取與未嘗一比匪人所與交必輔之於善不善去之不復顧小人有不滿公者屢造言毁之賴上深知之不聽遽黜毁者而公自埶愈堅意度蕭散雖身處榮祿未嘗一日㤀山林幽澹閒遠之趣公退閉户讀書賦詩而已初名廣廷試傳臚更名靖永樂初復舊名其字光大其齋居名晃菴因以為號公十數嵗喪父已有志問學内浸漬其母訓外則日受從祖子貞先生之教故徳器不凡居家篤倫誼處鄉曲恂恂執恭讓既冠薄逰閩中閩之前輩君子率忘年與交歸而從黄伯器先生講論得所歸宿之地而日進焉其學愽究經史百氏下逮醫卜老釋之説亦皆旁通而用志性命道徳之㫖晚益有造詣為文援筆立就頃刻千百言沛然行雲流水之勢賦詩取適其性情近體得盛唐之趣工書法行草之妙獨步當世四方重其文翰求者日接踵戸外雖無厭倦意然非其人不茍子其卒以永樂戊戌五月八日春秋四十有九其先自金陵徙廬陵宋忠簡公銓其十二世祖也曾祖鼎亨祖彌高父子祺累官延平知府毋吳元進士永豐縣丞師尹之子永樂中贈公父翰林學士封母太宜人公娶夏初封宜人洪熙初進封夫人子男三長即穜次穆次穂女四長嫁陳年次嫁觧禎亮次嫁宋懷孫男六女七所著文章有晃菴集扈從集若干巻公與士奇同郡同官知契最深未卒前二年有後死則銘之約既卒其孤又奉臨終之命索文刻墓石嗚呼士奇先公生五年豈謂竟銘公墓哉葢今九年乃克成之銘曰經國所資文武竝施維武以靖維文以治巍巍太宗統御九有任武暨文如左右手公職詞垣十有九禩秉恭執勤司帝之制玉冊金簡天章龍文光華日星帝宣帝仁萬幾燕閒清問前席公所入告惟帝時懌公所蓄志寛恵被下沕穆泯焉密贊鴻化春宫輔徳平直之行二聖惟明燭鑒公誠好文之朝儒林之首人聳其瞻公眎無有泊虚之存簡肅之度彼其何心有好有惡仲尼有言善者好之善有好公没思不衰寵章駢蕃賁終猶始始終之全曠代其幾金螺在左文川在右埋璧有光上貫牛斗墓道之碣為尋有多最行琢辭來者是儀少保户部尚書贈特進光祿大夫太師諡忠靖夏公神道碑銘公姓夏氏諱原吉字維喆其先家于饒州曾祖復祖希政元末為湖廣行省都事兵亂死之考時敏為湘陰縣儒學教諭遂家湘陰公自㓜端厚好學年十三教諭公沒益知自勵母夫人廖守節教子公終父喪即出教里塾取束修以資養而率其二弟恭侍婉愉得母夫人懽心出入鄉閭其長老皆㤀年賓禮之時已負鉅人度喜怒不形里少年嘗被酒侮慢公里人共擊之詈之曰汝小人不知鄉有君子耶有鬼物白晝附人言禍福驚動里中或强公往觀卒無所言他日復有言或問之故曰夏公端人吾不可以近公一無所動心洪武庚午嵗以詩經選鄉貢入大學遂擢戸部前四川司主事授承直郎進承徳郎曹務叢脞凡倉庾府帑之出入簡牘之著悉有條理同官後至於事有未通者咸以質公日環左右公雖紛冗必為之盡心葢人人徳公如師陞户部右侍郎授嘉議大夫巡撫福建所過郡邑考察吏治咨訪民隱公明寛大人咸悦服太宗皇帝入正大統轉左侍郎逾月陞户部尚書授資善大夫永樂初蘇松諸郡大水命公往治發浙西兵民十數萬疏决壅滯自松江黄浦東北以達于海水患乃息而撫恤曲當人不言勞又撫綏其飢民奏發廩三十餘萬石賑之散給有方民賴以濟進資政大夫初建北京採宫殿材於東南命公自南京抵北京督視運送給以錦衣衞官校且命有不率命便宜行事公於號令中備矜恤之意人人効用太宗巡狩北京公預扈從命兼行在禮部都察院事嵗餘車駕親征北方今上以皇嫡長孫留守北京命公輔導庶事修舉京師肅然太宗還良喜賜公鈔千緡綵幣四表裏羊酒鞍馬自是屢奉命侍今上有司奏公與吏部尚書蹇公厯官九載皆賜勑嘉奬有淳良篤實如古名臣之諭太宗親宴之别殿無幾賜誥命追封祖考皆為資政大夫戸部尚書祖妣為夫人封母為太夫人重修太祖皇帝實錄命公監修書成賜鈔織金文綺衣文綺表裏北京宫殿成奉勑召仁宗皇帝及今上于南京二聖喜公至賜宴勞及鈔白金鞍馬北邊復聞警太宗皇帝將親征公言今邊儲不足請遣將無煩六師忤㫖罷官仁宗皇帝嗣位即日復公戸部尚書公以母喪未終辭仁宗曰國家不幸有大事正朕與卿等恊心比力之時如卿以親喪辭則朕亦未當在此公乃不敢復言遂加少保仍兼户部尚書賜玉帶今上正位東宫加公兼太子少傅少保尚書二職如故賜誥命追封曾祖祖考皆為榮祿大夫少保兼太子少傅户部尚書曾祖妣祖妣妣皆一品夫人賜銀章一其文曰繩愆紏繆且諭公曰朕有過舉卿但具奏來以此識之朕不難於從善賜鈔萬緡御用米二十石胡椒二百斤公感知遇之厚鞠躬小心靡或不盡修太宗皇帝實錄命公監修仁宗皇帝崩時今上監國南京至則喪禮及即位之儀皆具皆公一人所預定上既嗣大位公以舊輔尤重倚注公亦孜孜惟謹寵賚日盛修仁宗皇帝實錄仍為監修庶人高煦反上親率六師擒之公預扈從還賜白金文綺等物甚厚賜銀圖書一其文曰含𢎞貞靜葢褒公之徳云明年扈從巡邊既還上念少師蹇公及公等四人者皆春秋高欲優逸之賜勑嘉勞命輟職務而仍其祿朝夕侍上備顧問謀議而恩遇益厚兩朝實錄成賜白金織金羅衣文綺表裏鞍馬賜宴明旦入謝暮歸第得疾遂薨宣徳五年正月二十七日也夀六十有五嵗上聞訃震悼遣禮部尚書胡濙賜祭贈特進光祿大夫太師賜諡忠靖賻鈔萬緡勅有司營喪葬官其子瑄為尚寳司丞仍復其家朝臣自公侯貴戚下至郎曹將校咸往弔祭衞卒巷氓亦有嘆息至流涕者公天性至孝友其弟原啓原禮皆厚原啓沒愛其子如子讀書鄉校時教諭史九韶雖非授業師遇之必拜雖貴不變既貴九韶陞教國子月恒分之祿九韶將老朝廷從公請命致事與人交久而敬平生故人在患難率賙給之遇士之貧者振之有顛躓失所者援之徳雖微必報而未嘗存怨惡心接人温然處事善善長而惡惡短襟宇瀞深閎廓不見涯涘嘗有從𨽻汚公金織賜衣懼欲逃者曰汚可浣何懼為有吏壞公所寳硯石匿不敢見公召吏諭之曰物皆有壞吾未嘗惜此慰遣之於時卿大夫雅量推公第一知者葢比公於王子明韓稚圭之度其在上前所言必歸仁厚臨政必酌大體其預宥密雖泯然無迹葢有陰受其徳者矣故不問貴賤疏戚識不識皆知其為善人長者喜為詩四方士重公名得其一篇一詠藏以為榮公配鄭氏有賢徳再封皆夫人子男三珫瑄瑾女一嫁虞㻞珫與虞氏女皆先卒公卒之三月歸葬湘陰其家以墓碑屬余余與公同朝三十年晚益親厚相知又嘗為余道其平生余豈意遂志公之墓耶銘曰泝夏厥初以國為氏衍于㑹稽緜緜厥系太末之邑後來徙居暨唐中和復徙于番懿夏之世逢掖其服詩書有承徳善有續轉鄂而潭自公祖考積厚必發公奮起紹燕歌鹿鳴來與計偕官任其賢政用其才繇司徒屬暨掌邦教寅恭小心寛仁允蹈叅决大議洊任重負不亟不徐雍容雅度如彼喬嶽嶻焉弗移其氣黙運澤潤良多祇事列聖既四十載夷險一道其舄几几國有老成堂有柱石胡不憗遺當宁興惻既榮且哀隆隆寵光於乎忠靖沒世不忘奉天靖難推誠宣力武臣特進榮祿大夫柱國太保陽武侯追封鄞國公諡忠武薛公神道碑銘宣徳五年五月太保陽武侯薛公奉命城隆慶永寧赤城獨石竣事將歸以疾聞上遣中官以御醫往視且賜勅諭勞至京猶力疾入見上慰諭再三既歸第日賜御藥遣中官臨問無幾竟不起七月二十三日也訃聞上震悼親為文祭之追封鄞國公賜諡忠武詔有司治喪葬凡喪葬之儀皆優等葢特恩云公諱祿姓薛氏世家山東膠州之新興社曾祖考諱安妣劉祖考諱大妣金考諱遇林妣張公兄弟六人而公第六自少傑特有大志未冠籍戎伍上官皆奇之從北征金山及哈勒哈之地又從征伊勒敦山鼐爾布哈䓁處自是屢出西北二邊渉萬里而還太宗皇帝舉兵靖内難公首從義旗攻九門克薊州遵化援密雲攻雄縣追敵鄚州咸奮勇先驅以一當百戰真定公生擒敵左副將軍駙馬都尉李堅超陞燕山右護衞指揮僉事賜白金文綺從援永平攻下大寧富峪㑹州寛河時南兵已圍北平城公還先遇其哨騎薄戰敗之車駕繼至從戰鄭村埧敵大敗陞指揮同知從克廣昌蔚州攻大同率兵前哨獲敵人馬遂從南征大戰白溝河追奔至濟南陞指揮使從克滄州大戰東昌公以五十騎前哨遇敵兵數百與戰敗之獲馬三十餘疋敵悉衆來追公復奮戰大敗之獲馬二百餘疋敵於威縣及深州伏兵以要旋師皆擊走之從戰夾河大㨗戰滹沱河右軍力屈公率衆馳赴之出入敵陣數十合戰敵敗走公追至夾河斬馘無筭獲馬五百餘疋明日戰單家橋公馬蹶為敵兵所得拔刀斬敵兵復上馬督戰遂敗敵將平安軍以次攻下順徳大名彰徳及攻西水寨公生擒敵都指揮一人斬獲尤多從攻東阿東平汶上皆下之繼戰淝河大店小河汴隄靈壁率勇先諸軍遂渡淮渡江從車駕入京師太宗皇帝為臣民推戴既正大位論功行賞陞驃騎將軍後軍都督府都督僉事以其官秩贈三代永樂六年陞都督同知八年從車駕北征至𤣥溟河以功進榮祿大夫右軍都督府右都督兼左軍都督府事以其官秩加贈三代時四方選至㓜軍數萬悉命𨽻公操習十二年從車駕北征十五年初建北京宫殿命公董營繕十八年成加奉天靖難推誠宣力武臣特進榮祿大夫柱國封陽武侯食祿千五百石追封其三代皆侯爵賜誥劵二十一年從車駕北征還奉命討捕湖州叛冦二十二年復從車駕北征是年八月仁宗皇帝嗣大位加公太子太保子孫世襲侯爵奉命巡北邊適敵至雲州公率兵追至大松嶺斬獲甚衆事聞賜勑嘉奬遣中官及鴻臚卿即軍中勞之既還賜白金鈔幣加嵗祿五百石洪熙元年佩鎮朔大將軍印率師巡北邊宣徳元年庶人高煦反車駕親征命公為前鋒先一日圍其城罪人既得留公撫綏城中軍民還賜銀幣甚厚明年秋從車駕巡邊出㑹州邂逅敵侵塞下與戰敗之生擒其長斬獲其餘衆遂鎮薊州永平冬還賜銀幣加厚四年率師護兵餉開平者再五年春佩鎮朔大將軍印巡邊至奇黄嶺遇敵拒戰悉斬之盡收其家口孳畜陞太保錫鈔幣居三月董築城之役葢從公之言以便戍守公平居無事未嘗㤀危每計邊務言之亹亹或誚其𤨏屑者終不為變葢其志奉國惟恐不盡為將勇智兼備常先事籌畫用心之至以夜繼日故所嚮成功未嘗敗北間一二臨陣中矢石褁創赴鬭有進無退其率師所過紀律嚴明秋毫無犯而撫恤士卒人人歸心若董繕作規置有方力不煩費功率堅久人亦罕及葢一代之興必有一代之臣公祇事三聖渉厯多用志篤鞠躬盡瘁以效臣職故能建功國家流光簡冊致身貴富埀慶後昆其非古名將之流而今之不可多見者歟公夀七十有三年其配李累封至侯夫人子男三長勲先卒次某次某孫男三長誠先卒次某次某以是年十月三日塟公于某鄉某原銘曰明聖之興有命自天必有輔翼名世之賢氣機翕㑹雲龍風虎有勲有烈左文右武桓桓薛公始奮從義大呼迅馳金戈鐵騎智明幾先勇葢萬夫疇其攖之析朽摧枯宗社載安功書冊府在帝左右股肱心膂公於事上一誠不貳知竭臣職死且無怠公於馭衆有紀有綱撫如春和令如秋霜厯事三聖麟衣蟬冠廷有老成國有屏翰丹書鐵劵傳襲來裔公如長城曷不百嵗英靈升遊九原在此太史作銘式昭無已明文衡巻七十六
