body:
  text: 明文衡巻十四明程敏政編辨洛書辨王禕洛書非洪範也昔箕子之告武王曰我聞在昔鯀陻洪水汩陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸叙初不言洪範為洛書也孔子之繫易曰河出圖洛出書聖人則之未始以洛書為洪範也蓋分圖書為易範而以洪範九疇合洛書則自漢儒孔安國劉向歆諸儒始其説以謂河圖者伏羲氏王天下龍馬出河負圖其背其數十遂則其文以畫八卦洛書者禹治水時神龜出洛負文其背其數九禹因而第之以定九疇後世儒者以為九疇帝王之大法而洛書聖言也遂皆信之而莫或辨其非然孰知河圖洛書者皆伏羲之所以作易而洪範九疇則禹之所自叙而非洛書也自今觀之以洛書為洪範其不可信者六夫其以河圖為十者即天一至地十也洛書為九者即初一至次九也且河圖之十不徒曰自一至十而已天一生水地六成之水之位在北故一與六皆居北以水生成於其位也地二生火而天七成之故二與七皆居南以火生成於其位也以至東西中之為木金土無不皆然至論其數則一三五七九凡二十五天數也皆白文為陽為竒二四六八十凡三十地數也皆黒文而為隂為偶此其隂陽之理竒偶之數生成之位推而驗之於易無不合者其謂之易宜也若洛書之為洪範則於義也何居不過以其數之九而已然一以白文而在下者指為五行則五行豈有陽與竒之義乎二以黒文而在左肩者指為五事則五事豈有隂與偶之義乎八政皇極稽疑福極烏在其為陽與竒五紀三徳庶徵烏在其為隂與偶乎又其為陽與奇之數二十有五為隂與偶之數二十通為四十有五則其於九疇何取焉是故隂陽奇偶之數洪範無是也而徒指其名數之九以為九疇則洛書之為洛書直而列之曰一二三四五六七八九足矣奚必黒白而縱横之積為四十五而效河圖之為乎此其不可信者一也且河圖洛書所列者數也洪範所陳者理也在天惟五行在人惟五事以五事叅五行天人之合也八政者人之所以因乎天也五紀者天之所以示乎人也皇極者人君之所以建極也三徳者治之所以應變也稽疑者以人而聼於天也庶徵者推天而徵之人也福極者人感而天應之也是則九疇之自一至九所陳者三才之至理而聖人所以叅賛經綸極而至於天人證應禍福之際以為治天下之法者也其義豈在數乎豈如易之所謂天一地十者中含義數必有圖而後明可以索之無窮推之不竭乎漢儒徒見易係以河圖與洛書並言而洛書之數九遂以為九疇耳審如是則河圖之數十也伏羲畫卦何為止於八乎此其不可信者二也先儒有言河圖之自一至十即洪範之五行而河圖五十有五之數乃九疇之子目夫河圖固五行之數而五行特九疇之一耳信如斯則是復有八河圖而後九疇乃備也若九疇之子目雖合河圖五十有五之數而洛書之數乃止於四十有五使以洛書為九疇則其子目已缺其十矣本圖之數不能足而待他圖以足之則造化之示人者不亦既疎且逺乎而况九疇言理不言數故皇極之一不為少庶徵之十不為多三徳之三不為細福極之十一不為鉅今乃類而數之而幸其偶合五十有五之數使皇極儕於庶徵之恒暘恒雨六極之憂貧惡弱而亦偹一數之列不其不倫之甚乎且其數雖五十有五而於隂陽奇偶方位將安取義乎此其不可信者三也班固五行志舉劉歆之説以初一曰五行至威用六極六十五字為洛書之本文以本文為禹之所叙則可以為龜之所負而列於背者則不可夫既有是六十五字則九疇之理與其次序亦已粲然明白矣豈復有白文二十五黒文二十而為戴履左右肩足之形乎使既有是六十五字而又有是四十五數並列於龜背則其為贅疣不亦甚乎此其不可信者四也且箕子之陳九疇首以鯀陻洪水發之者誠以九疇首五行而五行首於水水未平則三才皆不得其寧此彛倫之所為斁也水既治則天地由之而立生民由之而安政化由之而成而後九疇可得而施此彛倫所為叙也彛倫之叙即九疇之叙者也蓋洪範九疇原出於天鯀逆水性汩陳五行故帝震怒不以畀之禹順水性地平天成故天以錫之耳先言帝不畀鯀而後言天錫禹則可見所謂畀所謂錫者即九疇所陳三才之至理法天下之大法初非有物之可驗有迹之可求也豈曰平水之後天果錫禹神龜而負夫疇乎仲虺曰天乃錫王勇智魯頌曰天錫公純嘏言聖人之資質天下之上壽皆天所賦予豈必是物而後可謂之錫乎使天果因禹功成錫之神龜以為瑞如簫韶奏而鳳儀春秋作而麟至則箕子所取直美禹功可矣奚必以鯀功之不成發之乎此其不可信者五也夫九疇之綱禹敘之猶羲文之畫卦也而其目箕子陳之猶孔子作彖象之辭以明易也武王訪之猶訪太公而受丹書也天以是理錫之禹禹明其理而著之疇以垂示萬世為不刋之經豈有詭異神奇之事乎鄭康成據春秋緯文有云河以通乾出天苞洛以流坤吐地符又云河龍圖發洛龜書感又云河圖有九篇洛書有六篇夫聖人但言圖書出於河洛而已豈嘗言龜龍之事乎又烏有所謂九篇六篇者乎孔安國至謂天與禹神龜負文而出誠亦怪妄也矣人神接對手筆粲然者冦謙之王欽若之天書也豈所以言聖經乎此其不可信者六也然則洛書果何為者也曰河圖洛書皆天地自然之數而聖人取之以作易者也於洪範何與焉羣言淆亂質諸聖而止河出圖洛出書聖人則之者非聖人之言歟吾以聖人之言而斷聖人之經其有弗信者歟劉牧氏嘗言河圖洛書同出於伏羲之世而河南程子亦謂聖人見河圖洛書而畫八卦吾是以知孔安國劉向歆父子班固鄭康成之徒以為河圖授羲洛書錫禹者皆非也或曰河圖之數即所謂天一至地十者固也洛書之數其果何所徵乎曰洛書之數其亦不出於是矣是故朱子於易啓䝉蓋詳言之其言曰河圖以五生數合五成數而同處其方蓋揭其全以示人而道其常數之體也洛書以五奇數統四偶數而各居其所蓋主於陽以統隂而肇其變數之用也中為主而外為客故河圖以生居中而成居外正為君而側為臣故洛書以竒居正而偶居側此朱子之啟䝉而吾以謂洛書之奇偶相對即河圖之數散而未合者也河圖之生成相配即洛書之數合而有屬者也二者蓋名異而實同也謂之實同者蓋皆本於天一至地十之數謂之名異者河圖之十洛書之九其指各有在也是故自一至五者五行也自六至九者四象也而四象即水火金木也土為分旺故不言老少而五之外無十此洛書所以止於九也論其方位則一為太陽之位九為太陽之數故一與九對也二為少隂之位八為少隂之數故二與八對也三為少陽之位七為少陽之數故三與七對也四為太隂之位六為太隂之數故四與六對也是則以洛書之數而論易其隂陽之理奇偶之數方位之所若合符節雖繫辭未嘗明言然即是而推之如指諸掌矣朱子亦嘗言洛書者聖人所以作八卦而復曰九疇並出焉則猶不能不惑於漢儒經緯表裏之説故也嗚呼事有出於聖經明白可信而後世弗之信而顧信漢儒傅㑹之説其甚者蓋莫如以洛書為洪範矣吾故曰洛書非洪範也河圖洛書皆天地自然之數而聖人取之以作易者也詩辨王紳聖人垂訓於方來也其見諸言行之間者既同且詳而盡心焉者於六經尤著焉六經非聖人之所作因舊文而刪定者也易因伏羲文王之著而述之大傳所以明隂陽變化之理書因典謨訓誥之文而定之所以紀帝王治亂之迹春秋因魯史之舊而脩之所以明外伯内王之分詩因列國歌謡風雅之什而刪之所以陳風俗之得失禮所以著上下之宜樂所以導天地之和皆切於日用當於事情而為萬世之凖則也其於取舍用意之際似寛而實嚴若疎而極宻故學者捨六經無以為也奈乎秦焰之烈燔滅殆盡至漢嘗尊而用之而莫得其真或傳於老生之所記誦或出於屋壁之所秘藏記誦者則失於舛謬秘蔵者未免於脱畧先儒因其舛謬脱畧復從而訂定務足其數而以已見加之其闕者或偽為以補之或取其已刪者而足之其受禍之源雖同而詩為尤甚夫詩本三千篇聖人刪之十去其九則其存者必合聖人之度皆吟咏情性涵暢道徳者也故聖人之言曰興於詩敎其子則曰不學詩無以言與門弟子語曰詩可以興可以觀可以羣可以怨至於平居雅言亦未嘗忘之詩之為用矇瞽之人習而誦之咏之閨門被之管絃薦之郊廟享之賔客何所徃而非詩邪後世置之博士以謹其傳為用固亦大矣則其温厚和平之氣皆能感發人之善心者可知焉今之存者乃以鄭衛淫奔之詩混之以足三百十一篇之數遂謂聖人之所刪至如桑中溱洧之言皆牧竪賤𨽻之所羞道聖人何所取而存邪玩其辭者何所興言之復何嘉邪學之何益於徳誦之閨門烏使其非禮勿聼邪被之管絃薦之郊廟鬼神饗之賔客意何在邪是未可知也且聖人又曰詩三百一言以蔽之曰思無邪然思且無邪見于言者又何盭邪假使聖人實存之則其所刪者又必甚於是邪或曰聖人存之者蓋欲後世誦而知恥所以懲創人之逸志亦垂戒之意也是故春秋据事直書臣弑其君子弑其父皆明言之而不隠及其成也皆知畏懼詩之為意豈外是哉嗟乎舉善之是尚惡者固自知其非且春秋者國史也備列國之事必欲見其葬弔㑹盟聘享征伐嫁娶之節闕之則後世無所傳無所傳則後世無所信故備書之而用意之深則在明褒貶於片言之間也然詩既為民間歌謡之什遺其善固不可失其惡又烏害於道乎由是論之則淫奔之詩在聖人之所刪蓋必矣且張載子厚嘗論衛人輕浮怠惰故其聲音亦淫靡聞其樂使人有邪僻之心而鄭為尤甚矣夫聖人敎之以孝悌忠信恨不挽手提耳以囑之何迺以淫靡之樂而使人起邪僻之心乎故其論為邦亦曰放鄭聲然則揆之於理據之於經考之於聖人之言意雖有儀秦之辨吾知其叛於理而失聖人垂訓之意矣夷齊十辨王直一辨夷齊不死於首陽山二辨首陽所以有夷齊之跡三辨山中乏食之故四辨夫子用齊景公對説之由五辨武王之世恐無夷齊六辨史記本傳不當削海濵辟紂之事七辨道遇武王與周紀書來歸之年不合八辨父死不葬與周紀書祭文王墓而後行者不同九辨太史公之誤原於輕信逸詩十辨左氏春秋傳所載武王遷鼎義士非之説亦誤謹按論語第七篇冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也第十六篇齊景公有馬千駟死之日民無徳而稱焉伯夷叔齊餓於首陽之下民到于今稱之其斯之謂歟此二章孔子所以稱夷齊者事無始末莫知其何所指雖有大儒先生亦不得不取証於史記蓋孔子之後尚論古人無如孟子孟子止言伯夷不及叔齊其於伯夷也大槩稱其制行之清而於孔子此二章之意亦未有所發惟史記後孔孟而作成書備而記事富時有以補前聞之缺遺如子貢夷齊何人之問孔子求仁得仁之對倘不得史記以知二子嘗有遜國俱逃之事則夫子不為衛君之㣲意子貢雖知之後世學者何從而知之也此史遷多見先秦古書所以為有功於世也然遷好竒而輕信上世之事經孔孟去取權度一定不可復易者史記反從而變亂之以滋來者無窮之惑則遷之功罪豈相掩哉蓋夷齊不食周粟之類是已史記既載此事於傳又於周紀齊世家諸篇歴言文王武王志在傾商累年伺間備極形容文字既上盪人耳目學古之士無所折衷則或兩是之曰武王之事不可以已而夷齊則為萬世立君臣之大義也昌黎韓公之論是已其偏信者則曰夷齊於武王謂之弑君孔子取之蓋深罪武王也眉山蘇公之論是已嗚呼此事孔孟未嘗言而史遷安得此歟或聞予言而愕曰謂孟子未嘗言則可首陽之事孔子彰彰言之子既知有論語而又疑此則是不信孔子也予應之曰予惟深信孔子是以不信史遷也且謂論語本文何以言之夫齊景公有馬千駟死之日民無徳而稱焉伯夷叔齊餓于首陽之下民到於今稱之論語未嘗言其以餓而死也而史遷何自知之餓者豈必皆至於死乎夫首陽之隠未見其必在武王之世而二子昔嘗逃其國而不立証諸孔子對子貢之意則可信矣安知其不以逃國之時至首陽也孤竹小國莫知的在何所傳者謂齊桓北伐山戎嘗過焉山戎與燕晉為隣則孤竹可知而首陽在河東之蒲坂詩之唐風曰采苓采苓首陽之顛采苦采苦首陽之下或者即此首陽蓋晉地也若夷齊果孤竹君之子則逃國以來諒亦非逺何必曰不食周粟而後隠此邪今且以意度之國謀立君而已逃去則必於山谷無人不可物色之所然後能絶國人之思首陽固其所也蓋倉卒而行掩人之所不知固宜無所得食又方君父大故顛沛隕越之際食亦何心其所以兄弟俱在此者一先一後勢或相因而今不可知耳然亦不必久居於此踰月移時國人立君既定則可以出矣惟其遜國俱逃事大卓絶故後稱之指其所嘗棲止之地曰此仁賢之跡也夫是以首陽之傳久而不泯何必曰死於此山而後見稱邪予所以意其如此者無他蓋論語此章本自明白於景公言死而於首陽不言死後人誤讀遂謂夫子各以死之日評之耳此大不然也夫孔子以景公與夷齊對言大意主於有國無國尤為可見問國君之富數馬以對諸侯曰千乗所謂有馬千駟者蓋斥言其有國也夷齊可以有國而辭國者也崔子弑景公之兄莊公而景公得立崔子猶為政景公安為之上莫之問也享國日久奉已而已觀其一再與晏子感慨悲傷眷戀富貴直欲無死以長有之其死也泯然一無聞之人耳孔子嘆之曰嗟哉斯人彼有内求其心棄國不顧如夷齊者獨何人哉彼所以千古不泯者豈以富貴哉由此論之則孔子所以深取夷齊但指其辭國一節而意自足若曰夫子取其不食周粟以餓而死則此章本文之所無也夫今去夫子又逺矣餓於首陽一語之外前不言所始後不言所終予疑其在遜國俱逃之時而不死者蓋意之然予之意之也蓋猶近似而無害於義理若遷之意之也畧無近似而害於義理特甚焉大槩遷也専指文武為强大諸侯窺伺殷室以得天下故於世家則首吳太伯於列傳則首伯夷遷之説出而孔孟所以言文武盛徳至仁者皆變亂矣此事若不見取於大儒先生猶可姑存以俟來哲今亦不幸君子可欺斷然按之以釋論語則武王萬世當為夷齊之罪人夷齊借之以徇使萬世亂臣賊子知畏清議如此也而武王何罪哉予言更僕未終亦不得已也然實欲反復究竟折服史遷使不可再措一辭者吾徒之學誦詩讀書論世知人不當草草幸毋倦聼夫夷齊孔子之言畧孟子雖不言叔齊而言伯夷甚詳若并取証於孟子則史遷所載諌伐以下曉然知其決無也孟子言伯夷之歸周也曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來史記本傳則不然削其海濵辟紂之事但於遜國俱逃之下即書曰於是往歸西伯及至西伯卒此下遂書叩馬諫武王之語數其父死不葬以臣弑君蓋以為遇武王於道也所謂於是云者如春秋之書遂是纔逃其國遂不復返而歸周也則不知此行也二子亦已免喪否與厄於勢而不返容或有之然逃彼歸此如同時然身喪父死自不得與於哭泣之哀也而忍以父死不葬責他人歟嗚呼此必無之事也夫遷所以削其海濵辟紂者何哉謂遷為未嘗見孟子歟則遷知其有書七篇其作孟子傳自言嘗讀之而屢嘆矣然而如此書伯夷者其意可想也遷以不食周粟為奇節故欲見伯夷處心後來全不直武王而其初本無惡於紂也夫事不惟其實所不合己意則削之千載而下讀於是一語尚可想其遷就増損之情態而何以傳信乎故曰當一以孟子為斷夫伯夷太公兩不相謀而俱歸文王孟子稱為天下之大老太公之老古今所共傳則伯夷之年當亦不相上下孟子必不虚加之也然伯夷徳齒昔縱與太公同而後來年齡豈必與太公等吾意武王之時未必猶有所謂伯夷也而遷所作周紀又自與傳不同何以言之伯夷以大老而歸文王文王享國凡五十年吾不知其始至也在文王初年歟中年歟末年歟不可考也而遷於周紀則嘗以為初年矣其言曰文王繼公季而立敬老慈㓜禮賢待士士以此多歸之夷齊在孤竹聞西伯善養老徃歸之然後曰太顛閎夭散冝生鬻子辛甲太公之徒皆往歸之然後曰崇侯譖西伯於紂囚於羑里然後曰紂釋文王賜弓矢鈇鉞得専征伐又數年而書聼虞芮訟又明年而書伐犬戎自此毎年書一事而各以明年二字冠於其上如是者凡七上去夷齊來歸之年不知其㡬矣大槩書文王五十年之事稍稍排布歳年而夷齊之歸為首其他末之先也以天下之大老其來在文王即位未久之年若謂其人猶及武王已平殷亂天下宗周之後姑少計之亦當百有餘嵗矣恐不必不食周粟隠於首陽山而考終已久矣遷既書於周紀如此及作伯夷傳乃言夷齊方至文王已卒道遇武王以木主為文王伐紂叩馬而諫不知此當為兩夷齊乎抑即周紀所書之夷齊乎若即周紀所書之夷齊則歸周已數十年非今日甫逹岐豐之境也諫武王當於未舉事之初不當俟其戎車既駕而後出奇駭衆於道路也太公與已均為大老出處素與之同不於今日白首如新方勞其匆匆扶去於鋒刄将及之中也嗚呼紀傳一人作也乃自相牴牾如此尚有一語之可信乎觀其摹寫二子冒昧至前左右愕眙欲殺武王無語太公營救之狀殆如狂夫出鬭羣小號呶而迂怪儒生姓名莫辨攘臂其間陳説勸止嗟乎殆哉其得免於死傷也不亦幸哉武王方為天下去賊虐諫臣毒痡四海之紂而行師無紀左右遽欲害敢諫之士戕天下之父死生之命在左右與太公而武王若㒺聞知萬一扶去之手緩不及用則是彼殺比干此殺夷齊其何以有辭於紂也武王順天應人之舉後世敢造此以誣之噫甚矣傳曰父死不葬紀則曰武王祭於畢東觀兵至於孟津載木主車中畢也者文王葬地也古無墓祭祭畢之説亦妄然一曰祭于畢一曰父死不葬又何也故凡遷書諫伐以下大率不可信使其有之孔子不言孟子言之矣子若以孔孟之説折遷遷未必屈服惟傳自言之紀自破之其他巻猶曰破碎不全不盡出於遷之手而此紀此傳皆遷全文讀者知其非遷莫能作又不得疑其補綴於後人也曰然則紀與傳孰愈曰紀書文王其妄居半及書武王則妄極矣若其書夷齊一節猶畧優於傳也蓋紀言其歸周及文王之生而傳言其至值文王之死也及文王之生者與孟子同而值文王之死者無稽之言也曰然則首陽之事其究如何曰予前固言之果有夷齊暫隠之迹而不在武王克商之時武王克商之時恐已無所謂夷齊而孟子又不言叔齊歸周惟後之讀論語者惑於遷史増加孔子本文執所謂餓者為夷齊蓋棺之終事是以展轉附㑹爾夫理至於一是而止予生百世之後安敢臆度輕破古今共信之説蓋見遷於論語才有一字之増而遂與孟子畧無一字之合又紀傳色色不同徒以無稽之言貽惑後世是以詳為之辨庶㡬自此觀夷齊者惟當學其求仁得仁與夫制行之清廉頑立懦之類而不必惑其叩馬恥粟以至於死然後語孟稱道之意可明也夫讀論孟則見二子可師乃志士仁人甚自貴重其身抗志甚髙觀理甚明俯仰浩然清風可仰而不可及孔孟之所謂賢由之則俱入堯舜之道也讀史記則見二子可怪乃羇旅妄人闇於是非進退輕發嘗試不近人情悻悻然以去終與自經於溝瀆而莫知之者比史遷之所謂賢由之則不過於陵仲子之操也學者於此從語孟乎從史記乎曰如此則遷無所據而容心為此何也曰遷自言之矣所謂予悲伯夷之志賭逸詩可異焉者此遷之所據乃一傳之病源也逸詩者西山采薇之章也三百篇詩經夫子所刪尚莫知各篇為何人作遷偶得一逸詩而妄意之曰此必夷齊也夷齊嘗餓於首陽今言采薇西山是不食周粟故也夫古詩稱采草木蔬茹于山者甚多豈皆有所感憤而不食人粟者乎粟生於地人人食之已獨不食則食之者人人皆非也異哉恥一武王而天下皆無與已同類之人然則試使夷齊之敎行一世之人無一人肯食周地之粟而後可乎夷齊之風百世聞之而興起何當時此事無一人見之而聼從乎夫天下所謂西山不知其㡬自東觀之皆西也詩言西山不言首陽不當以附㑹論語之所云也末句曰吁嗟徂兮命之衰矣遷以為夷齊死矣悲哉此臨絶之音也夫徂者往也安知作歌者之意不思有所往上言我安適歸則無所辟地辟世矣下又言吁嗟徂兮則於不可中求可猶思有所往焉既而遂自決曰命之衰矣歸之於天而終無可奈何之辭也豈必為殂卒之殂乎神農虞夏固不可見而以暴易暴何可以指武王武王非暴君也必欲求其稱此語者則自春秋戰國至於秦項滅國滅社何處不有乎然則世必有遭罹荼毒而作此詩者非夷齊也此詩誤遷而遷誤後世也或曰然則春秋之初魯臧哀伯曰武王克殷遷九鼎于洛邑義士猶或非之杜元凱以為伯夷之屬也此在孔孟之間豈亦非歟曰非也武成之後武王嵗月無㡬散財發粟釋囚封墓列爵分土崇徳報功亟為有益之事則吾聞之遷鼎恐非急務也滅人之國毁人宗廟遷其重器强暴者之所為誰謂武王為之使果有所謂鼎則天下一家無非周地在彼猶在此矣豈必皇皇汲汲負之以去而後為快乎况罪止紂身為商立後宗廟不毁而重器何必遷乎書稱營洛乃成王周公時事在武王無之義士所非亦不審事實矣而義士又不知為何人自克商至於周衰然後左氏載此語蓋已四五百年四五百年之間豈無一士心非武王者得稱為義亦各有見也而何必以夷齊實之乎况左氏近誣未必斯言果出於哀伯乎嗚呼此武王夷齊終古瞹昧俱受厚誣之事與咸丘䝉之徒妄言堯舜者頗同惜其出於孟子之後無一人識其為齊東野人之語故使流傳至今幸而竊讀論語偶思首陽之章未嘗言死遂得以盡推其不然惟此章之疑既釋則史遷失其所以憑藉附㑹之地豈非古今之一快哉然此愚見也不知來哲又以為然否
