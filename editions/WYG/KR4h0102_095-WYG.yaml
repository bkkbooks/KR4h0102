body:
  text: 明文衡巻九十五明程敏政編哀誄哀志士辭宋濂竒雋之士無世不生特時人弗識之或識之而弗能用或用之而弗能盡其才所以聲光不流於當時事業不白於後世予竊悲之庚寅之夏因覽元好問所錄金之諸儒自辛愿而下凡五人見其氣節剛方言論磊落實所謂竒雋之士者也雖其行事或未能無過終非齷齪陳腐懨懨不振者所可冀其萬一然恨其有志而不能遂也因掇其大畧𨽻於各人之下又從而哀之以辭曰辛愿敬之福昌人年二十五始知讀書音義有不通者搜訪百至必通而後已由是博極羣書且善於文辭尤以是非黒白自任毎讀人詩必為探源委發凡例解絡脉審音節辨清濁權輕重片善不掩微纇必指如老吏斷獄文峻網密絲毛不相貸雖招人怒罵不恤也性疎宕不脩威儀貴人延客愿麻衣草屨足脛赤露坦然於其間劇談豪飲旁若無人家甚貧衆雛嗷嗷張口待哺素負高氣又不能從俗俯仰其枯槁憔悴流離頓踣一假詩以鳴雖百沮之餘其耿耿自信者不少變元光初李獻能元好問在孟津愿往見之獻能為設美饌愿放筴歎曰平生飽食有數每見吾二弟必得嘉食明日道路中又當與老饑相抗去矣會有一日辛老子僵仆栁泉韓城之間以天地為棺槨日月為含襚狐狸亦可螻蟻亦可耳聞者悲之辭曰天生爾才胡不汝騁麻衣如墨下不掩脛下不掩脛不過寒我我食無所我生其可水豈無藻山豈無薇茍非吾有我敢采之市魁屠伯彼豈無食我腹雖虚我腰肯折抱節而終我則奚憾烏鳶螻蟻上下何辨爾貧固甚爾守則多不義而富其如爾何李汾字長源平晉人曠逹不覊好以竒節自許避亂入闗闗中無一人敢與相軒輊者元光末用薦書得從事史館從事職名謂之書冩特鈔書小史耳汾素高亢不肯一世乃今以斗食故人以府史畜之殊不自聊館中諸人又多新進小生史家凡例或未能盡知就其所長有不滿汾一笑故刋脩之際汾在傍則蓄縮慘沮握筆不能下汾正襟危坐誦左邱明司馬遷文數百言音吐甚洪暢誦畢顧四坐曰看秉筆諸人積不平乃以嫚罵官長訟于有司證左相半踰年不能决右丞師中遣東曹掾置酒和解之尋入闗驅馬來京師日以馬價佐歡道逢怨家則畫地大數而去㑹恒山公武仙在鄧汾往說之署行尚書省講議官既而叅知政事思烈與仙相異同懼汾言論遂害之汾孝友廉介過人者甚多寧寒餓而死終不作寒乞聲向人又善為詩清壯磊落有幽并豪俠忼慨之氣人以是稱焉辭曰奎星光光今何其昏大河東流遑恤無人金匱石室藏我冊書豈伊羣兒所堪穢之我言弗信弗信從汝邱明雖鬼其文不死既不我嘉覆謂我僭我視我觚有淚如霰黄霧四塞黒白誰分彩鳳無華山貍有文悠悠蒼天曷其有常自古莫不然爾又何傷劉昂霄字景𤣥一字委房陵川人聰敏絶人或戲取市家日厯鱗雜米鹽者令讀之一過無脫遺者故其學無所不窺六經百氏外世譜官制與兵家成敗為最詳為人細瘦似不能勝衣好横䇿兀坐掉頭吟諷幅巾奮袖談辭如雲四筵聳聽噤不得語遇其飲酒眼花耳熱後其鋒愈不可當不知去古談士為逺近餘子不論也嘗用門資叙調慶陽軍器庫使不就諸公方薦試宏辭未幾卒辭曰陋儒拘拘以簡為常目視環堵不知有四方狂瀾既倒誰復廻之氣蓋一世獨爾能之上自黄虞下迨五季一隙必燭何有幽邃或觸其機談辭如雲誰非男子有舌無聲我豈誇多我豈鬬靡一物不知吾儒所恥獨立千古上遡寥絶爾身雖窮爾名豈滅雷淵字希顔别字季黙渾源人崇慶二年進士授涇州録事不赴改東平府録事以勞績遥領東阿縣令東平河朔重兵處也驕將悍卒不可制淵出入軍中偃然不為屈不數月家有淵畫像雖大將亦不敢以書生遇之調徐州觀察判官召為荆王府文學兼記室叅軍轉應奉翰林文字同知制誥兼史院編修官拜監察御史廵行河南搒掠贓吏風采凜凜蔡下一兵與權貴人有連時以藥毒民家馬牛以小直脅取之淵捕得數以前後罪杖殺之老㓜聚觀萬口稱快然亦坐是失官尋用宰相侯莘卿薦除太學博士再遷應奉終于翰林修撰累官太中大夫先是正大間北兵突入到廻谷勢甚張平章芮公逆擊之突騎退走填壓溪谷中不可勝算諸將議不定釋之勿追淵請急殱之主兵者不能用後聞北兵狼狽而西馬多不暇入銜始悔不從淵言淵學甚博文甚竒為人軀幹雄偉髯張口哆顔渥丹眼如望洋遇不平則疾惡之氣見於顔間或嚼齒大罵不休雖痛自摧折卒亦不能變也食兼三四人飲至數斗不亂生平慕孔融田疇陳元龍之為人雖其文章號一代不數人在淵仍為餘事耳淵之友高廷玉李純甫亦以竒節自負人號之為三傑云辭曰爾心之勁爾氣之剛嫉惡如仇不問暴强將指出廵靣冷如鐵霜簡所加邪蒿即折才豈止斯兵算又長眼見千里孰曰不明志不獲伸多士短氣其書徒存九原能起埃風四來式脂式韋有髯如㦸妾婦之為我俗之昏誰復繼君茫茫九州敢謂無人雷琯字伯威坊州人志英邁博學能文以薦書從事史館調八作司使初并州李汾與琯同在館中以高蹇得罪琯往送之信陵攜酒酹魏公子墳握手痛飲後去客陽夏以鞭擊酒壺作楚聲歌自言去國十年甲兵滿天地短衣匹馬來自西北將起楚漢間竒才劍客與游而不可得當是時金已遷汴大河以東北盡山東西抵闗輔大軍長驅徙少壯數萬人殺之居庸闗外自黄河洛陽三門析津至丕之源雀鎮凡二千餘里潼闗一帯西南邊山大小闗隘亦一千餘里各分地界統以總帥夜則傳令坐守冬則燃草敲冰兼以闗輔大饑秦民死者相枕藉琯皆悲之作商歌十章冩其情曰秦予父母國也而一至此乎竟淚下不能食乃出竒䇿白宰相宰相不能聽琯去不知所之辭曰北風泱泱海水為竭俯窺神京不隔一髪舉鞭擊壺歌聲愈苦來自西北短衣匹馬我淚既盡以血繼之天門九重曾莫聞知孰秉國鈞我將自薦反謂我狂斥去如箭商顔有芝􅁮􅁮甤甤可以葆神可以樂饑長往不返誰甘幽深赤日在天庶明我心商節婦誄胡翰商先生淵之妻以兵而死于義吾友平仲既為之傳而景濂又哀之以辭皜皜乎白於天下淵也不死其妻矣天下之大義億兆人之所同也而於眇女子見之君子從而與之曰節婦列其事而不原其心則余不可以無言矣節婦之心何心也得之於天而人不與力焉良心也良心也者在臣為忠在子為孝在婦為貞而臣也子也婦也發於其心之所不能己者所謂義也故忠可教孝可訓貞可勸而不能必其果於行唯其不可必奮而為之所以行吾義也故君有不得於臣父有不得於子夫有不得於婦而非教之所能為也百乘不足以為貴萬鍾不足以為富一日不足以為短千嵗不足以為長而於名非有所計也以教為可成名為可榮此君子之論也天下之事出於擬議者患不能致果利害之際一髪不容不幸而動焉其心二矣故天下之士砥志礪行臨事而摧衂者多矣而名節之美著於尺籍編伍之人出於人之所不虞又其著者則窈窕婉孌閨闥之秀而確乎其不可奪毅乎其不可囘若節婦者是也方事之殷軍士之所利者貨寶耳女婦耳一旦奄至于邑而淵之家骨肉不暇顧為節婦者逃則不脫止則汙辱遂溺而死固其所也於死而得其死義也自靖而已自靖也者心之所安也節婦亦得其心之所安而已兵興以來吾鄉類是者往往有之呉履之妻死於自溺賈誠之妻死於自溺姜氏之女死於自刎童氏之婦死於自刎張氏之妻若女俱死於自刎此余所知者一日之間死者數人何其烈哉呉之妻謝賈之妻宋猶曰儒者於家有所聞習之有素也若姜氏童氏皆里巷富人非素有聞而積習者猶曰富人知所貴重可也若張氏者家不過編伍業不過牧圉一旦聞難其妻死之其二女死之其㓜方笄又刃而死一家死者四人焉吾以是知天理之在人心不可泯彛倫之在天下不可易無貴富貧賤等耳生不愛其身死孰計其名無所為而為之者也自夫人之没今二十年矣唯宋氏謝氏嘗有列其事而見於紀載者他固寥寥然矣余於是取之附著於此其居不同鄉其生不同族其死義之心一也天下之為人臣為人子為士君子者誰獨無是心其可徒歆動於節婦之風哉余雅辱交於淵故著明其義為誄以泄其哀思焉節婦名真張氏與淵皆嵊縣人誄曰有猗者蘭兮繁霜其悴之有瑳者璊兮烈火其熭之雖則熭之彼則遂之固天也畀之師山鄭先生哀詞汪仲魯師山鄭先生名玉字子美隱居講學善為古文或以黄犢駕小車人或笑之識者竒之嘗構精舎于里之師山其堂曰三樂踞岡為軒曰極高明集諸朋游討論春秋筆削之㫖為之註釋曰春秋闕疑至正甲午朝廷用大臣薦遣使以翰林待制召先生起而拜命柬書就道道中疾作遂還山適大軍駐吾新安遭謗捕入郡不屈而死卒以節義顯名列史傳仲魯辱知愛者毎過山下仰睇羣峯遺址如昔草樹凄迷豈勝悲慨抽辭哀些敬酹一觴其辭曰遡練溪之寒瀬兮睇師山之崇崇仰三樂堂之遺址兮森莽莽之荒叢念昔松篁茂鬱兮奐堂構之方新友朋紛其來集兮濟冠佩之如雲繄先生之剛直兮懼師道之莫立也申義利之辨兮謂聖賢可企而及也春秋述而闕疑兮易經傳而有成釣岑山之深峻兮牧西疇而偶耕方遊息而玩樂兮遹四海之霆驚詔倐降九重兮徵待制于翰林宜弭亂之有䇿兮闡治教於來今曷半途而遽疾兮返乎吾故鄉豈終不能以有逹兮孰若遂初心之遁藏慨浮雲之萬變兮亶不可測也名匪為身累兮義之歸乃吾責也情沉鬱而靡申兮蔽而莫之白也從容就死兮吾心安而理得也吁嗟先生既往兮節義昭猶日星名存史冊而不亡兮粤千古而彌馨徘徊兹山兮揉草木之羣榮酹清觴而灑涕兮惻林鳥之悲鳴夏尚之太史哀辭有序蘇伯衡我師克燕㧞其知名士赴南京既而其類輩復官王朝太史夏君獨以老病乞歸且歸㑹遣使分道搜訪元史乃强君如江廣君辭不得命乃行行至番禺以疾卒二年冬十月十二日則卒之嵗月也君名以忠字尚之世家袁州宋孝成恭后父族也曾祖自得鄉貢進士受業番昜陳克齋先生先生師徽國朱公其所緝問答語錄世傳焉自君以上皆世其學君蚤有譽于鄉年四十餘始用襲封衍聖公克堅薦授孔顔孟三氏子孫儒學正危公素之治田雄霸辟君以為副轉惠州教授改涿州照磨丙申秋燕都開設流寓科君入就試中其科擢翰林國史院編脩官調國子助教遷太史院都事方君田雄霸時伯衡北遊得一見君道上不聞問垂一紀比相見南京情誼之篤乃若久要者間嘗語伯衡曰吾自分老死于燕不復上先人邱墓去家時少子正年甫十二荐更喪亂家􅀈母又死無誰為教恒恐其失學隕先緒今名在俘籍不能即死誠可愧然聖恩寛大旦夕且得歸守塋域教子讀書以終吾餘年可謂不幸之幸哉抑吾平生好為詩多至千百篇兵後片楮無復存今雖耄矣歸訪故老於山椒水澨追維疇昔江山人物睠焉若夫悲思感慨托聲詩以寄吾志亦安能已乎行當録以遺子子為我序之則我盛年之作雖不得齒猗那清廟之什而吾衰暮之詞或者得與麥秀黍離並傳焉嗟乎言猶在耳而君竟死矣此其有足使人傷悼也夫此其有足使人傷悼也夫乃為楚歌以哀之辭曰嗚呼夫子之好脩兮胡遭時之棘艱飄風忽其烈烈兮白日薄乎西山服南冠之峩峩兮旅膚敏以南遷包羞而競進兮既非余心之所安歛退而自放兮又縶維而莫余捐奉赫赫之明命兮備使介於炎方凌大江之浩淼兮道忽經夫故鄉萍之川兮湯湯袁之山兮蒼蒼山川宛其如昨兮何世故之不常問遺民於舊墟兮慨星辰與木霜思少留而弗獲兮遂悠悠以南行厯大庾之嶔􅲝兮泝隴水之砅砰雈與莽其蓊薈兮羅蜮穴而臊腥神惝恍以内傷兮氣飮赩以外嬰曾日月之幾何兮竟魂釋而蜕形嗟夙志之莫申兮即長夜之㝠㝠亂曰芝為蓋兮槿為輔仍子陽兮羅浮層城慌惚兮阻以脩不死之藥兮矧可求𦍑胡為兮海之陬颺轟轟兮為霾為雩叢薄黯黯兮有蛇兩頭海之陬兮不可以久留魂歸來兮無離郵晞汝髪兮臥龍洲洲之上兮鬱松楸魂不來歸兮使我心憂弔唐應舉文迮雨先丹崖而死濠兮余不知其萬一後衆人而弔丹崖兮慨予懷其孔䀌咸瞀亂以自底于亡兮鮮斯人之靡忒心正直而守經兮寄耝耰於豪墨既謫佃于瞿相兮敢外耕以為食擯長裾而短服兮雜野處之恒農寒雨泣濇肌皺兮炎風扇毒而乾中悲天命之困窮兮萃多屯於厥躬常柔不能以覬免兮胡剛儇之可容彼貪婪而獲戾兮不自靦其憧憧餘賄賕於胠篋兮傭彊予而猶豐顧吾室若縣罄兮瀕百死抑何愆祿固不充於區釡兮禍乃深於九淵笯祥鸞而就瘦兮肆跛鼈之跚跚思古人若或有之兮豈今兹之惟然幸不汚於掩骼兮子函骨而南還庶情事之既衰兮又將萃其遺編抑丹崖其不死兮文幾絶而復傳孰幽明之道阻兮諒斯言之不可宣哀唐衢辭有序王逹唐衢韓公退之同時人也性耿介落落有大志不妄與人交人亦莫知其所負衢於學發憤研究不少自廢然累舉不中人咸笑之衢則不以為意也衢能詩詩多悲思激烈而感創讀之使人慨然有動於中衢往往見人文章有傷激者必大哭涕泗滂沱而弗能已每與人言論既别發聲一號音韻嗚切聞者莫不為之酸鼻人皆以衢善哭而不知其所以哭也獨退之識其人贈以詩曰虎有爪兮牛有角虎可搏兮牛可觸奈何君獨抱竒材手把鋤犁餓空谷當今天子急賢良匭函朝出開明光胡不上書自薦逹坐令四海如虞唐退之之意詎非以衢之才逈出一世而反不逮乎𤨏𤨏者邪樂天亦有詩曰賈誼哭時事阮籍悲路岐唐生今亦哭異代而同悲而樂天以誼之才方衢矣舊史附衢於退之傳後新史則又削之何君子之命薄者有若是之不偶哉吁有人負竒才如賈誼當世既莫知之後世又莫知之不既深可悲乎使無退之樂天則天地間空生此材矣是以君子貴成人焉夫有道者讀退之樂天二詩深嘆衢之不偶作哀辭於千載之下炷香盃酒酹衢於千載之上仰天大慟衢其知邪淒風西來吾知衢不能不知我心也辭曰蘭生於幽谷兮為衆穢之所翳玉産於崐岡兮以碔砆為同類匪良玉之靡良兮寡不能敵衆嫭之聮勢衆勢之聮兮固已密比而難攻此芳馨之潤潔兮幸不掩於匠目之與春風衢乎衢乎爾材雖竒兮何造物之靡通但千載之下識衢之𢎞闊兮頼樂天之與韓公世之媕婀讒嫉擠人於極地者讀二公之詩兮烏知其不額泚而心懜弔國使王翰林文張紞皇明建號之五年洪武壬子羣雄耆定光嶽混合乃睠西南獨阻漸被詔翰林待制臣褘為正使往諭之時雲南元之庶裔梁王與漠北通連聲勢相倚既聞命依違不决越明年冬有使自漠北來待制公遂遇害又八年辛酉天兵南下踰年壬戌雲南平平之日紞備員政閫至則詢公之遺事知梁王禮貎公暨没後棺歛言與伊勒錦合且知梁王柄臣逹爾瑪特加愛重距難前兩月匿公於春登楊氏庇之盡力比北使刼以危言始不克救及蓋棺時土人用浮屠法輿至地藏寺北漏澤園或曰小南門外祝之以火舊謂瘞大佛寺後者非是今再閲十有五年為嵗之丙子第二子紳仲縉來訪公殯思欲見之夢寐驗以血肉而陵谷已非蹤跡無以致其情懇乃至就盡之所撫地長號載其諱字位望以歸紞弔于次仲縉泣且言曰紳在襁褓先子已去家後有書自普定來以續大事記為囑乃此行絶筆悁悁在心竟不得接其影響痛哉天乎夫何不孝至於此極也紞謹以禮慰之曰先王之制即逺而至於墓送終之事盡矣故致孝者不于其體魄而享于廟廟之有主神之宅也今子迎神以返於義為得况青春受謝白日昭只公之魂魄必有已散而未盡者及此時而招之宜其感而遂通不逺伊邇子又何恨仲縉因以公之家乘見示且請更有所言竊惟公以文名擅海内早嵗薄遊迄無所遇此非才之不足也顧其内介而外方者有以齟齬焉其道難進其節不茍非養之有素者不能如此是以一旦渉異境蹈危機奮不顧身聞命即行與顧婢子語不能休者異矣當其鑿空而往䟦渉畏途猶拳拳焉以續大事記為念夫大事記乃尚論古人賢否得失之言也書法精審炳炳如丹然則公之自處又豈有不審者哉故或人雖加蔽匿而義不茍免卒慷慨就死蓋公之致身委命不在於臨難之時而其平日固已判然於胸中矣嗟乎事之不偶乃期運之未至或機㑹之難合君子固有幸不幸焉若遽以成敗為優劣則蘇屬國有媿於陸賈顔魯公與終軍不可同年而語矣其可哉紞既弔祭遂申之以文曰訪前修之遺烈兮在西南之天涯路漫漫其脩阻兮魂杳杳其曷追羅蕙肴與桂醑兮集衆美以為儀藉芳馨以比德兮庶英爽之在兹公之貞潔世所信兮琢白璧為肺腑濯江漢而暴秋陽兮肯自涴乎塵土製雲霧以為錦兮又重之以黻黼擥星辰以耀芒兮宇宙軒豁其在手顧食焉而弗避兮斯大義之所存載使以馳騁兮往振䇿兮南雲嗟期運之未至兮遇諸爨之狺狺彼徒知險塞之可以負固兮又安知天命之維新人固有一死兮死固各以其仁惜芝蘭之見兮終腐朽於荆榛委蟬蛻而不顧兮挾浮雲而上征駕雷車以飄忽兮引翕赫之霓旌逐飛廉而東騖兮厯倒影以憑陵過蒼梧之曠漭兮謁重華而是正愛傅說之有託兮亦徘徊於箕尾望故鄉而掩涕兮予豈能獨昵夫山鬼吁嗟歸來兮公不可以久留悵猿吟與鶴飛兮兩浩蕩而難儔將速返于故居兮寧爾宇之深幽有子有孫善繼而善述兮長致享于春秋自述誄王偁王偁字孟揚其先東阿人宋寶元康定用兵西方士有没于元昊者王氏遂為西方人元有天下其地最後附賜姓唐古氏髙祖王父某從下江淮授武德將軍總管鎮廬州曾祖王父某祖王父某相繼襲爵改上千户没俱塟大蜀山下先府君某當搶攘以材用薦者調民職廬州路治中厯江西福建行省郎中至階朝列大夫潮州路總管當時稱廉吏第一人所涖政績卓異字惠小民攘剔豪右禮賢士植綱紀民奉以祠元運改旺度時不可為浮海去之道閩閩父老遮留退居永福山中為黄冠服者十年朝廷聘之恥為二姓臣遂自引决嗚呼是時偁生方六齡家觳然壁立太夫人守節自誓艱阻備嘗手疏先君之蹟與古今豪傑大畧教之外王父姓劉氏諱某由宣文閣博士出僉閩憲再召入為秘書丞没王事贈嘉議大夫福建行省參知政事其學淹貫靡不究博古好雅翰墨之妙絶當世偁不及見之閩先正聞過齋呉公學行醇偉為士林望與先君交誼相與也先君没時屬偁夫子教之第未弱冠夫子沒倀倀罔依歸頼外王父遺圖書手澤多杜門自研厲少多病負第者三年莫臻其至弱冠入庠序與陳君從範游陳蚤入閩過夫子室獲其指授懇懇汰其瑕礫示以瑜瑾一旦如發蔀矣洪武庚午賓興嵗領薦方去海濱觀光上國㑹試禮部不利例入國子處縉雲朱先生館下日求齊魯士與談訪其遺風及四方之賢者而私淑之上表陳情乞終養高皇帝憫之南歸越震澤徘徊呉㑹間不敢留趨侍湯藥膝下始冀收其實而從範己物故閩故老亦凋剝殆盡四睇毗落無可與語晚得晉昌林誌相與論學假以柯範抗顔為多暇則窮幽極深徜徉物表趣豁如也未幾太夫人捐館舎嗚呼居䘮不敢渝禮既合先君塋廬墓下者六年永樂初元以推轂者至京師待命黄閣因自陳願處學校勵人材不允授從事郎史官翰林檢討進講經筵以文字供職時錢塘王洪擅詞垣與同官一見過相推重勅脩大典萃内外儒臣及四方韋布士毋慮數千人濫厠總裁之列大將軍英公復征交阯辟居幕下於是泛洞庭浮沅湘厯九疑弔蒼梧徵兵南海既而窮象桂道五管觀師于日南九真之交時有贊勴大將軍待以為揖客歸仍守其舊官先娶鄭氏新安人前名御史潛之孫女先卒再娶薛氏閩故族孝養于姑貞淑内得其亮生男一人振女子某一人其次男拱女子某一人側室李氏出也此族系出處之槩少銳志於有為毅乎思凖古以馭今而用弗以施學雖服羣聖獵百家窮幽明亟於聞道而質淪惷杌遇登高弔古慨然發其悲壯愉樂一寓於文若詩而辭愧土苴其為人則似䪥而容似傲而恭家貧而心樂身困而處裕然疾惡太過遇權貴不能俛眉下之任情以直不能骫以徇人成功此其見短於世也見人善不啻若已有之雖匹夫問未嘗不竭以盡與人交内外莫敢攜此則自以為長焉若夫倇以為終身之憾者齓失所怙哭吾父幾不能生粗知學而哭吾師如哭吾之父焉未幾哭吾友如哭吾之師比得祿而太夫人不逮養有子教之未立荷兩朝之恩而莫一舉報嗚呼况兹身繫縲絏西山東陵淆而未分孤臣之號庶女之慟南音之戚梁岼之章孰為發之日者以支幹推定人禍福生死謂吾年日皆庚廸于丙嵗在閼逢麗于鶉火其弗延矣嗚呼其果然邪孟子曰桎梏死者非正命也晝夜之理吾曷念之因述其系而極之以呼天之辭用自誄俾後之為烏鳶為螻蟻在陽侯在囘祿或返其遺骸或招其魂魄或藏其衣冠庶令有考者憫其志而哀之焉辭曰予槩觀夫古之人怙材者恒困於弗施志大者惟顛頓之屢躋嗚呼孟揚矧爾乏古之才而尚其志焉得不竒於時而諉於戾爾負而君爾負而親嗚呼誰其白之悠悠蒼天明文衡巻九十五
