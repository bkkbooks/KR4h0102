body:
  text: 明文衡巻八十九明程敏政編墓誌銘漫士高先生墓銘林誌永樂二十有一年二月三十日翰林典籍漫士高先生廷禮卒于南京之官舍年七十有四其子熟還櫬以塟于長樂縣崇丘里之半占山使致韓府長史楊曜宗狀來北京俾某為詞將以刻焉先生愽學能文尤雄於詩雖談笑奮筆而精思力摹莫及蓋詩始漢魏作者至唐號為極盛宋失之理趣元滯於學識而不知由悟以入自襄城楊士𢎞始編唐音正始遺響然知之者尚鮮閩三山林膳部鴻獨倡嗚唐詩其徒黃𤣥周𤣥繼之以聞先生與皆山王恭起長樂頡頏齊名至今閩中推詩人五人而殘膏䞉馥沾溉者多黃終于校官周顯行曹員外郎先生與皆山並以詩遇今上初二人自布衣召入翰林皆山即除典籍卒先生為待詔九年始陞典籍平生賦詠流傳海内有稾曰嘯臺集曰木天清氣集母慮千餘篇其選唐詩品彚九十巻拾遺十巻議者服其精博能書工畫時稱三絶書得漢𨽻筆法畫原於米南宮父子出入商高間方壺子畫妙貞一初識先生稱賞不寘曰異時當為名家在翰苑二十年四方求詩畫者爭致金帛脩餼歲常優於禄入神瑩氣融襟懷高簡善飲酒喜談謔與人無賢愚新故盎然如一素彊無病晚得風眩疾歲輙發無甚苦一日與故人飲極懽夜分乃寐旦忽眩作弗能言卒考諱駒清才不羈蚤世諡皎白居士妣陳氏宋樞密使洽之孫先生事母孝謹年五十七方貴未幾而母沒娶陳氏先卒塟得佳兆虛右壽藏三十四年乃合塟三子曰熊曰熟曰然五孫曰箕曰唐曰黙曰堅曰莆城先生諱棅字彦恢仕名廷禮漫士其號也實宋尚書張鎮之後曾祖麟以出莅高氏祀復無子取猶子隆為後遂從高姓是為先生之祖系曰呉航山川蜿蟺扶輿是生偉人間氣之符嘯風噓雲山含川嚅乾文坤象隨厥吐舒金石鏘鳴琚珩拱趨他人戛戛已獨于于上追杜李高岑為徒畫船烟埃石經𤣥圃精聚神交􅀈無今古三絶何資一官而旅春夢芸臺晚心棋墅龍門其居樓曰翫宇落月綺裘清風玉麈鴻儀㝠㝠蝣羽楚楚其神天逰而蛻兹土國子博士羅先生墓誌銘周叙國子博士雪菴羅先生致事家居之十有三年年八十二卒卒後十有四年其從子脩齡以義民謝恩至京師乃持刑部郎中致事朱君邦紳之狀屬文誌諸幽且曰曩少師東里楊公歸榮故鄉時先生嗣子世文嘗造謁乞銘公諾之未暇也兹來公方在病前諾恐不敢遂願以為請叙惟先生文學足以淑後進德行足以表當世出處進退之節足以追配古人高年宿望邈焉寡儔宜得如少師者執筆顧叙敢當斯寄辭焉而脩齡之屬益堅憶永樂初元侍學家君大學時先生官學録家君官學正同官同舍相處幾五年家君恒前輩事之叙亦獲承教焉六館中求如先生者不二三人也蓋知之深莫叙若矣於是忘其鄙陋序次之曰先生諱恢字師程姓羅氏世為吉之永豐人以族望於鄉郡曰湖西宋末武岡教授開禮勤王死難丞相文公制服為文祭哭之事載史傳其六世祖也曾祖廷植祖建德父伯禹俱業儒世其家先生自幼頴敏五歲失恃既丱力學居父喪哀毁骨立襄事唯謹事兄如父敬愛篤至鄉里化之洪武癸酉領撫之崇仁儒學司訓聘嚴師弟子禮勤於化導凡經造就者悉得為聞人嘗上疏言孔子廟庭從祀當以道學論當時有若優於宰予論語記有若言行者四皆有禆於世教記宰予者亦四皆見責於聖人宜以有若居十哲位次而宰予居兩廡公伯寮沮壞聖門不宜從祀蘧伯玉孔子之故人行年六十而化今居兩廡六十位次之下未當宜例陞啓聖王廟疏奏不報其持論正大多類此秩滿膺薦入史館與纂修太祖高皇帝實録竣事賜白金文綺陞國子學録師範端嚴道德益高前後相繼受業者千餘人永樂初太宗文皇帝幸太學受襲衣之賜滿考遷博士又六載以年七十陳乞致事時車駕巡幸北京仁廟在東宮監國朝臣致事者率未得請為遣使上聞得旨俞允時論高之司業呉公嘗逰先生門率六館寮屬諸生數千人祖送之觀者填道時人莫不為先生榮既歸謝絶城府迹日與宗戚故人優遊山水觴詠之適而詩書之訓考索之勤未嘗少廢間與族弟某掇拾先世遺文暨族譜考訂修輯梓刻以傳於家事澹然弗顧也先生德性忠厚儀矩端莊望者敬畏孝於奉先遇忌辰時祀輙感愴泣下誠於接物於人無疎戚長幼言行表裏如一一日忽召子孫語之曰吾今日覺神不守舍吾其將逝乎時天初曙令啓户視之有頃而終平生遺稾有居田録寫心稾歸田録藏于家其養氣之功蓋如此其生以元至正庚寅二月一日沒今宣德辛亥十一月廿三日以沒之歲十二月某日塟撫之樂安四十二都大塘坳祔先兆也母王氏繼母劉氏知溧水縣劉鈍菴之女俱有賢德配蘇氏内行克備先十年卒子一人世文孫男三人轅輗䡄孫女一人曾孫男九人時曉㫰曛昕昪暟昇旵𤣥孫一人瓘銘曰顯允羅氏代有聞人粤宋季世武岡益振興師勤王復其鄉縣烈烈忠精之死不變猗歟先生武岡裔孫再振厥華有德有言起教黌宮登薦館閣羣材彚興直筆輝焯亦有奏疏聖門示評言雖弗試大義孔明遷秩成均十年乃調赫赫文名翼翼師表仕豈論達道高者稀年至乞身超然其歸豈無歸者壽考能幾先生家居黃髪兒齒優遊泉石八十二年令德考終清風穆然嗟予小子敢當銘誌庶幾後來有考其世故資政大夫靖江相府右相李公墓誌銘陳璉公諱質字文彬號樵雲姓李氏其先開封祥符人在宋季有仕于德慶者因家焉公生頴悟有大志蚤知嗜學經史子集無不讀讀輙記憶既長遭元季多故與時落落不合遂家居不出日與弟文昭放情山水以詩酒自娯居無何中原擾攘嶺海多事公起搆義兵捍鄉里及德慶路陷士民遑遑無所依戴推公入守之日夜浚城隍繕甲兵扼險要以遏他寇由是一路賴之以寧時據鄉邑者多刻剝殘忍公嘗戒麾下非遇敵母妄殺或執敵人來獻率給衣糧縱之家雖富饒急於賑施三族與鄉里流寓之貧者咸有所仰以故一時名士如建安張智茶陵劉三吾江右巴延子中羊城孫仲衍王彦舉皆聞風來歸及大明皇帝定鼎金陵遣師南討洪武戊申四月平章廖公永忠叅政朱公亮祖總師至公遂散麾下全城歸附總兵遣使入奏上嘉公忠誠召至慰勞再三賚予優渥就擢中書斷事越明年己酉轉都督府斷事階奉訓大夫皆能執法丞相都督咸敬憚之五年壬子授刑部侍郎階中順大夫尋陞本部尚書階嘉議大夫尤慎於刑獄盡哀憐之情致淑問之頌寛猛適中為上所知日益親幸時開行省於浙江上念厥地素重號稱難治宜簡廷臣有德望才器者往綏之即拜公浙江行省叅知政事階中奉大夫是年秋九月也下車首以承流宣化為巳任振紀綱正風俗勸農桑興學校舉遺賢卹民隠知無不為為無不力居三年惠流兩浙厥績以懋聲聞于上天子念公老召還致政于京師嘗入見賜坐便殿訪以時政得失直言無隠上益重之八年乙卯冬十月復起為靖相府右相階資政大夫有勅奬諭甚至公益思竭誠以盡輔導之職嘗入覲因奏乞歸省先隴上可其請王親揮翰賦詩以賜復命藩憲元僚與府中官屬宴餞漓江之滸人莫不以為榮後王坐事去國公隨終焉公美風儀性孝友治家有法接人以誠雖極顯榮情素冲淡暮年尤工於詩有樵雲集若干巻生於元延祐丙辰三月十一日卒於洪武庚申閏五月某日初權厝金陵聚寶山後某年某月某日歸塟鄉之清秀里布山之原祖廣孫累贈嘉議大夫禮部尚書父熈春累贈中奉大夫浙江行中書省叅知政事祖妣孔氏贈淑人妣林氏贈夫人公凡三娶先梁氏次石氏俱贈夫人汪氏封夫人弟文昭學識優長隠德弗耀子四人曰恒曰震曰復曰熈皆知學好禮惟震有詩名孫男四人公瑾公瑜公瓛公玖女三人梁仕貞梁明理嚴公敏其壻也孫女二人次第公之行實來速銘者即震也於戲自元綱解紐海宇兵爭乘時奮者莫不剝下自封樹威肆毒少知推一毫為利人事公能仁其族屬以及於衆視彼之暴豈直相萬哉及一時與公全城來歸者鮮克有終惟公踐歴中外官至卿相忠義著朝廷聲名滿天下勲垂竹帛德在人心五福備膺子孫蕃衍非先世積善之深公存心之厚何以臻於是耶銘曰嶷嶷李公世為粤人積善既久鬱而未伸族大而蕃實自公始值元鼎沸保障鄉里公之庇民如室斯宇公之好賢誠出肺腑聖明御厯威讋四夷公散其徒全城來歸帝嘉厥誠錫以禄䄮尋陞秋官克殫忠赤後叅大政于浙之中威德交孚聲聞上聰致仕于朝出于寵渥時有敷陳多所裨益逮居相國有諤其言直雖不容此志則完之身云亡之德弗替慶流綿綿式延後裔清秀之里布山之阡勒銘貞石垂美萬年明故榮禄大夫少保戸部尚書兼武英殿大學士諡文簡黃公墓誌銘陳敬宗榮禄大夫少保戸部尚書兼武英殿大學士黃公既致政壽八十有三以正統十四年六月三日終于正寢其仲子中書舍人采奉翰林修撰周公旋所述事狀致書於予而以墓銘相屬敬宗門生也安敢以不敏辭按狀公諱淮字宗豫别號介菴温之永嘉人其先世諱衮者仕宋御史檢法歷世皆有文學之官至諱通者公之祖也通生性字思恭公之父也元季方國珍據于温思恭懼玷偽官遂遁跡不出退號靜菴妣王氏公自幼即有經世之志年十二鄉學師命賦荷花十四充邑庠弟子員臬司官命賦挑燈杖詩語皆出奇驚人於凡經史性理之學儕輩罕能及者遂中洪武丁丑進士二甲除中書舍人勤慎周密於職務無所不舉歲壬午太宗文皇帝入正大統首蒙召見訪以大政深稱意旨即命入翰林凡侍朝特命解公縉與公立于御榻之左以備顧問上以萬機叢脞日御奉天門左室毎夕召公語至夜分上或就寢則賜坐榻前論議機密雖同列不得與聞已而命居内閣專掌制勅又選胡公廣楊公士奇楊公榮金公幼孜胡公儼與之同事是年秋陞公編修繼陞侍讀永樂改元之明年甲申二月㑹試天下士上命解公與公為主考得曾棨等四百七十二人徹棘入覲上以得才之多為之甚喜上欲立東宮密預問公公曰立嫡以長萬世王法上意遂決三月冊立皇太子命公為左春坊左庶子兼侍讀賜袍笏寵眷日隆丁亥陞右春坊大學士仍兼侍讀進講東宮啓沃良多復勅兼輔導皇太孫戊子上巡狩命公及尚書兼詹事蹇義金忠諭德楊士奇留守諭之曰朕留汝四人居守猶唐太宗簡輔弼監國必付房𤣥齡卿等其識朕意己丑春車駕啓行明年庚寅車駕親征邊塞適長沙妖人李法良作亂皇太子命豐城侯李彬率兵勦捕而漢王設疑沮之皇太子以問公公曰豐城老將必能成功兵貴神速宜亟遣以掩其不備既而法良就擒一如公言公以疾在告皇太子命内臣問安復遣院判蔣用文視醫手書略曰卿其勉進藥食早獲康安以慰予懷是年秋聖駕還京皇太子遣公迎駕下滁州謁見上喜與語良久壬辰誥封公父奉政大夫右春坊大學士母妻皆封宜人癸巳車駕再巡狩公留守如故時漢王潛蓄奪嫡之志忌公獨深日夜窺伺間隙流言監國之過公遂不免一滯十年處困中惟日賦詩以自遣形於詩者無非引咎責躬之言名曰省愆集又即人情變態之機寓之於言名曰自省録甲辰仁宗皇帝嗣位遷公通政使兼武英殿大學士仍領内閣事辭不允丁太夫人憂乞守制不許特命乘傳奔喪洪熈改元陞少保戸部尚書兼武英殿大學士階榮禄大夫復辭不允命三俸兼支力辭尚書俸許之賜勅褒嘉上手增誥文二語曰勿謂崇高而難入勿謂有所從違而或怠蓋切於求助也曾祖祖贈皆如其官妣贈皆夫人父封如其官母封太夫人妻夫人是夏上不豫時皇太子往南京省謁孝陵遣使召還既而宮車晏駕羣情洶洶公及少傅二楊公佐鄭襄二王監國憂勞至於嘔血及皇太子還京即位大事始定宣德改元八月漢庶人反上率師親征以公多病留佐鄭襄二王監國公夙夜在公至班師方歸私第疾益甚命太醫院使徐叔拱胗視病少瘥即上疏乞骸骨不許固請始令歸田養疾賜楮鏹萬貫陛辭加賜萬貫于時公之尊府靜菴先生壽八十有九公年餘六旬恪供子職彌謹弗懈先生沒上遣禮官賜祭命有司以一品禮塟既襄事公拜恩闕下上寵留累月賜遊西苑命公侯伯師傅尚書學士十一人陪焉仍召公之子采從行公乘肩輿登萬歲山賜宴山之麓翌日獻詩以謝上大恱比辭宴餞于太液池親灑宸翰製詩送之給路費賜金織紗衣一襲且諭之曰明年朕生日卿其復來明年如期入覲上寵眷宴賜之禮有加於初九月辭還又明年上崩今太上皇嗣位公入朝進香上嘉念舊臣寵賚優厚留月餘辭歸公在永樂初知無不言言無不聽嘗有告黨逆者公言於上曰洪武末年已有勅禁革不宜復舉從之而大獄遂息靖難師後吏部例以南人官北土不効順者奏編行伍公曰近有勅旨征討官與舊官事同一體若復追罪南人與勅旨相背上即罷之斯時阿嚕台既納欵欲收北邊吐蕃諸部聽其約束請朝廷刻誓詞于金錠集諸部長磨酒飲之以盟公曰國家控馭逺方使各自為心則力易制若併為一則力大難制矣此舉實其奸謀也上顧左右曰黃淮如立高岡無逺不見爾等如立平地所見惟目前耳西域大寶法王初至京上欲刻玉印賜之以璞示公公曰朝廷賜諸畨制勅所用不過勅命廣運二寶今此璞大於二寶邊人將謂法王尊於朝廷也上甚嘉之至於命讞疑獄而疑獄無寃命議鈔法而鈔法無弊其識見尤為人所不及嘗讀廷試巻於上前同列有不直者公必正色直之不少隨順於是人有目公為太認真者公亦不少變也及謝病歸田里杜門却物不接世故者二十餘年所著文有介菴集歸田藳藏于家配夫人楊氏淑德懿行儀于閨閫側室李氏子男三長棐次采即中書舍人次槃女一在室孫男五珣瑜㻞珪璨孫女五曾孫男一訃聞賜諡文簡命禮官祭者九有司賻塟如制以年月日窆于邑之德政鄉大羅山之原從先兆也為之銘曰惟周三公視古百揆公不獨立三孤以貳爰副燮調益𢎞化理維寅維亮公寔職此皇躬是保百辟攸式寵顧雖隆小心翼翼視草玉堂高文大冊六經黃麻有典有則獻替密勿日于帝側定䇿安邦宣慶布德廟堂柱石薦紳蓍龜維鹽維梅鼎鼐是資列聖眷倚心膂股肱功在社稷福及蒼生掛冠廿年乘化奄忽生榮死哀無間存沒大羅之山鬱乎佳城勒銘閉幽百世其寧故沐夫人方氏墓誌銘夫人諱某字某姓方氏世家台之黃巖叔祖國珍仕元金紫光禄大夫浙江等處行中書省左丞相太尉衢國公父復初由忠翊校尉知黃巖州事厯陞榮禄大夫浙江等處行中書省平章政事推恩贈其高祖宙曾祖震亨皆越國公高祖妣潘氏曾祖妣周氏皆越國夫人祖國馨蔡國公祖妣陳氏與榮禄之室鮑氏並蔡國夫人鮑生夫人聰慧孝順甚為父母所鍾愛年十九為國朝黔寧昭靖王側室夫人生長名族又獲承接大家心益𢎞明事王與主壼耿夫人恪謹柔順終始不失上下禮節處一家尊卑間謙恭温和靡不順適生子昻有文武才能為右軍都督府右都督翊賛其兄黔國公藩鎮雲南積有勞勩故朝廷賢其子之才特賜誥命封為夫人夫人愈益恭謹無纎毫自矜之色凡在閨閫莫不益重夫人之賢享年八十有二正統四年正月二十五日以壽終子男一即昂孫男五僖俊佐仲佑孫女三長適成國公朱勇次適右府右都督陳玫曾孫二璘瓛曾孫女一夫人既終昂在雲南昂之異母弟駙馬都尉昕夫人期服子也率僖等奉襄大事惟謹卜以是年閏二月二十三日祔塟于江寧縣長泰北鄉觀音山元王墓側銘曰婉婉淑姿穆穆令儀𦙍慶顯宗勲閥攸歸爰副主壼左賛右翊敬嗣徽音克恊懿德督府有子出靖南邦恩及本源封誥煌煌副筓六珈寶鈿珠璧服兹命服寵光赫奕既壽且貴五福具臻勒銘閟幽於昭千春道㑹林君剛伯墓誌銘吳訥嗚呼自周衰道廢民散之後異端雜說紛焉競起迨漢晉而降則唯老佛之徒為盛老氏本周柱下史未嘗毁形滅姓世之儒生因或寄迹其中如唐魏文貞公𤣥成鄴侯李公長源率能不逺而復建功當世後之君子所以稱為振古人豪也歟其或抱負材器拘其法而弗能出若吾鄉林君剛伯者可不為之深惜也哉剛伯林姓名復剛伯其字也上世居福之長樂高祖松洲宋末宦遊常熟遂家焉曾祖諱近思祖諱脩德皆任元州學學職父諱大同號範軒國朝任開封府儒學訓導生三男子而剛伯居長甫成童五經四子皆成誦弗忘年十七出教陸氏龔氏家塾篝燈自課夜分始就枕時範軒患耳瞶母氏亦衰病適邑中始建僧道官清溪道士尚守謙領道㑹職謂其徒曰吾教際時休明然匪資於儒則何自而興哉遂延剛伯以儒書訓其徒孫張仁靜等剛伯樂其閒靜可以棲身飬親乃請父母欲託身其教父母許焉清溪聞而喜曰吾教得是人必興吾當身任之遂録為弟子改名復真給祠部牒為道士時剛伯年已二十有四矣永樂中舉至京脩勸善書永樂大典繼往龍虎山校正道書嗣四十三代張真人宇初暨其弟四十四代宇清推其學為教中第一號曰𢎞文輔教高士永樂九年選任道㑹復取赴北京修道藏經以老疾辭歸宣德壬子秋得肺氣疾瀕卒呼其弟長子宗授以所作詩文十巻囑付後事且命求舊交計嗣先生作行狀詣予乞銘既卒宗遣价奉狀來謁嗚呼予少與剛伯生同里曩範軒致政家居予恒持所業求正退即與剛伯講求古今述作之懿去年以書求較正乃翁範軒文集豈意今年遽聞其死乎嗚呼剛伯所學多有過人者使其弗汩于彼教其能亢厥宗以增輝此道也必矣惜乎此之失而為彼之得予寧不為之深惜也哉昔者昌黎韓子序贈衡山廖道士稱其魁奇多藝因致惓惓憫惜之情廬陵歐陽少師亦嘗為故人明因太師記其始終言行于塔是則予於剛伯之墓寧忍弗銘也耶剛伯生元至正乙巳沒于宣德七年某月某日享年六十有八是年某月某日窆虞山隂銘曰此其失乎而彼其得乎而吁嗟其可惜乎而明故曉菴法師塔銘楊溥師諱善啓字東白號曉菴俗姓楊氏蘇之長洲人五世祖慶宋發遣常州主管學事贈左朝奉即家呉之支硎山值兵徙北郭父永年性好善稱楊佛子母陸氏師甫能言通佛典父母異之命入無量壽院禮永荗院主為浮圖既長屏迹龍山窮日夜力于經史百氏不輟聲譽隠然日起少師姚公廣孝善世洽公南洲皆器重之而典記於洽公者甚久永樂元年薦主蘇之永定寺六年主松江延慶寺逾年擢本府僧綱司副都綱尋應召纂修永樂大典預校大藏經賜金織袈裟衣一襲時三殿災詔求直言師上疏陳利病不報内交沈少卿民望王侍講希範王賛善汝玉陳檢討嗣初益深造詣而與璧菴完公輩往還有江行倡和詩一巻與甫里趙公宗文酬倡尤多歲遇牡丹開時必盛集題賞錢唐瞿公宗吉雄於詞賦嘗用一韻往復幾百首而詞鋒益銳海内皆傳焉正統八年十一月八日卒距洪武三年十一月十五日世壽七十五僧臘六十以其示寂之歲十二月二十三日弟子慶暲等與其姪旻昇奉柩歸塟于舊隠之龍山遵治命也既塟且二十年而溥於塔銘尚未之作者志蓋有待乎叨居侍從之列利澤不加于民空言無補于世則亦負師期望久矣兹使交還獲訪墓于龍山下見其塔銘尚虛以待之則溥亦何待而不言哉夫以交之深者知必至也言之夥者情必厚也昔宣德間大理卿胡公槩巡撫東呉威聲大振而於師獨加敬禮時溥方冠欲應鄉舉謁公師忽見而喜之遂入白于公得預鄉舉然溥亦始聆論議察其動止毅然一儒者由是往還日就欵洽數日不見必折簡招之簡類歐語作字有帖意見必肅衣焚香啜茗坐語移時去則且談且送雖草草禮亦不廢或閉戸發篋出古人真蹟對閱評品如論宋仲温陳文東二先生書宋筆正鋒陳或偏鋒故宋優于陳呉中稱高楊張徐為近代四傑然季迪衆作皆得體如律倣劉長卿選兼韋應物皆人所不到宜其為最文則喜栁宗元遇有作必朗誦數篇得其意趣然後下筆而詩則宗季迪也然皆不務蹈襲以為奇至論儒釋之辯曰且各為其教又曰東魯垂道西竺見性皆莫先於厚本故雖離父母而養生送死率從厚與兄弟極友愛撫諸姪教養兼至而交四方宿儒名緇必以誠未嘗見懈體惰容然非其人亦未嘗一與之交此韓子謂墨名而儒行王文正謂此失之而彼得焉宜為法門之僅有吾人之願交也而況溥也荷師期待既久不亦知之至而情之厚哉倘以餘齒無負于斯世則亦無負於所知矣姑書此以與其徒慶暲等刻石于墓而且系以銘曰唐有師暢曰喜文辭宋有惠勤亦號能詩暢由韓子儒行以彰勤藉蘇公得附歐陽顧今東白有學有德旁邃詩文兼此二釋豈無韓蘇俾世有聞我何人也敢預斯文龍山之陽齊闉之北寂焉淵焉于此埋玉奔走幾年始遂弔謁有言莫酬庻永其碣明文衡巻八十九
