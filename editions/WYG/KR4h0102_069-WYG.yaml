body:
  text: 明文衡巻六十八欽定四庫全書明文衡巻六十九明程敏政編神道碑大明追封揚王神道碑銘有序宋濓皇帝恭膺大寳式展孝思既追崇祖宗四代帝號建立太廟復念皇太后之所自出追封外王父為揚王外王母為揚王夫人建祠於太廟之東歲時遣重臣致祭近有来自淮隂者言王墓在盱眙如故上聞之悲喜交集即詔内臣及圜丘署令往祭而修治之寘灑掃之戸凡三䕶視塋域且命詞臣撰文以樹諸神道臣濓伏讀御製王之行若曰王姓陳氏世為維揚人不知其諱當宋之季名𨽻尺籍伍符中從大将張世傑扈從祥興帝駐南海至元己卯春世傑與元兵戰師大潰士卒多溺死王舟亦為風所破幸脱死達岸與一二同行者累石支破釡煮遺糧以療飢已而糧絶計無所出同行者曰我等自分必死聞髑髏山有死馬共烹食之縱死亦得為飽鬼不識可乎王未及行疲極輒晝睡夢一白衣人来謂王曰汝慎勿食馬肉今夜有舟来共載也王以為偶然未之深信俄又夢如初至夜将半夢中髣髴聞櫓聲有衣紫衣者以杖觸王之胯曰舟至矣奈何不起王驚寤身在舟上見舊所事統領官時統領已降於元将元将畏舟壓凡有来附者擲棄水中統領憐王亟藏之艎板下日取乾餱從板隙投之王掬以食度王之渴乃與王約以足撼板王即張口向隙受漿居數日事洩皆徬徨不自安忽􅄓風吹舟盤旋如轉輪久不能進元将大恐徧求於禜祈者不可得統領知王能巫術遂白而出之王仰天叩齒若指麾鬼神状風濤頓息元将喜因飲食之至通州賚王數鉅魚送之登岸王歸維揚不樂為軍伍避去盱眙津里鎮擇地而居以巫術行王無子生二女長適季氏次即皇太后晚以季氏長子為後年九十九歲而薨遂𦵏焉今墓是已臣濓聞之君子之制行能感於人固難而能通於神明為尤難今當患難危急之時神假夢寐挟之以升舟非其精誠上通於天何以致神人之祐至於斯也王之羣行其詳雖若不可知舉此而推之則積徳之深厚斷可信矣是宜慶鍾聖女誕育皇上以啓大明億萬年無疆之基於乎盛哉昔者史臣賛堯之徳首以親九族為言其效至於黎民於變時雍之盛然九族之中母族居其三皇上以念母之故思王不能忘封以王爵享以祠廟今又樹碑墓道以紀其異行是皆以孝治天下也将見四方嚮風咸知以孝自勉皥皥熙熙以致隆平之治不難矣臣濓既序其事復再拜稽首而獻銘曰皇帝建國克展孝思疏封母族自親而推錫爵維揚地邇帝畿立廟崇祀𤣥冕衮衣痛念宅兆卜之何墟閭師来告今在盱眙皇情悦豫繼以涕洟即詔禮官汝往葺治母俾蕘豎跳踉以嬉惟我揚王昔𨽻戎麾獰風蕩海糧絶阻飢天有顯相夢来紫衣挾以登舟神力所持易死為生夀躋期頤積累深長未究厥施乃毓聖女茂衍皇支蘿圗肇開鴻祚峩巍日照月臨風行霆馳自流徂源功亦有歸無徳弗酬典禮可稽聿昭化原扶植政基以廣孝治以惇民彞津里之鎮王靈所依於昭萬年視此銘詩明故勅賜銀青榮禄大夫上柱國中書平章軍國重事兼太子少保鄂國常公贈翊運推誠宣徳靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王諡忠武神道碑銘有序洪武二年己酉秋七月七日銀青榮祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公薨于軍中二十三日訃聞皇上為之震悼罷朝在庭之臣莫不灑泣越明日詔中書定議贈翊運推誠宣徳靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王諡曰忠武八月朔日柩車至龍江上往臨奠慟哭而還親為擇地於鍾山草堂之原營建宅兆及棲靈之祠凡百須之具一給於官不以煩其家至冬十月九日始葬復推恩及其三代皆為王爵生榮死哀可謂至矣上猶念其功不寘召臣濓于庭而謂之曰朕東撫髙麗西抵吐蕃北際沙漠南来交趾占城莫不稽首奉命計其開拓之功以十分而言王蓋居其七八朕今手錄戰伐次第以授爾尚為文勒諸豐碑以著王之功於無窮焉臣濓受詔而退謹再拜序而銘諸幽王諱遇春姓常氏濠州懐逺人世為農家賦性剛毅膂力絶人歲壬辰羣雄並起江淮為之鼎沸時王年二十有三為羣盜劉聚所得聚覩王状貌奇偉㧞於行伍而信任之王毎出戰必鼔勇争先聚深喜之王察聚所為終不能有成欲擇所依乙未聞上駐兵和州領衆數十人棄聚来歸居兩月餘請為前部先鋒上曰爾之来者為士卒糧絶故就食耳爾自有主我安得而留之王請之再三至於涕泣上曰爾姑從吾渡江俟克太平委身事吾未晚也夏六月上先抵采石磯元兵陣於磯上而磯下巨舟如織相距僅三丈餘猝難登岸王乗快舸相繼而至上麾之使前王即捨舟挺戈先登衆皆披靡遂㧞采石乗勝取太平從上守禦乃始授總管府先鋒冬十月陞管軍總管丙申春二月元中丞曼濟哈雅復以兵屯采石南北不通上慮将士雖渡江而其父母妻拏尚留淮西勢莫可致命王綂兵攻之王至設疑兵以分其勢而以正兵與之合及戰别出竒兵𢷬敗之悉俘其精鋭自是元兵扼江之勢衰矣尋守溧陽攻建康功為諸将先三月從今大将軍右丞相徐公達克鎮江夏四月授承信校尉領軍先鋒秋九月再攻常州㑹有軍叛去與偽吳張士誠合徐公被圍於牛塘王與諸将力戰大敗其衆擒士誠梟将張將軍冬十有一月除統軍大元帥丁酉春三月遂克常州遷中翼大元帥夏四月從徐公下寧國秋八月克馬䭾沙冬十月取池州戊戌春擢江南行中書省都督馬步水軍大元帥冬十有二月上親取婺州己亥夏四月轉鎮國上将軍同僉書江南等處行樞宻院事守婺城尋命攻衢州降之冬十月陞僉院十有二月攻杭州庚子夏五月召還京師從徐公㧞安慶趙普勝之水寨時偽漢陳友諒揚言㧞安慶王䇿其必攻池州以羸弱守城伏鋭士於九華山明日友諒兵果来攻城伏兵四合俘殺萬餘人六月友諒入太平犯龍灣王共謀擊敗之已而上整舟師襲友諒留王守京師軍民無敢譁辛丑春三月拜江南行中書省㕘知政事秋七月從上取安慶破江州囘守龍灣冬十有一月張士誠出兵冦長興上時駐九江聞報還京師命王往援士誠兵敗俘殺五千餘人壬寅春修安慶城羅友賢搆亂據池州神山寨将與士誠通杭歙震動命王往攻之癸夘春正月擒斬羅友賢餘黨悉平三月張士誠遣兵圍劉福通於安豐王從上擊之将戰王突入其陣三戰三勝敵兵大敗而去俘獲士馬無筭遂同徐公圍廬州凡三月城将下適陳友諒攻南昌王解圍而還秋七月從上率諸将往援八月遇友諒於彭蠡湖之康郎山王與之聨舟大戰呼聲動天地無不一當百縱火焚偽平章舟風急火熾十里之間湖水盡赤敵将張定邊素號梟猛奮前迎戰王射之定邊中矢走友諒乃退保鞋山諸将以友諒兵尚强請縱其去王獨不言及我師出湖口皆言江流湍急欲放舟而下上知其情命以舟扼上流王應之諸将乃避流而上舟蔽江面控湖口者旬有五日友諒軍食乏出江求戰王遣火舟火筏禦之敵兵奔潰追北數十里與之酣戰自辰至未不解上所乗舟及王舟皆膠於沙王既脱御舟而已舟被圍復力戰而脱於是友諒中流矢死士卒十萬皆降未幾其臣立友諒之子理於武昌冬十月王帥師討之四面合圍甲辰春二月理衘璧出降荆湖之地望風皆附陞中書平章政事秋七月從徐公取廬州八月遂自将兵平臨江之沙坑麻嶺十洞牛陂諸寨進取贛州乙巳春正月克之悉定南安南雄韶州夏五月還兵取安陸襄陽冬十月從徐公克泰州丙午春三月復從克髙郵夏四月淮安濠泗徐宿安豐皆下秋八月諸将攻浙西師次太湖偽萬戸尹義等逆戰王擒之直趨湖州之毗山與敵兵水陸鏖戰敵兵大潰遂抵城下塞其四門晝夜環攻之偽丞相張士信悉發境中兵為援屯於舊館出我師之背王統竒兵由大全港入結營東阡復出敵背且填壅溝港絶其歸路士誠知事急出親兵拒鬬王一鼓勝之士誠復遣其将徐義統赤龍船親軍来救王復擊敗於烏鎮冬十月舊館降得兵六萬十有一月湖州亦下遂進圍平江丁未圍之益急士誠收合餘燼猶背城百戰降其将士且盡秋九月始克之縛士誠来獻籍其兵二十有五萬乃加授中書平章軍國重事疏封鄂國進爵上公冬十月復授征北副将軍同徐公奉命北伐戊申春正月上即皇帝位國號大明改元洪武王與徐公下山東諸郡遂攻汴梁守臣李景昌遁進攻河南敵兵五萬屯于洛水之北将出迎戰王布陣既定單騎執弓矢衝入其隊敵發二十騎攅槊刺王王一箭中其前鋒大呼殺入悉獲其衆而河南諸城先後皆平上幸汴京謀取燕都秋七月徐公與王渡大河河北諸郡又平八月二日燕都不戰而克元君北奔師次太原其守将庫庫特穆爾帥衆来禦其鋒鋭甚王與徐公謀曰我騎兵雖集而步卒未至何以能戰莫若遣精騎夜刼其營其衆可亂衆亂主将可縛也徐公如王言庫庫特穆爾果中傷而遁己酉春正月進攻大同竹貞棄城走河東又平遂西入秦張良弼遁李思齊迎降奉先鳳翔鞏昌臨洮又平夏五月元将伊蘇兵侵通州有㫖命王以所部軍東還拒之遂𢷬永平過恵州獲江文清士馬以千計至大寜伊蘇遁破開平元君又北奔追至北河俘其宗王三人及平章鼎珠等凡得軍士萬人車萬兩馬三千牛五萬全師還燕次栁河州得疾而薨享年僅四十爾王之為人守謙而不矜有功而無過運籌決勝之方不學而能其從大将軍東征西伐而能遵守節制及其自将兵則所至無不克㨗由其智識明而材力雄故施之各得其宜嗚呼若王者可謂開國之殊勲者矣王之曾大父四三府君累贈銀青榮祿大夫上柱國中書平章政事追封開平王諡莊簡妣張氏追封開平王夫人大父重五府君累贈儀同三司上柱國少保中書平章政事追封開平王諡安穆妣陳氏追封開平王夫人父六六府君累贈開府儀同三司上柱國太保中書右丞相追封開平王諡靖懿妣髙氏追封開平王夫人妻定逺藍氏封開平王夫人子男三人曰茂曰昇曰森皆上所賜名女三人長許為皇太子妃餘皆幼臣濓聞之昔日唐太宗起義兵而定天下當時有尉遲恭者棄劉武周仗劍来從其後輔成唐業而恭之功為多於是生有鄂國之封殁有忠武之諡今王之功非恭所可及上之所以遇王者封諡與之雖同而其王爵之加恩數優渥揆之于唐誠又過之史臣所謂君臣相遇千載一時者豈不異世而同符也哉是宜銘諸貞石傳之千萬世一以昭聖天子垂念功臣如此之至一以著王之勲烈於不朽云爾銘曰聖皇開天豪傑四從龍興而雲虎嘯而風義旗所指山嶽震動飈馳霆舂孰不神竦維忠武王其氣至剛仗劍来從飛渡大江無堅不摧無敵不碎席巻長驅易如拾芥平吳定越帖荆撫淮威聲所加小大畢来齊魯既寜汴洛亦定直指幽燕不戰而勝元君逺逝六軍倒戈本根既撥何有條柯乃收晉冀乃清秦隴乃徇遼海人百其勇茫茫朔漠灤河所經誓将剗滌邊塵弗驚王之忠精上貫天日􅂱其有光亘古不没幅員之廣漢唐莫過馬蹄所及王功為多十五年間百戰百㨗備殫勤勞光輔帝業翊運之勲靖逺之威在古或罕于今見之大功垂成王忽長逝當宁興哀如失一臂爰加恩寵用錫王封衮衣繡裳照耀泉宫天子曰噫未慊朕志其推爾爵上褒三世死生哀榮孰可比焉王雖云殁生氣凛然鍾山之隂隧道有石詞臣勒銘垂示千億大明勅賜榮禄大夫同知大都督府事兼太子右率府使贈推忠翊運宣力懐逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公諡武義康公神道碑銘有序皇帝即位之三載混一華夷聲敎所被罔間遐邇梯山航海奉贄獻琛上念熊羆之士不二心之臣東征西伐宣勞有年方将胙土分茅以定功賞而都督康公薨于陜州上聞之嗟悼不已既勅有司穿土作室以寜體魄復欲昭其功勲於悠久詔翰林學士臣宋濓稽諸簡牘所書文於堅石以垂示於億萬載臣濓謹按公諱茂才字夀卿康其姓也世為蘄州人曾祖文廣皇贈中奉大夫中書㕘知政事䕶國追封京兆郡公祖徳懋皇贈資善大夫中書右丞上䕶軍追封京兆郡公父夀皇贈榮祿大夫同知大都督府事柱國追封蘄國公母蕭氏追封蘄國夫人公當元之季四方雲擾未㡬蘄州陷公結義旅以捍蔽為務授以長官俄遷為鎮府同諸将復九江𢷬蘄水黄連寨轉蘄州路同知總管府事屯戍和之俗谿太平之采石使者考其功状陞淮西宣慰副使同知元帥府事又陞宣慰使都元帥歲乙未六月上帥師渡江将士家屬尚留于臨濠陣人多效死於是數戰不克後數月常忠武王遇春遣逰兵虛撓之公連日發軍以應王度其力疲夜設伏兵質明殲其精鋭殆盡然猶收合潰散堅寨於天寜洲明年二月上命諸将以襄陽大砲破其寨公奔行臺便宜陞淮南行省㕘知政事甫踰月上亦克金陵又奔京口舟師追及之公度天命有歸乃率所部餘兵三千解甲来附免冠頓首言前日之戰各為其主今日屢敗天數也事至於此死生唯命茍得生全尚竭犬馬之力以圗報效上笑而釋之仍許綂所部兵從征又明年授秦淮翼水軍元帥守禦龍灣取江隂之馬䭾沙八月偽吳張士誠犯我疆境公驅兵逐之獲其樓船人上賜名馬一匹黄金一錠歲戊戌從廖楚公永安攻池州取趙雙刀之樅陽遷都水營田使兼帳前總制親兵左都指揮使明年八月攻皖城偽将率樓船出戰公復獲之又明年六月偽漢陳友諒傾國入冦攻陷我姑孰殺戮我吏民意将窺我南京上召公謂曰爾不疑我乎公復頓首謝上曰汝既不相疑宜作書遣使偽降友諒為内應招之速来仍紿告以虚實使分兵三道以弱其勢友諒果如所言既至諸将同公奮擊大破之縛其士卒二萬有幣帛白金之賜歲辛丑八月上怒友諒来冦率将士親征公領舟師行擊安慶破江州偽都友諒西遁遂下蘄州興國漢陽公沿流而下克黄梅某家寨十一月取江之瑞昌取友諒八陣指揮友諒之勢遂衰遷帳前親兵副都指揮使明年元月復龍興又明年攻左君弼於廬州四月友諒圍龍興上親往援公與諸将皆從友諒聞上至亟解圍還七月大戰於彭蠡湖軍聲嘯呼湖水為之起立浮屍蠢蠢動至數十里友諒遂至敗亡又有幣帛之賜十月上親征武昌公從之歲甲辰二月下之友諒之子理衘璧出降三月進金吾侍衛親軍都䕶府副都䕶四月從大将軍徐公達洊攻廬州七月下之八月㧞安豐繼取江陵及湖南諸州加賜幣帛明年二月改神武衛指揮使五月進大都督府副使閏十月士誠兵犯江隂京口上帥大軍水陸並進公在行中及至鎮江士誠兵已遁又明年正月追至巫子門擊敗其衆獲士卒二千公功為多四月擣淮安之馬邏港㧞其水寨復獲士卒與艨艟無筭淮安平七月遂攻湖州十一月破之進逼姑蘇姑蘇士誠偽都即遣鋭卒来迎鬬大戰尹山橋公持㦸督戰益力鋭卒盡覆乃進圍齊門刀劍林立飛鳥不敢下大将軍命諸将合攻之吳元年九月姑蘇平公取無錫州十月陞同知大都督府事兼太子右率府使進階榮祿大夫洪武元年上以江南之地既入版圗乃遣大将軍經畧中原公從齊魯之地復由黄河取汴梁下洛陽駐師陜州規運饋餉造浮橋以渡大軍鎮河中善撫綏遺民為之立石頌徳絳解二州則公所招徕蔽遮潼闗秦人不敢東向三年復從大将軍征漢中奉詔還軍中道因疾而薨實八月之三日也年五十有七上下羣臣議贈公推忠翊運宣力懐逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公諡曰武義卜以九月二十一日葬於應天府上元縣鍾山鄉之幕府山上親臨奠而百司繼之祭幄相望聨絡原野時人以為榮公娶方氏追封蘄國夫人繼室田氏封蘄國夫人側室朱氏俞氏子男三人鐸田氏出鑑朱氏出鎮俞氏出公通經史大義事太夫人以孝聞輕財仗義意氣磊落而尤有志於事功值元祚将終其才弗克盡施然而真主龍飛於羣雄之中公即能識之巻甲韜戈率衆臣附坦然而不惑可謂上知天命下察人心者矣由是昭被寵眷倚之以心膂用之為爪牙十餘年間屢從征討茂績竒勲著稱當世存則安富尊榮加以爵位薨則疏封賜諡賁及九泉令名垂於竹帛重祿延子孫公其可以不朽矣臣濓謹拜手稽首述辭於碑系之以銘深懼不足以稱上報功之意銘曰於赫大明受命于天如日之升照于八埏其一于時康公江險之恃大軍西来視如平地其二巨礮轟雷物莫敢攖何戰弗潰何守弗傾其三天人攸歸勢何敢抗知㡬先来率衆内嚮其四皇帝曰嘻有附匪疏予開誠心遇爾不疑其五爾礪矛鋋爾部士卒助予四方以寜萬國其六公拜稽首賜死為生誓殫報效如無餘齡其七孰不為庭率師往討矯如翼如風馳電掃其八東吳西楚蹴陳駕張身經百戰兇豎始亡其九大将北伐同取汴洛出鎮于蒲恤其孤弱其十蔽遮河潼以義為闗誰敢操戈睥睨其間其十一𤣥龜負碑以頌遺愛民亦何心恩義斯在其十二從伐漢中迢迢西征有命班師中道而薨其十三帝念将臣血戰之苦将酬其勲錫以茅土其十四孰不夀考以樂承平公胡嬰疾隕魄泉扃其十五帝情憫悼恩命絡繹穿山為堂畢兹窀穸其十六名垂於史祿延於家翩然而逝公復何嗟其十七史臣造文大書深刻以昭公勲有永無極其十八明文衡巻六十九
