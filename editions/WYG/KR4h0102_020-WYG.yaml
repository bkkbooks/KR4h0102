  hash: sha256:e5ec573b3977ce9d55cb8e5fde4b730d653f8ab5b5d8dd377a7d97bbadfb0be3
body:
  text: 明程敏政編頌節婦黄氏旌門頌并序蘇伯衡姑蘇吳縣之閶門里有旌門焉朝廷所以寵褒姚節婦者也節婦姓黄氏名妙清歸姚氏為諱榮之妻生男女各一人而榮以病卒榮卒時節婦年二十有九子文聰纔二歲貧甚力紡績以俯育或勸其更嫁節婦曰夫死不嫁婦人之常况有子可從何為而更嫁此足一移我則匪人不聼後十二年張士誠入據姑蘇亂兵掠文聰以去數從人問消息比二年不聞問或曰異日者有子可無更嫁也今子俘矣無論死藉令生歸亦不可望不嫁將焉恃乎節婦曰我豈以子存子亡為去留者哉終不聼又四年文聰始脱身來歸節婦驚喜且泣曰姚氏有後矣我死亦無憾後八年里耆列其狀上于縣若府監察御史為詧實以聞制下旌其門為節婦之門則洪武七年春三月也今節婦嫠居且三十四年年已六十有三文聰愳無以侈上賜而昭示罔極聞伯衡嘗簉屬太史氏介朱恪即金華山中求書其事勒諸樂石伯衡惟唐虞三代之世其教既明其化既成其民俗之美至於比屋可封當是之時旌其門閭表厥宅里猶不敢緩然則所謂樹之風聲使民益勸於善雖唐虞三代之聖人猶不能不以之為務也况當世降俗漓之後有天下者不善其善以為勸奚可哉皇帝受天景命君臨萬邦凡有係於風化者輒加表異盖以此也而姚榮妻黄以貞節著聞䝉被寵褒如此是猶唐虞三代之民加唐虞三代之令典矣遠近聞之其誰不感慕而興起此所謂賞一而勸百者也不其休哉不其休哉夫推明聖意而播諸聲詩者史氏之職也因不辭而為之頌頌曰天眷聖神民君民師匪曰治民亦欲迪之聖神奉天式和民則隂握化權作新萬國褒嘉節義錫以旌書風行而表孰不犇趨非有舘鎋自率䂓矩四維既張五倫攸叙吳縣有婦姚妻氏黄年二十九良人遽亡儲無儋石室若懸罄母子煢煢相依為命霜風凄其落月照帷間關機杼影與形随人或憐之勸之他適胡乃茹荼有薺如蜜慷慨自誓辭與涕俱可以人焉而犬彘如我不即死我志靡他我下從夫我子何如子未成童掠於亂兵倚閭而望寒暑再更僉曰已矣安知非死無子焉恃不嫁奚俟婦曰咈哉何言之卑我志可易太山可隳我志不易仰天一慟血淚雨集時既寜謐子亦生還雖無甘㫖志養攸全郡守御史交謂宜褒乃具封章乃請于朝乃被綸音旌其閭里苦節之報庻其在是昔視其門門則以席今過其門門有綽楔綽楔巍巍龍光有耀匪爾之私俾世視傚嗟臣事君猶婦從夫凡百在位曷鍳曷圖婦道不虧尚稱聖意臣節殫竭有不寵異刻辭堅珉以昭鴻恩以揚清芬以詔後昆平雲南頌王景聖天子之御大厯服也維清緝熈載􅆒武功盪攘羣雄混一函宇於是偃武修文與民休息埀十餘年皇帝若曰元綱觧紐土宇𤓰分朕奮起淮甸鏖戰鄱陽江漢以清捲甲長驅遂定中夏元君北跳秦晉吳蜀所向風靡不十年而成大業雖天命有歸皆師武臣之畧也維雲南一隅獨沮聲教卿謂何如僉曰雲南塹山墉壑狼子野心聚螫挺獸况巴咱爾斡爾宻為元臣子罔知天命宜其無嚮化心若以天兵臨之彼惡能敵帝曰俞哉乃命潁川侯臣傅某西平侯臣沭某永昌侯臣藍某將鷹揚虎校之士三十餘萬聲罪致討樓船蔽江旌旗亘天星流電邁分道並進大軍繇貴廣軼普定下牂柯深踐不毛奇軍繇羅佐關擊烏撒攻可渡河大㑹于曲靖疾若風雨所向克㨗元兵蜂屯蟻聚毋敢抗我師者先是下令曰若至曲靖便可輕騎長驅未至十里許大霿霧元司徒逹爾瑪拒烏白江為陣未成列我師涉水以濟徑前奮擊其陣遂亂逹爾瑪陷于淖生擒之殺將士若干人元兵大奔遂分兵逆可渡河望風席捲梁王巴咱爾斡爾宻棄城遁至晉寜率妻子死之雲南平自出師至是凡百餘日得府州若干户若干馬牛軍實無筭三帥承制建官大軍鎮焉遂下大理㧞金齒凡雲南故壤皆郡縣矣明年遣使降車里降緬降八百咸以壤奠貢洪惟天兵不浹十辰拓地萬里西南諸夷悉臣悉妾何成功之速哉盖天子文武神聖徯來望切而有三帥善長駕遠馭也上自漢唐以迄于元羈縻而已乃今與内地等功髙千古信乎王者之無外也又明年班師振旅獻俘授馘定功行賞封傅某為潁國公諸將以下進爵有差嗚呼古之有盛徳大功必形諸歌頌皇風興大雅作草茅㣲臣不敢多讓謹稽首頓首而為頌曰皇明御天統有萬方際天蟠穹武功煌煌三光耀靈海宇聿清叶氣嘉生蒸為太平蠢兹蠻方稔藏奸凶恇恇穰穰以䙝天常乾坤之量海嶽是包彼昏而狂誕敢呌呶皇赫斯怒爰整元戎吉日載戒車攻馬同於鑠王師赫赫桓桓天討是將震懾百蠻兵無留行勢若震霆日星晦霧江海沸騰鷹揚曲靖俘彼勁兵征麾所指載揚天聲戰不貪殺殺不却降斥原䟽斾以迄用康大憝聿逋筐𤣥篚黄拓禹之跡維周職方表方建官棋布星分仡仡大城以奠其民滇外諸蠻厥誠以輸昔也猰㺄今為騶虞載馹載伐戈鋋不腥南金象齒罔敢弗庭凡此南功三帥僉同維一乃心上毗帝聰大烈之龎超漢軼唐風雲胥慶天地開張㑹朝清明聖化基之萬國一統坐而釐之草茅微臣作此頌焉武功告成四裔咸賔詩有序解縉皇帝臨大寳之明年紀元永樂嘉與萬方共躋仁夀一徳感孚休祥昭應民安物阜四裔畢來東若朝鮮日本暹羅東南若琉球中山南北有安南占城西南海東洋𤓰哇鬼方緬國木邦孟定麓川威逺八百老撾車里西若烏斯尼喀巴拉西北輝和爾匈奴哈宻逺者數萬朝聞夕引奉貢儀物皆至京師其文辭稱述盛徳對揚鴻休誠服心悦發見于外殊音重譯異服竒詭懽忻攸同嚮慕無己庻衆聚觀天下忭喜咸相謂聖神光被如日月之照臨天行雨施妙運莫測垂裳拱手於穆清而有生之類盛利見于四方萬里之逺鼓舞輻輳而歸之來享來王而不能已吾民何幸而臻兹嘉㑹實萬世一時也朝之羣臣亦咸相謂虞舜有三苖之征周公有戎狄之膺宣王逐玁狁而秦漢及隋疲弊中國力夫之争無時或寜唐宋否極上天厭罪命我太祖聖神文武欽明啟運俊徳成功統天大孝高皇帝起而定之不令而從不言而化八表同風四十餘年皇帝以聖繼聖比隆唐虞殊方歸命者接迹而至宜有詩歌垂之頌聲軼逺古而過之又咸謂臣縉宜為義不可辭則合羣臣百姓之言從容奏冩皇帝曰咨周家九夷通道太保進旅獒之訓虞廷干羽既舞伯益有儆戒之箴故愚者常以小康肆志賢者不以外物動心朕方兢業於初服是何足云頌聲其為作君臣相飭之歌以繼虞周之治臣縉竊謂自古頌美而寓規諫皆臣子攄誠委曲之小心臣愚不及此乃自皇上發之是誠萬世一時也謹拜手稽首而獻詩曰皇帝明徳與天同運華夏奠安四夷効順限山阻海風氣不通不招不約奔走來同梯陟峻阪航涉濤瀧沍寒溽暑赤雪𤣥霜殊形竒醜異服紛厖􅙎髪焦赤睒聃深黄猩唇猳喙黎面文身􅃝跣椎結皮裳卉巾離披落索搖曳縈纒鞮鞻殊音侏離禽言吚嗢重譯舍館授餐窮物式陳兼金玉瓉齒革羽毛服食器用皇帝儉勤異物非重厚往薄來懐柔無外八表同仁膺兹嘉㑹以心感人人心自歸其來無喜矧往或追陋彼漢唐好大喜功本之不競而末是從茍得其人不為富强茍得其地不足廣疆耳目細玩惟彼所産躭玩惑心悔之已晚皇帝明徳謹之於細慎始惟終圖難於易照乗之珠衆庻所嘉詎若得賢照千萬里四夷畢來衆庻榮之曷若中夏一民無饑明良責難安不忘危小臣作戒賢聖是師御書嘉禾詩頌有序洪武二十有八年秋九月壬辰朔庚戌北平永清衛之龍門禾有異莖同穗之祥其三榦合為一仍三穗者二二榦合為一仍二穗者六是嵗大熟今上皇帝遣使來進羣臣上表賀太祖聖神文武欽明啟運俊徳成功統天大孝高皇帝親御翰墨為詩一章以賜今上皇帝其詩首言創業之艱天命之不易除暴禁亂之師撫民致治之畧中言天錫豐登之屢史書垂示之嚴明堂禋薦之重末示謙沖戒謹之意為善不足之誠大矜下民之惠與民同樂之盛心溢於言表盖不以嘉禾之祥為可矜而以為可懼而思以自勉聖不自聖兢兢業業足以垂訓於千萬年今上皇帝服膺聖訓念手澤之存諷誦追惟不能自已乃永樂三年九月朔旦用摹勒于石拓本裝治成軸分賜諸王及近臣於是臣縉亦得與賜焉又適有嘉禾之瑞臣縉仰惟日月之光華昭著于天地其溢而上者為慶雲為景星為霞五色其下者為璿珠為美玉為丹沙使人歆慕而寳愛者皆日月之餘光也古先聖帝明王有日月光華之徳其禮樂文章流風遺韻之傳若詩書所刻百世之下光景常新猶足以使人歆慕與景星慶雲諸福之物同一快覩而况身被其澤目覩其盛鼓舞涵濡其有不發而為華封之祝康衢之謠以自鳴其慶幸之萬一乎實人情之所不能自已也拜手稽首而獻頌曰洪武乙亥秋穀登朔方龍門嘉禾生三穗二穗交兩騰異本同類同敷榮蕋珠金粟隔露凝親藩錫貢來神京玉匣上有黄雲蒸衮衣當日御彤廷百辟忻嘉陳休徴四野懽呼傳頌聲帝曰俞哉稽之經旅命歸禾凜不矜作詩致戒尤丁寜昌言受命畏天明降福穰穰恐弗勝庸錫親藩鍾聖情亦知𤣥徳由兹𢎞十年事驗天威靈聖孝通天推至誠永樂重華信有禎賜詩日閲心屏營手澤猶存訓服膺毎御翰墨懐牆羮想當睿思玉几憑智周入極通杳㝠重念稼穡憂農耕暑寒怨咨憐獨㷀秪願年登百穀成羣臣環列忭且驚百神降監來軒楹雲霞的皪飛陶泓鴻章聖藻驅風霆造化萬彚皆流形工巧人為何足稱奎章爛爛不可名但見東壁餘光精刻以端溪紫玉英摹本裝以龍鸞紋頒錫羣臣荷寵榮天球大訓河圖幷人文至寳奠八紘夜夜虹光燭太清聖子神孫萬億齡萬世黎民歌太平視學詩冇序胡廣皇帝即位之初載夙夜延訪羣臣博詢治道從容燕暇召二三儒臣于前而諭之曰使天下人人崇尚儒術其道何由咸頓首惶懼不敢言明日又問訖無敢以對上曰必使天下人人崇尚儒術其機在上於是咸稽首曰誠如陛下所言至是求賢之詔屢下凡巖穴幽潜之士占一技能者即禮聘之闕下親承顧問命之以職而優待之故四海之内罔有遺才焉明年策多士于廷簡其尤者二十八人俾究極羣書期其至于古人一切政事不以干之恒禄之外復有他賜鼓舞作興之道至矣天下之士聞風而歆慕者皆奮躍於下有菁莪棫樸之盛乃永樂四年二月朔勅羣臣曰孔子萬世帝王之師其道在天下載於六經天下不可一日無生民生民不可一日無孔子之道朕將臨國學躬禮孔子以稱尊崇之典所司其差吉日行之於是有司差以三月朔日辛卯是日昧爽上備法駕謁廟行舍菜禮先是命禮官考謁廟儀禮官奏宋服靴袍行再拜上曰見先師禮寜過厚至是上服皮弁行四拜禮禮畢駕幸太學授經祭酒臣儼司業臣智賜之坐講文武三品以上及翰林儒臣皆賜坐聴講講畢賜茗飲降玉音難問勉飭衣冠之士及四方之人圜太學而觀者以億萬計視東京永平無足言矣明日臣儼臣智率六堂儒生上表謝錫賚有差大宴羣臣于奉天門莫不懽忻踴躍以為自古帝王崇尚儒術未有若此之盛臣仰見太祖高皇帝告成武功大興文教臨幸太學親講經書與諸儒難疑答問終日弗倦今伏遇皇上尊信儒術躬率舊典有光前烈揆諸古昔誠無與比故盛治之風薄極海宇凡四方僻逺非一譯所能通者遣一介之士持咫尺之書以諭之莫不奔走順服頓顙闕庭夫豈威力所能强是皆文教躬行之効也臣維孔子之道與天地相為終始其在於人心者昭晰不泯當聖人在上天下文明則其道大行皇上全聖智之徳居至尊之位恢𢎞治教表章孔子之道如日麗天中四海之民皆仰見之俾知所趨向皇上作興人心推明世教誠有以度越千古非近代帝王所能及也臣廣猥以菲才幸依日月之光獲覩文明之盛職在紀載不敢以黙謹述為古詩一章以獻以播盛美於無窮焉詩曰維古聖神繼天立極爰修教化以彰明徳曰堯舜禹所傳一心無間顯微爰有古今學校之政教化先務三綱以正九疇攸叙周綱解紐正路日堙不有至聖孰宣人文大哉孔子道高徳厚出類拔萃生民未有祖述憲章乃欲無言賢於堯舜事功則然教化無窮如天垂象六經昭晰萬世尊仰至治之要一本於兹生民永頼帝王實師於皇太祖受天明命道侔天地卓冠前聖武功爰定文教首崇表彰絶學大闡休風載新庠序甄陶士類親臨璧雍以嚴視事躬御講筵觀者如雲衣冠萬國集于橋門猗歟盛哉亘古莫比為憲萬世式承無已皇帝纉承舊章是遵緝熈聖學弗懈益勤季春初吉躬視廟學舍奠先師秉䖍有恪衮服大圭星弁煌煌穆穆清廟濟濟祼將載臨講席列侍羣儒紬繹問難六經羣書聖道顯明皇心以喜章甫逢掖蹌舞士子圜瞻萬億華夏蠻貊鑿齒雕題亦皆夷懌治有先後教有本源仁義之訓彌乆彌敦於昭聖皇遹駿有赫洪化維神無思不服平安南詩楊士竒臣聞天以風雨霜露育成萬物聖人以禮樂征伐綏輯天下一出於至仁周之文武皆一怒以安其民故雖聖人不志用兵亦不去兵以為治洪惟我國家肇興太祖聖神文武欽明啓運俊徳成功統天大孝高皇帝深仁大義順天應人平靖四方以教以育罔有孽害時謂泰和至于皇上益廣仁義禮樂之化海内奠安四方嚮慕大小遐邇熈然同春惟是安南其王孱微其賊臣黎季犛暨其子蒼沿襲悖凶屢弑國主淫刑暴斂毒虐下民滋乆滋甚皇上閔焉弗寜發詔使諭使遷悔賊罔忌畏數侵掠厥鄰占城又冦我思明禄州寜逺之地在廷之臣咸請發兵討罪上曰彼匪人乎斯不可終化發詔使申諭焉賊聞其主有遺嗣子奔來京師即上表謝過請還之上曰彼其庻幾有悔乎遣使者衛送出境賊伏衆邀遏使者執殺其主遺嗣子事聞皇上震怒召文武羣臣諭曰予承天命保康兆億民一民弗獲惟予弗恭人有弗迪而遽誅斯遏抑厥自新乃有弗迪至于再三而釋弗誅惟予弗君今盜滋弗迪予必不釋將往大正匪予志用武惟盜滋稔惡羣臣合辭力賛必决乃告祀天地宗廟及天下山川命征南將軍左右副將軍左右參將暨神機横海驃騎游擊鷹揚五將軍率師討賊師發金川門上臨江送之諭之曰汝其代予往行天討惟盜暨厥子必誅弗釋暨同惡必誅弗釋凡厥脅從咸釋弗誅惟兹安南咸朕所統厥民滋困于盜罔攸訴告汝其代予往弔毋有侵害或有侵害即既殄戮盜猶底汝罰既殄戮盜其咨求其王遺嗣子俾統治厥民往哉惟懋師入安南黎賊脅驅其民號為百萬拒于境上民聞王師來為己除害皆倒戈迓降師渡富良江入其東都城又入其西都城如蹈無人之地賊窮迫盡棄其衆獨與其孥數人並海遁去王師追之悉生縶之不遺一人乃縱所脅從咨民所苦罷其苛禁敷求安南王遺嗣民既罔有侵害又䝉哀矜弔恤悉解去所苦咸竊喜曰我幸復見今日幸聖天子不遐棄我萬里外而復生我欣然如脱虎口歸慈父母相率跽軍門言曰惟故安南王遺嗣悉殱于冦暴無遺惟兹土故𨽻中國誠願復列中國氓宻比聖化俾我暨我子我孫咸免於荒逖軍中獻所獲俘且具言民所欲皇上重違民意下詔郡縣其地選置守吏復置交阯布政司總之在廷文武羣臣上表稱賀臣惟安南本漢南越地武帝置交阯郡暨五季丁氏竊據之始僣稱王宋弗能制因授之率循為常更歴數姓蟠結深固屢叛弗服宋元數舉兵誅訖無成功皇明奄有四海率先欵服曽不踰世終梗冦盜天地之徳務隆包荒累誨弗悛肆急援溺仁義之旅弔伐並行恩威所臨有迎無拒累月之頃肅清凶憝大拯塗炭𢎞復疆土功徳俊茂振古無倫焉惟古帝王施徳建功皆有頌歌傳播後世臣忝列從臣後輒儗古作者之意譔平安南詩一首以示後來謹拜手稽首上進詩曰維天生民咸俾遂適有攸弗及肆命有徳惟徳格天為君為師以教以治俾適咸宜天啓皇明悉畀所覆明明太祖生育教誘衣之食之邇安逺歸禮昭義布長幼尊卑皇帝繼統四方萬國益富而教和豫安適蕞爾蠻交醜孽其間為狼為豺小大畢殘皇曰彼醜匪異人類庻或改率予其化誨誨言諄諄弗遷益驕戕暴厥鄰盗我邊郊百辟文武頫伏陛言弗時翦屠將俾蔓延皇曰申誨猶或改率弗改弗率跳梁狂獝偽恭籲命賊我使人暨彼遺孽磔身百分皇曰彼醜獸心靡易螟螣弗除遏遺嘉稷惟皇上帝付予八埏有溺弗援予滋違天誕命將臣暨旅師徒往勵汝勇徃宣汝謨咸弔困窮殱惟醜虜職敷予仁匪曰究武六師遄邁辭直氣厲涉危蹈深若履平地嘽嘽烈烈赫赫業業如飄剟剟如霆􅎒􅎒蠢彼醜虜脅驅為拒仁威天降孰有强禦雞翎夜闢富良為帶投兵委戈奔降迓拜乃入交城乃走兇渠縶之海隅如探取雛乃咨脅從悉解而縱乃視交人弔其疾痛交人悴悴爰始色温舒其兢兢爰始笑言交人有言我困荼毒天子生我旋癘為福交人有言我初匪夷逖逺淪汙陷兹塗泥天子聖仁曷返我初内我庇我永康不虞俘獻于廷天子受之民有願欲天子予之四方有聞懽喜告語天子聖仁我有父母救民之疾不以遐僻有梗弗率必誅不釋天子聖仁孔武且神孰其為梗鑒彼交人芒芒四裔威服徳拊巍巍中夏尊安鞏固海航陸車來享來庭千萬億年拱我皇明騶虞詩有序梁潜臣聞自古聖帝明王至治之極必有禎祥若麒麟鳯凰醴泉甘露應時而産皆所以符聖徴彰至徳者也乃永樂二年秋八月皇帝冢弟周王畋于鈞州厥有異獸白質黑章猊首虎軀其狀孔威不可迫視王俾部曲俟之其性孔仁遂擾致之以詢之故老葢古所謂騶虞者此其是巳夫惟仁君有至信之徳則見於是九月丁未王率厥屬表獻闕下皇帝服皮弁服御奉天殿以觀不震不動柔伏自然皇帝若曰厥為嘉瑞予㒺敢知維致自昆弟之邦予其嘉焉於是太子太師淇國公臣丘福謹率百官上千萬嵗夀既而京師人士忻喜聚觀咸以為聞自古昔見始今兹臣潜伏覩盛典不敢自黙退而考之騶虞詠於詩記於禮列於傳記或以為義獸或曰仁獸或曰聖獸至以為嘉祥者則其言皆同也傳曰國家將興必有禎祥洪惟皇上紹登大寳率由舊章親親而仁民恩沛而義洽萬方咸和以及乎庶類黍同穎於郊蠶成繭於野文犀白象諸福之物抑之而愈臻却之而復至何其盛也豈非上天以是昭至徳哉臣潜忝職記注茍不形之歌詠以垂示無窮輒為不職謹百拜稽首而獻詩曰於穆聖王綏徳兆民端本自家篤於周親恩沛義洽如煦春陽至和沖融發為禎祥禎祥伊何厥惟騶虞産于王國惟皇徳符王馴致之獻于帝庭素質𤣥章雲舒霧凝帝乃觀焉載戢其爪爰言究之踐匪生草吁嗟騶虞外何其威内何其仁匪苞而鳯匪角而麟吁嗟騶虞曷為来哉王拜稽首皇則召之皇之仁民淪膚洽肌𢎞暢旁達物以不疵皇之孝友本乎至性萬邦咸懐物以類應皇帝曰俞惟王信恭王乃麟趾奚必騶虞皇帝曰吁凡百在位惟徳召和匪物其瑞庶臣拜手皇帝萬夀慶祥畢臻徳音是懋瑞應甘露詩王直臣聞聖人之徳配天地則天地之心欣合無間故必凝英萃和以昭其盛若黄帝之甘露虞舜之卿雲是也恭惟皇帝陛下以至誠之徳統承太祖髙皇帝基緒繼述之孝不忘乎公遵用舊章未嘗改作徳化所及罔不愛戴故自天地之所覆載日月之所照臨無有逺邇熈然泰和動植之物亦各生遂而太祖髙皇帝之盛徳大業愈益光明是以天發其祥地闡其珍景星慶雲醴泉甘露嘉禾瑞麥麒麟騶虞諸福之物駢臻沓至此臣等之所親見天下之所共知也而聖心惓惓益勤不懈乃永樂十七年十一月某日甘露復降于孝陵凡四日松柏之上凝為玉脂融為瓊液粲若垂珠聨若編貝臣民聚觀鼓舞懽忭咸以為甘露之降不于其他而于孝陵者盖聖孝所致也於是皇太子命採取馳獻于北京皇上祗薦宗廟傾賜百官芳香之氣旁達左右甘美之味莫可擬倫誠天地之精英聖明之上瑞所以彰皇上之大徳為天地之所悦鑒景命之隆長太平之悠久厯千萬世而益盛也昔虞舜有卿雲之祥百工相和而歌之萬世之下因是想見帝舜之徳使人起敬起慕今聖徳之大實同天地甘露之瑞不減慶雲是宜有紀也臣愚不自揆輒形之聲詩以繼虞廷之歌垂之萬世使知聖徳格天之盛巍然煥然如此臣等誠懽誠忭稽首拜手謹言甘露昭聖孝也有瑞甘露其集瀼瀼被於長松孝陵之岡如珠之英如瓊之漿於粲其光承彼朝陽有瑞甘露其融湜湜亦被于柏孝陵之側如肪斯白如玉斯潔其馨有烈敷暢旁達維彼露兮天乳之滋維此受兮上帝之貽皇有大徳神人具依集此大瑞福禄攸宜皇徳之大實配于天永言孝思太祖是憲懿彼舊章于嗣于宣夙夜敬恭穆穆乾乾維太祖肇邦皇以廣之維太祖受命皇以康之顯顯大猷萬邦仰之巍巍成功無以尚之上帝太祖樂此徳馨屢開厥祥甘露斯零甘露斯零維帝命是膺維太祖是承皇祚以攸寧乃取乃獻皇太子之恭乃賜乃頒以洽于臣工匪餄匪酮既甘既融靈液攸降物莫與同臣拜稽首天子萬年以臨下民以對上天維禎維祥繼繼綿綿聖子神孫萬世之傳芝頌禮部尚書毘陵胡公於廨署之南作小軒以為思政之所凡公之佐天子舉禮樂以施政教則必思其宜於此而後行之天下公忠信明達君子也其精神感而和氣應之盖有不期然而然者宣徳八年九月軒之中甃甓隠起發而視之有芝生焉其色純白如刻玉如截肪輪囷敷暢鮮潤華好公卿大夫來觀皆以為瑞而賛詠之夫芝之瑞始於漢重於唐至宋而極盛盖謂和氣薫蒸之所成非人力能為也然彼宫殿門廡之所産者國之瑞也生於士大夫家倚廬齋閣之中者家之瑞也今皆不然惟於公思政之所見之盖公盡心於其職故天以是彰厥美則兹瑞為公精誠之應無疑也然竊思之公之所任大矣其應亦有大者焉此特其兆也禮曰樂者天地之和禮者天地之序又曰禮樂極乎天蟠乎地行乎隂陽通乎鬼神此豈細務哉今上有聖明之君而下得公之賢以為臣厚禮樂之本達禮樂之用極其至也天地安其位日月著其明四時寒暑順其序明而為人幽而為鬼神流而為川峙而為山精而為百穀粗而為草木鳥獸一皆遂其性無毫髪爽焉至和之氣充周于六合之間則甘露醴泉器車馬圖龜龍麟鳯諸福之物靡不畢至而國之大瑞備矣故曰此特其兆也有其兆而賛詠之思迓續其大者云爾烝民之詩尹吉甫送仲山甫也而序者以為美宣王盖能任賢使修其職宣王之美見矣今公之有此皆上委任之所致則諸公之賛詠雖以美公而亦以美朝廷也作芝頌春官名卿禮樂宗兹誰任者毘陵公美哉新署鬱穹崇華軒結構居南東聖明在上眷遇隆懐清履直持敬恭孜孜夙夜亮天工施諸政教審厥衷精誠孚暢靡不通靈芝煌煌産其中至和絪緼之所鍾殊姿宻理鮮且重刻脂鏤玉紛􅋛瓏參成樊桃差可從瑤英紫脱徒芃芃嘉生本自造化功滋殖豈與凡卉同知公秉徳乆愈充輔翼帝道宣皇風上追䕫夷躡高蹤體信達順更豐融四靈畢至百福隆君明臣良格昊穹頌歌繼作聲渢渢鴻名赫奕垂無窮明文衡巻二十
