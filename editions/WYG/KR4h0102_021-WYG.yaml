body:
  text: 明文衡巻二十一明程敏政編賛龍馬賛宋濓西南夷自昔出良馬而産於羅鬼國者尤良或云羅鬼疑即古之鬼方其地有養龍阬在兩山之中泓渟奫深開闔靈氣而蛟龍實藏其下當春日始和物情酣鬯夷人立柳阬畔擇牝馬之貞者繫之已而雲霧晦㝠咫尺不能辨色類有物蜿蜒上與馬接盖龍云逮天色開霽視馬傍之沙上有龍跡者則與龍遇謹其芻菣而節宣之暨産必獲龍駒焉粤若洪武四年六月壬寅夏國主明昇以全蜀降獻良馬凡十而其一色正白乃得之於阬者身長十有一尺首高九尺足之高比首而殺其二尺有肉隠起項下約厚五分廣三寸餘貫膺絡腹至尾閭而止精彩明晃振鬛一鳴萬馬為之辟易韉勒不可近近輒作人立而吼上謂天既生此英物必有神以司之親撰祝策詔有司以牲牢祀于馬祖然後勅典牧副使臣高敬囊沙四百觔壓之人跨囊上使其游行苑中乆之性漸柔馴適八月癸巳上將行夕月之禮於清涼山壇上於是乗之而出如躡雲而馳一塵弗驚皇情悦豫賜其名為飛越峯復命御用監直長臣馬晉臣繪其真形藏焉臣濓稽諸載籍漢之元鼎中有神馬出渥洼水中馬之生於水者尚矣養龍之説雖相傳於夷人要當可徴不誣也肆惟皇上以大徳而位大寳日之所出日之所沒無不梯山航海獻贄奉琛邇者獨角之犀來自九真食火之鷄貢于三佛齊之境其他佹形僪狀藉藉紛紛且不一而足而况此水産之龍馬乎周書有云不寳逺物則逺人格所寳惟賢則邇人安皇上宵衣旰食日懐保於小民巖穴之士蒐羅殆盡將圖治安如黄虞時其遐荒殊裔珍毓竒産未嘗有心求之所以榮光休氣洋溢中國仁聲義聞充洽八表而龍媒之異自致於天閑十二之中揆之於書前聖後聖盖同一軌轍也其視貳師之遣黷武窮兵以索諸大宛者果為何如哉臣濓以文字為職業際兹盛美不敢默而無言謹述賛辭一首以貽諸後世賛曰天駟熒蛟龍升靈泓澄神馬生祥飈瑞靄晝杳㝠天一翕聚通精靈龍胡漢郊祀志龍垂胡髯胡乃頸下垂肉盈鳬臆輕竹披耳鏡懸睛花雪捲毛光照夜汗溝有血霞流赬振鬛鳴萬馬驚閃流電逐飛星九霄彷彿從龍行但聞瀟瀟風雨聲三川平八極寜真龍媒獻龍廷出入天門駕龍軿太霞五彩滿瑤京皇風清皇道貞皇威明茫茫堪輿内孰敢不來庭陋彼漢將軍空圍貳師城乃知天子在樹徳不必連年徒用兵滕奉使賛齊人王蠋有言曰忠臣不事二君烈女不更二夫女之從人一與之醮當終身不改譬之白璧小有玷辱人將斥去而不之顧臣之事君也其理亦同故蠋特竝言之事兩夫者雖辨如虞姬智如鄧曼吾知其決非良婦事二君者雖功如汾陽唐郭子儀封汾陽王才如西平唐李晟封西平王吾知其決非良臣嗚呼使此義昭如白日人臣安肯懐二心而國安有喪亡之禍哉東陽滕茂實當宋靖康初以太學正與僉書路允迪奉使於金議割三鎮太原尋奉宻詔據城不下金人怒囚之雲中欽宗北遷茂實謁見涕泣請從行主者不之許其後允迪南歸茂實獨留鴈門終身不再仕臨沒令以黄幡褁屍而葬仍刻石識云宋使者東陽滕茂實墓此殆不事二君者與當是時有宇文虚中者亦以黄門侍郎使金見留遂改節易行反面事讎其後雖欲奪兵㐲南奔而自贖卒亦不逃君子之譏其視吾茂實果何如也茂實已矣人至今想其遺節如神龍不可得見至視虚中輩不啻若鬼蜮犬豕有識妾婦亦羞聞之此無他人心天理終不可誣也乃作滕奉使賛用規事君而有二心者賛曰漢有蘇武奉使不屈滕公配之有聲烈烈黄旛裹屍以全臣節如璧之白弗緇弗缺其人雖亡而神不滅上游帝所凌厲日月降臣見之肝碎膽裂敢述賛辭勒在貞碣溟涬生賛溟涬生者旴江廖應淮海學也抱負竒氣好硏摩運世推移及方技諸家學年三十游杭上䟽言丁大全誤國狀大全怒中以法配漢陽軍生荷校行歌出都門道傍觀者嘖嘖壯之抵漢江濱遇蜀道士杜可大揖曰子非廖應淮耶生愕然曰道士何自知之可大曰宇宙大虚一塵爾人生其間為塵幾何是茫茫者尚了然心目間矧吾子耶然自邵堯夫以先天學授王豫天悦天悦死無所授同葬王枕中未百年而呉曦叛盜發其冡得皇極經世體要一篇内外觀象數十篇余賄盜得之今餘五十年數當授子吾俟子亦乆矣乃言于上官脱其籍盡教以冡中書其算繇聲音起生神鑒頴利可大指畫未到者生已先意逆悟可大自以為不及學既成去隠宣歙間遇余安裕弋陽將教之安裕勸生業中庸生瞠目厲聲曰俗儒幾辱吾康節於地下矣復去之杭客賀外史家晝市大衍數夜沽酒痛飲飲即吐吐即飲不醉如泥弗休醉中嘗大呌曰天非宋天地非宋地奈何奈何語聞賈似道遣客叩之生曰毋多言浙水西地髪白時是其祥也似道未解復召至屛人與語生曰明公宜自愛不乆宋鼎移矣似道惡其言掩耳走生亦徑出過曽淵子家索酒轟飲酒酣作嬰兒啼曰大厦將焚燕猶呢喃未巳耶復賦歌以見意都人士聞之競指以為怪民不與接獨太學生熊晞聖猶時造其廬生私執熊手謂曰吾端居層樓聞空中戎馬百萬來人鬼作哭泣聲壬申襄樊䧟甲戌宫車晏駕乙亥長江飛渡似道亦殛死臨漳丙子三宫播遷諸王大臣皆南北亂走嘘吸事耳子不去欲何為居亡何宋事日非沿江州郡望風奔潰生大慟曰殺氣又入閩廣中吾不知死所矣遂遁去其言無一不驗後四年病死處州學中年五十二無子唯一義女從之生宗堯夫先天之學頗自謂知易毎見諸易師傳䟽不問淺深輒訕駁以為樂及論後天則尊羲畫為經彖爻繫辭為傳黜文言彖象二傳為九師之言且謂説卦非聖筆不能作上下繫乃門人所述序卦直漢儒記爾盖生聰明絶人未聞道而驟語數故其論經多失中然性使酒難近又好訐人隂私人面頸發赤不顧罕有從其學者唯國子簿吳浚進士彭復樂師之浚不卒業復屢受唾斥不怨生將遁時召復至口發例手布籌雖平昔所靳若終身不示人者一舉授復復後又授鄱陽傅立云或曰生瀕死語女曰吾死後一月中朝命山姓鳥名使者來徴吾及傅立立當過予門汝可出藏書示之立當以此致大官後皆如其言所謂山姓鳥名崔鵬飛也生所著書有𤣥𤣥集厯髓星野指南象喻統㑹聲譜畫前妙用數十萬言今猶間傳於世賛曰龍圖成章有文從衡以濬以明以洩其藏以奠乎𤣥黄昔我素王韋編三絶墜緒微茫誰其我綴我參我腴九師襄之我苞我晶百氏攘之如河之渾如曀而昏如治丝以棼天未降割一髪攸存維洛有士居于百原超神沖漠凝於畫先數往知來小大斯甄莫峻匪厓我陟其顛莫深匪淵我瀹其泉簡材以畀非隠弗傳有㝠者冡卒詔以宣或得其􅀈載神子言炎炎宋籙維其訖矣長星蝕栁色之赤矣青祥見徴士髪白矣朋昏以世莫之戚矣魚在在鬵尚其息矣維生之知中如沸􅃵彼昏弗知覆謂我狂我狂如何我憂孔多我山我河我用弗磨俾淪胥以訛我酒既嘉我瑟又龢我寜不嘯歌北風其涼旗旐央央戎車龎龎蕩蕩江流杭之如陸有腥其穢流血沃沃海氛方殷其何能目人有恒言風雨漂搖夏宇障之涉于大川烝徒楫之楫副宇橈孑孑焉依國武斯隊不知攸戒日隕弗升雖晝作夜鴞舞於林鬼瞰于舍孰投是艱曽莫之艾乃惄乃驚乃瞻乃行乃遯死于㝠睠生之為胡乃神以著徴之古聖匪程伊度何以言之卒淪于數一曲之淹不通其故易道既泯數亦不類激賛於生發我長喟月出皎兮在天之心在天之心何古何今陸秀夫像賛身抱龍髯兮眼不見水鳯闕雖遐兮龍堂則邇玉雪皦如兮肯汙泥滓赤日出海兮爾心不死文官花賛胡翰覃木之植鍾美於天地著見於古今者其品多矣大率以不恒有為瑞以不多得為貴華平賓連紫脱闊閲國家之瑞也曠代始有之揚之瓊花潤之玉蕊天下之美也豈世所多得哉物皆然今鎮江其地即潤也范氏世居之為望族有花曰文官先世所植也自呉中富人及京洛公卿之家斥苑囿飾亭館競一花一草之竒以夸示世俗極游觀之娯者往往求若是花蔑乎未有聞也當唐之世唯學士院有之其曰文官意亦以是邪范氏世業儒以詩書起家為令宰任司臬者衣冠相望於宋元二百年之間其於是花亦有不期而符者邪天地生物自形而色白者不能以為緋碧者不能以為紫今以一植而具有其美一日而遞為之變其得於造化之妙非人力能致之唐人以戎王子為異花若文官乃異花也夫以造化所鍾之異天下不多得之物而又植於衣冠之族又有名公卿如辛幼安者本其所自而書之製為樂府以歌之雖謂之美瑞可也而顧不厠於瓊花玉蕊之列者盖范氏故閥閲也其花先世所植手澤也非若蕃釐招隠老佛之宫瓊花玉蕊人得趨而見之使人得而見之有力者將取而去之矣則范氏珍之宜至而傳之不廣也天下之物負其所有不自見於世者皆是類也余老矣於世無所好願以平生不知有此花一旦聞之可為寡陋之歎不能無幼安豪發之情焉乃述其事以貽其後人從而為之賛曰泰圜委和嘉植挺生抱素含貞揚采代榮如彼命服品秩有章下民所望君子之光我徴前聞厥類匪一瑞木四照神芝五色不貴異物邁種厥徳于古有訓君子是式靈峯寺植木賛劉基靈峯寺有松杏與樸竝植焉劉子見而感之為作賛曰杏葉蔥芊有子可以實籩松枝扶踈有苓可以引年樸狀如樗衆蠧所穿擁腫液瞞不可以鐫胡並植于庭溷厥醜妍明堂求材般趨爾先松戕杏割樸獨宛然嗚呼樸乎孰女之憐維女之全抑棄於人乃獲乎天耶宋景濓像賛王禕外和而神融内充而面睟衣冠雖晉人之風氣象實宋儒之懿夫其知言以窮天下之理養氣以任天下之事隠則如虎豹之在山出則類鳯麟之瑞世後乎千載而有存中乎兩間而無媿此盖古君子之所難然吾謂斯人之必至筮作賛有序唐肅予子之􅀈欲筮而無蓍請以竹代之予曰易謂聖人之徳幽賛神明而生蓍則蓍固靈矣然地無蓍可廢筮乎屈原離騷云索藑茅以筳篿漢方技傳亦有筳篿須臾孤虚之術説者曰筳竹篿也楚人以結草折竹卜為篿然則楚人之筳篿以無蓍歟夫蓍蔡産也大龜可卜者出於蔡上有蓍百莖下必有靈龜守之蔡非楚地故以筳代蓍而卜焉今越去蔡尤逺蓍或不能致則倣筳篿之法無害况吾所以質諸神者在誠不在物之􅀈既作之因為賛俾刻其櫝云辭曰祝蜥蜴以祈雨龍之同類也禁原蠶以助牧馬之同氣也繄竹之視蓍均草彚也虚中弗窒又圓其外也虚則有靈具乎智也蓍百莖而同本合萬殊為一致也以有代無理或弗悖也爰韜爰櫝受命則出也載營載畫吉凶以示也於戲泰筮神明之攸寄也曷竹曷蓍惟秉誠之無貳也太師韓國公畫像賛蘇伯衡堂堂韓國秉國之成鴻業以定經費以盈羣賢以進百度以貞四裔以服品物以亨公初無作孰得而名天實生之光輔大明天下之士暏其儀刑想其風采不謀同聲曰漢蕭何唐之𤣥齡功成而退不伐不矜衮衣朱舄安享尊榮蒼顔白髪時遊大廷其徳日新其福日増天子萬壽共享太平宗忠簡公畫像賛公之力足以旋乾而轉坤公之功足以却敵而安夏始以一言能返北斾而南還後以二十四䟽不能囘南轅而北駕且留鑰之任方切而巧言遽入於帝聰度河之志未酬而大星己殞於中夜何人之於公則知媢嫉而天之於公則不知假借此有志之士百世之下所以想英風而激昻拜遺像而悲吒也象山陸先生賛趙東山儒者曰其學似禪佛者曰我法無是超然獨契本心以俟聖人百世敬賛先正誠意伯畫像劉仲璟虬髯電目探天根兮斡地軸扶龍興雲四方以肅以生民休戚為憂喜以大道晦明為榮辱武功既成而文治未盡其用者盖天也耶抑人也耶田疇賛有序方希古智勇人之所有也善用之為難忠義人之所慕也審處之為難天下非無豪傑之士而功不見著於世何耶豈其智勇之不及忠義之沮喪歟用之失其時處之違其機者衆也荀彧不用於曹操則可以比子房董卓吕布不為逆亂則可追韓彭亷丹王尋為漢而死則有以與周苛等而皆不免於君子之誅其迹同而其所為異也漢末之亂酷矣余求竒士於其時得一人焉曰田疇忠不避難勇不畏死奮然感劉虞之遇而思為之報讎公孫瓉既亡謂可以盡力者漢室而已故應曹操之辟既而知操非忠漢者也故辭封侯之爵介不同俗清不悖倫忠在樹功義不茍合其才良其行果盖豪傑之士非當時姦雄所及也論者眩於成敗使操以有功見取而疇之志義不大章明於後世豈不謬哉孟子曰人有不為也而後可以有為若疇者庸非其人耶其不成功者命也豪傑之士制於命而不獲施者衆矣善觀人者觀其志不觀其事觀其器不觀其位由是而言士之不幸者獨疇乎哉吾是以悲而賛之其詞曰古之觀人不於用舍考其所存以第高下譬諸龍駒垂首糞車豈以其賤斥之為駑齊侯千駟如南面王仲尼之嘆夷齊有光漢季分争得國者操吾獨何為田疇是悼操雖據國犬鼠之雄殺后無君天下不容奚若君疇忠義盖世委質劉虞身世靡二使受之命為漢大臣殺操復漢必不顧身嗚呼鄙夫惟利是就誰能為儔我與為友翰林待制華川王先生畫像序賛傳曰國之將興必有禎祥其得人之謂乎故善觀國者不觀其甲兵之雄財粟之多土地之大而觀其得人賢否誠得其人弱可强敗可成不得其人雖威力富庻敵於海内亦不免於亡天將授人以天下亦必授之以守天下之器賢者之所在天下之所歸也當國朝之始興地界於羣雄之間最微矣然是時有數君子者皆起而從之識者已知天命所屬既而或以功業定亂或以文章賛化卒能合四海於分裂之餘不越十年遂致平治嗚呼是豈非天哉烏傷王先生充在數君子中博辨通達以文章名上之為呉王授江南儒學提舉司教理陞禮部侍郎兼引進使轉起居注出同知南康府事及上即天位召入議禮改章州通判會詔修元史遂徴還與金華太史公俱為總裁及史成拜翰林待制未幾而出使西陲雖未獲究其設施然其有益於國者大矣世之趨近功者恒謂儒者不足為時重輕此非知本之論譬之人身彼一才一藝者猶手足耳目然而賢者則元氣也人見手足之能持行耳目之能聴視而不知皆本於元氣不亦惑哉某幸受業太史公而以未識先生為恨先生之子紳以畫像見示乃叙而賛之曰天眷有明勃然龍興豈惟智謀得人乃成其人伊何匪將匪相爰有君子海内之望望既歸之孰能違哉彼王彼侯小大畢來惟華川公蔚其文雅位雖不崇名動天下人知其名豈知其心我懐徳音山高海深義鸛賛并序髙啓呉報恩寺浮屠之顛有鸛二巢焉以遊以宿出返必俱一日其雄罣脛輪索中奮翼自擲空懸弗脱雌下首大鳴若籲于人衆憐之莫能升遂宛轉而絶雌依其傍弗去羣鳥欲磔之輒引喙怒逐不使近逮毛骨盡化乃已余居直寺東嘗見其彷徨飛旋形貎慘悴風雨之夕哀唳噭噭若號慕然余念夫世固有伉儷相悦者矣一旦失所天哀未改而已他適塗膏自媒唯恐非艾晨咷夕噱曽無含忸世嘗以禽喻惡人寜不辱是鸛哉迺賛曰嗟爾鸛乎維鳥之特猗雄死自守禦烏之賊猗獨棲于標夜失其匹猗哀嘶返顧不啄而食猗厥質始化豈貞之􅅎猗匪魯黄鵠孰配爾徳猗戴院使賛茹常神閒以清氣和以平質頎而厚貎澤而明學則究軒岐之奥書則啓金石之經昭代之老處朝廷盖得其道醫國之手雖蠻貊亦知其名懷仁慕義秉徳存誠是宜受高皇之奬譽荷今上之寵榮齒餘八袠而强健身備五福而康寜若夫託泉石之高致締松桂之幽盟彼畫史者徒知寫其歸隠之趣而莫能得其戀闕之情也耶陶𢎞景讃王達士之善於觀人者往往不於其事之所己為而必原其心之所隠微者而觀焉惟能原夫心之隠微者而觀之則其為人者昭昭矣彼泥其迹之顯然者而觀之夫豈得容偽於其間哉吾於齊梁之際得一士焉陶公𢎞景公生而有異四五嵗即知用荻畫􅁅以為書甫長讀書萬巻以一事不知為之恥齊高帝作相用為諸王侍讀彼時雖在朱門閉影息交不外物接永明間挂冠神武門已上表辭禄矣當斯時也窺神器者匪一人朝為君臣暮為讐敵朝為揖遜暮胥篡奪雖欲以力濟之奈天道之未定何於是自勾曲遍厯名山尋訪仙藥毎經澗谷必坐卧於其間所居皆植松聞其聲輒欣然為之樂性好著述凡隂陽五行風角星算山川地理方圓産物醫術本草罔不洞究自以為神丹可成壽可致梁武資之以黄金朱砂等物亦不靳而受之至八十五無疾而逝夫當太清之際以梁武為故人取宰相如拾芥此衆人所不能得而公可得者可得而公恬不為之意茫然與世相忘焉公之賢為何如蠱之上九不事王侯高尚其事者不偶於時者之所為也公可謂偶於時矣而猶不出者庸詎知天下無可事之主哉故其詩曰夷甫任散誕平叔坐論空豈悟朝陽殿遂作單于宫厥後天下𤣥理洊興武事日弛侯景纂位實在昭陽然則公固有逺慮先燭之智矣亦豈可謂公為長逝忘返而無憂世之心者哉予故仰其高風想其遐躅原其心之隠微者為之讃曰􅅾蓽既高芝蘭斯晦梟鴞成羣鸞鵠斯退君子知微黙領心㑹醇酒雖甘詎宜忘醉哲哉陶公靡所不通糠粃富貴勾曲之從月高秋肅一枕松風安知其他我保其躬彼不知者謂公少疵山中宰相夫豈介而我知公心澹然無為不與物絶龍變是宜上陵下替世道日榛寜於其時俯仰屈伸烟霞泉石今古乾坤高風邈哉不見其人自題侍教像賛楊士竒此老之生今七十有三年其仕凡三十有七嵗厯事四朝恒持一志顓顓乎毖慎肅肅乎嚴畏不敢内非類之交不敢徼非義之利禄愈増而意愈澹秩愈進而心愈惴治官務如家務視海内如室内雖不能萬一之有濟而不敢須臾之或怠誠懼上孤明聖之恩有忝清白之世閲春華之屢謝撫寒栢而猶翠聊自寫其素存示同宗以祗勵族孫挺來北京旦夕在左右里蕭生為寫侍教圖挺以求賛因謾書此然士之師古挺尚從事乎逺且大者可也七十嵗自賛楊榮荷䝉先世積徳之厚叨承列聖眷遇之隆乆侍禁近冀效愚忠當齒力之既衰尚責任之愈崇自愧乎進無所補退不我從徒存心之兢兢而懐憂之忡忡惟古人堯舜其君民者素景仰其高風思勉焉而不懈期一致於初終者也故延平守胡子祺賛鄒緝故延平太守胡公既沒三十年緝始得其墓表而讀之為之嘆曰嗚呼士惟患不見用耳未有用而不見其效者况得顯行於其位其大小設施豈得不有所見哉國家初興凡所選擢必擇其才良端直之士而任之士既抱負其所有故見諸有為皆足以震耀於當世而其所立類非迂儒俗士所能及若公是已公以洪武三年應詔至京師受知太祖皇帝擢拜監察御史即上書論遷都闗中事其後出為按察僉事調知彭州陞知延平府事以沒公在風紀不為激擾之政而人畏其威蠻服其化獄以常空其為彭州築隄堰修水利勸民務本力業郡中翕然稱治至為延平聲稱尤著於今延平之人能道其行事盖其悌弟之化有以信於人而其才徳又足以服之惜其名位止於此不克臣於乆逺也昔何武為揚州刺史凡所刺舉未嘗敢自私而又仁厚以處下故郡國各重其守相張詠知成都寛嚴適中威惠信於人故既薨而蜀人為罷市蘇子瞻謂其遺愛蜀人乆而尸祝之若公可謂無愧於公者矣公之次子光大為春坊右庻子與余為同門友既覩公之事乃追為之賛曰昔在太祖勤思賢輔有偉哲人實承知遇布衣登朝居法從班遷都之議動于天顔内臺外憲薦揚風紀兩紆郡符鳴玉曳履材宏徳碩無積不施惠愛所加民自懐之肅肅之儀瞻望莫及箠策之從願為公執鏡容自賛楊溥資可以為學而理或未明時可以行道而力有不至緬懐古人夙夜惟厲而莫及焉嗚呼老矣呉敏徳像賛王直海虞呉敏徳為都察院右僉都御史持敬慎之心秉亷直之節其議論舉措盖有前賢之遺風視世之隨俗變化方外而圓内者相去逺矣此其像也而予為之賛允毅呉公率徳自躬聖明御邦克躋顯融豸冠峩峩邦之司直必誠必恭不詭不激雍容進退端笏垂紳小人所憚君子所親維昔名臣始終一致神之相之福禄斯備風霜肅物生意寔存願𢎞厥施以暢皇仁自賛小像其才學則迂踈其志行亦狂簡幸逢時以效愚毎惴惴於自反然僚友謂之强而主上謂之板愧變通之未能徒為逹士之所莞也强者矯亢不阿之名板者愚執不通之謂盖氣質蔽固之已深而學問變化之未至若謬比於憸邪則難合乎公議雖内省之無愧然豈敢忘敬畏也哉訥齋賛金寔言可訥乎心因言以宣道假言以傳言不可以訥也言不可訥乎身由言而困事由言而僨言不可以不訥也訥乎訥乎殆將訥其所不當言而不訥其所當言也夫在鄉黨則恂恂在宗廟則便便是為訥之模伏生授經圖賛有序周叙伏生諱勝濟南人也案史記伏生故為秦博士孝文時求能治尚書者天下亡有聞伏生治之欲召時年九十餘老不能行於是詔太常使掌故晁錯往受之先是秦焚書伏生壁藏之兵興流亡伏生求其書亡數十篇獨得二十九篇即以教于齊魯之間學者由是頗能言尚書諸山東大師無不渉尚書以教矣又按漢書顔師古註當錯受書時伏生老不能言言不可曉使其女傳言教錯齊人語多與潁川異錯所不知者凡十二三畧以其意屬讀而已是圖盖當時授經之象中坐者伏生旁侍者其女前跪而坐者錯也圖用縑素僅二尺而蒼山古栢靈芝石床書几之狀莫不曲盡巧妙畫者之意亦工矣哉於戲聖人之道寓於六經而書者二帝三王治天下之大經大法所由載有天下者不可不以之取則也使非漢文求之伏生傳之天下後世將貿貿焉莫知聖帝明王精神心術之所寓而道晦矣愚故謂尚書一經不幸焚滅於秦幸而表章於漢尤幸而傳授於伏生也且是時伏生年己九十餘使漢文求之不早不幾於冺焉矣乎然則是書之傳豈非天耶而其所以繼往聖開來學之功又豈居漢之諸儒後哉戸部員外郎高君信以是經登進士厯官朝著有聲家藏斯圖命工裝潢成軸以余家傳是經也求識之乆之未敢執筆而高君之請益堅敬用書其故而為之賛曰大哉聖道寓諸六經煌煌尚書實統厥成秦亡漢興斯道幾晦展也伏生爰際其㑹心惟口誦以教以傳晁錯之受漢文之賢斯文千載既晦而顯展也伏生其功不淺咨爾後學是仰是宗拜瞻圖像邈焉高風文昌帝君像賛劉定之有以孝陵御容傳寫為文昌帝君像者臣定之稽首賛曰日行于天光寓萬形全得為月分得為星雲得為霞雨得為虹影得水底火得鏡中圓明晶彩晶彩日同於皇開天自天陟降其寓于兹文昌帝像主世之文緯地經天有赫厥用無私其權沖天烏紗朶雲龍袍就之日近望之天高臣拜稽古古亦有是宋仁宗像即真武帝明文衡巻二十一
