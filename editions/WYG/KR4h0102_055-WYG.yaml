body:
  text: 明文衡巻五十五明程敏政編雜著牛李維州事胡廣洪容齋謂維州之事當時議者謂徳裕賢於僧孺以今觀之則僧孺為得司馬温公㫁之以義利兩人曲直始分按吐蕃頑獷狡暴世為唐患屢盟屢叛非徳之可懐信之可結維州之事竊有議焉自清水刼盟兵臨近鎮上下震驚徳宗欲出幸以避之自是用兵經費歲無虚日國計匱乏故徳宗問李泌以復府兵之䇿泌對以屯田積榖致富强之術徳宗喜泌曰未也臣能不用中國之兵使吐蕃自困徳宗曰計將安出泌不對大意欲結囘紇大食雲南與共圖吐蕃令吐蕃多備以牽制之知徳宗素恨囘紇故不對恐幷沮屯田之議不行自吐蕃㓂西川韋臯與東蠻兩林蠻連兵禦之屢㨗屢勝吐蕃奔應西川南詔之不暇而㓂河隴之跡漸稀此正與泌計相合至憲宗時雖嘗出㓂亦鮮獲利穆宗長慶元年吐蕃㓂青塞堡鹽州刺史李文悦擊却之秋九月吐蕃遣其禮部尚書論訥羅來求盟以大理卿劉元鼎為㑹盟使入吐蕃與盟二年六月㑹盟之使未還即復來㓂靈武㓂鹽州自此不見再盟文宗太和五年九月吐蕃維州副使悉怛謀請降盡率其衆奔成都李徳裕遣行維州刺史虞藏儉将兵入據其城具狀且言欲遣生羌燒十三橋擣西戎腹心可洗乆恥事下尚書省集議皆請如徳裕䇿獨牛僧孺曰吐蕃之境四面各萬里失一維州未能損其勢比來修好約罷戍兵中國禦戎守信為上彼若來責曰何事失信養馬蔚茹川上平凉阪萬騎綴囘中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為况天子乎文宗以為然還其城執悉怛謀歸之吐蕃盡誅之於境上由此觀之則僧孺之謀誠過矣且維州本唐故地廣徳元年陷入吐蕃韋臯屢攻取之而不能得悉怛謀一旦舉以還唐其來降之日又在吐蕃敗盟之後何失信之有僧孺乃以私憾沮徳裕之功故繆以往日吐蕃入長安之跡恐愒天子使祖宗故地不復徳裕成功不遂悉怛謀枉死負寃於無窮朱子於綱目特書曰吐蕃将悉怛謀以維州來降蓋深惜之也牛李是非如此其著温公之言直牛而曲李者其意蓋有所為宋神宗在位喜於論兵富鄭公嘗云願陛下二十年不可道着用兵二字温公之意即鄭公之意也當西夏部將嵬名山欲以横山之衆取李諒祚以降詔邊臣招納其衆公上疏極論以為名山之衆未必能制諒祚幸而勝之减一諒祚生一諒祚何利之有神宗不聽遣种諤發兵迎之取綏州費用六十萬西方用兵蓋自此始矣後城永樂夏人來爭喪師數十萬神宗臨朝大慟於是公言始驗公平生惟以和戎為念及得疾猶嘆曰四患未除吾死不瞑目矣其一以西戎之議未決折簡與吕公著曰邉計以和戎為便然則牛李之論公云云者欲假此以抑要功生事之人矯當時之弊不然牛李之事曲直甚明公何為曲李而直牛乎維州之論當以朱子綱目與致堂之説為當季布止伐匃奴單于嘗為書嫚吕后后怒召諸將議之上將軍樊噲曰臣願得十萬衆横行匃奴中諸將皆阿吕后以噲言為然獨季布曰樊噲可斬也夫髙帝將兵三十餘萬困於平城噲時亦在其中今噲奈何以十萬衆横行匃奴中面謾且秦以事胡陳勝等起今創痍未瘳噲又面䛕欲揺動天下是時殿上皆恐太后臨朝遂不復議擊匃奴事布老將也故知用兵之利害使其亦如諸將之阿䛕順㫖則必騷動天下因布一言而止其為利溥哉史稱布為賢將其或以此歟武帝時王恢建馬邑之議韓安國屢難其不可使武帝然安國之論則邊釁無由而起衛霍無功之可紀後亦必無輪臺之悔矣劉給事唐代宗永泰元年僕固懐恩誘囘紇吐蕃雜入㓂下詔親征魚朝恩欲奉代宗幸河中以避吐蕃恐羣臣議論不一百官入朝朝恩從禁軍操白刃宣言曰吐蕃數犯郊畿車駕欲幸河中何如公卿皆錯愕不知所對有劉給事者獨出班抗聲曰敕使反耶今屯軍如雲不戮力扞㓂而遽欲脅天子棄宗廟而去非反而何朝恩驚沮而退事遂寝劉給事當倉卒之頃而能抗辭以折權幸使之驚沮真大丈夫哉視當時之公卿閉口錯愕者誠可羞也惜乎史失其名不知為誰千古之恨揚雄曰齊魯有大臣二人而史失其名箋杜詩者謂黄四娘者獨何人哉因此以託不朽世間幸不幸類如此劉給事言存而名泯其幸歟不幸歟陳平用陸賈之謀陳平輔高祖定天下六出竒計無一不效及諸吕擅權欲危劉氏平燕居深念計無所出及見陸賈問䇿賈令與太尉深相結為畫吕氏數事平用其計乃以五百金為絳侯壽厚具樂飲太尉太尉亦報如之兩人同心恊謀卒成滅吕安劉之功者賈之謀也平豈智於前而昩於後乎當事機未決或思慮過當而反惑乎平當危疑之際不自用而取人之長以成事功此所以為賢也平嘗順后之㫖以王諸吕豈亦賈䇿使平陽以計紿之得以成吾謀乎不然平之深念專在滅吕其肯以高祖之業輕以許人乎使平真阿吕后者賈必知之又安肯為平畫計乎張湯杜周有後語曰仁者必有後張湯杜周俱為酷吏然皆有良子爵位尊顯繼世立朝漢之元勲儒林之後乃有不如其故何哉班孟堅謂湯推賢揚善固宜有後者周之跡絶無一行之可舉其有後又何也史載湯決大獄欲傅古義乃請愽士弟子治尚書春秋補廷尉史平亭疑法奏讞疑必奏先為上分别其原上所是受而著讞法廷尉挈令揚主之明湯用儒者議疑法豈於是而有隂惠及人者乎其有後者蓋由於此周無一善之可述但上以其盡力無私若然亦宜有後矣世疑湯周不當有後而皆有後故采摭其美而論之所可見者如此而已不然湯之子安世周之子延年見其父行之繆脩徳礪行為漢名臣足以蓋其父之惡安世之子延壽延年之子欽又能世濟其美後之繼隆或不係於湯周而本於此歟張騫張騫貪一身之利為漢使月氐經大夏復事西南夷通烏孫鑿空西域啟武帝窮兵之欲者實騫之過也班固於其贊略無一語及之但云禹本紀言河出崑崙崑崙高二千五百餘里日月所相避隠為光明也自張騫使大夏之後窮河原惡睹所謂崑崙者乎斯言於騫何有哉豈責其逺使詳於笻竹杖蜀布而遺於其大者乎抑豈不責騫而為漢諱乎不然騫不足責耳公孫𢎞節儉汲黯謂公孫𢎞位在三公奉禄甚多然為布被此詐也以本傳觀之𢎞常稱人主病不廣大人臣病不節儉又其身食一肉脱粟飯其躬行節儉蓋亦素性然也年八十終于相位漢之公卿多由奢縱取敗有如𢎞之節儉必能保其富貴𢎞之行亦可以厲俗故元始中脩功臣後下詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫𢎞者位在宰相封侯而為布被脱粟之飯奉禄以給故人賔客無有所餘可謂減於制度而率下篤俗者也與内富厚而外為詭服以釣虚譽者殊科夫表徳章義所以率世厲俗聖王之制也其賜𢎞後子孫之次見為適者爵關内侯此又可見漢之重節儉而薄奢靡故特表章𢎞以敦厲風俗厥後若唐尊失身以仕王莽封侯貴重位厯公卿衣敝履穿以瓦器飲食被虚偽名其亦與𢎞異矣何足道哉東坡祖黄生説東坡武王非聖人之説蓋本於漢儒黄生黄生曰湯武非受命迺弑也轅固曰不然夫桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂桀紂之民弗為使而歸湯武湯武不得已而立非受命而何黄生曰冠雖敝必加于首履雖新必貫於足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫主有失行臣不正言其過以尊天子反因過而誅之代立南面非弑而何故東坡曰武王非聖人也孔子蓋罪湯武厯稱堯舜禹有不足於湯武也又云孟軻始亂之曰吾聞誅獨夫紂未聞弑君也自是學者以湯武為聖人之正皆孔氏之罪人也斯言竊為未當論語於篇終厯叙堯舜禹以及湯武孔子何嘗不稱湯武觀易革之彖曰湯武革命順乎天而應乎人孔子何嘗不足於湯武所謂順天應人者豈虚言乎又謂武王伐紂誅其君夷其社稷諸侯必有不悦者故封武庚以慰之有不得已焉耳此蓋戰國相傾之術曽謂武王而為之乎當牧野之誓諸侯不期而會者八百天下固已叛紂歸武王矣雖賢如三仁知殷之必淪喪紂之必亡亦末如之何也已矣茍使天命未改人心不去雖封百武庚又何足以慰悦殷之故家遺民哉封武庚者蓋武王公天下之心非為私也湯武之迹孔孟言之盡矣不待辨而明第東坡之論如此恐後來學者惑於其言故略舉其槩以破其説黄生不師孔孟而立異論東坡何為而師其説歟或曰東坡假此以彰荀彧之美甚曹操之惡以武王為非聖人則曹操其鬼蜮矣雖然曹操何足論以彧身為漢臣為操畫謀以贊其業及􅆲奪之形已著方詭異論以自釋其自殺也宜矣何足取哉易卦周易爻辭凡吉凶悔吝皆戒占者人能反求諸已則其應驗有如影響第占者以吉為在已凶為在人往往不應則歸咎於蓍龜誤矣昔漢武帝伐匃奴易之卦得大過爻在九三其繇曰枯楊生華象曰枯楊生華何可乆也太卜謂匈奴破不乆也皆以為吉廼遣貳師將軍李廣利伐匈奴軍敗而降武帝歸咎於卦兆反繆當是時使太卜能云所兆在已阻武帝不遣貳師則必無喪師降將之恥而卦為可徴矣噫蓍龜㫁之明矣而用之者失其意往往如斯唐太宗征高麗唐太宗初征高麗諫議大夫禇遂良曰陛下指麾則中原清晏顧盼則四夷讋服威望大矣今乃渡海逺征小國若指期克㨗猶可也萬一蹉跌傷損威望更興忿兵則安危難測矣及上欲自征遂良復上疏以為天下譬猶一身兩京心腹也州縣四肢也四裔身外之物也高麗罪大誠當致討但命二三猛將将四五萬衆仗陛下威靈取之如反掌耳今太子新立年尚㓜穉自餘藩屏陛下所知一旦棄金湯之全踰遼海之險以天下之君輕行逺舉皆愚臣之所甚憂也上不聽時羣臣多諫征高麗者尉遲敬徳亦上言陛下親征遼東太子在定州長安洛陽心腹空虚恐有𤣥感之變且邊隅小國不足以勤萬乗願遣偏師征之指期可殄上不從及後出師無功乃深悔歎曰魏徵若在不使我有是行也命使祀徵復立所仆碑觀遂良敬徳之諫如此太宗茍能聽之未必不善又何必魏徴之言是思乎竊謂使魏徵若在太宗亦必不能從其言方遂良初諫時李世勣即曰間者薛延陀入㓂陛下欲發兵窮討魏徵諫而止使至今為患曏用陛下之䇿北鄙安矣上曰然此誠徴之失朕尋悔之而不欲言以是知徵雖在太宗必不從其言也范氏謂帝知過能悔此其所以為賢使果為悔過賞遂良敬徳之言何必更思魏徵所以為此説者帝於徵報之薄矣中心豈無慚忸故借此以樹仆碑撫其妻子耳豈真思其言乎若帝真有悔心自當斬然決絶於東征之念矣何故連年不已啟房𤣥齡臨終之諫與徐充容閨闥之疏乎由此觀之曷有悔過之實積釁蓄忿乆而不解至于高宗累歲用師方始平之然髙麗雖衰而中國之經費亦不可勝計矣何足補哉或曰太宗之思魏徵𤣥宗之思九齡事異而情同曰是不然𤣥宗之思九齡盖出乎中情太宗之思魏徵盖矯情耳蕭何聽計漢三年漢王與項羽相距京索間上數使使勞苦丞相何鮑生謂何曰今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大悦五年陳豨反上自将至邯鄲而韓信謀反關中吕后用何計誅信上聞使使拜丞相為相國益封五千户令卒五百人一都尉為相國衛諸君皆賀召平獨弔謂何曰禍自此始矣上暴露於外而君守於内非被矢石之難而益君封置衛者以淮隂新反於中有疑君心夫置衛衛君非以寵君也願君譲封勿受悉以家私財佐軍何從其計上説其秋黥布反上自将擊之數使使問相國何為曰為上在軍拊循勉百姓悉所有佐軍如陳豨時客又説何曰君滅族不乆矣夫君位為相國功第一不可復加然君初入關本得百姓心十餘年矣皆附君尚復孶孳得民和上所謂數問君畏君傾動關中今君胡不多買田地賤貰貸以自汙上心必安於是何從其計上乃大説按何處危疑之地岌岌乎殆哉賴鮑生召平之言易危為安易疑為信不然則何之禍可立而待矣使韓淮隂有此二客則必不至於夷滅惜乎獻計以斬鍾離昩與夫蒯生三分天下之計皆不及此然則二客者亦豪士哉韓信為將韓信擊魏問酈生魏得無用周叔為大將乎曰栢直也信曰豎子耳遂進兵擊魏擄魏王豹定河東觀此則知信之善為将矣何也夫兵力不患不敵惟患将之與吾敵也兵法曰凡戰之要必先占其将而察其才因形用權則不勞而功舉信知栢直為将始輕其無能遂進兵成功使魏當時用周叔為大将則信必不敢輕進又必思所以敵之縱能破魏亦必費力不至若此之易周叔雖不見其事跡盖必能将也雖然信雖輕栢直猶用疑兵設伏以計襲破之其肯真易柏直為豎子徑前而與之搏鬬乎始而問將繼而用計終而破敵成功審彼審已而後動及其破趙窺知趙王成安君不用廣武君之䇿乃敢引兵遂下使成安君能用廣武君之䇿則信必不敢輕度井陘之險又安能有泜水之勝乎觀其戰勝攻取鮮不用計此之所以為善將也後之人舉知信之為善將而不知求其所以為善將之道往往不能如信之必勝而多取敗也雀餳宋杜鎬博學有識為翰林侍讀學士時都城外有墳莊一日若甘露降布林木子姪輩驚喜白于鎬鎬味之慘然不懌子弟啟諸鎬曰此非甘露乃雀餳大非佳兆吾門其衰矣踰年鎬薨繼有八喪廣謂甘露者至和之所感召此為上瑞若人家有之矣亦雀餳之類耳東坡與李方叔詩記宋元祐中蘇東坡知貢舉屬意李方叔令其子叔黨持一簡與方叔值方叔出僕受簡置几上偶章惇子持援來訪取簡竊視乃劉向優於揚雄論二篇援兄弟徑持去坡亦入院李方叔不知也既而就試果出此題二章倣坡意為之援遂中第一人持第十人坡初意第一人必方叔及掲榜乃章也徒為之悵然方叔母嘆曰蘇公知貢舉吾兒下第命也坡既出院以詩寄李有云平生浪説古戰塲過眼空迷日五色蓋亦解嘲云耳其詩真蹟今在南昌李士亷家與徐鉉書稿及張即之手帖共為一巻字畫皆可愛也米黄書記昔潘谷病目謁黄山谷山谷以囊墨詰之谷初探一囊摸索曰今不可得也問之曰此承晏軟劑也又探一囊曰此谷二十年前作今亦不能為矣山谷曰得無假鬼神邪谷曰非也熟之而已山谷遂書以贈谷字徑三寸餘筆皆戰掣法至今三百餘年光采尚煜然照人及米元章海嶽菴四詠其字亦大書險勁飄逸尤為竒絶皆在友人胡思中家誠可寳也虞文靖公知人元史虞文靖公傳載馬伯庸欲薦光州人龔伯璲邀公署薦章公以其小材不可且言其人必不能終伯庸甚不樂及公以章詔事退歸伯庸實倡導之也後龔敗果如公言人服其明智余又嘗聞熊伯幾先生言初危太樸以文學徴起聲名播于朝野士君子皆想望其風采諸門人問於文靖公曰太樸事業當何如公曰太樸入京之後其辭多誇事業非所敢知復曰必求其人其余闕乎時闕名未甚著門人曰何以知之公曰集於闕文字見之後闕竟以忠義顯乃知前輩觀人自有定鍳虞掲詩記虞文靖公嘗作范徳機詩序有云當時中州人士謂清江范徳浦城楊仲𢎞豫章掲曼領及集四人詩為四家且以唐臨晉帖喻范百戰健兒喻楊三日新婦喻掲而集為漢庭老吏序出適掲公歸省墓見之大不悦遂徃臨川訪虞公既相見言及茲事且曰徯斯與公京師二十年未嘗蒙公一言及斯何别後乃爾虞公曰誠有之非集之言中州人士之言也非惟中州人士為然亦天下之通論也掲公咈然遂即席辭别虞公堅留不得竟駕小車而還既别去數日掲公乃以天厯年間秘閣開四詩寄虞公中有夸章分署隔窻紗學士詩成毎自誇之句盖為虞公發也公得詩謂諸門人曰掲公此作甚佳然才力竭已就以所寄詩題其後答云今日新婦老矣後因送人有寄掲公云故人不肯宿山家夜半驅車踏月華寄語旁人休大笑詩成端的向誰誇未幾掲公趣召至都竟以疾卒此得之陳維新云維新豫章才子也薩天錫詩記元薩天錫嘗有詩送欣笑隠住龍翔寺其詩云東南隠者人不識一日才名動九重地溼厭聞天竺雨月明來聽景陽鐘衲衣香暖留春麝石鉢雲寒卧夜龍何日相從陪杖履秋風江上採芙蓉虞學士見之謂曰詩固好但聞聽字意重耳薩當時自負能詩意虞以先輩故少之云爾後至南臺見馬伯庸論詩因誦前作馬亦如虞公所云欲改之二人搆思數日竟不獲未幾薩以事至臨川謁虞公席間首及前事虞公曰歲乆不復記憶請再誦之薩誦之公曰此易事唐人詩有云林下老僧來㸔雨宜改作地溼厭㸔天竺雨音調更差勝薩大服而去此得之熊伯幾先生云鐵柱詩記豫章鐵柱宫井中鐵柱相傳為晉許旌陽鎮蛟之柱厯代名賢多有題詠熊朋來詩曰九牧失貢金司空不行水蛟龍弄波濤魑魅入城市吁嗟清談晉萬事謾不理遂令千載人稽首旌陽子正言反應辭簡意高虞學士詩曰老龍無意弄新波化作鳧翁倚柱歌㸃石神方寜復得沉沙遺㦸不堪磨汾隂鼎鼐千年出海底珊瑚百尺過誰在蓬萊期劫外下騎黄鵠一摩挲此詩初出人皆未喻其㫖公曰此柱未敢必為旌陽之物故詩意皆設疑辭以問之先伯父嘗云鐵柱詩甚多獨熊虞二公之詩超於衆作譙樓畫角三弄記儼㓜聞諸伯父虞部府君曰世之鼓樓曰譙樓者謂門上為高樓以望也畫角之曲有三弄乃曹子建所譔其初弄曰為君難為臣亦難難又難次弄曰創業難守成亦難難又難三弄曰起家難保家亦難難又難今角音之嗚嗚者皆難字之曵聲耳所以使人昬曉之間燕息之際聞之有所儆發也至唐節度使辭日賜雙節行則建節立六纛入境州縣立節樓迎以鼔角今州郡有樓以置鼓角必㑹府而後可非受方面之任而置鼓角皆僭也寫韻軒滕王閣望湖亭詩記諸才子侍虞公宿寫韻軒道士因出巻子求題公賦二律其一云翩翩仙子藥王山明月高樓遂不還天外脩眉塵鏡掩窻中遺墨夜燈閒雪深黄竹歸無所雨暗蒼梧淚更斑何啻浮雲相契合窅然餘跡漫人間其二曰仙人本自好樓居深下重簾寫韻書江上數峯千仞表硯中微露九秋餘下方鐘鼓塵初靜絶世文章事不虚最愛夜凉天闕近綺忩留得玉蟾蜍題畢辛好禮諸人問曰西江登眺之所據江山之勝無踰於滕王閣望湖亭二處公不知其幾過皆不留題何也公曰諸公曽見東坡及儈晦幾詩否皆曰見公曰請與諸公誦之晦幾滕王閣詩云檻外長江去不囘檻前楊栁後人栽當時唯有西山在曽見滕王歌舞來其第一句長江去不囘徃事不可問矣第二句檻前楊桞亦是後人所栽第三句第四句謂當時曽見滕王歌舞者唯有西山在耳含無限之意寓無窮之感東坡望湖亭詩云黒雲堆墨未遮山白雨跳珠亂入船驀地風來忽吹㪚望湖亭下水連天隂陽變化關機開闔於頃刻之間且氣雄語壯所謂吞雲夢者八九二詩皆不可及是以不曽有題明日公與諸人登滕王閣即席賦律詩若干首及一絶句余㓜時能誦之今但記其三律與絶句耳其一曰高閣城頭户牖開江中照見碧崔嵬文章誰復三王後雲氣長從五老來畫角數聲南斗落白鹽萬斛北風囘洲南先有蛟龍窟怪得詩成急雨催其二曰天寒江閣立蒼茫百尺䦨干送夕陽歲乆魚龍非故物春深蛺蝶是何王帆檣星斗通南極車蓋風雲擁豫章燈火夜歸湖上雨隔鄰呼酒説干將其三曰危樓百尺倚䦨干滿目青山不厭㸔空翠逺凝江樹小落霞飛送酒杯乾千年劍氣侵牛斗半夜天香下廣寒我欲乗鸞朝帝闕五雲深處是長安絶句云豫章城上滕王閣不見鳴鑾佩玉聲惟有當時簾外月夜深依舊照江城昔人云詩不可茍作觀公之意可見矣此得之呉用中云上下四方記洪容齋云上下四方不可窮竟正雖莊列釋氏之寓言曼衍不能説也列子商湯問於夏革曰上下八方有極盡乎革曰不知也湯固問革曰無則無極有則有盡朕何以知之然無極之外復無無極無盡之中復無無盡無極復無無極無盡復無無盡朕是以知其無極無盡也而不見其有極有盡也焉知天地之表不有大天地者乎大集經風住何處曰風住虚空又問虚空為何所住答曰虚空住於至處又問至處復何所住答言至處何所住者不可宣説何以故逺離一切諸處所故一切諸處所所不攝故非數非稱故是故至處無有住處容齋以為二家之説止於如此而已余嘗觀程子邵子問答有天何依曰依乎地地何附曰附乎天天地何依附曰天地自相依附又朱子門人有問六合之外當是何物先生曰人生天地間且只理㑹天地間事此語最善彼釋氏又有所謂水輪風輪之類亦幻語爾元二辨後漢鄧隲傳隲拜大将軍時遭元二之灾章懐注云元二即元元也古書字重者多於上字下作小二字以取便爾洪容齋隨筆中乃引王充論衡恢國篇曰今上嗣位元二之間嘉徳布流為證謂元二為元年二年也遂自述在史舘脩欽宗紀贊曰遭靖康元二之禍實本諸此余考漢書文紀有元元之民師古曰元元善意也又光紀有下為元元所歸注謂黎庶猶言喁喁論衡元二之間亦是謂嘉徳布流於元元之間容齋偶未詳耳而趙明誠謂元元語殊不可讀何也杜詩阿咸辯杜子美杜位宅守嵗詩首句云守歲阿咸家注者云咸一作戎乃晉王戎昔阮籍與戎父渾為友嘗謂渾曰共卿語不如與阿戎談黄鶴謂杜位乃公之從弟不應用父子事善本作阿咸東坡與子由詩云頭上銀幡笑阿咸又云欲喚阿咸來守歲林烏櫪馬鬬喧譁正用公此詩也余嘗觀史齊王思逺小字阿戎王晏之從弟也清介有識鑒隆昌之事嘗規切晏及晏貴盛與思逺兄徵曰隆昌之際阿戎勸我自裁若如阿戎言豈得有今日徵曰果如阿戎言尚未晚也晏大怒後果及禍子美詩用阿戎蓋出於此注者不考遂定為阿咸豈不知阮咸籍之姪亦與兄弟之事不相當而東坡於子由偶誤用爾何必據以為證邪又嘗於内閣見子美親書贈衛八處士詩字甚怪偉驚呼熱中腸作嗚呼熱中腸然則杜詩謂善本而其中之誤者豈止阿咸而已哉明文衡巻五十五
