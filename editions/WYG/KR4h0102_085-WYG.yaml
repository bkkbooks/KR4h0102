body:
  text: 明文衡巻八十五明程敏政編墓誌銘國子祭酒宋公墓誌劉三吾國子祭酒宋先生卒既往哭弔居數日博士吳守德持學正朱惟嘉所狀先生行實来曰先生嗣子麟疚在苫次不得跣以請兹將歸窆滑之永寧阡惟翰林兄長吾于先生為同舍故懇銘焉尚憶走始来時㑹先生于春坊先生曰得毋與鎦長吾為晜弟耶不然何面貌之相似也相與感歎久之嗚呼先兄以後至元丙子入監周旋十有五年中間纔兩歸江南爾在監舍法以同時為晜弟以晜弟相知為世契則走于先生忍銘不忍銘按狀先生姓宋氏諱訥字仲敏世本衞之山陽人後徙滑家焉兩世繇貤恩贈嘉議大夫禮部尚書上輕車都尉追封京兆郡侯諱德仁其曾祖贈中奉大夫河北江南等處行中書省㕘知政事䕶軍追封京兆郡公諱宣其祖官中奉大夫陜西諸道行御史臺侍御史贈推誠秉義守正功臣通奉大夫江浙等處行中書省㕘知政事䕶軍追封魏郡公諡忠肅諱崇禄其父忠肅在元時敡厯中外四十餘年五持憲節逮事七朝豐功盛德所以燾後衍慶神道碑紀之悉矣先生濡染家教動以矩矱雅性遲重不妄言笑齒貴胄館以来所師宗工碩儒月開日益卓然有成擢科登仕為時聞人中經繹騷乃被褐懷寶以自韜晦皇明受祚徵詣公車召見次有言動聽洪武之十三年也是冬除國子助教横經發難擊蔀廓塞學者如客得歸嘗同諸儒應制撰敇文畀僧道録司領教事者十有六通操筆立成雅稱上意超授翰林學士奉議大夫俄陞文淵閣大學士日見親信有所補拾曾見太學成中外嵗貢學徒日夥而職大司成者往往巽愞師生相訐教尼不行宸衷簡注擢為祭酒陞朝列大夫以釐正前弊上自製誥詞至以尚父興周八百儗之感惟眷遇所以提挈鏟磢不遺餘力師道既立皇心載寧乙丑戊辰兩科得士大率三天下之二而龍頭魁選恒在太學大被賞遇一日有疾上遣中使致諭其畧曰卿禀天命之性發仲尼之誠施已之幽德修道教人所以病不病而速差以其有神也天章下賁光輝儒紳恒謂祭酒骨格必夀適有畫工至命繪其像肖焉喜溢天表然終老之以其子麟主望江簿特勅召之還俾便侍養其被遇優渥類此方倚之以棟梁我道楷式諸生也不謂得疾旬日遽不可起病也尚醫来治卒也遣官致祭其文悉上所自製故事文臣四品無給䘮費者曠典之舉昉自先生斯皆異數也居嘗寢食恒在廂房未始一宿于家及是疾革麟等託諸監官懇請其還厲聲曰是何風雲氣少兒女情多况在丁社兩祭齋戒中耶至是祭畢乃就舁歸一不口及家事及家氣絶焉二月之三日昏暮時也嗚呼先生以八袠之年當易簀之際而風雲為氣不少衰丁社兩祀始終齋戒是持非其平日操存有素詎能方寸不亂若此哉可謂真大丈夫矣最其平生所裒集先世碑銘傳紀曰紀德録一集所自著述曰西隠文集十七巻既號西隠復别所居别業曰白雲茅屋自法書名畫外他無所嗜好中朝名鉅詩若文讀一二過輒能記憶不減少時今皆已矣生以元至大辛亥十二月四日卒以今洪武二十三年春夀八十配康氏先卒子三人長衎祖即麟擢進士第拜監察御史出主望江薄次復祖鄉邑訓導次安祖女一人在室孫男三恕慧懋女孫四所適其人長郭謹次陳惟新次李均一在室曾孫男女各二皆幼臨發柩時上再遣祭舟車之費一出于官可謂生榮死哀也已銘曰銅臺世家忠肅公挺生賢嗣遭時雍身逢堯舜接夔龍代言文淵掌辟廱感惟皇上倚注隆率先條約自其躬風雲氣槩氷霜容教行六館諸生從金石文章錦繡胷蔚為海内諸儒宗譽髦多士振文風棟梁我道伊誰功夫何一疾遽告終至尊為之惻淵衷命醫與祭恩禮豐年登八袠數始窮歸竁祖塋得幽宫銘阡者誰青藜翁子孫世世其吉逢王紹汶墓誌銘劉夏洪武二年七月余受命尚書来河南陜西兩省訪求前元庚申皇帝天下州縣三十六年入史事跡其在河南置局武成廟之側浙東士大夫王應璧見訪為言其先祖紹汶字思齊生當宋末元初之際貌奇古美髭髯聲音琅然聞于堂室家小嶼溪水環其屋壁門前松枝壓逕梅竹緣坡又雜蒔蘭鞠風至則左右紛披有名帖千巻書萬巻峩冠大袖日課倍誦五經又旁通百氏之書下筆千餘言立就及聞里中有大役則奮袂而興或造公府不避是非利害必俟衆議歸於公正乃已臨終力疾書曰利人之事可周旋處雖獨力亦當自為害人之事於戱謔中雖一念不可妄發又書曰曉夜讀書閒暇治家皆令刻板以垂示子孫娶陳氏子師古與泰女三皆嫁士人孫三公培應璧公恕享年八十有六余聞應璧之言矍然而嘆曰斯人也是乃蓄德君子宜有後者也富貴功名既不在其人之身則在其子與孫矣徐考之應璧其子名師古者有猷為有執守文學議論㡬冠儒林然不肯仕其孫名應璧者十八嵗游幽京厯仕至廣州總管推恩封贈紹汶中順大夫江浙等處行中書省理問官上騎都尉追封天台郡伯嗚呼為善無不報要於久而後信觀王氏祖子孫三代豈不固然與銘曰炎炎者勢翕翕者利閭閻崛起朝躋夕替所以古之公族大夫必尚論其世也許士修墓銘方希古天台方孝孺有篤志尚德之友曰許君繼字士修言必出乎正動必由乎禮趨舍取予咸則乎古之君子而無所茍其精思力學以求道德性命之藴汲汲若或失之而有得乎心沛然以樂不以貧賤患難惑其志余取友二十年所交海内知名之士甚衆考其所存莫有類吾士修者盖其操志勇自守介所期者逺而務踐乎事所造者深而其心欿焉如未有得使假以夀年其所志當卓絶過人而年僅三十有七而卒嗚呼此豈特斯人之不幸耶士修之先汴人其六世祖景元宋髙宗時為某州教授遂家焉後徙寧海為寧海人髙祖文正曾祖彬祖某父琳皆業儒而不仕士修質髙明自為兒童已有成人之志以學賢哲自勉喜為詩其髙妙處有魏晉人格韻别自號觀樂生其詩多道其所樂言暢而㫖深非近世人之所及也或傳其觀樂九詩至京師翰林學士金華宋公見而嘆賞之以為不愧古人凡一時名能詩者皆自謂弗及而士修不自足益刻意經學玩心天人究賾探微將大索六藝之緒反之於約以成身致用而病作矣既病咯咯然嘔血而學不止病凡三年每見心覺其進瀕死精神不亂與人言死生晝夜耳奚足怪談笑而逝嗚呼士修之於斯道非篤信不惑其能然耶初士修學於鄉先生王君藴德王君竒之妻以女弟生一子曰籀二女曰忠曰惠王君固名士其弟琦尤與士修相好士修以洪武十七年正月二十六日卒琦述其行為書託予銘予謝曰子兄弟與士修善銘莫宜焉奚予之求後五年王君仕藩邸死琦亦謫去士修弟顯將以某年月日葬某山来速銘于是士修之親友盡矣予尚誰辭銘曰學失其統騖于空言餙外以欺㡬忘本源嗚呼士修志篤行邵惟正之趨非義弗蹈曁曁其守汲汲其求棄遺芬華獨與道謀業雖不終世罕厥似我庸闡微以朂髦士皇明故通奉大夫晉相府右傅桂公墓誌銘并序王景洪武二十年十二月某甲子晉相府右傅桂公卒享年六十又七明年正月某甲子𦵏于董奥之原循先志也又明年其子慎奉其友韓宜可狀来請銘不獲辭公諱悳稱字彥良以字行從幼不羣聞長老道經訓則嗜若醇酎既冠通經史百家言鏖秋闈中之不得志于南宫歸長包山再長髙節皆有文名除平江路文學掾不就威弧不弦鼃俚荒蠧公以六籍横騖大肆伸儒遏暴方氏連甌越来辟立謝之聚徒山中嚅嚌道真雋永聖涯曰吾以待天下之定也皇明天造反刓剗偽一歸于正洪武紀元觀風者以名上省憲交辟不起六年大徵天下士行省復以名聞持詔公車厠于數千之列唯公得以白衣錫宴除皇太子正字授承事郎侍講六年顯仁闡義出周入孔興衰治忽敷啓剴切東宫深器之㑹文華堂給事不飭勅公啓迪曰昔許魯齋諸生多為宰輔卿其勉之及侍宴以御製勅訂正以聞諮以治道公曰道在心心不正則好惡頗好惡頗則賞罸差賞罸差則太平未有期也是以君人將忿欲是務去明年日南至有事于圓丘以祝文譴主者公曰予小子履湯用于郊我將我享武歌于廟以古率今未足深譴上笑曰卿動援經史屢聞獻替稱善久之嘗有以墨敗官者賜死公力諫如律不聽公但曰三尺法當與天下守之上頷之滋欲試以事以三府疑獄命之讞以情原者若干人翰林以失議見呵公奏當取長畧短上曰不然吾因其長而拔其短以造其全時以法繩下訪曰法數行而數犯奈何對曰用德則佚用法則勞勞以靖民則民勞而弗靖德以靖民則民靖于德矣他日與林温同侍上曰卿何官曰正字上曰卿帝者師也其為上所屬類如此十一年除晉相府右傅授通奉大夫内出勅文以孔孟期之在官責重望尊治出聲生府告無事王益重之政多決焉公謂王者一正心而國定因進心圖以明之十三年革相府改長史授奉政大夫以疾謝詔許之十五年朝京師上太平十二策奏報十八年勅歸鄉里五世祖萬榮宋寶章閣學士知常德府髙祖某宋宣議郎曾祖康老宋富陽知縣祖俊卿贈嘉議大夫浙江鹽運使父與紹贈中奉大夫浙江㕘政初公元中書右丞葉文簡公之孫判慶元府同之子也生而室有火光耀如流星以為不祥出之㕘政公子之娶岑氏早世二男子曰抗曰智皆夭再娶于陳封夫人至孝持身治家内外井井不以貧疚不以貴驕先公卒享夀五十又七與公同墳異藏生慎及全慎仕為中書舍人公平生純一見道處官若家尤不以貧富動心仕止進退不亟不紆坦坦施施及與人交命觴詠詩踔厲風出窮日夕不厭人以春風和氣目之其著作有和陶集春和集清溪集知足集凡若干巻嗚呼甚矣儒道之有禆于世也身用之則榮家國用則寧天下用以平公自結髪戰藝以功名終將何修而致是哉亦惟道而已矣嗟乎道之為用閎矣銘曰不屈而伸其道允臧不樸而文其德不爽天球在序金奏在宫聿諧其施以襮匪躬既燦其英亦碩其聲有閟其藏繄後之成戶部尚書郁公墓誌銘解縉永樂三年八月五日戶部尚書郁公薨于位上遣官祭以文命工曹具襯輟朝一日顧翰林學士臣縉等歎息稱其才嗚呼公之哀榮始終固可美國家所以待臣庶恩禮之厚尤足以激勸于當世公之子孫豈不永有庇賴歟於是其子彬衰麻踵門泣而致公之治命請予銘其墓噫公與予交二十年未嘗爾汝䙝狎亦未嘗挾長殺敬禮予二人者亦自信為誠實洪武二十二年予侍講華盖殿中公始受命為户部度支主事賜名新明年改戶部司屬二十三年陞北平部郎中二十四年六月超授嘉議大夫户部右侍郎考滿上於庭中稱譽擢尚書授資善大夫十三年于兹矣非才而能之乎抑公之盛福其祖考以来積累之慶非偶然而致也公家素饒財慷慨豪舉不為齷齪喜賓客樂於賑窮乏不為德色洪武中奏事庭中被顧問天下戶口漕運地里險易計數時日應機響答無遺謬自謂劉晏以下不論也晚嵗多疾乃時在告上甚憐之公亦時自語予吾覺衰老恐旦夕先朝露不能報國恩吾平生無卓異惟君知也幸與之銘其墓紀其榮遇而已嗚呼公非可謂達歟公蘇人也曾祖仲和祖瑜父德字銘本公以至正丙戌正月十四生於吳縣洪武元年祖父遷居鳳陽臨淮縣公隨而家焉公娶嚴氏綜理家政嚴而有緒彬字孟父亦克孝敬公嘗屬之予曰他日視之曰余故人之子即此子之榮也公墓在臨淮古城之原銘曰古大司徒職惇典禮馴擾兆民豈惟㑹計惟公奮身亦以豈弟恂恂怵怵爵禄之器厯官十年光榮後先豈曰其才有德于天豈無人謀不如盛福崇崇其阡臨淮之麓故元同知邵武路蕭公墓誌銘元之季世天下四分五裂其間盜名字者無慮千百計獨閩之陳友定起徒步至列將相百戰守死為元東南烈士未能或之先也當是時吾鄉豪傑之士多從之崎嶇嶺海至死不怨而朝廷音問實藉以通先祖太史公貞烈死節事聞贈官先君子亦宣授資德大夫參知政事詔使來自海上友定遣江君伯昻與俱来且説熊天瑞于贛伯昻與先公少相善也為其言友定意先公感激因邀里中士蕭君克欽輩數人俱至贛説天瑞猶豫先公以太夫人老病不得行伯昻去報命克欽南逾嶺表間入閩微觀之﨑嶇兩浙出金陵轉入巴蜀還寓長沙厯湘潭以歸與先公謀曰吾觀羣豪智略皆下獨友定忠義殆可倚也乃復之閩友定承制授克欽奉議大夫同知邵武路㕘其軍事友定用法嚴往往致濫輒為營解全活甚衆當行兵擊賊入建陽山谷間卒遇千餘人圍之數重執長刀躍馬奮擊賊首兩人直前来刺將及忽大呼辟易其衆曰且止且止此吾父蕭公也使語之二人跪曰我嘗見獲於君賴公救之得生今雖衆寡不敵我終不敢背德布陣稍却羅拜雲集行建寧光澤道中有七人者執兵而前跪曰生我者公也每思無以為報今幸道經我里敢以白金百兩為從者獻蕭君不識也其人各言姓名及所以營解其生之狀君慰喻却其獻而去洪武元年戊申隨友定至京友定死君以親老辭不仕歸田里年才四十二事親以孝聞讀書教子自娛祁寒威暑手不釋巻親戚子弟從學多所造就洪武戊寅六月二日終于家享年七十二於戱可謂全名福矣君生元泰定丁夘歲餘親母王氏卒繼母王氏鞠之愛之逾已出岐嶷不凡㡬冠從受書於安成羅先生學成教授其鄉卓然以不墜其家為念而所以去就卒如此可謂難也矣余聞之先公常欲為之傳其事今子翰林檢討引髙與余同修太祖髙皇帝實錄見友定之事而歎蕭君之不可作也引髙亦感風木奉狀請銘余不敢辭也按狀君諱寅克欽其字所為文章曰舫中集晚自謂舫中叟學者稱秋舫先生系出闕齋鄱陽慶居山東濟寧有諱忠國者事宋髙宗為吉州路防禦使子文壻吉水城西章氏子孫遂為吉水人髙祖典簿公文布曾祖信可祖德永父雲心世積忠厚連姻士族娶艾氏先卒繼王氏徐氏子男五人長仲髙其季金髙皆先卒次即引髙次持髙皆能世其家女子三人適士族孫男子十四人慶榮回艾明㑹宏卒儀益本遵係全曾經曾孝䝉覩以夀終之嵗𦵏君于邑之仁夀鄉荷塘山之原銘曰有偉蕭君世之通儒縱觀四方議其賢愚得所宜歸之死不回從容進退鐘鼎若違蔬食之甘韋布之温天錫夀祉有賢子孫得譽之真身後乃定盍視厥銘惟善無競故奉政大夫太醫院使戴公墓誌銘王汝玉永樂乙酉冬十一月二十一日奉政大夫太醫院使戴公卒於浦江故第其孫紹以丙戌年十二月十七日卜其鄉獨秀山之岡奉襄事焉持前春官大宗伯鄭公沂狀不逺千里来京師謁余請曰近代以来大夫之沒咸得乞銘于文章君子述其潛德善行鐫之貞石或揭諸墓阡或瘞諸幽宅以貽永久先祖考不幸大故而封塋之石未有其辭不肖之愆何以自逭願先生哀而銘之余辭不容乃按狀叙次為銘公諱思恭出唐平南節度使銀青光祿大夫檢校太子尚書令諱昭後至公厯廿有一世曾祖諱濤祖諱暄父諱垚皆隱居不仕素以詩禮相承稱浦江望族公資篤敏讀書必求聖賢微言奥義為文若詩不尚浮藻務底有用於時暇日於星象堪輿風鑑之術靡不旁推曲究尤精心軒岐書烏傷之丹溪朱彦修氏得許文懿公道學正傳學醫于武林羅太無盡得其秘公先府君蚤從之游繼遣公往執弟子禮受業其門丹溪一見輒奇之悉語公濂洛授受之懿及醫學諸家要故以醫道鳴浙東西洪武丙寅三月皇上龍潛北京嘗患瘕聚遣使召公治療刻日奏功晉府親王遘末疾亦迎致公隨獲異驗厥後晉府訃聞高皇帝馮怒王國臣僚悉逮赴京時公侍左右從容進曰昔者臣嘗受知於王飲臣之藥數矣然竊慮其膏粱之毒復作也今乃果然上於是釋然改容諸臣咸得不坐壬申七月太祖髙皇帝徵公入朝將屬領太醫院事公以老病辭授階迪功郎職御醫值風雨免朝戊寅夏五月髙皇帝大漸公同列進藥不稱者皆麗於辟獨指公謂侍臣曰戴元禮仁義人也慎毋恐近臣聞于遼府親王為書二大字賜公肅慶二府咸為賛詠朝野名卿鉅儒播之篇翰充牣巻帙也皇上正天位超陞今官既就職後以耄不任事為請弗從至數四乃許之仍賜誥命金帛致仕歸田里甲申冬十月復命使者乗軺召公伏枕不起乙酉夏四月以安車入因公衰病免行拜禮優卧官舍惟特召乃進見是冬十月復請乞骸骨勅十五日吉治行俾禮部選官䕶送瀕行諭公曰朕復召汝汝其来也公既抵家出賜金修祀事遍召親故宴飲為樂置殽羞拜丹溪墓載酒造邑中從所知叙平生歡用昭恩貺之隆甫旬餘疾作公自知不治將易簀召諸子姓訓之積善守法具告以不能補報聖恩為身後愧言已而逝享年八十有二卒之明年春二月勅命行人翁綬諭祭于家御製祭文褒奬至備具載國史公厯事兩朝藥餌所施奇效不可殫述金繒楮幣上尊珍饌駢蕃之賜殆無虚月公平生亦誠慎寅畏未嘗少有過差是以遭逢眷知終始一致自古迨今士之榮幸蔑以加焉盖公之學出于丹溪丹溪之學源深而本固非近世醫家者流所可比余曩得其書讀之爰自易水張氏河間劉氏東垣李氏曠百載泝而上焉極於素問靈樞宗㫖推天人交合之理辯隂陽偏勝之氣其識卓以明其説詳以宻以故見之於用能起死回生動若神助一洗拘方泥法之陋誠儒者格物致知之急務也公以所得於丹溪者觸而伸之類而比之研精覃思明體適用宜其遇病施治若矢發機必中正鵠彼不善為射徒袖手操弓莫知攸措焉公今已矣後之人能知丹溪之學者皆公有以倡啓之也公娶諸暨楊氏生子男二曰儒曰儼皆先公卒孫男四孫女四其請銘者長孫也銘曰二氣流斡天清地寧人於其間禀兹粹精茍或滯焉灾疢以成學䘮千載彼昏孰醒匪有先覺疇探其情金元之際羣賢迭興貫通三才窮元洞㝠後丹溪氏遺緒是承載闡微言大宏厥聲公逰其門擷華搴英皇皇聖世以醫自鳴際遇兩朝丕膺寵榮公雖已矣不死猶生垂範後學識是夷行濟危扶殆有則有程獨山之原閟是泉扄過者必式視此刻銘明文衡巻八十五
