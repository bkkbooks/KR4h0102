body:
  text: 明文衡巻八十六欽定四庫全書明文衡巻八十七明程敏政編墓誌銘故工部營繕司主事劉君墓誌銘楊士奇永樂二十二年工部營繕清吏司主事劉季篪卒於官其孤紳寅奉事狀介吏部郎中陳叔剛請為幽堂之銘將歸塟焉君為刑部侍郎時嘗監修永樂大典于文淵閣與予常相聚有知契故不得辭按狀劉氏其先汴人宋建炎初某官某扈從南渡遂官餘姚其子孫業儒亦代有仕者至諱某為丹陽書院山長嘗考浙江鄉試其祖也諱某為慈谿縣儒學教諭門人私諡中肅先生其父也母張氏君諱韶字季篪以字行自幼端靜喜學問為父母所愛既承其家訓長而進學鄉先生宋𤣥僖王孟暘之門刻苦自勵二先生咸器重之登洪武甲戌進士第授行人司行人時重行人之選非進士不授凡方嶽大臣率出此君為之一以所學不肯茍嘗持節使雲南四川朝鮮所至宣上德達民隱餽贐一毫無所受事聞賜鈔襲衣丁丑陞陜西布政司左叅政先是陜有逋賦民積歲不能輸有司峻刑督之君至慨然曰民困故不能輸為之父母又忍峻刑督之耶與其寮謀分行郡縣解其縶緩其期勞來綏輯而從容勸誘焉民皆感激思奮曰是赤子矜念我我可不戮力以累仁人奔走假貸以輸無幾畢完陜不産碙砂而歲有課額民窘不能償至或僨其家者君為奏罷之洪渠水溢為民患躬行視之為設法治堰民賴以安蓋凡可以利民者率盡心焉華有郭子儀祠已壞過之嘆曰此崇德教民之務何可忽督令丞修葺之凡所過祠宇有關風化而壞者必風郡縣葺理之其達政體槩類此在陜四年可書之績尚多被召為刑部左侍郎尤懇懇重民命平反具獄數事陜平民王某為强盜所引逮至而所引者已伏法不能自白君察其寃召所引者之妻子使識之而聽其詞竟得實王免於誣有典守錢穀而虧兊者既被逮則援引千餘人同罪君廉知其誣卒辨所誣引者釋之河陽逆旅夜有朱趙二人異室而宿朱怨家後追至殺之而誤中趙朱實不知天未明行十數里逆旅主人疑朱殺之追執送官鞫訊考掠朱不勝遂誣服不敢求辨君獨曰是偶邂逅相聚非素有負且計其裝非有圖也特緩其獄遣人密察之無幾有司竟得殺趙者而朱以緩獄不死揚州民胡氏夜有賊入其室殺人而遺刀屍傍旦視之柄有鄰家蘇氏私識官捕鞫蘇蘇曰家失此刀久矣不服既備極諸刑竟誣服君潛使人懷刀往察其鄰一童子識之曰我家物也遂得賊而釋蘇蓋其理刑一以求生為務永樂乙酉朝廷廣召文儒纂修大典命太子少師姚廣孝禮部尚書鄭賜監修而擇六卿之貳有文學者一人為之副遂以命君討論裁處人多服之書成受厚賜庚寅坐失出罪人左遷兩淮鹽運副使未行復留丁酉改工部營繕主事躬勤治職未嘗以崇卑為意壬寅得痺疾明年正月某日卒享年六十有一君為人清素雖厯顯要而泊然自持居家敦孝友之行接人有謙讓之節雍容雅度有犯不校閒暇手不釋巻治經長於春秋喜吟詠冲澹優柔有陶靖節韋刺史之趣所著文集若干巻藏於家娶潘氏子男四紳寅辰復辰中永樂庚子順天府鄕試先君一年卒女二長適安逺縣學訓導趙某次尚幼君之塟以洪熈元年正月八日其墓在其邑某鄕先隴玉燭之原銘曰學有以用於世才有以達其志得失無所怍乎内勒銘其藏垂休永代太子少保禮部尚書兼武英殿大學士贈榮禄大夫少保諡文靖金公墓誌銘太子少保禮部尚書兼武英殿大學士金公以宣德六年十二月十六日卒訃聞上嗟悼甚至贈榮禄大夫少保諡文靖命禮部尚書胡濙賜祭又命自喪至祥禫皆遣官祭敕有司治喪塟百需所以褒寵之厚且備矣公諱善字幼孜以字行其先世見余所作其考雪崖先生神道之碑公自幼嗜學問内承家訓之篤長從前進士聶鉉先生受春秋經得其微旨中進士乙科授户科給事中太宗皇帝初臨御注意文學士改翰林檢討居無幾簡翰林之臣七人處之内閣付以密務而兩制悉歸焉七人者廬陵解大紳胡光大永嘉黃宗豫南昌胡若思建安楊勉仁公與士奇也數月皆陞官公為侍講授承德郎仁宗皇帝在東宫時翰林春坊司經局之臣日講經史公專說春秋敷析簡明睿㫖稱善遂命纂十二公事作春秋要旨三巻以進永樂五年陞右春坊右諭德仍兼侍講授奉訓大夫七年車駕巡狩北京公與光大勉仁同扈從八年扈從北征冬還南京陞奉直大夫十年賜誥命贈其考守正為右春坊右諭德母陳為宜人封母羅為太宜人贈妻孔為宜人十一年扈從巡北京從征北邊十二年復從北征陞翰林學士仍兼諭德修五經四書性理大全為總裁官授奉議大夫十四年還南京明年扈巡北京預修太祖皇帝實録十八年陞文淵閣大學士仍兼翰林學士二十年扈從北征二十二年復從征北既旋師中道宫車晏駕初喪至歛皆勉仁與公據禮行之既而勉仁先馳歸報道中之儀皆咨公而行仁廟嗣位進户部右侍郎仍兼文淵閣大學士翰林學士踰月陞太子少保兼武英殿大學士專典内制賜大臣五人銀圖書其文曰繩愆紏繆蓋以匡直勉之公其一也奉命持節冊封趙王妃及封梁王洪熈改元命兼禮部尚書三俸並支大臣兼三俸者惟勉仁與公兩人賜誥命授資善大夫贈其祖仲卿及父皆太子少保武英殿大學士祖母周母陳皆夫人進封母羅太夫人贈故妻劉封繼室屠皆夫人以法司論死罪多寃抑命自今臨決必㑹大學士三人同審而公預焉詔百官有親違離三年以上者聽給告歸省公首奏歸省母蓋前此百司職務填委無敢言私至是公首奉詔賜賚甚厚是歲丁太夫人憂上嗣位詔修兩朝實録起公為總裁官明年奉命持節之寧夏冊封安化真寧二王妃歷河南關東西之境弔覽周秦漢唐以來遺墟故址悉見賦詠所過兵民休戚既還具言於上實録成賜金織襲衣文綺白金鞍馬是歲扈從巡邊至宣府而還歲餘得疾上遣太醫院官視療數月竟不起春秋六十有四公為人簡易沈黙温裕有容居家敦孝友之行既仕事上以誠持論必正扈從北征時道中士卒有憊者太宗皇帝知之以問羣臣羣臣未有對公直對宜遂班師凡於公務致勤不倦處同寮能讓於人汎愛無忤其學該愽文章和平寬厚類其德性四方求者無虛日靡不酬應得其一篇一詠者皆寶重之書兼工真行嘗考會試者一讀廷試巻者四不伐善不騖名初陞學士寵賚日加即以盛滿為戒名其燕處之居曰退菴疾革士奇與勉仁問之有何言公言受國重恩上無所益朝廷下無所益生民何言傍或啓之請身後之澤者公正色曰君子所恥訖終清明未嘗片語渉亂既卒自公侯六卿暨諸司之長皆哭弔奠祭士無賢愚皆有喪善之嘆嗚呼儒者際遇始終光榮如公一世其幾何人公之所存蓋無忝矣子男五長昭伯宣德二年進士次武伯堅伯文伯壽伯女五皆有歸孫男六女三公塟以卒之明年某月日墓在某縣某鄕某原銘曰玉笥崔巍金川湛澄公生其間萃龢挺英賓興賢能濟濟皆至青萍出匣淬礪初試六御乘時登庸玉署清邃崇嚴叅典密務恪勤夙夕小心寅恭于狩于征龍旗率從上承簡知履坦平平鵾遊滄溟鵬翺九天厯事三聖敬終猶始不競不絿有譽無毁方簡大冊天府所藏崇碑厚碣敷在四方謙退之存易簀不貳嗚呼文靖可式有位國子司業張公墓誌銘楊榮永樂丙戌秋七月三日國子司業張先生以疾卒于太學之官舍京師士大夫與夫六館諸生皆相與哭之盡哀既奉匶南還卜以某年某月某日塟某鄕某山之原國子學正順昌黄立為述先生之行徴予銘之予生也晚忝以科目入京師濫官翰林辱先生折輩行相契厚今先生歿矣烏可無銘文以告後世遂弗獲辭按狀先生諱智字𤣥略姓張氏其先為延平之順昌人曾祖某隠德弗耀祖元贈滄州路平陽州判官父昇元以神童薦補太學授秘書郎五轉而為江西儒學提舉母范氏周氏生母陸氏先生以元統乙亥某月某日生自幼有大志聰明頴悟讀書過目成誦羣兒為嬉戲之事必正色端謹如老成人稍長即能勵志於問學嘗慨然曰采玉必於崑山探珠必於滄海士之為學豈不出户庭管窺蠡測所能至哉即日挾䇿入元都交當世之名士用薦補入國學元之季四方兵興先生以才出叅閩省機務省臣承制授先生同知新喻州事已而知其不可為浩然退歸國朝初定天下先生即建陽之崇化里灑掃一室置古今書籍其中窮搜博覽沛然有得於心鄕黨爭企慕之洪武戊午以明經應薦上吏部授夷陵州學正凡九載以内艱歸既服除入覲太祖髙皇帝方任賢圖治知先生才可用遂超拜禮部試左侍郎即首言宜以書籍頒布北方學校議者以費財不便先生正色曰使賢才彚征利益生民何惜此費衆大慙未幾實授右侍郎其在職能秉禮不遷綱紀秩然人莫不敬服之居二歲以事左遷為國子學錄㝷陞博士後遂擢司業先生能誘掖奬勸以誨諸生故鮮弗底于造就其教人一本於道德仁義之說孜孜焉開導後進老而弗衰一時學者莫不師宗之永樂初今上幸學衆推先生講易特蒙寵異賜予甚厚至是卒享年七十有二初娶魏氏繼室某氏子男二人長時早夭次旼孫男若干人曰某曰某榮於先生同里少時巳聞先生名心竊仰慕暨官京師得朝夕從先生杖屨之末以聆緒論私以為幸孰謂先生奄然永逝而竟弗得以終惠教嗚呼可勝惜哉然先生之文章事業不可以無述也謹撰為銘文一通以納諸墓庶後之人有攷焉銘曰猗嗟先生早馳駿聲蒐羅百家學霈以盈元政不綱才弗大顯聖朝肇化齎志斯奮筮仕夷陵允為範模諸生雲從濟濟文儒爰貳春官帝心簡在讜論嘉猶國史具載晚教成均為學者師六館化之時雨是資書林之原卜此窀穸過者式之先生之德詹事府少詹事兼翰林院侍讀學士贈嘉議大夫禮部左侍郎曾公墓誌銘宣德七年春正月辛巳詹事府少詹事兼翰林侍讀學士曾公卒于北京之官舍予與少傅楊公往哭之士大夫皆往㑹哭翊日予二人以聞皇上悼歎即命禮部賜祭贈嘉議大夫禮部左侍郎命工部治墳塋兵部給舟歸其喪將行其季子种謁予拜且泣曰种父未卒前二日屬春坊庶子周公狀其事行命种請墓銘於先生先生幸賜之以慰先人於地下予聞而益悲念與公交好三十年而今已矣奚可辭銘公諱棨字子啓吉之永豐人其先世出自武城西漢末郕國十四代孫諱據者避王莽之亂率族人南遷散居南豐廬陵諸郡至宋兵部侍郎江西湖廣安撫使贈武成伯諱晞顔者公之髙祖也元翰林直學士諱德裕者公之伯祖也翰林編修知制誥諱巽申者公之祖也考諱叔本妣張氏公幼頴敏端重言笑不易五歲盡識象戲字七歲從學伯父兩皋十五以其所學訓族人子弟十七出教新淦胡氏塾巳有名時儒者鄒仲熈鄒幼亨輩皆忘年與之交二十充邑庠生教諭戴正心文學老成尤重公既作詩勵之復為龍說期其大用永樂元年中江西鄕試明年禮部會試中選者四百七十人公在第八庭試遂中第一賜進士及第太宗皇帝奇其才親批所對䇿褒美之賜冠帶朝服授翰林修撰承務郎未幾詔選進士二十八人俾進學文淵閣公為之首上嘗召問典故公奏對如響每應制詩文皆立就由是深沐寵眷纂修永樂大典命為副總裁授儒林郎五年陞侍講授承直郎丁内艱大駕巡狩北京起復扈從同邑有坐奸黨事逮公者人以為危太宗特原之謂曰朕惜爾才也公所居西長安門外家人不戒火延及禁垣上亦以公故置不問嘗與諸才俊賦天馬海青歌於上前公獨先成詞氣豪宕太宗深加歎賞陞承德郎滿陞侍讀學士與修太祖髙皇帝實錄書成重沐賜賚丁父憂復起就職仁宗皇帝嗣位皇上正位儲宮陞右春坊大學士仍兼侍讀學士授奉議大夫賜誥命贈其父為奉議大夫左春坊大學士兼翰林侍讀學士母為宜人洪熈初元侍皇上監國南京宣德改元與修兩朝實録書成賜金織襲衣白金文綺進詹事府少詹事賜寶帶日直文淵閣歲時屢拜御酒珍饌白金鈔幣之賜恩意隆洽一日趨朝以欬嗽遽引退上遙見之詔免朝叅公益敬慎弗懈踰年疾復作上亟命醫往治公知不可起自為賛遺相知者訣别遂卒公生洪武壬子八月戊戌享年六十有一既卒公侯六卿以下皆往哭奠而士林君子咸共悼惜以為斯人不可復得矣其配鍾氏有賢行封宜人子男三長秬先卒次稷次种女五劉敦會鍾公鉉周秀夫胡顓勉髙欽夫其壻也公姿貌魁偉襟度夷曠孝友忠實出乎天性而才氣志行尤超卓不羣兩京鄕試禮部會試屢典文衡去取率公平素奬勵後進以為已務宗婣鄕䣊有急難靡不用情善飲酒與賓朋觴詠談笑傾倒意豁如也為文章才思滂沛頃刻千百言不待思索工書而草書尤精得晉人風致四方慕而求之者足相躡其門至於啇確古今講論政治無不切當其塟以某年某月某日其墓在某山之原銘曰偉哉曾公卓犖瑰奇少處鄕邑才已不羈永樂初科首賜及第玉質金聲為國令器居官翰苑克慎克勤文行之懿逺近著聞歷事三朝竭心賛翊寵眷殊深屢進清職弗究厥施遽止於斯恩命之隆生榮死哀惟兹鄕邑山盤水遶銘諸其藏千古有耀故給事中李君墓誌銘楊溥洪熈紀元之初詔廣言路以來天下之善而漢中府學訓導李君蕃上端本十六䇿朝廷嘉納之驛召至京授行在兵科給事中九載考績稱最將陞秩而君以疾卒于官聞者咸惜之弟蔚請翰林編修江淵狀君家世厯履行義卒塟請予銘予嘗識君不可辭乃叙而銘之君字秀實唐凉國公愬之後某世祖自洮州臨潭徙于荆五世祖細元季徙蜀之富順祖允中復徙内江父季賓以鄕貢進士任訓導陞教諭歷七邑所至能教人君生長宦所自幼警敏異常兒既長力究羣經中鄉試會試中副榜遂領教職以上疏論事陞行在兵科給事中授徴事郎其為教官以師道自勉為給事中克舉其職命視關外城壘還陳備邊䇿清理軍政於河南人稱公平還獻安養軍民十餘事所至采軍民利病以聞每念二親不就養請分俸給之朝廷宴賜或有嘉味美醖綵幣謹封識奉其親及得推恩於父母乃請告歸省賜楮幣為道里資其處内外親姻皆有恩誼姑二人早寡君迎養于家撫其子咸底成立朋友鄉䣊以善相與䘏困窮化横逆皆可稱道家食時買僕一人葢僕嘗盗其主人之馬及事覺主人求僕殺之以三人易僕君竟不與素甘澹薄言不及産業撰家範一編教戒子孫所著詩文有鳴佩集藏于家壽止三十七卒以宣德甲寅春二月二十四日父季賔封如其官母陳氏封太孺人配黃氏封孺人子男四人曰吉安曰某女一人在室正統元年冬十二月二十一日塟其邑青岡原銘曰駟馬高車萬里長途中道而仆其命也夫其命也夫
