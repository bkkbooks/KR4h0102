body:
  text: 明文衡巻三明程敏政編騷思媺人辭宋濓吾鄉吕成公實接中原文獻之傳公歿始餘百年而其學殆絶濂竊病之然公之所學弗畔於孔子之道者也欲學孔子當必自公始此生乎公之鄉者所宜深省也嗟夫公骨雖朽公所著之書猶存古之君子有曠百世而相感者況與公相去又如此之甚近乎聞而知之蓋必有其人矣託物引類作思媺人辭辭曰惟媺人之愔嫕兮賦姱質於自然修蛾規而凝黛兮曼目轉以成􅗻妥鬒髪而如雲兮靨輔巧以承權纎腰秀頸若鮮卑兮容都曼而體便姢寶璐縈而右繞兮袿徽嫷以半偏懸明月以綴佩兮錯木難而傅冠向瑶臺而微歩兮意憺靜以貞閒宓妃之倫折芳馨以相遺兮復容與乎江干勢翩翩其騫舉兮若㳺龍之在淵胡人間不可以乆留兮遂淩厲乎高寒馮道紀以為御兮鍊天和而為飱徑驅馭於陽陰兮時上下乎星辰款予生之何晚兮不一覿於芳儀念姱嫭之鮮雙兮遡迴飈而曽思欿愁悴而委惰兮氣涫􅘺以如炊道茍可以遡之兮視萬里猶門墀登嶇嶔而騁望兮正晨旭之蒼涼氛曀豁而闓朗兮莽山川之縱横樹輪盤糾而柴􅫧兮薠艸藿靡以相望豐狐思羣而永嘷兮文鷮慕類以徐翔企精爽之不徠兮空雲龍之將將蹇侘傺而望絶兮燿靈曶其西藏降崇丘而臨曠野兮循故轍以東歸向闌楯而徙倚兮境外嬰而愁内滋新蟾皎以出天兮想纎美之曲眉繁星爛而成文兮懷繡帔之陸離蒼灝霩落而無滓兮思玉體之弗緇拂蘭袖而起歩兮復經緯乎空庭苦鴻鴈之廱廱兮厭羽蟲之薨薨撼户􅀈以悲惻兮惕瞀容而弗自勝轉曲牖而入堂壇兮牉獨坐對乎華鐙鐙影揺曳如鳥􅎶兮象中心之靡寧寒厖狺狺而競吠兮耳恍聞於跫音疾倒屣以啓闗兮飈鬭葉於枯岑縹綿綿而莫抒兮託幽寄於瑶琴琴聲咽而思深兮類孤雌之鳴陰更􅜝寞以將闌兮斗杓旋而向東舒枕衾而就榻兮期夢寐以潛通精氣注以弗釋兮橋有物而衡中息纚纚以方微兮䰟翕翕而上征造旬始而謁太儀兮羣靈繽其若樷氛旄溶以隨猋兮鳯旍沛而嬰空馭象車而秉虬節兮鞭列缺以斥豐隆豹纛熊幡聿皇以奮兮繆流紆譎鬱以相䝉左撝右衛動以綳彋兮倐眒倩浰雲滃而雷舂囘穴幡纚汨以芔歙兮吸嚊潚率謂以䝉鴻穆眇眇以前邁兮翩衯衯而弗止莽㝠㝠以無垠兮勢皇皇而迤靡超氛埃而淑郵兮竟按轡乎朱陵長麗舉躅以向日兮有赫戲之華文揚芒熛以上焱兮粲重離之丹門炫赤玉之寶章兮列八龍之威神歘東趨於蒼極兮青琱紛其竝迎羣神衎衎以方饗兮奏靈和之鳯笙四酎芬而味歆兮暈玉色而帶赬楫素威以升皓宫兮盼四極之浮浮蓐收顧余而破顔兮鍚鏤瓊之華鉤謂貞白以自守兮合左契於伊周折寒門而燭元㝠兮朔颸颯以吹裘有夫𤣥巾而擐甲兮握靈蛇以為驅重陰沍而未啓兮肅𤣥氛之幽幽四方非不可居兮悵所思之莫余都馳兩轂如飛丸兮又滔滔而遐逝靈氛告余以吉故兮子何為兮獨悲苦彼中天之有居兮隔人世之風雨吾將導子之一至兮庶弗愆於恒素怊忽荒以從之兮駕剛飈以徑度曶光炎之炘炘兮綝纚鬱怏而不可正視琱甍彤楹屹以上起兮瀏濫𢎞惝雲譎而波詭連巻欐佹沓以軋芴兮崴魁幼眇矗以高峙中洞房之沕穆兮乃媺人之攸居使曼姬為予通訊兮儼再拜乎堂垂忽朱扉之洞開兮移玉趾之委蛇珠明玉潔不足以為喻兮光照耀乎東西吐芳辭以若蘭兮意勤勤而告余曰皇降靈兮昭質弗沬毋染爾穢兮昧厥施紉葯襦兮曵茝斾結蕙纕兮張椒幃勺桂漿兮嚥蓀糜索胡繩兮畦揭車集衆芳以遠蒸兮羌郁郁而斐斐余俯首而敬聴兮書鞶紳以自規海色動而報曙兮陶去幽而開寤雖嘉辭之盈耳兮邈若人其何處遂捫膺以沈思兮顝獨處而繚戾也誠因言以㑹心兮將神交於千載也亘天地而無初終兮惟我民之秉彛道𢎞敷於上下兮必有人而繫之往者固不可作兮幸方册之昭如日㕘驗於厥躬兮若面命而耳提跛鼈之媻姍兮固難齊於六驥能孳孳而弗怠兮亦千里之可至余雖質䪥而力單兮敢不沾沾而奮厲帶鈎矩而佩衡兮撤蔀䝉而祛罻期有形以必踐兮始俯仰而無媿縱不得媺人以與之㳺兮又何異同功而竝世予既為此辭嘗録一通寄王子充子充盖有志同予學呂者書以識之庸俟異日各考其學之成也孤憤辭宋濓中州人士有無罪而被廢斥者識與不識咸冤之濓因本其志為署孤憤之辭使世之用法不慎者讀焉其或知所懼也夫辭曰哀予生之匪淑兮耿鬱紆其誰語恐此心之難白兮假微詞以自吐曩有志乎學古兮指前修以作則非秋蘭奚敢紉兮非申椒吾焉食仗所履之正直兮謂無施而不可悲世塗之嶮巇兮曶獨中兹危禍胡萋斐之小文兮竟成之於貝錦指剛方以為圓兮揆人情為己甚伊翩翩之公子兮余素得而友之握手以示肺肝兮若斷金而弗疑何中心之多變兮一旋踵而弗予識既擠予於坑穽兮復彎弓而下石汝面目之無怍兮曽何謀之弗深縱禍予其曷傷兮吾懼戕汝之良心覩日月之光昭兮聞雷霆之隐耽予固不足畏兮汝寧不畏于天天道微而難索兮斯焉足以責汝彼黄鳥之嚶嚶兮猶求友而弗止將七尺之美軀兮乃一禽之不如予固約結而㒺措兮又為汝而歔欷嗟受命之蹇産兮豈獨汝之為尤蛟龍鬬於深淵兮寜無損於鰌䱔汝雖不我陷兮予安往而逃囚唯飲泣而無所訴兮傷予罪之不當蒼天之至明兮獨不鑑我之幽枉叶於良切皎皎之白璧兮僉訾其為燕石也纎纎之素縞兮反謂其如𤣥漆也欲力詆以深文兮其奚患於無辭臯陶之不吾出兮眼有淚而誰知誓剖心以自明兮念父母之所遺茍自經於溝瀆兮慮君子之見嗤夜漫漫而不旦兮悲風颯其四來秋蟲響於空堦兮似助予之悲哀六合之至廣兮寘一身而無所魂怳怳若有忘兮雖生存而如死昔公冶之所遭兮夫何有於不仁在縲絏而非罪兮亦魯叟之所稱果自反而弗疚兮縱遇辱其如榮浮雲過而日潔兮春冰釋而水清外累不足以為愳兮愳吾徳之未明意欣欣以超絶兮振冠纓而起行取瑶琴以彈之兮有和衎之新聲樂天命以自度兮究年歲而不再更題王子充琴邉秋興圗辭詹同風泠泠兮木落山盤盤兮雲陰吾將鼓兮秋水誰能識兮此心弔董生文胡翰余自京師南歸次于直沽泝流而達于衡漳過陵州故廣川地也或曰漢江都相董仲舒墓在焉為文弔之其辭曰出國門以南邁兮渉衡漳而濟舟波流渾其若河兮道既阻而且修臨廣川之故墟兮曰夫子之首丘望原隰以懷思兮悵欲去而夷猶嗟王風之不競兮人各騖其私智道術裂而民散兮世已乆而莫制燕趙固多竒士兮僅有取其忼慨非天降大雅兮繄孰為之表礪聖垂法於春秋兮志雖微而可即士明經以致用兮義非后而不食徵天人以為言兮明灾異之在辟引君致之當道兮情眷眷於悱惻嘉堯舜而樂三代兮得一士而不能用苟不用其亦已兮國無人而曷重黯質直而見憚兮𢎞飾詐而取寵用舍倒而莫察兮邪正溷而彌冗騂不中夫犧牲兮執鸞刀而薦犂登䙝味以實瓉兮瀝黄流而注兹競刓方以為員兮攦榘矱而去之徒操末以齊本兮引繩墨而止之下皇皇而靡所騁兮上訑訑以為得孰好賢如緇衣兮孰惡惡如巷伯古固難於知人兮詎多欲而不惑庸俟時之見察兮庶師言之允一謂伊尹無以加兮雖管晏弗之及探淵源其尚眇兮又豈㳺夏之儔類何一低而一昂兮槩未量乎夫子之志曰正誼而明道兮不計功而謀利皦内顧而如斯兮揆王佐亦奚異俾詭遇以獲禽兮固吾心之所羞比栁下之三黜兮由直道以事人百里之飯牛兮豈汚辱而忘身道有時而詘兮亦有時而伸諒天命之未違兮獨奈何乎生民憫貞淑文胡翰何斯世之昧昧兮耿獨抱兹貞淑曰降命之自天兮固眇軀之所服肇兩儀於厥初兮恒正位而並育矧夫人之伉儷兮豈云疏而異族昔結髪以承歡兮將偕老以為期忽惡笄之在首兮遂中道而棄之惟國有大事兮莫大於征伐之師既北面以奉命兮願委質以驅馳冒白刃以爭先兮懼不得其所死茍死弗慊于素兮又安足以痛毁相女婦之從夫兮醮一齊而不再力莫拯君之阽危兮雖獨生其何待孫神之戍夏兮陳迎翣而捐軀高叡之䘮趙兮秦瞑目而與俱卓怒行其威敎兮皇甫係而猶詬李斷臂於逆旅兮負凝骸以貽後諒風猷之一致兮曠年歲而不可衊襲芳菲以紉蘭兮又佩之以雙玦仰三辰之在天兮心炯焉其昭晰即所安而自得兮吾竊哀丈夫之非烈懐龍門辭劉基有美一人兮美且都靑霞為衣兮白雲為裾被秋蘭兮佩珣玗泰和與逰兮中黄與居瞻望弗及兮芳歲其徂山高水深兮道阻且紆安得羽翼兮致我與俱有美一人兮美且仁自我不見兮不知幾春仰𤣥穹兮盼參辰為合為離兮誰識其因青㝠無階兮江海無津安得羽翼兮致我與隣有美一人兮在山中蒼眉青鬚兮玉雪其容飲沆瀣兮食紫虹澡石泉兮灑松風邀初平兮從赤松超逍遥樂兮無窮安得羽翼兮致我與同九嘆九首秋風起兮夕露􅄎浮雲沈陰兮白日晝寒木葉落兮水泉乾孤鴈鳴兮悽以酸攬余轡兮悵盤桓野蕭條兮行路難豺狼驕兮狐兔頑蘭蕙死兮荆棘蕃我欲奮飛兮無羽翰援雅琴兮發哀彈絃斷絶兮涕汍瀾我髪種種兮颯如其稀我心倀倀兮忽若有遺過吾不能改兮徳吾不能知往者不可悔兮來者不可期進無益于世兮退將安歸嗚呼已矣兮吾寜不悲天有田兮不可以耕山有龜兮不可以知咎徴刈蒿以為梁兮削菌以居楹匠石却走兮工垂拊膺登高望逺兮觀四瀛水東流兮日西傾般紛紛兮各有營我獨展轉兮從夜達明風飄飄兮揚塵野寂寞兮無人舟何為兮山阿車何為兮水濵北望楚兮東望秦倒江河兮亂星辰天門窈窕兮重九闉願有言兮逺莫陳虎豹颬兮為喜為瞋横流涕兮瞻蒼旻心馮噫兮不能伸麋有角兮龍有鱗空山寂寥兮吾誰與隣江無舟兮河無梁隰有荆棘兮而無稻梁鷹化鳩兮雀變隼狸為貙兮龍為蚓睠長顧兮情紆軫九疑高兮禹穴幽梧桐枯兮鳯不留山木慘慘兮呌鵂鶹鵠飛兮無所投雲杳杳兮雨悠悠孰懷情兮知此愁虎厭肉兮騶虞苦饑獺升堂兮麒麟受羈黄彛薦滫兮章甫承綦箾韶屏棄兮絃筦兠離指玉以為石兮削方以為規天不可問兮神不可咨繄彼之是兮而此之非有樗在林兮有櫟在馗蓍龜孔昭兮勿遠余思今夕何夕兮天宇清歩逍遥兮仰觀列星河漢皎兮北斗横悲風發兮候蟲鳴林鳥起兮沙鴇驚長夜寥寥兮何人哭聲愴怳悢兮不忍聴囘身入房兮淚沾纓蛟虬偃蹇兮豺虎獰弧無弦兮車脱其衡知不可慮兮誰女令蹇淹留兮難為情履霜思裘兮燠則棄之臨河號舟兮濟而置之不綱胡魚兮不弋胡鵠翦薙杞梓兮索灌莽以取木捕猫乳䑕兮僉以為仁吠狗宵警兮行者怒瞋彈鸞飬梟莫知其咎斵冰以承宮兮曷云能乆長太息兮有所思林木動兮巢鳥悲山有藿兮園有葵心懷君兮君不知秋天泬㵳兮百草黄蟪蛄悲吟兮朝榮有芳屣履起兮獨徬徨心悠悠兮懷故鄉原有栗兮隰有禾桂花紅兮蘭紫芽涼風動兮松栢馨流潦落兮水泉清蔬可茹兮秫可酒集鄉里兮㑹親友坐白石兮蔭蒼筠翫明月兮思古人魚歸淵兮狐首丘終余生兮安所求招遊子辭王褘吾宗兄存誠甫名其齋居曰逺遊昔者屈原放逐之餘眇觀宇宙欲制鍊形魂排風御氣浮遊八極後天而終以盡反復無窮之世變故逺遊之歌所為而作今存誠之有取於逺遊也豈猶原之志歟予因反其意為辭以招之庶幾其不騖於虛逺而為吾聖賢之歸然宋玉景差大小招務為譎怪之談荒淫夸豔之語今亦無取焉辭曰逺遊雖樂兮樂不可極只子兮來歸無東無西無南無北只東方弱水舟輒覆溺只西方流沙車不可歴只北方大漠絶人跡只南方炎荒路險以棘只顧瞻四方蹙蹙靡所適只逺道雖樂將焉止息只子兮來歸反吾故居只居爾之居復爾初只仁以為宅邃且虛只以禮為門義為塗只大中為室至和為厨只八珍竒味道之腴只文章燦爛錦繡敷只盛徳光華被厥軀只慈儉是寳謹蓄儲只御以矩彠乘恕輿只子居其中樂有餘只瞻前無隣後無虞只天君泰然静以舒只聖賢與處天為徒只洞視八荒眇一區只坐閲千古猶斯須只子母逺遊苦驅馳只子兮來歸反故居只弔伍子胥辭髙啓覧勾吳之故墟兮灌莽鬱其蘢蓯館娃廢而為沼兮巋伍胥之遺宫奚千祀而勿毁兮繄若人之死忠昔窮逋而渡江兮奮孤跡於羇旅既入郢而雪恥兮又棲越而攘侮使彼吳之強大兮非夫子而孰為何夫差之自喜兮遽忽戒而荒娛陳昌言之悃欵兮實不忍視國之阽危衆以子為叵信兮肆讒辭之詆欺夫豈不能全身逺適以自庇兮顧先王之舊徳卒待隕而何言兮恨終不能寤君之嬖惑載鴟夷兮浮遊魂惸惸兮在中流江神念子兮哀憤鼓洪濤於高秋嗟君子之出輔兮孰不願為伊臯使言從而志行兮致雍熙之陶陶何齟齬而多患兮惟重華之不可以屢遭鄂侯諍而就醢兮龍逢諫而見屠盖自古而有之兮匪夫子獨罹乎此辜身雖殁而義安兮又舎是將焉索彼循黙而茍容兮寧獲免乎泚額想子猶念夫故都兮或乘雲而來歸顧荆棘之多露兮應攬涕而歔欷余亦何為而感慨兮懼直道之墜也聊陳詞而表烈兮亦邦人之志也雲林辭并序蘇伯衡常人之情未有不好繁華而厭澹泊者也入山林而唯恐不深適江湖而唯恐不逺非抗志幽夐寄懷夷曠者孰能之六一居士曰錢塘四方之所聚百貨之所交物盛人衆為一都㑹而又兼有山水之美以資富貴之娯吾祖東坡先生以為吳興山水清逺其民足於魚稻蒲蓮之利寡求而無所争賔客非有事於其地者不至焉是二邦固皆東南勝處而呉興之境寛閒寂寞豈比錢塘之鉅麗雄富哉崔彦暉氏錢塘人也顧去之而之呉興營别業一區名之曰雲林小隠於是乎僑焉此其以澹泊為樂而不奪於繁華之習為何如彦暉非抗志幽夐者歟寄懷夷曠者歟夫以端木賜之賢又有仲尼為之依歸其於道徳之足貴紛華聲利之不足尚固宜曉然若薰蕕不待辨而孰去孰取也然交戰于胷中猶且有所不免況彦暉當問學之士徇於外物而競於邪侈之際乃能決於去就如此豈直異乎尋常之人而已使克推是志以學道其於去卑陋而趨高明也何難哉此余不識彦暉而信其賢因張尚禮之請本其情為賦雲林辭曰眷吾父母之邦兮廼趙宋之故都既美麗又富盛兮實東南之奥區衆人胥此焉止息兮吾獨曷為而去諸此富貴者所娛情兮雖信美不可以居矧吾舍之湫隘兮直闤闠而臨通衢車塵滃若溽霧兮紛冉冉將浼予茍徘徊而不去兮幾何不為逐臭之夫瞻彼樂郊兮震澤之墟俯苕霅之漣漪兮仰毗弁之鬱紆前谽谺之絶壑兮後蒼莽之平蕪阡陌縱横以棊寘兮聚落交錯若畫圖審面勢兮構吾廬梁桂檀兮柱杉櫧不雕不琢兮不丹青以塗擥薜荔以帡幪兮苔蘚繡乎階除列陵阜以為垣兮因澗谷而成渠長松鉅竹兮森扶疎烟條霧葉兮蔚蔽虧夭矯繚糾兮若蒼龍之垂胡棼麗披離兮若翠幄之流蘇積雨之後日出之初山氣澤氣孰吹孰噓排我簷楹羃我綺疏栖我几席襲我琴書始膚寸其來㑹兮旋波濤之巻舒乍奔騰以翕霍兮儵充塞而糢糊何變化之奄忽兮茫洋莫辨乎四隅幻萬象以一色兮覆六合而有餘中長風之迅烈兮遂消液於須臾砉掃滅而無蹤兮杳不知其所如但見山青青而林蒼蒼兮掩映湛湛乎之太虛吾危坐而睇眄兮増感慨以長吁曰寶莫寶兮貝玉金珠貴莫貴兮爵位名譽等浮雲之不可把翫兮喟嘆先聖其豈我誣胡彼昏之不覺兮爭貿貿以犇趨況人夀之百歲兮猶過隙之白駒縱得之亦何補兮徒自黙而自劬吾於世兮復何需屑逐隊兮競馳驅聊斂退而從吾所好兮放浪肆恣於水澨山砠幸麋鹿之我狎兮喜鷗鳥之不我虞春草藂茂春華敷巖紅澗緑張氍毹幽泉發竇疾以徐髣髴㑹朝鏘珩琚娛耳悦目樂不可言兮世間埃􅅽何濡濡時招𤣥真子膾却赤鯉魚相就東老舊酒壚既醉渉江弄芙蕖歌曰澤有荷渚有蒲荷為衣蒲為葅衣且食兮保我軀滯志釋兮煩慮祛逍遥委蛇兮又何必訪偓佺於蓬壺弔茂陵文方希古祗明祀而言旋兮指槐里以西征停䇿憇于道旁兮覩高丘之崢嶸即故老而訊之兮惟漢武皇之茂陵整冠裳而疾趨兮蹐遺廟以屏營凄風起于叢棘兮鼪鼯嘯于幽塋慨雄心之靡託兮悲曼志之無成惟君皇之御極兮遘炎靈之方熾陋堯禹為未足遵兮卑祖武而弗肯繼内瘠民以自殖兮外震威乎遐裔騁車轍于八荒兮候神人于海澨建千門與萬户兮殫土木之奢麗希軒轅之騰化兮永傲睨乎斯世何盛業之易􅈥兮洪謨鬱而難宣雖暫弱于羌戎兮生民疲弊而不痊竒禍機于巫蠱兮妃嗣丁毒而銜冤諒逞心于屠滅兮抑天道之致然闢土疆之宏廓兮曾𤣥宮之莫固赫兵革之繁庶兮委守衛于草露城闕之崇敞兮求斷礎而無所後宫之韶冶兮僅或傳其塚墓像祈連以旌武兮想壯魄之已腐嗚呼哀哉形必有盡兮孰不有亡匪君皇之獨然兮尚奚為隠惻而迴遑惟祈生之已甚兮或妖誑而過望謂長年而卒老死兮斯足垂戒于昬荒明固有所不達兮智固有所短偉才畧之英邁兮哲與愚其相半賴表聖而黜邪兮兼善悔而能斷雖人恫而財竭兮終克免乎危亂悼往者之無知兮尚來者之可諫感盛衰之相襲兮仰昊天而永歎退菴辭楊士竒芝橑兮桂户山阿兮水澨雲鱗鱗兮石磊磊交松蘿兮延薜荔華芬芳兮襲予春之蘭兮秋之蕙羌何為兮獨往舒蕭散兮洩洩念盛衰兮有時盍滿盈兮豫戒撫年歲兮將晏日斯征兮月斯邁紛駸駸兮忘歸余何為兮靡止攬吾轡兮旋軫返吾車兮舊里恬澹兮以休全之兮終始懷夫子兮高風邈游心兮千載辭劒圖辭胡儼貫弓兮執矢望昭闗兮東馳思公子兮弗諼孰閔余兮渴飢旦暮兮以趨江之流兮清且漣漪彼遑遑兮求索𣺌浩蕩兮何之纍纍兮遺孤心之悲兮莫予知風蕭蕭兮江日黄蘼蕪綠兮杜蘅芳野闃寂兮無人怳四顧兮彷徨桂檝兮松舟儵汎汎兮中流羌余兮既濟欲報兮焉酬寶劔兮陸離爰解贈兮莫我留執圭兮弗有顧百金兮何求江上兮丈人義重兮山丘撫新圖兮増慨寄遐思兮千秋氷雪軒辭右春坊右諭徳兼翰林侍講金公㓜孜以冰雪名其軒君子有以知其素矣而或者弗察也故予為賦焉余既好此竒服兮爰昭昭以自持厲潔清之端操兮將古人以為期廓壅蔽之黤黯兮披汙穢而去之歲冉冉而易遒兮唯昭質其未沬際嘉時之晟明兮乘青雲而上征淩天路以翺翔兮軼埃􅅽而抗旌朝吾遊夫清都兮夕余憇乎扶桑鑿瓊枝以為食兮吸沆瀣以為漿秉余心之貞慤兮肆忞忞其曷已雖所處之固然兮亦率余之素履匪善吾弗好兮匪徳吾弗庸保厥美以上下兮暨予心之所同何時俗之多偭兮紛馳騁以自强汩汶汶而莫知止兮乃謂予為匪臧曰悶悶與昏昏兮孰萬物之我先斯伯陽之為道兮夫子乃嘆其賢何明哲以多智兮亦營營於土田後千祀而猶顯兮羌孰得而舎旃磽磽易缺兮皦皦易汙塊獨守以為姱兮何不改乎此度衆欣欣以周容兮何吾與之寡也中怦怦以自信兮豈若是而舎也猗前聖之遐逺兮渺茫茫其何之余將就而問之兮質予行之所宜精専専而内凝兮神剡剡而外揚俄惝怳以流從兮忽超乎余有行駟玉虬以前𨗳兮彼白虎為後驅邅吾道夫不周兮造顓頊之所居飄風蕩而吹衣兮𤣥雲翳其承宇冰峩峩以凝沍兮雪紛紛而交下炯皓曜以相射兮清氣迫而襲余晃然令予開朗兮神蕭爽而情舒命𤣥㝠以𨗳予兮謂余言之纚纚曰太素之淳懿兮斯為物之所始嗟人之生兮禀其淑靈理粹而純兮氣厚而清湛旦旦而弗亡兮豈庶類之可羣彼其謂子之不然兮夫豈守𤣥之子雲殷湯之博大兮乃銘器而諄諄去舊染之垢汚兮圖皎然而日新孔聖之大成兮曰吾湼而不淄皜皜其不可尚兮亦秋陽而暴之相矩矱之在兹兮信舎是其焉求俗幽昧以眩惑兮吾於彼其何郵駕余輈以囘轉兮倐臨睨夫舊居謹余轡而正䇿兮意揚揚以自虞積雪以為堚兮斵冰以為宇余固處此而不遷兮庶有勺於此世重曰結予心之耿耿兮増予思之悠悠清白以為服兮憑往則而信脩道曼曼其超逺兮予曷日而忘之弔余青陽李江州詞周敘元鼎兮沸颺典常紊兮不綱撫長劒兮横視屹江淮兮保障金戈兮鐵馬時不利兮摧傷寧甘心兮一死濺頸血兮清塘孤忠兮大節挺勁草兮秋霜正學兮雄詞掞雲漢兮天章赫青編兮偉烈配巡逺兮睢陽煥昭昭兮日月永千古兮爭光右余青陽凝遥睇兮江州屹孤城兮上流弔英魂兮何在慨元政兮不修政不修兮佚游偉郡侯兮良籌訓兵兮繕甲擁猛士兮貔貅羣兇張兮援絶天不祚兮奚尤臨大節兮不奪凛勁氣兮横秋匡廬兮峩峩渺大江兮悠悠君令名兮同永増余心兮頓憂右李江州竹坡辭寄金川蕭樂善劉定之莽落木兮蕭森風不止兮葉琤琤夕陽沒兮迴光見逺岫兮何千層我之懷兮既悲況所思兮繫之竹坡兮何所吹秋籟兮參差美人兮在其下文蔥蒨兮懷幽雅䕃清隂兮以憇握琅玕兮盈把歲云暮兮霜霰寒君不來兮行路難浮雲東征兮不可攀倐變化兮成素鸞就君之竹兮棲縹緲永今夕兮以盤桓明文衡巻三
