body:
  text: 明文衡巻三十六明程敏政編記水木清華亭記王英吳縣知縣吳復克禮世居福州螺江之陽有亭為燕游之所名曰水木清華亭蓋取晉尚書謝混西池詩之語云螺江地幽曠而亭之作據其勝近則嘉木森聳亭亭如車蓋清隂蔽虧凉飈時至水環繞而流明淨如鑑廻風激波遊魚出没稍遠則有虎頭之峯若顧若蹲若踞自南盤廻而西與羊崎諸山相連屬而石陜渡在其前飛來石峙其後朝暮之間雲霞之舒斂雨霧之㝠晦草樹之葱蒨與夫平臯遠岸沙鷗水鳥飛鳴上下遠近之景於斯亭一覽可見克禮日游於其中或讀書詠詩或彈琴酌酒或憑䦨縱目意休休然甚適也嗟夫人之情所好不同馳騁車馬於通都大邑與王公貴人遨逰窮極乎耳目之所好者人皆悦之而山林泉石草木幽寂之境好之者甚少克禮獨愛悦焉蓋異於時人也已非古之所謂居高明而遠眺望者歟吳縣大邑也政務煩劇克禮為邑宰清慎平恕事不苛擾民甚安之此可見其素所操履矣然而聲譽方隆顯用可待未得歸㳺亭之中以遂其樂乃屬中書舍人周某道其詳請記予嘉其志書以為記復招之以詞曰螺江之流兮瀰瀰濵江之居兮居所止白石磊磊兮山峙峙煙雲杳靄兮古木隂翳君之去此兮歲月逝猿啼鶴怨兮誰與為侶盍歸來兮日容與擷芳華兮憇江渚膏吾車兮遠相從濯清泠兮追凉風發高咏兮彈絲桐亭中之樂兮與君同重建蔡涇記常州畿内大郡也其屬縣江隂之南十五里曰夏港其東有閘曰蔡涇南引湖水北通大江兩淛蘇松漕運及閩越商賈之舟皆經此而江隂武進無錫三邑之田凡數千頃皆資以灌漑遇旱湖涸江潮退則禾槁死舟不可通有閘以節制其水則田不病旱舟不病涸矣閘之創相傳始於唐厯宋元以及國朝因其舊雖設官掌之而歲恒圯壞輒役民修治用力甚繁而其功不可經乆民與舟徃來者病之知府莫侯之至常也政舉民安聞蔡涇乆為民病欲圖改作以其事奏于朝旣從其請詔廵撫工部侍即周公為之經度公受命與莫侯議當撤其舊而新之有言新作則勞費滋多其功難成者公毅然力主其可初公因民有餘粟積於諸郡倉庾皆充至是會計其用可數十年矣乃發粟市材用諸物惟石艱得乃取於姑蘇洞庭山工者亦蘇人令琢磨以舟載至皆給粟償其力石計四千五百丈木二萬二千株甎二十萬鐡一萬斤有竒工匠計百人役民二千五百人食以粟計二千九百餘石始於正統元年八月以是年冬十一月成堅壯倍於舊時而閘之啓閉有節歲旱有備舟行無阻人獲其利而不知興作之勞也父老相與慶幸述周公莫侯經畫之詳來請記以示乆遠嗚呼河渠溝洫其利於人甚大昔創制之法與夫廢興得失人所共知而為政者莫能興其利至近時尤甚焉其故何哉不知水之利為民衣食之源故漫不加意欲有所興作者或謀慮不周或材不足任或懷私因以掊克其下安能興利以及民哉今天下糧賦北上供億者蘇松居其半歲時漕舟如山列運夫如雲集扶檣曳䌫者綿亘不絶若商賈之舟尤不可以數計而其道皆由蔡涇水可使之涸而閘可使之乆壞乎莫侯欲作之旣知所先務周公能力成之而使民不知勞功大而利溥非有謀有為舉動無私焉能至此其功不亦偉哉刻石以記其成者固宜乃為之書周公名忱字恂如永樂甲申進士累官刑部員外特拜侍郎廵撫南畿内善政不可殫述莫侯名愚桂林人由工部即中陞知常州以正直自持稱為賢守後之人觀二公之成績亦當有思乎義山記廬陵銅谿劉先生嘉會所居之傍近有山焉初無名先生以其寛衍深秀而閔鄉人之貧窮殁而無葬地者令皆葬於此今塚墓累累殆百餘所人皆以先生所為義士也因名其山曰義山先生有學行文藝洪武中以明經薦至京賜華盖殿説書後分教壽州以言事稱㫖陞武進丞未幾罷官家居宣德初用知者薦入朝所司擬外校官時年八十以老不堪事辭上曰師表後進正宜老成人不聽先生懇乞骸骨得還鄉里今年幾九十尚康强無恙鄉人德之者曰先生不慕榮利而享壽考以行義之報也然其餘慶之發殆不止此將猶其在子孫矣乎先生聞之曰吾欲鄉人死生之皆不失其所而不能也吾量吾力之所宜而為是耳豈望報耶或者曰此仁人君子之心雖推之以行之天下可也而有所不能行焉獨不可惜哉夫士君子讀書學道得行其志者幾何人周官有墓大夫掌凢邦墓之地域為之圖令民族𦵏而掌其禁令使皆有私地域是則古之人無貴賤貧富死而未有無地以葬者後世山林川澤皆歸於民而據於大家巨室非細民所得有然後有暴骸露骼者蓋多也今先生居一鄉使一鄉之人無是患有古之道焉如得行其志而兼善天下則失所者殆少也此世之所以惜之也歟先生誠仁人也使鄉人之所以祝之者信然則其後人之食其報者其又可量哉予姑記之必有以驗之重修至德廟記周忱宣德五年秋七月禮部即中豫章沈鍾伯律奉璽書擢守于蘇州視事之日吏以囚牘進見民之繫于獄者凡千餘人尚爭務勝交相訐訟有經十餘載而未決者伯律姑置弗問越明日率郡之父老祗謁于吳泰伯廟見其堂宇傾仆垣墉頽圮吏民奉祀弗䖍乃喟然歎曰民不見德宜乎刑之不清也是非郡守之先務乎即日命工度材撤其舊而新之曰堂曰室曰門曰廡為屋凡四十楹繚以周垣堅以甓甃不十日而告成復率父老潔牲醪祗祀于廟居人過客瞻望咨嗟於是獄之繫囚交相媿悔曰泰伯以天下讓民無德而稱焉吾軰所爭僅錐刀之末耳何重貽郡侯之羞乎皆相與俯伏庭下自服其辜不數日而獄以空虛告予時奉命廵撫于江南列郡至蘇州祗謁祠下父老以其事告且曰昔者狄梁公以冬官侍即為江南廵撫使毁吳楚淫祠千七百所而此廟則在所留而不毁者去今千年得吾郡侯葺而新之廵撫使之來又適當其時吳民觀感興起自今其無復爭競之風乎予乃登其父老而告之曰方泰伯之奔吳也㫁髪文身示不可立然荆蠻義之從而歸之千餘家遂端委以臨其民是欲辤富貴而富貴隨之及其後世夫差狃於必勝窮兵瀆武破越困齊欲霸天下卒之國亡身戮妻子為虜是欲求富彊而失其富彊矣然則吳地數千年之富庶由泰伯之三讓有以致之也其鬭訟之成風者亦由夫差之好勝有以啓之也爾民欲為泰伯之讓乎欲效夫差之爭乎一則廟食萬世一則貽譏千載其得與失必有能辨之者孔子曰能以禮讓為國乎何有此予與太守期望於吾民之意父老曰善請以是為記遂書於麗牲之石使四方之來謁者咸有所觀感而興起焉豈獨蘇州之民而已哉祀神農陵記曽鶴齡神農氏敎民耕稼蜡祭醫藥交易之事開萬世衣食相生相飬之源故凡後世有天下者皆祀之而新即位者則告焉示不忘本也今年今上即位實遣臣鶴齡賫香幣祝文求其陵行祀告之禮而陵在衡州之酃縣酃縣深僻若獠洞然故自衡舍舟陸行越峻坂渉深塹五宿始至之後又三宿始將事事皆如儀奠獻有䖍稱上所以親遣之意旣畢始若釋重負然猶不敢忽慢遂跼歩山麓見有石壁髙二尋許廣半之正面而直立或指以為塚門又上少許有杉二株一榮一枯其大數十圍髙不可計根節如鐵石或以為異人所種莫敢剪伐者杉下有壇下有墠蓋舊有之新又更置或能言更置之由而未詳也至問陵之所始訖莫能對退坐公館取縣志閲之亦落寞不載以問酃庠諸生有進而前者對曰聞諸長老宋太祖求帝王之應祀者獨神農氏之陵不可得一夕夢神人戴一笠持兩火訴不血食覺而咨羣臣皆曰是非炎帝乎火位南方宜徃南求焉遂遣使者至長沙之境求不獲將歸遇一老人引而指示之曰是則炎帝塚也忽不見使者還報卽遣祀之遂成故典噫斯亦近於誣也雖然殷高宗夢得傅説遂舉為良弼孔子夢見周公卒明其道以教萬世由是觀之則宋太祖之事亦精神所感有然也不可以弗信矧炎帝之神在天無所求而不獲今茍因其故典盡其誠以享焉有不獲者邪予故存其説以告後之來祀者宜盡誠焉耳陵之是否雖置勿辨可也復本堂記倫理叙名分正繫於世教使然者予嘗得其説矣世教不明而其民父子兄弟之序或至顛倒繆盭者非其性不善也汙俗誘之也其教既明而父父子子兄兄弟弟人得其正者非其性獨良也美俗導之也五雲東溪著姓郭氏當元盛世有無子懼乏祀者遂子其弟可謂其名紊矣而以為固然莫或易之迨國朝洪武初其後裔按譜世次失倫大駭遂更正之復其故常此豈不有由來哉元有天下幾百年海内富庶人人足給民至老死不識兵革庻幾太康而獨狃於故常不脩堯舜三代之教人不相非以至綱常淪斁我太祖皇帝龍飛之初忿嫉其弊一正以禮法而汛掃之俾尊卑上下隆殺等級截然不紊而天下益以治富庻益盛於昔由此觀之則郭氏之先紊其名實與其後裔得改而正之者皆世教使然明矣天高地下川流岳峙萬形明白而昏霾翳之視者無見一日天大以風刮去淨盡仍復其舊而天下曉然豈非此理乎郭氏世次得正乆矣又嘗扁其堂曰復本今年有來京師求予記者前金華丞正顯也正顯之言曰曩所失者曽祖雲祥府君後復正者叔祖崇良府君崇良府君嘗為萬安訓導願請并記之嗟乎能復者固本乎上之教而非其人卓然不惑殆亦難矣昔孔子為政欲以正名為先子路猶且以為迂况後世乎况以今兹而欲正數世之前之失乎夫誼之正者徃徃難於為繼非特繼之難守亦難也然則郭氏派系之本必卓然不惑而後能復之也夫而後能繼守之也夫舵師記林誌舟之載舵主之舵操縱疾舒得失而舟之安危繫焉故凡傭於舟者皆以力而舵師兼智力長焉其受直也恒倍或參伍其載而取之然非素諳是者非惟人不之任而亦不敢輕任於人其責蓋甚重也哉歲戊戌予奉使北還買舟以載得寧波舵師某甲予見其騃而使酒曰夫也詎能舵舟同載者曰子以傭役人而乃貌取之乎且其直亷又易與毋慮為也予固疑之比渡淮及湖中流而衝風作狼狽失勢者幾旁舟皆笑之曰是特其小小者耳使之乎大江則將奚為予問同載者曰嚮吾言之何如則皆愀然曰今之舵舟者皆是已此特其甚者奚暇渠之笑哉予曰然則是吾任者之過矣彼敢輕以任人何哉應者曰子以彼為工其技而利濟人與其将以舟利而冒其名者與夫利濟人者必世業於舟其捐費博其資利遠凡舟之須皆工且良故傭必擇人况於舵師乎其以身任載也毁譽不顧夷險在已視其載之輕重與其舟之輕重侔焉是誠足任者矣若夫以舟利者則不然其於舟也朝僦之夕業之無須博費不期遠利乗人之載而弋取之不得則下上而求合焉毁譽夷險汩然於中也彼欲載者樂其易與且利其亷儌倖以無事徃徃以渉大江猶安流也而况於淮與湖哉予曰安危同勢也喜患同情也彼豈異於人者與應者曰良師先勢而違情庸師勢迫而情見故曰前車覆後車戒審如此天下惡有僨事者哉予曰嘻此名言也顧命童子濡毫記之重新孔子廟學記陳循鳯陽府古揚州之域春秋時鍾離子之國漢晉以來為郡其名不一聖朝龍興於此吳元年賜名臨濠府越三年為中都建中都國子監改府曰中立府洪武七年國家定鼎金陵復改中立為鳳陽府以中都國子監為鳳陽府儒學其殿堂學舍自創始至今凡八十有餘年中更郡學之吏多矣而未嘗有脩壞補廢於其間者以是士無所奮以志於學而由科目以登庸者遠不逮於他郡是可歎也仲侯閔之來為郡也首以為懼以謂學校風俗人才之本為政所當先者不先其本而規規於事為之末以儌譽於公庭爭訟辨别之間君子有不貴也孔子不曰聽訟吾猶人也必也使無訟乎吾徒誦法孔子者也敢不容心於是乃率貳佐周覧廟學相其廢壞有不可仍舊者悉撤而圖新之中構禮殿翼以廊廡肖像以祠聖賢其間凡廟所當有者無一不備外為講堂環以齋舍儲廩以饌來學之徒凡學所宜置者無一弗周材出於捐俸貲以率僚宷而省浮費以補缺工出於貨勤敏以乗閒隙而止不急以助勞經始於景泰二年三月十六日落成於明年五月二十日既成仲侯遣人走書幣來京師求為之記仰惟昔者天心厭亂于是篤生聖人以為民主肆我太祖聖神文武欽明啓運俊德成功綂天大孝髙皇帝龍飛九五削平僭偽建子孫萬世帝王之業然肇基不於他而獨於此此豈非舜之諸馮文王之岐周殆有不可以與尋常州郡同日語者况嘗建中都立太學天下英才畢集之所今雖更為郡學而詎可以廢壞不治以有忝於聖朝龍興賢才豹變之淵薮乎宜乎仲侯首以為懼而惓惓任作新之責於今日也易曰雲從龍風從虎聖人作而萬物覩言上應於下下從於上同聲相應同氣相求為理之必然也天下賢才無問海内海外同聲相應同氣相求尚莫不有帝臣之願况居州里之間輦轂之下如水之先得溼如火之先得燥有不相應相求為尤易於他哉士之得生是邦游於是學其視天下海内海外賢才已倍萬其天矣而又有賢守之作新如此誠不自棄而加勉焉將見如水流溼沛然若決江河而注之海如火就燥粲然若列星辰而麗乎天有莫之能禦矣故於仲侯請記是郡廟學之成書以為勸坦齋記金寔吳宗政之居在京師東城闤闠中樸然一室也署其題曰坦齋予嘗過之宗政曰僕将思樂乎平易也先生幸有以教之予曰平易天下之善道也而今人鮮克由之豈世方以竒崛為髙臲卼為安好僻怪而樂深險以平易為不足為故弗由邪胡不舉天下之所共由者而喻之哉周道如砥安車由之鳴和鸞中節奏無不如意坐車中者暢然而舒泰江流一碧巨艦中下風濤不驚棹夫唱和處舟中者晏然而無虞由乎平易故能坦坦也若夫攀危逕履巉岩臨萬仞之壑逆百折之瀧未有不神禠而膽落者不由平易烏能坦坦哉君子察夫是理恒置心於平易之地舍躁而趣静遵分以循理乆則心廣體胖將無適而不坦坦矣是故大易有履道之象聖人有蕩蕩之稱皆所謂善也宗政起謝曰先生之言至矣水陸舟車之喻僕未暇遠觀焉試以日接於目者言之僕之居四通八逹之衢也雞鳴而起貴賤紛沓騖利逹者躋攀於分寸殖財賄者較量於錙銖百技衆工四方所集忻者笑戚者悲怒者搏强者敓詭欺揶揄滑稽突梯千態萬狀以求售其術寧有樂平易而坦坦者乎僕於是乃求喧中之寂掩户以息香一縷書數十巻或從事於佔畢鉛槧資之以為飬此外殆無營焉願因先生之言勉其所未至以求自異於庸衆人不知其不可也於是舉几布席豆羞觴醑樂予於齋内獻酢互更懽然洽矣為之歌曰坦兮坦兮去爾町畦絶爾多岐遵大路兮以遨以嬉秣吾馬兮膏吾車吾與爾同歸宗政吳人敏而好學善鍾王楷法為時軰所推讓縉紳大儒皆樂與之㳺宗政漠如也其自待與其名齋若不相背馳云逰嵩陽記周叙宣德丙午三月十五日予在鞏祀宋陵畢瞻望嵩少諸山慨然想其勝與廣文宜春吳公遜志約逰焉行李僕御已戒至期聞有逹官至吳君不果行越二日予遂攜邑庠生王庸劉清李暄同徃行二十五里至黒石渡沿洛陽南至河水清駛水濵山石犖确下歩行二里餘午食将軍趙仁家又行半舍許地曰漫流岡上有郭汾陽廟環廟古栢數百株蒼翠蔚然可愛有碑二通一金元光二年上黨趙琢譔云汾陽嘗領兵清河上至是索芻粟不獲里人告以是邦西南岡嘗出毒霧為灾故田榖不秋無以供餉汾陽乃旋軍登其上以壓之毒因以息里人遂立廟祀之相傳祠下有洞時有聲隆隆然蓋毒霧所出處予惟古人稱掃清氛祲汾陽之謂矣一則緱山東老人所題老人逸其名必宋元顯者夜宿原良村王庸家自鞏至是七十里餘翌旦遵趙城陟轘轅道石徑崎嶇盤廻以上中有關名萼嶺老卒數人守之時天旱邑人祈禱甚乆忽微雨從西北來予顧謂二生曰今日之逰固樂天復雨又樂之尤也轉西僅五里入少林寺木蔽翳仰不見日花草餘香郁郁襲人寺在五乳峯麓少室山當其南隱若屏列其寺僧聞客至迎迓甚恭佛殿後為講堂堂後有立雪亭則佛徒惠可受法於達磨處惠可嘗侍達磨雪深至腰不去竟得其法予因歎曰昔㳺定夫楊中立立雪於程門卒傳其道惠可學佛法亦然使世之為弟子皆若此其學詎有不成者邪因觀厯代所建碑刻其文最舊則有梁武帝御製達磨太師賛前刻歐陽圭齋序餘皆唐宋以下文字又向西北循山崖深入三里許攀援而上山勢岈然環抱視寺之臺殿山之林壑若在席下是為達磨面壁菴菴有石影云達磨面壁九年之遺跡也時雨止雲收煙霧澄霽幽鳥𤣥蟬鳴聲上下翛然有塵外之想僧云西南八里巔有惠可菴有卓錫泉以榛莾蒙翳不果上寺主僧二人曰圓宗林之廷者甚能言相與論辨亹亹亦自可敬飯畢啓行逾十里則嵩山少室東西對屹山色掩映蒼翠如滴路循深洞灘石礧磈按轡徐行毛髪森豎俄經一小土神祠南忽有赤衣童子疾趨道左令導途者索之彌乆不見竊自念曰連月旱暵而赤色者南方朱火之象也是豈旱魃之流歟因相與名其地曰赤童子山又行十里憇郵亭中亭後一里有寺名㑹善刻元雪菴所書茶榜字徑三寸許遒偉可觀觀畢即出晚至登封假館學宫自原良至是又六十里明日同廣文劉仲武司訓吳永庸謁中嶽神祠且黙禱乆旱祈賜雨澤禮畢而縣丞李政繼至祠在縣東八里嵩山之陽中原壤地平曠有山亦培塿不奇崛唯嵩山蜿蜒磅礴騎奔雲矗綿長數十里屹然在天地之中諸山環列勢若星拱蓋乾坤秀粹所鍾宜神靈之宅也祠規制極宏壯峻極殿南為降神殿三面皆圖生申甫像丹青頗剥落而筆意蒼古督李丞命畫公模之宋金以來石刻以百數惟王曽奉􅃯譔者碑最穹壯字體雖甚勁麗又漫滅不可讀并命諸生用紙墨摹搨以考其舊既出李具酒殽于道士方丈相與宴飲甚歡丈室後有竹數百竿微風度之鏗然有聲如擊金石此又洛中之僅見也又明日與仲武永庸循北門逰嵩陽觀觀乆廢惟古栢三株存大者圍幾三丈髙兩倍之相傳漢武帝封為大將軍有石刻識其下次者亦幾二丈圍云皆封次将軍望之如張幃幄如擁車蓋風動又聞如絲竹之音相對倚乆之不能去惟朝廷方取材川蜀以資梁棟此木近在河洛似獨遺棄豈造物者固有以庇之抑以孤處僻遠不見知於世邪前有天寳三載紀聖德感應碑髙大異常制書法極妙又從東度涸澗尋崇福宫即太乙觀林深從者迷失道徃返數四始逹宫亦屢廢惟三清殿存亦至元間重修者旁屋近燬于野火道官依殿以居舊有奕棋摴蒱泛觴三亭今惟九里池存有泉名太乙歲乆亦湮則泛觴亭之故址也二宫觀俱漢唐宋以來天子廵幸暨王公卿士宴游之所方其盛時珠宫琳館金碧交映鑾輿所至草木生輝及其廢也荒烟㫁礎鞠為丘墟樵人牧豎得而辱焉噫方外之流恒自視其道與天地長乆永存今既若此豈非物之興廢固自有時哉升高以望遠則箕潁諸山隱然如畫追想巢由之高風西則少室三十六峯綺綰繡錯髙挿霄漢深悲李山人之陳迹目與景接心契神會超然若御灝氣游鴻濛而不知其所止也稍東有啓母石云塗山氏所化其説怪誕不經極西有法王寺亦名刹殿宇頽圮惟浮屠巍然南下則有周公測影觀星二臺廢址北顧嵩高二十四峯舒奇獻秀厯厯可指竝山頂而東則又有所謂盧鴻巖投龍洞皆嵩陽勝處擬次日再約徃逰是夕予冒風寒頗不懌且疲於登陟遂不果而顧予先後之所以賞者其所得亦可謂富矣因累書其事于簡以識予是逰之勤并各書一通一以遺鞏邑廣文吳公俾想見兹逰之勝一以留登封學宫以備他日好逰者之故實云是為記宋丞相信國文公祠堂記柯暹宋有天下三百年海内臣妾無險釁一旦天命難諶江南失守髙城深池間雖有堅甲利兵曽勁草之不若獨丞相信國文公未受王命毅然浩氣充塞天地使巴延之餌不能釣一舌世祖之謀不能屈一膝幽囚白刃不能移一心是蓋有日月之明風霆之厲者在乎其見耳方瀛國未封墜石塞敵使南冠不執安知吳越不可復中原不可圖然而不能皆天也或又以為既執之後張宏範說而誘之至再也世祖欲公附之切也附而用之宜不下於宋也使能隱忍許臣於庭見之時又安知無可圖者顧其思不出此嗚呼是豈足以知公者哉當庭見之時一身之外皆元有矣此膝未屈為吾敵國一屈之後臣節凛然縱有可圖吾心已二萬一有成猶不能免無成則是漢李陵之謀誰復可信此公所以吟嘯從容就死而靡他也某來永新聞固塘文氏六義堂并詩乃公為其族人正道所扁而題也因造其堂拜公遺像誦公之詩過錢市又瞻公像于文氏祠中宣德丙午江西提刑按察司僉事括蒼王公繼行過謁祠下命某易文氏祠為丞相祠或曰文氏譜自五代時春元始至十世彦純生二子長曰卿次小山卿曽孫革齋生丞相為鳳岡派小山之後為固塘派族遠而義疎某曰不然文正范公親疎之論至矣以公之孤忠大節傳播宇宙間如日星之明不容掩矣為宋而殁在宋當祀宋亡無祀之者雖敵國表勵忠節亦當祀况守公之故土而愛君之心同然者乎世無子孫雖鄉人尚義亦當祀况敦睦之族景先德者乎今其祠在京都郡庠者創于元已祀之矣某在金臺時見一僧號全拙以戒行自髙尚知慕公風節徃拜于祠又聞一指揮者見祠宇傾圯尚能慨然新之求其姓名未得豈有鄉邦不如敵國吾儒不如武弁同族不如方外者哉祠因舊更其榜曰宋丞相信國文公之祠為之歌曰玉關洞開朔騎南來孤忠矢志乾旋坤廻匪人自天我皇弗庇廵剛逺貞孔仁孟義盤盤鳳岡摧彼雕梁固塘錢市六義孔彰篤維親親匪祀何祀子孫繩繩億千萬世重修虞士祠記祝顥洪洞縣南去城一十三里官道之東虞士臯陶之墓在焉道西原上乃其祠也地可百弓坦夷髙爽面離闢户繚以周垣祠屋三楹中肖神像與侍從儀衛旁設齋厨數楹制皆麄儉蓋創自前代莫究其始建入國朝載諸祀典守土之臣雖春秋共事而因陋就簡莫之加意且其民俗去古旣逺罕事文學罔知貴貴尊賢之禮故舉其地里祠墓傳舍稱號一以神名名之無所諱避任治教者亦莫之戒識者戚焉景泰初予以侍近出官山右按部兹邑恭謁祠下顧瞻廢墜為之驚惕乃命有司封植其墓正其祠額凡觸神諱者一切禁之於是邦之吏民稍知敬憚而觀風問俗入其境者亦知趨式焉今年春予復來兹屬縣令尹鑑脩其祠之未備鑑循而才克事其事次第畢之加於舊觀因謀伐石請書其事用勸邦人且示來者其用心可謂逺矣於乎自兩儀既分人極肇立世稱至治者必曰唐虞而士實當時名臣羣后之所首讓者其謀謨道德載諸經傳有天下國家者師之則治萬世臣子之所咸仰况洪洞為神明之里則凡生於斯吏於斯者尊崇敬仰是訓是行宜先他方安可頃刻而或怠之者矧今幸遇聖天子更化海内風動㝠孚黙契賢才彚征以光輔盛治駸駸三五之隆則夫是方之間寧有不感發興起以追遐軌者乎故曰有其君則有其臣也然則是祠所繫其於治教豈云小補之哉後之君子尚體諸焉庸書以記明文衡巻三十六
