  text: 八十
  hash: sha256:8469292dc471614042458eefc34f57f98be48a53e8b843ff1738add67c4739f8
body:
  text: 明程敏政編墓碑東丘郡侯花公墓碑宋濓皇上渡江之六年庚子夏閏五月癸酉偽漢主陳友諒以舟師入冦圍太平行樞宻院判官花公率麾下三千餘人結陣迎戰三日賊不得入乙亥城中乏食公士馬憊城陷賊縛公急公怒奮身大呼縛盡解起奪守者刀殺五六人罵曰虜非吾主敵也曷不趣降賊怒碎公首縛于舟檣衆射之公至死罵賊不少變巳而賊犯龍江上命諸將力戰賊敗去後五年甲辰上即呉王位追封公東丘郡侯又十六年其子僉水軍左衛指揮司事煒泣曰先公沒今二十年無文銘于神道竊恐忠烈不白於後世敢請惟公勲業始卒宜載國史余嘗待罪太史氏不敢以耄辭公諱雲姓花氏世為懐逺人自考以上莫知遷徙世次公少孤隨母嫁張氏貌偉而黑驍勇絶人儕輩畏服之嵗癸巳仗劍謁上于臨濠上竒其材力俾將兵略地所至輒克破懐逺城擄其帥以歸進攻全椒拔之郡冦據繆家寨公夜襲之冦散走上將取滁州單騎前行遇賊數千人於道拔劍躍馬衝其陣而過賊驚曰此黒将軍勇甚不可與争鋒兵既至遂克滁甲午從上取和州得卒三百以功授管勾明年乙未率所部先渡江上克太平以公忠勇可信任命宿衛左右丙申上破集慶公得兵千人陞總管徇鎮江丹陽丹徒金壇諸縣皆下之過馬䭾沙劇盜數百遮道索戰公且行且鬬三日夜皆擒殺之授前部先鋒攻常州拔其城駐守牛唐營夏六月立行樞宻院於太平遂拜公院判階安遠大將軍丁酉春正月克常熟州獲卒萬餘命公將之秋七月以兵三千之寧國陷山澤中者八日羣盜蟠結梗道公操矛鼓譟出入營壘間斬首千百計而身不中一矢還命守太平後四年遂遇害時年三十有九夫人郜氏公與偽漢戰時一子方三嵗夫人以牲酒祭家廟㑹家人泣曰今城且破吾夫忠義人必以身死之吾夫死吾必不獨生然不可使花氏無後嬰兒在若等善撫育之聞公就擒夫人赴水死年甫三十有五侍兒孫氏瘞夫人屍遂抱兒以行偽漢軍虜之至九江軍中惡養小兒孫氏以兒授漁家屬之曰此兒良宜善視之是年冬王師伐偽漢漢敗孫氏至漁家視兒在瞷漁人出竊負以走夜宿陶穴中天曙脫簪僦舟渡江遇漢潰軍奪舟棄江中孫氏抱兒遇斷木浮至附之入葦洲採蓮實哺兒七日不死夜半聞人語聲呼之逢老父號雷老告之故與其偕行明年辛丑二月達上所孫氏泣抱兒拜上上亦泣寘兒于膝曰此將種也賜雷老衣遣之詔復其徭巳而令人追之忽不見兒八嵗侍皇太子就學年十三授虎賁右衛副千戸後七年拜今官即煒也煒於洪武丁巳偕孫氏至太平奉夫人骸骨歸乃束草像公以二月己未合葬上元縣南五十里之水橋嗚呼觀公之死賊與妻妾之報公可以知公之為人矣天不殄其後豈不宜哉銘曰雲雷遘屯宇區分篤生真人鎮乾坤騎龍鞭霆下天門前翼後衛滃若雲誰其最雄花將軍力驅智駕敵萬人蹂轢羣盜猶䴥麏大刀長㦸屬櫜鞬左麾右刺流電奔緋衣緇弁貔虎屯駐馬飲江江水渾呉越之域殺氣昏手挽天河洗妖氛軍聲隆然若雷震遭者膽落兩足蹲元戎開府大江濆腰佩兵符威令尊控制上㳺為國藩偽漢恃力不圗存建旗揚㠶事征鼖艨艟蔽江躡鉤援槌牛享士士氣伸馳馬督戰寧顧身賊焰熾若烈火焚大戰三日勢愈殷單騎赴之齒齧齦怒髮上衝氣如烟叶汝賊兇頑犬與豚願醢汝肉一口吞賊慙耳塞不忍聞至死不屈酬國恩飄然乘雲叩帝閽請為厲鬼扼賊元賊當殛死洗厥寃天子下詔褒忠勲東丘建侯賁九原孤兒保育寵便蕃不墜宗祀天所敦生為烈士死明神神靈在天光焞焞嗟爾來觀萬子孫繼忠思孝慎勿諼弗信請考太史文故翰林侍講學士中順大夫知制誥同修國史危公新墓碑銘嗚呼翰林侍講學士中順大夫知制誥同修國史危公享年七十以洪武五年春正月二十三日卒于和州含山縣之寓舎其年二月十五日權厝於含山某年月日始還葬金溪白馬鄉髙橋之原其子㫃於蹇反深懼公之功行世系不昭白于天下晝夜兢惕自為状二萬言來謁新墓之銘濓守官無暇久未克論譔春正月䝉恩致政東歸私念公相知特深在前朝時欲引薦入史館及今待罪禁林實與公為同僚相得甚驩於是評隲羣行而勒文于碑其文曰公諱素字大傑姓危氏危本姬姓周武王庶子某生而手中有文曰􅖘因賜姓危氏封於新其後居光州晉永嘉中建州刺史京遷建昌之南城唐黄巢之亂全諷與其弟仔倡赤手起兵擒巢黨栁彦章于象牙潭擢撫州刺史累官金紫光祿大夫檢校大傅封南庭郡王南庭之後復遷撫之金溪白馬鄉譜圗亡竟逸其名南庭十五世孫宋景定某年進士通直郎知臨安府仁和縣事元累贈中奉大夫江浙等處行中書省參知政事䕶軍追封汝南郡公炎震公之曽大父也累贈資善大夫河南等處行中書省左丞上䕶軍追封臨川郡公龍友公之大父也累贈榮祿大夫江西等處行中書省平章政事柱國追封豫國公永吉公之父也曽祖妣王氏彭氏妣劉氏皆封郡夫人郡之名如其夫母劉氏黄氏並封豫國夫人公自至正元年用大臣交薦入經筵為檢討公年巳四十一矣五年改承事郎國子助敎七年除應奉翰林文字同知制誥兼國史院編修官未上轉宣文閣授經郎兼經筵譯文官階文林郎明年復入翰林為應奉十一年遷儒林郎太常博士十三年轉奉訓大夫國子監丞擢兵部員外郎十五年陞奉議大夫禮部郎中拜朝散大夫監察御史遷工部侍郎明年轉朝請大夫大司農丞又明年陞中奉大夫大司農少卿復入禮部為尚書十八年參議中書省事兼經筵官次年進通奉大夫御史臺治書侍御史二十年拜通奉大夫中書參知政事同知經筵事提調四方獻言詳定使司後四年階陞資政大夫俄除翰林學士承旨榮䘵大夫知制誥兼修國史博囉特穆爾入相出為嶺北等處行中書省左丞明年棄官居房山二十八年閏七月元順帝北奔淮王特穆爾布哈監國承制復起為翰林學士承旨上章固辭已而元亡迨入國朝召至南京洪武二年授以今官三年兼𢎞文館學士俄有詔出居和州閲再嵗而卒公生四嵗其大父即使公讀書大父本黄氏子來繼於危知公能亢危氏宗督厲之尤切年十五即通五經大旨據座為人師與同郡葛君將曾君堅黄君冔葛君元哲更相䇿警窮日夜不休復徒歩臨川呉文正公澄清江范文白公椁之門質而正之二公皆折行輩與之為禮呉公至恨相見之晚凡所著書多與公參訂之虞文靖公集孫先生轍名徳俱尊其遇之一如呉公由是公之名震動江右間出㳺金陵或以其文示南臺中丞張文穆公起巖張公以狀元為顯官少所稱許獨推伏公曰危君為狀元庶㡬相當老夫有媿色矣張公入朝遂挾公俱行達官貴人慕公聲華争欲出其門下更相論薦唯恐失之公之檢討經筵也一月進講者三講文皆屬公手公嘗敷繹民惟邦本之言以進典領臣惡其峭直難之公曰經筵之職所以格君心反不以民之疾苦告耶縱加罪罪在操觚者業當之卒以進講順帝大悅詔賜經筵官酒公不飲復賜馬湩一革囊金織文幣人一端皆有副巳而有詔下中書發錢粟千萬賑河南永平民萬口咸曰活我者經筵官也公復移書執政請修宋遼金三史乘傳行宋兩都訪摭闕遺書成公之力居多順帝知公學問淵深特命注爾雅較君臣政要公悉心為之不數月而成及進賜金若干公辭曰臣職也何勞而受賜不敢奉詔尋有宫人之賜公復辭曰臣有糟糠之妻在大江之南無所用之亦不受其助敎成均也六館生擇所疑羣揖難公公片言折之悅而去分監上京輟餐錢建監門葺齋舎勒開國以來分敎師之名于石尚書王某致政居蔚州構暖泉書院請額于朝他監官以地無先賢故事不從公聼其立師以訓士子順帝以公善筆札詔書釋氏書公辭曰臣官胄監以敎化民彞為職外敎之典不宜書無巳遷他官乃可耳遂止其授經宫學也受業生皆貴戚大臣子横肆不率度公創敎條置帳厯日書其勤惰月㑹而賞罰之皆畏服不敢犯其在太常也請親祀南郊築北郊以斥合祭之非謹諡法嚴祀典以祛謬妄時翰林承旨張公翥為博士禮文有闕者同補正之人稱為雙璧其為國子監丞也捐束修鋟小學書及夏小正經傳攷于梓以惠學者其居兵部也奉詔墾田於雄霸二州相地授略薙除荆棘闢田㡬千萬畝使民有道民徳之其陞禮部也與許文正公衡之孫克學俱贊皇太子受玉冊故事皇太子謁廟用牲醴百官以朝服賀於東宫公謂克學曰儻有違禮人惟責吾二人盍正之遂撤牲醴而以便服賀其擢御史也知無不言御史觀音保等四人以諫死英宗朝公請錄其後官之四川行省平章政事囊嘉特天厯初舉兵欲翊戴明宗雅克特穆爾巴延等構殺之公力為雪其寃容城民魏敬益買田千畝後見鬻田者二十家不能自生以田劵還之公請旌其門以敦亷讓其在工部也順帝欲以䝉古書譯釋氏三藏經下部刋行公以無益諫罷之執政居第與燒飯橋近有司希其意欲鑿石易橋公諍止之䧏香祀嶽瀆故用金十兩為香函吏利金以銅半雜之或造銅函易金公亷其狀皆執論誅之淮南兵亂公奉旨亷問其故㑹維揚京口嵗饑民欲相食公便宜諭守臣發楮幣數萬錠賑之所全活者甚衆上淮西宣慰使余闕捍賊功狀請陞其官秩復請立宋徐節孝書院於淮安其官大司農也分京南保定之境㡬無曠土時海輸不至軍國多仰焉新城民田氏聼後妻讒殺其子公憤之職既不可治乃為文祭其子民悔媿後妻逃去人揺手相戒不用婦言其長禮部也時亂將亟公憂之每陳得失無隠丞相賀惟一曰君向寡言今又何多也公曰時危恩重情豈能黙黙吾不敢畏丞相但畏後世史官耳其參議中書也論天下事以擇將帥舉賢才為本請専任甘肅行省平章鼎珠總西方兵勿遣其迎帝師誤軍事用樞宻副使布延布哈為中書參政經略江南以額森特穆爾黄常為禮部尚書頒厯安南立兵農宣撫使司以安畿内任賢守令以撫流竄之民順帝欲以公兼兵農宣撫使公以疎遠辭且諌曰今日之事宜卧薪甞膽以圗中興可也公言雖愈加切時不能盡用舊制銓曹有行止科吏主之日具内外官使十名上中書中書藉以遷擢其後吏怠不為意仕者淹滯有待選十餘年者公責吏日具五名五日一上中書吏樂易集各思奉職而乆滯者獲伸髙原富民劉強通其子婦婦訴官達刑部吏受賕欲緩其獄以俟赦公以事關倫理趣如法論之其轉侍御史也亂兵殺易州達嚕噶齊公請假守令以制兵之權㑹中書左丞成遵而下以贓得罪獨賀丞相鄂掄平章與公不與皇太子書澄清忠義清白傳家八字以褒賜之其參知政事也刑部尚書托里圗兼興和路編管與守將有隙守將誣其欲擅發官囷糧廷議杖踰百免其官公驗無發封狀釋不問都事倪晦與劉哈喇布哈同官丞相台哈布哈幕府數以公事忿争劉怒欲中晦隂結監察御史劉君楚俾擠之㑹晦至燕都囊故人所寄買馬白金君楚攟其囊得金下晦獄令自伏為贓狀上中書公疑亟為白出之馬徳守徳州俘所獲南軍千戸楊甲至都將斬之公召問狀乃淮安世襲千戸戰敗陷濟南羣盜中陳柔俾詣徳軍饋物德械送之非賊也公白宰相釋之楊感泣曰參政生我枯骨中惠大無以報然參政長者為公法釋我我不敢私謝期以忠義報可也卒與逆臣博囉特穆爾戰死之太醫院經厯徐某藏盗贓盜敗徐就鞫案巳具要官庇徐屬之從末減使三返公竟不許嶺北行省參政董復初素有亷名同省臣飛書言其在稱海宣慰司時取官中米千石公疑其事遣使覈覆之果得其誣博囉特穆爾庫庫特穆爾俱以平章總兵河南漸生釁端公謂御史大夫布哈曰養虎者欲其不相搏噬則别其牢今欲二人無鬬莫若加其職而分地處之用博囉特穆爾為丞相治四川以庫庫特穆爾為丞相治河南各責其成功可也大夫曷不為上言之布哈如公言順帝及皇太子咸以為然㑹丞相綽巴戩喪妻不出事中寢初江南經略使布延布哈李國鳳請封徽國朱文公為齊國以龜山楊公豫章羅公延平李公西山真公九峯蔡公從祀於孔子廟庭公為御史時亦請封諡劉蕡事上中書皆寢不報至是公皆舉行復為文以少牢躬祭蕡墓禮部員外郎姜碩使偽漢陳友諒不屈而死公為奏官其子京畿歉國用不足公奉旨以錢幣誥勅募民入粟公以義諭民聞者感動荷負來輸者填道至有不願給直者上都宫殿火順帝勅重建大安睿思二閣公上書諌曰茍以二閣為祖宗所建四海九州獨非祖宗故物乎㑹皇太子大臣亦以為言遂罷其役其以左丞居嶺北也和寧為太祖肇基之地而無圗志可徴公請於朝作和寧志先是夏侯尚𤣥嘗伏闕上疏言郯王某之寃公髙其義補其子宣使時也伊蘇岱爾為省平章挾私憾殺右丞達爾瑪巴拉公曰是尚可以仕邪不去禍且及即上章辯達爾瑪巴拉無罪辭官去居房山卧不起將相重臣皆以書請不聽丞相實勒們來問計公曰撫軍院悞國至斯不可救矣亟請河南王庫庫特穆爾總兵以衛畿甸而固守之當時事勢巳不可為及再入翰林僅一日而大兵入燕公曰國家遇我至矣國亡吾敢不死趨所居報恩寺俯身入井將就沉溺寺僧大梓與鄱陽徐彦禮力挽起之且謂曰公毋死公不祿食四年矣非居任比且國史非公莫知公死是死國之史也巳而兵入府藏垂及史冊公言於鎮撫呉勉輦而出之由是累朝實錄無遺闕者公之力也其入國朝也皇上嘗訪以元興亡之故甚見禮重俾之侍講禁林宋穆陵顱為嘉木揚喇勒智所發後入宣政院西番僧相傳授為祭器公言于上索取瘞之聚寳山時公春秋巳髙雅志亦不復仕矣公厚重深中有容寡言笑聞人詆毁如不知與人交有禮雖貴顯恒若貧賤時平生好薦賢先後所引若翰林學士劉君獻待制黄君冔等七十餘人至通顯者甚衆累持文衡考試多士人服其公樂善好義若有督之者凡事有關於名敎可以勵風俗者必為之乃巳居官清慎節儉遇凶嵗輒疏食不御酒倉吏進祿米贏七斗時斗可易白金五兩公命歸之官奉勅書徽政院使圗們岱爾神道碑其從子以白金五十兩為公夀公却之曰國體當爾居中書凡請文來謝者皆不受故人妻子不能衣食者厚賙而生之㫃嘗請仕公曰賢才未進吾敢私爾乎公博學善文辭至正中獨以文鳴天下凡朝廷制作皆出自公手四方欲顯白先徳者皆造公門尤精於書得片楮隻字者寳秘以為榮有文集五十巻奏議二巻宋史稿五十巻元史稿若干巻藏于家公娶舒氏先三十年卒再娶趙氏先十一日卒俱封楚國夫人子男子二人㫃至正二十年進士第累官承直郎大都路同知薊州事今為安慶府儒學敎授斿登仕郎大都儒學提舉亦前十年卒女六人一適同邑曾侁堅之子也餘皆夭孫二人長太平夭次徳童嗚呼天之於人不能以俱全也乆矣或授之才而不假以位或畀以位而不畀以時此竒才偉徳之士常困而不施而生民所以鮮䝉其休澤也惟公以淵深之學精純之文嘗都顯要之位海内仰之如祥雲景星亦可謂有得於天矣而逢時亂亡不獲大展以死豈不可哀乎雖然觀其所自著者固足以不朽矣銘曰二氣孕精至文乃生凝為川嶽煥為日星天地之文因象以示象黙無言非人莫著徃古百代作者孔多迄今有聞其能㡬何元興朔方氣淳而龎駿烈宏謨震盪萬邦積盛而彰實在君子維八十年其績甚偉卓兹危公起大江西奥學醇辭孰能與齊在至正初交薦而升敷繹聖經以牖帝明中原荐饑黎首告病公跽而言民為國命同列畏聞吐舌改容當宁褒嗟曰維汝功徃師成均朦瞽有相化其嚚荒趨厥禮讓貝葉之文有詔俾書非職所宜正色控辭或服豸冠或為宗伯或居中臺或參廟畫孰寃弗雪孰善弗褒孰蠧孰莠弗除弗薅白之擢之予之錫之剔之殛之扶而植之彼何不思多言是訾曰匪其然吾畏後世南風泱泱耆老淪亡屹如丘山以鎮四方疆土日蹙孰不震動謂尚有公恃以無恐權姦肆威盜秉國鈞畏公有言出為藩臣政亂無章倚勢相戮公駭而吁吾何可祿微服宵趨房山是居庶士惶惶如渉失桴天兵北征驅雷走霆有耳莫聆燕社已傾公曰國亡吾曷不死公忍不死以存國史大明方隆多士景從有詔任公侍講禁中昔豈不仕弗獲行道時之可為公則既老維古賢士立徳樹勲茍有弗施著之斯文公文之純太音𤣥酒道則在茲爵祿何有孰髙為山孰深為淵文之有傳終古昭宣元故翰林待制黄殷士墓碑皇帝登大寳之明年即詔執政大臣曰元氏有國一百六十三年雖亳社已屋厯數有歸國可滅史不可滅卿選江南知名之士不仕於元者纂修成書而命翰林學士宋濓為之總裁庶㡬得筆削之公以副朕意中書下其事濓等既奉詔執筆唯謹而於黄公殷士之沒寘於忠義傳中殷士之髙第弟子鄧東復來請曰國史繫天下之公法當嚴墓碑紀一人之私理宜詳懸繂有石願先生為書之按東所造事狀殷士諱冔殷士其字也臨川金溪化原里人未冠謁呉文正公澄於郡庠公方類解小戴禮殷士撰書上公列諸家箋疏得失若分黑白尋徃學文於虞文靖公集揭文安公傒斯三公皆江右人見殷士無不器重以逺大期之已而聞直清先生祝公蕃倡明象山陸氏之學於鄱陽與同舎生王企不遠數百里徃候焉一見之頃欣然有契於眉㫸之間歸而喜曰冔豈昧其本心者哉自是一動静一云為惟心是監凛然若上帝之臨久之東㳺呉㑹以發越精神還遯羽陽山中既而嘆曰學者將用世耳奈何自秘耶乃走燕都受知中書參知政事多爾濟巴勒公及丞相賀公惟一賀公當國授淮南等處行中書省照磨遷國子助敎陞博士特除翰林待制兼國史院編修官階奉訓大夫時權臣秉政天下大勢巳去殷士憂國愛君晝夜不遑寧屢上疏陳大計竟不報殷士方彈指長嘆同列以從宜適變之機為問殷士曰此言何以至於我哉今日辟朝空宫以淹國䘏吾之不能為公存猶公之不能為我亡也盍亦各諗所安乎洪武元年八月庚午都城陷大明兵入城殷士謂其從人張午曰吾為士子義不可辱國汝幸收吾骨南還即解衣投居賢坊井中午倉皇大慟拾級下救之見殷士浮沉水間氣猶未絶遽負之以升歔欷言曰今南兵不殺在儒臣尤所賔禮他日幸致富貴君何為自苦如是耶縱曰為國盡忠未聞小臣而死社稷也殷士曰齊大史兄弟皆死小官彼何人哉午終不解還舎治酒殽使家人歌舞為驩環守至日昃㑹大將軍徐公達下令凡勝國之臣俱輸告身于官朝暮一見各署名于冊違則罰殷士聞之給午曰吾今知汝意矣汝言良是也可取吾告身來第吾慚見同朝人必乘醉可往耳何所可致醇酎乎午大喜持錢出沽闤闠中及還求之弗得亟往視井傍冠裳帶舄列寘不紊殷士死已乆矣其夀六十一云午買棺以斂同知漷州事陳介北山僧梓共營葬事以某月某日瘞于西山且刻石記之曾祖某祖某父某皆力本尚農享上夀以終娶里中桂氏隠士兢之女兄也有逺識勸夫游學毋以家事自累無子而先沒殷士既貴顯或勸求昏甲族以媒榮進殷士曰邶之共姜宋之伯姬區區一婦人尚以節義自守况男子者乎吾弟幸生男即吾為有後矣性嗜古文而尤長於詩補作古樂府諸題音度和雅無愧於古四方士大夫多購求藏弆為榮金華黄文獻公溍於人慎許可獨推奬之不置且與之通譜系云嗚呼天地之間有正氣焉日月以之而光昭海嶽以之而流峙在人則為忠為義其人雖沒其氣則千載如生誠古今之常經國家之大防也有如殷士當元運將終誓與國俱亡從容就死而無悔比一時慷慨而殺身者則有間矣非其不昧本心之學能致是乎自古有天下者未嘗不以褒崇忠義為先務皇上即位之初蔽自淵衷即勅有司建元忠臣行臺大夫福夀余忠宣公闕二廟以春秋奉祠事所以風厲於萬方者聖謨至深遠矣州郡或以殷士之事上聞旌寵之典其有不降下者乎銘而列之非為殷士也靈承上意以勸世之為人臣者銘曰烈烈黄公元之小臣乃能為國殺身成仁人所大欲夀為最貴孰能舎之自絶于世夀固可欲義不可虧毫髮有愧雖生曷為吾死死義直氣貫天中不死者何千萬年小夫茍全一愧一死不知百齡其死凡㡬有冽者泉其深無底奮身一躍眼不見水精魄入地肯隨物融化為白龍上朝帝宫爾死得死百世宜祀盭綬金章誰非臣子明文衡巻八十
