body:
  text: 眀文衡巻六十七明程敏政編碑蒲州廟學重修碑薛瑄蒲州儒學著令釋奠大成至聖文宣王仲春仲秋上丁凡一其弟子以及歴代有功於聖門之諸儒皆配饗従祀於殿廡焉廟後列堂齋為生徒講習之所事神育才各有其宇然或敝於久或缺於初皆學政之不可緩者今徐守孚浙右台之黄巖人家世業儒既由庠序中鄉舉游賢闗歴事春官於神典民政熟於講聞及來知是州凡政事先後次第修舉因進謁大成殿庭以大成門東西廡神庫神厨牲房皆事神之宇大成門嵗久穿漏乃葺而新之兩廡迫隘不足以周旋禮節遂擴増其楹數復外為周廊以障風雨神庫等屋悉加修治生徒雖有講習堂齋舊乏退息之所因創増號房數十間又樹扁學門以壮觀仰其材皆儲之於素匠役取之在官民不知擾而役底於成始事於天順四年月日凡㡬閲月訖工於是神宇學舍巍然秩然莫不峻整又訪郡之先達可為鄉先生者尸而祝之以勵後進師生樂其崇學好禮而役之成也咸願有辭以鑱諸石乃來求記余惟古之學政考之載籍可見巳葢自夏商周以上之教法皆所以復人性之善孟子所謂學則三代共之皆所以明人倫者是也漢唐歴代雖或建學而道學不傳又為異端雜術所淆而知以復性為敎者鮮矣至宋道學復明朱子序大學有曰治而教之以復其性如唐虞司徒之職典樂之官以及三代小學大學教人之次第節目皆所以復其性故又曰學焉者無不有以知其性分之所固有職分之所當為而各俛焉以盡其力者此也洪惟我天朝道隆前古治底文明内外建學其所以育天下之英才者皆以復性為教故凡五經四書小學性理書自周張程朱之説以達乎堯舜禹湯文武周公孔子顔曾思孟之道學校之講學者既一於是科目之取人者亦一於是推之禮樂政治者莫不一於是是以學政粹然一出於正而異端雜術不得以淆乎其間豈漢唐歴代之學而鮮知以復性為教者之可擬哉今徐守既克舉學政諸生瞻依宣聖諸賢之廟廡有所興起必由所謂五經四書小學性理諸書周張程朱之説以求古聖賢之道以求復其性以追古俛焉盡力之君子庶㡬於學校政有實効矣於是既序其事而復繫之以詩曰惟此蒲學守克新之新之伊何道化在兹有神之宇靡不完葺有士之居靡不増立春秋釋奠禮必䖍誠朝夕礲琢業必専精於道自天全畀神聖繼天立極治教斯盛昔在唐虞典樂司徒三代法備學則有區區以小大慮百致一爰究其歸復性是極延延鄒魯心法相承曰命曰性一以貫通孟氏往矣正緒邈絶術裂多岐理難同轍宋儒勃興道統是接皇明運泰道隆古先學建内外政敎是宣其經有五其書有四性理真儒發揮詳至于以表章于以作人人知復性化底熙淳兹頖有政政既理治朂哉眀誠聲實永世精忠廟碑徐有貞國之有忠義猶天地之有元氣也天地非元氣不運國非忠義不立彼其所以繫星辰行日月載華嶽振河海者惟元氣元氣在則雖時有隕蝕騫溢之變而終不易乎常運所以安社稷尊主庇民者惟忠義忠義在則雖時有冦難禍亂之虞而可以捄乎滅亡然天地之主以道國之主以人道無私而人多慾故天地不自害其元氣而國有自害其忠義者至要其終則亦有萬世之公論存焉如宋岳鄂武穆王之事是巳當夫徽欽之既北狩而髙宗南渡也宗社㡬淪兵戈方熾不翅天柱崩而地維折宋之不亡僅如一線之屬旒國無其人誰與復立王於時奮自徒步應募而起歴裨校至大将小戰百餘大戰數十鋒不少挫而益勁遂平南北羣盜傾偽齊以蹙金人葢王之忠義勇智皆得之天非矯偽而為者故能始終以恢復為己任才與志副名與實稱南渡以來一人而巳當是時金兵數敗中原㡬復奈何主蔽於奸忘讐忍恥自棄其土而不能成中興之大功此則宋之不幸髙宗之不幸而豈獨王之不幸哉論者謂方郾城戰勝進軍朱仙鎮烏珠将棄洛還而詔趣班師使王以将在軍君命有所不受之義堅執北伐乘屢捷之勢偪屢敗之敵而滅之盡收故疆措置巳定然後奏凱旋師歸身謝罪顧不愈於束手就僇而志不得伸耶此亦一義然未得其當也夫将不専制久矣惟趙充國之破西羌嘗違詔而伸己策以上有孝宣之眀下有魏相之忠與協耳不然則必如孔明之受託昭烈桓温劉裕之専制晉權乃可以拜表而即行彼髙宗之去孝宣逺矣又濟之以奸檜之賊王既無孔明君臣之契而温裕之所為又非王之所肯為者此其所以寧死而不敢専制之也歟嗚呼於此益可以見王忠義之誠矣是以自宋及今天下之人所共扼腕傷嘆聲其害王者之罪而誦王之烈不已非所謂公論之存於萬世者乎嵗己巳之八月皇帝初即大位以統幕師上皇未復敵方内偪乃命侍講臣珵等十有五人分鎮要地遏亂畧糾義旅以為京師聲援而臣珵實來彰徳彰徳古相州也湯陰為其屬邑邑之周流社王之所生地也間因行縣至焉既臨祭王之父祖墓而封守之乃集郡縣僚吏師生父老于庭而諭之忠義因及王之祠事皆喜躍願効力其明年春珵以召還乃具列王之功於禮當祀者以聞詔可祠既成勑賜榜曰精忠之廟而俾有司春秋祭享如制於是書其事于麗牲之碑而識其相事者之職名於碑陰又為迎送神之辭使歌以侑享既以慰王之靈於𠖇漠且以為天下忠義之勸云其辭曰王歸來兮毋夷猶寧不懐兮舊邱昔仗劒兮南遊刷國恥兮復君讎王之烈兮葢九州羌彼奸兮忠是訧神胡為兮滯留駕風鵬兮驂雲虬婘鄉邑兮少休斚有醴兮爼有羞式燕享兮春與秋王将去兮之何方胡不睠兮故鄉爰弭節兮迴旌肆容與兮翺翔肅羽騎兮成行彎强弧兮射天狼福我民兮佑我皇干戈載戢兮無水旱傷蠲我祀兮蒸與嘗江之南兮河之北往復還兮樂未央勅修河道功完之碑徐有貞惟景泰紀元之四年冬十月十有一日天子以河決沙灣久弗克治集左右丞弼暨百執事之臣于文淵閣議舉可以治水者僉以臣有貞應詔乃錫璽書命之行天子若曰咨爾有貞惟河決于今七年東方之民厄于昏墊勞于堙築靡有寧居既屢遣治而弗即功轉漕道阻國計是虞朕甚憂之兹以命爾爾其往治欽哉臣有貞祇承惟謹既至乃奉揚明命戒吏飭工撫用士衆咨詢羣䇿率興厥事已乃周爰巡行自北東徂南西踰濟汶沿衛及沁循大河道濮范以還既究厥源流因度地行水乃上陳于天子曰臣聞凡平水土其要在知天時地利人事而已天時既經地利既緯而人事於是乎盡且夫水之為性可順焉以導不可逆焉以堙禹之行水行所無事用此道也今或反是治所以難葢河自雍而豫出險固而之夷斥其水之勢既肆又由豫而兖土益疎水益肆而沙灣之東所謂大洪之口者適當其衝於是決焉而奪濟汶入海之路以去諸水從之而洩隄以潰渠以淤澇則溢旱則涸此漕途所為阻者與然欲驟而堙焉則不可故潰者益潰淤者益淤而莫之捄也今欲捄之請先疏其水水勢平乃治其決決止乃濬其淤因為之方以時節宣俾無溢涸之患必如是而後有成制曰可臣有貞乃經營焉作治水之閘疏水之渠渠起張秋金隄之首西南行九里而至于濮陽之濼又九里而至于博陵之陂又六里而至于夀張之沙河又八里而至于東西影塘又十有五里而至于白嶺之灣又三里而至于李􅕞之崖由李􅕞而上又二十里而至于竹口蓮花之池又三十里而至于大瀦之潭乃踰范暨濮又上而西凡數百里經澶淵以接河沁河沁之水過則害微則利故遏其過而導其微用平水勢既成名其渠曰廣濟閘曰通源渠有分合而閘有上下凡河流之旁出而不順者則堰之堰有九長袤皆至丈萬九堰既設其水遂不東衝沙灣乃更北出以濟漕渠之涸阿西鄄東曹南鄆北之出沮洳而資灌溉者為頃百數十萬行旅既便居民既安有貞知事可集乃㕘綜古法擇其善而為之加神用焉爰作大堰其上楗以水門其下繚以虹堤堰之崇三十有六尺其厚什之長伯之門之廣三十有六丈厚倍之隄之厚如門崇如堰而長倍之架濤截流柵木絡竹實之石而鍵之鐵葢合土木火金而一之用平水性既乃導汶泗之源而出諸山滙澶濮之流而納諸澤遂濬漕渠由沙灣而北至于臨清凡二百四十里南至于濟寧凡二百一十里復作放水之閘于東昌之龍灣魏灣凡八為水之度其盈過丈則放而洩之皆通古河以入于海上制其源下放其流既有所節且有所宣用平水道由是水害以除水利以興初議者多難其事至欲棄渠弗治而由河沁及海以漕然卒不可行也時又有發京軍疏河之議有貞因奏蠲瀕河州縣之民馬牧庸役而専事河防以省軍費紓民力天子従之是役也凡用人工聚而間役者四萬五千有竒分而常役者萬三千有竒用木大小之材九萬六千有竒用竹以竿計倍木之數用鐵為斤十有二萬鋌三千絙百八釜二千八百有竒用麻百萬荆倍之藁秸又倍之而用石若土則不計其筭然其用糧于官以石計僅五萬而止焉葢自始告祭興工至于工畢凡五百五十有五日於是水官佐工部主事臣詡㕘議山東布政使司臣雲鵬山東按察司事臣蘭等咸以為惟水之治自古為難矧兹地當兩京之中天下之轉輸貢賦所由以達使終弗治其為患孰大焉夫白之渠以溉不以漕鄭之渠以漕不以貢而工皆累年費皆鉅億若武之瓠子不以溉不以漕又不以貢而役久弗成兵民俱敝至躬勞萬乘投璧馬籲神祗而後己以彼視此孰輕孰重孰難孰易乃今役不再期費不重科以溉焉以漕焉無弗便者是以軍國之計生民之資大矣厚矣其可以無紀述於來世臣有貞曰凡此成功實惟我聖天子之致所以俾臣之克效不奪浮議非天子之至眀孰恃焉所以俾民之克寧不苦重役非天子之至仁孰賴焉有貞之於臣職其惟弗稱是懼矧敢貪天之功惟夫至明至仁之徳不可以弗紀也臣有貞嘗備員翰林國史身親承乏不可以嫌故自輟乃拜手稽首而為之文曰皇奠九有歴年維久延天之祐既豫而豐有蔀以䝉見沬日中陽九百六數丁厥鞠龍蛇起陸水失其行河決東平漕渠以傾否泰相乘運維中興殷憂迺凝天子曰吁是任在予予可弗圗圖之孔亟嵗行七易曾靡底績王㑹在兹國賦在兹民便在兹孰其幹濟其為予治去害而利惟汝有貞勉為朕行便宜是經臣拜受命朝嚴夕儆将事惟敬載驅載馳載詢載謀載度以為乃分厥勢乃隄厥潰乃疎厥滯分者既順隄者既定疏者既濬乃作水門鍵制其根河防永存有埽如龍有堰如虹䕶之重重水性斯従水利斯通水道斯同以漕以貢以莫不用邦計維重惟天子眀浮議弗行功是用成惟天子仁加恵東民民是用寧臣拜稽首天子萬夀仁明是懋爰紀厥實勒兹貞石昭示無極大寧觀碑劉定之大寧觀在大同府城中大同古雲中地漢高祖鋤秦蹶項威振寰海然至此為冒頓所困拓跋魏據此而起而以得中原之半遼金皆以此為别京元因之盤根株固基趾焉維我皇明視為藩垣重地屯兵千萬連城堡十數百以控制朔漠達于無外葢自帝都顧視之大同其右翼也徳威所及之逺豈前代君華夏闢土疆者可侔哉信足謂之大寧矣洪武初創道觀以大寧為名厥有意焉然其地寒故山林無傑木鉅材其人勞於戍守饋運征行故於取木伐石陶甓之役有不暇構架塗墁繪飾之巧有非素習則惟王公将帥官府廨署有不逮中土者況於觀固宜因陋就簡也今副都御史古濬王公越來鎮大同令肅法舉亦既有年意欲新之有待未果太守綏徳郝君淵之自監察御史知河間府連著績用遷綰郡紱有所興革克承憲度公嘉奨之以新觀之事委焉君退與其僚捐俸為率俾觀之羽士張道維集好義者所願輸始事于成化三年丁亥某月訖工於明年戊子某月最北正殿五間殿之南甬道屬于中殿三間道東西各有亭中殿之南甬道屬于山門道東有鼔樓西有鐘樓環其區域為廊四周東廊二殿北以祀三官南以祀靈官西廊二殿北以祀四聖南以祀闗王間架髙廣深邃加其數觚稜罘罳欄檻増其規香火灑掃朝夕節朔定其制石山藝卉沙墀植樹期其久既成文武官曹兵民士女咸集瞻視靡不欣喜謂曩者吾人至于斯觀有所祈謝祥臻災弭冦殄物阜雖感神恵而愧觀弗稱今兹稱矣功有自焉惟亭立碑以待刻文紀實郝君嘗従予學乃以王公命來請予文夫斯地之安寧綏靜陶大化超往古由有聖主在上享天心恢神謨以長轡遐馭也斯觀之盛則賢臣總風紀任牧守治神人能得其宜于中也然則斯人在下衣食有餘而奉神之休庸有既乎予既記其事乃繫以銘詩曰絶塞之表不聞刁斗乃聞道觀鼉鳴鯨吼鼔鐘之聲警于昏曉烽燧不見乃見華燈夜集于觀燦燦如星我皇御世武緯文經天下之大孰如其寧風調雨順禾黍被野日之夕矣牛羊來下饔飱是宜湩酩亦諳出而射獵獲虎耽耽歸舉兕觥抵掌醺酣囊金車帛來自塞南家給人足捐財弗貪以作斯觀千楹楩楠維神之尊其居正宇垂衣雲霞寶冠玉麈與天為徒佑我聖主旁殿居者哂喜嗔怒各司厥職我民依怙爾敵勿驕神欲勦之都憲節出大将纛麾執以還城往觀數俘入門而左闗雲長居顔如渥赭有虬其鬚單刀雪瑩爾魄先誅有屹者亭碑峙龜趺守臣所立鰲島仙書眀文衡巻六十七
