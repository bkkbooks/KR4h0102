body:
  text: 明文衡巻七十明程敏政編神道碑巢國華武公神道碑宋濂自古興王之際天既生真人拯民塗炭之中必有如虎之將宏展其丕猷弼成其大業此如燭照而龜卜蓋無疑者以漢唐言之則雲臺二十八將淩煙閣二十四人是已洪惟皇帝當四海逐鹿之秋龍飛淮甸嘘陽吸隂反掌之間廓清八極夷荒蠻徼罔不臣妾當是時謀臣猛士效忠宣力其衆如雲若和陽華公亦其一人也歟公諱髙姓華氏字則未聞所謂和陽則其所居之郡也曽大父汝徳贈中奉大夫湖廣等處行中書省叅知政事䕶軍追封武陵郡公曽祖妣張氏追封武陵郡夫人大父某贈資善大夫湖廣等處行中書省左丞上䕶軍追封武陵郡公祖妣張氏追封武陵郡夫人父徳新贈榮禄大夫湖廣等處行中書省平章政事柱國追封澧國公妣童氏追封澧國夫人公之生也挺然有英氣人見之者咸曰是子異日必亢厥宗及壯其材果超羣類不屑屈人下同黨多嚴憚之至正中天下大亂所在盜賊乗時為患害屠劉其黔黎蕩析其室廬剽敓其玉帛公慮蹙廹州境即於所居黄墩結集水砦召募强丁淬礪刀劍晝夜為禦侮計練閲有法暗合古之將畧遐邇聞者多荷祋相從于時帝初起兵臨濠智勇之士雷動而霧集公遂帥衆而來𨽻于麾下及大兵飛渡長江進克采石繼攻蕪湖駐溧水而定建業𢷬京口而下江隂公皆從諸將建立竒勛會張士誠據有淮浙數州之地肆為不恭侵軼邊陲帝乃震怒遣大將出師討之公復在行摧敵于舊館陷城于姑蘇拓土于淮東其功號為尤偉葢公自從軍授以先鋒之職八轉至榮禄大夫湖廣等處行中書省平章政事迨夫大統既集帝念將帥百戰之勞定功行賞上則公爵次則侯封各錫以鐵券金書傳示子孫俾世其禄於是授公開國輔運推誠宣力武臣榮禄大夫柱國封廣徳侯食禄六百石公未及授劵請命往廣海廵視城陴整飭軍隊行次崖州以疾薨于官舍年五十又九實洪武四年三月二十七日也訃聞帝懷悼不已詔有司迎公之柩以是嵗六月某日還葬於黄墩先墓之次藏劵墓中以慰公於九泉且進封巢國公諡曰武莊階加特進勲加右柱國褒崇之意無不備至公一子景春蚤世竟無嗣續其配澧國夫人蔣氏先薨至是與公合葬焉既葬禮部以聞帝若曰其令國子司業宋濂製為碑銘樹諸神道尚書臣陶凱即日傳命授臣臣不敢辭臣聞傳記所稱用世之士非材勇為難而炳於幾先者為難公當羣雄疊奮之時亦欲以一長自效見帝之頃即知天位之有在人情之所屬統其部曲驩然來歸非有先幾之識者能之乎其建樹功烈安享尊榮爵封上公位躋極品亦宜也雲臺淩烟之衆又豈得專美於前乎臣既歴序公之戰功次第於石復繫之銘辭曰士之所貴炳於幾先誠獲所依身名兩全當元之季王綱解紐羣雄虎爭鹿知誰手維武莊公家於和陽依水建砦以遏寇攘皇帝龍興知為真主仗劍相從率先多士帝曰俞哉爾兵我從即麾義旗同渡大江牛渚既殱于湖亦㨗溧水洋洋視如一髮天兵載揚翔飈震霆秣陵南徐次第而平况此江隂勢如破竹兵鋒所向無强不衂鄰有勍豎據浙連淮來撼大樹何哉蚍蜉皇赫斯怒命將行伐鏟破連營洊除窟穴復勅雄師定淮之東載綏載寜載約其同凡斯諸役公無不與展力攄誠亦云備至天清地寜六合一家大統既定論賞有差黄金鏤書鑄鐡為券作誓剖符千齡弗變皇㤙下被將膺寵榮訃來海南聞者涕零宸衷憫惻為詔郡縣旋其柩車就鄉而窆崇階峻爵極于上公龍光有赫賁及幽宫傳臣作銘播揚嘉績百世之下視此貞刻明故資善大夫御史中丞兼太子賛善大夫章公神道碑銘嗚呼是為吾友龍泉章公之墓初予未識公時輒稔聞其名及公應聘而起同赴于南京同館于青溪同出入禁署以備顧問如是者四三年私竊以為生我者父母知我之志者唯公而已不知公何為棄予而遽死矣乎有善孰予相孰知我瑕疵而攻之乎神道之銘公之子特以為屬肝腸百裂其何能綴緝言辭乎相知之深者不為之則鋪張君子之休美不識當屬之誰乎因抆淚而序之曰公諱溢字三益姓章氏處之龍泉人逺祖有曰巖者仕宋以兵部尚書守泉州始家于南安至唐康州刺史及又自南安遷建之浦城及生福州軍事判官脩脩生光禄大夫檢校太傅西北面行營招討制置等使持節髙州諸軍事髙州刺史仔鈞娶練氏生子十五人其第三子獻誠仕南唐為銀青光禄大夫檢校司徒獻誠生文錫仕宋為秘書省校書郎文錫生都官郎中重又自浦城遷于龍泉子孫遂為龍泉人重生吉吉生順順生公琛公琛生世安世安生舉舉生宗宗生鄉貢進士輔輔生文義文義生用之用之生强宗强宗生煥文則公之髙祖也曽祖諱斯立祖諱格父諱遇孫母某氏公之始生其音如鐘父母疑為不祥幾棄不舉及成童嶷然莊重不習鄉井輕儇態諸兄出應科繇頗為儕類所侵苦公忿曰彼徒謂我弱爾吾不自厲豈為男子邪乃往受事縣官即有曲者舉正理直之衆始愧服比弱冠從鄉先生王叔剛游從事於正心修身之學既又聞金華為文獻之邦間出游以次叩其統緒浙東憲使圖沁布哈請與語悦之已而改官陜西要公與俱至虎林心忽驚悸力辭而歸抵家父病已革越八日而逝人以為純孝所感至正壬辰蘄黄妖寇自閩犯龍泉公與從子存仁避亂山中而存仁為寇所執公心計曰吾兄止有一息不可使無後挺身出謂賊曰兒幼無所知我願代之賊聞公名方出重購以求及得公大喜賊帥欲問計公正色拒之曰君等皆有父母妻子顧為此滅族事邪賊怒繫之柱以刀摩其脅曰不降者且死公曰貪生惡死固人常情然吾終不為不義屈賊愈益怒曰汝誠不畏死邪公曰死即死何畏乎賊壯之不敢加害公夜紿守者乘間既脱歸乃集里民為兵不旬日擊却之處州府判官以兵來龍泉欲盡誅平民詿誤者舒穆嚕將軍伊遜實總兵政公走麾下説曰將軍知賊之由乎曰不知也公曰貧民廹於凍餒故相挻而從盜誠得一循吏招輯之民即貧民耳今不出此而肆行剪屠是殆揚湯以止沸也不識可乎舒穆嚕將軍曰善㣲先生言事幾敗即檄判官毋擅殺舒穆嚕將軍服公器識留幕下與議軍事其平屬縣慶元及建寜之浦城松溪羣盜公有力焉上其功江浙行省丞相喀喇公承制授公將仕郎龍泉縣主簿辭不受海寇起黄巖掠沿海郡縣行省命舒穆嚕將軍守台城台之寜海民亦為變攻圍台城急舒穆嚕將軍飛檄召公為援公方退居田里得將軍檄即起曰吾邦非舒穆嚕將軍人且盡為枯骨今一旦有急正我報徳之秋也集趫勇少年數百人晝夜行至城下約内外夾擊賊遂潰海寇亦遁去寜海大饑豪民呉甲蔣乙積粟不糶公言於舒穆嚕將軍將軍因屬公行縣賑之公至縣即抵二豪罪發其粟賑餓夫其尤困者俾僧作糜食之公還龍泉龍泉亦歲儉大家有粟髙其直且不發公先以私田易粟貸里人乃行勸分之政民受其惠為多隣邑青田潘惟賢為盜而龍泉監縣布呼丹貪虐無狀民因導潘攻縣治布呼丹棄印走公同其師王剛叔召豪傑與賊戰敗走之縣治遂復行省給銀幣為賞布呼丹懼棄職獲罪而愧公有功乃謀害公公方賛元帥哈廸爾開府處城未敢發會帥府問布呼丹罪遂結季溪惡少拒命首害剛叔于家帥府檄兵襲擊之布呼丹遁去於是處之七縣盜皆螽起行省移舒穆嚕將軍以行樞密院判官分治處州公謂舒穆嚕將軍曰松陽小醜不速平將養成大患邪將軍曰唯君處之公乃遣千户曹勝安督兵授以方畧一戰盡降之分院上其功行省陞承事郎松陽縣尹又辭不受元帥葉君琛攻鄭寇於麗水屢為所敗分院調公及樞密院都事胡君深合討之公與胡君統軍至浮雲賊衆來逆戰竝山為長陣兵既接我軍張左右翼夾攻之賊大敗直𢷬其巢穴賊望見公來拜乞曰我非為寇者待我殱此海蠻即降矣海蠻謂葉君所部海軍也公曰吾不知他特捕反者爾賊為内外二砦公麾兵踰外砦立壁或疑壁於兩砦間非利公曰非爾輩所知我既踰外砦則内砦疑其已降而外砦亦計其疑已二砦相疑破賊必矣壁未完賊突至相持未有勝負公麾竒兵横擊賊奔北即移兵圍内砦數重下令急攻遂陷之執鄭寘諸法外砦亦降行省復授福建行省檢校尋又改除奉訓大夫處州路總管府判官皆不受南行臺治書侍御史齊黙特喇實分臺于婺長鎗軍叛廹其城治書遣從事楊廸徵師於公公勒所部軍就道長鎗聞公至輒引去省憲交章薦于朝除武徳將軍僉浙東都元帥府事又辭不受或疑為要名公曰吾所將皆鄉里子弟使其肝腦塗地而吾獨取功名弗忍為也青田賊呉英掠婺之金華永康東陽諸縣聚衆猖獗公議討之分院乃調兵屬公及胡君與賊屢戰皆敗之賊勢蹙縛其黨張貴李興甫等出降遂昌凶右户閉糴土豪周天覺嘯聚殺之元帥胡君往討天覺負固不服久之始請降公曰此賊不殄必貽後患胡君不聽受其降已而天覺果以復叛誅始天覺之未降也執其黨與三百人繫諸獄至是胡君欲盡坑之公執不可得生全者十六七時天下日入於亂公結廬匡山上自號曰匡山居士屬其子曰兵將至矣汝曹其保障州里乎己亥冬王師克處州公又避地入閩中今上皇帝遣使以束帛召公公乃幡然而起與青田劉君基麗水葉君琛金華宋濂同召至建業入見上問勞曰我為天下屈四先生耳然四海紛紛何時定乎對曰天道無常惟徳是輔惟不嗜殺人者能一之耳上曰卿等其留輔予矣亡何擢僉營田司事廵行江東兩淮之境田荒蕪及耕墾者皆分籍之差稅賴之以便公以疾在告者久上時遣使存問及疾小愈即入謁上見其來喜曰疾其瘳乎何遽出也一日上忽念公詢于中書左司都事張來碩曰章溢日來康強否來碩對曰溢日夜念母不置而以主上遇之厚不敢以言欝欝成疾耳上即命公歸省賜以白金文綺而留其季子存厚于京師浙東始設提刑按察司即擢公僉其司事尋命還處州代總制胡君入朝而為存厚娶胡君女賜賚優渥且俾存厚入侍皇太子以示親信胡君出師温州復詔公還守處州饋餉供億規措無缺而民不知勞及師旋即日以總制事付胡君而還其部王師平荆楚設湖廣提刑按察司遷公僉司事公入見上慰勞之曰紀綱之事今屬卿矣公既至覩荆襄多廢地遂建議分兵屯田且以控制北方計為便上曰所言甚善第未暇耳湖廣行省鎮撫回回怙勢作威輕重人罪以為常公㢘得狀坐以法曽未幾何内道按察使宋思顏以浙東憲使事不白下獄而浙東按察使孔克仁僉事王璹亦以事被逮辭或連公公憂懼不知所為上遣太史令劉君基喻公曰予素知章溢守法令毋疑也既而胡君以兵入閩陷沒處州之境皆動揺上命陞公浙東按察副使往鎮之平陽瑞安浦城福寜軍民等事皆𨽻焉公辭曰臣前任浙東無狀同列皆獲罪而臣獨䝉寛宥今若加陞擢則益重臣過疆場之事臣身任之萬死且弗避副使之命臣不敢拜上重違其志命仍僉浙東按察司事比至山寨或已叛公宣布詔㫖軍民皆感動乃誅其首叛者餘皆怗怗青田夏清聞胡君敗與福建㕘政范昌大合寇慶元龍泉時官兵盡戍浦城城中僅足自守公召舊部義兵使據要害列木栅為屯勢相聨絡别命元帥祁興季汶即龍泉縣治亦環植木城賊聞不敢犯公長子存道初以元帥戍浦城及是有㫖命存道提兵為遊擊而公即處城坐鎮之公謂父子相統於律不宜乃上奏請罷存道官不允兵戍浦城者以食不繼為病上以屬公洎浙東行省右丞李公文忠李公欲運處州糧餉公以為舟車不通而軍中所掠糧甚殷請拘入官而均給之兵食乃足青田稅官金甲發其同僚白乙匿官課乙既誅死金甲􅔤為姦利公訊之甲善口給辨不置公曰汝罪狀已明奈何欲以口舌撓法乎其辭遂屈上知為公所鞫當不寃命斬之建寜守將阮徳柔遣將來納欵人咸以為詐公曰陳友定據全閩勢必不能容故徳柔為圖自全計非詐也以其事聞詔許徳柔以原官守夲郡命比下徳柔果為友定所幷公因留其使厚存䘏之温州茗洋周遂卿恃山險常為寇隣邑皆患之而郵傳之通平陽瑞安者亦為所要遮公命存道合平瑞總督孫安之兵擒斬遂卿中書命處州造海舟若干艘并僉溪船戸為水軍其戸凡一千既有領之者而又𨽻于軍府役繁而事擾公上奏設水軍千户所專統之處多山而少田軍需恒不足胡君為奏免唯輸硫黄白藤于朝而行省復有所科公屢以為言罷之水軍千户任惟淵朱仲欽共戍青田會寇至仲欽逆戰而惟淵走還仲欽以無援故敗公斬惟淵以徇遣指揮何世明擊寇走之惟淵乃胡君所任信者既伏誅部曲莫不股栗浙江行省㕘政朱亮祖總兵取温州公調何世明以軍從温州平公聞其掠人子女命鎮撫林理徵之各部送還其家海隅既寜公請朝京師上報曰吾知卿在邊良苦俟平呉當即召卿爾及浙西諸郡下上遣使召公且命分兵征八閩而存道守處州公既入見上嘉奬甚至上諭羣臣曰章溢雖儒臣父子宣力一方寇盜盡平其功誠不在諸將後公再拜謝不敢當明日上召問征閩諸將何如公對曰御史大夫湯和由海道進平章政事胡廷瑞自江西入此固必勝然閩中尤服浙江平章李文忠之威信若令文忠帥師從浦城取建寜此萬全計也即日詔文忠出師如公䇿處州之糧其舊額一萬三千石有竒後以軍興加徵至十倍民不堪命公言之丞相丞相入奏上曰吾勞處民久矣詔從其舊温州黄宗雲朱君達來附各授以元帥之職還守其土及我師征温失利輒叛去温既平君達又請降公曰何物小醜叛而復降納之是無法矣奏戮之浙江行省承詔作大舟入海徵輸巨材檄處州與諸府同公曰處婺之交限以峻險縱有木道何從出且凋敝之民曷以勝此公力言於省臣止之洪武元年正月上即皇帝位有事於太廟公與執事畢越翌日召公及劉君基入見上御奉天殿羣臣咸在上歴陳其功竝拜御史中丞公辭不允尋兼太子賛善大夫公務存大體不屑屑於細故或以為言公曰憲臺百司之儀表居其職者當先養人以廉恥使人避而不犯豈直待搏擊為能哉上親祀社稷會大風雨還坐外朝怒儀曹議禮不合以致天變將殺之公奏曰風雨已連朝無足怪者縱禮官議有未盡陛下至誠自足以格神明願寛雷霆之怒上為之霽威上愛公甚嘗語公及劉君曰二先生年向耄恐感霜露致疾善自衛攝不宜早趨朝也存道部鄉兵萬五千從李公入閩閩平詔存道以兵從海道北征公持不可曰鄉兵農人耳始令征閩許以事平歸農今復調之是爽信也上不懌而罷公繼論奏曰兵已入閩者俾還州里昔嘗叛逆之民宜籍為軍使北征一舉而㤙威著矣上喜曰孰謂儒者果迂濶哉非先生為朕一行無能成兹事者公受詔遂行比至處州母夫人已歿公馳還舍援例乞丁憂詔不允丞相李韓公復貽書導上眷倚之意而遣存厚還家公灑泣而出日治戎事惟謹鄉兵既集命存道部領由永嘉浮海北行上章乞如律守制詔仍不允已而章再上上覽之為惻然曰吾固知其情不可奪矣但朕憲臺缺人耳遂可其奏存道至崑山走京師聼進止上諭之曰汝父事朕宣勞為多今汝又帥師北上尚勉立事功以無忝爾父則予汝嘉因授以處州衛指揮副使戍于上黨尋移平陽公自喪母夫人悲戚過度居常忽忽若無以自存者及營宅兆親負土石而感疾益深子女見之皆相顧悽愴曰勿憂也吾父母幸以安厝祖宗丘墓幸麤整飭嵗時薦饗幸有條序吾庶幾無憾第荷國厚恩未能報效此為慊耳臨終親友何濬來候曰當收歛此心毋有所執滯公曰吾久已知之遂薨於龍淵之私第實洪武二年夏某月某日也享年五十又六訃聞上甚憫悼乃親撰文遣官即其家祭之以某年某月某日葬于某山之原公娶陳氏勤儉恭淑克盡内助子男三人長即存道明威將軍處州衛指揮副使次存誠次存厚女二人長適陳某次在室孫男四人集慶集恭集善集正孫女二人公性篤於孝友父喪未葬而盜發里閈室廬被焚公稽顙籲天火至柩所而滅事母夫人備極孝養每事必得其歡心與三兄别居已久既創第龍淵請三兄同居以奉母怡怡之情藹如也先世有墓祠曰標慶菴公起其廢一新之且益田供祀事而定祭享之禮命子孫世守之其於宗族里黨患其子弟無所於學則創龍淵義塾延碩師以教之患其死者無所於𦵏則以玉峯西岡為義阡聴其薶瘞焉又以王剛叔實鄉郡之賢者而舒穆嚕將軍能忠於所事即龍泉劍水之陽作祠宇祀之曰忠賢祠盖凡可以聳善扶義者無不為也公狀貌宏偉器局夷曠而撫世酬物一本於誠一循乎禮義外若和緩而其臨大事則議論爭辨不避權勢必折衷於理而後巳其與學士大夫談聖賢之道如味飴蜜尤篤尚伊洛之學嘗曰古人為學皆躬行實踐人倫日用之間無非學也今人以記誦詞章為務特學之末事耳故公於章句之習皆不以屑意而於綱常之大端有闗於世教者恒切切為人言之生平務在濟人利物嘉言善行人皆能道之不可勝紀也余竊聞之章為東南著姓自五季以迄于宋代多顯者内則兩制八座外則州牧邑宰皆未嘗闕其人親提師旅捍衛鄉州能成其勲名唯太傅公為尤盛閩人至今道之公當元季紛擾羣盜四起磨牙吮血而桑梓為墟公談笑而起皆剷殄之無遺育處之民至今思之於是聲光流顯上致萬乗之知持節諸部執法中臺其功業視太傅公疑若過之此無他太傅之所遭者衰世公之所際遇者有道維新之朝也古人所謂能光前人者公其有焉予敢評隲公行勒諸堅珉以垂示永久於戲金或可銷也石或可泐也公之功不可忘也銘曰五季之亂殺氣昏太傅隻手障南閩西巖結壘兵雲屯狗䑕偷竊方繽紛怒來欲以一氣吞隂功上聞帝為欣勅生蟄蟄千子孫白笏堆床如爛銀匡山繼之譽益振方頤疎髯目電焞音吐鴻鬯鍾在軒蚩蚩赤子扇妖氛額抹絳帕手握􅚙嘯呼不異鬼鬽羣公起長驅汗且奔一障仡立無邉塵較之太傅功或殷重徽疊照絶等倫大明天子御紫宸濟濟萬國咸來賔束帛往聘東海濵加以禄爵㤙寵新庸田使者勞徠勤繡衣行部照青春貪夫宵遁不待晨一朝南徼將星湮括山恍惚失嶙峋狐狸跳舞騁妖神帝曰汝溢汝老臣整汝戎斾旋汝轅公車戾止集吏民導宣威徳語復諄有叛命者馘以徇叶坐鎮鄉城如虎蹲大兒游擊左右廵四郊怗怗多柔馴召還執法居諫垣長跪敷奏嬰逆鱗萱堂風􅃤逝驚魂上表陳情逹帝閽哀號負土自築墳因劬致疢亟返真聞之孰不淚霑巾公知學術歸一原時􅝥濂洛溉夲根所以不剉枝葉繁文事武備道乃存黄膓題凑藏山樊大書遺行勒堅珉傳千百載期無諼明文衡巻七十
