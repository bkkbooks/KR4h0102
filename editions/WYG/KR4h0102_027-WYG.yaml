body:
  text: 明文衡巻二十七明程敏政編書與貝川先生書洪武三十二年十二月河州作解縉縉薫沐拜書貝川大人先生閣下違逺誨言荐將十稔天涯闊異感念奚云縉率易狂愚動遭謗毁無所避忌數上封事萬言有分封勢重輔導體輕萬一不幸有厲長吳濞之虞納克楚來歸之時欽承顧問宜待之有禮疑則勿任任則勿疑稍忤機權其徒必二此類非一後皆億中封事留中又嘗為王國用草諫書言韓國公事為詹徽所嫉欲中以危法又為夏長文作劾袁泰書泰銜恨至深見常切齒但以不為屈膝之故竟致排誣累迹深文之語皆非律令所該伏䝉聖恩數對便殿申之以慰諭重之以鏹錫許以十年著述冠帯來廷元史舛誤承命改修及踵成宋書刪定經禮凡例皆以留中奉親之暇杜門纂述漸有次序荐將八載賔天之訃忽聞痛切之誠欲絶向非先帝之明縉亦無有今日是以母喪在殯未遑安厝家君以九十之年倚門望思皆不暇戀兾一瞻山陵隕涙九土何圖罣悮䝉恩逺行揚粤之人不堪寒苦復多疾病俯仰奔趨與吏卒為伍低回伏事誠不堪忍晝夜涕泣恒懼有不測之憂進不能盡忠于國退不得盡孝于親不忠不孝負平生學問之心抱萬古不窮之痛為天下笑為先生長者之羞是以數鳴哀感兾皇天后土之鑒臨得逺京師復見天顔少陳情悃或遂南歸父子相見即走也更生之日臨書不勝感切願望之至奉陳貳卿書黄福五月二十一日莫叅政至二十四日潘知府至二十八日陶指揮又至惟陶有批示莫潘到時問至再三極知鈞候清吉可慰而潘續云曽有幕府之鸞緘已𦵏神投之魚腹竟不知二楮先生所載云何既不得瞻手澤之光華又不得聞心聲之清切使人疑其所謂益其所思雖藩宇之左瀘水之東亦無以釋懸懸之懐也風伯不仁可恨也哉區區前已有書乏便未發與發而沉者無異然慮其事深切扵懷且莫邃運糧黔公出哨若謂無人不信也翁挺來降阮彦出見雖彼勢衰懼我威大若不得焚輿襯亦難以奏凱歌演乂之衆服者以有大軍在也一旦班師難常按堵不特此也各营士卒造舟楫辦戰器逺征近哨暑行瘴宿饑祼相仍疾病相藉不可謂不勞矣已附夷民打船板納税糧當差役垂髫戴白不得息肩加以盗刼縱横衣食窘迫不可謂不勞矣軍勞民疲財殫師老守此而失彼得西而遺東而尚畏首畏尾左遮右護噤無一語以逹九重是猶掩耳偷鈴諱疾忌醫也不知仁人君子深謀逺慮長治乆安果如是也不乎言自小子而行在閤下誠不以愚言為迂而以力行為任請益以兵相地屯守飬我士卒寛我民力堅城垣利器械廣其屯田實其倉廩兵閑食足民安化行則桑土牖户之事備居重馭輕之計得誠如是也戰勝攻取無適不然彼區區之賊獲與不獲降與不降又何足為重輕㦲人嘗有言耕當問奴織當問婢閤下與元戎胸中自有許多韜畧固不待人紛拏論也但慮及斯自不容已此論之外示及造船合藥并取食物一一如命另有單陳不同干聽今竝以先具未發之書併上要當合而觀之恃舊布忱故敢率爾事機之暇亦可扵戎閫處從容言之如其迂闊當即付之千頃之陂毋啓人議可也西風鴻便亦宜寄聲即今盛暑尚冀調理奉總兵官英國公書交阯平定以來八年之内民已三變而兵亦三加矣原其所自皆由惡本未盡除守兵不足用故也黎氏雖除而簡定存簡定雖去而季擴在今季擴既擒帥鎔景異之徒又以悉在網羅而無漏者似為無事矣然馭之有道則可以漸安守之無法不免再變何者陳元揝乃季擴昆弟也今雖逺遁視之若小可他日焉知不能為簡定季擴之續乎偽官頭目今雖降附待之為至厚焉知他日不能為阮帥景異之亂乎今成功之將在此全盛之兵在此吾忝為官守不扵此時此際言其所以而共議守備之策以圗長乆之治而乃亦曰安南從此無事矣是謂自欺也欺人也若忍扵自欺茍且偷安似為得計然當言不言何以辭君子公論之譏若曰欺人依違取媚噤無一語直至事壊而始上瀆宸聦則亦無以免朝廷法度之議慮至于斯言何容已謹將鄙見逐一條陳尚冀采擇幸寛狂妄一本處地方前者賊未就擒䝉調三總戎大軍到來征守猶必三年之乆而始克清大憝今交阯都司衛所原守官軍見在既少而演乂新平順化地方又闊迢迢千里無一兵守而止以土兵者若謂覊縻扵一時則可若謂長治乆安則未之信也三總戎若留一鎮守猶為庶幾倘皆振旅而歸恐俘獻未至京闕而警報已徹聖聦矣乞蚤圗之一交趾原留守兵九衛一所七分之數通該四萬七千餘人在全盛之時而猶不能禦侮以致煩兵屢舉今事故之數四去其三以如此險逺之地反歹之民而以舊日所遺一分之兵守之實未見其可也必須添置軍衛補完空伍庶免後艱今將合設衛所去處開列扵後演乂一帶黄江上下太平等處海口譚舍江鋭江魯江鹹子關廣威大堂等處靖安州萬寧等處太原府官良等處鎮夷關等處海潮希江等處一市橋所南有鎮夷北有昌江而本所居中且近實為虛設如將本所移置芹站以控禦鎮夷闗本闗止令土兵守之如此則鎮夷隘留有相守之利衛所官軍免輪守之患一歸化石廪闗上通雲南臨安下貫嘉興三帶水陸數百里寥寥無一城守萬一有警仰之扵誰莫若扵臨安衛摘撥二所官軍扵臨安府垜集三所民兵立一衛扵歸化州如潼闗澤州犬牙相制之例以控制上下地方便益一丘温坡壘隘留三衛所原垜廣西土兵近年以來官不得人逃亡之數十去七八其一二分在役者率皆老㓜貧弱代身有名無實是致盜常竊發路每不通如扵廣西調一都指揮仍領原調官軍扵丘温鎮守就行總督前項衛所土兵更選土官之能事者管之嚴禁不許雇倩代役務要正身將帶當房家小常川在役如此庶便一廣西鎮州府去本處鎮夷闗不逺彼處兵強弩利諒山一帶夷人畏之即今田州府知府為事發随韓總兵立功如將本人改授武職令選本府民兵三五千名親領扵鎮夷闗立衞控制不但服夷情抑且通道路一靖安州萬寕等縣近接雲屯海口并連廣東欽州地方最為險要如將欽州千户所添軍立衛或撥彼處衛所官軍或垜彼處附近有司民兵以充其數内摘一所扵萬寧等處設立以控靖安地方以通廣東水路便益一本處土兵首賊未就擒時急扵用人許將各處人民聴從土官自行招集而有司官謹扵奉命無敢有違有狥情取占親戚者有挾讐捉去耆正吏卒者有全縣之民俱被占取者亦有一家父子兄弟各自充兵及單丁貧窘自充一兵者後雖委都布司官清理而土官紛紛言少又不准除歸併因循茍且至扵今日今随征者月乆不歸家業狼籍屯田者糧徴不足荆土連綿是致逃亡今已過半若不從新整理必致法廢事壊難救其失必湏再令都司布政司官嚴督府州縣官將原集土兵并官下影占家人田奴盡行取勘見數汰其老㓜單弱者當民差選其富實丁多者為兵役先議合用若扵衛所應垜若干土兵然後照數垜集總小甲千百長選管如例每兵須以三丁共之官不許遝以庸才兵不許雜以冗濫選集既定即分地方以近就近置立城堡或四六或中半各専屯守不許亂差有警不拘其管軍官伴當亦如舊例就扵所管土兵内定數撥用仍造花名貫址文冊三司各收一本照證按察司仍常委官㸃閘不許廢弛如此庶便一各處偽官頭目及先曽授官後又從逆今招出降此等歹仄之徒宜為區處或量與官爵或分給田地使之得所以終餘年不可置扵閑散懐抑鬱抱不平以貽後患與行在户部諸公書周忱伏聞治民之道在扵禁惰㳺以一其志勸耕稼以敦其業蓋惰㳺禁則土著固而避勞就逸者無所容耕稼勸則農業崇而棄本逐末者不得縱由是賦役可均而國用可足茍或不然則戸口耗而賦役不可得而均地利削而國用不可得而給先王制六鄉六遂之法以維持其民而均其土地者正為此也邇者皇上念天下人民有因饑窘逃移者累降勅㫖設撫民之官頒寛䘏之條令天下郡邑招而撫之諸公頒布奉行克謹無怠天下之民感戴聖恩扶老携㓜競返桑梓惟獨蘓松之民尚有逺年竄匿未盡復其原額而田地至今尚有荒蕪者豈優恤猶未至乎凡招回復業之民既䝉蠲其税粮復其徭役室廬食用之乏者官與賑給牛具種子之缺者官與借貸朝廷之恩至矣盡矣如此而猶不復業者亦必有其説焉盖蘇松之逃民其始也皆因艱窘不得已而逋逃及其後也見流寓者之勝扵土著故相扇成風接踵而去不復再懐鄕土四民之中農民尤甚何以言之天下之農民固勞矣而蘓松之民比扵天下其勞又加培焉天下之農民固貧矣而蘓松之農民比扵天下其貧又加甚焉天下之民常懐土而重遷蘓松之民則常輕其鄕而樂扵轉徙天下之民出其鄕則無所容其身蘇松之民出其鄕則足以售其巧忱嘗厯詢其弊盖有七焉何謂七弊一曰大户苞蔭二曰豪匠冒合三曰船居浮蕩四曰軍囚牽引五曰屯營隠占六曰隣境蔽匿七曰僧道招誘其所謂大户苞䕃者豪世富貴之家或以私債準折人丁男或以威力強奪人子息或全家傭作或分房托居賜之姓而目為義男者有之更其名而命為僕𨽻者有之凡此之人既得為其役屬不復更其糧差廿心倚附莫敢誰何由是豪家之役屬日增而南畆之農夫日以減矣其所謂豪匠冒合者蘇松人匠叢聚兩京鄉里之逃避糧差者往往携其家眷相依同住或開造房居或開張鋪店冒作義男女婿代與領牌上工在南京者應天府不知其名在北亰者順天府亦無其籍粉壁題監局之名木牌稱髙手之作一户當匠而冒合數户者有之一人上工而隠蔽數人者有之兵馬司不敢問左右隣不復疑由是豪匠之生計日盛而南畆之農民日以衰矣其所謂船居浮蕩者蘓松乃五湖三泖積水之鄕海洋海套無有浮涯載舟者莫知蹤跡近年以來又因各處闗隘廢弛流移之人挈家扵舟以買賣辦課為名冒給隣境文引及河泊所由帖往來扵南北二亰湖廣河南淮安等處停泊脱免糧差長子老孫不識鄕里暖衣飽食陶然無憂鄉都之里甲無處根尋外處之廵司不復詰問由是船居之丁口日蕃而南畆之農夫日以削矣其所謂軍囚牽引者蘓松竒技工巧者多所至之處屠沽販買莫不能之故其為事之人充軍扵中外衛所者輙誘鄉里貧民為之餘丁擺站扵各處河岸者又招鄕里之小户為之使唤作富户扵北亰者一家有數處之開張為民種田扵河間等處者一人有數丁之子姪且如懐安二衛蘓州充軍者不過數名今者填街塞巷開鋪買賣皆軍人之家屬矣儀真一驛蘇州擺站者不過數家今者連甍接棟造樓居住者皆囚人之户丁矣官府不問其來厯里胥莫䆒其所從由是軍囚之生計日成而南畆之農夫日以消矣其所謂屯營隠占者太倉鎮海金山寺衛青村南匯呉松江等所棊列扵蘓松之境皆為邊海城池官旗犯罪例不調伍因有所持特使豪強遂使避役姦氓轉相依附或入屯堡而為之佈種或入軍營而給其使令或竄名而冒頂軍伍或更姓而假作餘丁遺下糧差負累鄉里為有司者嘗欲挨究矣文書數數行移衛所堅然不答為里甲者常欲根尋矣足跡稍稍及門已遭官旗之毒手由是屯營之藏聚日多而南畆之農夫日以耗矣其所謂隣境蔽匿者近年有司多不得人教導無方禁令廢弛遂使蚩蚩之民流移轉徙居東鄉而藏于西鄉者有焉畏在彼縣而匿于此縣者有焉糧重者必就無糧之鄉畏差勤者必投無差之處舍瘠土而就膏腴者有之營新居而棄舊業者有之倐往倐來無有定志官府之勾攝者因越境而有所不行鄉村之譏察者毎容情而有所不問由是隣境之客户日衆而南畆之農夫日以寡矣其所謂僧道招誘者天下之寺觀莫盛扵蘓松故蘓松之僧道彌滿扵四海有名器者因保舉而為住持初出家者因逰方而稱挂搭名山巨刹在處有之故其鄉里游惰之民率皆相依而為之執役眉目清俊稱為行童年紀強壯者稱為善友假服緇黄偽持錫鉢或合伴而脩建齋醮或沿街而化縁財物南北二京及各處鎮市如此等輩莫非蘓松之人以一人住持而為之服役者常有數十人以一人出家而與之幇閒者常有三五軰由是僧道之徒侣日廣而南畆之農夫日以狭矣凡此七者特舉其大畧而天下郡縣此弊俱無縱使有之亦未必有如是之甚此等之人善作巧偽變亂版圖户口則揑他故而脱漏田糧則挟他名而詭報惰㳺已乆安肯復歸田里從事耕稼况其缺乏税額累累如配見在之户其中頗有智能者見其得計亦思舍畎畆棄耒耜而效其所爲惟愚騃無用之人方肯始終從事扵農業然坐受其弊亦豈無避免之心乎凡天下之事不可有一人之僥倖茍有一人僥倖而獲免則必有一人不幸而受其弊蘓松僥倖之民如此其多則不幸而受其弊者從可知矣是宜土著之農夫日減月除而無有底止矣忱嘗以太倉一城之戸口考之洪武年間見丁授田十六畆二十四年黄冊原該六十七里八千九百八十六户今宣德七年造冊止有一十里一千五百六十九戸覈實又止有見户七百三十八戸其餘又皆逃絶虛報之數户雖耗而原授之田俱在夫以七百三十八户而當洪武年間八千九百八十六户之税糧欲望其輸納足備而不逃去其可得乎竊恐數嵗之後見户皆去而漸至扵無徴矣是皆惰㳺不禁耕稼不勸故姦民得以避勞就逸棄本逐末如前之所云者誠宜立法以檢制之撫民之官固未易以招之也愚以駑鈍之才濫叨重寄晝夜勞心莫知所措伏望該部列位卿相與在朝公卿大臣詳加講究明白奏請將蘓松等府逃移人戸不拘通例别立一法以清理而檢制之庶幾户口可增田畆可闢税糧可完忱事出激切不覺覼縷之至惟冀詳察而恕其狂妄幸甚
