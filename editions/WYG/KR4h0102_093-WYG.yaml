body:
  text: 明文衡巻九十三明程敏政編墓表陳静誠先生墓表楊士竒士有效用於國深被簡知而不為爵禄所縻從容自得不枉其道必其智識明正審内外之辨察事幾之㣲確乎中而不奪此不謂之豪傑可乎我國家龍興之初有若金陵陳中行先生者殆其人歟先生諱遇中行其字天資純粹自少篤學博究經史元至正中授江東明道書院山長温州路教授逺近從者紛集講下元綱不振兵亂四作遂棄官歸隱閒居一室安澹守約名其室曰静誠鄉里遂以静誠號之先生憫世亂益甚每夙興焚香叩天願早生仁聖以活創殘我太祖髙皇帝定鼎金陵時南臺侍御史秦元之素知先生入言於上曰陳遇有輔翼才宜寘左右使效禆益即日召見與語大悦禮待加厚稱先生而不名日侍帷幄賛幾務車駕幸其第者三命之官輒辭臣民既推戴上登大寳所承諮問悉保國安民大計先生竭心攄誠多所獻替命為學士翰林者再皆固辭嘗奉宻命偕中官趙信徃視浙江還奏稱㫖賜白金又命為禮部侍郎又固辭間遘疾賜藥命中官挾太醫院官視療時微寒特賜錦被及上供米既瘥入謝上嘉奨連稱君子者三又除禮部尚書又固辭自是不復强之以職每召見錫勞必厚或坐久必賜宴間命廐馬送歸先生秉義懐忠非正道不陳羣臣以過被譴者率為解釋上亮其識未嘗為忤數諭之曰卿老不欲仕有子令帶刀侍衛叩首以子㓜辭蓋静澹恬退始終一志前後所得賜問宸翰頗多眷待之厚亞於勲戚蓋春秋七十有二而卒卒於洪武甲子九月十九日訃聞遣中官賜祭加東園秘器及賻命葬鍾山長林之原右春坊大學士董倫為誌其葬陳之先家于曹宋龍圖閣侍制義甫從髙宗南渡累官金紫光録大夫沒諡文忠始家建康至理宗朝武功大夫淮南諸路兵馬都統制執中先生曽祖也祖文徳元舉進士授溧陽州判考辛之淮南鹽課提舉妣湯氏娶金華王氏繼維揚周氏皆世族子男四長欽王出次敬次誠季㳟及三女皆周出欽誠俱蚤卒女皆有歸孫男六綱紀純綬紹綜女四㳟舉鄉貢進士累官今為通政司左通政有才名于時朝廷以㳟貴累贈先生中議大夫賛治尹大理寺右少卿周氏贈㳟人於是㳟奉事狀拜求表墓余聞先生志尚清逺興韻蕭散味道之餘游心繪事嘗寫髙皇帝御容妙絶當時然未嘗自名世亦無能得之者先生有弟中復洪武中嘗隨入侍永樂初授翰林待詔余數得晤語其為人端重清雅不茍言笑間出論議娓娓近道亦妙繪事為文皇帝所重時中復子孟顒以善書從余翰林簡靜修潔絶口不道繪事余間與中復語及之曰此兒頗有志操不屑意鄙事走也少年在先兄側戲弄筆墨先兄叱曰吾豈他無一長汝乃習其下者今雖老每思前言未嘗不内愧然無及矣嗟夫先生履素操潔識明義正革運之際躬荷知遇卒完其守以沒雖一藝所耽昔人不免春苑池之屈先生浩然之存不為時屈非一時之豪哉逮其後來如中復父子猶嗣承無忝又可以觀先生之刑於家也惜其遭際對越之間必有禆國及民之實既不自言其當時耆舊知先生者又物故巳盡遂泯無傳故特書其大槩俾㳟刻石墓道沈學士墓表嗚呼此吾友翰林學士沈公之墓沈世家松江華亭大考諱徳輝嘗為郡史平反寃獄百數十人鄉稱長者妣宋氏考諱易仕為諮議叅軍無幾棄官飬親而授徒里中惇行倫誼集五倫詩以教學者而甘貧樂義人號苦節先生妣顧氏有善徳二子長即公諱度字民則次粲字民望公天資温雅敦實自幼嗜學博涉經史洪武中郡邑交舉文學弗就坐累謫雲南䟦涉萬里處患難其中裕然時同謫者多名人率與公交達官重帥爭欲迎致公館下岷王具禮幣聘之既至屢進直言居無㡬辭去都督瞿能知賢下士延於家塾為弟子師旦墓躬請益焉其入京師也以公偕行時太宗皇帝初臨御命翰林舉賢才今禮部尚書江陵楊公為編修以公名上擢翰林典籍方時制勅填委既視草學士以下率分書之上獨覽公書稱善一時翰林善書如解大紳之真行草胡光大之行草滕用享之篆八分王汝玉梁用行之真楊文遇之行皆知名當世而胡解及公之書獨為上所愛凡玉冊金簡用之宗廟朝廷藏祕府施四方刻之貞石傳于後世一切大制作必命公書公之書婉麗飄逸雍容矩度兼篆八分八分尤髙古渾然漢意而日侍清宻無間賞賜二品金織衣新製象笏鏤公氏名塗金以賜以其弟與子皆善書皆官之近侍父子兄弟竝榮於朝古今以書遭承寵遇莫或加公書蓋公一藝耳為文章尚興致平澹雅則不為浮靡事上必盡誠被顧問必以正對由典籍陞檢討復陞修撰遂陞侍講學士奉直大夫仁宗皇帝賜誥命進協正庶引贈其考奉直大夫協正庶尹翰林侍講學士其妣宜人予誥歸焚黄賜鈔給驛傳宣宗皇帝臨御進翰林學士奉政大夫年踰七十再上章乞致仕歸不聴公事親孝與弟粲友愛相篤終身與人交久益敬為人貞靜不茍附初入翰林鄉人有為大宗伯者得君有氣勢赫赫朝士希進者日奔走其門公以故舊獨自守未嘗輕造間或邀公輒以禮辭士論髙之間暇閉户焚香鳴琴賦詩以自樂人號自樂先生襟宇澄澹風韻蕭散所好惟載籍法書名畫古器自題其齋居曰樂琴書處雜列花卉竒石髙人韻士至必具觴酌或吟或奕意度翛然所作詩文有滇南藁隨筆録西清餘暇自樂藁藏于家年七十有八一日微疾猶作和王行儉詹事小洞天詞明日捐館宣徳甲寅十月二十二日也訃聞上遣禮部郎中陳謨賜祭給驛舟歸喪命有司營葬元配顧贈宜人繼陳子二芹先十五年卒藻中書舍人陞大理右寺副孫男二潮秀敏好學先十年卒次源女三長歸俞珙餘在室曽孫男一士竒與公同入翰林相交三十有三年最相得其沒也蓋哭之慟於是粲及藻求余表墓余忍以衰朽而忘情老友哉敬為之表興化知府李公墓表李氏之先出唐宗室燉煌房五代時避地于越後之台之寜海家焉見黄文獻公集中霽峰先生墓誌霽峰先生當宋末元興之際以高文邃學重於時文獻蓋其考試浙省時門生云霽峰於興化為高祖曽祖諱栗祖諱炳考諱塾明書詩春秋洪武初分教華亭縣學因家焉後為鄜州同知卒於官歸葬華亭娶華亭沈氏興化其子也諱銅字至剛號敬齋以字行少穎敏不羣嘗從學楊亷夫為詩文有清思洪武戊辰舉明經奉命侍懿文太子初授祠部試郎中既實授坐累謫戍邊無幾召還為虞部郎中尋陞河南布政司右叅議㑹河決汴隄居民危懼公建議假王府積木作茷濟之人賴全活甚衆調湖廣布政司左叅議太宗文皇帝入正大統公來朝大臣有言其才且洪武舊人遂以為通政司右通政方修洪武實録公與焉旦暮在上左右道説洪武中事甚親宻是冬陞禮部尚書時禮部之務叢挫公長於剸繁條理井然益見寵遇實録成有白金文幣金織衣之賜永樂二年春冊立皇太子命公以尚書兼左春坊大學士東宫開經筵公與右春坊大學士解縉最先進講及修永樂大典四方文儒皆集仍以公董之無幾為侍郎宋禮所間見疏嵗餘降儀制郎中然遇劇務必以屬公解縉素厚公既遭讒出又以公言其怨望後召下獄而并下公仁廟嗣位念公舊功臣復以為通政數月又念其老不任朝叅改知興化府時朝廷方需仁澤於天下公仰承德意勞心撫綏郡民徳之甫再嵗歿于官宣徳丁未七月四日也享年七十娶孫克配君子子男二長瀛次源永樂甲辰進士疏通明敏自驗封主事陞員外郎方嚮用於時嘗得推恩追賜父誥命及贈母恭人女四長嫁盛衍次嫁太常少鄉鄭雍言次嫁王瑄次嫁考功主事宋琰雍言琰皆進士發身孫男八女三曽孫男一嗚呼公厯事四聖凡四十年入典邦禮輔儲君出佐藩翰守名郡顯榮光大矣雖間厯夷嶮然回眎同儕輩覆敗消亡何可勝計雖或存什一於千百而求如公之巋然享髙壽都重爵從容考終何其少哉况又有後嗣之卓然奮起而繼承之謂非所存之良所施之厚有以致之乎余與公同朝乆源既請少保楊公銘公之墓又請余表於是乎言禮部儀制郎中史君墓表宣徳二年春交阯之復叛也守帥奏請益兵朝廷命安遠侯栁升等將七萬人往益之命兵部尚書李慶叅贊軍事且勅慶凡六卿之屬才且賢者舉以自助慶所舉十數人其最才且賢禮部儀制郎中史安祠祭主事陳鏞師行慶與同卧起九月入交阯賊於官軍所經之處悉列柵以守升既連破之直抵鎮夷關升有矜色升雖勇然不好謀安鏞言於慶曰總戎之意驕矣公宜力言之且夷賊譎詐不可以其屢敗忽之安知其不示弱以誘我况乎璽書數數戒飭謂賊專以設伏取勝不宜輕率待之公宜速入言之時慶巳病强起與升力言升唯唯而巳中實無戒慎意明日前進以數百騎獨先其副及慶等皆在後升前度橋遽壞後軍阻不得前賊伏兵四起升被創死明日慶病不起又明日副將崔聚整兵以進聚固宿將然倉猝賊驅象赴鬭衆亂聚被執冦大呼官軍降即不殺安鏞皆曰吾輩見危授命耳皆死之十月十八日也先是賊陷昌江等城城中如都指揮李任指揮顧福知府劉子輔知州何志等皆守節死交阯守帥知任等死事以聞皆得褒贈從升等死者守帥隔逺不明知不及聞時與安鏞同行親見其事後得脱歸者雖言之詳而有司以無官府上狀不可質故安等之節不得暴白於朝此世之所共深惜而痛悼者也一時同死者如吏部主事李宗昉等蓋多而安鏞之事有聞者在慶左右也兩人皆進士發身最相得安字志静元宰相鎮陽王天澤之後今家江西豐城為人謹重㢘正雖職務填委好學不倦而疏達勤敏六卿争欲為其屬尤見知於仁廟屢垂嘉奬死時年四十二鏞字叔振錢塘人重厚清介所履端確未嘗一比匪人而勤於學問三十年來余所識錢塘士人仕京師其所言所行表裏一由於正者其惟叔振然知之者寡矣死年三十四志静之子取其父衣冠葬之請余為表余數聞其死時事為表之曰禮部郎中史君以忠死葬於此其曽祖憲中元河南行省都事其祖文質洪武初冨州吏目其父伯允贈禮部郎中其母甘氏封太宜人配熊氏封宜人其子男四人而附見主事陳君百史君之同寮友生同志而死同節者也陳雅言先生墓表鄒緝永豐陳雅言先生通今博古之儒也其徳行道義足以為師乎後進其著書立言足以垂示乎乆遠啓迪乎將來蓋所謂篤學力行有徳有言之君子也年六十有八以洪武十八年乙丑十一月二十七日卒卒後三十年其孫中書舍人彞訓始以先生行狀既請翰林學士胡公光大為追銘其墓而翰林侍講鄒緝復為之表曰先生自幼讀書聰敏善記為其祖山長君所愛長受詩於翠微傅志行受書於東江徐復與其兄至言善言兄弟五人并習舉子業然累試有司不得意即舍去曰此蓋有命也遂大肆力於古學閉戸不出窮研六經史傳百家之書乆之脱然有所得其文辭由是大進若雲蒸霧滃不可禦遏鄉先達皆器重之值元季盜起先生避亂潛遁山谷中作閔巳寒松二賦潛夫擬以見志大明肇興削平諸㓂盜永豐縣治新復首起先生典教縣學先生乃請建學舍收召子弟俾就學且經理租賦以為其養由是人才復興郡守鐵公某莫公巳知相繼至皆以學行薦先生時年五十餘慨然欲就徴以母病不果行先生事母孝侍湯藥不違寒暑母年九十四而終哀毁幾喪明服闋乃愈嘗草便宜十五事欲詣京師上之又以疾作而止自是遂不起矣先生長身玉立鬚髯過腹而襟度洒然不為崖岸慷慨尚義急人之困如恐不及嘗有負學田租三年不償者官徴之急將售其女以償涕泣不忍舍先生聞為代輸而還其女有從内弟之子貧不能自資先生收而教之卒以有成立既又葬里之不能葬者凡九喪平居以禮讓教人多見化服其為學篤實純正有以得夫聖賢之要領故其著述多所發明教門人登第者甚衆後進士名取則焉所著有四書一覽大學管窺中庸類編書經卓躍今行于世嘗擬崔駧遺㫖二千餘言及天對六篇記序碑銘賛誄賦頌凡若干巻藏于家先生之考元興元路學正諱立本祖陽豐書院山長諱可權曽祖宋信州司戸參軍諱應沐自叅軍以上二世皆舉進士有官閥先生之配曰鄧氏慈孝恭儉甚有婦徳先生卒之明年正月十日亦以疾終遂以其月十九日與先生合葬于縣之龍雲鄉長源坑之原子二人威子儀女四人長適曾濟次適曾仲禮郫縣學訓導次適曽用藏今為蜀王府教授即狀先生之行者次適張宗璉孫男五人彞訓今為中書舍人次資訓大訓其訓是訓曽孫男幾人惟先生之學充碩宏冨深於道徳性命之要微言奥㫖探索精至為文章豐衍有法其為人明粹剛直言必有則而卓然有用世之志惜其不得以大見於時而其善之所及僅止于一鄉然其有以施於人傳諸天下後世而不遂泯沒則其所得固巳多矣乃列世次行實刻之墓隧以昭示于將來之君子長史金君用誠墓表楊榮衛府左長史三衢金君以正統己未夏五月二十日卒于官子紞懼其才行聲實之懿乆或湮泯無以昭示後人謁予文表諸墓辭不獲為之叙曰君諱實字用誠浙之三衢開化人曽祖振之祖伯圖父徳厚三世俱不仕母蘇氏君自幼穎悟書過目成誦始從叔祖戸科給事中玉衒學即知屏去浮靡專意經傳暨㳺邑庠甚為典教者稱賞且以逺大期之嵗壬午太宗皇帝入正大統詣闕獻書以君徳民政為之綱躬行仁義虚巳納諌明察善斷審於用人恭儉節用為君徳之目厚風化尚亷恥省刑罰薄賦税愛民力為民政之目太宗嘉納其言復親䇿之對稱上㫖命入翰林與修太祖皇帝實録書成賜以金幣永樂紀元擢翰林典籍修永樂大典未幾特選為東宫講官時仁宗皇帝在儲位恩眷累加丁亥以外艱去服除陞左春坊左司直郎日侍經筵講説詳明致有良佐之褒辛夘丁母憂哀毁成疾甫十年始起任職仁宗登極妙簡宫僚之賢者輔導諸王乃授衛府左長史階奉議大夫誥贈其考如厥官妣為宜人是嵗復召入西掖纂述先正格言以備顧問宣徳丙午歸謁先塋恩賜優厚拜奠既畢日召鄉黨宗戚相與燕樂以榮上賜既還益以輔導為己任上深敬禮之今上皇帝嗣大寳郊祀謁陵悉以命王左右之力居多戊午冬王薨哀感成疾己未春為禮部㑹試同考官事竣上疏乞骸骨命下而卒享年六十有九君天性至孝少遊學宫以不得奉旦夕歡朔望歸謁必奉觴上壽以悦親心父沒奉母宜人娱養備至友愛季弟老而弗衰處鄉黨以誠信善則揚之過則從容規之子弟好學者激勵而誘進之至於周貧恤難不吝所有故人林文節卒于京親為殯斂歸其遺骸太學生江表死無所託君既為治喪事閲其篋得白金數十兩封識以歸其家其以義從事類如此居家敦行節儉而甚孝友賔客過從輙命酒為歡談論竟日亹亹忘倦閲經史日有程限或有事妨夜必補之不以寒暑少廢故經史子書以及隂陽星厯醫卜老釋諸書悉能探其賾而究其微嘗曰人不能無非覺而改之斯善矣蘧伯玉行年五十而知四十九年之非孔子嘗以君子稱之因以覺非名齋賦詩以自警有静存動察兢兢自持之語為文章舂容暢達理與氣俱詩則和平沖淡無雕琢之病有文集若干巻藏于家配汪氏封宜人子男三人長曰纕次即紞己酉鄉貢士季曰紘女二人曰綺適方濳曰纓奴庶出也孫男十二人徒義養蒙俊童近思克己𢎞訓象賢鵬搏熈載允濟汝霖某孫女二人其葬以某年某月某日其墓在某鄉某山之原嗚呼君之學行自足以昭當時傳後世豈待表而見哉然孝子之心目有所不能巳者也故為之述其槩俾勒石于墓上故國子司業吳君墓表君子寓形天地間徳足以師表于士類學有以兼通乎古今脩諸巳者有餘而見於用者或有未盡故其既沒而哀傷追慕猶不能巳於人者若予亡友國子司業吳君是也君諱溥字徳潤别號古崖先世家臨川之種湖曽大父景南號南牕博學工文草廬吴文正公嘗序其南牕吟藁大父某號楚江隠徳弗耀父思清贅崇仁章氏後遂為崇仁人君生元至正癸卯四月四日少遊於鄉先生前渭南令鄧伯恭門伯恭見而奇之謂思清曰是子器宇不凡異日必能大公之門弱冠舉孝亷不就洪武丙寅邑大夫知其才賢乃舉邑庠弟子員從前進士李原成治春秋文藻甚為原成稱賞家雖貧窘而志學不厭祁寒盛暑亦不少廢同輩有忌之而肆譏侮者恒不與校而所志益堅嵗庚午領江西鄉薦以疾弗果㑹試尋丁外艱哀毁骨立幾至不起服闋假館學舍敎授以自給衆亦易視之獨永豐羅博士師程時分敎邑庠折節與交乙亥上京師以試期不及遂入為太學生嘗奉詔宣諭武臣使雲南卻其元戎文綺之贈又以閲士伍使福建一無毫髮之私人皆稱其廉介其所至遇古跡名勝輒賦詠紀之累至數百篇比還太學時太常丞張顯宗攝祭酒事嚴毅方正於諸生中罕與可獨以君為賢而為延譽於公卿大夫間嵗庚辰試禮部第一廷對賜進士出身擢翰林編脩永樂初與脩太祖髙皇帝實録書成大沭恩賚陞脩撰既又纂脩永樂大典充副總裁戊子用祭酒胡公若思薦陞國子司業居官以禮自持以師道自任以勤率諸生每五鼓升堂講授終日危坐無怠容諸生皆敬畏而心服焉仁宗皇帝在東宫監國南京眷遇殊厚洪熈紀元首膺勅命進階承徳郎贈及考妣宣徳丙午通政使陳璉奉命掌國子監事九月三日設宴公堂君從容言笑如平時酒闌忽得風疾舁歸私第以是夕卒享年六十有四臨終無一語及身後事但屬治䘮不用浮屠所著述有古崖稿若干巻配鄭氏封安人子男四人與弼與疇與年與性女二人長適應天府學敎授孫曰讓次適豐城徐士英孫男三女七諸子奉匶歸𦵏崇仁邑治北二十里之左橋既葬十有三年與性以明經領薦至京泣而告曰先君子務學篤行以古人自期而官止司業弗究所施年未及古稀不肖無似又不克致位通顯以光振先徳惟先生於先君子同年登第又同日擢官翰林知之悉者莫先生若也表諸墓道傳示永乆亦莫若先生宜也不肖敢以請君之孝友篤行出自天性清脩苦節至老弗替其為詩文詞暢理明足追古作者第以不媚當道官太學幾二十年而不獲叙遷卒之日身無以為殮家無以為喪子孫無以為衣食資而縉紳之流持乎公論者莫不為之悼歎也然君之志雖不獲大伸於當時而能使天下之人信君之徳操者無間於貴賤傳誦君之文章者無間於遐邇視彼之得志一時而泯沒於身後者豈不相去逺矣哉况君之子若孫有志問學期乎顯榮昌大以慰君於地下者又有可兾歟姑立表以俟云明文衡巻九十三
