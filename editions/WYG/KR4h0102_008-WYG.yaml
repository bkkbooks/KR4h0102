body:
  text: 明文衡巻七欽定四庫全書明文衡巻八明程敏政編奏議登極建言劉定之翰林院侍講臣劉定之謹題為建言事臣觀自古以來邉方之禍未有甚於今日也古者如晉懐愍之陷於匈奴宋徽欽之留於女真其時皆因邉塞外破藩鎮内潰救援不集播遷無所然後有䝉塵之禍未有若今日天下之大數十萬之衆奉上皇至於漠外委以與衛喇特者也至於晉宋既遭此禍之後元帝繼統髙宗嗣服皆舍棄故都偏安一隅然尚能奮既衰之勢以禦方張之敵使劉曜石勒斂其虐燄而不侵梓宮韋后因其講和而來歸未有若今日額森乗勝入冦直抵京城奉上皇以來而天下之大數十萬之衆既不能奮武以破敵又不能約和以迎駕聽其自來又聽其自去者也盖國勢之弱久矣雖非陛下所能遽使之強然豈可不思其自強之術而力行之乎臣愚無知曉敢條陳所見以俟採擇其一曰戰陳臣觀昨者之戰但知閉營堅壁假託持重之説而不能出竒盡力以收勝捷之功甚至前隊敗而後隊不救左哨出而右哨不隨宜倣宋吳玠吳璘兄弟三疊陣之法前一行刀楯蹲伏以俟其陣最低第二行矛㦸大鎗立地以俟其陣稍髙後一行騎兵弓矢其陣最髙敵至得互相倚恃迭為救䕶庶㡬不至狼狽又敵騎之來奔騰蕩突必資刀斧以制之昔郭子儀破安禄山鐵騎用八千人執長刀如牆而進韓世忠破金人拐子馬用五百人執長斧上砍人胸下捎馬足由此言之刀斧之揮霍便捷優於火鎗之遲緩趦趄也其二曰守禦昨者紫荆居庸等闗既不能禦敵之入乂不能遏敵之出名為闗塞實則坦途敵騎之來若長風之驅雲霧豁然無所底礙盖兵士寡弱亭障缺敗蹊隧疎漏非朝夕之積也今宜增兵士繕亭障塞蹊隧如古者畫境分守之時因其陸地則縱横掘塹名為地網因其水泉則遇處停蓄號曰水櫃或多植榆栁以制奔突或多招土兵以助官軍此皆古所甞為必有效驗今武夫悍將多云古不可泥然商之賢相不云乎事不師古以克永世匪説攸聞此臣老生腐儒之所信其言者也其三曰通使夫通使之職欲其内藴忠信之心外有言語之才昔漢文帝遣陸賈使南越用能屈趙陀之膝以去僭號宋仁宗遣富弼使契丹用能結中外之盟以息戰争若賈弼者所謂藴忠信而能言語者也奈何往時專以譯人駔夫為之哉今後宜用文武賢臣備正使之選令通敏者為之介紹録其動静言語纎悉必載回日聞奏庶乎不至招釁起戎矣其四曰招降往年以來䧏人皆留居京師授以官職給以全俸夫非我族類其心必異故昨者或衝破闗塞奔歸故土或乗伺機便冦掠畿甸今宜乘大兵聚集之際遷徙其衆逺居南土禁其種落不許自相婚媾變其衣服不許仍遵故俗或以為兵使與吾中國之兵部伍相雜以牽制之或以為民使與吾中國之民里甲相錯以染化之况又省全俸之給減漕輓之勞臣嘗於上皇時言之智謀淺短不足仰動天聽然今者之禍可鑑矣其五曰練兵夫天下之民農夫出粟紅女出布而輸納公上者多以養兵也天下之兵受粟於倉受布於庫而練習武藝者所以為國也向者兵士受粟布於公門而納月錢於私室於是乎手不習攻伐擊刺之法足不習坐作進退之宜目不識旗幟之色耳不聞金鼓之節但見其或負販貨財以為商或習學技藝以為工而工商之所得僅足以補月錢之費盖民之膏血兵之氣力皆變而為金銀以惠奸宄一旦率以臨敵如驅牛羊以當虎狼㡬何其不敗哉今宜痛革月錢之弊作新操練之政将帥有踵舊弊而不改者誅之可也怠新政而不務者降之可也士卒練習既久㧞其勇鋭者汰其罷軟者糧賞有厚薄費用可節縮矣其六曰撫民夫養兵之費既出於民而兵敗之禍民䝉其害始也出費而終也䝉害民其何辜乎况守令之刻削於民猶将帥之刻削於兵也今宜於常年考覈之所黜落三年朝覲之所彈糾者悉加嚴罰而不寛縱至若大臣舉官有犯贓私者必連及舉主夫恩不加於貪吏則貪者寡矣罰不貸於舉主則舉者慎矣民豈不䝉其惠乎民安而邦本固雖敵人外侵而邦本内固此保國永世之良圖也豈可以目前不暇而謂此為迂緩乎其七曰選将夫将材罕得天之生将材豈專在於将門乎販繒屠狗之夫而漢賴以王被褐捫蝨之人而秦賴以霸至於趙括者豈非趙奢之子然殞首於白起王離者豈非王翦之孫然繫頸於項羽今國家用将有出於将門之中者若石亨楊洪是也有出於将門之外者若于謙楊善是也然将能知将宜令其各舉所知不拘門地或以勇力或以計䇿其餘公卿待從亦令各舉所知量能而任之庶乎㧞十得五聞一知二将材由此而充矣其八曰賞罰夫有兵将而無賞罰猶無兵将也将非賞罰無以将其兵君非賞罰無以将其将昨者遣石亨于謙等将兵禦敵未聞其摧陷報㨗迎回鑾輅但迭為勝負互相殺傷而已雖不足罰亦不足賞也今亨自伯爵陞為侯爵謙由二品陞為一品天下之人未聞其功而但見其賞豈不怠忠臣義士之心乎昔漢之圖恢復也所恃者諸葛亮宋之圖恢復也所恃者張浚其人皆忠義素著功業久立及至街亭之戰不勝而亮降丞相之號符離之役未捷而浚解都督之職待收後效乃復前官今宜使亨等但居舊職勿受新陞以崇亷恥之節以作敵愾之氣他日勛名振而爵賞加亦何晚乎夫既與而不忍奪者姑息之政也既進而不肯退者患失之心也上不行姑息之政下不懐患失之心則治平可計日而望矣至於昨有臨陣而死者有棄闗而生者亦宜急加賞罰庶㡬恩及卑賤而人知所勸法行貴近而人知所戒矣其九曰議政向者御史建議欲令大臣入内議政事寢不行夫人主當總攬權綱親決㡬務如大裘之領不可以倒挈太阿之柄不可以倒持凡政事有早朝未及決者宜日御便殿使近臣侍於側大臣奏於前言官察其邪正而加糾彈史官書其言動以示懲勸君臣之間詢謀疇咨互相可否以求至當此前代故事祖宗成法也陛下遵而行之則決於萬㡬也益以熟而察於百官也益以明聖政益新天命益隆矣若乃仍如前日每事但以奏本進入㫖意批出臣恐偏聽生奸獨任成亂治化無由以底於雍熈也凡此皆其見於政治者而尤必以徳學為本臣請得終言之其十曰徳學夫人主之徳欲其知如日月之明則可以察枉直仁如天地之大則可以覆羣生勇如雷霆之斷則可以收威柄故中庸曰知仁勇三者天下之逹徳也而宋賢相司馬光之告其君仁宗英宗神宗皆以仁明武為言光之所謂仁明武即中庸之所謂知仁勇也然是豈可以易而能哉必本於學矣成湯之聖學於伊尹武王之聖訪於箕子曽謂聖帝明王全由天資不假學力哉然五經諸史之博儒生且未易徧觀而况於人主臣謂經莫要於尚書春秋史莫正於通鑑綱目陛下宜留心焉不宜觀其善而避其惡也夫善惡兼而觀之則於為君也既知禹湯文武之所以興又知桀紂幽厲之所以替而趨避審矣於馭内臣也既知有呂強張承業之忠又知有仇士良陳宏志之惡於馭外臣也既知有蕭曹房杜之良又知有李林甫楊國忠之奸而用舍當矣其為知仁勇之助豈不大哉茍徒若前日使儒臣誦其善而避其惡是猶恐道路之有陷阱閉目而不視恐魚肉之有餒腐擁鼻而不嗅其不至於誤食而嘔噦𡨕行而顛躓者少矣伏惟陛下以不世出之聖當大有為之時誠能本於徳學以見於政治則天下之大尚如金甌之完固而未缺臣見國勢可強讐恥可雪兄弟之恩可全祖宗之治可復而何難哉臣干冒天威不勝戰懼伏惟擇其言而赦其罪幸甚敵情題本司經局洗馬兼翰林院侍講臣劉定之謹題為敵情事今者敵使還期漸近朝廷定議不遣使臣回答意欲致其來侵而撲滅之臣以為待敵國之道但當為應兵不當為禍始若廟堂之輔筭無遺䇿疆埸之將戰有必勝以暫勞而圖永安固臣子所深願豈但淵衷哉倘成敗猶未可預料則臣尚願陛下廣天地之量止雷霆之威含容収納暫遣使臣其或此以和往彼以惡來則足以增我師之直氣免吾民之怨懟若由此暫羈縻之則嵗年之後國家閒暇選練将卒愈精修築城堡愈完賞罰愈明資械愈充腹裏諸處無饑饉之患口外各屯有奮發之勇然後觀釁徐動亦未為晚也今者掌武之臣謙譲退託懼當兵任各部之臣合辭陳請乞回睿聽衛所之兵但有虚數畿甸之民望風遁逃則成敗猶末可預料也明矣陛下何汲汲於違衆論信寡謀以萬姓之命僥一時之勝哉臣愚儒不達時務請以古者和敵事勢可否較之若謂和敵之後糜費不貲損我之富則漢文帝在位二十餘年用繒絮等物和匃奴宋仁宗在位四十餘年用金帛等物和契丹為時甚久為數甚多不惜其費未聞當時謂為不富也今宜比此例豈與汴宋之末敵兵來加而要割藩鎮刼質親王必不可和者比哉若謂和敵之後讐恥未復損我之武則漢髙帝先被圍於平城而後解唐髙祖先屈已於突厥而後伸不報其讐未聞當時謂為不武也今宜比此例豈與南宋之初遣使詔諭而羈留父兄黜削尊號必不可和者比哉若謂和敵之後簒弑不討損我之義則冒頓弑其父而婁敬勸漢髙祖通和盖蘇文弑其君而房喬勸唐太宗罷兵不討其罪未聞當時謂為不義也今宜比此例豈與春秋之法中國亂臣賊子在所當討必不可赦者比哉然臣謂不惜其費不報其讐不討其罪者非因循偷安止於是而已也誠願陛下雖未用兵如已用兵常加警勵雖暫遣使如未遣使常加防備攬羣䇿而用以選練將卒修築城堡明賞罰備資械使内無患外有勇然後彼有釁之時此足以乗之也盖不患於彼之無釁而患於此之無䇿以乗之然尤在陛下進聖徳於乾健離明而不自足勉聖學於日新月盛而不中止以為用羣䇿之衡鑑服逺人之根本臣計愚言謬望勅大小羣臣公同博議若但委兵部則臣之言必不見從如水投石而生民之命如以肉試虎少有全理矣盖和戰皆所以待敵而兵部必不以和為請如巫醫皆所以治病而巫陽必不以藥為説各䕶其所短而欲見其所長保身愛國者不可偏聽而當慎擇也干冒天威伏俟罪譴謹題請㫖議劉静修薛文清從祀謹按元儒容城劉因徳性剛正學識明悟所作詩文理趣出人意表非腐儒曲學循行數墨者所彷彿而進退之際安於義命若其稱許管㓜安詠嘆陶元亮則傲睨濁世涕唾禄爵之本心可見也是以裕宗不能留世祖不能致因豈不可謂之賢也哉然而建言者遽欲以因列諸孔廟從祀則事體甚重不可以不詳議建言者謂顔子未嘗著書而配享孔子不可以因未著書而不之取夫顔子何可當也孔子之道傳之顔子後世取信於孔子之言其言具於論語載於中庸見於孟子存於易繫辭等書不一而足雖顔子未嘗著書不害其為傳道也譬如蕭何無戰功而髙祖取為漢臣之首房喬無戰功而太宗取為唐臣之首所謂知臣莫若君知弟子莫若師者此之謂也今以因未著書而仰攀顔子為比則是人臣無汗馬之功者皆得攀蕭房為比惡有是理也哉建言者又謂從祀諸賢其中有不能無過者因無過奈何反不得從祀夫及門速肖之徒固有狂狷失中者矣又有聚斂而聖人斥其非吾徒短䘮而聖人言其不仁者矣然而莫不親炙温良恭儉譲之徳親受文行忠信之教髙者名列四科餘者亦皆身通六藝是以孔子家語太史公仲尼弟子列傳備書之以為三千之徒此七十子者其最也然則七十子之有過者亦先儒所謂聖人數其事而責之其所善猶多爾至於左丘明以下經師二十二人有未能深明聖經之㫖者矣又有無威儀若劉向好諛佞若王肅者矣然而當世衰道微火於秦黄老於漢佛於魏晉之時而此二十二人守其遺經轉相付授講説注釋各竭其才以待後之學者則其為功殆猶周文武成康之子孫雖衰替㣲弱無所振作而尚能保守姬姓之宗祀譜牒以閲厯春秋戰國不亡而幸存者也雖有大過亦将宥之况小失乎今以因無過與七十子二十二經師有過者較量彼此欲得登因於從祀愚竊以為仲尼素王也七十子助其創業者二十二經師助其垂統者也遇其有過議而貸之猶得陪從也非是之比而徒曰我無過可以陪從未之前聞也建言者又謂與因同時若許衡吳澄其徳學無以踰因而亦得從祀因豈得獨遺夫因之於衡澄其徳學無大弗若也其功則有弗若也何也衡以其行道之功澄以其明道之功當元氏奮自朔漠統據華夏其君臣懵焉不知堯舜禹湯文武周公之道傳之孔子孔子傳之其徒以至於宋之周程張朱者其道足以撫世御極而衡首倡率誨誘之使知是道之可行至於澄所作諸經纂言發揮洞達自朱子以後依經立説者鮮克儷之是以我朝太宗文皇帝命儒臣修輯五經四書性理大全於澄之説多所採入澄可謂能明是道者矣而因之説未有採者則是因既未若衡之道行於當時又未若澄之道明於後世其不從祀未必為闕典也若乃薛内翰瑄直躬慕古談道淑徒進無附麗退不慕戀勤學好問可謂文矣歸潔其身可謂清矣是以存䝉聖知沒錫羙諡其為皇朝名臣夫何間然然論其於道所得以與朱子諸徒相比並若黄直卿輔廣之親承㣲言金履祥許謙之推衍緒説尚未知可伯仲其間否也而遽欲從祀竊恐世之君子将以建言者為非愚則諛孰敢和附其説哉故愚以為瑄可無施行因則准昨者所議楊龜山例令其所在官司建祠奉祀庶足以伸敬先賢勸勵來學謹議陳言修徳弭災章綸臣聞之天人相與之際甚可畏也人事為於下則天道應於上天戒示於上則人事謹於下此感彼應捷於影響不可誣也以故上天垂戒而災異屢見者此必人事之失不知自省有以致之而譴告警懼仁愛人君如此之至也然人事之失必有其故或用非其人或政有缺失虐及於民民不安生而疾苦嗟怨之聲上聞於天以故天知之而屢出災異以垂戒於下當時上下或不知其由而天下之人知之故自古帝王以及漢唐宋賢君之於天戒必下求言使凡臣民各陳所見極言時政缺失而不忌諱以見致災之由而朝廷聞之亟改其失庶㡬可回天心而弭災變若徒祈禱宥罪及蓄糧儲修堤岸者此特有司之常事耳至於用人是否政事得失因循姑息而不修改則天心回否未可知也或又謂已嘗詔許諸人直言無隐不必下詔求言此則為臣者失於稽古而不以古之聖帝明君期望故也伏乞皇上法古帝王及祖宗列聖斷自宸衷下詔求言務使臣民人等直言極諌各指時政缺失以見致災之由取其切當而隨事修改又乞皇上於是而示徹樂減膳之勅大臣於是而推捐俸救民之仁停工役不急之務節侈用濫賜之財慎差遣之擾民罷補官之俸給備救荒之義倉汰僧徒之蠶食憫逓運人夫之苦薄收斂糧儲之重寛農民之運糧恤軍士之勞役止納粟以抑僥倖勸屯種以蓄邉儲嚴考察以明黜陟信賞罰以示勸懲清天下刑獄之寃滯罪軍民越訴之誣陷修學政以養人才之本原採善言而戒大臣之自用重公輔之名爵杜署職之奔競凡此之類悉勅諸司修改而舉行之乃所以修政事而安生民回天心而弭災異天下生民何其幸也明文衡巻八欽定四庫全書明文衡卷九
