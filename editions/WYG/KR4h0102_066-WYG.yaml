body:
  text: 明文衡巻六十六眀程敏政編碑明黔寧昭靖王祠堂碑王景徳足以昭三辰勲足以靖四垂故能翕張皇猷揮霍幅員乘大化以控搏與天地而俱存生為人豪殁為明神理之常也是以先王叙功以作元祀也非惟褒徳顯忠葢亦示神而眀之之誼焉若馬援之於漢張仁愿之於唐薩達克齊之於元其人雖死其功烈在人千載一日語云大功必百世祀兹其近之有若黔寧昭靖王之茂實比之數公實有過焉尸而祝之斯古道也夫聖人出而大命集必生應昴降嶽之佐以開其休時維我王幼隆天造受恩帝室年十有八出鎮鎮江綽有聲績内託肺腑外秉節旄以麾諸夏南平閩越擒陳友定以材畧見知于上同知大都督府事㡬十年所奏無一不當帝心者西畧崑崙涉流沙轉戰千里皆生擒其渠帥平二十餘萬落封西平侯功在盟府率兵南征深入不毛掀牂牁踣夜郎徑安定蹂烏蠻大戰曲靖擒元司徒達爾瑪梁王巴咱爾斡爾宻走死不浹十辰遂開雲南車里八伯平緬皆虎視以雄莫不嗢咿傖儜稽顙效臣順明年諸部覘王師之東也背予復叛兵二十萬􅑣屯蟻附城㡬不支王聞勒步騎至自芒賊愕遂潰自相輮迮伏屍填道雲南底平悉致其渠帥於京師勲莫大焉在鎮十年以仁智為理闡庠序以示之禮迪官常以示之制均政役以厚其聚以還定安集為己任其桀驁秕我王度則差馬拱稽草薙而禽獮之牿阿資􅑒者盡殪矣情鏖定邊凡斬首數萬捕虜過當王垂涕而遣之諸郡懐仁服義始豫附以和收其馬牛金銀丹漆秔稻以充軍實雖遐逷曶闇皆睹天日之明道徳之華自王迪之也山川草木桐生懋豫與嘉賴之徳莫懋焉及薨軍民罷市巷哭至有剺面者朝廷嘉之追封王爵恩至渥也民皆念王不置合辭請于朝建祠報可俾王之子今西平侯纂其任従民望也按祭法古之通祀者五曰法施于民曰以勞定國王兼而有之載祀百世此其肇歟祠作于薨之後二年九月某甲子成于某月某甲子凡為楹若干行馬列㦸不侈不踰遵憲章也既成享咸請紀于石以垂無極不獲辭因作迎享送神之詩俾歌以樂焉大眀麗天萬國眀赤符飛騰策六丁惟王翊運天降精身薄日月騎斗衡坐張天弧檻攙搶助帝肆伐基隆平氣壓崑崙蕩滄溟出入星緯無留行徑涉滇海縻長鯨長鯨既剸波浪腥龍蛇走陸殺氣横嘘陽吹陰孰敢嬰文經武緯光晶熒手揭元㑹歸虞廷上騎箕尾為列星帝錫侈封王黔寧河山帶礪分漢盟堂堂遺像夾兩楹神光夜夜飛爽靈肸蠁布瀉通杳㝠棽麗颯沓従兩旌倐焉如雲摶紫清八衝鏘然韻流鈴春秋報事垂千齡勅建神木山神祠之碑胡廣皇帝統御天下愛養黎元恩恵優渥首飭羣有司毋擅用一夫取一材於是生養休息日庶日富比年嵗登民和海宇熙洽及永樂四年秋詢謀於羣臣曰古者建都必營宫殿朕肇建北京恢𢎞舊觀以永詒謀顧興作事重惟恐煩民然不可後僉曰陛下慎䘏民力視之如傷而民皆樂於趨事皇帝曰爾往試哉乃命入山以伐材焉用民力十取其一給以廪食歸其傭直而民欣然鼔舞不知其勞故事不程督而集工部尚書臣禮取材于蜀得大木於馬湖府圍以尋丈計者若干踰尋丈者數株計庸萬夫力乃可以運将謀刋除道路以出之一夕忽自行達於坦途有巨石巉然當其衝夜聞吼聲如雷石劃自開木由中出無所齟齬度越巖險膚寸不損所經處一草不偃百工執事顧視讙譁踴躒交慶事聞廷臣稽首稱賀謂聖徳所致皇帝辭以弗逮推功于山川之神乃遣官以牲醴祭之将至之先大雨洗塵山川草木預有喜色鮮澤榮華蔚然穠麗及祭之日先降微雨灑滌㳺坋爼豆既陳羶香肹蠁𤣥雲倐消天宇澄湛明星煌煌月影交輝祥飈徐來神用居歆聞山呼聲者三震動天地神顯其靈於昭有赫遂封是山為神木山詔有司建祠嵗時祀享以荅神貺命臣廣為文以紀其事刻之於石臣廣頓首受命仰惟皇帝功徳髙厚比隆天地妙運一心斡旋萬化陰陽鬼神隨機應動脗合無違故凡有施為嘉祥沓至是以山川之神協賛貞符宣暢眀靈濯濯洋洋休有烈光超達物表有不可以智巧測量之者然以理求之其可知己夫充塞兩間者鬼神之功用若川泳雲㳺日烜雨潤風霆鼔動寒暑更迭歘陰忽陽變化揮霍其迹尤著然三辰順軌雨𤾉以時景星慶雲和氣充溢斯皆一心之所感召若夫木石非由人力不可以運動而乃潜闢黙輸實由聖徳感孚神明協應之所致也固非耳目見聞之可知己夫人之所不知不能者鬼神之所能也以人之所不知不能而測夫鬼神之能宜其有弗知也況凡天下名山大川奠於方域之中出雲雨産財用以資於國家其神固靈也而神木之山所産良材自萌蘖而長以至於拱把連抱神之衞閟呵禁以待於今日然則神之効其靈者非一朝夕也兹今之顯應所以兆皇帝萬世悠久之徴則神之功其可以少哉稽之於傳凡有功於國家者必有祭神功彰著實為偉茂載之祀典於法允宜臣廣再拜謹書其事為記并系之銘以頌歌聖徳且以敷揚神休銘曰皇帝受命統御萬方六合泰寧物乂民康端拱垂衣無為而治蠻裔荒服蟻附而至休徴之應如川如林至和感孚百靈具歆壮哉北京龍飛之所帝用詒謀大啟厥宇慎䘏黔首咨詢在廷庶民子來于始經營皇帝有詔取材于蜀神木之山岷峨是屬楩楠豫章絜之百圍神用呵閟以需于兹斧斤斯入林披薄歛凡厥所産悉呈弗掩良材丸丸孔曼且碩載而輸之萬夫之輅層巒峭壁矗矗崇崇深谷谽呀飛流怒淙有巖厥途其石截嶫徐步曳武猶慮僨跲方謨夷險憑虚架梁人力未施木忽宵行越澗逾壑砰磕如雷巨石􅀈礹隨擘以開維山有神維神昭靈黙驅六丁佑相皇眀神衷顯宣嘉徴斯應以兆皇基萬世永盛報神有典祀事孔宜爰作新廟嵗以享之醴清牲腯籩豆淨潔肴羞維旅羶薌有苾春蘿蔚陰秋菊垂芳裸薦以時禮儀有章執事駿奔秉䖍以對濟濟鏘鏘罔敢或懈神之來享驅霆駕風翳以鳯凰驂以虬龍靈旂揚揚神既降只鼔鐘鏗鍧神醉以喜神永宅兹時雨時𤾉眷此邦氓易沴作祥皇徳同天幽明畢被剏制靈祠以毖神祀礪石刻銘兹山實侔頌宣皇徳永著神休勅建禮部賜宴之碑楊士竒宣徳六年十月北京新作禮部成尚書胡濙奏請樹石刻文以示久逺制曰可其文以命臣士竒臣既拜受命謹案禮部在唐虞為秩宗在周為春官大宗伯所典天神人鬼地祗之禮而禮樂庠序風化制度品節之事咸屬焉我國家列聖相承法古制治尤重於斯皇上臨御之初茂簡俊乂以稱厥任時濙以禮部左侍郎兼南京國子祭酒奉命還禮部數月陞尚書上諭之曰國家所重祀事朕夙夜祇奉天地宗社暨于百神以迓福生民爾其懋相予無怠凡國所用彞典爾惟舊章是循是式用佐予理無忽爾惟寅惟清用懋副朕命濙拜稽首言臣敢不精白一心以圗稱萬一葢上所命濙與虞舜即政命伯夷者同一道也而嗣大位以來祀享受福川嶽奠寧嵗屢豐登田里給足災沴不作遐裔畢來禎祥之物駢見疊至皆本於皇上誠敬所格而徳化之效也于時北京創建未久百司官府皆未作其公署及治文書之舍率就簡便葢未暇及也一日濙奏事殿中上曰國家大典禮悉𨽻禮部非可以簡其官府宜先備勑工部作之度地於大眀門之東西向中為正堂堂之側為司務㕔前為周序為中門為前門正堂之後為後堂左右為賔客之位後為庖庫堂序之外為四屬儀制主客在左祠祭精膳在右鑄印在中門之左其地亢爽其材堅良髙明邃深制度𢎞偉方之近代綽乎過焉既成以聞命京師諸司長貳咸往落之命光祿賜宴恩澤之隆羣情歡溢咸謂皇上惇典庸禮啟自宸衷始作斯宇甚盛舉也臣惟禮者天理之具於人事而行之以敬者也用之事神而神享用之為政而政修用之敎化而敎化孚用之制作而制作盡善故禮所以為國家天下之大器不可一日無者而典之必得其人惟皇上知之明而行之果也然臣伏覩未作禮部之先有司以上所居宫殿庳益請拓地改作上曰朕方惓惓息民為心居室豈今所急却其奏既而出璽書命諸司詢民瘼施振貸已逋責暨禮部成有司復請改作宫殿且言治材巳具上曰朕夙夜求民之安今天下匹夫匹婦豈皆得所而何暇於自求佚若等宜體朕䘏民之心敬哉勿忘又却其奏而出璽書敷布徳恩存䘏鰥寡招懐流徙且飭有司弊舉廢修懐保之政葢聖仁一念保民惟日孜孜昔大禹薄自奉而所勤者民之事所致飾者宗廟朝廷之禮與皇上聖心異世而同符猗歟盛哉是役也重禮為先務而再却有司之請聖徳之大者臣沗職史氏謹備書之而繼以詩曰稽昔帝王禮莫重焉天叙以勑人文以宣其用之嚴曰郊與廟敎化制作咸禮之要皇明龍興列聖御極盛徳光華有典有則皇帝繼統躬禮導民従容安行天下歸仁翼翼北京視周之鎬桓桓六卿羣辟之表有虞秩宗咨命伯夷帝謂臣濙往哉汝諧肅肅三禮汝祇相予凡百儀度汝慎攸司爰初經營六官之府帝謂臣濙權輿宜汝龍章自天臣工祇率力齊材良成之不日天闕之南端門之東輪焉奐焉閎廓穹崇維皇明聖以禮為國維明維果有此弈奕維孝維恭大禹攸同約己勤民菲食卑宫矜䘏無告恵觧鰥寡文王小心日不遑暇仁澤流霈源源弗窮悦懌歸赴如川之東禮序樂和化淳俗厚龜龍在沼麟鳯在藪體信達順維聖之功執事有恪維臣之恭夙夜其勤式告有位維寅維清以熙帝載君山廟碑君山廟者祀常州府同知張侯之廟也為政而能愛民生則父母之没則蒸嘗之皆由其誠有以致之也張侯之同知常州也奉部符専督農事既至視民如子喜為之興利常行視水教之蓄泄躬履壠畝察種植而為之勸或時坐堘間相爾汝語如家人未嘗笞詈辱人遇老病鰥孤率有恩意所過飭勵學校正士習民甚戴之上官知其得民也有所賦輒檄之督民恐以緩累侯則爭起趨事然侯終不以慮譴而急民是時天下軍伍滋弊軍之姦黠者率用賂規匿而詭傳平民於籍民被枉比比朝廷以璽書分命御史清理其要在覈奸直枉御史當詣蘇常者言於兵部常州必得張同知共事乃有濟部遂以檄侯御史時鋭意得軍為功不復矜念民枉侯固執民實非軍敢違璽書不從御史不可奈何數出無禮語詬詈之侯忿鬱不能平數日疽發背卒然常之人賴侯以免於枉者猶十七八時蘇之佐郡者極力助御史得軍而枉民動以千計愁苦嗟怨於道路累年不解常之人以是益思慕侯不巳侯素澹泊亷介不茍取一毫自入仕未嘗以家累隨公退坐一室蕭然讀書焚香而巳易簀之先夕侍藥者入其舍索燈燭悉無趨出取膏油一盂以入侯遥見竟謝卻之其操類此侯先自翰林庶吉士為刑部主事春坊中允大理寺丞皆有政績嘗奉命督事廣東福建皆有恵及民此特載其在常者耳侯卒之日民老壮奔走哭於庭皆哀具儀奠祭累日柩行白衣冠送者數千人非積誠而能致此乎後數年江陰士民朱善繼善慶周孟徳孟敬因衆民之志協謀作廟於邑之北君山以祀侯來請書于石併作迎享送神之詩使歌以将事侯名宗璉字重器江右吉水人永樂第一科進士朱氏周氏皆尚徳崇義之家詩曰肅穆兮侯堂酌山泉兮薦林芳泠泠風兮髣髴侯戻止兮珮玉瑲懐仁侯兮撫我動與息兮有敎稼芄芄兮連疇侯顧我兮樂以笑侯乘兮蘭棹倐東皋兮忽南畝溪有鱷兮陸有虺侯赫視兮敢余民侮侯來遲兮逝何疾侯之逝兮我民以戚山之眀兮水之麗侯捨兹兮安適侯懐故鄉兮旦往夕來祚我佑我兮無遐遺調二氣兮平四序下無汎濫兮髙無暵災沼有魚兮苙有畜公無負逋兮私庾足我民兮子孫孫子承侯福兮千百世祀重修開平忠武王廟碑王直正統十二年秋八月通州守臣季經言州城東南隅舊有廟以祀開平忠武王常遇春葢洪武三年奏勑建每嵗春秋守臣以少牢行禮庭下載在祀典今八十年矣修治不繼日入於弊懼無以稱朝廷崇徳報功之意請繕完如法制曰可命工部聚材鳩工撤而新之通州諸衛及州所屬縣各以丁夫給役且命總理通州諸務都指揮僉事陳信兼督之命既下文武吏士奉承唯謹材不徴而集工不召而至智者效謀壮者效力作正殿前殿翼以兩廂前啟三門旁列厨庫凡諸像設靡不畢備𢎞麗靚深有加於昔經始於九月己酉而以明年四月成於是信來請曰是役也宜有紀願書而刻之麗牲之碑惟天生大有為之君必輔以不二心之臣肆我太祖皇帝受命而興王以忠信智勇佐之飛渡大江霆擊電掃東南郡縣以次削平既復下兖豫遂議北征車駕至汴申命大将軍徐達而王為之副諭以仁義行師毋殺戮以逞天聲所臨無思不服王先至通州禁侵暴務安輯人不知兵市不易肆皆愛戴如父母遂收燕都明年平河東入秦敵復侵通州王還兵拒之通州之人免於荼毒其徳王尤深王遂率師破開平大俘獲而歸至栁河川以疾薨柩還過通州州人皆罷市迎哭既去而念之不衰飲食必祭上思王之功而知民之感慕如此此廟之所以作也昔漢之西鄉侯張飛號萬人敵嘗拒魏将張郃於巴西大破郃軍以安此土巴西人徳之歴千餘年而廟食不廢今王以雄材大畧佐太祖定天下兵威所及王之績為多其功烈在朝廷利澤在生民葢甚大較之飛實過之國家褒荅勲臣恩禮之厚亦非蜀漢可比王生為上公没有顯號而廟祀永久葢宜也王之廟在京師尤盛此特其别祠焉耳今天子又新而大之所以承先徳而報王功其超越百代可知矣乃為述其事而系以詩曰太祖龍興四海従維王仗劒先來同所向無敢當其鋒通州亦在破竹中奠安民居遏寇衝播灑義澤揚仁風閭閻歌舞靡怨恫旌旗北伐兵馬雄汛掃絶漠煙塵空大星宵墜感帝衷錫以顯號昭殊功廟食於此罔不恭聖皇繼述棟愈隆神之仕位儼儀容調和陰陽斡化工疵癘不作嵗屢豐春秋祀享無終窮眀文衡巻六十六
