body:
  text: 明文衡巻二十三明程敏政編䇿題國學公試䇿題八首蘇伯衡問為人君者莫貴於勤莫大於斷莫難於信其臣周文之日昃漢宣之勵精秦皇之程書隋文之傳餐同為能勤也而或治或亂不同焉晉武之平吳憲宗之取蔡苻堅之南伐宋文之北討同為能斷也而或興或亡不同焉秦穆之於孟明漢昭之於霍光燕噲之於子之徳宗之於盧杞同為能信其臣也而或安或危不同焉學者之論事推其未至之理難為説而抵其已往之跡易為言請陳此十二君者其始何得何失而其後效相反以備清問之及襲其所以成而改其所以敗庶有取也問能稼而能穡斯謂之良農能獲而能烹斯謂之善獵能開邉而能安邉斯謂之優於為國故漢収河北兵不再興唐復河隴未甞出師今西蕃朔漠之地秦漢唐宋之所不能有者我國家談笑而悉取之矣伊欲使沙塞賓服不敢南向而牧馬洮隴幽薊之民目不覩旗旐耳不聞鉦鼓而安於耕鑿必有良䇿二三子其悉陳之問井田也學校也禮樂也此王政之大者也為法雖不同而先後常相資顔淵問為邦而孔子則以四代之禮樂語之滕文問為國而孟子則以三代之井田學校告之然則此數者果可偏廢歟夫為治未有不本於古而可行於今者也孔孟所言具在方冊其設施之次第願推言之以聞于上問羲和之典厯后䕫之典樂臯陶之典刑益之典鳥獸棄之典稼穡皆守一職終其身焉近世仕者一人之身而兼數官者有之一嵗之内而厯諸司者有之豈其人皆賢於古人而措諸事業者無施不可歟將徒知計班資之崇庳而恥於效一官歟抑拘於數易之制而材有不得盡歟夫唐虞之時洪水方大天下可謂多事而當其時事無不治今四方大定非有難治之政而當世之務往往廢滯夫安其分而專其智能於一職與夫急於進取而無常職其得失亦可見矣居今之世而欲復古之道如之何其可也問常衮之居相位也選舉不自專一命已上皆付之定法可謂盡公無私矣而賢愚有同滯之譏崔貽孫之居相位也未一年除吏八百多其親舊可謂出乎法制之外矣而當時有得人之稱後之宰相以常為法乎則涉於避嫌以崔為法乎則近於專權專權致威福下移之謗避嫌失竭誠徇國之義而謂賢相為之乎夫古之賢相孰有加於伊尹傅説周公召公者乎伊尹則敷求哲人傅説則旁招俊乂周召則明揚俊民既不自以為嫌而其君亦不以為疑是果何道歟為相不師伊傅周召顧自處於常崔之間抑可不可歟請為之説問在朝言朝在野言野在學校而言學校可乎有虞胄子之教專之於后䕫成周國子之教總之於樂正則樂豈非尤學士之所當重歟後世何以希闊而弗講歟古者興師其出也受成於學其反也獻俘獻馘於學則兵豈非亦學士之所當知歟後世何以忌諱而弗談歟所言者無非天人性命之理而指六藝為器之末所習者無過記誦詞章之間而視六徳六行為空言後世之學校果三代之學校歟夫何佻㒓城闕則其習至於今而尚存成材就實則其人質諸古而有愧豈非學校僅以著令而存其教養之法已踈歟然六館三學之士或叩閽上書而挽留先生或倡明大義而不汙僭偽或指斥權臣而竄責不恤亦甞見之而君子以為盛事果何以致之歟其豈所謂不待文王而興者歟國家建首善之地于京師二三子遊焉息焉豈惟稽往行以自鑒擇善者以自從而已凡古法之當施於今與今日之所當務者極陳之以修舉缺陋使教道興而人材盛亦有司之望也問榖為六府之一農居八政之首是故為國先務未有或先於訓農者也今天子每嵗孟春躬耕籍田以率天下之民郡縣之長吏皆兼訓農之職重農亦云至矣是宜事本業之徒什伯於逐末作之􅒰也而田里之間地有遺力而民多逰手何歟將盡驅之縁南畝歟則井地之法未易復限田之制不可行何以給之不為之禁歟則國家之調度一切取贍於有田之家不能無朘削之病而操竒贏者顧安享厚利將見背本而趨末者滋衆品調消息之使農民無所傷而逰民無所利其道何由可得而聞之乎問商書曰事不師古匪説攸聞周書曰不于古訓于何其訓是以夏商周之有天下其損益者有之而所因者猶一日董仲舒以謂質文有改制之名而無變道之實者是也自秦人廢古而先王維持天下之大經大法蕩然無復存焉者矣漢興掇拾於煨燼之餘其豈無一二為先王之舊然自秦迄今千五六百年時君世主初未甞諄諄然取法之為務也而不害其為有天下有天下而最盛者莫過漢唐漢之法大抵襲秦唐之政一切因隋而其治則皆幾乎三王乃若新莽之復井田宇文周之復六官可謂篤於師古者矣而無救于其昏亂敗亡何秦隋之制可以傳逺而先王之法度顧不可以垂憲歟夫豈髙帝之大度文帝之仁厚宣帝之勵精太宗之英武乃致治之資而莽之惡宇文之庸固自有取亡之道歟將善復古者貴求其實而不貴慕其名在得其意而不在泥其迹歟不然豈所謂世殊事異不相沿襲者不誣而商周之書乃虚言歟幸推明其故
