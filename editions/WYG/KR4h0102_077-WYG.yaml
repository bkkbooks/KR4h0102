body:
  text: 明文衡巻七十七明程敏政編神道碑奉天翊衛推誠宣力武臣特進榮禄大夫柱國追封平江侯諡恭襄陳公神道碑銘楊士竒太宗皇帝初自北藩靖内難至江上都督陳公瑄具舟迎濟内難平上正大統録功賜公奉天翊衛推誠宣力武臣特進榮禄大夫柱國封平江伯賜誥劵陳氏家合淝其先世具余所著其先公墓碑公字彦純自少頴敏不凡好善惡惡内篤孝行洪武中侍父官成都習兵畧精騎射以武臣子選侍大将嘗從出郊遥望孤鴈雜鵞羣命衆從者射不中最後命公發一矢斃之有䲭翔於上命公射應弦而墜自是屢試皆竒中衆大服而公不自為能朝廷命總兵者作蜀府宫城遣将伐材於山所行失律且材不中度又所經瘴地士多死總戎察公可用遂命之公善撫綏明號令别取善道七百里以入先期而還士不病所得材皆適用總戎者嘉之又命董繕作具有條理遂從征南畨巖州中亭及散毛鎮南咸建勞績代父職為成都右衛指揮同知父坐舊累謫戍遼陽公伏闕奏請代行特詔父子竝免復職衛卒數輩饕詖狙詐挾制上下為衆患公次第悉去之善類以安從征越嶲討建昌酋長伊哷特穆爾踰梁山平天星寨破寧畨諸蠻駐西河口諭䧏夷人數千從總帥復征鹽井平三山寨及小伯夷進攻布木威寨據要害立堡以斷賊路官軍分三隊進公居中已而左右兩隊弗支奔還公所統僅百餘人冒險先登賊數千圍公公下馬率衆且射且斫賊疲稍却公亦傷足褁創進戰自已至酉賊敗走公全所統而還復從征餘冦賈哈喇時冦衆數萬據嶮以拒官軍分三道公軍後進由畨西渉達珠河得間道乃出竒兵作浮梁渡河既渡撤梁以固士志遂壓冦境冦慿嶮迎敵一日十三戰奪其嶮明日復力戰凡七合冦大敗遂入其壘簡銳卒出哨令望見前軍旌旗即舉砲俾知已敗冦仍遣五百軍斷冦走路冦窮出䧏械送賈哈喇京師撫輯其餘衆公及麾下加被陞賚從蜀獻王廵邊招撫邊人兼理茶馬之政邊人悦戴灌口都江堰壊民苦水患公修其隄防躬督工作為堅乆計矜恤無告出貲置義田二百畆於成都積所入租凡貧不能衣食不能婚嫁及死不能歛塟者皆給之㑹雲南兵征百夷以功陞四川行都司都指揮同知遂進右軍都督府都督僉事太宗皇帝知公才可任時北京軍儲不充命公歲董運百萬石道海給之公措置井井剏建百萬倉於直沽尹兒灣城天津衛籍兵萬人戍守公善任使均勞逸秋豪無取於下凡漕途姦弊掃滌一清漕舟所經海島畨人畏憚官軍悉閉匿公下令俾出為市而遣官監臨平其直軍無敢譁人兩便之舟還值倭冦刼沙門島公率衆追至朝鮮境上焚冦舟殆盡冦以殺溺死者甚衆奉命率舟師於閩海備倭冦者三海溢坍没隄㟁起揚之海門厯通泰北至鹽城凡八百里奉命以四十萬卒修之航海至者茫洋莫知所停泊徃徃膠淺公於太倉相可泊處以二十萬卒築髙邱二十丈延亘十里為表識衆便之稱寶山事聞上親製文樹碑焉既建北京罷海漕浚濟寧臨清河通南北徃來仍屬公董餉運公建議造淺艖二千艘初歲運二百萬石為之有方後増至五百萬石國用以足若疏清江浦引水由管家湖入鴨陳口逹淮以免淮河風濤之患就管家湖築隄亘十里以便引舟浚儀真𤓰洲二壩湖港之堙鑿吕梁徐州二洪巨石以平水勢築沛縣刁陽湖濟寧南望湖長隄開泰州白塔河通大江築髙郵湖隄隄内鑿渠亘四十里以通舟南北造梁以便陸行自淮至臨清相水勢髙下建牐四十有七以時啟閉皆舟楫通行永逺之利於淮濵作常盈倉五十區以貯江南輸稅於徐州臨清通州皆建倉以便轉輸慮漕舟昧河深淺自淮底通州濵河置舍五百六十八所舍置卒俾導舟可行處縁河隄鑿井樹木以便夏月行者凡於事慮之周而為之果仁宗皇帝初臨御下詔求言公首言七事大概謂南京國之根本宜為乆逺鞏固之計選将益兵以嚴守備長民長兵皆宜擇賢能然後政舉而下不失所賢能在推舉推舉在覈實乞選朝臣之公正者分廵天下考察百司政事得失進亷能黜貪鄙則官得人而治可興今府州縣學教官多不得人乞令風憲考察罷黜别選今中外軍伍多缺蓋由所管頭目私役擾害不勝致其逃逸乞勑都府兵部都司嚴切禁約就行清理老疾者令户丁代逃逸者責限追捕户絶者驗實除豁伍籍又邊防之要在兵食足近歲如開平等處城不足兵兵不足食所守何由完固乞選武臣之有方畧者授以精兵足其衣食給之堅利器械俾日教習如有沃壤令兼務耕守今漕運惟江西湖廣浙江及蘇松諸郡去北京甚逺漕河又有洪牐淺凍之阻徃復踰年雜費數倍正糧上逋公租下妨農務乞自今令運於近便淮安徐州等處收貯别令官軍運至北京則民力可蘇農務不妨各處官軍每歲漕運畢財力殫乏到家又修理壊船運來歲糧勞勤可憫其所管頭目又加别役以重困之乞行禁約今後漕運軍士不得再有别役馬船快船惟二三百料者可行於漕河所載不過五六十石每船已有額設水夫今又於縁河拘集軍民聽候其至接遞聽候日乆衣食艱難有至行丐者乞自今罷之上覽奏嘉嘆命有司咸即施行賜勑奨諭有老成忠愛篤誠之褒加之重賚賜誥追封其曽祖省三祖重一考聞皆平江伯曽祖母孫祖母朱嫡母王生母王故妻湯皆夫人命子孫世襲宣宗皇帝臨御命公鎮守淮安兼督漕運公至察宿弊之為民厲者悉革之豪猾姦宄皆歛避境内以寧時已嬰疾而躬勤旦暮靡有滯事疾間入朝深被嘉勞賜宴賚還至淮安無幾疾復作上聞特勑勞問時子儀在侍衛令挾醫馳驛徃侍竟薨宣徳癸丑十月十一日也春秋六十有九訃聞上悼嘆輟視朝一日追封平江侯謚恭襄賜祭命工部營塟公為人闓爽英毅𢎞度偉畧稠人廣㑹譚論亹亹倫輩推服公餘披閱載籍考知徃古成敗治亂之故喜近逢掖士時相講議善交際能推利為義所至以濟人為心多所建置人用徳之不忘家有樂善堂恒舉鄒孟氏仁義忠信樂善不倦之語以勉子孫配某氏封夫人子男五佐襲平江伯後公數歲卒次儼次儀今為勲衛好文事精武畧次倫次侃女三李芳江隂衛指揮同知張英其婿也一未行孫男三裕今襲平江伯祐祼女七公塟以薨之明年三月墓在江寧縣大山之原余與公同朝三十餘年相知且好於是儀以状求著神道之碑故按状叙而銘之銘曰繄公挺出何桓桓武兼勇智追前聞材藝夙試卓寡倫峩峩三品承考勲蠻溪獠峒獫猲羣負嶮弗擾獰且䞭公奮掃刮迅㧞塵湔滌羣姦寜邊民有嶻譽望齊峩岷歘徴來東衛宸垣遭承興運效駿奔録勞疏封昭鴻恩貂蟬鞶玉衣繡麟報賜志企古藎臣單心畢慮靡夕昕滄溟茫洋𣺌涯津歲漕萬艘奄然臻有梗於海威赫震斬鯨戮鱷焚甲鱗崇表海岸亘長雲雲章龍彩天垂文南賦北貢艱以辛踰淮歴濟底天津疏堙鑿堅劬且勤坦行如砥戚者忻猗嗟公篤孝與仁厥施諸時績弗泯愛國亦有嘉謨陳功載冊府被後昆大江之陽巋有墳太史銘之昭不刋封榮禄大夫少保户部尚書兼武英殿大學士黄公神道碑銘黄嬴姓顓頊之後以國為氏勲業文行代有聞者永嘉之黄自宋御史檢法衮以科第起家令緒有傳世篤儒業檢法孫修職郎諱適道生元明正書院山長諱南一山長生松陽縣學教諭諱應發教諭生諱通娶屠氏生公諱性字思恭自㓜頴悟不凡蚤喪父祖母劉躬自撫育遣從學明師時已卓然有立志讀書必尋究大義十五鄕長老試所業命賦新竹大見賞異而操行清潔元季兵亂方國珍竊據温台署官屬蟻附之徒率勢燄赫赫動閭里或勸公仕正色叱之遂裹足不出屬歲大祲家益落躬儉約以率下而養親必豐國家既定宇内家始復振推其餘以濟親戚鄕黨者率視為分内事内弟王時中孤窶依公公資遣之學後升太學生公皆輟已資之時中既授官坐事當没其家有司以同籍併没公家公叩有司求得先祠神主及先世傳文以付其親戚曰保蔵之如黄氏先徳未冺吾當還則此不可失也而求檢法所受告身或言燬矣大慟幾絶既至京白其情於朝得釋歸而告身實未燬亦復則又大喜曰復此萬金不足重也公於學自㓜至老不倦閒居潛心載籍喜為詩不事雕琢務以理勝遇名人制作有㑹意者手自抄録晚亦喜譚道學嘗書邵子安樂窩吟置齋壁時諷詠以自適永樂十年以子淮貴封奉政大夫右春坊大學士時淮侍仁宗皇帝監國屢問公安否嘗賜瓊玉膏一器洪熈初進封榮禄大夫少保户部尚書兼武英殿大學士淮奏請分少保禄給於鄉以供養從之天下聞而榮豔焉於是公年已九十鬚髪半白而齒落復生雖重聽而目益明歩履强健前二十年嘗預作壽藏是旦甘露降其前之松栢識者以為公之壽徴至是而驗公雖貴益惇謙謹雖五尺童子接之以禮温裕有容犯未嘗校隣惡少嘗侵公蔬地公弗校而侵不止有譏公愞者公若㒺聞惡少後侵官地有司将治之而詢諸其隣之老公為䟽其實而薄其罪人皆服公之量公已進封一品其友之子有官於朝而佚平者過家焚黄數於㑹而位公上里人交誚之而公怡然不一毫在意閩陳興祖清尚士也與公厚善客死永嘉公歛塟之盡禮而繪像時展對焉其交篤誼類此性簡澹無他嗜好所畜惟經籍法書名畫及古器物有就鬻者倒囊不靳不嗜酒而喜賔客有過者必傾冩盡歡淮謝病歸日侍甘㫖公益樂時携賔客載小舟嬉遊山水之間翛然物表也所作詩文有静菴集八巻藏於家一日得疾手書數事付淮大要以報君上為重遺命喪塟循朱氏禮而屏斥浮屠老子法語訖而逝宣徳六年十一月五日也享年九十有三訃聞上遣官賜祭命有司治塟廷臣自師傅六卿以下皆致祭配王氏里儒家貞淑秉禮既歸黄氏蚤夜躬勤女事佐裕其家凡所制財用之宜井井有條理尤謹先祀睦族姻而愛其庶出之子孫踰於已出永樂壬寅十一月十三日卒享年八十有六初封宜人後贈夫人其卒也朝廷遣官賜祭命有司營塟子二男一女長男濟庶出次即淮及女皆王夫人出淮洪武中舉進士由中書舍人累陞右春坊大學士通政使少保户部尚書武英殿大學士立朝有侃侃之節厯事列聖皆為上所信任今以疾歸第女適王士昌士昌蚤卒無子誓守節不更嫁孫男五樂先卒棻棐采槃女三葉璣王宜嘉其壻也一未行曽孫男四旭暉珣瑜公與夫人合塟邑大羅山之原於是淮具書以前翰林檢討潘畿所述事状使來京師求書墓道之石士竒與淮同官三十年辱公知有素不敢辭敬次第書之而系以詩曰滄海之堧清浙之東奕奕永嘉為文獻邦出者奮庸處者求志仕止之義代有聞世邦之黄氏其來逾逺當宋紹興臺幕有衮秉徳執義不附權姦卒用裕後而今桓桓公其世嫡曷潛在下抱貞含和允續乃祖紛其饕詖公獨引恬紛其矜髙公獨履謙五采翽翽翺翔雲漢帝嘉所生龍光輝煥崇秩重禄玉帶朱衣雍容邱園逍遥期頥邦有夀俊平世之瑞亦有賢淑徳人之配青山欝磐䨇璧合藏毓祥垂祉百福其昌贈驃騎将軍左軍都督府都督僉事王公神道碑銘宣徳十年加贈左軍都督府都督僉事王瑜之祖彦逹考銘皆驃騎将軍左軍都督僉事祖妣黄妣成皆夫人封其繼母茹太夫人於是瑜求余文勒碑其考之墓用昭上恩於永逺按王氏初出太原宋諱源者為滄州學官因家焉其子曰福綿自滄徙泗州娶房氏一子即逹又徙山陽三子銘其仲也字銘甫洪武初從征伐以功長五十夫暨老而瑜代之瑜謂余曰先考天性質實尚徳務仁蹈履率正而篤於教子恒言忠孝人道之大端人而昧此不可以立於天地之間瑜不敢違惰瑜非承藉先公之徳不有今日幸執事之惠畀之也余與瑜同朝乆蓋素知之始瑜既代又選𨽻趙簡王䕶衛時留京師一日其䕶衛指揮孟賢等十數輩潛結造邪謀簒奪布置已定簡王實不聞也瑜親戚有與謀者瑜竊聞之力諌止不聽遂奏發之詔捕賢等悉獲之得其偽詔書及邪謀本末賢等皆伏誅陞瑜遼海衛正千户遂進錦衣衛指揮同知推恩三代贈其祖若考皆懐逺将軍指揮同知祖妣妣皆淑人封其繼母太淑人後陞瑜都指揮僉事署左軍都督僉事佩漕運印充左副總兵董江南饟運其􅊩事勤敏持操㢘潔秋毫無取於下夙夜顓顓志在奉國遂實授都督僉事瑜之能子要之本於銘甫之能父也自瑜效忠十餘年致位二品膺受重寄榮及祖考天之所以報施厚矣凡人之善患無諸已誠有之天道未嘗爽其報也銘甫之顯庸雖不在其躬而必在其子榮命雖不見諸生前而必徴於身後天之道豈不信哉銘甫四子長琳次琮次瑜次瑄八孫堂堅璽賢真頔顯賔銘甫生元至正辛丑五月十日没於永樂壬寅十二月八日春秋六十有二塟海州城北沙村之原銘曰南山之植根本深厚挺發為材凌切雲表宜柱宜梁廟堂之需宜艦宜舟濟海與湖王氏之宗善仁代有有沿襲焉歷祖暨考篤鍾於嗣秉志桓桓維忠維誠以事大君發擿兇憝爰清氛曀帝錫寵嘉曰旌汝義崇秩豐禄式賁厥躬泝厥祖考申顯褒封厥考維良允蹈於徳教成於家致時赫奕巋焉佳城其藏在此春秋來拜振振孫子開國輔運推誠宣力武臣柱國武定侯贈營國公諡威襄郭公神道碑銘楊榮洪惟太祖髙皇帝龍飛淮甸應天順人芟刈羣雄戡定海内一時智勇材力之臣感㑹風雲效其忠勤輔成帝業開千萬載太平之運竒勲偉績鏗鍧振耀勒銘鼎彛垂光竹帛與國家相為無窮猗歟盛哉予嘗叨職國史竊觀開國勲臣其間能身躋壽考世為貴戚子孫享有顯爵乆而益盛者不數人豈非其存心之仁與積累之厚有間耶若營國威襄公蓋足徴焉公姓郭氏諱英臨淮人生有異徴沉毅多智身長七尺膂力過人尤精騎射年十八從太祖起義兵甚見親信每令直宿帳中取徐泗滁和采石太平建康鎮常寜國諸郡屢立戰功上嘗以郭四呼之上親征偽漢陳友諒大戰鄱陽湖相持連晝夜公時金瘡未瘳力疾鏖戰敗賊於禁江口已而友諒中流矢死有言公之功者上問之公曰天威神筭臣何力焉上益重之時友諒子理復立於武昌進軍攻之其将陳僉同者驍㨗善槊馳入中軍帳下上方坐胡牀遽呼公曰郭四為吾殺賊公持鎗躍馬奮臂一呼賊應手殞墜上觧所御赤戰袍衣之曰唐之尉遲敬徳不汝過也授驍騎衛管馬軍千户從征襄陽克淮安鳯陽安豐陞宣武将軍驍騎左衛指揮僉事洪武元年戊申從大将軍徐公北定中原下齊魯克汴梁平河南取元都破潼闗彰徳廣平所至有功初大将軍遣公取通州公距城三十里為營深溝髙壘為持乆計衆請速攻之公曰吾師逺來敵以逸待勞攻城非我利也宜出其不意破之翌日大霧公以千人伏道傍率精騎三千直抵城下元将諤斯巴國公帥敢死士萬餘張兩掖而出與戰良乆公佯敗彼乘勝來追伏兵中起截其軍為兩道斬首數千級擒元宗室博囉梁王遂克通州元君乃北遁克永平真定定州生擒守将湯同僉復從平章常公取太原守将王保保軍於城西公慿髙望之謂常公曰彼兵多而不整營大而無備請夜刼之常公深然其計遣五十騎伏城東十里以舉火鳴砲為期至夜公率十餘騎潛入其營舉火鳴砲伏兵亦舉火鳴砲常公引兵繼至鼓譟之聲相接保保軍大潰自相屠戮乃棄城遁下興州大同至沙淨州生擒偽将竹平章渡河取鹿臺西安鳯翔鞏昌追敗賊将賀宗哲於亂山庚戌陞本衛指揮副使從征迤西克定西討西夏察罕扎爾撫安呼遜平章沙淨州復叛討平之克登寜州斬首二千級獲牛馬數千陞昭勇将軍本衛指揮使賜金龍衣一襲辛亥陞驃騎将軍河南都指揮使将赴鎮皇寜妃公之女弟也上遣至公第餞之且謂公素清儉賜白金三十罌廐馬二十二匹時河洛新罹兵燹邑井蕭條居民艱食盗賊充斥公宣布威徳綏輯流亡申寛條明賞罰逺邇來歸者日以千計未期年户口倍増境内大治丙辰移鎮北平河南士女不忍其去遮公馬數十里不得行甚至泣下既去為立生祠北平初定邊方反側不寜公開示誠欵諭以理亂禍福人心遂安元左丞何允中等聞公之徳來降者凡九千餘人上遣使勞以上尊羊馬授龍虎将軍北平都指揮使賜誥命逾四年召還京進大都督府僉事更定官制改前軍都督府僉事灰山賊反承命討平之賜馬七匹辛酉從頴川侯傅公征雲南既至命公及都督陳桓胡海分道進討道多險隘諸将欲深入公曰破敵貴先聲攻取必自近始舍近趨逺豈䇿之上耶遂先攻赤水河路距河二十里為營時乆雨河水瀑漲公曰賊恃水漲不意吾濟下令諸軍斫木造筏夜半濟河比曉賊始覺遂大潰生擒烏撒并阿榮諸蠻由是雲南諸賊破膽進攻曲靖六梁州闗索嶺及偽石元帥山寨皆克之至江川椅子寨寨依山公先遣騎兵五千攻其前賊空寨迎戰復以精騎數百𢷬其後斬門而入火砲連發烈熖張天賊乃亂悉破滅之進攻大理金齒降其偽官叚平章攻安寧州賊将布哈特穆爾棄城走破富民縣山寨攻靖守州蠻七寨一日夜破之攻牢撞山寨取仁徳府破哨店山寨圍姚安敗賊将李自乆平蒙化州鄧川州破三營復光寨過金沙江攻北勝府生擒賊将髙生平麗江府平津等州前後斬首一萬三千餘級生擒二千餘人收精兵人馬數萬船千餘艘蠻民降者數十萬户雲南諸路平論公功進爵開國輔運推誠宣力武臣柱國武定侯賜誥劵食禄二千五百石子孫世世承襲乙丑加靖海将軍鎮守遼東丁夘同大将軍宋國公馮公討北邊納克楚降之師旋敵将追襲之公與戰創傷左脇箭復中右脇公佯呼敵傷吾甲我衆益奮連戰數十合敵遂却已而進征北右副将軍仍鎮遼東戊辰出討北庭至捕魚兒海邏騎偵敵營不逺公乃令諸軍少憇飲馬衘枚巻甲倍道而馳直抵其營敵王覺乃率十餘騎潰圍出其将曼濟太尉來拒我師公手刃之獲兩營所積金寳珍玩圖書降其衆五萬餘人生擒其将約約司徒納木曩嘉卜太尉繅固逹勒袞布逹拉王子等四萬餘人馬駝萬五千匹牛羊輜重無算帥還賜白金千兩鈔八百錠綵幣四十匹己巳上以天下無事且憫諸将老欲保全之厚加賜賚遣歸其鄉公亦就遣庚午獨召還京上賜坐與語歡甚命統禁兵及在京諸軍蓋上春秋髙知公忠謹特倚重焉辛未以北兵阿拉克實哩侵邊命公討之獲其人口孳畜逐北至鴉寒山而還丁丑川陜冦發勢張甚上顧曰非卿無能勝其任者授征西将軍印討之至沔之後河生擒賊首髙福興及黨四千餘人公疏其同謀者請誅之脅從者乞勿治且言有司不恤民宜正其罪上可之永樂元年癸未二月十七日卒於家享年六十有九訃聞太宗文皇帝為之震悼輟朝二日遣官致祭賻䘏有加贈營國公諡威襄賜塟京師聚寳山之原公孝友仁恕恭儉誠實出於天性母夫人嘗疾篤懸身燈告天求以身代疾遂愈人皆謂公孝感所致後母夫人卒公廬墓側晝夜號泣不絶聲卧寝於地毁瘠日甚一夕夣母夫人告曰地濕則致疾致疾則傷生汝固純孝惟竭忠報國為父母光墓不必廬也公感悟而歸家三年之中哀痛如一日平居兄弟怡怡克盡友愛御軍行師動有紀律推心任人甘苦同之其攻克州郡必禁虜掠戒殺降封府庫收簿籍一錢尺帛不敢私嘗北征軍法夜必令親軍更直荷戈環帳立一夕風雪大作公悉罷遣歸營其愛恤軍士多類此家居簡静好讀書天文地理百家之説靡不通曉教訓子孫以儉素力學為務事太祖髙皇帝四十餘年小心謹慎未嘗有過眷遇雖隆而自處益謙上嘗御便殿賜坐適有奏事者公趨避之上曰卿第坐朕自理事不汝闗也其見愛敬如此時公卿多置田産公多不治上問之對曰臣一布衣荷陛下寵靈叨有封爵子孫衣食餘饒安敢増益俾多侈心上善之嗟歎良乆公大小百餘戰金瘡遍體每隂雨痛甚及聞征討之命即日就道未始以老疾辭其事上竭忠蓋如此曽祖参祖聚父山甫累贈營國公曽祖妣何氏祖妣趙氏母單氏贈營國夫人配馬氏封營國夫人公兄弟四人長早卒次興以軍功封鞏昌侯贈陜國公諡宣武次某福建都指揮使次即公也子男十二人鎮銘鏞鑑鑰銓錡鈺鈁鑌鋼錀鎮駙馬都尉尚永嘉公主銘遼王府典寶追封武定侯鏞中軍都督府右都督鑑中都留守司副留守鑰散騎舍人錡早卒鈺贈承徳即尚寳司丞鈁旗手衛指揮使女九人長適府軍衛指揮僉事藺瑜次適濟寧衛指揮使弋某次遼王妃次適府軍衛指揮僉事趙斌次郢王妃次適金吾右衛指揮同知范聚餘早卒孫男二十有八琮玹璧瑭瑄瑾珷瑀璒璟玘瑋璦璡璨璝琬琰餘尚㓜琮府軍衛指揮僉事玹襲武定侯瑾早卒珷尚寳司丞瑀梁王府典寳璒璟皆勲衛孫女十六人長仁宗昭皇帝貴妃次適留守左衛指揮陳鑑餘在室曽孫男五人聰耽餘尚㓜聰散騎舍人予觀前史稱郭汾陽功蓋天下而主不疑位極人臣而衆不嫉富貴夀考始終令節七子八壻諸孫數十人俱膺顯仕唐世榮之若公勲業之隆子孫之盛方之汾陽夫豈多讓皆由公存心一本於仁故積累之厚愈逺愈隆焉嗚呼偉哉玹以神道之石未立無以昭示永乆來請文予閲其家傳考定其大者次第之而系之銘曰天啟皇明淮甸龍飛乗時應運風雲一機太祖受命汎掃餘孽羣力桓桓皷勇就列東征西伐北南以平斷出神聖功恊衆能展也郭公有文有武翊輔真主實天畀付鄱陽之戰衆論偉公公仰廟畧不有其功既㨗通州再㨗太原河南北平黎庻懐恩南詔之征武功尤大誅叛全生蜀民是頼維彼烽烟來自漠北巻甲擒之兵氛蕩滌皇有嘉錫錫爵褒功金書鐵劵武定啟封錦袍御馬白金文綺赫赫髙門煌煌㦸棨世聨國戚代有顯融匪幸所致惟公之忠忠在朝廷載之信史亦有孝思永錫爾類在昔汾陽著勲有唐公實似之于今益彰我作銘詩勒功墓道百世斯承有赫其耀太子太師郭公神道碑天眷國家誕啟中興之運必有英傑為之股肱運謀効力於其間而後勲業克成故榮禄大夫太子太師郭公實其人也公諱資字存性姓郭氏河南武安人曽祖諱温父仲禮皆以公貴贈榮禄大夫太子太師曽祖妣净氏贈夫人祖妣馮氏妣王氏皆加贈一品夫人公生而頴敏志氣超羣兒弱冠入邑庠從師受春秋有所造就洪武辛酉入太學甲子領應天府鄉薦明年㑹試禮部對䇿大廷賜同進士出身初為户科庻吉士擢户部總部試主事丁外艱服闋實授本部湖廣清吏司主事改陜西清吏司吏不容奸聲譽頓起陞都察院左僉都御史無何尚書郁新以才薦之授前北平布政使司左叅議蒞事之初即以本司弊政為言太祖皇帝嘉其忠直陞本司右叅政公悉心殫慮贊佐有方不數月陞左布政使精勤詳慎紀綱大振豪猾歛跡良善獲安時太宗皇帝在藩邸尤愛重之公有所言無不聽納及起義靖難命公城守撫輯兵民供給糧餉百費所需未嘗乏誤嘗以漢蕭何擬之太宗皇帝即位論功召陞户部尚書賜白金文綺楮幣視諸伯未閱月以北平重地奉命乘傳掌布政司事未幾詔建北平設行部拜公行部尚書公以北地軍民初安生業始遂而官司所費冗濫當撙節以恤下乃惓惓以祛弊舉廢為務或有不悦而謗公者太宗聞之降勑慰諭益以心腹任之滿考賜宴内廷頒勑奨諭錫以誥命贈公祖若考皆資政大夫北京行部尚書祖母及母皆夫人歲辛丑太宗皇帝都北京革行部調公户部職務叢脞公勤以率下事有條序仁宗皇帝嗣位念公舊徳以尚書兼太子賔客已而復念公抱疾艱於歩履不忍煩以政事特陞太子太師俾致事歸鄉既加賜賚又令户部給公半俸蠲其税糧差徭特賜璽書慰勞甚至公歸杜門教子孫讀書屏絶外累皇上嗣登大寳眷求老成念公祗事列聖勞績居多詔起復掌户部事免其趨朝特賜鈔二萬貫公愈感激効忠雖祁寒盛暑必坐公署視事不暫廢僚屬胥吏莫不敬憚焉滿考賜宴於禮部奨以勑書譬公如歲寒松栢愈老愈勁其優待隆厚至於如此宣徳癸丑十一月疾劇屢言䝉被朝廷重任無以效報為愧切切訓諸子及孫當感恩思報不及家事十二月癸丑卒上深悼惜為公罷朝遣禮部尚書胡濙賜祭勑工部製棺營喪塟贈特進光禄大夫柱國湯隂伯諡忠襄官其子佑為户部廣東清吏司主事公生元至正辛丑十一月己巳享年七十有三卒之日家無餘貲公卿大夫皆徃哭弔致奠祭配陳氏賢而勤儉累封一品夫人子男五長儀先卒次即佑又其次曰儼曰倫曰俊女二季榮髙讓其壻也孫男十七人孫女十二人惟公亷介勤慎剛果有為自始仕至老視國事如家事凡所施為毅然自任不畏强禦雖怨有弗避害有弗辭與人辨論嚴厲之氣見於詞色而推之於政畧無害人蠧物之心誠國家忠謹直亮輔弼之臣也佑奉柩歸以某年某月某甲塟某山之原乃以郎中黄璿所状事行來請文勒之墓道以垂永乆余與公交好三十餘年不可以辭既序其概而復系以詩曰川嶽降靈篤生賢哲乗時奮庸以樹勲烈惟公之生早負俊才列職郎署超僉憲臺風猷宏振綱紀斯秩出叅大藩政興弊息凡所設施算無遺䇿顯命薦臨特拜方伯赫赫太宗仗義而興命公居守撫民餉兵既正大位嘉公勞績進位尚書厚其賚錫公愈飭勵經國如家謗怨弗恤恩寵屢加仁宗嗣位眷顧尤重兼秩宫僚式隆任用念公抱疾進位師臣俾休於家疊施以恩皇上繼統眷公耆舊詔復任事寵待加厚維公忠貞衆所共知維公勲業顯著於時筋力雖衰寸心尤赤奄忽長逝帝用悼惜贈爵賜諡喪塟是營官其後嗣存没光榮維兹光榮從古罕致公具有之其誰克似武平有山欝欝其崇勒文墓道垂耀無窮故光禄大夫柱國少師兵部尚書兼華蓋殿大學士贈特進光禄大夫左柱國太師諡文貞楊公神道碑楊溥正統九年三月甲子光禄大夫柱國少師兵部尚書兼華蓋殿大學士楊公卒公在疾時自為墓誌及卒其子􅀈秫號泣請余為神道碑文神道有碑古制也墓有銘古道也義不可辭乃序而銘之公西昌儒宦家子諱遇字士竒别號東里曽祖景行元翰林待制祖公榮考子将累贈以公官曽祖妣祖妣妣皆夫人公一歲喪父鞠成於母夫人陳氏自㓜端重異羣兒受業於鄉儒海桑先生海桑母夫人世父也見其敦敏甚器重之公自知學手不釋巻十二三通舉子業鄉人請為子弟師嘗有儒生過舘下棲棲然携書數冊公詢之聞其母老無所養乃分其徒之半與之俾得束修奉母姑氏舉家瘟疫門無人跡公夜宿其家浹旬為之調治全愈始還於是寖有聞於鄉里母夫人嘗曰吾兒力學嚮義足以光先世及弱冠出㳺章貢章貢守儒者嘉重之俾攝琴江教事琴江令亦儒者深賢之公感知己勸令尚平恕嘗為之言脱誣枉重罪數人或持金謝公者公若不與聞斥之出遊江湘所至人敬慕欲薦之輒辭不就遂有聲江湖㑹朝臣以名儒薦徴入翰林編纂一時儒者稱公博洽試於吏部考其文為首遂有聲於朝授王府審理副復召入翰林編纂太宗皇帝入正大統改授編修屢遷翰林學士改左春坊大學士洪熈初陞禮部右侍郎華蓋殿大學士踰月陞少保兵部尚書尋陞少傅階榮禄大夫正統初少師階光禄大夫公厯事列聖四十餘年信任始終洊臻極品夫豈偶然哉太宗皇帝初臨御修復成憲撫綏夷夏神謀聖斷洞合事幾時在翰林與宻勿以敏㨗幾智承眷顧者亦有其人公獨持重勤事未嘗以賢智先人嘗受命與廷臣議事公審衆長以聞上稱公能服善及車駕巡北京命皇太子監國乃命公輔導時營建北京征勦叛逆匠作軍興徴於南方者咸啟白皇太子公言監國之體以尊君順親為心皇太子嘉納之凡所奏對及裁處庶事鮮有過舉仁廟即位公以宫僚薦膺重任知無不言言無不納曽不踰年裕民之政舉行無遺嘗賜勑褒重之賜象牙圖書曰貞一以表其心賜銀章一曰繩愆紏繆俾匡所失賜畿内田四千畆固辭請業貧民詔三俸俱支公懇辭尚書俸宣廟臨御益見禮重及東藩搆亂公隨駕東征罪人既得公請絶浮言以全親親開釋脅從以廣仁恩上嘉納之今上嗣位公以老成弼亮治化啟沃聖學力所可為者身任之恒恐不及常以年髙辭弗許上憫其情命還鄉展墓公以三孤之重還鄉里謙抑自處如昔在鄉里時甫數旬即來京又六年遘疾上命明醫療之乆不愈賜璽書寛慰及賜寳鈔光禄酒饌以資養之竟不起時年八十上深惜之輟視朝一日遣禮部尚書胡公諭祭贈特進光禄大夫左柱國太師諡文貞仍命有司給舟車歸其喪塟鄉邑白雲原是年某月日也公存心忠厚急於為善自布衣時篤念族屬周恤急難審取舍行義卓卓為人稱道及為大臣識逹大體嘗曰大臣以薦賢為本然全才難得故所薦引取其所長不求其備公壽考康寜恩榮始終宜也非幸也娶嚴氏累贈夫人繼郭氏累封夫人側室李氏子三稷􅀈秫女四人梁楫蕭承恕劉鈞蒋重其壻也孫男六昱晟暠晅晏昕女三人朝廷修三朝實録公為總裁筆削有公論平生所著有沙羡稿石臺稿文籍志法書志東里集總若干巻藏於家公立心制行有自撰墓誌有東里傳有小傳溥自出仕與公交游在館閣議事彼此不能無可否退而歡如也存亡之感曷有窮已兹用撮其概書之神道為之銘曰斯文遭際千載亨期以翼君徳以福羣黎越稽徃古異世同規皇明啟運大統重熈純佑有命挺生瓌竒左右宻勿四紀于兹玉成耆徳以臣以師中流砥柱羣疑筮龜天不慗遺吁其孔悲明文衡巻七十七
