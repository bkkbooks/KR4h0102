body:
  text: 明文衡巻八十六明程敏政編墓誌銘故奉議大夫浙江提刑按察僉事劉公墓誌銘胡廣國初廬陵諸君子仕於朝其聲光炳耀卓然為時所稱譽者無慮數十人而劉公季道其一也公以明經被薦初拜起居注遇事知無不言竭盡誠悃首發御史大夫陳寧奸深為上所信重嘗隨駕幸中都度清流關上賦詩命百官和公獨先就有治定不教生縱逸功成猶遣歴間關之句上覽之曰有安不忘危之意賜白金二十兩綵段二端未幾拜浙江提刑按察僉事決積嵗滯獄六百餘起有牽於文繫者平反尤多民以無寃咸嗟服之此其卓然有聲稱者竟為陳所銜傅致其死時洪武六年月日得年四十有九公諱宜正季道其字其先沛人唐末自沛官袁五季之亂由袁徙吉居永豐灞溪曾祖諱某兩領宋漕舉授新淦縣丞祖諱某恒山縣令父諱竒相元至治癸亥領鄉薦為東湖書院山長吉安路儒學正撫州路儒學教授母張氏公居幼穎敏過諸兄八嵗隨父居東湖讀書聲琅琅聞于外賔客往來應對閑習人多譽之九嵗䘮母哭泣逾哀十三䘮父居䘮毁瘠不勝始事鄉先生劉惠心繼從山泉解先生二先生咸異之時郡守開堂試公年十八就試中高等獲綵綺二既而持所學試于有司再不利有得其文讀之曰如此而見擯斥命也季道奚辱公曰吾學未至耳非有司病吾元季天下繹騷其友梁某為福建招討託致其母扶持兵革間出艱難致其母子相見某拜公曰微公其孰能致吾母終身不敢忘德嘗與姻戚居逆旅忽得疾公親為調藥餌既死公抱之而哭解衣葬之所遺金悉以歸其子兄弟四人長皆先没惟仲兄存公迎至家養之比其没葬祭皆盡其情無子以次子為其後公娶邑曾氏賢而有婦行自公没惟以教子為事子三人長曰忠次曰朂幼曰肅字子欽子欽登永樂二年甲科為名進士入翰林為庶吉士其文學為儕輩所推讓女一人適某孫男九人女二人距公没三十餘年將卜葬于某山之原子欽始以狀來請銘謹按狀而銘之銘曰嗚呼劉公挺然之英政事文章焯有時稱發奸之言揚于大廷巨蠧一聞膽落魄驚諷辭戒逸治定功成至誠有動錫賚寵榮載歴風紀激濁揚清事有失頗公執其平伸抑理枉獄無嘆聲奸臣銜公頃不忘情傅致公死惡害公生生有不没死則公寧公天既定彼奸曷勝以磔以裂天子聖明公憾既釋烈日薄冰彼奸鬼蜮公猶列星有燦其芒南極長庚伊彼鬼蜮稔其穢腥有北豺虎以莫不憎公有令子式克繼承以昌家學甲科聿登庶或在兹報公㝠㝠有封如堂以妥公靈爰伐貞石鑱不朽銘百世之下斯文是徵羅公矇叟墓誌銘我太祖高皇帝乘運龍興文武智謀之士四方雲集各獻其能芟薙暴横肇建洪業偽漢逞兇殱于鄱陽其子理潛歸武昌上不欲窮兵乃遣儒生掉三寸舌以說之廬陵羅復仁承命往說說下完城不費一矢雖其口舌之功而實本於太祖不殺之仁有以致之也復仁質直遇事敢言以是功授𢎞文館學士後賜休致于家其從子養䝉好言語持辯論侃侃無所避人謂其有從父風而文學或過之羅氏代有其人養䝉諱以明養䝉其字自號曰矇叟㓜知慕學家貧母鬻簪珥以教之七嵗善聲對十二三能為辭賦及冠為童子師常得肉味輒先以奉親所得一毫不自私元末兵亂值大父母及父三䘮竭力盡䘮葬不以貧窶廢禮一日假館新淦忽心動亟回家時母遘疾甚危即禱天請以身代母竟死更二日復甦謂曰適有神人告我云更與汝壽五齡人皆謂公孝誠所感母後果五年而没母没哀痛幾絶終䘮如一日自是遇嵗時祭奠必泣下沾襟鄉人見者莫不稱歎故公之行有以服人雖㓂盜聞公言皆感愧不復為攘竊國初有勉公仕者公曰我逢聖朝為太平之民謳歌田野以樂治化教子課孫以報覆育之仁吾老矣無能為矣今天子即位改元永樂其中子汝敬領鄉薦明年上春官登進士第入翰林為庶吉士陞修撰皆公之教也汝敬嘗迎公來就養公時猶康强朝上于奉天門見皇太子于文華殿特加問勞命大官賜膳人皆榮之已而辭歸詞林士大夫多為詩歌餞送于都門外觀者咸嘖嘖加羨公歸鄉惟日賦詩歌頌太平間以書勉其子惟盡忠孝年已八十六耳目聰明飲食無異平時一旦翛然而逝永樂壬辰十一月廿三日也生故元泰定丁卯月日曾祖德茂元瑞州學正祖仲哲父時中俱博學有文章母蕭氏配蕭氏再娶李氏俱先殁子男七人曰忍曰德曰盈曰㳟曰肅即汝敬曰仁臨江郡學訓導忍德先卒盈為復仁後孫男若干人孫女若干人曾孫男某曾孫女若干人以某年月日葬于鄉某山之原汝敬以右春坊右諭德兼翰林侍講金公㓜孜所述行狀泣請予銘予生也後嘗忝與公有文字之交且辱相知詎可以辭况公平生學問操履出處大槩表表可稱至其事親誠孝感動神明此猶可書謹按其實而銘之銘曰羅氏之先始出錢塘有衍其支乃遷豫章奕葉廬陵復蕃吉水桃林之墟蔚蔚嶷嶷科第相望寳祐迄今有赫高曾襲其簪纓猗歟矇叟式承家學以孝事親質神無怍士服儒紳八十六年鶴髪童顔飄然若仙逍遥林壑優游卒嵗他人天爵公獨良貴公今逝矣以反其真九原不作永閟斯文王竹亭先生墓誌銘楊士竒國朝混一之初天下耆儒碩師徃徃多在徵詔數下或進而階顯融佐化理或退而信廉節成後進皆卓然有益於世也是時泰和王竹亭及其弟子啓兩先生正學篤行高風直節表表乎大江之西洪武二年子啓先生首舉明經為監察御史明年竹亭先生以說書徵既至上書論事更授福建鹽運副使以老得辭子啓先生後陞廣西按察僉事又擢知崇慶州政治赫赫已而罷歸時竹亭先生春秋六十餘子啓先生亦幾六十伯仲㳟愛隆然居必一堂出必鴈行長身玉立儼乎端恪巍冠襃衣襜襜甚偉蓋望之如神人無不肅然起敬畏者至其接人色莊氣溫雍容怡如語簡理盡無不樂就之焉竹亭先生諱沂字子與竹亭其别號幼讀孟子即知辨於義利稍長刻厲學問嘗從元進士楊升雲彭復初治周易造其室奥自六經至於周程朱張之書靡不深究及子史百氏咸旁通博考蓋於天人之微聖賢之藴往古治亂成敗之故蓄之富察之審言之的而履之確也嘗一試有司不合即不復出教授於其鄉而所交游往還皆當世名人元季江西參政沁布阿咱爾守贛州禮遇先生辟為行省照磨又承制授吉安路治中俱不受逮皇明龍興洪武三年廣東行省聘考貢士試是年侍御史吳去疾言泰和王沂經學操行宜在侍近遂徵為說書至未幾而歸益以成就後進為務從學者愈衆傾竭底裏隨其材而篤之而皆有成先生資識高明内貞外和氣度𢎞偉規範自然安成進士劉雲章嘗贊之曰淵乎𤣥酒之在尊凛乎太阿之未出匣皭乎其清而挹之弗竭薫乎其和而即之弗可狎又曰使及門孔氏則風雩之詠歸端章甫之禮樂固將進退綽然而特視其所合蓋確論也先生孝友篤至嵗時葬祭循古禮燕處必嚴未嘗啓口及人過失有文集若干巻承㫖宋公濂為之序詩若干巻襄城楊伯謙序之洪武十六年某月某日卒年六十有七王氏世有德義其先出晉司徒導之後由金陵來徙至宋戸部侍郎贊顯于仁宗朝事載郡志又若干世至圭為榮王府賔客與周文忠楊文節皆善學者稱虹溪先生虹溪若干世至性夫性夫子以道元李韓公復嘗薦之以親老辭二子先生兄弟也先生娶陳氏繼李氏皆有賢德子男一伯貞舉明經累官瓊州知府女一嫁嚴𤣥齡孫男二信直直舉進士為翰林修撰曾孫男八女三先生初葬于秋鄉大徑之原至是瓊州公丁李夫人憂改葬先生新山之原使直屬士竒銘墓士竒蓋生晚不足究知萬一然念鄉人老長識先生者盡矣當時門人親受教者亦多不在將使後之學者有志乎先進其何所考法也且士竒於王氏重世好又少嘗侍教先生兄弟及瓊州公矣故不敢辭不敏不銘謹述其所知大槩而為銘曰奕奕玉山澄江洋洋猗歟先生邦人之望江山出雲雨于下土君子之道有畜不施道之傳矣孰不為材佐理于隆濟濟偕來世其逺矣後來何師猗歟先生曷究予思故少師吏部尚書贈特進光禄大夫太師諡忠定蹇公墓誌銘宣德十年正月十有五日少師吏部尚書蹇公薨于位先四日以疾聞上遣太監范𢎞以醫來視賜鈔萬緡明日范太監以衆醫偕來又明日疾革范復來問所欲言對曰陛下初嗣大寳義獨寡祐不能效分寸禆益然區區犬馬之誠所望於聖明者惟敬守洪武成憲始終不渝耳言已而絶訃聞上深悼歎屬時國有大事悉停諸祀特賜鈔萬緡敕工部治䘮葬贈公特進光禄大夫太師諡忠定遣某官某賜祭而官其長子英英等奉襯歸葬有日求余為銘余與公同朝三十有五年而事仁宗皇帝自登儲至大位始終皆陪公公國家老成人所以啓益士竒蓋多不敢辭蹇氏世家重慶之巴縣宋以來多顯仕自公高曾而下始隱居不出曾祖繼祖妣牟氏祖均壽妣雍氏考源斌妣胡氏繼羅氏以公貴贈曾祖祖考皆榮禄大夫少師吏部尚書曾祖妣祖妣妣皆夫人公諱義字宜之生而岐嶷長端重不好弄而嗜學弗懈始從里社師中書左丞殷哲時為郡守一見異之引充郡學弟子員語其師曰是兒將來逺到非吾所及當成就之而公不煩程督日益有進洪武甲子中四川鄉試明年中禮部會試廷試賜同進士出身擢中書舍人授徵事郎見重太祖高皇帝每前奏事率稱㫖而數見奬賚初名瑢一日奏事畢問汝蹇叔之後乎親灑宸翰書義字賜之以易舊名時丁羅夫人憂賜道里費且命馳驛歸蓋特恩云服闋仍舊職滿三載吏部奏當調特命終九載朝夕左右凡機宻文字必以付公而小心敬愼乆而愈篤建文中陞吏部右侍郎授嘉議大夫太宗文皇帝入正大統轉左侍郎數月陞吏部尚書授資善大夫時政令制度有非洪武之舊者詔悉復之公從容為上言損益貴適時宜間舉數事陳說本末文皇帝以公忠實悉從其言小人有譖公不忘建文者賴上聖明不聽有除官不得善地訴公不公者上皆斥之永樂二年册仁宗皇帝為皇太子命公為詹事時師傅皆以勲臣兼之而輔導責任文臣詹事蓋元僚也上欲有諭皇太子率諭詹事往導意公亦委曲周悉皇太子尤愛重公所言靡不信用滿三載陞資政大夫十年車駕廵狩北京命皇太子監國中外庶務惟諸王及逺國有奏請詣行在餘悉啓聞處分公熟於典故達於政體孜孜無倦不動聲色而事賴以濟賜誥以其官秩封贈三代滿九載賜勅有秉心正直及淳良篤實禆益國家之褒數奉命兼禮部事雖職務填委處之裕如十七年丁父䘮歸上及皇太子皆遣官賜祭皇太子贈賻尤厚有詔起復公詣北京謝上慰勞再三賜鈔千緡遣中官䕶送歸南京明年從皇太子朝北京遂命公廵撫直𨽻應天等府州問兵民休戚及文武吏之賢否而升黜之公謂國家多事之際悉以法繩吏人將不勝特黜其太甚者數人餘多見寛假而兵民利弊當興革者具奏行之仁宗皇帝初嗣位一切政議預者三四人而公居首進少保兼吏部尚書二俸俱支賜冠服象笏及玉帶二遂進少傅及進少師賜師傅之臣銀章各一其文曰繩愆糾繆公首被賜上諭之曰朕有過舉卿即具疏用此封識進來蓋望公等匡直也繼賜誥授榮禄大夫封贈三代及妻於公數人誥詞上特增曰勿謂崇高而難入勿謂有所從違而或怠所以望公等者甚切也又念公侍從監國舊勞特製蹇忠貞印賜之而賜勅有以善翊君勞心焦思二十餘年夷險一節之褒時修太宗皇帝實録命公監修宣宗皇帝嗣位一切政議屬公數人如仁考之初繼奉命監修仁宗皇帝實録書成賜白金文綺鞍馬扈從征庶人高煦還寵賚尤厚復從廵邊既還以公年老不欲煩以有司之務賜敕曰卿事祖宗積效勤誠朕嗣統以來尤資贊輔夙夜在念圖善始終蓋以卿春秋高尚典劇司優老待賢禮非攸當况師保之重寅亮為職不煩庶政乃副倚毗可輟吏部之務朝夕在朕左右相與討論至理共寧邦家其專精神審思慮益致嘉猷用稱眷倚老成之意繼賜銀章一其文曰忠厚寛𢎞蓋以褒德云賜新第於文明門内寵録洊加吏部言公歴少師九載降勅褒諭仍賜宴禮部是嵗生旦賜鈔萬緡廐馬一匹今上嗣大位之日賜白金文綺是夕齋宿於公得疾越五日竟不起享年七十有三公為人沈深質實和厚簡静内有孝友之行事君有誠處人有量無所拂逆未嘗輕渉一語傷物至於議法亦不茍為包含必歸中正歴事五朝凡五十年所履坦坦無一日顛躓之憂退朝之暇手不釋巻貴而能謙富而能約上前所言未嘗退以語人蓋天下有隂被其利者矣士竒嘗竊論之魯簡肅之忠實不欺李文正之不為傷人害物張忠定之不嗜玩好傅獻簡之遇人以誠范忠文之不設城府公蓋兼有之矣元配劉氏繼張氏皆封夫人子男四長英次芳次芸次荃英荃皆尚寳司丞荃先卒女二長適馬駿次適李成孫男四霖震霑露女一公之葬以薨之嵗某月日墓在巴縣某鄉某原先塋之次銘曰節乎蜀山浩乎蜀川孕精毓靈挺生偉人溫中穆外履夷蹈素皇明麗天奮躍自下在帝左右秉㳟與誠掌帝之制播告四方進貳天官遂職冢宰簡用俊良往興至理帝命洊隆俾輔聖儲陳厥謀謨聖罔弗俞四紀在廷三翼升御肅肅師臣秉王之度一念惟仁永矢不渝寅畏小心保終猶初隂利逮人人則罔覺惟帝昭明褒詔有數嗚呼忠定維國老成曷不憖遺翼我聖明生榮死哀死且不朽昭德刋辭永告爾後故少師工部尚書兼謹身殿大學士贈特進光禄大夫左柱國太師諡文敏楊公墓誌銘正統五年二月十八日少師工部尚書兼謹身殿大學士建安楊公奉勅歸展先墓既畢事卜日啓行病作衆曰曷俟少間公曰君命不敢稽也挾醫以行至臨安武林驛病加遂不起是年七月二十也守臣治棺斂既馳奏皇上嗟悼輟視朝一日贈特進光禄大夫左柱國太師賜諡文敏遣禮部尚書胡濙莅祭遣中使䕶䘮還葬其鄉命有司治墳公先世見余譔其大父墓碑曾大父伯遜大父達卿父伯成皆贈榮禄大夫少傅工部尚書兼謹身殿大學士曾大母黄大母謝繼阮母劉皆贈夫人公初名子榮字勉仁自學諸生鄉試選第一會試第三廷對擢第二甲賜進士出身入翰林為編修太宗皇帝入正大統更其名榮初建内閣簡翰林之臣七人其中專典宻務七人者解縉胡廣王淮胡儼金幼孜公及士竒也公齒最少最警敏一日晚上出右順門召内閣諸臣獨公一人在出江西三司奏章示之言吉安鄉民之嘯聚者已悉復業蓋朝廷初有聞即遣行人許子謨齎勅撫諭子謨行將一月又遣都督韓觀率兵繼之如撫諭不下即加兵及是奏至上諭公曰觀不至不下其降勅褒觀公讀奏訖對曰計發奏之日觀尚在中道未足褒從之自是益重公時四方之事方殷七人者旦夕侍左右承顧問受㫖退治職務且兼稽古纂述之事不虛寸晷上時歩至閣中親閱其勞且視其所治咸稱㫖時公尤勤勵遂皆進官公進修撰數月復進侍講明年改元永樂秋公請告歸省又明年春七人皆賜二品金織衣且勞之曰天下事咸朕與若等同計非若六卿之分理也無幾簡翰林之臣十數人兼春坊官任輔導公兼右春坊諭德授奉訓大夫日分直進講經史四年春公得寒疾命中官以御醫來視賜藥物五年奉命往甘肅同總兵議邊務察視守備還奏稱㫖六年夏䘮父給傳歸既葬遂命起復是年冬䘮母公奏歸守制時已下詔巡狩北京不許七年春内閣胡公及公金公奉命扈從北京甘肅總兵何福奏托克托台哈布哈等率部來歸命公往同福處置還奏上恱遂奉命持節往額濟訥之地封福為寧逺侯八年春車駕北征布尼雅實哩公三人仍扈從至驢駒河命公先齎勅還報皇太子復還北京冬扈從還南京九年春奏奔母䘮遣中使䕶送既還皇太子命公侍諸皇孫學且命公曰嚴則有成公盡心不怠重修高皇帝實録命胡廣胡儼黄淮及公為總裁十年二月賜誥命并追贈父母妻冬甘肅守帥西寧侯宋琥奏叛㓂婁達罕逃居齊勤䝉古衛將為邊患時豐城侯李彬鎮陜西遂勅彬率師勦之且命公往與彬計度十二月還奏餉道險阻今沍寒人疲馬瘠不可行且小醜不足以煩王師遂勅彬旋師無幾叛者復歸十一年春從狩北京十二年三月從征衛喇特時皇長孫侍行上命胡金及公三人凡行營有暇即與講析理義開其聰明尚寳司官闕命公兼之既還勅翰林修性理五經四書大全公三人皆為總裁十四年陞翰林學士仍兼庶子扈從南歸十五年春復扈從廵北京十六年夏進高廟實録賜宴賚胡公没公掌翰林院事益見親宻一時廷臣狎恩多縱忌公抗直發其私適太學闕祭酒衆共舉公實欲疎之上不聽公遂宻言十弊指斥五府六部都察院章留中不下十七年進文淵閣大學士仍兼翰林學士授奉政大夫十八年扈從北征秋還京冬將西征親藩奏建文中江西所垜集民兵可徵用出奏示公公對云陛下命復民業二十年矣今復徵非信上曰朕意固如此遂寢三殿災公偕金公陳便宜十數事皆見施行重賢愛民或陷非辜必援之尚書夏原吉以兵饟不給坐繫吕震言其柔姦侍讀李時勉嘗論事亦有言其賣直者皆激上怒公悉委曲為之辯解二十一年秋復扈從西征駐蹕萬全一切軍務悉付公掌寧陽侯陳懋奏番王額森圖罕來歸命公往議定降歸奏稱㫖二十二年復從北征中道軍餉不繼上聞之命公與金公總計其數遂如二公言遣使諭邊釋其弗臣之罪下令班師浙江三司奏處州之麗水福建之政和山㓂刼掠請勅兩都司合兵討之公言愚民為有司所苦出不得已兵出即良民先被害願遣一勅使撫諭之不足煩兵上從之卒如公言無事一日上從容坐帳殿諭公二人曰東宫監國乆熟政務此歸悉付以天下事吾惟優游暮年二公共對曰皇太子孝友仁厚天下屬心允稱陛下付託上恱師次榆木川上不豫既上賔凡沐浴襲奠飯含棺斂一切之禮悉出二公衆遂推公先馳歸報既至同尚書蹇公等議䘮禮遂議即位禮仁宗皇帝嗣位進公太常寺卿授嘉議大夫仍兼兩職學士逾月進太子少傅授資善大夫兼謹身殿大學士山陵事殷太監孟繼極言公盡心䘮事上嘉歎即陞公工部尚書仍兼前二職賜勅褒諭三俸俱支尚書一俸全給米洪熈元年賜誥贈三代考妣無幾上命範白金為方寸印四枚其文曰繩愆糾繆以賜師傅公與金公同受其一皆期之直言匡輔修文皇帝實録公預總裁仁廟上賔時皇太子監國南京遺詔召嗣位公往迎於德州既還命公同有司相陵地宣宗皇帝嗣位修仁廟實録仍預總裁高煦反在廷多懐二心惟文臣三四人勸上親征公其首也遂扈從討平之師還特受駢蕃之賜馬騏激變交阯黎利聚衆抗王師總帥孱弱不支輒與利和且為利請立陳氏後遂以師還奏至上以示文武大臣皆勸發兵擊利上不聽竟偃兵息民公預力焉是年八月車駕廵邊至遵化聞邊兵侵塞以道陿師難竝進上率鐡騎數千先馳撃之文臣獨公從既還陞少傅進榮禄大夫仍兼尚書大學士三俸俱支辭大學士俸進兩朝實録賜宴賚又範白金為圖書刻方直剛正四字以賜公數月上念先朝老臣蹇義等四人皆春秋高竝賜勅褒諭命輟職務朝夕左右侍論議公預焉賜玉帶加有御製詩畫之賜公滿三載吏部以聞賜勅有忠言讜論禆益為多之褒賜宴禮部遂賜少傅誥進封三代後兩扈從廵邊皆至洗馬林而還宣廟上賔公復偕有司相陵地皇上嗣位公與同官三人恊志合力以效禆益賜賚特厚修宣廟實録皆為總裁書成進公光禄大夫柱國少師兼尚書大學士如故賜玉帶時上日勤聖學命公同知經筵事五年謁告省墓賜勅褒諭加厚賚給傳遣中官䕶送既還京道薨春秋七十公仕於朝四十年皆居清宻考鄉試者一讀廷試巻九為人闓疏果毅遇事當為奮前不疑於論古人必欲出新見不肯茍同議辟率歸寛恕勤職事盛寒暑及小疾未嘗少怠於四方裔邊徼事及邊將勇怯智愚靡不通知故忖量事勢率預中内篤孝友睦婣之行家故豐裕且有厚禄能濟窮恤患無間疎戚喜賔客善交際雖貴盛無崖岸貴賤小大皆歸心焉故聞其没也咸有嗟咨悼惜之意所著文章有黙菴集雲山小藳静軒藳退思集北征記訓子編藏于家元配劉贈夫人繼劉封夫人皆里處士仲穆之女子男六㳟讓錫賜貴芳貴通女七兵部主事雷潛詹鑌陳順德蘇潤其壻也餘在室孫男十二奏儼倫俊儉佶儆佐倧偉伷儀女七曾孫女二皆在室士竒與公同僚三十有九年同事四聖今内閣舊臣惟吾兩人未能退公又溘先余逝公之葬其子屬少保楊公書墓上之石余銘諸幽嗚呼凡今能文士大夫感公之德述公之行雖有之矣若交之乆知之深言之信余兩人其庶幾可無愧也銘曰桓桓文敏通才博識遭際聖明光奮于績承明延閣著作之庭以翺以翔舒華振英北邊西陲從狩萬里職典者文亦兼知武羌人胸臆將帥弱强重瞳屢顧敷奏惟明晚陟三孤貳公𢎞化恪㳟朝夕敢或遑暇帝懐敷仁鞠躬承之民懐被福黽勉成之志存寛惠行在果斷嘉謀讜議褒書有煥予告南旋曾幾何時上下延竚而訃奄來越昔内閣七人同事荏苒三紀我銘其四公壽考終哀榮寵光於乎文敏殁也不亡
