body:
  text: 明文衡巻五十四明程敏政編雜著宗儀九首有序方希古君子之道本於身行諸家而推於天下則家者身之符天下之本也治之可無法乎徳脩於身施以成化雖無法或可也而古之正家者常不敢後法葢善有餘而法不足法有餘而守之人不足家與國通患之况俱無焉者乎余徳不能化民而竊有志於正家之道作宗儀九篇以告宗人庶幾賢者因言以趨善不賢者畏義而逺罪他日於大者有行焉或者其始於此尊祖人之異於物者以其知本也其所以知本者以其禮義之性根於天備於心粹然出於萬物故物莫得而類之今夫形禪而氣續者人與物之所同也渴而飲餒而噉勞而瘁逸而嬉者人與物不相逺也卒之人貴而物賤者何哉人能知尊其身之所自出而物不能也故生而敬事之為之甘膬豐柔之味以飬其口為之華軟温美之服以飬其體為之采色以飬其目為之馨香以飬其鼻順其所欲以飬其心猶以為未至也於是飭身惇行以飬其徳令聞嘉譽以飬其名著其徳美於天下後世使之没而不忘乆而彌章君子之為人子孫非以飬生為貴而以奉終為貴非以奉終為難而以思孝廣愛為難藏于墓祀于廟自天子達於士隆卑廣狹不同而其致一也故天子七諸侯五大夫三士二官師一庶人薦乎寢自外為之制者由乎人孝敬之情出於天由乎人者不可踰也本乎天者夫寧有强之者哉天之命也人雖至昏弱也甚無知也過先祖之墓未有不動心者時焉而祀其先語及其遺事未有不嘆泣者形氣之感有所受之也非偶然也故宗廟之制祭祀之禮君子以此崇本反始致誠敬於其先㕓井之氓田則祭田祖不以歲之豐歉而變不忘其始也况於身之所自出者乎知有其身而不知身之所自出是謂禽犢之民知奉其身而不恤吾身之所同出是謂痿痺之民是二者雖色貎為人而其身物化也乆矣故人而不知本謂之悖不睦族謂之戾悖與戾惡名也世之立而談者天之所授與堯舜孔子不異由顔焉而顔由孟焉而孟不此之務而為惡民之求尚為愛其身也乎吾懼夫吾族之人為痿痺禽犢之歸而不自知也為尊祖之法曰立祠祀始遷祖月吉必謁拜歲以立春祀族人各以祖袝食而各以物來祭祭畢相率以齒㑹拜而宴齒之最尊而有徳者向南坐而訓族人曰凡為吾祖之孫者敬父兄慈子弟和鄰里時祭祀力樹藝無胥欺也無胥訟也無犯國法也無虐細民也無愽奕也無鬬爭也無學歌舞以蕩俗也無相攘竊姦侵以賊身也無鬻子也無大故勿黜妻也勿為奴𨽻以辱先也有一于此者生不齒乎族死不入于祠皆應曰諾然後族人之文者以譜至登下一歲之生卒而書舉族人之臧否其有婚姻相賙患難相恤善則勸惡則戒臨財能讓飬親事長能孝而悌親姻鄉里能睦而順此其行之足書舉書之累有足書者死則為之立傳於譜其有犯於前所訓者亦書之能改則削之乆而愈甚則不削而書其名族人見必揖雖貴賤貧富不敵皆以其屬稱喜必慶戚必弔死以其屬服無服者為之是日不肉而羣哭之羣祭之羣葬之重譜尊祖之次莫過於重譜由百世之下而知百世之上居閭巷之間而盡同宇之内察統系之異同辨傳承之乆近叙戚疏定尊卑收渙㪚敦親睦非有譜焉以列之不可也故君子重之不脩譜者謂之不孝然譜之為孝難言也有徴而不書則為棄其祖無徴而書之則為誣其祖有恥其先之賤旁援顯人而尊之者有恥其先之惡而私附于聞人之族者彼皆以為智矣而誠愚也夫祖豈可擇哉兢兢然尊其所知闕其所不知詳其所可徴不强述其所難考則庶乎近之矣而世之知乎此者常鮮趨乎偽者常多淳安之汪氏繇其身縁而上之至於魯公之族七十餘世皆有諱字卒葬若目見而耳受之者其心以為至博也而博不能勝其偽也越之楊氏親煬帝之裔而恥名之汙遂避而不言吳寧之杜氏越千餘歲而宗漢之延年晉之當陽侯是皆知本者之所深惡而為之者以為工也顧不惑哉天下有貴人無貴族有賢人無賢族有士者之子孫不能脩身篤行而屈為僮𨽻而公卿將相常發於隴畝聖賢之世不能傳其遺業則夷乎恒人而縉紳大儒多興於賤宗天之生人也果孰貴而孰賤乎四海之廣百氏之衆其初不過出於數十姓也數十姓之初不過出於數人也數人之先一人也故今天下之受氏者多堯舜三王之後而皆始於黄帝譬之巨木焉有盛而蕃有萎而悴其理固有然者人見其常有顯人也則謂之著族見其無有達者也則從而賤之貴賤豈有恒哉在人焉耳茍能法古之人行古之道聞于天下傳於後世則猶古人也雖其族世未著不患其不著也孔子子思以為祖而操庸嵬之行則其庸嵬自若也祖不能貴之也故吾方氏出帝榆罔而譜不敢列之顯于昔者衆矣而不附之疑者闕之以傳疑不可詳者略之以著實而惟以篤學脩身望乎族之人嗚呼富貴利達外至者也求之不可必得得之不可必守守之不能必傳也仁義忠信之道備乎心不求而足得之者可以行行之可以著施之盈天下而斂於身不見其隘傳之被萬物而非威武勢力之所能移善尊祖者思是道也行是道也天下不惟尊其身將歸徳於祖而祖益尊祖益尊而譜益傳斯其為孝大矣何必趯趯然為偽而欺且誣哉睦族井田廢而天下無善俗宗法廢而天下無世家聖人之立法所以收萬民之心而使之萃于一一者治道之極治功之盛不可忽也故一之所在智者無所措其謀辯者無所措其説勇者無所用其力如裘之領如網之綱如髪之握如輹之轂如馬之有轡如牛之有紖操之則斂縱之則放招之則集撝之則退屈信作止惟上之所令而民不能參以私先王之民非甚異於後世也其好義而易使從化而畏法寧死於饑寒而不忍為亂者豈碪斧鈇鉞所能禁哉敎之以其所固有故其向善也安令之以其所易知故其趨化也亟當是之時同閭接畝之人猶相親睦信順而大小宗法行乎宗族之間為百世之宗者百世宗之為五世之宗者五世宗之宗其身則守其訓有所猷為皆受命于宗子而悍戾爭鬬之風無自而起茍非大姦魁詐不可教令則安有不善者乎故三代之俗非固美也為治之具既美而習使之然也後世願治之主王佐之臣迭興於世而卒不足幾乎古豈民性之不可化邪其具之廢已乆世主便因循而憚改作材士昩逺略而務近功區區補弊苴漏而未及乎政敎之全也民心益離而俗愈㪚奚獨民之罪君子預有責焉吾嘗病之而未之能行則思以化吾之族人而族不可徒化也則為譜以明本之一為始遷祖之祠以維繫族人之心今夫㪚處於廬為十為百而各顧其私者是人之情也縱其溺於情而不示之以知本則將至於紛爭而不可制今使月一㑹于祠而告之以譜之意俾知十百之本出於一人之身人身之疾在乎一肢也而心為之煩貎為之悴口為之呻手為之撫思夫一身之化為十百也何忍自相戕刺而不顧乎何忍見其顛連危苦而不救乎何為不合乎一而相視如塗之人乎故為睦族之法祠祭之餘復置田多者數百畝寡者百餘畝儲其入俾族之長與族之亷者掌之歲量視族人所乏而補助之其贏則以為棺椁衣衾以濟不能葬者産子者娶嫁者䘮者疾病者皆以私財相贈遺立典禮一人以有文者為之俾相族人吉凶之禮立典事一人以敦睦而才者為之以相族人之凡役世擇子姓一人為醫以治舉族之疾其藥物於補助之贏取之有餘財者時增益之族之富而賢者立學以為教其師取其行而文其教以孝悌忠信敦睦為要自族長以下主財而私典事而惰相禮而野不能睦族没則告于祖而貶其主不祠富而不以敎者不祠師之有道别祠之不能師者則否廣睦人之親疎有恒理而無恒情自同祖推而至於無服又至於同姓愛敬之道厚薄之施固出於天而不可易然有親而若疎者有疎而若親者常情變於所習也閲歲時而不相見則同姓如路人比廬舍同勞逸酒食之㑹不絶則交游之人如昆弟使同姓如路人他人如昆弟斯豈人之至情哉物有以移之君子未必然而常情所不能免也聖人之治人以常人之情為中制俾厚者加厚而薄者不至於離恐其以不接而疎疎而不相恤也故為之祭酺之法合之以燕樂飲食以洽其歡忻慈愛之情恐其徇於利而不知道也肅之以鄉射讀法使之祗敬戒慎而不至於怠肆祭而酺所以為樂也讀法所以為禮也約民於禮樂而親者愈親疎者相睦此先王所以為盛也哉舉而行諸天下今未見其不可也然非士之職也故欲自族而行之鄉而為之制其制曰宗族歲為燕樂之㑹四其時則二月也五月也八月也十有一月也其物則時祀之餘也其品則豕與羊各一酒醴羞菓惟所有而不必侈也酒以七行九行為節也位以尊卑長幼為序也茍尊矣雖稚子猶位乎上也茍長矣雖貧且賤以齒也其言為孝弟忠信而勿䙝也勿譁也勿慢也飲雖醉而勿違禮也立子弟二人為執禮以佐酒酒至揖請飲既飲揖請醻既醻揖請殽羞二人歌詩其詩則蓼莪棠棣葛藟東門唐之杕杜谷風雅之黄鳥之類貴其能感人而敦倫理也其數則如酒也立二人講説嘉言古之人及乎教者皆在所取也將歌也將説也執禮揖曰請肅以聴皆拱而坐坐則肱相比行則武相銜舉爵飲醻食羞皆後長者畢則旅揖辭而退少者送長者于家然後返歲為禮儀之㑹三冬至也歲之初吉也夏至也冬至陽之始生也君子之道自此始亨矣宜有慶也是日昩爽舉族自勝冠以上咸盛服造祠下相揖趨及門祝啟門以次入序立以時羞獻奠酒皆再拜班趨出族之長坐别堂次長者率羣昆弟子姓捧觴稱壽畢皆拜遂以次飲酒相拜如禮典禮以譜至北向坐讀之長者命衆坐衆坐聴善惡之在書者咸讀無隠設席於南楹之東北向署其上曰旌善之位善之多者長者命之酒俾少者咸拜之典禮翼以就位署南楹之西曰思過之所惡之累書而不改者俾立其下於是長者以譜所列傳緒盛衰絶續之故明言之而告以常訓曰為善如嗜飲酒去惡如去毒螫慎思哉勿墜爾先祖之祀衆拱而聽皆俯首就班再拜出少者授長者杖以序行乃還于家夏至隂之始生也君子所宜慎也是日素服謁詞如冬至禮不飲酒不相拜讀譜之儀亦如之歲之初吉慶拜如冬至禮不讀譜鄉黨之制歳為燕樂之㑹一其時以秋其物以祭社之餘其坐以齒以徳以爵其禮主於讓其儀如宗族之㑹歌詩説嘉言亦如之其詩以伐木魚麗南有嘉魚菁菁者莪賓之初筵擇鄉人子弟羣歌之其誦嘉言也耆老之贒者舉以敎在坐者皆起應曰祗奉長者之訓凡族人鄉人不與于㑹者八悖倫紀者鬬爭者相訟者使酒而􅒬者博奕者過累書而不改者虐鄉里者言偽而行違者皆君子之所棄也不善者棄而後知所戒然後善者尊而益勸勸戒立而俗寧有不美者乎奉終愛敬以養生哀戚以送死墓焉而葬位焉而祭皆本於禮而不敢忽者先王敎民之通法也䘮而用浮屠之術葬而信葬師之説資冥報於不可致詰之間徴休咎於無情難驗之川阜上以為親謀下以為身利者此古之所未聞也後世闇夫野人多趨信而甘心焉親没于床不于禮而于浮屠不哭泣擗踊而于鐘磬鐃鈸非是之務則人交笑以為簡時可葬矣泥于山川之利否而不即葬或至於終身或身死而委櫘於子孫甚者子孫恐葬之禍其身舉而棄諸水火葬親以禮者世反非之為愚嗚呼是何其不察而至於此極乎彼浮屠之所謂輪回者果可信邪天之生人物者二氣五行也其運也無窮其續也無端先者過而後者來未嘗相資以為用者二氣五行之常也自草木而觀之發榮於春盛壯奮長蔚乎而不可遏及乎戒之以凛風申之以霜露昔之沃澤茂美一旦飄而為浮埃化而為汙泥蕩滅殫盡無跡可窺矣其發生於明年者氣之始至者為之也豈復資既隕之餘榮乎惟人也亦然得氣而生氣既盡而死死則不復有知矣茍有焚炙刲割佚樂適意身且不有而何以受之形盡氣盡而魂升魄降無所不盡安能入人胸腹重生於世而謂之輪回也哉天地至神之氣以其流行不窮故乆而常新變而不同使必資已死之人為將生之本則造化之道息矣烏足為天地倘或有之人固不知之也浮屠亦人耳何自而獨知之彼以其茫昩不可揣索故妄言以誣世夫豈可信而事其敎乎孔子謂祭之以禮為孝則事異端之妄棄聖典而不信者其為非禮也大矣不孝孰加焉而闇者顧安之而不以為非胡可哉葬師之動人以禍福而其説尤怪人之昌隆盛熾者其先必有厚徳之遺賤貧夭絶者必有餘惡之著山川何與焉誕者則不然聞有貴富之人於此則歸福於其塋塚曰此某形也此某徴也於葬之法宜爾也聞有貧賤之人於此則曰此葬之罪也此於法宜至於斯也信斯言也則人之多財而力足者皆相率而為不善及乎死也求善地以葬其身則可免子孫於禍夫孰肯為善乎由大者而論之繫乎盛衰者莫大乎國都殽函河渭無異也秦帝之亡漢帝之昌隋據之而促唐據之而長果在於善地乎帝王之尊家天下而役海内使地善而可興竭智以營陵廟奚求而不致而亡國敗主相屬則果不在乎此也審矣古之卜宅兆云者以神道定民志耳非視岡阜之向背逆順臆度目斷如世之葬師之為也葬師祖晉郭璞書其書茍可信璞用之以葬其祖考宜有竒驗不誣而璞卒死于簒賊其身不能福而謂能福乎人其可信否邪世之人多信之不知自陷於不孝而莫之贖也嗚呼先王之禮一失而流于野再壊而流于誣暨其大壞而不可為忽乎入于禽獸而不之覺也寧不哀哉天下之人其小者流為野由野而徃吾不能知其所至矣其心淫浸膠固非空言所能革也吾獨以告吾族人親䘮必以三年三年之制必循禮勿以浮屠從事違者生罰之死不祀于先祠葬卜吉凶而勿泥葬師之説期必以三月三月不能至五月五月不能至七月過一歲者如違䘮禮之罰必刻壙志墓銘力不足者刻其名俾後有考作方氏䘮葬儀務學學者君子之先務也不知為人之道不可以為人不知為下之道不可以事上不知居上之道不可以為政欲達是三者舍學而何以哉故學將以學為人也將以學事人也將以學治人也將以矯偏邪而復于正也人之資不能無失猶鑑之或昏弓之或枉絲之或紊茍非循而理之檠而直之瑩而拭之雖至美不適於用烏可不學乎夫學非為華寵名譽爵禄也復其性盡人之道焉耳彼蠕而動翾而鳴者不知其生之故與其為生之道是以物而不神㝠而不靈人之為學所以自異於物也匪特異於物欲異於衆人也匪特異於衆人上將合乎天地拔乎庶類之上而為後世之則也其説存於易詩書春秋三禮其理具乎心其事始乎窮理終乎知天其業始於脩已終於治人其功用至於均節運化涵育萬物大得之而聖深造之而贒勉脩之而為君子聖贒君子非天墜而地出人為之也舉夫人之身皆可為聖贒而乃不能異於物曷過哉不知務學之方也今世俗之儒申申而行由由而言滕口頰播簡牘以誇乎人知非不博言非不華矣而於古之學未也何哉為其泛而無本也漫而無統也可喜而無用也君子之學積諸身行於家推之國而及於天下舉而措之秩如也奚待詞説乎以詞説為學上以是取士下以是自期此士所以莫逮乎古也嗚呼無善敎而天下無善士無善士而天下無善俗世俗之陋其患豈㣲也哉余不欲學者之類之也方氏之學以行為本以窮理誠身為要以禮樂政敎為用因人以為敎而不强人所不能師古以為制而不違時所不可此其大敎也其小學曰七歲而學訓之孝弟以端其本訓之歌謡諷諭之切乎理者以發其知羣居而訓之和賜之以物而導之讓慎施扑楚以養其恥敏者守之以重黙木者開之以英慧柔者作之强者抑之扶之植之摧之激之而童子之質成矣其大學曰立四敎皆本於行行不脩者不與一曰道術二曰政事三曰治經四曰文藝一道術視其人質之端方純明知㣲近道者與言考其言行以稽其所進試其問難以審所造政事文藝其材之所能者無不學也二政事視其通明才智者使學焉治民之政八制産平賦興敎聴訟禦灾恤孤御吏禁暴悉民情知法意為政事本試以言授以事而觀其所堪三治經精察燭理篤信不惑而長講説者為之四文藝博文多識通乎制度名物立言陳辭可以為世敎者其極也試之日皆以終月皆欲其稱其教之名也敎之存乎師化之遲速存乎人得其人推而用之不難於天下夫豈一家之學也哉謹行士之為學莫先於慎行行之於人猶室之有棟柱也帛之有絲縷也木之有本也馬之有足也鳥之有翼也聖得是而後為聖贒得是而後為贒君子脩是而為善小人失是而不免陷於禽獸之歸夫焉可忽哉積之如升高之難而或敗於談笑為之於閫閾之内而或播於四海九州才極乎美藝極乎精政事治功極乎可稱而行一有不掩焉則人視之如汙穢不潔避之如虎狼賤之如犬豕幷其身之所有與其疇昔竭力專志之所為者而棄之矣可不慎乎夫口之便於甘肥體之便於華美耳目之耽於所思心志之趨於所樂家欲富而身欲尊者人之同情聖贒之所不能無也然而學道之士禁制克節惟恐是念之萌於中蒯衣藿食黜好寡欲終身而不敢怠者誠知輕重之分也人之身不越乎百年善愛其身者能使百年為千載不善愛其身者忽焉如蚊蚋之處乎盎缶之間夫蚊蚋之生亦自以為適矣而起滅生死不踰乎旬月當其快意於所欲以盎缶為天地而不知其所處之㣲昩陋之民亦若是矣迷溺於聲色勢利以身為之役而不以勞其心以為至樂也而不知其可悲也甚適也而不知其為汙辱也均之為身也聖贒之尊榮若彼而衆人之汙辱若此曷為而然哉慎行與否致之耳難成易毁者行也難立易傾者名也得之不能乆於身樂未既而憂繼之者人之欲也以富貴利達易汙辱之名猶食烏喙而易死也况倐忽接於耳目者之不足恃乎故人有殺身而徇君親者非不愛身也愛其身甚而欲納之于禮義其為慮甚逺矣寧死而不肯以非義食知義之重於死也寧無後而不敢以非禮娶知失禮之重於無後也僥倖茍冒於一時而䝉垢被汙於萬世小則閭里識之以為訾大則册書著之天下笑之聞其名則唾噦不欲入于耳計其所得曾不若秋毫而賤辱其身使孝子羞以為父正士羞以為友遺裔逺孫羞以為祖不亦惑哉且人不患不富貴而患不能慎行無行而富貴無益其為小人守道而貧賤無損其為君子吾家自始遷祖至於余身十五世矣以言乎貲産則不踰于中家以言乎爵禄則未有位乎朝者然而不愧于人見推于世者以先人世有積徳蓄學操行異乎恒人焉耳逺者余不足知之若曽大父西洲府君之純厚慤大先君太守貞惠公之亷介方正視古之贒者豈有閒哉吾族之人暨將來而未至者烏可不效也人莫不喜為名人之子孫而不知其尤難於衆人蓋徳大則難繼行高則難稱有善過於人人未之取也曰其祖之贒不但如斯而已有惡未著人已責之以為不肖曰若之祖何人也而為此哉故生於㣲宗庸族者過易隱而善易著以其特出掩於其先人皆異之故不求其備也生於世家者過易聞而善難昭以其先多顯人而不可企也嗚呼方氏之嗣人奈何而不慎乎君臣父子兄弟夫婦朋友五者天倫也斁天倫者天之所誅天之所誅人之所棄生不齒死不服葬不送主不入祠譜不書其名行和于家稱于鄉徳可為師者終則無服者為服緦麻有服者如禮祭雖已逺猶及雖無主祭者猶祭如是而不能為君子則非方氏之子孫也告于祠而更其姓不列于譜脩徳能為衆人所不能行之事者其子孫必享衆人所不能致之福人之為善非為子孫計也然天道之於善人以及其身為未足常推餘澤以福其後人則亦曷嘗不為子孫計哉第衆人之計速而易致而君子之澤逺而難醻故趨乎善者常少溺乎利者常多衆人每笑為善之士為迂緩無術而不知天道之所佑固在此而不在彼也天下無千載全盛之國無百年全盛之家天豈不欲有國家者乆而不墜哉或一再傳而失之或未終其身而不振得之於勞勩艱難之餘而敗之於談笑燕安之頃非其智力所不能徳不足而子孫無所藉以自立也人之生於徳善之家猶木之生沃土蚤發而易長華茂而後凋磽田瘠壠雖有萌蘖之滋拳曲擁腫終不足觀則所藉使之然耳今之人莫不欲子孫之蕃贒才之夥傳緒乆而不衰而莫能為善此猶不藝而欲穫也不獵而欲衣狐貉也孰從而致乎故富貴而不脩徳是以爵禄貨財禍其身也富貴其子孫而不力為善是置子孫於賤辱之穽爭奪之區而不顧也使貴而可傳則古之顯人與齊魏秦楚之君至今不失祀矣使富而可傳則趙孟三桓之裔有餘積而無憂矣然而皆莫之存何哉徳澤既竭而後人莫能繼也先人有千乘之勢萬室之邑不足恃也金帛菽粟盈溢廪廥不足恃也惟有餘徳焉為可恃而恃之者身必危可恃以存者其惟徳脩于身而不懈者乎徳有及乎數百年者有及乎百歲者有及乎當世者有及乎一鄉行乎一家者子孫之食其報也恒視所及為廣狹道術材略高世而拔類或見於事功佐明主除暴亂立法制或著於書以陳仁義政敎正人心於將亡遏邪説於欲盛此徳於數百年者也不能如彼之盛而其所為可以扶衰拯溺為百年所依怙者百年之所徳也又不能然而濟當時之難者當時之所徳也下此而盡力於一鄉行法於一家鄉與家賴之亦可以及其子孫俾不遽至於禍敗况其所及愈大則所利愈逺乎閭巷之士欲澤天下後世固非其職然因其身之所居以為其分之所當為奚為而不可也故事親而孝事長而弟族焉而睦姻焉而義慈㳟惠和不犯不忮以此守身而無愧者其徳可以澤其子推而行于鄉矜寡恤饑周人之所不及而為人之所難為其後嗣有不興者乎有位而立功學道而立言皆人所可致者孰謂吾族之人而不能為善人乎孰謂為善而果不可恃乎體仁天之生人豈不欲使之各得其所哉然而勢有所不能故託諸人以任之俾有餘補不足智愚之相懸貧富之相殊此出於氣運之相激而成者天非欲其如此不齊也而卒不能免焉是氣行乎天地之間而萬物資之以生猶江河之流渾涵奫淪其所衝激不同而所著之狀亦異大或如蛟龍小或如珠璣或聲聞數千里而或汩然而止水非有意為巨細於其間也而萬變錯出而不可禦人何以異於斯乎智可以綜覈海内而闇者無以謀其躬財或可以及百世而餒者無一啜之粟天非不欲人人皆智且富也而不能者勢不可也勢之所在天不能為而人可以為之故立君師以治使得於天厚者不自専其用薄者亦有所仰以容其身然後天地之意得聖人之用行而政敎之説起故聖贒非為已設也所以為愚不肖之資貨財非富匹夫也固將俾分其餘以補人之匱乏三代之盛是法行于朝廷達於州里成於風俗而入於人心是以天下無怨嗟之民乆矣其亡而莫之復也世之志義之士猶有推其所有餘行其所可為者其亦先王之所取者乎然非知本者不知其意之美也人之挾所長以虐同類由不知本故耳使知斯人之生皆本於天視人之顛隮陷溺與已無以異則民焉有失所之患哉余病乎未能而欲試諸鄉閭以為政本數百家之鄉其人必有才智貲産殊絶於衆者雖廢興迭出而未嘗無毎鄉推其尤者為之表使為二廩三學廩之法豐歲夏秋自百畝之家以上皆入稻麥于廩稱其家為多寡寡不下十升多不過十斛使鄉之表籍其數而衆閲守之度其九歲可得千斛以備凶荒札瘥及死䘮之不能自存者其入也先富而出也先貧出也視口而入也視産多者皆庚加息十一不能庚則否廩之左立祠以祠入粟多而及人博者祠之左右序掲二版左曰嘉善書其人之績版以朱書以青右曰愧頑版不飾書以白書吝而私者為表而不均者漁其利而不恤民者歲再集衆謁祠而讀之以為戒學之法各立師一人以有徳而服人者為之立司敎二人司過二人司禮三人鄉人月吉盛衣冠相率謁學暇則逰於學問乎師有違過者於師乎治悖敎不良者師與其罰其教法如族學之儀西伯伐崇為史者之言曰西伯之囚羑里崇侯虎實譖之及西伯得賜斧鉞専征伐而歸五年果伐崇侯虎果若其言是西伯挾天子之柄而報私怨也此必不然聖人之於賞罰豈嘗容心於其間哉觀人之善惡何如耳其善誠可旌也雖平生之所讎怨烏得不賞之其惡誠可誅也雖懿親近戚吾烏敢避焉著此法者非吾之所私有乃天子之法受之於先王而與天下共之者也竊天子之法賞無功則為祐惡罰無罪則為戕善此二者必誅於聖王之世紂之無道乆矣諸侯豈無不臣服者乎其以斧鉞賜西伯而西伯受而行之宜自不臣服者始必不悻悻然蓄私怨而圖伐之也崇侯之事逺不可知其詳矣吾意其人必比凶黨惡不供臣職於天子而侵害其輿圖殺虐其民人棄蔑其宗廟故西伯伐之必不以其譖己也茍憾其譖已是㣲量淺智之人齊桓晉文之流之所為豈足為聖人哉且羑里之事不經見史所稱獻美女善馬珍怪之説皆戰國之末好妄言者意構之詞非其事之實也妄言者見詩歌伐崇求其罪而不得遂誣其譖西伯以為伐崇之端而不自知其謬也西伯嘗伐犬戎密耆及邘矣則此四國者又豈皆譖西伯者邪故謂西伯伐崇者是也謂崇侯譖西伯以女馬賂紂得脱者皆非也曰然則史氏所述西伯之事亦有足信者歟曰惟獻地請去炮烙之刑者近之餘皆無足取焉耳武王誅紂余讀春秋見其紀時書事少者止一二言多者不過數十言斷斷然傳其所信而不敢肆竊嘗疑之以為當時史官所載必詳矣孔子曷不盡舉而書之奚為簡略若是哉及觀左氏穀梁公羊三子之傳各述其所聞甚詳或曲説以傳經或因經而構事肆情極論無復顧忌初若可喜徐而推之率多虛詞而鮮事實往往不足以得其要領而愈致人之惑然後知孔子謹嚴其詞若不敢盡者憂天下後世之至也孔子嘗繫易以辭矣反覆詰難至於理彰意竭而後止何獨於春秋而不盡其辭蓋道可以智窮而事必以實著與其徇疑而失實以為後世害不若著其可信者之為愈也故曰多聞闕疑又曰吾猶及史之闕文也此孔子之意也司馬遷之為史記其志以作春秋自儗亦非不知春秋者矣至於紀載往昔之事竒聞怪説無所不録而於三代之本紀多背經而信傳好立異而誣聖人其他㣲者未足論若武王與紂之事見於書最詳而遷乖亂之尤甚牧野之兵非武王王之志也聖人之不幸也武成載其時事但曰一戎衣天下大定不書紂之死者為武王諱且不忍書也他書謂紂自焚死意為近之武王之於紂非有深讐宿怨特為民去亂耳當斯時使紂悔過遷善武王必不興師而踰孟津及紂兵已北使紂不死而降武王必將封之以百里之邑俾奉其宗廟必不忍加兵於其身也况紂已死乎吾意武王見紂之死也不踊而哭之則命商之羣臣以禮葬之矣豈復有餘怒及其既死之身乎遷乃謂武王至紂死所三射之躬斬其首懸於大白之旗又斬其二嬖妾懸於小白之旗此皆戰國薄夫之妄言齊東野人之語非武王之事遷信而取之謬也漢髙祖魏文帝皆中才之主非有聖智之度髙祖猶能不殺子嬰文帝猶能奉山陽公終其身曾謂武王聖人而忍其君至此乎吾決知其不然矣茍信遷之言是使後世强臣陵上者葅醢其君而援武王以藉口其禍君臣之大義不亦甚哉吾故辨之以為好竒信怪者之戒畢命余讀周書至於康王之命畢公然後知周公之忠厚也殷之遺民可謂頑矣大者作亂小者驕淫奢侈不率法度禮不得而齊之徳不得而服之周公知其不可旦夕治也既欲加兵誅之又舉而遷之於洛其怒殷民亦甚矣然方伐叛也為大誥告四方自他人言之宜痛詆深誚不比於恒民而周公方申申焉告以天命之去就無一辭及其民之非多士多方一則言遷民之故一則言降四國民命不誅之由反覆乎夏商之存亡稱其民曰商王士曰義民而不忍少傷之夫周公豈不知殷民之頑哉終不斥之為頑民而曲為之諱避者聖人之慮至深逺也民莫不有是非好惡善未至於此而加之以善名則必喜而奮曰上之待我以善人也安敢不為善惡未至於此而加之以惡名則必怨而怒曰上之不以君子待我吾安用為君子故以君子望中人中人皆慕而為君子以小人望中人中人或失其恒心殷民固頑矣周公以王士義民待之彼欲不脩士君子之行得乎聖人之待人也恕如此宜乎未歴三紀而皆化也至於康王不知聖人導民之㣲權命畢公繼周公之職輒稱之為頑民舉洛邑之民豈無善者哉槩而謂之頑殷民聞之得無怨且怒乎號之以為頑而欲責其不為頑不可得矣然則周公婉辭和色化殷民為君子康王發片言而誣殷民為頑民文王武王忠厚之意至是銷鑠殆盡矣不然世之庸主無典則以遺後嗣者子孫䝉其遺烈猶可傳數世無亂以文武周公之大徳曷為不二三傳而遽㣲乎史稱成康為至治余謂周之衰康王基之明文衡巻五十四
