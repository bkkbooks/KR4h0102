body:
  text: 明文衡巻八十一欽定四庫全書明文衡巻八十二明程敏政編墓碑節婦葉氏墓碣銘胡儼歙有節婦姓葉氏諱徳夀百嵗而終既葬十有四年其曾孫順書其事來北京介予鄉人胡思名詣吾廬拜而乞銘將刻石墓上以昭懿徳示子孫辭懇而意誠乃叙而銘之節婦之父曰遷輔世為歙人生節婦甚鍾愛年十六擇壻得同邑江萊甫而歸之初歸江舅巳歿朝夕事姑惟謹㒺有闕遺相其夫辛勤以立家克盡婦道既十年萊甫卒節婦時年二十有六無嗣乃以其兄呈甫之次子榮為後榮在乳哺撫育盡其心及長敎訓之以義惸然閨門之内精純一心以率其下春秋祭祀之具長㓜衣食之需賔親徃來之禮皆經營於節婦不以煩其姑而人稱之元末兵亂奉其姑避亂山谷中服勞奉養未嘗面憂戚之色而姑安之國朝王師平禍亂乃奉姑還督僮奴營舊業土田日墾物産日滋而家益富姑卒喪祭如禮人尤賢之洪武辛未年八十有五郡邑以其事聞詔旌表之署其門曰江萊甫妻葉氏貞節之門仍復其家於是閭里有光子孫䝉休風俗用勸又十有五年而卒實永樂丙戌十一月四日距其生之年故元大徳丁未厯甲子五百九十餘世鮮矣以卒之年某月某日葬歙北新州之清平里祔其夫之墓子一人榮也孫二人長仁次祥女二人長適孫善古田知縣次適吕士賢曾孫三人長即順次堅次保女四人𤣥孫十一人曰善曰永曰惠曰文曰忠曰希曰政曰淮曰信曰杭曰勝女六人嗚呼洪範五福克全者難五福以夀為先夀登百齡尤難也世之人自身及子孫者有之及曾孫者為難至於見𤣥孫不尤難乎况婦人之行修於閨門人莫得而知至其終身則可知矣若節婦自少喪其夫守志以終其身始終如一日其享期頥蕃子孫揚休聲而垂世範者宜哉天之與善不誣矣銘曰金石之堅有時而折冰玉之潔有時而涅嗚呼節婦之志不可奪行皦皦兮女之傑身五福兮名不滅故翰林侍讀學士朝列大夫張公墓碑楊榮故翰林侍讀學士張公志道閩之先輩君子也其徳義學識為當時尊尚予恒以生晚不及親炙為恨公之孫隆以前刑部主事劉子欽所述行狀來請銘予讀之慨嘆先輩之不可及尚敢銘公墓乎然以隆之請堅確弗可得而辭也按狀公諱以寜志道其字也元贈禮部尚書諱留孫之孫中奉大夫福建江西行省參知政事諱一清之子其先有光禄大夫諱睦者自光之固始從王審知入閩始居古田之梅溪至公曾大父世延再遷邑之雲津坊一清先娶廖氏生三子頥興野俱㓜而廖卒繼娶陳氏有賢徳訓育廖所生如己出陳既有娠一夕夢小兒擎荷葉向月而拜覺而公生賦質清粹神采炳煜襁褓中即嗜讀誦甫六嵗日記千言嘗與羣兒遊寺中僧人難之以對隨口酬應意甚超卓聞者歆羨八嵗時人訟其伯父逮于獄公忿不能平詣邑伸理令異其言有條序命賦琴堂詩立就且出語新竒伯父由是得釋年十五承父命徃寜徳受學于韓古遺越五年方歸學業大進鄉之學者莫不推許之登元泰定丁夘進士第初任黄巗州判官不踰年以計擒捕海冦殆盡民賴以安繼陞真州六合縣尹有惠政及民以丁内艱去官服闋将上京師為兵所阻敎授淮南者十年王鈍石光霽皆其門人也後復徴至國子助敎累官至翰林侍講學士中奉大夫知制誥兼修國史祖考皆贈官祖妣賴氏母廖氏陳氏妻宋氏皆清河郡夫人既入國朝拜翰林侍讀學士朝列大夫知制誥兼修國史毎承顧問多所裨益賜誥褒諭恩賚特厚焉洪武己酉夏六月奉命齎詔印使安南封其國王未至而王卒國人請授其世子公不聽遣人請命于朝且敎其世子服三年喪並令其國人效中國行頓首稽首禮朝廷嘉之賜以敕書比之陸賈馬援並御製詩八篇以奬諭之未㡬得疾卒實庚戌五月四日也公生於元大徳辛丑四月十有五日至是春秋七十其在安南八閱月著書不少倦臨終自為挽詩意豁然也訃聞敕禮部遣官歸其柩所過有司設祭仍給在任三嵗禄以贍其家以某年某月某日葬邑之極樂山初娶太原宋氏生子四人烜燧煒煜繼娶大名宋氏生子炬烜燧煒早世煜以明經舉湖廣蒲圻知縣炬以茂才薦任江西新淦知縣官至刑部員外郎並著政績孫男七垣圻埴坦埏塤壇埏任南雄保昌儒學訓導更名隆煜之子也公所著文有翠屏藁淮南藁南歸紀行安南紀行集春秋春王正月考故翰林學士金華宋景濓瀏陽劉三吾皆稱公之文章瑰傑逈出流輩而非後學所及其尊敬仰慕于公者甚至予以末學又安能稱頌公之遺徳哉因不揆蕪陋而為之銘銘曰世徳相傳厥為名族固始徙閩肇于光禄積善流慶懋毓文儒鬱如喬松溫若美瑜富有才華早登科第􅏡厯中外英聲歘起際我皇明奉職詞林用宏禆益恩眷彌深使節煌煌遠臨交阯夷俗丕變龍顔以喜寵命方降訃音遠來天語興嗟失茲良材爰歸其柩復䘏厥家生榮死哀綽有光華墓門有碑以昭厥徳維公子孫永世承式太子賔客國子祭酒兼翰林侍講致仕胡先生墓碑楊溥正統八年八月廿七日太子賔客國子祭酒兼翰林侍講致仕胡公頥菴先生卒訃聞詔遣官諭祭命有司營葬制得立碑其子􅌔昭奉江西㕘政張君居傑所述行狀走京師請文余與先生有斯文之誼不可辭先生諱儼字若思世居臨江之新淦元末徙南昌先生天資穎悟自幼好學受經於伯父虞部員外郎汝器及㳺鄉校從郡中諸先輩講學若書若琴若詩文皆有傳授既長博極羣書至於天文地理律厯醫卜皆通其説先輩皆稱許之以書經中洪武丁夘鄉試第二明年㑹試中副榜授松江華亭敎諭以内艱去丙子改授長垣縣上疏乞近便養親詔許之改饒之餘干自是著為令己夘以薦陞安慶桐城令壬午太宗皇帝入正大統聞先生名召試之稱㫖特授翰林檢討尋陞侍讀直内閣朝廷推恩封其父母妻室永樂甲申陞左春坊左諭徳兼官如舊是年九月拜國子祭酒庚寅上北征命以祭酒兼侍講掌翰林院事輔導皇太孫監國洪熙元年以疾辭加授太子賔客致仕此其厯官也先生筮仕華亭時尚少而能以師道自任勸勉諸生務實學勵行檢以變浮靡之習日親講授每至夜分雖隆寒甚暑不廢華亭長老皆稱重之謂先生必大用其在餘干如華亭時士子樂從之成效居多宰桐城以愛民為本凡可便民者以身任之民間積年逋負悉與奏免邑中虎為害傷民物乃齋沭告于神虎遂滅跡表朱桐鄉墓俾民奉祀嘗督漕運次三山值大風雪遇中流有覆舟命僕夫援之活其被溺者三十餘人捕蝗途中見饑餓病者悉命里胥扶掖就民舎給以藥食是夜大風雨得免暴露存活數百十人入翰林時朝廷選任儒者若江右解大紳胡光大楊士竒金幼孜永嘉黄宗豫福建楊勉仁一時共事者七人先生在衆人遇有顧問必從容審度而後對未嘗以才智先人時論多之及兼宫僚在講筵凡古今治亂得失必反復敷陳以圖裨益以外艱去詔奪情道過南京見東宫詢及民情所對皆切時事為祭酒以身率諸生奉守學規以圗成效一時人才翕然從化朝之公卿大夫咸推敬之時國子生有以故告歸者皆坐戍邉先生為言其情有可矜者乃得免先生雖掌國學朝廷有大制作若纂修太祖皇帝實録及永樂大典天下圗誌諸書皆為總裁未嘗去館閣令桐城時嘗為湖廣鄉試考官其去取有公論在國學遇太宗皇帝幸太學御彞倫堂賜坐講經賜賚優厚縉紳榮之此其宦績也乞致仕賜璽書褒美復其子孫賜寳楮為道里費仍命有司給舟車還先生閒居廿餘年日與學者講求性理之學親藩禮遇之方岳重臣咸待以師禮而先生未嘗一言及私自處甚淡薄嵗時僅足衣食嘗表許遜韋丹廟請春秋致祭修白鹿書院此其處退閒之有道也先生達於報施之理凡處是非利害可否之間必審度以求至當惟恐貽患於人羣倫中有不合即引退不與辯以故所至能全交此又其守身之概也其為文以理為主不尚辭藻所著有頥菴詩文若干巻行於世考直翁累贈朝議大夫贊治少尹國子祭酒兼翰林侍講妣王氏累贈恭人配張氏累封恭人嘗受命婦冠服之賜子男三曰玘早卒曰暕曰昭女六人曰淑柔適劉瑱曰淑熈先卒曰淑美適王恒曰淑哲適毛宣曰陽貞適李超宗曰慶貞適孫景賢皆士人孫男四人諲詢訥詵孫女四人曾孫男二人先生臨終命斂以時服嘗卜城南懸榻里為夀藏明年閏七月二十五日葬之門生楊溥為之銘曰繄古有君子觀光于朝為國之賔及老而歸儀式後學師道聿尊是為鄉先生殁而祭於社噫先生其人也故通議大夫工部右侍郎羅公墓碑銘王英太宗皇帝以聖神文武之徳入正大統制作禮樂修明典章興舉政事尤夙夜孜孜廣求賢才以圗治理嵗甲申廷䇿進士得四百七十二人取士於斯為盛而選入翰林績學以俟擢用者得二十八人當時以為遴選之至與其選者吉水羅公尤卓然有所抱負者也公諱簡字汝敬性穎悟方七八齡賦詩輒有竒句稍長受經於仲兄汝宏窮探博究旁及百氏之書學以大進補廬陵邑庠生遂舉于鄉第進士與選入詞垣是時嘉祥疊見朝臣多獻詩頌公所作長篇短章詞氣浩然超出同輩擢翰林修撰扈從車駕廵幸北京所經山川風俗多有歌咏九載陞侍講修髙廟實録賜襲衣寳楮仁宗皇帝臨御天下公言時政十五事降雲南道監察御史且令掌道葢公所言過直故降官然亦以其敢言有學識使厯風憲可大用也公執法持正理寃獄多平反者宣考嗣位交阯黎利弗靖成山侯王通等用兵無功陞公工部右侍郎與李琦等齎璽書諭利未至而通與利和自率衆出境矣衆止公勿徃公曰王通師敗辱國我受命諭賊可退縮不進乎賊雖凶暴必不敢拒詔與琦亟馳至其國宣上恩意利惶愧率其屬拜自首其過遣使獻金又奉表詣闕稱謝且請立陳氏之孫暠復命公徃立之既至利以暠已死乃張筵列女樂設宴公叱曰暠死爾國人安可淫樂盡擊破其尊罍樂器時天晴忽隂雲起大雨雷震焚利居室利懼貢方物表謝還朝督兩浙漕運奏減荒田稅糧陜西言邉地腴田為權豪占奪致糧儲不充士有饑者命公徃理之公劾守將之貪暴者取田為權豪所占者經度頃畝均與細民糧賦倍加邉儲充足増置倉庾立輓運之法省民勞力又奏置河渠提舉官専掌水利而邉臣不得為姦利者輒加誣謗公還朝言之詔勿問命公復徃今聖天子即位之元年西方有寇邉者遣將追捕公督糧餉至紅子城之地忽遇寇飛矢如雨中公左膊墜馬寇環聚以鋒鏑加其身欲害之一老卒與衆疑語良乆乃舎之而從行吏卒皆被害方公之遇寇也運餉者遥匿草澤中見衣緋者數人在公左右若衛䕶之狀及公無恙咸以為神助云公在陜乆有言其多疾者召還賜致仕及賜鈔給驛舟還鄉時正統三年五月也後一年十月二十五日終享年六十有八訃聞上遣官賜祭葬里之竹園陂山考養䝉先生墓之左也公質修偉多髯剛果善裁制繁劇與人論議或異已輒叱咤而其中垣夷不匿宿憾事親孝謹處兄弟和敎子姪嚴交朋友以義為詩歌文章下筆如長江大河滔滔不止遺藁悉藏于家羅之先居錢塘中葉諱軿者為吉州刺史因家郡城之印岡再世徙吉水之桃林宋寳祐間諱某與其子某同登進士所著有鶴林玉露傳於世至公之曾祖諱某祖諱時中俱有學行時中贈工部侍郎父諱養䝉號耕樂翁工於詩詞累贈通議大夫工部侍郎妣李氏與祖妣蕭氏俱贈淑人公娶李氏蕭氏子四人斆先卒次􅏡敏致孫男八人曾孫男三人曾孫女二人公致政而歸也杜門不出以吟咏為樂而鄉人以公仕乆多蓄積嗇於散金及沒棺斂之外囊篋枵然皆歎其操守不可及也公之諸孤既奉狀以墓碑為請而從子孝感縣令勉學來京師泣而言曰先叔敎養諸姪其恩不敢忘刻碑當竭力其請益至予與公同年同選入翰林同官于朝相知最深誼不敢辭銘曰於皇太宗聖徳隆崇儒用賢昭治功詞苑濟濟來羣龍公志卓越先奮庸擢職太史文最工播厥歌頌聲渢渢一封諫疏達九重要簪豸角馳青驄臺端凛凛生威風司空貳卿品秩崇持節逺厯銅柱東蠻獠稽顙俱服從經理西陜勞厥躬田疇均一兵餉充中遭敵衆如聚蜂神庇公不罹其鋒歸休林壑巢雲松安榮佚樂以令終竹園山髙馬鬛封巉巖千仭石可礱刻銘昭徳垂無窮河南布政使司左布政使李公墓碑銘錢習禮太宗文皇帝入正大統首下明詔搜揚側陋思得天下材智之士以共新治道而尤嚮用儒術永樂癸未廷試取士四百七十二人在位二十二年凡以科取士而咸稱是科得人為最盛河南布政使司左布政使李公昌祺其一焉公少負材器志於用世繇郡學生以明經取進士第簡入翰林為庶吉士性素介特至是益自檢飭達官勢人未嘗謁之私第㑹修永樂大典禮部奉詔選中外文學之士以備纂修公在選中例凡經傳子史下及稗官小說悉在收録與同事者僻書疑事有所未通質之於公多以實歸推其該博精力倍人辰入酉出編摩不少懈退復以其餘力發為詩文應人之所求者皆典贍非茍作隠然聲聞館閣間書進被宴賚擢為禮部主客司郎中部凡四司主客視他司最煩劇官難其人公以明敏濟之不怠剸治其間庭無留事退視其私一室枵然無長物俸不足以供費泰然不以屑其意堅苦礪節時流少與為比尚書吕震有巧佞材倚被主知狠愎自用専以嚴憚下人羣吏莫敢仰視慢易僚佐少忤其意者輒中傷之衆皆側目而待公特異有所承禀色詞俱溫始終不少衰駕幸北京仁宗以皇太子監國兩命權知部事行在吏部奏藩憲員闕太宗命簡兩京朝臣有材望者補之仁宗舉公等若干人應詔宴于禮部予道里費至即陞為廣西左布政使朝野榮之廣西地極南徼谿洞猺獠時出剽掠邉氓苦之公至而威望凛然狙伏深阻不復出為民患境内晏安政務修舉尋丁外囏去官吏民皆追思之服除入覲仁宗在位言于朝曰此佳士良不易得在列竦聽退而相與嘉歎不已先是河南連嵗旱蝗民多死徙太宗震怒被災郡縣有司不以上聞者悉逮寘于法思得人以撫安其民改公徃涖河南被命即就道既至宣布主恩疏滯舉廢捄災䘏患憫下窮䋲豪猾去貪殘方岳之政所當舉者悉盡心焉質明起眂事日入方息居數月政化大行聲績茂著後丁内囏歸服喪河南荐饑本司累奏起公治之宣宗命奪喪乘傳赴官為治如初勤勞倍之因感風疾徃徃増劇不待引年堅乞致其事詔報可之既歸而先廬僅庇風雨服食清約如寒士伏臘不充處之裕如居雖密邇郡城足跡未嘗至公府守長於政務有所咨決極言無隠因其言民隂受其惠者居多病間輒書不去手吟咏自娯逺近有求文者應之不倦一日疾革遺訓二子惟以力學修身為言餘無他語翛然而逝時蓋景泰壬申二月二十五日距生洪武丙辰六月二十六日夀七十有五公諱禎昌祺字也僑菴白衣山人運甓居士其號也李氏世家金陵宋南渡有諱義者仕為郎中扈從隆祐太后南上留居吉水之烏江元時諱某者自烏江徙居郡城之吉陽門又徙今之螺川巷因為廬陵人曾大父道華大父充國皆隠不仕而以行義稱父伯䕫力學工詩名聞當時母劉氏公生資禀英悟早即嗜學成童屬對賦詩語出驚人弱冠為文藻思溢出蔚有老氣不惟一時材俊若禮部侍郎曾公子棨輩相與頡頏名聲不相上下鄉之老成人亦皆駭其文識謂必顯於時平生所著詩文有藁若干巻藏于家平居孝弟友順出於天性恤孤赴難皆盡其力元配艾氏繼配劉氏皆有淑徳艾氏早世女一人以妻郭孚俊劉氏子二人長曰宣次曰定篤志力學克傳儒業今補郡學生將決科取仕矣女二人以妻陳雅量朱貞符孫男五人女六人墓在縣之紫雲山招義院之西從先兆也定奉事狀來謁銘以刻諸墓隧之碑於乎昔之所謂大臣者委身徇國夙夜憂勤以任天下之重遑恤其私故宋杜正獻公身至大拜歸老無屋以居寓於南京驛舎范文正公晚參大政妻子僅給衣食至其殁也家無以為喪公任牧伯身寵家溫固其宜也而乃俛盡厥職空乏以終其身所謂貴而能貧揆之二公夫何媿哉眂彼顧利冒恥不為公議之所右者其賢不肖何如哉因定之請論次公之里系官閥蹈履之詳為銘以刻諸貞石又何媿詞銘曰聖明御極宵旰渴士天心純佑俊乂雲萃奮庸于朝布列有位效其智能稱厥任使公起茂科立躋顯仕兩典大藩所至稱治去其煩苛涖以簡易招徠罷氓奠安田里震疊遠夷綏靖邉鄙惠洽羣黎威憚健吏威惠並施本仁輔義夙夜孳孳弼成化理先民有云國之利器牖下告終得正而逝螭蟠豐碑表厥墓隧昭其民庸垂示永世明文衡巻八十二
