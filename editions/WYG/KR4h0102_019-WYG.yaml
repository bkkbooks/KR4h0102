body:
  text: 明文衡巻十九明程敏政編頌平江漢頌宋濂天命皇上為億兆生民主旌麾所向悉臣悉庭初以一旅之師興濠泗間遂撫淮南平江東攻浙東西下之版圖所入方數千里定都江左發政施仁戴白之叟垂髫之童涵泳至化皥皥熈熈如承平時于時陳友諒據有江漢之地僭居大號賊殺其主飭修艨艟虐驅烝黎如蹈水火不自度力又集蜂蟻之衆直窺豫章三月不解皇赫斯怒乃召羣臣於庭而告之曰陳虜不道敢屢予侮昔者蕩揺我邊方侵軼我姑孰伺偵恥慶切候也我金陵賴爾一二臣隣之力攻而敗之予亦親覆其穴巢中宵竄走假息武昌予不忍追殱之冀其悔禍以自逭於天刑癸卯之夏乃復圍我豫章是其㓙惡無厭自取殄滅此天亡之時天之明威予不敢不順唯爾熊羆之臣不二心之士尚弼予以成厥功羣臣曰都於是右丞臣達叅知政事臣遇春帳前親兵指揮使臣國勝同知樞密院事臣永忠臣通海備厥戎器簡厥師徒以俟七月癸酉上躬擐甲冑禡師祭也纛龍江帥樓船數百蔽江而上陳虜大讋解圍而逃丁亥與我師遇鄱陽湖之康郎山戊子上分舟師為十二屯命達遇春永忠突入虜陣呼聲動天地矢鋒雨集砲聲雷鍧波濤起立飛火照耀百里之内水色盡赤焚溺死者動一二萬流屍如蟻滿望無際己丑焚偽平章舟刈戮餘二千辛卯復酣戰虜將張定邊素號梟猛上親禦之將士皆死戰歴一二時遇春等左右夾擊殺士卒無算張中矢百餘而退潛保鞋山不敢吐氣我師亦據湖口扼彼喉襟列柵南北江岸置大筏中流水陸嚴戒以候其發八月虜食盡遣舟五百艘掠糧都昌又為我大將所獲壬戍虜計窮冒死突出將上趨九江上命諸將一時俱合其大戰如戊子自辰達酉督戰益急友諒中飛矢斃於舟中癸亥降其衆五萬上命釋之不戮一人凱歌而旋舳艫相銜旌旗飛翻不疾不徐委蛇而來萬姓歡迎俯伏道左山川草木皆有喜色告廟飲至行賞論功賜遇春田若干永忠田若干其餘將士賚金繒有差臣稽在昔曹操治水軍八十萬來攻孫權而周瑜黄蓋敗之於赤壁苻堅發長安戍卒六十餘萬騎二十七萬以侵晉而謝𤣥謝石敗之於淝水然赤壁不過一焚而走淝水亦不過軍亂而奔初未嘗大戰也而史臣且書之以為千古美談矧今湖口之㨗血戰累日天地為之晦㝠日月為之無光山河為之震盪其神功駿烈炳耀鏗鍧與天無極較之二國未足多讓而歌咏不作非甚闕典歟臣謹備著其事撰為詞頌一通以流鴻績於無窮以俟太史氏之采録云其詞曰天眷有德實為哲皇肆其神略以靖寇攘義旄東指罔敢弗恭風烈虎嘯雲游龍驤長淮既歸江左攸屬浙之東西樹侯置牧乃建國家以奠南服以懷中原以控西蜀蠢爾小醜敢讐大邦集其兇頑鋒蝟斧螗輕涉我疆以跳以踉亦既翦刈僵骸覆江洊齊六軍直傾其穴釋而勿誅俾自懲刷闔胡不然復豕而咥翹其蟲臂當吾車轍皇明震怒歴告在廷是決不悛命將往征爾選舟師爾整甲兵漕爾糗糧各罄爾誠揺光在中夷則之月禡牙江濵皇秉巨鉞以誓以戒以速其發紀律精明飇火奮激旟旐揚揚艂漢江切艭忻江切將將矛戈洸洸鎧胄明明載怒載厲載飛載颺雄威所吞已無荆湘既與虜逢大呼衝擊藥騰藜駁星流火㦸虐燄電奔巨轟雷劈殺氣冥䝉不辨咫尺矢鋒所貫什伍聯聯縱横交紐命隕弗顛攅桅凑颿筍束蝟編流尸塞川舟行弗前虜魄既褫扶創而逸聚於湖奥僅存喘息我方植柵江之南北大筏在流掩蔽如翼越歴四旬飛走途窮將冒萬死以絶其衝我師見之千艣如龍似兔之走而鷹之從酣戰六時由辰達酉僕姑矢名也一發殪此冦首貫睛及顱仆若枯栁大憝既除餘不能醜遞相告言我誠不振我革我頑我歸至仁誰謂培塿可髙嶙峋再拜稽首來降來臣皇曰俞哉汝俘予受宥汝弗劉予汝父母汝凍予衣汝饑予哺昔何昏迷今始撤蔀奏凱而旋騎吹欝揺形於樂歌節以鐲鐃飲至於廟頒賞於朝帛堆其家肉登其庖都人聚觀舉手加額或嘆或謡有聲嘖嘖干戈相尋匪一朝夕自今昇平可坐而筴惟皇神武動則克之羣策盡屈四方式之惟皇寛慈降則釋之義聲動盪疇能敵之惟皇明斷遇事即決洞見千里不隔一髪所以西征成此駿烈小大畢朝孰敢肆孽在昔赤壁洎乎合淝事以幸集尚傳策書况兹之功俊偉赫熹揆古無讓可無咏詩臣雖微賤文字是職對揚皇休并獻臣臆三代以還用仁興國皇宜遵行永作民極膏露頌洪武二年冬十月十有三日甲戍膏露降于乾清宫後苑蒼松之上皇帝勅中官折示禁林諸臣光潤如酒凝結如珠肪白飴甘彌布松柯馨烈之氣鬯達左右勃欝淋漓薫涵太龢天休震動中外嘆嗟又明日丙子上御外朝左丞相宣國公臣善長帥羣臣稱賀上若曰甘露之降載在往牒然休咎之徵當以類應朕惡足以致斯卿等尚明為朕言之參知政事臣稼對曰聖人之德上及太清下及太寧中及萬靈則膏露呈瑞陛下敬恭天地輯和民人故天不愛道而嘉祥徵顯也起居注臣觀對曰帝王恩及於物順於人而甘露降陛下誕寛民賦衆庶驩豫底于敉寧神應之臻職此故也翰林侍講學士臣素對曰王者敬養耆老則甘露降而松栢受之尊賢容衆則竹葦受之今露降於松則陛下養老之所致也宜以制幣策告宗廟頒於史館以永億萬年無疆之聞上情存損挹皆推而不居言既已丞相帥其班以退翰林學士臣濓竊伏自念氐北有星名為天乳若明而潤則膏露下焉王者德格於上恩覃於下靈氛充牣秘貺斯甄此天人感應之常理也欽惟皇上興自臨濠匹馬渡江十五年間遂成帝業天瑞育滋不一而足彩霞成鳯卿雲聚繡赤烏飛翔白兔俯伏瑞蓮並荂嘉木孕文實皆天之所命非人力所致而自至者今又覩兹聖徵則其德洞淪㝠功成不宰三瑞沓至千休滋彰有不期然而然者矣雖然傳有之受命不于天于其人休符不于祥于其仁所以孔子之作春秋祥瑞不書而有年則書豈不以天道𤣥逺難知而人事之為可徵者乎皇上以天縱之聖留神至治以得仁賢為瑞以五風十雨為祥視彼前代植金莖以承液夸嘉瑞以紀年者未嘗不指以為戒則其英明之識超絶之智卓冠百王為法萬世是宜美盛德之形容播諸樂歌被之管絃以示聖子神孫於無窮云其辭曰上天降康甘露之瀼於粲其英純乾發自陽以布於下方凝於休祥其祥伊何靈氣孔多有甘者液載仁推澤潛靈是錫誕啓皇之德天地相合鴻休翕集厭厭浥浥紛紛密密匪隨日以食兆厥聖徵如卿之雲如景之星如日之重輪沖和氤氲以文我太平惟皇之聖貞符自應不卑而泳不髙而迎茀禄之攸盛惟皇之明貞符爾承不欹而傾不怯而盈茀禄之攸寧休慶之即四國之式有濯厥聲耀于千齡嘉𤓰頌皇明式于九圍德漸仁被和氣薰蒸靈物效祥乃洪武五年夏六月嘉瓜生於句容張觀之園雙實同蒂圓如合璧竒姿分輝紺色交潤誠為曠世之産壬寅京尹臣遇林函以素匭圖其形於上移文儀曹請以奏聞癸卯尚書臣凱等奉𤓰以獻時上御武樓中書右丞相臣廣洋左丞臣庸同知大都督府事臣英御史中丞臣寧翰林學士臣濓咸侍左右天顔怡愉重曈屢回良乆乃言曰徵之往牒其事云何丞相奏言漢元和中嘉𤓰生於郡國唐汴州亦獻嘉𤓰禎祥之應有自來矣陛下勵精圗治超漢軼唐故天錫之珍符太平有象實見於兹上謙讓弗居俄以靈貺之臻復不可不承乃詔内臣置諸乾清宫翌日甲辰薦諸太廟臣濓退而思之夫𤓰蓏力果切草實在地生之屬也其蔓逺引其葉阜蕃諸傳有之神𤓰合形表緜緜之慶此固兆聖子神孫享億萬載無疆之祉况𤓰之所出本於回紇中國討而獲之故名為西方今皇上命大將軍統師西征甘肅西凉諸郡俱下而𤓰沙已入職方行見西域三十六國同心來朝駢肩入貢天顯叶瑞其又不在於兹乎然而異畝同穎周公作歸禾之篇三秀合圖班氏有靈芝之歌矧此嘉植含滋發馨昭宣我神應焜煌我王度寧可喑於金於甘二切啼極無聲黙而遂巳乎顧臣駑劣不足以美盛德之形容謹上其事願宣付史館以備實録復繫之以頌頌曰乾道載清坤維用寧保合太和發為休禎句容之墟物無疵癘神𤓰挺出殊實同蒂𤓰孰非單此合而生二氣毓質雙星降精蜜房均甘氷圭競美明月重輪彷彿堪儗豈無賔連産於户東叶疇若兹𤓰恊瑞聯祥亦有華平張翠作蓋疇若兹𤓰交輝映彩其兆伊何蘿圖緜延西域既柔德冒八埏羣臣曰都載拜稽首神休滋彰天子萬夀粤從啓運靈貺疊甄兩岐麥秀合柎方無切花蕚足孕蓮矧此貞符近在輦轂王化自邇逺無不服帝曰吁哉朕猶歉然瑞當在人物胡得專使物為祥宜獻清廟自我先人積慶所召孰瑞不矜帝則弗居唯親是思我民之徒以實應天斯乃盛德小臣作頌以示罔極鳯陽府新鑄大鐘頌皇帝既正大統建都江表德綏威讋萬邦咸臣用羣臣奏臨濠為龍飛之地賜名曰鳯陽南北民大和會百族錯居動十萬數然而物大而盛不假器齊一之無以嚴昏旦之禁乃詔江隂侯吳良監鑄大鐘以定衆志以禆治化侯之受詔遣使者至富春山中徵金工何成諭以天子明命即日帥其屬十六人以從相地鳯陽城東三里搏泥成範畫其銑甬衡之度侈弇為良篆帶以方候其燥剛始穿一十又三鍊青赤銅六萬五千斤筮以洪武乙卯冬十一月己巳蒞事厥明侯具法服以牛一羊一豕一祝告先冶之神禮既成槖籥咸興鼓動風氣炎光赫曦上貫霄漢絳液既澄氣憤雲洩循竇而入肅肅有聲陽施隂凝勁質斯具越二日辛未乃發復取牲血塗其釁隙以厭除不祥鐘髙十六尺有五寸厚六寸徑十尺有五寸圍三十四尺有竒混融其輪圓􅂱􅂱其容輝信技殫於人巧妙奪於神功者也於是營構層臺副以簨簴聚千夫之力鉅絙而登之一杵之撞隠隠闐闐雷旋電奔震撼太虚遐邇聞者靡不聳愕會濓扈從青宫幸鳯陽親觀盛美侯遂請濓為之頌濓聞先王之世金部有七黄鐘乃樂之所自出而景鐘又為黄鐘之本所謂景鐘大鐘也其受至於九斛而止律吕由是而應隂陽由是而均夫豈細故也哉秦漢以來寖失其制小鐘或數尺大鐘或容千石皆不本於律度今我熈朝稽古右文定於中制宣導天地孚洽神人中和所致嘉瑞畢恊增拓化原亦於是乎有賴非特嚴昏旦之禁而已濓待罪國史以文辭為職業義當發揚蹈厲以鳴國家之盛侯之有請不敢固辭頌曰維天穆清皷以雷霆適昭天聲百物以生維帝濬哲法天之烈大鏞斯揭元氣噴洩睠于濠梁真龍飛翔乘隂御陽洗濯八荒神物攸起是為帝里從者如雨於焉萃止物大而豐往來憧憧節之以鏞罔敢弗恭乃飭鳬氏乃具爐錘乃烹乃鬻化金為水赤氣夜明如日之升流亟而赬入竇有聲彬彬斐斐功同神鬼不鉏不鋙輪圓順軌既啓其型敢愛斯牲塗釁禮成榮光如星千夫齊力臺構懸植交扛孔奭載考載擊宅兮囷囷觸兮賁賁摩乾盪坤以警昕昏發攄靈氣昭融品彚物無疵癘年穀攸遂愽碩而龎聲與正通拓美集祥熏於家邦惟皇建極福之敷錫制器有赫式和民則稽樂之原鐘實為先律吕以宣功垂不刋小臣作頌有美無諷爰咨于衆是傳是誦瑞麥頌并序劉基天厭元德九州糜沸羣猾並作黎民惶惶奔走無路皇帝提三尺劒奮起草萊指顧之間豪傑景附矛鋒所向戰克攻取皇帝心知天意之有在爰舉有衆以與萬姓請命一征而取荆襄再征而清浙江三征而閩海率從四征而席巻全齊五征而定周及梁遂取秦晉舉燕趙南交北貊東陲西羌海外之邦莫不望風遣使奉朔稱臣拜伏闕庭於是民獲所歸上下神祇咸有依託慶雲甘露洊奏禎祥帝心謙抑毎讓弗居洪武三年五月陜西寳雞縣進瑞麥一莖五穗者一本三穗者三本兩穗者十有餘本蓋自兵興以來王保保據周宋李思齊張思道據秦燕晉趙齊梁之間大豪小猾或憑城郭或聚山寨皆假元為名分割境土擅兵相攻於是燕晉周秦之地彌數千里連歲無雨百穀不生民相殺食且盡今年夏四月王師奏㨗於蘭州朔漠掃清關隴底定天乃大降甘雨滋為嘉瑞和氣致祥不亦昭哉周頌有曰綏萬邦屢豐年天命匪懈傳者謂商之季年比歲旱荒至周武王克紂受命而天下遂獲豐年由今觀之信非誣矣漢謡以麥穗兩岐歌其太守之美政則是兩岐之麥世所希有而况於三岐至五岐者頌聲之作弗可闕也頌曰神雀赤烏其羽不可以為儀紫達平露其實不可以療饑豈若五穀之為瑞可以厚民之生豐國之資者哉元失其鹿天下共逐擾擾紛紛强食弱肉皇天振怒誕命真主肅將天威以靖區宇騎士如雲猛將如龍發縱指示悉出帝衷既平南東遂定西北民居攸奠品物咸植爰有嘉麥一本三岐布葉萋萋結實離離既齊既平先百穀成擢穎揚芒金支翠英溥彼原田滃若雲烟望之油油即之芊芊其種伊何降自穹昊其瑞伊何豐年之兆豐年穰穰頌聲洋洋其始自今奕世無疆祀方丘頌維洪武三年五月二十日戊申日北至皇帝將祀地祗于方丘乃先期九日潔齋於舊宫詔百僚集射西苑命之曰古人有言惟德動天惟誠感神故射以觀德誠於中者必形於外不可掩也惟爾庶官各一乃心以致其誠毋替朕命羣臣自左丞相宣國公以下至於有司百執事皆拜手稽首曰敢不欽承天子之明命維大江之南土毎夏四五月多霖雨少霽是歲雨作連日至十有七日乙巳皇帝御法駕率百僚告于太廟遂居於齋宫雨勢未巳至丁未日夜二皷有風徐來淋潦頓收微月出雲氛霧廓清皇帝被衮冕登壇萬籟無聲華燭有輝雅樂瀏亮燎烟不揺百禮既洽千官肅雍洋洋乎神明臨之在上誠意懇至升降秩秩濟濟翼翼穆穆如也比明竣事薰風應節和氣交暢小大咸喜知誠德之感格若合符契大命所集皇天后土信不忒也於是𢎞文館學士臣基謹獻頌曰濬哲惟帝父天母地維孝維誠斯承其意孝誠既備物以將之神鑒在德匪惟其儀聖不世出禮失莫求弗澄其源曷清其流水流之極禮儀并廢豈無牛羊而不以祭穹祇赫怒監觀萬方式昭大命命我聖皇維我聖皇克孝克誠提三尺劒由一旅興奮於長淮長淮具宗濟於大江大江攸同漢沔既朝閩浙率從施及廣海化外之邦望風占雲獻其琛賨稽首龍墀蹈舞從容乃命虎臣越濟踰河雲斾霓旌鐵馬金戈蹴蹈泰岱憑陵華嵩鋤秦鏟燕車書混同莫亢我前莫膺我鋒斬逆懷降允恊天衷自西自東自南自北罔不懌懌戴天子德天子之德格於上下既禋于郊又敬于社人懷其仁神錫之嘏圓方所包無不服者超黄邁唐越商踰夏小臣作詩以繼大雅平西蜀頌并序臣聞天命真主混一六合必先有以為之驅除然後收拾以歸其籠自古及今同一揆矣是故冬寒之極必有陽春激湍之下必有深潭大亂之後必有大治理則然也元德既衰九土糜湍鴟張狼顧之豪彌滿山澤萬姓魚喁無所籲告天乃命我皇帝肅將武威代伐乎不道故一伐而定荆湖再伐而舉全吳三伐而海甸廓清四伐而東粤南閩悉歸版圖於是四伐中原拾宋掇秦犁趙拔燕兵鋒未至聲聞先及神讋鬼慄匍匐俯伏𤣥羌青伏崑崙大漠交趾鐻耳之國罔不獻琛奉表稽首闕下無敢後者獨明昇竊據巴蜀雖遣使奉貢而不去偽號大臣皆請討之皇帝憐其父沒子幼數遣使招之不至乃命將帥師伐之洪武四年大軍破瞿唐殺其將某郡邑鎮戍望風送欵昇乃率其官屬奉璽印詣軍門請降蓋自建國至是凡五年而天下一統何其易耶固知天命有在而羣雄並起為之驅除也臣基受恩深厚無能補報遥聞㨗音歡喜踴躍不能自已謹撰平西蜀頌一首雖不足以賛揚聖德萬一亦聊以寓葵藿嚮日之忱云爾其辭曰惟彼蜀國開自蠶叢山川隔閱與華不通金牛啓道厥竅斯鑿岷峨岧嶤始連井絡秦以之霸漢以之王諸葛用之震驚北方劒閣倚天瞿唐折地仰不可攀俯不可視蠢兹羌戎憑其險阻罔知天命大邦是距洸洸虎臣受命於征出師桓桓如雷如霆如雷如霆天子之威廟算先定鬼神莫違靈旗揮揮指山山摧羌人失魂恧若死灰爰將其臣奉其版籍稽首軍門面縛銜璧六軍奏凱聲動𤣥黄黧童白叟蹈舞康莊四海會同豐年穰穰慶雲甘露自天降祥臣拜稽首受天之佑受天之佑天子萬夀東征詩有序胡翰淛東行中書右丞李公以親賢之重總制軍民輯寧金華嚴陵信安括蒼廣信諸暨五郡一州之地諸暨城小而偪於張賊雖以重兵鎮之賊猶數犯境上今年春遂大率其屬入冦邊吏告警公合將士由嚴陵馳援距諸暨新城十里曰龍潭據其地與冦相持明日冦以我師新集空壁豕突而前公望見即下令曰彼衆我寡唯效死斬擊耳毋掠人馬貪而失利又仰而祝曰願天佑社稷微臣不敢愛其生以縱敵於是將士皆奮公策馬陷其中堅手槍斃數人左右縱擊遇者靡地躪而殱之流血膏野斃者萬餘人逐北擄其驍將百數十人凱旋之日上功幕府公推兩指揮羣帥之力居多天子嘉念之賜予甚渥昔南仲召虎左右王室戡除冦戎詩人歌之不以二人克專勤勞顧乃歸美天子之命稱誦四方之平今日之事惟授任得人以故公與將士茂建厥績天下聞者皆知我師之罔敵舉羣雄而脫其距角合海内而登於大一統之治昭哉徵乎其在兹矣不可喑無紀述迺敘而賦之以備凱奏焉詩曰天造草昧篤生真主暨厥良弼大啟土宇自淛之東郡邑棋布阻山帶川樹屏為固與敵相制邦之門户匪親與賢疇克畀付桓桓我公兩有文武龍節虎符來自王所坐總省轄出奠邦土于宣于蕃孰敢余侮蠢爾餘孽竊活鼎釜以其螳臂抗我戎輅歲直乙巳中繩建斗大裒厥兇深入我阻偪我新城揺我黎庶勢如累卵岌其可怖邊吏驚告公起馳赴軍於龍潭柵其髙阜轅門方樹士食未饇冦偵我勞謂可拾取蝟興蜂午鼎來縱横深絶其澗髙馮其陵有輕我心不知我勍我用大奮奮其忠貞師直為壯彼則何名以少擊衆在古可徵爰令衆旅告厥神明願天孚佑爾衆欽承毋利擄獲不竭股肱望其前鋒公則是膺挺身躍馬其揚如鷹如鷹如虎其徒烝烝如雷如霆就震弗崩束戈就殞投刀乞生倐忽紛紜席巻而平流血殷野横尸一成匪曰嗜殺亦豈窮兵寇來授首唯惡是懲既懲其惡亦罔不矜亦莫不寧大開日明衿甲旋斾肅肅其征椎牛饗士獻俘於廷皇心允懌是用大賚公走入覲稽首拜賜明明我皇制勝萬里師力臣武悉任指使滄海波平金微道啓防風不朝塗山用乂惠迪有慶從逆自殪公昔受鉞志在敵愾繼今以往尚罔或怠不怠不亟公心抑抑下民是依庶士是式為邦柱石以殿皇國皇國既平四裔既率公之孫子與國罔極行樞密院判官鄧公勲德頌朱升歲辛卯淮西兵起明年自蘄渡江者蹂饒陷徽江東大擾至於丁酉六月之間勝負相尋徽民受兵者凡十有二矣而猶不知所終也於是泗水鄧公奉江南行省平章公命由宣取徽先聲所至不戮一人郡邑以定公淑德夙成威信昭著始至則立城堡作廬舍旬日竣事而民不知有役納降附下條教村疃帖服而民不知有軍分兵戍諸縣掄才以官治之軍民有職上下相維遺黎乃知免矣將官張思總戍休寧縣能宣布公之德美以福其民庶又請邑士朱升作頌以傳之頌曰徽之為郡介乎萬山昔有革代招附以安曩歲淮兵渡江窺浙直搗於徽肆其燔刼突來洊至奔北相仍六勝六負哀哉民生猗歟辨章秣陵開省勲業崇崇紀綱井井既克宛陵南復楚疆有獻於公請事徽方公曰噫嘻無窮于逺蕞爾山城其邊三面策者曰否彼隣杭封全有三關浙右囊中公曰噫嘻兹為重役總率招徠必資淑德曰鄧友德茁其蘭芽汝父汝兄致命邦家宣衆未降長槍餘黨既屯于徽懼殘彼壤事有機速為我南行汝親吾養汝家吾承鄧公曰唯惟辨章令辨章之心徽人之命爰勅渠帥即日啟行衙兵之胡新附之湯江淮之雄苗獞之銳列騎聯旗兩州相綴惟徽厭亂城郭乆空諸軍畢入誅其萊蓬既柵既城以營以室將士分功成之旬日乃納降附漿酒温存受其雞豚為之饔飱使觀其軍使行其壘意氣包涵家人笑語民曰此軍與吾為儕曩者轢我吾寧服懷士曰此軍非曩之匹閫幙衣冠中原典則曩之來者驅民為兵何為强弱徒殱厥生曩之來者毎事報復指擿吹求熾然荼毒今兹下令軍民判然不教之衆奔北之先今兹下令新自今日毋長澆風酷為指擿流離還定漸復其初里有耕桑家有詩書凡此之功在於鎮靜萬喙同聲歸功於鄧鎮靜之道制勝之規謝公指顧秦敗淮淝鎮靜之道教治之式曹師蓋公民以寧一繄公懿質辨章登之進之于學玉而成之雲臺元功少年杖䇿人謂我公今之髙密以究勞績以開隆平秉心罔替引我民生徽民願公祝公眉夀仰彼昊蒼夕昕稽首戍將承德請作詩章刻之縣齋以傳無疆明文衡巻十九欽定四庫全書明文衡卷
