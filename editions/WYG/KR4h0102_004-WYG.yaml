body:
  text: 明文衡巻四明程敏政編樂章擬祭告天地樂章凡十三梁寅禮局中承詔分撰郊社宗廟樂章故有此作其音調乖戾雖不可被之筦弦然出於上命不敢棄其草謹錄藏之迎神天道大矣物繇以生地道廣矣物因以成惟鴻恩是資惟禋祀是明神之格兮瞻繽紛其並迎奠玉幣奠以嘉玉栗而溫兮薦以重幣煥其文兮庶鑒兹哉斯禮之存兮奉牲既䖍我祀既具我牲角貴繭栗心之誠有苾其芬于豆于登五音㑹合和而平上帝酌獻仰明明瞻巍巍如事父栗以䕫物莫稱徳曷報之酌用陶匏斯其宜地祇酌獻勢廣厚徳含𢎞五行具百物生承天之施功之成何以報貺醑惟馨上帝亞獻父事惟天格神以心赫赫在上洋洋若臨樂既具止有鏘其音酌言再之庶明明之降歆地祇亞獻母事惟地物無不載九穀既登百貨是賴㒺敢煩而瀆罔敢忽而怠昭兹嘉貺沛兮未有艾上帝終獻禮行匪懈祀事孔明瑶席菲菲華鐙煌煌豐我粢盛潔我豆觴陰陽之和邦家之昌地祇終獻六府孔修生我兆民富媼之功陸海之珍洞洞屬屬清醑以陳所佑維徳禎祥其臻分獻鸞輿下臨從百神金支秀華耀五雲壇峨峨靈欣欣位以序列享明禋徹爼禮嚴厥初尤慎乎終徹以示敬儀雍雍嘒嘒管簫五音從望燎瘞在繅早維玉在篚維幣禮從厥初迺燎迺瘞疑屹立以瞻匪終怠送神神飇若馳矞零上翔蒼龍並騰車以行顧兹瑶壇兮尚有榮光擬朝㑹樂章凡十二首王景天命有徳之舞嘉禾進堪輿寜叶氣蒸萬彚茁嘉禾生祥飇瑞露凝光精一莖九穗有三登田畯駿奔進天廷薦宗廟將徳馨時和嵗豐樂太平乃知天子在樹徳雲龍風虎開休禎野繭成瑞道昌至治明萬化滋植盈八荒猗歟野蠶集我條桑載生載成以𤣥以黄以登于明堂至和磅礴黼黻文章繅為五采絲上補虞舜裳騶虞獻騶虞至周服至仁表天造飢不食生畜行不踐生草聖皇御宸極徳澤被枯槁林邑神聖初召南風化首邁遐躅前無偶啓貞符垂沐乆神龜呈箕疇演洛之靈𤣥龜出聖之徵皇孝理表八紘役五神策六丁𦙍五總符十朋介金石利永貞天子九九八十一萬嵗夀與天齊并黄河清黄河清七百里水精宫下見底聖人在位天心合并六合澄清萬國文明捐雜佩兮蒲津遺玉玦兮龍門川后跪而陳辭兮錫蕃釐于聖君四裔來天子踐阼宏拓皇謨義聲翕沓陰肅陽噓東欵扶桑西徼余吾瀚海祝栗統為一家繩牽索引咸傅于都莫不震慴天休涵濡􅀈􅀈狉狉以拱宸樞玉帛匪頒王㑹有圖萬嵗千秋協我貞符明徳新民之舞黄河澄清聖人召和黄流獻奇澄波清且漣漪歕薄龍門震盪坤倪萬雷呿張光燭化機上下一碧機動天隨天啓聖神河水為清天啓聖神治化底成聖徳天齊造化降精聖徳天齊心與道凝萬國一統聖聖相承嘉禾同頴祥開函宇地出嘉禾端倪叶應大瑞是荷同穎異畝瑞協周家以濯仁風以昭泰和惟皇忠厚被草木懋昭大道同變化是知聖心能致和上與天運同亨嘉慶雲成彩徳動天鑒慶雲呈祥紛為華盖􅂱為天章郁郁芬芬靉靉茫茫映日烜彩隨風飛揚昭囘麗河漢覆燾彌下方神聖揚清芬溥暢融天光龍馬來廷天之駟龍之媒産大宛徵渥洼追流星籋天街汗流赤心九垓厯閭闔觀玉臺西風十二閑争稱龍馬來蹴踏五雲暖神光夜昭囘詄蕩蕩天門開丼露降祥和氣叶丼露凝陋寶甕軼金莖厭厭浥浥穰穰熒熒而於燦其英如餳如飴如珠如脂不隨日以晞天子神聖與天合徳至和攸繹以濡天液天子聖仁與天同甄至和氤氲以播靈芬瑞應之彰有苾其芬於萬斯年受天之慶四裔咸賔聖皇御天治化攸甄文武並用其幾孔神極日月之所照莫不獻䞇而效珍普天率土悉妾悉臣環拱北辰以沐至仁徳懋被乎曶爽聲敎暨乎八夤陋漢唐之用師侈成周之王㑹其道斯何王者無外擬朝㑹樂章凡二十六首顧祿升座樂奏泰安之曲金門洞開寶座尊崇煌煌龍衮穆穆聖容俯臨萬國髙拱九重臣民稱賀玉帛來同公卿八門樂奏治安之曲萬乘天臨千官景從濟濟卿士秩秩王公簉班鴛鷺接武䕫龍同心協徳永効公忠上夀樂奏夀安之曲天眷聖皇應運開基尊臨大寶撫有華夷武功底定文徳𢎞施微臣曷報仰稱夀巵君親之重實為臣綱至尊至敬著在天常仙韶按曲玉醴浮觴載伸華祝萬夀安康舉酒樂奏嘉禾之曲有美嘉禾勃如雲興一莖九穗異畆同榮至和所召盛徳之徵厲諸郊廟用慶豐登樂奏卿雲之曲天上垂象著于卿雲九苞鳯彩五色龍文迎風郁麗映日絪縕有徵斯應實惟聖君樂奏紫盖之曲聖人受命紫盖呈祥亭亭錦覆燦燦霞張天中屹立雲際飛揚眷兹靈祐國祚隆長樂奏彤旗之曲在昔征伐旗纛為先仰惟聖朝著象于天彤竿對峙赤羽文鸞克敵之應萬方歸焉樂奏神芝之曲后祗效徳神芝挺生灼灼三秀濯濯九莖紫蕤絢彩綠葉敷榮願著聲歌播于大廷武功之舞聖主承天運臨濠樹義旗萬方思洒日一劍奮興時采石方收捷金陵即駐師神機安可測建此萬年基大命歸真主羣心屬至尊神功參造化英略定乾坤永洽雍熙治𢎞惟曠蕩恩華夷俱奉貢冠帶入天門六成江漢親征日風雲睿算中六師方奮武孤寇已潜蹤矢石飛星急樓船烈火攻興王天已祚次第靖群雄萬乘龍飛始東吳尚陸梁天兵將問罪驕虜敢稱王負固三時乆終成一戰降山河畿甸接表裏壯金湯陜右遺梟獍山東據虎狼神威方逺及小醜孰能當飲馬黄河上觀兵華岳傍來蘇人望切載道獻壺漿王師若時雨隨地霈恩波東浙爭歸欵南閩已戢戈山川囘正氣田野起謳歌一洗兵塵淨羣生樂泰和巴蜀雖云險區區在一隅偏方寧自守逆豎謾狂圖正類蛙藏井眞成虎負嵎神兵飛渡入俄報定成都大將承王命長驅向北征揮戈清朔土按轡下邉城圖籍登天府車書混玉京從容歸奏㨗萬姓共歡迎文徳之舞一統皇圖大三陽泰運開王侯鳴珮入蠻貊獻珠來瑞靄騰金闕祥雲䕶玉階太平人物盛鼔舞樂春臺鷄鳴欲曙天冠盖集羣賢拜舞瞻龍座懽愉侍御筵玉杯傳法醖仙樂奏宫懸願祝君王夀齊稱億萬年六成五彩眩晴虹神都王氣鍾石城嚴踞虎鍾阜鬱蟠龍宫闕天光近金湯地勢雄四方均貢賦萬國敬來同皇朝崇祀典聖主毎齋心天地嚴昭格神祗肅降臨牲牢歆大享金石奏清音三獻精誠至端知錫福深創業知非易圖安念守成帝心常簡注皇業在經營修徳承天意推誠軫物情一人恢大業萬國仰昇平盛典稽前古皇心協至公建儲安國本裂土錫王封玉册加殊禮金支衍大宗羣臣無以贊三祝但呼嵩宵旰思賢切旁求滿四方山林登隠逸朝野慶明良際遇風雲㑹瞻依日月光同心匡盛治竹帛永流芳中國聖人興羣方仰大明海波俱帖息年穀屢豐登玉帛來諸國梯航貢上京臣民咸舞蹈萬嵗賀朝廷還宫洪惟聖主端冕凝旒高躋舜禹逺邁殷周功成治定禮備樂修受天之祜萬嵗千秋補雩壇祝舞歌辭宋濓周官有司巫掌羣巫之政令若國大旱則師巫而舞雩漢法夏不雨祀竈毋舉土功更火浚井暴釡于壇杵臼于術為四通之壇於邑南門外方七尺植赤繒七其神蚩尤祭之赤雄雞七𤣥酒具清酒搏脯祝齊三日服赤衣拜跪陳祝辭以丙丁日為赤火龍一長七丈又為小龍六長三丈於南方皆南向壯者七人皆齊三日服赤衣而舞之司空嗇夫亦齊三日服赤衣而立之鑿社而通之閭外之溝取五蝦蟇錯置社之中池方七尺深一尺酒脯祭齋衣赤陳祝如初取三嵗雄雞猳猪燔之四通神宇令民闔里南門開里北門幸得雨報以豚一酒鹽黍財足以茅為席然周制乆廢典午以降漢法亦不行而祝辭尤闕嵗丙申夏旱羣巫雩于山川之神予既書其事授之復補其辭使巫歌舞焉於泰鴻冒下民動以化時屈伸煜朱鳥萬物甄亢則害陽畢屯土膏耗蓊欲痻田畯奔勢維礥壇四通僾明神神中臨勃如煙鬯嘉錫燦若羅繭握薦豕炳膋蕭灌鬱金菊芳䓇氣上延合溟漻洞五精貫八幖茫無外莽翛翛門沆碭駕以猋俯下土無不釗鬱行風羽輪翔𤣥黄變慘復爽衆嫭集亢景章薆然存索之亡爍隂明迴叢陽符翹襟逝弗忘崇明禋成穡功慿紺筵嚴以卭應上公與天通植赤繒驂紅龍左列缺右豐隆流火降鉅若鴻鬼婦劉散為風灑靈注徧四封函斯活穎茸茸衆維魚兆已從融祉暉毓宵氓甫田阜物豫成風平平綽以行人旉與鬼肹蠁耿曜振霈充盈神心暢樂茫良四㝢綏萬國洋洽大康慶昭膺廣漢難辭宋濓難古禮也周人三時皆行之春冬之季難難陰氣也仲秋之月難難陽氣也盖二氣或佚厲將乘之為災故難以止焉其制命方相氏帥百𨽻索室敺疫以逐之又磔牲以禳四方之神漢襲周制而其儀加詳選中黄門子弟百二十人為侲子赤幘皂製執鼗方相黄金四目䝉熊皮𤣥衣朱裳執戈揚盾十二獸有衣毛骨中黄門行之冗從僕射將之以逐惡鬼於禁中夜漏上水朝臣㑹侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乘輿御前殿黄門令奏曰侲子請備逐疫於是中黄門倡侲子和其辭凡八十言繼作方相與十二獸儛讙呼徧前後省者三持炬火送疫出端門門外騎士以次傳火棄雒水中自漢至今朝廷之難雖廢而民間猶有存者先臘一日巷萌社𨽻飾鬼神貌御五色龍虎文衣巡門擊鼔而難之予惡其言鄙褻因䟽古者用難之意復廣漢辭使習焉其辭曰陽陰乘化左右而行日歴昴畢得積屍大陵其氣勃芒更渉虛危墳墓西司鬼官攸房厲附強陰而降于釁殃咨爾十二神宣其威良猋突劒亢胇胃食虎甲作食􅓇雄伯食鬽騰簡食不祥攪諸食咎伯竒食夢祖明強梁共食磔死寄生委隨食觀錯斷食巨刳其腎腸窮竒騰根同享於蠱毋使害傷咨爾十二神鍜爾戎兵出􅛍四方吮厲之􅎺以代酒漿解厲之肌以克糗糧絲厲之腱織以為衣裳斥除慝陰暢囘明陽乾坤載清物楙民卭惟爾神之功神或不蘉上帝是明急急如律令銅井迎送龍辭唐肅伐鼓兮吹簫迎我龍兮山椒龍之都兮何所泉淵淵兮石為戸扣龍車兮乞靈龍不出兮我心若酲我心若酲兮龍寧弗聞我扣龍兮龍䘏風旋波兮龍出龍之出兮福予變旱燒兮為澍龍為澍兮我弗飢返山椒兮雲旗風冷然兮龍之歸迎日辭鳯炙兮麟脯瑶席兮桂爼樂萬舞兮如雲吹笙竽兮龍二女旌孑孑兮載以輿六蒼虬兮歴天衢雲霈兮夜未艾執長轡兮乆相待代祀漢光武皇帝辭劉定之漢光武皇帝享國餘三十年垂綂過二百年祀典越千數百年而弗替何其盛哉竊嘗以為武功文治帝者之所難兼自漢諸帝言之武無競於高祖而以在位日淺故不暇給於文文莫懿於太宗而以繼體守成故無所事於武兼之者帝也至其量時度力閉關却質置孝武之功於度量之外明慎政體總攬權綱包孝宣之治於範圍之内帝之所就出乎漢諸帝之右有若此者則其盛也不亦宜乎惟聖天子重登大寶祭告于帝而臣實來供事爰述其槩而繫以辭曰木蒼蒼兮山風妥玉體兮充宫皇靈兮如在亘古今兮曷窮杳南巡兮舂陵舊鄉過故都兮洛之陽復北返兮至兹税龍駕兮徜徉鑑芳潔兮禋祀飄何往兮瑶空無際夜闌兮天漢横烱參旗兮斜曳皇應侍兮上帝之所永錫福兮聖世琴操飛泉操宋濓浦陽𤣥麓山有飛泉濂與鄭原先生數觀之造飛泉操鼓之琴書諸崖石其辭曰飛泉兮瀏瀏洗耳固非兮誰飲我牛覆謂我汚兮移彼上流具人之形兮奈何忘人之憂琴操二首客有吏於海東者以能擊貪暴聞然終用是受誣嘔血死予友胡徵君為著哀辭一通予讀之甚悲竊取其意作哀海東傷妷女二操使善琴者彈而和之客之鬼或有知則其鬱鬱之氣庻㡬少伸矣乎辭曰我哀東海而思之苦彼何人斯猛噬如虎我不擊之我民之憂縱不我與覆以我為仇蒼天雖高寃其有極非血之嘔曷明心赤泱泱大風沉沉寒泉舍旃舍旃我尚何言右哀海東有妷者女顔如舜英詆我以醜我其何傷眩白為黒古亦多有自尤不遑敢誰之咎黄鵠飛來其音誾誾我心茍安何戚弗欣天上地下命也奈何命也奈何焉知其他右傷妷女思沂操胡翰曾氏有居越者睠焉不忘曾之舊鄉余以聖賢之道不下帶而存也作思沂操以廣其志云沂之水兮泱泱曷不歸兮以浣我裳我思兮孔長沂之水兮湜湜曷不歸兮以沐我徳我思兮心惻沂可思兮亦可泝予鼔而舞兮喟吾之與兮風雷引烈烈兮轟轟為飈兮為霆迅發兮震驚薄太虛兮下上聲謂天懠兮孔仁孰司柄兮赫厥靈民無愕兮載寧威既揚兮沛澤零在陳操劉基彼山有揚兮彼隰有栩彼路斯何兮孔棘且阻𤣥雲杳𡨕兮不日以雨重華寂寥兮誰與晤語茫茫九州兮孰為予所龜䝉無人兮駕予歸處古琴操王禕春秋時晉大夫有從事于外而不得飬其母者作皇天操皇天至仁冒下土兮林林總總各獲其所兮我獨何為不得以養其母兮育我鞠我亦已太苦兮養之弗時我何為者兮自我徂征離此膝下兮有食孰以食疾痛其孰摩撫兮我之念母心焉如縷兮母之念子亦豈寧處兮皇天之毒我其終我祜兮右皇天操凡十韻戰國時楚臣有忠其君而被竄逐者作江漢操江漢滔滔曰注于東只豈惟江漢百川朝宗只臣之事君所盡者忠只臣忠之盡見謂為狂只我君聖明如日正中只豈弗臣察其或未遑只抑臣實有罪盍反諸躬只自今以往矢益竭衷只臣雖身逺臣心上通只臣心之通君終臣容只謂臣不信江漢其同只右江漢操凡十一韻廣琴操十首并序朱右操者操也君子操守有常雖窮阨猶不失其操也其音節固古詩騷辭之體然詩以興騷以怨操以操作廣琴操廣云者題義因韓子之舊也將歸操孔子之趙聞殺鳴犢作河之深兮誰將厲之河之淺兮誰將掲之河洋洋兮不我濟之竭澤以漁兮蛟龍辟之覆巢殀胎兮鳯凰去之夫人有知兮予實類之九州博大兮將予遂之猗蘭操孔子傷不逢時作習習谷風以陰以雨巖穴幽阻誰其晤語猗蘭之芳􅂱􅂱其光不我佩服昊天孔明子如好修維我之求子如不好於我何郵龜山操孔子以季桓子受女樂諫不從望龜山而作維龜有山造初鴻濛自龜之東淮夷來從膏澤既施草木實多周公上天奈龜山何越裳操周公作天之聰兮聵聵其音天之明兮窅窅其深天之仁兮實臨下民文王在上兮於穆不已浩浩其天兮時暘時雨越裳來臣兮萬物斯覩拘幽操文王羑里作羑之陰兮罘罘羑之室兮幽幽嗟室之人兮為死為囚匪維伊愆兮實我之郵日月有明兮容光弗留岐山操周公為大王作自邰有家于夏之先克承弗怠𤓰瓞綿綿開我邠宇衍我宗禋嗟狄之人敢乘以奸彼岨矣岐將遂于遷既有我土毋戕我民履霜操尹伯竒無罪為後母譛而見逐自傷作驅車驅車車行無遲兒在中野父寧不悲驅車驅車車行無違兒當有母孰使兒飢天生衆民㒺不同仁風雨霜露實活我人民生有知以順天賦雉朝飛操牧犢子七十無妻見雉雙飛感之而作雉于飛山之陲孤雄啄羣雌隨雉于飛音下上隂陽和鳴聲暢胡我人朝出薪入無家徂歲年别鵠操商陵穆子娶妻五年無子父母欲其改娶其妻聞之中夜悲嘯穆子感之而作黄鵠雙飛朝隨暮歸山川悠邈不女乖離今當乖違且復徘徊女啄女飲毋使女悲殘形操曾子夢見一狸不見其首作狸維獸不見其首我夢之形吉凶曷究式協于占載觀其繇曰修爾躬自天之佑望歸操高啟哀周復子死於虎而作兒旦而出于山之麓兮兒夕不歸在虎之腹兮我往無所榛蒙蘢被谷兮嗟爾耽耽弗食我豕犢兮穴亦有子胡寧使我獨兮
