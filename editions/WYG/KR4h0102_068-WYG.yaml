body:
  text: 明文衡巻六十八明程敏政編神道碑御製中山徐武寧王神道碑大眀中山武寧王姓徐氏諱達鳯陽府鳯陽縣人家世農業王年二十有二值元末兵興嵗癸巳朕集義旅王來麾下朕視其所以周旋㡬二年動静語黙悉超羣英於是命為帥首凡有微征以代朕行又㡬一載眀年乙未朕被敵所執敵之帥首亦為我軍所執明日王來以身代朕歸朕歸縱敵帥首易王還已而從朕渡江下采石定太平時機務浩繁姑孰之郡密邇大江況元帥首曼濟哈雅率舟師以拒江面為朕肘腋之患不暇率兵四征乃命王為将擇精兵數千東取溧水溧陽王兵至守者不戰民庶咸安眀年丙申春二月敗元舟師于采石王仍屯溧水三月召王從征建業越十日庚寅師入建業越七日丁酉命為大将浮江而下水陸並進東取京口大破元師京口巳定東探浙右時張士誠擅稱名號遣将巳據毗陵旌旗相望其守者潜遣間諜誘我斥堠王察知遣使歸告請勒兵以討朕許之王将三萬人逼近其壘復遣使歸告賊勢少窘益兵可下朕遣戰将千餘員甲十三萬師㑹合圍毗陵張士誠自姑蘇發其弟張九六将兵數萬來援王遣兵逆戰不移時破之生擒張九六城守猶堅朕復益新附二萬合勢共圍守者窘甚計出多方誘我新附者二萬新附帥首宻從傾營入城助彼來戰初我軍環其城而營之因新附者叛四方去其三獨王固守其南開平王猶營東南外一舍之餘扼彼援兵尚未驚移聞新附者叛冦迫王營王拒守且戰開平自外來援内外夾攻大敗其衆擒其守将張徳餘軍敗入其城王復還而困之士誠自姑蘇遣将吕珍寅夜入城督兵以守與王相抗初彼軍雖少糧且足用戰守益堅及誘降入軍多糧少戰且狐疑丁酉春守将吕珍潜遁城下師旋復遣征寧國城圍援至王發兵扼要而戰援者敗俘斬者衆旬日城降宣城亦附凱旋時四方羣雄甚多朕固守江東數郡命王秣馬厲兵以觀四方之勢又眀年戊戌命王㸃兵固守建業朕親下浙東金華既平六月師還未㡬遣王西征皖城水陸並進微北秋命王西征池州師抵而平陳友諒遣兵來救斬首萬級生獲三千餘時張士誠發兵來冦宜興城陷遣王将兵復取師抵城下不旬日城復生獲三千餘皆戰死其年惟揚元義兵盡歸壬寅秋王従朕下潯陽陳友諒敗潰時張士誠發兵攻長興留王守潯陽未㡬召歸師次中塗令復守潯陽比至陳兵巳入城守王遣兵與戰陳兵復潰俘斬數千獲其眷屬戰騎彼時潯陽之境空荒棄而弗守師旋建業癸夘春正月取豫章城降命王西取武昌不克班師中塗豫章内變王復討平張士誠北冦夀春朕親往援王為前部張兵敗北旋師金斗周圍其城戰間陳友諒大率兵冦豫章詔王罷金斗之圍歸整舟師解豫章之難秋七月師次彭蠡陳友諒罷圍逆戰王身先諸将敗陳一巨艘死者千五百人自是彼軍勢弱我軍威振由王身先癸夘嵗留王守京朕西征武昌甲辰武昌下克陳之後其年大㑹兵于京師乙巳嵗命王取淮東淮陰諸州仲夏師旋嵗丙午命率甲士二十萬東取吳越鏖戰於吳興皂林之野生擒張兵六萬不戮一卒盡赴京師冬十有一月師抵姑蘇明年丁未秋九月姑蘇下兼浙左之大半詔班師命王西畧蒼梧九溪率服還軍京師洪武元年戊申春正月朕即大位二月命王為征北大将軍銀青榮祿大夫上柱國錄軍國重事中書右丞相兼太子少傅信國公命率甲士二十五萬北定中原抵齊魯而民安所過輯兵守禦規畫足食兵不民擾所得壮士帥而徂征不煩朕念北齊既平命渡河南兵至大梁父老壺漿以迎西下洛陽長驅崤函直抵潼闗守者拒戰王命宋國公馮勝抜之朕命據闗而守諭歸大梁北下河内由鄴下趨趙州抵臨清其年八月三日辛未北入燕都捷奏平敵復命西下晉冀如命井陘長驅晉冀以平二年春正月召渡河西兵入闗中守者皆棄全有闗内之地召歸天下太平三年冬十有一月論功行賞命王為開國輔運推誠宣力武臣特進光祿大夫左柱國太傅中書右丞相征北大将軍改封魏國公五年夏五月衆議北入沙漠王至嶺北兵疲而還勑命沿邊輯守嵗鎮於燕口外餘民自是收盡海内無虞十七年甲子太陰數犯上将朕惡之召罷北鎮勞勞于家是年臘月二十有一日染疾朕恐之星馳四召名醫咸至疾終弗瘳眀年乙丑二月二十七日己未薨特封中山王諡武寧享年五十有四爰以是年四月十八日己酉塟於鍾山之陰生男四人世子允恭襲封魏國公女四人長女燕王妃王平昔言簡慮精當提兵之時令出不二諸将敬若神眀所至之處攻城不屠與人不戯凡受命而出及功成而旋每不自矜至於封姑蘇之府庫置元宫之美人財寶無所取婦女無所愛忠志無疵昭明乎日月既薨朕恐嵗月幽遐磨迷偉績朕特親筆生前張我武威偃兵息民混一區夏奠安人神之勞以示子孫耿光萬世勒諸堅石樹當神道歌曰景命昌兮天彰錫我英俊兮忠良幽韜祕畧兮神機黙温温兮兼剛秉旄鉞而徂征兮既出幡幢繚繞兮雄氣軒昻戰騎靈兮蹄疾旌旗烈烈兮前行六軍濟濟兮甲胄礪矛燦爛兮精鋩舍之兮周廬星列屬櫜兮比比懸傍刁斗聲頻兮令宻山川妖魅兮奚蔵彎弧力勁兮射欃槍㡬披星月兮秋霜奮忠海内兮孰前當摧堅撫順兮我武惟揚
