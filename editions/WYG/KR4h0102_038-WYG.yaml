body:
  text: 明文衡巻三十八明程敏政編序大明日厯序宋濂洪武七年嵗在甲寅五月朔日新修大明日厯成粤從皇上興臨濠踐天位以至六年癸丑冬十又二月凡戒飭之諄復征伐之次第禮樂之沿革刑政之設施羣臣之功過四方之朝貢莫不具載合一百巻藏諸金匱副在祕書甲寅以後則嵗再修而續藏焉嗚呼惟天立辟惟辟奉天其能混合三光五嶽之氣者蓋可數也然挺生於南服而致一綂華夏之盛自天開地闢以來惟皇上為然其功髙萬古一也元季繹騷奮起於民間以圖自全初無黄屋左纛之念繼憫生民塗炭始取土地羣雄之手而安輯之較之於古如漢高帝其得國之正二也平生用兵百戰百勝未嘗摧衂以至繼天出治經綸大經皆由一心運量文臣武將不過仰受成算而已其獨禀全智三也欽畏天地一動一靜森若神明在上及至郊祀存於心目有赫其臨甚至不敢仰視恵鮮小民復恐一夫不獲其所貪墨吏及豪黠之徒有加害者必威之以刑其敬天勤民四也后妃居中不預一髪之政外戚亦循理畏法無敢恃寵以病民寺人之徒惟給事掃除之役此皆古昔所深患今絶無之其家法之嚴五也兵戎國之大權悉歸之於朝廷有事征伐則詔大帥佩將印領之暨旋則上章綬歸士卒單身還第其兵政有綂六也嗚呼帝力難名度越前聖不可以一二識也今日厯所書籌畧之運功業之著規模之宏逺其本蓋原於此矣然而史書甚重古稱直筆不溢美不隠惡務合乎天理人心之公無其事而曲書之者固非也有其事而失書者尤非也况英明之主不世出而記注之官遷易不常無以究夫聖徳之髙深臣同暨濂幸獲日侍燕閒十有餘年知之深故察之精察之精則其書也頗謂得其實而無愧兹因日厯書成謹掲其大要於首簡使他日脩實錄者有所採掇庶幾傳信於千萬世也其總裁官翰林學士承㫖嘉議大夫知制誥兼脩國史兼吏部尚書臣詹同翰林侍講學士中順大夫知制誥同脩國史兼太子贊善大夫臣宋濂催纂官翰林侍講學士嘉議大夫知制誥同脩國史臣樂韶鳯纂脩官禮部員外郎臣呉伯宗翰林編脩臣朱右臣趙壎臣朱㢘儒學教授臣徐一䕫臣孫作布衣臣徐尊生其讐校謄冩則臣伯宗臣㢘及鄉貢進士臣黄泉國子生臣陳孟𤾉開局於六年九月四日厯二百六十有五日始訖事云臣濂謹序洪武正韻序人之生也則有聲聲出而七音具焉所謂七音者牙舌唇齒喉及舌齒各半是也智者察知之分其清濁之倫定為角徴宫商羽以至於半商半徴而天下之音盡在是矣然則音者其韻書之權輿乎夫單出為聲成文為音音則自然恊和不假勉强而後成虞廷之賡歌康衢之民謡姑未暇論至如國風雅頌四詩以位言之則上自王公下逮小夫賤𨽻莫不有作以人言之其所居有南北東西之殊故所發有剽疾重遲之異四方之音萬有不同孔子刪詩皆堪被之絃歌者取其音之恊也音之恊其自然之謂乎不特此也楚漢以來離騷之辭郊祀安世之歌以及於魏晉諸作曷嘗拘於一律亦不過協比其音而己自梁之沈約拘以四聲八病始分為平上去入號曰類譜大抵多呉音也及唐以詩賦設科益嚴聲律之禁因禮部之掌貢舉易名曰禮部韻畧遂至毫髪弗敢違背雖中經二三大儒且謂承襲之乆不欲變更縱有患其不通者以不出於朝廷學者亦未能盡信唯武夷呉棫患之尤深乃稽易詩書而下逹於近世凡五十家以為補韻新安朱子據其說以協三百篇之音識者雖或信之而韻之行世者猶自若也嗚呼音韻之備莫踰於四詩詩乃孔子所刪舍孔子弗之從而唯區區沈約之是信不幾於大惑歟恭惟皇上稽古右文萬幾之暇親閲韻書見其比類失倫聲音乖舛召詞臣諭之曰韻學起於江左殊失正音有獨用當併為通用者如東冬清青之屬亦有一韻當析為二韻者如虞模麻遮之屬若斯之類不可枚舉卿等當廣詢通音韻者重刋定之於是翰林侍講學士臣樂韶鳯臣宋濂待制臣王僎脩撰臣李叔允編脩臣朱右臣趙壎臣朱㢘典簿臣瞿莊臣鄒孟逹典簿臣孫蕡臣答祿與權欽遵明詔研精覃思壹以中原雅音為定復恐拘於方言無以逹於上下質正於左御史大夫臣汪廣洋右御史大夫臣陳寧御史中丞臣劉基湖廣行省参知政事臣陶凱凡六謄藁始克成編其音諧韻協者併入之否則析之義同字同而兩見者合之舊避宋諱而不収者補之注釋則一依毛晃父子之舊勒成一十六巻計七十六韻共若干萬言書奏賜名曰洪武正韻勅臣濂為之序臣濂竊惟司馬光有云備萬物之體用者莫過於字包衆字之形聲者莫過於韻所謂三才之道性命道徳之奥禮樂刑政之原皆有繫於此誠不可不慎也古者之音唯取諧協故無不相通江左制韻之初但知縱有四聲而不知衡有七音故經緯不交而失立韻之原往往拘礙不相為用宋之有司雖嘗通併僅稍異於類譜君子患之當今聖人在上車同軌而書同文凡禮樂文物咸遵往聖赫然上繼唐虞之治至於韻書亦入宸慮下詔詞臣随音刋正以洗千古之陋習猗歟盛哉雖然旋宫以七音為均均言韻也有能推十二律以合八十四調旋轉相交而大樂之和亦在是矣所可愧者臣濂等才識闇劣無以上承徳意受命震惕罔知攸措謹拜手稽首序于篇端于以見聖朝文治大興而音韻之學悉復於古云太古正音序宋濂余少時則好琴嘗學之而患無善師與之相講說雖時按譜成曲滌堙鬰而暢懣憤心弗自是也後聞冷君起敬以善琴名江南當時學琴者皆赴其門余尤慕之以為安得一聽以償夙昔之好乎及入國朝余既被命起仕而冷君亦繼至時天子方注意郊社宗廟之祀病音樂之未復乎古與一二儒臣圖所以更張之冷君實奉明詔定雅樂而余豫執筆製歌辭獲數與冷君論辨冷君間抱琴為余鼓數曲余瞑目而聽之悽焉而秋清盎然而春煦寥寥乎悲鴻吟而鸛鶴鸞鳯追而和之也砯砯乎冰合萬壑瀑布直㵼其上而松桂之風互答而交衝也懇懇乎如唐虞君臣上規下諷而不傷不怒也熈熈乎如漢文之時天下富實而田野耆耄乘車曳屣嬉逰笑談弗知日之夕也余倦為之忘寢不自知心氣之平神情之適閱旬日而餘音繹繹在耳誠知其美而欲學焉而余己老耄不可勉矣既而冷君出其所次琴譜曰太古正音者示余且曰子之所聞者皆出乎此所未聞者可按譜而學也子可以序之乎余有感焉樂之為教也大矣古之人自非居喪服有異故則樂未嘗違乎左右所以攝忿戾之氣通神明之徳其助豈為細哉後世古樂寖乆寖亡今之所存若琴者無幾士大夫又鮮能而寡聽之雖如余之有志於學猶有耄老無聞之悔况不若余之質固者乎誠以有其器而無其譜而其制不全故也今冷君獨不自私其藝將使人人可按譜而學豈非古人用心哉然余恐人見其易而忽之也故道願學之意以見其為術之難述所聞者以告之使人知冷君之用志於琴甚乆非特空言而己也冷君名某某郡人今為協律郎味梅齋稾序洪武初余奉詔總裁元史于時豫執筆者凡數十人皆四方豪俊余日與之周旋㑹聚間一休沐輒相過從飲酒為歡酒䦨氣盛撫掌大噱論古人文章政事不深夜不止信一時之樂哉然當是時諸君者皆壯强無恙余雖稍長亦未耄老方以為此樂可以常有未知其為樂也及後未數年人事稍稍乖殊或得州縣散之南北或以老癃疾疢引歸田里或抵法遇患轉徙逺方求如舊時之歡須臾而不得然後知此樂之難遇每一思之不知俛首愴心而繼之以歎息也又况余年愈耄觸事愈多而英才凋謝愈盡雖欲不思何可得哉幸而獲見一人於十餘年之後而又得觀其文辭其慰喜又為何如也若呉郡傅君則明是己則明在數十人中以能文稱當乖殊之時歸為邑人師得益勉其所學最後獨存而文益進天之於則明可謂加厚矣今年自呉中寄其文曰味海齋稾者示余皆馳驟可喜嗚呼四方之英俊至是無幾矣然則則明之文何可少乎贈李子貞序昔天下盛時文學行義之士多出於江淮以北今豈異於昔哉何其遼邈而未見之也元興乎朔方其化自北始故士之北産者尤盛於元今皇帝起南方士之盛誠由南方始自南而北理勢之必然也况朝廷思用北方士甚至有一才者即尊顯之所以運化機欲其速變也士生其間者安可不勉乎安豐李子貞善讀書有文士之秀者也其婦之弟鄭子端為通事司丞渉逺道訪之其於行義得矣及其歸也子端須余文贈之亦欲其化鄉人以文學乎子貞歸告而父兄語而朋友上方以文治思得竒才而用之有志功名者慎無自棄哉羅文質公集叙胡翰尚論人物者功業易見學術易知而道徳為難顔子之不違仁必孔子而後知之有若之似聖人必曾子而後辨之一時之門弟子非不賢也日與之處也猶不能致察於斯而况庸常之人方之聖賢才智相百十也將探其所藴之精微孰從而得之乎而况世之相去又逺也將極所至之髙妙孰從而得之乎揚子雲曰存則人亡則書將必於其書而知之而得之羅文質公之在宋仕不登於朝化不行於國紹興之末言任斯道之重者必屬之先生焉先生受學於龜山楊文靖公因文靖而見伊川程正公則固及程氏之門矣當是時若李籲之才器謝良佐之力學張繹之髙識尹焞之篤行未嘗不與其進而道南之嘆明道獨於龜山發之及論西銘猶不能無疑伊川以理一分殊喻之道之難明也如此先生聞易於龜山與其聞於伊川者無間則固㑹而為一矣嘗謂漢唐儒者能自樹立不過注心於外與之㳺仲尼之門入堯舜之道必不能至此其志為何如哉由是性明行完擴之以廣大體之以仁恕有如李延平之書潛思力行任重指極有如朱晦菴之言其所造又何如哉李籲軰未聞有以是與之者今欲以其近似而窺測之固學者之所惑也獨不考之先生之遺書乎蓋愽古通今務以文章為學者非先生之學也忠信愿慤不為非義而自守者非先生之學也二者不同而俱失之先生之學靜而求之喜怒哀樂未發之中擴而極夫肫肫其仁淵淵其淵則逹天徳之妙矣舉而措之行事施於有政則莫非逹道之用矣故先生退而隠居而志常存乎天下遭世多故而義不忘乎朝廷其言曰仁義者人主之術也一於仁天下愛之而不知畏一於義天下畏之而不知愛三代之主仁義兼隆又曰人主欲明而不察欲仁而不懦又曰祖宗法度不可廢徳澤不可恃又曰名器授之君子則貴授之小人則賤又曰士之立朝正直則朝廷無過失忠厚則天下無怨嗟類皆切於時弊逹於治體其言既足以懲熈寧創制之失其授受之際又足以啓淳熙理學之正觀是集者雖不能盡知先生因文以求義因迹以求用庶亦得其緒餘乎余嘉遂不墜其家學以寡聞陋見論前人之道徳其亦過矣仲尼之門顔子交一臂而失之而况其逺者其亦難言矣姑存其大要焉風水問答序烏傷朱君彦脩故文懿先生之髙第弟子也少讀書從先生游最乆嘗有志當世充賦有司不合退而業醫猶幸其濡沬及人也著書數萬言曰格致論人多傳之而君之醫遂名海右又以隂陽家多忌諱不知稽諸古也復著書數千言曰風水問答書成示余雙谿之上推其用心可謂至矣易曰仰以觀於天文俯以察於地理天確然在上其文著矣地隤然在下其理㣲矣著者觀之㣲者察之知乎此者知乎幽明之故非聖人孰與焉而漢魏以來言地理者往往溺於形法之未則既失矣至其為書若宅經塟經之屬又多秘而亡逸不傳則失之愈逺矣朱君力辯之以為人之生也合宗族以居為宫室以處審曲面勢得則吉不得則凶其理較然及其死也祖宗之神上參于天舉而葬者枯骨耳積嵗之乆并己朽矣安知禍福於人貴賤於人夀夭於人哉故葬不擇地而居必度室據往事以明方今出入詩書之間固儒者之言也昔者先王辨方正位體國經野土宜之法用之以相民宅土坐之法用之以求地中皆為都邑宫室設也而冢人墓大夫之職公墓以昭穆邦墓以族葬借欲擇之其兆域禁令孰得而犯之以是知君之言為得也惜其書不見於二百年之前紹興山陵改卜之議晦菴朱子以忠賈禍夫以一世豪傑之才千古聖賢之學萃乎其人觀於天下之義理多矣而篤惟蔡元定之說是信者果何也哉吾邦自何文定公得朱子之學於勉齋四傳而為文懿君受業先生之門計其平日之所討論亦嘗有及於斯乎不然則是書成於先生未易簣之日必能是正其說傳信於人而頋使翰得而讀之豈知言哉且翰先人之塟今十年矣襄事之初匍匐將命而不暇擇嘗惕然於先儒土厚水深之言於是得君之書欣然如獲拱璧昔里有余禎者以是術㳺江湖間邵菴虞公深敬信之其著書曰地理十準虞公稱其有得於管輅王吉之傳力詆曾揚之非而不悟指䝉非輅所作則與翰同一惑也書之于篇朱君其幸終有以教之古樂府詩類編序太原郭茂倩裒次樂府詩一百巻余采其可傳者更定為集若干巻復論之曰周衰禮樂崩壞而樂為尢甚自制氏為時樂官能紀其鏗鏘鼓舞而不能言其意則天下之知者鮮矣况先王之聲音度數不止其所謂鏗鏘鼓舞其人固不能盡紀也以是言之豈不難哉若聲詩者古之樂章也雅鄭得失存乎其辭辨其辭而意可見非若聲音度數之難知而國家之制作民俗之歌謡詩人之諷咏至于後世遂無復雅頌之音雖用之郊廟朝廷被之鄉人邦國者猶世俗之樂耳獨何歟蓋詩之為用猶史也史言一代之事直而無隠詩繫一代之政婉而㣲章辭義不同由世而異中古之盛政善民安化成俗美人情舒而不廹風氣淳而不散其言莊以簡和以平用而不匱廣而不宣直而有曲體順成而和動是謂徳音及其衰也列國之言各殊儉者多嗇强者多悍淫亂者忘反憂深者思蹙其或好樂而無主困敝而思治亦随其俗之所尚政之所本人情風氣之所感故古詩之體有美有刺有正有變聖人並存而不廢唯所以用之郊廟朝廷非清廟我將之頌不得奏於升歌宗祀非鹿鳴四牡大明文王之雅不得陳於㑹朝燕享内之為閨門外之為鄉黨非關雎麟趾則鵲巢騶虞之風情深而文明氣盛而化神故可以感鬼神和上下美教化移風俗今茂倩之所次有是哉以其所謂郊祀安世黄門鼓吹鐃歌横吹相和琴操雜曲攷之漢辭質而近古其降也為魏魏辭温厚而益趨於文其降也為晉晉之東其辭麗遂變而為南北南音多豔曲北音多悲壯而隋唐受之故唐初之辭婉麗詳整其中宏偉精竒其末纎巧而不振雖人竭其才家尚其學追琢襞積曾不能希列國之風而况欲反乎雅頌之正滋不易矣是以郊廟祭祀則非有祖宗之事美盛徳告成功之實㑹朝燕享君臣之間則非有齋莊和悅之意以發先王之徳盡羣下之情哇聲俚曲若秦楚之謳巴渝之舞涼伊之技莫不雜出以為中國朝廷之用慆心盈耳不復知其為教化風俗之蠹夫民不幸不見先王之禮樂考其聲詩蓋有足言者然以唐虞之盛不能無憾焉吾於此見其風氣之淳人情之泰政治俗尚之美皆非古矣其治亂得失是非雅正雖去之千數百載不待其言之著而今皆可見者則詩之為用豈不猶史之事哉故合而論之以寓吾去取之意將望於後之作者焉王氏數學舉要序數何始乎始於古之聖人六峜九章蓋太昊軒轅氏所作也其學則古無有也六藝之教在小學八嵗之童習之而九數在當時猶一藝爾道術裂於天下百氏之說並興天下之言數者不必本於儒而儒者亦罕究其奥於是有國者立於一家之學五曹孫子之科𨽻在國子雖以之名家可也然議者猶以一曲病之故其學之興也不能如古之恒乆其為教也徴之於今而不可得方田之法廢則度地不得其要粟米之法廢則交質不通其變以至稟稅積羃則無衰分少廣以御之髙深廣逺則無重差勾股以御之間有名其術者舉一貨一幣一程一度銖銖而乗之銖銖而除之寸寸而乗之寸寸而除之終其書不出乎此學之者終其書不得其術亦惑矣吾不知古所謂五曹九章法者有類焉否也意其不若是也必矣數者天地之紀也萬物之綂也唯聖人能舉之聖人逹乎天地萬物之情故也不逹乎天地萬物之情以言乎數者則賴有聖人之法存焉耳當小學既廢之後法之存者鮮矣雖世所謂通儒或莫之能於是有言之者吾乃以其不能而病之亦惑矣且百氏之說不適於用君子不病之是雖不當於古豈不愈於百氏之說哉故吾於王氏之書有取焉其言九九竒兩之法較之世所見者約而甚覈于以均多寡比輕重揆髙卑準遐邇或盈或朒或正或員紀一衍萬極乎兆京正載其用不窮其意亦將授之於人非欲人之不知也使數學復興則是書宜不廢吾惜不及見其人而獨得其書以論之其有深於此者吾亦不敢謂其盡於書也吾聞之物生而後有象象而後有滋莫非數也豈必由其術者然後能通之哉茍通之雖謂之儒者可也而儒者之學則大矣贈楊載序洪武二年余客留京師㑹楊載招諭日本自海上至未幾詔復徃使其國四年秋日本奉表入貢載以勞獲被寵賚即又遣使琉球五年秋琉球奉表從載入貢道里所經余復見其本末竊壯其行丈夫生不為將得為使足矣緩頰折衝之間一言得之足為中國重一言失之亦未嘗不為夷狄侮笑東南海中諸夷國逺而險者惟日本近而險者則琉球耳由古以來常負固桀驁以為中國不足制之元入中國所綂土宇與漢唐相出入至元中嘗命省臣阿嘍罕將兵討日本未及其國而海舟多漂覆不利其後又議取琉球用閩人呉誌斗之言不出師而遣使往喻其國留泉南者雖乆之訖不能逹而罷豈二國果不可制乎亦中國未有以服其心也今載以一介行李冒風濤之險渉魚龍不測之淵往來數萬里如行國中不頓刃折鏃而二國靡然一旦臣服奉表貢方物稽首拜舞闕下此非人力蓋天威也天威所加窮日之所出入有國者孰不震疊因其震疊而懷柔之行人之事也非有陸賈之辯傅介子之勇莫膺其任而載慷慨許國奮不頋身者吾不知其何所負也竊求其故而於駙馬王公見之公在閩中嘗取漢太尉家法書以遺載欲其不失為清白吏子孫意者夷人饒於貨寳恒以此啗中國之使中國之使受其啗而丼之鮮不䘐於利者使載不䘐於利則奉天威命安往而不濟茍䘐於利則雖竒丈夫檢狎小子之不若耳幸加勉焉國家委重非特使事蓋將授之以政矣靈棋經解序劉基昔者聖人作易以前民用靈棋象易而作也易道奥而難知故作靈棋以象之靈棋之象雖不足以盡易之藴然非精於易者又焉能為靈棋之辭也哉靈棋之式以三為經四為緯三以上為天中為人下為地上為君中為臣下為民四以一為少陽三為太陽二為少隂四為老隂少陽與少隂為耦而太陽與太隂為敵得耦而悅得敵而爭其常也或失其道而耦反為仇或得其行而敵反為用其變也陽多則道同而相助隂多則志異而相乖君子小人之分也隂陽迭用體有不同而名隨之異變易之道也易之取象曰車曰馬曰桷曰矢曰鬼曰狐之類推而逹之天下之物無不該矣曰馬矣而又以為龍曰水矣而又以為雲變易之義也非通天下之頥者不識也故曰靈棋象易而作也非精於易者不能也予每喜其占之驗而病解之者不識作者之㫖而以世之卜師之語配之故為申其意而為之言若夫以為黄石公之授張子房之受則傳無其文史無其實不敢從而附㑹之也贈徐仲逺序世之所謂禍福通塞者果由於命邪聖人罕言命命果不足道邪孔子曰道之將行也與命也道之將廢也與命也自古固有不仁而安樂守道而戮辱者庸非命乎古之人以夀富康寧攸好徳考終命為福而不言貴今之論命以官爵之大小品髙下豈古之所謂禍福與今異耶好徳無踰於仲尼則厄窮而在下顔淵亞聖三十以死曹孟徳司馬仲逹位在人上而以夀終且及其子與孫禍耶福耶所謂命者當何以斷之哉易曰窮理盡性以至于命孔子曰不知命無以為君子也今之言命者其果有合於古人否乎天以隂陽五行生為人也隂陽五行之精是為日月木火土金水之曜七曜運乎上而萬形成于下人也者天地之分體而日月木火土金水之分氣也理生氣氣生數由數以知氣由氣以知理今之言命者之所由起也夫氣母也人子也母子相感顯微相應天人之理也則亦何可廢哉日至而麋鹿解月死而蠃蚌噍温風動而薺麥死清霜降而豐鐘嗚物理相通不可誣也天台徐仲逺以七曜四餘推人生禍福無不驗予甚異之而贈以言若夫吉凶利害之所趨避則吾聞之孟子矣夏小正集解序王禕夏小正世以為夏書其書在大戴禮中傳之者戴氏也鄭康成為之注或曰盧辨注謂為鄭氏非也潁川韓元吉氏嘗以范太史家藏舊本校定之然與故所傳關本訛舛不同㑹稽傅崧卿氏又據關本而為訓釋實多所補正及考亭朱子集儀禮尊信小正而用之經其論定者㫖益加明矣今括蒼趙君復集諸家之說而為之解於是為尤詳宻者也以予論之小正之為夏書不可無疑者孔子定書斷自唐虞虞書以厯象日月星辰敬授人時為重事小正其遺法也孔子嘗曰我欲觀夏道是故之把而不足徴也吾得夏時焉及答顔淵以為邦曰行夏之時而作春秋用夏時以冠月其有取於夏時如此設小正誠夏書則在孔子所必取然而不與禹貢同列於百篇何耶鄭氏謂夏時者夏四時之書其書存者有小正則以小正為夏書者鄭氏也不信聖人而漢儒是信可不可耶禮記月令漢儒皆以為周公作而其中雜有虞夏商周秦漢之制殆漢末諸儒採吕氏十二月紀淮南子時則訓等書為之耳大戴禮之有小正小戴禮之有月令烏知其非類耶或曰吕氏據夏小正以正四時或曰小正具十二月而無中氣有應候而無日數至時訓乃五日為候三候為氣六十日為節因小正而加詳也意者小正特出於月紀時訓之前者耶是則以小正為夏書誠有可疑者也趙君之言謂鄭氏以小正為夏書本無左驗所紀昏旦中星與星之見伏率與月令月紀時訓不合唐一行推以厯術知其實在夏時其為夏書無疑是又不然天雖髙星辰雖逺茍求其故則精厯數者悉所能考蓋自上古以來天行日至星辰之次舍其度數無不可知况在夏后之世安知非精厯數者逆考而遡推之求其故以著干書亦豈可遂信之而不疑乎世以本草為神農之書素問為黄帝之書其果出於神農黄帝否乎本草素問不可必其出於神農黄帝月令不可必其出於周公則小正之為夏書予固不敢不致疑其間也惜乎趙君己不可作不得以予所疑者質之然君之為此書則既考覈詳而論辨宻卓見絶識往往而是不其有可傳者歟第其真本及所著他書皆厄于兵而此篇者乃其伯氏掇拾遺藁重所繕錄章句字畫之脫誤不能無之覽者擇焉而已君諱友桂詵仲其字學行志業具載宋太史所為墓誌兹故弗道而論予所疑者序其書焉黄子邕詩集序旴江黄子邕氏善為詩其詩有曰醉夢藁者皆古樂府歌行五言古體總若干巻其辭簡質平實壹本於漢魏而絶去近代聲律之弊殆幾於古矣嗟乎若子邕者豈非其意欲追古之作者以為並然可不謂為今世之能言者歟予嘗論之三百篇之詩其作者非一人亦非一時之所作而其為言大抵指事立義明而易知引物連類近而易見未嘗有艱深矯飾之語而天道之顯晦人事之治否世變之隆汚物理之盛衰無不著焉此詩之體所以為有繫也後世之言詩者不知出此往往惟􅃷其才藻而漫衍華縟竒詭浮靡之是尚較妍媸工拙於辭語間而不頋其大體之所繫江左以來迄于唐宋其習皆然是其為弊固亦非一日矣今子邕乃能斥漫衍以為簡屏華縟以為質黜竒詭以為平易浮靡以為實讀其辭知其於天道人事世變物理之際詳矣等而上之詎止於漢魏而已哉故予以謂子邕之詩殆幾於古今世能言之士如子邕者蓋不可多得也子邕嘗北逰遭世叔季其言不見用其志鬰鬰不得遂賴今天子明聖盡収前代遺才而甄錄之故子邕遂擢官於禮部㑹朝廷方務稽古禮文之事討論潤色出於子邕者居多蓋子邕之學不特善於詩而已予故論其詩幷及其平生之槩使讀之者因得以悉其人而又以見予於子邕之詩能知其意之所在與其學之所至非苟焉相好而已也送鄭仲宗序上之三年夏詔徴江南諸郡縣民凡稱大家者悉赴闕既集闕下則造之於廷而親訓諭之凡天地隂陽性命仁義古今治亂盛衰紀綱法度賦稅供給風俗政治得失之故諄諄焉累數千百言又恐其或遺亡而不能詳也則刻而為書以摹本分賜之乃六月十三日庚午上御奉天門翰林臣宋濂臣詹同臣王禕及起居注臣陳敬奏事畢賜坐從容問曰卿等知朕所以訓諭斯民之意乎臣禕謹對曰自古帝王皆身兼君師之任君以治民師以教民三代而下為人主者知為治而不知為教今陛下主天下為治之道已備而又集凡民而訓諭之耳提面命不啻嚴師之於弟子此政古昔帝王教民之意也又問卿等亦嘗見鄉人有論否乎臣濂對曰臣鄉人浦江義門鄭氏實來受訓諭為臣言陛下教之之㫖甚至今還且將以所賜書重刻而摹之使其鄉里之民家有是書以廣宣聖意矣越數日仲宗來請别且求言以為贈仲宗即所謂義門鄭氏者也夫仲宗之來既承聖天子之叮嚀告戒至詳且悉天下之言宜莫有加之者矣而頋又求言於禕何邪禕也聞之三代之民人有士君子之行豈必皆待上之人匡直輔翼而振徳之哉蓋其性質本善而又薫陶漸磨之素至故一鼓舞之閒莫不興起於為善而比屋可封之俗成矣今仲宗之家十葉聚食藹然有仁義之風庶幾一家之三代今又昭受聖訓而且圖使鄉里之民同興於仁讓上下相成如此豈非三代之君民者與夫紀述上徳而推揚之以風厲乎四方者史臣之職也禕故具志其事書以告仲宗若仲宗才學之懿行役之勤則凡賦詩者當能稱誦之兹不復道濳谿後集序趙汸潛谿前集凡十巻冠以陳公衆仲序文浦陽義塾既刻而傳之後集筆稾日新巻帙未有終也宋公以書來俾汸序其意顧乆病廢學閱嵗無以復命又念與公相知有自蓋嘗徧觀前集而惜乎陳公有未及盡見者然則後集固不可無序汸既不敢讓知其又奚辭廼為序曰脩辭以為文非古也其起於漢之西京乎太史公傳司馬相如吾丘夀正東方朔枚臯王褒之屬以善屬文見知人主然皆不得列於儒林而孔子弟子别為傳謂辭章為文而不本於經蓋昉於此至唐韓子宋歐陽公曽子固相繼而出始考諸經以立言其器識之大學問之博志節之固又足振而興之文辭之用於是為貴雖子朱子纘周程之緒猶且誦法表章而不敢忽焉葉正則顯於東南當道學復明之世刻意脩辭不踐故迹而乖離侵畔自窒其源其視韓歐特起於千載之下而知所宗尚者為何如也是以君子尚論浙東先逹必以東萊吕公為歸豈非以其博而知要能自得師雖儗諸孔門游夏之倫而無愧也乎若夫辭逹理明不繳繞於陳言而固與之合則百餘年間莫善於侍講黄公者矣景濂父生吕公之鄉而游于黄公之門其學以經為師而尤長於周禮其出入百家鈎深索隠蓋將以自致也而不但資為文其於為文直以才髙思敏舒之斂之無適不宜而未嘗有意於為作當其發憤擇術直詆辭章為淫言葩藻為宿穢期於刻削刋落以徑趨乎道徳之塗而於吕公尤惓惓咏思歎慕若不能自已於言者則其於輕重之類得失之幾察之明矣别集之行豈徒欲以文辭名世者哉蓋汸所知於景濂父者如此若夫陳公謂為文必傳諸師而後可者景濂父既不以自多而汸又不足以言之顧嘗聞之袁公伯長嘗問於先師虞公伯生曰為文當何如虞公曰子浙人也子欲知為文當問諸浙中庖者予川人也何足以知之袁公曰庖者何用知文乎虞公曰川人之為庖也麤塊而大臠濃醯而厚醬非不果然屬饜也而飲食之味微矣浙中之庖者則不然凡水陸之産皆擇取柔丼調其湆齊澄之有方而潔之不巳視之泠然水也而五味之和各得所求羽毛鱗介之珍不易其性故予謂為文之妙惟浙中庖者知之袁公蓋矍然稱善也自虞公為是言學者竊論以為非黄公之文不足以當之衆仲嘗學於虞公而景濂父黄公之徒也二公之所指授信乎有異於他門者哉善觀斯集者則得之矣送操公琬先生歸番陽序聖天子既平海内盡輦勝國圖史典籍歸于京師乃詔脩元史起山林遺逸之士使執筆焉凡文儒之在官者無與於是在廷之臣各舉所知以應詔汸以衰病屢謝徴命亦誤在選中使者至郡太守將吏皆能言其病狀然莫肯受其咎者故不得終辭舟過嚴陵適前太史金華宋公景濂亦至曰有詔召王子充於臨漳矣予曰汸衰病日増非可出者縱出亦無補於事所幸者平生故人重得一見於契闊之餘事故有非偶然者宋公曰然蓋予與宋公不相見者數載而子充則十有餘年矣既至京師聞悉陽操公琬先生在書館卧病旦夕以聞即可歸私又自念番歙接境自弱冠則知先生先生學通諸經百氏述作滿家諸兄之家於番者與先生有連姻相好也每相見輒能言先生動静而未獲一識今乃得相見於此豈非向所謂非偶然者乎自是日上堂與諸公從事筆硯間退則省先生疾先生疾少間輒俾予連榻卧談論經史晝夜亹亹相扣擊不少休予蓋有愧焉俄而禮部尚書崔公侍郎傅公同至局中以得㫖先生且為别先生乃為文一篇以告同舍同舍之士莫不惜先生之歸咸賦詩為先生贈予辱知有自則進言於先生曰先生歸矣士之在山林與在朝廷異其於述作也亦然纂釋羣經折𠂻百氏處則充棟梁出則汗牛馬雖其說未必盡合於聖人非素業與之相出入者不敢議也崇古學貴文章淩厲漢唐上擬三代使窮鄉晚進謏聞淺見之士目動神聳不敢出聲以誦自揆終身不能為者又况陶冶性情吟詠風月或以單辭或以偶句為人所稱皆足以名世雖或無取於作者於人非鬼責亦何有焉此皆山林之士所為得也若夫朝廷之士則不然太史公網羅舊聞上接春秋下迄麟趾其序髙帝創業文景守成至今使人如親見之書封禪平準傳貨殖皆諌書也而後世以為謗韓退之未遇時欲作唐一經以垂無窮既入史館不敢有為柳子厚苦辭廹之曽不少動僅以執事成順宗實錄數巻卒困於讒口竄走無完篇司馬文正公受知神宗作資治通鑑垂十九年始就而小人出鄙句以訾之此皆鉅人碩徳名實孚于上下以著書為大業者也猶或所遭若是今吾人挾其山林之學以登于朝廷之上則其茫然自失凛然不敢自放者豈無所懼而然哉尚賴天子明聖有㫖姑即舊志為書凡筆削悉取睿斷不以其所不能為諸生罪徳至渥也於是先生得以病辭歸而支離昏昧如汸者亦得以預聞纂修自詭豈非其幸歟然則汸於先生之行獨不能無所感者良有以也先生曰子姑遲之吾待子於番歙之間不逺矣陶尚書文集序徐一䕫國家之興必有魁人碩士乘維新之運以雄辭鉅筆出而敷張神藻潤飾洪業鏗乎有聲炳乎有光聳世徳於漢唐之上使郡國聞之知朝廷之大四裔聞之知中國之尊後世聞之知今日之盛然後見文章之用為非末技也嗚呼有志於此者疲神於六籍之間焦思於佔畢之下其勞盖亦甚矣夫其所以為此者抑豈徒為華哉亦將効用於國家不使淪於虚器而巳而得此者少也若今禮部尚書陶公凱者其得此者歟公姿性過人其才甚髙其學甚博其識見甚卓且逺故其為文多或千言少或百字下筆汩汩不見有艱難意嘗逰呉楚㑹時方擯棄南士懷寳不售其為文多激慨中更亂離自度無所於用去居深山之中授經以養其親而其為文多隠約今天子削平海内思變馬上之習遣使四出聘起巖穴之士使至台州得公公不敢固讓出應國家之需時上方命儒臣纂脩元史上知其老於文學俾預纂脩之列書成職教大本堂旋擢應奉翰林文字未幾超遷今官凡稽古禮文之事公多論定㑹翰林虛座朝廷用之惟恐不盡其才遂命兼領其院事方是時天下大定朝廷務導宣恩意稱揚功徳推序勲閥以昭明文物凡詔令封冊歌頌碑碣等製多出公手公自念文章之用蓋在此耳措辭陳義各當其體於是公之文沛然為一代之用矣故余以謂文章之工否存乎人而文章之用則係乎所遭也余也蚤嘗有志兹事向以與公有鄉里之好數嘗從於論著之末詎意未老先衰學日益落氣日益耗遂莫能有所成就亦安敢自謂顯諸用也兹見公京師盡出其所為文見示且徴言以弁其端余遂為之論次後之觀斯文者尚知余言之不詭也郁離子序郁離子者誠意伯劉公在元季時所著之書也公學足以探三才之奥識足以逹萬物之情氣足以奪三軍之帥以是自許卓然立於天地之間不知自視與古之豪傑何如也年二十巳登進士第有志於尊主庇民當是時其君不以天下繫念慮官不擇人例以常格處之噤不能有為已而南北繹騷公慨然有澄清之志藩閫方務治兵辟公叅贊而公銳欲以功業自見累建大議皆匡時之長策而當國者樂因循而悅茍且抑而不行公遂棄官去屏居青田山中發憤著書此郁離子之所以作也郁離者何離為火文明之象用之其文郁郁然為盛世文明之治故曰郁離子其書總為十巻分為十八章散為一百九十五條多或千言少或百字其言詳於正已慎微脩紀逺利尚誠量敵審勢用賢治民本乎仁義道徳之懿明乎吉凶禍福之幾審乎古今成敗得失之跡大槩矯元室之弊有激而言也牢籠萬彚洞釋羣疑辯博竒瑰巧於比喻而不失乎正驟而讀之其鋒凛然若太阿出匣若不可玩徐而思之其言確然鑿鑿乎如藥石之必治病斷斷乎如五榖之必療饑而不可無者也豈若管商之功利申韓之刑名儀秦之捭闔孫呉之隂謀其說詭於聖人務以智數相髙而不自以為非者哉見是書者皆以公不大用為憾詎知天意有在挈而畀之維新之朝乎皇上龍興卒以宏謨偉略輔翼興運及定功行賞疏土分封遂膺五等之爵與元勲大臣丹書鐵券聨休共美於無窮不其盛哉傳有之曰楚雖有才晉實用之公之謂也初公著書本有望於天下後世詎意身親用之雖然公之事業具于書此元之所以亡也公之書見于事業此皇明之所以興也嗚呼一人之用舍有關於天下國家之故則是書也豈區區一家言哉一䕫蚤嘗受教於公後謁公金陵官寺出是書以見教一䕫駭所未見愧未能悉其要領今公已薨其子仲景懼其散軼以一䕫於公有相從之好俾為之序頋一䕫何敢序公之書然得繫名於簡編之末亦為榮幸因不讓而序之公諱基字伯温括蒼人若其言行之詳官勛之次則具在國史兹不著六書本義序古者六書之法皆掌於官成周保氏之職以六書教國子而書之設以同文為盛故又有外史掌逹書名行人掌論書名漢循其法太史試學童諷書九千字者得為史吏民上書字有不正者則糾率之其掌於官可知已夫書非曲藝也大而二帝三王周公孔子之道次而古今成敗得失之迹九流百氏雜家之說又次而官牘家乘錢榖獄訟米鹽碎務之記注莫不有賴於書蓋不容於一日廢者也而為書之法六曰象形曰指事曰諧聲曰㑹意曰假借曰轉注其為法也有子母相生之類形聲清濁之别五方言語之異用之者易流於譌舛自夫官失其守大夫士務趨簡便以指事為象形者有之以㑹意為指事者有之至有以轉注為假借㑹意為轉注其失滋甚於是六書之義不明而義理之精微有失其本真者矣越人趙君撝謙深以為病取許叔重而下諸家論著之書攷其得失推子母之相生俾各歸其類正五方之言語律以四聲而以子母相生之例綂之為凡例以提其綱為圖說以括其要分為十類著為十二篇釐為三百六十部於是六書之義明而六書之用無譌舛之患矣嗟乎大夫士之於六書譬之麻縷絲絮莫不以為衣也而或不知其出於蒔育稻梁魚肉莫不以為食也而或不知出於佃牧習而不察此固人情之大較撝謙非有官守如古者外吏行人之所掌而能用力於衆人所畧之地何其用心之專也哉撝謙裔出宋宗室志慤而守恬其學邃於經術諸子百氏莫不記覧著為文辭抑揚反覆能沛然盡其所欲言而不畔於道觀其所著六書論可見已至於六書本義則其尤盡心者也方國家校正韻譜徴至京師稍試其所學擢中京國子監典簿旋以疾引退遂克畢力於此書書成徴余序之雖然余固習而不察者也安能發其藴以撝謙請之力姑著其用心之專云爾明文衡巻三十八
