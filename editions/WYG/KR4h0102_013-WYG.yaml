body:
  text: 明文衡巻十二欽定四庫全書明文衡巻十三明程敏政編解釋附儒解王禕有用之謂儒世之論者顧皆謂儒為無用何也曰非論者之過也彼所謂無用誠無用者也而吾所謂有用者則非彼之所謂無用矣夫周公孔子儒者也周公之道嘗用於天下矣孔子雖不得其位而其道即周公之道天下之所用也其為道也自格物致知以至於治國平天下内外無二致也自本諸身以至於徵諸庻民建諸三王本末皆一貫也小之則云為於日用事物之間大之則可以位天地育萬物也斯道也周公孔子之所為儒者也周公孔子逺矣其遺言固載於六經凡帝王經世之畧聖賢傳心之要粲然具在後世儒者之所取法也不法周公孔子不足謂為儒儒而法周公孔子矣其不可謂為有用乎噫斯吾之所謂儒也其果世之所謂無用者乎且世之所謂無用者我知之矣逢掖其衣髙視而濶步其為業也佔畢訓詁而已耳綴緝辭章而已耳問之天下國家之務則曰我儒者非所習也使之涉事而遇變則曰我儒者非所能也嗟乎儒者之道其果盡於訓詁辭章而已乎此其為儒也其為世所詆訾而䝉迂闊之譏也固宜謂之為無用固誠無用矣而又何怪焉姑孰潘君章甫儒之有用者也自為右史即以嘉言讜論上簡主知歴僉湖廣淛東憲所至赫赫有政譽用是入中書為叅議遂拜江西按察使夫陪鈞軸總憲度國家之任莫重焉而君則迭任之此其為有用夫人之所知也抑余之所知固有大於是者周公孔子之道吾將望之儒者之效庶㡬頼以暴白於天下寧如今日所見而已乎雖然有用之用難矣而無用之用亦不易也若余者蓋業於無用之用流於迂濶不能以自返者也君盍有以敎我乎哉余嘗執筆繼君後知之也深故於其行解儒以為贈豢龍解朱右龍非可豢也可豢非龍也夫龍淵潛而天飛能小大致雲雷澤下土神變莫測豢養何加焉豢養得加之則非龍矣畨舟入貢由南海入廣有物蜿蜒長七尺魚身牛首繭角鱗甲爪牙鬚鬛具如龍舟人以木穽窊其中置海水以豢養之將獻京師且曰初為漁網得之若黿鼉魚鼈然吾固知其為非龍也天下大獸五鱗之長為龍而龍有神不神不足以長物也臝之長為人而人有聖不聖不足以長人也或以人為人非也聖斯全人矣以龍為龍非也神斯全龍矣人將不以聲利惑則龍不可以豢養得故曰人無慾猶龍然作豢龍解中星解貝瓊中星見於作厯之法尚矣天有定星星無定位各於四時考之南方而堯典言象言次言星之不同何也永嘉鄭氏本於孔注互見之説諸家無以易之蓋南言朱鳥則知東為蒼龍西為白虎北為𤣥武矣東言大火則知南為鶉火西為大梁北為𤣥枵矣西言虚北言昴則知南為星東為房矣余求之經而參之考亭所論豈特以互見為文哉天道至幽至逺而聖人察之至精至宻春言星鳥以二十八宿各復於四方而星鳥適見於昏中故舉而言之至於仲夏則朱鳥轉而西蒼龍轉而南而大火適見於昏中不可以象言亦不可以星言矣秋之中星則𤣥武七宿之虚宿冬之中星則白虎七宿之昴宿故於此獨舉一宿焉大抵天以星為體而有廣狹逺近明暗早晚惟中者則載之故月令仲春昏弧中旦建星中餘月皆舉二十八宿而此獨非者以弧近井建星近斗井斗不可的指故舉弧建以定昏旦之中則知堯典所載豈非以其中之所見而言乎聖人考中星以正作訛成易之事析因夷隩之宜所謂術不違天政不失時者如此然堯時冬至日在虚昏中昴至朱子之時則日在斗昏中壁此見嵗差之由而歲差之由恒於中星知之茍以為互見其法無乃甚疎邪吁差之毫釐繆以千里而學者不之詳也故表而著之釋統上方希古仁義而王道徳而治者三代也智力而取法術而守者漢唐宋也强致而暴失之者秦隋也簒弑以得之無術以守之而子孫受其禍者晉也其取之也同而身為天下戮者王莽也茍以全有天下號令行乎海内者為正統邪則此皆其人矣然則湯武之與秦隋可得而班乎漢唐之與王莽可得而並乎莽之不齒乎正統久矣以其簒也而晉亦簒也後之得天下而異乎晉者寡矣而獨黜莽何也謂其無成而受誅也使光武不興而莽之子孫襲其位則亦將與之乎抑黜之乎昔之君子未嘗黜晉也其意以為後人行天子之禮者數百年勢固不得而黜之推斯意也則莽茍不誅論正統者亦將與之矣嗚呼何其戾也正統之説何為而立邪茍以其全有天下故以是名加之則莽固有天下矣何必加以是名也茍欲假此以寓褒貶正大分申君臣之義明仁暴之别去亂存正扶天理而誅人偽則不宜無辨而猥加之以是名使聖智夷乎暴桀順人者等乎逆弑也僥倖而得天下者雖其勢力之强無所為而不成然其心私計而深念未嘗不畏後世之公議今將立天下之大法以為萬世勸戒不能探其邪正逆順之實以明其是非而槩以正統加諸有天下之人不亦長僥倖者之惡而為聖君賢主之羞乎適事機之㑹庸材小人皆可以得志處非其地用非其時聖君賢主亦不足以成治功古之能統一宇内而動不以正者多矣秦隋其尤也動不以正而以正統稱之使文武周公而有知其不羞與之同此名乎故謂周秦漢晉隋唐宋均為正統猶謂孔子墨翟莊周李斯孟軻揚雄俱為聖人而傳道統也其孰以為可非聖人而謂之聖人人皆知其不然不可為正統而加之以正統之號則安之而不知其不可是尚可以建之萬世而無弊乎名者聖人之所慎也季子然以冉求仲由為大臣孔子忿然爭之若二子之才魯之諸臣莫及也茍為大臣未見其為過而孔子慎而不許蓋才如仲由冉求而以為大臣則伊尹周公將曷以名之乎伊尹周公大臣也則二子非其類矣故曰可謂具臣矣以秦隋而方乎周豈直若二子之與伊尹周公哉使孔子而出其不混而稱之也決矣蓋必有其道焉而不可知矣嘗試論之曰天下有正統一變統三三代正統也如漢如唐如宋雖不敢㡬乎三代然其主皆有恤民之心則亦聖人之徒也附之以正統亦孔子與齊桓仁管仲之意歟奚為變統取之不以正如晉宋齊梁之君使全有天下亦不可為正矣守之不以仁義戕虐乎生民如秦與隋使傳數百年亦不可為正矣偏安而僣尊號女后而據天位治如苻堅才如武氏亦不可繼統矣二統立而勸戒之道明僥倖者其有所懼乎此非孔子之言也蓋竊取孔子之意也釋統下正統之説立而後人君之位尊變統之名立而後正統之説明舉有天下者皆謂之正統則人將以正統可以智力得而不務脩徳矣其弊至於使人驕肆而不知戒舉三代而下皆不謂之正統則人將以正統非後世所能及而不勉於為善矣其弊至於使人懈怠而無所勸其有天下同也惟其或歸諸正統或歸諸變統而不可必得故賢主有所勸而奸雄暴君不敢萌陵上虐民之心朱子綱目之作所以誅暴止亂於前而為萬世法也立一法而不足盡天下之情偽則小人將馳騖乎法之外而竊笑吾法之疎是孰若無法之愈乎故正統以處其常而參之以變統然後其變可得而盡也朱子之意曰周秦漢晉隋唐皆全有天下矣固不得不與之以正統茍如是則仁者徒仁而暴者徒暴以正為正又以非正為正也而可乎吾之説則不然所貴乎為君者豈謂其有天下哉以其建道徳之中立仁義之極操政敎之原有以過乎天下也有以過乎天下斯可以為正統不然非其所據而據之是則變也以變為正奚若以變為變之美乎故周也漢也唐也宋也如朱子之意則可也晉也秦也隋也女后也若此者不謂之變何可哉正統則處之以天子之制變統則不得並焉正統之君非吾貴之也變統之君非吾賤之也賢者得民心得民心民斯尊之矣民尊之則天與之矣安得不貴之乎非其類無其徳民必惡之當時惡之後世以其位而尊之則違乎天矣故不得不賤之矣貴不特於其身而又延及於子孫雖甚愚不肖茍未至於亡國猶尊之以正統之禮賤不特於其身而其子孫雖有賢知之才亦不能揜其惡夫如是而後褒貶明夫如是而後勸戒著正統尊辨禄命辨宋濂三命之説古有之乎曰無有也曰世之相傳有黄帝風后三命一家而河上公實能言之信乎曰吾聞皇帝探五行之精占斗罡所建命大撓作甲子矣所以定嵗月推時候以示民用也他未之前聞也曰然則假以占命果起於何時乎曰詩云我辰安在鄭氏謂六物之吉凶王充論衡云見骨體而知命禄覩命禄而知骨體皆是物也况小運之法本許慎説文已字之訓空亡之説原司馬遷史記孤虚之術蓋以五行甲子推人休咎其術之行已久矣非如吕才所稱起於司馬季主也沿及後世臨孝恭有禄命書陶𢎞景有三命抄畧唐人習者頗衆而張一行桑道茂李虚中咸精其書虚中之後唯徐子平尤造其閫奥也曰十一曜之説古有之乎曰無有也書云在璿璣玉衡以齊七政所謂七政日月水火木金土也而無紫氣星孛羅㬋計都也星孛數見於春秋或見大辰或入北斗紫氣則載之史冊與氛祲同占羅㬋計都者蝕神首尾也又謂之交初交中之神初中者交食之㑹也借此以測日月之蝕也唐貞元初李弼乾始推十一星行厯鮑該曹士蒍皆業之士蒍又作羅計二隠曜立成厯起元和元年及至五代王朴著欽天厯且謂蝕神首尾頗行之民間小厯而已若吳伯善若甄鸞若劉孝孫若張胄𤣥之所造但云七曜而不聞有十一星也曰然則假之以占命又起於何時乎曰洪範云月之從星則以風雨泠州鳩云武王伐殷歲在鶉火月在天駟則以星占國亦已久矣而未必用之占命也曰以星占命奈何曰予嘗聞之於師其説多本於都利聿斯經都利蓋都賴也西域康居城當都賴水上則今所傳聿斯經者婆羅門術也李弼乾實婆羅門伎士而羅㬋計都亦梵書之語其術蓋出於西域無疑晁公武謂為天竺梵學者於此徵之尤信也曰術之縁起則吾既得聞命矣然亦巧發而竒中乎曰有固有之而不可泥也何也且以甲子幹枝推人所生歲月展轉相配其數極於七百二十以七百二十之年月加之七百二十之日時其數終於五十一萬八千四百夫以天下之廣兆民之衆林林而生者不可以數計日有十二時未必一時唯生一人也以此觀之同時而生者不少何其吉凶之不相同哉吕才有云長平坑卒未應共犯三刑南陽貴士何必俱當六合誠足以破其舛戾矣三命之説予不能盡信者此也天以二十八宿為體體則為經有定所而不可易以五星為用用則為緯恒絡繹乎其間或遲或留或伏或逆固有常度而可以理測茍謂躔某宿則吉歴某宫則凶猶或可言也設其星有變其行不依常經而犯乎河漢内外諸星又將何以占之哉或如前所謂生同一時者其躔次無不同吉與凶又何懸絶哉夫萬物皆出於五行安有五行之外又有四餘土水行度最遲而為吉凶者久故有餘氣而氣為木之餘計為土之餘猶或可言也水之餘則孛火之餘則羅果何所取義哉水火土木然矣奈何金獨無餘氣乎或謂相生故有而相尅故無亦非通論也况孛乃妖星或有或無而氣羅計三者本非星也不知何以有躔度之説哉十一曜之説予不能盡信者此也曰秦漢以來諸儒推十二國分野十二次度數及其所入州郡躔次毫釐若無差忒者既可占國豈不能占人乎曰天運地維動靜不同故先正云有分星而無分野占國者不可盡泥也占國者不可盡泥况占命乎曰五星之精發乎地而昭乎天其分配十日十二子名雖殊而理則同也人資天地以生山林之民毛而方謂得木氣之多也川澤之民黒而津謂得水氣之多也得火氣之多則丘陵之民専而長也得金氣之多則墳衍之民晳而瘠也至於豐肉而痺則得土氣之多而所謂原隰之民也然則彼皆非歟曰五土有異而民生以之此固然也人之賦氣有薄厚短長而貴富賤貧壽夭六者隨之吾不能必也亦非日者之所能測也蹈道而脩徳服仁而惇義此吾之所當為也不待占者之言而後知之也予身脩矣倘貧賤如原憲短命如顔淵雖晉楚之富趙孟之貴彭鏗之壽有不能及者矣命則付之於天道則責成於已吾之所知者如斯而已矣不然委命而廢人白晝攫人之金而陷於桎梏則曰我之命當爾也怠窳偷生而不嗜學至老死而無聞則曰我之命當爾也剛愎自任操刃而殺人柔暗無識投繯而絶命則又曰我之命當爾也其可乎哉其可乎哉所以先王知山川異制民生異俗剛柔緩急遲速異齊五味異和器械異度衣服異宜於是脩其敎不易其俗齊其政不易其宜所以卒歸於雍熙之治也昔者鄭大夫裨竈言鄭當火請以瓘斚玉瓉禳之子産不之與已而果然竈復云不用吾言鄭又將火子産曰天道逺人道邇非所及也鄭卒不復火嗚呼此不亦禄命之似乎吾知盡夫人道而已爾曰近世大儒於禄命家無不嗜談而樂道之者而子一切屏絶之其亦有所本乎曰有子罕言命孔子生卒歲月辨或有問於濓者曰孔子之生傳記所載歲月不同公羊氏云魯襄公二十一年冬十有一月庚子孔子生穀梁氏之説年之與日同於公羊而謂冬十月孔子生則與公羊實差一月月固差矣至賈逵注二十一年經云此年仲尼生昭公二十四年服䖍載賈逵語云仲尼時年三十五則皆以孔子為二十一年生也司馬遷著孔子世家云孔子生於襄公二十二年則與公羊穀梁實差一歲日則雖與公羊同而月復與榖梁異杜預主司馬遷以注左氏傳謂二十二年生司馬貞主榖梁公羊以證史記謂二十一年生遷誤為二十二年者蓋以周正十一月屬之明年也孔若古主公羊榖梁謂為不易之論胡舜陟主司馬遷謂如穀梁公羊所書則孔子出處之年與經史諸子皆不合孔宗翰亦主司馬遷羅泌之議畧與宗翰同洪興祖主榖梁而謂周家改月十月二十一日庚子即夏之八月二十一日馮去疾見傳記異辭則造為調停之言曰襄公二十一年實己酉之歲也是嵗八月置閏以厯法積之則大雪節當在十月十七日或十八日是為十一月朔氣又三四日方為庚子是孔子之生已在十一月之節矣既在十一月則是二十二年庚戍嵗首無疑公羊書為十一月似誤而非誤也司馬遷書為二十二年而又謂孔子之年七十三以卒亦未嘗誤也榖梁於年於月皆據實而書公羊於年亦據實而書於月則以節書謂有日可以表見也司馬遷於年則以節書三者皆非誤也若是衆言之不齊何如濂應之曰公羊榖梁二氏傳經之家也傳經之家當有講師以次相授且去孔子時又為甚近其言必有據依司馬遷固良史則後於榖梁公羊者也吾則無徵乎爾孔子所生之年吾當從公羊氏穀梁氏然以春秋長厯考之二十一年己酉十一月無庚子庚子乃在十月之二十一日孔子所生之月吾當從榖梁氏注家謂己酉為己夘夘酉之文相近故誤書也曰孔子周流諸國之年世家所記多不可考宋之大儒或取之若如子言無不遲一嵗者遷尚不足信乎曰衛靈公之時孔子適衛又適陳匡人以為陽虎而拘之世家謂孔子使從者為寗武子臣於衛然後得去按武子仕於成公之朝至穆公末武子之子相已與孫良夫將兵侵齊則武子年當耄矣復歴定獻二公凡三十七年至靈公三十八年而孔子至衛使武子猶在其年將一百五十有餘嵗矣武子之事然也孔子之年乃獨可信乎非惟此也孔子去魯世家謂定公十四年年表則又謂為十二年以年表為是則世家為非以世家為是則年表為非一書之中自相矛盾若此他蓋不足深論皇王大紀曰遷載孔子言行不得其真者尤多言行且爾而况於年乎曰洪興祖謂周之十月即夏之八月者然乎曰非也三代雖異建而月則未嘗改也殷嘗建丑矣書則曰惟元祀十有二月秦嘗建亥矣史則曰元年冬十月舉前後以例之則周制可知孔子作春秋行夏之時為萬世法不過截子丑二月於前嵗之終耳月固不之改也否則春入於夏夏入於秋錯亂而不成嵗矣曰馮去疾謂十月庚子在大雪後即為十一月者可乎曰亦非也世之星史厯生以六物占人休祥當氣㑹之交固有生於己酉而以庚戍嵗推之者孰云吾儒乃有是邪此野人之語舍之勿以汙齒牙可也曰孔子之生予既得聞命矣其卒之時亦有一定之説乎曰左氏云魯哀公十六年夏四月己丑孔丘卒司馬遷遵之諸儒又從而遵之理之所在孰得而違之故孔子所卒之年吾當從左氏然十六年乃壬戍之嵗也是嵗四月戊申朔有乙丑而無己丑己丑乃在五月之十二日已與乙文亦相近故誤書也所謂乙丑則四月十八日謂當夏正二月十八日者非也謂十六年為辛酉己丑日為戊戌者亦非也自壬戌嵗上遡己酉孔子之年乃七十四謂七十三者尤非也曰近代王應麟博極羣書者也頗致疑於是而謂今不可考矣子乃質言之何邪曰衆言紛淆者當折衷以經經無明載當索之於傳索之於傳不猶愈於史乎謂今不可考者過矣曰子之言辨則辨矣夏周二正千古難決之疑也何言之若易易邪曰是非爾所知也雖罄徂徠之松以為煤盡剡溪之藤以為楮未能竭吾喙也他日當為受春秋者詳焉犧尊辨胡翰禮有犧尊即獻尊也司尊彛曰其朝踐用兩獻尊其再獻用兩象尊鄭氏讀獻為犧又音犧為摩挲之挲非也獻舉其事犧言其象其為尊一而已以其尊之一而謂其音亦同不可也犧尊與象尊相須鄭氏謂犧尊飾以翡翠象尊以象鳳皇其説亦非也蓋犧尊為牛形象尊為象形皆周尊也王肅云犧象之尊全刻牛象之形鑿背為尊宋劉杳言古者犧尊彛尊皆刻木為鳥獸鑿頂及背以出納酒二家之言近之而杳又云魯郡地中得大夫子尾送女器有尊作犧牛形晉永嘉中青州盜發齊景公冢獲二尊狀類牛象意者古之遺制也茍以為刻木安能久置地中不壊或謂犧尊畫牛象尊畫象亦以木耳非古之遺制也蓋二尊皆以銅為之其取義皆以牛象而得名犧尊為犧形象尊為象形則犧當讀為羲獻當讀如憲各如其字之本音可也獻舉其事犧言其象不害其為器之一也觀於閟宫之詩朱子不取毛氏沙飾之義而今猶取鄭氏摩挲之音豈非過乎况杳之言足以證肅之説有足信乎宋皇祐中得著尊阮逸胡瑗取其器有脰名壺尊可也著地無足名著尊可也未能必其主名及黄長睿見之始定為著尊以為尊皆有脰唯其無足而著地則禮之明堂位所謂商尊曰著者是也後有若長者安知不以余言為然乎余故具著於此以見名物度數在先王時不過有司之事降及後世雖學者不得而盡考焉則夫斯禮之失也久矣明文衡巻十三
