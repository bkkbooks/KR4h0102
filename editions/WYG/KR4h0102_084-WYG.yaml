body:
  text: 明文衡巻八十四明程敏政編墓誌銘翰林應奉唐君墓誌銘蘇伯衡翰林應奉唐君處敬年四十有四以病卒于濠之瞿相山其孤之淳奉骨歸越祔于山隂縣承務鄉赤土山先塋之次而為狀授使者將圖其不朽於伯衡昔歐陽子深慨夫文之復古者難得其人又謂學者文章見用于世鮮矣况得施於朝廷而又遭人主致治之時乎君之文可謂無媿於古矣亦既遭逢盛際而用之朝廷矣然未究其用以一眚之故至廢為耕民而困頓以死其文章迄不得施諸典册遂使一代之詔令不能追還三代之盛是雖曰有命抑豈獨君之不幸歟故於其死也凡知之者無不為之悲而至今論者猶為進退人材者惜焉伯衡知君特深安可使君賫志地下而無一言以白之君諱肅處敬其字也自號丹崖居士世為抗之新城人君之父始遷居越故今為越之山隂人曾祖文源祖榮貴父應麟母汪氏君生有異質敏而克勤幼從先生王萊山授毛氏詩比長兼通諸經旁及子史隂陽醫卜書數之學無不研究資為古文簡潔而雅奥律詩歩驟盛唐樂府古詩上薄漢魏場屋之文特其餘事尤工篆楷深得筆意至正壬寅君充賦江浙中其選以道梗不得上春官省臣便宜授杭州路黄岡書院山長轉嘉興路儒學正皇朝取浙西例起赴南京君以父憂東還洪武三年春用近臣薦召至京師纂修禮樂書其夏擢應奉翰林文字承事郎其秋科舉法行預考南京貢士有織文之賜其冬扈從東宫拜英陵有襲衣之賜至明年夏以疾失朝參例免官歸鄉後例謫佃于濠則癸丑之秋而君以是秋至瞿相山卒於甲寅十二月六日而歸祔以乙卯七月二十四日娶汪氏子男一之淳也强學能文克世其家女一人早卒孫女二人尚幼所為文十巻藏于家庶其不朽者在是伯衡無以加之矣銘曰世所須而或乏駑駘以之駕馭材適用而不急騏驥不免棄置故君之文足以華國而其身竟死於甿𨽻非人之能不能亦世之貴不貴也悲夫故元中奉大夫江浙等處行中書省參知政事周公墓誌銘至正乙未閩括之冦蔓延平陽且兩嵗矣民之黠者跳踉以相附和弱者不能自立於是四境之内胥而為盜者十六七淛東道宣慰使恩寧普來鎮溫求可屬任者僉薦公可宣慰問所以可者僉曰公以門功補海口塲鹽司令龍江書院邇其治所乆廢無能葺公初至謁先聖立勸竈户新之柱悉易以石不半嵗告成豪民項德兄弟積為民患以賂結權勢前後塲官少忤之輒遭反噬公竟發其奸罪論如法海口之俗嵗正月千百為曹聚東郊擲石謂之禳祈傷支體不恤有司痛繩以法莫能禁其來乆矣公懸榜約束之無一人犯者其俗遂革甫二年得羨鹽四千引以此知其可也宣慰曰即周司令耶我習聞其人便宜命公攝行平陽州事而浙省左丞特哩特穆爾至自台先是公以副元帥吳世顯政乖其方任用非人變在旦暮毒且及民詣左丞言狀請豫為計不旋踵而陳安國賊世顯其所任治兵于平陽瑞安者亦戕于賊悉如公言左丞由是器公倚公討賊安民給以糧五百石勉令就職人皆以兵食不足沮公無行公曰父母之邦也受命立行隨以所給糧賑饑民曰事無急此不然皆盜也時平陽惟江南鄉阻江為塹鄉民自相團結賊不敢入境公以五月至江南屯白沙禮致大家使輸軍儲設法募丁壯為兵而訓練焉民既用命軍實具而兵日衆或請出師公不許人謂公怯公曰以新集之兵擊數年之㓂茍不持重萬一失利損威重莫甚焉後將何以成功在兵書致人不致於人冦至擊之未晚八月劇㓂李師金翁瑞突入黄浦江公勒兵渡江迎敵賊大潰斬其馘百餘而生擒數十人兵士請乘利深入公不應俄大鬨公堅坐不動徐自定取其首謀者斬以徇而申明紀律遂移屯逕川冦來薄我三合而三㨗復遣輕兵衝其後賊駭亂獲其魁金安三吳邦大邦大素健鬭衆之所恃至是獲之賊奪氣追北數十里殺獲甚衆獻俘于左丞仍以計誘致李師金翁瑞及他黨數十皆戮之而散其火伍歸農獨西溪冦恃括冦不下且請決戰糾括㓂數萬直擣逕川公曰賊輕我矣今日必殄之部署其衆而下令曰勿擅動聞鼓聲則進望其白旗下多精銳命士引弓齊發仆其執旗者鼓而進賊不能支自相蹂躪聲言勿殺我當投降許之張仲卿者即趨而前俯伏公撫而遣之還諭衆曰周知州知爾從賊出於迫脅不爾誅降無不宥不者擊爾盡乃已仲卿又盛稱公誠信人人喜曰有生意矣争棄仗來降上功行省陞淛東道副元帥總制平陽瑞安丙申正月别冦葛兆出掠走之獲冦金龍十明年又出襲我覆之獲冦吳天雷等遂命弟誠德分兵擊下瑞安諸砦而歸其民黄宗雲等之辟居平陽者進兵會括分院兵夾攻㓂之抄平陽者破其窟穴惟吳悌五遁之福寧王賢五所括分院以誠德功聞于喀喇丞相授忠顯校尉同知平陽州事兼行軍鎮撫尋引兵趨象原以逼王賢五方置營而吳悌五領衆奄至誠德奮當其衝突吳悌五中矢其下負以走因其亂薙之僵尸數里未幾購得吳悌五併三恢冦鄭子敬送于閩省誅之經畧使在閩遣從事官工部員外郎曾堅分御賜酒勞之承制擢公行樞宻院判官自是平陽之人安於耕鑿以供租稅矣公曰外攘之功粗立其益嚴内治之修乎壁於州南五里而鎮焉革蠧弊平訟獄布寛政行義役與民休息浚河渠若干里深丈有二尺廣倍之築海隄若干丈廣二丈崇半之又興土木之功官署孔子廟學東嶽行宫城隍祠廣福宫悉復其舊内而布教條外而修職貢使者咸出其途迎來送往禮無或遺雖廪無餘粟庚子夏聞京師旱遣弟紹德漕運糧二萬五千石上供天子嘉之賜龍衣一襲及上尊酒真授行樞宻院判官階奉議大夫而官誠德以昭信校尉溫州路總管判官紹德敦武校尉同知平陽州事麾下士錫命有差當是時方國珍姪明善以樞判制溫公不為之下而明善忮公屢軋以舟師公屢却之然自念彼不有朝廷况有鄰州乎且彼據三郡而吾以區區一州與之抗終非萬全之計進父老語以故欲委地去聽民自為去就父老曰方虎狼也公於我等數年安全之一旦以遺虎狼忍乎公若終惠我等幸與之修睦公用父老言遣弟明德往謁拘留不遣辛丑夏遣都事張君錫漕貢如初天子益嘉之進朝列大夫同僉行樞宻院事降分院印明善舟人在直沽者欲奪印不克壬寅春遂以三千餘舟列營平陽瑞安公四面受敵激諸軍以忠義人皆感奮屢挫其鋒又遣没人斷其矴纜乃解去追獲舟二百會集賢院都事興通持詔來勞公乃遣都事蕭天瑞從詔使入貢謝恩且進地圖表言國珍侵軼乞注代天子覽表為下詔讓國珍仍有龍衣御酒之賜超拜中奉大夫江浙等處行中書省參知政事刻分省印使佩之以承德郎行樞宻判官官誠德國珍被詔大怒調台慶溫之兵來攻相持閱六月隂啗公帳下林淳以厚利使為應三郡兵攻其外淳應於内九月平陽陷執公及誠德紹德以去誠德慢罵明善遂遇害刳其皮焉至死罵不絶口紹德則縋以石而沉諸海送公國珍國珍甚禮公好語公曰省臺貴臣皆聽吾命公獨敢我抗豪傑士哉自今與公釋憾其仍為參政我所公曰我與爾有不共國之仇而與爾共事乎然國珍終不敢害公越三年王師取台慶公與國珍例遣赴南京後公以誠意伯劉基言得放還田里洪武辛亥大臣行邊者復遣赴南京其秋八月壬寅卒于南京享年六十有六後十月壻顧克敏歸其柩平陽以甲寅十二月甲辰葬於睦嶺之原公諱嗣德字宗道姓周氏平陽人宋江隂軍節度推官元贈中順大夫淮東道宣慰副使上騎都尉追封永嘉郡伯汝臨之曾孫元累贈太中大夫河南路總管輕車都尉追封永嘉郡侯雷轟之孫元太中大夫同知浙東道宣慰使司副都元帥致仕贈同僉太常禮儀院事輕車都尉追封汝南郡侯諡康惠應奎之子也曾祖妣張氏追封永嘉郡君祖妣翁氏妣游氏並封永嘉郡夫人妻顧氏封永嘉郡夫人次陳氏其壻永嘉陳聰奉事狀求伯衡銘其墓昔我先君以江浙省左右司都事佐戎于括公無月不通問伯衡不敢以不知公為辭乃為敘而銘之銘曰元運將終並海之邦自租自稅大憝氏方海邦之民亦孔之痗頭箕會斂擢筋盬髓眷兹平陽于方咫尺虐燄炎炎何以不及文武周公厥猶克壯天矜于民俾作保障公未至止豈無州牧鄰冦横行曾莫敢逐凡厥士女東竄西匿寢食不遑矧暇耕織公既至止奮其戎兵招降討逆内謐外寧凡厥士女有室有家爾藝黍稷我種桑麻相時倉廪􅑎然空虛謂公蹶蹶公則舒舒征從其薄刑用其輕追還舊觀百廢具興先聖之居明神之廬出治之所棟宇渠渠憂彼水旱為民之病以畚以鍤河渠攸濬虞彼潮汐為民之患廼疆廼理作之畔岸維民休戚係公存亡公構閔凶孰不痛傷昆山蒼蒼不崩不墜公功巍巍克類克對我采民謡勒碑墓道無曰不顯終古有耀故元溫州路同知平陽州事孔公墓誌銘至正末方國珍據台慶溫用名士以收人心凡士居其地者不為所用則為所禍而其於公也不得而用之亦不得而禍之四方之士聞而莫不高其風國初胡仲淵以王府參軍鎮括將進公于朝而先之以書幣公返其書幣謂使者曰使孔𤾉一出足為天下重雖强顔從參軍後亦不辭不然何益况吾父年垂九十不可頃刻去左右參軍奈何欲使之胥為不忠孝人邪仲淵愧其言而止洪武元年按察僉事趙壽將使指求賢浙東得公於溫以應詔公終辭不起士益以是高之公神明之胄起家為名進士仕州縣為良吏師學為儒宗當世尊而仰之不在彼而在此也公自㓜篤志於學警悟强記絶人而諸經史百氏之書罔不該貫取元統乙亥鄉薦溫之士以春秋貢者自公始方上春官而科舉廢南歸以衍聖公思晦舉署永嘉書院山長未上而科詔復下至正元年再薦于鄉登二年進士第擢衢州路録事階將仕郎九年轉從仕郎處州路慶元縣尹代歸以二親年高絶口不言仕進十九年中書參政布延布哈公内臺治書李公國鳯經畧江南得便宜除拜承制授公溫州路同知平陽州事使得便養公奉檄欣然而起其為録事於衢也下車適大旱以郡守命禱徐偃王祠下未復命而雨如注莫不驚異民汪明之兄弟争家財吏展轉求賂數嵗不決公問汪曰兄弟親孰與吏汪對曰兄弟同産吏途人爾公曰敝同産以資途人汝何不思之甚邪其兄弟立感悟叩頭曰不敢復煩官府矣廉訪僉事巴拜公行部莅衢委以難決之獄凡所平反無不服其明允遂以最聞朝廷遣使分道宣撫過衢得公治狀甚禮遇之其為令於慶元也會分憲余公闕以括賦役不均舉行覈實各縣皆擇人往董之惟慶元就以屬公乃令民以田畝多寡自占即不實罪及隣保立法周而用法嚴民自占無敢不以實賦以田制役以賦定富者幸免貧下重困之患遂除余公自為書遣吏勞以公堂酒學宫在縣西大溪之北公始視事進謁阻水不得前聞舊有詠歸橋直神力院左廢且數十年即經營興復之六月而成其修七百尺其廣三十尺覆以屋為間四十有九來往者便之壬辰嵗侵縣西鄙小民六十餘人稱貸於富民弗從强委劵而發其廪以去富民忿之訴公以為强刼公惻然曰彼艱食冀活性命乃爾情亦可矜矣今以其活性命者戕其性命吾不忍為也若何獨忍乎富民愧謝而退閩冦犯縣境公能以義兵擊退之民賴以安急於仕者率縛平民儌賞典公曰軍功與民命孰重輒解其縛而縱之平陽鄉邑也時行樞宻院判官周嗣德行州事公不矯以為異不比以為同事無大小一裁以法雖族婣不少假借之君子稱其識大體為平陽三嵗丁母㳟人憂解官明年州人以版圖上于職方公與陳子上者慨然有浮海之志顧父判府公在堂子上入閩公羈孤無儔却掃一室名曰潔庵情有所觸俛仰書空而已後三年而判府公捐館公年六十三而執䘮哀毁又十六年公以疾不起洪武壬戌七月二十七日也得年七十有九臨終謂諸子曰吾今而後有以下見曾大父于地矣蓋公之曾大父曰景行宋太學内舍生度宗幸學循故事官先聖子孫賜同進士岀身授慶元府學教授陞從政郎主管禮兵部架閣文字宋亡不復仕是以云架閣之子曰士璘元永嘉縣學敎諭後以子貴贈從仕郎曲阜縣尹曲阜之子曰山入用翰林鄭公陶孫薦厯永新州學正龍溪書院山長江州路儒學教授湖口縣主簿慶元會稽兩縣尹以承務郎松江府判官致仕公其嫡也諱𤾉字子升生於大德甲辰正月十九日母㳟人許氏湖廣儒學提舉澹齋先生善勝之女娶王氏封㳟人以大德丙午三月十一日生以洪武己卯十二月三日卒葬縣西之肇奥子男五人謜說詳訓王岀也誌側室陳岀也詳訓早亡女三人皆已行而卒孫男四人宏寏邃瑩女七人長適林與方次適項愉餘未行平生所為詩文總十二巻曰潔菴集藏于家謜等卜以十六年癸亥十一月十日合葬于肇奥屬其門人䝉隂縣主簿林與直為狀來請銘伯衡晚陋不足以知公竊窺公當運去物改之後不降其志而得明哲保身之道善於用晦而不失岀處去就之義可謂無愧古之仁人矣論次而顯銘之百世之下寧不尚有觀感而興起者乎銘曰恂恂孔公宣聖之孫道深皇王學貫天人宏中肆外而鳴以文廼旅俊造廼充國賔廼綰章綬有社有民敏於為政一本於仁世運俄否歸伏海濵大明受命萬國維新求賢有詔使者在門引疾堅卧耳若不聞所執者節匪潔其身優游令終允矣全臣肇奥之原巋然丘墳勒銘于石千載弗諼魏夫人宋氏墓誌銘高啓蘇州守江夏魏公以其先太夫人行述授渤海高啓曰吾妣棄吾二十有二年矣遭時多故權厝先塋之左今始得地於吾里黄岡湖東某山之原將以某年某月某日而葬子為我志而銘之公昔掌國史啓嘗為其屬今又居公之野辱以先銘是屬不敢當然亦不敢辭也按夫人姓宋氏武昌蒲圻人宋彈壓官諱時慜之孫女諱某號俊齋之女同邑隱君子碧崖魏先生諱雲瑞之妻也夫人生而穎異七嵗能誦曲禮内則曹大家女訓十嵗共女事無闕既長歸先生先生故名家世儒履行高潔夫人相之稱賢配焉居母姑之䘮皆過哀疏食終三年待内外親族無異意先生嘗遊齊安遇疾卒於邸有子三人法孫巳孫虎孫初聞訃將遣法孫迎䘮或曰江多蛟龍性惡屍以柩渡虞有變宜焚骨歸也夫人哭諭法孫曰是將陷吾母子於大戾也爾忍而父為灰燼乎亟往母有憚而父善人神必相之矣迄渡風浪帖然䘮既還或又曰柩入家弗利夫人曰此固吾夫宅也舍之使何適哉茍有弗利當萃未亡人之身未亡人得從夫于地下足矣即帷正堂奉安旦夕哭臨逮葬毁瘁幾不能為生嘗謂諸子曰不幸門戸凋落汝父汝伯相繼殁若曹尚誰賴哉宜力學善自立大汝家以慰老人之望毋從里中兒嬉也子皆承教惟謹先生庶母羅氏性素嚴號難事夫人始終奉承有順無忤疾則侍粥藥殁則營䘮葬皆必誠焉巳孫既娶乆未有嗣夫人曰吾老矣獨不得一抱孫也禱于先夣紫衣人種栗舍垣下告曰此萌也為他日興植汝門之本覺旦語巳孫曰汝有子祥也既而果生男夫人喜曰神不我誣遂以栗名嘗得眩疾既間曰吾度不能乆處人間矣命舁柩堂下沐之曰吾藏身此中無隙則佳耳又命新婦取衣衾當斂者縣之椸餘悉散諸親愛除夕家人進椒酒夫人起居尚無恙元旦坐堂上親戚為壽畢曰我明日逝矣為我謝某謝某翌日沐浴更衣坐呼巳孫等謂曰吾年七十六壽亦足矣死自吾順汝曹勿號慟亂我聽使我得好去也語已遂殂實元至正十年正月二十日也法孫蚤世虎孫仕元為岳州路儒學正平江州楊栁灣茶司提領亦先卒巳孫今名觀即公也仕國朝厯太常卿翰林學士國子祭酒至今官嗚呼夫人貞孝慈睦其賢卓著如此固非凢婦人所及至於聽言不惑臨終不亂則又士君子識義理者或有所未能而夫人能之豈非難哉雖生不及見子之貴以享其榮養然死而子能以儒學際聖朝爵三品當得褒贈之命象首錦櫜以光賁於窀穸又能追述懿行以圖不朽則夫人何憾焉銘曰維君子嬪貞以禔身能教其孤為今名臣卒既有年始歸斯阡時虞未遑豈曰緩焉乃刻銘章載揚幽光永固以安夫人之藏長山先生胡公墓銘吳沉金華文獻邦異時碩儒魁彦踵武迭興或以道德鳴或以文章顯或以氣節著聲稱當時名載簡册若乃接前修之緒為後來之倡則長山先生胡公其人也先生諱翰字仲申世金華人在宋有諱漢者以學行聞於鄉號南岡處士先生曾大父也大父諱伯起父諱英仕元為太平路總管府照磨兼架閣事莅政有績先生㓜聰睿甫七嵗志氣即與羣兒異一日於道中拾鏹若干緡不敢去坐候遺者至而還之歸告母夫人何氏夫人竒之益督以學既長侍架閣君宦游蘭溪從禮部吳公學公一見即期以逺器繼從吳先生於浦陽博覽經史靡所不究又登文懿許公門南北士在講下者皆願與交復以所著文進之文獻黄公待制栁公二公稱贊不容口翰撰張公於文最少所許可見先生之文無異辭也是時文治方興輦轂之下英俊雲集先生游焉見其人而誦其文者莫不稱嘆有勸之仕輒謝之遂過廣川弔董生謁曲阜拜孔子墓而歸先生於當世名公卿多所交接惟武威余公闕宣城貢公師泰號知己遭時多虞四方兵起避地南華山中著書自樂大明開天皇上駐兵金陵招羅賢才遣使聘先生會有以金華民籍田岀兵者先生從容進曰金華民素儒不習軍旅籍以為兵徒費廪粟耳上可其奏即罷之授衢州教授洪武乙酉奉㫖纂修元史入局撰英宗睿宗實録及拜住丞相等傳凡若干巻賜白金文幣以歸素嗜山水晚嵗愛北山泉石佳勝卜居三洞之上竹林之源幅巾短杖徜徉終日或乘興入城府訪故舊則留連數日先生生元丁未十一月初三日卒於洪武十四年正月十日年七十有五娶謝氏蚤世再娶衛氏皆無子以姪溥為後衛氏先卒先生葬之靈源市阜後二年合葬焉所著有春秋集義有文曰胡仲子集詩曰長山先生集先生既没其門人徐恒狀其行致其猶子濬之與其孤之請俾余誌其墓先生禀高明卓絶之資為精敏宏博之學得於心而證於人稽于今而質于古為文章簡潔清峻不作則已作則必高岀於人性嚴毅寡酬應未嘗輕有所毁譽暮年請文者踵門不茍隨也曹國李公在大臣中號尊賢下士於先生待以殊禮每欲以先生名達上前知先生老病不强也聞先生卒嗟嘆乆之沉之生也後先生十有七年先生不鄙而友之比年來數奉談笑相知為深敘先生之行而銘之宜有不得而辭者矣况門人弟子千里有請乎銘曰嗚呼先生文之雄也山川孕靈秀所鍾也沉浸經籍包羅古今至和含中大振厥音五行麗天芒寒色正朱絃在廟肅然其聽先生之學豈止於斯命之不達竟老而衰學傳於人言垂於世生宇宙中何怍何媿金華蒼蒼靈源泱泱先生之名與之俱長故福建儒學副提舉王公墓誌銘貝瓊宋之南文獻故家多萃於四明而世其學者有王公叔載焉蓋自厚齋尚書倡學者以考亭朱子之說一時從之而變故今粹然皆出於正無陸氏偏駁之弊而叔載又能守之不失嘗讀臨濠教諭鄭真所著遂初老人傳其言行鑿鑿可考遂初者叔載所自號也然不獲一試以終逺近悼之既葬之明年其子陞謀立石墓道而以文詞顯于今而信于後者莫若國子助教貝瓊仍授狀并書於使者來中都為請曰惟是不肖孤方斬焉在衰絰中不得匍匐走謁館下惟先生哀而銘之庶先人死且不朽而尚書公亦有光焉余辭不獲遂次第而為銘按狀公諱厚字叔載姓王氏其先瑯琊人至宋徙居開封高祖安道保信軍承宣使靖康之變扈從南渡始家于鄞曾祖撝吏部郎中崇政殿說書祖應麟中寳祐博學宏詞科厯事三朝官至翰林學士禮部尚書號厚齋父昌世承務郎人皆稱承奉公黄文憲公為志其墓曾祖妣某氏祖妣舒氏戴氏皆贈碩人母楊氏公㓜而知學八嵗能賦詩讀書日記數百言十嵗已竟論孟詩書禮記并閱尚書深寧集習經義詞賦操筆立就鄉先生王僉判叔龢趙太社盂何戴教授表元聞而異之因就見焉元延祐初科制行改治詩經初李國博元白授詩於舒文靖公璘王與舒李世親盡得其源委乆益充積博洽凡性命治道禮樂法制及臺閣典故世胄譜牒鄉里多咨問之袁文清公桷自翰林居里第輒問所學對曰近於濂洛關輔建安西蜀諸書稍已通習惟讀書記衍義正宗意有所得以其明潔縝宻有成法易知而可守也因言世之學者稍渉朱子數書輒詆淳熈諸老與朱子同時其言論雖不盡合而博聞實踐為所推許今人耳目所不及乃藉口理學以文寡陋高談闊視漸成虛誕之風先生宜懲其弊以新士習文清著四明志命公分撰二考且言子家世太史亦嘗究心否曰經與史同出異名古有編年司馬氏為紀傳隋志始稱正史非古也作史必曰三長年代協體統之會人物萃品題之歸敘事貴詳不為繁修詞有要不為簡彼謏聞寡見雜出衆手舛訛遺漏欲以傳信乆逺豈不難乎因厯舉累代高下得失甚備文清大喜復閱其文作而嘆曰先師之道兹不墜矣嘗為郡庠訓導演說名理辨析疑難諸生恱服往時博士朔望講義就章立題卒一篇而止公病其拘取四書五經關世教者為之直說抑揚反復聞者竦然嘗三試不偶即棄去舉子業用詞學十二體為古文本之三代兩漢博以唐宋諸家屬詞有法絶去雕巧然時之知者蓋寡矣浙東廉訪司副使曾某署郡直學公辭都司牟應龍謂之曰先儒謂錢穀亦為已之學也廼就職塗田砂岸先侵於豪民者悉陳而復之盈考宣慰司板授象山教諭考覈田租侵漁者不復逞調浦江教諭踰月即去官歸奉母時朝廷遣大臣李國鳯經畧江南以便宜用遺逸有司以公名上即署衢州路教授而中書復用外臣薦除邵武路教授福建分省又陞為儒學副提舉皆不起既老嘗語人曰天地生人之初吾不得而知也可知者理而已理之在人初非不善克遂其初斯足矣乃號遂初老人云尚書富於著述玉海最為詳洽未脫稿而失後復得之中多闕誤公考究編次請于閫帥鋟梓并他書十二種以傳袁文清公所撰四明志或讒于僉事苦思丁將毁其板公白太守王元㳟曰袁公中朝名臣書法高古不可毁也元㳟特書以進僉事驚悔命與舊志並行公為成續志若干巻鄉飲酒禮乆廢太守用程先生端禮言屬公與鄭先生覺民考訂一遵儀禮用賔興嵗行之以經費不足而田為吉祥寺僧所據白諸有司僧以田歸我嵗入遂充其禮浸盛觀者謂紹興以來昉見於此而先王之教猶存也公天性質直人有過則面折至發赤品别人之賢否不以勢位高下為輕重不以待遇厚薄為是非送死厚於奉生恤小篤於事大報德甚於念惡勇退急於趨進晚年益以詩酒自娛客至論宋季事亹亹不倦且及至正史官詮次弗當欲為釐正尤極論奉化陳桱續通鑑前後之失有遂初稿三十巻藏于家戒其子陞隲曰承家不在名位而在不失身敬身不在外貎表襮而在毋自欺讀書當貫古今處世必審進退其有同流合汙以為通矯時干譽以為高患得患失以終其身者此吾所深惡非所望於汝也大明洪武九年丙辰三月十日卒享年七十有七妻史氏系岀相家與公合德先公卒子二人長陞次隲隲為弟寧孫後寧孫通春秋詩二經蚤卒無子遺命與同葬女一適戎某孫男一初孫以是年四月十四日葬于鄞縣先塋之右與史氏合兆嗚呼四明之學惟尚書之廣博精深論者謂兼東萊西山二家之長非袁楊所能及而公克繼其傳雖不見之所施足以垂後無疑也故特掇其大槩而事之具于傳者可畧銘曰王氏之先世居瑯琊再徙于鄞繇儒起家逮尚書公耀其光彩所蓄之富浩乎淵海昭昭大中或為異同倡而正之畔者斯從偉哉叔載克紹于後遺編佚稿既習而守人亦有言惟祖惟孫不襲以爵道寔惟尊紛紛黄小得失寧辨本棄末務内忘外鍵三年象山逺近是咨大夫有友學者有師時既不偶宜退奚乆日遊以嬉託意詩酒嘅彼里豪貪縱鴟張盈必易覆烟消雨茫惟吾遂初初豈不善年踰七袠雖晦益顯鬱鬱堂封在彼高原式衍餘慶以利後昆明文衡巻八十四
