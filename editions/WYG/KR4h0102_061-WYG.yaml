body:
  text: 明文衡巻六十一明程敏政編傳錢可大傳梁潛可大名瑛姓錢氏本吴越王鏐之後厯廬陵刺史滙再世曰和自廬陵徙吉水又四世曰程程之子誠可皆以科第有聲而可大之祖本和號梧岡先生者尤篤行之士也可大生十八月而孤稍長性穎敏年十三以書經中臨江路賞試既又中撫州路賞試然是時元祚日非紅巾盜起所在皆争為雄長自至正丁酉五六年士大夫顛頓甚矣可大奉其祖及其母﨑嶇以避之走廬陵之富田遷泰和之梅岡既又走其邑之太洲尋又奔雷川最後奔廬陵之李坑李坑路極險盜又追及之梧岡被鎗不死縛之以行可大聞即冒白刃奔訴乞以身代盜併縶之可大訴不已梧岡亦哀訴其無子唯此一孫耳兩人因事相代死情亦悲慘賊憐其意遂兩釋之可大方脫時其母尋亦被執而可大妻張氏翳伏叢薄中窺見賊已執其姑即自出迎謂賊曰我姑老矣請釋姑而縛我賊熟視良久即解縛其姑縛張氏張氏既就縛擲所攜袖中雙鞋與其姑訣曰婦無用此矣且行且睥睨其姑稍逺即罵賊不復肻行遂死之變故倉卒之頃而一時憤然求死以全生者若素約然何其可悲也國朝兵定有司以可大之賢凡三薦之皆以親老辭親既沒終身為之悲痛梧岡故所築樓可大每一登之輒流涕因名之曰思樓其孝行篤至世盖少見也然其為人頗豪健嘅然以氣自負鄊有劇㓂嘗殺人有司憚不敢捕以屬可大可大立捕殺之年若干卒于家一子曰遂志今以科第得官為山東按察僉事云賛曰吾嘗過錢氏所居其地今所謂錢塘者愛其山水清曠因登髙而望焉其南數十里外峻峰躍起視衆山特髙云其北即宋丞相文信公故居也諸老人言丞相往事與史傳所記殊異因言可大之避亂也居其山下最乆其被執也亦幾不免余既壮其山川又聞可大事思見其人而不可得也因為之傳云徐孟昭傳公諱旭字孟昭姓徐氏饒之樂平人其先南昌人也居樂平者十七世世以儒為業公㓜穎悟稍長從其鄊先生蔡仲淵授春秋為文辭已超詣㧞出見者皆竒之年三十一登洪武乙丑科進士第行浙江道監察御史入為禮科庶吉士日記事侍上左右上方屬意天下進士每朝羣臣退獨進士留被頋問上未退不得退也一日上呼公至前將有所任使而公奏對弗克稱㫖上以其迂也命分教于涿州之房山復教諭鳯陽皆以憂去服闋擢安王府紀善用薦者陞為知州入史館上書論天下事多不能合公益落落自殊無所顧惜遂自史館出為考功員外郎及今上即位遷郎中預修髙皇帝實録明年拜朝列大夫國子祭酒又明年罷為翰林修撰以卒公在髙帝時素以篤學見稱數言事切中當時髙帝嘉納之然欲老其才故抑之乆而未有以用之也及在考功拒請託抑僥倖是是非非毫髪無所遁其情而尤以為天下之治與教在守令與教官守令教官弗稱其任者尤精覈之無少貸衆望風諠騰公持之益堅及在太學亦如在考功時然公純謹君子也雖盛威儀而中情簡質好惡出乎其至誠至于卓卓自守激之而不動挫之而不撓人未有過之者也居太學僅一年諸生凛凛僅自修飭而其僚屬之不便者已譁然議之矣憚之者方側目於下忌之者又皆沮之於其私至相與揶揄其所為公以此竟罷改雲南參議君子莫不惜之及陛見上察其無他特命除翰林修撰俾預修永樂大典為副總裁方向用之而公卒矣時年五十二上聞之悼惜勅賜棺以斂遣禮部主事端禮諭祭焉公盖終身坦夷不事表襮而其嫉惡剛勁人有所不堪者世以此髙之而亦以此與之齟齬者衆也其為學明於義利之辨為文約而明喜薦士所薦最多且賢屢考試科舉其得士最盛而尤孝于其親自鳯陽考試河南時入朝告歸省其母疾方亟公聞倍道疾趨至家母疾忽為之愈數日竟卒人以為孝感所致云賛曰考功與大司成皆國家要職非得賢才譽望之士以居之誠不可也然而信道明義篤行如公者往往尤難之豈天下豪傑羣居之地是非好惡所聚非素有驅駕籠䇿之才者終不足以騁耶自公在太學與考功人情固多不附也及其歿已乆相與稱賢考功與賢司成者必曰公事須久而後定亦理之常然無足怪者獨念聖上於賢士大夫保全覆䕶如公者盖有無窮之恩焉予素知公恐其乆而失之也因取其行事而論次之蔣用文傳陳繼蔣用文名武生以字行其先居魏州五世祖安中金國子助教以直諫不納棄官攻醫曽祖應茂徙揚之儀真祖夢雷元揚州路醫學教授父伯雝舉進士崇明州判洪武初召為史官以疾辭出為蘭陽丞用文少穎悟讀書過目成誦六嵗事學從里中師有贈師萬年松者命賦詩即就曰使者来西嶽採松云萬年佳名雖自好何不長參天師驚喜曰是兒已見不器既而隨父官寓日俟公暇持所業質之聞說無疑問父大竒之曰吾有嗣矣父沒歸儀真舊業廢於兵燹渡江占籍句容採山構室居之大肆力於經籍久之得聖人深意乃習醫家言㑹同黜異約其要而綜之取正於術之精善者而受其秘於是決死生定緩速治效無一不中者由是用文之名驅四方矣孝事母魏夫人情依依不去左右食飲非躬治弗進夫人病被衣而不交睫者數月夫人老郡縣交辟不就曰吾不能舍一日養以趨禄利也夫人沒當洪武中始受薦入太醫院時朱彦修弟子戴原禮為院使擅其術人無有當其意者見用文喜曰君儒而為醫昌吾道必矣遂言於上授御醫永樂八年陞院判與幹成勞僚類所歸仁宗皇帝在青宫用文日侍左右承頋問隨事獻規益甚見親禮嘗問保和之要對曰在養正氣正氣完邪氣無自而入又問卿醫效率緩何也對曰善治者必固本急之恐傷其本聖人所以戒欲速也仁宋稱善及課績特命光禄置宴於院宴之旌其忠勤又嘗命工部為營第用文入叩顙謝曰臣荷恩徳萬不一報又敢靡公費以益愧悚也再謝乃止其就故人居之一室蕭然晏如也用文病且革手自為啟附進有曰臣老病死不足言惟恨不能有報大恩伏願清心寡欲慎加保養以輔聖治以安萬姓仁宗得啟驚嘆親御寳翰遣使慰問及卒命兵部給驛舟還其䘮督治祠墳於中官仁宗即位詔贈奉議大夫太醫院使特諡恭靖遣官諭祭官其長子主善為院判用文諄厚㳟謹知當世之要務其忠誼愛君之心惓惓於語言故能受知於上所以慰問誥祭之辭皆懐念忠誠揄揚學術以明上之不忘也居兩亰三十年王公貴人下逮賤𨽻細氓愈其疾而著神效者嵗不少貧者報之曰吾非為報為爾醫也卒皆不受善交友始終不渝宗戚尤洽恩義奬勸後進汲汲人過恥出其口志嗜學雖老不厭治一室於公署之傍者顔曰緝熈于家居幽屏之所者顔曰静學皆盛貯羣籍暇輒翫閱其中時忘食寢或謂曰子老矣何勤益至是耶用文曰昔衛武公年數九十五猶箴儆於國俾臣下朝夕交相告戒乃作抑詩以自儆卒諡睿聖武公吾雖老幸未就木而敢以怠荒棄厥躬哉或又曰緝熈静學意有說乎用文曰學有緝熈于光明成王之言也非静無以成學諸葛武侯之言也吾志在是其為詩文有静學齋集若干巻治效方論若干巻卒之日無貴賤疏戚咸咨嗟悼傷曰善人亡矣子四人主善主敬主孝主忠皆立行有父風竹軒劉先生傳王英先生姓劉氏諱亨字嘉㑹號竹軒其先居安城之宻湖宋豫州刺史斌徙廬陵石塘里斌曽孫江寜司户􅎵又自石塘徙其邑銅溪高祖哲甫知汀州曽祖景春元海南鹽塲司丞祖貴翁父樂山先生端敏勤學泰和陳心吾劉允中時稱名儒先生從之遊通詩書二經博究諸史百氏之書洪武壬戍以賢人君子徴力辭親老後舉經明行修陳古今政治之要太祖皇帝嘉之命進講華盖殿以言事忤執政者出為壽州學訓導戊寅冬上疏言六卿秩當與五軍都㑹相埓國子祭酒秩不當在太僕卿下又言将臣子弟生長冨貴習為驕侈他日安可授官宜立武學教訓使知禮義以變其習俗陞常州武進縣丞為政㢘勤修學校躬課諸生讀書表其民之有節義者毁淫詞禁絶妖妄作善教坊再思亭以勉已勵俗百里之内絃歌相聞三年書最天曹上褒以璽書壬午縣民李徳懋等作亂先生白郡守毋令滋蔓率衆擒首惡而諭降其黨方是時太宗皇帝初嗣大統遣使勞以金幣先生之名由是揚於逺邇無何以事罷還鄉屢有薦者先生輒辭宣徳中監察御史尹崇髙力薦先生雖老猶可為學校師表至京以年將八十辭宣宗皇帝曰伏生九十尚傳經八十豈不可為教官先生辭益力上曰老者安之孔子之言也朕允其請令歸故鄉先生歸怡然自得居則深衣幅巾列圗史左右日吟咏不輟而動必蹈於禮於事有合義者必見諸行族弟夣華三䘮不能舉先生為治塟又以近舍山數十畝為鄉里貧者葬人名之曰義山嵗旱先生禱輒雨所居多種竹學者稱之曰竹軒先生卒年八十有幾所著有竹軒集冩心集隨寓録子習之舉懐才抱徳為廣東按察司照磨孫同履輒經綸綱同登已未進士第浙江義烏縣知縣論曰自昔名徳入仕而功業顯著者多載史傳而唐之王友貞孟詵白履中諸人者以才學入仕未至大顯既罷去則隐而終身焉豈有功業可稱哉而史亦傳之盖以其志恬退不貪名嗜利禄耳若先生之學行用之固可有為中乃不偶雖屢薦再起而仕非所願視友貞軰夫何逺哉君子之論人必有取於斯故著之為傳云尚書王文安公傳陳敬宗公諱英字時彦别號泉坡其先太原人祖宗達宋迪功即仕於臨川遂家金谿曾祖頥貞元季以書經魁江右入國朝退隐於家祖子岱父修本並以儒行稱母曽氏公生十一嵗而失怙母淑人以教以養逰業邑庠刻苦嗜學登永樂甲申進士第時太宗文皇帝方鋭意育才命翰林學士解縉選進士穎秀者與状元曾棨等通得如二十八宿人之數俾盡讀文淵閣古今書作為班馬韓栁歐蘇文字命大官日給珍饌月賜燈油之貲數召至便殿問以經史諸子故實或至抵暮方退公在二十八人之中每為儕軰所推譲後上以綸綍事重以公與今冢宰王直皆慎宻可與任並揀入秘閣書進呈機宻奏疏嵗戊子預修太祖髙皇帝實録丁亥授翰林修撰扈蹕巡狩北京丙申陞翰林侍讀戊戌實録成賜襲衣綵緞鈔錠壬寅北敵犯邊二月上親征公扈從至庫哩和囉海五月旋師過威逺鎮李陵城已四十里上召公曰聞李陵城有石碑可往視之復遣錦衣衛官校隨之以行時城中被兵殺掠燒毁一空惟城北門有石出尺餘掘土拭磨觀之額曰李陵臺驛令謝君徳政之碑其文略可讀其隂刻逹嚕噶齊等官姓名明日公傋奏其故上曰此碑既鐫有元人姓名異日彼人見之必以此地為已物爾冝再往擊碎之用火煅沉之於河以絶其事端公如㫖而往既還奏上喜謂公曰秀才是二十八人讀書者朕需爾為用正好宣力勿憚勞苦因問曰朕率師北伐爾試言成功如何公對曰北敵擾邊罪在不宥但聞天兵親征必逺走漠北臣願陞下幸毋入險窮追也上笑曰朕為天下國家計秀才之言惟不欲窮兵黷武耳復謂曰凡軍中一切動静或謡言之類爾有所聞即來宻奏又諭太監孟驥曰秀才有事即令入見毋阻六月上駐蹕安平鎮立功官軍因有過不與口糧者多相聚悲泣曰吾等糧盡必死道路矣公以為言且曰此皆壮士也願陛下宥其過而與之恩則異日必得其死力上悦即命兵部尚書李慶人給口糧并載衣甲驢一匹甲辰上復親征北部還次榆木川晏駕時仁宗皇帝在東宫命尚書蹇義夏原吉學士楊榮楊士竒侍讀王直與公同定䘮禮議國政宿内閣凢七日仁宗皇帝嗣位加恩賜白金綵段八月進秩侍講學士尋陞右春坊大學士兼翰林侍講學士明年乞歸省賜鈔二千緡俾馳傳而還宣宗皇帝即位嘗召入便殿謂曰洪武中學士有宋濂吴沈朱善劉三吾永樂初則解縉胡廣俱有重名念汝當講經史陳道義以啟沃朕心罔俾前人獨専其美賜内醖及鈔千緡命入内閣叅預中秘嘗奏乞分俸養母于家上允其請宣徳庚戌修太宗仁宗兩朝實録成賜白金綵幣襲衣陞詹事府少詹事兼翰林侍講學士復賜金鑲琥珀麒麟帶壬子正月聞太淑人曽氏䘮上命禮部賜祭工部造墳遣中官院董䕶公奔䘮冬十月即奪哀還朝寵遇日隆不時召對正統間開經筵公為講官陳説詳明於文義之外多有規諌之語其講章於朝退之際人争求去以為珍寳修宣宗皇帝實録與少師楊士竒楊榮同為總裁實録成賜白金百兩綵段鞍馬進秩禮部左侍郎兼翰林侍講學士癸亥正月奏㫖出理部事講官如故乙丑淛江台寜等府民遭疫死甚衆上遣公齎香幣往祀南鎮以禳民癘時浙間乆旱公至紹興大雨水深二尺灌獻之夕雨止星見明日又大雨田野沾足人皆喜曰此侍郎雨也布政使孫原貞等陪祀請作御祭感應記刻石于廟而還丙寅公奏京師去冬少雪今年自春徂夏雨澤不降種不入土小民缺食此皆臣等政事不修激怒上蒼所致伏望陛下施賑䘏之恩臣等宜益省愆戒飭仍乞齋沐祈禱以格天心上從其言果大雨五日先是公奏請致仕不許至是年七十復上章乞罷政吏部言公精力未衰上是其言不允戊辰八月上特㫖陞公南京禮部尚書明日謝恩畢内傳㫖曰上以卿乆仕先朝多效勤勞陞秩南京得安佚既視事南京二年得疾而終是為景泰元年五月十七日也春秋七十有五訃聞上悼惜賜諡文安命禮部賜祭工部造墳公在翰林屢為㑹試考官海内名士多出門下為文章典贍朝廷制作經其筆居多四方求金石銘誌碑記者接踵其門公酬應不倦世多珍之論曰撫自為州以来多出名儒顯官若宋之晏殊王安國元之吳澄虞伯生諸君子其文章名位功業皆炳然當世而垂耀竹帛者豈偶然哉玉笥寳盖諸名山秀氣之所鍾也公亦撫之人也其文章名位功業莫不相似然自入仕厯官通顯不離朝廷四十五年而列聖眷遇久益不衰於此則似過之矣豈天之生賢私於撫之人哉抑孰知公之才徳自足致身於青雲之上也黄氏母子賢孝傳李賢黄氏名文父鉉江西新喻人永樂癸巳徙河間之任丘娶孫氏生文甫一嵗商於南陽之鄧州守禦所百戸李興見鉉文雅以女妻之未幾歸任丘李氏與孫氏相戾間逹於興興遣人取其女還鉉亦随往時孫氏年二十有四文方四嵗鉉别後音問不通孫氏與文母子二人零丁孤苦人不能堪而孫氏奮志成家勤力紡績夜以繼日以供力役之征周衣食之費撫育其子年及成童謂所親曰吾聞子弟讀書可以起家今吾備嘗艱苦幸有此子若遣入邑庠以朂其成天其或者憐吾志乎所親曰此意固善第念爾一子之外更無紀綱之僕子若在官凢百費用尤倍於昔吾恐爾之艱苦未艾也孫乃愀然泣下曰吾已慮之熟矣頋處子之計莫良於此雖倍艱苦安敢辭同編之人聞之勃然怒曰吾代爾子力役久矣今幸其長不吾累焉而又脱之可乎雖懇情乞惠拒之益堅孫氏憂欝食不下嚥已而㑹所親達其情于有司始獲入庠孫氏且喜且懼愈極力生業勵子進學而凡從師親友之需未嘗少乏文亦感激遵母之訓潛心經史但自幼父去嘗問母曰吾父安在母曰汝父世家江西為商河南吾亦不知其所棲矣於是母子相頋澘然出涕以悲正統己巳文以成材貢入太學㑹天下士子講習一日言及其父不知所在有同舍生王綱者鄧州人聞其父名曰吾州百戸李興有壻即此名也非汝父乎文因思母所云大喜曰是也景泰初以謁告歸省至家即白於母徑詣鄧州訪父果在内鄉板橋鉉離其子已三十四年矣一見痛絶方蘇親屬㑹晤悲喜交集留數月不能同行文復辭父入監天順改元夏吏部掄才以文為兖州府通判乃奉母抵任視篆後即遣人迎父就禄以飬父時年八十有五憚於逺渉再迎不起至三母曰汝之孝心盡矣彼有所戀不可再迎文悲思不已曰吾父不来吾即棄官而往闔府官僚咸跪請其母母亦悲感而許之一時見者無不沾襟乃以安車迎至鉉離孫氏已四十四年矣妻子父母始得㑹合以遂天倫之樂嗟夫黄氏母子其賢孝矣哉向非孫氏之賢其子未必成立以有今日非文之孝其父未必㑹合以獲禄飬遂使零丁孤苦之室變為團樂歡慶之堂予親見其事因為作傳以告於来世明文衡巻六十一
