body:
  text: 明文衡巻十一明程敏政編論論孫甫薦富弼代晏殊事晏殊罷相諌官孫甫薦富弼代之仁宗怒曰進用宰相人主之任臣下不宜有所指陳事在慶厯四年王叔英於乎弼有宰相之才天下知之甫薦之誠當矣為帝者如果有心於用弼宜曰吾意正在斯人卿可謂能為天下得人矣如此君臣之間豈不為相得哉今帝乃不出此而反有怒於甫蓋其意不在於弼爾使其意果在於弼豈不欣然從之而何怒於甫耶昔堯之相舜以師錫舜之相禹以僉言未聞進用宰相為人主獨任事也且古人有言曰薦賢受上賞况薦大臣以當大任者乎如甫者宜受上賞而反怒之此帝之大失也帝之意豈不以為宰相之職乃人臣之極任其登用之恩當自已出殊不知薦之在人而用之在我其恩又曷嘗不自已出乎傳曰大夫能薦人於諸侯不能使諸侯與之大夫諸侯能薦人於天子不能使天子與之諸侯盖獻替之職固在人臣而用捨之權常在人主果何嫌於恩不出於己也哉雖然為人君者要當以公天下為心惟在於為天下得人而巳又何必欲其恩之出於已其恩之盡出於已者乃好利自私者之所為豈賢君之事哉惜乎以仁宗之賢而猶昧於此哉余懼後世有沮卻忠臣為國薦賢而藉帝之言以為口實者故特著論非之以為人主之戒髙帝呂后論梁潛或者謂髙帝寛仁愛人乃獨於呂后以色衰而弛愛夫託交貧賤起身艱苦一旦富貴之餘乃疎棄之獨不念前日楚軍之間道哉髙帝無乃少恩也梁子曰不然夫髙帝之知人何如其明也與呂后處者㡬年矣后之為人獨不知之耶彼固一婦人也而其雄猜傑黠有猛士之肝腸髙帝於是乎有以知呂后之心矣夫畜老人猶憚殺曽謂國家之勲臣取而族滅之無遺噍類若罝中兔然未嘗有難色后也何其忍人哉夫殺諸將非髙帝之心也后也蒯徹教信以反貫髙反形已具髙帝猶釋之而肯果於殺韓彭耶韓彭雖夷滅而昔日感遇之際士為知已死者英態豪氣猶在目睫間也髙帝中夜思之豈不一動心哉呂后是可忍也孰不可忍也髙帝所以薄呂后者不能形於言而痛在其中矣不然盧綰舊日里閈恩猶不減乃謂至親而獨少恩哉夫觀人者不於其所厚而於其所薄髙帝於其所薄者如此矣豈得薄其所厚哉呂后忍於韓彭者如此矣豈得厚於劉氏哉豺狼得嗜則喋血揺尾以恣饕茍無所得則爪膚拏毳以致猛諸將已盡其禍尋及劉氏矣故殺韓彭而諸將懼族諸將而劉氏懼髙帝亦豈與陳平謀及此哉聞樊噲黨呂氏立命斬之用平之謀髙帝至是非特為劉氏憂亦且為平勃憂也髙帝目纔瞑肉猶未寒后也曾無一髪之慼即謀族殺諸將今日鴆如意明日斷戚姬今日鴆齊王肥明日殺趙王友至於無所忌憚立他人子為帝又殺之而又立焉忍人哉后也一至此極也當是時漢已亡矣吁髙帝豈不知毒流至此哉説者謂良平之教髙帝往往忍小以就大晉獻之驪姬秦皇之扶蘇髙帝審之久矣然獨恨髙帝之明有所未盡者焉懲其近而不懲其逺商之亡以妲已周之亡以褒姒髙帝曷不懲此耶嫡妾之分亂於前而正家之約昧於後於是拳拳然屬周勃以安劉置周昌以重趙所謂滔天之勢已成乃欲以一手障之吁何益哉劉仁軌少府監裴舒為唐髙宗造鏡殿上與太子太傅劉仁軌觀之仁軌驚趨下殿走上問其故曰天無二日民無二王適見壁間有數天子不祥孰甚焉上遽令剔去愚意仁軌此言未當也夫人臣之戒君或婉其辭而意有所在孔子所謂巽言之者也或峻其辭而無所隱孔子所謂法言之者也仁軌此言其法言之耶其巽言之耶夫曰壁間有數天子不祥孰甚焉者有似乎巽言之矣髙宗嗣守天位而武后制其政柄是武后亦一天子矣李義府恣意慘酷天下之人知畏李猫而不知有朝廷是義府又一天子矣至於武三思為周公威福之柄又窺取之焉則三思又一天子矣政出多門不祥孰甚而仁軌此言非此意而髙宗亦不此悟也然則既不為巽言曷不為直言也哉納約自牖因其明而投之仁軌此時宜進言曰以銅為鏡不若以古為鏡以古為鏡不若以賢為鏡書云人無於水監當於人監詩曰殷鍳不逺在夏后之世隋之煬帝淫刑黷武沈湎冒色忠言不用小人朋進盜賊旁午自度不免乃持鑑照曰好頭頸不知為何人持去此煬帝以銅為鑑而不以古為鑑也太宗皇帝艱難以定天下身致太平樂聞直諌好用善謀皇后順正不預外事常曰以銅為鏡可正衣冠以人為鏡可知得失此太宗以人為鏡不以銅為鏡也陛下誠能以煬帝為戒以太宗為法則社稷之福生民之幸矣且殿廷之上豈照鏡之所奸邪之情豈懸鏡可得陛下以心為鏡勿昏以慾勿蔽以私湛然虚明可照萬事臣伏願陛下曷去彼而取此哉不知出此乃以鏡之影為不祥謬矣論曹參王直漢曹參代蕭何為相國而後世稱賢相予疑之古者大臣之相國也必思為國建長久之業於道所當為者夙夜盡心不敢少怠焉而况輔新造之國乎周公相成王用文武之道治天下有不合者夜以繼日而思之及其得也又坐以待旦而行之其勤也至矣當時之臣莫有過於周公者而周公方吐哺握髪以受其言故能興道立教維持周室至八百年之久此豈茍且偷惰者所能哉蕭何佐髙帝定天下聞其次律令矣他未之聞也曹參代之守何之約束日飲醇酒不事事士大夫欲有論諫亦飲以醇酒使醉不得言嗚呼其亦異乎周公之所為矣何素不知學其相髙帝於夫治天下之道未有所立也就使有所立尤當敬守而慎行之以維持於逺天下之大豈酣酗者所能治耶何之律令豈古聖人所用以治天下者耶而參守之自以為足後世亦從而賢之予不知何説也且田制經籍學士大夫皆廢滅於秦是教養斯民之道皆缺也易解之彖曰无所往其來復吉謂天下之難既解則當復先王之道當參之時天下已定七八年時非無賢也參雖武夫茍能親賢納善夙夜以此為務為漢家萬世計則庶㡬周公之業而逺賢拒諫沈湎於酒至酣歌與吏相呼此書所謂巫風卿士足以喪其家者而參居之不疑蓋武夫俗吏之故態非宰相所宜然也宰相百僚之表也使百僚皆慕效焉則天下當何如哉予意當時天下之所以安者蓋民苦秦虐久矣而幸漢之寛故恬然自安於下非有道以維持之也然則參雖能清净不擾要亦茍且偷惰之謂耳周公之罪人也大臣之義當以周公為正宋論八劉定之以冦準為樞宻副使時旱蝗帝召近臣問得失準為樞宻直學士對曰洪範天人之際應若影響大旱之證蓋刑有所不平帝怒起入宫復召準問狀準請召二府大臣同對言頃鄭吉犯贓少伏誅參知政事王沔弟淮贓十萬杖復官帝切責沔而以準為可大任故有是命當是時前代刑法慘毒之風始漸消泯然太祖命大辟諸州不得專決其輕典固恣肆自若也而頃者田錫建議謂按獄官至以鐵為枷蓋法外擊斷大率類此而朝廷丞弼尚復任意操縱如凖所對則何以廣仁恕之化擴治平之效乎計其民寃莫訴所在猶多而天意垂戒信不虚矣抑君相違缺此外豈更無可指而準不能無諱特本諸洪範傳所謂棄法律則火不炎上於罰常暘者為説乎夫洪範以為人君能建皇極則貎言視聽思得其理而雨暘燠寒風時若不能建皇極則貎言視聽思失其理而雨暘燠寒風恒若然得與得俱失與失並貎果恭而言罕有不從視果明而聽罕有不聰也休不獨至咎不單見時雨則必無恒暘恒燠則必無時寒也特就其事言之則各以類感就其徵言之則各以類屬云爾譬諸學者之於經謂温厚本乎詩教設使學乎易書禮樂而亦温厚謂非其所得不可也醫者之於疾謂寒疾本乎隂淫設使遇於風雨晦明而亦寒疾謂非其所致不可也故禹平九年之水非但以貌恭作肅湯弭七年之旱非但以言從作乂周末之無寒嵗豈惟視不明而豫秦亡之無燠年豈惟聽不聰而急乎至於聖之無不通配乎風之無不在然屑屑焉以反風起禾為周成王所思之聖鷁飛石隕為宋襄公所思之䝉前日之不鳴條為何事之已睿今日之不應律為何理之未睿亦膠固不可為訓也但明乎經意則於五事無不當修於五徵無不當察於以趨得而去失違咎而求休茍徒泥班范牽合之説非惟昧禹箕授受之㫖殆將使居建極之地者謂吾有是得也而休徵之應非其類有是失也而咎徵之應非其類因以疑天命而怠人事矣援經陳謨之臣其可不深考乎帝問翰林學士王安石以唐太宗何如曰陛下當法堯舜何以唐太宗為哉帝深納之尋以為參知政事行新法安石為神宗變法大取民財與力而用之也在於兵兵之所用至於破遼而志願畢矣取民財之法曰青苗春貸而秋償之收息十二秋又貸而春償之亦收息十二嵗再收息則名為十二其實十四也名為貸償其實無故嵗取民財也曰免役凡民出力以役於官者皆無出力而但輸錢官自以錢雇民應役名為均役而其實欲自操其雇錢之竒贏也夫民孰皆不貸償而自足哉私貸償焉治世之所不免今也禁其貸償而官與之貸償以利其息錢之入民孰皆不雇募而自役哉私雇募焉亦治世之所不禁今也免其自役而官與之雇募以利其雇錢之餘即此二端言之其他取民財之法無遺巧矣而又編保伍以練兵則民自為兵而養兵之費不以煩官是曰保甲編保伍以養馬則馬皆在民而養馬之費不以煩官是曰保馬豈不謂古者寓兵於農也然今既有保甲矣而待餔之兵何嘗為之廢亦豈不謂漢嘗括民馬今使民養無害也然民既增保馬之勞而他勞何嘗為之損是其取民力㡬於竭矣民財與力悉歸於我自以為我非用之於土木非用之於狗馬聲色非用之於仙佛欲用之於兵而復漢唐之故疆無不可也然畏遼之大故將於遼必先於夏又先於羣小國欲自小至大嘗試以圖之安石君臣相與深謀宻議而悉掃異已者之論無非此心也於是王韶試於熈河章惇試於湖北熊本試於瀘夷郭逵試於交趾皆能略有所得而試於夏則馴至於徐僖之死得不償其失彼遼者不待其試而先來求地安石低徊躊蹰為欲取之必與之之説卒遣韓縝割與七百里之地無得而有失焉若獵者罝狐兔刺鹿豕而辟易於虎失其所操以歸蓋安石之技窮而神宗漸以沮悔矣然所援引共事之人固在也踵其故智以用於哲徽之時互起迭進以至賢路盡壅民命僅存之秋適值遼有釁躍然攻之以卒安石之所圖而遽以國斃焉故前宋之亡本於安石為神宗謀破遼而巳向使其不謀破遼則不用兵不用兵則不大取民財與力不大取民財與力則何至俾羣小為之交攫互噬於天下也抑遂其始謀亦不過如唐太宗擒頡利可汗然太宗用魏徵先以養民為務而兵自強安石先敝其民不及魏徵矣乃動以堯舜周公藉口其誣矣哉觀文殿學士太子少師致仕歐陽修卒於潁詔求其所作五代史以進神宗置司馬光於散地而俾其修資治通鑑自為之序棄歐陽修於未老之年而及其卒也乃求其所作五代史其意以修與光但能譔述也經國實用非其所能也吾自有安石也何其量人之薄哉厥後光起而究其用於元祐之初修之不究其用君子蓋惜之然所尤惜者修亦有以取之也何也惟恐其不究於用而有意於究是乃用之所以不究也濮議是也當濮議之始也韓琦輩雖與修同在政府而知經學古豈如修秉義懐直豈踰修哉修茍以濮王為不當別議尊崇琦等必不或異矣英宗雖欲顧私親何自啟口哉自此議發於政府而羣言交攻惟修之歸咎謂其昔也賛仁宗以立為後之子而今也導英宗以忘所後之父背先帝而䛕嗣君薄大統而厚本生於禮經為不合於直道為不純而修遂無辭以解焉豈非修久參大政當輔相位畧萌覬覦之心稍為迎合之計以致此乎故曰惟恐其不究於用而有意於究是乃用之所以不究也及其作五代史於晉出帝謂所生父敬儒為皇伯柴世宗謂所生父守禮為元舅皆反覆辨詰二主之非欲以表證其前日濮議之為是然近於欲蓋而彌彰矣修之學繼唐韓愈而與之並皆宗經而修論述尤多愈惟論語數章皆纂史而修筆削尤嚴愈惟順宗一録皆衛聖道於湮㣲塞絶之餘皆闢異端於羣趨衆附之際始焉學者莫能抑揚之也至其後惟愈從祀孔廟而修以濮議為鉅璧之纎瑕良榦之寸朽焉不然其全美豈可及哉㡬㣲功名富貴之念一動而用以之不究美以之不全是以君子無慕乎其外者懼累乎其内無冀乎其未得者懼喪乎其所已能也若乃光則免乎此矣所以然者光之學以誠為主自不妄語入故也罷崇政殿説書程頥頥在經筵為翰林學士蘇軾所嫉頥門人賈易朱光庭攻軾軾所厚孔文仲顧臨詆頥章疏交進頥以是罷久之軾亦罷是時有洛黨蜀黨朔黨之分洛黨頥為首蜀黨軾為首朔黨劉摯梁燾王巖叟為首其輔之者甚多漢之衰也李膺范滂等合為一黨在位者惡之惡之者非賢而在黨中者賢唐之衰也李徳裕牛僧孺等分為二黨以相傾奪於富貴之塗李優牛劣而考其歸皆不足謂之賢宋之將衰也其初亦分為二黨熈豐作新法王安石為魁元祐掊擊新法司馬光為魁光之黨賢而安石之黨非賢及光歿而其同黨又自分為三朔黨洛黨蜀黨徐考其故朔之所以得黨名者劉摯等所居之地相同而交游親密所守之職相近而議論協洽自為黨而不與他黨相攻擊若乃洛黨之以頥為首者頥進講則欲坐見哲宗戲折栁枝則曰方春發生不可無故摧折賀罷而往弔則拘於歌哭同日如此之類見嫉於人以致為其所攻擊而頥未嘗報復也門人代為之報復是以有黨之名爾若乃蜀黨之以軾為首則異於是軾少年登制科一也髙才雄文二也兄弟同為美官三也於古人所謂三不幸者全而有之矣謂宜謙抑以避人之尊已廣大以容人之異已猶恐不及也而見頥為學者所宗忿然嫉之豈欲使當時之士不尊頥而惟巳之尊不異已而惟頥之異乎夫聖人之道大矣宰我子貢善為説辭若軾是也冉閔顔淵善言徳行若頥是也譬之入山而採玉入海而探珠各有所得俱足為寳可相羨而不可相嫉也嫉心生於中而排斥之跡形於外甚至上疏云臣深嫉程頥之奸不假以辭色此何為者哉然則軾有心於立黨而自為之首以合羣助而攻擊人也譬於兵家朔黨自守之兵也洛黨應敵之兵也蜀黨侵鄰之兵也其不韙有在矣夫不賢者之不容賢者固其所也賢者自不相容則猶兄與弟相䦧而為必破之家心與肺相尅而為必死之疾矣若軾與頥孰不皆以為賢而不容頥者軾也使能其心休休焉其如有容焉則豈不可以居宰物之地哉康王構即帝位於應天府康王前嘗為質於金營而宋使姚平仲刼營金疑其非親王且嘗與較射而連發中的意其將家子因卻還之洎宋復遣王奉使講解而為民所遮止因此得脱而遂繼宋統蓋天留之也使其在圍城中則與諸王并俘以北矣昔者周漢宗室皆分封於宇内非獨資之如泰山磐石得以固其存不幸而亡矣死灰復然猶得以續其統又不幸而統絶矣苖裔蔓衍猶得以保其姓周東遷而晉以強宗為霸主糾合諸侯為周輿衛至於戰國而燕韓魏居七雄之三以祀姬姓之祖禰秦虎視東周不敢吞者數百年自載籍以來未有若周之長所謂固其存者也漢懲呉濞楚戊之強而犯上盡封各國支庶以裂其壤至於哀平之際宗室載屬籍者十二萬人莫不據士民之上有王公之勢莽既盜漢而光武兄弟呼于南陽此十二萬人者近逺響應故東京之復舊物易於反掌靈獻之末表琮焉璋猶能倔強荆益以資昭烈之興所謂續其統者也唐宋則不然其宗室皆聚居於京師故朱温簒唐而徳王等九人一日同沉於九曲池濮王等數百人一夜同阬於龍興寺金人取宋而惟康王以出使孟后以被廢二人得脱其舉宗北遷卒見殺於完顔亮無一人幸免蓋無以保其姓矣夫聚居之也樂其易防制此利之小者而其後有大害觀於唐宋可見矣分封之也惡其難約束此害之小者而其後有大利觀於周漢可見矣蘇子瞻諸人言封建之害胡明仲諸人言封建之利各有其説而未嘗言其大利害見於萬世之後如此然則有天下者為其子孫計可以無疑於此矣抑宋統之幸不絶而天留康王以續之何也曰汴宋二百年矣仁如慶厯元祐之日多不仁如熈豐崇宣之日少其不仁也民怨之而其仁也民憐之其怨之也足以亡而其憐之也足以不絶民之心即天之意也善得天者得於民而已矣善得民者以其仁而已矣朱熹卒熹之學後世論者謂為集諸儒之大成夫小成者有所缺而不全有所偏而不中集之而後為大成也熹於生乎其前之諸儒若周之精程之正固非有待於熹而後能全其所或缺中其所或偏至於康節之髙明而稍未即乎實横渠之𢎞毅而猶未至乎熟乃若待乎熹有以實其所未實熟其所未熟者然亦不可謂彼缺而此全彼偏而此中由是言之熹於生乎其前之諸儒未嘗集其大成至於生乎其時之諸儒則能集其大成何也熹之時諸儒為言人人不同言度數者蔡元定父子之於地理樂律有指歸矣熹與之上下其論而脗合焉言述作者周必大諸人卓乎以所長著稱也熹作徒與之講評賡酬可相伯仲而文考昌黎之異賦明靈均之衷詩開陶韋之門使來者不迷其塗焉於施諸用者辭受進退不屈其節告君必以格致誠正而不小其道臨民幹方鋤奸救患之不遺其力視當時淛學之志事功者陳同父輩反過之也於求諸史者未嘗若呂祖謙之專而綱目繼春秋功過呂矣呂與張敬夫輔翼熹以共究遺經不幸短世而熹歲寒松栢為斯道之梁棟又過張矣惟陸象山兄弟始與熹異論而熹卒兼其所長以為已有予嘗考之熹與項平父書云子静専尊徳性而熹平日所論道問學為多是以彼之學者多持守可觀而看義理不詳熹自覺於義理不敢亂説而𦂳要為已多不得力今當反身用力去短集長庶㡬不墮一邉爾又與呂祖謙書云子静好處自不可掩覆可敬服也祭子夀文云兄乃枉車而來教相與極論而無猜自是以還道合志同又曰惟兄徳之尤粹儼中正而無邪至其降心以從善又豈有一毫驕吝之私耶然則所謂熹集諸儒之大成者度數也述作也事功也史也經也道問學也尊徳性也其塗如此也蔡也周也陳也呂也張也陸也諸儒之趨於其塗如此也而熹據其㑹以要之殊塗而同歸於已焉所謂集諸儒之大成者此之謂也或曰陸之於朱論者謂猶氷不可與炭同器若子之云則猶塤鳴篪應可以奏於宮懸之間而備韶濩之一音乎曰然曾晳之狂子路之勇原憲之狷公西赤之容端木賜之辨皆見集於孔子而不見黜者也朱之與陸以其所言而觀之曷嘗終見黜哉謂其終見黜者未嘗考其所言也亦已甚矣詔經筵進講朱熹通鑑綱目宋時諸帝之不廢講學蓋漢唐所未能及者故其時悖徳虐政不若漢唐叔季之尤甚漢唐有簒弑之臣而宋無之有賊民崛起㡬危社稷如張角黄巢者而宋無之皆由於上之人未嘗悖虐尤甚以激之也講學之效豈可誣哉所謂未嘗悖虐尤甚者若真宗之天書雖不以諫而中止然其後天書以殉於梓宮英宗追崇所生諍者盈廷則為之屈意中止矣神哲以來改更法度正人邪黨迭為勝負亦紛然也然有竄逐而無刀鋸南渡以後和議作而語恢復者被排斥偽學禁而師闗洛者入罪籍然斥之而益奮罪之而愈勵者亦由其無死禍以加諸人而人之改行易節者終少也其未嘗悖虐尤甚於此可見豈非講學而有見於前代覆車之轍乎通鑑綱目者人主有志於講學則不可以不之觀而前代覆車之轍無不於此乎在也或者謂通鑑綱目雖厯渉司馬温公朱文公兩大賢之筆削而成然賢而已爾非出於聖也史而已爾難侔於經也人主亦留心於聖人所作之經而足矣於賢人所述之史未之及焉以未有害也是不然尚書者紀傳史之出聖筆者也春秋者編年史之出聖筆者也温公取尚書以後之紀傳史約之以為編年通鑑而文公倣春秋大書以為之綱三傳分注以為之目是則通鑑綱目者尚書春秋之子孫而尚書春秋者通鑑綱目之祖父也祖父子孫一氣之相傳聖經賢史一理之相續孰云其未之及焉似未有害也哉為此説者是猶告人以千萬里逺之覆轍而不告人以一二里近之覆轍也其顛踣不愈速乎殷民叛周論周洪謨或問武王之伐商也書曰前徒倒戈攻於後以北是言王者無敵也又曰篚厥𤣥黄昭我周王是言人心悦服也夫何天下甫定武王既崩而四國殷民煽亂不已雖化訓三紀之久而閑之猶艱故先儒謂大誥康誥酒誥梓材召誥洛誥多士多方八篇皆為殷人不服周而作又謂方殷之虐人如在膏火中歸周如流不暇念先王之徳及天下稍定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也由是觀之則所謂倒戈執篚於弔伐之日者不㡬於虚文乎聖人以至仁伐至不仁何其人心之不易服哉南臯子曰是蓋不然向之倒戈而不敵執篚而來迎者非商之臣也乃紂所虐害之蒸民也所播棄之犁老也其後不服周而念商者非商之民也乃紂所比昵之罪人也所崇信之姦回也何以明之書曰乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐於百姓以姦宄於商邑又曰為天下逋逃主萃淵藪則商臣之黨紂虐民者皆天下之姦回罪人不可謂不衆也故孟子謂武王驅飛廉於海隅而戮之滅國者五十而朱子以為皆黨紂虐民者也然滅之云者豈噍類無遺哉不過殱其渠魁而餘孽之猶存者不知㡬千萬人誅之不可勝誅也既不之誅而子弟念其父兄之死臣僕念其國統之絶者憤怨不巳故乗三監之隙而脅其民以叛也今夫盜蹠一呼聚黨數百猶能糜人之國其故何哉脅之而已矣豈有紂黨之在淵藪者猶衆而不能脅四國之民以叛哉故多士曰予大降爾四國民命多方曰我惟大降爾四國民命皆謂商民為所脅者衆故寛宥之而不加誅也雖以四國民命為言而曰商王士曰爾殷多士曰殷侯尹民曰胥伯小大多正則實告殷臣而非告殷民也至於畢命曰毖殷頑民亦指殷之餘孽而言故下文言世禄之家鮮克由禮兹殷庶士席寵惟舊則極數殷士之惡而無一語以及殷民也數千載之下讀者不得其意乃謂殷民既怨殷而歸周又叛周而思殷且或謂周之頑民乃殷之忠臣夫殷之臣孰有忠於㣲子箕子而叛周者非㣲子箕子乃紂子武庚及其餘黨耳使誠以為叛周者非紂餘黨乃前日塗炭之民則聖人伐暴救民之意終無以白於天下後世而亂臣賊子得以藉口矣予故為詳辨之明文衡巻十一
