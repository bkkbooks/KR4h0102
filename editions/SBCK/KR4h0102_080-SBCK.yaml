  text: 皇明文衡卷之八十
  hash: sha256:ef75047179c8d630c42ecb7aeb5fc9c276c6c8f521a9d2963b191966e07319c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_080-1a}
body:
  text: 墓碑東丘郡侯花公墓碑宋濂皇上渡江之六年庚子夏閏五月癸酉僞漢王陳友諒以舟師入㓂圍太平行樞宻院判官花公率麾下三千餘人結陣迎戰三日賊不得入乙亥城中乏食公士馬憊城䧟賊縛公急公怒􅁬身大呼縛盡解起奪守者刀殺五六人罵曰虜非吾主敵也曷不趣䧏賊怒碎公首縛于舟檣衆射之公至死罵賊不少變巳而賊犯龍江上命諸將力戰賊敗去後五年甲辰上卽呉王位追封公東丘郡侯又十六年其子僉水軍左衛指揮司事煒泣曰先公没今二十年無文銘于神道􅀼恐忠烈不白於後世敢請惟公勲業始卒宜載國史余嘗待罪太史氏不敢以耄辭公諱雲姓花氏世爲懷遠人自考以上莫知遷徙世㳄公少􅀌隨母嫁張氏貌偉而黒驍勇絶人儕輩畏服之歲癸已仗劍謁上于臨濠上奇其材力俾將兵畧地所至輙克破懷遠城虜其帥以歸進攻全椒㧞之郡宼據􅓎家寨公夜襲之宼散走上將取滁州單騎前行遇賊數千人於道㧞劍躍馬衝其陣而過賊驚曰此黒將軍勇甚不可與争鋒兵旣至遂克滁甲午從上取和州得卒三百以功授管勾明年乙未率所部先渡江上克太平以公忠勇可信任命宿衛左右丙申上破集慶公得兵千人陞總管徇鎭江丹陽丹徙金壇諸縣皆下之過馬䭾沙劇盗數百􅃒道索戰公且行且闘三日夜皆擒殺之授前部先鋒攻常州㧞其城駐守牛唐營夏六月立行樞宻院於太平遂拜公院判階安遠大將軍丁酉春正月克常熟州獲卒萬餘命公將之秋七月以兵三千之寜國䧟山澤中者八日羣盜蟠結梗道公操矛鼔譟出入營壘間斬首千百計而身不中一矢還命守太平後四年遂遇害時年三十有九夫人郜氏公與僞漢戰時一子方三􅀊夫人以牲酒􅀕家廟會家人泣曰今城且破吾夫忠義人必以身死之吾夫死吾必不獨生然不可使花氏無後嬰兒在􅀂等善撫育之聞公就擒夫人赴水死年甫三十有五侍兒孫氏􅄟夫人屍遂抱兒以行僞漢軍虜之至九江軍中惡養小兒孫氏以兒授漁家屬之曰此兒良宜善視之是年冬王師伐僞漢漢敗孫氏至漁家視兒在瞷漁人出竊􅀒以走夜宿陶穴中天曙脫簪僦舟渡江遇漢潰軍奪舟棄江中孫氏抱兒遇㫁木浮至附之入葦洲採蓮實哺兒七日不死夜半聞人語聲呼之逢老父號雷老告之故與其偕行明年辛丑二月達上所孫氏泣抱兒拜上上亦泣寘兒于􅂰曰此將種也賜雷老衣遣之詔復其徭已而令人追之忽不見兒八􅀊侍皇太子就學年十三授虎賁右衛副千戸後七年拜今官卽煒也煒於洪武丁已偕孫氏至太平奉夫人骸骨歸乃束草像公以二月已未合葬上元縣南五十里之水橋嗚呼觀公之死賊與妻妾之報公可以知公之爲人矣天不殄其後豈不宜哉銘曰雲雷遘屯宇區分篤生眞人鎭乾坤騎龍鞭霆下天門前翼後衛滃􅀂雲誰其最雄花將軍力驅智駕敵萬人蹂礫羣盜猶䴥麏大刀長㦸屬􅐤鞬左麾右刺流電奔緋衣緇弁􅆛虎屯駐馬飲江江水渾吳越之域殺氣昏手挽天河洗妖氛軍聲隆然􅀂雷震遭者膽落兩足蹲元戎開府大江濆腰佩兵符威令尊控制上游爲國藩僞漢恃力不圖存建旗揚帆事征鼖艨艟蔽江躡鉤援搥牛享士士氣伸馳馬督戰寧顧身賊熖熾􅀂烈火焚大戰三曰勢愈殷單騎赴之齒齧齦怒髮上衝氣如烟叶汝賊兇頑犬與豚願􅊽汝肉一口吞賊慙耳塞不忍聞至死不屈酬國恩飄然乘雲叩帝閽請爲厲􅀑扼賊元賊當殛死洗厥􅁈天子下詔褒忠勲東丘建侯賁九原孤兒保育寵便蕃不墜宗祀天所敦生爲烈士死明神神靈在天光焞焞嗟爾來觀萬子孫􅁇忠思孝愼勿諼弗信請考太史文故翰林侍講學士中順大夫知制誥同脩國史危公新墓碑銘宋濂嗚呼翰林侍講學士中順大夫知制誥同脩國史危公享年七十以洪武五年春正月二十三日卒于和州含山縣之寓舎其年二月十五日權厝於含山某年月日始還葬金溪白馬鄕高橋之原其子㫃於蹇反􅀷懼公之功行世系不昭白于天下晝夜兢愓自爲􅃺二萬言來謁新墓之銘濂守官無暇乆未克論譔春正月􅂪恩致政東歸􅀻念公相知特探在前朝時欲引薦入史舘及今待罪禁林實與公爲同僚相得甚驩於是評隲羣行而勒文于碑其文曰公諱素字大傑姓危氏危本􅁎姓周武王庻子某生而手中有文曰函因賜姓危氏封於新其後居光州晉永嘉中建州刺史京遷建昌之南城唐黄巢之亂全諷與其弟仔倡赤手起兵擒巢黨柳彦章千象牙潭擢撫州刺史累官金紫光祿大夫檢校太傅封南庭郡王南庭之後復遷撫之金溪白馬鄉譜圗亾竟逸其名南庭十五世孫宋景某年進士通直郎知臨安府仁和縣事元累贈中奉大夫江浙等處行中書省參知政事䕶軍追封汝南郡公炎震公之曽大父也累贈􅓵善大夫河南等處行中書省左丞上䕶軍追封臨川郡公龍友公之大父也累贈榮祿大夫江西等處行中書省平章政事柱國追封豫國公永􅁻公之父也曽祖妣王氏彭氏妣劉氏皆封郡夫人郡之名如其夫母劉氏黄氏並封豫國夫人公自至正元年用大臣交薦入經筵爲檢討公年巳四十一矣五年改承事郎國子助敎七年除應奉翰林文字同知制誥兼國史院編脩官未上轉宣文閣授經郎兼經筵譯文官階文林郎明年復入翰林爲應奉十一年遷儒林郎太常􅀶士十三年轉奉訓大夫國子監丞擢兵部員外郎十五年陞奉議大夫禮部郎中拜朝散大夫監察御史遷工部侍郎明年轉朝請大夫大司農丞又明年陞中奉大夫大司農少卿復入禮部爲尚書十八年參議中書省事兼經筵官次年進通奉大夫御史臺治書侍御史二十年拜通奉大夫中書參知政事同知經筵事提調四方獻言詳定使司後四年階陞􅓵政大夫俄除翰林學士承旨榮祿大夫知制誥兼脩國史孛羅帖木兒入相岀爲嶺北等處行中書省左丞明年棄官居房山二十八年閏七月元順帝北奔淮王帖木兒不花監國承制復起爲翰林學士承旨上章控辭巳而元亾迨入國朝召至南京洪武二年授以今官三年兼弘文舘學士俄有詔出居和州閱再􅀊而卒公生四􅀊其大父卽使公讀書大父本黄氏子來􅁇於危知公能亢危氏宗督厲之􅀹切年十五卽通五經大㫖據座爲人師與同郡葛君將曾君堅黃君哻葛君元哲更相䇿警窮日夜不休復徒歩臨川吳文正公澄淸江范文白公梈之門質而正之二公皆折行軰與之爲禮吳公至恨相見之晩凡所著書多與公參訂之虞文靖公集孫先生轍名德俱尊其遇之一如吳公由是公之名震動江右間岀游金陵或以其文示南臺中丞張文穆公起巖張公以狀元爲顯官少所稱許獨推伏公曰危君爲狀元庻㡬相當老夫有媿色矣張公入朝遂挾公俱行逹官貴人慕公聲華争欲出其門下更相論薦唯恐失之公之檢討經筵也一月進講者三講文皆屬公手公嘗敷繹民惟􅀖本之言以進典領臣惡其峭直難之公曰經筵之職所以格君心反不以民之疾苦告耶縱加罪罪在操觚者業當之卒以進諱順帝大恱詔賜經筵官酒公不飮復賜馬湩一革囊金織文幣人一端皆有副巳而有詔下中書發錢粟千萬賑河南永平民萬口咸曰活我者經筵官也公復移書執政請脩宋遼金三史乗傳行宋兩都訪摭闕遺書成公之力居多順帝知公學問淵􅀷特命註爾雅較君臣政要公悉心爲之不数月而成及進賜金􅀂干公辭曰臣職也何勞而受賜不敢奉詔尋有宫人之賜公復辭曰臣有糟糠之妻在大江之南無所用之亦不受其助敎成均也六舘生擇所疑羣揖難公公片言折之恱而去分監上京輟䬸錢建監門葺齋舍勒開國以來分敎師之名于石尚書王某致政居蔚州搆暖泉書院請額于朝他監官以地無先賢故事不從公聽其立師以訓士子順帝以公善筆札詔書釋氏書公辭曰臣官胄監以敎化民彞爲職外敎之典不宜書無巳遷他官乃可耳遂止其授經宫學也受業生皆貴戚大臣子横肆不率度公創敎條置帳暦日書其勤惰月會而賞罰之皆畏服不敢犯其在太常也請親祀南郊築北郊以斥合􅀕之非謹謚法嚴祀典以袪謬妄時翰林承旨張公翥爲􅀶士禮文有闕者同􅀘正之人稱爲雙璧其爲國子監丞也􅂢束脩鋟小學書及夏小正經傳攷于梓以惠學者其居兵部也奉詔墾田於雄覇二州相地授畧薙除荆􅁄闢田㡬千萬畝使民有道民德之其陞禮部也與許文正公衡之孫克學俱賛皇太子受玉冊故事皇太子謁廟用牲醴百官以朝服賀於東宮公謂克學曰儻有違禮人惟責吾二人盍正之遂徹牲醴而以便服賀其擢御史也知無不言御史觀音保等四人以諌死英宗朝公請錄其後官之四川行省平章政事囊加歹天暦􅀄舉兵欲翊戴明宗燕帖禾兒伯顔等搆殺之公力爲雪其􅁈容城氏魏敬益買田千畝後見鬻田者二十家不能自生以田劵還之公請旌其門以敦廉讓其在工部也順帝欲以蒙古書譯釋氏三蔵經下部刋行公以無益諌罷之執政居第與燒飯橋近有司希其意欲鑿石易橋公諍止之䧏香祀嶽瀆故用金十兩爲香凾吏利金以銅半雜之或造銅凾易金公廉其狀皆執論誅之淮南兵亂公奉旨廉問其故會維掦京口歳饑民欲相食公便宜諭守臣發楮幣數萬錠賑之所全活者甚衆上淮西宣慰使余闕捍賊功狀請陞其官秩復請立宋徐節孝書院於淮安其官大司農也分京南保定之境㡬無曠土時海輸不至軍國多仰焉新城民田氏聽後妻䜛殺其子公憤之職旣不可治乃爲文􅀕其子民悔媿後妻迯去人揺手相戒不用婦言其長禮部也時亂將亟公憂之毎陳得失無隱丞相賀惟一曰君向寡言今又何多也公曰時危恩重情豈能黙黙吾不敢畏丞相但畏後世史官耳其叅議中書也論天下事以擇將帥舉賢才爲本請專任甘肅行省平章定住總西方兵勿遣其迎帝師誤軍事用樞宻副使普顔不花爲中書叅政經畧江南以也先帖木兒黃常爲禮部尚書頒暦安南立兵農宣撫使司以安畿内任賢守令以撫流竄之民順帝欲以公兼兵農宣撫使公以踈遠辭且諫曰今日之事宜卧薪甞膽以圖中興可也公言雖愈加切時不能盡用舊制銓曹有行止科吏主之日具内外官使十名上中書中書藉以遷擢其後吏怠不爲意仕者淹滯有待選十餘年者公責吏日具五名五日一上中書吏樂易集各思奉職而乆滯者􅀗伸高原富民劉強通其子婦婦訴官達刑部吏受賕欲緩其獄以俟赦公以事關倫理趣如法論之其轉侍御史也亂兵殺易州達魯花赤公請假中令以制兵之權會中書左丞成遵而下以􅂍得罪獨賀丞相斡欒平章與公不與皇太子書澄清忠義清白傳家八字以褒賜之其叅知政事也刑部尚書朶列圖兼興和路編管與守將有􅂩守將誣其欲擅發官囷糧廷議杖踰百免其官公驗無發封狀釋不問都事倪晦與劉哈刺不花同官丞相太不花幕府數以公事忿争劉怒欲中晦隂結監察御史劉君楚俾擠之會晦至燕都囊故人所寄買馬白金君楚攟其囊得金下晦獄令自伏爲􅂍狀上中書公疑亟爲白出之馬德守德州俘所􅀗南軍千戸楊甲至都將斬之公召問狀乃淮安世襲千戸戰敗䧟濟南羣盜中陳柔俾詣德軍饋物德械送之非賊也公白宰相釋之楊感泣曰參政生我枯骨中惠大無以報然叅政長者爲公法釋我我不敢􅀻謝期以忠義報可也卒與逆臣孛羅帖木兒戰死之太醫院經歷徐某藏盜􅂍盜敗徐就鞫案巳具要官庇徐屬之從末减使三返公竟不許嶺北行省叅政董復初素有廉名同省臣飛書言其在稱海宣慰司時取官中米千石公疑其事遣使覈覆之果得其誣孛羅帖木兒擴廓帖木兒俱以平章總兵河南漸生釁端公謂御史大夫普化曰養虎者欲其不相搏噬則别其牢今欲二人無􅃲莫􅀂加其職而分地處之用孛羅帖木兒爲丞相治四川以擴廓帖木兒爲丞相治河南各責其成功可也大夫曷不爲上言之普化如公言順帝及皇太子咸以爲然㑹丞相搠巴監䘮妻不出事中寢初江南經畧使普顔不花李國鳳請封徽國朱文公爲齊國以􅀛山楊公豫章羅公延平李公西山真公九峯蔡公從祀於孔子廟庭公爲御史時亦請封謚劉蕡事上中書皆寢不報至是公皆舉行復爲文以少牢躬祭蕡墓禮部員外郎姜碩使僞漢陳友諒不屈而死公爲奏官其子京畿歉國用不足公奉旨以錢幣誥勑募民入粟公以義諭民聞者感動荷􅀒來輸者塡道至有不願給直者上都宫殿火順帝􅃙重建大安睿思二閣公上書諌曰苟以二閣爲祖宗所建四海九州獨非祖宗故物乎會皇太子大臣亦以爲言遂罷其役其以左丞居嶺北也和寧爲太祖肇基之地而無圖志可徵公請於朝作和寧志先是夏侯尚玄嘗伏闕上䟽言郯王某之􅁈公高其義補其子宣使時埜速達兒爲省平章挾􅀻憾殺右丞荅里麻巴公曰是尚可以仕邪不去禍且及卽上章辯荅里麻巴無罪辭官去居房山卧不起將相重臣皆以書請不聽丞相失列門來問計公曰撫軍院悞國至斯不可救矣亟請河南王擴廓帖木兒總兵以衛畿甸而固守之當時事勢巳不可爲及再入翰林僅一日而大兵入燕公曰國家遇我至矣國亾吾敢不死趨所居報恩寺俯身入井將就沉溺寺僧大梓與番陽徐彥禮力挽起之且謂曰公母死公不祿食四年矣非居任比且國史非公莫知公死是死國之史也已而兵入府蔵垂及史􅁽公言於鎮撫吳勉輦而出之由是累朝實錄無遺闕者公之力也其入國朝也皇上嘗訪以元興亾之故甚見禮重俾之侍講禁林宋穆陵顱骨爲楊輦眞珈所發後入宣政院西畨僧相傳授爲祭噐公言于上索取瘞之聚寳山時公春秋已高雅志亦不復仕矣公厚重􅀷中有容寡言􅀏聞人詆毁如不知與人交有禮雖貴顯恒􅀂貧賤時平生好薦賢先後所引􅀂翰林學士劉君獻待制黄君冔等七十餘人至通顯者甚衆累持文衡考試多士人服其公樂善好義􅀂有督之者凡事有關於名敎可以勵風俗者必爲之乃已居官淸愼節儉遇凶歳輙䟽食不御酒倉吏進祿米贏七斗時斗可易白金五兩公命歸之官奉勑書徽政院使秃滿逹兒神道碑其從子以白金五十兩爲公夀公却之曰國體當爾居中書凡請文來謝者皆不受故人妻子不能衣食者厚賙而生之㫃嘗請仕公曰賢才未進吾敢􅀻爾乎公􅀶學善文辭至正中獨以文鳴天下凡朝廷制作皆出自公手四方欲顯白先德者皆造公門􅀹精於書得片楮雙字者寳秘以爲榮有文集五十卷奏議二卷宋史稿五十卷元史稿􅀂干卷藏于家公娶舒氏先三十年卒再娶趙氏先十一日卒俱封楚國夫人子男子二人㫃至正二十年進士第累官承直郎大都路同知薊州事今爲安慶府儒學敎授斿登仕郎大都儒學提舉亦前十年卒女六人一適同邑曾侁堅之子也餘皆夭孫二人長太平夭㳄德童嗚呼天之於人不能以俱全也乆矣或授之才而不假以位或􅂌以位而不􅂌以時此奇才偉德之士常困而不施而生民所以鮮蒙其休澤也惟公以淵􅀷之學精純之文嘗都顯要之位海内仰之如祥雲景星亦可謂有得於天矣而逢時亂亾不獲大展以死豈不可哀乎雖然觀其所自著者固足以不朽矣銘曰二氣孕精至文乃生凝爲川嶽煥爲日星天地之文因象以示象黙無言非人莫著徃古百代作者孔多迄今有聞其能㡬何元興朔方氣淳而龎駿烈宏謨震盪萬􅀖積盛而彰實在君子維八十年其績甚偉卓兹危公起大江西奥學醇辭孰能與齊在至正初交薦而升敷繹聖經以牗帝明中原荐饑􅀺首告病公跽而言民爲國命同列畏聞吐舌改容當宁褒嗟曰維汝功徃師成均朦瞽有相化其嚚荒趨厥禮讓貝葉之文有詔俾書非職所宜正色控辭或服豸冠或爲宗伯或居中臺或參廟畫孰􅁈弗雪孰善弗褒孰蠧孰莠弗除弗薅白之擢之予之錫之剔之殛之扶而植之彼何不思多言是訾曰匪其然吾畏後世南風泱泱􅂄老論亾屹如丘山以鎭四方疆土日蹙孰不震動謂尚有公恃以無恐權姦肆威盜秉國鈞畏公有言出爲藩臣政亂無章倚􅀔相戮公駭而吁吾何可祿微服霄趨房山是居庻士惶惶如渉失桴天兵北征驅雷走霆有耳莫聆燕社已傾公曰國亾吾曷不死公忍不死以存國史大明方隆多士景從有詔任公侍講禁中昔豈不仕弗􅀗行道時之可爲公則旣老維古賢士立德􅀣勲苟有弗施著之斯文公文之純大音玄酒道則在兹爵祿何有孰高爲山孰􅀷爲淵文之有傳終古昭宣元故翰林待制黃殷士墓碑宋濂皇帝登大寳之明年卽詔執政大臣曰元氏有國一百六十三年雖亳社巳屋暦數有歸國可㓕史不可㓕卿選江南知名之士不仕於元者纂修成書而命翰林學士宋濂爲之總裁庻幾得筆削之公以副朕意中書下其事濂等旣奉詔執筆唯謹而於黃公殷士之没寘於忠義傳中殷士之高第弟子鄧東復來請曰國史繫天下之公法當嚴墓碑紀一人之私理宜詳懸繂有石願先生爲書之按東所造事狀殷士諱哻殷士其字也臨川金溪化原里人未冠謁吳文正公澄於郡庠公方􅀋解小戴禮殷士撰書上公列諸家箋䟽得失􅀂分黒白㝷徃學文於虞文靖公集揭文安公傒斯三公皆江右人見殷士無不噐重以遠大期之巳而聞直清先生祝公蕃倡明象山陸氏之學於鄱陽與同舍生王企不遠數百里徃候焉一見之頃欣然有契於眉睫之間歸而喜曰哻豈昧其本心者哉自是一動静一云爲惟心是監凛然􅀂上帝之臨乆之東游吳㑹以發越精神還遯羽陽山中旣而嘆曰學者將用世爾柰何自秘耶乃走燕都受知中書參知政事朶尓直班公及丞相賀公惟一賀公當國授淮南等處行中書省照磨遷國子助敎陞愽士特除翰林待制兼國史院編脩官階奉訓大夫時權臣秉政天下大􅀔巳去殷士憂國愛君晝夜不遑寧屡上䟽陳大計竟不報殷士方彈指長嘆同列以從宜適變之機爲問殷士曰此言何以至於我哉今曰辟朝空宫以淹國卹吾之不能爲公存猶公之不能爲我亾也盍亦各諗所安乎洪武元年八月庚午都城䧟大明兵入城殷士謂其從人張午曰吾爲士子義不可辱國汝幸􅀵吾骨南還卽解衣投居賢坊井中午蒼黃大慟拾級下救之見殷士浮沉水間氣猶未絶遽􅀒之以升歔欷言曰今南兵不殺在儒臣尤所賔禮他日幸致富貴君何爲自苦如是􅁘縱曰爲國盡忠未聞小臣而死社稷也殷士曰齊太史兄弟皆死小官彼何人哉午終不觧還舍治酒殽使家人歌舞爲驩環守至曰昃㑹大將軍徐公達下令凡勝國之臣俱輸告身于官朝暮一見各署名于冊違則罰殷士聞之紿午曰吾今知汝意矣汝言良是也可取吾告身來第吾慚見同朝人必乘醉可徃耳何所可致醇酎乎午大喜持錢出沽闤闠中及還求之弗得亟徃視井傍冠裳帶舄列寘不紊殷士死巳乆矣其壽六十一云午買棺以歛同知漷州事陳介北山僧梓共營葬事以某月某日瘞于西山且刻石記之曾祖某祖某父某皆力本尚農享上夀以終娶里中桂氏隱士兢之女兄也有遠識勸夫游學毋以家事自累無子而先没殷士旣貴顯或勸求昏甲族以媒榮進殷士曰邶之共姜宋之伯􅁎區區一婦人尚以節義白守况男子者乎吾弟幸生男卽吾爲有後矣性嗜古文而􅀹長於詩􅀘作古樂府諸題音度和雅無愧於古四方士大夫多購求藏弆爲榮金華黄文獻公溍於人愼許可獨推􅅄之不置且與之通譜系云嗚呼天地之間有正氣焉日月以之而光昭海嶽以之而流峙在人則爲忠爲義其人雖没其氣則千載如生誠古今之常經國家之大防也有如殷士當元運將終誓與國俱亾從容就死而無悔比一時慷􅁣而殺身者則有間矣非其不昧本心之學能致是乎自古有天下者未嘗不以褒崇忠義爲先務皇上卽位之初蔽自淵􅂨卽勑有司建元忠臣行臺大夫福夀余忠宣公闕二廟以春秋奉祠事所以風厲於萬方者聖謨至􅀷遠矣州郡或以殷士之事上聞旌寵之典其有不降下者乎銘而列之非爲殷士也靈承上意以勸世之爲人臣者銘曰烈烈黄公元之小臣乃能爲國殺身成仁人所大欲夀爲最貴孰能舍之自絶于世壽固可欲義不可􅃜毫髪有愧雖生曷爲吾死死義直氣貫天中不死者何千萬年小夫苟全一愧一死不知百齡其死凡幾有洌者泉其􅀷無底􅁬身一躍眼不見水精魄入地肯隨物融化爲白龍上朝帝宫尓死得死百世冝祀盭綬金章誰非臣子皇明文衡卷之八十
