body:
  text: 墓碑節婦葉氏墓碣銘胡儼歙有節婦姓葉氏諱德壽百歲而終旣塟十有四年其曾孫順書其事來北京介予鄕人胡思名詣吾廬拜而乞銘將刻石墓上以昭懿德示子孫辭懇而意誠乃敘而銘諸節婦之父曰遷輔世爲歙人生節婦甚鍾愛年十六擇壻得同邑江萊甫而歸之初歸江舅巳殁朝夕事姑惟謹罔有闕遺相其夫辛勤以立家克盡婦道旣十年萊甫卒節婦時年二十有六無嗣乃以其兄呈甫之次子榮爲後榮在乳哺撫育盡其心及長敎訓之以義惸然閨門之內精純一心以率其下春秋祭祀之具長㓜衣食之需賔親往來之禮皆經營於節婦不以煩其姑而人稱之元末兵亂奉其姑避亂山谷中服勞奉養未嘗面憂戚之色而姑安之國朝王師平禍亂乃奉姑還督僮奴營舊業土田日墾物產曰滋而家益富姑卒喪􅀕如禮人尤賢之洪武辛未年八十有五郡邑以其事聞詔旌表之署其門曰江萊甫妻葉氏貞節之門仍復其家於是閭里有光子孫蒙休風俗用勸又十有五年而卒實永樂丙戌十一月四日距其生之年故元大德丁未歷甲子五百九十餘世鮮矣以卒之年某月某日塟歙北新州之淸平里祔其夫之墓子一人榮也孫二人長仁次祥女二人長適孫善古田知縣次適呂士賢曾孫三人長卽順次堅次保女四人玄孫十一人曰善曰永曰惠曰文曰忠曰希曰政曰淮曰信曰杭曰勝女六人嗚呼洪範五福克全者難五福以夀爲先夀登百齡尤難也世之人自身及子孫者有之及曾孫者爲難至於見玄孫不尤難乎况婦人之行脩於閨門人莫得而知至其終身則可知矣若節婦自少喪其夫守志以終其身始終如一日其享期頥蕃子孫揚休聲而垂世範者宜哉天之與善不誣矣銘曰金石之堅有時而折冰玉之潔有時而涅嗚呼節婦之志不可奪行皦皦兮女之傑身五福兮名不滅故翰林侍讀學士朝列大夫張公墓碑楊榮故翰林侍讀學士張公志道閩之先輩君子也其德義學識爲當時尊尚予恒以生晩不及親炙爲恨公之孫隆以前刑部主事劉子欽所述行狀來請銘予讀之􅁣嘆先輩之不可及尚敢銘公墓乎然以隆之請堅磪弗可得而辭也按狀公諱以寧志道其字也元贈禮部尚書諱留孫之孫中奉大夫福建江西行省參知政事諱一淸之子其先有光祿大夫諱睦者自光之固始從王審知入閩始居古田之梅溪至公曾大父世延再遷邑之雲津坊一淸先娶廖氏生三子頥興野俱㓜而廖卒􅁇娶陳氏有賢德訓育廖所生如巳岀陳旣有娠一夕夢小兒擎荷葉向月而拜􅁴而公生賦質淸粹神采燁煜襁褓中卽嗜讀誦甫六歳日記千言嘗與羣兒遊寺中僧人難之以對隨口酬應意甚超卓聞者歆羡八歲時人訟其伯父逮于獄公忿不能平詣邑伸理令異其言有條序命賦琴堂詩立就且出語新奇伯父由是得釋年十五承父命徃寧德受學于韓古遺越五年方歸學業大進鄕之學者莫不推許之登元泰定丁卯進士第初任黃巖州判官不踰年以計擒捕海宼殆盡民頼以安繼陞眞州六合縣尹有惠政及民以丁內艱去官服闋將上京師爲兵所阻敎授淮南者十年王鈍石光霽皆其門人也後復徵至國子助敎累官至翰林侍講學士中奉大夫知制誥兼修國史祖考皆贈官祖妣頼氏母廖氏陳氏妻宋氏皆淸河郡夫人旣入國朝拜翰林侍讀學士朝列大夫知制誥兼修國史毎承顧問多所裨益賜誥褒諭恩賚特厚焉洪武巳酉夏六月奉命齎詔印使安南封其國王未至而王卒國人請授其世子公不聽遣人請命于朝且敎其世子服三年䘮并令其國人效中國行頓首稽首禮朝廷嘉之賜以敕書比之陸賈馬授幷御製詩八篇以奨論之未幾得疾卒實庚戌五月四日也公生於元大德辛丑四月十有五日至是春秋七十其在安南八閱月著書不少倦臨終自爲挽詩意豁然也訃聞敕禮部遣官歸其柩所過有司設􅀕仍給在任三歲祿以贍其家以某年某月某日塟邑之極樂山􅀄娶大原宋氏生子四人烜燧煒煜􅁇娶大名宋氏生子炬烜燧煒早世煜以明經舉湖廣蒲圻知縣炬以茂才薦任江西新淦知縣官至􅆿部員外郎竝著政績孫男七垣圻埴坦埏塤壇埏任南雄保昌儒學訓導更名隆煜之子也公所著文有翠屛藳淮南藁南歸紀行安南紀行集春秋春王正月考故翰林學士金華宋景濂瀏陽劉三吾皆稱公之文章瑰傑逈出流輩而非後學所及其尊敬仰慕于公者甚至予以末學又安能稱頌公之遺德哉因不揆蕪陋而爲之銘銘曰世德相傳厥爲名族固始徙閩肇于光禄積善流慶懋毓文儒鬰如喬松温若美瑜富有才華早登科第􅆒歷中外英聲歘起際我皇明奉職詞林用弘禆益恩眷彌􅀷使節煌煌遠臨交阯夷俗丕變龍顏以喜寵命方降訃音遠來天語興嗟失兹良材爰歸其柩復䘏厥家生榮死哀綽有光華墓門有碑以昭厥德維公子孫永世承式太子賔客國子祭酒兼翰林侍講致仕胡先生墓碑楊溥正統八年八月廿七日太子賔客國子祭酒兼翰林侍講致仕胡公頥菴先生卒訃聞詔遣官諭祭命有司營塟制得立碑其子􅌔昭奉江西叅政張君居傑所述行狀走京師請文余與先生有斯文之諠不可辭先生諱儼字若思世居臨江之新淦元末徙南昌先生天資頴悟自㓜好學受經於伯父虞部員外郎汝噐及游鄕校從郡中諸先輩講學若書若琴若詩文皆有傳授旣長愽極羣書至於天文地理律曆醫卜皆通其說先輩皆稱許之以書經中洪武丁卯鄕試第二明年會試中副榜授松江華亭敎諭以內艱去丙子改授長垣縣上䟽乞近便養親詔許之改饒之餘干自是著爲令巳卯以薦陞安慶桐城令壬午太宗皇帝入正大統聞先生名召試之稱旨時授翰林檢討尋陞侍讀􅀡內閣朝廷推恩封其父母妻室永樂甲申陞左春坊左諭德兼官如舊是年九月拜國子祭酒庚寅上北征命以􅀕酒兼侍講掌翰林院事輔導皇太孫監國洪熈春以疾辭加授太子賔客致仕此其歷官也先生筮仕華亭時尚少而能以師道自任勸勉諸生務實學勵行檢以變浮靡之習日親講授每至夜分雖隆寒甚暑不廢華亭長老皆稱重之謂先生必大用其在餘干如華亭時士子樂從之成效居多宰桐城以愛民爲本凡可便民者以身任之民間積年逋負悉與奏免邑中虎爲害傷民物乃齋沐告于神虎遂滅跡表朱桐鄕墓俾民奉祀嘗督漕運次三山值大風雪遇中流有覆舟命僕夫援之活其􅀍溺者三十餘人捕蝗途中見饑餓病者悉命里胥扶掖就民舍給以藥食是夜大風􅀨得免暴露存活數百十人入翰林時朝廷選任儒者若江右解大紳胡光大楊士奇金㓜孜永嘉黃宗豫福建楊勉仁一時共事者七人先生在衆人遇有顧問必從容審度而後對未嘗以才智先人時論多之及兼宫僚在講筵凡古今治亂得失必反復敷陳以圖裨益以外艱去詔奪情道過南京見東宫詢及民情所對皆切時事爲祭酒以身率諸生奉守學規以圖成效一時人才翕然從化朝之公卿大夫咸推敬之時國子生有以故告歸者皆坐戍邉先生爲言其情有可矜者乃得免先生雖掌國學朝廷有大制作若纂修太祖皇帝實録及永樂大典天下圖誌諸書皆爲總裁未嘗去舘閣令桐城時嘗爲湖廣鄕試考官其去取有公論在國學遇太宗皇帝幸太學御􅃔倫堂賜坐講經賜賚優厚縉紳榮之此其宦績也乞致仕賜璽書褒美復其子孫賜寳楮爲道里費仍命有司給舟車還先生閒居卄餘年日與學者講求性理之學親藩禮遇之方岳重臣咸待以師禮而先生未嘗一言及私自處甚淡薄歳時僅足衣食嘗表許遜韋丹廟請春秋致祭修白鹿書院此其處退閒之有道也先生達於報施之理凡處是非利害可否之間必審度以求至當惟恐貽患於人羣倫中有不合卽引退不與辯以故所至能全交此又其守身之槩也其爲文以理爲主不尚辭藻所著有頥菴詩文若干卷行於世考􅀡翁累贈朝議大夫賛治少尹國子祭酒兼翰林侍講妣王氏累贈恭人配張氏累封恭人嘗受命婦冠服之賜子男三曰玘早卒曰􅌔曰昭女六人曰淑柔適劉瑱曰淑熈先卒曰淑美適王恒曰淑哲適毛宣曰陽貞􅃴李超宗曰慶貞適孫景賢皆士人孫男四人諲詢訥詵孫女四人曾孫男二人先生臨終命斂以時服嘗卜城南懸榻里爲夀藏明年閏七月二十五日塟之門生楊溥爲之銘曰繄古有君子觀光于朝爲國之賔及老而歸儀式後學師道聿尊是爲鄉先生殁而祭於社噫先生其人也故通議大夫工部右侍郞羅公墓碑銘王英太宗皇帝以聖神文武之德入正大統制作禮樂修明典章興舉政事尤夙夜孜孜廣求賢才以圖治理歳甲申廷䇿進士得四百七十二人取士於斯爲感而選入翰林績學以俟擢用者得二十八人當時以爲遴選之至與其選者吉水羅公尤卓然有所抱負者也公諱簡字汝敬性頴悟方七八齡賦詩輙有奇句稍長受經於仲兄汝弘窮􅊥愽䆒旁及百氏之書學以大進補廬陵邑庠生遂舉于鄕第進士與選入詞垣是時嘉祥疉見朝臣多獻詩頌公所作長篇短章詞氣浩然超出同輩擢翰林修撰扈從車駕廵劘北京所經山川風俗多有歌咏九載陞侍講修高廟實錄賜襲衣寳楮仁宗皇帝臨御天下公言時政十五事降雲南道監察御史且令掌道蓋公所言過􅀡故降官然亦以其敢言有學識使歷風憲可大用也公執法持正理􅁈獄多平反者宣考嗣位交阯黎利弗靖成山侯王通等用兵無功陞公工部右侍郞與李琦等齎璽書諭利未至而通與利和自率衆出境矣衆止公勿往公曰王通師敗辱國我受命諭賊可退縮不進乎賊雖凶暴必不敢拒詔與琦亟馳至其國宣上恩意利惶愧率其属拜自首其過遣使獻金又奉表詣闕稱謝且請立陳氏之孫暠復命公往立之旣至利以暠已死乃張筵列女樂設宴公叱曰暠死爾國人安可淫樂盡擊破其尊罍樂器時天晴忽隂雲起大雨雷震焚利居室利懼貢方物表謝還朝督兩浙漕運奏减荒田稅糧陜西言邊地腴田爲權豪占奪􅃱糧儲不充士有饑者命公往理之公劾守將之貪暴者取田爲權豪所占者經度頃畝均與細民糧賦倍加邊儲充足增置倉庾立輓運之法省民勞力又奏置河渠提舉官專掌水利而邊臣不得爲姦利者輙加誣謗公還朝言之詔勿問命公復往今聖天子卽位之元年西虜有宼邊者遣將追捕公督糧餉至紅子城之地忽遇虜飛矢如雨中公左膊墜馬虜環聚以鋒鏑加其身欲害之一老酋與衆疑語良乆乃舍之而從行吏卒皆􅀍害方公之遇虜也運餉者遥匿草澤中見衣緋者數人在公左右若衛取之狀及公無恙咸以爲神助云公在陜乆有言其多疾者召還賜致仕及賜鈔給驛舟還鄕時正統三年五月也後一年十月二十五日終享年六十有八訃聞上遣官賜祭塟里之竹園陂山考養蒙先生墓之左也公質脩偉多髯剛果善裁制繁劇與人論議或異已輙叱咤而其中垣夷不匿宿憾事親孝謹處兄弟和敎子姪嚴交朋友以義爲詩歌文章下筆如長江大河滔滔不止遺藳悉藏于家羅之先居錢塘中葉諱軿者爲吉州刺史因家郡城之印岡再世徙吉水之桃林宋寳祐間諱某與其子某同登進士所著有鶴林玉露傳於世至公之曾祖諱某祖諱時中俱有學行時中贈工部侍郞父諱養蒙號耕樂翁工於詩詞累贈通議大夫工部侍郞妣李氏與祖妣蕭氏俱贈淑人公娶李氏蕭氏子四人斆先卒次􅆒敏致孫男八人曾孫男三人曾孫女二人公􅃱政而歸也杜門不出以吟咏爲樂而鄕人以公仕乆多蓄積嗇於散金及没棺歛之外囊篋枵然皆歎其操守不可及也公之諸孤旣奉􅃺以墓碑爲請而從子孝感縣令勉學來京師泣而言曰先叔敎養諸姪其恩不敢忘刻碑當竭力其請益至予與公同年同選入翰林同官于朝相知最􅀷誼不敢辭銘曰於皇太宗聖德隆崇儒用賢昭治功詞苑濟濟來羣龍公志卓越先奮庸擢職太史文最工播厥歌頌聲渢渢一封諫䟽達九重要簮豸角馳靑􅍡臺端凜凜生威風司空貳卿品秩崇持節遠歷銅柱東蠻酋稽顙俱服從經理西陕勞厥躬田疇均一兵餉充中遭醜虜如聚蜂神庇公不罹其鋒歸休林壑巢雲松安榮佚樂以令終竹園山高馬鬛封巉巖千仞石可礱刻銘昭德垂無窮河南布政使司左布政使李公墓碑銘錢習禮太宗文皇帝入正大統首下明詔搜揚側陋思得天下材智之士以共新治道而尤嚮用儒術永樂癸未廷試取士四百七十二人在位二十二年凡以科取士而咸稱是科得人爲最盛河南布政使司左布政使李公昌祺其一焉公少負材噐志於用世繇郡學生以明經取進士第簡入翰林爲庶吉士性素介特至是益自檢飭達官勢人未嘗謁之私第會修永樂大典禮部奉詔選中外文學之士以備纂修公在選中例凡經傳子史下及稗官小說悉在收錄與同事者僻書疑事有所未通質之於公多以實歸推其該愽精力倍人辰入酉出編摩不少懈退復以其餘力發爲詩文應人之所求者皆典贍非茍作隱然聲聞舘閣間書進被宴賚櫂爲禮部主客司郞中部凡四司主各視他司最煩劇官難其人公以明敏濟之不怠剸治其間庭無留事退視其私一室枵然無長物俸不足以供費泰然不以屑其意堅苦礪節時流少與爲比尚書吕震有巧佞材倚被主知狠愎自用專以嚴憚下人羣吏莫敢仰親慢易僚佐少忤其意者輙中傷之衆皆側目而待公特異有所承禀色詞俱温始終不少衰駕幸北京仁宗以皇太子監國兩命權知部事行在吏部奏藩憲員闕太宗命簡兩京朝臣有材望者補之仁宗舉公等若干人應詔宴于禮部予道里費至卽陞爲廣西左布政使朝野榮之廣西地極南徼谿洞猺獠時出剽掠邊垊苦之公至而威望凜然狙㐲􅀷阻不復出爲民患境內晏安政務脩舉尋丁外囏去官吏民皆追思之服除入覲仁宗在位言于朝曰此佳士良不易得在列竦聴退而相與嘉歎不巳先是河南連歳旱蝗民多死徒太宗震怒被災郡縣有司不以土聞者悉逮寘于法思得人以撫安其民改公往涖河南被命卽就道旣至宣布主恩䟽滯舉廢捄災䘏患憫下窮繩豪猾去貪殘方岳之政所當舉者悉盡心焉質明起眂事日入方息居數月政化大行聲績茂著後丁內囏歸服喪河南荐饑本司累奏起公治之宣宗命奪喪乗傳赴官爲治如初勤勞倍之因感風疾往往增劇不待引年堅乞致其事詔報可之旣歸而先廬僅庇風雨服食淸約如寒士伏臘不充䖏之􅁉如居雖宻邇郡城足跡未嘗至公府守長於政務有所咨决極言無隱因其言民隂受其惠者居多病間輙書不去手吟咏自娛遠近有求文者應之不倦一日疾革遣訓二子惟以力學脩身爲言餘無他語翛然而逝時蓋景泰壬申二月二十五日距生洪武丙辰六月二十六日夀七十有五公諱禎昌褀字也僑菴白衣山人運甓居士其號也李氏世家金陵宋南渡有諱義者仕爲郞中扈從隆祐太后南上留居吉水之烏江元時諱某者烏江徙居郡城之吉陽門又徙今之螺川巷因爲廬陵人曾大父道華大父充國皆隱不仕而以行義稱父伯䕫力學工詩名聞當時母劉氏公生資稟英悟早卽嗜學成童属對賦詩語出驚人弱冠爲文藻思溢出蔚有老氣不惟一時材俊若禮部侍郞曾公子棨輩相與頡頑名聲不相上下鄕之老成人亦皆駭其文識謂必顯於世平生所著詩文有藁若干卷藏于家平居孝弟友順出於天性恤孤赴難皆盡其力元配艾氏繼配劉氏皆有淑德艾氏早世女一人以妻郭孚俊劉氏子二人長曰宣次曰定篤志力學克傳儒業今􅀘郡學生將决科取士矣女二人以妻陳雅量朱貞符孫男五人女六人墓在縣之紫雲山招義院之西從先兆也定奉事狀來謁銘以刻諸墓隧之碑於乎昔之所謂大臣者委身狥國夙夜憂勤以任天下之重遑恤其私故宋杜正獻公身至大拜歸老無屋以居寓於南京驛舍范文正公晚叅大政妻子僅給衣食至其殁也家無以爲喪公任牧伯身寵家温固其宜也而乃俛盡厥職空乏以終其身所謂貴而能貧揆之二公夫何媿哉眂彼顧利冐恥不爲公議之所右者其賢不肖何如哉因定之請論次公之里系官閥蹈履之詳爲銘以刻諸貞石又何媿詞銘曰聖明御極宵旰渴士天心純佑俊乂雲萃􅁬庸于朝布列有位効其智能稱厥任使公起茂科立躋顯仕兩殿大藩所至稱治去其煩苛涖以簡易招徠罷氓奠安田里震壘遠夷綬靖邊鄙惠洽羣黎威憚徤吏威惠竝施本仁輔義夙夜孳孳弼成化理先民有云國之利噐牗下吿終得正而逝螭蟠豐碑表厥墓隧眧其民庸垂示永世皇明文衡卷之八十二
