  text: 皇明文衡卷之一
  hash: sha256:dabf6a99ad46771d2a25514e4d1ed8eaaee884289f4ab25fa820ea4c0149c89d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_001-1a}
body:
  text: 翰林院學士新安程敏政選編郷進士國子監助敎永康范震校正賜進士應天府儒學教授郊郢李文㑹重校代言檄諭中原檄宋濂自古帝王臨御天下中國居内以制夷狄夷狄居外以奉中國未聞以夷狄治天下也自宋祚傾移元以北狄入主中國四海内外罔不臣服此豈人力實乃天授然逹人志士尚有冠履倒置之嘆自是以後元之臣子不遵祖訓廢壞綱常有如大徳廢長立㓜㤗定以臣弑君天曆以弟酖兄至於弟技兄妻子烝父妾上下相習恬不爲怪其於父子君臣夫婦長㓜之倫瀆亂甚矣夫人君者斯民之宗主朝廷者天下之根本禮義者御世之大防其所爲如彼豈可爲訓於天下後世哉及其後嗣沈荒失君臣之道又加以宰相專􅁠憲臺報怨有司毒虐於是人心離叛天下兵起使我中國之民死者肝腦塗地生者骨􅁏不相保雖因人事所致實天厭其徳而棄之之時也古云胡虜無百年之運驗之今日信乎不謬當此之時天運循環中原氣盛億兆之中當降生聖人驅逐胡虜恢復中華立綱陳紀救濟斯民今一紀于兹未聞有濟世安民者徒使爾等戰戰兢兢處於朝秦暮楚之地誠可矜憫方今河洛􅀜陜雖有數雄忘中國祖宗之姓反就胡虜禽獸之名以爲羙稱假元號以濟􅀻恃有衆以要君阻兵㨿險互相吞噬反爲生民之巨害皆非華夏之主也予本淮右布衣因天下亂爲衆所推率師渡江居金陵形勢之地今十有三年西抵巴蜀東連滄海南控閩越湖湘漢􅃆两淮徐邳皆入版圖奄及南方盡爲我有民稍安食稍足兵稍精控弦執矢自視我中原之民乆無所主深用疚心予恭天成命罔敢自安方欲遣兵北逐群虜拯生民於塗炭復漢官之威儀慮民人未知反爲我讐挈家北走䧟溺尤深故先諭告兵至民人勿避予號令嚴肅無秋毫之犯歸我者永安於中華背我者自竄於塞外蓋我中國之民天必命中國之人以安之矣夷狄何得而治哉爾民其體之如蒙古色目雖非華夏族􅀋然同生天地之間有􅀎知禮義願爲臣民者與中國之人撫飬無異詔封諸王詔王禕朕荷天地百神之靈祖宗之福起自布衣囏難創業惟時將帥用命遂致十有六年混壹四海功成治定以應正綂考諸古昔帝王旣有天下子居嫡長者必正位儲貳􅀂其衆子則皆分茅胙土封以王爵蓋明長㓜之分固内外之􅀔者朕今有子十人前歳巳立長子標爲皇太子爰以今歳四月􅀄七日封第二子樉爲秦王第三子棡爲晉王第四子棣爲燕王第五子橚爲呉王第六子楨爲楚王第七子槫爲齊王第八子梓爲潭王第九子􅂎爲趙王第十子檀爲魯王姪孫守謙爲靖江王皆授以冊寳設置相傳官屬凡諸禮典巳有定制於戯衆建藩輔所以廣磐石之安大封土疆所以眷親攴之厚古今通誼朕何敢私尚頼中外臣隣相與維持弼成政化故兹詔示咸使聞知定嶽鎮海瀆名號詔詔曰自有元失馭群雄鼎沸土宇分裂聲教不同朕奮起布衣以安民爲念訓將練兵平定華夷大統以正永惟爲治之道必本於禮考諸􅂎典知五嶽五鎮四海四瀆之封起自唐世崇名美號歷代有加在朕思之則有不然夫嶽鎮海瀆皆高山廣水自天地開闢以至於今英靈之氣萃而爲神必皆受命於上帝幽微莫測豈國家封號之所可加瀆禮不經莫此爲甚至如忠臣烈士雖可加以封號亦惟當時爲宜夫禮所以明神人正名分不可以僣差今命依古定制凡嶽鎮海瀆竝去其前代所封名號止以山水本名稱其神郡縣城隍神號一體改正歷代忠臣烈士亦依當時􅀄封以爲實號後世溢美之稱皆與革去其孔子明先王之要道爲天下師以濟後世非有功於一方一時者可比所有封爵宜仍其舊庻幾神人之際名正言順於理爲當用稱朕以禮祀神之意故兹詔示咸使聞知開科舉詔詔曰朕聞成周之制取材於貢士故賢者在職而其民有士君子之行是以風俗淳美國易爲治而敎化彰顯也漢唐及宋科舉取士各有定制然但求詞章之學而未求六藝之全至於前元依古設科待士甚優而權要之官每納奔競之人辛勤歳月輙竊仕禄所得資品咸居舉人之上其懷才抱道之賢耻於竝進甘隱山林而不起風俗之弊一至於此今朕統一中國外撫四夷方與斯民共享昇平之治所慮官非其人有傷吾民願得賢能君子而用之自洪武三年爲始特設科舉以起懷才抱道之士務在經明行修博古通今文質得中名實相稱其中選者朕將親䇿于􅋝觀其學識品其髙下而任之以官果有才學出衆者待以顯擢使中外文臣皆由科舉而選非科舉者毋得與官敢有游食奔競之徒坐以重罪以稱朕責實求賢之意於戯設科取士期必得於全材任官惟賢庻可成於治道咨爾有衆體予至懷故兹詔示想宜知悉免租稅詔蓋聞自古帝王必資民力以助成武功故國家尤當以恤民為先務朕為億兆主甚欲與吾民同樂於天地間即位以來于今三年各處郡邑雖嘗免其稅糧尚慮凋弊之餘未能蘇息其應天太平鎮江宣州廣徳滁州和州當創業之初錢糧供億實為浩繁頼此数郡以足國用遂致平定四方念其勤勞何時忘之深宜優恤應天太平巳宜免其稅糧二年鎮江宣州廣徳滁和巳免二年此七處今年夏秋稅糧再行蠲免徽州嚴州金華衢州處州廣信池州饒州廬州以次歸附供給皆為煩勞此九處今年夏稅秋糧亦與蠲免其河南北平近入版圖重念其民乆罹兵革疲困為甚山東與河南地方相接其民宜加培養庻使河南之民得以相資為生山東已嘗與免二年河南北平巳免一年此三處今年稅糧竝行再與蠲免朕以布衣起事民間囏苦無不周知今所優免姑以淍弊之處為先所在有司其尚謹於奉承以體朕恤民之意封安南國王詔朕躬膺正統撫有天下眷爾安南素知尊慕中國去歳國王陳日煃奉表稱臣朕遣官齎詔印仍封為安􅀯國王比至境而日煃巳逝今世子日㷂能􅁇先志專使請命考於典禮宜嗣其位是用命爾日㷂襲封安􅀯國王授以金印於戯父子之親旣謹承其基業君臣之義尚永守於藩方故兹詔示想宜知悉封占城國王詔皇帝詔曰咨爾占城國王素處海􅀖奠居􅀯服自乃祖父世篇忠貞嚮慕中朝恪守臣節今朕肇承大統撫馭萬方欲率土之咸寜嘗馳書而徃報而爾能畏天命知尊中國即遣使稱臣來貢方物思法前人之訓以安一境之民眷爾忠誠良可嘉尚是用遣官齎印仍封爾為占城國王於戯以内治外朕乃一視同仁以小事大爾尚慎終如始永為藩輔益勉令名故兹詔示想宜知悉封髙麗國王詔朕肇膺正統誕撫多方乃眷髙麗襲朝觧之遺壤克尊中夏逾渤海而稱臣頃詔使之徃臨即表詞之來上有嘉方物良仞􅂨情蓋由夙慕於華風用是恪修於臣職况爾三韓之累世皆慎始終屬兹四海之一家何殊内外爰稽彛制載錫真封今遣某官齎印仍封爾為髙麗國王於戯保民社而王纂榮懷於舊服守禮義之國作屏翰於東藩其始自今毋替朕命故兹詔示想宜知悉招諭擴廓帖木兒詔自昔帝王之得天下當大業垂成之際尤必廣示恩信雖素相仇敵者亦皆兼收而竝用之所以法天地之量而成混一之業也朕自起兵淮右收􅄃群雄平定華夏唯西北􅁁備未修蓋以擴廓帖木兒猶守􅀌忠保其餘衆居于沙漠以為􅁁患朕甚念之兹用特與寛宥必能知時逹變􅁣然來歸其所部將士多我中土之人文武智能朕當一一用之有願還郷里者聴其賀宗哲孫翥趙等果能賛其來歸其功非小投機之㑹間不容髪朕言不再其審圖之故兹詔諭想宜知悉諭安南國詔宋濂春秋大義亂臣賊子在王法之所必誅不以夷夏而有間也向者安南國王陳日煃薨我國家賜以璽書而立日㷂為王今觀所上表章乃名叔明詢諸使者日㷂為盗所逼悉自剪屠其羽翼身亦就斃此皆爾叔明造計傾之而成簒奪之禍也揆於大義必討無赦如或更弦改轍擇日㷂親賢命而立之庻幾可贖前罪不然十萬大軍水陸竝進正名致討以昭示四夷爾其無悔制中書平章政事常遇春追封開平王制王禕天開鴻業篤生英傑之臣星隕將營載舉哀榮之典肆大勲之垂集俄上將之云亡庸錫褒封誕頒渙號具官常某英敏而沈毅嚴肅而恢宏自初建於義旗即來歸於戎斾首從淮右􅀭采石之鋒旋定江東振丹陽之捷拓邉疆於全楚殱強敵於三呉掃河洛而奠中原指幽燕而平朔土功成百戰􅁢為一世之豪氣蓋三軍豈特萬人之勇近報欒陽之凱益竆漠北之追攬哀訃之遽來知力疾而猶戰眷言忠藎深用痛傷海宇一家旣已成於大綂君臣同體期共享於太平事乃􅀂斯情何䏻已秩庸陞於次相爵兼錫於眞王雖禮數之有加於予心其猶歉於戯金書鐡劵􅂚忘佐運之功衮衣繡裳尚服飾終之命寵靈弗替祚胤彌昌可贈翊運推誠宣徳靖遠功臣開府儀同三司上柱國太保中書右丞相追封開平王謚忠武代詹學士封靖西王制蘇伯衡朕惟竇融保五郡而事漢式彰推載之忱李勣舉十州以歸唐益著忠貞之節在當時之寵遇越常典以褒嘉眷爾外藩忠於内附為績旣懋其報宜豐具位某曩在北朝屬為近戚任維城之重􅀉乃胙土於遐陬撫御合宜官府各脩其職業恩威竝著部落咸頼以安全兹朕誕開鴻業之􅀄惟爾灼知曆數之在審於去就率先遣使而來庭籍其土壃不待興師以及境知同馬援之識眞主義等箕子之歸成周是用頒新命以示恩仍舊封而授任庻使守其祭祀豈惟保兹民人於戲錫爵䟽封不忘誠服之意柔逺䏻邇實切寵綏之心尚思對􅀭益崇忠藎可授光禄大夫靖西王仍給金印俾其子孫世世承襲梅思禮授大都府副使制建庶官以臨萬國任莫重於本兵掌􅀖政而綂六師選必先於碩輔具官梅思禮材資驍勇噐量雄深􅅐􅁭韜畧之竒􅀍服詩書之雅早登華貴作鎮藩翰保境安民待四方之底定提壃籍戸爰一旦而來歸明炳幾先忠於内附蓋去留灼知乎天命肆危疑克㫁以人謀辭項從劉知同曲逆舎􅅝去述識擬伏波凡我師徒束兵而下淮甸暨其士女按堵有如泰山靖言思之厥功懋矣是用擢居宥宻俾賛樞機匪彰效順之勤式示輸誠之勸於戲立非常之功則有非常之賞旣􅒊錫以殊恩奮國士之報以酬國士之知益圖臻於顯効可授大都府副使誥皇外考妣追封誥王禕朕惟歷代君天下者推恩必及於后族親親之道也皇后馬氏勤劳内􅂇化家爲國非其親之積德何以致此稽于典禮是用追封皇外考馬某爲徐王皇外妣爲徐王夫人仍立廟以奉祀事於戲親之至則思遠報之至則禮崇尚推幽靈歆兹䘏典趙德勝贈江西平章政事追封梁國公誥開國之初朕頼爪牙之士執干戈以拓疆土其有􅂢軀徇國而没於王事烏得不深念之哉具官趙德勝剛果有識勇毅絶倫始自滁和奮迹行伍乃從渡江㧞采石取姑孰遂定建業克丹陽破毗陵皆預有功乃陞帥職從大將下宣城江隂攻呉興錢塘收靑陽石埭襲宜興高郵而安慶九江鄂渚南昌之役其功益著及守南昌平山冦靖屬邑朕甚嘉之爰膺僉樞之命夫何敵兵侵城竭力備禦誤中矢鏑竟隕其身於戲有功而不及親受其報朕之念爾何能忘之是用陟以崇階列􅕄台輔仍封大國建于上公以示飾終之儀以昭􅂆忠之道英靈如在尚克歆承方國眞除廣西行省右丞誥自元政旣㣲乃有智勇之士乗時而興思建功業及天下兵起遂角立一隅以爲民人之保障其後果得所歸以全富貴是亦可謂豪傑者矣以爾方國眞材噐雄毅識慮深遠知世道將不可爲乃奮于東海之濵二十年間與其兄弟子姪分守三郡而威行于海上得非一時之豪乎然奉貢于我蓋亦有年終能知幾逹變舉族來歸富貴功名保而不失始終自全如此朕甚嘉之是用擢居左轄列名外省食其祿秩綴于朝班以示朕優崇之意爾其恭愼以自飭暇豫以自安益勉令名庻圖報稱楊曄除中書左丞誥朕惟輔相所任大政而左丞實爲之佐賛政本而弘治化其職重矣必有才德者乃稱是選具官楊曄文足以經國武足以濟時當朕創業之初爾卽委身事朕内則効謨謀於帷幄外則宣命令於四方踐􅏡衆職政業昭著及居中臺紀綱大振屢叅省政勲績􅀹多今四海混壹朕􅀅以仁義禮樂化風天下正爾展其所學之日也頃者命爲右丞三月之間庻務畢舉其公平正大之心皦然可見朕實嘉焉左丞之任俾爾晉陞爾尚益盡心力共圖政理經綸審於事體施設酌乎時冝使百司奉法天下治安以副朕簡注之意可汪廣洋除中書右丞誥中書綜理百司紀綱庻務設丞于左右所以賛政本而弘化切必得濟時之材任重之噐乃稱兹選具官汪廣洋道足以佐文治學足以庇民生􅆒歷中外十有六年比歳江右山東屢叅省政克膺方靣之託乃入爲中執法振舉憲綱屬陜右之地􅀄入職方輟自臺端出任省寄僅逾半載勞効巳著朕甚嘉之爰念功成治定之時正立經陳紀之日匪資碩望曷圖治功是用命爾復居中書輔我大政右轄之位往其居之於戲官必擇人人惟求舊公輔之任朕期爾乆矣爾尚益宣材力務展猷爲設施酌乎古今經綸審於事體庻成勲績以副朕懷可呉琳除吏部尚書誥惟古帝王之治天下在於得人才然人才實由於銓選朕所以於吏部之職必擇器識公明者居之具官呉琳學術旣醇踐歷尤正其來事朕由博士陞僉憲司克振風紀及貳鹺􅄗國課以辦俾居記注獻納爲多兹用陞長天官以掌銓衡之重爾其量材而授官計功而考能使賢愚有別而黜陟合宜庻稱朕爲官擇人之意可杭琪除戸部尚書誥國家以戶口土田之事徭役職貢之方與夫㑹計倉廩府庫經費周給之数一歸之於戸部古之制也必才周而識精者始稱兹選具官杭琪處事詳練􅆒歷爲乆皆能展其所長爰佐大農遂貳戶曹涖事唯謹勞績優著朕甚嘉之是用俾爾陞任地官之長尚其明生財之大道務培􅀖本使食貨充而國用足以稱朕節用愛人之意可魏觀除太常卿誥太常之職掌郊廟社稷山川群神之祀其任重矣必明於禮典者乃使居之具官魏某學行方正事朕有年累持憲節振􅀭風紀及領鹽司大課以集勞績茂著朕甚嘉焉頃者俾記言動朝夕之間屢進讜論􅀹簡朕心兹用命爾長于大常爾尚務持齋戒慎恭乃事用副朕誠敬之意而感通於神明焉可高安除給事中誥有事殿内之臣其職爲親且近是以漢有夕拜之事唐有􅂗歸之儀朕稽古建官仍置厥職雖封駇之制不􅆓于昔而論思獻納之助蓋有望焉以爾英敏之資闓偉之噐自乃祖父奮起西土世濟其美爲時名臣爾生于名門蚤踐華要以閥閱之子弟習臺閣之威儀朕甄録遺才無間踈戚酌于衆論俾列邇聮頋方樂受盡言務勤庻政凡有􅀜於公議其毋憚於敷陳益懋嘉猷圖稱子望可王文除侍儀使誥朝廷之禮貴乎嚴肅以故等威有辨而周旋進退各得其宜此賛相之職所以必擇人而任之具官王文資禀純美學知向方昔者乃父嘗持文墨議論以事朕而殁於王事朕􅀷憫之故於其子特甄録之入侍於近衛從事於中書及居引進之司􅀹著恪恭之譽兹用進職列于侍儀其小心以自持尚臨事而加敬使禮文之行於朝廷者秩然可觀則子汝嘉張祐除司天少監誥司天之職在昔皆世守之故其淵源正而術數精非若他伎雜藝可以驟而學之也以爾張祐智識明䆳通於天文之術其在近代祖父世掌天官而爾實承其家學淵源旣正術數以精其古所謂顓門名家者歟兹用命爾仍職司天尚其益據所藴謹於推歩以副朕敬天勤民之意可朱升除翰林侍講學士誥陶安朕聞洙泗集群聖之大成新安爲文公之闕里先後相望斯文盛昌况新安之有人與前賢而同氏允爲博古通今之士􅂄年碩望之芵是宜備顧問於内庭叅宻命於翰􅁐惟兹華要用寵師儒朱升趨蹌禮法之塲超卓傳註之表群經獨得其趣諸子莫遁其情網羅百家馳騁于古自其潜心積累至于皓首蒼顔用功勤矣朕開基以來歳毎徴聘戔戔束帛爲矜式於國中青青子衿來英才於舘下議禮作樂郊廟所資修已及人國家所尚擢登玉署侍講􅊮闈鳳池兼掌於絲綸麟史仍叅於筆削天地交泰有資賛翊之功雲漢昭回共􅆀文明之治可授翰林侍講學士中順大夫知制誥同修國史宜令朱升准此安統除兵部尚書誥宋濂兵部司馬之職尚書法從之官古不輕授今難其人蓋戎務之出入馬政之弛張莫不繫焉非有奮厲之才練逹之智不足以奉􅀭威武毗賛機宻者矣具官安某粤自蚤歳有志事功自北而南在朕左右及其給事内廷論思獻納之益亦時有焉夏官之選惟爾之能然以八座之貴朕非輕以􅂌人者也爾尚一乃心力以報朕所以見知之意嗚呼惟秉義守正則可以謹科條惟趨事赴功則可以行􅀖政尚思自勉服我訓辭王居仁除山西行省叅政誥國家之建行中書所以控制方靣而宣布政令者也况河東山西之地古爲雄藩所轄州郡不啻六十有餘版籍之廣民庻之繁其事亦云夥矣邇者鑄印開省未設丞弼先命近臣爲叅知政事奏辟官屬以行則是大小之務皆得專逹非止叅預而巳也與斯選者非得勲舊之臣曷足以重其任哉具官王某才足以匡時謀足以經逺自渡江以来委身事朕凡十五年踐􅏡中外多著勞烈執法中臺聲聞益著於是簡在朕心俾躋政府嗚呼陳紀立經爾尚膺蕃宣之寄安􅁁靖國爾其盡撫綏之方徃惟汝諧毋替朕命潘興祖授飛熊衛指揮使誥􅂫伯衡環衛之司實居左右勲舊是任用表勤勞具官某􅀡而能容剛而不撓方渡江之伊始卽杖䇿而來歸奮前驅而擢彼南征列中堅而保兹東土奔走禦侮蓋無戰而不從艱難備嘗斯有功而必録戎旃再典奨命荐膺綽有休聲旣克副於望實誕加峻秩庻足展其威名督􅀐士總材官任良重矣訓武經申兵法爾其勉之王弼授驍􅀐衛同知指揮誥社稷之守必在於􅀲牙拱扈之臣視之猶心膂克膺兹選實難其人具官王弼沉静可嘉果敢無敵始列右廣􅁇長千夫屬櫜鞬而率先戎行時將十載聞鼓鼙而克勤乃事勇冠一軍儋爵之恩愈隆汗馬之勞益著迨兹升擢彌切􅀝毗帶礪山河朕不遺於故舊功銘竹帛爾式克於欽承謚册文懿祖謚册文代陶學士作􅂫伯衡維洪武元年歳次戊申正月壬申朔越四日乙亥孝曽孫嗣皇帝臣再拜稽首上言伏以創業開基孝宜先於追遠祖功宗德禮莫大於正名蓋由積善而累仁是􅃱以家而爲國考文於古進謚在今伏惟皇曾祖考府君性賦慈仁志存謹厚克勤克儉修身永念於貽謀無黨無偏履道毎期於垂􅁉昔陶唐上崇於少皥而周武追王於古公思水木之有本源履霜露而懷怵惕謂多儀備物未足盡於孝心惟顯號鴻名乃克符於禮典作廟有奕鏤玉惟榮謹奉冊寳上尊號曰恒皇帝廟號懿祖陟降有臨神明如在􅁇志述事敢云有道之曽孫啓土建􅀖永頼在天之烈祖謹言懿祖妣謚冊文維洪武元年歳次戊申正月壬申朔越四日乙亥孝曾孫嗣皇帝臣再拜稽首上言伏以人之大倫正始必由於内治國之盛典報本莫大於尊親惟今日之光華皆重闈之積累嚴􅁱祼享敬上徽稱伏惟皇曾祖妣坤道順承壼儀雍穆儉遵澣濯德音夙著於宗姻禮備温恭慶系逺延於孫子實由中助丕顯前聞惟種德於百年之先故食報於數世之後遂令眇質􅀗履至尊爰考舊章式崇謚冊謹奉冊寳上尊號曰恒皇后誕受帝祉永膺令名重翟禕衣莫遂生榮之願關雎麟趾尚祈隂相之功謹言遣祭文祭古帝王陵墓文宋濂昔者聖帝名王豐功盛德被于生民四海咸頼渉世旣逺陵墓所在徃徃鞠為椔翳祭祀遂􅃱廢而弗稱朕旣統一天下主百神之祀心甚憫焉因遣使者訪問其處命有司製衮冕之服具牲牢醴齊􅃱祭陵下而焚之然帝王之精神上與天通陟降帝所必能來格於㝠㝠之中也尚享祭高麗國山川祝文王禕高麗為國奠于海東山􅀔磅礴水德汪洋實皆靈氣所鍾故能使境土乂安國君世享富貴尊慕中國以保生民明神之功於是為大朕起布衣今混一天下以承正統比者本國奉表稱臣納貢朕嘉其誠巳封王爵考之古典天子於山川之祀無所不通是用遣使敬將牲幣徃脩祀事以答神休惟神其鍳之擬􅀕元㓜主文錢甦皇帝謹遣某官某􅃱祭于元㓜主之靈曰嗚呼天父地毋而人生其間天地之氣有偏正故人之生有華夷而尊卑貴賤分焉自古華為天下主而四夷服從亦猶家之有長而子弟順化帝王之心豁然大公以宇宙之内為一家四海之外為一人而一視同仁者良以此也歷代以來夷之識者莫不奉正朔求冊命於中國以保其疆土載諸典籍昭然可徴有宋中葉天地運否自徽欽不競以至南渡之後日以陵替於是㓜主之先勃興朔漠芟夷種􅀋克取金源遂兼宋以馭中夏幾及百載斯民實􅀩惠焉然天地之經華夷之義終不可泯也由是脫其衘轡海内􅋐爭民墜塗炭天乃命朕起自布衣撥亂反之正十餘年間群兇蕩㓕遂移師北指㓜主父子順承天命亟返故國華夷各得其所嗚呼是豈人力之所􅀎及哉由此而論則朕之得蓋復吾中國之固有㓜主之失乃棄其朔漠所本無耳朕固無愧於㓜主㓜主亦將奚憾於朕哉朕方欲撫寜逺人以盡一視同仁之義孰謂㓜主遽爾􅂢世聞之感悼不䏻自巳因遣奠以布朕􅂨惟靈鑒之皇明文衡卷之一
