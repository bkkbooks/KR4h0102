front:
  text: 皇明文衡卷之七十四
  hash: sha256:cac71044004f536ecb96bb4c90bdd5a5decb333ab01f6e140c95b76eeaf62471
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_074-1a}
body:
  text: 神道碑勑贈開國輔運推誠宣力武臣榮禄大夫柱國同知大都督府事陸安侯許國襄簡王公神道碑銘有序劉三吾許國襄簡公旣塟有年洪武之二十年冬十有一月己亥皇帝御奉天門以工部奏公墓隧之石已具勅翰林學士院爲文賜其家俾鑱焉臣三吾職在紀述不敢控詞則退而稽其世次官代行事之實序而銘之臣聞天生聖上聰明時乂當元政秕僻㝢內幅裂群雄角起資以君主治其爭亂則有熊羆之士不二心之臣若徐常兩王佐命討伐襄簡王公單秉義效順以會其成功大一統之業者亦天所􅂌予者哉公姓王諱志世鳯陽臨淮人性鷙猛有智謀臨陣對敵果毅無前至正壬辰三月土宼蜂起舉鄉兵取濠州且守且戰甲午前克滁州􅀔劇破竹知天命攸歸在今上䟽附來從乙未濟江得采石太平破中承蠻子海牙水寨進㧞建康丙申七月調隷總兵同簽樞院徐中山圍常州屢騰柵先登身犯矢石功聞授懷遠大將軍右副元帥丁酉三月常始下公功爲最後恢復宣州江隂宜興高郵等州府多著戰績中山悉其能公克攄其智勇故也辛丑秋九月侍上親下安慶諸郡邑壬寅夏四月復隷中山身先馳戰江西諸州縣望風崩角癸卯八月乗海艘從御舟䠞陳友諒于彭蠡友諒中流矢死擊走其餘黨于注口之水寨甲辰三月上親征湖廣武昌公曁諸將一稟睿筭與賊遌最遂下之載從中山復廬州㧞安豐逐北姑蘇張士誠軍陞飛熊衞親軍都指揮使總兵守禦陸安州明年春改授陸安衞指揮使戰守戢綏敵讋民附戊申春正月上正宸極國號大明改元洪武其夏五月奉旨將本衞兵征迤北次汴梁㝷調征河南冬十月從馮勝宋國公度黃河迤邐進取懐慶澤潞等府州徃徃所部􅀡前無堅陣是臘徙鎭平陽居三年移守漢中仍駐師陜西明年將其全軍􅀷入察罕腦兒絶塞却胡遠遁還軍平陽冬十一月勑贈開國輔運推誠宣力武臣榮祿大夫柱國同知大都督府事封陸安侯五年從中山征朔漠大獲虜而還九月又從傳友德今頴國公征雲南所向克捷十七年凱還京師十九年八月十七日以疾薨于第上爲之震悼罷朝􅉠贈有加追封許國謚襄簡公生正統乙亥正月九日春秋五十有二以薨之十月二日勑塟鍾山之隂曾祖考四一公鎭國將軍僉大都督府事護軍追封羅山縣子妣董氏追封羅山縣子夫人祖考五一公驃騎將軍親軍指揮使護軍追封太原伯妣寗氏追封太原伯夫人考六三公榮祿大夫同侯妣潘氏追封陸安侯夫人室潘氏從封許國夫人先公薨生至順壬申五月十九日薨洪武庚戌三月始塟鳯陽臨淮至是從公祔焉生男四人長威次琙次璣次琛女一人適黔國公子景祐孫男三女二揆公功行是宜銘詞曰先時寓內劻勷弗靖烝民有主資以戡定效用者將鷹揚其人徐常兩王開國藎臣各有􅀲牙􅁬其威武惟襄簡公乆佐徐府旣定江淮亦拓中原自河徂陜益西其轅繇淮而北極是朔漠轉征雲南卓著勇略最公在軍沐雨櫛風惟知徇國遑䘏厥躬陸安受國方倚大用天不憗遺黄梁遽夢上爲震悼䘏典是頒許國襄簡爵謚具完鍾山之隂公所藏室壽正名垂燁然竹帛有桓其表有穹其碑千秋萬禩永永無期勑贈開國輔運推誠宣力武臣榮禄大夫柱國同知大都督府事鞏昌侯追封陜國公謚宣武郭公神道碑洪武二十年冬十有一月己亥皇上御奉天門工部侍郎臣秦逵奏故鞏昌侯墓道之碑巳具冝得文及時鑱之有旨翰林學士院製文臣三吾職在詞垣不敢以才學謭淺爲辭謹按其世系功勲年爵次第而銘之臣聞天興聖代大有爲之君必篤生壤偉英勇之將與之會遇以輔成其大業雖人也實天也當元季王政不綱在所裂裳爲旗荷挺爲兵草野自雄罔所適主時則今上皇帝龍興鳯陽天人合應有若中山開平兩公傑出其間是固功無與儷矣其知所趨向先後䟽附厥有成蹟若鞏昌侯臣郭子興者亦豈偶然哉子興世鳯陽人拳勇有膂力善騎射自癸巳歲起兵首隷元帥郭某麾下卽知所適主明年得滁州又明年得和州亦旣從龍濟江若采石若太平若溧陽溧水所向崩角義勇之聲曰以瀑矣丙申三月随大軍進抜臺城先登授管軍總管􅁇陞統軍元帥攻圍常州身犯矢石晝夜不解衣甲爲生蟣蝨九閱月城始下被賞優渥載調克宣州江隂宜興婺州安慶衢州􅀔劇破竹壬寅分兵之江西南昌得其全城癸卯八月進克鄱陽彭蠡之戰海艘駢進戒嚴所部人百其勇陳反諒計蹙中流矢死人知天命有歸矣甲辰春侍上親征湖廣武昌洒血馳戰多所斬獲用屢功擢鷹揚衛指揮使簡任上心俾從中山王㧞廬州㧞安豐率先陷陣大敗姑蘇張士誠爲之奪氣其乎襄陽下衡州定灃州辰州轉而鞣高郵踣淮安截㧞淛西湖州坐困姑蘇徃徃褁瘡力戰中山王以公之勇功聞陞鎭國上將軍大都督府僉都督吴二年正月改洪武元年上卽位有事關陜命領其軍進討中原搤守潼關三年獻一迹不敢南移戍鞏昌招摩逋殘嚴戢部曲西戎羗夷兩境帖然進封鞏昌侯方倚之永鎭西垂而溘先朝露薨于家矣上爲之震悼輟朝三日賻贈有加追封陜國公謚宣武以洪武十七年冬十有二月日塟聚寳山之原曾祖考某贈鎭國上將軍僉大都督府事護國追封光山縣子妣某氏從封光山縣子夫人祖考某贈驃騎將軍都指揮使追封汾陽伯妣趙氏從封汾陽伯夫人考某贈榮祿大夫同知大都督府事柱國追封鞏昌侯妣單氏從封鞏昌侯夫人配汪氏封鞏昌侯夫人皆由公貴貤恩子男四人長景儀卒于五閫次振次宗次官僧公生以某年某月某日薨以某年某月某日壽五十有四惟公自開國以來從龍上下盡瘁所事所至以英勇聞是故攻無不克􅀾無不勝視轉萬里之逺歴歲之乆􅀂堂奥之朝夕焉雖鋒矢交集飢渴不時咸不避䘏必盪殱渠兇歸報終事乃已其依日月之光仗雷霆之威以恢拓疆宇勒勛西垂者亦人傑也哉詞臣揚厲為職是宜有銘詞曰聖皇受命龍興鳯陽戡定禍乱經略封疆篤生武臣先後相望維陜􅀦公實生帝鄕沈鷙其勇鐵石其剛乗風雲㑹依日月光旌麾所指敵摧鋒芒底定東南載戢戎羗萬里之逺如在室堂生前封侯式是鞏昌身後封公亦此西方聚寳之原不食之岡佳城鬱鬱公所固藏詞臣載筆徳音靡忘子孫善保奕丗流芳大明左柱國信國公贈東甌王謚㐮武神道碑銘方希古洪武三十一年九月壬辰皇帝御奉天門故東甌㐮武王之孫昱頓首言曰先臣和没已三年墓道之碑巳具而未有刻文惟陛下憫之俾史臣有述焉制曰可臣昱至翰林以文爲請臣謹以其事聞有詔俾為之銘臣乃言曰昔元徳旣衰天下大乱我太祖高皇帝以神武明聖之資哀生民之無􅇳奮􅃑一麾四方響應芟夷􅆫盗蕩滌兇奸十餘年間遂濟大業雖曰天命所屬不以智力然猛􅀅名臣之勛著于王室有可徵者昔王之歸鳯陽新苐也高皇帝有餞賜之勑其薨也有祭誄之文帝自謂與王同受知滁陽稱其智勇過人命勒石以紀劳績聖情􅀷厚矣今陛下不遺舊而賜銘其碑以寵綏湯氏實行高皇帝之遺志臣執筆從太史後何敢卒讓謹按故開國輔運推誠宣力武臣特進光祿大夫左都督左柱國議軍國事信國公追謚襄武封東甌王姓湯氏諱和字鼎臣世居鳯陽縣之東湖里曾祖五一府君祖六一府君皆以王貴追封信國公考七一府君贈特進光祿大夫右都督左柱國追封信國公曾祖妣某氏祖妣周氏妣謝氏俱封信國夫人王幼喪二親卓越有奇志嬉戯常習騎射指使群兒父老異之及長身長七尺倜儻饒智略元至正間豪傑多起兵據郡縣王亦思自奮㧞以取富貴壬辰歲聞滁陽王據濠兵􅀔強率所厚壯士千餘人仗劒從之滁陽王奇王驍勇置之麾下使從諸將略地毎在前行命爲百戸取九灣攻濠之定遠得兵千五百人擢爲千戸時高皇帝處滁陽王甥舘王委心推奉率兵從大洪山寨得兵八百陞長萬夫復從攻滁州其守帥以功多授管軍總管招集士卒益衆又明年甲午帝自取和州諸將多滁陽王舊部曲頋望未盡効臣禮惟王以所領兵聽命甚謹帝心嘉焉會義兵元帥陳也先復攻和州王與將士擊走之乙未六月帝渡江下采石定太平王獲敵馬三百士卒稱是旣而也先與其將康將軍水陸分道宼城王繫其水軍矢中左臂怒氣益奮中山王徐公達寧河王鄧公愈帥師由東門轉戰城北破其歩軍遂生擒也先以獻王分兵取溧水句容克而守之丙申帝定建業三月王偕中山王取鎭江一日克其城兵不血刃陞統兵元帥復同中山王取金壇及富莊七月轉同僉樞密院事丁酉三月克常州奉命鎭守其地攻取江隂明年僞吳張土誠兵宼常州王力戰却之擒其卒三百十月復來宼俘甲土千餘舟數十艘馬數十匹賊􅀔爲之少沮壬寅偕中山王攻無錫癸卯大破士誠兵于楊山斬其梟將獲甲首五百級逐其别將莫將軍虜其妻子以還拜中書左丞甲辰士誠弟僞丞相士信宼圍長興王率歩將吳福興會開平王常公遇春軍合戰士信大敗而退超遷中書平章乙巳擊江西劇盗姚大膽斬之遂取永新州戮僞左丞周安等籍士馬歸于京師仍出守常州丙午帝命諸將伐士誠略大湖營于舊舘降僞將吕左丞等虜其兵二千馬八十匹轉戰湖州守將張右丞降進擊吳江州將不能格亦降遂薄姑蘇圍之明年丁未爲吳元年九月中山開平與王益督兵力戰卒平姑蘇縳士誠以歸三吳悉定除御史大夫兼太子諭德階榮禄大夫時方谷珍據溫台慶元三郡與士誠比境聞士誠敗固巳震恐王督諸軍征之谷珍惧乗大舶迯匿海島中王遣人持書喻以國家威德谷珍卽率昆弟子姪待罪軍門得兵械舟檝以萬計所至不擾王之功居多乗勝下福州戊申帝卽大位改元洪武王略定閩中諸郡至延平王帥陳友定怙險橫甚令其副出城降觀望持兩端王虜之以歸東南海上晏然是歲九月帝幸汴梁王實扈從旣而與宋國公馮勝取懷慶澤潞晉絳二年同中山王㧞河中渡河入潼關趨鳯翔越六盤關隴皆平明年與中山王宋國公至定西襲元將擴濶帖木兒營西北取寧夏至察罕腦兒獲其猛將虎陳定東勝大同宣府皆以勞先諸將九月還京師論功行賞錫以鐵劵封中山侯號開國輔運宣力武臣階榮祿大夫勳柱國祿一千五百石明玉珍乗中國亂􅆫號四川以重慶爲都玉珍死其子昇立四年詔王及德慶侯廖永忠統諸將征之昇鎻瞿塘峽以遏舟師王以計敗之水陸竝進􅀡擣僞都昇不能支率其臣屬奉金寳以降五年同中山王北征窮追和林明年甓通州外郛八年移鎭彰德甓其城是冬追元逋臣伯顔帖木兒于察罕腦兒獲馬牛羊無筭十年正月元日帝念王之功加號推誠位特進階爲光祿大夫職爲左都督勳爲左柱國爵爲公國于信俾議軍國事加祿至三千石仍賜鐵劵王益恭畏不自驕盈繼與􅄮陽王李公文忠練卒于鳯陽鳯陽濠之賜名也明年廵撫西河州繕完其城郭營舍十四年偕中山王北伐下灰山擒其平章别里哥及樞密副使乆通又明年詔至四川永寧治墉濠飭士馬十八年五開山僚爲亂王帥師討之夷其窟穴俘戮四萬人及入朝王以春秋高思歸故鄕從容乞骸骨群公次第以爲言帝喜之賜寳鈔五萬俾造第宅於鳯陽而謂王曰日本小夷屢擾東海上卿錐老強爲朕行視要割地築城增戍以固守備王築海上數十城民四丁取其一爲兵以守之二十一年新第以成告率妻子陛辭賜白金以兩計者二千黄金以兩計者三百鈔以緡計者一萬五千文綺四十端信卽夫人胡氏亦賜金錢文綺甚厚俱降手敕褒嘉之二十三年元旦朝于京師忽􅀍末疾且失音不能言帝聞之大驚卽命駕臨視嘆惋乆之遣歸故里十月詔王之子將命召至邸賜以安車入殿廷燕勞備至復厚賚俾歸以俟有瘳二十七年王疾彌甚不能興帝思見之特詔輿入覲手爲摩撫語及􅃇勞對之雪涕賜鈔六百五十緡預爲塋塟之資二十八年八月七日薨於里第之正寢至是年七十矣訃聞帝感悼爲之不御朝者三日追封定謚親爲文授使者以祭命親王咸瀢祭于其家棺椁明器􅃁壙皆官爲之以是年十一月十二日塟于縣曹山之原詔肖像于功臣祠配饗於太廟祥禪必賜祭高皇帝禮遇功臣加恩于王恩禮之隆時莫與比夫人有婦德明詔稱其賢子五人曰鼎署前軍都督府僉事曰軏太原中護衛鎭撫曰鼐曰爕皆早卒曰醴同知左軍都督府階榮祿大夫將兵征五開卒于軍女五人長適德侯廖權次爲魯王妃次適萬泉衛指揮俞鼎次􅃴景東衛指揮頼鎭之子溶次適楚雄衛指揮袁義之子興孫男十一人曰昱暹昇晟朂景昇昺旻昊曅晟其嫡也孫女四人曾孫男一人女二人皆幼王沉毅質􅀡勇面善斷不妄發言入聞國論一語不泄于左右行師受任有詔卽行不少顧家臨敵果敢堅忍未嘗挫衂有語及兵書者輙咲曰臨陣决機在智識敏達耳何以泥古爲家蓄妾媵百餘暮年皆資遣寧家得賞賜多惠鄉黨父老及􅀌貧無告者貴任公宰及歸田里見故交遺民意驩如也厥後群公多先物故而王獨享壽考以令名終斯固保身之有道而始終不倦可謂盛也已今陛下追惟創業之艱顕􅀭刻銘使播不朽豈獨蓋覆湯氏之子孫蓋以昭掦先帝之功德而垂萬世也是用備著其事而献銘曰於昭上帝視下孔仁降聖儲才相慈兆民民之顚隮俾聖康之復俾賢臣佐而襄之有元旣衰天厭其亂督生高皇拯綏大難龍奮于濳八極晦㝠英傑如雲翼之以升惟東甌王旣智且武灼知天命早識眞王衆方夢夢未决所從獨断不疑委身效忠臣或擇君杖策千里生于帝鄉其祉孰似寳劒彫戈折衝四方如虎如貔驅彼犬羊披淮濟江以作京邑京邑旣成皇業乃集東遏僞吳坐鎭毗陵不騫不傾仗義爲城帝德日宣遠懐邇服王率之行􅀔􅀂破竹旣平姑蘇元惡就誅威鎭東南曁于海隅乃淸關隴乃平幽冀萬􅀖來同獻其琛貝帝曰念哉劬我元勛爰啓土疆流慶後毘中山建侯遂公大國招冠金劵綉裳赤舄海字晏寧變夷爲華民休田閭榖粟絲麻王亦白髪燕嬉甲第伊誰致之天子之賜天子有詔共樂太平文錦兼金侑以百朋內曁夫人亦受寵錫璽書爛然觀者動色天實生才股肱聖皇豐其茀祿俾之夀康夀考令終孰與之同天子之門式勸有功没登王封從饗宗廟始卒無瑕其忠有耀昭哉大明如日麗天載焯鴻勛以訓萬年皇明文衡卷之七十四
