  text: 皇明文衡卷之三十一
  hash: sha256:b12207a039b6116489be5cf374768dbf4b839c7c40e9c970528ca6e3ac3fc6f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_031-1a}
body:
  text: 記逰三門記王翰三門集津在平陸縣治東六十里道由東西延至黃堆循河東下再行十里至其處河南山􅆃峻下其尾屬於北山鑿山作三門以通河流南者爲􅀑門中爲人門次北爲神門又次北及開元新開河又以中爲夜义門北爲金門新開河爲公主河未詳其說也􅀑門迫窄水勢極峻急人門水稍平緩􅀡東可十五歩中流有小山乃其底柱也東又十歩其水營廻謂之海眼深不可測神門最修廣水安妥蓋唐宋漕運之道山嵓上有閣道且牽泐石深尺許正南下五十歩有石聳起側視若香爐然東又三十歩一峯可高數丈不甚奇新開河南北廣約計二丈其岸石如甃又􅀡如繩取者行百餘歩與神門水合其南一峯壁立度二百尺許極竒秀石紋青黃相雜其巓多鵠鸛巢壘石爲爐形非飛舉者不可至不知其始有人謂老君煉丹爐蓋以神之也新開河左就嵓石下刻宋金人題名幷詩且刻翠隂禹功二嵓稍東刻忠孝清愼四字字畫􅀂顔魯公書者其南山上有石巉然如鴟蹲者人號爲掛鼓石蓋禹用以節時齊力也自新開河東口渉水上山上舊有開化寺今不存有小祠象龍神者前碑剝落不可模不知何時立祠檐下二石其狀如碑無字上作三竅一碑蓋金源興定十二年脩禹廟之記也回至西可二里上山謁禹廟而還所至處皆用小律詩記之偕行者生員張恭馬喜王興也時洪武十七年二月二十八日記古愚齋記劉永之臨江貳守韋侯彥芳其系出於漢丞相昭由丞相四十七傳而至茂今家潤州雲陽爲其邑之著姓出郭門若干里地曰壽安有别墅者侯之所建也蓋甞讀書其中而題其齋居曰古愚其至官也手書其事以遺永之而求文以爲記旣受命乃爲之說曰言非一端而已卽其言而知其志之所存所謂知言也蓋是今而非古乆矣有行古道於今之世者必且群起而訾之曰是好古而愚者也夫古之道豈誠然乎哉亦失其好惡之情焉耳方周之衰天下蓋巳弊矣􅁇之以強暴之秦盡去先王之典而用其一切之法使其靡靡然􅆷其仁厚之性而從事於貪殘刻薄變詐之行於是是非好惡顚倒錯謬一反其情以至於大壞極亂不可救遏而秦用以亡自是而後其流風末俗浸淫演漫於天下者千有餘年於今其間雖有願治之君善輔之臣凡所建立皆因仍苟簡以爲當世之計率不越数十百年法弊禁弛則又徃徃至於大壞極亂不可救遏若秦之事然漢唐以來曁可覩巳當其壞亂之際雖學士大夫猶或不識義理之正况世俗之凡民乎其喜浮而惡質非古而是今無足異也惟其理亂興廢之由恒在於是而未有深慮遠圖而桭之者豈其沉酗没溺之乆而終不可爲邪無豪傑特起之士而不能變化鼓舞作興之也所謂豪傑特起之士者必能窮天下之理通天下之情識天下之變而其於道也知之明信之篤行之果而不惑於流俗者也今侯以高明之資當天下壞亂之時躬行古道不頋流俗之是非因取其所常􅀍毁者以自名而見其意及遭逄聖朝起而從政又能不以窮逹易節而勤勤然欲托於文字惟恐其弗及如此豈非篤於自信而庻幾其人者與然則變化鼓舞而作興天下之民固其志之所存矣孔子曰斯民也三代之所以􅀡道而行也謂其不可興起者不知道者也謂侯之志不在於是者不知人者也故述而記之以俟知道與知侯者考焉獨善山房記古之學者爲已而已及其至也則思推其有諸已者以及乎民焉將推其有諸已者以及乎民則非得其位而施之政不可故仕而逹者君子之所甚欲也非欲其仕而逹也欲其有諸已者及乎民也然學而有諸己者必自貴而不徇於外故其交也有禮其進也有義必人卽之而不卽乎人也必世求之而不求乎世也交之以禮矣進之以義矣人卽之而世求之矣又必度其時之可爲道之可行然後起而從之是數者一或不然則三公之貴千駟之富視之猶弊屦焉􅂚足以動其心哉其難進寡合如此而有天下國家者方懸其爵禄以招天下之士有司者敖然持其權衡尺寸秤度而進退之幸而合其程式然後授之以職臨之以賞罰使之促促然唯上令之是聽其取士用人之法如此然而自公卿以下至於百執事之位未甞乏人焉於是上之人自以爲其術果足以籠天下之士馭天下之才而爲天下之政矣又何必弊弊然求彼之難進寡合者爲哉盖自三代而下山林巖穴之士懐其道德才藝􅀷蔵不售而没齒貧賤者衆矣然其人皆浩然有以自樂未嘗或之悔也而論者以爲孟氏所謂逹則兼善天下窮則獨善其身而異端叛逃之民果於遺世者不可同日而語焉友人柯同德儒者也世居屏山之下自其祖父隱德不耀數世矣其家之所傳以爲學者皆内而弗外爲己者也而同徳之爲人善論議有氣節􅀹能應變吾甞與之共處憂患知其學之有守而才之足以有爲也惟其自貴而不徇於外也故不爲時之所知崎嶇連蹇至於窮且老矣終不肯少變其操而其心浩然有以自樂而無悔於是取孟氏之言名其室曰獨善山房而屬余爲文以記之余既惜其才之可用而莫用又喜其能自貴而不徇於外幾於古之學者而合乎孟氏之所云遂􅄒其所聞以爲之記知止齋記錢宰八年冬詔天下士凡􅀉跡佛老而有志于聖賢之學者入國子學俾習知天理民􅃔然後授之政焉余助敎庠舎間因􅀗與諸茂異交間過尊經閣訪黃君伯厚于東叙伯厚扁其齋居曰知止噫伯厚逃佛而歸于儒不半載而知所止矣何其化之速邪今朝廷武功旣成誕脩文敎示之以綱常道之以道德化之以禮樂禁之以刑政將使天下之士皆知堯舜禹湯文武周公孔子之道將使天下之民皆􅀍堯舜禹湯文武周公孔子之化以世之學佛老者徃徃多聰明識道理俾務于學去其虚而實踐變其寂而有爲黜其偏而歸于中正猶反手耳然而堯舜禹湯文武周公孔子以大中至正之道化天下後世俾脩諸身措諸事業莫不各有所止之地也是故冠尔以章甫使知首之所止焉衣尔以逄披使知身之所止焉正尔以夫婦復尔以父子明尔以君臣使知心之所止焉伯厚於是乎玄冠綦纓俯仰後先以正其容貌以齊其顔色垂紳委佩周旋抑揚以敬其儀刑以愼其進趨入其室則夫夫婦婦怡然乎其和樂而有别也陞其堂則父父子子僾然乎其慈孝而有親也出而仕于朝則君君臣臣秩然乎其明良之際會而有義也伯厚方且見之躬行矣其視前日祝髪毀形㓕性離倫違世獨立而高出物外者夫豈伯厚之所止邪嗟夫北辰之止于天也不偏也流水之止于海也不息也心猶辰也靜而不偏則所止者正矣心猶水也動而不息則所止者至矣伯厚尚無惑於偏無怠以息庻幾終始愼其所止哉新建耐牢坡石閘記劉大昕大明受命皇帝卽位之元年詔遣大將軍信國公鄂國公總率羽林諸衛師旅億萬戰艦百千定山東平幽冀兵不血刄而梁晉關陜大小郡邑悉皆附順分兵戍以守阨塞浚河梁以逸遭度舳艫千里魚貫蟬聯貢賦供需有程無阻後以黃河變易濟寧之南陽西曁周村涯淤窒壅數壞舟楫廼遵師莊石佛諸閘北沂汶濟以逹燕冀西循曹鄆以抵梁晉濟寧州城西二十里許耐牢坡口者實西北分路之會坡有堤綿數十里以防河决於是時遂開通焉倘失啓閉水勢散泄漕度愆期深爲職守憂洪武二年申請于山東行省注官分任其事南䟽北導靡所寧處冬十一月省檄下委大昕相宜置閘以爲歳乆計十二月朔同寅知府余芳通判胡處謙集議率任城簿周允曁提領郭祥至於河上視其舊口則土崩流悍不可卽功行視口之北幾一里許平􅄛水匯可立基焉乃伐石轉木度工改作時冰凍暫止三年二月二日集衆材合役下夷土堤平水洚八尺以爲基樹以􅀥栗宻如星布實以瓦甓逈若砥平然後鋪張木枋敷嵌石板爰琢爰甃犬牙相入復固以􅁅膠􅀜以鐡錠磨礱剷削混然天成閘門東西廣十六尺有五寸崇十尺一寸西北比東西廣加二尺焉閘之北東向有墉縱二十二尺西向墉縱一十五尺有奇閘之南稱是翼如也所以捍水之洄洑衝薄也雨門之中鑿渠五寸下貫萬年枋以立懸板復於閘之南北决去壅土以殺悍湍且濟舟以轉折入閘自兹啓閉有常舟行如素三月二十日告成訖功計興工至休役凡五十日以工計石工二十九人木工四人金工二人徒四百五十人以材計木一千三百有三枋五十甓大小七百八十有四鐵錠一百毎錠斤重六斤四兩鐵斤重二百五十五木炭斤重一千五百四十二石􅁅斤重六千三百四十四工之食粟八石零七升若鐵粟則取給於官餘悉因沂兖二州任城滕鄆諸縣土地所有規措給用雖少勞於民而民樂於趨事不費於官而官亦易以成功此大較也大昕雖董是役而主簿周允晨夕陳力勤敏不怠其功其勞不可盖也遂具載本末于石以垂永乆焉蜀山書舎記高啓蜀山書舎者友人徐君㓜文肄學之所也㓜文甞自呉興以書抵予曰吾山在城東若干里吾屋在山􅀂干楹吾書在屋若干卷山雖小而甚美屋雖朴而麄完書雖不多而足以備閱吾􅀅於是卒業焉子幸爲我記之子惟古之君子所取以成其學者無常物所居以致其學者無常地也故弁裳之於容珩瑀之於歩豆籩之於陳琴瑟之於樂􅃓矢車馬之於服度量權衡之於用凡於物皆學也豈專於六籍之内哉徃于田入于市處于戸庭覽于山川立于宗廟朝廷逰于庠序軍旅凡履之地皆學也豈限於一室之間哉後世講學之道旣廢而人之不能然也有志者殆各占山水之勝築廬聚書而讀之雖其所以學之者異乎古然凡事物之理與夫羣聖賢修已治人之要實皆不出於書况安僻阻之區絶紛􅅝之役得一肆其力於是則其至於成就豈不反有易者哉今㓜文以方壯之齒有可用之材而不急進取益務於學以求其所未至豈非有志之士哉而予也北郭之野有土東里之第有書皆先人之遺也遭時多艱茀穢於榛蕪殘壞於塵蠧倀倀焉日事奔走而不知返則其荒陋宜有愧於㓜文矣尚能為是記乎然而書此而不辭者蓋姑復㓜文之請亦因以自厲焉松陽縣學復射圃記蘇伯衡松陽之有學學之有射圃蓋自宋紹興始元之制凡民不得持弓矢故射息而圃亦廢豪右因侵而有之踰八十年有司漫不加省皇帝卽位之明年詔郡縣皆興學置師弟子員而講習乎六藝儒生葉端等作而言曰今學令射居其一射圃之復維其時矣以告令玉君會王君微赴京師事格不行而提刑按察僉事張公行縣適至乃復以告公爲按圖籍凡學之地侵于民者責丞李君仙簿劉君文彬悉復之而地卒以歸正其疆界夷其畛域樹垣以繚之王君歸自京師謂部使者祗承德意返故地於乆攘之後幸惠斯文甚厚宜有以示後人敎諭毛君煇膺薦而起遂命之來謁文書曰侯以明之此舜之學政也其人之賢不賢觀其射之中不中見焉故以射􅃱衆衆􅃱而後論士是以三代率由之而孔子射於矍相之圃觀者如堵使弟子揚觶而􅃱黜者三則僅有存者夫學政莫大於射也尚矣國家方修文敎而稽古定制焉則射圃之復其豈細故哉乃爲之記曰復地以尺計之􅀡學之東南則從七十衡五十􅀡東北則盆其從二之一去其衡三之一􅀡西北則其從倍東北之三其衡不及東南之八􅀡西南則其從得東南之衡而去其一以爲其衡東南故所謂射圃也張公名志徳字某陜西人王君名􅃔字秉文北平人煇邑人攝學事殆一紀士論多之云川上書堂記金君自明家平陽之南郭其居第在濠之滣不踰閾而川流可挹也自明隱居敎授間以臨以觀而心有契焉因以川上名其書堂而求余記之嗟夫昔者聖人之在川上所爲歎夫水者不在水也在乎道也而余於道猶望洋焉則自明之所以名堂者余安能言之雖然道固未易窺也而川上之流水則有足徴者矣一日有旦有中有昃有夜而水之流也自旦至夜未甞息焉一月有朔有弦有望有晦而水之流也自朔至晦未甞息焉一歳有春有夏有秋有冬而水之流也自春至冬未甞息焉非特歳月日然也流乎千萬年之先而不見其始焉流乎千萬年之後而不見其終焉豈獨水哉於是觀諸日月西者没而東者生於是觀諸隂陽上者剥而下者復於是觀諸草木榮者悴而區者申於是觀諸鳥獸孳者革而毨者􅩝亦猶水之前者逝而後者續也嗟乎何以然乎曰出於氣乎氣不自神也曰出於機乎機不自運也則何以然乎詎不聞乎維天之命於穆不已此天之所以爲天也天命不巳故命于天而形於兩間者亦不已微之爲草木鳥獸且猶然而况於人乎人之於天也其氣同也其理同也天地之初有理斯有氣有氣斯有形氣宰乎形理宰乎氣是故天地以氣爲槖籥焉以理爲樞紐焉而人之所以爲槖籥爲樞紐者亦惟氣惟理焉爾氣之在人也榮衛之周流呼吸之出入無不同乎天也而况於理乎理者何性而已矣性之在人也無徃不體無時不然者何誠而巳矣故曰誠者天之道也夫惟聖人克誠安得人人而聖哉古之君子不睹亦戒不聞亦愼發乎巳之所自知行乎人之所不見亦謹焉者所以立其誠而全在我之天也獨之不謹則有時而息矣有時而息則誠之不至矣誠之不至則無以與天一矣而人也曽水之不如矣嗟夫有志於道者可不謹乎哉由君子之學進于聖賢之道余未之能焉抑不敢不勉也竊喜自明之有志輙相與言之倘有取於是則請以爲川上書堂記節義堂記處州衞知事魏君以節義名其堂使來請曰自吾有堂堂有斯名亦已乆矣然未有發其義爲吾記之者敢屬筆焉余聞魏君家梁溪梁溪於毘陵爲勝地九龍之山天下第二泉在焉魏君作堂其間不以觀逰爲羙而以節義自脩亦可以見其志矣乃記之曰節義之立不立豈惟君子鄙夫所由判國家治亂安危亦恒由之何以知其然也士之出于三代之際者養之有學校淑之有敎化莫不篤於道周於德有過人之節取予辤受出處必以其義得失利害禍福不動其心殺之可也辱之可也飢之可也寒之可也爵之以五等之國富之以萬鍾之粟臨之以三軍之威使易其所守而胥爲不善不可也夫如是故可以共逸樂而亦可與同患難三代之所以長治乆安其豈不由此也歟厥後惟東漢諸君子無愧焉自元興以降宦寺專政挾天子威權以薫灼海内紀綱於是大壞矣而當時君子其在位者則抗志羣小之間不少屈意以迎合附麗至於羅織鈞黨之獄起而其節操愈堅其在野者則聞風慕義慷􅁣奮激棄家族骨肉相勉趨死而不悔夫如是故終漢之世不􅁤之徒懷篡奪者後先相望皆忌憚而不敢􅀡遂而漢之社稷危而不遂亡者寔頼之也然則節義之所係豈細也哉近世學校不脩敎化不行士鮮不爲習俗所移放其邪心役於外物區區貴富何足爲輕重而求之者隳名節捐禮義不顧性命而惟恐不得僥倖得之姁姁以爲容詹詹以爲悅汲汲保身固位以爲務平居莫肯􅀡道以事上緩急遂至鬻國而叛君若是者雖曰累千百何益於人國家哉聖天子知節義與國家相與有無創業之初庻事未遑而獨於前朝仗節蹈義之臣或優以體貌或寵以褒贈或列諸秩祀或錄其子孫以示風厲丕變爾來垂兩紀矣雖朝廷淸明四方無虞士大夫幸而享富貴之樂不踐患難之途無由以奇節高義自見而豈可不力也哉忘其􅀔而取舎不悖忘人之勢而特立不懼招之不來而麾之不去斯何莫非節義也豈必見危授命殺身成仁而後爲節爲義哉故􅀚魏君之名堂非所謂有志者乎雖然人之所恃以斡旋萬變者氣而巳有以養之則細入芒忽而不爲歉大塞天地而不爲盈不以困抑摧挫而亡不以安富尊榮而存蓋有以爲氣之主也故隨其所遇而皆安投其鄉而如意衆人之於是氣也無物爲之主而反聽命焉如䘮將之兵如朝霧之氣如暴雷迅􅀨之涌水其始也非不可畏而可悅假之斯須之時則已潰散消涸而不見其迹矣未有處大事臨大節而不顚倒失措者由其爲氣所使而莫爲之主故也均之是氣也有所養者爲正氣無所養者爲虚氣惟氣之正者浩然剛大不變於物持虚氣以處夫紛紜之變其不變於物乎有志於名節者苟不明道集義以養其中而惟用虚氣求有所􅀣立非余之所知也願與魏君勉焉南華謫居圖記洪武元年夏國子祭酒許先生謫韶州卽唐宰相張文獻公祠以居祠在州城之北而城南有山曰南華􅀡乎祠之前其岡巒起伏草木行列朝霏夕靄不出戸域可以盡得之先生著書閒暇時時臨眺而樂焉曰使吾爲此州人奚其不可也於是南華逸人且屬龍虎山道士方壺子繪之縑素云初上行幸金華訪求文懿公之後得先生召之見未至而乗輿還京師驛召先生赴京師一見與語大說爲立京學命爲敎授鑄印使佩之仍命入傅皇太子及諸王巳而改京學爲國子學拜􅀶士未幾陞正四品拜祭酒出入兩宫且垂十年自稽古禮文之事至于人材之進退時政之弛張無不預議先生感奮圖報是是非非無所顧忌所爲學校脩廢舉墜更規設法以敎養者數十事無不施行其見知於上者至矣然亦不勝夫人之媢嫉也㑹先生嘗以學宫什噐用之􅀻室言路因以移用官物坐之章入上覽之而咲而媒孽先生者不巳於是韶州之命行矣夫以文學侍從之賢一旦以㣲言而遠謫嶺海間去親戚而伍夷獠人將不勝其戚戚先生不惟不戚戚且安而樂焉觀其自號有終焉之志此其學問之過人爲何如蓋君子求在我者而巳矣使其中有所愧何徃而能安使其中無所愧何徃而不安是以吾祖文忠公之安置惠州自言譬如元是惠州秀才累舉不第北歸之望巳絶方自肆於山水之間惟日不足何曾以謫爲意也今先生之志豈不猶之吾祖哉不然蠻􅀖窮裔連山複壁蛇蟲之所潛瘴癘之所聚此羈人遷客之所以悲思無聊而不勝者又何足樂也余故著先生出處之故覽斯圖者得以考焉棲雲軒記汪仲魯自予再來郡城馬生良德稱輙舘予于城東新構之軒病卧若素安焉生請軒名應曰棲雲生又請記則又應曰吾老且病忘乎軒矣奚記焉雖然病者吾身也身吾身者初未病也且吾胡爲而來也又胡爲而止也亦甞觀諸雲乎何思何爲浮㳺太虚薄日月而翳光景雨下土而澤萬物迨其歸而棲也倐焉歛蔵不見蹤跡孰使然哉靜無而動有者也今生逍遥乎人世隨􅂩地而構斯軒岡阜環列靜安有常澗泉細流淸泠自在與人若相得也吾之來而由乎是而止乎是與生夙相契也雲乎天逰人乎雲卧吾何知也吾何爲也而亦無不知且爲也况吾與生是非利害相忘乆矣靡存於中靡形於外而又奚記焉德稱黙識吾言命其友書于軒中以爲記皇明文衡卷之三十一
