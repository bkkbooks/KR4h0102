  text: 皇明文衡卷之八十五
  hash: sha256:af1cee31db9f0ca7182eeeb92212dd1fa45bffd12a94a37c479e80a234c21485
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_085-1a}
body:
  text: 墓誌銘國子􅀕酒宋公墓誌劉三吾國子祭酒宋光生卒旣徃哭弔居數日愽士吳守德持學正朱惟嘉所狀先生行實來曰先生嗣子麟疚在苦次不得跣以請玆將歸窆滑之永寧阡惟輸林兄長吾于先生爲同舍故懇銘焉尚憶走始來時㑹先生于春坊先生曰得母與鎦長吾爲晜弟耶不然何面貌之相似也相與感歎乆之嗚呼先兄以後至元丙子入監周旋十有五年中間纔兩歸江南爾在監舍法以同時爲晜弟以晜弟相知爲世契則走于先生􅃘銘忍不銘按狀先生姓宋氏諱訥字仲敏世本衞之山陽人後徙滑家焉兩世繇貤恩贈嘉議大夫禮部尚書上􅀸車都尉追封京兆郡侯諱德仁其曽祖贈中奉大夫河北江南等處行中書省叅知政事護軍追封京兆郡公諱宣其祖官中奉大夫陜西諸道行御史臺侍御史贈推誠秉義守正功臣通奉大夫江淛等處行中書省叅知政事護軍追封魏郡公謚忠肅諱崇祿其父忠肅在元時􅏡歷中外四十餘年五持憲節逮事七朝豐功盛德所以燾後􅄛慶神道碑紀之悉矣先生濡染家教動以矩彠雅性遲重不妄言􅀏齒貴胄舘以來所師宗工碩儒月開日益卓然有成擢科登仕為時聞人中經繹騷乃􅀍褐懐寳以自韜晦皇明受祚徵詣公車召見次有言動聽洪武之十三年也是冬除國子助教横經發難擊蔀廓塞學者如客得歸嘗同諸儒應制撰敕文􅂌僧道録司領教事者十有六通操筆立成雅稱上意超授翰林學士奉議大夫俄陞文淵閣大學士日見親信有所􅀘拾曾見大學成中外歳貢學徒日夥而職大司成者徃徃巽愞師生相訐教尼不行宸􅂨簡注擢爲祭酒陞朝列大夫以􅁵正前弊上自製誥詞至以尚父興周八百儗之感惟眷遇所以提挈鏟磢不遺餘力師道旣立皇心載寕乙丑戊辰兩科得士大率三天下之二而龍頭魁選恒在太學大被賞遇一日有疾上遣中使􅃱諭其畧曰􅀸禀天命之性發仲尼之誠施巳之幽德􅁱道教人所以病不病而速差以其有神也天章下賁光輝儒紳恒謂祭酒骨格必壽適有畫工至命繪其像肖焉喜溢天表然終老之以其子麟主望江簿特勑召之還俾便侍養其􅀍遇􅄖渥􅀋此方倚之以棟梁我道楷式諸生也不謂得疾旬日遽不可起病也尚醫來治卒也遣官致祭其文悉上所自製故事文臣四品無給喪費者曠典之舉昉自先生斯皆異數也居甞寢食恒在廂房未始一宿于家及是疾革麟等託諸監官懇請其還厲聲曰是何風雲􅂔少兒女情多况在丁社兩􅀕齋戒中耶至是祭畢乃就舁歸一不口及家事及家􅂔絶焉二月之三日昏暮時也嗚呼先生以八袠之年當易簀之際而風雲爲􅂔不少衰丁社兩祀始終齋戒是持非其平日操存有素詎能方寸不乱􅀂此哉可謂眞大丈夫矣最其平生所裒集先丗碑銘傳紀曰紀德録一集所自著述曰西隱集文十七卷旣號西隱復別號所居別業曰白雲茅屋自法書名畫外他無所嗜好中朝名鉅詩若文讀一二過輙能記憶不减少時今皆已矣生以元至大辛亥十二月四日卒以今洪武二十三年春壽八十配康氏先卒子三人長衎祖卽麟擢進士苐拜􅁥察御史出主望江薄次復祖鄊邑訓導次安祖女一人在室孫男三恕慧懋女孫四所適其人長郭謹次陳惟新次李均一在室曽孫男女各二皆幼臨發柩時上再遣祭舟車之費一出于官可謂主榮死哀也巳銘曰銅臺世家忠肅公挺生賢嗣遭時雍身逢堯舜接䕫龍代言文淵掌辟廱感惟皇上倚注隆率先條約自其躬凨雲􅂔槩氷霜容敎行六舘諸生從金石文章錦綉􅅐蔚爲海内諸儒宗譽髦多士振文凨棟梁我道伊誰功夫何一疾遽告終至尊爲之惻淵􅂨命醫與祭恩禮豐年登八袠數始窮歸竁祖塋得幽宫銘阡者誰靑藜翁子孫丗丗其吉逢王紹汶墓誌銘劉夏洪武二年七月余受命尚書來河南陜西兩省訪求前元庚申皇帝天下州縣三十六年入史事跡其在河南置局武成廟之側浙東士大夫王應璧見訪爲言其先祖紹汶字思齊生當宋末元􅀄之際貌奇古美髭髯聲音琅然聞于堂室家小嶼溪水環其屋壁門前松枝壓逕梅竹緣坡又雜蒔蘭鞠凨至則左右紛披有名帖千卷書萬卷峩冠太䄂口課倍誦五經又旁通百氏之書下筆千餘言立就及聞里中有大役則奮袂而興或造公府不避是非利害必侯衆議歸於公正乃巳臨終力疾書曰利人之事可周旋處雖獨力亦當自爲害人之事於戯謔中雖一念不可妄發又書曰曉夜讀書閑暇治家皆令刻板以垂示子孫娶陳氏子師古與泰女三皆嫁士人孫三公培應璧公恕享年八十有六余聞應璧之言矍然而嘆曰斯人也是乃蓄德君子冝有後者也富貴功名旣不在其人之身則在其子與孫矣徐考之應璧其子名師古者有猷爲有執守文學議論幾冠儒林然不肯仕其孫名應璧者十八歳游幽京歷仕至廣州總管推恩封贈紹汶中順大夫江浙等處行中書省理問官上騎都尉追封天台郡伯嗚呼爲善無不報要於乆而後信􅀚王氏祖子孫三代豈不固然與銘曰炎炎者􅀔翕翁者利閭閻崛起朝躋夕替所以古之公族大夫必尚論其世也許士脩墓銘方希古天台方孝孺有篤志尚德之友曰許君繼字士脩言必出乎正動必由乎禮趨舎取予咸則乎古之君子而無所茍其精思力學以求道德性命之藴汲汲􅀂或失之而有得乎心沛然以樂不以貧賤患難惑其志余取友二十年所交海內知名之士甚衆考其所存莫有􅀋吾士脩者蓋其操志勇目守介所期者遠而務踐乎事所造者􅀷而其心欿焉如未有得使假以壽年其所志當卓絶過人而年僅三十有七而卒烏呼此豈特斯人之不幸耶士脩之先汴人其六世祖景元宋高宗時爲台州敎授遂家焉後徙寧海爲寧海人高祖文正曾祖彬祖光父琳皆業儒而不仕士脩質高明自爲兒童巳有成人之志以學賢哲自勉喜爲詩其高妙處有魏晉人格韻別自號􅀚樂生其詩多道其所樂言暢而旨􅀷非近世人之所及也或傳其􅀚樂九詩至京師翰林學士金華宋公見而嘆賞之以爲不愧古人凡一時名能詩者皆自謂弗及而士脩不自足益刻意經學玩心天人究􅄨􅊥微將大索六藝之緒反之於約以成身致用而病作矣旣病咯咯然嘔血而學不止病凡三年每見心覺其進瀕死精神不亂與人言死生晝夜耳奚足怪談笑而逝嗚呼士脩之於斯道非篤信不惑其能然耶初士脩學於鄕先生王君藴德王君竒之妻以女弟生一子曰籕二女曰忠曰惠王君固名士其弟琦尤與士脩相好士脩以洪武十七年正月二十六日卒琦述其行爲書託予銘予謝曰子兄弟與士脩善銘莫宜焉奚予之求後五年王君仕藩邸死琦亦謫去士脩弟顯將以某年月日塟某山來速銘於是士脩之親友盡矣予尚誰辭銘曰學失其統騖于空言飭外以欺幾忘本源嗚呼士脩志篤行邵惟正之趨非義弗蹈曁曁其守汲汲其求棄遺芬華獨與道謀業雖不終世罕厥似我庸闡微以朂髦士皇明故通奉大夫晉相府右傳桂公墓誌銘并序王景洪武二十年十二月某甲子晉相府右傳桂公卒享年六十又七明年正月某甲子塟于董粤之原循先志也又明年其子愼奉其友韓宜可狀來請銘不獲辭公諱悳稱字彥良以字行從幼不群聞長老道經訓則嗜􅀂醇酎旣冠通經史百家言鏖秋闈中之不得志于南宫歸長包山再長高節皆有文名除平江路文學􅁺不就威􅀌不弦䵷俚荒蠧公以六籍橫騖大肆伸儒遏暴方氏連甌越來辟立謝之聚徒山中嚅嚌道眞雋永聖涯曰吾以待天下之定也皇明天造反刓剗僞一歸于正洪武紀元􅀚風者以名上省憲交辟不起六年大徴天下士行省復以名聞持詔公車厠于数千之列唯公得以白衣錫宴除皇太子正字授承事郎侍講六年顕仁闡義出周入孔興衰治忽敷啓剴切東宫􅀷器之㑹文華堂給事不飭􅃙公啓迪曰昔許魯齋諸生多爲宰輔􅀸其勉之及侍宴以御製勑訂正以聞諮以治道公曰道在心心不正則好惡頗好惡頗則賞罸差賞罸差則太平未有期也是以君人將忿欲是務去明年日南至有事于圓丘以祝文譴主者公曰予小子履湯用于郊我將我享武歌于廟以古率今未足深譴上咲曰􅀸動援經史屢聞獻替稱善乆之甞有以墨敗官者賜死公力諫如律不聽公但曰三尺法當與天下守之上頷之滋欲試以事以三府疑獄命之讞以情原者若干人翰林以失議見呵公奏當取長畧短上曰不然吾因其長而㧞其短以造其全時方以法繩下訪曰法數行而數犯奈何對曰用德則佚用法則勞勞以靖民則民勞而弗靖德以靖民則民靖于德矣他日與林温同侍上曰􅀸何官曰正字上曰􅀸帝者師也其爲上所屬􅀋如此十一年除晉相府右傅授通奉大夫内出勑文以孔孟期之在官責重望尊治出聲生府告無事王益重之政多决焉公謂王者一正心而國定因進心圖以明之十三年革相府改長史授奉政大夫以疾謝詔許之十五年朝京師上太平十二䇿奏報十八年勑歸鄉里五世祖萬榮宋寳章閣學士知常德府高祖某宋宣議郞曾祖康老宋富陽知縣祖俊􅀸贈嘉議大夫浙江鹽運使父與紹贈中奉大夫浙江叅政初公元中書右丞葉文簡公之孫判慶元府同之子也生而室有火光燁如流星以爲不祥出之叅政公子之娶岑氏早世三男子曰抗曰智皆大再娶于陳封夫人至孝持身治家內外井井不以貧疚不以貴驕先公卒享壽五十又七與公同墳異藏生愼及全愼仕爲中書舍人公平生純一見道處官若家尤不以貧富動心仕止進退不亟不紆坦坦施施及與人交命觴詠詩踔厲風出窮日夕不厭人以春風和氣目之其著作有和陶集春和集淸溪集知足集凡若干卷嗚呼甚矣儒道之有禆于世也身用之則榮家國用則寧天下用以平公自結髪戰藝以功名終將何脩而致是哉亦唯道而巳矣嗟乎道之爲用閎矣銘曰不詘而伸其道允藏不檏而文其德不爽天球在序金奏在宫聿諧其施以襮匪躬旣燁其英亦碩其聲有閟其繄後之成戸部尚書郁公墓誌銘解縉永樂三年八月五日户部尚書郁公薨于位上遣官祭以文命工曹具襯輟朝一日顧翰林學士臣縉等歎息稱其才嗚呼公之哀榮始終固可美國家所以待臣庶恩禮之厚尢足以激勸於當世公之子孫豈不永有庇頼歟於是其子彬衰麻踵門泣而􅃱公之治命請予銘其墓噫公與予交二十年未甞爾汝褻狎亦未甞挾長殺敬禮予二人者亦自信爲誠實洪武二十二年予侍講華蓋殿中公始受命爲戸部度支主事賜名新明年改戸部司屬二十三年陞北平部郞中二十四年六月超授嘉議大夫戸部右侍郎考滿上於庭中稱譽擢尚書授資善大夫十三年于兹矣非才而能之乎抑公之盛福其祖考以來積累之慶非偶然而致也公家素饒財慷􅁣豪舉不爲齷齪喜賔客樂於賑窮之不爲德色洪武中奏事庭中被頋問天下戸口漕運地里險易計數時日應機響答無遺謬自謂劉晏以下不論也晚歳多疾乃時在告上甚憐之公亦時自語予吾覺衰老恐旦夕先朝露不能報國恩吾平生無卓異惟君知也幸與之銘其墓紀其榮遇而已嗚呼公非可謂達歟公蘇人也曾祖仲和祖瑜父德字銘本公以至正丙戌正月十四生於吳縣洪武元年祖父遷居鳯陽臨淮縣公隨而家焉公娶嚴氏綜理家政嚴而有緒彬字孟父亦克孝敬公甞屬之予曰他日視之曰余故人之子卽此子之榮也公墓在臨淮古城之原銘曰古天司徒職惇典禮馴擾兆民豈惟㑹計惟公奮身亦以豈弟恂恂怵怵爵祿之器歷官十年先榮後光豈曰其才有德于天豈無人謀不如盛福崇崇其阡臨淮之麓故元同知邵武路蕭公墓誌銘元之季世天下四分五裂其間盗名字者無慮千百計獨閩之陳友定起徒歩至列將相百戰守死爲元東南烈士未能或之先也當是時吾鄉豪傑之士多從之﨑嶇嶺海至死不怨而朝廷音問實籍以通先祖太史公眞烈死節事聞贈官先君子亦宣授資德大夫三知政事詔使來自海上友定遣江君伯昻與俱來且說熊天瑞于贛伯昻與先公少相善也爲其言友定意先公感激因邀里中士蕭君克欽輩數人俱至贛說天瑞猶豫先公以太夫人老病不得行伯昻云報命克欽南逾嶺表間入閩微觀之崎嶇兩淛出金陵轉入巴蜀還寓長沙歷湘潭以歸與先公謀曰吾觀群豪智略下獨友定忠義殆可􅀝也乃復之閩友定承制授克欽奉議大夫同知邵武路叅其軍事友定用法嚴徃徃致濫輙爲營解全活甚衆當行兵擊賊入建陽山谷間卒遇千餘人圍之數重執長刀躍馬奮擊賊首兩人􅀡前來刺將及忽大呼辟易其衆曰且止且止此吾父蕭公也使語之二人跪曰我甞見􅀗於君頼公救之得生今雖衆寡不敵我終不敢背德布陣稍却羅拜雲集行建寧光澤道中有七人者執兵而前跪曰生我者公也毎思無以爲報今幸道經我里敢以白金百兩爲從者獻蕭君不識也其人各言姓名及所以營解其生之狀君慰喻却其獻而去洪武元年戊申隨友定至京友定死君以親老辭不仕歸田里年財四十二事親以孝聞讀書教子自娛祈寒威暑手不釋卷親戚子弟從學多所造就洪武戊寅六月二日終于家享年七十二於戯可謂全名福矣君生元泰定丁卯歳餘親母王氏卒􅁇母王氏鞠之愛之逾巳出岐㠜不凡幾冠從受書於安成羅先生學成教授其鄉卓然以不墜其家爲念而所以去就卒如此可謂難也矣余聞之先公常欲爲之傳其事今子翰林檢討引高與余同修太祖高皇帝實録見友定之事而歎蕭君之不可作也引高亦感風奉狀請銘余不敢辭也按狀君諱寅克欽其字所爲文章曰舫中集晩自謂舫中叟學者稱秋舫先生系出齋鄱陽慶居山東濟寜有諱忠國者事宋高宗爲吉州出防禦使子文婿吉水城西章氏子孫遂爲吉水人高祖典簿公文布曾祖信可祖德永父雲心世積忠厚連姻士族娶艾氏先卒􅁇王氏徐氏子男五人長仲高其季金高皆先卒次卽引高次慿高次持高皆能世其家女子三人適士族孫男子十四人慶榮回艾明會弘卒儀益本遵係全曾經曾孝蒙覩以壽終之歳􅁙君于邑之仁壽鄕荷塘山之原銘曰有偉蕭君世之通儒縱􅀚四方議其賢愚得所宜歸之死不回從容進退鍾鼎若違􅂼食之甘韋布之温天錫壽祉有賢子孫得譽之眞身後乃定盍視厥銘惟善無競故奉政大夫大醫院使戴公墓誌銘王汝玉永樂乙酉冬十一月二十一日奉政大夫太醫院使戴公卒於浦江故第其孫紹以丙戌年十二月十七日卜其鄕獨秀山之岡奉襄事焉持前春官大宗伯鄭公沂狀不遠千里來京師謁余請曰近故以來大夫之没咸得乞銘於文章君子􅄒其濳德善行鐫之貞石或掲諸墓阡或瘞諸幽宅以貽永乆先祖考不幸大故而封塋之石未有其辭不肖之愆何以自逭願先生哀而銘之余辭不容乃按狀敘次爲銘公諱思恭出唐平南節度使銀青光祿大夫檢校太子尚書令諱昭後至公歷廿有一世曾祖諱濤祖諱暄父諱垚皆隱居不仕素以詩禮相承稱浦江望族公資篤敏讀書必求聖賢微言奥義爲文􅀂詩不尚浮藻務底有用於時暇日於星象堪輿風鑑之術靡不旁推曲究尤精心軒岐書烏傷之丹溪朱彥脩氏得許文懿公道學正傳學醫于武林羅太無盡得其秘公先府君蚤從之游繼遣公徃執弟子禮受業其門丹溪一見輙奇之悉語公濂洛授受之懿及醫學諸家要故以醫道鳴浙東西洪武丙寅三月皇上龍濳北京甞患瘕聚遣使召公治療刻日奏功晉府親王遘未疾亦迎􅃱公隨獲異驗厥後晉府訃聞高皇帝馮怒王國臣僚悉逮赴京時公侍左右從容進曰昔者臣甞受知於王飮臣之藥數矣然竊慮其膏梁之毒復作也今乃果然上於是䆁然改容諸臣咸得不坐壬申七月太祖高皇帝徵公入朝將屬領太醫院事公以老病辭授階迪功卽職御醫値風雨免朝戊寅夏五月高皇帝大漸公同列進藥不稱者皆麗于辟獨指公謂侍臣曰戴元禮仁義人也愼母恐近臣聞于遼府親王爲書二大字賜公肅慶二府咸爲賛詠朝野名􅀸鉅儒播之篇翰克物卷帙也皇上正天位超陞今官旣就職後以耄不任事爲請弗從至數四乃許之仍賜誥命金帛􅃱仕歸田里甲申冬十月復命使者乗軺召公伏枕不起乙酉夏四月以安車入因公衰病免行拜禮優臥官舍惟特召乃進見是冬十月復請乞骸骨勑十五日吉治行俾禮部選官護送瀕行諭公曰朕復召汝汝其來也公旣抵家出賜金脩祀事遍召親故宴飲爲樂置殽羞拜丹溪墓載酒造邑中從所知敘平生􅂬用昭恩貺之隆甫旬餘疾作公自知不治將易簀召諸子姓訓之積善守法具告以不能補報聖恩爲身後愧言巳而逝享年八十有二卒之明年春二月勑命行人翁綬諭祭于家御製祭文褒奬至備具載國史公歷事兩朝藥餌所施奇効不可殫述金繪楮幣上尊珍饌駢蕃之賜殆無虚月公平生亦誠愼寅畏未甞少有過差是以遭逢眷知終始一致自古迨今士之榮幸蔑以加焉蓋公之學岀於丹溪丹溪之學源深而本固非近世醫家者流所可比余曩得其書讀之爰自易水張氏河間劉氏東垣李氏曠百載泝而上焉極於素問􅂕樞宗旨推天人交合之理辯隂陽偏勝之氣其識卓以明其􅀃詳以密以故見之於用能起死回生動若神助一洗拘方泥法之陋誠儒者格物致知之急務也公以所得於丹溪者觸而伸之􅀋而比之研精覃思明體適用宜其遇病施治􅀂矢發機必中正鵠彼不善爲射徒袖手操弓莫知攸措焉公今已矣後之人能知丹溪之學者皆公有以倡啓之也公娶諸曁楊氏生子男二曰儒曰儼皆先公卒孫男四孫女四其請銘者長孫也銘曰二氣流幹天淸地寧人於其間禀兹粹精茍或滯焉灾疢以成學喪千載彼昏孰醒匪有先覺疇探其情金元之際群賢迭興貫道三才窮玄洞􅄀後丹溪氏遺緒是承載闈微言大宏厥聲公逰其門擷華搴英皇皇聖世以醫自鳴際遇兩朝丕膺寵荣公雖已矣不死猶生垂範後學識是夷行濟危扶殆有則有程獨山之原閟是泉扄過者必式視此刻銘皇明文衡卷之八十五
