front:
  text: 皇明文衡卷之五十
  hash: sha256:57dd30f255fc9fb619826bdccac1a6178385da14e7f400bd8f41c40a00761301
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_050-1a}
body:
  text: 雜著燕書宋濂玄黄之間事變無垠辯士設諭以風以陳質徃舊開今新作燕書四十首晉侯將伐楚楚子甚懼召六卿訊之曰楚國雖小自若敖蚡冐至於武文威稜氣燄懾彼諸􅁎今晉君不道乃謀兵入我是蔑寡人而死二三子也寡人耄矣不復親帥三軍以逆堅乃城郭以遲晉人不亦可乎王孫由于對曰然易有之王公設險以守其國非險國孰與守盍圖諸雖然城郭有時而堕楚國之南有方城焉其東有漢水焉晉人雖衆將焉用之雖然山川之阻亦可踰也若使舅犯守郢先軫保鄖叔􅆄禦雲中荀偃扼直轅誰能侮予雖然此猶以力言也齊民毒吾賦乆􅀂綏之以仁馭之以寛繩之以禮則封内之民德君以死守矣雖然是保民也非保國也楚子曰何謂保國王孫由于曰君務上尊天王下睦四隣分昭于上􅀔定于下上下有序疇敢搆兵是保國也楚子曰善於是遣公子結如京師左司馬戍聘於齊魯諸大國晉侯聞之謂諸大夫曰楚國方尊王睦鄰而以兵入其境不祥遂退師君子曰甚哉分之大也分爲天則定乃靡亂何有兵禍哉易不云乎六二之吉順以則也失則凶矣燕與齊方睦齊人以燕不虞其入也將侵之武安君聞之走告燕文公曰齊將不利於我公宜謀之文公曰寡人所畏晉楚大國爾齊何能爲武安君曰不然也臣嘗至豚澤豚澤之人養蜀雞有文而赤翁有羣䳜周周鳴忽晨風過其上雞遽翼諸䳜晨風不得捕去巳而有烏來與䳜同啄雞視之兄弟也與之下上甚馴烏忽衘其䳜飛去雞仰視悵然似悔爲其所賣也夫巫峽之險不能覆舟而覆於平流羊腸之曲不能仆車而仆於劇􅆖此無他福生於所畏禍起於所忽也文公曰子誠過慮哉不聽未㡬齊果攻燕取十城君子曰蜂蠆且有毒况上國乎燕文爲不知矣齊路寢壞桓公欲新之召工師翰具材工師翰伐巨木於營丘山中􅀂䉩􅀂煔􅀂魄旄􅀂豫章無疵取而泛之河蔽流而下工師翰麾衆徒操剞劂斵之運繩尺剫之閤閤然槖槖然聲達乎臨淄之郊越五月路寢成桓公環視之東阿之楹有用樗者桓公讓工師翰曰樗散木也膚理不宻瀋液弗固嗅之腥􅀲之不知所窮爲柣爲棖且不可况爲􅀒任器耶工師翰對曰臣之作斯寢也嘉木以爲桯文磶以薦址畫藻以奠井堅堊以厚墉陶甓以餙􅉳臣􅀼以爲盡善矣雖東阿之楹缺以一樗足之不虞君之見讓也桓公曰寢之鞏者在杗廇承杗者在桴藉桴唯楹耳一楹蠧則寢􅈥奈何不譲工師翰曰臣聞國猶寢也一楹蠧則無寢􅀂衆壬進尚可有國乎桓公曰不可也工師翰曰君旣知不可何爲察其小而遺其大也桓公曰不知也工師翰曰臣請爲君言之擅執國柄者有雍巫焉成内食之姦者有夷鼔初焉長君之欲者有寺人貂焉外惡諸侯而凶德弗革者有開方焉是衆楹皆蠧矣路寢能獨存耶桓公悟曰敬諾於是解四子政而召管敬仲任之齊國大治君子曰工執藝事以諌忠矣㫁而行之者非勇歟宜其上下相親伯業底定書曰從諌弗咈桓公有焉易曰納約自牖工師翰近之矣楚莊蹻過商丘之墟聞司馬鴻氏之妻嬰美而􅃩殺司鴻氏攘之未幾又將室衞人之白閭白閭宜衞人不從引錐自刺左右奪錐免蹻怒欲梟衞人白閭曰衞人厚我􅀂地勿以妾故傷衞人也泣而徃白閭得幸乆竟忘衞人恩巳請曰衛人女弟罃容顔姱嫭肌膚􅀂琢玉善爲陽阿七盤之舞翩翻如龍旋見者欲死君強委禽焉可妻也蹻從之罃至蹻絶憐愛罃終不自懌嬰則日媚蹻作狐狗態蹻或一破顔輙出驕人曰主君贈我以􅀏矣主君靣目有光唇如渥丹齒如齊貝音中黄鍾其美丈夫哉悔相從不夙也雖然今幸得侍巾櫛者殆天􅂌我寵乎言巳手足皆亂無主白閭尤善媚其驕人比嬰有過無不及焉巳而蹻專罃白閭甚恚徃詬罃曰而溷彘耳遽忘德吾乎不然何專我主君也嬰􅁇詈􅀹力罃起避之白閭與嬰逐噪不巳罃問嬰曰而昔有良人乎無也曰有曰今何在曰人殺之矣曰孰殺之曰主君也曰然則主君而讎也而弗能報反爭一旦之寵不亦傎乎嬰不能答白閭遽曰妾夫子固在也罃曰而夫子固在而心儻未死曾記泣别時言乎白閭抱罃大慟與罃亦泣下不能仰視君子曰大俠起南海中殺人肝爲脯妻其女婦事與莊蹻正同南海之人無縳之者反北靣事之爭權而矜寵巳焉哉天實爲之謂之何哉頓國之大夫權聞黃帝與􅃖􅀹戰製角以􅁚龍鳴樂之刳桐而髹錮焉畫爲龍文日習焉其音鬰紆而廻旋優優焉廱廱焉可聽􅀂能通乎玄濳者大夫吹向南山之湫以感龍湫中三足能聞角鳴意人將醢巳呀然號林木皆動大夫大驚謂眞龍吟也走謂公之竒曰眞龍之鳴業業如靈鼓前後相續宛潬不能休吾向學者殆非也請改而習諸何如公之竒曰子所聞者能也非龍也龍之鳴人鮮能聞子之角固僞也今子又以能爲龍益僞矣舎僞而學僞奚擇焉君子曰世之法孔子㫁㫁兮自謂得其宗者􅀂眞龍出鳴則駭矣鄭伯卒庻孽奪正公子五爭及萬公自擽入國將盡劉諸公族懸劍于國門且下令曰敢爭者斬子俞彌方病聞之嘆曰是何亡國之政也乃令左右扶見公未至公遙呼曰大夫力疾而見寡君非欲嘗國門劍乎聲色俱厲子俞彌陽驚曰何謂也公語之故子俞彌曰君能如此過文王逺矣臣頓首賀且不暇况敢爭乎公解顔曰寡君焉能過文王也曰臣言不悖君實過之公曰大夫言何易也雖然幸卒言之子俞彌曰君之過文王者無他威勝也公悅前子俞彌問曰文王初伐犬戎次伐宻須次伐􅂄􅀖次伐崇侯虎而作豐邑其岐徙都之其威盛矣大夫乃謂寡君勝之其故何邪子俞彌曰文王之威能行天下而獨不行於周宗故其孫子之蕃兄弟之國者十有五人􅁎姓之國者四十人此無他親親也今君欲兵之非威勝文王乎公艴然見乎色曰大夫言固善如儀亹之黨何子俞彌曰鄭之公族盡二人黨耶君奈何殱之臣所居之南有山曰陽都之山甚深羣熊萃焉熊性惡血偶度絶壑􅁄刺脅血見􅀂濡縷熊亟􅀲之血愈滋􅀲之不巳膚成坎原原如泉湧熊不能禁剜去其膚而血弗息竟擢腎腸以死鄭之公族猶一體也今因公子五爭不問小大盡劉無乃與前事􅀋耶公矍然失聲曰吾過矣吾過矣遂下城門之劍寘諸公族不論君子曰鄭厲公之愎諌誰能犯焉子俞彌反覆言之而公弗格者以順入以正出也内經曰寒因寒用􅀬因􅀬用其始則同其終則異於戯豈持醫師之為然哉祭人有列宗子泓性好㓗惡人口過人與語遥答之且答且唾人進寸則退尺以避沐浴必十更湯􅀵濕不以巾遡風乾之掘坎為匽而軒其上下䟽河水随慁随流欲行人道汲井泉前後濯大雪不廢妻因病寒死然好嗅女婦足紈足紈􅀂行賸纒三周而覆湧泉善垢或解之其臭逆鼻人不噦即􅄍子泓獨樂之驕人曰是何欝金之膄也婆律之潤也椒蘭之郁也寘諸袖中飯不􅅴嗅之神度弗爽嗅之怒不舒懣不釋也又從而嗅之瀕死召其子曰吾死矣粢盛薌合不爾求也嘉薦普淖弗汝覬也能時􅃱足紈於柩前孝莫大焉蔡大夫聞而􅀏之君子曰古語有之大潔者必有大汚其子泓之謂乎魯之老父相與謀造狐白之裘紉之以宻箴縁之以畫純佩之以長禐熨之以榆火擇彤笥承之趨魯君之庭而􅃱辭曰吾儕小人得有闔廬以蔽風雨者非君賜與岀作入息而鼔腹酣歌者非君賜與男播于疇婦饁于郊以遂其生者非君賜與吾聞上德不報於人為無禮於德為諐義不祥莫大焉請以是為王體之共謹再拜以獻魯君曰寡人聞之君猶本也民猶支也君所以庇民如本之養支也爾二三老父之無衣宜於寡人乎是給今倒行而逆施之無乃不可乎敢辭二三老父又相與謀曰是服之不華無以彰君之德也盍更諸於是以錦為衣繡以五色龍章鞶以朱絲襮以華黼有文爛如也又復趨魯君之庭而􅆀辭曰臣等不佞長於蒿萊之野未嘗受敎於君子不知以禮事君夫因物以合矩矩謂之章縁文以顯義義謂之范君有至德而惟皮革之物是供非合顯之意謹更之惟君圖焉公曰魯國雖小尚敢􅀻一裘乎禮􅀂可受絁布惟盈如其不然五采奚益敢固辭二三老父又相與謀曰吾君誠賢君其不受者非有他也不欲重煩吾民我等當愛之以德可也又進而􅃱辭曰君之中心臣等幸巳知之有君無臣世謂亂國臣不敢以䙝服汚于執事願以仁義爲衣道德為領忠信為紳廉知為縁使君服之長有玆魯國先公社稷永有攸賴不亦可乎公曰寡人敢不承敎君子曰魯之老父何其善愛君哉其氣和其辭婉以周其情懇愿而有依魯君應之􅀂黄鍾大吕弦歌干揚洋洋乎相宣冷冷乎相應也君臣如此魯欲不治得乎禮曰無體之禮上下和同此之謂也腹擊至趙趙苦成常與之岀㳺指河山曰畛畛乎有截也指民物曰棼棼乎衆多也指兵府曰矛㦸犀利也指内蔵曰玉帛􅂶牣也大夫上國也寧有匹于是乎腹擊曰敝邑索甚安能及此然有一說焉為君陳之可乎曰可曰南海之濵有昭支昷者居蛟汭之丘汭不産牛有䋲犝來者大如􅋙其角繭爾栗爾昭支昷怖曰是何物也其友伯昏氏告曰此謂犝牛易稱童牛之牿是也昭支昷曰吾見貌牛者形咫尺耳其大有􅀂斯乎懇其人購以歸驕其比鄰矜其輿皂自以無敵也他日寗宣子過焉謂之曰是未足爲大也高凉之山有牛曰􅵈其項黃其尾玄其色􅀋乎犈其重三百餘斤子盍􅃱之昭支昷復徃購以歸又自以爲無敵也他日爰子􅎶過焉謂之曰是未足爲大也空賔之林有牛曰旄赤鬛垂髀紺􅈊蔽􅂰體長而多力其肉重六百斤子盍􅆀之昭支昷復徃購以歸又自以爲無敵也他日倨無􅂰過焉謂之曰是未足爲大也巴峽之中有牛曰犘其毛拳然其睛煜然其角觺然其肉重一千斤子盍􅆀之支昷復徃購以歸又自以爲無敵也他日梁都之舟過焉謂之曰是未足爲大也合浦之間有牛曰犎項肉上葵龍胡下綏迅行如飛其肉重二千斤子盍􅃱之昭支昷復徃購以歸且詫人曰如此尚有可敵者邪津津焉悅􅅝􅅝然自溢也他日公孫伯光過之昭支昷岀牛讎之公孫伯光曰是猶未足爲大也岷峨之谷有牛曰犩鏤盪以爲頂鵠􅁚以爲跟雕壁以爲眥填脂以爲凥其肉重七千斤子盍􅆀之昭支昷惑曰有是哉雖然且將驗之迨至果如伯光言因嘆曰使人不我告我終矜犝牛大於天下牛也趙之河山民物府蔵較之胡沈固爲大國也比之齊晉則不及矣齊晉比趙固爲大國也較之秦楚則椎強不如之矣君勿自足自足則驕驕則輕輕則殘民以逞國欲治得乎苦成常舌本強不能對君子曰人自狹者其不可哉齊景公懲奢而好儉諸大夫復日浸乎滛靡然懼景公之知矯情事焉毎入朝駕羸馬樸車以從衣惡甚冠纓殆欲絶也景公謂其誠也憐焉召羣臣曰寡人使子囊帶賜爾等錦衣一襲及鞞琫容刀各一以爲身而等毋過儉也皆對曰臣等藉君威靈得從大夫之後食雖弗鑿不我餒也衣雖弗華未嘗冽也願君乆有此土俾萬子孫食君之儉傳曰儉德之共也共則一和儉則從康從康則豫一和則輯唯君圖之景公說一日岀㳺㑹諸大夫饗于鹿門入而觀焉其車則澤而煥也其馬則矯而騰也其服食器用則豐明精􅃾也景公以其紿巳大怒曰叱嗟而吾臣也敢爾乎盡􅀵而戮之君子曰書云作僞心勞日拙其齊大夫之謂乎秦昭王即位之三年中外士多去昭王患之謂陽山君曰寡人遇士不爲不至矣先飢而餔之未凍而裘之寡人何􅀒於士士之相視如弁髦將縶維之邪益離其心欲任其所之邪則去者日多矣弗禁國將空奈何陽山君曰君何患焉夫王孫非重甗不棲非山實不食非族林不懸聞人聲則逸弋人餌而罞之詔而馴之命之舂人立而下上其手命之水􅀒壼出汲命作兠離桑林之舞則冠帶踉蹡而起夫王孫􅀋夫人者猶可也至於甝虪則噬人之物昂首則百獸讋掉尾則林木震嘯咆則隂飈四發非惟不可近矧敢狎獵人羉而縛之習而安之相與作角觝之戯跨項編須或翻出蹯下無所不至甝虪亦靈獸猶可也至於伯趙禽中微者爾技人引而羅之擾而柔之摶土爲人獸神􅀑靣而空其中衣與皮如之令其爲􅀑則冐􅀑靣服􅀑衣以出跳踉偃仆如畫至於人獸神皆然伯趙雖微猶禽屬也至於蚍蜉則蟲之至微者也形大於粟其目鼻入微不可見眩人以彘肪誘而􅆀之集於乾壼玄與黄異貯序而敎之布髹几於庭置二壼其上振鼓三初則玄黄皆出再則各成列􅁬首摇鬛相向三則紛紜交不可辨聞鉦聲各退入壼不亂夫王孫甝虪獸也伯趙禽也蚍蜉蟲也皆口不能言㝠頑不靈其可服而制之者奠心志寜嗜欲故也况士靈於萬物者乎且士者國必資以成治者也昔我先君繆公西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晋遂成伯業臣竊聞之先君嘗語羣臣曰林繁則衆禽來棲海寛則大魚來逰寡人之待士亦以寛故劒舃乃麋至耳今王之馭下如束澁晝不得寧夜不得思來者如入囊有入無得出者臣亦將去之况他人乎王􅀂以誠待士縱其去來不問士􅀂不至當磔臣以示不悔也昭王曰善鄰國聞之士之來歸者千餘人君子曰君子懷材抱藝孰不欲自見哉特患遇之非其道故避去爾禮云舉賢而容衆毀方而瓦合言寛􅁉也君子亦何心哉齊頃公欲賦民一丘出車一乗不從者死袁婁宰泣曰敝邑之賦急矣四丘一乗尚弗支也况倍三乎吾寧死爾不􅃘死民也弗奉令公使使者讓宰且召與使者俱宰至見公頓首請曰臣無罪盧蒲就魁在側斥曰汝惡得無罪立國養民古也􅇤民肥國今也胡不朘民膏血以媚公爾罪一也公旣棄民汝反欲愛民使諸侯不敢侵伐爾罪二也通國之宰皆徇公欲爾獨以正自匡而欲死之爾罪三也汝惡得無罪公笑而釋之君子曰古者諌有五有正諫有降諌有忠諌有戇諌有諷諫􅀂盧蒲就魁之言其殆諷諌也歟韓帥師伐魏入舞陽魏人避之韓將公仲曰夫魏易摇之國也今弗闘盖弱我矣再帥師進必下一二城公叔曰不然魏國雖小許鄢在其南西河路其北長城界其西淮頴出其東是所謂險阻國也今無故我弱盖有伏甲焉譬猶越人穽䑕䑕好夜竊粟越人寘粟於盎恣鼠齧不顧鼠呼羣􅀋入焉必飫而後反越人乃易粟以水浮槺覈水上而䑕不知也逮夜復呼羣次第入咸溺死魏以舞陽餌我是寘粟於盎也無乃不可乎弗聽未幾伏甲四起韓師殱焉公仲僅以身免君子曰公叔可謂智士哉所謂智者察見􅀮微無所遁其情爾魏人無故而棄舞陽豈能弱哉盖誘我也公仲遽信之何耶老子曰將欲取之必固與之其魏人之謂矣晉欒氏世爲晉卿以財名至欒雩益務侈靡狗馬聲色無不好藉之舉火者百姓無規之者媚惑唯恐不亟求􅋙西旅訪神馬渥洼徴樂􅁎燕趙岀則行馬擁犬還則吹竹彈絲爲長夜飮酒酣連臂踏歌曰北邙之隂白楊悲止今我不樂日月馳止卷􅄠衰止飲酒沱止我心和止無日不然盖蔵皆空而爲樂不厭雩覺召所嬖謂曰吾樂巳太康家力不向單乎輙紿之曰魚鴈滿藪澤羊牛溢郊坰金帛珠玉􅂶積庫蔵何謂單乎雩復悅雩妻蓼媛罵曰蟯蛕所藉以生者在人腸胃中也􅏐其血膋日夜不止人因病厲死人死則蟯蛕亦槁矣爾曹藉吾家舉火旦旦蠱而伐之我家亡汝家得獨存乎衆畏蓼言以計去之嬖亂益甚雩以貧死百餘家皆散爲丐君子曰山之陽有桑蟲穴之晝夜齧弗止桑瀋液乾而悴􅆉亦無生者蟲其欒氏之客歟使戒蓼言亦何至於丐哀哉楚有闘子般者貎肅而言莊言則必稱先王國人皆以爲脩潔人也一日飮薳啓􅆠家而沈尹夀師祁犂在焉師祁犂與沈尹夀語語近䙝闘子般怒曰􅀂等䧟女蠱􅀂渠略岀入穢壌雖􅀑見亦唾也尚敢颺言爼豆間乎衆皆色沮言未旣有􅃩􅁎過門闘子般起更衣忽見夫握刃趨甚疾衆随之觀則所追者正闘子般也初闘子般通於􅁎􅁎知飲薳啓􅆠家過而目招之闘子般將尾而􅀻焉不虞良人見也沈尹夀拊膺嘆曰天下寧復有是耶天下寧復有是耶薳啓􅆠􅀹之曰子何見之晚也昔紀侯好狙使狙師敎焉狙師脫土肖人貌飾之冠九山之冠衣結霞之衣躡文鸞之履升降周旋人也拜立坐跽人也狙師度可用進紀侯紀侯觀之樂舉觴觴焉狙飲巳竟跳擲裂冠裳遁去盖狙假人貌飭形也其心狙也因物則遷爾子何恠闘子般哉今之世假稱先王以女姦言者衣袂相屬也子何恠闘子般哉君子曰天之高也日月之昭也星辰之逺也歩天之家咸得測焉獨人心之變堯舜有難知者觀闘子般之事可爲寒心矣齊西王須善賈海出入扶南林邑頓遜羣蠻中貿遷諸寳􅀂毒冐頗􅀺火齊馬腦之􅀋曰光燁燁然遇東風覆舟附㫁桅浮沉乆之幸薄岸􅀍濕行夷隂山中山幽不見日常􅀂雨將壓地西王須自分必死㝷巖竇絶氣庻遺胔不爲烏鳶飯未入猩猩自竇中出反覆視意􅀂憐之者取戎叔雹葖委萎諸物指之食西王須方餒􅅴之竇右有小洞棲新毳厚尺餘甚温讓西王須猩猩獨卧于外大寒不自恤語言雖殊朝夕嗢咿作聲似慰觧狀如是者一年不懈忽有餘皇度山下猩猩急挾西王須出送之登及登則其友也猩猩猶遥望不忍去西王湏因謂其友曰吾聞猩血可染􅖯經百年不蔫是獸也腯刺之可得斗許盍升岸捕之其友大罵曰彼獸而人汝則人而獸也不殺何爲囊石加頸沉之江君子曰􅀒㤙悖義人弗戮􅀑斯戮之矣西王湏之見殺也宜哉雖然四王須固可殺猶施於異􅀋也􅀋同者亦有之豈惟􅀋同而同氣者亦或有之奈之何哉天王之法尚在吾當執刑書以徃玉戭生與三烏叢臣朋玉戭生曰吾儕宜自厲異時立朝􅀔人之門足毋陟也三烏叢臣曰此余切齒腐心者盍誓諸玉戭生喜乃㰱血誓曰二人同心毋循利毋訹有位毋附厥憸壬而移其行有違此盟眀神殛之居亡何共仕于晉玉戭生復申前誓三烏叢臣曰言猶在耳何敢忘也時趙宣子得君諸大夫日奔走其庭三烏叢臣既悔復恐玉戭生知之又不得不徃也雞初鳴即去候宣子入門有危坐東榮者舉火照之則玉戭生也各慙而退君子曰二子貧賤時其盟誠良及登禄仕遽變其初志何耶利害戰于中位􅀔怵於外故也士君子養於山林而壊於朝廷昔人之嘆其有感哉武安君說六國從親以􅀌秦秦惠王患之使犀首期齊魏與共伐趙以敗從約趙肅侯使使臣說齊魏之君曰臣之東鄰有長瀦君其妻終葵夫人妬虐其侍􅁎長瀦君苦之長瀦君之友六人家有如夫人者三和而不爭長瀦君泣而訴焉六人者各遣其妻載饔餼以食夫人且觧之曰人所貴於婦者能樂其夫子爾長瀦君年將耄矣冝安之今因帷薄之故以傷其心可不可乎夫人答曰妾不佞不知眀訓不能奉夫子􅆀辱玉趾賁于玆敝廬有命敢不敬從然􅀼有辭焉長瀦君實耄子且㓜未能勝洒掃所恃以無恐者長瀦君存耳苟一旦溘先朝露吾屬將操瓢丐於道路長瀦君精神幾何寳之愛之唯妾爾侍􅁎唯欲是從長瀦君􅀂死其目豈有淚耶肉未及寒巳思移他家矣妾雖愚寜復計帷事乎六人之妻各歸逐其如夫人者今六國合從將以擯秦秦遣衡人一訹從約頓觧而惟秦之令是從不亦難哉且說士之口是非紛亂唯其所命皆傳理善惑大王不可不察也齊魏之君皆曰善於是遣使至諸國從約復成君子曰七國之君甚矣無識也随辯士之舌以爲東西辯士升國􅀔降矣故當時謂無士爲無國傳曰眩白爲黒倒上爲下其士之謂歟鬷夷子謂魏力叔牟曰越山之中多䝉頌玃父而牛尾貍亦産焉狸膋與肉間錯味㫖甚當林實秋肥狸日飫之其毛澤澤狸自料爲人所忌穴山爲宫樹石爲柵聚籜爲墉晝伏夜動無隟可㝷者獵師嗾犬蹤跡之毀柵壞墉而煙其宫狸不能煙也閉目冐火出犬随斃之力叔牟曰狸何罪哉􅎦夷子曰狸何罪哉利其肉之膬也高國氏以富見禍人以爲無􅇳殊不知從已召也髙國氏亦牛尾狸哉君子曰匹夫無罪懷璧其罪信矣楚放宜咎者善爲鸇學未三月皆馴縱之􅀭則揚呼之降則降指鶖鶬鳧鵠使之擊則擊無不如志西鄰有終利之伊爭能宜咎欲學之求鸇於太隂山使調鷹奴囚之七月有鶬過焉命鸇摶之鶬驚墜鸇亦墜對立煔枝上招之矯矯然逝矣餘者瘦死過半終利之伊甚慚徃餂宜咎曰子何術而使鸇馴也宜咎曰吾亦何術哉予􅀄得之也冠之以籠冐束之以絛鏇嚴之以鼓鼙承之以鞲養振之以鑾和使其目無邪視神無外馳時其飢也和水肉以炙之廉其饜也咽羽毛以洩之於是其天者全不知有人人亦鸇也故命擊則擊命止則止今子畜之以人不以禽乖戾其性情動摇其筋骸逆亂其血膋紊傷其羽翮不適其飽飢神旣不完天者皆䘮矣又烏能如人志哉唯恐其不縱也縱則颺去爾吾亦何術哉所用與子異耳終利之伊再拜曰吾因問調鸇而得馭將之術也君子曰豈惟馭將哉治民亦猶是爾楚將伐魯取其地召諸大夫問焉辟閭巫臣曰可神子魚曰不可楚子病之請言其故辟閭巫臣曰魯公失政季氏得民公伐之弗勝次于陽州齊侯唁公于野井而不能討魯之臣子枕戈待且莫敢發者畏季氏威也君將求逞諸侯而徼福周公之廟􅀕何不伐臣故曰可神子魚曰周室東遷列國失序􅀂聲罪加之以兵何君不可攻何國不可伐楚之視魯猶齊晉之視楚也魯可伐也楚能免焉臣故曰不可辟閭巫臣曰魯棄周禮唯弱強是視當齊肇覇衣裳之㑹九兵車之㑹四魯鮮不與聞晉文率諸侯㑹于温以臣召君不可以訓亦僕僕而徃不遑寧處其蔑我楚國則曰是蓽路藍縷之􅀖可與行典禮乎楚國之民含怒日乆非特君也康王卽世魯公雖與二三大夫辱臨楚郊實怵於􅀔非中誠也不伐何以示遠臣故曰可神子魚曰周公相王室尹天下於周爲睦分魯公以大路大旂夏后之璜封父之繁弱殷民六族使帥其宗輯其分族將其醜􅀋以法則周公用卽命于周其德至今未泯也夫脩惠以懷人人誰弗親逞威以上人人何能輯今以魯不我與而兵之以示遠其無乃非德惠也乎臣故曰不可辟閭巫臣曰受姓定封孰非懿親諸􅁎存者其可數也哉明德之弗崇則弗足以存且臣聞之立德敷政立義和民德天之明也義地之制也君人者則天之眀法地之制以洽和民人古之道也今魯之公室弱民罹荼毒􅀂入烈火無所避之棄而不伐不亦左乎臣故曰可神子魚曰王靈雖微天下共主楚國固強終人臣也以君伐臣是謂布義以臣伐臣是謂悖政四海弗靖職此之由君􅀂以師宿于魯境東諸侯告于天王使一介之使以讓君曰魯也弱諸臣畔之􅃱使其君越在草莾不能事宗廟諸􅁎􅀼憂之君爲大國不唯其難之靖而土地是圖或爲執事羞天王命我諸􅁎亦既有辭當以公徒三厲與君周旋於龜䝉之墟君其圖焉不知君將何辭以對也臣故曰不可辟閭巫臣曰天王崩王室亂劉子單子以王猛居于皇自救且不及况能綏我魯乎五侯九伯桓公實征之以臣伐臣非一朝夕今楚之伯與齊代興我􅀂討魯之罪東諸侯震疊不暇其能有辭乎臣故曰可神子魚曰魯之爲國宻邇於齊又甥舅也王室固多難魯之君子或藉齊餘威以安靖之楚師進焉諸􅁎必忿將爲楚患是無故勤諸侯也如或還也勞師千里糜厥糗糧觸冐風露何益於國臣故曰不可楚子曰巫臣之言良欲帥師東聞齊侯取鄆居昭公乃止君子曰春秋大夫􅀋多能言而麗乎理者何其寡也季氏逐君諸侯莫不聞楚能告天王􅃱討桓文之功可􅁇也神子魚乃力遏之巫臣不務出此乃凌蔑我王室惓惓以威遠爲言二者胥失也楚之爲楚其不競也宜哉宋襄公􅁇伯將與楚子會于孟以乗車徃而不設兵備通國人皆憂之莫敢言昆吾之叟曰君安則臣寜君設有難宋社且不血食吾屬將焉寘諸請昧死言焉俟宋襄公出歌而過之曰有虓者􅆛其毛栩栩冠弁而揖吾不知死所宻宻者阹鱗鱗者矛仡仡者夫始可􅆛與居􅆛乎􅆛乎良足畏乎君何之乎襄公怪之召而問焉昆吾之叟對曰聞君將與楚子會有諸曰然曰聞君武備弗之戒有諸曰然曰禮務從時政在體要佩玉鏘鏘不可薪於山荷戈與祋不可酹於廟其理然也今楚人􅆛而冠者也君欲以文德合之其術迂矣君之莅政動法文王使文王遇􅆛亦使勇士操㦸逐之未必朝服與之揖也襄公曰人皆相率約君以禮子奈何欲興戎乎壇坫之間玉帛交錯而使甲士厠之人其謂我何不聽徃與楚子會楚子以兵車至執襄公君子曰宋襄公爲萬世􅀏者以膠柱而鼓瑟也膠柱而鼓瑟且不可况徃㑹強國而不知變乎鄭人有愛妾魚者計無從得魚或汕或涔或設餌笱之列三盆庭中且實水焉得魚即生之魚新脫罔􅅈之苦憊甚浮白而噞喁踰旦鬛尾始揺鄭人掬而觀之曰鱗得無傷乎未幾糝䵂而食復掬而觀之曰腹將不厭乎人曰魚以江爲命今處以一勺之水日玩弄之而曰我愛魚我愛魚魚不腐者寡矣不聽未三日魚皆鱗敗以死鄭人始悔不用或人之言君子曰民猶魚也今之治民者皆鄭人也哉楚萬􅆇語不更先生曰鼩之在田也彈丸欲擊盧犬欲磔山狸欲啖鼩苦之其􅃛者乃徃依稷焉稷社之配也世謂之稷鼠人不敢圖意而之野巢也烏鳶啄其鷇鷞鳩殘其軀伯趙敓其室亦不能一朝居意而近人而家於宫則舒然安矣夫物尚有知人或失所依何邪不更先生曰若是余將焉依蔑藏曰仁義汝稷也禮樂汝宮也人依乎仁義禮樂其孰曰不然不更先生泠然而悟君子曰人之智豈不物􅀂哉物之專人則擾而離也詩云依彼平林有集維鷮鷮非平林固不集也人孰不智哉楚共王有照乗之珠愛之甚函以金檢命左右􅀒以随時出翫之㳺於雲夢之澤失焉共王不悅下令國中曰有􅀗吾珠者予以萬家之邑楚國臣無小大咸索珠簡茅淘土閧閧者三月竟不得更數年繁陽之子牧犢於澤有氣青熒起菅中視之珠也櫝以獻共王不食言乃賜之邑君子曰仲尼旣没珠之失二千年矣求者非一世一人而弗􅀗之一旦乃入牧犢者之手可以人賤忽其珠哉衛靈公問治國之要於蘧伯玉曰寡人之國不爲小矣乆而不治欲帥虎士以禦四封何如蘧伯玉曰可也非其要也遣使致聘以脩鄰好何如曰可也非其要也曰慎簡百僚毋曠厥官何如曰可也非其要也曰杜閼女謁勿使行政何如曰可也非其要也曰斥擯姦回崇厥正士何如曰可也非其要也曰儉德是共屛棄滛侈何如曰可也非其要也曰懐保小民夙夜匪懈畏之如天敬之如神綏之􅀂子何如曰斯其至矣有民斯有國有國斯有君民者君之天也君之則君舎之則獨夫耳可不畏哉公曰善哉言乎君子曰蘧伯玉之言其有激哉君者主民民之從君猶水朝宗振古然也而曰民為君之天何耶雖然天之生民使君主之不使虐之虐之非君也是則君爲民立民亦重矣哉趙成陽堪其宫火欲滅之無階可升使其子朒假於奔水氏朒盛冠服委蛇而徃旣見奔水氏三揖而後升堂黙坐西楹間奔水氏命儐者設筵薦脯醢觴朒朒起執爵啐酒且酢主人觴已奔水氏曰夫子辱臨敝廬必有命我者敢問朒方白曰天降禍於我家鬱攸是崇虐熖方熾欲縁髙沃之肘弗加翼徒望宫而號聞于有階可登盍乞我奔水氏頓足曰子何其迂也子何其迂也飯山逢彪必􅄍哺而逃濯溪見鰐必棄履而走宫火已熖乃子揖讓時耶急舁階從之至則宫巳燼矣君子曰迂儒僨事徃徃􅀋此是何可勝道人以經濟自􅀒臨事之際或不知急緩以至覆亡亦何其謬哉中山君嬖梁其生生蹇􅿟而椎鄙盡國中無過者唯中山君宜之一朝不見輙􅀂有所失語大夫㫋曰梁其生其智人哉何爲能安我也大夫㫋曰心成憐白髪玄情弗怡艶色媸從古然也中山君曰何哉大夫㫋曰君聞癸北子翏之爲人乎子翏慎妃耦十年不遂恒鬱鬰離居曲逆有醜女眇左目疹瘢如叢珠且黒而羸曲逆人過而不睨醜女怒去從師學擊筑彈坎篌三年精其技又善爲北里之舞以惑人子翏一見大悅致厚幣聘以歸字曰玄􅁎朝筑焉莫坎篌焉嬖之甚子翏稍岀㳺歸必熟視其靣無不妍者反􅀏世人多一目云其友宛爰都憐之爲􅆀趙女光􅃩皦皦照人世謂閭須白台不能似之子翏逐岀曰何物醜􅀋敢儕吾玄􅁎所謂玄􅁎其君之智人歟中山君􅀏曰大夫言過矣君子曰中山君之蔽一至是乎妍􅃖最易辨且不可况其他乎世道既汚以佞爲賢以正直爲憸邪者皆是也尚何暇中山君之􅀏哉尚何暇中山君之􅀏哉宋大心鉤與公玉乘無庸伯仇同居於乗丘大心鉤學内聖外王之道􅁋􅁋而洽於心公玉乗迁之曰子之道古也不宜於今是翠黃擒䑕也千不得一焉乃舎去學假仁定覇之術三年而足之無庸伯仇又尤之曰子病大心鉤善矣子道亦未爲得是使韓盧捕䑕百而一中焉予所業則異於是公玉乗曰何術也曰捭闔之術也儀秦之舌申韓之法軫到之略也放之一邑則一邑服放之一國則一國凖放之天下則天下從是使蒙貴襲䑕也十不失一焉大心鉤公玉乗疑之相與說于秦王大心鉤進曰王道如春煦嫗兆民無跡可窺均囿至仁王假臣以三十年鴻化覃於邇遐矣王曰子之言美矣惟黄虞能致之爾寡人不能伺也曰公玉乗言公玉乘進曰揣摩地埶明王之制義融於人巳蝕其利王假臣以十年伯業可定矣王曰子之言良矣惟桓文能行之爾寡人不能學也無庸伯仇見二人所對不合於是不待王見問目如明星風雷隱隱起舌間利害粲如也言巳且􅁇曰願王假臣五月之乆四海諸侯皆懼膝行而來朝矣王大悅曰此寡人夙夜不敢忘者也即命爲上大夫與聞國政公玉乗去之齊不遇又之宋之衞無客之者􅀳人聞而召之亦爲大夫大心鉤轍環諸侯皆不售老死乗丘一如無庸伯仇之言君子曰羽籥干戚之舞不可施鄭衞之􅀖亦猶子女優雜之戯不可陳齊魯之俗大心鉤欲行先王之道於春秋之世難矣哉􅀳定公好以位驕人揚食我諌曰東海有巨魚名王鮪焉不知其太多少赤幟曵曵見龕赭間則其鬛也王鯺出入海中鼔浪歕沫腥風盖翛翛然云逢鮂鰼鰹必吞日以十千計不能饜出游黑水洋海舶聚洋中者萬玉鮪一噴皆没不見其從雄行海間孰敢何問之者沂潮上羅刹江潮退膠焉矗􅀂長陵江濵之人以爲真陵也渉之當足處或戰大駭斫甲而視王鮪也肌之乃架棧而臠割之載數百艘烏鳶蔽體羣啄之各飫夫王鮪之在海也其􅀔爲何如一失其執欲爲小鱦旦不可得位其可恃哉定公曰寡人巳知之矣子姑就舎君子曰德稱其位者恒下人反是則驕是何也德則虚不德則盈虚則能容盈則覆理也傳曰君子以虚受人又曰日中則昃可不信夫齊侯再伐山戎賔胥無問曰聞君將有事山戎然乎非歟公曰然何如曰以臣觀之可伐者五不可伐者一公驚曰何謂也曰謀夫孔多可伐者一也矛㦸銛利旛幟精明可伐者二也既禀􅂶牣餫饟弗絶無仰於鄰可伐者三也卒乘輯睦隊伍成列不戰則巳戰無不剋可伐者四也大而陳蔡宋衞小而邾鄧􅂎薛皆與國也奔號承令匍匐恐後可伐者五也以此言之止君勿行者惑也臣􅀼有私焉夫山戎蕞爾之􅀖也使誠有罪君亦既伐之矣奈何再乎爲土地耶海濵千里君悉有之何愛僻逺之野以廣君土疆爲民人耶衣冠劍舃􅂶斥君之境土何愛魋結卉裳之俗以亂我邉陲爲一戰可以定伯耶君巳帖陳服鄭親魯而攘楚矣何假乎山戎今再帥師徒使斯民肝腦潤草莾枯胔暴原野耳夫争地以戰殘民以逞非仁君也非仁君不足以覇諸侯此不可伐一也齊使曰大夫言固善山戎屢悖寡人奈何賔胥無曰熊罷􅉘虎正家於山蛟鼉魚鱉俱穴於淵九夷百蠻均宅於仁君務仁德之􅁱獨不能容一山戎乎容之則來庭伐之則叛去力不勝德故也君請改圖焉齊侯曰大夫之言善止君子曰桓公賢君哉不然何聞義則服如此也南文子任衞國之政察見淵魚人莫不畏之一旦忽􅀂狂易者以足衣爲巾以冠纓苴􅂂以食豆而羮簞百物靡不反者衞君􅀷憂之親枉駕文子之閭問曰先生病邪曰臣非敢病也曰先生非病何反悖􅀂是邪曰臣非敢反悖也效􅀹也曰何謂效􅀹曰今國中法制不定上下無章驍􅁀者字民孱夫操弓矢岀闘是簞受􅃵而豆盛食也貴戚之卿混乎輿䑓是􅂂苴冠纓也髠鉗之倫升於上士是巾足衣也舉國反易而無一人悟者君顧獨憂臣乎即實病亦一身爾如國何衞君曰目能察白黒而不見其睫心能識壯耄而不􅁴其形自蔽之患也請爲先生更諸君子曰南文子托疾以悟衞君美矣衞君聞之即有心目之喻亦易悟也哉詩曰鶴鳴于九臯聲聞于天此之謂也漁者庻其廉與婦競絶數月不通於越入楚兵大掠各西東匿死生不相恤人諍庻其廉盍聚諸輙謝去一日漁于海􅀗甲蟲曰鱟雄雄相􅀒雖風濤不觧庻其廉悔曰是物也人或不如可乎歸召婦與居禮之終身君子曰隂陽合而大化彰寒暑正而􅀊功成夫婦和而家政理天道也亦人道也俗降世汗有反目至死弗覿者不亦悲夫視庻其廉之能悔抑又賢矣秦有尊盧沙者善誇談居之不疑秦人􅀏之尊盧沙曰勿予􅀏也吾將說楚以王國之術翩翩然南迨至楚境上關吏縶之尊盧沙曰愼毋縶我我來爲楚王師關吏送諸朝大夫寘舘之問曰先生不鄙夷敝邑不遠千里將康我楚􅀖承顔色日淺未敢敷布腹心他不敢有請姑聞師楚之意何如尊盧沙怒曰是非子所知大夫不得其情進於上卿瑕瑕客之問之如大夫尊盧沙愈怒欲辭去瑕恐􅀗罪於王亟言之王趣見未至使者四三往及見長揖不拜呼楚王謂曰楚國東有呉越西有秦北有齊與晉皆虎視不瞑臣近道出晉郊聞晉約諸侯圖楚刑白牲列珠槃玉敦歃血以盟曰不禍楚國無相見也且投璧祭河欲渡王尚得奠枕而寢耶楚王起問計尊盧沙指天曰使尊盧沙爲卿楚不強者有如日王曰然敢問何先尊盧沙曰是不可以空言白也王曰然即命爲卿居三月無異者巳而晉侯師諸侯之師至王恐甚召尊盧沙卻之尊盧沙瞠目視不對迫之言乃曰晉師銳甚爲王上計莫􅀂割地與之平耳王怒囚之三年劓而縱之尊盧沙謂人曰吾今而後知夸談足以賈禍終身不言欲言捫鼻卽止君子曰戰國之時士多大言無當蓋徃徃藉是以媒利禄尊盧沙亦其一人也使晉兵不即至或可少售其妄未乆輙敗亦不幸矣哉歴考徃事矯虚以誑人未有令後者也然則尊盧沙之劓非不幸也宜也宋有白冥子旂耕於渠蒢之野得䂖焉圓而晢肉且倍好上有蒲穀文子旂􅍄視之曰質如截肪澤而有章其璧也哉孚尹旁逹廉而不劌其璧也哉無功而家大寳者禍當獻諸朝於是沐浴冠帶言於周王曰臣渠蒢之賤夫也偶挈耒耜以耕􅀼不自意地不愛寳􅀗嘉璧焉臣不敢私聞王將有事上帝方明六玉闕其一焉敢獻諸下執事王使大夫窽受璧薦諸玉尹玉尹曰嘻是珉也郤還之子旂抱䂖嘆曰吾聞有道之朝是與非别白繡裳雖華不鬋以􅀘冠太阿雖鈍不委以割牲今強謂璧為珉可不可乎楚丘丈人過而視之曰子旂其幸矣哉子旂怒曰何幸也曰卞和以玉獻尚遭刖况爾薦珉者乎子旂終不悟君子曰士以眞材衒且猶不可假才能目􅆀與嗚呼世不特一子旂也越人甲父史與公䂖師交甲父史能計而弗决公䂖師善决而計䟽各合其長事無留行人兩而一心也因語相侵離去政輙敗宻須奮泣諫二人曰君不聞海蟲有水毋乎水毋無自資蝦以行蝦亦資水毋食兩不能無也水毋姑寘之又不聞有􅃈􅖜乎腹蔵􅈉飢則􅈉出求食歸則􅃈􅖜飽否乃死􅈉失所巢亦兩不能無也􅃈􅖜姑寘之又不聞夏屋有蟨䑕乎與卭卭駏驉比爲卭卭駏驉齧􅅴草即有難卭卭駏驉􅀒而走亦兩不能無也蟨䑕姑寘之又不聞西域有共命之鳥乎枳首一體性多妬飢則爭啄一俟其瞑飡毒草害之及下嗌皆斃亦兩不能無也是皆山海蟲爾不足怪雖人亦有之北方有比肩之民迭食而迭望失一則死亦兩不能無也今二人甚􅀋之其所異者彼以形此以事爾奈何離去奈何離去二人相顧曰微奮言吾等將愈敗驩焉如初君子曰十二官各有所司必相資以成體况尺有所短寸有所長何可自用哉宻須奮可謂善諷矣猗于臯聞尾勺氏畜豹善捕獸以雙白璧易之且肆筵召所與㳺者飲出豹于庭而譝其能於是治金爲繩繫之文羅日割牲啖之居亡何有碩䑕過宇下急觧豹斃之豹視䑕􅀂不見猗于臯怒詈之他日又有䑕過焉猗于臯復縱之豹遇䑕如初猗于臯怒鞭之豹輙噑猗于臯愈鞭之易以縲絏寘之牛羊棧中日餔以糟豹喪欲泣猗于臯之友安綦子他聞之誚曰吾聞巨闕雖利􅀘􅂂不如利錐錦綺雖䴡供靧不如尺布文豹雖鷙禽䑕不如狸狌子何愚也曷不用狸搦䑕而縱豹捕獸哉猗于臯說如其言未幾狸捕鼠且盡豹􅀗麞鹿麃兎以歸無筭者君子曰獸固善捕亦各有所能至於用人乃違其才何邪是多鶉善格如膠弗之觧大夫􅀺􅄝之偶使韓遂挾以行左右言於韓君君說之令國中羅鶉與格皆不勝君以韓無鶉愧之無鉤大夫曰夫鶉海內所有也而韓獨無乎然而能格與否在所擇焉爾今衣褐而班文鶉也翁鱗而尾佳鶉也刀啄而戟距鶉也鶉則鶉矣求能格者幾何雖然此不足道也國中圓冠方屨堯行舜趍者皆士也能與君排難觧紛者復幾何能否在君不在物也君說擇善鶉與􅀺格卒大勝韓因此而得擇士之法君子曰古語有云羊質而虎皮見草悅見豹戰士鮮不􅀋之然豈無眞虎哉亦患人君不能用耳楚帥師伐晉晉人恐嚴甲兵以待楚入河陽退師未幾又入如是者三晉侯疑朝羣臣問焉伯瑕對曰楚誘我也急宜歐弗歐必􅀷入存亡不可期晉侯曰子計踈矣伯瑕恚曰君如弗納臣言臣終不能俘隨君請先去之晉侯斥之問歩毅歩毅對曰楚非昔楚矣執政衆乖內嬖日盛曳綺縠而副玉珈者後宫千人早謳莫酣惟日不足焉能及我問士渥濁士渥濁對曰毅言固當亦知其一未知其二者也楚西有秦難東諸侯則齊鄭魯衛枕戈待􅂩獨吾國有新䘮未暇攻彼虞我兵起五國必應之故先動相制耳不足慮也問范匄匄對曰如二大夫言問韓起韓起大􅀏絶纓􅀳侯變色曰大夫􅀏寡人乎起對曰老臣何敢􅀏君實􅀏鴈奴不知也􅀳侯曰何謂也曰具區之澤白鴈聚焉夜必擇栖恐人弋已也設鴈奴環廵之人至則鳴羣鴈藉是以瞑澤人􅍄其故􅅡火照之鴈奴戞然鳴澤人遽沉其火羣鴈皆驚起視之無物也如斯者四二羣鴈以奴紿巳共啄之未幾澤人執火前鴈奴不敢鳴羣鴈方寐一網無遺者今楚師進退三執火之謂也君何不少察之乎􅀳侯曰爭人不當如是哉於是大嚴守備楚子聞之曰勿謂􅀳無人不敢侵君子曰􅀳侯其善謀哉集衆人之慮必有一長者及韓起獻計楚人知悉其情遂退師詩云先民有言詢于芻蕘况士乎宋剔成君自髙視羣臣皆下有諌者輙拒曰爾欲上我邪毋不巳也指所佩劍曰懼此乎皆怖汗而退欲造九成䑓於雍丘之郊恐羣臣言戒門者毋納士納則死北殷子旦謂門者曰吾將見吾君門者沮之子且堅欲入且曰吾事君十年豈不知君君所甚惡者諫耳吾不諫則巳何沮也曰子旣不諫欲入何爲曰吾善爲雞戯將以悅君也門者入白剔成君君召至子且鼓肱爲翼膠膠而長鳴鳴巳急趨出氣甚暢君怪之趣使還問曰子人耳乃效雞鳴何也曰臣尊雞甚故效之耳何故尊之曰臣以堯舜之知或不如也曰是何言歟是何言歟寡人聞非聖人者無法况方之異􅀋乎曰臣言敢非聖人􅀼有疑也道蔽天地者堯德極萬世者舜皆古聖人也今謂其知不雞􅀂者誠過乎激然風雨晦宴能司晨不愆度者堯舜能之乎曰不能也曰堯舜雖大聖司晨必以雞乎曰固也曰君如知此奈何盡下羣臣無􅀂雞者乎君喜曰羣臣無言及兹者今乃始聞之寡人有過子宜力諫也曰君令臣諫臣不敢隱今賦急民單環四封皆強敵夙夜憂勤且懼不免况事游觀乎曰寡人不敢也曰君曰不敢而造九成之臺何也剔成君即日罷其役君子曰日之行晝天下無不照月之行夜萬國無不明然日月之光有所不及者一燈之微足補其功此盖子且雞喻之說也余爲燕書四十篇蓋取郢人誤書舉燭之義讀者好之謂有秦漢風余獨愧汗弗止者何也自嬰憂患以來神情銷沮見於觚翰之中氣薾而辭荒惡在其能秦漢也不猶優孟之似孫叔敖哉顏率求􅂦難秦興師臨周而求九􅂦周王患之以告顏率顔率曰大王勿憂也臣請正大義以郤其軍率乃詣秦君長揖言曰周之與秦􅀔雖􅀂敵國其分則君臣也率聞君伐臣則有之矣自非弑逆未聞以臣伐君也不知君之興師而涉􅀖畿也何故天子謹使使臣問諸左右秦君曰無他異也寡人􅀼聞九􅂦四海之厚寳也誠願得一觀焉然恐周之執事不察敝國之情乃盛陳師衞以備不虞耳寡人人臣也豈敢稱亂率曰率意君忘其爲人臣也今幸勿忘甚善率嘗適蔡蔡人有事其主者其主有龍淵之劎蔡人操刃與㦸逐而奪之或諫曰此汝主也汝何得乃爾獨弗畏不義之名子蔡入曰吾見龍淵不見主也彼猶不見主故肆行而無忌憚君今知爲人臣而興師求九􅂦焉何也君不聞齊􅀳之事乎齊地方千里帶甲數十萬天王嘗賜太公履東至于海西至于河南至于穆陵北至于無棣五侯九伯皆得專征迨桓公之興平宋折鄭帖服荆楚威行諸侯天下莫強焉尚款以尊周爲事未嘗敢求九􅂦也􅀳地亦方千里帶甲亦數十萬掎以太行之髙起以首陽之雄迤以黃河之􅀷靡以大陸之廣所謂表裏山河之固􅀳實有之文公藉累世之盛侵曹伐衞大戰于城濮而楚師敗績列國畏威無敢不從然猶一曰尊王室二曰尊王室亦不敢求九􅂦也今君欲行覇術不思法桓文而首惟不􅁤是圖率恐諸侯有以議君也且君有不義者三以臣帥兵而刧天子不義一也􅂦乃先王重器而敢睥睨之不義二也肆虎狼之威志在丘墟宗廟不義三也六國怨秦之虐日夜共謀洹水之上恨無其名以興師設知君有爾韓必遣三將軍出宜陽趙魏與韓唇齒之􅀖必注強弓蹠勁弩􅂇之燕雖稍弱􅀔不能以獨寧四國合一精兵當不下三百餘萬齊爲山東大國亦必驅其衆西向崤函楚見諸侯並起其雄吞之志益􅁀又必急趨擣武關君雖有百二之險舉六豹而噉一牛不至血肉狼籍不止也率􅀼爲君危之夫􅂦者又以昭夫德也苟無其德雖得之必亡之昔夏之盛也貢金九牧鑄􅂦􅁚物百物而爲之備使民知神姦用能恊于上下以承天休桀有昏德􅂦遷于商啇紂暴虐􅂦遷于周周德雖衰天命未改君尚可力求之邪楚莊之強君之所聞也因伐陸渾之戎遂來問􅂦之重輕王孫滿一言郤之輙俛首莫敢􅄍氣者豈力有不足哉誠畏􅀒不義之名也君世有功於天王今其所爲可不如蠻荆之長乎爲君之計莫􅀂告于衆曰寡人不敏昧厥君臣大分帥爾有衆欲觀􅂦于周周之大夫弗以寡人爲不穀肫肫然喻之寡人雖至愚亦巳藏之中心矣爾衆宜觧甲韜戈從寡人寡人幸至於廟當舉觶自罰復告于太史書之以旌寡人之過君能如此則改過不吝之成湯又見於今日也君德孰加焉秦君聞之赧然謝顔率曰子之言良是也卽日罷兵西還􅂦周􅂦也故借周天子立論爲說者曰秦師求􅂦之事雖急使率以是大義折之秦縱􅁀必能退師初不待陳臣思將兵以救之也既不能然復以八十一萬人􅞮􅂦誑齊率眞小人哉嗚呼大義不明乆矣豈獨率一人之爲然哉嗚呼大義不眀乆矣書穆陵遺骼初至元二十一年甲申僧嗣占妙髙上言欲毁宋會稽諸陵江南總攝楊輦眞加與丞相桑哥相表裏爲姦明年乙酉正月奏請如三僧言發寳器以諸帝遺骨建浮屠塔於杭之故宮截理宗頂以爲飲器大明洪武元年戊申正月戊午皇帝御劄丞相宣國公李善長遣工部主事谷秉毅移北平大都督府及守臣吴勉索飮器於西僧汝納監蔵􅀷惠詔付應天府守臣夏思忠以四月癸酉􅄟諸南門髙座寺之西北明年己酉六月庚辰上覽浙江行省進宋諸陵圖遂命藏諸舊穴嗚呼上之德可謂至矣哉諭頑陶尚書中立爲余言臨海林甲一門皆疫死甲獨治䘮暨甲殁無人藏其屍家犬奔號里巷􅀂狂巳而羣犬翕集銜甲衣曳至西郊跑土成坎􅩬焉坎淺不能容又復曳岀如是者四三始壅土覆之而去新昌黄琛甫有牝犬爲邏卒所食棄骨屛處其子銜之􅄟諸野予聞撫髀大息毎舉諭諸人人輙􅀏予誕且謂古無是事昔譙縣崔仲文畜犬會嵇䂖和以丁奴易之不從和殺仲文奪其犬犬齧和守仲文屍􅀲浮土掩之㝷牽和衣訴官和伏誅此晉義熈中事也冀州䂖玄度犬毋育一子愛之甚玄度烹子啖之毋候骨投地歛寘一窟移塟於桑間旦夕向桑嗥逾月乃止此宋元徽中事也謂古無是事者過矣夫犬能禦盗齚姦觧難報恩傳記所載者然也又寧止此二事乎人􅀂不自厚物理有可徴者亦弗之信反指予爲誕予故書此示之人心尚存其亦有所感天書客言二首天台李某遇盗官爲購捕之有刀鑷工出簮珥粥諸市市魁執送官工具言私於下東隣女得之官逮女問狀女戰栗不能言工曰爾毋佯愳爲也爾左乳有瘢可驗官覆之信然女恚自剄死死三月始得眞盗初女童子時常用工䉜􅄠故知女瘢工怨女嫁時不償其勞䧟之黄巖少年嘗游於􅀶徒一日飮市上市人携虚篋與愽不勝馳而去少年慚其紿巳躡至大澤中杖之仆地有一翁挾子過焉意其病厥也扶還其家未至而氣絶市人家縳翁父子赴官子哀慟不伏翁謂子曰兒毋用苦吾老矣自度在世無幾願易兒也子聞之輙自陳殺市人狀甚悉官用縱翁歸翁念兒􅁈也自經死爲說者曰漢張釋之爲廷尉天下無􅁈民嗚呼今之從政者其釋之也哉皇明文衡卷之五十
