front:
  text: 皇明文衡卷之七十
  hash: sha256:4a69948bd223754491d368225e4c69e57f6416a8e705ddc6bce1487c569e446f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_070-1a}
body:
  text: 神道碑巢國華武莊公神道碑宋濂自古興王之際天旣生眞人極民塗炭之中必有如虎之將弘展其丕猷弼成其大業此如燭照而龜卜蓋無疑者以漢唐言之則雲臺二十八將凌煙閣二十四人是已洪惟皇帝當四海逐鹿之秋龍飛淮甸嘘陽吸隂反掌之間廓淸八極夷荒蠻檄罔不臣妾當是時謀臣猛士效忠宣力其衆如雲􅀂和陽華公亦其一人也歟公諱高姓華氏字則未聞所謂和陽則其所居之郡也曾大父汝徳贈中奉大夫湖廣等處行中書省叅知政事護軍追封武陵郡公曽祖妣張氏追封武陵郡夫人大父某贈資善大夫湖廣等處行中書省左丞上􅀗軍追封武陵郡公祖妣張氏追封武陵郡夫人父德新贈榮祿大夫湖廣等處行中書省平章政事柱國追封澧國公妣童氏追封澧國夫人公之生也挺然有英氣人見之者咸曰是子異日必亢厥宗及壯其材果超群􅀋不屑屈人下同黨多嚴憚之至正中天下大亂所在盗賊乗時為患害屠劉其黔􅀺蕩析其室廬剽􅐁其玉帛公慮蹙迫州境卽於所居黄㻻結集水砦名募強丁淬濿刀劍晝夜為禦侮計練閱有法暗合古之將畧遐邇聞者多荷杸相從于時帝初起兵臨濠智勇之士雷動而霧集公遂帥衆而來􅀠于麾下及大兵飛渡長江進克采石􅁇攻蕪湖駐漂水而定建業檮京口而下江隂公皆從諸將建立奇勛會張士誠據有淮浙數州之地肆為不恭侵軼邊陲帝乃震怒遣大將出師討之公復在行摧敵于舊舘䧟城子姑􅂫拓土于淮東其功號為􅀹偉蓋公自從軍授以先鋒之職八轉至榮祿大夫湖廣等處行中書省平章政事迨夫大統旣集帝念將帥百戰之勞定功行賞上則公爵次則侯封各錫以鐡劵金書傳示子孫俾世其祿於是授公開國輔運推誠宣力武臣榮祿大夫柱國封廣德侯食祿六百石公未及授劵請命往廣海廵視城陴整飭軍隊行次崖州以疾薨于官舍年五十又九實洪武四年三月二十七日也訃聞帝懷悼不巳詔有司迎公之柩以是歲六月某日還塟於黃墩先墓之次藏劵墓中以慰公於九泉且進封巢國公謚曰武莊階加特進勲加右柱國褒崇之意無不備至公一子景春蚤世竟無嗣續其配灃國夫人蔣氏先薨至是與公合塟焉旣塟禮部以聞帝􅀂曰其今國子司業宋濂製為碑銘􅀣諸神道尚書臣陶凱卽日傳命授臣臣不敢辭臣聞傳記所稱用世之士非材勇為難而炳於幾先者為難公當群雄疊奮之時亦欲以一障自效見帝之頃卽知天位之有在人情之所屬統其部曲驩然來歸非有先幾之識者能之乎其建􅀣功烈安享尊榮爵封上公位躋極品亦宜也雲臺凌煙之衆又豈得專美于前乎臣旣歷序公之戰功次第于石復繫之銘辭曰士之所貴炳于幾先誠獲所依身名兩全當元之季王綱觧紐群雄虎爭鹿知誰手維武莊公家于和陽依水建砦以遏㓂欀皇帝龍興知爲眞主仗劍相從率先多士帝曰俞哉爾兵我從卽麾義旗同渡大江牛渚旣殱于湖亦捷溧水洋洋視如一髪天兵載揚翔飈震霆秣陵南徐次第而平况此江隂􅀔如破竹兵鋒所向無強不􅗮鄰有勍竪據浙連淮來撼大􅀣何哉蚍蜉皇赫斯怒命將行伐鏟破連營洊除窟穴復勑雄師定淮之東載綏載寧載約其同凡斯諸役公無不與展力攄誠亦云備至天淸地寧六合一家大統旣定論賞有差黃金鏤書鑄鐵爲劵作誓剖符千齡弗變皇恩下􅀍將膺寵榮訃來海南聞者涕零宸􅂨憫惻爲詔郡縣旋其柩車就鄕而窆崇階峻爵極于上公龍光有赫賁及幽宫傳臣作銘播揚嘉績百世之下視此貞刻明故資善大夫御史中丞兼太子賛善大夫章公神道碑銘嗚呼是爲吾友龍泉章公之墓􅀄予未識公時輙稔聞其名及公應聘而起同赴于南京同館于靑溪同出入禁署以備顧問如是者四三年私竊以爲生我者父母知我之志者唯公而巳不知公何爲棄予而遽死矣乎有善孰予相孰知我瑕疵而攻之乎神道之銘公之子特以爲屬肝腸百裂其何能綴緝言辭乎相知之􅀷者不爲之則鋪張君子之休美不識當屬之誰乎因抆淚而序之曰公諱溢字三益姓章氏處之龍泉人遠祖有曰巖者仕宋以兵部尚書守泉州始家于南安至唐康州刺史及又自南安遷建之浦城及生福州軍事判官脩脩生光祿大夫檢校太傅西北靣行營招討制置等使持節高州諸軍事高州刺史仔鈞娶練氏生子十五人其第三子獻誠仕南唐爲銀靑光祿大夫檢校司徒獻誠生文錫仕宋爲秘書省校書郞文錫生都官郞中重又自浦城遷于龍泉子孫遂爲龍泉人重生吉吉生順順生公琛公琛生世安世安生舉舉生宗宗生鄕貢進士輔輔生文義文義生用之用之生強宗強宗生煥文則公之高祖也曾祖諱斯立祖諱格父諱遇孫母某氏公之始生其音如鍾父母疑爲不祥幾棄不舉及成童嶷然莊重不習鄕井輕儇態諸兄出應科繇頗爲儕􅀋所侵苦公忿曰彼徒謂我弱爾吾不自厲豈爲男子邪乃往受事縣官卽有曲者舉正理􅀡之衆始愧服比弱冠從鄉先生王叔剛游從事於正心脩身之學旣又聞金華爲文獻之􅀖間出游以次叩其統緒浙東憲使秃堅不花請與語悅之巳而改官陜西要公與俱至虎林心忽驚悸力辭而歸抵家父病已革越八日而逝人以爲純孝所感至正壬辰蘄黄妖㓂自閩犯龍泉公與從子存仁避亂山中而存仁爲㓂所執公心計曰吾兄止有一息不可使無後挺身出謂賊曰兒㓜無所知我願代之賊聞公名方出重購以求及得公大喜賊帥欲問計公正色拒之曰君等皆有父母妻子顧爲此㓕族事邪賊怒繫之柱以刀磨其脅曰不降者且死公曰貪生惡死固人常情然吾終不爲不義屈賊愈益怒曰汝誠不畏死邪公曰死卽死何畏乎賊壯之不敢加害公夜紿守者乗間旣脫歸乃集里民爲兵不旬日擊却之處州府判官以兵來龍泉欲盡誅平民詿誤者石抺將軍宜孫實總兵政公走麾下說曰將軍知賊之由乎曰不知也公曰貧民迫於凍餒故相挻而從盗誠得一循吏招輯之民卽貧民耳今不出此而肆行剪屠是殆揚湯以止沸也不識可乎石抺將軍曰善㣲先生言事幾敗卽檄判官毋擅殺石抺將軍服公噐識留幕下與議軍事其平屬縣慶元及建寧之浦城松溪群盗公有力焉上其功江浙行省丞相康里公承制授公將仕郎龍泉縣主簿辭不受海㓂起黃巖掠沿海郡縣行省命石抹將軍守台城台之寧海民亦為變攻圍台城急石抺將軍飛檄召公爲援公方退居田里得將軍檄卽起曰吾􅀖非石抺將軍人且盡為枯骨今一旦有急正我報德之秋也集趫勇少年數百人畫夜行至城下約內外夾擊賊遂潰海㓂亦遁去寧海大飢豪民吳甲蔣乙積粟不糶公言於石抹將軍將軍因屬公行縣振之公至縣卽抵二豪罪發其粟賑餓夫其􅀹困者俾僧作糜食之公還龍泉龍泉亦歲儉大家有粟高其􅀡且不發公先以私田易粟貸里人乃行勸分之政民受其惠為多隣邑靑田潘惟賢為盗而龍泉監縣寳忽丁貪虐無􅃺民因導潘攻縣治寳忽丁棄印走公同其師王剛叔召豪傑與賊戰敗走之縣治遂復行省給銀幣為賞寳忽丁懼棄職􅀗罪而愧公有功乃謀害公公方贊元帥黑的兒開府處城未敢發會帥府問寳忽丁罪遂結季溪惡少拒命首害剛叔于家帥府檄兵襲擊之寳忽丁遁去於是處之七縣盗皆􅑣起行省移石抺將軍以行樞宻院判官分治處州公謂石抹將軍曰松陽小醜不速平將養成大患邪將軍曰唯君處之公乃遣千戸曹勝安督兵授以方畧一戰盡䧏之分院上其功行省陞承事郞松陽縣尹又辭不受元帥葉君琛攻鄭㓂於麗水屢爲所敗分院調公及樞宻院都事胡君􅀷合討之公與胡君統軍至浮雲賊衆來逆戰竝山爲長陣兵旣接我軍張左右翼夾攻之賊大敗􅀡擣其巢穴賊望見公來拜乞曰我非爲㓂者待我殱此海蠻卽䧏矣海蠻謂葉君所部海軍也公曰吾不知他特捕反者爾賊爲内外二砦公麾兵踰外砦立壁或疑壁於兩砦間非利公曰非爾輩所知我旣踰外砦則内砦疑其已䧏而外砦亦計其疑已二砦相疑破賊必矣壁未完賊突至相持未有勝眞公麾奇兵橫擊賊奔北卽移兵圍内砦數重下令急攻遂䧟之執鄭寘諸法外砦亦降行省復授福建行省檢校官㝷又改除奉訓大夫處州路總􅃹府判官皆不受南行臺治書侍御史錢木烈思分臺于婺長鎗軍叛迫其城治書遣從事楊迪徴師於公公勒所部軍就道長鎗聞公至輙引去省憲交章薦于朝除武德􅀅軍僉浙東都元帥府事又辭不受或疑爲要名公曰吾所將皆鄕里子弟使其肝腦塗地而吾獨取功名弗忍爲也青田賊呉英掠婺之金華永康東陽諸縣聚衆猖獗公議討之分院乃調兵屬公及胡君與賊屡戰皆敗之賊􅀔蹙􅅞其黨張貴李興甫等岀降遂昌凶右戸閉糴土豪周天覺嘯聚殺之元帥胡君往討天覺貟固不服乆之始請䧏公曰此賊不殄必貽後患胡君不聽受其䧏巳而天覺果以復叛誅始天覺之未䧏也執其黨與三百人擊諸獄至是胡君欲盡坑之公執不可得生全者十六七時天下日入於亂公結廬匡山上自號曰匡山居士屬其子曰兵將至矣汝曹其保障州里乎巳亥冬王師克處州公又避地入閩中今上皇帝遣使以束帛召公公乃幡然而起與靑田劉君基麗水葉君琛金華宋濂同召至建業入見上問勞曰我爲天下屈四先生耳然四海紛紛何時定乎對曰天道無常惟徳是輔惟不嗜殺人者能一之耳上曰卿等其留輔予矣亡何擢僉营田司事廵行江東兩淮之境田荒蕪及耕墾者皆分籍之差稅頼之以便公以疾在身者乆上時遣使存問及疾小愈卽入謁上見其來喜曰疾其瘳乎何遽出也一日上忽念公詢于中書左司都事張來碩曰章溢日來康強否來碩對曰溢日夜念毋不置而以主上遇之厚不敢以言欝欝成疾耳上卽命公歸省賜以白金文綺而留其季子存厚于京師浙東始設提刑按察司卽擢公僉其司事尋命還處州代總制胡君入朝而爲存厚娶胡君女賜賚􅄖渥且俾存厚入侍皇太子以示親信胡君出師溫州復詔公還守處州饋餉供億䂓措無缺而民不知勞及師旋卽日以總制事付胡君而還其部王師平荆楚設湖廣提刑按察司遷公僉司事公入見上慰劳之曰紀綱之事今屬卿矣公旣至覩荆㐮多廢地遂建議分兵屯田且以控制北方計爲便上曰所言甚善第未暇耳湖廣行省鎭撫回囘怙􅀔作威輕重人罪以爲常公廉得狀坐以法會未幾河內道按察使宋思顔以浙東憲使事不白下獄而浙東按察使孔克仁僉事王璹亦以事􅀍逮辭或連公公􅁨懼不知所爲上遣太史令劉君基喻公曰予素知章溢守法令毋疑也旣而胡君以兵入閩䧟􅃿處州之境皆動揺上命陞公浙東按察副使往鎭之平陽瑞安浦城福寧軍民等事皆􅀠焉公辭曰臣前任浙東無狀同列皆􅀗罪而臣獨蒙寛宥今􅀂加陞擢則益重臣過疆􅂣之事臣身任之萬死且弗避副使之命臣不敢拜上重違其志命仍僉浙東按察司事比至山寨或巳叛公宣布詔㫖軍民皆感動乃誅其首叛者餘皆怗怗青田夏淸聞胡君敗與福建叅政范昌大合㓂慶元龍泉時官兵盡戍浦城城中僅足自守公召舊部義兵使㨿要害列木柵爲屯勢相聮絡别命元帥祁興季汶卽龍泉縣治亦環植木城賊聞不敢犯公長子存道􅀄以元帥戍浦城及是有㫖命存道提兵爲遊擊而公卽處城坐鎭之公謂父子相統於律不宜乃上奏請罷存道官不􅁢兵戍浦城者以食不繼爲病上以屬公洎浙東行省右丞李公文忠李公欲運處州糧餉公以爲舟車不通而軍中所掠糧甚殷請拘入官而均給之兵食乃足青田稅官金甲發其同僚白乙匿官課乙旣誅死而甲恣爲姦利公訊之甲善口給辨不置公曰汝罪狀巳明奈何欲以口舌撓法乎其辭遂屈上知爲公所鞫當不寃命斬之建寜守將阮德柔遣將來納款人咸以爲詐公曰陳友定㨿全閩􅀔必不能容故徳柔爲圖自全計非詐也以其事聞詔許徳柔以元官守本郡命比下徳柔果爲友定所幷公因留其使厚存䘏之温州茗洋周遂卿恃山險常爲㓂鄰邑皆患之而郵傳之通平陽瑞安者亦爲所要􅃒公命存道合平瑞總督孫安之兵擒斬遂卿中書命處州造海舟􅀂干艘拜僉溪船戸爲水軍其戸凡一于旣有領之者而又􅀠于軍府役繁而事擾公上奏設水軍千戸所專統之處多山而少田軍需恒不足胡君爲奏免唯輸硫黄白藤于朝而行省復有所科公屢以爲言罷之水軍千戸任惟淵朱仲欽共戍靑田會㓂至仲欽逆戰而惟淵走還仲欽以無援故敗公斬惟淵以徇遣指揮何丗明擊㓂走之惟淵乃胡君所任信者旣伏誅部曲莫不股栗浙江行省叅政朱亮祖總兵取温州公調何世明以軍從溫州平公聞其掠人子女命鎭撫林理徵之各部送還其家海隅旣寕公請朝京師上報曰吾知卿在邊良苦俟平吳當卽召􅀸爾反浙西諸郡下上遣使召公且命分兵征八閩而存道守處州公旣入見上嘉􅅄甚至上諭羣臣曰章溢雖儒臣父子宣力一方㓂盗盡平其功誠不在諸將後公再拜謝不敢當明日上召問征閩諸􅀅何如公對曰御史大夫湯和由海道進平章政事胡廷瑞自江西入此固必勝然閩中􅀹服浙江乎章李文忠之威信􅀂令文忠帥師從浦城取建寕此萬全計也卽日詔文忠出師如公䇿處州之糧其舊額一萬三千石有畸後以軍興加徴至十倍民不堪命公言之丞相丞相入奏上曰吾劳處民乆矣詔從其舊温州黄宗雲朱君達來附各授以元帥之職還守其土及我師征温失利輙叛去温旣平君達又請䧏公曰何物小醜叛而復降納之是無法矣奏戮之浙江行省承詔作大舟入海徵輸巨材檄處州與諸府同公曰處婺之交限以峻險縱有木道何從出且凋敝之民曷以勝此公力言於省臣止之洪武元年正月上卽皇帝位有事於太廟公與執事畢越翌日召公及劉君基入見上御奉天殿羣臣咸在上歷陳其功竝拜御史中丞公辭不允㝷兼太子贊善太夫公務存大體不屑屑於細故或以爲言公曰憲臺百司之儀表居其職者當先養人以廉耻使人避而不犯豈􅀡待􅅮擊爲能哉上親祀社稷㑹大風􅀨還坐外朝怒儀曹議禮不合以致天變將殺之公奏曰風􅀨巳連朝無足怪者縱禮官議有未盡陛下至誠自足以格神明願寛雷霆之怒上爲之霽威上愛公甚嘗語公及劉君曰二先生年向耄恐感霜露致疾善自衛攝不宜早趨朝也存道部鄕兵萬五千從李公入閩閩平詔存道以兵從海道北征公持不可曰鄕兵農人耳始令征閩許以事平歸農今復調之是爽信也上不懌而罷公継論奏曰兵巳入閩者俾還州里昔嘗叛逆之民宜籍為軍使北征一舉而恩威著矣上喜曰孰謂儒者果迂闊哉非先生為朕一行無能成兹事者公受詔遂行比至處州母夫人巳殁公馳還舎援例乞丁憂詔不允丞相李韓公復貽書導上眷􅀝之意而遣存厚還家公灑泣而出日治戎事惟謹鄕兵旣集命存道部領由永嘉浮海北行上章乞如律守制詔仍不允巳而章再上上覽之為惻然曰吾固知其情不可奪矣但朕憲臺缺人耳遂可其奏存道至崑山走亰師聽進止上諭之曰汝父事朕宣勞為多今汝又帥師北上尚勉立事功以無忝爾父則予汝嘉因授以處州衛指揮副使戍于上黨㝷移平陽公自喪母夫人悲戚過度居常忽忽􅀂無以自存者及營宅兆親負土石而感疾益􅀷子女見之皆相顧悽愴曰勿憂也吾父母幸以安厝祖宗丘墓幸麄整飭歲時薦饗幸有條序吾庻幾無憾第荷國厚恩未能報効此爲慊耳臨終親友何濬來候曰當收歛此心毋有所執滯公曰吾乆巳知之遂薨於龍淵之私弟實洪武二年夏某月某日也享年五十又六訃聞上甚憫悼乃親撰文遣官卽其家祭之以某年某月某日塟于某山之原公娶陳氏勤儉恭㳤克盡內􅂇子男三人長卽存道明威將軍處州衛指揮副使次存誠次存厚女二人長適陳某次在室孫男四人集慶集恭集善集正孫女二人公性篤於孝友父喪未塟而盗發里閈室廬􅀍焚公稽顙􅈼天火至柩所而㓕事毋夫人備極孝養毋事必得其懽心與二兄别居巳乆旣創弟龍淵請三兄同居以奉母怡怡之情藹如也先世有墓祠曰標慶菴公起其廢一新之且益田供祀事而定祭享之禮命子孫世守之其於宗族里黨患其子弟無所於學則創龍淵義塾延碩師以敎之患其死者無所於塟則以玉峯西岡爲義阡聽其薶瘞焉又以王剛叔實鄕郡之賢者而石抺將軍能忠於所事卽龍泉劍水之陽作祠宇祀之曰忠賢祠蓋凡可以聳善扶義者無不為也公􅃺貌宏偉噐局夷曠而撫世酬物一本於誠一循乎禮義外若和緩而其臨大事則議論爭辨不避㩲􅀔必折􅂨於理而後已其與學士大夫談聖賢之道如味飴􅁡􅀹篤尚伊洛之學嘗曰古人為學皆躬行實踐人倫曰用之間無非學也今人以記誦詞章為務特學之末事耳故公於章句之習皆不以屑意而於綱常之大端有關於世敎者恒切切為人言之生平務在濟人利物嘉言善行人皆能道之不可勝紀也余􅀼聞之章為東南著姓自五季以迄于宋代多顯者內則兩制八座外則州牧邑宰皆未嘗闕其人親提師旅捍衛鄕州能成其動名唯大傳公為􅀹盛閩人至今道之公當元季紛擾羣盜四起磨牙吮血而桑梓為墟公談笑而起皆劓殄之無遺育處之民至今思之於是聲光流顯上致萬乗之知持節諸部執法中臺其功業視太傳公疑􅀂過之此無他太傅之所遭者衰世公之所際遇者有道維新之朝也古人所謂能光前人者公其有焉予敢評隲公行勒諸堅珉以垂示永乆於戲金或可銷也石或可泐也公之功不可忘也銘曰五季之亂殺氣昏太傳􅃗手障南閩西巖結壘兵雲屯狗鼠偷竊方􅌭紛怒來欲以一氣吞隂功上聞帝爲欣勑生蟄蟄千子孫白笏堆床如爛銀匡山継之譽益振方頥踈髯目電焞音吐鴻鬯鍾在軒􅃖􅃖赤子扇妖氛額抹綘帕手握􅚙嘨呼不異􅀑鬽羣公起長驅汗且奔一障仡立無邊塵較之太傳功或殷重徽疊照絶等倫大明天子御紫宸濟濟萬國咸來賔束帛往聘東海濵加以祿爵恩寵新庸田使者劳徠勤繍衣行部照靑春貪夫宵遁不待晨一朝南徼將星湮括山恍惚失嶙峋狐狸跳舞騁妖神帝曰汝溢汝老臣整汝戎斾旋汝轅公車戾止集吏民導宣威徳語復諄有叛命者馘以狥叶坐鎭鄕城如虎蹲大兒游撃左右廵四郊怗怗多柔馴召還執法居諌垣長跪敷奏嬰逆鱗萱堂風􅃤逝驚魂上表陳情達帝閽哀號負土自築墳因劬致疢亟返眞聞之孰不淚霑巾公知學術歸一原時􅝥濂洛漑本根所以不剉枝葉繁文事武備道乃存黄膓題奏藏山樊大書遺行勒堅珉傳千百載期無諼皇明文衡卷之七十
