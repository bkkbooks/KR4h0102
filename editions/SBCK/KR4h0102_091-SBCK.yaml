front:
  text: 皇明文衡卷之九十一
  hash: sha256:932b3d5c946370edeeb301034c5d3c1e975c715d1643226dc93db01c07ffabce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_091-1a}
body:
  text: 墓表元故孝友祝公榮甫墓表宋濂濂嘗奉詔總修元史凢天下有關史事者下郡國長吏愽加采輯悉上送官往往吏非知書者以致龐雜淆亂不足以取徴孝友之人動至數千皆溢浮辭而乖實行濂令史官高啓撰次成編而親爲筆削之唯存一百六人皆灼然可以勵丗惇俗者而䖏之祝公榮亦其一焉婺與䖏雖連壌不知公榮之詳後七年公榮之子崑持所狀群行求文表諸墓道蓋公榮之殁巳十八年矣狀之稱述皆傳中所略者遂次第而序之公榮諱大昌公榮字也居䖏之麗水官橋里姓祝氏祝出軒轅氏之後至周武王時封彭祖遠孫光爲祝侯子孫爲齊所拜故以祝爲姓歷代多有顯人具載家牒可徴也五季􅀄有諱寔字茂之者自信安來爲䖏州判官遂遷焉壽九十二以殁葬宣慈杉坑之原寔生中奉大夫縝縝生朝議大夫儒儒生承議承議生允懐􅁢懐生况况生宋紹聖進士建州司理叅軍奕奕生公冕公冕生份份生武學敎諭天祐天祐生潭州司戸叅軍䛬䛬生之琦之琦生紹紹則公榮之父也公榮孝友出於天性其在父母側容色穆穆以和父母意有所􅁒先􅀱知之不待出言而事已集一日不見心惶惶焉􅀂亡重寳得一甘味雖在百里外必歸薦之然後敢食母病晝夜錬樂奉淖糜以進衣乆不脫蟣蝨樷生其間已而疾􅀔革走謁於群神且泣且禱語不成聲見者爲之揮涕及母殁擗踊無筭屡至殞絶其於復襲楔綴歛殯奠祔之禮悉遵古制而不墜流俗之陋煬人不戒火起竈突間煙􅆋漲天公榮於急遽中力不能救乃伏棺而悲號且曰天乎吾母在斯􅄑天有以祐之天苟不祐我將與母俱焚誓不獨存也其火忽自㓕州里嘆異曰昔蔡順伏母棺而火㓕不意今日於公榮見之公榮旣葬母朝夕翹首如有望而弗至旣而曰是終無以解吾憂也乃命工􅅮土肖二親像於堂朝夕事之如事生焉公榮敬兄公亮如其父家政大小必關白而後行公亮出仕公榮不敢中席而坐恒􅀂公亮之臨乎上其弟公􅀡亡公榮奔視遂頓仆于地良乆乃蘇抱弟屍而大呼曰吾弟去吾而何之乎悲悼過甚髪爲之早白撫弟遺􅀌逾於已所生公榮孳孳以同㸑爲政請于公亮建家範數十則令子姓分任諸事視其勤惰而懲勸之毎旦序食堂上氣􅁚雍肅􅀂不聞人聲三世之間愉愉如也或者􅁒間之說其分財公榮勃然變色曰此言何爲至於我哉必吾不睦于家不敦友恭之道故爾昔張公藝尚九世義居况親昆弟乎苟計利而害義犬彘當不食吾餘因撫膺長慟言者赧然而退故䖏之人士言孝友者一則曰公榮二則曰公榮至今無間言云公榮風岸偉特善談史上下二千年治忽幾㣲如指諸掌聽者忘倦尊賢重傳未嘗有毫毛䙝慢意平心率物好惡無所偏徇而􅀹好施與故舊貧寠者周之死而不能棺者給之或丁歲儉下粟估糶之靑田盗阻行舟民不能鹽食公榮出所儲鹽惠宗族親婣以及於閭井人皆徳之當元之季四方用兵藩閫大臣多鈎致豪傑而布衣之士有談􅀏取將帥者聞公榮之賢辟書交至公榮􅀏而辭江淛行中書左丞相方承制行事署爲䖏州路儒學敎授亦辭乃築室南野而􅀮居焉不幸以至正二十年庚子正月一日卒壽五十又八二十一年辛丑某月日葬於武川飛鳳山下禮也公榮凢三娶先配同縣王氏次東甌王氏次閩中陳氏皆簮纓大族子男子三人曰山曰崑曰豳皆好學尚義崑卽來速銘者子女子三人常涓王逹其壻也一未行嗚呼孝者百行之根柢萬事之綱紀也執一術而百善至百邪去唯斯道則然所以化民成俗者汲汲焉是務而莫敢忽也近代之制文臣自少􅀸監以上武臣自正刺史以上實錄方爲立傳而能行孝友之政者雖在韋布中亦必登名與之齊行其治化之權衡於是亦可覩矣有若公榮之行之羙豈可使其泯泯無傳哉嗚呼古之人有云位登台輔也爵列公侯也祿積萬鍾也馬踰千乘也殁之自曾不得與斯人之徒􅀠齒此無他以風敎所關為甚重也濂雖不敏其於公榮之事表而列之用以為世道之勸孰曰非宜銘曰孝友之根實出降􅂨金石堪貫神明可通古之君子資之出治因其秉彞牗民孔易雖在布衣􅊮筆登名其意斯何􅀣之風聲誾誾祝君受親靡舎朝斯夕斯肯離􅂰下親旣云亡塗殯在庭臨風泣血哀不自勝煬人勿戒火起曲突有煙勃如上不見日伏棺悲號誓與俱焚誰謂天高邈􅀂不聞􅀂􅀔方升熾不可遏不待反風虐熖随㓕家政之修法古名門毫髪敢私唯義之敦嚴布科條各授以事一門雝雝罔有乖戻辟書交飛君􅀏而嘻我有我政奚暇外馳古有篤行照耀方䇿以今較之孰為優劣埃風渺瀰徳化擾鋤况曰善事不忘厥初飛鳳之山林木䓤蒨勒文墓門用為世勸故愚菴先生方公墓版文嗚呼自我齊國文公紹伊洛之正緒號為世􅃴益衍而彰傳道授業者幾徧大江之南而天台為極盛時則有潘子善氏林叔恭氏趙幾道氏兄弟以及杜仲良氏如此者不能徧舉皆見而知之推原體用之學敷化弘治而風動於四方重徽疊照於斯為至流風遺俗迄今猶有未泯􅀂我愚菴先生方公其殆聞而知之者歟先生諱克勤字去矜姓方氏其裔出睦州玄英處士于宋初十五世祖廿四府君某始遷寧海侯城里曾大父重桂鄕貢進士大父子野父烱元鄞縣儒學敎諭母葉氏宋丞相夢鼎從曾孫女也先生㓜而端凝五歲知讀書自辨章句十歲暗記五經諸先生嘖嘖愛賞目為神童年垂弱冠徧窮濂洛關閩遺書及尋􅀸先逹授受源委凢渉性命道徳之秘窮研􅊥索寢食爲之幾廢因喟然嘆曰爲學必合天人而後可舎是非學也至正甲辰嘗一踐塲屋言國家利害峭􅀡無所顧忌有司不敢取飄然東歸益閉戸潜心于一卦一爻必􅁒驗諸事爲至於天文地形禮樂刑政及制度名物之屬亦辨析歸於至當如指諸掌曾海民爲変江浙行中書檄呉江同知金剛奴募民爲水兵先生詣金剛奴謂曰民計窮而爲盗未爲盗者亦挺挺而􅁒動奈何授之以兵是謂增盗非禦盗也金剛奴怒不荅既而水兵果於中道殺䕶吏逃去從盗金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未幾侍御史左荅納失里至郡招諭劉都事基爲之副先生上書陳勦殄之畧不宜姑息都事韙其言而不能用遂致郡縣䧟没民罹塗炭先生發憤入山谷採松栢食之累日不返當路延先生入幕府先生謝曰我辟榖乆矣弗足與人間事也呉元年冬大明兵取台州先生欣逢眞主之出乃大有爲之時上䟽舉賢才安人心黜豪強除􅁀歛明敎育十餘事將上之未果洪武二年詔立郡縣學以訓導辟先生樂於育才卽起應命􅀒笈來從者至百餘人先生據經陳義曲暢旁通幾無毫髪遺憾聞者皆淪肌浹髓薫爲善良俄以母夫人春秋高力辭而歸諸生追之者踵相接學舎爲空四年夏朝廷聞先生賢􅁒致之部使者袁君宏以書幣來徴先生以母老不􅃘離左右避去旁縣郡承使者風㫖雜逮婣連督索之先生上京師兩詣執政固辭執政奇先生才命就銓曹試考覈入格列第二上特命知濟寧府事階朝列大夫錫之冠帶以行先生至官爲書一通懸於康衢諭上愛養元元之意民有所不平詣府自言禁吏胥不得呵問日引耆耋坐語訊以得失郡學官缺孔子廟堂頽圯聘前進士爲師弟于員有未備者選補之役浮屠以葺廟堂廟南鑿爲泮池傍列兩序闢射圃於廟北造􅃓矢􅀣正鵠日一再視學親爲正句讀較中否屬縣之内社各立學學凢數百區學子繫籍者二千人其後號爲最盛始有詔民闢廢田者閱三載乃稅吏徼近功不俟期歛之復以田定其科繇民益惰田不増闢先生與民約定爲簡書列其丁產爲上中下三等等復析爲三毎有徴發恒視書爲則吏不敢竝縁爲姦歲且暮轉戎衣于燕時有令役民舟者有誅別郡以牛車從事天雨雪牛僵死于道破産十八九民請以舟就役僚佐畏令難之先生曰吾知從民便抵法非所辭也卽載以舟具白山東行中書省省義不問郡倉絶糧省檄民七百里轉粟青州民以道遠爲病􅃴漕運者自淮安輸濟南道岀郡境先生􅁒就輸郡倉而俾濟南致青州告于行省弗聽卽以聞戸郡戸部奏可行省臣愧之郡城壞故事築以兵指揮使挾貴人􅀔當五六月聚民萬餘治之民不得田哀號而卽工聲聞數里先生􅁬曰民病不救惡用二千石爲宻聞中書同官疑且得罪不敢署名先生獨署之以聞卽日詔罷先是不􅀨先生􅃝跣徧禱群祠涕泣臥祠下誓不雨不還至是詔下民驩呼而散大雨如注是歳五榖俱熟民歌曰孰罷我役使君之力孰成我􅁰使君之雨使君勿去我民父母自是連三歳三禱皆有年五年秋隣境盡蝗先生省愆變食稽首􅈼天迨夜聞空中􅖇􅖇燭之乃飛蝗蔽天而過郡獨有年民有赴愬者隨事財决大者笞辱小者諭遣之不留案牘􅀹愼於庻獄月録日省不使乆淹或文有未具時作糜徧倉之夏秋之稅毎命斛卒持槩高下出其手或至累旬不收民競指倉爲穽先生令民自槩斛卒歛手不敢出氣遇將西成卽移文與民期民争來輸不遣一吏而稅常先登江西浙西二行省運糧百萬濟寧水陸數千里先生視如部民不使有錙銖怨懟舊比毎斛益四升以禆蠧耗先生憫其道遠言于朝蠲之府召州縣官屬皆役皁􅀠往往索賂無厭先生下信符置郵無敢不至者信符之籍以印識而中分之吏托日月稽違以媒利先生私藏之緩急有程一自已出復行其法於封内一以信符召民民竟得拜力耕桑襁􅀒來歸者相望于道初赴官時戸僅三萬稅萬餘石三年之後稅以石計者十四萬四千七百戸亦增至六萬有奇二州二十縣家有積粟野無餓莩羊牛鷄犬散􅀍郊埛富庻充實如承平之世至於社稷山川諸祀先生修崇壇壝嚴飭噐服或􅀣名木於周垣之外一如儀制無有所闕水驛在西門内􅋻陋汚濕居者弗寧先生料㨂材木候農之􅂩更作於城南庭堂室房弘敞逾昔冬寒河凍驛舟不行令舟人伐木爲炭穿土穴藏氷因其餘力以成事功泗水經郡城南通淮江北引河濟地􅀔高瀉搆石爲牐而時畜􅂥之魯橋􅀥林二牐歷歲乆壞石塡河中舟道難之役牐于絙壞石治􅁅而甓之故以葦囷庤糧火屢爲災敎民爲陶瓦營屋百餘間申戒火令編民居爲曹伍逓相救恤其患遂止大將軍魏國徐公逹副將軍曹國李公文忠綂士馬十萬之燕駐郡稍乆要官􅀔吏争索糧芻相膠轕于前先生依序酬决無不如意一軍稱能永嘉侯朱公亮祖將舟師數百艘北征水涸舟膠不可動脅先生曰卽取五千夫决河否則以軍法論日值暮先生不􅃘煩民泣禱於天夜二鼓天􅀨􅀺明水起數尺舟竟去莫有言者先生為政以風化為急務以德勝佐貳始雖倨慢先生委誠待之卒自愧服武夫悍將不知禮乆亦化戢在官縱無事終日冠衣坐堂上召諸吏授以書詩法律或公牘堆几群辨方譁先生片言折之各心悅而去性不喜近名常自誦曰近名必立威立威必至害人吾不􅃘為也府庭之間不陳杻械革鞭懸楹間示不妄罰省憲考績為六府最八年春入朝皇上以為善治民錫燕儀曹使踐其舊職瀕行奬諭有加且曰政成當顯用卿秋八月知曹縣事程貢嘗以不職􅀍笞心衘之上封事言狀詔御史楊某廉按楊􅃴程故人􅂲程坐誣罪易民服潜索先生過事踰兩月無所得乃捕府中卒吏盡繫之搒掠無完膚無一可問者楊更與其吏謀誣先生用倉中炭葦時十月固未嘗附火而葦則盖公宇垣實無私用者先生不與辨遂就逮民號呼塡道隨行百餘里者將數千先生次子孝某上書政府大臣願以身為軍贖父罪不報竟謪役江浦㑹空印事起吏又誣及之孝某復草䟽將伏闕下訴而先生没於京師九年冬十月二十四日也壽僅五十八子孝某與兄孝聞奉柩東歸十年春二月二十四日窆於縣東北􅀷灣章施山之原禮也先生娶林氏諱􅁎婦道為一族冠先十五年卒至是合塟生子二人卽孝聞孝某孝聞年十三居母之喪不肉食至服除人以純孝稱之女一人再娶王氏諱在生女一人未彌月而王卒少房董氏育之董氏生子一人曰孝友二女皆室未行先生靣白如玉􅂡眉秀整不妄􅀏語動容周旋必合禮法兵亂􅀒母逃入􅀷谷兩踵流血遇二弟訓育備至終身未嘗失色與人交率眞任質不事表襮不以乆近為冷􅀬立談之頃洞見肝膈南冠過郡者必以米醪饋之不能歩者僦舟車送之萊蕪丞陳川􅁒迎母就養而厄於無貲出錢五千助之同列以事奪祿買布帛給其用旦日延之對食乆而不衰脫逢其飮醉投案大詬而去待之益恭及酒解來謝陽􅀂不知者曰昔之夜吾亦醉矣不識君何謝也生平奉養簡素不服紈綺御一布􅂁數十載不易日不再肉不治官事􅂺却肉不食所守廉甚絲毛不取諸人毎行縣以物自隨杯湯不肯受兖州守因童進二木􅀲笞童十召州吏還之鄊人有爲饒陽令者以燖鴈侑書力却去乃巳初至官時禄米一斛可易金三兩以軍食告乏月取十斗爲食餘悉儲于倉或尤其迂不恤也晚年益加畏愼晝所爲之事夜則白之於天俯仰皆無愧怍榮辱利害恒視之􅀂一坦然不疑古所謂體道成徳之人先生誠庻幾焉其爲文章質而不華平而中理有汗漫集􅀂干卷傳學者云濂私自念齊國文公之薨始一百七十又九年而其學寖微譁世取寵者徒剽掠爲談辨誇多闘靡者務組織爲篇章文公所以扶世敎淑人心者率棄爲空言故其臨事之際仰攫俯拾唯恐利不入槖至有庸夫賤竪之不屑為者嗚呼可嘆也巳有如先生聞風而興乃䏻誠求實踐叅前倚衡儼􅀂上帝鑒臨􅆂養旣純發舒自異仁民善俗之政至今人人䏻道之大命雖止於斯而其率性會道無愧於文公者尚曒然弗誣也孝某從濂授經頗知先生行事之詳於是歷叙其故而繫之以銘銘曰堂堂齊公命世之雄伊洛正傳實爲大宗入天出人完傳翼經有遏必䟽無幽不明疇不皷篋千里來過燦如聚星惟台獨多流光所及寜有翳昏掲彼日月輝于天門逝者沄沄滅景銷聲不有人豪聞風孰興猗歟先生行知尊聞養氣弗餒充塞乾坤實孚名隨上徹九天鶴書翩翩降于丘園爰自布韋專城以居象笏朱衣於赫其儀寵恩之加其廣無垠曷以報之誓不顧身敷宣帝仁逹于齊氓以煦以嫗以致其亨民或勞只如魴之頳乃平更繇俾遂其生􅃛胥舞文其貪若狼乃障乃防而厄其亢人相告言乆嬰亂離父母孔邇我胡弗歸十百爲群其來如雲操厥耰鋤以播以耘我行其原萬桑沃然俯瞰于隰􅁰苗芊眠隣多孽蝗刺天而飛避不入境絶􅀋有知眞知之效小試則殷誰曰漢吏􅌹美其循太龢薫蒸郁紛輪囷自此而升何澤弗臻太命止斯傷如之何視天方高淚如懸河我又奚嗟數奇則然中心無慊生順死安善人殄瘁期道之衰顧瞻無依胡寕不哀崔崔者岡􅄅􅄅者陂其中有墳千載之悲胡義士墓表胡翰永康之魁山有義士焉曰胡君元祚其先建寕人也宋宣和中其遠祖志寕來爲邑遂長子孫至今居之邑地西􅀡婺東抵處處阻險而俗獷山谷之間􅀼發弄兵積爲民患及元之季郡邑兵起環處之境皆盗區也戍將石抺升之督兵討之􅀔猶不戢至正乙未縉雲蒻溪之冦殷氏杜氏啖群􅇯以利大入剽掠横殺不辜元祚􅁣然曰吾土皆王民吾雖力不能爲國除賊獨􅃘鄕井罹其毒束手視之邪走白邑令爲防禦計散家財集少壯之丁立保伍之法大書其幟爲義兵㓂偵之不敢輙犯詐遣其徒來降尋乃旁出抄虜擣邑郛焚廬含㑹官兵至元祚率衆助討之冦退兵駐邑中頗恣睢元祚扣軍門白主帥出旗􅀣于鄕約曰敢擾吾民者殺無赦士卒如約而元祚具酒肉禮其至者如初鄕民按堵令嘉其能檄所部􅇛結悉如其法上其名于憲府憲府嘉之署曰義士胡某俾與方允中合而拒賊賊畏之至者不敢越鯉溪而西時太平呂原明軍方巖致書元祚曰東南當賊要衝君以身障之能杜其不至乎􅂚􅀂去難就易於計萬全也元祚曰吾衆以義合將以排難存鄕里耳委而去之豈吾志耶益厲衆固守聞賊至山砦之民受圍者輙出兵援之歲丁酉正月賊冦武平合德元祚大破之逐北數十里二月丙午戰于前倉又破之賊數戰不利明日廼盡勒其衆間道出方巖與吕原明戰巖下吕不利其屬孫伯純殁于陣又明日賊復至與元祚遇于占田元祚盡銳以戰頋謂允中曰賊衆我寡唯死闘耳不可退而覆也自辰至午戰不利方允中吕伯川殁于陣元祚自分不獨生戰益力厲聲罵賊不旋踵死之至正十七年二月二十二日也邑令野速逹聞其死輙泣曰吾爲天子命吏不能羸股肱効尺寸功而元祚起畎畝不費官一粟不取民一錢合鄕兵而贍之屢與賊􅅮雖斃於蜂蟻之衆不少挫其氣吾屬愧之矣其可使君之志不白於當世乎具䟽其事以聞報未下明年王師克婺城永康內附又十有一年朝廷修元史凡忠臣義士於法得立傳余欲取其事載之無以究極其詳又八年余至永康見其子􅁉問君所以致死􅁉哀形于色爲余言其先人之沒裕不能援而與之俱嘗圖其不朽有韓先生循仁之狀宋先生濂之銘在余讀而悲其不幸然未嘗不壯其爲人當冦發難時巨族寒畯男女扶携走退上以脫一旦之命不頋宗祐棄骨肉者里相比也將吏畫地自守玩愒以養冦畏縮以爲持重不能展手足者郡相望也計其人怖死不暇惡肯抗必死之冦以不貲之軀而君亦何樂而爲之無乃輕用其身哉天下大義蓋有重於身者人不察也叛逆之冦義所不容也吾討之義不容已也不幸而死固其所也君旣死而懷利計私者苟免宜􅀂得志由今視之果能保其祿位乎享其貴富乎就命有之泯焉無聞者多矣若君之所樹立聞其風者莫不惜而慕之大義之在人心如此百世之下有生氣矣君得年四十有八娶章氏繼趙氏子四人趙出也長卽􅁉次禊次祏次禔余旣多君之義又愛其子之能孝故摭其大節俾掲而表諸墓亦史氏之遺意云漳州路達魯花赤合魯溫侯墓表王褘元有盡節之臣曰漳州路達魯花赤諱迭理彌實字子初合魯溫氏西域人也洪武元年王師征閩閩八州不兩月而平當是時合魯溫侯實監漳郡於是守將旣以所部軍先遁郡事又屬他官總制政不自已出欲圖守禦之䇿計未决而總制者已納降俄報新朝使者至禮當郊迎侯從容語左右曰吾將圖之乃朝服北靣再拜曰臣四十始仕不數年致位二千石國恩厚矣今力不能禦敵義不忍降報國恩者唯有死耳遂斫其印􅂐書其笏曰大元臣子置案上卽引佩刀剚喉中絶咽以死手執刀按􅂰坐􅩸然如生時郡民聚哭庭下聲震地共歛塟城東門年蓋四十有六矣侯蚤歲備􅀫衛用年勞當入仕以母老不忍去􅂰下不願仕毋殁服除東宫素知其才力勉之乃仕授承􅀡郎行宣政院崇敎至正辛丑陞奉訓大夫杭州路治中㝷改福州壬寅以事至亰除福建行省理問官階轉奉議與福建行省平章燕只普化同赴任㑹盜據閩城不得入侯贊平章集諸縣民爲兵急圍城盜􅀔旣蹙乃闕城東圍使出奔因勒兵殱之以功陞朝列大夫居三年除漳州路達魯花赤階亞中大夫時陳有定據全閩民苦其朘剥侯曰吾受千里生人之􅀉寧忍坐視弗加䘏乎頗􅁵庻事之利病興除之敏於吏事而務存忠厚民受其惠甚多故其死也漳人無不痛思之其爲人可稱道者如此侯祖曰滿速兒大都路治中父曰黙里馬合麻安慶路治中夫人回回氏子男二人長六十􅀫衞爲速古兒赤次普顏帖木爾江西行省通事嗚呼世之論者蓋曰非死之難而處死之爲難侯職在守土義不事二姓而守其土以死可謂死得其所矣豈非盡節之臣歟余至漳州得侯死事爲悉因嘆八州之吏大小奚翅數千百而大節烈然如侯者殆不可一二數故爲書而表之而并及其官伐世次使刻諸石豈特以慰漳人之思庻用爲人臣之勸云時齋先生俞公墓表元旣有江南以豪侈粗戾變禮文之俗未數十年薫漬狃狎胥化成風而宋之道俗銷㓕盡矣爲士者辮􅄠短衣效其語言容飭以自附干上冀速􅀗仕進否則訕􅀏以爲鄙怯非􅃀然自信者鮮不爲之變是時金華俞先生獨率其家以禮􅀷衣高冠談􅀃右道客造門肅威儀俯首拱而趍以迓至門左右立三揖至階揖如初乃升及位又揖者三毎揖皆有辭相稱慰慶贊周旋俯仰辭氣甚恭鄕人小子去家乆不知宋俗皆然或竊指先生爲異或尤以爲迂緩先生不頋也年七十有二卒于元至治四年正月十七白先生旣亡而宋之遺俗無有知者矣先生諱金字尗器別號時齋其先杭人吳越錢氏時有任其國爲户部尚書兼營田使者曰公帛嘗道婺義爲愛其地遂遷邑之鳳林鄕戸部生德詮德詮生又徙金華之孝順鎭諌生海海生善轉善智各有子四人皆爲儒惟善子言昌宋大觀三年上舎釋􅄄進士知永豐蕭山二縣而善轉子奉復家溪南之琴山奉生某縣主簿允中允中生性性生恣益恣益生壽壽生義先生父也母金氏先生少好學善自程督鉤發窺索水􅉼木滋月長歲化壯而有名一試不合有司卽退脩于家於經史尤濳心摉訂較辯疑昧多所附益學者師尊之受業者􅁇于門先生年愈加志愈篤爲學晩而彌成人望其􅃱于用而宋亡矣故先生之名不大顯于世惟發之文章以自見乆而亦散佚不傳世由是無從知先生知而言之者鄕人而已然先生所存鄕人未必知之知其詳者惟子暨孫至曽孫則已踈矣使更越數世復有知者乎篤於自信者固不䘏乎人之知否然德如先生而弗傳則天下之爲善者寡矣褘是以論列之以見不苟合乎一時者乃所以合乎後世也先生娶王氏生四子曰祿祺祐祉乃棄諸子而卒諸子以卒之歲十二月甲子葬于就日鄉義和里之楊家園今去先生卒時四十有六年而先生之孫有欽有奇有識有觀有慶有用有元多爲老成人㑹孫五人亦巳長云皇明文衡卷之九十一
