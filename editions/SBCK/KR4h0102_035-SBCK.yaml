front:
  text: 皇明文衡卷之三十五
  hash: sha256:f0606ccc899e0142d9697e8c9de1d8e90973f9cf26658a965d635863cef59d7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_035-1a}
body:
  text: 記重脩河南程氏三先生墓祠記楊榮凡先賢所當祀而祀之禮也立祠於墓以祀者禮從義起者也祠乆而僨僨而興者常也常則不書而書者大復故也河洛於天地之中扶輿清淑之所鍾賢哲之生自昔林林而盛矣然莫盛於宋程氏父子三先生者程氏世居嵩之陸渾三先生卒俱塟洛陽縣之府店保遺墓至今具存墓側有祠後人以爲享嘗之所歴歳滋乆荐罹兵燹向之隆者夷壯者敝茂菅􅀫莾一視蕩然誠當道者所宜究心也錢塘周鑑自郎署出叅藩政歴是􅀖覩之􅁣然即有志於興復第縻於職務弗果宣德辛亥春皇上圖弘化理重惟古昔聖賢之道乃頒明詔凡天下郡縣有先聖先賢祠墓在者所司宜以時修葺毋就于廢鑑祗承德意樂以斯事自任遂以其秋行郡道經嵩邑抵程氏故居得其十六代孫曰子中者與同詣墓所薙去荒穢辨正方位先捐已俸爲倡河南守郯城李􅂹及屬邑令佐亦以其俸􅂇之遂召工計資凡所需之物則取於近邑所宜産戒以期輸集無敢緩者以是年某月日之吉興工工能材良需用咸足於某月日告成垣墉棟宇皆復舊規封築堅厚樹植繁宻凡所供設之噐莫不畢具以某月日立開國公神主於祠之中以明道伊川二先生侑食依故制也復子中家俾守祠事遂率郡屬祗奠焉奠巳諗于衆曰惟是三先生之墓自宋至今餘三百載其間興廢者幾漫不可知顧念吾徒誦其遺言服其遺訓用底有位玆得奉明詔以周旋執事於故丘之間幸爾訖事要不可無書雖墓間之石著當時銘表在無庸重述而祠之興作歳月不有誌之將何以示後衆皆曰然鑑比以公務來北京屬禮部郎中兼翰林侍書蔣暉請予記其事予惟道綂之傳自吾夫子􅁇堯舜禹湯文武周公之後集其大成而不得位以行於天下遂􅀻淑於其徒然在當時惟顔氏曾氏之傳獨得其宗及曾氏之再傳而子思三傳而孟子孟子没其道無傳寥寥千百載間不絶如綫迨宋之興文運斯振而明道伊川二先生出孟氏之傳乃續而其學之所自實本濂溪周元公茂叔方元公司理南安時開國攝通守事知其賢深與友善因遣二先生從學卒能以其道倡天下傳於後世人至于今頼之是二先生之功當不在孟子下也宋李臨卭魏華父氏拳拳以二先生易名爲請遂定謚伯曰純公叔曰正公皆得從祀先聖廟廷此天下之通祀也天下通祀則墓祠不立可也而墓又有祠蓋墓祠則猶廟祭一家之私祀也通祀以道綂之傳惟二先生得與其列私祀則推其所自出而開國公擇師敎子之賢是不可泯也揆之於禮殆亦弗畔矣夫然則祠之廢興歳月其誌之也宜嘉鑑之能知所重因其請謹爲之記書􅀞船記黄淮陸乘車輿牛馬水乘舟古之制也余自筮仕以來承乏兩制四十餘年旦入禁垣侍帷幄薄暮還署間嘗一使齊魯以故乗輿馬之日多而乘舟之日蓋少也頃因謝病還故里頻年入覲沂江入淮以逹千會通非舟不可行居鄉屏處先隴徃來湖山間必以舟從事與在職時事多相左亦其􅀔然也吾鄉湖中之舟甚偪仄編竹爲篷且易損竊嘗病之今年棐槃二子以余齒高力衰舟輕劣不足以濟顛更造新舟頗寛廣板上覆以蔽風雨牖兩傍以便􅀚覧與客同泛可布十餘席中設小榻獨徃可以備燕息後闢行廚可以供茗飮爲余慮甚周亦人子之至情也昔米元章名其行舸曰書􅀞船至今以爲美談余與元章無能爲役然儒者出入必以書􅀞俱假名自况無乃不可乎嘗讀歐陽文忠公􅀞舫齋記始則追思謫宦遠渉觸蛟鼉冐波濤寢驚而夢愕終則羡夫逃世江湖之上者順風恬波傲然枕席一日千里自顧有所未暇余也旣免蛟鼉波濤之危又無順風千里之遠天宇登妍徜徉乎近境岸草汀花前迎後擁足以恱吾日漁唱棹歌交響互答足以􅂶吾耳耳目各有所適氣舒神暢其樂陶然於是絃琴賦詩以發其趣或與賔朋布弈傳觴賡酬笑謔視彼傲然枕席孰􅄖孰劣向非得請而歸乗輿䇿馬追逐公卿之後榮則榮矣然非病夫所宜何有於樂哉是皆上之賜也上之恩猶天然言語文字豈能盡述姑記所及用以自慶云爾蕭山魏氏祠堂記古者家廟之制大夫三廟二壇適士以下各有差等庻士庻人無廟祭於寢享止考妣而巳後世廟制非有命不得立是不獨庻士庻人之無廟也夫禮縁乎人情而起之以義所以報本反始者也䘮服上至高祖而享有所不及豈孝子慈孫之意哉於是司馬文正公河南程夫子相繼詳定始以高曾祖禰􅀕於影堂紫陽朱夫子又略加損益爲祠堂之制著於家禮而後孝子慈孫始得有以致其情也國朝列其書於性理大全爲萬世不刋之典其嘉惠斯人之意盛矣哉吏部侍卽魏驥仲房其先光州固始人五世祖文昌宋江淮制置司制幹扈蹕至臨安遂家焉高祖有聲元常德路判官曾祖應臨平務副使祖毅廣東塩課司提舉父伯雅洪武􅀄仕至寳鈔提舉司都􅐭以子貴累贈吏部考功員外􅀰叔父希哲上高知縣再徙蕭山􅂹實其子嗣伯父都監公後於序次爲宗嫡爰即其所居構祠堂若干楹祀高曾祖禰位次儀度一依家禮又别爲一室設二龕一奉自固始遷錢塘遷蕭山之祖倣祭先祖之義立春及忌日出其主祭於正寢易世不遷使子孫知世業所從來馳書徴文爲記余惟家廟廢而祠堂作經三大儒而制始定緣情以審義因義以起禮厚而不失爲僣􅂹於四代之外增祀始遷之祖此又情之至義之盡報本反始之道備矣雖然禮有本有文規制儀等禮之文也誠敬禮之本也祖宗之於子孫一氣之流通誠有不存則氣􅁀忘驕心神飛越與祖宗精爽判然不相􅀜乃欲備儀文行虚禮感應於俄頃難矣哉􅂹嘗爲太常􅀶士陞亞卿存誠事神講之明行之習其於祀先也宜無間然矣詩曰孝子不匱永錫爾􅀋子子孫孫盍思纉承於無窮焉松江府濟農倉記胡儼民者國之木農所以養民也昔厲山氏之子曰農能殖榖後世人名耕者爲農農本濟民今曰濟農何也民農一耳食者民而耕者農四民之業食者衆而耕者貧耕者貧不有以濟之則民何由得其養哉爲政者孰不欲濟農然得其道者鮮得其道而農􅀗其濟者今吾於吳松之爲政者見之矣松之爲郡所綂者華亭上海二縣其地不過二百里而田賦百二十餘萬石視他郡爲特重毎􅀊春夏農之貧者必舉債而後能力作幸而有秋則先償私貸然後及公賦公私旣輸而農則貧矣農貧復假貸或鬻子女或棄本業日殫月削積貧至困如火銷膏不􅀗其所者可勝言哉保定趙侯豫來爲郡守深以爲憂適工部侍郎廬陵周公忱廵撫至郡趙侯白其事周公黙識之然郡無宿積愛莫能施宣德七年秋東吳歳稔㑹朝廷命下平糴􅂆分以備賑卹於是周公乃與趙侯恊謀而力行之得米六萬石分貯於華亭上海名其倉曰濟農明年歳侵松江飢民二十餘萬計口者五十萬餘乃盡發所儲以賑之民乃􅀗濟周公復思廣爲之備乃下令瀕水立塲凡輸賦者民自發運不入里胥之手視舊所輸减三之一公又與趙侯謀同郡歳徴北京將帥禄俸轉輸南京給之計其所費毎米六斗致一石彼能受於南京獨不可受於此乎若來此給之便且以省費之米儲濟農倉農可無憂矣趙侯曰善非公莫能爲也遂言于朝而松江得省米十五萬石并以各塲之贏及平糴所貯凡二十一萬餘石公曰是不獨濟農凡運輸有損􅀒者及築隄防而力役者亦借給之民不失所矣是冬朝京師以其事咨戸部户部以聞如其請下松江廣二縣之倉以貯焉其帳籍出納則擇官之廉能與其民之賢者掌之毎春夏之交施散以時歛必以冬而足凡其條約皆公所畫可謂勤恤民隠經綸變通與民宜之者也踰二年郡又旱大發農倉以賑貸而民不知飢乃相率詣趙侯請曰吾民徃時歳豐猶窘衣食者迫於債􅀒也今遇㐫荒得免飢阻不至流殍此實周公之惠我公恊賛之力也苟得文字載之貞石以傳世示後則二公之良法美意吾民永有頼焉趙侯於是屬前翰林編脩郡人楊珙寓書以耆民杜宗桓所􅄒本末請爲之記噫余昔以文事仕於其土者于今四十九年矣於其父兄子弟固不能忘情而侍郎周公又余故人重以趙侯之請豈得無言也哉周官大司徒掌荒政十有二其一曰散利散利貸種也洪範八政緫之曰農曰農厚生也農倉之設豈非貸種厚生之遺意乎其與常平義倉同一養民而􅀹切者也故曰積貯者天下之大命而君子爲政以恤民爲報國二公之事皆可書余故史官也用著其實以告來者承恩堂記楊􅄎皇上嗣登大寳嘉念蒼生期㡳雍熈圖任老成人彌綸治化少師吏部尚書蹇公實爲之冠宣德七年秋詔有司􅀂曰予有輔臣粤自先朝偉著德望曁于今啓沃居多予于庻政咨焉予于庻官審焉克允克諧實惟其人欲新厥居以稱予優禮之意其繪圖以進有司明日以圖進弗稱又明日更爲圖進弗稱上乃自規畫授有司乃卜地於都城東南厥位維陽厥土維剛揀材於肆厥木維良厥石維貞陶瓦維堅乃卜日之吉鳩工並作裒高以平築虚以實引繩縮版以垣厥周乃建厥堂翼之以室乃闢厥路重之以門甓之甃之􅂗之沐之不踰月告成祀先有廟禮賔有舘庖有􅌮汲有并有庫有廐以儲以牧輪奐咸美百用具備復命大臣燕飮以落之肴核酒醴咸出大官公謂翰林學士楊􅄎曰昔晉獻文子成室諸大夫發焉當時善頌善禱者見稱於君子子何以語我􅄎不敢以不敏辭乃酌而祝曰惟天佑國家乃實以賢哲簡􅂌平格復錫以壽􅀂周之畢公䇿名文武之世相成王相康王永光周室公歴四朝進位師保享高年輔聖天子丕隆太平之運􅄎於斯爲國家賀又酌而祝曰明盛之世惠歸之德君子享多福而民咸樂其樂是以錫馬蕃庻晝日三接乃惟康侯􅄎於斯爲天下蒼生賀又酌而祝曰福善之報惟有德於民者爲盛古昔名臣輔君致治實功允德孚逹神明身􅀍光榮澤流子孫與國同乆詩曰維其有之是以似之􅄎於斯爲公賀公酌而復曰聖天子之恩篤不敢忘子亦可謂善頌者矣謹名其堂曰承恩堂請書此以爲記清白軒記梁潜雲南按察僉事茹良玉取漢太尉楊震所以遺其子孫者名其軒曰清白良玉世本於晉陽人自元末客蜀之巴縣乆不能歸遂家焉其地在巴渝之間今重慶府屬邑也重慶昔者爲明氏􅆫竊之都也巴蜀之水至於此而合下爲三峽千餘里而後出夷陵其壯且險天下莫之過也予嘗道經其地覧其山川因訪其遺老盖太祖皇帝之定四方也最後乃取蜀方其用兵時一自漢中入取成都一自夷陵攻瞿塘成都旣潰瞿塘亦披靡不支遂直搗重慶明氏君臣旣繋頸出䧏而兵馬粮餉府藏之貨財逺近屬邑悉封上于有司其地未盡煩兵戈故其民至今號爲富完其學者習於禮義才克而氣完仕於時徃徃致通顯者此豈獨其山川之高深致然也亦其安集富完之餘遭逢太平之盛加以詩書之􅆂養而流風遺俗之未泯者因得薰其化而致顯融於時其材之成有自來也哉良玉蔚然有今學者之文詞而介然以古君子淸㧞之操自勵觀其所以名軒而想其意氣之偉出豈不賢矣哉而豈獨如是而止也定其志而不遷克其所守而不可奪則見之於事業者固將燁然照耀其山川無窮也則其所謂清白者又何以異乎昔之人􅀁云邪予自去蜀以來京師徃還両都忽忽㡬二十年志氣之衰耗甚矣然猶常時想望其山川而思見其士之志節蓋其去之巳乆而與之按者益少聞良玉之介且㓗而又居乎風紀之任足以行乎其志其可愛也夫其可尚也夫良玉以求予記因爲本其山川習俗之故以記其軒藍谿書屋記鄒緝古之爲士者其始皆學於家而後進而用於國故三代之世家有塾黨有庠術有序國有學其至於國學則其材巳成而非黨庠術序之所事者矣其於學也凢詩書禮樂之教非徒誦其文通其辭習其升䧏俯仰之容識其鏗鏘綴兆之節而已所以和其心志正其容體盡格物致知之功以極夫盡性至命之妙大而窮天地該古今㣲而起居食息一動一静莫不有則是以非僻之于慢易之氣無自而入焉古之學者蓋如此所以爲不可及也後之學者則異於是矣誦習其文辭而或不能精察夫義理考識其名物而或不見於實用則所謂詩書禮樂者亦徒惟其虚文而巳矣又其甚者講習之不聞而惟口耳之是務渉其流而不窮其源採其華而不究其實載籍雖具目不常睹而曰吾儒者吾儒者此豈不過哉其所以不及於古人良以此也夫士學而不如古而欲求夫材之大成不亦難矣哉此予所以常爲之深􅁣也新淦饒章俊民居於藍溪之上讀書爲學銳然有志巳而爲邑稅諸生以其成業入貢于太學乃藏書於家而命之曰藍溪書屋又恐其乆而忘之也來求余文以爲記予惟俊民少學于家力勤其業旣以窺探六籍之文遂及于成而進之太學其所得者不少矣因其所巳得而不敢忘其所自取其遺書藏之以俟其後人其志之所存心之所在異於人也亦遠矣予旣􅁣夫古今爲學之得失以爲士習之卑陋無以自進於高明而不能如古人之所成阜然特見於世也故因俊民之求予之文而并書以記之俾夫來者之或有所警發於斯焉清足軒記陳􅁇荆石上人生秀朗少有出塵志長薙髪而從藴庵禪師求佛道甚力所居無長物惟設熏爐茶具經函席凡庭下植竹百餘竿凉隂幢幢虚􅄜淙淙風囬露晞蒼雪飄拂衣􅃑上人方定起􅀏歌其問俯仰宇宙視其乆遠而若一瞬息廓然其中無一物之染着不知身之處埃􅅽乎而與羣有之相汨汨也因名其居之軒曰清足予過而問之大雄氏之敎以身世皆爲幻其謂幻者幻所有爲上人何勤於有爲而樂乎㓜也且清者㓗也足者無慊之謂也㓗其心而無慊於中斯清足也何假乎名㓗其行而無慊於德斯清足也何章乎有㓗其居而無慊於適斯清足也何託乎寓假乎名章乎有託乎寓者詭於幻而幻之上人欲幻於是之爲乎將偶於是而之爲乎上人曰子之言理固有吾之所求者然吾之謂清足者以水本清穢汙濁之其濁之者非水之性也水失其性水而不足爲水矣人性亦然性無不善欲累刻之其善斯不全善之不全性失之矣人失其性人而不足爲人也人性不失猶水之清清斯足其性矣吾之名吾軒者豈樂幻而爲哉將以警吾内而不囿於幻也所爲求吾爲者必自有爲始吾故以是爲之余聞而善之意上人讀吾書知性之喻而不膠於其徒之􅀃故録爲記以歸之噫人性之善上人果識其用也歟諸􅁑武侯祠記王直南陽都城西有阜隆然而起曰卧龍岡漢諸􅁑武侯嘗居於此舊郎其地建祠以祀焉元至大中河南行省平章政事何瑋行部謁祠下病其庳乃下有司􅂶廣之又卽祠之東建書院以設官養士事聞朝廷名書院曰諸􅁑書院祠曰武侯之祠世移歳乆書院蕪廢祠雖幸存然亦日就頽毀前之爲郡者莫克任之洪熈元年五月太守陳君正倫始至徃謁焉周視祠宇蕭然破壊采椽敗席不除風雨退而嘆曰侯之德業在天下當百世祀之况其所居之地乎今祠如此何足以掲䖍妥􅂕乃於農􅂩伐材命工撤而新之冬十月成正堂四楹其餘方次第營之未就而當朝賀來京師明年春二月還郡適同知張永推官司憲南陽縣令李桓圭後先􅁇至相與恊力圖其事未㡬兩廡皆成繚以周垣前爲大門以時啓閉而祠堂之制始克大備堂之中塑武侯像凡其噐用則南陽衛南陽中謢衛具焉正倫旣告祀以落其成又歳以八月二十八日率郡縣僚屬奉少牢致祭拜跽有位薦奠有所進退周旋克中儀度郡之人士皆欣然稱嘆曰陳公爲此其可謂尚德之君子矣然不爲之記則何以示後人俾維持之永勿壊於是桓圭以書來京師請予記予謂先王之道以明倫爲本周衰王者之迹熄至於秦極矣漢興學者乃復得聞先王之􅀃至於光武明帝其道庻幾明矣士之出於其時者秉禮義循名節綱常之際截乎不可紊也降及􅂕獻大盗􅁇起建安以來曹氏最爲雄盛逞其詐力以誘脇天下豪傑之士莫不折而從之其所圖爲者無非􅆫竊􅁀悖之事豈復知有綱常之道哉迨華歆之計遂李伏之􅀃行而三綱絶矣當是時莫有非之者雖呉國多賢亦委曲順從之不暇是天下之人皆淪於逆理亂常之歸獨武侯奮起圖復漢室殺然以誅曹爲心出師二表正名定分凛􅏮乎王者之師使天下之人暁然知曹氏爲賊綱常之道頼以不泯後之君子因是而正􅁩明道以扶世立教則侯之功大矣豈特與勞定國死勤事禦大災捍大患者比歟雖百世祀之可也且嘗游處乎此神之所顧懐民之所尚慕焄蒿悽愴如或見之則嚴祀之以示敎焉蓋宜矣然今之爲郡縣者於有司之事部使者之所督責尚勉勉焉有未至若先聖之祀學校之政亦有怠而廢者其能崇先賢以儀後進如此誠鮮矣而正倫能之非誠所謂尚德者哉則凡政敎之所當務者其從容􅄖裕可知矣正倫廬陵人由進士爲􅁥察御史以恭儉慎静知名宜其所立有過人者故爲文俾刻諸石使後之人有考而􅁇之也重修范文正公忠烈廟記正綂八年十一月蘇州府重修范文正公忠烈廟成其十一世孫都察院照磨子易具事始末屬直爲之記蓋公蘇人也曾祖徐國公祖唐國公考周國公皆塟蘇之天平山公嘗請於朝改天平山白雲庵爲白雲禪寺世度僧守焉作祠於寺之右以奉祀事至公之子孫又作祠於是祠之南以祀公然忠烈之名未有也宋自元昊反西鄙騷動師出無功乃命公經畧公選將練兵築城寨墾屯田據其要害示以形勢招徠屬羗恩信大洽决䇿取横山復􅂕武元昊􅀔屈乃請降西人仰公之德服公之化皆爲公置生祠公薨相與哭於祠下者累日不絶宣和間宇文虚中爲慶帥言公忠於朝廷其功烈顯於西土至今猶廟祀益䖍然廟未有額徽宗命以忠烈名之且爲題其榜凡廟之在西者皆易以新名然蘇猶未有也紹興以來西土皆䧟忠烈之廟越在異􅀖蘇之守令與其士大夫謀曰蘇公故郡也而天平山則公祠墳在焉公之精神必徃來乎此乃更作新廟掲忠烈之榜於廟門由是蘇始有忠烈廟毎歳上巳郡縣長吏率其屬致祭廟壊元至正乙酉嗣孫􅀖瑞士貴復新之末世兵亂燬焉踰八十年未有能復之者至是工部侍即廬陵周公忱廵撫至于蘇而􅁥察御史劉君甄劉君仕昌鄭君顒皆以事莅焉郡守李侯從智來會政事之暇語及兹廟因相與嘆曰公之徳業著于當時傳于天下後世不繫乎廟之有無也然表先正以儀來今使後生小子得瞻其廟貌想其精忠偉烈而興企慕之心則廟亦不可無也乃各出資俾呉縣令永嘉葉錫圖其成錫毅然以身任之殫心盡力規畫處置凡鄰邑之令佐皆以資來助市良材命衆工爲堂前後各三間以奉公及三世先公像東西廂如其數以藏祭器而齋􅀫寓焉壯麗嚴整有加於昔中作石橋橋南左右爲碑亭前作大門榜曰勑賜范文正公忠烈廟經始於是年九月九日閱兩月而廟成直聞之士之䏻任天下之重者必以天下爲心心之欣戚主乎人而不私於已是以天下爲心者也以天下爲心則人庻其有濟矣初公未顯時巳欲任天下之重嘗曰士當先天下之憂而憂後天下之樂而樂夫憂人之憂而欲免其憂使人皆樂然後與之同其樂此豈小丈夫然哉孟子曰禹思天下有溺者猶已溺之稷思天下有飢者猶已飢之公之心猶是也故其徳業之盛不愧乎古人豈特著於西土也哉嗚呼士不以天下之重自任者多矣不以天下之重自任則其所存所行一主於爲巳人之利害不少槩於其心而又悻悻然自以爲得功烈之卑無足怪也而所以爲士者果當如是邪然則公之孫與􅀖之人士及四方之來者拜公之廟慕公之功業必當師公之心􅂶之以仁義而力行之於公其殆庻幾乎故爲之記而道子之所聞使刻諸石以告焉凡以資來助者其姓氏皆載之碑隂皇明文衡卷之三十五
