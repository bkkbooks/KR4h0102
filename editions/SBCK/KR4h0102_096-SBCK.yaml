front:
  text: 皇明文衡卷之九十六
  hash: sha256:95d2d2903e8e2a9f27fd8a268944877def7bb76ac9b00040932e92a0038a674f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_096-1a}
body:
  text: 哀誄彭百鍊哀辭有序楊士竒宣徳五年上憫江西之民困於奸吏豪民漁敓無厭也用璽書遣使廵視除􅇯去弊以安善良使者以朝廷􅀁建設縣之老人周悉民隱􅀁至事必咨之而惟其言之聽不疑然是時老人非皆出於推擇善不善相半不善者把持譁訐爲䏻事其善者亦且歛手避之而縣長吏鮮不受制於是奸豪吏民聞使者來惴惴懼旦夕且死暮夜走跽老人􅄬重賄哀叩求活旣内賄曰吾庇汝汝謹母忘我而凡􅀁對使者言某是某非非盡出於公矣蓋􅀁在皆然使者至㤗和留旬浹治事竟將行矣時監察御史彭百錬侍親家居親喪有事於外適暮風􅀨大作馳􅀐過快閣下使者侍坐閣上倉卒不及下避徑馳去使者遥望見之遣問知百錬也明旦使者去之萬安龍泉還止廬陵㑹有按察司官來聞使者言百錬馳馬不下遂趍㤗和召縣之衆老人索百錬居鄕􅀁作愆過咸對無之至再三衆老人對如􅀄惟一老於百錬素有憾貎􅁒有言乃悉出衆老之無言者而留􅁒言者導之言遂掇拾其嘗買妾及田四事而其最妾者謂挾制縣官放免百夫長温彦琮得白金三十两遂令書􅃺乃復進衆老之無言者出􅃺而掩其前之半以後半空􅁓俾聮書姓名爲據蓋衆老驚未知狀􅀁言何事也按察司官遂今衆老以夜伺百錬而執之然猶未有固必意宻戒云如其他出即止勿執亦勿泄言適百錬治喪事出外一二老人欲得按察司官意躬率百餘人夜走數十里外蹤跡掩執之百鍊平素負氣義侃侃憫竆嫉邪遇事􅀡發靡所頋避雖退處鄉䣊不變以是滋召怨其居鄉時朝廷造海舟令民夫採桅木泰和當出三百夫以富民三人充百夫長率行傅著巳定縣時惟丞治事孱弱不能制下奸人及吏胥謀茍利盜出縣帖復追鄉二百八十人皆爲百夫長期一人得白金十數兩免之於是六鄉讙然大擾溫彥琮者百錬姻家素窶甚預焉計無措走告百錬百錬入縣庭索其牘閱之其所追二百八十人不具按檢乃言於丞丞實未嘗知也遂悉罷二百八十人不追擾者以定皆德百錬而奸人邪計不行愈益側目之矣百錬旣􅀍執至庭下得覩老人所具事狀曰果如老人言宜有告者今旣無告者請及老人靣對就死不恨不聽遂械繫送詣使者轉送京師凡使者所送詣京師非死罪皆發戍遠邊獨百錬適遇寛恤之令得內米贖罪罷其御史而命吏部改授官未及以疾卒百錬由進士爲御史其文學皆有所自得非㝷常之爲進士者可及其仕必欲行所學不肯媕婀翫愒其所歷兩淮江浙廣東皆有政績見於其人稱道思慕未巳也而閒居無事乃遭罹􅀂此豈其命歟然而獨霑寛恤之令將改授官矣無幾竟卒信其命乎自百鍊被執泰和之人無貴賤贒愚來京師道其事者凡數十人如出一口故卒之日京師搢紳君子皆傷悼枉之古之人有言蓋棺論定百錬庻幾可以無愧楊氏於百錬累世姻婭雖百錬爲人素於余不相合然不合者一人之私也所謂傷悼枉之者衆人之公也君子不以私廢公故爲述其得罪之由爲哀辭使其家刻諸墓蓋曰屈於前尚可信於後也其行之見於墓銘者此不復出哀辭曰百里之民有耆有耄用其惇厚率民于道亦資正言裨輔邑里逝者何臧來者而否邑有視聽蔽其明聦衡從肆厲爲下斧斨貍以牧鶵狼以牧豚誰實使之於乎匪仁誰實聽之漫不加省惡者脫􅅈善者墜穽􅀡者鮮忿邪者衆說柔者以全剛者以折嗟世之人莫非命焉憎愛廢舉彼胡能然惟命之然成是邂逅譽毁得喪奚彼之詬嗟嗟百鍊命也奈何宵人之怡君子之嗟蔣隱溪輓辭三首顧瞻兮堂前卷帷幕兮藉蘭荃陳淸醑兮載肥鮮韻悲管兮切哀絃凄風激兮櫺軒雲黯黲兮􅂕來旋恍如睹於形色兮儼􅀂聆夫笑與言言可聆兮意不傳悵思公兮臨几筵北風凜凜兮天􅀨霜木葉脱落兮百草黄翩銘旌兮辭高堂登􅂕車兮秀冲岡蒿里歌兮哀以傷玄室一閟兮夜甚長䰟渺􅄅兮何方螺山崔崔兮螺川湯湯靑原與白鷺兮鬱相望悵思公兮遊故鄉玉珮兮瓊琚霓衣兮霞􅅂秉元化兮握􅂕樞列缺從兮豐隆趍倐隂而陽兮忽卷而舒睨視濁世兮如子渠飄然乗風兮凌太虚參王喬與韓終兮列仙爲徒遊紫微兮帝之都悵思公兮邈天衢楚林王先生哀辭有序楊溥予游鄉校時湖湘間有􅀂三吾劉先生南賔陳先生以碩學雅德顯名當時及予出仕皆物故矣毎以不及見爲憾今觀楚林王先生行跡乃知其與二先生爲同軰重有感焉先生子愷僉廣西憲司事憲僉之館甥工部虞衡郞中程鑑皆以廉能名詩書之澤尚存而先軰不可作矣爲辭以哀之辭曰楚山高兮湘水長仰浮嵐兮俯流光可樏兮可航懷高人兮長往獨惆悵而悲傷繄佔畢於鉛槧兮將求志於所獨也出膺民社兮亦非大贒之路也􅃡惟前脩孰不欲爲伊兮爲周抑有命兮何求嗟彼昧者由顯而河兮較其所􅀗孰爲優兮望瀟湘兮延佇挹馨香兮蘭浦諒天道之可徵兮尚有觀於先生兮楊處士哀辭有序胡儼處士諱美字子將姓楊氏元太和州文學諱榮之子翰林待制諱景行之孫贈富州尹騎都尉弘農郡伯諱復圭之曾孫其先系出華隂漢太尉震後爲廬陵人處士㓜頴敏讀書爲文超於行軰善事重闈以孝稱處昆弟克盡友愛其最難能者蹈危履險以塟其叔父雖盜賊兇愚亦感其誠意求之古人不槩見處士之德善如此然卒遭喪亂蚤世不克竟其所施誠可哀也旣卒之四十有四年其遺􅀌左春坊左諭德兼翰林侍講士奇懼濳德弗耀乃以劉禮所譔行述來徵言余惟有徳者必有後而後嗣之贒亦必本其先觀於諭德可以知處士矣故爲之辭曰􅀂有人兮好修承華胄兮西州抱德美兮襲淳烋王韞櫝兮不售華綵衣兮䋔䋔親余愛兮樂孔休鹿之鳴兮崇丘嗟子衿兮我求漸摩兮息游繄我心兮悠悠迎安輿兮山之陬攀桂枝兮聊淹留何狡童兮黠偷逞不􅁤兮競戈矛倐豕突兮怒擩肆毒噬兮仲叟有昊兮莫投涙浪浪兮曷能收旣不余兮閔憂反縶余兮見讐鷹忽變兮爲祝鳩幸余鑒兮慺慺斂遺骸兮裳裘閉重泉兮林之菆擷芳兮採莍奉朝夕兮綢繆嘅同氣兮拘浮捐余珮兮是醻念復路兮回輈野􅔚寂兮將誰儔對農人兮事鋤耰徒悵望兮西疇歲苒苒兮不我優悲鶗鴂兮鳴鵂鶹哀人生兮迫遒脩短數兮抑又何􅀹獨令德兮詒謀鍾厥㣧兮遺庥慶澤衍兮聲光流天之報施兮孰云其幽呉先生哀辭有序梁濳呉先生字孟勤吉之安城人予自㓜聞先生名甚熟及來史館始􅀗拜先生焉先生雖老色夷氣暢善道古今事終日不倦時方纂集太祖高皇帝神功聖德簡牘浩䌓事有弗得其端者或以質之先生先生手按其書口誦其語出其端緒節目􅀂引瓢而注之聽者如目睹其事蓋先生識見高明非徒能記臆也其於英豪偉傑之士心志謀畧設施後先亦自然符合於乎使先生用於時措之事業當何如也然先生方慕古之廉士其自視甚高不求阿色於時由是遂與世抹榝終身􅀒此自困不改也其爲文章簡質而溫潤操筆立成􅀂不甚經意者旣成讀之雖苦思力搆者不過是也史書成得􅀩恩賚授河南開封府學教授蓋聖上意以是可優老先生孰意先生遂去此長逝不返邪方去時翰林群公合交遊之士以相餞莫不舉觴相屬謂先生復來固將動色以相􅀱曾幾何時而盍􅆪牽袂之歡遂爲扼腕傷神之痛於乎悲夫賦之􅀷而未竟其施世固有如先生者豈非命邪先生長子善存謀返葬而未果今翰林學士解公巳爲銘其墓余因悲之以辭曰崇岡兮峩峩春將暮兮水增波蘼蕪綠兮桃始花悵獨望兮天之涯君不復來兮予恫而嗟學之茂兮弘暢承先啓後兮伊誰弗諒彼連駟兮充逵獨方輪兮焉之彼挿羽兮薨薨獨戢翼兮噤不以鳴名之光兮行之塞人弗施兮於巳焉汨古則然兮今奚惑汴之濵兮河之阻洪濤湯湯兮不可以度羗獨滯此兮不還雲横天兮地漫漫使我悲兮憂萬端酌清酤兮盈樽陳嘉殽兮藉以蓀神來歆兮不可以同吉之水兮孔幽上有叢木兮枝相樛君不懷兮故丘秋霜兮被野曠茫茫兮宿莾君曷寧兮故宇大明故左春坊左賛善贈太子少保謚文肅徐公誄辭有序金寔洪武壬午歳寔始來京師天台徐先生好古時方爲太學􅀶士與從父傅霖翁同官甚相好故寔得亟見先生引接良厚永樂二年仁宗立爲皇太子妙簡輔導之官先生由太學入爲春坊司􅀡寔時沗以翰林官屬進講經筵􅀗與先生朝夕同事旣而又􅀗同僚寔甞視先生爲父行而先生謝弗居遇之益親後寔以母憂去官巳亥歳復來京師値先生病巳篤聞寔至强起衣冠二子掖之坐出酒饌享寔亹亹談别後事爽然􅀂無疾者且曰老夫却粒巳期月日唯飲醇酒一爵今日見吾友當倍之復再舉爵一飲而命二子爲寔引滿數行旣醉辭去將趨行在先生送之及階執寔手謂曰吾亦當考績計不能北上幸爲我謝故人前途宜自重吾與子訣矣因嗚咽泣下寔亦不能仰視明日登舟而先生竟卒時十月二十一日也仁宗在東宫􅀷悼痛之自製文一再遣官諭祭且將裒其遺文梓以傳甲辰秋即皇帝位首詔贈先生太子少保謚文肅建祠墓下勑有司春秋有事復四家丁役以奉祠事嗚呼先生以純粹博雅之學勁正脩潔之行和而不可同謙而不可踰所謂有德有言者矣雖不及柄用以大其施而當儲君毓德之日能以聖賢治心脩身之道引翼取信卒光身後之名奚􅀒所學哉先生之仲子衍受辟爲邑校官奉少傳東里先生所譔墓誌示寔捧而讀之九京莫起益增感慕乃述其行爲辭以誄之曰天台之山上應列星俯挹渤澥高杭青㝠扶輿孕秀夫子是承稺齡卓爾弗詖弗傾􅀄游郡庠具曰老成論爲秀士首詔賔興實華彪炳六館蜚英繁曜麗空忽見夜明萬葩􅃲􅃩勁松獨貞司成嚴厲衆莫敢攖學徒千數畏􅀂雷霆惴惴揖拜慄蹈矩䋲夫子來覿煥􅀂釋冰開顏霽威如酗解酲實由徳孚孰曰意迎錫符分教士有􅁤程範鎔來秀􅀂冶剖鉶太學三年虀䀋味經濟濟多士于于在庭悉屏糟粕浥以醇淸儲皇毓德簡􅂌至精瓊琚玉珮峩冠彯纓引翼惟正啓沃惟誠旁塞多岐示之中行言出則俞有歌斯􅆳明良値遇宜作股肱胡不愸遺溘焉遐征哀訃上聞痛悼奚勝諄復􅐠遺終莫罄情迨于踐祚褒贈首膺秩崇師保謚錫嘉名尊軼三者榮重五更享祠聿建封域載營麗牲有碑玄堂有銘樹之松檟雜以楸檉歳時有事帝命使令牲肥酒香醆斚豆登薦祼興頫有赫厥􅂕玄液下滋幽光上升􅁉其孫子以及後生嗚呼夫子孰與抗衡疇昔好言遼邈九京光風霽月想見儀刑爰述衆美􅀉之哀聲有不知者庻幾可徴裴侍郞哀辭王􅀡公裴氏諱璉字汝器監利人初游學郡庠年甚少巳嶷然如巨人長者乆之升太學擢知劒州三年陞浙江按察僉事改江西坐累謫興州太宗在位召爲北京道監察御史陞河南按察副使又以累得其巢穴以計擒之而請釋其餘上初遣公謂還當大用而用事者嫉公絀其謀間踈之不召見而罷其爲侍郎􅀹侃侃自信敬㳟朝夕有大臣之體在劒昜時興學養士至親爲講說賞勤而􅂆惰諸生多賴以成流風餘澤今尚有存者蓋公之志夐然出儕輩故所至有立予之知者如此予所未知者計亦偉特猶是也平生淸約自持不苟取妄求仕四十餘年如一日雖累遭譴謫皆非以私過得之故毎斥輙復晚節優游以榮名終享有盛福此好德之驗也予爲諸生時巳􅀗瞻風采其後同朝又􅂶􅀷知公嗚呼今不復見矣則安能巳於情哉作哀辭繄公之生兮秀所鍾儼玉立兮偉儀容才旣美兮學則通氣浩然兮縮以充懷竒寳兮慶遭逢有民社兮奮厥庸興惠利得其巢穴以計擒之而請釋其餘上初遣公謂還當大用而用事者嫉公絀其謀間踈之不召見而罷其爲侍郎􅀹侃侃自信敬㳟朝夕有大臣之體在劒昜時興學養士至親爲講說賞勤而􅂆惰諸生多賴以成流風餘澤今尚有存者蓋公之志夐然出儕軰故所至有立予之知者如此予所未知者計亦偉特猶是也平生淸約自持不苟取妄求仕四十餘年如一日雖累遭譴謫皆非以私過得之故毎斥輙復晚節優游以榮名終享有盛福此好德之驗也予爲諸生時巳􅀗膽風采其後同朝又􅂶􅀷知公嗚呼今不復見矣則安能巳於情哉作哀辭繄公之生兮秀所鍾儼玉立兮偉儀容才旣美兮學則通氣浩然兮縮以充懷竒寳兮慶遭逢有民社兮奮厥庸興惠利兮蘇困窮建學校兮師文翁持憲紀兮楊淸風矯一鶚兮横太空植善柔兮除姦兇履巉巗兮窺崆巄殄冦難兮銷兵戎陪鶴駕兮熈事功搖玉珮兮鏘玲壠副六􅀸兮位愈隆勤夙夜兮甚嚴㳟涪之治兮安􅁞農嬉白叟兮歌黄童飼林淸秩兮恩所封煥勑命兮廻鸞龍優游以老兮當時雍頌詩作兮聲渢渢奄一去兮白雲中混希夷兮超鴻濛望不及兮心冲冲帷疇昔兮抗高蹤事聖主兮暨三宗柔淸德兮將無同善其始兮愼其終宜壽考兮齊喬松胡不愸遺兮天夢夢彼狪兮愚且蒙乃悠乆兮昌而半欲往問兮安所從蹇徘徊兮發哀恫思公不見兮奈何乎公弔陳先生文王英予嘗至番易自浮梁山中道經德興父老言前令陳公孟藻徳政爲卓魯民受其惠惜去而亡矣後之爲縣者皆貪刻苛猛予聞而悲之是時公殁乆矣予與公之子敬宗登進士同官于朝又得備考公之行誼追悼往昔爲文以遺番人俾永其思其辭曰余浮番以遠征兮歷先生之故治遺老泣而告余兮嗟後時巳十祀心悵怳以永懷兮宵耿耿而不􅄰顧惟此而徬徨兮嗟􅀂先生豹隱幽壑兮虬濳重􅈚處困而亨兮藏晦以明志熈恬愉兮其蘊則宏望之興周兮說逢于殷處此下邑兮不驟以進綰章與綬兮佩仁履信彼狡之氓兮欺則弗􅃘澆者旣敦兮鶩者益遠嗟哉其此去兮卒莫我返鴟梟翶翔兮鷹鸇利吻張呀互赫兮爭饞肆忿􅅝嘵而群處兮旣飫且吐登稂莠以爲饋兮毁棄黍稌衆離嗷嗷兮疚餒待哺夫豈不懷先生兮如失父母故世之所惜兮謂先生內實無疚而其所悼兮曰年未中壽材宜棟梁兮胡乃橐朽車可任遠兮輪折而覆道才可以經濟兮施則未究顏天而冉疾兮人孰其詬彼或幸其災兮何疾美而夸醜惟尼父之興歎兮曰善人吾弗覯余故撫膺而􅀷喟兮獨揮涕以隱􅁨已矣乎先生不可見諒逹人其大觀兮處順而知變視有形而終化兮理固宜然彼崆峒與玄圃兮杳而莫攀彭聃之矯矯兮今安在焉惟死有所不泯兮斯乃爲貴黔婁終窶兮柳下惠之薄仕宓子賤之有譽兮仲􅀸之有嘉惠旣在古以爲然兮豈今世之能違故余祛衆惑之慘戚兮以申先生之思睇列星於㝠漢兮雲霧滃而神馳巫减爲余致處兮招遺􅂕而來歸奠桂酒與椒漿兮重􅁣想於昔時中鬱抑而坎坎兮乃斐然而陳辭庻百世之下兮惟先生之是思哀劉兩溪辭有序周叙余以使命道湘川悲屈賈之懷忠齎志以殁用效其人之聲各爲辭弔之使歸便道過家上冡瞻望安成有懷故人劉兩溪欲絮酒致奠迫於王程不能得停雲延佇沾灑者乆之兩溪之事視屈􅀹􅀷足悲者時當承平主上㭟勤與民休息第蔽於權幸政務乖張災異數見兩溪侍講經筵感激奮發因事指陳光明正大遂忤權幸設他事下之獄黨惡者順旨栲掠體無完膚梃然無一異詞唯呼天自明越數日竟就斧極刑秉屈三閭之精忠罹顔常山之荼毒於乎慘哉兩溪平生孝友篤至於朋友急信義教人盡誠懇居常侃侃以古人自期安成春秋之學自李行簡先生後紹而大之者兩溪也其在經筵毎遇譔進講章非堯舜三王之道不陳至於麟經尊王黜霸內夏外夷之辨尤􅀷致意眞得講臣體使不遭酷禍所成就可量乎哉於乎悲夫兩溪余平生同志友也情見乎辭有不能巳用寫哀些三章向風焚以招之且鋒藳秘而藏諸篋笥他日兩家子孫得而閱讀之庻知兩溪之忠與余之悲兩溪諱球字求樂一字廷振兩溪者其弟子尊稱之詞世家安成茨溪後徙家之葛溪余則周姓敘其名功敘其字石溪其號也辭曰曕雲山兮安成西懷故人兮我心惋悽虎豹晝號兮鴟梟夜啼隂風悲慘兮毒霧㝠迷欲往招之兮睇艱險而無蹊天茫茫兮至道睽名昭昭兮日月齊於乎歔欷兮懷哉兩溪瞻雲山兮薊城北懷故人兮我心哀惻天門晝關兮虎衞阨塞蛇虺縱橫兮夔龍斂迹欲訴帝之無由兮道邅迴而屏息魂恍恍兮渺何極淚淋淋兮氣填臆懷哉兩溪兮􅁈誰與白瞻雲山兮湘水幽􅃡懷古之人兮我心增憂古人今人兮我何􅀹攄忠滅身兮異世同猷哀莫哀兮沈清流慘莫慘兮魄野投死生一視兮如彼浮漚千秋萬古兮屈劉匹休大傅安國孫恭憲公誄劉定之維昔太公生周邑姜婦文嬪武孕成啓康受封于齊今幾千禩維安國公復起齊地篤生聖后配我宣宗以毋皇上迺登三公維公之徳以敬爲主曾蘊丹書厥名迺取維公之爵自伯而侯進號大􅀖寵祿優優維公之壽踰八望九玉蟬金貂輝映白首壽爵及德與太公同亦葬于京􅂕旐不東內相期頥後昆䋲蟄五子十孫殆過吕伋皇家萬年誰與齊休曰伯叔舅異姓元侯皇明文衡卷之九十六
