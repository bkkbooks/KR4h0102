body:
  text: 序送周遜學赴長洲儒學教諭序貝瓊今年春予與會稽趙俶錢宰金華鄭濤同􅀍召至京師授國子􅂇教秋八月望預朝奉天殿詔臣俶等至御前命之曰汝壹以孔子所定書誨諸生若蘇秦張儀繇戰國尚詐故得行其說宜戒勿讀旣受命退而思曰古人有言曰孔子讀而儀秦行鷙翰而鳳音也天語及此豈非灼見其說不徒惑戰國之君天下後世且惑之心術之螙莫過扵此歟孔子之道自堯舜禹湯文武所傳著之易詩書禮樂春秋者大中至正歷萬世而無弊也不幸亂扵百家而百家之中縱横爲甚以其功利中君所好莫不說而從之視儒者之言仁義則爲迂而不用矣此一時習扵傾危險陂前後一轍不能回其所向之途可勝嘆哉然古今帝王皆知尊孔子而斥儀秦未有舉其詐以戒人使禁所習而趨扵正者敬識扵心造次不忘凡遇諸生必懇懇告之焉蓋學孔子則進而爲信爲善極扵大而聖聖而神不翅梯之升高航之渉遠也秦儀智謀之末君子之所羞道者惡可襲彼之所爲乎大抵率人以正猶懼不勝其詐矧以詐率人其不正又何責歟此上之命臣俶者將一洗天下之習而復乎三代之淳大哉言乎河南周遜學者正道先生之子也器宏而有學搢紳咸器之蘇之長洲縣司教職缺縣上之府府上之部試其文攷其行遂授教諭以歸人皆謂偃革右文之日莫先扵教化師儒之位雖卑凡藝優而德不足譽隆而道不明者弗與也其愼而不輕如此則遜學視彼屈扵事者優劣何如也其行也士大夫歌詠以華之且求余序其首因舉以告遜學宜訓長洲之子一扵正而無惑秦儀之邪說可也送開學臣先生歸洛陽序昔洛陽賈誼爲漢􅀶士一歲中超遷至太中大夫請改正朔易服色定官名興禮樂立漢制更秦法文帝雖謙讓未遑且議任公卿之位諸大臣忌而短之出爲長沙􅀓夫高皇帝之有天下事多草創而一代制作不可以不定者絳灌之徒智弗及誼而帝又不能用此余􅀷爲在上者惜也今國朝偃革右文方復三王之治凡誼之言扵漢者不待請而皆行矣處士開先生者亦起扵洛陽爲國子􅂇教嘗自比扵誼人亦以誼期之時大臣無忌而短者其至公卿不難也未幾以病謁告留京師治之六月病乆不愈廼遣歸此余又爲在下者惜也鳴呼山川神􅂕降生奇偉磊落之士古今不數人固將使之有爲扵時也然遇時之可爲而皆不得有所爲不知其爲天道何如邪􅀄余與先生同在成均資其講習之益一旦離散分處不能不爲之惘惘矣矧以衰老之餘攝官承乏與四方雋秀相周旋而回望其放扵嵩邙􅗉榖間追逐雲月爲事如誼所謂鳳凰自引而去麒麟莫可係而羈者竊有愧焉士大夫咸賦詩以送之屬余爲之序扵是乎書精誠錄後序鄭楷天子之所以奉天而勤民臣下之所以竭忠而事君者無他道焉亦曰精誠而已矣􅀂夫人子之養親則無間於上下而又兼乎愛敬者也我朝太祖高皇帝以廣運之德貫列聖之道萬機之暇拳拳乎天人之理恭黙思道豁然有契於心嘗命文臣采經書之語及於欽􅀂忠孝者􅀋爲一書賜名曰精誠錄而頒之王國焉其不言之教蓋亦至矣臣楷恭承寵命得備員進講伏蒙睿㫖命教授臣顧祿臨寫此書臣楷爲之後序將欲重刻摹印以廣其傳焉臣楷受命戰兢懼弗克荷以爲玆錄出自太祖宸􅂨而殿下􅁇在祖之志述太祖之事宜得老於文學之臣而鋪張之而乃命之於寡陋之臣此臣所以戰兢懼弗克荷者也切聞惟辟奉天惟子止孝惟臣以忠其皆本於精誠乎精誠者天之道也天者理之所自出身者親之所由生爲君者理我所以生者也君能精誠則奉天之道得矣臣能精誠則事君之道得矣子能精誠則事親之道得矣而其精誠之所以致其力焉又皆本於敬乎敬者聖學之所以成始而成終者也伏惟殿下德邁前王心存聖學誠敬精微之道實與太祖同一機而無間者也所以人同此心心同此理而思誠以造夫精誠者蓋如此太祖創之扵前殿下廣之扵後是編一行家傳人誦前聖之經一展卷而大綱舉一入心而忠孝生則帝王垂􅁉之道至矣盡矣孔子集群聖之道而爲一大成實萬世之永頼焉精誠之錄同一揆也送趙永明之金華序王琦有志乎遠大之學者非苟以文辭自衒而巳蓋文所以載道外扵道而有工扵文無有也世之言曰文者言之精言不精不足以成文故日罷扵誦夜費扵思鋪鏤聮疊緣飭繪繡以爲工且至然卒不過如㳺說之浮辭徘優之戲談且老生得之以欺後輩後輩得之以侮固列扵道無與也道者所以扶綱常而紹典則今也學扵師則曰彼雖善扵是而繆扵此彼長扵此而短扵是吾亦聊從而師之講扵友則曰彼雖長扵我而才不及彼後扵吾學而智不逮吾亦聊從而友之扵道無取也嗚呼求言之精而無與扵道求學之專而道無取焉使蔓辭日興繆說日廣詆訾辯議訕謗排撃則文安得不爲學者累哉余舊學扵金華濳谿宋公聞緒論之未未嘗不以此爲􅀷戒黃巖趙永明弱冠爲文逈出倫輩而余未之友今年秋至郡城友人林公輔出永明文數首皆烜爛敷􅃾閎闊肆縱比物引􅀋悉有可稱且將從濳谿公而取正其殆有志乎遠大之學者文固不足爲永明累也文中子曰文乎文乎苟作云乎哉必也貫乎道學乎學乎愽誦云乎哉必也濟乎義余誦斯言也乆扵永明之行不敢不以告永明異日造金華知公所以教永明者亦當不外乎文中子之意也送楊湖州序劉夏王者之取天下天心順扵上人心應扵下斯可以得天下矣十數年前彼君天下者其政治弊扵不修四方豪傑竝起百姓肝腦塗地當此之時紛紛紜紜似乎人衆可以勝天而天心亦爲之震蕩􅑾杌而不得底扵寜謐也十數年後我國家歷試諸艱大戰江湖决成敗之幾于兩陣之間以嘗試天心之所向背矣􅀍天心㫁㫁然不我釋也天旣不我釋天下億兆人心又安能釋我而他之乎然則天與之矣人與之矣猶有不來庭者我則起而取之矣扵是考圖數貢以江南之大而浙右數州之地近在肘腋尚爾未入版圖乃命將帥師先取湖州頼天心之眷頋已宻而人謀之恊從斯臧甲兵府庫全城歸附上見湖民之乆在辱也又念湖民之新被兵也乃不得已輟近侍之臣徃撫之用是中書左司郎中楊克明受命出知湖州楊公通練沉敏諳扵大體又不遺于細故湖之父兄耆老宜教其子弟曰自今以始服楊公之教令爲上新民凡奢麗敝壞之俗不可爲也偷惰放肆之風不可有也其君子則豹變羽翼于聖朝其小人則革面耕鑿于田里今湖民無死傷之憂有妻孥之樂爾但知民心鄉順之􅃱然未必知天心之吏爾然也故太守下車爲言爾之所不知者贈詹學士出使序洪武元年八月皇上臨天下􅁣然謂丞相宣國公曰治天下雖用匠手有規矩繩墨然後百度可貞也乃議建三省立六部拜諌議大夫設登聞鼔院罷通租不征下詔責躬求天下巖穴􅀷藏不售之士頋元臣秦􅁉伯曰斗米三錢外戸不閉朕力行三年可以臻兹至理望道之勤沛然若决江河莫能禦扵是儒臣十人受命分行十道訪求賢哲與之共理天下而學士詹同文與焉詹公恢䟽倜儻嘗爲考功郎時余與儕輩三十餘人皆􅀠考人心如􅀷淵不測公投長竿􅊥知其尺寸之所底止用此道以求天下士設有姦邪小人飭詐釣名安能誣我而冐進也邪而余也吏尚賓舘惟當飭墻壁治几席以爲天下大夫君子先容者焉舟行分韻賦詩序朱同皇帝有天下之四年有旨盡取羣儒以選任之四方多士雲集輻輳徽之先在是行者十人維時舟次南陵之毛家浦蘆葦生風東溟出月竝舸中流傳觴唱和共歎人生出處之難而聚會之不易得也扵是以杜工部星臨萬户動月傍九霄多之句分韻賦詩以紀之且以寓夫箴規之意而令僕叙其首僕以爲唐虞三代之隆處君師之位以政教臨民者皆眞儒也心法之傳教養之道政刑之具載方冊世變日下風氣日漓扵是政教判爲二途君人者有崇儒之美名而未得眞儒之實用爲儒者窮經皓首而未得盡行其道扵時下扵是者或拘古今異宜而不適扵用或學非所守而反悖於經先王經世之大法或幾乎息矣今天子以神聖英武之資龍蜚江左掃蕩羣雄不數年而天下定于一乃罷黜百家一用純儒豈非世道之將隆斯文之大幸而爲儒者所宜􅃱思乎夫學貫天人功􅀍萬世文足以經􅀖武足以撥亂者眞儒之學也學有淺有􅀷而不可以強齊者也守寒素之舊而無驕奢之習知廉恥之義而無汗下之爲不立異以要名不屈道以求合行止去就一盡乎在我而無一毫利害計較之私者眞儒之守也守則吾儒者之所當同者也况新安吾考亭夫子桑梓之􅀖道德性命之學禮義廉恥之行漸摩旣乆諸公㓜而學壯而行今也遭聖明之世洽教養之澤當盡藴奥以濟時守名節以律巳而無􅀒乎聖天子用儒之意則豈徒斯文之幸而已僕也不孝罪重父喪未期毋疾未愈而衰絰以隨諸公後斯綱常之重治教所先必當得請而歸者是以不復辭而􅃱其學守之說爲諸公别且將􅉥足林下以徯所謂好消息者為吾􅀖斯文之慶幸也公其尚有取扵愚言乎同是行者婺源四人胡原昉江道全江道原胡德耕休陽五人余子韶朱曰可汪銘徳汪德懋江彦名余歙人朱同也麟谿集序張紞麟谿鄭氏爲東南著姓篤扵行義海内稱之洪武丙子紞自雲南入覲暏左庻子濟扵朝行見其循循雅飭不願乎外詩所謂其儀不忒者庻子有焉聖上簡出羣倫寘在左右俾羽翼東朝矜式天下其扵化民成俗之意吁其至矣庻子字仲辯義門之八世孫嘗請于余曰有家以來旣多歷年所朝賢郷彦所以稱述而光賁之者代不乏人前此固巳會萃成集矣洪惟龍德御天人材輩出後之作者未艾也隋珠和璧胥歸寳藏謹續成一編于以宣揚德化侈上之恩而先業遺緒亦藉以無忝幸爲序紞遜謝再三乃修辭以對曰嗟乎分形連氣同具是理而不能不壞扵人欲何鄭氏之愈遠而愈盛也何鄭氏之能通其變而制其宜也竊求其故不由周禮本俗之道族墳墓聯兄弟無所不用其極本支相保當薄而踰厚世有鄭氏猶景星麗空鳳嗚朝陽眞曠世之祥也雖然經言百世而没其共㸑之文聖人非不欲之蓋亦難爲之制耳今假以一生二爲法自二而下倍而數之究于十世爲子孫者千二十有四人􅁇稱之宗將居其半惟大宗當祭于廟餘皆室祭室祭無所君子之所隱也且子事父母雞鳴而起問安視膳各欲盡其私情若千人聚居一有不惬勢必有向隅而泣者扵斯二者處之特難是故通其變使人不惓時而措之與之宜之乃君子之㣲權也聖人慮世雖遠又安得以權爲制哉所謂權者無私恩則不足以親親無公義則不足以尊祖私勝則義爲恩揜公勝則恩爲義屈節其親䟽量其恩義執兩端而用其中上不忘一本之澤下不失羣從之懿自非權度精切何以與此􅀼嘗因父子異宫之說而思之大畧倣古者諸侯廟制五世一宅各有祠而摠爲􅉹宇以郭其外庻幾事親奉祭各得其所庻子可與言者率爾及此以終序述之意或亦處家之一道云贈鄭顯則序方希古天下之論文者嗜簡澁則主扵奇詭樂敷暢則主扵平易二者皆非也文不可以不工而惡乎好奇文不可以不達而惡乎淺易淺易以爲逹好奇以爲工幾何不至扵恠且俗哉善爲文者貴乎奇其意而易其辭驟而覽之亹亹覺其易也徐思而繹之雖極意工巧者莫加焉若是者其爲至文乎聖賢之文與後世之辭純駁工拙多寡不大相遠也而世人望之若天然不敢指儗之者以其不務奇其辭而竒其意故舉天下好奇者莫及也使其意不能過扵衆人而惟辭之修安在其爲竒也哉日月之在天隮扵東而行扵西昏明扵晝夜盈􅃜扵晦朔自有天地以來未之有易也天固不規規然求異以駭人之視聽然愈乆而彌新愈廣而無窮則爲奇也大矣尚何以異爲哉至扵􅀑燐之變滅不可以理推其跡雖似乎奇而其爲明也微矣近代文士有好奇者以誕澁之辭飭其淺易之意攻訐當世之文昩者羣和而從之而三吴諸郡爲尢甚此皆挾􅀑燐而訾日月者也其力雖不足爲斯文害然不除㓕而禁斥之何由復古之盛乎今天子憫斯文之不逮古擇太學之士而教之吾郡鄭君顯則與焉顯則爲文不好爲奇而亦不流扵易蓋學而得其正者也予竊有志扵變天下之文而患不得友天下之賢誠得如顯則者數十輩其趨古人之道以自見扵世其崇且大者可明也况扵文乎今猶未之遇也烏得無􅁣然矣乎吾聞文與政化相上下安知今之文果不古􅀋哉顯則誠以吾言求之有合扵吾言者吾不謂之今之士也送太學生趙孝先從軍詩序臨海趙君孝先爲國子生其父老矣當爲兵京師孝先奮曰吾不代父誰當爲父言者卽告祭酒以願代􅃺未許則言于禮部事聞詔可之釋其父遣歸孝先得命喜不自勝如疾甚遇藥如積雨􅀗見日月如羈旅亡聊而􅀗祿位也卽變服以行愛孝先者曰孝先誠愛父矣然何不自重也有才如孝先蓄學踐行如孝先有聲名如孝先旦夕當爲美官官于朝而以情請上未必不許也而何急自代爲哉爲世惜才者曰國家地盡四海執干戈職戰守者如林所少者豈一兵乎而使孝先爲之也夫以孝先行能用之誠當其所長扵民必有􅀘益課其績効孰爲寡多烏可狥一夫之私願而失良士哉孝先之友方希􅀡聞之曰愛孝先者非知孝先者也爲世惜才者安知國家之􅀷惜乎以已視人則巳重而人輕重者宜先輕者宜後也以親視身則身輕而親重苟爲榮辱計而忘大義縱得大位何能一朝安中人且不忍爲况孝先卓卓良士乎聖天子天運神斷以成大業其所舉措不易而審亦明矣豈不知孝先也豈不知兵之用薄得士之效大也辟之天然將欲暑之必先寒之將欲成之必先難之昭昭生扵太隂隆隆隱扵至微安知抑之非揚舎之非用乎安知萬金之非輕秋毫之非重乎且士之所學以善俗化民爲本孝先一舉而使天下士莫不自濯磨奮發知親之不可遺祿位之不可苟由是而子則爲孝由是而臣則爲忠有益扵人紀豈不甚大其扵爲人豈不甚可貴乎扵是言者謝曰非聖天子之仁不足以遂孝先之志非孝先之知學不能處其身以道信乎士不可不學也乃相率爲詩以美之而余書其說以序之􅂐書考正辯僞序由古以之今存乎􅀔援今以反古存乎人天下之􅀔舎厚而趨薄舎謹而爲慢舎難成而爲易習如水之下流滔滔汨汨不至扵極不止非有篤志卓識者不能知其不善而亟及之幸有一人知其不善矣自非達而在乎位亦不能奪舉世之所嗜而挽之復乎古是以二帝三王之禮樂政教餘文舊俗歷數千年以至于今時易世遷幾至扵不可復者豈無豪傑之士生乎其間而欲正之哉獨智不足以啓羣惑言之者一而誹笑之者千萬雖欲回流俗之􅀔而不能也六書扵民用最切而其變爲最甚自􅂐而爲分􅀠自分􅀠而爲行草目趨簡易輕渉流蕩而無法使古人復生而視今之字必將駭眩而驚嘆而人頋鮮有知其非者間有好古之士知之而力不足以制巳然之􅀔不過著之扵書以發其所得自漢許叔重說文以來著書之存扵世者雖有精粗詳畧之殊而其用志􅀷遠終非流俗所及然世之知而好之者巳難乎其人好而能通其意考其得失補其未備而羽翼之者宜乎其尤難也寧海方塘先生王君仲芳自少篤志古學至老不倦嘗病俗字之亂眞害正本諸古以正未流之失作文字考正辯僞之書以示學者其言皆有徵據不爲臆說使人人因其言而求許氏說文以􅊥古人制作之初意引天下以復乎古寧有禦之者乎雖然文字之學蓋學者之一事耳天下所以治亂存亡者不專在是也并牧變而民無定志比閭族黨變而􅀸無善俗蒐狩師田之法變而國費扵養兵讀律飮射之法變而官疲扵聽訟其大者如封建學校其小者如名物衣冠其異扵􅂐之行草者曾幾何哉予嘗妄欲爲一書以正訛解惑而未之遂先生之父秘書公以􅀶學多識爲元聞人其所受而知者蓋非特字學而巳苟有大扵此者論次成書以補六經之遺缺洗百世之陋習豈非學者之所望乎予庻幾預聞之贈王仲縉序饑而食飽而嬉營私而騖利生無聞而死無述者衆人也食焉而思思焉而行不憂其身之窮而憂道之不修不懼其家之無財而懼乎名之弗揚者君子也衆人之所爲切扵身而見效近故人之趨事者夥君子之所務事旣緩而功亦遲故衆人多笑之而不知衆人之所爲又君子之所悲也吾昔年舟還自金陵泊姑蘇城下舟人指城中大第謂予曰此元僞吴張氏宫也予問今其家安在則巳無噍􅀋矣問其人名字則巳莫有知者矣及至錢塘道西湖舟人數謂予言林處士事曰此處士故宅也此處士墳墓也此處士曾逰之地也予未嘗不爲之太息方張氏盛時據數州之富擅王侯之貴驅百萬之人以給其所欲其車服宫室妾媵珍寳騶從師徒􅆫擬乘輿亦自謂一時之雄矣而今未下十年乃若此處士在時破廬弊褐羸童野鶴出入扵烟霞水石間其窮困莫比今越二三百載姓名猶灼然在人耳目則區區之富貴者何足道而士之貧賤又何足憾哉且處士特一詩人其自立者非能如聖賢之宏大􅀷遠足以明斯道而淑來世猶能如是况夫君子之希聖賢者乎吾友烏傷王仲縉年少好學其所志甚美而其鄉人竊笑之以爲迀仲縉告予予恐其沮扵衆人之笑也故告以斯說使仲縉知爲學之足恃而益思自勊使衆人知所有者之不足道不暇笑人而自悲也送陳克彬歸臨江序王叔英余自兒童時則聞江西多􅀶學髙才之士衣冠文物之盛甲扵天下然其民性率多輕悍忌􅃛爲俗喜爭而善訟故其最爲難治而南昌贛吉爲甚而臨江爲尤甚􅀚其諺語之傳扵四方者可知矣是以天下之仕者莫不憚官扵其地而其人之官扵四方者亦莫不見憚扵人至扵旅寓扵江湖通途之間者或遇其人亦莫不憚之而不敢驟與之交然余自弱冠以來徃徃見其人之來官扵吾􅀖者或以廉稱或以能顯或以謹厚見推其愚劣不稱任者固鮮而其以非道御物者亦不多見余固知江西之多才而疑人言不可以盡信矣今年余來金華之永康永康之令劉公某南昌人也丞謝公某吉安人也二公皆以廉謹得民余至永康二公皆先以事去雖不及識其爲人而聞諸邑人之言可以知其爲君子固亦猶見之矣邑之稅使陳志善者臨江人也數過余邑庠其人温謹樂易與物無競而其子克彬適自臨江來省爲人亦如其父而其才氣又自有出人者余扵是益知江西之多才而益疑人言之不可以盡信矣豈其風俗與化移易而其人今非昔比也邪將余之所見皆適値其出扵衣冠文物之胄者故有以㧞乎其流俗邪是固未可知也使其人皆如余所見固云羙矣使其俗果如予所聞則居其鄕而爲其民之秀者豈不宜思所以變之之道乎余聞古之以匹夫而化鄉人者蓋有之矣頋其身之所立何如爾今克彬之歸也其尚益修其身以余前所聞之俗爲鄉人戒以去其惡以余後所見之人爲鄉人勸以進扵善自一鄉而及扵一邑自一邑而及扵一郡以及扵一方使天下之仕者樂官扵其地而其人之官扵四方者亦見樂扵人而旅寓扵江湖道途者亦莫不樂其人而願與之交如是則天下之人言江西者不特稱其學士大夫之賢矣豈不盛歟不然而或終使天下之人憚之如余所聞者固非四方君子之所願聞又豈不爲彼方君子之所恥哉雖然予浙東人也浙之民俗視江西伯仲之間耳又安知天下不視之猶江西之人乎余之言蓋非徒以勉克彬也亦因以自勉焉皇明文衡卷之四十一
