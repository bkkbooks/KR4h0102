body:
  text: 行狀故誠意伯劉公行狀黄伯生祖庭槐字尚德追封永嘉郡公祖妣梁氏追封永嘉郡夫人父爚字如晦追封永嘉郡公母富氏追封永嘉郡夫人公諱基字伯温世爲栝蒼人年十四入郡庠從師受春秋經人未嘗見其執經讀誦而黙識無遺習舉業爲文有音氣决疑義皆出人意表凡天文兵法諸書過目洞識其要講理性於復初鄭先生聞濂洛心法卽得其旨歸先生大器之乃謂公父曰吾將以天道無報於善人此子必髙公之門矣後􅀿進士舉授江西瑞州府髙安縣丞掲文安公曼碩見公謂人曰此魏徴之流而英特過之將來濟時器也公在燕京時間閱書肆有天文書一帙因閱之翊日即背誦如流其人乃大驚欲以書授公公曰巳在吾胸中矣無事於書也之官以廉節著名發姦擿伏不避强禦爲政嚴而有惠愛小民自以爲得慈父而豪右數欲陷之時上下咸知其㢘平卒莫能害也新昌州有人命獄府委公覆檢案覈得其故殺狀初檢官得罷職罪其家衆􅀝􅂪古根脚欲害公以復讐江西行省大臣素知公遂辟爲職官􅁺史以讜􅀡聞後與幕官議事不合遂投劾去􅀮居力學至是而道益明後爲江浙儒學副提舉爲行省考試官湏之建言􅁥察御史失職事爲䑓憲所沮遂移文决去嘗遊西湖有異雲起西北光暎湖水中時魯道原宇文公諒諸同遊者皆以爲慶雲將分韻賦詩公獨縱飲不顧乃大言曰此天子氣也􅀿在金陵十年後有王者起其下我當輔之時杭城猶全盛諸老大駭以爲狂且曰欲累我族㓕乎悉去之公獨呼門人沈與原置酒亭上放􅁔極醉而罷時無能知者惟西蜀趙天澤知公才器以爲諸葛孔明之流嘗作文以期之方谷珎反海上省憲復舉公為浙東元帥府都事公卽與元帥納隣哈刺謀築慶元等域賊不敢犯及帖里帖木耳左丞招諭方㓂復辟公為行省都事議􅀵復公建儀招捕以為方氏首亂掠平民殺官吏是兄弟者冝捕而斬之餘黨脇從詿誤宜從招安議方氏兄弟聞之懼請重賂公公悉却不受執前議益堅帖里帖木耳左丞使其兄子省都鎮撫以公所議請于朝方氏乃悉其賄使人浮海至燕京省院䑓俱納之准招安授谷珎以官乃駁公所議以為傷朝廷好生之仁且擅作威福罷帖里帖木耳左丞輩羈管公于紹興公發憤慟哭嘔血數升欲自殺家人葉性等力沮之門人密理沙曰今是非混淆豈公自經於溝瀆之時耶且大夫人在堂􅀅何依乎遂抱持公得不死因有痰氣疾是後方氏遂横莫能制山越皆從亂如歸公在紹興放浪山水以詩文自娱時與好亊者㳺雲門諸山皆有記行省復以都事起公招安山㓂吴成七䓁使自募義兵賊拒命不服者輙擒誅之畧定其地復以爲行樞宻院經歷與行院判石末宜孫守處州安集本郡後授行省郞中經畧使李谷鳳巡撫江南諸道採守臣功績奏于朝時執政者皆右方氏遂置公軍功不錄由儒學副提舉格授公處州路總􅃹府判諸將聞是命下率皆解體勑書至公於中庭設香案拜曰臣不敢􅀒世祖皇帝今朝廷以此見授無所宣力矣乃棄官帰田里時義從者俱畏方氏殘虐遂從公居青田山中公乃著郁離子客或說公曰今天下擾擾以公才畧據括蒼併金華明越可折簡而定方氏將浮海避公矣因畫江守之此勾踐之業也舎此不爲欲悠悠安之乎公􅀏曰吾平生忿方谷珎張仕誠軰所爲今用子計與彼何殊耶天命將有歸子姑待之㑹上下金華定括蒼公乃大置酒指乾象謂所親曰此天命也豈人力能之耶客聞之遂亡去公决計趨金陵衆疑永决母夫人富氏曰自古衰亂之世不輔眞主詎能􅀗萬全計哉衆乃定或請以兵從公曰天下之事在吾與所輔者爾奚以衆爲乃悉以衆付其弟陞俾家人葉性朱佑等叅掌之且曰善守境土母爲方氏所得也勿憂我適總制官孫炎以上命遣使來聘公遂由間道詣金陵陳時務䇿一十八欵上從之㑹陳氏入宼獻計者或謀以城降或以鍾山有王氣欲奔據之或欲决死一戰不勝而走未晚也公獨張目不言上召公入内公奮曰先斬主降議及奔鍾山者乃可破賊爾上曰先生計將安出公曰如臣之計莫若傾府庫開至誠以固士心且天道後舉者勝宜伏兵伺􅂩擊之取威制敵以成王業者在此時也上遂用公䇿乗東風發伏擊之斬􅀗凡若干萬上以克敵之賞賞公公悉辭不受中書省設御座將奉小明王以正月朔旦行慶賀禮公大怒罵曰彼牧竪爾奉之何爲遂不拜適上召公公遂陳天命所在上大感悟乃定征伐之計遂攻皖城自昬逹旦不㧞公以爲宜逕㧞江州上遂悉軍西上陳氏率其屬走湖廣江州平上使都督馮勝將兵攻某城命公授方畧公書紙授之使夜半出兵云至某所見某方靑雲起即伏兵頃有黒雲起者是賊伏也愼勿妄動日中後黑雲漸薄回與靑雲接者此賊歸也即銜枚躡其後擊之可盡擒也衆􅀄莫肯信至夜半詣所指地果有雲起如公言衆以爲神莫敢違竟㧞城擒賊而還王漢一以饒信降上命公撫之陳氏洪都守將胡均美使其子約降請禁止􅀂于事上􅀄有難色公自後踢所坐胡床上意悟許之均美遂以城降初公聞母富氏喪悲慟欲即歸上以書慰留之期以成功公不得巳遂從征伐至是辭歸上遣禮官律伴累使吊祭恩禮甚厚時苗軍反金華栝蒼殺守將胡大海耿某孫炎等衢州或謀翻城應之守將夏毅懼無所措㑹公至卽迎入城一夕定之公卽發書金處屬縣諭以固守所部遂同邵平章諸軍克復處城擒苗帥賀某李某處州平公至家營塟事時語所親以上必當有天下之狀於是鄕里及隣附郡縣翕然心服方氏雖據温台明三郡其士大夫皆仰公如景星慶雲其小民亦未嘗不懷公之舊德也方氏素畏公名時遣人􅃱書奉禮公不敢受使人白于上上因令公與通問公因宣國家威德力氏遂納土入貢上時使人以書訪軍國事公卽條答悉合機宜某年月日公赴京道經建德今嚴州也適張氏入㓂時曹國公守建德欲􅁬擊之公乃使勿擊曰不出三日賊當自走追而擊之此成擒也比三日黧明公登城望之曰賊走矣衆見其壁壘旗幟皆如故且聞嚴皷聲疑莫敢􅁿動公趣使疾進兵至則皆空壘擊皷者乃所掠老弱耳遂窮追賊迸走至東陽悉擒之以還公遂至京時陳友諒據湖廣張仕誠據浙西皆未下衆以為蘇湖地肥饒欲先取之公曰張仕誠自守虜耳陳友諒居上流且名號不正宜先伐之陳氏旣㓕取張氏如囊中物耳㑹陳氏復攻洪都上遂伐陳氏因大􅀾于彭蠡湖勝􅀒未决公宻言於上移軍湖口期以金木相犯日决勝上皆從之陳氏遂平上還京定計取張仕誠因定中原拓土西北公宻謀居多上或時至公所屛人語移時乃去雖至親宻莫知其由以公為太史令一日公見日中有黒子奏曰東南當失一大􅀅時叅軍胡􅀷伐福建果敗没他日公見上上方欲刑人公曰何為上語公以所夢公曰是衆字頭上有血以土􅀓之得土得衆之象􅀿在得夢時三日當有報至上遂留所欲刑之人以待之三日後海寕以城降果如公言捷至上大喜悉以所留人俾公縱之某年月日熒惑守心群臣皆震懼公宻奏上宜罪巳以囘天意次日上臨朝卽以公語諭群臣衆心始安後大旱上命公諗滯獄凡平反出􅀂干人天􅀿時􅀨上大喜公因奏請宜立法定制上從之張仕誠平後張㫤欲乱政乃使人上書稱頌功徳􅂆上宜及時爲娱楽上以示公公曰是欲為趙髙也上頷之㫤色動知公得其情也乃使齊翼嚴䓁伺察公陰事欲䧟之未及發而㫤先事受誅及司天䑓災翼巖因爲書言之於上其事多公平日宻聞於上或上使爲之者翼巖未之知也書奏上切責翼巖斬之遂治黨與盡得其與㫤通謀狀上適以事責丞相李善長憲使凌悅因彈之公爲上言李公舊勲且能輯和諸將上曰是數欲害汝汝乃爲之地耶汝之忠勲足以任此公叩頭曰是如易柱必須得大木然後可􅀂束小木爲之將速顛覆以天下之廣宜求大才勝彼者如臣駑鈍􅀹不可爾上怒遂解洪武元年正月上登大寳于南郊公宻奏立軍衛法外人無知者拜御史䑓中丞適中丞章公溢奏定處州七縣稅粮比宋制畒悉加五合上特命靑田縣粮止作五合起科餘准所擬且曰使劉伯温鄕里子孫世世爲美談也或言有殺運三十年公􅁣然曰使我任其責者掃除弊俗一二年後寛政可復也上幸鳳陽使公居守公志在澄淸天下乃言於上曰宋元以來寛縱日乆當使紀綱振肅而後惠政可施也乃命憲司糾察諸道彈劾無所避公案劾中書省都事李彬侮法等事罪當死丞相李善長素愛彬乃請緩其事公不聽遣官賫奏詣行在上從公議處彬死刑公承旨卽斬之由是與李公大忤比上回京李公愬之公乃求退上命歸鄕里公奏曰鳳陽雖帝鄕然非置都之地王保保雖可取然未易輕也願聖明留意焉遂辭歸後定西失利王保保竟走沙漠上手詔叙公勲伐且召公赴京師同盟勲冊公至京師上賚賜甚厚追贈公祖父爵皆永嘉郡公累欲進公爵公曰陛下乃天授臣何敢貪天之功聖恩深厚榮顯先人足矣遂固辭不敢當上知其至誠不强也上欲相楊憲公與憲素厚以爲不可上恠之公曰憲有相才無相器大宰相者持心如水以義理爲權衡而已無與焉者也今憲不然能無敗乎上曰汪廣洋何如公曰此􅄶淺觀其人可知曰胡惟庸何如公曰此小犢將僨轅而破犁矣上曰吾之相無逾於先生公曰臣非不自知但臣疾惡太深又不耐繁劇爲之且􅀌大恩天下何患無才願明主悉心求之如目前諸人臣誠未見其可也三年七月授弘文舘學士十一月進封誠意伯四年正月賜歸老鄕里二月至家遣長子璉捧表詣闕謝恩某年某月復遣璉進賀平西蜀表頌上仍以文答之八月上使尅期以手書問天象事公悉條答其大意以爲霜雪之後必有陽春今國威巳立自宜少濟以寛書奏上悉以付史舘其書藁并已前奏請諸藁公皆焚之莫能得其詳也初公言於上甌括間有􅂩地曰談洋及抵福建界曰三魁元未頑民􅀒販私鹽因挾方㓂以致亂累年民受其害遺俗猶未革冝設廵檢司守之上從之及設司頑民以其地係私産且屬温州界抗拒不服適茗洋迯軍周廣三反温處舊吏持府縣事匿不以聞公令長子璉赴京奏其事逕詣上前而不先白中書省時胡惟庸爲左丞掌省事因挾舊忿欲搆䧟公乃使刑部尚書吴雲訹老吏訐公乃謀以公欲求談洋爲墓地民弗與則建立司之䇿以逐其家庶幾可動上􅃪遂爲成案以奏頼上素知公置不問省部又欲逮公長子獄上時已勑璉歸及奏上曰旣歸矣免之公入朝惟引咎自責而巳先是楊憲敗後汪廣洋爲丞相未幾而貶廣東乃相惟庸公乃大慼嘗謂人曰使吾言不驗蒼生之福也言而驗者其如蒼生何遂憂憤而舊疾愈增洪武八年正月胡丞相以醫來視疾飲其藥二服有物積腹中如卷石公遂白于上上亦未之省也自是疾遂篤三月上以公乆不出遣使問之知其不能起也特御製爲文一通遣使馳驛送公還鄕里居家一月而薨公生於至大辛亥六月十五日薨於洪武乙卯四月十六日享年六十五􅀊公之子璉仲璟以是年六月某日塟公於其鄕夏山之原禮也遺文郁離子十卷覆瓿集二十四卷寫情集四卷長子璉又集所遺文藁五卷名曰犁眉公集娶富氏封永嘉郡夫人􅁇室陳氏章氏子男二人長璉由考功􅁥丞任江西叅政卒于官次仲璟皆陳氏出也女二人長適吴彪次適沈安皆章氏出也孫男三人廌虒貊孫女三人㓜未適也公未薨前數日乃以天文書授璉使伺服闋進且戒之曰勿令後人習也復命次子仲璟曰胡惟庸必敗我欲奉遺表無益也日後上必思我待有問當宻爲我奏其畧以爲修德省刑祈天永命且爲政寛猛如循環耳諸形勝要害之地宜與京師聲􅀔連絡幸聖主留意公生平剛毅慷􅁣有大節毎論天下安危則義形於色然與人交游開心見誠坦蕩無間阻至於義所不􅀡無少假借雖親之者以此而忌之者亦以此惟上察其至誠任以心膂公亦以爲不世之遇知無不言毎遇急難勇氣奮發計畫立就外人莫能測其機累贊上成大功上嘗臨朝稱之公輙逡巡不敢當家居惟飲酒奕棋未嘗自言其功毎天象有大變則累日不樂凡公以天下蒼生休戚爲憂喜者卽此可知矣上天威嚴重惟公抗言􅀡議不以利害休其中上亦甚禮公常稱爲老先生而不名又曰吾子房也廷臣或有過失得譴者公密爲救解而免其人或知而詣公謝者則拒不納其人不知亦未嘗爲人言也其居鄉里守禮義尚節儉多隂德不以富貴驕人公􅀄與同郡葉公景淵胡公仲淵章公三益金華宋公景濂同出處有通家之好至於居官任政則各行其志俱以功名顯於世而公與宋公又以文章爲當代首稱云伯生辱在同郡預諸生列與公子璉仲璟相知最􅀷仐公薨而璉没仲璟與璉之子廌請錄公遺事因輯平昔所聞大畧爲行狀至於皇上知人之明倚注之重公之遭遇感激以天下公議輔人主者􅀚綸綍之文考成就之蹟可見矣其籌䇿帷幄有不能盡詳者亦不敢强質也故叅軍縉雲郡伯胡公行述王禕公諱深字仲淵姓胡氏系出漢安定宋初有諱棟者自潤之丹陽遷處之龍泉因家焉棟生璠璠生文虎文虎生竦竦生晟晟生滂滂生衢州錄事叅軍松年松年生鄉貢進士應辰􅀿辰生温州樂淸縣令㻑㻑生江南西路兵馬都􅁥見大則公之曾祖也祖諱堂妣季氏考諱鉦仕元爲征東行中書省左右司員外郎妣趙氏公生有竒質讀書過目卽成誦員外府君蚤歳宦游京師公甫十􅀊而季夫人與趙夫人相繼没公侍大父撫㓜弟囏難刻厲以自植立而學業益以進下筆爲文數百言可立就弱冠游京師適員外府君仕髙麗乃徃􅀱焉居乆之員外府君捐舘舎而繼母實生弟海年尚㓜公泣謂海曰天禍我家我父棄諸􅀌萬里外今吾奉匶南還爾其留此以事母也日吾當復迎吾母與爾矣舟行一日泊大崖下夜夢父老語之曰此崖且崩宜急避驚覺趣移舟俄頃大風雨至崖果崩堕水聲如萬雷霆人謂此其孝感所􅃱云旣㱕塟遂廬于墓左悉取諸子百氏天官地志兵謀醫藥術數􅁲筮佛老之書而研究之然於醫尤精常曰窮而在下者不䏻及物唯醫可䏻濟人耳乃建藥肆市中有以疾病來告者輒與之藥弗與計􅀡也至正壬辰江淮俶􅅰盗賊蔓延閩浙間由建之浦城松溪入龍泉公歎曰浙水東地氣白矣生民無所賴禍將及矣乃集郷民共為守禦計而結寨於湖山於是處州境内民相挻為盗江浙行省調萬戶石抺公宜孫戍處州辟公叅謀其軍事一見懽如平生石抺公喜曰吾事濟矣胡公籌䇿今無與比區區小醜不足平也即檄屬縣募壯士爲軍十日間得數千軍于竹口傳檄賊中曰爾等皆良民因詿誤故為亂弃仗即仍為良民耳賊中傳相謂曰胡君長者其不欺我盍歸之盡燬器械相率肉􅃝來請罪公一綏之以恩餘㓂次第而平歳甲午二月石抺公還臨海公亦㱕隱於湖山三月温州戍卒韓虎陳安國殺主帥據城叛行省命宣慰使恩寜普討之道由處州辟公計事公與語意合軍事請公叅謀之公曰除􅁀所以救民今温城叛者上一二人􅀂破其城玉石不分如平民何此宜以計取不可以力攻也乃遣辨士入城􅀃其黨曰韓虎陳安國悖逆亂常今王師致討大兵四集旦夕即攻城雖金湯無不破者􅀂等胡為為賊守自取作韲粉耶今􅀅軍念􅀂等未忍即加兵􅀂等䏻去逆效順悉從原宥苟稔惡不悛城一破悔無及已其黨聞語已感相向泣曰吾屬自度皆旦暮􅀑耳今乃蒙將軍開生路敢不惟命六月果殺韓虎等以城降温城瀕海民以漁爲業是時城閉者三月民病甚公卽請發粟賑之事有不便者皆爲之更除驩聲載道曰吾民早得見胡君豈至顚沛如是耶恩寧普公欲列公功以聞于朝公謝曰幸遇明公爲知巳得效寸尺志願足矣何以功爲旣而恩寜普公以行省叅政總兵番陽復辟公與俱行軍務無巨細悉諉之信任之者益至􅀊丙申六月青田潘帷賢葉仲賢聚衆爲亂聲言攻龍泉縣長吏聞風遁賊遂焚縣治公之師曰王先生毅與門弟子集義兵擊退之縣長吏及里中惡少年疾其功因害王先生公時在番昜聞之馳而歸語同門友曰昔毛術能爲師復􅄷吾徒頋不能耶乃引兵執害王先生者盡殲之遂從事於青田而麗水之浮雲泉溪賊並起􅀊丁酉春縉雲之黄村松陽之白巖遂昌之大社無籍之民盡爲賊􅀔連結不可遏行省丞相康里公承制以石抺公爲行樞宻院判官分院鎮處州旣至卽假公本院行軍都事綂兵以討亂九月攻泉溪賊寨㧞之十一月又平浮雲歳戊戌正月白巖賊來降五月縉雲賊亦平八月移師攻遂昌賊酋周天覺方友元傾其巢穴出迎敵公望見唉曰此非天授我乎使賊堅守窟穴未易即殄㓕今日之來送死必矣乃分部諸校以正兵與接戰以竒兵左右翼夾擊之别遣游軍入山搜其伏匿比戰賊三面受擊大敗斬首數千級生擒八百人􅀗方友元梟之乗􅀔直擣大社周天􅁴降乃班師􅀊巳亥秋以兵討青田賊黨金德安誅潘惟賢兄弟以降於是處之境内諸賊悉平矣先是國兵取淛東衢婺既下獨處州爲石抺公所守不肯降是􅀊冬今上皇帝遣僉樞宻院事胡公大海由間道取處州石抺公出戰敗北大軍遂入城而分兵取屬縣未附者公時以假元帥綂龍泉慶元松陽遂昌四縣兵欲閉􅀜爲拒守計四縣士民咸請于公願内附以全民命且曰公治兵十年勤勞亦至矣而朝廷未聞有一命之􅃬國家則􅀒公公何􅀒於國哉公知時事巳去不得巳挺身見胡公而四縣因得不受兵上素聞公名驛召至南京待以殊禮居無何擢中書省左司員外郞上日與公議論天下事公有言上未嘗不稱善也􅀊庚子秋命公相龍灣虎口形􅀔築一城以衞京師工不煩而事以集􅀊辛丑秋有㫖命公還處州招集舊所部將校士卒以從征西􅀊壬寅春從上平江西命公以親軍指揮領兵守􅁻安㑹淛東苗軍叛婺守將旣􅀍害而處城亦爲其所據上命公以所部兵馳還復處城比至城巳復卽除公淛東行中書省左右司郎中總制處州軍民事時山㓂乗苗之亂往徃竊發公随方招捕凡首惡者盡誅之於是守兵猶單寡公募之得勝卒萬餘人軍需粮餉雖取給於民而民素受其惠咸樂輸之無敢後時江西俱食淛東塩而有司十分抽其二商賈絶少公請二十分取一從之販者乃通軍用以給􅀊癸卯春諸暨守將謝再興以城叛兵犯東陽平章李公擊􅁍之公引兵爲之援因建議以謂諸暨淛東藩障諸暨不守則衢婺不支矣乃度地距諸暨五十里五指巖下别築一城不旬日而成楼櫓㩝柵靡不畢備上聞諸暨叛遣使議别爲城守計使者至城巳完上嘆賞不巳已而浙西􅀅李伯貞大舉入宼兵號六十萬頓城下城堅不可攻廼引去上念公立城之功遣名馬賜之青田之蘆茨地接閩境人素獷悍恃其地險惡屢叛屢服至是乗我師在外復爲㓂公還引兵直抵其地二十年逋誅之徒悉就殄㓕人咸快之􅀊甲辰秋温州方明善取平陽時平陽已爲我所有公出偏師復之併復瑞安所侵地而親領大軍攻温州明善窘蹙乃與其叔國珍議納歲貢銀三萬兩有旨俾班師公迺入覲上欲遂柄用之公以邊境未寧願還守外以自効時上旣即王位迺除公王府叅軍仍總制處州等翼陛辭上諭之曰俟閩浙俱平當還汝中書矣􅀊乙己春福建陳有定來㓂邊公率師往征之遂取建之浦城􅁇而建之崇安建陽二縣亦俱下上遣使賜以所御名馬􅀅士賞勞有差建之守將阮德柔以兵四萬屯錦江實出我師後公還兵擊之破其二柵有定大恐盡率精銳來圍我營公突陣與决戰馬蹶因􅀍執有定旣得公甚相禮待公因貝道主上神聖四海帰心群雄樂爲之用且援竇融帰漢故事以撼之有定􅀄無害公意㑹元使至督迫之公遂遇害于福州得年五十有二訃聞上痛悼不已遣使卽其家祭之命中書議加䘏典追封縉雲郡伯有爵而無階官職勲者有司之制未備也公天資頴㧞智識絶人其於藝術弗學則巳學之無弗精詣者性倜儻好施予贒士大夫有貧之者傾槖以餽之弗吝也其守鄉郡凡五載馭民一以寛厚用兵十餘年未嘗僇一卒恩惠及人甚多故其没也聞者無不流涕鄕人爲立祠以祀之公先配項氏先五年卒生二子長曰楨今為宣武􅀅軍僉處州衛指揮司事次曰杞女一人適同里章存厚継室楊氏故中書左司郎中元杲之妹也公既没之二年楨䓁乃刻木為像具衣冠以塟實附于圍原先塋之次㑹國兵旣取閩俘有定至京上命楨臠其肉以祭公禕辱與公交二十年知其為人學贍而才􅁉􅁣然有志於功名者也遭時叔季未及有所樹立及既結知真主庶幾有以自見於事功矣而昊天不弔不及竟其才之用以究其志之所欲為豈非其命也夫公當定謚於奉常立傳於國史而勒銘於神道然行状乆未克為於是楨來以為請誼不得辞謹為攟摭其平生大凡而其書之雖於公之頴識淵度無能有所發揮庶幾無愧辞者矣翰林學士承㫖宋公行状鄭楷先生諱濂字景濂丗為婺之金華人也其先有諱憲者官大理丞為易講師弟子衆至數千人唐武德間自京兆尹遷呉興更十四丗有諱荣者私謚文通先生通尚書春秋周廣順中徙于義烏隱居覆釜山又七丗至宋嘉定􅀄有諱栢者復遷金華其地曰濳溪又五世乃至先生始遷浦江仁義里之青蘿山仍以潛溪扁其所居示不忘本也於是四方學子咸以濳溪先生稱之先生在妊七月卽生為嬰兒時苦多病毎風眩􅂺昏迷數日祖母金及母陳更相保抱得免無虞年六􅀊入小學授以李瀚􅂪求一日而盡自後日記二千言同肄業者日暮罷歸其所讀書先生皆成誦九􅀊為詩歌有竒語人異之呼為神童年十五六里人張継之長者也聞先生善記誦邀至别墅所問以四書經傳􅀂干日可通倍先生以一月為答􅀄継之不之信抽架上雜書俾卽記五百言先生以指􅀲逐行按之按畢􅂺倍一字不遺􅁇之告先生之父尚書公曰是子天分非几當令從名師卽有成爾乃携入城府受業于聞人夢吉先生授以春秋三傳之學凡學春秋者皆苦其􅀊月先後難記先生卽并列􅀦紀年能悉誦之但舉􅀴中一事即知為魯公幾年幾月是年實當列􅀦某君幾年幾月􅂉俾書而覆之無少異者且兼通易書詩及周禮諸􅀴先生為舉子業毎出諸生右㑹呉貞文公萊授􅀴於白麟溪上攻古文辞金華胡君翰亦來從學胡君􅃱書于先生曰舉子業不足㤙景濂盍來同學古文辞乎先生欣然來從呉公􅀶極􅀴史學之未幾悉得其閫奥自是先生文章之名籍然著聞矣居無幾何吳公解舘而歸先生嗣主教席子弟年十六者皆相從讀書講道東明山中受業者一門凡四十餘人始終越二十年學成多有躋膴仕者當是時曾伯祖貞和府君主家政年踰八十端嚴方正先生年甫四十又五終日毅然賔主人尤髙之府君方著家規示子孫其冠婚䘮祭儀制禮文多叅問於先生先生則㨿證古今凖酌時宜以成一家之法子孫丗守詩禮之教者先生之力也先生嗜學日篤時柳文肅公貫黄文献公溍皆大儒天下所師仰又各及其門執子弟禮二公則皆禮之如朋友柳公曰吾􅀖文献浙水東號為極盛吾老矣不足􅀒荷此事後來継者所望惟景濂以絶倫之識而濟以精博之學進之不止如駕風帆於大江中其孰能禦之黄公曰吾鄕得景濂斯文不乏人矣先生所為文多經二公指授柳公謂其渾雄可喜黄公謂其雄麗而温雅國子監丞陳君旅序先生之文謂能兼二公之所長歐陽文公玄謂非才具衆長識邁千古安能與於斯先生爲當時所稱許如此二公相􅁇卽世先生踵武而起遂以文章家名海内矣至正已丑用大臣薦擢先生將仕佐郞翰林國史院編脩官自布衣入史舘爲太史氏儒者之特選先生以親老不敢遠違固辭㑹世亂益韜閟不事表顯乃與弟子入龍門山著書二十四篇曰龍門凝道記及著孝經新說周禮集註等書弟子乃先公貞孝處士諱淵府君也初宋南渡後新安朱文公東萊吕成公並時而作皆以斯道爲巳任婺實吕氏倡道之􅀖而其學不大傳朱氏一再傳爲何基氏王栢氏又傳之金􅂂祥氏許謙氏皆婺人而其傳遂爲朱學之世適先生既間因許氏門人而究其說獨念吕氏之傳且墜奮然思繼其絶學毎與人言而深􅁣之識者又以知其志之所存蓋本於聖賢之學其自任者益重矣先生於天下之書無不讀而析理精㣲百氏之說悉得其旨要至於佛老之學亦所研究用其義趣裁爲經論􅀋其語言寘諸其書中無辯也誠意伯劉君基謂其主聖經而奴百氏馳騁之餘取佛老語以資戯劇譬猶飫粱肉而茹茶飲茗汁耳歲庚子大明皇帝定鼎金陵遣使者樊觀奉書幣造門徴先生先生曰昔聞大亂極而真人生今誠其時矣遂幡然􅀿詔先生與青田劉君基麗水葉君琛龍泉章君溢俱見上尊重之語必稱先生而不名七月以先生爲江南等處儒學提舉十月奉旨入內授皇太子經先生誠明儼恪遇綱常大義明白開陳再三言之而不倦上深嘉歎之壬寅八月上召先生及興國孔克仁講春秋左氏傳畢先生起曰春秋乃孔子褒善貶惡之書苟能遵行則賞罰適中天下可定也是月告歸省親有白金文綺之賜且曰􅀸之誠慤朕素知之故有此賜耳甲辰十月改起居注先生侍上左右知無不言補益甚衆明年正月上御端門與先生論及黄石公三畧且口釋之先生進曰尚書二典三謨帝王大經大法靡不畢具願陛下留意講明之上曰朕非不知典謨爲治之道但三畧乃用兵攻取時務所先耳甞侍上語賞賚先生曰天下以人心爲本苟得人心帑蔵雖竭無傷也人心不固雖有金帛何補於國耶上詔丞相李公善長歸江西軍中所掠牛於其民無牛者官給之勿取其租丞相退上顧先生曰向所言事當乎先生對曰民富則君不至獨貧民貧則君何能獨富捐利於民實興􅀖之要道也三月先生以疾告詔還家爕治仍賜金帛皇太子􅆀贈有加焉六月先生上箋謝恩復奉書皇太子勉以孝友恭敬勤敏讀書無怠惰毋驕縱脩進德業以副天下之望上覽書喜甚召太子語以書意且賜書答其畧曰曩者先生敎吾子以嚴相訓是爲不佞也以聖人文法變俗言敎之是爲䟽通也所守者忠貞所用者節儉是爲得體也昔聞古人今則親見之復以文綺侑書上毎與群臣言先生淳謹君子輔導有方眷遇甚隆旣而先生丁尚書公憂及服除洪武二年詔徴先生總脩元史六月除翰林學士亞中大夫知制誥兼脩國史時編摩之士皆山林布衣發凡舉例一仰於先生先生通練故事筆其綱領及紀傳之大者同列歛手承命而已逾年書成先生之功居多時剖符封功臣下先生議五等封爵召宿大本堂討論逹旦先生歷據漢唐以來故實量其中而奏之曰此可法彼不可法皆􅀓於理而巳時甘露屢降上問災祥之故先生對曰受命不于天于其人休符不于祥于其仁是以春秋不書祥而紀異為是故也上姪文正以荒淫擅殺得罪先生言曰文正罪固當死陛下軆親親之義生之而置諸逺地則善矣上嘗言古之帝王當宴安之餘多好神僊以朕言之使􅀦治民安心神恬康卽神僊也先生對曰漢武好神僊而方士至梁武好佛而異僧集皆由人主篤好故能􅃱之使移此心以求賢輔天下其有不治乎上􅀷然之上既追封外王父為楊王立廟京師御通天冠綘紗􅂁以祭􅀕畢召大臣問曰朕祭外王父卿䓁以爲不當服衮冕何也先生對曰衮冕惟祭天地宗廟用之餘則當降禮也上嘗祀方丘患心不寕先生進曰孟軻有言養心莫善於寡欲審能行之心清而身泰矣上稱善乆之三年十二月遷奉議大夫􅀦子司業􅀦子多大臣子弟先生蒞之以莊率之以正日進諸生立兩序據坐執經敷揚閫奥之旨敎以孝悌忠信之道學者帖帖遵度惟恐不得爲先生弟子上欲試先生以吏事四年八月授安逺知縣五年二月召爲禮部主事十二月擢太子賛善大夫階如司業時先生之忠誠乆而彌篤皇太子一言一動皆以禮法諷諭使歸于道讀書至切於政教及前世興亡之故必拱手揚言曰君􅀦子民之道當如是不當如彼且推人情物理以明其義皇太子毎歛容嘉納敬禮未嘗少衰言則曰師父師父云且書舊學二字以賜先是上問帝王之學何書最要先生請上讀眞德秀大學􅄛義上覽而悅之令左右大書掲之兩廡之壁時睇觀之六年二月上御西廡大臣皆侍坐上指􅄛義中言司馬遷論黄老事令先生講析俾在坐者聽之先生既如詔復言曰漢武􅄝神仙之學好四夷之功民力既竭重刑罰以震服之臣以爲人主能以義理養性則邪􅀃不能侵興學校敎民則禍亂無從而作矣刑罰非所先也上謂先生曰朕之爲君上畏天地下畏兆民兢兢業業不敢自逸先生對曰陛下此心古先哲王之心也書曰予臨兆民凜乎􅀂朽索之御六馬爲人上者柰何不敬正謂此爾願陛下愼終如始天下幸甚上御齋室先生侍坐上問三代歷數封疆之脩短廣狹先生歷言之且曰三代之治天下也以仁義故歷年之多後世莫及上從容謂曰皇太子留心治道􅀸等宜常與論議庻廣識見幸善調護之先生益孜孜弗懈七月陞翰林侍講學士中順大夫知制誥同脩國史仍兼賛善大夫先生之父文昭贈中順大夫禮部侍郞毋陳氏贈德人先生奉詔搜萃歷代姦臣之蹟編爲辨姦錄及進太子諸王各分賜焉初上作祖訓錄至是成命先生作序諭以大意先生歷言帝王之道及皇上創業之艱以􅃱箴戒之意於後人上稱善命刻于篇先生嘗侍上至後􅁐觀穫上曰農事成矣先生對曰國以民爲本民以食爲天陛下知稼穡之艱難而念民生之良苦實盛德也上問曰三代以上所讀何書先生對曰上古載籍未立不專讀誦而尚躬行人君兼治敎之責躬行以率之天下有不從敎化者乎八月奉旨纂脩大明日曆一百卷擇言行之大者爲寳訓五卷先生總裁其事朝夕禁中至七年五月乃成先生自以布衣沐非常之遇誓竭誠以報國凡上有所任使靡晝靡夜躬閱載冊書于牘進之或覆視于冊一字不遺先生在朝日乆􅀂郊社宗廟山川百神之典朝享宴慶禮樂律曆衣冠之制四夷朝貢賞賚之儀及勲臣名􅀸焯德耀功之文承上旨意論次紀述咸可傳於後世先生在上前所陳說不爲文飾􅀮蔽雖家事苟有問亦一一道之常曰君猶父也天也其可欺耶上嘗問昨日飲酒否座客爲誰饌爲何物悉以其人及膳羞品對上笑曰􅀸飲時朕令人視之果如卿言􅀸信不欺我故上乆而益信其誠欲俾叅大政先生辭曰臣少無他長惟文墨是攻今幸侍罪禁林陛下之恩大矣臣誠不願居職任也上愈厚之毎宴見必命茶賜坐毎旦令侍膳詢訪舊章講求治道或至夜分乃退先生屡有所建明召問廷臣臧否第言其善者不置又問否者爲誰先生曰善者與臣友故知之否者縱有臣不知也卒無所毀短或命賦詩爲文必寓忠告嘗奉制詠鷹令七舉足即成有自古戒禽荒之言上忻然曰卿可爲善諫矣然先生絶不以語人至於􅀿制之作亦不留藁署温樹二字於居室之壁有問及內事者指以示之上嘗與先生飲先生素不勝杯勺舉觴即辭上强之至三觴靣如赭行不成歩上歡􅀏親御翰墨賦楚辭一章以賜仍命侍臣咸賦醉學士歌且曰俾後世知朕君臣同樂􅀂此也甘露降上召先生賜坐上躬執金杓煉湯於鼎以甘露投之手注于巵以賜先生曰此和氣所凝能愈疾延年故與􅀸共之耳皆異恩也九年六月上以先生乆典制作宣勞爲多特拜翰林學士承旨嘉議大夫知制誥兼脩國史上毎謂先生曰朕以布衣爲天子􅀸亦起草萊列侍從爲開國文臣之首俾世世與國同休不亦美乎趣令取子孫官之先生屢辭謝不敢奉詔至是年某月詔徴先生􅃁子瓉之子愼爲殿廷儀禮司序班未幾復召介子璲除中書舎人上時休暇輙命題試璲與愼而戒飭之上笑語先生曰朕爲卿敎子孫先生或奏事乆稱倦上命璲愼共扶下殿祖子孫三世皆官内廷當世以爲異事復以先生艱於行歩特詔皇太子選良馬以賜上親作馬歌復詔群臣咸作之以寵耀焉先生益感激不自寧常戒子孫曰上德猶天地也將何以爲報獨有誠敬忠勤畧可自效萬一耳上以先生年且至不可煩以事十一月有致政之詔乃加贈先生之父侍郎爲嘉議大夫禮部尚書母德人爲淑人祖德政贈亞中大夫太常少卿祖妣金氏贈淑人夫人賈氏封亦如之先生及二代誥辭皆上所親製天下榮之誥辭中稱先生德量之弘如千頃波澄之不清撓之不濁人以爲上知人之明云先生行旣有期上眷念尤􅀷曰卿去何時復來見朕乎幸相侍數日姑徐徐行由是朝夕左右者累月時詔許言事朝臣有上䟽萬餘言者上聽厭其迁􅄛怒欲罪之以問群臣有阿意者指其䟽曰此不敬此詆謗罪當誅上笞之而罷怒未解召先生先生曰彼應詔上䟽其心爲國耳烏可􅀷罪乎上黙然巳而上覧䟽中有足采者召阿意者罵曰吾怒時􅀂等不能諫乃激吾誅之何異以膏沃火向非宋景濂之言幾不誤罪言者耶上嘗廷譽先生曰古之人太上爲聖其次爲賢其次爲君子􅀂宋景濂者事朕十有九年而未嘗有一言之僞誚一人之短寵辱不驚始終無異其誠所謂君子人乎匪止君子抑可謂之賢者矣在廷之臣皆以爲信然十年二月先生遂辭歸瀕行賜紙幣文綺及御製文集皇太子贈以衣三襲上諭曰朕最愼于賞予嘉卿忠誠可貫金石故以是賜􅀸􅀸今年幾何矣先生曰六十有八上曰蔵此綺俟三十二年後作百􅀊衣也先生叩首謝上復屬曰大江漲不可舟卿宜循肉河達家庻幾無虞仍俾愼護先生行先生至家卽拜表遣愼詣闕稱謝仍上箋皇太子申明正心治國之要上賜詔褒答大旨謂先生忠良之臣勲業既著文章必傳功成身退惟先生獨全初先生將辭請􅀊一來朝是年九月朔先生遂入朝越十又四日見於端門上佇想巳乆廷間累矣及見大喜加勞再三皇太子諸王皆驩動顔色越翌日上降勑符遣儀曹奉醪膳諸物抵寓舘以賜自是日侍上遊歷觀闕盤旋禁禦詢諮備至便殿侍食日晏始退恩禮之優群臣莫敢望上嘗喟然嘆曰純臣哉爾濂純臣哉爾濂方今四夷皆知􅀸名􅀸其自愛先生避謝不敢當凡所陳論皆古之格言朝廷百官惟恐不留先生下至寺人衛卒見先生至皆以手加額相推排迎拜恐不得先覩先生留朝七旬餘上重先生還而難言之先生以歳暮力辭還復遣中貴人賜上尊至於道所經行皆上爲先生指畫聖心惓惓愈加於昔及先生既行數日上問璲曰爾父道中無恙否璲以安對未幾復謂璲曰朕疇昔之夜夢見爾父􅀏談如曩時爾父雖去其容儀儼然在朕目中也璲叩頭謝曰非陛下垂念臣父之至何以形諸夢寐中書舎人史靖可太子正字桂彦良等皆爲詩歌以紀之上之眷重先生不忘如此先生徳尊而不居位顯而彌恭旣司制作之柄造門求文之士先後相􅁇蠻夷朝貢者數問先生安否日本得濳溪集刻板國中髙句麗安南使者至購先生文集不啻拱璧而先生匑然自持似不能言者遇人拜雖三尺童子必詘􅂰而首下焉至於公侯貴人則未嘗降下曾不識其門何向朝廷有大議誾誾引古今辯說不少有所回性命之理晩而益究其極外物之徃來視之若不相干嘗曰古人之爲學使心正身脩措之行事俯仰無愧而巳繁辭􅃨􅀃道之蔽也先生作事不尚表襮務合乎義敎人皆随其質而導之使入於善尤篤於倫品處父子兄弟夫婦之間者皆可爲法與人交和易任眞無鈎距縱爲所紿亦弗與較臨財廉非其分不取大書於門曰寧可忍餓而死不可苟利而生君子以爲名言權要及有力者茍非其人雖置金滿橐求一字不肯與縱不得巳與之亦不受其餽謝日本使奉勑請文以百金爲獻先生卻不受上以問先生先生對曰天朝侍從之官而受小夷金非所以崇國軆也上深然之貧賤人情有可哀欲發濳振幽卽欣然爲之先生四持文衡試天下士得人爲多接引後學惟恐弗及遠方來者授舘而飲食之雖乆不衰有小善必衆譽之色温氣和近其側者如大寒之加重裘盛暑之濯清風也天下之能文者多經先生指授朝廷英俊咸以先生爲法初奉勑教文華生數十軰至是出叅大政爲御史知列郡者相望四方士得一見先生夸於人以爲幸承一言之賜者人輙改􅀚視之不敢與齒士大夫言當世有德者必曰先生而天下之人識與不識無賢愚咸推爲先生大人長者及先生之歸上面發後學無師之嘆盖先生之道内誠外恕一出於正發之也當而行之也安故上下信服若是云雖巳貴顯平居布衣䟽食無異貧士先生細目羙髯狀貌豐厚不爲竒異行以求過於人不事生産不置田宅或􅂆爲子孫計先生曰富貴豈一家物哉吾乃所以遺之也先生惟刻意於學自少至老未嘗一時去書不􅀚及􅃱政歸青蘿山闢一室曰静軒終日閉戸纂述人不見其面戒子孫毋至城市姻㜕有以郡縣事爲託者皆峻謝之或談及時事輙引去不與語切於仁愛聞民有困乏者爲之不飽先生視近甚明夜燃燈於几卧絺帷中閱蠅頭小書一􅁰上能作十餘字皆可辨􅀧畫人以爲先生不飲酒寡嗜欲所􅃱豈或然歟先生所著文有濳溪集四十卷蘿山集五卷龍門子三卷浦陽人物記二卷巳傳於學者翰􅁐集四十卷芝園集歸田巳後所著計四十卷十三年冬先生孫愼以罪被刑舉家當寘重辟上念先生特降赦安置茂州十四年五月二十日先生以疾卒於夔府臨殁端坐歛手而逝當是時夔之府守官吏皆來􅉠贈􅂘奠葬先生於夔府之西蓮華池山下其經紀䘮塟刻石表墓者則知事桑以從也先生生於至大庚戌十月十二日享年七十有二娶賈氏名專字主敬贒而有德爲女婦師前先生一年卒塟青蘿山子男二長瓉次璲有文行精􅂐􅀠真草四體書女二長􅃴金華賈林次適義門鄭林孫男愼愷恂懌愠嗚呼楷自垂髫時嘗侍先公貞孝府君拜先生於床下先生不以童子無知卽辱進而敎之親承化育于兹有年矣弟懼才質凡庸學如望洋有􅀌父師之敎今聞先生謝世長慟莫知所從􅀼念先生道德文章固巳顯著於當世而出處遭逢行事之盛世系遷徙生卒歲月之詳尚恐人未盡知爰敢裒取翰林待制王公禕先伯公太常博士諱濤君舊著小傳及同門友某所作歴官記輯爲行狀一通俟請當代立言君子著爲碑銘表諸墓隧庻幾他日太常國史有所採擇焉故翰林待制華川先生王公行狀鄭濟公諱禕字子充姓王氏其先太原郡人五代時節度使彦超自㑹稽徙居金華之義烏遂爲義烏人其後有曰固者游安定胡先生門登宋皇祐五年進士弟卒官恩陽令南渡後有典方州積階至金紫食邑開國封男者至公之大父炎澤仕元爲石峽書院山長父良玉常山東陽兩縣儒學敎諭益以文學箸稱母陳氏讀書知義理公之生也爲元至正壬戌十二月十七日與山長公寔同初度前夕山長公夢五色芝産門楣翌日公生識者以爲文章之兆公㓜秀爽敏惠稍長習古學師事侍講黄文獻公溍是時文獻爲文章宗工天下所師仰然性介特愼許可見公所業獨􅀷器之即屬以斯文之任至正戊子元政衰敝公愀然閔之乃􅄃天下事􅀔爲書七八千言上之時宰嫌其切直格不以聞新安程公以文知公爲文獻門人讀其文嘆曰青青於藍氷寒於水其子充之謂歟臨川危公素太原郝公遠者圖大梁段公天祐一十有二人列薦於朝不報濟南張文穆公起巖率翰林僚屬又薦之亦不報有齊􅄾者得傳邵子先天數推言天人興衰甚驗見公嘆曰子充異代人物也公亦知世道終不可爲乃歸隠青巖山中著書立言然􅀷自韜晦若將有所待者􅀊戊戌大明太祖皇帝親取婺或以名聞遣使徴之公幡然喜曰吾聞大亂極而聖人出齊􅄾之言良足徴乎即日詣行在上見大喜署中書省􅁺毎商畧機務悉契上􅂨益加禮敬語必稱子充而不名間與論文章稱善因命采故實韻爲四言詩以授皇太子辛丑冬上親征江西公進平江西頌上覽而喜曰吾固知浙東有二儒者􅀸與宋濂耳學問之􅀶卿不如濂才思之䧺濂不如卿癸卯春授江南儒學提舉司校理未幾丁外艱乙巳五月服闋除侍禮郎兼引進使時當創國之初禮制多公所定是年冬除起居注嘉言讜論啓沃良多丙午七月除同知南康府事特賜黄金帶以寵勞之公治民本於仁恕而臨之以廉平民咸服之丁未上將即大位召還議禮明年戊申爲洪武元年南閩􅀄入軄方以公出判漳州公宣布德澤復以治南康者治之二年詔脩元史召宋公濂與公同爲總裁官二月入史局公於史事雅擅其長力任筆削之勞一無所諉書成六月拜翰林待制承􅀡郞同知制誥兼國史院編脩官公掌制代言凡大詔令多屬焉三年二月奉詔預敎大本堂公經明理達開導訓諭道光師儒毎召對殿廷必賜坐乆則賜飲饍一日在史局渴甚謂宋公曰得昨日上所賜梨􅄴飲之吾渇濟矣中貴人􅀼聞之言于上即命齎賜之其在翰林未乆出使吐蕃未逹境召還五年正月又使雲南六月抵其境見梁王君臣而論之曰皇上聦明神聖新創大業皆天命人心之所帰惟爾有衆僻在西南未洽聲敎故遣使者來諭意今能亟奉版圖帰職方則尺地一民按堵如故髙官厚禄不爾吝也否則如魚遊菳中終取夷㓕時梁王君臣相頋駭服已有降意㑹元之遺孽有自立於朔漠者遣使脫脫徴粮餉且欲連兵以拒我覘知梁王有貳心因以危言必欲迫梁王殺我使以固其意時梁王持两可不决因匿公於民間脫脫聞之愈責誚梁王不得已以公出見之脫脫欲以威屈公慷慨罵曰天訖汝元命我朝實代之汝如爝火餘燼尚欲與日月争光耶我將命逺來豈爲汝屈今惟有死而已寧以迫脇爲懼耶頋謂梁王曰汝朝殺我大兵夕至矣遂􅀍害時六年癸丑臘月二十四日也享年五十有二娶何氏子二曰綬曰紳孫男五穆穰稌稔稙孫女三人公卒後之八年大兵平雲南又十五年紳徃求遺殯不獲因訪得公諱所擗踊號呼製神主載回時雲南左布政使張公紞及前山西叅政王公景彰力爲採搜死亊之詳爲文以􅁀白其大節公平生慷􅁣長身山立屹然有竒氣人初見之􅀂不敢卽及夫一言之入則情􅁩藹然恨相知之晚於經史百氏無不究其極其爲文宏麗沉雄機軸貫綜自成一家言天下大夫士争傳誦之所著有華川前後集二十五卷玉堂􅇎著二卷詩五卷續東萊大事記七十九卷並蔵于家公事上十餘年服勤報効左右開陳非仁義之言弗道也天性至孝友悌尤至先世田廬悉推以予兄弟其敎子慈而有法在官還書戒之曰寧人侮我毋我侮人故二子皆能以文學世其家云惟公之至行大節其在天理人心者故所不泯而紳也復以濟有世契之私幸嘗辱知於公者最乆請狀公之行故爲摭其大㮣以備家乗之闕他日國史置傳太常議謚庻亦有所考焉皇明文衡卷六十二
