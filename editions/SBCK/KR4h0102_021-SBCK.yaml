front:
  text: 皇明文衡卷之二十一
  hash: sha256:41794ad49e72604689f35d37fe0386d469ae23104e4e60877c2c531f61e4bd25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_021-1a}
body:
  text: 賛龍馬賛宋濂西南夷自昔出良馬而產於羅􅀑國者尤良或云羅􅀑疑卽古之􅀑方其地有養龍阬在兩山之中泓渟奫􅀷開闔􅂕氣而蛟龍實藏其下當春日始和物情酣鬯夷人立柳阬泮擇牝馬之貞者繫之已而雲霧晦㝠咫尺不能辯色􅀋有物蜿蜒上與馬接蓋龍云逮天色開霽視馬傍傍之沙有龍跡者則與龍遇謹其芻鼓而節宣之曁産必獲龍駒焉粤若洪武四年六月壬寅夏國主明昇以全蜀降獻良馬凡十而其一色正白乃得之於阬者身長十有一尺首高九尺足之高比首而殺其二尺有肉隱起項下約厚五分廣三寸餘貫膺絡腹至尾閭而止精彩明晃振鬛一鳴萬馬爲之辟易韀勒不可近近輙作人立而吼上謂天旣生此英物必有神以司之親撰祝䇿詔有司以牲牢祀于馬祖然後敕典牧副使臣高敬囊沙四百斤壓之人跨囊上使其游行苑中乆之性漸柔馴適八月癸巳上將行夕月之禮於清涼山璮上於是乗之而出如躡雲而馳一塵弗驚皇情悅豫賜其名爲飛越峯復命御用監􅀡長臣馬晉臣繒其眞形藏焉臣濂㮷諸載藉漢之元鼎中有神馬出渥洼水中馬之生於水者尚矣養龍之說雖相傳於夷人要當可徵不誣也肆惟皇上以大德而位大寳日之所出日之所􅃿無不梯山航海獻䞇奉琛邇者獨角之犀來自九眞食火之鷄貢于三佛齊之境其他佹形僪狀藉藉紛紛且不一而足而况此水産之龍馬乎周書有云不寳遠物則遠人格所寳惟賢則邇人安皇上宵衣旰食日懷保於小民巖穴之士蒐羅殆盡將圖治安如黃虞時其遐荒殊裔珍毓奇產未嘗有心求之所以榮光休氣洋溢中國仁聲義聞充洽八表而龍媒之異自致於天閑十二之中揆之於書前聖後聖蓋同一軌轍也其視貳師之遣黷武窮兵以索諸大宛者果爲何如哉臣濂以文字爲職業際玆盛美不敢黙而無言謹述賛辭一首以貽諸後世賛曰天駟熒蛟龍升靈泓澄神馬生祥飈瑞靄晝杳㝠天一翕聚通精􅂕龍胡漢郊杜志龍垂胡髯胡乃頸下垂也盈鳬臆輕竹披耳鏡懸睛花雪捲毛光照夜汗溝有血霞流赬振鬛鳴萬馬驚閃流電逐飛星九霄彷彿從龍行但聞瀟瀟風雨聲三川平八極寧眞龍媒獻龍廷出入天門駕龍軿太霞五彩滿瑤京皇風淸皇道貞皇威明茫茫堪輿內孰敢不來庭陋彼漢將軍空圍貳師城乃知天子在樹德不必連年徒用兵滕奉使賛齊人王蠋有言曰忠臣不事二君烈女不更二夫女之從人一與之醮當終身不改譬之白璧小有玷辱人將斥去而不之顧臣之事君也其理亦同故蠋特竝言之事兩夫者雖辨如虞􅁎智如鄧曼吾知其决非良婦事二君者雖功如汾陽唐郭子儀封汾陽王才如西平唐李晟封西平王吾知其决非良臣嗚呼使此義昭如白日人臣安肯懷二心而國安有喪亡之禍哉東陽滕茂實當宋靖康初以太學正與僉書路允迪奉使於金議割三鎭太原㝷奉宻詔據城不下金人怒囚之雲中欽宗北遷茂實謁見涕泣請從行主者不之許其後允迪南歸茂實獨留鴈門終身不再仕臨没令以黃幡褁屍而葬仍刻石識云宋使者東陽滕茂實墓此殆不事二君者與當是時有宇文虚中者亦以黃門侍郞使金見留遂改節易行反面事虜其後雖欲奪兵仗南奔而自贖卒亦不逃君子之譏其視吾茂實果何如也茂實巳矣人至今想其遺節如神龍不可得見至視虚中輩不啻若􅀑蜮犬豕有識妾歸亦羞聞之此無他人心天理終不可誣也乃作滕奉使賛用規事君而有二心者賛曰漢有蘇武奉使不屈滕公配之有聲烈烈黃旛褁屍以全臣節如璧之白弗緇弗缺其人雖亡而神不滅上游帝所凌厲日月降臣見之肝碎膽裂敢述賛辭勒在貞碣􅈚涬生賛􅈚涬生者旴江廖應淮海學也抱􅀒奇氣好研摩運世推移及方技諸家學年三十游杭上䟽言丁大全誤國狀大全怒中以法配漢陽軍生荷校行歌出都門道傍觀者嘖嘖壯之抵漢江濵遇蜀道士杜可大揖曰子非廖應淮郎生愕然曰道士何自知之可大曰宇宙大虚一塵爾人生其間爲塵幾何是茫茫者尚了然心目間矧吾子耶然自邵堯夫以先天學授王豫天悅天悅死無所授同塟王枕中未百年而吳曦叛盜發其冡得皇極經世體要一篇内外觀象數十篇余賄盜得之今餘五十年數當授子吾俟子亦乆矣乃言于上官脫其籍盡敎以冡中書其筭繇聲音起生神鍳頴利可大指畫未到者生已先意逆悟可大自以爲不及學旣成去隱宣歙間遇余安􅁉弋陽將敎之安􅁉勸生業中庸生瞠目厲聲曰俗儒幾辱吾康節於地下矣復去之杭客賀外史家晝市大􅄛數夜沽酒痛飮飮卽吐吐卽飮不醉如泥弗休醉中嘗大叫曰天非宋天地非宋地奈何奈何語聞賈似道遣客叩之生曰毋多言浙水西地髪白時是其祥也似道未解復召至屛人與語生曰明公宜自愛不乆宋鼎栘矣似道惡其言掩耳走生亦徑出過曾淵子家索酒轟飮酒酣作嬰兒啼曰大厦將焚燕猶呢喃未巳耶復賦歌以見意都人士聞之競指以爲怪民不與接獨太學生熊晞聖猶時造其廬生私執熊手謂曰吾端居層樓聞空中戎馬百萬來人􅀑作􅂘泣聲壬申襄樊䧟甲戌宫車晏駕乙亥長江飛渡似道亦殛死臨漳丙子三宮播迁諸王大臣皆南北亂走嘘吸事耳子不去􅁒何爲居亡何宋事日非沿江州郡望風奔潰生大慟曰殺氣又入閩廣中吾不知死所矣遂遁去其言無一不驗後四年病死處州學中年五十二無子唯一義女從之生宗尭夫先天之學頗自謂知易毎見諸易師傳䟽不問淺􅀷輙訕駁以爲樂及論後天則尊羲畫爲經􅂏爻繫辭爲傳黜文言彖象二傳爲九師之言且謂說卦非聖筆不能作上下繫乃門人所述序卦􅀡漢儒記爾蓋生聰明絶人未聞道而驟語數故其論經多失中然性使酒難近又好訐人隂私人面頸發赤不顧罕有從其學者唯國子簿吳浚進士彭復樂師之浚不卒業復屢受唾斥不怨生將遁時召復至口發例手布籌雖平昔所靳若終身不示人者一舉授復復後又授鄱陽傅立云或曰生瀕死語女曰吾死後一月中朝命山姓鳥名使者來徵吾及􅀓立立當過予門汝可出藏書示之立當以此致大官後皆如其言所謂山姓鳥名崔鵬飛也生所著書有玄玄集曆髓星野指南象喻統㑹聲譜畫前妙用數十萬言今猶間傳於世賛曰龍圖成章有文從衡以濬以明以􅂥其藏以奠乎玄黃昔我素王韋編三絶墜緒微茫誰其我綴我叅我腴九師襄之我苞我晶百氏攘之如河之渾如曀而昏如治􅁝以棼天未降割一髪攸存維洛有士居于百原超神冲漠凝於畫先數往知來小大斯甄莫峻匪厓我陟其顚莫􅀷匪淵我瀹其泉簡材以􅂌非隱弗傳有㝠者􅃁卒昭以宣或得其載神子言炎炎宋籙維其訖矣長星蝕柳色之赤矣靑祥見徵士髪白矣朋昏以世莫之戚矣魚在在􅑄尚其息矣維生之知中如沸􅅅彼惛弗知覆謂我狂我狂如何我憂孔多我山我河我用弗磨俾淪胥以訛我酒旣嘉我瑟又龢我寧不嘯歌北風其涼旂旐央央戎車龎龎蕩蕩江流杭之如陸有腥其穢流血沃沃海氛方􅎋其何能目人有恒言風雨漂搖夏宇障之渉于大川烝徒楫之楫副宇橈孑孑焉依國武斯隊不知攸戒日隕弗升雖晝作夜鴞舞於林􅀑瞰于舍孰投是艱曾莫之艾乃惄乃驚乃瞻乃行乃遯死于􅄀睠生之爲胡乃神以著徵之古聖匪程伊度何以言之卒淪于數一曲之淹不通其故易道旣泯數亦不􅀋激賛於生發我長喟月出皎兮在天之心在天之心何古何今陸秀夫像賛身抱龍髯兮眼不見水鳳闕雖遐兮龍堂則邇玉雪皦如兮肯汙泥滓赤日出海兮爾心不死文官花賛胡翰覃木之植鍾美於天地著見於古今者其品多矣大率以不恒有爲瑞以不多得爲貴華平賔連紫脫闊閱國家之瑞也擴代始有之掦之瓊花潤之玉蕊天下之美也豈世所多得哉物皆然今鎭江其地卽潤也范氏世居之爲望族有花曰文官先世所植也自吳中富人及京洛公􅀸之家斥苑囿飾亭舘競一花一卉之奇以夸示世俗極游觀之娱者往往求若是花蔑乎未有聞也當唐之世唯學士院有之其曰文官意亦以是邪范氏世業儒以詩書起家爲令宰任司臬者衣冠相望於宋元二百年之間其於是花亦有不期而苻者邪天地生物自形而色白者不能以爲緋碧者不能以爲紫今以一植而具有其美一日而遞爲之變其得於造化之妙非人力能致之唐人以戎王子爲異花若文官乃異花也夫以造化所鍾之異天下不多得之物而又植於衣冠之族又有名公􅀸如辛幼安者本其所自而書之製爲樂府以歌之雖謂之美瑞可也而會不厠於瓊花玉蘂之列者蓋范氏故閥閱也其花先世所植手澤也非若蕃􅁵招隠老佛之宮瓊花玉蘂人得趨而見之使人得而見之有力者將􅂑而去之矣則范氏珍之宜至而傳之不廣也天下之物負其所有不自見於世者皆是􅀋也余老矣於世無所好頋以平生不知有此花一旦聞之可爲寡陋之歎不能無幼安豪發之情焉乃述其事以貽其後人從而爲之賛曰泰圜委和嘉植挺生抱素含貞􅀭采代榮如彼命服品秩有章下民所望君子之光我徴前聞厥􅀋匪一瑞木四照神芝五色不貴異物邁種厥德于古有訓君子是式靈峰寺植木賛劉基靈峰寺有松杏與樸竝植焉劉子見而感之爲作賛曰杏葉蔥芋有子可以實籩松枝扶踈有苓可以引年樸狀如樗衆蠹所穿擁腫液瞞不可以鐫胡竝植于庭溷厥醜妍明堂求材般趨爾先松􅆷杏割樸獨宛然嗚呼樸乎孰女之憐維女之全抑棄於人乃獲乎天耶宋景濂像賛王褘外和而神融内充而面睟衣冠雖晉人之風氣象實宋儒之懿夫其知言以窮天下之理養氣以任天下之事隱則如虎豹之在山出則􅀋鳳麟之瑞世後乎千載而有存中乎兩間而無媿此蓋古君子之所難然吾謂斯人之必至筮作賛有序唐肅予子之欲筮而無蓍請以竹代之予曰易謂聖人之德幽賛神明而生蓍則蓍固􅂕矣然地無蓍可廢筮乎屈原離騷云索藑茅以筳篿漢方技傳亦有筳篿須臾孤虚之術說者曰筳竹篿也楚人以結􅋄折竹卜爲篿然則楚人之筳篿以無蓍歟夫蓍蔡產也大龜可卜者出於蔡上有􅆱百莖下必有􅂕龜守之蔡非楚地故以筳代蓍而卜焉今越去蔡尤遠蓍或不能致則放筳篿之法無害况吾所以質諸神者在誠不在物之旣作之因爲賛俾刻其櫝云辭曰祝􅔼蝪以祈雨龍之同􅀋也禁原蚕以助牧馬之同氣也繄竹之視蓍均􅋄彚也虚中弗窒又圓其外也虚則有􅂕具乎智也蓍百莖而同本合萬殊爲一致也以有代無理或弗悖也爰韜爰櫝受命則出也載營載畫吉凶以示也於戲泰筮神明之攸寄也曷竹曷蓍惟秉誠之無貳也太師韓國公􅀞像賛蘇伯衡堂堂韓公秉國之成鴻業以定經費以盈羣賢以進百度以貞四夷以服品物以亨公初無作孰得而名天實生之光輔大明天下之士睹其儀刑想其風采不謀同聲曰漢蕭何唐之玄齡功成而退不伐不矜袞衣朱舄安享尊榮蒼顔白髪時遊大廷其德日新其福日增天子萬壽共享太平宗忠簡公􅀞像賛公之力足以旋乾而轉坤公之功足以攘夷而安夏始以一言能返北旆而南還後以二十四䟽不能回南轅而北駕且留鑰之任方切而巧言遽入於帝聰度河之志未酬而大星已殞於中夜何人之於公則知媚嫉而天之於公則不知假借此有志之士百世之下所以想英風而激昻拜遺像而悲吒也象山陸先生賛趙東山儒者曰其學似禪佛者曰我法無是超然獨契本心以俟聖人百世敬賛先正誠意伯畫像劉仲璟虬髯電目􅊥天根兮斡地軸扶龍興雲四方以肅以生民休戚爲憂喜以大道晦明爲榮辱武功旣成而文治未盡其用者蓋天也耶抑人也耶田疇賛有序方希古智勇人之所有也善用之爲難忠義人之所慕也審處之爲難天下非無豪傑之士而功不見著於世何耶豈其智勇之不及忠義之沮喪歟用之失其時處之逹其機者衆也荀或不用於曹操則可以比子房董卓呂布不爲逆亂則可追韓彭廉丹王尋爲漢而死則有以與周奇等而皆不免於君子之誅其迹同而其所爲異也漢末之亂酷矣余求奇士於其時得一人焉曰田疇忠不避難勇不畏死奮然感劉虞之遇而思爲之報讐公孫瓉旣亡謂可以盡力者漢室而已故應曹操之辟旣而知操非忠漢者也故辭封侯之爵介不同俗淸不悖倫忠在樹功義不茍合其才良其行果蓋豪傑之士非當時奸雄所及也論者眩於成敗使操以可功見取而疇之志義不大章明於後世豈不謬哉孟子曰人有不爲也而後可以有爲若疇者庸非其人耶其不成功者命也豪傑之士制於命而不獲施者衆矣善觀人者觀其志不觀其事觀其噐不觀其位由是而言士之不幸者獨疇乎哉吾是以悲而賛之其詞曰古之觀人不於用舍考其所存以第高下譬諸龍駒垂首糞車豈以其賤斥之爲駑齊侯千駟如南面王仲尼之嘆夷齊有光漢季分爭得國者操吾獨何爲田疇是悼操雖據國大䑕之雄殺后無君天下不容奚若君疇忠義蓋世委質劉虞身死靡二使受之命爲漢大臣殺操復漢必不顧身嗚呼鄙夫惟利是就誰能爲儔我與爲友翰林待制華川王先生畫像序賛傳曰國之將興必有禎祥其得人之謂乎故善觀國者不觀其甲兵之雄財粟之多土地之大而觀其得人賢否誠得其人弱可强敗可成不得其人雖威力富庶敵於海内亦不免於亡天將授人以天下亦必授之以守天下之噐賢者之所在天下之所歸也當國朝之始興地界於羣雄之間最微矣然是時有數君子者皆起而從之識者巳知天命所属旣而或以功業定亂或以文章賛化卒能合四海於分裂之餘不越十年遂致平治嗚呼是豈非天哉烏傷王先生充在數君子中博辨通達以文章名上之爲吳王授江南儒學提舉司敎理陞禮部侍郞兼引進使轉起居注出同知南康府事及上卽天位召入議禮改章州通判會詔修元史遂徵還與金華太史公俱爲總裁及史成拜翰林待制未幾而出使西夷雖未獲究其設施然其有益於國者大矣世之趨近功者恒謂儒者不足爲時重輕此非知本之論譬之人身彼一才一藝者猶手足耳目然而賢者則元氣也人見手足之能持行耳目之能聽視而不知皆本於元氣不亦惑哉某幸受業太史公而以未識先生爲恨先生之子紳以畫像見示乃敘而賛之曰天眷有明勃然龍興豈惟智謀得人乃成其人伊何匪將匪相爰有君子海内之望望旣歸之孰能違哉彼王彼侯小大畢來惟華川公蔚其文雅位雖不崇各動天下人知其名豈知其心我懷德音山高海􅀷義鸛賛并序高啓吳報恩寺浮屠之顚有鸛二巢焉以遊以宿出返必俱一日其雄里脛輪索中奮翼自擲空懸弗脫雌下首大鳴若􅈼于人衆憐之莫能升遂宛轉而絶雌依其傍弗去羣鳥欲磔之輙引喙怒逐不使近逮毛骨盡化乃巳余居􅀡寺東甞見其彷徨飛旋形貌􅃤悴風雨之夕哀唳噭噭若號慕然余念夫世固有伉儷相悅者矣一旦失所天哀未改而巳他適塗膏自媒唯恐非艾晨咷夕􅛐曾無含忸世甞以禽喻惡人寧不辱是鸛哉廼賛曰嗟爾鸛乎維鳥之特猗雄死自守禦烏之賊猗獨棲于標夜失其匹猗哀嘶返顧不啄而食猗厥質始化豈貞之􅅎猗匪魯黃鵠孰配爾德猗戴院使賛茹常神閒以淸氣和以平質頎而厚貌澤而明學則究軒岐之奥書則啓金石之經昭代之老處朝廷蓋得其道毉國之手雖蠻貊亦知其名懷仁慕義秉德存誠是宜受高皇之奬譽荷仐上之寵榮齒餘八袠而强徤身備五福而康寧若夫託泉石之高致締松桂之幽盟彼􅀞史者徒知寫其歸隱之趣而莫能得其戀闕之情也耶陶弘景讃王達士之善於觀人者往徃不於其所之所巳爲而必原其心之所隱微者而觀焉惟能原夫心之隱微者而觀之則其爲人者昭昭矣彼泥其迹之顯然者而觀之夫豈得容僞於其間哉吾於齊梁之際得一士焉陶公弘景公生而有異四五歲卽知用荻畫􅁅以爲書甫長讀書萬卷以一事不知爲之恥齊高帝作相用爲諸王侍讀彼時雖在朱門閉影息交不外物接永明間掛冠神武門巳上表辭祿矣當斯時也窺神噐者匪一人朝爲君臣暮爲讐敵朝爲揖遜暮胥篡奪雖欲以力濟之奈天道之未定何於是自勾曲遍歷名山尋訪仙藥毎經澗谷必坐臥於其間所居皆植松聞其聲輙欣然爲之樂性好著述凡隂陽五行風角星筭山川地理方圓産物醫術本草罔不洞究自以爲神丹可成壽可致梁武資之以黃金朱砂等物亦不靳而受之至八十五無疾而逝夫當太淸之際以梁武爲故人取宰相如拾芥此衆人所不能得而公可得者可得而公恬不爲之意茫然與世相忘焉公之賢爲何如蠱之上九不事王侯高尚其事者不偶於時者之所爲也公可謂偶於時矣而猶不出者庸詎知天下無可事之主哉故其詩曰夷甫任散誕平叔坐論空豈悟朝陽殿遂作單于宮厥後天下玄理荐興武事日弛侯景纂位實在昭陽然則公固有遠慮先燭之智矣亦豈可謂公為長逝忘返而無憂世之心者哉予故仰其高風想其遐躅原其心之隱微者為之讃曰蓬蓽旣高芝蘭斯晦梟鴞成羣鵉鵠斯退君子知微黙領心㑹醇酒雖甘詎宜忘醉哲哉陶公靡所不通糠粃富貴勾曲之從月高秋肅一枕松風安知其他我保其躬彼不知者謂公少疵山中宰相天豈介而我知公心澹然無為不與物絶龍變是宜上陵下替世道日榛寜於其時俯仰屈伸烟霞泉石今古乾坤高風邈哉不見其人自題侍敎像賛楊士奇此老之生今七十有三年其仕凡三十有七歲歷事四朝恒持一志顓顓乎毖愼肅肅乎嚴畏不敢内非􅀋之交不敢徼非義之利祿愈增而意愈澹秩愈進而心愈惴治官務如家務視海內如室内雖不能萬一之有濟而不敢須臾之或怠誠懼上孤明聖之恩有忝淸白之世閱春華之屢謝撫寒栢而猶翠聊自寫其素存示同宗以袛勵族孫挺來北京旦夕在左右里蕭生為寫侍敎圖挺以求賛因謾書此然士之師古挺尚從事乎遠且大者可也七十歲自賛楊滎荷蒙先世積德之厚叨承列聖眷遇之隆乆侍禁近兾效愚忠當齒力之旣衰尚責之愈崇目愧乎進無所補退不我從徒存心之兢兢而懐憂之忡忡惟古人堯舜其君民者素景仰其高風思勉焉而不懈期一致於初終者也故延平守胡子祺賛鄒緝故延平太守胡公旣沒三十年緝始得其墓表而讀之爲之嘆曰嗚呼士惟患不見用耳未有用而不見其效者况得顯行於其位其大小設施豈得不有所見哉國家初興凡所選擢必擇其才良端􅀡之士而任之士旣抱􅀒其所有故見諸有爲皆足以震耀於當世而其所立􅀋非迂儒俗士所能及若公是已公以洪武三年應詔至京師受知太祖皇帝擢拜監察御史卽上書論遷都關中事其後出爲按察僉事調知彭州陞知延平府事以沒公在風紀不爲激擾之政而人畏其威蠻服其化獄以常空其爲彭州築隄堰修水利勸民務本力業郡中翕然稱治至爲延平聲稱尤著至今延平之人能道其行事蓋其愷弟之化有以信於人而其才德又足以服之惜其名位止於此不克臣於乆遠也昔何武爲楊州刺史凡所刺舉未甞敢自私而又仁厚以處下故郡國各重其守相張詠知成都寛嚴適中威惠信於人故旣薨而蜀人爲罷市蘇子瞻謂其遺愛蜀人乆而尸祝之若公可謂無愧於公者矣公之次子光大爲春坊右庶子與余爲同門友旣覩公之事乃追爲之賛曰昔在太祖勤思賢輔有偉哲人實承知遇布衣登朝居法從班還都之議動于天顔内臺外憲荐􅀭風紀兩紆郡符嗚玉曳􅂂材宏德碩無積不施惠愛所加民自懷之肅肅之儀瞻望莫及箠䇿之從願爲公執鏡容自賛楊傅資可以爲學而理或未明時可以行道而力有不至緬懷古人夙夜惟厲而莫及焉嗚呼老矣吳敏德像賛王􅀡海虞吳敏德爲都察院右僉都御史特敬愼之心秉㢘􅀡之節其議論舉措蓋有前賢之遺風視世之隨俗變化方外而圓内者相去遠矣此其像也而予爲之賛允毅吳公率德自躬聖明御􅀖克躋顯融豸冠峩峩􅀖之司􅀡必誠必恭不詭不激雍容進退端笏垂紳小人所憚君子所親維昔名臣始終一致神之相之福祿斯備風霜肅物生意寔存願弘厥施以暢皇仁自賛小像其才學則迂踈其志行亦狂簡幸逢時以效愚毎惴惴於自反然僚友謂之强而主上謂之板愧變通之未能徒爲達士之所莞也强者矯亢不阿之名板者愚執不通之謂蓋氣質蔽固之巳􅀷而學問變化之未至若謬比於憸邪則難合乎公議雖内省之無愧然豈敢忘敬畏也哉訥齋賛金寔言可訥乎心因言以宣道假言以傳言不可以訥也言不可訥乎身由言而困事由言而僨言不可以不訥也訥乎訥乎殆將訥其所不當言而不訥其所當言也夫在鄕黨則恂恂在宗廟則便便是爲訥之謨伏生授經圖賛有序周敘伏生諱勝済南人也桉史記伏生故爲秦􅀶士孝文時求能治尚書者天下亡有聞伏生治之欲召時年九十餘老不能行於是詔太常使掌故晁錯往受之先是秦焚書伏生壁藏之兵興流亡伏生求其書亡數十篇獨得二十九篇卽以敎于齊魯之間學者由是頗能言尚書諸山東大師無不渉尚書以敎矣又按漢書顔師古註當錯受書時伏生老不能言言不可曉使其女傳言敎錯齊人語多與頴川異錯所不知者凡十二三略以其意属讀而巳是圖蓋當時授經之象申坐者伏生旁侍者其女前跪而坐者錯也圖用縑素僅二尺而蒼山古栢􅂕芝石牀書几之狀莫不曲盡巧妙畫者之意亦工矣哉於戲聖人之道寓於六經而書者二帝三王治天下之大經大法所由載有天下者不可不以之取則也使非漢文求之伏生傳之天下後世將貿貿焉莫知聖帝明王精神心術之所寓而道晦矣愚故謂尚書一經不幸焚㓕於秦幸而表章於漢尤幸而傳授於伏生也且是時伏生年巳九十餘使漢文求之不早不幾於泯焉矣平然則是書之傳豈非天耶而其所以􅁇往聖開來學之功又豈居漢之諸儒後哉戸部員外郎高君信以是經登進士歴官朝著有聲家藏斯圖命工裝潢成軸以余家傳是經也求識之乆之未敢執筆而高君之請益堅敬用書其故而爲之賛曰大哉聖道寓諸六經煌煌尚書實統厥成秦亡漢興斯道幾晦展也伏生爰際其㑹心惟口誦以敎以傳晁錯之受漢文之賢斯文千載旣晦而顯展也伏生其功不淺咨爾後學是仰是宗拜瞻圖像邈焉高風文昌帝君像賛劉定之有以孝陵御容傳寫爲文昌帝君像者臣定之稽首賛曰日行于天光寓萬形全得爲月分得爲星雲得爲霞雨得爲虹影得水底火得鏡中圓明晶彩晶彩日同於皇開天自天陟降其寓于兹文昌帝像主世之文緯地經天有赫厥用無私其權冲天烏紗朶雲龍􅂁就之日近望之天高臣拜稽古古亦有是宋仁宗像卽眞武帝皇明文衡卷之二十一
