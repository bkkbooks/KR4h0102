front:
  text: 皇明文衡卷之一百
  hash: sha256:2db60bb36a7cf8000f22e34ae0fe369b742aa09c9f54f2cd61f719bca62a29a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_100-1a}
body:
  text: 補缺送程憲僉序唐仲予家世學詩毎誦皇皇者華知君遣乎使臣之為君使者各盡其道也後世君臣未盡其道上下之情不通所以胥失之矣合淝程公以儒起家􅀄聖上龍興濳淵渡河以宅帝位公用言者薦遂爲中書省都事謇諤有骨鯁風時國公開省南服英譽洋溢貸以自助擢爲執法諫議官朝夕匡弼不肯少禠之六年特授提刑按察司僉事明年行郡興安値干戈劻勷之秋與民更始不􅁄不阿不忍擿之以事暇日謁夫子廟過紫陽精舎瞻仰文公乆之予方以紫陽祠吏告老從容語曰學校之興書聲不聞虚文耳嗚呼劉項交戰魯猶絃歌不絶故曰曲阜聖人之敎也况今紫陽卽魯之曲阜也學校廢子衿作豈無倚席不講之羞世之俗吏世之俗吏但欲華爾宫以規爼豆之地殆未知爲敎者可勝􅁣哉公字嘉貞瑰文傑句􅒐􅒐儒者也予序論古今遣使之道以為公瀆亦欲上下之情通詩凡􅀂干首於是唐仲推其意序之送楊尚書序徐有貞景泰二年冬十二月詔以禮部尚書楊公彦謐爲南京刑部尚書行有日主事孫曰譲以其行爲請予與公交爲忘形甚乆又幸爲同寅誼不可辭公明敏有才識時務多幹局始以進士爲主事爲郎中爲侍郎皆在刑部所歷皆未乆皆以軍功遷秩其進取固銳然於公之勞勩實足以當之也比一二載間福建寇作而江西爲鄰壌遂命公往保􅁵之卒用底寜用是召還陞禮部尚書居歲餘有大臣言南京固根本地而六部都察院多缺正員不足以鎮之上可其奏事下廷臣論薦而廷議謂公在刑部乆練習法比大司寇之缺非公不可遂聞于上是以有今日之命也或曰朝廷方資公以典􅀖禮和神人治上下頋乃今輟此而置彼可乎予曰民協于中者司寇之職也而保障南京者朝廷付託之􅀷意也茍徒以明刑爲公之職業而遺付託之重是不知命公之意也公之是往其寄不旣重矣乎其可不思所以副皇上之任使乎是爲贈故承􅀡郎太常寺丞柳莊袁先生墓誌銘姚廣孝永樂八年歲在庚寅十二月初五日承􅀡郎太常寺丞柳莊袁先生卒于家訃至京明年辛卯正月二十二日其子中書􅃕人忠徹奏聞上爲之哀悼賜鈔六百錠營塟事遣中貴官祭于其家二十四日忠徹傳奉敕㫖命臣廣孝撰先生墓誌臣謹奉命按賜進士出身吏部員外郎臣陳宗問行􅃺先生諱珙字廷玉姓袁氏系出南昌世多聞人宋南渡有諱子誠者知臨安府兼大宗正司丞扈蹕至鄞遂家焉其孫鏞以進士死忠於德祐聞曾祖諱景安登進士第祖諱衍隱德弗耀考士元文林郎翰林國史檢閱官博學能文噐量恢廓性明果義有所不可則奮力正之故郷閭以中􅀡稱􅀄衍無子以弟澤民承後澤民仲子士元謂弟無􅁇兄之義白於有司奉澤民歸宗而巳爲衍子俾得倫序不紊自號菊村先生實德祐忠臣之嫡孫也生子四人曰珙曰珪曰瑛曰璟珙卽先生也先生性剛毅􅀡方不泛交於人安貧飬志粹乎有道之士也當勝國之季勵精儒業九流百氏之書靡不涉究然時與願違遂㳺歴湖海間遇異僧别古崖於補怛洛伽山一見而奇之因授以相人之訣期先生後必以術顕先生决人貴賤壽夭禍福休咎如指諸掌凡求占者必先察其心志聽其語言次觀其形氣然後㫁之以吉凶規之以忠義雖逹官貴人遇之不以禮則拂䄂而去豈以􅀔利能動其心哉聖朝啓運天下和平先生乃歸鄞城之西聿新其先業所居前後皆樹以柳扁曰柳莊鄕之人皆稱爲柳莊先主洪武間上在濳邸聞先生名遣使以幣禮聘焉先生旣拜受卽沐浴戒行李而起及見上大悅先生於是肅恭而前凝神佇思面對聖容俯仰左右一目而盡得矣先生再拜稽首而言曰聖上太平天子也龍形而鳳姿天廣地闊日麗中天重瞳龍髯二肘􅀂肉印之狀龍行虎歩聲如鍾實乃蒼生眞主太平天子也但年交四十髯鬚長過於臍卽登寳位時上雖聽其說而未全信居無何先生辭還故里錫賚殊厚洪武三十五年壬午六月十七日上誕膺天籙嗣登大寳發政施仁萬幾之暇因感先生昔言之驗若左右劵無毫髮遺失於是敕遣内侍驛召至京拜太常寺丞授承直郞待以特禮賜冠服鞍馬文綺鈔錠及居第在京以便其老上廵狩北方巳丑冬十月尋有旨召至行在先生卽日就道東殿特念其衰老非霜露所堪於是賜貂裘安車而敦遣焉旣入覲奬諭有加巳而得請展省先塋復敕驛置歸其鄕恩至渥也及先生卒上賜鈔以營塟事遣中貴官祭于其家復敕臣撰墓誌先生感荷聖恩始終榮顯自古所無有先生卒時年七十有六先生平日篤于孝友天性然也親疾革則焚香􅈼天減巳之年以益親壽疾果差人以爲孝感所致暨失怙恃哀毀過禮先生時厄於貧窶衣衾棺槨爲之必竭其力由是禮無不備宗族之貧乏者恒嗇巳用以賑之弟妹之􅀌􅄔者咸推恩以撫之有嫁娶之不能者出財力以相成之先生與鄉黨也正而不群處妻子也嚴而有禮交朋舊也以信義而不阿䘏患難也救之惟恐不及人有以役當徙而委之金百鎰不相聞者餘十年及其歸以金還之封識如故友人以事逮于殁者莫之能贖先生收厝以歸其母先生臨利害一以理勝略無頋忌趨避其忠義正大如此先生好爲歌詩與客燕飮酒酣擊􅇲仰天豪吟人以爲康節先生也先生知命之終屬纊之日怡然如常溘爾而去故鄉閭父老及所交㳺者罔不悲嘆公􅀸大夫士走哭奠祭者踵相接于道先生娶倪氏有婦德子男五人長忠敉先卒次忠敏淳而勤於家事次忠敎逰藝校庠賫志而殁次忠徹性資頴悟善承家學由鴻臚寺序班陞上寳司丞今調中書含人嘗扈從北廵上尤寵厚也次忠􅛴又勤于學女一適慈溪士人潘惟聰孫男七八應䮾應駺應驪應駒應騊應􅂹應駿孫女三人皆幼忠徹奔喪歸以是年三月二十四日扶柩至桃源楊山人嶴塟于先隴之左嗚呼先生爲人剛方中正學純行端綽有古君子之遺風於是皇上見知特加禮遇豈惟其技術之精妙而致然爾昔袁天綱父子事唐太宗名著方䇿以爲希世之有今觀先生與其子忠徹際遇聖天子始終恩寵莫大之榮顯豈天綱父子可能跂及者哉先生平日相人之奇驗九􅂕山人戴良傳備詳兹不復繫銘曰袁氏之系出于南昌世多聞人積德其滂臨安來鄞乃爲故鄕鏞死于節德祐忠良文林學古噐量恢弘挺生先生資性剛方不泛其交克紹厥芳渉究經史吟詠詩章縱逸弗群雄豪是長不事其家逰歷海􅀖歘逢異僧奇其目明因以授彼相人之方術日以精名日以張課子畊讀號曰㧕莊曁于昌朝際遇聖皇優寵異等官拜太常子職中書橋􅎚揚揚旣貴且富日覲淸光高年賜歸以壽以康豈期無疾終于蘭堂遣官置奠錫賚盈箱子嗣孫承尚有餘慶塟于桃源先隴之傍勒文蒼堅終古不忘重修胡文定公書院記彭時崇安爲建寧望縣武夷先生胡文定公之故居在焉宋乾綂中巳祠先生于學而文定公書院則自元至正辛卯縣尹彭庭堅始書院在今四隅里之興賢坊其制右爲禮殿奉宣聖及四子侍坐像左爲祠肖先生像居中而以先生子從籍溪致堂茆堂五蜂四君子配焉祠之後有堂前有重門翼以廊廡名其外門曰文定公書院盖以表崇先賢且欲以待來學也其意美矣然歳乆滋敝近雖有修葺之者而棟宇傾摧凛焉欲壓天順八年秋八月建寧太守劉公行縣至崇安因入謁焉撫然有感乃捐巳俸率鄉貢士暨文國子生藍璣軰各助貲庀材新之而命大使王仲董其事易朽除腐飾漫漶以鮮潔規制雖仍乎舊而煥然一新觀者爲之起敬以是年十月始事朔三月而告成成之明年夏太守考績至京語余以其故且屬記焉竊聞崇安自名縣以來忠臣賢士之生多矣然道學之傳惟胡氏爲盛泝其淵源實自先生始盖先生資禀絶異早聞伊洛微言於游楊謝三君子而以講明踐􅂂扵家成其子從俱爲大儒遂啓新安朱氏東莱呂氏南軒張氏之傳而道學益盛以顯至其平生著述皆有觀名敎而發明春秋之功爲尤大盖春秋孔子之親筆聖人經世之志在焉非若他經可以訓詁通自左氏公榖以來傳註之行無慮百家文舛辭僻卒無定說聖人之宏綱大㫖往往欎而不明致使王安石詆以爲㫁爛朝報􅀡廢棄之不列於學官庸非聖經以衆說晦而安石無獨見之明故􅁘先生自壯年即服膺是經心領神悟獨得聖人之精微當宋南渡時執經進講􅀷見􅅄重及承詔作傳乃參考百家一折􅂨之以至理推闡㣲辭發明奥義其於扶三綱敘九法抑邪說正人心與夫尊王賤覇内夏外夷之意尤惓惓焉自是春秋之大義復明矣於戲周東遷而春秋作宋南渡而傳義明先聖後賢千古一心豈斯文之興固自有其時歟鄕使安石幸而生先生之後得聞其說將崇信是經之不暇而何敢詆棄之耶惟其不幸出於先生之前不能超衆說以有見是以得罪於聖人取譏於後世也然則先生之於是經誠可謂􅁇往聖於旣絶開來學於無窮其衞道息邪之功於是爲大矣我朝推崇先生列諸從祀誠萬世之公論而崇安乃先生鄕邑矧可無專祠以起後人之景仰也哉此太守所爲盡心於書院而不敢後也􅁇今學者仰而瞻其容俯而讀其書一惟其道德言論是式是循庶幾進德脩業早有成效然後無􅀒於太守表章風勵之意太守名􅃏字仗德世家安成爲贈學士忠愍公之子浙江憲副釪之兄父子兄弟相􅁇以春秋第進士而太守爲政尤汲汲於重名節表風俗亦其學有所本且知所自云
