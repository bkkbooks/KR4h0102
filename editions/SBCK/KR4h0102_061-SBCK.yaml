front:
  text: 皇明文衡卷之六十一
  hash: sha256:bbd3772e4610858745d435441b66d0016d24156f0bfe7b56af17df2fb5f08c7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_061-1a}
body:
  text: 傳錢可大傳梁濳可大名瑛姓錢氏本吳越王鏐之後歴廬陵刺史匯再世曰和自廬陵徙吉水又四世曰程程之子誠可皆以科第有聲而可大之祖本和號梧岡先生者􅀹篤行之士也可大生十八月而􅀌稍長性頴敏年十三以書經中臨江路賞試旣又中撫州路賞試然是時元祚日非紅巾盗起所在皆争為雄長自至正丁酉五六年士大夫顚頓甚矣可大奉其祖及其毋崎嶇以避之走廬陵之富田遷㤗和之梅同旣又走其邑之大洲尋又奔雷州㝡後奔廬陵之李坑李坑路極險盗又追及之梧岡􅀍鎗不死縛之以行可大聞卽冐白刃奔訴乞以身代盗幷縶之可大訢不巳梧岡亦哀訴其無子唯此一孫耳兩人因争相代死情亦悲􅃤賊憐其意遂兩䆁之可大方脫時其母尋亦􅀍埶而可大妻張氏翳伏叢薄中窺見賊巳執其姑卽自出迎謂賊曰我姑老矣請釋姑而􅅞我賊熟視良乆即解􅅞其姑􅅞張氏張氏旣就􅅞擲所携袖中雙鞋與其姑訣曰婦無用此矣且行且脾睨其始稍遠即罵賊不復肯行遂死之变故倉卒之頃而一時憤然求死以全生者􅀂素約然何其可悲也國朝兵定有司以可大之賢凡三薦之皆以親老辭親旣没終身爲之悲痛梧岡故所築樓可大毎一登之輙流涕因名之曰思樓其孝行篤至世盖少見也然其爲人頗豪健嘅然以氣自􅀒郷有劇㓂嘗殺人有司憚不敢捕以屬可大可大立捕殺之年􅀂干卒于家一子曰遂志今以科第得官為山東按察僉事云賛曰吾嘗過錢氏所居其地今所謂錢瑭者愛其山水清曠因登高而望焉其南數十里外峻峯躍起視衆山特高云其北即宋丞相文信公故居也諸老人言丞相徃事與史傳所記殊異因言可大之避亂也居其山下㝡乆其􅀍埶也亦㡬不免余旣壯其山川又聞可大事思見其人而不可得也因爲之傳云徐孟昭傳公諱旭字孟昭姓徐氏饒之樂平人其先南昌人也居樂平者十七世世以儒為業公㓜頴悟稍長從其郷先生蔡仲淵授春秋爲文辭巳超詣㧞出見者皆竒之年三十一登洪武乙丑科進士第行浙江道􅁥察御史入爲禮科庻吉士日記事侍上左右上方屬意天下進士毎朝羣臣退獨進士留􅀍顧問上未退不得退也一日上呼公至前將有所任使而公奏對弗克稱旨上以其迂也命分敎于􅃰州之房山復教諭鳳陽皆以憂去服闋擢安王府紀善用薦者陞爲知州入史舘上書論天下事多不能合公益落落自殊無所顧惜遂自史舘出爲考功員外郎及今上即位遷郎中預修高皇帝實録明年拜朝列大夫國子􅀕酒文明年罷爲翰林修撰以卒公在高帝時素以篤學見稱數言事切中當時高帝嘉納之然欲老其才故抑之乆而未有以用之也及在考功拒請託抑僥倖是是非非毫髪無所遁其情而􅀹以謂天下之治與敎在守令與敎官守令敎官弗稱其任者尢精覈之無少貸衆望風諠騰公持之益堅及在大學亦如在考功時然公純謹君子也雖盛威嚴而中情簡質好惡出乎其至誠至於卓卓自守激之而不動挫之而不撓人未有過之者也居大學僅一年諸生凛凛僅自修飾而其僚屬之不便者巳譁然議之矣憚之者方側目於下忌之者又背沮之於其私至相與揶揄其所爲公以此竟罷改雲南參議君子莫不惜之及陛見上察其無他特命除翰林脩撰俾預脩永樂大典爲副總裁方向用之而公卒矣時年五十二上聞之悼惜勑賜棺以歛遣禮部主事端禮諭􅀕焉公盖終身坦夷不事表襮而其嫉惡剛勁人有所不堪者世以此高之而亦以此與之齟齬者衆也其爲學明於義利之辯爲文約而明喜薦士所薦㝡多且賢屢考試科舉其得士㝡盛而尤孝於其親自鳳陽考試河南時入朝告歸省其母疾方亟公聞倍道疾趨至家母疾忽爲之愈數目竟卒人以爲孝感所致云賛曰考功與大司成皆國家要職非得才賢譽望之士以居之誠不可也然而信道明義篤行如公者徃徃猶難之豈天下豪傑羣居之地是非好惡所聚非素有驅駕籠䇿之才者終不足以騁􅁘自公在大學與考功人情固多不附也及其殁已乆相與稱賢考功與賢司成者必曰公事須乆而後定亦理之常然無足怪者獨念聖上於賢士大夫保全覆護如公者蓋有無窮之恩焉予素知公恐其乆而失之也因取其行事而論次之將用文傳陳􅁇蔣用文名武生以字行其先居魏州五世祖安中金國子助敎以直諌不納棄官攻醫曾祖應茂徙楊之儀眞祖夢雷元楊州路醫學敎授父伯雝舉進士崇明州判洪武􅀄召爲史官以疾辭出爲蘭陽丞用文少穎悟讀書過目成誦六歲事學從里中師有贈師萬年松者命賦詩即就曰使者來西嶽採松云萬年佳名雖自好何不長參天師驚喜曰是兒已見不噐旣而随父宦寓日俟公暇持所業質之聞就無疑問父大奇之曰吾有嗣矣父殁歸儀眞舊業廢於兵燹渡江占籍句容採山構室居之大肆力於經籍乆之得聖人􅀷意乃習醫家言㑹同黜異約其要而綜之取正於術之精善者而受其秘於是决死生定緩速治效無一不中者由是用文之名驅四方矣孝事母魏夫人情依依不去左右食飮非躬治弗進夫人病􅀍衣而不交㫸者數月夫人老郡縣交辟不就曰吾不能舍一日養以趨祿利也夫人殁當洪武中始受薦入太醫院時朱彥脩弟子戴原禮爲院使檀其術人無有當其意者見用文喜曰君儒而爲醫昌吾道必矣遂言於上授御醫永樂八年陞院判典幹成勞僚􅀋所歸仁宗皇帝在靑宫用文日侍左右承顧問隨事獻䂓益甚見親禮嘗問保和之要對曰在養正氣正氣完邪氣無自而入又問卿醫效率緩何也對曰善治者必固本急之恐傷其本聖人所以戒欲速也仁宗稱善及課績特命光祿置宴於院宴之旌其忠勤又嘗命工部爲營第用文入扣顙謝曰臣荷恩德萬不一報又敢靡公費以益愧悚也再謝乃止其就故人居之一室蕭然晏如也用文病且革手自爲啓附進有曰臣老病死不足言惟恨不能有報大恩伏願淸心寡欲愼加保養以輔聖治以安萬姓仁宗得啓驚嘆親御寳翰遣使慰問及卒命兵部給驛舟還其䘮督治祠墳於中官仁宗卽位詔贈奉議大夫太醫院使特謚恭靖遣官諭祭官其長子主善爲院判用文醇厚恭謹知當世之要務其忠誼愛君之心惓惓於語言故能受知於上所以慰問誥􅀕之辭皆懷念忠誠揄掦學術以明上之不忘也居兩京三十年王公貴人下逮賤􅀠細氓愈其疾而著神效者歲不少貧者報之曰吾非爲報爲尔醫也卒皆不受善交友始終不渝宗戚尤洽恩義奬勸後進汲汲人過耻出其口志嗜學雖老不厭治一室於公署之傍者顏曰緝熈於家居幽屛之所者顔曰静學皆盛貯羣籍暇輙翫閱其中時忘食寢或謂曰子老矣何勤益至是耶用文曰昔衛武公年數九十五猶箴儆於國俾臣下朝夕交相告刑乃作抑詩以自儆卒謚睿聖武公吾雖老幸未就木而敢以怠荒棄厥躬哉或又曰緝熈静學意有􅀃乎用文曰學有緝熈于光明成王之言也非静無以成學諸葛武侯之言也吾志在是其爲詩文有静學齋集􅀂干卷治效方論􅀂干卷卒之日無貴賤䟽戚咸咨嗟悼傷曰善人亾矣子四人主善王敬主孝主忠皆立行有父風竹軒劉先生傳王英先生姓劉氏諱亨字嘉㑹號竹軒其先居安城之宻湖宋豫州刺史斌徙廬陵石塘里斌曽孫江寧司戸滫又自石塘徙其邑銅溪高祖哲甫知汀州曾祖景春元海南䀋塲司丞祖貴翁父樂山先生端敏勤學㤗和陳心吾劉􅁢中時稱名儒先生從之遊通詩書二經􅀶䆒諸史百氏之書洪武壬戌以賢人君子徴力辭親老後舉經明行脩陳古今政治之要太祖皇帝嘉之命進講華蓋殿以言事忤埶政者出爲夀州學訓導戊寅冬上䟽言六卿秋當與五軍都督相埒國子􅀕酒䄮不當在太僕卿下又言將臣子弟生長富貴習爲驕侈他日安可授官冝立武學敎訓使知禮義以變其習俗陞常州武進縣丞爲政廉勤脩學校躬課諸生讀書表其民之有節義者毀􅁋祠禁絶妖妄作善敎坊再思亭以勉巳勵俗百里之内弦歌相聞三年書最天曹上褒以璽書壬午縣民李德懋等作亂先生白郡守母令滋蔓率衆擒首惡而諭降其黨方是時太宗皇帝初嗣大統遣使勞以金幣先生之名由是掦於遠邇無何以事罷還郷屢有薦者先生輙辭宣德中監察御史尹崇高力薦先生雖老猶可爲學校師表至京以年將八十辭宣宗皇帝曰伏生九十尚傳經八十豈不可爲敎官先生辭益力上曰老者安之孔子之言也朕􅁢其請令歸故郷先生歸怡然自得居則􅀷衣幅巾列圗史左右日吟咏不輟而動必蹈於禮於事有合義者必見諸行族弟夢華三䘮不能舉先生爲治塟又以近舍山數十畝爲郷里貧者塟人名之曰義山歲旱先生禱輙􅀨所居多種竹學者稱之曰竹軒先生卒年八十有㡬所著有竹軒集冩心集隨寓録子習之舉懐才抱德爲廣東按察司照磨孫同􅂂諏經綸綱同登已未進士第授浙江義烏縣知縣論曰自昔名人仕而功業顕著者多載史傳而唐之王友貞孟詵白􅂂忠諸人者以才學入仕未至大顕旣罷去則隱而終身焉豈有功業可稱哉而史亦傳之蓋以其志恬退不貪名嗜利禄耳􅀂先生之學行用之固可有爲中乃不偶雖屡薦再起而仕非所願視友貞輩夫何逺哉君子之論人必有取於斯故著之為傳云尚書王文安公傳陳敬宗公諱英字時彦别號泉坡其先太原人祖宗逹宋迪功郎仕于臨川遂家金谿㑹祖頥貞元季以書經魁江右入國朝退隱于家祖子岱父脩本並以儒行稱母曽氏公生十一歲而失怙母淑人以敎以比遊業邑庠刻苦嗜學登永樂甲申進士第時太宗文皇帝方銳意育才命翰林學士解縉選進士穎秀者與狀元曾棨䓁通得如二十八宿人之數俾尽讀文淵閣古今書作爲斑馬韓柳歐蘇文字命大官日給珍饌月賜燈油之貲數召至便殿問以經史諸子故實或至抵暮方退公在二十八人之中毎爲儕輩所推譲後上以綸綍事重以公與今冡宰王直皆愼宻可與任並揀入秘閣書進呈機宻奏䟽歲戊子預修太祖高皇帝實錄丁亥授翰林脩撰扈䠋廵狩北京丙申陞翰林侍講戊戌實錄成賜襲衣綵叚鈔錠壬寅胡㓂犯邊二月上親征公扈從至闊欒兒海五月旋師過威虜鎭李陵城已四十里上召公曰聞李陵城有石碑可徃視之復遣錦衣衛官校隨之以行時城中􅀍虜殺掠燒毀一空帷城北門有石出尺餘掘土拭磨􅀚之額曰李陵臺驛令謝君德政之碑其文畧可䜖其隂刻逹魯花赤䓁官姓名明日公備奏其故上曰此碑旣鐫有韃靼姓名異日胡虜見之必以此地爲已物爾冝再徃擊碎之用火煆沉之於河以絶其争端公如㫖而徃旣還奏上喜謂公曰秀才是二十八人讀書者朕需爾為用正好宣力勿憚劳苦因問曰朕率師伐虜爾試言成功如何公對曰胡㓂犯邊罪在不宥但聞天兵親征必逺走漠北臣願陛下幸母入險窮追也上笑曰朕爲天下國家計秀才之言惟不欲窮兵黷武耳復謂曰凡軍中一切動静或謡言之􅀋爾有所聞即來宻奏又諭太監孟驥曰秀才有事卽令入見母阻六月上駐驆安平鎭立功官軍因有過不與口粮者多相聚悲泣曰吾等粮盡必死道路矣公以爲言且曰此皆壯士也願陛下宥其過而與之恩則異曰必得其死力上恱卽命兵部尚書李􅂟人給口粮幷載衣甲驢一疋甲辰上復親征胡虜還次榆木川晏駕時仁宗皇帝在東官命尚書蹇義夏原吉學士楊荣楊士奇侍讀王􅀡與公同定䘮禮議􅀦政宿内閣凡七日仁宗皇帝嗣位加恩賜白金綵叚八月進秩侍講學士尋陞右春坊大學士兼翰林侍講學士明年乞歸省賜鈔二千緡俾馳傳而還宣宗皇帝卽位嘗召入便殿謂曰洪武中學士有宋濂吳沈朱善劉三吾永楽㧅則解縉胡廣俱有重名念汝當講經史陳道義以啓沃朕心罔俾前人獨專其羙賜内醞及鈔千緡命入内閣叅預中秘嘗奏乞分俸養母于家上􅁢其請宣德庚戌脩太宗仁宗两朝寳錄成賜白金綵幣襲衣陞詹事府少詹事兼翰林侍講學士復賜金相琥珀麒麟帶壬子正月聞太淑人曽氏䘮上命禮部賜􅀕工部造墳遣中官阮童護公奔䘮冬十月奪哀還朝寵遇日􅂭不時召對正統間開經筵公爲講官陳􅀃詳明於文義之外多有規諌之語其講章於朝退之際人争求去以爲珍寳脩宣宗皇帝實錄與少師楊士奇楊荣同爲總裁實錄成賜白金百兩綵叚鞍馬進秩禮部左侍郎兼翰林侍講學士癸亥正月奉旨出理部事講官如故乙丑淛江台寕等府民遭疫死甚衆上遺公齎香幣徃祀南鎭以禳民癘時浙間乆旱公至紹興大􅀨水􅀷二尺灌献之夕􅀨止星見明日又大􅀨田野沾足人皆喜曰此侍郎􅀨也布政使孫原貞䓁陪祀請作御􅀕感應記刻石于廟而還丙寅公奏京師去冬少雪今年自春徂夏􅀨澤不降種不入土小民缺食此皆臣等政事不脩激怒上蒼所􅃱伏望陛下施賑卹之㤙臣等宜益省愆戒節仍乞齋沐祈禱以格天心上從其言果大􅀨五曰先是公奏請􅃱仕不許至是年七十復上章乞罷政吏部言公精力未衰上是其言不􅁢戊辰八月上特㫖陞公南京禮部尚書明日謝恩畢内傳旨曰上以􅀸乆仕先朝多效勤劳陞秩南京得安佚旣視事南京二年得疾而終是爲景㤗元年五月十七日也春秋七十有五訃聞上悼惜賜謚文安命禮部賜􅀕工部造墳公在翰林屢爲㑹試考官海内名士多出門下爲文章典瞻朝廷制作經其筆居多四方求金石銘誌碑記者接踵其門公酬應不倦詩歌字書人罕能及論曰撫州多出名儒顯官􅀂宋之晏殊玉安國元之呉澄虞伯生諸君子其文章名位功業皆炳然當丗而垂䊮竹帛者豈偶然哉玉笥寳盖諸名山秀氣之所鍾也公亦撫之人也其文章名位功業莫不相似然自入仕歴官通顯不離朝廷四十五年而列聖眷遇乆益不衰於此則似過之矣天之生賢私於撫之人哉枊孰知公之才徳自足􅃱身於靑雲之上也黃氏母子賢孝傳李賢黄氏名文父鉉江西新喻人永樂癸已徙河間之任丘娶孫氏生文甫一歲啇於南陽之鄧州守禦所百戸李興見鉉文雅以女妻之未幾歸任丘李氏與孫氏相戻間達於興興遣人取其女還鉉亦随徃時孫氏年二十有四文方四歳鉉别後音問不通孫氏與文母子二人零丁孤苦人不能堪而孫氏奮志成家勤力紡績夜以􅁇日以供力役之征周衣食之費撫育其子年及成童謂所親曰吾聞子弟讀書可以起家今吾備嘗艱辛幸有此子􅀂遣入邑庠以朂其成天其或者憐吾志乎所親曰此意固善第念爾一子之外更無紀綱之僕子􅀂在官凡百費用尤倍於昔吾恐爾之艱辛未艾也孫乃愀然泣下曰吾巳慮之熟矣顧處子之計莫良於此雖倍艱辛安敢辭同編之人聞之勃然怒曰吾代爾子力役乆矣今幸其長不吾累焉而又脫之可乎雖懇情乞惠拒之益堅孫氏􅁨鬱食不下嚥巳而會所親達其情于有司始􅀗入庠孫氏且喜且懼愈極力生業勵子進學而凡從師親友之需未嘗少乏文亦感激遵母之訓潛心經史但自㓜父去嘗問母曰吾父安在母曰汝父世家江西爲啇河南吾亦不知其所樓矣於是母子相顧潸然山以悲正統已巳文以成材貢入太學㑹天下士子講習一日言及其父不知所在有同舍生玉綱者鄧州人聞其父名曰吾州百戸李興有壻卽此名也非汝父乎文因思母所云大喜曰是也景㤗􅀄以謁告歸省至家卽白於母徑詣鄧州訪父果在内鄉板橋鉉離其子巳三十四年矣一見痛絶方蘇親屬㑹晤悲喜交集留􅂾月不能同行文復辭父入監天順改元夏吏部掄才以文為兖州府通判乃奉母抵任視􅂐後卽遣人迎父就祿以養父時年八十有五憚於遠渉再迎不起至三母曰汝之孝心盡矣彼有所戀不可再迎文悲思不巳曰吾父不來吾卽棄官而徃闔府官僚咸跪請其母母亦悲感而許之一時見者無不沾􅁭乃以安車迎至鉉離孫氏巳四十四年矣妻子父母始得㑹合以遂天倫之樂嗟夫黃氏母子其賢孝矣哉向非孫氏之賢其子未必成立以有今日非文之孝其父未必㑹合以􅀗祿養遂使零丁􅀌苦之室變爲􅇛欒􅂬慶之堂予親見其事因為作傳以告於來世皇明文衡卷之六十一
