body:
  text: 題䟦題王維􅀞輞川圖王叔英右王維輞川圖僊居盧氏之家藏也間以求題於今余不知􅀞固不敢妄論然世自有識者亦不假於予言若維之事則有可言者維號文學之士其於出處之節君臣之義固嘗聞之矣當玄宗之季非可仕之時亦非難隱之日而維官爲給事中又無一言一事裨益當世顧獨以能詩􅀞稱則末矣及祿山之亂䧟於賊中又不能死則其罪益大有不容誅矣夫君子之出處內以視其外之可否外以視其時之治亂而進退行藏之機决焉如維者其才旣如彼其下其時又如彼其汙畊稼漁樵以自給可耳而乃挾技能之未叨爵位之榮是又不可徒以昧出處言之矣使其不遭宼亂汙節未彰君子蓋亦有不道者况至此哉故余觀是圖而於維􅀷有感焉嗚乎使維終始於輞川徙專藝之功以求道移進取之力以自修縱無補於時又豈不足以善其身哉然則觀斯圖者亦可以有所懲矣書九歌圖後貝瓊右九歌圖淮南張叔厚所作以贈番易周克復者越二十年而神氣益新其一冠服手板見三素雲中二史左右掖之而從以玉女一舉旄一執箑東皇太乙也其次冠服如大乙有牛首人身者執大纛飛揚晻曖自空而降旁一􅁎執杖者雲中君也美而后飾飄颻若驚鴻欲翔而衝波相蕩石上江竹班班者湘君其後風裳月珮貌甚閒雅儼乎若思者湘夫人也一叟髯而杖左執卷二從者俱稚而異飾大司命也秀而豐下冠服甚偉執蓋者猛士擁劍者處子一翁舒卷旁趨少司命也褁甲執弓矢眥裂髯張欲仰射者東君也一乗白黿水中者河伯而山石如積銕大松偃蹇皮皆皴裂成鱗甲一袒裸騎虎行者山􅀑也甲而執刀者一甲而執矛者一先後出亂山林水間慘無人色者國殤也叔厚博學而多藝尤工寫人物咸稱李龍眠後一人而已巨家右族以厚􅀡購之是圖凡二十一人有貴而尊嚴者有魁梧奇偉者有枯槁憔悴者有綽約如神仙者有詭恠可怖者有創而墨者旁見側出各極其妙予在三呉時所見凡二此蓋其晩年筆也克復旣寳之不趐金玉而先左丞玉雪坡翁又以大􅂐書九歌之辭于各圖之後可謂二絶巳間持以過予求志其左方按荆楚在中國南其俗好􅀑自東皇太乙而下則皆所事之神莫詳厥始然太乙爲天之貴神司命爲上台與北斗第四星文昌禮有不可褻者而東君爲朝日之義亦豈閭巷所得而僣乎雲中君者恐以其澤名雲故指澤中之神爲君謂之雲神以附漢志未知是否而河伯又非在楚之封內如湘君湘夫人也蠻夷荒遠之域民神雜揉私創其號以罔上下者亦或有之而歳時祀之必用巫作樂其來尚矣屈原九歌因其舊而定之比興之間􅃱意􅀷矣又豈惑於荒唐如人人之徼福哉其見之山􅀑者辭雖甚迫至大司命一篇卒曰固人命兮有當孰離合分可爲信所謂順受其正者君子􅀷取焉顧說者未之能察朱子爲辯之千載之下志亦白矣余之寓於九峯三泖也壹欝無聊命酒獨酌輙歌以泄其憤今叔厚又卽其辭以求其象使玩其象以求其心豈徒效馬和之軰之於詩哉且懼不能不朽腐磨滅於旣乆而文則傳之天下後世得考其彷彿也故書以志之觀者又可幷其象而忘之云洪武九年歲在丙辰夏五月檇李貝瓊序繫之以歌曰紫宫太乙中煌煌佐以五帝環其旁道存無爲樂且康豐隆儵忽周八荒􅀑搴大纛蛟螭黃上台司命中文昌斟酌元氣調隂陽福我以德淫必殃下招帝子隔瀟湘蒼梧九􅀧山蒼蒼跧烏三足升扶桑天門洞開夜巳明神人瞠目鬚髯張長弓白羽射天狼水僊胡爲宅龍堂九河旣阻不可方黿鼉出􅃿波湯湯山中之人白日藏天隂􅀨濕啼幽篁兠鍪戰士身盡創魂魄欲歸道路長吹蕭擊鼓歌巫陽酌以桂酒陳椒漿神來不來何􅄅茫書節婦施氏卷後王景嗚呼周之關雎德化至矣故野有死􅍪能以禮自防得于常也衞之流風靡矣而栢舟能以死自誓得于變也常固衆人之所能變非貞烈凛凛乎不可奪者不能也元之政亂政也妻母內嫂彞倫斁天理滅甚于衞矣而㑹稽張婦施以二十五喪所天鞠三歲􅀌以節操自全其高風貞烈賢于栢舟多矣天朝旌異之典行節婦有光于千古也宜哉書蜀府贈前左春坊大學士董安常詩後昔賈生嘗言于漢文帝曰廉恥節義以治君子僇辱不及犬夫終漢之世節義成風下逮唐宋臣下有辠止于貶斥覃恩賜宥必量移內地豈徒然哉如天之德均􅀍枯朽故也皇上德竝天地旁招英俊聚于京師爵之以官任之以政以闡文風以濟元元以幸天下三十年于玆矣然沾濡德澤終始垂眷未有前左春坊大學士董安常先生若也先生以某甲子召入禁闥􅆒歷中外所言無一不愜上心者前年坐免典敎滇南東宫憐而老之賜以白金若干鎰皇上東官之所以待先生者卽賈生所謂節義廉恥以治君子者也先生涉淮㴑汴驅馳梁雍之郊以逹于蜀蜀府親王􅀷寵之留連彌月恩禮有加賦詩八章以道行至滇凡作養成就以夏變夷漸之摩之膏之煦之皆出于仁義道德故雖蠻童夷竪皆知向方明年景彰至滇與􅀚教章伏讀再三感歎無巳蓋先生之器宇表于朝廷之上而親王之文藻麗于殊方之外鸞翥蛟拏珠明玉瑩豈世儒末學彷彿其萬一哉嗟夫士大夫當流離顚沛之餘遭皇上寛仁之政孰不思奮身捐軀以自澡雪然卒未能者去天萬里自新之忱無繇瀝也􅀂先生者聖眷日隆中外属望又豈特量移內地之比羽儀天朝行有日矣柔兆困敦日南至王景彰䟦讀李斯書王達君子之言難入小人之言易從蓋正者必拂其心邪者必順其欲順其欲烏得而弗喜拂其心烏得而弗怒此君子小人之言所以異也吾甞讀李斯上秦皇逐客書而有感焉夫秦皇之爲人可謂虎視四海者矣李斯數語而秦皇終不敢逐客者何也此斯之所以能順其欲也先誇人君得客之福如此失客之患如此所以啓之也然後以富貴珍寳炫其志音樂婦女鼔其惑所以㗖之也當此之際秦皇逐客之疑巳去八九矣李斯至此當如何哉則將有以懼之焉故曰今逐客以資敵國損民以益仇內自虚而外樹怨於諸侯求國無危不可得也嗚呼斯之術至此盡矣奏皇之心至此懼矣斯雖欲去秦皇有所不容其去者矣先啓之以重其聽後㗖之以滌其疑終懼之以堅其志此斯所以能順其欲也嗚呼邪言易入於人者如此惠王好利孟子以仁義對之宜乎不能入也嗚呼䟦戴元禮仁義卷董綸洪武三十一年夏五月太祖高皇帝疾大漸二十四日庚午輦出御右順門召太醫院諸臣詰其治疾無狀敕付獄正其罪復進御醫臣戴元禮至榻前慰勉曰汝有仁義無與汝事愼勿恐臣元禮頓首而退帝卽還內後十有六日遂崩今上卽位以先帝之意拜臣元禮爲院使階奉議大夫今年遼王來朝京師臣元禮告以故王爲之歎息乃書仁義二大字以紀異恩昭明訓示子孫而俾臣綸識其事倫識惟仁義之德至矣易曰立人之道曰仁與義君臣非此則乖父子非此則悖兄弟非此則爭夫婦非此則􅢦朋友非此則絶事上不以此則功不成使下不以此則衆不附身以之而後脩家以之而後齊國與天下以之而平治寧輯不可俄而違瞬而去也君子所以汲汲以終身者全乎此而巳衆人所以迷顚錯者以其昧乎此故也吉凶禍福之報寧忠簡公翰墨記胡廣先忠簡公澹菴先生手書五通第一書與二十一姪學諭第二書無名中有叔此麄安之句亦與姪書也第三書後曰啓英彦姪前稱二十一學諭者以家譜考之卽英彦也三書皆是與之卽誠齋所謂好學刻􅀷厲操淸苦克肖先生者是也未書中曰羅生者公姊子羅尚志也常從公於貶所曰九弟者當是俊臣也行八十九去八十而稱九也何以知其然公嘗有書與兄振文行五十八但稱曰八哥此爲俊臣無疑矣第四書與七十四姪乃振文次子季劉也第五書首稱提刑監丞年兄者以家籍考之有與司理羅欽若通判方耕道寺丞陳剛中俱稱年兄欽若吉水人極博學誠齋謂當時備頋問惟其可終於武岡守耕道名疇通守武岡有平㓂攻紹興戊午先公上書乞斬奸臣頭􅀍譴後守李若樸言耕道與先公通書坐獄三百餘日幾死得免剛中坐以啓賀先公得貶差知安遠縣至數月而卒妻落髪爲尼以歸其喪觀三人始終未歷提刑此書非與之者三君子行事可稱而宋史不錄甚可歎也按先公登建炎二年進士第是科自李易而下凡四百五十人如王詹事􅀛齡與先公尤厚此稱提刑監丞年兄不可必其爲誰姑俟再考然公籍不載此帖而親筆存豈旣書而未逓歟抑或有所遺歟廣家藏先公翰墨遺藳故多兵亂喪失殆盡尚存此數紙先人什襲藏之嘗僉憲廣西融州眞僊巖有先公封事藁碑刻先人打碑寄回宗族家置一本未數十年俱巳散失廣爲之懼今裝表此數書爲一卷朝夕觀覽如對先公也夫以先公忠義名節爭光日月萬世之所仰望豈子孫能爲之輕重公之翰墨至今猶新尚有生氣爲子孫者其可不敬乎昔阜陵嘗問公曰􅀸寫字宛如􅀸爲人公答曰臣㓜習顔眞􅀸字今自成一家又曰朕前日侍太上於德壽宮閣上治疉書􅀞因得􅀸紹興戊午所上封書眞本太上與朕玩味乆之喜卿辭意精切筆法老成英風義氣凛然飛動太上自藏之曰可爲後代式但其後爲秦檜之所批抺汙者朕啓太上令工逐行裁去裝褙於乎公之翰墨在當時人君敬愛之尚如此而况於子孫者乎公嘗有言昔司馬文正公不喜人寳其祖􅀞像但喜寳其祖之字蹟以爲字心畫也手法也見其字卽見其人予之後能以文正公之心爲心卽賢矣誦斯言也則先公之欲後人之寳其翰墨後之子孫觀先公之翰墨者其以先公之心爲心寳之敬之毋違先公之訓也書劉氏族譜後劉完素字守眞河間人自號通玄處士初學醫遇異人飲以酒大醉及寤洞達醫術治療通變病者遇之無不立起人多師尊之所撰著有運氣要㫖論精要宣明論素問玄機原病式行于世當時有名者如考城張從正皆宗其學故今言醫之善者則必曰劉張云吾邑劉日昇其父子兄弟皆能醫一守河間之法間岀其譜系示予謂爲河間後於今不知幾世矣尤不失其家傳河間之澤遠乎哉余觀世之人有高明祖父振耀於前或未數世不能守其世業者有矣日昇之於河間乆而不失其可羡也夫其可感也夫因書此于後以歸之俾其後來者知所勉云書文丞相傳後廣集廬陵先賢傳恒疾宋史文丞相傳簡畧失實蓋後來史臣爲當時忌諱多所刪削又事間有抵捂鄉先生前遼陽懦學副提舉劉嶽申爲丞相傳比國史爲詳大要其去丞相未遠鄕􅀖遺老猶有存者得於見聞爲多又必叅諸丞相年譜及指南錄諸編故事蹟覈實可徵故元元統初丞相之孫富旣以刻梓後復刋見嶽申文集近年樂平文學夏伯時亦以鋟板於是嶽申所撰丞相傳盛行於天下而史傳人蓋少見廣竊觀二傳詳畧不同不能無憾因叅互考訂合而爲一中主嶽申之說爲多幷取証於丞相文集芟其繁複正其訛舛庻幾全備使人無惑論賛則竝錄之國史之論揆諸人事而言嶽申之賛本乎天運而言各有發揚不可偏廢亦以見夫取舍之公也於乎丞相之大忠大節獨立萬古􅀡與日月爭光天地悠乆比之夷齊心則不殊而所爲反有難者昌􅀺韓子所謂特立獨行窮天地亘萬世而不顧者也丞相之云豈異於是噫丞相不可尚巳其相從興義之士或出自小官或奮跡庻民雖當摧沮敗衂之餘皆甘心就死不肯屈辱殺之殆盡無一人肯降丞相忠義至誠感動固結於人心牢不可解有如此者使人皆爾則宋豈有亡理彼臨難苟生以饕富貴其視丞相厮卒尤有愧焉然則丞相固無待於賛論誦其詩讀其書自有以見之廣齠齔時猶及聞先軰言丞相遺事赫赫竦動人聽雖小夫婦人皆習聞而能道之比年以來老成凋謝而論者益稀雖士夫君子鮮聞盛事蓋漸遠漸踈其勢然耳更後百年恐䆮失實惟取信於列傳眩瞀異同莫適是非故忘其淺陋輙復編次第皆因其舊文不敢妄加一筆誠無能有所裨益特盡區區之愚耳知之者其必不以爲僣也恭題仁廟御製詩後楊士奇永樂丁酉太宗皇帝復廵狩北京仁宗皇帝監國當時留侍監國之臣悉簡敦厚而恭愼者而文臣之預密務者三人吏部尚書兼詹事蹇義翰林學士兼諭德楊士奇翰林侍讀兼賛善梁濳仁廟好文重士樂善有誠時節宴羣臣間賜詩奬諭而三人者所得爲多右二詩前賜臣士奇臣濳凡書二紙悉識以東宫圖書而分賜之蓋同侍宴也後詩亦識圖書而專賜濳其詩一書侍讀一書賛善者從畧而互見也觀於此詩則知上之所以重濳濳之所以事上交得其道矣明年濳卒時無强壮子弟在側所得奬諭詩文好事者知其爲寳率持去其子楘能記憶二詩比求善書者録爲卷以臣士奇先朝舊人且其父同寮也求識之臣侍仁廟監國最乆仰窺聖志蓋未嘗一日不在君父不在生民不在求道而咨賢也仁明之德從古鮮儷焉濳卒後七年宮車上賔想見明良神靈感㑹今侍寵御於三光之表而臣衰病餘息徒抱烏號而永慟􅀗覩此卷拜稽三復老淚横流謹識歳月如左胡忠簡公封事藳右吾郡宋胡忠簡公封事藳有周文忠公楊文節公題䟦在後忠簡孫搢刻于融州眞僊巖劉長吾得之以惠余者忠簡筆法出顔魯公蓋忠義之性有相契矣掲文安公謂此書本左司郎中豐城范璿舜文所爲將奏之以示忠簡忠簡曰書奏卽不免南遷子有老母不可以累母吾以奏之遂有新州之命余近於两府檢志書見豐水志載范璿事云爲户部檢詳時欲與胡銓相􅁇論奏和議胡首抗章范實從臾之胡之逐又贐其行未嘗云此書范所爲也豐水志作於宋南渡後當得實不知文安何自而云然也然文安云廬陵胡氏楊氏皆國家之元氣故以所作楊氏忠節祠記附此帖之後題宋歐陽澈譔告身後宋陳東歐陽澈皆以忠言見殺高宗朝後高宗悔之此誥其褒恤之命也蓋初爲小人所蔽追悔之詞雖切無及然覆轍尚可以戒後而無幾胡銓韓紃言和議何兊言馬伸存趙之功梁勛言金兵必至宜有備皆遠竄雖不死死等耳惡暏其克戒也哉嗚呼爲國之患莫大於殺忠言爲臣之禍莫􅃤於以忠言見殺此誥至今三百九十年矣雖傳之千載不能使人讀之不興慟也通鑑續編右通鑑續編二十四卷六冊四明陳桱子經著刻板今在蘇州府學起盤古至高辛爲第一卷契丹事在唐及五代者爲第二卷後二十二卷則宋三百二十年事也孔子曰吾猶及史之闕文學者於前事據其所可知其所不可知闕之可也羲農以前遐哉邈矣非有文字之紀也其事間見於百氏所記者要多以意言之耳而必掇拾以補前史之闕亦異乎孔子之意哉昔劉恕作通鑑外紀避經而專采百氏之說金􅂂祥謂其野而難質故作通鑑前編不復避經桱嘗爲之舉要固主履祥之說矣而復著此卷何耶宋史於今少見全書學者於此編可以考見一代之得失嘗聞吾郡劉倩玉亦著此書未板行往年㑹其孫公濳云留在永豐今不知其何如也䟦四十二章經佛㝡初入中國獨有四十二章經觀其以生中國爲難彼固歆慕乎此矣而此之人樂其說者往往願生西方何也題崇恩堂卷後楊榮堯舜禹湯文武之道著於治者蓋一時之盛耳孔子以六經之道爲教而萬世之治繫焉故大賢謂孔子賢於堯舜豈虚語哉由是歷代以來隆其謚爵通天下而祀之可謂盛矣然不特此也又世封其後以崇德象賢其榮名厚祿可謂與天地相爲無窮者歟我朝當文運亨嘉之㑹六經之道大明而於衍聖公􅀹爲眷厚其祿秩二品世襲爵邑雖仍前代之舊而褒崇禮遇可謂超越前代矣太宗文皇帝嘗躬詣太學行釋菜禮而仁宗昭皇帝卽位衍聖公孔彥縉來朝燕勞賜予情文兩􅃱緍禮多儀具著爲令彥縉躬膺眷遇以謂褒崇之盛莫踰於今日乃作堂於其家而扁曰崇恩魯王殿下親書大字以賜之金薤雲章照耀闕里何其盛哉夫孔子之道生民至今永頼凡冠章甫衣逢掖者皆知尊尚而敬仰之而况其子孫乎况帝王於先師之胤乎昔唐肅宗東廵至魯親祀孔廟作六代之樂太會孔氏子孫謂孔僖曰今日之㑹於􅀸族榮乎僖對曰自古明王聖主莫不尊師重道今親屈萬乗辱臨敝里此乃崇禮先師增輝聖德非臣家之私榮也肅宗喜曰非聖人子孫焉有斯言然則彥縉之所以名堂者其亦􅀂僖之知所本乎異時書諸金匱以傳萬世其爲仁廟聖德增輝豈小也哉予故樂爲書之以系于諸作之後皇明文衡卷之四十七
