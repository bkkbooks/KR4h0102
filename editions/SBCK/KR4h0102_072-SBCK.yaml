front:
  text: 皇明文衡卷之七十二
  hash: sha256:74e4914d970326493bfb3ee46859efacbf9acd9bcb97338041c5633e3b4ca851
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_072-1a}
body:
  text: 神道碑安定侯程忠愍公神道碑朱善􅀄皇帝念癸卯歲南昌曁康郎山前後死節之臣追爵故萬户程國勝安定伯與梁國公趙德勝濟陽郡公丁普郎等一體廟祀乆之又定元功配享仁祖淳皇帝廟庭諸外有廟食者亦皆賜謚加勲遣使者致祭有未備禮以塟者官為給之仍敕史臣勒㓛於神道之碑於是安定伯之兄吉輔以公嘗駐兵富陽爱其地而公族人之在杭者適献兆于縣西長山之原乃自南昌􅁶匶而窆焉臣善謹奉詔上故贈開國輔運推誠宣力武臣荣祿大夫柱國安定忠愍侯事曰公諱國勝姓程氏丗居徽之休寕􅀄名元佐旣從軍上改賜今名其先本陳鎮西將軍開府儀同三司忠壯公􅂕洗之後忠壯當侯景之乱保捍州里有功其子散騎常侍威悼公文季死節于周父子廟食于徽號曰世忠威悼之後其顯于南者唐御史中丞歙州副統帥澐嘗起鄕兵拒黄巢有忠壯之風子南節居休寕陪郭甚盛其顯于北者唐六合令大辯徙中山再徙河南生明道伊川兩夫子靖康末子孫從渡江居池州再遷徽州陪郭之程互継其絶譜牒具存可考也公曽祖荣秀仕元爲江浙等處儒學提舉妣劉氏追封彭城縣君祖文貴宣義即饒州路徳興縣銅冶塲提領妣鄭氏封安人考社至正末用薦爲承奉班都知不赴妣吳氏公生而英偉身長八尺美鬚髯見者知非常人方元政衰所在兵起公􅁣然思以自見于世乃與縣人俞茂婺源人汪同等團結鄕兵以拒宼亂歲丁酉天兵下徽州衛國公鄧愈發同與公等詣京師上大悅命同還守婺源而以公等從征伐衛公奏署公爲總管府先鋒分兵與禅將李克魯等徇下方山諸寨是歳十月苗軍楊完者部兵十萬薄徽州衞公擇勇敢士往當之咸推公公率百餘人横戈鼓譟衝之衆皆辟易自相枕籍而統軍胡大海之兵適至因覆其營生禽其將胡辛等二百人楊完者僅以身免以功遷管軍總管戊戌正月從擊帖水兒普化元帥營于婺源正兵方與之戰公率諸奇兵擣之遂殺帖木兒普化俘士卒千餘人三月從攻嚴州道遇長鎗謝元帥軍戰􅁍之遂㧞嚴州五月僞吳張士誠與楊完者合兵犯嚴州公敗其舟師于東門追至大浪灘流矢中股引刀出鏃復戰勇氣彌厲以功進領軍先鋒己亥五月從衛公畧浙西臨安大破張㓂于閑林寨庚子七月鄱陽院判于光左丞俞椿擊走僞漢守將辛甲而據之衛公使公往說二人二人遂以饒州來附饒瀕鄱湖而僞漢主陳友諒方據江州數遣丹師來爭衛公與光椿連長營拒之令公結陣敵壘之後絶其歸路賊屢不得志乃引去八月領兵取浮梁僞叅政鄧􅀖佐棄城走進趨樂平僞總管蕭乙率五千人營于險隘衆莫敢先登公以死士持挺魚貫奮繫之奪其壁以入生禽萬户彭壽等百人遂取樂平進攻江西十月衛公駐兵臨川之平塘時鄧克明據撫州遣使通􅅃而實無降意公賛衛公卷甲夜趨比旦入其軍克明單騎遁去遂取撫州以功除管軍萬户壬寅正月上親討友諒于江州友諒敗走公從衞公以兵會南昌分定属邑癸卯四月有詔皇姪以大都督總諸將友諒益發境內兵以巨艦來攻皇姪分兵拒守公守寺歩門宼犯之與戰虜其將一人宼兵奪氣而潰相拒凡八十五日宼兵戴竹盾如箕進薄撫州門城壞三十餘丈衛公以火銃擊退之隨立木柵敵奮來爭且戰且築通夕城完公乃與牛海龍乗夜引兵刼賊營海龍爲流矢所中以死公泅水得脫見上於金陵具言危困之狀上得公驚喜進陞萬戸上發舟師二十萬自將之令公率親兵宿衞帳下與友諒大戰康郎山友諒驍將張定邊奮前直犯御舟舟適膠淺公仗劍叱之急與帳前左副指揮使韓城水軍元帥陳兆先駕飛舸左右奮擊會鄂國常公從傍射中定邊虢國俞公疾櫂來援舟進水湧御舟遂脫而公等反遶敵艦之後援兵不接力戰死之時七月戊子也上聞爲之撫膺大慟親爲文以奠焉公春秋僅三十有一配汪氏亦死于難追封安定侯夫人公平生喜讀書慕節義居家孝友凡運籌决勝之方不學而能毎戰踴躍率先赴敵矢石交下意氣自如堅城名寨身至力取一軍無不下之者上悉其名故有賞賚錦衣名馮必先一軍嗚呼癸卯距今蓋二十五年矣當草昧之時羣雄角逐雖天眷眞主􅂌之爪牙宣力之臣以佐大業而公等委身効命之死不悔卒之勲載盟府與古英烈之士儷美齊名其高識絶見則亦有非偶然者矣仰惟皇上􅅄忠酬勲度越前古恩禮之頒不一而足又將次第討論舉行世祿之典書之簡牘垂之後昆實足以􅂆千萬世爲人臣者乃序其事而繫之以銘銘曰魏巍我皇天錫神武龍興江淮以復平土南征北伐拯世之屯􅆛虎之臣䟽附駿奔有偉程公萬夫之勇世忠之孫不震不竦維時江浙莾爲盜叢大旆東來仗劍以從始佐元戎有聲幕府遂督偏師孰敢予侮苗軍鴟張曁彼長鎗公出戎行其鋒莫當徽􅃊底平饒撫亦下艨艟蔽江牙旗載禡西徇臨安以蹴僞吳遏彼楚蠻以殿鄱湖皇念公勲顯有大賚玉馬錦裘異爾諸帥維是楚蠻反道不共窺我豫章如蠆如蜂維公誓言廓清江漢不與賊生背城以戰維皇討賊耀兵江于公在扈行左右櫜鞬敵兵來乗勝􅀒未决死捍御舟勢􅀌援絶大星曉殞江水夜悲烈夫介士駢首于危馬革之忠哀動宸極親奠以文賜之廟食載念艱虞死者如生爰妥其􅂕官治其塋褒功有爵奬忠有謚匪榮一時以勸百世壙有衣冠公始蓋棺英魂􅌂然玉帶貂蟬墓有享堂公在中寢四時烝嘗來食來飮富陽之山欝欝松揪成公之志奠此高丘神道有碑龜蚨螭首史臣勒銘永詔厥後大明敕賜開國輔運推誠宣力武臣征西左副將軍濟寜侯追封􅅬國公謚襄靖顧公神道碑劉崧自昔國家興王之地必有才武雄傑之士出於其間以賛立大功佐成大業爲國虎臣享有祿位豈非天人交會之應哉故征西左副將軍濟寧侯顧公名時字時舉世爲臨淮人曾祖千四府君以公貴贈鎭國將軍僉大都督府事護軍追封睢寧縣子妣王氏封睢寧縣子夫人祖文俊累贈驃騎將軍都指揮使護軍追封武陵伯妣林氏封武陵伯夫人考道祥累贈榮祿大夫同知大都督府事柱國封濟寧侯妣雷氏􅁇潘氏俱封濟寧侯夫人公志氣倜儻勇於有爲元未政隳海內大亂皇上龍興淮甸思濟天下公以同里率先來附披堅執銳常侍左右自歲甲午起兵西㧞和州東渡大江凡擊叛討逆開疆拓境靡不率從始由百夫長轉陞元帥尋同知天䇿衞親軍指揮使司事􅁇調濠梁衞丙午詔與東平侯韓政取濠州破四門月城㧞之洪武元年戊申從大將軍魏國公徐逹北定燕薊拜驃騎上將軍副大都督府事兼同知太子率府事三年庚戌論功行賞進號開國輔運推誠宣力武臣階榮祿大夫勲柱國職同知大都督府事爵濟寧侯食祿一千五百石賜以鐵劵使子孫世襲焉明年辛亥授征西左副將軍由興元取四川入階州擒其梟將王進克文州綿州擊向家營寨破之又克漢州進圍成都僞夏丞相戴壽等望風款附比師入重慶其主明昇出降四川平五年壬子仍左副將軍從征虜前將軍曹國公李文中等分道入沙漠與大將軍期失道薄糧且盡士卒不能戰公奮引麾下數百人躍馬大呼衝薄部落戰敗走之遂掠其輜重羊馬而還軍勢復大振七年甲寅從魏國公捴各衛兵出鎮北平益築堡障練士伍繕甲兵廣牧畜雖邊隅日靖畫夜從幕府吏􅀷計遠筭常若宼至明年乙卯詔還尋有㫖從魏國公仍出北平十二年巳未秋遽遘奇疾藥弗能愈以是年冬十一月二十一日薨享年四十有六訃聞上爲之震悼輟朝二日明年庚申春二月巳卯公喪歸自北平舟行數千里迎祭塡道觀者感歎敕賜塟鐘山之隂上親爲舉奠復定誌文以賜之明日詔贈特進光祿大夫左柱國追封􅅬國公謚襄靖其始終榮寵可謂異數矣配李氏封濟寧侯夫人今封􅅬國公夫人子男四人長曰敬金吾前衛後千戸所鎭撫次曰英曰華曰苟爾女二人旣塟其孤敬泣而請于朝曰惟先臣事上二十餘年不幸蚤終顧神道之石銘文未勒敢援故事以請于以見聖朝眷待之厚且以慰先臣於地下也於是禮曹以爲言詔可其請命禮部侍郞臣崧爲之銘臣崧職在討論不敢以蕪陋辭謹狀次而書之且系以銘曰聖人受命萬物咸覩乗時佐運各奮其武矯矯襄靖生于帝鄕帝猶龍飛雲從之翔自淮渡江首定建業公時左右執俘獻捷領兵東向遂夷月城電擊飈馳濠梁以淸北收燕薊旋拜驃騎崇勲豐祿劵鐵以誓乃命西討進自漢中取道階文山巉水潨進圍成都作氣一皷千夫投戈殍厥孱主旣從征虜北度隂山擁槊奮呼出其險囏薄衝部落兔脕鶻擊掠其牛馬還給軍食主將上功帝憫爾勞四方旣平汝弓其櫜櫜弓戢戈北守燕薊嚴其扄鐍式謹邊事滦水茫茫居庸閑閑馬絶南牧城無晝關公歸未期遂以訃告沿邊驚呼當宁嗟悼襄靖有謚􅅬國有封茅土新疏沛豐舊庸闡績著銘爰勒神道榮光自天天子有詔大明敕賜開國輔運推誠宣力武臣征南副將軍靖侯追封海國公謚襄毅吳公神道碑銘洪武十一年戊午前征南副將軍靖海侯吴禎奉詔岀定遼是秋以疾聞上遣毉馳驛視之弗能愈遂輿疾還京車駕幸其第問勞有加明年己未五月疾革以其月二十有六日薨訃聞上為之震悼輟朝二日詔贈特進光祿大夫左柱國追封海國公謚襄毅仍賜􅉎鐘山之隂俾官給其事葬之日車駕臨奠加贈􅉠焉又明年庚申上追念其勞爰敕儒臣禮部侍郞臣崧撰文刻諸神道之碑以昭不朽臣崧奉詔不敢辭乃追考公牘紀載第而書之謹按公初名國寳後賜名禎字幹臣姓吳氏世為濠之定遠人自少時巳卓犖有膽略及天下大亂從上起兵里中卽能知天命有在與兄江隂侯良俱􅀠麾下悉心委事焉自歲甲午乙未西克滁和東渡大江揚威振銳所向無敵由帳前都先鋒為總管陞建興翼院判轉分院元帥尋為天興右翼副元帥與良同守江隂毎宼至輙擊走之首破僞吳張士誠水寨擒其梟將朱定甲辰授英武衛指揮使丙午宼岀馬䭾沙上親督戰追至巫子門宼乗潮逆拒首尾相失公縱兵急擊之俘􅀗無筭是秋從大將軍魏國公徐達率馬歩舟師由港口取湖州公勒奇兵出舊舘扼之戰以大捷事平遂留戍焉吳元年丁未九月復從大將軍攻圍蘇州連破胥葑二門士誠就執公奉令撫循秋毫無所擾進僉大都督府事時方谷珍據明州未下上以公爲征南副將軍從御史大夫信國公湯和往平之公引舟乗潮夜入曹娥江夷埧通道出其不意􅀡抵車廐會降者言方氏已濳挈家入海公領兵追於煴嶼與合戰自申至夜三鼓敗之盡􅀗其戰船人馬輜重而還未幾谷珍降有旨由海洋進取福州不數日奄至城下圍其西南水部三門一皷克之時僞平章陳友定據延平作亂明年洪武元年戊申進破延平擒友定閩海平公歸次昌國會海宼葉陳二姓聚刼蘭秀山公調兵立勦之三年庚戌朝廷定功行賞進開國輔運推誠宣力武臣榮祿大夫柱國吳相府左相靖海侯食祿一千五百石賜以鐡劵使子孫世襲焉五年壬子詔大發兵東戌定遼命公總舟師數萬由豋州轉運以餉之海道險遠人用囏虞公調度有方兵食充羡折衝風濤如􅂂四達㝷召還七年甲寅海上警聞公復領沿海各衛兵出捕至琉球大洋􅀗倭宼人船若干俘于京上益嘉頼之常往來海道總理軍務至是歸自遼東而疾作不起矣公生以天曆戊辰六月二十一日塟以薨之閏月十三日享年五十有二曾祖三七府君贈鎭國將軍僉大都督府事䕶軍追封頴上縣子妣周氏追封頴上縣子夫人祖十一府君贈驃騎將軍都指揮使護軍追封延陵伯妣劉氏追封延陵伯夫人考似龍府君贈榮祿大夫同知大都督府事柱國追封渤海侯妣葉氏追封渤海侯夫人配李氏封靖海侯夫人子男五人長堅西安護衛鎮撫側室陶出也次忠羽林左衛鎭橅夫人李出也次端次洪五十皆庻岀女十人其第五女許爲湘王妃尚在室惟公以驍勇之才際興王之㑹鐘英淮甸立勲遼海致位公侯而不矜不伐盡瘁所事眞古之名將哉是宜銘銘曰赫赫景命大明當天帝業所基公侯岀焉桓桓吳公有仡其勇顧瞻在廷玉立山聳元政不綱帝憫下民爰揮天戈掃除妖氛始克滁和旋抜采石飛渡大江曾不終日公時在行兄弟齊一莫不率從于城是力帝命汝禎言守江隂鄰敵授首遠人歸心南收丹陽東畧無錫建興䇿功英武躋職宼窺海口縱兵擊之風從潮生彼逆不支從攻吳興機畧周布捷出舊舘扼其歸路進㧞葑門東定姑蘇擒厥大酋獻于京都帝念爾勞陞秩督府不曰四明亦肆違拒遄厲戈甲往貳征南挾潮而飛飈旗電帆摐金伐皷壁其城下㓂窮而逋膽落萬馬躡景追風執訊凱還鯨奔鯢伏海濟雲鮮張方告平閩海方急千艘南馳殱彼勍敵三山旣隳延平遂通麾旄所指列郡來同公歸自南蘭秀連梗鋤而闢之海道昞昞帝曰靖海實汝之功兹命汝侯往承其恭煌惶鐵劵翼翼命秩恩延予孫功翼王室載授征虜督餉定遼白粲連雲􅄓風不揺倭童䟦扈出沒大洋爰獸獮之皇威以張茫茫遼海烈烈英勇式弘將畧茂對天寵方召元老曹周世庸氣應德符千載一逢維天祐賢公宜永福何疾之嬰遽此不淑儀曹考行贈謚有光鐘山佳城天設地藏神道之左有石嶷嶷儒臣作銘昭示無極皇明文衡卷之七十二
