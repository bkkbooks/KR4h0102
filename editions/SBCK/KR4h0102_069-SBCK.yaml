front:
  text: 皇明文衡卷之六十九
  hash: sha256:7ea1e97a0ff2eb78333aac65c70794fff951170356342f464dfebaede47873aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_069-1a}
body:
  text: 神道碑大明追封揚王神道碑銘有序宋濂皇帝恭膺大寳式展孝思旣追崇祖宗四代帝號建立太廟復念皇太后之所自出追封㚈王父爲揚王外王母爲揚王夫人建祠扵太廟之東歳時遣重臣􅃱祭近有來自淮隂者言王墓在盱眙如故上聞之悲喜交集卽詔內臣及圜丘署令往祭而修治之寘灑掃之户凡三護視塋域且命詞臣撰文以樹諸神道臣濂伏讀御製王之行若曰王姓陳氏世爲維楊人不知其諱當宋之季名􅀠尺籍伍符中從大將張世傑扈從祥興帝駐南海至元巳卯春世傑與元兵戰師大潰士卒多溺死王舟亦爲風所破幸脫死達岸與一二同行者累石文破釜煮遺糧以療􅏇巳而糧絶計無所岀同行者曰我等自分必死聞髑髏山有死馬共烹食之縱死亦得爲飽􅀑不識可乎王未及行疲極輙晝睡夢一白衣人來謂王曰汝愼勿食馬肉今夜有舟來共載也王以爲偶然未之深信俄又夢如初至夜將半夢中髣髴聞櫓聲有衣紫衣者以杖觸王之胯曰舟至矣奈何不起王驚寤身在舟上見舊所事統領官時統領巳降扵元將元將畏舟壓凡有來附者擲棄水中統領憐王亟藏之艎板下日取乾餱從板􅂩投之王掬以食度王之渴乃與王約以足撼板王卽張口向􅂩受漿居數日事􅂥皆徬徨不自安忽颶風吹舟􅐻旋如轉輪乆不能進元將大恐徧求扵禜祈者不可得統領知王能巫術遂白而出之王仰天叩齒若指麾􅀑神狀風濤頓息元將喜因飮食之至通州賚王數鉅魚送之登岸王歸維􅀭不樂爲軍伍避去盱眙津里鎭擇地而居以巫術行王無子生二女長適季氏次卽皇太后晚以季氏長子爲後年九十九歳而薨遂葬焉今墓是巳臣濂聞之君子之制行能感扵人固難而能通扵神明爲􅀹難今當患難危急之時神假夢寐挾之以升舟非其精誠上通扵天何以􅃱神人之祐至扵斯也王之羣行其詳雖若不可知舉此而推之則積德之􅀷厚斷可信矣是宜慶鍾聖女誕育皇上以啓大明億萬年無疆之基扵乎盛哉昔者史臣賛堯之德首以親九族爲言其效至扵黎民扵變時雍之盛然九族之中母族居其三皇上以念母之故思王不能忘封以王爵享以祠廟今又樹碑墓道以紀其異行是皆以孝治天下也將見四方嚮風咸知以孝自勉皥皥熈熈以􅃱隆平之治不難矣臣濂旣序其事復再拜稽首而獻銘曰皇帝建國克展孝思䟽封母族自親而推錫爵維揚地邇帝畿立廟崇祀玄冕衮衣痛念宅兆卜之何墟閭師來告今在盱眙皇情悅豫繼以涕洟卽詔禮官汝徃葺治母俾蕘豎跳踉以嬉惟我揚王昔􅀠戎麾獰風蕩海糧絶阻飢天有顯相夢來紫衣挾以登舟神力所持易死爲生夀躋期頥積累􅀷長未究厥施乃毓聖女茂衍皇支蘿圖肇開鴻祚峩巍日照月臨風行霆馳自流徂源功赤有歸無德弗酬典禮可稽聿昭化原扶植政基以廣孝治以惇民䲦津里之鎭王靈所依於昭萬年視此銘詩大明勑賜銀靑滎禄大夫上柱國中書平章軍國重事兼太子少保鄂國常公贈翊運推誠宣德靖遠功臣開府儀同三司上柱國太保中書右丞相追封開平王謚忠武神道碑銘有序洪武二年己酉秋七月七日銀靑滎祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公薨于軍中二十三日訃聞皇上為之震悼罷朝在庭之臣莫不灑泣越明日詔中書定議贈翊運推誠宣德靖遠功臣開府儀同三司上柱國太保中書右丞相追封開平王謚曰忠武八月朔日柩車至龍江上往臨奠慟哭而還親爲擇地扵鍾山草堂之原營建宅兆及棲􅂕之祠凡百須之具一給扵官不以煩其家至冬十月九日始葬復推恩及其三代皆爲王爵生榮死哀可謂至矣上猶念其功不寘召臣濂于庭而謂之曰朕東撫高麗西抵吐蕃北際沙漠南來交趾占城莫不稽首奉命計其開拓之功以十分而言王蓋居其七八朕今手錄戰伐次第以授爾尚爲文勒諸豐碑以著王之功扵無窮焉臣濂受詔而退謹再拜序而銘諸幽王諱遇春姓常氏濠州懷遠人世爲農家賦性剛毅膂力絶人歳壬辰羣雄竝起江淮爲之鼎沸時王年二十有三爲羣盜劉聚所得聚覩王狀貌奇偉㧞扵行伍而信任之王毎岀戰必鼔勇爭先聚􅀷喜之王察聚所爲終不能有成欲擇所依乙未聞止駐兵和州領衆数十人棄聚來歸居兩月餘請爲前部先鋒上曰爾之來者爲士卒糧絶故就食耳爾自有主我安得而㽞之王請之再三至於涕泣上曰爾姑從吾渡江俟克太平委身事吾未晚也夏六月上先抵采石磯元兵陣扵磯上而磯下巨舟如織相距僅三丈餘猝難登岸王乘快舸相繼而至上麾之使前王卽捨舟挺戈先登衆皆披靡遂㧞采石乘勝取太平從上守禦乃始授總管府先鋒冬十月陞管軍總管丙申春二月元中丞蠻子海牙復以兵屯采石南北不通上慮將士雖渡江而其父母妻孥尚留淮西勢莫可􅃱命王綂兵攻之王至設疑兵以分其勢而以正兵與之合及戰别岀奇兵擣敗之悉俘其精銳自是元兵扼江之勢衰矣尋守溧陽攻建康功爲諸將先三月從今大將軍右丞相徐公達克鎭江夏四月授承信校尉領軍先鋒秋九月再攻常州會有軍叛去與僞吳張士誠合徐公被圍扵牛塘王與諸將力戰大敗其衆擒士誠梟將張將軍冬十有一月除統軍大元帥丁酉春三月遂克常州遷中翼大元帥夏四月從徐公下寧國秋八月克馬䭾沙冬十月取池州戊戌春擢江南行中書省都督馬歩水軍大元帥冬十有二月上親取婺州巳亥夏四月轉鎭國上將軍同僉書江南等處行樞宻院事守婺城尋命攻衢州降之冬十月陞僉院十有二月攻杭州庚子夏五月召還京師從徐公㧞安慶趙普勝之水寨時僞漢陳友諒揚言㧞安慶王䇿其必攻池州以羸弱守城伏銳士扵九華山明日友諒兵果來攻城伏兵四合俘殺萬餘人六月友諒入太平犯龍灣王共謀擊敗之巳而上整舟師襲友諒留王守京師軍民無敢譁辛丑春三月拜江南行中書省參知政事秋七月從上取安慶破江州回守龍灣冬十有一月張士城出兵㓂長興上時駐九江聞報還京師命王徃援士誠兵敗俘殺五千餘人壬寅春修安慶城羅友賢搆亂據池州神山寨將與士誠通杭歙震動令王徃攻之癸卯春正月擒斬羅友賢餘黨悉平三月張士誠遣兵圍劉福通扵安豐王從上擊之將戰王突入其陣三戰三勝敵兵大敗而去俘􅀗士馬無筭遂同徐公圍盧州凡三月城將下適陳友諒攻南昌王解圍而還秋七月從上率諸將徃援八月遇友諒扵彭蠡湖之康郞山王與之聯舟大戰呼聲動天地無不一當百縱火焚僞平章舟風急火熾十里之間湖水盡赤敵將張定邊素號梟猛奮前迎戰王射之定邊中矢走友諒乃退保鞋山諸將以友諒兵尚強請縱其去王獨不言及我師岀湖口皆言江流湍急欲放舟而下上知其情命以舟扼上流王應之諸將乃避流而上舟蔽江面控湖口者旬有五日友諒軍食乏出江求戰王遣火舟火筏禦之敵兵奔潰追北數十里與之酣戰自辰至未不解上所乗舟及王舟皆膠扵沙王旣脫御舟而巳舟被圍復力戰而脫扵是友諒中流矢死士卒十萬皆降未幾其臣立友諒之子理扵武昌冬十月王帥師討之四面合圍甲辰春二月理衘壁出降荆湖之地望風皆附陞中書平章政事秋七月從徐公取廬州八月遂自將兵平臨江之沙坑麻領十洞牛陂諸寨進取贛州乙巳春正月克之悉定南安南雄韶州夏五月還兵取安陸襄陽冬十月從徐公克泰州丙午春三月復從克高郵夏四月淮安濠泗徐宿安豐皆下秋八月諸將攻浙西師次太湖僞萬戸尹義等逆戰王擒之􅀡趨湖州之毗山與敵兵水陸鏖戰敵兵大潰遂抵城下塞其四門晝夜環攻之偽丞相張士信悉發境中兵為援屯扵舊館出我師之背王統竒兵由大全港入結營東阡復岀敵背且塡壅溝港絶其歸路士誠知事急親出兵拒國王一鼔勝之士誠復遣其將徐義統赤龍船親軍來後王復擊敗扵烏鎭冬十月舊館降得兵六萬十有一月朔州亦下遂進圍平江丁未圍之益急士誠􅀵合餘燼猶背城百戰降其將士且盡秋九月始克之􅅞士誠來獻籍其兵二十有五萬乃加授中書平章軍國重事䟽封鄂國進爵上公冬十月復授征虜副將軍同徐公奉命北伐戊申春正月上卽皇帝位國號大明改元洪武王與徐公下山東諸郡遂攻汴梁守臣李景昌遁進攻河南敵兵五萬屯于洛水之北將出迎戰王布陣旣定單􅀐執弓矢衝入其隊敵發二十􅀐攅槊刺王王一箭中其前鋒大呼殺入悉􅀗其衆而河南諸城先後皆平上幸汴京謀取燕都秋七月徐公與王渡大河河北諸郡又平八月二日燕都不戰而克元君北㚏師次大原其守將廓廓帖木兒帥衆來禦其鋒鋭甚王與徐公謀曰我􅀐兵雖集而歩卒未至何以能戰莫若遣精􅀐夜刼其營其衆可亂衆亂主將可縳也徐公如王言廓廓帖木兒果中傷而遁己酉春正月進攻大同竹貞棄城走河東又平遂西入秦張良弼遁李思齊迎降奉先鳯翔鞏昌臨洮又平夏五月元將也速兵侵通州有旨命王以所部軍東還拒之遂擣永平過惠州􅀗江文清士馬以千計至大寕也速遁破開平元君又北奔追至北河俘其宗王三人及平章鼎住等凡得軍士萬人車萬兩馬三千牛五萬全師還燕次柳河州得疾而薨享年僅四十爾王之爲人守謙而不矜有功而無過運籌决勝之方不學而能其從大將軍東征西伐而能遵守節制及其自將兵則所至無不克捷由其智識明而材力雄故施之各得其宜鳴呼若王者可謂開國之殊動者矣王之曾大父四三府君累贈銀靑榮祿大夫上柱國中書平章政事追封開平王謚莊簡妣張氏追封開平王夫人大父重五府君累贈儀同三司上柱國少保中書平章政事追封開平王謚安穆妣陳氏追封開平王夫人又六六府君累贈開府儀同三司上柱國太保中書右丞相追封開平王謚靖懿妣高氏追封開平王夫人妻定遠藍氏封開平王夫人子男三人曰茂曰昇曰森皆上所賜名女三人長許爲皇太子妃餘皆㓜臣濂聞之昔日唐太宗起義兵而定天下當時有蔚遲恭者棄劉武周仗劔來從其後輔成唐業而恭之功爲多扵是生有鄂國之封殁有忠武之謚今王之功非恭所可及上之所以遇王者封謚興之雖同而其王爵之加恩數􅄖渥揆之于唐誠又過之史臣所謂君臣相遇千載一時者豈不異世而同符也哉是宜銘諸貞石傳之千萬世一以昭聖天子垂念功臣如此之至一以著王之勲烈扵不朽云爾銘曰聖皇開天豪傑四從龍興而雲虎嘯而風義旗所指山嶽震動飈馳霆舂孰不神竦維忠武王其氣至剛仗劔來從飛渡大江無堅不摧無敵不碎席卷長驅易如拾芥平吳定越帖荆撫淮威聲所加小大畢來齊魯旣寧汴洛亦定􅀡指幽燕不戰而勝元君遠逝六軍倒戈本根旣撥何有條柯乃收􅀳冀乃淸秦隴乃徇遼海人百其勇茫茫朔漠灤河所經誓將剗滌邊塵弗驚王之忠精上貫天日燁其有光亘古不沒幅員之廣漢唐莫過馬蹄所及王功爲多十五年間百戰百捷備殫勤勞光輔帝業翊運之勲靖遠之威在古或罕于今見之大功垂成王忽長逝當宁興哀如失一臂爰加恩寵用錫王封衮衣繡裳照耀泉宫天子曰噫未慊朕志其推爾爵上褒三世死生哀榮孰可比焉王雖云殁生氣凛然鍾山之隂隧道有石詞臣勒銘垂示千億大明勑賜榮祿大夫同知大都督府事兼太子右率府使贈推忠翊運宣力懐遠功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公謚武義康公神道碑銘有序皇帝卽位之三載混一華夷聲敎所被罔間遐邇梯山航海奉贄獻琛上念熊羆之士不二心之臣東征西伐宣勞有年方將胙土分茅以定功賞而都督康公薨于陜州上聞之嗟悼不巳旣勑有司穿土作室以寧體魄復欲昭其功勲扵悠乆詔翰林學士臣宋濂稽諸簡牘所書文扵堅石以垂示扵億萬載臣濂謹按公諱茂才字壽卿康其姓也世爲蘄州人曾祖文廣皇贈中奉大夫中書叅知政事護國追封京兆郡公祖德􅅷皇贈資善大夫中書右丞上護軍追封京兆郡公父壽皇贈滎祿大夫同知大都督府事柱國追封蘄國公母蕭氏追封蘄國夫人公當元之季四方雲擾未幾蘄州䧟公結義旅以捍蔽爲務授以長官俄遷爲鎭府同諸􅀅復九江擣蘄水黃連塞轉蘄州路同知總管府事屯戍和之俗谿太平之采石使者考其功􅃺陞淮西宣慰副使同知元帥府事又陞宣慰使都元帥歳乙未六月上帥師渡江將士家屬尚留于臨濠陣人多效死扵是數戰不克後數月常忠武王遇春遣逰兵虚撓之公連日發軍以應王度其力疲夜設伏兵質明殱其精銳殆盡然猶􅀵合潰散堅寨扵天寧洲明年二月上命諸將以襄陽大砲破其寨公奔行臺便宜陞淮南行省叅知政事甫踰月上亦克金陵又奔京口舟師追及之公度天命有歸乃率所部餘兵三千解甲來附免冠頓首言前日之戰各爲其主今日屢敗天數也事至扵此死生唯命茍得生全尚竭犬馬之方以圖報效上笑而釋之仍許綂所部兵從征又明年授泰淮翼水軍元帥守禦龍灣取江隂之馬䭾沙八月僞吳張士誠犯我疆境公驅兵逐之􅀗其樓船人上賜名馬一匹黄金一錠歳戊戌從廖楚公永安攻池州取趙䨇刀之樅陽遷都水營田使兼帳前總制親兵左都指揮使明年八月攻皖城僞將率樓船出戰公復􅀗之又明年六月僞漢陳友諒傾國入㓂攻䧟我姑孰殺戮我吏民意將窺我南京上召公謂曰爾不疑我乎公復頓首謝上曰汝旣不相疑宜作書遣使僞降友諒爲内應招之速來汲給告以虚實使分兵三道以弱其勢友諒果如所言旣至諸將同公奮䡖大破之縳其士卒二萬有幣帛白金之賜歲辛丑八月上怒友諒耒㓂率􅀅士親征公領舟師行擊安慶破江州僞都友諒西遁遂下蘄州興􅀦漢陽公沿流而下克黄梅其家寨十一月取江之瑞昌取友諒八陣指揮友諒之勢遂衰􅁶帳前親兵副都指揮使明年元月復龍興又明年攻左君弼扵庐州四月友諒圍龍興上親往援公與諸􅀅皆從友諒聞上至亟解圍還七月大戰扵彭蠡湖軍聲嘯呼湖水爲之起立浮屍蠢蠢動至數千里友諒遂至敗亡又有幣帛之賜十月上親征武昌公從之歳甲辰二月下之友諒之子理衘壁出降三月進金吾侍衛親軍都護府副都護四月從大􅀅軍徐公逹洊攻庐州七月下之八月㧞安豐継取江陵及湖南諸州加賜幣帛明年二月改神武衛指揮使五月進大都督府副使閏十月士誠兵犯江隂京口上帥大軍水陸竝進公在行中及至鎭江士誠兵已遁又明年正月追至巫子門擊敗其衆􅀗土卒二千公功爲多四月擣淮安之馬邏港㧞其水寨復􅀗士卒與艨艟無筭淮安平七月遂攻湖州十一月破之進逼姑􅂫姑蘇士誠偽都卽遣鋭卒來迎􅃲大戰尹山橋公持㦸督戰益力銳卒盡覆乃進圍齊門刀劔林立飛鳥不敢下大􅀅軍命諸􅀅合攻之吳元年九月姑􅂫平公取無錫州十月陞同知大都督府事兼太子右率府使進階荣祿大夫洪武元年上以江南之地旣入版圗乃遣大􅀅軍經畧中原公從齊魯之地復由黄河取汴梁下洛陽駐師陜州規運饋餉造浮橋以渡大軍鎭河中善撫綏遺民爲之立石頌德絳解二州則公所招徠蔽遮潼関秦人不敢東向三年復從大􅀅軍征漢中奉詔還軍中道因疾而薨實八月之三日也年五十有七上下羣臣議贈公推忠翊運宣力懷逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封靳􅀦公謚曰武義卜以九月二十一日葬扵應天府上元縣鍾山鄕之幕府山上親臨奠而百司継之祭幄相望聯絡原野時人以爲荣公娶方氏追封靳國夫人継室田氏封蘄國夫人側室朱氏俞氏子男三人鐸田氏出鑑朱氏出鎭余氏岀公通􅀴史大義事太夫人以孝聞􅁿財仗義意氣磊落而􅀹有志扵事功値元祚􅀅終其才弗克盡施然而眞主龍飛扵羣雄之中公卽能識之卷甲韜戈率衆臣附坦然而不惑可謂上知天命下察人心者矣由是昭􅀍寵眷倚之以心膂用之為爪牙十餘年間屡從征討茂績奇勲著稱當丗存則安冨尊荣加以爵位薨則䟽封賜謚賁及九泉令名垂扵竹帛重祿延扵子孫公其可以不朽矣臣濂謹拜手稽首述辞扵碑系之以銘􅀷懼不足以稱上報功之意銘曰扵赫大明受命于天如日之升照于八埏其一于時康公江險之恃大軍西來視如平地其二巨礮轟雷物莫敢攖何戰弗潰何守弗傾其三天人攸歸勢何敢抗知幾先來率衆内嚮其四皇帝曰嘻有附匪䟽予開誠心遇爾不疑其五爾礪矛鋋爾部士卒助予四方以寕萬國其六公拜稽首賜死為生誓殚报効如無餘齡其七孰不爲庭率師徃討矯如翼如風馳電掃其八東吳西楚蹴陳駕張身經百戰兇豎始亡其九大將北伐同取汴洛出鎭于蒲恤其孤弱十蔽遮河潼以義爲關誰敢操戈睥晲其間其十一玄龜􅀒碑以頌遣愛民亦何心恩義斯在其十一從伐漢中迢迢西征有命班師中道而薨其十三帝念將臣血戰之苦將酬其勲錫以茅土其十四孰不夀考以樂承平公胡嬰疾愪􅅎泉扄其十五帝情憫悼恩命絡繹穿山爲堂畢玆窀穸其十六名垂扵史祿延扵家翩然而逝公復何嗟其十七史臣造文大書􅀷刻以昭公勲有永無極其十八皇明文衡卷之六十九
