front:
  text: 皇明文衡卷之五十九
  hash: sha256:1c99c09fa6a44f722c10e9e909e4e23611c0fd4dcfce30c5012ea31c662746c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_059-1a}
body:
  text: 傳攖寧生傳朱右攖寧生出滑伯後名壽字伯仁世為許襄城大家元初祖父官江南自許徙儀眞而壽生焉性警敏習儒書於韓說先生日記千餘言操筆為文辭有思致􅀹長於楽府京口王居中客醫儀眞治方􅎃術有時名壽数往叩之居中曰醫祖黃帝􅄮伯其言佚不傳世傳者唯素問難經子其習之乎壽遂受之旣終卷乃進請其師曰素問為說備矣篇次無緒錯簡不無愚􅀅分藏象經度􅎃􅀱病能攝生論治色􅎃鍼刺隂陽標本運氣彚萃凡十二􅀋鈔而讀之難經又本素問􅂕樞之旨設難釋義其間榮衛部位藏府􅎃法與夫經絡腧穴辨之博矣而闕悞或多愚將本其旨義註而讀之何如居中曰甚矣子之善學也善哉子學之得其道也予守師說者子識卓理融契悟前訓子過我矣他日以醫名世其子也邪自是壽學日進益叅考張仲景劉守眞李明之三家而大同之攄其所得投之所向莫不中肯綮旣又傳鍼法於東平高洞陽得其開闔流注方圓􅀘㵼之道又究夫十二經走㑹屬絡流輸交别之要至􅀂隂陽維蹻衝帶六􅎃雖皆有繫屬而唯督任二經則苞乎腹背而有專穴諸經滿而溢者此則受之宜與十二經竝論乃取內經骨空諸論及􅂕樞本輸篇所􅄒經􅎃著十四經發揮三卷䟽其本旨釋其名義通考隧穴六百四十有七而施治功以盡醫之神祕他如讀傷寒論鈔診家樞要痔瘻篇及聚諸書本草為醫韻皆有功後學故其行有治驗所至人爭延致以得攖寧生診視一决生死爲無憾生無間貧富皆往治報不報弗較也遂知名呉楚間在淮南曰滑壽在呉曰伯仁氏在鄞越曰攖寧生云生年七十餘顔容如童行歩輕捷飮酒無筭人有請雖祁寒暑􅀨弗憚世多德之其治法往往奇中人間能言之故記者頗多其徒日采表著者成編以傳其在儀眞御史中丞八臣亦家焉其內人病艱於小溲中滿喘渴門僧寳頗知醫投以蕖麥梔苓諸滑利藥而閟益甚召壽􅀱其􅎃三部皆弦而濇壽曰經云膀胱者州都之官津液藏焉氣化則能出矣所謂水出高源者也膻中之氣不化則水液不行病因於氣徒行水無益也法當治上焦乃製朱雀湯倍以枳桔煎用長流水一飮而溲再飮氣平數服病巳端君寳毋六十餘亦病小溲閟􅀂淋狀小腹脹口吻渴邀壽診其􅎃沈且澁曰此病在下焦血分隂火盛而水不足法當治血血與水同血有形而氣無形有形之疾當以有形法治之卽以東垣家滋腎丸服之而瘉三寳廉使仲子之妻㤗不華尚書妹也病滯下晝夜五七十起後重下迫且娠九月衆醫率爲淸暑散滯痛苦􅀹甚壽至診視曰須下去滯衆以娠不肯壽曰素問有云有故無損亦無損也動卽正産乃以消滯導氣丸藥進之得順利再進滯去􅁇以淸暑利溲苦堅之劑病瘉而果孕不動足月乃産童氏婦年三十毎經水將來三五日前臍下㽲痛如刀刺狀寒􅀬交作下如黑豆汁旣而水行因之無妊招壽診視之兩尺􅎃沉澀欲絶餘部皆弦急曰此由下焦寒濕邪氣􅅮於衝任衝爲血海任主胞胎爲婦人血室故經事將來邪與血爭作㽲痛寒氣生濁下如豆汁宜治下焦遂以辛散苦温理血藥爲劑令先經期十日服之凡三次而邪去經調是年有孕丘仲山女纔八歲病傷食煎􅘤內閟悶口乾唇舌燥黑腹痛不可􅃘或以剛燥丸藥利之而痛閟益甚壽遂以牽牛大黃淸快藥爲丸以伏其燥利而瘉天寧寺僧病發狂譫妄視人皆爲􅀑壽診其􅎃纍纍如薏苡子且喘且􅅮曰此得之陽明胃實素問云陽明主肉其經血氣竝盛甚則衰衣升高踰垣妄罵壽以三化湯三四下復進以火劑乃脫然如故馬萬戸妻體肥而氣盛自以無子嘗多服煖宮藥積乆火甚迫血上行爲䘐衂必數升餘靣赤􅎃躁疾神怳怳如癡醫者猶以治上盛下虚丹劑鎭墜之壽曰經云上者下之今血氣俱盛溢而上行法當下導奈何實實邪卽與桃仁承氣湯三四下積瘀旣去􅁇服旣濟湯二十劑而瘉楊子縣吏陳某當臘月鼻衂至正月凡十三日始定其􅎃實而數治法與前證同蓋馬婦過服剛劑陳過食煎炙飮醇酒皆積􅀬所致也鄧千戸二婢子七八月間同患滯下壽至診視一婢􅎃鼓急大􅀬喘悶曰此必死一婢􅎃洪大而虚軟微􅀬而小便利曰此可治即下之巳而調以苦溫苦堅之劑果一死一瘉張佛兒暑月患中滿泄瀉小便赤四肢疲困不欲舉自汗微􅀬口渴且素羸瘠衆醫以虚勞􅀅峻􅀘之邀壽至診視六􅎃虚微曰此東垣所謂夏月中暑飮食勞倦法宜服淸暑益氣湯没三劑而病如失記其在儀眞時所治􅀂是什無一二焉至正間趙璉守杭州以同里知壽且邀之與俱過嘉興汪澤民病怔忡善忘口澹舌燥多汗四肢疲軟發􅀬小便白而濁衆醫以內傷不足擬進茸附趙彥􅀶爭之未决固招伯仁至視其􅎃虚大而數曰是由思慮過度厥陽之火爲患耳夫君火以名相火以位相火代君火行事者也相火一擾能爲百病况厥陽乎百端之起皆自心生越人云憂愁思慮則傷心汪君平生志大心高所謀不遂抑鬱積乆致內傷也然抱薪救火望安奚能遂命服東垣補中益氣湯朱砂安神丸空心則進小坎離九月餘彥􅀶抵書云汪之疾瘳矣尹安􅀸妻妊五月病咳痰氣逆惡寒咽膈不利不嗜食者浹旬招伯仁診視其􅎃浮弦形體淸羸伯仁曰此上受風寒也越人云形寒飮冷則慯肺投以辛温劑與之致津液開腠理散風寒而嗽自安矣旣之錢唐館郡守第時出治病卽瘉屬縣有不能治之證皆來就伯仁臨安沈君彰者病自汗如􅀨不少止靣赤身􅀬口燥心煩輿來杭城舍客樓盛暑中帷幙周密自云至虚亡陽服术附藥巳數劑伯仁診其􅎃虚而洪數視其舌上胎黃曰前藥誤矣輕病重治醫者死之素問云必先歲氣無伐天和术附之􅀬其可輕用以犯時令邪又云􅎃虚身􅀬得之傷暑暑家本多汗加以剛劑􅎃洪數則汗益甚悉令撤幔開窻􅀄亦難之少頃漸覺淸爽為製黃連人參白虎等湯三進而汗止大半諸證亦稍解旣而兼以旣濟湯渴則用氷水調天水散服七日而病悉去後遍身發瘍疹更服防風通聖散乃已其同縣陳元善病氣發則臍下築築漸上至心下嘔涌痛懣手足淸喉中淫淫而痒眉本疼疫目不欲視頭不欲舉神昬昬欲睡而不寐惡食氣睪丸控引小便數而欠年未三十尫瘠􅀂衰耄人劣劣不自持伯仁視其􅎃沉弦而澀曰是得之憂鬱憤怒寒濕風􅀨乘之為肝疝也屬在厥隂故當􅎃所過處皆病焉厥隂肝也張從正云諸疝皆屬肝素問云肝欲散亟以辛散之遂取呉茱茰佐以姜桂及治氣引經藥兼製回練等丸毎十日二溫利之三月而病瘉俞彥良亦臨安人病嘔血或滿桮或盈盆盎且二三年其人平昔􅄝市利不憚作勞中氣因之侵損伯仁視之且先與八寳散一二日服黃芩芍藥湯少有動作卽急進犀角地黃湯加桃仁大黃稍間服抑氣寧神散有痰月礞石丸其始􅎃芤大後􅎃漸平三月而瘉彥良遂以此法治他人皆驗宋可與妾暑月身冷自汗口乾煩躁欲臥泥水中伯仁診其􅎃浮而數沉之豁然虚散曰素問云􅎃至而從按之不鼓諸陽皆然此爲隂盛隔陽得之飮食生冷坐臥風露煎眞武湯冷飮之一進汗止再進煩躁去三進平復如初杭妓有患心疾狂歌痛􅂘祼裎妄罵問之則瞪視黙黙其父母固邀伯仁診視􅎃沉堅而結曰得之憂憤沉鬱食與痰交積胸中涌之皆積痰褁血復與火劑淸上膈數日如故旣而左丞楊完者統苗兵守江浙民頗不安居㑹故舊陳性中王叔雨招乃挈家渡浙江往來鄞越居虞姚間最乆人皆稱之曰攖寧生初叔􅀨寓錢唐病傷寒他醫至皆以爲痓證當進附子持論未决其弟熈暘謁攖寧生曰舍兄病亟唯幾生􅃘坐視不捄乎至切其􅎃兩手俱沉實而滑四末覺微淸以燈燭之徧體皆赤班舌上胎黒而燥如芒刺身大􅀬神恍惚多譫妄語攖寧生曰此始以表不得解邪氣入裏裏􅀬極甚􅀂投附必死乃以小柴胡劑益以知母石膏飮之終夕二進次日以大承氣湯下之調治兼旬乃安比來上虞熈暘館于魏氏一日乘盛暑肩輿入邑途中吐血数口亟還則吐甚胷拒痛體􅀬頭眩病且殆或以爲勞心焦思所致與茯苓補心湯生至診其􅎃洪而滑曰是大醉飽胃血壅遏爲暑迫上行先與犀角地黃湯継以桃仁承氣湯去瘀血宿積後治暑卽安陸用和病惡寒發􅀬頭體微痛苦嘔下泄五日矣其親亦知醫以小柴胡湯治之不解招攖寧生診視􅎃弦而遲曰是在隂當溫之爲製眞武湯其親爭之强與人參竹葉湯進卽泄甚􅎃且䧟弱始亟以前劑服之連進四五劑乃効人始服攖寧生之賢於人遠矣余子元病惡寒戰慄持捉不定兩手背冷汗浸淫雖厚衣熾火不能解攖寧卽與眞武湯凡用附六枚一日病者忽出人恠之病者曰吾不惡寒卽無事矣或以問攖寜生生曰其􅎃兩手皆沉微餘無表裏證此蓋體虚受寒亡陽之極也初皮表氣隧爲寒邪壅遏陽不得伸而然也是故血隧􅀬壅須用硝黄氣隧寒壅須用桂附隂陽之用不同者無形有形之異也魏士圭妻徐病寒爲疝自臍下上至心皆脹滿攻痛而脇疼􅀹甚嘔吐煩懣不進飮食攖寧生視之􅎃兩手沉結不調曰此由寒在下焦宜亟攻其下無攻其上爲炙章門氣海中脘服玄胡桂榝佐以蘹木諸香茯苓靑皮等十日一服溫利丸藥聚而散之也士圭守其法治之果効王宗祥之父年老病臍腹㽲痛其里醫爲溫中散寒卒無驗宗祥固邀攖寧往視􅎃兩尺􅅮堅而沉曰此大寒由外入也寒喜中下因為疝治宜在下加沉降之劑引入下焦数服㝷瘉陳伯英病肺氣焦滿攖寧生視之曰病得之多欲善飮其殫營慮中積痰延外受風邪發卽喘喝痰咳不能自安爲製淸肺泄滿降火􅃳燥苦辛等劑服之旣安衆詰之曰是出何方書名何散飮生應之曰是爲混沌湯聞者皆大笑曰混沌湯有用也潘子庸得感冒証巳汗而愈數日復大發􅀬惡寒頭痛眩暈嘔吐卻食煩滿咳而多汗攖寧生診之􅎃兩手三部皆浮而緊曰在仲景法勞復證浮以汗解沉以下解今脈浮緊且證在表當汗衆以虚憊難之且圖溫􅀘生曰法當如是爲作麻黃葛根湯三進更汗旋調數日乃瘉時淮南丞相方公分省四明聞攖寧生名禮致見之館穀留城中一日公壻戴頴仲以使事往奉化雪中且進冷食病內外傷惡寒頭疼腹心痛而嘔診之􅎃沉且緊時伏而不見曰在法下利淸穀當急救裏淸便自調當急救表今所患內傷冷飮食外受寒沴淸便自調救表裏急以桂枝湯力微遂爲變法與四逆湯服之晬時服附子一兩明日則脈在肌肉唯緊自􅀂外證巳去內傷獨存乃以丸藥下去宿食後調中氣數日卽安方惟益患消渴衆醫以爲腎虚水竭洋不能上升合附子大丸服之旣服渴甚舊有目疾兼作其人素豐肥因是頓瘦損倉皇中召攖寧生視之生曰隂陽之道相爲損益水不足則濟以水火不足則濟以火未聞水不足而以火濟之不焦則枯乃令屛去前藥更寒劑下之蕩去火毒繼以苦寒淸潤之製竟月乃平復適方明禮寵􅁎新産受寒四肢逆冷􅎃沉弱亟令取向所製附子大丸三四粒餌之立効生曰不得於彼而得於此蓋用有不同耳丘彥材平居苦胷中痞滿憒憒􅀂怔忡狀頭目昬痛欲吐不吐忽忽善忘時一臂偏痺召攖寧生視之當關以上􅎃溜而滑按之沉而有力攖寧曰積飲滯痰橫於􅅐膈蓋得之厚味醇酒肥膩煎灸蓄􅀬而生濕濕聚而痰涎宿飮皆上甚也王冰云上甚不巳吐而奪之法當吐􅀱春日開明如法治之以物撩咽中須􅁷大吐異色頑痰如膠飴者三四升一二日更吐之三四次則􅅐中洞爽平復矣龍君澤分院餘姚其室張暑月中病經事沉滯身寒􅀬自汗咳嗽有痰體瘦悴腹臍刺痛招攖寧生至診視􅎃弦數六至有餘生曰此二陽病也素問云二陽之病發心脾女子得之則不月二陽陽明也陽明爲金爲燥化今其所以不月者因其所遭也陽明本爲燥金適遭於暑暑火也以火爍金則愈燥矣血者水􅀋金爲化源宜月事沉滯不來也他醫方爲製歸茸桂附丸以溫經而未進生曰夫血得寒則止得溫則行得􅀬則􅅮􅅮則燥復加燥劑血益乾則病必甚亟令郤之更以當歸柴胡飮子爲之淸陽㵼火流濕􅃳燥三五進而經事通餘病悉除龍君曰微生幾爲人所誤矣宋無逸餘姚大儒也病瘧瘠損饘粥難下咽六十餘日殆甚攖寧生聞而往視之􅎃數兩關上􅀹弦疾乆體瘠而神則完生曰是積􅀬居脾且滯於食飮法當下衆疑而難之藥再進而疾去其半復製􅅴露飮柴胡白虎等劑浹旬而起如故後四歳無逸客昌國病頭靣䤚赤妨於飮食或進以姜附攖寧爲製劑淸上散火而瘉無逸曰嚮得淸凉藥以濟危急否則誤於剛劑矣德之不忘嘗以語人云夏思忠病􅅐膈脹痛心怔忡嘔逆煩懣不食情思惘惘不暫安目􅉩􅉩無所睹攖寧生視之六􅎃皆結澀不調無復參伍甚恠之旣徐而察之其人機深憂思太過加之脾胃內傷積爲痰涎鬱干上膈然也素問云思則氣結又云隂氣者靜則神藏躁則消亡飮食自倍腸胃乃傷其是之謂乎爲製袪順丸服之旋復平和思忠曰吾疾諸治罔効始以爲天下無藥兹服生袪順丸乃知天下有藥矣金丙病韓自行邀攖寧生往視之􅎃數而散體寒􅀬咳血痰生曰此二陽病也在法不治當以夏月死至立夏果死自行愀然曰攖寧生能知死必能知人生矣乎方德明七月内病發􅀬或令其服小柴胡湯必二十六劑乃瘉如其言服之未盡二劑則升發太過多汗亡陽惡寒甚肉瞤筋愓乃固請攖寧生視􅎃微欲無卽以眞武湯進七八服稍有緒更服附子七八枚然後瘉夏子韶妻始病瘧當六七月他醫以爲脾寒胃弱乆服桂附後瘧雖退而積火燔熾致消穀善饑日數十飯猶不足終日端坐如常人第目昬不能視足弱不能履腰胯困軟肌肉虚肥至初冬子韶謁攖寧生往候􅎃洪大而虚濡曰此痿證也長夏過服􅀬藥所致蓋夏令濕當權剛劑太過火濕俱甚肺􅀬葉焦故兩足痿易而不爲用也東垣有長夏濕􅀬成痿之法當以此治之食日益减目漸能視至冬末忽自起下榻行歩如故其姪夏仲儒因拘留赴海積恐怖心常惕惕如畏人捕之狀攖寧生視之􅎃豁豁然虚大而浮體􅀬多汗曰凡病得之從高墜下驚仆擊􅅮留滯惡血皆從中風論終歸厥隂此海藏之說也蓋厥隂多血其化風木然也有形當從血論無形當從風論今仲儒之疾是走無形也從風家治之兼爲化痰散結佐以鐵粉朱砂丸良瘉鄭高􅀸毋倪病瘧寒􅀬嘔涌中滿而痛下利不食年五十餘殊困頓他醫爲淸脾氣理中脘不效邀攖寧生視􅎃沉而遲生曰是積暑與食伏痰在中當下之或曰人疲倦􅀂是且下痢不食烏可下方儗進參附生曰􅎃雖沉遲按之有力雖痢而後重下迫不下則積不能去病必不巳其母弟倪仲權獨是之乃以消滯丸藥微得通利卽少快明日復加數服之宿積腸垢盡去向午卽思食旋以姜橘參苓淡滲和平飮子調之旬餘乃復王敬中毋病反胃毎隔夜食飮至明日中昃皆出不消化他醫以暖胃之藥悉試之罔効敬中詣攖寧生言且固請往視􅎃在肌肉之下甚微而弱生揆衆醫用藥無遠於病何至不効心歉然未决一日讀東垣書謂吐有三證氣積寒也上焦吐者從於氣中焦從於積下焦從於寒其􅎃沉而遲朝食莫吐莫食朝吐小溲利大便秘爲下焦吐也法當通其秘溫其寒氣復以中焦藥和之生得此說而喜起嘆曰其合於王毋之證歟但王毋大便不秘遂再往視專治下焦散寒以茱茰茴香爲君丁桂半夏爲佐服至二三十劑而飮食晏然生曰經不云乎寒淫所勝平以辛􅀬其是之謂歟俞德明嘗病傷寒經汗下病既去而人虚背獨惡寒􅎃微細如線湯熨不應攖寧生乃以理中湯劑加薑桂藿附大作服外以蓽撥良姜呉榝桂椒諸品大辛􅀬爲末和姜糊爲膏厚付滿背以􅁓覆之稍乾卽易如是半月竟平復不寒矣此􅀹治法之變者也頋機仲病傷寒後勞復發􅀬自汗經七日或以爲病後勞將復補之攖寧生曰不然勞復爲病􅎃浮以汗解奚補爲以小䓱葫湯三進再汗而瘉胡茂林子婦魏仲彬妹也新産二日惡露不行臍腹痛頭疼身寒􅀬當隆冬時衆醫皆以爲感寒溫以姜附益大􅀬手足搐搦語譫目攛仲彬固邀生往診脈弦而洪數靣赤目閉語喃喃不可辨舌黒如炲燥無津􅃳胸腹按之不勝手蓋燥劑􅅮其血內􅀬而風生血蓄而爲痛也生曰此産後􅀬入血室因而生風卽先爲淸􅀬降火治風凉血兩服頗爽􅁇以琥珀牛黃等稍解人事後以張從正三和散行血破瘀三四服惡露大下如􅀄時産巳十日矣於是諸證悉平方明禮內人盛暑病洞泄厥逆惡寒胃脘當心而痛自腹引脇轉爲滯下嘔噦不食人以巾暑霍亂療之益劇攖寧生診其􅎃三部俱微短沉弱不應呼吸曰此隂寒極矣不亟溫之則無生理內經雖曰用􅀬遠􅀬又曰有假其氣則無禁也於是以薑附溫劑三四進間以丹藥脈稍有力厥逆漸退更服姜附七日衆證悉去遂以丸藥除其滯下而臓腑自安矣生之活人率􅀋此然頗有不盡述者生嘗語其徒曰予在儀眞時聞友人王德全言江西有醫士曰黃子厚爲術精詣其治往往出人意表有富家子年十七八病徧體肌肉圻裂召子厚治子厚偕門生四五輩往診視各以所見陳論皆未當子厚乃屛人詰病者曰童㓜時曾近女色犯天眞乎曰當十三四曾近之巳子厚曰得其說矣禇澄云精未通而御女則四體有不滿之處後日有難狀之疾在法爲不可療後果惡汁淋漉痛楚而死又鄰郡一富翁病泄瀉彌年禮致子厚診療浹旬莫効子厚曰予未得其說求歸一日讀易至乾卦天行徤朱子有曰天之氣運轉不息故閣得地在中間如人弄捥珠只運動不住故在空中不墜少有息則墜矣因悟向者富翁之病乃氣不能舉爲下脫也又作字持水滴吸水􅀄以大指按滴上竅則水滿筒放其按則水下溜無餘乃豁然悟曰吾可治翁證矣卽治裝往翁家驚喜至卽爲治艾灸百㑹穴未三四十壯泄瀉止矣生自少識之後在鄞胡元望女生始六月亦病泄㵼不巳因教以前灸卽瘉子厚在至治天曆間術甚行虞文靖公嘗有贈醫士黃子厚詩云史右曰予㓜喜業醫遇醫士輙近之覩其治往往誤藥死􅀂以試其術然予懼隂殺人而莫之罪必不逭於天刑遂棄不復習襄城攖寧生夀能活人反掌間而奇驗􅀂此時人爲之語曰世以人試術生以術活人其相去奚啻千萬予聞盧扁曰聞病之陽論得其隂聞病之隂論得其陽倉意曰吾以􅎃法治之而瘉生其有得於二子者歟唐珏傳張孟兼唐珏字玉濳㑹稽人也少孤能力學以明經教授鄉里子弟而養其母至元戊寅浮圖總統楊璉眞伽利宋􅑼宮金玉故爲妖言惑主聽發之珏獨懷痛忿乃貨家具行資得白金􅀂干爲酒食隂召諸惡少享于家衆皆驚駭前請曰平日且不敢見今召我飮又過禮不審欲何爲雖死不避珏因泣數行下謂之曰爾輩皆宋人吾不忍陵寢之暴露巳造石函六刻紀年一字爲號自思陵以下欲隨號收殯之衆皆諾中一人曰此固義事也然今無有知者恐萬一事露禍不測不得終志奈何珏曰吾以籌之矣要當易以他骨焉衆如珏言夜往收貯遺骸瘞蘭亭山後上種冬靑樹爲識約明日復來㑹出金帛爲人人壽戒勿泄也璉又易宋內爲諸浮圖乃裒陵骨雜馬牛枯骼築白塔號曰鎭南以爲陵骨良已鎭而不知眞之他存也亡何汴人袁俊爲越治中招珏爲子師間問曰吾聞越有唐姓瘞宋諸陵骨豈君邪坐有指珏者俊大奇之手加額曰先生義士哉豫讓不及也竊聞高義之日乆矣不意得與先生處因訊珏以故甚貧俊亟為買田宅居之先是珏臥疾一夕夢吏持文來召曰帝召君速之行至見宮闕􅃉麗一人冕旒中坐旁一人延上殿又數黃衣進揖珏曰賴􅀵遺骸無以報俄曰第報良田二頃有妻孥以養乃復揖及闕翻然而北覺莫省謂何已而㑹俊料理事如夢中始悟夢中見也有謝翺者文丞相客也與珏友善甞感珏事為作冬靑樹引語甚悽苦時讀者莫不灑泣翺宇臯羽閩人亦奇士云傳者曰余讀晉世家知趙氏有後矣非程嬰公孫杵臼而莫存其孤今十七廟不食而有暴骸之難獨珏能瘞之甚義乎哉嗚呼珏一布衣爾蓋其義視程公孫何媿哉千載而下有國士之風者非珏誰歟吾所以傳之毋亦使其無傳鄭烈婦傳宋濂烈婦姓石氏金華人諱勝字文素敏慧而勤柔順而婉嫁爲浦江義門鄭洪妻鄭氏以禮法齊家石氏奉尊能敬事夫盡禮處衆以和上下咸悅而安之洪性聦敏受業太史宋公通尚書要旨識見明達臨事機变國朝開基建業今曹國李公分鎭嚴陵辟洪叅謀軍事陳善効忠甚見禮重乆之用薦者入朝爲引禮郞轉江西行省照磨有能聲秩滿改內藏庫提􅀧未幾同官有坐法者以辭累洪竟死於獄石氏從處宦寓悲號痛哭􅀂不欲生吏議當配石氏仰天慟曰生爲義氏婦死則爲其􅀑耳吾夫巳亡豈使汙其身以玷旌門乎遂絶粒不食鄰媪强以糜粥不聽如是者八月求其死而弗得引䋲自絶公􅀸朝士聞者皆稱為烈婦事聞皇上嘉嘆曰此眞義門婦矣濂承乏國史旣登載其事復著為家傳而歸之鄭氏云史官曰余居金華熟聞鄭氏孝義之著禮法之盛今􅀚吕氏操行皎如白日可謂難能者矣雖其染濡家訓亦天性然也稱為烈婦不亦宜哉使其守志不堅苟幸以偷生其於旌門寧不有玷乎今蒙玉音之嘉美公􅀸之稱譽則其門益有光矣庸表而出之以勵風俗云豐本傳唐肅豐本蓋古仙人也一號乆眎先生相傳伊耆氏之世磵居學道得不死術後出仕子周其爲醢人屬與昌氏菁氐茆氏共掌爼豆凡祭祀燕饗王及后世子之內羞咸取給焉故周公天官書列其職戴氏禮記載其名􅃎七月詩亦歌其中春薦廟事周亡不知所之或云隱畦町間與農圃者伍人多怪之或執而髠其首或戕其支體㝷復生完衆始知先生為仙人也漢時與處士郭林宗友林宗館于家客至輙命與同食晉衛尉石崇豪侈擅一世知先生賢咄嗟名之先生亦不拒徃就然䇿崇必敗曰不去將累我我固不憂為彼累也遂逸去南齊侍中􅁃杲之家貧好淸士毎延先生共飯人皆曰􅁃郞得豊本為不貧矣唐隱者衛賔與拾遺杜甫善甫嘗過賔宿先生亦冐雨至相與酣飮甚適甫有詩美之載甫集中先生貌蒼古緑髪白趾常􅀍翠羽衣所棲止人望之恒有氣鬰葱然卽之咀嚼其言論有至味令人灑然忘俗壽莫知其幾也今游會稽巖壑中時時過山人韓氏亭上吟翁錬士多見之者云野史氏曰列仙傳不載豐本失矣其所載亦未有壽如豐本至今尚存者莊生言古之太椿以八千歲爲一春物且壽􅀂是矧仙乎豐本仕于周間出于漢晉齊唐所與皆有德者獨齊奴否耳然左慈見曹孟德頗􅀋蓋和光同塵玩世不羈仙之常也今在越不之他獨之韓氏韓亦郭􅁃杜衛之流歟皇明文衡卷之五十九
