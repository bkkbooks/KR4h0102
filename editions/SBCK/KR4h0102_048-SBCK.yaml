front:
  text: 皇明文衡卷之四十八
  hash: sha256:4ded880adb6ac7ea15d051d74b4eebf36e090f54f374170c573ab51c760ab089
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_048-1a}
body:
  text: 題䟦題六檜堂卷黄淮忿之激於中者必徴於辭色徴諸色其發疾以􅁀徴諸辭其㫖婉以􅀷稽之徃古藺相如忿秦之欺趙欲以頭與玉俱碎樊噲忿鴻門之背盟㧞劍瞋目以脇楚王徴諸色者也國風嘆薈蔚之朝隮楚騷悲菉葹之盈室徴諸辭者也色之所發雖足以快意於一時而辭之所寓誠足以垂戒於萬世其淺􅀷固不可同日而語也今觀胡褎之六檜堂其亦忿之徴於辭者歟褎温之永嘉人當宋運中微屛處華蓋山中讀書自娱忿秦檜之誤國痛入骨髓然而未能伸其志也遂於堂階之下手植檜六本掲其扁曰六檜蓋以六之音與戮同于以識夫檜之罪當致顯戮兾他日得以酬其素願云耳烏乎褎獨何心哉不得巳也當時有􅀂胡澹菴者上高宗封事請以檜之頭懸之藳街詞雖切而不見信况褎未􅀗進用於朝者乎後雖一出竟以奸權妒嫉僅至滁陽通判而止徒使空言與國風楚騷同傳于編簡良可悲夫然其氣􅁚從容辭意懇至後之覽者足以寒心而駭膽誠非僥倖快意於一時者之可比也九世孫鏞裒集成卷鏞之子奥復求士大夫詩文以彰厥羙其亦善於繼述者歟四皓圗䟦胡儼余讀留侯世家至有所謂四人者嘗高其義不爲屈辱因高帝欲易太子吕后用留侯計卑辭厚禮招致此四人爲太子助北四人亦幡然無難色司馬公謂審有此是子房爲子植黨以拒父也愚以當留侯􅀍刧畫計之日唯知用圯上老人設變制權之術豈暇頋父子之倫哉然此四人旣不爲父用肯復從其子有可疑者一也向以帝之慢侮而逃匿不就今從太子見寧必其不輕而且罵哉有可疑者二也且此四人髙蹈遠引宜不役志於物一旦以金璧書幣而來有可疑者三也夫惟其有可疑者三余是以知此四人者必不茍出焉雖然四人從太子游者必有謂其果爲商􅑐之老則余不知也書袁廷玉傳後人之貴富賤貧吉凶壽夭智愚賢不肖果有相乎禹之跳湯之偏臯陶之削􅀲伊尹之無須麋周公之斷椔仲尼之䝉倛是耶非耶果無相乎公孫穀豐下而有後伯石越椒俱􅉘聲㓕其氏周亞夫鄧通之不食衛青班超之必侯見諸史傳者班班矣荀􅀸子曰相形不如論心論心不如擇術形不勝心心不勝術斯可以論聖賢矣其他囿於二氣五行而盡性踐形之功或昧焉或缺焉或未至焉則貴富賤貧吉凶壽夭智愚賢不肖之徴亦豈外於相邪故唐舉吕公管輅袁天綱之徒皆能以其術取名當時流聲後世此其人豈佞也㢤四明袁廷玉甫其先南昌人世業儒至廷玉以相術顯余官翰林時廷玉擢太常丞嘗見其貌清古而氣剛毅有君子之風今退休于家其子忠徹爲中書舎人乃持九靈山人戴良所譔甫傳示余而求題嗚呼廷玉術之神其見諸傳者詳且核矣然其言曰毎占人吉凶卽知其心之善惡輙念之爲之反覆化導期轉禍以爲福人不畏義理而畏禍患因廷玉之言格心改行者甚衆然歟􅀂然君子之用心也昔嚴君平隱於卜筮與人子言依於孝與人弟言依於順與人臣言依於忠各因􅀔導之以善千載之下求之廷王其有合哉使占者能如廷王言棄咎而從義誠於理道有裨焉嗚呼傳以術論之其可乎書居士外集後鄒緝予少時客遊新淦新淦之仁和有李繼武者敬士而好文尤好蓄古文奇書聞人有異書世所貴重者不計其貲之多寡輙重購之嘗得故禮部侍郞曾魯得之所校歐陽公居士內外集知以爲奇寳而藏之予嘗借得其外集蓋板本大字上下邊幅最高闊曾公皆手自校讐中間頗多缺板又手自補完曾氏家多古書所校諸本有吉本家本刋本諸集辨其同異及其改易増損皆朱書小字於其上下旁邊字極謹細常滿其邊幅以爲其用心何其􅀂是之宻也非積日累月之勤何能至是哉是時曾公􅃿巳乆而其子坐事見籍官散鬻其書故繼武購得之予甚惜曾公用心之勤而其子孫不能保而全之爲可恨又以外集之文罕有傳者其所考異尤爲難得因取而備錄之惟所校居士集五十卷洪武初永豐縣令蔡玘已爲之鏤板而建寧書坊又爲之傳刻則此外集亦當與之竝行也其後予官大學居京師以李氏所藏本不可復見深加愛惜吏部侍􅀰練公子寧好古君子也見之而喜因借以去乆未之取㑹子寧遭事死其集遂亡焉予又爲之往來惋惜不巳也李後復姓胡出爲松江華亭丞集藏于家有子患風狂疾其存亡不可知李今又巳没則其集之流落散亡也必矣豈不重可􅁣念哉此本予永樂九年借義門鄭氏本所錄蓋此巳得居士集故復錄此以爲全集所冩雖未能精善又非有曾氏之考異然自謂鄒氏家奇書又後五年予再自北京扈從還京師入見皇太子􅀗賜歐陽文忠公大全集一百五十七卷裝繕整齊蓋尤爲至寳之物旣珍襲而秘藏之以此錄本旣得之不易因傋述予平生愛慕歐文之心與前後得失之故而幷予之所感者係焉題劉州判墓銘後梁濳㤗和劉君仲啓前吏部尚書槎翁之從子也尚書公雖接物和同而中情極簡重少可許然獨愛仲啓仲啓判陜州時以事建至京事不白公卽爲廷白之仲啓少􅀒奇氣好持􅃓乗馬甞羣獵窮山中遇猛虎獨前格殺之心以此自壯旣而折節讀書從尚書公及其弟東園先生講學稍就砥礪而其才益振施之於政沛然也然人常稱仲啓在州時一事云州治舊有邵公祠祠有怪甞夜見女奴四人各麗服持一燭而出云邵公也不敢近仲啓知其怪從祠傍搜之得二老狐殺之俄又見池蓮色鮮艶殊常卽命㧞去之池水爲之赤怪遂以息蓋州人道其事其家僮輿􅀠亦云翰林庻吉士余學䕫又爲之傳甚悉於乎亦異哉春秋左氏所記怪異事甚衆後世未免譏左氏之好怪孔子不語怪豈以其易惑而難知也老子又以謂至治之世其􅀑不神然則使前此治陜州者其賢如仲啓怪且不作矣仲啓旣甚英偉又得尚書公昆弟振育之其爲治必有異績惜州人不知之獨傳此異事事之異者固足以動人耳目獨不知仲啓於此偶然耳可稱道不在此也仲啓之孫鯉舉於鄉而來示予以山東按察僉事晏彥文先生所爲仲啓墓銘讀于此有嘅焉因題而識之題劉公辰宗譜後梁濳北京行部侍郎劉公辰宗譜一帙自公而上至五世祖載而止載以上譜遺失不可知者不強續也載生元婺州萬户府經歷季季生常州萬户府知事良良生毅賊將張士誠圍常州時援兵絶不至毅賫蠟書浮江間道抵浙江行省求救未及還而城䧟城䧟時良獨不屈闔門赴水死者十餘人良卽公之從父也公之尊父某嘗以是語公公亦自能道張士誠之成敗及其從父死時事識其歲月恨其時褒恤之典不及也公爲人喜談論慨然甚有志於天下事方太祖高皇帝渡江時公爲他將幕府􅁺屬今皇上卽位之明年纂修高皇帝實錄公與予實預編集凡當時戰伐克捷之功􅀫將舊臣有所不能知知之有不能盡者公一言之聽者如身在其時目覩其事退而考之記注皆合事相越數十年猶強記不忘如此也史事畢拜江西叅政旣罷歸尋復擢今職然不煩以事蓋皇上欲數知太祖時故事惟公能道之故有是命公在江西爲政􅀹知大體雖老其氣如其壯時今觀公之譜及其行事遭遇乗時與其先世忠節俱顯可謂盛矣予惜其從父之死事不著之於史而公之出處當必有太史氏書之也故著之以係其譜俾蔵于家云題羅氏承恩卷楊􅄎今少􅀓兵部尚書兼華蓋殿大學士楊公士奇嘗任左春坊左諭德兼翰林院侍講永樂己丑太宗皇帝北廵命皇太子監國留公輔導明年其同母弟羅京以事當徙北京爲民公顧其子尚㓜而毋夫人墳墓無守之者乃以情白仁廟乞留京且言京兄弟二人兄從戍遠方京復當徙辭意懇切仁廟憫之遂以京給公倂開羅氏軍籍於是母夫人墳墓有所託而羅之兄弟子姪得優游田里是皆仁廟之賜也今年春京自西昌來省兄㑹晤之間感念疇昔謹請述其事之本末以示不忘公嘉許之復屬予識於後嗚呼仁廟之恩愽矣哉臣溥嘗備員洗馬􅀼見監國時裁决庻政務從仁厚以煦􅀖家蓋將使天下蒼生咸得分願况近臣哉公以文儒居輔導竭忠殫慮知無不言言無不聽恩遇之隆爰及其家固有以也及仁廟正位期年深仁厚澤覃􅀍萬方禮樂之敎垂􅁉後世而公寔以保傅之重兼論議之職其所以顯相􅀖家以廣利澤其惟善推此心也哉京篤念國恩不忘所自亦羅氏之賢子弟也用世厥家以圖永乆尚愼旃哉書先聖先賢圗贊後呉訥右宣聖及七十二弟子贊宋高宗製幷書其像則龍眠李公麟所􅀞也高宗南渡建行宫于杭紹興十四年正月始卽岳飛第作太學三月臨幸首著先聖贊後自顔淵而下亦皆譔辭以致褒崇之意二十六年二月刻石于學附以太師尚書左僕射同中書門下平章事兼樞宻使秦檜記檜之言有曰孔聖以儒道設敎弟子皆無邪雜背違於儒道者今縉紳之習或未純乎儒術顧馳狙詐權譎之說以僥倖於功利其意蓋爲當時言恢復者發也嗚呼靖康之禍徽欽蒙塵汴都淪覆當時臣子正宜枕干甞膽以圗恢復而檜力主和議攘斥衆謀盡指一時忠義之言爲徂詐權譎之論先儒朱熹謂其倡邪說以誤國挾虜􅀔以要君其罪上通于天萬死不足以贖者是也昔􅀛山楊先生時嘗建議罷王安石孔廟配享識者韙之訥一介書生幸際聖明備貟風紀玆於仁和縣學得觀石刻見檜之記尚與圖賛竝存遂命磨去其文庶使邪詖之說姦穢之名不得厠于聖賢圗像之後然念流傳巳乆謹用備識俾後覽者得所考云書宋丘公岳家傳後右宋龍圖閣學士沿江制置使丘公岳山甫家傳後有元文宗時龔璛子敬順帝時楊維禎廉夫䟦子敬云公孫彥啓以時脩宋遼金三史欲執筆者采入公傳廉夫曰自公觧閫不三十年宋亡矣予甞怪宋史無公傳因稽宋制文臣自少􅀸監武臣自正刺史以上必立附傳公爲學士制使何不立附傳于理廟實錄後乎豈在趙葵帥幕弗能止其入洛之師而弗附耶抑史氏失軄而失附邪元初董文炳命李磐取宋實録等五千冊比上國史院􅀂有公附傳後何弗錄邪元累朝欲修三史以綂紀弗定弗果順帝至正元年因授經郎危素請始詔修之命素来傳至宋兩都訪摭缺遺彥啓名迪公四世孫何不以此傳獻之邪宋接􅀳唐正綂遼金可比􅀳符姚附立載記當時史官歐陽玄李好文輩率徇時亾誼僅比陳壽三國志爲三史亷天作正綂辨力辨其非噫夀之志近郝經伯常張樞子長所作續漢書以魏呉附錄􅀂遼金則陳桱子經通鑑續編巳大書宋諸帝爲正綂而分注二國記年於其下矣嗚呼夷狄入主中國實開闢以來非常大變迨我朝太祖受命始克攘除以復先王之舊方今重熈累洽有以宋史當正具陳簡􅂌文學之臣以修訂之易易耳公之裔孫貳令方持傳求題然傳乃謄本多訛字缺文方當考訂寳藏俟時以獻晦庵除秦檜祠移文後題右徽國文公先生所著曰移文者先生淳熈中提舉浙東常平因以公文移郡屛去之也檜家在金陵紹興五年除知溫州捨田蓋是時矣曰趙汾獄者檜恨趙鼎等必欲殺之􅂦死猶不巳乃令徐嚞論鼎子汾與宗室令衿姦謀送大理獄逼汾自誣與令衿張浚李光胡寅胡銓等五十三人謀大逆欲加族誅獄成檜病不能書乃釋臼圖九錫者鎭江守王循友乞加檜九錫為圖以獻也曰誰其弱秦者吕願中率賔佐作秦城王氣詩高宗旣不能討檜􅀂天不誅則王氣誰能弱之也又按先生語􅀋云高宗悉以國柄付檜舉朝悉秦之人毎事與高宗爭勝曹筠言水漲詔逐之檜陞為從官周葵欲言梁汝嘉檜不待高宗應便改除之繇是張扶請檜乘金根車其勢湏如曹操而後巳故檜死詔謂楊郡王云朕今日始勉防檜逆謀豈非徘徊漢鼎之旁之驗乎􅀂檜之外蘖熺塤堪其滅濁涇黷奚足道哉題顔氏三節婦傳後王􅀡右顔氏三節婦傳翰林檢討張先生伯頴撰載節婦死事甚詳嗚呼誠可謂偉烈者矣予於此而有感也古之王者其德積於身充於家而逹於􅀖國故當時􅀍其化者雖婦人女子皆眀義守節卓然有不可奪之志觀於詩之二南可見矣後世風俗之厚薄亦視其君德之淺􅀷非可以茍焉者也元有天下幾百年以夷狄之風易中國之俗而夫婦之倫􅀹爲大壊其平居逸處不知有别者多矣况於喪亂之際乎獨當時士大夫家詩書傳習之乆􅃀然不爲所易然亦鮮矣有如顔氏三節婦者豈不誠可尚哉嗚呼天下之人固有道之以正而不從者矣况可以淫僻道之哉此予所以有感也善化敎諭敬守節婦蕭之子也示予以此傳故題予之所感者如此以􅀷見節婦之賢也題赤壁圖後王􅀡東坡先生謫黄州以李定輩之􅉲也赤壁二賦其用意􅃉矣當曹操欲東下時視呉巳􅀂無有而卒僨於赤壁今江山猶在而操已影㓕跡絶然則英雄如操者果何足道况李定輩邪先生雖爲所困然胸次悠然無適而非樂其清忠􅀡節自足以照映千古不特文章之羙也而定輩皆已潰敗􅆨腐而無餘矣先生嘗憤操害孔北海謂北海如龍而操如􅀑予於定輩亦云題汪景房沈籍事後予讀元翰林修撰張子長所書汪君景房事又識景房之裔孫秉心而信仁人之澤之遠也蓋仁者天之道也君子以仁存心斯無愧於天則天之祐之有窮哉當錢氏納土時爲其臣者孰無去就利害之思得早入朝以自託幸矣况奉圗籍納土之臣其階於榮顯可必也景房獨存愛人之心不忍其復困於重賦遂去其籍寜自棄於貧賤而使十三州之人得輕稅之利其心之仁如此豈非天之所佑哉宜子孫之乆而盛也古者十一而稅軍國之用量入爲出而上下皆足後世費用無經故往往加稅加稅而又不足則􅁀征横歛以􅁇之民困無聊於是卒亂以亡書曰民爲􅀖本本固􅀖寧果能節用而愛人則豈有亂與亡哉錢氏賦重民困有亡之道雖不納土勢亦不長其自歸於宋也乃天哀其人不使重困於兵革而錢氏因以成歸德之名蓋幸也浙之輕稅雖成於王方贄然使其故籍尚存方贄亦莫如之何自是以來民享其樂利百三四十年高宗立國於此民心戴之又百五十年而後亡蓋由祖宗德澤在人而此乃其大者也推本而論之景房之功豈細哉子孫之乆而盛蓋宜也於戲後之仕者有欲爲宇文融皇甫鎛之徒其尚監于玆哉題郤封禪頌藳後右郤封禪頌稾前翰林學士贈禮部尚書文穆胡公作也昔太宗文皇帝在位時太常臣有言曰古者聖人治天下功德盛隆則必舉封禪之禮以告于神眀垂羙於萬世今陛下繼統天淸地寧民物咸遂聖德神功古無與讓而封禪未講何以繼前代帝王之盛請命禮部舉行之上曰封禪非古也帝王之有聞於後者在其徳不在封禪不許公聞之曰此盛德事也而大臣有與之比者隂􅂇之公慮爲所惑乃本封禪非古之說與後世賢君良臣所以闢而不行之羙皇上聖性髙明眞知灼見足以破千古之謬爲百王之眀監作此詩以獻上覽之喜曰是朕心也於是言者沮而封禪卒不行君子之事君務引其君以當道􅀂公是也彼秦皇漢武之輩肆其侈心以瀆擾上下天地厭之顧乃以是爲說此爲􅀖者所以逺佞人而公之所􅀷慮也其學之醇懿心術之正大可見豈獨文章之雅贍可喜哉公􅂢舘三十年其壻尚寳丞宋懐以此槀示􅀡􅀡嘗從公㳺知公爲􅀷故題其後如此懐其永寳之哉皇明文衡卷之四十八
