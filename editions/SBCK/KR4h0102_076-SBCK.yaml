front:
  text: 皇明文衡卷之七十六
  hash: sha256:40d77d3dfbf060750dbd4a317484bf9b4952450b5f553301e01ac0f6e0c12384
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_076-1a}
body:
  text: 神道碑故文淵閣大學士兼左春坊大學士贈榮祿大夫少師禮部尚書謚文穆胡公神道碑銘楊士奇太宗皇帝御天下二十有三年文武之臣各展其才能達諸事功􅀂竭誠効力始終不渝者其身雖没所以寵眷之率有進而不衰其文臣遭遇之盛者文淵閣大學士兼左春坊大學士胡公尤著者也公初以進士第一爲翰林修撰階承􅀡郎又明年太宗皇帝入正大綂陞侍講踰月改侍讀進承德郎永樂二年陞右春坊右庻子階奉議大夫仍兼侍讀四年進翰林學士兼左春坊大學士階奉政大夫進文淵閣大學士仍兼左春坊大學士又三年得疾且劇上數命大醫集衆醫之良者往視日遣中使問疾旣卒上悼嘆不已命工部具棺禮部賜祭者再贈資善大夫禮部尚書謚文穆國朝文臣有謚自太子少師姚公廣孝與公始也又命官給舟還其喪命有司治祠墳時仁宗皇帝監國南京公之喪過焉遣官臨祭賜􅉠甚厚塟畢其子入謝官其長子穜爲翰林檢討仁宗旣嗣位追念公舊人加贈荣祿大夫少師禮部尚書遣官諭祭且厚賜其家公遭逢二聖恩備始終何其愈乆而愈盛也公居官敬慎在上前承顧問應對必盡誠必據理而忠厚爲本未嘗及人過失事於奉㫖制勑視草卽有所見必具可否以聞多見采納所譔進文字上知出公筆輙稱善所奏對語及所治幾務退未嘗出口雖親厚不敢私渉有問蓋自守之嚴有素事太宗皇帝十有七年凡廵幸北京親征北虜翰林率公與楊公勉仁金公㓜孜在扈從信任甚篤禮部郎中周訥建請封禪羣臣亦多言此太平盛事上皆不聽時獨公之言與上意合旣退作封禪頌奏之丁母憂召還上問百姓安否對曰安但郡縣窮治姦惡外親爲民厲遽詔罷之其兼春坊也小心盡誠多所禆益故􅀹爲儲君所厚而沈靜謙約以滿爲戒未嘗干人以私人亦無敢以私干之兩考京畿鄊試四爲廷試讀卷官鑒别公明奉勑修髙皇帝實錄及五經四書性理大全書皆爲總裁志於扶植名敎􅅄掖善􅀋果於義事於利不苟取與未嘗一比匪人所與交必輔之於善不善去之不復顧小人有不滿公者屢造言毁之賴上深知之不聽遽黜毁者而公自執愈堅意度䔥散雖身處榮祿未嘗一日忘山林幽澹閒遠之趣公退閉戸讀書賦詩而已初名廣廷試傳臚更名靖永樂􅀄復舊名其字光大其齋居名晃菴因以爲號公十數歲喪父已有志問學内浸漬其毋訓外則日受從祖子貞先生之敎故徳噐不凢居家篤倫誼處鄕曲恂恂執恭讓旣冠薄逰閩中閩之前軰君子率忘年與交歸而從黄伯噐先生講論得所歸􅀫之地而日進焉其學􅀶䆒經史百氏下逮醫卜老釋之說亦皆旁通而用志性命道德之㫖晚益有造詣爲文援筆立就頃刻千百言沛然行雲流水之􅀔賦詩取􅃴其性情近體得盛唐之趣工書法行草之妙獨歩當世四方重其文翰求者日接踵戸外雖無厭倦意然非其人不苟予其卒以永樂戊戌五月八日春秋四十有九其先自金􅁜徙廬陵宋忠簡公銓其十二世祖也曾祖鼎亨祖彌高父子祺累官延平知府母呉元進士永豐縣丞師尹之子永樂中贈公父翰林學士封毋太宜人公娶夏初封宜人洪熈初進封夫人子男三長卽穜次穆次穗女四長嫁陳年次嫁觧禎亮次嫁宋懐孫男六女七所著文章有晃菴集扈從集􅀂干卷公與士奇同郡同官知契最􅀷未卒前二年有後死則銘之約旣卒其􅀌又奉臨終之命索文刻墓石鳴呼士竒先公生五年豈謂竟銘公墓哉蓋今九年乃克成之銘曰經國所資文武竝施維武以靖維文以治巍巍太宗綂御九有任武曁文如左右手公職詞垣十有九禩秉恭執勤司帝之制玉冊金簡天章龍文光華日星敷宣帝仁萬幾燕閒清問前席公所入告惟帝時懌公所蓄志寛惠􅀍下沕穆泯焉宻賛鴻化春宫輔德平􅀡之行二聖惟明燭鑒公誠好文之朝儒林之首人聳其瞻公眎無有泊虚之存簡肅之度彼其何心有好有悪仲尼有言善者好之善有好公没思不衰寵章駢蕃賁終猶始始終之全曠代其幾金螺在左文川在右埋璧有光上貫牛斗墓道之碣爲尋有多最行琢辭來者是儀少保戸部尚書贈特進光祿大夫太師謚忠靖夏公神道碑銘公姓夏氏諱原吉字維喆其先家于饒州曾祖復祖希政元末爲湖廣行省都事兵亂死之考時敏爲湘隂縣儒學敎諭遂家湘隂公自㓜端厚好學年十三敎諭公􅃿益知自勵毋夫人廖守節敎子公終父喪卽出敎里塾取束脩以資飬而率其二弟恭侍婉愉得毋夫人懽心出入鄕閭其老長皆忘年賔禮之時己􅀒鉅人度喜怒不形里少年嘗􅀍酒侮慢公里人共擊之詈之曰汝小人不知鄕有君子耶有􅀑物白晝附人言禍福驚動里中或強公往觀卒無所言他日復有言或問之故曰夏公端人吾不可以近公一無所動心洪武庚午歲以詩經選鄕貢入大學遂擢戸部前四川部主事授承􅀡郎進承德郎曹務叢脞凡倉􅁃府帑之出入簡牘之著悉有條理同官後至於事有未通者咸以質公日環左右公雖紛冗必爲之盡心蓋人人德公如師陞戸部右侍郎授嘉議大夫廵撫福建所過郡邑考察吏治咨訪民隱公明寛大人咸悅服大宗皇帝入正大綂轉左侍郎逾月陞戸部尚書授資善大夫永樂初蘇松諸郡大水命公徃治發浙西兵民十數萬䟽决壅滯自松江黃浦東北以逹于海水患乃息而撫恤曲當人不言勞又撫綏其飢民奏發廪三十餘萬石賑之散給有方民頼以濟進資政大夫初建北京採宫殿材於東南命公自南京抵北京督視運送給以錦衣衛官校且命有不率命便宜行事公於號令中備矜恤之意人人效用太宗廵狩北京公預扈從命兼行在禮部都察院事歲餘車駕親征北虜今上以皇嫡長孫留守北京命公輔導庻事修舉京師肅然太宗還良喜賜公鈔千緡綵幣四表裏羊酒鞍馬自是屢奉命侍今上有司奏公與吏部尚書蹇公歷官九載皆賜勑嘉奬有淳良篤實如古名臣之諭太宗親宴之别殿無幾賜誥命追封祖考皆爲資政大夫戸部尚書祖妣爲夫人封母爲太夫人重修太祖皇帝實錄命公監修書成賜鈔織金文綺衣文綺表裏北京宫殿成奉勑召仁宗皇帝及今上于南京二聖喜公至賜宴勞及鈔白金鞍馬北虜復犯邊大宗皇帝將親征公言今邊儲不足請遣將無煩六師忤㫖罷官仁宗皇帝嗣位卽日復公戸部尚書公以母喪未終辭仁宗曰國家不幸有大事正朕與卿䓁恊心比力之時如卿以親喪辭則朕亦未當在此公乃不敢復言遂加少保仍兼户部尚書賜玉帶今上正位東宫加公兼太子少􅀓少保尚書二職如故賜誥命追封會祖祖考皆爲榮祿大夫少保兼太子少􅀓戸部尚書㑹祖妣祖妣妣皆一品夫人賜銀章一其文曰繩愆紏繆且諭公曰朕有過舉卿但具奏來以此識之朕不難於從善賜鈔萬緡御用米二十石胡椒二百斤公感知遇之厚鞠躬小心靡或不盡修太宗皇帝實録命公監修仁宗皇帝崩時今上􅁥國南京至則䘮禮及卽位之儀皆具皆公一人所預定上旣嗣大位公以舊輔􅀹重倚注公亦孜孜惟謹寵賚日盛修仁宗皇帝實錄仍爲監修庻人高煦反上親率六師擒之公預扈從還賜白金文綺等物甚厚賜銀圖書一其文曰含弘貞靜蓋褒公之德云明年扈從廵邊旣還上念少師蹇公及公等四人者皆春秋高欲優逸之賜勑嘉劳命輟職務而仍其祿朝夕侍上備顧問謀議而恩遇益厚兩朝實錄成賜白金織金羅衣文綺表裏鞍馬賜宴明且入謝暮歸第得疾遂薨宣德五年正月二十七日也夀六十有五歳上聞訃震悼遣禮部尚書胡濙賜祭贈特進光祿大夫太師賜謚忠靖􅐠鈔萬緡勑有司營喪塟官其子瑄爲尚寳司丞仍復其家朝臣自公侯貴歳下至郎曹將校咸往弔祭衛卒巷氓亦有嘆息至流涕者公天性至孝友其弟原啓原禮皆厚原啓􅃿愛其子如子讀書鄕校時敎諭史九韶雖非授業師遇之必拜雖貴不變旣貴九韶陞敎國子月恒分之祿九韶將老朝廷從公請命致事與人交乆而敬平生故人在患難率賙給之遇士之貧者振之有顛躓失所者援之德雖㣲必報而未嘗存怨惡心接人溫然處事善善長而惡惡短􅁭宇瀞􅀷閎廓不見涯涘嘗有從隷汚公金織賜衣懼欲逃者曰汚可浣何懼爲有吏壞公所寳硯石匿不敢見公召吏諭之曰物皆有壞吾未嘗惜此慰遣之於時卿大夫雅量推公第一知者蓋比公於王子明韓稚圭之度其在上前所言必歸仁厚臨政必酌大體其預宥宻雖泯然無迹蓋有隂受其徳者矣故不間貴賤䟽戚識不識皆知其爲善人長者喜爲詩四方士重公名得其一篇一詠藏以爲榮公配鄭氏有賢德再封皆夫人子男三珫瑄瑾女一嫁虞㻞珫與虞氏女皆先卒公卒之三月歸塟湘隂其家以墓碑属余余與公同朝三十年晚益親厚相知又嘗爲余道其平生余豈意遂志公之墓耶銘曰泝夏厥初以國爲氏衍于會稽緜緜厥系太末之邑後來徙居曁唐中和復徙于番懿夏之世逢掖其服詩書有承德善有續轉鄂而潭自公祖考積厚必發公奮起紹燕歌鹿嗚來與計偕官任其賢政用其才繇司徒屬曁掌􅀖敎寅恭小心寛仁允蹈叅决大議洊任重􅀒不亟不徐雍容雅度如彼喬嶽嶻焉弗移其氣黙運澤潤良多祗事列聖旣四十載夷險一道其舄几几國有老成堂有柱石胡不慗遺當宁興惻旣榮且哀隆隆寵光於乎忠靖没世不忘奉天靖難推誠宣力武臣特進榮祿大夫柱國太保陽武侯追封鄞國公謚忠武薛公神道碑銘宣德五年五月太保陽武侯薜公奉命城隆慶永寧赤城獨石竣事將歸以疾聞上遣中官以御醫徃視且賜勑諭勞至京猶力疾入見上慰諭再三旣歸第日賜御藥遣中官臨問無幾竟不起七月廿三日也訃聞上震悼親爲文祭之追封鄞國公賜謚忠武詔有司治喪塟凡喪塟之儀皆優等蓋特恩云公諱祿姓薛氏世家山東膠州之新興社曾祖考諱安妣劉祖考諱大妣金考諱遇林妣張公兄弟六人而公第六自少傑特有大志未冠籍戎伍上官皆奇之從北征金山及哈刺哈之地又從征迤都山乃兒不花䓁處自是屢出西北二邊渉萬里而還太宗皇帝舉兵靖內難公首從義旗攻九門克薊州遵化援宻雲攻雄縣追敵漠州咸奮勇先驅以一當百戰眞定公生擒敵左副將軍駙馬都尉李堅超陞燕山右護衛指揮僉事賜白金文綺從援永平攻下大寧富峪會州寛河時南兵巳圍北平城公還先遇其哨騎薄戰敗之車駕􅁇至從戰鄭村埧敵大敗陞指揮同知從克廣昌蔚州攻大同率兵前哨􅀗敵人馬遂從南征大戰白溝河追奔至濟南陞指揮使從克滄州大戰東昌公以五十􅀐前哨遇敵兵數百與戰敗之獲馬三十餘疋敵悉衆來追公復奮戰大敗之􅀗馬二百餘疋敵於威縣及􅀷州伏兵以要旋師皆擊走之從戰夾河大捷戰滹沱河右軍力屈公率衆馳赴之出入敵陣數十合戰敵敗走公追至夾河斬馘無算􅀗馬五百餘疋明日戰單家橋公馬蹶爲敵兵所得㧞刀斬敵兵復上馬督戰遂敗敵將平安軍以次攻下順德大名彰德及攻西水寨公生擒敵都指揮一人斬􅀗􅀹多從攻東阿東平汶上皆卜之􅁇戰淝河大店小河汴隄靈壁率勇先諸軍遂渡淮渡江從車駕入京師太宗皇帝爲臣民推戴旣正大位論功行賞陞驃騎將軍後軍都督府都督僉事以其官秩贈三代永樂六年陞都督同知八年從車駕北征至玄􅈚河以功進榮祿大夫右軍都督府右都督兼左軍都督府事以其官秩加贈三代時四方選至㓜軍數萬悉命􅀠公操習十二年從車駕北征十五年􅀄建北京宫殿命公董營繕十八年成加奉天靖難推誠宣力武臣特進榮祿大夫柱國封陽武侯食祿千五百石追封其三代皆侯爵賜誥劵二十一年從車駕北征還奉命討捕湖州叛㓂二十二年復從車駕北征是年八月仁宗皇帝嗣大位加公太子太保子孫世襲侯爵奉命廵北邊適虜㓂雲州公率兵追至大松嶺斬􅀗甚衆事聞賜勑嘉􅅄遣中官及鴻臚卿卽軍中勞之旣還賜白金鈔幣加歳祿五百石洪熈元年佩鎭朔大將軍印率師廵北邊宣德元年庻人高煦反車駕親征命公爲前鋒先一日圍其城罪人旣得留公撫綏城中軍民還賜銀幣甚厚明年秋從事駕廵邊出會州觧后虜㓂塞下與戰敗之生摛其酋斬獲其餘衆遂鎭薊州永平冬還賜銀幣加厚四年率師護兵餉開平者再五年春佩鎮朔大將軍印廵邊至奇黄嶺遇虜拒戰悉斬之盡收其家口孳畜陞太保錫鈔幣居三月董築城之役蓋從公之言以便戍守公平居無事未嘗忘危毎計邊務言之亹亹或誚其􅃈屑者終不爲變蓋其志奉國惟恐不盡爲將勇智兼備常先事籌畫用心之至以夜繼曰故所嚮成功未嘗敗北間一二臨陣中矢石褁創赴闘有進無退其率師所過紀律嚴明秋毫無犯而撫恤士卒人人歸心􅀂董繕作規置有方力不煩費功率堅乆人亦罕及蓋一代之興必有一代之臣公祗事三聖渉歷多用志篤鞠躬盡瘁以效臣職故能建功國家流光簡冊致身貴富垂慶後昆其非古名將之流而今之不可多見者歟公壽七十有三年其配李累封至侯夫人子男三長勲先卒次某次某孫男三長誠先卒次某次某以是年十月三日塟公于某鄕某原銘曰明聖之興有命自天必有輔翼名世之賢氣機翕會雲龍風虎有勲有烈左文右武桓桓薛公始奮從義大呼迅馳金戈鐵騎智明幾先勇蓋萬夫疇其膺之析朽摧枮宗社載安功書冊府在帝左右股肱心膂公於事上一誠不貳知竭臣職死且無怠公於馭衆有紀有綱撫如春和令如秋霜歷事二聖麟衣蟬冠廷有老成國有屛翰丹書鐡劵傳襲來裔公如長城曷不百歳英靈升遊九原在此太史作銘式昭無巳皇明文衡卷之七十六
