front:
  text: 皇明文衡卷之五十七
  hash: sha256:1e1f1b80bcb171cb271cd4bcca46ad4e1d81d142f69c8250386399b7daaa2d4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_057-1a}
body:
  text: 傳謝翶傳胡翰謝翺字臯羽建寧人也家故贏於財父鑰居喪哀毁人稱其孝宋咸淳初翺試進士不第􅁣然求諸古以文章名家元兵取宋宋相文天祥亡走江上逾海至閩檄州郡大舉勤王之師翺傾家貲率鄉兵數百人赴難遂叅軍事天祥轉戰閩廣至潮陽被執翺匿民間流離乆之間行抵勾越勾越多閥閱故大族而王監簿諸人方延致游士日以賦詠相娯樂翺時出所長諸公見者皆自以爲不及不知其爲天祥客也然終不自明且念乆不去人將虞我矣乃去而之越之南鄙依浦陽江方鳳時永康呉思齊亦依鳳居三人無變志又皆高年遂俱客呉氏里中得其餘日以自適一不問當世事翺嘗上㑹稽循山左右窺祐思諸陵西走呉會東入鄞過蛟門臨大海所至歔欷流涕晚愛睦州山水浮七里瀨登嚴光釣臺北向舉酒以竹如意擊石歌曰䰟歸來兮何極䰟去兮關水黑化爲朱鳥兮有噣焉食歌已失聲哭人莫詰其誰何唯鳳與思齊􅀷悲之初江端友吕居仁朱翌辟地白雲源源故方干所居在釣臺之南翺率其徒游焉願卽此爲塟地作許劒錄及翺居錢唐病革語其妻劉曰我死必以骨歸方鳳塟我許劎之地鳳聞訃訖如其言鳳字韶􅀸由太學生授容州教授治毛氏詩陳宜中當國禮下之命其二子大豋小豋受業焉同郡黃溍柳貫皆出其門好奬抜士有一善未嘗不與之進思齊字子善其學本之外祖陳亮用䕃􅀘官攝嘉興丞數以書干宋臣用事者言賈似道母喪不冝賜鹵簿責文及翁頋忌爭不力猶不爭耳又言御史俞浙以論謝堂去職宰相附貴戚塞言路如朝廷何思齊雖有寒疾耳聾遇事不以埶移不以貧屈自號全帰子云媯仲子曰翰少客浦陽望仙華寳掌諸山從搢紳學者問翺時事未嘗不喟然爲之太息於是訪其論著之文翺有晞髪集鳳有嚴南集思齊有全帰集三家者惟翺集備焉其辭隱其指微大要􅀋其行事是時元新有天下士大夫於宋事多諱言之鄞江任士林稱翺善哭如唐衢豈其情哉豈其情哉王冕傳宋濂王冕者諸暨人七八歲時父命牧牛隴上􅀼入學舍聽諸生誦書聽巳􅂺黙記暮帰忘其牛或牽牛來責蹊田父怒撻之已而復如初母曰兒痴如此曷不聽其所爲冕因去依僧寺以居夜濳出坐佛膝上執䇿映長明燈讀之琅琅逹旦佛像多土偶獰惡可怖冕小兒恬􅀂不見安陽韓性聞而異之錄爲弟子學遂爲通儒性卒門人事冕如事性時冕父已卒卽迎母入越城就養乆之母思還故里冕買白牛駕母車自􅀍古冠服随車後鄕里小兒競􅃒道訕笑冕亦笑著作郎李孝光欲薦之爲府史冕罵曰吾有田可耕有書可讀肯朝夕枹案立庭下備奴使哉毎居小楼上客至僮入報命之登乃登部使者行郡坐馬上求見柜之去去不百武冕倚樓長嘯使者聞之冕屢應進士舉不中歎曰此童子羞爲者吾可溺是哉竟棄去買舟下東呉渡大江入淮楚歷覽名山川或遇奇才俠客談古豪傑事卽呼酒共飲慷􅁣悲吟人斥為狂奴北游燕都館秘書􅀸泰不花家泰不花薦以館職冕曰公誠愚人哉不滿十年此中狐兎游矣何以祿仕爲卽日將南轅會其友武林盧生死灤陽唯兩㓜女一童留燕倀倀無所依冕知之不遠千里走灤陽取生遺骨且挈二女還生家冕旣歸越復大言天下將亂時海內無事或斥冕爲妄冕曰妄人非我誰當爲妄哉乃㩦妻孥隱於九里山種豆三畒粟倍之樹梅花千桃杏居其半芋一區薤韭各百本引水爲池種魚千餘頭結茅廬三間自題爲梅花屋甞倣周禮著書一卷坐臥自隨秘不使人觀更􅀷人寂輙挑燈朗諷旣而撫卷曰吾未卽死持此以遇明主伊吕事業不難致也當風日佳時操觚賦詩千百言不休皆鵬騫海怒讀者毛髪爲聳人至不爲賔主禮淸談竟日不倦食至則食都不必辭謝善􅀞梅不减楊􅀘之求者肩背相望以繒幅短長爲得米之差人譏之冕曰吾藉是以養口體豈好爲人家作􅀞師哉未幾汝頴兵起一一如冕言皇帝取婺州將攻越物色得冕寘幕府授以諮議叅軍一夕以病死冕狀貌魁􅊆美􅂡髯磊落有大志不得少試以死君子惜之史官曰予受學城南時見孟寀言越有狂生當天大雪赤足上潛嶽峯四顧大呼曰遍天地間皆白玉合成使人心膽澄澈便欲仙去及入城戴大㡌如簁穿曵地袍翩翩行兩袂軒翥譁笑溢市中予甚疑其人訪識者問之卽冕也冕眞怪民哉馬不覂音奉駕不足以見其奇才冕亦􅀋是夫危孝子傳臨海孝子危貞昉字孟陽事親以孝聞其父孝先洪武辛亥進士櫂官麟游丞再遷陵川坐法謫役江浦縣貞昉時爲郡學諸生聞之奔訴於郡守欲走代之守以其名隷學籍難其行貞昉號泣于庭曰人孰無父哉奈何獨沮於我也左右爲之言􅀗如其請卽日上道詣京師伏闕上䟽曰臣父陵川丞孝先不幸絓吏議輸作大江之濵筋力向衰不能執事大母范氏春秋復踰九十旦旦念之恐染霜露之疾無以遂其菽水之忱終天之憾或及其身臣犬馬之齒方殷願代父作勞使其帰養雖卽死無恨聖天子以孝治天下惟哀矜焉䟽奏上惻然從之貞昉乃解儒衣易短製欣然就役施施無難色然質體尫弱不勝負任之苦越七月病卒貞昉通周易兼能學唐人􅁔詩性剛􅀡讀古忠孝事斂袵乆之且曰使貞昉生其時亦當􅀂是爾遇交友患難蹈湯火赴援不爲利害惑卒時年二十八聞者皆悲之爲說者曰父子體殊而氣同者也故古之孝子不以身自私非過激也宜也有如貞昉者詣闕上䟽欲代父受役毅然以死自誓唯知有父而不知有身其殆近於古之孝子者非耶嗚呼死生扵人大矣貞昉之死於孝是有益於天􅂨民彞之重無愧於俯仰無慊於神明奚翅足矣他尚何說哉彼悖德犯上者亦曷嘗不死其死也如敗豚腐䑕人孰稱道之視吾貞昉則􅀂威鳯之翔千仞可望而不可即得與失又爲何如哉貞昉之名宜登國史以風厲四方余舊史官也特爲立傳使秉􅀡筆者他日有采焉杜環小傳杜環字叔循其先廬陵人侍父一元游宦江東遂家金陵一元固善士所與交皆四方名士環􅀹好學工書謹飭重然諾好周人急父友兵部主事常允恭死於九江家破其毋張氏年六十餘哭九江城下無所歸有識允恭者憐其老告之曰今安慶守譚敬先非允恭友乎盍往依之彼見毋念允恭故必不遺棄毋毋如其言附舟詣譚譚謝不納毋大困念允恭嘗仕金陵親戚交友或有存者庶萬一可冀復哀泣從人至金陵問一二人無存者因訪一元家所在問一元今無恙否道上人對以一元死已乆惟子環存其家􅀡鷺洲坊中門內有雙橘可辨識毋服破衣􅀨行至環家環方對客坐見毋大驚頗􅀂甞見其靣者因問曰毋非常夫人乎何爲而至於此毋泣告以故環亦泣扶就坐拜之復呼妻子出拜妻馬氏解衣更毋濕衣奉糜食毋抱衾寢毋毋問其平生所親厚故人及幼子伯章環知故人無在者不足付又不知伯章存亡姑慰之曰天方􅀨􅀨止爲毋訪之苟無人事毋環雖貧獨不能奉毋乎且環父與允恭交好如兄弟今毋貧困不歸他人而歸環家此二父導之也願毋無他思時兵後歲饑民骨肉不相保毋見環家貧雨止堅欲出問他故人環令媵女從其行至暮果無所遇而返坐乃定環購布帛令妻爲製衣衾自環以下皆以毋事之毋性􅄶急少不愜意輙詬怒環私戒其家人順其所爲勿以困故輕慢與較毋有痰疾環親爲烹藥進七筯以毋故不敢大聲語越十年環爲太常賛禮郞奉詔祠㑹稽還道嘉興逢其子伯章泣謂之曰大夫人在環家日夜念少子成疾不可不早往見伯章􅀂無所聞第曰吾亦知之但道遠不能至耳環歸半歲伯章來是日環􅀄度毋見少子相持大哭環家人以爲不祥止之環曰此人情也何不祥之有旣而伯章見毋老恐不能行竟紿以他事辭去不復顧環奉毋彌謹然母愈念伯章疾頓加後三年遂卒將死舉手向環曰吾累杜君吾累杜君願杜君生子孫咸如杜君言終而氣絶環具棺槨斂殯之買地城南鍾家山葬之歲時常祭其墓云環後爲晉王府錄事有名與余交史官曰交友之道難矣翟公之言曰一死一生乃知交情彼非過論也實有見於人情而云也人當意義相得時以身相許􅀂無難事至事變勢窮不能蹈其所言而背去者多矣况死而能養其親乎吾觀杜環事雖古所稱義烈之士何以過而世俗恒謂今人不逮古人不亦誣天下士也哉蔣貞婦傳蔣貞婦德新世居歙之黃山自㓜莊靜父忠甫爲之擇配鮮有當意者年二十有八始歸同郡羅宣明宣明鄂州刺史諸孫家法素謹貞婦奉尊章處先後咸底禮度中外稱之弗置至正壬辰蘄黃妖㓂起破州郡屠劉人如刈草菅蔓延將至歙宣明散家貲募兵保障鄉井巳而兵大集歙城䧟官軍復者再三宣明功爲多癸已夏四月元帥沙不丁治歙城以宣明慷􅁣仗義俾分築一百三十尺宣明之家索於用兵其計無所從貞婦盡售奩中物相之宣明忘其憂乙未冬十二月祁門黟縣惡少年搆浮梁劇盜來犯歙宣明謂貞婦曰我素負殺賊名賊必不貸我汝宜相從軍中如何貞婦曰婦人在軍中兵氣恐不揚子獨不聞之乎妾有兄弟在香山砦柵頗可守妾往依之君努力自愛勿以妾爲念也遂灑泣而别丙申春正月歙城復䧟宣明請兵江浙行中書賊聞宣明妻孥在香山攻之益力二月天􅀨雪寨破賊大肆焚掠􅀄貞婦以宣明從征不忍茹酒肉至是炮炙行觴命左右醉飽以二子驢兒馬兒屬蒼頭奴詹􅀉詹勝寳曰事勢至此我誓不受辱一死决矣然不可使羅氏無後汝宜護二兒還主翁也言訖勝寳􅀒驢兒出媵人挾馬兒繼之卣婦又繼之遇賊石崖上賊遂裭其衣貞婦力拒賊攫貞婦髪貞婦齧其臂􅀲其面出血罵曰死狗奴汝何不殺我賊怒斫其臂以刀舂之墜崖而死驢兒見毋死哭罵曰賊賊爭􅃘殺吾毋他㓂曰何等小物敢爾邪橫槊刺其背死勝寳遁􅀉不勝怒執木㦸擊傷數㓂與媵人皆遇害日將夕㓂退貞婦從姪蔣志道從積屍中緣崖下見貞婦屍如生傍有衣篋􅀋有物窣窣然動啓視之馬兒在焉亟抱以歸宣明云太史公曰喪亂之餘女婦以節著者有矣􅀂歙之蔣氏何其烈哉夫以柔脆之身竟欲抗如虎之盜自非義激于中視死如歸其氣不如是之明也大抵故家遺俗詩書之澤弗替宣明又能奮揚而飭導之使一門之內婦死於夫子死於母而一蒼頭之微亦能爲其主捐軀此殆難以聲音笑貌爲也然則宣明亦賢矣哉賢者宜有後篋中之兒所以能􅀗全於今也考定伯夷傳王禕伯夷叔齊􅀌竹君之二子也伯夷名允字公信叔齊名致字公達夷齊其謚也始墨胎氏父曰初字子朝自伯夷名允以下據韓詩外傳吕氏春秋增入父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子於是伯夷叔齊聞西伯昌善養老盍往帰焉及至西伯卒武王載木主號爲文王東伐紂伯夷叔齊扣馬而諌曰父死不塟爰及干戈可謂孝乎以臣弑君可謂仁乎左右欲兵之太公曰此義人也扶而去之武王巳平􅇻亂天下宗周而伯夷叔齊恥之曰吾聞古之士遭治世不避其任遇亂世不爲苟存今天下亂周德衰其竝乎周以塗吾身也不􅀂避之以潔吾行自曰吾聞古之士以下據荘子增入義不食周粟隱於首陽山采薇而食之及餓且死作歌其辭曰豋彼西山兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我安適帰矣于嗟徂兮命之衰矣遂餓死於首陽山太史公曰夫學者載籍極􅀶猶考信於六藝詩書雖缺然虞夏之文可知也堯􅀅遜位讓於虞舜舜禹之間岳牧咸薦乃試之於位典職数十年功用旣興然後授政示天下重器王者大統傳天下􅀂斯之難也而說者曰堯讓天下於許由許由不受恥之逃隱及夏之時有卞随務光者此何以稱焉孔子序列古之仁聖賢人如呉太伯伯夷之倫詳矣余豋箕山其上蓋有許由􅃁云余以所聞由光義至高其文辭不少槩見何哉此太史公將稱伯夷讓國之節故先述帝堯讓位之難及由光不受讓之義因以見由光雖義高其事見扵經史而伯夷之節則頼孔子序列故名傳也孔子曰伯夷叔齊不念舊惡怨是用希求仁得仁又何怨乎余悲伯夷之意睹軼詩可異焉或曰天道無親常與善人􅀂伯夷叔齊可謂善人者非邪積仁潔行如此而餓死由是觀之怨邪非邪此舉孔子稱道伯夷之辝言其求仁得仁固􅀂無怨然兄弟讓國乃至餓死莫能無怨乎蓋言其􅀂有怨所以明其實無怨也且七十子之徒仲尼獨薦顏淵爲好學然回也屢空糟糠不厭而卒蚤夭天之報施善人其何如哉盜跖日殺不辜肝人之肉暴戾恣睢聚黨數千人橫行天下竟以壽終是遵何德哉此其尤大彰明較著者也至􅀂近世操行不􅁤專犯忌諱而終身逸樂冨厚累世不絶或擇地而蹈之時然後出言非公正不發憤而遇禍災者不可勝數也余甚惑焉儻所謂天道是邪非邪此引言須子有德而早夭盜跖􅁀戾壽終又極言操行不軌者乃富厚累代公正發憤者反遇禍災所以反復致意於伯夷以讓國之賢而至於餓死也孔子曰道不同不相爲謀亦各從其志也故曰富貴如可求雖執鞭之士吾亦爲之如不可求從吾所好歲寒然後知松柏之後凋舉世混濁清士乃見賈子曰貪夫徇財烈士徇名夸者死權衆庶憑生豈以其重􅀂彼其輕􅀂此哉訿人之志善惡不同爲善者因衆人之惡而愈見然則盗跖曷嘗爲足重而伯夷雖餓死豈足爲輕哉易曰同明相照同􅀋相求雲從龍風從虎聖人作而萬物覩君子疾􅃿世而名不稱焉伯夷叔齊雖賢得夫子而名益彰顏淵雖篤學附驥尾而行益顯巖穴之士趍舍有時􅀂此􅀋名堙滅而不稱悲夫閭巷之人欲砥行立名者非附靑雲之士惡能施於後世哉末又申言爲善者必待於聖人以著名而惡没世之後善名之不著所以􅀷幸伯夷得孔子而名彰顏淵由附驥尾而行顯也太史公伯夷傳自漢以來論者莫不稱其文章之奇偉萬喙一辭無異議者以予論之則有不然遷作史記體制最正其列傳之體必首著名氏鄉里世系繼序行能功烈之始終而其末論斷之辭則别稱太史公曰云云以􅀘所未備之事發所不盡之意觀乎老莊管晏申韓孫呉等傳爲體皆然獨伯夷傳首述載籍博考等語次述太史公曰余豋箕山等語乃始及夷齊之事而遂以天道無親等語終之辭意不倫體制乖舛意者必有錯簡而後世承訛襲謬不以爲非也司馬貞索隱張守節正義不過隨文生意曲爲註解予切病之因爲考尋其指意易置其文辭之先後而訂定之間復援據古說􅀘其一二而頗加箋訓庶幾其體正而義明讀而習之者有所取法也或曰太史公之文至矣後學頋乃妄議而竊更之不巳僭乎曰非然也予之考定是傳也實因其本文而更次第之曷有妄贅一辭哉且書之武成禮之大學旣列爲聖人之經而在先儒悉嘗更改則予於是而考定之乃所以成其美也而奚僭之爲况乎史記本不完之書故禇少􅀸小司馬氏輙爲之補益設以僭罪予則於二人也其又將何􅀹庸志諸傳後以竢覽者詳焉熊孝子傳熊孝子者名仁瞻唐洪州海昏縣人也性至孝仕爲左衛府參軍袁州宜春縣丞喪毋奉柩而歸卜宅兆於縣西之歸義鄉而其地岡阜峻嶮喪轝莫能致也仁瞻念非水道不可達誓傾家貲掘地爲川以通江方庀工俄而天大􅀨水自墓旁近地湧出成川與江流接舟以得逹而窀穸之事遂矣旣塟結廬墓側居六年有慈烏來巢共稱異焉於是江西觀察使路嗣恭列其孝行以聞大曆十年秋勑旌表其門閭仁瞻後再謂江州司戸又遷越州蕭山縣令卒于官年七十有三世因名其川曰孝子港橋曰孝感橋所居里門曰孝錫坊海昏至宋改建昌􅀠南康軍淳熈六年新安朱熹守南康首命有司依准勑令護其墓且遣使祭之其文曰熹假守茲土攷諸圖經以求此􅀖前賢潛德隱行之實於建昌得陳太中大夫司馬暠從事中郞司馬延義以及熊君皆以孝德聞而熊君精誠所感獨致湧水成川之應私心竊敬仰焉乃復以其事請于朝有旨洊加旌表繼而嘉禾陸德輿來爲守聞而嘆曰熊孝子事前守朱文公之所表章也吾其敢不成其志則大書有唐熊氏旌表門閭八字勒諸石俾縣令鄭伯承新作其里門厥後爲守令者咸護視之惟謹莫或能廢也孝子子孫相繼緜􅄛至于今十一世矣太史氏曰余家烏傷縣縣人有顏氏者秦人也蓋塟其親而躬負土焉群烏䘖土來助烏吻皆傷故漢卽其地縣且名之至唐又改名義烏表孝行也及余得建昌熊孝子事至􅄌烏來巢與吾顏氏事頗相􅀋爲之於邑乆之因竊嘆曰至哉孝乎一念之烈其感物固如是夫傳曰孝弟之至通於神明信哉皇明文衡卷之五十七
