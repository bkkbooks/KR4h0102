front:
  text: 皇明文衡卷之七十九
  hash: sha256:89725be73a2dc2e3d2e6ce2d71a84e4affcb65b272a3f9a01029236c54283b3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_079-1a}
body:
  text: 神道碑榮祿大夫太子太保吏部尚書贈時進光祿大夫太保謚忠肅王公神道碑彭時公諱翶字九臯姓王氏其先世家欒州自公之父避元季兵亂徙居滄州之鹽山故今爲鹽山人公生有異徴氣清質秀甫十歳能讀書父卽勉以仕進克自勤勵學遂有成永樂乙未登陳循榜進士第二甲第一名改庶吉士甲辰授大理寺左持正因詿誤左遷行人宣德丙午用廬陵楊文貞薦陞行在山東道監察御史當是時任風紀者多事矯激惟公謹重逹大體上下賢之乙卯陞都察院右僉都御史正統丙辰奉勑鎭守江西政不苛刻吏民畏愛未幾徃浙江除土豪理鹽法能聲大著巳未四川松潘畨賊爲患命將往征以公叅賛軍務公欲懷以恩信有來降者卽以所賜白金寳楮易牛酒犒之畨酋商巴感悅率生畨來歸受約束者一十八寨邊境以寧辛酉出鎭陜西飭兵備壬戌往遼東提督軍務時遼東守將屢失機朝廷以爲特簡任公且授以便宜之權公至守將以下庭參公詰責玩㓂失機故將斬之得其再三哀請乃已於是官軍咸股慄莫敢不用命逾月躬出巡邊治障塞嚴斥候仍簡閱戍卒更老弱賑貧窮配鰥寡俾成室家人人感激其治訴訟專行贖罪法雖人命亦然曰償命無益死者之家而財或足以濟其用故行之不疑有指揮孫璟者因漏􅀜鞭戍卒至死其妻女哭之相繼死他卒􅀍鞭者訴璟殺一家三人公判曰甲死以罪妻女死于夫非殺也其令璟償葬埋費璟後爲􅀅有名非公優容不及此癸亥陞左副都御史丁卯率師出境破虜有功陞右都御史巳巳陞左都御史是年秋虜酋也先分衆㓂廣寧公下令堅壁清野以困之賊乃遁去公在遼東十數年勤訓練廣儲蓄食足兵强爲諸邊最其抜用將校如施聚焦禮輩皆以勇畧知名亦非他邊所有也綏懷東夷女􅀡恩威兩盡往來朝貢者無不惕威而感德景㤗壬申召理都察院事尋加太子太保㑹廣東西賊㓂擾攘兩鎭將官互相觀望不卽捕朝廷命公總督兩廣軍務公至推誠撫諭蠻夷向化者多思恩知府岑瑛土官也屢有勞效或疑其反側公令瑛領兵屯桂林聽調人言乃息其他土官有爭職者公度勢量情予奪得宜人心帖服癸酉少傅王文端公以淸德雅望居吏部年且老矣朝廷思得剛明果斷者以濟之乃召公還命以太子太保兼吏部尚書士夫以得人相慶乙亥公年踰七十乞致仕不允巳而乞歸展省又不允命有司爲公起第于縣郭西蓋以慰安其心也公掌銓衡孑孑持公道進退人才必察其實而於抑僥倖杜請託􅀹嚴選法爲之一淸天順丁丑英宗復位罷舊宮僚公上䟽乞致仕南陽李文逹公言於上曰王翺廉謹老成吏部非此人不可乃不聽其去任用益篤巳而文逹被䜛黜公力言其淳實可用以故文逹復被寵任焉當是時上眷遇公加隆特官其子國子生竚爲錦衣衛副千戸而賞賚以金玉束帶錦繡衣服銀幣玩器等物歳無虚月屢召與近臣同遊西苑南城及扈從獵近郊燕賜優渥一時擢用廷臣惟公言聽有岀他人薦者亦必待公而後决也毎召見便殿訪問從容呼以老王而不名其見敬禮如此辛巳秋加太子少保甲申今上嗣位賜銀五十兩鈔五千緡是冬命遇􅀨雪免朝叅乙酉春復加太子太保公年雖高精力如少壯人然無歲不引年致仕皆􅂪優詞褒答勉留不果行丁亥公有疾上命中貴挾御醫往視幷致白粲上尊之賜七月疾益篤其請益懇切上不得巳允之居數日遣中貴齎賜勑諭幷金織衣一襲銀三十兩鈔三千緡時巳不能就道至十一月六日卒于京邸距其生洪武甲子二月十二日享年八十有四上聞訃嗟悼贈特進光祿大夫太保謚忠肅遣官諭祭營墳給驛送還其鄉以卒之明年五月初二日葬于㡌架圈之原曾祖進昌祖大老父得林俱贈榮祿大夫大子太保吏部尚書曾祖妣徐祖妣劉妣張俱夫人配宋氏先公二十三年卒累贈夫人次張氏亦先卒子男一卽竚也女一適河南參政賈傑孫男二長田次疄國子生女二曾孫男女二公天資仁厚操履端方居官涖政謹䋲墨蹈䂓矩一毫不苟且其待人外􅀂毅而中實寛利好惡所加善者悅而惡者不怨論事語簡而質是是非非碓乎其不可易持巳廉潔無私而自奉甚儉薄自􅀄仕勤勞于外與晚處廟堂皆然未嘗以壯年異其心蓋年愈高而志愈勤守愈約忠君愛國之誠愈篤而不懈眞厚德君子也跡其所以享盛福榮名無愧於古之大臣者其在此歟大宗伯姚公􅃺公行詳且實矣公子竚欲刻石置于神道請予文之予素敬重公苟可以焯德信後義奚容辭惜乎文不足以旣其實也銘曰有美王氏世居于灤積善秉義隱處是安避兵鹽山遂定厥家再傳而顯揭德振華其振伊何自公特起降誕之祥虹光兆異乃勵儒業乃第科名洊歷顯位駿望鏗鍧公出四方憲度清肅弊革利興兵民攸服其在中朝恪秉銓衡賢才彚進治道乃成公何能然惟德之進惟公惟廉惟勤惟愼公以接物䋲􅀡凖平廉以律已玉潔水淸勤以涖事夜寐夙興愼以存心晨惕夕兢祗事五朝始終􅀂一爲國元老爲士矜式官躋一品壽踰八旬推今較古如公幾人公今往矣疇不嗟悼匪私于公惟徳是好渤海故郡高墳峩峩於乎忠肅千載不磨姚文敏公神道碑惟姚氏系岀有虞其先家汴梁宋南渡徙居桐廬世傳詩禮多知名士而未甚貴顯貴顯自公始公諱䕫字大章損菴其别號也生一歲而孤性資頴異克志于學十三遊邑庠博通經史爲文雄徤有奇氣正統戊午以春秋舉浙江鄉試第一會試辭乙榜入太學祭酒李公時勉司業趙公婉一見器重之少保楊公溥聞名且遣子壻從學而公不自滿復遊鎦忠愍公之門請益士大失莫不高其志壬戌會試中第一與從弟龍俱登進士人榮耀焉癸亥擢吏科給事中首以脩德舉賢選風憲立謚法等八事爲言多見採納甲子夏旱奉命祀北鎭􅀨應期至丙寅持節開封晉府徐溝等王未還而母夫人卒公以不及奉湯藥爲恨號慟幾絶葬祭一以禮己巳服闋復舊任是秋英廟北狩國勢危疑大臣勸進郕王議未决詢諸六科公曰社稷大計爲大臣者當任之而詢諸小官何邪事乃定十月虜騎犯京城禁兵出戰未大捷公請遣勑召邊將楊洪等領勁騎入援虜聞一夕遁去景㤗庚午廷臣薦公才堪大任陞南京刑部右侍郞振舉廢墜刑獄以淸壬申改南京禮部奉使雲南考察官吏癸酉還朝留任禮部丁丑正月景㤗不豫尚書胡公濙在告公强之出率文武群臣問安且請復立皇太子正位東宮䟽成未上而英廟已從石亨等請出復位矣亨因挾私弄權軒輊大臣而進退之調公南京刑部巳而有言公才者英廟悟驛召至京轉禮部左侍郎賜二品服戊寅調吏部時王公翶爲􅃁宰選用人才資公爲多癸未遷禮部尚書先是典禮者未愜人望公任之奏對從容儀度閒雅英廟喜曰禮官眞得人矣甲申今上嗣位公賛襄大禮中節合宜首開經筵命公侍列有白金文綺寳楮之賜乙酉成化紀元上畊籍田幸大學悉從公請而行禮成宴賜有加公甞云輔政當謹諸始丙戌秋率群臣上封事有思艱難崇節儉謹名爵戒逸欲之言上欣然嘉納勉諭甚至丁亥正月賜金織麒麟文綺戊子復率群臣上䟽言皇上春秋鼎盛而震位尚虚宜均愛六宮以繁子嗣服食言動宜悉遵祖宗舊制言激切有感動意是秋􅄌懿皇太后崩卜異葬內閣執不可公率群臣覆奏詞嚴而義正於是合葬祔廟之禮以成公在禮部所知貢舉僥倖止息凡遇災異必引咎辭職䟽上輙蒙慰留復乃乞祭先塋上曰卿老成當朝夕輔朕未可言私於是衆知朝廷倚重公者至矣尋轉吏部尚書寔已丑六月也公釐正銓法務愜輿論品藻人物必得其情至於方靣轉遷亦必以序有欲撓之者卒不變辛卯秋通前秩滿九載加太子少保遣中官賜年酒寳楮以示奨勞是冬彗出軒轅公上䟽反覆諷諌冀有感悟壬辰南方大風雨水溢公䟽言自前歳彗星示變以來四方漸覺多故自古禍亂常起於灾傷饑饉之餘毋謂天道姑息有象無應只圖因循便安於目前也因再上䟽乞歸田不允憂形于色疾遂作上命太醫朝夕軫視仍遣中官賜羊酒米􅂼臨問比卒上震悼賜賻鈔萬緡遣禮部尚書鄒幹諭祭贈榮祿太夫少保謚文敏命工部造墳兵部具舟歸其喪所以賁終之典厚矣公丰神秀朗氣度宏偉言論侃侃達大體居官涖政精敏踰人抜擢人才無間新故有以嫌疑騰謗者公不與辯亦不爲之變節隱然如㤗山喬嶽不可動搖立朝三十餘年憂國憫民恒存念慮事有可爲必勇爲之惟恐巳後人先毎廷議大政大事正色昌言人皆悦服一時大臣詞氣慷􅁣才識高邁未有出公右者識者謂公可屬大事如周勃善應變成務如姚崇世以爲知言公所爲文豪宕富贍似其爲人所存䖃矗堆稿一十卷其四書本經義學者式之公生永樂甲午十二月十七日卒成化癸巳二月九日享年六十曾祖鼎祖伯華父惟善有隱德以公貴始贈父徴仕郎吏科給事中後累贈父及祖俱資政大夫禮部尚書祖妣楊妣申屠累贈夫人配王氏內助賢能累封夫人子男三璧甲申進士兵部郎中璽國子生瑩女四一適鄉貢士呉春先卒一適國子生陸埈餘未行其長男女四人俱王岀㓜者俱側室金出孫男三敏敬敔女二璧扶柩南還以卒之明年閠六月二十五日塟于邑金牛山之原立石神道來徵予文予以疾固辭而請益堅顧予與公同朝乆相知爲最􅀷自公之逝予悼惜􅀹至豈可終無一言以副孝子之心哉乃爲采摭誌狀序次如右繫之銘曰山川間氣生名賢才高意廣氣浩然讀書下筆文湧泉科名屢占多士先拜官禁近拱御筵羽儀燦爛孤鳯騫時乎景㤗天順間兩京三品看屢遷雲龍風虎會當年文昌高朗凌台􅄤仰輔天皇司化權四方英俊歸陶甄公於是時任調元溜􅀷負重如山淵忠言讜論累百篇致君欲過堯舜前心勤事左思歸田終情未遂殊憂煎翻然長往不少延六十甲子繼周天四海蒼生嗟棄捐百身莫贖有涙漣我皇聞訃誠哀憐贈官錫謚恩禮全英􅂕歸塟桐江堧金牛山色開雲煙隧碑巍峩澤且堅神􅀛贔屭螭盤旋焯德有辭可細􅒢芳名耿耿百世傳侍郞葉文莊公神道碑公諱盛字與中姓葉世爲呉郡崑山人五世祖秀實惇重好義元季有暴僧聚徙事焚刧爲鄉里害秀實卽圖上其事于官捕斬之時稱爲葉義士曾祖茂林妣朱氏祖明贈通議大夫吏部右侍郎妣郭氏贈淑人考春封兵科都給事中贈山西右叅政加贈通議大夫吏部右侍郎前母湯母陳俱贈淑人繼母沈封太淑人公天資穎異自少博學强記下筆驚人同邑知名士張和見其所業文曰此其志不可量因勸游邑庠遂駸駸有成矣正統十年舉進士授兵科給事中毅然以言責自任十四年英皇北狩郕王監國公率同列劾將臣扈從者失律敗事請誅夷之以謝天下然後選將練兵以復不共戴天之讐興師問罪以除大逆不廷之賊如此則大綱以正大義以明而聖駕之旋軫可期矣聞者壯之九月監國卽位頒賞廷臣公以時艱辭不許十月京城戒嚴公請罷内府軍匠悉遣征操及虜􅀐近城又請令有司熟糧料以給戰士遣散卒迎取軍器于天津以張外援四三日間凡七八䟽悉合機宜虜旣退公言賞功罰罪治天下要務今日之賞罰旣行他日之勸懲攸繫賞罰明信則人人力於事功恥無不雪讐無不復矣今効勞如孫鏜死事如謝澤韓青皆當賞以示勸其他守關不嚴赴難不力者皆當罰以示懲從之十一月陞都給事中時邊境未寧大臣有奏留邊將守京師者公言今日之事􅁁關爲急往者獨石馬營不棄則六師何以䧟土木紫荆白羊不破則虜騎何以薄都城卽此而觀邊關不固則京師雖守不過僅保九門無事而巳其如陵寢何其如郊廟壇壝何其如田里之民荼毒何宜急遣固守宣府居庸爲便巳而河南陳州流民扇動命公往視公卽兼程以進除貪虐賑饑寒威惠並行民用安輯景㤗元年春還復上言京城爲天下根本而八府旱蝗相仍加以虜㓂侵擾民不聊生乞議寛恤俾安生理不然臣不能不爲社稷憂也八月北虜送駕還京將入關矣有隱名具帖言迎復事者大臣見之顧忌不敢舉公曰此野人無情之言逹于上感動必矣或沮以匿名書公不頋具䟽言之有旨令尚書胡濙封進帖雖留中而正論有不泯焉是冬公以北虜南蠻爲患不巳上䟽請令中外文武要職各陳安邊濟時之䇿二年六月天象示異公又條陳弭災防患十二事以上及聞禁中頗事遊畋又請舉行祖宗午朝故事公當多事之秋遇事輙形于䟽毎䟽不下百千言而大要則以扶忠􅀡抑姦佞恤生民禦外患爲主其有禆於時政爲多三年遷山西布政司右叅政監督宣府糧餉尋命恊賛獨石等處軍務先是獨石馬營八城遇虜失守殘毁未復公列其利害可興革者爲八條以進次第罷行之八城旣復乃立社學以教子弟置醫藥以濟疾病立義塜以􅄟死亡設暖鋪以便行旅均􅂼圃以給將士制度品式纎悉備具而又請官銀五千兩買牛千餘頭摘戍卒不任戰者俾事耕稼歳課餘糧于官凡軍中買馬除器勞功恤貧諸費皆於是乎取給自是邊人歡洽歲亦屢登有嘉禾同穎之祥七年冬以外艱去八城之人如失父母連章乞留而公固辭不可天順二年英宗皇帝嘉其能驛召至京靣加奬諭尋擢都察院右僉都御史巡撫兩廣公乞終制不允至廣興利革弊􅀹盡厥心舊例廣東盬課不出境歳乆盬積商困往往賂守關津者越過廣西市利公以爲聽之則法壞而利歸于商禁之則商滯而利歸于關津乃請許鹽商計鹽多寡入米餉邊而後岀境於是公私兩利焉時廣西流賊多入廣東爲害而兩廣守將頡頏自異是以討賊不成功公請革兩廣正將立總鎭于梧州居中調度則賊可平矣衆韙其䇿而不果行公不得巳請益兵英宗乃命都督顔彪率兵赴之公與彪恊議破賊砦八百所擒斬數萬人而還或又以殺降謗之而不知實積年反復之賊也天順八年今上嗣位陞公左僉都御史巡撫宣府脩復官牛官田之法墾田益廣積糧益多以其餘歲易􅀘戰馬千八百餘匹其屯堡廢缺者力脩築之不數月完七百餘所兵民始雖怨之旣而恃以無恐乃欣戴焉在宣府屢有建白且請行養老之令于邊褒恤巳往賢臣爲方來勸上嘉納之成化三年陞禮部右侍郎五年改任吏部是冬持節封瀋府稷山王六年畿内大饑命公巡視眞定保定二府賑恤貧困綏輯流亡旣還復命賑濟京民之饑者全活甚衆八年北虜出沒河套爲西邊患有言增兵守險者有言大舉搜套驅岀河外沿河築城堡抵東勝徙民耕守其中者公受命往議方略奏言搜河套復東勝此皆事勢所難不敢妄意惟增兵守險可爲遠圖宜令守臣剷削邊墻增築城堡收新軍以實邊選土兵以助守此不但可責近效而亦足爲長便也上是其言九年轉左侍郎公自入佐部政毎議禮用人從容賛决其間僚長敬信司屬悅服焉至􅀂事非部分而關當時利害繫生民休戚者遇諸卿必相辨正因而助益者不少一曰坐後堂署事忽疾作不能言輿歸西第而卒實甲午三月八日也享年五十有五上聞􅀷悼惜之賜􅐠鈔三千緡謚爲文莊遣官諭祭營塟以明年二月十七日塟于邑之積善郷湓瀆之原公爲人温雅簡重崇道誼尚名節言動思􅉥古人居家惇孝友涖官清愼勤恪設施不苟與僚友論事不激不隨而言色自若其取人先行檢而後才藝然存心寛厚終不及人之過惡所寓門無雜客公退手不釋卷考古辨疑殆忘寢食而於世俗聲色財利之好澹然不以經心平生爲文師歐陽而功業自期於韓范以范公爲鄉先正􅀹景慕焉惜乎大用未究而卒所著詩文奏議總若干卷藏于家公凡再娶先金氏贈淑人繼耿氏刑部尚書耿清惠公之女封淑人子男一晨􅀘國子生娶副使張和女女三人一適貢士虞臣一許夏景澄一尚㓜公之卒也晨不在側􅃁宰尹公旻率僚屬經紀其喪事旣又狀公行畀晨晨奉以徴予文且曰先父雅愛先生言幸勿辭而公內弟司業耿君􅁉又申其意以請因摭狀言著其槩系之銘曰古稱才難今世尚然彼長此短用各一偏優於政矣其文叵傳文或工矣政譽弗宣達觀于世百靡一全而公兼之寧不爲賢惟公問學有本有原公之操􅂂金石其堅淸文逹識自視無前檢身約巳猶恐或愆􅆒歷中外逾三十年忠君愛民心實勤拳言惟婉切用適方圓惠浹于民威行于邊緬懷鄉衮我其隨肩謀謨事業期著後先何志之遠而去之遄位不滿德繫命于天墓門有碑德烈是􅒢於乎文莊百世不諼皇明文衡卷之七十九
