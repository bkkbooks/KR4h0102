body:
  text: 題䟦䟦東坡尺牘後趙汸宋禮部尚書贈太師東坡蘇公忠義貫日月名聲塞宇宙盖千載一人也妙齡豋高科思以文學經濟如賈太傅陸宣公中歳偃蹇不偶留心佛乘交友禪伯如白樂天柳子厚晚節播遷嶺海遂欲隂學長年超然遐舉如安期生梅子眞此公乎生學術三變見於手筆書䟽者具有本末也􅀂夫文章妙天下特其餘事傳周易尚書觧論語亦愽洽之及爾要非志氣所存然公嘗有曰膠西多古君子使蓋公真徃來其間軾何足以見之與荅陸子厚書所論黄高人之意適同噫內聖外王之道不明而豪傑之士不能忘情於方外者如此然則世人所求於公者殆其粃糠土苴耳至正巳丑秋過倪氏黟川寓居敬書此于其所􅀚東坡尺牘後書所編李文公集篇目後李文公集十有八卷凡百四篇江浙行省叅政趙郡蘇公所蔵本某旣從公傳冩復緫其篇目如上始汸見歐陽公論文每稱韓李其讀幽懐賦恨不得與之同時上下其議論而老泉蘇公亦謂李文其味黯然以􅀷其光油然以幽自是每欲求其集􅀚之不可得所得者文苑英華中數篇而巳旣又見豫章黃公謂皇祖實録文如女有正色又子朱子論復性書雖病减情之㫖岀於釋氏而亦善其有如此思慮益以不覩全集爲憾至是廼請於公而得之甚慰也公名翶字習之中進士第元和間爲史舘修撰䟽言旣以武功定海內當革敝事復高祖太宗舊制用文德興太平不然恐大功之後逸欲易生因條上正本六事憲宗不能用後遷禮部郞中面折宰相李逢吉過失移病去雅好推轂賢士韓文公嘗書與之云於賢者汲汲惟公與不材爾其復書以爲韓公雖好士惟其有文章兼附已者無所愛惜或不能然則不肯薦拔與巳不同又嘗以書責裴􅀳公居相位道不行忍耻內愧不能引退其於師友及知巳厚者骨鯁無諱忌如此則視逢吉軰何所憚而唐史乃言由不得顯仕怫欝無所發面斥逢吉旣斥之又自懼而去其言抵捂非事實甚明昔人謂韓公於學莫如文章於德莫如好直而習之文行庻㡬似焉則以韓謚名而韓李並稱可無愧矣叅政公將刻梓以廣其傳於學者故汸竊著其爲人大畧且非排史氏之妄以明歐陽公爲知言云讀貨殖傳貨殖傳當與平凖書叅㸔平凖書是饑人臣横歛以佐人主之欲貨殖傳是饑人主好貨使四方皆變其舊俗趨利書首言漢興接秦之弊高祖重本抑末輕徭薄賦故文景之世國家無事百姓給足府庫􅂶實人人自愛而重犯法後面序武帝事節節與前相反至賛論始推唐虞三代以來而舉戰國秦皇功利之禍爲證則武帝不能法祖宗之仁厚而蹈始皇之覆轍不待譏議而可見學者先讀此賛而後讀其書使先後相承則太史公之意瞭然矣􅀂貨殖傳乃此書之注脚而未有察其意者盖傳中所謂當世賢人則書中所斥不􅁤逐利之民也傳中所序陶朱公白圭軰妙於治生卽書中三人言利事析秋毫之比也傳言鄙人牧長窮鄉寡婦禮抗萬乘名顯天下宣曲任民以田畜高而人主重之卽書中言卜式以家財􅂇縣官天子尊顯之以風百姓意尤著矣盖見始皇武帝皆以好大喜功國用不足而後眷眷於此等人也傳中歴舉四方百貨所出行賈所在甚詳卽書中置大農諸官盡籠天下之利貴賣賤買所以天子無算之用皆出於此傳中言千乗之侯尚猶患貧卽書中屢言稅賦竭縣官大空是也傳中言廊廟巖宄軍士任俠攻剽女􅁎游閒吏士等皆爲財利所以深誚當世好貨之俗無貴賤也末言當國者必以竒勝而又歴數㚥事惡業賤行辱處之能致富卽書中所謂不益賦而天下用饒亦此􅀋矣循此傳之意􅀷陋爲天下國家者不當下行啇賈之事盖是當時親覩言利之人誤國害民如封禪書中所謂究􅀚方士相官之意云者故言之深切至此後人但謂子長䧟於刑法無財可贖故發憤作貨殖傳豈爲知太史哉雖然遷之言亦激矣予獨謂其書明白諄􅃨如是千百年來讀者猶未能􅀷悉其意况夫六蓺之古遠淵奥而傳注家自謂盡得經㫖可乎讀鄭䖍傳徐一䕫按鄭䖍傳鄭相如告䖍曰天寳十三年逆臣僣亂當汙僞官願守忠節相如言時開元三十年也及安禄山反䖍果䧟賊中禄山署䖍水部郞中䖍念其言稱疾求攝市令事平議罪䖍得减死論貶台州司户夫爲臣死忠理之常也䖍以相如豫告故不受僞署不然則受之邪䜟緯之學聖賢所不道宋景文撰唐書叙事嚴簡而汎及符䜟雜說非以爲訓也以著䖍之不知自守爾覧者無惑焉書宋學士所書陳思禮孝事後予讀學士宋公所書陳思禮孝事未嘗不嘆思禮至行人所不能及者陳氏四明儒家思禮甫七歳其父不幸蚤世母夫人石氏誓不他天以鞠育之夫人又以思禮陳氏獨子敎之甚嚴思禮亦克承母志力學唯謹暨弱冠石夫人與之議婚巳而夫人殁思禮創鉅痛深奮欲随母死頼親戚朋友力慰觧之乃止年二十四親戚朋友􅂆之娶思禮掩耳不荅衆迫之曰娶妻以爲養也吾親旣殁何以娶爲親戚朋友据義責之不得巳從之及期合􅈟危坐誦蓼莪之篇凡七晝夜不輟哀動人人嗚呼遠則易忘人之常情也思禮不忘其親如是可謂至矣人有恒言孝衰於妻子以思禮􅀚之豈其然哉思禮又嘗作堂爲時饗之所顏曰如在及以貢至京師入太學爲上舎生宋公及御史中丞劉公鄂省叅政陶公凡朝之大夫士咸愛重之爲􅁔詠論著甚悉予因摭學士所書孝事有合於近古所謂卓行君子所爲者表而出之云歐陽公書王彦章事古人爲文非徒然也盖必有爲而作宋至慶暦盖巳四十年不用兵矣一旦趙元昊叛兵聚西陲歴四五年而攻守之計不决歐陽公獨持用奇取勝之議朝廷不以爲然而邉將多失機㑹公以梁將王彦章之善於用奇也故於其事獨惓惓焉彦章姓王氏鄆州壽張人號王鐡槍事梁至宣義軍節度使梁􅀳交争河上之戰凡數百合彦章戰輙勝至於德勝之戰尤竒末帝時小人叚疑用事忌彦章功名唐兵攻兖州故與羸卒遂至於敗見執於唐死之歐陽公著五代史旣列彦革於死節傳而加感憤歎息其後在河北又得其家傳并􅀞像以家傳􅀘舊史之畧以􅀞像損壞重加􅀘緝且爲著􅀞像記至於德勝之戰傳旣書之􅀞像記復申言之不厭於􅃨其所以然盖致其希慕不可及之意而警發當時用兵者之不尚奇也議者以謂古之良將多矣歐陽公何獨惓惓於彦章其意盖不足於公也夫公不舉古之良將而獨舉彦章非謂古之良將不善用奇也盖舉近則人易知所謂殷􅁥不遠在夏后之世是也􅀂謂彦章事梁爲亂賊之黨而以其死爲徒知食焉不避其難之爲義則尤大非且自古亂賊莫甚於漢之莽操梁雖倔起乘唐衰而取之視莽操尤當末减且楊雄嘗事莽矣荀彧嘗事操矣彦章起自卒伍素不知書尚得而咎之哉彦章之事梁政如舅以嬖妾爲妻爲之婦者何敢不以爲姑乎苟其說行非特不知歐陽公之意有在且不知五季之世死節之臣爲不多見使彦章之忠義不曰于天下後世無以爲人臣􅂆因著于篇題唐仲友􅀘傳朱右於虖世故有誑人以理之所有君子或昧焉語曰不逆詐不億不信予讀唐仲友􅀘傳而竊有感焉􅀄仲友以乾道七年守台時朱熹提舉浙東常平仲友發粟賑飢抑姦拊弱剏中津浮梁以濟艱涉民至今頼之永康陳亮以縱横之術與仲友不相能然亦未嘗信程朱氏學也亮揆無以抑仲友乃設詭計􅀂爲歆􅃩性學者朱子遂信之行部過其家乘間爲飛言中仲友高文虎爲通判復以舊怨傾之嫉惡之心君子爲多於是朱子力擯劾仲友至六上章廷議終不决元修宋史謂仲友爲朱子所斥乃不載之簡䇿是或非朱子意歟春秋據事直書善惡自見今史官宋濂爲補此傳有㫖哉唐李泌傳賛賛曰予􅀚唐人材出處從容有三代王佐噐唯李泌陸贄而巳泌自賛復兩京功成身去代宗再徴權臣間忌浮湛外任德宗以春宮之知委心􅃪用泌亦竭智盡忠展布政體謀慮計畫洞燭物情故治效聿著述其安馬燧取懷光相李勉保韓滉單騎以來抱暉設伏以擒叛卒開三門運路屯關中荒田國用日􅂶邊鎮欇伏其績章章可紀至於辨太子􅁈則曰天子以四海爲家宰相當豫帝贈白起則曰國將興􅃪於人帝言有命則曰君相造命不可言命其言又足徴者唐傳乃謂其随時俯仰無足可稱取媚以求其位豈信史哉因采舊聞叅諸記録别著泌􅀶以表見之使善不没實爲後世鑑􅀂趣尚太清未免惑於隠怪亦其質之未純者與䟦宋平金露布文梁寅右平金露布文一通宋忠翊郞荆湖制置司屬官程君之所撰也夫宋之平金義舉也故爲露布者其理順其辭正而子孫寳藏之者足以爲忠義之􅂆或曰其時之士論以爲當金人之肆毒讐冝復也而不能復及與金和矣則讐不必復也而反欲復之是烏得爲義舉哉余以爲不然夫和非義也後反之則爲義矣且宋之安危不係於金之和不和元旣興則與金和以拒元固危也不與和而􅂇元以㓕之亦危也其危一也則寧徇於義故曰滅金義舉也程君名萬家饒之樂平寳蔵是文者君之五世孫椿字元齡湯仲謀握奇衍義䟦唐肅右握奇衍義一卷大梁湯仲謀所作也八陣之說始於握奇而推衍於孔明今魚復壘石卽風后法也但諸家所觧奇正之說不一或以天地風雲爲正龍虎烏蛇爲奇或以八陣各有奇正或以八陣爲正游兵爲奇或以天地爲旗風雲爲旛龍虎烏蛇爲陣之別或以四正四奇爲定陣而配八卦之位是皆末悟握竒之意者也湯君學愽而識明研究覃思得其㫖趣故撰爲衍義以示同志大意以奇正相半不可以天地爲合風雲龍虎烏蛇爲分而曰天衡地軸自可當八陣之半又曰孔明所衍果岀握奇分乎其言皆引而不發愚嘗竊求其意孔明八陣正合握奇但握奇隊數與壘石不同握奇一隊當壘石二隊如天衡重列在握奇則八隊在壘石則十六隊地軸單列在握奇則六隊在壘石則十二隊以此而推曰天衝地衝曰風曰雲無不脗合則孔明所推衍出於握奇必矣天地風雲隊數旣緫爲六十四矣則龍虎烏蛇果何在哉盖天軸地衡定而不變此所以爲正也天地前衝變則爲虎天地後衝變則爲龍風變爲蛇雲變爲烏此所以爲奇也故陣勢雖八其實爲四經曰四爲正四爲奇曰天有衡地有軸前後有衝風附於天雲附於地未言龍虎烏蛇也卽曰緫爲八陣及曰聽音望麾以出四奇乃曰天地之前衝爲虎􅛺風爲蛇蟠天地之後衝爲飛龍雲爲烏翔則龍虎烏蛇實出於天地風雲而非別有四陣也非定而不變者爲正動而有變者爲奇乎由是知湯君所謂天衡地軸自可當其半者意實在此持夫作者之自明耳􅀂其疑孔明之推演則又曰以八數觀之意亦出於握奇亦明壘石卽風后法矣愚何幸因湯君是編而有進焉敢識此於卷末䟦山谷墨蹟右黄文節公書韓昌􅀺桃源行一首盖崇寧六年十月筆也按公元年罷知太平州管勾洪州玉隆􅀚以嘗忤趙丞相挺之爲轉運判官陳舉承風㫖劾公所作荆州承天􅀚塔記有幸災謗國意遂除名編管宜州三年由鄂過洞庭潭衡永桂三年五月始至貶所云十月十八日則公至宜州巳半載明年九月公物故僅一載耳嗚呼公以六十之年横至貶斥郡守從而阸之至不容居􅀜城中其困苦至矣然􅀚其䟦李資深書有云子城僦舎上􅀨傍風無所盖障人將不堪其憂余自念家本農桑使不從進士則田中廬舎亦當如是又何不堪其憂邪公之樂天知命不以得失蔕芥于中者如此故能以文墨自娱而書法至老益臻其妙也宜州無佳筆公毎以三錢市雞毛筆作字此􅁓亦果用鷄毛筆則公書之妙又不可及巳公嘗自言元祐中與子瞻穆父飯寳􅆊僧舎作草書數􅁓子瞻賞之再三穆父無一言但云恐未見蔵真真蹟耳余心竊不平及至黔中得蔵真自序諦視數日恍然自得落筆便覺超異然後知穆父之言不誣則公書法自黔中以後卽追踪懐素不待至宜州也雖然公之所以名當時傳後世者夫豈止於書哉第因其書想其人有以繫百年之思耳書唐李鄴侯傳後謝肅右唐李鄴侯傳二卷天台朱君伯賢之所脩也伯賢先君子約齋先生於元政漸弛將亂之際毎令誦習鄴侯家傳此其心之所存爲何如然當世終不能用先生先生殁餘三十年板蕩極矣而君之䄂簡猶存顧以其文漫誕間加筆削辭簡而義該使鄴侯輔唐中興勲業赫赫于目前者其以約齋之故也歟昔張魏公佐宋南渡猶諸葛忠武侯之相乎漢也盡瘁出師規復中原功雖不成而志則甚偉故其子敬夫爲脩武侯傳焉今君汲汲焉以鄴侯之家傳是脩則亦聞其風而興起者乎夫魏公行武侯之志者也約齋存鄴侯之心者也然鄴侯之岀也天未厭唐諸將俲忠故其復兩京也易武侯之出也漢運旣去羣雄角力故其還舊都也難非其才智不相及之謂也或曰跡魏公之行事固似武侯矣以約齋而視鄴侯曾何勲業之可並稱邪曰嘻是殆以隠顯而論夫士者也亦安知約齋非方隠之鄴侯鄴侯非巳顯之約齋乎故欲知約齋之心者􅀚於鄴侯之傳則得矣而二傳之脩皆以子而寓乎其父經世之心志焉豈徒然哉豈徒然哉題宋仲珩歸省卷後張孟兼予友宋仲珩執丈太史公之仲子也性敏學􅀶自少工書法侍太史於京師㑹建奉天殿禁中有詔徴書額時予備官儀曹卽以仲珩名聞俾謹書之而尚書楊公以進旣稱㫖遂問其父子之賢巳而仲珩􅀍勑草古詩􅀂干首上覧之稱譽有加焉皇太子曁晉王亦知仲珩之能書時出雜篇章令冩之於戯以仲珩之妙年擅當代書之名上徹天聽玉音之所􅅄予其爲榮遇可謂千載一日猶祥麟威鳯出際盛時莫不争先快覩榮名美爵禄見寵􅀍于身盖無疑矣今仲珩奉太史公命歸省丘墓中朝士大夫咸賦詩送之前御史中丞劉公爲序其篇端予旣賦詩復書此卷末與之識别庻幾鄉􅀖俊彦有見者尚當以仲珩而加勉哉書清宴閣讌記後蘇伯衡洪武庚戌秋高䴡國王遣其陪臣刑部侍􅀰金柱來朝獻柱頗知文墨折節從朝之名公遊間出此記以相示自言其八世祖縁所作也以其時考之實宋重和之七年時淵聖在御日乆狃於宴安荒于盤樂嘗讌宰輔蔡京王黼等于宣和殿而京作曲宴記流傳四方以爲盛美是以高䴡聞而慕之清宴有讌而縁爲之記也則知上行下效其捷如此况中國之爲君臣者以道德仁義化成天下表儀萬方則遐方之􅀚感慕效又當何如哉且蠻夷僻陋之􅀖而其文學侍從之臣紀事陳義之善有􅀂縁者代之詞臣盖不能無愧焉而有宋文治之懿作養之盛人材之衆言語之工無內外逺近之間於此亦可以見矣是以録之題鄭宣撫墓誌後伯衡竊聞公宣撫川陜節制諸將嚴甚吳璘而下毎入謁必先庭叅然後入就坐一日璘除少保來謝語主閽吏欲講鈞敵之禮吏以白公公厲聲曰少保官雖高猶都綂制耳倘變常禮是廢軍容少保􅀂欲反則可取吾頭去庭叅之禮不可廢也璘皇恐􅃪命時諸將咸陽憚而隂忌之始見公擢自温州通判不數年登禁近以資政殿大學士帥蜀意公秦檜之黨也雖忌而莫敢出聲後見公遇事輙與檜抗知非其黨也乃譛之檜言其有跋扈狀檜入其言謀于王㬇㬇以爲不􅀂選一宗室有風力者徃制之因薦趙德夫於是創四川緫制財賦以命德夫德夫至坤維辟晁公武􅆬辦公事且屬其物色公隂事公武起乆癈又引公所逐使臣魏彦忠者相與盡力擠之遂興大獄而公竟謫封州以殁於戯正人之不能獨立從古則然豈獨公乎且公帥蜀八年欲加之罪何患無詞而况諸將忌之於外宰相衘之於內迎合徂伺於前後左右者又其仇人此固司馬温公所謂獨一黄葉之在風中也雖欲無危其可得乎偶􅀚墓誌文輙䟽所傳聞于後以􅀘其畧亦以見羣枉害正其勢蛇蟠蟻結牢不可破如此可畏也䟦陳子上書於戯重其身愛其妻子不能忘其墳墓去其鄉里人之情也而至違郷里捐墳墓棄妻子而置身於艱險之地則以所重者甚於身所愛者甚於妻子所不可忘者甚於墳墓所不可去者甚於鄉里也身非不重也而有重於身者焉妻子非不愛也而有爱於妻子者焉墳墓非能忘也而有不可忘於墳墓者焉鄉里非能去也而有不可去於鄉里者焉夫安得不舎彼而取此哉然非識輕重之人烏乎能之吾讀陳子上貽謝復元書未嘗不歎其於輕重也明於取舎也審而又悲其適丁斯時也使子上不丁乎斯時則固重其所重愛其所愛不忘其所不能忘不去其所不可去􅀂尋常矣於戯子上何其不幸也邪子上余友也同薦于鄉同試于禮部後一再見于四明而遂永訣矣􅇮在京師從掲兵部伯防得其所著子上埋銘讀之而高其行而偉其志今讀此二書愈益信其行之高其志之偉雖去之二十年餘而生氣猶凛凛焉於戯子上眞賢乎哉錢用壬傅予敬趙時㤗唐元嘉皆子上同年進士也彼惟重所重而不重其所不可不重愛所愛而不愛其所不可不愛不忘所不能忘而忘其所不可忘不去所不能去而去其所不可去卒之身首異處妻子戮辱墳墓無主而爲鄉里羞然則子上之不幸固未若彼四人之不幸也子上雖客死山東然喪塟以禮墳墓妻子皆無恙而鄉里與有榮耀然則子上豈眞不幸也邪甚矣輕重之當明而取舎之當審也雖然向㣲復元子上安能决去而其墳墓妻子亦安能保全是故子上之遂其去志而墳墓妻子之獲保無他虞者以復元能委曲調護之也於戯復元眞子上友哉復元亦賢矣哉跋眉庵記後高啓右嘉陵楊君眉庵記謂眉無用於人之身故取以自號夫女之美者衆嫉其蛾眉士之賢者人慕其眉宇而不及口鼻耳目則眉豈輕於衆體哉盖衆體皆有用眉安於其上雖無有爲之事而實瞻望之所趨焉其有􅀋乎君子者矣世方以僕僕爲忠察察爲智安重而爲國之望者則以爲無用楊君亦有感於是歟讀之爲之太息題王氏述訓後方希古師弟子之敎不立世之學者一變而爲陳相再變而爲逄􅂪由蒙而變不至於羿之爲不止也其漸豈不可畏哉予過梁宋間覩河洛之俗可駭焉至汜水見河南按察僉事王侯履道所爲述訓歴紀成童時所從之師以致不忘之意其情辭忠厚有足感人者嗚呼薄夫惡子􅀚乎此其尚知所愧耻而感慕也哉皇明文衡卷之四十六
