front:
  text: 皇明文衡卷之七十七
  hash: sha256:b9f2c220e859d2667d27c68f75a42447ca29d41925fc8c105d8018b03dc26596
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_077-1a}
body:
  text: 神道碑奉天翊衛推誠宣力武臣特進榮祿大夫柱國追封平江侯謚恭襄陳公神道碑銘楊士奇太宗皇帝初自北藩靖內難至江上都督陳公瑄具舟迎濟內難平上正大統錄功賜公奉天翊衛推誠宣力武臣特進榮祿大夫柱國封平江伯賜誥劵陳氏家合淝其先世具余所著其先公墓碑公字彥純自少穎敏不凡好善惡惡內篤孝行洪武中侍父官成都習兵畧精騎射以武臣子選侍大將嘗從出郊遙望􅀌鴈雜鵞群命衆從者射不中最後命公發一矢斃之有鴟翔于上命公射應弦而墜自是屢試皆奇中衆大服而公不自爲能朝廷命總兵者作蜀府宫城遣將伐材於山所行失律且材不中度又所經瘴地士多死總戎察公可用遂命之公善撫綏明號令别取善道七百里以入先期而還士不病所得材皆適用總戎者嘉之又命董繕作具有條理遂從征南畨巖州中亭及散毛鎭南咸建勞績代父職爲成都右衛指揮同知父坐舊累謫戍遼陽公伏闕奏請代行特詔父子竝免復職衛卒數輩饕詖狙詐狹制上下爲衆患公次第悉去之善􅀋以安從征越嶲討建昌酋長月魯帖木兒踰梁山平天星寨破寧畨諸蠻駐西河口諭䧏夷人數千從總帥復征鹽井平三山寨及小伯夷進攻卜木瓦寨據要害立堡以斷賊路官軍分三隊進公居中已而左右兩隊弗支奔還公所統僅百餘人胃險先豋賊數千圍公公下馬率衆且射且斫賊疲稍却公亦傷足褁創進戰自已至酉賊敗走公全所綂而還復從征餘宼賈哈刺時㓂衆數萬據嶮以拒官軍分三道公軍後進由畨西渉打中河得間道乃出奇兵作浮梁渡河旣渡撤梁以固士志遂壓㓂境㓂憑嶮迎敵一日十三戰奪其嶮明日復力戰凢七合㓂大敗遂入其壘簡銳卒出哨令望見前軍旌旗卽舉砲俾知巳敗㓂仍遣五百軍㫁㓂走路㓂窮出降械送賈哈刺京師撫輯其餘衆公及麾下加被陞賚從蜀獻王廵邊招撫邊夷兼理茶馬之政邊人悅戴灌口都江堰壞民苦水患公修其隄防躬督工作爲堅乆計矜恤無告出貲置義田二百畒於成都積所入租凢貧不能衣食不能婚嫁及死不能歛塟者皆給之會雲南兵征百夷以功陞四川行都司都指揮同知遂進右軍都督府都督僉事太宗皇帝知公才可任時北京軍儲不􅂶命公嵗董運百萬石道海給之公措置井井剙建百萬倉於􅀡沽尹兒灣城天津衛籍兵萬人戍守公善任使均勞逸秋豪無取於下凢漕途姦弊掃滌一淸漕舟所經海島夷人畏憚官軍悉閉匿公下令俾出爲市而遣官監臨平其直軍無敢譁人兩便之舟還值倭㓂劫沙門島公率衆追至朝鮮境上焚㓂舟殆盡㓂以殺溺死者甚衆奉命率舟師於閩海備倭㓂者三海溢坍没隄㟁起楊之海門歷通㤗北至鹽城凡八百里奉命以四十萬卒修之航海至者茫洋莫知所停泊徃徃膠淺公於太倉相可泊䖏以二十萬卒築高丘二十丈延亘十里爲表識衆便之稱寳山事聞上親製文􅀣碑焉旣建北京罷海漕浚濟寜臨淸河通南北徃來仍屬公董餉運公建議造淺艖二千艘初歲運二百萬石爲之有方後增至五百萬石國用以足若䟽淸江浦引水由管家胡入鴨陳口逹淮以免淮河風濤之患就管家湖築隄亘十里以便引舟浚儀眞􅀲洲二埧湖港之堙鑿吕梁徐州二洪巨石以平水􅀔築沛縣刁陽湖濟寧南望湖長隄開㤗州白塔河通大江築高郵湖隄隄内鑿渠亘四十里以通舟南北造梁以便陸行自淮至臨清相水勢高下建牐四十有七以時啔閉皆舟楫通行永遠之利於淮濵作常盈倉五十區以貯江南輸稅於徐州臨清通州皆建倉以便轉輸慮漕舟昧河􅀷淺自淮底通州濵河置舎五百六十八所舎置卒俾導舟可行䖏緑河隄鑿井􅀣木以便夏月行者凢於事慮之周而爲之果仁宗皇帝初臨御下詔求言公首言七事大槩謂南京國之根本宜爲乆遠鞏固之計選將益兵以嚴守備長民長兵皆宜擇贒能然後政舉而下不失所贒能在推舉推舉在覈實乞選朝臣之公正者分廵天下考察百司政事得失進廉能黜貪鄙則官得人而治可興今府州縣學敎官多不得人乞令風憲考察罷黜别選今中外軍伍多缺蓋由所管頭目私役擾害不勝致其迯逸乞勑都府兵部都司嚴切禁約就行清理老疾者令戸丁代迯逸者責限追捕戸絶者驗實除豁伍籍又邉防之要在兵食足近歲如開平等䖏城不足兵兵不足食所守何由完固乞選武臣之有方畧者授以精兵足其衣食給之堅利器械俾日敎習如有沃壤令兼務耕守今漕運惟江西湖廣浙江及􅂫松諸郡去北京甚遠漕河又有洪牐淺凍之阻徃復踰年雜費數倍正糧上逋公租下妨農務乞自今令運於近便淮安徐州等䖏收貯别令官軍運至北京則民力可蘇農務不妨各䖏官軍毎歲漕運畢財力殫乏到家又修理壞船運來歳糧勞勤可憫其所管頭目又加别役以重困之乞行禁約今後漕運軍士不得再有别役馬船快船惟二三百料者可行於漕河所載不過五六十石毎船巳有額設水夫今又於緣河拘集軍民聽候其至接逓聽侯日乆衣食艱難有至行丐者乞自今罷之上覽奏嘉嘆命有司咸卽施行賜勑奬諭有老成忠愛之誠之褒加之重賚賜誥追封其曾祖省三祖重一考聞皆平江伯曽祖毋孫祖毋朱嫡毋王生毋王故妻湯皆夫人命子孫世襲宣宗皇帝臨御命公鎮守淮安兼督漕運公至察􅀫弊之爲民厲者悉革之豪猾姦宄皆歛避境内以寧時巳嬰疾而躬勤旦莫靡有滯事疾間入朝􅀷被嘉勞賜宴賚還至淮安無幾疾復作上聞特勑勞問時子儀在侍衛令挾醫馳驛徃侍竟薨宣徳癸丑十月十一日也春秋六十有九訃聞上悼嘆輟視朝一日追封平江侯謚恭襄賜祭命工部營塟公爲人闓爽英毅弘度偉畧稠人廣㑹譚論亹亹倫輩推服公餘披閱載籍考知徃古成敗治亂之故喜近逢掖士時相講議善交際能推利爲義所至以濟人爲心多所建置人用徳之不忘家有樂善堂恒舉鄒孟氏仁義忠信樂善不倦之語以勉子孫配某氏封夫人子男五佐襲平江伯後公數歳卒次儼次儀今爲勲衛好文事精武畧次倫次侃女三李芳江隂衛指揮同知張英其婿也一未行孫男三􅁉今襲平江伯祐祼女七公葬以薨之明年三月墓在江寧縣大山之原余與公同朝三十餘年相知且好於是儀以狀求著神道之碑故按狀叙而銘之銘曰繄公挺出何桓桓武兼勇智追前聞材藝夙試卓寡倫峩之三品承考勲溪獠峒獫猲群􅀒嶮弗擾獰且䞭公􅁬掃刮迅㧞塵湔滌腥穢寧邊民有嶻譽望齊峩岷歘徴來東衛宸垣遭承興運效駿奔錄勞䟽封昭鴻恩貂蟬鞶玉衣繡麟報賜志企古藎臣單心畢慮靡夕昕滄􅈚茫洋渺涯沂歳漕萬艘奄然臻有梗于海威赫震斬鯨戮鱷焚甲鱗崇表海㟁亘長雲雲章龍彩天垂文南賦北貢艱以辛踰淮歷濟底天津䟽堙鑿堅劬且勤坦行如砥戚者忻猗嗟公篤孝與仁厥施諸時績弗泯愛國亦有嘉謨陳功載冊府􅀍後昆太江之陽巋有墳太史銘之昭不刋封榮祿大夫少保戸部尚書兼武英殿大學士黃公神道碑銘黃嬴姓顓頊之後以國爲氏勲業文行代有聞者永嘉之黃自宋御史檢法衮以科第起家令緒有傳世篤儒業檢法孫脩職郎諱􅃴道生元明正書院山長諱南一山長生松陽縣學敎諭諱應發敎諭生諱通娶屠氏生公諱性字思恭自㓜穎悟不凢蚤喪父祖母劉躬自撫育遣從學明師時巳卓然有立志讀書必㝷䆒大義十五鄉長老試所業命賦新竹大見賞異而操行清㓗元季兵亂方國珍􅀼據温台署官屬蟻附之徒率􅀔􅆋赫赫動閭里或勸公仕正色叱之遂褁足不出屬歲大侵家益落躬儉約以率下而飬親必豐國家旣定宇内家始復振推其餘以濟親戚鄉黨者率視爲分內事内弟王時中􅀌窶依公公資遣之學後升太學生公皆輟巳資之時中旣授官坐事當没其家有司以同籍倂没公家公叩有司求得先祠神主及先世傳文以付其親戚曰保蔵之如黄氏先徳未泯吾當還則此不可失也而求撿法所受告身或言燬矣大慟幾絶旣至京白其情於朝得釋歸而告身實未燬亦復則又大喜曰復此萬金不足重也公於學自㓜至老不倦閒居濳心載籍喜爲詩不事雕琢務以理勝遇名人制作有會意者手自抄錄晚亦喜譚道學嘗書邵子安樂窩吟置齋壁時諷詠以自適永樂十年以子淮貴封奉政大夫右春坊大學士時淮侍仁宗皇帝監國屢問公安否嘗賜瓊玉膏一噐洪熈初進封榮祿大夫少保戸部尚書兼武英殿大學士淮奏請分少保祿給於鄕以供養從之天下聞而榮􅃩焉於是公年巳九十􅂡髪半白而齒落復生雖重聽而日益明歩􅂂強健前二十年嘗預作壽藏是旦甘露降其前之松栢識者以爲公之壽徴至是而驗公雖貴益惇謙謹雖五尺童子接之以禮温裕有容犯未嘗校隣惡少嘗侵公􅂼地公弗校而侵不止有譏公愞者公􅀂罔聞惡少後侵官地有司將治之而詢諸其隣之老公爲䟽其實而薄其罪人皆服公之量公巳進封一品其友之子有官于朝而佚平者過家焚黃數於會而位公上里人交誚之而公怡然不一毫在意閩陳興祖清尚士也與公厚善客死永嘉公歛葬之盡禮而繪像時展對焉其交篤誼􅀋此性簡澹無他嗜好所畜惟經籍法書名畫及古噐物有就鬻者倒囊不靳不嗜酒而喜賔客有過者必傾冩盡歡淮謝病歸日侍甘㫖公益樂時携賔客載小舟嬉遊山水之間翛然物表也所作詩文有静菴集八卷藏于家一日得疾手書數事付淮大要以報君上爲重遺命喪葬循朱氏禮而屛斥浮屠老子法語訖而逝宣德六年十一月五日也享年九十有三訃聞上遣官賜祭命有司治塟廷臣自師傅六卿以下皆致祭配王氏里儒家貞㳤秉禮旣歸黃氏蚤夜躬勤女事佐􅁉其家凡所制財用之宜井井有條理尤謹先祀睦族姻而愛其庻出之子孫踰於巳出永樂壬寅十一月十三日卒享年八十有六􅀄封宜人後贈夫人其卒也朝廷遣官賜祭命有司營塟子二男一女長男濟庻出次卽淮及女皆王夫人出淮洪武中舉進士由中書舎人累陞右春坊大學士通政使少保戸部尚書武英殿大學士立朝有侃侃之節歷事列聖皆爲上所信任今以疾歸第女􅃴王士昌士昌蚤卒無子誓守節不更嫁孫男五樂先卒棻棐采槃女三葉璣王宜嘉其壻也一未行曾孫男四旭暉珣瑜公與夫人合葬邑大羅山之原於是淮具書以前翰林檢討潘畿所述事狀使來京師求書墓道之石士奇與淮同官三十年辱公知有素不敢辭敬次第書之而系以詩曰滄海之堧淸浙之東奕奕永嘉爲文獻􅀖出者奮庸處者求志仕止之義代有聞世􅀖之黃氏其來逾遠當宋紹興臺幕有衮秉德執義不附權姦卒用􅁉後而今桓桓公其世嫡􅂚濳在下抱貞含和允續乃祖紛其饕詖公獨引恬紛其矜高公獨􅂂謙五采翽翽翺翺雲漢帝嘉所生龍光輝煥崇秩重祿玉帶朱衣雍容丘園消榣期頥􅀖有夀俊平世之瑞亦有賢㳤德人之配青山欝磐雙璧合藏毓祥垂祉百福其昌贈驃騎將軍左軍都督府都督僉事王公神道碑銘宣德十年加贈左軍都督府都督僉事王瑜之祖彥達考銘皆驃騎將軍左軍都督僉事祖妣黃妣成皆夫人封其繼毋茹太夫人於是瑜求余文勒碑其考之墓用昭上恩於永遠按王氏初出太原宋諱源者爲滄州學官因家焉其子曰福綿自滄徙泗州娶房氏一子卽達又徙山陽三子銘其仲也字銘甫洪武初從征伐以功長五十夫曁老而瑜代之瑜謂余曰先考天性質實尚德務仁蹈􅂂率正而篤於敎子恒言忠孝人道之大端人而昧此不可以立於天地之間瑜不敢違惰瑜非承籍先公之德不有今日幸執事之惠􅂌之也余與瑜同朝乆蓋素知之始瑜旣代又選􅀠趙簡王護衛時留京師一日其護衛指揮孟賢等十數輩濳結造邪謀簒奪布置巳定簡王實不聞也瑜親戚有與謀者瑜竊聞之力諌止不聽遂奏發之詔捕賢等悉􅀗之得其僞詔書及邢謀本末賢等皆伏誅陞瑜遼海衛正千戸遂進錦衣衛指揮同知推恩三代贈其祖􅀂考皆懷遠將軍指揮同知祖妣妣皆㳤人封其繼毋太淑人後陞瑜都指揮僉事署左軍都督僉事佩漕運印充左副總兵蕫江南饟運其蒞事勤敏㭙操廉㓗秋毫無取於下夙夜顓顓志在奉國遂實授都督僉事瑜之能子要之本於銘甫之能父也自瑜效忠十餘年致位二品膺受重寄榮及祖考天之所以報施厚矣凡人之善患無諸已誠有之天道未嘗爽其報也銘甫之顯庸雖不在其躬而必在其子榮命雖不見諸生前而必徵於身後天之道豈不信哉銘甫四子長琳次琮次瑜次瑄八孫堂堅璽賢真頔顯賔銘甫生元至正辛丑五月十日没於永樂壬寅十二月八日春秋六十有二塟海州城北沙村之原銘曰南山之植根本􅀷厚挺發爲材凌切雲表宜柱宜梁廟堂之需宜艦宜舟濟海與湖王氏之宗善仁代有有沿襲焉歷祖曁考篤鍾于嗣秉志桓桓維忠維誠以事大君發擿兇憝爰清氛曀帝錫寵嘉曰旌汝義崇秩豐祿式賁厥躬泝厥祖考申顯褒封厥考維良允蹈于德敎成于家致時赫奕巋焉佳城其藏在此春秋來拜振振孫子開國輔運推誠宣力武臣柱國武定侯贈營國公謚威襄郭公神道碑銘楊榮洪惟太祖高皇帝龍飛淮甸應天順人芟刈群雄戡定海内一時智勇材力之臣感會風雲效其忠勤輔成帝業開千萬載太平之運竒勲偉績鏗鍧振耀勒銘鼎彛垂光竹帛與國家相爲無窮􅀝歟盛哉予嘗叨軄國史竊觀開國勲臣其間能身躋壽考世爲貴戚子孫享有顯爵乆而益盛者不數人豈非其存心之仁與積累之厚有間耶􅀂營國威襄公蓋足徵焉公姓郭氏諱英臨淮人生有異徵沉毅多智身長七尺膂力過人􅀹精騎射年十八從太祖起義兵甚見親信毎令􅀡􅀫帳中取徐泗滁和采石大平建康鎮常寧國諸郡屢立戰功上嘗以郭四呼之上親征僞漢陳友諒大戰鄱陽湖相持連晝夜公時金瘡未瘳力疾鏖戰敗賊於禁江口巳而友諒中流矢死有言公之功者上問之公曰天威神筭臣何力焉上益重之時友諒子理復立於武昌進軍攻之其將陳僉同者驍捷善槊馳入中軍帳下上方坐胡牀遽呼公曰郭四爲吾殺賊公持鎗躍馬奮臂一呼賊應手殞墜上觧所御赤戰􅂁衣之曰唐之尉遲敬徳不汝過也授驍騎衛管馬軍千戸從征襄陽克淮安鳯陽安豐陞宣武將軍驍騎左衛指揮僉事洪武元年戊申從大將軍徐公北定中原下齊魯克汴梁平河南取元都破潼􅀜彰德廣平所至有功􅀄大將軍遣公取通州公距城三十里爲營深溝高壘爲持乆計衆請速攻之公曰吾師遠來敵以逸待勞攻城非我利也宜出其不意破之翌日大霧公以千人伏道傍率精騎三千􅀡抵城下元將五十八國公帥敢死士萬餘張兩棭而出與戰良乆公佯敗彼乗勝來追伏兵中起截其軍爲兩道斬首數千級擒元宗室孛羅梁王遂克通州元君乃北遁克永平真定定州生擒守將湯同僉復從平章常公取太原守將王保保軍於城西公慿高望之謂常公曰彼兵多而不整營大而無備請夜刼之常公􅀷然其計遣五十􅀐伏城東十里以舉火鳴砲爲期至夜公率十餘騎濳入其營舉火鳴砲伏兵亦舉火鳴砲常公引兵繼至皷譟之聲相接保保軍大潰自相屠戮乃棄城遁下興州大同至沙淨州生擒僞將竹平章渡河取鹿臺西安鳯翔鞏昌追敗賊將賀宗哲於亂山庚戍陞本衞指揮副使從征迤西克定西討西夏察罕惱兒撫安忽辰平章沙凈州復叛討平之克登寧州斬首二千級擭牛馬數千陞昭勇將軍本衛指揮使賜金龍衣一襲辛亥陞驃騎將軍河南都指揮使將赴鎮皇寧妃公之女弟也上遣至公第餞之且謂公素淸儉賜白金二十罌廐馬二十二匹時河洛新罹兵燹邑井蕭條居民艱食盗賊􅂶斥公宣布威德綏輯流亡申寛條明賞罰遠邇來歸者日以千計未期年戸口倍增境內大治丙辰移鎮北平河南士女不􅃘其去􅃒公馬數十里不得行甚至泣下旣去爲立生祠北平􅀄定群胡反側不寧公開示誠欵諭以理亂禍福人心遂安元左丞何允中等聞公之德來䧏者凡九千餘人上遣使勞以上尊羊馬授龍虎將軍北平都指揮使賜誥命逾四年召還京進大都督府僉事更定官制改前軍都督府僉事灰山賊反承命討平之賜馬七匹辛酉從頴川侯􅀓公征雲南旣至命公及都督陳桓胡海分道進討道多險隘諸將欲深入公曰破敵貴先聲攻取必自近始舎近趨遠豈䇿之上耶遂先攻赤水河路距河二十里爲營時乆雨河水暴漲公曰賊時水漲不意吾濟下令諸軍斫木造筏夜半濟河比曉賊始覺遂大潰生擒烏撒拜阿容諸蠻由是雲南諸賊破膽進攻曲靖六梁州關索嶺及僞石元帥山寨皆克之至江川椅子寨寨依山公先遣騎兵五千攻其前賊空寨迎戰復以精騎數百擣其後斬門而入火砲連發烈熖漲天賊乃亂悉破㓕之進攻大理金齒降其僞官叚平章攻安寧州賊將不花帖木兒棄城走破富民縣山寨攻靖守州蠻七寨一日夜破之攻牢撞山寨取仁德府破哨店山寨圍姚安敗賊將李自乆平蒙化州鄧川州破三營復光寨過金沙江攻北勝府生擒賊將髙生平麗江府平津等州前後斬首一萬三千餘級生擒二千餘人收精兵人馬數萬船千餘艘蠻民䧏者數十萬戸雲南諸路平論公功進爵開國輔運推誠宣力武臣柱國武定侯賜誥劵食祿二千五百石子孫世世承襲乙丑加靖海將軍鎭守遼東丁卯同大將軍宋國公馮公討北虜納哈出䧏之師旋虜將追襲之公與戰創傷左脇箭復中右脇公佯呼虜傷吾甲我衆益奮連戰數十合虜遂却已而進征虜右副將軍仍鎭遼東戊辰出討北虜至捕魚兒海邏􅀐偵虜營不遠公乃令諸軍少憇飲馬衘枚卷甲倍道而馳􅀡扺虜營虜王覺乃率十餘騎潰圍出其將蠻子太尉來拒我師公手刃之􅀗兩營所積金寳珎玩圖書降其衆五萬餘人生擒虜將咬咬司徒乃曩家大尉爽古達兒古不達刺王子等四萬餘人馬駝萬五千匹牛羊輜重無算師還賜白金千兩鈔八百錠綵幣四十匹巳巳上以天下無事且憫諸將老欲保全之厚加賜賚遣歸其鄕公亦就遣庚午獨召還京上賜坐與語歡甚命綂禁兵及在京諸軍蓋上春秋高知公忠謹特􅀝重焉辛未以虜酋阿扎失里㓂邊命公討之􅀗其人口孳畜逐北至鴉寒山而還丁丑川陜㓂發􅀔張甚上顧曰非鄕無能勝其任者授征西將軍印討之至􅃆之後河生擒賊首高福興及黨四千餘人公䟽其同謀者請誅之脅從者乞勿治且言有司不恤民宜正其罪上可之永樂元年癸未二月十七日卒于家享年六十有九訃聞太宗文皇帝爲之震悼輟朝二日遣官致祭􅐠䘏有加贈營國公謚威襄賜塟京師聚寳山之原公孝友仁恕恭儉誠實出於天性母夫人嘗疾篤懸身燈告天求以身代疾遂愈人皆謂公孝感所致後母夫人卒公廬墓側晝夜號泣不絶聲臥寢於地毁瘠日甚一夕夣母夫人告曰地濕則致疾致疾則傷生汝固純孝惟竭忠報國爲父母光墓不必廬也公感悟而歸家三年之中哀痛如一日平居兄弟怡怡克盡友愛御軍行師動有紀律推心任人甘苦同之其攻克州郡必禁虜掠戒殺䧏封府庫收簿籍一錢尺帛不敢私嘗北征軍法夜必令親軍更􅀡荷戈環帳立一夕風雪大作公悉罷遣歸營其愛恤軍士多􅀋此家居簡靜好讀書天文地理百家之說靡不通曉敎訓子孫以儉素力學爲務事太祖高皇帝四十餘年小心謹愼未嘗有過眷遇雖隆而自處益謙上嘗御便殿賜坐適有奏事者公趨避之上曰鄉第坐朕自理事不汝關也其見敬愛如此時公卿多置田產公多不治上問之對曰臣一布衣荷陛下寵靈叨有封爵子孫衣食餘饒安敢增益俾生侈心上善之嗟歎良乆公大小百餘戰金瘡遍體毎隂雨痛甚及聞征討之命即日就道未始以老疾辭其事上竭忠蓋如此曾祖叄祖聚父山甫累贈營國公曾祖妣何氏祖妣趙氏毋單氏贈營國夫人配馬氏封營國夫人公兄弟四人長早卒次興以軍功封鞏昌侯贈陜國公謚宣武次某福建都指揮使次卽公也子男十二人鎮銘鏞鑑鑰銓錡鈺鈁􅣱鋼錀鎭駙馬都尉尚永嘉公主銘遼王府典寳追封武定侯鏞中軍都督府右都督鑑中都留守司副留守鑰散騎舎人錡早卒鈺贈承德郎尚寳司丞鈁旗手衛指揮使女九人長適府軍衛指揮僉事藺瑜次適濟寧衛指揮使弋某次遼王妃次適府軍衛指揮僉事趙斌次郢王妃次適金吾右衛指揮同知范聚餘早卒孫男二十有八琮玹璧瑭瑄瑾珷瑀璒璟玘瑋璦璡璨璝琬琰餘尚㓜琮府軍衛指揮僉事玹襲武定侯瑾早卒珷尚寳司丞瑀梁王府典寳璒璟皆勲衛孫女十六人長仁宗昭皇帝貴妃次適留守左衛指揮陳鑑餘在室曾孫男五人聰耽餘尚㓜聰散騎舎人予觀前史稱郭汾陽功蓋天下而主不疑位極人臣而衆不嫉富貴壽考始終令節七子八壻諸孫數十人俱膺顯仕唐世滎之􅀂公勲業之隆子孫之盛方之汾陽夫豈多讓皆由公存心一本於仁故積累之厚愈遠愈隆焉嗚呼偉哉玹以神道之石未立無以昭示永乆來請文予閱其家傳考定其大者次第之而系之銘曰天啓皇明淮甸龍飛乗時應運風雲一機大祖受命汛掃餘孽群力桓桓皷勇就列東征西伐北南以平斷出神聖功恊衆能展也郭公有文有武翊輔眞主實天􅂌付鄱陽之戰衆論偉公公仰廟略不有其功旣捷通州再捷太原河南北平􅀺庻懷恩南詔之征武功􅀹大誅叛全生蜀民是賴蠢彼殘胡偷生漠北卷甲擒之妖氛蕩條皇有嘉􅃬錫爵褒功金書鐵劵武定啓封錦􅂁御馬白金文綺赫赫高門煌煌㦸棨世聮國戚代有顯融匪幸所致惟公之忠忠在朝廷載之信史亦有孝思永錫爾􅀋在昔汾陽著勲有唐公實似之于今益彰我作銘詩勒功墓道百世斯承有赫其耀太子太師郭公神道碑天眷國家誕啓中興之運必有英傑爲之股肱運謀効力於其間而後勲業克成故榮祿大夫太子太師郭公實其人也公諱資字存性姓郭氏河南武安人曾祖諱温父仲禮皆以公貴贈榮祿大夫太子太師曽祖妣净氏贈夫人祖妣馮氏妣王氏皆加贈一品夫人公生而頴敏志氣超羣兒弱冠入邑庠從師受春秋有所造就洪武辛酉入太學甲子領應天府鄕薦明年會試禮部對䇿大廷賜同進士出身􅀄爲戸科庻吉士擢戸部總部試主事丁外艱服闋實授本部湖廣清吏司主事改陜西淸吏司吏不容奸聲譽頓起陞都察院左僉都御史無何尚書郁新以才薦之授前北平布政使司左叅議蒞事之􅀄卽以本司弊政爲言太祖皇帝嘉其忠􅀡陞本司右叅政公悉心殫慮賛佐有方不數月陞左布政使精勤詳愼紀綱大振豪猾歛跡良善􅀗安時太宗皇帝在藩邸尤愛重之公有所言無不聽納及起義靖難命公城守撫輯兵民供給粮餉百費所需未嘗乏誤嘗以漢蕭何擬之太宗皇帝卽位論功召陞戸部尚書賜白金文綺楮幣視諸伯未閱月以北平重地乗命秉傳掌布政司事未幾詔建北平設行部拜公行部尚書公以北地軍民初安生業始遂而官司所費冗濫當撙節以恤下乃惓惓以祛弊舉廢爲務或有不悅而謗公者太宗聞之降勑慰諭益以心腹任之滿考賜宴內廷頒勑奬諭􅃬以誥命贈公祖若考皆資政大夫北京行部尚書祖母及毋皆夫人歳辛丑太宗皇帝都北京革行部調公戸部職務叢脞公勤以率下事有條序仁宗皇帝嗣位念公舊德以尚書兼太子賔客巳而復念公抱疾艱於歩􅂂不忍煩以政事特陞太子太師俾致事歸鄉旣加賜賚又令戸部給公半俸蠲其稅糧差徭特賜璽書慰勞甚至公歸杜門敎子孫讀書屛絶外累皇上嗣豋大寳眷求老成念公祗事列聖勞績居多詔起復掌戸部事免其趨朝朝賜鈔二萬貫公愈感激効忠雖祁寒盛暑必坐公署視事不暫廢僚屬胥吏莫不敬憚焉滿考賜宴于禮部􅅄以勑書譬公如歳寒松栢愈老愈勁其優待隆厚至於如此宣德癸丑十一月疾􅇵屢言蒙被朝廷重任無以效報爲愧切切訓諸子及孫當感恩思報不及家事十二月癸丑卒上􅀷悼惜爲公罷朝遣禮部尚書胡濙賜􅀕勑工部製棺營喪塟贈特進光祿大夫柱國湯隂伯謚忠襄官其子佑爲戸部廣東淸吏司主事公生元至正辛丑十一月巳已享年七十有三卒之日家無餘貲公卿大夫皆往哭弔致奠祭配陳氏賢而勤儉累封一品夫人子男五長儀先卒次􅀰佑又其次曰儼曰倫曰俊女二季榮高讓其壻也孫男十七人孫女十二人惟公廉介勤慎剛果有爲自始仕至老視國事如家事凡所施爲毅然自任不畏強禦雖怨有弗避害有弗辭與人辨論嚴厲之氣見於詞色而推之於政畧無害人蠧物之心誠國家忠謹􅀡亮輔弼之臣也佑奉柩歸以某年某月某甲塟某山之原乃以郞中黃璿所狀事行來請文勒之墓道以垂永乆余與公交好三十餘年不可以辭旣序其槩而復系以詩曰川嶽䧏靈篤生賢哲乗時奮庸以􅀣勲烈惟公之生早􅀒俊才列職郎署超僉憲臺風猷宠振綱紀斯秩出叅大籓政興弊息凡所設施算無遺䇿顯命薦臨特拜方伯赫赫大宗仗義而興命公居守撫民餉兵旣正大位嘉公勞績進位尚書厚其賚錫公愈飭勵經國如家謗怨弗恤恩寵屢加仁宗嗣位眷顧􅀹重兼秩宫僚式隆任用念公抱疾進位師臣俾休于家疊施以恩皇上繼統眷公耆舊詔復任事寵待加厚維公忠貞衆所共知維公勲業顯著于時筋力雖衰寸心猶赤奄忽長逝帝用悼惜贈爵賜謚喪塟是營官其後嗣存􅃿光榮維兹光榮從古罕致公具有之其誰克似武平有山欝欝其崇勒文墓道垂䊮無窮故光祿大夫柱國少師兵部尚書兼華蓋殿大學士贈特進光祿大夫左柱國太師謚文貞楊公神道碑楊􅄎正統九年三月甲子光祿大夫柱國少師兵部尚書兼華篕殿大學士楊公卒公在疾時自為墓誌及卒其子􅐕號泣請余爲神道碑文神道有碑制也墓有銘古道也義不可辭乃序而銘之公西昌儒宦家子諱遇字士奇别號東里曾祖景行元翰林待制祖公榮考子將累贈以公官曾祖妣祖妣妣皆夫人公一歲喪父鞠成於毋夫人陳氏自㓜端重異群兒受業於鄕儒海桑先生海桑毋夫人世父也見其敦敏甚噐重之公自知學手不釋卷十二三通舉子業鄕人請為子弟師嘗有儒生過舘下棲棲然携書数冊公詢之聞其毋老無所養乃分其徒之半與之俾得束脩奉母姑氏舉家瘟疫門無人跡公夜宿其家浹旬爲之調治全愈始還于是寖有聞於鄕里毋夫人嘗曰吾兒方學嚮義足以光先世及弱冠出㳺章貢章貢守儒者嘉重之俾攝琴江敎事琴江令亦儒者深賢之公感知已勸令尚平恕嘗爲之言脫誣抂重罪數人或持金謝公者公􅀂不與聞斥之出遊江湘所至人敬慕欲薦之輙辭不就遂有聲江湖會朝臣以名儒薦徴入翰林編繤一時儒者稱公􅀶洽試於吏部考其文爲首遂有聲於朝授王府審理副復召入翰林編纂太宗皇帝入正大綂改授編修屢遷翰林學士改左春坊大學士洪熈初陞禮部左侍郞華蓋殿大學士踰月陞少保兵部尚書尋陞少傅階榮祿大夫正綂初陞少師階光祿大夫公歷事列聖四十餘年信任始終荐臻極品夫豈偶然哉太宗皇帝初臨御脩復成憲撫綏夷夏神謀聖斷洞合事幾時在翰林與宻勿以敏捷幾智承眷顧者亦有其人公獨持重勤事未嘗以賢智先人嘗受命與廷臣議事公審衆長以聞上稱公能服善及車駕廵北京命皇太子監國乃命公輔導時營建北京征勦叛虜匠作軍興徴於南方者咸啓白皇太子公言監國之體以尊君順親爲心皇太子嘉納之凢所奏對及裁處庻事鮮有過舉仁廟卽位公以宫僚荐膺重任知無不言言無不納曾不踰年裕民之政舉行無遺嘗賜勑褒重之賜􅁚牙圗書曰貞一以表其心賜銀章一曰繩愆紏繆俾匡所失賜畿內田四千畝固辭請業貧民詔三俸俱支公懇辭尚書俸宣廟臨御益見禮重及東藩構亂公随駕東征罪人旣得公請絶浮言以全親親開釋脅從以廣仁恩上嘉納之今上嗣位公以老成弼亮治化啓沃聖學力所可為者身任之恒恐不及常以高年辭弗許上憫其情命還鄕展墓公以三􅀌之重還鄕里謙抑自處如昔在鄕里時甫数旬卽來京又六年遘疾上命明醫療之乆不愈賜璽書寛慰及賜寳鈔光祿酒饌以資飬之竟不起時年八十上􅀷惜之輟視朝一日遣禮部尚書胡公諭祭贈特進光祿大夫左柱國太師謚文貞仍命有司給舟車歸其喪塟鄕邑白雲原是年某月日也公存心忠厚急於為善自布衣時篤念族屬周恤急難審取舎行義卓卓為人稱道及為大臣識逹大體嘗曰大臣以薦賢爲本然全才難得故所薦引取其所長不求其備公夀考康寧恩榮始終宜也非幸也娶嚴氏累贈夫人継郭氏累封夫人側室李氏子三稷秫女四人梁楫蕭承恕劉釣蔣重其壻也孫男六昱晟暠晅晏昕女三人朝廷脩三朝實錄公為總裁筆削有公論平生所著有沙羡稿石臺稿文藉志法書志東里集總􅀂干卷藏於家公立心制行有自撰墓誌有東里傳有小傳􅄎自出仕與公交㳺在舘閣議事彼此不能無可否退而􅂬如也存亡之感􅂚有窮已兹用撮其槩書之神道爲之銘曰斯文遭際千載亨期以翼君德以福羣􅀺越稽徃古異世同規皇明啓運大綂重熈純佑有命挺生瓌奇左右宻勿四紀于兹玉成耆徳以臣以師中流砥柱羣疑筮􅀛天不慗遺吁其孔悲皇明文衡卷之七十七
