  text: 皇明文衡卷之十二
  hash: sha256:0ff778567f38cee646604a45ed242933a7e0c76b23a75888ac19d2e77df90d26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_012-1a}
body:
  text: 說天說上劉基或曰天之降禍福於人也有諸曰否天鳥䏻降禍福於人哉好善而惡惡天之心也福善而禍惡天之道也爲善者不必福爲惡者不必禍天之心違矣使天而䏻降禍福于人也而豈自戾其心以窮其道哉天之不䏻降禍福於人亦明矣曰然則禍福誰所爲與曰氣也曰氣也者孜孜焉爲之與曰否氣有隂陽邪正分焉隂陽交錯邪正互勝其行無方其至無常物之遭之禍福形焉非氣有心於爲之也是故朝􅌲得濕而生晞晹而死蘼草得寒而生見暑而死非有心於生死之也生於其所相得而死於其所不相得也是故正氣福善而禍惡邪氣禍善而福惡善惡成於人而禍福從其所遇氣有所偏勝人不䏻禦也曰然則天聽于氣乎曰否天之質茫茫然氣也而理爲其心渾渾乎惟善也善不䏻自行載於氣以行氣生物而􅁋於物於是乎有邪焉非天之所欲也人也者天之子也假於氣以生之則亦以理爲其心氣之邪也而理爲其所勝於是乎有惡人焉非天之欲生之也朱均之不肖而以爲子非堯舜之所欲也蟯蛔生于人腹而人受其害豈人之欲生此物哉曰然則天果聽于氣矣曰否天之氣本正邪氣雖行於一時必有復焉故氣之正者謂之元氣元氣未嘗有息也故其復也可期則生於邪者亦不􅀎以自容焉秦政王莾是已曰跖之壽操懿之得其志而子孫享之豈天之有所私邪曰氣之復也有遲有速而人之生也不乆故爲惡之人或當其身而受罰或卒享福祿而無害當其身而受罰者先逢其復者也享福祿而無害者始終乎其氣者也以懿繼操以􅁉繼懿不於其身而於其後昆謂天之有所私不可也故見禍福而謂之天降于人者非也氣未復而以禍福責於天亦非也不怨天不尤人殀壽不貳脩身以俟惟知天者䏻之天說下或曰天灾流行隂陽舛訛天以之驚於人與曰否天以氣爲質氣失其平則變是故風雨雷電晦明寒暑者天之喘吁呼嘘動息啓閉收發也氣行而通則隂陽和律吕正萬物竝育五位時若天之得其常也氣行而壅壅則激激則變變而後病生焉故吼而爲􅁀風鬰而爲虹蜺不平之氣見也抑抝憤結廻薄切錯􅁀怒溢發冬雷夏霜驟雨疾風折木漂山三光盪摩五精亂行晝昏夜明瘴疫流行水旱愆殃天之病也霧濁星妖暈背祲氛病􅀅至而色先知也天病矣物受天之氣以生者也䏻無病乎是故瘥癘夭札人之病也狂亂反常顛蹶披猖中天之病氣而不知其所爲也雖天亦無如之何也惟聖人有神道焉神道先知防於未形不待其幾之發也堯之水九載湯之旱七載天下之民不知其灾朱均不才爲氣所勝則舉舜禹以當之桀紂反道自絶于天則率天下以伐之元氣之不汨聖人為之也曰然則人勝天與曰天有所不䏻而人䏻之此人之所以配天地為三也曰書曰作善降之百祥作不善降之百殃非與曰此天之本心也而天有所不䏻病於氣也惟聖人䏻救之是故聖人猶良毉也朱均不肖堯舜毉而瘳之桀紂暴虐湯武文毉而瘳之周末孔子善毉而時不用故著其方以傳于世易書詩春秋是也高文光武能於毉而未聖故病少愈而氣不盡復和安以降病作而無其毉桓􅂕以鉤吻爲參苓而操懿之徒又加鴆焉由是病入于膏肓而天道幾乎窮矣曰然則元氣息矣乎曰有元氣乃有天地天地有壞元氣無息堯舜湯武立其法孔子傳其方方與法不泯也有善毉者舉而行之元氣復矣作天說雷說上有夫耕于野震以死或曰畏哉是􅀗罪于天天戮之矣劉子曰噫誣哉何觀天之局也一夫有罪天將自戮之乎天生民而立之牧付之以生殺之權而又自震以討焉惡用是司牧者爲也曰天鑒于民有隱匿焉人罰弗能及也而震以威之㣲顯闡幽神道也曰惡是何言也古帝制刑以爲天下均故執刑如執權因罪之輕重而前郤之又不敢專而聽于天曰天討也夫是之謂賛天地之化有今曰天又自以震戮人罪吾不知天之所自戮者以何等罪乎謂其積之極人不能勝而戮之邪則天下之爲人子而不孝爲人臣而不忠爲人長而不慈爲人㓜而不遜爲人友而不義爲人妻而不順賊義􅆷仁縱􅀻而㓕公倚􅀔而行姦乘約而肆淫人言而獸心隂􅃤而陽和磨牙吮血朘膏刮骨擅威作福殘害正􅀡而逭于司冦之誅者不爲不多矣豈司雷者有所畏乎乃不一有戮而庸夫乎戮焉使彼有以覘天之意而謂天之所怒在彼而所容在此也則恃以不忌是天以震􅂆逆而濟禍也豈天道哉必不然矣曰然則雷何物也曰雷者天氣之鬰而激而發也陽氣團於隂必迫迫極而迸迸而聲爲雷光爲電猶火之出礟也而物之當之者柔必穿剛必碎非天之主以此物擊人而人之死者適逢之也不然雷所震者大率多於木䂖豈木䂖亦有罪而震以威之邪雷說下或曰雷有神焉有諸曰人曰有之曰然則雷神所爲而非氣矣曰否雷與神皆氣之所爲也氣也者無所不能爲也忽而形倐而聲爲雷爲神或有或無不可測知人見其忽而形也而謂之神夫神也者妙萬物而無形形則物矣是故有形而有質者有形而無質者有暫者有乆者莫非氣所爲也氣形而神寓焉形㓕而神復于氣人物􅀑神或常或變其歸一也曰旣爲神也而曰不能戮人罪何邪曰神形而暫者也彼且不能乆其形惡能求罪人而戮之鑚燧說宋濂宋子閒居見家人夏季改火不用桑柘取赤檆二尺中析之一剜成小空空側開以小􅂩一劀圓大與空齊稍銳其兩端上端截竹三寸冒之下端寘空内以細綯􅆞其腰别藉卉毛於􅂩下左手執竹右手引綯急旋轉之二檆相軋摩空木成塵烟輒起塵自隟流毛上􅀱其烟蓊葧以虚掌覆空鬰之則火􅆋􅆋生矣宋子嘆曰火在木中不鑚則火不見萬善具於人性不學則善不明人何可不學哉猿說武平産猿猿毛若金絲閃閃可觀猿子􅀹竒性可馴然不離母母􅃛不可􅃱獵人以毒傳矢伺母間射之母度不能生灑乳于林飮子灑巳氣絶獵人取母皮向子鞭之子卽悲鳴而下歛手就制每夕必寢皮乃安甚者輙抱皮跳擲而斃嗟夫猿且知有母不愛其死况人也邪雜說二首王禕蜈蚣與雞不相􅀋也而其讐最甚雞見蜈蚣必殄而噬之人􅀍蜈蚣螫者塗以雞涎痛随瘉然雞死蜈蚣輙入其腹齧之不置蚊與鼈不同群也而其怨尤深鼈􅀍蚊嘬無不斃而人欲辟蚊者粉鼈甲骨􅅡之蚊聞其臭率皆避去卽不避無能生存者夫蠢蠢之物有知而無識者也蜈蚣見殄於雞雞雖死矣必復其讐於旣死鼈見斃於蚊蛟固生也猶報其怨使不能生物性之烈有如此嗚呼人有識矣操害人之心而不頋人之讐怨於巳亦何其不善自恕也哉蝟之爲物毛善刺人能跳入虎耳虎或噬之蝟皮頑不能死則穴虎腹以出而其性惡鵲見鵲便自仰腹受啄烏賊之爲物無有皮介毎暴於氷上狀􅀂巳死人取之易甚而其性好烏烏有下啄則卷而食之嗚呼蝟與烏賊其形相萬也其好惡不相侔也蝟獰然而可畏烏賊塊然而可狎獰然可畏者宜能害鵲而反受害於鵲塊然可狎者宜不可害烏而卒􅆀害於烏此其理誠有不可解者然則人固有獰然而惡人者其可畏塊然而好人者其可狎邪染說蘇伯衡凡染象天象地象東方象南方象西方象北方象草木象翟象雀以爲色取蜃取梔取藍取茅蒐取槖盧取豕首取象斗取丹秫取涗水取欄之灰以爲材熾之漚之􅁀之宿之淫之沃之塗之揮之漬之以爲法一入再入三入五入七入以爲􅀱天下染工一也於此有布帛焉衆染工染之其材之分齊同其法之節制同其候之多寡同其色之淺深明暗枯澤羙惡則不同其深而明澤其羙者必其工之善者也其淺而暗枯而惡者必其工之不善者也蓋天下之技莫不有妙焉染之妙得之心而後色之妙應於手染至於妙則色不可勝用矣夫安得不使人接于目而愛玩之乎此惟善工能之非不善工可能也夫工於染者之所染與不工於染者之所染其色固有間矣然雖工者所染之布帛與天地四方草木翟雀其色則又有間矣無他天地四方草木翟雀之色二氣之精華天之所生也天下之至色也布帛之色假乎物采人之所爲也非天下之至色也學士大夫之於文亦然經之以杼軸緯之以情思發之以議論鼔之以氣勢和之以節奏人人之所同也出于口而書于􅁓而巧拙見焉巧者有見于中而能使了然於口與手猶善工之工於染也拙者中雖有見而詞則不能逹猶不善工之不工於染也天下之技莫不有妙焉而况於文乎不得其妙未有能入其室者也是故三代以来爲文者至多尚論臻其妙者春秋則左丘明戰國則荀况莊周韓非秦則李斯漢則司馬遷賈􅁩董仲舒班固劉向楊雄唐則韓愈柳宗元李翶宋則歐陽􅁱王安石曾鞏及吾祖老泉東坡頴濵上下數千百年間不過二十人爾豈非其妙難臻故其人難得歟雖然之二十人者之於文也誠至於妙矣其視六經豈不有逕庭也哉六經者聖人道徳之所著非有意於爲文天下之至文也猶天地四方草木翟雀之爲色也左丘明之徒道徳不至而其意皆存於為文非天下之至文也猶布帛之爲色也學者知詞􅂔非六經不足以言文玄非天黄非地青非東方赤非南方白非西方黒非北方夏非翟緅非雀紅緑非草木不足以言色可不汲汲於道德而惟文辭之孜孜乎天白方希􅀡從太史宋公學爲文章其年甚少而其文甚正不推同門之士未有及之者自朝之縉紳以至四方之老成凡與宋公友者無不推許之以爲不可及余每過宋公退卽希直讀其所爲文未嘗不擊莭而歎其有得於文之妙也今希􅀡􅀅歸其鄕大肆其力於文故因以此勉焉余自蚤歳徒盡心於文章垂五十而迄無聞不知自勉乃欲勉希直寕不知愧然希􅀡得全說而及時以道徳自任則又何至􅀂余哉此余之所以􅃱爱助於希􅀡也黙齋說天下之道有小者近者費者而又有大者逺者􅀮者其小者近者費者我可以言傳也人亦可以言求也其大者逺者隱者不可以言求諸我也猶不可以言傳諸人也言不可得而傳也故夫子罕言命不可以言而求之也故子貢得聞夫子之文章而不得聞夫子之言性與天道夫言傳不可也豈不可心授乎夫言求不可也豈不可心領乎焉有心授心領而不黙焉而契􅀂針之於䂖者乎此非苟黙而已矣誠以爲道至㣲妙非言語所䏻形容也苟闡道而事乎言語之末非惟不足以盡之且將開是非之端而好竒立異者不勝夫紛紜也孰􅀂黙示以行而使之黙悟之爲愈哉是故善學者欲求父子之道惟潜心扵其所以親欲求君臣之道惟潜心於其所以義欲求夫婦長㓜朋友之道惟潜心於其所以別所與序所以信而於天下之物莫不皆然未得則黙而思也旣得則黙而行也扣之而不答也難之而不辨也詰之而不告也咻之而不顧也吾方深思力行之不暇而暇答暇辨睱告睱顧乎哉如是則其於道也察之精矣見之審矣得之􅀷矣执之固矣昌言不得而排之高談不得而動之新說不得而惑之飛語不得而沮之夫安徃而不黙平故其黙也豈三緘其口哉黙契於無言之域也非欲不黙其能不黙乎彼􅅝􅅝者皆於道無得者也不惟無得亦未嘗見焉卒然而問而莫如夫問之爲是爲非泛然而應而莫知其應之爲非爲是而遽然是其所非非其所是是非未脫口而左右前後之毀譽巳􅄹耳則又譁然而與之爭雖欲黙其能黙乎而况爲學之務先治其心心之在人也未應接欲靜􅀅應接欲明旣應接欲一而主黙焉黙則無慮黙則無欲黙則無爲無爲則一無欲則明無慮則靜靜則足以制動明則足以燭奥一則足以御煩黙也者心法也故善學者務之逰於夫子之門三千人而秀出其間者獨顔囘從事心齋而終日黙如愚而夫子亦獨稱之曰好學甚矣黙之難也是故顔回愼黙也愼黙而後恭黙恭黙而後渊黙雖堯舜之治天下亦豈外淵黙哉都俞吁咈是不得已而然也要其極􅃱夫何爲哉恭巳正南面而巳矣蓋其精神心術常與造物游於無聲無臭之表其黙其天是以先天而天弗違後天而奉天時不必􅀂後丗之君臣日夜勞於論議而天地自位萬物自有中􅀦自治四夷自服也至哉黙乎爲斈之先務爲治之要道乎禮部侍郎佸蒼吳君景玄嘗以黙名其齋而徴說於余謂景玄昔處山林而事學也旣以顔回之所以治心者治心今處朝廷而事上也當以堯舜之所以治天下者治天下則其爲是齋也非徒與共學者黙契於無言之域而巳因爲著余之所聞者以爲說且將觀厥成焉䑕􅀃胡儼胡子夜臥有䑕嚙于案其聲磔磔然胡子懼䑕之傷其書也乃暗投一杖杖不能中䑕䑕暫止而復作遂命童子起而逐之䑕稍竄去及童子就枕䑕復囓不巳時貍奴乳別室胡子度䑕之不能去也於是命童子取貍奴置臥内由是向之磔磔者寂不聞矣噫人非不靈於䑕制䑕不能於人而能於貍奴貍奴非靈於人䑕畏貍奴而不畏人然則彼各有職也君子居其職者亦盡其職而巳矣作䑕說泣麟圖說金寔聖人之情性備中和之極發之冝無不中節􅀼怪顔淵死夫子哭之過哀而不自知謂其親之之至也則天倫之親莫如父子未聞其􅂘鯉如此之過也蓋道在天地而任之在聖人仲尼後文武周公五百有餘歳而生又不得位以行其道思欲明其道傳之以詔後世而高第弟子未逹一間者又先我而死如之何其弗慟也其曰天䘮予天䘮予非以傷回也傷其道之無傳也厥後魯人西狩而至仁之靈物忽踣於叔孫氏之車焉方是時也上無明王下無方伯亂臣賊子接迹當世彼是物者胡爲乎來哉若以其爲吾夫子而出以斃於鉏商之手不猶吾夫子之幾不免於匡宋乎是尢可悲也舉世無識之者獨吾夫子識之反􅃑拭靣泣涕霑襟哀其出不逢時所以嘆吾道之窮耳於是乎假魯史以修經撥亂世反之正以明百王之大法而絶筆於􅀗麟之一語左氏所謂因所感而起故所以爲終者是矣而後世之論咸謂麟出爲聖經之應比之馬出河􅀛出洛而圖書顯蕭韶奏而鳳凰儀是蓋欲以神道設敎爾若果以爲瑞應則當去網􅅈絶䧟穽從容在囿游泳在郊使吾夫子見之將欣欣然有喜色又何以泣爲由是􅀚之則知吾夫子之泣麟蓋與慟顔淵同一哀痛之機也是皆發乎性情之正而豈有過哉㑹稽管君雍仲爲兖州府推官嘗得是圖於闕里好事者以示予因爲著其􅀃物形􅀃李賢萬物之形不出方圓二者然草木鳥獸之􅀋由天生者其形圓惟噐用室宇之􅀋由人爲者方圓兼之大抵出於自然者未有不圓而方者反是蓋圓之出於自然者以有理爲之主也理即太極假使有形無不圓者故周子爲圖以示人亦必圓其形焉或謂天圓而地方地豈不出於自然乎曰以地爲方者據其平言之也殊不知天包乎地地如卵黄蓋亦未嘗不随天而圓其形焉且􅁓窓之􅂩初無圓者日來射之其影必圓蓋亦随日之形耳水波之靜雖曰平焉以物投之其紋必圓蓋一生水水亦随天之形耳以􅀋而推之莫不皆然于以見造化之知矣
