front:
  text: 皇明文衡卷之九十二
  hash: sha256:e4ba5a6535ba006093f874c8718b795c058c188a9340226f9c7094f728d7243f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_092-1a}
body:
  text: 墓表貞義處士鄭府君墓表樓璉金華之浦江有孝義門曰鄭氏鄭氏有好學篤義之君子曰處士諱洧字仲宗其言慤而信其行和而謹少受業于太史潜溪公劬躬勩志痛自䋲斵籠鷄臥榻之側聞鷄􅀄號􅂺危坐誦讀至夜二皷不休由是盡通貫聖賢經訓􅀹精於朱氏論議根據仁義下筆爲文有奇俊語一時老儒多嘆譽之其家合族以食男女數百人處士事尊長待昆弟御卑㓜壹以誠篤恭順爲本上下莫不宜之洪武十九年詔天下度田繪彊畛爲啚命太學生涖其役太學生有以賄敗者蔓連大家多坐死䖏士兄濂時主家政名連于牒當就逮京師䖏士老其兄􅁬曰吾家以義名吾先曽祖弟昆坐誣罪争先死維楊獄吾兄老矣吾可不代兄而使之就吏乎遂詣理自誣服死金􅁜其䘮歸不惟其家􅂘之哀而鄕人靡不哀之不特識之者爲之涕泣凢聞鄭氏事者靡不悼其不幸也處士曽祖諱徳璋宋青田縣尉昆弟相代死者也祖諱文轟父諱鉅母周氏配張氏有淑德賢行子男二人檪柏女二人孫男五人􅻆烝耿煔烐曽孫男一人瑄處士卒於十九年七月八日年五十有三以明年七月七日葬于白麟溪北二里潘坂之原鄕人私謚曰貞義柏有文學與余皆師潜溪公處土遇余最厚柏以伯父左春坊左庻子濟所錄状來請銘誼不敢辭乃爲表其墓曰孟子謂以法死者非正命亦視其所爲何如耳使􅀗罪於義理而抵法如孟子之言可也倘所爲合乎義而遭逢事變隕身于難得命之正也孰加焉故比干之死於君申生之死於父童汪踦之死於國孔子皆取之茍不由義而􅀒耻含垢以全其生縱登上壽殁牖下君子視之猶狐䑕之斃腐曷足謂之正命乎􅀂處士者以身代兄死于仁義其所全者大矣其於天之所􅂌可謂無􅀒矣壽雖不長名則永存爲善之报寕不在其子孫哉黄灣馬公墓表徐一夔黄灣馬公之旣殁也其􅀌葬于其鄕菩提山長生嶺之原後十有二年値大朝更化從郡縣巨姓居于中州馬氏亦徙居穎上又十有二年其􅀌自穎奉其母以還殁於濠上之舟中含哀茹毒褁遺骸而南與公合葬旣㐮事匍匐走見余泣且言曰我先人有潜德不肖􅀌以奔播故不得請銘于當丗立言君子以貽不朽今著作家爲東南所推重者在先生矧不肖􅀌又辱有一日之雅寕靳而不爲之執筆乎余記張氏䧟呉門之歳避地黄灣時馬公􅂢丗未乆其􅀌嘗闢舘以處我而使其子與姪於余授經余以乱故爲三年留故知公爲悉於義不得辞乃本其丗系與其行實之􅀹章章者爲之表公諱振字廷舉其先汴人從宋南遷居今海寕縣之黄灣譜牒散失莫能考其傳序大父以行稱是爲萬十一宣敎父諱居玉習知䀋筴事元至元間仕爲西路塩司典史母鄭氏盛年而寡守志不易以撫遺􅀌馬氏丗業鬻海藉群鹵丁以事淋熬屬歳大侵群鹵丁散去其母尽鬻簮珥以活之公於經史頗通大意㓜游鄕校以父䘮未卒業而歸事母至孝色順辭婉迎承母意以理家政其後家日以􅁉不厚自封殖鄕黨親戚有不能自存者皆周給之性度寛厚與人交不置町畦亦頗尚氣里有出巳右者則折之以義使自媿伏平生不惑於邪說里人有疾輙赴詭祠吹簫擊皷刲羊釃酒曰以祛菑公曰此正所謂非其􅀑而祭之謟也絶而不爲浙俗信佛多貲之家莫不争施財以華飾其居曰以種福公曰彼惑於因果輪廻之說故至是施財於生前而收福於死後理無是也家雖餘饒不以一錢尺帛施僧惟篤於敎事毎語其子曰吾􅀚諸孫多秀發宜擇良先生敎之曰讀書知禮義可以持家可以發身將屬纊其子請遺訓又以爲言故其子奉命惟謹雖在衰經亟築舘爲設敎之地故長史朱君右過之嘗本其意而名之曰詒敎可以見其爲人矣公之殁以元至正十有六年二月某日得年六十有一葬以某年十月某日配朱氏孝順慈儉爲婦爲母皆盡其道其殁也年八十有四而祔葬之日則大明洪武之十有六年正月某日也子男四長􅁇周次維周以督海運功元授杭州路總管府判官次用周岀􅁇弟同知嘉興路總管府事某後次臣周後公十二年卒女二長􅃴沈某次􅃴董某孫男二人曰絅曰秩皆明經舉進士飼蚤亡秩今爲頴上縣儒學訓導孫女七人會孫十人女五人嗚呼自夫􅄦之說盛於荆楚而江以南莫不媚􅀑自夫佛之敎行於中國而浙以西事佛爲甚至於家塾黨庠之制旣廢富而不知敎不獨遐陬僻壤爲然雖鄒魯之􅀖亦或有之夫人茍有材力命與時逢能使其家轉約爲􅁉亦易易耳求其有卓然之見不媚􅄦不事佛而諰諰然以敎爲事如馬公者蓋亦鮮見余以其事可以範俗是用揭之于墓朱處士墓表朱廉士有不階一命而功􅀍乎鄕里力可以報怨而反施德于􅄷人􅀂朱處士文髙者可謂長者矣文高一名崈世居金華之永康其地曰金成宋之􅀄亡元兵之入括蒼者道出金華而永康正當其衝􅁀民乗間嘯聚剽掠處士與從兄平高紏率鄕民利兵嚴警以自捍衝閭井賴以安全大姓陳氏以武斷鄕曲莫敢與校平高獨與杭立不相下由是有􅂩平高旣殁陳氏挾舊怨以危禍中處士幾至不測有德處士者知其􅁈狀以告縉雲陶翁翁力救之事以故得釋元旣混一海内陳之弟有怨於兄詣官發其隂事陳敗其親戚僕從皆當從坐有司檄處士捕之處士不念舊事止械陳千官而爲之言俾用自首例盡釋其從坐者所活百餘人時民方新附軍帥史弼署處士防禦鎮撫令捜捕反者利賞與者多縛獻平民處士憫其無􅇳悉縱遣之全活甚衆人益稱爲長者嗚呼世有遭睚眦之辱輙􅀷蓄不忘及其可報報之不遺餘力此其人視處士何如哉處士之先出於漢槐里令雲槐里七世孫汎嘗爲東陽太守後移守臨海其孫埴復守東陽始自平陵來居東陽東陽今爲金華金華之朱氏皆其後也始居金成者曰昌昌孫元吉是爲處士之曾祖祖智父彦實皆不仕處士自㓜孝謹宗婣鄕里咸稱其有敦睦之行以某年某月某日卒享年􅀂干娶劉氏子男二人如璲如登孫男三人捨已昶錢法曾孫男五人源祐宛寔宗寔好讀書有名一林某年其月某日葬于義和鄕松坡之原浦江義門鄭彬朱氏婿也以何之權􅀁作處士行狀爲之求文以表其墓嗟夫人有一行之善不及登載簡冊其事寖乆遂􅃱湮滅無傳者多矣是故君子恐一善之不聞茍有聞焉亟爲稱述以顯著其事不没人之善也余故序次處士之行而表之以辭曰身居其位民社􅀁繫遭時之艱􅀁宜捍衛有􅀂處士沉跡畎疆乃䏻􅁬身以保其鄕􅀍􅇯加䧟幾至不測在死而生豈伊人力及􅀍敗亡孰不擠之乃憫其黨活之險危功施鄕里徳以償怨兼兹二美古亦罕見自古爲善福祿之根天之􅀁報不必其身松石之原表辭在石後有顯者無昧先徳故元翰林侍講學士陳公墓表蘇伯衡在昔元至正已丑盗發海上又明年汝頴繼變不五六年淮東西江左右湖南北罔不煽亂如海中漚前者未滅而後者復起土崩之患危在朝夕其君臣當夙夜惕勵憂勤殫竭心膂撥亂而反之正􅀂救焚拯溺之不暇乃誕相與盤樂淫荒視宴安之日猶有甚者畧不以攘除事置思慮蓋懷奸怙寵專權稔惡蠱惑帝至于此則秃魯帖木兒也公於時官文學憤激于􅂨憂形于色率御史善材抗䟽彈擊不少顧忌萬一帝心感悟焉使帝因公之言立誅奸臣以謝天下反昔所爲圖彌菑變猶可以登中興之功救湏􅁷之運柰何奸臣甫竄而遽用顧譴公非宜言而欲殺之由是衆正解體盗賊横行兵交闕下擁衆觀望者相随屬寓縣割裂生民塗炭大明問罪之師至通州帝遂棄宗廟遁而社稷墟矣是雖運祚之有所終曆數之有所㱕抑豈不以䟽法家拂士忽忠言至計也哉嗟夫亡國之主未有不以奸邪爲賢而以忠讜爲狂者也亦未有柄用非人以言爲諱而國能存者也故公伯祖宋相宜中景定􅀄以攻丁大全而編管建昌軍公以劾秃魯帖木兒而幾見殺丞相之言不用後二十餘年而宋社以屋公之言不用後十餘年而元社以屋書曰與亂同事罔不亡信矣夫丞相也公也生與阨會何其絶相佀也豈非不幸與然身躓而名隨之􅀄非不幸也而况元亡公分致死以殉國雖掣之肘而其心則與乃祖行軍司馬死汾水􅀜同諒也一門之内百歲之間風烈相終始所謂世篤忠貞者哉嗚呼公姓陳氏諱達字元達温之永嘉人家婺之蘭溪自司馬始高祖彦宋累贈少傅元贈中奉大夫秘書郞護軍追封永嘉郡侯謚安惠曾祖永春宋累贈少師元贈集賢學士資德大夫上護軍追封永嘉郡侯謚恭禧祖自中卽司馬元贈銀靑光祿大夫大司徒上柱國追封温國公謚康順考諱萍元銀靑光祿大夫大司徒宣政院使兼延慶院使領吐蕃宣慰使高祖妣王氏曾祖妣楊氏竝封永嘉郡夫人祖妣楊氏封温國太夫人妣江氏封温國夫人而公沈氏出也三歲而􅀌伯母陳留郡夫人江氏鞠育之長大年十五徴入􅀫衞二十學書於平章康里公巙巙待制杜公本學詩於張貞君天雨馬敎授伯誠三十書名與康里公上下欽安殿成在廷善筆札者咸書榜上進獨用公所進者至正壬辰擢端本堂司經㝷轉正字又遷文學立朝慕汲黯之爲人事無大小言必剴切皇太子禮貌之不徒以其善書也劾秃魯帖木兒寔丁酉冬頼太子苦諌得不殺遂辭所居官明年遵海南歸永嘉卽墓下以居從進士陳高授尚書周易語及時事輙流涕於邑既而帝見亂甚始思公顧其兄大都留守愛穆􅁔問公安在對曰病臥故里卽日以徴事郎同僉太常禮儀院事召不拜又召拜集賢􅀡學士亞中大夫兼太子賛善最後召以翰林侍講學士資德大夫知制誥同修國史同知經筵事後兩召皆有御衣上尊之賜而公終巳不赴其言曰吾嘗見病者不早使醫師治之及在膏盲始召醫從事雖扁鵲亦走而巳今國事如此豈臣子之所忍見然賢如先丞相處輔弼之地猶不能存宋於垂亡况吾之才職以論思獨能存元於垂亡乎王師克温公自沉淵軍士出之引佩刀自裁軍士奪之乃斷髪示無用猶安置濠州後遇赦任便居住乃還蘭溪病風痺且三年矣聞有薦之于朝者遂􅁍藥不御而卒公生以元之至治壬戌七月一日卒以洪武乙卯十月六日葬蘭溪縣甘棠鄉門村原以壬戌十月二十日娶江氏封永嘉郡夫人子男五曰智曰聦曰常曰定曰醜女三一􅃴永嘉鮑行一􅃴黃巖鮑丑一許嫁蘭溪楊珠孫男二震彰今翰林呉君況嘗銘公墓矣而聰謂伯衡不可無一言白公之志伯衡惟君子所貴大節爲先公所􅀣立豈不偉哉乃􅀂旣貴且富而孜孜問學施德於人而不自以爲恩人或􅀒之而亦不以爲恨他人未易能也在公何難焉出入兩宫待遇之隆賜予之渥他人不可致也何足爲公榮雖其字畫一代不數人亦公餘事耳以故不備􅄒而獨書其􅀜於國者表諸神道其辭不殺蓋以公言不用於當時爲可惜公行無愧於先祖爲可貴庻有國者以懲而事君者以勸云系以辭曰火之􅀄􅅡未至烈烈升斗之水沃可以㓕及其燎原煙熖漲天雖竭江河烏能捄旃國歩方艱不用公言國歩孔􅁄乃召公還有䇿莫施還也何禆不榮以祿乃分之宜國破城亡誓欲捐軀不􅀗􅀡遂天歟人歟死雖不果義則無愧世其家者庻其在是處士盧公墓表方希古士之出於三代之盛者豈皆賢哉世敎旣明勸懲之道旣備雖有未至者不得不企而及也生乎三代之後者上焉莫爲之率蹈乎邪者非惟不之禁而或以取榮趨乎義者非惟無以勸而􅃴以取困故道之行也中人皆可以爲善及其廢也賢者之資不能以自立於不能自立之時而有由禮秉義之士可不謂難能耶若盧處士者是巳處士生元中世俗淪於胡夷天下皆辮髪椎䯻習其語言文字馳馬帶劍以爲常處士居雖近市然恬冲坦静不樂芬華長衣危㡌徐言雅歩操儒生禮不變事後母下心氣甚得子道遇宗族鄕里一以柔和不較爲先有犯者對之㣲􅀏恂恂酬答恐傷其意由是斯人亦不忍侮之居家雖無事必蚤起櫛冠洒掃堂寢非疾病未嘗一日怠好讀書纂集古賢人粹言及今人文􅀂嗜飲食言􅀂不能出口至論古今事當否得失成敗禍福及處之之宜詳審精深雖善辨者不能窮也親賔㑹集道前舊所歷見聞可法戒者以爲樂煦煦如也不肖者見之而愧善者見之而慕乆與之居而不見其可厭蓋其天性粹羙雖不同乎流俗而亦求不絶異于人故其生也人安之其没也莫不悼惜焉盧氏盛於齊周隋唐之際居台之寧海者其族衆多號桑洲盧氏者處士族也曽大考國華大考天麟考至公皆以善稱妣陳氏繼母王氏處士諱中字思誠配方氏予之姑也子二人曰質曰朴一女􅃴同縣張宗雅男曰乾一質以縣學諸生登國朝洪武二十一年進士第對䇿殿廷天子奇其文擢寘第三授承事郎翰林院編修人榮處士善敎子而處士益謙退􅀂不預聞者後二年庚午處士年六十四以十月七日卒于家以訃聞詔賜驛舟楮幣遣歸以明年正月九日葬于縣北梅林石門之原旣葬又四年乙亥質陞中順大夫太常少􅀸以書來漢中俾述其事刻于墓士之溺於習俗也乆矣以孔子之時三代遺風未盡變聖化之沾英才大賢相望軰出而孔子猶嘆善人不可見得見有恒者斯可矣况二千載之下禮樂亡缺之餘而習于近世之陋也哉􅀂處士者不汙於浮薄而持心制行與古君子􅀋非所謂善人有恒者耶以此之資使及三代之盛而􅀗近聖人之門道德之盛必有大過人者其所就當不止於此然則余於處士也安得不慕其賢而重有感也夫國子愽士王仲縉墓表王汝玉仲縉諱紳姓王氏其先太原祖人初遷祖彥超爲周鳳翔節度使始由㑹稽徙居金華之義烏今王氏遂爲義烏人十三世祖固從安定胡先生遊登宋皇祐五年進士第得官恩陽令其後子孫皆業儒躋膴仕詳著王氏家乗考禕字子充以文行重海内與濳溪宋先生齊名大明初擢儒臺校理歷官起居注出佐南康臨漳二郡後朝廷開舘修元史召爲摠栽官㝷擢翰林待制使雲南伏節死時仲縉甫十三年聰敏過人落筆爲文沛然不可禦鞠于伯氏綬事母夫人何氏盡孝及卒哀毀踰禮未幾綬亦没仲縉獨綜理生産作業㷀㷀􅁨患中而傑然負竒志視世務􅃈􅃈無足動其中暇日益取經史百氏言窮其浩􅀶㑹其㫖歸曲而暢之觸而引之縱横磅礴出入上下務探擷其精美乃已濳溪先生一見卽噐之曰吾友王待制其有後乎一時俊傑多自服不逮蜀王尊賢下士聞之馳書幣聘致待以客禮仲縉痛先待制死節蠻徼遺骼未返丘隴白其情事王悼憫之給道里費以行至雲南訪求不􅀗遂卽死所奠祭仰天號慟幾絶過者爲之泣下霑澿述滇陽慟哭記以著志旣還王慰勞備至蜀人無貴賤咸知敬愛居無何有以仲縉名行薦者徴諸天官授國子愽士諸生方翕然嚮慕而仲縉不幸卒焉寔洪武庚辰十二月丙午也享年四十有一明年三月壬申子稌奉柩歸塟象鼻岡之原娶丁氏曹氏生四子長穆次卽稌次稔次推仲縉平生無他􅄝好惟喜爲文章有繼志齋集三十卷藏于家昔勝國之季海㝢割裂光嶽氣分不完學者所習肄委靡極矣待制公以豪傑挺邁之姿力矯時弊追古道而及之倡爲雄偉閎大之辭際皇朝龍興之運俾天下後生晚進有志斯文者讀之􅀂披雲翳而覩靑天不知心目開朗也及持節使絶域慷􅁣徇義視死如歸遂使倔強蠻酋凛然知中國威風氣􅆋之可畏迨王師南征􅀔􅀂破竹而六詔數千里咸入版圖公實有功焉僉謂天之佑相盛德不在其身必在其後人仲縉年富力強學篤而行脩其來者殆耒艾異日必能継厥先緒成一家言以黼藻皇猷鳴國家太平之盛夫何未及中壽而􅑈奪其生焉葬之五年王汝玉氏悲待制公不昌其㣧仲縉之不遂其志而表其墓曰天之於人賦以才者或不賦之以壽豈二者不得而兼有邪抑亦抱魁梧之才者能漏造化之機先事物之兆非特爲人所忌嫉􅀑神亦􅀅忌嫉之邪夫亦天下之事有不期而相值耶􅀂仲縉之才之壽其必居一扵此矣余不得而知也待制公爽􅂕在天地間與日月争光而乃靳嗇其報竟何爲哉竟何爲哉然稌也績學能文王氏之澤庻幾在是皇明文衡卷之九十二
