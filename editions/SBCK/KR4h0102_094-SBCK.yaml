front:
  text: 皇明文衡卷之九十四
  hash: sha256:c2c372280eefbeadb00878eca25366fd35b49ccbc39e9c4fdd6ff7024b0d36c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_094-1a}
body:
  text: 墓表静菴徐先生墓表黄淮先生諱垢字宗實以字行姓徐氏其先東海郯人宋南渡後有諱千一者爲黄巖令其子榮祖遂占籍爲黄巖人先生之曽祖也祖諱巳元以子貴贈承事郎行樞宻院㫁事官經歷父諱有翁仕元爲江浙等䖏行樞宻院都事毋車氏贈宜人先生兄弟三人而先生居長天資頴悟勤敏好學仲弟宗茂學愽才捷昆弟自相師友人稱爲二難㡬冠聞永嘉彭公庭堅承徽國文公正傳講學郷校先生躡屩負笈􅀙之游深有所領悟遂贅居永嘉以便力學年漸富而學益充􅀒才尚氣有􅀴綸天下之志慕范文正公之爲人恒誦先天下之憂而憂后天下之樂而樂之語拊几昌言曰必如是而后可以言仕矣居無何元運告終弗克以展其素藴於是韜光養晦設塾授徒若􅀅終身焉淮童丱時受業于先生之門先生剛毅嚴正約教條爲學規若官府號令賞罰勤怠悉當其情諸生咸知振勵洪武壬戌先生應聘共論治道時淮年􅂊十六亦叨選入邑庠充弟子員有司以禮敦遣先生赴闕數􅀍顧問敷奏剴切灼中時宜太視髙皇帝深喜得人敕銓曹任司風紀先生以草苐愚賤辭除銅陵簿復請㱕迎母就養重忤上㫖謫輸􅃥淮隂驛郡邑枝官聞先生至争出迎除館延致爲賔師多所造就㑹朝廷選駙馬都尉功臣子胡觀在選中慮其失教爲擇師而難其人爰命起公比授館教法嚴明如在郷塾時觀受教惟謹既冠入府成禮畢毎當講授中使援他府例設駙馬位于堂中北牖下南面而置師席於西階上東面先生憮然曰師嚴道尊道尊然後民知敬學豈以我一布衣而詘師道哉􅂺手引駙馬位使下然後為說書既而明日復然先生乃為書貽之責以三事大義及富貴驕人之􅀃觀泣下媿謝執弟子禮愈恭畧綺紈之習尚儒雅之風太祖深喜之召見奨論再三由是徳譽日益彰著洪武末荐登仕版􅀄任蘇州府通判用薦陞兵部右侍郎兩持使節罷而復起轉尚寳司丞其判蘇州也奏發粟二十萬以活饑氏當春􅁀水嚙隄為患廵行郊野相視原隰大興治水之役採訪使以為妨農且勞民沮之先生上言他􅃥可以妨農止水不退則田不可耕妨農莫甚焉况今規令有田之家量多寡募貧人出力而饑者得􅀁資正􅀁謂以佚道使民􅂚為勞民哉属邑有節婦王氏郡乗載其事元末旌表未及行先生請旌之禮部以前朝事不允先生上言封比干墓非前朝事乎至今以為盛典朝議謂其知大體皆從之其入為侍郎也首陳十事􅃌切時要凢㑹廷臣决疑議先生是是非非有所見歷言之不徇私不黨同一揆扵義以故多有矛盾者其出而奉使也在兩淮多所建明政舉而民安之海州有節婦侍小花年十六許嫁而夫亡㱕夫家成䘮持服養姑送終剪髪自誓守節不二採訪使上其事􅀁司以其年未五十不合例先生上言曰随事處中始為合義守文執一豈曰得冝厥婦既能哭夫於筮嫁之􅀄又能剪髪於􅁙姑之後雖剜目截耳亦無以加自當與立志卓異同科豈與守節㝷常比例廷論韙其言下郡邑旌之比使两浙以嫉惡太過􅀍劾怡然去職其為尚寳也年漸老而力漸衰伏遇太宗文皇帝入􅁇大統優待老臣遂上䟽乞骸骨許之歸家杜門謝客課子孫閱耕稼逍遥林泉之下冀盡餘齡以遂考終而巳越二載臬司鞠囚獄詞牽連逮至京得疾卒于旅邸垂絶侃然之氣不少貶是為正月二十二日也距生之年元至正甲申享夀六十有二冢子鏞扶櫬歸塟于岱石山之原配潘氏􅁇室林氏俱永嘉士族子男三鏞銑鐶皆側室出也女一適同里金眘水南徴士道源之孫也先生平昔交游皆四方知名士或同事於試院或邂逅於旅寓或談笑歡洽於尊爼間慷慨豁逹肝膽相照酣歌激烈分韻賦詩竟日忘倦訃音逺聞傷之者至號慟頓足歎息士林之寥落也嗚呼剛直嚴正人之美徳也先生以之立大節陳大義致位通顯􅀵令譽於當時其亦不幸由之以貽嫉召釁終至扵垂老客死于外其得其失何相去之遼絶耶盖其得也由乎巳道之􅀁有也其失也係乎人莫之致而致也莫之致而致又何􅀹焉淮也侍鉛槧之日淺違善誘之日深弗克咨扣以卒所業然而師生之分沒齒而不忘爰摭行業之顯著者表諸墓道以慰遐思且以昭示後人俾有所觀感云先妣吳孺人墓版文陳􅁇先妣孺人姓吳氏諱静貞家爲廬江名門世以易經爲家學主試外藩科選者累世官貴金紫前後㡬十人居同㸑食外内㡬百人孝弟雍睦若漢萬石君家家素埒封産田連絡數州頃集四千餘賑窮乏䘏鰥寡給贍流亡義聲爲當時称最元貞間詔旌表之大父某蘄黄二州教授世父元舉交州同知再遷禮部侍郎父元正早卒兄進學國􅀄監察御史母張氏孺人生法從家耳日濡染皆洽軌範孝友仁恕若出天性也好􅀴史探閱逹奥義雅善琴能賦詩􅀹精巧文繡㓜而及笄庖􅌮之所未嘗有其跡侍婢数十人未嘗見慢嬉惰容􅀊大疫家死者過半乃徙姑蘇止松陵故家名門交致行媒請為婚其姑之夫之父潘純子素曰衆莫如陳氏故相國之後風儀著聲子秀㧞而賢也遂歸我先君我先君早􅀌立巳憲度受扵祖妣碩人碩人宋相江文忠公之孫執禮嚴宻事為必求整時誦我祖考􅅷於學則道明安於欲則心晦之言孺人聞之三復致深意其事碩人無毫髪不恱其志碩人稱之曰吾婦真名門女也有姑三人􅀅歸孺人相先君治其事鉅細咸集不使動碩人心禮行送之及門曰教有名言母忽是􅀙先君少􅀒重名四方賢俊求納交者過之座無虚席日為酒張筵飲之孺人執其勞怡怡如也先君勇為義窮急困悴者歸之倒囊不足志孺人出装資副之歳不知其㡬也先君志行高㓗其期待巳必欲倫扵古之魁偉之人仕為􅀴歷濟南無一不義之物奉口體及卒惟有所閱之書二萬餘卷篋笥無􅀁實也遺􅀌繼才生十月三女長者􅀊九碩人年老孺人在少艾姻族嗟無為謀孺人曰吾命衰薄䘮夫蹇迍集巳然觀古傳史載列貞婦保􅀌嗣宗其道烈烈者正吾今日之志吾幸有姑庇依忍安孱弱而墜先緒也即謝膏沐絶容飾衣粗食糲宵晝紡績不知有寒暑操鉊荷鎛與奴共力畦圃孺人曰吾姑素享華整食飲不苟易一旦失子變味其􅀅不堪毎具食羞列柔嘉碩人甘之孺人意始愜也孺人形勞日甚或勸曰女大贅壻扶家孺人曰未就木畏禮勿犯家固不恤也繼稍長孺人教讀孝􅀴教讀小學論孟教讀詩傳日講發其義教為詩教操縵治音年十二遣從故老碩徳道遠以麥粉作餌俾擷之俟饑暮歸課􅀁業煢煢􅀌燈母子相依倐不知夜之過半也教三女立行長適范文正公宗孫昭次有歸殁次適貢元劉政政與昭皆早逝二女秉志光振風節碩人年九十四而終􅀄孺人䘮我先君哭之有時若敬姜哭碩人哀慟踰節目遂成疾孺人端凝慧逹臨事有明㫁始先君在濟南孺人與俱國令􅀄新民俗未變郡長迂懦大􅀅岀師臨境需用百出先君晝夜應事孺人禆助籌畫不失機冝先君處之􅁉如政令章著也孺人持巳待人忠敬醇一毎􅀕祀必繫養供爼實齋沐承事翼翼盡誠孝雖年老終􅀊未嘗近外庭姻戚若不與交㳺者然吉㐫􅈖遺而禮厚獨先也繼配簮纓故家金氏女孺人臨教甚恩採摭經傳為女範者数十條授之俾習為規撫教諸孫􅀹篤曰痛若翁不及見汝曹成也孺人之徳宗姻法之郷黨化之郡縣以聞敕御史旌之永樂二十一年孺人享年八十有一十月十一日卒明年十月二十日塟吳縣薦福山之茶塢孫男五人宗配陸氏寛配施氏宏配王氏宣配郭氏完少女一人歸謝璜曽孫男傳儀仁女二人其與婚者皆名族嗚呼我先妣孺人之殁也􅁇􅅎隕心䘮不能自生痛念大徳昭播當世無文示後以告子孫不孝之罪深酷也忍死以述聞見者勒諸堅珉而翰林侍讀沈公題曰皇明節婦吳孺人之墓嗚呼痛哉嗚呼痛㢤王氏二良墓表梁潜義烏王氏兄弟二人長叔盛次叔雍皆有美行而不得其夀以卒卒又皆在京師旣返塟其弟䅷以予嘗與其父愽士君善也以其􅀁自為状及銘走書京師求表其墓且曰二兄有老母髪種種然有子皆㓜弱今其墓纍纍並塟一原上過者無不流涕為王氏悲哀此二人幸先生辱貺一言非直以著不朽庶㡬老母弱子望之以攄其哀也予悲二子有可哀者按其状叔盛諱其自少讀書頴悟絶人既長機敏好謀畫􅁣然有逺志然與人交恭謹退下恂恂然人遇之非禮弗較也應門禦侮公私百端酧接謹宻鮮有敗事故起家至多貲甲於郷閭卒年三十八叔雍諱某氣和色夷通敏秀朗讀書日数千百言經史百家無不究覽擇友而交遇勝巳者必思與之齊乃巳常一至成均就其從叔愽士君學見者莫不敬愛卒年三十一二人之志雖少異而敬身接物皆同至扵事母盡其孝處兄弟盡其愛又二人天性然也於乎二人同出扵王氏同不得夀以卒卒之時又同盖永樂二年夏春間相先後十日耳夫古今才不多見况並岀一門世所謂機雲二恵者二子扵此豈異乎㢤昔人有所謂三良者予扵二子亦謂之二良乎是可為王氏痛也王氏自五代時有節度使諱彦超者由㑹稽徙金華之義烏遂為義烏望族元石硖書院山長諱炎澤者其髙祖也曽祖良常山儒學教諭祖􅁉考綸皆􅀮徳弗耀國朝官至翰林待制兼修元史總裁諱褘者則其􅀙祖也夫上以承其先者二子之志為無忝矣則扵夀夭又何􅁕較㢤書以碣之以徴夫来者彭氏義阡表王直彭氏義阡者塟彭氏之死扵義者也當元之季豪傑並起椎埋剽􅀼之徒亦相扇為亂龍泉羅􅀖其一也彭氏居邑之雩溪世為仕族于時有文逺者英偉有才畧卓然為一郷之望嵗辛􅆗賊􅀔浸盛官軍不能制乃散財發粟集義兵以保鄕里賊頗畏之壬辰江西行省叅政全普庵撒里開分省于贛命張萬戸守龍泉許辟署􅀙事張辟文逺爲護民廵檢叅其軍領民兵守北門賊引衆及城下張與文逺屢岀戰不勝因閉城堅守以待救癸巳春城中食盡且無援張夜率衆棄城去文逺殿舟至螺灘賊追及合􅀾衆饑困不能支􅀔且北文逺使􅀙弟大逺馳􅀐請兵子吉以圖興復率敢死士大呼􅁬稍入賊中欲刺􅀖不得殺數人賊亦攅槊向之文逺創重遂􅀍擒太逺走告吉安總管為移檄泰和同知楊某使以兵復龍泉兵至境大逺為前鋒踰章村河渉南洲河㑹風雨大作河水􅁀漲兵大半不得渡賊以衆蹴之遂檎文逺兄弟同日死扵賊是年三月十一日也賊既得志憤彭氏倡義圖已其兄弟子姪有先在軍中或竄伏田里者皆捕而殺之自文遠而下凢十九人又婦女二人我太祖髙皇帝旣受天命削除僣亂以興太平彭氏族属之存者休養生息今七八十年日以繁盛盖詩書禮義之澤未艾也然其老長閒居族坐相與談向時事未嘗不􅁣嘆文逺兄弟之英風義烈且深念夫死於其難者之無􅇳而皆不能歸塟或無以嗣其後蓋盡然傷之疑文遠之再從曾孫項城今仲恭甫之賢子也聞諸老長而有􅁣於其心乃卽雩溪大塘口之原開兆域營􅃁壙倣禮各爲木主以宣德三年七月望日招其魂而塟焉又以項城命置近田九畝以供歲時􅀕祀曰死者有知庶幾能安於此而無所恨矣嗚呼䘮亂以來姦宄縱恣善柔多隕於非命有能􅁬勵以討賊而舎生取義如文遠兄弟者誠少矣雖曰有之其宗族兄弟有能興哀於旣乆之後而爲之歸使􅀕奠有所如嶷者亦少矣然則彭氏其誠能篤於義哉是皆可表也嶷來京師因其姊壻督府經歴項斐求予言欲爲之書使歸而刻諸石凡塟者之名諱次第則備載于碑隂劉子欽墓表錢習禮景㤗甲戌十月十有八日予友劉公子欽以疾卒于家明年乙亥正月八日其􅀌本祔公于金牛臺先塋之次旣求郡守張侯瑄爲銘以納諸壙中復奉事狀踵門謁予文以表于墓上狀稱劉氏先世本沛人唐末有諱崇者仕于袁州刺史樂其風土因家焉後自袁徙吉州之永豐㶚上又自㶚上徙吉水之常海故今爲吉水人公諱敬字以行會祖考學翁仕元爲恒山知縣祖考奇登至治癸亥進士考季道國朝以薦起爲起居注遷淛江按察僉事㢘介有聲母曾氏昆弟三人皆傳家學公獨資禀超邁志於用世自少嗜學研覃經傳􅋕􅋕不少休落筆爲文動有思致儕軰推服郡守朱仲智聞其名舉補郡學生月試季考以及上官合試羣士第其文名往往岀人右大見奬異聲稱出等夷益刻苦自勵永樂癸未以書經中江西鄕試第一明年甲申禮部㑹試第二廷試登曽棨榜進士第時所取四百七十三人太宗文皇帝命近臣㧞其􅀹異者二十八人公在選中賜名庶吉士俾入文淵閣日讀中秘書以增益其學食於大官月給膏燭費燕閒之頃上親臨問時舉僻書疑事以驗其學激勵而期待之者甚至朝野之人竦然謂上作新人材以大興文治士君子曠世奇遇交口歆􅃩不置公與同升之士人人感奮夙夜淬勵以啚報稱時母夫人在堂無恙迎至禄養于京鄕人榮之母殁奉柩歸襄大事執喪盡禮服除入翰林預修永樂大興上慎刑辟以重惜民命乃簡授刑剖福建淸吏司主事折獄多所平反被其理者自以不􅁈亡何累坐謫戍廣西南丹困阨中處之裕如無幾微隕穫之態人用高之仁宗昭皇帝嗣位命廷臣凡經術之士謫居戎伍者舉任教官棨時爲翰林學士以公應詔起爲臨江新淦縣學訓導教有師法生徒多所造就歷攷福建湖廣應天鄕試去取精當物論帖然無譁歳滿力請致仕以歸卜居於郡城之西命其燕休之堂曰宻庵人因以爲別號遠近學者聞之欵門而問業者麋至公之教人因其材質以訓迪之始終無怠意人故樂授其教􅀂工部尚書文襄周公忱翰林侍講學士周叙太常少􅀸鄭雍言國子助教羅伯初廣西按察僉事劉長吾皆岀其門其他名薦書職教事者不可􅃍數常時足跡未嘗入公府惟事干政體及表賢厲俗卽入言之守貳皆見聽用晩而文思不衰四方有來求者應之不倦人遂所欲而去矌逹之懷老而不改其度故舊及門尊酒相歡意豁如也卒前一日出應賔客􅀏語如平時是夕漏下四鼔奄然而逝生以洪武戊申十月四日壽八十有八元配曽氏􅁇配羅氏王氏張氏皆踐婦職以順承公志子男一人本也女二人以妻曾希益周啓孫男三人女三人皆㓜於呼予與公生同邑學同志少而往還相好壯而相􅁇登朝老而先後謝事以歸􅁣念江鄕耆舊凋落殆盡思欲追往時㑹聚之樂邈不可得兾天於予二人者少假以年得從公於青原白鷺間嘯傲林壑共佚其老豈意公先棄我而逝哀豈能忘於情哉天之降材於人必將使之見於用世以逹其志夫何公制於命材弗克施而志有未就佑善之天其不可必􅀂此哀豈能忘於情哉且生而不大顯於時殁而無傳於後其何以爲爲善者之􅂆用列述公之材志學行俾刻諸宰上之石非惟􅇺公於地下永昭示於後之人焉祝先生墓表周叙括蒼祝先生旣卒之二十年其門人鎮江儒學訓導潘君華具行實造叙求表諸墓今刑部侍􅀰薛君希璉前爲監察御史時亦數以爲言盖皆以其仲子濠之請也叙永樂甲午先生主試秋闈所取士且素與先君子職方府居厚善其謝事而歸也叙嘗率諸門生交游祖送之今不復作矣追感疇昔不能忘情則墓上之文何敢辭按狀先生諱金字廷心姓祝氏括蒼麗水人居官橋里世有衣纓曾祖某祖亮元處州路經歴父彦方安陸同知先生資性淳厚㓜不妄語九歲通小學論孟書甫志學盡讀諸經旁及子史年十八不遠三百里師事太史金華宋先生景濂逾四朞學成始歸宋太史甚嘉與之洪武甲寅同知翁與郡守臨安郁公斌偕坐累謫役鳳陽先生卽從故里携資裝往代勞役明年疫癘大作死者相枕籍郁無他子弟侍側疾革托以身後事旣殁先生爲經紀歸其骨于家巳而同知翁亦遘疾先生日奉湯樂夜則稽顙􅈼天洒泣悲哀求以身代翁瀕危數四時盛暑衆莫不勸預治喪具建夜將半翁忽大呼曰金何在於是絶而復甦人皆謂先生孝誠所格巳而翁遇寛恤恩復任遂引年致仕旣歸感末疾弗能起先生遍求名醫乃調膳饈侍寢左右衣不解帶者七載如一日父殁哀毁逾禮母夫人懼其傷生越四日強之食乃啜粥治喪不用浮屠塟􅀕一遵朱子家禮寢苫塊三年哭泣之聲如初喪其奉母夫人也備極甘㫖之飬母殁哀戚之情一如失怙凡親平生所嗜終身不􅃘食遇忌辰必先期齋沐致􅀕畢􅂘慟不食者終日其至孝盖天性云處兄弟極友愛仲氏嘗求異居室廬田園從所擇畧無難色鄕有豪橫恒假虚詞肆誣構者先生正言反覆導喻之其人卒化服郡邑兩舉孝㢘不就築室白溪山中自號蒙山䖏士有終焉之志乆之與仲俱被徴仲氏應詔授秦府紀善先生以疾固辭歲已卯郡守劉仲㢘邑令周又玄屢造謁其門強先生分教麗水邑庠不􅀗已乃就至則周令特爲構樓一區䖏之環樓植竹萬竿乃更其號曰萬竹山人端居講堂嚴矩度勤誨訓解惑析疑隆冬盛暑弗懈由是人才軰出盛於昔時江浦教諭邑居大江之北學舎至壞漏不可居先生􅁱葺廢墜教育之方視麗水益加永樂辛丑滿考乞致仕從之先生學問該洽操端識明毎賔興之歳藩方爭聘爲考試官所歴四川河南江西福建皆稱得人而江西􅀹盛平生教學者以持敬爲主雖謝事家居筋力漸衰晨必冠帶詣家廟肅揖一月之朔望必造先塋拜掃鄕黨宗戚相過者未嘗以耄疾辭所著詩文有聆癡等集􅀂干卷皆溫淳雅正􅀋其爲人其生以元至正乙酉四月二十三日卒於永樂癸卯二月二十九日享年七十有九卒之歳十二月庚辰塟鄕之良山袝祖塋也配包氏元封上黨郡侯􅄮山之女有婦德先君十年卒子男三人漢濠淵孫男六東楠柴芬椲桐曾孫男六端淡璧烋二㓜未名於乎孝百行之本敬德之聚也先生學行卓卓皆足爲世儀範孰非事親之孝持身之敬之所推乎其學信有源委哉且潘君之属予言也惓惓至十數往返不厭其篤於師􅀂此亦足以知先生之教矣是皆在所當書者遂次第之如右俾歸遺其子刻之以識永乆焉奉直大夫尚寳司少􅀸袁公墓表李賢士生天地間有遭遇明時而不得見用於世者有見用於世而不得見知於君者有見知於君而無才術以顯其名者有名雖顯而不能保全始終福壽俱隆者今之君子兼而有之者吾於尚寳袁公見之嗚呼休哉公諱忠徹別號靜思前人世居南昌至七世祖于誠仕宋累官刑部尚書南渡時扈蹕家於鄞六世祖芳爲吉州㤗和令高祖鏞咸淳進士爲宋死節曾祖澤民養道不仕祖士元爲元翰林國史院檢閱官父珙國朝太常寺丞贈中順大夫太常寺少􅀸母倪氏封㳟人公自㓜頴敏神氣異常讀書強記童丱時巳能詩文凡名士鉅儒一見知爲大器太常君精於風鑑公得其傳文廟在濳邸時聞太常君名以書幣召之公隨侍文廟見公論相大喜賞賚甚厚㝷許歸家未幾高廟崩建文嗣位信任非人猜忌宗室文廟不安因有靖難志召公問之對曰天命有在誰能禦之奉命纂人象大成書以獻賚予有加壬午夏文廟入正大統首遣使召公父子至官其父太常丞且曰忠徹臨事有㫁制所言多驗特授鴻臚序班賞賚殊厚公入謝曰陛下當畏天脩德􅅯武崇文率由舊章振肅綱紀撙節財用明慎賞罰禮貌大臣黜陟臧荅用臻太平之治竝賜嘉納㝷知公在戎籍卽令兵部蠲之又嘗勉公進學公以務冗對遂陞尚寳司丞且曰此職有暇可親詩書公退而感激不怠庚申改中書舍人巳丑春營北京公扈從旣至曰與大議復遣中使召太常君至父子相隨出入禁庭㝷宻遣公乗傳看楚王子重瞳公還奏無他異庚寅春以公父高年優賚遣還公扈從北征旣還上屛左右從容宻問大臣優劣之狀武臣丘福朱能張輔李遠陳懋柳升薛禄文臣姚廣孝夏原吉蹇義金忠吳中呂震李慶方賔公一一論㫁以對上曰􅀸所識鍳正合朕意是歲冬太常君卒賻塟加厚公奔喪塟畢詔起復之癸巳春扈從至北京甲午春復扈征瓦刺乙未夏上謂公曰東宮不聞教子對曰臣聞古者不親教子宜選文學老成之人以輔導之責其成遂選儒臣儀智陳山等日侍講讀丙申春秩滿復尚寳司丞特加賞賚戊戌春召公至便殿示以進陞之意公固辭以父未有贈官卽日召吏部贈其父官賜誥命公益感勵進相書機要丙子陞尚寳司少􅀸恩典稠疊莫與爲比壬寅春扈從北征公言利出東路上不從洎還軍在東者果大􅀗復觀將兵者得利巳而捷至毎從征所言無不驗者仁廟登極待之􅀹厚賜誥命㝷賜還家燎黃省視宣廟嗣位召至京宣德改元丁內艱不􅀗奔喪詔以從子代還襄事一日見上容色曰宗室人有謀上之意七日内果有報漢王反狀者公扈從往征之旣還受賚彌厚甲寅春得展􅀕之請乙卯春今上嗣位公入朝已未夏懇乞致政旣得請南歸傾朝縉紳祖餞都門外公之術奇驗於文廟者不能盡述􅀂公效忠讜論則人不及知者甚多如終大孝之情而慎宻機事論養賢之實而贍其取給乞賜孔氏玉軸之誥歴言遣使取寳之非議武職宜淮終喪諌服藥勿信方士如此之􅀋皆有人所難者休官居閒二十餘年忽遘疾顧其子曰死生常理吾何憾惟信誠忠厚可以立身汝宜勉之屛藥端坐而終公生于洪武丙辰十一月七日卒于天順戊寅三月三日壽八十有三娶邊氏累封宜人先公二年卒子男二長應麟早殁次應驤鴻臚寺序班女七長適㤗寧侯子陳鏞次適都轉塩運使金逹次適光禄寺􅀸子井醴次適寧波衛指揮萬全次適行人司副金亮次適昌國衛指揮武銛次適玉逈孫男女各二應驤將以某年某月某日與宜人合塟于前嶴山之側前期奉狀以治命來請表其墓公爲人慷􅁣有大志不隨流俗正諭毅然不以利害少沮與人交洞見肺腑不立町畦見人患難惻然力援傾囊不惜理有不直者靣折不少借其致政也聞朝廷出令之善用人之當則躍然而喜有不便於民者必憂形於色此其爲人豈特風鍳一事可稱道哉所著鳯池吟藁符臺外集􅀂干卷皇明文衡卷之九十四
