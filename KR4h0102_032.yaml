front:
  text: 皇明文衡卷之三十二
  hash: sha256:bc7dead117e08866a895eec36f8d1962a36bb4093ca89d7a217915192a79eafa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_032-1a}
body:
  text: 記樗舍記謝肅上虞管起遠氏之避地于北山也山有大樗因作舍以蔭于其下而名之曰樗蓋自比焉且屬豫記之時豫有四方之遊不果為及歸則樗舍者已徙構城中餘十年矣而其名不易則又謂豫曰曩屬子記吾樗舍不意文之久不出也何故余復之曰起逺固美才而有用者也樗固散材而無用者也以無用之散材比有用之美才余何言以記哉乃愕然曰子以吾為有用之才則誠不知我矣獨不見夫元之季世乎朝綱解紐中原板蕩羣雄並爭以為敵國故中外急於用才而無所擇凡其才之可以宰一邑者或守一郡才之可以守一郡者或鎮藩維或以將帥之才而屈伏行伍或以經綸之才而泪沒簿書或位都卿相爵列王侯而非匡濟之才雖才有小大用不適宜固未為不見用也及皇明聿興天戈一麾四海讋栗向之所謂才者莫不低頭束手以就戮辱焉唯吾幸免豈不以其才之無用也邪天下巳定上乃更張治化深懲前代之失合羣才而聚于京師親為簡拔以用之有朝食虀鹽而莫調鼎鼐者矣有莫居逆旅而朝上巖廊者矣茲非有用之才乎然左承薦擢而右賜徒流右懷章殺而左伏鈇鉞者亦云夥矣是豈宸衷之不愛才也哉亦其才不勝任而冒焉者之故也以吾才無用而獲免又何其幸歟此吾所以甘比於樗焉夫樗無用之散材故匠石不加斤斧得以全乎其天而莊生嘗述其言以為求無所可用而為余大用者也子但以是而記之何謂無言乎余又復之曰嘻有是哉夫求無所可用者莊生所以忘天下也為余大用者莊生所以自私也自私而忘天下豈聖賢之所安乎然吾知起遠讀聖賢書而志將有為者也道出處言必稱伊吕道問學言必稱孔孟伊吕孔孟未嘗自私而忘天下也故伊尹之未見用也耕于有華固耕者耳而能樂夫堯舜之道及既見用也則相其君而覺斯民惟吕望亦然方其未見用也釣于渭濵固漁者耳而能謹夫丹書之戒及既見用也則尊主而庇民是伊呂未嘗自私而忘天下也孔子謂如有用我吾為東周而行夏時乘殷輅服周冕樂韶舞此欲見諸行事者未嘗自私而忘天下也孟子謂平治天下舍我其誰雖不得位然其談王道道性善論養氣所以立言垂訓者未嘗自私而忘天下也且夫天者降聖賢以其才非但使其自足於巳而已必將欲其大有為於天下以濟乎斯人也而莊生之才既不足以濟斯人又不肯下於聖賢乃託樗焉以肆其荒唐之説欲高出於天地萬物之表其亦不知視乎聖賢也而益卑矣孔子曰歲寒然後知松柏之後凋也蓋以喻夫君子所守處亂世而後可見然非周于德者不能焉孟子曰牛山之木嘗美矣斧斤伐之以為未嘗有村焉此豈山之性也哉蓋以喻夫人之良心乃固有耳若然則吾聞孔子嘗取松柏以喻君子之周于德者矣未聞有取於樗也吾聞孟子嘗取美木以喻人之良心者矣未聞有取於散材也今起遠亦飬其良心而周于德則用世之才全於我矣又何必自比於無用之樗樗乎樗乎其莊生之徒歟起遠有志於聖賢者也第以未之見用若無用然乃強名其舍曰樗耳夫豈其情也哉於是幡然喜曰是足以記吾樗舍矣敢不自勉遂為書之尊聞齋記劉夏詩三百昔余攻之以遊場屋彼時尊尚時王之制日夕孜孜訓傳是故紀録傳言者見取於有司遺傳者則見黜考官全藉是以決取舍其間雖有才優而文富學博而識高所見稍出訓傳外天下人必指目之曰是失經旨者也為專門名家大僇矣以此籠絡禁制天下高材明知之士槩不出乎彼之格律一旦試中京師列於有官君子翻然棄其舊步如脫敝屣則學賦詩為文以藻飾厥躬後進之士倘又來扣求前日射中之術必曰余忘之久矣余忘之久矣嗚呼聖人刪詩宋大儒先生傳詩豈謂科舉之敝其叛去至於如此之速也雖然此豈人之情也哉由學經之士拘於王者創法父師課試勤苦局蹐以執業雖嘗號讀聖人之經其實無得於心心之所樂不在是也窮經之士或者樂乎其心飫焉而忘飢樂焉而忘憂可以與之共涉患難而不悔可以與之共處貧賤而不愠抱與俱處終身不厭安有叛去之理哉余始至金陵郭士中為余設榻於其家尊聞齋要余共讀詩三百余乃為之導行前驅其法先經後傳至或執經證傳日可粗通十許篇稍稍純熟其勢洋洋焉翼翼焉如􅋧鳥乘􅋽風如巨魚縱廣淵卒也合三百篇天秩有序如親姻族姓三百人同堂共席左右列坐昭穆相從尊卑為位血脈灌注聯絡流通天下大法天地經緯無旁蹊無多岐驅車四達煌煌周道闢如也士中曰樂哉斯言乎余曰未也良農為土田橫縱其畝鋤治七八往返然後墳壤糜爛而植物滋生焉嗟乎讀書之道亦如此矣而况於窮經乎每夜二鼓盡余眯就睡士中挑燈吟諷尚未巳士中樂矣庶幾尊其所聞矣乃語士中就書此言以記尊聞齋不亦宜乎焦氏廬墓記甲辰三年江西道提刑按察分司行部至進賢縣舉儒士二人焉其一人雷逸清其一人焦致中雷氏堅苦淡泊在家務耕稼焦氏教授里中有孝行歲當壬辰癸巳之時江南兵火大作焦之父母亡流離轉徙之中乃能不飲酒不食肉與人言輒流涕執親之喪三年及亂定還鄉又廬墓側三年嗚呼當此之際世道之大變何如也父子不相顧兄弟離散君臣之義睽夫婦之道缺儒者多衣短衣帶長刀踐獵戎行一朝依附權勢假名為公卿郎將即可以得志斬艾人如草菅區區守行義出門有誰可相告語也而焦氏燭能力行孝弟於此時邪夫孝弟也者士大夫百行之常亦無足多上人乃能為於三綱淪沒九法斁壞之際此為難能耳人者仁也仁人之生德也孝弟生德之本根也本根植立則枝葉之條達鬯茂可計日而冀矣每念彼同時之人馳鶩於形勢之塗而不知返膠固於劫奪之域而不能拔此皆蹈夫死之道也夫有死之道者今而澌盡泯滅化為冷灰微塵不復有聞于時有生之德者今皆領薦于上大夫將有人民社稷之任進為當時聞人故余特為雷氏作逸淸堂序又為焦氏作廬墓記者見我國家收拾天下人材未嘗專事藝文之末而遺于孝弟力田之本也吾黨之士亦可以為之警懼矣逰山記貝瓊禦兒地四平無山其東北六十里有小山曰殳山山由殳道人得名殳山之東曰史山庚戌春清明陳君仲謀約豫逰殳山適豫𬒳召赴京師而仲謀亦以雨止今年春三月丁酉天氣澄穆豫與仲謀幸無一事撓乃相謂曰不可以不償所願促治酒肉飮食已帥陳熊陳魯兩生洎豫子翺由大溪北折而東度陌越阡至殳山之趾居人四五家皆棘樊荆扉雞犬相應倣佛桃源中而里之巨族卜民有家在山半冡後得支徑而上高下稚松萬株環合無路俯首松下傴僂行而雲氣相蕩不啻魚泳波濤中山回路盡有石嶄然壁立者即殳道人尸解處其顚有小石突怒土中類迸筍者有盤互類本走長根者方飮酒大醉昏然欲睡皆踞石而坐松風謖謖吹人衣耳目為醒欲過山北陸生來青堂而生以事出其子聞之為煮茶來獻乃啜二甌以沃燥吻已而復東其塗漸夷有公主墓云宋孝宗女葬于此又行至東山則所謂史山者山視殳山稍卑上建神官祠人至而禱者前後相屬余亦倦而休焉兩山之中求其竒峰之環拱瀑布之噴薄如赤城天姥無有也然豫意在於一適耳意之所適亦何異夫赤城天姥哉因觀祠旁古井井深二仞而泉瑩可鑑疑學仙者洗藥於此或云山僧鑿石以濟三伏之暍者人獲汲以飲焉山之勝殆盡於是矣日暮下山路益峭或有雞子石磊磊至不容足而山陽王氏巨竹千挺參天以非好事者不得造其所近山又有三湖青停黛蓄與天一色錦鳬往來可畫從者艤舟以待翺與二生皆登舟仲謀從余徒行歸翼日戊戌放舟自馬橋南行六七里捨舟而塗至紫薇山之隂山赭無草木左右怪石縱橫錯布類駝馬者類虎豹蹲者類羣羊之或寢或訛者細路出石間如縈蛇蹣􅘐鱉而上山顚亦有神官古祠祠之下為廣福寺寺建於唐時而飛樓湧閣高下向背皆依山勢而成寺僧逵公古道延坐半間雲所同生者曰蘭谷曰天然惜余所知梓南山者不幸而夭為之愴然其東偏小樓曰覽遠遂與古道登樓望海而弱水三萬里之廣宛在其下蓬萊雲氣隱隱接於欄楯也又西過裔笑巖居中闢燕坐之室納湖光延野色即所謂天開圖畫者信非夸言也時笑巖沒已久弟子道印具茗飮共讀章孝摽詩日卓午返酌于半間雲所醢笱而食肉雖美不能過也與仲謀各賦詩一解兒子翺復成五言長篇以紀其事既罷下至半山有寺曰慧力蓋晉尚書張延光故第也視廣福尤極壯麗旁像尚書父子而祠之兵變之餘仆者不復支螙者不復易而陶者舍其中摶土為瓦器然諸浮屠猶守其道不去日於西廡小殿禮古旃檀佛𣑽唄之聲雜於螺磬豫嘉其信之篤而持之固且歎吾儒之不能及也其東廡飯僧之堂曰勝功德海宋張即之所書四字在焉古道導余觀壁間畫龍一驤首躍洪濤中一既升而反顧恍惚有風雨隨之鱗甲飛動乃葉茂章元統甲戌夏所作距今三十餘年矣其餘兩胡僧亦入妙品歎賞久之寺南有勝果寺者不暇遊且轉而遊東山道遇才公大用洎桑子才沈復東二生因與之俱東山與紫薇夾水對峙相去可三里許石磴猶峻余且賈勇先登古道則不及而後矣山之寺曰崇福寺寺廢亦久徒見浩劫於荒煙野草間而審食其墓顧况讀書臺錢鏐洗劒池走馬塘舉無存者惟仙人葛洪井歷歲不改其泉甚淸汲者往往得丹砂或投石井中輒有聲如雷又有慈烏泉者在山之東冬夏不竭余以道迂不及觀獨至俱胝喝石嵒嵒深黑可坐三四人人言舊多合抱大木三伏時如淸秋嵒前土皆五色兒童拾之以為玩今大木盡伐棟字亦撤矣下有農圃數十家屋參差鱗比叢篠歡木交蔭其旁豈亦辟世之人與回登絶頂東望岸海連山起伏者秦柱山也其北如獅子騰舞者橫山也共憩東嶽行宫至是而遊者漸稀矣噫有其具而無其時不樂也有其時而無其地亦不樂也今有其具有其時又有其地此余所以遂登臨之樂也抑天也非人之所能必也不可以不記植勤堂記余嘗論宋三百年間有大德而享其報者晉國公王祜也符彥卿與太祖外有君臣之分在周則為比肩同事之人而握兵居重地一旦疑其為變命祜往察動靜之迹且欲因而翦之使小人苟利富貴必希旨附和以誣其罪惡計吾之得失哉乃以百口保之坐是失官既而其子文正公相真宗十有八年孫懿敏公在仁宗朝復出入將相三十餘年植槐之應捷若桴鼓當是時祜非私於彥卿實所以忠於太祖者也使太祖無誅滅大臣之過而彥卿免讒構之冤此固有純臣之義矣若秦檜當國忌賢嫉功盡斥異已至殺嶽飛殺趙鼎而張浚胡寅亦幾不免其隂賊慘酷何如邪乃嘆其子不足相副當燕而罷曾不反求諸巳其後卒裭爵廢棄秦氏遂衰嗚呼善惡之積如此天之報施又如此可為百世之龜監巳故君子其不稱祜不徼近功至檜則皆怒罵欲食其肉然如祜之所存者恆寡而考檜之所為者往往有之豈其性甘為豺虎哉將以天之冥冥為不足信也不智甚矣撫之金溪有王熙謙和氏以晉公為法顔其所居之堂曰植勤虞文靖公揭文安公咸賦詠以美之復介工部主事彭德修來謁記故特舉二者論之大抵為善無應則輟而不進此固人之常情勤則始終無間焉以木觀之封其本而枝益蕃去其螙而實可冀蓋有出於自然者孰與快意一時以稔其毒肉未寒而名滅哉覽者宜有所勸是為記熙荆國文公十世孫讀書好古有長者風為鄉里所推云仰高樓記朱善洪武巳未正月善自遼東歸南昌秀士羅德厚館于書樓之上開窗而望之西山屹然于其前其卓絶若中軍大將部伍旗幟整齊嚴肅而不可犯也其靚潔若輔陀觀音冠帶瓔珞尊嚴端正而不可狎也其飛動則矯然龍驤翩然鳳翥雄健俊快而不可羈也其變化則霞飛雲斂陽舒隂慘一日之間倐忽晦明而不可測也德厚曰自吾創是樓也旦而笑語焉夕而寢處焉間居而宴息賔至而觴詠焉無往而不於斯固將托是以終吾身而奚外物之足慕哉請子命之名而遂為之記庶將賴以不朽豫曰諾吾將有以成子之志按圖志西山之高與廬阜等而諸峯競秀環三百餘里其巖洞之幽深泉石之淸美竹箭之茂密草木之靈異琳宫𣑽宇之相望良田名圃之相屬所蓄之富足以衣𬒳城中十萬之衆其利澤之所及者遠矣抑吾因是有感焉是山之大能與廬阜同其高則斯人之居是邦者獨無與是山同其悠久者乎稽之古人忠節如梅子真高風如徐孺子孝友如黃太史固皆足以敦薄立懦若乃燁然道德之光粹然言行之懿奮乎百世之上而百世之下靡不師法而宗仰之者其惟濂溪周子乎詩曰高山仰止景行行止高山之可仰也以喻盛德之可懷也景行之可行也以喻大道之可由也夫以是邦城池之壯麗第宅之雄偉人物之富庶挹清光而分爽氣著豈特茲樓為勝而連山疊嶂延屬三百餘里又豈茲樓所能獨專也惟能知盛德之可懷知大道之可由則專茲山之勝者其必在斯人矣吾子其不可務乎德厚曰然某雖不敏請終身服膺焉遂名斯樓曰仰高而為記以遺之華蕚軒記吳沉浦陽鄭氏以孝義聞于天下久矣蓋自沖素處士諱綺者誓子孫以無分居至貞和先生大和巳六世矣貞和而下復三世焉先生既高年碩德子孫又多材俊於是招延名師以訓導之吾友宋景濂氏實往焉景濂一日以書來致其徒淵字仲涵者之辭曰吾兄與弟皆受學於宋先生先生嘗以華萼名吾所居之軒子其有以記之余識陋才謭向曽獲觀義門文録見當世之名公巨卿皆有稱述沉何人而敢厠姓名於其間邪然以仲涵求之之切雖辭之而不獲也嗚呼常杖之詩周公之所作也周公聖人也聖人人倫之至也公親遭管蔡之變故其詩也其志切其情哀委曲詳盡千載之下遺音皎然也使天下之人而無人心焉則已如人心未忘者使之謳吟於三復之頃孝弟之思當何如其興起邪善乎蘇洵氏之言曰今之相視如途人者其初兄弟也兄弟其初一人之身也五倫之中惟兄弟與父子為天合而人生百年亦惟兄弟相與之日最久奈何世之人蔽錙銖之利害徇隂昵之偏私反視之不如他人之厚也昔先儒之訓詁此詩於常枤之托興有二説其一以為衆華鄂鄂然俱發而光明興兄弟之衆多而和睦也其一以華鄂分喻兄弟華與鄂相覆之光明猶兄及弟相順而榮顯也二説不同而鄭氏之家則兼有其美焉又聞之沖素之四世孫龍遊府君德圭與青田府君德璋兄弟也靑田為仇家中傷龍遊奮身代之兩人爭欲就死事在宋史孝義傳中嗚呼此則不幸而處乎患難者也今諸君子乃生太平無事之世家道蕃昌之時有怡怡之美而無患難之嘆何其幸歟其營是軒也蓋以為合族之所朝於斯夕於斯講明於斯燕會於斯籩豆靜嘉琴瑟和雅粲然禮文之有序藹乎恩意之交接信乎舉天下之樂不足以及此也故沉以為詩之次章昔爾之祖既允蹈之而末三章之辭今仲涵兄弟又克踐之然則茲軒之取義也將百世其傳而無慊矣鄭氏之澤其有涯乎古人稱人之善必本其父兄師友貞和之賢景濂之教於是益可見矣景濂方以能文見許於時仲涵豈不能求其師之言以為榮而何假於余之區區者哉京城鐘鼓樓記王景天子之都衆大之地故必渙鴻閎之具以昭天休俾民靡或踰於防古之明王建大中之極樓域之亢爽以棲鐘鼓挈壷氏掌之伺日晷之出內以為晨昏節非欲侈為壯麗大觀也不如是則天紀不修而大音希聞于逺也國朝混一華夏建都應天據龍阜阻大江拓城萬雉以鎮服四海皇上維清緝熙德懋周溥以為政令之行自京師始肇建譙樓于皇城之西地當崇岡既亢且陽凡為楹二十又四高若干丈下為馳道上懸巨鏞蒲牢追蠡作其鱗之而鼖晉三八周列于次扶桑啓曙衆革靁動徐疾三止金奏爰作以數節之一百又八聲震天地無逺不格天關以開地户以闢人門以啓崦嵫景昧數亦如之于是戒百司飭羣隸令于衆曰凡興作休偃母先時亦母後時敢有不恭罰無赦於戲聖皇恪修舊章以為民防天時正于斯人紀修于斯國容觀于斯建一樓而百度舉其誰敢不飭是宜表天聲于四海而垂則于億萬斯年之永也復宗忠簡公墓田記古之有盛德大功于世者其祀典恆與天地相終始非鬼神實司之蓋天理在人心不容泯也是以忠臣烈士英風􅏮􅏮昭灼今古非惟當時慕之而數千載之後能使人感動興發嗟乎生為忠良死為明神理之常也豫見宋忠簡公宗澤墓在鎮江京峴山其墓田林木乾坤跳踔不遂湮沒若神人扶持之者良可敬也嗚呼胡虜入中國至靖康之慘極矣宋太祖有天下太宗真仁繼之百五十年涵養生息措國勢如太山盤石自神宗用王安石國脈潛耗至于徽宗以侈靡促之童貫喪師以啓戎心再犯國都徽欽蒙塵邦昌僭位天理民彛斫喪無幾惟宗澤起自義兵都總管留康王於磁州差軍衛南上書勸進高宗即位引兵趍行在帝壯之命知開封府京城留守宗澤招集義兵得百餘萬山寨效順復數十萬方尅日大舉而病不可起矣嗟夫宋之再造宗澤基之宗澤之生死係中原之存亡宗澤在則義兵至一百八十萬澤亡則義兵盡散澤在則化叛逆為王臣澤亡則王臣變為賊矣是澤之生死係宋之輕重其忠義貫日月心膽裂金石志吞逆虜而力不逮回鑾之疏二十四上而國賊中沮之感激而死豈其得巳哉使澤不死嶽飛生存金之為金未可知也天朝郡守劉公辰􅊩政之初見其墓蕪穢不治墓田為寺僧所侵即奮然復其故物勒石紀功凡歸田四十八畝三分二釐四毫地一十四畝二分七釐六毫草灘一十二畝五分山六十畝六分七釐二毫重命龍華寺僧守之歲奉祠祀作文序其顚末其規模措置頗詳具云邦人復建碑于寺以紀興復之由揚劉公之德且來徴文豫謂非宗忠簡公之忠義不能遺丘壟于三百年之後非劉郡守之明昭前烈不能復忠簡公三百年之絶祀雖然是豈人力之可致哉天相之也夫國家之理亂係于天而人臣之忠義懸于天劉公此舉非天而何故豫假天以彰郡守之績以勸世之為政者知所本云還牖軒記劉三吾都梁生李宣孟昭請于豫以其所名與字見質豫謂宣昭義聞人所通知也宣矣昭矣不知所納約焉明無所從入矣韓昌黎名愈愈之言勝也則字退之以有兼人之能不可無謙退之志也朱文公名熹熹之言火明也則字晦翁以既從火之明可無韜藏其明之地哉人心無不有所蔽有所通彼蔽而復語之以所蔽愈不通矣必自其所不蔽推而反之心斯悟矣在易坎之六四尊酒簋二用缶納約自牖室之暗牖焉本匪所由之明乃室之所以受明也右象坤為闔戶坎艮為穴穴其戶牖也九五尊位六四近之四用五之所明而以一尊之酒二簋之食瓦缶之器自納于君納之不自戶而自牖者避其所蔽而就其所通者為之説也如漢祖愛戚姬將易太子是其所蔽也羣臣非不爭嫡庶之義非不明如其蔽而不察何四老者上素知其賢而不能致之此其不蔽之明心也故因其所明而及其事則悟之如反手後來左師觸龍于趙太后所愛少子不令質齊亦其所蔽于私愛也觸龍知其所明左使之長久富貴一言而聽之如響教人者可不自其所明而入之哉生知所以宣昭又知所以納約自牖則學得所入而蔽有所通矣故因其見質也為名其軒以還牖蓋欲其于宣昭之明而得所以納約自牖之地焉或曰茲義也非釋氏所謂壅還墻壁明還戶牖者乎曰彼以通塞之常言此不主塞主其通而言語若同而義實異也宜隱軒記方希古洪武九年余遇鄭君好義于京師是時天子方以災變求言天下御史用深文致無罪守相數十百人于獄議者冤之君曰此寧不足言邪即草封事詣丞相願得召對言狀丞相問所言云何君抗色曰吾將見上言事丞相何問焉丞相怒奏抵君罪君慷慨不少屈辨説天下事激昻奇壯聲動朝廷聞其名者皆稱君為奇士豫亦服君之才以為且將立功名當世憂患不能沮之也後豫遊學于外不與君相聞者甚久前年君歸自江淮豫往訪焉視其貌加充聽其言若不忍出口語及前事則深自悔咎曰學未知道而多言此吾過也取聖賢經傳窮旦暮攻習發其理而考諸躬行粹然若循繩墨而蹈規矩非復昔日鄭君也豫愈服之乃知昔之知鄭君者特其棄餘而君不豫鄙也顧以所居宜隱之軒屬豫記凡物有所宜者必有所短舟宜於川而不宜於陸騏驥宜於致遠而不宜於服田偏於用也神龍乘風雲吐雷電下上八極而困蟄於玄冬與蛙蚓等局於時也惟人亦然辨士宜於戰鬪之際而居平世不如庸人烏獲任鄙宜於尚力之主而折旋尊爼之間手足無所可用拘於技也孟公綽宜於為宰而短於治劇黃霸治郡則宜而為相則損才各有所便也若夫為聖賢之學者修之於身也無不具而見之於用也無不能豈果有所宜與否哉其仕也隱之道行其隱也仕之用存不違俗以為高不同世以求合用舍進退皆安之而不顧夫是之謂君子鄭君之學得於聖賢者美矣豈宜於隱而不良於行乎昔之見君也未越十年而君之所得過於昔之所見也多矣自茲以往使益進於道烏知無大異於令者而其宜於隱也庸知非宜於仕之端乎人之常情不能安於藜藿則不能享八珍之奉服疏布而厭者其衣文繡也必驕未有濫於貧約而可處富貴以免禍者故有慕利祿之心者死於貧賤者也隱居自得而樂之不厭者功名富貴之人也石鏡精舍記邑士童君伯禮既以禮葬其父於舍南之石鏡山與三弟謀合資産同釡􅑄以食取古禮之宜於士庶人者以次行之復恐後之人未能盡知其意而守之弗變乃即石鏡之陽為精舍聚六經羣書數百千卷俾子姪講習其中求治心修身之道以保其家以事其先而不怠且屬豫記其説以告來者豫謂童君於是乎知本矣人有五常之性天命也發為君臣父子兄弟夫婦長幼朋友之道天倫也天倫之常天命之本孰從而明之易詩書春秋禮記聖人之經也聖人之經非聖人之私言也天之理也天不言而聖人發之則猶天之言也三代以上循天之理以治天下國家故天命立天倫正而治功成風俗淳由周之衰不知聖人之經為可行而各以其意之所便時之所習為學百家衆説馳騁錯亂皆足以叛經而害理間有知經之不可廢者則又徒取其未而不求其本以為設於人而不察其出於天人心不正天理不明而三綱九疇因以不振經之用舍其所係豈微哉齊桓公欲取魯仲孫湫曰魯猶秉周禮未可伐也則古者以治經與否觀國之興廢也周原伯魯不悅學閔子馭曰學猶植也不學將落原氏其亡乎則以學經與否觀家之存亡也經之於人其重也如此世久不之察而童君獨知其可以善身保家首以教其子姪而不敢忽非誠知所本其能然乎自斯民之生封君世家富貴盛隆者亦衆矣其意莫不欲傳於無窮而卒不能者奢泰滿盈而不能節之以禮私意蜂起而未嘗正之以義也使稍得聖人之言而守之于以治心修身致其道德於衆人之表優於天下可也於家乎何有童君之家雖未足與富貴盛隆者比而以禮自飾以義自正以經學望於後人其所以守之者有其具矣凡學乎斯者擴乎天命之微以盡性篤乎天倫之序以盡道明乎經之大用以誠其身以及乎人則為善學而不辱其先矣此童君之望而亦聖人之旨也苟徒取其末而遺其本誦其言而無益於身與家豈聖人作經之意哉亦豈童君之所望也哉皇明文衡卷之三十二
