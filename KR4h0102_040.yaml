body:
  text: 序心學圖說後序蘇伯衡金華坦谿之上有隱君子曰鄭君彦淵宋川陜寘制忠愍公之六丗孫也始余得其塟書註釋讀之固意彦淵儒者乃今讀其心學圖說信彦淵之爲儒者無疑矣夫堯舜禹之相授受也曰人心惟危道心惟微惟精惟一允執厥中萬丗正學扵是乎出焉商周繼之其間聖賢焉不學而亦焉有外此以學者哉逮乎周衰聖人不作異端竝起其所以爲學者大抵非帝王之學漢興羣儒掇拾遺經扵秦火之餘徃徃溺扵訓詁而不知反求諸心則旣失矣後千數百年濂洛諸大儒出當宋丗相與倡明聖學而論著焉子貢之徙所不得聞扵仲尼者昭然若掲日月天下學士始知不知道不可以言學不明心不足以爲學夫何積習旣乆雖有豪傑之材亦皆篤惟先儒之成言是誦莫肯以精力自致而今爲甚譬如侏儒之觀塲人抵掌亦抵掌人揶揄亦揶揄其目且猶無見也其心况有得乎則其失愈逺矣夫千古帝王之學固因濂洛諸大儒而復明至扵天地事物之倫理性命道德之精微諸大儒又豈敢自謂其言盡矣備矣後之學者無所容心無所容喙也乎哉此彦淵之書所以作也彦淵優㳺事外扵凡聖經賢傳旁及釋老之書靡所不覽而未嘗阿以爲同㝠思而黙體深造而自得得其說直欲逾濂洛渉洙泗窺先天之秘推其用心可謂勞矣非儒者而能與扵斯乎惜夫是書出扵三百年之下而諸大儒莫之知而莫之取也尚令彦淵與諸大儒竝時而生從而就正焉其有不傳信乎而顧使余得而讀之豈知言哉唐許胤宗國毉也而不欲著書以爲脉之候幽而難明吾意所解口不能宣得吾之所言而不得吾所不言則扵脉有不能明而且妄投藥矣扵戲醫家之說萬一失之其禍止于傷人吾儒家之說萬一失之其禍遂至于亂世然則儒者著書視毉者著書豈不愈難乎故余平生爲學不敢篤信成言亦不敢輕出臆說觀彦淵之超詣獨得多所發揮寜無慨然者乎圖與說所不能盡者彦淵尚終有以教我哉送歐陽公輔序故大司徒楚國歐陽文公起自休致拜翰長之明年伯衡舉進士至燕因得拜公于崇政里第退復得與公之孫公輔逰公輔生長伯衡一年聦敏未之或先朝夕綜理家政裁答書䟽賔禮門客間則讀書爲文不遑頃刻自逸伯衡見之未嘗不羨且愧也别公輔南歸未幾而兵興出處之不知且十有六年國家底定燕冀公輔來南復相見乃知公輔積官至中書左司都事而扵當世之故益熟矣嘗與之論元社之所以屋雖天命而致之豈不由人乎哉天曆元統以來海内無事士大夫安富貴而養功名職于郡縣者以將迎爲要以依違爲賢以漁獵爲務而司憲度者亦皆保其禄竝顧其妻子類欲樹私恩爲自完之計其低佪澁縮苟且歳月不以是是非非爲意者則號識大體而尤見重上下相䝉政以賄成馴至至正間變起意外而遂莫之支焉然則其亡也天邪人邪必有以辯之矣扵戲公輔眞知言哉今年春公輔采史家事自北平山東還而陜西按察僉事之命下且行欲得一言爲贈伯衡竊謂君子之爲國也猶醫師之治病也今夫貌之瘠肥氣之虚實病之深淺凡爲醫者舉知之而不䏻療療之而不䏻巳則由其不知病之所在與夫治失其方藥之不得其良也有醫師焉切脉而灼知其病治之有方投之良藥固不待煎洗割解而愈矣曾謂爲國而異是乎聖天子起民間混一四海慨然思革前代之弊於是簡㧞人材分布郡邑而寘諸風憲則其尤者也而吾公輔與焉公輔侍文公自蚤歳所接識皆朝之耇老成人所聞皆康時之略所學乃聖賢之道而又養之以歳月習之以世故迹其言論譬諸醫師蓋不惟素蓄良方善藥抑亦知病之所在矣雖以之爲國無難也而况一道乎書曰商谷靡靡利口惟賢餘風未殄君其戒哉夫君陳尹東郊時殷之爲周乆矣而其言且如此矧今秦雍内附未乆也則向之吏習庸詎知不有存焉者乎申明徳意作新之伯衡扵公輔有望焉送晉王相汪君序聖天子綂一亟夏圗惟治道念夫爲國之藩屏在乎衆建親王爰以夏四月乙丑九子一孫同日封爲王授之冊寳錫之車服胙之土田復簡朝之重臣爲之保傅親御便殿靣諭而臨遣之俾之先徃繕城郭樹府寺備儀衛董官聯施政教以待諸王出閤而龍舒汪君實拜晉王相昔三王之扵世子莫不旁求碩士為之師為之傅為之保而道以徳義輔以政事保其身體漢氏以來因之凡諸侯王列寘傅相其位秩差後三師而禮貌之隆責任之重則鈞一焉矧今晉王所賜履表裏山河乃堯之故都叔虞之舊封韓趙魏之全壌地大且要保王躬而制外閫不有重臣則何以哉汪君負倜儻傑出之資夙承訓於家庭又嘗師武威余公其奥學雄文宏材逺畧卓乎非流輩所可及上之渡江也首𬒳知遇出入左右敡歷中外惟其所用而聲實以著譬則萬石之鍾大叩之大鳴焉小叩之小鳴焉今繇二千石擢拜是官眷注尤非昔比矣漢光武以張佚不難扵正朕故用佚爲子傳唐太宗謂李績不遺扵李宻故托績以孤㓜帝者爲子擇相類如此汪君之使河南也𬒳留乆之而卒完節來歸其在中臺也數犯天威陛陳讜論可屬晉王豈復有過扵君者哉則君所輔導視佚與績之所輔導者雖有本支之異而上之所以用君者與先武太宗之取佚與績蓋千載同符也巳鞠躬盡瘁啓沃彌綸以光孝友之行以拓維城之功以追河間東平之賢使晉邸綽爲令王保有社稷與國同休永永無疆上無負聖天子建親王之至計擇保傅之盛心固大夫士之所望而亦君之所優爲者哉君且行朝士之能詩者式歌以餞而屬余叙之扵是乎述葯房居士集序祝廷心傳曰見其禮而知其政聞其樂而知其徳後丗之禮樂不足徴矣因其文章而考其所遇蓋亦可以觀當丗之変也乎士之生也以萬事所集之身而行乎是非得喪禍福之途自非離世絶俗不接乎事與居乎至盛有道之世焉能使憂勞悲憤不介扵其中有以觸乎中矣焉能使怨懟咨歎不形乎其言夫以三代之際道術政教莫此爲盛也賢士君子莫此爲多也然考乎風雅之所錄和平愉樂之音不能勝乎憂戚頌美稱譽之辭不能當乎疾刺而况數千載之下時殊而事遠者乎漢唐與宋傳國各三四百年而其全盛無虞居其三之一士之幸而遇其盛者蓋甚衆至觀其論述猶或有艱窮無聊畏罪罹謗之歎蓋世治矣而家或不寧身遂矣而或不獲行其志叅差而不齊者固其理也歟則何恠夫言語文章之難乎出扵正也元氏之全有中國者九十有二年不以政柄屬諸士而亦不以法度訹之故士之仕者苟循理自守則可以致名位而無患禍然以父母妻子所託之身而不免與事接或任違其能叢以細故而繩以吏責亦烏能脫然無累扵其心哉若浦江鄭先生仲舒之所遇蓋世之所至少者也先生之家旣聚族而居事養撫育服食之須有常司冠昏賔祭繇役之事有常主自爲學之外一不以入其心而出仕扵朝歷翰林經筵太學太常或爲其屬或掌其教日從世之名人大儒雍容講說而未嘗預簿書錢榖之煩及乎運衰而社易奉身而歸爲老成人享甘脆華美之養歳時從賔客兄弟嬉遨燕眺子姓左右數十人無適而不可扵是屬文賦詩以述其樂余與先生逰從其從子叔度得其所著葯房居士集而讀之其言皆恬愉順適廣大和厚無所望乎外無所激乎中若不聞乎世之憂患者不平感憤之言無毫髮見扵其間噫是何其幸乎世之有志扵斯文者或奪扵事變而不得盡其才或滯扵寡聞而無以開其趣故至陿隘淺陋而不足傳也因先生之所遇以求其文因文之所稱以論其世是豈特一人之言也哉是豈特今世之所鮮也哉金華城川十詠詩序童冀金華漢長山邑也連山環抱郡城其西中斷如玦浙水出焉浙源發東白山繇烏傷西下經郡城南合華谿水爲䨇谿又北折東騖而入于江其山則北走嚴陵南極閩嶠東逾天台委羽以達海上之諸峯焉故自六朝以來號爲山水名郡余生長是邦足迹所逮者北之羣山若金盆紫巖者以十數金盆蓋晉黃初平牧羊地也紫巖則齊劉峻讀書石室存焉又其西爲金華洞天南上名山所歷亦以十數惟永康諸峯尤爲峻峭而巖靈石室則心所願逰而未遂者也洪武丙辰冬忝徵至京明年而職教全湘泝大江西上五千里凡吴楚名勝若九華匡廬之勝秀彭蠡洞庭之險與夫岳陽黃鶴之偉觀可以動盪心目者固亦多矣而猶以爲未屬厭也蓋全湘距舂陵不三百里舜之九疑在焉雖旦夕心所郷徃迄弗如志及再道衡陽距南嶽一舍而近亦弗獲寓目焉將造物者靳而不卑人乎良由是身匏繋故也曁來霅川覽天目之奇峭覩震澤之浩汗及鄕所經歷者視吾故山若有加焉雖美而非吾土昔人所以興歎也今同郡朱世庸不遠數百里走介吴中持其所居城川十詠徵余序引城川去予居纔數舍宻邇石室固平昔所願逰者也所謂十詠若華釜之峯棲霞之洞巳多歷年所其他若亭若軒若齋居若樓觀則創自朱氏也使徒有是境而乏軒亭之勝或淪扵閒曠有是室而非其境亦烏足以辱高人名士之篇詠哉聞朱氏之居其地今數世矣其所以克專其勝者必有其道矣昔之金谷華林午橋平泉其樓觀之偉花石之夥視朱氏奚翅什伯倍蓰也然而數十年間鞠爲茂草雖欲仿像其遺跡而不可得惟唐王摩詰輞川别業逮今猶可想見誠以篇詠猶傳故也朱氏之志其在斯乎雖然是境之勝固藉人言以傳其所以克世有其勝者則頼乎後之人有以持守之也朱氏之處此其必有道矣余髪種種旦夕得告東還或杖䇿一來克攬奇勝償其目力所未逮者亦足以酬素志矣嗟乎故山百里猶荏苒半世弗克一造其境則夫數千里外所謂九疑衡岳計終不可得而見矣然獲歸老故山逍遥林壑以優㳺卒歳所得不旣厚乎失之東隅收之桑榆尚幾焉送朱先生赴京考禮序謝肅自三代禮樂蕩滅于秦至漢代秦而帝去先王未遐宜可以復其禮樂而爲治扵天下矣然高帝不學而佐非眞儒故其爲治不能復禮樂扵三代殆亦叔孫通之責哉方叔孫通說帝之起朝儀也帝曰度吾所能行者爲之不過謂定君臣之位而巳固未及乎先王之禮樂以達于天下者也而叔孫通遂以興禮樂爲名廣徵魯諸生是以有兩生不肯行曰禮樂積德百年而後可興至哉乎其言之當也夫德先王所以化天下之本而禮樂其具也有其具無其本固不可也而高帝寛仁長者其豈無本乎曰固矣然漢承秦變古之後以古變秦其唯三代之禮樂乎㳂三代之禮而教民以中襲三代之樂而教民以和使中和之氣充塞天地則萬物不疵而王道成矣王道成然後損益三代以作漢之禮樂則漢其三代矣乎是或兩生之所藴也惜乎叔孫通學不足以與此不能終致兩生乃率諸生曁帝左右去三代之難采先秦之易以雜就其尊君枊臣之儀綿蕝而習之及帝旣行曩之醉呼㧞劒者莫不震肅而帝亦起皇帝爲貴之歎則叔孫通亦可謂達時之務矣然使四百年之漢遂以爲禮樂止扵如是而治化卒無以及乎先王者叔孫通之責也此異時賈誼仲舒王吉劉向之徒所爲發憤而增歎豈獨今日兩生之不肯行邪是故無兩生天下萬世無禮樂無叔孫通則漢亦無君臣之儀而漢儀固不足以當先王之禮樂也後世君相之圖治者其可不知夫學乎今皇帝緝熈聖學治倣先王混一初元命中書曁翰林大常率諸儒定擬三禮明年再命集議禮樂又明年偏徵在野道德文章之士相與攷訂之將以成一代之制也而吾鄉朱伯賢先生實在徵焉先生生東南㳺西北遭時多故歸隱山林飯䟽飮水益力扵學以學之爲王者事也故其論道德必歸之于三代之選其論文章必歸之于三代之英則今也應徵其能不援三代禮樂以爲國朝之治具乎雖然兩生不肯爲漢行先生肯爲國朝起是國朝之德之盛軼扵漢而叔孫通之學不足以齒今之侍從大臣也先生盍亦攄兩生之所藴使三代禮樂不得復于漢者而復于今日焉則賈誼仲舒王吉劉向之徒將不復發憤增歎扵異時矣非先生其孰能與扵此哉告行之日書以爲贈娥江送别圖序溧陽達公貫道丞越之上虞秩旣滿將朝京師邑人士相與送之娥江之滸公欲登舟輟挽止之咸咨嗟感歎不忍爲别扵是公起指江以語于衆曰昔吾絶江而東懼弗能佐理以忝朝廷寵命頼是父兄能教子弟能率三年無一事累我我得西渡江趣道千里以覲于天子何幸之深毋爲不忍余别也衆闔辭以復于公曰自本朝有天下以來官扵吾邑者不猛以厲民則寛以怠事不激以爲廉則察以爲智是皆不知從政徃徃不免故未有一人得赴中書以考厥績者考績中書當自公始公無彼數者之失有古遺愛之風哉吾等是以扵公之别不忍也乃再拜别公公登舟送者佇立水濵舟旣行猶注目不少瞬而公亦憑柁樓頋望踟蹰于時天霽潮平四山如洗木葉飛摵摵凉飈舉之與翔鳥泳魚相下上于中流使人别情紛擾益不能自忍也好事者繪焉題曰娥江送别圖將以寄公屬序扵余余謂送公之别不于他所而于娥江也何故蓋娥者曹氏女也其父盱善水以迎伍君爲濤所溺娥巳死援出父屍亊載漢史後世慕之故以名其江然伍君之忠曹女之孝臣子大節也公嘗以教邑人士今公之去邑人士必臨江以送者非徒不忘公教亦以願公克全大節也若乃區區不忍爲别烏足重爲公道哉姑倂書于圖末而能言者又繫以詩庻乎公之有以觀省也送徐先生歸嚴陵序高啓嚴陵徐先生大年嘗被召至京師與修元史書成上進詔擇纂修之士官之先生以老乞還甚力會春官議修五禮爲一代之典乃復奏留之未幾其書又成先生固申前請大臣知其志不欲強煩以事乃命有司具禮傳送以歸其鄉都之大夫士相與祖餞幙府門外有言者曰先生之學宜備顧問先生之文宜掌綸綍先生之經術操履宜在成均爲學者師今皆不可得顧令以布衣老扵家歸雖先生之志然豈不爲司人物之柄者惜哉余進而解之曰皇上始踐大寳首下詔徵賢又責郡國以歲計貢士欲與共圖治平甚盛舉也故待賈山澤者羣然簉庭如水赴海而隱者之廬殆空矣朝廷待以庻秩猶梓人用材鉅細畢取豈獨扵先生有遺哉蓋先生之爲政莫先扵順人情亦莫先扵厚民俗力有所不任者不迫之使必爲義有所可許者必與之使有遂所以人之出處皆得而廉恥之風作矣今先生以齒髪非壯厭載馳之勞戀考槃之樂抗辭引歸上之人不違其請者蓋將縱之山林使其鳥飛魚泳扵至化之中以明吾天子之仁又將以風厲海内使皆崇退讓而息躁競也順人情而厚民俗寔在扵是故寧失一士之用而不惜以其所得者大也不然先生豈苟去之徒而大臣豈棄材之士哉况先生之歸也必能著書立言以淑諸人詠歌賦詩以揚聖澤則又非㓗身獨徃而無所𥙷者也尚何疑哉吾又聞漢祖中興嚴光不屈後世莫不高之今先生之鄉卽光之郷也嘗逰其耕釣之處山高水長想瞻遺風必有邈契乎千載之上者矣今之歸其無負扵夙昔之志哉若余遭逢明時不能裨益萬一懷恩苟祿而不去扵先生蓋有愧焉矣扵是言者是之請書貽先生以識别贈錢文則序韓文公詩有曰我生之初月宿南斗蘇文忠公謂公身坐磨蠍宫也而已命亦居是宫故平生毁譽頗相似焉夫磨蠍卽星紀之次而斗宿所躔也星家者說身命舍是者多以文顯以二公觀之其信然乎余後生晚學景仰二公扵數百載之上蓋無能為役而命亦舍磨蠍又與文忠皆生丙子是幸而偶與之同也二公之名雖重當世而遭逢排擯謗毀幾不自容仕雖嘗顯扵朝而貶陽山謫潮州竄逐扵羅浮儋耳之間踰嶺渡海冐氛霧而伍蠻蜃其窮亦甚矣顧余庸庸雖不能致盛譽亦不為排謗者所及况遭逢聖明忝職禁署䝉恩賜還無投荒之憂是幸而不與之同也然二公之文章德業赫然昭映千古而余早罹艱虞中事奔走學不加修文無可采將泯焉為衆人之歸是不幸而不能與之同也噫命之所舍旣同則宜無不同而何相去若是之遼哉蓋窮達得喪由乎命智愚賢否存乎人存乎人者可為由乎命者不可必世之人常以不可必者責扵命而不以可為者責諸巳所以多自恕而倖得也若二公者其道同其文學同故毁譽窮達有不必其同而自同則佘之不能與之同者蓋有在也而豈命之罪哉山陽錢文則能推星以言人之禍福無不奇中士大夫多稱道之將逰湖海徵余言為贈因書所以自警者貽之且使遇夫自恕而倖得者告焉又則讀書好脩善鼔琴斯術其餘事云皇明文衡卷之四十
