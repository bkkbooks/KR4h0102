body:
  text: 碑孔氏家廟碑胡翰先聖孔子生于魯實襄公之二十一年至昭公十一年而薨門人㑹塟明年卽其故宅爲廟祀之藏衣冠琴瑟車書廟中漢高皇帝世祖皇帝明帝章帝安帝皆親幸闕里祠以太牢之禮雖魏晉南北用兵文帝黃初武帝太始皆詔修廟祀給灑掃守衛歷宋齊梁及拓㧞魏高齊之有國遂纉承爲令典方是時天下未有廟也至唐武德而後國子監有廟至開元而後郡邑有廟天下通祀之而家廟則惟魯存焉乾封以還車駕東廵者悉修漢故事周太祖平兖州以人主之尊伸北靣之拜如弟子禮情文崇極徽號屢加常以宗子一人襲封爵四時饗祀在宋曰衍聖公靖康之難衍聖公友端扈蹕南渡與其從父傳俱家于衢襲封如故而廟祀闕焉寳祐初郡守孫子秀請于朝始賜田五頃建宫墻于郡東北菱湖之上廣至二百餘楹事具庸齋趙汝騰記後燬於㓂廼徙城南宋亡元氏改物至元間曲阜之宗子斬其後以端友之孫洙當襲爵降㫖徴之洙入朝固讓特授國子祭酒歸守江南廟袥廟故書樓其制非寳祐之舊㑹兵革益圯壞不治已亥秋土師取衢州制以分省郞中姑孰王愷董郡軍民事公讀書通達治體至卽明法令布恩信與百姓更始謁拜廟庭以爲水木本源所繫不可無以示衢人命有司葺而新之告成之日族之長者少者衣服冠而趨旅牲幣于庭敬共將事願紀成麗牲之碑用侈公之賜翰惟孔子之道如天之高地之厚日月之明四時之運有不得而賛者取其故實書之以見詩書仁義之澤罔有窮極所以立生民之命開太平之治者帝王頼之咸致尊禮非他享祀可例由春秋以來傳序五十有三世廟于魯者禮也舍魯而南者宗子去國以廟從焉亦禮也禮之所在君子愼之况其子若孫人將曰此聖人之後也將以聖人望之崇德象賢異時太平修復舊制是宜有引無替昔周有淸廟魯有閟宫至今歌咏不足使人想見盛德之美翰雖不敏敢緣古義再拜而系之詩曰奕奕新廟有嚴孝祀誰其尸之文宣孫子纉緒魯邦世載厥美作廟于南㑹通之禮皇祖在上監無遐邇大夫師長百工庻士保有天常寔受王祉矧兹具瞻俾就傾圯顯允王公載振而起聿來孫子于公率履弁舄裳衣陟降庭戺黍稷鱐脯薦則有體亦有㫖酒式燕以喜盛德百世表是南紀匪南紀是表魯邦是啓惟聖是嗣孫焉及子言念伊始越國公廟碑越國有廟故參知政事胡公之將士洎邦人之所作也公殁之明年衆咸戴公之德慕公之爲人營建廟像于郡城之中區廟成之明年朝廷嘉念公忠壯寛厚扶翊興運弘濟艱難身歷百戰功冠一時不幸死於肘腋之變不可無旌䘏之典於是特贈光祿大夫淛東等處行中書省平章政事柱國追封越國公遣宿衞之臣馬哈謀致祭于祠敘述厥勞哀悼懇至罔有儔比公之冡子德濟拜手稽首奉揚休命以爲先臣大海一介甲胄之士誤承眷遇列備戎行自起義以來王師取和州渡江而南下太平進攻金陵保有其城遂東克京口以及毗陵西南㧞宣歙以及睦州由睦而東婺爲巨鎭婺下衢處皆平廣信亦平天威震疉兵不留行先臣嘗受命前驅不敢避鋒鏑矢石之危以率先士卒摧殄勁悍所至郡邑輙下未嘗以金帛子女之故妄事剽戮衆爭向附遂膺大任叅大政被國厚恩恒思以死報社稷御下悉推赤心待之兾得其死力耳故雖剚刃不悔也先臣旣沒國家益用兵上流舉湖湘漢沔之地於反掌之間又通巴蜀拊循嶺海又北城襄陽臨中原而扼其項背綿地數千百里先臣曾不獲與諸將分甘同苦竭肱股之力効尽寸之勞於疆埸是則天也皇上以乾坤之量日月之明兼覆廣照不求備下臣旣起臣德濟於衰絰之中授以兵柄襲有爵位又追念先臣之勞錫之封號登秩上公克有享祀于婺之人以焜燿其後嗣子孫先臣有知且不死矣臣聞因物之精制爲之極明命鬼神以爲黔首則若先臣之鞠躬盡力馳騖一世其氣發揚于上宜不可揜故有不虞之警往往於夢見之鐵靣長身毅如也蓋其志不忘本朝如此德濟不武典守東陲不能翦滅仇敵以雪先臣之恥昭國家之賜唯君臣父子之義惡能已哉尚爲我載諸麗牲之碑翰觀古將帥之臣有志不展而功業未究如岑彭來歙祖逖李嗣業者天遽奪之故公之功烈惠澤被于江左淛東浹于婺之人使天下望之而不加焉此其可扼腕也大烝之禮先王所以崇德報功者無所不用其極則斯廟之作非臣子之私於國家實宜之蓋禮之以義起者乎乃詩以歌之曰皇奮厥武耆定爾民疇若先驅則有虎臣虎臣桓桓如林之殷允也胡公實邁乃倫昔在有元雲雷遘屯失其金鏡華戎紛紜天造有邦肇域淮濆俾公來輔鐵靣長身爲國瓜牙克壯且仁秉戈山立超距川躍以歩易騎動罔不獲左則左攻右則右斫所向輙靡何敵不却何城不隳土宇斯拓自西徂東淛水洋洋公來制閫于睦之疆于以秉鈞于彼東陽連城惟五如水有防龍節鳥章弓矢殳斨背德者誅歸斯用臧邦有螟蜮公則是取鄰有封豕公則是拒不饉不饑由公我哺不札不瘥由公我袪公之於婺孔惠且時匪是我私王國是毗國有瘈猘人莫之知反噬而逞孰拯其危左右庻士小夫及耄相視咨嗟惟公是悼僉曰悼之尚罔或報赫斯不忘是用作廟作廟有奕享祀不忒先王制禮以致崇極嘉廼有德洎乃丕績曰惟大烝相古作則揭䖍妥靈有祠伊闢皇命使臣聿來稱秩最其勤勞爵以越國惟越國公肅然泠風志不克究澤則罔窮公今有子亦公是似踐其有位敵王所愾教忠之訓有永無替繼自今始其祀百世敕賜滁陽王廟碑張來儀洪武十六年十一月七日皇上親藳滁陽王事實召太常司丞臣張來儀諭之曰王之恩德注在朕心今滁有廟祀而碑刻未具甚闕典也汝其據此爲文于石臣來儀謹再拜奉敷謹按王諱子興姓郭氏其先曹州人王父少好術數常從異人遊得其書年長未娶南遊定遠邑人神其術將有爲叩之必驗邑中富翁家有處女以瞽未許嫁王父過其門翁以女命求卜數成曰此貴人也翁曰瞽未配王父曰翁能不鄙我乎則妻之翁曰諾旣而娶不數歲夫婦家日贍生子三女一王中子也始生父卜之喜謂人曰是兒得佳兆異日非常人必大吾家旣長兄弟别籍三人皆善殖産元未民間有造言者王誤中其說信之甚篤忽不事業而妄散家財隂結賔客至正壬辰汝頴兵起王識天下當變乃召所結賔客子弟㧞濠梁據之時皇上濳居民間爲訛言所逼懼禍將及遂挺身入濠梁抵其城爲門者所執將欲加害人以告王王親馳活之撫之麾下間召與語異之取爲親兵居數月王謂曰汝單居當爲汝婚王暮歸與夫人飲食語及斯事次夫人忽惋惜謂王曰方今兵亂正當收召豪傑是子舉止異常若不撫於家而使爲他人之親是失智矣王悟遂以女妻之孝慈皇后是也王爲人勇悍善戰時軍帥四人名位皆在王上王素剛直不屈人下毎遇事四人瞋目語難而王剖决通敏數以非語侵之衆故含忿未幾客軍首帥彭趙以兵來駐濠二姓皆僭稱王王等遂爲所制一日衆挾趙勢拘王於獄將害之皇上自軍馳歸或曰勿往曰再生父母有難可不赴乎遂入王家明日彭帥聞遣人釋王以歸明年夏還故里收元卒七百獻王王就令將之又明年夏染末疾未差王聞元義兵欲歸將說之左右無可使特過寢門示意赼趄因請扶疾往卒說降之得其精卒三千旣而彭趙東屯泗州因挾王以往時皇上方駐滁陽知衆不可其事獨堅守以待復遣人賂彭趙左右賂行王得縱歸滁陽王兵共四萬其麾下僅萬人皇上所部三萬有奇明年乙未王命守和陽旣而信流言親至和陽視師值王讐人亦駐其中聞王至移軍異處皇上禮送行者俄為所艱王聞驚懼得疾尋卒歸塟滁州夫人張氏生三子長戦沒次爲降人所䧟㓜與羣小隂謀伏罪次夫人張氏生女一爲妃生蜀王豫王如意王女二洪武元年天下既一剖符行封追思更生之恩寔帝業所始乃封滁陽王建廟墓陽命有司歲時率滁人祭之臣來儀伏聞自古帝王之興雖受命於天未始不因乎人蓋必有所佑助維持而後成及其旣成也其所佑助維持之者亦得與以享其榮傳之無窮而施之罔極惟我皇上奮布衣提一劒而起外無尺土一民之助而王能脫危難識濳微納于貳室授以兵柄慨然不少吝惜遂肇大業可謂有知人之鍳矣及今大統旣定四海一家推本尋源寔由於王爰建顯號俾永永血食蓋非王無以開萬世之業非皇上無以永王之名臣謹卽是爲銘銘曰皇受天命發跡濠梁方其始興附干滁陽滁陽先知識聖於微聖有大難王脫其覊取彼神龍翼之風雲浴日咸池滌其垢氛龍騰日升伊誰之功有相自天寔啓王衷皇奮無旅王命予之皇室未嫓王命女之謀行諫從肝膽弗疑萋斐之言終莫我離秉鉞專征付以閫外㒹强蹙驕有衆日大變生不意卒疾于驚何啓其緒弗享其成皇明日昌旣臣萬方剖符錫爵乃侯乃王爰念舊㤙極天罔報一飯必酬矧有大造乃封大郡乃建廟庭乃復滁人護其園塋祠官孔嚴報祀春秋罍酒鉶羹黍稷羊牛王其來歆母曰無後王女皇妃三王挺秀王支百世王有廟祀棼棼者雄孰王之似小臣受詔作此銘詩勒著貞珉以永無期徐文淸公祠堂碑朱廉宋徐文淸公祠堂在義烏縣南四十里之赤岸赤岸公里也公之𬒳䜛及奉祠家居里士朱府君良祐尊賢尚德誠意懇至命三子中受學於公凡公賈田築室之事府君悉心左右無遺力又度里之勝地作適意亭日與公遊息其間當是時公之高節大義聞天下賢士大夫皆有企慕不可及之歎而府君與遊相得驩甚三子在門又皆力學有立朱氏由是益大其後子姓聮登科第者接踵其經學行誼政績皆有出於人衣冠之盛乆而弗替淵源所自實本於公今年春乃相率就適意亭故址東偏構堂以祀焉旣又合辭謂廉曰公之殁當有祀於鄕而淑於我朱氏者爲大是以有今尸祝之宇吾懼後世彌遠而弗知也子其著文鑱諸貞石以示將來廉府君五世孫而私淑於公者爲尤深辭以無文是忘本也謹用摭取宋史傳文繫銘其下使後之薦奠於斯者仰瞻德義興起於學而毋敢怠忘傳曰公名僑字崇甫淳熈十四年舉進士調上饒主簿始登我文公之門文公稱其明白剛直命以毅名齋入爲秘書省正字校書郞兼吳益王府教授直寳謨閣江東提點刑獄以忤丞相史彌遠劾罷寳慶初葛洪喬行簡代爲請祠迄不受祿紹定中告老得請端平初與諸賢俱𬒳召遷秘書少監太常少卿趣入覲手䟽數千言皆感憤剴切上劘主闕下逮羣臣分别黒白無所回隱理宗數慰諭之頋見其衣履垢弊愀然謂曰卿可謂淸貧公對曰臣不貧陛下迺貧耳理宗曰朕何爲貧公曰陛下國本未建疆宇日蹙權倖用事將帥非才旱蝗相仍盜賊竝起經用無藝帑藏空虚民困於橫歛軍怨於掊克羣臣養交而天子孤立國勢阽危而陛下不悟臣不貧陛下乃貧耳又言今女謁閹宦相爲囊橐誕爲二竪以處國膏盲而執政大臣又無和緩之術陛下此之不慮而耽樂是從世有扁鵲將望見而却走矣時貴妃閻氏方有寵而內侍董宋臣表裏用事故公論及之理宗爲之感動改容咨嗟太息明日手詔罷邊帥之尤無狀者申儆羣臣以朋黨爲戒命有司裁節中外浮費而賜公金帛甚厚公固辭不受侍講力開陳友愛犬義用是復王子竑爵又請以周敦頥程顥桯頥張載朱熹從祀孔子以趙汝愚配食寧宗皆從其請金使至公以無國書宜舘之於外如叔向辭鄭故事忤丞相意力請休致理宗諭留甚勤遷工部侍郞辭益堅遂命以內祠侍讀不得巳就職遇事盡言以申前請乃以寳謨閣待制奉祠卒謚文淸嘗言比年朱文公之書滿天下學者不過割裂掇拾以爲進取之資求其專精篤實能得其所言者蓋鮮故其學一以眞踐實履爲尚奏對之言剖析理欲因致勸懲弘益爲多若其守官居家淸苦刻厲之操人所難能也銘曰侃侃徐公實踐眞知國之正臣士之碩師天與之氣淸明剛毅而不與時當宋之季權奸柄國婦寺蠱之崇論塞胷抑欝莫施進必以義亦列禁近凡所對揚直辭凜凜知有國耳焉知貴勢我位可貶言不可避周程從祀趙相侑食濟王復爵皆公禆益學之所宗自我文公啓迪俊髦澍雨春風赤岸之里有斐朱氏數百年來冠紳濟濟或立于朝或任煩劇文爲國華行爲士式端緒所開伊誰之力里有吉土公昔遊焉雙流右㑹雙峯列前有堂崇崇祀公其間公所授受斯道之􅎃道在人心精神罔隔豈必子孫而後歆格道之無疆公神不亡春秋觴爼牲酒鮮香明明千載妥侑斯堂𡵨陽武靖王勲德碑蘇伯衡故征北將軍開國輔運推誠宣力武臣特進榮祿大夫右柱國同知軍國事大都督府左都督曹國公追封𡵨陽王謚武靖之薨明年洪武十九年月日詔王子羽林左衞指揮僉事景隆嗣爲曹國公旣拜命使謂伯衡曰先王際逢昌運受股肱心膂之托感激圖報稱萬一畢志竭力死而後巳分也皇上仁聖嘉念不忘褒䘏之典備極哀榮今又不以景隆無似俾襲封嗚呼觀國家恩數之優渥至仐則先王獲上之有道可知矣不有以表著之是景隆忽君之賜泯親之善無以昭示天下後世也願有請於子爲文而刻諸石伯衡受其言而思之皇上誕膺天命統一萬方羣材輻輳共爲帝臣傑出其間而受上將之任者固非一姓至其生建國爵而死啓王封者僅四人焉曰徐中山王曰鄧寧河王曰常開平王而𡵨陽王其一人也彼三王者功業懋矣視王之不戰而城降不殺而人歸則有間且僞吳之滅由王覆之諸全元祚之終由王蹙之應昌遠若西蕃之地無不渉歷而疆理焉所謂有以服人於智力之外而勲蓋世者哉皇上眷遇加異無間存殁固自由此非徒以肺腑故而崇奬之也是誠不可以無述伯衡末學雖無能發揚頋嘗隷太史氏矧嘗獲望餘光而辱容接何敢終辭乃爲考其客白範所爲狀序次而顯詩之王以甲午冬見上於滁陽上喜甚子字之而擇師教之王亦奮自淬礪上察可任大事一日出其所業示近臣曰是亦可矣當習之馬上從濟江歲丁酉以舍人統帳前親軍䇿應池州道戰僞漢梟將余蠻子走之引兵攻下靑陽石埭太平旌德戰元阿魯灰院判萬年街敗其軍猫獠於濳昌化進㧞之盡獲其婦女畜牧輜重士卒志滿殊無戰闘之志王曉以此何足道誠克立功富貴不可言况財物乎士卒悟乃焚所獲轉戰淳安襲破僞洪元帥寨千餘人皆降從克嚴州時嚴新克城壁不完僞猫軍水陸猝至王帥兵踰烏龍迎戰大敗其陸軍卽筏列俘馘順流而下水陸望見驚愕引去乃繕城隍樹樓櫓爲不可犯之計移兵攻諸曁克之壬寅被㫖卽嚴開省控制東南猫將之戍金華曰蔣英者戕胡越公而作亂也微王星夜馳八城金華幾淪盜區矣諸曁守將謝再興之隂結僞吳以城叛也上命直諸曁之西作諸全州再興導吳軍鈔東陽浦江義烏使我疲於奔捄以撓我版築王提兵四靣應之宼計不得行而新城完矣僞吳司徒李伯昇之擣諸全也兵號二十萬壁壘亘十餘里報至之日廟堂不覺失色王不待詔以所部馳嬰其鋒軍龍潭諸全主將以衆不敵爲王危之間使請避之俟大軍至共舉萬全王笑曰何以避爲在昔衆爲寡所敗者何限獨不聞昆陽淝水之戰乎兵在精不在衆何以避爲乃下令曰今日之事唯致死力則無不捷捷則敵之資若等囊橐中物也敢有貪鹵獲而戰不力者以軍法從事兵交將士皆奮王䇿馬從數十騎出敵背舞槊衝其中堅遇者應手斃陣動麾衆乗勢縱擊人馬交馳戈甲戞札遂大潰城中亦出兵夾攻同聲驩呌振動天地斬首數萬級俘將七百人卒萬餘人其自相蹂躪與䧟溪水溺死幾盡脫去惟伯昇及其親從數人鎧仗委棄盈野僞吳兵力自此焉衰大軍未啓行而捷書至也入見上慰勞王悉歸㓛羣帥若無一毫巳出者上遣中山開平兩王總諸衛兵攻蘇州而平浙獨以属王遂進兵桐廬新城富陽隨下獨餘杭以謝再興五子在懼益固守王曰以李司徒二十萬之衆不能抗我爾以一縣而欲吾拒乎急攻之終日而㧞將校請屠之王厲聲曰二三竪子逆命耳餘何辜焉不屠行未至杭守臣潘允明使其員外郎方彝走軍門見王王問彝何以來對曰天兵如雷如霆當者無不虀粉杭城生靈百萬前矛且至人人恐恐然及明公所至布宣德意勞來安集閭閻之民骨肉完保至于鷄犬亦莫弗寧又人人大悅曰王者之師也惟恐來晚我守臣以爲民情如此天意可見矣夫誰與明公敵哉不如頓首乞降民有更生之望軍無就死之憾以故使彞來耳曰勝負未分而請降無乃太早計乎對曰兵至城下雖欲降且無及矣王燭其誠留宿帳中明日遣還報允明卽日率百司降王入軍容之盛紀律之嚴君子比之淮安王之下宋且以謂淮安王之下宋也猶待往返約降今不約而降殆過之矣紹慶台温皆款附丙午冬十月十有一日也不出期月不血寸刄平一大方面而攻蘇者丁未九月始破之縳士誠送京師明年洪武建元之春閩將陳友定之衆騷動命王帥兵殄之王徃知閩溪等砦大率未孚於新政柵窮崖絶谷以保族逃生納其降而建州劔州汀州悉定竄匿而嬰孩遺棄道路者踵相躡也悉收飬之父母來識認還全活不可勝計其秋大軍取燕都元順帝出走而燕都以北諸城堡猶城守宜濟師二年春拜副將軍以徃由遵化度鹿兒嶺敗江文清軍於錦州次全寜遇野速丞相軍與戦連敗追至灤河斬宗王慶王遂圍大興料其必潰而遁乃八分千兵伏要害虜果宵突圍遁去遇伏遮擊得去者無幾禽平章鼎住斬轅門進克上都其秋開平王薨于軍中其軍詔王倂將之遂併將徃援慶陽從涿州過眞定度滹沱河出井陘口至大原而中山王已㧞慶陽矣聞大同急集將佐語之曰上委我與若等汛掃旃裘殘黨今慶陽已㧞而大同受圍則移援慶陽之師以援大同豈非上所以委我等之意也一軍皆曰主將言是主將言是乃由代郡踰鴈再至而至饅頭嶺禽平章劉帖木穆馬邑縛黠虜四大王白楊門前軍距大同四十里營焉王至曰此豈駐兵地乎虜設來犯難爲備矣麾之前五里阻水列營是夜虜來攻營王高枕若罔聞知以二營委敵使自爲鬪天且曙王徐起不介馬分左右翼鼓行疾馳薄其陣聲撼林木城中探知王至開門驅衆赴戰虜腹背受敵靡地而殱之流血膏野追北至炭窖獲其名將脫列伯生口以千數馬以萬數其車輜雜畜悉爲鹵追兵至莾哥倉乃還順帝之出走也屯昌州蓋里伯遣脫列伯等攻西京規克復至是始北奔三年王以征虜左將軍致討師出野狐嶺興和守將降察罕脫兒其將又降乗銳夜襲應昌克之元太子騎而獨奔去執其子買的里八刺及兩宮后妃宮人玉冊金寳歴代重器致之闕下追奔不及還次中興禽汪國公曁其士馬松州利州之間隘曰虹螺山殊險絶世家貴族率保其上師過爭脫甲投仗出降王撫以恩信散歸巳降之郡親属流落行間者訪問還之其冬大封功臣召還初王以帳前總制親軍都指揮使兼元帥守嚴由指揮樞宻同僉由同僉左丞爲右丞在嚴十年浙江平拜榮禄大夫本省平章政事至是加開國輔運推誠宣力武臣特進右柱國同知軍國事大都督府右都督曹國公食祿三千石賜鐵劵四年兩川平上憫其民新脫鋒鏑以宣撫付王時月之間民大和浹五年依舊與中山王征迤北而東道兵則王節制次可溫虜棄營走哈刺莾來尋益北走王曰虜褫魄矣可襲而禽我當輕兵兼程而進乃留輜重廬車河人持二十日糧深入至土刺河其將蠻子哈刺章悉其騎渡河陣而待部署我軍而兩之王自將一軍從流上而與之合一軍將以都督華雲龍從流下以分其勢有徤將出衆豕突而前王發矢殪之虜舌吐不能收遂戰兩軍掎角且戰且前至騁海而虜騎滋多乃整險椎牛具食謾為犒大軍者虜疑相牽解去留騁海三日全軍而還失道乏水軍多渴死王以為憂次歌而麻思行尋水處忽所乗馬蹄地出泉軍得以無渴若有神助云還次代郡其明年將出朔州者生致太尉盧伯顔不花其明年春分兵出討一軍出三不刺永昌侯藍玉將之一軍出楊門都督張某將之一軍出白登指揮景某將之其秋攻下大寕髙州大石崖虜将畨平章陳安禮木屑飛若宗王朶朶失理眞珠驢若鄧國公孛維帖木兒若丞㫖百家或斬或禽而北地悉平後一年秦王晉王之國皆王扈北還遭隴西王䘮居憂後一年西畨平起郡縣其地第匾都城扼其喉襟還至西安以其民病鹺水也言於秦王穿渠貫城中通九龍池水以利之汲者飲者皆額手謝自後留中叅决朝政蓋勲戚而賢無右王者上厲意乆矣以征討事重故未睱也王出入大内上所嘗履地未嘗敢蹈其小心謹愼如此又所區畫動合㫖意上益爱重之侍中坐論康濟之道往往至夜分王感見信之深見問之切披肝瀝膽以效啓沃禆益弘多諸所見聞外間無得而聞亦無得而著然天下稱之其風烈可想見焉方仰望以致太平而十七年三月戊戌竟薨于位享年四十有六其豈非國之殄瘁民之無禄也夫故薨之日上爲之震悼三日不能臨朝天下莫不欷歔痛惜焉於戯天生聖人纉開正統王出而任專征之責馬首所向如風偃草名都望郡以及部落智者謀無所施勇者力無所措靡然稽顙而降附小夫牧竪深閨婦女聞王姓字愛慕如父母於是舉羣雄而脫距角合四海而登于混一非體上之深仁弔伐能如是乎抑亦可以表王之盛徳矣王為人寛𥙿而周宻明察而嚴重樂善而好問容衆而汎愛心不和於貨利志不惑於聲色喜慍不見言笑以時凡行師未嘗妄殺旅拒攜貳者不得巳加兵吏卒犯令按以軍法輙慘然終日不懌部曲或病親視醫藥部卒死其遺孤無所歸教育之材者請官之百戸陳恭戰死其子從母嫁李乙乙後犯法吏議籍没其孥王曰妻非陳妻子固陳子也奈何没入入奏出之大同之捷執其名將脫列伯以至王釋之延坐共飯其他故官名在俘籍隨材收敘不使失所浦江鄭氏聚族而居者十世元末兵爭之際舉宗避而去之山谷間王下令召還而戢士卒不得入其里門毀傷其室廬王蚤師當塗潘廷堅後過當塗必謁巳然後就舍舘在浙東時金華老儒葉儀范幹胡翰從王招延講聖賢之學王敬事之不啻弟子之於先生及位中朝致書候問入再拜而授使者今國子博士致仕吳沉嘗以王之命長釣臺書院食其俸以餬其口而有司勾考錢糧追其俸爲斛七十王度沉貧不能償遂代償之賔接賢大夫士分庭抗席而坐不以位望隆重有幾徽驕矜此皆人所難能唯王德之盛是以行之無難矣於其所薄者猶然况於其所厚者乎晨夕必展謁家廟時祭必齋戒三日在隴西王所言必稱小字祁寒盛暑必冠帶侍立不得命不敢退容政無大小不稟命不敢行痛公主之早薨言及必涕泗交流其歸改塟也行距茔域里所下馬括髮跣哭如𥘉喪喪隴西王也絶口饘粥七日淑德夫人喪亦如之此豈勉强乎哉嘗自言㓜時讀書不滿十月然於經史奥義帝王爲治之要古今理乱盛衰之故無不周悉上表奏每舘客具藁能指摘其瑕類而潤色之代祀㤗山賦詩十有一篇雄渾而温雅有古風人之思他述作稱是乃知天壌之間間氣所生固自無乎不學而能究而言之豈非所謂名丗者乎謹按王諱某文忠字姓李氏泗州盱眙人高曾祖考封贈不錄子男三人長今曹國公也次某次某女二人壻曰某曰其孫男一人某女一人尚㓜王薨敕塟鍾山之隂神道有銘而又有家庙碑今董張二公之又具存王平生嘉言徽行此有不重述者可考見焉詩曰聖神受命爲天下主豪傑景從其來如雨則莫若王材全德鉅天實生之爲帝心膂王𥘉上謁年未三五帝曰朕甥鞠于內府訓之迪之允文允武乃命之将統玆禁旅堅城勍敵一鼓而取維時浙左立國攸恃不有親賢疇堪付卑乃申王命於斯總制龍節虎符內綏外禦德威惟威近懷逺企有苗臣附方亦委質彼惛者張獨罔頋忌水陸入宼輙衂而去乙巳之春裒厥精鋭偪我新城侮我無備邊吏驚告王曰何畏提兵問罪蹂以突騎鼓躁乗之聲撼天地譬以戎輅轢彼螗臂其軍廿萬幾無噍類旣覆其軍遂奪其氣姑蘇之克由是而致姑蘇克矣浙江平矣台温慶紹莫不寕矣砠彼七閩廓其清矣大軍雲合取燕京矣帝謂王來成筭陛受婉孌元君雖云出走尚聞假息欲圗進取汝師汝督徃扼其後王辰奉辞行不逮酉烝徒肅肅晏及雞犬得地得衆易於拉朽或擒或誅莫匪戎首頟額應昌逋逃淵藪不虞我師奄至左右俘厥孱王以及妃后豈無寳玉亦有璽綬奏凱來朝喜動宸極都督上公特進柱國鎔金爲劵以莫不錫王拜稽首大勲之集社稷之靈天子之德亦師之武臣則何力元社雖屋元運雖訖餘孽猶存臣遑暇逸請揚天威覃彼有北帝曰俞哉朕固汝必歲凡三周師凡六出何深不入何城不克何強不服何醜不獲豈曰窮兵爰拯其溺均吾赤子何謂戎狄遏彼西畨白日所沒王且往釐申畫郡邑矧玆全蜀其有不卹文軌旣同大統以一帝有温詔汝克輸忠弼成鴻業樹此駿功尚左右朕圗惟厥終文致太平虞周比隆王拜受詔夙夜在公以經以綸忘其癏痌三旬在告遘玆憫凶朝則有士野則有農茹泣相弔吾将曷從我謂我王間氣所鍾生爲人英殁而愈雄在天乗雲上下從龍為雨為霖品彚其蒙况也嗣子綽有王風責難陳善祗事两宫継志述事式和華戎潤澤所𬒳中外攸同則王汝祚寕有終窮豈以死生而殺而豐是用作詩以告萬邦皇明文衡卷之六十四
