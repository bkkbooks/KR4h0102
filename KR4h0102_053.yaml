  text: 皇明文衡卷之五十三
  hash: sha256:ba50ba5e768df068f4ea53dc2adc16d869dfa4e02ea5cd6d9c985ff752d170c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_053-1a}
body:
  text: 雜著空同子瞽說二十八首蘇伯衡秦穆公使三帥襲鄭及滑鄭商人弦髙遇之以乗韋牛十二犒師且遽告于鄭孟明謂鄭有備㓕滑而還皇武子言于鄭穆公曰輕財之謂賢制勝之謂能其弦髙之謂矣夫髙將市于周遇秦師于滑知其包藏禍心求逞於我不愛其乗韋與牛十二用之犒師以息鄭國可謂輕財旣犒師矣遂奪其心三帥知我有備氣沮計窮暴骨是懼歛兵而退可謂制勝不然秦師奄至誰其禦之我之弗知何以能備孟明西乞白乙攻我于外𣏌子逢孫楊孫應之於内存亡之數未可知也今甲兵不試邊鄙不聳勍敵逺却社稷用寧髙力之以功莫大焉舉賢用能賞功所以爲國也君請圖之以勸來者穆公曰無遺於善而民知所適何以弗爲遂召弦髙賜焉髙稽首曰臣草莾之臣未嘗獲齒君之輿隷惟是貿遷有無以利民用臣之職也方秦師之東也不虞相遇于滑不及以聞于執事輙致君之命有犒于其師出臣之位矯君之命死有餘罪君惠免之而不以戮爲幸已甚何賜之敢覬覦先君桓武莊文勲在王室天鑒其忠祚我子孫恤其菑而捍其患秦師之不克逞志于我則由此故也臣何力之有而君歸功於臣而賜焉使人謂君以臣之故而賞僭也無乃不可乎貪天之功以爲巳功猶竊人之物以爲已物也罪又甚焉其敢幸秦師之退而自爲功乎若曰不腆韋牛臣之自輸於是乎歸焉臣雖賈竪又敢取之以犯不義乎臣聞爲人子不敢私其財義也故雖子之財父實有之子之道臣之道也如是自臣身至于妻孥私家孰非君之有哉寓於臣而已非君實寓則臣焉取之牛韋在臣猶在君也輸以共用固其所也若私君之有曰我之有而求歸焉夫豈義乎獲賜而亡義又焉用之且微社稷之靈先君主君之福秦師有進而無退傳于城下其誰獲免於執干戈以事捍禦乎臣將覆亡之不暇而况能有牛與韋乎今􅗲福于君不惟全其首領亦完其室家矣其爲賜也不亦大乎豈獨臣受賜雖國人皆受賜而臣重有賜焉人將謂臣無厭而懼且以爲僇矣君無庸賜之是免臣于僇而納之干義也請辭之穆公曰成子之名而敎民以義何故不爲遂許髙君子於是謂鄭穆公君矣皇武子臣矣弦髙民矣聞善而能從明也見賢而能推忠也有功而不德謙也明以撫衆君之道也忠以事上臣之職也謙以自居民之行也君明臣忠民謙求國無治不可得也此鄭之所以免於秦之師也魯宣公稅畝孟獻子諌曰魯諸侯之望也諸侯之望魯也曰秉周禮也今稅畝是棄周禮也以秉禮聞而棄之諸侯其謂我何先君隱公以我許田易鄭之祊君子猶且非之曰有王制在王吏若以疆塲爲問將何以辭其大討矧取民有制而可逞君之欲乎昔者先王經土地而井牧其田野畝百爲夫夫九爲井井九爲邑邑四爲丘丘四爲甸甸四爲縣縣四爲郡以任地事而今貢賦凡稅歛之制於是乎定焉大國食者半中參之一小四之一而其取民也皆什一焉什一制之謂也制所以律貪而禁暴也夫先王封建諸侯使治民而食其力以利民也豈厲民哉故爲之制食於人者雖貪冐弗使過焉食人者雖鄙嗇弗使不及焉是故制猶水之防焉防猶不可决而况先王之制乎上所以取乎下下所以奉乎上也不過什一爲月乆矣而君過取焉譬則决水之防也夫君人者上承天王下撫庻民而踰制歛財其無乃非義乎踰制蔑君歛財毒民蔑君君怒毒民民怨若怨怒並興禍亂將至抑國家之不能安靖而君焉逞欲越自魯公撫封于少皥之墟十九世矣土田是賦以給公室有自來矣載其儉德百事攸共臣未聞其不足也而今不足焉庸非竒慝奢淫之日新乎四者所謂蠧也府庫空虚則職此也不然夫豈不見稅歛之時入則足用在三事而已一曰窒欲二曰節用三曰由禮三者之中禮爲之體必由乎禮而后動焉非禮不欲非禮不用如是則什一無弗足也若動不由乎禮非禮亦用非禮亦欲則雖什二又何足之有詩曰無念爾祖聿脩厥德無亦鑒于先公而惟三事之是務焉用稅畝詒怒速怨示貪臣恐所獲不如所䘮也君其圖之弗從遂稅畝君子曰魯之不競也宜哉浚民以從欲長國家者患無民不患無財紂有鉅橋之粟鹿臺之財而曰獨夫無民之謂也若之何浚之古之人君知國本之在民是以用其賢能爲其司牧授其田宅敎其樹畜開其衣食同其好惡恤其疾苦𥙷其匱乏遂其庻富致其勸懲興其孝悌忠信本旣固矣而後邦寧三代異制厥道一也今縱不能損上益下而又瘠民以肥巳自伐其本矣而魯之不亡所謂一世無道國之未艾也成王問君奭以守成之道對曰恪遵成憲崇信苟老無取昔命令而紛更無陋舊模而改作王曰其要何居對曰在詩有之如臨深淵如履簿氷在書有之予臨兆民若朽索之馭六馬王曰不已懼乎對曰十圍之木植之非二三百年不大及乎伐之也不累日而仆矣九成之臺築之非踰時閱歲不成及乎毀之也不累日而夷矣成之難而仆之易也如此成之難而毀之易也如此安得而不懼也周之天下后稷建之公劉篤之太王拓之王季勤之文王武王成之此十圍之木也此九成之臺也如之何其無懼也夏之民嘗去桀而歸湯矣商之民嘗去紂而歸周矣王不聞乎撫我則后虐我則讎如之何其無懼也魏文侯問李克曰國何貴李克對曰貴士文侯曰何貴於士李克曰兆民之庻君不能自撫也三軍之衆君不能自馭也百職之富君不能自脩也萬事之煩君不能自理也而士者君之所與撫兆民馭三軍脩百職理萬事者也得士則兆民得其生三軍得其所百職得其宜萬事得其序而君得以安冨尊榮詩曰濟濟多士文王以寧得士也狐偃曰仁親以爲寳貴士也士之貴也尚矣楚有子玉晉文側席吳殺子胥勾踐進兵燕用樂毅齊不能支魯亡季孫邪亦相侵士之用舍國勢之強弱係焉何得而無貴乎三仁旣去殷國遂墟二老來歸周業攸成伊尹就桀夏社未亡百里奚至秦虞公以㓕士之去就社稷之存亡係焉何得而無貴乎文侯曰焉得士而與之共國哉李克曰知之則用之用之則任之任之則信之信之則不以小人間之則士之在天下者皆將竭蹶而至矣知之而不用之用之而不任之任之而不信之信之而不免以小人間之則士之在國中者皆將治任而去矣文侯曰善於是師卜子夏田子方客叚干木相魏成任翟璜西門豹以吳起樂羊爲將用屈侯鮒爲子擊傳而魏之爲國也天下莫強焉君子曰無競維人信矣哉不然三晉地醜德齊魏何以無敵於天下也楚王入于雲澤若虎兕若雖玃若鹿豕若鳴鴈若鵁鸕若􅒗鶬若鷫鵠見王無不恂然决起翔者奮飛走者遐竄髙者入雲霄下者伏灌莾有錦雞焉方吐其綬而王適至收綬而後作王見其綬五彩競明恱焉左右關弓再欲射之王再止之命虞人曰其生致之虞人得之已乃縱獵者凡鳥獸之屬或殪于鷹犬或隕于鋒刃或傷于網羅而雞獨免焉明日王謂宋玉曰之雞也得全其生以綬見樊于籠亦以綬然則士將奚處宋玉對曰此雞有綬藉使深藏矯乎其飛㝠㝠大王何見焉彼虞人且烏乎取哉故其無逃於樊籠之間非綬實爲之吐則使之也嗟乎士無以材自胘哉空同子曰陸贄之召爲翰林學士在建中之𥘉盧𣏌之相在二年至四年以李懷光論奏而貶𣏌新安司馬𣏌之爲人懷光猶知惡之贄與之同朝三年矣未嘗顯斥之第因奏議微示論刺而已及其旣貶乃聲言其奸邪致亂贄之擢中書侍郞同平章事在正元八年裴延齡之判度支在七月贄於時極言用延齡之非德宗不聽十年十一月猶上書歷數其罪惡而贄竟除太子賔客使贄惡𣏌論𣏌如惡延齡論延齡則𣏌之貶當不在四年其惡亦當不至已稔又何自致朱泚之亂而有奉天之幸哉方𣏌在位也贄則不顯斥其奸邪及𣏌去位也贄乃追咎其致亂而贄之於延齡也則始終言之不少置謂位不同也則學士號内相猶之爲相也謂時不同邪則𣏌爲相日贄諌非不行言非不聽也此何爲哉然觀贄語所親曰吾上不負天子下不負所學他何所恤可謂不以得失爲患者也而於此不能使人無間然余是以累歎而深惜焉辟閭氏蒲盧氏過義渠氏義渠氏舉觴觴焉辟閭氏心若不快中酒屢興歎義渠氏曰吾聞惟酒合歡今子中飮而歎無乃有隱憂乎辟閭氏曰吾聞危莫危於上下交征利時之人無有賢愚貴賤老弱惟利之是好以故私憂之耳蒲盧氏曰若好利則有之矣若謂老弱貴賤賢愚無不好則豈其然乎辟閭氏曰子以我爲不信吾與子行試之乃懷金錢數十與蒲盧氏義渠氏俱出北關外遺其二道上而伏隱處窺焉少頃一樵夫負薪過見金錢俯拾以去辟閭氏走從隱處出復遺二金錢而伏有頃一童子驅羊過見金錢俯拾以去辟閭氏出遺金錢如初尋一媪行過不拾而去辟閭氏怪之追問媪曰何之媪曰家貧將入城從人乞貸耳曰媪且欲乞貸于人道上有遺金錢何不拾也媪曰耄矣恨不之見耳見之安得不拾而已乎遽問安在辟閭氏指以告之媪方俯拾一人騎而與從奴數人來見曰此我所遺也媪何得取命其從奴取之去辟閭氏曰媪非老者乎童子非弱者乎樵夫非愚且賤者乎騎者非賢且貴者乎而見金錢無弗取吾之言其弗信矣乎蒲盧氏曰然則奈何曰惟義可以治之義明則廉恥興廉恥興則取予不苟矣雖然義其貝也非其要也曰何謂要曰上之人以身率之儉德是恭屛去淫侈取之以道無富之貪則其要也故曰苟子之不欲雖賞之不竊在上者從訓以義而不敎之以身其曷由知所法也不奪不厭矣空同子過北邙山見叢塚焉喟然而嘆曰人乎人乎其王侯將相乎其巨家富子乎其百工技藝乎其俠客釋氏乎其駔儈乎其甿隷乎其操瓢者乎其人奴之類乎其鹵簿鼓吹前挽後擁而歸之斯乎其束縳而遺之斯乎其殣而埋之斯乎其始將錮三泉而天文地理之畢具乎將便房􅌳道門闕罘罳之極其壯麗乎將秘噐臣妾之備置乎將穿不及泉而丘壟之無處乎將不封而不樹乎其中將珠檽玉匣黃腸題凑乎將桐木爲棺葛藟爲緘乎將厚衣以薪乎將倮而反其真乎嗚呼噫嘻蓋皆不可知矣况乎其主名邑里可得而稽乎但見華表摧折穹碑剥落土花斒牛羊礪角可悲也夫牧竪縱橫汛掃不至漆燈已㓕隂燐昭㫼可悲也夫蒿萊没垣麒麟欹側翁仲無言白日自没可悲也夫衰草離離露冷風凄罔象出没狐狸嘯啼可悲也夫言未卒傍有樵者曰唉又何足悲哉人齡踰百如電之流如駒之馳方其生存或窮或達或盛或衰而貴者賤者尊者卑者富者貧者智者愚者雖歡欣得失用舎夭夀參差不齊及大期之奄及倐長逝而莫追計如桑孔辯以秦儀雄如項籍巧如工倕腰懸章綬手執璧圭布視錦綉塊視珠璣雖欲不同爲螻蟻之歸得乎唉歳月荏苒寒暑推移則其骨毛齒瓜亦將澌盡而塵飛頽然獨存者第敗塜之纍纍而已而四五世後不復能守則丘壟塋域又將爾耕而我犁蒼然如故者特空山之巍巍而已而此理勢之必然從振古其如兹夫子何乃不能忘情爲之佇立而歔欷也雖然萬物之間衆人之中維賢維哲立德立功坤翕乾張蟠地極穹有生有死雖衆攸同其英䰟靈氣則不随草木而腐壞其令聞廣譽則長並天地以無窮苟能如是則善矣尚何彼之悲爲唉宇宙有不朽而不務之方蠅營狙詐舞女用機競浮榮於旦暮較强弱於錙銖俯有拾仰有取爭勢利計崇􅋻將其肉未寒而名已泯何舉世之没没蚩蚩也空同子曰善哉去其徤羨脫其放覊放乎山林弦琴誦詩進德脩業惟恐後時海賈謂漁者曰我之賈于江海也大舟如山後不見前檣髙入雲航廣彌天竒貨異寳填委其間眞臘流求川蜀荆蠻乗風駕浪朝往夕還獲利至速以慱用力至逸以安爾何不操我之舟以利天下以濟不通乃駕舴艋而浮㳺溪澗之中低㧪短蓬坎窪其容輕如浮梗迅若飛鴻倐依淺瀨忽縁長谼漿蕩乎浦溆之裔纜繫乎蒲葦之叢舉􅊻得蝦投干取鰅以給衣食以活妻孥抑何陋歟抑何愚歟漁者曰貨寳者盗賊之餌也江海者風波之區也分薄而利厚未有不困者也力小而圖大未有不危者也與其冐風波之險孰若卽安於浦溆之有餘與其懷盗賊之憂孰若取足於魚蝦之無虞大舟之利吾豈不知顧力有所不足而分有所拘耳使吾舎漁又何覬覦乎乃歌曰我舟一葉兮可安居兮我魚數寸兮可充虚兮候之豐兮憂之大兮我何以渉江海爲爾毋我愚兮我寜爾随空同子聞之曰漁者其賢乎夫能量力者必守巳能知分者必安命安命則不貪守巳則不競不貪近乎仁不競近乎義義且仁漁者果賢乎使人皆爾也又何至冐利而黷貨希寵而狥勢輕性命而履危機昧廉恥而即汚穢皇皇而不知老役役以至于斃也哉空同子行於河濵見漁者視其納則繒也觀其所得之魚宛轉噞喁鱗鬛莫辨則其大者才如指而已顧謂門弟子曰先王發政網罟之目必四寸而魚之鬻于市者必滿尺何其仁也當是之時魚鼈之類咸遂其生又何幸也今繒以爲罔而魚之如指大者登鼎爼焉甚哉乎魚之不幸也甚哉乎漁者之不仁也漁者曰嘻是何足怪古者取民率什一後世則太半矣古者役民歲三日後世則終歲矣古者山澤無禁關譏不征後世則以山澤關市之征爲經費矣然則不幸豈直魚哉不仁豈直漁者哉空同子乃歌曰列彼下泉浸彼苞稂慨我寤歎念彼周京歌已而歸歸而顰蹙者累日於陵生問曰黃帝堯舜垂衣裳而天下治信乎曰信曰自黃帝堯舜以來居其位未有不服其服者而天下之隆平何以弗若唐虞曰大哉問矣衣裳之制始於黃皇而備於堯舜其繪於上衣有日月星辰山龍華䖝焉其綉于下裳有宗彛藻火粉米黼黻焉所以象德也夫豈爲身之章以起人之美觀乎是故明目達聰無逺不燭日月星辰之照臨也恭已無爲萬國咸寧山之鎭也聖神文武之難名􅐶哲温恭之不測龍之變也命九官以熈庻績而禮樂刑政粲然華䖝之文也宗廟享之子孫保之虎雖之孝也惟精惟一藻之㓗也光𬒳四表格于上下火之明也十二牧之疇咨六府三事之允治烝民之粒食米之養也誅四凶而不疑舉十六相而不惑黼之㫁也定天下五服十二州立牧而建長内華而外夷黻之辨也然則聖王之爲衣裳也所以象德也非聖德之有似乎十二章由十二章而聖德爲之昭焉故也服其服而有其德此乃天下之所以隆平也服之在身德之不足而垂拱焉殆與被偶人以文綉而坐之巖廊之上無異矣欲天下隆平豈可得乎居堯舜之位服堯舜之服備堯舜之德而治不唐虞之若吾未之信也於陵子曰服以象德德欲稱服夫子之言至矣非獨天子爲然公侯卿大夫皆當然也不然幾何其不爲彼巳之子也哉空同子曰三代之後取天下不必皆由仁義其才智髙出於天下則取之矣至於維持天下係乎風俗維持風俗係乎政敎則無古今一也故政敎之得失風俗之美惡乃天下安危存亡之所係而國勢之強弱弗與焉何以知其然耶西漢十有二君而其六君者賢君也成哀雖失德然禍不及民其國勢可謂強固難動而王莾以斗筲穿窬之材不下陛而取之所以然者由髙帝自謂得之馬上安事詩書其政敎不脩其風俗不美也東漢自安順以下日入于衰亂而桓靈之虐與三季之主無大相逺冝其勢之易動而董卓吕布袁紹袁術皆有絶人之姿曹操功蓋當世而才百倍於莾此數人者莫不竭其智力而終莫能得焉所以然者由世祖敦尚學術興厲名節以表正之明帝開設學校尊禮師傅以作新之政敎脩於上風俗美於下也然則政敎風俗之於天下豈細故哉時君世主之務宜莫此之急矣或者乃以爲取天下旣無難則保天下宜亦易易然而於凡大閑漠乎其不留意也可乎哉可乎哉空同子過鍾離氏鍾離氏方以油和松脂爲膏塗竹枝凡盤盂几席簾幙窻戸間無不樹之空同子曰何為曰吾以除蠅也油香而松脂粘蠅逐香羣集焉無得脫者曰蠅螫子手足乎曰否曰蠅嘬子血肉乎曰否曰然則子何疾之甚而務除之至于此極也曰彼雖不善螫人嘬人而善胘人衣之白也涅之而黒生焉冠之黒也點之而白形焉吾疾其黒白而白黒也以故誓不盡除之不止也曰子知蠅蠅之善眩而不知人蠅之善昡尤甚也曰何謂人蠅曰屬耳于垣隂伺言語非人蠅而何巧言如簧離間骨肉非人蠅而何以佞為賢以詐爲忠非人蠅而何以正直為回邪以剛方為專恣非人蠅而何子奈何不務除之也曰蠅吾知所以除之矣人蠅遇焉將何以除之哉曰公以存心德以為聽好惡之不作情偽之灼知是非之莫惑凡人貌而蠅行者不信之而怒之不恕之而誅之則彼雖欲白吾黒而白無得而加焉矣雖欲黒吾白而黒無得而措焉矣巧言之詩曰君子如怒亂庻遄沮君子如祉亂庻遄已巷伯之詩曰取彼譖人投卑豹虎豺虎不食投卑有北有北不受杸卑有昊空同子掩書而起曵杖而歌曰黜吾知任吾眞佚吾形抱吾神兩耳之存六用之泯人乎天乎天乎人乎吃者闕翁聞之蹷然謂空同子曰夫子殆非故夫子矣何今之歌者異乎昔之歌者也空同子曰今者造物補我一竅吾逐與舎聰氏為友乗無形之龍以適無象之野而遊乎無聞之郷處乎無聲之境登乎無情之庭吹萬變作而吾窅兮無知疾雷破山而吾寂焉無覺况乎毀譽吁俞笑歌呻吟足感吾之心乎夫我一竅之完也而我適吾適也若此庸詎知吾之七竅而造物不皆吾補乎我其爲空同乎子將求我於空同之上乎吃者闕翁曰予遊心於墨墨也乆矣願執鞭而從夫子之後也尉遅楚好爲文謁空同子曰敢問文有體乎曰何體之有易有似詩者詩有似書者書有似禮者何體之有有法乎曰初何法典謨訓誥國風雅頌初何法難乎易乎曰吾將言其難也則古詩三百篇多出於小夫婦人吾將言其易也則成一家言者一代不數人宜繁宜簡曰不在繁不在簡狀情寫物在辭達辭達則二三言而非不足辭未達則千百言而非有餘宜何如曰如江河何也曰有本也如鍵之於管如樞之於戸如將之於三軍如腰領之於衣裳何也曰有綂攝也如置陳如構居第如建國都何也曰謹布置也如草木焉根而幹幹而枝枝而葉而葩何也曰條理精暢而皆有附麗也如手足之十二脉焉各有起有出有循有注有㑹何也曰支分派别而榮衞流通也如天地焉包涵六合而不見端倪何也曰氣象沉鬰也如漲海焉波濤湧而魚龍張何也曰浩汗詭怪也如日月焉朝夕見而令人喜何也曰光景常新也如煙霧舒而雲霞布何也曰動蕩而變化也如風霆流而雨雹集何也曰神聚而㝠㑹也如重林如邃谷何也曰深逺也如秋空如寒氷何也曰㓗凈也如太羹如玄酒何也曰雋永也如瀨之旋如馬之奔何也曰回複馳騁也如羊腸如鳥道何也曰縈迂曲折也如孫吴之兵何也曰竒正相生也如常山之蛇何也曰首尾相應也如父師之臨子弟如孝子仁人之處親側如元夫碩士端冕而立乎宗廟朝廷何也曰端嚴也温雅也正大也如楚莊王之怒如𣏌良妻之泣如昆陽城之戰如公孫大娘之舞劒何也曰激切也雄壯也頓挫也如菽粟如布帛如精金如美王如出水芙蓉何也曰有𥙷於世也不假磨礲雕琢也將烏乎以及此也曰易詩書二禮春秋所載丘明髙赤所傳孟荀莊老之徒所著朝焉夕焉諷焉味焉習焉斯得之矣雖然非力之可爲也聖賢道德之光積于中而發乎外故其言不文而文譬猶天地之化雨露之潤物之魂魄以生華蔓毛羽極人力所不能為孰非自然哉故學於聖人之道則聖人之言莫之致而致之矣學於聖人之言非惟不得其道幷其所謂言亦且不能至矣尉遅楚出以告公乗丘曰楚之於文也其猶在山徑之間歟微空同子導吾出也吾不知大道之恢恢於是盡心焉將於文僩焉無難能者矣東郭氏之猫羣聚于庭首以相枕是以相拊尾以相戯舌以相咶甚相狎也投之腐䑕皆鋌而起得者馳而去不得者或逐其後或據其前或號其右或攫其左相與闘且噬矣空同子曰利之善移心術也如此夫物引於前欲炎於中恐已不得而人得之也雖腐䑕之微甚狎之猫闘而噬弗顧矣而况有大於䑕者乎今之人平居相與握手附耳以致歡忻洽愛自謂骨肉良不過是及乎勢位一接幸於得而忘其所以為義醜抵而深排隂擠而陽奪不得之不已心術之移於利也如是則與東郭氏之猫何異哉空同子曰賢者謀道而不謀食故賢者難進而易退也其君知之至然後起禮之恭然後留信之篤然後用故君得之而君以正國得之而國以安天下得之而天下以平或遇之不以其道則納履去不終日矣蓋君子出非苟進也道合則出也處非苟退也道不合則處也吾知謀道而已吾庸知富與貴哉至貴不待爵至富不待禄待禄而富待爵而貴外也非內也道德以爲貴仁義以爲富斯內也非外也古之賢者明乎內外之分是以難進而易退也世之所謂賢者知之不至憣然而起禮之不恭恬然而留信之不篤樂然而用而遇之不以其道不去也夫豈非以外者爲足重歟吾見其患得患失之不暇而暇圖謀國家利安百姓哉倐焉而辭職忽焉而拜官暮而處朝而出屢進而屢退其於道何如也空同子曰君子不以卑賤而耻敎人亦不以尊貴而耻敎於人故君子能成己而成人也人由敎而成德猶噐以範模而成噐也吾之德誠足以成乎人也則吾之位雖卑且賤固敎人者也吾之德誠待乎人而後成也則吾之位雖尊且貴固敎於人者也是故敎人者存心於成人也夫庸計其位之尊貴於吾乎敎於人者存心於成已也夫庸計其位卑賤於吾乎唐堯也虞舜也夏禹也商湯也文王也武王也齊桓也魏文也可謂尊貴矣而敎於君疇務成昭西王國成子伯時子思號叔管仲卜商曾無難色君疇也務成昭也西王固也成子伯也時子思也虢叔也管仲也卜商也可謂卑賤矣而敎唐堯虞舜夏禹商湯周文武齊桓魏文曾無赧容豈非存心於成己成人也哉之八君者不恥敎於人故不賢者以賢而賢者以聖之八士者不恥敎人故能聖其賢而賢其不賢是故教人者其重己守道必若古之為敎者然後能成人敎於人者其心下禮恭必若古之受敎者然後能成己今也在下位而為敎則慊然不安而人且以為倨在上位而受敎則閹然不屑而人且以為辱不中者終於不中不材者終於不材不賢者不至於賢賢者不至於聖不知卑賤者恥敎人之過邪不知尊貴者恥敎於人之過也空同子曰土苴易得之物也在天地之間庸詎知其限乎然使一人聚之而十人取之烏有不盡者哉以無限之物聚之者寡而取之者衆然且盡焉况乎粟米布帛出於人力而有限乎今所在耕者織者恒不滿數百家而食者衣者恒數萬家物力安得而不屈乎人之力多者莫如烏獲數百人之中力如烏獲者不能二三人若使二三有力人而代數百人者服奔走轉移之勞未有不憊者也多田之家譬則多力之人也大抵一邑之間一鄉之內數百戸之中田多者𥘉不過三四戸今也服役于官惟多田之家而已其餘或賈于市或商于途或執百工技藝雖積蓄有餘以其無田也役未嘗及焉則與使二三有力人服數百人奔走轉移之勞無異矣欲巨室無困其可得乎何如則物力不屈曰貴農何如則巨室不困曰均役不然南畝之民且相率逐末田多之家且胥為寠人國將奈之何哉空同子曰休徵咎徴天之所以禍福國家者也五福六極天之所以禍福人民者也而莫不有以致之國家之政人民之行非有以致福也而福至蓋有隱德也國家之政人民之行非有以致禍也而禍至蓋有隱惡也人不念福本於隱德而見其得福也則以為無安之福焉人不念禍基於隱惡而見其得禍也則以為無妄之禍焉是徒知有形之惡而不知無形之惡也徒知有名之善而不知無名之善也無名之善隱德是也無形之禍隱惡是也皆萌乎念慮兩常存乎心者也而政之臧否行之誠僞莫不由之一心之微貫徹三極自萬乗至於匹夫無貴賤一也善惡之萌迹雖未著念則甚烈己知之人莫知也人莫之知天未嘗不知也天知之是以天得而禍福之也故天之福隱德禍隱惡猶聖人之誅心也善觀人者惟觀其所得所得福也則其以善存心必矣所得禍也則其以惡存心必矣善格天者惟慎其所存心存乎善則福應之必矣心存乎惡則禍應之必矣天非穹然蒼然之謂也理而已矣理無不在故天無不體逆乎理逆乎天也順乎理順乎天也逆順者善惡之機也善惡者禍福之門也而禍福未有無妄者也故隱徳之報不自其身則自其祖父隱惡之報不在其身則在其子孫而况萬乗為天之子居天之位用天之道執天之行其感應又當何如故漢髙祖心乎寛仁唐太宗心乎仁義而吕后武后不能移其祚秦始皇心乎殘暴漢武帝心乎兵刑而扶蘇據罹其殃所謂出乎爾者返乎爾者豈獨雨暘燠寒風見於歳月日時之間而已善惡之機不可以弗之愼也是以唐虞三代之聖人莫不競競業業孜孜慄慄翼翼亹亹不能一息寧也皆所以順乎天也是故君子不必求福也不必禳禍也夫亦順天而已矣詩曰昊天曰明及爾出徃昊天曰旦及爾遊衍而順天則在愼獨也行乎人之所不見猶人之所見發乎己之所獨知猶人之所知敬義以自持誠一而毋貳身之所履無弗順心之所存無非善斯君子之所以免禍也斯君子之所以受福也空同子曰古之所謂貴者不待爵命而貴也道德有諸已而已矣古之所謂富者不待貨財而富也道德有諸已而已矣貴不待爵命故雖處畎畝爲齊民而貴莫加焉富不待貨財故雖衣不完食不足而富莫加焉處畎畝爲齊民而貴無以加此之謂天貴衣不完食不足而富無以加此之謂天富天貴天富富貴之在內者也其得之自我其失之自我人不得而與之亦不得而奪之故貴富以天者通不榮而窮不醜有不驕而無不戚今之所謂貴者非道德之謂也爵命而已矣今之所謂富者非道德之謂也貨財而已矣爵命以爲貴故朝居位而暮去位則暮得而賤之矣貨財以爲富故朝有餘而暮不足則暮得而貧之矣暮去位而暮以爲賤此之謂人貴暮不足而暮以爲貧此之謂人富人貴人富富貴之在外者也其得之非我其失之非我人可得而與之亦可得而奪之故富貴以人者通則榮而窮則醜有則驕而無則戚君子也者天之貴富人之貴富兼焉者有之矣小人也者天之貴富人之富貴兼焉者未之有也是故君子有人貴而無天貴無寧有天責而無人貴有人富而無天富無寧有天富而無人富有天之富貴無害爲聖賢孔顔之徒是已有人之富貴無救於狂愚桀紂之徒是已於戲吾身有至貴富者存而世之人乃舎而求之外悲夫空同子曰有求於人而不加親無求於人而不加踈此其人君子也有求於人而惟恐不親無求於人而惟恐不踈此其人小人也其人誠君子也其友也必不加親於人得時之際而加踈於人失時之後亦不加踈於己得志之日而加親於已失志之時其人誠小人也其友也必加親於人得時之際而加踈於人失時之後亦必加踈於已得志之日而加親於已失志之時是故君子之友謂之眞小人之友謂之僞僞友者常多有也眞友者常鮮有也鮮眞友是以友而有始終者十不能一二也多僞友是以友而無始終者十常有八九也蓋君子友以道義而道義無隆無替者也與道義俱無隆替則君子之心也小人友以勢利而勢利有隆有替者也與勢利俱其隆替則小人之心也此小人之存心所以無恒而君子存心所以有恒也以有恒之心而與人友雖禍福死生而不能親踈之也况小者乎以無恒之心而與人友雖簞食豆羹而能親踈之也况大者乎是故君子不苟友人亦不苟友於人友人必察其所以友也友於人必愼其所以友也愼友在始察友在微察友不於微則不能得其心之所存也愼友不於始則不能得其身之所宗也夫自古及今終而相忮相軋相毀相競相傾相仇相殘者皆始而相求相推相下相比相濟相依相許者相求相推相下相比相濟相依相許於其始而相忮相軋相毀相競相傾相仇相殘於其終僞友者則爲之也眞友者固不爲之也故君子察之愼之友焉而出於眞者則內友焉而鄰於僞者則絶絶僞友所以率天下薄勢利也內眞友所以率天下敦道義也敦道義薄勢利民德其有不厚乎友道其有不終乎士蔿以晉獻公患桓莊之族偪謀去羣公子乃與羣公子謀使譖富子其一公子謂羣公子曰不可詐慝鬼蜮何可信也宗族骨肉何可䟽也信鬼蜮不智䟽骨肉不仁仁智不足禍患將至枤杜之風角弓之雅乃所知也不假凟告敢以細事開于左右曲沃之奥有神叢叢大木也蔦與女蘿附焉神患蔦蘿之滋蔓也欲去之乃謂蔦蘿古人有言曰大木之下無美草傷於隂之多也今木之幹且數圍而爾之蔓不滿寸則其枝葉實爾蔽也蔦與女蘿亦自見其蔓不如木之碩也疾之見夢于里人曰祥非神之為惟木之怪里人遂伐木木之旣伐蔦蘿莫傳是以亦瘁富子者大木也吾儕者蔦蘿也豈可云哉富子苟去我亦何所利焉羣公子不聽遂譖富子而去之士蔿又與之謀使殺游氏之二子其一公子又曰不可人之為寢其中列楹其四阿復列楹以相夾輔也撼其一楹棟必橈去其一楹寢必墮如是寢之所恃固在楹之衆矣我之有族猶人之有寢也而吾與游氏楹之謂也昔者之譖富子一楹去矣去其一也且懼壓焉况可再乎而又欲殺二子將吾族之不支豈惟二子而不改圖可乎羣公子不聽遂殺二子旣士蔿使盡殺游氏之族其一公子又曰不可耳目手足之於身一體也目視耳聽患生故能知手捍足防難至故能備此身之所由全也若四者亡焉語所謂絶物也何能為哉身之全者鮮矣今譬之一體游氏之族在吾族吾族之手足耳目也富子之去而吾乎亡矣二子之殺而吾足亡矣今又欲合其族而盡殺之是幷吾耳目亡矣㳺族亡吾族必從之盍釋之以圖存乎不然悔無及矣羣公子不聽遂盡殺游氏之族士蔿乃城聚而處羣公子獻公果圍聚盡殺羣公子君子曰強宗翰也同姓城也其可自壞之乎故曰大宗維翰又曰宗子維城又曰無俾城壞無獨斯畏羣公子縱不是思一人托物而致意三焉言切而利害昭矣亦易悟也哉而終不聽以及于難羣公子所謂取譬不逺昊天不惑回遹其德俾民大棘者矣此計所以為事之本聽所以為存亡之機而貴乎哲也詩曰其為哲人告之話言維德之行齊王問陳軫曰大臣竊權重以作威福何自知之軫曰此非微臣之所知也雖然臣乃者過淄水淄水上有两叢祠水東之祠人持酒脯饗之者終日不絶水西之祠終日未嘗見一人饗之以酒脯者問其故其一神能爲禍福其一神不能爲福亦不能爲禍今夫大臣者神叢也大臣之門神祠也持酒脯者趍勢利者也王欲知權重之所在亦惟觀酒脯之所在而已矣王曰善明日朝羣臣問曰淄水上有兩祠有諸對曰有之其一􅗲福者如市其一無一人徼福者有諸對曰有之此何以故對曰由其能降災降祥與不能降災降祥故也今公門可羅雀而諸大夫門車轂常擊其無乃似之乎羣臣咸畏而莫敢對君子曰陳軫之取譬也善矣而齊王之詰羣臣也則過矣夫亦自強而已耳湯武之朝不聞主柄下移伊周之佐不聞執國之命已不自強而惟患政不自己出授人以大阿而欲無其割得乎空同子曰天下之物本方圓烏用䂓矩哉皆平直烏用凖蠅哉木也有直有不直不有繩焉其不直者則何以直乎欲直其不直是以繩生焉地也有平有不平不有凖焉其不平者則何以平乎欲平其不平是以凖生焉輿不自方以矩而成方蓋不自圓以規而成圓故繩之設因木之不直也凖之設因地之不平也規矩之設因輿蓋之不方圓也䂓矩凖繩設則天下無物弗方圓平直矣是故聖人之治天下蓋莫不因而爲之制也因民之不皆信也於是乎爲之權衡度量因民之不皆善也於是爲之禮樂政敎因民之不皆從也於是乎爲之賞罸因民之不皆治也於是乎爲之兵刑使天下無人而不信有權衡度量哉無人而不善有禮樂政敎哉無人而不從有賞罰哉無人而不治有兵刑哉之數者設焉而後天下無不信不善不從不治之民然則權衡度量之立禮樂政敎之脩賞罰之用兵刑之施可一日少乎雖然不出於結繩之前結繩之後斯出焉吾固知聖人甚不得已也雖不得已亦豈外人心而有爲哉是故賞因其好善之心而勸之云耳罰因其惡惡之心而懲之云耳禮樂政刑之類罔不皆然亦猶馬之性行也而乗之乗之而覊靮作焉牛之性耕也而服之服之而楅衡作焉而曲學者乃謂聖人之治天下削物之性侵物之德是烏足與論聖人或曰言之立也於世何與焉而論其不朽乃與立德立功者等不旣過焉乎哉空同子曰孔孟以空言配禹吾先祖嘗論之矣不敢勦取以瀆告姑言史氏之設其爲言也何敢望孔孟之萬一然要其極也使德備於身功加于時者而不有史氏焉迹其終始發其精微見于論著書于簡冊傳之當世垂之後來亦焉能不朽而永存哉是故唐虞三代逺矣其聖君賢相之盛德大業仁人君子之微言茂行與夫治天下之大經大法昭乎如日月之麗天更于萬世而彌顯者則亦賴詩書史記之存也不然流風遺韵之猶存宏規逺矩之無徴雖欲憲章祖述之夫安得而憲章祖述之此孔子欲言夏殷之禮而有文獻不足之歎也而况春秋戰國秦漢以來其功德不及唐虞三代逺甚其遺愛何足以起人之思慕而遂不至於無聞者詎非以史哉由其史之存也故宇宙之分合國家之理亂政事之得失習俗之美惡道術之邪正人材之賢否學士大夫得以討論而時君世佐得以鑒戒焉然則文史之職其爲重而非輕也明矣其爲要而非冗也審矣漢武帝乃以戲弄倡優畜之謂之不知務可也矧道明德立之士不獲見之行事而托空言以立敎者奚可少之哉奚可少之哉公乗生問於空同子曰何以處憂患也曰聽其所爲曰何謂聽其所爲曰不動吾心曰心何以能不動曰物我皆䘮吾嘗自安東浮海至于崑山三遇颶風再遇淺一遇㓂吾自分必死已視吾身如無焉颶也淺也㓂也亦視之如無焉故吾起居食飮言笑與平時無異焉舟中之人皆凌競戰慄如露立氷雪間齒上下作聲無復人色吾曰四靣皆水矣無所徃矣塟于魚腹血于兵刃命矣死無時矣不必懼矣懼亦死不懼亦死孰若不懼哉孰若安坐飽食哉衆乃少安比登岸吾問同舟之人方㓂賊礁淺颶風時公等皆懼我不懼公等皆不食飮我食飮今日公等登岸我亦登岸則吾向云云豈不信矣乎相視一笑吾以是信處憂患惟聽其所爲而已矣聽其所爲則不知憂患之爲憂患而自然安焉豈惟憂患哉處富貴亦然是以得失不患也世之人皆有所顧故皆有所慕有所畏畏慕交于中此其臨財則義不明臨陳則戰不力而不思夫窮達得䘮死生禍福莫非命也又何必臨事皇皇然計其美惡而就避哉祗足以亂方寸焉耳公乗生曰余聞處憂患而得行已之道其殆所謂可以終身行之者乎請書諸紳申屠生問空同子曰學何務曰治心曰心何以治曰養之曰有道乎曰有曰道何如曰少思寡欲主敬少思則靜寡欲則明主敬則一靜其本也明其體也一其要也今夫水其一人撓之而其一人不之撓若苟一撓一不撓則針遺芥堕而可指取也必於其不撓者焉苟自不撓者可指取則是以靜爲本矣今夫鏡其一塵翳之而其一塵不之翳若苟一翳一不翳則妍醜並照而無遁形也必於其不翳者焉苟自其不翳者無遁形則是以明爲體矣今夫路其東多岐而其西無岐則牧竪過之而亡其羊也必於其岐多者焉苟自其岐多者亡羊則是以一爲要矣一故靜靜故明靜明一學之務畢矣是故少思未遽靜也少思則欲不動而無思可至焉寡欲未遽明也寡欲則情不勝而無欲可至焉主敬未遽一也主敬則有主而無貳可至焉無思則靜矣無欲則明矣無貳則一矣而學之務畢矣故曰其道在少思寡欲主敬此非余言也先民之訓也力行則存乎人志殺虎余至髙溪之七日有虎夜踰某子甲垣攫其豕豕咿然作聲甲意穿窬也亟舉火燭之不見豕而見虎迹焉黎明與二弟俱躡虎迹覔豕行至黃土隴見两虎叢薄中呼曰虎在此虎在此鄉黨鄰里幸與我共殺之不者不惟吾豕被其攫諸公家之豕亦恐不免不惟豕不免害且恐及人於是環髙溪一聚壯者操刅與梃弱者聲銅鐡噐徃助甲虎見衆前且行且咆哮作聲威翼以懼衆衆不爲懼益鼓譟環之虎乃躍而起甲之長弟遽揮挺擿虎虎怒瓜之其右股被創甲之㓜弟奮戈刺之自喁貫脅一虎随斃其一猶咆哮作噬人狀然聲戰慄僅若牛鳴衆知其無能也直前刺之於是兩虎俱斃刳其腹豕固在也虎於毛蟲中最暴戾人聞談虎且猶膽掉畏之而况敢攖之乎使其據深山大谷雖日攫麋鹿雉兎以自肥孰得而斃之哉顧恃其暴戾縱逐逐之欲入墟市攫人畜而弗忌得一豕竟殞其命悲夫世之人自謂威權足賴而食欲無顧忌者其亦知所鑒也乎方甲行覔豕惟二弟從率先衆人刺虎亦惟二弟詩言外禦其侮必兄弟豈不信矣哉甲䘮其豕旣而斃兩虎誠若快意者然爲酒食以勞鄉黨鄰里費抑亦夥矣一弟又幾不脫於虎口持虎皮上送官人莫不謂其得厚賞以其皮之傷也牽於吏議迄弗之賞然則出死力捐家貲以除暴虐者上功幙府而欲文法吏無吹毛求庇而欲沾賞典矧可得乎矧可得乎皇明文衡卷之五十三
