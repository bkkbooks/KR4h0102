front:
  text: 皇明文衡卷之五十九
  hash: sha256:1c99c09fa6a44f722c10e9e909e4e23611c0fd4dcfce30c5012ea31c662746c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_059-1a}
body:
  text: 傳攖寧生傳朱右攖寧生出滑伯後名壽字伯仁世為許襄城大家元初祖父官江南自許徙儀真而壽生焉性警敏習儒書於韓説先生日記千餘言操筆為文辭有思致尤長於樂府京口王居中客醫儀真治方􅎃術有時名壽數往叩之居中曰醫祖黃帝𡵨伯其言佚不傳世傳者唯素問難經子其習之乎壽遂受之既終卷乃進請其師曰素問為説備矣篇次無緒錯簡不無愚將分藏象經度􅎃候病能攝生論治色􅎃針刺隂陽標本運氣彚萃凡十二類鈔而讀之難經又本素問靈樞之旨設難釋義其間榮衛部位藏府􅎃法與夫經絡腧穴辨之博矣而闕誤或多愚將本其旨義注而讀之何如居中曰甚矣子之善學也善哉子學之得其道也豫守師説者子識卓理融契悟前訓子過我矣他日以醫名世其子也邪自是壽學日進益參考張仲景劉守真李明之三家而大同之攄其所得投之所向莫不中肯綮既又傳針法於東平高洞陽得其開闔流注方圓輔㵼之道又究夫十二經走會屬絡流輸交别之要至若隂陽維蹻衝帶六􅎃雖皆有繫屬而唯督任二經則苞乎腹背而有專穴諸經滿而溢者此則受之宜與十二經並論乃取內經骨空諸論及靈樞本輸篇所𫐠經􅎃著十四經發揮三卷疏其本旨釋其名義通考隧穴六百四十有七而施治功以盡醫之神祕他如讀傷寒論鈔診家樞要痔瘻篇及聚諸書本草為醫韻皆有功後學故其行有治驗所至人爭延致以得攖寧生診視一決生死為無憾生無間貧富皆往治報不報弗較也遂知名吳楚間在淮南曰滑壽在吳曰伯仁氏在鄞越曰攖寧生云生年七十餘顔容如童行步輕捷飮酒無算人有請雖祁寒暑雨弗憚世多德之其治法往往奇中人間能言之故記者頗多其徒日采表著者成編以傳其在儀真御史中丞八臣亦家焉其內人病艱於小溲中滿喘渴門僧寶頗知醫投以蕖麥梔苓諸滑利藥而閟益甚召壽候其􅎃三部皆弦而澀壽曰經云膀胱者州都之官津液藏焉氣化則能出矣所謂水出高源者也膻中之氣不化則水液不行病因於氣徒行水無益也法當治上焦乃製朱雀湯倍以枳桔煎用長流水一飮而溲再飮氣平數服病巳端君寶毋六十餘亦病小溲閟若淋狀小腹脹口吻渴邀壽診其􅎃沈且澀曰此病在下焦血分隂火盛而水不足法當治血血與水同血有形而氣無形有形之疾當以有形法治之即以東垣家滋腎丸服之而愈三寶廉使仲子之妻泰不華尚書妹也病滯下晝夜五七十起後重下迫且娠九月衆醫率為淸暑散滯痛苦尤甚壽至診視曰須下去滯衆以娠不肯壽曰素問有云有故無損亦無損也動即正産乃以消滯導氣丸藥進之得順利再進滯去繼以淸暑利溲苦堅之劑病愈而果孕不動足月乃産童氏婦年三十每經水將來三五日前臍下㽱痛如刀刺狀寒熱交作下如黑豆汁既而水行因之無妊招壽診視之兩尺􅎃沉澀欲絶餘部皆弦急曰此由下焦寒濕邪氣搏於衝任衝為血海任主胞胎為婦人血室故經事將來邪與血爭作㽱痛寒氣生濁下如豆汁宜治下焦遂以辛散苦溫理血藥為劑令先經期十日服之凡三次而邪去經調是年有孕丘仲山女才八歲病傷食煎􅘤內閟悶口乾唇舌燥黑腹痛不可忍或以剛燥丸藥利之而痛閟益甚壽遂以牽牛大黃淸快藥為丸以伏其燥利而愈天寧寺僧病發狂譫妄視人皆為鬼壽診其􅎃纍纍如薏苡子且喘且搏曰此得之陽明胃實素問云陽明主肉其經血氣並盛甚則衰衣升高踰垣妄罵壽以三化湯三四下復進以火劑乃脫然如故馬萬戶妻體肥而氣盛自以無子嘗多服暖宮藥積久火甚迫血上行為衄衄必數升餘靣赤􅎃躁疾神恍恍如癡醫者猶以治上盛下虛丹劑鎮墜之壽曰經云上者下之今血氣俱盛溢而上行法當下導奈何實實邪即與桃仁承氣湯三四下積瘀既去繼服既濟湯二十劑而愈楊子縣吏陳某當臘月鼻衄至正月凡十三日始定其􅎃實而數治法與前證同蓋馬婦過服剛劑陳過食煎炙飮醇酒皆積熱所致也鄧千戶二婢子七八月間同患滯下壽至診視一婢􅎃鼓急大熱喘悶曰此必死一婢􅎃洪大而虛軟微熱而小便利曰此可治即下之巳而調以苦溫苦堅之劑果一死一愈張佛兒暑月患中滿泄瀉小便赤四肢疲困不欲舉自汗微熱口渴且素羸瘠衆醫以虛勞將峻輔之邀壽至診視六􅎃虛微曰此東垣所謂夏月中暑飮食勞倦法宜服淸暑益氣湯沒三劑而病如失記其在儀真時所治若是什無一二焉至正間趙璉守杭州以同里知壽且邀之與俱過嘉興汪澤民病怔忡善忘口淡舌燥多汗四肢疲軟發熱小便白而濁衆醫以內傷不足擬進茸附趙彥博爭之未決固招伯仁至視其􅎃虛大而數曰是由思慮過度厥陽之火為患耳夫君火以名相火以位相火代君火行事者也相火一擾能為百病况厥陽乎百端之起皆自心生越人云憂愁思慮則傷心汪君平生志大心高所謀不遂抑鬱積久致內傷也然抱薪救火望安奚能遂命服東垣補中益氣湯朱砂安神丸空心則進小坎離九月餘彥博抵書云汪之疾瘳矣尹安卿妻妊五月病咳痰氣逆惡寒咽膈不利不嗜食者浹旬招伯仁診視其􅎃浮弦形體淸羸伯仁曰此上受風寒也越人云形寒飮冷則慯肺投以辛溫劑與之致津液開腠理散風寒而嗽自安矣既之錢唐館郡守第時出治病即愈屬縣有不能治之證皆來就伯仁臨安沈君彰者病自汗如雨不少止靣赤身熱口燥心煩輿來杭城舍客樓盛暑中帷幕周密自云至虛亡陽服术附藥巳數劑伯仁診其􅎃虛而洪數視其舌上胎黃曰前藥誤矣輕病重治醫者死之素問云必先歲氣無伐天和术附之熱其可輕用以犯時令邪又云􅎃虛身熱得之傷暑暑家本多汗加以剛劑􅎃洪數則汗益甚悉令撤幔開窗𥘉亦難之少頃漸覺淸爽為製黃連人參白虎等湯三進而汗止大半諸證亦稍解既而兼以既濟湯渴則用氷水調天水散服七日而病悉去後遍身發瘍疹更服防風通聖散乃已其同縣陳元善病氣發則臍下築築漸上至心下嘔涌痛悶手足淸喉中淫淫而癢眉本疼疫目不欲視頭不欲舉神昏昏欲睡而不寐惡食氣睪丸控引小便數而欠年未三十尫瘠若衰耄人劣劣不自持伯仁視其􅎃沉弦而澀曰是得之憂鬱憤怒寒濕風雨乘之為肝疝也屬在厥隂故當􅎃所過處皆病焉厥隂肝也張從正云諸疝皆屬肝素問云肝欲散亟以辛散之遂取吳茱茰佐以薑桂及治氣引經藥兼製回練等丸每十日二溫利之三月而病愈俞彥良亦臨安人病嘔血或滿杯或盈盆盎且二三年其人平昔嗜市利不憚作勞中氣因之侵損伯仁視之且先與八寶散一二日服黃芩芍藥湯少有動作即急進犀角地黃湯加桃仁大黃稍間服抑氣寧神散有痰月礞石丸其始􅎃芤大後􅎃漸平三月而愈彥良遂以此法治他人皆驗宋可與妾暑月身冷自汗口乾煩躁欲臥泥水中伯仁診其􅎃浮而數沉之豁然虛散曰素問云􅎃至而從按之不鼓諸陽皆然此為隂盛隔陽得之飮食生冷坐臥風露煎真武湯冷飮之一進汗止再進煩躁去三進平復如初杭妓有患心疾狂歌痛哭祼裎妄罵問之則瞪視默默其父母固邀伯仁診視􅎃沉堅而結曰得之憂憤沉鬱食與痰交積胸中涌之皆積痰褁血復與火劑淸上膈數日如故既而左丞楊完者統苗兵守江浙民頗不安居會故舊陳性中王叔雨招乃挈家渡浙江往來鄞越居虞姚間最久人皆稱之曰攖寧生初叔雨寓錢唐病傷寒他醫至皆以為痓證當進附子持論未決其弟熙暘謁攖寧生曰舍兄病亟唯幾生忍坐視不救乎至切其􅎃兩手俱沉實而滑四末覺微淸以燈燭之遍體皆赤班舌上胎黑而燥如芒刺身大熱神恍惚多譫妄語攖寧生曰此始以表不得解邪氣入裏裏熱極甚若投附必死乃以小柴胡劑益以知母石膏飮之終夕二進次日以大承氣湯下之調治兼旬乃安比來上虞熙暘館于魏氏一日乘盛暑肩輿入邑途中吐血數口亟還則吐甚胸拒痛體熱頭眩病且殆或以為勞心焦思所致與茯苓補心湯生至診其􅎃洪而滑曰是大醉飽胃血壅遏為暑迫上行先與犀角地黃湯繼以桃仁承氣湯去瘀血宿積後治暑即安陸用和病惡寒發熱頭體微痛苦嘔下泄五日矣其親亦知醫以小柴胡湯治之不解招攖寧生診視􅎃弦而遲曰是在隂當溫之為製真武湯其親爭之強與人參竹葉湯進即泄甚􅎃且陷弱始亟以前劑服之連進四五劑乃效人始服攖寧生之賢於人遠矣余子元病惡寒戰栗持捉不定兩手背冷汗浸淫雖厚衣熾火不能解攖寧即與真武湯凡用附六枚一日病者忽出人怪之病者曰吾不惡寒即無事矣或以問攖寧生生曰其􅎃兩手皆沉微餘無表裏證此蓋體虛受寒亡陽之極也初皮表氣隧為寒邪壅遏陽不得伸而然也是故血隧熱壅須用硝黃氣隧寒壅須用桂附隂陽之用不同者無形有形之異也魏士圭妻徐病寒為疝自臍下上至心皆脹滿攻痛而脅疼尤甚嘔吐煩悶不進飮食攖寧生視之􅎃兩手沉結不調曰此由寒在下焦宜亟攻其下無攻其上為炙章門氣海中脘服玄胡桂榝佐以蘹木諸香茯苓靑皮等十日一服溫利丸藥聚而散之也士圭守其法治之果效王宗祥之父年老病臍腹㽱痛其里醫為溫中散寒卒無驗宗祥固邀攖寧往視􅎃兩尺搏堅而沉曰此大寒由外入也寒喜中下因為疝治宜在下加沉降之劑引入下焦數服尋愈陳伯英病肺氣焦滿攖寧生視之曰病得之多欲善飮其殫營慮中積痰延外受風邪發即喘喝痰咳不能自安為製淸肺泄滿降火潤燥苦辛等劑服之既安衆詰之曰是出何方書名何散飮生應之曰是為混沌湯聞者皆大笑曰混沌湯有用也潘子庸得感冒證巳汗而愈數日復大發熱惡寒頭痛眩暈嘔吐卻食煩滿咳而多汗攖寧生診之􅎃兩手三部皆浮而緊曰在仲景法勞復證浮以汗解沉以下解今脈浮緊且證在表當汗衆以虛憊難之且圖溫輔生曰法當如是為作麻黃葛根湯三進更汗旋調數日乃愈時淮南丞相方公分省四明聞攖寧生名禮致見之館穀留城中一日公壻戴頴仲以使事往奉化雪中且進冷食病內外傷惡寒頭疼腹心痛而嘔診之􅎃沉且緊時伏而不見曰在法下利淸穀當急救裏淸便自調當急救表今所患內傷冷飮食外受寒沴淸便自調救表裏急以桂枝湯力微遂為變法與四逆湯服之晬時服附子一兩明日則脈在肌肉唯緊自若外證巳去內傷獨存乃以丸藥下去宿食後調中氣數日即安方惟益患消渴衆醫以為腎虛水竭洋不能上升合附子大丸服之既服渴甚舊有目疾兼作其人素豐肥因是頓瘦損倉皇中召攖寧生視之生曰隂陽之道相為損益水不足則濟以水火不足則濟以火未聞水不足而以火濟之不焦則枯乃令屛去前藥更寒劑下之蕩去火毒繼以苦寒淸潤之製竟月乃平復適方明禮寵姬新産受寒四肢逆冷􅎃沉弱亟令取向所製附子大丸三四粒餌之立效生曰不得於彼而得於此蓋用有不同耳丘彥材平居苦胸中痞滿憒憒若怔忡狀頭目昏痛欲吐不吐忽忽善忘時一臂偏痺召攖寧生視之當關以上􅎃溜而滑按之沉而有力攖寧曰積飲滯痰橫於胸膈蓋得之厚味醇酒肥膩煎灸蓄熱而生濕濕聚而痰涎宿飮皆上甚也王冰云上甚不巳吐而奪之法當吐候春日開明如法治之以物撩咽中須臾大吐異色頑痰如膠飴者三四升一二日更吐之三四次則胸中洞爽平復矣龍君澤分院餘姚其室張暑月中病經事沉滯身寒熱自汗咳嗽有痰體瘦悴腹臍刺痛招攖寧生至診視􅎃弦數六至有餘生曰此二陽病也素問云二陽之病發心脾女子得之則不月二陽陽明也陽明為金為燥化今其所以不月者因其所遭也陽明本為燥金適遭於暑暑火也以火爍金則愈燥矣血者水類金為化源宜月事沉滯不來也他醫方為製歸茸桂附丸以溫經而未進生曰夫血得寒則止得溫則行得熱則搏搏則燥復加燥劑血益乾則病必甚亟令郤之更以當歸柴胡飮子為之淸陽㵼火流濕潤燥三五進而經事通餘病悉除龍君曰微生幾為人所誤矣宋無逸餘姚大儒也病瘧瘠損饘粥難下咽六十餘日殆甚攖寧生聞而往視之􅎃數兩關上尤弦疾久體瘠而神則完生曰是積熱居脾且滯於食飮法當下衆疑而難之藥再進而疾去其半復製井露飮柴胡白虎等劑浹旬而起如故後四歲無逸客昌國病頭靣李赤妨於飮食或進以薑附攖寧為製劑淸上散火而愈無逸曰嚮得淸涼藥以濟危急否則誤於剛劑矣德之不忘嘗以語人云夏思忠病胸膈脹痛心怔忡嘔逆煩悶不食情思惘惘不暫安目􅉩􅉩無所睹攖寧生視之六􅎃皆結澀不調無復參伍甚怪之既徐而察之其人機深憂思太過加之脾胃內傷積為痰涎鬱干上膈然也素問云思則氣結又云隂氣者靜則神藏躁則消亡飮食自倍腸胃乃傷其是之謂乎為製袪順丸服之旋復平和思忠曰吾疾諸治罔效始以為天下無藥兹服生袪順丸乃知天下有藥矣金丙病韓自行邀攖寧生往視之􅎃數而散體寒熱咳血痰生曰此二陽病也在法不治當以夏月死至立夏果死自行愀然曰攖寧生能知死必能知人生矣乎方德明七月內病發熱或令其服小柴胡湯必二十六劑乃愈如其言服之未盡二劑則升發太過多汗亡陽惡寒甚肉瞤筋愓乃固請攖寧生視􅎃微欲無即以真武湯進七八服稍有緒更服附子七八枚然後愈夏子韶妻始病瘧當六七月他醫以為脾寒胃弱久服桂附後瘧雖退而積火燔熾致消穀善飢日數十飯猶不足終日端坐如常人第目昏不能視足弱不能履腰胯困軟肌肉虛肥至初冬子韶謁攖寧生往候􅎃洪大而虛濡曰此痿證也長夏過服熱藥所致蓋夏令濕當權剛劑太過火濕俱甚肺熱葉焦故兩足痿易而不為用也東垣有長夏濕熱成痿之法當以此治之食日益減目漸能視至冬末忽自起下榻行步如故其姪夏仲儒因拘留赴海積恐怖心常惕惕如畏人捕之狀攖寧生視之􅎃豁豁然虛大而浮體熱多汗曰凡病得之從高墜下驚仆擊搏留滯惡血皆從中風論終歸厥隂此海藏之説也蓋厥隂多血其化風木然也有形當從血論無形當從風論今仲儒之疾是走無形也從風家治之兼為化痰散結佐以鐵粉朱砂丸良愈鄭高卿毋倪病瘧寒熱嘔涌中滿而痛下利不食年五十餘殊困頓他醫為淸脾氣理中脘不效邀攖寧生視􅎃沉而遲生曰是積暑與食伏痰在中當下之或曰人疲倦若是且下痢不食烏可下方擬進參附生曰􅎃雖沉遲按之有力雖痢而後重下迫不下則積不能去病必不巳其母弟倪仲權獨是之乃以消滯丸藥微得通利即少快明日復加數服之宿積腸垢盡去向午即思食旋以薑橘參苓淡滲和平飮子調之旬餘乃復王敬中毋病反胃每隔夜食飮至明日中昃皆出不消化他醫以暖胃之藥悉試之罔效敬中詣攖寧生言且固請往視􅎃在肌肉之下甚微而弱生揆衆醫用藥無遠於病何至不效心歉然未決一日讀東垣書謂吐有三證氣積寒也上焦吐者從於氣中焦從於積下焦從於寒其􅎃沉而遲朝食莫吐莫食朝吐小溲利大便祕為下焦吐也法當通其祕溫其寒氣復以中焦藥和之生得此説而喜起嘆曰其合於王毋之證歟但王毋大便不祕遂再往視專治下焦散寒以茱茰茴香為君丁桂半夏為佐服至二三十劑而飮食晏然生曰經不云乎寒淫所勝平以辛熱其是之謂歟俞德明嘗病傷寒經汗下病既去而人虛背獨惡寒􅎃微細如線湯尉不應攖寧生乃以理中湯劑加薑桂藿附大作服外以蓽撥良薑吳榝桂椒諸品大辛熱為末和薑糊為膏厚付滿背以𥿄覆之稍乾即易如是半月竟平復不寒矣此尤治法之變者也顧機仲病傷寒後勞復發熱自汗經七日或以為病後勞將復補之攖寧生曰不然勞復為病􅎃浮以汗解奚補為以小𦸺葫湯三進再汗而愈胡茂林子婦魏仲彬妹也新産二日惡露不行臍腹痛頭疼身寒熱當隆冬時衆醫皆以為感寒溫以薑附益大熱手足搐搦語譫目攛仲彬固邀生往診脈弦而洪數靣赤目閉語喃喃不可辨舌黑如炲燥無津潤胸腹按之不勝手蓋燥劑搏其血內熱而風生血蓄而為痛也生曰此産後熱入血室因而生風即先為淸熱降火治風涼血兩服頗爽繼以琥珀牛黃等稍解人事後以張從正三和散行血破瘀三四服惡露大下如𥘉時産巳十日矣於是諸證悉平方明禮內人盛暑病洞泄厥逆惡寒胃脘當心而痛自腹引脅轉為滯下嘔噦不食人以巾暑霍亂療之益劇攖寧生診其􅎃三部俱微短沉弱不應呼吸曰此隂寒極矣不亟溫之則無生理內經雖曰用熱遠熱又曰有假其氣則無禁也於是以薑附溫劑三四進間以丹藥脈稍有力厥逆漸退更服薑附七日衆證悉去遂以丸藥除其滯下而臟腑自安矣生之活人率類此然頗有不盡述者生嘗語其徒曰豫在儀真時聞友人王德全言江西有醫士曰黃子厚為術精詣其治往往出人意表有富家子年十七八病遍體肌肉圻裂召子厚治子厚偕門生四五輩往診視各以所見陳論皆未當子厚乃屛人詰病者曰童幼時曾近女色犯天真乎曰當十三四曾近之巳子厚曰得其説矣禇澄云精未通而御女則四體有不滿之處後日有難狀之疾在法為不可療後果惡汁淋漉痛楚而死又鄰郡一富翁病泄瀉彌年禮致子厚診療浹旬莫效子厚曰豫未得其説求歸一日讀易至乾卦天行健朱子有曰天之氣運轉不息故閣得地在中間如人弄捥珠只運動不住故在空中不墜少有息則墜矣因悟向者富翁之病乃氣不能舉為下脫也又作字持水滴吸水𥘉以大指按滴上竅則水滿筒放其按則水下溜無餘乃豁然悟曰吾可治翁證矣即治裝往翁家驚喜至即為治艾灸百會穴未三四十壯泄瀉止矣生自少識之後在鄞胡元望女生始六月亦病泄㵼不巳因教以前灸即愈子厚在至治天曆間術甚行虞文靖公嘗有贈醫士黃子厚詩云史右曰豫幼喜業醫遇醫士輒近之覩其治往往誤藥死若以試其術然豫懼隂殺人而莫之罪必不逭於天刑遂棄不復習襄城攖寧生夀能活人反掌間而奇驗若此時人為之語曰世以人試術生以術活人其相去奚啻千萬豫聞盧扁曰聞病之陽論得其隂聞病之隂論得其陽倉意曰吾以􅎃法治之而愈生其有得於二子者歟唐珏傳張孟兼唐珏字玉濳會稽人也少孤能力學以明經教授鄉里子弟而養其母至元戊寅浮圖總統楊璉真伽利宋􅑼宮金玉故為妖言惑主聽發之珏獨懷痛忿乃貨家具行資得白金若干為酒食隂召諸惡少享于家衆皆驚駭前請曰平日且不敢見今召我飮又過禮不審欲何為雖死不避珏因泣數行下謂之曰爾輩皆宋人吾不忍陵寢之暴露巳造石函六刻紀年一字為號自思陵以下欲隨號收殯之衆皆諾中一人曰此固義事也然今無有知者恐萬一事露禍不測不得終志奈何珏曰吾以籌之矣要當易以他骨焉衆如珏言夜往收貯遺骸瘞蘭亭山後上種冬靑樹為識約明日復來會出金帛為人人壽戒勿泄也璉又易宋內為諸浮圖乃裒陵骨雜馬牛枯骼築白塔號曰鎮南以為陵骨良已鎮而不知真之他存也亡何汴人袁俊為越治中招珏為子師間問曰吾聞越有唐姓瘞宋諸陵骨豈君邪坐有指珏者俊大奇之手加額曰先生義士哉豫讓不及也竊聞高義之日久矣不意得與先生處因訊珏以故甚貧俊亟為買田宅居之先是珏臥疾一夕夢吏持文來召曰帝召君速之行至見宮闕邃麗一人冕旒中坐旁一人延上殿又數黃衣進揖珏曰賴收遺骸無以報俄曰第報良田二頃有妻孥以養乃復揖及闕翻然而北覺莫省謂何已而會俊料理事如夢中始悟夢中見也有謝翺者文丞相客也與珏友善嘗感珏事為作冬靑樹引語甚悽苦時讀者莫不灑泣翺宇臯羽閩人亦奇士云傳者曰余讀晉世家知趙氏有後矣非程嬰公孫杵臼而莫存其孤今十七廟不食而有暴骸之難獨珏能瘞之甚義乎哉嗚呼珏一布衣爾蓋其義視程公孫何愧哉千載而下有國士之風者非珏誰歟吾所以傳之毋亦使其無傳鄭烈婦傳宋濂烈婦姓石氏金華人諱勝字文素敏慧而勤柔順而婉嫁為浦江義門鄭洪妻鄭氏以禮法齊家石氏奉尊能敬事夫盡禮處衆以和上下咸悅而安之洪性聰敏受業太史宋公通尚書要旨識見明達臨事機變國朝開基建業今曹國李公分鎮嚴陵辟洪參謀軍事陳善效忠甚見禮重久之用薦者入朝為引禮郎轉江西行省照磨有能聲秩滿改內藏庫提點未幾同官有坐法者以辭纍洪竟死於獄石氏從處宦寓悲號痛哭若不欲生吏議當配石氏仰天慟曰生為義氏婦死則為其鬼耳吾夫巳亡豈使汙其身以玷旌門乎遂絶粒不食鄰媪強以糜粥不聽如是者八月求其死而弗得引繩自絶公卿朝士聞者皆稱為烈婦事聞皇上嘉嘆曰此真義門婦矣濂承乏國史既登載其事復著為家傳而歸之鄭氏云史官曰余居金華熟聞鄭氏孝義之著禮法之盛今觀吕氏操行皎如白日可謂難能者矣雖其染濡家訓亦天性然也稱為烈婦不亦宜哉使其守志不堅苟幸以偷生其於旌門寧不有玷乎今蒙玉音之嘉美公卿之稱譽則其門益有光矣庸表而出之以勵風俗云豐本傳唐肅豐本蓋古仙人也一號久視先生相傳伊耆氏之世澗居學道得不死術後出仕子周其為醢人屬與昌氏菁氐茆氏共掌爼豆凡祭祀燕饗王及后世子之內羞咸取給焉故周公天官書列其職戴氏禮記載其名豳七月詩亦歌其中春薦廟事周亡不知所之或云隱畦町間與農圃者伍人多怪之或執而髠其首或戕其支體尋復生完衆始知先生為仙人也漢時與處士郭林宗友林宗館于家客至輒命與同食晉衛尉石崇豪侈擅一世知先生賢咄嗟名之先生亦不拒往就然䇿崇必敗曰不去將纍我我固不憂為彼纍也遂逸去南齊侍中庾杲之家貧好淸士每延先生共飯人皆曰庾郎得豐本為不貧矣唐隱者衛賔與拾遺杜甫善甫嘗過賔宿先生亦冒雨至相與酣飮甚適甫有詩美之載甫集中先生貌蒼古緑髮白趾常𬒳翠羽衣所棲止人望之恆有氣鬱蔥然即之咀嚼其言論有至味令人灑然忘俗壽莫知其幾也今遊會稽巖壑中時時過山人韓氏亭上吟翁錬士多見之者云野史氏曰列仙傳不載豐本失矣其所載亦未有壽如豐本至今尚存者莊生言古之太椿以八千歲為一春物且壽若是矧仙乎豐本仕于周間出于漢晉齊唐所與皆有德者獨齊奴否耳然左慈見曹孟德頗類蓋和光同塵玩世不羈仙之常也今在越不之他獨之韓氏韓亦郭庾杜衛之流歟皇明文衡卷之五十九
