  text: 皇明文衡卷之六十三
  hash: sha256:baa95bb35a7fceeb604a65b15cab63f27586ca526e3aad961e45cab886f95421
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_063-1a}
body:
  text: 碑大明勑建太學碑宋訥洪武十四年夏上詔羣臣曰王者受命武功文德相繼成治定天下以武治不以武也其崇文乎顧玆成均地隘而陋何以振文教朕相基扵雞鳴山下高爽平逺豈天恊朕心若藏此地俟興一代學乎羣臣稽首曰皇上聖神斯文福也乃以天子學制授諸冬官冬官臣恭奉明詔夙夜匪懈楩楠豫樟來積如阜鑿山載石輿土築基梓人效藝以宏其制又遣金吾前衛親軍指揮譚格督其工几堂有七彛倫所以㑹講率性修道誠心正義崇志廣業則諸生肄業所也㑹饌有堂庖廚有室井覆有亭物貯以庫餼廩𬞞園重門繚垣回廊儲書兩堂之間東西有舘助教正錄居焉東偏列室鱗次諸生處焉廟在學東亢以增基大成有門七十二賢有廡凡爲楹八百一十有奇壯麗咸稱自經始以來大駕臨役者不一夫子而下像不土繪祀以神主數百年夷習乃革明年五月冬官奏廟學成十有一日天子遣使祀先師以太牢禮畢胄子及民之俊秀登堂受業學之禮制備矣十又七日上躬臨廟禮行酌獻再拜而退乃達學學官率諸生進拜堂下博士臣龔斆執經祭酒臣吳顒講經旣畢萬乘是還此千載矌儀講而行之斯文增重矣六月一日上又賜勑文重諭胄子禁制防遏之法訓迪誘掖之意無不至焉越一日帝御奉天門詔臣訥文之于石臣拜手稽首不敢以不文辭承命遂述興造始末爲之言曰孔子之道垂憲萬世帝王之興首建太學蓋學所以扶天理淑人心也皇極由之而建大化由之而運世道由之而淸風化本原國家政務未有舍此而先者或有未備則無以維三綱五常之具示作人重道之心聖天子位居君師續道統于堯舜禹湯文武建學定䂓高出前古凡我登堂養正㳺藝之士斯言斯誦相勉相誨無負敎養則正人端士叢出而爲國家楨榦作聖子神孫之業萬世而無窮者當自今始頋臣膚陋敢不對揚帝命式昭盛代之典文也拜手稽首而獻頌曰扵惟聖皇臣伏萬方乗時經綸武偃文揚儲慶發祥載整乾綱乃相學基雞鳴山陽平遠高爽非麓非岡武煇京邑隱若天藏考制定䂓聖度曷量乃授工曹孰敢怠遑工師用勸效技允臧有廟有廡有廊有堂鱗比而重龍起而翔登用儒臣教化昭彰佩服鏘鏘弦誦洋洋正學有傳師道有常萬乘來臨爼豆生光千載禮儀一代典章躬親講道超軼百王聖製昭宣啓迪激昻寵及靑衿垂範流芳材育化崇殷序周庠立極作則遠紹虞唐德進英豪業修俊良股肱朝廷都俞巖廊以弘文化慶祚靈長願佑皇圖萬世無疆勑建歷代帝王廟碑兩儀判而人極立大統建而君道明粤自上古神聖繼作代天理物以開萬世大平之治故天地以之而位四時以之而序萬物以之而育大經大本以之而立盛德相繼傳至于今欽惟聖天子受天明命肇修人紀以建民極纘皇帝王之正統衍億萬年之洪基稽古定制作廟京邑以祀歷代帝王重一統也相舊廟地介乎通衢䙝而弗嚴洪武二十一年秋始命改作扵欽天山陽越明年已巳夏五月三日工部尚書臣秦逵奏成功請文劖石詔臣訥爲之記臣忝職冐監懼不敢辭謹拜手稽首而言曰帝王功德扵昭于天宜有淸廟以宅神展敬歷世以來祀典斯闕三皇五帝祭扵肆類僅見于周而堯舜禹湯發迹肇基及所經歷之地或有祠焉遣使致祭後世有之至扵合廟京國歲修享禮古未之聞皇上定鼎江左治功旣成神人洽和禮樂明備凡廟祀之瀆禮不經謟神非法者一切去之正名定統肇自三皇繼以五帝曰三王曰兩漢曰唐曰宋曰元受命代興或禪或繼功相比德相侔列像于庭金玉其相衮冕焜煌聚精㑹神咸宅于玆毎歲春秋二仲諏日誓士上御宸極制命大臣齋明承事籩豆靜嘉粢盛豐㓗告充告碩神格洋洋所以推惟本始式昭曠典者至矣三年則命官奉香幣詣陵寢具儀物以時致享又以昭聖顯靈而示不忘也嗚呼天生民而立之君所以靖亂也康濟天下阜成兆民而登之仁壽之域者皆以奉若天道而巳是故前乎三代之官天下者天也後乎三代之家天下者亦天也皇帝王之繼作漢唐宋之迭興以至于元皆能混一寰宇紹正大統以承天休而為民極右之序之不亦宜乎秦晉及隋視其功徳不能無愧故黜而不與是可見皇上敦名實重理道崇徳報功大公至正之心眞足以度越百王垂憲來世永永無斁謹為之銘曰惟皇作極克配天地丕昭盛化以正大位皇道而皇帝道而帝歷夏商周三王迭繼熈熈皥皥同底于治扵赫漢祖寛而有制光武奮興炎靈用熾唐興晉陽遂有神器太宗重光力行仁義明明有宋其徳克類曁于元氏而亦用乂豐功茂徳後先輝賁翼翼新宫有恤而閟貌像旣嚴皇靈斯莅享祀苾芬儀文孔備陟降在庭神之攸曁祚我皇明以克永世追封徐王廟碑陶凱洪武四年夏六月丙申皇帝御皇宫門召禮部尚書臣陶凱諭之曰皇后父徐王馬氏世為宿州人家閔子鄉新豐里王本民家素質朴以兄弟齒序人稱之曰馬某王少壯時膂力過人沉毅寡言笑重然諾而性剛強疾惡見有為不義者視之若仇讎然或少忤其意輙肆毆擊雖至死無所畏憚郷人莫敢犯當元政失馭天下將亂王以忿爭殺人恐逮扵法移家定遠及天下大亂乃挈皇后母避兵他所而以皇后託定遠郭氏俾育為已女後郭氏首難自為元帥收郲民兵朕亦為部下士遂以皇后為朕之配旣定天下卽皇帝位皇后正位中宫封皇后父為徐王母鄭氏為徐王夫人以他無繼嗣因立廟于太廟之東歲時奉祭然稽諸典禮古無其義扵是卽王所居鄉里闢地扵塋封之南作新廟奉安神主毎歲以春秋仲月俾有司祗奉祠事爾宜述其梗槩刻諸堅珉用垂不朽臣凱旣受明命竊惟人受天地之氣以生其得氣之厚而不薄者性必剛勇果毅然有不得志扵當時而澤及扵其後者必顯融光大此理勢之自然也今王有所抱負而無以發舒故常存疾惡之心其憤怒所洩卽以加諸人蓋亦豪傑之士哉使遭逢盛際必能出將入相垂名簡冊而乃生不逢辰至身殁之後以皇后父而得追崇王爵作廟故鄕使山川改觀井里增輝又豈非一出扵天乎臣凱謹拜手稽首而爲之銘曰維此徐方代生異人乘時啓運蔚為王臣惟王之生質性過厚不逢昌時深居畎畝王奮厥怒孔武有力摧強折奸以輔彛則當元之季天下擾攘挈家避地東南其行英雄陸沉豪傑未起抱恨重泉吁其巳矣山川炳靈遺德所鍾篤生聖女正位中宫皇帝仁聖為天下父皇后孝慈為天下母太姒嗣任則百斯男聖子神孫何千萬年川原膴膴新廟奕奕與國同光永世無斁歙縣孔子廟碑宋濂歙漢縣也初屬丹陽自吳晉而下雖屢更爲郡若州而縣仍舊名不廢其地爲東越奥區號多佳山黟川如龍前行偃蹇不受羈紫陽問政二山又矗起東南勢若翔鳳鳳凰飛布紫金諸峯又騰翥于後先而黃山又直西北竒巒之不可名者凡三十六丹崖翠岑分割陽隂而吐和降精扵無窮故士之生其間者或以氣節著或以道藝名時有其人近代尤稱名士立言著書動足名家是固因山川之靈攸鍾其沈涵陶育之者非立學之所致歟初學在縣治之東淳祐庚戌郡守謝坣始建至大庚戌縣尹宋節至正甲申縣丞葉琛皆葺而新之壬辰兵起而歙爲鬪爭之塲官廬民舍焚爇無遺而學亦廢矣澹烟荒照榛荆蔽途而狐兎或暮出衝人識者爲之徬徨大息如是者十年辛丑之夏張侯齊來爲縣慨然歎曰歙爲徽國文公父母之邦道德之化衣被天下雖時丁尚武而其郷學可乆廢乎遂請于大府而經營之㑹故基已更構紫陽書院遂扵書院之東立表考宜剪刈穢荒别畚新土充其虧窪高爽塏䟽有踰其舊中峙王寢象厥正配黼坐朱几嚴事有容旁圖從祀扵兩廡間外敞正門列以畫㦸法庭端㓗墄平宻鞏欄楯翼遮術道直修外爲都墉樹以三門上應靈星榮光昭煥廟左别築論堂直齋以處講師曁弟子員不嗇不侈無諐彛憲經始扵秋九月考成扵明年壬寅之秋八月侯帥儒師行釋奠禮牲幣有飭庭燎伊煌罇爼維旅法齊苾芬神來顧歆如在左右觀者歎慕至扵詠蹈僉謂侯之嘉惠吾民者深不可無以貽永乆扵是敎諭江君材奉幣請文刻諸麗牲之碑惟先王之制自諸子以至公卿大夫士之子使之修德學道春合諸學秋合諸射以攷其藝而進退之是文事武備均出扵學也所以興師必受成而行及其還也則釋奠于學而以訊馘告曷嘗析爲二哉自世道旣衰不復獲沾先王之澤之盛人徒見提旛鼔而簡車徒者乃指爲武殊不知制勝兩楹折衝千里而有所謂詩書之帥也侯扵下車之𥘉能汲汲建學扵用武之日可謂知斯道矣歙之人士尚當竱心一力惇扵明體適用之學平居之時則談爼豆而攻遺經一遇四郊有警則撡戈上馬以收獻馘之功使議者咸曰是生文公之邦而無忝山川之靈者庻幾不負建學之意不然豈予之所敢知哉侯字仲賢齊其名也某郡人以行中書掾擢爲令招徠懷集民驩趨之遂成市落縣廨驛舍皆新作之而尤急扵農功築吕堨及良干范阮二埭歲以有秋其善政蓋不一而足當時相其成者則丞胡拱辰主簿王某及江君云臨濠費氏先塋碑皇帝登大位之三年覩四方之旣平嘉諸將之勲烈乃十一月丙申大封功臣爲公侯錫以鐵劵俾傳諸子孫扵是臨濠費侯自僉大都督府事進開國輔運推誠宣力武臣榮禄大夫柱國平凉侯旣而復謂賢豪之生基德累仁必繇于其先乃推榮其三世侯之曾大父五一府君贈驃騎將軍都指揮使護軍追封靈壁縣子大父六三府君贈鎭國將軍僉大都督府事護軍追封江夏伯顯考七五府君贈榮祿大夫同知大都督府事柱國追封平凉侯曾祖妣李氏祖妣及妣兩何氏皆從其夫爵邑爲夫人命書旣下侯用牲醴詣五河告祭于先塋榮光赫然照燭泉壤山雲宰木飛揚燁奕皆有異氣自是歳時奉祀惟恭侯間謂余曰吾世齒恒氓至干吾躬遭時遇主奮自戎行奉命克敵或專或禆凡十八年始于淮江中扵閩浙至扵定中原舉關陜皆與諸將之列取城邑以數十計其艱且勤亦至矣藉聖主之德念録微勞爵爲列侯名載冊書人臣之榮無所與比顧豈吾材之能致哉實我祖考遺休餘澤之所及也惟我祖考皆有厚德爲鄕邦所稱宏址深源誕啓厥後恩數之加允稱不虚兹欲歌頌先德敷楊聖恩樹石墓道俾後嗣知所自出非子孰宜余嘗待罪國史撰次功臣勞烈知侯爲人仁勇有智畧事上御下以忠以誠今又弗忘其先以顯著遺德爲事可謂知所先後善爲臣子者矣侯名聚字士英其詩曰帝乘六龍起江淮東濠泗之間爲漢沛豐維時費侯貙吼虎雄壯馬長矛爲帝股肱旣定泗濵遂剗靈壁維滁及和一舉而踣孰謂大江可限南北萬馬飛渡不少羽翼巍巍建業扼江而城旣入其郛帝庸作京廣德旣綏遂平長興軍聲轟轟四方震驚蠢彼僞吳假息于蘇愚弗量能自干天誅將命以行以翦以刳獲其大醜歸寘質鈇帝德如日愈乆而晣孰倚冰雪以詫弗㧞何閩何浙何勍何劣如朽之折如藩之撤閩浙旣淸載征中原巨壘連營望風而奔或奔或降追刖其根中原卒平萬方來臻帝嘉治平曰誰之功鐵劵丹書錫爵命邦矯矯費侯平凉是封豈惟其身榮迨祖宗侯有峻爵上推扵父維祖甚仁伯于江夏江夏之先靈壁是子旁及其嬪咸有爵土費侯曰咨小子無良祖考之休積厚而昌旣有土田又蕃牛羊維曰薦奠以致孝享大登如几牲碩酒旨費侯涖祀陳豆奠斚擊鼔駭駭焚幣煒煒費侯克孝祖考咸喜濠民謂侯勇不失身委質聖君爲社稷臣濠民謂侯貴不遺親玉佩貂冠爲賢孝孫四海旣同爵勲旣崇曷以承之維孝與忠忠以于朝孝以于家繼德無愆茀祿是荷惠州何氏先祠碑英傑之士立大功而享爵位者非其先基仁累善何能自致哉然其先有德而子孫不知報祀者有矣如報祀其祖而棄蔑其祖之子孫者有矣是皆不達禮義之弊也山東行中書省叅政何公其篤扵禮義者乎公名眞字邦佐世居廣之東筦至公始遷惠州祖諱發藻元贈中奉大夫廣東道宣慰使都元帥護國軍追封盧江郡公父諱叔賢贈資善大夫江浙等處行中書省左丞上護軍追封盧江郡公祖妣鄒氏母葉氏皆封盧江郡夫人公祖曁父世有濳德鄕稱善士公生八年而喪父母夫人守志不奪慈鞠嚴敎少偉然有志當元至正中中原兵起廣民王成亦構亂公爲小官卽請而討之已而解惠州之圍逐叛將黃常復惠州㑹賊䧟廣州公以兵復之由恵州府判五遷爲江西等處行中書省左丞階資善大大分省治廣公弟迪以從征功擢中奉大夫廣東道宣慰使都元帥兼僉樞宻院事遂推恩封其二代後合福建江西爲一省改拜公資德大夫江西福建行中書省左丞仍治廣州歲乙巳九月賊挾廉訪司副使廣寧等叛圍廣公禦之踰十月部將與賊通絶糧道公出避城䧟丁未五月復克之明年制授公榮祿大夫自左丞陞右丞未拜而皇明兵平江西詔至諭公公舉廣東之籍以降上嘉公保民順命之績授中奉大夫江西等處行中書省叅知政事洪武庚戌移山東行省越七年以老致其政初公追思顯融之盛由於先世旣扵東莞率族人建祠寘田以祀羣祖復與弟迪謀悉以其先所遺田儲租入以祭其禰公猶未慊扵心乃以惠州城西之私第爲義祠斥所有私田百餘頃爲義田世俾宗子主祀事恐族人不知學也有塾以敎之恐其羞服或乏也有粟帛歲賑之嫁娶喪葬有以助之疾病疲癃有以養之懼其乆而失其意也爲書以訓之俾嗣弗壞而來請銘嗚呼先王所以親民善俗之道遠矣賢人志士欲推之於世而勢有所不能欲退而惠一族化一鄉而力有所不逮者有之至扵勢足以爲而不爲力可以至而不至者亦有之此所以越數十世而事曾不一二見也惟公奮自韋布夷盜保民輯寧南服致位尊顯卒能識機效順戢歛干戈爲民請命使嶺南之民不易市肆又能推本反始孝于祖宗惠及族人所踐所言允可爲法其扵富貴可謂不茍處矣視𬒳恃險而賊民私厥身而忘其所自者其賢豈不多哉是宜紀行載勲著之樂石以爲後嗣式其銘曰維昔至正德否亂生海沸山崩靡人不兵額額粤南在嶺之外猖豎嘯呼民罹其害何公曰嗟我民何辜告于大藩請行天誅乃戈乃殳乃糗乃糧大斾修斨人莫敢當叛將肆凶賊我守邦鞭門疾呼䑕拱以降曷以褒功躋于左轄巨鉞良弓左旄右節豈惟其身錫爾祉考峻爵崇勲以顯忠孝祖考榮矣子弟孔多寳帶銀章威儀甚都邦人聚觀拜伏稽首按轡徐驅詢其耆老耆老有言大哉公勲元衰不君公其我臣公曰吁哉我志巳定待彼有德爲汝請命赫赫大明洸洸仁聲震于南荒勢無全城公束干戈載封版籍錦韜龍函獻于京國帝嘉厥功不勞我師錫燕彤庭重瞳屢回大江之西岱宗之東祿食十年執政廟堂寅畏恭勤髯鬢盡白詔優老臣勿勞以職公歎謂人我德何爲祖考之惠幸以弗墮豐湖之西有第奕奕玄楹文牖旣蠲且侐亦有土田被隰包原重穋荐年歲登百千我第以祠我田以祀祖考之休敢恤吾嗣池有穹魚圃有嘉𬞞以醢以𦵔丹荔清酤刲豕擊羊來烝來嘗孫子咸臻有雝鴈行或授以罍或奠以斚登降肅然莫敢叱咤數具禮全陳几布筵孰爲弟昆孰爲子孫公曰族人亦孔之夥揆本追原咸由扵祖祖病在指四體靡寜奈何一身㑹莫胥矜爾餒爾寒我有粟帛爾昧弗通我學爾迪爾有灾害我則戚之或有燕喜則慶樂之我有爵祿我祖之故不私吾身弘祖之祜豈無鄙夫爵祿是荷惟家之肥遑恤其他維公克仁仁以保民惟公克孝尊祖睦親嗟爾後人惟公是師繼承無忘公有訓辭上虞縣重修柯韓二牐碑上虞有湖名夏蓋延袤一百餘里縣東北衆水經上妃白馬二陂匯于湖釃爲三十六渠攴分絡聨以達于田凡漑一十三萬畮有畸渠之下流建二石牐視時溢乾而畜洩之歲恒無凶者近代農官失政畚土成塍取給一朝不旋踵而圯傍縣亡頼男子當旱暵時又夜半决防以去然湖竝于海鹵水或乘潮入善禍稼舊嘗造隄捍其衝潮汐齧蝕至是亦暴潰民憧憧告病矣乃洪武辛亥冬臨淮唐侯鐸自殿中侍御史出守㑹稽上虞㑹稽屬縣人士羣走白侯侯愀然弗寜行海上視决堤與民共約度田以㑹粟因口以賦庸鑿石爲隄自蓮花池至纂風合萬有三千尺始與故石爲隄屬侯斬牲饗海神巳登民謂曰隄幸成二牐無難者㑹侯召入爲卿奉常遂命僚屬集事其柯家牐廣二十有四尺深如度之數而贏其一先築土樹橜櫛比星攢度乆且不壞方敷以石兩翼四隅咸歛甃如法中峙石楹左右皆有副鍥坎䧟版以爲縱閉復隨土形崇􅋻䟽級爲五以瀉水上架石梁以便行者橜以章計者九百八十有五灰以斛量者三百六十又四石以丈數者七百三十有八匠以日考者一千三百其韓家牐廣减前牐之半深比廣倍之石楹唯二級道則减其一仍冠以石梁餘皆同其工物視前匠損四百石損五百灰損六十八橜損二百八十五始事扵甲寅秋七月訖工扵冬十有二月此其大凡也有道浮屠雷峯凈昱乃具事狀介太史氏朱君右徴濂文記其成予聞成周之時稻人掌稼下地以潴畜水以防止水以溝蕩水以遂均水以列舍水以澮㵼水其爲法甚備其爲利至乆也然而溝澮之屬所可考者其深廣自四尺至八尺或至於㝷仞各二先王豈不知害地而廢稼以爲不若是則水性失其常溢則有溺患乾則禾將菑矣古制不可復見有能設瀦防以惠民者得不謂之賢哉昔者曾文定公之爲齊州州城西北有湖䟽爲水門遇流潦暴集則取荆葦爲蔽納土扵門以防外水之入公爲易之以石其深八十尺廣三十尺視水高下而閉縱之而禁障宣通皆得其節人無後虞今唐侯之爲牐也其事與之頗相類世言古今人不能相及果足信之歟是可書巳相其成者通判府事吳敬知縣張翼營度督視不憚勞勩者主簿史文郁也司其出內則邑大姓徐某余某法宜牽聯得書海堤别自有記玆可畧云系之以詩曰維夏蓋湖百川所潴在彼海邦其一釃爲通渠行水委蛇漑稻與秔其二制水有牐因時闢闔其法孔臧其三農政斯缺惡瓖爲堨水失厥防其四侃侃唐侯爰諮爰諏中心䀌傷其五曰是弗修民焉有秋敢視爲常其六乃登寀屬乃謀乃告乃輯其長其七畮㑹其粟工來以族筮日奏功其八琢石于山樹橜于灣以楗以梁其九决塞有關旣堅且完若首有肮其十昔何怒突今乃順則弗墮我疆其十一行彼赤日淸流潏潏黃茂芁芁其十二食維民天非稼無年民用卒爽其十三伊誰我憐五馬翩翩朱衣葱珩其十四成周之制有溝有遂經畫維良其十五古法寖癈河渠興利其效則章其十六漢吏曰循惠乎烝民唯此之蘉其十七矧乎鉅津比枕海濵澤𬒳五鄊其十八侯治之棘行厖心惻不翅父兄其十九越石可泐越川可竭侯功勿忘其二十皇明文衡卷之六十三
