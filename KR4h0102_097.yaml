  text: 皇明文衡卷之九十七
  hash: sha256:d029577cff280b92d08c049211632a8e44058e3f5c08db5888dd8ef49bf2fa0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_097-1a}
body:
  text: 祭文禡牙文胡翰維歲甲辰正月某日浙東行中書省右丞李某以淸酌潔牲禡于大牙之神惟國大事曰祀與戎凡我有衆罔敢弗恭在昔草昧誕啓武功涿鹿揚靈牧野奮庸承天休命惟神是崇於皇漢祖奄起沛豐申嚴秩禮丕顯軍容百王繼軌庶士承風伊豫不武荷國委寄授越端闈總干東裔列城效順群醜慕義匪曰子能實神之賜赫赫靈旗道揚神威天日清照風雷厲飛睽睽萬月具瞻指揮何揮不躍何指不披薄海內外日所出入憺其於鑠罔不震讋肆于將士一乃心力鞠躬將事不越咫尺春酒既嘉潔牲孔瞃是用昭假令典有則神其監之尚永我翊宣我神武祚我明德削平僭亂佑我民物如周如漢如古有國登干至治報祀罔極祭胡先生文蘇伯衡嗚呼仲申良金美玉庶足以方公學術之精純商鼎周彛庶足以擬公𫐠作之古雅惟嚴毅以自持曾毀譽之不假故不合者甚多而合者恆寡方年歲之壯盛侣麋鹿而在野逮景迫於桑榆乃聖主之遭逢承特招之明詔邇淸光於九重體右文之至意振教鐸於一邦及元史之纂修遂大筆之獨當參公論以褒貶深上契於宸衷然而寶懷而不售材蓄而不試代言顧問上雖注意於柄用引年乞歸公則必行其素志得不以聲譽之隆吾所謂富而不在乎祿之豐道德之究吾所謂貴而不在位之崇不然既俞所乞拂袖而還長山之下竹林之間僦屋以憩貸田以耘非樵牧以為伍則猿鶴之同群亦獨何樂而志氣欣欣嗚呼仲申意謂百齡以重鄉郡何斯文之寡佑嬰微疾而遽病昔者相過塞坐書詩英俊在列笑談塵揮今者之來室是人非帷交塵網庭暗履綦嗟距公之云沒曾居諸之幾時慨夫事之殊異忽乎巳至於斯更一二歲徴文獻於門墻者何從仰其音徽牧牛羊於丘壟者誰復為之呵撝又况一紀必世乎此吾黨所以重反𬒮而歔欷也雖然生必有死盛必有衰猶旦有夜理固若兹惟古聖賢其身雖沒而其名永埀者亦惟托德業與文辭公之所藴固不見於設施公之所作則與古人而並馳其味也雋其聲也希大篇短章細書深刻者有不家傳而人誦之然則公固自有沒而不堙者存矣吾黨噓唏又奚以為聊緝此言以侑一巵蓋不獨慰公於九京亦將塞後死者無窮之悲嗚呼仲申以為是乎以為非乎為廖干章祭常忠武玉文永忠昔與伯氏有衆一旅知天命之有在爰委身於真主奔走禦侮目彼淮土方艱難險阻之備嘗豈自意得見王於和陽之滸立談之間分投氣合有如肺腑余亦不自知其何以同事戎行至于今蓋十六寒暑惟王文武全材有力如虎雖猛將之盈庭孰英風之敢擬况於余孱弱而敢與王齒每受命從征輒忘其懦怯而相與掎角者寶思附乎驥尾至於奬率六師灑掃九宇上以報答聖明下以乂安遐邇則王之所自許今南征北伐日闢地千里混一之功佐運之勳震今而耀古真可謂不負平生之語矣何堂堂山立之軀遽奄忽其蟬蛻將下民之無祿抑修短之有數然王之表表者固雖死猶生而聲名與國同休於千萬世也余之歔欷而涕泗交墜則念情好於疇昔感幽明之異路而巳耳於乎哀哉祭浙江潮神文謝肅吳越之交浙江中界吐吞海潮或小或大滔天沃日雪湧霆轟馮其氣勢必有神靈烈烈伍王素車白馬倐隂而陽與濤上下赫赫武穆稱吳越王射潮使伏鐡倚若春二王攸止妖遁鬼匿陽侯海若亦率乃職我維司憲偕彼同寅奉天子命將按八閩群黎是綏百司是紏頑廉懦立風俗再造鎮鑄一方實在此行道出浙江駕以舽艭惟神祐我濤波不驚蛟龍黿鼉滅迹濳形太虛空闊山川清美長風送帆一日千里峩峩閩關不遠伊邇省風問俗使節戾止賴神之休去險即夷一觴是奠神其受之尚享祭誠意伯文吳公願維元政之失馭兮豪傑奮其並興驅齊民使荷戈兮銷鋤犁以為兵勝負迭其相乘兮弱之肉而強是食競侵略以僭竊兮紛盜據乎南北塵滃滃兮而昧目兮焰炎炎而漲天計剽殺為功庸兮孰黔首之汝憐翳穹蒼之念亂兮實挺生夫聖明擐仁義為甲胄兮嬰忠信以為城江淮翕其景從兮顧瞻金陵而是都豈有君而無臣兮疇啓豫之雄圖惟先生之壯志兮夙藴皇王之學鄙管樂之陋或往兮謂伊吕之可作神諒兆於幾先兮吾將察夫璿璣覩王氣之攸屬兮知帝命之所歸虎嘯谷以生風兮雲出岫而隨龍鬱豫衷之耿耿兮舍聖人其焉從應聘命以效忠兮歡契合於諾唯神籌祕計不可以言喻兮恆決勝於千里彼偽漢之搶攘兮舳艫肆其橫江陳我師於彭蠡兮殪封豕於莊浪長軀直秪其巢穴兮循豫章而東之蘄黃與鄂嶽兮固風靡而無遺先聲讋兹兩浙兮復禽張而繫方操破竹之形勢兮七閩惴其敢當聞西北鄙之人兮曰奚為而後我征不庭而撫順兮不再鼓而俱下雖天道之助佑兮亦將軍之用力也發蹤迹以指示兮允先生之成績也皇錫爵以酬勞兮位次亞夫公侯效子房之勇退兮願從赤松以遨遊胡二竪之搆患兮動宸衷之憫惻帝曰卿其遄歸兮卑優遊於祿食賜絲綸以褒美兮示睿眷之不忘駕蒲輪以言旋兮桑梓賁其寵光仁者必得其夀兮諒理數之可推謂隂騭之獲報兮宜愈享於期頥泰山頽而梁木壞兮忽溘焉其云亡不愸遺於一老兮使斯文之遽喪古之人圖夫不朽兮惟立功與立言建茂勳於開國兮况著述之必傳秉二美而並載兮流芳藹於靑史永鴻名於無數兮亘萬古其猶不死嗟鯫生之多幸兮望餘光之有年曩叨班於朝著兮沐數載之嘉言承恩例以聮歸兮敢景行於先哲偕同心之友朋兮敬瓣香之是爇登瘠牲干凡爼兮崇淸沽之盈觴匪飮食之足尚兮庶至誠之馨香菊采采而垂華兮露泠泠而淒其靈惝恍之不昧兮魂髣佛而來思尚饗告山川壇文葉砥維洪武年歲月朔日榮祿大夫同知大都督府事南雄侯趙某今遣某官謹以潔牲醴幣昭告于山西闔境山川之神曰惟靈秀氣所鍾流峙成質長養萬物潤澤群生為利甚漙其功不細於赫厥靈實奠兹土風雨以時民物以阜災癘以消盜賊以弭山寧川謐是曰神職國之盛典報祀維時乃崇壇墠乃潔牲幣其或不然曷庸神為蠢兹殘酋烏合其衆嘯聚巖崖如魑魅然屢勤王師迄無所獲急則獸奔緩則蜂聚擾吾赤子掠吾土毛為時害者獨在于斯堂堂天朝萬邦職貢東漸西被聲教旁敷云胡兹境稂莠弗除天子曰咨爾往視師載掦我武必殱厥魁我臨我衆既戒以誓用祭明神祈爾隂佑敢告祭宋景濂先生文方希古公之量可以包天下而天下不能容公之一身公之識可以鑑一世而舉世不能知公之為人道可以陶治造化而不獲終於正寢德可以涵濡萬類而不獲蓋其後昆其所有者皆衆人之所難勉而未嘗自以為足其所遇者皆衆人之所難處則快然委命而不置乎戚欣此公之所以跨越前古拔彚超倫控宇宙而獨立後天地而長存者乎世烏足以知之徒傳誦其雄文執其詞者惑其意得其似者失其真彼好慕者且若此又何怪乎臧倉與叔孫宜文公之厭斯世而不居甘遠迹於峨岷蓋將弔重華於九疑唁屈子於江濵而不忍汙乎流俗之埃塵也然則公固以死生榮辱為夢幻得失毀譽為浮雲六合之內孰非其第宅薦紳之士皆若其曾玄尚何窮逹之足云乎吾獨悲歎而不止者上以憂乎斯道下以憫乎斯民愧受恩而未報懼來者之無聞嗚呼哀哉公其舍此而安之豈其與形俱逝與物同泯乎吾猶髣佛見公騎風馭氣鞭日月而叱星辰遨逰乎崑崙之野出入乎無窮之門是蓋處乎世者止七十有三年而不死者不知其幾千萬春其遇乎人者雖若艱危而可痛而樂乎天者不可數計而具陳而吾猶噭噭哭于山巔與水濆是皆公之所笑而奚能酬教育之厚恩嗚呼哀哉列泰茟以為殽注滄海以為樽吾知公之不我顧而庶幾可以報公者習其所聞以求不負乎明訓行其所得以冀有益於黎元酹皇天與后土尚同鑒乎斯言祭王原采文楊士竒於乎先生之學聖賢是師先生之行綱常允持先生之心金石其貞先生之志雪霜其明浩然歸全乘雲翩翩我懷先生崇山長川桐川之藏既固且深遙致觴奠神乎其歆祭少師東里楊公文黃淮嗚呼公之德業文章簡在宸衷播聞中外煥若日星之昭晣固不待區區贊美之蕪詞然而公之於我也道義交情終始無違苟不託之於觚翰曷以致夫感仰之私淮自筮仕以來五十年于兹升沉榮辱與時推移厥𥘉承乏職兼兩制僚友之中公尤我知情之相孚堅如膠漆事之可否信若蓍龜建夫鸞輿北狩靑宫監國愼簡宫僚以勵翼惟我與公而相依異體同心合轍並趍獻可替否一出于正竭謀殫慮靡憚勞劬晉錫便蕃光照倫輩百責所萃曾莫敢攴夫何人事之錯忤豈料災禍之荐罹公方入對明廷旋復釋還故職我則拘幽圜土一滯十稔有竒常承憫惻之念屢餽藥食之資詷我音耗撫我癡兒綢繆懇悃久而不衰忽沾湛恩之汪濊聿起涸轍之枯魚復聮𥚑而接佩同振迅於亨衢何豫孽之未殄遽攖患而遄歸莫致寸忱之報空馳尺素之書俄聞凶問歘然遠至使豫拊膺躑躅北望而呼號沾衣𬒳靣灑涕淚之漣洏嗚呼哀哉公年八十壽亦云多奚必耄期然而淮獨為公痛惜者不在壽之崇卑嗟惟冡嗣悖嚴訓而淪惑致陷身於危機由是積憂而成疾徒懷憤悶而莫追幾使垂成之偉繢止乎一簣之有虧幸遇皇上恢宏天地之大德眷念先朝之舊臣其在告也賜璽書以慰釋其蓋棺也隆贈恤以加恩公之哀榮始終斯亦可謂全矣復何言焉關河邈悠緘辭致奠矯首文江豈勝瞻戀嗚呼哀哉尚享祭兵部尚書陳洽文金幼孜惟公之生性行貞純忠謹謙和翼翼恂恂𥘉以才薦首列近侍繼典銓衡載職大理夙夜弗懈惟明惟公實稱委任仰副宸衷交人梗化肆造叛逆公贊元戎屢效勞績閲歷二紀撫鎮炎陬纍征不靖惟公懷憂寧橋之役公謀既善彼拒弗納失在輕戰師徒為衄冦勢披猖惟公秉義奮氣彌剛公蹈白刃如履平地一心為國有死無二孤忠偉節日月爭光凜凜英風振于遐荒公死如歸國有懿典生著榮名殁尤光顯稽行錫諡恩恤有加命子以官鸞誥實華豫忝交遊夙敦情好公既永逝益增悲悼有殽載爼有酒盈樽一觴致奠靈爽如存祭吳司業文楊溥嗚呼吾友其亡矣夫知吾友者重為古道惜也古之學者守道不二世或雜以異端吾友非周孔之道未嘗形諸語言古人愼於交際世或以辭色取合於須臾吾友非道同德合默默自如人惟驕矜恥於服善去道為益遠吾友人告之過則引咎自責不假乎強勉古人以直道為心世或務智術矯致物情吾友之待人則惟其誠人皆知古人為可師惟其溺於利欲或不免於支離吾友視之雲霄羽毛江漢流澌故其發迹翰苑師表成均而四海交遊六館之士皆擬於古人也使人皆吾友則無懷葛天唐虞三代惟人不吾友而後彼此町畦始終芥蒂豫與吾友託交三十年道義之篤會不以夷險而變遷豫昔南歸謁公於久别之餘篝燈夜語曾不足以盡區區及豫北往承途之便知吾友之遽亡雖萬千艱難亦當一見嗚呼吾友亡矣豫何能淑言不盡情望風而哭祭柱國平江恭襄侯陳公文周忱嗚呼公之器量超出乎衆人之表公之忠義深結乎主上之知受三朝之眷倚提十萬之雄師涉川航海智勇並施內則足倉儲於天府外則耀聲滅於邉夷晚居東楚兼任保釐冀兵民之緝睦務鎮靜而撫綏况乎笑談尊爼淹貫書詩當吐辭而發論咸卓絶而瑰竒此又縉紳君子之所同仰豈獨介胄之士愛戴而歸依忱末學無似德菲位卑辱忘年而託契常與進而不遺每轇輵於議論必更僕而移時謂之知巳胸臆匪凡人之可窺轉般有法公欲與我􅒑畫而同為海運有鐸公欲屬我編次而序之事未及就言猶在耳别僅兩月而公奄及於大期嗚呼是可哀也已會通之河漕運攸資曰壩曰閘曰堰曰堤後千百世覩公之迹者雖庸人孺子亦將感慨而懷思矧我同事得失相規一旦永訣安得不灑涕而歔欷公之為國臨絶不衰潰表所奏公爾忘私進爵錫諡天恩疊推公有令子克紹靡違去歲此月陪公北馳天子有詔同趍丹墀今我復往公不可追艤舟淮浦瞻望靈帷爰感今而念昔致薄奠而陳辭公兮不昧鑒我傷悲祭岐男文錢溥嗚呼自吾之使交南也汝與弟嶧皆力疾迎至于楊州比歸自交南也而嶧巳死矣吾既哭之而來京汝復送至于楊州見汝體羸氣弱不宜以即遠遂留汝就醫于東吳豈期别踰半載而汝亦死矣嗚呼痛哉向吾同使事者四人或鍾瘴癘之疾或愆使命之宜皆悒悒不自安而吾獨少此二患豈天欲奪吾二子而俾之以苟全邪抑吾實不德而致天之殃吾後邪不然何間關萬里之險勞苦一載之餘而吾二子之禍不一免也嗚呼痛哉初汝以兄治家有弟尚幼故獨從侍於我者久每歲時稱壽坐我夫婦于堂上具觴豆率妻女升勸盡歡而退衣冠楚楚然眉目皎皎然為可愛嗚呼今復得有是乎吾每朝退汝必升堂致問暮則祗候于門或稟命而出應時以歸氣象雍雍然言論欵欵然為可喜嗚呼今尚得見是乎汝年十四五即能詩綴文往往出諸長者右卿士大夫見之慮有少年高科之不幸豈十載四舉皆阻干病病曰深學日篤尤冀脫晦而嚮明成大器于晚就去年哭汝弟猶曰汝在也而今又哭汝矣嗚呼尚復誰可望乎言念及此痛裂于心則天下之痛尚孰有甚于我哉汝於丙子冬生一子啓定而夭繼而生二女以兄之子啓賔為之後二女則取赴京來教養之以待成不知汝稟此明秀之質懷此抑鬱之志而精靈所在復念爾父毋兄弟乎念爾妻女乎化為祥雲列星而上燭乎殞之於地者為金玉乎為仙芝靈草乎吾皆不得而知也吾今寢不成寐言莫能文遣家人告汝兄以葬期復書此以祭汝汝能假之于夢寐以告我乎嗚呼痛乎哀哉尚饗翰林院祭李文逹公文劉定之公生中土河獄降英魁鄉對廷際于聖明宣廟擢材英皇授職遂由宰屬荐升華級諸部乃佐黃閣乃居天順返正日贊訏謨公之事主有始有卒𥙿陵復土甫終遏密公亦往矣龍髯追舉乘彼白雲仙馭乃參公之事親封以孤保父子橫玉以至于老既送考終遽從九原忠孝克終其曷如焉天子念公贈諡葬蔭朝行惜公弔賻哭臨矧僚與屬永訣顯幽陳辭靈几以侑醪羞祭薛文清公墓文胡謐於乎世有所謂義理詞章之儒其學異趍也而公則因文見道深味其腴觀公讀書兩録益充乎其有餘也又有所謂道德功名之士其心異致也而公則實與位稱不少為纍考公歷官諸績殆確乎其無愧也若公者雖古人為難能而謂今世之易得邪是宜朝廷倚之為輔弼薦紳視以為矜式也而謐小子雖夙厪山斗之仰且幸出於門下然未獲執摳趍以承一日之誨益也詎意自公請老而歸而遂成永隔邪此豈特謐小子之不幸而實斯世斯文所共惜也兹謐持節西來過公墓下不能不感今懷昔徒稔九原之長噫也於乎龍門之陽其山蒼蒼其水湯湯公之流風餘澤尚將同其永長矣乎謐庸俾有司祠諸學宫以與鄉之漢太史令隋文中子諸賢後先而相望庶幾英靈千載萃止一堂以益增乎山川草木之光爰復失詞以告跽獻此觴匪展謐一人之私蓋將廣觀法於鄉邦伏惟尚饗皇明文衡卷之九十七
