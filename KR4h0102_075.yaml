front:
  text: 皇明文衡卷之七十五
  hash: sha256:bebbbf76d0104100589aef5f760964c7e41016875a30d668b2a8b91465dc453a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_075-1a}
body:
  text: 神道碑湘獻王神道碑文解縉自古帝王受命拯溺亨屯必有追崇盛典褒嘉旌異顯微闡幽昭示來世若成湯之吊龍逢武王式商容之閭封比干之墓銅盤勒銘燭于千古政有因革異世同符矧惟我太祖高皇帝功光宇宙道盡君師恩義兼隆子姓多吉弘祐于我今上皇帝天道顯助震動傒志會朝清明揖讓底定日月光華黎庶鼓舞申明舊章民物按堵曾不逾時化危而安易亂而治山川草木皆有喜氣逹孝推恩施由親始惟我太祖高皇帝第十一子湘王純孝乘哲遇害於苫塊之間窮苦沉抑皇帝嗟悼無已詢咨群言褒諡曰獻治其祠墳詔翰林院學士臣縉曰湘獻王懿德文武嬰兹荼毒朕將昭顯之爾其為文樹石神道永示無極臣縉仰惟皇上因心篤慶比於成湯周武弔龍逢封比于之事戚疏等差忠厚有加不敢以菲薄辭拜手稽首敘次為文謹按諡法聰明睿智嚮惠內德曰獻惟王幼而美異長而通明溫恭粹德武而右文讀書窮理自為課程常至夜分不寐篝燈屛枕皆自勒銘以為警策齋明盛服精思力踐有所獨得於死生之故天道之微包括宇宙貫一古今人莫能窺其際也嘗欲著述以開來學手未嘗釋卷開景玄閣延四方賢士編輯閎富皆有緒而具在可踵而成有益於斯文學者甚厚其平居被服儒素姿體明秀望之玉山晴霞即之春風麗日聼其言淡而不厭和鑾佩玉從容合度自然足以廉頑起懦不自覺其入人之深也然膂力過人握弓矢刀槊上馬奮捷如飛論古兵制前事成敗出人意表達兵反常德進至荆之虎渡王曰虜兵鋭甚必有以挫之今漸沮衄若縱使得入塞遺禍將大即自畫計遣將奮前擊之敗其前鋒遂窮追之逆兵由是竟不得出塞途中數敗至延安殱焉實本王之首挫其鋭算無遺䇿卒成大功太祖益嘉之特召至京慰勞遣還伍開蠻作亂太祖命王率諸軍討之先入據其窟穴遣人四出招諭盡降其衆不戮一人太祖大悅勞遣還國其卓卓大者類如此又嘗造棺椁和藥餌施與軍民之貧者出入以縹囊盛書自隨祁寒暑雨不廢講誦聘問賢士備極恩禮過佳山水古迹徘徊終日必為歌詩文章刻著石上書法深繹晉人精思動合矩度太祖每有制作喜令書之詩歌豐腴清麗飄飄有出塵之想其文亦燦然理順造次輒成至於近世科舉之作反覆道義貫通經傳先生文士占畢一世所不能盡者其天資高邁不可及有如此也自太祖賔天哭踊幾絶因忽忽內傷有棄人間意逮建文君信讒者誣之以罪遣人圍其宫城逼執之王仰天嘆曰嗟乎吾觀前世大臣遇昏暴之朝將詔獄下吏便自引決身親太祖皇帝子南面而王太祖賔天疾不及視葬不及會抱兹沉痛有何樂於世今又將辱於奴婢之人乎苟求生活吾不能也因復痛哭灑地沾濕繼之以血具衣冠赴火死闔宫皆從之時洪武三十二年四月十三日王諱柏母妃胡氏洪武四年八月𥘉三日生十一年正月一日受册封為湘王建國于荆州十八年十二月之國妃吳氏靖海侯禎之女生二女皆夭無子墓在荆之江陵縣西太暉山之原銘曰猗嗟獻王孝乎高皇高皇篤愛王此大邦襟喉楚蜀粵惟荆湘既文既武有輯有攘蠢彼蠻寇蝟而跳梁帝命往征深入其疆招之畢來人其豺狼帝曰良哉于家有光窮胡豕突變起倉卒膻埃懸空聞者怵惕惟王神武謂彼奇獝長驅無前奔北以出將遺大難天下罔恤惟王至仁得人死力受算窮追虜以就殛聖道日還孔繁載籍惟王經緯有刪有述才兼衆長識邁千古開我後人功非小輔遭讒舍已從容就義不辱其身不降其志杯土荒煙蕪翳不治縉紳過之尚或流涕巍巍聖皇功高湯武理其祠墳紓哀泉土龍章金册繍裳衮衣惟王英爽象服是碑揭昭天地精神在天帝德王靈垂光萬年追封奉天靖難推誠宣力武臣特進榮祿大夫右柱國榮國公加封河南王諡忠武張公神道碑銘楊士奇王諱玉字世美姓張氏世家河南開封之祥符曽祖某祖某父天佑皆追封榮國公曾祖妣某祖妣劉妣王皆追封榮國夫人王𥘉仕元為樞密知院巳而灼知天命洪武乙丑自柭來歸我太祖高皇帝禮遇甚厚王感奮思效戊辰從征卜漁海子哈喇哈之地以功授濟南衛副千戶又從勦粉紅帖木兒至延安延川還升明威將軍安慶衛指揮僉事庚午從征永順散毛諸洞辛未逐北虜之侵邉者至鴉寒山而還調燕山左護衛癸酉追虜至黑松林甲戌征野人等處升都指揮同知戊寅朝廷用讒加兵親藩事急太宗皇帝不得巳舉靖難之師帷幄謀畫悉以任王王推誠致慮夙夜不懈事可否進止衆論紛紜未定者王正色數語決之咸中機宜故凡舉措必咨於王首用王䇿奪北平九門撫順討逆三日城內外悉定師將南出王曰不先定薊州將為後患薊平餘不足平時薊州守馬宣謀起兵迎拒上命王討之王至諭之不下環城攻之宣率衆出戰遂執宣殺之並執指揮毛某王知其可用釋不殺送詣北平遂撫輯軍民是夜急趨遵化豫戒將士止殺曰師行以得人心為本遂簡敢勇士四鼓登陴開其城門將士皆入城中始覺守將率衆拒戰執其將斬之餘不傷一人將吏悉隨王上謁遂移師永平密雲皆望風輸欵從至灤河王進曰都督潘忠楊松在莫州厄吾南路宜先禽之上悅遂親發兵命王為先鋒用其計取涿州雄縣生擒潘楊時長興侯耿秉文率兵二十萬屯真定王自請往覘之還言軍無紀律且其上有敗氣無能為上至無極以敵衆我寡欲試諸將勇怯召問今舉兵所嚮白度可必勝否衆未有適説王曰今當徑趨真定彼雖衆然新集未齊我軍乘勝一鼓可破之上曰玉言合吾意吾倚玉一人足辦明日抵真定接戰秉文大敗幾𬒳禽獲其左副將軍駙馬都尉李堅右副將軍都督寧忠及都督顧成等斬首三萬餘級獲馬二萬復敗安陸侯吳傑軍上召王諭曰汝之功也非汝與吾意合不及此永平馳報江隂侯吳高等以遼東兵攻圍城急又諜報曹國公李景隆引兵數十萬將攻北平城上與王謀先援永平既至髙等望風棄輜重遁王從上追之斬獲甚衆王言大寧去此不遠請移軍襲之可免後顧從之遂從攻大寧自辰至午城破斬其都指揮朱鑑執都指揮房寬下令安撫城中頃刻而定北平報李景隆兵圍城遂旋師王請先攻其營然後歸援從之徑搗景隆營大戰三日城中亦鼓譟出表裏夾攻景隆軍不支大敗遁去從攻廣昌蔚州進攻大同悉下諜報景隆收潰散卒號百萬且復至王言兵貴神速先事者勝請往駐白溝河以逸待勞可必勝也上命王率衆馳往駐三日景隆兵至王以精騎馳擊之斬馘無算景隆復大敗收餘卒退保濟南乘勝追擊圍其城既而解圍還攻滄州獲其大將徐凱進攻東昌敵列陳決戰上以數千騎繞出陳後敵圍數匝上巳衝擊而出王不知上所在突入敵陳大戰連殺百數十人王亦𬒳創而殁十一月草五日云春秋五十有八上哭之慟既旋師諸將皆侍語及東昌事上曰勝負兵家常事不足計所恨艱難之際失張玉良輔吾至今寢不帖席食不下咽隕涕不已諸將皆泣上既正大統行報功之典顧侍臣曰張玉才僃智勇論靖難功當第一惜其蚤沒贈奉天靖難推誠宣力武臣特進榮祿大夫右柱國追封榮國公諡忠顯追封其三代考妣仁宗皇帝在春宫數與侍臣言張玉識見謀略卓然老成非諸將所及且端方有匡直之益誠難得也既嗣位加封河南王改諡忠武告於廟以配享太宗親制祭王之文有秉義懷忠一心為國靖難之際發謀奮勇百戰當前所嚮風靡大功垂成挺身陷陳惟義所在視死如歸忠精貫于星曰功烈揚於竹帛之褒蓋王為人莊重果毅涉獵書史明其大義而識慮髙遠治家禮法秩然奉命行師紀律嚴肅與士卒同甘苦未嘗妄戮一人每語麾下曰為將當濺血戰𫀆流芳汙簡蓋其殉國之志素定古名將何過焉配王氏樞密院判執中之女有令德纍封王夫人子男三長輔起武功纍進奉天靖難推誠宣力輔運佐理武臣特進光祿大夫左柱國英國公太師監修國史知經筵事功德茂碩為國元臣次輗神策衛指揮使次軏錦衣衛指揮同知女一永樂中册為貴妃孫男六長忠授勳衛次鑑次瑾次瑄次斌次某孫女八長洪熙中册為敬妃次適淸平伯吳英餘在室余陪太師公在史館經筵久以余永樂洪熙從臣實聞二聖所嘗論王者屬銘神道之碑敬敘而銘之銘曰文皇奉天中興邦國桓桓忠武奮起羽翼帷幄密勿長䇿深畫上契淵衷魚水之得義旗肇舉仗劍先驅􅐁城九門功其權輿取薊遵化如探穴雛執其抗鋒摧朽折枯龍馭既南大斾在前連下雄鄚遄奮常山長河無險鐵城不堅撫降殱逆德威並宣決志敵愾遑恤厥躬精誠貫日徑氣吐虹聊城之鏖髮怒上衝先軫戰旗千載一忠王勞在國王績在史王嗣象賢益閎以偉帶礪山河廷有明誓淸廟陟配逾千萬祀奉天靖難推誠宣力武臣特進榮祿大夫右柱國太子太傅成國公追封東平王諡武烈朱公神道碑銘天命仁聖為下民主必生文武材略恢傑弘偉之士為之輔翼相與協力一心靖暴亂致治平以建非常之功夫肇創之績難矣中興尤非易也故前史贊勳臣率以肇創中興並言若我太宗文皇帝龍興北藩安宗社於將危保洪業於永固其功蓋又有難者以一隅之衆而應四方強盛之敵靡堅不摧靡剛不馴固自天之所定亦必有材略恢傑弘偉之佐以效夫疏附先後奔走禦侮之能是以大功之成勃然莫之能禦也若時東平武烈王其偉然傑然特出者乎王姓朱氏諱能字士弘世家鳯陽之懷遠曾祖考某妣某氏父亮從太祖皇帝征伐有功纍升武毅將軍燕山中護衛副千戶謹持行善撫士有譽於時母某氏王生有令質自少喜讀書事父母至孝洪武甲戌襲父職事太宗皇帝於藩邸小心愼恭未嘗少懈而撫恤下人一如其父甚為上所信任旦夕侍不去側奉天靖難之師𥘉與帷幄密議惟河間忠武王與王預焉時北平三司之交搆造禍者王與忠武建議率麾下首擒之遂奪城九門撫綏城內外三日人以大定引兵攻薊州擒其將都指揮馬宣等遂取遵化永平密雲從上攻灤河既還從克雄縣首破其東門敵衆敗走追反於月漾橋執其總帥都督楊松潘忠等復追其餘衆於鄚州斬獲不可數計乘勝長驅入真定大敗長興侯耿秉文兵時王獨與敢死士三十餘騎追奔至滹沱河秉文衆尚數萬復列陳嚮王王奮勇大呼衝入敵陳敵衆披靡自相蹂躪死者無算棄甲來降者三千餘人上大悅賜書褒諭永平馳報江隂侯吳高以遼東兵攻城急王從上赴援高遁走王追及之多所殺獲遂從定大寧戮其拒命撫輯其衆而還時曹國公李景隆率兵攻北平城王從上至鄭材壩與景隆兵遇大戰敗之進攻其營又敗之景隆兵列營九門者連敗之城中亦出兵夾擊景隆狼狽走王從攻廣昌蔚州大同次第悉下景隆復收潰散之卒號百萬來攻上親拒之王為前鋒午至白溝河敗其都指揮平安軍及申又與敵兵戰大敗之明日王領左哨當前鋒又大敗敵兵盡克其寨柵敵走保濟南王率衆追之至鏵山敵嚴兵列陳以待王連破之敵衆釋兵降者萬餘人王以聞上悉撫而縱之蓋自是敵兵戴德皆願來歸無復鬪志然上得之即遣之不留王從攻滄州先破其東門入城斬首六萬餘級敵震懼遂獲其總帥徐凱進攻東昌敵列陳決戰上以數千騎出陳後敵圍上數匝王奮力翼上以出進戰夾河王為奇兵先鋒大敗敵將盛庸兵又敗平安兵于藳城追奔至真定戰其東門斬首萬餘級遂略彰德及定州勦西水寨巳而敗敵將李文於德州遂克東阿東平破汶上諸寨設伏淝河敗平安兵十餘萬進戰小河為敵所乘稍却諸將遽請旋師獨王力勸上行曰用兵未必常勝豈可因小挫繫自沮項羽百戰百勝竟亡漢高屢敗而終興自殿下舉兵來克捷多矣此小挫何足置意但當以宗社為重整兵前進耳上撫掌嘆曰尓言深合吾心遂行至靈璧敵盛兵迎戰王先登陷陳大敗之生擒其副總兵陳暉平安參將馬溥徐真及都指揮三十餘人獲馬二萬敵衆死者尸蔽原野降者數十萬人悉縱遣之進克泗州渡淮敗盛庸兵遂克盱眙下揚州從上渡江入京師內難平諸王臣民推戴上承大統論靖難功王居首賜號奉天靖難推誠宣力武臣特進榮祿大夫右柱國左軍都督府左都督封成國公食祿三千五百石子孫世襲賜誥劵追封三代考皆成國公妣皆成國夫人永樂二年命兼太子太傳四年安南黎季㹈弒其國主毒虐下人拒遏詔使數諭弗悛遂發兵討罪命王總兵佩征夷大將軍印率左右副將軍左右參將及神機橫海驃騎遊擊鷹揚五將軍兵八十萬討之瀕行上親送之龍江師至廣西上顧侍臣曰朕夜察天象西帥有憂其朱能乎然能足辦斯事朕第慮氣候非其所習耳踰旬訃聞上震悼輟視朝五日一時同王從舉義者永康侯徐忠等十數人皆入奉慰上灑泣曰方艱難時協力一心相濟能其首也且其素存心行事皆應遠到曷遽止此言已益酸楚左右皆流涕莫敢仰視蓋王至龍州嬰疾薨十月𥘉二日也春秋三十有七上親為文祭之宸衷悲愴湓於言表讀者皆為泣下賻恤特厚追封東平郡王賜諡武烈拜加贈其三代皆王爵仁宗皇帝臨御特詔王配享太宗廟廷賜祭之文尢極褒重蓋當時元功之首也王頎然魁碩勇力過人器宇宏博智識高遠雍容端重辭氣溫𥙿廣坐羣議王折衷之詞簡理當無不心服善馭將士教訓撫恤親若父子紀律明肅無敢踰越每遇徑敵大呼馳鬪以一當百敵皆望風辟易懷綏降附恩惠周至出謀制勝靡有遺䇿尤善用才人率歸心雖古良將不過是也葬昌平北澤山之原配玉氏纍封東平郡王夫人子男若干長勇襲封成國公太子太保篤實公忠祗勤弗懈歷事四朝國所倚重次某某官女君干某官某其壻也孫男若干孫女若干永樂𥘉某侍講禁林凡軍國事預陪廷議恆與王接知之有素至是太保公屬書神道之碑敬敘而為銘銘曰明聖之興天實命之必有名世輔翼攸資文皇大聖奉藩恭恪天將啓之內難奄作有不得已義旗載揚彬彬文武風雲奮興于時東平雄才弘略夜寐夙興密侍帷幄刈違撫順式宣德音環城中外有截一心金戈所嚮漁陽風靡永平不固大寧傾圯後顧無虞前驅翩翩折朽雄鄚摧堅中山益都追奔滄州殱逆咸奮先登電掃霆擊青齊既帖踊躍而南持志決往宗社為心靈璧疾下長淮飛渡茫茫圻甸有迓無拒大江無險內難廓淸翼龍升御天開日明國有元良遂兼儲傅端肅之行寬仁之度南交弗靖奉命徂征師未出疆大星墮營天不慗遺堂柱遽仆帝聞䀌傷恤典隆厚忠存社稷勳載簡編偉哉嗣興顯顯象賢河山有誓追崇有詔皇明萬年永配清廟皇明文衡卷之七十五
