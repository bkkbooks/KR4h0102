front:
  text: 皇明文衡卷之十三
  hash: sha256:66cce37eed035065f4d7ad2834b5274a84b156dae72c46fa2611c57546fabec4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_013-1a}
body:
  text: 解釋附辨儒解王禕有用之謂儒世之論者顧皆謂儒為無用何也曰非論者之過也彼所謂無用誠無用者也而吾所謂有用者則非彼之所謂無用矣夫周公孔子儒者也周公之道嘗用於天下矣孔子雖不得其位而其道即周公之道天下之所用也其為道也自格物致知以至於治國平天下內外無二致也自本諸身以至於徴諸庶民建諸三王本末皆一貫也小之則云為於日用事物之間大之則可以位天地育萬物也斯道也周公孔子之所為儒者也周公孔子遠矣其遺言固載於六經凡帝王經世之略聖賢傳心之要粲然具在後世儒者之所取法也不法周公孔子不足謂為儒儒而法周公孔子矣其不可謂為有用乎噫斯吾之所謂儒也其果世之所謂無用者乎且世之所謂無用者我知之矣縫披其衣高視而闊步其為業也呫畢訓詁而已耳綴緝辭章而已耳問之天下國家之務則曰我儒者非所習也使之涉事而遇變則曰我儒者非所能也嗟乎儒者之道其果盡於訓詁辭章而巳乎此其為儒也其為世所詆訾而蒙迂闊之譏也固宜謂之為無用固誠無用矣而又何怪焉姑孰潘君章甫儒之有用者也自為右史即以嘉言讜論上蕳主知歷僉湖廣浙東憲所至赫赫有政譽用是入中書為參議遂拜江西按察使夫陪鈞軸總憲度國家之任莫重焉而君則迭任之此其為有用夫人之所知也抑余之所知固有大於是者周公孔子之道吾將望之儒者之效庶幾賴以暴白於天下寧如今日所見而已乎雖然有用之用難矣而無用之用亦不易也若余者蓋業於無用之用流於迂闊不能以自返者也君盍有以教我乎哉余嘗執筆繼君後知之也深故於其行解儒以為贈豢龍解朱右龍非可豢也可豢非龍也夫龍淵潛而天飛能小大致雲雷澤下土神變莫測豢養何加焉豢養得加之則非龍矣畨舟入貢由南海入廣有物蜿蜒長七尺魚身牛首繭角鱗甲瓜牙鬚鬛具如龍舟人以木穽窊其中置海水以豢養之將獻京師且曰初為漁網得之若黿鼉魚鱉然吾固知其為非龍也天下大獸五鱗之長為龍而龍有神不神不足以長物也裸之長為人而人有聖不聖不足以長人也或以人為人非也聖斯全人矣以龍為龍非也神斯全龍矣人將不以聲利惑則龍不可以豢養得故曰人無欲猶龍然作豢龍解中星解貝瓊中星見於作曆之法尚矣天有定星星無定位各於四時考之南方而堯典言象言次言星之不同何也永嘉鄭氏本於孔注互見之説諸家無以易之蓋南言朱鳥則知東為蒼龍西為白虎北為玄武矣東言大火則知南為鶉火西為大梁北為玄枵矣西言虛北言昴則知南為星東為房矣余求之經而參之考亭所論豈特以互見為文哉天道至幽至遠而聖人察之至精至密春言星鳥以二十八宿各復於四方而星鳥適見於昏中故舉而言之至於仲夏則朱鳥轉而西蒼龍轉而南而大火適見於昏中不可以象言亦不可以星言矣秋之中星則玄武七宿之虛宿冬之中星則白虎七宿之昴宿故於此獨舉一宿焉大抵天以星為體而有廣狹逺近明暗早晚惟中者則載之故月令仲春昏弧中旦建星中餘月皆舉二十八宿而此獨非者以弧近井建星近斗井斗不可的指故舉弧建以定昏旦之中則知堯典所載豈非以其中之所見而言乎聖人考中星以正作説成易之事析因夷隩之宜所謂術不違天政不失時者如此然堯時冬至日在虛昏中昴至朱子之時則日在斗昏中璧此見歲差之由而歲差之由恆於中星知之茍以為互見其法無乃甚踈邪吁差之毫釐繆以千里而學者不之詳也故表而著之釋統上方希古仁義而王道德而治者三代也智力而取法術而守者漢唐宋也強致而暴失之者秦隋也篡弒以得之無術以守之而子孫受其禍者晉也其取之也同而身為天下戮者王莾也苟以全有天下號令行乎海內者為正統邪則此皆其人矣然則湯武之與秦隋可得而班乎漢唐之與王莾可得而並乎莾之不齒乎正統久矣以其篡也而晉亦篡也後之得天下而異乎晉者寡矣而獨黜莾何也謂其無成而受誅也使光武不興而莾之子孫襲其位則亦將與之乎抑黜之乎昔之君子未嘗黜晉也其意以為後人行天子之禮者數百年勢固不得而黜之推斯意也則莾苟不誅論正統者亦將與之矣嗚呼何其戾也正統之説何為而立邪苟以其全有天下故以是名加之則彼固有天下矣何必加以是名也苟欲假此以寓褒貶正大分申君臣之義明仁暴之别內夏外夷扶天理而誅人偽則不宜無辨而猥加之以是名使聖智夷乎暴桀順人者等乎逆弒也僥幸而得天下者雖其勢力之強無所為而不成然其心私計而深念未嘗不畏後世之公議今將立天下之大法以為萬世勸戒不能探其邪正逆順之實以明其是非而槩以正統加諸有天下之人不亦長僥幸者之惡而為聖君賢主之羞乎適事機之會庸材小人皆可以得志處非其地用非其時聖君賢主亦不足以成治功古之能統一宇內而動不以正者多矣秦隋其尤也動不以正而以正統稱之使文武周公而有知其不羞與之同此名乎故謂周秦漢晉隋唐宋均為正統猶謂孔子墨翟莊周李斯孟軻楊雄俱為聖人而傳道統也其孰以為可非聖人而謂之聖人人皆知其不然不可為正統而加之以正統之號則安之而不知其不可是尚可以建之萬世而無弊乎名者聖人之所慎也季子然以冉求仲由為大臣孔子忿然爭之若二子之才魯之諸臣莫及也苟為大臣未見其為過而孔子慎而不許蓋才如仲由冉求而以為大臣則伊尹周公將曷以名之乎伊尹周公大臣也則二子非其類矣故曰可謂具臣矣以秦隋而方乎周豈直若二子之與伊尹周公哉使孔子而出其不混而稱之也決矣蓋必有其道焉而不可知矣嘗試論之曰天下有正統一變統三三代正統也如漢如唐如宋雖不敢幾乎三代然其主皆有恤民之心則亦聖人之徒也附之以正統亦孔子與齊桓仁管仲之意歟奚為變統取之不以正如晉宋齊梁之君使全有天下亦不可為正矣守之不以仁義戕虐乎生民如秦與隋使傳數百年亦不可為正矣夷狄而僣中國女后而據天位治如符堅才如武氏亦不可繼統矣二統立而勸戒之道明僥幸者其有所懼乎此非孔子之言也蓋竊取孔子之意也釋統中正統之説立而後人君之位尊變統之名立而後正統之説明舉有天下者皆謂之正統則人將以正統可以智力得而不務修德矣其弊至於使人驕肆而不知戒舉三代而下皆不謂之正統則人將以正統非後世所能及而不勉於為善矣其弊至於使人懈怠而無所勸其有天下同也惟其或歸諸正統或歸諸變統而不可必得故賢主有所勸而姦雄暴君不敢萌凌上虐民之心朱子綱目之作所以誅暴止亂於前而為萬世法也立一法而不足盡天下之情偽則小人將馳騖乎法之外而竊笑吾法之踈是孰若無法之愈乎故正統以處其常而參之以變統然後其變可得而盡也朱子之意曰周秦漢晉隋唐皆全有天下矣固不得不與之以正統苟如是則仁者徒仁而暴者徒暴以正為正又以非正為正也而可乎吾之説則不然所貴乎為君者豈謂其有天下哉以其建道德之中立仁義之極操政教之原有以過乎天下也有以過乎天下斯可以為正統不然非其所據而據之是則變也以變為正奚若以變為變之美乎故周也漢也唐也宋也如朱子之意則可也晉也秦也隋也女后也夷狄也不謂之變何可哉正統則處之以天子之制變統則不得並焉正統之君非吾貴之也變統之君非吾賤之也賢者得民心得民心民斯尊之矣民尊之則天與之矣安得不貴之乎非其類無其德民必惡之當時惡之後世以其位而尊之則違乎天矣故不得不賤之也貴不特於其身而又延及於子孫雖甚愚不肖苟未至於亡國猶尊之以正統之禮賤不特於其身而其子孫雖有賢知之才亦不能掩其惡夫如是而後褒貶明夫如是而後勸戒著夫如是而後正統尊姦邪息夷狄懼釋統下夫所謂變統之制者何也異於天子之禮也彼生以天子飬沒以天子葬儼然帝中國而臣四夷天下莫與敵大矣曷為而異其禮蓋其所可致者勢也不可僣乎後世者義也勢行於一時義定於後世義之所在臣不敢私愛於君子不敢私尊於父大中至正之道質諸天地參諸鬼神而不惑也何謂天子之禮正統是也正統之君始立則大書其國號諡號紀年之號凡其所為必書所言必書祀典必書封拜必書書后曰皇后書太子曰皇太子后及太子沒皆曰崩葬必書其陵其諡有事可紀者紀其事所措置更革曰詔曰令曰制兵行曰討曰征曰伐施惠曰赦曰大赦施刑當罪曰誅曰伏誅違上興兵者曰反曰作亂曰犯曰冦曰侵倍之者曰叛其鄰國其臣慢之者必因事貶之知尊正統者雖微必進之不幸而至於衰微受制於強暴或屈而臣之強暴者誠夷狄也誠不可為正統也則盜賊之雄耳必慎抑揚豫奪之辨其以兵侵也曰入冦得地曰陷據都曰據至闕曰犯虜正統之君必易辭書其故見殺曰弒而書其主之名及其主之沒也特書曰死其黨之與謀陳力得罪於正統者雖功多皆書曰死以著其罪以紀其惡得中國之地其民有思中國而叛之者曰起兵以地降者曰來歸不為中國而反者彼亦不得而盜賊之也亦曰起兵得郡則曰取某郡其誘正統之臣曰誘藝曰藝殺曰殺將相則名其主正統之臣降于夷狄則夷狄之死不曰卒而曰死凡力能為正統之患者滅亡則異文書之以致喜之之意正統亂亡則詳書而屢見之以致惜之之意變統之異於正統者何也始一天下而正統絶則書甲子而分注其下曰是為某帝某元年書國號而不書大書帝而不書皇書名而不著諡其所為非大故不書常祀不書或書以志失禮或志禮之所從變則書立后不書尊封其屬不書非賢臣雖王公拜罷卒葬不書行幸非關得失不書詔令非有更革不書其崩曰殂后死曰薨大臣曰卒佐篡弒贊征伐以危正統者曰死聚斂之臣曰死酷吏曰死浮屠之位尊而因事得書者曰死毁正統陵廟宫室名其主用兵不曰討不曰征伐刑其人不曰誅天下怨而起兵惡而起兵不曰反惡乎篡弒非惡乎君也惡乎夷狄惡乎女主非其君故不得以君道臨之也惟於其臣於其部落則得致其罪士之仕變統者能安中國則書能止暴亂除民害則書能明道術於後世則書有愈貴而愈賤者有愈賤而愈貴者利祿寵幸之臣愈貴而愈賤也守道不汚之士愈賤而愈貴也故君子之於變統外之而不親也微之而不尊也斷斷乎其嚴也閔閔乎恐其久也望望乎欲正統之復也是何也為天下慮也奚而為天下慮使女主而乘君位夷狄而踐中國篡弒而不亡暴虐而繼世生民之類幾何而不滅乎立變統所以扶人極能言抑變統者君子之所取也辨祿命辨宋濂三命之説古有之乎曰無有也曰世之相傳有黃帝風后三命一家而河上公實能言之信乎曰吾聞黃帝探五行之精占斗罡所建命大撓作甲子矣所以定歲月推時候以示民用也他未之前聞也曰然則假以占命果起於何時乎曰詩云我辰安在鄭氏謂六物之吉凶王充論衡云見骨體而知命祿覩命祿而知骨體皆是物也况小運之法本許慎説文巳字之訓空亡之説原司馬遷史記孤虛之術蓋以五行甲子推人休咎其術之行已久矣非如呂才所稱起於司馬季主也沿及後世臨孝恭有祿命書陶弘景有三命抄略唐人習者頗衆而張一行桑道茂李虛中咸精其書虛中之後唯徐子平尤造其閫奧也曰十一曜之説古有之乎曰無有也書云在旋璣玉衡以齊七政所謂七政日月水火木金土也而無紫氣星孛羅㬋計都也星孛數見於春秋或見大辰或入北斗紫氣則載之史册與氛祲同占羅㬋計都者蝕神首尾也又謂之交初交中之神初中者交食之會也借此以測日月之蝕也唐貞元初李弼乾始推十一星行曆鮑該曹士蒍皆業之士蒍又作羅計二隱曜立成曆起元和元年及至五代王朴著欽天曆且謂蝕神首尾頗行之民間小曆而已若吳伯善若甄鸞若劉孝孫若張胄玄之所造旦云七曜而不聞有十一星也曰然則假之以占命又起於何時乎曰洪範云月之從星則以風雨泠州鳩云武王伐殷歲在鶉火月在天駟則以星占國亦已久矣而未必用之占命也曰以星占命奈何曰豫嘗聞之於師其説多本於都利聿斯經都利蓋都賴也西域康居城當都賴水上則今所傳聿斯經者婆羅門術也李弼乾實婆羅門伎士而羅㬋計都亦胡𣑽之語其術蓋出於西域無疑朝公武謂為天竺𣑽學者於此徴之尤信也曰術之緣起則吾既得聞命矣然亦巧發而竒中乎曰有固有之而不可泥也何也且以甲子幹枝推人所生歲月展轉相配其數極于七百二十以七百二十之年月加之七百二十之日時其數終於五十一萬八千四百夫以天下之廣兆民之衆林林而生者不可以數計日有十二時未必一時唯生一人也以此觀之同時而生者不少何其吉凶之不相同哉吕才有云長平坑卒未應共犯三刑南陽貴士何必俱當六合誠足以破其舛戾矣三命之説豫不能盡信者此也天以二十八宿為體體則為經有定所而不可易以五星為用用則為緯恆絡繹乎其間或遲或留或伏或逆固有常度而可以理測茍謂纏某宿則吉歷某宫則凶猶或可言也設其星有變其行不依常經而犯乎河漢內外諸星又將何以占之哉或如前所謂生同一時者其躔次無不同吉與凶又何懸絶哉夫萬物皆出於五行安有五行之外又有四餘土木行度最遲而為吉凶者久故有餘氣而氣為木之餘計為土之餘猶或可言也水之餘則孛火之餘則羅果何所取義哉水火土木然矣奈何金獨無餘氣乎或謂相生故有而相尅故無亦非通論也况孛乃妖星或有或無而氣羅計三者本非星也不知何以有躔度之説哉十一曜之説豫不能盡信者此也曰秦漢以來諸儒推十二國分野十二次度數及其所入州郡躔次毫釐若無差忒者既可占國豈不能占人乎曰天運地維動靜不同故先正云有分星而無分野占國者不可盡泥也占國者不可盡泥况占命乎曰五星之精發乎地而昭乎天其分配十日十二子名雖殊而理則同也人資天地以生山林之民毛而方謂得木氣之多也川澤之民黑而津謂得水氣之多也得火氣之多則丘陵之民專而長也得金氣之多則墳衍之民晢而瘠也至於豐肉而痺則得土氣之多而所謂原隰之民也然則彼皆非歟曰五土有異而民生以之此固然也人之賦氣有薄厚短長而貴富賤貧夀夭六者隨之吾不能必也亦非日者之所能測也蹈道而修德服仁而惇義此吾之所當為也不待占者之言而後知之也豫身修矣倘貧賤如原憲短命如顏淵雖晉楚之富趙孟之貴彭鏗之夀有不能及者矣命則付之於天道則責成於巳吾之所知者如斯而巳矣不然委命而廢人白晝攫人之金而陷於桎梏則曰我之命當爾也怠窳偷生而不嗜學至老死而無聞則曰我之命當爾也剛愎自任操創而殺人柔暗無識投繯而絶命則又曰我之命當爾也其可乎哉其可乎哉所以先王知山川異制民生異俗剛柔緩急遲速異齊五味異和器械異度衣服異宜於是修其教不易其俗齊其政不易其宜所以卒歸於雍熙之治也昔者鄭大夫裨竈言鄭當火請以瓘斚玉瓉禳之子産不之與已而果然竈復云不用吾言鄭又將火子産曰天道遠人道邇非所及也鄭卒不復火嗚呼此不亦祿命之似乎吾知盡夫人道而巳爾曰近世大儒於祿命家無不嗜談而樂道之者而子一切屛絶之其亦有所本乎曰有子罕言命孔子生卒歲月辨或有問於濂者曰孔子之生傳記所載歲月不同公羊氏云魯襄公二十一年冬十有一月庚子孔子生榖梁氏之説年之與日同於公羊而謂冬十月孔子生則與公羊實差一月月固差矣至賈逵注二十一年經云此年仲尼生昭公二十四年服虔載賈逵語云仲尼時年三十五則皆以孔子為二十一年生也司馬遷著孔子世家云孔子生於襄公二十二年則與公羊榖梁實差一歲日則雖與公羊同而月復與榖梁異杜預主司馬遷以注左氏傳謂二十二年生司馬貞主榖梁公羊以證史記謂二十一年生遷誤為二十二年者蓋以周正十一月屬之明年也孔若古主公羊榖梁謂為不易之論胡舜陟主司馬遷謂如榖梁公羊所書則孔子出處之年與經史諸子皆不合孔宗翰亦主司馬遷羅泌之議略與宗翰同洪興祖主榖梁而謂周家改月十月二十一日庚子即夏之八月二十一日馮去疾見傳記異辭則造為調人之言曰襄公二十一年實巳酉之歲也是歲八月置間以曆法積之則大雪節當在十月十七日或十八日是為十一月朔氣又三四日方為庚子是孔子之生巳在十一月之節矣既在十一月則是二十二年庚戌歲首無疑公羊書為十一月似誤而非誤也司馬遷書為二十二年而又謂孔子之年七十三以卒亦未嘗誤也榖梁於年於月皆據實而書公羊於年亦據實而書於月則以節書謂有日可以表見也司馬遷於年則以節書三者皆非誤也若是衆言之不齊何如濂應之曰公羊榖梁二氏傳經之家也傳經之家當有講師以次相授且去孔子時又為甚近其言必有據依司馬遷固良史則後於榖梁公羊者也吾則無徴乎爾孔子所生之年吾當從公羊氏榖梁氏然以春秋長曆考之二十一年巳酉十一月無庚子庚子乃在十月之二十一日孔子所生之月吾當從榖梁氏注家謂巳酉為巳卯卯酉之文相近故誤書也曰孔子周流諸國之年世家所記多不可考宋之大儒或取之若如子言無不遲一歲者遷尚不足信乎曰衛靈公之時孔子適衛又適陳匡人以為陽虎而拘之世家謂孔子使從者為寧武子臣於衛然後得去按武子仕於成公之朝至穆公末武子之子相巳與孫良夫將兵侵齊則武子年當耄矣復歷定獻二公凡三十七年至靈公三十八年而孔子至衛使武子猶在其年將一百五十有餘歲矣武子之事然也孔子之年乃獨可信乎非惟此也孔子去魯世家謂定公十四年年表則又謂為十二年以年表為是則世家為非以世家為是則年表為非一書之中自相矛盾若此他蓋不足深論皇王大紀曰遷載孔子言行不得其真者尤多言行且爾而况於年乎曰洪興祖謂周之十月即夏之八月者然乎曰非也三代雖異建而月則未嘗改也殷嘗建丑矣書則曰惟元祀十有二月殷嘗建亥矣史則曰元年冬十月舉前後以例之則周制可知孔子作春秋行夏之時為萬世法不過截子丑二月於前歲之終耳月固不之改也否則春入於夏夏入於秋錯亂而不成歲矣曰馮去疾謂十月庚子在大雪後即為十一月者可乎曰亦非也世之星史曆生以六物占人休祥當氣會之文固有生於巳酉而以庚戌歲推之者孰云吾儒乃有是邪此野人之語舍之勿以汙齒牙可也曰孔子之生豫既得聞命矣其卒之時亦有一定之説乎曰左氏云魯哀公十六年夏四月巳丑孔丘卒司馬遷遵之諸儒又從而遵之理之所在孰得而違之故孔子所卒之年吾當從左氏然十六年乃壬戌之歲也是歲四月戊申朔有乙丑而無巳丑巳丑乃在五月之十二日巳與乙文亦相近故誤書也所謂乙丑則四月十八日謂當夏正二月十八日者非也謂十六年為辛酉巳丑日為戊戌者亦非也自壬戌歲上遡巳酉孔子之年乃七十四謂七十三者尢非也曰近代王應麟博極群書者也頗致疑於是而謂今不可考矣子乃質言之何邪曰衆言紛淆者當折衷以經經無明載當索之於傳索之於傳不猶愈於史乎謂今不可考者過矣曰子之言辨則辨矣夏周二正千古難決之疑也何言之若易易邪曰是非爾所知也雖罄徂徠之松以為煤盡剡溪之藤以為楮未能竭吾喙也他日當為受春秋者詳焉犧尊辨胡翰禮有犧尊即獻尊也司尊彛曰其朝踐用兩獻尊其再獻用兩象尊鄭氏讀獻為犧又音犧為摩莎之莎非也獻舉其事犧言其象其為尊一而巳以其尊之一而謂其者亦同不可也犧尊與象尊相須鄭氏謂犧尊飾以翡翠象尊以象鳯皇其説亦非也蓋犧尊為牛形象尊為象形皆周尊也王肅云犧象之尊全刻牛象之形鑿背為尊宋劉杳言古者犧尊彛尊皆刻木為鳥獸鑿頂及背以出納酒二家之言近之而杳又云魯郡地中得大夫子尾送女器有尊作犧牛形晉永嘉中青州盜發齊景公冡獲二尊狀類牛象意者古之遺制也苟以為刻木安能久置地中不壞或謂犧尊畫牛象尊畫象亦以木耳非古之遺制也蓋二尊皆以銅為之其取義皆以牛象而得名犧尊為犧形象尊為象形則犧當讀為羲獻當讀如憲各如其字之本音可也獻舉其事犧言其象不害其為器之一也觀於閟宫之詩朱子不取毛氏沙飾之義而今猶取鄭氏摩挲之音豈非過乎况杳之言足以證肅之説有足信乎宋皇祐中得著尊阮逸胡瑗取其器有脰名壺尊可也著地無足名著尊可也未能必其主名及黃長􅌖見之始定為著尊以為尊皆有脰唯其無足而著地則禮之明堂位所謂啇尊曰著者是也後有若長者安知不以余言為然乎余故具著于此以見名物度數在先王時不過有司之事降及後世雖學者不得而盡考焉則夫斯禮之失也久矣皇明文衡卷之十三
