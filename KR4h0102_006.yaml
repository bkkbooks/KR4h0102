front:
  text: 皇明文衡卷之六
  hash: sha256:1f7e434c137f58fc33495a21fa89e4cacaf5f5f7615c34734060cab2fb5c9aa5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_006-1a}
body:
  text: 奏議洪武戊辰四月大庖西上皇帝封事解縉臣伏奉聖㫖朕今命爾義則君臣恩猶父子當知無不言古云爾有嘉猷嘉謀則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳嗚呼人臣咸若時惟良顕哉臣謂成王於是失言矣歴觀載籍以來固以進諌之臣爲善亦未甞以納諌之主爲非唐虞君臣更相勸戒更相推譲光昭不窮載為盛美昔人有譛魏徴于唐太宗者為其録前後諌章以視起居郎楮遂良雖未必然借令有之亦足垂世臣主同休停婚仆碑臣竊謂太宗怒非其怒矣陛下當同符堯舜師表百王豈宜下比太宗則非臣之所願望也臣願與皐䕫比肩不願與魏徴同則則臣之感恩服義懇切以爲言者尤願陛下毋自狹小誠萬世一時也陛下挺生南服一綂華夷功高萬古此放勛也得國之正皆非漢唐宋所及真所謂取天下于羣盗救生民于塗炭命將出師皆受成筭不假良平不倚信布徐定燕都市不易肆女寵外戚寺人藩鎮之患消融底定皆處之有法朕兆不萌不邇聲色不爲逰畋旣皆遠過于漢宋又何謙遜于唐虞惟願陛下篤惇信之本加慎獨之功登臨若對之功益加宻不睹不聞之地能無間雖處深宮之内亦如郊祀之時即前日郊祀之敬繼今日存飬之功推所以愛臣之心以愛天下推所以待臣之心以待萬物喜怒哀樂一聴于天理上下四旁一視而同仁以天地爲一體以天下爲一人令出惟行也不宜於數改刑期于無刑也寜失於不經故令數改則民疑疑則不信刑太繁則民玩玩則不淸國𥘉至今將二十載無幾時無變之法無一日無過之人陛下嘗教臣云世不絶賢豈億兆之衆果無一賢如古之人而盡皆不才者哉陛下嘗教臣云民不畏死奈何以死懼之良由陛下誠信之有間而用刑之太繁也宜其好善而善不顕惡惡而惡日滋者善未必蒙福而惡未必蒙禍也嘗聞陛下震怒鋤根剪蔓誅其奸逆矣未聞詔書褒一大善賞延于世復及其郷尊荣奉恩始終如一者也或朝賞而暮戮或忽罪而忽赦施不測之辱則有之矣誠以陛下每多自悔之時輙有無及之歎是非私意使然也存飬之功須臾少加宻耳是以有過不及也陛下天性素嚴或差干急克伐怨欲臣知陛下聖性所無也臣見陛下好觀說苑韻府雜書與所謂道徳心經者臣竊謂甚非所宜也說苑出于劉向向之學不純溺干妄誕所取不經且多戰國縱横之諭壞人心術莫此爲甚韻府出元之隂氏鄙猥細儒學孤識陋蝇集一時兎園寒士鈔緝穢蕪畧無可采陛下若喜其便於檢閱則願集一二志士儒英臣請得執筆而随其後上沂唐虞夏商周孔之華奥下及關閩濂洛之佳葩根實精明随事類别以備勸戒刪其無益焚其謬妄勒成一經上接經史豈非太平制作之一端也歟今又六經殘闕而禮記出於漢儒蠢駁尤甚宜及時刪改日御經筵訪求審樂之儒大備百王之典作樂書一經以惠萬世以承唐虞尊祀伏羲神農黄帝堯舜禹湯文武臯陶伊尹太公周公稷契夷益傅說箕子於大學而孔子則自天子逹于庻人通祀以為先師而以顔曾子思孟子配自閔子以下各祭于其郷而魯之闕里仍建叔梁紇廟贈以王爵而以顔路曾晳孔鯉配一洗歷代之因仍肇起天朝之文獻豈不盛哉若夫配天宜復掃地之規尊祖宜備七廟之制奉天不宜為筵宴之所文淵未備夫舘閣之隆太常非俗樂之可肄官妓非人道之所爲禁絶娼優俾於變之民不遷于淫巧易制寺閹尊天子之貴不近于刑人執㦸陛墀皆爲吉士虎賁趣馬悉用俊良雖門戶掃除之役命公卿子弟之賢任諸侯王於衆職定乆任法而加封待臣子於一體示天下之為公除山澤之禁稅蠲務鎮之征商木輅朴居而土木之工勿起佈墾荒田而四夷之地勿貪釋老之壯者驅之俾復於人倫經呪之妄者火之俾絶其欺誑㫁所謂瑜珈之教禁所謂符式之科絶鬼巫破淫祀省冗官减細縣痛懲法外之威刑永革京城之工役流十年而聴復杖八十以無加婦女非帷簿不修毋令逮繫犬臣有過惡當誅不宜加辱治曆明時授民作事但伸播植之宜何用建除之謬方向煞神事甚無謂孤虚宜忌亦且不經東行西行之論天徳月徳之云臣料唐虞之曆必無此等之文所宜著者日月之行星辰之次仰觀俯察事合逆順七政之齊正此類也元首叢脞則股肱惰而萬事皆隳人君不以察爲明帝徳罔愆則帝志應而天命用休人君惟以徳爲政陛下拳拳於畏天畏鬼神而所謂畏民者則未至也孳孳於治民治強暴而所以治心者猶未至也且粢盛之潔衣服之齊脩舉之時儀文之備此畏天畏鬼神之末事也陛下豈誠以此爲足以盡事天事鬼神之道哉簿書之期獄訟之㫁詔誥之勤鈎鉅之巧此治民治強暴之支流也豈真以此爲足以盡治民治強暴之術哉古云天視自我民視天聴自我民聴孔子曰聴訟吾猶人也必也使無訟乎惟一于敬則心即天祭不必瀆而受無咎之福神不必勞而享無爲之治與天地合其徳日月合其明四時合其序而鬼神合其吉㓙矣近年以來臺綱不肅果若人言以刑名輕重爲能事以問囚多寡爲勛勞甚非所以厲清要長風采也夫人自救過之不給何暇劾人之過人自以言爲諱何能有諫諍之言御史紏彈皆承宻㫖未聞舉善但曰除奸但聞上有赦宥則必故爲執持意謂如此則上恩愈重而不知𬒳赦之人疑上好䛕此軰皆市井小人趍媚劬勞之細術陛下何不肝膽而鏡照之哉何嘗真有一夫持法固爭謂某不當罪某當刑如舜曰殺之三而臯陶曰宥之三哉臣篤知陛下輕天下之士者皆此軰無以稱塞淵衷也然誰不願其父母妻子安榮哉所以諫諍實難禍愆不測入人之罪或謂無私而出人之罪必疑受賄逢迎甚易而或蒙褒營救甚難而多得禍禍不止於一身刑必延乎親友誰肯捨父母妻子而批龍鱗犯天怒者哉陛下進人不擇于賢否授職不量于重輕建不爲君用之法所謂取之盡錙銖置奸朋倚法之條所謂用之如泥沙監生進士經明行脩而多困于州縣屈于下僚孝亷人材冥蹈瞽趍而或布於朝省驟歷清華椎梩嚚悍之夫闒茸下愚之軰朝捐刀鑷暮擁冠裳左棄筐篋右綰組符剔履之賤衮繡巍峩負販之傭輿馬赫奕雖曰立賢無方亦盍忱詢有德是故賢者羞爲之等列庸人悉習其風流以貪婪苟免爲得計以廉㓗受刑爲飾辭故有無錢工役無盤纏之俚諺鬍膀官人没商量之童謡出於吏部者無賢否之分入於刑部者無枉直之判黜陟無章舉錯乖方八議之條虚設五刑之律無常天下皆謂陛下任意喜怒爲生殺而不知皆臣下之之忠良也古者郷鄰善惡必記今雖有申明旌善之舉而無黨庠鄕學之規互知之法雖嚴訓告之方未備序禮講學必有其地有其時先之以仁義而後以法制則庻乎磨之有漸而行之有効如影之随勢也今也應故事立虚文善惡二字蕪穢而莫之顧長㓜之民掉背而不相揖紀綱不立節目無依勢使然也臣欲取古人治家之禮睦鄰之法若古藍田吕氏之郷約今義門鄭氏之家範布之天下世臣大族率先以勸旌之復之爲民表率將見作新於變漸次時雍至扵比屋可封不難矣陛下不可視爲迂闊而不切當今之急務也陛下天資至高合於道微百家神怪誕妄恍惚臣知陛下洞矚之矣然猶不免欲以愚弄天下若所謂以神道設敎者臣謂不必然也一綂之輿圖巳定矣一時之人心巳服矣一切之奸雄巳慴矣天無變災民無患害聖躬康寧聖子神孫繼繼繩繩所謂得眞符者矣何必興師以取寳爲名謂衆以神仙爲徴應謂有所謂某仙某神孚佑國家者哉且以傳國寳論之潞王從琦已焚之矣屢求屢得眞僞莫明假令眞有之則區區李斯之書秦政之制何足爲寳哉周武之時未有神仙符應書之所載可見也巳而古今享國之長未有如周者神仙釋老誕謾恍惚何足稽哉臣觀地有盛衰物有盈歉而商稅之徴率皆定額是使其或盈也奸黠得以侵欺其歉也良善困於補納夏稅一也而茶椒有粮菓絲有稅既稅于所産之地又稅于所過之津何其奪民之利於如此之宻也且多貧下之家不免抛荒之咎或疾病死䘮迯亡棄失今日之土地無前日之生植而今日之徴聚有前日之稅粮里胥不爲呈州縣不爲理或賣産以供稅産去而稅存或禆辦以當役役重而民困又土田之高下不均而起科之輕重無别或膏腴而稅反輕瘠鹵而稅反重此丈量之際里胥之弊也欲極其困而革其弊莫若行授田均田之法兼行常平義倉之舉積之以漸至有九年之食無難者臣愚所謂願除天下之征商者此也臣聞仲尼曰王公設險以守其國故小邑必有城隍重門擊柝以待暴客聖人之所制也而近世狃于晏安墮名城銷鋒鏑禁兵諱武以爲太平一旦有不測之虞連郡至望風而靡良平不暇謀賁育不暇闘武備墮之過也及今脩治不宜動衆但敕有司以時整葺寛之以歳月守之以里胥額設弓手課之以弓弩兼教民兵習之以兵農𨳩武舉以收天下之英雄廣郷校以延天下之俊乂古時多有書院遺基學田舊業貢士有庒義田有族皆宜興復而廣益之夫罪人不孥罰弗及嗣連坐起於秦法拏戮本於僞書今之爲善者妻子未必蒙榮有過者里胥必䧟其罪唐虞之世四㓙之罪止于流竄故殛鯀而相禹禹不以爲仇舜不以爲嫌况律以人倫爲重而有給配婦女之條听之於不全我則又何取夫節義哉此化原之所由也孔子曰名不正則言不順故賈生欲易服色而定官名尚書侍郎內侍也而以加於六卿郎中貟外何職也而以名於六屬御史詞臣所以居寵䑓閣郡守縣令不應回避郷邦同寅恊恭相唱以禮而今内外百司捶楚屬官甚於奴􅊢是致柔懦之徒蕩無廉耻之節擎跽曲拳於進退下氣怡色而奔趍一爲下官肌膚不保甚非所以長孝行厲節義也臣以爲自今非犯罪惡解官笞杖之刑勿用催科督厲小有過差蒲鞭示辱亦足勸懲矣臣但知罄竭愚衷之欲言固不止此承命忖量急於陳献所陳畧無次序亦不暇組織成文冀以將來取譽惟陛下幸垂鍳焉代虞部郎中王國用論韓國公冤事狀臣聞君親無將春秋誅意臣子事嫌干不軌固天下之所共誅幽明之所同憤者也然於事嫌不軌之中辨析幾㣲之際此禍幾之所不測骨肉之所難言者惟明主能察焉竊見太師李善長與陛下同一心出萬死以得天下爲勲臣第一生封公死封王男尚公主親戚訾𬒳寵榮人臣之分極矣志願亦巳定矣天下之富貴無以復加矣若謂其自圖不軌尚未可知而今謂其欲佐胡惟庸者揆事之理大謬不然矣人情之愛其子必甚於愛其兄弟之子安享萬全之富貴者豈肯僥倖萬一之富貴哉雖至病狂亦不爲矣善長於胡惟庸則姪之親耳於陛下則子之親也豈肯舎其子而從其姪哉使善長佐胡惟庸成事亦不過勛臣第一而巳矣太師國公封王而已矣尚主納妃而巳矣豈復有加於今日之富貴者乎且善長豈不知天命之不可倖求取天下于百戰而難危也哉當元之季欲爲此者何限莫不身爲虀粉世絶宫汚僅保守領者幾人哉此善長之所熟見也且人之年邁摧頺精神意慮鼓舞倦矣偷安茍容則善長有之曽謂有血氣之強暴動感其中也哉又其子事陛下托骨肉至親無纎芥之嫌何得忽有深讎急變大不得巳之謀哉凡爲此者必有深讎急變大不得巳而後父子之間或至相挾以求脫禍圖全耳未有平居晏然都無形跡而忽起此謀者也此理之所必無也若謂天象告變大臣當災則殺人以應天象夫豈上天之欲哉今不幸以失刑而臣􅈤惻爲明之猶願陛下作戒於將來也天下孰不曰功如李善長又何如哉臣恐四方之解体也且臣至踈賤非不知言出而禍必随之然耻立於一聖明之朝而無諌争之士始者側聽私室引耳朝端意謂群臣豈無忠智左右侍近必有爲陛下言者公卿大臣必有爲陛下言者䑓課御史必有為陛下言者而事枉冤延未巳群臣杜口竟無一人爲陛下言之者臣所以忘其踈賤冀陛下萬一感悟臣甘就鼎鑊無所復恨矣論考較錢粮封事鄭士利前月九日欽遇陛下渙發德音廣開言路此二帝三王之盛舉也側聞邇來中外臣民大有所陳惟考較錢粮事未有言者意者當陛下赫怒之餘故人容容各自重耶不然何其宜言而不言也臣草野布衣聞見淺近政事之得失生民之利病臣焉能知惟考較錢粮得聞一二諺所謂耳聞不如目見向非臣兄士原爲先任懷慶府同知考較錢粮事㫁發工役臣亦蓋不知也自詔書之下臣欲言之乆矣特以臣兄之故恐陛下以臣爲假公營私者不敢言欲進復退者累一月旣竊自念以爲當陛下求言之急豈惡直言之士若乃畏首畏尾避嫌遠疑是忠臣義士之心不白於天下也輙不自揆故僣言之亦不自量已昔有野人食芹而美者則欲以獻於其君區區愚忠政與此類陛下幸垂察焉夫考較錢粮用使空印自昔巳然非至聖代而然也陛下即位已九年矣詔條之內不見禁革而律令之内所不該載上下承習以爲當然天下之人咸知之惟陛下未之知耳一旦生事之人摭拾此事致使忠良老成咸被其害臣愚請試言其故夫考較錢粮各府賫將文卷越行省攅造千百宗卷攅於一冊牽查照筭豈無錯誤故曰寸寸而度之至丈必繆銖銖而數之至石必差是以必湏空印無弊也向使有司官吏欲偷盜那移理没作弊當預於本處文卷補完然後赴省部攅造豈不蔵鋒歛鍔便且易耶又何必用空印省部旋補而旋生弊也又况出納錢粮各府州非奉省部不敢専擅一絲一毫之出入其原皆出於省部故省部卷中所有府州文卷不能損也府州文卷所無省部卷中不能益也若網在綱有條不紊特散漫於各卷未之歸一查照攅造之間不能無誤空𥿄所以爲筆誤差錯之設無弊也且各省府至戸部里路遠者半年餘近者亦不下半月攅寫之偶有差錯理湏扣換塡𥙷若待復至本處衙門用使印信卽非旬日可及省部置局督併攅造有如星火若爾展轉迂廻豈不大誤事耶是以必湏空印無弊也今行移文書除張縫中印信外後面必有年月年月之傍必有註語然後官吏僉押於年月註語之間用使印信今考較文冊下面張縫印信雖多而後面年月之傍註語巳定又止一印信向使掾典欲假此空印行移文書潜謀不軌下面張縫固有印信可徴而後面年月卽無印信又無封皮不知復可作何行移而何處不曉法律鋪兵便與承接逓送而何等庸愚官吏輙便慿信與之施行空印之不可以行移逓送亦明矣臣竊迹前世興亡之故大抵親賢人遠小人以興而親小人遠賢人以敗未嘗以空印也空印之不能爲國家患益明矣陛下以天縱之資日月之明豈不燭此情理然而盛怒未解者意者左右之臣未嘗以此言進歟臣愚竊以爲考較官吏止可坐之以不勤之罪而不當坐之以重罪也况所犯在律令頒行之先乎空印旣不可以行移文書又不可以那移作弊免死杖一百工役終身前此復有克軍者假使偷盜那移潜謀不軌不審陛下復加之何罪陛下必欲禁革空印不過罪一二人下半𥿄詔書明諭天下使天下後世之人知懼而不敢犯足矣何必牽枝引蔓罪及各省府耶夫人才之難自古爲然十年長飬十年教飬十年歴練至於四十血氣旣定見識巳明然後適用故曰人惟求舊今内而尚書外而叅政等官允所謂國之重臣功能俱茂者也自非聖人不能無過縱有罪過臣猶謂得與八議之科今乃俱爲考較錢粮有不保首領復追俸者有㫁發工役改發充軍者中外老成蕩然一空並使晚進後生布列中外未審孰爲陛下畫此䇿也使彼在任之内所言所行果皆考較錢粮事邪抑亦有忠國愛民之事也如果俱係考較錢粮固爲得罪若亦有一班半點爲國爲民亦可絶長𥙷短以功掩過三年之俸亦不足爲國重輕也而追之是導天下之人而爲貪汚也奚𥙷哉今犯贜私者工役而用使空印者亦工役復終身焉彼冨𥙿者固不復憂而此貧乏者則受苦楚其平日贜私者至此自爲得計臣竊恐自是之後廉謹者愈無所勸矣昔秦穆公赦食馬之徒厥後猶得其死力考較官吏非岐下野人比也陛下幸赦之又豈特得其死力而巳哉古人有言曰人之有言不得巳也臣兄巳㫁發工役固不敢辭而甘心輸作以贖罪矣臣復懃懃懇懇不避斧鉞爲陛下言者非不知觸忤天顔罪在不赦顧以朝廷大體當務從平恕不宜持法過當有累聖明盛徳蓋亦不得巳言耳固非爲臣兄一人之計而言也言辭粗鄙不能回護陛下倘以臣爲草野踈愚不識朝廷忌諱恕其狂瞽而納用其言又豈特考較官吏感恩無窮天下之士必皆鼓舞懽忻而樂於仕進矣謹於中書省投進以聞干冒宸嚴無任戰慄屏營之至萬言書葉居升臣居升幸備生貟首蒙寵賜今教山西書伏自開學以來罄竭所聞訓誨民間子弟常恐未見成效身塗草野無以上報聖朝養育之恩私切自念近者欽讀聖詔有曰欽天監報五星紊度日月相刑於是靜居日省皆古今乾道變化殃咎在乎人君尋思至此徬徨無所措手足惟詔臣民詳言朕過四海聞之懽呼雷動皆曰此大禹成湯罪已之道復見今日矣孔子曰丘也幸茍有過人必知之是過也聖人所必有知其有過樂聞而改之此聖人之所以益聖也今天下之士茍有見聞者莫不欲竭其心思智慮以應詔書之求况臣愚蒙乆承養育陶成以至今日敢不披露腹心以聞惟聖主詳擇之臣歷觀漢晉唐宋之世皆有災異之變始因刑政失宜賢愚倒置遂致紀綱不振或政失於權臣或勢移於方鎮患不生於女禍則困於夷狄上下偷安苟延歲月諫書屡上曾莫之省天變於上而不知戒人怨於下而不知恤天下巳壞而莫能救也臣每讀史至於其間未甞不切齒熱中不止太息而巳迄元之季天人厭亂旣極天命真人以聖神文武之資掃除亂略四海英雄坐致闕下沙漠之徼罔不臣服方宵衣旰食以圖雍熈之治凡漢晉唐宋之失今皆無有然而天變於上以致日月星辰失序或者鑑觀前世之失矯枉其弊而又太過者歟漢賈山有言曰忠臣之事君也言切直則不用而身危不切直則不可以明道明主之所急聞忠臣之所以蒙死而竭之也臣今有蒭蕘之言雖未足以明道敢切直言之庻盡忠臣事明主之心乎臣聞王者之心上通乎天王者之動上應乎天審天下之治否者則求其端於王而巳天之隂陽五行日月星辰其可見也使隂陽交和五行順序日月星辰得其常天下雖未善治謂之治焉可也隂陽錯繆五行不得其序日月星辰不得其行天下雖無事謂之不治可也稽之天道察之人事而後可以諗治亂之實矣臣觀當今之事太過者有三曰分封太侈也曰用刑太繁也曰求治太速也何以明之日者君之象也月者臣之象也五星者卿士庻人之象也臣愚不知星術始以所聞於經傳并摭前世巳行之得失者論之詩曰彼月而食則維其常隂盛陽微則爲不善矣今日刑於月猶之可也而曰日月相刑者則月敢抗於曰臣敢抗於君矣切觀主上之有天下掃除群雄如踣草芥包絡豪傑如臂使指今公卿大臣數十萬之衆戰必勝攻必取者朝廷遣一介之使召之則拱手聽命無敢後時况敢有抗衡者乎傳曰都城過百雉國之害也先王之制大都不過三國之一中五之一小九之一使上下等差各有定制上得以兼乎下下得以兼乎上蓋所以強幹弱枝以遏亂原而崇治本也國家裂土分封使諸王各有分地以樹藩屏以復古制蓋懲宋元孤立宗室不競之弊也然而秦晋燕齊梁楚呉閩諸國各盡其地而封之都城宫室之制廣狹大小亞於天子之都賜之以甲兵衞士之盛臣恐數世之後尾大不掉然後削其地而奪之權則起其怨如漢之七國晋之諸王否則恃險争衡否則擁衆入朝甚則縁間而起防之無及也此皇天眷國之甚或者譴吿以相刑之象歟今議者曰諸王皆天子親子也皆皇太子親骨肉也分地雖廣制度雖侈所謂大牙相制盤古之宗天下服其強耳豈有抗衡之理邪書曰列爵惟五分土惟三今王亦爵也漢謂諸侯王亦不過三分之位耳禮莫大於分使王侯之國與京畿同則爲列國矣尚有君臣之分乎今泰晋燕齊梁楚呉閩諸國皆連帶數十城而復擾之以制假之以兵議者何不摭漢晋之事以觀之乎孝景皇帝漢高皇帝之孫也七國諸王皆景帝之同祖父兄弟子孫也當時一削其地則遽搆兵西向晋之諸王皆武帝之親子孫也易世之後迭相擁兵以危王室遂成五胡雲擾之患由此言之分封踰制禍患立生援古證今昭昭然矣此臣所以爲太過者歟昔賈誼勸漢文帝早分諸國之地空之以待諸王子孫謂力少則易使義國小而無邪心向使文帝盡從誼之所言則必無七國之禍願及諸王未之國之先節其都邑之制减其衞兵限其彊理亦以待封諸王之子孫此制一定然後諸王有聖賢之德行者入爲輔相其餘世爲藩輔可以與國同休世世無窮矣割一時之恩以制萬世之利以消天變以安社稷天下幸甚臣又觀歷代開國之君未有不以尚德緩刑而結於民心亦有不以專事刑罰而結民心國祚長短悉由於此三代秦漢隋唐享國之數具在方冊昭然可觀其故何也易曰天地之大德曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民爲非曰義此可以見天地好生之心與聖人守位之道矣然而禁民爲非之義特居未者明不得巳而用刑而不專任刑罰也古者㫁死刑天子爲之撤樂减膳而寓慘怛之意於其間誠以天生斯民立之司牧而敎飬之俱欲其並生於天地之間也不幸而不率敎者入於其中則不得不刑之耳故其仁愛之篤浹於民之肌膚淪於民之骨髄民思其德愈乆而不忘故其子係享國乆遠者六七百年近者亦三四百年豈偶然而已哉今議者曰宋元中葉之後紀綱不振專事姑息賞罰無章以致亡㓕此行小仁而㓕大義雖有其位而不能守之主上所以痛懲其弊而矯枉之者也故制不宥之刑權神變之法使人知懼而莫測其端也臣聞開基之主垂範百世一動一静必合凖䋲使子孫有所持守况刑者民之司命可不愼歟夫刑罰貴乎得中過與不及皆非天討有罪之意也使刑政不立而強暴得以相陵則國非其國矣則刑法繁苛而政治促急而民無所措手足矣姑以當今刑法言之笞杖徒流死今之五刑也用此五刑旣無假貸一出乎大公至正可也而用刑之際多出聖衷致使治獄之吏務從深刻以趨求上意深刻者多獲功平允者多得罪或至以贜罪多寡爲殿最欲求治獄之平允豈易得哉近者特㫖雜犯死罪免死充軍其餘以次倣流徒律又刪定舊律諸條减宥有差此漸見寛宥全活者衆而主上好生之仁已藹然布乎宇内矣然未聞有戒治獄務從乎允之條是以法司之治獄猶循舊弊雖有寛宥之名而未見有寛宥之實所謂實者誠在主上不在臣下也故必有罪疑惟輕之意而後好生之德洽於民心必有王三宥然後制刑之政而後有囹圄空虚之效此非可以淺淺致也唐太宗皇帝謂侍臣曰鬻棺之家欲歳之疫匪欲害於人欲利於棺售故耳今法司覈理一獄必求深以成其考今作何法使得平允太宗矯隋之暴刑法務從寛宥猶患及此况今立法巖宻以矯寛縱能無是失何以明其然也古之爲士者以登仕版爲榮以罷聀不叙爲辱今之爲士者以混迹無聞爲福以受玷不録爲幸以屯田工役爲必獲之罪以鞭笞捶楚爲尋常之辱其始也朝廷取天下之士網羅捃摭務無遺逸有司催逼上道如捕重囚比到京師而除官多以貌選故所學或非其所聞而其所用或非其所學洎乎居官舉動一跌于法茍免誅戮則必屯田工役之科所謂取之盡錙銖用之如泥沙率是爲常少不顧惜然此亦豈人主樂爲之事哉欲人之懼而不敢犯也切見數年以來誅殺亦可謂不細矣而犯者日月相踵豈下人之不懼法哉良由激濁揚淸之不明善惡賢愚之無别議賢議能之法既廢以致人不自勵而爲善者怠宋程頥有言曰君子小人常相半也天下治則小人多化爲君子而君子多於小人天下亂則君子多化爲小人而小人多於君子此言在上之人有以化之耳有人於此廉如夷齊智如良平一或不謹少戾於法上之人將録其所長棄其所短而用之乎將舎其所長捐其所短而寘之法乎苛取其長而舎其所短則中庸之才爭以爲廉爲智而成有用之君子矣茍取其短棄其所長爲善之人皆曰某廉若是某智若是少不如法朝廷不少貸之吾屬何所容其身乎致使今之居位者多無廉耻當未仕之時則脩身畏愼動遵律法一入于官則以禁網嚴宻朝不謀夕遂棄廉耻或事掊剋以備屯田工役之資者率皆是也若是非用刑之煩者乎漢之世嘗徙大族於山陵矣未聞實之以罪人也今鳯陽皇陵所在龍興之地而率以罪人居之以怨嗟愁苦之聲充斥園邑朝廷知非所以㳟承宗廟意也近令就中願入軍籍者聽之免罪復官者有之而猶聞有拘其餘丁家小在屯夫有罪之家長既赦而任之以政矣餘丁家小復何罪哉夫強敵壘則揚精鼓銳奮三軍之氣功之必克擒之必獲可也今賊人僞四大王突竄山谷如狐如䑕無窟可追以計獲之庻或可得而乃勞重兵以討之彼之驚駭潰散兼之深林大壑人跡不能追踪之地與之較奔走則彼就熟路而輕行與之較死生則彼負必死之氣三軍之衆孰肯舎死而爭鋒哉今捕之數年既無其方而乃歸咎於新附戸籍之細民而遷徙之搔動四千里之地鷄犬不得寧息况新附之民日前兵難流移他所朝廷許之復業而來歸者今就附籍矣乃取其數而盡遷之是法不信於民也夫有戸口而後田野闢田野闢而後賦稅增今責守令年増戸口正爲是也近者巳納稅粮之家雖承特㫖分釋還家而其心猶不自是巳起戸口雖䝉怜恤見留開封聽候今軍士散漫村落居民不知所爲訛言驚動况太原諸郡外界邊鄙民心如此甚非安邊之計也臣恐自兹之後北郡戸口不復得增矣何者小民易動而難安今之小民以爲新籍在官乃見遷徙不報反易迯匿若欲遷徙一槩而遷之我奚先受其殃乎凡此皆臣所謂大過而足以召災異者也未見其可以結民心而延國祚者也晉郭璞有言曰隂陽錯繆皆煩刑所致今之天變豈非煩刑所致者乎臣願自今朝廷宜録大體赦小過明詔天下脩舉八議之法嚴禁深刻之吏㫁獄平允則超遷之苛刻聚歛者則罷黜之鳯陽屯田之制見任家小在屯者聽其耕種起科巳起戸田見留開封者悉放復業當差如此則人主足以隆好生之德以樹國祚長乆之福而兆民自安天變自消矣昔者周自文武至於成康而後敎化大行漢自高帝至于文景而後號稱富庻文王武王高帝之才非不能使敎化行以致富庻也蓋天下之治亂氣化之轉移人心之趍向皆非一朝一夕之故致治之道固不可驟至今國家紀元九年干兹偃兵息民天下大定紀綱大正法令脩明亦可謂安矣而主上切切以民俗澆漓人不知懼法出而奸生令下而詐起故或朝誅而暮犯者有之昨日所進今日被戮者有之乃至令下而尋改已赦而復收天下臣民莫之適從而不能相安者甚不稱主上求治之心也臣愚謂天下趍於治也猶堅氷之將泮也氷之堅非太陽一日之光能消之也陽氣發生土脉微動和氣蒸之然後其融釋然聖人之治天下亦猶是也刑以威之禮以導之漸民以仁摩民以義而後其化熈熈也孔子曰如有王者必世而後仁此非空言也况今之天下猶古之天下民俗雖漓而民好善惡惡之心則未嘗泯也因其好善惡惡之心以正其風俗則求治之道在是矣求治之道莫先於正風俗正風俗之道莫先於使守令知所務使守令知所務莫先於使風憲知所重使風憲知所重莫先於朝廷知所尚則必以簿書期㑹獄訟錢榖之不報爲可恕而流俗失世敗壞爲不可不問而後正風俗之道得矣風俗既正天下其有不治者乎古之爲郡守縣令爲民之師帥則以正率下導民善使化成俗美者也征賦期㑹獄訟簿書固其職也今之守令以戸口錢粮簿書獄訟爲怠務至於農桑學校王政之本乃視爲虚文而置之不問將何以教飬黎民哉以農桑言之方春州縣下一文帖里甲回申文狀而巳守令未嘗親點視種蒔㳄第旱澇預備之道也以學校言之凛膳生員國家資之以取人才之地也今各處師生缺員者多縱使具員守令亦鮮有以禮譲之實作其成器者朝廷切切以社學爲重敎民之急務故屢行取勘師生姓名所習課業如是之許今之社學當社鎮城郭或但置立門牌遠村僻處則又具其名耳守令亦未嘗以敎飬爲已任徒具文案以備照刷而巳及至憲司分部按臨亦但循習故常照依𥿄上照刷亦未嘗差一人廵行點視興廢之實上下視爲虚文如此小民不知孝悌忠信爲何物闘爭之俗成奸詐之風熾而禮義廉耻掃地矣此守令未知所務之失也風紀之司所以代朝廷班導風化訪察善惡條舉綱目拯治萬事至於聽訟讞獄其一事爾今專以獄訟爲要務以獲贜多者爲稱職以事蹟少者爲闒茸一有不稱雖有忠臣孝子義夫節婦視爲虚文未節而不睱舉若是謂之察惡亦近之矣所謂班導風化者安在哉其始但知以去一贜吏决一獄訟爲治而不知勸民成俗使民遷善遠罪爲治之大者也此風憲未知所重之失也守令親民之官風憲親臨守令之官未知所務如此所以欲求善治而卒未能也王制論鄕秀士升於司徒曰選士司徒論其秀士而升於太學曰俊士大樂正又論造士之秀升諸司馬曰進士司馬辯論官材論定然後官之任官然後爵之其考之詳如此成周得人爲盛今使天下都邑生員考於禮部升於太學使歷練衆職任之以事可以洗歷代舉選之陋而上法成周之制矣然而郡邑生員升於太學或未數月遽選入官委之以郡者間亦有之臣恐此軰未諳時政未熟朝廷禮法不能宣導德化上乖國政下困黎民雖曰國家養育之仁然世間奇材罕有如顔回耿弇鄧禹者固不可拘於常法雖賈誼之材漢朝以其牟少難委之開國以來選舉秀才不爲不多所任名位不爲不重自今數之在者寜有幾人乎臣恐後人之視今亦猶今之視昔昔年所舉之人豈不深可痛惜乎凡此皆臣所謂求治太速之過也昔者宋有天下蓋三百餘年其始以禮義教其民當其盛時閭閻里巷皆有忠厚之風至於耻言人之過失至其末年扞城之將至力屈計窮則視死如歸忠臣義士死事者不可勝数雖婦人女子羞𬒳汚辱此皆禮義教之效也元之立國其本固不正矣犯禮義之分廉耻之壞自古未有故其末年棄城叛將降敵附下者亦不可勝紀雖老儒碩臣甘心屈辱大將北征以來爲之死事者幾人乎此禮義廉耻不振之弊也令其遺風流俗至今未革深可怪也臣謂國家求治之速莫若敦禮義尚廉耻守令則責其先禮義慎征賦而以農桑學校爲急務風憲則責其先教化審法律而以平獄緩刑爲㝡切如此則徳澤下流求治之道庻幾得矣郡邑生員升於太學湏令在學肄業或三年精通一經兼習一藝然後入選或宿衛或辦事以觀大臣之能而後任之以政則其學識兼懋庻無敗事且使知祿位皆天之禄位而可以塞覬覦之心也夫分封有制則本支百世矣刑罪旣清則刑期無刑矣崇禮義尚廉耻而風移俗易矣於是主上端拱清穆待以歲月則隂陽調而風雨時諸福嘉祥莫不畢至矣尚何天變之不消也哉雖然臣愚猥不自度微賤廟堂之議輙敢陳說如此是以螻蟻之命試當雷霆之威朝廷苟以詢蒭蕘之意而容之憐其愚忠言可采者則舉其一二不可采者置之不問將見天下之嘉言日聞于上矣此臣之願也干犯天威罪在不赦無任瞻天仰聖激切屏營之至奉天殿災上䟽鄒緝臣伏奉勑書以今月𥘉八日奉天殿災勑諭文武群臣詢求所以致災之由令臣等逐一條陳無隱俾知警懼以回天意臣惟陛下敬天勤民之意至深至切未嘗少怠而群臣奉行或失初意故不能無少過誤致使下民失所怨讟上興上天眷懷遂加譴罰陛下心存警懼咨訪群臣惟臣愚昧淺陋不足以識致災之由但有所見不敢遂隱謹採耳目所聞上塵聖覧伏惟少垂察焉切以皇上紹嗣太祖高皇帝之統緒建立兩京本所以爲子孫帝王萬世之丕基天下萬民尊仰之根本爰自肇建北京以來焦勞聖慮幾二十年功力浩大費用不貲調度旣廣科派亦繁群臣不能深體聖心致使措置失宜所需無藝掊剋者多冗官濫員內外大小動至千百使之坐相蠶食耗費錢糧而無益於事是以竭盡生民之膏髓猶不足以供工作之用由是財用匱乏莫知所圖民窮無告猶不之恤夫民之所頼以爲生者衣食也而民以百萬之衆終歳在官供役既不得保其父母妻子遂其樂生之心又不能躬親田畆以事力作使耕種不時農蚕廢業猶且征求益深所取無極至於代輸桑棗以供薪㸑剥取桑皮以爲楮料而民之衣食無所資矣加之官司胥吏横征暴歛日甚一日民生無聊愁嘆滿室且如前兩歳買辦靑緑顔料本非出産之所而科派動輙千數百戸民無可得則相率歛鈔遍行各處收買每大靑一斤至萬六千貫及至進納又多以不中不肯收受徃復展轉當湏二萬貫鈔方得進收一斤而所用不足以供一柱一椽之費其後既巳遣官採辦於出産之處而府縣買辦猶不爲止蓋縁工匠計料之時惟務多派以爲濫取之利而不頋民之艱苦難辦此又其爲害之甚也然此特買辦之一爾其他又有不可勝言者矣且京師者天下之根本人民者京師之根本也人民安則京師安京師安則國本固而天下安此自然之勢也而自營建以來用事之人不思人民爲國之本謀所以安輯之乃使群軰工匠小人假托威勢驅迫移徙號令方出即欲其行力未及施屋已破壞或摧毀其墻壁或碎其屋瓦使孤兒寡婦坐受驅迫哭泣號呌力無所措或當嚴冬極寒之時或當酷熱霖潦之際妻子暴露莫能自蔽倉惶逼迫莫知所向所徙之處屋室方完又復驅令他徙至有三四遷移而不能定者及其既去而所空之地經月逾時工猶未及陛下之愛民本甚深而工作小人横害下民如此其甚陛下皆有所不知此京師人民之受害而不能無怨讟者也貪官汗吏徧布内外剥削之患及民骨髓朝廷毎遣一人出差卽是其人飬活之計誅求責取至無限量州縣官吏應荅奉承惟恐不及間有廉潔自守心存愛民不爲承應及其還也即加䜛毀以爲不肯辦事朝廷不爲審察遽加以罪無以自明是以在外藩司府縣之官聞有欽差官至望風應接推恐或後上下之間賄賂公行略無畏憚剥下媚上有同交易貪汙成風恬不爲怪夫小民之所積幾何而内外上下誅求如此豈能無所怨讟乎今山東河南山西陜西諧處人民飢荒水旱相仍至剥樹皮掘草根簸稗子以爲食而官無儲蓄不能賑濟老㓜流移顛踣道路賣妻鬻子以求茍活民窮財匱如此而猶徭役不休征歛不息京師之内聚集僧道幾萬餘人曰食廩米百餘䂖而使天下之人糠秕不足至食草木此亦耗蠧食以飬無用者也至於報効軍士朝廷厚與粮賜使之就役而乃驕傲横恣不執常役游行徃來擾害良民此乃姦詭之人懼還原伍科徭不堪假此爲名以圖規避非眞有報効之心此豈可以信用之哉朝廷歳令天下有司織錦叚鑄銅錢遣内官賫徃外藩及西北買馬收貨所出常數千萬而所取曾不能及其一二耗費中國糜敝人民亦莫甚於此也且錢出外國自昔有禁今乃竭天下之所有以與之此可謂失其宜矣馬至雖多類皆駑下散與人民畜飬馬多人少畜飬不前及至死傷輙令陪償馬戸貧困則復鬻賣子女猶不能償夫國家之所頼者人民也人民已耗土地空虚飬馬雖多亦何所用此又其害之大者昔晉武帝徙胡人於河南内地群臣皆諌以爲不可恐貽他日之患武帝不聽其後卒致五胡之亂今乃許令逹旦胡人入中國賜以鞍馬弓矢居室牛羊衣服盛具供帳以待之此等皆窺覘中國姦細之人尤其所不可者夫人莫不安土重遷不樂遠徙况此蕃夷習俗既殊所性亦異豈肯背其本主違去郷土而居中國乎是必有可疑不可以不察之也今宜使之來朝之後即遣歸其本國不必留之以爲後曰子孫之患也至於宫觀禱祠之事自古有國者所當深戒漢武帝嘗極意以求之而卒無其驗取譏後世亦宜去而絶之也古人有言淫祀無福况事無益以害有益蠧財妄費國用無度亦其一耳凡此數事皆足以損傷和氣下失民心上違天意怨讟之興實由於此夫奉天殿者陛下正朝之殿所以朝群臣發號布令出政之所古之所謂明堂也而災首及焉其爲災之大自古以來未之或有誠所謂非常之變也非省躬貴巳深察所以致災之由大布恩澤改革政化以䟽滌天下窮困之人不能以回上天譴怒之意也夫應天以實不以文臣願陛下深下明詔散遣工匠營造之人停止役作使天下之人得遂其父母妻子相安相飬之心罷絶下蕃買馬之役勿令復出四夷外國來朝貢者賜賚而遣之勿使乆居中國有願留者亦宜遣令出塞俟三四年後徐復議之蓋四夷歸附朝貢雖足以爲中國之盛然使之乆居於此窺見中國之虚實恐非今日之所宜亦非他日之利也彼皆人面獸心不識恩義徒以貪求中國之貨賄而巳一旦待之有不至必且爲中國患矣冗官濫貟冝沙汰之使歸田里有可用者亦使暫歸俟其官有闕則取用之簡㧞賢才中行薦舉嚴考官吏有贜貪蠧政壞法爲民之害者在內則令六卿大臣及監察御史在外則令按察司官按覈其實而罪黜之勿復寛貸若有廉能之官善績昭著許令保薦於朝量加陞擢使有激勸大抵敦教化厚風俗勵廉耻勸良善此有國之先務善有所勸惡有所懲則廉耻道立而姦貪之俗自止息矣前者常有監生生員告乞單丁侍親因而獲罪發充軍者亦乞赦原取回使得遂其𥘉心蓋其間亦有先告侍親後以親終巳行出仕有司不行分理一槩查發充軍此皆有虧治體難以垂訓將來至於宫廟禱祠之事亦宜罷絶無聽其妄近者大赦天下之時法司執滯常條罪有無大干渉所當赦宥者尚復拘繫亦乞重加湔洗使之自新常爲京官者則降出于外勿還舊職蠲除租賦一切征歛科需不急之務悉乞停罷飢荒之民則令所在有司發廩賑濟或官廩不敷則勸令大戸之家出粟以賑之官爲之主俟有豐收則俾償之凡此皆天下之大計所以保安宗社收捨人心挩回天意而爲國家千萬年無窮之命脉今皆舉行之則人心歡悅和氣可臻民心既固國本益安欲爲天下蒼生之福子孫帝王萬世之基莫有大於此者矣夫國家之所恃以乆長者天命也人心也而天命所在常視人心以爲去就未有不得人心而可以保天命也未有人心旣歸而天命不歸之者欲和人心必敦敎化必脩禮譲必使之遂其生飬於間閻之下敎化行而禮讓興則人知父子君臣之敎尊君親上之義則任之以事驅之以役雖勞而不怨生飬遂而衣食足則人知廉耻思樂妻子保親族盗賊息而無爭奪凌暴之風矣如此則人心和附天命凝固國家乆長之利又莫有過於此者矣奸人細民有以詭術異道而惑人者則抑絶而禁止之使不亂吾民之敎信賞罰一號令使人有所守而不爲疑惑賜予有節而不至於濫恩財出有經而不至於妄費則國本充實財用可舒而不至於空乏有司百官全其禄廩使有以飬其廉耻天下之人得以休飬於田里之間而有司官吏無貪殘虐害之政則災沴不作太平可臻人心既和天命攸屬而國之基本自固此誠國家之至計保安天下消彌災變之大者也至於邊防守禦之臣則令其修飾軍伍謹察烽堠以防㓂盜此又其所當慮於未然者也今天意如此災變已極不宜復有所造作以重勞其民當還南京奉謁陵廟告以災變之故保飬聖躬休息於無爲數年之後天意旣回始可爲之不冝聽信小人之言復有所興作以誤陛下於其後彼小人者不知國家憂戚之大計惟欲謟䛕順㫖以希倖恩寵而已若復聽其言以爲無害則誤陛下益甚殆非國家之利也臣不勝惓惓之忠輙冐斧鉞之誅謹陳其愚以復明詔干犯天威不勝恐懼待罪之至惟陛下矝其狂愚少垂聽鑒
