front:
  text: 皇明文衡卷之五十一
  hash: sha256:782538925bf3fd06ce73133d06ef942a5c495eaedeb2bc7f482ff263c2239d7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_051-1a}
body:
  text: 雜著讀喪禮胡翰按儀禮疏衰裳齊牡麻經冠布纓削杖布帶疏履三年者其降服父卒則為母父在則為母期傳曰何以期也屈也至尊在不敢伸其私尊也夫期之喪子為父屈而三年之喪母為長子得遂揆其輕重二者蓋不侔矣唐孔氏謂子於母屈而從期心喪三年蓋亦於義不安而創為是説耳古未之聞也古者弟子為師心喪三年若喪父而無服由子貢以義起之也子貢以孔子之施於門人者還以報之苟施於母子之間則疏衰裳齊非若師之無服也服斷以期而猶為心喪則是外屈於父之尊而內存喪母之哀所謂服者何以表衷也斯亦偽而巳矣後世之言禮者不以父降其母而使子得伸其尊誠不過矣抑所本者何取於古也又古者為曾祖父母齊衰三月傳曰何以齊衰三月也小功也小功兄弟之服也不敢以兄弟之服服至尊也故重其衰麻減其月日尊尊而恩殺也是雖不及高祖父母説者謂兼高祖而言則其服同其月日亦同也今禮家定為曾祖父齊衰五月為高祖父母齊衰三月則其服同其月日不同矣以經考之服之數盡於五緦麻三月小功五月等而至於高曾意其月日以是為差其服制則一以齊衰斷也且疏云為父加隆三年則為祖宜大功為高祖宜小功苟以齊衰之服從大功小功之月日亦若可為也古之制禮者所以不出乎二者之間而一斷以三月之制豈無其義乎故尊尊而恩殺為高曾三月者後世不必易也至尊在不敢伸其私尊為母齊衰期者雖古不必盡從也何以權之禮以義起而緣乎人情者也按禮斬衰裳苴絰杖絞帶冠繩纓菅屨者女子在室為父布總箭笄髽三年鄭康成引傳小記云男子冠而婦人笄男子免而婦人髽凡服上曰衰下曰裳婦人不殊裳故但言衰衰如男子衰下如深衣則衰無帶下又無衽此蓋古者婦人之喪服也朱子定禮自緦以上莫不悉遵乎古而婦人之服豈宜以俚俗參之若大袖遮頭竹叉布頭須之屬不知於古何服也古者婦人不殊裳非無衰也其衰之下與男子異耳非今大袖也檀弓云去纚而露髻謂之露髻則以麻繞額與髻耳非今遮頭也婦人不冠布總箭笄傳云總六升長六寸箭笄長尺猶今叉與頭須耳而今云竹叉布須亦非制也五禮廢久矣惟喪服民間尚多用之今冡子斬衰裳齊苴絰杖絞帶冠繩纓菅屨即位而有事于外冡婦大袖遮頭竹叉布頭須即位而有事于內何啻黃鍾大吕而間以師延靡靡之樂犧尊龍勺而置之玉杯象箸之間其淆也甚矣是非朱子意也門人不察之過也問喪之記云親始死雞斯徒跣説者謂雞斯當作笄纚夫纚以黑繪韜鬢士冠禮所謂纚廣終幅長六尺者以之即吉可也而凶事去之此又漢儒之不察也夏后氏之郊劉基祭法曰夏后氏禘黃帝而郊鯀鯀固夏后之父也夏后之天下受於舜非受於鯀也禹不得以天下私其父夫鯀以治水績用弗成而舜殛之羽山天下咸服則鯀天下之罪人也故舜之刑非私刑也天刑也以天刑封天下之罪人天下之至公也禹既受舜禪而升其罪人以配天是舜之殛鯀非也夫鯀之殛獲罪于天天殛之也非舜殛之也奉天討也而以鯀配天是天之殛鯀亦非也一私其父而逆于舜又逆于天天其弗享夏后氏之郊矣禹聖人也而敢為是哉祭法之言非也然則禹之於鯀也如之何曰廟以祭之而巳矣何必郊君子非有恭敬則不齊祭統曰君子非有大事也非有恭敬也則不齊是非所以語君子也夫君子之所以為德者恭敬而巳矣恭敬也者不可須臾離也故孔子之語仲弓曰出門如見大賔使民如承大祭大雅之述文王曰於緝熙敬止又曰不顯亦臨無射亦保聖人無一息之不恭且敬何待乎齊齊所以篤其恭敬猶恐其有未至而致之聖人不自滿假之心也謂之非有大故不齊猶可也謂之非有恭敬則不齊大不可也信斯言也是不齊之時不恭敬矣豈所以語君子哉其悖也甚矣或曰然則所謂不齊則於物無防也嗜欲無止也如之何曰其疵同也猶可謂之泛論泛論非言君子猶可説也不若非有恭敬則不齊之陷而不可舉也大抵漢儒記禮之言多駁往往流于文而失于理取其長而去其短可也續志林王禕古稱文章家自漢唐而下莫盛於宋東都歐陽修氏曽鞏氏王安石氏並時迭起而蘇軾氏於其間為九傑然者也蘇氏之文長於持論縱橫開闢上下變化無不如其意之所欲言雖其理不能皆純而其才氣之浩博固將躐漢唐而上之矣余讀其書愛其志林諸篇議論超卓而文章馳騁殊可喜中心慕之因竊其餘論續為十八篇陳俚樂於金聲玉振之餘厠瓦缶於夏鼎商敦之末亦見其不知量巳然而願學之意則庶乎君子有取焉王禕序今録八篇周穆王時徐偃王為國徐去刑爭末事君國子民侍四方者務出於仁義而穆王無道意不在天下四方諸侯之爭辨者無所質正咸賔祭於徐焉或謂楚文王曰徐偃王好行仁義之道漢東諸侯三十六國盡服矣王不伐楚必事徐楚遂興師伐徐殘之徐偃王將死曰吾賴於文德而不明武備好行仁義之道而不知詐人之心以至此也君子曰仁義天下之本也自古有天下者由之以興矣未有由之而亡者也謂行仁義而亡者知假仁義之名而不知所以為仁義者也徐偃王之謂也夫徐處淮之南北而得乎地之中其為中國患久矣先乎穆王當成王時即巳肆其強暴書所謂淮夷徐戎並興東郊不開是也後乎穆王至宣王時其馮陵為尤甚詩所謂徐方驛騷是也當穆王時天下晏安而天子乃無意於天下方乘八龍西遊與王母宴於瑤池之上逸樂而忘返於是偃王時得乘間而起用其籠絡駕馭之小智煦煦以為仁子子以為義以聾瞽東諸侯而諸侯之爭辨者適無所質正乃咸賔祭於徐庭偃王蓋自謂仁義之道為止於是而王業固可圖而不知所以為仁義者不在是也故未幾為天子諸侯所不容而國以遂敗身以遂亡而偃王顧謂吾好行仁義之道以至此也嗚呼藉使偃王誠知仁義之為道而力行之則民之附之者心必堅諸侯之從之者名正而言順湯武之業可成也其何敗亡之有惟其不知所以為仁義而徒假仁義之名故不旋踵而敗亡世之論者因以謂湯武以仁義興偃王以仁義亡興亡雖殊其為仁義一也嗚呼亦孰知仁義雖一而行之有不同偃王假其名而行之湯武則真知之而行之以無偽者也興亡之效固判然不同矣湯武偃王奈何同年而語哉春秋之時宋襄公欲圖霸亦徒假仁義以為名與楚人為弘之戰曰吾文王之師也不禽二毛不鼓不成列一戰而敗國以幾亡故宋襄公之仁義即徐偃王之仁義也一則假以謀王而不成一則假以圖霸而不就皆假其名而不知用其實者也或曰齊桓晉文亦假仁義者也而其霸業以成何歟曰齊桓晉文之於仁義善假之者也假之而善故其業以成偃王襄公則慕仁義之名而不善假不善於假其敗亡也固宜此又其得失之所由分也太史公曰學者皆稱周伐紂居洛邑其實不然武王營之成王使召公卜居居九鼎焉而周復都鄷鄗至犬戎敗幽王周乃東遷于洛蘇氏曰周之失計未有如東遷之繆也自平王至於亡非有大無道者也然終以不振則東遷之過也君子曰周之東遷非過也謂周自東遷而益衰可也謂國東遷而致衰不可也周居鄷鄗鄷鄗在西故謂洛為東都自武王遷九鼎于洛固巳有意於經營周公相成王成武王之志於是乎卜洛以建邑而郊丘社壝宗廟市里無乎不備是固以洛邑無可都矣謂洛邑形勢不如西周之據函崤界蜀隴邪則東有成皋西有殽黽背河向伊洛其固有之守也謂洛邑土地不如西周為天下土腴邪則左伊右瀍沃衍可以富也而况天下之中實維洛邑隂陽之所和南北日晷於是而取正道里之所均四方諸侯於是而取則是則雒邑曷嘗不可以為都也以書考之周公告成王使居新邑以為治王因遂東故曰戊辰王在新邑蒸祭歲是成王嘗至洛邑事蒸祭矣以詩考之宣王徵車馬備器械會諸侯于東都因田獵而選車徒是宣王又嘗至洛邑會諸侯矣然則平王之遷洛得非先王之遺意而豈可謂其失計乎藉使周因東遷而致衰則曰蹙國百里巳非一日西夷交侵有甚於戎伐凡伯南征不復有甚於問鼎重輕豈至平王以後而然耶蓋周自厲王之亂王室板蕩不有宣王以中興之吾見其不待東遷已無周矣宣王之後幽王失德王室又大壞使平王不遷周其將不衰乎使文武而東遷周其有不興乎是周之所以衰因無令王以振興之初不以遷故也且堯都平陽而舜遷蒲坂禹又遷安邑商自契至湯八遷盤庚五遷是唐虞夏商之都罔有定止蓋屢遷矣奈之何獨以周之東遷為失計耶遷都之義曰洛邑之地四達而平使有德易以興無德易以衰則都洛本可以致興而所由致衰者固在於不德也周以後漢世祖都洛矣而延祚二首魏孝文又都洛矣而太和稱治有德而都洛無有不興之理此古今之所同然者然則周有天下傳主三十七而平王以後凡二十四主歷年八百六十有七而東遷之後猶五百二十八年平王之東遷其果失計乎哉漢高帝既定天下謂羣臣曰運籌帷幄之中決勝千里之外吾不如子房填國家撫百姓給餽餉不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此所以取天下也君子曰知人善任使此帝王之略也夫以高帝之雄姿大度而當其任使者又皆天下之才其取天下也固宜矣方其與項籍俱起叛亡逐秦鹿蚌鷸相持者八年高帝之命懸於籍手數矣而籍卒以敗亡者籍專為暴高帝務為寬大故也高帝之入咸陽也秋毫無所犯籍至火而屠之暴與寬大異趨如此楚漢興亡於是巳決况籍有一范增而不能用而高帝則攬一時之英豪而御之如所謂三傑者皆天下之才也而用之各能當其才及其成功且曰吾不如焉是可謂知人善任使有帝王之略矣其得天下不亦冝乎雖然高帝固善知人為可尚抑所以任使之道則未免持駕御之術以束縳馳驟之蓋有無足多者當韓信為治粟都尉蕭何數言其奇而高帝故不用殆欲激之使亡爾既亡而追得之則信以為必死矣反遽拜之為大將使其以任遇太重為過望效死以酬恩不復叛而信遂謂漢遇我厚也此在其術中而不知者也酈食其為漢謀撓楚欲立六國後高帝非不知六國後不可立也而以問良是特以嘗其心焉耳蓋良始惟為韓報讐又嘗説項梁立韓諸公子橫成君成為王而巳為韓司徒而後又自褒中去漢而歸韓高帝恐良終為韓不為漢故因疑其謀以嘗良豈果不知六國後不當立哉而子房固且力陳其難以為不可此又在其術中而不知者也蕭何與高帝同起事膺專任守關中漢廷諸臣功無與比盛高帝恐其脫自驕以取禍故遣卒為衛又繫之廷尉以抑折之使自謹守以保令終非誠疑何也設誠疑之則巳以待韓彭者待之矣而何至自汙以求免此又在其術中而不知者也嗟乎三子者皆人傑然役於高帝術中而皆不知而高帝既知三子之為人傑矣乃徙以術御之不復知有忠信之為道君臣之際其不俱可惜哉且吾聞之舜之於十二牧武王之於十臣其君臣之相與無非忠信之道焉上以誠求下下以誠事上元首股肱視同一體烏有所謂相持之術哉嗚呼此古帝王之所以為盛也高帝非不得天下也然其君臣之際如此其不有愧於古帝王也夫高帝六年叔孫通徴魯諸生起朝儀魯兩生不肯行曰今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起積德百年而後可興也君子曰兩生之所謂禮樂非禮樂也彼以為禮樂矣而吾謂非禮樂何哉彼徒知其文而非其本之謂也記曰禮者天地之别也樂者天地之和也天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉又曰大禮與天地同節大樂與天地同和孔子之論以為禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉孟子之論先之以仁義而曰禮之實節文斯二者是也樂之實樂斯二者是也此禮樂之謂也夫禮樂不可斯須去身者也聖賢之治身即其所以治天下國家者也以其不可斯須廢者而必俟乎百年亦何其迂之甚也是故無本不立無文不行其可損益因革者文也故忠變為質質變而文繼文者不能保其不變也夏變而濩濩變而武繼武者亦不能保其不變也此皆文之謂也至論其本則古今一而巳矣孔子所謂百世可知者也吾故曰兩生之所謂禮樂非禮樂也禮樂之文而非其本之謂也自兩生創是説而漢儒悉宗之終漢之世禮樂之説紛如而其大槩則正朔也服色也辟雍也井田也封建也雅樂也是皆帝王經制之具而掃滅於暴秦者有王者作固當修而明之然漢之賢君莫如孝文漢興至是巳及百年禮樂之興維其時矣而賈生請改正朔易服色定官名興禮樂則謙讓以為未遑惟以德化民故海內安寧煙火萬里成康以後稱治者莫加焉至武帝而改正朔矣議明堂矣至成帝議立辟雍未作而王莾作之矣至哀帝而詔定雅樂罷淫聲矣此三君者其於致治何如也自漢以來千數百年之間有為之君臣於斯數者未嘗不講明之其説易通而易行者正朔服色也言人人殊而或行或不及行者明堂辟雍雅樂也其説雖多而終不可行者封建井田也夫其可行者因之不可行者革之而皆足以為一代之治則其為禮樂之文而非其本也明矣禮樂之文無與於治道也明矣蓋高祖以馬上得天下而輕詩書叔孫通鄙儒也因拔劒擊柱之事將肅朝儀以止喧譁乃進儒者可與守成之説夫肅朝儀以綿蕞從事其事至末也而通以為儒者守成之事兩生以為興禮樂之事嗟乎儒之為儒禮樂之為禮樂止是而已乎至隋文中子講道河汾謂其徒魏徵房杜曰先輩雖聰明特達然逢明主必愧禮樂及聞江都之變曰道廢久矣如有王者出三十年而後禮樂可稱也十年平之十年富之十年和之斯成矣其後唐太宗與房杜論興禮樂曰禮壞樂崩朕甚愍之有志不就古人攸悲時難得而易失朕所以遑遑也徵與房杜皆慚悚而退是數公者可謂興王之良佐而明於古今之治體矣雖未嘗以改法立制自任至論其輔佐之實則房杜之彌縫魏之諫諍皆人臣之所難烏在其愧禮樂也是故以征伐取天下者莫如湯武湯造邦之初誥其臣下曰無從匪彝無即慆淫各守爾典以承天休此禮也攸徂之民室家相慶此樂也武下車之初列爵惟五分土惟三建官惟賢位事惟能此禮也大賚于四海而萬姓悅服此樂也然則革命不崇朝而禮樂行乎其間亦烏待於三十年之久乎故吾以謂兩生之所謂百年文中子之所謂三十年皆徒論禮樂之文而非達其本者也嗟乎兩生不足道也文中子動以聖人自擬而立論若是幾何而不為叔孫通也哉光武遭漢中衰紹恢前緒征伐四方日不暇給而乃敦尚經術賔延儒雅開廣學校修明禮樂繼以明章臨雍拜老橫經問道自公卿大夫至于郡縣之吏咸選用經明行修之人是以教立於上俗成於下自三代既亡風俗之美未有若東漢之盛者也君子曰國家風化之成非一人之為一日之積也為之非一人故行之也無弊積之非一日故守之也有素此所以既成而益隆愈久而不替者也周之有天下也始於文武崇道德隆禮義設辟雍泮宫庠序之教陳禮樂弦歌移風之化敘人倫正夫婦天下莫不曉然論孝悌之義惇篤之行故仁義之道滿天下繼以成康持盈守成世篤忠厚當其時風俗之隆比屋可封蓋垂𥙿乎八百年之久此豈一人之為一日之積哉成周之後言風化之美者無如東漢矣然非光武躬行於其先明章繼志於其後皆敦尚經術修明儒學以為務則其效之所至亦豈能底于盛極乎是故自建武永平以至于建初永元上而朝廷下而鄉閭莫不以名節相砥礪而不肯一毫苟且以自詭相師成風翕然無間此其俗習之美雖其比隆於成周可也及乎元興以後閹竪擅政而小人挾其威福相煽為惡中材顧望不知所為而漢已失其操柄綱紀大壞矣然在位公卿大夫有若袁安楊震李固杜喬陳蕃李膺之徒皆豪傑特起之士相與發憤同心戮力用公義以扶其危直道正言分別其是非白黑不少回撓至於勢有不容而織羅鉤黨之獄起而其執彌堅其行彌厲志雖不就而其忠則有餘天下之士聞其風慕其義者人人感慨奮激如符融郭泰范滂許劭之流咸立私論以救其敗闕而其甚者至於解印綬棄家族骨肉相勉趨死而不避或且以不得與其死以為恥以故百餘年間擁兵專地者雖互相吞噬而猶莫不以尊漢為辭雖以曹操之姦雄擅強大覬非望乃至沒身不敢廢漢以自立豈不以名義有在知所畏避而自抑乎嗚呼尚論兩漢之習者西漢必曰經術東漢必曰名節抑豈知經術者固名節之本而名節之為效其有係於國家天下為尤重如是夫程子之言曰後漢名節成於風俗非自得也然一變之則可以至道矣司馬公之言曰教化國家之急務風俗天下之大事惟明智之君子深識長慮然後知其為益之大而收效之遠也至哉言乎其政治之龜鑑乎曹操權勢日隆董昭言宜進爵加九錫以彰殊勛荀彧以為曹公本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以德不宜如此操由是不悅及擊孫權請彧勞軍因輒留彧以侍中光祿大夫持節參丞相軍事彧以病留壽春飮藥而卒君子曰篡逆之人將欲奪人之國家必擇正人賢士人望所屬而意與巳忤者從而中傷之惟恐人之不成其志而其惡之不遂也曹操之殺荀文若是巳夫文若飮藥而死蓋自殺也而謂操殺之何哉蓋文若雖自殺而致其自殺者操也雖謂操殺之可也嗚呼君子不幸而處國家亂亡之際而欲自立於其間適足以殺其身而巳爾雖欲明哲保身有不可得若文若者亦何其不幸也且文若可不謂正人賢士者歟當漢之亂豪傑並起文若以為曹操者庶幾可以圖大事定國家故從而佐之凡其與操謀所謂大順大略大德者大抵皆匡朝寧國之事豈嘗與謀篡漢哉而不知曹操者天下之姦雄懷其鬼蜮之智雖外示恭遜而篡漢乃其本心彼董昭逆知其本心者也九錫之謀有以中其心之所欲矣文若雖賢而智不足顧謂曹公秉忠貞而守退讓君子愛人以德不宜如此不亦有忤其心乎智不足而節有餘不殺其身不止矣操見平時文若所與言未嘗逢其志及圖九錫而又忤其志使文若而在將巳之志不得終成其殺之也固其所矣是故文若死操之惡遂成明年而九錫加及孫權稱臣稱述天命而操以為天命在吾吾為周文王矣操死子丕遂篡位而且以舜禹自居矣嗚呼世豈有是等文王舜禹也哉朱溫將篡唐欲以優人張廷範為太常卿裴樞持其事樞等朝廷宿望溫以為小事猶不巳從必不肯聽巳取天下故肆其誅鋤白馬之禍樞等無遺類矣曹操之篡漢朱溫之篡唐其惡一也操之殺荀彧溫之殺裴樞何其所為之相類耶吾是以知篡逆之人欲奪人之國家者必擇正人賢士而中傷之惟恐人之不成其志而其惡之不得遂也嗚呼以操久蓄無君之心加有大功於天下其移漢祚不啻如反掌文若縱忤已其力豈足以沮操當是時國之后戚朝之忠良殺戮略盡留一文若夫亦何害而操曾不能少容焉文若則死矣而不知篡魏之司馬懿巳擬其後而不察也害能加於其所易制而明不足以料其所難圖烏在曹操之為智哉懿既制魏國命子師及昭並秉重權而昭子炎遂以代魏當其時王陵以壽春欲討懿而不克文欽母丘儉以淮南欲誅師而不遂諸葛誕又欲以夀春誅昭而不成巨姦之鋒夫人將嚙之然人知司馬氏專魏而不知養成其惡者由操之不智也故夫司馬氏於魏猶曹氏之於漢而巳耳孟子曰不仁而得國者有之矣未有不仁而得天下者也又曰出乎爾者反乎爾者也有天下者盍亦鑒觀之乎唐太宗有天下貞觀之間天下大治外薄嶺海户門不閉行不齎糧米斗三錢歲斷死獄僅二十有九蠻夷君長咸襲衣冠帶刀宿衛太宗歎曰此魏徵勸我行仁義既效矣惜不令封德彜見之或曰太宗烏在其為仁義也太宗之為君大抵仁不勝其武義不勝其利者也當其以英武之姿而舉義師於弱冠之始一戰而定東都再戰而下河北以至取江陵舉黎陽攘羣盜如振稿拉朽其有天下如運諸掌視成湯之拯民似矣而陽尊隋以為名則何異晉文河陽之尊周北擒頡利西滅高昌以及破吐谷渾降薛延陀衣冠其人郡縣其地視武王之通道似矣而高麗之征垂老而不厭則不及齊桓召陵之伐楚太宗之用武果三王之義乎囚至五覆罪至三訊視古人聽獄之辭則審矣而張藴古之死則未免於濫殺除斷趾之法去鞭背之刑視古人肉刑之制則輕矣而李君羡之誅則未免於淫刑太宗之用刑果三王之仁乎蓋其好大喜功志慕高遠而學問之道有未充故其設施制度綱紀雖有足觀而平生所為類皆假仁義以濟其功利之私烏在其為仁義也君子曰三代而下賢聖之君無如太宗矣而顧猶不足焉春秋責備之意其母乃巳甚乎夫論仁義之本太宗雖若有愧論仁義之功太宗不可謂不盛也孟子曰堯舜性之也湯武身之也五霸假之也然則太宗雖未可以性之許之而亦豈可以假之議之哉不然仁義之效大矣太宗行之何其易致而速成如是也蓋仁義之於天下如飢渴之於飮食人情之所同欲也其所以同欲由人心之所同有也况當天下大亂之餘斯民新脫於水火綏之以仁撫之以義尤易為力故其行之數歲粟米之賤斗至數錢居者有餘蓄行者有餘資人人自厚幾至刑措天下翕然而從化如影響之從形聲有不期然而然者此其為效易致而速成曾不待乎必世百年之久不謂之盛可乎太宗之所以致是者非其身之而孰致之乎使大宗行之以無倦雖至於由仁義行可也而謂其徒行仁義可乎而况謂其假仁義不亦過乎且自唐虞之治五百餘年而有湯之治自湯之治五百餘年而有文武之治文武以後于有餘年而始有太宗之為君其治天下之效如此然而猶以其所未至而責備之不得與先王並是則文武之前率五百餘年而遇一治世文武之後千有餘年而猶未遇願治之君也是不亦責人終無巳乎嗚呼唐有天下更十八君垂三百年其間蜀道關陜奉天之幸唐之幾亡者數矣而天下終復為唐焉是則太宗仁義之效益不可誣而行仁義之功果何負於太宗哉魏徵嘗言於唐太宗曰願陛下俾臣為良臣無俾臣為忠臣也君子曰人臣委質以事君其義一也而以為有良臣忠臣之異者則以其君有道無道有不同焉耳人君有道人臣直道以事之而得明哲以保身故謂之良臣君臣之名兩全而無失此處君臣之常者也人君無道人臣不容於直道而殺身以殉之故謂之忠臣君臣之名兩敗而不全此處君臣之變者也是故有禹湯文武之為君則臯陶伊尹周召之流因而為良臣有夏桀殷紂之為君則龍逢比干之流因而為忠臣嗚呼使其君為桀紂而已為龍逢比干之為此豈人臣之所願乎宜乎魏徵拳拳焉以為太宗告也且三代而下受諫如太宗之為君盡諫如魏徵之為臣可謂各極其志無愧乎君明臣良者矣而徵猶為是言何哉嗚呼此政徵之所為善諫者也徵之意以謂君有道則臣得為良臣君無道則臣必為忠臣願陛下為有道無為無道苟為無道則臣將必為忠臣矣是殆欲繩其君使不得為無道云耳不然則忠良雖異稱要皆美名而徵亦何擇焉蓋徴非為其身謀實為其君計藉令其君以無道見醜於天下後世而已獨以忠節聞孰與君都顯號臣荷美名而臣主之善兩立也抑徵之為是言蓋亦深知太宗之足以為有道矣茍太宗果不足與為有道也則與龍逢比干遊於地下徵其寧有貶哉幸而太宗力致貞觀之治而終為有道之君雖徵之所以諫之者非一端安知非忠臣良臣之論有以啓之也雖然良臣未始不為忠而忠臣未有不為良者也徵之此言抑有所矯而言之世有庸回之臣韋脂塞默惟以持祿固位為務者將必坐視其君之昏愚暴戾而無所匡救因據魏徴良臣之言以為解卒致臣主有兩敗之禍嗚呼此又徵之罪人也哉皇明文衡卷之五十一
