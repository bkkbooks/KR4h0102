body:
  text: 傳鐵崖先生傳貝瓊鐵崖先生者名維楨字廉夫姓楊氏世為紹興山隂縣人母李氏夢金鉤自月墮於懷既寤生先生少頴悟好學日記書數千言父宏為築萬卷樓鐵崖山中使讀書樓上懼性弗顓易怠去梯轆轤傳食積五年貫穿經史百氏雖老師弗及因號鐵崖登元泰定丁卯進士第授承事郎天台縣尹未幾丁父憂服闋改紹興錢清場司令坐損鹽久不調遂放浪錢唐與道士張雨遊西湖南山窮日夜為樂至正初詔徴天下儒臣修遼金宋三史先生不得預史成正統訖無定論乃著正統辨其詞曰正統之説何自而起乎起於夏后傳國湯武革世皆出於天命人心之公也統出於天命人心之公則三代而下歷數之相仍者可以妄歸於人乎故正統之義立於聖人之經以扶萬世之綱常聖人之經春秋是也春秋萬代史宗也首書王正於魯史之元年者大一統也五伯之權非不強於王也而春秋必黜之不使姦此統也吳楚之號非不竊於王也而春秋必外之不使僭此統也然則統之所在不得以割據之地僭偽之名而論之也尚矣先正論統於漢之後者不以劉蜀之祚促與其地之偏而奪其統之正者春秋之義也彼志三國降昭烈以儕吳魏使漢嗣之正下與漢賊並稱此春秋之罪人矣復有作元經自謂法春秋者而又帝北魏黜江左其失與志三國者等爾以致尊昭烈續江左兩魏之名不正而言不順者大正於宋朱氏之綱目焉或問朱氏述綱目主意曰在正統故綱目之挈統者在蜀晉而抑統者則秦昭襄唐武氏也至不得巳以始皇之草六年而始繼周漢始於高帝之五年而不始於降秦晉始於平吳而不始於泰和唐始於羣盜既夷之後而不始於武德之元又所以法於春秋之大一統然則今日之修遼金宋三史者宜莫嚴於正統與夫一統之辨矣自我世祖皇帝立國史院嘗命承旨百一王公修遼金二史矣宋亡又命詞臣通修三史矣延祐天曆之間屢勤詔旨而三史卒無成書者豈不以三史正統之議未決乎夫其議未決者又豈不以宋渡于南之後拘於遼金之抗於北乎吾嘗究契丹之有國矣自灰牛氏之部落始廣其初枯骨化形戴豬服豕荒唐怪誕中國之人所不道也八部之雄至阿保機披其黨而自尊逮耶律光而其勢浸盛契丹之號立於梁貞明之初大遼之號改於漢天福之日自阿保機訖于天祚凡九主歷二百一十有五年夫遼固唐之邊夷也乘唐之衰草竊而起石晉氏通之且割幽燕以與之遂得窺釁中夏而石晉氏不得不亡矣而議者以遼承晉統吾不知其何統也金之有國始於完顏氏實又臣屬於契丹者也至阿骨打茍逃性命於道宗之世遂敢萌人臣之將而篡有其國僭稱國號於宋重和之元相傳九主凡歷一百一十有七年而議者又以金之平遼克宋帝有中原而謂接遼宋之統吾又不知其何統也議者又謂完顔氏世為君長保有肅愼至太祖時南北為敵國素非君臣遼祖神册之際宋祖未生遼祖比宋前興五十餘年而宋嘗遣使卑詞以告和結為兄弟晚年遼為翁而宋為孫矣此其説之曲而陋者也漢之丐奴唐之突厥不皆興於漢唐之前乎而漢唐又與之通和矣吳魏之於蜀也亦一時角立而不相統攝者也而秉史筆者必以丐奴突厥為紀傳而以漢唐為正統必以吳魏為分繫而以蜀為正綱何也天理人心之公閲萬世而不可泯者也議者之論五代又以朱梁氏為篡逆不當合為五代史其説似矣吾又不知朱晃之篡克用氏父子以為仇矣契丹氏背唐兄弟之約而稱臣於梁非逆黨乎春秋誅逆重誅其黨契丹氏之誅當何如哉且石敬塘事唐不受其命而篡其國亦非正矣契丹氏虜出帝改晉為遼漢興而人心應漢謂之承晉又可乎縱承晉也謂之統可乎又謂東漢四主遠兼郭周宋至興國四年始受其降遂以周為閠以宋統不為受周禪之正也吁茍以五代之統論之則南唐李忭嘗立大唐宗廟而自稱為憲宗五代之孫矣宋於開寶八年滅南唐則宋統繼唐不優於繼漢繼周乎但五代皆閏也吾無取其統吁天之歷數自有歸代之正閏不可紊千載歷數之統不必以承先朝續亡主為正則宋興不必以膺周之禪接漢接唐之閏為統也宋不必膺周接唐以為統則遂謂歐陽子不定五代為南史為宋膺周禪之張本者皆非矣當唐明宗之祝天自以夷虜不任社稷生靈之主願天早生聖人自是天人交感而宋太祖生矣天厭禍亂之極使之君王中國非欺孤弱寡之所致也朱氏綱目於五代之年皆細注於歲之下其遺意固有待於宋矣有待於宋則直以宋接唐統之正矣而又何計其受周禪與否乎中遭陽九之厄而天猶不泯其社稷瓜􅚩之系在江之南子孫享國又凡百有五十有五年金泰和之議以靖康為遊魂餘魄比之昭烈在蜀則泰和之議固知宋有遺統在江之左矣而金欲承其未絶為得統可乎好黨君子遂斥紹興為偽宋吁吾不忍道矣張邦昌迎康邸之書曰由康邸之舊藩嗣宋朝之大統漢家之厄十世而光武中興獻公之子九人而重耳尚在兹惟天意夫豈人謀是書也邦昌肯以靖康之後為遊魂餘魄而代有其國乎邦昌不得革宋則金不得以承宋是則後宋之與前宋即東漢西漢之比爾又非劉蜀牛晉族屬疏遠牛馬疑迷者之可以同日語也論正閏者猶以正統在蜀正朔相承在江東矧嗣祚親切比諸光武重耳者乎而又可以偽斥之乎此宜不得以渡南為南史也明矣再考宋祖生於丁亥而建國於庚申我太祖之降年與建國之年亦同宋以甲戌渡江而平江南於乙亥丙子之年而我王師渡江平江南之年亦同是天數之有符者不偶然天意之有屬者不茍然矣故我世祖平宋之時有過唐不及漢宋統當絶我統當續之喻是世祖以歷數之正統歸之於宋而以今日接宋統之正自屬也當時一二大臣又有奏言曰其國可滅其史不可滅也是又以編年之統在宋矣論而至此則中華之統正而大者皆不在遼金而在於天付生靈之主也昭昭矣然則論我元之大一統者當在平宋而不在平遼與金之日又可推矣夫何今之君子昧於春秋大一統之旨而急於我元開國之年遂欲接遼以為統至於咈天數之符悖世祖君臣之喻逆萬世是非之公論而不恤吁不以天數之正華統之大屬之我元承乎有宋如宋之承唐唐之承隋承晉承漢也而妄分閏代之承欲以荒夷非統之統屬之我元吾又不知今之君子待今日為何時待今聖人為何君也哉烏乎春秋大一統之義吾巳悉之請復以成周之大統明之於今日也文王在諸侯位凡五十年至三分天下有其二遂誕受天命以撫方夏然猶九年而大統未集必至武王十有三年伐紂有天下商命始革而大統始集焉蓋革命之事間不容髮一日之命未絶則一日之統未集當日之命絶則當日之統集也宋命一日而未革則我元之大統亦一日而未集也成周不急於文王五十年武王十三年而集天下之大統則我元又豈急於太祖開國五十年及世祖十有七年而集天下之大統哉抑又論之道統者治統之所在也堯以是傳之舜舜以是傳之禹湯禹湯以是傳之文武周公孔子孔子沒幾不得其傳百有餘年而孟子傳焉孟子沒又幾不得其傳千有餘年而濂洛周程諸子傳焉及乎中立楊氏而吾道南矣既而宋亦南渡矣楊氏之傳為豫章羅氏延平李氏及於新安朱子朱子沒而其傳及我朝許文正公此歷代道統之源委也然則道統不在遼金而在宋在宋而後及於我朝君子可以觀治統之所在矣嗚呼世隔而後其議公事久而後其論定故前代之史必修於異代之君子以其議公而論定也晉史修於唐唐史修於宋則宋史之修宜在今日而無讓矣而今日之君子又不以議公論定者自任而又諉曰付公論於後之儒者吾不知後之儒者又何儒也此則余為今日君子之痛惜也今日堂堂大國林林巨儒議事為律吐詞為經而正統大筆不自竪立又闕之以遺將來不以貽千載綱目君子之笑為厚恥吾又不知負儒名於我元者何施眉目以誦孔子之遺經乎洪惟聖天子當朝廷清明四方無虞之日與賢宰臣親覽經史有志於聖人春秋之經制故斷然定修三史以繼祖宗未遂之志甚盛典也故知其事大任重以在館之諸賢為未足而又遣使草野以聘天下之良史才負其任以往者有其人矣問之以春秋之大法綱目之主意則槩乎其無言也嗚呼司馬遷易編年為紀傳破春秋之大法唐儒蕭茂挺能議之孰謂林林巨儒之中而無一蕭茂挺其人乎此草野有識之士之所甚惜而不能倡其言於上也故私著其説為宋遼金正統辨以俟千載綱目君子云若其推子午卯酉及五運之王以分正統之説者此日家小技之論王勃兒輩之佞其君者爾君子不取也吾無以為論辨出見者韙之謂其正大光明雖百世之下無以易之者欲獻不果去遊吳興遂至姑蘇而華亭大姓吕翁延于家誨子弟八年始除杭州四務提舉同年楊子宣為江浙省參知政事惜其才欲薦于朝疏未上卒十二年汝頴兵起南北騷然先生既受代即辟地富春山後依元帥劉九九於建德九九敗後挈家歸錢唐艱難困踣嘯歌自若十八年太尉張士誠知其名欲見之不往繼遣其弟來求言因獻五論及復書斥其所用之人其略曰閣下乘亂起兵首倡大順以獎王室淮吳之人萬口一詞以閣下之所為有今日不可及者四兵不嗜殺一也聞善言則拜二也儉於自奉三也厚給吏祿而姦貪必誅四也此東南豪傑望閣下之可與有為也閣下孜孜求治上下夬不使相徇也直言決不使遺棄也毀譽決不使亂真也惟賢人失職四民失業者尚不少也吾惟閣下有可畏者又不止是動民力以搖邦本用吏術以括田租銓放私人不承制出納國廪不上輸受降人不疑任忠臣而復二也六者之中有其一二可以喪邦閣下不可以不省也况為閣下之將帥者有生之心無死之志矣為閣下之守令者有奉上之道無恤下之政矣為閣下之親族姻黨者無祿養之法有姦位之權矣某人有假佞以為忠者某人有託詐以為直者某人有飾貪虐以為廉良者閣下信佞為忠則臣有靳尚者用矣信詐為直則臣有趙高者用矣信貪虐為廉良則跖蹻者進隋夷者退矣又有某繡使而拜虜乞生某郡太守望敵而先遁閣下禮之為好人養之為大老則死節之人少賣國之人衆矣是非一謬黑白俱紊天下何自而治乎及觀閣下左右參議贊密者未見其砭切政病規進閣下於遠大之域者使閣下有可為之時有可乘之勢而迄無有成之效其故何也為閣下計者少而為身謀者多則誤閣下者多矣身犯六畏釁闕多端不有內變必有外禍不待智者而後知也閣下狃於小安而無長慮此東南豪傑又何望乎㒒既老且病爵祿不干於閣下惟以東南切望於閣下幸采而行之毋蹈羣小誤人之域則小伯可以為錢鏐大伯可以為晉重耳齊小白也否則麋鹿復上姑蘇臺始憶東維子之言於乎晚矣東維子蓋晚年所號也衆惡其直且目為狂生時四境日蹙朝廷方倚丞相逹識帖木兒為保障而納賄不已復上書風之由是不合久之徒松江受業者益衆雖武夫悍卒識與不識皆知得其文為重大明革命召諸儒考禮樂洪武三年正月至京師年巳七十有六有疾得請歸夏六月卒太守林孟善為買地葬之先生為人不尚峻絶之行接引人物稱之恆過其實士以此感附之而於負者亦未嘗校曲直他日遇之如初有貴遊子既破産流落淞上數踵其門竟持所購倪雲林畫去左右欲辱之曰吾哀其困使往見一達官以書畫為介耳非盜也務掩人過如此性不好飮特溺於音樂出必從以歌童舞女為禮法士所疾一日遊盤龍塘夜抵普門寺宿盜伺其亡盡竊所蓄物黎明家人往白之賦詩不輟直語客曰老鐵在是區區長物又奚恤衆服其器家隱三吳屢遷其居有曰草玄閣曰藉景軒曰柱頰樓其曰小蓬臺者以紹興之山名蓬萊示不忘鄉里云後止臺上不復下且榜於門曰客至不下樓恕老懶見客不答禮恕老病客問事不對恕老默發言無所避恕老迂飮酒不輟樂恕老狂所著春秋大意左氏君子議史鉞麗則遺音及志序碑銘贊頌古樂府近體五七言詩鐃歌鼓次曲凡若于卷行于世論曰元繼宋季之後政龎文抏鐵崖務鏟一代之陋上追秦漢雖詞涉夸大自姚虞而下雄健而不窘者一人而巳湖南李祈評其所作曰玉光劍氣自不可掩身屢詘而名益昌良有以夫仕止典市官卒不得大用噫君子之所貴又豈位也哉南宫生傳高啓南宫生吳人愇軀幹博涉書傳少任俠喜擊劍走馬尤善彈指飛鳥下之家素厚藏生用周養賔客及與少年飮慱遊戲盡喪其資逮壯見天下亂思自樹功業乃謝酒徒去學兵得風后握奇陳法將北走中原從豪傑計事會道梗周流無所合遂泝大江遊金陵入金華會稽諸山搜覽瓌怪渡浙江泛具區而歸家居以氣節聞衣冠慕之爭往迎候門止車日數十兩生亦善交無貴賤皆傾身與相接有二軍將恃武橫甚數毆辱士類號虎冠其一嘗召生飮或曰彼酗不可近也生笑曰使酒人惡能勇吾將柔之矣即命駕往坐上座為語古賢將事其人竦聽居樽下拜起為壽至罷會無失儀其一嘗遇生客次顧生不下已目懾生而起他日見生獨騎出從健兒帶刀䇿馬踵生後若將肆暴者生故緩轡當中道進不少避知生非懦儒遂引去不敢突冒訶避明旦介客詣生謝請結歡生能以氣服人類如此性抗直多辨好針切友過有忤巳則靣數之無留怨與人論議蘄必勝然援事析理衆終莫能折時藩府數用師生私䇿其雋蹶多中有言生於府欲致生幕下不能得將中生法生以智免家雖以貧然喜事故在或饋酒肉立召客與飮啖相樂四方遊士至吳者生察其賢必與周旋款曲延譽上下所知有喪疾不能葬療者以告生輒令削牘疏所乏為請諸公間營具之終飮其德不言故人皆多生謂似婁君卿原巨先而賢過之久之稍厭事闔門寡將迎闢一室庋歷代法書周彞漢硯唐雷氏琴日遊其間以自娛素工草隸逼鍾王患求者衆遂自閟希復執筆歆慕靜退時賦詩見志怡然處約若將終身生姓宋名克家南宫里故自號云贊曰生之行凡三變每變而益善尚俠末矣欲奮於兵固壯然非士所先晚乃刮磨豪習隱然自將履藏器之節非有德能之乎與夫不自知返違遠道德者異矣天刑生傳蘇伯衡天刑生者名闕天刑生其號也生生而病兔闕因名闕而自號闕翁及年壯更得盲瞶拘攣病生傷目之不明也耳之不聰也手之不能執也足之不能履也曰類若吾矐吾薰吾攭吾􅎂者孰為之天也天何刑我酷也吾殆有隱慝乎古之刑幾而吾今具四刑悲夫以此更今號曰天刑生云或曰生嘗坐族子德修乾沒內庫物簿録其家就逮南京今天子燭其非辜卒還其家財而縱之歸天子即天也今天子不忍生罪而謂天且刑生孰信之或曰生大父父仕皆不大顯未嘗竊王柄作威福倚法報復鬻獄而漁色淫刑而黷貨亦未嘗武斷而兼並極奢窮欲而暴殄天物生又讀書循理未嘗多行不義事熟視之不得所以致疾狀而生乃有斯疾信隱慝致邪夫天於人也隱慝猶且察之而矐之薰之攦之􅎂之如此則陽為不善者又當何如人之竊主柄以作威福者倚法以報復者鬻獄漁色淫刑黷貨者武斷而兼並者極奢窮欲而暴殄天物者多行不義事者可劓可刵可刖可戮者何可勝數不于彼是劓是刵是刖是戮顧乃隂矐生目薰生耳攦生手釱生足不既失刑乎所謂福善禍淫者非邪或曰天人曷嘗相干生者生死者死吉者吉凶者凶天何與焉而生乃謂天刑之不亦厚誣天也歟哉或曰若生者而信天刑之則亦天之未定耳天定且將以刑生者而刑其可劓可刵可刖可戮者善者可怠而惡者可肆邪生俱弗之答驟然歌衛人之詩曰巳焉哉天實為之謂之何哉生姓潘氏金華人其先世仕宋中書舍人默成先生最顯後六世而宋亡又二世乃至生生通經能詩文而詩出語尤絶人生口吃然喜靣臧否人是非得失期期言不巳喜怒一弗顧人以此嚴憚之有隂事惟恐生知之而發之見生輒趨避去之生今杜門不復出遇事猶輒作詩風刺向令生不疾廢詔起文學儒生且首推上生使生得如汪何輩拜御史亦且諤諤如乃祖而生竟以疾廢矣君子皆為之太息曰不幸不幸云論曰天道無親常與善人若潘生者得不為善人乎而其疾患至于此則夫善人天何與之之有哉仲尼而不得位顔淵而短命死冉伯牛而有疾子夏而喪明聖賢且如此獨潘生乎人皆謂生之自號為激察其言乃可謂能自反者莊周云知其無可奈何而安之若命者其潘生之謂與二孝子傳王叔英余在衆中往往聞孝子慈弟義婦事未嘗不為之感激流涕欲録傳之以為世勸而恨不得其詳洪武某年間有兄弟二人以其伯兄坐法當死各自縳為當刑者哀訴于午門願代兄死上問其故二人者言曰臣少無父非兄無以至今日今兄當刑臣誠不忍見兄死而獨存故願以二身贖兄一身惟陛下聽之上疑其非誠或有教之者因許其代而戒行刑者曰第試其人如有難色則殺之無難色則舍之二人者皆延頸待刃遂止不殺一時見聞者無不嘆息泣下上大嗟異之將赦其兄命未下御史大夫陳寧獨以為不宜以是得赦卒殺其兄此可謂慈弟也又得婦四人焉其一人夫為變得罪臨刑戒之曰吾死汝年少貧無以為守當再嫁耳愼勿嫁軍人農人樵夫庶可相保也語時當深塹上謂夫曰汝尚未知吾志乎遂投于塹而死其一人夫臨刑脫首簪市酒肉啖之曰吾當與子共死也佇視其夫河橋上夫既死即自投于河又其二人妯娌也其夫兄弟以黨人受戮家人財産盡沒于官婦人則當給為官婢其妯娌二人相謂曰吾夫巳死吾二人縱無他辱於義猶難獨生况又有他辱乎遂皆自經而死是四婦者可謂義矣余欲各為之傳以傳於世既不得其人之姓名與其事之詳以是輒不得發以余一人所聞如此則余之所不聞者可勝道哉余觀前代史傳求其事之卓卓如此者蓋寡豈多有其事將亦如余之不聞其詳而不得録邪抑異時誠少有之而特盛於今邪余固不得而深辨矣然幸而得其詳者烏可使之無傳乎余於同邑得一人焉曰陳圭於同郡得一人焉曰朱煦皆孝子可書也作二孝子傳陳圭字錫玄台州黃巖人也其父叔弘與其鄉人多讐圭常諌之後其讐人以贓告叔弘罪當死圭以狀告於通政司曰圭為子不能諌其父以陷於不義得罪死此圭之不孝所致義當死罪於圭之身原圭父使將自新誠不勝至願通政司以聞上大喜曰不意今日乃復有孝子宜赦其死俟天下百官朝覲將播告之為天下勸頃之刑部尚書開濟奏曰罪有常刑不宜屈法以開僥幸之路請論如法遂聽圭代父死而謫其父叔弘隸兵雲南聞者皆嘆圭之孝而惜其死嗚呼圭之死固圭之志也於圭何憾哉朱煦台州仙居人也家世儒者母楊氏性嚴急遇諸子未嘗借色辭少不如指必笞擊至馴伏乃已煦事之盡恭順之道其伯父二人長季敬次季誠煦皆善事之二伯父俱有令望嘗稱之曰是姪真猶子也其父季用由薦知福州府洪武十八年詔天下盡革今歲以上有司積歲官吏為民害者季用視事僅五月爾以例起入京吏一以法論罪作城須役嚴償重日用錢數十緡季用又病痢被楚謂照曰吾資力豈足堪此吾旦夕死矣汝勿深憂但收吾骸歸葬耳煦惶懼不敢離左右復戒二弟熊正共守不敢少寐季用由是不得死時役告枉者甚衆令益嚴告而謫隸兵雲南者二人𬒳極刑者四人矣煦不顧死而隂與父僚友同役者謀曰吾無術以脫吾父矣訴不訴皆死萬一吾父由訴獲免雖戮死萬萬無憾遂陳其辭于通政司通政司為陳於上上觀其情遂赦季用而復其官同時以煦告得免復官者一十四人皆拜煦父謝曰微君有孝子吾儕骨肉為城下土矣已而煦感疾死其十四人者哀臨猶巳子季用傷煦死病益甚亦死或者以煦冒死得免為幸而又以其父子終俱死為命嗚呼為煦者知盡子職而已其他曷足計哉羅先生傳楊士奇羅先生名性字子理以字行羅故泰和儒家宋有為盧溝主簿曰伯夀嘗刲股和藥起親疾縣表其所居坊曰旌孝者先生會伯祖也曾祖伯霖祖見可父榖禎先生少孤貧自奮於學初受易於鄉先生韋乾乾繼登康山長宗武之門苦志畢力博記精思夙夜不懈既冠遭元季兵亂走避巖谷崎嶇困窮未嘗廢書卷性耿介一言一行必端不與俗人接雖至戚或涉邪行輒絶之然口未嘗言海桑先生陳心吾嘗稱先生及楊子淵有氷玉之操洪武初詔郡縣立學御史劉昭先知縣采譽望聘先生及子淵鄧彥高三人為之師時號楊羅鄧四年中鄉貢進士明年赴春官奉勑免會試授德安府同知先是有寇號糟李萬戶者以衆入府治劫殺郡守以下掠庫藏官捕其衆悉就戮獨糟李逸去久不獲詔捕益急蹤迹所過宿逮繫數百人諸邑騷然先生初下車民有負一囊詣府言糟李實死矣此其遺骸也問死幾何時矣曰一歲曰始死時曷為不言又驗其鬚髮皆在而皓然白也曰糟李年未四十此安得是邪笞而逐之悉出所繫數百人諭之曰朝廷但欲得糟李耳糟李旦出即汝輩暮皆寧家何為不自愛體膚乃甘受楚毒而庇一賊邪能從吾言今與汝等期十日獲賊即汝皆良民衆叩頭曰府公欲生我敢不盡死力乃悉縱之七日生縛糟李至庭下民皆以獲賊勞而遣之命下賦民鐵造軍器時兵亂初定商旅未通郡民猝無所辦先生居第後治𬞞圃得窖鐵萬餘斤民爭趨求售同官亦勸以售民先生曰固天以濟民豈為我也悉以代民充賦有餘皆人官庫銖兩不私焉其氷蘖之操愈厲而恤民之心寢食不忘為政以寬恕為本惟贓吏無所假應城縣吏劉仁盜官麥事覺府建治之仁懼逃匿會按察僉事朱逢吉過德安仁出誣告先生他事將就鞫湖廣參政陶凱吳雲按察副使劉某聞之馳召逢吉還謂曰君不知德安有羅同知邪草七府之賢守裁三人其可以枉忠賢哉嶽州馬知府沔陽彭知府及先生三人也逢吉卒白其誣而正仁盜麥之罪在郡四年闕知府皆先生總之秩滿詣京師坐擅用棗木染軍衣為陳寧所劾謫戍西安行槖無數百錢怡然就役不以得失置意既至西安之達官貴人皆敬禮之而安於處賤未嘗一毫干人郡諸生從之受經後多舉進士去是時四方老師碩儒在西安者數十人吳中鄒奕獨曰合吾輩所讀書庶幾羅先生之半蓋先生學甚博為文章切深詩古體宗漢魏近體宗盛唐書法鍾元常年及七十卒士奇少孤五歲先生取而教育之有父道焉明年官德安又挈以行又三年先生有陜西之役屢遣書督其學文草年而捐館當是時所以誨不肖者雖不能盡記而為道之大要不敢忘也恆竊私念先生所以修諸躬施諸人者皆當追配古人而今之人知之者寡矣謹述其槩為傳手録一通以寄其子賔畿蓋又欲其子若孫皆圖不辱云周是修傳周是修諱德以字行周吉之泰和爵譽里名家其先諱矩者嘗顯於南唐至宋纍纍有科第其支裔徙灉江里是修之所自出也是修少孤貧自奮於學從遊鄉先生胡渚樵渚樵以孫妻之又從國子學録蕭執先生明詩經初舉霍丘縣學訓導入見太祖高皇帝擢為周府奉祠正高皇帝上賔之明年有告言王過失事王府官屬皆下吏是修以嘗諫得免改衡府紀善預修纂翰林數陳論國家大計及指斥用事者誤國用事者怒衆共挫折之是修屹不為動太宗文皇帝靖難之師既渡江駐金川門宫中悉自焚明日是修留書其家别其友江仲隆解大紳胡光大蕭用道楊士奇且付後事暮入應天府學自經六月十五日也又明日臣民推戴文皇帝繼大統數月御史言是修不順天命請加追戮上曰彼食其祿自盡其心一無所問是修內貞外和有孝友忠信之行非其義不茍取襟懷坦明灑落而沖淡悠然其學自經史百氏下至隂陽醫卜之説靡所不通為文章未嘗締思援筆立就而雍容雅贍詞理條達稍暇著述吟咏不虛寸晷所著有詩小序詩集義詩譜論語類編廣衍太極圗觀感録綱常懿範邇言家訓芻蕘集進思集是修汲汲導誘人善人有過失恆為之隱以是無少長賤貴皆樂親之明於人所豸士如梁用之劉叔毖皆知名當世是修之學雖間未純然於明綱常為世道計必身履之而不徒託之空言豈非卓然特立者歟是修卒年四十有九時解胡蕭梁皆見諸文字然屬倉卒不及詳今二十有八年矣知是修者獨余在每追念君子清白之節文皇帝日月之明既照其心豈當遂致泯沒故述為小傳以授其子轅使傳焉皇明文衡卷之六十
