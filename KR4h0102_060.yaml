body:
  text: 傳鐵崖先生傳貝瓊鐵崖先生者名維楨字廉夫姓楊氏世爲紹興山隂縣人母李氏夣金鉤自月堕於懷旣寤生先生少頴悟好學日記書數千言父宏爲築萬卷樓鐵崖山中使讀書樓上懼性弗顓易怠去梯轆轤傳食積五年貫穿經史百氏雖老師弗及因號鐵崖豋元㤗定丁卯進士第授承事郞天台縣尹未幾丁父憂服闋改紹興錢清塲司令坐損鹽乆不調遂放浪錢唐與道士張雨遊西湖南山窮日夜爲樂至正初詔徴天下儒臣修遼金宋三史先生不得預史成正統訖無定論乃著正統辨其詞曰正統之說何自而起乎起於夏后傳國湯武革世皆出於天命人心之公也統出於天命人心之公則三代而下歷數之相仍者可以妄歸於人乎故正統之義立於聖人之經以扶萬世之綱常聖人之經春秋是也春秋萬代史宗也首書王正於魯史之元年者大一統也五伯之權非不強於王也而春秋必黜之不使奸此統也呉楚之號非不竊於王也而春秋必外之不使僭此統也然則統之所在不得以割㨿之地僭僞之名而論之也尚矣先正論統於漢之後者不以劉蜀之祚促與其地之偏而奪其統之正者春秋之義也彼志三國䧏昭烈以儕呉魏使漢嗣之正下與漢賊竝稱此春秋之罪人矣復有作元經自謂法春秋者而又帝北魏黜江左其失與志三國者等爾以致尊昭烈續江左兩魏之名不正而言不順者大正於宋朱氏之綱目焉或問朱氏述綱目主意曰在正統故綱目之挈統者在蜀晉而抑統者則秦昭襄唐武氏也至不得巳以始皇之廿六年而始繼周漢始於高帝之五年而不始於䧏秦晉始於平呉而不始於㤗和唐始於羣盜旣夷之後而不始於武德之元又所以法於春秋之大一統然則今日之修遼金宋三史者宜莫嚴於正統與夫一統之辯矣自我世祖皇帝立國史院嘗命承㫖百一王公修遼金二史矣宋亡又命詞臣通修三史矣延祐天曆之間屢勤詔㫖而三史卒無成書者豈不以三史正統之議未决乎夫其議未决者又豈不以宋渡于南之後拘於遼金之抗於北乎吾嘗䆒契丹之有國矣自灰牛氏之部落始廣其初枯骨化形戴猪服豕荒唐恠誕中國之人所不道也八部之雄至阿保機披其黨而自尊迨耶律光而其勢浸盛契丹之號立於梁貞明之初大遼之號改於漢天福之日自阿保機訖于天祚凡九主歷二百一十有五年夫遼固唐之邊夷也乗唐之衰草竊而起石晉氏通之且割幽燕以與之遂得窺釁中夏而石晉氏不得不亡矣而議者以遼承晉統吾不知其何統也金之有國始於完顏氏實又臣屬於契丹者也至阿骨打茍逃性命於道宗之世遂敢萌人臣之將而篡有其國僭稱國號於宋重和之元相傳九主凡歷一百一十有七年而議者又以金之平遼克宋帝有中原而謂接遼宋之統吾又不知其何統也議者又謂完顔氏世爲君長保有肅愼至太祖時南北爲敵國素非君臣遼祖神冊之際宋祖未生遼祖比宋前興五十餘年而宋嘗遣使卑詞以告和結爲兄弟晚年遼爲翁而宋爲孫矣此其說之曲而陋者也漢之匃奴唐之突厥不皆興於漢唐之前乎而漢唐又與之通和矣呉魏之於蜀也亦一時角立而不相統攝者也而秉史筆者必以匃奴突厥爲紀傳而以漢唐爲正統必以呉魏爲分繫而以蜀爲正綱何也天理人心之公閲萬世而不可泯者也議者之論五代又以朱梁氏爲篡逆不當合爲五代史其說似矣吾又不知朱晃之篡克用氏父子以爲仇矣契丹氏背唐兄弟之約而稱臣於梁非逆黨乎春秋誅逆重誅其黨契丹氏之誅當何如哉且石敬塘事唐不受其命而篡其國亦非正矣契丹氏虜出帝改晉爲遼漢興而人心應漢謂之承晉又可乎縱承晉也謂之統可乎又謂東漢四主遠兼郭周宋至興國四年始受其䧏遂以周爲閠以宋統不爲受周禪之正也吁茍以五代之統論之則南唐李昪嘗立大唐宗廟而自稱爲憲宗五代之孫矣宋於開寳八年滅南唐則宋統繼唐不優於繼漢繼周乎但五代皆閏也吾無取其統吁天之歷數自有歸代之正閏不可紊千載歷數之統不必以承先朝續亡主爲正則宋興不必以膺周之禪接漢接唐之閏爲統也宋不必膺周接唐以爲統則遂謂歐陽子不定五代爲南史爲宋膺周禪之張本者皆非矣當唐明宗之祝天自以夷虜不任社稷生靈之主願天早生聖人自是天人交感而宋太祖生矣天厭禍亂之極使之君王中國非欺孤弱寡之所致也朱氏綱目於五代之年皆細注於歲之下其遺意固有待於宋矣有待於宋則直以宋接唐統之正矣而又何計其受周禪與否乎中遭陽九之厄而天猶不泯其社稷瓜􅚩之系在江之南子孫享國又凡百有五十有五年金㤗和之議以靖康爲遊魂餘魄比之昭烈在蜀則㤗和之議固知宋有遺統在江之左矣而金欲承其未絶爲得統可乎好黨君子遂斥紹興爲僞宋吁吾不忍道矣張邦昌迎康邸之書曰由康邸之舊藩嗣宋朝之大統漢家之厄十世而光武中興獻公之子九人而重耳尚在兹惟天意夫豈人謀是書也邦昌肯以靖康之後爲遊魂餘魄而代有其國乎邦昌不得革宋則金不得以承宋是則後宋之與前宋卽東漢西漢之比爾又非劉蜀牛晉族屬䟽遠牛馬疑迷者之可以同日語也論正閏者猶以正統在蜀正朔相承在江東矧嗣祚親切比諸光武重耳者乎而又可以僞斥之乎此宜不得以渡南爲南史也明矣再攷宋祖生於丁亥而建國於庚申我太祖之䧏年與建國之年亦同宋以甲戌渡江而平江南於乙亥丙子之年而我王師渡江平江南之年亦同是天數之有符者不偶然天意之有屬者不茍然矣故我世祖平宋之時有過唐不及漢宋統當絶我統當續之喻是世祖以歷數之正統歸之於宋而以今日接宋統之正自屬也當時一二大臣又有奏言曰其國可滅其史不可滅也是又以編年之統在宋矣論而至此則中華之統正而大者皆不在遼金而在於天付生靈之主也昭昭矣然則論我元之大一統者當在平宋而不在平遼與金之日又可推矣夫何今之君子昧於春秋大一統之㫖而急於我元開國之年遂欲接遼以爲統至於咈天數之符悖世祖君臣之喻逆萬世是非之公論而不恤吁不以天數之正華統之大屬之我元承乎有宋如宋之承唐唐之承隋承晉承漢也而妄分閏代之承欲以荒夷非統之統屬之我元吾又不知今之君子待今日爲何時待今聖人爲何君也哉烏乎春秋大一統之義吾巳悉之請復以成周之大統明之於今日也文王在諸侯位凡五十年至三分天下有其二遂誕受天命以撫方夏然猶九年而大統未集必至武王十有三年伐紂有天下商命始革而大統始集焉蓋革命之事間不容髪一日之命未絶則一日之統未集當日之命絶則當日之統集也宋命一日而未革則我元之大統亦一日而未集也成周不急於文王五十年武王十三年而集天下之大統則我元又豈急於太祖開國五十年及世祖十有七年而集天下之大統哉抑又論之道統者治統之所在也堯以是傳之舜舜以是傳之禹湯禹湯以是傳之文武周公孔子孔子沒幾不得其傳百有餘年而孟子傳焉孟子沒又幾不得其傳千有餘年而濂洛周程諸子傳焉及乎中立楊氏而吾道南矣旣而宋亦南渡矣楊氏之傳爲豫章羅氏延平李氏及於新安朱子朱子沒而其傳及我朝許文正公此歷代道統之源委也然則道統不在遼金而在宋在宋而後及於我朝君子可以觀治統之所在矣嗚呼世隔而後其議公事乆而後其論定故前代之史必修於異代之君子以其議公而論定也晉史修於唐唐史修於宋則宋史之修宜在今日而無讓矣而今日之君子又不以議公論定者自任而又諉曰付公論於後之儒者吾不知後之儒者又何儒也此則余爲今日君子之痛惜也今日堂堂大國林林鉅儒議事爲律吐詞爲經而正統大筆不自竪立又闕之以遺將來不以貽千載綱目君子之笑爲厚恥吾又不知負儒名於我元者何施眉目以誦孔子之遺經乎洪惟聖天子當朝廷清明四方無虞之日與賢宰臣親覽經史有志於聖人春秋之經制故㫁然定修三史以継祖宗未遂之志甚盛典也故知其事大任重以在舘之諸賢為未足而又遣使草野以聘天下之良史才負其任以徃者有其人矣問之以春秋之大法綱目之主意則槩乎其無言也嗚呼司馬遷易編年為紀傳破春秋之大法唐儒蕭茂挺能議之孰謂林林鉅儒之中而無一蕭茂挺其人乎此草野有識之士之所甚惜而不能倡其言於上也故私著其說為宋遼金正統辨以俟千載綱目君子云若其推子午卯酉及五運之王以分正統之說者此日家小技之論王勃兒輩之佞其君者爾君子不取也吾無以為論辨出見者韙之謂其正大光明雖百世之下無以易之者欲獻不果去㳺呉興遂至姑蘇而華亭大姓吕翁延于家誨子弟八年始除杭州四務提舉同年楊子宣為江浙省參知政事惜其才欲薦于朝䟽未上卒十二年汝頴兵起南北騷然先生旣受代卽辟地富春山後依元帥劉九九於建徳九九敗後挈家帰錢唐艱難困踣嘯歌自若十八年太尉張士誠知其名欲見之不徃継遣其弟來求言因獻五論及復書斥其所用之人其畧曰閣下乗亂起兵首倡大順以㢡王室淮呉之人萬口一詞以閣下之所爲有今日不可及者四兵不嗜殺一也聞善言則拜二也儉於自奉三也厚給吏祿而奸貪必誅四也此東南豪傑望閣下之可與有爲也閣下孜孜求治上下夬不使相徇也直言决不使遺棄也毀譽决不使亂眞也惟賢人失職四民失業者尚不少也吾惟閣下有可畏者又不止是動民力以搖邦本用吏術以括田租銓放私人不承制出納國廪不上輸受䧏人不疑任忠臣而復貳也六者之中有其一二可以喪邦閣下不可以不省也况為閣下之將帥者有生之心無死之志矣為閣下之守令者有奉上之道無恤下之政矣為閣下之親族姻黨者無祿養之法有奸位之權矣某人有假佞以為忠者某人有託詐以為直者某人有飾貪虐以為廉良者閣下信佞為忠則臣有靳尚者用矣信詐為直則臣有趙高者用矣信貪虐為廉良則蹠蹻者進隋夷者退矣又有某繡使而拜虜乞生某郡太守望敵而先遁閣下禮之為好人養之為大老則死節之人少賣國之人衆矣是非一謬黑白俱紊天下何自而治乎及觀閣下左右叅議賛宻者未見其砭切政病規進閣下於遠大之域者使閣下有可為之時有可乗之勢而迄無有成之效其故何也為閣下計者少而為身謀者多則誤閣下者多矣身犯六畏釁闕多端不有內变必有外禍不待智者而後知也閣下狃於小安而無長慮此東南豪傑又何望乎㒒旣老且病爵祿不干於閣下惟以東南切望於閣下幸采而行之毋蹈羣小誤人之域則小伯可以為錢鏐大伯可以為晉重耳齊小白也否則麋鹿復上姑蘇臺始憶東維子之言於乎晚矣東維子蓋晚年所號也衆惡其直且目為狂生時四境日蹙朝廷方倚丞相逹識帖木兒為保障而納賄不已復上書風之由是不合乆之徒松江受業者益衆雖武夫悍卒識與不識皆知得其文為重大明革命召諸儒考禮樂洪武三年正月至京師年巳七十有六有疾得請歸夏六月卒太守林孟善爲買地塟之先生爲人不尚峻絶之行接引人物稱之恒過其實士以此感附之而於負者亦未嘗校曲直他日遇之如初有貴游子旣破産流落淞上數踵其門竟持所購倪雲林畫去左右欲辱之曰吾哀其困使往見一達官以書畫爲介耳非盜也務掩人過如此性不好飮特溺於音樂出必從以歌童舞女爲禮法士所疾一日遊盤龍塘夜抵普門寺宿盜伺其亡盡竊所蓄物黎明家人往白之賦詩不輟直語客曰老鐵在是區區長物又奚恤衆服其噐家隱三呉屢遷其居有曰草玄閣曰藉景軒曰柱頰樓其曰小蓬臺者以紹興之山名蓬萊示不忘鄕里云後止臺上不復下且榜於門曰客至不下樓恕老懶見客不答禮恕老病客問事不對恕老黙發言無所避恕老迂飮酒不輟樂恕老狂所著春秋大意左氏君子議史鉞麗則遺音及志序碑銘贊頌古樂府近體五七言詩鐃歌鼔次曲凡若于卷行于世論曰元繼宋季之後政龎文抏鐵崖務鏟一代之陋上追秦漢雖詞渉夸大自姚虞而下雄健而不窘者一人而巳湖南李祈評其所作曰玉光劍氣自不可掩身屢詘而名益昌良有以夫仕止典市官卒不得大用噫君子之所貴又豈位也哉南宫生傳高啓南宫生呉人愇軀幹博渉書傳少任俠喜擊劍走馬尤善彈指飛鳥下之家素厚藏生用周養賔客及與少年飮慱遊戲盡喪其貲逮壯見天下亂思自樹功業乃謝酒徒去學兵得風后握奇陳法將北走中原從豪傑計事㑹道梗周流無所合遂泝大江遊金陵入金華㑹稽諸山蒐覽瓌怪渡浙江汎具區而歸家居以氣節聞衣冠慕之爭往迎候門止車日數十兩生亦善交無貴賤皆傾身與相接有二軍將恃武橫甚數毆辱士類號虎冠其一嘗召生飮或曰彼酗不可近也生笑曰使酒人惡能勇吾將柔之矣卽命駕往坐上座爲語古賢將事其人竦聽居樽下拜起爲壽至罷㑹無失儀其一嘗遇生客次顧生不下已目慴生而起他日見生獨騎出從健兒帶刀䇿馬踵生後若將肆暴者生故緩轡當中道進不少避知生非懦儒遂引去不敢突冐訶避明旦介客詣生謝請結驩生能以氣服人類如此性抗直多辯好箴切友過有忤巳則靣數之無留怨與人論議蘄必勝然援事析理衆終莫能折時藩府數用師生私䇿其雋蹶多中有言生於府欲致生幕下不能得將中生法生以智免家雖以貧然喜事故在或饋酒肉立召客與飮㗖相樂四方游士至呉者生察其賢必與周旋款曲延譽上下所知有喪疾不能塟療者以告生輙令削牘䟽所乏爲請諸公間營具之終飮其德不言故人皆多生謂似婁君卿原巨先而賢過之乆之稍厭事闔門寡將迎闢一室庋歷代法書周彞漢硯唐雷氏琴日遊其間以自娯素工草隷逼鍾王患求者衆遂自閟希復執筆歆慕靜退時賦詩見志怡然處約若將終身生姓宋名克家南宫里故自號云贊曰生之行凡三變毎變而益善尚俠末矣欲奮於兵固壯然非士所先晚廼刮磨豪習隱然自將履藏噐之節非有德能之乎與夫不自知返違遠道德者異矣天刑生傳蘇伯衡天刑生者名闕天刑生其號也生生而病兎闕因名闕而自號闕翁及年壯更得盲瞶拘攣病生傷目之不明也耳之不聰也手之不能執也足之不能履也曰類若吾矐吾薫吾攭吾􅎂者孰爲之天也天何刑我酷也吾殆有隠慝乎古之刑幾而吾今具四刑悲夫以此更今號曰天刑生云或曰生嘗坐族子徳脩乾沒內庫物簿錄其家就逮南京今天子燭其非辜卒還其家財而縱之帰天子卽天也今天子不忍生罪而謂天且刑生孰信之或曰生大父父仕皆不大顯未嘗竊王柄作威福倚法報復鬻獄而漁色淫刑而黷貨亦未嘗武㫁而兼幷極奢窮欲而暴殄天物生又讀書循理未嘗多行不義事熟視之不得所以致疾狀而生乃有斯疾信隱慝致邪夫天於人也隱慝猶且察之而矐之薫之攦之􅎂之如此則陽為不善者又當何如人之竊主柄以作威福者倚法以報復者鬻獄漁色淫刑黷貨者武㫁而兼倂者極奢窮欲而暴殄天物者多行不義事者可劓可刵可刖可戮者何可勝数不于彼是劓是刵是刖是戮顧乃隂矐生目薫生耳攦生手釱生足不旣失刑乎所謂福善禍淫者非邪或曰天人曷嘗相干生者生死者死吉者吉凶者凶天何與焉而生乃謂天刑之不亦厚誣天也歟哉或曰若生者而信天刑之則亦天之未定耳天定且将以刑生者而刑其可劓可刵可刖可戮者善者可怠而惡者可肆邪生俱弗之答驟然歌衛人之詩曰巳焉哉天實爲之謂之何哉生姓潘氏金華人其先世仕宋中書舍人黙成先生最顯後六世而宋亾又二世乃至生生通經能詩文而詩出語尤絶人生口吃然喜靣臧否人是非得失期期言不巳喜怒一弗顧人以此嚴憚之有隂事惟恐生知之而發之見生輙趨避去之生今杜門不復出遇事猶輙作詩風刺向令生不疾廢詔起文學儒生且首推上生使生得如汪何輩拜御史亦且諤諤如乃祖而生竟以疾廢矣君子皆爲之太息曰不幸不幸云論曰天道無親常與善人若潘生者得不爲善人乎而其疾患至于此則夫善人天何與之之有哉仲尼而不得位顔淵而短命死冉伯牛而有疾子夏而喪明聖賢且如此獨潘生乎人皆謂生之自號爲激察其言乃可謂能自反者莊周云知其無可柰何而安之若命者其潘生之謂與二孝子傳王叔英余在衆中往往聞孝子慈弟義婦事未嘗不爲之感激流涕欲錄傳之以爲世勸而恨不得其詳洪武某年間有兄弟二人以其伯兄坐法當死各自縳爲當刑者哀訴于午門願代兄死上問其故二人者言曰臣少無父非兄無以至今日今兄當刑臣誠不忍見兄死而獨存故願以二身贖兄一身惟陛下聴之上疑其非誠或有教之者因許其代而戒行刑者曰第試其人如有難色則殺之無難色則舍之二人者皆延頸待刃遂止不殺一時見聞者無不嘆息泣下上大嗟異之將赦其兄命未下御史大夫陳寧獨以爲不宜以是得赦卒殺其兄此可謂慈弟也又得婦四人焉其一人夫爲變得罪臨刑戒之曰吾死汝年少貧無以爲守當再嫁耳愼勿嫁軍人農人樵夫庻可相保也語時當深塹上謂夫曰汝尚未知吾志乎遂投于塹而死其一人夫臨刑脫首簪市酒肉啖之曰吾當與子共死也竚視其夫河橋上夫旣死即自投于河又其二人妯娌也其夫兄弟以黨人受戮家人財產盡沒于官婦人則當給爲官婢其妯娌二人相謂曰吾夫巳死吾二人縱無他辱於義猶難獨生况又有他辱乎遂皆自經而死是四婦者可謂義矣余欲各爲之傳以傳於世旣不得其人之姓名與其事之詳以是輙不得發以余一人所聞如此則余之所不聞者可勝道哉余觀前代史傳求其事之卓卓如此者蓋寡豈多有其事將亦如余之不聞其詳而不得録邪抑異時誠少有之而特盛於今邪余固不得而深辨矣然幸而得其詳者烏可使之無傳乎余於同邑得一人焉曰陳圭於同郡得一人焉曰朱煦皆孝子可書也作二孝子傳陳圭字錫玄台州黃巖人也其父叔弘與其鄉人多讐圭常諌之後其讐人以贓告叔弘罪當死圭以狀告於通政司曰圭爲子不能諌其父以䧟於不義得罪死此圭之不孝所致義當死罪於圭之身原圭父使將自新誠不勝至願通政司以聞上大喜曰不意今日乃復有孝子宜赦其死俟天下百官朝覲將播告之爲天下勸頃之刑部尚書開濟奏曰罪有常刑不宜屈法以開僥倖之路請論如法遂聽圭代父死而謫其父叔弘隷兵雲南聞者皆嘆圭之孝而惜其死嗚呼圭之死固圭之志也於圭何憾哉朱煦台州仙居人也家世儒者母楊氏性嚴急遇諸子未嘗借色辭少不如指必笞擊至馴伏乃已煦事之盡恭順之道其伯父二人長季敬次季誠煦皆善事之二伯父俱有令望嘗稱之曰是姪眞猶子也其父季用由薦知福州府洪武十八年詔天下盡革今歲以上有司積歲官吏爲民害者季用視事僅五月爾以例起入京吏一以法論罪作城湏役嚴償重日用錢數十緡季用又病痢被楚謂照曰吾貲力豈足堪此吾旦夕死矣汝勿深憂但收吾骸歸塟耳煦惶懼不敢離左右復戒二弟熊正共守不敢少寐季用由是不得死時役告枉者甚衆令益嚴告而謫隷兵雲南者二人𬒳極刑者四人矣煦不顧死而隂與父僚友同役者謀曰吾無術以脫吾父矣訴不訴皆死萬一吾父由訴獲免雖戮死萬萬無憾遂陳其辭于通政司通政司為陳於上上觀其情遂赦季用而復其官同時以煦告得免復官者一十四人皆拜煦父謝曰㣲君有孝子吾儕骨肉爲城下土矣已而煦感疾死其十四人者哀臨猶巳子季用傷煦死病益甚亦死或者以煦冐死得免爲幸而又以其父子終俱死爲命嗚呼爲煦者知盡子職而已其他曷足計哉羅先生傳楊士奇羅先生名性字子理以字行羅故㤗和儒家宋有爲盧溝主簿曰伯夀嘗刲股和藥起親疾縣表其所居坊曰旌孝者先生㑹伯祖也曾祖伯霖祖見可父榖禎先生少孤貧自奮於學初受易於鄉先生韋乾乾繼豋康山長宗武之門苦志畢力博記精思夙夜不懈旣冠遭元季兵亂走避巖谷崎嶇困窮未嘗廢書卷性耿介一言一行必端不與俗人接雖至戚或渉邪行輙絶之然口未嘗言海桑先生陳心吾嘗稱先生及楊子淵有氷玉之操洪武初詔郡縣立學御史劉昭先知縣采譽望聘先生及子淵鄧彥高三人爲之師時號楊羅鄧四年中鄉貢進士明年赴春官奉勑免㑹試授德安府同知先是有㓂號糟李萬戸者以衆入府治刼殺郡守以下掠庫藏官捕其衆悉就戮獨糟李逸去乆不獲詔捕益急踪跡所過宿逮繫數百人諸邑騷然先生初下車民有負一囊詣府言糟李實死矣此其遺骸也問死幾何時矣曰一歲曰始死時曷爲不言又驗其鬚髪皆在而皓然白也曰糟李年未四十此安得是邪笞而逐之悉出所繫數百人諭之曰朝廷但欲得糟李耳糟李旦出卽汝輩暮皆寧家何爲不自愛體膚乃甘受楚毒而庇一賊邪能從吾言今與汝等期十日獲賊卽汝皆良民衆叩頭曰府公欲生我敢不盡死力乃悉縱之七日生縛糟李至庭下民皆以獲賊勞而遣之命下賦民鐵造軍噐時兵亂初定商旅未通郡民猝無所辦先生居第後治𬞞圃得窖鐵萬餘斤民爭趨求售同官亦勸以售民先生曰固天以濟民豈爲我也悉以代民充賦有餘皆人官庫銖兩不私焉其氷蘖之操愈厲而䘏民之心寢食不忘爲政以寛恕爲本惟贓吏無所假應城縣吏劉仁盜官麥事覺府建治之仁懼迯匿會按察僉事朱逢吉過德安仁出誣告先生他事將就鞫湖廣叅政陶凱呉雲按察副使劉某聞之馳召逢吉還謂曰君不知德安有羅同知邪廿七府之賢守裁三人其可以枉忠賢哉嶽州馬知府沔陽彭知府及先生三人也逢吉卒白其誣而正仁盗麥之罪在郡四年闕知府皆先生總之秩滿詣京師坐擅用棗木染軍衣爲陳寧所劾謫戍西安行槖無數百錢怡然就役不以得失置意旣至西安之達官貴人皆敬禮之而安於處賤未嘗一毫干人郡諸生從之受經後多舉進士去是時四方老師碩儒在西安者數十人呉中鄒弈獨曰合吾輩所讀書庻幾羅先生之半蓋先生學甚博爲文章切深詩古體宗漢魏近體宗盛唐書法鍾元常年及七十卒士奇少孤五歲先生取而敎育之有父道焉明年官德安又挈以行又三年先生有陜西之役屢遣書督其學文廿年而捐舘當是時所以誨不肖者雖不能盡記而爲道之大要不敢忘也恒竊私念先生所以修諸躬施諸人者皆當追配古人而今之人知之者寡矣謹述其槩爲傳手錄一通以寄其子賔畿蓋又欲其子若孫皆圖不辱云周是脩傳周是脩諱德以字行周吉之㤗和爵譽里名家其先諱矩者嘗顯於南唐至宋累累有科第其支裔徙灉江里是脩之所自出也是脩少孤貧自奮於學從游鄕先生胡渚樵渚樵以孫妻之又從國子學錄蕭執先生明詩經初舉霍丘縣學訓導入見太祖高皇帝擢爲周府奉祠正高皇帝上賔之明年有告言王過失事王府官屬皆下吏是脩以嘗諫得免改衡府紀善預修纂翰林數陳論國家大計及指斥用事者誤國用事者怒衆共挫折之是脩屹不爲動太宗文皇帝靖難之師旣渡江駐金川門宫中悉自焚明日是脩留書其家别其友江仲隆解大紳胡光大蕭用道楊士奇且付後事暮入應天府學自經六月十五日也又明日臣民推戴文皇帝繼大統數月御史言是脩不順天命請加追戮上曰彼食其祿自盡其心一無所問是脩內貞外和有孝友忠信之行非其義不茍取襟懐坦明灑落而沖澹悠然其學自經史百氏下至隂陽醫卜之說靡所不通爲文章未嘗締思援筆立就而雍容雅贍詞理條達稍暇著述吟咏不虚寸晷所著有詩小序詩集義詩譜論語類編廣衍太極圗觀感錄綱常懿範邇言家訓蒭蕘集進思集是脩汲汲導誘人善人有過失恒爲之隱以是無少長賤貴皆樂親之明於人所廌士如梁用之劉叔毖皆知名當世是脩之學雖間未純然於明綱常爲世道計必身履之而不徒託之空言豈非卓然特立者歟是脩卒年四十有九時觧胡蕭梁皆見諸文字然屬倉卒不及詳今二十有八年矣知是脩者獨余在毎追念君子清白之節文皇帝日月之明旣照其心豈當遂致泯沒故述爲小傳以授其子轅使傳焉皇明文衡卷之六十
