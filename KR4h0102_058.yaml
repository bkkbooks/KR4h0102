front:
  text: 皇明文衡卷之五十八
  hash: sha256:42f0e583ac39b7a8681b9f866fbb111c62c8cf86f53cef913acc47e04b33e1c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_058-1a}
body:
  text: 傳汪同傳趙汸汪同字仲王始名武同避叔父諱也其父德潤以子不育故禱于雷壇是夕夢神降雷作覺而同生身長瘦黑其先世多業儒同獨不肯事筆墨􅏳踉不檢束母夫人葉氏怒其不成器輒自矜曰同兒成器乃與人異與群牧戲為分隊立長教以坐作進退法曰吾為將帥則於某處立營於某處置旗鼓群牧悉聽命見者異之十五渡淮北行買馬交遊諸軍校習騎射所有資貨盡喪不能歸過廬江縣鷺鷥橋問沽遇貧道者與飮道者曰吾能推命汝勿憂十年後當以武功顯冠幞頭騎善馬名傳天下官二品愼保令終語訖出門即不見及歸所假稱貸不能償父怒同曰兄為償之吾力耕以養父母不纍于兄兄睿儒者也信其言且曰勿詒父母憂償盈其數計錢二千四百二十緡終亦不事耕耨至正壬辰兵起蘄黃號紅巾破江饒閠三月二十一日陷婺源知州張士謙力禦不克𬒳擒死江州鄉里遭焚掠逃竄無所乃推同為首依山谷保聚捍禦之同分署部衆後乘五嶺前倚溪谷寇不敢犯兄睿走官軍所陳䇿以決進取平章三旦八喜曰得子兄弟無憂矣癸巳三月三旦八統軍自嚴復徽以元帥韓邦彥鎮撫哈迷軍復湖州廣德以會于徽三月同率衆破賊柵殲渠首開五嶺道路獻馘轅門於是鐵古鐵兒軍由回嶺進元帥劉脫因軍由亭子嶺進同先領兵直趍州城四月一日復婺源州捷聞平章遣使賫白金盂色假新楮二萬劵賞之署義兵千戶率義兵協輔官軍由浮梁界田迎合邦彥哈迷軍馬復饒郡四月十六日率先官兵由澆嶺迎會浮梁二十二日寇兵大至邦彥分隊逐敵大破之積尸滿野三戰乘勝前趍五月一日復饒州捷聞平章遣使賫勞同為餘干州同知睿為浮梁州同知睿即辭歸邦彥苦留之對曰睿本田家不間軍旅遭寇荼毒忠憤激切以至此仰叨戰勝之威饒既平定則婺源山中可以少安上養親下教子其素心也功名非所望弟同為國吾當為家耳秋寇再至時歲旱飢甚故饒之民競趍焉同從邦彥軍七月至十二月大小八十餘戰每先鋒破敵往往運鐵簡冒矢石出入賊中或出其後衆皆披靡無能當者由是同之勇鋭善戰無不稱服左丞老老至饒首嘉勞之三旦八曰同戰功多亦數危殆宜稍優之甲午正月委鎮圓溝八澗橋時飢饉之餘盜出沒掠人以食八澗橋驛道百餘里無人煙使人行商不敢過同設法招諭擇害人者殪其一二以警由是驛道無虞七月調守浮梁賊至輒敗去先是萬戶田汪保移鎮西營賊無所忌不意同至戰敗自相謂曰不料汪老子又來此同夜率壯士突賊營火之汪保憤巳無功乃曰吾守西營同知自往守景德鎮汪保居西營未逾月賊破西營擒之即據浮梁州同往復之請官鎮禦且辭病歸使者踵至同曰吾隨軍守饒身經百戰不敢僥朝廷官爵但士卒飢疲多亡潰吾亦病弗能堪矣時福童元帥鎮徽知同還家舉為府判乙未三月到部四月往鎮祁門元帥馬國實信左右謗語同謝病還休寧七月宣州陷江東憲使周伯琦得脫賊庭來駐徽禮請同會元帥楊英軍復宣進遇苗軍師楊完者欲拉同往杭同不行以病還婺源饒自平章三旦八去後朝廷以脫脫阿魯灰並為元帥分統三旦八軍遇賊勦捕參政恩寧普軍鎮州城鎮撫哈迷素以戰功不受約束由是軍不統一賊得乘隙而進官軍潰恩寧普軍還駐婺源以東帛玄纁起同知婺源州事賊巳至境內諸軍無鬪志十二月同與賊戰于橫槎嚴坑還謂諸帥曰軍士宜並力為國除賊婺源不守又退往何地人無應者明日賊至城西同方給諸軍糧未甲即上馬出北門溪塝遇賊與鬪道狹劒戟弓矢皆莫能施賊乘高下矢石同稍却馬失足墜荷池同躍出拔劔鬪且卻賊還視不敢逼十二月之二十五日也因步追及恩寧普軍于開化之蒻溪身𬒳數創恩寧普躬傅善藥列脫因解衣衣之卑所乘馬揚於衆曰汪知州膽勇才略諸將孰能及之同駐開化之馬金募兵守險厄休寧俞嵋集民兵據嶺南溪西之險以抗賊兵不能勝以其從兄士英嶽卿來告急同曰我軍士未集乏器械不可往中英強之曰嵋於公為懿親以公故據險抗賊以待公一往兵氣自倍不往則鄉里之人旦夕􅐽粉矣同不得已出白霽嶺應之丙申正月十三日也軍士糧乏嵋請進兵同曰賊𥘉至必衆我軍士未集芻糧器械皆無進不成功徒禍鄉里此行不過為聲援耳十王日同退駐馬金賊衆大至嵋走士英逃匿賊追獲殺之其子茂逃從同為先鋒長參政恩寧普以休寧縣尹起睿招諭休寧婺源人人響應於是兵益集四月同分部署嚴隊伍令汪德賢汪圭為左右翼器械稍備吳觀國吳止善葉宗茂汪周來從者衆而觀國宗茂即為播弄握權之機矣睿心惡其姦貪邪媚不與同事四月十七日兵渡馬金嶺至羊棧巖賊來戰敗之至鳳林又敗之高梘渡又敗之二十三日復休寧五月二日復徽州會深度官兵進駐徽城升府治中實授承直郎徽州路府判五日領兵復黟縣六日復祁門同每先鋒破賊軍士乘鋭氣所向無前矣牒萬戶朱文選守祁門還軍休寧道見有父子代牛耕者下馬撫問以牛與之遠近感悅睿方奉二親開化恩寧普遣使要睿至委集餘兵督守諸險厄以為同聲援其父謂睿曰婺源乃祖宗墳墓所在汝留意况汝弟左右持忠心者甚少睿於是招諭婺源遺同書刻日會兵中平五月十九日同軍渡五嶺二十日復婺源會合元帥朵粘等軍駐守二十五日還駐軍休寧升浙東道僉都元帥睿駐中平結集民兵以衛鄉里六月二十一日賊復來婺源守兵潰二十六日睿領兵與賊遇輒勝進復婺源升攝婺源知州分兵設䇿守饒境賊不敢過會元帥朵粘帖木兒萬戶王敬田松山軍來婺源不肯駐州治於河西寅坑口樹柵自固縱軍四出殺掠不巳八月睿見諸軍不進自領兵破汪可梅田寨九月同領軍二萬餘衆破西坑充田鳳遊山諸賊寨直抵浮梁州連與賊戰皆捷將乘勝往復饒城因朵粘二帥忌其成功要絶餉饋乃還軍欲與戰睿力止而和解之遂還休寧元帥劉政來鎮徽貪暴為甚同征浮梁吳觀國以帥府都事權府不以禮交玖又徇私專殺以造釁端人以忠言告者皆為觀國所抑遏睿嘗言趙汸學高識遠可為師表事宜咨而後行汪幼鳳正直可為輔至是汸極以書言繼又靣論其故並幼鳳皆為觀國所短毁不聽用玖先以小恚收其梟將汪圭曹馬汪德賢殺之將以計取同同手殺其騎兵五人奪其馬擒其一人而語之曰縱汝還語劉元帥我與元帥俱為國家除強暴豈料肆貪暴之欲少不遂意即以計殺害忠良如必欲戰請元帥約日親陳吾不敢避勿為此盜賊見識玖知同不陷其計曰吾不可留也還軍駐嚴趙小九元帥以私憤與玖戰玖敗走衢宋監司殺之十二月使者至升同為朝列大夫郡府治中兼浙東同知副都元帥郡帥八爾思請同俱守徽同至郡即議修城壘且曰近有強敵退無所歸宜完城為固守計有司皆憚其煩勞八爾思懦而無斷同曰決在元帥元帥世守此郡同亦生長此土不宜再為嚴陵客也八爾思應曰汪元帥且飮酒明日議之同曰國家大計豈可以酒廢議元帥如不欲修城則元帥精兵皆在祁門宜令還駐郡同以所鎮休寧兵進守祁門庶亦兩便八爾思曰甚善同還休寧八爾思又聽左右言以祁門軍不可移而止同曰是豈可與同事丁酉三月鎮南王專使致書嘉勞江浙省平章慶同三旦八書問不絶五月丞相逹識帖木兒以天子所賚酒賜同七月鄧院判由宣來取徽逾三日同日夜往攻之有備弗克而元帥帖木兒朵粘由婺源攻其後睿方以毋憂家居吳觀國濳逃遂安李克魯本以進士為帥府都事與同甚相得時留鄧軍中以書告曰元帥前後受敵計將安出幸至中途論心不必疑也同先以宗茂余善往克魯果於黃墩候之曰吾謂汪公必至乃疑我邪須靣可言耳宗茂還言克曾候于黃墩元帥勿惜一行也至黃墩從者曰前途具膳候元帥數步即是過黃墩則壯士百數騎突出克魯曰主將請元帥相見同抽以欲自刺克魯走抱止之曰天下豪傑自有人元帥平日以意氣相許與親見然後知之即馳馬偕至郡鄧院判請往金陵遂見相國俾平婺源寅坑口營柵還居郡城戊戌從鄧取嚴還送妻孥往金陵居而巳以院判鎮婺源築城治兵始戊戌十二月歲巳亥冬告完為四門門各重簷復屋城上環樹楊柳官舍倉廩一新於是饒之德興浮梁皆來附儒賢並歸軍集食足分兵教戰名譽甚隆初吳觀國逃遂安依長鎗邢同僉邢自歸于婺州觀國叛邢以歸緣同族父周以請同欣然招之睿聞與同書曰觀國當危難則逃事有緒則來豈可再令隳成業乎同得書笑曰寧人負我觀國再至日言事艱厥成又福建以省參政致同江浙以樞密同僉徠同庚子六月同領軍征饒駐太陽渡竟單騎潛往浙丞相逹識帖木兒奏為樞密同僉且曰虛此以待君有日矣張大尉又以禮召至姑蘇同見張心不純濳迫致丞相逹識帖木兒諸大臣於死乃往淮安與史左丞見氣義殊洽與議中原事曰李察罕公忠足任往一見之可也乃行見李公曰明公以身任天下之重宜廣攬英傑為天子掃淸寰宇建萬世不拔之基李公曰善相見恨晚曰吾中原事定平江南當自姑蘇始君遠來必朝見主上竭所欲言還則與君定約同朝京拜資善大夫淮南等處行中書省左丞御筆褒寵曰江南忠義之士還江南見李公公曰張士誠非忠於國家者旦夕當聲罪致討君與史君宜協力焉同曰諾還淮安史適與張有隙亦委心於李未幾而李為賊降將田豐所害史曰不幸及此志不獲施宜要金陵兵往取姑蘇則不暇我謀可待中原事定尋為之計乃遣使授書往金陵使本姑蘇人至中途嘆曰吾寧往姑蘇為保妻子計張得其所通金陵書大怒出兵高郵張四平章與史素相得招與言事同曰往不可測也史曰將卒家留姑蘇必有所顧一也中原事如此後援未可恃二也金陵兵未即向太湖三也我輩姑待時可也未必便害我輩况四平章我昔嘗救解其危急宜不至此八月二十五日往會于高郵二十八日登舟九月二日達姑蘇士誠即拘同問曰我待汝極厚何負於汝而反我邪同曰我之來以汝為元太尉忠於國家今汝既叛我豈得從汝反邪四平章力營救之且具酒饌為别同曰為語平章甚荷厚意吾能死忠不為無義生也但我死後諸公亦不能久於富貴耳十二日遇害臨刑顔色不少變方去高郵而朝廷以為榮祿大夫淮南省平章命下而同死矣傷哉其子澄隨毋留金陵歲癸卯八月朱先生升為取之還鄉里論曰昔關羽為曹操刺殺顏良於萬衆中以報德而卒往從昭烈者義氣之所存也昭烈為漢室之胄雄才大略足以有為羽之不違昭烈義也卒死於戰謀不勝勇故也同出保卿井立勳於國義聲昭著心之終始不變其初其勇而義與羽蓋類焉天理民彞不可泯於人心固如此視苟乎冨貴者為何如哉洛下遺民傳徐一夔余遊虎林蓋嘗登於伍大夫之山而望焉見夫山川回合城郭宏固邑屋鱗次嘆曰由宋涉元休養生息其盛極矣自罹兵燹于兹二紀其殷庶之積視他郡縣猶盛夫豈無瓌偉不群之士雜處里閭而不自衒者安得見之以寫我憂下至山址見有一士長七尺餘戴古冠巾穿白練𫀆色如雪束黃絲絙齊曵地目瞳子炯然風約踈髯灑灑可數行通衢中高視闊步世俗莫能溷余甚異之而未敢即也從其所之前遇高丘輒躡屨而上仰而若吁俯而若思歌曰陟彼高丘兮靣彼圻矣維谷則崇兮陵則夷矣代有禪續兮罔測其微矣彼淪以胥兮而我則遺矣西山之人兮吾將從之歸矣莫測其所以余揖而問之曰先生為誰瞪目熟視余久之徐曰我洛下遺民也安用問我為余不敢詰謹識之他日見汝南生以問焉生曰此吾故人程彥澤君也君蓋河南先生純公之後其大父嘗為言官至元大德之間以直道著君少有氣節高自稱許欲樹立奇勳名恆自誦曰夫人具性命道德之藴通天地萬物之情逹禮樂刑政之用充而大之使民與物不失其所是乃天職不然是自棄爾夫欲有為要必為天子輔相乃可此外不足盡力復自嘆曰嘻有命焉自古有志之士其不能致者蓋亦多矣縱能致之不如伊尹之於湯傳説之於高宗諸葛孔明之於蜀先主亦具臣爾然又自度上不繫於天下不繫於人而能有功德及人獨惟醫爾然我亦不喜為世俗醫僥幸射利必為神醫其立志如此其後遊於五湖有葛先生者以醫鳴其術甚神先生巳人疾死可立起五湖間人稱為神醫君聞而喜曰是真吾師也乃營紹介為先容先生不許曰吾術不以與庸夫君弗為沮一日躬執贄幣詣先生門下求見以刺通先生素傲睨不即出見稍攬衣起從戶隙窺君見君神采熚然曰非庸夫也是能昌吾道者遂出見盡以其術授君故君為醫大類葛先生會天下大亂君擇地避曰虎林地大人衆易以浮沒故來居焉方是時專制方靣者多自官人有薦君者輒避去曰我何可汚我何可汚未幾今天子革元命向之有官者不問仕輟悉就遣而君夷然如常時方自詫曰吾故民也吾故民也因本其所自出稱洛下遺民云汝南生陳君翰也嗚呼世有斯人哉吾恆記幼時讀詩見詩人敘述武王克商時事其稱有曰殷士膚敏祼將于京第曰帝王革命大率然爾不知其為悲也及夫運去物改親見其事始三復而悲之曰嗟乎士固有如此者今程彥澤氏當亂世在衆人中而不同於衆人卒能自全其道哆然以遺民稱若欲自附於古之賢人者不其偉歟孔子曰斯民也三代之所以直道而行也誰毁誰譽今去孔子雖遠若遺民者亦其人也吾何言哉吾何言哉皇明文衡卷之五十八
