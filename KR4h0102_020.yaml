front:
  text: 皇明文衡卷之二十
  hash: sha256:8b525b7cbcaaa9d38fa075b403b1f01ada3429a28c39bf370fb7c2ecd70666cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_020-1a}
body:
  text: 頌節婦黃氏旌門頌并序蘇伯衡姑蘇吳縣之閶門里有旌門焉朝廷所以寵褒姚節婦者也節婦姓黃氏名妙清歸姚氏為諱榮之妻生男女各一人而榮以病卒榮卒時節婦年二十有九子文聰才二歲貧甚力紡績以俯育或勸其更嫁節婦曰夫死不嫁婦人之常况有子可從何為而更嫁此足一移我則匪人不聽後十二年張士誠入據姑蘇亂兵掠文聰以去數從人問消息比二年不聞問或曰異日者有子可無更嫁也今子俘矣無論死藉令生歸亦不可望不嫁將焉恃乎節婦曰我豈以子存子亡為去留者哉終不聽又四年文聰始脫身來歸節婦驚喜且泣曰姚氏有後矣我死亦無憾後八年里耆列其狀上于縣若府監察御史為察實以聞制下旌其門為節婦之門則洪武七年春三月也今節婦婺矛牙居且三十四年年巳六十有三文聰愳無以侈上賜而昭示罔極聞伯衡嘗簉屬太史氏介朱恪即金華山中求書其事勒諸樂石伯衡惟唐虞三代之世其教既明其化既成其民俗之美至於比屋可封當是之時旌其門間表厥宅里猶不敢緩然則所謂樹之風聲使民益勸於善雖唐虞三代之聖人猶不能不以之為務也况當世降俗漓之後有天下者不善其善以為勸奚可哉皇帝受天景命君臨萬邦凡有係於風化者輒加表異蓋以此也而姚滎妻黃以貞節著聞蒙被寵褒如此是猶唐虞三代之民加唐虞三代之令典矣遠近聞之其誰不感莫而興起此所謂賞一而勸百者也不其休哉不其休哉夫推明聖意而播諸聲詩者史氏之職也因不辭而為之頌頌曰天眷聖神民君民師匪曰治民亦欲迪之聖神奉天式和民則隂握化權作新萬國褒嘉節義錫以旌書風行而表孰不奔趨非有館轄自率規矩曰維既張五倫攸敘吳縣有婦姚妻氏黃年二十九良人遽亡儲無儋石室若懸罄毋子煢煢相依為命霜風凄其落月照帷間關機杼影與形隨人或憐之勸之他適胡乃茹荼有薺如蜜慷慨自誓辭與涕俱可以人焉而犬彘如我不即死我志靡他我下從夫我子何如子未成童掠於亂兵倚閭而望寒暑再更僉曰巳矣安知非死無子焉恃不嫁奚俟婦曰咈哉何言之卑我志可易太山可墮我志不易仰天一憅血淚雨集時既寧謐子亦生還雖無甘旨志養攸全郡守御史交謂宜褒乃具封章乃請于朝乃𬒳綸音旌其閭里苦節之報庶其在是昔視其門門則以席今過其門門有綽楔楔楔巍巍龍光有耀匪爾之私俾世視效嗟臣事君猶婦從夫凡百在位曷鑒曷圖婦道不虧尚稱聖意臣節殫竭有不寵異刻辭堅珉以昭鴻恩以揚清芬以詔後昆平雲南頌王景聖天子之御大歷服也維清緝熙載敡武功蕩攘群雄混一偃函宇於是偃武修文與民休息垂十餘年皇帝若曰元綱解紐土宇瓜分朕奮起淮甸鏖戰番昜江漢以清捲甲長驅遂定中夏元君北跳秦晉吳蜀所向風靡不十年而成大業雖天命有歸皆師武臣之略也維雲南一隅獨沮聲教卿謂何如僉曰雲南塹山墉壑狼子野心聚螫挺獸况把匝刺瓦爾密為元臣子罔知天命宜其無嚮化心若以天兵臨之彼惡能敵帝曰俞哉乃命頴川侯臣傳某西平侯臣沐某永昌侯臣藍某將鷹揚虎校之士三十餘萬聲罪致討樓船蔽江旌旗亘天星流電邁分道並進大軍繇貴廣軼普定下牂柯深踐不毛奇軍繇羅佐關擊鳥撒攻可渡河大會于曲靖疾若風雨所向克捷元兵蜂屯蟻聚毋敢抗我師者先是下令曰若至曲靖便可輕騎長驅未至十里許大霿霧元司徒答理麻匱烏白江為陳未成列我師泗水以濟徑前奮擊其陳遂亂逹理麻陷于淖生擒之殺將士若干人元兵大奔遂分兵逆可渡河望風席捲梁王把匝刺瓦爾密棄城遁至晉寧率妻子死之雲南平自出師至是凡百餘日得府州若干戶若干馬牛軍實無算三帥承制建官大軍鎮焉遂下大理拔金齒凡雲南故壤皆郡縣矣明年遣使降車里降緬降八百咸以壤奠貢洪惟天兵不浹十辰拓地萬里西南諸夷悉臣悉妾何成功之速哉蓋天子文武神聖徯來望切而有三帥善長駕逺馭也上自漢唐以迄于元羈縻而巳乃今與內地等功髙千古信乎王者之無外也又明年班師振旅獻俘授馘定功行賞封傳某為頴國公諸將以下進爵有差於乎古之有盛德大到必形諸歌頌皇風興大雅作草茅微臣不敢多讓謹稽首頓首而為頌曰皇明御天統有萬方際天蟠穹武功煌煌三光耀靈海宇聿清叶氣嘉生蒸為太平蠢兹蠻方稔藏姦凶惟恇穰穰以褻天常乾坤之量海嶽是包彼昏而狂誕敢呌呶皇赫斯怒爰整元戎吉日載戒車攻馬同於鑠王師赫赫桓桓天討是將震懾百蠻兵無留行勢若震霆日星晦霿江海沸騰鷹揚曲靖俘彼統酋征麾所指載揚天休戰不貪殺殺不却降斥原疏斾以迄用康大憝聿逋筐玄篚黃拓禹之迹維周職方表方建官棋布星分仡仡大城以奠其民封豕修蛇以變以化昔也猰㺄今為騶虞載馹載伐戈鋋不腥南金象齒罔敢弗庭凡此南功三帥僉同維一乃心上毗帝聰大烈之龎超漢軼唐風雲胥慶天地開張會朝清明聖化基之萬國一統坐而釐之草茅微臣作此頌焉武功告成四夷咸賔詩有序解縉皇帝臨大寶之明年紀元永樂嘉與萬方共躋仁夀一德感孚休祥昭應民安物阜四夷畢來東若朝鮮日本暹羅東南若琉球中山南北有安南古城西南海東洋瓜哇鬼方𬗟國木邦孟定麓川威遠八百老撾里車西若烏思尼八刺西北畏吾胸奴哈迷遠者數萬朝聞夕引奉貢儀物皆至京師其文辭稱述盛德對揚鴻休誠服心恱發見于外殊音重譯異服奇詭歡欣攸同嚮慕無已庶衆聚觀天下忭喜咸相謂聖神光𬒳如日月之照臨天行雨施妙運莫測垂裳拱手於穆清而有生之類盛利見于四方萬里之遠鼓舞輻輳而歸之來享來王而不能巳吾民何幸而臻兹嘉會實萬世一時也朝之群臣亦咸相謂虞舜有三苗之征周公有戎狄之膺宣王逐玁狁而秦漢及隋疲弊中國力夫之爭無時或寧唐宋否極上天厭罪命我太祖聖神文武欽明啓運俊德成功統天大孝高皇帝起而定之不令而從不言而化八表同風四十餘年皇帝以聖繼聖比隆唐虞殊方歸命者接迹而至宜有詩歌垂之頌聲軼逺古而過之又咸謂臣縉宜為義不可辭則合群臣百姓之言從容奏寫皇帝曰咨周家九夷通道大保進旅獒之訓虞廷干羽既舞伯益有警戒之針故愚者常以小康肆志賢者不以外物動心朕方兢業於𥘉服是何足云頌聲其為作君臣相飭之歌以繼虞周之治臣縉竊謂自古頌美而寓規諫皆臣子攄誠委曲之小心臣愚不及此乃自皇上發之是誠萬世一時也謹拜手稽首而獻詩曰皇帝明德與天同運華夏奠安四夷效順限山阻海風氣不通不招不約奔走來同梯陟踆阪航涉濤龍沍寒溽暑赤雪玄霜殊形奇醜異服紛龎總髮焦赤睒𥅆深黃猩唇假喙黎靣文身袒跣椎結皮裳卉巾離披落索搖曵縈纒鞮鞻殊音侏離禽言咿嗢重譯舍館授粲窮物式陳兼金玉瓉齒革羽毛服食器用皇帝儉勤異物非重厚往薄來懷柔無外八表同仁膺兹嘉會以心感人人心自歸其來無喜矧往或追陋彼漢唐好大喜功本之不競而末是從苟得其人不為富強苟得其地不足廣疆耳目細玩惟彼所産耽玩惑心悔之已晚皇帝明德謹之於細愼始惟終圖難於易照乘之珠衆庶所嘉詎若得賢照千萬里四夷畢來衆庶榮之曷若中夏一民無飢明良責難安不忘危小臣作戒賢聖是師御書嘉禾詩頌有序洪武二十有八年秋九月壬辰朔庚戌北平永清衛之龍門禾有異莖同穗之祥其三幹合為一仍三穗者二二幹合為一仍二穗者六是歲大熟今上皇帝遣使來進群臣上表賀太祖聖神文武欽明啓運俊德成功統天大孝髙皇帝親御翰墨為詩一章以賜今上皇帝其詩首言創業之艱天命之不易除暴禁亂之師撫民致治之略中言天錫豐登之屢史書垂示之嚴明堂禋薦之重末示謙沖戒謹之意為善不足之誠大矜下民之惠與民同樂之盛心溢於言表蓋不以嘉禾之祥為可矜而以為可懼而思以自勉聖不自聖兢兢業業足以垂訓於千萬年今上皇帝服膺聖訓念手澤之存諷誦追惟不能自巳乃永樂三年九月朔旦用摹勒于石拓本裝治成軸分賜諸王及近臣於是臣縉亦得與賜焉又適有嘉禾之瑞臣縉仰惟日月之光華昭著于天地其溢而上者為慶雲為景星為霞五色其下者為璿珠為美玉為丹砂使人歆慕而寶愛者皆日月之餘光也古先聖帝明王有日月光華之德其禮樂文章流風遺韻之傳若詩書所刻百世之下光景常新猶足以使人歆慕與景星慶雲諸福之物同一快覩而况身被其澤目覩其盛鼓舞涵濡其有不發而為華封之祝康衢之謡以自鳴其慶幸之萬一乎實人情之所不能自巳也拜手稽首而獻頌曰洪武乙亥秋榖登朔方龍門嘉禾生三穗二穗交兩騰異本同類同敷榮蕊珠金粟隔露凝親藩錫貢來神京玉匣上有黃雲蒸衮衣當日御彤廷百辟欣嘉陳休徴四野歡呼傳頌聲帝曰俞哉稽之經旅命歸禾凜不矜作詩致戒尤丁寧昌言受命畏天明降福穰穰恐弗勝庸錫親藩鍾聖情亦知玄德由茲弘十年事驗天威靈聖孝通天推至誠永樂重華信有禎賜詩日閲心屏營手澤猶存訓服膺每御翰墨懷墻羮想當􅌖思玉几憑智周八極通杳冥重念稼穡憂農耕暑寒怨咨憐獨煢秪願年登百榖成群臣環列忭且驚百神降監來軒盈雲霞的皪飛陶泓鴻章聖藻驅風霆造化萬彚皆流形工巧人為何足稱奎章爛爛不可名但見東壁餘光精刻以端溪紫玉英摹本裝以龍鸞紋頒錫群臣荷寵榮天球大訓河圖并人文至寶奠八紘夜夜虹光燭太淸聖子神孫萬億齡萬世黎民歌太平視學詩有序胡廣皇帝即位之初載夙夜延訪群臣博詢治道從容燕暇召日三儒臣于前而諭之曰使天下人人崇尚儒術其道何由咸頓首惶懼不敢言明日又問訖無敢以對上曰必使天下人人崇尚儒術其機在上於是咸稽首曰誠如陛下所言至是求賢之詔屢下凡巖穴幽潛之士占一技能者即禮聘至闕下親承顧問命之以職而優待之故四海之內罔有遺才焉明年䇿易士于廷簡其尤者二十八人俾究極群書期其至于古人一切政事不以干之恆祿之外復有他賜鼓舞作興之道至矣天下之士聞風而歆慕者皆奮躍於下有菁莪棫朴之盛乃永樂四年二月朔勑群臣曰孔子萬世帝王之師其道之在天下載於六經天下不可一日無生民生民不可一日無孔子之道朕將臨國學躬禮孔子以稱尊崇之典所司其差吉日行之於是有司差以三月朔日辛卯是日昧爽上備法駕謁廟行舍菜禮先是命禮官考謁廟儀禮官奏宋服靴𫀆行再拜上曰見先師禮寧過厚至是上服皮辨行四拜禮禮畢駕幸大學授經祭酒臣儼司業臣智賜之坐講文武三品以上及翰林儒臣皆賜坐聽講講畢賜茗飲降玉音難問勉飭衣冠之士反四夷之人圜大學而觀者以億萬計視東京永平無足言矣明日臣儼臣智率六堂儒生上表謝錫賚有差大宴羣臣于奉天門莫不歡欣踴躍以為自古帝王崇尚儒術未有若此之盛臣仰見太祖髙皇帝告成武功大興文教臨幸太學親講經書與諸儒難疑答問終日弗倦今伏遇皇上尊信儒術躬率舊典有光前烈揆諸古昔誠無與比故盛治之風薄極海宇凡四方僻遠非一譯所能通者遣一介之士持咫尺之書以諭之莫不奔走順服頓顙闕庭夫豈威力所能強是皆文教躬行之效也臣維孔子之道與天地相為終始其在於人心者昭晣不泯當聖人在上天下文明則其道大行皇上金聖智之德居至尊之位恢弘治教表章孔子之道如日麗天中四海之民皆仰見之俾知所趨向皇上作興人心推明世教誠有以度越千古非近代帝王所能及也臣廣猥以菲才幸依日月之光獲覩文明之盛職在紀載不敢以默謹述為古詩一章以獻以播盛美於無窮焉詩曰維古聖神繼天立極爰修教化以彰明德曰堯舜禹所傳一心無間顯微爰有古今學校之政教化先務三綱以正九疇攸敘周綱解紐正路日堙不有至聖孰宣人文大哉孔子道髙德厚出類拔萃生民未有祖述憲章乃欲無言賢於堯舜事功則然教化無窮如天垂象六經昭晣萬世尊仰至治之要一本於茲生民永賴帝王實師於皇太祖受天明命道侔天地卓冠前聖武功爰定文教首崇表彰絶學大闡休風載新庠序甄陶士類親臨璧雍以嚴祀事躬御講筵觀者如雲衣冠萬國集于橋門猗歟盛哉亘古莫比為憲萬世式承無巳皇帝纘承舊章是遵緝熙聖學弗懈益勤季春初吉躬視廟學舍奠先師秉虔有恪衮服大圭星辨煌煌穆穆淸廟濟濟祼將載臨講席列侍群儒紬繹問難六經群書聖道顯明皇心以喜章甫逢掖蹌舞士子圜瞻萬億華夏蠻貊左祍雕題亦皆夷懌治有先後教有本源仁義之訓彌久彌敦於昭聖皇遹駿有赫洪化維神無思不服平安南詩楊士奇臣聞天以風雨霜露育成萬物聖人以禮樂征伐綏輯天下一出於至仁周之文武皆一怒以安其民故雖聖人不志用兵亦不去兵以為治洪惟我國家肇興太祖聖神文武欽明啓運俊德成功統天大孝高皇帝深仁大義順天應人平靖四方以教以育罔有孽害時謂泰和至于皇上益廣仁義禮樂之化海內奠安四夷嚮慕小大遐邇熙然同春惟是安南其王孱微其賊臣黎季犛暨其子蒼沿襲悖凶屢弒國主淫刑暴斂毒虐下人滋久滋甚皇上閔焉弗寧發詔使諭使遷悔賊罔忌畏數侵掠厥鄰占城又冦我思明祿州寧遠之地在廷之臣咸請發兵討罪上曰彼匪人乎斯不可終化發詔使申諭焉賊聞其主有遺胤子奔來京師即上表謝過請還之上曰彼其庶幾有悔乎遣使者衛送出境賊伏衆邀遏使者執殺其主遺胤子事聞皇上震怒召文武羣臣諭曰豫承天命保康兆億民一民弗獲惟豫弗恭人有弗迪而遽誅斯遏抑厥自新乃有弗迪至于再三而釋弗誅惟豫弗君今盜滋弗迪豫必不釋將往大正匪豫志用武惟盜滋稔惡羣臣合辭力贊必決乃告祀天地宗廟及天下山川命征夷將軍左右副將軍左右參將暨神機橫海驃騎遊擊鷹揚五將軍率師討賊師發金川門上臨江送之諭之曰汝其代豫往行天討惟盜暨厥子必誅弗釋暨同惡必誅弗釋凡厥脅從咸釋弗誅惟兹安南咸朕所統厥民滋困于盜罔攸訴告汝其代豫往弔毋有侵害或有侵害即既殄戮盜猶底汝罰既殄戮盜其咨求其王遺嗣子俾統治厥民往哉惟懋師入安南黎賊脅驅其民號號百萬拒于境上民聞王師來為巳除害皆倒戈迓降師渡富良江入其東都城又入其西都城如蹈無人之地賊窮迫盡棄其衆獨與其孥數人並海遁去王師追之悉生縶之不遺一人乃縱所脅從咨民所苦罷其竒禁敷求安南王遺嗣民既罔有侵害又蒙哀矜弔恤悉解去所苦咸竊喜曰我幸復見今日幸聖天子不遐棄我萬里外而復生我欣然如脫虎口歸慈父母相率跽軍門言曰惟故安南王遺嗣悉殱于冦暴無遺惟兹土故隸中國誠願復列中國氓密比聖化俾我暨我子我孫咸免於夷狄禽獸軍中獻所獲俘且具言民所欲皇上重違民意下詔郡縣其地選置守吏復置交址布政司總之在廷文武羣臣上表稱賀臣惟安南本漢南越地武帝置交址郡暨五季丁氏竊據之始僣稱王宋弗能制因授之卒循為常更歷數姓蟠結深固屢叛弗服宋元數舉兵誅訖無成功皇明奄有四海率先欵服曽不踰世終梗冦盜天地之德務隆包荒纍誨弗悛肆急援溺仁義之旅弔伐並行恩威所臨有迎無拒纍月之頃肅淸凶憝大拯塗炭弘復疆土功德俊茂振古無倫焉惟古帝王施德建功皆有頌歌傳播後世臣忝列從臣後輒擬古作者之意撰平安南詩一首以示後來謹拜手稽首上進詩曰維天生民咸俾遂適有攸弗及肆命有德惟德格天為君為師以教以治俾適咸宜天啓皇明悉卑所覆明明太祖生育教誘衣之食之邇安遠歸禮昭義布長幼尊卑皇帝繼統四方萬國益富而教和豫安適蕞爾蠻交醜孽其間為狼為豺小大畢殘皇曰彼醜匪異人類庶或改率豫其化誨誨言諄諄弗遷益驕戕暴厥鄰盜我邊郊百辟文武俯伏陛言弗時翦屠將俾蔓延皇曰申誨猶或改率弗改弗率跳梁狂獝偽恭籲命賊我使人暨彼遺孽磔身百分皇曰彼醜獸心靡易螟􅭈弗除遏遺嘉稷惟皇上帝付豫八埏有溺弗援豫滋違天誕命將臣暨旅師徒往勵汝勇往宣汝謨咸弔困窮殱惟醜虜職敷豫仁匪曰究武六師遄邁辭直氣厲涉危蹈深若履平地嘽嘽烈烈赫赫業業如飄剟剟如霆􅎒􅎒蠢彼醜虜脅驅為拒仁威天降孰有強禦雞翎夜闢富良為帶投兵委戈奔降迓拜乃入交城乃走凶渠縶之海隅如探取雛乃咨脅從悉解而縱乃視交人弔其疾痛交人悴悴爰始色溫舒其兢兢爰始笑言交人有言我困荼毒天子生我旋癘為福交人有言我初匪夷逖遠淪汗陷茲塗泥天子聖仁曷返我初內我庇我永康不虞俘獻于廷天子受之民有願欲天子豫之四夷有聞歡喜告語天子聖仁我有父母救民之疾不以遐僻有梗弗率必誅不釋天子聖仁孔武且神孰其為梗鑒彼交人芒芒四裔威服德拊巍巍中夏尊安鞏固海航陸車來享來庭千萬億年拱我皇明平胡詩洪惟上天眷佑我國家皇帝陛下以至仁大聖纘承太祖髙皇帝鴻業為億兆生民主綏靖涵育四方萬國林林總總之生皆鼓舞欣戴趍走承奉惟恐不及至於朔漠氊裘瓣髮之衆各率其屬歸誠慕義拜俯闕下蒙荷官賞者不可勝計惟本雅失里弗率倔強化外皇上推天地之大德謂率土皆朕民其可使一芥獨失其性屢發詔使撫徠之虜弗悛益甚要執我使臣侵擾我疆埸疆埸之民罹其毒虐皇上憫焉弗寧謂皇天既付豫天下天下有一民一物失其所豫曷敢坐視不恤且仁者不姑息畜患以厲民虜怙終不可赦豫必躬往視師以永寧我宗社生民時車駕巡北京詔皇太子監國至是復詔皇太子告天地宗社及詔告天下以發兵所由遂命將閲師永樂庚寅二月丁未車駕發北京既出塞踰五雲關道壓虜舟龍旗所嚮上天助佑風日和融消剝寒沍坤靈協贊磧滷之野咸出甘泉潔清芳冽隨地而有士馬所過無不飫足衆心􅌚懌咸懷敵愾五月巳卯車駕次玄𬈑河本雅失里率衆迎拒皇上以數百騎獨先大破之諸將率麾下繼進奮驅逐北本雅失里盡棄其族屬牛羊輜重以七騎遁去諸將咸請追戮之皇上謂帝王除暴祛之而已不窮殺以為武時將士生縶虜衆來獻者萬計詔悉去其縶虜衆有釋兵以其屬來附者又萬計皇上進而諭之曰若等悉吾民困于凶孽懷蓄憤鬱不獲自歸久矣今朕不遠萬里來為爾除害勿有疑畏悉給豫所獲孳畜俾自擇便地以居皆􅌚喜膜拜舉手加額呼萬歲虜衆遂平獨支冦阿魯台初聞天兵且壓境率衆先遁上曰此虜竄匿不能遠當還師撲之如拾芥耳及班師六月甲辰至靜虜鎮冦衆來奔者具言其狀徑搗之冦迫急請降上曰虜欲緩我師耳必詐也麾將士上馬控弦以俟言未既虜悉衆薄我右翼諸將赴之未決上麾虎賁三千奮進斬虜虜大震怖悉解甲去弓矢俯伏降阿魯台以數騎遁去遂誅其同惡盡釋其餘從而撫定之繇是瀚海迤北沙漠萬里悉平悉寧封山勒石紀述功德告示萬世七月壬午車駕至北京中外臣民歡欣舞蹈臣惟夷狄世為中國患莫甚北虜皇上乘中興之運奉若天道恢弘治化奮揚神武廓清六合功德隆盛宜有詠歌宣播無極臣忝執筆從詞臣後謹撰平胡詩一首上進詩曰皇明受命統御寰宇皇帝仁聖承序太祖以教以理洽于率普神化所濡涵泳鼓舞逖彼朔土負恃遐阻弗馴弗㥚執我使者橫縱桀驁跳梁醜䰩毒其與處連我邊野人之鞠窮鬱憂以癙呌號旻天盍于我抒皇帝仁聖憫焉興憷曰時天氓彼敢虐苦惟天命豫豫曷敢捨彼絶于天匪豫志武乃命將臣整徒閲旅告誓啓行以類以祣六師導御萬乘從扈如雷如霆如飊迅騖萬里一瞬飛越峐岵謨斷自天孔神且訏計遐測幽瞭如眝暏逖彼朔土夏不解沍芒芒磧滷沃渴惟乳皇德格天昭畣靈祜春晹流敷融麗昫昫甘泉洋洋徒乘厭飫競奮敵愾踴躍馳赴搗其狡穴玄冥之滸揮戈擊殳闞若虓乕虜急在釜強抗螳斧殱之糜腐縱惟七馬乃有支孽潛伏于莽一鼓而獮迅於焚羽肆犂其藪散其藏聚皇帝有詔厥衆咸赦解其縶縛綏其降附曰豫寧汝汝罔豫懼汝飢錫汝馬牛肥羜蘇其創殘伸其噢咻如旱惔焚霈施甘雨歡呼膜拜皇帝聖主我昔罔知今我父母皇帝神武德施弘溥惠彼朔野同我中土夷堠去防罷革邉戌邉人肆寧如愈沉痼虜人始悔知夢斯寤往來孚好無有疑忤帝曰康哉其還豫駕雍雍凱歌歡騰載路四方萬國奔賀拜俯皇帝功德超冠千古相彼自古夏殷而下漢唐暨宋咸弊戎侮于備于禦不以晨暮財殫力劬卒罔驅去帝御九五降治弘化肆揚神武抉剔民惡洗濯曠蕩俾民得所五兵偃戢四海熙豫宣昭人文丕闡皇度億萬斯年永降宗社臣謹作詩以繼肆夏清邊頌鄒緝臣緝稽首頓首言臣伏惟皇帝陛下以天錫勇智之資具聖神文武之德紹嗣太祖髙皇帝之統緒克勤克愼懷保小民外暨四夷咸加惠撫威德所至無逺不服東極朝鮮日本南踰交趾西抵番戎大邦小國以至海外諸蠻夷君長悉皆臣附來朝貢獻不絶而獨比邊殘胡遺孽未底寧順往者阿魯台梗化弗庭數為冦害皇上親御六師以討之阿魯台奔命不支由是疑塞稱臣朝貢于闕下皇上功德之盛巳莫與並矣惟是瓦刺三酋昔受封爵于朝為邊疆之臣而乃背恩棄信阻兵搆逆與其黨類互相讎殺且復冦掠我邊境殺傷我人民皇止以為此叛命之臣不可以不討之也復選將命師親駕往征之六月進至撒里怯兒之地遇虜兵與戰擊走之追至土刺河虜酋大集其衆據險阻以拒我師我師勇鋭齊發左右奮擊大破之殺其酋長及其衆數千人追奔逐北虜救死扶傷不暇乘夜遁走漠北為之遂清乃命諸將班師而還至飮馬河和寧王阿魯台遣其酋長來朝上撫以恩信慰而遣之六月振凱還北京臣緝於是稽首頓首言曰自古聖德之君必以安攘為首務蓋斯民既安而夷狄未除終為邉境之患在周之時玁狁作難宣王興師以伐之觀之六月之詩可見矣漢武帝之逐胸奴唐太宗之擒頡利皆以其患害滋甚不得而不討之也五代及宋契丹女真迭盛復為中國患而逹旦之元遂有中土以夷裔變華夏中國之民辮髮左袵為夷伙之俗者幾百年我太祖皇帝受天明命起自布衣躬親師旅削平冦亂掃逐戎胡北出于沙漠既已一洗前代腥羶之習復還先王衣冠之治矣皇上紹承大統繼守先業復剪剔其芽枿而剗蕩之神謀睿算預決勝於萬里之外以成千古所無之功使三邊永寧天下蒙福真所謂功高百王而紹隆古昔帝王之治也臣緝不勝慶幸謹撰永樂清邊頌一篇拜手稽首以進其辭曰聖王在御四夷咸附悉享悉臣孰敢違忤天之所覆地之所承殊方絶域莫不來庭蠢茲醜虜包有遺枿煦沐涵恩以長以息惟皇之德懷附以仁錫之封爵俾長其人大漠之墟窮隂之野息養蕃滋以有羊馬乃逞其凶乃肆其姦驕欲是為因搆兵端同類相讎遏我來附掠境盜邊以啓皇怒皇帝曰吁曷可不治冝飭六師往伐殛之乃修我戈乃整我旅乃奮我謀乃振我武旗纛旄鉞連屬後先摐金伐鼓震蕩山川北出興和直指沙漠虎旅長驅聲震窮朔進抵其巢索虜震驚百萬之乘如雷如霆如熊如罷莫不齊奮電掣飈馳川嶽變眩天戈所指孰有不摧既殱其衆亦殞其魁逖彼大酋剪其遺蘖投石糜鷇振枯隕葉隂山浣海所向無堅順附則全違忤則顛既剗既除既獮群醜蕩剔腥羶踈遠斥堠旋師飲馬撫納降胡綏之懷之其來塞塗凱入居庸萬民呼抃鐃吹髙喧歡騰交甸邊塵絶息皇心攸寧飮至䇿勛賞賚兼行爾侯爾伯錫爵進秩爾將爾吏咸加優恤皇曰汝士惟汝豫功嗟汝勞瘁其休汝躬無功不酬無勞不録凡在于行悉蒙優渥群方九有同仰大明無小無大各遂生成乾端坤倪清夷軒豁異域殊邦悉從包括聖功既遠聖德益昭霈澤旁施上齊軒堯選賢任能置在左右同享太平以期永久三邊靜謐烽燧不傳於皇聖世惟億萬年騶虞詩有序梁潛臣聞自古聖帝明王至治之極必有禎祥若麒麟鳯凰醴泉甘露應時而産皆所以符聖徴彰至德者也乃永樂二年秋八月皇帝冡弟周王畋于鈞州厥有異獸白質黑章猊首虎軀其狀孔威不可迫視王俾部曲俟之其性孔仁遂擾致之以詢之故老蓋古所謂騶虞者此其是巳夫惟人君有至信之德則見於是九月丁未王率厥屬表獻闕下皇帝服皮辨服御奉天殿以觀不震不動柔伏自然皇帝若曰厥為嘉瑞豫罔敢知維致自昆弟之邦豫其嘉焉於是太子太師淇國公臣丘福謹率百官上千萬歲夀既而京師人士欣喜聚觀咸以為聞自古昔見始今茲臣潛伏覩盛典不敢自默退而考之騶虞詠於詩記於禮列於傳記或以為義獸或曰仁獸或曰聖獸至以為嘉祥者則其言皆同也傳曰國家將興必有禎祥洪惟皇上紹登大寶率由舊章親親而仁民恩沛而義洽萬方咸和以及乎庶類黍同頴於郊𧖟成繭於野文犀白象諸福之物抑之而愈臻却之而復至何其盛也豈非上天以是昭至德哉臣潛忝職記注苟不形之歌詠以垂示無窮輒為不職謹百拜稽首而獻詩曰於穆聖皇綏懷兆民端本自家篤於周親恩沛義洽如煦春陽至和沖融發為禎祥禎祥伊何厥惟騶虞産于王國惟皇德符王馴致之獻于帝庭素質玄章雲舒霧凝帝乃觀焉載戢其瓜爰言究之踐匪生草吁嗟騶虞外何其威內何其仁匪苞而鳯匪角而麟吁嗟騶虞曷為來哉王拜稽首皇則召之皇之仁民淪膚洽肌弘暢旁逹物以不疵皇之孝友本乎至性萬邦咸懷物以類應皇帝曰俞惟王信恭王乃麟趾奚必騶虞皇帝曰吁凡百在位惟德召和匪物其瑞庶臣拜手皇帝萬夀慶祥畢臻德音是懋瑞應甘露詩王直臣聞聖人之德配天地則天地之心欣合無間故必凝英萃和以昭其盛若黃帝之甘露虞舜之卿雲是也恭惟皇帝陛下以至誠之德統承太祖髙皇帝基緒繼述之孝不忘乎公遵用舊章未嘗改作德化所及罔不愛戴故自天地之所覆載日月之所照臨無有遠邇熙然泰和動植之物亦各生遂而太祖髙皇帝之盛德大業愈益元明是以天發其祥地闡其􅡋景星慶雲醴泉甘露嘉禾瑞麥麒麟騶虞諸福之物駢臻沓至此臣等之所親見天下之所共知也而聖心惓惓益勤不懈乃永樂十七年十一月日甘露復降于孝陵凡四日松柏之上凝為玉脂融為瓊液粲若垂珠聮若編貝臣民聚觀鼓舞􅌚抃咸以為甘露之降不于其他而于孝陵者蓋聖孝所致也於是皇太子命採取馳獻于北京皇上祗薦宗廟傾賜百官芳香之氣旁逹左右甘美之味莫可擬倫誠天地之精英聖明之上瑞所以彰皇上之大德為天地之所恱鑒景命之隆長太平之悠久歷千萬世而益盛也昔虞舜有卿雲之祥百工相和而歌之萬世之下因是想見帝舜之德使人起敬起慕今聖德之大實同天地甘露之瑞不減慶雲是冝有紀也臣愚不自揆輒形之聲詩以繼虞廷之歌垂之萬世使知聖德格天之盛巍然煥然如此臣等誠歡誠忭稽首拜手謹言甘露昭聖孝也有瑞甘露其集瀼瀼𬒳于長松孝陵之岡如珠之英如瓊之漿於粲其光承彼朝陽有瑞甘露其融湜湜亦𬒳于柏孝陵之側如肪斯白如玉斯潔其馨有烈敷暢旁逹維彼露兮天乳之滋維此受兮上帝之貽皇有大德神人具依集此大瑞福祿攸冝皇德之大實配于天永言孝思太祖是憲懿彼舊章于嗣于宣夙夜敬恭穆穆乾乾維太祖肇邦皇以廣之維太祖受命皇以康之顯顯大猷萬邦仰之巍巍成功無以尚之上帝太祖樂此德馨屢開厥祥甘露斯零甘露斯零維帝命是膺維太祖是承皇祚以攸寧乃取乃獻皇太子之恭乃賜乃頒以洽于臣工匪餄匪酮既甘既融靈液攸降物莫與同臣拜稽首天子萬年以臨下民以對上天維禎維祥繼繼綿綿聖子神孫萬世之傳芝頌禮部尚書毗陵胡公於𪠘署之南作小軒以為思政之所凡公之佐天子舉禮樂以施政教則必思其宜于此而後行之天下公忠信明逹君子也其精神感而和氣應之蓋有不期然而然者宣德八年九月軒之中甃甓隱起發而視之有芝生焉其色純白如刻玉如截肪輪囷敷暢鮮潤華好公卿大夫來觀皆以為瑞而贊詠之夫芝之瑞始於漢重於唐至宋而極盛蓋謂和氣薰蒸之所成非人力能為也然彼宫殿門廡之所産者國之瑞也生於士大夫家倚廬齋閣之中者家之瑞也今皆不然惟於公思政之所見之蓋公盡心於其職故天以是彰厥美則茲瑞為公精誠之應無疑也然竊思之公之所任大矣其應亦有大者焉北特其兆也禮曰樂者天地之和禮者天地之序又曰禮樂極乎天蟠乎地行乎隂陽通乎鬼神此豈細務哉今上有聖明之君而下得公之賢以為臣厚禮樂之本逹禮樂之用極其至也天地安其位日月著其明四時寒暑順其序明而為人幽而為鬼神流而為川峙而為山精而為百榖粗而為草木鳥獸一皆遂其性無毫髮爽焉至和之氣充周于六合之間則甘露醴泉器車馬圖龜龍麟鳯諸福之物靡不畢至而國之大瑞備矣故曰此特其兆也有其兆而贊詠之思迓續其大者云爾蒸民之詩尹吉甫送仲山甫也而序者以為美宣王蓋能任賢使修其職宣王之美見矣今公之有此皆上委任之所致則諸公之贊詠雖以美公而亦以美朝廷也作芝頌春官名卿禮樂宗兹誰任者毗陵公美哉新署欎穹崇華軒結構居南東聖明在上眷遇隆懷清履直持敬恭孜孜夙夜亮天工施諸政教審厥衷精誠孚暢靡不通靈芝煌煌産其中至和絪緼之所鍾殊姿密理鮮且重刻脂鏤玉紛璁瓏參成樊桃差可從瑤英紫脫徒芃芃嘉生本自造化功滋殖豈與凡卉同知公秉德久愈克輔翼帝道宣皇風上追夔夷躡高蹤體信逹順更豐融四靈畢至百福隆君明臣良格昊穹頌歌繼作聲渢渢鴻名赫奕垂無窮皇明文衡卷之二十
