front:
  text: 皇明文衡卷之六十七
  hash: sha256:91466aa186ca8e2a9a489283da1a13e33943c73b80fba36851d489d0290cf350
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_067-1a}
body:
  text: 碑蒲州廟學重修碑薛瑄蒲州儒學著令釋奠大成至聖文宣王仲春仲秋上丁凡一其弟子以及歷代有功於聖門之諸儒皆配饗從祀於殿廡焉廟後列堂齋為生徒講習之所事神育才各有其宇然或敝於久或缺於𥘉皆學政之不可緩者今徐守孚浙右台之黃嚴人家丗業儒既由庠序中鄉舉遊賢關歷事春官於神典民政熟於講聞及來知是州凡政事先後次第修舉因進謁大成殿庭以大成門東西廡神庫神厨牲房皆事神之宇大成門歲久穿漏乃葺而新之兩廡迫隘不足以周旋禮節遂擴增其楹數復外為周廊以障風雨神庫等屋悉加修治生徒雖有講習堂齋舊乏退息之室因創增號房數十間又樹扁學門以壯觀仰其材皆儲之於素匠役取之在官民不知擾而役底於成始事於天順四年月日凡幾閲月訖工於是神宇學舍巍然秩然莫不峻整又訪郡之先逹可為鄉先生者尸而祝之以勵後進師生樂其崇學好禮而役之成也咸願有辭以鑱諸石乃來求記余惟古之學政考之載籍可見巳蓋自夏商周以上之教法皆所以復人性之善孟子所謂學則三代共之皆所以明人倫者是也漢唐歷代雖或建學而道學不傳又為異端雜術所淆而知以復性為教者鮮矣至宋道學復明朱子序大學有曰治而教之以復其性如唐虞司徒之職典樂之官以及三代小學大學教人之次苐節目皆所以復其性故又曰學焉者無不有以知其性分之所固有職分之所當為而各俯焉以盡其力者此也洪惟我天朝道隆前古治底文明內外建學其所以育天下之英才者皆以復性為教故凡五經四書小學性理書自周張程朱之説以達乎堯舜禹湯文武周公孔子顔曾思孟之道學校之講學者既一於是科目之取人者亦一於是推之禮樂政治者莫不一於是是以學政粹然一出於正而異端雜術不得以淆乎其間豈漢唐歷代之學而鮮知以復性為教者之可擬哉今徐守既克舉學政諸生瞻依宣聖諸賢之廟廡有所興起必由所謂五經四書小學性理諸書周張程朱之説以求古聖賢之道以求復其性以追古俯焉盡力之君子庶幾於學校政有實效矣於是既序其事而復繫之以詩曰惟此蒲學守克新之新之伊何道化在茲有神之宇靡不完葺有士之居靡不增立春秋釋奠禮必虔誠朝夕礲琢業必專精於道自天全畀神聖繼天立極治教斯盛昔在唐虞典樂司徒三代法備學則有區區以小大慮百致一爰究其歸復性是極延延鄒魯心法相承曰命曰性一以貫通孟氏往矣正緒邈絶術裂多𡵨理難同轍宋儒勃興道統是接皇明運泰道隆古先學建內外政教是宣其經有五其書有四性理真儒發揮詳至于以表章于以作人人知復性化底熙淳兹頖有政政既理治朂哉明誠聲實永世精忠廟碑徐有貞國之有忠義猶天地之有元氣也天地非元氣不運國非忠義不立彼其所以繫星辰行日月載華獄振河海者推元氣元氣在則雖時有隕蝕騫溢之變而終不易乎常運所以安社稷尊主庇民者惟忠義忠義在則雖時有寇難禍亂之虞而可以救乎滅亡然天地之主以道國之主以人道無私而人多欲故天地不自害其元氣而國有自害其忠義者至要其終則亦有萬世之公論存焉如宋嶽鄂武穆王之事是巳當夫徽欽之既北狩而高宗南渡也華風幾淪戎禍方熾不翅天柱崩而地維折宋之不亡僅如一線之屬旒國無其人誰與復立王於時奮自徒步應募而起歷裨校至大將小戰百餘大戰數十鋒不少挫而益徑遂平南北羣盜傾偽齊以蹙金人蓋王之忠義勇智皆得之天非矯偽而為者故能始終以恢復為已任才與志副名與實稱南渡以來一人而已當是時女真幾滅中原幾復奈何王蔽於姦忘讐忍耻自棄其土而不能成中興之大功此則宋之不幸中國之不幸而豈獨王之不幸哉論者謂方郾城戰勝進軍朱仙鎮兀术將棄洛遁而詔趣班師使王以將在軍君命有所不受之義堅執北伐乘屢捷之勢逼技窮之虜而滅之盡收故疆措置已定然後奏凱旋師歸身謝罪顧不愈於束手就僇而志不得伸耶此亦一義然未得其當也夫將不專制久矣惟趙充國之破西羌嘗違詔而伸已䇿以上有孝宣之明下有魏相之忠與協耳不然則必如孔明之受記昭烈桓溫劉裕之專制晉權乃可以拜表而即行彼高宗之去孝宣遠矣又濟之以姦檜之賊王既無孔明君臣之契而溫裕之所為又非王之所肯為者此其所以寧死而不敢專制之也歟嗚呼於此益可以見王忠義之誠矣是以自宋及今天下之人所共扼腕傷嘆聲其害王者之罪而誦王之烈不巳非所謂公論之存於萬世者乎歲己巳之八月皇帝初即大位以統幕師上皇未復寇方內逼乃命侍講臣珵等十有五人分鎮要地遏亂略紏義旅以為京師聲援而臣珵實來彰德彰德古相州也湯隂為其屬邑邑之周流社王之所生地也間因行縣至焉既臨祭壬之父祖墓而封守之乃集郡縣僚吏師生父老于庭而諭之忠義因及王之祠事皆喜躍願效力其明年春珵以召還乃具列王之功於禮當祀者以聞詔可祠既成勑賜榜曰精忠之廟而俾有司春秋祭享如制於是書其事于麗牲之碑而識其相事者之職名於碑隂又為迎送神之辭使歌以侑享既以慰王之靈於冥漠且以為天下忠義之勸云其辭曰王歸來兮母夷猶寧不懷兮舊丘昔仗劔兮南遊刷國耻兮復君讐王之烈兮蓋九州羌彼姦兮忠是就神胡為兮滯留駕風鵬兮驂雲虬婘鄉邑兮少休斚有醴兮爼有羞式燕享兮春與秋王將去兮之何方胡不眷兮故鄉爰弭節兮回旌肆容與兮翺翔肅羽騎兮成行彎強弧兮射天狼福我民兮佑我皇干戈載戢兮無水旱傷蠲我祀兮蒸與嘗江之南兮河之北往復還兮樂未央勑修河道功完之碑徐有貞惟景泰紀元之四年冬十月十有一曰天子以河決沙灣久弗克治集左右丞弼暨百執事之臣于文淵閣議舉可以治水者僉以臣有貞應詔乃錫璽書命之行天子若曰咨爾有貞惟河決于今七年東方之民厄于昏墊勞于湮築靡有寧居既屢遣治而弗即功轉漕道阻國計是虞朕甚憂之茲以命爾爾其往治欽哉臣有貞祗承惟謹既至乃奉揚明命戒吏飾工撫用士衆咨詢羣䇿率興厥事巳乃周爰巡行自北東徂南西踰濟汶沿衛及沁循大河道濮范以還既究厥源流因度地行水乃上陳于天子曰臣聞凡平水土其要在知天時地利人事而已天時既經地利既緯而人事於是乎盡且夫水之為性可順焉以導不可逆焉以堙禹之行水行所無事用比道也今或反是治所以難蓋河自雍而豫出險固而之夷斥其水之勢既肆又由豫而兖土益踈水丗肆而沙灣之東所謂大洪之口者通當其衝於是決焉而奪濟汶入海之路以去諸水從之而泄隄以潰渠以淤潦則溢旱則涸此漕途所為阻者與然欲驟而堙焉則不可故潰者益潰淤者益淤而莫之救也今欲救之謂先疏其水水勢平乃治其決決止乃濬其淤因為之方以時節宣俾無溢涸之患必如是而後有成制曰可臣有貞乃經營焉作治水之閘疏水之渠渠起張秋金隄之首西南行九里而至于濮陽之濼又九里而至于博陵之陂又六里而至于壽張之沙河又八里而至于東西影塘又十有五里而至于白嶺之灣又三里而至于李􅕞之崖由李􅕞而上又二十里而至于竹口蓮花之池又三十里而至于大瀦之潭乃踰范暨濮又上而西凡數百里經澶淵以接河沁河沁之水過則害微則利故遏其過而導其微用平水勢既成名其渠曰廣濟閘曰通源渠有分合而閘有上下凡河流之旁出而不順者則堰之堰有九長袤皆至丈萬九堰既設其水遂不東衝沙灣乃更北出以濟漕渠之涸阿西鄄東曹南鄆北之出沮洳而資灌溉者為頃百數十萬行旅既便居民既安有貞知事可集乃參綜古法擇其善而為之加神用焉爰作大堰其上楗以水門其下繚以虹隄堰之崇三十有六尺其厚什之長伯之門之廣三十有六丈厚倍之隄之厚如門崇如堰而長倍之架濤截流柵木絡竹實之石而鍵之鐵蓋合土木火金而一之用平水性既乃導汶泗之源而出諸山匯澶濮之流而納諸澤遂濬漕渠由沙灣而北至于臨淸凡二百四十里南至于濟寧凡二百一十里復作放水之閘于東昌之龍灣魏灣凡八為水之度其盈過丈則放而泄之皆通古河以入于海上制其源下放其流既有所節且有所宣用平水道由是水害以除水利以興𥘉議者多難其事至欲棄渠弗治而由河沁及海以漕然卒不可行也時又有發京軍疏河之議有貞因奏蠲瀕河州縣之民馬牧庸役而專事河防以省軍費紓民力天子從之是役也凡用人工聚而間役者四萬五千有奇分而常役者萬三千有奇用木大小之材九萬六千有奇用竹以竿計倍木之數用鐵為斤十有二萬鋌三千絙百八釜二千八百有奇用麻百萬荆倍之藁秸又倍之而用石若土則不計其算然其用糧于官以石計僅五萬而止焉蓋自始告祭興工至于工畢凡五百五十有五日於是水官佐工部主事臣詡參議山東布政使司臣雲鵬山東按察司事臣蘭等咸以為惟水之治自古為難矧茲地當兩京之中天下之轉輸貢賦所由以逹使終弗治其為患孰大焉夫白之渠以溉不以漕鄭之渠以漕不以貢而工皆絫年費皆巨億若武之瓠子不以溉不以漕又不以貢而役久弗成兵民俱敝至躬勞萬乘役壁馬籲神祗而後已以彼視此孰輕孰重孰難孰易乃今役不再期費不重科以溉焉以漕焉無弗便者是以軍國之計生民之資大矣厚矣其可以無紀𫐠於來世臣有貞曰凡此成功實惟我聖天子之致所以俾臣之克效不奪浮議非天子之至明孰恃焉所以俾民之克寧不苦重役非天子之至仁孰賴焉有貞之於臣職其惟弗稱是懼矧敢貪天之功惟夫至明至仁之德不可以弗紀也臣有貞嘗備員翰林國史身親承乏不可以嫌故自輟乃拜手稽首而為之文曰皇奠九有歷年維久延天之祐既豫而豐有蔀以蒙見沫曰中陽九百六數丁厥鞠龍蛇起陸水失其行河決東平漕渠以傾否泰相乘運維中興殷憂乃凝天子曰吁是任在豫豫可弗圗圗之孔亟歲行七易曽靡底績王會在茲國賦在茲民便在兹孰其幹濟其為豫治去害而利惟汝有貞勉為朕行便宜是經臣拜受命朝嚴夕警將事惟敬載驅載馳載詢載謀載度以為乃分厥勢乃隄厥潰乃踈厥滯分者既順隄者既定疏者既濬乃作水門鍵制其根河防永存有掃如龍有堰如虹護之重重水性斯從水利斯通水道斯同以漕以貢以莫不用邦計維重推天子明浮議弗行功是用成惟天子仁加惠東民民是用寧臣拜稽首天子萬壽仁明是懋爰紀厥實勒茲貞石昭示無極大寧觀碑劉定之大寧觀在大同府城中大同古雲中地漢高祖鋤秦蹶項威振寰海然至此為冒頓所困拓跋魏據此而起而以得中原之半遼金皆以此為别京元因之盤根株固窟穴焉維我皇明視為藩垣重地屯兵千萬連城堡十數百以控制朔漠逹于無外蓋自帝都顧視之大同其右翼也德威所及之遠豈前代君華夏攘夷狄者可侔哉信足謂之大寧矣洪武𥘉創道觀以大寧為名厥有意焉然其地寒故山林無傑木巨材其人勞於戍守饋運征行故於取木伐石陶甓之役有不暇構架塗墁繪飾之巧有非素習則維王公將帥官府廨署有不逮中土者况於觀固宜因陋就簡也今副都御史古濬王公越來鎮天同令肅法舉亦既有年意欲新之有待未果太守綏德郝君淵之自監察御史知河間府連著績用遷綰郡紱有所興革克承憲度公嘉奬之以新觀之事委焉君退與其僚捐俸為率俾觀之羽士張道維集好義者所願輸始事于成化三年丁亥某月訖工於明年戊子某月最北正殿五間殿之南甬道屬于中殿三間道東西各有亭中殿之南甬道屬于山門道東有鼓樓西有鍾樓環其區域為廊四周東廊二殿北以祀三官南以祀靈官西廊二殿北以祀四聖南以祀關王間架高廣深邃加其數觚稜罘罳欄檻增其規香火灑掃朝夕節朔定其制石山藝卉沙墀植樹期其久既成文武官曹兵民士女咸集瞻視靡不欣喜謂曩者吾人至于斯觀有所祈謝祥臻災弭寇殄物阜雖感神惠而愧觀弗稱今茲稱矣功有自焉惟亭立碑以待刻文紀實郝君嘗從豫學乃以王公命來請豫文夫斯地之安寧綏靜陶大化超往古由有聖主在上享天心恢神謨以長轡遐馭也斯觀之盛則賢臣總風紀任牧守治神人能得其宜于中也然則斯人在下衣食有餘而奉神之休庸有既乎豫既記其事乃繫以銘詩曰絶塞之表不聞刀斗乃聞道觀鼉鳴鯨吼鼓鍾之聲警于昏曉烽燧不見乃見華燈夜集干觀燁燁如星我皇御世武緯文經天下之大孰如其寧風調雨順禾黍被野日之夕矣牛羊來下饔䬸是宜湩酩亦諳出而射獵獲虎耽耽歸舉兕觥抵掌醺酣囊金車帛來自塞南家給人足捐財弗貪以作斯觀千楹楩楠維神之尊其居正宇垂衣雲霞寶冠玉麈與天為徒祐我聖主旁殿居者哂喜瞋怒各司厥職我民依怙爾胡勿驕神欲勦之都憲節出大將纛麾執以還城往觀數俘入門而左關雲長居顔如渥赭有虬其須單刀雪瑩胡魄先誅有屹者亭碑峙龜趺守臣所立鰲島仙書皇明文衡卷之六十七
