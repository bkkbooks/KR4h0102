body:
  text: 序送周遜學赴長洲儒學教諭序貝瓊今年春豫與會稽趙俶錢宰金華鄭濤同𬒳召至京師授國子助教秋八月望預朝奉天殿詔臣俶等至御前命之曰汝一以孔子所定書誨諸生若蘇秦張儀繇戰國尚詐故得行其説宜戒勿讀既受命退而思曰古人有言曰孔子讀而儀秦行鷙翰而鳳音也天語及此豈非灼見其説不徒惑戰國之君天下後世且惑之心術之螙莫過于此歟孔子之道自堯舜禹湯文武所傳著之易詩書禮樂春秋者大中至正歷萬世而無弊也不幸亂于百家而百家之中縱橫為甚以其功利中君所好莫不説而從之視儒者之言仁義則為迂而不用矣此一時習于傾危險陂前後一轍不能回其所向之途可勝嘆哉然古今帝王皆知尊孔子而斥儀秦未有舉其詐以戒人使禁所習而趨于正者敬識于心造次不忘凡遇諸生必懇懇告之焉蓋學孔子則進而為信為善極于大而聖聖而神不翅梯之升高航之涉遠也秦儀智謀之末君子之所羞道者惡可襲彼之所為乎大抵率人以正猶懼不勝其詐矧以詐率人其不正又何責歟此上之命臣俶者將一洗天下之習而復乎三代之淳大哉言乎河南周遜學者正道先生之子也器宏而有學搢紳咸器之蘇之長洲縣司教職缺縣上之府府上之部試其文考其行遂授教諭以歸人皆謂偃革右文之日莫先于教化師儒之位雖卑凡藝優而德不足譽隆而道不明者弗與也其愼而不輕如此則遜學視彼屈于事者優劣何如也其行也士大夫歌詠以華之且求余序其首因舉以告遜學宜訓長洲之子一于正而無惑秦儀之邪説可也送開學臣先生歸洛陽序昔洛陽賈誼為漢博士一歲中超遷至太中大夫請改正朔易服色定官名興禮樂立漢制更秦法文帝雖謙讓未遑且議任公卿之位諸大臣忌而短之出為長沙傳夫高皇帝之有天下事多草創而一代制作不可以不定者絳灌之徒智弗及誼而帝又不能用此余深為在上者惜也今國朝偃革右文方復三王之治凡誼之言于漢者不待請而皆行矣處士開先生者亦起于洛陽為國子助教嘗自比于誼人亦以誼期之時大臣無忌而短者其至公卿不難也未幾以病謁告留京師治之六月病久不愈乃遣歸此余又為在下者惜也鳴呼山川神靈降生奇偉磊落之士古今不數人固將使之有為于時也然遇時之可為而皆不得有所為不知其為天道何如邪𥘉余與先生同在成均資其講習之益一旦離散分處不能不為之惘惘矣矧以衰老之餘攝官承乏與四方雋秀相周旋而回望其放于嵩邙瀍榖間追逐雲月為事如誼所謂鳳凰自引而去麒麟莫可係而羈者竊有愧焉士大夫咸賦詩以送之屬余為之序于是乎書精誠録後序鄭楷天子之所以奉天而勤民臣下之所以竭忠而事君者無他道焉亦曰精誠而已矣若夫人子之養親則無間於上下而又兼乎愛敬者也我朝太祖高皇帝以廣運之德貫列聖之道萬機之暇拳拳乎天人之理恭默思道豁然有契於心嘗命文臣采經書之語及於欽若忠孝者類為一書賜名曰精誠録而頒之王國焉其不言之教蓋亦至矣臣楷恭承寵命得備員進講伏蒙睿旨命教授臣顧祿臨寫此書臣楷為之後序將欲重刻摹印以廣其傳焉臣楷受命戰兢懼弗克荷以為茲録出自太祖宸衷而殿下繼在祖之志述太祖之事宜得老於文學之臣而鋪張之而乃命之於寡陋之臣此臣所以戰兢懼弗克荷者也切聞惟辟奉天惟子止孝惟臣以忠其皆本於精誠乎精誠者天之道也天者理之所自出身者親之所由生為君者理我所以生者也君能精誠則奉天之道得矣臣能精誠則事君之道得矣子能精誠則事親之道得矣而其精誠之所以致其力焉又皆本於敬乎敬者聖學之所以成始而成終者也伏惟殿下德邁前王心存聖學誠敬精微之道實與太祖同一機而無間者也所以人同此心心同此理而思誠以造夫精誠者蓋如此太祖創之于前殿下廣之于後是編一行家傳人誦前聖之經一展卷而大綱舉一入心而忠孝生則帝王垂𥙿之道至矣盡矣孔子集群聖之道而為一大成實萬世之永賴焉精誠之録同一揆也送趙永明之金華序王琦有志乎遠大之學者非苟以文辭自衒而巳蓋文所以載道外于道而有工于文無有也世之言曰文者言之精言不精不足以成文故日罷于誦夜費于思鋪鏤聮疊緣飭繪繡以為工且至然卒不過如遊説之浮辭徘優之戲談且老生得之以欺後輩後輩得之以侮固列于道無與也道者所以扶綱常而紹典則今也學于師則曰彼雖善于是而繆于此彼長于此而短于是吾亦聊從而師之講于友則曰彼雖長于我而才不及彼後于吾學而智不逮吾亦聊從而友之于道無取也嗚呼求言之精而無與于道求學之專而道無取焉使蔓辭日興繆説日廣詆訾辨議訕謗排擊則文安得不為學者纍哉余舊學于金華濳溪宋公聞緒論之未未嘗不以此為深戒黃巖趙永明弱冠為文逈出倫輩而余未之友今年秋至郡城友人林公輔出永明文數首皆烜爛敷腴閎闊肆縱比物引類悉有可稱且將從濳溪公而取正其殆有志乎遠大之學者文固不足為永明纍也文中子曰文乎文乎苟作云乎哉必也貫乎道學乎學乎博誦云乎哉必也濟乎義余誦斯言也久于永明之行不敢不以告永明異日造金華知公所以教永明者亦當不外乎文中子之意也送楊湖州序劉夏王者之取天下天心順于上人心應于下斯可以得天下矣十數年前彼君天下者其政治弊于不修四方豪傑並起百姓肝腦塗地當此之時紛紛紜紜似乎人衆可以勝天而天心亦為之震蕩􅑾杌而不得底于寧謐也十數年後我國家歷試諸艱大戰江湖決成敗之幾于兩陳之間以嘗試天心之所向背矣𬒳天心斷斷然不我釋也天既不我釋天下億兆人心又安能釋我而他之乎然則天與之矣人與之矣猶有不來庭者我則起而取之矣于是考圖數貢以江南之大而浙右數州之地近在肘腋尚爾未入版圖乃命將帥師先取湖州賴天心之眷顧已密而人謀之協從斯臧甲兵府庫全城歸附上見湖民之久在辱也又念湖民之新被兵也乃不得已輟近侍之臣往撫之用是中書左司郎中楊克明受命出知湖州楊公通練沉敏諳于大體又不遺于細故湖之父兄耆老宜教其子弟曰自今以始服楊公之教令為上新民凡奢麗敝壞之俗不可為也偷惰放肆之風不可有也其君子則豹變羽翼于聖朝其小人則革面耕鑿于田里今湖民無死傷之憂有妻孥之樂爾但知民心鄉順之致然未必知天心之吏爾然也故太守下車為言爾之所不知者贈詹學士出使序洪武元年八月皇上臨天下慨然謂丞相宣國公曰治天下雖用匠手有規矩繩墨然後百度可貞也乃議建三省立六部拜諌議大夫設登聞鼓院罷通租不征下詔責躬求天下巖穴深藏不售之士顧元臣秦𥙿伯曰斗米三錢外戶不閉朕力行三年可以臻兹至理望道之勤沛然若決江河莫能禦于是儒臣十人受命分行十道訪求賢哲與之共理天下而學士詹同文與焉詹公恢疏倜儻嘗為考功郎時余與儕輩三十餘人皆隸考人心如深淵不測公投長竿探知其尺寸之所底止用此道以求天下士設有姦邪小人飭詐釣名安能誣我而冒進也邪而余也吏尚賓館惟當飭墻壁治几席以為天下大夫君子先容者焉舟行分韻賦詩序朱同皇帝有天下之四年有旨盡取羣儒以選任之四方多士雲集輻輳徽之先在是行者十人維時舟次南陵之毛家浦蘆葦生風東溟出月並舸中流傳觴唱和共歎人生出處之難而聚會之不易得也于是以杜工部星臨萬户動月傍九霄多之句分韻賦詩以紀之且以寓夫針規之意而令僕敘其首僕以為唐虞三代之隆處君師之位以政教臨民者皆真儒也心法之傳教養之道政刑之具載方册世變日下風氣日漓于是政教判為二途君人者有崇儒之美名而未得真儒之實用為儒者窮經皓首而未得盡行其道于時下于是者或拘古今異宜而不適于用或學非所守而反悖於經先王經世之大法或幾乎息矣今天子以神聖英武之資龍蜚江左掃蕩羣雄不數年而天下定于一乃罷黜百家一用純儒豈非世道之將隆斯文之大幸而為儒者所宜致思乎夫學貫天人功𬒳萬世文足以經邦武足以撥亂者真儒之學也學有淺有深而不可以強齊者也守寒素之舊而無驕奢之習知廉恥之義而無汗下之為不立異以要名不屈道以求合行止去就一盡乎在我而無一毫利害計較之私者真儒之守也守則吾儒者之所當同者也况新安吾考亭夫子桑梓之邦道德性命之學禮義廉恥之行漸摩既久諸公幼而學壯而行今也遭聖明之世洽教養之澤當盡藴奧以濟時守名節以律巳而無負乎聖天子用儒之意則豈徒斯文之幸而已僕也不孝罪重父喪未期毋疾未愈而衰絰以隨諸公後斯綱常之重治教所先必當得請而歸者是以不復辭而致其學守之説為諸公别且將跋足林下以徯所謂好消息者為吾邦斯文之慶幸也公其尚有取于愚言乎同是行者婺源四人胡原昉江道全江道原胡德耕休陽五人余子韶朱曰可汪銘德汪德懋江彥名余歙人朱同也麟溪集序張紞麟溪鄭氏為東南著姓篤于行義海內稱之洪武丙子紞自雲南入覲暏左庶子濟于朝行見其循循雅飭不願乎外詩所謂其儀不忒者庶子有焉聖上簡出羣倫置在左右俾羽翼東朝矜式天下其于化民成俗之意吁其至矣庶子字仲辨義門之八世孫嘗請于余曰有家以來既多歷年所朝賢鄉彥所以稱述而光賁之者代不乏人前此固巳會萃成集矣洪惟龍德御天人材輩出後之作者未艾也隋珠和璧胥歸寶藏謹續成一編于以宣揚德化侈上之恩而先業遺緒亦藉以無忝幸為序紞遜謝再三乃修辭以對曰嗟乎分形連氣同具是理而不能不壞于人欲何鄭氏之愈遠而愈盛也何鄭氏之能通其變而制其宜也竊求其故不由周禮本俗之道族墳墓聯兄弟無所不用其極本支相保當薄而踰厚世有鄭氏猶景星麗空鳳嗚朝陽真曠世之祥也雖然經言百世而沒其共㸑之文聖人非不欲之蓋亦難為之制耳今假以一生二為法自二而下倍而數之究于十世為子孫者千二十有四人繼稱之宗將居其半惟大宗當祭于廟餘皆室祭室祭無所君子之所隱也且子事父母雞鳴而起問安視膳各欲盡其私情若千人聚居一有不愜勢必有向隅而泣者于斯二者處之特難是故通其變使人不惓時而措之與之宜之乃君子之微權也聖人慮世雖遠又安得以權為制哉所謂權者無私恩則不足以親親無公義則不足以尊祖私勝則義為恩掩公勝則恩為義屈節其親疏量其恩義執兩端而用其中上不忘一本之澤下不失羣從之懿自非權度精切何以與此竊嘗因父子異宫之説而思之大略倣古者諸侯廟制五世一宅各有祠而總為牆宇以郭其外庶幾事親奉祭各得其所庶子可與言者率爾及此以終序述之意或亦處家之一道云贈鄭顯則序方希古天下之論文者嗜簡澀則主于奇詭樂敷暢則主于平易二者皆非也文不可以不工而惡乎好奇文不可以不達而惡乎淺易淺易以為逹好奇以為工幾何不至于怪且俗哉善為文者貴乎奇其意而易其辭驟而覽之亹亹覺其易也徐思而繹之雖極意工巧者莫加焉若是者其為至文乎聖賢之文與後世之辭純駁工拙多寡不大相遠也而世人望之若天然不敢指擬之者以其不務奇其辭而竒其意故舉天下好奇者莫及也使其意不能過于衆人而惟辭之修安在其為竒也哉日月之在天隮于東而行于西昏明于晝夜盈虧于晦朔自有天地以來未之有易也天固不規規然求異以駭人之視聽然愈久而彌新愈廣而無窮則為奇也大矣尚何以異為哉至于鬼磷之變滅不可以理推其迹雖似乎奇而其為明也微矣近代文士有好奇者以誕澀之辭飭其淺易之意攻訐當世之文昧者羣和而從之而三吳諸郡為尢甚此皆挾鬼磷而訾日月者也其力雖不足為斯文害然不除滅而禁斥之何由復古之盛乎今天子憫斯文之不逮古擇太學之士而教之吾郡鄭君顯則與焉顯則為文不好為奇而亦不流于易蓋學而得其正者也豫竊有志于變天下之文而患不得友天下之賢誠得如顯則者數十輩其趨古人之道以自見于世其崇且大者可明也况于文乎今猶未之遇也烏得無慨然矣乎吾聞文與政化相上下安知今之文果不古類哉顯則誠以吾言求之有合于吾言者吾不謂之今之士也送太學生趙孝先從軍詩序臨海趙君孝先為國子生其父老矣當為兵京師孝先奮曰吾不代父誰當為父言者即告祭酒以願代狀未許則言于禮部事聞詔可之釋其父遣歸孝先得命喜不自勝如疾甚遇藥如積雨獲見日月如羈旅亡聊而獲祿位也即變服以行愛孝先者曰孝先誠愛父矣然何不自重也有才如孝先蓄學踐行如孝先有聲名如孝先旦夕當為美官官于朝而以情請上未必不許也而何急自代為哉為世惜才者曰國家地盡四海執干戈職戰守者如林所少者豈一兵乎而使孝先為之也夫以孝先行能用之誠當其所長于民必有輔益課其績效孰為寡多烏可徇一夫之私願而失良士哉孝先之友方希直聞之曰愛孝先者非知孝先者也為世惜才者安知國家之深惜乎以已視人則巳重而人輕重者宜先輕者宜後也以親視身則身輕而親重苟為榮辱計而忘大義縱得大位何能一朝安中人且不忍為况孝先卓卓良士乎聖天子天運神斷以成大業其所舉措不易而審亦明矣豈不知孝先也豈不知兵之用薄得士之效大也辟之天然將欲暑之必先寒之將欲成之必先難之昭昭生于太隂隆隆隱于至微安知抑之非揚舍之非用乎安知萬金之非輕秋毫之非重乎且士之所學以善俗化民為本孝先一舉而使天下士莫不自濯磨奮發知親之不可遺祿位之不可苟由是而子則為孝由是而臣則為忠有益于人紀豈不甚大其于為人豈不甚可貴乎于是言者謝曰非聖天子之仁不足以遂孝先之志非孝先之知學不能處其身以道信乎士不可不學也乃相率為詩以美之而余書其説以序之篆書考正辨偽序由古以之今存乎勢援今以反古存乎人天下之勢舍厚而趨薄舍謹而為慢舍難成而為易習如水之下流滔滔汨汨不至于極不止非有篤志卓識者不能知其不善而亟及之幸有一人知其不善矣自非達而在乎位亦不能奪舉世之所嗜而挽之復乎古是以二帝三王之禮樂政教餘文舊俗歷數千年以至于今時易世遷幾至于不可復者豈無豪傑之士生乎其間而欲正之哉獨智不足以啓羣惑言之者一而誹笑之者千萬雖欲回流俗之勢而不能也六書于民用最切而其變為最甚自篆而為分隸自分隸而為行草目趨簡易輕涉流蕩而無法使古人復生而視今之字必將駭眩而驚嘆而人顧鮮有知其非者間有好古之士知之而力不足以制巳然之勢不過著之于書以發其所得自漢許叔重説文以來著書之存于世者雖有精粗詳略之殊而其用志深遠終非流俗所及然世之知而好之者巳難乎其人好而能通其意考其得失補其未備而羽翼之者宜乎其尤難也寧海方塘先生王君仲芳自少篤志古學至老不倦嘗病俗字之亂真害正本諸古以正未流之失作文字考正辨偽之書以示學者其言皆有徵據不為臆説使人人因其言而求許氏説文以探古人制作之初意引天下以復乎古寧有禦之者乎雖然文字之學蓋學者之一事耳天下所以治亂存亡者不專在是也并牧變而民無定志比閭族黨變而卿無善俗搜狩師田之法變而國費于養兵讀律飮射之法變而官疲于聽訟其大者如封建學校其小者如名物衣冠其異于篆之行草者曾幾何哉豫嘗妄欲為一書以正訛解惑而未之遂先生之父祕書公以博學多識為元聞人其所受而知者蓋非特字學而巳苟有大于此者論次成書以補六經之遺缺洗百世之陋習豈非學者之所望乎豫庶幾預聞之贈王仲縉序飢而食飽而嬉營私而騖利生無聞而死無述者衆人也食焉而思思焉而行不憂其身之窮而憂道之不修不懼其家之無財而懼乎名之弗揚者君子也衆人之所為切于身而見效近故人之趨事者夥君子之所務事既緩而功亦遲故衆人多笑之而不知衆人之所為又君子之所悲也吾昔年舟還自金陵泊姑蘇城下舟人指城中大第謂豫曰此元偽吳張氏宫也豫問今其家安在則巳無噍類矣問其人名字則巳莫有知者矣及至錢塘道西湖舟人數謂豫言林處士事曰此處士故宅也此處士墳墓也此處士曾逰之地也豫未嘗不為之太息方張氏盛時據數州之富擅王侯之貴驅百萬之人以給其所欲其車服宫室妾媵珍寶騶從師徒僭擬乘輿亦自謂一時之雄矣而今未下十年乃若此處士在時破廬弊褐羸童野鶴出入于煙霞水石間其窮困莫比今越二三百載姓名猶灼然在人耳目則區區之富貴者何足道而士之貧賤又何足憾哉且處士特一詩人其自立者非能如聖賢之宏大深遠足以明斯道而淑來世猶能如是况夫君子之希聖賢者乎吾友烏傷王仲縉年少好學其所志甚美而其鄉人竊笑之以為迀仲縉告豫豫恐其沮于衆人之笑也故告以斯説使仲縉知為學之足恃而益思自勊使衆人知所有者之不足道不暇笑人而自悲也送陳克彬歸臨江序王叔英余自兒童時則聞江西多博學髙才之士衣冠文物之盛甲于天下然其民性率多輕悍忌黠為俗喜爭而善訟故其最為難治而南昌贛吉為甚而臨江為尤甚觀其諺語之傳于四方者可知矣是以天下之仕者莫不憚官于其地而其人之官于四方者亦莫不見憚于人至于旅寓于江湖通途之間者或遇其人亦莫不憚之而不敢驟與之交然余自弱冠以來往往見其人之來官于吾邦者或以廉稱或以能顯或以謹厚見推其愚劣不稱任者固鮮而其以非道御物者亦不多見余固知江西之多才而疑人言不可以盡信矣今年余來金華之永康永康之令劉公某南昌人也丞謝公某吉安人也二公皆以廉謹得民余至永康二公皆先以事去雖不及識其為人而聞諸邑人之言可以知其為君子固亦猶見之矣邑之稅使陳志善者臨江人也數過余邑庠其人溫謹樂易與物無競而其子克彬適自臨江來省為人亦如其父而其才氣又自有出人者余于是益知江西之多才而益疑人言之不可以盡信矣豈其風俗與化移易而其人今非昔比也邪將余之所見皆適值其出于衣冠文物之胄者故有以拔乎其流俗邪是固未可知也使其人皆如余所見固云美矣使其俗果如豫所聞則居其鄉而為其民之秀者豈不宜思所以變之之道乎余聞古之以匹夫而化鄉人者蓋有之矣顧其身之所立何如爾今克彬之歸也其尚益修其身以余前所聞之俗為鄉人戒以去其惡以余後所見之人為鄉人勸以進于善自一鄉而及于一邑自一邑而及于一郡以及于一方使天下之仕者樂官于其地而其人之官于四方者亦見樂于人而旅寓于江湖道途者亦莫不樂其人而願與之交如是則天下之人言江西者不特稱其學士大夫之賢矣豈不盛歟不然而或終使天下之人憚之如余所聞者固非四方君子之所願聞又豈不為彼方君子之所恥哉雖然豫浙東人也浙之民俗視江西伯仲之間耳又安知天下不視之猶江西之人乎余之言蓋非徒以勉克彬也亦因以自勉焉皇明文衡卷之四十一
