front:
  text: 皇明文衡卷之二十一
  hash: sha256:41794ad49e72604689f35d37fe0386d469ae23104e4e60877c2c531f61e4bd25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_021-1a}
body:
  text: 贊龍馬贊宋濂西南夷自昔出良馬而産於羅鬼國者尤良或云羅鬼疑即古之鬼方其地有養龍坑在兩山之中泓渟奫深開闔靈氣而蛟龍實藏其下當春日始和物情酣鬯夷人立柳坑泮擇牝馬之貞者繫之已而雲霧晦冥咫尺不能辨色類有物蜿蜒上與馬接蓋龍云逮天色開霽視馬傍傍之沙有龍迹者則與龍遇謹其芻鼓而節宣之暨産必獲龍駒焉粵若洪武四年六月壬寅夏國主明升以全蜀降獻良馬凡十而其一色正白乃得之於坑者身長十有一尺首高九尺足之高比首而殺其二尺有肉隱起項下約厚五分廣三寸餘貫膺絡腹至尾閭而止精彩明晃振鬛一鳴萬馬為之辟易韀勒不可近近輒作人立而吼上謂天既生此英物必有神以司之親撰祝䇿詔有司以牲牢祀于馬祖然後敕典牧副使臣高敬囊沙四百斤壓之人跨囊上使其遊行苑中久之性漸柔馴適八月癸巳上將行夕月之禮於清涼山璮上於是乘之而出如躡雲而馳一塵弗驚皇情悅豫賜其名為飛越峯復命御用監直長臣馬晉臣繒其真形藏焉臣濂㮷諸載藉漢之元鼎中有神馬出渥窪水中馬之生於水者尚矣養龍之説雖相傳於夷人要當可徵不誣也肆惟皇上以大德而位大寶日之所出日之所沒無不梯山航海獻贄奉琛邇者獨角之犀來自九真食火之雞貢于三佛齊之境其他佹形僪狀藉藉紛紛且不一而足而况此水産之龍馬乎周書有云不寶遠物則遠人格所寶惟賢則邇人安皇上宵衣旰食日懷保於小民巖穴之士搜羅殆盡將圖治安如黃虞時其遐荒殊裔珍育奇産未嘗有心求之所以榮光休氣洋溢中國仁聲義聞充洽八表而龍媒之異自致於天間十二之中揆之於書前聖後聖蓋同一軌轍也其視二師之遣黷武窮兵以索諸大宛者果為何如哉臣濂以文字為職業際茲盛美不敢默而無言謹述贊辭一首以貽諸後世贊曰天駟熒蛟龍升靈泓澄神馬生祥飈瑞靄晝杳冥天一翕聚通精靈龍胡漢郊杜志龍垂胡髯胡乃頸下垂也盈鳬臆輕竹披耳鏡懸睛花雪捲毛光照夜汗溝有血霞流赬振鬛鳴萬馬驚閃流電逐飛星九霄倣佛從龍行但聞瀟瀟風雨聲三川平八極寧真龍媒獻龍廷出入天門駕龍軿太霞五彩滿瑤京皇風淸皇道貞皇威明茫茫堪輿內孰敢不來庭陋彼漢將軍空圍二師城乃知天子在樹德不必連年徒用兵滕奉使贊齊人王蠋有言曰忠臣不事二君烈女不更二夫女之從人一與之醮當終身不改譬之白璧小有玷辱人將斥去而不之顧臣之事君也其理亦同故蠋特並言之事兩夫者雖辨如虞姬智如鄧曼吾知其決非良婦事二君者雖功如汾陽唐郭子儀封汾陽王才如西平唐李晟封西平王吾知其決非良臣嗚呼使此義昭如白日人臣安肯懷二心而國安有喪亡之禍哉東陽滕茂實當宋靖康初以太學正與僉書路允迪奉使於金議割三鎮太原尋奉密詔據城不下金人怒囚之雲中欽宗北遷茂實謁見涕泣請從行主者不之許其後允迪南歸茂實獨留鴈門終身不再仕臨沒令以黃幡褁尸而葬仍刻石識云宋使者東陽滕茂實墓此殆不事二君者與當是時有宇文虛中者亦以黃門侍郎使金見留遂改節易行反面事虜其後雖欲奪兵仗南奔而自贖卒亦不逃君子之譏其視吾茂實果何如也茂實巳矣人至今想其遺節如神龍不可得見至視虛中輩不啻若鬼蜮犬豕有識妾歸亦羞聞之此無他人心天理終不可誣也乃作滕奉使贊用規事君而有二心者贊曰漢有蘇武奉使不屈滕公配之有聲烈烈黃幡褁尸以全臣節如璧之白弗緇弗缺其人雖亡而神不滅上遊帝所凌厲日月降臣見之肝碎膽裂敢述贊辭勒在貞碣𬈑涬生贊𬈑涬生者旴江廖應淮海學也抱負奇氣好研摩運世推移及方技諸家學年三十遊杭上疏言丁大全誤國狀大全怒中以法配漢陽軍生荷校行歌出都門道傍觀者嘖嘖壯之抵漢江濵遇蜀道士杜可大揖曰子非廖應淮郎生愕然曰道士何自知之可大曰宇宙大虛一塵爾人生其間為塵幾何是茫茫者尚了然心目間矧吾子耶然自邵堯夫以先天學授王豫天悅天悅死無所授同葬王枕中未百年而吳曦叛盜發其冡得皇極經世體要一篇內外觀象數十篇余賄盜得之今餘五十年數當授子吾俟子亦久矣乃言于上官脫其籍盡教以冡中書其算繇聲音起生神鑒頴利可大指畫未到者生已先意逆悟可大自以為不及學既成去隱宣歙間遇余安𥙿弋陽將教之安𥙿勸生業中庸生瞪目厲聲曰俗儒幾辱吾康節於地下矣復去之杭客賀外史家晝市大衍數夜沽酒痛飮飮即吐吐即飮不醉如泥弗休醉中嘗大叫曰天非宋天地非宋地奈何奈何語聞賈似道遣客叩之生曰毋多言浙水西地髮白時是其祥也似道未解復召至屛人與語生曰明公宜自愛不久宋鼎栘矣似道惡其言掩耳走生亦徑出過曾淵子家索酒轟飮酒酣作嬰兒啼曰大厦將焚燕猶呢喃未巳耶復賦歌以見意都人士聞之競指以為怪民不與接獨太學生熊晞聖猶時造其廬生私執熊手謂曰吾端居層樓聞空中戎馬百萬來人鬼作哭泣聲壬申襄樊陷甲戌宫車晏駕乙亥長江飛渡似道亦殛死臨漳丙子三宮播遷諸王大臣皆南北亂走噓吸事耳子不去𣣔何為居亡何宋事日非沿江州郡望風奔潰生大慟曰殺氣又入閩廣中吾不知死所矣遂遁去其言無一不驗後四年病死處州學中年五十二無子唯一義女從之生宗堯夫先天之學頗自謂知易每見諸易師傳疏不問淺深輒訕駁以為樂及論後天則尊羲畫為經彖爻繫辭為傳黜文言彖象二傳為九師之言且謂説卦非聖筆不能作上下繫乃門人所述序卦直漢儒記爾蓋生聰明絶人未聞道而驟語數故其論經多失中然性使酒難近又好訐人隂私人面頸發赤不顧罕有從其學者唯國子簿吳浚進士彭復樂師之浚不卒業復屢受唾斥不怨生將遁時召復至口發例手布籌雖平昔所靳若終身不示人者一舉授復復後又授鄱陽傅立云或曰生瀕死語女曰吾死後一月中朝命山姓鳥名使者來徵吾及傳立立當過豫門汝可出藏書示之立當以此致大官後皆如其言所謂山姓鳥名崔鵬飛也生所著書有玄玄集曆髓星野指南象喻統會聲譜畫前妙用數十萬言今猶間傳於世贊曰龍圖成章有文從衡以濬以明以泄其藏以奠乎玄黃昔我素王韋編三絶墜緒微茫誰其我綴我參我腴九師襄之我苞我晶百氏攘之如河之渾如曀而昏如治絲以棼天未降割一髮攸存維洛有士居于百原超神沖漠凝於畫先數往知來小大斯甄莫峻匪崖我陟其顚莫深匪淵我瀹其泉簡材以卑非隱弗傳有冥者冡卒昭以宣或得其載神子言炎炎宋籙維其訖矣長星蝕柳色之赤矣靑祥見徵士髮白矣朋昏以世莫之戚矣魚在在􅑄尚其息矣維生之知中如沸羔彼惛弗知覆謂我狂我狂如何我憂孔多我山我河我用弗磨俾淪胥以訛我酒既嘉我瑟又和我寧不嘯歌北風其涼旗旐央央戎車龎龎蕩蕩江流杭之如陸有腥其穢流血沃沃海氛方􅎋其何能目人有恆言風雨漂搖夏宇障之涉于大川蒸徒楫之楫副宇橈孑孑焉依國武斯隊不知攸戒日隕弗升雖晝作夜梟舞於林鬼瞰于舍孰投是艱曾莫之艾乃惄乃驚乃瞻乃行乃遁死于冥眷生之為胡乃神以著徵之古聖匪程伊度何以言之卒淪于數一曲之淹不通其故易道既泯數亦不類激贊於生發我長喟月出皎兮在天之心在天之心何古何今陸秀夫像贊身抱龍髯兮眼不見水鳳闕雖遐兮龍堂則邇玉雪皎如兮肯汙泥滓赤日出海兮爾心不死文官花贊胡翰覃木之植鍾美於天地著見於古今者其品多矣大率以不恆有為瑞以不多得為貴華平賔連紫脫闊閲國家之瑞也擴代始有之掦之瓊花潤之玉蕊天下之美也豈世所多得哉物皆然今鎮江其地即潤也范氏世居之為望族有花曰文官先世所植也自吳中富人及京洛公卿之家斥苑囿飾亭館競一花一卉之奇以夸示世俗極遊觀之娛者往往求若是花蔑乎未有聞也當唐之世唯學士院有之其曰文官意亦以是邪范氏世業儒以詩書起家為令宰任司臬者衣冠相望於宋元二百年之間其於是花亦有不期而苻者邪天地生物自形而色白者不能以為緋碧者不能以為紫今以一植而具有其美一日而遞為之變其得於造化之妙非人力能致之唐人以戎王子為異花若文官乃異花也夫以造化所鍾之異天下不多得之物而又植於衣冠之族又有名公卿如辛幼安者本其所自而書之製為樂府以歌之雖謂之美瑞可也而會不厠於瓊花玉蘂之列者蓋范氏故閥閲也其花先世所植手澤也非若蕃釐招隱老佛之宮瓊花玉蘂人得趨而見之使人得而見之有力者將取而去之矣則范氏珍之宜至而傳之不廣也天下之物負其所有不自見於世者皆是類也余老矣於世無所好顧以平生不知有此花一旦聞之可為寡陋之歎不能無幼安豪發之情焉乃述其事以貽其後人從而為之贊曰泰圜委和嘉植挺生抱素含貞揚采代榮如彼命服品秩有章下民所望君子之光我徴前聞厥類匪一瑞木四照神芝五色不貴異物邁種厥德于古有訓君子是式靈峰寺植木贊劉基靈峰寺有松杏與朴並植焉劉子見而感之為作贊曰杏葉蔥芋有子可以實籩松枝扶踈有苓可以引年朴狀如樗衆蠹所穿擁腫液瞞不可以鐫胡並植于庭溷厥醜妍明堂求材般趨爾先松戕杏割朴獨宛然嗚呼朴乎孰女之憐維女之全抑棄於人乃獲乎天耶宋景濂像贊王褘外和而神融內充而面睟衣冠雖晉人之風氣象實宋儒之懿夫其知言以窮天下之理養氣以任天下之事隱則如虎豹之在山出則類鳳麟之瑞世後乎千載而有存中乎兩間而無愧此蓋古君子之所難然吾謂斯人之必至筮作贊有序唐肅豫子之欲筮而無蓍請以竹代之豫曰易謂聖人之德幽贊神明而生蓍則蓍固靈矣然地無蓍可廢筮乎屈原離騷云索藑茅以筳篿漢方技傳亦有筳篿須臾孤虛之術説者曰筳竹篿也楚人以結􅋄折竹卜為篿然則楚人之筳篿以無蓍歟夫蓍蔡産也大龜可卜者出於蔡上有蓍百莖下必有靈龜守之蔡非楚地故以筳代蓍而卜焉今越去蔡尤遠蓍或不能致則放筳篿之法無害况吾所以質諸神者在誠不在物之既作之因為贊俾刻其櫝云辭曰祝􅔼蝪以祈雨龍之同類也禁原蠶以助牧馬之同氣也繄竹之視蓍均􅋄彚也虛中弗窒又圓其外也虛則有靈具乎智也蓍百莖而同本合萬殊為一致也以有代無理或弗悖也爰韜爰櫝受命則出也載營載畫吉凶以示也於戲泰筮神明之攸寄也曷竹曷蓍惟秉誠之無二也太師韓國公畫像贊蘇伯衡堂堂韓公秉國之成鴻業以定經費以盈羣賢以進百度以貞四夷以服品物以亨公初無作孰得而名天實生之光輔大明天下之士睹其儀刑想其風采不謀同聲曰漢蕭何唐之玄齡功成而退不伐不矜袞衣朱舄安享尊榮蒼顔白髮時遊大廷其德日新其福日增天子萬壽共享太平宗忠簡公畫像贊公之力足以旋乾而轉坤公之功足以攘夷而安夏始以一言能返北旆而南還後以二十四疏不能回南轅而北駕且留鑰之任方切而巧言遽入於帝聰度河之志未酬而大星已殞於中夜何人之於公則知媚嫉而天之於公則不知假借此有志之士百世之下所以想英風而激昻拜遺像而悲吒也象山陸先生贊趙東山儒者曰其學似禪佛者曰我法無是超然獨契本心以俟聖人百世敬贊先正誠意伯畫像劉仲璟虬髯電目探天根兮斡地軸扶龍興雲四方以肅以生民休戚為憂喜以大道晦明為榮辱武功既成而文治未盡其用者蓋天也耶抑人也耶田疇贊有序方希古智勇人之所有也善用之為難忠義人之所慕也審處之為難天下非無豪傑之士而功不見著於世何耶豈其智勇之不及忠義之沮喪歟用之失其時處之逹其機者衆也荀或不用於曹操則可以比子房董卓呂布不為逆亂則可追韓彭廉丹王尋為漢而死則有以與周奇等而皆不免於君子之誅其迹同而其所為異也漢末之亂酷矣余求奇士於其時得一人焉曰田疇忠不避難勇不畏死奮然感劉虞之遇而思為之報讐公孫瓉既亡謂可以盡力者漢室而已故應曹操之辟既而知操非忠漢者也故辭封侯之爵介不同俗淸不悖倫忠在樹功義不茍合其才良其行果蓋豪傑之士非當時姦雄所及也論者眩於成敗使操以可功見取而疇之志義不大章明於後世豈不謬哉孟子曰人有不為也而後可以有為若疇者庸非其人耶其不成功者命也豪傑之士制於命而不獲施者衆矣善觀人者觀其志不觀其事觀其器不觀其位由是而言士之不幸者獨疇乎哉吾是以悲而贊之其詞曰古之觀人不於用舍考其所存以第高下譬諸龍駒垂首糞車豈以其賤斥之為駑齊侯千駟如南面王仲尼之嘆夷齊有光漢季分爭得國者操吾獨何為田疇是悼操雖據國大鼠之雄殺后無君天下不容奚若君疇忠義蓋世委質劉虞身死靡二使受之命為漢大臣殺操復漢必不顧身嗚呼鄙夫惟利是就誰能為儔我與為友翰林待制華川王先生畫像序贊傳曰國之將興必有禎祥其得人之謂乎故善觀國者不觀其甲兵之雄財粟之多土地之大而觀其得人賢否誠得其人弱可強敗可成不得其人雖威力富庶敵於海內亦不免於亡天將授人以天下亦必授之以守天下之器賢者之所在天下之所歸也當國朝之始興地界於羣雄之間最微矣然是時有數君子者皆起而從之識者巳知天命所屬既而或以功業定亂或以文章贊化卒能合四海於分裂之餘不越十年遂致平治嗚呼是豈非天哉烏傷王先生充在數君子中博辨通達以文章名上之為吳王授江南儒學提舉司教理升禮部侍郎兼引進使轉起居注出同知南康府事及上即天位召入議禮改章州通判會詔修元史遂徵還與金華太史公俱為總裁及史成拜翰林待制未幾而出使西夷雖未獲究其設施然其有益於國者大矣世之趨近功者恆謂儒者不足為時重輕此非知本之論譬之人身彼一才一藝者猶手足耳目然而賢者則元氣也人見手足之能持行耳目之能聽視而不知皆本於元氣不亦惑哉某幸受業太史公而以未識先生為恨先生之子紳以畫像見示乃敘而贊之曰天眷有明勃然龍興豈惟智謀得人乃成其人伊何匪將匪相爰有君子海內之望望既歸之孰能違哉彼王彼侯小大畢來惟華川公蔚其文雅位雖不崇各動天下人知其名豈知其心我懷德音山高海深義鸛贊并序高啓吳報恩寺浮屠之顚有鸛二巢焉以遊以宿出返必俱一日其雄里脛輪索中奮翼自擲空懸弗脫雌下首大鳴若籲于人衆憐之莫能升遂宛轉而絶雌依其傍弗去羣鳥欲磔之輒引喙怒逐不使近逮毛骨盡化乃巳余居直寺東嘗見其倣徨飛旋形貌慘悴風雨之夕哀唳噭噭若號慕然余念夫世固有伉儷相悅者矣一旦失所天哀未改而巳他適塗膏自媒唯恐非艾晨咷夕􅛐曾無含忸世嘗以禽喻惡人寧不辱是鸛哉乃贊曰嗟爾鸛乎維鳥之特猗雄死自守禦烏之賊猗獨棲于標夜失其匹猗哀嘶返顧不啄而食猗厥質始化豈貞之魄猗匪魯黃鵠孰配爾德猗戴院使贊茹常神間以淸氣和以平質頎而厚貌澤而明學則究軒岐之奧書則啓金石之經昭代之老處朝廷蓋得其道醫國之手雖蠻貊亦知其名懷仁慕義秉德存誠是宜受高皇之奬譽荷仐上之寵榮齒餘八帙而強健身備五福而康寧若夫託泉石之高致締松桂之幽盟彼畫史者徒知寫其歸隱之趣而莫能得其戀闕之情也耶陶弘景讃王達士之善於觀人者往往不於其所之所巳為而必原其心之所隱微者而觀焉惟能原夫心之隱微者而觀之則其為人者昭昭矣彼泥其迹之顯然者而觀之夫豈得容偽於其間哉吾於齊梁之際得一士焉陶公弘景公生而有異四五歲即知用荻畫灰以為書甫長讀書萬卷以一事不知為之恥齊高帝作相用為諸王侍讀彼時雖在朱門閉影息交不外物接永明間挂冠神武門巳上表辭祿矣當斯時也窺神器者匪一人朝為君臣暮為讐敵朝為揖遜暮胥篡奪雖欲以力濟之奈天道之未定何於是自勾曲遍歷名山尋訪仙藥每經澗谷必坐臥於其間所居皆植松聞其聲輒欣然為之樂性好著述凡隂陽五行風角星算山川地理方圓産物醫術本草罔不洞究自以為神丹可成壽可致梁武資之以黃金朱砂等物亦不靳而受之至八十五無疾而逝夫當太淸之際以梁武為故人取宰相如拾芥此衆人所不能得而公可得者可得而公恬不為之意茫然與世相忘焉公之賢為何如蠱之上九不事王侯高尚其事者不偶於時者之所為也公可謂偶於時矣而猶不出者庸詎知天下無可事之主哉故其詩曰夷甫任散誕平叔坐論空豈悟朝陽殿遂作單于宮厥後天下玄理荐興武事日弛侯景纂位實在昭陽然則公固有遠慮先燭之智矣亦豈可謂公為長逝忘返而無憂世之心者哉豫故仰其高風想其遐躅原其心之隱微者為之讃曰蓬蓽既高芝蘭斯晦梟梟成羣鵉鵠斯退君子知微默領心會醇酒雖甘詎宜忘醉哲哉陶公靡所不通粳粃富貴勾曲之從月高秋肅一枕松風安知其他我保其躬彼不知者謂公少疵山中宰相天豈介而我知公心淡然無為不與物絶龍變是宜上陵下替世道日榛寧於其時俯仰屈伸煙霞泉石今古乾坤高風邈哉不見其人自題侍教像贊楊士奇此老之生今七十有三年其仕凡三十有七歲歷事四朝恆持一志顓顓乎毖愼肅肅乎嚴畏不敢內非類之交不敢徼非義之利祿愈增而意愈淡秩愈進而心愈惴治官務如家務視海內如室內雖不能萬一之有濟而不敢須臾之或怠誠懼上孤明聖之恩有忝淸白之世閲春華之屢謝撫寒柏而猶翠聊自寫其素存示同宗以袛勵族孫挺來北京旦夕在左右里蕭生為寫侍教圖挺以求贊因謾書此然士之師古挺尚從事乎遠且大者可也七十歲自贊楊滎荷蒙先世積德之厚叨承列聖眷遇之隆久侍禁近兾效愚忠當齒力之既衰尚責之愈崇目愧乎進無所補退不我從徒存心之兢兢而懷憂之忡忡惟古人堯舜其君民者素景仰其高風思勉焉而不懈期一致於初終者也故延平守胡子祺贊鄒緝故延平太守胡公既沒三十年緝始得其墓表而讀之為之嘆曰嗚呼士惟患不見用耳未有用而不見其效者况得顯行於其位其大小設施豈得不有所見哉國家初興凡所選擢必擇其才良端直之士而任之士既抱負其所有故見諸有為皆足以震耀於當世而其所立類非迂儒俗士所能及若公是已公以洪武三年應詔至京師受知太祖皇帝擢拜監察御史即上書論遷都關中事其後出為按察僉事調知彭州升知延平府事以沒公在風紀不為激擾之政而人畏其威蠻服其化獄以常空其為彭州築隄堰修水利勸民務本力業郡中翕然稱治至為延平聲稱尤著至今延平之人能道其行事蓋其愷弟之化有以信於人而其才德又足以服之惜其名位止於此不克臣於久遠也昔何武為楊州刺史凡所刺舉未嘗敢自私而又仁厚以處下故郡國各重其守相張詠知成都寬嚴適中威惠信於人故既薨而蜀人為罷市蘇子瞻謂其遺愛蜀人久而尸祝之若公可謂無愧於公者矣公之次子光大為春坊右庶子與余為同門友既覩公之事乃追為之贊曰昔在太祖勤思賢輔有偉哲人實承知遇布衣登朝居法從班還都之議動于天顔內臺外憲荐揚風紀兩紆郡符嗚玉曳履材宏德碩無積不施惠愛所加民自懷之肅肅之儀瞻望莫及箠䇿之從願為公執鏡容自贊楊傅資可以為學而理或未明時可以行道而力有不至緬懷古人夙夜惟厲而莫及焉嗚呼老矣吳敏德像贊王直海虞吳敏德為都察院右僉都御史特敬愼之心秉廉直之節其議論舉措蓋有前賢之遺風視世之隨俗變化方外而圓內者相去遠矣此其像也而豫為之贊允毅吳公率德自躬聖明御邦克躋顯融豸冠峩峩邦之司直必誠必恭不詭不激雍容進退端笏垂紳小人所憚君子所親維昔名臣始終一致神之相之福祿斯備風霜肅物生意實存願弘厥施以暢皇仁自贊小像其才學則迂踈其志行亦狂簡幸逢時以效愚每惴惴於自反然僚友謂之強而主上謂之板愧變通之未能徒為達士之所莞也強者矯亢不阿之名板者愚執不通之謂蓋氣質蔽固之巳深而學問變化之未至若謬比於憸邪則難合乎公議雖內省之無愧然豈敢忘敬畏也哉訥齋贊金實言可訥乎心因言以宣道假言以傳言不可以訥也言不可訥乎身由言而困事由言而僨言不可以不訥也訥乎訥乎殆將訥其所不當言而不訥其所當言也夫在鄉黨則恂恂在宗廟則便便是為訥之謨伏生授經圖贊有序周敘伏生諱勝濟南人也桉史記伏生故為秦博士孝文時求能治尚書者天下亡有聞伏生治之欲召時年九十餘老不能行於是詔太常使掌故朝錯往受之先是秦焚書伏生壁藏之兵興流亡伏生求其書亡數十篇獨得二十九篇即以教于齊魯之間學者由是頗能言尚書諸山東大師無不涉尚書以教矣又按漢書顔師古注當錯受書時伏生老不能言言不可曉使其女傳言教錯齊人語多與頴川異錯所不知者凡十二三略以其意屬讀而巳是圖蓋當時授經之象申坐者伏生旁侍者其女前跪而坐者錯也圖用縑素僅二尺而蒼山古柏靈芝石牀書几之狀莫不曲盡巧妙畫者之意亦工矣哉於戲聖人之道寓於六經而書者二帝三王治天下之大經大法所由載有天下者不可不以之取則也使非漢文求之伏生傳之天下後世將貿貿焉莫知聖帝明王精神心術之所寓而道晦矣愚故謂尚書一經不幸焚滅於秦幸而表章於漢尤幸而傳授於伏生也且是時伏生年巳九十餘使漢文求之不早不幾於泯焉矣平然則是書之傳豈非天耶而其所以繼往聖開來學之功又豈居漢之諸儒後哉戶部員外郎高君信以是經登進士歷官朝著有聲家藏斯圖命工裝潢成軸以余家傳是經也求識之久之未敢執筆而高君之請益堅敬用書其故而為之贊曰大哉聖道寓諸六經煌煌尚書實統厥成秦亡漢興斯道幾晦展也伏生爰際其會心惟口誦以教以傳朝錯之受漢文之賢斯文千載既晦而顯展也伏生其功不淺咨爾後學是仰是宗拜瞻圖像邈焉高風文昌帝君像贊劉定之有以孝陵御容傳寫為文昌帝君像者臣定之稽首贊曰日行于天光寓萬形全得為月分得為星雲得為霞雨得為虹影得水底火得鏡中圓明晶彩晶彩日同於皇開天自天陟降其寓于兹文昌帝像主世之文緯地經天有赫厥用無私其權沖天烏紗朵雲龍𫀆就之日近望之天高臣拜稽古古亦有是宋仁宗像即真武帝皇明文衡卷之二十一
