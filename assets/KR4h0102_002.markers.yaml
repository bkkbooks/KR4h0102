  - {type: variant, offset: 11651, length: 0, content: '', WYG: 迎刃而解落籜以從桃笙籧笛織翠生風䌫維砥柱力綰艨艟干旄孑孑旌旗蔽空彤管煒煒横出詞鋒簫韶九奏至和攸同他如器使惟適所逢皆所以弼成人用而翼賛天工者也爾之為質外方内塞肌不柔順性復挺特櫽栝莫施何堪組織豈非才不適用而名浮其實乎言既而去逡巡就睡夢一𤣥叟頎然而長雙眉入鬢氅衣無裳頭角峭厲棖立木僵歴階而進出聲琅琅凡今之人喜圎惡方頃聞誚譏顧不敢當予非舎圎而不居蓋亦天賦之有常矧夫方圓不侔自昔為訒豨膏棘軸不能獨運鑿枘異投終底于吝黯直見疏𢎞詐乃近正論天人江都逺擯恢諧詭竒金馬日進固知鬻圎以遂私不若執方而自信也且物生而才罕即安處雕礲斵削自致困苦樗櫟臃腫斧斤莫尋桐杉赬野枳棘成林天嗇}
