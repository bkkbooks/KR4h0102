  - {type: variant, offset: 5846, length: 2362, content: 平胡詩洪惟上天眷佑我國家皇帝陛下以至仁大聖纉承太祖髙皇帝鴻業爲億兆生民主綏靖涵育四方萬國林林總總之生皆皷舞忻戴趍走承奉惟恐不及至於朔漠氊裘瓣髪之衆各率其属歸誠慕義拜俯闕下蒙荷官賞者不可勝計惟本雅失里弗率倔強化外皇上推天地之大德謂率土皆朕民其可使一芥獨失其性屢發詔使撫徠之虜弗悛益甚要執我使臣侵擾我疆埸疆埸之民罹其毒虐皇上憫焉弗寜謂皇天旣付予天下天下有一民一物失其所予曷敢坐視不䘏且仁者不姑息畜患以厲民虜怙終不可赦予必躬徃視師以永寜我宗社生民時車駕廵北京詔皇太子監國至是復詔皇太子告天地宗社及詔告天下以發兵所由遂命將閱師永樂庚寅二月丁未車駕發北京旣出塞踰五雲關道壓虜舟龍旂所嚮上天助佑風日和融消剥寒沍坤靈恊賛磧滷之野咸出甘泉㓗清芳冽随地而有士馬所過無不飫足衆心􅌚懌咸懐敵愾五月巳卯車駕次玄𬈑河本雅失里率衆迎拒皇上以數百騎獨先大破之諸將率麾下繼進奮驅逐北本雅失里盡棄其族屬牛羊輜重以七騎遁去諸將咸請追戮之皇上謂帝王除暴祛之而已不窮殺以爲武時將士生縶虜衆來獻者萬計詔悉去其縶虜衆有釋兵以其屬來附者又萬計皇上進而諭之曰若等悉吾民困于兇孽懷蓄憤欝不獲自歸乆矣今朕不遠萬里來爲爾除害勿有疑畏悉給予所獲孳畜俾自擇便地以居皆􅌚喜膜拜舉手加額呼萬歲虜衆遂平獨支冦阿魯台初聞天兵且壓境率衆先遁上曰此虜竄匿不能遠當還師撲之如拾芥耳及班師六月甲辰至静虜鎮冦衆來奔者具言其狀徑搗之冦迫急請降上曰虜欲緩我師耳必詐也麾將士上馬控弦以俟言未旣虜悉衆薄我右翼諸將赴之未决上麾虎賁三千奮進斬虜虜大震怖悉解甲去弓矢俯伏降阿魯台以數騎遁去遂誅其同惡盡釋其餘從而撫定之繇是瀚海迤北沙漠萬里悉平悉寧封山勒石紀述功德告示萬世七月壬午車駕至北京中外臣民懽忻舞蹈臣惟夷狄世爲中國患莫甚北虜皇上乗中興之運奉若天道恢弘治化奮揚神武廓清六合功德隆盛宜有詠歌宣播無極臣忝執筆從詞臣後謹撰平胡詩一首上進詩曰皇明受命綂御寰宇皇帝仁聖承序太祖以敎以理洽于率普神化所濡涵泳鼓舞逖彼朔土負恃遐阻弗馴弗㤤執我使者横縱桀驁跳梁醜䰩毒其與處連我邊野人之鞠窮鬰憂以癙呌號旻天盍于我抒皇帝仁聖憫焉興憷曰時天氓彼敢虐苦惟天命予予曷敢捨彼絶于天匪予志武乃命將臣整徒閱旅告誓啓行以類以祣六師導御萬乗從扈如雷如霆如飊迅騖萬里一瞬飛越峐岵謨斷自天孔神且訏計遐測幽瞭如眝暏逖彼朔土夏不觧沍芒芒磧滷沃渇惟乳皇德格天昭畣靈祜春晹流敷融麗昫昫甘泉洋洋徒乗厭飫競奮敵愾踴躍馳赴搗其狡穴玄㝠之滸揮戈擊殳闞若虓乕虜急在鬴強抗螳斧殱之糜腐縱惟七馬乃有支孽潜伏于莽一鼔而獮迅於焚羽肆犂其薮散其蔵聚皇帝有詔厥衆咸赦解其縶縛綏其降附曰予寕汝汝罔予懼汝飢錫汝馬牛肥羜蘇其創殘伸其噢咻如旱惔焚霈施甘雨懽呼膜拜皇帝聖主我昔罔知今我父母皇帝神武徳施弘溥惠彼朔野同我中土夷堠去防罷革邉戌邉人肆寕如愈沉痼虜人始悔知㝱斯寤徃來孚好無有疑迕帝曰康哉其還予駕雍雍凱歌懽騰載路四方萬國奔賀拜俯皇帝功徳超冠千古相彼自古夏殷而下漢唐暨宋咸弊戎侮于備于禦不以晨暮財殫力劬卒罔驅去帝御九五降治弘化肆揚神武抉剔民惡洗濯曠蕩俾民得所五兵偃戢四海熈豫宣昭人文丕闡皇度億萬斯年永降宗社臣謹作詩以繼肆夏清邊頌鄒緝臣緝稽首頓首言臣伏惟皇帝陛下以天錫勇智之資具聖神文武之徳紹嗣太祖髙皇帝之綂緒克勤克愼懷保小民外暨四夷咸加惠撫威徳所至無逺不服東極朝鮮日本南踰交趾西抵番戎大邦小國以至海外諸蠻夷君長悉皆臣附來朝貢獻不絶而獨比邊殘胡遺孽未底寧順徃者阿魯台梗化弗庭數爲冦害皇上親御六師以討之阿魯台奔命不支由是疑塞稱臣朝貢于闕下皇上功德之盛巳莫與並矣惟是瓦刺三酋昔受封爵于朝爲邊疆之臣而乃背恩棄信阻兵搆逆與其黨類互相讎殺且復冦掠我邊境殺傷我人民皇止以爲此叛命之臣不可以不討之也復選將命師親駕徃征之六月進至撒里怯兒之地遇虜兵與戰擊走之追至土刺河虜酋大集其衆據險阻以拒我師我師勇銳齊發左右奮擊大破之殺其酋長及其衆數千人追奔逐北虜救死扶傷不暇乗夜遁走漠北爲之遂清乃命諸將班師而還至飮馬河和寧王阿魯台遣其酋長來朝上撫以恩信慰而遣之六月振凱還北京臣緝於是稽首頓首言曰自古聖德之君必以安攘爲首務盖斯民旣安而夷狄未除終爲邉境之患在周之時玁狁作難宣王興師以伐之觀之六月之詩可見矣漢武帝之逐匈奴唐太宗之擒頡利皆以其患害滋甚不得而不討之也五代及宋契丹女真迭盛復爲中國患而逹旦之元遂有中土以夷裔變華夏中國之民辮髪左袵爲夷伙之俗者㡬百年我太祖皇帝受天明命起自布衣躬親師旅削平冦亂掃逐戎胡北出于沙漠旣已一洗前代腥羶之習復還先王衣冠之治矣皇上紹承大統繼守先業復剪剔其芽枿而剗盪之神謀睿筭預决勝於萬里之外以成千古所無之功使三邊永寧天下蒙福眞所謂功高百王而紹隆古昔帝王之治也臣緝不勝慶幸謹撰永樂清邊頌一篇拜手稽首以進其辭曰聖王在御四夷咸附悉享悉臣孰敢違忤天之所覆地之所承殊方絶域莫不來庭蠢玆醜虜包有遺枿煦沐涵恩以長以息惟皇之德懷附以仁錫之封爵俾長其人大漠之墟窮隂之野息養蕃滋以有羊馬乃逞其兇乃肆其奸驕欲是爲因搆兵端同類相讎遏我來附掠境盗邊以啓皇怒皇帝曰吁曷可不治冝飭六師徃伐殛之乃修我戈乃整我旅乃奮我謀乃振我武旗纛旄鉞連屬後先摐金伐皷震盪山川北出興和直指沙漠虎旅長驅聲震窮朔進抵其巢索虜震驚百萬之乘如雷如霆如熊如罷莫不齊奮電掣飈馳川嶽變眩天戈所指孰有不摧旣殱其衆亦殞其魁逷彼大酋剪其遺蘖投石糜鷇振枯隕葉隂山澣海所向無堅順附則全違迕則顛旣剗旣除旣獮群醜盪剔腥羶踈遠斥堠旋師飲馬撫納降胡綏之懷之其來塞塗凱入居庸萬民呼抃鐃吹髙喧懽騰交甸邊塵絶息皇心攸寧飮至䇿勛賞賚兼行爾侯爾伯錫爵進秩爾將爾吏咸加優恤皇曰汝士惟汝予功嗟汝勞瘁其休汝躬無功不酬無勞不録凡在于行悉蒙優渥群方九有同仰大明無小無大各遂生成乾端坤倪清夷軒豁異域殊邦悉從包括聖功旣遠聖德益昭霈澤旁施上齊軒堯選賢任能置在左右同享太平以期永乆三邊静謐烽燧不傳於皇聖世惟億萬年, WYG: ''}
