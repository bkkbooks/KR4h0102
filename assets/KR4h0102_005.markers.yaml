  - {type: variant, offset: 6578, length: 360, content: 親征胡虜回鑾百官賀表楊士奇欽奉敕書五月十三日大駕親率六師掃蕩胡冦撫輯降附沙漠永清誠宗社生民太平之慶謹奉表稱賀者臣某等誠懽誠抃稽首頓首上言伏以帝王之治綂育於萬方仁義之師無敵於天下博施洪恩而濟衆駿揚神武以除殘廓靖北陲奠安中夏臣民懽抃海宇淸寧恭惟皇帝陛下廣大高明剛健中正惟萬物之得所溥一視而同仁舞干羽于兩階昭郁郁禮文之盛執玉帛者萬國致源源朝覲之來獨玆窮北之孽胡蠢焉自外於皇化拒招懷之綸命遏撫諭之使軺數犯邊疆肆虐黎庻蓋恣行而罔畏畧無悔罪之情不得巳而用征誠爲保民之計植黍稷豈留於稂莠育鸞鷟必剪於梟鴟萬乗親行運神謀於霄漢六師奮發掃氛翳於遐荒加烈火於鴻毛震迅雷於蟲户兇渠盡馘恩命覃宣撫綏殘弊之氓敷布融熈之澤春榮秋肅皆本乾元之仁日彩星華煥麗天旋之景湔雪前王之讐耻肇開永世之升平臣等欣候凱旋恭攄賀臆仰皇明於六合如日方中祝聖壽於萬年與天同乆, WYG: ''}
