  - {type: variant, offset: 3420, length: 264, content: 而因事得書者曰死毁正綂陵廟宫室名其主用兵不曰討不曰征伐刑其人不曰誅天下怨而起兵惡而起兵不曰反惡乎篡弑非惡乎君也惡乎夷狄惡乎女主非其君故不得以君道臨之也惟於其臣於其部落則得致其罪士之仕變綂者䏻安中國則書䏻止暴亂除民害則書䏻明道術於後世則書有愈貴而愈賤者有愈賤而愈貴者利祿寵倖之臣愈貴而愈賤也守道不汚之士愈賤而愈貴也故君子之於變綂外之而不親也㣲之而不尊也㫁㫁乎其嚴也閔閔乎恐其乆也望望乎欲正綂之復也是何也爲天下慮也奚而爲天下慮使女主而乘君位夷狄而踐中國篡弑而不亡暴虐而繼世生民之類幾何而不滅乎立變統所以扶人極䏻言抑變綂者君子之所取也, WYG: ''}
