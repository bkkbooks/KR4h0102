  - {type: variant, offset: 2717, length: 683, content: 夫如是而後正綂尊奸邪息夷狄懼釋綂下夫所謂變綂之制者何也異於天子之禮也彼生以天子飬没以天子葬儼然帝中國而臣四夷天下莫與敵大矣曷爲而異其禮蓋其所可致者勢也不可僣乎後世者義也勢行於一時義定於後世義之所在臣不敢私愛於君子不敢私尊於父大中至正之道質諸天地參諸鬼神而不惑也何謂天子之禮正綂是也正綂之君始立則大書其國號謚號紀年之號凡其所爲必書所言必書祀典必書封拜必書書后曰皇后書太子曰皇太子后及太子没皆曰崩葬必書其陵其謚有事可紀者紀其事所措置更革曰詔曰令曰制兵行曰討曰征曰伐施恵曰赦曰大赦施刑當罪曰誅曰伏誅違上興兵者曰反曰作亂曰犯曰冦曰侵倍之者曰叛其隣國其臣慢之者必因事貶之知尊正綂者雖㣲必進之不幸而至於衰微受制於強暴或屈而臣之強暴者誠夷狄也誠不可爲正綂也則盗賊之雄耳必慎抑揚予奪之辨其以兵侵也曰入冦得地曰䧟㨿都曰㨿至闕曰犯虜正綂之君必易辭書其故見殺曰弑而書其主之名及其主之没也特書曰死其黨之與謀陳力得罪於正綂者雖功多皆書曰死以著其罪以紀其惡得中國之地其民有思中國而叛之者曰起兵以地降者曰來㱕不爲中國而反者彼亦不得而盗賊之也亦曰起兵得郡則曰取某郡其誘正綂之臣曰誘埶曰埶殺曰殺將相則名其主正綂之臣降于夷狄則夷狄之死不曰卒而曰死凡力䏻爲正綂之患者滅亡則異文書之以致喜之之意正綂亂亡則詳書而屢見之以致惜之之意變綂之異於正綂者何也始一天下而正綂絶則書甲子而分註其下曰是爲某帝某元年書國號而不書大書帝而不書皇書名而不著謚其所爲非大故不書常祀不書或書以志失禮或志禮之所從變則書立后不書尊封其屬不書非賢臣雖王公拜罷卒葬不書行幸非關得失不書詔令非有更革不書其崩曰殂后死曰薨大臣曰卒佐篡弑賛征伐以危, WYG: ''}
