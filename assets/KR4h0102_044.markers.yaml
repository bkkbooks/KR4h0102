  - {type: variant, offset: 6015, length: 0, content: '', WYG: 亦不起天順改元予始被命入内閣言及先生學行之懿忠國石公慨然上疏薦之朝廷遣行人齎璽書幣帛徃聘於其廬既至京師上喜其來陛見之日即拜左春坊左諭徳召至文華殿從容顧問寵賚有加先生以衰病不能供職固辭上堅意不允留之數月見其病勢弗已乃允其請復賜之璽書賚以白金彩幣仍遣行人送還故里令有司月供廩餼冀有精力著書以迪後學聖心眷望如此其盛蓋曠世所未聞也昔者范文正公謂嚴子陵與漢光武以道相尚而使貪夫廉懦夫立為大有功於名教以今觀之皇上之量尤大於光武與弼之志不下於子陵君徳由此而益光士風於是乎大振而國家元氣亦將藉此益厚矣豈曰小補之哉予既得與先生靣見其學極高明動遵古禮有}
