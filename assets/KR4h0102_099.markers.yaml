  - {type: variant, offset: 2655, length: 240, content: 先違天悖徳負義忘息自逞梟獍之雄烏合犬羊之衆旣侵犯邊境而拘晋上皇復入冦京畿而震驚陵廟其爲仇恨庸可勝言且以和議一事論之當去年秋冬之間正虜勢方張之際朝廷亦甞遣都指揮李鐸指揮岳謙䓁賫執金繒徃使虜庭賄賂纔入於窮庐虜騎巳至於関口繼遣少卿王榮通政王復又徃虜營不見上皇鵉輿而還虜衆知我戦守有俻㝷皆望風遁去朝廷灼見虜情譎詐和不足恃以故絶使不通徃還惟勅邊將修武俻勵人心固守城池相機戦守今許貴又奏和議之說臣䓁竊惟今日之事理與勢皆不可和何者中國與冦有不共戴天之讐和則背君父而忘大義此理有所不可和也又醜虜貪, WYG: 然}
