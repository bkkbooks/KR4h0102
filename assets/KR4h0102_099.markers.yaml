  - {type: variant, offset: 1818, length: 656, content: 官軍相機截殺追赶累次奏報外切見邊城軍民趂空樵採柴草搶割田禾度日不爲經常之事卽目正當農種之時雖令各人照舊耕種但聞邉墩不時舉放砲火人心驚恐自不安生况今逹賊聚集人馬衆大少者五七千多者一二萬整陣入境攻圍各城在邊軍民人䓁不敢出城樵採收割又無經營各衞倉厫舊歲民間該納秋夏粮料草束爲因路阻運送不前見在邊儲官軍馬匹按月支給有减無增再照西路五衞馬隊原有官軍四千九百二十員名先於乾沔䓁處與賊對敵陣亡中半囬衞見在者又有𬒳傷旗軍告令弟男替代俱係未經操習戦陣之人舊役慣戦馬軍十無三四又况見在馬匹止有二千一百餘匹中間多有新例借勸收買兒騾小馬不堪騎戦十有二三比與原舊馬數缺少二千八百餘匹及照本年二月内臣差千戸張鑑𬋩領無馬官軍一百八十一員名前去墳嶺墩設伏有賊到墩攻圍未戦之時內有逹賊三人通曉漢話呌稱我一箇是女直同知一箇是浮石叅謀一箇是哈宻指揮我耒近墩打話你毎聴着要講和着𬋩你毎的大頭目奏將去連夜差使臣來我毎便囬去你若不耒講和我每三班人馬輪流打攪你不得種田等因已行具本奏報外今賊聚衆復入境內攪攘軍民不得耕種切慮四月以後青草茂盛倘若賊势衆大就於腹内駐劄趂草牧馬城門關閉人不得樵採馬不得牧放欲便興師戦闘尤須量巳料賊設若寡不敵衆如之奈何臣一介鹵夫昧於戦守誤䝉聖㤙濫叨今職晝夜懷憂不能𥙷报伏望皇上憐憫在边軍民乞敕在廷内外文武大臣将前項打話賊人要行講和情由從長計議便利上䇿分免聖主之憂臣之愚見莫若遣使賫敕與賊假以和好爲詞暫示休兵照舊修飭墩隘廣積边儲練習士卒飽飬馬匹宻定討伐之計若賊仍復逆天背理侵犯边城我旣有俻以逸待劳守边將官運謀出竒統率銳士奮力復仇務在一皷, WYG: ''}
