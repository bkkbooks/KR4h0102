  - {type: variant, offset: 2998, length: 253, content: 将如張韓劉岳之徒屡敗金師及奸臣秦檜一主和議朝廷旣割境土以與之又輸歲幣以賄之甚則不得已降去尊號其爲含垢忍耻屈巳從和固無所不至卒之人心觧體國勢陵夷無救成敗而後已楥古證今和議之不足恃也明矣爲今之計莫若選将練兵飬威畜銳賊若來侵則相機而勦殺賊若遠遁不貪利以窮追萬一虜冦罪惡稔盈鬼啓其衷復有大舉入冦之謀則我兵操習有素加以將帥思舊臣䓁當盡死効力以圖勦㓕以雪國耻必不出犬羊之下其或皇天厭亂列聖有靈黠虜自知數冦不利變惡爲善遣使入貢則示以善意量與賞賜遣囬亦不柜絶而巳若欲朝廷先遣使臣徃彼通好則示彼以弱而啓其輕侮之心萬萬不可此則, WYG: 于左}
