  - {type: variant, offset: 3252, length: 288, content: 今之要務而臣䓁之愚見止於如此也及照許貴叨居重任保障邊方不能銳意㓕賊却乃倡爲和議畏縮之跡旣明忠義之心何在合將本官明正典刑以謝天下以戒将來縁係陳言事理又係俻邊將官合無姑記其罪差人馳驛賫文切責許貴令其整飾邊務橾練軍馬作興士氣固守地方必期㓕賊以贖前罪如仍退縮誤事治以重罪仍通差人賫文前去遼東宣府大同陜西䓁邊及永平山海居庸白羊𬗋荆倒馬䓁関口總兵鎮守䓁項内外官員令其整搠人馬固守地方如遇賊冦來攻務要相機行事毋得聴信哄誘因而失誤機務仍通行在京五軍三千神機䓁营総督總兵䓁官嚴加訓練官軍諭以忠義大節使之感激思奮以圖成功不許茍且因循致誤大計縁奉欽依兵部知道事理具題景泰元年四月十九日奉聖㫖是欽此㝷, WYG: 云尋}
