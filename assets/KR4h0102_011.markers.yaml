  - {type: variant, offset: 4942, length: 902, content: 帝諷道籙院言朕乃上帝元子在天為神霄玉清王長生大帝君憫中華𬒳金狄之敎􅈤請於上帝下降人世為人主令天下歸于正道於是羣臣與道籙院上章冊帝為敎主道君皇帝時帝方寵信温州道士林靈素靈素言劉貴妃卽九華玉眞安妃蔡京卽左元仙伯王黼卽文華吏已卽書罰仙吏禇慧皆從帝自天降生者也帝賞賚靈素無筭賜號通眞逹靈先生升温州為應道軍令僧尼改學道作千道㑹靈素據高坐講經士庻入殿聽講帝設幄坐于其側所言鄙俗雜以嘲詼用資媟咲莫有君臣之禮後靈素與道士王允誠爭寵毒殺允誠益自恣遇皇太子弗歛避太子以為言斥還死于故里一佛本夷狄之人而其徒謂佛之身體面貌皆若金色徽宗所謂中華被金狄之敎者指佛敎而言也然其言可謂妖矣未幾女眞起自夷狄建號大金蕩覆中華斯言若為之先兆也唐僖宗紀年為廣明是時黄巢初起曰唐去君而存黄以為廣此黃當代唐之徴後之論者謂天託昏主以告亡于世徽宗之言豈不類此夫老氏之敎資於淸凈慈儉以爲本者是而棄其綱紀刑政不以爲用者非漢文帝於其不以爲用者用焉而於其資以爲本者資焉當是時也干戈創殘者以之完復衣食窘乏者以之完足司馬晉於其資以爲本者不資之而於其不以為用者不用之當是時也顛㝠於麯蘖聲色而天常失紛擾於胡羯戎羗而人紀紊蓋漢之治由從老氏之是者而違其非者也晉之亂由從老氏之非者而違其是者也然淸淨慈儉最人所難非高世之主不能惟漢文帝能之於是世之依託老氏者變而言脩丹煉藥又其後變而言經籙齋醮亦自託於老氏毎變愈下無非以誑惑人主而饕其寵禄焉爾漢武帝唐憲宗皆中材之主也於脩丹煉藥之言惑焉徽宗者下愚之主也經籙齋醮之是務設幄坐于林靈素之側聽其嘲詼媟咲之言而自號為敎主道君皇帝此何異於沐猴而冠者哉謂之敎而不言何敎以見此敎之外無他敎謂之道而不言何道以見此道之外無他道巳能主此敎君此道而天下之能事畢矣昔日為神霄玉淸王長生大帝君於天今日為敎主道君皇帝於宋何其尊也以此欺愚眩衆不自知他日將為昏德公於金而不勝其卑辱矣可勝嘆哉徽宗專信老梁武專信釋其後皆殞身亡國或謂其所廢而不信者為之祟也然周天元復老釋敎於昔人旣毀之餘竝致崇信亦殞身亡國此又何故也君子曰無他國將興聽於人國將亡聽於神老釋之神旣惑其心而惟是之聽則人理之當脩為而不脩為者多矣而况於奉其神養其徒竭生民之膏血積山塡海不足侔其費也亡殞之至也復何難哉, WYG: ''}
