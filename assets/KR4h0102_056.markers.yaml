  - {type: indent, offset: 9350, content: 　　　, id: KR4h0102_krp_056-bkkind64}
  - {type: variant, offset: 9350, length: 880, content: 紀瀛國公事實哀忠徹予㓜時聞諸先生與先人言宋㓜主北遷元降封爲瀛國公一夕世祖夢金龍舒瓜纒殿柱明日瀛國來朝立所夢柱下世祖感其事欲除之謀諸臣下瀛國知懼遂乞從釋號合尊大師徃西天受佛法獲免過朔北扎顏之地謁周王卽明宗見瀛國后罕祿魯氏郡王阿兒厮蘭之裔孫也明宗愛而納之未幾生妥懽帖睦爾後有言於文宗詔曰明宗在朔漠之時素謂非已子遂兩徙高麗海島尋移廣西文宗崩丞相燕銕木兒請於文后卜答失里立太子燕帖古思后不從命立明宗次子亦隣真班是爲寧宗寧宗崩燕銕木兒復請立燕帖古思后曰吾子尚㓜明宗長子妥懽帖睦爾在廣西年十三矣乃命中書右丞闊里吉思往廣迎之至良鄉燕銕木兒旣見且陳迎立之意妥懽帖睦爾㓜且畏之一無所答於是燕銕木兒疑之適太史亦言不可立立則天下亂遂不果文后視政一年燕銕木兒薨學士虞集上封事不肯草詔文后與大臣及學士巙巙等定議立姪妥懽帖睦爾爲帝且詔尊文后曰燕帖木兒猶懷兩端遷延數月天殞厥躬永惟皇太后之子一以至公爲心親挈大寳卑予兄弟迹其定䇿兩朝功德隆盛帝以虞集之上封事乃曰唵喒餓秀才怎麽知我家事集驚懼喪明帝立之八年六月撤文宗廟主徙文后幽於東安放其太子燕帖古思於高麗中道謀殺之嗚呼順帝享國實由文后然聽讒臣之言遂至文后母子𬒳害夫宋待柴世宗之後代居顯官詳見史冊而瀛國孤兒寡婦元君忍不相容也瀛國居燕八年因殺文丞相方給衣糧此待之薄甚迨感夢有疑瀛國逆知假徃西天又遇周王奪其后而生順帝以明宗朔漠之言觀之明爲遺腹也而天不負宋而又享國之乆然順帝之負文后豈其少恩哉國祚之歸于大明宜矣予歸老于家或誦虞文靖公詩所紀瀛國之事因而有感遂幷書舊所聞者使知宋三百年之德澤不泯也如是順帝幽文后殺其太子此又天使宋之遺孽滅胡之報復也永樂十年五月十八日我太宗文皇帝御武英門命內官李謙王吉於古今通集庫取宋列帝遺像命臣忠徹及畫士百户徐英觀之上笑謂忠徹曰宋太祖以下雖是胡王鼻其氣象淸癯若太醫然十九日上復御武英門命臣忠徹同內官王吉看元列帝像俱魁偉雄邁上曰都喫錦羊肉者及觀順帝像顧謂臣忠徹曰唯此何爲類太醫也忠徹斯時承命未實俯首莫對今蒙賜老田里得以歴考宋元史傳曁元學士虞集所作第十六飛龍之詩果符太宗文皇帝之言感念聖鑑之明愧當時不能對此爲恨庸書以俟秉筆者補之, WYG: ''}
