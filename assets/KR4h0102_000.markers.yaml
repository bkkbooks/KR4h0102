  - {type: variant, offset: 0, length: 344, content: 皇明文衡序文之來尚矣而後世詞華之習蠧之故近有為道學之談者曰必去而文然後可以入道夫文載道之噐也惟作者有精粗故論道有純駁使於其精純者取之粗駁者去之則文固不害於道矣而必以焚楮絶笔為道豈非惡稗而并剪其未惡莠而并揠其苗者哉漢唐宋之文皆有編纂精粗相雜我朝汛掃積弊文軌大同作者繼繼有人而散出不紀無以成一代之言走因取諸大家之梓行者仍加愽采得若干卷其間妄有所擇悉以前說為凖以類相次郁乎粲然可以備史氏之収録清廟之詠歌著述者之考證繕冩成帙以俟後人或曰朱子嘗譏文自文而道自道者其語甚力然則近世道學之談未易非也子之是舉無乃勞乎走曰不然考朱子之云盖為蘇氏之文駁故耳至于楚詞韓文註釋校訂不遺餘力則我先正固嘗以文為意矣必如子說則是釋家不立文字之教走豈敢以為是乎賜進士及第嘉議大夫太常寺卿兼翰林院侍講學士兼修國史玉牒經筵官, WYG: ''}
