  - {type: indent, offset: 6825, content: 　　　, id: KR4h0102_krp_001-bkkind56}
  - {type: variant, offset: 6825, length: 373, content: 擬祭元㓜主文錢甦皇帝謹遣某官某致祭于元㓜主之靈曰嗚呼天父地毋而人生其間天地之氣有偏正故人之生有華夷而尊卑貴賤分焉自古華為天下主而四夷服從亦猶家之有長而子弟順化帝王之心豁然大公以宇宙之内為一家四海之外為一人而一視同仁者良以此也歷代以來夷之識者莫不奉正朔求冊命於中國以保其疆土載諸典籍昭然可徴有宋中葉天地運否自徽欽不競以至南渡之後日以陵替於是㓜主之先勃興朔漠芟夷種類克取金源遂兼宋以馭中夏幾及百載斯民實蒙惠焉然天地之經華夷之義終不可泯也由是脫其衘轡海内鬪爭民墜塗炭天乃命朕起自布衣撥亂反之正十餘年間群兇蕩㓕遂移師北指㓜主父子順承天命亟返故國華夷各得其所嗚呼是豈人力之所能及哉由此而論則朕之得蓋復吾中國之固有㓜主之失乃棄其朔漠所本無耳朕固無愧於㓜主㓜主亦將奚憾於朕哉朕方欲撫寜逺人以盡一視同仁之義孰謂㓜主遽爾捐世聞之感悼不䏻自巳因遣奠以布朕衷惟靈鑒之皇, WYG: ''}
