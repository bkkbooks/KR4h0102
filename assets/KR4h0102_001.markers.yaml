  - {type: line-break, offset: 0, content: '', id: KR4h0102_SBCK_001-1a01}
  - {type: variant, offset: 0, length: 711, content: 皇明文衡卷之一翰林院學士新安程敏政選編郷進士國子監助敎永康范震校正賜進士應天府儒學教授郊郢李文㑹重校代言檄諭中原檄宋濂自古帝王臨御天下中國居内以制夷狄夷狄居外以奉中國未聞以夷狄治天下也自宋祚傾移元以北狄入主中國四海内外罔不臣服此豈人力實乃天授然逹人志士尚有冠履倒置之嘆自是以後元之臣子不遵祖訓廢壞綱常有如大徳廢長立㓜㤗定以臣弑君天曆以弟酖兄至於弟技兄妻子烝父妾上下相習恬不爲怪其於父子君臣夫婦長㓜之倫瀆亂甚矣夫人君者斯民之宗主朝廷者天下之根本禮義者御世之大防其所爲如彼豈可爲訓於天下後世哉及其後嗣沈荒失君臣之道又加以宰相專權憲臺報怨有司毒虐於是人心離叛天下兵起使我中國之民死者肝腦塗地生者骨肉不相保雖因人事所致實天厭其徳而棄之之時也古云胡虜無百年之運驗之今日信乎不謬當此之時天運循環中原氣盛億兆之中當降生聖人驅逐胡虜恢復中華立綱陳紀救濟斯民今一紀于兹未聞有濟世安民者徒使爾等戰戰兢兢處於朝秦暮楚之地誠可矜憫方今河洛關陜雖有數雄忘中國祖宗之姓反就胡虜禽獸之名以爲羙稱假元號以濟私恃有衆以要君阻兵㨿險互相吞噬反爲生民之巨害皆非華夏之主也予本淮右布衣因天下亂爲衆所推率師渡江居金陵形勢之地今十有三年西抵巴蜀東連滄海南控閩越湖湘漢沔两淮徐邳皆入版圖奄及南方盡爲我有民稍安食稍足兵稍精控弦執矢自視我中原之民乆無所主深用疚心予恭天成命罔敢自安方欲遣兵北逐群虜拯生民於塗炭復漢官之威儀慮民人未知反爲我讐挈家北走䧟溺尤深故先諭告兵至民人勿避予號令嚴肅無秋毫之犯歸我者永安於中華背我者自竄於塞外蓋我中國之民天必命中國之人以安之矣夷狄何得而治哉爾民其體之如蒙古色目雖非華夏族類然同生天地之間有能知禮義願爲臣民者與中國之人撫飬無異詔封諸王詔王禕, WYG: ''}
