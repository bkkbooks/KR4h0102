  - {type: variant, offset: 4648, length: 1733, content: 平胡鐃歌鼔吹辭有序楊士竒臣聞兵者聖人所以衛民之具也故爲天下國家者不可一二日而忘武備易曰除戎器戒不虞書曰克詰戎兵至若征伐蒐狩具見於詩禮春秋皆聖人重武事也洪惟我國家肇膺天命武以靖亂文以經邦列聖相承其道一揆陛下嗣承大綂恢弘化理海内海外日月所照臨之地其人皆攄誠効順祗奉方物朝獻闕下惟朔漠残虜叛服不常屢冦邊陲擾我黎庻乃今歲之秋田榖登塲三農畢務皇上因田獵以閱武龍旌所嚮于畿東郊而東北塞垣不遠伊邇遂戒六御親飭邊防車駕􅊩薊州之石門邊報胡虜入冦巳迫塞下上曰天厭其惡俾來就斃乎將士皆踴躍思奮上曰兵貴神速朕以鐵騎先馳赴之當令迅雷不及掩耳爾將士以次徐來即日上率鐡騎三千出喜峯關翼日與胡虜遇虜駭愕出不意謂神兵自天而下也上麾鐡騎爲左右翼前包虜陣飛矢如雨虜狼狽死者甚衆餘率褁創退走上以鐡騎數百繞出虜後盡擭之遂斬其酋渠而生縶其衆虜無一跡得遁者遂命將士搗虜巢穴而悉收其部落族属及所畜聚駝馬牛羊輜重以累萬計關塞以北羶腥之區蕩然一淸臨邊之氓遂以安枕無虞臣惟皇上聖志宵旰孜孜篤在安民車駕之初出也因農隙以講武事因所歴以飭邊防非有意殺伐也而天絶醜虜將受其命於聖明故使之豺豕跳踉而天戈一麾瞬息之頃灰滅澌盡此皆本於皇上愛民之仁得天助佑而明㫁天縱英武神奮遂建廓淸之大功蓋近代帝王所鮮有也臣嘗考見古昔盛時帝王建武功者皆有鐃歌鼔吹樂辭𬒳之絃歌用示永逺臣忝執筆從屬車後目睹聖武神功之盛不能自黙謹倣漢唐篇數撰鐃歌鼔吹曲辭十二篇庻幾宣著盛美於無窮焉謹録上進伏惟􅐶覧秋榖既成農事告畢車駕因田獵以飾邊防爲田獵第一皇聖仁恤元元勤宵旰保厥安顥氣肅零露溥田榖成農乃閒駕六御獮于原飊蕩氛景凝春導旂常翼旟旛衛弓矢從羽于鑾雍雍鼓闐闐行郊畿歴山川遊豫時兆庻歡右田獵之曲二十二句車駕及石門驛邊城奏虜入冦遂定親征爲邊奏第二嚴警蹕先皇輅坦坦砥如薊之路東石門陿以阻士鷹揚奮飛度有來匭凾奏龍御謂胡犬羊呈邊侮皇曰噫嘻胡曷恃而來自投于隕天俾之天所俾予敢稽斮厥渠縳厥徒胡之殱其在斯右邊奏之曲二十二句車駕出喜峰關道陿而險將士奮勇以從忘其劳焉爲度關第三度關山履㠝岏陿以峻十歩九屯旅肅肅氣桓桓淩奔崖越飛湍歛旄鉞包旌干潜鋒韜鍔捷羽翰龍御所歴祥景暄虎豹遠遁跡隂霧披以散但望殺氣逺塞垣虜㝠昧尚恣兇殘皇威一震奮擊下九天右度關之曲二十二句車駕出關一戰殄虜悉戮其酋渠生縶其徒爲皇武第四皇武揚奮自天智以勇機捷神左麾右斥鐡騎奔棬如電掃呼霆震裭虜魄攝虜魂摧虜陣蕩虜群蹂躝泥滓揮埃氛燎毛斧枿歘巳塵停龍劒息虎賁霽天威怡天顔右皇武之曲二十句分命將士索虜巢穴用竟天討爲天討第五麾將校窮幽僻搗巢窟歴山澤索種類搜部落逐聲影躡蹤跡驅孳畜舉聚積囊包席捲垂萬億氛翳蕩羶腥滌隂山淸瀚海碧曠澄明漠之北萬斯年神武績右天討之曲二十句兇憝既淸遂撫安邊氓爲安邊第六斬蛟鰐禽犬彘疆埸靖寜聖不忘備脩防禦申警戒咨爾邉之氓我綏我懐祛爾害灾康爾危爾勤爾生㒺畏疑力爾田桑去爾寒與飢爾老爾安爾㓜爾慈疇爾厲辟以治疇爾厲予在玆右安邊之曲二十句武功旣成詔告中外爲武成第七皇仁威靖疆圉皇聖志布昭于下渙徳音周率土維時烝民受天之付與圖保厥付勤旦與暮有其毒之敢康弗赴斮之縶之匪予志究武敬天之付亦承厥佑助猗皇仁承天祐右武成之曲十八句邊圉旣寜下令班師爲班師第八氛塵息邊徼清武功建皇心寜鐃簫作凱奏興六龍御八鸞鳴祥飊翼輦慶雲承旌傳警修途班師上京大明行天川岳光榮太和融鬯萬物遂成羙洋洋騰頌聲右班師之曲十八句車駕旋京行獻俘禮爲獻俘第九維大寳承于祖考維下民祖考後保克時永保維皇聖孝維皇聖仁惠保曁濵徼彼狂以擾肆用劉勦䤋與俘祗告清廟剪稂與莠榖用秀好維祖考之制欽率允蹈皇神武徃有耀右獻俘之曲十八句旣旋勞賚將率爲將勞率第十皇振旅皇明堂賚將率以勞以享奏常武歌杖杜皇曰爾來予股肱心膂維時武功俾民遂保豈維子克奮汝良予輔咸拜稽首維皇神武聖謨㫁自天康時兆庻右勞率之曲十六句武功既昭丕隆德化爲隆德第十一皇綂御政化明威服德懷洽萬邦傾誠來歸筐篚相望蠢彼孽虜性豺狼獨反側靡常窺間伺隙爲冦攘皇震怒神武揚天戈振一掃澄淸蕩蕩寰宇如砥平􅐤弓戢矢韜五兵尚飭干邊防嚴禦備式永寜坐黼扆弘化綱煥禮樂齊虞唐右隆德之曲二十二句海宇泰和天下忻戴咸祝聖明萬萬歲夀爲聖夀第十二皇震威皇仁宣溥四表霈八埏日月所照臨雨露無私偏咸足飽與温禮讓弗愆泰和世堯舜㤙國家隆盛海宇安天子御丹扆萬億年福廣大齊乾坤右聖夀之曲十六句, WYG: ''}
