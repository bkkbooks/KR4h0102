  - {type: variant, offset: 2, length: 1351, content: 琴操擬大明鐃歌鼓吹曲十二首并序王紳臣幸生明時獲際雍熈之治世職儒業而臣文叨竊禄位媿無以黼黻皇猷伏覩太祖皇帝手提三尺取胡元平僣亂以肇造區夏所以雪近代之耻其功誠不在湯武下可無所述以見于咏歌以𬒳于音樂乎爰取漢魏以來所載鐃歌鼔吹詞傚其體爲十二篇以紀豐功偉烈曰大明鐃歌鼔吹曲以上雖其言蕪陋不足以鋪張萬一或者命將出師之時用之軍旅行陣之間亦可以知祖宗締造之艱難與佐命元勛之勞烈臣不勝惶愧之至元季亂極四海兵興太祖皇帝起淮泗平僣亂正大綂爲神龍躍第一神龍躍奮滄溟耀光彩揚烕靈沛厥澤甦羣生德所𬒳枯者榮著仁譽藹義聲壹戎衣天下平混華夷俱來庭歲僅周武功成考厥績如日升萬斯年昭大明右神龍躍二十句句三字蠻子海牙以舟師扼采石王師與戰克之爲殪奔鯨第二鯨之奔勢甚張率醜類横大江礪厥刅比厥航聮伍爲什黠且狂皇旅奮義旗揚兵所指氷沃湯衝其要扼其吭有弗若者嬰以鋩鯨既殪授我疆天兵赫赫從此光右殪奔鯨二十句十七句句三字三句句四字元將據建業天兵擊之爲開洪基第三江之表惟建康負天塹勢莫強彼昬不知肆譸張恃其險干天常皇震怒整戎行義旗一指虜馘亡授我首啓我疆大業巳建洪祚昌右開洪基十六句十三句句三字三句句四字陳友諒據豫章太祖親征之大戰鄱陽湖友諒死降其衆爲平江漢第四江漢湯湯厥惟豫章醜虜慿之以恣冦攘屢渉我疆以跳以踉天眷有明命我哲皇爰整其旅以扼其吭戈矛洸洸旂旐煌煌部伍行行艂艭將將鏖戰大呼雷轟電楊虜酋既斃虜衆亦降凱歌以還漠義旗所指摧山震嶽君臣稽顙若崩厥角舉族逺遁不待誅縳既屋其社寰宇淸廓伊誰之力惟皇先覺石平胡邦十六句句四字方谷珎自元末䟦扈東海命將征之舉族來歸爲波海平第七元政既不綱萬國兵搶攘梟雄利草昧突起溟海傍名號僣相加狼貪狠如羊大舶連百艘雲濤相擊撞蕞爾鰍鱣窟自擬蛟龍蔵天兵渡東浙疾若列缺光投戈載妻子逃匿海中决尋復係厥頸來詣轅門降震雷既輯聲朝暾出扶桑帖爾波不興浩刼塵不揚残民沐文化宛若鄒魯邦右海波平二十二句句五字陳友定㩀全閩出師執之爲拓閩境第八眞主起淮泗沛澤加無垠陳氏逞顛猘烽火連七閩自恃險且遠偃蹇不我臣天兵忽爾加奮擊速且神執訊仍獲醜困彼涸轍鱗凱旋獻俘馘磔裂徇頑嚚海堧遂淸静千里無纎塵群民樂蕃息煦煦涵陽春右拓閩境十六句句五字張師道李思齊據關中天兵平之皆入職方爲定關陜第九元德昏政棼棼氓戚憔籲于旻情上格命明君二竪無職方狺梗我化據中原王師下加猶不循雄兵烈烈車噋噋鐡山且碎虜曷存禠爾魄奪爾魂殱厥渠魁弔厥民關陜平蕩無妖氛右定關陜二十二句十六句句三字六句句四字元社既屋苗裔猶存大兵再加窮極北漠而胡遂㓕爲蕩胡穴第十元民有天下腥饘我中原垂髪裂冠冕士效咿嚘言聖人受天命遠續星王傳手提三尺劒起自淮泗堧削平諸僣亂胡遂竄然屏迹雖甚邈天討不可延窮追及沙漠巢穴無復全卓哉皇業勲上雪唐宋冤右蕩胡穴十六句句五字明玉珎據全蜀僣大號師出討之舉國來降爲闢川蜀第十一夏明氏據全蜀僣大號保西隩恃其險遠弗臣伏我師征之兼水陸搤厥吻搗厥腹以杖擊地駭神速焚爾櫬受爾玉待爾不死恩尤篤陶至和𬒳淸穆五十四洲歸化育右開川蜀二十句十五句句三字五句句四字元属梁王保雲南招諭不降師出征之梁王死六詔平爲斮苞枿第十二巨木既蠧根本繇傾爰有旉枿猶假息以生皇曰肆哉毋讟我兵俾其自歸庻不戕我氓屢遣使命諭以至誠蠢玆弗靈恣其頑冥皇赫斯怒爰整旅以行熊羆百萬如雷如霆摧朽拉枯烈烈轟轟虜酋既殱㸑𤏡悉平遐邇歸化四海由以寧右斮苞枿二十二句十八句句四字四句句五字, WYG: ''}
