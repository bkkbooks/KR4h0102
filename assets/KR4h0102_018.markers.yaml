  - {type: variant, offset: 2198, length: 313, content: 世直堂銘有序楊榮翰林侍讀文江周功叙名其所居之堂曰世直盖以其六世伯祖伯寛仕宋直寳謨閣憤賈似道誤國嘗䟽斥其奸會大父鰲溪山長以立元至正中脩三史上書請以宋爲正統而附載遼金父職方貟外岐鳯國朝永樂中爲漢府紀善王有異謀作寳賢堂箴以諌三君子者皆言人所不敢言終不少沮非直道之至其能然乎矧功叙以名堂其善於繼述又未可量矣爲之銘曰天有直氣在人能全人有直節貴世其傳周之世直寳謨諤諤繼以鰲溪職方有作歴宋及元至我皇明勁辭正色蟬聮厥聲莫熾相奸臣強主弱炎籙旣微孰攻其惡莫紊帝綂夷先華書戎勢方昌自尊其徒莫僣王謀窺覬儲位梁園納邪曷輔以義壮哉朱雲乞斬安昌麟經貶楚董相格王直道不容官奚不黜其黜復揚皇鑑如日文江之滸有堂潭潭喬木如雲欝與天叅我銘先猷以迪乃後永執厥心奕世有耀, WYG: ''}
