  - {type: variant, offset: 4489, length: 287, content: 記徐元張旺史整紹興十九年冬完顔亮戕其主亶明年營都燕山二十九年又治汴京漸謀南侵三十年春東海民徐元張旺史整共起義師以帛書求援於宋宋守盟約不敢報元等嬰城半年虜師水陸夾攻破之誅戮極其慘酷亮由是益疑宋得中原心決䇿入㓂起蕃漢兵二十七萬傔人不預焉倣唐制分二十七軍明年自將廵洛至汝遣髙景山王全來求釁此周益公文集所載而宋史紀不見陳桱通鑑續編載金東海民張旺作亂使徐文率舟師平之常慨宋失中原忠義之士嬰城固守力竭城䧟幷遭屠戮者何限如徐元張旺史整之徒志本爲宋乃不能捄又不得一書干史以見其起義之忠而乃書曰金民作亂使千古之下負冤受抑何由獲伸桱之書法大抵若此有不可憑要當以益公所記爲定因表著其事以雪元輩之柱, WYG: ''}
