  - {type: variant, offset: 3780, length: 775, content: 處士盧公墓表方希古士之出於三代之盛者豈皆賢哉世敎旣明勸懲之道旣備雖有未至者不得不企而及也生乎三代之後者上焉莫爲之率蹈乎邪者非惟不之禁而或以取榮趨乎義者非惟無以勸而適以取困故道之行也中人皆可以爲善及其廢也賢者之資不能以自立於不能自立之時而有由禮秉義之士可不謂難能耶若盧處士者是巳處士生元中世俗淪於胡夷天下皆辮髪椎䯻習其語言文字馳馬帶劍以爲常處士居雖近市然恬冲坦静不樂芬華長衣危㡌徐言雅歩操儒生禮不變事後母下心氣甚得子道遇宗族鄕里一以柔和不較爲先有犯者對之㣲笑恂恂酬答恐傷其意由是斯人亦不忍侮之居家雖無事必蚤起櫛冠洒掃堂寢非疾病未嘗一日怠好讀書纂集古賢人粹言及今人文若嗜飲食言若不能出口至論古今事當否得失成敗禍福及處之之宜詳審精深雖善辨者不能窮也親賔㑹集道前舊所歷見聞可法戒者以爲樂煦煦如也不肖者見之而愧善者見之而慕乆與之居而不見其可厭蓋其天性粹羙雖不同乎流俗而亦求不絶異于人故其生也人安之其没也莫不悼惜焉盧氏盛於齊周隋唐之際居台之寧海者其族衆多號桑洲盧氏者處士族也曽大考國華大考天麟考至公皆以善稱妣陳氏繼母王氏處士諱中字思誠配方氏予之姑也子二人曰質曰朴一女適同縣張宗雅男曰乾一質以縣學諸生登國朝洪武二十一年進士第對䇿殿廷天子奇其文擢寘第三授承事郎翰林院編修人榮處士善敎子而處士益謙退若不預聞者後二年庚午處士年六十四以十月七日卒于家以訃聞詔賜驛舟楮幣遣歸以明年正月九日葬于縣北梅林石門之原旣葬又四年乙亥質陞中順大夫太常少卿以書來漢中俾述其事刻于墓士之溺於習俗也乆矣以孔子之時三代遺風未盡變聖化之沾英才大賢相望軰出而孔子猶嘆善人不可見得見有恒者斯可矣况二千載之下禮樂亡缺之餘而習于近世之陋也哉若處士者不汙於浮薄而持心制行與古君子類非所謂善人有恒者耶以此之資使及三代之盛而獲近聖人之門道德之盛必有大過人者其所就當不止於此然則余於處士也安得不慕其賢而重有感也夫, WYG: ''}
