  - {type: variant, offset: 5, length: 376, content: 後歲乙酉予總學政按徽郡取視篁墩先生文衡板刻半脫落膚質平漫不可讀携至京屬應天府學敎授范震校正重入梓越五月震去代今敎授李文㑹來校督又三月餘梓人工完序曰文豈易哉蓄渟釀富本乎氣􅔿濳浤逸存乎人肆之英精組圭倫訓係之治矢洽音徳卓執軌物弗之敢渝成乎敎故積以流者氣也弗乆弗昌乘以發者人也弗際弗盛弗昌厥盛文弗關之化理以成世敎文奚尚乎是故先後天之象設混茫之首開也謨典誥訓虞夏商周之元良也詩書禮樂裔埀至今不廢化理之自文敎之樞也左之浮公糓之誣春秋戰國之隂賊激烈後世不并經訓又可推也嗚呼文豈易哉夫昔宋南鼎偏中原割裂胡元虜運天日廢湮三光五岳之氣孕和葆秀昌發固待我明也聖祖首出洗刷振飾列聖紹休豐培厚衍是宜諸公肆之乎文即今讀之我有憲天之制禮無奸神人分無瀆我有範世之典以剸以裁以匡以表倡叙民則戎夏各正其方經國有規而我明之蕃宣岳牧朝享報聘言動書史以承大小以列卑貴綱維弗之紊度齊民有具而我率之, WYG: 巻}
