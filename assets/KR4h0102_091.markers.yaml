  - {type: variant, offset: 6676, length: 674, content: 時齋先生俞公墓表元旣有江南以豪侈粗戾變禮文之俗未數十年薫漬狃狎胥化成風而宋之道俗銷㓕盡矣爲士者辮髮短衣效其語言容飭以自附干上冀速獲仕進否則訕笑以爲鄙怯非確然自信者鮮不爲之變是時金華俞先生獨率其家以禮深衣高冠談說右道客造門肅威儀俯首拱而趍以迓至門左右立三揖至階揖如初乃升及位又揖者三毎揖皆有辭相稱慰慶贊周旋俯仰辭氣甚恭鄕人小子去家乆不知宋俗皆然或竊指先生爲異或尤以爲迂緩先生不頋也年七十有二卒于元至治四年正月十七白先生旣亡而宋之遺俗無有知者矣先生諱金字尗器別號時齋其先杭人吳越錢氏時有任其國爲户部尚書兼營田使者曰公帛嘗道婺義爲愛其地遂遷邑之鳳林鄕戸部生德詮德詮生又徙金華之孝順鎭諌生海海生善轉善智各有子四人皆爲儒惟善子言昌宋大觀三年上舎釋褐進士知永豐蕭山二縣而善轉子奉復家溪南之琴山奉生某縣主簿允中允中生性性生恣益恣益生壽壽生義先生父也母金氏先生少好學善自程督鉤發窺索水􅉼木滋月長歲化壯而有名一試不合有司卽退脩于家於經史尤濳心摉訂較辯疑昧多所附益學者師尊之受業者繼于門先生年愈加志愈篤爲學晩而彌成人望其致于用而宋亡矣故先生之名不大顯于世惟發之文章以自見乆而亦散佚不傳世由是無從知先生知而言之者鄕人而已然先生所存鄕人未必知之知其詳者惟子暨孫至曽孫則已踈矣使更越數世復有知者乎篤於自信者固不䘏乎人之知否然德如先生而弗傳則天下之爲善者寡矣褘是以論列之以見不苟合乎一時者乃所以合乎後世也先生娶王氏生四子曰祿祺祐祉乃棄諸子而卒諸子以卒之歲十二月甲子葬于就日鄉義和里之楊家園今去先生卒時四十有六年而先生之孫有欽有奇有識有觀有慶有用有元多爲老成人㑹孫五人亦巳長云皇, WYG: ''}
