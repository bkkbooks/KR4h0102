  - {type: variant, offset: 3816, length: 1502, content: 故毎斥輙復晚節優游以榮名終享有盛福此好德之驗也予爲諸生時巳獲瞻風采其後同朝又充深知公嗚呼今不復見矣則安能巳於情哉作哀辭繄公之生兮秀所鍾儼玉立兮偉儀容才旣美兮學則通氣浩然兮縮以充懷竒寳兮慶遭逢有民社兮奮厥庸興惠利得其巢穴以計擒之而請釋其餘上初遣公謂還當大用而用事者嫉公絀其謀間踈之不召見而罷其爲侍郎尤侃侃自信敬㳟朝夕有大臣之體在劒昜時興學養士至親爲講說賞勤而勸惰諸生多賴以成流風餘澤今尚有存者蓋公之志夐然出儕軰故所至有立予之知者如此予所未知者計亦偉特猶是也平生淸約自持不苟取妄求仕四十餘年如一日雖累遭譴謫皆非以私過得之故毎斥輙復晚節優游以榮名終享有盛福此好德之驗也予爲諸生時巳獲膽風采其後同朝又充深知公嗚呼今不復見矣則安能巳於情哉作哀辭繄公之生兮秀所鍾儼玉立兮偉儀容才旣美兮學則通氣浩然兮縮以充懷竒寳兮慶遭逢有民社兮奮厥庸興惠利兮蘇困窮建學校兮師文翁持憲紀兮楊淸風矯一鶚兮横太空植善柔兮除姦兇履巉巗兮窺崆巄殄冦難兮銷兵戎陪鶴駕兮熈事功搖玉珮兮鏘玲壠副六卿兮位愈隆勤夙夜兮甚嚴㳟涪之治兮安𧖟農嬉白叟兮歌黄童飼林淸秩兮恩所封煥勑命兮廻鸞龍優游以老兮當時雍頌詩作兮聲渢渢奄一去兮白雲中混希夷兮超鴻濛望不及兮心冲冲帷疇昔兮抗高蹤事聖主兮暨三宗柔淸德兮將無同善其始兮愼其終宜壽考兮齊喬松胡不愸遺兮天夢夢彼狪兮愚且蒙乃悠乆兮昌而半欲往問兮安所從蹇徘徊兮發哀恫思公不見兮奈何乎公弔陳先生文王英予嘗至番易自浮梁山中道經德興父老言前令陳公孟藻徳政爲卓魯民受其惠惜去而亡矣後之爲縣者皆貪刻苛猛予聞而悲之是時公殁乆矣予與公之子敬宗登進士同官于朝又得備考公之行誼追悼往昔爲文以遺番人俾永其思其辭曰余浮番以遠征兮歷先生之故治遺老泣而告余兮嗟後時巳十祀心悵怳以永懷兮宵耿耿而不寐顧惟此而徬徨兮嗟若先生豹隱幽壑兮虬濳重𬈑處困而亨兮藏晦以明志熈恬愉兮其蘊則宏望之興周兮說逢于殷處此下邑兮不驟以進綰章與綬兮佩仁履信彼狡之氓兮欺則弗忍澆者旣敦兮鶩者益遠嗟哉其此去兮卒莫我返鴟梟翶翔兮鷹鸇利吻張呀互赫兮爭饞肆忿囂嘵而群處兮旣飫且吐登稂莠以爲饋兮毁棄黍稌衆離嗷嗷兮疚餒待哺夫豈不懷先生兮如失父母故世之所惜兮謂先生內實無疚而其所悼兮曰年未中壽材宜棟梁兮胡乃橐朽車可任遠兮輪折而覆道才可以經濟兮施則未究顏天而冉疾兮人孰其詬彼或幸其災兮何疾美而夸醜惟尼父之興歎兮曰善人吾弗覯余故撫膺而深喟兮獨揮涕以隱憂已矣乎先生不可見諒逹人其大觀兮處順而知變視有形而終化兮理固宜然彼崆峒與玄圃兮杳而莫攀彭聃之矯矯兮今安在焉惟死有所不泯兮斯乃爲貴黔婁終窶兮柳下惠之薄仕宓子賤之有譽兮仲卿之有嘉惠旣在古以爲然兮豈今世之能違故余祛衆惑之慘戚兮以申先生之思睇列星於㝠漢兮雲霧滃而神馳巫减爲余致處兮招遺靈而來歸奠桂酒與椒漿兮重慨想於昔時中鬱抑而坎坎兮乃斐然而陳辭庻百世之下兮惟先生之是思哀劉兩溪辭有序周叙余以使命道湘川悲屈賈之懷忠齎志以殁用效其人之聲各爲辭弔之使歸便道過家上冡瞻望安成有懷故人劉兩溪欲絮酒致奠迫於王程不能得停雲延佇沾灑者乆之兩溪之事視屈尤深足悲者時當承平主上㭟勤與民休息第蔽於權幸政務乖張災異數見兩溪侍講經筵感激奮發因事指陳光明正大遂忤權幸設他事下之獄黨惡者順旨栲掠體無完膚梃然無一異詞唯呼天自明越數日竟就斧極刑秉屈三閭之精忠罹顔常山之荼毒於乎慘哉兩溪平生孝友篤至於朋友急信義教人盡誠懇居常侃侃以古人自期安成春秋之學自李行簡先生後紹而大之者兩溪也其在經筵毎遇譔進講章非堯舜三王之道不陳至於麟經尊王黜霸內夏外夷之辨尤深致意眞得講臣體使不遭酷禍所成就可量乎哉於乎悲夫兩溪余平生同志友也情見乎辭有不能巳用寫哀些三章向風焚以招之且鋒藳秘而藏諸篋笥他日兩家子孫得而閱讀之庻, WYG: 庶}
