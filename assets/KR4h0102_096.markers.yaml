  - {type: variant, offset: 3663, length: 0, content: '', WYG: 謫武清復被薦為廣東道御史仁宗在東宮雅知之擢春坊中允改大理評事又改刑部主事坐事降易州同知洪熙初圖任舊臣陞工部侍郎改北京行部又坐事去知涪州子綸為翰林編修得推恩及其親公遂棄知州就封以翰林編修文林郎致仕宣德十年三月十三日以疾卒于家年七十二公天資俊爽負竒氣眉目明秀議論英發率嘗傾一座其才敏過人當義而行無顧忌初在劒州州産茶民衣食之而為有勢者所擾公奏請禁止至今民頼其利為僉事在江西鉏惡佑善所至吏畏而民愛之其於賢者維持成就如所親及為御史彈劾不避權勢河南皂軍山冦發公受命往察之還上討捕方畧冦遂平階州賊王金剛奴等僭名號聚衆八千餘人勢悍甚又命公往公}
