front:
  text: 皇明文衡卷之六十六
  hash: sha256:da16e2d09667b7b8d61f9d7db51ce14c984ce283153d3f4656f3f4ca3f32e9f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_066-1a}
body:
  text: 碑皇明黔寕昭靖五祠堂碑王景德足以昭三辰勲足以靖四垂故能翕張皇猷揮霍幅員乗大化以控搏與天地而俱存生為人豪殁爲明神理之常也是以先王叙功以作元祀也非惟褒德顯忠蓋亦示神而明之之誼焉若馬援之於漢張仁愿之於唐賽典赤之於元其人雖死其功烈在人千載一日語云大功必一丗祀茲其近之有若黔寕昭靖王之茂實比之數公實有過焉尸而祝之斯古道也夫聖人出而大命集必生應昴降岳之佐以開其休時維我王㓜隆天造受㤙帝室年十有八出鎭鎭江綽有聲績内託肺腑外秉節旄以麾諸夏南平閩越擒陳友定以材畧見知于上同知太都督府事幾十年所奏無一不當帝心者西畧崐崘渉流沙轉戰千里皆生擒其渠帥平二十餘萬落封西平侯功在盟府率兵南征深入不七掀牂牁踣夜郞徑安定鞣烏蠻大戰曲靖擒元司徒逹理麻梁王把匝刺瓦爾密走死不浹十辰遂開雲南車里八伯平緬皆虎視以雄莫不嗢咿傖儜稽顙效臣順明年諸部覘王師之東也曰子復叛兵二十萬蠭屯蟻附城幾不支王聞勒歩騎至自芒賊愕遂潰自相輮迮伏屍塡道雲南底平悉致其酋帥京師勲莫大焉在鎭十年以仁智爲理闡庠序以示之禮迪官常以示之制均政役以厚其聚以旋定安集爲已任其桀黠秕我王度則差馬拱稽草薙而禽獮之牿阿資􅑒者滿殪矣情鏖定邉凡斬首數萬捕虜過當王垂涕而遣之諸部懐仁服義始豫附以和收其馬牛金銀丹􅃮秔稻以充軍實雖遐逷曶闇皆覩天日之明道德之華自王迪之也山川草木桐生懋豫與嘉頼之德莫懋焉及薨軍民罷市巷哭至有剺靣者朝廷嘉之追封王爵恩至渥也民夷念王不置合辭請于朝建祠報可俾王之子今西平侯纂其任從民望也按祭法古之通祀者五曰法施于民曰以勞定國王兼而有之載祀百世此其肇歟祠作于薨之後二年九月某甲子成于某月某甲子凡爲楹若干行馬列㦸不侈不踰遵憲章也旣成享咸請紀于石以垂無極不獲辭因作迎享送神之詩俾歌以樂焉大明麗天萬國明赤苻飛騰䇿六丁惟王翊運天降精身薄日月騎斗衡坐張天弧檻攙搶助帝駟伐基隆平氣壓崐崘蕩滄𬈑出入星緯無留行勁渉滇海縻長鯨長鯨旣剸波浪腥龍蛇走陸殺氣横嘘陽吹隂孰敢嬰文經武緯光晶熒手揭元會歸虞廷上騎箕尾爲列星帝錫侈封王黔寧河山帶礪分漢盟堂堂遺像夾兩楹神光夜夜飛爽靈肹蠁布潟通杳㝠棽麗颯呇從兩旌倐焉如雲搏紫淸八衝鏘然韻流鈴春秋報事垂千齡勑建神木山神祠之碑胡廣皇帝統御天下愛養黎元恩惠優渥首飭羣有司毋擅用一夫取一財於是生養休息日庻日富比年歲登民和海宇熙洽及永樂四年秋詢謀於羣臣曰六者建都必營宫殿朕肇建北京恢弘舊觀以永詒謀顧興作事重惟恐煩民然不可後僉曰陛下愼卹民力視之如傷而民皆樂於趨事皇帝曰尓徃試哉乃命入山以伐材焉用民力十取其一給以廪食歸其傭直而民欣然鼔舞不知其勞故事不程督而集工部尚書臣禮取材於蜀得大木於馬湖府圍以尋丈計者若于踰㝷丈者數㧣計庸萬夫力乃可以運將謀刋除道路以出之一夕忽自行達於坦途有巨石巉然當其衝夜聞吼聲如雷石劃自開木由中出無所齟齬度越岩險膚寸不損所經處一草不偃百工執事顧視讙譁踴躒交慶事聞廷臣稽首稱賀謂聖德所致皇帝辭以弗逮推功于山川之神乃遣官以牲醴祭之將至之先大雨洗塵山川草木預有喜色鮮澤榮華蔚然穠麗及祭之日先降微雨灑滌游坋爼豆旣陳羶香肹蠁玄雲倐消天宇澄湛明星煌煌月影交輝祥飈徐來神用居歆聞山呼聲者三震動天地神顯其靈於昭有赫遂封是山爲神木山詔有司建祠歲時祀享以荅神貺命臣廣爲文以紀其事刻之于石臣廣頓首受命仰惟皇帝功德高厚比隆天地妙運一心斡旋萬化隂陽鬼神隨機應勤脗合無違故凡有施爲嘉祥沓至是以山川之神協賛貞符宣暢明靈濯濯洋洋休有烈光超達物表有不可以智巧測量之者然以理求之其可知巳夫充塞兩間者鬼神之功用若川泳雲游曰烜雨潤風霆鼔動寒暑更迭歘隂忽陽變化揮霍其迹尤著然三辰順軌雨暘以時景星慶雲和氣充溢斯皆一心之所感召若夫木石非由人力不可以運動而乃潜闢黙輸寔由聖德感孚神明協應之所致也固非耳目見聞之可知已夫人之所不知不能者鬼神之所能也以人之所不知不能而測夫鬼神之能冝其有弗知也况凡天下名山大川奠於方域之中出雲雨產財用以資於國家其神固靈也而神木之山所產艮材自萌蘖而長以至於拱把連抱神之衛閟呵禁以待於今日然則神之効其靈者非一朝夕也兹今之顯應所以兆皇帝萬世悠乆之徵則神之功其可以少哉稽之於傳凡有功於國家者必有祭神功彰著實爲偉荗載之祀典於法允宜臣廣再拜謹書其事爲記幷系之銘以頌歌聖德且以敷揚神休銘曰皇帝受命統御萬方六合㤗寧物乂民康端拱垂衣無爲而治蠻夷荒服蟻附而至休徵之應如川如林至和感孚百靈具歆壯哉北京龍飛之所帝用詒謀大啓厥宇愼卹黔首􅢻詢在廷庻民子來于始經營皇帝有詔取材于蜀神木之山岷峨是屬楩楠豫樟絜之百圍神用呵閟以需于兹斧斤斯入林披薄歛凢厥所產悉呈弗掩良材丸丸孔㬅且碩載而輸之萬夫之輅層巒峭壁矗矗崇崇深谷谽呀飛流怒淙有巖厥途其石截嶫徐歩曳武猶慮僨跲方謨夷險慿虚架梁人力未施木忽宵行越澗逾壑砰磕如雷巨石磛礹隨擘以開維山有神維神昭靈黙驅六丁佑相皇明神衷顯宣嘉徵斯應以兆皇基萬世永盛報神有典祀事孔宜爰作新廟歳以享之醴淸牲腯籩豆浄潔肴羞維旅羶薌有苾春蘿蔚隂秋菊垂芳裸薦以時禮儀有章執事駿奔秉䖍以對濟濟鏘鏘罔敢或懈神之來享驅霆駕風翳以鳳凰驂以虬龍靈旂揚揚神旣降只鼔鍾鏗鍧神醉以喜神永宅兹時雨時晹眷此邦氓易沴作禳皇德同天幽明畢𬒳剏制靈祠以毖神祀礪石刻銘兹山寔侔頌宣皇德永著神休勑建禮部賜宴之碑楊士奇宣德六年十月北京新作禮部成尚書胡濙奏請樹石刻文以示乆遠制曰可其文以命臣士奇臣旣拜受命謹按禮部在唐虞為秩宗在周為春官大宗伯所典天神人鬼地祗之禮而禮樂庠序風化制度品節之事咸屬焉我國家列聖相承法古制治尤重於斯皇上臨御之𥘉茂簡俊又以稱厥任時濙以禮部左侍郎兼南京國子祭酒奉命還禮部數月陞尚書上諭之曰國家所重祀事朕夙夜祗奉天地宗社曁于百神以迓福生民爾其懋相予無怠凡國所用彛典爾惟舊章是循是式用佐予理無忽爾惟寅惟淸用𢡟副朕命濙拜稽首言臣敢不精白一心以圖稱萬一蓋上所命濙與虞舜卽政命伯夷者同一道也而嗣大位以來祀享受福川嶽奠寧歲屢豐登田里給足災沴不作遐裔畢來禎祥之物駢見疊至皆本扵皇上誠敬所格而徳化之效也于時北京創建未乆百司官府皆未作其公署及治文書之舍率就簡便蓋未暇及也一日濙奏事殿中上曰國家大典禮悉隷禮部非可以簡其官府宜先備勑工部作之度地於大明門之東西向中爲正堂堂之側爲司務㕔前爲周序爲中門爲前門正堂之後爲後堂左右爲賔客之位後爲庖庫堂序之外爲四屬儀制主客在左祠祭精膳在右鑄印在中門之左其地亢爽其材堅良高明䆳深制度弘偉方之近代綽乎過焉旣成以聞命京師諸司長貳咸徃落之命光祿賜宴恩澤之隆羣情歡溢咸謂皇上惇典庸禮啓自宸衷始作斯宇甚盛舉也臣惟禮者天理之具於人事而行之以敬者也用之事神而神享用之爲政而政修用之敎化而敎化孚用之制作而制作盡善故禮所以爲國家天下之大噐不可一日無者而典之必得其人惟皇上知之明而行之果也然臣伏覩未作禮部之先有司以上所居宫殿􅋻益請拓地改作上曰朕方惓惓息民爲心居室豈今所急却其奏旣而出璽書命諸司詢民瘼施振貸巳逋責曁禮部成有司復請改作宫殿且言治材巳具上曰朕夙夜求民之安今天下匹夫匹婦豈皆得所而何暇於自求佚若等宜體朕卹民之心敬哉勿忘又却其奏而岀璽書敷布德恩存卹鰥寡招懷流徙且飭有司蠲弊舉廢修懷保之政蓋聖仁一念保民惟曰孜孜昔大禹薄自奉而所勤者民之事所致飾者宗廟朝廷之禮與皇上聖心異世而同符猗歟盛哉是役也重禮為先務而再却有司之請聖德之大者臣忝職史氏謹備書之而繼以詩曰稽昔帝王禮莫重焉天叙以勑人文以宣其用之嚴曰郊與廟敎化制作咸禮之要皇明龍興列聖御極盛德光華有典有則皇帝繼統躬禮導民從容安行天下歸仁翼翼北京視周之鎬桓桓六鄕羣辟之表有虞秩宗咨命伯夷帝謂臣濙徃哉汝諧粛粛三禮汝祗相予凡百儀度汝愼攸司爰初經营六官之府帝謂臣濙權輿宜汝龍章自天臣工祗率力齊材良成之不日天闕之南端門之東輪焉奐焉閎廓穹崇維皇明聖以禮爲國維明維果有此弈弈維孝維恭大禹攸同約巳勤民菲食卑宫矜卹無告惠鮮鰥寡文王小心日不遑暇仁澤流霈源源弗窮恱懌歸赴如川之東禮序樂和化淳浴厚龜龍在沼麟鳳在藪體信逹順維聖之功執事有恪維臣之恭夙夜其勤式告有位維寅維清以熈帝載君山廟碑君山廟者祀常州府同知張侯之廟也爲政而能爱民生則父母之没則烝嘗之皆由其誠有以致之也張侯之同知常州也奉部符專督農事旣至視民如子喜爲之興利常行視水敎之蓄泄躬履壟畝察種植而爲之勸或時坐堘間相爾汝語如家人未嘗笞詈辱人遇老病鰥孤率有㤙意所過飾勵學校正士習民甚戴之上官知其得民也有所賦輒檄之督民恐以緩累侯則争起趨事然侯終不以慮譴而急民是時天下軍伍滋弊軍之姦黠者率用賂䂓匿而詭傳平民於籍民𬒳枉比比朝廷以璽書分命御史清理其要在覈奸直枉御史當詣蘇常者言於兵部常州必得張同知共事乃有齊部遂以檄侯御史時銳意得軍爲功不復矜念民枉侯固執民實非軍敢違璽書不從御史不可柰何數出無禮語詬詈之侯忿鬰不能平數日疽發背卒然常之人頼侯以免於枉者猶十七八時蘇之佐郡者極力助御史得軍而枉民動以千計愁苦嗟怨於道路累年不觧常之人以是益思慕侯不㔾侯素澹泊廉介不苟取一毫自入仕未嘗以家累隨公退坐一室蕭然讀書焚香而巳易簀之先夕侍薬者入其舍索燈燭悉無趨出取膏油一盂以入侯遥見竟謝郤之其操類此侯先自翰林庻吉士爲刑部主事春坊中允大理寺丞皆有政績嘗奉命督事廣東福建皆有惠及民此特載其在常者耳侯卒之日民老壯奔走哭於庭皆哀具儀奠祭累日匶行白衣冠送者数千人非積誠而能致此乎後数年江隂士民朱善継善慶周孟徳孟敬因衆民之志協謀怍廟於邑之北君山以祀侯來請書于石倂作迎享送神之詩使歌以將事侯名宗璉字重噐江右吉水人永樂第一科進士朱氏周氏皆尚徳崇義之家詩曰肅穆兮侯堂酌山泉兮薦林芳泠泠風兮髣髴侯戾止兮珮玉瑲懷仁侯兮撫我動與息兮有敎稼芃芃兮連疇侯顧我兮樂以笑侯乗兮蘭棹倐東臯兮忽南畝溪有鱷兮陸有虺侯赫視兮敢余民侮侯來遲兮逝何疾侯之逝兮我民以戚山之明兮水之麗侯捨玆兮安適侯懷故鄕兮旦徃夕來祚我佑我兮無遐遺調二氣兮平四序下無汎濫兮高無暵災沼有魚兮苙有畜公無負逋兮私庾足我民兮子孫孫子承侯福兮千百世祀重修開平忠武王廟碑王直正統十二年秋八月通州守臣李經言州城東南隅舊有廟以祀開平忠武王常遇春蓋洪武三年奉勑建毎歳春秋守臣以少牢行禮庭下載在祀典今八十年矣脩治不継日入於弊懼無以稱朝廷崇德報功之意請繕完如法制曰可命工部聚材鳩工撤而新之通州諸衛及州所屬縣各以丁夫給役且命總理通州諸務都指揮僉事陳信兼督之命旣下文武吏士奉承唯謹材不徴而集工不召而至智者效謀壯者效力作正殿前殿翼以兩廂前啓三門旁列廚庫凡諸像設靡不畢備弘麗靚深有加於昔經始於九月巳酉而以明年四月成於是信來請曰是役也宜有紀願書而刻之麗牲之碑惟天生大有爲之君必輔以不二心之臣肆我太祖皇帝受命而興王以忠信智勇佐之飛渡大江霆擊電掃東南郡縣以次削平旣復下兖豫遂議北征車駕至汴申命大將軍徐逹而王爲之副諭以仁義行師母殺戮以逞天聲所臨無思不服王先至通州禁侵暴務安輯人不知兵市不易肆皆愛戴如父母遂收燕都明年平河東入秦虜復侵通州王還兵拒之通州之人免於茶毒其徳王尤深王遂率師破開平大俘獲而歸至柳河川以疾薨柩還過通州州人皆罷市迎哭旣去而念之不裒飮食必祭上思王之功而知民之感慕如此比廟之所以作也昔漢之西鄕侯張飛號萬人敵嘗拒魏將張邰於巴西大破郃軍以安此土巴西人德之歴千餘年而廟食不廢今王以雄材大畧佐太祖定天下兵威所及王之績爲多其功烈在朝廷利澤在生民蓋甚大較之飛實過之國家褒荅勲臣恩禮之厚亦非蜀漢可比王生爲上公没有顯號而廟祀永乆蓋宜也王之廟在京師尤盛此特其别祠焉耳今天子又新而大之所以承先德而報王功其超越百代可知矣乃爲述其事而系以詩曰太祖龍興四海從維王仗劔先來同所向無敢當其鋒通州亦在破竹中奠安民居遏㓂衝播灑義澤揚仁風閭閭歌舞靡怨恫旌旗北伐兵馬雄汛掃絶漠烟塵空大星宵墜感帝衷錫以顯號昭殊功廟食於此罔不恭聖皇繼𫐠棟愈隆神之仕位儼儀容調和隂陽幹化工疵癘不作歳屢豐春秋祀享無終窮皇明文衡卷之六十六
