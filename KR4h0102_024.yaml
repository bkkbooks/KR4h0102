  text: 皇明文衡卷之二十四
  hash: sha256:49b1d0681a482cf14e33e1a92cc7616af2bbb6eab4d77371047abc9a992ffa67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_024-1a}
body:
  text: 問對楚客對宋濂宋子泛舟西上夜泊彭蠡褰篷而坐時長空無雲明月皎然孤照衆星環列一一可數同舟有楚客者忽指月問曰日月一也此何以有虧盈乎宋子曰不然也月圓如珠其體本無光借日為光背日之半常暗向日之半常明其常明者正如望夕初無虧盈但月之去日度數有逺近人之觀月地勢有正偏故若有虧盈耳曰然則其有夜食奈何曰此為地影之所隔也月上地中而日居下地影既隔則日光不照其隔或多或寡故所食有淺有深蓋地居天內如雞子中黃其形不過與月同大地與月相當則其食既矣唯天之體沖漠無際然其圍徑之數及去地幾千萬里巧算者亦可以推之也客曰月之為説既聞命矣五星盈縮占者時有不合此何以無定論乎宋子曰五星從黃道內外而行考其盈縮則於分假距度最宜精審近代占天家於測景授時之法誠可謂度越前古至於星占則微有不同且如辛亥歲正月乙酉朔火當躔房五度彼則謂在房之一度二月辛巳火當入斗𥘉度彼則謂在三月己丑正月巳酉金木始當同度彼則謂在乙巳其後驗之天象所失昭然若論水星距日之度盈縮之間終不踰二十三度半之外彼則謂正月癸卯水躔斗十九度在晨疾假中較之日躔虛六度已距二十七度此尤所未解然天道未易言必得明理之儒如許衡者出正之可也客曰星曆之學儒者亦在所講乎宋子弗答趣侍史具衾入舟而寢越人對胡翰越大荐土沃而澤不竭胡子過之土沃而澤不竭何兹大荐也越人曰子亦知有秋夕之雪乎八月既望日在己丑牽牛未中風雨盲作夜漏下四鼓其聲寂然而止寒氣相薄明發視之則田間之穟戴白者靡靡矣雪作非時稼用大摯胡子曰天亦慘乎哉天非慘也和致祥乖致異民則何眚而降之沴不旱而民荒不潦而民飢轇轕上下變化百物將不有司其柄而馮陵者乎禮有之年不順成八蠟不通順成之方其蠟乃通又寧風旱弭災兵順豐年逆時雨禬禜以告攻説有辭是先王之制明以治人而幽致嚴於鬼神也今蠟禮雖廢歲時有司修其禬榮山林川澤丘陵墳衍民固有祀者矣享其祀而福不及其民又棄其垂成之績獨可無攻説以執其咎乎越人曰子過矣是冥冥者無以為也子視世之峩其冠褒其衣藉文茵而蔭華榱者容貌瑰竒顧盻生輝閎言崇議動無不宜非直冥冥者比也司黜陟之柄決是非辨利害乘堅䇿肥而周乎四履之內入吾境視吾土之沃也吾澤之不竭也其有信吾稼之不栗者乎信吾稼之不栗且督而吏峻而法日夜務取其公田之􅑿而不恤吾民之飢且札者何哉吾患之大聲而疾呼之曾不一動其心又况此冥冥者乎視之不見孰形其形聽之不聞孰聲其聲籍令可咎也則彼又何加焉子過矣胡子聞之瞿然春秋常事不書而凡日食地震星變則書之雷電雨雹隕霜雨雪則書之螽蝝螟蟊木氷梅李實則書之春秋何書也謹天戒也何以謹天戒修人事也王省惟歲而卿士惟月斯之謂也存其對以問諸肉食者不省之而又病之不助之而又取之是獨非吾民巳乎何其戾也葬書問對趙汸或問葬地之説理有是乎對曰有之然則其説孰勝對曰葬書至矣問曰葬書真郭氏之言乎抑古有其傳也對曰不可考周官冢人掌公墓墓大夫掌凡邦墓皆辨其尊卑度數而葬以其族大司徒以本俗六安萬民女二曰族墳墓則葬不擇地明矣豈有無事而著其法者哉漢書藝文志敘形法家大舉九州之勢以立城郭室舍形人及六畜骨法之度數器物之形容以求其聲氣貴賤吉凶而宮宅地形與相人之書並列葬地之法其肇派於斯乎豫嘗讀張平子冡賦見其自述上下岡瀧之狀大略如今葬書尋龍捉脈之為者豈東漢之未其説巳行於士大夫間至景純最好方伎世見其葬毋暨陽卒遠水患符其所徴而遂以葬書傅諸郭氏邪然無所考矣問曰葬書世所有然自齊梁至隋唐君子不道至宋司馬溫公乃欲焚其書禁絶其術何也對曰其言有大悖於理者書固可焚術固當絶也夫盛衰消長之變一定而不可推移者雖聖智巧力無能為蓋天之所命而神功之不可測者也後世諸子百氏好為異端奇論者衆矣未有敢易此以為言者而葬書獨曰神功可奪天命可改嘻其欺天罔神謗造化而誣生民也甚矣世俗溺於其説以為天道一定之分猶有術以易之則凡人事之是非黑白物我得失之細固可顚倒錯亂伏藏擒制於方寸之隱發以遂吾私而無難而世道人心遂有不可回者豈非葬書之有以誤之與禁而絶之固善問者曰夫其􅍝戾既巳如此而又以為葬地之理在焉何也對曰術數之書其言不純往往類此夫創物之智難以言傳固不可以為言者之失而蔽其善也曰敢問其言之善者何謂也對曰所謂乘生氣者是也班孟堅曰形與氣相首尾此精微之獨異而數之自然最為得形法之要蓋與葬書之言相表裏夫山川之起止合散其神交氣感備百物之情故地形之書與觀宫宅人物者同出一原而後世楊廖之徒遂精其能而極其變然後坤靈生息之機得乘以葬而後無失焉蓋非殊資異識足以盡山川百物之情逆來順往旁見側出皆得其自然之數者不足以語此則事雖鄙而理亦微矣故其書愈多其法愈密而此三言者足以盡蔽其義蓋古先遺語之尚見於其書者乎又問曰星天象也術家以名山豈葬書之旨邪對曰五行隂陽天地之化育在天成象在地成形聲色貌象各以其類蓋無物不然無微不著而况山阜有形之最大者哉苟至理所存不必其説之皆出於古也曰直者吾知其為木鋭者吾知其為火轉動者吾知其為水而圓之為金方之為土何也對曰易象乾為天為金為圓因其從革以觀其在鎔則知之矣四方形而土居其中蓋體坤而得地之象也問者曰然則或謂人間萬事皆順惟金丹與地理為逆者何也對曰人有五藏外應天行流精布氣以養形也陽施隂受以傳代也非逆不足以握神機而成變化天有五氣行乎地中流潤滋生草木榮也絪緼上騰發光景也非逆不足以配靈爽而貫幽明知金丹之為逆者則生氣得所乘之機矣夫豈一物對待之名哉又問曰今閩巫方位之説亦得葬書之旨乎對曰論五行衰旺生克此自隂陽家事非所以求形法葬書言方在勢與形之次而近世臨川吳公刋定其書置是語於雜篇之首蓋嘗與人言方位時日無關於地理可謂得其本矣譬諸方伎家起死回生必精乎色脈之度數長生久視不出乎內外之法象蓋形氣之冶神機合變不系於方其本如此問曰然則欲知葬地之理者將即形法而求之備乎抑合隂陽家而論之也對曰是固當辨譬之人事形法其言相也隂陽其推命也有不相待者矣然言相者因百物之異形而各極其情狀以察造化之微而知吉凶必不以相人者相六畜也推命者以生年月日時論禍福吉凶猶或失之者由其為術之本不足以範圍大化也移之以推六畜則太謬者六畜之生不同於人也夫方位之説本非所以求地理况乎隨意所擇不得形法之真而槩以其説加之則亦何異以虛中子平之術而推六畜以論牛馬者而論人邪又問曰然則其説何自而始術家多談之者又何邪對曰不知其所自起也贛人相傳以為閩士有求葬法於江西者不遇其人遂泛觀諸郡名迹以羅鏡測之各識其方以相參合而傳會其説如此蓋瞽者扣盤捫燭以求日之比而後出之書益加巧密故遂行於閩中理或然也夫勢與形理顯而事難以管窺豹者每見一班按圖索驥者多失於驪黃牝牡苟非其人神定識超未必能造其微也方位者理晦而事易畫師喜模鬼神憚作狗馬况羈旅求合之巫惡肯改所難以艱其衣食之途哉此可為智者道爾問者又曰理既如是則葬書所謂反氣納骨以蔭所生者固在其術中矣何乃於奪神功改天命之説而斥絶之若是邪對曰本骸得氣遺體受蔭者氣機自然之應也然吉地不易求而求全吉者尤未易葬師嘗鮮遇而遇真術者為尤鮮是其術之明晦用舍地之是非得失且懸於天而不可必今其言曰君子以是奪神功改天命何其不思之甚乎孔子曰不知命無以為君子豈葬書之所謂君子者乎又曰然則今之名卿大家其先世葬地多驗如執劵取物至其盛時竭力以求輒無所得或反倍謬取禍豈亦分定者不可推移邪對曰不但如是而已夫家之將興必先世多潛德隂善厚施而不食其報若是者雖不擇而葬其吉土之遇與子孫之昌固已潛符默契蓋天卑之也後世見其先之鼎盛而不知所自來於是妙貪巧取牢籠刻削以為不知何人之計則其急於擇地者亦殖私窺利之一端爾其設心如是則獲罪於天而自促其數者多矣擇而無得與得而倍謬豈非神理之顯著者哉問曰然則大儒子朱子亦有取焉何也對曰大賢君子之事不可以常人類論古者三月而葬凡附於棺者必誠必信地風水泉螻蟻之為患至深善腐速朽之藏如委棄於壑蓋時有定制民無得而遺焉皆昔人知之而無可奈何者伊川程子謂死者安則生人安乃自後世擇地而言其自然之應爾朱子之葬必擇地亦曰為所得為以自盡夫必誠必信之道而不失程子之意云爾然而君子之澤未嘗有加於報施之常則其託斯事於季通氏者又豈有所歆羡期必也哉固非可與常人類論也問者又曰死葬者生人之必有而大儒君子所為乃後世之摽準也故世之論葬地者必以朱子為口實則仁人孝子之葬其親地不可無擇也明矣今物理之難明者既如彼而得失之懸於天者又如此則所謂為其得為以盡其必誠必信之道者將何自而可邪對曰死葬以禮祭之以禮斂手足形還之葬與葬以天下一也故喪具稱家之有無夫吉地之難得豈特喪具之費而巳哉先王制禮致嚴於廟以盡人鬼之情而藏魄於幽以順反原之變其處此固有道矣積善有餘慶積不善有餘殃秦不及期周過其曆祈天永命歸于有德而心術之壞氣數隨之此必然之理也聖賢豈欺我哉學士大夫秉禮以喪親本仁以厚德明理以擇術得失之際觀乎時義而無所容心則庶乎不悖於性命之常而無憾於愼終之教矣豈非先哲之志而君子之道哉又問曰然則孝經所謂卜其宅兆而安厝之者果為何事而前輩謂中原土厚水深地可不擇江南水土淺薄不擇之患不可勝道則將奈何對曰聖人之心吉凶與民同患也而不以獨智先群物故建元龜泰筮以為生民立命而窀穸之事亦得用焉豈以偏方地氣之不齊而強人以所難知者哉且江南之林林總總生生化化者無有窮時而地之可葬者有時而盡也又安得人傳景純之説而家有楊廖之師哉夫道不足以公天下法不足以關後世而垂訓者未之聞也雖然有一干此葬書所謂勢來形止地之全氣者誠未易言若夫童斷過獨空缺曠拆水泉砂礫凶宅之速滅亡者固有可避之道也大山長谷回溪復嶺之中豈無高平深厚之地可規以為族葬者雖鬼福之應無及於人而盛衰之常得以盡其天分辟如有病不治常得中醫其視委之庸巫聽其貪戾妄作冥暗顚覆於一抔之壤而不自知者則大有徑庭矣昔人謂誤解本草為生人之禍今葬術豈輕於本草然藥餌得失見於目前而葬地吉凶每存身後故未有能稽終知弊者也事有關於送終之大節儒先君子有所不廢而流俗因仍未能極其表裏精粗之藴與夫得失之由故作葬書問對吾友程君仲本最為留意斯事學之十餘歲矣而審問明辨弗得弗措蓋有志乎明理以擇術者非世俗凡近之為也故書以遺之仲本之師則鄉先生朱君允升其人也朱君明逹精博於六經之藴奧文學之源委邃古之𥘉萬物之源隂陽方伎之本昔賢開物致用與其精神思慮之存乎藝事者莫不心悟神解誠窮鄉晚進之蓍龜氷鑑也於山川情性寧有不得者哉以仲本之善學而卒業於朱先生如王良造父駕輕就熟將有得夫天理之大全豈曰俯察而已至正十三年十月既望趙汸子常書于東山精舍問刑蘇伯衡或問曰聖人尚德不尚刑信歟曰信然則帝舜何為殛鯀流共工放歡兜竄三苗周公何為􅓍蜚廉殺武庚致辟管蔡孔子何為誅少正卯曰德其本也刑其末也是故不得已而後用刑初未嘗以之專造天下也而聖人至於無巳而用刑也必本之以欽恤行之以哀矜欽恤仁也哀矜恕也恕故不喜刻而致深也仁故不加之罪而求其死也是故聖人之刑不徒曰刑而曰義刑聖人之殺不徒曰殺而曰義殺義者宜也在下者非不宜於天理不宜於人情不見刑見殺也在上者非宜於天理宜於人情不刑之殺之也宜於天理人情而後刑之殺之雖刑之殺之而無愧焉不宜於天理人情而後見刑見殺雖見刑見殺而不怨焉是故義殺舉而天下莫不畏威矣義刑施而天下莫不遠罪矣帝舜在位所殛竄流放者鯀共工歡兜三苗而已不聞他有所殛竄流放也周公相周所殺􅓍致辟者蜚廉武庚管蔡而巳不聞他有所殺戮致辟也孔子相魯所誅者少正卯而巳不聞他有所誅也蓋德以刑而輔刑以德而去此所謂聖人尚德而不尚刑也不尚刑體天也故曰天齊于民俾我一日不尚刑保國也故曰式敬爾由獄以長我王國周道既衰判為十二析為七國而刑日非古矣至于秦而極焉啇鞅倡之李斯和之趙高從臾之吕政力行之胡亥成就之有棄灰之刑有偶語之刑有腹誹之刑有督責之刑有相收同坐之刑有見知故縱之刑刑人半於道上而尸積於市成陵自是以來有國家者耳目習熟謂刑不重姦慝不息也謂刑不重號令不行也謂刑不重紀綱不存也謂刑不重遠近不肅也故雖仁人之議刑寧過於重雖仁君之用刑寧失於重往往以刑而鼓其勢以刑而作其威以刑而濟其怒以刑而繩其下甚者則以刑為嬉而廟堂之上郡邑之間朝夕之所務無非刑者夫刑故聖人之所不廢也曷嘗以專造天下而後世奈何獨盡心焉喜刻而致深加之罪而求其死其刑其殺果義乎果非義乎果無愧乎果無怨乎曰然則三代以上刑愈省而犯者愈寡三代以下刑愈繁而犯者愈衆何歟曰古之刑用必得其當無罪有罪生死殊塗人心灼然知所好惡則安得不愛重其性命如泰山也後之刑用不得其當有罪無罪同歸于􅓍人心惛然莫知所趍舍則安得不輕視其死生猶朝暮也是故人之重性命於泰山而重犯法者由在上者視之重故亦自重也人之輕死生於朝暮而輕犯法者由在上者視之輕故亦自輕也夫不此之思而戻戾焉有疾視其臣民之心而惟恐其刑之不勝也前刀鋸而後鼎鑊左鞭錘而右桎梏使無辜之徒駢首按迹以就死豈刑期無刑之道哉孔子曰道之以政齊之以刑民免而無耻道之以德齊之以禮有耻且格則人之善惡顧所以道之者何如耳又安用多殺為且牛羊犬彘雞豚魚鱉人資焉以養生者也其於人也異類聖人之殺之猶有所不忍也而用之必以禮焉殺之必以時焉何至為民父母視其同類曾牛羊犬彘雞豚魚鱉之不若而忍於旦旦劓之刖之誅之夷之也雖能使人屛氣股栗不能自必其性命而於國脈亦巳傷矣獸窮則噬鳥窮則攫况於人乎或者不堪其毒而群起恣肆以決性命於斯須不識能盡誅之否也昔人有云刑以勢行其濫也甚勢以刑張其亡也速故嬴秦以刑懼天下傳國二世成周刑措不用歷年八百此往事之驗也自古有國者其於社稷之靈長則皆欲同周之曆其於刑之輕用則不免效秦之尤此吾每觀前史未嘗不嘆其何心也曰然則如之何而用刑曰明德義以訓之謹好尚以儀之旌善良以勸之申命令以敕之而猶有不率不悛者焉於是擇其尤無賴者誅一以警百是之謂張其勢以德不以刑用其刑以義不以勢正統問徐一夔友人周元亮其先嘗仕宋相見輒言宋事間從余涉西湖上萬松嶺訪宋氏故都籍草而坐因及於正統之説余曰言正統者以天下為一則以正統歸之眉山蘇氏有云正統云者猶曰有天下云爾元亮曰宋之太祖既受周禪平江南平湖南平嶺南平荆平蜀至於吳越恐悚待命所未臣者獨河東一彈丸地可以謂之有天下矣比見四明陳氏箸續通鑑綱目其書太祖崩曰宋主趙某殂至太平興國四年始揭正統歸之豈非以河東未臣而以敵國例之歟余曰非也太祖之北征也嘗因河東諜者語劉承鈞曰君家與周世讐宜其不屈今我與爾無間何為重困此一方之民承鈞復命曰河東土地甲兵不足以當中國之十一然承鈞家世非叛者區區守此蓋懼漢氏之不血食也太祖哀其言遂不致伐以此觀之則河東之不足為正統纍也明矣彼陳氏之書夫豈至當之論哉又曰或曰其説本於朱子余曰朱子之答陳安卿也曰如以正統則秦初未可當必平一六國而後在秦晉初未可當必滅吳而後在晉隋𥘉未可當必滅陳而後在隋因言如本朝亦必並河東而後在本朝朱子誠有是説矣竊嘗觀其答問之意以謂由唐而下正統在梁梁之統在後唐唐之統在晉晉之統在漢周氏篡漢廢湘隂公贇其父崇自立於河東則漢之統猶在河東故也據朱子之説而以當時大勢度之于秦于晉于隋是矣于宋則有可議者何以言之六國之衆可以敵秦初之秦吳陳帝有江南可以敵晉初之晉隋初之隋區區河東而欲敵宋初之宋以一敵九小大不敵昭然可見此必朱子一時答問云然非其終身不易之定論也而况太祖之生符明宗宫中之祝至其受禪因陳橋六軍之變天命人心之所屬實開三百一十六年有道之基不以正統歸之可乎陳氏之書蓋用其大父所取伏羲以來至祥興事類為四言叶以聲韻名曰歷代紀統與其父泌倣綱目例尊紀統為經而疏其始未為傳以行者如曰本於朱子則是特其未定之説而以為是非忠於朱子者如出臆見則未敢以為至當元亮良以豫言為是爰著于篇土偶對具瓊岸海有古祠奉捍沙神者余暇日過之循其垣則惡木枓然而烏鳶噪其顚入其戶則毒草茀然而蛇虺蟠乎中有屋焉仆而不攴有像焉剝而不完老巫揖而進曰是祠閲五百春秋矣嘗能以禍福恐乎人有疾必禱水旱必禱海賈泝濤往來者必禱神皆答之如響百穀歲登無蜚蝗霜雹大疫之災人既樂業至者如歸由是剪荆棘而宮室之或光怪夜見髣佛金攴翠旗自天而降而日有事於是者麏至及其廢也咸玩而侮之神亦不能禍福於人豈盛衰關於造物者乎余曰嘻是土木而衣冠也昔非神也而神之者人也今非弗神也而人弗之神也若何怪焉是夕宿于祠之旁有介而辨者見於夢曰吾既辱子子何毁之過邪子見吾土木而衣冠也獨不見衣冠而土木乎小而為邑邑有令大而為郡郡有守其為禍福甚於神也罷軟者苟祿貪縱者敗法非守令而土木與內附百姓外柔四夷生殺繫其喜怒黜陟繇其向背執天子之柄而位百僚之首不啻神之魁然而貴者也出則陳兵而驅入則復壁而居目瞽而黑白相混耳塞而淫雅不殊非宰相而土木與吾假丹青之飾而託乎太隂使玩者有時而懼彼肖天像地握珠玉被錦繡且倀倀焉尸居而鬼躁未始見德於人子奚不以誚吾者誚彼與萬金雖積不救燃臍之禍三窟徒營豈免排墻之厄吾恐棟焚而及巢燕基圯而殃穴蟻其不為吾祠之毀者幾希余應之曰汝之所斥者似矣而非其實也昭昭者或愚皎皎者或汚安知其才足有為而時不可為乎介者又曰胡廣歷六帝而無稱于時一盧懷慎耳張華裴頠禍至而不圖一曺爽兄弟耳人物不同而同為土木已余無以詰覺而識其語將獻諸上懼執政者之不悅也故尼易範答此篇刻本皆缺林志
