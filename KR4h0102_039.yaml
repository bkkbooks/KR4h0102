front:
  text: 皇明文衡卷之三十九
  hash: sha256:7ef2ba55395273968ced4202d6a6b0e2ed97544f99f38370e602ebe2e9c65778
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_039-1a}
body:
  text: 序通鑑綱目考證序朱右上虞徐昭文考朱子通鑑綱目凡例以證刋本脫誤及補朱子之未備凡若干卷名曰考證有以淑後之人其功不細矣豫乃為之序曰大道之世典禮命討皆原于天禮樂征伐自天子出書不作可也大道既隱禮樂征伐出自陪臣刑爵不咨于衆吾夫子蓋不得巳而托二百四十二年典禮命討之權此春秋之所由作也自時明王不興治教靡著姦臣女后擅政滋甚司馬氏述左氏為編年而發原于韓趙魏亦以王綱所繫典禮所存而天下之大經大法在焉子朱子又祖春秋以修綱目其歲年之久近國統之離合政刑之得失人材之賢否大書以提其要分注以備其辭誠有得于筆削遺意後世之鑒誡昭矣近代尹起莘發明既相依附汪克寬考異又多未精比以朱子凡例參會今本未兔致疑兹讀徐君考證則渙然冰釋矣其大者如莾之弒帝必加進毒操懿進爵必加自為劉𥙿朱晃稱帝必著其姓君臣之義凜不可犯漢昭烈章武三年分注建興晉武太康十一年分注永熙父子之倫有敘不紊如漢景尊太后則加薄氏帝禪立張后則加貴人于以别嫡庶貴賤之分竇憲曰舅梁冀曰后兄楊堅曰后父楊釗曰貴妃兄于以懲外戚僣竊之禍高力士李輔國程元振輩皆書宦者于以防寺人干政之患拓拔祿官南詔酋龍之卒皆以死書于以戒四夷亂華之漸李從珂必書養子又以著異姓絶嗣之危他如高后廢少帝則改曰主霍光輔少主則改曰帝至若臨視如幸攻討誅弒莫不注意而備書之一字褒貶善惡靡逃然後朱子立言之旨無毫髮爽其君臣賢否之實治忽盛衰之機巳瞭然于心目間學者自是無缺略抵牾之患徐君之用心可謂公且勤矣使朱子復生必將有起豫之嘆是書之行詎不有關於世教也哉其徒將鋟􅎚以傳遂書于首簡性理本原序道之大原出於天而天亦氣化中一物爾然其所以為造化必有尸之者理而巳矣故曰天生蒸民有物有則又曰體物而不可遺則理者又天地萬物之本原也是故君子即物以察理未嘗有無理之物即理以觀物未嘗有物外之理子程子曰沖漠無朕萬象森羅巳具殆難以迹求之也自夫河洛出圖神聖闡閟所以立萬世人極者固巳昭然于簡策矣孔孟既沒道學不傳世之言治皆苟而巳幸天未喪斯文濂洛間出無極有圖東西有銘與夫定性好學之論百世不惑揭日月於中天昭矇瞶於既昧真來學之指南後世之衡鑑也右生也晚於道靡聞父師有訓敢不祇承熟讀詳味恍乎有覺安敢自私故録其尤要而切近者輯而為編名曰性理本原且以河圖洛書揭之首本諸天以示乎人次敘太極國説定性書好學論西東二銘擴諸人以復乎天蓋異世而同符者性理之本原至矣復以通書一卷感興詩一卷附于後若正蒙諸書或有未純兹不復輯學者苟能於是書讀之習而講之精知之明而行之力氣化之流行人心之妙用有不待他求而能知天人之藴奧聖學之淵源亦可指顧而得豈不為得其要乎至于盡心知性以知天存心養性以事天夭夀不二修身以俟生順死安無復遺憾于出治乎何有學者其毋忽焉九靈山房集序桂彥良士未嘗欲以文名世也以文名世者士之不幸也有可用之材當可為之時大之推德澤于天下小之亦足以惠一邑施一州盡其心力于職業之中固不睱為文然其名亦不待文而後傳也至于畸窮不偶略無所見于世頗自意世之人既不我知則奮其志慮于文字之間上以私託于古之賢人下以待來世之君子烏乎是豈其得巳哉此余于浦陽戴先生而有感者也先生異時在承平之世從鄉郡大儒待制柳公貫侍講黃公溍逰俊偉秀發軒然時輩中巳有文名然志在用世未睱切切于此也及事與志乖所如多不合知其無所就功名遂抑情遁迹盤桓乎山顚海澨訪羽人釋子而與之居益肆力于文凡觸心抵目天地日月寒暑山川草木奇異之觀羈人狷士之遺迹隱行皆紀而載之因以寓其無聊不暢之思發其瑰傑磊落之氣淸深雅潔往往無愧于古之能言者雖其用意精絶而先生之窮不幸亦至矣然世之得所願欲食祿據位者何限求其勳業則未知有聞問其同時之人巳不識其姓名者有矣彼雖幸必非不幸而先生之窮庸知非幸哉先生之子禮輯録成帙辱以相示余非能知先生者然亦有志于斯事故附私説于後使觀先生之文幸者可以自省而不幸者足以有發也周易旁注前圖序朱升愚自中年以經書授徒教子每于本文之旁著字以明其意義其有不相連屬者則益之于兩字之間苟又有不明不盡者則又益之于本行之外學者讀本文而覽旁注不見其意義之不足也惟易旁注則有前圖者易之為易其本也圖象而巳文王周公孔子之書實為圖象作注腳故明此經者不得不求其本也河出圖洛出書天不愛道泄諸象數一可巳二何居作河圖洛書合一圖第一聖人之則之也八卦成列而又因而重之其傳于今也各有橫圖圓圖而六十四卦圓圖中又有方圖則亦悉矣帝出乎震成乎艮其方位之象又何為哉作先天後天合一圖第二先天後天其始其終既各有序矣連山歸藏首艮首坤今不能知而周易首乾坤終既未濟經分上下其間卦序乃復如彼作周易卦序圖第三卦變也卦主也互體也卦數也卦位也納甲也之六者時雜見于經傳必各著其全使人可通考焉可也作六圖第四淳安夏氏有讀易十字樞愚平日竊窺于易得三大義二者經傳訓釋之機要也則以附六圖之後聖人處憂患之道自履至巽其傳古其指深卦之名義殆未足以盡之也作三陳九卦圖第五揲蓍以求卦因變而用爻比義從長宜勿拘一説作蓍卦變占圖説第六夫子言蓍卦之德曰圎曰方固非其直曰七奇八偶而巳作蓍七卦八圖第七邵于天根月窟之吟非為今易安注腳也豫章蕭氏周易卦序之學區别于三畫六畫之原而象意昭融玩味乎正變始終之故而教道明著前纂為圖今録其全文于後而係以邵子之詩履運處身同一揆也作三十六宫圖説第八八圖為之前而後周易旁注可得而讀矣葉宗茂哀詩序朱升新安葉宗茂有清才年僅四十有四卒于金陵邸見聞者哀其遭時之不偶也為之賦詩而里之老友朱升為之序序曰宗茂葉濂翁之子也生二歲移家于蓼自其幼以敏給聞稍長治進士業從余復卿先生學戴氏記歲丁亥歸就鄉籍試有司明年豫歸自燕山取道至蓼訪之後五年淮兵起宗茂避地歸鄉兵旋至蹂郡邑宗茂從鄉兵奮禦稱能後四年江南開省或薦之起家知婺源州時州境未定非美官也既而鎮戌官適前從統鄉兵者于是上下相安得行撫字之政再考乃代代者不善于民宗茂美聲益遠播矣使説蜀説所長也既而不遣使督造戰船事集使守饒饒境接婺源民歡其至戍將與之不協不久罷去謫濡須二年讀書治藝不戚戚或又擲其所督造船不善重得譴去年使城築所賦尋仞十倍其家産不給也子仁效緹縈上書得免今年夏以病終嗚呼宗茂而止于斯邪宗茂風神秀徹言笑媚好讀書史不數過成誦為人比方解説無不喻者隆師親友好賓客急人貧難有國士風作詩有思致有所論述滔滔不厭倦一時欲有為于世者往往以器略待之然而天性率直不能曲為謙退推讓以苟恱人視已之善如人之善視人不善如巳不善非古心古道之士不能不相齟齬宗茂之得譽毀以此楊子雲曰世亂則賢聖馳騖而不足世治則庸夫高枕而有餘亂世之民困于供億任則困于責仕不能集事者得罪而禍亟集事則事愈歸之甲兵錢榖撫綏應對豈一人身所備一不善卒不得免焉使宗茂之涉世也得三四十年不亂卒其經術名進士也展其事業良有司也又加之以年壽斂華而實為賢公鄉鄉先生以善後來使衰老者得所倚賴豈不甚善而乃止于此豈特其一身一家之氣運邪始宗茂從余逰與婺源俞仲謙偕二人通家昆弟出處必相從仲謙能以義相正若不相能也宗茂既卒平生所與善相附者衆而能存知其孤永其身後名者仲謙一人余故雖以宗茂能得友古心古道未始絶無人自慰而重念人間世之可悲也嗚呼宗茂則巳矣吾與仲謙之悲何時而已邪贈徐大章序梁寅余昔以戊子歲之秋至金陵逮庚寅歲之夏將歸江右以為錢唐江左之名郡也于是行而不一逰焉則將無時而至也乃命兒子岷買舟載書籍繇亰口而往留錢唐踰一月于賢士大夫固多見之矣而天台徐君大章家于是郡為侯泮助教考其藴蓄聆其論議而又相與之勤相顧之厚心尤慕焉西還之後不二年而兵興竄身巖石之下屏迹田野之間每思金陵及錢唐恍然如夢寐之所歷心雖係焉而迹不可以復至矣今上龍興金陵為巨麗之都視前時益盛吳元年丁未歲以詔徴至都四方之士翕若雲集而大章亦以嘗為郡文學見徵于是得復與之會相持問勞以喜以歎思曩時之周旋誠猶夢寐不期復見于此也是時上方文武並用丕武隆古肇置三局一曰律局以定律令凡舊官之陳于憲章者居之二曰禮局以究禮儀凡宿儒之通于古制者居之三曰誥局以撰誥命凡俊才之優于文辭者居之余備員禮局而大章撰誥文同居官寺者半歲或談辨于蚤莫或賞詠乎風月大章之學之文固進于往昔而余之益老且衰則日退而巳嗟乎昔之見也不期再見于今日而今之見也又可期之于後邪其睽之久也其地之遠也而乃無一言以為别于人情何如也而余之贈以是言則所期于大章者固不啻如今而巳也送余縣丞序梁寅五方之民俗有不同繇山川為之限隔而風氣殊焉長民者因其習俗為之政教率其不同以歸于同斯為善治矣今天子肇興鴻業威明並用疆境日闢齊魯之地悉歸輿圖而州縣之長二方愼于遴擇既擇之當則進之殿庭而訓飭之若曰北俗之淳質異南土涖以純誠斯治之宜馭以譎詐匪道之正當是之時余君宗暘以賢良選為丞于般陽之長川吾知其無負于訓飭也君三衢世家其讀聖賢之書思勵其躬而措之政固藴之也久矧以其淳質之性臨淳質之民其奚至于齟齬哉嘗聞乎北俗其一家之幼少必聽命乎父至嚴也至敬也凡齒德之尊于一鄉鄉之民必率以聽其教斯為鄉之父縣之令丞治一縣縣之民必率以聽其教斯為縣之父州之守佐治一州州之民必率以聽其教斯為州之父而南之俗或愧焉其為一家之子者或乃不知敬其父矧為鄉縣州之民而能教其鄉縣州之父亦幾何人哉大率豪陵其善貪譏其廉文嗤其質巧侮其拙偽欺其誠忮疾其仁若是者固自謂之賢也而莫以為恥也之長川能因其美俗以成其善治使北州之民咸曰維南有君子斯誠稱于任使矣太平之基惟賢是資君必朂之贈安慶知府談敬先序汪仲魯臣子趨君父之命不計利害惟忠義之為尚非逹于理者不能然談君敬先知安慶之明年夏六月寇至鎮卒不戰以潰寇退君倡僚幕之官撫殘傷遺民固守三越月或曰郡府無兵甲寇出沒難測未若還請命于省府君不聽九月幾望右丞徐公達領兵城安慶于是民得安全而官有寵錫之榮又明年八月我吳國公躬率舟師解洪都之圍三戰皆捷大敗陳氏之兵其將校悉以殺溺擒降偽主友諒中流矢死降其卒數十萬盡得其樓船公憫江夏之民屢年困迫于陳氏戰鬪供億不少蘇不忍輒以兵加之謀得其人將命以招諭之而談君往焉或曰友諒死未知其信否不可以輕往或又曰友諒果死其嗣子必繼立亦不可往君曰上命也其可辭避乎于是奉命趨江夏宣明吳國威德懷柔寬惠之恩言論慷慨氣不餒竭人為之感動厚其禮遇乃以其官使來復命若是二者豈非不計利害惟忠義之為尚者乎苟不達于理而惟人言之去就鮮有不較乎利害者也以趍利避害為心而能忠于事君者未之有也故曰非達于理者不能然君既復命還安慶九華知府劉君喜而寄頌以詩九江宋伯折又率郡之能詩者咸歌詠之新安汪仲魯乃以事之關于大節者二並書以為敘送彭萬里之江夏序王師西平江漢伐罪弔民義明勢張人心翕合是故一戰而殺其大將焚其巨艦再戰而俘其衆不可以數計三戰而殲其渠魁降其將卒數萬盡得其樓船古今大快靡逾于此夫殺主自立逆亂天常者人得而誅之國家申明春秋大義于天下江漢之民望風順服知者獻謀勇者效力抱才藝懷道德山林幽遠之士率皆振奮而願有為于時也况其勇健有謀直言好善如吾彭萬里者哉萬里以萬戶侯從鎮同安戰守招懷屢建勳績向之三戰皆預焉兹再往江夏且視豫疾以别豫覩國家盛事絶古今多士雲集而豫則病廢甚不能振拔有為獨壯萬里之行也執其手而語之曰王師方拯民于水火之中保之若赤子俘獲者盡釋不殺仁聲達遠邇真所謂保民而王者哉夫義之著所以勝敵也仁之孚所以安民也敵勝而民安以定天下不難也大丈夫樹勳名于不朽殆不違斯言也夫王生歸儒序葉致中能言距揚墨者孟子謂之聖人之徒天徒距之而輒與之若是其重則逃乎彼而來歸者得無與其賢哉吾友王生故搢紳名家幼失所怙其族人舍之逍遙觀為道士既而來學于余聰悟警敏若聖賢之書諸子史傳既習聞之乃幡然曰家素以儒科顯不幸而中微而不肖者幸生以粗有識知乃棄去從者氏恐非先人遺意也乃解其冠裳謝其師歸讀書于其家别業于是吾黨儒者無論疏遠咸嘉尚之至有禮延之俾淑其子弟者嗚呼昔太史公著六家序説曰儒者博而寡要勞而無功又曰道家者流因隂陽之大順采儒墨之善撮名法之要絀聰明去健羡兼五家之長為足以為理夫大史公之論若是王生為其徒矣習聞其學矣乃能尚吾儒之教舊爾來歸為儒門弟子師則是夫能言距揚墨者其輕重為何如識者必有以辨之乃有請余言以美其志者豫曰儒者之道何道也儒者即天地以為道也天尊而地卑君臣之位也天生而地成父子之繼也一隂而一陽夫婦之配也日月星宿四時寒暑其比並其先後小大朋友長幼之則也觀乎流行之有序發生之有和禮與樂可行矣察乎天之經地之緯明乎陽之舒隂之慘政與刑可作也聖人者出仰觀俯察立為經制莫非以天地之道以為道人之為人者生于斯長于斯而待盡于斯固不能外天地以為人惡能外天地之道以為道哉能外天地之道以為道又惡能絶君臣父子舍禮樂刑政以為道哉知乎此則太史氏之説然乎否乎雖然彼瞶然者無所知無足與適也知而不之信信而不擇其所從知猶不知爾若生者可謂能賢也哉生雖貧志不屈身不汗為吾道自樹立遂吾人倫長吾恩愛朋徒來從窮則相切以自善達則大行以兼善不其偉乎于是有以吾言為足以輔吾教且有以達其志遂請書以為序贈蔡山人序宋玄僖自知其命者而後可以言人之命命豈易言哉富貴貧賤命也壽夭禍福命也命懸乎天天之所為深遠莫測而人欲言其將然無有不驗難矣哉是故非自知其命者不可以言人之命也蓋知命為君子君子之心不蔽于物而理無不燭理既燭矣于富貴貧賤壽夭禍福一聽乎天之所為而無不樂焉既以樂乎巳又以語乎人曰富貴命也知命者不溢不危斯可以長守富貴也貧賤命也知命者不諂不濫斯可以久處貧賤也壽夭禍福命也知命者不偷活不傷生則夀惟其壽而夭非其夭也不足欲不蹈險則福惟其福而禍非其禍也斯言也人苟聽之于世教不有助乎夫以匹夫之言而有助于世教非君子其孰能之術數之學云乎哉上虞蔡某山人蚤嘗習進士業試不利即委分田野而無競于時非自知其命者歟中年難于生事乃以五行書推人生年月日所直日辰而有以勸之于其富貴者勸其不溢不危于其貧賤者勸其不諂不濫于其夀夭禍福勸之以不偷活不傷生不足欲不蹈險為人言命而所勸若是非以君子之道處已處人者歟不然何其不專尚乎術數之學也余久處貧賤者也今年春遇山人田野間聞其言知其有志乎君子之道而心竊喜焉因其徴余言故有以贈之半軒集序申屠澄忠義者生人之大間也忠者必義義者必忠全其義者未有不全其忠者也有若故半軒先生鄭仲濳父其全忠義者乎先生浦陽義門之碩德與義俱生者也吳貞文公宋太史公則先生之師也元太師道濟公則先生之知已也留閣下者甚久言天下事計無不聽當時𬒳其澤者多矣道濟公以誣罷相先生遂以永嘉幕官航海南歸在官半載拂衣還家暨運啓休明海內仕隱之名流莫不起而彈冠翶翔雲路先生年正強方且閉關纂修贊理家政作為文章深韞諸櫝賔客之慕義者輻輳雖舊交或辭疾不見而况其文乎如是者幾四十載可謂難矣晦其明于天日昭露之下保其貞于風霜凋落之餘養其素于岸谷高深之際迹之匿也如完璧非遁乎山林也身之隱也如藏珠非逃乎江海也惟其積諸內者純乎義故其施諸外者純乎忠也非智周于物者能之乎嗚呼先生澄之世契也比年以來數承下風論及勝國之事蓋有不勝其感慨者焉其忠義之見乎辭色者猶若是其耿耿也古人云文才之高學博而識卓者謂之三長先生蓋兼而有之至于擴先儒之所未發究先儒之所未明皆可以見諸行事而非空言有不待贊美者讀者當自得之若夫履歷之𥘉終已備于今王太史所述墓銘兹不著著其忠義之大身名之全以白于天下使人人知先生之明哲如此後之人嗣先生之忠焉嗣先生之義焉是大有關于名教也昔宋之亡閩南有義烈之君子曰謝皋羽嘗參文丞相文山公之軍事文山公死干燕而宋社屋自放于山澤間作為歌詩終不肯出仕人到于今稱之先生之志節可謂同矣而夷然樂道以全其天不有皋羽倣徨悲歌之隘則又有過之者先生之名與之並傳可無憾于世矣上虞孝女朱娥詩序唐肅豫昔過曹娥廟著論云娥未事人而死漢稱孝女禮也今廟祀乃以夫人諡夫有君子而後為夫人生而女死而夫人可乎娥之孝不以女薄不以夫人厚也及至吳見海濵有廟祀天妃某夫人者云本閩中處女死為海神則又歎曰妃配也天之主宰曰帝天妃者豈帝之配邪處女死為神稱夫人謬矣而又謂之天妃可乎歷代祀典掌之宗伯議之朝廷凡非禮若此者孰能革而正之哉今年來上虞邑人魏士達謂子曰吾邑有朱娥者在宋治平三年以十歲女子死于大母之難當時里人為立祠邑南記之者郡從事虞太寧也政和三年邑令席彥稷主簿孫衍尉向泳重修之記之者新定江公亮也今祠宇碑碣燬于兵火久矣里長老猶能言其故處往往悲悼歎惋以不得復舊為恨宋熙寧間會稽邑今董偕嘗以娥配享曹娥廟蓋二娥俱吳邑人曹娥廟在江之西地屬曾稽朱娥廟既廢不得專祠而僅享他邑他廟之祔食雖娥之神無間于此疆爾界娥之孝不以專祠為重祔食為輕而吾長老子弟所以悲悼慕嚮者則以為非專祠于吾境不可也且舊廟實作于民官于此者未嘗請封請額于上得若曹娥者尤邑人之憾也故吾黨之士咸追詠其事而求豫序之將持以為有司告庶幾有所感動得轉聞之上而遂其請焉嗚呼盛哉邑人之心也夫孝風俗之本苟以孝名者千載猶一日也朱娥之死二三百年人猶思而悲之不忍廢其祭而懇懇以為急務蓋娥純孝有以感人心于二三百年之後而其人亦可謂之知夫敦勸風俗之本者有司聞之寧不奮然而興義舉乎不然則亦無異于向之官此者矣娥之未得封諡雖若可憾然向使得之而加以非禮之稱若曹娥天妃者猶不得也今國制一新居宗伯者必有知禮之君子于異代之失庶幾革而正之寧肯踵其失乎敢因序是詩而及之以識吾昔者之感且有俟于今之在上者云皇明文衡卷之三十九
