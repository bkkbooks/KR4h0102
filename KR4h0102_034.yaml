front:
  text: 皇明文衡卷之三十四
  hash: sha256:b57083a350af9e3d76d339ed8a09f0b4ed72aba23f66e49790b31426778f932f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_034-1a}
body:
  text: 記遊東山記楊士奇洪武乙亥余客武昌武昌蔣隱溪先生始吾盧陵人年巳八十餘好道家書其子立恭兼治儒術能詩皆意度闊略然深自晦匿不妄交遊獨與余相得也是歲三月朔余三人者携童子四五人載酒殽出遊隱溪乘小肩輿余與立恭徒步天未明東行過洪山寺二里許折北穿小徑可十里度松林涉澗澗水澄徹深處可浮小舟傍有磐石容坐十數人松柏竹樹之隂森布蒙密時風日和暢草木之葩爛然香氣拂拂襲衣禽鳥之聲不一類遂掃石而坐坐久聞雞犬聲余招立恭起東行數十步過小岡田疇平衍彌望有茅屋十數家遂造焉一叟可七十餘歲素髮如雪𬒳兩肩容色腴澤類飲酒者手一卷坐庭中蓋齊丘化書延余兩人坐一媪捧茗碗飲客牖下有書數帙立恭探得列子余得白虎通皆欲取而難於言叟識其意曰老夫無用也各懷之而出還坐石上指顧童子摘芋葉為盤載肉立恭舉匏壷注酒傳觴數行立恭賦七言近體詩一章余和之酒半有騎而過者余故人武昌左護衛李千戶也駭而笑不下馬徑馳去須臾具盛饌及一道士偕來道士嶽州人劉氏遂共酌道士出太乙真人圖求詩余賦五言古體一章書之立恭不作但酌酒飲道士不巳道士不能勝降跽謝過衆皆大笑李出琵琶彈數曲立恭折竹竅而吹之作洞簫聲隱溪歌費無隱蘇武慢道士起舞蹁躚兩童子拍手跳躍隨其後巳而道士復揖立恭曰奈何不與道士詩立恭援筆書數絶句語益奇遂復酌余與立恭飮少皆醉起緣澗觀魚大者三四寸小者如指余糝餅餌投之翕然聚已而往來相忘也立恭戲以小石擲之輒盡散不復因共慨嘆海鷗之事各賦七言絶詩一首道士出茶一餅衆析而嚼之餘半餅遣童子遺豫兩人巳而夕陽距西峯僅丈許隱溪呼豫還曰樂其無巳乎遂與李及道士别李以卒從二騎送立恭及豫時恐晚不能入城度澗折北而西取揵徑望草埠門以歸中道隱溪指道旁罔麓顧余曰是吾所營樂丘處也又指道旁桃花語余曰明年看花時索我於此既歸立恭曰是遊宜有記屬未暇也是冬隱溪卒余哭之明年寒食與立恭豫約詣墓下及期余病不果行未幾豫歸廬陵過立恭宿别始命筆追記之未畢立恭取讀慟哭余亦泣下遂罷然念蔣氏父子交好之厚且在武昌山水之遊屢矣而樂無加乎此故勉而終記之手録一通遺立恭嗚呼人生聚散靡常異時或相望千里之外一展讀此文存沒離合之感其能巳於中邪既遊之明年八月戊子記宣德二年進士題名記宣德二年三月朔廷試進士得馬愈等百有一人國朝廷試天子御正朝親出制䇿既第其高下明日陳鹵簿傳臚天子服皮辨絳紗𫀆御正朝文武羣臣朝服東西序立傅臚既羣臣上賀其詞曰天開文運賢俊登庸士之與於斯者其榮矣哉自設科兼取南北士而前十有五科南士往往數倍於北皇上嗣統之𥘉詔禮部科舉歲取百人南士什六北什四著為令蓋簡用人材南北並進公天下之道也至是合前科未廷試者一人而其第一人出山東前此南北士合試未有北士占首選者有之實自今始禮部尚書臣濙言故事有題名刻石太學矧今龍飛第一科宜有示後制可命臣士奇述文臣士奇既拜受命仰惟國家取士非一途而士必以科第為榮者天子親耀之也今朝廷寵科第廷試有録以示中外題名有碑以垂永遠夫豈徒顯其名哉固望為當世之用太平之具也士平居動苦學問亦豈徒藉為名哉固將推所學見諸功業及諸天下也名之所在使後人賭之而思其所立歆豔愛慕之無巳榮莫大焉不然碌碌無稱或所行非所學後將有指其名而疵議之者矣此係其立志與否嗚呼可不勉歟於是朝之令典宜有紀士之立志宜有勸敬拜手稽首具書于題名之首時奉命讀卷及執事之臣列諸其隂滁州重建醉翁亭記三代而下以仁厚為治者莫踰於宋宋興三百年其民安於仁厚之治者莫踰昭陵之世當時君臣一德若韓范富歐號稱人傑皆以國家生民為心以太平為已任蓋至于今天下士大夫想其時論其功景仰歆慕之無巳也而當時同朝有君子焉小人焉君子不容於小人不能久安於中或暫黜而遽還或屢擯而復用而終能顯其功名者由其君之明也歐陽文忠公以古文奧學直言正行卓卓當時其凛然忠義之氣知有君而巳知有道而已身不暇恤其暇恤小人哉而小人皆不便之故一斥夷陵再斥於滁既復起歷踐淸華從容廟堂與諸君子坐致國家於磐右之安者非由君之明乎者公在夷陵歲餘在滁閲三歲皆無幾微遷謫之意方日務保民而與民旦暮相親相娛樂若父子然者君子之道固無往不自得也我仁宗皇帝在東宫覽公奏議愛重不巳有生不同時之嘆嘗舉公所以事君者勉羣臣又曰三代以下之文惟歐陽文忠公有雍容醇厚氣象既盡取公文集命儒臣校定刻之永樂庚子冬𬒳召赴北京過滁登琅琊山問醉翁亭但見寒蕪荒址惟醉翁亭二賢堂六字隱隱巖石間顧時滁之守臣無足語者顧其從臣曰邦先賢之迹棄不治如此其政可知矣太息去之後六年太僕寺卿趙君至趙君素慕公之賢又知滁之人思公不忘也出俸倡其寮及滁人復作醉翁亭而刻公所為記置亭中亭後作堂以祀二賢二賢者王元之及公也元之至道二年自翰林學士出知滁州其文章及立朝大節與公相望合而祀之因滁之舊也醉翁亭之前舊有六一泉疏導加石甃焉百費所需不出於公而加於舊規於是滁人歲時謁拜二賢退而歌詠公之文章又徘徊泉上如親見公之樂乎此也而有以慰其不忘君子之心焉昔召公布政南國後人思之至不忍傷其所息之木而况公嘗樂於此者乎君子之感人心固自有不能巳者而非有賢者倡率於上則亦莫能遂所欲為此滁人所以有待於趙君也趙君名進字孝禮天台人發身科第纍任顯官自廣東布政司參政遷太僕卿於滁豈弟敦厚明建大體所至為所當為以賢能稱相斯舉者太僕少卿蘇實龎塤丞楊文逹孫皓宋載劉壁主簿舒伯治及滁人禇士良等十人經始於洪熙元年四月成於宣德元年正月於是士良等請文記歲月其成之又明年二月甲子記虎丘雲巖寺重修記蘇長洲縣之西北不十里有山曰虎丘吳闔閭所葬處也世傳既葬有白虎之異故名岡阜盤鬱泉石竒詭蓋晉王珣及弟珉之别墅咸和二年捐為寺始東西二寺唐會昌中合為一而名雲巖者昉於宋大中祥符間載盧熊郡志如此始淸順尊者主此寺至隆禪師而復振歷世變故寺屢壞輒屢有興之洪武甲戌寺復燬永樂𥘉性海主寺始作佛殿其作浮圖七級繼性海者楚芳作文殊殿十七年良價繼楚芳是年作庖庫作東廡明年作西廡作僧舍又明年作妙莊嚴閣又三年閣成蓋寺至良價始復完價所作閣之功最巨凡三重崇百二十尺有奇廣八十尺有奇深六十尺上奉三世佛及萬佛像中奉觀音大士及諸天像其材之費為鈔三十餘萬貫金石彩繪之費六十餘萬貫又經營作天王殿以次成良價杭之海昌人石庵其字今僧録闡教止庵其師也余聞諸刑部主事陳亢宗云良價嘗從亢宗遊遂因以求余記其成余聞虎丘據蘇之勝歲時蘇人耆老壯少間暇而出遊者必之此士大夫宴餞賔客亦必至此四方貴人名流之過蘇者必不以事而廢逰於此也然亦有興念夫王氏之嘗樂於此者乎當是時王氏父子兄弟寵祿隆盛光榮赫奕舉一世孰加也而能遺棄所樂輕若脫屣焉者豈獨以為福利之資乎其亦審夫當貴之不可久處與子孫之未必世有者乎雖其智識趨向高明正大不足以庶幾范希文之為而無所係纍乎外物視李文饒溺情役志下至於草木之微者豈不超然過之也而自建寺以來今千餘年雖屢壞而屢興其飛甍傑構凌切雲漢與其山川相輝煥稱名勝於東南愈久而不衰者固佛之道足以鼓動天下亦必其徒多得夫瑰瑋踔絶刻厲勤篤材智之人能張大其師之道以致夫多助之力也瑰瑋踔絶刻厲勤篤之人其用意也宏其立志也確有不為為之而孰禦其成哉嗟乎若人也使就於世用有不立事建功而可以禆當時聞後世哉吾又以慨夫屢見之於彼而鮮遇於此也聚奎堂記宣德二年春太子少傳工部尚書兼謹身殿大學士建安楊公得故𪠘宇於長安門之南而修葺之周垣數百步凡屋四楹制度簡朴梁柱不斫編葦覆茅塗墍潔素間而三之其中為堂高明靚深南楹北户疏暢洞逹東西二室左備偃休西庋圖史庖湢具於兩序卉木之秀環列前後四顧虛曠埃壒之影車馬之音邈不及宛然郊郭之外高人逸士之所捿託也置僮奴數人酒壷茶竈與凡奉賔客之物恆具公之意蓋將朝退之暇及其寮寀遊息於此以適夫蕭散之趣也既成會上臨軒䇿士其第一甲三人皆授職翰林馬愈修撰杜寧謝璉皆編修於是館閣諸賢相與置酒堂中為三人賀主獻賔酬觴行甚樂有言于列者曰斯會斯堂誠稱古之人名其居蓋有因事而志喜者請名堂曰聚奎何如衆皆曰然少傳公屬豫為記衆皆為詩夫奎西方之宿十六星與璧相比談天者類曰奎璧主文章而圖書祕府也今則吾徒之職守在焉國家選賢非一途而進士科為重自洪武辛亥至今五十有七年臨軒䇿士十有六所得士之賢者濟齊中外有光政治之任而擢承明著作之庭者又皆當時之極選也今聖明在上丕闡文化斯民生遂四境晏然太平盛致也吾徒得以間暇宴適於此千載宰遇上之賜固士君子所不能忘而升斯堂也於少傳公之所以自致亦未可忽哉公自登高科歷事列聖幾三十年未嘗一日不在天子左右其文學才䣭所以禆益聖治者愈久而愈勤故天寵愈進而愈厚詩曰夙夜匪懈以事一人少傳公有焉然則公祿爵之進尚未巳也而凡在此者有心公之心將繼起而光大亦未巳也三年一大比賢才之出當益盛則相與如今日之宴聚斯堂亦未巳也吾雖老尚屢見之哉溧陽縣儒學重修大成殿記高皇帝正大統之三年詔嶽鎮海瀆封號如古制以山水稱忠臣烈士稱當時𥘉封出於歷代所加者一切罷去孔子明先王之要道為天下師以濟後世非有功一方一時者比封爵宜如歷代所尊崇著于令典垂之千萬年而定鼎之𥘉即建學立廟京師親臨釋奠又詔通祀於郡縣又詔罷從祀之戾於孔氏者所以揆前聖之大中而垂永代之鴻範也皇上繼承大統益崇孔子之道以治教天下親幸太學行釋奠禮又詔有司治曲阜廟蓋自漢以來崇禮先師極盛於今日矣孔子之道天之道也國家生民不可一日以無者伏羲神農黃帝堯舜禹湯文武行斯道於上孔子明斯道於下皆聖人也而使後之繼伏羲神農黃帝堯舜禹湯文武之位得以行斯道者孔子之功也論其功而隆其禮聖人之心也繇是天下至於海隅郡縣皆有廟學其人皆知孔子之道尊且大而况乎首善之地百里之外其民心嚮慕興起為何如哉溧陽縣故為州有廟學元季燬於兵國𥘉林公慶知州事乃新作之垂五十年矣禮殿弊壞教諭梁本之始至謁先師顧瞻惕然懼無以安明靈副德意於是積俸廩節百費以謀更新而訓導陳余適來議益克協乃白之縣令丞皆曰此吾職也敢不竭力以相縣民耆老聞之又眥曰此非以圖善吾民乎奈何吾坐視自逸即皆自言願有助也本之以其情言於朝從之於是自某以下各隨力出私帑作大成殿若干楹易故以新工良材堅高敞宏麗加于舊規又新作夫子四配十哲像踰年以成由是歲春秋邑長二學官諸生奉詔行禮對越有嚴秉處將事罔或踰越退而斂焉敬修所學以求無怍於古聖賢將上以光國家之用下以厚邦邑之俗所係豈細故哉諸生來請書其成夫受命有政教之寄而能究知本原之意相與殫力一心不費於公不勞於衆以底成功可為不忝而為民父兄於斯舉奮起趨事皆如當然又以見人性之善而王化之𬒳矣皆可書也是役也肇於永樂庚寅某月明年六月竣事經始者本之垂成以家艱去代本之者陳余及訓導某皆與相力故具書之其耆民之與力者若干人書之碑隂嗚呼後之受政教之寄於斯為民父兄於斯者可以觀矣皇明文衡卷之三十四
