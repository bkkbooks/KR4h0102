front:
  text: 皇明文衡卷之八十五
  hash: sha256:af1cee31db9f0ca7182eeeb92212dd1fa45bffd12a94a37c479e80a234c21485
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_085-1a}
body:
  text: 墓志銘國子祭酒宋公墓志劉三吾國子祭酒宋光生卒既往哭弔居數日博士吳守德持學正朱惟嘉所狀先生行實來曰先生嗣子麟疚在苦次不得跣以請茲將歸窆滑之永寧阡惟輸林兄長吾于先生為同舍故懇銘焉尚憶走始來時會先生于春坊先生曰得母與鎦長吾為晜弟耶不然何面貌之相似也相與感歎久之嗚呼先兄以後至元丙子入監周旋十有五年中間才兩歸江南爾在監舍法以同時為晜弟以晜弟相知為世契則走于先生忍銘忍不銘按狀先生姓宋氏諱訥字仲敏世本衛之山陽人後徙滑家焉兩世繇貤恩贈嘉議大夫禮部尚書上卿車都尉追封京兆郡侯諱德仁其曽祖贈中奉大夫河北江南等處行中書省參知政事護軍追封京兆郡公諱宣其祖官中奉大夫陜西諸道行御史臺侍御史贈推誠秉義守正功臣通奉大夫江浙等處行中書省參知政事護軍追封魏郡公諡忠肅諱崇祿其父忠肅在元時􅏡歷中外四十餘年五持憲節逮事七朝豐功盛德所以燾後衍慶神道碑紀之悉矣先生濡染家教動以矩彠雅性遲重不妄言笑齒貴胄館以來所師宗工碩儒月開日益卓然有成擢科登仕為時聞人中經繹騷乃𬒳褐懷寶以自韜晦皇明受祚徵詣公車召見次有言動聽洪武之十三年也是冬除國子助教橫經發難擊蔀廓塞學者如客得歸嘗同諸儒應制撰敕文卑僧道録司領教事者十有六通操筆立成雅稱上意超授翰林學士奉議大夫俄升文淵閣大學士日見親信有所輔拾曾見大學成中外歲貢學徒日夥而職大司成者往往巽愞師生相訐教尼不行宸衷簡注擢為祭酒升朝列大夫以釐正前弊上自製誥詞至以尚父興周八百擬之感惟眷遇所以提挈鏟磢不遺餘力師道既立皇心載寧乙丑戊辰兩科得士大率三天下之二而龍頭魁選恆在太學大被賞遇一日有疾上遣中使致諭其略曰卿稟天命之性發仲尼之誠施巳之幽德修道教人所以病不病而速差以其有神也天章下賁光輝儒紳恆謂祭酒骨格必壽適有畫工至命繪其像肖焉喜溢天表然終老之以其子麟主望江簿特勑召之還俾便侍養其𬒳遇優渥類此方倚之以棟梁我道楷式諸生也不謂得疾旬日遽不可起病也尚醫來治卒也遣官致祭其文悉上所自製故事文臣四品無給喪費者曠典之舉昉自先生斯皆異數也居嘗寢食恆在廂房未始一宿于家及是疾革麟等託諸監官懇請其還厲聲曰是何風雲氣少兒女情多况在丁社兩祭齋戒中耶至是祭畢乃就舁歸一不口及家事及家氣絶焉二月之三日昏暮時也嗚呼先生以八帙之年當易簀之際而風雲為氣不少衰丁社兩祀始終齋戒是持非其平日操存有素詎能方寸不亂若此哉可謂真大丈夫矣最其平生所裒集先丗碑銘傳紀曰紀德録一集所自著述曰西隱集文十七卷既號西隱復別號所居別業曰白雲茅屋自法書名畫外他無所嗜好中朝名巨詩若文讀一二過輒能記憶不減少時今皆已矣生以元至大辛亥十二月四日卒以今洪武二十三年春壽八十配康氏先卒子三人長衎祖即麟擢進士苐拜監察御史出主望江薄次復祖鄊邑訓導次安祖女一人在室孫男三恕慧懋女孫四所適其人長郭謹次陳惟新次李均一在室曽孫男女各二皆幼臨發柩時上再遣祭舟車之費一出于官可謂主榮死哀也巳銘曰銅臺世家忠肅公挺生賢嗣遭時雍身逢堯舜接夔龍代言文淵掌辟雍感惟皇上倚注隆率先條約自其躬凨雲氣槩氷霜容教行六館諸生從金石文章錦繡胸蔚為海內諸儒宗譽髦多士振文凨棟梁我道伊誰功夫何一疾遽告終至尊為之惻淵衷命醫與祭恩禮豐年登八帙數始窮歸竁祖塋得幽宫銘阡者誰靑藜翁子孫丗丗其吉逢王紹汶墓志銘劉夏洪武二年七月余受命尚書來河南陜西兩省訪求前元庚申皇帝天下州縣三十六年入史事迹其在河南置局武成廟之側浙東士大夫王應璧見訪為言其先祖紹汶字思齊生當宋末元𥘉之際貌奇古美髭髯聲音琅然聞于堂室家小嶼溪水環其屋壁門前松枝壓徑梅竹緣坡又雜蒔蘭鞠凨至則左右紛披有名帖千卷書萬卷峩冠太袖口課倍誦五經又旁通百氏之書下筆千餘言立就及聞里中有大役則奮袂而興或造公府不避是非利害必侯衆議歸於公正乃巳臨終力疾書曰利人之事可周旋處雖獨力亦當自為害人之事於戲謔中雖一念不可妄發又書曰曉夜讀書間暇治家皆令刻板以垂示子孫娶陳氏子師古與泰女三皆嫁士人孫三公培應璧公恕享年八十有六余聞應璧之言矍然而嘆曰斯人也是乃蓄德君子冝有後者也富貴功名既不在其人之身則在其子與孫矣徐考之應璧其子名師古者有猷為有執守文學議論幾冠儒林然不肯仕其孫名應璧者十八歲遊幽京歷仕至廣州總管推恩封贈紹汶中順大夫江浙等處行中書省理問官上騎都尉追封天台郡伯嗚呼為善無不報要於久而後信觀王氏祖子孫三代豈不固然與銘曰炎炎者勢翕翁者利閭閻崛起朝躋夕替所以古之公族大夫必尚論其世也許士修墓銘方希古天台方孝孺有篤志尚德之友曰許君繼字士修言必出乎正動必由乎禮趨舍取豫咸則乎古之君子而無所茍其精思力學以求道德性命之藴汲汲若或失之而有得乎心沛然以樂不以貧賤患難惑其志余取友二十年所交海內知名之士甚衆考其所存莫有類吾士修者蓋其操志勇目守介所期者遠而務踐乎事所造者深而其心欿焉如未有得使假以壽年其所志當卓絶過人而年僅三十有七而卒烏呼此豈特斯人之不幸耶士修之先汴人其六世祖景元宋高宗時為台州教授遂家焉後徙寧海為寧海人高祖文正曾祖彬祖光父琳皆業儒而不仕士修質高明自為兒童巳有成人之志以學賢哲自勉喜為詩其高妙處有魏晉人格韻別自號觀樂生其詩多道其所樂言暢而旨深非近世人之所及也或傳其觀樂九詩至京師翰林學士金華宋公見而嘆賞之以為不愧古人凡一時名能詩者皆自謂弗及而士修不自足益刻意經學玩心天人究賾探微將大索六藝之緒反之於約以成身致用而病作矣既病咯咯然嘔血而學不止病凡三年每見心覺其進瀕死精神不亂與人言死生晝夜耳奚足怪談笑而逝嗚呼士修之於斯道非篤信不惑其能然耶初士修學於鄉先生王君藴德王君竒之妻以女弟生一子曰籕二女曰忠曰惠王君固名士其弟琦尤與士修相好士修以洪武十七年正月二十六日卒琦述其行為書託豫銘豫謝曰子兄弟與士修善銘莫宜焉奚豫之求後五年王君仕藩邸死琦亦謫去士修弟顯將以某年月日葬某山來速銘於是士修之親友盡矣豫尚誰辭銘曰學失其統騖于空言飭外以欺幾忘本源嗚呼士修志篤行邵惟正之趨非義弗蹈暨暨其守汲汲其求棄遺芬華獨與道謀業雖不終世罕厥似我庸闡微以朂髦士皇明故通奉大夫晉相府右傳桂公墓志銘并序王景洪武二十年十二月某甲子晉相府右傳桂公卒享年六十又七明年正月某甲子葬于董粵之原循先志也又明年其子愼奉其友韓宜可狀來請銘不獲辭公諱德稱字彥良以字行從幼不群聞長老道經訓則嗜若醇酎既冠通經史百家言鏖秋闈中之不得志于南宫歸長包山再長高節皆有文名除平江路文學掾不就威孤不弦蛙俚荒蠧公以六籍橫騖大肆伸儒遏暴方氏連甌越來辟立謝之聚徒山中嚅嚌道真雋永聖涯曰吾以待天下之定也皇明天造反刓剗偽一歸于正洪武紀元觀風者以名上省憲交辟不起六年大徴天下士行省復以名聞持詔公車厠于數千之列唯公得以白衣錫宴除皇太子正字授承事郎侍講六年顯仁闡義出周入孔興衰治忽敷啓剴切東宫深器之會文華堂給事不飭敕公啓迪曰昔許魯齋諸生多為宰輔卿其勉之及侍宴以御製勑訂正以聞咨以治道公曰道在心心不正則好惡頗好惡頗則賞罰差賞罰差則太平未有期也是以君人將忿欲是務去明年日南至有事于圓丘以祝文譴主者公曰豫小子履湯用于郊我將我享武歌于廟以古率今未足深譴上笑曰卿動援經史屢聞獻替稱善久之嘗有以墨敗官者賜死公力諫如律不聽公但曰三尺法當與天下守之上頷之滋欲試以事以三府疑獄命之讞以情原者若干人翰林以失議見呵公奏當取長略短上曰不然吾因其長而拔其短以造其全時方以法繩下訪曰法數行而數犯奈何對曰用德則佚用法則勞勞以靖民則民勞而弗靖德以靖民則民靖于德矣他日與林溫同侍上曰卿何官曰正字上曰卿帝者師也其為上所屬類如此十一年除晉相府右傅授通奉大夫內出勑文以孔孟期之在官責重望尊治出聲生府告無事王益重之政多決焉公謂王者一正心而國定因進心圖以明之十三年革相府改長史授奉政大夫以疾謝詔許之十五年朝京師上太平十二䇿奏報十八年勑歸鄉里五世祖萬榮宋寶章閣學士知常德府高祖某宋宣議郎曾祖康老宋富陽知縣祖俊卿贈嘉議大夫浙江鹽運使父與紹贈中奉大夫浙江參政初公元中書右丞葉文簡公之孫判慶元府同之子也生而室有火光燁如流星以為不祥出之參政公子之娶岑氏早世三男子曰抗曰智皆大再娶于陳封夫人至孝持身治家內外井井不以貧疚不以貴驕先公卒享壽五十又七與公同墳異藏生愼及全愼仕為中書舍人公平生純一見道處官若家尤不以貧富動心仕止進退不亟不紆坦坦施施及與人交命觴詠詩踔厲風出窮日夕不厭人以春風和氣目之其著作有和陶集春和集淸溪集知足集凡若干卷嗚呼甚矣儒道之有禆于世也身用之則榮家國用則寧天下用以平公自結髮戰藝以功名終將何修而致是哉亦唯道而巳矣嗟乎道之為用閎矣銘曰不詘而伸其道允藏不檏而文其德不爽天球在序金奏在宫聿諧其施以襮匪躬既燁其英亦碩其聲有閟其繄後之成戶部尚書郁公墓志銘解縉永樂三年八月五日户部尚書郁公薨于位上遣官祭以文命工曹具襯輟朝一日顧翰林學士臣縉等歎息稱其才嗚呼公之哀榮始終固可美國家所以待臣庶恩禮之厚尢足以激勸於當世公之子孫豈不永有庇賴歟於是其子彬衰麻踵門泣而致公之治命請豫銘其墓噫公與豫交二十年未嘗爾汝褻狎亦未嘗挾長殺敬禮豫二人者亦自信為誠實洪武二十二年豫侍講華蓋殿中公始受命為戶部度支主事賜名新明年改戶部司屬二十三年升北平部郎中二十四年六月超授嘉議大夫戶部右侍郎考滿上於庭中稱譽擢尚書授資善大夫十三年于兹矣非才而能之乎抑公之盛福其祖考以來積纍之慶非偶然而致也公家素饒財慷慨豪舉不為齷齪喜賔客樂於賑窮之不為德色洪武中奏事庭中被顧問天下戶口漕運地里險易計數時日應機響答無遺謬自謂劉晏以下不論也晚歲多疾乃時在告上甚憐之公亦時自語豫吾覺衰老恐旦夕先朝露不能報國恩吾平生無卓異惟君知也幸與之銘其墓紀其榮遇而已嗚呼公非可謂達歟公蘇人也曾祖仲和祖瑜父德字銘本公以至正丙戌正月十四生於吳縣洪武元年祖父遷居鳯陽臨淮縣公隨而家焉公娶嚴氏綜理家政嚴而有緒彬字孟父亦克孝敬公嘗屬之豫曰他日視之曰余故人之子即此子之榮也公墓在臨淮古城之原銘曰古天司徒職惇典禮馴擾兆民豈惟會計惟公奮身亦以豈弟恂恂怵怵爵祿之器歷官十年先榮後光豈曰其才有德于天豈無人謀不如盛福崇崇其阡臨淮之麓故元同知邵武路蕭公墓志銘元之季世天下四分五裂其間盜名字者無慮千百計獨閩之陳友定起徒步至列將相百戰守死為元東南烈士未能或之先也當是時吾鄉豪傑之士多從之﨑嶇嶺海至死不怨而朝廷音問實籍以通先祖太史公真烈死節事聞贈官先君子亦宣授資德大夫三知政事詔使來自海上友定遣江君伯昻與俱來且説熊天瑞于贛伯昻與先公少相善也為其言友定意先公感激因邀里中士蕭君克欽輩數人俱至贛説天瑞猶豫先公以太夫人老病不得行伯昻云報命克欽南逾嶺表間入閩微觀之崎嶇兩浙出金陵轉入巴蜀還寓長沙歷湘潭以歸與先公謀曰吾觀群豪智略下獨友定忠義殆可倚也乃復之閩友定承制授克欽奉議大夫同知邵武路參其軍事友定用法嚴往往致濫輒為營解全活甚衆當行兵擊賊入建陽山谷間卒遇千餘人圍之數重執長刀躍馬奮擊賊首兩人直前來刺將及忽大呼辟易其衆曰且止且止此吾父蕭公也使語之二人跪曰我嘗見獲於君賴公救之得生今雖衆寡不敵我終不敢背德布陳稍却羅拜雲集行建寧光澤道中有七人者執兵而前跪曰生我者公也每思無以為報今幸道經我里敢以白金百兩為從者獻蕭君不識也其人各言姓名及所以營解其生之狀君慰喻却其獻而去洪武元年戊申隨友定至京友定死君以親老辭不仕歸田里年財四十二事親以孝聞讀書教子自娛祈寒威暑手不釋卷親戚子弟從學多所造就洪武戊寅六月二日終于家享年七十二於戲可謂全名福矣君生元泰定丁卯歲餘親母王氏卒繼母王氏鞠之愛之逾巳出岐嶷不凡幾冠從受書於安成羅先生學成教授其鄉卓然以不墜其家為念而所以去就卒如此可謂難也矣余聞之先公常欲為之傳其事今子翰林檢討引高與余同修太祖高皇帝實録見友定之事而歎蕭君之不可作也引高亦感風奉狀請銘余不敢辭也按狀君諱寅克欽其字所為文章曰舫中集晚自謂舫中叟學者稱秋舫先生系出齋鄱陽慶居山東濟寧有諱忠國者事宋高宗為吉州出防禦使子文壻吉水城西章氏子孫遂為吉水人高祖典簿公文布曾祖信可祖德永父雲心世積忠厚連姻士族娶艾氏先卒繼王氏徐氏子男五人長仲高其季金高皆先卒次即引高次慿高次持高皆能世其家女子三人適士族孫男子十四人慶榮回艾明會弘卒儀益本遵係全曾經曾孝蒙覩以壽終之歲葬君于邑之仁壽鄉荷塘山之原銘曰有偉蕭君世之通儒縱觀四方議其賢愚得所宜歸之死不回從容進退鍾鼎若違𬞞食之甘韋布之溫天錫壽祉有賢子孫得譽之真身後乃定盍視厥銘惟善無競故奉政大夫大醫院使戴公墓志銘王汝玉永樂乙酉冬十一月二十一日奉政大夫太醫院使戴公卒於浦江故第其孫紹以丙戌年十二月十七日卜其鄉獨秀山之岡奉襄事焉持前春官大宗伯鄭公沂狀不遠千里來京師謁余請曰近故以來大夫之沒咸得乞銘於文章君子𫐠其濳德善行鐫之貞石或揭諸墓阡或瘞諸幽宅以貽永久先祖考不幸大故而封塋之石未有其辭不肖之愆何以自逭願先生哀而銘之余辭不容乃按狀敘次為銘公諱思恭出唐平南節度使銀青光祿大夫檢校太子尚書令諱昭後至公歷草有一世曾祖諱濤祖諱暄父諱垚皆隱居不仕素以詩禮相承稱浦江望族公資篤敏讀書必求聖賢微言奧義為文若詩不尚浮藻務底有用於時暇日於星象堪輿風鑑之術靡不旁推曲究尤精心軒岐書烏傷之丹溪朱彥修氏得許文懿公道學正傳學醫于武林羅太無盡得其祕公先府君蚤從之遊繼遣公往執弟子禮受業其門丹溪一見輒奇之悉語公濂洛授受之懿及醫學諸家要故以醫道鳴浙東西洪武丙寅三月皇上龍濳北京嘗患瘕聚遣使召公治療刻日奏功晉府親王遘未疾亦迎致公隨獲異驗厥後晉府訃聞高皇帝馮怒王國臣僚悉逮赴京時公侍左右從容進曰昔者臣嘗受知於王飮臣之藥數矣然竊慮其膏梁之毒復作也今乃果然上於是䆁然改容諸臣咸得不坐壬申七月太祖高皇帝徵公入朝將屬領太醫院事公以老病辭授階迪功即職御醫值風雨免朝戊寅夏五月高皇帝大漸公同列進藥不稱者皆麗于辟獨指公謂侍臣曰戴元禮仁義人也愼母恐近臣聞于遼府親王為書二大字賜公肅慶二府咸為贊詠朝野名卿巨儒播之篇翰克物卷帙也皇上正天位超升今官既就職後以耄不任事為請弗從至數四乃許之仍賜誥命金帛致仕歸田里甲申冬十月復命使者乘軺召公伏枕不起乙酉夏四月以安車入因公衰病免行拜禮優臥官舍惟特召乃進見是冬十月復請乞骸骨勑十五日吉治行俾禮部選官護送瀕行諭公曰朕復召汝汝其來也公既抵家出賜金修祀事遍召親故宴飲為樂置殽羞拜丹溪墓載酒造邑中從所知敘平生歡用昭恩貺之隆甫旬餘疾作公自知不治將易簀召諸子姓訓之積善守法具告以不能補報聖恩為身後愧言巳而逝享年八十有二卒之明年春二月勑命行人翁綬諭祭于家御製祭文褒奬至備具載國史公歷事兩朝藥餌所施奇效不可殫述金繪楮幣上尊珍饌駢蕃之賜殆無虛月公平生亦誠愼寅畏未嘗少有過差是以遭逢眷知終始一致自古逮今士之榮幸蔑以加焉蓋公之學出於丹溪丹溪之學源深而本固非近世醫家者流所可比余曩得其書讀之爰自易水張氏河間劉氏東垣李氏曠百載泝而上焉極於素問靈樞宗旨推天人交合之理辨隂陽偏勝之氣其識卓以明其説詳以密以故見之於用能起死回生動若神助一洗拘方泥法之陋誠儒者格物致知之急務也公以所得於丹溪者觸而伸之類而比之研精覃思明體適用宜其遇病施治若矢發機必中正鵠彼不善為射徒袖手操弓莫知攸措焉公今已矣後之人能知丹溪之學者皆公有以倡啓之也公娶諸暨楊氏生子男二曰儒曰儼皆先公卒孫男四孫女四其請銘者長孫也銘曰二氣流幹天淸地寧人於其間稟兹粹精茍或滯焉災疢以成學喪千載彼昏孰醒匪有先覺疇探其情金元之際群賢迭興貫道三才窮玄洞冥後丹溪氏遺緒是承載闈微言大宏厥聲公逰其門擷華搴英皇皇聖世以醫自鳴際遇兩朝丕膺寵榮公雖已矣不死猶生垂範後學識是夷行濟危扶殆有則有程獨山之原閟是泉扄過者必式視此刻銘皇明文衡卷之八十五
