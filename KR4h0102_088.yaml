  text: 皇明文衡卷之八十八
  hash: sha256:0a6cea0b3cad1dee8ec3f435b7026d03c6719111b49ff0a17eefacc6ae5ee240
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_088-1a}
body:
  text: 墓志銘北京行太僕寺卿兼苑馬寺卿楊公墓志銘胡公諱砥字大用姓楊氏世居澤州之南村曾大父誥大父禎父伯新皆居鄉里為善士公自幼秀頴與羣兒處必習禮讓進退容止若成人長老見多異之年十歲入州學為生徒即知務學既長學益懋遂充貢為太學生洪武甲戍登進士弟擢授大行人副嘗上疏言孔廟從祀宜退楊雄進董仲舒有功名教踰三載升湖廣布政司左參議舉賢能恤鰥寡去貪暴吏民懷服歲庚辰以言事謫居遼陽及上龍飛特起授鴻臚寺卿時父已喪乞終制歸廬墓側日夕哀慟人不忍聞永樂二年起復為禮部左侍郎後以巡視河道坐失職降工部營繕主事又調禮部主客主事八年春扈從北征典功賞有勞勩十年二月受命詣北京簡閲馬騎還遂授行太僕寺卿明年又兼苑馬寺卿而公於馬政竭心盡職往來畿甸之間監牧攻駒馬大蕃息至於有司政令之得失民情休戚之所關知無不言由是寵任益隆十五年十一月丁母夫人司氏憂護喪歸葬特蒙恩賜鈔千錠道塗給力役行次澤州之黃華里去家近一舍以悲哀匍匐得疾寓于勝因寺明年正月巳已竟卒享年五十有四訃聞上悼惜之遣官諭祭三月庚申葬于州城之東南村之原袝先塋也配焦氏子男二人長璞次瓉女一人適李貴銘曰惟楊氏出自晉始伯僑衍厥㣧歷秦漢微復盛炳公卿襲華慶迄于今世晉城胄雖遙系乃明公挺生揚休聲著政績流德馨澤之東南村岡浮山鬱龍門蒼珏峯秀丹水長宅茲幽公之藏百千祀永不忘嘉議大夫北京行部左侍郎劉公墓志銘北京行部左侍郎劉公既卒其孤徴以豫與公故乃寓書奉狀來求墓銘按狀公諱辰字伯靜姓劉氏其先沛人後徙鄞遷婺之金華則自公之曾祖三顧始也三顧仕元為明台上萬戶府經歷幼鞠干舅王氏遂因其姓故公之祖文璜父志皆姓王氏至公復姓劉公慷慨負氣節喜立功業以表見于世初王師親下婺州公首上謁署為典籖奉命使方谷珍谷珍令左右飾二姬以進公峻却之其人慚而退浙江左丞李文忠開省于嚴辟公置幕下以資贊畫時元帥葛俊守廣信當祁寒集丁夫浚城濠民苦之欲為變文忠止之不聽遂怒欲臨以兵公請往諭以大義俊即悔悟謝文忠意乃釋既而授監辦金華茶鹽官秩滿課最以親老歸養教授鄉閭嘗道遇故人李惟中死於逆旅具棺斂瘞之任昊母喪不舉遺金葬之未幾二親繼殁執喪哀毀不勝衣所居室廬僅蔽風雨饘粥或不繼處之𥙿如也里人劉十八懷金入城遇二卒圖其金與飮醉之扶行水次欲加害公見力解之獲免後以懷不抱德起為湖廣道監察御史臨江同知陳斌受賕及銀工盜金皆坐死公為辨之得減死論居二年以謇諤聞擢知鎮江府興廢舉墜勤於其政聞宋宗忠簡公墓在丹徒荒穢墓田據於民即加封樹復其田命墓傍寺僧收田之入以主其祀丹陽道接句容細民任負載者往往因日暮行劫行旅患之公嚴為禁盜遂息郡有瀕江田八十餘頃歲久淪沒仍責賦於民公請于朝除之京口閘廢舟楫不通東南漕運者轉新河江隂二港以出江多為風濤阻溺公乃自京口至吕城百二十里去淤塞甃石作􅄵修閘門順水勢之出入於是公私便之然漕河源淺易涸每仰練湖以益水湖有三斗門亦廢公又修築之三斗門成漕運之舟既通湖下之田益稔時浙河轉輸之民道其境上死者為收瘞疾者給米命以小舟送出境賴以活者數百人永樂元年夏六月以預修國史知故實賜白金文綺襲衣升江西布政司左參政至則以久雨江水泛溢九江諸郡瀕江之田皆潦飢民為盜富室多罹其害公即檄郡邑勸富民出粟以貸飢者蠲其役以當其息官為立劵約明年償本粟由是富者樂從飢者得食南安贛州等九府荒田糧六萬餘石有司歲抑取於民民不堪公以聞悉蠲其額後以同官坐事相連免歸永樂六年秋命下復起為北京行部左侍郎出特恩也公以老不任政日𬒳顧問留京師者三年乃賜敕書文綺鈔錠致仕歸踰年復驛召至京命督工武當未行疾作又賜鈔錠遣官督醫給驛舟送還至常州毗陵驛遂卒實永樂十年七月二十二日春秋七十有八孫祚奉柩歸葬文星門下閣塘先塋之次是年冬十二月九日也娶陸氏董氏董氏元中書參政嘉訥女前四年卒陸氏有婦道子男二人徴觀觀蚤世女二人長適東陽施信厚東川軍民府經歷次適徐叔紹皆陵氏出也孫三人祚祺禧女一在室豫與公舊同史館知公為人直諒多聞而公亦以此自信有古節士風可尚已銘曰不撓不汙而端其趨不激不隨而安以居恩榮始終而善不虛嗚呼來祀欲知其人視此刻碈王希範墓志銘永樂十八年三月辛未禮部儀制主事王希範卒豫既弔哭退其孤錫持狀來乞銘將歸葬納墓中以詒諸後豫與希範永樂𥘉同𬒳選擢入翰林又同日拜恩命為檢討時希範年甚少氣甚鋭學通而才敏於人少許可獨以余齒少長頗推讓相與幾二十年始終如一日今巳矣銘不可辭按狀希範諱洪曾祖德甫祖善父輝世居錢唐希範生八歲即知務學及冠入郡庠從訓導胡粹中授春秋日記數千言無遺忘下筆為文辭沛然有奇氣率所事所言若老成人粹中大器之年十八舉進士任行人將命關陜得使職人賢之未幾升吏科給事中遂為檢討修大典為副總裁滿考升修撰又升侍講三以大比典文衡取士甚公職侍講踰二年遷今官適尚書吕公巡行關陜凡部事悉委希範敷奏論事詳明同列敬服朝廷方屬意希範而希範竟遘末疾以卒享年四十有一其疾也得賜藥物其卒也又得賜棺且給舟載歸恩意隆至人莫及也𥘉娶俞氏生子二人長即錫次欽繼室劉氏前浙江按察僉事必榮之女生女一人寧奴希範之學月開日益淳蓄深慱其為文章務湔滌刮劘以期至於古人而遽止於斯悲夫將以年月日葬某處銘曰昏哲強弱才也窮逹壽天天也修身俟命人也君子修其在已俟命於天而巳希範勤一世以修諸已而卒不施其命也夫其命也夫前泰和州知州顧侯光遠墓志銘梁濳泰和始為州其民之衆亂久而後定治之尤難而國朝𥘉相繼為之守者得二人焉曰吳侯去疾顧侯光遠也二侯皆一時豪士顧氏先世居河南自宋高宗南渡始徙而南居姑蘇之嘉定元末有知侯之材者辟為掾京口及太祖高皇帝下江南京口首納𣢾侯預有力其間遂從高皇帝入金陵監大軍倉支納三年授江西行省理間從征陳友諒督饋運明年平陳氏擢知龍陽州時方甲辰年也招附懷來剷革宿弊民賴以息越二年改知泰和州龍陽老稚至號泣於道不忍侯之去至泰和前州守即吳侯也吳侯以民好訟告於侯侯憮然曰民有冤抑守弗為之理民將安訴頃之訟者雨集侯乃自為書榜聮紙長數丈誨諭諄切民爭來觀觀已去不訟者十二侯又俾凡訟者居譙門上思三日然後得訴思不三日去不訟者過半矣乃擇吏純謹者一人置簿受訟詞而勾稽其始末民誠負冤也輒為疏理非誠負冤願誨自止者聽不問未兩月民不復訟吏亦畏侯精敏無敢舞文以病民境有虎適其時禁民私蓄兵民無所措訴于侯侯為草檄告之神虎一夕遁去州以大治以丁祖母憂赴闕陛辭命留翰林院同議編大明律律成上進復命監造天下均工圖籍已而還服喪嘉定未幾起後授廣東行省郎中二年召拜吳王府副相留京師以他事詿誤方建繫間得疾飮水病結胸而卒臨卒為詩壁間以慨道其平生有白髮歸朝之嘆聞者悲之子存誠殯于都南門外三里店侯諱某生元某年某月某日殁今洪武某年某月某日娶某氏子四人長即存誠次存仁為河南偃師縣令以殁次存義存信存誠今居嘉定存義存信從侯于廣遂留家焉侯性淡泊不尚侈靡所居廨宇室無長物惟藝𬞞數畦食取充口衣取蔽體而已至於治民事無巨細必盡其心在廣之日別廉吏均轉輸浚城隍撫馴士馬安戢逋逃號令既明而賞罰必信逺邇翕然及聞其殁爭欲為祠立石以頌其德者屬有禁不可乃止侯嘗從元進士楊仲宏先生學賦詩氣豪才贍而律調渾厚尤工七言晚自號蔗境翁詩數卷題曰蔗境吟藁云於乎侯當草昧之初能卓然諗知天命攀附聖主以自樹立可謂壯偉矣而用未臻其極功業不究於當時獨其善政在民者民不忘也瓊州守王君伯貞往來廣海間得侯二子訪之又素知侯之惠愛不忍其泯也為序其事以屬潛為之銘濳與王君皆泰和人也乃著其事之大槩吳侯安慶人為殿中侍御史以殁其後無聞焉銘曰民歷草竊窮姦偷及兹弭寧誇相讐大吞小噬病曷瘳正躬惠民邦兩侯後先敷政何優遊隱絀舒伸暴帖柔回遹海沮嗟相羞嗟哉我侯古罕儔衣𬒳寵光壯謀猷澤流盈溢爵未優身永逝矣名無休襄城伯李公墓志銘王直正統十二年十月草五日襄城伯李公薨于位年五十五上聞震悼為罷朝一日命禮部致祭工部為治墳塋供葬事公侯卿大夫士皆奔走弔哭凡諸將士嘗隸麾下者皆相與會哭盡哀蓋公喜讀書明道理文謨武略靡不究知其事君也忠其侍下也仁其制事也義其存心也恕是以上下痛惜之如此公諱隆宇惠平其先和州人祖旺生有奇材太祖皇帝龍興之日常從征伐立戰功纍官至燕山左衛副千戶父濬又以軍功纍至都指揮同知從太宗皇帝靖難功多授奉天翊衛宣力武臣特進榮祿大夫柱國襄城伯食祿一千石又以其爵封三代祖考妣及配皆夫人公其長子也年十五襲爵雖甚少而負英偉之資雄傑之材上深器重之永樂庚寅以來每六師北伐輒命公領兵從其應機發䇿出奇取勝雖老於行陳者亦多讓其能上益奇之以為可大用丙申車駕留北京顧南京根本地擇可任留守者莫如公遂命焉甲辰仁宗皇帝即位重北邊守備暫輟公南京命總兵鎮山海凡東北邊關皆節制蓋隱若一長城虜為之震懾未幾復還公南京洪熙乙已宣宗皇帝即位眷念公甚厚而倚賴益隆有白金文綺之賜公祗敬將事夙夜盡心蓋未嘗有間今上在東宮時知公忠勤宣德乙卯嗣大位又賜公白金文綺而眷注尤篤正統庚申上念禁衛重兵及諸司將士更畨來京以備征調者雖有大臣總之而才智明決如公者不可不在其位乃命豐城侯代公還為之副公在南京十八年荷列聖知遇以為股肱心膂褒嘉寵待之意具見所賜敕前後幾二百道自古大臣得君之深而始終無間亦少有如公者公行不違道而持之以誠小大之務必盡其公威行惠施近悅遠懷是以其人雖有貴賤愚良寬鄙細粗不同皆敬愛公如父母召還之日莫不願留而不可皆曰公去矣吾何恃自都城至江上泣而送者相屬於路公得人如此是豈以偽為哉公之在朝雖總理軍政然謙已下賢務循大體不茍為異同嘗有詔舉將校之可任者公必慎擇以進使必當其用有司點民丁隸府軍皆公與兵部再閲不中者例有罰公曰彼出自田里非素習然方壯顧教練何如教練有法則怯可勇勇可使為精兵由是鮮有罰者丙寅命率師巡邊賜之鈔幣及寶刀一公曰軍事貴嚴寶刀之賜意其在此吾豈敢不力然公威令素著及臨邊申飭守備內外整肅訖還不戮一人上閲武近郊公等各嚴兵以待戎陳整肅號令明審坐作進退皆中度上喜各賜金織蠎龍紵絲二有副公受賜惕然不自寧益思所以修其職朝廷或有政刑疑未決命文武大臣廷辨之公在其中侃侃正言犂然當於人心士大夫益重之以為非獨將帥才也間居手不釋卷古聖賢之言行皆服行不忘祿賜之外不妄取一錢嘗刻漢疏廣及唐盧坦之言以貽世訓諸子曰吾襲父爵四十年幽遠之情固多未逹所行之事寧免過差然競競惕勵悔往修來不敢欺公貪墨以負朝廷付託之重爾等宜益勉諸公取費氏崇信伯瓛之女封夫人無子女一嫁武安侯鄭宏側室子五人珍璉珝瑞瑾珍田氏出也女四人長未行次適興武衛指揮同知張鑑府軍衛指揮僉事胡全珍兄弟卜以是年十二月某日葬公於某之原太師英國公知公為最深為述其行珍奉來謁豫求為銘豫亦荷公之知而慕公之德且悲公之不可復見也奚可辭嘗觀晉之郤縠以詩書禮樂將中軍晉是以大漢諸葛武侯不使有餘財以負昭烈君子謂為大丈夫公庶乎是矣公自號湛然道人人亦以是稱之於乎茲其所以為湛然者歟公庸行之美見諸事者尚多不可以遍書姑序次其大者而系以銘銘曰天佑聖明賢俊挺生偉茲襄城邦家之禎維公額額厥有世澤既世其功亦世其德圭璋之望熊虎之姿有武有文施無不宜出則征行入則居守天子曰來汝豫左右公之在朝維一其忠不矯而異不翕而同正直之言廉厚之行衆人所思君子所敬天不愸遺隕星其堂壽不百年人奚不傷高墳峩峩公安于此刻銘垂休焜耀無巳知府葉公墓志銘公葉氏諱砥字周道更字履道蓋楚名臣沈諸梁之後以所食采為氏居南陽至晉有諱儉者為括蒼太守因家焉其後又徙上虞高祖萬曾祖明祖某父良玉皆不仕公天性明粹喜讀書早喪母童氏又喪其父皆能以禮居喪不惑於流俗嘗受學於鄞陳文昭檇李鮑仲孚二先生皆元故老博學有文章嘉公篤志為之傾竭底裏由是學行大進洪武庚戍公以明經取進士第得定襄縣丞兵荒之餘民未安業公勤於撫字流亡來歸乙卯坐纍謪涼州公處之泰然曰吾無愧於心足矣日杜門為學有詩寄子曰不須詢遠道窮逹信乾坤更號坦齋又號尋樂作賦以見志士大夫謪居邊者皆宗之守將西寧侯宋晟亦延致家孰為子師已卯求賢陜西按察副使羅某臨江知府劉鵬上虞知縣李惟中皆薦其學宜任史事遂起為翰林編修又有言其堪任風憲者復升廣西按察僉事用法平恕獄無冤滯吏畏而民愛之嘗兼綰三道印出按郡至遷江會洞獠數出沒為寇害吏民洶洶欲遁去且以無備諷公請少避公曰我去汝縣官必遁民何恃以安即命料丁壯立保伍寇來併力禦之彼豈不畏死耶頃之報益急公下今如故不為動寇亦卒不敢至永樂初以史事被逮籍其家惟薄田弊廬故書數篋而巳事白還之仍命與史事書成改考功郎中公進退人才品第高下小大各適其用尚書蹇公謂其年邁一以藻鑑任之他不溷以事會修永樂大典徵天下名儒命公為副總裁稽經考史無不愜當仁宗皇帝在東宫緝熙聖學擇儒臣侍講論公預焉其言於上者必堯舜周孔之道非是不以陳為郎中九年俾食四品祿職如故公重聽誤以為授他職上親灑翰授之至今寶焉久之公引年求去不許乃自言於吏部曰砥老矣過蒙優禮猶叨祿在朝人將謂何上若不棄願得一小郡牧小民庶效報萬一吏部以聞即拜饒州知府公先教化後刑罰興利去害摧姦植柔民無愚良皆愛之如子水旱為災憂若巳出每齋沐致禱必獲有年人以為德之應郡故有磁窰銅冶而丁調不減他郡公為力言於布政司得減四之一時方營造工之受役者當給糧贍其家布政司下饒州於遠輸內留八萬石給之公謂非戶部意不可衆譁然利其便請必從公終不許未幾部符下他巳入倉者皆反之民使遠輸勞費彌甚衆乃服公明決皆拜謝布政司亦自愧其所行凡再述職京師皆以恤民隱革弊政去汙吏為急然謂饒之風俗厚其民易化有訟者必以理諭不付曹民知公之愛巳也多悔悟而罷有婦代前夫子訟蓋欲資其後夫公揣知其故窮詰之以母子不忍為詞公曰爾不忍於子何忍悖其父而從人邪婦慙裂狀逸去由是無理者不敢至其庭訟簡刑淸民歸德焉戶口增至萬三千士之取科第者加數倍於昔公年益高而燭理益明遇事亦若無足為者嘗賦詩以自適辛丑八月有疾作書戒子孫以睦宗族和戚姻重義輕利母貽譏於後世尤以不能報國恩為慊是月草一日卒於郡廨之正寢距其生元至正壬午三月初六日享年八十郡人無賢愚貴賤皆哭之哀諸孫奉柩還以壬寅正月初六日禮葬上虞草一都駱家嶺薛氏墓山西麓配周氏賢而克家先公草一年卒今合葬焉子男二信可用可有士行皆早世孫男五綸早卒綬應州學正緯以子貴封南京刑部主事綺先卒續湖廣東湖馬驛驛丞曾孫男六罍充縣學生未仕冕取進士今為松江知府嗣生蕃佐佑曾孫女六皆嫁為士人妻公平生為文甚多號坦齋集今所存者南行藳退朝藳芝山藳經進藳及經筵講義弟魯道拙於治生無厚業婦家欲離婚公即以已産益之終身不復言其自處儉薄雖位望之重比封君而蕭然不異布衣時人有過失婉詞誨諭使知改而止未嘗疾言遽色然內貞外和雖詞氣寬平而所守有不可奪者博極羣書手不釋卷其所著述必根於義埋之正而有益於世教蓋於漢魏唐宋諸太家無不學故其所立蔚然有盛名當世而可示法於後來於乎公有德行文學之美而又兼政事之長誠一代之巨人君子矣葬三十五年而墓未有銘至是冕來京師以綬所為狀求豫銘豫從祖思忠與公同取洪武初科進士第及公來翰林豫亦忝從公後蓋於公舊矣則今銘墓奚可辭銘曰葉氏之先實楚名臣源遠流長子孫振振暨公承之乃舉進士奮迹文章揚譽政事經幄詞林寵命自天堯舜是陳維公則賢公既老矣皇用殊錫加乃常祿仍乃顯秩公有誠言願守一州惠此羣黎庶幾寡尤湖山之間厥壤千里人之愛公不異其子公逝不留民心則悲豈弟之化百世之思峩峩新阡公安于此昭德有銘垂耀無巳教諭聶大年墓志銘大年聶氏世為撫州臨川人曾祖某祖伯善皆不仕父同文洪武中取進士為翰林侍書尋改中書舍人壬午六月太宗皇帝至京師時盛暑以迎鑾暍死大年於父卒後五月乃生母胡孺人撫育之天資明爽頴悟絶人比長喜讀書日記數千言通詩書二經於諸子史無不讀尤篤意古文及晉唐人詩書法歐陽趙松雪皆臻其妙由是名動縉紳間用薦起為仁和訓導藩憲大臣與一時達官顯人過杭者皆禮重之而大年之文章傳於遠邇迎其母來杭旦夕率婦子備物以養必誠必孝母之心歡焉逾六年母卒奉柩歸葬哀感行路鄉邑耆老列言母賢行足以勵風俗而子又克孝如此詔旌表其門閭服闋分教常州府學滿九載升仁和教諭仁和之人得大年復大喜敬愛逾往時大年乃言於有司修學校嚴學規訓勵彌切諸生日加親慕教用有成登第者彌衆賔興之歲諸藩省請典文衡者聘幣交走其門而多以後至不能得為憾大年所至多得士人服其公凡所經歷處遇佳山水及古人遺迹必見諸賦誄聮為大卷藏於家景泰六年秋朝廷有史事徴詣翰林將用之而大年以疾告退就醫藥凡與善者數往來問候兾速愈而勢日危殆大年知不能起呼子章取𥿄筆書曰吾上負朝廷之恩下負平生之志爾兄弟尚勉學為士人擲筆而逝蓋景泰丙子二月二日也觀其所書如此則其抱負可知矣豫初識大年於金溪王先生所又得其所作小瀛洲水竹居賦觀其詞翰而重其為人真可謂奇偉非常之士也常思振起之使效用當時以其學行必有以名世傳後及被召來京師心切為喜思與之久處不厭而大年病豫亦以老疾絶人事往還心雖相親而迹則踈矣大年病甚遣門生李昻持簡來言身後事蓋欲豫銘其墓豫聞而哀之不三日而大年卒矣於乎豫豈忍銘吾友哉大年生於洪武壬午十二月初三日及其卒也享年五十又五配陳氏前平樂太守用晟之女有賢行四子女四孫男四大年有詩文四十卷多可傳者斯足以不朽矣章奉柩歸臨川將以某年某月某日葬某山之原豫乃為述其行而系其銘銘曰學足以為人師才足以適事宜出既逢時亦將有為何天不愸遺而未究厥施嗚呼噫􅐵其誰不悲皇明文衡卷之八十八
