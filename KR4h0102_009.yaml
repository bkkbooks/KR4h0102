front:
  text: 皇明文衡卷之九
  hash: sha256:cb5a6ce0267377fed3dd04a0e6523e7dbc80e2bf4845b718912db6fe9deb0667
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_009-1a}
body:
  text: 議論孔子廟堂議宋濂世之言禮者咸取法於孔子然則爲廟以祀之其可不稽於古之禮乎不以古之禮祀孔子是䙝祀也䙝祀不敬不敬則無福奈何今之人與古異也古者將祭主人朝服即位於阼階東西面祝告利成主人立于阼階上西面尸出入主人䧏立于阼階東西靣此皆主人之正位也卒脀祝盥干洗升自西階主人盥升自阼階祝先入南靣主人從戶内西靣祝酌奠主人西靣再拜稽首皆爲几筵之在西也尸升筵主人西靣立于戸内拜妥尸尸醋主人主人西靣奠爵拜皆爲尸之在西也漢晉春秋所載章帝元和二年幸魯祠孔子帝升廟西靣再拜開元禮亦謂先聖東向先師南向三獻官皆西向是猶未失古之意也今襲開元二十七年之制遷神於南靣而行禮者北靣則非神道尚右之義矣古者造木主以棲神天子諸侯之廟皆有主卿大夫士雖無之大夫束帛以依神士結茅爲菆無有像設之事開元禮亦謂設先聖神座於堂上西楹間設先師神座於先聖神座東北席皆以莞則尚掃地而祭也今因開元八年之制搏土而肖像焉則失神而明之之義矣古者灌用鬯臭欝合鬯臭隂逹於淵泉旣灌然後迎牲致隂氣也蕭合黍稷臭陽逹於墻屋故旣奠然後炳蕭合羶薌蓋求神於隂陽也今用熏薌代之庸非簡乎古者朝覲㑹同與凡郊廟祭饗之事皆設庭燎司烜共之火師監之其数則天子百公五十餘三十以爲不若是則不嚴且敬也今以秉炬當之庸非瀆乎古之有道有德者使敎焉死則以爲樂祖祭於瞽宗此之謂先師若漢禮有高堂生樂有制氏詩有毛公書有伏生之類也又凡始立學者必釋奠于先聖先師釋奠必有合有國故則否謂國無先聖先師則所釋奠者當與隣國合若唐虞有䕫伯夷周有周公魯有孔子則各自奠之不合也當是時學者各自祭其先師非其師弗學也非其學弗祭也學校旣廢天下莫知所師孔子集羣聖之大成顔囬曾參孔伋孟軻實傳孔子之道尊之以爲先聖先師而通祀於天下固宜其餘當各及其邦之先賢雖七十二子之祀亦當罷去而於國學設之庻幾弗悖禮意開元禮國學祀先聖孔子以顔子等七十二賢配諸州但以先師顔子配今也雜寘而妄列甚至荀况之言性惡楊雄之事王莾王弼之宗莊老賈逵之忽細行杜預之建短䘮馬融之黨附埶家亦厠其中吾不知其爲何說也古者立學專以明人倫子雖齊聖不先父食乆矣故禹不先鯀湯不先契文武不先不窟宋祖帝乙鄭祖厲王猶上祖也今一切寘而不講顔回曾參孔伋子也配享堂上顔路曾點孔鯉父也列祀廡間張載則二程之表叔也乃坐其下淳祐𥘉張居程上後因國子監集議再定張遂居程下顛倒彛倫莫此爲甚吾又不知其爲何說也古者士之見師以菜爲贄故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠今專用春秋亦非釋奠有樂無尸而釋菜無樂是二者之重輕繫乎樂之有無也今則襲用魏漢津所製大晟之樂乃先儒所謂亂世之音者也其可乎哉古者釋奠釋菜名義雖存其儀注皆不可知唐開元禮彷彿儀禮饋食篇節文爲詳所謂三獻各於獻後飮福卽尸醋主人主婦及賔之義也今憚其煩唯初獻者得行之其可乎哉嗚呼學校者禮之所自出猶河瀆之宗瀛海也猶山嶽之祖崑崙也今乃舛謬若是則其他可知矣禮固非士庻人之所敢議有人心者孰能黙黙以自安乎雖然此姑言其畧爾若夫廟制之非宜冕服之無章器用則雜乎雅俗升降則昧乎左右如此類甚多雖更僕不可盡也或者則曰子之言信辨矣建安熊氏欲以伏羲爲道綂之宗神農皇帝堯舜禹湯文武各以次而列焉皐陶伊尹太公望周公曁稷契夷益傅說箕子皆可與享於先王天子公卿所宜師式也當以此秩祀天子之學若孔子實兼祖述憲章之任其爲通祀則自天子下逹矣苟如其言則道綂益尊三皇不汨於毉師太公不辱於武夫也不識可乎昔周有天下立四代之學其所謂先聖者虞庠則以舜夏學則以禹殷學則以湯東膠則以文王復各取當時左右四聖成其德業者爲之先師以配享焉此固天子立學之法也奚爲而不可也七出議王禕禮大戴禮本命篇妻有七出不順父母無子淫妬惡疾多言竊盗是也而又有三不去有所取無所歸與更三年之䘮前貧賤後富貴是也凡此聖人所以順男女之際重婚姻之始也後世之議者或曰婦人不順父母淫妬多言竊盜其爲罪而見出宜也若無子惡疾乃其不幸非其罪也而去之非禮也聖人之制禮豈其若是嚴甚哉故七出定爲五出於禮爲稱也曰聖人之制禮嚴與寛蓋竝用也惟其嚴也故有以合乎天理之公惟其寛也故有順乎人情之正寛嚴相適而制禮之意得矣今自七出言之無子惡疾固婦人之不幸也而出之若過乎嚴矣然三不去者婦人孰無之使其無子惡疾矣而或其有所取無所㱕也與更三年之䘮也前貧賤而後富貴也則固不得而去之也是又未嘗不寛甚也夫夫婦之配偶人倫之本也聖人之制禮其必審於此矣故曰寛嚴相適聖人制禮之意所以爲中也或曰惡疾多言而或有是三不去者固不去矣使或無是也則其出也庸豈其罪歟曰妻道二一曰奉宗祀也一曰續宗祀也二者人道之本也今其無子則是絶世也惡疾則是不可與共粢盛也是義之不得不絶者也夫不順父母以其逆徳也淫以其亂族也妬以其亂家也多言以其離間也竊盗以其反義也五者其惡徳之見絶於人者也無子之絶世惡疾之不可與共粢盛二者其惡徳之見絶於天者也其於義所當絶均也或曰古者諸侯一夫人六姪娣两媵大夫一妻二妾士一妻一妾藉使妻有惡疾無子則固有妾足以生子而奉祀奚必妻之出也曰禮莫重於嫡孽之分所以培化本而窒亂源也庻孽並嫡家國之禍莫不由兹苟因妻有惡疾無子而成庻孽之寵以啓爭奪之禍是家國之大不幸也又况庻人有妻而無妾其爲不幸也尤大夫因婦人之不幸而致家國之大不幸輕重之際聖人固有以權衡之而謹其始矣然則以惡疾無子而出妻義之不得已而禮之不可免者也或曰禮者先王教人之具律者聖人御世之凖故禮虚文而律實法也七出之文雖載於禮而五出之法今著於律奚爲其不可也曰禮與律非二物也禮者防之於未然律者禁之於巳然皆緣人情而爲制禮之所不許卽律之所不容出於禮則入於律也惡疾無子之當出其著於律歷代相因未之有改由人情之所同也禮律二者均爲聖人之所制其輕重之際詳矣七出之目胡獨於今而廢之也故嘗論之夫婦之道以義合以禮成者也其成也則納之以禮不合也則出之以義聖人之所許也禮載諸侯出夫人夫人比至於其國以夫人之禮行至以夫人入使者將命曰寡君不敏不䏻從而守社稷宗廟使使臣某敢告於執事主人對曰寡君固前辭不教矣寡君敢不敬須以竢命大夫以下出妻夫使人致之曰某不敏不能從而共粢盛某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以竢命是其進退之間從容孫順有如此先王因其義之不得巳而禮之不可免所以存其辭而不廢也是故孔氏之家三世嘗出妻矣使果以出妻爲難也然則聖人非歟由是論之徇私情暱細惠不知禮義之大節謂婦人無子惡疾爲不當去而欲减七出爲五出者可謂野於禮也巳論衡運論胡翰皇降而帝帝降而王王降而霸猶春之有夏秋之有冬也由皇等而上始乎有物之始由霸等而下終乎閉物之終消長得失治亂存亡生乎天下之動極乎天下之變紀之以十二運綂之以六十四卦乾天道也徤而運乎上坤地道也順而承乎下天地旣判其氣未交爲否旣交爲㤗始乎乾訖乎㤗四封綂七百二十年是爲天地否㤗之運乾一索得男而爲震坤一索得女而爲巽震長男也巽長女也夫婦之道也始成爲恒旣交爲益乾再索得男而爲坎坎中男也坤再索得女而爲離離中女也中男中女夫婦之道成爲旣濟旣交爲未濟乾三索得男而爲艮艮少男也坤三索得女而爲兊兊少女也少男少女夫婦之道成爲損旣交爲咸是爲男女交親之運男治政於先女理事以承其後男之治也從父之道大壯也无妄也長男從父者也需也訟也中男從父者也大畜也遯也少男從父者也六卦綂一千一百五十有二年是爲陽晶守政之運女之治也從毋之道觀也升也長女從毋者也晉也明夷也中女從毋者也萃也臨也少女從毋者也六卦統一千有八年是爲隂毳權行之運坤隂也得陽育而生男乾陽也得隂化而生女男歸於毋女應於父豫也復也長男歸毋者也比也師也中男歸毋者也剥也謙也少男歸毋者也六卦統九百三十有六年是爲資育還本之運小畜也姤也長女應父者也同人也大有也中女應父者也夬也履也少女應父者也六卦統一千二百二十有四年是爲造化符天之運乾坤父母之道也必有代者焉代父者長男也從長男也從長男者中男少男也解也屯也中男從長者也小過也頥也少男從長者也四卦統六百七十有二年内外以剛陽治政是爲剛中健至之運陽剛之極隂必行之代毋者長女也從長女者中女少女也家人也鼎也中女從長者也中孚也大過也少女從長者也四卦統七百九十有二年内外以隂柔爲治是爲羣愚位賢之運隂随於陽爲順豐也噬嗑也中女從長男者也歸妹也随也少女從長男者也節也困也少女從中男者也六卦綂一千八百年是爲德義順命之運陽随於隂爲不順渙也井也中男從長女者也漸也蠱也少男從長女者也旅也賁也少男從中女者也六卦統一千八十年是爲惑妬留天之運長男旣息爲男之窮也長女旣息爲女之窮也於是中男與少男相搏焉蹇也蒙也二卦統三百三十有六年是爲寡陽相摶之運陽之搏也隂必随之於是中女與少女㑹焉暌也革也二卦統三百八十有四年是爲物極元終之運十二運上下萬有一千七百八十載陽來隂徃太乙臨之不浸則不極不極則不復復而與天下更始非聖人不能也聖人非天不生也天生仲尼當五伯之衰而不能爲太和之春者何也時未臻乎革也仲尼没繼周者爲秦爲漢爲晉爲隋爲唐爲宋垂二千年猶未臻乎革也泯泯棼棼天下之生欲望其爲王爲帝爲皇之世固君子之所深患也余聞之廣陵秦曉山廼推明天人之際皇帝王伯之别定次于篇正紀六合之大萬民之衆有紀焉而後持之何紀也曰天紀也地紀也人紀也天紀不正不足以爲君地紀不正不足以爲國人紀不正不足以爲天下何謂天紀天子無所受命者也其所受命者天也故國君受命於天子天子受命於天義至公也堯有天下七十載而得舜舜有天下五十載而得禹舜以德禹以功其得天下也不曰堯舜與之而曰天與之也由禹之後桀承其紀而自絶于天故湯放之由湯之後紂承其紀而又絶于天故武王伐之天下不以湯武爲篡而曰此天吏也天之所廢孰能興之天之所興又可廢乎皆歷數也虞夏商周之取與異道皆推至誠以順天者也而後世欲以詐力爲之始亂天下之大義矣何謂地紀中國之與夷狄内外之辨也以中國治中國以夷狄治夷狄勢至順也自三危積䂖負終南地絡之隂抵太華而北逾大河竝太行抵恒山之右循塞垣至于濊貊胡鮮是謂北紀胡門也自岷山嶓冡負地絡之陽竝商山抵上洛而南逾江漢至於荆衡循嶺徼至于百粤是謂南紀越門也其間包有冀兗靑徐荆揚豫梁雍之地上黨天下之脊也弘農分陜兩河之㑹也其外四夷居之風氣不同習俗亦異虞有三苗之叛周有昆夷之患雖有聖人不能使之同仁從其族類可也而後世務勤遠畧欲以冠帯治之姤失天下之大埶矣非一朝一久之故也由漢之後汨天之紀者莫曹操若也由晉之後汨地之紀者莫劉淵若也魏晉之事衰世之事也以唐高祖太宗之爲君而不能挈天下歸之正者何也高祖起兵晉陽下西河取臨汾鼓行而入長安除暴隋之禁約法十有二條民懷其德威震海内與漢何異哉漢王卽位汜水之上蕭王卽位鄗南君子與之唐受隋禪獨不與焉非有惡於唐也楊廣弑父與君天下之首惡也與天下誅之天下之大義也不知出此而從事於繁文僞飾猶竊人之鐘自掩其耳知其不可而猶爲之是以魏晉自處矣太宗承武德之後以百戰之師命李靖等將之擒頡利降伊吾平党項西通吐蕃回紇南致謝元深空人之國俘人之衆謷然自以秦始皇漢武帝不若也魏徴言之不聽顔師古李百藥言之又不聽好須臾之名忘將來之患卒從温彥博之議虚漠南之境徙其部落居吾内地留其君長備吾屯衞而帝加號天可汗刻之璽書是以夷狄自處矣以夷狄處者以夷狄與之以魏晉處者以魏晉與之春秋之義也蓋將以正天地之紀也天地之紀不正雖有人紀君臣也父子也夫婦也朋友之交也長㓜之序也何自而立哉而人紀之在天下固有不可泯焉者也當魏晉之初毛玠荀彧雖以操之奉獻帝爲扶弘義示至公爲當時之士如甘寧周瑜金愇耿紀之徒奮不與之淵雖尊漢安樂自謂漢氏之甥而孔恂􅊇知其奸睦夸不仕其朝忠臣孝子遭時多難未嘗不駢首接跡於當世鼎鑊在前而不辟刀鋸在後而不頋吾以是知生人之紀未嘗泯也有能正者豈難也哉故天下莫要於人紀莫嚴於地紀莫尊於天紀亂其一則其二随之亂其二則三者夷矣漢不亂則操固漢之征西也晉不殘則淵固晉之都尉也天地之紀不正由生人之紀先紊之也非秦隋之亂漢高帝唐太宗亦何自而興哉漢承秦之變變而近正者也唐承隋之變變而不善正者也三紀之立其堯舜禹湯文武之世乎善爲天下者亦法乎堯舜禹湯文武而巳矣尚賢論人君兼天下之所有以貴則天下莫與侔其勢也以富則天下莫與較其利也以權則天下生殺之所由懸也何求而不得何爲而不成而必有待於賢者知天下不可自用也雖聰明睿知一堵之外目有所不見十室之間耳有所不聞萬鈞之重力有所不舉百工之事能有所不通况天下大器也舉天下之大器重任也而三代之王者或以不明而克綏先禄或以㓜冲而弘濟多難或負過人之才強力辨捷而遂亡國䘮家不保其身豈天下之大器重任材力者有所不堪而㓜冲不明者能勝之哉太甲成王以有伊尹周公爲之輔佐故天下不勞而治夏癸商辛有終古龍逄而不能聽有膠鬲商容而不能用故天下不治而底于㓕亡用得其人則太甲之不明成王之㓜冲可以遷善改過緝熈光明而爲令主不得其人而自用之則雖夏癸之勇力商辛之辨捷負過人之才而不免爲獨夫得失之幾不可不審也亡國之人非盡不肖興王之臣非必皆賢天之生才何代無之伊尹仲虺巫咸甘盤傅說非盡生於亳邑也閎天泰顛散宜生南宫适太公望畢公毛公非盡出於豐鎬也亦非素有位而貴也遇之以其道則耕築漁釣遠迹田野海濵之人皆起而任公卿大臣之責伊尹傅說太公望之於商周是也遇之不以其道雖千乘之國萬鍾之粟曾不足以延搢紳游談之士孟軻氏之於齊梁是也道合則合道離則離去就之義不可苟也至治之世以德相尚天下無不可仕之國故君爲官擇人而臣無擇官士患德不脩不患無聞也患業不廣不患無位也德脩而業廣矣雖欲處衡門而樂考槃也詢衆庻者在閭其能舎乎興賢能者在鄕其能不舉乎由鄕而逹於諸侯貢于天子之廷三適者受上賞不賢者貶爵土則諸侯之責重矣賢者授之以官大賢授大官能者任之以事大能任大事則天子之任又重矣商周之盛上無曠官下無遺才其君臣遇合蓋如此周德旣衰春秋戰國之際不能統一於是君擇臣而臣亦擇君以事之然猶以義相尚侯嬴魏夷門監也而魏之公子枉車騎虚左迎之毛遂趙下士也而楚烈王願奉社稷㰱血聽之魯仲連東海布衣也居邯鄲圍城之中不肯西面而帝秦人以爲天下士也謷然負其高世之志伸大義於諸侯之上漢唐數百年之盛未有肖其風烈者髙帝太宗解衣輟哺傾身散財從海内之士舉天下於反掌之間傳世永乆當是時也曰竒士者有矣曰國士者有矣求所謂天下士果何人哉士氣卑而主勢崇偈偈焉以權利相任使其人固有不屑者矣如魯兩生野王二老世豈盡知之乎夫掲數尺之竿懸尋丈之緡鈎螾爲餌而投之河海所得者鱦鮒之屬耳吞舟之魚終不足致也其爲術亦䟽矣人主之心其精神念慮與天地相酬酢苟積至誠廓至公求天下之賢以寅亮天工孰不風動而應之於下天下至廣人才至衆其要莫先於論相相之賢否官之得失所繫也官之得失政之隆替所繫也由君子言之是猶後世之論相也未能盡古之道也治天下有本君之謂也治天下有要賢之謂也其本正者天下不勞而治其要得者天下之本不勞而正漢唐之君莫或知之其有天下非不求賢也其求而用之者不過以郡國之政有不舉耳朝廷之治有不備耳公卿大夫之職有不稱耳未嘗知正天下之本也爲公卿大夫者亦以爲能寄郡國之政佐朝廷之治於職足矣未有能正天下之本者也王伯之畧混聖賢之道塞非此其故乎蓋至趙宋而後世之君子有以此爲任者而其主不能擇也帝王之夫經大本託之空言而無補當此之時得君專且乆者皆時匪人假儒術以濟其奸者也易言抜茅連茹泰之君子以此進其君子否之小人亦以此進其小人二者迭爲消長故知人之難非獨難於君子而深難於小人至於君子之小人則又難也其言辨其行堅其見聞之博足以出人之不能其情貌之深足以欺人之不測其知術之巧足以移人所好而不悟其才藝之美足以行人所難而不憚其名君子實則戾也辨之不早去之不果植爲朋黨惡知其非君子也雖有君子横罹口語又惡知其非小人也知人則哲帝陶唐氏猶難之共工崇伯之屬衆所共賢者矣而帝獨以爲非賢其後果不賢也於是去之而帝之廷無惡人矣於是禹皐陶爲帝臣者皆得著其成績人主欲進賢而不能遠小人不足以言知人不知人不足以言得人非常之士待非常之主然後用之天降時雨山川出雲其興於此時也蓋必有之矣其興於此時也予必得而見之矣井牧天地養萬物聖人養萬民故天下之利聖人不私諸巳亦不以私於人井田之制是也井田者仁政之首也井田不復仁政不行天下之民始敝敝矣其後二百三十有二年而漢始有名田之議猶古之遺意也又其後六百又三年而元魏始有均田之法猶古之遺制也先王之遺制遺意田秦以來僅一二見又皆行之不遠天下之民益敝敝矣爲政者南面以子萬姓一夫之飢猶巳飢之一夫之寒猶巳寒之孰無是心也而訖莫之拯焉方漢承秦苛虐之後民新脫去湯火未遑蘇息高帝因而撫之逮及文景之世國家晏安無事宗戚大臣慿藉貴高之勢爭取美田宅以爲子孫利益郡邑富商大賈周流天下貲累鉅萬治生產畜牧膏壤十倍上儗封君編戸之氓無立錐之地則卑下之爲役爲僕不暇頋其身貧富不均埶所駲致也故董仲舒言於孝武以古井田法雖難卒行宜少近古限民名田以抑兼幷名田者占田也占田有限是富者不得過制也其後師丹孔光之徒因之令民名田無過三十頃期盡三年而犯者没入之議者以三十頃之田周三十夫之地也一夫占之過矣晉石苞令民男女二人占田百畆丁男女有差有國食禄者有差或十頃或五十頃兼以品䕃其親屬自啓奸端矣民無恒產不能制之專事要求之間不勞民駭衆坐獲井田之利此吾所未喻也殆不過爲兼幷之閑耳非有資於畎畮細民能無不足之患也故名田雖有古之遺意不若均田之善李安世在魏太和中其得君非華夏之主也其得民非歸馬牧牛之時也以魏國之大獨能均其土地審其經術差露田别世業魏人頼之力業相稱北齊後周因而不變隋又因之唐有天下遂定爲口分永業之制而取以租庸調之法口分卽露田也露田夫四十畆婦人二十畮而率倍之口分八十畆而不倍惟歳易之田倍之永業卽世業也夫家受而不還皆二十畆所以課蒔桑麻也民有多寡鄉有寛狹田有盈縮狹鄕之民受田半之爲工商者不給而在寛鄕者給之亦半也老疾寡妻妾給之三十畆四十畆雖不耕不可無養也當戸者益之二十畆雖巳有田不可不優也以此均天下之田貧不得粥富不得兼猶懼不能守吾法而乃聽民粥永業以葬粥口分以遷是以小不足而大亂法也何捄於敝振窮恤貧民獲保息周典也何惜而不爲之粥而加罰永徽之禁抑末耳議者如宋劉敞又以魏齊周隋享國日淺兵革不息土曠人稀其田足以給其衆民獲其實唐承平日乆丁口滋多官無閑田給受民不復獲其實徒爲具文不知隋唐之盛丁口相若耳開皇十二年發使均天下之田狹鄉一夫僅二十畆隋之給受何加於唐也唐雖承平日乆貞觀開元之盛其人戸猶不及隋何至其田具文無實也敞言過矣但狹鄕之民多而田不盈永業之田粥而民不固如陸贄所謂時弊者埶馴致也時弊則法亦弊故均田雖有古之遺制不若井田之善周制九夫爲井井有溝四井爲邑四邑爲丘四丘爲甸甸有洫四甸爲縣四縣爲都都有澮地方百里是爲一同治都鄙者以之夫間有遂遂有徑十夫有溝溝有畛百夫有洫洫有涂千夫有澮澮有道萬夫有川川有路萬夫之地三十二里治鄉遂者以之孟軻氏請野九一而助國中十一使自賦蓋二法竝行遂人匠人多寡異數而内外相經緯焉王畿之内五十里為近郊百里為遠郊六鄉六遂居之六遂之餘地爲甸地距國中二百里卽公邑之田天子使吏治之者也甸地之外爲稍地距國中三百里大夫所食之采地也稍地之外爲縣地卽小都之田距國中四百里卿及王子弟之䟽者所食之采地也縣地之外為畺地卽大都之田距國中五百里公及王子弟之親者所食之采地也此王畿之制井田常居十之六其不爲井者四郊甸地耳其曰夫三爲屋屋三爲井則出地貢者亦三三相任如井田之法八家樹藝一夫稅入于公孟軻氏所謂皆十一者是也鄕遂之地菜五十畆或百畮二百畆而都鄙之田或不易或一易再易是亦名異而實同也地有肥磽為之井者必有牧以濟之所謂菜與易者則皆牧也故小司徒曰井牧其田野井者其正也牧者其變也井地均不必牧也井地不均必牧以均之也由是逹于天下雖有山林川澤不可以開方制者以井牧授之以貢助取之諸侯之國可按而定也楚人東南之要服也蔿掩爲司馬度山林鳩澤藪辨京陵表淳鹵數畺潦規堰瀦町原防牧隰皐井衍沃量九土之入脩千乘之賦况中國之地無山林澤藪之阻無淳鹵畺潦之患原隰衍沃舉目千里夏后氏用之以爲貢商人用之以爲助而周人兼用之以制畿甸經邦國其法可考者徃徃存於周官之書其不合者以孟軻氏爲之權衡豈不較然也哉故嘗以爲井田之法行有十便民有恒產不事末作知重本一也同井竝耕勞逸巧拙不相負齊民力二也奉生送死有無相贍通貨財三也貨財不匱富者無以取贏絶兼幷四也取以十一天下之中正吏無橫歛五也比其丘甸革車長轂於是乎出有事以足軍實六也一同之間萬溝百洫又有川澮戎馬不得馳突無邉患七也畎澮之水澇則䟽之旱乾則引以漑注少凶荒八也少壯皆土著奸僞不容善心易生以其暇日習詩書爼豆養老息物成禮俗九也遠近共貫各安其居樂其業尊君親上長子孫其中不煩刑罰而成政敎十也一舉而十者具矣何憚而不爲乎其謂不可爲者蓋亦有二焉丘甸縣都其間萬井爲溝洫者又萬計包原隰而爲之窮天下之力傾天下之財非數十年之乆不克潰于成也非大有爲之君不能致其决也此不可者一也中古以降淳厚之俗薄澆僞之風熾恭儉之化衰功利之習勝經乆之慮少僥倖之敝多以限田抑富強猶有撓之者况使盡棄其私家之產乎以均田授農民猶有不能周之者又况生齒滋衆之時乎怨歸於上奸興於下此不可爲者二也以余論之二者何足尼吾事乎古者歩百爲畒漢人益以二百四十爲畆北齊又益之以三百六十爲畆今所用者漢畆歩也今之五十畆古之百畆也漢提封田萬萬頃惟邑居道路山材川澤不可墾餘三千二百二十九萬頃皆可墾元始初遣司農勸課定墾田八百二十七萬五百三十頃是時天下之民一千二百二十三萬三千戸以田均之計戸得田六十七畆古之百四十畆也家獲百四十畆耕之未爲不給也加之簡稽則工商祿食之可損者又不知其幾也雖唐盛時永徽民戸不過三百八十萬至開元七百八十六萬亦不漢過也以天下之田給天下之民徴之漢唐則後世寧有不足之患乎田無不足之患則取諸民以與民天下皆知吾君之不私也天下有如卜式者且將先吾民而爲之孰不響應於下也秦長城之役袤延萬里塹山堙谷暴兵三十萬而阿房之作督用徒刑者又七十餘萬郡邑之民發謫徙邉者又歲不休息不德甚矣天下怨誹未聞有一人違者况下令如流水之源固民心之所欲也王政之所本也今先取一鄕之田井之其制定其事便其民悅然後行之一郡取一郡之田井之其制定其事便其民悅然後行之天下天下之制定事便而民悅也亦何異於鄕郡乎是天下之田可井也事不勞者不永逸欲長治乆安而不於此圖之亦苟矣唐太宗嘗讀周官之書至體國經野設官分職以爲民極慨然歎曰不井田不封建不足以法三代之治人君負有爲之才操可致之埶其時又非難也封建議而不行井田知而不復君子蓋深爲唐惜之吾聞春氣至則草木生秋氣至則草木落產與落必有使之者矣物莫知之也故使之者至物無不爲使之者不至物無可爲上之人審其所以使故物莫不爲用管商之法孰與先王之制天下皆知其非民利也而齊秦舉國聽之其故又可知也以先王之制使若管商者爲之以紀人事經地利吾知天下之田可限也可均也亦可井也此無他善操其所使而巳矣忠信之道賞罰之柄上之所以使也愼習天下之埶窮則變由治而趨亂者其變易雖一憸人壞之而有餘由亂而趨治者其變難雖合天下之智力爲之而不足由秦以來天下之變數矣議者莫不慨然欲追復先王之舊歷漢唐千數百年而卒循乎秦人之敝者此豈其勢難而力不足哉荀卿子曰法後王一天下制度又曰法貳後王謂之不雅蓋卿有以啓之也自卿之論興其徒李斯用之以相秦凡可以變古者莫不假秦之柄奮其恣睢之心而爲之雖商鞅之刻薄不若是之烈也鞅廢井田止秦之土地改法令止秦之人民而斯也尊主爲皇帝舉天下以爲郡縣舉天下不復有井田夷其城郭銷其兵刅人主之勢孤立於上而怨起於下計無所出益倒行而􅊇施之燔詩書以塗民之耳目黜儒術以㓕天下之口說所守者律令也所師者刀筆吏也其變旣極其習旣成秦亡而漢承之聖王之繼亂世掃除其迹而悉去之崇敎化而興起之此其幾也陳經立紀以爲萬世法程此又一幾也高帝以寛仁定天下規模宏遠矣然未嘗有一於此其後賈誼言之於文帝董仲舒言之於武帝皆不能用又其後王吉言之而宣帝亦恬不以爲意觀高帝命叔孫博士之言令度吾所能行爲之天下事孰非人主所能者奈何帝之自畫如此而群臣不足佐之創業之君後昆所取法由是而文帝有卑之無甚高之喻宣旁有漢家自有制度之語當更化而不更化當改制而不改制一切縁秦之故雜伯以爲治逮于中興光武以吏事責公卿顯宗以耳目爲明察文法宻而職任違辨急過而恩意少雖從事儒雅投戈講蓺臨雍拜老有緝熈揖讓之風未能盡更化改制之實也故朱浮言罷斥之擾於前陳寵建䡖刑之議於後建初之政所以濟永平之失也之數君者在當時號爲賢主且去古未遠而因陋就簡未嘗取先王之法一試爲之爲之而不效舎之可也不爲而舎之烏知其不可乎蓋其溺於所習者乆矣辟之戎人生於戎夷人生於夷少長所濡染者皆夷戎也中國之禮義未嘗接焉雖知其美不能使之一朝去其夷狄之俗此豈其性殊哉習固使之耳古今之相去何以異此有能善變其習者果孰禦之魏晉之衰天下之亂極矣元魏起代北其先土托后䟦之裔也其人民被旃控弦之屬也與漢不侔矣宜未易以禮法理也而孝文遷都洛邑挈其人民而居之均田別里崇祀建學國人莫不有忤心焉獨排衆議而咨之王肅李安世之流釋胡服而為冠帶絶北俗以事詩書王通氏曰中國之道不墜孝文之力也豈不信乎及隋之衰天下文大亂而唐承之太宗却封倫之對從魏徴之勸貞觀之初力行仁義其為化也得矣制官以六典制兵以府衛制民以均田制賦以租庸調其爲制也備矣行之數歳家給人足行旅不齎糧外戸不待閉方制四夷之外太平之効可謂盛矣故宋儒以爲由文武之治千有餘歳而有太宗之爲君方之於漢其寛仁孰與髙帝其玄黙孰與文帝其所以致此者由其不惑於後世之論䏻自㧞於秦漢之習也向使孝文無卓然之見必爲之志雖得中國終於戎翟而止耳使太宗有躬行之實名世之佐舉唐之治又豈殷周之不若乎故俗之不淳不患也刑之不措不患也功之不遂不患也而患無必爲之志躬行之實持之者未乆也惟聖爲能盡倫惟王爲䏻盡制三代之興其王皆聖人也其所以爲天下者莫不本諸天理要諸人心大法之則大治小法之則小治苟以爲逺而莫之法也其道固存其意猶可識也春秋譏變法而大復古聖人豈好爲異哉懼後世不知有先王之法故假筆削力爭之然猶懼不勝况順而下之是猶决江河而放之陸埶必胥溺而巳耳故余不責斯之不師古而深悼况之法後王由其有以啓之也君子度巳以繩接人用枻夫與世遷徙而偃仰者戰國之遺習也卿之意不過如此學術不醇而遂以毒天下太史公曰法後王何也以其近已而俗變相類議卑而易行也天下有能知其近而相類者爲不可法也卑而易行者爲不可行也則秦人之敝去矣非聖人其孰䏻之皇初天地之初未始有物也馮馮翼翼由一而二二氣則一睢睢盱盱由二而三三才則一天下同由之謂道同得之謂德同善之謂性同靈之謂心道一也人皆由之而有不由者焉徳一也人皆得之而有不得者焉性一也人皆善而有不善者焉此人也非天也心不能盡性則不能盡德矣不能盡德則不能盡道矣故雖天也莫與能焉而成能者聖人也此聖人所以爲萬世開太平也鴻荒之世天地草昧民物雜揉穴居野處雖蚑息蝡動之屬不異也而不以爲墊毛食血飮雖鷙擊獷搏之屬不異也而不以爲臊蒙以羽革草木而不以爲野瘞以積薪而不以爲薄約以結繩而不以爲愚其民安之免於飢寒而不及於灾患斯可矣五龍燧人彼十有七氏者何氏也九頭攝提彼十紀者又何紀也其人果聖而世果治也歟宜於此有以變而通之矣何至委其人於顓蒙倥侗之域累數十萬年同於禽犢而不少拯之豈天生民立君之意乎必不然矣世雖傳之聖人不言也聖人不言者蓋無稽而愼之也道本於三皇德著於五帝法備於三王過此以徃未之能尚也德固道也而法亦道也所因者異耳山川之風氣不同五方之民異俗古今之風氣不侔歷代之治異宜其要皆所以納民於道也庖犧氏神農氏軒轅氏繼天而王畫卦以開物備物以致用民利頼之其具不過網罟耒耜而畋漁農父之所務也其制不過宫室舟車關市弧矢杵􅍫而工商武夫之所能也方其未創之時民固無所措其心思手足之力矣故必聖人而後爲之爲之不足必聖人而後繼之因時變通不變不通也書契之作法之始也衣裳之治德之昭也其化神而民宜有善而不知天下同歸於道泯乎其迹矣軒轅之後是爲五帝歷少昊高陽高辛而至唐虞唐虞之帝爲堯舜聖聖相承疇咨都俞南面以臨群臣其治猶黄帝也而政敎禮樂之在天下有皐陶稷契以任之有伯夷后䕫之屬以典之而又以伯禹總焉雖有洪水之灾四凶之惡不勞而治帝何爲哉天下同歸於德雖莫之名焉而煥乎其文矣有虞之後夏后氏承帝執中之傳以功踐帝之位九土旣平九疇旣錫彛倫攸叙三年而天下遂於仁不得賢而與之而其子啓能敬承父道以天下與其子猶與賢也及啓之身有扈不服于甘之役大戰而後服之欲如有虞之世不可得矣父子相繼所以止天下之亂是乃變而通之也夏德旣衰商人繼之商德旣衰周人繼之南巢之放湯有慙德牧野之師武王以爲有光焉則君之不疑矣無復商人之意矣其順天應人則一也故君臣易位天下不以爲非是亦變而通之也撥亂世而反之正天下同歸於義義形而法益備矣禹之興也承乎虞而不及虞者也文王之興承乎商而進乎商者也皆三代之盛王也其道同其德異者有之其德同其法異者有之其法同其制異者有之存乎其人焉爾存乎其世焉爾消息者候之徴也淳厖者俗之判也理亂者變之象也質文者治之體也損益者制之宜也變通者權之用也神化者用之妙也通乎消息之候審乎淳厖之俗明乎理亂之幾別乎質文之體損益變通合乎神化之妙此聖人之所同也及周之衰王降而爲伯伯降而爲戰國諸子分裂聖人之道人騖其私智異說掎挈是非梟亂名實世患苦之雖爲諸子者亦病焉於是刑名農墨之家崇儉質尚功實而老子貴淸淨將棄仁義蔑禮法與天下共反其朴於太古之時意在懲周之弊而非大公至正之道也漢用其術文景之世天下無事最為有効而非二帝三皇之所尚也聖人之道辟之天地明之爲日月潤之爲雨露變之爲風霆爲鬼神莫不由天地以成化竅之爲山川微之爲草木爲昆䖝莫不由天地以成體而天地之所以爲天地者易簡而已矣聖人在位大之爲朝廷之遜禪父子之繼立變之爲征討君臣之革命皆天命所當然重之爲郊廟社稷之事公卿大夫賢不肖之黜陟下至閭伍井牧之賦庠序之敎關市權衡度量之制刑賞之具禮樂之用皆民生之不可去者也聖人何容心哉亦行其所無事而巳矣故聖人之心天地之心也聖人之性天他之性也聖人以其心溥萬物而物無不平以其性盡萬物而物無不成非固誅之也有生者各一其性有知者各一其心聲氣之同捷於桴鼔念慮之孚堅於金石故曰天地感而萬物化生聖人感人心而天下和平聖人之化如神而人不與知焉聖人之化如天而神不與能焉蕩蕩乎平平乎皇極之道也而非老氏者之所謂道也皇極之道立天下之治得矣茍不爲皇猶當爲帝茍不爲帝猶當爲王是三王不足四而五帝不足六也迂論九首王廉禋于六宗先儒言六宗者非一家或以爲天地四方或以爲祖宗四方或以爲天皇大帝及五帝或以爲五官或以爲四望或以爲蜡之百物或以爲天宗三地宗三或以爲日月星辰司中司命風師雨師或以爲卦之六子或以爲三昭三穆各肆爲臆說互相駁黜終無一定之論逐使六宗之說不明惜哉按六宗出于虞書周禮則無明文惟孔叢子以祭法埋少牢於泰昭祭時相近於坎壇祭寒暑王宫祭日夜明祭月幽榮祭星雩榮祭水旱爲六宗孔安國因之王肅之說亦同朱子書說亦取焉三山楊信齋以朱子書說非茍從者今從之必有深意但鄭玄註祭法改相近為禳祈又以六者皆以爲祈禱之祭夫舜類于上帝禋于六宗望千山川徧于群神乃是攝位告祭之禮安得禳祈之禮哉其說足以破之若以此祭爲常祀則非也夫舜類于山川徧于羣神所以告攝位也告攝位于天地山川羣神足矣何必吿于四時寒暑水旱哉先儒以家語爲漢儒附㑹觀於此類信矣孔安國王子雍祖述其說故不足怪朱子取之何也楊信齋述祭禮一書足以爲不刋之典旣疑之復以爲朱子取之必有深意又何也愚謂舜攝位告祭類于上帝及望于山川徧于羣神矣惟不告祭於地祇意六宗謂地祇也蓋六爲地數宗尊也且序其次地祇正當在上帝之後山川羣神之上斯說豈不正大耶周禮太宗伯王大封其先告后土大封猶且告后土攝位爲天子安得不告地也晉虞喜别論蓋謂此也但喜謂地有五色大社象之其緫五爲一成六爲地數渉於鑿耳劉昭亦以爲喜說近得其實予亦云昭以虞書所稱肆類于上帝是祭天不言天而曰上帝帝是天神之極舉帝則天帝斯盡日月星辰從可知也禋于六宗是祭地不言地而言六宗六是地數之中舉中以該社稷等配從可知也其說似好謂帝能該日月星辰則可謂舉地數之中以該社稷等配則不可望于山川豈非地乎即如其說若重復矣但以地數六爲六宗自明何必穿鑿如是文獻通考但歷考先儒訓釋之同異考訂之去取著爲一門亦無定六宗之說又不載虞喜劉昭之辯梁博士崔靈恩三禮義宗詳於六宗者也亦略之豈亦有所遺耶武王伐紂當文王與紂之時紂之贒臣有若箕子膠鬲微子微仲王子比干相與輔相之故文王不有天下武王立十有三年大㑹於孟津數紂之罪以伐之殷之民以武王拯己於水火之中故篚厥玄黃簞食壺漿以迎王師殷之民非厭殷也厭紂之虐也紂亾則民固未厭七王之遺徳也當紂之亡也微子去之箕子爲之奴箕子紂諸父也微子紂庻兄也其賢其聖與武王不相下也武王克商釋箕子之囚矣不求箕子微子之誰立顧乃訪箕子以天道而受洪範之訓旣以箕子而爲師矣武王固知殷宗未厭也不箕子是讓是立而遽踐天子位焉微子之去武王安得而不知之即箕子不言其去而欲閟微子以存商祀也武王在位五年曽無一言以及之何哉至成王時武庚叛誅乃立微子於宋吁武王之於微子吾不得而知其故也武王之於箕子吾不得而知其事也其後殷民反覆卒不服周觀大誥康誥酒誥梓材召誥洛誥多士多方八篇可見矣善乎蘇子嘗曰多方所告不止殷人乃及四方之士是紛紛焉不心服者非獨殷也予乃知湯已下七王之徳矣方殷紂之虐人如在膏火中歸周如流不暇念先王之徳及天下初定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也使周無周公則亦殆矣由是觀之殷民厭紂非厭殷也豈虛語哉武王克商不立箕子則微子之立殷民戴周之德爲何如也今也不然殷民之叛無足恠也呉氏曰湯武皆以兵受命然湯之辭裕武王之辭迫湯之數桀也恭武王之數紂也傲學者不能無憾焉吾於武王之克商也不憾其辭之傲而憾其不立箕子與微子之去而不求也抑武王聖人孔孟之所宗也小子何得而議之議其迹之見於書者耳盡信書不如無書孟子固以疑之然又惡知武王當時之立箕子而求微子矣而箕子微子知天命之在周固讓不居而後武王不得巳而踐位焉後世亡其傳邪秦㓕載籍書傳於伏生出於孔壁則固後世不得而盡信之也盡信之吾於武王有憾焉宗廟畧詳見通辯天子諸侯宗廟之制中庸或問詳矣惟大夫士之制則不能無疑焉王制曰大夫三廟適士二廟官師一廟官師陞適士適士陞大夫以次増立其廟固其理也設若先大夫旣立三廟矣其子孫乃無為大夫者而爲適士爲官師先大夫所立三廟今爲適士官師者又不當祭其廟其主將毀之乎將存之乎毀之非禮也存之其誰宜哉存之而主於宗子歟禮支子不祭故支子之爲大夫者有事於廟以上牲祭於宗子之家祝曰孝子某爲介子某薦其常事然則支子之爲大夫者不得立廟矣宗子為大夫今支子之大夫則固可因其三廟而祭設宗子為適士爲官師或一廟或二廟所當祭者不過祖與禰也支子之大夫所當祭之曾祖宗子旣不當祭支子之大夫又不敢祭將闕之乎將遂以攴子之大夫所當祭而祭之乎闕之非禮也祭之又非適士官師之宗子所宜祭也禮大夫欲祭髙祖則省於君謂之干祫今欲祭於曾亦將省於君歟又宗子爲大夫其支子與之同行者亦爲大夫因之而祭三廟則固宜也苟宗子與支子其行不同等所祭之曾祖禰亦不同等則如之何竊料各随見爲大夫者所宜祭之三廟而祭之宗子但爲之主祭耳主祭者惟宗子𥘉不論其行之不同等也臆說若此俟知禮者正焉又按曾子問以上牲祭於宗子之家䟽曰宗子是士合用特牲今庻子身爲大夫若祭祖禰當用少牢之牲就宗子之家祭之也用大夫之牲是貴祿也宗廟在宗子之家是重宗也此宗子謂小宗也若大宗子爲士得有祖禰二廟也若庻子是宗子親弟則與宗子同祖禰得以上牲於宗子之家而祭祖禰也但庻子爲大夫得祭曾祖已是庻子不合自立曾祖之廟崔氏云當寄曾祖廟於宗子之家亦得以上牲宗子為祭也寄廟之說經無明文亦是崔氏臆見然庻子爲大夫旣不敢自立廟因宗子祭於宗子之家宗子爲士所祭者祖與禰也曾祖則無廟審如崔氏寄廟之說則當爲庻子之為大夫者別立曾祖廟矣其說似乎有理愚意以爲庶子之大夫有事于曾祖當就宗子爲士之祖廟祭之猶省於君而祭髙也但如此說大是平易寄廟之制似是而實非也又按庻子爲大夫不敢立廟而祭於宗子之家故䟽曰宗廟在宗子之家是重宗也然則庻子爲大夫不得立廟明矣按王制大夫三廟凡為大夫者則得立矣無嫌於適庻之分然宗子之三廟或不與庻子之爲大夫者同行宗子所立之三廟自宗適之正派庻子之為大夫者其三廟乃小宗也而與宗子之正派不相同也要之庶子之爲大夫者自得祭於其家小宗之王廟或因事告祭於宗子之家大宗之三廟者以宗爲重故也設或宗子之三廟其分皆卑於庶子但用宗子爲祭之主而告祭之更不論其分之尊卑惟以重宗爲事歟予前說省於君而祭曾與就宗子之祖廟祭之其說與此不同姑兩存之以俟知禮者擇焉孔子堕三都當定公時三家專政乆矣昭公伐之不克出亡八年竟薨于乾侯三家之不可去也孔子豈不知之知其不可去顧爲大司冦與之並立于朝可謂知乎吾知孔子之出仕也不惟見用於定公尤見信於三家而三家聽孔子之行事也不然三家恐孔子之攻巳必沮孔子之進矣何以知三家之聽孔子之行事也吾見孔子行事而三家不疑又使其徒季路爲之宰而三家無間十四年孔子攝行相事而三家又無沮意由此而信之也旣曰三家聽孔子之行事則三都爲孔子之謀而自堕也詎不信乎朱子以爲三家自堕之必不然矣使其自堕三都則三家之強也爲何如哉公室之弱也爲何如哉孔子畏其強而弱魯也必有以沮之矣夫三家憤陪臣之㨿其私邑其欲堕之也固三家之本心又喜孔子以公義使巳而堕之也茍爲不然孔子素知三家之擅政不可以一旦奪惡能以司冦之權而遽奪其三都而三家從之耶是固勢不可行也吾知孔子之爲是舉其必有所恃矣夫孔子以公義而使三家堕之者非爲三家謀爲魯謀也魯堕三都則三家弱而公室強矣又何以知其非三家自堕之也成叛十有二月公圍成公至自圍成信以爲三家自堕之則三家自堕之矣公何自圍之乎而春秋又直以公圍公至自圍書之乎吾於是益信堕三都之事爲孔子之謀也非三家自堕之也明矣朱子以爲三家挾公而圍之夫三家之勢至於挾公則魯微矣有甚於受女樂而怠於政事者受女樂怠於政事他日孔子猶託以微罪行而於其挾公之日乃不去之何哉吾於是又益信非三家之挾公也明矣夫二都堕三家豈不知孔子之弱已其意若曰與其使陪臣之強爲已弱孰若使公室之強以自贖哉論至於此而後知三家之從孔子之化矣而後知三家之聽孔子之行事爲無疑也公羊謂孔子行乎季孫三月不違是也惜乎其蔽巳深如僭禮樂者不能盡革之矧孔子以司㓂之任視相爲輕也孔子之仕魯而化魯之君臣十得其一三焉宜乎孔子之不乆於魯也抑堕郈書叔孫州仇堕費書李孫斯仲孫何忌而不書公者三家以公義帥師謀出於公室猶公之師也十年再圍郈亦然孟孫不能堕成及成叛公乃自圍之耳圍之不克不可謂孔子為失計也傳曰戰不正勝是已左氏以孟孫聽公歛處父之謀而不堕成故公自圍之容或有之其曰費人襲魯公入于季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北使誠有之孔子之謀信亦䟽矣孔子之舉信亦危矣殊不知公山不狃以費叛召孔子之時按史記乃定公九年在孔子爲中都宰之前經不書費叛者以費叛季氏非叛魯也十二年季孫斯仲孫何忌以公義一舉堕費無叛事如左氏所云朱子友以史記為妄而信左氏遂以堕三都爲非孔子之謀而爲三家自堕之論是年孔子爲大司冦方用事於魯惡得欲赴費人之召且費叛而孔子乃欲舍魯之睦背季氏而去豈人情哉九年孔子未仕歎道未行故有興周之念而欲赴費然知其人終不可化而卒不徃亦乗桴浮海之意今已見用而其化及於季氏矣使於是時費果叛孔子欲赴之何哉由是觀之費叛在九年審矣左氏之妄又無疑矣吁千載之下雖朱子之考覈精詳猶爲左氏所惑况他人乎蘇子以晏嬰爲國以禮之事方之蓋亦惑於左氏者也予反覆推究其情直㨿經史而以理折之如此專經之士幸勿斥其妄而去取之幸甚鄆讙龜隂田詳見左傳鈎玄左氏以鄆讙龜隂田爲汶陽之田其後司馬遷杜預及諸家皆以爲然不知汶陽乃齊地鄆讙龜隂爲魯田與汶陽不相于也朱于辯之詳矣但朱子以鄆讙龜隂田之來㱕者於吾聖人無與焉又曰借如彼說聖人修春秋自書其功殆非人情愚則未安其說公㑹齊侯于祝其孔丘相乃其實事齊人來㱕鄆讙龜隂田亦是實事左氏言萊人以兵刼魯侯雖不可信然孔子使兹無還請田又却齊享不可謂皆安也其後來㱕鄆讙龜隂田豈可謂不與吾聖人之事乎當時實有其事春秋惡得而不書之書之爲魯也非自以爲功也且有其實而避嫌不書孔子自處則善矣其如魯史何避嫌之事賢者且不爲况聖人乎愚則曰齊人來㱕鄆讙龜隂田實吾聖人之功但左氏以三邑爲汶陽田則非也魯鄭易田按許田乃許國也今許州許昌縣是也許乃周公朝宿之邑魯舊封也魯頌曰居常與許復周公之宇是也許非許田也許田非許也隱十一年秋公㑹齊侯鄭伯伐許遂入許曰公會主謀者公也許田則固名爲魯之田矣魯但不遽有之耳至桓元年鄭伯以璧假鄭始得之初不聞以祊而易之也祊在沂州琅琊縣在魯近地安得爲鄭人湯沐之邑必魯之近地而失於春秋之前歟但經不書其失於何時鄭之有祊又不知得於何日祊爲魯地爲鄭所侵今欲結魯之援故㱕於我書㱕足矣又継之曰我入祊欲見魯公貪鄭之賂非可入而入耳𥘉又不聞以祊而易許田也考之鄭得許田之由旣如彼稽之祊入於魯之故又如此不知左氏何所本而妄生易田之說也金縢非古書予讀書至金縢反覆詳究疑其非古書也使周公而然非周公也金縢曰旣克商二年王有疾弗豫二公曰我其爲王穆卜周公曰未可以戚我先王公乃自以爲功爲三壇同墠爲壇於南方北靣周公立焉植璧秉珪乃告太王王季文王史乃冊祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身夫周公靣郤二公穆卜以爲未可戚我先王矣隂乃私告三王自以爲功此憸人佞子之所爲也而謂周公然之乎死生有命周公乃欲以身代武王之死使周公而然則爲不知命矣且滋後世刲股醮天之俗周公元聖豈其然乎又曰今我即命于元龜爾其許我我其以璧與珪㱕俟爾命爾不許我我乃屏璧與珪夫人子有事于先王而可以珪璧要之乎使周公而然非逹孝者矣又曰公㱕乃納冊于金縢之匱中蓋卜冊之書蔵干宗廟啓之則必王與大夫皆弁旣曰周公别爲壇墠則不於宗廟之中明矣不於宗廟乃私告也周公人臣也何得以私告之冊而蔵于宗廟金縢之匱又私啓之也使周公而然則爲挾冡宰之權而不有其君者也又曰王與大夫盡弁以啓金縢之書乃得周公所自以爲功代武王之說周公冊書宜不在宗廟金縢之匱卽在其中武王疾瘳四年而崩周公居東二年而㱕凡六年之乆周人尚卜惡有朝廷六年無事而不啓金縢之匱至今乃啓之耶卽此五事反覆詳究頗疑是編非古書也舊傳今文古文皆有蔡氏又䏻曲爲之說釋之加詳矣相傳旣乆固非迂論之所䏻奪然於心未始不致疑也故䟽于篇以俟知者周六服朝見詳見三禮纂要按大行人六服朝見以數見者爲親也如九州之外謂之蕃服世一見謂父死子繼及嗣王卽位乃一來耳以其夷狄䟽之也周時以洛爲邦畿邦畿方千里其外各以五百里分九服一方五百里者九四千五百里也以二方對計之并邦畿千里通萬里也今姑以二方論之周公封於魯魯去王畿千有餘里在甸服二歳一見召公封於燕燕去王畿二千餘里在采服衞服之間或三歲四歲一見以周召元臣乃在外服似若䟽之者何耶設如先儒以鳥道計之縱魯在侯甸之間而燕尚在甸界之服若以禹服計之魯當在綏服燕逺在荒服矣殊未喻也由是觀之周禮爲未行之書信矣論李綱請固守京師之非宋徽欽時金虜入冠李綱力主固守京師以衞社稷夫死社稷諸侯守土之職非天子之事也李綱不此之晤而欲留二帝固守京師以待勤王之師與虜背城一戰以决勝負若綱者賢則賢矣不幾於知常而不知變者乎昔者大王嘗避狄人之逼孟子又嘗以對滕君矣夫太王滕君皆侯國也及其行權聖賢猶許之况於萬乘之尊乎故唐玄宗幸蜀以避禄山之禍代宗幸陜以避吐蕃之難德宗幸奉天以避朱泚之亂卒賴勤王之師再造唐祚使當是時三宗皆如李綱之議則安禄山吐蕃朱泚之慘三宗能不震驚乎綱力主其議二帝從之幸而斡離不尋以師退京師賴以無虞及綱罷是後朝臣不建行幸之議至冬虜復入冦何㮚又執綱議欽宗以足頓地誓死社稷朝臣乃不復言遂至二帝北廵貽宗廟之羞遺人民之禍實自綱㮚知常而不知變之罪當時之計莫若從大王避狄之謀而襲三宗出幸之事命康王爲元帥李綱爲相權之不撓用之不疑詔徴天下勤王之師以衞王室斯善之善者也卽有不虞亦無北遷之禍顧乃爲守土臣之計致二帝身亡國削哀哉哀哉養生論梁寅人之生也參天地而爲三其身亦一天地而小者也天地之大而不能不終也則人之賦形天地之間者其必有終亦宜矣然其生也旣異於物則亦乆於物者也故人之壽至於百歲其大限然也善養生者或過乎百歳其不善養者皆自促其生也善養之矣而亦或早終則其生氣之受有不及者也而謂人之爲仙其壽可數百千歳者吾旣未之見則固未之信也夫天之生物者其性也其燭而爲日月爲列宿嘘而爲風濡而爲雨露凝而爲雪霰爲霜雹怒而爲雷電蒙而爲雲霧是皆其情也人之得天之生理者其性也其適意而喜不適意而怒中不忍而哀中無主而懼見所美而愛見不美而惡求其所願而欲是亦其情也夫情也者貴合於中而不可以過天之情過則爲水旱饑饉疫癘凶札斯天之失其常者矣人之情過則爲淫邪放恣暴虐昏謬斯亦人之失其常者矣聖人者天下之主也故純德以合天而天道以順君子者或未能善天下而能善其身故脩德以俟天而吾身以安衆人者不能善其身而縱於欲故悖夫天德而促其生世之善養生者大槩先於治七情舎夫七情而復有神秘之術者吾不知也聖賢之學所以脩其身者亦莫先於治七情是聖賢之學卽養生之術也或曰山澤之士屏華違紛居閒處幽寂寞寡慮優游無爲得以治夫七情而全其天性固爲善矣其出而事君理民者將欲勵其忠貞樹其勲名則擾而非靜勞而非逸或至於耗其精而竭其神則生奚以養曰所謂養生者唯視其當為者爲之爾固非悖乎天以私其身也茍能循乎中適乎義雖不幸而隕其軀其夭也亦壽也不循乎中不適乎義雖幸而全其軀其壽也亦夭也故治夫七情者奚窮逹之異七情旣治可以養德可以養智可以養生養德而身脩養智而官理養生而壽固斯一舉而三得者也故凡有官守者知吾身之疾唯在於多欲必屛其欲以瘳其疾明夫三德三行者其六脉之和也稽經史務學問諸方之良也古之賢者以爲則不賢以爲監五藥之善也至於車馬聲色服飾器玩凡其可羡可嗜者皆物之毒者也固宜一切忌之矣吾身之疾旣瘳然後於喜怒哀樂愛惡欲一循夫理而不至於過中焉是於疾去之後慎而又慎日養之以粱肉而助乎吾身之元氣也如是則上能佐君以永享天禄下能導民以躋于仁壽而巳亦獲福考終矣孰謂養生之術非逹者之宜乎聖賢之學所以可貴者此也物初論朱右或問天地果有初乎曰有人物果有初乎曰有然則有初必有終曰惡乎無方噫氣之大息也混混沌沌冲漠無始一氣旣復隂陽遂判淸濁以分高下以形非天地之初乎于時萬象森羅已具有初而迹未形也天地一隂陽而巳人物固囿於隂陽以生者也陽生有六是謂之乾隂生有六是謂之坤陽生子中極於午中乾道立矣隂生午中極於子中坤道成矣乾坤者萬物之父母也當一陽初復二陽旣臨陽在地中草木生焉故草木之本皆居下而末反居上陽在下也三陽旣交四陽漸壯鱗介群生羽蟲次之故魚鼈身横飛鳥兩足而昻首陽未足也五陽健而决膏脂生焉故獸形近人至於六陽旣金乾道始備人斯立矣故人首居上足固在下得天地之全氣以生者也陽以生之隂以成之自午至子爲六隂成物之氣故能全乾坤之德者爲聖人聖人得天地之全氣而盡性踐形者也詎非人物之初乎然則曷而終曰生長歛蔵一歳之終滋育消㓕一物之終非吾所謂終也若夫生物屏息天地無有斯爲終矣曰終當奈何曰有終必有初作物初論卞和論唐肅卞和以獻璞而則人曰非和罪也和知璞之有玉楚子不和信也不和信則已何以刖爲剖而無玉刖未晚也故曰非和罪也唐子曰獻璞而刖和自取者也非不和信者罪也和之不剖而獻欲章其識也卽受而剖焉於國何補亡補於國勿獻可也故君子罪和而不罪楚子不足罪也吁世之以文章小技自衒而不售者其和之徒歟分野論蘇伯衡分野之說其傳也遠而周禮春秋傳始詳焉春官保章氏以星土辨九州之地所封封域皆有分星以觀妖祥左氏内傳曰參爲晉星商主大火外傳曰歲星所在則我有周之分野也此分野之說見於周禮春秋傳然也至漢地理志言分野乃爲始詳宻謂秦爲東井輿鬼之分野魏爲觜觹參之分野周爲柳七星張韓爲角亢氏趙爲昴畢燕爲尾箕齊爲危虚魯爲奎婁宋爲房心衛爲營室東璧楚爲軫翼吳爲斗越爲牽牛婺女而鄭康成則謂堪輿雖有郡國所入度非右數也今其分可言者十二次之分也星紀吳越也玄枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也觀乎左氏謂熒惑守心宋景禳其咎實沈爲祟晉侯受其殃鄭氏謂分野之妖祥主用客星彗孛之氣以爲象則驗灾祥於星土其法蓋古有之不可誣也然而吳越之地南而星紀則在丑齊之地東而玄枵則在子晉之地亦東而降婁則在戌東西南北徃徃相反而不相配是則誠爲可疑者杜預等注旣莫能詳而鄭氏則謂國中之封域於星則有分焉其書亡矣夫有其書而旣亡此後人所以求其說而不得自漢以下星官史家參之以度數毫分縷析各極其至而十二次分野相配之理卒莫有明言之者嗟乎夫豈不以不足言而不言之歟唐天文志浮圖一行皆以河漢爲言固巳踈遠及賈公彦軰乃援古昔受封之日歳星所在之辰其國屬焉以爲證若然則三代之分野皆當不同而列國所屬亦必有同焉者矣嘗試論之分野視分星古不謂地也地有彼此之不齊而分野在天則一定而不易以彼此不齊之地必欲求配於在天十二次整然之分野其說之難通也固宜蓋天有三垣紫㣲太㣲天市是也紫㣲太㣲皆將相輔佐之位而天市下垣則列國星宿之所在其星東西二十有二宋南海燕南東海徐吳越齊中山九河趙魏韓楚梁巴蜀秦周晉河間河中曰分野者指列宿所屬之分而言也鄭氏所謂星土者是也其國在此而星則在彼彼此各不相配而其爲象未嘗不相屬非地之在北者其分野在天亦居北地之在南者其分野在天者亦居南也列國之在天下彼此從衡之不齊猶犬牙然而欲以其地之不齊者求合乎在天之分野之整然者彼此之不相配無足怪者甚者至以天之北極爲夭之首其體及背故有吳北魯東之差其惑甚矣易不云乎在天成象在地成形水火木金土其形在地者也而天有其五星焉所謂象者豈惟五星哉凡物莫不皆然矣故夫齊吳燕宋韓楚周秦魏趙諸國之地地之形也而其星在天象之謂也地有是形則天有是星天有是星則有是名曰齊吳燕宋韓楚周秦魏趙列國者非後世有是名而舉以爲分野之名也何以知其然也徴諸東海南海九河河間河中巴蜀中山有以知之也東海南海九河河間河中巴蜀中山在天皆爲列星而東海南海九河河間河中非國中山巴蜀非若諸國之顯也故曰地有是形則天有是星而分野者指列星所屬而言也或曰若然則十二次之說將無所徴歟曰十有二次所以驗天運之度數日躔之次舎此蓋古法而曆家之所取證者也因其度數次舎之所在而妖祥見焉則其所屬之地從亦可徴矣抑分野之說豈專係於是哉皇明文衡卷之九
