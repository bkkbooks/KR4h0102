  text: 皇明文衡卷之八十
  hash: sha256:ef75047179c8d630c42ecb7aeb5fc9c276c6c8f521a9d2963b191966e07319c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_080-1a}
body:
  text: 墓碑東丘郡侯花公墓碑宋濂皇上渡江之六年庚子夏閏五月癸酉偽漢王陳友諒以舟師入寇圍太平行樞密院判官花公率麾下三千餘人結陳迎戰三日賊不得入乙亥城中乏食公士馬憊城陷賊縛公急公怒奮身大呼縛盡解起奪守者刀殺五六人罵曰虜非吾主敵也曷不趣降賊怒碎公首縛于舟檣衆射之公至死罵賊不少變巳而賊犯龍江上命諸將力戰賊敗去後五年甲辰上即吳王位追封公東丘郡侯又十六年其子僉水軍左衛指揮司事煒泣曰先公沒今二十年無文銘于神道竊恐忠烈不白於後世敢請惟公勳業始卒宜載國史余嘗待罪太史氏不敢以耄辭公諱雲姓花氏世為懷遠人自考以上莫知遷徙世涎公少孤隨母嫁張氏貌偉而黑驍勇絶人儕輩畏服之歲癸已仗劍謁上于臨濠上奇其材力俾將兵略地所至輒克破懷遠城虜其帥以歸進攻全椒拔之郡寇據􅓎家寨公夜襲之寇散走上將取滁州單騎前行遇賊數千人於道拔劍躍馬衝其陳而過賊驚曰此黑將軍勇甚不可與爭鋒兵既至遂克滁甲午從上取和州得卒三百以功授管勾明年乙未率所部先渡江上克太平以公忠勇可信任命宿衛左右丙申上破集慶公得兵千人升總管徇鎮江丹陽丹徙金壇諸縣皆下之過馬馱沙劇盜數百遮道索戰公且行且鬪三日夜皆擒殺之授前部先鋒攻常州拔其城駐守牛唐營夏六月立行樞密院於太平遂拜公院判階安遠大將軍丁酉春正月克常熟州獲卒萬餘命公將之秋七月以兵三千之寧國陷山澤中者八日羣盜蟠結梗道公操矛鼓譟出入營壘間斬首千百計而身不中一矢還命守太平後四年遂遇害時年三十有九夫人郜氏公與偽漢戰時一子方三歲夫人以牲酒祭家廟會家人泣曰今城且破吾夫忠義人必以身死之吾夫死吾必不獨生然不可使花氏無後嬰兒在若等善撫育之聞公就擒夫人赴水死年甫三十有五侍兒孫氏瘞夫人尸遂抱兒以行偽漢軍虜之至九江軍中惡養小兒孫氏以兒授漁家屬之曰此兒良宜善視之是年冬王師伐偽漢漢敗孫氏至漁家視兒在瞷漁人出竊負以走夜宿陶穴中天曙脫簪僦舟渡江遇漢潰軍奪舟棄江中孫氏抱兒遇斷木浮至附之入葦洲採蓮實哺兒七日不死夜半聞人語聲呼之逢老父號雷老告之故與其偕行明年辛丑二月達上所孫氏泣抱兒拜上上亦泣置兒于膝曰此將種也賜雷老衣遣之詔復其徭已而令人追之忽不見兒八歲侍皇太子就學年十三授虎賁右衛副千戶後七年拜今官即煒也煒於洪武丁已偕孫氏至太平奉夫人骸骨歸乃束草像公以二月已未合葬上元縣南五十里之水橋嗚呼觀公之死賊與妻妾之報公可以知公之為人矣天不殄其後豈不宜哉銘曰雲雷遘屯宇區分篤生真人鎮乾坤騎龍鞭霆下天門前翼後衛滃若雲誰其最雄花將軍力驅智駕敵萬人蹂礫羣盜猶麚麏大刀長戟屬􅐤鞬左麾右刺流電奔緋衣緇辨貔虎屯駐馬飲江江水渾吳越之域殺氣昏手挽天河洗妖氛軍聲隆然若雷震遭者膽落兩足蹲元戎開府大江濆腰佩兵符威令尊控制上遊為國藩偽漢恃力不圖存建旗揚帆事征鼖艨艟蔽江躡鉤援捶牛享士士氣伸馳馬督戰寧顧身賊熖熾若烈火焚大戰三曰勢愈殷單騎赴之齒齧齦怒髮上衝氣如煙叶汝賊凶頑犬與豚願醢汝肉一口吞賊慙耳塞不忍聞至死不屈酬國恩飄然乘雲叩帝閽請為厲鬼扼賊元賊當殛死洗厥冤天子下詔褒忠勳東丘建侯賁九原孤兒保育寵便蕃不墜宗祀天所敦生為烈士死明神神靈在天光焞焞嗟爾來觀萬子孫繼忠思孝愼勿諼弗信請考太史文故翰林侍講學士中順大夫知制誥同修國史危公新墓碑銘宋濂嗚呼翰林侍講學士中順大夫知制誥同修國史危公享年七十以洪武五年春正月二十三日卒于和州含山縣之寓舍其年二月十五日權厝於含山某年月日始還葬金溪白馬鄉高橋之原其子偃於蹇反深懼公之功行世系不昭白于天下晝夜兢愓自為狀二萬言來謁新墓之銘濂守官無暇久未克論撰春正月蒙恩致政東歸私念公相知特探在前朝時欲引薦入史館及今待罪禁林實與公為同僚相得甚歡於是評隲羣行而勒文于碑其文曰公諱素字大傑姓危氏危本姬姓周武王庶子某生而手中有文曰函因賜姓危氏封於新其後居光州晉永嘉中建州刺史京遷建昌之南城唐黃巢之亂全諷與其弟仔倡赤手起兵擒巢黨柳彥章千象牙潭擢撫州刺史纍官金紫光祿大夫檢校太傅封南庭郡王南庭之後復遷撫之金溪白馬鄉譜圗亡竟逸其名南庭十五世孫宋景某年進士通直郎知臨安府仁和縣事元纍贈中奉大夫江浙等處行中書省參知政事護軍追封汝南郡公炎震公之曽大父也纍贈􅓵善大夫河南等處行中書省左丞上護軍追封臨川郡公龍友公之大父也纍贈榮祿大夫江西等處行中書省平章政事柱國追封豫國公永吉公之父也曽祖妣王氏彭氏妣劉氏皆封郡夫人郡之名如其夫母劉氏黃氏並封豫國夫人公自至正元年用大臣交薦入經筵為檢討公年巳四十一矣五年改承事郎國子助教七年除應奉翰林文字同知制誥兼國史院編修官未上轉宣文閣授經郎兼經筵譯文官階文林郎明年復入翰林為應奉十一年遷儒林郎太常博士十三年轉奉訓大夫國子監丞擢兵部員外郎十五年升奉議大夫禮部郎中拜朝散大夫監察御史遷工部侍郎明年轉朝請大夫大司農丞又明年升中奉大夫大司農少卿復入禮部為尚書十八年參議中書省事兼經筵官次年進通奉大夫御史臺治書侍御史二十年拜通奉大夫中書參知政事同知經筵事提調四方獻言詳定使司後四年階升􅓵政大夫俄除翰林學士承旨榮祿大夫知制誥兼修國史孛羅帖木兒入相出為嶺北等處行中書省左丞明年棄官居房山二十八年閏七月元順帝北奔淮王帖木兒不花監國承制復起為翰林學士承旨上章控辭巳而元亡逮入國朝召至南京洪武二年授以今官三年兼弘文館學士俄有詔出居和州閲再歲而卒公生四歲其大父即使公讀書大父本黃氏子來繼於危知公能亢危氏宗督厲之尤切年十五即通五經大旨據座為人師與同郡葛君將曾君堅黃君哻葛君元哲更相䇿警窮日夜不休復徒步臨川吳文正公澄淸江范文白公梈之門質而正之二公皆折行輩與之為禮吳公至恨相見之晚凡所著書多與公參訂之虞文靖公集孫先生轍名德俱尊其遇之一如吳公由是公之名震動江右間出遊金陵或以其文示南臺中丞張文穆公起巖張公以狀元為顯官少所稱許獨推伏公曰危君為狀元庶幾相當老夫有愧色矣張公入朝遂挾公俱行逹官貴人慕公聲華爭欲出其門下更相論薦唯恐失之公之檢討經筵也一月進講者三講文皆屬公手公嘗敷繹民惟邦本之言以進典領臣惡其峭直難之公曰經筵之職所以格君心反不以民之疾苦告耶縱加罪罪在操觚者業當之卒以進諱順帝大恱詔賜經筵官酒公不飮復賜馬湩一革囊金織文幣人一端皆有副巳而有詔下中書發錢粟千萬賑河南永平民萬口咸曰活我者經筵官也公復移書執政請修宋遼金三史乘傳行宋兩都訪托闕遺書成公之力居多順帝知公學問淵深特命注爾雅較君臣政要公悉心為之不數月而成及進賜金若干公辭曰臣職也何勞而受賜不敢奉詔尋有宫人之賜公復辭曰臣有糟粳之妻在大江之南無所用之亦不受其助教成均也六館生擇所疑羣揖難公公片言折之恱而去分監上京輟䬸錢建監門葺齋舍勒開國以來分教師之名于石尚書王某致政居蔚州搆暖泉書院請額于朝他監官以地無先賢故事不從公聽其立師以訓士子順帝以公善筆札詔書釋氏書公辭曰臣官胄監以教化民彞為職外教之典不宜書無巳遷他官乃可耳遂止其授經宫學也受業生皆貴戚大臣子橫肆不率度公創教條置帳曆日書其勤惰月會而賞罰之皆畏服不敢犯其在太常也請親祀南郊築北郊以斥合祭之非謹諡法嚴祀典以袪謬妄時翰林承旨張公翥為博士禮文有闕者同輔正之人稱為雙璧其為國子監丞也捐束修鋟小學書及夏小正經傳考于梓以惠學者其居兵部也奉詔墾田於雄霸二州相地授略剃除荆棘闢田幾千萬畝使民有道民德之其升禮部也與許文正公衡之孫克學俱贊皇太子受玉册故事皇太子謁廟用牲醴百官以朝服賀於東宮公謂克學曰儻有違禮人惟責吾二人盍正之遂徹牲醴而以便服賀其擢御史也知無不言御史觀音保等四人以諌死英宗朝公請録其後官之四川行省平章政事囊加歹天曆𥘉舉兵欲翊戴明宗燕帖禾兒伯顔等搆殺之公力為雪其冤容城氏魏敬益買田千畝後見鬻田者二十家不能自生以田劵還之公請旌其門以敦廉讓其在工部也順帝欲以蒙古書譯釋氏三藏經下部刋行公以無益諌罷之執政居第與燒飯橋近有司希其意欲鑿石易橋公諍止之降香祀嶽瀆故用金十兩為香函吏利金以銅半雜之或造銅函易金公廉其狀皆執論誅之淮南兵亂公奉旨廉問其故會維掦京口歲飢民欲相食公便宜諭守臣發楮幣數萬錠賑之所全活者甚衆上淮西宣慰使余闕捍賊功狀請升其官秩復請立宋徐節孝書院於淮安其官大司農也分京南保定之境幾無曠土時海輸不至軍國多仰焉新城民田氏聽後妻讒殺其子公憤之職既不可治乃為文祭其子民悔愧後妻逃去人搖手相戒不用婦言其長禮部也時亂將亟公憂之每陳得失無隱丞相賀惟一曰君向寡言今又何多也公曰時危恩重情豈能默默吾不敢畏丞相但畏後世史官耳其參議中書也論天下事以擇將帥舉賢才為本請專任甘肅行省平章定住總西方兵勿遣其迎帝師誤軍事用樞密副使普顔不花為中書參政經略江南以也先帖木兒黃常為禮部尚書頒曆安南立兵農宣撫使司以安畿內任賢守令以撫流竄之民順帝欲以公兼兵農宣撫使公以踈遠辭且諫曰今日之事宜卧薪嘗膽以圖中興可也公言雖愈加切時不能盡用舊制銓曹有行止科吏主之日具內外官使十名上中書中書藉以遷擢其後吏怠不為意仕者淹滯有待選十餘年者公責吏日具五名五日一上中書吏樂易集各思奉職而久滯者獲伸高原富民劉強通其子婦婦訴官達刑部吏受賕欲緩其獄以俟赦公以事關倫理趣如法論之其轉侍御史也亂兵殺易州達魯花赤公請假中令以制兵之權會中書左丞成遵而下以贓得罪獨賀丞相斡欒平章與公不與皇太子書澄清忠義清白傳家八字以褒賜之其參知政事也刑部尚書朵列圖兼興和路編管與守將有隙守將誣其欲擅發官囷糧廷議杖踰百免其官公驗無發封狀釋不問都事倪晦與劉哈刺不花同官丞相太不花幕府數以公事忿爭劉怒欲中晦隂結監察御史劉君楚俾擠之會晦至燕都囊故人所寄買馬白金君楚攟其囊得金下晦獄令自伏為贓狀上中書公疑亟為白出之馬德守德州俘所獲南軍千戶楊甲至都將斬之公召問狀乃淮安世襲千戶戰敗陷濟南羣盜中陳柔俾詣德軍饋物德械送之非賊也公白宰相釋之楊感泣曰參政生我枯骨中惠大無以報然參政長者為公法釋我我不敢私謝期以忠義報可也卒與逆臣孛羅帖木兒戰死之太醫院經歷徐某藏盜贓盜敗徐就鞫案巳具要官庇徐屬之從末減使三返公竟不許嶺北行省參政董復初素有廉名同省臣飛書言其在稱海宣慰司時取官中米千石公疑其事遣使核覆之果得其誣孛羅帖木兒擴廓帖木兒俱以平章總兵河南漸生釁端公謂御史大夫普化曰養虎者欲其不相搏噬則别其牢今欲二人無鬪莫若加其職而分地處之用孛羅帖木兒為丞相治四川以擴廓帖木兒為丞相治河南各責其成功可也大夫曷不為上言之普化如公言順帝及皇太子咸以為然會丞相搠巴監喪妻不出事中寢初江南經略使普顔不花李國鳳請封徽國朱文公為齊國以龜山楊公豫章羅公延平李公西山真公九峯蔡公從祀於孔子廟庭公為御史時亦請封諡劉蕡事上中書皆寢不報至是公皆舉行復為文以少牢躬祭蕡墓禮部員外郎薑碩使偽漢陳友諒不屈而死公為奏官其子京畿歉國用不足公奉旨以錢幣誥勑募民入粟公以義諭民聞者感動荷負來輸者填道至有不願給直者上都宫殿火順帝敕重建大安睿思二閣公上書諌曰苟以二閣為祖宗所建四海九州獨非祖宗故物乎會皇太子大臣亦以為言遂罷其役其以左丞居嶺北也和寧為太祖肇基之地而無圖志可徵公請於朝作和寧志先是夏侯尚玄嘗伏闕上疏言郯王某之冤公高其義補其子宣使時野速達兒為省平章挾私憾殺右丞答里麻巴公曰是尚可以仕邪不去禍且及即上章辨答里麻巴無罪辭官去居房山卧不起將相重臣皆以書請不聽丞相失列門來問計公曰撫軍院誤國至斯不可救矣亟請河南王擴廓帖木兒總兵以衛畿甸而固守之當時事勢巳不可為及再入翰林僅一日而大兵入燕公曰國家遇我至矣國亡吾敢不死趨所居報恩寺俯身入井將就沉溺寺僧大梓與番陽徐彥禮力挽起之且謂曰公母死公不祿食四年矣非居任比且國史非公莫知公死是死國之史也已而兵入府藏垂及史册公言於鎮撫吳勉輦而出之由是纍朝實録無遺闕者公之力也其入國朝也皇上嘗訪以元興亡之故甚見禮重俾之侍講禁林宋穆陵顱骨為楊輦真珈所發後入宣政院西畨僧相傳授為祭器公言于上索取瘞之聚寶山時公春秋已高雅志亦不復仕矣公厚重深中有容寡言笑聞人詆毁如不知與人交有禮雖貴顯恆若貧賤時平生好薦賢先後所引若翰林學士劉君獻待制黃君冔等七十餘人至通顯者甚衆纍持文衡考試多士人服其公樂善好義若有督之者凡事有關於名教可以勵風俗者必為之乃已居官淸愼節儉遇凶歲輒疏食不御酒倉吏進祿米贏七斗時斗可易白金五兩公命歸之官奉勑書徽政院使秃滿逹兒神道碑其從子以白金五十兩為公夀公却之曰國體當爾居中書凡請文來謝者皆不受故人妻子不能衣食者厚賙而生之偃嘗請仕公曰賢才未進吾敢私爾乎公博學善文辭至正中獨以文鳴天下凡朝廷制作皆出自公手四方欲顯白先德者皆造公門尤精於書得片楮雙字者寶祕以為榮有文集五十卷奏議二卷宋史稿五十卷元史稿若干卷藏于家公娶舒氏先三十年卒再娶趙氏先十一日卒俱封楚國夫人子男子二人偃至正二十年進士第纍官承直郎大都路同知薊州事今為安慶府儒學教授斿登仕郎大都儒學提舉亦前十年卒女六人一適同邑曾侁堅之子也餘皆夭孫二人長太平夭涎德童嗚呼天之於人不能以俱全也久矣或授之才而不假以位或卑以位而不卑以時此奇才偉德之士常困而不施而生民所以鮮蒙其休澤也惟公以淵深之學精純之文嘗都顯要之位海內仰之如祥雲景星亦可謂有得於天矣而逢時亂亡不獲大展以死豈不可哀乎雖然觀其所自著者固足以不朽矣銘曰二氣孕精至文乃生凝為川嶽煥為日星天地之文因象以示象默無言非人莫著往古百代作者孔多迄今有聞其能幾何元興朔方氣淳而龎駿烈宏謨震蕩萬邦積盛而彰實在君子維八十年其績甚偉卓兹危公起大江西奧學醇辭孰能與齊在至正初交薦而升敷繹聖經以牗帝明中原荐飢黎首告病公跽而言民為國命同列畏聞吐舌改容當寧褒嗟曰維汝功往師成均朦瞽有相化其嚚荒趨厥禮讓貝葉之文有詔俾書非職所宜正色控辭或服豸冠或為宗伯或居中臺或參廟畫孰冤弗雪孰善弗褒孰蠧孰莠弗除弗薅白之擢之豫之錫之剔之殛之扶而植之彼何不思多言是訾曰匪其然吾畏後世南風泱泱耆老論亡屹如丘山以鎮四方疆土日蹙孰不震動謂尚有公恃以無恐權姦肆威盜秉國鈞畏公有言出為藩臣政亂無章倚勢相戮公駭而吁吾何可祿微服霄趨房山是居庶士惶惶如涉失桴天兵北征驅雷走霆有耳莫聆燕社已傾公曰國亡吾曷不死公忍不死以存國史大明方隆多士景從有詔任公侍講禁中昔豈不仕弗獲行道時之可為公則既老維古賢士立德樹勳苟有弗施著之斯文公文之純大音玄酒道則在兹爵祿何有孰高為山孰深為淵文之有傳終古昭宣元故翰林待制黃殷士墓碑宋濂皇帝登大寶之明年即詔執政大臣曰元氏有國一百六十三年雖亳社巳屋曆數有歸國可滅史不可滅卿選江南知名之士不仕於元者纂修成書而命翰林學士宋濂為之總裁庶幾得筆削之公以副朕意中書下其事濂等既奉詔執筆唯謹而於黃公殷士之沒置於忠義傳中殷士之高第弟子鄧東復來請曰國史繫天下之公法當嚴墓碑紀一人之私理宜詳懸繂有石願先生為書之按東所造事狀殷士諱哻殷士其字也臨川金溪化原里人未冠謁吳文正公澄於郡庠公方類解小戴禮殷士撰書上公列諸家箋疏得失若分黑白尋往學文於虞文靖公集揭文安公傒斯三公皆江右人見殷士無不器重以遠大期之巳而聞直清先生祝公蕃倡明象山陸氏之學於鄱陽與同舍生王企不遠數百里往候焉一見之頃欣然有契於眉睫之間歸而喜曰哻豈昧其本心者哉自是一動靜一云為惟心是監凛然若上帝之臨久之東遊吳會以發越精神還遁羽陽山中既而嘆曰學者將用世爾奈何自祕耶乃走燕都受知中書參知政事朵尓直班公及丞相賀公惟一賀公當國授淮南等處行中書省照磨遷國子助教升博士特除翰林待制兼國史院編修官階奉訓大夫時權臣秉政天下大勢巳去殷士憂國愛君晝夜不遑寧屢上疏陳大計竟不報殷士方彈指長嘆同列以從宜適變之機為問殷士曰此言何以至於我哉今曰辟朝空宫以淹國恤吾之不能為公存猶公之不能為我亡也盍亦各諗所安乎洪武元年八月庚午都城陷大明兵入城殷士謂其從人張午曰吾為士子義不可辱國汝幸收吾骨南還即解衣投居賢坊井中午蒼黃大慟拾級下救之見殷士浮沉水間氣猶未絶遽負之以升歔欷言曰今南兵不殺在儒臣尤所賔禮他日幸致富貴君何為自苦如是耶縱曰為國盡忠未聞小臣而死社稷也殷士曰齊太史兄弟皆死小官彼何人哉午終不解還舍治酒殽使家人歌舞為歡環守至曰昃會大將軍徐公達下令凡勝國之臣俱輸告身于官朝暮一見各署名于册違則罰殷士聞之紿午曰吾今知汝意矣汝言良是也可取吾告身來第吾慚見同朝人必乘醉可往耳何所可致醇酎乎午大喜持錢出沽闤闠中及還求之弗得亟往視井傍冠裳帶舄列置不紊殷士死巳久矣其壽六十一云午買棺以斂同知漷州事陳介北山僧梓共營葬事以某月某日瘞于西山且刻石記之曾祖某祖某父某皆力本尚農享上夀以終娶里中桂氏隱士兢之女兄也有遠識勸夫遊學毋以家事自纍無子而先沒殷士既貴顯或勸求昏甲族以媒榮進殷士曰邶之共薑宋之伯姬區區一婦人尚以節義白守况男子者乎吾弟幸生男即吾為有後矣性嗜古文而尤長於詩輔作古樂府諸題音度和雅無愧於古四方士大夫多購求藏弆為榮金華黃文獻公溍於人愼許可獨推獎之不置且與之通譜系云嗚呼天地之間有正氣焉日月以之而光昭海嶽以之而流峙在人則為忠為義其人雖沒其氣則千載如生誠古今之常經國家之大防也有如殷士當元運將終誓與國俱亡從容就死而無悔比一時慷慨而殺身者則有間矣非其不昧本心之學能致是乎自古有天下者未嘗不以褒崇忠義為先務皇上即位之初蔽自淵衷即勑有司建元忠臣行臺大夫福夀余忠宣公闕二廟以春秋奉祠事所以風厲於萬方者聖謨至深遠矣州郡或以殷士之事上聞旌寵之典其有不降下者乎銘而列之非為殷士也靈承上意以勸世之為人臣者銘曰烈烈黃公元之小臣乃能為國殺身成仁人所大欲夀為最貴孰能舍之自絶于世壽固可欲義不可虧毫髮有愧雖生曷為吾死死義直氣貫天中不死者何千萬年小夫苟全一愧一死不知百齡其死凡幾有洌者泉其深無底奮身一躍眼不見水精魄入地肯隨物融化為白龍上朝帝宫尓死得死百世冝祀盩綬金章誰非臣子皇明文衡卷之八十
