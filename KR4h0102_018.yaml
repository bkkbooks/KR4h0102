body:
  text: 銘玉兔泉銘并序劉基自古有以勢軋天下箝人口使和已者鮮不由細微以及大此姦人之素能也故髙之馬莾之祥瑞惟其言而莫之違然後大詐行而大欲得矣秦檜之事宋髙宗也以嶽將軍之武之忠且排搆之殺其身以及其子反以為功而宋之君臣莫不從其指則亦何求而不得哉玉兔之泉以淸美為建業城中第一豈昔顯而今堙者檜實知之耶或有善察土脈工穿井之術者密以語檜而神之以白兔耶則皆不可知也夫檜之罔民設詐豈下於髙莾哉白兔之是非無關天下之大事是故賢人君子忽之而莫與較於是乎鄙夫諂子遂探其意而夸之以為佞是蓋不足辨也金華張孟兼憫泉之芳潔為姦人所汚而銘以雪其冤愛物之良心也豫亦悲之為之作後玉兔泉銘銘曰嗚呼泉乎夫何辜為檜所汚世無吳隱之孰昭其誣嗚呼泉乎尼父大聖猶言其主瘠環與癰疽白兔之傳夫何傷於爾歟檜死為蛆泉潔自如我作銘詩衆惑斯祛嗚呼泉乎終古弗渝奎上人耘杖銘奎上人得古藤以為杖而置鋤焉將以兩其用也名之曰耘杖而劉基為之銘曰罾可以取魚而不可以縶鴽帶可以繫𥜗而不可以貫珠孰眇其癯而多乃需既豫老是扶又薉莾之除卑康勿趄以弗迷厥塗杖乎杖乎歲月逝夫子也豫俱器物銘并序王禕古之君子於凡御服之物日用所接者皆著銘焉名其器而因之以自警則進德修業之功無乎弗在矣大學所載湯之盤銘大戴記及金匱隂謀所載武王器械諸銘是也余因竊取古義即凡器物各為之銘非敢貽于博雅之君子蓋庶幾動作之間私致其警焉爾合之得五十首今録二十首冠銘爾形之端故居吾元吾德苟或愆曷居人之先佩銘動中規矩鳴中律呂庶其為豫輔履銘義之趍信之踐毋蹈非毋臨險枕銘體木而圓于以警吾昏體石而方于以安吾常席銘我身之逸兮藉爾以為偃也我心之直兮匪爾之可卷也衾銘舉而施之庇乎一體苟能推之覆幬乎遐邇帳銘起處毋溷乎而褻不可徇乎而隱顯公順乎而獨不可慎乎而一笥銘非義勿納非禮勿發椸銘布帛大素其尚親附也錦繡􅮽􅮽如之何弗拒也鼎銘鉉有金玉享受福矣或折爾足覆公餗矣鏡銘貌之妍醜爾則辨其外心之淑慝爾曷鑒其內櫛銘髮之亂也可以理之政之棼也曷以治之尺銘百分之積乃成乎尺尺而復纍吾不知其止學之為功固如是印銘質金相文玉章德之臧名乃長觚銘以此書文常思明以此書事常思平以此書獄常思生以此書財常思輕琴銘情性之正以防其淫造化之妙以鉤其深嗚呼聖人吾不得而見之矣欲知舜文王周公孔子者微乎斯音曷以得其心匱銘虛其中厥有容維能容久則充榻銘坐如尸敬以持有弗莊者人所非屏銘心不可蔽可蔽者目天不可蔽可蔽者人劍銘水斬蛟鱷陸剸象犀盍少忍之以全物軀理齋銘朱升理者文理之謂也兩間之物象凡其自然生成者莫不各有文理存焉交互者謂之文條逹者謂之理理之緻者莫如玉故理之為字以玉而里聲易曰仰以觀於天文俯以察於地理星之經緯日月道之出入凡在天者莫非交互之文川牝山牡三條兩戒凡在地者莫非條逹之理理緻者莫如玉製字者既從玉以為理之字矣玉之外物理之緻者又莫如木果之栗者故稱玉者曰溫潤而栗然書曰寬而栗記曰溫而理寬也溫也疑若為渾然者故繼之曰栗曰理以足其義知此則知理之字本義矣然則古先民之謂理皆即物而指其條逹者以示人如所謂文理密察足以有别所謂依乎天理批大郤導大窽者非超乎物而言也自吾夫子之贊易也有曰窮理盡性以至於命而後之言性理者宗焉夷考夫子之言而求其旨蓋以為理出於性性原於命聖人作易其蓍數卦爻之用由渾然而疏通之則和順於道德而理於義由粲然者而本原之則窮理盡性以至於命所謂理者未嘗以為在性之前者也程子之言性曰性即理也朱子以性之仁為愛之理義為冝之理禮智為恭別之理夫愛也冝也恭也別也四者因用而後見而其本則出於性譬諸草木其枝柯不一也循而視其理則皆出於其根是故善言性者因其愛冝恭別之用不同而窮其理之本諸中者則泝流而源見其派焉而不混也於是因其用之愛而窮其理之本乎性者則謂仁因其用之冝而窮其理之本乎性者則謂之義是仁義禮智也者因愛冝恭別之理而立名者也以朱子愛冝恭別之理之訓而讀程子性則理也之言則庶乎其可通矣理云理云渾淪渙漫之云乎哉吾宗有仲兄者淮海之英也名珍而字理且以理名其齋是得字義之本非常情常辭也謹述字義為之齋銘以為理也者不在於字亦不在於齋而在於心也銘曰元化默運流行不巳物象肖之渾然之中有文有理理者條逹亘乎終始有疏有密有曲有直而無交叕物理惟玉其緻無比理之為字所以從玉諧聲以里窮理盡性説卦有言以理言性有條不紊惟程朱子萬物之理皆備於已彌綸參贊民生日用咸有統紀原始要終明彼取此應事接物行其所知舉而措耳倚歟吾宗天資玉美既珍其名理以為字齋顔亦爾人見吾宗溫然佳士服其夷曠挹其和萃仰其儀軌未必知其學優其仕事至物來徹上徹下條理如是我作銘詩其直如矢稽首齋名洗心聖言秋月寒水菜薖六器銘唐肅余子治圃越城南屋其中曰菜薖矩軒先生既銘之唐肅復銘其器六以余子之治圃也其藝菜也必以鉏銘其鋤曰墾而植本斯立培而垕蘖斯茂衡深淺毋爾茍既蓻矣其灌之也必以甕銘其甕曰泉之容伊德之充泉之吐伊澤之溥其繘勿贏其挈勿隳勿事乎桔槹之機既灌矣而􅋄害焉薅之必以刃銘其刃曰惡草之滋資女以剪夷弗剪而夷則茅塞其蹊草去矣菜豐矣采之必以筐銘其筐曰掇其美毋以下體斂其實勿滿而溢虛而受之乃其德左之右之慎爾執采而得之芼之必以釡薦之必以盤銘其釡曰溉千斯享于斯我有旨畜甘如飴彼鼎食者殆而銘其盤曰脂弗我汚兮羶弗我慕兮惟味道之助兮銘已余子曰噫子善銘吾器切於物奧於理其足為吾警乎請書之菜薖以繼矩軒之作於是乎書羅經銘王景羅經指南車之胤也其法以磁針定其子午子午正而二十四位皆正噫化機若是之可握以為之銘曰混而茫規洪厖奠玄黃天昆侖廓八握孰用宣我無為司南離學坤維役萬靈幹曜星為民正大化元聖治原翼蟬聮忒其恆馮翼懵杳冥冥法其施亂是釐靜應之唯其然握坤乾於萬年世直堂銘有序楊榮翰林侍讀文江周功敘名其所居之堂曰世直蓋以其六世伯祖伯寬仕宋直寶謨閣憤賈似道誤國嘗疏斥其姦會大父鰲溪山長以立元至正中修三史上書請以宋為正統而附載遼金父職方貟外岐鳯國朝永樂中為漢府紀善王有異謀作寶賢堂針以諌三君子者皆言人所不敢言終不少沮非直道之至其能然乎矧功敘以名堂其善於繼述又未可量矣為之銘曰天有直氣在人能全人有直節貴世其傳周之世直寶謨諤諤繼以鰲溪職方有作歷宋及元至我皇明徑辭正色蟬聮厥聲莫熾相姦臣強主弱炎籙既微孰攻其惡莫紊帝統夷先華書戎勢方昌自尊其徒莫僣王謀窺覬儲位梁園納邪曷輔以義壯哉朱雲乞斬安昌麟經貶楚董相格王直道不容官奚不黜其黜復揚皇鑑如日文江之滸有堂潭潭喬木如雲鬱與天參我銘先猷以迪乃後永執厥心奕世有耀石磬銘并序胡儼余在雲間友人王以東遺余石磬色􅉳而質堅形制曲折皆出自然非人力所為左長於右右不及左者寸餘云其父嘗得之泗州合磬山中叩之其聲泠然以管石聲律中姑洗角每清夜鼓琴之餘時以小角椎戞擊音韻淸遠儼若神明之臨燕休之際其亦存誠之一助也乃為之銘曰泗濵之山孕玄璞曲折自然匪礱琢審音諧律姑洗角聖云遠兮襄不作遺音泠泠度寥廓忠孝堂銘王直國家之興必有豪傑卓越之才逹乎忠孝之大節者以翼昌運纘世功然後能享髙爵重祿以傳于子孫而延之久遠若太師英國張公其人也公之尊府河間忠武王昔事太宗皇帝于潛邸掌護衛兵其姿度雄爽知略超邁而武勇絶人最為上所親任及靖難兵起上每授以成算戰勝攻取無難者諸將皆敬讓之時公亦提兵從王王嘗語公曰吾受上恩思輔成大業以報殊遇爾當勠力一心庶幾如吾志古人以事君不忠涖官不敬戰陳無勇為非孝爾能盡忠乃所以為孝也公頓首受教奬率所部摧鋒陷陳所向有功未幾王薨太宗皇帝素竒公召而慰勉之俾以其兵自效曰爾毋忘爾父之志公感土之德與先王之教益自奮勵卒成大勳凡上有所命南征北伐無不盡其心竒略偉績載之信史功名富貴無出其右者逮事四聖小心寅畏前後四十年如一日公既受顯爵位師臣王亦􅈾隆命配享太廟此忠孝之報也暨修先朝實録公再為監修今上皇帝緝熙聖學公實知經進事敬恭朝夕從容進退凛乎儒者氣象嘗謂直曰先王以忠孝為訓吾既奉以周旋不敢失墜雖幸而有立然今老矣惟列聖之大德不敢忘於心而亦敢忘先王之舊訓乎因揭以名堂將終勉之且使吾子孫登斯堂者亦思所以繼吾志日夜勉焉盡心於其職庶無負於國而亦不辱其先子宜為我銘直聞之忠孝臣子之大節天理之當然也誠能盡其道則必享福祿之榮而子孫保之昔者召穆公能嗣其祖康公之業有功於周宣王錫之圭瓉秬鬯以祀其先祖又錫之山川土田以傳其子孫詩人歌之至今誦焉公嗣先王勳烈著於國家顯榮褒大實有纍朝之錫命誠無讓於穆公而尤惓惓以忠孝自勉且以勉其後之人國家有億萬年之慶張氏之福亦豈有窮哉乃為之銘曰天生斯民賦厥衷為子必孝為臣忠惟師英公德兼崇卓立宛有前賢成桓桓先王才且雄捧日直上扶桑東奄然馭氣超鴻濛祗率遺訓纘武功披雲卷霧開䀲蒙九霄奮躍攀飛龍宣威蠻貊靡不通明明列聖眷遇隆仁漸義洽恩豐彤紀勳旗常銘鼎鍾王亦顯祀升閟宫周家召虎庶其同孜孜夙夜懷謙沖揭以銘堂圖始終朂爾後嗣躡今蹤事君奉先益致恭國家萬年福無窮鐘銘鐘之作官府以謹朝夕浮屠老子之宫以嚴祀而近世富室多置焉何居豫既作祠堂以祀祖考諸子取嚴奉之意亦請置鐘豫則兼取謹朝夕之義欲以警昏惰故弗拒因推祖考示教子孫之心而為銘曰有鐘在縣聲聞于天祠事則甚虔然惟德是先進修之功夙夜當惓惓若沉酣麯蘖之毒恣肆於袵席之安雖殷殷闐闐而聽之藐然迷天理之途溺人欲之淵昏惰而弗悛既不可謂孝亦豈曰能賢則神將厭之而何福之有焉嗟爾子孫警惕弗愆勉而有以百世之傳公勤堂銘馬愈刑部侍郎楊侯彥謐采褒嘉語名其堂曰公勤蓋欲視警以求乎不負也間以求言故為銘以相之銘曰善事服衆匪公弗得樹勳立業匪勤不克克巳循理公孰與儔無倦匪懈勤孰與侔是以君子務其在已人爵既修天爵自至有偉楊侯公勤名堂副以吾力褒自綸章書成滅私易勉不息積善有慶惠迪乃吉昔聞其語今見斯人駸駸夙夜造何可倫石鐘山銘有序楊守陳彭蠡之口有山名石鐘尚矣後魏酈元以為下臨深潭微風鼓浪水石相搏響若洪鐘也而唐李渤非之謂如其説則瀕流庶峯皆可貫以斯名蓋潭際雙石叩而聆之南聲函胡北音清越是石鍾也而宋蘇軾非之謂石之鏗然有聲者所在皆是何獨此以鐘名蓋山下皆石穴微波入之聲噲吰如鐘鼓中流大石空中多竅與風水吞吐有窽坎鏜鞳之聲嘗親察而得其實故是酈矣而周必大又謂上鐘石髙四尺下鐘石濶餘丈叩之皆響若鍾磬他石則否復是李焉余謂波間衆竅其豐山之自鳴者乎潭際雙石其宋左師之每擊者乎是皆可謂鐘也然瀕流庶峯其下響若鍾者蓋鮮石之髙大而叩之函胡清越如兩鍾石者亦安得所在皆是且山之以物象名者若石鼓文筆之類亦豈必為天下獨然後名哉昉名山者其舟而察諸波間邪果屐而叩諸潭際邪抑若大寧之山嘗有巨石狀如大鏞而今巳為波淪之九鼎火焚之崑玉邪是皆不可知者事不目見耳聞而可臆斷其有無蘇之戒也前四人皆目見耳聞而言猶不能定於一余固不敢臆斷顧區區一山名何損益於天下亦無足深辨者聞之故老我太祖髙皇帝伐偽漢陳友諒時駐師湖口嘗登是山既而大捷友諒殪焉時群敵惟友諒最強難克肆勞六飛躬駕後戡四方皆指授將帥勢為破竹然則湖口之捷實天下之基也方登山時廟算先定聖謨孔神髙陟遠覽之頃固已空七澤而奄八荒矣抑或山靈水伯變草木為甲兵驅龍魚為蹕警以張皇威助聖武邪凡山川獲一賢貴登臨以名於世皆可謂幸是山乃蒙玉趾親臨龍顔寵顧一岑一壑至今猶有輝耀何幸尚焉古之人睹河洛則思禹功往在元季微我髙祖民其殱矣今四海內外百年之間庶職恬逸萬民乂和雖群動庶植猶勝於亂世之蒸黎者皆髙祖戡定輯寧之勞而列聖紹述喣嫗之澤也凡登是山者左顧彭蠡右瞻金陵江漢之心其可巳哉兵部正郎王尚忠嘗讀書于山之佛閣間屬余言故為之銘俾鑱諸崖石用告來者舍其細而懷其大云銘曰楚有巨浸漫五百里曰鄱陽湖蓋古彭蠡陽烏攸居禹貢肇紀其委之窮或扼其衝有山時起㠍嶫穹窿水經載之其名石鐘往在元季有梟橫厲江漢之間雲擾麻沸崇岡震驚汔可小愒天命聖武舟師徂征矛戟百萬飈馳霆鍧烈火西耀煌煌赤城虜衄而逋岠之湖口乃躋兩鍾以望九有鸞旗前登羽衛擁後猿麋群迓魚媵鳥將雲霞增耀木石焜煌天覽電曯已空荆湘玉輅方降捷音沸騰矢激酋殪厥衆角崩或者草木奮為甲兵四方群敵兹虜惟劇一鼓殱之餘何庸力席卷萬邦拯其焚溺永康兆民垂億萬世峻德穹勳惟天其至謂山蓋髙曷足與儷山有巨石舊銘禹功苔蝕蘚剝有光流虹相古勳業亦銘鼎鍾於皇聖明式配神禹宜偕厥銘以耀終古厲我臣民無忘烈祖皇明文衡卷之十八
