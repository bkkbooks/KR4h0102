front:
  text: 皇明文衡卷之三十七
  hash: sha256:76651a43ca360d68417c057c4eaee3166251dd2f5674a429a9e03d31bb27cb5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_037-1a}
body:
  text: 記常熟縣重建城隍廟記吳訥昔在太祖高皇帝恭膺天命作四海神人之主爰念元季綱淪法斁祀典瀆糅不經馴致禍災荐起民墜塗炭乃屢勤睿思建立制度正名定分為萬世成憲若郡邑城隍廟亦其一也𥘉洪武元年戊申詔封天下城隍神在應天府者以帝在開封臨濠太平府和滁二州者以王在凡府州縣者以公以侯以伯時常熟循元制為州得封城隍神曰鑒察司民城隍靈祐侯二年已酉州改為縣三年庚戌詔定嶽鎮海瀆俱依山水本稱城隍神號一體改正仍頒格式蓋造廟宇屏去間雜及泥塑神像於是改題木王曰常熟縣城隍之神知縣田義以舊廟在縣西十步者基地湫隘改造于西隅衮繡坊北即今廟是也四年辛亥特勑郡邑里社各設無祀鬼神壇以城隍神主祭鑒察官吏人民善惡以貽福禍未幾復降儀注新官赴任必先謁廟與神立誓期在隂陽表裏以安下民祝詞儀注出自宸衷聖謨洋洋發明福善禍淫之機以警飭下臣至矣然吾邑建廟垂七十餘載朽蠧剝落日就頽圯今知縣事郭南深懼無以揭虔妥靈躬損俸資以為衆偈僚屬吏民相與協助乃市材僦工經始於正統庚申十月落成于次年二月堂寢門廡宏壯軒豁視昔有加適豫致政歸老耆民時龔鼎等相率謁文垂示永久豫惟明有禮樂幽有鬼神古昔聖帝明王罔不以事神治民為先務城隍之祀經典弗載蓋後人因其保障民生以義而起也逮宋姚鉉編唐文粹始載乾元中李陽氷縉雲城隍祠記然無所謂封爵配位也及元草廬先生吳􅊹記江州城隍廟後殿則曰江右列郡以漢潁隂侯灌嬰配食侯嘗定豫章諸郡而然歟自後繁褻日甚聖明統御窮神知化始遂更正歷歲云久或罔克遵今吾邑得賢令屏除土偶鼎建祠宇將見神罔怨恫物無疵癘邑人之幸豈淺淺哉豫耋眊筆硯久絶兹今弗拒衆請者蓋欲昭揭聖制以示後人俾勿至千違墜也恃曰不愆不忘率由舊章後之作邑君子暨鄉邦友士尚鑒兹哉有恆堂記粵昔永樂𥘉訥祗命訓文臣子弟于禮部部二卿高密儀公以德學輔導景陵于孫宮休沐之暇迎豫至其有恆齋指齋扁曰制自束髮讀書暨登仕版以逮于今兹一惟有恆是式蓋人一心全具天理惟有恆者不二其心故天理流行日用之間凡忠君孝親善兄弟夫婦朋友以及應接事物何莫非是理所推乎今吾年巳耆艾諸兒悉令歸耕惟季子銘留侍兹幸親硯席望以是訓勉之銘字子新少豫僅十歲嗜學罔怠未幾豫以病免歸子新依依不忍為别洪熙更化豫承乏六察子新給事黃門特詔贈公太子少師諡文簡豫與子新胥晤未嘗不以公言為勉也後豫升典留臺子新晉職翰林上在御之五年巳未歲豫以老病詣闕懇求納祿得請致事子新謁豫寓𪠘曰先生榮還有恆之義望筆授之俾得朝夕視惕匪銘一巳之幸亦後人之幸也豫聞語之曰子之先公之言至矣雖然晦庵朱先生又有云恆者常久之意必守貞而後得所常久之道三復斯言則書所謂世篤忠貞詩所謂勿替引之子新與後人所當兢兢加勉者焉夫如是則庶克綿先公之澤而報列聖鴻恩于無窮也子新作而請曰幸書以授於是乎書大喜峯口關城興造記蕭鎡今上即位之明年勑都察院右僉都御史鄒來學方今虜寇未靖守禦莫先於謹關隘其自山海以西至天壽山以東千餘里之地關城屯堡爾其悉疆里之軍務處置聽以便宜公拜手稽首畢因仰而言曰於乎皇上所以委任者至矣我何敢不力以欽承休命先是醜虜入寇自白羊紫荆諸關皆失利時公守喜峯口虜騎往往出沒山谷窺我利便近邉之民為之警優公為親歷邊境相地之險易曰多寡在人而捍禦之廣斥堠謹烽燧虜不敢犯民用以寧及有是命時鎮守則有尚膳監郁公永總兵則有都督僉事宗公勝左右參將則有都指揮僉事胡鏞馬榮公與之謀曰鄉者緩急預備一時權宜耳經久之計當如聖諭衆咸是之議以克合乃經營隱度以繕治之不獨喜峯口而已其他董家羅文諸峪劉家界嶺一片石諸口廣者百餘丈狹者數百尺皆築城以障其缺舊所有者乃增高之為門以便我軍之出入通水道者則制為水關城之外為濠濠之外為墻山之峻者削之為壁溪峪蹊徑凡人迹可通者盡築焉蓋東西千餘里間營壘相望高深堅壯足以經久誠所謂金城湯池固也公又以謂諸關獨喜峯口巨鎮外夷朝貢道所以由乃為城樓以示壯觀樓高四丈深廣稱之名曰鎮遠樓經始於景泰壬申之七月落成於癸酉之四月力取於守禦之卒而兵不知勞材取於山谷之産而民不知費人見其功之成而不知其何以為之也於是其將吏相與告於宗公曰都憲公受上命疆里而公式克協心同力以底於成不有紀𫐠其何以示後宗公曰然乃以書屬翰林編修劉宣請於豫古之為天下者不病乎其有患恆病乎其無備不病乎無其備恆病乎難其人夫事機之來無常也惟禦有其備則雖有一朝之患不足為吾害備不先具使經理有其人則雖遇弊敗之餘猶足成吾功故曰惟在得人而巳北邊當永樂宣德中承平日久無事修治正統以來蓋頽墮極矣聖天子臨御赫然述中興之業乃始汲汲於斯當此時受命而往者肩背相望雖極一時之運然其間苟簡就功者猶或有之獨公毅然以為巳任而凡將佐與同事者皆效力相成故其所建立堅久不墮使國家恃之晏然無復後顧之憂此蓋千萬世永逺之績豈一時之功也哉昔周盛時有獫狁之難朔方之城實命南仲而南仲克修厥職卒收獫狁于夷之效出車之雅藹然詠於當時而傳之至今今公之任則南仲之任也而能盡心如此醜虜之首巳見今日矣使當時大手筆一為紀之豈不與出車之烈並傳邪顧豫之鄙烏足以及此而宗公適以請特為考其始末之槩論著之俾為天下國家者知治之責在於得人而後之任此者當思所以善繼之也賜遊西苑記李賢天順已卯首夏吉日上命中貴人引賢與吏部尚書王翺數人遊西苑明年亦如之又明年亦如之𥘉入苑門即臨太夜池蒲葦盈水際如劍戟叢立芰荷翠潔清目可愛循池東岸北行榆柳森挑草色鋪岸如茵花香襲人行百步許至椒園松檜蒼翠果樹分羅中有圓殿金璧掩映四面豁厰曰崇智南有小池金魚作陳遊戲其中西有小亭臨水芳木匝之曰玩芳又北行至圓城自兩掖洞門而升上有古松三株枝幹槎牙形狀偃蹇如龍奮瓜拿空突兀天表前有花樹數品香氣極清中有圓殿巍然高聳曰承光北望山峯嶙峋崒嵂俯瞰池波蕩漾澄徹而山水之間千姿萬態莫不呈奇獻秀於几窗之前西有長橋跨池下過石橋而北山曰萬歲怪石參差為門三自東西而入有殿倚山左右立石為峯以次對峙四圍皆石贔屭齦齶蘚封蔓絡佳木異草上偃旁綴樛葛薈翳兩掖疊石為嶝崎嶇折轉而上巖洞非一山畔並列三殿中曰仁智左曰介福右曰延和至其頂有殿當中棟宇宏偉簷楹翬飛高插於層霄之上殿內淸虛寒氣逼人雖盛夏亭午暑氣不到殊覺神觀瀟爽與人境隔異曰廣寒左右四亭在各峯之頂曰方壷瀛洲玉虹金露中可跂而息前崖有壁夾道而入壁間四孔以縱觀覽而宮闕峥嶸風景佳麗宛如圖畫下過東橋轉峯而北有殿臨池曰凝和二亭臨水曰擁翠飛香北至艮隅見池之源云是西山玉泉逶迤而來流入宮墻分派入池西至乾隅有殿用草曰太素殿後草亭畫松竹梅於上曰歲寒門左有軒臨水曰遠趣軒前草亭曰會景循池西岸南行有屋數連池水通焉以育禽烏有亭臨水曰映輝又南行數弓許有殿臨池曰迎翠有亭臨水曰澄波東望山峯倒蘸於太液波光之中黛色嵐光可掬可挹煙靄雲濤朝暮萬狀又西南有小山子遠望鬱然日光橫照紫翠重疊至則有殿倚山山下有洞洞上石巖橫列密孔泉出迸流而下曰水簾其淙散激射飛薄濺􅎈最為可玩水聲泠泠然潛入石池龍昻其首口中噴出復潛繞殿前為流觴曲水左右危石盤折為徑山畔有殿翼然至其頂一室正中四靣簾櫳欄檻之外奇峯回互茂樹環擁異花瑶草莫可名狀下轉山前一殿深靜高爽殿前石橋隱若虹起極其精巧左右有沼沼中有臺臺外古木叢高百烏翔集鳴聲上下至於南臺林木隂森過橋而南有殿靣水曰昭和門外有亭臨岸沙鷗水禽如在鏡中遊覽至此而止大官珍饌極其醉飽以歸夫一張一弛文武之道賜遊西苑有弛之意焉然張可久而弛不可多以歲計之弛才一日則又未嘗不致謹也於是乎記臨深軒記豫天順癸未之夏構小軒於後庭之中扁曰臨深蓋取小旻詩中如臨深淵之義客有見者感焉請更之曰子為是軒乃燕息之所身之所安也今以臨深名之則危之也毋乃不可乎豫曰子言雖似然未知名軒之意也且危之者固所以安之也苟無危之之心而欲身之安者鮮矣是以古之聖賢兢兢業業無時而不戒謹恐懼故能免夫敗亡之禍易曰其亡其亡繫于苞桑孔子於繫辭贊之曰危者安其位者也亡者保其存者也又曰危者使平易者使傾豈惟易道為然凡詩書春秋禮樂之道莫不皆然而戒謹危亡之説未嘗為第二義也然則後世之士有志於聖賢之道者其存心行己亦惟如是而巳不然則必至於慢易而傾覆之矣此名軒之意也况豫濫居宥密之地所謂在四而多懼者可不危乎假使處豫亦必如六二之介于石不終日可也豈可狃於安樂耽戀不巳而至於溺哉客乃撫然曰吾之所知者近也若子之言其所知者遠也語曰人無遠慮必有近憂子其庶幾無近憂矣乎斯軒斯名誠不可更於是乎記河南府學四賢堂記劉定之河南府儒學明倫堂在大成殿東都御史王公暹以為堂東而殿西則是師生講習之處尊而聖哲祀享之處卑也乃於殿西隙地復構新堂以夾殿於其中而新堂之所祀者邵康節程明道伊川蓋皆其鄉賢得從祀于先聖者也今年豫以使事至河南獲祗謁焉退而思之司馬文正亦嘗居此而亦得從祀者斯堂之祀不與何也以迹言之若必世家於斯然後為其鄉則惟兩程夫子為然爾康節自共城來今安樂窩其遺墟也文正自涑水來今獨樂圍其故址也迹之暫寓皆如此爾今既巳有康節矣奚可以無文正至論其德則熙寧變法之𥘉廷爭謇諤學士君實御史伯淳相唱和也元豐退居之際養晦著書皇極經世通鑑資治相符契也元祐更化之秋旋乾轉坤光居宰府頥在經筵相表裏也德之頡頏又如此又豈可以祀卲程而遺司馬哉明日豫與太守虞君廷璽教授鍾君旻暨其同僚諸君會别於東關語及之皆􅌚然以為宜無異辭乃定議祀四賢其序先邵次司馬次兩程以齒也余為記且繫以銘曰河洛土中大賢所萃維兹四賢當宋盛際或隱巖穴或起科第或居侍從或正宰揆孰能洞觀三才萬物鞭駕風霆探躡天月曰惟邵子林下豪傑孰能用世功烈峩巍平視韓富仰儕臯夔而又傳道為學者師曰惟司馬廟堂表儀孰能並峙一家弟兄伯若春和季如秋清猶夷猶惠可顔可曾繩繼前哲梯階後英曰惟兩程聖門幹楨同時四賢百世仰希禮殿從祀遍于海涯矧兹鄉里宜有專祠祠以敬賢希以為巳香火堂亭簡編窗几郡侯師生來遊來止際兹聖明其繼高軌句容曹氏祠堂記南京吏部尚書句容曹公昔者以書來告豫曰義於里居構祠堂以奉先世願有以記之豫諾焉而未果既而公捐館其子中書舍人冕歸奉襄事畢來謝上命葬祭之恩見豫伸公前請豫問祠堂之制冕曰在正寢東遵紫陽家禮也楹止於三不為高廣因地勢也􅉳堊丹靑之飭踰於他室重其先也且公官秩之所當為也又曰公之神主既入于祠堂而昭穆之序改題遞遷矣則今所祀者禰之龕也祖之龕也曾之龕也其所躬至與所追榮之官號皆吏部尚書也而冕之不肖尚得列職文苑以其所蒙祿供祀事不下儕於禮所謂無田則薦孟子所謂牲殺器皿衣服不備不敢以祭者嗚呼先父之所以荷受聖恩顯其先而幬蔭其後者於此亦可以見之矣奚可以不見録于君子乎豫曰然世之稱為士大夫者鮮不致美其宫室以為已所居之計而求垂諸子孫於安其父祖之神則或忘夫為之所此其意將謂夫化者為罔知矣是豈得為仁乎將謂夫體魄藏墓封樹崇茂拜掃以時宜在彼爾無事乎此也是豈得為知乎將謂夫吾能顯親掦名務其本矣而祠以祀之特其文爾殆不足為是豈得為禮乎仁者事亡如存追遠如近知者知送形而往迎精而返之依乎胤嗣也禮者無本不立無文不行奚可偏廢哉子之先公舉斯典也三德備矣若夫子之不忘繼述斯亦可謂能子也乃記之遊梁氏園記梁氏園在今京師西南五六里其外有舊城舊城者唐藩鎮遼金别都之城也元遷都稍東於是舊城東半遂入于朝市間全無迹可見而西半猶存號為蕭太后城即梁氏園所在也蕭太后者遼后皆以蕭為姓有子為帝則太后别居宫城繞部屬故其亡也末帝淳之妻猶得獨存稱太后以至其國踰年乃滅也或謂此雖遼金都城而非唐藩鎮城不然也唐時此為范陽藩鎮安史反後改名盧龍而所治幽州薊縣不改今移薊以名州移盧龍以名衛各去此數百里其實唐之盧龍與薊在此也惡得非唐藩鎮舊城乎遼金不因藩鎮以為都而曷因乎稽諸史志遼金又曷嘗創建都城乎其城僅存土爾甓皆為人取去今取猶未巳其土皆真黃土人取之和煤炭以燒亦有即之作墓者以其猶高堅也豫往遊之日去清明節未久插棘挂𥿄近遠在目嗟乎昔之在此地者以臣叛主用夷猾夏自唐中葉迄元季世七百年矣小而鼠拱豕伏大而虎吞龍元孰得窺之哉天旋地轉時移事改而懦夫竪子持畚鍤以斸甓掘土焉就其構樓櫓立麾蓋喑嗚叱吒之故處而葬埋哭泣引紼掩𬒮焉因其頽垣墮墉而增高輔缺以障朔風延夕暉藝羣芳於是吾儕得以息朝署之迹櫖林野之興焉俯仰古今感慨多矣可以自幸夫聖明之不易遭也是日園中牡丹皆半謝蓋京師氣候牡丹開於榖雨後於候為鳴鳩拂其羽戴勝降于桑之間豫往乃立夏𥘉故巳過也同逰者柯學士孟時相約携具皆甚儉園有龍槐共酌其下而歸去時微風埃中道憩一寺正統中太監僧寶所建非數萬金不能成僧寶沒于土木有像在寺歸時風止過太宗潛龍時所建天王寺其規制視前寺僅三之一云重修豫讓橋記倪謙距趙城南幾十里水自東山來橫亘於道古有橋架水上以濟行旅即戰國義士豫讓死所也代久傾圯於水褁足經是者咸病焉知縣事吳橋何君友聞於正統辛酉由進士出宰於斯興踣起廢有為有守歲甲子秋八月嘗出按行至水涘爰仰遺烈惕然懷感乃説駕召諭父老曰若知夫豫讓之所以義乎昔臣事智伯感其國士之遇及智伯為趙襄子所滅壤地三分家無噍類而讓以死報之挾匕首入其宫中塗厠以兾得志於襄子也至𬒳覺獲幸得釋又􅃮身變容吞炭變音違妻拒友必欲成其志去伏於此橋下俟襄子出而圖之復𬒳覺獲竟斬其空衣而死屢仆屢起略不少變雖未得扼其喉揕其胸而一念之加于襄子者固巳盡矣此其義何如也讓既死於此橋其靈爽將不亦依於此橋乎今頽缺斷壞民病于涉無讓猶將舉焉矧有讓之烈乎昔南國愛甘棠不忍伐以召伯生憩於此故也則夫死於此者能不加愛而忍視其廢乎大義耿耿誠足為委質事人之法吾將表其迹以風厲吾民爾謂何如父老咸稽顙曰諾於是首捐俸資裒輿情所樂助計得錢若干緡乃募工甃橋以石中劵水竇土隆旁殺廣二丈長倍之高一丈五尺為祠堂橋西以妥其靈費不在官役罔及民踰月功以成告是年冬君朝會京師過豫家屬記其事豫以君斯舉得三善焉夫追復古迹俾前人之遺烈以彰義之發也俾行旅之濟涉以便惠之及也俾斯民之趨向以勸仁之推也一舉三善其可謂能知為政不有過於鄭僑也歟代之理人者非法令所急不皆加之意君獨急法令所緩若此非賢而有才殆將有不暇也君在壬戌癸亥歲嘗修建中鎮伏羲媧皇三廟又嘗修宣聖廟以暨城墉壇墠罔不完固其規畫率類此務民義敬鬼神君有之矣因併記之以告於後之人楊州府重修養濟院記劉珝皇上踐祚之𥘉百政一新軫念困窮之心尤􅈤􅈤然故明詔之下首及之且令有司無俾乞食於市大哉聖心即古文王懷保小民惠鮮鰥寡之心也臣珝因憶去歲侍講春宫至書之無逸篇言文王於小民則懷保之於鰥寡則惠鮮之遂及時事數十天顔豫恱雖不形諸言實深有契於心臣珝於斯有以知皇上真大有為之君可以登三邁五而漢唐宋英君誼辟不足較也斯人之福何啻萬萬肆其𥘉政郤貢獻減財賦罷諸道鎮守官無非為民而以窮民尤民之微者故特加之意焉皇上愛民之仁若此其任事之臣體皇上之心者固有之矣然有行之而不竟者有視為故常者皆深可惡也至以忠義自許以蒼生為念侃侃焉特立不阿不待啓之而政以行不伺激之而仁以著陜右王君公度一人而巳君昔為給事以誅姦臣功超擢都臺督理漕運大得江淮之心及其既去人心若失慈母及今再起人心若得慈母君何以得此於人人哉亦惟以仁而巳君於可為之事知無不為自淮以南南北數千里吏之墨者黜之事之壅者通之民之離者合之法令大行輶車所至民必焚香望拜天順癸未君巡撫至揚首以養濟院詢于有司仍躬造其所舍宇歲久寖用圯壞且狹隘弗可容衆君設法修復不勞於民輦石陶甓鳩材僦工木斫而不加雕墻圬而不加飾前此屋止十三間今悉撤其舊而更新之凡增若干楹廣儲布帛粟米實其中郡之鰥寡孤獨疲癃殘疾不能自全者皆兼收而並納之復於大門外大書養濟院三字於坊以示來者告成之日歡聲肆徹民用以康道路之間無復餓殍君之功可謂大矣太守武邑王勤恐君之功不傳諸永因訓導孫敏以公來京寓書具始末屬識其事夫古之聖君賢相以天下為心則必均天下以為愛譬之萬物育于覆載不容萌蘖之或傷血氣周流於四體不容一指之或滯况以天下猶一家豈容一民之或失其所哉皇上能體文王發政施仁之心君能體皇上愛民之仁且斯舉也舉於明詔未下之前可謂能分君之憂者矣可謂不待啓之激之而仁政自行者矣夫養濟者仁政也仁政既行則其位聞必逹于上將置諸左右而仁澤𬒳于四海此諸公及蒼生之所望也噫安得今內而任事公卿外而郡邑小臣皆以仁民為心如君者邪此珝區區之望又無窮巳其院興工於天順七年五月𥘉二日訖工於九月十八日作記掦州府重修白塔河記王與維楊郡治東北兩舍許宜陵鎮側有河名白塔蓋古運河支流以南屬于江北逹于淮者也皇明宣德壬子平江伯陳公瑄釃浚舊道建新開大橋潘家皇上能體文王發政施仁之心君能體皇上愛民之仁且斯舉也舉於明詔未下之前可謂能分君之憂者矣可謂不待啓之激之而仁政自行者矣夫養濟者仁政也仁政既行則其位聞必逹于上將置諸左右而仁澤𬒳于四海此諸公及蒼生之所望也噫安得今內而任事公卿外而郡邑小臣皆以仁民為心如君者邪此珝區區之望又無窮巳其院興工於天順七年五月𥘉二日訖工於九月十八日作記掦州府重修白塔河記王與維楊郡治東北兩舍許宜陵鎮側有河名白塔蓋古運河支流以南屬于江北逹于淮者也皇明宣德壬子平江伯陳公瑄釃浚舊道建新開大橋潘家江口四閘以蓄泄水以便江南漕運歷歲滋久中多壅閼舟既不通閘亦隨毀乃者成化癸巳冬巡河郎中郭升以為言下其事於總督漕運都御史李公𥙿以詢於衆得修河事宜以屬郭君而總其成焉郭君於是召集旁近兵民二萬人疏舊河二十里築東西捍水隄四十里建通江大同二閘其大橋新開閘之故存者咸修復之又增建土􅄵三夏月潮漲則由閘冬月水涸則由􅄵又建減水閘五以防泛溢淺鋪五以備疏瀹至於涖事有廳享神有祠保障有巡檢司凡有益於河者無不為之經始於丁酉三月以是年六月畢工通判鮑克寬具事顛末來請作記豫嘗考之吳城𨝍溝昉於左傳渠通江湖載之遷史唐漕江淮撤閘置堰宋至紹聖易堰以閘則漕河之出於掦境者最為切要漕法之講於儒先者最為詳備漕數之給於縣官者最為豐溢大抵建國干西北為不拔之基取村于東南供不資之費由今視昔𥘉無少戾興事勸功有待於人此白塔河之所為濬理於今日也雖然古人嘗謂潤州北距瓜步沙尾紆匯六十里舟多敗溺遂徙漕路由京口埭治伊婁渠以逹揚子歲無覆舟且減運錢數萬今京口埭既淤淺不勝重載則由常州孟瀆河入江遡流而趨伊婁回遠百八十里視六十里既兩倍之而大江風濤之險漂溺之患月所不免又非但歲中見之而巳也斯河既成則江南漕舟出孟瀆者可徑殳斷腰洪入夾江三十里入河又四十里而逹掦境脫不測之淵以即安流忘盜竊之虞而遊樂土蒸徒歡呼無事轉挽篙工舵師枕卧而至其為省費又奚翅數萬而巳也使非李公之經略郭君之籌畫而欲望其力排羣議茂績成纘施加當時敷𬒳後世如此役者庸可得乎李公字咨德西昌人巡撫淮南焯有風烈郭君字騰霄濠梁人治水徐淮之間亦纍著奇效以不繫於兹河也皆略而不書而特書其興利拯患充國惠民之一事俾列之貞石以為後來者勸云皇明文衡卷之三十七
