front:
  text: 皇明文衡卷之五十二
  hash: sha256:8491c96bfc5b25937d4d1e24e86b5241df987cb87fd2fc6f1b4e8eb4f313f388
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_052-1a}
body:
  text: 雜著綱目凡例考異汪克寬或問春秋凡例子朱子曰春秋之有例固矣奈何非夫子之所為也夫子作春秋筆則筆削則削遊夏尚不能措一辭而三傳各立凡例後之言春秋者又各立例殆將數十百家言人人殊學者將安取衷哉子朱子筆削資治通鑑為綱目褒貶去取一凖春秋書法别統系以明大一統之義表歲年以倣首時之體辨名號以正名紀即位改元以正始書尊立崩葬以敘始終書篡弒廢徙以計亂賊書祭祀以著吉禮之得失書行幸田狩以著巡遊之荒怠書恩澤制詔以著命令之美惡書朝會聘問以著賔禮之是非書封拜黜罷以見賞罰之當否書征伐戰攻以志用兵之正偽書人事以寓豫奪書災祥以垂勸戒片言隻字如持權衡以較輕重銖積黍分芒忽靡忒故手筆凡例一卷備列所以筆削之法學者據此以求綱目之旨不須更設注腳而史外傳心之要典瞭然在目如視諸掌與傳者之自立例以言春秋蓋不霄壤趐矣然魯齋王公刋之金華敬所文君刋之宣城而傳之未廣也至元丁丑友人倪仲弘偶得於其友朱平仲遂以示余余喜其有益於後學欲鋟棗俾遠其傳海寧任用和以其子從余遊聞而樂之乃刻諸家孰余因考其同異以附於後並識其所從來之顚末於卷首云歐史十國年譜備證徐一夔五季時十國稱帝改元者七荆楚吳越常行中國年號歐陽公五代史著十國世家年譜於吳越云聞之故老亦嘗稱帝改元而求其事迹不可得獨得其封落星石為寶石山制書稱寶正六年辛卯始信其改元歐史所椐者以此所以不他見者疑其年號止行于國中而不行於外國後並諱之至正中余避亂海寧州之東有姓許者嘗闢臣室得古墓一內有志磚蓋錢氏將許俊墓也俊年十八從軍以驍勇有戰功纍官至節度使都押牙兼御史中丞寶正三年卒葬於此所載年月甚明此又錢氏改元之一證也惜乎歐公未之見爾鏐殄巢殺宏誅昌以有兩浙之地又貢獻中朝不絶若無稱帝改元事當唐明宗即位之初安重誨用事鏐致書重誨涉慢重誨大怒會使臣烏昭遇韓致使鏐還朝玫誣昭遇稱臣舞蹈重誨遂奏削鏐王爵鏐蓋有激而然而鏐卒之歲實為明宗改元長興之壬辰則寶正六年之明年也重誨𬒳殺當長興二年夏而元􅗕自陳復鏐王爵則在重誨既死之後改元􅗕襲位不復改元其事可見巳以余觀之鏐自梁末帝貞明二年加天下兵馬都元帥開府直官屬唐莊宗入洛以厚獻故得賜玉册金印自稱吳越國王更名所居曰宫殿官屬皆稱臣遣使封拜海中諸國君長至如俊者以分言之一陪臣爾亦授前項職名􅌂然行帝者事矣奚待重誨見絶而然歐公去五代未遠故老所云蓋可信也當時十國皆非中國有鏐之稱帝改元與否亦不足較苐録所見以備歐史之一證云爾深衣考朱右上古巢居穴處間衣鳥獸之皮以自蔽軒轅氏作制衣裳以示象公侯等數上下不紊自夫王澤一熄嬴劉迭興古制茫昧曲臺講禮僅存深衣一篇鄭氏箋注既有未當世代沿革襲以成俗無復復古之意矣宋司馬文正公始製深衣為燕居常服士大夫往往效之紹興間太常博士王普著深衣制度追合古人文公朱子修入家禮趙公汝梅又著深衣説明白簡易未免互有得失近世天台牟氏仲裴刋誤慈溪馮氏公亮考證皆有發明右生也晚不獲承諸君子緒論而竊有志焉輒考禮經及先儒諸氏之説求合古制使宜今可服庶幾好古博雅者有所稽而不惑於紛紜之議作深衣考深衣之制以白纎布為之古者用十五升布煆濯灰治升八十縷今人為布無升數當用細密布潔白者度用指尺取各人中指中節以兩尖相距為寸今人用折尺亦倣佛衣二幅屈其中為四幅前後長居身三之一強自領至要王氏謂衣二尺二寸則恐傷太長當掖下則裁至袼外屬於袂衽二幅衽説文曰衣襟注交衽為襟爾雅衣皆為襟通作襟正義云深衣外襟之邊有緣則深衣有衽明矣宜用布一幅交解裁之上尖下闊內連衣為六幅下屬於裳玉藻曰深衣衽當旁王氏謂夾下施襟趙氏謂上六幅皆是也裳十二幅長與身等經曰短毋見膚長毋被土玉藻曰深衣要半下齊倍要宜用布六幅斜裁上廣六寸下廣尺有二寸上屬於衣當要若人體大小又隨宜而廣狹之格之高下可以運肘格音各格衣𬒮當掖之縫也袂之長短反屈之及肘袪與格平袪袂口也舊制尺有二寸今時制宜稍小袂中及齊與身參而圜之齊音咨齊謂𬒮下當縫處經曰袂圜以應規要七尺二寸當裳之上際王氏謂要中三蓋袪尺有二寸圜之為二尺四寸則要七尺三寸夾二寸交而方夾音劫夾交領也玉藻曰深衣夾二寸注曲領也經曰曲夾如規以應方鈎邊續衽邊謂邊縫也衽邊斜幅既無旁屬别裁直布而鈎之續之衽下若今之貼經曰續衽鈎邊正以鈎邊續於衽也後人不察至有無衽之衣或有衽亦加鈎邊則於夾領相妨身服不宜姑正之以俟知者馮氏謂鈎邊乃要間當縫處亦非也緣廣寸半緣純也領與𬒮口齊邊皆緣經曰具父母大父母純以續具父母純以靑孤子純以素今人常居年老宜緣以皂結之瓦切負繩及踝以應直踝胡瓦切謂自領下衣與裳連縫直不如繩今之背縫也下齊如權衡以應凖齊衣下縫也帶黃四寸以白繒夾縫之其長圍要而結於前復通屈四寸為兩細垂其餘為紳玉藻曰天子素帶朱裏終辟諸侯素帶終辟大夫素帶辟垂注終充也辟緣也克辟盡緣之也細兩耳也天子諸侯從要後至紳皆緣之大夫緣其兩耳及紳士惟緣其紳爾餘皆不緣也紳長三尺辟二寸辟音壁辟邊緣也兩旁各廣一寸為二寸約用組三寸組綬屬以絲為之帶廣難紹而易解故用組貫其細而約之冠用緇布緇黑色宜用烏紗而加漆焉上有辟積五向左為吉加武卷於冠後今人屬武於冠前有純如今人加夾於額者簮用象橫貫之幅巾加于冠古冠無巾今人加以巾覆之中用烏紗方幅似今頭巾但直縫其頂而殺其兩端爾屨用白古者屨順裳色夏布屨冬皮屨士冠禮曰玄端黑屨素持白屨則洡衣屨宜用白約繶純用緇絇屨頭飾用絛或用繒屈為之繶牙底相接之縫亦綴以絛以為行戒純屨緣口也或黑屨則飾以靑又著棊屨繫也其色同上糾其余切繶施力切申屠子迪毀曹操廟文唐肅操之不臣於漢天下後丗莫不知也而夷陵獨有廟夷陵之民皆愚邪夷陵自有廟來國不一姓官不一人而未有毀之者凡仕於夷陵者皆愚邪非也夷陵之民不皆愚或知毀而不能毀者力不逮也仕於夷陵者亦不皆愚或可毀而不敢毀者勇不勝私也雖然知毀而不能毀非愚也可毀而不毀者誠愚也申屠公以一介吏獨有事於此視之民則力足以有為視之官則勇足以勝私不流于俗不惑于禍使愚者駭不愚者悅也得非偉歟鳴呼操之鬼逺矣雖毀之不足以誅之然公之為亦非以誅操也欲後丗不臣如操者有所懼也書博雞者事高啓博雞者袁人素無賴不事産業日抱雞呼少年博市中任氣好鬪諸為里俠者皆下之元至正間袁有守多惠政民甚愛之部使者臧新貴將按郡至袁守自負年德易之聞其至笑曰臧氏之子也或以告臧臧怒欲中守法會袁有豪民嘗受守杖知使者意嗛守即誣守納巳賕使者遂逮守脅服奪其官袁人大憤然未有以報也一日博雞者遨于市衆知有為因讓之曰若素名勇徒能藉貧孱者耳彼豪民侍其資誣去賢使君袁人失父母若誠丈夫不能為使君一奮臂邪慱雞者曰諾即入閭左呼子弟素健者得數十人遮豪民於道豪民方華衣乘馬從羣奴而馳慱雞者直前捽下提歐之奴驚各亡去乃褫豪民衣自衣復自䇿其馬麾衆擁豪民馬前反接徇諸市使自呼曰為民誣太守者視此一步一呼不呼則杖其背盡創豪民子聞難鳩宗族僮奴百許人欲要篡以歸慱雞者逆謂曰若欲死而父即前鬪否則闔門善侯吾行市畢即歸若父無恙也豪民子懼遂杖殺其父不敢動稍斂衆以去袁人相聚從觀歡動一城郡録事駭之馳白府府佐快其所為隂縱之不問日暮至豪民第門捽使跪數之曰若為民不自謹冒使君杖汝法也敢用是為怨望又投間衊汚使君使罷汝罪宜死今姑貸汝後不善自改且復妄言我當焚汝廬戕汝家矣豪民氣盡以額叩地謝不敢乃釋之博雞者因告衆曰是足以報使君者未邪衆曰若所為誠快然使君冤未白猶無益也博雞者曰然即連楮為巨幅廣二丈大書一屈字以兩竿夾揭之走訴行御史臺臺臣弗為理乃與其徒日張屈字遊金陵市中臺臣慙追受其牒為復守官而黜臧使者方是時慱雞者以義聞東南高子曰余在史館聞翰林天台陶先生言慱雞者之事觀袁守雖得民然自喜輕上其禍非外至也臧使者枉用三尺以讎一言之憾固賊盩之士哉第為上者不能察使匹夫攘袂羣起以伸其憤識者固知元政紊弛而變興自下之漸矣志夢余與同郡謝玄懿俱在內府教胄子今年正月十一日之夜啓夢與玄懿晨候午門若將趍朝者有揖余二人言曰二君當遷且顧國子祭酒梁公曰諸生盡以屬公余愕曰得無有遠調乎曰不然煩傅開平王爾既寤明日以告玄懿私相與識之越三日既望故事當率諸生入覲方敘立右順門內梁公傳旨下曰勑諸生出受業太學二君俟後命言既引諸生去啓亦隨出明旦將朝中使急召啓二人曰有旨命開平王二子侍學東宫俾爾授之經宜趍入玄懿顧余笑其歎其夢之神也二月二十日之夜玄懿夢與啓同被召至上所上授以一紙若告身者玄懿受而忘拜竊視其文有翰林院三字焉繼授啓啓拜受之明日以告啓亦私相與識之越六日上御奉天門宰執並侍小黃門召啓升上顧中書右丞汪公曰諸儒在學久且皆有文行而令以布衣遊吾門可乎汝亟以翰林之職處之因趣謝時玄懿以事出獨不得拜焉明日遂各授職有差而啓與玄懿皆得編修官云於是益共歎其夢之神也七月十五日之夜玄懿毋夫人林氏夢中使舁二橱授兩家發各有白金在焉其家捧視則化為炭間以告吾婦余與玄懿聞之竊怪其説稍隱不若向二夢之著又不知玄懿所得獨化為炭何也然亦私相與識之至二十八日暮出院還舍有控馬馳召余二人上御闕樓俟焉既見奬諭良久靣拜啓戶部待郎玄懿吏部郎中啓以年少未習理財且不敢驟膺重任辭去玄懿亦辭上即俞允各賜內帑白金命左丞相宜國公給牒放還於鄉既出都門與玄懿家共舟而東其二弟為余言纍重多負賜金已盡費况歸無舊業相共歎咨尤其兄之早辭余因話兹夢以解之乃始悟橱為除炭為歎愈共歎其夢之神也夫自周官六夢之職廢學者莫能通其説前史所載夢之符於事者甚衆余嘗疑其誣焉今是三夢者不由因思而生得於恍惚啽囈之間而可徴灼灼如此知未至若既往無少忒焉其事之偶然者歟將人之禍福將至有司之者或預以相告歟抑精神靈爽有所感通而特兆於是歟何其神也是知凡得喪之數固皆定於冥冥而無能逃焉者矣夫以吾二人一官之遷一命之授與區區之進退猶然而况其大者乎然則士之生也雖當自盡其所宜為外者一委命順於數而無所容心焉可也而世之惑者猶將役其智力騖馳於軋􅐁排狠之摥欣戚膠擾至死而不之察豈非昧哉余欲書此以覺之懼有誚夫誕也乃私識之且貽玄懿聊相與自警焉今年洪武庚戌也皇明文衡卷之五十二
