front:
  text: 皇明文衡卷之八十三
  hash: sha256:cf8c2c2e13b44ab634cf1665f9c9f145281bcfcc9cbc234693ab6154207b6293
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_083-1a}
body:
  text: 墓志故江南等處行省都事追封丹陽縣男孫君墓銘宋濂君諱炎字伯融姓孫氏金陵句容人曾祖某祖文嗣父顯卿皆為儒母洪氏君身長六尺餘面黑如鐵一足偏跛於書少所不通喜雄辨纍纍數千言常窮一座人人莫不畏其口長於歌詩元至正中天台丁君復同郡夏君煜皆以詩名君逰此兩人間日夜相切劘益得其旨趣下筆一掃百𥿄可立盡辭彩爛然驚動江東雅好飲酒常與夏君對飲賦詩各務出奇相勝每得一雋語槌案大呼譁聲撼四鄰所與交皆當時豪傑間出逰四方君既以氣自負常輕視章句儒衆中常自許曰孫炎豈齪齪輩伍邪然卒無容之者竟困而歸歲乙未今上皇帝渡江來金陵開江南等處行中書省聞君名召見與論君陳元運將終勸上延攬智能士以圖大業上甚恱辟為掾每問以事慷慨激烈所謀多合上心上愈嘉重以為可用戊戌從征浙東以勞擢同知池州府事尋改池為華陽府即拜君為知府皆有聲明年十一月召為省都事會處州降擇鎮安之者咸以處在山海間盜賊慿結非君莫可治上亦才君入省月餘遂命為處州總制錢榖兵馬之柄悉委之不取中報且以省符未署者付之聽其自辟任君匹馬入處州時城外七里即賊營老酋黠蠻狼嘷虎踞不奉官府約束君至坐廳事驅城中民跽階下諭以元將亡及上起兵意謂民奉法則生否必為虀粉語甚剴切民皆叩頭流血誓不敢二心退則轉告其鄊民以為孫使君仁且武不比舊官可玩狎君亦下檄屬縣遍諭之由是投兵來降者相繼于門數月皆化為良民君復檡其驍勇者練為兵時時肄習之拔其服衆者為長有冦則率以禽冦事罷散歸為農有所警發馳一符立至軍門無敢或後姦吏巨族素驕橫者斂手吐舌畏之如神不敢出聲語雖在數百里外皆縮氣屏息如臨其家郡民賴以安皆謂得孫使君治郡晚時上欲用人而秀民有才能者見方戰爭勝負未分皆伏匿山谷中不肯出君患之鈎致一二人問有才者為誰今皆安在録其姓名為書遣使者招之而劉君基章君溢尤為處士所推劉君最有名亦豪俠負氣與君類自以仕元耻為他人用使者再往返不起以一寶劍奉君君作詩以為劍當獻之天子我人臣不敢私用封還之為書數千言開陳天命以諭劉君無以答逡巡就見君置酒與飮論古今成敗如傾河決峽略無疑滯劉君乃深歎服曰基始自以為勝公觀公論議如此基何敢望也君既以口舌安反側郡上方征伐無一兵與君壬寅二月苗將賀甲李乙叛襲君而所練卒亦應之君無援𬒳禽幽空室中列卒環守脅君降君紿之曰若生吾吾能成若事賀李知非其本心恐留自遺患遇夜以燖鴈斗酒饋君曰以此與公訣君拔佩刀割鴈舉巵酌酒仰天歎曰嗟乎丈夫乃為鼠輩禽然我死義爾賊死肉臭狗且不爾食卒怒持劍嗔自擬之君飮酒自如食竟叱其解衣君駕曰此紫綺裘乃上賜吾者賊勿解吾當服以死引枕而卧賊俟其腄乃害之時某日也年三十又幾事聞上嗟悼久之是年某月日以其喪歸葬金陵南門外聚寶山之陽後二年贈徴事郎戊申上即帝位念君死事之忠追封丹陽縣男仍命有司復其家君先娶王氏𥘉國兵入金陵不屈死生一子毅繼平氏君事親孝與人交緩急可仗有古烈士風遭時遇變所為可稱道守死不二卒成美名可謂俊傑雖位不大顯生不永年然忠義之士當與天地長存不足為君憾也君所為詩若干卷門人蔣敬編次傳於世銘曰元季政亂盜若􅑣戈矛相劉河漢紅江淮中間飛一龍誰其輔之惟群雄維時孫君起章逢齒牙差差萬劒鋒陛前論事聲震鏞帝一見之為動容俾知大府佐幕中鋤姦剔蠧刖罪功括蒼告降內猶訌詔君持節總兵戎匹馬三矢韔一弓徐行直入如涉空群首禁伏傴且恭大開城門滅遂𤇺口宣檄告悛頑凶敢有弗悛屠其宗銷兵鑄鐵耕以農生民有如魚脫罿拔諸水火哺飱饔莫徭內蝕據崇墉乘其不備襲且攻君氣吞賊兵力窮長蛟在陸制蟻蟲仰天叱月月為東義不負國徇以躬遊魂上天化白虹下壓賊營賊眼朦大軍四來若雷舂析骸解項殱彘豵死事上聞帝哀恫贈官復户頒爵封生氣燁然薄蒼穹生為偉人死則忠位卑夀嗇名譽豐脫令耆艾登侯公死而無聞鬼猶懵取彼棄此孰纎洪史臣焯行鎮幽宫名與天地期無終元封從仕郎江浙等處行中書省左右司都事鄭彥貞甫墓志銘嗚呼大同之世人不獨親其親不獨子其子貨不必藏於已力惡其不出於身自大道既隱情偽日滋此尼父所以有不及見之嘆雖然秉彛天性亘萬古猶一日縱時有汙隆而其道則未嘗泯滅有若浦江鄭氏非一家之三代乎其七葉之長彥貞君非三代之英乎彥貞諱鈜彥貞字也其家自宋南渡𥘉即合食為義門迄今巳歷十世宋元二朝國史皆為立傳家教修明有遺範二卷俾奕世守之彥貞嗣主其政益匑匑畏謹正已以蒞物或行其所未至或輔其所不足家人翕然遵化一堂之上雅雅雍雍動逾千百指愛無不均也情無不一也不知孰為親而孰為疏也視其貨泉則錙銖皆聚於公且曰我惡敢私也察其事功則群趨而競赴又曰此吾分當然也爾何與哉雖甚勞弗懈義浹仁孚和氣充牣四海之廣莫不聞知過其門入其庭者神暢心怡而鄙吝之萌銷沮無餘退而有言僉謂昔之義居如樊楊張李之流誠所不及而益重彥貞君之善繼先志也彥貞自幼沉毅端慤屹然如成人雖朋舊不敢狎視語一近褻輒白眼望之聞人有輕已之言輒自責自厲惟恐如其料及壯主貨財倡家意其易惑百端傾誘之每正色叱之使去倡大詫曰此鐵心石腸人也彥貞事父盡孝父病在枕席其妻卒不敢哭強顔乾笑以奉湯藥竟不使之知後八日父亦卒彥貞哀慟幾絶水漿不入口者三日鬚髮為之盡白及至終喪外舅張必慶憫諸甥煢煢無依力勸其更娶彥貞謝曰鈜見後母肆虐戕賊骨肉者多矣忍令吾兒陷之邪不聽彥貞年未四十君子義之時天下承平衣冠萃于燕都翩然出逰以充其見聞揭文安公傒斯在禁林黃文獻公溍居成均二公以文辭鳴當世皆拆行輩與彥貞交論文談時或至逹旦不休一詩士大夫見彥貞方嚴皆敬憚之或酣酒放歌聞履聲即斂容正坐不敢吐氣自時厥後彥貞仲子泳與從子深同講授脫脫太師家彥貞為書數千言陳時政之弊令進於太師太師多采而行之彥貞尚風義舊與參政忽都魯沙遊其子為武義宰免官留武林貧不能自存彥貞延其家十口來浦江給衣食三十餘年鄰有瞽者跛者彥貞飬之終身每夙興告飢者填門彥貞積餘飯親携簞分餉之至老不厭元季兵起州郡俱繹騷大將數統兵入境服義門名皆戒士卒毋敢犯樞密判官阿魯灰帥軍五萬一夕驟至奪民廬舍以居二十里之內雞犬牛羊盡弊彥貞説之曰明公非太師之偏禆乎太師征高郵尚以無罪去國况明公之士卒恣行不道乎脫有一人言於朝不識明公將何以處之阿魯灰愕然曰業已如此為之奈何彥貞曰為明公計者甚不難浙東據山阻海其民頗柔馴易制明公誠能撫定而綏輯之俾他兵不敢東向執政柄者尚敢以嚏咳相驚乎行且録明公之功矣阿魯灰不覺屈膝曰非公不能聞此言命左右致束帛為謝明日下令啓行一軍肅然曾未幾何國朝大兵取婺州彥貞携家避入諸暨流子里時李曹公文忠統兵來過嘆曰此義門也今世罕見之躬為扃鐍而去事平遣帳前先鋒率民兵二千護其家歸浦江人以為彥貞積善之報云彥貞年七十以甲辰之歲四月十四日終于家其月二十八日葬于諸暨州桐山鄊宣山之原家庭內外不問服之有無咸嗚嗚哭哭則盡哀一縣之中若宗黨若姻連若三農百工若卿士大夫皆素衣冠拜哭哭亦盡哀傍邑之賢者聞之亦竊哀之曰是家實無愧於三代使尼父生於此時未必不樂道之今其七世之長亡矣薰漸之益吾屬將何望乎嗚呼此可以聲音笑貌為之哉彥貞之致是者必有在矣彥貞之先自歙遷睦又自睦來遷其詳見諸譜圖記同居𥘉祖諱綺字宗文宋乾道中賜號沖素處士朝請郎守郎中晏穆為銘其墓父文泰植志不屈人下設施運量大能昌其家文泰乃青田尉德璋子出為伯父德池後德池之父致則處士曽祖也妻張澄有婦德敬夫如賔沒齒無一言相加遺男子五人長漢才優識精雖不大聲色子弟莫不畏之量入為出而其致用恆𥙿如也次即泳通經而有文纍官從仕郎溫州路總管府經歷得封彥貞江浙等處行中書省左右司都事亦階從仕郎次湜東陽丞人謂才如長兄次渶江浙行省宣使次漴庶出也女孫一人歸東陽蔣嘉亨孫男十人楨棫幹樞模格棠木杲柯女八人其二適嘉亨之子昭及其從子明其一嫁同邑張宗餘皆未行曾孫男八人燾爟炎燋熉光熒𦦨濂也不敏與彥貞有連而彥貞子若孫又皆從濂授經其相知實深然而宦遊南京彥貞之殁斂不得慿棺窆不得臨穴將何以釋其悠悠之思唯紀載群行鐫之樂石可以垂聲光於不朽貽矩則於方來是猶可為也於是不敢讓姑徇漢等之請而為之銘銘曰大道之行天下為公風氣敦厖臻于大康異體同心情無不通此謂醇熙三代之英世遷俗殊道德淪喪紾臂借耰秦法之涼肝膈充窒形骸閉藏愾我窹嘆涕泗霑裳彼美鄭君沉毅自強上承奕葉合族共煬內教云飭外政復蘉規重矩疊遹有耿光曷以致茲曰率其常或斂以舒或翕而張有子將將有婦洋洋無間戚疏萃于一堂孰為尊章誰為父兄至和丕冒奚有畛封倘涉其庭煦如春陽浹人肌髓薰為善艮人亦有言此為丗防非君之賢莫襲其芳襲之斯何既明且剛以仁為食以義為漿翳能使昭枯椹再榮百鳥喧啾忽見鳯凰冝覽德輝西東翶翔豈意鎩翮竟歸冥茫載者亡車渡者失航瞻望弗及䀌然感傷仙華卭卭浦汭湯湯𬗟懷德人何日而忘故詩人徐方舟墓銘庚子之夏皇帝遣使者奉書幣起濂於金華山中時則有若靑田劉君基麗水葉君琛龍泉章君溢同赴召遂出雙溪買舟泝桐江而西忽有美丈夫戴黃冠服白鹿皮裘腰綰靑絲繩立於江濱揖劉君而笑且以語侵劉君亟延入舟中葉章二君競耒歡謔各取冠服服之竟欲載上黟川丈夫覺之乃止濂疑之問於劉君曰此何人斯諸公乃愛之深邪劉君曰此睦之桐廬徐舫方丹也濂故聞方舟名亦起而鼓譟為歡共酌酒而別聲迹不相聞者久矣自時厥後葉君出守南昌殁于王事後五年章君為御史中丞以卒又後十年劉君亦官至御史中丞受封伯爵投老于家復以一疾不起又五年濂亦乞骸骨還山白髮垂領頽然成老翁矣今年冬來朝京師忽方舟之子膺持中書舍人史靖可之狀來謁隧道之銘則知方舟之死歷一十二年矣嗟夫人生如寄石火電光真不堪把玩如此良可悲哉濂因語膺以舊事為之悽惻者久之乃序述其事曰方舟故簮纓家自幼有俠氣好馳馬試劒尤善毬踘之戲視拘拘法度士如無物稍長幡然悔曰此豈君子道哉即從師受章句為進士業操觚為文輒爛然成章已而又悔曰是如蠧書蟫出入於故𥿄中何有終期哉人生貴適意盍習古歌詩以吟咏性情庶幾少遂其願耳先是睦多詩人唐有皇甫湜方干徐凝李頻施肩吾宋有高師魯滕元秀世號為睦州詩派方舟悉取而諷詠之鈢肝劌腎期超邁之乃巳積之既久圓熟璀璨明珠走盤而玉色交映也方舟猶以為未足出遊江漢淮浙間與名士相摩功而詩道益昌江浙行省參知政事蘇君天爵聞其賢力欲薦之方舟曰吾詩人爾其可縻以章紱邪竟避去築室江臯日苦吟於雲煙出沒間翛然若與世隔因自號曰滄江散人天大雪獨泛舟釣江中終日戀戀若不忍舍去見者疑其非世間人元季兵亂益韜閉不出易為隱者服人莫知其蹤迹所在有瑶林滄江二集各若干卷唐詩通考若干卷藏于家云方舟平居喜怒不形于色無急步無疾呼罔測涯際性尚風義宛陵羅氏率五百指來避兵方舟衣且食之病者注藥死無所歸則擇地藏之久而弗懈事平具巨舟載其還家至正丙午正月九日方舟以疾卒夀六十八其年某月日葬于某縣靈山之原君子稽其自號題曰詩人滄江徐方舟墓表其志也方舟高祖某宋四川制置使曾祖某某路提舉常平公事祖某始自淳安遷桐廬今為桐廬人父子奇元中順大夫平江路總管府治中致仕妣皇甫氏妻張氏有婦道前二十九年卒子三人長曰行蚤世次曰鼎次即膺以文學受薦授淮安桃源丞女二人適某某孫男九人某某孫女二人未行濂謂君子出處固立志之不同然亦有命焉當劉君之出也銜方舟以隱自高數欲挽起之會有故而止方舟獲終老於山林亦豈偶然之故哉余思方舟其人而不可得俯念疇昔䀌然傷情乃歷序其故而銘之曰有才不施一發乎詩曰星月露草木走飛人事變遷可愕可悲舉無遁情入我範圍咳唾所及皆成珠璣一旦觀化魂無不之非湧體泉定生靈芝昭德之符千載弗虧張府君墓志銘無錫有卓偉倜儻之士曰張君飛卿身長七尺面如頳玉盤雙瞳炯炯照人鬚鬛奮張見者為之改容然氣岸孤騫不同一世側媚士雖當時貴人言不循理必面折不少貸或譏君疾惡太甚君曰天生我口所以出言也當言而反訥惡用口為元之季世偽吳張士誠據姑蘇而無錫相繼陷髠黥盜販之徒首纏絳帕手執戈矛巡門嘯呼民情洶洶恐旦暮有屠戮之慘君曰避冦路絶奈何捉筆大書邵堯夫聽天吟於屛曰上天生我上天死我一聽於天有何不可鄰曲來問計者君不答指以示之君子以為知命吳元年丁未皇明兵破姑蘇太傅徐魏公縳士誠送京師遣豫章侯胡公帥師圍無錫吳將莫天祐時號老虎猶欲聚土孽固守太傅再命使者諭降天祐俱殺之太傅怒傳令胡公曰即不下可屠其城君知事急率二三老父往見天祐楊言曰吾民不見天日十二年張氏巳就縛縱負固自守將誰為况未必能守邪天兵如雷如霆膺之者無不虀粉一城生聚死生定在今夕願熟慮之天祐沉思良久擲帽於地曰誠如君言乃縋南城而下走謁胡公胡公問所以來之故君進曰無錫亦良民安敢自外聲教不幸居割據之中只尺雖近奚翅千里之遠耳目塗塞若罔聞知明公奉揚天威頓兵城下勢若泰山壓卯孰敢不懼今不避萬死特為生民請命惟明公加察焉胡公覩君氣貌非常言辭復慷慨喜曰君誠福人哉城不受兵冝也遂命君還君叩城門呼曰亟開吾事濟矣閽吏啓關而入天祐出降所活數十萬人胡公去民爭聮帛為帳賦詩詞餞之君皆為作行草書鳯舞鸞翔人以為不可及𥘉君贅女氏沈福家沈賢而無子君養其夫婦終身而尤篤孝二親敦愛昆弟田宅悉讓與之弗問君有志事功當路忌其峭直不敢薦其大父居仁尤負氣不羈元至元中江南皆附有官福王府者以賣降授官出入騶從甚都會夜歸居仁適前行隸卒屢呵止之居仁張目叱曰斫頭賊斫頭賊既賣爾主矣尚敢爾邪反足蹴碎紗燈籠官恚甚執送縣令欲斃于獄縣令命吐辭欵驚曰此竒男子也釋之父顯有先人風隱居教授非類不敢近或者謂君之抱負濡染家庭為多君嗜學不倦酷愛孟軻氏飬氣之説反覆為諸子誦之援毫為聲詩須臾成章皆有可觀而未嘗存藁生二子長夀溫潤如玉博學政古文至正末連中鄉貢進士舉入于國朝用薦者應奉翰林文字纍官禮部尚書次所安女一歸輔孫二訥與諶也君諱翼飛卿其字卒于洪武二年四月二十七日夀六十九以某月日葬惠山西南張山之原嗚呼傳有之活千人者其後必封君以剛明正直之才雖不為時用片言之間活數十萬生靈之命隂功在人者甚夥冝其嗣人位司喉舌而秩聮六卿也天之施報豈惟是哉貤封所及澤漏九泉不至於公侯吾未見其止也銘曰君子之學養氣為先氣之浩然其直如弦有若張君剛烈之姿嫉惡如仇白眼望之曷以致斯訓自祖父彼賣降者叱之如鼠干戈繽紛孰不禠魂死生聽之謂有命存十萬雄師自天而墮泰山壓卯城無不破何哉老羆猶欲跳踉大言讋之俾出就降乃縋南城乃謁轅門為民請命如救溺焚片辭之間竭盡始終漫漫殺氣變為春融昔焉嗸嗸懼為白骨今也嘻嘻冠衣有秩活我者誰咸言君功告厥子孫以傳無窮天道可徴君有賢嗣朱衣金魚出入禁禦惠山之陽張山之原有蔚者阡英風肅然太原郡夫人葉氏墓志銘王禕洪武三年正月庚子中書右丞王公溥言于天子曰臣之父晉母葉氏實生臣溥及臣弟漢寶而臣不天父也棄諸孤蚤所恃者母氏以長以教故臣兄弟克有成立而母氏之亡亦已十八年顧臣無似獲事陛下比者推恩褒崇二代假寵於王氏甚厚獨念臣去鄊邑日久儻賜之告得歸展省丘墓以伸私情臣不勝至願於是皇上憫焉有旨豫告所以撫諭之者良至仍勑儀曹具祭物給之公將行以母夫人墓宜有識請銘於史臣王禕禕不敢辭謹按追封太原郡夫人諱某姓葉氏饒之安仁縣人歸同里石港王氏為贈資善大夫中書右丞上護軍追封太原郡公諱晉之配資善大夫中書右丞簿昭勇大將軍崇仁衛指揮使漢寶之母夫人性慈惠治家以勤儉族姻里黨莫不稱其賢至正壬辰干戈俶擾饒信首𬒳兵明年三月右丞公奉夫人避兵於信之貴溪倉卒之際母子遽相失繼而公起兵衛鄉里會皇上徇地江右遂舉其地來附拜中書右丞分鎮建昌蓋自癸巳至丁未凡十五年夫人所在不可知而公思慕之情日夜未嘗置是歲正月忽夢夫人若告以其所在者命卜者筮之其繇辭曰非巖即穴厥得朽骨五月躬率士卒詣貴溪之桃源山即向夫人避兵處也伐林木入山以物色求之不得夜號者三日既乃得其地居人英海能言兵相逼時夫人病不能行即自投井中死矣公乃披榛棘尋得井俄有鼠自井中出跳入懷中旋復入于井汳井索之夫人之遺骸果在焉公哀號益不自勝以是月某日具衣衾棺槨即其地禯葬之夫人乏卒享年六十有七二子即公及漢寶也孫男若干人女若干人嗚呼父母之喪人子之不幸也而右丞公則又遭乎其事之變罔極之德曷從而報之抑人子之圖報其親者固無間於存殁用是公以功業自奮出入將相勤勞王家而貤恩錫命賁及泉壤所謂立身揚名以顯其親者於是乎在是雖遭事之變而能合禮之正仁人君子復奚憾焉銘曰顯允王公乘時奮庸入建相業出成將功載念所恃實有我躬昔丁艱難久銜哀衷孝思之至神明可通乃安體魄兆域以崇以壤以樹若堂斯封天子有命禮貴飭終龍光赫奕賁于幽宫公曰噫哉君命實隆豈我陋微能亢其宗靖思厥繇積慶所鍾春雨在草秋霜在松世世子孫來瞻來同謝節婦墓銘節婦謝氏諱黻金華人也謝氏儒家有女不肯與凡子擇所宜歸得同邑吳履字德基以為壻節婦性剛而質柔巽平居不妄娭笑勤儉以治家而事舅姑奉賔祭舉無違禮履為儒學官宦遊於外其得無後顧之憂者節婦內助之功居多歲已亥大軍下建德勢且東節婦語其夫曰亂將及矣盍為走避計先事弗圖後悔何追察其夫意猶豫不決則恚曰盍不歸我毋家我毋家有深池萬一事不測當有入水死耳義不身受辱也未幾蘭溪破亂兵四出剽掠而履適他往節婦携男女走入金華山中途失其幼男號哭求之弗獲而兵且至自度不可免行至向塢巖險處以幼女投巖下身繼之而死十月七日也死十餘日履以物色求之得其尸叢棘中靣猶如生遂祔葬向嶺先墓之次於是得年三十有九矣生男五人今存者二曰頴稚女二人今存者一曰媛適張惠既葬德基屬其友王褘為之銘王褘曰嗚呼頃歲以來天下大亂彛倫之斁甚矣自學士大夫猶不敢望其盡節而况於女婦乎當是時謝氏乃能秉節以死賢於人逺矣銘其曷有愧辭銘曰人孰不有死死其難乎烈烈節婦處死為安乎豈躬之弗恤將歸全乎貞名懿標圭璧其完乎倫紀用以立不永傳乎勒銘昭之茲鑒觀乎黃菊東墓銘謝肅宋季朱子理學既行于天下而明士猶守楊文元沈正獻二公之説及文潔先生慈溪黃公稽經考史一折衷於朱子著書滿家於是士方翕然向風盡變其所學始知朱子有以繼周程而接孔孟實文潔有以倡之文潔殁其季戅菴先生彥實當宋之亡元之興以家學教授明越間與韓莊節先生明善袁文清公伯長相友善士而授業其門者或明經修行或摛文決科皆卓然有立若餘姚菊東先生其一也先生諱珏字玉合菊東其號姓黃氏世居剡高祖諱某仕宋官至某州别駕徙餘姚之四明鄉而家焉祖諱雷字震卿妣翟氏父諱士儀字正甫妣舒氏先生天資廉靜朴厚八歲始能言言巳中節於時喪母哀毀如成人出就外傳雖大寒大暑雞鳴必起盥靧而誦習至夕則秉燭對卷不知急雪之打窗而飛蚊之咂膚也十二三祖令説所讀春秋謬於經旨祖慨然曰吾欲爾紹儒術乃若斯邪遂身親教之至十五六從戅菴受蔡氏尚書以求二帝三王之心研極根柢既有所得而郡邑巨室爭致先生于師席遂客授者餘四十年中間屢試江浙鄉闈不一售則又嘆曰明經豈專為決科哉况得失命也遂刮絶仕進意然未嘗一日舍書不觀尤喜玩邵子皇極經世書指趣精妙貫徹天人有以自樂嘗曰天人之理微邵子能推帝王之道大蔡氏能解然非朱子訂定而發明之愚亦何能窺見倣佛邪其為學蓋至老而益勤先生有同母兄璧庶毋弟瓊瑤玠庶毋讒先生先生失愛於父而孝友益篤卒無間言父令諸子析㸑先生於家資悉聽諸弟所欲無幾微靳色及父殁囑先生以後事先生治父喪所費皆已出不取于弟人或難之先生曰從先人志耳尋常中語及毋夫人輒涕泣不能食歲時祭祀必極誠敬每自誦曰父子兄弟天屬也其可以死生而二其心乎有冨人兄弟以嫡庶分資産不均弟欲托他事訟兄醲致其罪先生沮之再四弗聽則怒之曰若即訟陷兄死地何面目入祠堂見祖宗乎况若子孫相讐不共戴天禍可測乎必若所為吾絶交矣因感泣而止其兄聞之驚曰微先生我家幾破為置田宅以奉先生先生曰吾言義也不可以圖利終不受其所行類如此先生平居衣服飲食給於學徒晚益空乏且末疾所纒未嘗恣嗟胸中矌然唯誨人以善日益慊慊壻劉景祚居上虞白馬湖上延先生訓其子既至與太原王萬石陳郡謝肅數為文字飲以逍遙乎海雲山月間一不關餘事凡十閲月而先生之女卒哭之哀遂還海濵寓所國朝洪武三年冬十有一月五日夜三鼓疾甚召其子熙命之曰吾歸矣汝善自持其身語畢正衣冠端坐而逝年七十一士大夫哭之曰篤學力行君子亡矣熙奉柩以是月甲子祔葬於上虞建隆先塋兆次遵治命也先生娶同邑宋氏宋忠嘉公諱師禹之五世孫諱某之女有懿範先生生九年卒子男一人即熙能力貧事親女一人某即先卒者孫一曰階在先生卒後生有詩文若干卷其道事理大抵由戅菴以泝慈溪者也又七年熙具行實踵門而泣請於余曰先生親舊惟吾子相知尤深而墓未有銘敢請余惟先生學有師承行為鄊表不及用於世而安貧守道以終其身今其子熙知讀書善治生買田築室以紹先業族姻朋友咸稱其能又能顯揚先德不使無聞則先生為有後而天之報施之者其在斯乎遂銘之曰於學允殖於行允飭茲為老成式孝且友義信是守以表宗鄊帝王治體天人奧理探索孔明厥畜靡施自求所志斯遁而亨最美于石終右弗泐後人之慶皇明文衡卷之八十三
