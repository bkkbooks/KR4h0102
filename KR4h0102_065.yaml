front:
  text: 皇明文衡卷之六十五
  hash: sha256:f5bb073c019657af702f62ba90be4ed28e0dac1cc305c6a4de9935a4dfe82d95
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_065-1a}
body:
  text: 碑漢三老董公碑有序徐十夔豫讀太史公書至三老董公説漢之事作而言曰三老董公其秦漢間有道而隱者乎不然何其言之符機際會而粹然一出於仁義道德也公之説漢高祖也其言曰順德者昌逆德者亡兵出無名事故不成名其為賊敵乃可服又曰仁不以勇義不以力至哉言乎不意文獻斫喪之後兵戈搶攘之日有此人也蓋方是時項羽放弒義帝公以此説高帝討之時高帝左右稱讀書如酈生不及此稱文學如叔孫通不及此稱智術如張良陳平不及此而公獨及之意者公在草野冥思天下之故項強而暴劉弱而仁莫有急於此者以故發憤為高帝陳之不疑也公之始末史闕之即其言想其人必秦漢間有道而隱者惜乎漢用其言而遺其人也爰敘而銘之銘曰秦政不綱義旗四舉紛紛藉藉孰為義主𬗟彼有道鴻飛冥冥不聞其聲矧見其形猗嗟董公時止時作懷寶在躬不迷而覺劉弱項強公有深憂討逆致順公有逺猷一言之出萬鈞不拔仆項興劉此機之發維此董公其執不猗維茲之言允也其時公言既用公迹愈邈推公之藴可興禮樂漢雖公遣公言不隳公言不隳大道之維漢紀信碑有序豫讀大史公書至紀信以身代死之事作而言曰信之忠誠一至是乎且信倔起之徒也當其事漢項羽圍榮陽漢危甚王時欲存有降而巳降則漢事去信遂自為王降羽王因得脫羽燒殺信吾意是時漢事未定如信者不過苟相依乘以叨冨貴而忠誠若此何可得哉漢王既定天下嘗斬丁公以勸忠矣而於信獨無贈典及太史公記載刺客如荆軻聶政為之列傳説客如蘇秦張儀為之列傳刑名如韓非申不害貨殖如卓王孫陶朱猗頓為之列傳至於殺身成仁如紀信者乃獨不為之列傳遂使信之大忠不白於天下後丗而臨危顧身者踵相接也爰敘而銘之銘曰黃金可銷白石可磨將軍之志之死靡他一念之精如霆之發視刃不銛視火不烈榮陽之圍漢纍卯危委八尺軀全一帝基死生之故夫豈易與興亡之決在此一舉捐軀徇國有若斯人𬗟想先烈莫之與倫齊王蠋碑有序豫讀太史公書至齊王蠋不屈之事作而言曰為臣死忠臣人律令也士不與焉蠋嘗諌齊王不從退耕于野未嘗居齊之位食齊之祿則齊之士也一旦燕人破齊走王而七十餘城俱下守城之臣非不多也不逃即降爾未聞一人為齊死者當是時湣王已死蠋猶區區為齊守畫燕人使謂蠋曰燕人高子之義將以子為將封子萬家否且屠邑蠋謝曰忠臣不事二君烈女不更二夫經其頸於樹枝自奮絶脰而死考其事與伯夷相類蓋伯夷孤竹君之子讓國而逃非有位者武王伐紂天下是之伯夷非焉殷既滅矣而猶恥食周粟猶蠋志也伯夷之事幸而見稱於孔子其道光明王蠋不幸不逢孔子太史公僅附於田單傳尾而稱説者鮮爰敘而銘之銘曰猗歟先生國之楨士之特也志弗隨以貞矢金石也衆反顧以生行不惑也執義之兵返仁宅也固然獨行匪矯激也休有烈聲軋亂賊也我揭其英髮上直也商巫咸祠碑張孟兼惟書曰在太戊巫咸乂我王家又曰在祖乙時則有若巫賢巫賢巫咸子也則巫咸父子世為商輔相矣而巫咸尤見諸子百氏書夏邑有山曰巫咸頂志以巫咸隱於是為名頂故有巫咸祠惟遺甓焉而莫知其所始山麓有廟尋廢蓋宋崇寧間邑大旱禱巫咸而雨請于國賜封王號見斷刻云洪武八年冬縣令閻育等即其頂作新祠而以巫賢侑惟巫咸古賢臣也生而為治功在王室殁而為神澤及後世矧能出雲為風雨而民以望歲者望之其可謂虛也矣是宜食享其土不誣乃為作迎享送神詩使敬祀之而亦以記其成焉詩曰巫山兮巉巉神隱兮中巖神去兮千古盍眷兮我土神化兮為雨風雲兮上下吁我民兮匪神何怗山雲兮浮浮神宅兮山之幽神降兮我留於薦兮我羞我享兮以雩匪鐘鼓兮為娛吁願我民兮不渝神享兮何之風雨兮其馳神我兮不違我望兮以思吁樂年歲兮惟神自兹梅長者祠堂碑方希古天地至和之氣時得之而為春日得之而為煦風得之而為薰皆所以長養萬物其化至密而其用至醇其在天德也則為元其在人德也則為仁為至善之德為惇厚之化為無言之教備其理者在唐虞為八元在周為仁人在漢始稱長者其取義以為能長育人材先躬行而尚本質有長盛昌大之道故善治天下者必貴之漢之大臣惟塞侯張歐皆以長者稱因其行而求之若曹懿侯之淸淨寧謐萬石君之父子謙謹不譁丙丞相之居德不伐要皆長者之選長者之為用迂而不曲綏而不滯寬大忠厚得聖人之度人主能用之者其國必興後嗣必蒙其利非若才智之士淺而易窮也彼孑孑然而露其智術任之以事聲威錯出非不可喜然刻薄少恩行法無餘意而慮民無隱情喜之者未終而厭苦之者衆矣若商鞅之於秦王猛之於符氏曾未旋踵而太亂作豈其才智之不足歟長厚之道微而人不懷其德也故天下可以無才能之人不可以無長者不幸而乏才能焉事不過於廢弛不幸而無忠厚之長者其誰恃而不亡乎長者之用粱肉也才智之效藥石也吾以所聞所見推之國有忠厚之治者後必不衰家之久存而不墜者必長者之子孫台之寧海有梅氏考之圖譜昔有韓盛字昌圖者仕晉為章安令擢南昌别駕知晉將亡即是邑而隱焉常誦佛壽既而有靈鳥降其所居之側若諦聽者歲餘始知郡縣以為鳯集上其事宋文帝聞而下詔褒之上表稱謝曰此殆覺陛下之德耳臣何與焉帝咨嗟稱為長者仍命郡縣闢其所居舍為丹丘寺云今八百餘年矣其子孫衆多為邑巨家而寺亦不廢宋淳祐中諸孫之學佛者良阜建重閣像而事之歷年雖久而未有記其事者夫以劉宋立國未數十年而宗社為墟長者之傳今千載而猶未艾此其所為之可稱豈特一言之善哉宋文帝知其為長者而不知長者之為用國之不夀也固宜而長者之澤至於子孫而益著矣天之於善人其所施甚遠矣祠而奉之非特寓夫尊祖之思使聞長者之風者却去浮薄而趨忠厚豈不足為天下之勸乎然則長者雖不獲如塞侯等之有益於當時而其遺澤之所及未始不同也乃為詩以系之詩曰中世取士貴乎才智巧偽如雲非國之利無言而化不為而成長者之功沛然難名漢祀四百將相多有匪任長者其何能久如山之常如地之容不震不騰涵以雨風或乖于時世不能以澤鍾厥家千載祚祉有晉之衰攘於篡臣先生恥之高蹈海濵行修于身閭里咸化靈鳥降祥自天來下璽書旌門惟德是嘉曰匪于躬邦家之華有而弗居天下儀式錫之嘉名江海動色上下百世作者幾君其誰于今尚有子孫列堂森森衣冠奕葉孰能祐之長者之澤為善無位所係則長若惟尊崇卒取危亡有嚴祠官浮屠攸宅歲時蒸嘗子孫千百輔德于天為善惟人載其淳風民俗是敦關王廟碑古之享天下萬世祀者必有盛德大烈被乎人人其或功蓋一時名震一國祀事止於其鄉而不能反乎遠惟漢將關侯雲長用兵荆蜀間國統未復以身死之至今千餘載窮荒遠裔小民稚子皆知尊其名畏其威懷其烈而不忘是孰致然哉蓋天地之妙萬物者神也神之為之者氣也是氣也得其靈奇盛著則為偉人當其生乎時揮霍宇宙蝢挫萬類叱電噫風雄視乎舉世故發為忠義之業巍巍赫赫與日月並明與隂陽同用不幸其施未竟鬱抑以沒其炳朗靈變者不與衆人俱泯則復為明神無所不之固其理也人多謂侯特武夫之勇非有損益於世此非知侯之心者當侯之時勢莫完於曹操力莫強於孫權昭烈敗亡之餘削弱為特甚操欲誘侯為巳用毅然不從權欲為子請婚罵辱其使如狗彘左右昭烈誓復漢室此其忠義之氣固足以服天下豈持一世之雄哉使侯不死與孔明戮力孔明治內侯治其外漢賊可誅孫氏可虜而高祖之天下可復矣然則侯之存豈惟蜀人賴之海內實賴之無成而卒非惟蜀人痛之凡嘗為漢民者皆宜為之悼惜也感之深思之久事其在天之神以致尊慕之心而不廢豈非出於天理民彝之正也哉寧海故有侯廟邑人虔奉如侯尚存咸願紀德刻之牲石俾永世無惑詞曰炎光中滅寰宇分姦雄巨猾胥噉吞穢腥上聞帝為顰大統重卑高皇孫敕令神人下天閽虬髯虎眉面赤璊寶刀白馬提三軍驅斬羣盜如狐豚扼荆取益聲勢振東吳喘恐晲且蹲中原萬里殺氣昏意欲掃蕩無留痕厭世倐忽棄厥勳神靈在天燁若暾奉帝之命施威恩旌善誅惡康黎元孫曹凶虐罪不原羈鬼號呼遭割焚孰若我侯久愈尊海內廟祀莫敢諼春秋薦獻羅庭門酒芳牲碩簫鼓喧侯乘飛龍雲駢軒萬騎扈從持旌幡來如飇馳去星奔惠民以寶不以言嗟哉我民慎潔虔懋德致福無尤愆德涼媚瀆神不䬸至理甚昭千古存侯神行世同乾坤敕建元衛國忠肅公廟碑劉三吾洪武二十二年夏五月皇上御奉天門召翰林學士臣鎦三吾謂曰朕曩命工曹鼎新百神祠于欽天山之陽在元季有南臺大夫福壽效忠以死宜同庿是方今本部尚書秦逵奏庿已告完碑已礱就請文鑱之以壽永久臣三吾職在紀載敢不欽承上命謹按大大諱福夀唐兀民幼倜儻有大志知讀書既長入備環衛積勞授長寧寺少卿纍官至同知樞密院事當元至正辛卯穎川兵起事聞峕其君方淸暑上京廷議欲馹奏以俟命公持不可謂比得請還事將無及矣即親部分將士調往討之然後以聞順帝嘉其處置明年改授宗正府也可札魯忽赤以江淮警急尋除淮南行省平章政事至則濠泗已失公日益圖備禦而上遊兵勢方熾乃嚴程築石頭斷江面且戰且守坐固人心會集慶告急拜公江南行臺御史大夫臺治孤危所仗湖廣平章阿魯輝一軍為聲援而部下皆苗兵翻肆暴掠阿魯輝者旋亦見殺退軍于杏花村髙郵廬和等州相繼失守內乏糧儲外無兵援公料簡民丁壯者為兵富者出粟嬰孤城自守丙申春三月天兵至臺軍屢戰弗利度不能支盡閉諸城門惟開東門通出入未幾城陷官民四潰公獨據胡牀坐鳳凰臺下指麾左右若將有為或勸之遁去厲聲叱曰吾臺端重臣城存則生城破則死尚安往遂死其所郡達魯花赤達尼達思不忍棄去亦死焉皇上素聞公名命軍中物色以死聞嘉歎久之賜棺槥斂葬如禮其朝聞之褒贈金紫光祿大夫江浙行省左丞相上柱國追封衛國公諡忠肅嗚呼公為不負臣節矣竊嘗慨歎自元叔世姦臣擅權其內藩將失律其外天下幅裂日底于亡公河西人也當臺城孤危于不可為之峕厲不可辱之節比天命有歸所志弗遂則慨然捐軀以死曾無難色非胸中有定見者其能然乎視彼平日門閥自高華楚自將坐則議論風生前無古人至此則皆斂裳宵逝忠節無聞其于公賢不肖何如也欽惟皇上得臺城首表大夫之死得安慶復表余闕之死皆俾廟食以厲臣節皇上是心周武王封比干墓之心惟大夫庿故在城南土門岡市閧間非官民揭虔所故今徙是方與諸神聮祠庿庭廡門輪奐一新繚以垣牆樹之杉竹是使公之忠概與欽天山同其嶻嶪公為不徒死矣為人臣者登公之庿拜公之位得不有所觀感而興起乎繫以詩曰侃侃衛公仗厥孤忠守此江東天兵聿臨弔伐是心久旱而霖元有藎臣見道之真如公罕倫桀犬而狺各為其君豈顧堯臣堯仁如天表以墓阡廟以揭虔惟闤闠中往來憧憧感動宸衷欽天山陽厥土燥岡造祠是方聮諸庿庭煥其丹靑公此妥靈享祠山巔與國綿延億萬斯年皇明文衡卷之六十五
