front:
  text: 皇明文衡卷之六十九
  hash: sha256:7ea1e97a0ff2eb78333aac65c70794fff951170356342f464dfebaede47873aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_069-1a}
body:
  text: 神道碑大明追封揚王神道碑銘有序宋濂皇帝恭膺大寶式展孝思既追崇祖宗四代帝號建立太廟復念皇太后之所自出追封升王父為揚王外王母為揚王夫人建祠于太廟之東歲時遣重臣致祭近有來自淮隂者言王墓在盱眙如故上聞之悲喜交集即詔內臣及圜丘署令往祭而修治之置灑掃之户凡三護視塋域且命詞臣撰文以樹諸神道臣濂伏讀御製王之行若曰王姓陳氏世為維楊人不知其諱當宋之季名隸尺籍伍符中從大將張世傑扈從祥興帝駐南海至元巳卯春世傑與元兵戰師大潰士卒多溺死王舟亦為風所破幸脫死達岸與一二同行者纍石文破釜煮遺糧以療飢巳而糧絶計無所出同行者曰我等自分必死聞髑髏山有死馬共烹食之縱死亦得為飽鬼不識可乎王未及行疲極輒晝睡夢一白衣人來謂王曰汝愼勿食馬肉今夜有舟來共載也王以為偶然未之深信俄又夢如初至夜將半夢中髣佛聞櫓聲有衣紫衣者以杖觸王之胯曰舟至矣奈何不起王驚寤身在舟上見舊所事統領官時統領巳降于元將元將畏舟壓凡有來附者擲棄水中統領憐王亟藏之艎板下日取乾餱從板隙投之王掬以食度王之渴乃與王約以足撼板王即張口向隙受漿居數日事泄皆倣徨不自安忽颶風吹舟􅐻旋如轉輪久不能進元將大恐遍求于禜祈者不可得統領知王能巫術遂白而出之王仰天叩齒若指麾鬼神狀風濤頓息元將喜因飮食之至通州賚王數巨魚送之登岸王歸維揚不樂為軍伍避去盱眙津里鎮擇地而居以巫術行王無子生二女長適季氏次即皇太后晚以季氏長子為後年九十九歲而薨遂葬焉今墓是巳臣濂聞之君子之制行能感于人固難而能通于神明為尤難今當患難危急之時神假夢寐挾之以升舟非其精誠上通于天何以致神人之祐至于斯也王之羣行其詳雖若不可知舉此而推之則積德之深厚斷可信矣是宜慶鍾聖女誕育皇上以啓大明億萬年無疆之基于乎盛哉昔者史臣贊堯之德首以親九族為言其效至于黎民于變時雍之盛然九族之中母族居其三皇上以念母之故思王不能忘封以王爵享以祠廟今又樹碑墓道以紀其異行是皆以孝治天下也將見四方嚮風咸知以孝自勉皥皥熙熙以致隆平之治不難矣臣濂既序其事復再拜稽首而獻銘曰皇帝建國克展孝思疏封母族自親而推錫爵維揚地邇帝畿立廟崇祀玄冕衮衣痛念宅兆卜之何墟閭師來告今在盱眙皇情悅豫繼以涕洟即詔禮官汝往葺治母俾蕘豎跳踉以嬉惟我揚王昔隸戎麾獰風蕩海糧絶阻飢天有顯相夢來紫衣挾以登舟神力所持易死為生夀躋期頥積纍深長未究厥施乃育聖女茂衍皇支蘿圖肇開鴻祚峩巍日照月臨風行霆馳自流徂源功赤有歸無德弗酬典禮可稽聿昭化原扶植政基以廣孝治以惇民䲦津里之鎮王靈所依於昭萬年視此銘詩大明勑賜銀靑滎祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公贈翊運推誠宣德靖遠功臣開府儀同三司上柱國太保中書右丞相追封開平王諡忠武神道碑銘有序洪武二年己酉秋七月七日銀靑滎祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公薨于軍中二十三日訃聞皇上為之震悼罷朝在庭之臣莫不灑泣越明日詔中書定議贈翊運推誠宣德靖遠功臣開府儀同三司上柱國太保中書右丞相追封開平王諡曰忠武八月朔日柩車至龍江上往臨奠慟哭而還親為擇地于鍾山草堂之原營建宅兆及棲靈之祠凡百須之具一給于官不以煩其家至冬十月九日始葬復推恩及其三代皆為王爵生榮死哀可謂至矣上猶念其功不置召臣濂于庭而謂之曰朕東撫高麗西抵吐蕃北際沙漠南來交趾占城莫不稽首奉命計其開拓之功以十分而言王蓋居其七八朕今手録戰伐次第以授爾尚為文勒諸豐碑以著王之功于無窮焉臣濂受詔而退謹再拜序而銘諸幽王諱遇春姓常氏濠州懷遠人世為農家賦性剛毅膂力絶人歲壬辰羣雄並起江淮為之鼎沸時王年二十有三為羣盜劉聚所得聚覩王狀貌奇偉拔于行伍而信任之王每出戰必鼓勇爭先聚深喜之王察聚所為終不能有成欲擇所依乙未聞止駐兵和州領衆數十人棄聚來歸居兩月餘請為前部先鋒上曰爾之來者為士卒糧絶故就食耳爾自有主我安得而留之王請之再三至於涕泣上曰爾姑從吾渡江俟克太平委身事吾未晚也夏六月上先抵采石磯元兵陳于磯上而磯下巨舟如織相距僅三丈餘猝難登岸王乘快舸相繼而至上麾之使前王即捨舟挺戈先登衆皆披靡遂拔采石乘勝取太平從上守禦乃始授總管府先鋒冬十月升管軍總管丙申春二月元中丞蠻子海牙復以兵屯采石南北不通上慮將士雖渡江而其父母妻孥尚留淮西勢莫可致命王統兵攻之王至設疑兵以分其勢而以正兵與之合及戰别出奇兵搗敗之悉俘其精鋭自是元兵扼江之勢衰矣尋守溧陽攻建康功為諸將先三月從今大將軍右丞相徐公達克鎮江夏四月授承信校尉領軍先鋒秋九月再攻常州會有軍叛去與偽吳張士誠合徐公被圍于牛塘王與諸將力戰大敗其衆擒士誠梟將張將軍冬十有一月除統軍大元帥丁酉春三月遂克常州遷中翼大元帥夏四月從徐公下寧國秋八月克馬馱沙冬十月取池州戊戌春擢江南行中書省都督馬步水軍大元帥冬十有二月上親取婺州巳亥夏四月轉鎮國上將軍同僉書江南等處行樞密院事守婺城尋命攻衢州降之冬十月升僉院十有二月攻杭州庚子夏五月召還京師從徐公拔安慶趙普勝之水寨時偽漢陳友諒揚言拔安慶王䇿其必攻池州以羸弱守城伏鋭士于九華山明日友諒兵果來攻城伏兵四合俘殺萬餘人六月友諒入太平犯龍灣王共謀擊敗之巳而上整舟師襲友諒留王守京師軍民無敢譁辛丑春三月拜江南行中書省參知政事秋七月從上取安慶破江州回守龍灣冬十有一月張士城出兵寇長興上時駐九江聞報還京師命王往援士誠兵敗俘殺五千餘人壬寅春修安慶城羅友賢搆亂據池州神山寨將與士誠通杭歙震動令王往攻之癸卯春正月擒斬羅友賢餘黨悉平三月張士誠遣兵圍劉福通于安豐王從上擊之將戰王突入其陳三戰三勝敵兵大敗而去俘獲士馬無算遂同徐公圍盧州凡三月城將下適陳友諒攻南昌王解圍而還秋七月從上率諸將往援八月遇友諒于彭蠡湖之康郎山王與之聯舟大戰呼聲動天地無不一當百縱火焚偽平章舟風急火熾十里之間湖水盡赤敵將張定邊素號梟猛奮前迎戰王射之定邊中矢走友諒乃退保鞋山諸將以友諒兵尚強請縱其去王獨不言及我師出湖口皆言江流湍急欲放舟而下上知其情命以舟扼上流王應之諸將乃避流而上舟蔽江面控湖口者旬有五日友諒軍食乏出江求戰王遣火舟火筏禦之敵兵奔潰追北數十里與之酣戰自辰至未不解上所乘舟及王舟皆膠于沙王既脫御舟而巳舟被圍復力戰而脫于是友諒中流矢死士卒十萬皆降未幾其臣立友諒之子理于武昌冬十月王帥師討之四面合圍甲辰春二月理銜壁出降荆湖之地望風皆附升中書平章政事秋七月從徐公取廬州八月遂自將兵平臨江之沙坑麻領十洞牛陂諸寨進取贛州乙巳春正月克之悉定南安南雄韶州夏五月還兵取安陸襄陽冬十月從徐公克泰州丙午春三月復從克高郵夏四月淮安濠泗徐宿安豐皆下秋八月諸將攻浙西師次太湖偽萬戶尹義等逆戰王擒之直趨湖州之毗山與敵兵水陸鏖戰敵兵大潰遂抵城下塞其四門晝夜環攻之偽丞相張士信悉發境中兵為援屯于舊館出我師之背王統竒兵由大全港入結營東阡復出敵背且填壅溝港絶其歸路士誠知事急親出兵拒國王一鼓勝之士誠復遣其將徐義統赤龍船親軍來後王復擊敗于烏鎮冬十月舊館降得兵六萬十有一月朔州亦下遂進圍平江丁未圍之益急士誠收合餘燼猶背城百戰降其將士且盡秋九月始克之縛士誠來獻籍其兵二十有五萬乃加授中書平章軍國重事疏封鄂國進爵上公冬十月復授征虜副將軍同徐公奉命北伐戊申春正月上即皇帝位國號大明改元洪武王與徐公下山東諸郡遂攻汴梁守臣李景昌遁進攻河南敵兵五萬屯于洛水之北將出迎戰王布陳既定單騎執弓矢衝入其隊敵發二十騎攢槊刺王王一箭中其前鋒大呼殺入悉獲其衆而河南諸城先後皆平上幸汴京謀取燕都秋七月徐公與王渡大河河北諸郡又平八月二日燕都不戰而克元君北夰師次大原其守將廓廓帖木兒帥衆來禦其鋒鋭甚王與徐公謀曰我騎兵雖集而步卒未至何以能戰莫若遣精騎夜劫其營其衆可亂衆亂主將可縳也徐公如王言廓廓帖木兒果中傷而遁己酉春正月進攻大同竹貞棄城走河東又平遂西入秦張良弼遁李思齊迎降奉先鳯翔鞏昌臨洮又平夏五月元將也速兵侵通州有旨命王以所部軍東還拒之遂搗永平過惠州獲江文清士馬以千計至大寧也速遁破開平元君又北奔追至北河俘其宗王三人及平章鼎住等凡得軍士萬人車萬兩馬三千牛五萬全師還燕次柳河州得疾而薨享年僅四十爾王之為人守謙而不矜有功而無過運籌決勝之方不學而能其從大將軍東征西伐而能遵守節制及其自將兵則所至無不克捷由其智識明而材力雄故施之各得其宜鳴呼若王者可謂開國之殊動者矣王之曾大父四三府君纍贈銀靑榮祿大夫上柱國中書平章政事追封開平王諡莊簡妣張氏追封開平王夫人大父重五府君纍贈儀同三司上柱國少保中書平章政事追封開平王諡安穆妣陳氏追封開平王夫人又六六府君纍贈開府儀同三司上柱國太保中書右丞相追封開平王諡靖懿妣高氏追封開平王夫人妻定遠藍氏封開平王夫人子男三人曰茂曰升曰森皆上所賜名女三人長許為皇太子妃餘皆幼臣濂聞之昔日唐太宗起義兵而定天下當時有蔚遲恭者棄劉武周仗劔來從其後輔成唐業而恭之功為多于是生有鄂國之封殁有忠武之諡今王之功非恭所可及上之所以遇王者封諡興之雖同而其王爵之加恩數優渥揆之于唐誠又過之史臣所謂君臣相遇千載一時者豈不異世而同符也哉是宜銘諸貞石傳之千萬世一以昭聖天子垂念功臣如此之至一以著王之勳烈于不朽云爾銘曰聖皇開天豪傑四從龍興而雲虎嘯而風義旗所指山嶽震動飈馳霆舂孰不神竦維忠武王其氣至剛仗劔來從飛渡大江無堅不摧無敵不碎席卷長驅易如拾芥平吳定越帖荆撫淮威聲所加小大畢來齊魯既寧汴洛亦定直指幽燕不戰而勝元君遠逝六軍倒戈本根既撥何有條柯乃收晉冀乃淸秦隴乃徇遼海人百其勇茫茫朔漠灤河所經誓將剗滌邊塵弗驚王之忠精上貫天日燁其有光亘古不沒幅員之廣漢唐莫過馬蹄所及王功為多十五年間百戰百捷備殫勤勞光輔帝業翊運之勳靖遠之威在古或罕于今見之大功垂成王忽長逝當寧興哀如失一臂爰加恩寵用錫王封衮衣繡裳照耀泉宫天子曰噫未慊朕志其推爾爵上褒三世死生哀榮孰可比焉王雖云殁生氣凛然鍾山之隂隧道有石詞臣勒銘垂示千億大明勑賜榮祿大夫同知大都督府事兼太子右率府使贈推忠翊運宣力懷遠功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公諡武義康公神道碑銘有序皇帝即位之三載混一華夷聲教所被罔間遐邇梯山航海奉贄獻琛上念熊羆之士不二心之臣東征西伐宣勞有年方將胙土分茅以定功賞而都督康公薨于陜州上聞之嗟悼不巳既勑有司穿土作室以寧體魄復欲昭其功勳于悠久詔翰林學士臣宋濂稽諸簡牘所書文于堅石以垂示于億萬載臣濂謹按公諱茂才字壽卿康其姓也世為蘄州人曾祖文廣皇贈中奉大夫中書參知政事護國追封京兆郡公祖德𢡟皇贈資善大夫中書右丞上護軍追封京兆郡公父壽皇贈滎祿大夫同知大都督府事柱國追封蘄國公母蕭氏追封蘄國夫人公當元之季四方雲擾未幾蘄州陷公結義旅以捍蔽為務授以長官俄遷為鎮府同諸將復九江搗蘄水黃連塞轉蘄州路同知總管府事屯戍和之俗溪太平之采石使者考其功狀升淮西宣慰副使同知元帥府事又升宣慰使都元帥歲乙未六月上帥師渡江將士家屬尚留于臨濠陳人多效死于是數戰不克後數月常忠武王遇春遣逰兵虛撓之公連日發軍以應王度其力疲夜設伏兵質明殱其精鋭殆盡然猶收合潰散堅寨于天寧洲明年二月上命諸將以襄陽大炮破其寨公奔行臺便宜升淮南行省參知政事甫踰月上亦克金陵又奔京口舟師追及之公度天命有歸乃率所部餘兵三千解甲來附免冠頓首言前日之戰各為其主今日屢敗天數也事至于此死生唯命茍得生全尚竭犬馬之方以圖報效上笑而釋之仍許統所部兵從征又明年授泰淮翼水軍元帥守禦龍灣取江隂之馬馱沙八月偽吳張士誠犯我疆境公驅兵逐之獲其樓船人上賜名馬一匹黃金一錠歲戊戌從廖楚公永安攻池州取趙雙刀之樅陽遷都水營田使兼帳前總制親兵左都指揮使明年八月攻皖城偽將率樓船出戰公復獲之又明年六月偽漢陳友諒傾國入寇攻陷我姑孰殺戮我吏民意將窺我南京上召公謂曰爾不疑我乎公復頓首謝上曰汝既不相疑宜作書遣使偽降友諒為內應招之速來汲給告以虛實使分兵三道以弱其勢友諒果如所言既至諸將同公奮輕大破之縳其士卒二萬有幣帛白金之賜歲辛丑八月上怒友諒耒寇率將士親征公領舟師行擊安慶破江州偽都友諒西遁遂下蘄州興國漢陽公沿流而下克黃梅其家寨十一月取江之瑞昌取友諒八陳指揮友諒之勢遂衰遷帳前親兵副都指揮使明年元月復龍興又明年攻左君弼于廬州四月友諒圍龍興上親往援公與諸將皆從友諒聞上至亟解圍還七月大戰于彭蠡湖軍聲嘯呼湖水為之起立浮尸蠢蠢動至數千里友諒遂至敗亡又有幣帛之賜十月上親征武昌公從之歲甲辰二月下之友諒之子理銜壁出降三月進金吾侍衛親軍都護府副都護四月從大將軍徐公逹洊攻廬州七月下之八月拔安豐繼取江陵及湖南諸州加賜幣帛明年二月改神武衛指揮使五月進大都督府副使閏十月士誠兵犯江隂京口上帥大軍水陸並進公在行中及至鎮江士誠兵已遁又明年正月追至巫子門擊敗其衆獲土卒二千公功為多四月搗淮安之馬邏港拔其水寨復獲士卒與艨艟無算淮安平七月遂攻湖州十一月破之進逼姑蘇姑蘇士誠偽都即遣鋭卒來迎鬪大戰尹山橋公持戟督戰益力鋭卒盡覆乃進圍齊門刀劔林立飛鳥不敢下大將軍命諸將合攻之吳元年九月姑蘇平公取無錫州十月升同知大都督府事兼太子右率府使進階榮祿大夫洪武元年上以江南之地既入版圗乃遣大將軍經略中原公從齊魯之地復由黃河取汴梁下洛陽駐師陜州規運饋餉造浮橋以渡大軍鎮河中善撫綏遺民為之立石頌德絳解二州則公所招徠蔽遮潼關秦人不敢東向三年復從大將軍征漢中奉詔還軍中道因疾而薨實八月之三日也年五十有七上下羣臣議贈公推忠翊運宣力懷逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封靳國公諡曰武義卜以九月二十一日葬于應天府上元縣鍾山鄉之幕府山上親臨奠而百司繼之祭幄相望聯絡原野時人以為榮公娶方氏追封靳國夫人繼室田氏封蘄國夫人側室朱氏俞氏子男三人鐸田氏出鑑朱氏出鎮余氏出公通經史大義事太夫人以孝聞輕財仗義意氣磊落而尤有志于事功值元祚將終其才弗克盡施然而真主龍飛于羣雄之中公即能識之卷甲韜戈率衆臣附坦然而不惑可謂上知天命下察人心者矣由是昭𬒳寵眷倚之以心膂用之為爪牙十餘年間屢從征討茂績奇勳著稱當丗存則安冨尊榮加以爵位薨則疏封賜諡賁及九泉令名垂于竹帛重祿延于子孫公其可以不朽矣臣濂謹拜手稽首述辭于碑系之以銘深懼不足以稱上報功之意銘曰于赫大明受命于天如日之升照于八埏其一于時康公江險之恃大軍西來視如平地其二巨炮轟雷物莫敢攖何戰弗潰何守弗傾其三天人攸歸勢何敢抗知幾先來率衆內嚮其四皇帝曰嘻有附匪疏豫開誠心遇爾不疑其五爾礪矛鋋爾部士卒助豫四方以寧萬國其六公拜稽首賜死為生誓殫報效如無餘齡其七孰不為庭率師往討矯如翼如風馳電掃其八東吳西楚蹴陳駕張身經百戰凶豎始亡其九大將北伐同取汴洛出鎮于蒲恤其孤弱十蔽遮河潼以義為關誰敢操戈睥晲其間其十一玄龜負碑以頌遣愛民亦何心恩義斯在其十一從伐漢中迢迢西征有命班師中道而薨其十三帝念將臣血戰之苦將酬其勳錫以茅土其十四孰不夀考以樂承平公胡嬰疾愪魄泉扄其十五帝情憫悼恩命絡繹穿山為堂畢茲窀穸其十六名垂于史祿延于家翩然而逝公復何嗟其十七史臣造文大書深刻以昭公勳有永無極其十八皇明文衡卷之六十九
