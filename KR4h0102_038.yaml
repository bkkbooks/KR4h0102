front:
  text: 皇明文衡卷之三十八
  hash: sha256:ec458698efb0a188162ad9709442a2b781b0df2387eecaa6b3ff34c6684f1fef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_038-1a}
body:
  text: 序大明日曆序宋濂洪武七年歲在甲寅五月朔日新修大明日曆成粤從皇上興臨濠踐天位以至六年癸丑冬十又二月凡戒飭之諄複征伐之次第禮樂之沿革刑政之設施羣臣之功過四夷之朝貢莫不具載合一百卷蔵諸金匱副在秘書甲寅以後則歲再修而續蔵焉嗚呼惟天立辟惟辟奉天其能混合三光五嶽之氣者蓋可數也然挺生於南服而致一統華夷之盛自天開地闢以來惟皇上爲然其功高萬古一也元季繹騷奮起扵民間以圖自全初無黃屋左纛之念繼憫生民塗炭始取土地羣雄之手而安輯之較之扵古如漢高帝其得國之正二也平生用兵百戰百勝未嘗摧衂以至繼天出治經綸大經皆由一心運量文臣武將不過仰受成算而已其獨禀全智三也欽畏天地一動一靜森若神明在上及至郊祀存扵心目有赫其臨甚至不敢仰視惠鮮小民復恐一夫不獲其所貪墨吏及豪黠之徒有加害者必威之以刑其敬天勤民四也后妃居中不預一髪之政外戚亦循理畏法無敢恃寵以病民寺人之徒惟給事掃除之役此皆古昔所深患今絶無之其家法之嚴五也兵戎國之大權悉歸之扵朝廷有事征伐則詔大帥佩將印領之曁旋則上章綬歸士卒單身還第其兵政有統六也嗚呼帝力難名度越前聖不可以一二識也今日曆所書籌畧之運功業之著䂓模之宏遠其本蓋原扵此矣然而史書甚重古稱直筆不溢美不隱惡務合乎天理人心之公無其事而曲書之者固非也有其事而失書者尢非也况英明之主不世出而記注之官遷易不常無以究夫聖德之高深臣同暨濂幸獲日侍燕閒十有餘年知之深故察之精察之精則其書也頗謂得其實而無愧茲因日曆書成謹掲其大要扵首簡使他日脩實錄者有所採掇庻幾傳信扵千萬世也其總裁官翰林學士承旨嘉議大夫知制誥兼脩國史兼吏部尚書臣詹同翰林侍講學士中順大夫知制誥同修國史兼太子賛善大夫臣宋濂催纂官翰林侍講學士嘉議大夫知制誥同脩國史臣樂韶鳯纂脩官禮部員外郎臣呉伯宗翰林編脩臣朱右臣趙壎臣朱廉儒學教授臣徐一䕫臣孫作布衣臣徐尊生其讐校謄冩則臣伯宗臣廉及鄕貢進士臣黃㫤國子生臣陳孟晹開局扵六年九月四日歷二百六十有五日始訖事云臣濂謹序洪武正韻序人之生也則有聲聲出而七音具焉所謂七音者牙舌唇齒喉及舌齒各半是也智者察知之分其淸濁之倫定爲角徴宫商羽以至扵半商半徴而天下之音盡在是矣然則音者其韻書之權輿乎夫單出爲聲成文爲音音則自然恊和不假勉強而後成虞廷之𢋫歌康衢之民謡姑未暇論至如國風雅頌四詩以位言之則上自王公下逮小夫賤隷莫不有作以人言之其所居有南北東西之殊故所發有剽疾重遲之異四方之音萬有不同孔子刪詩皆堪𬒳之絃歌者取其音之恊也音之恊其自然之謂乎不特此也楚漢以來離騷之辭郊祀安世之歌以及扵魏晉諸作曷嘗拘扵一律亦不過恊比其音而已自梁之沈約拘以四聲八病始分爲平上去入號曰類譜大抵多吳音也及唐以詩賦設科益嚴聲律之禁因禮部之掌貢舉易名曰禮部韻畧遂至毫髪弗敢違背雖中經二三大儒且謂承襲之乆不欲變更縱有患其不通者以不出扵朝廷學者亦未能盡信唯武夷呉棫患之尤深乃稽易詩書而下逹於近世凢五十家以爲補韻新安朱熹據其說以恊三百篇之音識者雖或信之而韻之行世者猶自若也嗚呼音韻之備莫踰扵四詩詩乃孔子所刪舎孔子弗之從而唯區區沈約之是信不幾扵大惑歟恭惟皇上稽古右文萬幾之暇親閱韻書見其比類失倫聲音乖舛召詞臣諭之曰韻學起扵江左硃失正音有獨用當併爲通用者如東冬淸靑之屬亦有一韻當析爲二韻者如虞模麻遮之屬若斯之類不可枚舉卿等當廣詢通音韻者重刋定之扵是翰林侍講學士臣樂韶鳳臣宋濂侍制臣王僎脩撰臣李叔允編修臣朱右臣趙壎臣朱廉典簿臣瞿莊臣鄒孟逹典籍臣孫蕡臣答祿與權欽遵明詔研精覃思壹以中原雅音爲定復恐拘扵方言無以逹扵上下質正扵左御史大夫臣汪廣洋右御史大夫臣陳寧御史中丞臣劉基湖廣行省參知政事臣陶凱凢六謄藳始克成編其音諧韻恊者併入之否則析之義同字同而兩見者合之舊避宋諱而不收者補之註釋則一依毛晃父子之舊勒成一十六卷計七十六韻共若于萬言書奏賜名曰洪武正韻勑臣濂爲之序臣濂竊惟司馬光有云備萬物之體用者莫過扵字包衆宇之形聲者莫過扵韻所謂三才之道性命道德之奥禮樂刑政之原皆有繋扵此誠不可不慎也古者之音唯取諧恊故無不相通江左制韻之初但知縱有四聲而不知衡有七音故經緯不交而失立韻之原徃徃拘礙不相爲用宋之有司雖嘗通倂僅稍異扵類譜君于患之當今聖人在上車同軌而書同文凢禮樂文物咸遵徃聖赫然上繼唐虞之治至扵韻書亦入宸慮下詔詞臣隨音刋正以洗千古之陋習猗歟盛哉雖然旋宮以七音爲均均言韻也有能推十二律以合八十四調旋轉相交而太樂之和亦在是矣所可愧者臣濂等才識闇劣無以上承德意受命震惕罔知攸措謹拜手稽首序于篇端于以見聖朝文治大興而音韻之學悉復扵古云太古正音序宋濂余少時則好琴嘗學之而患無善師與之相講說雖時按譜滌堙鬰而暢懣憤心弗自是也後聞泠君起敬以善琴名江南當時學琴者皆赴其門余尤慕之以爲安得一聽以償夙音之好乎及入國朝余旣𬒳命起仕而泠君亦繼至時天子方注意郊社宗廟之祀病音樂之未復乎古與一二儒臣圖所以更張之泠君實奉明詔定雅樂而余豫執筆製歌辭獲數與泠君間抱琴爲余鼓數曲余瞑目而聽之悽焉而秋淸盎然而春煦寥乎悲鴻吟而鸛鶴鸞鳳追而和之也砯砯乎冰合萬壑瀑布直㵼其上而松桂之風互答而交衝也懇懇乎如唐虞君臣上䂓下諷而不傷不怒也熈熈乎如漢文之時天下富貴而田野耆耄乘車曵屣嬉逰笑談弗知日之夕也余倦爲之忘寢不自知心氣之平神情之適閱旬日而餘音繹繹在耳誠知其美而欲學焉而余已老耄不可勉矣旣而泠君出其所次琴譜曰太古正音者示余且曰予之所聞者皆出乎此所未聞者可按譜而學也子可以序之重余有感焉樂之爲教也大矣古之人自非居喪服有異故則樂未嘗違乎左右所以欇忿戾之氣通神明之德其助豈爲細哉後世古樂寖乆寖亡今之所存若琴者無幾士大夫又鮮能而寡聽之雖如余之有志扵學猶有耄老無聞之悔况不若余之質固者乎誠以有其器而無其譜而其制不全故也今泠君獨不自私其藝將使人人可按譜而學豈非古人用心哉然余恐人見其易而忽之也故道願學之意以見其爲術之難述所聞者以告之使人知泠君之用志扵琴甚乆非特空言而巳也泠君名某某郡人今爲恊律郎味梅齋藁序洪武初余奉詔總裁元史于時豫執筆者凢數十人皆四方豪俊余日與之周旋會聚間一休沐輙相過從飮酒爲歡酒䦨氣盛撫掌大噱論古人文章政事不深夜不止信一時之樂哉然當是時諸君者皆壯強無恙余雖稍長亦未耄老方以爲此樂可以常有未知其爲樂也及後未數年人事稍稍乖殊或得州縣散之南北或以老癃疾疢引歸田里或抵法遇患轉徙遠方求如舊時之歡須臾而不得然後知此樂之難遇毎一思之不知俛首愴心而繼之以歎息也又况余年愈耄觸事愈多而英才凋謝愈盡雖欲不思何可得哉幸而獲見一人扵十餘年之後而又得觀其文辭其慰喜又爲何如也若吳郡傅君則明是巳則明在數十人中以能文稱當乖殊之時歸爲邑人師得益勉其所學最後獨存而文益進天之扵則明可謂加厚矣今年自吳中寄其文曰味梅齋藳者示余皆馳驟可喜嗚呼四方之英俊至是無幾矣然則則明之文何可少乎贈李于貞序昔天下盛時文學行義之士多出扵江淮以北今豈異扵昔哉何其遼邈而未見之也元興乎朔方其化自北始故士之北産者尤盛扵元今皇帝起南方士之盛誠由南方始自南而北理勢之必然也况朝廷思用北方士甚至有一材者即尊顯之所以運化機欲其速變也士生其間者安可不勉乎安豐李子貞善讀書有文士之秀者也其婦之弟鄭子端爲通事司丞渉遠道訪之其扵行義得矣及其歸也子端須余文贈之亦欲化其鄉人以文學乎于貞歸告而父兄語而朋友上方以文治思得奇才而用之有志功名者慎無自棄哉羅文質公集叙胡翰尚論人物者功業易見學術易知而道德爲難顔子之不違二必孔子而後知之有若之似聖人必曾子而後辯之一時之門弟子非不賢也日與之處也猶不能致察扵斯而况庸常之人方之聖賢才智相百十也將採其所藴之精微孰從而得之乎而况世之相去又遠也將極所至之高妙孰從而得之乎楊子雲曰存則人亡則書將必扵其書而知之而得之羅文質公之在宋仕不登扵朝化不行扵國紹興之末言任斯道之重者必屬之先生焉先生受學扵龜山楊文靖公因文靖而見伊川程正公則固及程氏之門矣當是時若李籲之才器謝良佐之力學張繹之高識尹焞之篤行未嘗不與其進而道南之嘆明道獨扵龜山發之及論西銘猶不能無疑伊川以理一分殊喻之道之難明也如此先生聞易扵龜山與其聞扵伊川者無間則固會而爲一矣嘗謂漢唐儒者能自樹立不過注心扵外與之㳺仲尼之門入堯舜之道必不能至此其志爲何如哉由是性明行完擴之以廣大體之以仁恕有如李延平之書潛思力行任重詣極有如朱晦菴之言其所造又何如哉李籲軰未聞有以是與之者今欲以其近似而窺測之固學者之所惑也獨不考之先生之遺書乎蓋博古通今務以文章爲學者非先生之學也忠信愿慤不爲非義而自守者非先生之學也二者不同而俱夫之先生之學靜而求之喜怒哀樂未發之中擴而極夫肫肫其仁淵淵其淵則逹天德之妙矣舉而措之行事施扵有政則莫非逹道之用矣故先生退而隱居而志常存乎天下遭世多故而義不忘乎朝廷其言曰仁義者人主之術也一扵仁天下愛之而不知畏一扵義天下畏之而不知愛三代之主仁義兼隆又曰人主欲明而不察欲仁而不懦又曰祖宗法度不可廢德澤不可恃又曰名器授之君子則貴授之小人則賤又曰士之立朝正直則朝廷無過失忠厚則天下無怨嗟類皆切扵時弊達扵治體其言旣足以懲熈寧創制之失其授受之際又足以啓淳熈理學之正觀是集者雖不能盡知先生因文以求義因迹以求用庻亦得其緒餘乎余嘉遂不墜其家學以寡聞陋見論前人之道德其亦過矣仲尼之門顔子交一臂而失之而况其遠者其亦難言矣姑存其大要焉風水問答序胡翰烏傷朱君彦脩故文懿先生之高弟弟子也少讀書從先生㳺最乆嘗有志當世充賦有司不合退而業醫猶幸其濡沬及人也著書數萬言曰格致論人多傳之而君之醫遂名海右又以隂陽家多忌諱不知稽諸古也復著書數千言曰風水問答書成示余雙谿之上推其用心可謂至矣易曰仰以觀扵天文俯以察扵地理天確然在上其文著矣地隤然在下其理微矣著者觀之微者察之知乎此者知乎幽明之故非聖人孰與焉而漢魏以來言地理者徃徃溺扵形法之末則旣失矣至其爲書若宅經塟經之屬又多秘而亡逸不傳則失之愈遠矣朱君力辯之以爲人之生也合宗族以居為宫室以處審曲靣勢得則吉不得則凶其理較然及其死也祖宗之神上叅于天舉而塟者枯骨耳積歲之乆拜已朽矣安知禍福扵人貴賤扵人夀天扵人哉故塟不擇地而居必度室據徃事以明方今出入詩書之間固儒者之言也昔者先王辯方正位體國經野土宜之法用之以相民宅土生之法用之以求地中皆爲都邑宫室設也而冡人墓大夫之職公墓以昭穆邦墓以族葬借欲擇之其兆域禁令孰得而犯之以是知君之言為得也惜其書不見扵二百年之前紹興山陵改卜之議晦菴朱子以忠賈禍夫以一世豪傑之才千古聖賢之學萃乎其人觀扵天下之義理多矣而篤惟蔡元定之說是信者果何也哉吾邦自何文定公得朱子之學扵勉齋四傳而爲文懿君受業先生之門計其平日之所討論亦嘗有及扵斯乎不然則是書成扵先生未易簀之日必能是正其說傳信扵人而頋使翰得而讀之豈知言哉且翰先人之塟今十年矣襄事之初匐匍將命而不暇擇嘗惕然扵先儒土厚水深之言扵是得君之書欣然如獲拱璧昔里有余禎者以是術㳺江湖間邵菴虞公深敬信之其著書曰地理十凖虞公稱其有得扵管輅王吉之傳力詆曾楊之非而不悟指蒙非輅所作則與翰同一惑也書之于篇朱君其幸終有以教之古樂府詩類編序太原郭茂倩裒次樂府詩一百卷余采其可傳者更定爲集若干卷復論之曰周衰禮樂崩壞而樂爲尤甚自制氏爲時樂官能紀其鏗鏘鼓舞而不能言其意則天下之知者鮮矣况先王之聲音度數不止其所謂鏗鏘鼓舞其人固不能盡紀也以是言之豈不難哉若聲詩者古之樂章也雅鄭得失存乎其辭辯其辭而意可見非若聲音度數之難知而國家之制作民俗之歌謡詩人之諷咏至干後世遂無復雅頌之音雖用之郊廟朝廷被之鄕人邦國者猶世俗之樂耳獨何歟蓋詩之爲用猶史也史言一代之事直而無隱詩繋一伐之政婉而微章辭義不同由世而異中古之盛政善民安化成俗美人情舒而不迫風氣淳而不散其言莊以簡和以平用而不匱廣而不宣直而有曲體順成而和動是謂德音及其衰也列國之言各殊儉者多嗇強者多悍淫亂者忘反憂深者思蹙其或好樂而無主困敝而思治亦隨其俗之所尚政之所本人情風氣之所感故古詩之體有美有刺有正有變聖人並存而不廢唯所以用之郊廟朝廷非淸廟我將之頌不得奏扵升歌宗祀非鹿鳴四牡大明文王之雅不得陳扵會朝燕享内之爲閨門外之爲鄕黨非關雎麟趾則鵲巢騶虞之風情深而文明氣盛而化神故可以感鬼神和上下美教化移風俗今茂倩之所次有是哉以其所謂郊祀安世黃門鼓吹鐃歌横吹相和琴橾雜曲攷之􅗛辭質而近古其降也爲魏魏辭温厚而益趨扵文其降也爲晉晉之東其辭麗遂變而爲南北南音多豔曲北俗雜胡戎而隋唐受之故唐初之辭婉麗詳整其中宏偉精奇其未纎巧而不振雖人竭其才家尚其學追琢襞積曾不能希列國之風而况欲反乎雅頌之正滋不易矣是以郊廟祭祀則非有祖宗之事美盛德告成功之實會朝燕享君臣之間則非有齋莊和恱之意以發先王之德盡羣下之情哇聲俚曲若秦楚之謳巴渝之舞涼伊之技莫不雜出以爲中國朝廷之用慆心盈耳不復知其爲教化風俗之蠧夫民不幸不見先王之禮樂考其聲詩蓋有足言者然以唐虞之盛不能無憾焉吾扵此見其風氣之淳人情之㤗政治俗尚之美皆非古矣其治亂得失是非邪正雖去之千數百載不待其言之著而今皆可見者則詩之爲用豈不猶史之事哉故合而論之以寓吾去取之意將望扵後之作者焉王氏數學舉要序數何始乎始扵古之聖人六峜九章蓋太昊軒轅氏所作也其學則古無有也六藝之教在小學八歲之童習之而九數在當時猶一藝爾道術裂扵天下百氏之說並興天下之言數者不必本扵儒而儒者亦穻究其奥扵是有國者立扵一家之學五曹孫子之科隷在國子雖以之名家可也然議者猶以一曲病之故其學之興也不能如古之恒乆其爲教也徴之扵今而不可得方田之法廢則度地不得其要粟米之法廢則交質不通其變以至稟稅積羃則無衰分少廣以御之高深廣遠則無重差勾股以御之間有名其術者舉一貨一幣一程一度銖銖而乗之銖銖而除之寸寸而乘之寸寸而除之終其書不出乎此學之者終其書不得其術亦惑矣吾不知古所謂五曹九章法者有類焉否也意其不若是也必矣數者天地之紀也萬物之綂也唯聖人能舉之聖人逹乎天地萬物之情故也不逹乎天地萬物之情以言乎數者則頼有聖人之法存焉耳當小學旣廢之後法之存者鮮矣雖世所謂通儒或莫之能扵是有言之者吾乃以其不能而病之亦惑矣且百氏之說不適扵用君子不病之是雖不當扵古豈不愈扵百氏之說哉故吾扵王氏之書有取焉其言九九奇兩之法較之世所見者約而甚覈于以均多寡比輕重揆高卑凖遐邇或盈或朒或正或員紀一衍萬極乎兆亰正載其用不窮其意亦將授之扵人非欲人之不知也使数學復興則是書宜不廢吾惜不及見其人而獨得其書以論之其有深扵此者吾亦不敢謂其盡扵書也吾聞之物生而後有象象而後有滋莫非數也豈必由其術者然後能通之哉苟通之雖謂之儒者可也而儒者之學則大矣贈楊載序洪武二年余客留京師會楊載招諭日本自海上至未幾詔復徃使其國四年秋日本奉表入貢載以勞獲被寵賚即又遣使流球五年秋流球奉表從載入貢道里所經余復見于太未竊壯其行丈夫生不爲將得爲使足矣緩頰折衝之間一言得之足為中國重一言失之亦未嘗不為夷狄侮笑東南海中諸夷國遠而險者惟日本近而險者則流球耳由古以來常負固桀驁以爲中國不足制之元入中國所綂土宇與漢唐相出入至元中嘗命省臣阿刺罕將兵討日本未及其國而海舟多漂覆不利其後又議取流球用閩人呉誌斗之言不出師而遣使徃喻其國留泉南者雖乆之訖不能達而罷豈二國果不可制乎亦中國未有以服其心也今載以一介行李冐風濤之險渉魚龍不測之淵徃來數萬里如行國中不蝢刃折鏃而二國靡然一旦臣服奉表貢方物稽首拜舞闕下此非人力蓋天威也天威所加窮日之所出入有國者孰不震疊因其震疊而懷柔之行人之事也非有陸賈之辯傅介子之勇莫膺其任而載慷慨許國奮不頋身者吾不知其何所負也竊求其故而扵駙馬王公見之公在閩中嘗取漢太尉家法書以遺載欲其不失爲淸白吏子孫意者夷人饒扵貨寳恒以此㗖中國之使中國之使受其㗖而甘之鮮不䘐扵利者使載不衂扵利則奉天威命安徃而不濟苟䘐扵利則雖奇丈夫檢狎小子之不若耳幸加勉焉國家委重非特使事蓋將授之以政矣靈棋經解序劉基昔者聖人作易以前民用靈棋象易而作也易道奥而難知故作靈棋以象之靈棋之象雖不足以盡易之藴然非精扵易者又焉能爲靈棋之辭也哉靈棋之式以三爲經四爲緯三以上爲天中爲人下爲地上爲君中爲臣下爲民四以一爲少陽三爲太陽二爲少隂四爲老隂少陽與少隂爲耦而太陽與太隂爲敵得耦而恱得敵而爭其常也或失其道而耦反爲仇或得其行而敵反爲用其變也陽多則道同而相助隂多則志異而相乖君子小人之分也隂陽迭用體有不同而名隨之異變易之道也易之取象曰車曰馬曰桷曰矢曰鬼曰狐之類推而達之天下之物無不該矣曰馬矣而又化爲龍曰水矣而又以爲雲變易之義也非通天下之頥者不識也故曰靈棋象易而作也非精扵易者不能也予毎喜其占之驗而病解之者不識作者之㫖而以世之卜師之語配之故爲申其意而爲之言若夫以爲黃石公之授張于房之受則傳無其文史無其實不敢從而附會之也贈徐仲遠序世之所謂禍福通塞者果由扵命邪聖人罕言命命果不足道邪孔子曰道之將行也與命也道之將廢也與命也自古固有不仁而安榮守道而戮辱者庸非命乎古之人以夀富康寜攸好德考終命爲福而不言貴今之論命以官爵之大小品高下豈古之所謂禍福與今異耶好德無踰扵仲尼則厄窮而在下顔淵亞聖三十以死曹孟德司馬仲達位在人上而以夀終且及其子與孫禍耶福耶所謂命者當何以㫁之哉易曰窮理盡性以至于命孔子曰不知命無以爲君子也今之言命者其果有合扵古人否乎天以隂陽五行生爲人也隂陽五行之精是爲日月木火土金水之曜七曜運乎上而萬形成于下人也者天地之分體而日月木火土金水之分氣也理生氣氣生數由數以知氣由氣以知理今之言命者之所由起也夫氣毋也人子也母子相感顯微相應天人之理也則亦何可廢哉日至而麋鹿解月死而蠃蛖噍温風動而薺麥死淸霜降而豐鍾鳴物理相通不可誣也天台徐仲遠以七曜四餘推人生禍福無不驗子甚異之而贈以言若夫吉凶利害之所趨避則吾聞之孟子矣夏小正集解序王褘夏小正世以爲夏書其書在大戴禮中傳之者戴氏也鄭康成爲之註或曰盧辨註謂爲鄭氏非也頴川韓元吉氏嘗以范太史家藏舊本校定之然與故所傳關本訛舛不同會稽傳崧卿氏又據關本而爲訓釋實多所補正及考亭朱子集儀禮尊信小正而用之經其論定者旨益加明矣今括蒼趙君復集諸家之說而爲之解扵是爲尤詳宻者也以予論之小正之爲夏書不可無疑者孔子定書㫁自唐虞虞書以曆象日月星辰敬授人時爲重事小正其遺法也孔子嘗曰我欲觀夏道是故之𣏌而不足徴也吾得夏時焉及答顔淵以爲邦曰行夏之時而作春秋用夏時以冠月其有取扵夏時如此設小正誠夏書則在孔子所必取然而不與禹貢同列扵百篇何耶鄭氏謂夏時者夏四時之書其書存者有小正則以小正爲夏書者鄭氏也不信聖人而漢儒是信可不可耶禮記月令漢儒皆以爲周公作而其中雜有虞夏商周秦漢之制殆漢末諸儒採吕氏十二月紀淮南子時則訓等書爲之耳大戴禮之有小正小戴禮之有月令烏知其非類耶或曰吕氏據夏小正以正四時或曰小正具十二月而無中氣有應候而無日數至時訓乃五日爲候三候爲氣六十日爲節因小正而加詳也意者小正特出扵月紀時訓之前者耶是則以小正爲夏書誠有可疑者也趙君之言謂鄭氏以小正爲夏書本無左驗所紀昏旦中星與星之見伏率與月令月紀時訓不合唐一行推以曆術知其實在夏時其爲夏書無疑是又不然天雖高星辰雖遠苟求其故則精曆數者悉所能考蓋自上古以來天行日至星辰之次舎其度數無不可知况在夏后之世安知非精曆數者逆考而遡推之求其故以著于書亦豈可遂信之而不疑乎世以本草爲神農之書素問爲黃帝之書其果出扵神農黄帝否乎本草素問不可必其出扵神農黃帝月令不可必其出扵周公則小正之爲夏書予固不敢不致疑其間也惜乎趙君巳不可作不得以予所疑者質之然君之爲此書則旣考覈詳而論辨宻卓見絶識徃徃而是不其有可傳者歟第其眞本及所著他書皆厄于兵而此篇者乃其伯氏掇拾遺藁重所繕録章句字書之脫誤不能無之覽者擇焉而巳君諱友桂詵仲其字學行志業具載宋太史所爲墓誌兹故弗道而論予所疑者序其書焉黃子邕詩集序旴江黃子邕氏善爲詩其詩有曰醉夢藳者皆古樂府歌行五言古體總若干卷其辭簡質平實壹本扵漢魏而絶去近代聲律之弊殆幾扵古矣嗟乎若子邕者豈非其意欲追古之作者以爲並然可不謂為今世之能言者歟予嘗論之三百篇之詩其作者非一人亦非一時之所作而其為言大抵指事立義明而易知引物連類近而易見未嘗有艱深矯飭之語而天道之顯晦人事之治否世變之隆汚物理之盛衰無不著焉此詩之體所以爲有繋也後世之言詩者不知出此徃徃惟衒其才藻而漫衍華縟奇詭浮靡之是尚較妍蚩工拙扵辭語間而不頋其大體之所繋江左以來迄于唐宋其習皆然是其為弊固亦非一日矣今子邕乃能斥漫衍以為簡屏華縟以爲質黜奇詭以爲平易浮靡以為實讀其辭知其扵天道人事世變物理之際詳矣等而上之詎止扵漢魏而已哉故予以謂子邕之詩殆幾扵古今世能言之士如子邕者蓋不可多得也子邕嘗北㳺遭世叔季其言不見用其志鬰鬰不得遂頼今天子明聖盡收前代遺才而甄録之故子邕遂擢官扵禮部會朝廷方務㮷古禮文之事討論潤色出扵子邕者居多蓋子邕之學不特善扵詩而巳予故論其詩幷及其平生之槩使讀之者因得以悉其人而又以見予扵子邕之詩能知其意之所在與其學之所至非苟焉相好而巳也送鄭仲宗序上之三年夏詔徴江南諸郡縣民凡稱大家者悉赴闕旣集闕下則造之扵廷而親訓諭之凡天地隂陽性命仁義古今治亂盛衰紀綱法度賦稅供給風俗政治得失之故諄諄焉累數千百言又恐其或遺忘而不能詳也則刻而爲書以摹本分賜之乃六月十三日庚午上御奉天門翰林臣宋濂臣詹同臣王褘及起居注臣陳敬奏事畢賜坐從容問曰卿等知朕所以訓諭斯民之意乎臣褘謹對曰自古帝王皆身兼君師之任君以治民師以教民三代而下爲人主者知爲治而不知爲教今陛下主天下爲治之道巳備而又集凡民而訓諭之耳提靣命不啻嚴師之扵弟子此政古昔帝王教民之意也又問卿等亦嘗見鄕人有論否乎臣濂對曰臣鄉人浦江義門鄭氏實來受訓諭爲臣言陛下教之之旨甚至今還且將以所賜書重刻而摹之使其鄉里之民家有是書以廣宣聖意矣越數日仲宗來請别且求言以爲贈仲宗卽所謂義門鄭氏者也夫仲宗之來旣承聖天子之叮嚀告戒至詳且悉天下之言宜莫有加之者矣而頋又求言扵褘何邪褘也聞之三代之民人有士君子之行豈必皆待上之人匡直輔翼而振德之哉蓋其性質本善而又薫陶漸磨之素至故一鼔舞之間莫不興起扵爲善而比屋可封之俗成矣今仲宗之家十葉聚食藹然有仁義之風庻幾一家之三代今又昭受聖訓而且圖使鄕里之民同興扵仁讓上下相成如此豈非三代之君民者與夫紀述上德而推掦之以風厲乎四方者史臣之職也禕故具志其事書以告仲宗若仲宗才學之懿行役之勤則凡賦詩者當能稱誦之兹不復道濳谿後集序趙汸濳谿前集凡十卷冠以陳公衆仲序文浦陽義塾旣刻而傳之後集筆藳日新卷帙未有終也宋公以書來俾汸序其意顧乆病廢學閱歲無以復命又念與公相知有自蓋嘗偏觀前集而惜乎陳公有未及盡見者然則後集固不可無序汸旣不敢讓知其又奚辭廼爲序曰脩辭以爲文非古也其起扵漢之西京乎太史公傳司馬相如吾丘夀王東方朔枚臯王褒之屬以善屬文見知人主然皆不得列扵儒林而孔子弟子别爲傳謂辭章爲文而不本扵經蓋昉扵此至唐韓子宋歐陽公曽子固相繼而出始考諸經以立言其器識之大學問之博志節之固又足振而興之文辭之用扵是爲貴雖子朱子纘周程之緒猶且誦法表章而不敢忽焉葉正則顯扵東南當道學復明之世刻意脩辭不踐故迹而乖離侵畔自窒其源其視韓歐特起扵千載之下而知所宗尚者爲何如也是以君子尚論浙東先達必以東萊吕公爲歸豈非以其博而知要能自得師雖儗諸孔門㳺夏之倫而無愧也乎若夫辭達理明不繳繞扵陳言而固與之合則百餘年間莫善扵侍講黃公者矣景濂父主吕公之鄕而㳺于黃公之門其學以經爲師而尤長扵周禮其出入百家鈎深索隱蓋將以自致也而不但資爲文其扵爲文直以才高思敏舒之歛之無適不宜而未嘗有意扵爲作當其發憤擇術直詆辭章爲淫言葩藻爲宿穢期扵剗削刋落以徑趨乎道德之塗而扵吕公尤惓惓咏思歎慕若不能自巳扵言者則其扵輕重之類得失之幾察之明矣别集之行豈徒欲以文辭名世者哉蓋汸所知扵景濂父者如此若夫陳公謂爲文必傳諸師而後可者景濂父旣不以自多而汸又不足以言之顧嘗聞之袁公伯長嘗問扵先師虞公伯生曰爲文當何如虞公曰子浙人也子欲知爲文當問諸浙中庖者子川人也何足以知之袁公曰庖者何用知文乎虞公曰川人之爲庖也麤塊而大臠濃醯而厚醬非不果然屬饜也而飮食之味微矣浙中之庖者則不然凢水陸之産皆擇取柔甘調其湆齊澄之有方而㓗之不已視之泠然水也而五味之和各得所求羽毛鱗介之珍不易其性故予謂爲文之妙惟浙中庖者知之袁公蓋矍然稱善也自虞公爲是言學者竊論以爲非黃公之文不足以當之衆仲嘗學扵虞公而景濂父黃公之徒也二公之所指授信乎有異扵他門者哉善觀斯集者則得之矣送操公琬先生歸番陽序聖天子旣平海内盡輦勝國圖史典籍歸于亰師乃詔脩元史起山林遺逸之士使執筆焉凡文儒之在官者無與扵是在廷之臣各舉所知以應詔汸以衰病屢謝徵命亦誤在選中使者至郡太守將吏皆能言其病狀然莫肯受其咎者故不得終辭舟過嚴陵適前太史金華宋公景濂亦至曰有詔召王子充扵臨漳矣予曰汸衰病日增非可出者縱出亦無補扵事所幸者平生故人重得一見扵契闊之餘事故有非偶然者宋公曰然蓋予與宋公不相見者數載而子充則十有餘年矣旣至亰師聞番陽操公琬先生在書舘卧病旦夕以聞即可歸私又自念番歙接境自弱冠則知先生先生學通諸經百氏述作滿家諸兄之家扵番者與先生有連姻相好也毎相見輙能言先生動靜而未獲一識今乃得相見扵此豈非向所謂非偶然者乎自是日上堂與諸公從事筆硯間退則省先生疾先生疾少間輙俾予連榻卧談論經史晝夜亹亹相扣撃不少休予蓋有愧焉俄而禮部尚書崔公侍郎傳公同至局中以得旨先生且爲别先生乃爲文一篇以告同舎同舎之士莫不惜先生之歸咸賦詩爲先生贈予辱知有自則進言扵先生曰先生歸矣士之在山林與在朝廷異其扵述作也亦然纂釋群經折衷百氏處則充棟梁出則汗牛馬雖其說未必盡合扵聖人非素業與之相出入者不敢議也崇古學貴文章凌厲漢唐上擬三代使窮郷晚進謏聞淺見之士目動神聳不敢出聲以誦自揆終身不能爲者又况陶冶性情吟詠風月或以單辭或以偶句爲人所稱皆足以名世雖或無取扵作者扵人非鬼責亦何有焉此皆山林之士所爲得也若夫朝廷之士則不然大史公網羅舊聞上接春秋下迄麟趾其序高帝創業文景守成至今使人如親見之書封禪平凖傳貨殖皆諫書也而後世以爲謗韓退之未遇時欲作唐一經以垂無窮旣入史舘不敢有爲柳子厚苦辭迫之曾不少動僅以執事成順宗實錄數卷卒困扵䜛口竄走無完篇司馬文正公受知神宗作資治通鑑垂十九年始就而小人出鄙句以訾之此皆鉅人碩德名實孚于上下以著書爲大業者也猶或所遭若是今吾人挾其山林之學以登于朝廷之上則其茫然自失凜然不敢自放者豈無所懼而然哉尚頼天子明聖有旨姑即舊志爲書凡筆削悉取睿㫁不以其所不能爲諸生罪德至渥也扵是先生得以病辭歸而支離昏昧如汸者亦得以預聞纂修自詭豈非其幸歟然則汸扵先生之行獨不能無所感者良有以也先生曰子姑遲之吾待子扵番歙之間不遠矣陶尚書文集序徐一䕫國家之興必有魁人碩士乘維新之運以雄辭鉅筆出而敷張神藻潤飭洪業鏗乎有聲炳乎有光聳世德扵漢唐之上使郡國聞之知朝廷之大四夷聞之知中國之尊後世聞之知今日之盛然後見文章之用爲非末技也嗚呼有志扵此者疲神扵六籍之間焦思扵佔畢之下其勞蓋亦甚矣夫其所以爲此者抑豈徒爲華哉亦將効用扵國家不使淪扵虚器而已而得此者少也若今禮部尚書陶公凱者其得此者歟公姿性過人其才甚高其學甚博其識見甚卓且遠故其爲文多或千言少或百字下筆汨汨不見有艱難意嘗遊呉楚會時方擯棄南士懷寳不售其爲文多激慨中更亂離自度無所扵用去居深山之中授經以養其親而其爲文多隱約今天子削平海内思變馬上之習遣使四出䀻起巖穴之士使至台州得公公不敢固讓出應國家之需時上方命儒臣纂脩元史上知其老扵文學俾預纂脩之列書成職教大本堂旋擢應奉翰林文字未幾超遷今官凢稽古禮文之事公多論定會翰林虚座朝廷用之惟恐不盡其才遂命兼領其院事方是時天下大定朝廷務導宣恩意稱揚功德推序勲閥以昭明文物凢詔令封冊歌頌碑碣等製多出公手公自念文章之用蓋在此耳措辭陳義各當其體扵是公之文沛然爲一代之用矣故余以謂文章之工否存乎人而文章之用則係乎所遭也余也蚤嘗有志兹事向以與公有鄕里之好數嘗從扵論著之末詎意未老先衰學日益落氣月益耗遂莫能有所成就亦安敢自謂顯諸用也兹見公京師盡出其所爲文見示且徴言以升其端余遂爲之論次後之觀斯文者尚知余言之不詭也都離子序郁離子者誠意伯劉公在元季時所著之書也公學足以探三才之奥識足以逹萬物之情氣足以奪三軍之帥以是自許卓然立扵天地之間不知自視與古之豪傑何如也年二十已登進士第有志扵尊主庇民當是時其君不以天下繋念慮官不擇人例以常格處之噤不能有爲已而南北繹騷公慨然有澄淸之志藩閫方務治兵辟公叅贊而公銳欲以功業自見累建大議皆匡時之長䇿而當國者樂因循而恱苟且抑而不行公遂棄官去屏居靑田山中發憤著書此郁離子之所以作也郁離者何離爲火文明之象用之其文郁郁然爲盛世文明之治故曰郁離子其書總爲十卷分爲十八章散爲一百九十五條多或千言少或百字其言詳扵正巳慎微脩紀遠利尚誠量敵審勢用賢治民本乎仁義道德之懿明乎吉凶禍福之幾審乎古今成敗得失之跡大槩矯元室之弊有激而言也牢籠萬彚洞釋羣疑辯博奇瑰巧扵比喻而不失乎正驟而讀之其鋒凛然若太阿出匣若不可玩徐而思之其言確然鑿鑿乎如藥石之必治病㫁㫁乎如五穀之必療饑而不可無者也豈若管商之功利申韓之刑名儀秦之捭闔孫呉之隂謀其說詭扵聖人務以智數相高而不自以爲非者哉見是書者皆以公不大用爲憾詎知天意有在挈而卑之維新之朝乎皇上龍興卒以宏謨偉略輔翼興運及定功行賞䟽土分封遂膺五等之爵與元勲大臣丹書鐡篆聮休共美扵無窮不其盛哉傳有之曰楚雖有材晉實用之公之謂也𥘉公著書本有望扵天下後世詎意身親用之雖然公之事業具于書此元之所以亡也公之書見于事業此皇明之所以興也嗚呼一人之用舎有關扵天下國家之故則是書也豈區區一家言哉一夔蚤嘗受教扵公後謁公金陵官寺出是書以見教一䕫駭所未見愧未能悉其要領今公巳薨其子仲璟懼其散軼以一䕫扵公有相從之好俾爲之序頋一䕫何敢序公之書然得繋名扵簡編之末亦爲荣幸因不讓而序之公諱基字伯溫括蒼人若其言行之詳官勛之次則具在國史兹不著六書本義序徐一䕫古者六書之法皆掌扵官成周保氏之職以六書教國子而書之設以同文爲盛故又有外史掌達書名行人掌諭書名漢循其法太史試學童諷書九千字者得爲史吏民上書字有不正者則紏率之其掌扵官可知巳夫書非曲藝也大而二帝三王周公孔子之道次而古今成敗得失之迹九流百氏雜家之說又次而官牘家乘錢榖獄訟米鹽碎務之記注莫不有頼扵書蓋不容扵一日廢者也而爲書之法六曰象形曰指事曰諧聲曰會意曰假借曰轉注其爲法也有子母相生之類形聲淸濁之别五方言語之異用之者易流扵譌舛自夫官失其守大夫士務趨簡便以指事爲象形者有之以會意爲指事者有之至有以轉注爲假借㑹意爲轉注其失滋甚扵是六書之義不明而義理之精微有失其本眞者矣越人趙君撝謙深以爲病取許叔重而下諸家論著之書攷其得失推子毋之相生俾各歸其類正五方之言語律以四聲而以子毋相生之例綂之爲凢例以提其綱爲圖說以括其要分爲十類著爲十二篇釐爲三百六十部扵是六書之義明而六書之用無譌舛之患矣嗟乎大夫士之扵六書譬之麻縷絲絮莫不以爲衣也而或不知其出扵蒔育稻梁魚肉莫不以爲食也而或不知出扵佃牧習而不察此固人情之大較撝謙非有官守如古者外史行人之所掌而能用力扵衆人所畧之地何其用心之專也哉撝謙裔出宋宗室志慤而守恬其學邃扵經術諸子百氏莫不記覽著爲文辭抑掦反覆能沛然盡其所欲言而不畔扵道觀其所著六書論可見巳至扵六書本義則其尤盡心者也方國家校正韻譜徵至亰師稍試其所學擢中京國子監典簿旋以疾引退遂克畢力扵此書書成徴余序之雖然余固習而不察者也安能發其藴以撝謙請之力姑著其用心之專云爾皇明文衡卷之三十八
