front:
  text: 皇明文衡卷之八十七
  hash: sha256:cc0f0055bf4356181451c3e1c2519cc244d55c4edd0bae8dfe42088a82d2d9a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_087-1a}
body:
  text: 墓志銘故工部營繕司主事劉君墓志銘楊士奇永樂二十二年工部營繕淸吏司主事劉季箎卒於官其孤紳寅奉事狀介吏部郎中陳叔剛請為幽堂之銘將歸葬焉君為刑部侍郎時嘗監修永樂大典于文淵閣與豫常相聚有知契故不得辭按狀劉氏其先汴人宋建炎𥘉某官某扈從南渡遂官餘姚其子孫業儒亦代有仕者至諱某為丹陽書院山長嘗考浙江鄉試其祖也諱某為慈溪縣儒學教諭門人私諡中肅先生其父也母張氏君諱韶字季箎以字行自幼端靜喜學問為父母所愛既承其家訓長而進學鄉先生宋玄僖王孟暘之門刻苦自勵二先生咸器重之登洪武甲戍進士第授行人司行人時重行人之選非進士不授凡方嶽大臣率出此君為之一以所學不肯茍嘗持節使雲南四川朝鮮所至宣上德逹民隱餽贐一毫無所受事聞賜鈔襲衣丁丑升硤西布政司左參政先是陜有逋賦民積歲不能輸有司峻刑督之君至慨然曰民困故不能輸為之父母又忍峻刑督之耶與其竂謀分行郡縣解其縶緩其期勞來綏輯而從容勸誘焉民皆感激思奮曰是赤子矜念我我可不戮力以纍仁人奔走假貸以輸無幾畢完陜不産碙砂而歲有課額民窘不能償至或僨其家者君為奏罷之洪渠水溢為民患躬行視之為設法治堰民賴以安蓋凡可以利民者率盡心焉華有郭子儀祠已壞過之嘆曰此崇德教民之務何可忽督令丞修葺之凡所過祠宇有關風化而壞者必風郡縣葺理之其逹政體槩類此在陜四年可書之績尚多𬒳召為刑部左侍郎尤懇懇重民命平反具獄數事陜平民王某為強盜所引逮至而所引者已伏法不能自白君察其冤召所引者之妻子使識之而聽其詞竟得實王免於誣有典守錢榖而虧兊者既𬒳逮則援引千餘人同罪君廉知其誣卒辨所誣引者釋之河陽逆旅夜有朱趙二人異室而宿朱怨家後追至殺之而誤中趙朱實不知天未明行十數里逆旅主人疑朱殺之追執送官鞫訊考掠朱不勝遂誣服不敢求辨君獨曰是偶邂逅相聚非素有負且計其裝非有圖也特緩其獄遣人密察之無幾有司竟得殺趙者而朱以緩獄不死楊州民胡氏夜有賊入其室殺人而遺刀尸傍旦視之柄有鄰家蘇氏私識官捕鞫蘇蘇曰家失此刀久矣不服既備極諸刑竟誣服君濳使人懷刀往察其鄰一童子識之曰我家物也遂得賊而釋蘇蓋其理刑一以求生為務永樂乙酉朝廷廣召文儒纂修大典命太子少師姚廣孝禮部尚書鄭賜監修而擇六卿之二有文學者一人為之副遂以命君討論裁處人多服之書成受厚賜庚寅坐失出罪人左遷兩淮鹽運副使未行復留丁酉改工部營繕主事躬勤治職未嘗以崇卑為意壬寅得痺疾明年正月某日卒享年六十有一君為人淸素雖歷顯要而泊然自持居家敦孝友之行接人有謙讓之節雍容雅度有犯不校間暇手不釋卷治經長於春秋喜吟詠沖淡優柔有陶靖節韋刺史之趣所著文集若干卷藏于家娶潘氏子男四紳寅辰復辰中永樂庚子順天府鄉試先君一年卒女二長適安遠縣學訓導趙佐次尚幼君之葬以洪熙元年正月八日其墓在其邑某鄉先隴玉燭之原銘曰學有以用於世才有以逹其志得失無所作乎內勒銘其藏垂休永代太子少保禮部尚書兼武英殿大學士贈榮祿大夫少保諡文靖金公墓志銘太子少保禮部尚書兼武英殿大學士金公以宣德六年十二月十六日卒訃聞上嗟悼甚至贈榮祿大夫少保諡文靖命禮部尚書胡濙賜祭又命自喪至祥禫皆遣官祭敕有司治喪葬百需所以褒寵之厚且備矣公諱善字幼孜以字行其先世見余所作其考雪崖先生神道之碑公自幼嗜學問內承家訓之篤長從前進士聶鉉先生受春秋經得其微旨中進士乙科授戶科給事中太宗皇帝𥘉臨御注意文學士改翰林檢討居無幾簡翰林之臣七人處之內閣付以密務而兩制悉歸焉七人者廬陵解大紳胡光大永嘉黃宗豫南昌胡若思建安楊勉仁公與士奇也數月皆升官公為侍講授承德郎仁宗皇帝在東宫時翰林春坊司經局之臣日講經史公專説春秋敷析簡明睿旨稱善遂命纂十二公事作春秋要旨三卷以進永樂五年升右春坊右諭德仍兼侍講授奉訓大夫七年車駕巡狩北京公與光大勉仁同扈從八年扈從北征冬還南京升奉直大夫十年賜誥命贈其考守正為右春坊右諭德毋陳為宜人封毋羅為太宜人贈妻孔為宜人十一年扈從巡北京從征北虜十二年復從北征升翰林學士仍兼諭德修五經四書性理大全為總裁官授奉議大夫十四年還南京明年扈巡北京預修太祖皇帝實録十八年升文淵閣大學士仍兼翰林學士二十年扈從北征二十二年復從征北既旋師中道宫車晏駕初喪至斂皆勉仁與公據禮行之既而勉仁先馳歸報道中之儀皆咨公而行仁廟嗣位進户部右侍郎仍兼文淵閣大學士翰林學士踰月升太子少保兼武英殿大學士專典內制賜大臣五人銀圖書其文曰繩愆紏繆蓋以匡直勉之公其一也奉命持莭册封趙王妃及封梁王洪熙改元命兼禮部尚書三俸並支大臣兼三俸者惟勉仁與公兩人賜誥命授資善大夫贈其祖仲卿及父皆太子少保武英殿大學士祖母周母陳皆夫人進封毋羅太夫人贈故妻劉封繼室屠皆夫人以法司論死罪多冤抑命自今臨決必會大學士三人同審而公預焉詔百官有親違離三年以上者聽給告歸省公首奏歸省母蓋前此百司職務填委無敢言私至是公首奉詔賜賚甚厚是歲丁太夫人憂上嗣位詔修兩朝實録起公為總裁官明年奉命持節之寧夏册封安化真寧二王妃歷河南關東西之境弔覽周秦漢唐以來遺墟故址悉見賦詠所過兵民休戚既還具言於上實録成賜金織襲衣文綺白金鞍馬是歲扈從巡邊至宣府而還歲餘得疾上遣大醫院官視療數月竟不起春秋六十有四公為人簡易沈默溫𥙿有容居家敦孝友之行既仕事上以誠持論必正扈從北征時道中士卒有憊者太宗皇帝知之以問羣臣羣臣未有對公直對宜遂班師凡於公務致勤不倦處同僚能讓於人泛愛無忤其學該博文章和平寬厚類其德性四方求者無虛日靡不酬應得其一篇一詠者皆寶重之書兼工真行嘗考會試者一讀廷試卷者四不伐善不鶩名𥘉升學士寵賚日加即以盛滿為戒名其燕處之居曰退菴疾革士奇與勉仁問之有何言公言受國重恩上無所益朝廷下無所益生民何言傍或啓之請身後之澤者公正色曰君子所耻訖終清明未嘗片語涉亂既卒自公侯六卿暨諸司之長皆哭弔奠祭士無賢愚皆有喪善人之嘆嗚呼儒者際遇始終光榮如公一世其幾何人公之所存蓋無忝矣子男五長昭伯宣德二年進士次武伯堅伯文伯夀伯女五皆有歸孫男六女三公葬以卒之明年某月日墓在某縣某鄉某原銘曰玉笥崔巍金川湛澄公生其間萃和挺英賔興賢能濟濟皆至青萍出匣淬礪𥘉試六御乘時登庸玉署淸邃崇嚴參典密務恪勤夙夕小心寅恭于狩于征龍旗率從上承簡知履坦平平鵾遊滄𬈑鵬翶九天歷事三聖敬終猶始不競不絿有譽無毁方簡大册天府所藏崇碑厚碣敷在四方謙退之存易簀不二嗚呼文靖可式有位國子司業張公墓志銘楊榮永樂丙戍秋七月三日國子司業張先生以疾卒于太學之官舍京師士大夫與夫六館諸生皆相與哭之盡哀既奉匶南還卜以某年某月某日葬某鄉某山之原國子學正順昌黃立為𫐠先生之行徴豫銘之豫生也晚忝以科目入京師濫官翰林辱先生折輩行相契厚今先生殁矣烏可無銘文以告後丗遂弗獲辭按狀先生諱智字玄略姓張氏其先為延平之順昌人曽祖某隱德弗耀祖元贈滄州路平陽州判官父升元以神童薦輔太學授祕書郎五轉而為江西儒學提舉母范氏周氏生母陸氏先生以元統乙亥某月某日生自幼有大志聰明頴悟讀書過目成誦羣兒為嬉戲之事必正色端謹如老成人稍長即能勵志於問學嘗慨然曰采玉必於崑山探珠必於滄海士之為學豈不出戶庭管窺蠡測所能至哉即日挾䇿入元都交當世之名士用薦輔入國學元之季四方兵興先生以才出參閩省機務省臣承制授先生同知新喻州事巳而知之不可為浩然退歸國朝𥘉定天下先生即建陽之崇化里灑掃一室置古今書籍其中窮搜博覽沛然有得於心鄉黨爭企慕之洪武戊午以明經應薦上吏部授夷陵州學正凡九載以內艱歸既服除入覲太祖高皇帝方任賢圖治知先生才可用遂超拜禮部試左侍郎即首言宜以書籍頒布北方學校議者以費財不便先生正色曰使賢才彚征利益生民何惜此費衆大慙未幾實授右侍郎其在職能秉禮不遷綱紀秩然人莫不敬服之居二歲以事左遷為國子學録尋升博士後遂擢司業先生能誘掖奬勸以誨諸生故鮮弗底于造就其教人一本於道德仁義之説孜孜焉開導後進老而弗衰一時學者莫不師宗之永樂𥘉今上幸學衆推先生講易特蒙寵異賜豫甚厚至是卒享年七十有二𥘉娶魏氏繼室某氏子男二人長時早夭次􅌈孫男若干人曰某曰某榮於先生同里少時已聞先生名心竊仰慕暨官京師得朝夕從先生杖屨之末以聆緒論私以為幸孰謂先生奄然永逝而竟弗得以終惠教嗚呼可勝惜哉然先生之文章事業不可以無述也謹撰為銘文一通以納諸墓庶後之人有考焉銘曰猗嗟先生早馳駿聲搜羅百家學霈以盈元政不綱才弗大顯聖朝肇化齎志斯奮筮仕夷陵允為範模諸生雲從濟濟文儒爰二春官帝心簡在讜論嘉猶國史具載晚教成均為學者師六館化之時雨是資書林之原卜此窀穸過者式之先生之德詹事府少詹事兼翰林院侍讀學士贈嘉議大夫禮部左侍郎曾公墓志銘宣德七年春正月辛巳詹事府少詹事兼翰林侍讀學士曾公卒于北京之官舍豫與少傅楊公往哭之士大夫皆往會哭翊日豫二人以聞皇上悼歎即命禮部賜祭贈嘉議大夫禮部左侍郎命工部治墳塋兵部給舟歸其喪將行其季子种謁豫拜且泣曰种父未卒前二日屬春坊庶子周公狀其事行命种請墓銘於先生先生幸賜之以慰先人於地下豫聞而益悲念與公交好三十年而今已矣奚可辭銘公諱棨字子啓吉之永豐人其先丗出自武城西漢末郕國十四代孫諱據者避王莾之亂率族人南遷散居南豐廬陵諸郡至宋兵部侍郎江西湖廣安撫使贈武成伯諱晞顔者公之高祖也元翰林直學士諱德𥙿者公之伯祖也翰林編修知制誥諱巽申者公之祖也考諱叔本妣張氏公幼頴敏端重言笑不易五歲盡識象戲字七歲從學伯父兩皋十五以其所學訓族人子弟十七出教新淦胡氏孰巳有名時儒者鄒仲熙鄒幼亨輩皆忘年與之交二十充邑庠生教諭戴正心文學老成尤重公既作詩勵之復為龍説期其大用永樂元年中江西鄊試明年禮部會試中選者四百七十人公在苐八庭試遂中苐一賜進士及苐太宗皇帝奇其才親批所對䇿褒美之賜冠帶朝服授翰林修撰承務郎未幾詔選進士二十八人俾進學文淵閣公為之首上嘗召問典故公奏對如響每應制詩文皆立就由是深沐寵眷纂修永樂大典命為副總裁授儒林郎五年升侍講授承直郎丁內艱大駕巡狩北京起復扈從同邑有坐姦黨事逮公者人以為危太宗特原之謂曰朕惜爾才也公所居西長安門外家人不戒火延及禁垣上亦以公故置不問嘗與諸才俊賦天馬海靑歌於上前公獨先成詞氣豪宕太宗深加歎賞升承德即滿升侍讀學士與修太祖高皇帝實録書成重沐賜賚丁父憂復起就職仁宗皇帝嗣位皇上正位儲宫升右春坊大學士仍兼侍讀學士授奉議大夫賜詰命贈其父為奉議大夫左春坊大學士兼翰林侍讀學士母為宜人洪熙𥘉元侍皇上監國南京宣德改元與修兩朝實録書成賜金織襲衣白金文綺進詹事府少詹事賜寶帶日直文淵閣歲時屢拜御酒珍饌白金鈔幣之賜恩意隆洽一日趨朝以咳嗽遽引退上遙見之詔免朝參公益敬愼弗懈踰年疾復作上亟命醫往治公知不可起自為贊遺相知者訣別遂卒公生洪武壬子八月戊戌享年六十有一既卒公侯六卿以下皆往哭奠而士林君子咸共悼惜以為斯人不可復得矣其配鍾氏有賢行封宜人子男三長秬先卒次稷次种女五劉敦會鍾公鉉周秀夫胡顓勉高欽夫其壻也公姿貌魁偉襟度夷曠孝友忠實出乎天性而才氣志行尤超卓不羣兩京鄊試禮部會試屢典文衡去取率公平素奬勵後進以為已務宗姻鄉䣊有急難靡不用情善飲酒與賔朋觴詠談笑傾倒意豁如也為文章才思滂沛頃刻千百言不待思索工書而草書尤精得晉人凨致四方慕而求之者足相躡其門至於商確古今講論政治無不切當其葬以某年某月某日其墓在某山之原銘曰偉哉曾公卓犖瑰奇少處鄉邑才已不羈永樂𥘉科首賜及第玉質金聲為國令器居官翰苑克慎克勤文行之懿遠近著聞歷事三朝竭心贊翊寵眷殊深屢進淸職弗究厥施遽止於斯恩命之隆生榮死哀惟兹鄉邑山盤水繞銘諸其藏千古有耀故給事中李君墓志銘楊溥洪熙紀元之𥘉詔廣言路以來天下之善而漢中府學訓導李君蕃上端本十六䇿朝廷嘉納之驛召至京授行在兵科給事中九載考績稱最將升秩而君以疾卒于官聞者咸惜之弟蔚請翰林編修江淵狀君家世歷履行義卒葬請豫銘豫嘗識君不可辭乃敘而銘之君字秀寶唐涼國公訴之後某世祖自洮州臨潭徙于荆五世祖細元季徙蜀之富順祖允中復徙內江父季賔以鄉貢進士任訓導升教諭歷七邑所至能教人君生長宦所自幼警敏異常兒既長力究羣經中鄉試會試中副榜遂領教職以上疏論事升行在兵科給事中授徴事即其為教官以師道自勉為給事中克舉其職命視關外城壘還陳備邊策淸理軍政於河南人稱公平還獻安養軍民十餘事所至采軍民利病以聞每念二親不就養請分俸給之朝廷宴賜或有嘉味美醖綵幣謹封識奉其親及得推恩於父母乃請告歸省賜楮幣為道里資其處內外親姻皆有思意姑二人早迎養于家撫其子咸底成立朋友鄉䣊以善相與恤困窮化橫逆皆可稱道家食時買夷僕一人蓋嘗盜其酋長馬者及事覺酋長求僕殺之以三人易㒒君竟不與素甘淡薄言不及産業撰家範一編教戒子孫所著詩文有嗚佩集藏于家壽止三十七卒以宣德甲寅春二月二十四日季賔封如其官母陳氏封太孺人配黃氏封孺人子男四人曰吉安曰某女一人在室正統元年冬十二月二十一日葬其邑靑岡原銘曰駟馬高車萬里長途中道而仆其命也夫其命也夫
