  text: 皇明文衡卷之二十三
  hash: sha256:e14c1416652fb121e2efcd9836cc37962db4f7ea9ba0cf2ec688fe779ff280f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_023-1a}
body:
  text: 䇿題國學公試䇿題八首蘇伯衡問爲人君者莫貴於勤莫大於㫁莫難於信其臣周文之日昃漢宣之勵精秦皇之程書隋文之傳餐同爲能勤也而或治或亂不同焉晉武之平吳憲宗之取蔡符堅之南伐宋文之北討同爲能㫁也而或興或亡不同焉秦穆之於孟明漢昭之於霍光燕噲之於子之德宗之於盧𣏌同爲能信其臣也而或安或危不同焉學者之論事推具未至之理難爲說而扺其已徃之跡昜爲言請陳此十二君者其始何得何失而其後効相反以備請問之及襲其所以成而改其所以敗庶有取也問能稼而能穡斯謂之良農能獲而能烹斯謂之善獵能開邊而能安邊斯謂之優於爲國故漢收河北兵不再興唐復河隴来甞出師今西蕃朔漠之地秦漢唐宋之所不能有者我國家談笑而悉取之矣伊欲使戎狄賔服不敢南向而牧馬洮隴幽薊之民日不覩旗旐耳不聞鉦鼓而安於耕鑿必有良䇿二三子其悉陳之問井田也學校也禮樂也此王政之大者也爲法雖不同而先後常相資顔淵問爲邦而孔子則以四代之禮樂語之滕文問爲國而盖子則以三代之井田學校告之然則此數者果可偏廢歟夫爲治未有不本於古而可行於今者也孔孟所言具在方冊其設施之次第願推言之以聞子上問羲和之典曆后䕫之典樂臯陶之典刑益之典鳥獸棄之典稼穡皆守一職終其身焉近世仕者一人之身而兼數官者有之一歲之内而歷諸司者有之豈其人皆賢於古人而措諸事業者無施不可歟將徒知計班資之崇庳而恥於効一官歟抑拘於數易之制而材有不得盡歟夫唐虞之時洪水方大天下可謂多事而當其時事無不治今四方大定非有難治之政而當世之務往往廢滯夫安其分而專其智能於一職與夫急於進取而無常職其得失亦可見矣居今之世而欲復古之道如之何其可也問常衮之居相位也選舉不自專一命已上皆付之定法可謂盡公無私矣而賢愚有同滯之譏崔貽孫之居相位也未一年除吏八百多其親舊可謂出乎法制之外矣而當時有得人之稱後之宰相以常爲法乎則渉於避嫌以崔爲法乎則近於專權專權致威福下移之謗避嫌失竭誠狥國之義而謂賢相爲之乎夫古之賢相孰有加於伊尹傅說周公召公者乎伊尹則敷求哲人傅說則旁招俊乂周召則明揚俊民旣不自以爲嫌而其君亦不以爲疑是果何道歟爲相不師伊傅周召顧自處於常崔之間抑可不可歟請爲之說問在朝言朝在野言野在學校而言學校可乎有虞胄子之教專之於后䕫成周國子之教總之於樂正則樂豈非尤學士之所當重歟後世何以希闊而弗講歟古者興師其出也受成於學其反也獻俘獻馘於學則兵豈非亦學士之所當知歟後世何以忌諱而弗談歟所言者無非天人性命之理而栺六藝爲器之末所習者無過記誦詞章之間而視六德六行爲空言後世之學校果三代之學校歟夫何佻㒓城闕則其習至于今而尚存成材就實則其人質諸古而有愧豈非學校僅以著令而存其教養之法已踈歟然六舘三學之士或叩閽上書而挽留先生或倡明大義而不汙僭僞或指斥權臣而竄責不恤亦甞見之而君子以爲盛事果何以致之歟其豈所謂不待文王而興者歟國家建首善之地于京師二三子逰焉息焉豈惟稽往行以自鍳擇善者以自從而巳凡古法之當施於今與今日之所當務者極陳之以脩舉缺陋使教道興而人材盛亦有司之望也問榖爲六府之一農居八政之首是故爲國先務未有或先於訓農者也今天子毎歲孟春躬耕籍田以率天下之民郡縣之長吏皆兼勸農之職重農亦去至矣是宜事本業之徒什伯於逐末作之軰也而田里之間地有遺力而民多遊手何歟將盡驅之縁南畝歟則井地之法未易復限田之制不可行何以給之不爲之禁歟則國家之調度一切取贍於有田之家不能無朘削之病而橾竒贏者顧安享厚利將見背本而趨末者滋衆品調消息之使農民無所傷而逰民無所利其道何由可得而聞之乎問商書曰事不師古匪說攸聞周書曰不于古訓于何其訓是以夏商周之有天下其損益者有之而所因者猶一日董仲舒以謂質文有改制之名而無變道之實者是也自秦人廢古而先王維持天下之大經大法蕩然無復存焉者矣漢興掇拾於煨燼之餘其豈無一二爲先王之舊然自秦迄今千五六百年時君世主𥘉未甞諄諄然取法之爲務也而不害其爲有天下有天下而最盛者莫過漢唐漢之法大抵襲秦唐之政一切因隋而其治則皆幾乎三王乃若新莾之復并田宇文周之復六官可謂篤於師古者矣而無救於其昏亂敗亡何秦隋之制可以傳遠而先王之法度顧不可以垂憲歟夫豈高帝之大度文帝之仁厚宣帝之勵精太宗之英武乃致治之資而莾之惡宇文之庸固自有取亡之道歟將善復古者貴求其實而不貴慕其名在得其意而不在泥其迹歟不然豈所謂世殊事異不相沿襲者不誣而商周之書乃虚言歟幸推明其故
