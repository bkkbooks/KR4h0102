body:
  text: 記謁周公廟記王褘洪武辛亥春余還自西垂以閏月二十五日戊寅至𡵨山縣明日謁周公廟廟去縣十五里出城循澗水西北行至山下乃折入山之腹而廟在焉至是四面皆絶壑峭壁其間平地東西僅五六十步南北如之而稍修形勢殊幽阻廟東北十數步有靈泉出巖石間即澗水所從出也廟之建莫詳其所自始按碑記唐太中二年鳯翔府𡵨山縣鳯棲鄉周公廟出靈泉則廟祠在唐之前當巳有之金興定五年有道士市其廟作道宫縣令李守節正其罪鳯翔府録事判官遊淑記之甚悉元𥘉廟盡廢至元十七年李忠宣公德輝行臺陜西欲起其廢而有司力不逮乃請終南重陽宫李天樂真人重建既成其徒就守之今廟是也厥後陜西部使者孛木魯翀言周公先聖在唐與孔子同廟祀天下今乃令道家者流主祠事非所以崇聖道昭禮典若立書院俾儒者主其祠為宜元統三年命下如所言賜額曰𡵨陽書院始置學官弟子員春秋致祭禮如祀孔子元未天下亂儒者皆解散書院燬于兵廟幸獨存而今守祠者仍為道士矣廟始未可槩見者如此其廟中為正殿奉周公東西二小殿以奉太公召公東北别有小殿奉薑嫄凡廟之儀與冠冕佩服之制皆粗鄙不合禮又正殿前有戲臺為巫覡優伶之所集而殿中列以俗神野鬼之像尤極淫怪余因嘆曰周公制禮作樂以憲萬世其沒實祀以天子之禮樂今其廟制乃若此世人不知禮一至是乎不特此也以余考之周公之稱因以太王所居周地為其采邑故也水經𡵨水之南有周城周公采邑也杜預云周城在美陽縣西北帝王世紀云周太王所徙南有周原也周城今為𡵨陽鎮其城故址猶存廣袤可七八里四圍皆深溝實在今𡵨山縣東北五十里正太王所居而周公食采之地也然𡵨山縣西北十餘里其地曰周公邸地形頗平衍意者周城乃公采邑而其居邸則在此歟或乃謂今廟為周公故所居地且其址既阻隘路衢尤險狹周公以家宰之尊何得而居此殆後人即此建廟故遂􅓎指為公所居位耳而近時暢師文作記謂周公采邑廟即其地者非也舊碑載大中二年十一月一日周公舊祠有靈泉巳枯竭一夕大風其泉五處一時湧出守臣白鳯翔隴州節度觀察處置等使銀青榮祿大夫檢校尚書左僕射兼鳯翔尹御史大夫安平郡開國公食邑二千戶崔珙奏其事朝廷因賜名潤德太中乃唐宣宗年號崔珙所帶銜位正唐制而其表奏制答等文又唐體而近時孔克任作記謂為宋大中時太守珙者亦非也世傳靈泉每世治則出世亂則竭故眉山蘇文忠公詩有與世窮通之語自唐太中二年出後後復竭至宋雍熙二年復出金未復竭及元至元十七年復出其後復竭而復出於今其出也所灌溉甚廣人賴其利舊碑載大中二年賜名潤德而湘山野録以為雍熙二年賜號要當以碑刻為是是日從余行者儒士安矩季方詣廟拜謁畢出坐外門荒墌上道士持酒來餉為飲數小巵適雲隂雨微下風起撼群木響獵獵如秋聲恍疑風馬雲輿來涖者因低回久之乃去比回縣館以廟制與禮不合者語其令李本初屬其稍皆釐革李以縣事繁劇辭余不復與言而具疏其本末及前所云云者紀之於簡以遺矩用志歲月焉寫易軒記去淳安縣治北五里山巒廽合其地曰石峽有方氏之居焉方氏在宋季有以倫魁致位禮部尚書者學者稱之曰蛟峯先生宋亡堅卧不起而推其所學以淑諸人因即其居為耆院尚書之曾孫以愚實世其家學且蚤擢世科仕郡縣入為太史屬當運去物改之餘亦復遂其髙節而無愧又去石峽北五里珠佩峯下結屋居之去人境益以遠學徒有執業來受教者弗拒也此其進退出處庶幾有合於易道之時中者乎太史晚益好易嘗即寫易之軒而以寫易名之禕之先大父昔嘗主教於書院交方氏也久於是太史以契家故屬禕為之記昔者竊聞之易之為書廣大悉備四聖人精神心術之所寓者何其微也然而有先天之易焉後天之易焉要其畫卦重卦之義固不同也是故隂陽竒耦積成三畫而為八卦此先天之易也故曰太極生兩儀兩儀生四象四象生八卦是畫卦者積隂陽竒耦三畫而始成也八卦之三畫既以成列復重以本卦之三畫而有上下二體既又相錯相蕩而六十四卦互成焉此後天之易也故曰兼三才而兩之是重卦者八卦之上復加八卦而非三畫之上遞加一竒一偶為六畫也邵子之圖以乾夬至剝坤為卦之次第雖與易經不合然實自然之序若其所謂八分而為十六而為三十二而為六十四者斯蓋使人觸類而仲之以見易道之無窮而申卦之義不在是矣然吾朱子乃有取於是焉則後學之不能無疑者也雖然盈宇宙間皆太極之妙而人物得之以各正性命然則易固我之所自出者也故求易者在乎內反諸心精體而實踐之以會夫體用之一原顯微之無間固不必惟文字之為泥也邵子之言曰先天學心法也萬化萬物生乎心也此固易之本而聖賢之所謂學者歟太史之居於斯也觀象而玩占心之所契必有得於文字之外者而余何足以知之姑疏所聞以求質請遂以為記焉新鑿惠澤池記杜斆潞為州屬縣六壷闕西距州治僅一舍域太行麓地高亢土峭剛而獨闕井泉利縣郭民會有力者掘井深倍九仞往往為石隔而不及泉間或及之水脈津津汲挹曾弗滿瓶其勞於遠井直抵州境洎他聚落乃至積雪窖鑿冰壑給旦夕用以故其民不免有飢渴之害者洪武丙辰閏九月三山郭公來丞是縣興利除害政教以行憂民渴飢不啻猶已越明年丁巳春正月乃會羣吏屬耆衆而謀曰縣治南關故池爾衆向集雨潦第以浣衣飲畜今汙壤淤塞棄同無用我將即農隙借民力是鑿是浚候雨西郊奫泊泓澄惟供飲食可乎衆乃舉手加額同口一辭曰何民生之幸於是上於州司而允其請乃卜日召集近縣郭民畚鍤齊興不旬日而池成其漘則護以木柵而防崩嚙之患其岸則繚以垣墉而限汙穢之雜坤隅為閘兩壁翼張而鐶板橫施俟大雨流行則起之以石硤注瀉而入水艮隅為門兩楹山峙而扄鐍堅設令衆人汲浥則開之由石級下上而出水廣則呀焉窪焉廓其有容殆如天造地設深則瀇然滉然昧其不測宛若陽闢隂闔於以免往復遠汲之勞於以慰飢渴燥吻之思衆請其名則曰惠澤蓋取語云因民所利惠而不費之謂嗚呼旨哉嘗稽易大象澤無水則曰困澤有水則曰節夫澤水有無其卦則為困為節猶池之廢興其水則為潔為汙今池轉汙為潔猶卦反困為節既變通以盡利復推行以為通乃因天之澤為地之澤以地之澤為民之澤公可謂能體易以利民者矣且古之為國者惟水事為重故有障大澤勤其官受封者公既陂大其量淵深其學由是將為州為府而登庸於朝澤加天下則惠利所及其源深其流長而或可以涯涘哉縣南坊耆衆某輩請文刻石而紀功績以示永久俾勿替公名柏字永齡由進士擢濛陽簿今為壷關丞華川書舍記趙汸婺州義烏縣有澤曰華川王君子充書舍在其上同門友宋君景濂歷敘上世以來為文者之失得而卒歸於聖人以為記辨博精詣殆不可加矣邇者汸與子充相見於錢塘子充又俾汸申其説既不得終辭則以復曰聖人之文非一家之言也昔者成周盛時帝王制作大備其載諸方册以垂軌當世者謂之經若韓宣子適魯所見其類矣詩采諸民間䇿書辭命職在史氏未嘗使學者執筆習為之也吾夫子順先王詩書六藝以設教而學文之訓門人識之亦曰考觀聖賢成法以盡其職分所當為者而已蓋自一身以逹天下彌綸益著而非外求由小學以底大成品節愈嚴而無二本成德達材之衆率由於斯而徒以文學稱者非聖人意也是故夫子嘗刪詩定書贊易修春秋以為萬世明法而必曰述而不作曰吾從周則豈以言出於口者謂之文哉戰國爭強道術分裂則一家之言興而異端起矣自茲以來吏治不足繼以武功而為國者始思息民以黃老經義未明流為箋疏而反身者唯知洗心於釋𣑽由是馬班崔蔡之倫以文名家凌厲縱橫浩不可遏而先王經世之術微矣賈誼董仲舒掇拾於殘闕而莫之行諸葛孔明范希文鞠躬盡力而未足以有明也舂陵河南大儒繼作然後二帝三王所相傳授者始煥然於時關中張子因之崇執禮之教精思以致道修辭而斷事以一鄉而準天下考三代以示方來卓哉學者之楷模矣逮新安朱子繼周程之緒大明經訓以覺斯人而浙河以東若呂薛二鄭氏取周公舊章離析錯綜如示諸掌學者於斯得窺見聖人制作之盛焉然當是時陸子靜氏起於臨川以其得於心者行乎家邦充然自足而諸君子之志荒矣薛鄭會歸於朱子而呂氏則無間然陳君舉薛之徒也乃自以書請益於陸氏此又論先哲於鄉土者所宜愼思而明辨也况夫有志於斯文者乎子充早受業於同郡學士黃公黃公之見於文章者嶽靜淵澄不大聲色固非欲以言語文字名世而子充明經潔行卓越不羣因鄉先生精神念慮所存以端述作之本原極古人之能事必有徴矣則雖俯仰一室而所以系吾徒之望者何可量哉浙東多文獻故家他邦莫及昔豫嘗欲往遊而未能異時考德會文之樂舍華川奚適乎共學齋記后王降德之道不明士君子能反諸身以為學者千百年來大略三變以復于古而異端不與焉處汗濁之世不忍自同於凡民而又患夫資之不足也於是乃有佩韋弦以矯偏運甓枕圓以驚惰晝有所為夜必焚香質於神明念慮善惡之萌必察焉而各以其物識之以觀其消長蓋動心忍性不如是不足以有立於時則自知也亦明矣於是有君子者出主忠孝以飾其躬以匹夫而立師道使在三之義赫然白於天中後有作者不敢忘焉其視專一善名一行則又遠矣於是又有君子者出以其得於天而成諸巳者本經訓以淑斯人使先傳後倦之教下學上達之旨復明於世蓋秦漢以來學術多矣至是始歸於大中可謂罔極之恩矣自其教行高明特達之士翕然歸之然其間善學者乃復因其性之所近端居默識以極夫反巳致曲之功而後傳之無弊則君子之學夫豈易言也哉汸學於古人而未之能進竊懼夫氣昏力薄不足以底于成乃題山居讀書精舍之西室曰共學與同志者居而勉焉噫人固與庶物並生者也苟無以反之則情熾利害之間將無以自别矧學不至於知至而意誠其氣機之竊發者每起於芒忽而天理之存焉者寡矣彼憤悱堅制高邁卓絶以自拔於凡行者亦何可少乎易曰智崇禮卑智崇效天禮卑法地聖賢之言無二致也羣居終日而義有不出於此者何足道哉乃書之以為共學齋記櫟軒記鄭之恆僑居黟水之南烏聊之北題其隙宇曰櫟軒其言曰櫟不材木也無所可用是以能終其天年吾聞之莊生云居無何大夫士為詩文以釋其名軒之義者甚衆言人人殊之恆不懌以其間曰之黎陽山中見支離無謂而問焉曰吾以櫟名軒而人鮮能喻吾志者言之輒異何也支離無謂曰子無惑乎人言之異也世之所重者材也而子獨以不材稱材之所貴者用也而子獨以無用全子無惑乎人言之異也雖然生之有壽夭豈材不材之謂哉深山之楩楠豫章閲干百年未有過而問者道旁之樗櫟未拱把而夭於斧斤其所託者不同也夫櫟之不材猶樗也櫟以社而存猶樗之以神也社有變置而舉或廢之則樗與櫟豈能自全邪謂不材之木獨能終其天年非莊氏意也彼莊子者悲夫世俗之士以材為纍不若不材者之無用也故為是不得巳之言又悲夫不材者亦有時而不得免也將自處於材不材之間然材不材之間似是而非猶未免乎纍也則夫可以害生者豈惟材哉邦君之於國也聖哲之於名也皆纍也彼且欲魯侯灑心去欲而遊於無人之野使仲尼辭交遊去弟子而逃於大澤其憂患乎一世者豈有涯哉嗟夫亂世多害智愚賢不肖俱困而莫知除其憂此夫人所深悲而非為一巳之私也子之不材自處豈其意邪曰然則莊氏昔所謂者非邪支離無謂曰莊子固嘗言之矣其所保者與衆異也且子亦嘗聞所謂物之初者乎遊於物之初則不物於物不物於物者益之而不加益損之而不加損天地蘧廬也古今一息也死生夜旦也虎兕無所措其瓜甲兵無所容其刃無傷於物而物亦莫能傷也是豈材不材之論哉雖然為櫟有道即子之居行子之志使董梧無所用其助而舍者爭席則材不材皆不為子纍矣又何恤乎人之言鄭之恆矍然而起釋然而悟曰善哉進於道矣雖然吾於櫟有取焉請書是説於軒中以為記梅花易洞記徐一夔山隂胡君龍臣居越王山之下環其廬植梅數十百株而日居其間讀易因名其處曰梅花易洞且曰昔五峯胡先生讀易巖廬自號易洞吾名亦奚不可然客來輒不解曰甚矣胡子之欺人也大山長谷穴而為洞嵌空㟏岈其上穹然而蓋覆其旁屹然而壁立其中廓然而有容蛇龍居之虎豹藏焉此洞也若五峯先生讀易之地似也今子雖依山為屋所謂嵌空㟏岈之狀無有也其屋規模不廣制度不華覆蓋其上者獨其枝若屈鐵之交錯其花若皓雪之燦爛所謂穹然屹然廓然者亦無有也非洞而曰洞甚矣胡子之欺人也余乃為之解曰獨不觀之儒先之圖乎天地亦一洞也豈直居室哉何也乾南坤北一上一下隂陽之宅也離東坎西一闔一闢隂陽之門也巽承乎乾而位西南震交乎坤而位東北隂陽之所以終也隂陽造化生生不息如循環然昔之至人心與造化逰嘗言弄環餘暇時往時來蓋以天地為一環矣夫洞環類也環非實環洞豈實洞哉是意也五峯先生知之矣胡君慕先生者也豈以弗知而欺人哉余竊聞之聖人作易本之隂陽見乎卦辭學之者將以見夫用善觀物者即微而知著即小而知大即近而知遠自一室而至於天下自一日而至於四時自一呼一吸而至於十二萬九千六百年吉凶消長之理進退存亡之道莫不悉備胡君誠有以知之無自善其身請以告我梁氏書莊記梁寅余山巖之士自少而好文籍逮乎中年稽古之益久窺道之頗的則又因多暇而好論著夫躬行之士不務於立言然恥沒世而無聞亦往往藉是今朝之初共承明詔陪諸搢紳議禮制獲觀大常所藏書逮歸田野十五六年之間索居無所為因思託之言以傳來世前讀程朱易以其釋經意殊乃融會二家合以為一謂之易參義於讀春秋也病傳之言異求褒貶或過乃因朱子之言唯論事之得失謂之春秋考義及歸老之後於書也以蔡氏傳之詳明而姑釋其略謂之書纂義於禮記也以其多駁雜唯取格言以類而分謂之類禮於周官也芟剔其注使其明暢謂之周禮考注於詩也因朱子之傳演其義而申之謂之詩演義又稽之經史以待䇿問謂之䇿要凡羣書之言則取其精粹申以巳意謂之論林憫時俗之失則縱論古道略示勸戒謂之耄言憚諸史之繁則撮其大要易於覽閲謂之史略復嘗類集古之格言芟取其要謂之類訓是諸書者或刻之以傳或繕寫以藏暨凡所得書皆聚之一室故號書莊焉蓋曰家之恆産寡薄使子孫能守是莊亦足以贍生非徒夸其多而已也凡人之生世必有禆於國必有益於民故為公卿為百僚為將帥為守宰又其下為胥吏皂隸為農工商賈皆不徒衣食必資其心與力以為衣食焉吾為士者乃衣食於人心不勤力不悴非敝民者耶所謂莊者田舍之稱也粳稻菽粟之所藏也吾無田以穫粳稻菽粟而所藏唯書子孫守焉無租稅無科需而學之成也又足以應上之求贊時之治是吾之不念子孫立産業乃所以深念夫子孫者嗟夫山之為石者有銀之礦而緑生焉有鐵之礦而朱生焉然則家之有書而後嗣之能學亦理之然也若夫有書而或怠於學者人也學之成而祿不及者天也為子孫者又當盡乎人而聽之天可也隘齋記徐尊生歙南洪節夫曩家小飛來峯下其先廬相去十里而近在杏坑之原故無恙也壬辰之變悉燬于寇越二年擾稍定流散來歸節夫以小飛來直通衢而其寬間深阻可以肥遁者莫宜杏坑之源乃即遺基去其蓬蒿瓦礫為茅屋若干楹奉母夫人以居敕諸子肄業其間材粗而制庳視昔日棟宇之壯丹刻之華無復得其倣佛而意趣幽野位置整雅望而知其為隱君子之宅也扁其燕處之室曰隘齋而謂友人徐尊生曰豫平生不能媚世容物亂離顚沛以來益齟齬於時矣故因吾室之隘以自名以見吾志盍為我記之尊生辭不獲則復于節夫曰道以中庸為至人鮮能之得其一節之偏以高於世蓋巳難矣若夫厲廉隅飭名檢波流風靡之中確然有所不為則隘者豈非制行之高者歟方􅐓洞之秋衆人眩惑搖動往往有之君獨䂃然不滓倡勇效順既乃屣脫功名深濳遠引於巖石之下非夫居常有得於隘而能遭變不可奪如是乎且吾聞之合於人心之公以為隘則固制行之高者也任夫一已之私以為隘則其弊有不可勝言也毫釐之間辨之弗審而善惡之歸相去遠矣古之隘者無過伯夷鄉人之冠不正則不能與之處讓國恐不遂其志則逃諌伐以不聽其言則隱而餓餓而死其隘如此然其所為皆關乎世教之大合乎天理之公朱始以己私參焉孟氏立論之嚴雖以為君子弗由而又推尊之曰聖之淸故為隘者必以伯夷為摽準庶幾其可伯夷奮乎百世之上吾從而興起於百世之下人心之公無古無今欲為伯夷是亦伯夷而巳矣以節夫居常遭變而不可奪觀之則辨之庸有弗審乎雖然弘道在人能大其所受斯謂之君子伯夷之行可尚已比之中庸之道有間矣由伯夷之行合乎中庸則致廣大盡精微粹然無疵而所謂隘者將不可得而指名矣君子之於道豈固以偏自處而不舉其全哉詩曰德輶如毛民鮮克舉之吾於節夫深有望焉朱氏春濡菴記朱廉義烏朱資安居縣南之剡溪既葬其親於所居東北之五里杏花溪之左乃築守塜之舍而署其名曰春濡菴春濡云者蓋取諸記禮者之言資安以告余俾為之記余曰善夫資安之為何其可羡也墓有舍而歲祭之士大夫行之久矣胡獨有羡於資安也嗟夫三代之世教化明備禮俗興行人自幼稚巳知事親之禮矣及其既長孝養之外他無事焉務以適其志務以安其躰務以善其甘旨而致其尊榮惟恐親之弗悅也既巳如此矣又懼其不可得久也惴惴焉而愛其日不幸而沒則吾哀戚之至若不欲生葬理必盡其禮而尸祝必竭其誠終其身而弗怠夫然故為人親者生則享其養殁則享其祭而無憾焉逮世教衰士習益下甚者視其親猶塗人其口能言也而未必聽其言其色可見也而未必視其色况能視聽於無形無聲也哉此其人蓋與夫羽毛齒角者不異其事生若此豈復有沒後之思而致其愛敬於墟墓之間哉今資安之思念其親吾想其心入其室則惕然感曰此吾親所構也吾今安居之而吾親安在哉稼其田則曰此吾親所闢也吾得粟而食之而吾親安在哉涉其圃則曰此吾親所築也吾得藝吾麻而吾親安在哉覩其妻子則惻然以感曰此吾親之授我以室而延吾嗣也覩其兄弟則曰此皆吾親之子而吾同氣也視其身則曰此吾親之遺躰幼而育長而教以望其成者也今吾與其兄弟妻子具在而吾親不可復作終吾生不得見矣一念之感未嘗不太息流涕不能自止况夫氣序之推移時物之變易徂暑未幾而繁霜巳肅改歲未久而雨露巳濡倣徨丘隴之間戀慕松柏之下一觴一胾庶幾享之其情為何如哉此其視流俗何如而余烏得不深羡之哉况又徴文於豫將刻諸石以圖永久是不獨盡其一身之孝思且將使其子孫繼續於無窮尢有過於人者余故為書之俾世之弗及者有所興起而其後亦毋敢怠忘也資安善事其兄即余向時為作義軒記者皇明文衡卷之三十
