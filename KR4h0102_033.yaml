  text: 皇明文衡卷之三十三
  hash: sha256:b01cdc682f909fe802807509f83248942930fb45882328447d5bc5567c69d2d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_033-1a}
body:
  text: 記滇南慟哭記王紳先公以洪武五年正月奉使雲南招諭元梁王六月抵其境六年遇害至二十五年不肖孤紳竊祿西川屢請于蜀王殿下二十八年冬得旨十二月朔日戒行次年二月二十三日到滇次日參見岷府退謁藩閫文武大臣及土人士友並以情事為告聞者閔之競為咨訪二十五日有𤏡人畫工何仁可年七十餘來言親炙先公於佑聖宫甚久至繪素之事亦多經指授且云初來時梁王甚加禮敬府僚大臣若司徒逹里麻參政喻金閭高撫慰輩尤所尊重凡見梁王必以天命所歸人心所屬之理為之開説退諭其臣僚尤加委曲梁之君臣亦知元社已屋皆有降意時元之孽主逋逃朔漠者遣侍郎脫脫自西蕃來通耗索援且劫以危言必欲殺我使以固梁王意梁王不忍遽絶於我朝乃匿先公於民間脫脫聞之誚曰國家顛覆而不能救反欲遠附他人邪躍馬而起梁王不得巳遂出先公以見之脫脫欲加屈屏先公慷慨罵曰天訖汝元命我朝實代之汝如爝火餘燼尚欲假息以與日月爭光邪我將命遠來豈為汝屈今惟有死而巳或解曰兩國交爭不罪來使不從則遣之彼何罪焉况王公才器天下無雙宜有以全之賊脫脫曰今日雖孔子在義不可留梁王不能救先公復顧梁王謂曰汝朝殺我大兵夕至矣亦不聽遂遇害時為臘月二十四日未申時蓋𤏡人以此日為節日故久不忘也諱日城中父老士女莫不垂淚逹理麻既陳奠祭左右具衣冠殮之以禮即日舁至地藏寺北漏澤園化之以火諱所則今之觀音寺前三市街言訖引至漏澤園劈踊設奠是夕宿地藏寺自此連日至彼展哀至二十七日紳别訪南關董金剛保以合其説蓋以先公嘗主其家故也金剛保亦引至觀音寺前栺以諱所號慟間市人競來至問中有蘇奴者前言棺木實其家所備蓋其兄慶時為元帥故逹理麻一以後事委之其言遺事略與仁可同但奴則云火化在小南門城濠邊復引至歷指其處哀未止有僧從西來自云年百歲口述遺事甚悉紳拱問化後遺殖何在僧言彼時上下恟懼誰復道及此者三人之言遺殖並同自是士民僧道多來稱述先公容貌言行嗜好製作動靜僕從皆可稽但無能知夫葬所者因姑設次為位於地藏寺之東夾室越明日漏四下陳設於寺門外告祭于雲南府城隍里社寺伽藍等神備述情事之由禮畢奉新製木主就觀音寺前諱所盡哀題禮畢迎回地藏寺位次昧爽行正祭禮先是布政張公紞參議范公祖嘗訪先公節行於臨安儒士賈寬寬逹理麻門客也故獲侍先公最密因言曾有詩見寄可考暨紳至張公即命迎寬三月十日寬至所言與前頗同乃云化後逹理麻巳使葬于地藏寺之旁後十許日寬往哭之止見平土而不結丘壠自國兵來陵谷變遷巳不可認迄今犁鋤荐臻屋廬相望想像亦不能得其倣佛也寬又云先公前館于報國寺後因賊脫脫至遂移館于春登楊氏家平日杜門不接人事惟讀書著述有文集二大册逹理麻録本藏于家後併原藁不知何在寬年高質重所言似非虛妄者又沅士鎦有年近見宜梁民李鉉鉉自言其父起宗為元樞密院都事好士而知書曾延先公於家甚久後事皆其經理今幕所惟鉉知之有年前任沅庠時常接見先公故聞之甚留意越半月紳至滇有年即來告且為書招鉉十一日鉉至口述遺事亦悉又舉先公題其竹軒三絶句遂導至兀兒朵東門外之百步指羣塜千百而言曰大略記在此處而羣瑑盡遭發掘無遺者紳見其年少不敢盡信又見頗能記憶亦不敢不信遂於其處仰天大慟次日於羣塜旁擇曠地仍設次為位迎神主陳祭祭畢復奉歸寺之元次越十日奉神主而廽嗚呼哀哉紳之初志鋭欲䚮求遺殖歸葬先壟以襄大事不幸歲久事殊以至此極雖粉身碎骨亦不足以贖其辜他日何何靣目見先公於九泉哉劈踊之餘因忍死備記于簡以志不忘終天之恨且使後世子孫有以知其茶毒嗚呼痛哉潞州廟學記孔克表惟潞州古上黨之域盤據太行抗勢高爽為天下樞自昔號重地其俗尚朴儉其民力本喜文學州治南四里為孔子廟左為學元始建國州倅崔亶始經營之至元十二年乙亥知州事陳伯福繕葺而增廣之至正之季時丁用兵弗遑文教之事廟與學俱圯不治皇明受命萬世砥寧乃具設教條置師弟子員用修學校之政郡邑奉宣德意罔敢弗欽洪武七年夏五月同知潞州事張侯實來袛謁廟下惕然曰正化之行繄學校是基而宗祀孔子者實教之所自出也故制下窄且多撓敗甚弗稱崇重之意盍亟圖之衆皆曰然第瘡痍甫平公私膠轕幸少假焉既二年會蠲租令下民用以𥙿侯詢諸判官馬侯吏目王均暨鄉之耄艾僉以為可于是伐巨材琢貞石裒集衆工盡撤其舊而更構之中為殿八間象厥正配以及十哲左右廡各二十四間繪從祀羣弟子及歷代先儒于壁兩廡之端立屋六間闢中東西門而樹戟于其外門之南對峙齋宿之廬合十二間又南作高門三以應靈星廟之東别築論堂以為講肄之地直齋翼如學徒而處櫓樓屹如書册是􅍥都為間復四十又四至于廪食之室烹飪之所教官講師之居止前後布列靡不完固繚以周垣徑以修術甃以瓴甋塗以聖丹侐然靚深廓然宏敞經始於四月辛丑訖功于九月丙寅落成之日侯率寮寀儒師行釋奠禮既而合宴干堂鄉老寓公屬縣之吏逢掖之士咸大和會咄唶而相謂曰洋洋乎盛哉古者建國君民教學為先侯其知先務乎非有述焉將何以考引侯德而掖民于道也乃相與謁辭刻諸石克表惟禮凡學春官釋莫于其先師秋冬亦如之當是時學者非其師弗學也非其學弗祭也學校既廢天下莫適所宗孔子集羣聖之大成仁義禮樂之教垂於萬世之逺通祀于學於禮冝矣朝廷釐定祀典凡廟食之神淫名僭號一是刋削惟孔子諡爵仍其故所以崇聖道正人心而相世教也邦之人士入學鼓篋當淬勵刮劘以克廣其德業退而家居為良士君子焉出而世用為名公卿大夫焉誠如是不惟無負於國家而侯之志亦庶乎其遂矣不然羣狎朋嬉廩栗是耗懵不知明體適用之要又豈侯之所望哉侯名三同字大亨世居阜城家于吳𥘉舉進士擢白水縣令治最諸邑佐州再暮其行事槩可稱述獨此關於治體尤大云皆山軒記胡廣國家建太僕寺于滁陽以總江淮羣牧之政聖天子蒞祚尤重其事乃遴選賢能授以是職吳侯鑑以將家子魁傑負才氣擢為太僕寺丞治事有法率以古之君子期待不肯為苟且之政比年馬大蕃息公私優𥙿侯尤好學于公退之暇即賦詩寫畫自娛嘗于官署之偏築室數㨕為宴休之所引釀泉為渠紆流于外舉目而望則豐山琅瑘諸峯環列遠近發竒吐秀隱見于煙雲杳靄間而朝暮之景變化無窮乃取歐陽公之言名之曰皆山軒徴豫言為記滁之山水名大著于天下後世者蓋自歐陽公始也公為守于滁築亭于山水之間日與滁人逰而樂之顧望清流之關思宋太祖嘗破李景兵十五萬擒其將皇甫暉姚鳳于滁東門外求其迹蓋百年之間故老已盡漠然徒見山高而水清而當時得以樂其樂者伊疇之力也滁人蓋未必知之而公與之言忠厚之至也豫惟今之滁非可同于昔日我太祖皇帝龍飛淮甸由滁陽而基席業呼吸雷動羣䇿響應英雄蕩滅滌磢百年腥羶之風盡復衣冠禮樂之舊神聖功德與開天闢地而同其盛豈但平一城擒一二將之足擬哉昔者滁當干戈之際為用武之鄉今為邦畿千里之地而凡得以居其間者顧瞻山川仰思太祖開拓平治之功而當時故老猶有存者皆能道其盛也况草木雲霞蔚蔥炫爛五色之氣凝為龍文結為鳯彩霓旌翠華儼乎在目而向之徒見山高而水清者漠乎其微矣又烏知有待於今日之盛也哉昔有覩山河而思禹迹者禹之功盛大故人莫能忘我太祖功德卓冠萬世天下之所仰賴而人心有所不忘矧侯居官是邦優遊無事以樂乎雍熙太平之盛其所以感慕之者宜何如也豫知侯之修其德而勤其職思以報夫國家生育之深仁庶幾侯之心矧侯之父兄皆攀鱗附翼以取功名侯又當思振其家聲異時忠孝之名有所聞焉則是軒與滁陽山水競光華於久遠矣豫竊幸與侯同其遭逢之盛是以惓惓焉為侯道之也遊陽山記永樂三年秋八月皇帝因建碑孝陵斫石于都城東北之陽山得良材焉其長十四丈有奇闊不及長者三之一厚丈二尺色􅉳澤如􅃮無疵璺廷臣往觀之且相其制度之宜時諸臣往觀畢越九月戊午特命翰林臣往觀於是學士解公太紳侍講金公幼孜暨廣偕往已未早朝罷由朝陽門出過十里鋪鋪外人家夾道連續而居間有市肆直抵滄波門門外隔平疇山蟬聮起伏即城中所見諸山也山下煙林村落遠近映帶耕夫餉婦橫縱隴畒有刈禾􅎟者有登禾􅎟于場者有挽車以載者有汲以灌畦者有剃草萊者豫三人觀其作勞徘徊久之見田塍畔繫一舟田間水與大江相通故有舟然乎疇曠野見此一舟亦自奇絶水之上有古石橋頽其半石墮塞橋下人取便從下行橋上草甚深橋西北有土溝問之溝傍人云國初取土築拒馬墻就以疏墻內流水由拒馬墻折北而行至麒麟門門額前中書舍人詹孟舉所書麒麟門折東而行五六里漸多坡陀幼孜與豫乘肩輿上下山岡輒相與步行以息僕夫之力解公騎行常先一二里許不見豫二人來輒下馬候又東過一長阪阪下路岐而二一依坂足少折而北一下田間少折而南豫將循坂足而北田間人呼曰南行南行遂遵田畔折入小村市東山麓度坳入谷行長稜十餘里始至陽山山下草苃數百餘間以舍趨事者樊其周圍作門二通山之上下入門百步有井一方小石池二水甚清出門上百步許有井一云其下舊有泉因甓之以為井井之外有深坑平山上土石填之舉石者邪許之聲相應仰見碑石穹然城立豫足力稍疲倦心急欲觀之雖疲亦趨而登至其下三人相視驚愕不巳嘆息所未嘗見謂天生此石以有所待也山高數里其體皆石其旁巉巖不便登陟從碑石之左攀躋而上一人引手一人下推又躋一級漸至山頂石如礬頭者窅窊者竅而通者高者下者險不可履作蟻緣而度漸過碑石之右稍平可行余將俯觀心掉股栗目眩不能下視獨解公登石立久之余坐息定更踰山頂數十步望見長江數百里隱隱而來舟帆上下如豆江北諸山淡然於煙霏霧靄間杳不能辨山近東北二峯峭拔如削即都城東門望見二峯靑翠高聳者山之南有舊塜相傳曰葉丞相墓按金陵志葉祖洽墓在宣義鄉即此是也祖洽熙寧三年廷對第一官至徽猷閣宜學士太中大夫政和七年終于真州奉勑葬此蓋葉丞相者相傳之誤也南望鍾山一峯上于天際秀立如玉笋都城萬雉紅光紫氣蔚蔚蔥蔥結為龍文散為霞彩誠萬世帝王之都也日過午下山回至小村市望見樹林隂翳中一徑沿澗上兩傍皆松柏有古寺甚牢落梁本業寺也創於天監九年五代時碑刻尚存有古桂二株其本枯朽其旁枝復拱抱又將枯矣疑與寺同植者從旁入一小軒軒外多竹其南有古井水滿而清汲以烹茶味甘洌乃命酒酌軒中酌罷復尋寺前小徑轉登寺後山山多石石罅多棘刺行則鉤衣以手蹇衣去地尺徐行至一巨石上坐息眺望少頃從山脊下至寺已昏暗取酒燈下更酌别入一小室坐久始就寢山空夜涼寂無人語但聞蟲鳴唧唧窗外落葉摵摵作聲余久不能寐地志云謝靈運墓在寺近欲待明訪之叩僧不知其處庚申旦離寺由故道入麒麟門緣鍾山麓而行午至靈谷寺觀當時善畫者圖雪景海水于壁寺僧出東坡詩翰有元諸名公品題并宋璲篆書金剛經觀之至暮而還廣自惟以匪才際遇明時荷聖天子寵眷置於侍從優遊禁闥無所禆益夙夜悚懼况敢為睱逸之事乎屬聖天子致孝皇考樹石園林昭功德於萬世量其制作不敢以忽故三事大夫及百執事咸得賜觀廣幸從二君子之後徜徉於山水之間凡目之所見耳之所聞與夫一草一木之微無不可樂是皆聖天子之賜也烏可不知其所自遂執筆記之皇明文衡卷之三十三
