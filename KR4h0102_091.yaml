  text: 皇明文衡卷之九十一
  hash: sha256:932b3d5c946370edeeb301034c5d3c1e975c715d1643226dc93db01c07ffabce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_091-1a}
body:
  text: 墓表元故孝友祝公榮甫墓表宋濂濂嘗奉詔總修元史凡天下有關史事者下郡國長吏博加采輯悉上送官往往吏非知書者以致龐雜淆亂不足以取徴孝友之人動至數千皆溢浮辭而乖實行濂令史官高啓撰次成編而親為筆削之唯存一百六人皆灼然可以勵丗惇俗者而處之祝公榮亦其一焉婺與處雖連壤不知公榮之詳後七年公榮之子崑持所狀群行求文表諸墓道蓋公榮之殁巳十八年矣狀之稱述皆傳中所略者遂次第而序之公榮諱大昌公榮字也居處之麗水官橋里姓祝氏祝出軒轅氏之後至周武王時封彭祖遠孫光為祝侯子孫為齊所拜故以祝為姓歷代多有顯人具載家牒可徴也五季𥘉有諱實字茂之者自信安來為處州判官遂遷焉壽九十二以殁葬宣慈杉坑之原實生中奉大夫縝縝生朝議大夫儒儒生承議承議生允懷允懷生况况生宋紹聖進士建州司理參軍奕奕生公冕公冕生份份生武學教諭天祐天祐生潭州司戶參軍䛬䛬生之琦之琦生紹紹則公榮之父也公榮孝友出於天性其在父母側容色穆穆以和父母意有所𣣔先候知之不待出言而事已集一日不見心惶惶焉若亡重寶得一甘味雖在百里外必歸薦之然後敢食母病晝夜錬樂奉淖糜以進衣久不脫蟣蝨叢生其間已而疾勢革走謁於群神且泣且禱語不成聲見者為之揮涕及母殁劈踊無算屢至殞絶其於復襲楔綴斂殯奠祔之禮悉遵古制而不墜流俗之陋煬人不戒火起竈突間煙𦦨漲天公榮於急遽中力不能救乃伏棺而悲號且曰天乎吾母在斯幸天有以祐之天苟不祐我將與母俱焚誓不獨存也其火忽自滅州里嘆異曰昔蔡順伏母棺而火滅不意今日於公榮見之公榮既葬母朝夕翹首如有望而弗至既而曰是終無以解吾憂也乃命工搏土肖二親像於堂朝夕事之如事生焉公榮敬兄公亮如其父家政大小必關白而後行公亮出仕公榮不敢中席而坐恆若公亮之臨乎上其弟公直亡公榮奔視遂頓仆于地良久乃蘇抱弟尸而大呼曰吾弟去吾而何之乎悲悼過甚髮為之早白撫弟遺孤逾於已所生公榮孳孳以同㸑為政請于公亮建家範數十則令子姓分任諸事視其勤惰而懲勸之每旦序食堂上氣象雍肅若不聞人聲三世之間愈愈如也或者𣣔間之説其分財公榮勃然變色曰此言何為至於我哉必吾不睦于家不敦友恭之道故爾昔張公藝尚九世義居况親昆弟乎苟計利而害義犬彘當不食吾餘因撫膺長慟言者赧然而退故處之人士言孝友者一則曰公榮二則曰公榮至今無間言云公榮風岸偉特善談史上下二千年治忽幾微如指諸掌聽者忘倦尊賢重傳未嘗有毫毛褻慢意平心率物好惡無所偏徇而尤好施與故舊貧寠者周之死而不能棺者給之或丁歲儉下粟估糶之靑田盜阻行舟民不能鹽食公榮出所儲鹽惠宗族親姻以及於閭井人皆德之當元之季四方用兵藩閫大臣多鈎致豪傑而布衣之士有談笑取將帥者聞公榮之賢辟書交至公榮笑而辭江浙行中書左丞相方承制行事署為處州路儒學教授亦辭乃築室南野而隱居焉不幸以至正二十年庚子正月一日卒壽五十又八二十一年辛丑某月日葬於武川飛鳳山下禮也公榮凡三娶先配同縣王氏次東甌王氏次閩中陳氏皆簮纓大族子男子三人曰山曰崑曰豳皆好學尚義崑即來速銘者子女子三人常涓王逹其壻也一未行嗚呼孝者百行之根柢萬事之綱紀也執一術而百善至百邪去唯斯道則然所以化民成俗者汲汲焉是務而莫敢忽也近代之制文臣自少卿監以上武臣自正刺史以上實録方為立傳而能行孝友之政者雖在韋布中亦必登名與之齊行其治化之權衡於是亦可覩矣有若公榮之行之美豈可使其泯泯無傳哉嗚呼古之人有云位登台輔也爵列公侯也祿積萬鍾也馬踰千乘也殁之自曾不得與斯人之徒隸齒此無他以風教所關為甚重也濂雖不敏其於公榮之事表而列之用以為世道之勸孰曰非宜銘曰孝友之根實出降衷金石堪貫神明可通古之君子資之出治因其秉彞牗民孔易雖在布衣􅊮筆登名其意斯何樹之風聲誾誾祝君受親靡舍朝斯夕斯肯離膝下親既云亡塗殯在庭臨風泣血哀不自勝煬人勿戒火起曲突有煙勃如上不見日伏棺悲號誓與俱焚誰謂天高邈若不聞若勢方升熾不可遏不待反風虐熖隨滅家政之修法古名門毫髮敢私唯義之敦嚴布科條各授以事一門雍雍罔有乖戻辟書交飛君笑而嘻我有我政奚暇外馳古有篤行照耀方䇿以今較之孰為優劣埃風渺瀰德化擾鋤况曰善事不忘厥初飛鳳之山林木䓤蒨勒文墓門用為世勸故愚菴先生方公墓版文嗚呼自我齊國文公紹伊洛之正緒號為世適益衍而彰傳道授業者幾遍大江之南而天台為極盛時則有潘子善氏林叔恭氏趙幾道氏兄弟以及杜仲良氏如此者不能遍舉皆見而知之推原體用之學敷化弘治而風動於四方重徽疊照於斯為至流風遺俗迄今猶有未泯若我愚菴先生方公其殆聞而知之者歟先生諱克勤字去矜姓方氏其裔出睦州玄英處士于宋初十五世祖草四府君某始遷寧海侯城里曾大父重桂鄉貢進士大父子野父炯元鄞縣儒學教諭母葉氏宋丞相夢鼎從曾孫女也先生幼而端凝五歲知讀書自辨章句十歲暗記五經諸先生嘖嘖愛賞目為神童年垂弱冠遍窮濂洛關閩遺書及尋卿先逹授受源委凡涉性命道德之祕窮研探索寢食為之幾廢因喟然嘆曰為學必合天人而後可舍是非學也至正甲辰嘗一踐場屋言國家利害峭直無所顧忌有司不敢取飄然東歸益閉戶潛心于一卦一爻必𣣔驗諸事為至於天文地形禮樂刑政及制度名物之屬亦辨析歸於至當如指諸掌曾海民為變江浙行中書檄吳江同知金剛奴募民為水兵先生詣金剛奴謂曰民計窮而為盜未為盜者亦挺挺而𣣔動奈何授之以兵是謂增盜非禦盜也金剛奴怒不答既而水兵果於中道殺護吏逃去從盜金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未幾侍御史左答納失里至郡招諭劉都事基為之副先生上書陳勦殄之略不宜姑息都事韙其言而不能用遂致郡縣陷沒民罹塗炭先生發憤入山谷採松柏食之纍日不返當路延先生入幕府先生謝曰我辟榖久矣弗足與人間事也吳元年冬大明兵取台州先生欣逢真主之出乃大有為之時上疏舉賢才安人心黜豪強除暴斂明教育十餘事將上之未果洪武二年詔立郡縣學以訓導辟先生樂於育才即起應命負笈來從者至百餘人先生據經陳義曲暢旁通幾無毫髮遺憾聞者皆淪肌浹髓薰為善良俄以母夫人春秋高力辭而歸諸生追之者踵相接學舍為空四年夏朝廷聞先生賢𣣔致之部使者袁君宏以書幣來徴先生以母老不忍離左右避去旁縣郡承使者風旨雜逮姻連督索之先生上京師兩詣執政固辭執政奇先生才命就銓曹試考核入格列第二上特命知濟寧府事階朝列大夫錫之冠帶以行先生至官為書一通懸於康衢諭上愛養元元之意民有所不平詣府自言禁吏胥不得呵問日引耆耋坐語訊以得失郡學官缺孔子廟堂頽圯聘前進士為師弟于員有未備者選補之役浮屠以葺廟堂廟南鑿為泮池傍列兩序闢射圃於廟北造弓矢樹正鵠日一再視學親為正句讀較中否屬縣之內社各立學學凡數百區學子繫籍者二千人其後號為最盛始有詔民闢廢田者閲三載乃稅吏徼近功不俟期斂之復以田定其科繇民益惰田不增闢先生與民約定為簡書列其丁産為上中下三等等復析為三每有徴發恆視書為則吏不敢並緣為姦歲且暮轉戎衣于燕時有令役民舟者有誅別郡以牛車從事天雨雪牛僵死于道破産十八九民請以舟就役僚佐畏令難之先生曰吾知從民便抵法非所辭也即載以舟具白山東行中書省省義不問郡倉絶糧省檄民七百里轉粟青州民以道遠為病適漕運者自淮安輸濟南道出郡境先生𣣔就輸郡倉而俾濟南致青州告于行省弗聽即以聞戶郡戶部奏可行省臣愧之郡城壞故事築以兵指揮使挾貴人勢當五六月聚民萬餘治之民不得田哀號而即工聲聞數里先生奮曰民病不救惡用二千石為密聞中書同官疑且得罪不敢署名先生獨署之以聞即日詔罷先是不雨先生袒跣遍禱群祠涕泣臥祠下誓不雨不還至是詔下民歡呼而散大雨如注是歲五榖俱熟民歌曰孰罷我役使君之力孰成我黍使君之雨使君勿去我民父母自是連三歲三禱皆有年五年秋鄰境盡蝗先生省愆變食稽首籲天逮夜聞空中􅖇􅖇燭之乃飛蝗蔽天而過郡獨有年民有赴訴者隨事財決大者笞辱小者諭遣之不留案牘尤愼於庶獄月録日省不使久淹或文有未具時作糜遍倉之夏秋之稅每命斛卒持槩高下出其手或至纍旬不收民競指倉為穽先生令民自槩斛卒斂手不敢出氣遇將西成即移文與民期民爭來輸不遣一吏而稅常先登江西浙西二行省運糧百萬濟寧水陸數千里先生視如部民不使有錙銖怨懟舊比每斛益四升以禆蠧耗先生憫其道遠言于朝蠲之府召州縣官屬皆役皂隸往往索賂無厭先生下信符置郵無敢不至者信符之籍以印識而中分之吏托日月稽違以媒利先生私藏之緩急有程一自已出復行其法於封內一以信符召民民竟得拜力耕桑襁負來歸者相望于道初赴官時戶僅三萬稅萬餘石三年之後稅以石計者十四萬四千七百戶亦增至六萬有奇二州二十縣家有積粟野無餓莩羊牛雞犬散𬒳郊埛富庶充實如承平之世至於社稷山川諸祀先生修崇壇壝嚴飭器服或樹名木於周垣之外一如儀制無有所闕水驛在西門內􅋻陋汚濕居者弗寧先生料㨂材木候農之隙更作於城南庭堂室房弘敞逾昔冬寒河凍驛舟不行令舟人伐木為炭穿土穴藏氷因其餘力以成事功泗水經郡城南通淮江北引河濟地勢高瀉搆石為閘而時畜泄之魯橋棗林二閘歷歲久壞石填河中舟道難之役閘于絙壞石治灰而甓之故以葦囷庤糧火屢為災教民為陶瓦營屋百餘間申戒火令編民居為曹伍遞相救恤其患遂止大將軍魏國徐公逹副將軍曹國李公文忠統士馬十萬之燕駐郡稍久要官勢吏爭索糧芻相膠轕于前先生依序酬決無不如意一軍稱能永嘉侯朱公亮祖將舟師數百艘北征水涸舟膠不可動脅先生曰即取五千夫決河否則以軍法論日值暮先生不忍煩民泣禱於天夜二鼓天雨黎明水起數尺舟竟去莫有言者先生為政以風化為急務以德勝佐二始雖倨慢先生委誠待之卒自愧服武夫悍將不知禮久亦化戢在官縱無事終日冠衣坐堂上召諸吏授以書詩法律或公牘堆几群辨方譁先生片言折之各心悅而去性不喜近名常自誦曰近名必立威立威必至害人吾不忍為也府庭之間不陳杻械革鞭懸楹間示不妄罰省憲考績為六府最八年春入朝皇上以為善治民錫燕儀曹使踐其舊職瀕行奬諭有加且曰政成當顯用卿秋八月知曹縣事程貢嘗以不職𬒳笞心銜之上封事言狀詔御史楊某廉按楊適程故人恐程坐誣罪易民服潛索先生過事踰兩月無所得乃捕府中卒吏盡繫之搒掠無完膚無一可問者楊更與其吏謀誣先生用倉中炭葦時十月固未嘗附火而葦則蓋公宇垣實無私用者先生不與辨遂就逮民號呼填道隨行百餘里者將數千先生次子孝某上書政府大臣願以身為軍贖父罪不報竟謪役江浦會空印事起吏又誣及之孝某復草疏將伏闕下訴而先生沒於京師九年冬十月二十四日也壽僅五十八子孝某與兄孝聞奉柩東歸十年春二月二十四日窆於縣東北深灣章施山之原禮也先生娶林氏諱姬婦道為一族冠先十五年卒至是合葬生子二人即孝聞孝某孝聞年十三居母之喪不肉食至服除人以純孝稱之女一人再娶王氏諱在生女一人未彌月而王卒少房董氏育之董氏生子一人曰孝友二女皆室未行先生靣白如玉鬚眉秀整不妄笑語動容周旋必合禮法兵亂負母逃入深谷兩踵流血遇二弟訓育備至終身未嘗失色與人交率真任質不事表襮不以久近為冷熱立談之頃洞見肝膈南冠過郡者必以米醪饋之不能步者僦舟車送之萊蕪丞陳川𣣔迎母就養而厄於無資出錢五千助之同列以事奪祿買布帛給其用旦日延之對食久而不衰脫逢其飮醉投案大詬而去待之益恭及酒解來謝陽若不知者曰昔之夜吾亦醉矣不識君何謝也生平奉養簡素不服紈綺御一布𫀆數十載不易日不再肉不治官事輒却肉不食所守廉甚絲毛不取諸人每行縣以物自隨杯湯不肯受兖州守因童進二木瓜笞童十召州吏還之鄊人有為饒陽令者以燖鴈侑書力却去乃巳初至官時祿米一斛可易金三兩以軍食告乏月取十斗為食餘悉儲于倉或尤其迂不恤也晚年益加畏愼晝所為之事夜則白之於天俯仰皆無愧怍榮辱利害恆視之若一坦然不疑古所謂體道成德之人先生誠庶幾焉其為文章質而不華平而中理有汗漫集若干卷傳學者云濂私自念齊國文公之薨始一百七十又九年而其學寖微譁世取寵者徒剽掠為談辨誇多鬪靡者務組織為篇章文公所以扶世教淑人心者率棄為空言故其臨事之際仰攫俯拾唯恐利不入槖至有庸夫賤竪之不屑為者嗚呼可嘆也巳有如先生聞風而興乃能誠求實踐參前倚衡儼若上帝鑒臨涵養既純發舒自異仁民善俗之政至今人人能道之大命雖止於斯而其率性會道無愧於文公者尚曒然弗誣也孝某從濂授經頗知先生行事之詳於是歷敘其故而繫之以銘銘曰堂堂齊公命世之雄伊洛正傳實為大宗入天出人完傳翼經有遏必疏無幽不明疇不鼓篋千里來過燦如聚星惟台獨多流光所及寧有翳昏揭彼日月輝于天門逝者沄沄滅景銷聲不有人豪聞風孰興猗歟先生行知尊聞養氣弗餒充塞乾坤實孚名隨上徹九天鶴書翩翩降于丘園爰自布韋專城以居象笏朱衣於赫其儀寵恩之加其廣無垠曷以報之誓不顧身敷宣帝仁逹于齊氓以煦以嫗以致其亨民或勞只如魴之頳乃平更繇俾遂其生黠胥舞文其貪若狼乃障乃防而厄其亢人相告言久嬰亂離父母孔邇我胡弗歸十百為群其來如雲操厥耰鋤以播以耘我行其原萬桑沃然俯瞰于隰黍苗芊眠鄰多孽蝗刺天而飛避不入境絶類有知真知之效小試則殷誰曰漢吏􅌹美其循太和薰蒸郁紛輪囷自此而升何澤弗臻太命止斯傷如之何視天方高淚如懸河我又奚嗟數奇則然中心無慊生順死安善人殄瘁期道之衰顧瞻無依胡寧不哀崔崔者岡渺渺者陂其中有墳千載之悲胡義士墓表胡翰永康之魁山有義士焉曰胡君元祚其先建寧人也宋宣和中其遠祖志寧來為邑遂長子孫至今居之邑地西直婺東抵處處阻險而俗獷山谷之間竊發弄兵積為民患及元之季郡邑兵起環處之境皆盜區也戍將石抹升之督兵討之勢猶不戢至正乙未縉雲蒻溪之冦殷氏杜氏啖群凶以利大入剽掠橫殺不辜元祚慨然曰吾土皆王民吾雖力不能為國除賊獨忍鄉井罹其毒束手視之邪走白邑令為防禦計散家財集少壯之丁立保伍之法大書其幟為義兵寇偵之不敢輒犯詐遣其徒來降尋乃旁出抄虜搗邑郛焚廬含會官兵至元祚率衆助討之冦退兵駐邑中頗恣睢元祚扣軍門白主帥出旗樹于鄉約曰敢擾吾民者殺無赦士卒如約而元祚具酒肉禮其至者如初鄉民按堵令嘉其能檄所部團結悉如其法上其名于憲府憲府嘉之署曰義士胡某俾與方允中合而拒賊賊畏之至者不敢越鯉溪而西時太平呂原明軍方巖致書元祚曰東南當賊要衝君以身障之能杜其不至乎曷若去難就易於計萬全也元祚曰吾衆以義合將以排難存鄉里耳委而去之豈吾志耶益厲衆固守聞賊至山寨之民受圍者輒出兵援之歲丁酉正月賊冦武平合德元祚大破之逐北數十里二月丙午戰于前倉又破之賊數戰不利明日乃盡勒其衆間道出方巖與吕原明戰巖下吕不利其屬孫伯純殁于陳又明日賊復至與元祚遇于占田元祚盡鋭以戰顧謂允中曰賊衆我寡唯死鬪耳不可退而覆也自辰至午戰不利方允中吕伯川殁于陳元祚自分不獨生戰益力厲聲罵賊不旋踵死之至正十七年二月二十二日也邑令野速逹聞其死輒泣曰吾為天子命吏不能羸股肱效尺寸功而元祚起畎畝不費官一粟不取民一錢合鄉兵而贍之屢與賊搏雖斃於蜂蟻之衆不少挫其氣吾屬愧之矣其可使君之志不白於當世乎具疏其事以聞報未下明年王師克婺城永康內附又十有一年朝廷修元史凡忠臣義士於法得立傳余欲取其事載之無以究極其詳又八年余至永康見其子𥙿問君所以致死𥙿哀形于色為余言其先人之沒裕不能援而與之俱嘗圖其不朽有韓先生循仁之狀宋先生濂之銘在余讀而悲其不幸然未嘗不壯其為人當冦發難時巨族寒畯男女扶携走退上以脫一旦之命不顧宗祐棄骨肉者里相比也將吏畫地自守玩愒以養冦畏縮以為持重不能展手足者郡相望也計其人怖死不暇惡肯抗必死之冦以不資之軀而君亦何樂而為之無乃輕用其身哉天下大義蓋有重於身者人不察也叛逆之冦義所不容也吾討之義不容已也不幸而死固其所也君既死而懷利計私者苟免宜若得志由今視之果能保其祿位乎享其貴富乎就命有之泯焉無聞者多矣若君之所樹立聞其風者莫不惜而慕之大義之在人心如此百世之下有生氣矣君得年四十有八娶章氏繼趙氏子四人趙出也長即𥙿次禊次祏次禔余既多君之義又愛其子之能孝故托其大節俾揭而表諸墓亦史氏之遺意云漳州路達魯花赤合魯溫侯墓表王褘元有盡節之臣曰漳州路達魯花赤諱迭理彌實字子初合魯溫氏西域人也洪武元年王師征閩閩八州不兩月而平當是時合魯溫侯實監漳郡於是守將既以所部軍先遁郡事又屬他官總制政不自已出欲圖守禦之䇿計未決而總制者已納降俄報新朝使者至禮當郊迎侯從容語左右曰吾將圖之乃朝服北靣再拜曰臣四十始仕不數年致位二千石國恩厚矣今力不能禦敵義不忍降報國恩者唯有死耳遂斫其印篆書其笏曰大元臣子置案上即引佩刀剚喉中絶咽以死手執刀按膝坐􅩸然如生時郡民聚哭庭下聲震地共斂葬城東門年蓋四十有六矣侯蚤歲備宿衛用年勞當入仕以母老不忍去膝下不願仕毋殁服除東宫素知其才力勉之乃仕授承直郎行宣政院崇教至正辛丑升奉訓大夫杭州路治中尋改福州壬寅以事至亰除福建行省理問官階轉奉議與福建行省平章燕只普化同赴任會盜據閩城不得入侯贊平章集諸縣民為兵急圍城盜勢既蹙乃闕城東圍使出奔因勒兵殱之以功升朝列大夫居三年除漳州路達魯花赤階亞中大夫時陳有定據全閩民苦其朘剝侯曰吾受千里生人之寄寧忍坐視弗加恤乎頗釐庶事之利病興除之敏於吏事而務存忠厚民受其惠甚多故其死也漳人無不痛思之其為人可稱道者如此侯祖曰滿速兒大都路治中父曰默里馬合麻安慶路治中夫人回回氏子男二人長六十宿衛為速古兒赤次普顏帖木爾江西行省通事嗚呼世之論者蓋曰非死之難而處死之為難侯職在守土義不事二姓而守其土以死可謂死得其所矣豈非盡節之臣歟余至漳州得侯死事為悉因嘆八州之吏大小奚翅數千百而大節烈然如侯者殆不可一二數故為書而表之而并及其官伐世次使刻諸石豈特以慰漳人之思庶用為人臣之勸云時齋先生俞公墓表元既有江南以豪侈粗戾變禮文之俗未數十年薰漬狃狎胥化成風而宋之道俗銷滅盡矣為士者辮髮短衣效其語言容飭以自附干上冀速獲仕進否則訕笑以為鄙怯非確然自信者鮮不為之變是時金華俞先生獨率其家以禮深衣高冠談説右道客造門肅威儀俯首拱而趍以迓至門左右立三揖至階揖如初乃升及位又揖者三每揖皆有辭相稱慰慶贊周旋俯仰辭氣甚恭鄉人小子去家久不知宋俗皆然或竊指先生為異或尤以為迂緩先生不顧也年七十有二卒于元至治四年正月十七白先生既亡而宋之遺俗無有知者矣先生諱金字叔器別號時齋其先杭人吳越錢氏時有任其國為户部尚書兼營田使者曰公帛嘗道婺義為愛其地遂遷邑之鳳林鄉戶部生德詮德詮生又徙金華之孝順鎮諌生海海生善轉善智各有子四人皆為儒惟善子言昌宋大觀三年上舍釋褐進士知永豐蕭山二縣而善轉子奉復家溪南之琴山奉生某縣主簿允中允中生性性生恣益恣益生壽壽生義先生父也母金氏先生少好學善自程督鉤發窺索水􅉼木滋月長歲化壯而有名一試不合有司即退修于家於經史尤濳心摉訂較辨疑昧多所附益學者師尊之受業者繼于門先生年愈加志愈篤為學晚而彌成人望其致于用而宋亡矣故先生之名不大顯于世惟發之文章以自見久而亦散佚不傳世由是無從知先生知而言之者鄉人而已然先生所存鄉人未必知之知其詳者惟子暨孫至曽孫則已踈矣使更越數世復有知者乎篤於自信者固不恤乎人之知否然德如先生而弗傳則天下之為善者寡矣褘是以論列之以見不苟合乎一時者乃所以合乎後世也先生娶王氏生四子曰祿祺祐祉乃棄諸子而卒諸子以卒之歲十二月甲子葬于就日鄉義和里之楊家園今去先生卒時四十有六年而先生之孫有欽有奇有識有觀有慶有用有元多為老成人會孫五人亦巳長云皇明文衡卷之九十一
