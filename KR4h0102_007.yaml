front:
  text: 皇明文衡卷之七
  hash: sha256:bae00f2f92be19df67d48a38d1057dffe9146f462a20d445b29341240a96f2c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_007-1a}
body:
  text: 奏議陳問安啓楊士竒臣未奉召命不敢違例一人獨進而有所愚見亦不敢默而不言近日未審朝謁及問安之禮如何臣之愚誠伏望殿下嘉隆此禮愈勤愈敬曽蒙令旨靣諭臣云前日欽奉聖旨免朝臣退而思之固是天恩寬大之至然儲君於事君父未有久而不朝之禮伏望殿下自巳主張而必行之如奉聖旨免朝既退之後明日又往後日又往誠孝之心積久不巳必然感格至於奉侍之際尤望和顔婉詞以仰承天意臣伏惟至尊仁聖如天雖臣下有過常蒙寬貸愛之如初何况父子至親恩愛尤重豈宜於奉事之禮少有未盡也昔文王所以稱聖人者蓋自為世子之時日勤於視膳問安之禮為之根本故禮經載之以為萬世之法在禮又曰父母不悅起敬起孝此悅親之要道也伏望殿下萬萬加意臣愚無任虔懇之至謹啓請開經筵疏伏惟皇上肇登寶位上以繼承列聖下以統御萬邦必明堯舜禹湯文武之道以興唐虞三代之治則宗社永安皇圖永固天下蒙福永逺太平然其根本在致力於聖學自古賢聖之君未有不學而能致治者也去年十月內宣宗皇帝御左順門召臣士竒諭之曰明年春暖東宫出文華殿讀書凡內外侍從俱用慎擇賢良廉謹之臣臣士竒叩頭對曰此國家第一事正維其時伏望皇上留心不幸宣宗皇帝上賔中外皆同哀戚之心臣未敢遽言然此事至重不敢久默伏望山陵畢日早開經筵以進聖學臣等深切惓惓之至謹具合行事宜陳奏伏惟采納謹具奏聞一自古人君成德必先於學未有不學而能成德者尚書曰王人求多聞時維建事學于古訓乃有獲經筵侍講之官實為學之資今皇上進學飬德當預擇講官必得問學貫通言行端正老成重厚識逹大體者數人以共其職庶以上副先帝之意乞預命吏部禮部翰林院公同推舉具名陳奏取自上裁如或其人學術不正立心行巳素無善譽者不得濫預蓋師友之臣即他日輔導之臣不可不謹擇一天子就學其事體與皇太子親王不同乞先命禮部翰林院詳定講筵禮儀陳奏一皇上聖德正在今日輔飬本源書曰僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣蓋言僕臣賢否係君德重輕如此自古聖賢之君左右使令必用正人今皇上富於春秋凡起居出入一應隨侍及使用之人皆宜選擇行止端莊立心行已正當者使在左右庶不正之言不正之習悉皆屏遠不得以上惑聰明此事關係最重伏望太皇太后陛下皇太后殿下皆留聖心為皇上慎選左右隨侍及使用之人如或其人舉動輕挑語言褻慢立心行巳不正者皆宜早去之若不早去隨侍既久情意相洽不覺其非言聽計從後來欲去其勢難矣古語云與善人處如入芝蘭之室與不善人處如入鮑魚之肆蓋言慎所漸染也此在常人尚須謹擇何况天子之左右伏望太皇太后陛下皇太后殿下萬萬留意臣深受國恩無能補報惓惓愚忠不敢不盡伏乞采納宗社生民萬年太平之福議吳文正公從祀欽奉聖旨命臣等考究元儒吳澄應否從祀議擬奏聞臣士奇等欽遵考得元翰林學士吳澄所著書及奎章閣侍書學士虞集所狀澄事行蓋澄自十歲得宋儒朱熹所注大學讀之即知為學之要專勤誦讀次讀語孟中庸亦然遂大肆力於諸經十五專務聖賢之學致踐履之實以道自任其所自勵勤謹敬和自新自修消人欲長天理克巳悔過矯輕警惰顏冉理一等銘其教學者有學基學統等篇深究濂洛關閩之旨考正孝經校定易書詩春秋修正儀禮小戴記及邵雍張載之書有易書春秋禮記纂言及易纂言外翼皆所以啓大道之堂奧開來學之聰明傳之百世而無弊也時朝廷屢起之乃就國子監丞稍進司業一言不合即自解去後屢徴復起亦不久於位進退之際卓然君子蓋元之正學大儒許衡及澄二人衡遭際世祖功在朝廷澄在朝之日雖淺其職論思教成均勸講經筵咸積誠意預大議論大事咸引古道而功在學者尤多故二人之沒皆諡文正衡在當時巳列從祀澄既後出又卒於元衰之際當時巳有建議宜列從祀者屬元綱日頽未及舉行今澄所著諸書具在我國家崇儒重道大明四書五經及性理之旨凡澄所言皆見采録以惠學者蓋澄問學之功朱熹以來莫或過之而從祀諸儒自荀况下至范􅑔語其事功皆未及澄今若升澄從祀孔子廟庭列諸許衡之涎允愜斯文之公議昭國家之盛典謹具奏聞伏候勑旨正統十四年九月十六日啓疏周敘南京翰林院侍講學士臣周敘謹啓為安邦謹始事臣幸生逢聖明不意國家近日有大不可忍言之事臣雖兩年以來沾患脾疾醫治少效不能有為自聞令諭日夜撫膺揮涕寢食不寧又無才力智能可以赴難復讎恨不即自殞絶謹竭愚忠有可上報朝廷之萬一者不敢隱然不言恭惟郕王殿下承聖母皇太后命為監國則天下事皆在於殿下一人之身也其所係重矣昔周公輔成王當承平之日今殿下輔皇大子殿下於有事之秋視周公之時又甚難矣雖曰日望聖駕早還以慰臣民之思然虜情叵測時月悠邁天下之大蒼生之衆易以搖惑殿下得不於此深謀熟慮之乎蓋殿下於聖上親則兄弟誼則君臣君父之讎不共戴夫宜與群臣如越王之卧薪嘗膽以報吳讎使智者獻謀勇者效力必盡殱虜冦而後巳為今之計先須慱選辨士卑詞重幣暫為君父屈諭以昔時通好恩待如此之厚今因姦臣誤國興兵搆怨遂失南北之親其能即返聖駕則結好和親世世利賴不然則堂堂天朝疆域萬里兵甲數百萬衆得不思汛掃沙漠以圖報復哉必求其人可使者試察遣之庶或有濟至若能返與否必當選將練兵愼固邊強防其再舉協力殱之俟上天悔禍宗社靈長休養生息訓甲練兵分遣良將直搗巢穴繫其虜酋以伸萬世之㥽未為晚也愚昧之誠不能自已謹陳芻蕘之言條列于後敬順附舍人陳亮賫捧進呈伏乞賜覽鑒臣犬馬之誠不勝幸甚計開八條一曰勵剛明君上之德貴於明而尤貴乎剛明則物無遁情剛則事不牽制全是二者乃克有濟易曰剛健書曰欽明古昔聖哲允勵乎此故能駕馭英豪平治宇內前此好臣蔽主之明制主之斷故權移於下致兹禍敗恭惟殿下睿質天賦至剛至明如斷馬順之事中外震懾稱頌伏乞益加奮勵不懈初終幸甚二曰親經史古今治理國家興亡具載典籍讀而知之可為鑒戒伏望殿下擇近內廷可延問群臣之所開閣置書史其間選擇學識純正者與之講論義理因可詢訪時政庶聰明日益治道有資三曰修軍政方今切務莫逾選將練兵然思何以致之將必多方推舉視召問以慰勉之而爵秩勿吝軍士必設法召募時鼓動以來之而賞賚有加勤訓練恤飢寒作之以氣結之以恩庶可底成功宜日夕與左右大臣及諸老將計議精兵足食之要不惟臨事有濟抑且國威振揚四曰選賢才國家治亂係於人才賢否而人才難知自古所病亦必思求所以知之之道夫君子難進易退小人易進難退二者混淆治道衰矣厥今人才布滿有位其賢否則不可不察數年以來權姦專政小人蒙耻冒進相師成風其間卓然守氷霜之操者僅保少禍而已自兹以往宜慎選舉以求之嚴考察以别之峻拔擢以激勸之庶舊習漸更且吏部正官及諸司屬職實庶宫之本其素賢者留之不堪者選調之令在廷群臣連章合詞推舉學識才行優最者分任本部俾之講求用人之要專其責委斯賢才可得治理有望五曰安民心夫民心向背國之存亡攸係不可不思所以安之今邊事方興用軍供饋皆資民力緩之不能集事急之必生變故處之可謂難矣苟不固結其心惟刑驅勢迫以用之詎可經久哉若得人居守令長民之職則處置適宜徭役有要民心服從無施不可伏乞令左右大臣計議選擇賢才必任守令庶事妥民安六曰廣言路在昔堯舜大聖詢于芻蕘好問察邇故治底無為人樂熙皡誠以一人之知見有限天下之事變無窮能集衆善則舉措克當故也歷代君臣聽言則治諱言則亂史籍可鑒前此內臣王振肆權擅政拒絶人言殺害忠良中外屛息不敢出口兹遇殿下受監國重寄繫宗社生民之托當明目逹聰之時臣若不言死有餘辜伏乞再申教令許人人建白不拘忌諱惟裁擇可否施行幸甚七曰謹微漸易曰履霜堅氷至言事當慎之於早也臣自永樂以來叨職班行伏見太宗仁宗宣帝列聖臨御之時早朝大班既退即於門上説事各衙門官輪流向前惟君臣相與商確政務磬盡所言人懷畏憚而事機不泄成密勿廟堂之美自正統以來王振擅權獨立在傍於是輔弼大臣及近侍官員不得召對或有召對亦不敢詳盡故今日之禍皆由不得輪流向前説事所致恭惟殿下監國即同親政宜復舊章凡各衙門官務令各向前説事止與敷對者相知他人皆不能預聞庶得吐露肝瞻陳布嘉謀殿下亦須祕重母少宣泄且議奉皇太后於文華殿垂簾或隔一日令輔弼大臣隨殿下於簾前奏決大事母拘時平條例以㩲一時之宜庶國是有歸中外有賴八曰修庶政天下一統萬機日臻孰非當理但事有重輕勢有緩急况今弊政之餘尤難為功得不思其緊切者施之哉如選任大臣以端治本嚴明賞罰以聳觀聽崇奬御史以振紀綱革罷監軍以專委寄講求屯種以省饋餉輯睦親藩以厚宗支旌表忠節以作士氣限禁僧道以來召募革去罰贖以澄貪濁禁抑權貴中鹽以通商賈招降各處寇盜以安反側修理水陸道路以便驛運整搠腹裏緊要城池軍馬以備不虞似此尚多宜令預政大臣逐一詳審條例施行則內修外攘讎耻可復邦國奠安論城守疏程信欽差守城吏科給事中臣程信謹題為緊急軍情事節該奉勑今命爾往京城西邊一帶協助太監尚義都督王通左副都御史楊善守護城池嚴督軍民整搠器械務在精利申明號令務在嚴明可守則守必固必完可攻則攻必揵必勝京城在外四面軍民人等伹聞聲息不無搬移驚動爾須撫諭安插務令鎮靜得所九門內外守禦通塞等務爾須處置得宜務使冦不能窺有事須與提督太監尚義等計議而行無或頃刻怠忽致有踈虞取罪非輕欽此除欽遵會同各官督令官軍將各門嚴加守備外謹將合行緊急事宜開坐請旨一新號令以振軍威臣觀大軍自土木之敗人無戰志非大新號令無以責其效死如都督孫鏜領軍與賊對敵各路正當分軍䇿應則軍威自張賊勢可敗然皆各以分地自諉袖手旁觀臣於城上遙見西北軍馬約有三四千人一見上首挫鋒其餘不戰亂踰城濠致令五六犬羊乘勢追趕臣與都督王通督令軍士將短鎗火器於西北城樓放打當時逹賊四散奔潰然巳遁之軍既不加誅未遁之軍又不用賞都城安危係於頃刻而號令猶復如此臣誠寒心乞嚴勑總兵官石亨尚書于謙等將大營移出關廂外面駐劄冦衆則堅壁不動設伏以待寇寡則分軍截殺互相䇿應如有退縮搖衆即時處以軍法不許坐觀成敗以誤大計一募勇敢以備警急切見京城召募軍匠人等或賞或升故皆樂於效用然近察其議則曰有功固今日之得官賞無功則未免他日有為軍之纍是以中間多有勇壯匿而不出乞勑兵部再行出榜曉諭不分軍民官舍土人匠役但有果敢奮勇出奇殺賊者𥘉立為勇士之名照例給賞有功不次升攫無功事寧不願者聽如此則人疑釋而功可圖也一召勤王以遏南侵臣觀此虜見我城池完固軍馬尚多連日四散舉火驚人其勢似有南行之狀若不預為禦敵之備誠恐州縣居民聞風驚移事出不測乞寫勑星夜差人調集山東河南等處勤王之師順關南京所取在路衣甲或真定保定或河間霸州按兵待變相機以動賊近則完壁自守賊逺則赴京夾攻如此則聲援多而賊計沮矣一設武備以防內變臣惟外城既固內門尤不可不謹如西直等門雖有官軍二百餘人各鋪已分一百五十餘人又有繳閘等項分用門下止有五六十人亦皆老弱不堪又兼盔甲移用門外巷中城下雖有擺列官軍不過攢聚間坐倘有意外倉卒難為乞將城內官軍著令分管頭目每門添選二百人量給弓箭鎗刀庶幾有備無患一養鋭氣以備戰守夫軍夫以食為天食足則氣壯而後戰可捷守可固且如西邊一帶多係上林苑監四署人夫源非食糧人數稱係守城月餘蒙每人給米三斗即今坐派通州未敢片時下城前去關給其各夫俱皆離城五六十里居住家下多𬒳虜冦驚散有稱一二日無食者氣餒無措乞照軍匠事例給與口糧充養鋭氣庶幾遇緊可以責其效力正統十四年十月𥘉一日上陳言中興固本十事臣切惟撫國家於多事之際中興為難論政務於中興之時固本為要本之不固而欲求中興之治者未之有也仰惟皇上嗣臨大寶治化一新北虜求和南蠻授首于茲二紀遂底丕平天下臣民皆巳仰戴聖德神功如祖宗之時矣然安不忘危治不忘亂孔子之戒昭如日星矧陛下日御經筵緝熙聖學固巳知之明而講之素有不俟乎人言者矣臣一介凡庸以言為職不敢謂聖德巳至而不盡責難之恭謂聖治巳成而不效拾遺之義夫中興之要雖在固本而施行之次必有節目謹將所見條陳十事以上伏乞萬機之暇少垂睿鑒采而行之豈獨臣之幸哉臣無任伏闕戰栗之至一曰敬天臣聞天者理而巳矣人君一心上與天合則隂陽順而寒暑時邇來日食星殞雷雨隂霾變生不一必有感召此固上天仁愛君人之心然修省之誠要不可一時而或替也仰惟陛下即位以來節供奉嚴祀典凡諸不急之務多巳停止而天心猶若此者豈非修省之誠有未至歟夫人君一心萬理總會而求端莫先於孝弟故孔子曰孝弟之至通於神明先於四海詩曰其儀不􅑯正是四國曾子釋之曰其為父子兄弟足法而後民法之也臣以為敬天之道非陛下湛然此心懋昭大德隆孝友于兩宫示親親于天下恐未足以答天心之仁愛伏惟聖明留意二曰求賢臣惟國朝取人有常途用人有常制蓋文以科貢吏胥武以蔭襲功授中外任使自不乏人然屢勤明詔俾吏部有人材之薦兵部有將才之舉者何哉誠以多事之秋思得長才異能者共圖治功故也奈何有司奉行全失初意所舉薦者類多奔趨請託之人非廉正高潔之士大本巳失將焉用之孔子稱鄙夫不可與事君謂其患得患失而無所不至也伏望陛下於左右文武羣臣之中果有朝廷未究其用宦寺不知其名如古范仲淹富弼其人者留神簡拔以為之倡然後勑所司通行天下果有懷抱經濟精通韜略隱於山林屈於下位者有司務在禮聘送赴京師或親䇿以治道或命試其藝能隨材器使用濟時艱無則巳之不必取具若有司仍前濫舉即坐以罔上之罪三曰納諌臣觀經史所載歷代帝王未有不以納諌而興拒諌而敗者伏惟陛下即位之初實國家多事之際四方臣庶無不得以盡言陛下容納亦無虛日雖堯之舍巳從人舜之好問好察不過如此邇日以來漸渝初政豈進言者亦多涉於泛常過於矯激而弗當聖心者乎雖然縱使有之亦未可藝一以廢其二也如聖心簡靜厭見繁文臣愚請用宋仁宗開天章閣以十二事問近臣之例推而廣之勑令文武羣臣及山林草茅之士詢以闕政如逆虜之讎必何䇿而可復夭象之變必何修而可弭諸如此類逐一條示俾之各陳所見各盡所言中間必有上補於聰明之萬一者仍乞陛下於時常進言之人當理者采納狂妄者不問庶幾周悉民情以奉天下四曰謹災臣聞書曰先王克謹天戒臣人克有常憲是知災異之來非上下同加修省不可得而弭也邇者天變河決皇上下罪已之詔曰君失其德臣失其職臣捧誦之際知陛下一念之誠可以對越上帝矣然群臣之中慮如陛下之敬天修已者幾何人哉宋儒胡安國曰體元者人君之職調元者大臣之事自漢以下遇有災異䇿免三公蓋為是爾乞勑臺諌於內外文武群臣之中有引日偷安懷姦蠧政之甚者指實奏陳罷黜田里庶天變銷而人心慰五曰節用臣聞易曰節以制度不傷財不害民而大學論生財必曰生之者衆食之者寡為之者疾用之者舒四者反是而求天下之治不可得也今邦畿千里民多逃移江南數郡盜尚劫掠河道枯澀漕運艱難而京師僧道之徒來自四方充斥街巷內府供事官員較之往時十增八九率皆以難運有限之糧供冗食無用之輩及聞河南山西轉輸邉餉犯風霜之苦冒剽掠之虞辛勞何止萬千費用不過數月臣以為朔方之役未舉而中原之民巳疲伏望皇上省財節費圖雪國恥勑令沿邊一帶文武官員隨機護軍趂時屯種以免饋餉以防寇戎并勑各衙門禁遊食無役之人汰冗設不職之官庶邊備充而浮費少民力蘇而根本固然後靜以侍動逸以待勞則無事不克濟矣六曰詳刑臣聞兵乃刑之大者古之帝王於一夫之罪一刑之施尚且恤之而况行刑於用兵之後哉切見福建廣東浙江湖廣等處叛賊鄧茂七黃蕭飬葉宗留等本因貪官激變動勞大軍征討渠魁雖幸就誅良善多已被害近聞啇賈耕鑿之人一槩綁縛到官將士收其功而平民罹其毒夫淫刑以逞而不致傷和氣者未之有也書曰殱厥渠魁脅從罔治臣願陛下以為法勑今所司將解京犯人案候待其覆勘虛實之情然後處以輕重之法仍勑各處總兵鎮守等官今後止將首惡解京其餘脅從量情釋放俾之各相效順庶人無冤抑而和氣可召七曰選將臣聞三軍之命係於將然將之賢否不止涉軍士之死生實以關國勢之強弱不可不慎也即今三營大將固亦有百戰巳試之人不可輕議至如坐營把司掌號領隊數者之名即唐之所謂偏禆宋之所謂首領亦他日以次而備大將之選者頃自國家多事以來選設太濫不無賢否混雜且人材難得不有以儲之於前則無以獲用於後昔李光弼起自郭子儀偏禆嶽飛起自宗澤首領則其選亦豈可以不慎哉乞勑總督總兵等官修明軍政簡汰賢否遇闕員必須推訪廉介智勇之士具名奏聞以充不許私相輔授重貽後患八曰練兵臣觀周之成康皆守成賢主而其事見於書者一則曰詰爾戎兵一則曰張皇六師彼當治平之時尚不敢忘忽武備如此而况多事之際乎我國家飬兵最厚月糧以瞻妻子行糧以贍本身不時賞犒銀兩依期給食衣綿蓋養之於無事之時欲用之於有事之日而管軍官員不體朝廷恤軍之心大肆𧖟食公行賄賂反以操練為故事如此而求克敵制勝比隆前代何可得哉伏望皇上降勑總督總兵等官嚴加戒諭仍有似前侵牟軍士妨誤操練者處以軍法示衆勿事姑息臣又見三營之制五軍所以肄營陳神機所以肄鎗手三千所以肄巡哨今三營各自團操則武藝不能相通其臨敵必難相應乞將三營軍馬一月同在一處相兼操習五日凛如對陳之時久久成熟庶幾有效臣又聞之軍中老稚相參有名無實間居則虛縻糧賞臨事則負纍精壯乞大行㨂選不堪者退回守城精壯者加意訓練庶兵將之意相孚而外攘之功可舉也九曰尚儉臣觀伊尹之訓太甲曰欲敗度縱敗禮又曰愼乃儉德惟懷永圖而漢史之贊文景二帝亦不過曰恭儉而已是知儉之一字尤守成之主所當力行者也伏惟陛下即位之初無宫室之興無遊幸之舉日講聖學親攬庶政恭儉之德可方前王然而民食日艱民俗日薄何哉豈陛下以北虜請和國事稍暇而遂為之少變乎臣又見承平日久禮法漸墮結婚姻者不計户之高下送喪葬者不循家之有無閭閻得以服錦繡倡優得以飾金寶全無貴賤之等惟逞驕侈之風甚至千日之贏餘不禁一物之費用如是而求民食之足民風之厚不可得巳伏望陛下愈勵勤儉之德以先天下仍勑禮部申明舊制凡服食器用各分等第毋行違式通得禁約庶幾民德歸厚國富可期十曰隆師臣聞先儒周子曰師道立則善人多善人多則朝廷正而天下治矣令府州縣儒學官皆受朝命以為人師者也祖宗之時猶重其選或親䇿而後命之近時以來有久在監學懼淹歲月而出身者有偶中副榜因念艱難而就職者有儒士不能應鄉薦而干有司以舉任者布列中外多不得人遷延歲時妨誤後學九年之間使俊秀子弟長者老而少者長甚可惜也無實才之用而望濟天下之事豈不難哉乞勑所司照舊於南北直􅊢及各布政司推選御史或副使僉事各一員專一提調學校造就人才以副皇上求賢圖治之意其各處教官先令提調學校官員考核但有文理不通教條不立者就便送部别用其九年考滿到部舉人過數學識異常者所司仍加考察或試以臺諌之職或授以州邑之長則人皆盡心才各當用時賢輩出而國事可辦矣
