front:
  text: 皇明文衡卷之二十六
  hash: sha256:769598fed23456c8406c17ebd5a67b7e6bb7ae08e70d63aee49417204d314f27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0102_SBCK_026-1a}
body:
  text: 書與王待制書徐一夔前年冬執事自漳州𬒳召纂修元史去年二月道過錢唐時僕亦自天台襄事而還天遂良覿解后於候潮門憧憧徃來之地握手道間闊外執事以使者催促之亟僕亦不得從容聽教不勝怏怏分手之後僕以連歲奔播之餘生事寥落且有寒濕脚疾之苦遠適海隅覔一館榖之地聊用養痾旋聞文佩至京擢居次對之職與金華宋公同領總裁之命歆豔歆豔今上甫革元命卽取十四帝一百六十三年之事修成一代不刋之書所謂國可㓕史不可滅者於今見之甚盛典也而執事㧞自常調用稱其材然亦不可不謂之千載一遇去冬有人來自京云置局以來未滿一歲自元太祖至寜宗一十三朝一百三十七年之事悉已本㨿實錄修成上進局中秉筆之士或已授官或已還山去矣獨順帝一朝三十六年之事以無實錄可據分遣使者搜訪故都圖籍列郡文移有關於三十六年之政體者俱收並錄以備採擇足成一代之書邇者縣吏踵門傳致浙省官僚之命云朝廷以史事見徴蓋以此也且云執事以僕爲善叙事薦之當路夫爲總裁薦人以預纂修此固其職向者道語之時執事不以僕爲不材已欲引而置之纂修之列僕固甞敷露情實以辭之矣今執事又何爲而有意於區區不材且病之人也竊嘗思之近世之論史者以謂莫切於日曆日曆者史之根柢也自唐長夀中史官姚璹奏請撰時政記元和中韋執誼又奏史官撰日曆日曆之設雖曰權倖用事姑以是爲創藁之具其法以事繫日以日繫月以月繫時以時繫年猶有春秋之遺法而起居注之設亦專以甲子起例蓋記事之法無踰此也徃宋極重史事日曆之修必諸司關白如詔誥政令則三省必錄如兵機邊事樞庭必報百官之拜罷刑賞之與奪臺諌之論列給舍之繳駁經筵之論答臣僚之轉對侍從之直前故事中外之囊封匭奏下至錢榖甲兵獄訟造作凡有關於政體者必随日以錄此日曆之所以不可忽也然又慮其出於吏牘未免訛繆或一日之差則後難攷定一事之失則後難增𥙷此歐陽公所以猶慮日曆或至遺失奏請歲終監修宰相點檢修撰官日所錄事有隳官失職者罰之其於日曆愼重如此日曆不至遺失則後日㑹要之修取於此他年實錄之修取於此百年之後紀志列傳取於此此宋氏之史所以爲精確也僕之所陳固執事之所熟知有不待於贅說者而僕自有知頗識元朝制度文爲務從簡便且聞史事尤甚踈畧不置日曆不置起居注獨中書置時政科以一文學掾掌之以事付史舘及一帝崩則國史院據所付修實錄而巳尚幸天曆間詔修經世大典虞公集依六典爲之一代之典章文物稍備其書止於天曆而其事則可備十三朝之未備前局之史旣有十三朝實錄可據又有經世大典可以叅稽一時預於纂修之士凡若干人餘人雖不盡識如胡仲申陶中立趙伯友趙子常徐大年軰又皆有史學其成此十三朝之史不難矣今夫順帝一朝三十六年之事旣無實錄可據又無叅稽之書惟憑採訪以足成之竊恐其事未必覈也其言未必馴也其首尾未必貫串也雖執事高材卓識提綱挈頜有條而不紊有如向之諸公或受官或還山旣各散去而欲不材且病如僕者承乏於後誠恐不能化臭腐爲神奇以副執事之意有司不容見辭逼上道舟至嘉興驛賤疾大作行歩不前謹令侍生奉狀上逹左右乞賜矜察言之當路別求有史材者成此盛典不備答梁孟敬書劉永之僕自屏居山谷絶罕人事乃得留意於經籍而獨學之寡陋講貫之無徒日乃以所爲春秋本旨序呈之左右冀有以警䇿而正諸及奉還示大獲所望詞累數百言若將有取於愚瞽之作而教以其所弗逮者謹受賜矣然蒙固之見有未盡暴白而明諭之旨有不可不復者敢畧布之以終大貺焉執事之言曰諸如或日或不日稱爵稱人名之字之王之稱天以否諸侯之列序以否大夫之登名以否皆因史之舊非聖人之意之所存三傳之要諸說之鑿朱子之駁之爲善又曰信公榖之過求褒貶之詳未免蹈先儒之􅍝此胡康侯之失也凡此所論度越老生宿師萬萬無疑又曰夫子言知我惟春秋罪我惟春秋知之者知其明王者之法也罪之者罪其彰亂逆之跡也夫春秋之爲春秋明王法彰亂逆誠聖人之旨也然謂因魯史之文而筆之傳之其小有乖訛則脩之完之使觀者有所勸沮而王法由諸而明亂逆由諸而彰則可也若謂損益乎魯史而明之彰之則弗可也夫聖人者豈盡異於人哉其德則聖人也其不幸而不得其位則猶夫人之子也時無明王設知宗予待之者曰季孟之間則猶夫人之臣也而所事之君則荒君也其君之卿大夫則僣室也以猶夫人之臣子而立乎荒君僣室之朝而私損益其國之信史而明王法而彰亂逆無乃弗可乎夫今之與古遠矣而其理弗異也設使有一孔子生乎今之世立乎今之朝非君之命與其職守而取今之國史而損益焉予奪焉褒譏焉而公示之人其乃不爲僇民者鮮矣聖人對陽貨則謹諾之過宋而微服焉居其邦不非其大夫其自稱曰述而不作信而好古夫豈以其聖而敖當世乎哉蓋方是時各國之史亦莫不有人焉其立辭也亦莫不有法焉趙穿之弑逆也而書曰趙盾弑其君則晉史之良也崔杼之弑逆也大史死者三人而卒書曰崔杼弑其君則齊史之良也之二國者有二良焉而况於魯有周公之遺制以秉禮之臣者乎是故法之謹嚴莫過於魯史其屬辭比事可以爲訓莫過於魯史具當世之治亂盛衰可以上接乎詩書之跡莫過於魯史是以聖人有取焉謹録而傳焉以寓其傷周之志焉其知者曰是不得巳焉耳其不知者曰是匹夫也而暴其君大夫之惡於天下後世故曰知我者将在是罪我者将在是亦聖人之謙辭云耳夫豈曰改周制寓王法而託二百四十二年南靣之權之謂哉僕故曰謂因乎魯史而筆之傳之而王法由諸而明亂逆由諸而彰可也謂損益乎魯史而明之彰之則弗可也言之重辭之複必有大美惡焉此先儒之說也執事取之故曰首止之會盟葵丘之會盟皆再書焉是美之大而詳其辭也稷之會曰成宋亂劉單以王猛居于皇尹氏立子朝而先之以王室亂皆複言焉是惡之大而詳其辭也抑甞考之蓋史䇿之實錄而其紀載之體異焉耳其凡有五有據其事之離合而書之者有重其終而錄其始者有重其始而錄其終者有承赴告之辭而書之者有非承赴告辭聞而知之而書之者此五者其凡也而皆所以紀實也或會而盟盟而同日是會之與盟合而爲一事矣或會而盟盟而異日是㑹之與盟離而爲二事矣合而一事則同書離而二事則異書固當然也夫首止之與葵丘也皆夏之㑹而秋之盟是離而爲二事矣故再書焉此據其事之離合而書之者也踐土之㑹美矣而盟不異書同日也平丘之㑹無美焉而盟則異書異日也皆實之紀也非美之大而詳其辭也將書其取鼎也於稷之㑹則始之以成宋亂此重其終而錄其始也旣書曰宋災伯姬卒也於澶淵之㑹則終之以宋災故此重其始而錄其終也㑹未有言其故者於之二者而言之特以明其所重也他如書寔來則先言州公如曹書齊侯伐北燕則遂書暨齊平皆是物也子朝之亂叔鞅至自京師而言之未知其孰是焉故曰王室亂此非承赴告之辭聞而知之而書之者也劉單以王猛居于皇則來告矣敬王居翟泉而尹氏立子朝則來告矣此承赴告之辭而書之者也他如程子之傳例有曰將卑師少例書人此承赴告者也不知將帥名氏多寡亦書人此聞而知之者也皆實之紀也非惡之而詳其辭也曰言之重辭之複必有大羙惡焉者先儒之過也且夫其名也箸乎簡冊其跡也昭乎萬世不必言之重也而皆知夫首止之爲美矣不必辭之複也而皆知夫稷之爲惡矣故曰因乎魯史而筆之傳之而王法由諸而明亂逆由諸而彰也程子曰春秋大義數十炳如日星乃易見也其微辭隱義時措得冝者爲難知也夫所謂炳如易見則然矣其曰隱微而難知果何謂哉聖人將昭大辨於萬世頋乃有隱微難知之義是未免蹈前儒之失也杜預曰言高則旨遠辭約則義微程子韙之則所謂微隱者猶是矣然則易之彖繫將非聖人之制作乎論語之答問將非聖人之言詞乎何彼之平易顯白而此之微隱難喻僕之愚不敢以爲然也雖然程子之傳有舍乎褒貶予奪而立言者則非先儒之所及也若胡康侯之學術正矣其論議辨而嚴矣其失則承乎前儒而甚之者也朱子甞曰有程子之易又曰可自為一書謂其言理之精而非經之本旨也若胡氏之春秋其自爲一書焉可也夫時有遠近則史有詳畧史有詳畧則辭有同異此甚易曉也若自文以上日食有不書日者文以下悉書日焉自文以前君行八十書至者十七文以後君行九十書至者六十四是也執事所謂随時而觀經此誠善也而公羊子曰所見異詞所聞異詞所傳聞異詞何休曰所見之世思其君父尤厚故多微詞焉所聞之世思王父少殺故諱亦少殺焉所傳聞之世思高曾又少殺故弗之諱焉甚乎其陋矣陳傅良曰隱桓莊閔一書法也僖文宣成一書法也昭襄定哀一書法也夫不曰史之有詳畧而曰聖人随其時而異其書焉其賢於公羊者幾希大較說者之失有三尊經之過也信傳之篤也不以詩書視春秋也其尊之也過則曰聖人之作也其信之也篤則曰其必有所受也其視之異乎詩書也則曰此見諸行事也此刑書也夫以爲聖人之作而傳者有所受則宜其求之益詳而傅合之益鑿也以爲見諸行事以爲刑書則宜其言之益刻而煆錬之益深也巳以爲美則强求諸辭曰此予也此褒也聖人之微辭也或曰聖人之變文也一說弗通焉又爲一說以護之一論少窒焉又爲一論以飾之使聖人者若後世之法吏深文而巧詆蔑乎寛厚之意此其失非細故也今僕之愚曰其文則魯史其義則彰善而癉惡兾述而傳於後則以刪詩定書賛易同其狂僣而爲傳也則直釋其義其善者曰如是而善其惡者曰如是而惡無褒譏予奪之說其區别凡例則主程子其綱領大意則主朱子其三傳則主左氏以杜預說而時覈其􅓎妄其諸家則無適主取其合者去其弗合者如是而巳竊以謂使聖人因乎魯史焉則愚之說固巳得矣使聖人而自作焉亦當據事而直筆之必不爲先儒之云則愚之說亦蔑甚乖刺焉其自信者如此然猶以其考之也未浹洽焉其講之也未貫通焉姑優柔之而姑反覆之寛之以歲月而後可就也日序之言不足以盡意而明諭之懃懇不敢不復而辭不可殫也輙言其大都如此於戲舍執事其亦曷言之而曷聽之乎超卓之識特逹之見尚克示之幸甚幸甚答程伯大論文朱夏古今能言之士孰不欲雄峙百代之上而埀聲乎百世之下哉然而卒抱奇志而不見泯泯以老死者何其多也豈非才識之不逮故不能成一家之言以至此耳三代之後卓然成一家之言者才十數人而止其餘皆磨㓕澌盡則信乎得之於天者非超然而不群則難乎其以文章自命矣比辱賜書大抵未能逹夫雄深雅徤之作而務爲浮薄靡麗之文而已此甚不可也僕聞古之爲文者必本於經而根於道其紀志表傳記序銘賛則各有其體而不可以淆焉而莫之辨也至其發言遣辭又奚以剽賊爲工哉今不本於經不根於道而雜出於百家傳記之說則其立論不自其大而自其細固已自小矣尚何能與古人齊驅並駕哉老蘇之文頓挫曲折蒼然鬱然巉刻峭厲幾不可與争鋒然而有識之士猶有譏焉者良以其立論之駁而不能盡合乎聖人之道也今無蘇公之才而立論又下蘇公逺甚則何望其言之立而不仆耶古之用兵其合散進退出奇制勝固神速變化而不可測也至其部伍行陣之法則䋲䋲乎其弗可以亂爲文而不法是猶用師而不以律矣古之論文必先體製而後工製譬諸梓人之作室也其棟梁榱桷之任雖不能以大相遠也而王公大人之居興浮屠老子之廬官司之署庻民之室其制度固懸絶而不相侔也使記也而與序無異焉則庻民之室將同於浮屠老子之祠亦可乎鑄劍而肖於刀且猶不可斵車而肖於舟不猶以爲迂且拘乎韓子之於文也惟陳言之務去今雖全未能如韓子亦宜少刋落矣乃悉古書奇字而馴集鱗次焉不幾於天吴紫鳳顚倒短褐也邪蘇子謂錦繡綺縠服之美者也然尺寸而割之錯而紐之以爲服則綈繒之不若今先生乃欲集群英以爲華爲好其亦異於作者之見矣世有寠人爲覩其鄰之富也日夜攻鑚而剽之幸而得其貨寳財賄以爲得計矣一日徼者獲之則薾然盜也而至死不悔且役役焉割裂而綴輯之則其氣固巳薾然矣又何能渾浩如江河而有排戞之力哉故夫蘭苕翡翠又烏覩夫製鯨也且古之爲文非有心於文也若風之於水適相遭而文生也故鼓之而爲濤含之而爲漪蹙之而爲縠澄之而爲練激之而爲珠璣非水也風也二者適相遭而文生也天之於物也獨不然乎纎者穠者丹者堊者莫不極其美麗而造物者豈物物而雕之哉物各付物而天下之巧莫加焉彼有眛於此者三年而刻葉且文猶樂也太古之音和乎雅淡而風俗以淳人心以正桑間濮上滛哇煩趣而人心風俗蕩而忘返使先生而與聞制作將安取乎則何獨疑於文也先生教之曰茍無毛嬙西施之美質則不能不借夫粉黛之假以掩其陋是朽木可得而雕糞土之墻可得而圬矣無䀋天下知其惡也被珠璣曵羅綺不足以欺天下之目使天下而皆瞽也則可奈之何天下之不皆瞽也先生殆未覩夫正色也先生又謂吾五常論其猶玄耶太玄擬易而作然易出於造化之自然而玄也者出於智慮之私而已故不能免夫牽合艱難之能先儒固已譏其勞且拙矣故今去雄干餘年而卒無好之者今先生乃欲著書以擬玄吾恐其不堪爲覆瓿用矣先生又謂吾嘗作詩命其集曰胡盧且魯論詩序言詩之用若彼其博也而先生直以資人之笑視古詩之風亦少貶矣此亦好恠之過也先生卒教之曰其觀吾文也還以一言庻有以知君子之是是非非也宋之季年文章敗壞極矣遺風餘習入人之深若黒之不可以白當此之時非返之則不足追乎亡先生之心自以爲過之矣而烏知其異於彼也先生之文始欲其奇也而卒以拙始欲其麗也而卒以惡始欲其雄也而卒以弱其風格言論莫不叛於古矣則亦難乎摭而言之矣且先生旣與吾異則僕雖言之而無當於其心矣僕欲挽先生於迷途則願悉吐出其中之蘊取韓孟文日夜誦之覺已之見與向者異焉然後一吐其辭庻有合乎僕於學廢棄之日常多加以怠惰不力然於作者之風致竊有見焉故敢畧陳其說其然之耶其不然之耶迷悟之機判於此矣幸毋忽與鄭仲辯書方希古去年王仲縉至蜀承手帖喻以近讀佛書自遣心切疑之以爲特戲言耳及朝京師於一初處見所徃還書援佛氏之說甚詳向慕於彼者甚至然後知足下之果入於佛也夫儒者之道内有父子君臣親親長長之懿外有詩書禮樂制度文章之美大而以之治天下小而以之治一家秩然而有其法沛然其無待於外近之於復性正心廣之於格物窮理以至於推道之原而至於命循物之則而逹諸天其事要而不煩其說實而不誣君子由之則至於聖賢衆人學之則至於君子未有舎此他求而可以有得者也足下學乎此也乆矣曷爲一旦棄素所習而溺於佛氏之云邪苟以佛氏倫理之懿爲可慕則彼於君臣父子夫婦長幼之節舉無焉未見其爲足慕也苟以其書之所載爲可喜則彼之說必不過於吾堯舜禹湯文武周公孔子之格言大訓未見其爲可喜也苟欲以之治心繕性則必不若吾聖人之道之全苟欲以之治家與國則彼本自棄於人倫世故之表未見其爲可用也故世之好佛者吾舉不知其心之所存使棄儒從佛而果能成佛猶不免於惑妄畔教之罪况學之者固逐逐焉以生昏昏焉以死未甞有一人知其所謂道者邪以足下之明智篤厚不於吾道有得焉而顧彼之趨不亦異乎足下習其說者果出於誠心乎抑亦姑以爲世俗好之吾亦從而好之以取庸衆之喜悅乎由後則自欺不可也由前則事其說必當從其教必去夫婦父子兄弟之倫必削髪被緇必水飮草食而後可不能如是則是口其書而身違之外好其說而心誠亦不可也夫不習佛氏之說於道固無所不足習其說而不誠自欺非惟得罪於吾之道而反且得罪於佛亦何所利而爲之也近世從佛氏者甚衆未有得福者有一人焉嘗識之初頗好儒旣而著書佐佛氏斥儒巳卒死於禍計其人慕佛氏兾福利福不可兾而禍及其躬是未易曉也得非不誠抑且自欺故不蒙祐而獲罪於天邪禍福之報儒者所不論特閔其欲徼福而反致禍亦可爲不守正而妄求者之戒耳計足下之卓於識而深於道豈眞若世俗徼福之徒之爲哉蓋世之儒者當年壯氣銳之時馳騖於聲利用智惟恐不工操術惟恐不奇及五六十之年顚頓於憂患顧來日之漸短悼徃事之可悔於是覽佛氏空寂之音而有當於心遂委身而從事焉以爲極明逹而最可樂者莫佛氏之書若也雖昔之賢豪以氣雄天下以文冠百世如蘇子瞻諸公亦不免乎此後人習俗以爲宜然且謂以前人之智識才氣猶以佛氏爲可慕而歸之矧不及萬萬者而可不從乎然以道觀之凡有慕於彼者皆無得於此者也足於粱肉者無慕乎糠糜安於厦屋者無慕乎苫闔使有得於聖人之奥其樂有不可旣者窮通得喪死生之變臨其前視之如旦夜之常而何動心之有奚必從事於佛而後可以外形骸輕物累哉舍可致者而不求援不可必得而求之旣以自欺又畔乎吾道惑莫甚乎斯也昔與足下論吾道時僕年方二十三固已知吾道之有餘而無待於外物時不知者多竊笑之及今十有五年愈覺聖人之訓爲不我欺而舉天下之道術果無以易之也毎見流於異端者輙與之辯非好辯也閔夫人之䧟溺而欲拯之於安平之塗誠不自知其過慮也以故爲佛氏者多不相悅方期與足下共進斯事以衛聖人之教豈意足下亦有慕於彼乎今有人言行路之人墜於井心雖閔之未必徬徨奔走而思救之也聞至親且賢之人墜於井則不暇食息狂呼呌號而思出之矣親愛之故也與足下相與之舊而德器宏深交友中不可多遇烏能已於言而不以告乎僕今年三十七足下當六十矣相違十餘年相去萬餘里之遠使足下所慕得其正僕將有以佐而翼之而何敢逆盛意而取不讓之貴乎蓋必有所甚不得巳者亮足下之賢必能察之而未至於深怒遽絶也數百年禮義之門而足下於今爲老成人在乎愼重學術以表厲後生非特僕之望斯世之望也僕守一官無分寸𥙷世教近髪有白者靣已皺筋力漸减飮酒不敢如昔者惟自覺有過毎應事巳時時悔之恃此頗謂尚可進未知天之處之者何如耳如有所得聞幸速以見教是亦爲報之道也與趙伯欽僕求友於四方十餘年可友者衆矣於同郡得一人焉曰林公輔尤僕之所敬者公輔氣高而才敏於人愼所推讓視古人行行然有不滿之色前與僕書獨稱足下與陳原采之文僕固巳知足下非流俗人可及近入城公輔說足下尤詳公輔之友張廷璧僕不見之七八年其人奇偉不肯茍伏人至語及足下必稱善因二子而求足下之所造心已傾之乆矣今乃承惠書爲論甚大爲辭甚達卓乎有矌視前古之意反覆翫繹嘉二子之確於取人喜吾郡之士果有足望氣發于中而見于外如獲大吕九鼎而載之以歸也僕嘗怪近代道術不明士居位則以法律爲治爲學則以文辭爲業聖賢宏經要典擯棄而不講百餘年間風俗汙壞上墮下乖以至于顚危而不救者豈無自也哉私誠恨之不自知其不肖亦欲有所發明損益以表著于世而習俗卑下學者梏于舊聞不復知有學術竊竊詡詡苟且自恕或有志而才不足有爲或才高而沉溺不返可與言斯事者惟公輔耳公輔毎與僕言未嘗不歎朋友足望者之少而有意於足下也書之所陳謂近世之文辭不能比隆於唐宋而有取於僕僕無能之辭豈能過於近世哉使眞有以過乎人則亦藝焉而已耳足下安取乎且近世所以不古若者足下知其故耶非其辭之不工也非其說之不詳也以文辭爲業而不知道術雖欲庻乎古不能也知道若行路然至愈遠則見愈多愈多則言自異今有至于窮谷者言其所見則不過泉石樹木禽獸䖝魚之狀而已比之遊乎雄都巨邑者見宫室之壯麗車馬之蕃庻人民物産之瑰異變怪其言豈不有間哉故聖賢之文辭非有大過於今人其所以不可及者造道深而自得者遠雖恒言卑論亦可爲後世法非若後世剽襲以爲說者之淺也唐之諸儒惟韓子爲近道其他俱不若宋宋之士以言乎文固未必盡過乎唐然其文之所載三代以下未之有而漢何足以方之今人多謂宋不及唐唐不及漢此自其文而言耳非所謂考道德之㑹通而揆其實也僕嘗謂求學術於三代之後宋爲上漢次之唐爲下近代有愧焉斯道之盛衰其端微矣非明識睿達者何足以知之足下何知之蚤邪雖然足下論近代誠當矣抑僕猶有說焉世俗之患忽見而尊聞已之識卽不能决是非醇駁互相承傳以白爲黑者皆是也足下言之而僕聽之則謂足下爲知言士矣所與交者或與僕之見異無乃以足下爲方人好高而爲驚世之論乎雖然君子之所守不以毀譽而變苟愼於言而敏於行以古之聖賢爲凖不與近代較崇卑得失則古人且將畏足下近代安足並乎又僕之爲吾郡喜者寜獨若今而巳乎乆不接淸光感足下見厚聊以此奉報諸文尚未獲見適有疾不能躬書惟恕察與方正學書王叔英僕與執事别十餘年其間情慕之淺深書問之逹否曰事之細者耳姑置之不足道也惟執事之身繫天下之望士之進退天下之幸不幸與焉側聞被召計此時必已到亰獲膺大任矣玆實天下之大幸也故敢有說以進於左右焉凡人有措天下之才者固難自用其才者尤難如子房之於高祖能用其才者也賈誼之於文帝未能自用其才者也何則子房之於高祖察其可行而後言言之未甞不中高祖得以用之而當時受其利故親如樊吕不可得而間信如陵勃不可得而非任如蕭何不可得而奪此子房所以能自用其才也賈誼之於文帝不察其未能而易言之且又言之太過故大臣綘灌之屬得以短之於是文帝不能獲用其言此賈誼所以不能自用其才也方今聖天子求賢用才之意上追堯舜固非高祖文帝可比而執事致君澤民之術遠方臯䕫亦非子房賈誼可倫眞所謂明良相逢千載一時者也將見吾君不問則巳問則執事必能盡言執事不言則已言則吾君必能盡用致斯世於唐虞雍熈之盛者在是矣豈非天下之幸歟雖然天下之事固有行於古而亦可行於今者亦有行於古而難行於今者如夏時周冕之類此行於古而亦可行於今者也如井田封建之類可行於古而難行於今者也可行者行之則人之從之也易難行者而行之則人之從之也難從之易則民樂其利從之難則民受其患此君子之用世所貴乎得時措之宜也執事於此研諸慮而藏諸心者非一日矣措之猶反掌耳尚何待於愚言之贅哉然僕聞知者千慮必有一失愚者千慮必有一得故不能無言於左右耳夫人情愛其人之深而慮其患之至者必救其失於未患之先茍待其旣失而後救之是乃愛之淺而慮之踈也其得為忠乎天下知執事之深愛執事之至如僕者固多矣竊謂忠於執事未能有過於僕者伏惟少垂察焉皇明文衡卷之二十六
